# OAK Configuration for ai-gene-review term validation
# Maps ontology prefixes to OAK adapter strings
#
# Adapter types:
#   ols:<name>         - EBI Ontology Lookup Service (online, no local download)
#   sqlite:obo:<name>  - Pre-built SQLite databases (fast, offline)
#   null               - Skip validation for this prefix
#
# OBO ontologies use the OLS adapter (ols:<slug>) so validation queries the
# EBI Ontology Lookup Service directly instead of downloading large SQLite
# builds. RHEA is not hosted in OLS, so it stays on sqlite:obo:rhea.
#
# Note: ONLY prefixes listed here are validated. Unlisted prefixes are skipped
# with a warning. Use null to explicitly skip without warning.

ontology_adapters:
  # Non-ontology prefixes that should be skipped
  TEMP: null        # Temporary/placeholder identifiers
  PMID: null        # PubMed IDs
  PMC: null         # PubMed Central IDs
  DOI: null         # Digital Object Identifiers
  ISBN: null        # Book identifiers
  ISSN: null        # Journal identifiers
  UniProt: null     # UniProt accessions
  UniProtKB: null   # UniProt Knowledgebase accessions
  RefSeq: null      # RefSeq accessions
  ENSEMBL: null     # Ensembl IDs
  EC: null          # Enzyme Commission numbers
  PDB: null         # Protein Data Bank IDs
  OMIM: null        # Online Mendelian Inheritance in Man
  file: null        # File path references
  GO_REF: null      # Gene Ontology reference collection
  Reactome: null    # Reactome pathway database
  skos: null        # SKOS mapping predicates (e.g. skos:relatedMatch) - not ontology-validated
  semapv: null      # SSSOM mapping-justification vocabulary - not ontology-validated
  RO: null          # Relation Ontology predicates (e.g. RO:0002327 enables) - not label-validated here

  # Standard OBO ontology prefixes - use the OLS adapter (ols:<slug>)
  GO: ols:go
  ARO: ols:aro  # Antibiotic Resistance Ontology (CARD) - for ARO->GO mapping validation
  CHEBI: ols:chebi
  UBERON: ols:uberon
  CL: ols:cl
  HP: ols:hp
  MONDO: ols:mondo
  PR: ols:pr
  SO: ols:so
  PATO: ols:pato
  NCBITaxon: ols:ncbitaxon
  RHEA: sqlite:obo:rhea  # RHEA is not hosted in OLS; keep the SQLite build
  PO: ols:po  # Plant Ontology - anatomical locations in plant modules (e.g. root)
  SBO: null  # Systems Biology Ontology (module regulation predicates) - no working
             # offline sqlite:obo build (labels resolve to None), so not label-validated here
  MetaCyc: null  # MetaCyc pathway/reaction ids - not OBO label-validated here
  MIBiG: null  # Minimum Info about a Biosynthetic Gene cluster - not label-validated here
  PANTHER: null  # PANTHER family/subfamily ids - not OBO label-validated here
