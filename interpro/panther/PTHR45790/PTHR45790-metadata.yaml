  name:
    name: Siroheme and cobalamin biosynthesis enzymes
    short: Siro_Cobalamin_biosynth
  description:
  - text: This family of proteins includes multifunctional enzymes involved in the
      biosynthesis of siroheme, a prosthetic group essential for various redox reactions
      and nitrogen and sulfur metabolism. These enzymes catalyze the sequential methylation
      of uroporphyrinogen III to form precorrin-2, followed by the NAD-dependent dehydrogenation
      to yield sirohydrochlorin, and finally, the ferrochelation to produce siroheme.
      Additionally, some members are involved in the methylation of precorrin-4 in
      cobalamin (vitamin B12) biosynthesis. The family also encompasses proteins that
      catalyze the initial methylation steps converting uroporphyrinogen III to precorrin-1
      and precorrin-2, which are intermediates in both cobalamin and siroheme biosynthesis
      pathways.
