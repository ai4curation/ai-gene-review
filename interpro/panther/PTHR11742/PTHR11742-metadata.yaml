  name:
    name: Glycosyl Hydrolase Family 47
    short: Glycosyl_Hydrolase_47
  description:
  - text: The glycosyl hydrolase 47 family is involved in the maturation of Asn-linked
      oligosaccharides, a critical process in protein quality control and degradation
      pathways. Members of this family function as alpha-mannosidases, which progressively
      trim alpha-1,2-linked mannose residues from Man(9)GlcNAc(2) to produce Man(5)GlcNAc(2).
      This enzymatic activity is essential for the proper folding and function of
      glycoproteins. Some family members are also involved in early N-glycan processing,
      root development, and cell wall biosynthesis. The activity of these enzymes
      is regulated by inhibitors such as kifunensine and 1-deoxymannojirimycin, highlighting
      their specificity and importance in cellular metabolism.
