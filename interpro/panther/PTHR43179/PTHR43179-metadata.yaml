  name:
    name: Glycosyltransferase 2
    short: Glycosyltransferase_2
  description:
  - text: The glycosyltransferase 2 family is involved in various biosynthetic processes
      related to cell wall and lipopolysaccharide formation in bacteria and other
      organisms. Members of this family catalyze the transfer of sugar moieties from
      activated sugar donors to specific acceptor molecules, forming glycosidic bonds.
      This includes the synthesis of the mycolylarabinogalactan-peptidoglycan complex
      in mycobacteria, an essential component for cell wall integrity, and the biosynthesis
      of O-antigen in lipopolysaccharides. Some family members are responsible for
      initiating and polymerizing galactan chains, while others add rhamnose to N-glycans
      or lipopolysaccharides. The diversity of functions reflects the family's role
      in constructing complex carbohydrate structures that are critical for cell viability,
      structural integrity, and pathogenicity.
