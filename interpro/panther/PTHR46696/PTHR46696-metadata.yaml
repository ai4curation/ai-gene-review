  name:
    name: Cytochrome P450 Monooxygenases
    short: Cytochrome_P450_Monoox
  description:
  - text: The Cytochrome P450 family is a diverse group of heme-thiolate monooxygenases
      that participate in a wide range of biological processes. Members of this family
      are involved in the metabolism of various substrates, including steroids, fatty
      acids, and xenobiotics. They catalyze reactions such as hydroxylation, epoxidation,
      and C-C bond formation, playing critical roles in the biosynthesis of antibiotics,
      degradation of herbicides, and processing of endogenous compounds. The family
      includes enzymes that contribute to the synthesis of macrolide antibiotics,
      the degradation of cholesterol, and the biosynthesis of pigments and vitamins.
      Some members are also implicated in the detoxification of plant protective agents
      and the biosynthesis of steroid metabolic intermediates.
