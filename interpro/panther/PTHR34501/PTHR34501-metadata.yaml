  name:
    name: Gram-negative bacterial outer membrane porin
    short: Gram-neg_bact_OMP
  description:
  - text: The Gram-negative porin family is characterized by its role in forming pores
      within the outer membrane of Gram-negative bacteria. These pores are essential
      for the passive diffusion of small molecules, including nutrients like monosaccharides,
      disaccharides, trisaccharides, and inorganic phosphate, as well as various negatively
      charged solutes. Some family members are selective for specific ions, such as
      cations. The porins also play a role in antibiotic resistance by altering the
      transverse electric field within the constriction zone of the pore, which affects
      the passage of antibiotics. Additionally, certain porins serve as receptors
      for bacteriophages and bacterial toxins, indicating a role in microbial infection
      processes. The family includes major antigens on bacterial surfaces, which may
      contribute to pathogenic properties. Overall, the Gram-negative porin family
      is integral to bacterial survival, pathogenicity, and interaction with the environment.
