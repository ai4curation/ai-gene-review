  name:
    name: Two-component system histidine kinase
    short: 2C_system_His_kinase
  description:
  - text: The protein family is involved in two-component signal transduction systems,
      which are prevalent in bacteria and plants. Members function as histidine kinases
      that autophosphorylate and transfer phosphate to response regulators, mediating
      cellular responses to environmental stimuli. They regulate processes such as
      cytokinin signaling, stress responses, cell cycle control, biofilm formation,
      and virulence. Some members act as cytokinin receptors, influencing plant development
      and stress signaling through MAPK cascades. Others participate in bacterial
      systems like the Rcs phosphorelay, affecting capsule synthesis and cell division.
      Additionally, certain kinases are involved in peroxide stress response and cell
      wall biosynthesis regulation.
