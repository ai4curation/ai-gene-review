  name:
    name: Membrane Fusion Protein (MFP)
    short: MFP_Efflux_Pump
  description:
  - text: The membrane fusion protein (MFP) family is involved in the transport of
      various substances across the cell membrane. Members of this family typically
      form efflux pumps with other protein subunits, such as AaeB, to export compounds
      out of the cell. This is a mechanism used by bacteria to resist toxic substances,
      including antibiotics and other antimicrobial agents. Some members are specifically
      known to contribute to the efflux of p-hydroxybenzoic acid, while others are
      implicated in resistance to a range of drugs, such as puromycin, acriflavine,
      and tetraphenylarsonium chloride. Additionally, one member is involved in resistance
      to the fungal toxin fusaric acid. The activity of these efflux pumps is crucial
      for bacterial survival in hostile environments, as it helps to prevent the accumulation
      of toxic compounds inside the cell.
