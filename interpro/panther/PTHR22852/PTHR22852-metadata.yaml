  name:
    name: WD repeat-containing CDT2 adapter protein
    short: WD-repeat_CDT2_adapter
  description:
  - text: This family of proteins serves as substrate-specific adapters for DCX (DDB1-CUL4-X-box)
      E3 ubiquitin-protein ligase complexes, which are crucial for cell cycle control,
      DNA damage response, and translesion DNA synthesis. Members of this family mediate
      the polyubiquitination and subsequent degradation of various substrates, including
      CDT1, CDKN1A/p21(CIP1), and others, often in response to DNA damage or during
      specific cell cycle phases to ensure proper DNA replication regulation. Interaction
      with PCNA via a PIP-box is typically required for substrate polyubiquitination.
      Some family members also contribute to the regulation of the circadian clock
      by targeting specific proteins for degradation.
