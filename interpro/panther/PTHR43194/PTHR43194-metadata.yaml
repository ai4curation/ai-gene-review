  name:
    name: Carboxylesterase BioH
    short: Carboxylesterase_BioH
  description:
  - text: The Carboxylesterase BioH family is part of the AB hydrolase superfamily
      and is involved in biotin biosynthesis. Members of this family, such as BioH,
      play a crucial physiological role by removing the methyl group introduced by
      BioC during the synthesis of the pimeloyl moiety. This demethylation step is
      essential for the production of pimeloyl-ACP via the fatty acid synthetic pathway,
      as it involves the hydrolysis of the ester bonds of pimeloyl-ACP esters. This
      process is a key step in the fatty acid synthetic pathway that leads to the
      formation of pimeloyl-CoA, a precursor in biotin biosynthesis. The family exhibits
      esterase activity, with a preference for short-chain fatty acid esters, and
      may also be involved in the condensation of CoA and pimelic acid.
