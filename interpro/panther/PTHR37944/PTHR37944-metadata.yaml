  description:
  - text: This family of proteins includes substrate-selective channels that facilitate
      the diffusion of compounds across cellular membranes. Members of this family
      are typically involved in the transport of small molecules, such as sugars and
      potentially other compounds with hydroxyl groups. Specific functions include
      the transport of glucose, mannitol, fructose, glycerol, quinate, and shikimate.
      These proteins play a role in the uptake of nutrients necessary for the growth
      and metabolism of certain bacteria.
