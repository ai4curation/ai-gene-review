  name:
    name: Pseudomonas-type Homoserine Kinase
    short: Pseudomonas-type_ThrB
  description:
  - text: The pseudomonas-type ThrB family is characterized by proteins that predominantly
      function as homoserine kinases. These enzymes play a crucial role in the biosynthesis
      of threonine, isoleucine, and methionine by catalyzing the ATP-dependent phosphorylation
      of L-homoserine to L-homoserine phosphate. This reaction is a key step in the
      aspartate pathway, which is essential for the production of essential amino
      acids in bacteria. Some members of the family may have evolved to acquire specialized
      functions, such as phosphorylating different substrates like 5-hydroxy-L-lysine
      or the antibiotic amicoumacin A, indicating a potential for functional diversity
      within the family.
