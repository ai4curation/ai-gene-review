  name:
    name: Major Facilitator Superfamily (MFS) Transporters
    short: MFS_Transporters
  description:
  - text: The Major Facilitator Superfamily (MFS) is a diverse group of secondary
      transporters with a broad range of functions, including the transport of small
      solutes in response to chemiosmotic ion gradients. Members of the MFS are involved
      in the uptake of nutrients, export of toxins and drugs, and osmotic shock protection.
      They can function as uniporters, symporters, or antiporters. This family includes
      proteins that confer resistance to various drugs, such as azoles, chloramphenicol,
      and quinidine, by mediating their efflux from the cell. Some members are involved
      in the biosynthesis and secretion of secondary metabolites like mycotoxins,
      polyketides, and other bioactive compounds. Others are implicated in the transport
      of polyamines, cations, and organic acids across the cell membrane, contributing
      to cellular homeostasis, detoxification, and virulence in pathogenic species.
