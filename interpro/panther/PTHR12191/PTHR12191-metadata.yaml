  name:
    name: Zinc Iron Protein (ZIP) Transporter
    short: ZIP_Transporter
  description:
  - text: The ZIP transporter family mediates the cellular uptake of divalent metal
      cations such as zinc, manganese, and iron, which are crucial for tissue homeostasis,
      metabolism, development, and immunity. These transporters function as energy-dependent
      symporters, often transporting a divalent metal cation alongside bicarbonate
      anions. Some family members also transport non-essential metals like cadmium,
      which is cytotoxic and carcinogenic. The ZIP transporters play roles in processes
      such as epithelial-to-mesenchymal transition, T-cell receptor signaling, meiotic
      progression, and the adaptation of cells to endoplasmic reticulum stress. They
      are also involved in dietary zinc uptake, insulin receptor signaling, gluconeogenesis,
      and innate immunity. The transport activity of these proteins is regulated by
      metal availability and can be temperature dependent.
