  name:
    name: Long-chain fatty acid transport and activation
    short: LCFA_transport_activation
  description:
  - text: This family of proteins is involved in the metabolism of fatty acids. Members
      function as transporters and enzymes that facilitate the cellular uptake of
      long-chain and very-long-chain fatty acids. They also catalyze the ATP-dependent
      activation of these fatty acids into their CoA derivatives, which are essential
      for subsequent metabolic processes such as beta-oxidation, phospholipid synthesis,
      and the formation of the epidermal barrier. Some family members are involved
      in the metabolism of bile acids and steroids, contributing to cholesterol metabolism
      and the synthesis of sphingosine-1-phosphate. The proteins exhibit acyl-CoA
      ligase activity and may also play roles in the regulation of fatty acid efflux
      from cells, impacting the availability of fatty acids for energy production
      and lipid biosynthesis.
