  name:
    name: Phosphoenolpyruvate-dependent sugar PTS enzyme
    short: PEP-utilizing_PTS_enzyme
  description:
  - text: The PEP-utilizing enzyme family encompasses proteins that are key components
      of the phosphoenolpyruvate-dependent sugar phosphotransferase system (sugar
      PTS), a major carbohydrate active-transport system. Members of this family are
      involved in the phosphorylation and translocation of sugar substrates across
      the cell membrane. The general (non sugar-specific) component, known as Enzyme
      I, transfers the phosphoryl group from phosphoenolpyruvate (PEP) to the phosphoryl
      carrier protein (HPr). The proteins in this family are characterized by a domain
      architecture that includes an N-terminal domain with the HPr binding site, a
      central domain harboring the pyrophosphate/phosphate carrier histidine, and
      a C-terminal domain that binds pyruvate. Some members also participate in the
      transport of specific sugars like fructose, and may have additional domains
      for signal perception or multifunctional roles.
