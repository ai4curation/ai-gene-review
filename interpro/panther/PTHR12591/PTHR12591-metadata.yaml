  name:
    name: Glucose-6-phosphatase catalytic subunit
    short: G6P_catalytic_subunit
  description:
  - text: This family of proteins includes enzymes that hydrolyze glucose-6-phosphate
      to glucose within the endoplasmic reticulum. They are involved in the terminal
      step of glycogenolysis and gluconeogenesis, forming a complex with the glucose-6-phosphate
      transporter to facilitate glucose production. These enzymes are crucial for
      maintaining homeostatic blood glucose levels. Some family members are suggested
      to play a role in neutrophil function and are inhibited by vanadate.
