  name:
    name: Class II Fructose-bisphosphate Aldolase
    short: Class_II_FBP_aldolase
  description:
  - text: The class II fructose-bisphosphate aldolase family is involved in key metabolic
      processes, such as glycolysis and gluconeogenesis, by catalyzing the reversible
      aldol condensation of dihydroxyacetone phosphate with glyceraldehyde 3-phosphate
      to form fructose 1,6-bisphosphate. Some members also participate in the catabolism
      of galactitol and the metabolism of tagatose 1,6-bisphosphate, as part of the
      tagatose-1,6-bisphosphate aldolase complex, which requires a GatZ subunit for
      full activity and stability. Additionally, a subfamily within this group is
      responsible for producing dihydroxyacetone phosphate and malonic semialdehyde
      from 6-phospho-5-dehydro-2-deoxy-D-gluconate. The family includes various subunits
      like GatY and KbaY, indicating a diversity of functions and substrate specificities
      within the broader context of carbohydrate metabolism.
