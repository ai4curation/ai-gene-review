  name:
    name: Proton-coupled symporters
    short: H+-coupled_symporters
  description:
  - text: This family of proteins is involved in the transport of various substrates
      across cellular membranes through a symport mechanism, where the transport of
      the substrate is coupled with the movement of protons into the cell. Members
      of this family function as osmosensors and osmoregulators, responding to osmotic
      shifts by importing osmolytes such as proline, glycine betaine, and other compatible
      solutes. Some proteins in this family are specific for the uptake of citrate,
      while others are more versatile and can transport a range of osmoprotectants
      including ectoine, pipecolic acid, and alpha-ketoglutarate. The activity of
      these transporters can be regulated by environmental factors such as osmotic
      stress, and some are inhibited by uncouplers like CCCP. Collectively, these
      proteins play a critical role in maintaining cellular homeostasis under varying
      environmental conditions.
