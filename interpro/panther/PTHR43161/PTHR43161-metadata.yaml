  name:
    name: Zinc-containing polyol dehydrogenases
    short: Zinc_polyol_DH
  description:
  - text: The zinc-containing alcohol dehydrogenase family is involved in the reversible
      NAD(+)-dependent oxidation of various sugar alcohols, converting them to their
      corresponding ketoses. Members of the family play key roles in metabolic pathways
      such as the polyol pathway, which interconverts glucose and fructose via sorbitol,
      providing an alternative route for glucose metabolism. This family includes
      enzymes like sorbitol dehydrogenase, which is active with substrates like xylitol,
      L-iditol, and D-sorbitol, and D-xylulose reductase, which participates in the
      conversion of xylitol to D-xylulose, a step in the utilization of xylose from
      hemicelluloses. Other members are involved in the catabolism of L-arabinose,
      the degradation of 3,6-anhydro-L-galactose, and the metabolism of butanediol.
      The family's enzymes are characterized by the presence of a zinc ion, which
      is essential for their catalytic activity, and they are unable to use NADP(+)
      as an electron acceptor.
