  name:
    name: Eukaryotic NMN adenylyltransferase
    short: Euk_NMN_adenylyltrnsfrase
  description:
  - text: The eukaryotic NMN adenylyltransferase family is responsible for the biosynthesis
      of NAD(+) from nicotinamide mononucleotide (NMN) and ATP, a key step in both
      de novo and salvage pathways for NAD(+) production. Members of the family can
      also utilize the deamidated form, nicotinic acid mononucleotide (NaMN), with
      varying efficiencies. These enzymes are involved in the maintenance of healthy
      axons by delaying Wallerian axon degeneration. They also participate in the
      synthesis of nuclear ATP, necessary for chromatin remodeling, and support ADP-ribosylation
      reactions. The family's pyrophosphorolytic activity allows for the cleavage
      of NAD(+), with some members also able to degrade other dinucleotides. Regulatory
      mechanisms include inhibition by specific phosphorylated dinucleotides and galotannin.
