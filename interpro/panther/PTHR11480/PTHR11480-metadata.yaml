  name:
    name: Sphingolipid Activators and Surfactant Proteins
    short: Sphingo_Act-Surfact_Prot
  description:
  - text: This family of proteins includes activators of lysosomal sphingolipid degradation
      and pulmonary surfactant-associated factors. Members are involved in the sequential
      hydrolysis of sphingolipids by specific hydrolases, forming complexes with enzymes
      and lipids to enhance substrate solubilization and degradation. Some proteins
      in this family act as sphingomyelin phosphodiesterase activators, while others
      are known to promote alveolar stability by reducing surface tension in the lungs.
      Additionally, certain members exhibit neurotrophic and myelinotrophic effects
      through G-protein-coupled receptor signaling pathways.
