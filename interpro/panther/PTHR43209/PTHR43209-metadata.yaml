  name:
    name: tRNA sulfurtransferase, ThiI
    short: tRNA_sulfurtransferase_ThiI
  description:
  - text: The ThiI family proteins are involved in the biosynthesis of thiamine (vitamin
      B1) and the modification of tRNAs. They catalyze the ATP-dependent transfer
      of sulfur to tRNA, resulting in the production of 4-thiouridine at position
      8, which serves as a near-UV photosensor. Additionally, they facilitate the
      transfer of sulfur to the sulfur carrier protein ThiS, forming ThiS-thiocarboxylate,
      a crucial step in the thiazole synthesis pathway within thiamine biosynthesis.
      The sulfur source for these reactions is provided as a persulfide by the enzyme
      IscS.
