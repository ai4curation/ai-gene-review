  name:
    name: Secondary Metabolite Biosynthesis Regulators
    short: Sec_Metab_Biosynth_Reg
  description:
  - text: The protein family is comprised of transcription factors that regulate the
      expression of gene clusters involved in the biosynthesis of various secondary
      metabolites, including toxins, antibiotics, and other bioactive compounds. Members
      of the family are involved in the activation or repression of gene clusters
      responsible for the production of compounds such as meroterpenoids, sesquiterpene
      lactones, cyclic depsipeptides, and mycotoxins. These transcription factors
      play critical roles in the regulation of metabolic pathways that are important
      for the ecological and pathogenic interactions of the producing organisms. They
      may act as activators or repressors and are involved in a wide range of processes
      including biofilm formation, virulence, pigment production, and response to
      environmental stimuli.
