  description:
  - text: The Glutamate-rich WD repeat-containing protein family is involved in various
      cellular processes related to chromatin dynamics and ribosome assembly. Members
      of the family function as histone-binding proteins that regulate chromatin structure
      and facilitate the loading of minichromosome maintenance (MCM) complexes at
      replication origins, potentially enhancing chromatin openness. Some family members
      are implicated in ribosome biogenesis, specifically in the early assembly of
      the 60S ribosomal subunit, by targeting ribosomal protein L3 onto precursor
      rRNA. Additionally, certain proteins within this family act as substrate receptors
      for CRL4 E3 ligase complexes, negatively regulating thermotolerance by affecting
      HSP90-1 function and the expression of heat-inducible genes.
