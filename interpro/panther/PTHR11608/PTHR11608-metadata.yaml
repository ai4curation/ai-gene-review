  name:
    name: PyrR bifunctional
    short: PyrR_bifunctional
  description:
  - text: The PyrR bifunctional protein family is involved in the regulation of the
      pyrimidine nucleotide (pyr) operon. Members of this family bind to specific
      sites on pyr mRNA in a uridine-dependent manner, which influences the formation
      of RNA secondary structures. This binding disrupts an antiterminator hairpin
      and promotes the formation of a downstream transcription terminator, leading
      to decreased expression of downstream genes. Additionally, these proteins exhibit
      a weak uracil phosphoribosyltransferase activity, although this function is
      not considered physiologically significant. The primary role of the PyrR family
      is to modulate the transcription of the pyr operon in response to the presence
      of exogenous pyrimidines, ensuring proper regulation of pyrimidine nucleotide
      synthesis.
