  name:
    name: Histidinol-phosphate aminotransferase
    short: HistidinolP_aminotransfase
  description:
  - text: The Histidinol-phosphate aminotransferase family is involved in the biosynthesis
      of the amino acid histidine. Members of this family are pyridoxal phosphate
      (PLP)-dependent enzymes that catalyze the transamination reaction converting
      histidinol phosphate to histidinol, a precursor of histidine. This reaction
      is a key step in the histidine biosynthetic pathway. Some family members may
      also transaminate aromatic amino acids and histidine, in addition to histidinol
      phosphate. The family belongs to the class-II pyridoxal-phosphate-dependent
      aminotransferase family, which is characterized by the ability to transfer amino
      groups from amino acids to alpha-keto acids, playing a critical role in amino
      acid metabolism.
