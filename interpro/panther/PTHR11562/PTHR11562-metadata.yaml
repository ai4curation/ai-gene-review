  name:
    name: Cation Diffusion Facilitator/SLC30A
    short: CDF/SLC30A
  description:
  - text: The Cation Diffusion Facilitator (CDF) family, also known as the SLC30A
      subfamily, comprises proteins that function primarily as metal ion transporters.
      These transporters are involved in the homeostasis of zinc and other divalent
      cations such as cadmium and cobalt. They mediate the efflux of zinc from the
      cytoplasm either into intracellular compartments like secretory vesicles, vacuoles,
      endosomes, and synaptic vesicles, or across the plasma membrane into the extracellular
      space or periplasm. This regulation of zinc ion concentration is crucial for
      various physiological processes including insulin secretion in pancreatic beta
      cells, zinc deposition in milk, and maintaining cellular zinc balance in the
      brain. Some family members also contribute to metal tolerance in plants and
      bacteria, providing resistance to high concentrations of metal ions by sequestering
      excess metals into vacuoles or by active efflux, thus reducing cytotoxicity
      and aiding in survival under metal stress conditions.
