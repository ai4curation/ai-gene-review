  name:
    name: NF-kappa-B Signaling Regulator
    short: NF-kappa-B_Signaling_Reg
  description:
  - text: This family of proteins is involved in the modulation of the host immune
      response. Members of this family are known to interact with components of the
      NF-kappa-B signaling pathway, specifically by recruiting the kinases IKKA/CHUK
      and IKBKB. Through this interaction, they are able to suppress the kinase activity
      towards NFKBIA, thereby negatively regulating the NF-kappa-B pathway. This function
      is critical in the context of viral infection, where the proteins are likely
      to contribute to immune evasion by the virus.
