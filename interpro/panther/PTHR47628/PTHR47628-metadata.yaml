  name:
    name: Aliphatic amidase operon regulator
    short: Amidase_operon_regulator
  description:
  - text: This family of proteins is involved in the regulation of aliphatic amidase
      operon expression. Members of this family are characterized by their ability
      to negatively regulate the operon by inhibiting the action of a specific regulator
      protein at the protein level. Additionally, these proteins possess protein kinase
      activity. The structural feature of this family includes two beta-alpha-beta
      domains forming a central cleft, which is the binding site for the amide.
