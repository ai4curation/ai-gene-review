  description:
  - text: This family of proteins includes members that are involved in various cellular
      processes, such as ubiquitination, signal transduction, and membrane stability.
      Some proteins in this family function as components of E3 ubiquitin-protein
      ligase complexes, mediating ubiquitination and proteasomal degradation of target
      proteins. Others play roles in epithelial development, NF-kappa-B activation,
      and inflammasome function. Certain members are involved in maintaining the structure
      and function of the erythrocyte membrane by linking membrane proteins to the
      cytoskeleton. Additionally, some proteins in this family are implicated in the
      regulation of ion channels and cell adhesion molecules, contributing to the
      maintenance of cellular compartments such as the nodes of Ranvier and axonal
      initial segments.
