  name:
    name: ER-associated autophagy and membrane dynamics regulator
    short: ER_autophagy_membrane_reg
  description:
  - text: This family of proteins includes autophagy regulators and endoplasmic reticulum
      (ER) shaping proteins. Members are involved in the regulation of ER-associated
      degradation pathways, particularly under stress conditions, where they facilitate
      ER fragmentation and delivery into lysosomes. They interact with ATG8 family
      proteins to mediate this process. Additionally, some members are implicated
      in the modulation of glutamate transport by altering the affinity and catalytic
      efficiency of specific transporters. They also play a role in the formation
      and stabilization of ER tubules and may negatively regulate apoptosis by affecting
      caspase activity. Furthermore, these proteins are suggested to be involved in
      various cellular processes including protein transport, membrane trafficking,
      and cell signaling during hematopoietic maturation.
