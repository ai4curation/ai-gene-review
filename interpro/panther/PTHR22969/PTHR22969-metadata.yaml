  name:
    name: Inhibitor of nuclear factor kappa-B kinase
    short: IKK
  description:
  - text: The I-kappa-B kinase (IKK) family comprises serine/threonine kinases essential
      for the NF-kappa-B signaling pathway, which is activated by various stimuli
      including inflammatory cytokines, bacterial or viral products, DNA damage, and
      other cellular stresses. Family members phosphorylate inhibitors of NF-kappa-B,
      leading to their ubiquitination and degradation, and subsequent nuclear translocation
      of NF-kappa-B to activate gene transcription involved in immune response, growth
      control, and apoptosis protection. Additionally, the family plays roles in antiviral
      responses by phosphorylating interferon regulatory factors and in energy balance
      regulation. Some members also phosphorylate histones, modulating chromatin accessibility,
      and have roles in autophagy, cell survival, and lymphoid organogenesis. The
      family's activity is regulated by phosphorylation and is crucial for both canonical
      and non-canonical NF-kappa-B signaling pathways, as well as for maintaining
      a balance between type I and type II interferon responses.
