  name:
    name: Aldehyde dehydrogenase
    short: Aldehyde_dehydrogenase
  description:
  - text: The aldehyde dehydrogenase family is involved in the oxidation of aldehydes
      to their corresponding carboxylic acids using NAD(+) or NADP(+) as cofactors.
      Members of this family play a role in various metabolic pathways, including
      the degradation of amino acids such as putrescine and lysine, and the biosynthesis
      of osmoprotectants like glycine betaine. They are also implicated in the detoxification
      of aldehydes produced from alcohol, lipid peroxidation, and as intermediates
      in the metabolism of neurotransmitters, corticosteroids, and biogenic amines.
      Some subfamilies within this protein family are specialized in specific functions,
      such as the oxidation of gamma-aminobutyraldehyde to gamma-aminobutyrate (GABA)
      in putrescine degradation or the conversion of betaine aldehyde to betaine in
      osmoprotectant biosynthesis. The family includes enzymes with broad substrate
      specificity and those involved in the biosynthesis of secondary metabolites
      and structural components of the eye lens.
