  name:
    name: FMN-dependent alpha-hydroxy acid dehydrogenase
    short: FMN-dep_alpha-hydroxyacid_DH
  description:
  - text: The FMN-dependent alpha-hydroxy acid dehydrogenase family encompasses enzymes
      that catalyze the oxidation of various alpha-hydroxy acids to their corresponding
      oxoacids, typically reducing O2 to H2O2 in the process. Members of this family
      are involved in key metabolic pathways, including photorespiration in plants,
      where they oxidize glycolate to glyoxylate, and in the respiratory chain of
      various organisms, where they convert L-lactate to pyruvate. Some family members
      also participate in specialized biosynthetic pathways, such as the production
      of the enzyme cofactor mycofactocin or the mycotoxin fusaric acid. The enzymes
      exhibit broad substrate specificity, with some also able to oxidize medium and
      long-chain hydroxyacids, mandelate, and other 2-hydroxyacids. Their activity
      is essential for the utilization of certain substrates as energy sources and
      for the detoxification of potentially harmful compounds.
