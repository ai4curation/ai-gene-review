  name:
    name: DNA repair and recombination RadA/Rad51
    short: DNA_repair_recomb_RadA/Rad51
  description:
  - text: This family of proteins is involved in the maintenance of genomic stability
      through DNA repair and homologous recombination processes. Members of this family
      bind to single-stranded DNA and form nucleoprotein filaments, which are crucial
      for the homology search and strand exchange during recombination. They exhibit
      DNA-dependent ATPase activity and are capable of hydrolyzing ATP in a manner
      dependent on the presence of single-stranded DNA. These proteins are also essential
      for the repair of DNA damage, including double-strand breaks, and play a role
      in meiotic recombination, ensuring proper chromosome segregation. Some family
      members are specifically involved in meiotic recombination and synaptonemal
      complex formation, contributing to cell cycle progression during meiosis.
