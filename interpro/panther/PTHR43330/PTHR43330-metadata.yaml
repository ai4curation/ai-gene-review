  name:
    name: Methionine Aminopeptidase Type 1
    short: MetAP_Type1
  description:
  - text: The Methionine Aminopeptidase Type 1 family is characterized by its enzymatic
      function in the cotranslational processing of nascent proteins. Members of this
      family are responsible for the removal of the N-terminal methionine from newly
      synthesized proteins, particularly when the second residue is small and uncharged,
      such as Met-Ala-, Cys, Gly, Pro, Ser, Thr, or Val. This cleavage often requires
      the prior deformylation of N(alpha)-formylated initiator methionine. The family
      is part of the peptidase M24A family and plays a crucial role in protein maturation
      and function by regulating the N-terminus of proteins, which can be critical
      for protein stability, localization, and interaction with other molecules.
