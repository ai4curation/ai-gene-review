  name:
    name: Mitochondrial import inner membrane translocase
    short: Tim17/Tim22/Tim23
  description:
  - text: The Tim17/Tim22/Tim23 family is comprised of essential components of the
      TIM23 complex, which is responsible for the translocation of transit peptide-containing
      proteins across the mitochondrial inner membrane. The family members play a
      crucial role in linking the inner and outer mitochondrial membranes and are
      involved in the import of proteins into the mitochondria, a process that is
      vital for mitochondrial function and energy production. Some members have an
      internal targeting signal that is necessary for membrane insertion in a membrane
      potential-dependent manner, while others have regions exposed on the outer surface
      of the outer membrane that are essential for protein import.
