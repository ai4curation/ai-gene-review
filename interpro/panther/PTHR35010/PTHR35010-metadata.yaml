  name:
    name: 'Signal-Responsive Transcription Regulators

      '
    short: 'SigRespTrReg

      '
  description:
  - text: This protein family comprises regulators that integrate environmental and
      developmental cues to modulate gene expression. [cite:PUB00091566], . They contain
      functional domains such as conserved DNA-binding motifs (for example, helix–turn–helix
      or XRE types) and PAS or PAS-like ligand-binding domains, suggesting roles in
      both sensing and signal transduction. [cite:PUB00091566], . Members of this
      family can be membrane-associated, allowing post-translational processing events
      that enable nuclear translocation and consequent transcriptional modulation.
      [cite:PUB00091566], . Other representatives are implicated in controlling secondary
      metabolism and developmental pathways in actinomycetes., [cite:PUB00091566],
      . A subset composed solely of a PAS-like domain underlines a potential role
      in specialised environmental signal detection., .
