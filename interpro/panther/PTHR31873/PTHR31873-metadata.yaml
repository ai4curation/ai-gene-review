  name:
    name: L-aspartate dehydrogenase
    short: L-aspartate_DH
  description:
  - text: The L-aspartate dehydrogenase family includes enzymes that catalyze the
      NAD or NADP-dependent dehydrogenation of L-aspartate to iminoaspartate. This
      reaction is a key step in nitrogen metabolism and may also be involved in the
      biosynthesis of various amino acids, such as lysine in some species. Members
      of this family are characterized by their specificity for L-aspartate and their
      ability to use either NAD or NADP as a cofactor. The family is found across
      a wide range of organisms, including bacteria, archaea, and eukaryotes, indicating
      its fundamental role in cellular metabolism. Some members of the family may
      also catalyze the reverse reaction, the reductive amination of oxaloacetate,
      although this is not a universal function within the family.
