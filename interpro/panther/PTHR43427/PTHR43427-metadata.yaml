  name:
    name: Voltage-gated ClC-type chloride channel
    short: ClC-type_chloride_channel
  description:
  - text: The ClC-type chloride channel family is involved in the transport of chloride
      ions across cell membranes. Members of this family are voltage-gated channels
      that play a role in maintaining cellular ion homeostasis. A subfamily within
      this group, ClcB, is implicated in acting as an electrical shunt for an outwardly-directed
      proton pump linked to amino acid decarboxylation, which is a part of the extreme
      acid resistance response in some bacteria. Additionally, certain plant members
      of this family are involved in chloride homeostasis, influencing chloroplast
      ultrastructure and photosynthetic electron transport. Other functions include
      assisting in nitrogen-fixing root nodule symbiosis and transporting chloride
      and fluoride with similar efficiency.
