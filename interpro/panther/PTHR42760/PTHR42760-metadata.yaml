  name:
    name: Short-chain Dehydrogenases/Reductases
    short: SDR
  description:
  - text: The Short-chain Dehydrogenases/Reductases (SDR) family encompasses enzymes
      that exhibit a broad range of functions, including oxidation-reduction reactions
      pivotal to various metabolic pathways. Members of the SDR family are involved
      in the metabolism of sugars, steroids, and fatty acids. They catalyze the NAD(P)(H)-dependent
      reduction or oxidation of substrates such as alcohols, ketones, and aldehydes.
      Some SDR enzymes participate in the biosynthesis of complex molecules like antibiotics,
      pigments, and mycotoxins, while others are implicated in the catabolism of environmental
      pollutants. The family includes enzymes like 3-oxoacyl-[acyl-carrier-protein]
      reductase, involved in fatty acid biosynthesis, and various oxidoreductases
      with specificities for substrates like L-rhamnose, L-xylulose, and galactitol.
      The SDR family plays a crucial role in cellular homeostasis, energy production,
      and detoxification processes.
