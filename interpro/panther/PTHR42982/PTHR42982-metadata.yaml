  name:
    name: Twin-arginine translocation system
    short: TatA/E
  description:
  - text: The TatA/E family is involved in the twin-arginine translocation (Tat) system,
      which is responsible for transporting large folded proteins across membranes.
      These proteins contain a twin-arginine motif within their signal peptide, which
      is recognized by the Tat system. Members of the TatA/E family, including TatA,
      TatE, and their subfamily variants, are thought to form the protein-conducting
      channel of the Tat system. Some members share overlapping functions and are
      essential for the secretion of specific proteins, such as PhoD and YwbN. The
      Tat system is distinct from the general Sec-dependent pathway as it translocates
      fully folded proteins, which is crucial for the functionality of many complex
      enzymes and cofactor-containing proteins.
