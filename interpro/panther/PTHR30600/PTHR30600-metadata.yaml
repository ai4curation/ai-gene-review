  name:
    name: Cytochrome c-dependent Peroxidase and MauG
    short: Cytochrome_c_Peroxidase/MauG
  description:
  - text: The protein family encompasses enzymes with peroxidase activity, primarily
      reducing hydrogen peroxide (H2O2) to water using reduced cytochrome c as an
      electron donor. Members are involved in various biological processes, including
      iodate respiration, where they play a role in detoxifying H2O2 produced by iodate
      reductases. Some family members are essential for the biosynthesis of tryptophan
      tryptophylquinone (TTQ), a cofactor of methylamine dehydrogenase (MADH), thus
      participating in methylamine metabolism. Others are involved in the anammox
      process, reducing nitric oxide to hydroxylamine, contributing significantly
      to the Earth's nitrogen cycle. The family's structural features include domains
      reminiscent of class 1 cytochromes c and, in some cases, calcium-binding sites
      with unique ligand sets.
