  name:
    name: 3-isopropylmalate dehydratase small subunit
    short: LeuD
  description:
  - text: The LeuD family proteins are involved in the isomerization of hydroxyacids
      as part of amino acid biosynthesis pathways. They catalyze the reversible isomerization
      between 2-isopropylmalate and 3-isopropylmalate via the intermediate 2-isopropylmaleate,
      a crucial step in leucine biosynthesis. Some members also display broader substrate
      specificity, functioning in the biosynthesis of coenzyme B by catalyzing the
      dehydration of (R)-homocitrate to cis-homoaconitate and its hydration to homoisocitrate.
      Additionally, they can hydrate maleate to (R)-malate and are involved in isoleucine
      biosynthesis by isomerizing 2-methylmalate and 3-methylmalate. This family plays
      a key role in central metabolic pathways and is essential for the production
      of important biomolecules.
