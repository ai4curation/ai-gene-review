  name:
    name: RNase regulators and metabolic aldolases
    short: RNase_reg/Metab_aldolases
  description:
  - text: This family of proteins includes regulators of ribonuclease activity and
      putative aldolases. The regulators modulate RNA abundance by interacting with
      RNase E, influencing its endonucleolytic activity and altering the composition
      of the degradosome, which affects RNA-binding and helicase activities. The putative
      aldolases are involved in metabolic processes, catalyzing the cleavage of 4-hydroxy-4-methyl-2-oxoglutarate
      into pyruvate and possessing secondary oxaloacetate decarboxylase activity.
      Some members also contribute to the degradation of lignin in the bacterial protocatechuate
      4,5-cleavage pathway, converting specific substrates to pyruvate and oxaloacetate.
      The family displays a broad substrate specificity and includes enzymes that
      are competitively inhibited by oxalate, a pyruvate enolate analog.
