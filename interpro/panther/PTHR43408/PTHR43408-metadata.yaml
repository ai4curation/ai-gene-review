  name:
    name: NAD(P)H-dependent FMN reductase
    short: NAD(P)H-dep_FMN_reductase
  description:
  - text: This family of proteins includes NAD(P)H-dependent flavin mononucleotide
      (FMN) reductases that are involved in various biological processes, including
      the degradation of dimethyl sulfide and tryptophan. Members of this family catalyze
      the reduction of FMN to FMNH2, using NADH or NADPH as electron donors. Some
      proteins within this family are also capable of reducing FAD to FADH2. These
      reductases are implicated in the formation of two-component reduced FMN-dependent
      monooxygenase systems, which are essential for the metabolism of specific sulfonates
      and amino acids such as methionine. The activity of these enzymes is crucial
      for certain bacterial growth pathways and degradation processes.
