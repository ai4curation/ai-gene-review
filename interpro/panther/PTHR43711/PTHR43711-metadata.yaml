  name:
    name: Sensor Histidine Kinase Regulatory
    short: Sensor_HK_Regulatory
  description:
  - text: The protein family is involved in various regulatory systems, primarily
      functioning as sensor histidine kinases in two-component signal transduction
      pathways. These proteins play key roles in adapting to environmental changes,
      controlling cell division and differentiation, and regulating circadian rhythms
      in cyanobacteria. They autophosphorylate in response to specific stimuli and
      transfer the phosphate to response regulators, modulating gene expression and
      cellular processes. Some members are involved in osmosensing, virulence, and
      photosystem regulation. The family includes proteins that localize to specific
      cell poles to guide cell division and proteins that form complexes with other
      circadian rhythm regulators, contributing to the robustness of circadian gene
      expression and adaptation to light/dark cycles.
