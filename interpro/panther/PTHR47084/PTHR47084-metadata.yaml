  name:
    name: Serine palmitoyltransferase small subunit
    short: SPT_small_subunit
  description:
  - text: This family of proteins is involved in the biosynthesis of sphingolipids,
      which are essential components of cell membranes and play a role in signal transduction
      and cell recognition. Members of this family function as part of a multisubunit
      enzyme complex known as serine palmitoyltransferase (SPT). This complex catalyzes
      the condensation of L-serine with activated acyl-CoA, typically palmitoyl-CoA,
      to form long-chain base precursors of sphingolipids. The catalytic core of the
      complex consists of a heterodimer formed by SPTLC1 and either SPTLC2 or SPTLC3.
      Proteins in this family enhance the catalytic activity of the complex and contribute
      to substrate specificity. The composition of the complex influences its preference
      for specific acyl-CoA substrates. Additionally, members of this family may have
      a role in localizing certain enzymes to the mitochondria-associated membranes,
      impacting the incorporation of fatty acids into specific phospholipids.
