  name:
    name: Malate:quinone oxidoreductase/L-2-hydroxyglutarate dehydrogenase
    short: MQO/L2HGDH
  description:
  - text: The MQO family proteins are involved in the citric acid cycle, catalyzing
      the oxidation of malate to oxaloacetate while reducing quinone to quinol. This
      reaction is an essential step in the energy production pathway, linking the
      citric acid cycle with the electron transport chain. Additionally, the L2HGDH
      family proteins catalyze the dehydrogenation of L-2-hydroxyglutarate to alpha-ketoglutarate,
      potentially coupling with the respiratory chain by feeding electrons into the
      membrane quinone pool. This activity is part of a degradation pathway for L-lysine.
      Some members of the L2HGDH family also show oxidase activity on L-2-hydroxyglutarate
      in vitro, although this may not be a physiological function.
