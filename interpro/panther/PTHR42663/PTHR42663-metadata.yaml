  name:
    name: Coenzyme PQQ synthesis protein B
    short: PqqB
  description:
  - text: The PqqB family proteins are implicated in the transport of coenzyme PQQ
      or its precursor to the periplasm. PQQ, also known as pyrroloquinoline quinone,
      is a redox cofactor utilized by some bacteria in enzymes that catalyze redox
      reactions. While not absolutely required for PQQ biosynthesis, members of the
      PqqB family are associated with the biosynthetic process, potentially facilitating
      the availability of PQQ in the periplasmic space where it may be incorporated
      into apoenzymes or participate in other cellular processes.
