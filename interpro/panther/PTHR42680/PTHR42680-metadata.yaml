  name:
    name: dCTP deaminase
    short: dCTP_deaminase
  description:
  - text: The dCTP deaminase family comprises enzymes that play a crucial role in
      nucleotide metabolism. Members of this family are responsible for the deamination
      of dCTP to dUTP, an essential step in the nucleotide salvage pathway that prevents
      the incorporation of uracil into DNA. Some members are bifunctional enzymes,
      also catalyzing the hydrolysis of dUTP to dUMP, thus preventing the accumulation
      of toxic dUTP and ensuring the availability of dUMP for thymidine nucleotide
      synthesis. Additionally, certain members of the family have dUTPase activity,
      further contributing to nucleotide pool balance and DNA integrity. The family
      includes both monofunctional dCTP deaminases and bifunctional enzymes with combined
      dCTP deaminase and dUTP diphosphatase activities. Regulation of these enzymes
      is critical, with dTTP known to inhibit some family members, highlighting a
      feedback mechanism to control dTTP levels within the cell.
