  name:
    name: tRNA Threonylcarbamoyladenosine Biosynthesis and Sugar Kinase
    short: tRNA_TsaE/AmgK_kinase
  description:
  - text: The TsaE family proteins are involved in the biosynthesis of threonylcarbamoyladenosine
      (t6A), a modification present at position 37 of certain tRNAs that read codons
      beginning with adenine. These proteins play a role in the transfer of the threonylcarbamoyl
      moiety from threonylcarbamoyl-AMP (TC-AMP) to the N6 group of A37 in tRNAs,
      in conjunction with TsaD and TsaB. TsaE is thought to have an indirect role
      in the t6A biosynthesis pathway, potentially regulating the core enzymatic function
      of TsaD. Additionally, TsaE exhibits ATPase activity in vitro. The AmgK family
      proteins are sugar kinases that catalyze the ATP-dependent phosphorylation of
      N-acetylmuramate (MurNAc) and N-acetylglucosamine (GlcNAc), leading to the formation
      of MurNAc alpha-1P and GlcNAc alpha-1P, respectively. These proteins are implicated
      in peptidoglycan recycling, bypassing the de novo biosynthesis of the peptidoglycan
      precursor UDP-MurNAc, and contribute to intrinsic resistance to fosfomycin.
