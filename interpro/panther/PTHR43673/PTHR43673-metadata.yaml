  name:
    name: Nitroreductase
    short: Nitroreductase
  description:
  - text: The nitroreductase family is involved in various biological processes, including
      the detoxification of nitroaromatic compounds, such as herbicides and antibiotics,
      by reducing their nitro groups. Members of the family utilize NADPH or NADH
      as electron donors to reduce these compounds, which can result in the formation
      of toxic intermediates like superoxide anions. Some family members are also
      implicated in the biodegradation of chlorinated nitroaromatic compounds and
      the biosynthesis of antibacterial peptides and conjugated fatty acids. The family
      includes enzymes capable of electron transfer to various acceptors, contributing
      to metabolic pathways that affect human health by altering lipid metabolism.
