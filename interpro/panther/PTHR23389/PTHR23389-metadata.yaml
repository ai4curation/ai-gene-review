  name:
    name: NAD-dependent DNA ligase
    short: NAD_DNA_ligase
  description:
  - text: NAD-dependent DNA ligases are enzymes that play a crucial role in DNA replication
      and repair. They catalyze the formation of phosphodiester linkages between the
      5'-phosphoryl and 3'-hydroxyl groups in double-stranded DNA. This reaction uses
      NAD as a coenzyme and as the energy source. These ligases are essential for
      joining Okazaki fragments during lagging-strand synthesis and for sealing nicks
      that can arise during DNA replication, recombination, and repair. Their function
      is critical for maintaining genome integrity and ensuring the proper transmission
      of genetic information from one generation to the next.
