  name:
    name: Phosphoribosylglycinamide formyltransferase
    short: GART
  description:
  - text: This family of proteins catalyzes the transfer of a formyl group from 10-formyltetrahydrofolate
      to 5-phospho-ribosyl-glycinamide, resulting in the production of 5-phospho-ribosyl-N-formylglycinamide
      and tetrahydrofolate. This reaction is a critical step in the purine biosynthetic
      pathway, which is essential for the synthesis of the purine nucleotides required
      for DNA and RNA. Members of this family are inhibited by certain folate analogs,
      indicating a potential for regulation by folate derivatives or antifolate drugs.
