  name:
    name: Major Facilitator Superfamily Efflux Transporters
    short: MFS_Efflux_Transporters
  description:
  - text: The Major Facilitator Superfamily (MFS) Efflux Transporters family is involved
      in the active transport of a variety of substrates across cellular membranes.
      Members of this family play crucial roles in the efflux of diverse compounds,
      including purine ribonucleosides (such as inosine and guanosine), sugars, and
      antibiotics like chloramphenicol. The transporters contribute to various physiological
      functions, such as maintaining intracellular concentration of sugars, conferring
      resistance to toxic compounds, and protecting cells against toxic purine base
      analogs. Some family members are implicated in quinolone resistance, functioning
      as efflux pumps for hydrophilic quinolones. The family belongs to the major
      facilitator superfamily and includes several subfamilies, such as NepI, MdtL,
      SotB, and PbuE, each with specific substrate preferences and roles in bacterial
      metabolism and defense mechanisms.
