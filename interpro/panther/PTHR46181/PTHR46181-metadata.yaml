  name:
    name: Mitochondrial Glycine Transporter
    short: Mito_Glycine_Transporter
  description:
  - text: The mitochondrial glycine transporter family is responsible for the import
      of glycine into the mitochondrial matrix, a critical step in heme biosynthesis.
      Glycine combines with succinyl-CoA to produce 5-aminolevulinate (ALA), the first
      compound in the pathway leading to heme production. This process is essential
      during erythropoiesis, the creation of red blood cells. Some members of the
      family may also have a pro-apoptotic role, inducing caspase-dependent apoptosis.
      The family is part of the mitochondrial carrier family, specifically the SLC25A38
      subfamily, which facilitates the transport of various metabolites across the
      inner mitochondrial membrane.
