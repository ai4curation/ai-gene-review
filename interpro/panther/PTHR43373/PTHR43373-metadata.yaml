  name:
    name: CPA3 Na+/H+ Antiporter Subunit A
    short: CPA3_Na-H_Antiporter_A
  description:
  - text: This family of proteins includes antiporters that are primarily involved
      in the exchange of sodium (Na+) and hydrogen (H+) ions across the cell membrane.
      These antiporters contribute to the maintenance of cellular ion homeostasis,
      pH regulation, and adaptation to high sodium environments. They utilize the
      electrochemical gradient to drive the transport of Na+ out of the cell in exchange
      for H+ ions, which is inferred to be an electrogenic process. The family members
      are characterized by their inability to transport other cations such as potassium
      (K+), calcium (Ca2+), or magnesium (Mg2+). Some proteins in this family are
      also implicated in the excretion of lithium (Li+) ions and may have a role in
      the resistance to high sodium conditions. Additionally, certain members are
      sensitive to inhibitors like carbonyl cyanide m-chlorophenylhydrazone (CCCP),
      which can completely inhibit Na+ extrusion.
