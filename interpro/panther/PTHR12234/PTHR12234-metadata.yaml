  name:
    name: Formiminotransferase-cyclodeaminase
    short: FTCD
  description:
  - text: This family of proteins includes enzymes that are involved in folate metabolism,
      specifically in the transfer of one-carbon units. Members of this family exhibit
      formiminotransferase activity, catalyzing the transfer of formyl and formimino
      groups to tetrahydrofolate (THF), producing different forms of folate such as
      5-formyltetrahydrofolate and 5-formiminotetrahydrofolate. Some proteins within
      this family also display cyclodeaminase activity, contributing to the conversion
      of these folate derivatives further within the folate cycle. Additionally, certain
      members are implicated in cytoskeletal interactions, particularly in the bundling
      of vimentin filaments. This dual functionality suggests a role in both metabolic
      processes and cellular structure maintenance.
