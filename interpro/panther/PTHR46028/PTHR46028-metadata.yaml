  name:
    name: Kynurenine 3-monooxygenase
    short: KMO
  description:
  - text: The Kynurenine 3-monooxygenase (KMO) family consists of enzymes that play
      a crucial role in the kynurenine pathway of tryptophan degradation. Members
      of the KMO family are responsible for the hydroxylation of L-kynurenine to 3-hydroxy-L-kynurenine,
      an essential step in the production of quinolinic acid. Quinolinic acid is a
      neurotoxic NMDA receptor antagonist that can influence NMDA receptor signaling,
      impacting processes such as axonal targeting, synaptogenesis, apoptosis in brain
      development, and functioning in various cell types including pancreatic beta
      cells, osteoblasts, myocardial cells, and the gastrointestinal tract. The KMO
      family belongs to the broader aromatic-ring hydroxylase family and is characterized
      by the presence of transmembrane domains essential for enzymatic activity. Some
      members are also known to be inhibited by pyridoxal phosphate and chloride ions.
