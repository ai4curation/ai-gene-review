  name:
    name: Methylmalonyl-CoA/ethylmalonyl-CoA epimerase
    short: MMCE/EMCE_epimerase
  description:
  - text: This family of proteins includes enzymes that are primarily involved in
      the metabolism of propionyl-CoA and related compounds. Members of this family
      function as epimerases, catalyzing the reversible epimerization of methylmalonyl-CoA
      to its isomer. This reaction is a critical step in the degradation pathway of
      certain amino acids, odd-chain fatty acids, and cholesterol side chains, which
      converge into the propionyl-CoA metabolism. Some members exhibit promiscuity,
      also catalyzing the epimerization of ethylmalonyl-CoA, thereby participating
      in the ethylmalonyl-CoA pathway for acetyl-CoA assimilation in specific organisms.
      The family also includes proteins with a broader substrate range, such as those
      involved in the biosynthesis of secondary metabolites like cetoniacytone A.
