  name:
    name: 'MurCDEF Family: Cell Wall and Coenzyme F430 Synthesis'
    short: MurCDEF_CellWall_CoF430Synth
  description:
  - text: The MurCDEF family is involved in essential biological processes, including
      cell wall formation and methanogenesis. Members of the MurF subfamily, such
      as UDP-N-acetylmuramoyl-tripeptide--D-alanyl-D-alanine ligases, catalyze the
      final step in the synthesis of UDP-N-acetylmuramoyl-pentapeptide, a precursor
      of murein, which is crucial for bacterial cell wall integrity. These enzymes
      add D-alanyl-D-alanine to UDP-MurNAc-L-alanyl-gamma-D-glutamyl-L-lysine, and
      some can also utilize UDP-MurNAc-tripeptide containing mesodiaminopimelic acid.
      Additionally, MurF enzymes can influence the expression of antibiotic resistance
      and may play a role in cell division control. Another member, Coenzyme F(430)
      synthetase, is involved in the biosynthesis of coenzyme F430, a nickel-containing
      tetrapyrrole that is the prosthetic group of methyl-coenzyme M reductase, central
      to methanogenesis and anaerobic methane oxidation. This enzyme activates the
      g-propionate side chain of seco-F430 for intramolecular C-C bond formation,
      creating the carbocyclic F ring of coenzyme F430.
