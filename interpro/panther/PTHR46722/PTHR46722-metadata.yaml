  description:
  - text: This family of proteins is involved in the mitochondrial import machinery,
      specifically in the assembly and stability of the TOM complex. Members act as
      positive regulators of PRKN translocation to damaged mitochondria, likely by
      stabilizing PINK1 on the outer membrane of depolarized mitochondria, thus playing
      a role in mitochondrial quality control.
