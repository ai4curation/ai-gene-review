  name:
    name: Non-receptor tyrosine kinases involved in cell signaling
    short: Non-receptor_tyrosine_kinases
  description:
  - text: This family of proteins includes non-receptor tyrosine kinases that play
      crucial roles in various cellular processes. They are involved in signal transduction
      pathways that regulate immune responses, cell growth, survival, differentiation,
      cytoskeletal remodeling, cell adhesion, and migration. These proteins are activated
      by cell surface receptors and are essential for both innate and adaptive immunity.
      They also participate in the regulation of B-cell and T-cell receptor signaling,
      contributing to the development and function of lymphocytes. Additionally, they
      mediate responses to growth factors, cytokines, and environmental stresses,
      influencing processes like platelet activation, vascular development, and osteoclast
      maturation.
