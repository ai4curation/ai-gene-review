  name:
    name: GMC-type Oxidoreductase
    short: GMC_oxidoreductase
  description:
  - text: This family of proteins includes oxidoreductases that participate in various
      oxidation-reduction processes. Members are involved in the conversion of D-gluconate
      to 2-dehydro-D-gluconate and the omega-oxidation pathway of lipid degradation,
      functioning as long-chain fatty alcohol oxidases. Some proteins within this
      family are characterized by a C-terminal domain necessary for enzymatic activity,
      indicating a conserved region essential for function. The family belongs to
      the broader GMC oxidoreductase family, which is known for its diverse roles
      in carbohydrate, alcohol, and lipid metabolism.
