  name:
    name: Aspartate/asparagine--tRNA ligase
    short: Asp/Asn_tRNA_ligase
  description:
  - text: The aspartyl-tRNA synthetase family is responsible for the attachment of
      aspartate to its cognate tRNA in a two-step reaction. Initially, L-aspartate
      is activated by ATP to form Asp-AMP, which is then transferred to the acceptor
      end of tRNA(Asp). Some members of the family exhibit relaxed tRNA specificity,
      being capable of aspartylating not only tRNA(Asp) but also tRNA(Asn). This reaction
      is crucial for translating genetic information into functional proteins, as
      it ensures the correct incorporation of aspartate into the growing polypeptide
      chain during protein synthesis. The family includes both cytoplasmic and mitochondrial
      enzymes, highlighting its essential role in different cellular compartments.
      Additionally, some asparaginyl-tRNA synthetases are involved in signaling pathways,
      such as inducing migration of CCR3-expressing cells, and play a key role in
      the development of the cerebral cortex by regulating the proliferation of radial
      glial cells.
