  name:
    name: UDP-glycosyltransferase
    short: UDP-glycosyltransferase
  description:
  - text: The UDP-glycosyltransferase family is involved in the modification of a
      wide range of substrates through the transfer of sugar moieties from activated
      nucleotide sugars to acceptor molecules, which include flavonoids, hormones,
      and various secondary metabolites. Members of the family exhibit specificity
      for different substrates and positions on those substrates, contributing to
      the diversity of glycosylated products. These modifications often alter the
      solubility, stability, and biological activity of the compounds, playing crucial
      roles in plant metabolism, including defense mechanisms, stress responses, and
      developmental processes. Some members are also implicated in the detoxification
      of xenobiotics and the biosynthesis of bioactive compounds with medicinal properties.
