  name:
    name: AB hydrolase superfamily Lipase
    short: AB_hydrolase_Lipase
  description:
  - text: The AB hydrolase superfamily Lipase family is involved in the extracellular
      metabolism of plasma lipoproteins, mainly synthesized in the liver and secreted
      into plasma. The family's enzymes convert cholesterol and phosphatidylcholines
      to cholesteryl esters and lysophosphatidylcholines on lipoprotein surfaces,
      facilitating cholesterol transport back to the liver. Some members also play
      roles in the brain, esterifying cholesterol on nascent lipoproteins, influencing
      cerebral spinal fluid levels of lipoproteins, and contributing to the maturation
      of glial-derived lipoproteins. Additionally, the family includes enzymes with
      phospholipase and O-acyltransferase activities, involved in glycerophospholipid
      homeostasis and remodeling of acyl groups in acidic compartments. They hydrolyze
      and transfer fatty acyl groups within phospholipids and to lipophilic alcohols,
      participating in detoxification of oxidized phospholipids and normal phospholipid
      degradation.
