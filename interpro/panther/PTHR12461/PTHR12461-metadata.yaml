  name:
    name: JmjC domain-containing protein and tRNA modification enzymes
    short: JmjC_domain/TRNA_mod_enzymes
  description:
  - text: This family of proteins includes enzymes with diverse roles in epigenetic
      regulation and post-translational modification of proteins. Members are characterized
      by the presence of a JmjC domain, which confers histone demethylase activity,
      targeting specific lysine residues on histones to modulate chromatin structure
      and gene expression. Some family members are involved in the biosynthesis of
      wybutosine, a modified guanosine found in phenylalanine tRNA, which is essential
      for accurate protein synthesis. Others have bifunctional roles, acting both
      as peptidases and hydroxylases, affecting histone tails and non-histone proteins,
      influencing processes such as cell cycle progression, DNA damage response, and
      circadian rhythm regulation. Additionally, some proteins in this family are
      implicated in cellular stress responses and oxygen sensing, with functions that
      include hydroxylation of specific residues in hypoxia-inducible factors and
      other substrates.
