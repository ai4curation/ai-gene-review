  name:
    name: Lysine--tRNA ligase
    short: Lysyl-tRNA_synthetase
  description:
  - text: This family of proteins is involved in the specific attachment of lysine
      to its cognate tRNA, a critical step in protein synthesis. Members of this family
      are known as lysine--tRNA ligases or aminoacyl-tRNA synthetases. They catalyze
      a two-step reaction where lysine is first activated by ATP to form a lysyl-adenylate
      intermediate and then transferred to the acceptor end of the tRNA. Some members
      also have additional functions, such as the synthesis of diadenosine tetraphosphate
      (Ap4A), a signaling molecule that can modulate stress responses, and the post-translational
      modification of translation elongation factor P (EF-P).
