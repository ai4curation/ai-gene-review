  name:
    name: PIF1 DNA helicase
    short: PIF1_helicase
  description:
  - text: The PIF1 helicase family is characterized by DNA-dependent ATPase and 5'-3'
      DNA helicase activities that are essential for maintaining mitochondrial and
      nuclear genome stability. Members of the family are adept at unwinding G-quadruplex
      (G4) DNA structures and forked RNA-DNA hybrids, which is crucial for preventing
      replication pausing and double-strand breaks at G4 motifs. The family plays
      a significant role in telomeric DNA maintenance by inhibiting telomere elongation
      and the action of telomerase, as well as resolving telomerase RNA/telomeric
      DNA hybrids. Some members are also involved in ribosomal DNA maintenance, Okazaki
      fragment processing, and may contribute to chromosomal replication. The PIF1
      helicase family is found across a range of organisms, indicating a conserved
      function in genome integrity.
