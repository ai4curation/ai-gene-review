  name:
    name: RMT2/GAMT Methyltransferase
    short: RMT2/GAMT_Mtase
  description:
  - text: The RMT2 methyltransferase family comprises enzymes that utilize S-adenosyl-L-methionine
      (SAM) to methylate arginine residues in target proteins, forming N5-methylarginine.
      This modification plays a critical role in the regulation of protein function
      and RNA processing. Members of this family are also involved in the conversion
      of guanidinoacetate to creatine, a process essential for energy storage in muscle
      and nerve tissues. The family is part of the class I-like SAM-binding methyltransferase
      superfamily, indicating a shared mechanism for SAM-dependent methylation across
      diverse biological contexts.
