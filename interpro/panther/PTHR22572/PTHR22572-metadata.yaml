  name:
    name: Mannose-1-phosphate guanyltransferase
    short: Mannose-1P_guanyltransferase
  description:
  - text: The Mannose-1-phosphate guanyltransferase family is involved in several
      critical cellular processes across various organisms. Members of this family
      primarily catalyze the formation of GDP-mannose from mannose-1-phosphate and
      GTP, which is an essential precursor for the glycosylation of glycoproteins
      and glycolipids. This reaction is pivotal in cell wall synthesis, particularly
      in fungi where it is necessary for cell cycle progression and maintaining the
      cell-size checkpoint. In plants, some family members participate in the Smirnoff-Wheeler
      pathway, which is the major route to ascorbate biosynthesis, a process crucial
      for plant growth, development, and antioxidant production. Additionally, in
      certain species, the alpha subunit may serve as a regulatory component, allowing
      for allosteric feedback inhibition by GDP-mannose to finely tune the enzymatic
      activity of the beta subunit.
