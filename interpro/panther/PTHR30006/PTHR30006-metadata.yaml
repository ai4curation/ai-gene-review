  name:
    name: Bacterial solute-binding protein 1
    short: Bact_solute-bd_prot1
  description:
  - text: The bacterial solute-binding protein 1 family is involved in the import
      and transport of various substrates across the cell membrane through ABC transporter
      complexes. Members of the family are predominantly periplasmic proteins that
      bind specific ligands with high affinity, which can include iron ions, thiamine,
      2-aminoethylphosphonate, gamma-aminobutyric acid (GABA), and potentially other
      substrates. Some family members play a protective role in photosynthesis by
      guarding the acceptor side of photosystem II against oxidative damage under
      iron-limiting conditions. Others are implicated in the import of thiamine and
      its derivatives or in the transport of ferric iron, contributing to the bacterial
      iron-acquisition system. The diversity of substrates indicates a broad functional
      spectrum within this family, reflecting the adaptability and specificity of
      bacterial ABC transporter systems.
