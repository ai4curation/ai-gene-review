  name:
    name: Bacterial polysaccharide biosynthesis and export
    short: Bact_polysacc_biosynth/exp
  description:
  - text: The protein family is involved in the biosynthesis, regulation, and export
      of capsular and extracellular polysaccharides, which are critical for bacterial
      virulence and survival. Members of the family function as tyrosine-protein kinases
      that autophosphorylate, regulating their activity and the biosynthesis of polysaccharides.
      Some proteins act as chain-length determinants for lipopolysaccharides, modulating
      the length of polysaccharide chains. Others form ATP-driven export apparatuses,
      working in conjunction with additional proteins to translocate capsular polysaccharides
      across the inner membrane. The family also includes proteins required for the
      phosphorylation of tyrosine-protein kinases involved in capsular polysaccharide
      biosynthesis, suggesting a complex that coordinates polymerization and export
      to the cell surface.
