  name:
    name: Hydroxymethylglutaryl-CoA Synthase
    short: HMG-CoA_synthase
  description:
  - text: The HMG-CoA synthase family proteins are involved in various biosynthetic
      pathways, including cholesterol, ketone bodies, ergosterol, and certain polyketides.
      They catalyze the condensation of acetyl-CoA with acetoacetyl-CoA to form 3-hydroxy-3-methylglutaryl-CoA
      (HMG-CoA). This step is crucial in the mevalonate pathway for the production
      of isoprenoids and sterols, such as cholesterol in animals and ergosterol in
      fungi. Some family members are also implicated in the biosynthesis of host-selective
      toxins and siderophores, which contribute to organismal virulence. The family
      includes both cytoplasmic and mitochondrial forms, with the latter being key
      in ketogenesis. Members of the family are characterized by their membership
      in the thiolase-like superfamily and are subject to regulation by feedback inhibition
      and sensitivity to certain inhibitors, indicating their critical role in cellular
      metabolism.
