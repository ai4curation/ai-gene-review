  name:
    name: Stomatal Development and Plant Interaction Regulator
    short: StomDev_PlantInt_Reg
  description:
  - text: This family of proteins is involved in diverse biological processes including
      development and interaction with symbiotic organisms. Members of this family
      play a crucial role in stomatal development, influencing cell fate progression,
      orientation of spacing divisions, and promoting asymmetric divisions in plant
      tissues. They are essential for the transition of meristemoids into guard mother
      cells and for regulating gene expression in differentiating cells. These proteins
      also form complexes with receptor kinases and are involved in the recognition
      of regulatory peptides, modulating ligand-receptor activity in developmental
      pathways. Additionally, some family members are implicated in growth promotion
      and seed production when interacting with endophytic fungi, suggesting a role
      in plant-microbe interactions.
