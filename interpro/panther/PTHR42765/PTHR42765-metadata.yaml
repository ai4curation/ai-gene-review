  name:
    name: Isoleucine--tRNA ligase
    short: Ile-tRNA_ligase
  description:
  - text: 'Isoleucine--tRNA ligase enzymes are responsible for the attachment of isoleucine
      to its corresponding tRNA molecule during protein synthesis. This process is
      crucial for the accurate translation of the genetic code into functional proteins.
      Isoleucine--tRNA ligases have two distinct active sites: one for aminoacylation
      and one for editing. The editing function is particularly important as it ensures
      the correct amino acid is attached to the tRNA, preventing errors that could
      result in dysfunctional proteins. The enzymes can inadvertently accommodate
      and process amino acids similar to isoleucine, such as valine. To avoid such
      errors, they possess two distinct tRNA(Ile)-dependent editing activities: ''pretransfer''
      editing, which involves the hydrolysis of activated Val-AMP, and ''posttransfer''
      editing, which involves the deacylation of mischarged Val-tRNA(Ile). These editing
      activities are essential for maintaining the fidelity of protein synthesis.'
