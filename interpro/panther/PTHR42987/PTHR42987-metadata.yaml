  description:
  - text: The peptidase S49 family comprises proteases with diverse functions, including
      the digestion of cleaved signal peptides and the suppression of certain null
      phenotypes in bacteria. Members of the family may also be involved in the export
      of periplasmic flagella proteins and have a preference for leucine-rich substrate
      peptides. While some members are characterized as probable or putative proteases,
      their exact biological roles may vary. The family is unified by a similarity
      in sequence and structure, indicative of a shared evolutionary origin and potentially
      common mechanistic features in their proteolytic activity.
