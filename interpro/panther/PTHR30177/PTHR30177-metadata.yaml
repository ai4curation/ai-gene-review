  name:
    name: ABC transporter permease/solute-binding domain-containing protein
    short: ABC_transp_perm/SBD
  description:
  - text: This family of proteins is involved in the transport of various osmoprotectants
      and nutrients across cellular membranes. They are part of ABC transporter complexes
      and are responsible for the translocation of substrates such as ergothioneine,
      a thiol antioxidant, as well as glycine betaine, carnitine, and choline, which
      are involved in osmoprotection and cryoprotection. These proteins typically
      contain fused transmembrane domains and solute-binding domains, which undergo
      conformational changes upon substrate binding. Some members exhibit specificity
      for certain substrates, while others can transport multiple types of molecules.
