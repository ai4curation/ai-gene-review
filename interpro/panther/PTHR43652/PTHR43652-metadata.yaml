  name:
    name: Divalent Anion Sodium Symporter-Related Transporters
    short: DASS-Related_Transporters
  description:
  - text: This family of proteins includes transporters involved in the translocation
      of various substrates across biological membranes. Members of this family are
      primarily associated with the transport of anions such as sulfate, as indicated
      by the presence of sodium/sulfate cotransporters that exhibit varying affinities
      for sulfate. These cotransporters are part of the divalent anion:Na+ symporter
      (DASS) superfamily, suggesting a role in the electrogenic symport of sulfate
      ions in exchange for sodium ions. Additionally, some members are implicated
      in the transport of basic amino acids and may influence metabolic pathways such
      as the glyoxylate shunt. Other proteins within the family are uncharacterized
      but are related to known transporters, hinting at potential roles in cellular
      responses to nutrient availability or environmental stress.
