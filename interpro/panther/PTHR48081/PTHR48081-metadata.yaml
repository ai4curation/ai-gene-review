  name:
    name: '''GDXG'' lipolytic enzyme'
    short: GDXG_lipolytic_enzyme
  description:
  - text: The 'GDXG' lipolytic enzyme family is characterized by a conserved GDXG
      motif and includes proteins with esterase and lipase activities. Members of
      this family are involved in the hydrolysis of short-chain fatty esters, with
      specificity generally towards acyl chain lengths of up to 8 carbons. They can
      hydrolyze substrates such as triacetylglycerol and tributyrylglycerol, but typically
      not trioleylglycerol or cholesterol oleate. Some family members also exhibit
      regulatory functions, such as antagonizing maltotriose binding to negatively
      regulate MalT activity or inhibiting MelA galactosidase activity. Additionally,
      certain enzymes within this family contribute to the degradation of plant cell
      wall polysaccharides, tryptophan metabolism via the kynurenine pathway, and
      the regulation of sterol deacetylation. The family also includes proteins involved
      in the biosynthesis of natural products with cholesterol-lowering activity,
      the maintenance of mycobacterial cell envelope permeability, and the detoxification
      of organophosphorus compounds.
