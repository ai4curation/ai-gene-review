  name:
    name: Plant LRR receptor-like serine/threonine-protein kinases
    short: Plant_LRR-RLKs
  description:
  - text: The LRR receptor kinase family is involved in a variety of plant physiological
      processes including defense responses to pathogens, brassinosteroid signaling,
      and regulation of plant growth and development. Members of the family act as
      dual specificity kinases, phosphorylating serine/threonine and tyrosine residues.
      They play roles in innate immunity, programmed cell death control, and perception
      of small peptides and hormones. Some members function as coreceptors, forming
      complexes with other receptor kinases to mediate signal transduction. The family
      also includes kinases that regulate cell division and organ development, and
      those that respond to abiotic stresses like salt and drought.
