  name:
    name: Endolytic peptidoglycan transglycosylase RlpA
    short: RlpA
  description:
  - text: The RlpA family proteins are characterized as endolytic peptidoglycan transglycosylases
      with a distinct preference for cleaving glycan strands that are devoid of stem
      peptides. These enzymes play a crucial role in bacterial cell wall metabolism
      by facilitating the turnover and remodeling of peptidoglycan, which is essential
      for cell growth, division, and maintenance of cell shape. Some members of the
      RlpA family are known to possess a SPOR domain that specifically binds septal
      peptidoglycan, targeting the enzyme to the septal ring during cell division.
      This domain is vital for the correct localization of the protein but is not
      necessary for the enzymatic activity related to cell division or the maintenance
      of rod shape in bacteria.
