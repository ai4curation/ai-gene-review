  name:
    name: Amidophosphoribosyltransferase
    short: Amidophos_ribosyltransf
  description:
  - text: The Amidophosphoribosyltransferase family is involved in the first committed
      step of 'de novo' purine biosynthesis. Members of this family catalyze the formation
      of phosphoribosylamine from phosphoribosylpyrophosphate (PRPP) and glutamine.
      This reaction is a key regulatory point in the purine biosynthesis pathway.
      The activity of these enzymes is typically subject to allosteric regulation
      and is inhibited by the end products of the pathway, such as purine nucleotides.
      Some family members can also use ammonia in place of glutamine for the reaction.
      The family is essential for cellular metabolism, as purine nucleotides are required
      for DNA and RNA synthesis, energy transfer, and signal transduction.
