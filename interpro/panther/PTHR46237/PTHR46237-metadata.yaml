  name:
    name: Cytochrome b5/Flavoprotein Reductase
    short: Cytochrome_b5/Flavoprotein_Rdt
  description:
  - text: This family of proteins includes various members that are involved in electron
      transfer processes, particularly associated with the cytochrome b5 and flavoprotein
      pyridine nucleotide cytochrome reductase systems. They play roles in metabolic
      pathways such as the endoplasmic reticulum stress response pathway and protection
      against oxidative stress by reducing reactive oxygen species. Some members are
      involved in the biosynthesis of complex molecules, like the cyclic tetrapeptide
      apicidin F, and may also contribute to genomic integrity. Functions include
      NADH-cytochrome b5 reductase activity, involvement in lateral root formation,
      and resistance to certain platinum-based compounds.
