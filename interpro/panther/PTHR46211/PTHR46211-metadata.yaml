  name:
    name: Glycerophosphoryl Diester Phosphodiesterase
    short: GlyceroPDE
  description:
  - text: The glycerophosphoryl diester phosphodiesterase family is characterized
      by its ability to hydrolyze glycerophosphodiesters into glycerol-3-phosphate
      and the corresponding alcohol. Members of the family are involved in various
      biological processes, including wall teichoic acid metabolism during phosphate
      starvation, where they catalyze the degradation of wall teichoic acid to utilize
      it as a phosphate reserve. Some family members exhibit selectivity for poly(glycerol
      phosphate) and can cleave exolytic monomer units. Additionally, certain enzymes
      within this family can degrade environmental and industrial chemical additives
      such as diphenyl phosphate, indicating a broader substrate specificity. The
      activity of these enzymes is known to be inhibited by EDTA and organic solvents.
