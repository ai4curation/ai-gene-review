  name:
    name: Immune receptor domain-containing protein
    short: Immune_rcpt_domain
  description:
  - text: This family of proteins is involved in immune system processes, including
      the innate and adaptive immune responses. Members act as cell surface receptors
      that can enhance T-cell activation, regulate Toll-like receptor signaling, and
      mediate cytokine production. Some proteins in the family are implicated in the
      regulation of macrophage and dendritic cell activation, as well as in the phagocytosis
      of apoptotic cells and cellular debris. They may also participate in antigen
      presentation and the anti-viral response. Additionally, certain family members
      are involved in the regulation of microglial functions, such as proliferation,
      migration, phagocytosis, and the response to oxidative stress, which are crucial
      for brain homeostasis and the immune response in the central nervous system.
