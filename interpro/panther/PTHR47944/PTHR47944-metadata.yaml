  name:
    name: Plant Cytochrome P450 Monooxygenases
    short: Plant_CYP450_Monoox
  description:
  - text: The Cytochrome P450 family is involved in diverse and essential biosynthetic
      processes across various organisms. Members of this family are heme-containing
      enzymes that catalyze a wide range of monooxygenation/hydroxylation reactions.
      They play crucial roles in the metabolism of a variety of substrates, including
      drugs, toxins, and endogenous compounds. In plants, they are key enzymes in
      the biosynthesis of secondary metabolites such as flavonoids, alkaloids, and
      terpenoids. These metabolites are important for plant defense, pigmentation,
      and interaction with other organisms. Specific functions include the hydroxylation
      of flavonoids, conversion of matairesinol to pluviatolide, biosynthesis of lignin
      monomers, and formation of volatile terpenes. The family also contributes to
      the production of chemotherapeutic compounds, anticancer agents, and attractants
      for herbivores' predators and parasitoids.
