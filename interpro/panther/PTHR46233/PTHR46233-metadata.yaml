  name:
    name: Metallo-Beta-Lactamase Glyoxalase II
    short: MBL_Glyoxalase_II
  description:
  - text: The Glyoxalase II family, part of the metallo-beta-lactamase superfamily,
      includes proteins involved in the detoxification of methylglyoxal (MG), a cytotoxic
      byproduct of glycolysis. Members of the family, such as hydroxyacylglutathione
      hydrolases, catalyze the hydrolysis of (R)-S-lactoylglutathione to (R)-lactate
      and glutathione, playing a role in cellular defense against oxidative stress.
      Some proteins within the family may also participate in secondary metabolism,
      such as the synthesis of antibiotic polyketides. The family's enzymatic activity
      can be regulated by metal ions, with some isozymes being inhibited by Cu(2+).
