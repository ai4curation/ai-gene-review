  name:
    name: Aldehyde Dehydrogenase
    short: Aldehyde_DH
  description:
  - text: The aldehyde dehydrogenase family is involved in the oxidation of aldehydes
      to their corresponding carboxylic acids using NAD(+) as a cofactor. Members
      of this family play a role in various metabolic processes, including the degradation
      of alcohols, the detoxification of aldehydes produced during metabolism, and
      the catabolism of aromatic compounds. Specific enzymes within the family are
      involved in distinct pathways, such as the nicotine degradation pathway, where
      they convert 3-succinoylsemialdehyde-pyridine to 3-succinoyl-pyridine, and the
      degradation of monoterpenes like beta-myrcene and limonene, where they oxidize
      geranial to geranic acid and convert perillyl aldehyde to perrilic acid.
