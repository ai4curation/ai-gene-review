  name:
    name: Glyoxalase I/Fosfomycin Resistance Protein Families
    short: GlyoxalaseI/FosfomycinResist
  description:
  - text: The glyoxalase I and fosfomycin resistance protein families include enzymes
      with distinct functions. Glyoxalase I family members are involved in the detoxification
      of methylglyoxal, a byproduct of glycolysis, through the glyoxalase system.
      This system plays a crucial role in cellular defense against glycation by reactive
      dicarbonyl compounds. On the other hand, the fosfomycin resistance protein family,
      particularly the FosB subfamily, includes metallothiol transferases that confer
      resistance to the antibiotic fosfomycin. These enzymes catalyze the addition
      of a thiol group, typically from L-cysteine, to fosfomycin, thereby inactivating
      the antibiotic and providing a defense mechanism for bacteria against this antimicrobial
      agent. The extradiol ring-cleavage dioxygenase family members are involved in
      the catabolism of aromatic compounds, catalyzing the meta-cleavage of dihydroxylated
      aromatic rings in various substrates, which is a critical step in the biodegradation
      of environmental pollutants such as biphenyls and naphthalenes.
