  description:
  - text: The ATP synthase B chain family is involved in cellular energy production.
      Members of this family are components of the F(0) channel of ATP synthase, which
      is essential for ATP production from ADP using a proton or sodium gradient.
      The family includes various subunits that form the peripheral stalk, connecting
      the F(1) catalytic core to the F(0) membrane channel. Some variants, such as
      the b' subunit, are specific to plants and photosynthetic bacteria. These proteins
      are known for their stability, with some remaining functional after extended
      periods at high temperatures. In certain organisms, the enzyme may also act
      as an ATP-driven Na(+) pump, contributing to the generation of a sodium electrochemical
      gradient.
