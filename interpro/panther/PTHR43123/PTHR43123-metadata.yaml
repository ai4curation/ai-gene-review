  name:
    name: Polysaccharide Deacetylase
    short: Polysaccharide_Deacetylase
  description:
  - text: This family of proteins is involved in the modification of polysaccharides
      through the removal of acetyl groups, a process known as deacetylation. Members
      of this family are thought to act on chitin, a key component in the cell walls
      of fungi, and may play a role in morphogenetic processes such as spore formation.
      The deacetylation activity suggests a regulatory function in the maintenance
      and restructuring of the cell wall, which is critical for cell growth, division,
      and development in fungal organisms.
