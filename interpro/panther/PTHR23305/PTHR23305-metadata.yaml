  name:
    name: Ribosome-binding ATPase/GTPase
    short: Ribosome_ATPase/GTPase
  description:
  - text: This family of proteins includes ATPases that are known to bind to ribosomes,
      specifically the 70S ribosome and the 50S ribosomal subunit, in a nucleotide-independent
      manner. Members of this family exhibit GTPase activity, although they hydrolyze
      ATP more efficiently than GTP and have a lower affinity for GTP. Some proteins
      within this family are also involved in cellular stress responses, such as conferring
      sensitivity to salinity stress by affecting anti-oxidation enzymatic activities
      and lipid peroxidation, leading to the accumulation of reactive oxygen species.
      Additionally, certain members are implicated in the regulation of the cell cycle,
      particularly the G2/M transition. The family belongs to the TRAFAC class OBG-HflX-like
      GTPase superfamily, specifically the OBG GTPase family within the YchF/OLA1
      subfamily.
