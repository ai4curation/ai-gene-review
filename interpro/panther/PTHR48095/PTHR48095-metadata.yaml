  name:
    name: Acetyl-CoA Carboxylase Biotin Carboxylase Component
    short: ACC_Biotin_Carboxylase
  description:
  - text: This family of proteins includes enzymes that are integral components of
      the acetyl coenzyme A carboxylase complex. Members of this family are responsible
      for catalyzing the carboxylation of a carrier protein biotin, which is a crucial
      initial step in the biosynthesis of fatty acids. Following this, they facilitate
      the transfer of the carboxyl group to acetyl-CoA to produce malonyl-CoA, an
      essential building block for the elongation of fatty acid chains. The activity
      of these enzymes is fundamental to lipid metabolism and is conserved across
      various species, including plants, bacteria, and other organisms.
