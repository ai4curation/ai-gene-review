  name:
    name: Diverse Carboxylesterases and Gibberellin Receptors
    short: Carboxylest/Gibb_receptor
  description:
  - text: The protein family is characterized by enzymes that predominantly exhibit
      carboxylesterase activity, acting on various esters with differing acyl chain
      lengths. Members of the family are involved in diverse biological processes,
      including the biosynthesis of mycotoxins such as sterigmatocystin and aflatoxins,
      the formation of plant defense chemicals like tulipalins, and the metabolism
      of xenobiotic compounds. They play roles in the biosynthesis of phytohormones
      and monoterpenoid indole alkaloids, and in lipid metabolism by hydrolyzing triglycerides.
      Some family members also function as receptors for the plant hormone gibberellin,
      mediating growth and development responses. The family includes lactone-forming
      carboxylesterases that catalyze intramolecular transesterifications, and enzymes
      involved in the detoxification and degradation of plant-produced benzoxazolinones.
