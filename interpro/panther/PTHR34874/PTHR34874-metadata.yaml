  name:
    name: DsrE/TusD sulfur-relay system
    short: DsrE/TusD_sulfur-relay
  description:
  - text: The DsrE/TusD family proteins are involved in a sulfur-relay system that
      is essential for the 2-thiolation of 5-methylaminomethyl-2-thiouridine (mnm(5)s(2)U)
      at tRNA wobble positions. This post-transcriptional modification process is
      crucial for accurate and efficient protein synthesis. Members of the family
      accept sulfur from the TusA protein and subsequently transfer it to TusE. This
      relay system plays a significant role in the modification of tRNA molecules,
      which in turn affects their function in translation. Some members of the family
      are described as sulfurtransferase TusD homologs, suggesting a conserved function
      across various species. The exact role of some homologs in the sulfur-relay
      system is not fully characterized, but they are presumed to participate in similar
      biological processes.
