  name:
    name: Omega-amidase YafV
    short: Omega-amidase_YafV
  description:
  - text: The Omega-amidase YafV family consists of enzymes that play a role in amino
      acid metabolism and possibly in metabolite repair. Members of this family are
      characterized by their ability to hydrolyze alpha-ketoglutaramate (a-KGM) to
      alpha-ketoglutarate (alpha-KG) and ammonia. The enzymes exhibit varying specific
      activities for this reaction, with some showing weak activity toward L-glutamine.
      They do not act on glutathione or its derivatives. As part of the carbon-nitrogen
      hydrolase superfamily, specifically the NIT1/NIT2 family, the Omega-amidase
      YafV proteins may be involved in the detoxification of harmful metabolic by-products,
      thereby maintaining cellular homeostasis.
