  description:
  - text: This family of proteins is involved in iron storage and mobilization, potentially
      acting as a redox and/or regulatory component. Members of this family are thought
      to interact with bacterioferritin (BFR) and may play a role in the transfer
      of iron to and from BFR or other iron-containing complexes, thus participating
      in iron homeostasis.
