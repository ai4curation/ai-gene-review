  name:
    name: NAD(P)-dependent epimerase/dehydratase-related protein
    short: NAD(P)_epim/dehydrat-rel
  description:
  - text: This family of proteins includes enzymes that are primarily involved in
      various biosynthetic pathways, including the production of flavonoids, lignin,
      meroterpenoids, and other polyketide-derived compounds. Members of this family
      function as oxidoreductases, often utilizing NAD(P)H as a cofactor to catalyze
      the reduction of ketones and aldehydes to secondary alcohols. They play crucial
      roles in plant defense mechanisms, the formation of pigments, and the regulation
      of plant hormone levels. Some family members are also involved in the detoxification
      of harmful compounds and the biosynthesis of steroidal hormones in animals.
