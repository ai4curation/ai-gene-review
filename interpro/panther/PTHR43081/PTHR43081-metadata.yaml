  description:
  - text: The adenylyl cyclase class-3/4/guanylyl cyclase family is involved in the
      synthesis of second messengers, cAMP or cGMP, from ATP or GTP respectively.
      These enzymes play essential roles in regulating cellular metabolism and responses
      to external signals. Some family members act as photoreceptors or potential
      receptors for unknown ligands, indicating a sensory function. The family includes
      pH-sensitive and photoactivated subtypes, and their activity can be modulated
      by various factors such as light, adenosine, GTP, and membrane potential changes.
