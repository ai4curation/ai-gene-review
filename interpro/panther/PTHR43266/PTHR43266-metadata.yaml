  name:
    name: Lysophospholipid transporter LplT
    short: LplT
  description:
  - text: The LplT family proteins are involved in the transport of lysophospholipids
      across the cell membrane. They facilitate the diffusion of 2-acyl-glycero-3-phosphoethanolamine
      (2-acyl-GPE) into the cell, which is a crucial process for maintaining lipid
      homeostasis and membrane dynamics. Members of the LplT family are part of the
      major facilitator superfamily (MFS), a diverse group of transporters that facilitate
      the movement of a wide range of substrates across cellular membranes. The LplT
      family specifically transports lysophospholipids, which are important components
      of the lipid bilayer and play a role in signaling pathways and membrane repair.
