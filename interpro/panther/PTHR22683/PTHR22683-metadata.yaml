  name:
    name: FtsK/SpoIIIE/SftA cell division and DNA translocation
    short: FtsK/SpoIIIE/SftA
  description:
  - text: The FtsK/SpoIIIE/SftA family includes essential cell division proteins that
      coordinate cell division and chromosome segregation. Members of this family
      are involved in the assembly of the cell-division machinery and function as
      DNA motors that move double-stranded DNA in an ATP-dependent manner towards
      specific recombination sites within the replication terminus region. This movement
      is essential for the activation of the Xer recombinase, which facilitates chromosome
      unlinking by recombination. The proteins can also remove other proteins from
      DNA as they translocate, but this translocation stops at specific recombination
      sites to prevent the removal of essential recombinases. The family also includes
      proteins involved in specialized secretion systems, which export proteins from
      the cell, including virulence factors during infection. Additionally, some members
      are implicated in sporulation, aiding in the accurate completion of chromosome
      partitioning before the formation of the division septum.
