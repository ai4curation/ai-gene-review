  name:
    name: Histidine biosynthesis PRA-CH/PRA-PH
    short: His_biosynth_PRA-CH_PH
  description:
  - text: The PRA-CH/PRA-PH protein family is involved in the histidine biosynthesis
      pathway. Members of this family include bifunctional proteins that possess both
      phosphoribosyl-ATP pyrophosphatase and phosphoribosyl-AMP cyclohydrolase activities.
      These enzymes play a crucial role in the early steps of histidine biosynthesis,
      catalyzing the hydrolysis of the adenine ring of phosphoribosyl-AMP, a reaction
      that is essential for the production of histidine. The family includes proteins
      that are either specialized in one of the two activities or bifunctional proteins
      that carry out both functions within a single polypeptide chain. The activity
      of these enzymes is critical for the proper synthesis of histidine, an amino
      acid necessary for protein synthesis and various metabolic processes.
