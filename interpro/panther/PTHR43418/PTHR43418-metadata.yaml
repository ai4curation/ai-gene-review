  name:
    name: Anthranilate Synthase/Amidotransferase
    short: Anth_synth/Amidotransfase
  description:
  - text: The Anthranilate Synthase/Amidotransferase family is involved in the biosynthesis
      of anthranilate and 4-amino-4-deoxychorismate (ADC), which are intermediates
      in the production of L-tryptophan, p-aminobenzoate (PABA), and tetrahydrofolate.
      The family includes heterotetrameric and heterodimeric complexes that catalyze
      a two-step reaction. The first step involves a glutamine amidotransferase activity
      provided by the beta subunit, generating ammonia from glutamine. This ammonia,
      along with chorismate, is used in the second step, catalyzed by the alpha subunit,
      to produce anthranilate or ADC. Some members also possess additional enzymatic
      activities, such as indole-glycerolphosphate synthase and phosphoribosylanthranilate
      isomerase, contributing to multifunctional proteins in tryptophan biosynthesis.
      The family is subject to feedback inhibition by tryptophan and can be involved
      in auxin production and virulence factor synthesis in certain species.
