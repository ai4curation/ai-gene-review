  name:
    name: Photosystem I P700 chlorophyll a apoprotein A1/A2
    short: PsaA/PsaB
  description:
  - text: The PsaA/PsaB family proteins are integral components of Photosystem I (PSI),
      a plastocyanin/cytochrome c6-ferredoxin oxidoreductase complex that plays a
      crucial role in the light-dependent reactions of photosynthesis. Members of
      this family, PsaA and PsaB, are responsible for binding P700, the primary electron
      donor in PSI, along with various electron acceptors including A0, A1, and FX.
      These proteins facilitate the conversion of photonic excitation into a charge
      separation, enabling the transfer of electrons from P700 to the characterized
      acceptors in a sequential manner, ultimately to ferredoxin. The oxidized P700
      is then reduced by plastocyanin or cytochrome c6 on the lumenal side of the
      thylakoid membrane. This process is essential for the light-driven production
      of ATP and NADPH, which are vital for carbon fixation during photosynthesis.
