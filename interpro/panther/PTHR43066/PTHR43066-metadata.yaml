  description:
  - text: The Rhomboid protease S54 family comprises intramembrane serine proteases
      that perform regulated intramembrane proteolysis of various substrates. These
      proteases cleave transmembrane or multi-pass membrane proteins within the lipid
      bilayer, releasing functional polypeptides from their membrane anchors. They
      are involved in diverse biological processes, including signal transduction,
      protein degradation, and apoptosis regulation. Some family members function
      in the endoplasmic reticulum-associated degradation pathway for misfolded membrane
      proteins, transferring them from the ER to the cytosol for ubiquitin-dependent
      proteasome degradation. Others are implicated in the regulation of exosomal
      secretion and spermatogenesis. The family's activity can be inhibited by aprotinin,
      and they share a characteristic flexible loop between transmembrane domains
      that may facilitate water entry into the active site for proteolytic activity.
