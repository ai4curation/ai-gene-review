  name:
    name: Chromate Ion Transporter
    short: CHR_Transporter
  description:
  - text: This family of proteins is involved in the transport of chromate ions across
      cellular membranes. Members of this family are integral to the cellular mechanism
      for reducing chromate accumulation, which is crucial for resistance to chromate
      toxicity. Some proteins in this family are thought to be active transporters,
      potentially facilitating the uptake of chromate into cells, particularly under
      conditions where sulfur is deficient. The transport activity of these proteins
      is essential for the survival of organisms in environments contaminated with
      chromate.
