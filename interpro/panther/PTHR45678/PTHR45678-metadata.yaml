  name:
    name: Mitochondrial Solute Carrier
    short: Mito_Solute_Carrier
  description:
  - text: This family of proteins includes mitochondrial carriers that facilitate
      the transport of solutes, metabolites, nucleotides, and cofactors across the
      mitochondrial inner membrane. They play a crucial role in various metabolic
      processes, including the malate-aspartate shuttle, which is essential for transferring
      reducing equivalents across the mitochondrial membrane. Members of this family
      are involved in the electrogenic antiport of aspartate and glutamate, which
      is important for amino acid metabolism and energy production. Some family members
      are also capable of calcium-dependent binding and transport, which influences
      the carrier's activity and substrate specificity. The regulation of these transporters
      can involve calcium binding, which modulates the interaction between the N-terminal
      regulatory domain and the C-terminal carrier domain, affecting substrate translocation.
