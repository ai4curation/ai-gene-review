  name:
    name: N-acetylmuramoyl-L-alanine amidase 2
    short: NAMLAA_amidase_2
  description:
  - text: This family of proteins includes autolysins and amidases that play a crucial
      role in bacterial cell wall metabolism. They are involved in processes such
      as cell separation, cell-wall turnover, and peptidoglycan recycling. These enzymes
      specifically cleave the amide bond between the lactyl group of N-acetylmuramic
      acid and the alpha-amino group of L-alanine in certain cell wall degradation
      products. Some members are also implicated in the induction of beta-lactamase
      and may participate in genetic transformation, flagella formation, sporulation,
      and bacteriophage-mediated cell lysis. Their activity is known to be inhibited
      by metal chelators, indicating a dependence on metal ions for function.
