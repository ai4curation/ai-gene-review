  description:
  - text: This family of proteins includes subunits of formate dehydrogenases, which
      are enzymes that allow bacteria to use formate as a major electron donor in
      various types of respiration. Some members are involved in aerobic respiration,
      while others participate in anaerobic respiration, using nitrate as an electron
      acceptor. These proteins typically contain a cytochrome b556 component and may
      also have a menaquinone reduction site. They play a role in the generation of
      proton motive force and are associated with other systems such as dissimilatory
      nitrate reductase.
