  name:
    name: Glutathione-regulated potassium-efflux system KefB/KefC
    short: KefB_KefC_system
  description:
  - text: The KefB/KefC family includes pore-forming subunits of potassium efflux
      systems that protect against electrophiles by catalyzing K(+)/H(+) antiport.
      Members of the family are activated by adducts between glutathione and electrophiles,
      with some inhibited by glutathione and NADH. These proteins are part of the
      monovalent cation:proton antiporter 2 (CPA2) transporter family and play a crucial
      role in maintaining potassium homeostasis and osmotic balance within the cell.
      They are involved in various physiological processes, including chloroplast
      development, photosynthesis, and responses to environmental stresses in plants.
      The KefB/KefC family is essential for the regulation of ion homeostasis and
      the protection of cells from toxic compounds.
