  name:
    name: Sulfatase Modifying Factor and Kinase
    short: Sulfatase_Mod_Factor_Kinase
  description:
  - text: The protein family is involved in various biological processes, including
      the post-translational modification of sulfatases and the biosynthesis of ergothioneine,
      an antioxidant that protects bacteria from oxidative stress. Some family members
      are inactive enzymes that inhibit sulfatase activation, while others are active
      oxidases catalyzing the formation of formylglycine, a key step in activating
      sulfatases. Additionally, the family includes serine/threonine-protein kinases
      that may interact with host proteins during intracellular growth and a chaperone
      protein necessary for the proper folding of secreted enzymes. Hercynine oxygenases
      within the family catalyze the oxidative sulfurization of hercynine in ergothioneine
      biosynthesis, contributing to bacterial virulence and protection against redox
      stress.
