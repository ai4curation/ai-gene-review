  name:
    name: Ribosomal RNA large subunit methyltransferase I
    short: RlmI_methyltransferase
  description:
  - text: The RlmI family of proteins consists of ribosomal RNA large subunit methyltransferases
      that are responsible for the site-specific methylation of cytosine at position
      1962 (m5C1962) of 23S rRNA. This modification is a post-transcriptional modification
      that occurs before the assembly of the 23S rRNA into the 50S ribosomal subunit.
      The methylation is crucial for the proper function of the ribosome, which is
      essential for protein synthesis. Members of the RlmI family are characterized
      by their membership in the broader methyltransferase superfamily, indicating
      a shared mechanism of action involving the transfer of a methyl group to the
      target cytosine residue.
