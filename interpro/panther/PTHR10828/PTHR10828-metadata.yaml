  name:
    name: M-phase inducer phosphatase
    short: MPI_phosphatase
  description:
  - text: The MPI phosphatase family comprises proteins that function as dosage-dependent
      inducers of mitotic and meiotic progression. Members of this family are tyrosine
      protein phosphatases essential for cell cycle control, particularly the G2/M
      transition. They dephosphorylate and activate CDK1, a critical kinase for cell
      cycle progression. Some family members also exhibit arsenate reductase activity,
      playing a role in arsenic detoxification. Additionally, these phosphatases may
      be involved in cytokinesis, DNA replication checkpoint regulation, and developmental
      processes such as male tail development in certain species.
