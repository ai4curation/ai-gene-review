  name:
    name: Phosphatidate cytidylyltransferase
    short: Phosphatidate_cytdyltransf
  description:
  - text: The CDS family is composed of enzymes known as phosphatidate cytidylyltransferases,
      which play a crucial role in the biosynthesis of phospholipids. These enzymes
      catalyze the conversion of phosphatidate and CTP to CDP-diacylglycerol and pyrophosphate,
      an essential step in the production of the key phospholipid intermediates that
      are precursors for the synthesis of various phospholipids and glycolipids. The
      activity of the CDS family members is vital for maintaining the integrity of
      cell membranes and for the proper function of cellular processes that depend
      on lipid signaling and membrane fluidity.
