  name:
    name: 2-aminoethylphosphonate--pyruvate transaminase
    short: PhnW_aminotransferase
  description:
  - text: The PhnW family of proteins is involved in the degradation of phosphonates,
      a class of organophosphorus compounds. Members of this family function as 2-aminoethylphosphonate--pyruvate
      transaminases, enzymes that catalyze the transfer of an amino group from 2-aminoethylphosphonate
      to pyruvate, forming phosphonoacetaldehyde and alanine. This reaction is a key
      step in the catabolic pathway of phosphonates, allowing organisms to utilize
      phosphonates as a phosphorus source. The PhnW family is characterized by its
      dependence on the cofactor pyridoxal phosphate, a common feature of class-V
      aminotransferases. The activity of these enzymes is essential for the metabolism
      of phosphonates in various bacteria, contributing to their ability to survive
      in environments where phosphonates are present.
