  name:
    name: Bacteriophage lysozyme-like
    short: Phage_lysozyme-like
  description:
  - text: This family of proteins includes lysozymes with enzymatic activity that
      degrade bacterial cell walls by breaking down peptidoglycan. These proteins
      are involved in bacteriophage-host interactions, facilitating the release of
      viral particles through host cell lysis. They act in concert with other phage
      proteins such as holins and spanins to breach the host cell membrane, allowing
      access to the periplasmic space. Within this space, they perform localized hydrolysis
      of the cell wall, enabling phage DNA delivery into the host. Additionally, they
      play roles in phage tail assembly and are essential for the penetration of the
      tail tube through the bacterial envelope.
