  name:
    name: Aspartate-semialdehyde dehydrogenase
    short: Asp_semialdhyde_DHase
  description:
  - text: The aspartate-semialdehyde dehydrogenase family encompasses enzymes that
      perform a crucial step in the biosynthesis of amino acids. Members of this family
      are responsible for the NADPH-dependent conversion of L-aspartyl-4-phosphate
      to L-aspartate-semialdehyde (L-ASA). This reaction is a key part of the diaminopimelate
      and lysine biosynthesis pathways, which are essential for producing components
      of the bacterial cell wall and for overall microbial growth and pathogenicity.
      The enzymes typically consist of two domains, an N-terminal nucleotide-binding
      domain and a C-terminal dimerization domain. Some family members are regulated
      by inhibition through the formation of a covalently bound cysteine at the active
      site, indicating a level of control over the enzymatic activity.
