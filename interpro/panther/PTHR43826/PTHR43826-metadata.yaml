  name:
    name: Organophosphate:Pi Antiporter
    short: OPA_Antiporter
  description:
  - text: This family of proteins includes transporters that facilitate the exchange
      of organic phosphate compounds and inorganic phosphate across cellular membranes.
      Members of this family are predominantly involved in the uptake of hexose-6-phosphate,
      glycerol-3-phosphate, and other related phosphate esters, which are essential
      for various metabolic processes. Some proteins in this family also function
      as sensors in signaling cascades, regulating the expression of other transporters
      in response to extracellular signals such as glucose-6-phosphate. The transport
      activity of these proteins is critical for maintaining cellular phosphate homeostasis
      and is integral to metabolic pathways such as glycogenolysis and gluconeogenesis.
