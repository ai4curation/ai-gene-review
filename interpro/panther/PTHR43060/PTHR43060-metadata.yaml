  name:
    name: HIBADH-related oxidoreductase
    short: HIBADH-related_oxidoRf
  description:
  - text: The HIBADH-related family includes enzymes that function as oxidoreductases,
      catalyzing various reactions involving the oxidation and reduction of substrates.
      Members of the L-threonate dehydrogenase subfamily oxidize L-threonate to 2-oxo-tetronate,
      preferring NAD(+) as a cosubstrate. The 2-hydroxy-3-oxopropionate reductase
      subfamily reduces tatronate semialdehyde to D-glycerate. Other family members
      are involved in the metabolism of compounds such as 2-formylglutarate and sulfofructosephosphate.
      The family is characterized by a diversity of substrates and reactions, reflecting
      the broad functional repertoire of the HIBADH-related enzymes.
