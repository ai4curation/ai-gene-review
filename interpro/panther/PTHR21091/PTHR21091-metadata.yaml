  name:
    name: Uroporphyrinogen decarboxylase
    short: Uro_decarboxylase
  description:
  - text: The uroporphyrinogen decarboxylase family consists of enzymes that catalyze
      the sequential decarboxylation of the four acetate side chains of uroporphyrinogen
      to form coproporphyrinogen. This reaction is part of the fifth step in the heme
      biosynthetic pathway. The enzymes in this family can use either isomer I or
      isomer III of uroporphyrinogen as substrates, but only coproporphyrinogen III
      can be converted to heme. Some members of this family have been shown to also
      decarboxylate pentacarboxylate porphyrinogen I in vitro. Inhibition by compounds
      such as N-ethyl-maleimide and phenylglyoxal has been observed for some family
      members.
