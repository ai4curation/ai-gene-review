  name:
    name: Dihydropteridine Reductase
    short: DHPR
  description:
  - text: This family of proteins includes enzymes that are responsible for the reduction
      of quinonoid dihydrobiopterin to tetrahydrobiopterin, a critical step in the
      biosynthesis of tetrahydrobiopterin (BH-4). BH-4 is an essential cofactor for
      several hydroxylases involved in the metabolism of amino acids such as phenylalanine,
      tyrosine, and tryptophan. These proteins are part of the short-chain dehydrogenases/reductases
      (SDR) superfamily, which is characterized by a conserved NAD(P)(H)-binding domain
      and is involved in a wide range of metabolic processes.
