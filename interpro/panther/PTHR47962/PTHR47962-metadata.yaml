  name:
    name: ATP-dependent Helicase
    short: ATP-dep_Helicase
  description:
  - text: This family of proteins includes ATP-dependent helicases which are enzymes
      that utilize the energy derived from ATP hydrolysis to unwind double-stranded
      nucleic acids. Helicases are essential for many cellular processes, including
      DNA replication, repair, recombination, and transcription, as well as RNA processing
      and degradation. They play a critical role in maintaining genome stability and
      integrity. Members of this family are characterized by their ability to bind
      and hydrolyze ATP, and to exert force on nucleic acid substrates, thereby separating
      the strands to facilitate the processing of the nucleic acids by other enzymes.
