  name:
    name: 3-Ketodihydrosphingosine Reductase
    short: 3KDS_Reductase
  description:
  - text: The 3-ketodihydrosphingosine reductase family consists of enzymes that catalyze
      the conversion of 3-ketodihydrosphingosine (KDS) to dihydrosphingosine (DHS),
      a critical step in sphingolipid biosynthesis. Sphingolipids are essential components
      of cell membranes and play key roles in signal transduction and cell recognition.
      The family members are part of the short-chain dehydrogenases/reductases (SDR)
      superfamily, known for their involvement in the metabolism of steroids, prostaglandins,
      and xenobiotics. Some family members in plants are involved in mineral ion homeostasis,
      likely through their impact on membrane ion transport systems. The family exhibits
      a degree of stereospecificity, with some members producing only D-erythro-DHS,
      while others lack this specificity and can produce both D-erythro-DHS and L-threo-DHS.
