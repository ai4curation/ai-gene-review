  name:
    name: ABC-4 integral membrane protein family, HrtB subfamily
    short: ABC-4/HrtB_transporter
  description:
  - text: The ABC-4 integral membrane protein family, specifically the HrtB subfamily,
      is involved in the transport of hemin across the bacterial cell membrane. Members
      of the HrtB subfamily are part of the ABC transporter complex hrt, which is
      responsible for hemin import. These permease proteins facilitate the translocation
      of hemin, an iron-containing porphyrin, essential for various cellular processes.
      The family also includes uncharacterized ABC transporter permeases that are
      likely part of ABC transporter complexes and may be involved in the translocation
      of substrates across the membrane.
