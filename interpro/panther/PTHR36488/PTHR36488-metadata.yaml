  description:
  - text: PTHR36488 is a divergent clade of plant CASP-like (CASPL) proteins, integrated
      under InterPro IPR044173 (CASPL) and distinct from the larger CASP/CASPL family
      PTHR33573. Like all CASP/CASPL proteins, its members are small, non-enzymatic,
      four-transmembrane-span (tetraspan) integral plasma-membrane proteins related to
      the MARVEL-domain superfamily that act as membrane scaffolds rather than as
      transporters or catalysts. The family is dominated by the 1U subfamilies and also
      contains the CASPL1B and CASPL1D subgroups (in Arabidopsis, AtCASPL1B1, AtCASPL1B2,
      AtCASPL1D1 and AtCASPL1D2 map here). Those CASPL1B/1D members are expressed in
      suberized endodermal cells and physically interact with the plasma-membrane
      aquaporin PIP2;1, implicating this clade in endodermal suberization and the
      modulation of aquaporin-mediated water transport rather than in Casparian strip
      formation itself. Most other members are functionally uncharacterized.
