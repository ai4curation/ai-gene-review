  name:
    name: TrkH Potassium Transport
    short: TrkH_K_transport
  description:
  - text: The TrkH potassium transport family is involved in the uptake and regulation
      of potassium ions across the cell membrane. Members of the family function as
      integral membrane proteins that form low to medium-affinity potassium transport
      systems, often interacting with other proteins such as TrkA and requiring additional
      components like TrkE for optimal activity. Some family members also mediate
      the electrogenic transport of sodium in addition to potassium, acting as cotransporters.
      The transport activity can be regulated by factors such as membrane potential,
      cytoplasmic ATP concentration, and in some cases, stimulated by sodium ions.
      The family plays a crucial role in osmotic stress resistance and is essential
      for maintaining cellular ion homeostasis.
