  description:
  - text: The NmrA-type oxidoreductase family, specifically the Isoflavone reductase
      subfamily, encompasses enzymes involved in plant secondary metabolite biosynthesis.
      Members of this family play crucial roles in the biosynthesis of lignans, isoflavonoids,
      and alkaloids, which are important for plant defense mechanisms and interactions
      with the environment. They catalyze the reduction of various substrates such
      as isoflavones, pinoresinol, lariciresinol, and phenylcoumaran benzylic ethers,
      using NADPH as a cofactor. These enzymes contribute to the production of phytoalexins,
      lignans, and alkaloids with properties ranging from antimicrobial, antiparasitic,
      and pesticide to the formation of carcinogenic compounds. Additionally, some
      members are involved in the synthesis of phenylpropenes like eugenol and isoeugenol,
      which serve as floral attractants and defense compounds. The diversity of reactions
      catalyzed by this family reflects their significant role in plant biochemistry
      and the potential for biotechnological applications.
