  name:
    name: TrkH Potassium Transport
    short: TrkH_K-transport
  description:
  - text: The TrkH potassium transport family is involved in the regulation of potassium-sodium
      homeostasis and the maintenance of the proper sodium/potassium ratio in cells.
      Members of this family function primarily as potassium transporters, with some
      also mediating sodium transport. They are characterized by having pore-forming
      regions that resemble potassium channel selectivity filter motifs. These transporters
      play critical roles in various physiological processes, including high-affinity
      potassium uptake, low-affinity potassium transport, sodium exclusion under salt
      stress, and candidacidal activities. Some members are also implicated in the
      efflux of chloride ions and other anions, contributing to cellular ion balance
      and adaptation to environmental stresses.
