  name:
    name: UTP pyrophosphatase-like
    short: UTP_pyrophosphatase-like
  description:
  - text: This family of proteins is involved in nucleotide metabolism, specifically
      catalyzing the hydrolysis of UTP to UMP and diphosphate. The enzymatic activity
      is highly specific to UTP and does not extend to other nucleoside triphosphates
      such as ATP, GTP, CTP, dTTP, or ITP. The reaction is a part of the pyrimidine
      salvage pathway and plays a role in the regulation of intracellular levels of
      UTP and UMP, which are essential for RNA synthesis and other cellular processes.
