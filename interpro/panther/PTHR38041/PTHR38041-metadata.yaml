  description:
  - text: This family of proteins is involved in the biosynthesis of aromatic amino
      acids and other aromatic compounds through the Claisen rearrangement of chorismate
      to prephenate. Members of this family may also participate in the biosynthesis
      of various secondary metabolites, such as siderophores and antibiotics, by catalyzing
      related rearrangement and elimination reactions. Some proteins within this family
      are secreted and may contribute to pathogenicity, while others are intracellular
      and are regulated by complex formation or feedback inhibition by aromatic amino
      acids.
