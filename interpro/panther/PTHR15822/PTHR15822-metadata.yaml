  name:
    name: Tyrosyl-DNA phosphodiesterase 2-like
    short: TDP2-like
  description:
  - text: This family of proteins functions primarily in DNA repair, specifically
      by removing covalent adducts from DNA. They act through hydrolysis of a 5'-phosphodiester
      bond, resulting in DNA with a free 5' phosphate, which is essential for the
      repair of DNA double-strand breaks. These proteins can hydrolyze dead-end complexes
      between DNA and topoisomerase 2, as well as 5'-phosphoglycolates on protruding
      5' ends caused by radiation and free radicals. Some members also exhibit 3'-tyrosyl
      DNA phosphodiesterase activity. Additionally, certain proteins in this family
      are involved in non-canonical TGF-beta signaling pathways, acting as adapters
      for specific activation of signaling modules, and may play roles in regulating
      transcription and ribosome biogenesis under stress conditions.
