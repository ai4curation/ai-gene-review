  name:
    name: Monovalent Cation:Proton Antiporter 2
    short: CPA2_Transporter
  description:
  - text: This family of proteins includes transporters that are involved in the exchange
      of monovalent cations, such as potassium and ammonium, with protons across cellular
      membranes. These transporters play a crucial role in maintaining cellular ion
      homeostasis and pH balance. Some members are specifically involved in the transport
      of iron and are essential for processes such as the synthesis of bacterial magnetic
      particles. The activity of these proteins can be modulated by other protein
      subunits and environmental factors like pH. They are also implicated in the
      cellular resistance to toxic compounds, such as methylglyoxal, by facilitating
      cytoplasmic acidification.
