  name:
    name: Elongation factor Tu GTPase
    short: EF-Tu_GTPase
  description:
  - text: Elongation factor Tu (EF-Tu) proteins are essential GTPases responsible
      for catalyzing the delivery of aminoacyl-tRNA to the ribosome during protein
      synthesis. They bind to aminoacyl-tRNA in a GTP-dependent manner and escort
      it to the A-site of the ribosome, ensuring the correct match between the tRNA
      anticodon and mRNA codon. Upon codon recognition, GTP is hydrolyzed, leading
      to a conformational change in EF-Tu that releases the tRNA into the ribosome.
      EF-Tu also plays a role in the regulation of autophagy and innate immunity,
      particularly in its mitochondrial form. It can recruit ATG5-ATG12 and NLRX1
      at mitochondria, serving as a checkpoint of the RIGI-MAVS pathway, thereby inhibiting
      RLR-mediated type I interferon while promoting autophagy.
