  name:
    name: Glutamine Synthetase
    short: Glutamine_Synthetase
  description:
  - text: The glutamine synthetase family comprises enzymes that catalyze the ATP-dependent
      conversion of glutamate and ammonia to glutamine, playing a crucial role in
      nitrogen metabolism. In the brain, they regulate ammonia levels and convert
      neurotoxic glutamate to glutamine, while in the liver, they are involved in
      ammonia removal. These enzymes are essential for cell proliferation and vascular
      development. Some isozymes are involved in the reassimilation of ammonia generated
      by photorespiration in plants, contributing to metabolic homeostasis and plant
      growth. Certain members may also have palmitoyltransferase activity, influencing
      GTPase activation and ribosomal biogenesis.
