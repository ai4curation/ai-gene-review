  name:
    name: Lipid kinase/CheW-like signal transduction protein
    short: Lipid_kinase/CheW-like_STP
  description:
  - text: This family of proteins includes lipid kinases that are likely involved
      in the phosphorylation of lipids, although their specific in vivo substrates
      have not been identified. Additionally, the family encompasses proteins that
      play a role in chemotaxis signal transduction, which is crucial for cellular
      navigation towards favorable environments. These chemotaxis-related proteins
      may function as phosphate sinks, regulating the flow of phosphate within the
      signaling system to facilitate the colonization of specific host environments.
      The family is characterized by members containing a CheW-like domain for signal
      transduction coupling and a receiver domain for two-component signal transduction
      systems.
