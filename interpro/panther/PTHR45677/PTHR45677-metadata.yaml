  name:
    name: Group II Amino Acid Decarboxylases
    short: GrpII_AminoAcid_Decarb
  description:
  - text: The Group II Decarboxylase family is characterized by enzymes that catalyze
      the decarboxylation of various amino acids to produce biologically active amines.
      Members of this family are involved in the synthesis of neurotransmitters and
      other metabolites. For instance, some enzymes within this family convert glutamate
      to gamma-aminobutyric acid (GABA), an inhibitory neurotransmitter. Others decarboxylate
      L-aspartate, 3-sulfino-L-alanine (cysteine sulfinic acid), and L-cysteate to
      beta-alanine, hypotaurine, and taurine, respectively. Substrate preferences
      vary among family members, with some showing specificity for L-aspartate and
      others for 3-sulfino-L-alanine. The family also includes enzymes involved in
      the biosynthesis of secondary metabolites, such as mycotoxins and cyclic peptides
      with insecticidal properties. These enzymes typically require pyridoxal 5'-phosphate
      as a cofactor and are subject to regulation by various compounds and metal ions.
