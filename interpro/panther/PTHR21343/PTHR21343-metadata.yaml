  name:
    name: Cobalamin biosynthesis CobB/CobQ
    short: Cobalamin_biosynth_CobB/CobQ
  description:
  - text: The CobB/CobQ family is involved in the biosynthesis of adenosylcobalamin
      (vitamin B12) and related compounds. Members of this family, known as cobyric
      acid synthases, catalyze the ATP-dependent amidation of adenosylcobyrinic acid
      A,C-diamide at positions B, D, E, and G. The amidation process utilizes glutamine
      as the ammonia donor. This reaction is a key step in the biosynthetic pathway
      of cobalamin and is essential for the formation of the complete corrin ring
      structure, which is a central component of vitamin B12. The activity of these
      enzymes is crucial for the production of this vitamin, which plays a vital role
      in various biological processes including DNA synthesis, fatty acid and amino
      acid metabolism.
