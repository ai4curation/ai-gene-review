  name:
    name: SEC63/ERDJ Protein Translocation
    short: SEC63/ERDJ_Transloc
  description:
  - text: The SEC63/ERDJ protein family is involved in the translocation of polypeptides
      across the endoplasmic reticulum (ER) membrane. Members of this family function
      as part of the Sec62/63 complex, which operates in conjunction with the Sec61
      complex and molecular chaperones such as BiP to form a channel-forming translocon
      complex. This complex facilitates both cotranslational and post-translational
      transport of precursor polypeptides into the ER lumen. The SEC63/ERDJ proteins
      may enhance the recognition of precursors, particularly those with short and
      apolar signal peptides, and are implicated in the biogenesis and trafficking
      of proteins like Polycystin-1 to the plasma membrane. The cycle of assembly
      and disassembly of the Sec62/63 complex from the SEC61 translocon is thought
      to regulate the activity of the translocon, affecting polypeptide interactions
      and channel opening.
