  name:
    name: LysR-type Transcriptional Regulator
    short: LysR-type_TF
  description:
  - text: The LysR-type transcriptional regulator (LTTR) family encompasses a diverse
      group of proteins that function as transcriptional regulators, primarily in
      bacteria. These regulators typically bind to specific DNA sequences and modulate
      the expression of various operons involved in a wide range of cellular processes,
      including response to environmental stress, metabolism of small molecules, and
      degradation of aromatic compounds. Members of the family are known to regulate
      genes involved in hydrogen peroxide response, tartrate utilization, 2,3-butanediol
      synthesis, malonate utilization, glutamate biosynthesis, chlorinated catechol
      metabolism, benzoate degradation, and more. They often act as activators or
      repressors and can be regulated by effector molecules, which may include substrates
      or products of the metabolic pathways they control. The LTTRs share a characteristic
      helix-turn-helix (HTH) DNA-binding motif and are named for their homology to
      the LysR protein, the first identified member of the family.
