  name:
    name: Cytochrome P450 monooxygenases
    short: Cytochrome_P450_monoxygenases
  description:
  - text: The cytochrome P450 family is a diverse group of enzymes that play a crucial
      role in the metabolism of a wide variety of substrates, including steroids,
      fatty acids, and xenobiotics. Members of this family are involved in essential
      biosynthetic pathways, such as the production of brassinosteroids, gibberellins,
      jasmonic acid, and retinoic acid, which are important for plant growth, development,
      and defense, as well as animal development and signaling. They catalyze oxidative
      reactions, often hydroxylating substrates and initiating their degradation or
      conversion to more active forms. This family includes enzymes that are key to
      the synthesis of sterols, saponins, and other secondary metabolites with pharmacological
      activity.
