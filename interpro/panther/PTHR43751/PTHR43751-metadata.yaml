  name:
    name: Glycosaminoglycan & Ulvan Degrading Sulfatases
    short: GAG_Ulvan_Degrading_Sulfatases
  description:
  - text: The sulfatase family is involved in the degradation of various sulfated
      polysaccharides. Members of this family include enzymes that play a crucial
      role in the breakdown of glycosaminoglycans such as chondroitin sulfate and
      dermatan sulfate, by hydrolyzing the 6-sulfate groups of the N-acetyl-D-galactosamine
      6-sulfate units. This activity is essential for the persistence of gut symbionts
      like B.thetaiotaomicron in the gastrointestinal tract. Other family members
      are involved in the degradation of ulvan, a major polysaccharide in the cell
      walls of green seaweed, by desulfating specific disaccharide building blocks,
      aiding in the utilization of ulvan as a nutrient source. The family's collective
      activities are important for the recycling of complex carbohydrates in various
      biological systems, including marine ecosystems and the human gut microbiome.
