  name:
    name: Enoyl-CoA Hydratase/Isomerase Domain-Containing Protein
    short: Enoyl-CoA_Hydratase/Isomerase
  description:
  - text: This family of proteins is involved in various metabolic processes, including
      the hydration of enoyl-CoA thioesters, isomerization reactions, and the biosynthesis
      of host-selective toxins and secondary metabolites. Members of this family catalyze
      crucial steps in the synthesis of compounds such as antibiotics, toxins affecting
      plant pathogens, and the degradation of complex organic molecules. They are
      characterized by their ability to act on substrates with different chain lengths
      and structures, reflecting a broad specificity and functional diversity within
      the family. The enzymes play roles in cellular defense mechanisms, pathogenicity,
      and the utilization of environmental resources.
