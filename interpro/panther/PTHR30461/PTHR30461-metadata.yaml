  name:
    name: Site-specific recombinase resolvase
    short: SSR_resolvase
  description:
  - text: The protein family includes site-specific recombinases known as resolvases,
      which perform crucial roles in DNA manipulation processes such as inversion
      and resolution of cointegrated replicons. These proteins are involved in the
      inversion of specific DNA segments, regulating gene expression and host specificity
      of viruses by altering the orientation of DNA fragments. They also catalyze
      the resolution of cointegrated replicons during transposition events, ensuring
      the proper segregation of genetic elements. The family's members share a common
      mechanism of action, introducing nicks into DNA, forming covalent intermediates,
      and executing strand exchange through a series of coordinated cleavage and religation
      steps. Their functions are vital for viral lifecycle, plasmid stability, and
      bacterial adaptability through phase variation and horizontal gene transfer.
