  name:
    name: Bacterial PTS system sugar-specific components
    short: Bacterial_PTS_sugar_comp
  description:
  - text: The protein family is involved in the phosphoenolpyruvate-dependent sugar
      phosphotransferase system (PTS), a key carbohydrate active transport system
      in bacteria. Members of the family catalyze the phosphorylation of sugar substrates
      while translocating them across the cell membrane. Specific components of the
      system, such as EIIB and EIIA, are phosphorylated by phospho-EIIA or phospho-HPr
      on histidyl or cysteinyl residues, depending on the sugar type. The phosphoryl
      group is then transferred to the sugar substrate during uptake by the EIIC domain.
      The family includes components specific for different sugars, such as mannose,
      fructose, N-acetylgalactosamine, and L-sorbose, indicating a broad specificity
      for carbohydrate transport and phosphorylation. Some members also play roles
      in bacterial chemotaxis and phage infection.
