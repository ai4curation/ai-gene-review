  description:
  - text: The Tiger protein family in Dictyostelium discoideum is involved in cell-cell
      recognition and signaling, essential for social amoebae aggregation and multicellular
      development. Members of the family, such as Contact site A protein, mediate
      cell binding through homophilic interactions, possibly elevating active sites
      into the extracellular space. Tiger proteins B1 and C1 are specifically implicated
      in kin discrimination, a critical process for the formation of multicellular
      structures. These proteins function in a non-diffusible manner, signaling between
      cells to regulate aggregation. Tiger protein D1 is suggested to regulate aggregation
      by activating tgrC1, while tgrC1 itself is a terminal node in the signaling
      pathway, activating tgrD1 and having both autonomous and non-autonomous functions.
      Collectively, the Tiger protein family represents a group of cell surface glycoproteins
      that coordinate the early stages of Dictyostelium development through intricate
      cell signaling mechanisms.
