  name:
    name: Activating signal cointegrator 1 complex subunit 2
    short: ASCC2
  description:
  - text: The ASCC2 family comprises ubiquitin-binding proteins that play a crucial
      role in DNA repair and the ribosome quality control (RQC) pathway. Members of
      the family are involved in the rescue of stalled ribosomes and the degradation
      of nascent peptide chains during problematic translation. They function as part
      of the ASCC complex, recruiting other components such as ASCC3 and ALKBH3 to
      sites of DNA damage by binding to proteins with 'Lys-63'-linked polyubiquitin
      chains. Additionally, they are implicated in enhancing the transactivation of
      NF-kappa-B, SRF, and AP1. The family is characterized by the presence of a CUE
      domain that specifically binds RPS20/uS10 ubiquitinated by ZNF598, which is
      essential for the recruitment of the RQT complex on stalled ribosomes, leading
      to their disassembly.
