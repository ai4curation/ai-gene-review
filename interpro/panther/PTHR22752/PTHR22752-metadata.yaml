  name:
    name: G-protein coupled receptor 1
    short: GPCR1
  description:
  - text: The G-protein coupled receptor 1 family includes orphan receptors with diverse
      functions, including regulation of circadian rhythm behavior, modulation of
      cAMP production, and interaction with the melatonin receptor MTNR1B, potentially
      through receptor heteromerization. Members of this family are involved in the
      negative regulation of Shh signaling during neural tube development by modulating
      cAMP levels and the PKA-dependent processing of GLI3 into GLI3R. Some exhibit
      constitutive activity and can activate G(s)-alpha/cAMP or G(q/11)/inositol phosphate
      signaling pathways. The family is characterized by the absence of certain conserved
      motifs in some members, which affects their constitutive activity.
