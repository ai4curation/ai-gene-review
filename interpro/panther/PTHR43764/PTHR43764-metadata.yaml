  name:
    name: Molybdopterin Adenylyltransferase/MoaC-Related
    short: MPT_Adenylyltrnsfr/MoaC-Rel
  description:
  - text: This family of proteins includes enzymes involved in the biosynthesis of
      the molybdenum cofactor, which is essential for the activity of various molybdoenzymes.
      Members of this family are responsible for the adenylation of molybdopterin,
      a key step in the formation of the molybdenum cofactor. Additionally, some bifunctional
      proteins in this family also catalyze the conversion of (8S)-3',8-cyclo-7,8-dihydroguanosine
      5'-triphosphate to cyclic pyranopterin monophosphate, another crucial reaction
      in the biosynthetic pathway. These activities are vital for the proper functioning
      of molybdoenzymes, which play roles in diverse biological processes including
      the metabolism of purines, pyrimidines, and pterins, and in the detoxification
      of sulfite and xanthine.
