  name:
    name: Beta-glucuronidase Glycosyl Hydrolase
    short: Beta-glucuronidase_GH2
  description:
  - text: The Beta-glucuronidase family encompasses enzymes that play a crucial role
      in the lysosomal degradation of glycosaminoglycans, including dermatan and keratan
      sulfates. Members of this family are also involved in the metabolism of xenobiotic
      and endobiotic glucuronides within the gastrointestinal tract, contributing
      to the utilization of diverse carbon sources. These enzymes can reactivate glucuronide
      drug conjugates, which may lead to gastrointestinal toxicity. Activity of the
      family members is known to be inhibited by L-aspartic acid and various synthetic
      compounds, including thio-urea derivatives and uronic isofagomine analogs. The
      presence of an N-K motif is a characteristic feature that aids in the identification
      of beta-glucuronidases within the larger glycosyl hydrolase 2 family.
