  name:
    name: tRNA nucleotidyltransferase/poly(A) polymerase I
    short: tRNA_ntf/polyA_polymerase_I
  description:
  - text: The Poly(A) polymerase I family is characterized by enzymes that add poly(A)
      tails to the 3' ends of various RNAs, a process that typically marks these RNAs
      for degradation. The addition of poly(A) tails is a crucial step in the regulation
      of gene expression, as it affects the rate of RNA transcript degradation and
      plays a vital role in maintaining RNA quality control. Members of the family
      are involved in the global control of gene expression. Additionally, some family
      members have been implicated in plasmid copy number control and may recognize
      Rho-independent transcription terminators as signals for polyadenylation.
