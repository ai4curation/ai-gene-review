  name:
    name: CysQ/Inositol Monophosphatase
    short: CysQ/Inositol_MonoPase
  description:
  - text: The CysQ/Inositol Monophosphatase family comprises enzymes that primarily
      function as phosphatases with a broad specificity. They are involved in various
      metabolic processes, including the hydrolysis of adenosine 3',5'-bisphosphate
      (PAP) to adenosine 5'-monophosphate (AMP), a reaction that is central to the
      regulation of intracellular levels of PAP. Some family members also convert
      adenosine 3'-phosphate 5'-phosphosulfate (PAPS) to adenosine 5'-phosphosulfate
      (APS). Additionally, these enzymes participate in inositol phosphate metabolism,
      although with lower activity towards inositol phosphates compared to PAP. The
      family plays a role in sulfur metabolism by regulating the pools of PAP and
      PAPS in cells. Members of the CysQ/Inositol Monophosphatase family are characterized
      by their sensitivity to inhibition by lithium, which is of particular interest
      in the study of mood disorders where lithium salts are used therapeutically.
