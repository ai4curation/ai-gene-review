  name:
    name: Phosphate/Phosphite/Phosphonate Binding Protein
    short: P-Pn-Pt_Binding_Protein
  description:
  - text: This family of proteins is involved in the transport and binding of various
      phosphorus-containing compounds, including inorganic phosphite, methylphosphonate,
      and phosphate. Members of this family are typically part of ABC transporter
      complexes, which are responsible for the uptake of these compounds into the
      cell. The binding proteins within these complexes have high specificity and
      affinity for their substrates, which can include phosphite, phosphonates, and
      phosphate. These proteins play a crucial role in the phosphorus metabolic processes
      of the cell, including the transport and oxidation of phosphite to phosphate,
      which is an essential nutrient for many organisms.
