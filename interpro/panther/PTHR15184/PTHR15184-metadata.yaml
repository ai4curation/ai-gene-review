  name:
    name: ATPase alpha/beta chains
    short: ATPase_alpha/beta_chains
  description:
  - text: The ATPase alpha/beta chains family is characterized by its fundamental
      role in cellular energy metabolism. Members of this family are involved in the
      synthesis of adenosine triphosphate (ATP) from adenosine diphosphate (ADP) utilizing
      a proton gradient across a membrane. This process is essential for a wide range
      of cellular activities, as ATP serves as a universal energy currency in living
      organisms. The family includes ATP synthase subunits that form the catalytic
      core of F-type ATPases, which are found in various cellular locations including
      mitochondria, chloroplasts, and bacterial plasma membranes. These ATPases consist
      of multiple subunits, with the alpha and beta subunits constituting the catalytic
      core where ATP synthesis is coupled to proton translocation through a rotary
      mechanism of the central stalk subunits.
