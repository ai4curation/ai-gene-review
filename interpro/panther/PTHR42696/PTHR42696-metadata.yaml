  name:
    name: Class-II Aspartate Ammonia-Lyase
    short: Aspartate_Ammonia-Lyase
  description:
  - text: This family of proteins includes aspartate ammonia-lyases, which catalyze
      the reversible deamination of L-aspartate to fumarate and ammonia, an important
      reaction in the nitrogen metabolism of cells. Members of this family are involved
      in the biosynthesis and degradation of amino acids, playing a key role in the
      metabolic pathways that interconvert amino acids and nucleotide bases. These
      enzymes are characterized by their membership in the class-II fumarase/aspartase
      family, specifically within the aspartase subfamily, indicating a shared evolutionary
      origin and similar structural features that are critical for their enzymatic
      function.
