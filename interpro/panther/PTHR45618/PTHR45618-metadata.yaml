  name:
    name: Mitochondrial Metabolite Transporter
    short: Mito_Metabolite_Transporter
  description:
  - text: This family of proteins is involved in the transport of metabolites across
      the inner mitochondrial membrane. They function as carriers or antiporters,
      facilitating the exchange of substances such as inorganic anions, dicarboxylates,
      and tricarboxylates. Some members are implicated in thermogenic respiration,
      dissipating the proton gradient to generate heat instead of ATP, a process known
      as uncoupling. Others are involved in maintaining cellular redox balance, oxidative
      stress protection, and metabolic processes such as gluconeogenesis, fatty acid
      metabolism, and nitrogen metabolism. The activity of these proteins is regulated
      by various factors including pH, fatty acids, purine nucleotides, and reactive
      oxygen species.
