  name:
    name: Methylthioribose-1-phosphate isomerase
    short: MTR-1-P_isomerase
  description:
  - text: This family of proteins includes enzymes that are involved in the isomerization
      of specific phosphorylated sugars. The primary function of these enzymes is
      to catalyze the interconversion of methylthioribose-1-phosphate (MTR-1-P) and
      methylthioribulose-1-phosphate (MTRu-1-P), which is a key step in the methionine
      salvage pathway. This pathway recycles methylthioadenosine, a by-product of
      polyamine biosynthesis, back into methionine, an essential amino acid. Some
      members of this family also catalyze the isomerization of 5-deoxyribose 1-phosphate
      to 5-deoxyribulose 1-phosphate, a reaction that is part of a salvage pathway
      for 5-deoxyribose, a by-product of radical S-adenosylmethionine enzymes. The
      enzymes in this family exhibit strict substrate specificity and are crucial
      for maintaining cellular methionine levels and for the detoxification of certain
      by-products.
