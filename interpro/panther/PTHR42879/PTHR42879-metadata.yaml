  name:
    name: Short-chain dehydrogenases/reductases
    short: SDR
  description:
  - text: The Short-chain dehydrogenases/reductases (SDR) family encompasses enzymes
      that catalyze NAD(P)(H)-dependent redox reactions on a variety of substrates,
      including fatty acids, steroids, and aromatic compounds. Members of the SDR
      family are involved in key biosynthetic pathways, such as fatty acid elongation,
      where they reduce beta-ketoacyl-ACP substrates to beta-hydroxyacyl-ACP products,
      playing a crucial role in fatty acid biosynthesis. Other functions include the
      metabolism of bile acids, reduction of acetoacetyl-CoA in polyhydroxybutyrate
      biosynthesis, and modification of Nod factor fatty acyl chains. Some SDR enzymes
      are involved in antibiotic biosynthesis, such as novobiocin, or in the degradation
      of environmental pollutants. The family is characterized by a conserved catalytic
      motif and typically exhibits a Rossmann fold for binding the NAD(P) cofactor.
