  name:
    name: Plant innate immunity regulator
    short: Plant_immunity_regulator
  description:
  - text: This family of proteins is involved in plant innate immunity, particularly
      in the accumulation of salicylic acid, a key molecule in defense against biotrophic
      pathogens. Members of this family are implicated in the regulation of programmed
      cell death in response to pathogens and toxins. They also play a role in systemic
      acquired resistance, modulating defense gene expression and phytoalexin production.
      Additionally, these proteins participate in the response to abiotic stresses
      and contribute to the regulation of growth and development under stress conditions.
      They are associated with the regulation of leaf senescence and defense against
      insect herbivory, as well as root growth arrest and aerenchyma formation in
      hypoxic conditions.
