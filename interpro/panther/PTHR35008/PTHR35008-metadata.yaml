  name:
    name: Cytochrome c-type Dehydrogenase
    short: Cytochrome_c-type_DH
  description:
  - text: The Cytochrome c-type Dehydrogenase family comprises enzymes that are involved
      in various electron transfer processes. Members of this family function as integral
      components of multicomponent enzyme systems, catalyzing the oxidation of substrates
      such as ethanol, thiosulfate, and D-gluconate, and transferring electrons to
      electron acceptors like ubiquinone, tetrathionate, and others embedded in the
      membrane phospholipids. These proteins contain heme c groups that play a crucial
      role in the electron transfer chain. Some members are involved in the ethanol
      oxidase respiratory chain, producing acetic acid from ethanol oxidation, while
      others participate in the oxidation of thiosulfate to tetrathionate or D-gluconate
      to 2-dehydro-D-gluconate. Additionally, certain cytochrome c-type proteins function
      as electron donors in processes such as aerobic respiration and oxygenic photosynthesis.
