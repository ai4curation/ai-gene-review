  name:
    name: Blue-light signal transduction
    short: Blue-light_transduction
  description:
  - text: This family of proteins is involved in blue-light perception and signal
      transduction. Members of this family function as photoreceptors or light-activated
      kinases, regulating various physiological responses to light. These include
      the reversible formation of FMN-cysteine thiol adducts, activation of stress
      transcription factors, and modulation of bacterial virulence. Some proteins
      in this family also control flagella synthesis, exopolysaccharide production,
      biofilm formation, and competitive nodulation in response to light. Additionally,
      certain members possess light-dependent DNA-binding activity, with structural
      changes induced by light exposure affecting their ability to bind DNA and regulate
      gene expression. This family plays a crucial role in light-regulated processes
      across different organisms.
