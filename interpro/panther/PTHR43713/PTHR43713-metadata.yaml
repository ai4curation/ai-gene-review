  name:
    name: Glutamate-1-semialdehyde 2,1-aminomutase
    short: GSA_aminomutase
  description:
  - text: The protein family includes enzymes that catalyze the transamination of
      glutamate 1-semialdehyde (GSA) to 5-aminolevulinate (ALA), a key step in the
      biosynthesis of tetrapyrroles. These enzymes are class-III pyridoxal-phosphate-dependent
      aminotransferases, specifically belonging to the HemL subfamily. They are involved
      in the metabolic pathway that leads to the production of important biomolecules
      such as chlorophyll, heme, and vitamin B12. The family exhibits a broad substrate
      range and includes enzymes like neamine transaminase involved in antibiotic
      biosynthesis. Members of this family are found in a wide range of organisms,
      including bacteria, archaea, and plants, highlighting their fundamental role
      in cellular metabolism.
