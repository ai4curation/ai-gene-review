  description:
  - text: This family of proteins includes members that are part of two-component
      regulatory systems, which are typically involved in response to environmental
      stimuli. These proteins function as response regulators that receive signals
      from associated sensor kinases and effect changes in gene expression, typically
      to adapt to varying conditions. The family encompasses proteins that regulate
      processes such as methanogenesis, a biological pathway in certain microorganisms
      that produce methane, as well as other cellular responses to environmental changes.
