  name:
    name: D-isomer specific 2-hydroxyacid dehydrogenases
    short: D-2-hydroxyacid_DH
  description:
  - text: This family of proteins includes enzymes that catalyze the reversible oxidation
      of various 2-hydroxyacids. Members of this family are involved in metabolic
      pathways such as the phosphorylated L-serine biosynthesis pathway, where they
      convert 3-phospho-D-glycerate to 3-phosphonooxypyruvate. Some enzymes also act
      on 2-hydroxyglutarate, converting it to 2-oxoglutarate. Additionally, certain
      members are involved in the degradation of L-serine via 3-hydroxypyruvate, reducing
      it to D-glycerate. Others participate in the (R,S)-sulfolactate degradation
      pathway, specifically acting on the (S)-enantiomer of 3-sulfolactate and converting
      sulfopyruvate to sulfolactate. These enzymes are characterized by their specificity
      for the D-isomer of the substrate and typically require NAD as a cofactor for
      their dehydrogenase activity.
