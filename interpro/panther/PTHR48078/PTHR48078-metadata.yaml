  name:
    name: Serine/Threonine Dehydratase
    short: Ser/Thr_Dehydratase
  description:
  - text: The serine/threonine dehydratase family is characterized by enzymes that
      catalyze the dehydration of serine and threonine to their respective alpha-keto
      acids, often as part of amino acid catabolism or biosynthesis. Members of this
      family are involved in the anaerobic formation of alpha-ketobutyrate and ammonia
      from threonine through a two-step reaction involving dehydration and nonenzymatic
      hydrolysis of enamine/imine intermediates. Some members are regulated allosterically
      by compounds such as isoleucine, valine, and AMP, and may have additional regulatory
      domains influencing their activity. The family includes D-serine dehydratases,
      which specifically act on D-serine, and L-threonine dehydratases, which are
      involved in isoleucine biosynthesis. These enzymes play crucial roles in nitrogen
      metabolism and are found across various organisms, including bacteria, plants,
      and animals.
