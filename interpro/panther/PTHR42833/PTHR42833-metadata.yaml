  name:
    name: Uridylate kinase
    short: UMP_kinase
  description:
  - text: The UMP kinase family encompasses enzymes that catalyze the reversible phosphorylation
      of UMP to UDP, utilizing ATP as the most efficient phosphate donor. These kinases
      play a crucial role in pyrimidine nucleotide biosynthesis, which is fundamental
      for DNA and RNA synthesis in living organisms. Members of this family are typically
      allosterically activated by GTP, although some exceptions exist. UTP acts as
      an inhibitor for these enzymes, often through competitive inhibition mechanisms.
      This regulatory balance is essential for maintaining nucleotide pool homeostasis
      within the cell. The family includes variants that can also phosphorylate other
      nucleotides such as dUMP or are not activated by GTP, highlighting the diversity
      within this group of enzymes.
