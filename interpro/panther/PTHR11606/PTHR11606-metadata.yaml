  name:
    name: Glutamate/Leucine/Phenylalanine/Valine Dehydrogenases
    short: Glu/Leu/Phe/Val_DH
  description:
  - text: The Glu/Leu/Phe/Val dehydrogenases family comprises enzymes that play crucial
      roles in amino acid metabolism, particularly in the deamination and amination
      of glutamate. Members of this family are involved in the conversion of L-glutamate
      to alpha-ketoglutarate and ammonia, intersecting carbon and nitrogen metabolic
      pathways. They are key in processes such as neurotransmitter recycling, especially
      for glutamate in neurotransmission, and in glutamine anaplerosis, producing
      alpha-ketoglutarate for the tricarboxylic acid cycle. Some family members are
      also involved in insulin homeostasis and may influence learning and memory by
      modulating glutamate turnover. These enzymes show varying specificity for NAD(+)/NADH
      or NADP(+)/NADPH as coenzymes and are subject to allosteric regulation, with
      activators including ADP and inhibitors such as GTP, ATP, and SIRT4.
