  name:
    name: ABC transporter permease HisMQ subfamily
    short: ABC_transp_permease_HisMQ
  description:
  - text: This family of proteins is involved in the transport of various amino acids
      and related compounds across cellular membranes. They are part of the ABC transporter
      complex, which typically includes multiple subunits that work together to translocate
      substrates. These proteins are likely responsible for the movement of substances
      such as arginine, histidine, lysine, ornithine, octopine, and nopaline. They
      function by coupling the energy derived from ATP hydrolysis to the active transport
      of these molecules, facilitating their uptake into the cell. The proteins in
      this family are characterized by their role in signaling and substrate translocation,
      which is essential for nutrient acquisition and various metabolic processes.
