  name:
    name: Mitochondrial import receptor TOM70
    short: TOM70
  description:
  - text: This family of proteins is involved in the recognition and translocation
      of cytosolically synthesized mitochondrial preproteins. They function as components
      of the translocase of the outer mitochondrial membrane (TOM) receptor complex,
      facilitating the movement of preproteins into the mitochondrial matrix. These
      proteins act in a chaperone-dependent manner to mediate the import of mitochondrial
      precursor proteins. Some members are also implicated in antiviral responses
      by mediating the activation of TBK1 and IRF3 in response to virus infection.
