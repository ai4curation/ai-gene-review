  name:
    name: Complex I Subunit 6
    short: Complex_I_Subunit6
  description:
  - text: The Complex I Subunit 6 family comprises core subunits of respiratory chain
      NADH dehydrogenases, which are essential for catalysis in mitochondrial and
      bacterial electron transport systems. Members of this family function in transferring
      electrons from NADH to quinones, such as ubiquinone or plastoquinone, through
      FMN and iron-sulfur (Fe-S) centers. This electron transfer is coupled with proton
      translocation across membranes, conserving redox energy in a proton gradient
      that drives ATP synthesis. Some variants, like those found in chloroplasts,
      may participate in photosynthetic chains or chloroplast respiratory chains.
      The family also includes proteins involved in the F(420)H(2) dehydrogenase system
      in methanogens, which oxidize F(420)H(2) to various quinones, contributing to
      energy conservation in these organisms.
