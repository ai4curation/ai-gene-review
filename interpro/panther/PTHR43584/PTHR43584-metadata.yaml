  name:
    name: Bacterial Cell Wall Biosynthesis and Recycling
    short: Bact_CellWall_BiosynthRecyc
  description:
  - text: The protein family is involved in the biosynthesis and recycling of bacterial
      cell wall components, particularly in the formation of UDP-N-acetylmuramate
      and UDP-N-acetylglucosamine, which are key precursors in peptidoglycan synthesis.
      Members of the family exhibit bifunctional enzymatic activities, including acetyltransferase
      and nucleotidylyltransferase, working on various amino-sugar-1-phosphates. They
      play roles in peptidoglycan recycling, bypassing de novo synthesis pathways,
      and contribute to intrinsic resistance to antibiotics like fosfomycin. Some
      family members are also involved in the synthesis of organic solutes in thermophilic
      microorganisms and the assembly of complex polysaccharides in bacterial surface
      structures.
