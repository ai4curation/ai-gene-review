  name:
    name: Cystatin family cysteine protease inhibitors
    short: Cystatin
  description:
  - text: The cystatin family comprises cysteine protease inhibitors that play a crucial
      role in regulating proteolytic activities of cysteine proteinases. These inhibitors
      are involved in various physiological processes, including immune response modulation,
      antimicrobial activity, and protection against proteases in the oral cavity
      and other tissues. Members of the family inhibit enzymes such as cathepsins
      B, H, L, S, and papain, and are thought to serve as local regulators of enzyme
      activity. Some cystatins have specialized functions, such as contributing to
      successful feeding in ticks by suppressing host immune responses, or inducing
      chondrocyte maturation in endochondral ossification without thiol protease inhibitor
      activity.
