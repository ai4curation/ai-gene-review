  name:
    name: Auxin Efflux Carrier
    short: Auxin_Efflux_Carrier
  description:
  - text: This family of proteins is involved in the transport of small molecules
      across cellular membranes. Members of this family function as auxin efflux carriers,
      which are integral to the process of auxin transport, a key plant hormone involved
      in the regulation of growth and development. These proteins likely play a role
      in establishing auxin gradients within plant tissues, influencing cell elongation,
      division, and differentiation. Although primarily studied in plants, the presence
      of these proteins in various organisms suggests a broader functional scope,
      potentially including the transport of other structurally similar molecules.
