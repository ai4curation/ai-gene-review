  name:
    name: "Aromatic Compound Catabolism and Electron Transfer  \n"
    short: 'AromCatET

      '
  description:
  - text: This protein family comprises members implicated in the degradation of aromatic
      compounds via catalytic conversion and electron transfer reactions. In particular,
      the hqdf gene product is a conserved component of a hydroquinone catabolic pathway
      involved in the sequential breakdown of intermediates such as hydroquinone,
      . The pnpx2-encoded protein is predicted to function as a ferredoxin, mediating
      electron transfer during the oxidative catabolism of compounds such as ibuprofen
      . Additionally, the bn5_0954 product contains a Rieske centre, suggesting a
      role in redox chemistry and regulation of metabolic adjustments .
