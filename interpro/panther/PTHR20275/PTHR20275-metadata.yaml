  name:
    name: NAD/NADP kinase
    short: NAD_NADP_kinase
  description:
  - text: NAD kinases are pivotal enzymes that regulate the intracellular balance
      of NAD and NADP, crucial coenzymes in redox reactions. They catalyze the phosphorylation
      of the 2'-hydroxyl of the adenosine moiety in NAD to form NADP, using ATP or
      other nucleoside triphosphates as phosphoryl donors. This reaction is key for
      the biosynthesis of NADP, which is essential for various metabolic pathways,
      including the oxidative pentose phosphate pathway and chlorophyll synthesis.
      NADP serves as a cellular reductant in antioxidant defense and is involved in
      chloroplast protection against oxidative damage. Some family members also display
      NADH kinase activity, contributing to the cellular pool of NADPH, another important
      antioxidant factor. The family includes bifunctional enzymes that can both phosphorylate
      and dephosphorylate NAD and NADP, thus preventing excess accumulation of NADP
      and maintaining cellular redox homeostasis.
