  name:
    name: Cation Diffusion Facilitator Transporter
    short: CDF_Transporter
  description:
  - text: The Cation Diffusion Facilitator (CDF) family is involved in the transport
      of divalent metal cations across cellular membranes to maintain metal homeostasis.
      Members of this family function as efflux pumps, exporting excess metal ions
      such as Zn(2+), Cd(2+), and Fe(2+) from the cytoplasm, thereby playing a crucial
      role in metal detoxification. Some members are also involved in the sequestration
      of metals into vacuoles or are part of systems like magnetosome formation, which
      requires the transport and biomineralization of iron. The activity of these
      transporters can be regulated by metal binding, which may induce conformational
      changes affecting the transport mechanism.
