  name:
    name: Outer membrane lipoprotein DolP
    short: Lipoprotein_DolP
  description:
  - text: The DolP lipoprotein family is characterized by its role in maintaining
      the integrity of the outer membrane in various bacteria. Members of the DolP
      family are known to contribute to the proper folding and function of BamA, particularly
      under stress conditions affecting the envelope. They exhibit a specific affinity
      for anionic phospholipids through their BON domains, which is crucial for their
      localization to the cell division site and their functional role. While initially
      thought to be regulators of the amidase activator NlpD, later studies have indicated
      that their influence on cell division and daughter cell separation may not be
      through direct regulation of NlpD. In some species, such as Salmonella typhimurium,
      DolP proteins are also implicated in virulence.
