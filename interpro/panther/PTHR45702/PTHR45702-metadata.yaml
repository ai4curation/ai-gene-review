  name:
    name: Disintegrin and Metalloproteinase Domain-Containing
    short: ADAM_Metalloproteinase
  description:
  - text: The Disintegrin and metalloproteinase domain-containing (ADAM) protein family
      includes transmembrane metalloproteases involved in the ectodomain shedding
      of various transmembrane proteins, including cytokines, adhesion proteins, and
      growth factor precursors. These proteases are essential for development, tissue
      homeostasis, and cell signaling. They play roles in the proteolytic release
      of cell-surface proteins such as TNF-alpha, interleukin receptors, and Notch,
      influencing pathways like inflammation, hemostasis, and neurogenesis. Some family
      members are involved in the regulation of cell fate decisions during development
      by modulating signaling pathways such as Notch. They are regulated by propeptide
      domains via a cysteine switch mechanism and interact with tetraspanins for substrate
      selectivity and cellular trafficking.
