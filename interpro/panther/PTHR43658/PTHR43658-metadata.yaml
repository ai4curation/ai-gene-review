  name:
    name: Short-chain dehydrogenases/reductases
    short: SDR
  description:
  - text: The Short-chain dehydrogenases/reductases (SDR) family comprises enzymes
      with versatile activities, including various dehydrogenase and reductase functions.
      Members of the SDR family are involved in the metabolism of fatty acids, steroids,
      and branched-chain amino acids. They participate in essential biological processes
      such as the beta-oxidation of fatty acids, a crucial energy-yielding pathway.
      Some SDR enzymes exhibit hydroxysteroid dehydrogenase activity, playing roles
      in steroid hormone and bile acid metabolism. They can also be involved in the
      biosynthesis of mycotoxins and pheromones, as well as in the maturation of tRNAs
      within mitochondria. The family includes enzymes like 3-hydroxyacyl-CoA dehydrogenase,
      2,4-dienoyl-CoA reductase, and 17-beta-hydroxysteroid dehydrogenase, reflecting
      the diversity of substrates and reactions catalyzed by these proteins. The SDR
      family is characterized by their ability to bind NAD(P)(H) cofactors, which
      are essential for their oxidoreductase activities.
