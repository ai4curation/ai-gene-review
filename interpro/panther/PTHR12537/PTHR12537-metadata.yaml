  name:
    name: Pumilio RNA-binding
    short: Pumilio_RNA-bd
  description:
  - text: The Pumilio homolog family comprises RNA-binding proteins that regulate
      gene expression post-transcriptionally. Members of this family bind to specific
      sequences in the 3'-UTR of target mRNAs, controlling their translation and stability.
      The family is characterized by the presence of pumilio repeats, which form a
      right-handed superhelix structure that mediates RNA association. This structure
      binds RNA on its concave side, with each repeat recognizing a single nucleotide.
      Specificity for RNA bases is achieved through base-specific interactions involving
      key residues within the repeats. The family plays diverse roles, including repressing
      mRNA targets to maintain genomic stability, regulating stem cell proliferation
      and differentiation, facilitating miRNA regulation, and participating in cytoplasmic
      viral infection responses. Some members also localize mRNAs encoding mitochondrial
      proteins for translation near mitochondria, influencing mitochondrial biogenesis
      and function.
