  name:
    name: Cobalt-precorrin-5A hydrolase
    short: CbiG_hydrolase
  description:
  - text: This family of proteins is involved in the biosynthesis of cobalamin (vitamin
      B12), where they play a crucial role by catalyzing a specific hydrolysis step.
      Members of this family are responsible for the hydrolysis of the ring A acetate
      delta-lactone of cobalt-precorrin-5A. This reaction results in the removal of
      the C-20 carbon along with its attached methyl group, which is released as acetaldehyde.
      This step is essential in the transformation of cobalt-precorrin-5A into cobalt-precorrin-6A,
      a precursor in the biosynthetic pathway leading to the formation of cobalamin.
      The enzymatic activity of these proteins is critical for the proper progression
      of the cobalamin biosynthetic pathway.
