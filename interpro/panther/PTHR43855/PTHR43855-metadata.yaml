  name:
    name: Thiosulfate sulfurtransferase domain-containing protein
    short: Thiosulfate_sulfurtransferase
  description:
  - text: This family of proteins is involved in sulfur metabolism, specifically in
      the transfer of sulfur from thiosulfate to other molecules. Members of this
      family typically contain two rhodanese domains, although only the C-terminal
      domain harbors the catalytic cysteine residue essential for activity. These
      proteins may function as sulfotransferases, facilitating the formation of thiosulfate,
      or in some cases, converting cyanide to thiocyanate, which is less toxic. This
      detoxification process is important for the survival of certain bacteria under
      cyanogenic conditions. Additionally, some members are implicated in the modification
      of tRNA molecules by contributing to the thiolation of specific uridine residues,
      which is a crucial post-transcriptional modification.
