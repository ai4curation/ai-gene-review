  name:
    name: Alpha-ketoacid dehydrogenase complex E1 component
    short: Alpha-ketoacid_DH_E1_comp
  description:
  - text: The protein family includes enzymes that are part of multi-component complexes
      responsible for the oxidative decarboxylation of alpha-keto acids. These enzymes
      play a crucial role in energy production by converting alpha-keto acids derived
      from branched-chain amino acids like valine, leucine, and isoleucine into acyl-CoA
      and CO2. The family encompasses the E1 subunit of the mitochondrial branched-chain
      alpha-ketoacid dehydrogenase (BCKD) complex, as well as the pyruvate dehydrogenase
      complex, which converts pyruvate to acetyl-CoA and CO2. The E1 subunit specifically
      catalyzes the decarboxylation of the alpha-ketoacid and forms an enzyme-product
      intermediate, which is then processed by the E2 subunit. Some members also exhibit
      branched-chain 2-oxoacid dehydrogenase activity.
