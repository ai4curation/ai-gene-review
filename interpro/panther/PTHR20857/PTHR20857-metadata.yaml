  name:
    name: Thiamine-phosphate synthase
    short: Thiamine-P_synthase
  description:
  - text: The thiamine-phosphate synthase family is responsible for a crucial step
      in the biosynthesis of thiamine (vitamin B1), which is an essential cofactor
      for various enzymes in metabolism. Members of this family catalyze the condensation
      of 4-methyl-5-(beta-hydroxyethyl)thiazole monophosphate (THZ-P) with 2-methyl-4-amino-5-hydroxymethyl
      pyrimidine pyrophosphate (HMP-PP) to form thiamine monophosphate (TMP). This
      reaction is a key part of the thiamine biosynthetic pathway, linking the separately
      synthesized THZ and HMP moieties. Thiamine is subsequently phosphorylated to
      produce thiamine diphosphate, the active form of the vitamin, which is involved
      in several enzyme complexes, including those critical for carbohydrate and amino
      acid metabolism. The activity of thiamine-phosphate synthase is essential for
      the survival of organisms that rely on thiamine biosynthesis rather than dietary
      intake.
