  name:
    name: Methionine Synthase/Corrinoid
    short: Met_Synthase/Corrinoid
  description:
  - text: The Methionine Synthase and Corrinoid Protein family encompasses enzymes
      that are involved in the transfer of methyl groups in various biological processes.
      Methionine synthases catalyze the transfer of a methyl group from methyl-cobalamin
      or methyltetrahydrofolate to homocysteine, producing methionine, an essential
      amino acid. These enzymes are modular, containing distinct domains for substrate
      binding and activity, including the Hcy-binding, pterin-binding, B12-binding,
      and AdoMet activation domains. Other family members act as methyl group carriers
      in methanogenesis and the degradation of quaternary amines, transferring methyl
      groups between different proteins or to tetrahydrofolate, contributing to carbon
      dioxide fixation or anaerobic respiration. The family is characterized by the
      presence of corrinoid prosthetic groups and is involved in pathways such as
      the Wood-Ljungdahl pathway and the metabolism of various amine compounds.
