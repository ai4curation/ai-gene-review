  - text: This family of proteins includes late-developmental spore coat components.
      Members are involved in the formation of the protective layer that surrounds
      spores, which are a dormant form of the organism that can survive in harsh conditions.
      The protein contributes to the resilience and viability of the spore during
      periods when the organism is not actively growing.
