  name:
    name: CBASS antivirus and pafABC operon-associated protein
    short: CBASS_pafABC_assoc_protein
  description:
  - text: This family of proteins includes transcriptional regulators and proteins
      that are part of operons but are not directly involved in pupylation or substrate
      degradation. Some members function as DNA-binding transcriptional repressors
      in CBASS antivirus systems, which provide immunity against bacteriophage infections
      by synthesizing cyclic nucleotides that activate effectors leading to bacterial
      cell death. These proteins typically have an N-terminal winged HTH domain, a
      central WYL domain, and a C-terminal WCX domain, with the WYL domain forming
      swapped domains between subunits. Other members are part of the pafABC operon
      and are implicated in resistance to reactive nitrogen intermediates, although
      their exact roles in this process are not clear.
