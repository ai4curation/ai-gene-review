  name:
    name: Bacterial polyamine transport
    short: Bact_polyamine_transpt
  description:
  - text: The PotD/PotF protein family is involved in the bacterial periplasmic transport
      system, primarily for the uptake of polyamines such as putrescine, spermidine,
      cadaverine, and agmatine. Members of the family function as solute-binding proteins
      that are essential components of ABC transporter complexes. They exhibit high-affinity
      binding to specific polyamines, triggering conformational changes that facilitate
      the transport of these molecules into the cell. This transport is crucial for
      maintaining optimal intracellular concentrations of polyamines, which are necessary
      for cell growth and function. Some family members also play roles in biofilm
      formation, virulence through the induction of type 3 secretion systems, and
      natural transformation by binding to DNA. The family includes proteins with
      additional functions, such as norspermidine sensing and polyhydroxybutyrate
      synthesis.
