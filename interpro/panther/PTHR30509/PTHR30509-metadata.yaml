  name:
    name: Aromatic acid exporter ArAE
    short: ArAE_aromatic_acid_exporter
  description:
  - text: The aromatic acid exporter ArAE family comprises membrane proteins involved
      in the efflux of aromatic acids from bacterial cells. Members of this family
      form efflux pumps, typically with a partner protein, to remove compounds that
      accumulate to toxic levels, acting as a metabolic relief valve. The efflux system
      helps maintain cellular homeostasis by exporting specific substrates such as
      p-hydroxybenzoic acid, 6-hydroxy-2-naphthoic acid, and 2-hydroxycinnamate, thus
      contributing to bacterial resistance against certain environmental stresses.
