  name:
    name: Glycosyl Hydrolase Family 39
    short: Glycosyl_Hydrolase_39
  description:
  - text: The glycosyl hydrolase 39 family encompasses enzymes with diverse functions
      including the degradation of glycosaminoglycans and the hydrolysis of xylo-oligosaccharides.
      Members of the family such as beta-xylosidases are involved in the breakdown
      of xylan into xylose units, playing a role in the utilization of plant biomass.
      Other members, like alpha-L-iduronidases, are lysosomal hydrolases essential
      for the degradation of heparan sulfate and dermatan sulfate, crucial for lysosome
      function, autophagy, and the maintenance of various cellular and organ functions.
      Mutations in alpha-L-iduronidase can lead to lysosomal storage disorders, highlighting
      the importance of this family in human health.
