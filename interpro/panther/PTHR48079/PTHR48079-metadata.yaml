  name:
    name: NAD(P)-dependent Metabolic Enzyme
    short: NAD(P)-dependent_Enzyme
  description:
  - text: This family of proteins includes enzymes that are involved in various metabolic
      processes, including the biosynthesis of sterols, antibiotics, and other bioactive
      molecules. Members of this family are characterized by their dependence on NAD(P)(+)
      as a cofactor, performing functions such as oxidative decarboxylation, reduction,
      and dehydration reactions. These proteins are implicated in the modification
      of steroid molecules, the conversion of aurachins, and the biosynthesis of complex
      compounds like UCS1025A, which has antibacterial and antitumor properties. The
      family also includes enzymes that participate in the conversion of antibiotics,
      contributing to their bioactivation. The diverse enzymatic activities within
      this family reflect a broad functional repertoire, with each member playing
      a specific role in cellular metabolism and the biosynthesis of secondary metabolites.
