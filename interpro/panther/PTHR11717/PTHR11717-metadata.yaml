  name:
    name: Low Molecular Weight Phosphotyrosine Protein Phosphatase
    short: LMW_PTPase
  description:
  - text: The Low Molecular Weight Phosphotyrosine Protein Phosphatase family comprises
      enzymes that dephosphorylate phosphotyrosine residues in proteins, playing a
      role in various cellular processes. Members of this family are involved in the
      regulation of cell signaling pathways by acting on tyrosine-phosphorylated proteins
      and low molecular weight aryl phosphates. Some members are implicated in bacterial
      virulence, aiding in survival within host macrophages by modulating host immune
      responses and phagosome maturation. Others are involved in the synthesis and
      export of polysaccharides, contributing to bacterial virulence factors and stress
      resistance. Additionally, certain members dephosphorylate phosphoarginine residues,
      counteracting protein arginine kinases and influencing gene expression and protein
      activity. The family's activity is regulated by various inhibitors, including
      sulfhydryl reagents, metal ions, and competitive inhibitors like vanadate.
