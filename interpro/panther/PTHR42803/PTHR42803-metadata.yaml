  name:
    name: Diverse substrate specificity acyl-CoA dehydrogenase
    short: Diverse_Acyl-CoA_DH
  description:
  - text: This family of proteins includes acyl-CoA dehydrogenases with diverse substrate
      specificities, including broad-specificity enzymes that prefer long-chain substrates
      and those involved in specific metabolic pathways. Members are key in various
      biochemical processes, such as the oxidation of fatty acids and the assimilation
      of carbon from marine phytoplankton compounds. They catalyze the dehydrogenation
      of acyl-CoA derivatives to enoyl-CoA, playing a pivotal role in fatty acid beta-oxidation
      and other metabolic pathways. Some family members are implicated in syntrophic
      butyrate oxidation, converting butanoyl-CoA to crotonyl-CoA and transferring
      electrons to electron-transfer flavoproteins.
