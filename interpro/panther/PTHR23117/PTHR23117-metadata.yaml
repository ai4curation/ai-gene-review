  name:
    name: Guanylate kinase
    short: Guanylate_kinase
  description:
  - text: The guanylate kinase family proteins are key enzymes involved in the nucleotide
      salvage pathways, which are critical for cellular energy homeostasis and DNA/RNA
      synthesis. They catalyze the ATP-dependent phosphorylation of guanosine monophosphate
      (GMP) to guanosine diphosphate (GDP), a reaction essential for recycling GMP
      and indirectly, cyclic GMP (cGMP). This enzymatic activity is crucial for maintaining
      the balance of nucleotide pools within the cell. Some family members are also
      implicated in the metabolism of cGMP in photoreceptors, affecting vision processes.
      Additionally, guanylate kinases play a role in the activation of certain antiviral
      and anticancer prodrugs, converting them into pharmacologically active metabolites.
      The family includes variants that are involved in chloroplast development and
      differentiation processes in plants.
