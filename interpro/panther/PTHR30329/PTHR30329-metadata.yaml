  name:
    name: Bacterial Outer Membrane Structural/Functional
    short: Bact_OuterMem_StrucFunc
  description:
  - text: The protein family is involved in various functions related to the structural
      integrity and function of the bacterial outer membrane. Members of the family
      play roles in maintaining the position of the peptidoglycan cell wall within
      the periplasm, acting as porins with low permeability for small solutes, and
      participating in cell division processes. Some proteins within the family are
      part of the Tol-Pal system, crucial for outer membrane invagination during cell
      division and outer membrane integrity. Others are involved in bacterial motility,
      forming part of the flagellar motor complex, or in antiviral defense systems.
      Additionally, certain members function in cell adhesion, biofilm formation,
      and resistance to environmental stress, including phage and colicin sensitivity.
      The family also includes proteins that may have roles in transport, ammonia
      secretion, and apoptosis induction in host cells.
