  name:
    name: Glutamate Synthase
    short: Glutamate_Synthase
  description:
  - text: This family of proteins includes enzymes that catalyze the synthesis of
      glutamate from glutamine and 2-oxoglutarate, a key step in nitrogen metabolism.
      These enzymes are typically NADPH-dependent and play a crucial role in the assimilation
      of ammonia. They are found across various domains of life, including archaea
      and bacteria, and are essential for the recycling of nitrogen into an organic
      form that can be used for the synthesis of amino acids and other nitrogenous
      compounds.
