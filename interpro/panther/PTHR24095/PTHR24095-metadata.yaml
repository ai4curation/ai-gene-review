  name:
    name: ATP-dependent AMP-binding enzyme
    short: ATP-dep_AMP-bind_enzyme
  description:
  - text: The ATP-dependent AMP-binding enzyme family is responsible for the activation
      of various substrates by adenylation, facilitating subsequent reactions in metabolic
      pathways. Members of this family, such as acetyl-coenzyme A synthetases (AcsA),
      play a crucial role in energy metabolism by converting acetate into acetyl-CoA,
      an essential intermediate at the junction of anabolic and catabolic pathways.
      The reaction involves a two-step process where the enzyme first combines acetate
      with ATP to form an acetyl-adenylate intermediate, followed by the transfer
      of the acetyl group to the sulfhydryl group of CoA, resulting in the production
      of acetyl-CoA. This conversion is vital for the utilization of acetate in the
      TCA cycle for energy production and biosynthetic processes, including lipid
      synthesis and histone acetylation. Some family members also exhibit broader
      substrate specificity, accepting short-chain fatty acids like propionate.
