  description:
  - text: The glycosyltransferase 28 family is involved in the transfer of sugar moieties
      from activated sugar donors to specific acceptor molecules, forming glycosidic
      bonds. Members of this family play key roles in various biological processes,
      including the biosynthesis of antibiotics such as anthracyclines, macrolides,
      and glycopeptide antibiotics, which are critical in cancer chemotherapy and
      as antimicrobial agents. They are also responsible for the glycosylation of
      sterols, forming sterol glucosides, which are important for cellular processes
      like autophagy and membrane stability. Some members exhibit broad substrate
      specificity, contributing to the detoxification of xenobiotics and the biosynthesis
      of complex natural products with potential pharmacological activities.
