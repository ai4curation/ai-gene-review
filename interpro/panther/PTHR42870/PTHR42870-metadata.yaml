  name:
    name: Lipid metabolism and transfer protein
    short: Lipid_metab-transfer_prot
  description:
  - text: This family of proteins is involved in various lipid and sterol metabolic
      processes. Members of this family play roles in the degradation of cholesterol
      side chains, bile acid intermediates, and branched-chain fatty acids, often
      through peroxisomal beta-oxidation pathways. Some proteins within this family
      are also implicated in the transfer of lipids such as phospholipids, cholesterol,
      and gangliosides between cellular membranes, which may influence processes like
      steroidogenesis and phospholipid synthesis. Additionally, certain members are
      capable of binding fatty acids and acyl-CoA derivatives, contributing to lipid
      metabolism and signaling. The family includes enzymes that perform retroaldol
      cleavage reactions on specific substrates, producing steroid precursors and
      acyl-CoA derivatives. The proteins share a common structural motif, indicating
      a similarity to the thiolase-like superfamily.
