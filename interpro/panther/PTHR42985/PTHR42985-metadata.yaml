  description:
  - text: The Sodium:Solute Symporter (SSF) family is involved in the electrogenic
      transport of various substrates across cell membranes, utilizing a sodium gradient
      as the driving force. Members of this family transport a diverse range of molecules,
      including multivitamins (biotin, pantothenate), monocarboxylates (lactate, pyruvate,
      short-chain fatty acids), and inorganic ions (iodide, chloride, bromide, nitrate).
      The transport process is typically coupled to the co-transport of sodium ions,
      often with specific stoichiometries, which can be either 2:1 or 4:1 Na+:substrate.
      This family plays essential roles in nutrient uptake in the intestine, maintaining
      intestinal mucosa integrity, thyroid function through iodide transport, and
      energy status in neurons by transporting ketone bodies and lactate. Some members
      also have a regulatory role in cancer cell proliferation.
