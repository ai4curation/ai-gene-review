  name:
    name: Collagen-modifying leprecan protein
    short: Collagen_mod_leprecan
  description:
  - text: This family of proteins is involved in the post-translational modification
      of collagen, specifically in the hydroxylation of prolyl and lysine residues
      within collagen alpha chains. These modifications are crucial for the proper
      assembly and cross-linking of collagen fibrils, which are essential for maintaining
      the structural integrity of various connective tissues. Members of this family
      are part of a complex that includes enzymes such as PLOD1, P3H3, and P3H4, and
      are necessary for normal bone density and skin stability.
