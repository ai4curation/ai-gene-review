  name:
    name: Hybrid Signal Transduction Histidine Kinase
    short: Hybrid_Histidine_Kinase
  description:
  - text: This family of proteins participates in signal transduction pathways as
      receptor histidine kinases. They are characterized by an ATP-dependent autophosphorylation
      on a conserved histidine residue within the kinase core. Following autophosphorylation,
      a phosphoryl group is transferred to a conserved aspartate residue in the receiver
      domain. Members of this family exhibit an atypical domain architecture, including
      a STYKc/AAA module coupled with a histidine kinase/receiver module. They are
      part of the protein kinase superfamily and are related to serine/threonine protein
      kinases.
