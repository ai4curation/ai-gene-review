  name:
    name: Polyphosphate kinase 2
    short: PPK2
  description:
  - text: The polyphosphate kinase 2 (PPK2) family comprises enzymes that utilize
      inorganic polyphosphate (polyP) as a phosphate donor to phosphorylate various
      nucleoside diphosphates (NDPs) to their corresponding nucleoside triphosphates
      (NTPs), such as converting ADP to ATP or GDP to GTP. Members of the PPK2 family
      can also catalyze the reverse reaction, synthesizing polyP from ATP or GTP.
      The family includes several subfamilies, with some members showing specificity
      for certain nucleotides or possessing additional domains that may influence
      activity or dimerization. The enzymes play crucial roles in cellular energy
      metabolism and are important for the survival of various organisms, including
      pathogenic bacteria, by maintaining nucleotide pools and energy charge.
