  name:
    name: UDP-glycosyltransferase
    short: UDP-glycosyltransferase
  description:
  - text: The UDP-glycosyltransferase family is involved in the transfer of sugar
      moieties from activated donor molecules, such as UDP-glucose, to specific acceptor
      molecules, which can be various substances including hormones, secondary metabolites,
      and xenobiotics. Members of this family play key roles in plant metabolism and
      defense, including pigmentation, detoxification, and biosynthesis of various
      compounds like anthocyanins, glucosinolates, and saponins. They are also implicated
      in the modification of plant hormones, affecting growth and stress responses.
