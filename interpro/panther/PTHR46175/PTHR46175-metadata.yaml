  name:
    name: Adagio-like circadian regulator
    short: Adagio-like_regulator
  description:
  - text: This family of proteins includes components of E3 ubiquitin ligase complexes
      that are central to blue light-dependent circadian rhythms. They act as blue
      light photoreceptors with FMN as a chromophore, mediating the degradation of
      key circadian clock components by targeting them to the proteasome. These proteins
      are involved in various circadian clock-dependent processes such as flowering
      time transition, hypocotyl elongation, and leaf movement rhythms. They form
      complexes with other proteins to regulate gene expression relevant to the circadian
      clock and developmental timing. The family is characterized by a shared domain
      structure that allows them to perform these functions across different plant
      species.
