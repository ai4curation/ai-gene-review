  name:
    name: Cytochrome P450 monooxygenase
    short: Cytochrome_P450_monoxygenase
  description:
  - text: The Cytochrome P450 family encompasses a diverse group of heme-thiolate
      monooxygenases that participate in the metabolism of a wide array of endogenous
      and exogenous substrates. Members of this family are involved in the biosynthesis
      of steroid hormones, including corticoids and androgens, by catalyzing hydroxylation
      reactions and subsequent bond cleavages. They also play a crucial role in the
      metabolism of fatty acids, vitamins, and xenobiotics, including drugs and pollutants.
      These enzymes exhibit high catalytic activity in the formation of hydroxyestrogens
      from estrone and estradiol, as well as in the epoxidation of polyunsaturated
      fatty acids, contributing to the synthesis of lipid mediators in the vascular
      system. Additionally, they are implicated in the biosynthesis of all-trans retinoic
      acid and the metabolism of eicosanoids. The family includes enzymes with specific
      functions such as cheilanthifoline and salutaridine synthases, involved in the
      biosynthesis of isoquinoline alkaloids.
