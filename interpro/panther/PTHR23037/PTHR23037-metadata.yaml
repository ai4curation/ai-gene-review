  name:
    name: Type I Cytokine Receptor
    short: Type_I_Cytokine_Rcpt
  description:
  - text: The Type I Cytokine Receptor family includes receptors for various interleukins,
      growth hormone, erythropoietin, and thrombopoietin, among others. These receptors
      are characterized by the presence of conserved motifs such as the WSXWS motif,
      necessary for proper folding and transport, and the box 1 motif, essential for
      JAK interaction and activation. Family members play crucial roles in immune
      response, hematopoiesis, and growth regulation. They mediate signaling pathways
      like JAK-STAT, influencing cell proliferation, differentiation, and survival.
      Some receptors also have soluble forms that modulate signaling by acting as
      inhibitors or reservoirs. The family is involved in Th2 differentiation, IgE
      production, allergic inflammation responses, and the regulation of postnatal
      body growth.
