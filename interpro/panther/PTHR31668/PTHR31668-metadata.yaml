  name:
    name: Carbohydrate Metabolism and Transport Regulator
    short: Carb_Metab_Trans_Reg
  description:
  - text: The MAL13/EDS1/RGT1 family includes transcription factors that regulate
      the expression of genes involved in carbohydrate metabolism and transport, particularly
      in response to glucose availability. Members of the family function as activators
      or repressors depending on glucose concentration. They play roles in maltose
      fermentation, glucose transport, and stress adaptation during non-fermentative
      growth. Some members are involved in the regulation of genes for respiratory
      growth, gluconeogenesis, the glyoxylate shunt, and the tricarboxylic acid cycle.
      Others are implicated in the biosynthesis of secondary metabolites with bioactivities,
      and in the catabolism of uracil and sucrose. The family is characterized by
      a regulatory role in maintaining mitochondrial morphology and function, and
      in tolerance to pH and osmotic stress.
