  name:
    name: Uracil phosphoribosyltransferase/Adenine phosphoribosyltransferase
    short: UPRTase/APRTase
  description:
  - text: The UPRTase family proteins are responsible for the salvage pathway of pyrimidine
      metabolism, which is a more energy-efficient alternative to de novo synthesis.
      They catalyze the conversion of uracil and 5-phospho-alpha-D-ribose 1-diphosphate
      (PRPP) to UMP and diphosphate. This reaction is crucial for the reuse of uracil,
      allowing the cell to efficiently maintain nucleotide pools. Members of this
      family are allosterically activated by GTP, indicating a regulatory mechanism
      that ensures the balance of pyrimidine nucleotides in response to cellular energy
      levels and GTP availability. The family also includes adenine phosphoribosyltransferase
      proteins, which catalyze a similar salvage reaction resulting in the formation
      of AMP from adenine and PRPP, further underscoring the importance of these enzymes
      in nucleotide salvage pathways.
