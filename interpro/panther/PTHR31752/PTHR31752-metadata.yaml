  name:
    name: Auxin Efflux Carrier
    short: Auxin_Efflux_Carrier
  description:
  - text: The Auxin Efflux Carrier family is involved in the transport and homeostasis
      of the plant hormone auxin, essential for plant growth and development. Members
      of this family act as components of the auxin efflux carrier system, mediating
      the formation of auxin gradients crucial for organogenesis, vein patterning,
      and root development. Some members are specifically involved in the intracellular
      auxin transport pathway, regulating auxin efflux from the endoplasmic reticulum
      into the cytoplasm, and are expressed in mutually exclusive domains of leaf
      vascular cells. They play roles in processes such as nectar production, unfolded
      protein response activation, gravitropic responses, and the establishment of
      the apical-basal axis in embryogenesis. The coordinated polar localization and
      recycling of these proteins are regulated by vesicle trafficking and phosphorylation,
      indicating a complex control of auxin transport dynamics.
