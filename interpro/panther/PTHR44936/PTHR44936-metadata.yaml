  name:
    name: Two-component sensor histidine kinase
    short: 2C_sensor_his_kinase
  description:
  - text: This family of proteins includes sensor histidine kinases that are part
      of two-component regulatory systems, which are involved in various cellular
      responses to environmental stimuli. These proteins typically function as membrane-associated
      protein kinases that undergo autophosphorylation and subsequently transfer the
      phosphate to a response regulator, modulating its activity. They play key roles
      in processes such as osmoregulation, virulence, alginate biosynthesis, glucose
      metabolism, cell envelope stability, oxygen sensing, and nitrogen level control.
      The proteins contain several domains, including a cytoplasmic domain, transmembrane
      helices, a periplasmic domain, a HAMP domain, and a histidine kinase domain.
      The activity of these kinases is often regulated by environmental signals, interaction
      with other proteins, or small molecules, and they may also function as phosphatases
      to dephosphorylate their response regulators.
