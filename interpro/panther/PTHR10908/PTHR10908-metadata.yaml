  name:
    name: Serotonin N-acetyltransferase-like
    short: SNAT-like
  description:
  - text: This family of proteins is involved in the regulation of circadian rhythms
      through the synthesis of melatonin, a hormone that signals night and day cycles
      to the body. Members of this family catalyze the N-acetylation of serotonin
      to produce N-acetylserotonin, which is then converted to melatonin in the pineal
      gland. Some members may also acetylate other substrates such as polyamines and
      arylalkylamines, suggesting a broader role in cellular regulation through the
      modification of biogenic amines.
