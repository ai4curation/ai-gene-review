  name:
    name: Mg-chelatase D/I-like
    short: Mg-chelatase_DI-like
  description:
  - text: This family of proteins is involved in the process of magnesium chelation,
      which is a critical step in the biosynthesis of chlorophyll. Members of this
      family are part of the Mg-chelatase enzyme complex, which catalyzes the insertion
      of a magnesium ion into protoporphyrin IX, a precursor of chlorophyll and heme.
      The activity of these proteins is essential for the proper function of the photosynthetic
      apparatus in plants and algae, as well as for the production of heme in other
      organisms. The proteins in this family share structural similarities that are
      indicative of their role in the Mg-chelatase complex.
