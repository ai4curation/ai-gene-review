  description:
  - text: The Casein Kinase 1 (CK1) family is a group of serine/threonine-protein
      kinases that share a preference for acidic proteins such as caseins as substrates.
      Members of this family are involved in a wide range of cellular processes, including
      Wnt signaling, circadian rhythms, DNA repair, cell cycle regulation, and vesicular
      trafficking. They are known to phosphorylate a large number of proteins, influencing
      various signaling pathways and cellular functions. Some isoforms play key roles
      in the regulation of the circadian clock by determining the period length through
      phosphorylation of PER1 and PER2, controlling their nuclear transport and degradation.
      Others are involved in ciliogenesis, spermatogenesis, and responses to DNA damage.
      The family also includes pseudokinases that participate in viral DNA replication
      repression and regulation of host defense mechanisms.
