  name:
    name: Pantothenate synthetase
    short: Pantothenate_synthetase
  description:
  - text: The pantothenate synthetase family is responsible for catalyzing the ATP-dependent
      condensation of pantoate with beta-alanine to form pantothenate, a key step
      in the biosynthesis of pantothenic acid (vitamin B5). Pantothenic acid is an
      essential nutrient that serves as a precursor for the synthesis of coenzyme
      A (CoA) and acyl carrier protein (ACP), which are vital for fatty acid metabolism
      and synthesis. Some members of this family also exhibit bifunctional activity,
      with the ability to catalyze the transfer of a phosphate group from ATP to either
      CMP or dCMP to form CDP or dCDP and ADP, respectively. This dual function is
      critical for nucleotide metabolism and cellular energy transfer. The family
      includes enzymes that are regulated by various factors, including divalent cations
      and monovalent cations, and may exhibit allosteric behavior. Inhibition by high
      pantoate levels and other analogs of beta-alanine has also been observed, indicating
      a complex regulation of activity to maintain metabolic balance.
