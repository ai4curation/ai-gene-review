  name:
    name: Bacterial autotransporter adhesion
    short: Autotransporter_adhesion
  description:
  - text: This family of proteins includes autotransporters, which are involved in
      bacterial pathogenesis through mechanisms such as adhesion to host cells, invasion,
      and biofilm formation. They typically possess a signal peptide that directs
      the protein to the periplasmic space and a C-terminal translocator domain that
      inserts into the outer membrane to form a pore. This pore facilitates the translocation
      of the passenger domain, which often contains the functional elements of the
      protein, to the bacterial cell surface. Some members of this family can mediate
      cell aggregation and inhibit complement activation, contributing to immune evasion.
      The functions of these proteins are crucial for bacterial colonization and persistence
      within the host, playing significant roles in the infection process.
