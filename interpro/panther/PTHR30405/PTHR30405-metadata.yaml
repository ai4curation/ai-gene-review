  name:
    name: RNA-guided DNA endonucleases/Transposases
    short: RNA-guided_DNA_endo/Transpos
  description:
  - text: The protein family includes RNA-guided DNA endonucleases and transposases.
      Members of the family are involved in adaptive immune defense mechanisms against
      mobile genetic elements such as viruses, transposable elements, and plasmids.
      They function by recognizing specific DNA sequences and cleaving DNA in a staggered
      manner, producing 5'-overhangs. The cleavage occurs downstream of a transposon-associated
      motif (TAM) when guided by RNA derived from the right-end element of an insertion
      sequence. Some members also have a role in inhibiting transposition activity
      of certain IS elements and may participate in homology-directed repair processes.
      The family exhibits a bilobed structure with distinct recognition and nuclease
      lobes, and some members are associated with the CRISPR (clustered regularly
      interspaced short palindromic repeat) system, utilizing CRISPR RNA (crRNA) for
      target DNA recognition and cleavage.
