  name:
    name: Single-stranded-DNA-specific exonuclease RecJ
    short: SSDNA_exonuclease_RecJ
  description:
  - text: The RecJ family comprises single-stranded-DNA-specific exonucleases that
      play a crucial role in various recombinational DNA repair events. Members of
      this family are required for the processing of DNA during repair and recombination,
      with some acting in a 5' to 3' direction. The necessity of RecJ family proteins
      can vary depending on the type of recombinational event and the availability
      of other recombination gene products. Some members are implicated in RecA thread
      formation during DNA double-strand break repair. The family includes both well-characterized
      exonucleases and putative proteins suggested to have similar functions based
      on sequence similarity.
