  name:
    name: Succinate dehydrogenase assembly factor 2
    short: SDHAF2
  description:
  - text: The SDHAF2 family plays a crucial role in the assembly of succinate dehydrogenase
      (SDH), also known as respiratory complex II, which is integral to both the tricarboxylic
      acid (TCA) cycle and the mitochondrial electron transport chain. The family's
      primary function is to ensure the flavinylation of the SDHA subunit of the SDH
      catalytic dimer, a process that involves the covalent attachment of flavin adenine
      dinucleotide (FAD). This step is essential for the proper functioning of the
      SDH enzyme, which catalyzes the oxidation of succinate to fumarate and the reduction
      of ubiquinone to ubiquinol, linking the TCA cycle with the chain of electron
      transport and contributing to ATP synthesis.
