  name:
    name: HTH-type Metal-responsive Transcriptional Regulator
    short: HTH_Metal-responsive_Reg
  description:
  - text: This family of proteins includes helix-turn-helix (HTH) type transcriptional
      regulators that are responsive to metal ions. Members of this family are known
      to repress transcription of specific operons by binding to DNA. The presence
      of certain metal ions, such as cadmium or lead, can induce these proteins to
      release from the DNA, thereby lifting the repression and allowing gene expression.
      This regulatory mechanism is important for the cellular response to metal stress
      and may play a role in metal homeostasis and detoxification.
