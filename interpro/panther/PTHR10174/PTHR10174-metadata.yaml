  name:
    name: CRAL-TRIO domain-containing protein
    short: CRAL-TRIO_domain
  description:
  - text: This family of proteins is involved in various cellular processes including
      membrane trafficking, lipid binding, and the visual cycle. Members of this family
      are characterized by the presence of a CRAL-TRIO domain, which is essential
      for membrane targeting and lipid binding, particularly phosphatidylinositols.
      Some proteins within this family function as carriers for specific hydrophobic
      molecules, such as retinoids and tocopherols, playing critical roles in the
      visual cycle and vitamin E metabolism respectively. They facilitate the transfer
      of these molecules between membranes and are involved in the regeneration of
      active forms of retinoids, crucial for photoreceptor function in vision. Others
      are required for maintaining the normal morphology of late endosomes and lysosomes
      in neurons.
