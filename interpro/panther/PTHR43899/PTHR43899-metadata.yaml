  name:
    name: VLCFA Elongation and Steroid Dehydrogenase
    short: VLCFA-Steroid_DH
  description:
  - text: The protein family includes enzymes that catalyze key reactions in lipid
      metabolism and steroid hormone biosynthesis. Members are involved in the elongation
      cycle of long-chain fatty acids, adding two carbons to produce very long-chain
      fatty acids (VLCFAs), which are precursors for membrane lipids and lipid mediators.
      Some family members also function in the conversion of 17-oxosteroids to 17beta-hydroxysteroids,
      playing a crucial role in the biosynthesis of androgens like testosterone. Additionally,
      certain enzymes within the family contribute to bile acid metabolism in the
      human gut microbiota by converting 7-oxo-lithocholate to ursodeoxycholate, a
      secondary bile acid with chemopreventive properties.
