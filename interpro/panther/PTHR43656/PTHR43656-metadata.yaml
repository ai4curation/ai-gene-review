  name:
    name: NADH-dependent flavin oxidoreductase
    short: NADH_flavin_oxidoreductase
  description:
  - text: The NADH-dependent flavin oxidoreductase family is involved in various biosynthetic
      and metabolic pathways. Members of this family participate in the biosynthesis
      of ilicicolin H, an antifungal compound, by contributing to the formation of
      the tetramic acid precursor and its subsequent conversion to acyclic 2-pyridone
      and 8-epi-ilicicolin H, with some acting as epimerases to produce the final
      ilicicolin H product. Another member is implicated in the aflatoxin biosynthesis
      pathway, specifically in the conversion of OMST to aflatoxin G1. Additionally,
      family members are involved in the degradation of organic compounds, such as
      the demethylation of N,N-dimethylglycine and sarcosine in glycine betaine degradation,
      and the cleavage of 4,4'-dithiodibutyric acid in disulfide degradation. The
      exact functions of some proteins within this family remain to be determined,
      highlighting the diversity of roles that these enzymes can play in various biological
      processes.
