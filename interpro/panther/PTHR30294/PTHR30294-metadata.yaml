  name:
    name: ABC-2 integral membrane transporter component
    short: ABC-2_transporter_component
  description:
  - text: This family of proteins includes integral membrane components of ABC transporter
      complexes, which are involved in the translocation of substrates across cellular
      membranes. Members of this family are implicated in various functions, such
      as antibiotic resistance and efflux of specific compounds like cefoperazone.
      Some proteins within this family are essential for the secretion of other proteins
      and may also play a role in biofilm morphology through interactions with signaling
      proteins. Additionally, certain members are associated with the ESX secretion
      system and may act as regulators or components of this system, which is involved
      in the secretion of virulence factors and other proteins.
