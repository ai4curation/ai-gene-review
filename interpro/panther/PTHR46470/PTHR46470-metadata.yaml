  name:
    name: HAD-like hydrolase superfamily enzymes
    short: HAD-like_hydrolase
  description:
  - text: This family of proteins includes enzymes that are part of the HAD-like hydrolase
      superfamily. Members of this family are involved in various biochemical processes,
      such as the dephosphorylation of different substrates including D,L-glyceraldehyde
      3-phosphate, 5-amino-6-(5-phospho-D-ribitylamino)uracil, flavin mononucleotide
      (FMN), and O-phospho-L-serine. These activities suggest roles in glycolysis,
      riboflavin biosynthesis, and amino acid metabolism. Some family members are
      also implicated in the regulation of cellular dormancy and persistence. The
      enzymes are characterized by their ability to catalyze the hydrolysis of phosphate
      esters, a reaction that is central to various metabolic pathways. The family
      includes specific subfamilies such as the NANP family, which is involved in
      the dephosphorylation of N-acylneuraminate-9-phosphate and is regulated by inhibitors
      like vanadate and calcium.
