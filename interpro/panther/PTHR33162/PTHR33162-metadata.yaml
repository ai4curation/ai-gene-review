  name:
    name: Twin-arginine translocation protein B
    short: TatB
  description:
  - text: The TatB family is involved in the twin-arginine translocation (Tat) system,
      which transports large folded proteins across membranes. These proteins contain
      a twin-arginine motif in their signal peptide. TatB, in conjunction with TatC,
      forms part of a receptor that directly interacts with Tat signal peptides, potentially
      creating an oligomeric binding site that transiently accommodates folded Tat
      precursor proteins before their translocation. In chloroplasts, TatB is involved
      in delta pH-dependent protein transport crucial for chloroplast development
      and thylakoid membrane formation.
