  name:
    name: ABC transporter ATP-binding component
    short: ABC_transporter_ATP-binding
  description:
  - text: This family of proteins is involved in the transport of various molecules
      across the cellular membrane using ATP hydrolysis for energy. Members of this
      family are part of ABC transporter complexes that can export substances such
      as nodulation factors, antibiotics, and other drugs. Nodulation factors are
      key for symbiosis and nodulation in certain bacteria. Some proteins in this
      family are implicated in providing resistance to antibiotics by exporting them
      out of the cell, thereby reducing their intracellular concentration and effectiveness.
      The ATP-binding component of these transporters is crucial for the energy-dependent
      transport process.
