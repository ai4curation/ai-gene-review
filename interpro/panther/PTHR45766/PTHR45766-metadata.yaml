  name:
    name: RNA polymerase-associated activator and helicase
    short: RNAP_assoc_activator/helicase
  description:
  - text: This family of proteins includes transcription regulators that activate
      transcription by stimulating RNA polymerase recycling under stress conditions
      such as supercoiled DNA or high salt concentrations. They likely act by releasing
      the RNA polymerase when it is trapped or immobilized on tightly supercoiled
      DNA. These proteins do not activate transcription on linear DNA and are not
      typically involved in DNA repair. Some members of this family are also characterized
      by helicase activity, which is important for maintaining genome stability at
      stalled or collapsed replication forks by facilitating fork restart and limiting
      inappropriate recombination.
