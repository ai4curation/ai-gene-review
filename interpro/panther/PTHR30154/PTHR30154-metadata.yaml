  name:
    name: HTH-type Transcriptional Regulators
    short: HTH_transcr_reg
  description:
  - text: The protein family comprises HTH-type transcriptional regulators involved
      in various cellular processes, including amino acid metabolism, DNA synthesis,
      and environmental response. Members act as transcriptional activators or repressors,
      binding to specific DNA sequences to regulate gene expression. They respond
      to environmental cues such as nutrient availability, mediating global responses
      to amino acids like leucine or proline, and are involved in detoxification processes.
      Some members regulate operons for amino acid transport and biosynthesis, while
      others control genes for central metabolism and sporulation. The family includes
      regulators like Lrp, which mediates responses to leucine, and DecR, involved
      in cysteine detoxification.
