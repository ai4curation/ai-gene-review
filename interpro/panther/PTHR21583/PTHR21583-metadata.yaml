  name:
    name: ELYS/MEL-28 Nuclear Assembly Factor
    short: ELYS/MEL-28_NucAsmblyFactor
  description:
  - text: The ELYS family proteins are essential for the assembly of a functional
      nuclear pore complex (NPC) on chromatin surfaces as nuclei form post-mitosis.
      They may initiate NPC assembly by binding to chromatin and recruiting the Nup107-160
      subcomplex. Additionally, they play a role in localizing the Nup107-160 subcomplex
      to the kinetochore during mitosis and are implicated in cytokinesis completion.
      Some family members are suggested to interact with transcriptionally active
      chromatin, potentially functioning as transcription factors, particularly in
      hematopoietic tissues. The N-terminus of these proteins is characterized by
      a conserved seven-bladed beta propeller structure, which, along with a central
      alpha domain, mediates anchorage to the Nup107-160 subcomplex. The C-terminus,
      typically disordered, is responsible for chromatin interactions. In some species,
      ELYS family proteins may also coordinate nuclear assembly with replication licensing
      inactivation by interacting with the mcm2-mcm7 complex.
