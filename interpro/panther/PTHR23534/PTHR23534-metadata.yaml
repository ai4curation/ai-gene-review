  name:
    name: Major Facilitator Superfamily Transporter
    short: MFS_Transporter
  description:
  - text: This family of proteins includes members of the major facilitator superfamily
      (MFS), which are integral membrane transport proteins. They facilitate the movement
      of small solutes across cellular membranes. One characterized member of this
      family is involved in the transport of riboflavin into the cell, suggesting
      a role in nutrient uptake. While the specific substrates for the other members
      are not detailed, their similarity to MFS transporters implies a general function
      in solute transport across membranes.
