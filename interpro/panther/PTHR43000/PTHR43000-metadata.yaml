  name:
    name: NAD(P)-dependent epimerase/dehydratase
    short: NAD(P)_epim/dehydratase
  description:
  - text: The NAD(P)-dependent epimerase/dehydratase family is involved in various
      biosynthetic pathways, primarily catalyzing reactions that modify sugar moieties
      attached to nucleotide diphosphates. Members of this family perform oxidation,
      dehydration, and reduction processes to transform nucleotide-bound sugars into
      different configurations or derivatives, which are essential components in the
      synthesis of cell wall constituents, antibiotics, and other biologically significant
      molecules. The family includes enzymes such as dTDP-glucose 4,6-dehydratases,
      which are critical in the formation of deoxy sugars like dTDP-L-rhamnose, and
      UDP-sulfoquinovose synthases, which participate in sulfolipid biosynthesis.
      Some members also exhibit multifunctional activities, including epimerization
      and reduction, contributing to the diversity of sugars necessary for various
      cellular functions.
