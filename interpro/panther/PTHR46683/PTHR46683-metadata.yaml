  name:
    name: Orotate Phosphoribosyltransferase
    short: Orotate_PRTase
  description:
  - text: The Orotate Phosphoribosyltransferase family consists of enzymes that play
      a crucial role in the de novo synthesis of pyrimidine nucleotides. Members of
      this family catalyze the conversion of orotate and 5-phosphoribose 1-diphosphate
      to orotidine monophosphate (OMP). This reaction is an essential step in the
      biosynthetic pathway leading to the formation of uridine monophosphate (UMP),
      which is a precursor for all pyrimidine nucleotides. The enzymes from this family
      are characterized by their ability to transfer a ribosyl phosphate group from
      5-phosphoribose 1-diphosphate to orotate. They are inhibited by sulfate and
      phosphate ions, suggesting a regulatory mechanism in response to cellular conditions.
      The activity of these enzymes is critical for the proper synthesis of nucleic
      acids and the maintenance of cellular function.
