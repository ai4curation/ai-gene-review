  name:
    name: Aliphatic Amidase/Beta-Ureidopropionase
    short: Aliph_Amidase/BUP
  description:
  - text: The Aliphatic Amidase and Beta-Ureidopropionase Family includes enzymes
      that catalyze the hydrolysis of various aliphatic amides to their corresponding
      organic acids with the release of ammonia. Members of this family also exhibit
      acyl transferase activity in vitro, transferring acyl moieties of short-chain
      amides to hydroxylamine to form hydroxamates. Some enzymes within this family
      are involved in the degradation of citrulline and polyamine biosynthesis, as
      well as the industrial production of beta-lactam antibiotics through the hydrolysis
      of N-carbamoyl-D-amino acids. The family belongs to the carbon-nitrogen hydrolase
      superfamily and includes formamidases with restricted substrate specificity
      for formamide, N-carbamoyl-D-amino acid hydrolases, beta-ureidopropionases involved
      in pyrimidine degradation, and nitrilases. These enzymes play roles in nitrogen
      metabolism, antibiotic production, and plant and microbial nitrogen utilization.
