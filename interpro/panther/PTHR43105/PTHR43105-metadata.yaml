  name:
    name: Prokaryotic molybdopterin-containing oxidoreductase
    short: Prok_molybdopt-oxidoreductase
  description:
  - text: The prokaryotic molybdopterin-containing oxidoreductase family includes
      enzymes that catalyze various redox reactions, often involving the transfer
      of electrons to or from quinones in the respiratory chain. Members of this family
      are involved in important metabolic processes such as nitrate reduction to nitrite,
      formate oxidation, and arsenic detoxification. They contain molybdopterin as
      a cofactor and may include additional metal centers like iron-sulfur clusters.
      These enzymes are typically found in the periplasmic space of bacteria and are
      integral to the anaerobic respiration pathway, allowing organisms to utilize
      alternative electron acceptors like nitrate when oxygen is scarce. Some members
      are also associated with the mitochondrial membrane respiratory chain NADH dehydrogenase
      (Complex I) in eukaryotes, playing a critical role in electron transfer and
      energy conservation.
