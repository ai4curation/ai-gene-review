  name:
    name: Adenylyl-sulfate kinase
    short: APS_kinase
  description:
  - text: The APS kinase family is involved in the sulfate activation pathway, which
      is crucial for various biological processes. Members of this family catalyze
      the transfer of a phosphate group from ATP to adenosine 5'-phosphosulfate (APS),
      resulting in the production of 3'-phosphoadenylylsulfate (PAPS), the activated
      form of sulfate. PAPS is a key donor for sulfotransferase reactions, which are
      essential for the biosynthesis of vital compounds like sulfated proteoglycans
      and glycolipids. Some members of the family also exhibit ATP sulfurylase activity,
      contributing to the initial step of sulfate activation by transferring a sulfate
      group to ATP to yield APS. This bifunctional activity is particularly important
      in organisms where PAPS is the sole source of sulfate. The APS kinase family
      plays a significant role in plant reproduction, viability, and the production
      of secondary metabolites such as glucosinolates. In mammals, it is involved
      in skeletogenesis and the biosynthesis of sulfated cell adhesion molecules.
