  name:
    name: Diverse Substrate Transporter
    short: Diverse_Substrate_Transporter
  description:
  - text: This family of proteins includes transporters involved in the uptake and
      export of various substances across cellular membranes. Members of this family
      are characterized by their ability to transport a range of compounds, such as
      biotin and aromatic amino acids, including phenylalanine, tyrosine, and tryptophan.
      Some proteins in this family are implicated in conferring resistance to toxic
      compounds by facilitating their export out of the cell. The transport mechanism
      of these proteins may involve facilitated diffusion or active transport, and
      the structure of some family members includes a central substrate-binding cavity
      that accommodates a wide range of substrates.
