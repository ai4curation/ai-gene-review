  name:
    name: tRNA CCA-adding enzyme
    short: tRNA_CCA-adding_enzyme
  description:
  - text: The CCA-adding enzyme family is responsible for the synthesis and repair
      of the essential 3'-terminal CCA sequence in tRNAs. These enzymes operate without
      a nucleic acid template and sequentially add the nucleotides C, C, and A to
      the tRNA nucleotide-73, utilizing CTP and ATP as substrates and generating inorganic
      pyrophosphate. The 3'-terminal CCA addition is crucial for both tRNA processing
      and repair. Members of this family also play a role in tRNA surveillance, marking
      unstable tRNAs with a CCACCA sequence at the 3' terminus, which signals them
      for rapid degradation. Stable tRNAs, on the other hand, receive only the standard
      CCA sequence. The family includes multifunctional proteins that possess both
      nucleotidyltransferase activity in their N-terminal domain and phosphodiesterase
      and phosphatase activities in their C-terminal HD domain. These additional activities
      are involved in the hydrolysis of various nucleotide substrates and may contribute
      to the maintenance of tRNA integrity.
