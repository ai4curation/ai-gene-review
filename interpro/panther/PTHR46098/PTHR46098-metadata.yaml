  name:
    name: Cytosine-specific C5-methyltransferase
    short: C5-MTase
  description:
  - text: The C5-methyltransferase family encompasses enzymes that primarily perform
      methylation of cytosine residues in various biological molecules. Members of
      the family exhibit specificity for different substrates, including tRNA and
      DNA. The tRNA-specific methyltransferases target cytosine 38 in the anticodon
      loop of tRNA(Asp) and sometimes other tRNAs, influencing translation fidelity.
      DNA-specific methyltransferases within the family recognize specific double-stranded
      DNA sequences, methylating cytosines to protect DNA from cleavage by restriction
      endonucleases, thus playing a role in bacterial immune defense and epigenetic
      regulation. Some members have dual specificity, acting on both tRNA and DNA.
      The family is characterized by a conserved SAM-binding motif, indicative of
      their reliance on S-adenosylmethionine as a methyl donor.
