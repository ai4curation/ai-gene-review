  name:
    name: DnaJ Homolog Subfamily C Member 3 Co-Chaperones
    short: DnaJ_C3_Co-chaperones
  description:
  - text: The DnaJ homolog subfamily C member 3 protein family is involved in various
      stress response mechanisms, particularly the unfolded protein response (UPR)
      during endoplasmic reticulum (ER) stress. Family members act as co-chaperones,
      interacting with molecular chaperones such as HSPA8/HSC70 to stimulate ATPase
      activity and assist in protein folding. They play roles in inhibiting the phosphorylation
      of eIF-2-alpha, thus regulating protein synthesis under stress conditions. Some
      members are implicated in cold adaptation, virulence factor production, and
      ER homeostasis. They may also participate in nuclear membrane fusion during
      mating and contribute to cell wall architecture maintenance. The family is characterized
      by the presence of TPR repeats, which mediate interaction with unfolded polypeptides,
      and a J domain essential for chaperone activity enhancement.
