  name:
    name: Lipopolysaccharide export system LptC
    short: LPS_export_LptC
  description:
  - text: This family of proteins is involved in the bacterial lipopolysaccharide
      (LPS) assembly pathway. Members of this family are essential for the translocation
      of LPS from the inner membrane to the outer membrane of Gram-negative bacteria.
      They act by facilitating the transfer of LPS to the periplasmic protein LptA
      and may serve as a docking site for LptA, playing a critical role in the integrity
      and function of the bacterial outer membrane.
