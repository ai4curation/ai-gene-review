  name:
    name: Cytosolic Pyrimidine 5'-Nucleotidase
    short: Cytosolic_Pyr_5NTase
  description:
  - text: The pyrimidine 5'-nucleotidase family is characterized by enzymes that predominantly
      hydrolyze specific nucleotide monophosphates. Members of this family show a
      marked preference for 7-methylguanosine monophosphate (m(7)GMP), converting
      it to 7-methylguanosine and inorganic phosphate. This activity may serve a protective
      role by preventing the undesired salvage and incorporation of m(7)GMP into nucleic
      acids. Some family members also exhibit activity towards cytidine monophosphate
      (CMP), with CMP being a preferred substrate for certain enzymes. The family
      includes proteins with weak activity for CMP and poor substrate affinity for
      UMP and purine nucleotides. Additionally, some members have been reported to
      possess phosphotransferase activity and may be regulated by nucleotide levels,
      such as inhibition by AMP.
