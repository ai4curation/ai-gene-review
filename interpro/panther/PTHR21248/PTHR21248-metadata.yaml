  name:
    name: Cardiolipin Synthase
    short: Cardiolipin_synthase
  description:
  - text: The Cardiolipin Synthase family is involved in the biosynthesis of cardiolipin,
      a distinctive phospholipid that is found primarily in the inner mitochondrial
      membrane and bacterial membranes. Members of this family catalyze a reversible
      phosphatidyl group transfer from one phosphatidylglycerol molecule to another,
      resulting in the formation of cardiolipin (diphosphatidylglycerol) and glycerol.
      This reaction is crucial for the maintenance of mitochondrial function and membrane
      integrity. The family belongs to the broader phospholipase D superfamily and
      includes various subfamilies, such as ClsA and ClsB, which may differ in their
      substrate specificity or regulatory mechanisms.
