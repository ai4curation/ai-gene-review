  name:
    name: Serine--tRNA ligase, class-II aminoacyl-tRNA synthetase
    short: Ser-tRNA_ligase_class-II
  description:
  - text: 'Serine--tRNA ligase is an enzyme that plays a crucial role in the protein
      synthesis process by catalyzing the esterification of serine to its corresponding
      tRNA molecule, tRNA(Ser). This reaction is a key step in the translation of
      genetic information into functional proteins, as it ensures the proper incorporation
      of the amino acid serine into the growing polypeptide chain during ribosomal
      protein synthesis. Additionally, serine--tRNA ligase has the unique ability
      to aminoacylate tRNA(Sec) with serine, forming misacylated tRNA L-seryl-tRNA(Sec).
      This misacylated tRNA is then further processed to form selenocysteinyl-tRNA(Sec),
      which is used to incorporate the rare amino acid selenocysteine into proteins,
      particularly those involved in redox reactions and antioxidant defense. The
      enzyme belongs to the class-II aminoacyl-tRNA synthetase family and contains
      two distinct domains: a catalytic core and an N-terminal extension that is involved
      in tRNA binding.'
