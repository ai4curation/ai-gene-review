  name:
    name: Kremen receptor
    short: Kremen_rcpt
  description:
  - text: This family of proteins includes receptors that interact with Dickkopf proteins
      to regulate Wnt/beta-catenin signaling. They are involved in promoting the endocytosis
      of Wnt receptors, such as LRP5 and LRP6, thereby inhibiting Wnt signaling. These
      proteins play a crucial role in limb development by ensuring normal limb patterning
      and can negatively regulate bone formation. Additionally, they have the ability
      to modulate cell fate decisions in the developing cochlea and can trigger apoptosis
      in a Wnt-independent manner, which is inhibited by the binding of their ligands.
      Some members of this family can also potentiate Wnt-beta-catenin signaling in
      the absence of Dickkopf proteins by maintaining Wnt receptors at the cell membrane.
