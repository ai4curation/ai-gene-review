  name:
    name: Lysine N-acyltransferase MbtK
    short: Lysine_N-acyltrans_MbtK
  description:
  - text: The lysine N-acyltransferase MbtK family consists of enzymes involved in
      the biosynthesis of siderophores and mycobactin, which are essential for iron
      acquisition and storage in various organisms. Members of this family function
      as acyltransferases, transferring acyl groups from carrier proteins or CoA-linked
      moieties to amino acid residues, typically hydroxyornithine or lysine. This
      modification is a critical step in the formation of siderophores, which are
      low-molecular-mass iron chelators, and mycobactin, a peptidic iron chelator.
      The siderophores play a crucial role in iron uptake and virulence, especially
      under iron-limited conditions. The family also includes proteins involved in
      the resistance to aminoglycoside antibiotics by acetylating the drugs, thereby
      inactivating them.
