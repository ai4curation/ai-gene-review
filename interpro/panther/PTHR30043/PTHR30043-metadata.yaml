  name:
    name: Binding-Protein-Dependent Transport System Permease
    short: BP-Dep_TransportSys_Perm
  description:
  - text: The protein family is involved in the transport of various phosphorus-containing
      compounds across the cell membrane. Members of the family are part of binding-protein-dependent
      transport systems, which are typically ABC transporter complexes. These permease
      proteins are responsible for the translocation of substrates such as phosphite,
      hypophosphite, phosphate, and phosphonates. They exhibit high affinity for their
      respective substrates and are essential for the uptake of these compounds, which
      can serve as phosphorus sources for the cell. The family includes both integral
      membrane proteins that form the translocation channel and periplasmic binding
      proteins that initially capture the substrate. Some members are composed of
      two homologous domains, suggesting a duplication event in their evolutionary
      history. The function of these proteins is crucial for the survival of organisms
      in environments where phosphorus is limited or in forms that require active
      transport for utilization.
