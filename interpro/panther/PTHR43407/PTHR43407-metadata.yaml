  name:
    name: Glutamine Synthetase
    short: Glutamine_Synthetase
  description:
  - text: The Glutamine Synthetase family encompasses enzymes primarily involved in
      nitrogen metabolism by catalyzing the ATP-dependent conversion of glutamate
      and ammonia into glutamine. Some members play crucial roles in controlling ammonia
      levels within host cells, contributing to pathogen survival by inhibiting phagosome
      acidification and fusion with lysosomes. They are also implicated in cell wall
      biosynthesis through the production of poly-L-glutamine under nitrogen-limiting
      conditions. Activity regulation is commonly achieved through adenylation, with
      the fully adenylated enzyme being inactive. A subset of the family, known as
      Lengsins, appears to function differently, possibly acting as cytoskeletal components
      or chaperones during lens differentiation without enzymatic activity.
