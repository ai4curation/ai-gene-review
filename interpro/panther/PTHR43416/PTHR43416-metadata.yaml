  name:
    name: 2-oxoacid dehydrogenase
    short: 2-oxoacid_dehydrogenase
  description:
  - text: The 2-oxoacid dehydrogenase family is involved in crucial metabolic processes,
      catalyzing the conversion of 2-oxoglutarate to succinyl-CoA and CO2 as part
      of the 2-oxoglutarate dehydrogenase (OGDH) complex. This complex is a key component
      in the Krebs cycle, playing a pivotal role in energy production. The family
      includes dihydrolipoamide succinyltransferase (E2) components that form a core
      part of the OGDH complex, working in conjunction with other enzymatic components
      such as 2-oxoglutarate dehydrogenase (E1) and lipoamide dehydrogenase (E3).
      Some family members also participate in the pyruvate dehydrogenase (PDH) complex,
      contributing to the conversion of pyruvate to acetyl-CoA. Additionally, a subset
      of these proteins is involved in the succinylation of histones, indicating a
      nuclear role that intersects with gene regulation. The family's function is
      essential for cellular respiration and energy metabolism, as well as for the
      regulation of gene expression through epigenetic modifications.
