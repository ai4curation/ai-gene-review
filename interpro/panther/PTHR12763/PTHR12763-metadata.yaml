  name:
    name: Mitochondrial import inner membrane translocase subunit TIM14
    short: TIM14
  description:
  - text: The TIM14 family proteins are primarily involved in the mitochondrial protein
      import process. They are essential components of the Presequence translocase-associated
      motor (PAM) complex, which facilitates the ATP-dependent translocation of proteins
      with transit peptides from the inner membrane into the mitochondrial matrix.
      TIM14 family members possess a J domain crucial for their co-chaperone activity,
      which is necessary for the stimulation of mtHSP70's ATPase activity, aiding
      in protein translocation. Some members also interact with prohibitins to regulate
      cardiolipin remodeling, which is vital for maintaining mitochondrial membrane
      integrity and function. Additionally, certain TIM14 proteins may negatively
      regulate the mitochondrial respiratory chain, influencing mitochondrial ATP
      production and preventing hyperpolarization of the mitochondrial membrane.
