  name:
    name: Ubiquitin-conjugating enzyme
    short: Ub_conjugating_enzyme
  description:
  - text: The ubiquitin-conjugating enzyme family is involved in the post-translational
      modification process known as ubiquitination, where ubiquitin, a small regulatory
      protein, is attached to substrate proteins. This process tags proteins for various
      fates, including proteasomal degradation, DNA repair, cell cycle control, and
      kinase activation. Family members accept ubiquitin from E1 activating enzymes
      and catalyze its covalent attachment to target proteins, often with the assistance
      of E3 ligases. Some family members form heterodimers to synthesize non-canonical
      'Lys-63'-linked polyubiquitin chains, which do not target proteins for degradation
      but rather mediate signaling and DNA repair. Variants within the family lack
      ligase activity on their own but contribute to ubiquitination in conjunction
      with other enzymes. The family also includes enzymes that conjugate ubiquitin-like
      proteins such as SUMO and NEDD8 to targets, expanding the functional repertoire
      beyond ubiquitination.
