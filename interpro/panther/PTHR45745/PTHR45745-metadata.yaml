  name:
    name: Phosphohexose Mutase
    short: Phosphohexose_Mutase
  description:
  - text: The Phosphohexose Mutase family comprises enzymes that catalyze the isomerization
      of 1-phosphate to 6-phosphate sugars, playing a pivotal role in carbohydrate
      metabolism. Members of this family are involved in the interconversion of glucose-6-phosphate
      and glucose-1-phosphate, which is crucial for the biosynthesis of glycolipids
      such as diglucosyl-diacylglycerol (Glc2-DAG) in bacterial membranes and for
      anchoring lipoteichoic acid (LTA). Additionally, they participate in the salvage
      pathways of ribose and deoxyribose by converting ribose-1-phosphate and deoxyribose-1-phosphate
      to their 5-phosphate forms, integrating into the pentose phosphate pathway.
      Some family members also exhibit glucose 1,6-bisphosphate synthase activity,
      although this function may not be physiologically relevant. The family's enzymatic
      activities are essential for various cellular processes, including biofilm formation,
      nucleotide metabolism, and cell wall biosynthesis.
