  name:
    name: Tripartite motif-containing
    short: TRIM/RBCC
  description:
  - text: The TRIM/RBCC protein family is involved in various biological processes,
      including innate and adaptive immunity, cell cycle regulation, apoptosis, autophagy,
      and cellular differentiation. Members of this family function as E3 ubiquitin
      ligases, mediating the ubiquitination of target proteins for proteasomal degradation
      or other fates. They play key roles in antiviral defense by targeting viral
      proteins and regulating immune signaling pathways. Some TRIM proteins are involved
      in the regulation of cell proliferation, tumor suppression, and DNA damage response.
      Others participate in muscle cell differentiation and repair, as well as the
      regulation of calcium transport in epithelial cells. The family is characterized
      by a conserved tripartite motif comprising a RING-type zinc finger, one or two
      B-box-type zinc fingers, and a coiled-coil region, often followed by a variable
      C-terminal domain.
