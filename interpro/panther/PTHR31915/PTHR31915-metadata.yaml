  name:
    name: Ubiquitin-binding and autophagy-associated domain-containing protein
    short: UBA_autophagy_assoc_protein
  description:
  - text: This family of proteins is involved in various cellular processes including
      anti-apoptotic activity, ubiquitin-mediated signaling, autophagy, and transcriptional
      coactivation. Members of this family act as ubiquitin-binding adapters that
      regulate inflammatory, antiviral, and innate immune responses. They play key
      roles in the negative regulation of NF-kappa-B and IRF3 signaling pathways by
      interacting with ubiquitin-editing enzymes. Some proteins in this family function
      as xenophagy-specific receptors that target bacteria for autophagy, while others
      may enhance inorganic pyrophosphatase activity and function as coactivators
      for aryl hydrocarbon and nuclear receptors. They are also involved in the organization
      of the actin cytoskeleton and may regulate constitutive secretion.
