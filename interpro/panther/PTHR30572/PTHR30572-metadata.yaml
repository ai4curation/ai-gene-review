  name:
    name: Macrolide Exporter MacB
    short: Macrolide_Exporter_MacB
  description:
  - text: The Macrolide Exporter MacB family consists of non-canonical ABC transporters
      that play a crucial role in conferring resistance against macrolides. These
      transporters are characterized by transmembrane domains (TMD) that form a pore
      in the inner membrane and an ATP-binding domain (NBD) responsible for energy
      generation. Many family members are part of the tripartite efflux system MacAB-TolC,
      which actively exports macrolide compounds out of the cell. Some variants within
      the family, such as PvdT, are involved in the secretion of siderophores like
      pyoverdine for iron acquisition and may also contribute to resistance against
      other substances like ampicillin. The family also includes proteins potentially
      involved in the export of other compounds, such as syringafactins. The diverse
      functions of the Macrolide Exporter MacB family highlight its significance in
      bacterial survival and adaptation, particularly in the presence of antimicrobial
      agents.
