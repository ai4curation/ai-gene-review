  name:
    name: Molybdenum cofactor biosynthesis MoaA/MoaC
    short: MoCo_biosynth_MoaA/MoaC
  description:
  - text: The MoaA/MoaC family is involved in the biosynthesis of the molybdenum cofactor
      (MoCo), which is essential for the activity of molybdoenzymes. Members of the
      MoaA family, part of the radical SAM superfamily, catalyze the cyclization of
      GTP to (8S)-3',8-cyclo-7,8-dihydroguanosine 5'-triphosphate, a crucial step
      in the early stages of MoCo biosynthesis. MoaC family members convert this cyclized
      GTP to cyclic pyranopterin monophosphate (cPMP), another key intermediate in
      MoCo biosynthesis. The MoaA/MoaC family proteins are found across a wide range
      of organisms, including bacteria, archaea, and eukaryotes, highlighting their
      fundamental role in cellular biochemistry. The coordinated action of MoaA and
      MoaC family proteins ensures the proper synthesis of MoCo, which is vital for
      various cellular processes such as nitrogen fixation, purine degradation, and
      sulfite detoxification.
