  name:
    name: Riboflavin Biosynthesis HTP Reductase
    short: Riboflavin_Biosynth_HTPR
  description:
  - text: The HTP reductase family is involved in the riboflavin biosynthesis pathway.
      Members of this family catalyze the NAD(P)H-dependent reduction of the ribose
      side chain of 2,5-diamino-6-ribosylamino-4(3H)-pyrimidinone 5'-phosphate, producing
      2,5-diamino-6-ribitylamino-4(3H)-pyrimidinone 5'-phosphate. This reaction represents
      an early step in the synthesis of riboflavin, an essential vitamin for many
      organisms. Some proteins within this family also contain an N-terminal cytidine
      and deoxycytidylate deaminase domain, which is non-functional in certain members.
      Additionally, the family includes proteins with a non-functional deaminase domain
      that can hydrolyze the N-glycosidic bond in riboflavin biosynthesis intermediates,
      diverting harmful intermediates into less damaging products.
