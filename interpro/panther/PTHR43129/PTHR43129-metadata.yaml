  name:
    name: Major Facilitator Superfamily Transporter
    short: MFS_Transporter
  description:
  - text: This family of proteins includes members that are part of the major facilitator
      superfamily (MFS), which is one of the largest groups of secondary transporters.
      Proteins in this family are involved in a diverse range of functions, typically
      facilitating the transport of various substrates across cellular membranes.
      The transport process generally follows a uniport, symport, or antiport mechanism.
      One of the characterized functions within this family is conferring resistance
      to fosmidomycin, an antibiotic that targets the non-mevalonate pathway of isoprenoid
      biosynthesis in bacteria. This resistance is achieved through the efflux of
      the antibiotic compound out of the cell, thereby reducing its intracellular
      concentration and effectiveness.
