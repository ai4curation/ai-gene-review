  name:
    name: Class-I Pyridoxal-Phosphate-Dependent Aminotransferase
    short: Class-I_PLP-Dependent_AT
  description:
  - text: The Class-I Pyridoxal-Phosphate-Dependent Aminotransferase family comprises
      enzymes that catalyze the transfer of amino groups from amino acids to alpha-keto
      acids, typically using pyridoxal phosphate as a cofactor. Members of this family
      are involved in various biological processes, including the breakdown of tyrosine
      to p-hydroxyphenylpyruvate, a step in the catabolic pathway of aromatic amino
      acids. Some family members are also involved in the biosynthesis of mugineic
      acid family phytosiderophores, which are crucial for iron acquisition in graminaceous
      plants. Additionally, certain enzymes within this family participate in glucosinolate
      biosynthesis and may play roles in plant defense and auxin homeostasis. The
      family includes tyrosine aminotransferases, which have a protective role against
      oxidative stress and can influence longevity and developmental pathways in some
      organisms.
