  name:
    name: Nitrite and Sulfite Reductase 4Fe-4S Domain-Containing Protein
    short: NIR_SIR_4Fe-4S
  description:
  - text: This family of proteins includes enzymes that are involved in the reduction
      of nitrite to ammonium and sulfite to sulfide. These reactions are crucial steps
      in the nitrogen and sulfur assimilation pathways, respectively. The proteins
      utilize a 4Fe-4S domain to transfer electrons, typically from ferredoxin, to
      facilitate these reductions. Some members of the family are localized to the
      chloroplast and are involved in the assimilation of nitrite during photosynthesis.
      Others participate in the biosynthesis of sulfur-containing amino acids and
      cofactors. The family is characterized by the presence of a 4Fe-4S domain, which
      is indicative of their role in electron transfer processes.
