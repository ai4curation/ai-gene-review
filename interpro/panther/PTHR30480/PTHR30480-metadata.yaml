  name:
    name: NagZ Beta-hexosaminidase
    short: NagZ_Beta-hexosaminidase
  description:
  - text: The NagZ beta-hexosaminidase family is involved in bacterial cell wall peptidoglycan
      recycling. Members of this family function by cleaving the terminal beta-1,4-linked
      N-acetylglucosamine (GlcNAc) from peptide-linked peptidoglycan fragments. This
      enzymatic activity results in the release of free GlcNAc, anhydro-N-acetylmuramic
      acid, and anhydro-N-acetylmuramic acid-linked peptides. Some family members
      are also implicated in beta-lactam antibiotic resistance by generating signaling
      peptides that induce the expression of beta-lactamase enzymes. The family is
      characterized by its membership in the glycosyl hydrolase 3 family and is found
      across various bacterial species.
