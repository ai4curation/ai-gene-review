  name:
    name: Fatty acid oxidation complex subunit alpha
    short: FA_oxidation_alpha_subunit
  description:
  - text: The fatty acid oxidation complex subunit alpha family is involved in the
      aerobic and anaerobic degradation of long-chain fatty acids through the beta-oxidation
      cycle. Members of this family catalyze the formation of 3-oxoacyl-CoA from enoyl-CoA
      via L-3-hydroxyacyl-CoA, and can also use D-3-hydroxyacyl-CoA and cis-3-enoyl-CoA
      as substrates. Additionally, some members exhibit 3-hydroxyacyl-CoA epimerase
      and 3-hydroxyacyl-CoA dehydrogenase activities. The family includes mitochondrial
      trifunctional enzyme subunits that catalyze the last three reactions of the
      mitochondrial beta-oxidation pathway, which is a major energy-producing process
      breaking down fatty acids into acetyl-CoA. These subunits also have a monolysocardiolipin
      acyltransferase activity, acylating monolysocardiolipin into cardiolipin, a
      key mitochondrial membrane phospholipid.
