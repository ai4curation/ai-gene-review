  name:
    name: Mitochondrial Complex I NDUFA9 Subunit
    short: ComplexI_NDUFA9_subunit
  description:
  - text: The NDUFA9 complex I subunit family comprises accessory subunits of the
      mitochondrial membrane respiratory chain NADH dehydrogenase (Complex I), which
      are not directly involved in catalysis but are essential for proper assembly
      and function of Complex I. Complex I plays a crucial role in cellular energy
      production, transferring electrons from NADH to the respiratory chain with ubiquinone
      as the immediate electron acceptor. Members of the family are involved in various
      aspects of the electron transfer process and are essential for efficient mitochondrial
      function and energy metabolism.
