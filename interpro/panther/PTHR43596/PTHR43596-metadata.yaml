  description:
  - text: This protein family comprises membrane‐embedded transporters that mediate
      the exchange of nucleotides and other metabolites critical for maintaining energy
      and nutrient homeostasis in cells, . Some members, such as those predicted to
      be ATP/ADP translocases or antiporters, facilitate the bidirectional transfer
      of energy molecules across membranes, . Other members are proposed to import
      extracellular molecules like NAD+, thereby contributing to essential cofactor
      homeostasis and cellular metabolism, .
