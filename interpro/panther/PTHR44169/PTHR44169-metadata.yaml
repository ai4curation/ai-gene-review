  name:
    name: Fungal Secondary Metabolite SDRs
    short: Fungal_SecMet_SDRs
  description:
  - text: The Short-chain Dehydrogenases/Reductases (SDR) family encompasses enzymes
      involved in the biosynthesis of various secondary metabolites, including mycotoxins,
      polyketides, and indole diterpenes. Members of the SDR family are implicated
      in the reduction or oxidation of substrates within biosynthetic gene clusters,
      contributing to the formation of complex natural products with diverse biological
      activities. These enzymes typically act on polyketide intermediates, modifying
      them through reduction of ketones, oxidation of alcohols, or facilitating intramolecular
      reactions such as aldol condensations. The SDR family plays a crucial role in
      the biosynthesis of compounds with potential pharmacological importance and
      in the production of fungal metabolites with ecological significance.
