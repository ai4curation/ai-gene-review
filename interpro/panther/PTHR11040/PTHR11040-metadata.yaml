  name:
    name: Zinc Iron Permease (ZIP) Transporter
    short: ZIP_Transporter
  description:
  - text: The ZIP transporter family is involved in the transport of divalent metal
      cations across cellular membranes. Members of this family are predominantly
      involved in the uptake of zinc, but many can also transport other divalent cations
      such as iron, cadmium, copper, and cobalt. These transporters play crucial roles
      in metal homeostasis, contributing to processes such as response to stress,
      regulation of zinc levels for the unfolded protein response pathway, and the
      uptake of metals from the environment, particularly in the rhizosphere for plants.
      They are also implicated in the differentiation of cells, such as keratinocytes
      in the epidermis, and in the sequestration of zinc from host tissues during
      infection by pathogens.
