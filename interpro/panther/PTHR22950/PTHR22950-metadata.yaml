  name:
    name: Amino acid/polyamine transporter 2
    short: AA_polyamine_transptr2
  description:
  - text: The amino acid/polyamine transporter 2 family includes symporters and antiporters
      involved in the transport of amino acids across cellular membranes. Members
      of this family play roles in various biological processes, including the glutamate-GABA-glutamine
      cycle in the brain, mTORC1 activation in response to amino acid levels, and
      the transport of amino acids in plants and fungi for detoxification or nutrient
      supply. These transporters often couple the movement of amino acids with ions
      such as sodium or protons, and their activity can be regulated by factors like
      pH, ion concentration, and specific amino acid binding. Some members act as
      sensors or regulators in signaling pathways, influencing cell growth, nitrogen
      metabolism, and neurotransmitter replenishment.
