  description:
  - text: The peptidase M24B family is characterized by its members' enzymatic activity
      in proteolysis, specifically involving the cleavage of peptide bonds. Members
      of this family function as aminopeptidases or dipeptidases. The aminopeptidases
      catalyze the removal of penultimate prolyl residues from the N-termini of peptides,
      while the dipeptidases split dipeptides with a prolyl residue in the C-terminal
      position. Some members also exhibit low activity towards peptides with Ala or
      Ser at the P1 position. Additionally, certain proteins within this family have
      been implicated in non-peptidase functions, such as acting as adapter proteins
      in signaling pathways, which may influence processes like apoptosis. The family
      includes proteins from various organisms, including bacteria, fungi, and animals,
      highlighting its evolutionary conservation and functional significance across
      different life forms.
