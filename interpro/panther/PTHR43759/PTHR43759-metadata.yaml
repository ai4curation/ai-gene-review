  name:
    name: Sugar-specific ABC transporter permease
    short: Sugar_ABC_transporter
  description:
  - text: This family of proteins is involved in the transport of specific sugars
      across the cell membrane. They are components of ABC transporter complexes,
      which are highly specific for their sugar substrates. These proteins play a
      crucial role in the uptake of sugars like trehalose and glucose, which are essential
      for various cellular processes including virulence in certain bacteria. They
      are likely responsible for the translocation of these sugars across the membrane,
      facilitating their internalization into the cell.
