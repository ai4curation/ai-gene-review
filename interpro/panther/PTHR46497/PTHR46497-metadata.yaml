  description:
  - text: The Thioredoxin domain-containing protein 11 family is part of the protein
      disulfide isomerase family, suggesting a role in the formation of proper protein
      disulfide bonds. Members of this family may function as redox regulators, particularly
      in the folding of Dual Oxidase (DUOX) proteins. They are implicated in the thyroid
      hydrogen peroxide generating system by interacting with DUOX1 and DUOX2, forming
      part of a larger multiprotein complex. Although they associate with DUOX proteins,
      they are not independently capable of assisting in hydrogen peroxide production.
