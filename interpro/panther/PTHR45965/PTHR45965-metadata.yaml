  description:
  - text: The Inactive Rhomboid Protein family is characterized by members that regulate
      the ADAM17 protease, which is responsible for shedding epidermal growth factor
      (EGF) receptor ligands and TNF. Although members of this family are structurally
      related to peptidases, they do not exhibit proteolytic activity. Instead, they
      modulate various physiological processes including sleep, cell survival, proliferation,
      migration, and inflammation. Some family members indirectly activate the EGF
      receptor signaling pathway, further influencing these cellular functions.
