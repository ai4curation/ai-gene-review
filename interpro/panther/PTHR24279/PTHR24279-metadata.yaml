  description:
  - text: The Cytochrome P450, family 11 (CYP11) and family 27 (CYP27), are mitochondrial
      monooxygenases involved in steroid hormone biosynthesis and vitamin D metabolism.
      Members of this family catalyze hydroxylation reactions essential for the production
      of mineralocorticoids, glucocorticoids, and sex steroids from cholesterol or
      its derivatives. They also play roles in the activation and inactivation of
      vitamin D, regulating calcium and phosphorus homeostasis. Some family members
      are involved in the metabolism of retinoids, affecting vision adaptation. The
      enzymes use molecular oxygen, inserting one oxygen atom into substrates and
      reducing the second into water, with electrons provided by NADPH via a mitochondrial
      electron transfer system. They are also implicated in the regulation of blood
      pressure, inflammatory responses, and cholesterol homeostasis through the production
      of active metabolites that act as ligands for nuclear receptors.
