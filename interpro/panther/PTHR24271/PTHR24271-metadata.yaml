  name:
    name: Peptidase S1 family serine proteases
    short: Peptidase_S1_serine_proteases
  description:
  - text: The peptidase S1 family is a diverse group of serine proteases with a wide
      range of biological functions. Members of this family are involved in various
      physiological processes including blood coagulation, fibrinolysis, immune defense,
      inflammation, and sperm fertility. They exhibit trypsin-like or chymotrypsin-like
      specificity and are implicated in the cleavage of kininogen to release vasoactive
      peptides, degradation of extracellular matrix components, and activation of
      prohormones and inflammatory cytokines. Some subfamilies within this group,
      such as kallikreins, granzymes, and snake venom serine proteases, have specialized
      roles in tissue remodeling, cytotoxicity, and prey hemostasis, respectively.
      The family also includes enzymes with antibacterial properties, contributing
      to innate immunity. The broad substrate specificity and regulatory mechanisms
      of these proteases reflect their adaptation to distinct biological niches and
      their importance in health and disease.
