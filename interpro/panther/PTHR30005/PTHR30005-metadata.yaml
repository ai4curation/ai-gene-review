  name:
    name: GppA/Ppx guanosine pentaphosphate hydrolase
    short: GppA/Ppx_hydrolase
  description:
  - text: The GppA/Ppx family is characterized by its members' enzymatic activities,
      which include the hydrolysis of guanosine pentaphosphate (pppGpp) to guanosine
      tetraphosphate (ppGpp) and the degradation of inorganic polyphosphates (polyP).
      The conversion of pppGpp to ppGpp is a crucial reaction in the bacterial stringent
      response, a cellular adaptation to amino acid starvation that coordinates various
      cellular activities. This response is mediated by pppGpp and ppGpp, which are
      signaling molecules in the cytoplasm. Some family members also exhibit exopolyphosphatase
      activity, releasing orthophosphate from the ends of polyP chains. This activity
      can be processive and may prefer long-chain polyphosphates, although some members
      have a preference for shorter chains. The family includes proteins with regulatory
      roles in interorganelle communication and metabolic interactions between cellular
      pathways in eukaryotes, such as the retrograde regulation protein in yeast.
