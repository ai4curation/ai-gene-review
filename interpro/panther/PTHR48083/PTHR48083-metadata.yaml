  name:
    name: Acyl-CoA dehydrogenase
    short: Acyl-CoA_dehydrogenase
  description:
  - text: The acyl-CoA dehydrogenase family is involved in the first step of mitochondrial
      fatty acid beta-oxidation, an aerobic process that breaks down fatty acids into
      acetyl-CoA, facilitating energy production. Members of the family catalyze the
      dehydrogenation of acyl-CoA to trans-2-enoyl-CoA, with electron transfer flavoprotein
      (ETF) serving as the electron acceptor. This reaction is crucial for the metabolism
      of medium-chain fatty acids, typically those with 4 to 16 carbons in length,
      although some members exhibit specificity for longer chains, such as saturated
      C22-CoA. The family also includes enzymes like p-hydroxyphenylacetate 3-hydroxylase,
      which are involved in the hydroxylation of aromatic compounds. Overall, the
      acyl-CoA dehydrogenase family plays a significant role in energy metabolism
      and the regulation of fatty acid composition in cellular lipids.
