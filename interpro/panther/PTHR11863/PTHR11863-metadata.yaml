  name:
    name: Sterol Desaturase and Related Enzymes
    short: Sterol_Desaturase_Related
  description:
  - text: The sterol desaturase family is involved in various crucial biological processes,
      including the biosynthesis of sterols such as cholesterol and ergosterol, which
      are essential components of cell membranes and precursors to steroid hormones
      and vitamins. Members of this family function as enzymes that introduce double
      bonds into sterol molecules, a key step in the formation of complex sterols.
      They are also involved in the desaturation and hydroxylation of fatty acids,
      contributing to the production of signaling molecules and the regulation of
      lipid metabolism. Additionally, some members participate in the synthesis of
      very-long-chain alkanes, which are important for the formation of protective
      waxy layers in plants, contributing to cuticular permeability and drought tolerance.
      The family includes enzymes such as lathosterol oxidase, Delta(7)-sterol 5(6)-desaturase,
      and methylsterol monooxygenase, which catalyze various desaturation, hydroxylation,
      and decarbonylation reactions in sterol and sphingolipid biosynthesis pathways.
