  name:
    name: Short-chain dehydrogenases/reductases
    short: SDR
  description:
  - text: The short-chain dehydrogenases/reductases (SDR) family is a diverse group
      of enzymes that participate in various metabolic and regulatory processes. Members
      of the family are involved in steroidogenesis, such as the conversion of androstan-3-alpha,17-beta-diol
      to androsterone, suggesting a role in androgen metabolism. They also play roles
      in retinoid metabolism, converting all-trans-retinol to all-trans-retinal, and
      in hepatic lipid metabolism by oxidizing various lipid substrates. Some family
      members are implicated in the biosynthesis of polyketides, like T-toxin, which
      affects maize virulence. Others may influence lipid droplet formation, dNTP
      production, DNA metabolism, and genome stability. The family includes tumor-associated
      antigens and enzymes involved in resistance to DNA-damaging agents. Despite
      the functional diversity, all members share a common enzymatic activity, catalyzing
      oxidation-reduction reactions with various substrates, often with a preference
      for NADP or NAD cofactors.
