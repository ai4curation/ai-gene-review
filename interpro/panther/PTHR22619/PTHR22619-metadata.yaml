  name:
    name: Zinc finger SWIM domain-containing protein
    short: ZSWIM_domain-containing
  description:
  - text: This family of proteins includes zinc finger SWIM domain-containing proteins
      involved in various cellular processes. Members of this family function as substrate
      recognition components of SCF-like E3 ubiquitin-protein ligase complexes, which
      are implicated in target-directed microRNA degradation (TDMD). This process
      leads to the degradation of microRNAs by catalyzing the ubiquitination and subsequent
      degradation of Argonaute (AGO) proteins, thus exposing the miRNAs for degradation.
      Some family members are known to specifically recognize and bind to AGO proteins
      when they are engaged with a TDMD target. Additionally, certain proteins in
      this family may play a role in nervous system development, particularly in the
      regulation of striatal morphology and motor functions. They may also act as
      regulators of axon guidance by recognizing and promoting the degradation of
      misfolded proteins, such as ROBO3, through ubiquitination.
