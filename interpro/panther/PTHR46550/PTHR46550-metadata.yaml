  name:
    name: F-box Protein Family Substrate Recognition Components
    short: F-box_SCF_Substrate_Recog
  description:
  - text: The F-box protein family is involved in the regulation of protein degradation
      via the ubiquitin-proteasome system. Members of this family function as substrate-recognition
      components of SCF (SKP1-CUL1-F-box protein) E3 ubiquitin ligase complexes. They
      are responsible for the ubiquitination of specific target proteins, marking
      them for proteasomal degradation. This process is crucial for various cellular
      functions, including cell cycle progression, signal transduction, and inflammatory
      responses. Some family members also interact with kinases and other proteins
      to modulate processes like p53/TP53-dependent transactivation and histone modification,
      impacting cell proliferation and gene expression regulation.
