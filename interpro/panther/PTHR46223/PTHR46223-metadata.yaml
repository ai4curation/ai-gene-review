  name:
    name: Histone-lysine N-methyltransferase, H3 Lys-9 specific
    short: H3K9_Histone-Lys_N-MTase
  description:
  - text: The protein family includes histone-lysine N-methyltransferases that specifically
      methylate 'Lys-9' of histone H3, marking it for epigenetic transcriptional repression.
      The trimethylation of H3 'Lys-9' serves as a tag for recruiting HP1 proteins
      to methylated histones, predominantly functioning in heterochromatin regions.
      This modification plays a pivotal role in the establishment of constitutive
      heterochromatin at pericentric and telomere regions and is necessary for directing
      DNA methylation at these sites. Members of the family are involved in various
      cellular processes, including cell cycle regulation, transcriptional repression,
      and telomere length regulation. Some family members also participate in the
      regulation of higher-order chromatin organization and may have roles in the
      transgenerational transmission of environmental information. The family's SET
      domain, along with pre-SET and post-SET domains, is essential for methyltransferase
      activity and stable heterochromatin binding.
