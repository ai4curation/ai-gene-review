  name:
    name: 2-oxoacid dehydrogenase family, E2 component
    short: 2-oxoacid_DH_E2_comp
  description:
  - text: Members of the 2-oxoacid dehydrogenase family are components of multienzyme
      complexes that catalyze the irreversible oxidative decarboxylation of various
      2-oxoacids to form acyl-CoA derivatives and CO2. These complexes play a pivotal
      role in metabolic pathways, such as the catabolism of branched-chain amino acids
      and the conversion of pyruvate to acetyl-CoA, which is a key step in the citric
      acid cycle. The family includes the E2 component, lipoamide acyltransferase,
      which accepts and transfers acyl groups generated by the E1 component to coenzyme
      A. The E2 component is essential for the overall function of the complex, working
      in concert with the E1 decarboxylase and E3 lipoamide dehydrogenase components.
