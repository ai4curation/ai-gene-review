  name:
    name: Zinc phosphodiesterase ELAC protein
    short: Zinc_phosphodiesterase_ELAC
  description:
  - text: This family of proteins includes zinc phosphodiesterases that are primarily
      involved in tRNA maturation. They function by removing a 3'-trailer from precursor
      tRNA, which is a crucial step in preparing tRNA for its role in protein synthesis.
      Some members of the family also have broader substrate specificity, including
      endoribonuclease and exoribonuclease activities, and can process various RNA
      molecules. Additionally, certain proteins within this family are implicated
      in tRNA repair, acting downstream of the ribosome-associated quality control
      pathway to remove 2',3'-cyclic phosphate from tRNAs after cleavage events.
