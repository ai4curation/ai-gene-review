  name:
    name: Cyclic di-GMP phosphodiesterase
    short: c-di-GMP_PDE
  description:
  - text: The protein family is involved in the regulation of bacterial cellular processes
      through the hydrolysis of cyclic di-GMP (c-di-GMP), a second messenger that
      controls cell surface-associated traits such as motility, adhesion, and biofilm
      formation. Members of the family possess phosphodiesterase (PDE) activity, catalyzing
      the conversion of c-di-GMP to 5'-pGpG. Some proteins within the family also
      serve as c-di-GMP sensors, coupling transcriptional activity to cellular c-di-GMP
      levels, or participate in signaling cascades affecting transcription factors
      and biofilm regulators. Others may have additional regulatory functions, such
      as modulating RNA stability or responding to environmental cues like oxygen
      availability and light.
