  name:
    name: JMJD6 family arginine demethylases/lysyl-hydroxylases
    short: JMJD6_ArgDemeth/LysHydrox
  description:
  - text: The JMJD6 family proteins are multifunctional dioxygenases with roles in
      RNA splicing, gene expression regulation, and embryonic development. They exhibit
      bifunctional activity, acting as both arginine demethylases and lysyl-hydroxylases.
      Members of this family are involved in the hydroxylation of specific lysine
      residues on target proteins, which is crucial for processes such as RNA splicing
      and nucleolar organization. Additionally, they demethylate arginine residues
      on histones and other proteins, influencing the histone code and transcriptional
      regulation. These proteins are implicated in hematopoietic differentiation,
      angiogenic sprouting, and macrophage cytokine responses. Some family members
      also interact with transcriptional machinery to modulate polymerase II promoter-proximal
      pause release and transcriptional activation. The nuclear localization signal
      motifs within these proteins are key for their nuclear targeting.
