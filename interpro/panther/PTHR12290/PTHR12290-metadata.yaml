  name:
    name: Cornichon/Phosphopantothenate--cysteine ligase
    short: Cornichon/PPC_ligase
  description:
  - text: The Cornichon family proteins are involved in the regulation of trafficking
      and gating properties of AMPA-selective glutamate receptors (AMPARs), promoting
      their targeting to cell membranes and synapses, and modulating their gating
      properties by regulating activation, deactivation, and desensitization rates.
      Additionally, they function as cargo receptors for the transport of proteins
      like TGF-alpha family proteins and G protein-coupled receptors (GPCRs) from
      the endoplasmic reticulum to the cell surface, interacting with the COPII machinery.
      In plants, they are involved in the transport of secretory proteins from the
      ER to the Golgi apparatus. The Phosphopantothenate--cysteine ligase family members
      catalyze steps in the biosynthesis of coenzyme A from vitamin B5, conjugating
      cysteine to 4'-phosphopantothenate to form 4-phosphopantothenoylcysteine, with
      a preference for ATP over CTP as a cosubstrate.
