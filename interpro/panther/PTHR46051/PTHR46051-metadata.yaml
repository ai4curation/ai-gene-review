  name:
    name: SLAM Signaling and PI3K Pathway Regulators
    short: SLAM-PI3K_Regulators
  description:
  - text: This family of proteins includes cytoplasmic adapters and phosphatidylinositol
      phosphatases. The adapters regulate receptors of the signaling lymphocytic activation
      molecule (SLAM) family, cooperating with other SH2 domain-containing proteins.
      They play roles in natural killer (NK) cell activation, positively regulating
      functions mediated by various SLAM receptors and potentially neurotrophin receptors.
      The phosphatases specifically hydrolyze phosphatidylinositol-3,4,5-trisphosphate,
      negatively regulating PI3K pathways. They are involved in cellular processes
      such as mitotic spindle orientation, insulin signaling, actin cytoskeleton remodeling,
      cell adhesion, spreading, and endocytosis. They also participate in immune cell
      regulation, including B-cell signaling, mast cell degranulation, and FC-gamma
      receptor-mediated phagocytosis and signaling.
