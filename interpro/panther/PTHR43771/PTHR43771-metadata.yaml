  name:
    name: Phosphohexose Mutase
    short: Phosphohexose_Mutase
  description:
  - text: The Phosphohexose Mutase family includes enzymes that catalyze the reversible
      phosphoryl transfer to hexose sugars, playing a critical role in carbohydrate
      metabolism. Members of this family are involved in the biosynthesis of GDP-mannose,
      a precursor for mannose-containing cell surface polysaccharides, and in the
      synthesis and breakdown of glucose. Some enzymes also participate in the production
      of xanthan, alginate polymerization, and core lipopolysaccharide (LPS) biosynthesis,
      which are important for bacterial pathogenicity, biofilm formation, and immune
      defense evasion. The family's enzymes function through a processive mechanism
      involving a bisphosphorylated intermediate and domain movement, regulated by
      activators and inhibitors.
