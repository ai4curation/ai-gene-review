  name:
    name: Cyclic Nucleotide-Gated Cation Channel
    short: CNG_Cation_Channel
  description:
  - text: The Cyclic Nucleotide-Gated Cation Channel family is involved in various
      signal transduction pathways, primarily in sensory neurons. Members of the family
      are activated by cyclic nucleotides (cAMP or cGMP), leading to the opening of
      nonselective cation channels. In visual systems, they play a crucial role in
      phototransduction by mediating the depolarization of photoreceptors in response
      to changes in cGMP levels due to light exposure. In olfactory systems, they
      are essential for odorant signal transduction, where cAMP serves as a second
      messenger. The channels are also involved in adaptation processes, allowing
      rapid response to stimuli and extending the range of detection. Some family
      members are implicated in other cellular functions, such as sperm chemotaxis
      and maintaining normal axon morphology.
