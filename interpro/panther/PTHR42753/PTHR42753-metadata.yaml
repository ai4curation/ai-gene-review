  name:
    name: Proline-tRNA synthetase
    short: Pro-tRNA_synthetase
  description:
  - text: 'The protein family includes enzymes that catalyze the attachment of proline
      to tRNA(Pro) through a two-step reaction involving the activation of proline
      by ATP to form Pro-AMP, followed by its transfer to tRNA(Pro). Members of the
      family possess an editing function to ensure fidelity, hydrolyzing activated
      Ala-AMP and deacylating mischarged Ala-tRNA(Pro) to prevent errors. Some members
      can process cysteine but lack the ability to edit misacylated Cys-tRNA(Pro),
      which may be corrected by YbaK in trans. The family is characterized by a three-domain
      structure: a catalytic domain, an editing domain, and an anticodon-binding domain.
      These enzymes are essential for protein synthesis and are found in both cytoplasmic
      and mitochondrial locations, reflecting their importance in cellular function.'
