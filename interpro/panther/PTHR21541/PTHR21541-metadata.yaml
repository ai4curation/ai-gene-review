  name:
    name: Structure-specific endonuclease regulatory subunit
    short: SS-endonuclease_regulatory
  description:
  - text: This family of proteins includes regulatory subunits that interact with
      and enhance the activity of various structure-specific endonucleases. They play
      critical roles in maintaining genome stability by resolving harmful DNA structures
      that arise from replication, recombination intermediates, and DNA damage. Members
      of this family are components of a structure-specific endonuclease complex that
      processes DNA secondary structures during repair and recombination. They exhibit
      endonuclease activity on branched DNA substrates, making single-strand cuts
      near ss-DNA junctions, with a preference for 5'-flap structures. They also facilitate
      the symmetrical cleavage of static and migrating Holliday junctions, leading
      to ligatable, nicked duplex products. Additionally, these proteins interact
      with other endonucleases to promote cleavage of bubble structures, 3'-flap,
      and replication fork-like structures. They are essential for the recovery from
      certain types of DNA damage and play a role in the resolution of DNA double-strand
      breaks.
