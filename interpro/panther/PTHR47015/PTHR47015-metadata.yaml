  description:
  - text: This family of proteins includes lipid-binding components with a high affinity
      for certain phospholipids, such as dipalmitoylphosphatidylcholine. They are
      involved in the innate immune response, particularly in the upper airways, by
      reducing the surface tension of airway secretions and inhibiting biofilm formation
      by Gram-negative bacteria. Additionally, they regulate the proteolytic cleavage
      of specific sodium channels, contributing to the maintenance of airway surface
      liquid and mucus clearance. Some family members are also found in sweat, where
      they exhibit surfactant properties and may assist in temperature regulation
      through sweat spreading and evaporation. Others may play a role in oral cavity
      innate immunity.
