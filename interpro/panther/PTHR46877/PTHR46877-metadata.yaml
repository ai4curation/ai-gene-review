  name:
    name: Ephrin receptor tyrosine kinases
    short: Ephrin_rcpt_TKs
  description:
  - text: The Ephrin receptor family is a group of receptor tyrosine kinases that
      bind to membrane-bound ephrin ligands on adjacent cells, facilitating contact-dependent
      bidirectional signaling. These interactions are crucial for various developmental
      processes, including axon guidance, synaptic plasticity, cell migration, and
      differentiation. The family is characterized by forward signaling through the
      receptor and reverse signaling through the ephrin ligand. Members of this family
      play roles in the nervous system, such as in the guidance of neuronal axons
      and the formation of dendritic spines and excitatory synapses. They are also
      involved in angiogenesis, heart morphogenesis, and the maintenance of satellite
      cells. Some receptors are promiscuous, binding both A and B ephrin ligands,
      while others have more specific interactions. Certain family members are kinase-defective
      but still participate in cell adhesion and migration regulation.
