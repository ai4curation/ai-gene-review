  name:
    name: DNA repair protein RadA
    short: RadA
  description:
  - text: The RadA family proteins are DNA-dependent ATPases involved in the repair
      of DNA breaks and processing of recombination intermediates. They facilitate
      the branch migration of RecA-mediated strand transfer reactions, enhancing the
      extension of the 3' invading strand to form heteroduplex DNA more rapidly. These
      proteins exhibit ATPase activity stimulated by single-stranded DNA and various
      branched DNA structures, but this activity is inhibited by the single-stranded
      DNA-binding protein (SSB). Unlike RecA, RadA family members do not perform homology
      searching during DNA repair. The family is characterized by a putative N-terminal
      zinc-finger domain, a central region homologous to RecA including ATPase motifs,
      and a C-terminal region similar to Lon protease. Some members may also interact
      with other proteins such as DisA, influencing activities like diadenylate cyclase
      inhibition.
