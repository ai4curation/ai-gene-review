  name:
    name: CPA3 antiporter subunit C
    short: CPA3_antiporter_subunitC
  description:
  - text: The CPA3 antiporter subunit C family comprises membrane proteins involved
      in cation/H+ antiport activity, primarily functioning in Na+ and/or Li+ excretion
      and resistance. These antiporters play a significant role in maintaining pH
      homeostasis and osmotic balance within the cell. They are electrogenic, utilizing
      a transmembrane electrical potential to drive the exchange of Na+ or Li+ for
      H+. The family members are essential for various physiological processes, including
      sporulation initiation under high external Na+ concentrations and adaptation
      to alkaline pH during symbiotic nodule development in certain species. While
      the primary function is Na+/H+ antiport, some members are also implicated in
      K+/H+ exchange and may be part of larger complexes with additional roles, such
      as NADH-ubiquinone oxidoreductase activity.
