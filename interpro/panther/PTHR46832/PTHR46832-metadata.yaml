  name:
    name: 5'-methylthioadenosine/S-adenosylhomocysteine nucleosidase
    short: MtnN_subfamily
  description:
  - text: The MtnN subfamily proteins are enzymes that catalyze the irreversible cleavage
      of the glycosidic bond in 5'-methylthioadenosine (MTA) and S-adenosylhomocysteine
      (SAH/AdoHcy), producing adenine and the corresponding thioribose, 5'-methylthioribose,
      and S-ribosylhomocysteine. They also cleave 5'-deoxyadenosine, a by-product
      of radical S-adenosylmethionine (SAM) enzymes, into 5-deoxyribose and adenine.
      This activity is crucial for preventing the toxic accumulation of 5'-deoxyadenosine,
      which inhibits radical SAM enzymes such as biotin synthase and lipoic acid synthase.
      The MtnN subfamily belongs to the larger PNP/UDP phosphorylase family and plays
      key roles in S-adenosylmethionine recycling and autoinducer-2 biosynthesis,
      which is part of bacterial quorum sensing.
