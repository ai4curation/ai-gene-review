  name:
    name: Peptidoglycan biosynthesis MurCDEF
    short: MurCDEF_pg_biosynth
  description:
  - text: The MurCDEF family is involved in the synthesis of peptidoglycan, a critical
      component of bacterial cell walls that provides structural integrity and shape.
      Members of this family are enzymes that catalyze the addition of amino acids
      to UDP-N-acetylmuramate, a key step in the biosynthesis of peptidoglycan precursors.
      This process is essential for cell wall formation, which is vital for bacterial
      growth and survival. Some members of the family have bifunctional roles, also
      participating in the linkage of D-alanine residues in the peptidoglycan structure.
      The MurCDEF family includes enzymes such as UDP-N-acetylmuramate--L-alanine
      ligase, which specifically attaches L-alanine to UDP-N-acetylmuramate, and other
      related ligases that add further amino acids to the growing peptide chain. The
      activity of these enzymes is a target for antibiotic development, as inhibition
      can lead to weakened cell walls and lysis of the bacterial cell.
