  name:
    name: PTS System Sugar Transport and Nitrogen Regulation
    short: PTS_SugarTrans_NitroReg
  description:
  - text: The protein family is involved in the phosphoenolpyruvate-dependent sugar
      phosphotransferase system (PTS), which is a key carbohydrate active transport
      system. Members of the family catalyze the phosphorylation of sugar substrates
      during their translocation across the cell membrane. Specific components of
      this family are involved in the transport of different sugars such as galactitol
      and fructose. Additionally, some members are implicated in regulating nitrogen
      assimilation, possibly through a PTS EIIA type-2 domain that may have a regulatory
      function via phosphorylation activity. The EIIA domains within this family are
      typically phosphorylated by phospho-carrier proteins such as phospho-HPr or
      phospho-NPr on a histidyl residue, which then transfers the phosphoryl group
      to the EIIB domain of the PTS system.
