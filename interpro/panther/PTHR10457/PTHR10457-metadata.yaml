  name:
    name: Galactokinase enzyme
    short: Galactokinase
  description:
  - text: The Galactokinase family is characterized by enzymes that play a crucial
      role in the metabolism of galactose, a type of sugar. Members of this family
      catalyze the phosphorylation of alpha-D-galactose to produce alpha-D-galactose-1-phosphate
      (Gal-1-P), utilizing ATP as the phosphate donor. This reaction represents the
      first committed step in the Leloir pathway of galactose catabolism. Some family
      members also have the ability to phosphorylate other sugars like N-acetylgalactosamine
      (GalNAc) under certain conditions. Additionally, certain galactokinases can
      induce the transcription of genes involved in galactose metabolism when galactose
      is the sole carbon source. The family belongs to the GHMP kinase superfamily,
      which is known for its diverse range of small molecule kinases. The Galactokinase
      family is essential for the proper utilization and detoxification of galactose
      in various organisms, ranging from bacteria to humans, and is implicated in
      disorders such as galactosemia when dysfunctional.
