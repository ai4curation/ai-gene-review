  name:
    name: Dihydroorotase/Allantoinase Hydrolase
    short: DHOase/Allantoinase_Hydrolase
  description:
  - text: The Dihydroorotase and Allantoinase protein family includes enzymes that
      catalyze distinct hydrolytic reactions in nucleotide and nitrogen metabolism.
      Dihydroorotases perform the reversible cyclization of carbamoyl aspartate to
      dihydroorotate, a key step in the de novo pyrimidine biosynthesis pathway. Allantoinases
      catalyze the hydrolytic cleavage of the five-member hydantoin ring of allantoin
      to allantoic acid, which is part of the purine catabolism pathway. Some members
      of the family are non-functional DHOases, while others are involved in the degradation
      of ureides without generating urea. The family belongs to the metallo-dependent
      hydrolases superfamily, with members distributed across various subfamilies
      based on their specific enzymatic functions.
