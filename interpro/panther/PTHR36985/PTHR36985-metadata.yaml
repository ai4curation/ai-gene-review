  name:
    name: Translocation and assembly module TamB
    short: TAM_TamB
  description:
  - text: This family of proteins is involved in the translocation and assembly module
      (TAM) autotransporter assembly complex. They function in the translocation of
      autotransporters across the outer membrane of bacteria. Members of this family
      have an elongated periplasmic domain that interacts with the POTRA domains of
      TamA, a component of the TAM complex. The interaction and subsequent movement
      of TamA's POTRA domains into the periplasm may deform the outer membrane or
      the protein itself, potentially providing the force necessary to facilitate
      the translocation process and reset the TAM complex for further autotransporter
      translocation events.
