  name:
    name: Amino Acid ABC Transporter Permease
    short: AA_ABC_Transporter_Permease
  description:
  - text: The protein family is involved in the transport of various amino acids across
      the cell membrane. Members of the family function as part of different ABC transporter
      complexes, facilitating the translocation of substrates such as histidine, lysine,
      arginine, ornithine, and D-methionine. Some proteins within the family are also
      implicated in the transport of toxic analogs like alpha-methyl-methionine and
      may participate in microbial infection processes by transporting toxin components.
      The family includes subfamilies that are responsible for signaling between the
      solute-binding proteins and the ATPase components of the transport system, indicating
      a role in the regulation of transport activity.
