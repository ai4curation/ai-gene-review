  name:
    name: Two-component system sensor/response regulators
    short: 2-compnt_sensor/resp_reg
  description:
  - text: The protein family is involved in two-component signal transduction systems,
      which are prevalent in bacteria and plants. These systems typically consist
      of a sensor histidine kinase that responds to environmental stimuli and a response
      regulator that mediates the cellular response, often through transcriptional
      regulation. The sensor kinases autophosphorylate a histidine residue and transfer
      the phosphate to an aspartate residue on the response regulator, modulating
      its activity. Functions include osmosensing, chemotaxis, circadian rhythm regulation,
      stress response, virulence, and cell division control. Some members also have
      phosphatase activity, allowing them to reverse the phosphorylation in response
      to changing conditions. The family displays diversity in domain architectures
      and regulatory mechanisms, reflecting the adaptation to various functional roles
      and signaling pathways.
