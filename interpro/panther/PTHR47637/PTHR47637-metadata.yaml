  name:
    name: Outer Membrane Protein Chaperone SurA
    short: OMP_Chaperone_SurA
  description:
  - text: The SurA chaperone family is involved in the correct folding and assembly
      of outer membrane proteins. Members of this family recognize specific patterns
      of aromatic residues and the orientation of their side chains, which are typically
      found in integral outer membrane proteins. The SurA chaperones may function
      at both early periplasmic and late outer membrane-associated steps of protein
      maturation. They contain a peptidyl-prolyl cis-trans isomerase (PPIase) activity
      within the second parvulin domain, although this isomerase activity is not essential
      for their chaperone function. The N-terminal region and the C-terminal tail
      of SurA proteins are necessary and sufficient for their chaperone activity and
      are also required for porin recognition. These chaperones are essential for
      the survival of bacteria in various stages of growth and are involved in processes
      such as pilus biogenesis.
