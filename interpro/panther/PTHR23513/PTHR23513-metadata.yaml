  name:
    name: Major Facilitator Superfamily Transporters
    short: MFS_Transporters
  description:
  - text: The protein family is involved in the transport of specific substrates across
      cellular membranes. Members of the family function as exporters, utilizing the
      electrochemical gradient as an energy source. The family includes enterobactin
      exporters, which are responsible for the secretion of enterobactin, a siderophore
      involved in iron acquisition. Other members are multidrug efflux pumps, contributing
      to intrinsic antibiotic resistance by exporting various antibiotics out of the
      cell. Some proteins within the family are uncharacterized, but their similarity
      to known transporters suggests a role in substance transport. The family belongs
      to the major facilitator superfamily (MFS), which is characterized by a diverse
      range of substrates and a common transport mechanism.
