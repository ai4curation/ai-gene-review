  name:
    name: Membrane Fusion Protein
    short: MFP
  description:
  - text: This family of proteins is involved in the transport and secretion of various
      molecules across the cell membrane. Members of this family typically function
      as part of tripartite efflux systems, which are composed of an inner membrane
      transporter, a periplasmic adaptor protein, and an outer membrane channel. These
      proteins are responsible for conferring resistance to antibiotics and toxic
      compounds by actively exporting them out of the cell. Additionally, they play
      roles in the secretion of bacteriocins, hemolysins, proteases, and other toxins,
      contributing to bacterial virulence and competition. Some family members are
      also involved in the biosynthesis of extracellular polysaccharides like alginate,
      which is important for biofilm formation and pathogenicity in certain bacteria.
