  name:
    name: Myc family transcription factors
    short: Myc_transcription_factors
  description:
  - text: The Myc family of transcription factors plays a crucial role in cellular
      growth, proliferation, and apoptosis. Members of the Myc family bind DNA both
      non-specifically and specifically, recognizing the core sequence 5'-CAC[GA]TG-3'.
      They are involved in activating the transcription of growth-related genes and
      have roles in various cellular processes, including angiogenesis, stem cell
      self-renewal, and somatic reprogramming. Some family members, such as N-myc,
      are implicated in the positive regulation of transcription in neuroblastoma
      cells, while others like S-myc have apoptosis-inducing activity. The 9aaTAD
      motif, a common transactivation domain, is present in many Myc proteins, contributing
      to their function as transcription factors. Additionally, Myc proteins are involved
      in the regulation of alternative splicing of certain genes, influencing cellular
      metabolism and differentiation.
