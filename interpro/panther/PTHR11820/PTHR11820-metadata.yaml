  name:
    name: Fumarylacetoacetate Hydrolase
    short: FAH
  description:
  - text: The FAH family is characterized by a range of enzymatic activities, primarily
      associated with hydrolase function. Members of the family are involved in the
      catabolism of various substrates, including acetylpyruvate, fumarylpyruvate,
      and gentisate, as well as in the recycling of oxyluciferin in the fungal bioluminescence
      cycle. These enzymes catalyze hydrolytic cleavage reactions that result in the
      formation of smaller organic compounds, such as fumarate, pyruvate, and caffeic
      acid. Some family members also exhibit isomerase and decarboxylase activities,
      converting specific substrates to different isomeric or decarboxylated forms.
      The FAH family includes mitochondrial acylpyruvases, which have been shown to
      bind copper in vitro, and enzymes involved in the degradation of aromatic compounds.
      The family's name reflects its association with fumarylacetoacetate hydrolase,
      a key enzyme in tyrosine catabolism, although the range of functions extends
      beyond this specific activity.
