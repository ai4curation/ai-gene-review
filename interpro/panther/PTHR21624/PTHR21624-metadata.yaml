  name:
    name: Sterol Desaturase/TMEM195-like
    short: Sterol_Desaturase/TMEM195
  description:
  - text: This family of proteins includes enzymes involved in lipid metabolism. Members
      of this family are known to function as glyceryl-ether monooxygenases, which
      play a role in cleaving the O-alkyl bond of ether lipids. These ether lipids
      are crucial components of brain membranes, indicating a significant role in
      the central nervous system. Additionally, some members are involved in the biosynthesis
      of ornithine lipids, which are phosphorus-free membrane lipids, by hydroxylating
      the ornithine moiety within the lipid structure. The family also encompasses
      enzymes such as C-5 sterol desaturases, which are implicated in sterol biosynthesis
      by introducing double bonds into sterols. Collectively, these proteins share
      structural similarities and are part of the broader sterol desaturase family,
      with a subset belonging to the TMEM195 subfamily.
