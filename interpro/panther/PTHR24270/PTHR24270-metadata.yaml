  name:
    name: Low-density lipoprotein receptor
    short: LDLR
  description:
  - text: The LDLR family is characterized by its role in mediating the endocytosis
      of lipoproteins, such as LDL and VLDL, into cells, which is crucial for cholesterol
      homeostasis and energy metabolism. Members of this family are multifunctional
      cell surface receptors that bind to various ligands, including cholesterol-carrying
      lipoproteins, and transport them into cells by clustering into clathrin-coated
      pits for internalization. Some members are involved in the oocyte-to-zygote
      transition and eggshell formation in certain species, while others participate
      in neuronal layering during embryonic brain development by transmitting extracellular
      signals to intracellular processes. Additionally, certain receptors within this
      family may act as tumor suppressors or be implicated in signal transduction
      and the uptake of lipophilic molecules. The family also includes receptors that
      play roles in immune responses and cobalamin uptake.
