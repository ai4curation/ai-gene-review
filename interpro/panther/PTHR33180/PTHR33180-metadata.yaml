  name:
    name: Photosystem II CP47/CP43 reaction center protein
    short: PSII_CP47/CP43_rcpt
  description:
  - text: This family of proteins is involved in the photosynthetic process, specifically
      as components of the core complex of photosystem II (PSII). They play a crucial
      role in the light-induced photochemical reactions of PSII by binding chlorophyll.
      PSII itself functions as a light-driven water:plastoquinone oxidoreductase,
      which harnesses light energy to extract electrons from water, leading to the
      generation of molecular oxygen and a proton gradient. This proton gradient is
      then utilized for the synthesis of ATP, which is essential for various cellular
      processes.
