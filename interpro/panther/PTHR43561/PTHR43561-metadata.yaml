  name:
    name: Mitochondrial 3-hydroxyacyl-CoA dehydrogenase
    short: Mito_3-hydroxyacyl-CoA_DH
  description:
  - text: This family of proteins includes mitochondrial enzymes involved in the fatty
      acid beta-oxidation pathway. They catalyze the third step in the beta-oxidation
      cycle, specifically for medium and short-chain 3-hydroxy fatty acyl-CoAs ranging
      from C4 to C10 in length. Additionally, these proteins have a regulatory role
      in insulin secretion by inhibiting the activation of glutamate dehydrogenase
      1, which is crucial for amino acid-induced insulin secretion regulation.
