  name:
    name: Universal ribosomal protein uL1
    short: Ribosomal_uL1
  description:
  - text: The universal ribosomal protein uL1 family is involved in the structure
      and function of the ribosome, a complex molecular machine that synthesizes proteins
      in all living cells. Members of this family bind directly to 23S rRNA and form
      part of the L1 stalk of the ribosome, which is known for its mobility. This
      stalk plays a crucial role in the release of deacylated tRNA from the E site
      during protein translation. Additionally, uL1 proteins act as translational
      repressor proteins by controlling the translation of the L11 operon through
      binding to its mRNA. Some peptides from the N-terminal end of L1 have antibacterial
      and antifungal activities, and are not hemolytic against mammalian cells, suggesting
      a role in defense mechanisms.
