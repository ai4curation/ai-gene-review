  name:
    name: Major Facilitator Superfamily Transporter
    short: MFS_Transporter
  description:
  - text: This family of proteins is part of the major facilitator superfamily (MFS),
      which is one of the largest groups of secondary transporters. Members of this
      family are involved in the transport of a diverse range of substrates across
      cellular membranes, including sugars, amino acids, nucleosides, inorganic ions,
      and various other small molecules. They function by utilizing the electrochemical
      gradient across the membrane to facilitate the movement of substances, often
      against their concentration gradient. The transport mechanism typically involves
      conformational changes in the protein structure, alternating between inward-facing
      and outward-facing states to shuttle the substrate across the lipid bilayer.
