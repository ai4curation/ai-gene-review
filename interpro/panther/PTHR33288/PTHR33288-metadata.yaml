  name:
    name: Photosystem I assembly/Cytochrome b6-f complex
    short: Ycf4/Cytochrome_f
  description:
  - text: The Ycf4/Cytochrome f family includes proteins involved in the assembly
      and function of photosystems in chloroplasts and cyanobacteria. Members of the
      Ycf4 subfamily are essential for the assembly of the photosystem I complex,
      a crucial component of the photosynthetic electron transport chain that converts
      light energy into chemical energy. The Cytochrome f subfamily proteins are components
      of the cytochrome b6-f complex, which mediates electron transfer between photosystem
      II and photosystem I, supports cyclic electron flow around photosystem I, and
      contributes to state transitions in the photosynthetic apparatus.
