  name:
    name: Proton-dependent Oligopeptide Transporter
    short: POT_PTR
  description:
  - text: The Proton-dependent Oligopeptide Transporter (POT/PTR) family is part of
      the major facilitator superfamily and is involved in the transport of small
      peptides across cell membranes. Members of the family function as proton-coupled
      transporters that facilitate the uptake of di- and tripeptides, which can be
      crucial for nutrient acquisition, signaling, and defense mechanisms in various
      organisms. Some members are also involved in the transport of nitrate, glucosinolates,
      and abscisic acid, as well as in innate immune responses by mediating the transport
      of bacterial peptidoglycans. The transport activity of these proteins is typically
      pH-dependent and plays a role in processes such as stress tolerance, germination,
      and defense against pathogens.
