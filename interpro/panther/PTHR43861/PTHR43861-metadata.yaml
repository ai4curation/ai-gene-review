  name:
    name: S-adenosyl-L-methionine-dependent methyltransferase
    short: SAM-dep_methyltransferase
  description:
  - text: The protein family is involved in the enzymatic process of transferring
      methyl groups from S-adenosyl-L-methionine (SAM) to various substrates. Members
      of the family catalyze the methylation of trans-aconitate, converting it to
      a monomethyl ester, which is a key step in certain metabolic pathways. Other
      enzymes in the family are responsible for the synthesis of carboxy-S-adenosyl-L-methionine
      (Cx-SAM) from SAM, a reaction important for subsequent carboxyl methylation
      reactions. Some family members are involved in the last step of juvenile hormone
      biosynthesis, methylating juvenile hormone acids to produce active hormones.
      The family also includes enzymes that convert the free carboxyl group of a malonyl-thioester
      to its methyl ester, facilitating the synthesis of pimeloyl-ACP via the fatty
      acid synthetic pathway. Overall, the family plays a crucial role in various
      biological methylation processes, impacting metabolism, regulation of hormone
      activity, and biosynthetic pathways.
