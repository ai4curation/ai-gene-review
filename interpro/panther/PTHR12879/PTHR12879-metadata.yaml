  name:
    name: Sphingolipid Delta(4)-Desaturase/C4-Monooxygenase
    short: DEGS_Delta4-Desaturase/MO
  description:
  - text: This family of proteins includes enzymes with bifunctional roles in sphingolipid
      metabolism. Members of this family are involved in the biosynthesis of sphingolipids,
      which are essential components of cell membranes and play a role in signaling
      pathways. They exhibit sphingolipid delta(4)-desaturase activity, introducing
      a double bond into the sphingoid base of ceramides, and some also have sphingolipid
      C4-monooxygenase activity. These activities are crucial for the formation of
      bioactive sphingolipids like sphingosine and complex sphingolipids such as glucosylceramides.
      Additionally, some family members are capable of catalyzing the isomerization
      of retinols, contributing to vitamin A metabolism.
