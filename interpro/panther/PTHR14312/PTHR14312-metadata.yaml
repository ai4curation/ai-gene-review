  name:
    name: Basic-leucine zipper (bZIP) transcription factors
    short: bZIP_transcription_factors
  description:
  - text: The bZIP transcription factor family is characterized by the presence of
      a basic-leucine zipper domain, which facilitates DNA binding and dimerization.
      Members of this family are involved in various regulatory processes, primarily
      as transcriptional regulators. In Dictyostelium discoideum, they are implicated
      in DIF-1 signaling, which is essential for the differentiation of prestalk cells
      during development. Some family members act as activators of prestalk gene expression
      while repressing prespore gene expression. Others are probable transcriptional
      regulators with functions that have not been fully characterized. The family
      also includes proteins that may be involved in telomere length regulation and
      the ubiquitination and degradation of RNA polymerase II under certain conditions.
