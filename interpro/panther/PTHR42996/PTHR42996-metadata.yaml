  name:
    name: Phosphate-binding protein PstS
    short: Phosphate-bind_PstS
  description:
  - text: The PstS family comprises phosphate-binding proteins that are integral components
      of the ABC transporter complex PstSACB, which is involved in the import of phosphate.
      Members of the family are responsible for binding and transporting inorganic
      phosphate across the cell membrane, with some proteins identified as the primary
      carriers for phosphate uptake, especially under conditions of phosphate starvation.
      Additionally, certain PstS proteins have been implicated in host-pathogen interactions,
      acting as agonists for toll-like receptors TLR1 and TLR2, and playing roles
      in host immune responses, including cytokine production, macrophage apoptosis,
      and phagosome maturation arrest. The family also includes proteins with enzymatic
      activities, such as phosphomonoesterase and phosphodiesterase, contributing
      to broader metabolic functions.
