  name:
    name: Cyclin-dependent kinases regulatory subunit / 60S ribosome subunit biogenesis
      protein NIP7
    short: CDK_regulatory_subunit/NIP7
  description:
  - text: The CKS family proteins are key regulatory subunits that bind to the catalytic
      subunits of cyclin-dependent kinases (CDKs), which are fundamental for cell
      cycle control. These proteins are implicated in various stages of the cell cycle,
      including the transition from the M phase to the G1 phase. They are thought
      to contribute to the exit from mitosis by targeting B-type cyclins for degradation,
      leading to the breakdown of the nuclear envelope. The NIP7 family proteins are
      involved in ribosome biogenesis, specifically in the processing of pre-rRNA
      and the assembly of the 60S ribosomal subunit. These proteins are essential
      for the proper maturation of the 34S pre-rRNA into the 27S pre-rRNA and subsequent
      steps leading to the formation of functional ribosomes, which are crucial for
      protein synthesis.
