  name:
    name: Phosphocarrier protein HPr
    short: HPr
  description:
  - text: The HPr family proteins are general components of the phosphoenolpyruvate-dependent
      sugar phosphotransferase system (sugar PTS), a major carbohydrate active-transport
      system. They catalyze the phosphorylation of incoming sugar substrates concomitantly
      with their translocation across the cell membrane. The phosphoryl group from
      phosphoenolpyruvate (PEP) is transferred to HPr by enzyme I. Phospho-HPr then
      transfers it to the PTS EIIA domain. Some family members, when phosphorylated
      on a specific serine residue, interact with the catabolite control protein A
      (CcpA), forming a complex that binds to DNA at catabolite response elements,
      acting as a corepressor in carbon catabolite repression (CCR). This mechanism
      allows bacteria to coordinate and optimize the utilization of available carbon
      sources. Phosphorylated HPr also plays a role in inducer exclusion, potentially
      interacting with non-PTS permeases to inhibit their transport activity.
