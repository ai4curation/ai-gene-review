  name:
    name: UFM1-specific isopeptidase
    short: UFM1_isopeptidase
  description:
  - text: This family of proteins includes thiol-dependent isopeptidases that are
      specific for the ubiquitin-like modifier protein UFM1. Members of this family
      recognize and hydrolyze the peptide bond at the C-terminal Gly of UFM1, which
      is covalently attached to various target proteins. This cleavage is essential
      for processing the UFM1 precursor and for the recycling of UFM1 after it has
      carried out its function in cellular processes. The family proteins do not act
      on other ubiquitin-like proteins such as SUMO1 or ISG15. Some family members
      are implicated in the regulation of cell proliferation and differentiation by
      modulating the transactivation of intracellular nuclear receptors. Additionally,
      certain members have roles in meiosis and in the sensory perception of organisms,
      such as the localization of odorant receptors and behavioral responses to environmental
      stimuli.
