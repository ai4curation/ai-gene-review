  name:
    name: CPA3 Na+/H+ Antiporter Subunit D
    short: CPA3_Na-H_Antiporter_D
  description:
  - text: This family of proteins includes antiporters that are involved in the exchange
      of sodium (Na+) and hydrogen (H+) ions across cell membranes. These antiporters
      play a crucial role in maintaining cellular ion homeostasis, particularly in
      the excretion of Na+ to adapt to high sodium environments or alkaline pH conditions.
      They function by utilizing a transmembrane electrical potential, which is inferred
      to be electrogenic, meaning that the transport process generates an electrical
      gradient. Some members of this family are also involved in the excretion of
      lithium (Li+) ions and do not transport potassium (K+), calcium (Ca2+), or magnesium
      (Mg2+). The activity of these proteins is essential for various physiological
      processes, including pH homeostasis, sodium resistance, and potentially in symbiotic
      nodule development during certain plant-microbe interactions.
