  name:
    name: Biotin Carboxyl Carrier/Decarboxylase Components
    short: Biotin_Carboxyl_Carrier/Decarb
  description:
  - text: This family of proteins includes biotin carboxyl carrier components and
      subunits of various carboxylase and decarboxylase enzyme complexes. They play
      a crucial role in carboxylation and decarboxylation reactions, which are essential
      for fatty acid synthesis and energy metabolism. These proteins typically undergo
      a two-step process where they are first carboxylated by a biotin carboxylase
      enzyme and then act as carriers to transfer the carboxyl group to specific substrates,
      forming products such as malonyl-CoA, oxaloacetate, or acetyl-CoA. Some members
      are also involved in the conversion of chemical energy from decarboxylation
      reactions into electrochemical gradients, such as sodium ion motive force for
      ATP synthesis.
