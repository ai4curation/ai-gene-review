  name:
    name: Thiol-specific peroxidase BCP/PrxQ
    short: Peroxiredoxin_BCP/PrxQ
  description:
  - text: This family of proteins functions as thiol-specific peroxidases, catalyzing
      the reduction of hydrogen peroxide and organic hydroperoxides to water and alcohols,
      respectively. They play a crucial role in cellular protection against oxidative
      stress by detoxifying peroxides. Additionally, they act as sensors of hydrogen
      peroxide-mediated signaling events. Some members are involved in various cellular
      processes, including telomere silencing, telomere length regulation, and post-diauxic
      growth. In plants, they are involved in defense against pathogens and protection
      of the photosystem II against oxidative damage.
