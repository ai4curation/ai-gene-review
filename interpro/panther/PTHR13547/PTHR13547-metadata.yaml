  name:
    name: Mitochondrial RNase P catalytic subunit-like
    short: Mt_RNase_P_catalytic-like
  description:
  - text: This family of proteins includes catalytic subunits of ribonuclease P (RNase
      P) complexes, which are primarily involved in the 5'-end maturation of tRNA
      molecules. Members of this family are characterized by their association with
      other protein components, such as TRMT10C/MRPP1 and HSD17B10/MRPP2, to form
      a functional complex capable of cleaving pre-tRNA substrates. These proteins
      display a non-productive active site that becomes fully functional upon binding
      to their protein partners and the tRNA substrate. Some members are also implicated
      in the maturation of other RNA species, such as mRNA and small nucleolar RNA
      (snoRNA), highlighting a broader role in RNA processing.
