  description:
  - text: The Hedgehog protein family is a group of signaling molecules that play
      a crucial role in a wide range of developmental processes. Members of this family
      are involved in the patterning of various tissues and organs during embryonic
      development. They function as morphogens, substances that dictate the fate of
      cells based on their concentration gradient. Hedgehog proteins are involved
      in establishing the anterior-posterior axis in embryonic segments, patterning
      the neural tube, somites, and limb buds, as well as in the differentiation of
      photoreceptors and the immune response in the gut. They bind to the Patched
      receptor, which in turn regulates the activity of Smoothened, leading to the
      activation of target gene transcription. The autoproteolytic cleavage of Hedgehog
      precursors and subsequent cholesterol modification are critical for their signaling
      activity. Additionally, Hedgehog proteins are associated with the regulation
      of bone growth, spermatogenesis, and maintenance of endothelial integrity.
