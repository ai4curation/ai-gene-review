  name:
    name: G-protein coupled receptor 1
    short: GPCR_1
  description:
  - text: This family of proteins includes receptors that are primarily involved in
      signal transduction through the activation of G-proteins. They respond to a
      variety of ligands, such as hormones, neuropeptides, and secretagogues, triggering
      intracellular second messenger systems, typically involving phosphatidylinositol-calcium.
      These receptors play key roles in physiological processes including hormone
      secretion, anxiety modulation, analgesia, arousal, and neuroleptic activity.
      Some members are described as orphan receptors, indicating that their endogenous
      ligands are not yet identified. The family is characterized by a common structural
      feature, which is the seven-transmembrane domain typical of G-protein coupled
      receptors.
