  name:
    name: Mitochondrial Zinc Maintenance Protein 1 / LYRM7
    short: MZM1/LYRM7
  description:
  - text: The MZM1/LYRM7 family includes mitochondrial proteins that function as assembly
      factors for the cytochrome b-c1 (CIII) complex, a component of the mitochondrial
      respiratory chain. Members of this family act as chaperones, binding to the
      Rieske Fe-S protein within the mitochondrial matrix. They stabilize the Rieske
      Fe-S protein, known as RIP1 in fungi or UQCRFS1 in animals, prior to its translocation
      and insertion into the late CIII dimeric intermediate within the mitochondrial
      inner membrane. Additionally, these proteins play a role in modulating the mitochondrial
      matrix zinc pool, which is crucial for various mitochondrial functions.
