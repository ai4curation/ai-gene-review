  name:
    name: Spore maturation protein B
    short: SpmB
  description:
  - text: The SpmB family includes proteins involved in spore core dehydration, suggesting
      a role in the transport of molecules into or out of the forespore, or in modifications
      of the cortex peptidoglycan structure during spore maturation. The family is
      named after Spore maturation protein B, which is a representative member. The
      functions of Inner membrane protein YjiG, also part of the SpmB family, are
      not well-characterized but are presumed to be related to spore maturation processes
      due to their family association.
