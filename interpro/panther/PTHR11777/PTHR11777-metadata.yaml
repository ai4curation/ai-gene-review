  name:
    name: Alanine--tRNA ligase
    short: Ala-tRNA_ligase
  description:
  - text: The Alanine--tRNA ligase family is responsible for the aminoacylation of
      tRNA(Ala) with alanine, a crucial step in translating genetic information into
      functional proteins. Members of this family activate alanine using ATP, forming
      Ala-AMP, which is then transferred to tRNA(Ala). The family also possesses an
      editing domain that ensures fidelity by removing incorrectly charged amino acids,
      such as serine or glycine, from tRNA(Ala). This proofreading function prevents
      the incorporation of incorrect amino acids into proteins, which is vital for
      maintaining the accuracy of protein synthesis. Some members of the family can
      also attach alanine to transfer-messenger RNA (tmRNA), aiding in the rescue
      of stalled ribosomes. The family is characterized by a modular domain architecture,
      typically including an N-terminal catalytic domain and an editing domain, with
      some variants also featuring a C-terminal C-Ala domain that can bind DNA and
      facilitate the cooperative interaction between the editing and aminoacylation
      centers.
