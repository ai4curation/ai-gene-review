  name:
    name: Glutamine/Glutamate--tRNA Ligase
    short: Gln/Glu-tRNA_Ligase
  description:
  - text: The Glutamine--tRNA and Glutamate--tRNA ligase family includes enzymes that
      play a crucial role in protein synthesis by catalyzing the attachment of amino
      acids to their corresponding tRNAs. Glutamine--tRNA ligases activate glutamine
      by ATP to form Glu-AMP and then transfer it to the acceptor end of tRNA(Gln),
      a process essential for translating the genetic code into proteins. Similarly,
      Glutamate--tRNA ligases perform the same function for glutamate and tRNA(Glu).
      These enzymes belong to the class-I aminoacyl-tRNA synthetase family and are
      vital for proper brain development in higher organisms. Some members of the
      family also participate in the biosynthesis of natural products in fungi.
