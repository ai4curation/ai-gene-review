  name:
    name: Bacterial PTS System Sugar Transport Components
    short: Bacterial_PTS_Sugar_Transport
  description:
  - text: 'The protein family is involved in the phosphoenolpyruvate-dependent sugar
      phosphotransferase system (PTS), which is a key carbohydrate active transport
      system in bacteria. The family includes components that catalyze the phosphorylation
      of sugar substrates during their translocation across the cell membrane. Specific
      members of the family are responsible for the transport and phosphorylation
      of fructose, mannose, and 2-O-alpha-mannosyl-D-glycerate. The system comprises
      several domains: EIIC forms the translocation channel and binds the substrate;
      EIIB is phosphorylated on a cysteinyl residue and transfers the phosphoryl group
      to the sugar; EIIA is phosphorylated on a histidyl residue and transfers the
      phosphoryl group to EIIB. Some members have a duplicated EIIB domain (EIIB'')
      that facilitates phosphoryl transfer and high-affinity recognition of the diphosphoryl
      transfer protein (DTP).'
