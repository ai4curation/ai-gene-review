  name:
    name: Cytochrome P450, sterol 14-alpha demethylase
    short: CYP450_sterol_14alpha_dmase
  description:
  - text: The Cytochrome P450 family is involved in diverse oxidative reactions in
      the biosynthesis of sterols, including cholesterol in mammals and ergosterol
      in fungi. Members of this family function as monooxygenases that catalyze the
      removal of methyl groups from sterol substrates, such as lanosterol and eburicol,
      playing a critical role in membrane composition and synthesis of steroid hormones
      and bile acids. Some members are involved in the metabolism of oxysterols and
      neurosteroids, while others participate in the biosynthesis of secondary metabolites
      with various biological activities. The family is also a target for azole drugs,
      which inhibit the sterol 14-alpha demethylase activity, crucial for ergosterol
      biosynthesis and fungal growth.
