  name:
    name: Plant and Fungal Acyltransferase
    short: Plant_Fungal_Acyltransferase
  description:
  - text: The acyltransferase family is involved in a diverse range of biosynthetic
      processes in plants and fungi, including the production of secondary metabolites
      such as polyketides, terpenoids, and alkaloids. These enzymes catalyze the transfer
      of acyl groups from acyl-CoA donors to various acceptors, playing crucial roles
      in the synthesis of phytohormones, mycotoxins, volatile organic compounds, and
      other bioactive molecules. They contribute to plant defense mechanisms by producing
      phytoalexins and other antimicrobial compounds. Additionally, they are involved
      in the formation of flavor and aroma compounds in fruits. The family includes
      enzymes that modify the trichothecene skeleton in the biosynthesis of trichothecene
      mycotoxins and others that participate in the biosynthesis of mannosylerythritol
      lipids, which enhance the availability of water-insoluble substrates.
