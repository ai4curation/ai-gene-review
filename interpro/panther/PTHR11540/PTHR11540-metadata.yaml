  name:
    name: Malate Dehydrogenase Type 1
    short: MDH_type1
  description:
  - text: The LDH/MDH superfamily, MDH type 1 family, consists of enzymes that catalyze
      the reversible oxidation of malate to oxaloacetate, a reaction that plays a
      crucial role in the citric acid cycle and carbon metabolism. Members of this
      family are involved in maintaining redox homeostasis between organelle compartments
      and are essential for various physiological processes, including carbon dioxide
      and energy partitioning in leaves, limiting photorespiration, and supporting
      the photorespiratory flux. Some members can also convert 2-oxoglutarate to (S)-2-hydroxyglutarate.
      The activity of these enzymes is regulated by factors such as acetylation and
      ATP concentration, although not all members are redox-regulated. The family
      includes cytoplasmic, mitochondrial, glyoxysomal, and chloroplastic malate dehydrogenases,
      highlighting their diverse localization and functional importance in different
      cellular compartments.
