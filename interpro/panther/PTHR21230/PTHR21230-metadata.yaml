  name:
    name: VTI1/GOSR2/BOS1 Vesicle Transport
    short: VTI1_GOSR2_BOS1_VesTransFam
  description:
  - text: The VTI1/GOSR2/BOS1 protein family is involved in vesicle transport pathways,
      mediating the specificity of vesicle trafficking and promoting the fusion of
      lipid bilayers. Members of this family function as v-SNAREs or t-SNAREs, interacting
      with counterpart SNAREs on target membranes to facilitate protein transport
      between various organelles such as the ER, Golgi complex, late endosomes, trans-Golgi
      network, and prevacuolar compartments. They play crucial roles in the secretory
      pathway, including the transport of proteins to the lytic vacuole and protein
      storage vacuole, cell plate formation during cytokinesis, and cellular processes
      such as shoot gravitropism and cytokine secretion. This family is also implicated
      in non-conventional trafficking routes and is essential for maintaining proper
      cellular function and organization.
