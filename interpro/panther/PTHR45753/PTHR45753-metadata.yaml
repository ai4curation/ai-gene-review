  name:
    name: Aspartate/Ornithine Carbamoyltransferase
    short: Asp/Orn_Carbamoyltrnsfrase
  description:
  - text: The Aspartate/Ornithine Carbamoyltransferase family includes enzymes that
      play a crucial role in nitrogen metabolism. Members catalyze the transfer of
      a carbamoyl group from carbamoyl phosphate to various substrates like aspartate
      and ornithine, forming key intermediates in the biosynthesis of pyrimidines
      and arginine. Some family members are involved in the urea cycle, converting
      ammonia to urea for excretion. Others participate in arginine biosynthesis or
      catabolism, and in alternative pathways for polyamine degradation. The family
      also includes enzymes that contribute to bacterial pathogenicity by resisting
      toxins that inhibit host carbamoyltransferases. Activity regulation is complex,
      involving feedback inhibition, allosteric regulation by metabolites, and post-translational
      modifications. Structurally, these enzymes typically have two domains for substrate
      binding and are subject to conformational changes upon substrate interaction.
