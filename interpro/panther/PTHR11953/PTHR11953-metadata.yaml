  name:
    name: Ribonuclease PH
    short: RNase_PH
  description:
  - text: The RNase PH family comprises phosphorolytic 3'-5' exoribonucleases that
      are crucial for tRNA 3'-end maturation. They remove nucleotide residues following
      the 3'-CCA terminus of tRNAs and are capable of adding nucleotides to the ends
      of RNA molecules using nucleoside diphosphates as substrates. Although this
      addition activity may not be significant physiologically, it suggests a potential
      for reversible reaction. Members of this family are also implicated in the initiation
      of 16S rRNA degradation, which leads to ribosome degradation during starvation.
      This function is essential for maintaining proper cellular RNA levels and ensuring
      the fidelity of protein synthesis. The family includes both catalytic and non-catalytic
      components of the RNA exosome complex, which is involved in various cellular
      RNA processing and degradation events, including the maturation of stable RNA
      species, the elimination of RNA processing by-products, and the degradation
      of aberrant mRNAs.
