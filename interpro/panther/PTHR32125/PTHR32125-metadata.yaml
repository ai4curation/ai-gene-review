  name:
    name: IspD/TarI cytidylyltransferase
    short: IspD/TarI_cytidylyltransf
  description:
  - text: 'The IspD/TarI cytidylyltransferase family is involved in the biosynthesis
      of isoprenoids via the non-mevalonate pathway, which is essential for various
      cellular processes. Members of this family catalyze the formation of 4-diphosphocytidyl-2-C-methyl-D-erythritol
      from CTP and 2-C-methyl-D-erythritol 4-phosphate (MEP). This reaction is a key
      step in the production of isopentenyl diphosphate (IPP) and dimethylallyl diphosphate
      (DMAPP), precursors for the synthesis of isoprenoids. Isoprenoids are vital
      for numerous biological functions, including electron transport, plant hormone
      biosynthesis, and the prenylation of proteins. The family includes two subfamilies:
      the IspD subfamily, which is involved in the synthesis of isoprenoids in bacteria,
      plants, and apicomplexan parasites, and the TarI subfamily, which participates
      in the synthesis of wall teichoic acids in Gram-positive bacteria by transferring
      the cytidylyl group of CTP to D-ribitol 5-phosphate.'
