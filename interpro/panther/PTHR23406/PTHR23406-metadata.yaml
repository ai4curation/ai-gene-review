  name:
    name: Malic Enzymes
    short: Malic_Enzymes
  description:
  - text: The malic enzymes family includes proteins that catalyze the decarboxylation
      of malate to pyruvate, using NAD or NADP as cofactors. These enzymes are involved
      in various metabolic pathways, including the regulation of sugars and amino
      acids metabolism during the night period in plants, and the malolactic fermentation
      in wine, which decreases acidity and alters flavor. In photosynthetic organisms,
      chloroplastic isoforms of malic enzymes play a role in refixing CO2 released
      from malate decarboxylation by ribulose-bisphosphate carboxylase, thus reducing
      photorespiratory CO2 loss. Some family members are also involved in maintaining
      high ATP levels. The enzymes are regulated by various metabolites, with some
      being activated by fumarate, succinate, and coenzyme A, while others are inhibited
      by oxaloacetate, glucose, and ATP.
