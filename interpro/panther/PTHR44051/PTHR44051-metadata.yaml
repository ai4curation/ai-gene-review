  name:
    name: Glutathione S-transferase superfamily
    short: GST_superfamily
  description:
  - text: The GST superfamily protein family is involved in a variety of cellular
      processes including detoxification, oxidative stress response, and biosynthesis
      of secondary metabolites. Members of the family catalyze the conjugation of
      reduced glutathione to a range of hydrophobic electrophiles, aiding in their
      detoxification. Some proteins within the family also participate in the biosynthesis
      of natural products such as mycotoxins, antibiotics, and pigments, often by
      protecting cells against oxidative stress or by facilitating specific steps
      in metabolic pathways. Additionally, certain members play roles in nitrogen
      source response by regulating gene expression related to nitrogen utilization.
