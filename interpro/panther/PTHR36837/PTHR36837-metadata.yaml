  name:
    name: Polyhydroxyalkanoate Synthase
    short: PHA/PHB_synthase
  description:
  - text: The PHA/PHB synthase family is involved in the biosynthesis of polyhydroxyalkanoates
      (PHAs), which are biopolymers synthesized by various microorganisms as intracellular
      energy reserves under nutrient-limiting conditions. The primary function of
      the family members is to polymerize 3-hydroxybutyryl-CoA into poly(3-hydroxybutyrate)
      (PHB) or copolymers such as poly(beta-hydroxybutyrate-co-beta-hydroxyvalerate)
      (PHBV). These polymers consist of thousands of hydroxybutyrate molecules linked
      end to end. PHB and PHBV are water-insoluble and serve as energy storage materials.
      The catalytic activity of some subunits is enhanced by non-catalytic subunits,
      indicating a complex interaction within the family for efficient polymer production.
      The family includes several subfamilies, each with specific features and potentially
      different substrate specificities or product profiles.
