  name:
    name: Mitochondrial Glutaryl-CoA Dehydrogenase
    short: Glutaryl-CoA_DH_mitochondrial
  description:
  - text: The Glutaryl-CoA dehydrogenase family is involved in the mitochondrial oxidative
      decarboxylation of glutaryl-CoA to crotonyl-CoA and CO2, a crucial step in the
      catabolism of L-lysine, L-hydroxylysine, and L-tryptophan. Members of this family
      use electron transfer flavoprotein as an electron acceptor. The activity of
      these enzymes can be regulated by specific metabolites, such as MCPA-CoA, which
      is known to strongly inhibit the enzyme. Variants within this family may exist,
      including isoforms that are inactive, highlighting the potential for functional
      diversity within the family.
