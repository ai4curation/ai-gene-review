  description:
  - text: This family of proteins includes members that are involved in various cellular
      processes, such as the regulation of protease activity, hypersensitive response
      (HR)-like cell death, and mitochondrial function. Some proteins in this family
      are thought to regulate or encode a specific protease, influencing the stability
      of certain proteins. Others act as positive regulators of HR-like cell death
      and may be involved in potassium ion channel regulation. Additionally, certain
      members are associated with mitochondrial biogenesis and activity, including
      cardiolipin biosynthesis, mitochondrial membrane organization, and stress responses
      such as mitochondrial hyperfusion. These proteins may also play roles in cell
      migration, proliferation, T-cell activation, and calcium homeostasis.
