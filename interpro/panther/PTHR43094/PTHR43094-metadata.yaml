  name:
    name: Class-III Pyridoxal-Phosphate-Dependent Aminotransferase
    short: Class-III_PLP-dep_AT
  description:
  - text: The Class-III Pyridoxal-Phosphate-Dependent Aminotransferase family is involved
      in various metabolic processes, including the degradation of amino acids and
      other nitrogenous compounds. Members of this family catalyze transamination
      reactions, transferring amino groups from donor to acceptor molecules, which
      is a critical step in nitrogen metabolism. Functions include the degradation
      of taurine to ammonia, acetate, and sulfide, the catabolism of putrescine, and
      the conversion of (R)-1-hydroxy-2-aminoethylphosphonate to ammonia and phosphonoacetaldehyde.
      Some members are involved in the biosynthesis of secondary metabolites like
      fusaristatin A, while others participate in glycerol catabolism or the degradation
      of ectoine. The family's enzymes are characterized by their requirement for
      pyridoxal phosphate as a cofactor and their high substrate specificity, which
      is essential for their roles in various biochemical pathways.
