  name:
    name: Arsenate Reductase Enzyme
    short: Arsenate_reductase
  description:
  - text: The arsenate reductase family consists of enzymes that play a crucial role
      in cellular defense against arsenic toxicity. Members of this family catalyze
      the reduction of arsenate [As(V)] to arsenite [As(III)], which is a key step
      in arsenic detoxification pathways. Some family members are involved in the
      mycothiol/myoredoxin redox pathway, using a mycothioltransferase mechanism to
      facilitate adduct formation between arsenate and mycothiol. Additionally, certain
      arsenate reductases also exhibit phosphatase activity, albeit weak, towards
      substrates like para-nitrophenyl phosphate (pNPP). The family belongs to the
      low molecular weight phosphotyrosine protein phosphatase family and includes
      both thioredoxin-coupled and glutaredoxin-coupled subfamilies. The activity
      of these enzymes can be regulated by various factors, including potassium and
      sulfate ions, and can be inhibited by arsenite.
