  name:
    name: Glucose-Methanol-Choline (GMC) Oxidoreductase
    short: GMC_Oxidoreductase
  description:
  - text: The GMC oxidoreductase family is characterized by its members' ability to
      catalyze the oxidation of various sugars and related compounds. Members of this
      family play crucial roles in metabolic processes such as lignin degradation
      in wood rot fungi, where they generate hydrogen peroxide as a cosubstrate for
      ligninolytic peroxidases. They are also involved in the biosynthesis of antibiotics
      like cortalcerone and aminoglycosides such as neomycin and lividomycin. Substrates
      for these enzymes include aldopyranoses, disaccharides, and specific compounds
      like D-glucose, D-xylose, L-sorbose, D-galactose, and 1,5-anhydroglucitol. Some
      family members are implicated in the degradation of environmental contaminants
      like methyl tert-butyl ether. The family is characterized by the presence of
      a flavin adenine dinucleotide (FAD) cofactor and is inhibited by compounds such
      as HgCl2.
