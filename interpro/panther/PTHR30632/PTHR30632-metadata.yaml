  name:
    name: Bacterial molybdate/tungstate-binding
    short: ModA/WtpA
  description:
  - text: The ModA/WtpA protein family is involved in the transport of molybdenum
      and tungstate into bacterial cells. Members of this family are typically part
      of ABC transporter complexes, such as ModABC and WtpABC, which are binding-protein-dependent
      systems. These proteins exhibit high-affinity binding to molybdate and tungstate,
      and some can also bind chromate with lower affinity. The primary role of the
      ModA/WtpA family is to facilitate the uptake of essential trace elements like
      molybdenum, which is crucial for the function of various enzymes, including
      those involved in nitrate reduction. While the majority of the family members
      are characterized by their function in molybdate and tungstate transport, some
      proteins within this family remain uncharacterized, suggesting potential diversity
      in function.
