  name:
    name: Binding-Protein-Dependent Transport System Permease
    short: BP-Dependent_Transporter
  description:
  - text: This family of proteins is involved in the transport of specific substrates
      across cellular membranes. Members of this family are part of the binding-protein-dependent
      transport system, which is typically associated with ATP-binding cassette (ABC)
      transporters. These transporters are known to play a crucial role in the uptake
      of various molecules, including nutrients and polysaccharides, by facilitating
      their translocation through the membrane. One of the proteins in this family
      is implicated in the degradation of pectin, a plant cell wall polysaccharide,
      by participating in the transport of polygalacturonan and rhamnogalacturonan
      type I into the cell.
