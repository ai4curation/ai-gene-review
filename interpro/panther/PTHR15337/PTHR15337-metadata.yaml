  name:
    name: Anterior Gradient and Thioredoxin Domain
    short: AGR/TXD
  description:
  - text: The AGR family proteins are involved in a variety of cellular processes,
      including the formation of cement glands, cell migration, differentiation, growth,
      and adhesion. Some members function as protein-disulfide reductases in the endoplasmic
      reticulum, promoting disulfide bond formation in client proteins through thiol-disulfide
      oxidase activity. Others are implicated in mucociliary clearance in the airway
      by regulating ciliary beat frequency in response to calcium signaling. Additionally,
      certain AGR proteins are associated with the post-transcriptional synthesis
      and secretion of mucins, such as MUC2, and may act as proto-oncogenes. The family
      includes proteins that may also play roles in antioxidant defense and response
      to viral infection.
