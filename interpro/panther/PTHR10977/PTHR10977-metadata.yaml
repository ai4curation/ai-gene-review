  name:
    name: Diphosphomevalonate decarboxylase
    short: Diphosphomevalonate_decarbox
  description:
  - text: The diphosphomevalonate decarboxylase family is involved in the mevalonate
      (MVA) pathway, which is crucial for the biosynthesis of isoprene-containing
      compounds such as sterols and terpenoids. Members of this family catalyze the
      ATP-dependent decarboxylation of (R)-5-diphosphomevalonate (MVAPP) to isopentenyl
      diphosphate (IPP), a key precursor in the synthesis of isoprenoids, sterols,
      and other essential biomolecules. This enzymatic activity is a committed step
      in the production of various compounds, including triterpenes, phytosterols,
      ubiquinone, dolichol, heme, and prenylated proteins. The family is characterized
      by a conserved function across different species, from plants and fungi to mammals,
      highlighting its fundamental role in cellular metabolism and the biosynthesis
      of structurally diverse molecules with numerous biological functions.
