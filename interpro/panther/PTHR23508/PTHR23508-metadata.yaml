  name:
    name: Major Facilitator Superfamily (MFS) Transporters
    short: MFS_Transporters
  description:
  - text: The Major Facilitator Superfamily (MFS) Transporters protein family is characterized
      by its members' ability to facilitate the transport of a diverse range of substrates
      across cellular membranes. Members of this family are integral membrane proteins
      that utilize the proton motive force to drive the transport of substrates, which
      include sialic acid, aromatic acids, glycerophosphodiester, and potentially
      other metabolites. The transport process is typically proton-dependent and can
      function bidirectionally. The family includes sialic acid transporters (NanT),
      which are involved in the uptake of sialic acid variants such as N-acetylneuraminic
      acid, and other transporters that mediate the uptake of aromatic acids like
      4-hydroxybenzoate, as well as glycerophosphoinositol and glycerophosphocholine.
      The MFS Transporters are essential for various cellular processes, including
      nutrient uptake, metabolite secretion, and chemotaxis towards specific substrates.
