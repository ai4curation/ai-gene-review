  name:
    name: Cysteine protease inhibitor I42
    short: Cys_protease_inhibitor_I42
  description:
  - text: This family of proteins includes inhibitors of cysteine proteases. Members
      of this family are characterized by their ability to block the substrate-binding
      site of target cysteine proteases through a tripartite wedge formed by the BC,
      DE, and FG loops. The BC loop, in particular, is noted for interacting with
      the catalytically active cysteine and histidine residues of the protease catalytic
      center. These proteins play a protective role by inhibiting the activity of
      cysteine proteases, which may be released by damaged intracellular vesicles
      or are otherwise active within the organism. The inhibition of these proteases
      is crucial for regulating proteolytic processes and maintaining cellular integrity.
