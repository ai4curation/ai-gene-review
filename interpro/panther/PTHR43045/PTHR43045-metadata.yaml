  name:
    name: Major Facilitator Superfamily Transporter
    short: MFS_Transporter
  description:
  - text: This family of proteins includes transporters that are part of the major
      facilitator superfamily (MFS). Members of this family are involved in the translocation
      of various substrates across cell membranes, typically utilizing a proton gradient.
      Some proteins in this family function as efflux pumps, contributing to antibiotic
      resistance by expelling toxic compounds like fosfomycin out of the cell. Others
      are involved in the uptake of essential metabolites, such as shikimate, which
      is a precursor in the biosynthesis of aromatic amino acids. Additionally, certain
      members may form channels in the membranes of human cells, such as inward rectifying
      potassium channels when overexpressed. The activity of some family members can
      be inhibited by efflux inhibitors, indicating a role in cellular transport processes
      that can be regulated by chemical agents.
