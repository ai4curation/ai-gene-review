  name:
    name: Aldose epimerase
    short: Aldose_epimerase
  description:
  - text: The aldose epimerase family comprises enzymes that catalyze the interconversion
      of alpha and beta anomers of aldoses. Members of this family are involved in
      carbohydrate metabolism, including the Leloir pathway for galactose metabolism.
      They act as mutarotases, ensuring the equilibrium between different anomer forms,
      which is essential for various metabolic processes. These enzymes are active
      on sugars such as D-glucose, L-arabinose, D-xylose, D-galactose, maltose, and
      lactose. Some members are also involved in specialized biosynthetic pathways,
      such as the production of mycoestrogens in fungi. The family includes mammalian
      galactose mutarotases, which preferentially convert beta-D-galactose to alpha-D-galactose,
      a crucial step in the metabolism of galactose to glucose 1-phosphate.
