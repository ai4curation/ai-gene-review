  name:
    name: Bacterial Polyamine Transport Permease
    short: Bact_Polyamine_Transport
  description:
  - text: The PotC/PotI protein family is involved in the bacterial transport of polyamines,
      specifically putrescine and spermidine. Members of this family are integral
      components of the ABC transporter complex, which is essential for the uptake
      of these polyamines across the bacterial membrane. The PotC proteins function
      as part of the periplasmic transport system, while PotI proteins are responsible
      for the translocation of putrescine as part of the PotFGHI complex. The activity
      of these transporters is crucial for maintaining optimal concentrations of polyamines
      necessary for cell growth, especially in the presence of glucose. Additionally,
      the transport activity is regulated by the intracellular levels of polyamines,
      indicating a feedback inhibition mechanism to prevent excessive accumulation.
