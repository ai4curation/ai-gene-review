  name:
    name: Mitochondrial 2-oxodicarboxylate carrier
    short: Mito_2-oxodicarb_carrier
  description:
  - text: This family of proteins is involved in the transport of dicarboxylates and
      oxodicarboxylates across the inner mitochondrial membrane. Members of this family
      function through a counter-exchange mechanism, facilitating the import of key
      metabolic intermediates into the mitochondria. These substrates include 2-oxoadipate,
      2-oxoglutarate, adipate, glutarate, and to a lesser extent, pimelate, 2-oxopimelate,
      2-aminoadipate, oxaloacetate, and citrate. These transported molecules are central
      to the catabolism of amino acids such as lysine, hydroxylysine, and tryptophan.
      Once inside the mitochondria, these intermediates can be converted into acetyl-CoA,
      which then enters the citric acid cycle. This process is crucial for energy
      production and various biosynthetic pathways. The proteins in this family are
      characterized by their membership in the mitochondrial carrier family, indicating
      a shared structure and transport mechanism.
