  name:
    name: Autophagy and Host Defense Regulator
    short: Autophagy_HostDef_Reg
  description:
  - text: The protein family is involved in the regulation of autophagy and host defense
      mechanisms. Members promote autophagosome maturation by facilitating the production
      of PtdIns(3)P and antagonizing negative regulators of the PI3K/PI3KC3 complex.
      They bind various phosphoinositides and recruit complexes to autophagosomes,
      influencing their fusion with lysosomes. Additionally, they regulate lipid and
      glycogen homeostasis and may act as tumor suppressors. Some members inhibit
      PIK3C3 activity, negatively regulate endosome maturation, and affect endocytic
      trafficking. They are also involved in the immune response, promoting NADH oxidase
      activity and affecting TLR signaling, as well as regulating pro-inflammatory
      cytokine production following pathogen infection.
