  name:
    name: Fungal pH-response regulator palI/RIM9
    short: pH-response_reg_palI/RIM9
  description:
  - text: The palI/RIM9 family is involved in the regulation of pH response in various
      fungi. Members of this family are essential for the proteolytic cleavage of
      transcription factors, such as RIM101 or its homologs, which is a crucial step
      in the adaptation to alkaline environments. This cleavage event activates the
      transcription factors, enabling the expression of genes necessary for processes
      like sporulation, invasive growth, and correct cell separation under specific
      conditions. Some members may also function as pH sensors, contributing to the
      detection of ambient pH changes and initiating appropriate cellular responses.
