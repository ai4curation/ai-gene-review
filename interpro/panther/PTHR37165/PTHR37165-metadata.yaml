  name:
    name: Encapsulin nanocompartment
    short: Encapsulin_nc
  description:
  - text: The encapsulin family is characterized by its ability to form proteinaceous
      nanocompartments, typically ranging from 21 to 33 nm in diameter, with walls
      about 2-2.5 nm thick. These nanocompartments serve as specialized storage vessels,
      often for iron, and may protect against oxidative damage. Encapsulins assemble
      into icosahedral shells with pores that can regulate the passage of molecules.
      Cargo proteins, such as ferritin-like proteins or enzymes like DyP, are targeted
      to the interior via C-terminal extensions. Some encapsulins are fused with cargo
      proteins, such as ferritin or diheme-cytochrome, and exhibit additional functions
      like ferroxidase activity. These nanocompartments are implicated in various
      cellular processes, including iron storage and protection from oxidative stress,
      and may be involved in the immune response. The encapsulin family displays a
      remarkable structural diversity, with variations in size, pore dynamics, and
      cargo protein incorporation, reflecting their specialized functions across different
      organisms.
