  description:
  - text: The adenylyl cyclase class-4/guanylyl cyclase family is responsible for
      the synthesis of the signaling molecule cAMP in response to G-protein signaling.
      Members of this family play a crucial role in various cellular processes, including
      learning, memory, insulin secretion, heart function, and immune responses. They
      are activated by various mechanisms, such as interaction with G-protein subunits,
      calcium/calmodulin, and forskolin. Some family members are involved in the regulation
      of synaptic plasticity and may influence the circadian rhythm. The proteins
      contain two modules with six transmembrane helices each, necessary for catalytic
      activity, with the active site at the interface of the two domains.
