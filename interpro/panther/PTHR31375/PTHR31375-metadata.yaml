  name:
    name: Plant Cell Wall Polygalacturonase
    short: Glycosyl_hydrolase_28
  description:
  - text: The glycosyl hydrolase 28 family is involved in the degradation of pectin,
      a component of the plant cell wall. Members of this family act in various processes
      such as the ripening of fruits, where they work alongside pectinesterase to
      break down polyuronides. They also play roles in pollen development, germination,
      and tube growth, often functioning as exo-polygalacturonases. Additionally,
      they are implicated in cell separation during the final stages of pod shatter,
      anther dehiscence, and floral organ abscission. The enzymatic activity of these
      proteins contributes to cell wall metabolism and remodeling, which is crucial
      for plant development and reproduction.
