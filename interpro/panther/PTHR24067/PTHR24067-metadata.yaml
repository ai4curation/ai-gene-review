  name:
    name: Ubiquitin-conjugating enzyme
    short: Ub_conjugating_enzyme
  description:
  - text: The ubiquitin-conjugating enzyme family is involved in the post-translational
      modification process known as ubiquitination, which tags proteins for various
      cellular processes. Members of this family accept ubiquitin from E1 activating
      enzymes and transfer it to target proteins, often with the help of E3 ligases.
      This modification can signal for protein degradation, alter protein function
      or localization, and affect protein-protein interactions. Ubiquitination plays
      a critical role in cell cycle regulation, DNA repair, signal transduction, and
      immune responses. Some family members also work with ubiquitin-like proteins
      such as NEDD8 and SUMO, expanding the functional repertoire to processes like
      nuclear architecture, chromosome segregation, and vesicle trafficking.
