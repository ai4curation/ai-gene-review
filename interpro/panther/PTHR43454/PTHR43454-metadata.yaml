  name:
    name: Glyceraldehyde-3-phosphate dehydrogenase
    short: GAPDH
  description:
  - text: This family of proteins includes enzymes that play a crucial role in the
      glycolytic pathway, catalyzing the reversible oxidative phosphorylation of glyceraldehyde-3-phosphate
      to 1,3-bisphosphoglycerate with the concomitant reduction of NAD+ to NADH. This
      is a key step in the metabolic pathway, allowing for the production of ATP and
      pyruvate, which are essential for cellular energy supply and biosynthetic processes.
      Members of this family are highly conserved and are found in a wide range of
      organisms, from prokaryotes to eukaryotes, reflecting their fundamental role
      in cellular metabolism.
