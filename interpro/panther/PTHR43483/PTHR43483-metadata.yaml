  name:
    name: Toluene Sulfonate Uptake Permease
    short: TSUP
  description:
  - text: This family of proteins is involved in the transport of specific substrates
      across cellular membranes. Members of this family are characterized by their
      role in the uptake of sulfonate compounds, such as 4-toluene sulfonate. These
      transporters are typically integral membrane proteins that function by facilitating
      the movement of these compounds into the cell, which can then be utilized as
      a sulfur source or in other metabolic processes. The transport mechanism employed
      by these proteins may involve a symport or antiport system, where the movement
      of the sulfonate is coupled with that of another ion, often a proton, across
      the membrane. This coupling is essential for the concentration of the substrate
      against its gradient, which is a common feature of transport systems in bacteria
      where these proteins are predominantly found.
