  name:
    name: N-acylglucosamine 2-epimerase
    short: N-acylglucosamine_2-epim
  description:
  - text: The N-acylglucosamine 2-epimerase family includes enzymes that catalyze
      the interconversion of N-acetylglucosamine to N-acetylmannosamine, playing a
      role in the degradation pathway of N-glycolylneuraminic acid (Neu5Gc). Some
      family members also catalyze the isomerization of D-mannose to D-fructose and
      can act on other sugars like D-lyxose, sulfoquinovose (SQ), and 6-deoxy-6-sulfo-D-fructose
      (SF). The family exhibits diverse substrate specificities and reaction types,
      including epimerization of cellobiose to 4-O-beta-D-glucopyranosyl-D-mannose
      and isomerization of various gluco-oligosaccharides. Activity regulation is
      observed with enhancement by ATP in some members, while others are inhibited
      by various metal ions and nucleotides. The family is characterized by a broad
      range of functions in carbohydrate metabolism, reflecting the versatility of
      sugar biochemistry in different biological contexts.
