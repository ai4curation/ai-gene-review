  name:
    name: NAD(P) transhydrogenase subunit beta
    short: PNT_beta_subunit
  description:
  - text: The PNT beta subunit family is characterized by its role in the transhydrogenation
      process between NADH and NADP+. Members of the PNT beta subunit family are integral
      in coupling this transhydrogenation to respiration and ATP hydrolysis, thereby
      functioning as a proton pump across biological membranes. This essential process
      is crucial for maintaining the balance of NADH and NADP+ within the cell, which
      is vital for various metabolic pathways. The activity of the PNT beta subunit
      family is fundamental in energy metabolism and redox balance, reflecting its
      importance across different bacterial species.
