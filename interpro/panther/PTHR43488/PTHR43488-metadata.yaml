  name:
    name: Alanine Aminotransferase
    short: Ala_Aminotransferase
  description:
  - text: This family of proteins is involved in amino acid metabolism, specifically
      in the biosynthesis and degradation of alanine. Members of this family function
      as aminotransferases, enzymes that catalyze the transfer of an amino group from
      an amino acid to a keto acid. The primary reaction mediated by these enzymes
      is the transamination of pyruvate and glutamate, resulting in the production
      of L-alanine and 2-oxoglutarate. This reversible reaction is a key step in the
      metabolic pathway, linking nitrogen and carbon metabolism. The enzymes typically
      require pyridoxal phosphate as a cofactor for their activity.
