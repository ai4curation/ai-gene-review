  name:
    name: Polyketide Synthase Enzyme
    short: Polyketide_Synthase
  description:
  - text: The polyketide synthase family is involved in the biosynthesis of a diverse
      range of secondary metabolites with various biological activities, including
      antibiotics, mycotoxins, and other bioactive compounds. These modular enzymes
      catalyze the condensation of acyl-CoA units through decarboxylative Claisen
      condensation reactions, forming complex polyketide chains. The family includes
      non-reducing, reducing, and iterative polyketide synthases, each with distinct
      domain architectures that determine the structural diversity of the polyketides
      produced. The enzymes typically possess domains for ketosynthase, acyltransferase,
      acyl carrier protein, and additional domains for methylation, reduction, or
      cyclization, which contribute to the functional versatility of the family in
      generating polyketides with specific chemical modifications and biological functions.
