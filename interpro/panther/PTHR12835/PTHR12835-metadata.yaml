  name:
    name: Biotin--protein ligase
    short: Biotin-protein_ligase
  description:
  - text: The biotin--protein ligase family consists of enzymes that play a crucial
      role in the post-translational modification of biotin-dependent carboxylases.
      These ligases activate biotin to form biotinyl-5'-adenylate and subsequently
      transfer the biotin moiety to specific lysine residues on biotin-accepting proteins,
      such as acetyl-CoA carboxylase, pyruvate carboxylase, propionyl-CoA carboxylase,
      and methylcrotonyl-CoA carboxylase. Some members also function as repressors
      for the biotin operon, regulating the balance between enzymatic activity and
      gene repression based on cellular biotin demand. Bifunctional variants possess
      additional domains for activities such as DNA-binding or pantothenate kinase
      activity, involved in CoA biosynthesis. The family is characterized by a central
      catalytic domain, with some members having additional domains for DNA-binding
      and dimerization, which are essential for their dual ligase and repressor functions.
