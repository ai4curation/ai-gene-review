  name:
    name: TEC1/TEAD Transcription Factor
    short: TEC1_TEAD_TF
  description:
  - text: The TEC1/TEAD family comprises transcription factors that play crucial roles
      in various biological processes, including organ size control, tumor suppression,
      cell proliferation, apoptosis, and developmental regulation. Members of the
      family are central to the Hippo signaling pathway, which restricts cell proliferation
      and promotes cell death to regulate organ growth and prevent tumorigenesis.
      They bind to specific DNA sequences, mediating gene expression of key pathway
      components like YAP1 and WWTR1/TAZ. Additionally, some family members are involved
      in the regulation of sporulation-specific genes, conidiophore development, and
      conidium maturation in fungi, where they bind to specific DNA sequences to regulate
      gene expression for morphological and chemical development during the life-cycle.
