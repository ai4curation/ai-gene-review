  name:
    name: Flagellar biosynthesis and adherence
    short: FliO/MopB
  description:
  - text: The FliO/MopB family is involved in bacterial motility and virulence, with
      members playing roles in flagellar biosynthesis and adherence. Proteins in the
      family may assist in the localization and assembly of flagellar components and
      adhesins on the bacterial surface, which are crucial for movement and host interaction.
      The family includes proteins that are required for both motility and virulence,
      indicating a dual function that is essential for the pathogenicity of some bacteria.
