  name:
    name: Bacterial cell wall metabolism enzyme
    short: Cell_wall_metabolism_enzyme
  description:
  - text: This family of proteins includes enzymes involved in bacterial cell wall
      metabolism. Members of this family function as murein hydrolase activators,
      endopeptidases, and transglycosylases. They play roles in cell division by activating
      cell wall hydrolases for septal murein cleavage and daughter cell separation.
      Some act on polyglycine interpeptide bridges in the peptidoglycan layer, facilitating
      cell wall expansion, remodeling, and autolysis. Others are involved in the maturation
      of the spore cortex peptidoglycan or in the degradation of host proteins like
      elastin, contributing to pathogenicity. The family includes proteins with peptidase
      M23B domain known for lysostaphin-like endopeptidase activity, and some members
      are implicated in virulence as they may degrade host tissues or participate
      in immune evasion.
