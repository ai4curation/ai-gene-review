  name:
    name: Plant disease resistance NBS-LRR
    short: Plant_NBS-LRR
  description:
  - text: This family of proteins is involved in plant defense mechanisms against
      a variety of pathogens, including bacteria and oomycetes. Members of this family
      are typically characterized by the presence of nucleotide-binding site (NBS)
      and leucine-rich repeat (LRR) domains. These domains are thought to play a role
      in pathogen recognition and the specificity of the immune response. The proteins
      are known to mediate defense responses by recognizing specific pathogen effectors,
      which can trigger a hypersensitive response to restrict pathogen growth. Some
      family members are regulated by kinase cascades and may interact with other
      proteins to initiate signaling pathways that lead to resistance. The family
      includes both characterized disease resistance proteins with known targets and
      putative resistance proteins whose specific functions and pathogen targets may
      not be fully elucidated.
