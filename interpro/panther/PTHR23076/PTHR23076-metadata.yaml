  name:
    name: ATP-dependent Zinc Metalloprotease FtsH
    short: FtsH_Metalloprotease
  description:
  - text: The FtsH family includes ATP-dependent zinc metalloproteases that play a
      crucial role in the quality control of integral membrane proteins. They act
      processively to degrade both cytoplasmic and membrane proteins, often starting
      at either the N- or C-terminus. Recognition of substrates does not require a
      specific sequence but may involve a cytoplasmic tail of about 20 residues. These
      proteases are involved in various cellular processes, including the degradation
      of misfolded, damaged, or unassembled proteins, regulation of the heat shock
      response, and maintenance of mitochondrial function and morphology. Some family
      members are also implicated in the assembly and stability of respiratory chain
      complexes and photosystem II repair cycle, particularly in the removal of damaged
      D1 protein to prevent cell death under high-intensity light conditions.
