  name:
    name: Pterin-4-alpha-carbinolamine dehydratase
    short: Pterin-4-alpha-carb_dehyd
  description:
  - text: The pterin-4-alpha-carbinolamine dehydratase family includes enzymes involved
      in tetrahydrobiopterin biosynthesis. These enzymes play a role in preventing
      the formation of 7-pterins and in accelerating the conversion of dihydrobiopterin
      to quinonoid dihydrobiopterin. Additionally, they may have a regulatory function
      in the expression of related genes such as phhA. Tetrahydrobiopterin is an essential
      cofactor in the hydroxylation of aromatic amino acids and the production of
      neurotransmitters.
