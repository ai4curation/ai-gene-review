  name:
    name: Cyclic nucleotide synthase
    short: Cyclic_nucleotide_synthase
  description:
  - text: This family of proteins includes receptor-type guanylate cyclases and adenylate
      cyclases, which are key enzymes in the production of cyclic nucleotide second
      messengers. These enzymes catalyze the conversion of GTP to cGMP or ATP to cAMP,
      respectively. The cGMP synthesized by guanylate cyclases is involved in various
      physiological processes such as phototransduction, chemotaxis, thermotaxis,
      and regulation of ion channels and sensory neurons. Some family members possess
      an inactive protein kinase domain and are involved in the regulation of cellular
      responses to external stimuli, including light, odorants, and peptide hormones.
      The adenylate cyclases contribute to the regulation of developmental processes
      and response to extracellular signals.
