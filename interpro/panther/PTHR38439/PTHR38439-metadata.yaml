  name:
    name: Copper-binding electron transfer protein
    short: Cu-binding_ET
  description:
  - text: This family of proteins is involved in electron transfer processes, acting
      as electron acceptors and donors in various biological redox reactions. Members
      of this family are known to transfer electrons to cytochrome oxidase, playing
      a role in the electron transport chain. Some proteins within this family are
      associated with copper tolerance, binding copper ions and protecting other proteins
      from copper-induced damage. The family includes soluble electron acceptors for
      membrane protein complexes and may participate in the oxidation of specific
      substrates such as methylamine. The proteins exhibit a cupredoxin domain, indicating
      their ability to bind copper and participate in redox reactions.
