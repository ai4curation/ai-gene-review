  name:
    name: Glutaredoxin
    short: Glutaredoxin
  description:
  - text: This family of proteins is involved in redox reactions, functioning as glutathione-dependent
      oxidoreductases. They participate in the reduction of disulfide bonds in various
      substrates, including low molecular weight compounds and proteins, in a reaction
      that typically requires NADPH and glutathione reductase. Some members are capable
      of binding and transferring iron-sulfur clusters, which are critical for a variety
      of cellular processes. The proteins also play a role in the synthesis of deoxyribonucleotides
      by ribonucleotide reductase, and in protecting cells from oxidative stress by
      regulating the redox state of protein sulfhydryl groups. The family includes
      proteins with monothiol and CPYC motifs, indicating a diversity of structures
      and specific functions within the broader role in cellular redox homeostasis.
