  name:
    name: Ribosomal RNA large subunit methyltransferase K/L
    short: RlmKL_methyltransferase
  description:
  - text: The RlmKL family comprises ribosomal RNA large subunit methyltransferases
      that are specialized in post-transcriptional modification of 23S rRNA. Members
      of this family are responsible for the specific methylation of guanine at positions
      2445 and 2069, resulting in m2G2445 and m7G2069 modifications, respectively.
      These methylations are crucial for the proper function of the ribosome, potentially
      affecting the accuracy of translation by influencing ribosome assembly or the
      interaction with other ribosomal components. The RlmKL family belongs to the
      broader methyltransferase superfamily, sharing a common enzymatic activity that
      involves the transfer of a methyl group to their rRNA substrate, a process essential
      for ribosome biogenesis and function.
