  name:
    name: Epithelial Splicing Regulatory
    short: ESRP
  description:
  - text: The ESRP family is involved in the regulation of mRNA splicing, playing
      a crucial role in the formation of cell type-specific isoforms, particularly
      in epithelial cells. Family members are known to regulate the expression of
      FGFR2-IIIb, an epithelial-specific isoform of FGFR2, and are implicated in the
      splicing of various transcripts during the epithelial-to-mesenchymal transition
      (EMT). They act by directly binding to specific sequences in mRNAs, such as
      GU-rich motifs in regulatory regions. Some family members also participate in
      the regulation of alternative splicing in embryo development and are involved
      in processes like inner ear development and auditory hair cell differentiation.
      Additionally, hnRNP proteins within this family contribute to pre-mRNA processing
      events, forming complexes that are essential for the conversion of pre-mRNAs
      into functional, translatable mRNAs in the cytoplasm.
