  name:
    name: Bacterial Fimbrial Adherence
    short: Bact_Fimbrial_Adh_Pro
  description:
  - text: The fimbrial protein family is involved in the formation of fimbriae, also
      known as pili, which are polar filaments extending from the bacterial cell surface.
      These structures, typically 0.5-1.5 micrometers in length and numbering 100-300
      per cell, play a crucial role in bacterial adherence to host epithelial cells
      and colonization of specific host organs. Fimbriae facilitate the initial attachment
      of bacteria to host tissues, which is a critical step in the establishment of
      infections. They can bind to various receptors on host cells, including N-acetylglucosamine-containing
      receptors and laminin. Some family members are also implicated in microcolony
      formation and may contribute to adhesion to abiotic surfaces in specific environmental
      niches. The family includes major structural subunits, adhesins, and minor components
      that may influence pilus length and biogenesis.
