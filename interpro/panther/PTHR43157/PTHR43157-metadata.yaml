  name:
    name: Short-chain dehydrogenases/reductases
    short: SDR
  description:
  - text: The Short-chain dehydrogenases/reductases (SDR) family encompasses enzymes
      that participate in a wide range of biosynthetic pathways, producing diverse
      secondary metabolites with various biological functions. Members of the SDR
      family are involved in the biosynthesis of compounds such as sorbicillinoids,
      virensols, trichoxide, sesquiterpenyl epoxy-cyclohexenoids, cytochalasans, dibenzodioxocinones,
      macrophorins, oxopyrrolidines, and diterpenoid pyrones. These enzymes typically
      exhibit oxidoreductase activity, catalyzing reactions that involve the oxidation
      of alcohols to ketones or aldehydes, and the reduction of ketones to alcohols.
      They play crucial roles in the modification of polyketides, terpenoids, and
      retinoids, contributing to the structural diversity of natural products with
      applications in medicine, agriculture, and industry. The SDR family is characterized
      by a preference for NADP as a cofactor and does not display activity towards
      steroids.
