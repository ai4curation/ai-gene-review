  name:
    name: Optineurin/NF-kappa-B Essential Modulator
    short: Optineurin/NFkB_EssMod
  description:
  - text: The Optineurin/NF-kappa-B essential modulator family is involved in various
      cellular processes including the maintenance of the Golgi complex, membrane
      trafficking, exocytosis, and the activation of innate immune responses. Family
      members interact with myosin VI and Rab8 to facilitate Golgi ribbon formation
      and regulate endocytic trafficking. They play a role in neuroprotection, particularly
      within the eye and optic nerve. Additionally, they function in the TNF-alpha
      signaling pathway, potentially influencing cell death induction. Members of
      this family serve as autophagy receptors, targeting ubiquitin-coated bacteria
      for degradation. They are also implicated in antiviral responses by recruiting
      TBK1 to phosphorylate IRF3, leading to IFN-beta production. The family's ability
      to bind polyubiquitin chains is crucial for the activation of NF-kappa-B, a
      key factor in cell survival and immune response signaling. The family's involvement
      in these pathways suggests a broad role in cellular homeostasis and defense
      mechanisms.
