  name:
    name: Phosphoglycerate Mutase/Phosphatase
    short: PGM_Phosphatase
  description:
  - text: The phosphoglycerate mutase family is involved in various metabolic processes,
      including glycolysis and gluconeogenesis, by catalyzing the interconversion
      of 2-phosphoglycerate and 3-phosphoglycerate. Some members exhibit phosphatase
      activity, participating in the biosynthesis of compounds like mycobacterial
      methylglucose lipopolysaccharides or in the dephosphorylation of specific phosphosugars.
      Others have evolved to acquire specialized functions, such as the regulation
      of carbohydrate metabolism, involvement in serine biosynthesis, or the hydrolysis
      of phospho groups from vitamin B12 intermediates. The family also includes proteins
      with broader substrate specificity, acting on various phosphorylated compounds
      but lacking phosphoglycerate mutase activity. Collectively, the family plays
      a crucial role in carbohydrate metabolism and other biosynthetic pathways, with
      some members also implicated in stress response and immune modulation.
