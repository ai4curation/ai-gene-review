  name:
    name: Photosystem I iron-sulfur center
    short: PSI_iron-sulfur_center
  description:
  - text: The Photosystem I iron-sulfur center family comprises apoproteins that are
      crucial for the photochemical activity of Photosystem I (PSI), a plastocyanin-ferredoxin
      oxidoreductase. These proteins harbor two 4Fe-4S centers, named FA and FB, with
      FB serving as the terminal electron acceptor of PSI. Electrons are donated to
      ferredoxin by FB. The C-terminus of these proteins is involved in interactions
      with other PSI components, such as PsaA/B/D, and is necessary for the assembly
      of the PSI complex and the binding of PsaD and PsaE to PSI. The primary function
      of the family is to facilitate the conversion of photonic excitation into a
      charge separation, which sequentially transfers an electron from the donor P700
      chlorophyll pair to a series of spectroscopically characterized acceptors, including
      A0, A1, FX, FA, and FB.
