  name:
    name: E3 ubiquitin-protein ligase TRIM/RNF
    short: E3_ubiq-ligase_TRIM/RNF
  description:
  - text: This family of proteins includes E3 ubiquitin-protein ligases with a role
      in innate immune defense, particularly against viral infections. They mediate
      ubiquitination of key signaling molecules such as RIG-I and IFIH1/MDA5, which
      are crucial for the production of interferons in response to viral RNA. Some
      family members also regulate autophagy, inflammation, and cell survival pathways.
      They can ubiquitinate various substrates, influencing processes like mRNA stability,
      stress granule formation, and protein degradation. The family is characterized
      by the presence of a RING-type zinc finger domain, which is essential for their
      ligase activity, and some members have a B30.2/SPRY domain for substrate interaction.
      They are involved in modulating signal transduction pathways by ubiquitinating
      different proteins, thus affecting their stability and function.
