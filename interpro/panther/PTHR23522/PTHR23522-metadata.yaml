  name:
    name: Major Facilitator Superfamily Transporters
    short: MFS_Transporters
  description:
  - text: The Major Facilitator Superfamily (MFS) Transporters protein family is characterized
      by its members' ability to facilitate the transport of various substrates across
      cellular membranes. Members of this family utilize a proton motive force to
      drive the symport of substrates, which include a broad range of molecules such
      as beta-galactosides, purine and pyrimidine nucleosides, oligosaccharides, and
      organic acids like 3-phenylpropionic acid. The transport activity of these proteins
      is typically regulated by protonophores and can be inhibited by specific uncouplers
      or antibiotics. The substrate specificity varies among family members, with
      some proteins preferring galactopyranosyl or fructofuranosyl moieties, while
      others have a broader specificity that encompasses various nucleosides or oligosaccharides.
