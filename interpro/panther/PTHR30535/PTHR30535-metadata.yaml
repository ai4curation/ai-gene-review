  name:
    name: ABC Transporter Solute-Binding
    short: ABC_Transporter_SBP
  description:
  - text: The protein family is involved in the transport and binding of various substrates
      through ABC transporter complexes. Members of the family function as solute-binding
      proteins that capture and deliver ligands to their respective transporters.
      Some proteins within the family specialize in heme scavenging, binding Fe(2+)
      and Fe(3+) heme with a preference for Fe(2+), and play a role in transporting
      heme-iron to permeases. Others are involved in the import of vitamin B12 or
      cobalamin, binding the vitamin and presenting it to the transporter surface.
      Additionally, some members bind molybdate and tungstate, contributing to the
      import of these oxyanions. The family includes proteins with both high and low
      affinity for their substrates, and some exhibit a decrease in affinity with
      increasing substrate and nucleotide concentrations.
