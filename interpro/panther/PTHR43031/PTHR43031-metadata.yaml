  name:
    name: Thiosulfate sulfurtransferase GlpE
    short: GlpE_sulfurtransferase
  description:
  - text: The GlpE family is characterized by proteins that are involved in sulfur
      metabolism, with a primary function of catalyzing sulfur transfer reactions.
      Members of this family, such as Thiosulfate sulfurtransferase GlpE, are known
      to transfer sulfur from thiosulfate to cyanide, albeit with low efficiency,
      suggesting that these may not be their physiological substrates. The family
      includes proteins with potential regulatory roles, such as in the response to
      antitubercular drugs, and others that may participate in oxidative dissimilatory
      sulfur metabolism as part of a sulfur relay system. The exact physiological
      roles and substrates for many members remain to be fully elucidated, with some
      evidence pointing towards interactions with thioredoxin or related dithiol proteins,
      and possible links to glycerol-phosphate metabolism.
