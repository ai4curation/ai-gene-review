  name:
    name: Precorrin Methyltransferase
    short: Precorrin_MeTrfase
  description:
  - text: The precorrin methyltransferase family is involved in the biosynthesis of
      cobalamin (vitamin B12) and related compounds. Members of this family are responsible
      for specific methylation reactions at the C-20 position of their substrates.
      The family includes enzymes that methylate cobalt-precorrin-2 to produce cobalt-precorrin-3A,
      as well as those that methylate precorrin-2 to yield precorrin-3A. These methylation
      steps are critical in the anaerobic pathway of cobalamin biosynthesis. Additionally,
      some family members catalyze the methylation of C-1 in precorrin-5 and facilitate
      the conversion to cobalt-precorrin-6A by extruding acetic acid from the intermediate.
      The precise function of each enzyme within the family varies, but all share
      the common role of contributing to the complex process of cobalamin and precorrin
      compound formation.
