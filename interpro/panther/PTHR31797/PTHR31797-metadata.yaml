  name:
    name: Extracellular matrix and enzyme regulator
    short: ECM-enzyme_regulator
  description:
  - text: This family of proteins includes components involved in the structural organization
      of cellular compartments and regulation of enzymatic activity. Members of this
      family are known to participate in the formation of extracellular matrix structures,
      as well as in the regulation of signal transduction pathways by modulating the
      activity of specific enzymes. One protein is involved in the construction of
      the stalk tube matrix that houses certain cell types, while another acts as
      an inhibitor of cyclic nucleotide phosphodiesterase, thereby affecting the enzyme's
      affinity for its substrate.
