  name:
    name: Mitochondrial and Outer Membrane Metalloprotease
    short: Mito/Outer_Membr_Metalloprot
  description:
  - text: The protein family includes mitochondrial and outer membrane metalloproteases
      involved in quality control and stress response. Mitochondrial members act as
      part of the inner membrane quality control system, cleaving mistranslated or
      misfolded proteins and regulating mitochondrial dynamics and apoptosis in response
      to stress. They play roles in the integrated stress response, lipid metabolism,
      and energy expenditure. Outer membrane members function as chaperones and proteases,
      maintaining membrane integrity by assembling or eliminating proteins based on
      their folding state, and are involved in LPS-assembly protein degradation. The
      family is characterized by a stress-sensor region that regulates proteolytic
      activity, often activated by autocatalytic cleavage upon mitochondrial depolarization.
