  name:
    name: Nuclear hormone receptor
    short: Nuclear_hormone_rcpt
  description:
  - text: This family of proteins includes orphan nuclear receptors that are involved
      in the regulation of gene transcription. Some members act in concert with other
      nuclear hormone receptors to modulate the expression of genes involved in lipid
      metabolism, including fatty acid desaturase genes. One member is known to bind
      regulatory elements and regulate transcription of target genes, including those
      promoting longevity and mitochondrial beta-oxidation. It is also involved in
      the response to mitochondrial stress and in the modulation of mitochondrial
      morphology and function. Additionally, this family plays a role in lifespan
      modulation and transgenerational lipid responses to dietary changes.
