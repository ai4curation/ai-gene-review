  name:
    name: Enoyl-CoA Hydratase/Isomerase
    short: Enoyl-CoA_hydratase/isomerase
  description:
  - text: The enoyl-CoA hydratase/isomerase family encompasses enzymes involved in
      the metabolism of fatty acids and other organic compounds. Members of this family
      are responsible for various biochemical reactions, including the hydration of
      enoyl-CoA to form hydroxyacyl-CoA, isomerization of epoxides, and carbon-carbon
      bond cleavage in cyclic compounds. They play roles in the reversible conversion
      of epoxides, the cleavage of beta-diketones, and the biosynthesis of antibiotics
      such as the carbapenem class. Additionally, they are capable of catalyzing decarboxylation
      and hydrolysis reactions involving CoA esters. The activity of these enzymes
      can be regulated by metal ions and reagents that interact with thiols, indicating
      a reliance on specific molecular conditions for optimal function.
