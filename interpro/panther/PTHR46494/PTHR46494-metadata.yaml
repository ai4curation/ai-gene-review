  name:
    name: CorA Metal Ion Transporter (MIT)
    short: CorA_MIT
  description:
  - text: The CorA Metal Ion Transporter (MIT) family is involved in the transport
      of divalent metal cations across cellular membranes. Members of this family
      function as symporters, coupling the transport of metal ions such as zinc (Zn2+),
      cobalt (Co2+), and magnesium (Mg2+) with protons, which likely facilitates the
      uptake of these ions into the cell. The transport process is regulated by the
      cytoplasmic levels of Mg2+, with low concentrations activating the transporter
      and high concentrations leading to inactivation. Some members have been shown
      to bind and transport additional cations including cadmium (Cd2+), nickel (Ni2+),
      and cobalt (Co2+). The proteins typically form a homopentameric structure with
      a central ion permeation pathway, and binding of metal ions can induce conformational
      changes that modulate the transporter's activity.
