  name:
    name: Bacterial solute-binding protein 1
    short: Bact_solute-bd_prot1
  description:
  - text: The bacterial solute-binding protein 1 family consists of periplasmic proteins
      that are typically part of ABC transporter complexes. These proteins are involved
      in the import of a variety of substrates, including sugars, glycerol-3-phosphate
      (G3P), osmoprotective compounds, and possibly amino acids. Members of the family
      bind specific ligands with high affinity, which is essential for the transport
      process. Some proteins within the family have additional functions, such as
      molecular chaperone activity, which is regulated by pH and the presence of substrate.
      The specificity of these proteins towards their ligands is critical for the
      survival and virulence of the bacteria, as it allows them to utilize diverse
      nutrients from their environment.
