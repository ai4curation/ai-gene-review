  name:
    name: Proline-rich immunoreactive protein
    short: Pra-immunoreactive
  description:
  - text: This family of proteins includes members that are homologous to the mycobacterial
      Pra family, which are characterized by proline-rich regions. These regions are
      known to be immunoreactive, suggesting a role in immune response or interaction
      with the host immune system. The exact functions of the uncharacterized proteins
      within this family remain to be elucidated, but the presence of a domain that
      is highly immunoreactive in the N-terminus of some members indicates a potential
      role in pathogen-host interactions, possibly as antigens recognized by the host's
      immune system.
