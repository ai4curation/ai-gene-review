  name:
    name: Cellulose Degradation Glycosyl Hydrolase 3
    short: Cellulose_Degrad_GH3
  description:
  - text: The Glycosyl Hydrolase 3 family encompasses enzymes that play a crucial
      role in the degradation of cellulosic biomass. Members of this family, including
      beta-glucosidases, catalyze the hydrolysis of terminal, non-reducing beta-D-glucosyl
      residues, which results in the release of beta-D-glucose. This reaction is significant
      as it facilitates the last step in the breakdown of the inhibitory cellobiose,
      thereby contributing to cellulose degradation. Some family members also exhibit
      beta-xylosidase activity, which is involved in xyloglucan degradation, removing
      backbone 'G' units. These enzymes are found in various cellular locations, including
      the periplasmic space and lysosomes, indicating their diverse functional roles
      in different organisms.
