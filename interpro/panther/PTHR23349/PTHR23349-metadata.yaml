  name:
    name: E-box Binding Transcriptional Regulators
    short: E-box_TF_Regulators
  description:
  - text: The protein family functions as transcriptional regulators with diverse
      roles in development, differentiation, and metabolism. Members of the family
      are characterized by their ability to bind E-box consensus sequences (5'-CANNTG-3')
      and modulate gene expression. They are involved in processes such as myogenesis
      inhibition, neurogenesis, cardiac morphogenesis, pancreas development, limb
      development, and epithelial-mesenchymal interactions. Some act as transcriptional
      repressors, while others form heterodimers with E proteins to activate or repress
      transcription. They play roles in cell fate determination, maintenance of stem
      cell pluripotency, and regulation of metabolic pathways. The family includes
      factors that are essential for the development of specific tissues and organs,
      and for the maintenance of homeostasis in adult tissues.
