  name:
    name: Flagella Basal Body Rod
    short: Flagella_BasalBody_Rod
  description:
  - text: The flagella basal body rod proteins family consists of structural components
      that are integral to the bacterial flagellum, which is the apparatus responsible
      for bacterial motility. Members of this family form part of the rod structure
      within the flagellar basal body. The rod acts as a scaffold for the hook and
      filament, which are critical for the flagellum's function as a propeller that
      enables bacteria to swim. Some proteins in this family, such as FlgE, constitute
      the flagellar hook, a flexible structure that connects the filament to the motor
      in the basal body. The absence of these proteins can lead to a loss of mobility
      due to the failure to form a complete flagellar apparatus.
