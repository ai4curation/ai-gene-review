  name:
    name: GPI Anchor Biosynthesis Catalytic Subunit
    short: GPI-Anchor_Biosynth_Cat-Sub
  description:
  - text: This family of proteins includes catalytic subunits that participate in
      the biosynthesis of glycosylphosphatidylinositol (GPI) anchors. These proteins
      catalyze the transfer of N-acetylglucosamine from UDP-N-acetylglucosamine to
      phosphatidylinositol, representing the initial step in GPI biosynthesis. GPI
      anchors are critical for attaching certain types of proteins to the cell membrane,
      influencing a variety of cellular processes. Members of this family are regulated
      by interactions with Ras proteins, which can inhibit their activity, impacting
      the GPI biosynthesis pathway.
