  name:
    name: Plant LRR receptor-like serine/threonine-protein kinases
    short: Plant_LRR-RLKs
  description:
  - text: The LRR receptor-like serine/threonine-protein kinase family is involved
      in a wide range of plant physiological processes including growth, development,
      and immune responses. Members of this family function as receptors that perceive
      various extracellular signals, such as peptide hormones, brassinosteroids, and
      pathogen-associated molecular patterns, to regulate cellular processes. These
      kinases play key roles in meristem maintenance, vascular tissue development,
      thermotolerance, cell proliferation, and innate immunity. They are characterized
      by extracellular leucine-rich repeat domains that are essential for ligand binding
      and a serine/threonine kinase domain that transduces the signal through phosphorylation
      events. The family is also involved in the autoregulation of nodulation in legumes,
      controlling the number of root nodules formed based on nitrogen availability
      and previous rhizobial colonization.
