  name:
    name: ABC Transporter, Amino Acid and LPS Transport
    short: ABC_AA/LPS_Transport
  description:
  - text: The protein family is involved in the transport of specific substrates across
      cellular membranes using ATP hydrolysis for energy. Members of the family function
      as components of ABC transporter complexes, which are critical for the translocation
      of substances such as branched-chain amino acids and lipopolysaccharides (LPS).
      The branched-chain amino acid transporters are high-affinity systems that facilitate
      the uptake of essential amino acids like leucine, isoleucine, and valine, and
      are also capable of transporting alanine and threonine. The LPS transporters
      are involved in moving LPS from the inner membrane to the outer membrane, a
      process essential for maintaining the integrity and function of the bacterial
      outer membrane. The family showcases the diversity of ABC transporters in facilitating
      the import and export of a variety of molecules, underscoring their role in
      cellular nutrition and defense.
