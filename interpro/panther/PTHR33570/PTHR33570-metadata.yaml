  name:
    name: 4-carboxymuconolactone decarboxylase/NDH-1 regulator
    short: 4CMD/NDH-1_regulator
  description:
  - text: This family of proteins includes enzymes known as 4-carboxymuconolactone
      decarboxylases, which are involved in the beta-ketoadipate pathway, a route
      for the degradation of aromatic compounds. These enzymes catalyze the decarboxylation
      step, converting 4-carboxymuconolactone to 3-oxoadipate, a key intermediate
      in the pathway. Additionally, some members of this family are uncharacterized
      proteins that are hypothesized to play a role in the regulation of NDH-1 biosynthesis,
      a complex involved in the respiratory chain and energy production in bacteria.
