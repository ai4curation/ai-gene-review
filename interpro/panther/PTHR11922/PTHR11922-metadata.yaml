  name:
    name: GMP synthase [glutamine-hydrolyzing]
    short: GMP_synthase_gln-hydrolyzing
  description:
  - text: The GMP synthase [glutamine-hydrolyzing] protein family is responsible for
      the biosynthesis of guanosine monophosphate (GMP) from xanthosine monophosphate
      (XMP) in the presence of glutamine and ATP. This enzymatic reaction is a key
      step in the de novo purine biosynthesis pathway, which is critical for the production
      of nucleotides necessary for DNA and RNA synthesis. Members of this family possess
      a glutamine amidotransferase domain that hydrolyzes glutamine to produce ammonia,
      and an ATP pyrophosphatase domain that facilitates the formation of an adenyl-XMP
      intermediate. The coordinated action of these domains ensures the efficient
      conversion of XMP to GMP, which is essential for cellular growth and proliferation.
      The activity of these enzymes is regulated by various compounds, and their allosteric
      activation ensures that GMP synthesis occurs only when substrates are available,
      maintaining nucleotide homeostasis within the cell.
