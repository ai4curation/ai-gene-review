  name:
    name: G-protein coupled receptor 1
    short: GPCR1
  description:
  - text: The G-protein coupled receptor 1 family is characterized by its diverse
      roles in neurotransmission, hormone regulation, and sensory perception. Members
      of this family are involved in mediating the effects of various neurotransmitters,
      such as dopamine, serotonin, and adrenergic compounds, through the activation
      or inhibition of adenylyl cyclase and other downstream signaling pathways. These
      receptors are integral to processes such as mood regulation, sensory perception,
      circadian rhythm modulation, and the regulation of neurotransmitter release.
      They are also implicated in various physiological responses, including vasoconstriction,
      lipolysis, thermogenesis, and cell proliferation. The family includes receptors
      that function as autoreceptors, modulating synaptic growth and neurotransmitter
      release, as well as receptors that respond to biogenic hormones and psychoactive
      substances.
