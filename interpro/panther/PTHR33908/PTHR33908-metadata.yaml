  name:
    name: Lipid A-modifying glycosyltransferase 83
    short: LipidA_mod_glycosyltrf_83
  description:
  - text: The glycosyltransferase 83 family is involved in the modification of lipid
      A, a component of the lipopolysaccharide (LPS) in bacterial outer membranes.
      Members of the family catalyze the transfer of specific sugar moieties to lipid
      A, which is crucial for bacterial resistance to polymyxin and cationic antimicrobial
      peptides. For example, they transfer the L-Ara4N moiety of the glycolipid undecaprenyl
      phosphate-alpha-L-Ara4N to lipid A. This modification helps bacteria evade the
      host's immune defenses, contributing to their survival and virulence. Some members
      are also involved in the modification of the LPS inner core by transferring
      galacturonic acid residues to specific positions, which is essential for the
      proper assembly and function of the LPS molecule.
