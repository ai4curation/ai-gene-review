  name:
    name: Inositol Monophosphatase Superfamily
    short: Inositol_Monophosphatase_sf
  description:
  - text: The Inositol Monophosphatase Superfamily is characterized by its members'
      ability to dephosphorylate various monophosphorylated substrates, primarily
      involved in inositol phosphate metabolism. Members of this family are key in
      providing inositol for the synthesis of phosphatidylinositol and polyphosphoinositides,
      which are critical for cell signaling and membrane biogenesis. Some family members
      also participate in rRNA transcription and antitermination, supporting ribosome
      biogenesis and gene expression regulation. The family exhibits broad substrate
      specificity, with activities against myo-inositol monophosphates, glucose-1-phosphate,
      beta-glycerophosphate, and 2'-AMP. Additionally, certain members are implicated
      in quinate metabolism and may have roles in osmolyte biosynthesis. The family
      is pharmacologically significant as a target for lithium action in the brain.
      Activity of these enzymes is commonly regulated by inhibitors such as Li(+),
      Ca(2+), Mg(2+), and Mn(2+).
