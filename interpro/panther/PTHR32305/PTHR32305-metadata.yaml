  name:
    name: Type VI secretion system VgrG/RHS
    short: T6SS_VgrG/RHS
  description:
  - text: The VgrG/RHS protein family includes components of the type VI secretion
      system (T6SS) and cellular contact-dependent growth inhibition (CDI) systems.
      Members of this family are involved in interbacterial competition and virulence,
      delivering toxins into both prokaryotic and eukaryotic cells. Some act as structural
      spikes at the tip of T6SS, mediating the delivery of various effector proteins.
      Others possess enzymatic activities, such as actin cross-linking, ADP-ribosyltransferase,
      nuclease, and deaminase functions, disrupting cellular processes like the cytoskeleton,
      DNA integrity, and tRNA function. The family also includes RHS elements, which
      may have ecological roles in bacterial communities. These proteins often have
      a conserved N-terminal region and a divergent C-terminal domain, the latter
      often harboring the toxic activity neutralized by cognate immunity proteins.
      The VgrG/RHS family plays a crucial role in bacterial competition, mobility,
      biofilm formation, and insecticidal activity, with some members being secreted
      in response to environmental conditions.
