  description:
  - text: This family of proteins is involved in the assembly of a protein secretion
      system known as HSI-I. Members of this family are actively secreted and play
      a role during chronic infections, such as those occurring in cystic fibrosis
      patients. They are essential components of the machinery required for the secretion
      of effector proteins that may contribute to the pathogenicity and persistence
      of infections.
