  name:
    name: Protein Phosphatase 2A Regulatory Subunit A
    short: PP2A_Regulatory_Subunit_A
  description:
  - text: This family of proteins functions as scaffolding molecules that coordinate
      the assembly of a catalytic subunit with a variable regulatory B subunit, forming
      part of protein phosphatase 2A (PP2A). They are involved in various cellular
      processes including chromosome segregation, microtubule dynamics, cell cycle
      progression, and signal transduction pathways. These proteins play roles in
      dephosphorylating key components such as TAU/MAPT and AKT1, impacting neuronal
      function and T-cell homeostasis. Additionally, they are implicated in plant
      development and innate immunity, with some members acting as positive or negative
      regulators of PP2A catalytic activity.
