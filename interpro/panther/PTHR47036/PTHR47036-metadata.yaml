  name:
    name: Precorrin Methyltransferase
    short: Precorrin_MeTrfase
  description:
  - text: The precorrin methyltransferase family is involved in the biosynthesis of
      cobalamin (vitamin B12). Members of this family are responsible for various
      methylation steps in the transformation of precorrin-2 into different intermediates
      leading towards the final cobalamin structure. These enzymes catalyze the methylation
      of specific carbon positions on the corrin ring, which is essential for the
      ring contraction and the formation of cobalt-factor intermediates. Some family
      members exhibit bifunctional activity, possessing both methyltransferase and
      isomerase domains, contributing to the conversion of higher precorrin forms
      into cobyrinate. The precise function of each enzyme varies, but all share the
      common goal of progressing the complex pathway of cobalamin biosynthesis through
      methyl group transfer and ring modification reactions.
