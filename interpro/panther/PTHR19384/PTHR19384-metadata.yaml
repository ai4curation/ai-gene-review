  name:
    name: NADPH-dependent sulphite reductase flavoprotein subunit CysJ
    short: NADPH_sulphite_reductase_CysJ
  description:
  - text: The NADPH-dependent sulphite reductase flavoprotein subunit CysJ family
      includes proteins that are components of the sulfite reductase complex, which
      catalyzes the 6-electron reduction of sulfite to sulfide. This reaction is a
      key step in the biosynthesis of L-cysteine from sulfate. The flavoprotein components
      of these proteins facilitate the electron flow from NADPH through FAD and FMN
      to the hemoprotein component. Members of this family also share similarity with
      the flavodoxin family and the flavoprotein pyridine nucleotide cytochrome reductase
      family, indicating a role in electron transport. Some family members are involved
      in the biosynthesis of ergosterol and may function in the electron transfer
      to cytochrome P450 in microsomes, heme oxygenase, and cytochrome B5. Others
      are implicated in various hydroxylation reactions and may act as molecular chaperones
      or participate in iron-sulfur cluster assembly.
