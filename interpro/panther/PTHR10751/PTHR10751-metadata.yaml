  description:
  - text: The TRAFAC class dynamin-like GTPase superfamily, GB1/RHD3 GTPase family,
      GB1 subfamily, consists of proteins involved in various cellular processes,
      including innate immunity, membrane fusion, and cellular trafficking. Members
      of this family are characterized by their ability to hydrolyze GTP, often resulting
      in the production of GDP or GMP. They play crucial roles in the innate immune
      response against a wide range of pathogens, including bacteria, viruses, and
      protozoa. Some family members are involved in the assembly of inflammasomes,
      autophagy, and the generation of bacteriolytic peptides. Others are implicated
      in the biogenesis of the endoplasmic reticulum tubular network and may influence
      Golgi biogenesis and axonal development. Certain proteins within this family
      also exhibit E3 ubiquitin-protein ligase activity, contributing to neuronal
      differentiation and the maintenance of neural functions.
