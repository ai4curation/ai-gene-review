  name:
    name: Voltage-gated chloride channel/antiporter
    short: Cl-channel/antiporter
  description:
  - text: This family of proteins includes both voltage-gated chloride channels and
      proton-coupled anion transporters. The channels mediate the transport of chloride
      ions across the membrane, which is essential for various cellular processes
      such as regulation of cell volume, membrane potential stabilization, and signal
      transduction. Some family members function as antiporters, exchanging chloride
      or other anions for protons, contributing to the acidification of lysosomal
      or endosomal lumen and playing a role in maintaining pH homeostasis. The presence
      of conserved gating glutamate residues is a characteristic feature of the antiporter
      members.
