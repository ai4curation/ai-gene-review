  name:
    name: WrbA family NAD(P)H dehydrogenase (quinone)
    short: WrbA_NAD(P)H_dh
  description:
  - text: The WrbA family proteins are involved in the reduction of quinones to hydroquinones,
      which is crucial for preventing the interaction of semiquinone with O2 and the
      subsequent production of superoxide, thus protecting cells from oxidative stress.
      Members of this family preferentially use NADH over NADPH as an electron donor.
      Some proteins within this family have been implicated in cell wall integrity,
      oxidative stress protection, and virulence, serving as NAD(P)H quinone oxidoreductases.
      Additionally, certain members have been associated with detoxification processes
      and may protect against auxin-induced oxidative stress.
