  name:
    name: Glycosyltransferase 32
    short: Glycosyltransf_32
  description:
  - text: The glycosyltransferase 32 family is involved in the biosynthesis of glycosphingolipids,
      which are essential components of mammalian cell membranes. Members of this
      family catalyze the transfer of sugar moieties from nucleotide sugars to acceptor
      molecules, forming various glycosidic linkages. Specifically, lactosylceramide
      4-alpha-galactosyltransferases from this family add galactose to lactosylceramide
      to produce globotriaosylceramide (Gb3Cer), a key glycosphingolipid in the globo
      series. Gb3Cer serves as the Pk antigen in blood histogroup P and is a receptor
      for bacterial verotoxins. Another enzyme, alpha-1,4-N-acetylglucosaminyltransferase,
      transfers N-acetylglucosamine to O-glycans, contributing to the synthesis of
      type III mucin in the gastrointestinal tract, which may offer protection against
      gastric adenocarcinoma. The conserved DXD motif within these enzymes is crucial
      for their catalytic activity.
