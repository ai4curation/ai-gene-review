  name:
    name: UxaA family altronate/galactarate dehydratases
    short: UxaA_altronate/galactarate_dh
  description:
  - text: The UxaA family encompasses enzymes that catalyze various dehydration reactions
      in bacterial metabolism. Members of the UxaA family are involved in the dehydration
      of D-altronate and galactarate, yielding their respective dehydrated products.
      Some UxaA family proteins function in concert with other subunits, such as the
      desulfonation of sulfolactate to produce pyruvate and sulfite. The family is
      characterized by a conserved domain structure, with some members having a domain
      that likely participates in substrate recognition and another domain implicated
      in dimerization and catalytic activity, potentially including metal binding.
      The activity of some UxaA enzymes can be inhibited by high concentrations of
      Fe(2+) or by chelating agents like EDTA.
