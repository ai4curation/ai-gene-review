  name:
    name: Metallo-dependent Hydrolases Superfamily Enzymes
    short: Metallo-hydrolase_Enzymes
  description:
  - text: This family of proteins includes enzymes that are part of the metallo-dependent
      hydrolases superfamily, which require metal ions for their catalytic activity.
      Members of this family are involved in various metabolic processes, including
      the deamination of pterin metabolites and cytosine, as well as the transformation
      of N-isopropylammelide. These activities contribute to the catabolism of pterin
      rings, pyrimidine salvage pathway, and the breakdown of triazine derivatives,
      respectively. Some family members also have the ability to process mutagenic
      oxidation products of DNA bases and are implicated in the activation of chemotherapeutic
      precursors. The enzymes are regulated by various inhibitors, including reaction
      intermediates and excess divalent cations.
