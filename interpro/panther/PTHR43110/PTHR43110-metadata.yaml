  name:
    name: Thiol Peroxidase Tpx Subfamily
    short: Tpx_Peroxidase_subfamily
  description:
  - text: The Tpx peroxidase family consists of thiol-specific peroxidases that play
      a crucial role in cellular defense against oxidative stress. Members of this
      family catalyze the reduction of hydrogen peroxide and organic hydroperoxides
      to water and alcohols, thereby detoxifying peroxides and protecting cells. These
      enzymes are characterized by their preference for alkyl hydroperoxides and can
      act as lipid peroxidases to inhibit membrane oxidation. They are particularly
      important antioxidants during anaerobic growth and may provide defense against
      cytotoxic peroxides such as peroxynitrite, which are produced by activated macrophages
      during infection.
