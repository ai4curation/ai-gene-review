  name:
    name: FAD-binding Monooxygenase
    short: FAD-binding_MO
  description:
  - text: This family of proteins includes FAD-binding monooxygenases that are involved
      in various oxidative reactions. Members of this family catalyze Baeyer-Villiger
      oxidation reactions, converting ketones into esters or lactones, and are capable
      of acting on a range of substrates from long-chain aliphatic ketones to aromatic
      ketones. Some members are also involved in the enantioselective sulfoxidation
      of sulfides. Additionally, certain proteins within this family play a role in
      the activation of thiocarbamide-containing pro-drugs, transforming them into
      cytotoxic species that are effective against bacterial pathogens. These enzymes
      are also implicated in maintaining cell envelope integrity by regulating mycolic
      acid composition in response to environmental changes.
