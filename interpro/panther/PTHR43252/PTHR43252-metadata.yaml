  name:
    name: Environmental Response Transcriptional Regulator
    short: Env_Response_Regulator
  description:
  - text: This family of proteins includes transcriptional regulators that are involved
      in the response to environmental conditions, such as the presence of specific
      metal ions. Members of this family can negatively regulate the expression of
      genes, including those involved in phenolic acid decarboxylation and iron homeostasis.
      The activity of these proteins can be modulated by divalent metals, which may
      affect their DNA-binding capabilities. Some proteins within this family are
      capable of autoregulation, controlling their own expression levels in response
      to external stimuli.
