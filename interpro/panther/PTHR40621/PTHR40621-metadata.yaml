  name:
    name: bZIP YAP Transcription Factors
    short: bZIP_YAP_TF
  description:
  - text: The bZIP YAP family of transcription factors is involved in the regulation
      of oxidative stress response, redox homeostasis, and various stress responses,
      including resistance to toxic compounds like arsenic and antifungal drugs. Members
      of the family activate the transcription of genes encoding antioxidant enzymes,
      components of the cellular thiol-reducing pathways, and multidrug transporters.
      They are characterized by their ability to bind to specific DNA core binding
      sites, and their activity is modulated by the oxidation state of cysteine-rich
      domains, which affects their subcellular localization. Some members also play
      roles in iron regulation, metabolism control, and cell cycle regulation.
