  description:
  - text: The Cyclin-dependent kinase (CDK) family is crucial for cell cycle regulation,
      transcription, and other cellular processes. CDKs are serine/threonine protein
      kinases that, when activated by binding to cyclins, phosphorylate a variety
      of substrates to mediate cell cycle progression. Different CDK-cyclin complexes
      control specific transitions between cell cycle phases. Some family members
      also play roles in transcription regulation by phosphorylating the RNA polymerase
      II C-terminal domain, affecting elongation. Others are involved in developmental
      processes, DNA repair, apoptosis, and neuronal functions. Dysregulation of CDK
      activity is linked to cancer and other diseases.
