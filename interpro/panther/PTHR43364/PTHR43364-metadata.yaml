  name:
    name: Aldo/Keto Reductase Detoxification and Biosynthesis
    short: AKR_Detox_Biosynth
  description:
  - text: The Aldo/Keto Reductase (AKR) family is involved in detoxification and biosynthesis
      processes. Members of the family catalyze the reduction of aldehydes and ketones
      to their corresponding alcohols using NADPH as a cofactor. This family includes
      enzymes that protect against toxic compounds like aflatoxin B1, contribute to
      the biosynthesis of mycotoxins such as sterigmatocystin and aflatoxins, and
      participate in the production of secondary metabolites with roles in plant-pathogen
      interactions and potential pharmaceutical applications. Some members are implicated
      in cellular protection and stress responses by reducing reactive aldehydes.
      The broad substrate specificity of these enzymes reflects their diverse functions
      in various biological pathways.
