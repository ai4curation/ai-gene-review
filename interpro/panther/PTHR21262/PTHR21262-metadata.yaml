  name:
    name: RelA/SpoT GTP pyrophosphokinase
    short: RelA/SpoT
  description:
  - text: The RelA/SpoT family proteins are key mediators of the stringent response
      in bacteria, coordinating cellular activities in response to nutritional scarcity.
      Members of this family possess enzymatic activities that synthesize and/or hydrolyze
      the alarmone ppGpp (guanosine 3'-diphosphate 5'-diphosphate), a critical molecule
      in bacterial adaptation to stress and in the regulation of cellular processes
      such as biofilm formation, virulence, and antibiotic production. Certain plant
      homologs also exhibit ppGpp synthetase activity, suggesting a role in plant
      stress responses.
