  name:
    name: Polyketide and Nonribosomal Peptide Biosynthesis Enzymes
    short: PKS_NRPS_Biosynth_Enz
  description:
  - text: The protein family described is involved in the biosynthesis of various
      polyketides, nonribosomal peptides, and hybrid compounds with diverse biological
      activities. These proteins are multifunctional enzymes that catalyze the assembly
      of complex molecular structures through iterative condensation, reduction, methylation,
      and cyclization reactions. They are responsible for producing natural products
      such as antibiotics, mycotoxins, pigments, and other secondary metabolites with
      applications in medicine, agriculture, and industry. The family includes non-reducing
      and highly reducing polyketide synthases (PKS), nonribosomal peptide synthetases
      (NRPS), and hybrid PKS-NRPS enzymes. These enzymes select and incorporate various
      starter and extender units, including acetyl-CoA, malonyl-CoA, amino acids,
      and other precursors, to construct the carbon backbones of the target compounds.
      The resulting products often undergo further tailoring by additional enzymes
      within their respective biosynthetic gene clusters to achieve the final bioactive
      structures.
