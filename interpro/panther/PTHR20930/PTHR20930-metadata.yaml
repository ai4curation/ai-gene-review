  name:
    name: Ubiquitin-binding Autophagy Adapters and Regulators
    short: UBA_Autophagy_Regulators
  description:
  - text: The protein family is involved in various cellular processes, including
      host defense, intracellular homeostasis, and the innate immune response. Members
      act as ubiquitin-binding autophagy adapters, shuttling ubiquitinated proteins
      to autophagosomes and participating in protein aggregate formation. They regulate
      type I interferon production, target IRF3 for autophagic degradation, and activate
      the KEAP1-NRF2/NFE2L2 antioxidant pathway. Some members function as negative
      regulators of the innate antiviral response, blocking cytokine production and
      interacting with IRF3. In plants, they may act as receptors for autophagosomal
      degradation of ubiquitinated proteins under stress conditions.
