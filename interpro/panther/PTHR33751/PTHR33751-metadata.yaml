  name:
    name: Cytochrome c Oxidase Subunit
    short: Cytochrome_c_Oxidase_Subunit
  description:
  - text: The cytochrome c oxidase subunit family is involved in electron transport
      and energy conversion within the respiratory chain. Members of this family function
      as part of larger enzyme complexes, such as the cytochrome bc1 complex and the
      cbb3-type cytochrome c oxidase complex, which are essential for ATP synthesis.
      These proteins transfer electrons from donor cytochrome c via heme groups to
      other subunits within their respective complexes. This electron transfer is
      coupled with the generation of a proton gradient across the membrane, which
      is utilized for ATP production. Additionally, some family members act as electron
      acceptors for other enzymes, such as thiosulfate dehydrogenase and formate dehydrogenase,
      indicating a broader role in various electron transport chains.
