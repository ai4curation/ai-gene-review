  name:
    name: ATP synthase F(0) channel subunit b
    short: ATP_synthase_F0_b
  description:
  - text: 'The ATPase B chain family is involved in the synthesis of ATP from ADP
      in the presence of a proton or sodium gradient. Members of this family are components
      of the F(0) channel of the F-type ATPases, which consist of two structural domains:
      F(1), containing the extramembraneous catalytic core, and F(0), containing the
      membrane proton channel. These domains are linked by a central stalk and a peripheral
      stalk. During the catalytic process, ATP synthesis in the F(1) domain is coupled
      to proton translocation through a rotary mechanism of the central stalk subunits.
      The ATPase B chain plays a crucial role in forming part of the peripheral stalk,
      linking the F(1) and F(0) domains, and is essential for the stability and function
      of the ATP synthase complex.'
