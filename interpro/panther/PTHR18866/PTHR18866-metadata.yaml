  name:
    name: Biotin-dependent Carboxylase Complex
    short: Biotin_carboxylase_complex
  description:
  - text: The protein family is involved in various biotin-dependent carboxylation
      reactions essential for metabolizing fatty acids, amino acids, and other compounds.
      Members possess a biotin carboxylation/carboxylase (BC) domain that transiently
      carboxylates biotin, and a biotinyl-binding/biotin carboxyl carrier (BCC) domain
      for biotin attachment. Key reactions include the conversion of propionyl-CoA
      to D-methylmalonyl-CoA, crucial in the catabolism of odd chain fatty acids and
      branched-chain amino acids, and the transformation of 3-methylcrotonyl-CoA to
      3-methylglutaconyl-CoA, vital for leucine catabolism. Some members also participate
      in the carboxylation of acetyl-CoA to form malonyl-CoA, pyruvate carboxylation
      to oxaloacetate, and urea hydrolysis. The family's enzymes are involved in mitochondrial
      and cytoplasmic processes, playing a significant role in cellular energy metabolism
      and biosynthetic pathways.
