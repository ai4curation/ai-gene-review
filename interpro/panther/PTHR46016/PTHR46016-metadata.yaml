  name:
    name: RNF E3 ubiquitin-protein ligase
    short: RNF_E3_ubiq-protein_ligase
  description:
  - text: The RNF E3 ubiquitin-protein ligase family mediates ubiquitination and proteasomal
      degradation of various target proteins, regulating multiple biological processes
      such as cell cycle, apoptosis, osteoclastogenesis, innate and adaptive immunity,
      and interferon production. Family members act as negative regulators of NF-kappa-B-dependent
      transcription, promoting ubiquitination and stabilization of NF-kappa-B inhibitors.
      They also ubiquitinate CDK inhibitors, stimulating cell cycle transition and
      suppressing senescence. Some members negatively regulate type I interferon production
      and T-cell activation, while others facilitate xenophagic targeting of bacteria
      and inhibit viral replication. The family's domain structure, including the
      C2HC RNF-type zinc finger and RING-type zinc finger, is crucial for binding
      to ubiquitin-conjugating enzymes.
