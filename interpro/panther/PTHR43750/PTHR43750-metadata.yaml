  name:
    name: UDP-glucose/GDP-mannose dehydrogenase
    short: UDP-glc/GDP-man_dehydrogenase
  description:
  - text: The UDP-glucose/GDP-mannose dehydrogenase family includes enzymes that catalyze
      the oxidation of nucleotide sugars to their corresponding uronic acids, which
      are key precursors in the biosynthesis of various polysaccharides. Members of
      this family are involved in the synthesis of capsular polysaccharides, such
      as hyaluronic acid in Streptococcus species, which are important for virulence
      and evasion of host immune responses. Other functions include the conversion
      of UDP-glucose to UDP-glucuronate for teichuronic acid production in Bacillus
      subtilis, and the formation of GDP-mannuronic acid, a precursor for alginate
      polymerization in Pseudomonas species, contributing to a mucoid phenotype that
      protects against immune defenses and antibiotics. Additionally, some family
      members are involved in the assembly of N-linked glycoproteins and the biosynthesis
      of hexuronic acids in halophilic archaea.
