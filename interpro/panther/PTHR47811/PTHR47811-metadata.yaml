  name:
    name: tRNA pseudouridine synthase D
    short: TruD_pseudoU_synthase
  description:
  - text: The TruD family of pseudouridine synthases is responsible for the post-transcriptional
      modification of uracil-13 in transfer RNAs (tRNAs) to pseudouridine, a process
      that contributes to the stability and function of tRNA molecules. Pseudouridine
      synthases catalyze the isomerization of specific uridine residues in RNA, forming
      the C-glycoside isomer pseudouridine. This modification is ubiquitous and vital
      for the proper folding and codon recognition properties of tRNA. Members of
      the TruD family are characterized by their specific activity towards uracil-13
      in tRNAs, playing a crucial role in the maintenance of the translational apparatus
      and protein synthesis.
