  name:
    name: Methylenetetrahydrofolate reductase
    short: MTHFR
  description:
  - text: The methylenetetrahydrofolate reductase family comprises enzymes that play
      a crucial role in the folate and methionine cycles. Members of this family catalyze
      the NADH-dependent reduction of 5,10-methylenetetrahydrofolate to 5-methyltetrahydrofolate.
      This reaction is essential for providing the methyl group for methionine synthetase
      to convert homocysteine to methionine. In eukaryotes, these enzymes are allosterically
      regulated by S-adenosylmethionine and contain a serine-rich phosphorylation
      region and a SAM-binding domain, which upon phosphorylation increases sensitivity
      to SAM binding and inhibition. In plants, the reaction is reversible, suggesting
      a role in metabolizing the methyl group to serine, sugars, and starch, and plant
      MTHFRs show a strong preference for NADH over NADPH and are not inhibited by
      methionine or S-adenosylmethionine.
