  name:
    name: Major Facilitator Superfamily Transporter
    short: MFS_Transporter
  description:
  - text: This family of proteins is part of the major facilitator superfamily (MFS),
      which is one of the largest groups of secondary transporters. Members of this
      family are involved in the transport of a wide variety of substrates across
      cellular membranes. They typically function by utilizing the electrochemical
      gradient of protons or other ions to facilitate the movement of specific substrates,
      which can include sugars, amino acids, drugs, and other small molecules. The
      transport process can be uniport, symport, or antiport, depending on the protein
      and the substrate. These proteins are characterized by their structural organization,
      typically comprising 12 transmembrane helices that form a central pore through
      the membrane.
