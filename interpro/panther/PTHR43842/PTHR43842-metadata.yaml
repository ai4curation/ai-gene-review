  name:
    name: Acyl-CoA Carboxylase Beta Subunit
    short: AccD/PCCB
  description:
  - text: The AccD/PCCB family comprises enzymes involved in fatty acid and amino
      acid metabolism. Members of this family function as carboxyltransferases, which
      are part of larger enzyme complexes that catalyze the carboxylation of various
      CoA ester substrates. These enzymes are biotin-dependent and play a role in
      the catabolism of odd chain fatty acids and branched-chain amino acids such
      as isoleucine, threonine, methionine, and valine. The carboxylation reaction
      is crucial for the conversion of propionyl-CoA to methylmalonyl-CoA, a step
      in the metabolic pathway that leads to the generation of energy and synthesis
      of important biomolecules. Some family members are also involved in the formation
      of electrochemical gradients across membranes, which are used for ATP synthesis.
      The beta subunits typically contain a carboxyl transferase domain that transfers
      the carboxyl group from carboxylated biotin to the substrate. The family includes
      enzymes from a variety of organisms, indicating a conserved role in central
      metabolic processes.
