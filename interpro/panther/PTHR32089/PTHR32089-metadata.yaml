  name:
    name: Methyl-accepting chemotaxis
    short: MCP
  description:
  - text: The Methyl-accepting chemotaxis (MCP) protein family is involved in bacterial
      chemotaxis, the movement towards or away from chemical stimuli. Family members
      act as chemotactic signal transducers that detect environmental changes in attractant
      or repellent concentrations, transducing signals from the cell's exterior to
      its interior. They facilitate sensory adaptation by varying methylation levels,
      with attractants typically increasing and repellents decreasing methylation.
      Some members specifically bind ligands such as amino acids, sugars, and oxygen,
      or respond to light via phototaxis receptors, influencing cell movement in response
      to these stimuli. The family includes proteins that may also regulate biofilm
      formation, pilus function, and magnetotaxis, contributing to bacterial virulence,
      environmental adaptation, and navigation.
