  name:
    name: ATP-dependent AMP-binding enzyme
    short: ATP-dep_AMP-bind_enzyme
  description:
  - text: The ATP-dependent AMP-binding enzyme family is characterized by its ability
      to catalyze the formation of CoA thioesters from various substrates through
      a two-step reaction mechanism involving adenylation by ATP and subsequent thioesterification
      with CoA. Members of this family are involved in diverse biosynthetic pathways,
      including the production of antifungal agents, antibiotics, and other bioactive
      compounds. They play crucial roles in fatty acid metabolism, phenylpropanoid
      metabolism, and the biosynthesis of cyclic peptides and polyketides. The enzymes
      exhibit substrate specificity conferred by substrate-binding domains and are
      implicated in the activation of carboxylates for the biosynthesis of secondary
      metabolites with pharmacological activities.
