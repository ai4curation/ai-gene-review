  name:
    name: Zeta Carotene Desaturase and Related Oxidoreductases
    short: Zeta_carotene_desat/Oxidored
  description:
  - text: The zeta carotene desaturase family is involved in the biosynthesis of carotenoids,
      which are essential for plant growth, development, and photoprotection. Members
      of this family catalyze the conversion of zeta-carotene to lycopene through
      the introduction of double bonds at specific positions, often involving intermediates
      such as neurosporene. The enzymes exhibit stereoselectivity and may require
      isomerization of substrates for activity. The family also includes proteins
      involved in the biosynthesis of heme b, where they catalyze the oxidation of
      coproporphyrinogen III to coproporphyrin III, and in the biosynthesis of protoporphyrin
      IX from protoporphyrinogen IX. Additionally, some members are implicated in
      the synthesis of fungal neurotoxins and antibiotics, as well as the biosynthesis
      of hopanoid precursors and sesterterpenes with potential anti-cancer activities.
