  name:
    name: Ubiquitin and ubiquitin-like
    short: Ubiquitin_ubiquitin-like
  description:
  - text: The ubiquitin family is characterized by its role in post-translational
      modification, where ubiquitin or ubiquitin-like proteins are covalently attached
      to target proteins, influencing their stability, localization, or activity.
      Ubiquitination involves the conjugation of ubiquitin to lysine residues on substrates
      through an isopeptide bond, often leading to proteasomal degradation. However,
      ubiquitin also participates in non-proteolytic functions such as DNA repair,
      cell cycle regulation, endocytosis, and signal transduction. Polyubiquitin chains
      linked through different lysine residues or linearly through the N-terminal
      methionine can have distinct cellular roles. Some family members are involved
      in ribosome biogenesis as fusion proteins with ribosomal proteins, contributing
      to the structure and function of ribosomes. The family includes ubiquitin-like
      modifiers such as NEDD8, which regulate cell cycle and embryogenesis by modifying
      cullins and other proteins to alter E3 ligase activity.
