  name:
    name: Methylated-DNA--protein-cysteine methyltransferase
    short: MGMT
  description:
  - text: The MGMT family proteins are involved in the cellular defense against the
      biological effects of alkylated DNA bases, specifically O6-methylguanine (O6-MeG)
      and O4-methylthymine (O4-MeT). They repair these lesions by transferring the
      methyl group to a cysteine residue within the enzyme, in a process that irreversibly
      inactivates the enzyme. Some family members prefer double-stranded DNA as a
      substrate, while others have additional roles such as transcriptional activation
      following alkylation damage or specific binding and flipping of damaged bases
      out of the DNA helix for repair.
