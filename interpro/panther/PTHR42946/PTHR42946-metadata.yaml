  name:
    name: Phosphoglucosamine mutase
    short: Phosphoglucosamine_mutase
  description:
  - text: The phosphoglucosamine mutase family is involved in the biosynthesis of
      cell wall polysaccharides and peptidoglycan, crucial components for bacterial
      cell wall structure and integrity. Members of this family catalyze the interconversion
      of glucosamine-6-phosphate to glucosamine-1-phosphate, a precursor for UDP-N-acetylglucosamine
      (UDP-GlcNAc). UDP-GlcNAc serves as a substrate for various glycosyltransferases
      that synthesize cell wall components. The enzymatic activity of these proteins
      is essential for the proper formation of bacterial cell walls, which is vital
      for cell shape maintenance, protection against environmental stress, and regulation
      of cell growth and division.
