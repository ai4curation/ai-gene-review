  name:
    name: Membrane-localized HtpX protease
    short: HtpX_protease
  description:
  - text: The HtpX protease family is comprised of membrane-localized metalloproteases
      that play a role in the quality control of integral membrane proteins. Members
      of this family are capable of endoproteolytically degrading misfolded or overproduced
      membrane proteins, such as SecY, at specific cytoplasmic sites. These proteases
      do not require ATP for their activity, and their natural substrates are yet
      to be fully identified. The HtpX family is involved in the cellular process
      of protein turnover, particularly for the removal of damaged or non-functional
      membrane proteins, thereby maintaining cellular homeostasis.
