  name:
    name: EngA (Der) GTPase
    short: EngA_Der_GTPase
  description:
  - text: The EngA (Der) GTPase family consists of essential GTPases that play a crucial
      role in the late steps of ribosome biogenesis. Members of this family are characterized
      by the presence of two G (guanine nucleotide-binding) domains, which are essential
      for activity and function cooperatively. Additionally, these proteins typically
      contain a KH-like domain required for ribosome recognition. The GTPase activity
      of these proteins is vital for the stability and proper assembly of the 50S
      ribosomal subunit into functional 70S ribosomes. Mutations in these GTPases
      can be suppressed by overexpression of certain response mediators, indicating
      a possible interaction with 23S rRNA or r-protein complexes. The EngA (Der)
      GTPase family is part of the larger TRAFAC class TrmE-Era-EngA-EngB-Septin-like
      GTPase superfamily.
