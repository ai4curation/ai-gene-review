  name:
    name: Type IV Pilus and Type II Secretion System Core
    short: T4P/T2SS_Core
  description:
  - text: This family of proteins includes major and minor components of type IV pili
      (T4P) and type II secretion system (T2SS) core proteins. The T4P components
      are involved in functions such as twitching motility, cellular adherence, microcolony
      formation, resistance to neutrophil-mediated killing, and DNA uptake during
      transformation. They are essential for the assembly of pili, which are filamentous
      structures that extend and retract from the bacterial surface, facilitating
      movement and host interactions. The T2SS core proteins are pseudopilins that
      polymerize to form the pseudopilus, a structure required for the secretion of
      extracellular factors like proteases and toxins from the periplasm. These proteins
      are crucial for bacterial virulence and adaptation to various environments.
