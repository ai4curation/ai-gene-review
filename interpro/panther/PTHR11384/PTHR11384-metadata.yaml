  name:
    name: ATP-binding cassette sub-family D
    short: ABC_transporter_sub-D
  description:
  - text: The ABCD family of ATP-binding cassette (ABC) transporters is involved in
      the translocation of various substrates across cellular membranes using ATP
      hydrolysis for energy. Members of this family are predominantly associated with
      the transport of long-chain and very long-chain fatty acid-CoA esters from the
      cytosol to the peroxisome lumen for beta-oxidation. Some members also exhibit
      fatty acyl-CoA thioesterase activity, hydrolyzing fatty acyl-CoAs into free
      fatty acids before transport. This family plays a crucial role in lipid metabolism,
      energy homeostasis, and the regulation of mitochondrial and peroxisomal functions.
      Additionally, certain members are implicated in the transport of cobalamin (Vitamin
      B12) across the lysosomal membrane and the uptake of antimicrobial peptides
      across bacterial inner membranes.
