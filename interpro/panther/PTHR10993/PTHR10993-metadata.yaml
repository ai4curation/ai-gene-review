  name:
    name: LipB family octanoyltransferases
    short: LipB_octanoyltransferase
  description:
  - text: The LipB family of octanoyltransferases is responsible for the catalysis
      of the transfer of octanoic acid from octanoyl-acyl-carrier-protein onto the
      lipoyl domains of lipoate-dependent enzymes. These enzymes play a crucial role
      in the post-translational modification of lipoate-dependent enzymes, which are
      involved in critical metabolic pathways. The octanoyl group from the acyl-carrier-protein
      is transferred to specific lysine residues on the lipoyl domains, a process
      essential for the activation of the lipoate-dependent enzymes. These enzymes
      are involved in various metabolic processes, including the glycine cleavage
      system and the 2-oxoglutarate dehydrogenase complex. The family is characterized
      by a conserved sequence and structural motifs that facilitate this transferase
      activity.
