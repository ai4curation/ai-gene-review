  name:
    name: Retinal determination transcriptional regulator
    short: RD_transcriptional_regulator
  description:
  - text: This family of proteins includes probable transcription factors involved
      in the retinal determination network. They play a role in the regulation of
      gene expression necessary for the induction and differentiation of specific
      sensory organ cells, such as the R8 photoreceptor cells in the eye. Members
      of this family are implicated in the repression and activation of other genes
      within the network, indicating a complex regulatory mechanism. They also contribute
      to the differentiation of antenna-specific characteristics in certain species,
      acting downstream of multiple genes that control the development of distal antennal
      structures. Additionally, some members are associated with transposition activities,
      suggesting a potential dual functionality or a distinct subgroup within the
      family.
