  name:
    name: Group II Intron Splicing and Mobility/Defense
    short: GrpII_Intron_Splice-Mob/Def
  description:
  - text: The protein family includes multifunctional proteins that promote group
      II intron splicing and mobility, acting on both RNA and DNA. They have reverse
      transcriptase (RT) activity for intron duplication, maturase activity to facilitate
      splicing, and DNA endonuclease activity for site-specific DNA cleavage. Some
      members are involved in antiviral defense, synthesizing msDNA to protect against
      bacteriophages. Others are nuclear-encoded maturases required for mitochondrial
      group-II intron splicing, essential for mitochondrial biogenesis and metabolic
      pathways regulation during plant growth.
