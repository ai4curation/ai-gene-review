  name:
    name: Ribosomal RNA large subunit methyltransferase
    short: rRNA_methyltransferase
  description:
  - text: This family of proteins includes methyltransferases that are involved in
      the post-transcriptional modification of ribosomal RNA (rRNA). Members of this
      family are responsible for the specific methylation of nucleotides within the
      rRNA of the large ribosomal subunit. These modifications are critical for the
      proper assembly and function of the ribosome, which is essential for protein
      synthesis. The methylation reactions catalyzed by these enzymes typically involve
      the addition of methyl groups to specific guanine or cytosine residues within
      the rRNA, contributing to the stability and function of the ribosomal complex.
