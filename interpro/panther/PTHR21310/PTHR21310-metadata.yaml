  name:
    name: Aminoglycoside Phosphotransferase Enzymes
    short: AGP_Transferase
  description:
  - text: This family of proteins is involved in the inactivation of aminoglycoside
      antibiotics through phosphorylation, which confers resistance to these antibiotics.
      The phosphorylation process targets the hydroxyl groups of the aminoglycoside
      molecules, thereby preventing their interaction with bacterial ribosomes and
      subsequent inhibition of protein synthesis. Members of this family are known
      to confer resistance to various aminoglycosides, including kanamycin, amikacin,
      and hygromycin, among others. The activity of these enzymes is a common mechanism
      of antibiotic resistance in bacteria, which is a significant concern in the
      treatment of bacterial infections.
