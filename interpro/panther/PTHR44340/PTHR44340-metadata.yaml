  name:
    name: Endoplasmic reticulum disulfide reductase
    short: ER_disulfide_reductase
  description:
  - text: This family of proteins functions as endoplasmic reticulum disulfide reductases,
      playing a crucial role in protein homeostasis. They are involved in the correct
      folding of nascent proteins by catalyzing the reduction of non-native disulfide
      bonds, as well as in the degradation of misfolded proteins through the endoplasmic
      reticulum-associated degradation pathway. These proteins interact with molecular
      chaperones to facilitate substrate release and are implicated in the apoptotic
      signaling pathway in response to endoplasmic reticulum stress. Notably, they
      contain thioredoxin domains, with some regions lacking the redox-active CXXC
      motif.
