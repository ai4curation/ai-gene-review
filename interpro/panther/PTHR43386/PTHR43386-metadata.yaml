  name:
    name: Binding-protein-dependent transport system permease
    short: BP-dependent_transpt_permease
  description:
  - text: The binding-protein-dependent transport system permease family is involved
      in the translocation of various substrates across the bacterial inner membrane.
      Members of this family are typically part of ABC transporter complexes and are
      responsible for the import or export of substances such as oligopeptides, dipeptides,
      glutathione, nickel, and other divalent metal ions. These permease proteins
      play crucial roles in nutrient uptake, resistance to antimicrobial peptides,
      metal ion homeostasis, and virulence. They are essential for various cellular
      processes including sporulation, genetic competence, and maintaining urease
      activity. The family includes subfamilies like OppBC, which are specifically
      associated with oligopeptide transport, and others that may be involved in the
      transport of dipeptides or metal ions complexed with metallophores.
