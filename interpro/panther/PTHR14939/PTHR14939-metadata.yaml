  name:
    name: SCF-type ubiquitin ligase substrate recognizer
    short: SCF_ubiq_ligase_sub_recognizer
  description:
  - text: This family of proteins includes both characterized and uncharacterized
      members. The characterized proteins are known to function as substrate-recognition
      components of the SCF-type E3 ubiquitin ligase complex, which is involved in
      the targeted proteasomal degradation of specific proteins. These proteins play
      a crucial role in maintaining normal contractile function by mediating the degradation
      of sarcomeric proteins such as alpha-actinin and filamin-C. The uncharacterized
      proteins share similarity with Mycobacterium tuberculosis proteins, suggesting
      a potential conserved function or structural feature within the family.
