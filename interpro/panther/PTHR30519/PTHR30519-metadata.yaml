  name:
    name: Vitamin-B12 independent methionine synthase
    short: VitB12_indep_Met_synthase
  description:
  - text: The vitamin-B12 independent methionine synthase family includes enzymes
      that catalyze the methylation of homocysteine to form methionine. This reaction
      is a critical step in the biosynthesis of methionine, an essential amino acid,
      and plays a key role in the recycling of folate derivatives. The family is characterized
      by its ability to perform this function without the need for vitamin B12, which
      distinguishes it from other methionine synthases that require this cofactor.
      Members of this family are found across various organisms, including bacteria,
      archaea, and eukaryotes. The physiological methyl donor for the reaction is
      typically 5-methyltetrahydrofolate. This family is essential for maintaining
      the flow of one-carbon units through the folate cycle and for the regulation
      of homocysteine levels within the cell, which is important for cardiovascular
      and neurological health.
