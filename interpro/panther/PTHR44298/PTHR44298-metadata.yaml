  name:
    name: DnaJ homolog subfamily B member 11-like
    short: DnaJ-B11-like
  description:
  - text: This family of proteins functions as co-chaperones, primarily assisting
      the molecular chaperone HSPA5 in the endoplasmic reticulum. They are involved
      in the folding, trafficking, and degradation of proteins, particularly those
      that are misfolded or are substrates for ER-associated degradation (ERAD). These
      proteins bind to unfolded polypeptide chains and may facilitate the recruitment
      of HSPA5 and other chaperones to their substrates. Additionally, they are known
      to stimulate the ATPase activity of HSPA5, which is crucial for its chaperone
      function. The family members play a significant role in the maturation and trafficking
      of certain proteins, such as PKD1, which is essential for maintaining cellular
      homeostasis and proper protein function.
