  name:
    name: ATP-dependent AMP-binding enzyme
    short: ATP-dep_AMP-bd_enzyme
  description:
  - text: The ATP-dependent AMP-binding enzyme family is characterized by its role
      in the activation and transfer of carboxylate groups in various biochemical
      pathways. Members of this family catalyze the formation of acyl-adenylate intermediates
      using ATP, which are then typically transferred to specific carrier proteins
      or converted into CoA thioesters. This process is crucial for the biosynthesis
      of siderophores, secondary metabolites, and the metabolism of fatty acids, sterols,
      and aromatic compounds. The family includes enzymes involved in the regeneration
      of phosphatidylethanolamine from lysophospholipids, the biosynthesis of menaquinone,
      and the degradation of lignin-derived compounds. Enzymes in this family are
      also implicated in the biosynthesis of antibiotics, pigments, and the assimilation
      of sulfur compounds in marine ecosystems.
