  name:
    name: tRNA-dihydrouridine synthase
    short: tRNA-Dus
  description:
  - text: This family of proteins is involved in the post-transcriptional modification
      of tRNA molecules. Members of this family catalyze the reduction of the C5-C6
      double bond in uridine to form dihydrouridine, a modified base commonly found
      in the D-loop of tRNAs. This modification can affect the structure and flexibility
      of tRNA, potentially influencing its function during translation. Some members
      are also capable of modifying specific uridines in mRNA, which may impact mRNA
      translation. The family includes several subfamilies, each with specificity
      for different uridine residues in tRNAs.
