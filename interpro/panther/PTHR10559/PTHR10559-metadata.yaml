  name:
    name: Eukaryotic Cobalamin Transport
    short: Cobalamin_Transport
  description:
  - text: This family of proteins is involved in the binding and transport of cobalamin,
      also known as vitamin B12. Members of this family are responsible for the protection
      of cobalamin from the acidic environment of the stomach and its delivery to
      cells. They exhibit high-affinity binding to cobalamin and are essential for
      its absorption in the ileum. The transport process involves receptor-mediated
      endocytosis, often after interaction with specific receptors such as CUBN. These
      proteins play a crucial role in the cellular uptake of vitamin B12, which is
      vital for various metabolic processes including DNA synthesis and red blood
      cell formation.
