  name:
    name: Plant defense and hormone signaling protein
    short: Plant_def-hormone_signal
  description:
  - text: This family of proteins is involved in various plant-specific physiological
      processes, including pathogen defense, hormone binding and signaling, and allergenic
      responses. Members of the family are known to participate in the recognition
      and response to pathogens, as well as in the regulation of plant growth and
      development through interaction with hormones such as abscisic acid, cytokinins,
      gibberellins, and melatonin. Some proteins within this family have enzymatic
      activity, such as ribonuclease activity, and are implicated in the biosynthesis
      of alkaloids. Additionally, several members are associated with allergenic reactions
      in humans, particularly in response to pollen and certain fruits.
