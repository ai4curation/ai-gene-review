  name:
    name: Microtubule-severing AAA ATPase
    short: MT-severing_AAA_ATPase
  description:
  - text: This family of proteins is involved in the dynamic regulation of microtubule
      networks within cells. Members of this family possess ATPase activity and are
      capable of severing microtubules in an ATP-dependent manner. They play crucial
      roles in cellular processes such as cytokinesis, membrane trafficking, and the
      maintenance of axonal integrity. Some family members are implicated in the biogenesis
      and remodeling of complex microtubule arrays found in axons, spindles, and cilia.
      They are also associated with the ESCRT-III complex, contributing to abscission
      during cytokinesis and nuclear envelope reassembly. Additionally, they participate
      in the regulation of lipid droplet distribution and size, and are involved in
      the DNA damage response.
