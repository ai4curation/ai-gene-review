  name:
    name: Cyclic nucleotide-dependent protein kinases
    short: Cyclic_nucleotide-dep_kinases
  description:
  - text: The protein family described here plays a crucial role in mediating and
      regulating signal transduction pathways through the phosphorylation of a wide
      array of substrates in various cellular processes. Members of this family are
      serine/threonine protein kinases that act as effectors of cyclic nucleotide
      second messengers, specifically cAMP or cGMP. They are involved in diverse cellular
      functions such as cell proliferation, differentiation, gene expression, smooth
      muscle contraction, cardiac function, and learning processes in the CNS. Activation
      of these kinases by cAMP or cGMP leads to the phosphorylation of target proteins,
      which can regulate platelet activation, ion flux, microtubule dynamics, and
      intracellular calcium levels. These kinases also play roles in developmental
      processes and may influence cellular responses to mechanical stimuli, such as
      in bone growth and intestinal secretion. The family includes both cAMP-dependent
      and cGMP-dependent protein kinases, which are allosterically activated by their
      respective cyclic nucleotides and are involved in the NO/cGMP signaling pathway
      as well as cAMP-mediated signaling in cells.
