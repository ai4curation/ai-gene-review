  name:
    name: Nucleoside diphosphate kinase
    short: NDK
  description:
  - text: The NDK family plays a pivotal role in the synthesis of nucleoside triphosphates,
      with the exception of ATP. Members of this family are involved in a key enzymatic
      process that transfers the gamma phosphate from ATP to the beta phosphate of
      a nucleoside diphosphate, a reaction known as a ping-pong mechanism. This transfer
      is facilitated by a phosphorylated active-site intermediate. Certain family
      members have additional functions, such as involvement in axonemal radial spoke
      complexes influencing the motility of sperm and cilia, or altering cellular
      levels of antioxidant enzymes. Some are implicated in microbial infections,
      catalyzing the phosphorylation of specific diphosphates when the bacterium is
      infected by a phage.
