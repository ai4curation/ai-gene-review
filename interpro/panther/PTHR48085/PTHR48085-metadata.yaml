  name:
    name: Cation Transport ATPase Type IB
    short: Cation_Transport_ATPase_IB
  description:
  - text: The cation transport ATPase (P-type) family, specifically the Type IB subfamily,
      is involved in the transport of heavy metals such as cadmium, zinc, and cobalt
      across cellular membranes. Members of this family couple the hydrolysis of ATP
      to the efflux of these metal ions, which is crucial for metal detoxification
      and homeostasis within the cell. Some family members are also involved in the
      transport of lead. The activity of these ATPases is essential for conferring
      resistance to toxic metal ions by exporting them out of the cell or sequestering
      them into vacuoles, thereby reducing their bioavailability and toxicity. The
      family includes proteins that are regulated by various inhibitors and may contain
      high-affinity metal-binding sites that are essential for their activity.
