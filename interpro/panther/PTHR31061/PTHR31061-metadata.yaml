  name:
    name: Lysosomal Heparan-alpha-glucosaminide N-acetyltransferase
    short: Lysosomal_HGNAT
  description:
  - text: This family of proteins includes lysosomal acetyltransferases that are involved
      in the post-translational modification of heparin and heparan sulfate. These
      enzymes specifically acetylate the non-reducing terminal alpha-glucosamine residues
      of these glycosaminoglycans within the lysosome. The acetylation process transforms
      heparin or heparan sulfate into substrates that are then recognized and further
      processed by luminal alpha-N-acetyl glucosaminidases. This modification is crucial
      for the degradation and recycling of glycosaminoglycans, which are important
      components of the extracellular matrix and play key roles in various biological
      processes including cell signaling, coagulation, and inflammation.
