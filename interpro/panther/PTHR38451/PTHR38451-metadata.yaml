  name:
    name: tRNA Adenine-N(1)-methyltransferase
    short: tRNA_Adenine-N1-MTase
  description:
  - text: This family of proteins includes enzymes that are involved in the post-transcriptional
      modification of transfer RNA (tRNA). Specifically, members of this family are
      known to catalyze the methylation of adenine at position 22 in tRNA, a modification
      that is crucial for the proper functioning of tRNA during protein synthesis.
      The methylation reaction is S-adenosyl-L-methionine-dependent and results in
      the formation of N(1)-methyladenine (m1A22), which is important for the stability
      and function of tRNA molecules. The activity of these enzymes is essential for
      the accuracy of protein translation and overall cellular homeostasis.
