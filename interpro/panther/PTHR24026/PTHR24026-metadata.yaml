  name:
    name: Calcium-Dependent Cadherin
    short: Ca-Dependent_Cadherin
  description:
  - text: The Cadherin family proteins are calcium-dependent cell adhesion molecules
      that play a crucial role in maintaining proper cell-cell interactions and tissue
      integrity. They are known to interact homophilically, meaning they preferentially
      bind to the same type of cadherin on adjacent cells, facilitating cell sorting
      and tissue organization. Some family members are involved in cell signaling
      during nervous system development, acting as receptors with roles in axon fasciculation,
      navigation, and synaptogenesis. Others contribute to morphogenesis, such as
      initiating prehair formation and establishing planar cell polarity. The family
      also includes protocadherins, which are essential for neural circuit formation
      and cochlear function. The cadherin domains are characterized by the binding
      of calcium ions, which stabilize their structure and promote adhesion.
