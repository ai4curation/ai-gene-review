  name:
    name: Gamma-glutamyltransferase-related enzyme
    short: GGT-related_enzyme
  description:
  - text: This family of proteins includes enzymes that play a role in the metabolism
      of glutathione and related gamma-glutamyl compounds. Members of this family
      are involved in the cleavage of the gamma-glutamyl bond of glutathione, which
      leads to the release of free glutamate and the dipeptide cysteinyl-glycine.
      This process is important for the recycling of glutathione and for the regulation
      of its levels within the cell. Some family members also exhibit transpeptidase
      activity, which contributes to the biosynthesis of the peptidoglycan layer in
      bacteria by incorporating amino acids into the peptidoglycan scaffold. Additionally,
      certain enzymes within this family have been shown to possess acylase activity,
      which is involved in antibiotic biosynthesis. The activity of these enzymes
      is regulated by various compounds, including glucose and specific amino acids,
      indicating a complex role in cellular metabolism.
