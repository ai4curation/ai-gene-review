  name:
    name: G-protein coupled receptor opsins
    short: GPCR_opsins
  description:
  - text: The opsins are a group of light-sensitive G-protein coupled receptors found
      in photoreceptor cells of the retina. Opsins bind to chromophores, such as retinal,
      and undergo a conformational change upon absorption of light, initiating a cascade
      of signaling events that ultimately contribute to visual perception. They are
      involved in various light-dependent physiological processes, including image-forming
      vision, pupillary reflex, and circadian photoentrainment. Opsins also play roles
      in non-image forming responses to light, such as the regulation of melanogenesis
      in melanocytes, and may influence metabolic processes in response to light exposure.
      The family includes opsins sensitive to different wavelengths, contributing
      to color vision and light intensity detection.
