  name:
    name: Formate-dependent phosphoribosylglycinamide formyltransferase
    short: PurK/PurT
  description:
  - text: The PurK/PurT family is involved in the de novo purine biosynthesis pathway.
      Members of this family catalyze the ATP-dependent transfer of formate to 5-phospho-ribosyl-glycinamide
      (GAR), resulting in the production of 5-phospho-ribosyl-N-formylglycinamide
      (FGAR). The source of formate for this reaction is typically provided by the
      hydrolysis of 10-formyl-tetrahydrofolate, which is catalyzed by the enzyme PurU.
      This reaction is a critical step in the formation of purine nucleotides, which
      are essential building blocks for DNA and RNA synthesis, as well as for the
      regulation of various cellular processes. The PurK/PurT family proteins are
      characterized by their ability to bind ATP and to perform a key reaction in
      the complex process of purine nucleotide formation.
