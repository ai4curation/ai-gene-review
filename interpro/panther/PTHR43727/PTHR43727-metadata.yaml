  name:
    name: Diaminopimelate Decarboxylase
    short: DAP_Decarboxylase
  description:
  - text: This family of proteins includes enzymes that catalyze the decarboxylation
      of meso-diaminopimelate (meso-DAP) to L-lysine, a reaction that is part of the
      lysine biosynthesis pathway. These proteins are pyridoxal phosphate-dependent
      and belong to the class-II family of ornithine/lysine/arginine decarboxylases.
      Some members of this family are also involved in the biosynthesis of aminoglycoside
      antibiotics and biofilm formation. Additionally, certain proteins within this
      family have been implicated in beta-lactam antibiotic resistance and are essential
      for the viability of certain bacteria in their host.
