  name:
    name: Acetyl-CoA acetyltransferase/thiolase
    short: Acetyl-CoA_acetyltransferase
  description:
  - text: This family of proteins includes enzymes that play a crucial role in various
      metabolic pathways, including the biosynthesis of ergosterol, fatty acid oxidation,
      and ketone body metabolism. Members of this family are involved in the condensation
      of acetyl-CoA molecules to form acetoacetyl-CoA, as well as the thiolytic cleavage
      of 3-oxoacyl-CoAs into acetyl-CoA and a shortened fatty acyl-CoA. These reactions
      are essential for the production of energy from fats, the synthesis of cholesterol,
      and the generation of precursors for isoprenoid biosynthesis. Some members also
      participate in the anaerobic degradation of fatty acids and the biosynthesis
      of polyhydroxyalkanoates, which serve as intracellular energy reserves.
