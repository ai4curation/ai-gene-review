  name:
    name: Short-chain dehydrogenases/reductases
    short: SDR
  description:
  - text: The Short-chain dehydrogenases/reductases (SDR) family encompasses enzymes
      that catalyze NAD(P)(H)-dependent redox reactions in metabolic pathways. Members
      of the SDR family are involved in the biosynthesis of various secondary metabolites,
      including pigments, toxins, and antibiotics, as well as in the degradation of
      sugars and other organic compounds. They participate in the reduction of ketones
      and aldehydes to alcohols, the oxidation of alcohols, and the epimerization
      of steroid hydroxyl groups. The family includes enzymes such as diacetyl reductases,
      galactose and glucose dehydrogenases, pteridine reductases, and hydroxynaphthalene
      reductases. These enzymes play key roles in cellular processes ranging from
      pigment formation and plant pathogenesis to antibiotic resistance and xenobiotic
      metabolism.
