  name:
    name: Amino Acid Transporter AGT Superfamily
    short: AA_Transporter_AGT
  description:
  - text: This family of proteins includes transporters that are involved in the uptake
      of specific amino acids. Members of this family are characterized by their ability
      to transport glutamate and serine, with one member being a major transporter
      for these amino acids under certain growth conditions. Another member of the
      family is known to facilitate the uptake of L-aspartate along with a proton,
      and can also transport aspartate hydroxamate and L-glutamate, albeit with lower
      affinity and efficiency. These proteins are part of the amino acid-polyamine-organocation
      (APC) superfamily and are categorized within the AGT (TC 2.A.3.11) family, indicating
      a shared transport mechanism and structural features.
