  name:
    name: Arabidopsis F-box/LRR-repeat
    short: F-box_LRR-repeat
  description:
  - text: The F-box/LRR-repeat protein family is involved in various cellular processes
      through its role in the ubiquitin-proteasome pathway. Members of this family
      are typically components of SCF (SKP1-cullin-F-box) E3 ubiquitin ligase complexes,
      which are crucial for the ubiquitination and subsequent proteasomal degradation
      of target proteins. The F-box domain is essential for interaction with SKP1
      proteins, facilitating the assembly of the SCF complex. Some family members
      are implicated in the maintenance of telomere length, transcriptional silencing
      at telomeres, and chromosome segregation. The leucine-rich repeat (LRR) motifs
      suggest a role in protein-protein interactions, possibly in substrate recognition
      for ubiquitination.
