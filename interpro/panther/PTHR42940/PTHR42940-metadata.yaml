  name:
    name: Zinc-containing alcohol dehydrogenase
    short: Zinc_ADH
  description:
  - text: The zinc-containing alcohol dehydrogenase family is characterized by its
      members' ability to catalyze the oxidation of alcohols using zinc as a cofactor.
      These enzymes are typically NAD(+)-dependent and exhibit a broad substrate specificity,
      including primary and secondary aliphatic alcohols. They play a crucial role
      in various metabolic processes, such as the fermentation of glucose to ethanol,
      the biosynthesis of mycotoxins like patulin, and the autotrophic carbon fixation
      via the 3-hydroxypropionate/4-hydroxybutyrate cycle. Some members are involved
      in the metabolism of ethanol, converting it to acetaldehyde, while others participate
      in the reverse reaction. The family includes both cytosolic and mitochondrial
      isozymes, with some showing substrate inhibition or catabolite repression. The
      enzymes are also involved in the regeneration of NAD(+) from NADH, crucial for
      carbohydrate metabolism.
