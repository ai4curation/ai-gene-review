  name:
    name: G-protein coupled receptor signaling
    short: GPCR_signaling
  description:
  - text: This family of proteins includes G-protein coupled receptors (GPCRs) with
      diverse roles in cellular signaling. Members of this family are involved in
      sensing extracellular signals such as glucose or cyclic AMP (cAMP) and transducing
      these signals into intracellular responses through the activation of G proteins.
      Some receptors in this family are implicated in the regulation of developmental
      processes, such as coordinating cell aggregation and differentiation, while
      others are involved in metabolic regulation or neuronal differentiation. The
      activity of these receptors is mediated by various G proteins, leading to downstream
      effects such as activation of adenylate cyclase or phosphatidylinositol-calcium
      second messenger systems. These receptors play key roles in processes ranging
      from glucose sensing and energy homeostasis to cell cycle regulation and morphogenesis.
