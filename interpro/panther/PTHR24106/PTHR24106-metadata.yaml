  name:
    name: NOD-like receptor (NLR)
    short: NLR
  description:
  - text: The NOD-like receptor (NLR) family is involved in the innate immune response,
      acting as pattern recognition receptors (PRRs) that detect pathogen-associated
      molecular patterns (PAMPs) and danger signals. Members of the family participate
      in various signaling pathways, including NF-kappa-B, MAP kinases, and type I/II
      interferon pathways, contributing to the transcriptional activation of genes
      involved in immune response. They play roles in gastrointestinal immunity, antiviral
      defense, autophagy, and inflammation regulation. Some NLRs detect specific bacterial
      peptidoglycan fragments, while others negatively regulate immune responses to
      prevent excessive inflammation. Additionally, they are implicated in metabolic
      regulation, appetite control, and cellular stress responses.
