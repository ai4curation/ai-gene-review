  name:
    name: Binding-Protein-Dependent Transport System Permease
    short: BP-Dep_Transport_Permease
  description:
  - text: The Binding-Protein-Dependent Transport System Permease family is involved
      in the translocation of various substrates across the bacterial inner membrane
      as part of ABC transporter complexes. Members of this family are responsible
      for the import of a diverse array of molecules, including dipeptides, oligopeptides,
      metal ions, and glutathione. Some proteins within this family also contribute
      to bacterial resistance to antimicrobial peptides, virulence, and specific metabolic
      processes such as urease activity. The permeases likely function by facilitating
      the passage of substrates that have been captured by their cognate binding proteins,
      playing a critical role in nutrient uptake, metal homeostasis, and defense mechanisms.
