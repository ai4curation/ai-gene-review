  name:
    name: IspD/TarI cytidylyltransferase
    short: IspD/TarI_cytidylyltrnsfrs
  description:
  - text: The IspD/TarI cytidylyltransferase family is involved in distinct biosynthetic
      pathways. The IspD subfamily members catalyze the formation of 4-diphosphocytidyl-2-C-methyl-D-erythritol
      from CTP and 2-C-methyl-D-erythritol 4-phosphate, a key step in the MEP pathway
      for isoprenoid biosynthesis. The TarI subfamily members catalyze the transfer
      of the cytidylyl group of CTP to D-ribitol 5-phosphate, which is required for
      protein O-linked mannosylation. This reaction is crucial for the biosynthesis
      of the phosphorylated O-mannosyl trisaccharide present in alpha-dystroglycan,
      necessary for high-affinity binding to laminin G-like domain-containing extracellular
      proteins. Some family members also show activity toward other pentose phosphate
      sugars, forming CDP-ribulose or CDP-ribose.
