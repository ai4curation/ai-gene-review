  name:
    name: Acetylglutamate kinase
    short: Acetylglutamate_kinase
  description:
  - text: The acetylglutamate kinase family is involved in the arginine biosynthesis
      pathway. Members of this family catalyze the ATP-dependent phosphorylation of
      N-acetyl-L-glutamate, an essential step in the production of ornithine and arginine.
      This reaction is a part of the broader metabolic processes that contribute to
      the synthesis of amino acids, which are vital for protein synthesis and other
      biological functions. The family includes subfamilies such as the ArgB subfamily
      and the LysZ subfamily, the latter being involved in both arginine and lysine
      biosynthesis pathways, phosphorylating LysW-bound precursors. Some members are
      subject to feedback inhibition by arginine, highlighting a regulatory mechanism
      to maintain amino acid levels within the cell.
