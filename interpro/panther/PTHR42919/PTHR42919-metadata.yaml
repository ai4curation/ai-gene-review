  name:
    name: N-terminal and lysine N-acetyltransferase
    short: N-term/lysine_N-AcTrnsfr
  description:
  - text: This family of proteins includes N-alpha-acetyltransferases that modify
      the N-terminus of proteins by acetylating the initiating methionine, a process
      that is essential for various cellular functions. These proteins exhibit a broad
      substrate specificity and are involved in critical processes such as sister
      chromatid cohesion during mitosis. Some family members also possess N-epsilon-acetyltransferase
      activity, targeting specific lysine residues on proteins. Additionally, certain
      members are implicated in viral DNA modification, immune response to microbial
      infection, and regulation of DNA replication and cohesion. The family is characterized
      by a conserved acetyltransferase domain and includes members from a wide range
      of organisms, indicating a fundamental role in cellular biology.
