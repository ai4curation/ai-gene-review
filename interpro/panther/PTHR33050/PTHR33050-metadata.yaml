  name:
    name: Hepadnavirus polymerase/reverse transcriptase
    short: Hepadnavirus_pol/RT
  description:
  - text: This family of proteins includes multifunctional enzymes that play a crucial
      role in the replication of hepadnaviruses by converting the viral RNA genome
      into double-stranded DNA within cytoplasmic capsids. These enzymes exhibit both
      DNA polymerase activity, which can utilize DNA or RNA templates, and ribonuclease
      H activity, responsible for cleaving RNA strands of RNA-DNA heteroduplexes.
      The initiation of reverse transcription is a unique process involving protein
      priming, where the enzyme binds to an epsilon loop on the pregenomic RNA and
      the newly synthesized DNA becomes covalently attached to the enzyme itself.
      This leads to the formation of a relaxed circular DNA genome that, upon infection
      of a new cell, is transported to the nucleus and transformed into covalently
      closed circular DNA, a key intermediate for establishing infection.
