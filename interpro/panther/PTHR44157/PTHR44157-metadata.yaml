  name:
    name: Mitochondrial inner membrane organizing protein
    short: Mito_inner_membrane_organizer
  description:
  - text: This family of proteins is involved in the structural organization of the
      mitochondrial inner membrane. Members of this family are known to interact with
      the mitochondrial contact site and cristae organizing system (MICOS) complex,
      as well as the sorting and assembly machinery (SAM) complex located in the mitochondrial
      outer membrane. These interactions are essential for maintaining the proper
      structure and function of the mitochondria, which is crucial for cellular energy
      production and metabolic processes.
