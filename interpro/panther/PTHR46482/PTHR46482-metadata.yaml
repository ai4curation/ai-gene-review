  name:
    name: Adenylylsulfate Reductase
    short: APS_Reductase
  description:
  - text: This family of proteins is involved in the reduction of sulfate to sulfite,
      a key step in the biosynthesis of cysteine. Members of this family catalyze
      the conversion of adenosine 5'-phosphosulfate (APS) to sulfite using electron
      donors such as thioredoxin, glutathione, or dithiothreitol (DTT). Some members
      are known to have a preference for APS over 3'-phosphoadenosine-5'-phosphosulfate
      (PAPS) as a substrate. Additionally, certain proteins within this family contain
      a C-terminal domain that may function as glutaredoxin, which is involved in
      the interaction with glutathione and the reduction of various disulfides. The
      activity of some family members is regulated by sulfate concentrations and can
      be inhibited by compounds such as 5'AMP.
