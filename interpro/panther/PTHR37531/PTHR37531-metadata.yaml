  name:
    name: Heme exporter protein D
    short: Heme_exporter_D
  description:
  - text: This family of proteins is involved in the transport of heme, an essential
      cofactor for various biological processes. Members of this family are responsible
      for exporting heme to the periplasmic space in bacterial cells, where it is
      utilized for the assembly of c-type cytochromes. These cytochromes play a crucial
      role in electron transport and energy conservation during cellular respiration.
      The proper functioning of this protein family is therefore integral to the biogenesis
      of these important components of the respiratory chain.
