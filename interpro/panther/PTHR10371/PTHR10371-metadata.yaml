  name:
    name: Complex I 24 kDa Subunit
    short: ComplexI_24kDa_Subunit
  description:
  - text: The Complex I 24 kDa Subunit family includes core components of the mitochondrial
      membrane respiratory chain NADH dehydrogenase (Complex I), as well as bacterial
      NDH-1. Members of this family are involved in the transfer of electrons from
      NADH to the respiratory chain, using quinones such as ubiquinone or menaquinone
      as electron acceptors. The process is coupled with proton translocation across
      the membrane, contributing to the creation of a proton gradient that is utilized
      for ATP synthesis. The family proteins contain FMN and iron-sulfur (Fe-S) centers
      that facilitate electron transfer through a series of redox reactions. This
      electron transport is essential for cellular respiration and energy production
      in a wide range of organisms, from bacteria to humans.
