  name:
    name: ABC Transporter ATP-Binding
    short: ABC_transp_ATP-bind
  description:
  - text: The protein family is involved in the transport of various substrates across
      cellular membranes using ATP-binding cassette (ABC) transporters. These proteins
      are responsible for energy coupling within their respective ABC transporter
      complexes, facilitating the import or export of substances such as nickel, peptides,
      dipeptides, glutathione, and potentially other divalent metal ions. Some family
      members are implicated in bacterial resistance to antimicrobial peptides, while
      others contribute to virulence and are necessary for processes like genetic
      competence or sporulation. The transport systems can be specific for certain
      substrates, such as nickel or glutathione, or may have broader specificity,
      as seen with oligopeptide transporters that can handle a range of peptide lengths.
