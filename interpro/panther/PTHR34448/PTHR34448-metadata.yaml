  name:
    name: Metal-dependent Exopeptidase M29
    short: M29_Exopeptidase
  description:
  - text: This family of proteins includes metal-dependent exopeptidases that cleave
      amino acids from the N-terminus of peptides. Members of this family exhibit
      broad specificity towards various N-terminal amino acids, including arginine
      and aromatic residues. Some proteins within this family are involved in bacterial
      growth by supplying amino acids through their enzymatic activity. Additionally,
      one member is known to catalyze the dioxygenolytic ring cleavage of 2,5-dihydroxypyridine
      in the aerobic nicotinate degradation pathway, although this function appears
      to be an exception rather than a characteristic of the family as a whole.
