  name:
    name: DNA Gyrase/Topoisomerase IV
    short: DNA_Gyrase/TopoIV
  description:
  - text: The DNA gyrase/topoisomerase IV family comprises enzymes that modulate DNA
      topology, essential for various DNA metabolic processes. DNA gyrases introduce
      negative supercoils into closed circular double-stranded DNA using ATP, facilitating
      strand separation for replication, transcription, recombination, and repair.
      They can also relax supercoils and catalyze the interconversion of DNA topological
      isomers, including catenanes and knotted rings. Topoisomerase IV, a closely
      related enzyme, is crucial for chromosome segregation, relaxing supercoiled
      DNA and decatenating interlinked DNA during replication. These type II topoisomerases
      operate by breaking and rejoining two DNA strands simultaneously in an ATP-dependent
      manner. The family includes enzymes sensitive to various inhibitors, such as
      coumarins, quinolones, and pyrrolopyrimidines, which target the ATPase activity
      or trap the enzyme in a complex with DNA.
