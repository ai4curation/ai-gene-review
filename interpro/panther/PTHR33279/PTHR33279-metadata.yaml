  name:
    name: Sulfur carrier protein TusA
    short: Sulfur_carrier_TusA
  description:
  - text: The sulfur carrier protein TusA family is involved in cellular sulfur trafficking
      as part of a sulfur-relay system. Members of this family are responsible for
      accepting activated sulfur from the cysteine desulfurase IscS and transferring
      it to other proteins such as TusD, playing a crucial role in determining the
      direction of sulfur flow within the cell. This process is essential for the
      2-thiolation of 2-thiouridine in the wobble base of tRNA, contributing to the
      synthesis of the modified base 5-methylaminomethyl-2-thiouridine (mnm(5)s(2)U).
      Additionally, TusA proteins are implicated in the biosynthesis of molybdopterin
      and may have other roles in oxidative dissimilatory sulfur metabolism. The family
      includes both characterized sulfur carrier proteins and putative members with
      predicted functions based on sequence similarity.
