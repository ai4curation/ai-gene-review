  name:
    name: HTH-type transcriptional regulators, PurR
    short: HTH_transcr_reg_PurR
  description:
  - text: 'The protein family described here functions primarily as transcriptional
      repressors, regulating the expression of genes involved in various metabolic
      pathways, including the de novo synthesis of purine nucleotides. Family members
      typically possess two structural and functional domains: an N-terminal DNA-binding
      domain and a larger C-terminal domain responsible for corepressor binding and
      oligomerization. These proteins are allosterically activated to bind DNA by
      corepressors such as hypoxanthine or guanine, leading to transcription repression.
      Some members also regulate genes involved in carbon metabolism, sugar catabolism,
      and the utilization of specific sugars like arabinose, xylose, sucrose, and
      ribose. They may act as repressors or activators, depending on the presence
      of specific inducers or corepressors, which can include sugars or sugar-phosphates.
      The family includes regulators of operons for sugar transport and metabolism,
      contributing to the cell''s ability to adapt to different nutritional environments.'
