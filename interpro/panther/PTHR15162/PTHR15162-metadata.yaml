  name:
    name: AspA/AstE family amino acid metabolism and detoxification
    short: AspA/AstE_amino_acid_detox
  description:
  - text: The AspA/AstE family is characterized by enzymes that play roles in amino
      acid metabolism and detoxification. Members of the Succinylglutamate desuccinylase
      subfamily catalyze the conversion of N(2)-succinylglutamate into succinate and
      glutamate, a reaction important in the arginine and proline metabolism pathway.
      The Aspartoacylase subfamily members are involved in the deacetylation of N-acetylaspartic
      acid (NAA) to produce acetate and L-aspartate, which is significant for maintaining
      white matter in the brain and acts as a scavenger of NAA in other tissues. Another
      subfamily includes enzymes that deacetylate mercapturic acids in kidney proximal
      tubules, playing a role in detoxification.
