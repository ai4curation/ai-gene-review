  name:
    name: Dehydroquinate Synthase
    short: Dehydroquinate_synthase
  description:
  - text: The Dehydroquinate Synthase family is involved in the shikimate pathway,
      which is essential for the biosynthesis of aromatic amino acids in bacteria,
      fungi, and plants. Members of this family catalyze the conversion of 3-deoxy-D-arabino-heptulosonate
      7-phosphate (DAHP) to dehydroquinate (DHQ), a key step in the pathway. This
      reaction involves the cyclization of DAHP to form DHQ, which is then further
      processed to eventually lead to the production of aromatic compounds. The family
      is part of the larger sugar phosphate cyclases superfamily and does not include
      proteins with shikimate kinase activity, which may be present as a bifunctional
      enzyme in some species.
