  name:
    name: Class-III Pyridoxal-Phosphate-Dependent Aminotransferase
    short: Class-III_PLP-dep_AT
  description:
  - text: The protein family is involved in amino acid metabolism, specifically in
      the transamination reactions that are crucial for the degradation of gamma-aminobutyric
      acid (GABA) and L-lysine. Members of the family catalyze the conversion of GABA
      into succinate semialdehyde, which is then processed to succinate, a key intermediate
      in the citric acid cycle. This reaction is important for utilizing GABA as a
      nitrogen source and for oxidative stress tolerance. Some family members can
      also transaminate L-beta-aminoisobutyrate, delta-aminovalerate, and beta-alanine,
      although with varying efficiencies. Another enzymatic activity within the family
      includes the transfer of the amino group from L-lysine or L-ornithine to alpha-ketoglutarate,
      contributing to amino acid catabolism. All family members share a common feature
      of being class-III pyridoxal-phosphate-dependent aminotransferases, which is
      indicative of their reliance on the cofactor pyridoxal phosphate for their catalytic
      activity.
