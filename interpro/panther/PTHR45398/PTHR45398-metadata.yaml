  name:
    name: D-alanine--D-alanyl carrier protein ligase
    short: DltA_subfamily
  description:
  - text: The DltA subfamily is part of the ATP-dependent AMP-binding enzyme family
      and is responsible for the D-alanylation of lipoteichoic acid (LTA) in Gram-positive
      bacteria. Members of this subfamily catalyze the activation of D-alanine and
      its transfer onto the D-alanyl carrier protein (Dcp) DltC. The process occurs
      in an ATP-dependent two-step reaction, forming a high-energy D-alanyl-AMP intermediate,
      followed by the transfer of the D-alanyl residue as a thiol ester to the phosphopantheinyl
      prosthetic group of Dcp. The D-alanylation of LTA is crucial for modulating
      the properties of the bacterial cell wall, particularly influencing the net
      charge of the cell wall, which can affect interactions with the environment
      and susceptibility to antimicrobial peptides.
