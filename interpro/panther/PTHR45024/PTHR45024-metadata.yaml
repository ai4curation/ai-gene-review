  name:
    name: Peroxisomal Beta-Oxidation Enzymes
    short: Peroxisomal_Beta-Oxidation
  description:
  - text: This family of proteins includes enzymes involved in the peroxisomal beta-oxidation
      pathway of fatty acids. Members exhibit multifunctional activities, such as
      hydratase, dehydrogenase, and epimerase, catalyzing the hydration of trans-2-enoyl-CoA
      to (3R)-3-hydroxyacyl-CoA and the subsequent dehydrogenation to 3-ketoacyl-CoA.
      These reactions are essential steps in the degradation of fatty acids, allowing
      for the breakdown of both straight-chain and branched-chain fatty acids, as
      well as bile acid intermediates. Some family members also participate in the
      metabolism of xenobiotic fatty acids and cholesterol side-chain degradation,
      highlighting the diversity of substrates and reactions these enzymes can perform.
      The presence of short-chain dehydrogenase/reductase (SDR) domains is a characteristic
      feature of this protein family.
