  name:
    name: Bacterial siderophore ABC transporter ATP-binding
    short: Siderophore_ABC-ATPase
  description:
  - text: This family of proteins is involved in the transport of siderophores and
      iron complexes across cellular membranes. Members function as ATP-binding components
      of ABC transporter complexes, which are responsible for the energy-dependent
      uptake of various iron chelates, including hydroxamate and catecholate siderophores,
      as well as ferric citrate. These proteins are key for iron acquisition, a critical
      process for bacterial survival and pathogenicity, especially in iron-limited
      environments. They bind and hydrolyze ATP to provide the necessary energy for
      the translocation of their respective substrates through the transporter system.
