  description:
  - text: The proteasome subunit alpha family is involved in the ATP-dependent proteolytic
      degradation of most intracellular proteins. The proteasome is a multicatalytic
      proteinase complex essential for the regulated turnover of proteins and the
      removal of misfolded proteins. It cleaves peptides with Arg, Phe, Tyr, Leu,
      and Glu adjacent to the leaving group at neutral or slightly basic pH. The family
      includes both catalytic and non-catalytic components of the proteasome, with
      some members displaying chymotrypsin-like activity. The proteasome plays a key
      role in protein homeostasis, maintenance of cellular functions, and various
      pathways including spermatogenesis and generation of MHC class I-presented antigenic
      peptides. It is also involved in the degradation of ubiquitinated proteins and
      can mediate ubiquitin-independent protein degradation.
