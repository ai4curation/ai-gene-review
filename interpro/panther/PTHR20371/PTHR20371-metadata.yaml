  name:
    name: Methionine salvage pathway bifunctional enzyme, MasA/MtnC
    short: Meth_salvage_MasA/MtnC
  description:
  - text: The MasA/MtnC family proteins are bifunctional enzymes that play a role
      in the methionine salvage pathway. They catalyze two distinct steps in the conversion
      of 2,3-diketo-5-methylthiopentyl-1-phosphate (DK-MTP-1-P) to 1,2-dihydroxy-3-keto-5-methylthiopentene
      (DHK-MTPene). The first step involves the enolization of DK-MTP-1-P to 2-hydroxy-3-keto-5-methylthiopentenyl-1-phosphate
      (HK-MTPenyl-1-P), followed by dephosphorylation to produce DHK-MTPene. These
      enzymes are part of the HAD-like hydrolase superfamily, which is characterized
      by a diverse range of catalytic functions, including phosphatase, dehalogenase,
      and epimerase activities. The MasA/MtnC family members are essential for the
      recycling of methionine from methylthioadenosine and play a crucial role in
      maintaining cellular methionine levels and proper function of the methionine
      cycle.
