  description:
  - text: This family of proteins is involved in the metabolism of carbohydrates,
      specifically in the phosphorylation of fructose to produce fructose-1-phosphate.
      The enzymatic activity is essential for the utilization of fructose as a source
      of energy and carbon skeletons. Members of this family require potassium for
      their activity and are inhibited by ADP, indicating a regulatory mechanism that
      integrates energy status with carbohydrate metabolism. The proteins in this
      family are structurally related, sharing a common fold typical of the PfkB (phosphofructokinase
      B) subfamily of carbohydrate kinases, which is characterized by a particular
      arrangement of beta sheets and alpha helices.
