  name:
    name: Aromatic CoA oxygenase/epoxidase components
    short: Aromatic_CoA_ox/epox
  description:
  - text: This family of proteins includes components of multicomponent enzyme systems
      that catalyze the oxygenation and epoxidation of CoA-thioester substrates. Members
      of this family are involved in the aerobic biodegradation of aromatic compounds,
      playing a role in the ring-cleavage step of the degradation pathway. They function
      by incorporating one atom of molecular oxygen into the substrate, resulting
      in the formation of an epoxide intermediate. These proteins are typically part
      of larger enzyme complexes and may serve as either the catalytic subunit directly
      involved in the oxygenation reaction or as structural subunits essential for
      the integrity and function of the catalytic components.
