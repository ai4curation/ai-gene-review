  name:
    name: HAD-like hydrolase superfamily, SerB
    short: HAD-like_SerB
  description:
  - text: The SerB family is part of the HAD-like hydrolase superfamily and includes
      phosphoserine phosphatases that catalyze the dephosphorylation of O-phospho-L-serine
      to L-serine, an essential step in the biosynthesis of L-serine from carbohydrates.
      L-serine is utilized in protein synthesis, the production of other amino acids,
      nucleotide metabolism, and glutathione synthesis. It can also be racemized to
      D-serine, a neuromodulator. Some family members may act on O-phospho-D-serine
      and other substrates like phosphothreonine. The family is characterized by a
      conserved domain structure and enzymatic activity regulation by various factors,
      including metal ions and amino acids. Some members are implicated in virulence
      and may interact with host proteins to modulate the host immune response.
