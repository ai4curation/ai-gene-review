  name:
    name: Cytochrome P450 Monooxygenases
    short: CYP_Monooxygenases
  description:
  - text: This family of proteins includes enzymes that belong to the cytochrome P450
      superfamily, which are involved in diverse metabolic processes. Members of this
      family are monooxygenases that catalyze the incorporation of one atom of oxygen
      into the substrate while the other atom is reduced to water. They play crucial
      roles in the biosynthesis of primary bile acids and eicosanoids. Specifically,
      some family members are responsible for the 12alpha-hydroxylation of 7alpha-hydroxy-4-cholesten-3-one,
      a key step in cholic acid synthesis, which is essential for the digestion and
      absorption of dietary fats. Other members catalyze the isomerization of prostaglandin
      H2 to prostacyclin, a compound that mediates vasodilation and inhibits platelet
      aggregation. Additionally, certain enzymes exhibit dehydratase activity towards
      hydroperoxyeicosatetraenoates. These activities are critical for maintaining
      physiological balance and response to cellular signals.
