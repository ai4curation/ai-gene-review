  name:
    name: Glutathione S-transferase Zeta
    short: GST_Zeta
  description:
  - text: The GST Zeta family comprises enzymes with diverse functions, including
      maleylacetoacetate isomerase activity, which plays a role in the catabolism
      of tyrosine by converting maleylacetoacetate to fumarylacetoacetate. Some family
      members exhibit glutathione S-transferase activity, catalyzing the conjugation
      of glutathione to various electrophilic compounds, contributing to detoxification
      processes. Certain proteins within the family also display glutathione peroxidase
      activity, reducing lipid hydroperoxides and protecting against oxidative stress.
      Additionally, some enzymes are involved in the glutathione-dependent oxygenation
      of dichloroacetic acid to glyoxylic acid. The family belongs to the GST superfamily,
      with the Zeta class characterized by a broad range of activities, including
      but not limited to isomerization, peroxidation, and transferase activities,
      which are crucial for cellular metabolism and defense mechanisms.
