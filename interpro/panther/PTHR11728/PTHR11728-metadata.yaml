  name:
    name: NAD-dependent glycerol-3-phosphate dehydrogenase
    short: NAD-dep_G3P_dhdrogenase
  description:
  - text: The NAD-dependent glycerol-3-phosphate dehydrogenase family is involved
      in the biosynthesis of sn-glycerol 3-phosphate, which is essential for phospholipid
      synthesis. These enzymes play a role in cell redox homeostasis by catalyzing
      the reversible redox conversion of dihydroxyacetone phosphate and glycerol 3-phosphate,
      with the concomitant reduction or oxidation of NAD+/NADH. This process is crucial
      for maintaining cellular NADH/NAD+ ratios and for the production and accumulation
      of glycerol under various stress conditions. Some family members are implicated
      in regulating cardiac sodium current, potentially affecting cardiac function.
