  name:
    name: Exon junction complex-associated protein
    short: EJC-associated_protein
  description:
  - text: This family of proteins includes components of the exon junction complex
      (EJC), which is involved in mRNA splicing and metabolism. Members of this family
      are implicated in the regulation of splicing, particularly in the modulation
      of apoptotic gene isoforms. They are known to bind RNA and are associated with
      the ASAP complex, which has roles in both splicing inhibition and the promotion
      of apoptosis. These proteins can induce chromatin condensation in response to
      apoptotic signals and have been shown to regulate the expression of specific
      cyclins in leukemia cells.
