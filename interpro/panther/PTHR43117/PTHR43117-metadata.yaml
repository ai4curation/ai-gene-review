  name:
    name: ABC Transporter ATP-binding Component
    short: ABC_Transporter_ATP-binding
  description:
  - text: This family of proteins is involved in the transport of various osmoprotectants
      and nutrients across cellular membranes. Members of this family function as
      part of ATP-binding cassette (ABC) transporter complexes, which typically consist
      of multiple subunits that work together to translocate substrates. These proteins
      are primarily responsible for the energy-dependent uptake of compounds such
      as glycine betaine, choline, carnitine, and ergothioneine, which play roles
      in osmoprotection, cryoprotection, and antioxidation. The ATP-binding component
      of these transporters is crucial for providing the energy required for substrate
      translocation through the binding and hydrolysis of ATP.
