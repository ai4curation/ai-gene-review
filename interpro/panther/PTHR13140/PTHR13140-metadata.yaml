  name:
    name: Actin-based myosin motor proteins
    short: Actin-based_myosin_motors
  description:
  - text: This family of proteins includes molecular motors that interact with actin
      filaments to facilitate various intracellular transport and mobility functions.
      They are characterized by an ATPase domain that hydrolyzes ATP to generate mechanical
      force, propelling movement along actin filaments. These proteins are involved
      in processes such as vesicle and organelle transport, cell migration, cytokinesis,
      and the maintenance of cell shape. Some members are implicated in specialized
      functions like melanosome transport, ciliary movement, and endocytosis. The
      diversity of tail domains among family members suggests a range of cargo-binding
      capabilities and regulatory interactions.
