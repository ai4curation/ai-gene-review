  name:
    name: Bacterial Diguanylate Cyclase
    short: Diguanylate_Cyclase
  description:
  - text: The Diguanylate Cyclase (DGC) family is responsible for the synthesis of
      cyclic-di-GMP (c-di-GMP), a bacterial second messenger that regulates cell surface-associated
      traits such as biofilm formation, cellulose production, and motility. Members
      of the family typically contain a GGDEF domain that catalyzes the condensation
      of two GTP molecules to form c-di-GMP. Some members are also involved in signal
      transduction pathways and may possess additional domains for sensory functions,
      such as oxygen sensing through a globin-fold domain. The activity of these enzymes
      can be regulated by various mechanisms, including allosteric inhibition by c-di-GMP
      itself, phosphorylation, or interaction with other proteins. The DGC family
      plays a crucial role in the transition between different bacterial lifestyles,
      impacting both environmental persistence and host-pathogen interactions.
