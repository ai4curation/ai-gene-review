  name:
    name: Major Intrinsic Protein/Aquaporin
    short: MIP/Aquaporin
  description:
  - text: The MIP/aquaporin family is a group of membrane proteins that facilitate
      the transport of water and small solutes across cell membranes. Members of this
      family are characterized by their ability to form channels that selectively
      allow the passage of water, glycerol, urea, and other small, non-charged molecules.
      These proteins are involved in various physiological processes, including osmoregulation,
      skin hydration, wound healing, and energy homeostasis. Aquaporins play a crucial
      role in maintaining water balance in cells and are found in a wide range of
      organisms, from bacteria to humans. Some family members also participate in
      the transport of gases like carbon dioxide and ammonia, contributing to processes
      such as nitrogen support in symbiotic relationships and gas exchange.
