  name:
    name: 3-ketoacyl-CoA Thiolase
    short: 3-ketoacyl-CoA_Thiolase
  description:
  - text: The Thiolase family proteins are enzymes that catalyze the final step of
      fatty acid oxidation. In this crucial metabolic process, they facilitate the
      cleavage of 3-ketoacyl-CoA to form acetyl-CoA and a CoA ester that is two carbons
      shorter than the original fatty acid. This reaction is a key part of the beta-oxidation
      pathway, which is essential for the breakdown of fatty acids to produce energy.
      Members of the Thiolase family are characterized by their membership in the
      thiolase-like superfamily, indicating a shared structural framework and evolutionary
      origin.
