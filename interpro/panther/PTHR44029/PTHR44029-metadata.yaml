  name:
    name: Multifunctional chaperone and stress response protein
    short: Chaperone_stress_response
  description:
  - text: This family of proteins includes co-chaperones that may interact with HSP70
      and are implicated in ribosomal RNA biogenesis, particularly in the maturation
      of the 60S ribosomal subunit. Some members are involved in chromatin-related
      processes, such as position-effect variegation and chromosome condensation.
      Others function in cellular stress responses, including ER-phagy during ER stress,
      and in regulatory pathways affecting drug resistance. Common motifs such as
      the atg8-interaction motif and the FFAT motif suggest roles in protein-protein
      interactions, essential for their diverse functions.
