  name:
    name: Type IV pilus biogenesis and competence protein
    short: Type_IV_pilus_biogenesis
  description:
  - text: This family of proteins includes components involved in the biogenesis and
      function of type IV pili, which are filamentous structures on bacterial cell
      surfaces. These proteins are essential for pilus assembly, serving as a gateway
      for the pilus to traverse the outer membrane. Additionally, they are implicated
      in bacterial competence, facilitating the uptake of extracellular DNA, which
      can be a source of nutrients or genetic information for horizontal gene transfer.
      Some members may also act as channels for the entry of various substances, including
      heme and antimicrobial agents, into the bacterial cell.
