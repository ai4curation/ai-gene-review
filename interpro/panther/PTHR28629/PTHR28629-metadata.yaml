  name:
    name: Dihydroxyacetone Kinase (DAK)
    short: Dihydroxyacetone_Kinase
  description:
  - text: The Dihydroxyacetone Kinase (DAK) family includes enzymes that catalyze
      the phosphorylation of dihydroxyacetone and glyceraldehyde. Members of this
      family are involved in various metabolic pathways, including the degradation
      of sugars such as L-threitol and erythritol, allowing organisms to utilize these
      compounds as carbon sources. Some DAK family proteins also have additional functions,
      such as the triokinase/FMN cyclase, which can split ribonucleoside diphosphate-X
      compounds, with FAD being the preferred substrate. This activity is known to
      repress IFIH1-mediated cellular antiviral responses. The family is characterized
      by the presence of DhaK and DhaL domains, which have distinct roles in enzyme
      activity. The DhaK domain typically binds dihydroxyacetone, while the DhaL domain
      is associated with ADP-binding and can display cyclase activity. Regulatory
      mechanisms within the family include inhibition by substrates of alternate activities
      and involvement in transcriptional regulation through interactions with transcription
      factors.
