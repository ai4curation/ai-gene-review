  name:
    name: Prephenate/Arogenate Dehydratase
    short: Prephenate/Arogenate_Dehyd
  description:
  - text: The Prephenate Dehydratase/Arogenate Dehydratase family includes enzymes
      that are involved in the biosynthesis of the aromatic amino acid phenylalanine.
      Members of this family catalyze the decarboxylation and dehydration of prephenate
      to phenylpyruvate, and some can also convert arogenate to phenylalanine. These
      reactions are part of the shikimate-chorismate pathway. Bifunctional members
      possess an additional chorismate mutase activity, catalyzing the Claisen rearrangement
      of chorismate to prephenate. The activity of these enzymes is often regulated
      allosterically by phenylalanine and sometimes by other aromatic amino acids.
      Variations in the regulatory domain can lead to desensitization to phenylalanine
      inhibition, affecting phenylalanine production levels.
