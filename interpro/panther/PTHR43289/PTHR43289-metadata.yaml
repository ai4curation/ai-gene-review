    name: Serine/Threonine-Protein Kinase
    short: Ser_Thr-Protein_Kinase
  description:
  - text: The Ser/Thr protein kinase family is involved in a wide range of cellular
      processes including cell growth, division, shape regulation, and response to
      external signals. Members of this family play crucial roles in mycobacterial
      physiology, regulating aspects such as growth, survival, and cell division,
      and are key in host-pathogen interactions during infections. They are also involved
      in mitotic cell cycle progression, cytokinesis, and DNA damage response in eukaryotic
      cells. Some kinases within this family act as sensors or effectors in signaling
      pathways, responding to changes in the environment or cellular state, and can
      phosphorylate a variety of substrates including transcriptional regulators,
      enzymes, and structural proteins. The family includes kinases with regulatory
      functions in bacterial spore germination, DNA repair, and stress responses,
      highlighting their versatility and importance across different domains of life.
