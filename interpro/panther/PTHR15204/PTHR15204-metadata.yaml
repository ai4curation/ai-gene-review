  name:
    name: Large proline-rich protein BAG6
    short: BAG6
  description:
  - text: The BAG6 protein family consists of ATP-independent molecular chaperones
      that prevent the aggregation of misfolded proteins with hydrophobic patches.
      They are part of the BAG6/BAT3 complex, which maintains client proteins soluble
      and ensures their delivery to the endoplasmic reticulum or proteasome for degradation.
      The family plays a role in the post-translational delivery of tail-anchored
      proteins to the endoplasmic reticulum membrane and in the endoplasmic reticulum-associated
      degradation (ERAD) pathway. Additionally, BAG6 proteins are involved in pre-emptive
      quality control during endoplasmic reticulum stress, antigen presentation in
      immune response, and apoptosis regulation. They also interact with various proteins
      such as RNF126, SGTA, and USP13, and can be involved in DNA damage-induced apoptosis
      and chromatin regulation.
