  name:
    name: Mycobacterial membrane protein Large (MmpL)
    short: Mycobact_MmpL
  description:
  - text: The MmpL family proteins are involved in the transport of diverse molecules
      across the inner membrane of bacteria, particularly in mycobacteria. They play
      crucial roles in the biosynthesis and secretion of cell wall components such
      as mycolic acids, sulfolipids, and trehalose monomycolate, which are critical
      for cell envelope integrity and virulence. Some members are also implicated
      in the export of siderophores, which are molecules that bind and transport iron,
      essential for bacterial growth. Additionally, certain MmpL proteins contribute
      to antibiotic resistance and fitness by exporting toxic compounds and drugs
      out of the cell. The family includes proteins that transport hopanoids, strengthening
      the cell envelope, and are involved in heme-iron acquisition systems.
