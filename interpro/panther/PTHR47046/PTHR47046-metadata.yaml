  name:
    name: Succinate Dehydrogenase Assembly Factor 1
    short: SDHAF1
  description:
  - text: The SDHAF1 subfamily is involved in the assembly of succinate dehydrogenase
      (SDH), a key enzyme complex in both the tricarboxylic acid (TCA) cycle and the
      mitochondrial electron transport chain. It facilitates the oxidation of succinate
      to fumarate and the reduction of ubiquinone to ubiquinol. The family plays a
      crucial role in the maturation of the iron-sulfur protein subunit SDHB, protecting
      it from oxidative damage and promoting iron-sulfur cluster incorporation. Members
      of the family bind to SDHB and recruit the iron-sulfur transfer complex, which
      includes HSC20, HSPA9, and ISCU, to assist in the assembly process. The SDHAF1
      subfamily may also work in concert with SDHAF3 to ensure proper SDH function.
