  name:
    name: Octanoyltransferase LipM/LipL
    short: Octanoyltrans_LipM/LipL
  description:
  - text: The octanoyltransferase LipM/LipL family includes enzymes that play a crucial
      role in the post-translational modification of lipoate-dependent enzymes. Members
      of the family catalyze the transfer of octanoic acid from octanoyl-acyl-carrier-protein
      to the lipoyl domain of GcvH, which is an intermediate step in protein lipoylation.
      Additionally, some family members are involved in the transamidation of the
      octanoyl moiety from octanoyl-GcvH to the lipoyl domain of the E2 subunit of
      lipoate-dependent enzymes. This process is essential for the activation of lipoate-dependent
      enzymes, which are involved in critical metabolic pathways such as the citric
      acid cycle and glycine cleavage system. The family is characterized by the presence
      of octanoyltransferase activity and does not display lipoate protein ligase
      activity, despite some sequence similarities to LplA.
