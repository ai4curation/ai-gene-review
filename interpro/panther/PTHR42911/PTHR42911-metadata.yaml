  name:
    name: HflC FtsH protease modulator
    short: HflC_FtsH_modulator
  description:
  - text: The HflC family comprises modulators of the FtsH protease. Members of the
      HflC family, along with HflK, are involved in the regulation of the stability
      of phage lambda cII protein, influencing the lysogenization frequency of phage
      lambda. The HflKC complex is known to inhibit the SecY-degrading activity of
      FtsH, which may play a role in the quality control of integral membrane proteins.
      The family is part of the larger band 7/mec-2 family and is implicated in potentially
      regulating protease activity, although the precise mechanisms and the full spectrum
      of their functions may vary among different species.
