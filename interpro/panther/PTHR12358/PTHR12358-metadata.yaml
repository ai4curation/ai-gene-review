  name:
    name: Lipid Phosphate Formation and Regulation
    short: Lipid_Phosphate_FormReg
  description:
  - text: The protein family is involved in the phosphorylation of various lipids,
      acting as lipid kinases with a range of specificities and functions. Members
      of the family catalyze the formation of lipid phosphates such as sphingosine-1-phosphate,
      dihydrosphingosine 1-phosphate, phosphatidic acid, and ceramide 1-phosphate,
      which play roles in cell signaling, proliferation, apoptosis, stress response,
      and membrane trafficking. Some family members also possess acetyltransferase
      activity and are involved in epigenetic regulation and inflammatory responses.
      The family includes sphingosine kinases, diacylglycerol kinases, ceramide kinases,
      and other lipid kinases with unidentified substrates. These enzymes are key
      in lipid metabolism and are implicated in various cellular processes, including
      the production of lipoteichoic acid, mitochondrial protein import, and the regulation
      of programmed cell death in plants.
