  name:
    name: UbiB protein kinase
    short: UbiB_kinase
  description:
  - text: The UbiB protein kinase family is involved in the regulation of aerobic
      coenzyme Q (ubiquinone) biosynthesis, specifically as regulators of UbiI activity.
      Ubiquinone is a vital lipid-soluble electron transporter within the electron
      transfer system in mitochondria and is essential for cellular respiration. Members
      of the UbiB family are likely to play a role in maintaining cellular energy
      processes and responding to oxidative stress. Some members are also implicated
      in the regulation of chloroplast lipid synthesis and modulation of chloroplast
      membrane composition in response to stress, as well as in the maintenance of
      photosynthetic electron transport by regulating the homeostasis of various prenyl-lipids.
