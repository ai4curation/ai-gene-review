  name:
    name: Pyrroline-5-carboxylate reductase
    short: P5C_reductase
  description:
  - text: The pyrroline-5-carboxylate reductase family consists of housekeeping enzymes
      that catalyze the final step in proline biosynthesis, converting 1-pyrroline-5-carboxylate
      (PCA) to L-proline. Members of this family can utilize both NAD and NADP as
      cofactors, with varying affinities and catalytic efficiencies. Some isoforms
      are primarily involved in generating NADP(+), particularly in erythrocytes.
      These enzymes play a role in the cellular response to oxidative stress and are
      involved in various biosynthetic pathways, including the production of cyclic
      peptides with antifungal, antibacterial, and antitumor properties. The family
      includes enzymes that are exclusively linked to the conversion of ornithine
      to proline, highlighting the diversity of functions within this family.
