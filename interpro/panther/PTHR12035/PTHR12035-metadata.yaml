  name:
    name: Sialic acid-binding Ig-like lectin
    short: SIGLEC
  description:
  - text: The SIGLEC family proteins are sialic acid-binding Ig-like lectins involved
      in cell-cell adhesion, immune regulation, and maintenance of immune cells in
      a resting state. They recognize and bind to sialic acid-bearing glycans, mediating
      interactions with a preference for alpha-2,3- or alpha-2,6-linked sialic acid.
      SIGLEC family members contain immunoreceptor tyrosine-based inhibitor motifs
      (ITIMs) in their cytoplasmic domains, which upon phosphorylation, recruit SH2-containing
      phosphatases to modulate cellular responses. They play roles in inhibiting signal
      transduction, regulating B-cell antigen receptor signaling, controlling autoimmunity,
      and protecting neurons against apoptosis. Some SIGLEC proteins are involved
      in the negative regulation of neurite outgrowth and may act as inhibitory receptors
      in the immune response.
