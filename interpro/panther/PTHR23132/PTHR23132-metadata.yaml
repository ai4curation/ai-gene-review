  name:
    name: D-alanine--D-alanine ligase
    short: D-ala--D-ala_ligase
  description:
  - text: The D-alanine--D-alanine ligase family consists of enzymes that play a crucial
      role in bacterial cell wall biosynthesis. These ligases catalyze the ATP-dependent
      formation of the D-alanyl-D-alanine dipeptide, a key component of peptidoglycan
      precursors. Peptidoglycan is an essential polymer that provides structural integrity
      to the bacterial cell wall. Some members of the family have altered specificity
      and are involved in resistance to glycopeptide antibiotics, such as vancomycin,
      by synthesizing modified peptidoglycan precursors that prevent antibiotic binding,
      leading to antibiotic resistance.
