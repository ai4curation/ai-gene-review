  name:
    name: Circadian Clock Transcription Factors
    short: Circadian_TF
  description:
  - text: The protein family is involved in transcriptional regulation and forms a
      core component of the circadian clock, which is an internal time-keeping system
      that regulates physiological processes through circadian rhythms in gene expression.
      The family includes transcription factors that play roles in various biological
      processes such as angiogenesis, hematopoiesis, metabolism, cell motility, immune
      modulation, and response to hypoxia. Members of the family recognize specific
      DNA elements such as xenobiotic response elements (XRE), hypoxia response elements
      (HRE), and E-box elements, and they form heterodimers to activate or repress
      transcription. The family is also implicated in the development of the hypothalamo-pituitary
      axis, brain growth, visual and renal function, and cellular responses to environmental
      cues.
