  name:
    name: Cobalamin biosynthesis methyltransferase
    short: Cobalamin_biosynth_MTase
  description:
  - text: This family of proteins is involved in the biosynthesis of cobalamin (vitamin
      B12) and other related tetrapyrroles. Members of this family function as methyltransferases,
      catalyzing the transfer of methyl groups to specific carbon atoms within the
      tetrapyrrole ring. The enzymes typically methylate cobalt-precorrin-6B at C-15
      followed by decarboxylation at C-12 to produce cobalt-precorrin-7, or they methylate
      precorrin-6Y at both C-5 and C-15 to form precorrin-8X. Some members are bifunctional
      and can perform both methylation steps in the pathway. The activity of these
      proteins is crucial for the proper formation of the corrin ring, which is a
      central component of cobalamin and related compounds. These compounds play essential
      roles in various biological processes, including DNA synthesis, fatty acid metabolism,
      and amino acid metabolism.
