  name:
    name: Sulfate adenylyltransferase subunit 2
    short: Sulfate_adenylyltrnsfr_sub2
  description:
  - text: The sulfate adenylyltransferase subunit 2 family is involved in the first
      enzymatic step of the sulfur assimilation pathway. Members of this family form
      a complex with CysN, known as ATP sulfurylase (ATPS), which catalyzes the adenylation
      of sulfate to produce adenosine 5'-phosphosulfate (APS) and diphosphate. The
      reaction is characterized by the formation of a high-energy phosphoric-sulfuric
      acid anhydride bond, which is driven by GTP hydrolysis by CysN and ATP hydrolysis
      by the CysD subunit. This process is crucial for the biosynthesis of sulfur-containing
      compounds, which are vital for various cellular functions.
