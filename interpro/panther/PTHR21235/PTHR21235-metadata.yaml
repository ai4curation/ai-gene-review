  name:
    name: Imidazole glycerol phosphate synthase HisA/HisF
    short: IGPS_HisA/HisF
  description:
  - text: The HisA/HisF family proteins are involved in the biosynthesis of histidine,
      an essential amino acid. The family includes imidazole glycerol phosphate synthase
      subunits HisF and HisH, which work together in a multi-enzyme complex. The HisF
      subunit is responsible for the cyclization activity, converting PRFAR (5'-phosphoribosylformimino-5-aminoimidazole-4-carboxamide
      ribonucleotide) into IGP (imidazole glycerol phosphate) and AICAR (5-aminoimidazole-4-carboxamide
      ribonucleotide), using ammonia provided by the HisH subunit. This reaction is
      a key step in the biosynthesis of histidine. The HisF subunit's activity is
      crucial for the production of histidine, which plays a significant role in the
      growth and development of organisms.
