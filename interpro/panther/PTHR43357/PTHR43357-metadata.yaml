  name:
    name: ABC transporter permease subfamily
    short: ABC_transp_permease
  description:
  - text: This family of proteins is involved in the transport of various substrates
      across cellular membranes. Members of this family are typically part of larger
      ABC transporter complexes, which are responsible for the import of specific
      molecules into the cell. These transporters utilize ATP binding and hydrolysis
      to drive the translocation of substrates. Different subfamilies within this
      protein family are specialized for the import of distinct substrates, such as
      2-aminoethylphosphonate, Fe(3+) ions, and possibly other unidentified molecules
      during processes like natural transformation. The proteins function as permeases,
      which form the transmembrane channel through which substrates are transported.
