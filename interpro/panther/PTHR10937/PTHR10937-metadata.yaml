  name:
    name: Glutamine--fructose-6-phosphate aminotransferase
    short: GFAT
  description:
  - text: The Glutamine--fructose-6-phosphate aminotransferase (GFAT) family includes
      enzymes that catalyze the conversion of fructose-6-phosphate into glucosamine-6-phosphate
      using glutamine as a nitrogen source. This reaction is the first step in hexosamine
      metabolism, which is crucial for the production of amino sugars and the synthesis
      of glycoproteins. Members of this family are involved in various biological
      processes, including amino sugar synthesis for the formation of chitin and the
      supply of amino sugars for asparagine-linked oligosaccharides in glycoproteins.
      In humans, GFAT regulates the flux of glucose into the hexosamine pathway, influencing
      the availability of precursors for N- and O-linked glycosylation of proteins
      and playing a role in metabolic regulation, such as the circadian expression
      of clock genes and hyaluronan synthesis during tissue remodeling. Some bacterial
      members are involved in fructoselysine degradation pathways, allowing growth
      on specific amino sugars.
