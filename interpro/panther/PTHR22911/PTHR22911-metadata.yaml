  name:
    name: Diverse Metabolite Transporter Superfamily
    short: Diverse_Metab_Transporter_sf
  description:
  - text: The protein family includes a variety of transporters involved in the uptake
      and export of diverse metabolites and compounds across cellular membranes. Members
      of the family are predominantly characterized by their similarity to known transporter
      families such as the SLC35G solute transporter family, the drug/metabolite transporter
      (DMT) superfamily, and the EamA transporter family. Functions of these transporters
      include the regulation of intracellular calcium homeostasis, transport of riboflavin,
      S-adenosylmethionine, and pseudopaline, which is involved in metal acquisition.
      The transport processes are often energy-dependent and can be inhibited by specific
      compounds. The family plays a crucial role in cellular nutrient acquisition,
      efflux of metabolites, and maintaining ion balance, which are essential for
      various physiological processes and cellular health.
