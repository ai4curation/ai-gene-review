  name:
    name: Thiol-specific antioxidant peroxiredoxin
    short: Peroxiredoxin
  description:
  - text: The peroxiredoxin family proteins are thiol-specific peroxidases that catalyze
      the reduction of hydrogen peroxide and organic hydroperoxides to water and alcohols.
      They play a crucial role in cell protection against oxidative stress by detoxifying
      peroxides. Some family members act as sensors of hydrogen peroxide-mediated
      signaling events and may participate in signaling cascades of growth factors
      and tumor necrosis factor-alpha by regulating intracellular H2O2 concentrations.
      Additionally, certain peroxiredoxins are involved in the maintenance of physical
      strength, the regulation of NF-kappa-B activation in the cytosol, and may have
      a role in postmitotic motor neuron differentiation. They are also implicated
      in the antioxidant defense of photosynthesizing tissues and may contribute to
      longevity and the mitohormetic pathway. The family includes both cytosolic and
      mitochondrial members, with some localized to chloroplasts in plants.
