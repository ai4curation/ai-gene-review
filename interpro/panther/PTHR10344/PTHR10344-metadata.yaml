  name:
    name: Thymidylate kinase
    short: Thymidylate_kinase
  description:
  - text: The thymidylate kinase family is involved in the phosphorylation of thymidine
      monophosphate (dTMP) to thymidine diphosphate (dTDP), which is a crucial step
      in both de novo and salvage pathways of dTTP synthesis. dTTP is an essential
      precursor for DNA synthesis, and thus, members of the thymidylate kinase family
      play a key role in DNA replication and cellular growth. Some family members
      have a broad specificity for nucleoside triphosphates and can use various phosphate
      donors. Additionally, certain thymidylate kinases from this family have been
      implicated in immunomodulatory and antiviral activities, restricting the replication
      of various viruses, including flaviviruses and coronaviruses, by targeting viral
      RNA-dependent RNA polymerase activities.
