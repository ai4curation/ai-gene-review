  name:
    name: DEAD box RNA helicase
    short: DEAD_box_RNA_helicase
  description:
  - text: The DEAD box helicase family is involved in various RNA metabolic processes
      including ribosome biogenesis, RNA degradation, mRNA splicing, and RNAi-mediated
      gene silencing. Members of this family are characterized by the presence of
      conserved motifs, including the Q motif, which controls ATP binding and hydrolysis.
      These proteins exhibit RNA-dependent ATPase activity and RNA unwinding activity,
      facilitating the remodeling of RNA structures and RNA-protein interactions.
      They are essential for the normal formation of ribosomal subunits and pre-rRNA
      processing, contributing to the assembly and stability of ribonucleoprotein
      complexes. Some subfamilies within this group are also implicated in cellular
      processes such as apoptosis, cell cycle progression, and response to stress,
      highlighting their diverse roles in RNA metabolism.
