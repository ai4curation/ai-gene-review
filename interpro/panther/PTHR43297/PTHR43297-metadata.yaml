  name:
    name: ABC Transporter, Nickel and Peptide Import
    short: ABC_Ni/Peptide_Import
  description:
  - text: The ABC Transporter, Nickel and Peptide Import family comprises ATP-binding
      proteins involved in the transport of various substrates across cellular membranes
      using ATP hydrolysis for energy. Members of this family are responsible for
      the import of nickel ions, oligopeptides, dipeptides, and potentially other
      divalent metal ions, often as part of larger ABC transporter complexes. These
      proteins play crucial roles in nutrient uptake, resistance to antimicrobial
      peptides, sporulation, competence, and virulence. The family includes proteins
      that may also influence the activity of other transport systems, such as potassium
      uptake proteins.
