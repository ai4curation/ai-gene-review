  name:
    name: 4-Toluene Sulfonate Uptake Permease
    short: TSUP
  description:
  - text: The 4-toluene sulfonate uptake permease (TSUP) family includes proteins
      involved in the transport of sulfonates and related compounds across cellular
      membranes. Members of the TSUP family are predominantly membrane transporters,
      which facilitate the uptake of substances like p-toluenesulphonate (TSA) and
      potentially export sulfite and various organosulfonates. These transporters
      are integral to the cellular processes that manage the import and export of
      sulfonate compounds, contributing to the metabolic versatility of the organisms
      in utilizing different sulfonated substrates as sources of sulfur or carbon,
      or in detoxification processes.
