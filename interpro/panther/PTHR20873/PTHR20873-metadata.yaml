  name:
    name: L-seryl-tRNA(Sec) kinase
    short: Ser-tRNA(Sec)_kinase
  description:
  - text: This family of proteins is involved in the biosynthesis of selenocysteine,
      an essential amino acid in some organisms. Members of this family catalyze the
      phosphorylation of seryl-tRNA(Sec), converting it to O-phosphoseryl-tRNA(Sec).
      This reaction is a crucial step in the formation of selenocysteine, which is
      then incorporated into selenoproteins. These proteins exhibit specificity for
      seryl-tRNA(Sec) and do not act on other tRNA species. The activity of these
      kinases is a key regulatory point in the selenocysteine biosynthetic pathway,
      which is vital for the production of proteins that contain this rare amino acid
      with important cellular functions, including antioxidant defense and redox regulation.
