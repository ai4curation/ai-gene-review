  name:
    name: Coenzyme A-transferase family III
    short: CoA-transferase_III
  description:
  - text: The CoA-transferase III family is characterized by its ability to catalyze
      the reversible transfer of coenzyme A (CoA) from acyl-CoA thioesters to various
      acceptor molecules, playing a crucial role in diverse metabolic pathways. Members
      of this family are involved in the metabolism of L-carnitine, bile acids, and
      branched-chain fatty acids, as well as in autotrophic carbon dioxide fixation
      and the glyoxylate assimilation cycle. They facilitate the interconversion of
      stereoisomers of alpha-methyl-branched-chain fatty acyl-CoA esters and participate
      in the fermentation of amino acids via Stickland reactions. Additionally, they
      contribute to the ocean sulfur cycle by producing dimethyl sulfide from dimethylsulfonioproprionate.
      The family includes enzymes such as L-carnitine CoA-transferase, bile acid CoA-transferase,
      alpha-methylacyl-CoA racemase, and succinyl-CoA--L-malate CoA-transferase, each
      with specific substrate preferences and roles in cellular metabolism.
