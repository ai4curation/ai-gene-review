  name:
    name: Cytidine and Deoxycytidylate Deaminase
    short: Cyt/Deoxycyt_deaminase
  description:
  - text: The cytidine and deoxycytidylate deaminase family encompasses enzymes that
      play a crucial role in pyrimidine metabolism. Members of this family are responsible
      for the hydrolytic deamination of cytidine and 2'-deoxycytidine, converting
      them into uridine and 2'-deoxyuridine, respectively. This reaction is essential
      for the recycling of cytidine and for the synthesis of uridine monophosphate
      (UMP). Some members of the family have also evolved to deaminate the cytosine
      moiety of certain antibiotics, such as blasticidin S, contributing to antibiotic
      resistance. The family is characterized by a conserved domain structure, with
      each monomer typically comprising a small N-terminal alpha-helical domain and
      two larger core domains that exhibit nearly identical tertiary structures.
