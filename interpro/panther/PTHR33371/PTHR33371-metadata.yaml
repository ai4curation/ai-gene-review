  name:
    name: MlaD Inter-membrane Phospholipid Transporter
    short: MlaD_Phospholipid_Transporter
  description:
  - text: This family of proteins is involved in the maintenance of lipid asymmetry
      in bacterial outer membranes. Members function as part of an ABC transporter
      complex, which is essential for the retrograde trafficking of phospholipids
      from the outer to the inner membrane. These proteins have a high affinity for
      phospholipids and are implicated in modulating the ATPase activity of the transporter
      complex, contributing to its energy-dependent transport mechanism. They are
      characterized by the ability to form hexameric rings with a central hydrophobic
      pore, which is crucial for their phospholipid binding function.
