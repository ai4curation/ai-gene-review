  name:
    name: 3-deoxy-manno-octulosonate cytidylyltransferase
    short: KdsB_cytidylyltransferase
  description:
  - text: The KdsB family proteins are responsible for the activation of 3-deoxy-D-manno-octulosonate
      (KDO), an 8-carbon sugar, which is a key component in the biosynthesis of lipopolysaccharide
      (LPS) in Gram-negative bacteria. LPS forms the outer leaflet of the outer membrane
      and is essential for bacterial viability and pathogenicity. The enzymes catalyze
      the formation of cytidylyl-KDO, using CTP as the preferred nucleotide donor.
      Some family members activate a derivative of KDO, KDO8N, specifically in the
      Shewanella genus. The family also includes proteins involved in the biosynthesis
      of rhamnogalacturonan II in plant cell walls, a pectic polysaccharide essential
      for cell wall integrity and growth.
