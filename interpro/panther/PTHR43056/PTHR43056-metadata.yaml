  name:
    name: Xaa-Pro dipeptidyl-peptidase/Cocaine esterase
    short: Xaa-Pro_dipeptidyl-ppase/CocE
  description:
  - text: The protein family is characterized by enzymes that have a specific proteolytic
      function. Members of this family are known as Xaa-Pro dipeptidyl-peptidases,
      which are peptidases responsible for cleaving N-terminal dipeptides from polypeptides,
      particularly when the penultimate residue is proline. This enzymatic activity
      is essential for the sequential removal of unsubstituted N-terminal dipeptides
      from various polypeptides, contributing to protein maturation and degradation
      processes. Additionally, some family members are associated with the CocE/NonD
      hydrolase family, indicating a potential role in esterase activity, such as
      the hydrolysis of cocaine by cocaine esterase, which allows certain bacteria
      to utilize cocaine as a carbon and energy source. The family's functional diversity
      underscores its importance in both peptide processing and environmental adaptation.
