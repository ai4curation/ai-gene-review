  name:
    name: Bacterial Aldehyde Dehydrogenase
    short: Aldehyde_DH
  description:
  - text: The aldehyde dehydrogenase family is involved in the NAD(+)- or NADP(+)-dependent
      oxidation of aldehydes to their corresponding carboxylic acids. Members of the
      family play a role in various metabolic processes, including the detoxification
      of aldehydes, ethanol oxidation, and virulence in certain bacteria. Some enzymes
      within the family are also involved in the catabolism of specific compounds
      such as acetoin, ethanol, and fluoroacetate. The family includes enzymes that
      can act on a wide range of substrates, from short-chain aldehydes to long-chain
      alkanals, and are regulated by various metal ions and other compounds.
