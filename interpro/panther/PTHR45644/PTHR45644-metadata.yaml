  name:
    name: Mitochondrial Outer Membrane Translocase MSP1 Subfamily
    short: Mito_OM_Translocase_MSP1
  description:
  - text: The MSP1 subfamily of the AAA ATPase family includes outer mitochondrial
      transmembrane helix translocases that are essential for the removal of mislocalized
      tail-anchored transmembrane proteins from the mitochondrion outer membrane.
      These proteins function as ATP-dependent dislocases, recognizing and binding
      tail-anchored transmembrane proteins to extract them from the membrane. Additionally,
      they play a crucial role in the regulation of AMPA receptor surface expression,
      impacting synaptic plasticity, learning, and memory. Some family members are
      involved in the ATP-dependent internalization of AMPA receptors and the inhibition
      of their recycling to the plasma membrane. The family also includes proteins
      that may be involved in intramitochondrial sorting and the regulation of translocase
      activity through interactions with other proteins such as PEX3.
