  name:
    name: Major Facilitator Superfamily Transporters
    short: MFS_Transporters
  description:
  - text: The protein family is involved in the transport of various organic and inorganic
      compounds across cellular membranes. Members function as transporters for organic
      cations, anions, and phosphate, often operating as antiporters or symporters.
      They play crucial roles in homeostasis, nutrient uptake, waste removal, and
      xenobiotic detoxification. Some are involved in specific physiological processes
      such as sperm motility, iron transport, and maintaining steady-state levels
      of coenzymes. The family includes high and low-affinity inorganic phosphate
      transporters, organic anion transporters, and organic cation/carnitine transporters,
      with some members also transporting molecules like riboflavin, ergothioneine,
      and acetylcholine.
