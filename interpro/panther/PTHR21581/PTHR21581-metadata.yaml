  name:
    name: D-alanyl-D-alanine Carboxypeptidase
    short: Dala-Dala_Carboxypeptidase
  description:
  - text: The D-alanyl-D-alanine carboxypeptidase family is involved in bacterial
      cell wall biosynthesis and remodeling. Members of this family are peptidases
      that typically remove C-terminal D-alanyl residues from sugar-peptide cell wall
      precursors, which is a crucial step in the maturation of the cell wall. Some
      members may also hydrolyze DD-diaminopimelate-alanine bonds in murein sacculi,
      playing a specialized role in cell wall formation. The family includes proteins
      that are essential for spore cortex synthesis and maintenance of colony morphology,
      cell wall permeability, and integrity. Activity of some family members can be
      regulated by beta-lactam antibiotics, indicating their potential role as targets
      for antibacterial drugs. The family is characterized by the peptidase S11 family
      signature and includes proteins with a C-terminal amphiphilic helix targeting
      them to the periplasmic side of the inner cell membrane.
