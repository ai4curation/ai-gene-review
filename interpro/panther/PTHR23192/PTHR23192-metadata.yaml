  description:
  - text: This family of proteins includes secreted and membrane-associated factors
      with diverse biological functions, primarily related to cell signaling, development,
      and maintenance of cellular structures. Members are involved in processes such
      as cell adhesion, migration, cytoskeleton organization, and differentiation.
      They play roles in the formation and maintenance of the nodes of Ranvier in
      neurons, dorsoventral patterning during development, and may influence cell
      proliferation in cancer. Some family members are implicated in the regulation
      of smooth muscle cell phenotype, bone formation, myelination, muscle hypertrophy,
      and neurite outgrowth. They are characterized by the presence of an olfactomedin-like
      domain, which mediates protein-protein interactions and contributes to their
      diverse functions.
