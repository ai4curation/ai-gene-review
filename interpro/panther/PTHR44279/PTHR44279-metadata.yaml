  name:
    name: 11-beta-hydroxysteroid dehydrogenase
    short: 11-beta-HSD
  description:
  - text: This family of proteins is involved in the regulation of glucocorticoid
      and mineralocorticoid levels by catalyzing the reversible conversion of inactive
      glucocorticoids to their active forms. They function predominantly as reductases
      in vivo, increasing the concentration of active glucocorticoids. These proteins
      play a crucial role in the corticosteroid receptor-mediated anti-inflammatory
      response, metabolic processes, and homeostasis. They exhibit broad substrate
      specificity, accepting various steroid and sterol substrates, and are involved
      in the metabolism of oxysterols, which are linked to apoptosis, atherosclerosis,
      and lipid peroxidation. Additionally, they contribute to bile acid metabolism
      and may influence immune cell migration through the synthesis of specific cholesterols
      that act as ligands for G-protein-coupled receptors.
