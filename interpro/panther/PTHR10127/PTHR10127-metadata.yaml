  name:
    name: Astacin-like Metalloprotease
    short: Astacin-like_Mtllprts
  description:
  - text: The Astacin-like metalloprotease family encompasses enzymes that perform
      a variety of functions, including the cleavage of procollagens to mature collagens,
      degradation of extracellular matrix components, and processing of eggshell proteins
      during hatching. Members of this family are involved in tissue remodeling, inflammation,
      and innate immune responses. They exhibit a preference for cleaving at specific
      amino acid residues and are regulated by various inhibitors, including metal
      ion chelators and hydroxamic acids. Some family members also play roles in fertilization
      by acting as oocyte-specific receptors or in venom by facilitating the diffusion
      of toxins or aiding in extra-oral digestion of prey.
