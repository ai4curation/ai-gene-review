  name:
    name: Adenine phosphoribosyltransferase
    short: Adenine_PRTase
  description:
  - text: The adenine phosphoribosyltransferase family is responsible for a salvage
      reaction that converts adenine to AMP, a process that is energetically more
      efficient than de novo synthesis. Members of this family play a crucial role
      in recycling adenine into adenylate nucleotides. Some members also have the
      ability to inactivate cytokinins, plant hormones, by converting their free base
      form to corresponding nucleotides, thus regulating their activity.
