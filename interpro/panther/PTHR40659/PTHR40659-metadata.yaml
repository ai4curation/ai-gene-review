  name:
    name: Nickel/cobalt efflux system RcnA
    short: NiCoT_RcnA
  description:
  - text: The RcnA protein family is characterized by its role in the efflux of nickel
      and cobalt ions from the cell, thereby contributing to metal homeostasis and
      resistance to metal toxicity. Members of this family are integral membrane proteins
      that utilize a transport mechanism to selectively remove excess nickel and cobalt
      ions from the cytoplasm, preventing their accumulation to harmful levels. The
      RcnA family is part of the broader NiCoT transporter family, which is known
      for its specificity towards nickel and cobalt ions. The activity of RcnA proteins
      is essential for the survival of organisms in environments with varying concentrations
      of these metals, and it plays a crucial role in the cellular response to metal
      stress.
