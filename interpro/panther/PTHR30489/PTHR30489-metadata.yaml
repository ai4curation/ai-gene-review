  name:
    name: Lipoprotein-releasing system transmembrane protein
    short: Lipoprotein-release_system
  description:
  - text: This family of proteins is involved in an ATP-dependent transport system
      that facilitates the release of lipoproteins from the inner membrane, targeting
      them to the outer membrane in bacteria. The release mechanism is contingent
      on a specific sorting signal, which is the absence of an aspartic acid residue
      at the second position of the mature lipoprotein. These proteins are integral
      components of the membrane and are part of a larger complex known as the LolCDE
      system, which is essential for the proper localization of lipoproteins, playing
      a critical role in bacterial membrane organization and function.
