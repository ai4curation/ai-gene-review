  name:
    name: Beta-ketoacyl-[acyl-carrier-protein] synthase III
    short: Beta-ketoacyl-ACP_synthase_III
  description:
  - text: The beta-ketoacyl-[acyl-carrier-protein] synthase III family is involved
      in the initiation of fatty acid synthesis. Members of this family catalyze the
      condensation reaction by adding two carbons from malonyl-ACP to an acyl acceptor.
      This reaction is the first condensation step in fatty acid synthesis, potentially
      influencing the overall rate of fatty acid production. The enzymes exhibit both
      acetoacetyl-ACP synthase and acetyl transacylase activities, with substrate
      specificity playing a role in determining the production of branched-chain and
      straight-chain fatty acids. The association between ACP/AcpP and FabH is weak
      and relies on the presence of the last Arg residue in the ACP-binding site.
      Some family members have additional functions, such as involvement in the biosynthesis
      of signaling molecules or biotin precursors, and may be regulated by various
      factors including phosphorylation or inhibition by specific compounds.
