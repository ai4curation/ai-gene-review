  name:
    name: P-type Cation Transport ATPase
    short: P-type_Cation_ATPase
  description:
  - text: The P-type cation transport ATPase family is characterized by its ability
      to catalyze the hydrolysis of ATP coupled with the translocation of cations
      across cellular membranes. Members of this family are involved in the active
      transport of various cations, including calcium, sodium, potassium, magnesium,
      and manganese. They play critical roles in processes such as muscle contraction
      and relaxation, maintaining membrane potential, calcium signaling, autophagy,
      cellular homeostasis, and the secretory pathway. These ATPases are regulated
      by factors like phospholamban, sarcolipin, and myoregulin, and can be found
      in diverse compartments such as the plasma membrane, sarcoplasmic/endoplasmic
      reticulum, and Golgi apparatus. Their activity is essential for proper physiological
      functions across different organisms, including plants, fungi, and animals.
