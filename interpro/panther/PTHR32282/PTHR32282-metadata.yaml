  name:
    name: Glycosyltransferase 51/Transpeptidase
    short: Glycosyltr_51/Transpeptidase
  description:
  - text: The glycosyltransferase 51/transpeptidase family is involved in bacterial
      cell wall formation. Members of the family catalyze the synthesis of cross-linked
      peptidoglycan from lipid intermediates. The enzymes typically have a bifunctional
      structure with a penicillin-insensitive transglycosylase N-terminal domain that
      forms linear glycan strands and a penicillin-sensitive transpeptidase C-terminal
      domain responsible for cross-linking peptide subunits. This process is essential
      for maintaining cell wall integrity and shape. Some family members are monofunctional
      glycosyltransferases that specialize in glycan chain elongation. The activity
      of these enzymes can be regulated by environmental pH and inhibited by antibiotics
      such as moenomycin. The family plays a crucial role in various stages of bacterial
      growth, including vegetative growth and spore outgrowth.
