  name:
    name: Pyruvate Dehydrogenase/Transketolase
    short: PDH/Transketolase
  description:
  - text: The protein family includes components of the pyruvate dehydrogenase (PDH)
      complex, which are responsible for the conversion of pyruvate to acetyl-CoA
      and CO2, a critical step in cellular respiration. Some family members also exhibit
      reductase activity with pyruvate. Additionally, the family encompasses transketolase-related
      proteins involved in various metabolic pathways, including the sulfo-TK pathway
      and the catabolism of D-apiose. These enzymes facilitate the transfer of glycolaldehyde
      groups between different sugar phosphates, playing a vital role in carbohydrate
      metabolism.
