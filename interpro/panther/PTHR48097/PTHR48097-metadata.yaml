    name: Threonine aldolase
    short: Threonine_aldolase
  description:
  - text: The threonine aldolase family includes enzymes that catalyze the cleavage
      of L-threonine and L-allo-threonine to glycine and acetaldehyde, playing a role
      in amino acid degradation. Some family members also act on L-erythro-phenylserine,
      L-threo-phenylserine, and other related compounds. Additionally, certain threonine
      aldolases are involved in the biosynthesis of secondary metabolites, such as
      viridicatumtoxin and HC-toxin, by providing essential precursors or participating
      in specific biosynthetic steps. These enzymes are characterized by their low
      specificity, with some exhibiting stereospecificity for L-allo-threonine. The
      family's role in both primary metabolism and the biosynthesis of natural products
      highlights its functional diversity across different organisms.
