  name:
    name: Subtilisin-like proprotein convertase
    short: Subtilisin-like_PPC
  description:
  - text: The peptidase S8 family, also known as the subtilisin-like proprotein convertase
      family, includes serine endoproteases that process a variety of proproteins
      at paired basic amino acids, typically recognizing the RXXX[KR]R consensus motif.
      These enzymes are involved in the maturation of hormone precursors, growth factors,
      receptors, and other secretory proteins through proteolytic activation. They
      play crucial roles in various biological processes, including embryonic development,
      neural function, digestion, immune response, and reproduction. Members of this
      family are implicated in the constitutive and regulated secretory pathways,
      and their activity is often regulated by their propeptide domains, metal ions,
      or specific inhibitors. Some family members are also involved in pathogen-host
      interactions by processing viral and bacterial proteins, contributing to microbial
      virulence and immune evasion.
