  name:
    name: Plant receptor-like serine/threonine kinase
    short: Plant_RL_S/T_kinase
  description:
  - text: This family of proteins includes receptor-like kinases with serine/threonine
      specificity, which are involved in various signaling pathways in plants. Members
      of this family play key roles in plant immunity, development, and stress responses.
      They act as receptors for different peptides and pathogens, transducing extracellular
      signals into cellular responses that regulate processes such as immune response,
      cell differentiation, root growth, and maintenance of water transport. Some
      proteins in this family are involved in the perception of peptide hormones and
      contribute to the formation of physical barriers in plant tissues or mediate
      resistance to pathogens and herbivores by activating defense responses.
