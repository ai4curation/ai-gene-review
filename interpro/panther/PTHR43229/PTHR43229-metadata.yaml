  name:
    name: Nodulation factor ABC transporter
    short: Nod_factor_ABC_transporter
  description:
  - text: This family of proteins is involved in the transport of specific bacterial
      signal molecules known as nodulation factors, which are essential for establishing
      symbiosis with host plants and triggering nodulation. These factors are lipooligosaccharides,
      specifically modified beta-1,4-linked N-acetylglucosamine oligosaccharides.
      Members of this family function as part of an ABC transporter complex, facilitating
      the export of these nodulation factors across the bacterial membrane.
