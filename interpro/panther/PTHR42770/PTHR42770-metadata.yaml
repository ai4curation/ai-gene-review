  name:
    name: Amino acid-polyamine-organocation superfamily
    short: APC_superfamily
  description:
  - text: The amino acid-polyamine-organocation (APC) superfamily is a diverse group
      of membrane transport proteins that facilitate the exchange or uptake of amino
      acids, polyamines, and organocations across the cell membrane. Members of this
      superfamily are involved in various biological processes, including acid resistance,
      substrate exchange for energy conversion, and virulence against host immune
      responses. They operate through mechanisms such as antiport and symport, often
      with specificity for substrates like arginine, ornithine, agmatine, putrescine,
      and GABA. The transport activity of these proteins is frequently regulated by
      environmental factors such as pH, and they possess structural features like
      transmembrane helices and central cavities for substrate binding.
