  name:
    name: Beta-glucan modifying enzymes
    short: Beta-glucan_modifiers
  description:
  - text: This family of proteins includes enzymes predominantly involved in the hydrolysis
      and modification of beta-glucans. Members of this family are implicated in various
      biological processes, such as cell wall remodeling during growth, mating, and
      sporulation. They are active on substrates like laminarin and lichenan, and
      some are involved in the degradation of cellulosic biomass, catalyzing the release
      of glucose from cellobiose. Certain proteins within this family also contribute
      to pathogenicity, biofilm matrix formation, and immune response modulation in
      host organisms. Their activities are essential for maintaining cell wall integrity
      and facilitating cellular morphogenesis and adhesion.
