  name:
    name: Flavin-dependent aromatic-ring hydroxylase
    short: FAD_aromatic-hydroxylase
  description:
  - text: This family of proteins includes flavin-dependent monooxygenases that are
      involved in the biotransformation of various compounds, including antibiotic
      and mycotoxin derivatives. They typically contain an N-terminal FAD-binding
      domain with a Rossman fold and a C-terminal substrate-binding domain. These
      enzymes catalyze the hydroxylation of aromatic rings, which is a key step in
      the inactivation of tetracycline antibiotics by hydroxylating carbon 11a, leading
      to resistance in certain bacteria. Some family members are also implicated in
      the biosynthesis of natural products, such as aspoquinolone mycotoxins and penigequinolones,
      by participating in complex biosynthetic pathways that involve multiple enzymatic
      steps and different substrate transformations.
