  name:
    name: Complex I subunit 2
    short: Complex_I_subunit_2
  description:
  - text: The complex I subunit 2 family is involved in the electron transport chain,
      a crucial process in both respiration and photosynthesis. Members of this family
      are core subunits of NADH-quinone oxidoreductase (Complex I), which is a key
      enzyme in the mitochondrial respiratory chain and chloroplast respiratory chain
      in plants and cyanobacteria. These proteins shuttle electrons from NAD(P)H to
      quinones via FMN and iron-sulfur (Fe-S) centers. The process is coupled with
      proton translocation across the membrane, creating a proton gradient that is
      used to generate ATP. This family plays a role in conserving redox energy and
      is essential for cellular energy metabolism. The electron acceptors vary among
      species and include ubiquinone, plastoquinone, and menaquinone, reflecting the
      diversity of electron transport systems in different organisms.
