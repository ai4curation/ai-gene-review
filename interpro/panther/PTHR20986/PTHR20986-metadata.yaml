  name:
    name: FMRFamide-related neuropeptide
    short: FMRFamide-related_np
  description:
  - text: This family of proteins includes neuropeptides that modulate various physiological
      processes. Members are involved in the modulation of muscle contraction in both
      somatic and visceral muscles, including the heart. They act as excitatory neurotransmitters
      at neuromuscular junctions and have roles in the regulation of cardiovascular
      function. In some species, they influence chromatophore expansion, affecting
      color changes. These peptides also participate in the regulation of behaviors
      such as locomotion, feeding, and stress responses. They bind to G-protein coupled
      receptors, including npr-1 and npr-22, to exert their effects. Some peptides
      in this family are implicated in the modulation of neural activity, either exciting
      or inhibiting neurons. They are also involved in the regulation of fat metabolism
      and energy homeostasis, as well as reproductive functions such as sperm navigation.
