  name:
    name: Calcium-dependent Lectin
    short: Ca-dependent_lectin
  description:
  - text: This family of proteins includes calcium-dependent lectins that play a crucial
      role in the innate immune defense. They are responsible for binding specific
      carbohydrate moieties such as mannose, fucose, and N-acetylglucosamine present
      on the surfaces of various microorganisms, which leads to the activation of
      the lectin complement pathway. Additionally, these proteins bind to late apoptotic
      and necrotic cells, as well as apoptotic blebs, facilitating their recognition
      and uptake by macrophages. This function is essential for the clearance of dying
      cells and may help to prevent an inflammatory response. Some members of this
      family have been implicated in the inhibition of viral infections, including
      SARS-CoV-2, by activating the complement system and reducing the associated
      inflammatory response.
