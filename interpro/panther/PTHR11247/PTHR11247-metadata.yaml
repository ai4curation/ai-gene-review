  name:
    name: Lipid Modification and Degradation Enzyme
    short: Lipid_Mod/Degrad_Enzyme
  description:
  - text: The protein family includes enzymes involved in the modification and degradation
      of lipid-linked molecules and proteins. Members of the dolichyldiphosphatase
      subfamily are crucial for N-glycosylation, hydrolyzing dolichyl pyrophosphate
      to maintain dolichol-linked oligosaccharide levels, which are essential for
      protein glycosylation processes. They exhibit high specificity towards dolichyl
      pyrophosphate and do not act on phosphatidate. The palmitoyl-protein thioesterase
      subfamily members are lysosomal enzymes that cleave thioester-linked fatty acyl
      groups, such as palmitate, from modified cysteine residues in proteins or peptides
      during degradation, preferring acyl chain lengths of 14 to 18 carbons. They
      exhibit high S-thioesterase activity for palmitic and myristic acids but are
      structurally constrained from removing palmitate from peptides or proteins.
      The PA-phosphatase related phosphoesterase subfamily members exhibit phosphatidate
      phosphatase activity and may play roles in plastid lipid metabolism, with some
      members being inhibited by Mg(2+). Collectively, these enzymes are involved
      in lipid metabolism, protein modification, and cellular homeostasis.
