  name:
    name: SsuD/RutA monooxygenase
    short: SsuD_RutA_monooxygenase
  description:
  - text: The SsuD/RutA protein family includes monooxygenases that catalyze diverse
      desulfonation reactions, crucial for sulfur metabolism and pyrimidine degradation.
      Members of the SsuD subfamily are involved in the desulfonation of aliphatic
      sulfonates, converting them into aldehydes and sulfite, thus participating in
      sulfur compound utilization. The RutA subfamily members are pyrimidine monooxygenases
      that catalyze the ring opening of pyrimidine between N-3 and C-4 through a unique
      flavin hydroperoxide-catalyzed mechanism, yielding ureidoacrylate peracid and
      FMN-N(5)-oxide. This reaction is part of the uracil catabolic pathway and is
      essential for the regeneration of FMN, which is critical for various cellular
      processes. The family also includes enzymes like sulfoquinovose monooxygenase,
      which is involved in the degradation of sulfoquinovose, and dimethylsulfone
      monooxygenase, which participates in the dimethyl sulfide degradation pathway.
      These enzymes are characterized by their requirement for FMNH2 or FMN and their
      specificity for various sulfonated substrates.
