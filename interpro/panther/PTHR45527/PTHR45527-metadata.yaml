  name:
    name: Nonribosomal peptide synthetases
    short: NRPS
  description:
  - text: Nonribosomal peptide synthetases (NRPSs) are a diverse family of multimodular
      enzymes that play a crucial role in the biosynthesis of a wide range of natural
      products with various biological activities. These enzymes work independently
      of ribosomes to assemble complex peptides, often containing non-proteinogenic
      amino acids. NRPSs are characterized by the presence of multiple catalytic domains,
      each responsible for the incorporation of a specific amino acid into the growing
      peptide chain. The modular architecture typically includes adenylation, thiolation,
      and condensation domains, with some NRPSs also featuring epimerization, methyltransferase,
      and thioesterase domains for further modifications. The peptides synthesized
      by NRPSs include antibiotics, siderophores, toxins, and immunosuppressants,
      highlighting their significance in pharmaceutical development and ecological
      interactions.
