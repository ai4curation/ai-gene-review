  name:
    name: YpeA/RimI acetyltransferase
    short: YpeA/RimI_acetyltransf
  description:
  - text: The YpeA/RimI acetyltransferase family encompasses enzymes that catalyze
      the transfer of an acetyl group from acetyl-CoA to various substrates, including
      proteins and polyamines. Members of the YpeA subfamily are acetyltransferases
      with unspecified functions, while those in the RimI subfamily specifically acetylate
      the N-terminal alanine of ribosomal protein bS18. Other members display diverse
      specificities, such as acetylation of polyamines, mycothiol, or antibiotics
      like gentamicin and streptothricin, contributing to metabolic processes and
      antibiotic resistance.
