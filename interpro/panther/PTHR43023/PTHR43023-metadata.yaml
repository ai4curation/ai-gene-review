  name:
    name: ABC Transporter ATP-Binding Protein
    short: ABC_Transporter_ATP-Binding
  description:
  - text: This family of proteins includes ATP-binding components of ABC transporter
      complexes, which are involved in various transport processes across biological
      membranes. Members of this family are responsible for energy coupling to the
      transport systems, utilizing ATP hydrolysis to translocate substrates. Some
      proteins in this family are implicated in the maintenance of lipid asymmetry
      in bacterial outer membranes by mediating the retrograde trafficking of phospholipids.
      Others may be involved in the transport of ribonucleotides, although their exact
      functions are not well-defined. Additionally, a member of this family in plants
      is involved in lipid transfer from the endoplasmic reticulum to plastids, essential
      for thylakoid membrane formation.
