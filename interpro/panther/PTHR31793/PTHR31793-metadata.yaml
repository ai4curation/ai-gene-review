  name:
    name: 4-hydroxybenzoyl-CoA thioesterase
    short: 4-hydroxybenzoyl-CoA_TE
  description:
  - text: The 4-hydroxybenzoyl-CoA thioesterase family is involved in diverse metabolic
      processes, including the biosynthesis of phylloquinone (vitamin K1) and fatty
      acids. Members of the family exhibit hydrolase activity, catalyzing the cleavage
      of thioester bonds in various substrates. Some enzymes specifically hydrolyze
      1,4-dihydroxy-2-naphthoyl-CoA (DHNA-CoA) in the vitamin K1 biosynthetic pathway,
      while others are involved in phospholipid metabolism or the production of medium
      to long-chain fatty acids and beta-keto fatty acids. These fatty acids may contribute
      to processes such as cuticular wax synthesis, suberin biosynthesis, and the
      development of floral organs. The family includes enzymes with specificity for
      acyl-ACP substrates and others that act on acyl-CoA thioesters with varying
      chain lengths and degrees of saturation.
