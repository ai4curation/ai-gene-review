  name:
    name: Translation Elongation/Assembly GTPase
    short: Transl_Elong/Asmbly_GTPase
  description:
  - text: The protein family includes GTP-dependent translational elongation factors
      and ribosomal assembly factors that are essential for protein synthesis and
      ribosome biogenesis. Members of this family catalyze the ribosomal translocation
      step during translation elongation, where the ribosome shifts from the pre-translocational
      to the post-translocational state, moving peptidyl-tRNA and deacylated tRNA
      to the P and E sites, respectively. This process involves the coordinated movement
      of tRNA molecules, mRNA, and ribosomal conformational changes. Some family members
      are involved in the biogenesis of the 60S ribosomal subunit, activating ribosomes
      for translation by releasing factors from pre-ribosomes. Others are required
      for pre-mRNA splicing as components of the spliceosome. The family includes
      proteins that respond to environmental stress, such as cold, and are involved
      in the regulation of gene expression and morphogenesis.
