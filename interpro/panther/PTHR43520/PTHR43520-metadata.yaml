  name:
    name: P-type ATPase Type IB Metal Ion Transporter
    short: P-type_ATPase_Type_IB
  description:
  - text: The P-type ATPase Type IB family is involved in the transport of metal cations
      across cellular membranes, primarily copper ions. Members of this family function
      as ATP-driven pumps that maintain metal ion homeostasis within cells by exporting
      excess ions out of the cytoplasm. These proteins are essential for processes
      such as copper detoxification, copper delivery to cuproenzymes, and the regulation
      of cellular copper levels. Some members also participate in the transport of
      other metal ions like manganese and zinc, contributing to the organism's ability
      to adapt to varying metal ion concentrations and to resist metal toxicity. The
      family includes proteins that are activated by specific metal ions and may be
      regulated by phosphorylation, interacting with metallochaperones, or through
      cellular localization changes in response to metal ion availability.
