  name:
    name: Bifunctional protein HldE
    short: HldE_bifunctional
  description:
  - text: The HldE protein family is characterized by bifunctional proteins that play
      a crucial role in the biosynthesis of ADP-L-glycero-D-manno-heptose, which is
      a precursor for the inner core of lipopolysaccharides in Gram-negative bacteria.
      Members of this family possess two distinct enzymatic activities. The N-terminal
      domain typically belongs to the carbohydrate kinase PfkB family and is responsible
      for the phosphorylation of D-glycero-D-manno-heptose 7-phosphate at the C-1
      position, resulting in the production of D-glycero-beta-D-manno-heptose-1,7-bisphosphate.
      The C-terminal domain is part of the cytidylyltransferase family, catalyzing
      the ADP transfer from ATP to D-glycero-beta-D-manno-heptose 1-phosphate, yielding
      ADP-D-glycero-beta-D-manno-heptose. These two activities are essential for the
      biosynthesis of a key component in the outer membrane of bacteria, contributing
      to the structural integrity and defense mechanisms of the bacterial cell wall.
