  name:
    name: Cation-dependent O-methyltransferase
    short: Cation-dep_OMT
  description:
  - text: This family of proteins includes enzymes that catalyze the O-methylation
      of catecholamine neurotransmitters and hormones, leading to their inactivation.
      This methylation reaction is crucial for regulating the biological activity
      and half-lives of these molecules. Some family members are also involved in
      auditory function, being part of the mechanotransduction machinery in cochlear
      hair cells. They play a role in the assembly of the tip-link complex and the
      transport of proteins essential for hearing. The enzymatic activity is independent
      of their function in mechanotransduction.
