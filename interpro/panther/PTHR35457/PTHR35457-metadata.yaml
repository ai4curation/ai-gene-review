  name:
    name: COX15/CtaA Heme A Synthase
    short: COX15/CtaA_HemeA_synthase
  description:
  - text: The COX15/CtaA family is responsible for the biosynthesis of heme A, a critical
      component of cytochrome c oxidase, the terminal enzyme of the mitochondrial
      respiratory chain. Members of this family catalyze the conversion of heme O
      into heme A through two successive hydroxylations at the methyl group at carbon
      8 of the heme molecule. The initial hydroxylation produces heme I, followed
      by a second hydroxylation that generates an unstable dihydroxymethyl group.
      This group spontaneously dehydrates to form the characteristic formyl group
      of heme A. The enzymatic activity of the COX15/CtaA family is essential for
      the proper functioning of aerobic energy metabolism.
