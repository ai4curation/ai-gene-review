  name:
    name: Alpha-type Protein Kinase
    short: Alpha-type_PK
  description:
  - text: This family of proteins includes threonine kinases that play a role in regulating
      protein synthesis and myosin II filament assembly. Members are involved in phosphorylating
      specific threonine residues, which is crucial for controlling the rate of peptide
      chain elongation during protein synthesis or for the assembly and disassembly
      of myosin II filaments in various cellular processes. Some family members are
      capable of autophosphorylation, which is necessary for their enzymatic activity.
      The phosphorylation of target proteins by these kinases can render them inactive
      or alter their function, affecting processes such as cytokinesis, cell motility,
      and the localization of myosin during cellular events. The activity of some
      kinases in this family is regulated by calcium/calmodulin-dependent autophosphorylation,
      which can modulate their dependence on calcium/calmodulin.
