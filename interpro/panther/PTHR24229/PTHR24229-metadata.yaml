  name:
    name: G-protein coupled receptor 1
    short: GPCR1
  description:
  - text: The G-protein coupled receptor 1 family is characterized by its ability
      to mediate diverse biological functions through the interaction with endogenous
      ligands, such as neuropeptides, hormones, and opioids. Upon ligand binding,
      these receptors undergo a conformational change that activates heterotrimeric
      G-proteins, leading to the modulation of downstream effectors. This signaling
      can result in the inhibition of adenylate cyclase activity, regulation of ion
      channel conductance, and activation of MAP kinases, among other effects. Members
      of the family are involved in various physiological processes including pain
      perception, neuroendocrine regulation, food intake, cell growth, and neurogenesis.
      Some receptors in this family are also implicated in the response to synthetic
      opioids and may influence physical activity, salivation, and autonomic functions.
