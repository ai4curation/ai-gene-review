  name:
    name: Proline metabolism enzyme
    short: Proline_metab_enzyme
  description:
  - text: This family of proteins includes enzymes that are involved in the metabolism
      of the amino acid proline. Members of this family are responsible for the oxidation
      of proline to glutamate, which is a key step in the interconversion between
      proline and glutamate and is important for cellular processes such as energy
      production and redox balance. Some members are bifunctional and also have a
      role in the transcriptional regulation of genes involved in proline metabolism.
      These enzymes are typically found in the mitochondria and are part of the aldehyde
      dehydrogenase superfamily, which is characterized by the oxidation of aldehydes
      to their corresponding carboxylic acids.
