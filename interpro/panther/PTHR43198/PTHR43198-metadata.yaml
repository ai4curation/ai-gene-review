  name:
    name: Thiamine Salvage Pathway TenA
    short: Thiamine_Salvage_TenA
  description:
  - text: The TenA family is involved in the thiamine salvage pathway, which regenerates
      thiamine pyrimidine from degraded thiamine products. Members of the family catalyze
      the hydrolysis of amino-pyrimidine at the C5' of the pyrimidine moiety of thiamine
      compounds, converting 4-amino-5-aminomethyl-2-methylpyrimidine to 4-amino-5-hydroxymethyl-2-methylpyrimidine
      (HMP). Some members also exhibit thiaminase activity, although this is not considered
      physiologically relevant. Additionally, certain bifunctional proteins within
      the family possess a HAD-like hydrolase domain, conferring phosphatase activity
      on thiamine monophosphate and other substrates. The family also includes proteins
      with formylamino-HMP amidohydrolase activity, which do not display thiaminase
      II activity. These enzymes are crucial for the utilization of thiamine breakdown
      products, preventing the accumulation of potentially harmful compounds.
