  name:
    name: Cytosolic carboxypeptidase
    short: Cytosolic_carboxypeptidase
  description:
  - text: This family of proteins includes metallocarboxypeptidases that are involved
      in the post-translational modification process known as deglutamylation. They
      are responsible for the removal of polyglutamate side chains from the gamma-carboxyl
      group of glutamate residues within the C-terminal tails of target proteins,
      including tubulin and non-tubulin proteins. This activity regulates the structural
      integrity and function of microtubules, as well as the localization and velocity
      of kinesin motors. Additionally, these proteins are implicated in the modulation
      of cellular processes such as antiviral defense response activation and cell
      pluripotency maintenance.
