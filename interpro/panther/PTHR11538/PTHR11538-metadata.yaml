  name:
    name: Phenylalanyl-tRNA synthetase/O-phosphoseryl-tRNA(Cys) synthetase
    short: Phe-tRNA/O-phoseryl-tRNA_synth
  description:
  - text: The protein family includes enzymes responsible for the aminoacylation of
      tRNA with phenylalanine, a critical step in the translation of mRNA into proteins.
      These enzymes, known as phenylalanyl-tRNA synthetases, consist of alpha subunits
      that catalyze the attachment of phenylalanine to its corresponding tRNA molecule.
      This reaction ensures that the genetic code is accurately interpreted and proteins
      are synthesized with the correct sequence of amino acids. The family also includes
      O-phosphoseryl-tRNA(Cys) synthetase subfamily members, which catalyze the attachment
      of O-phosphoserine to tRNA(Cys), and a few uncharacterized proteins that may
      have related functions.
