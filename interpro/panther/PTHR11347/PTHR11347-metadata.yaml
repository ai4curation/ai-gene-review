  name:
    name: Cyclic nucleotide phosphodiesterase
    short: Cyclic_nucleotide_PDE
  description:
  - text: The cyclic nucleotide phosphodiesterase family is involved in the regulation
      of intracellular concentrations of cyclic nucleotides, such as cAMP and cGMP,
      which are key second messengers in various physiological processes. Members
      of this family hydrolyze cyclic nucleotides to their corresponding monophosphates,
      thus modulating signaling pathways related to vision, signal transduction, cell
      growth, migration, cognitive function, and cardiac function. Specific subfamilies
      within this group show preferences for cAMP or cGMP and are subject to different
      regulatory mechanisms, including calcium/calmodulin activation, GAF domain-mediated
      allosteric regulation, and inhibition by various compounds. The family plays
      critical roles in processes such as visual signal transmission, smooth muscle
      cell proliferation, neural activity, and learning and memory.
