  name:
    name: NADH:quinone oxidoreductase/NAD(P)H-quinone oxidoreductase
    short: NADH-Q_oxidoreductase
  description:
  - text: This family of proteins includes enzymes that participate in the electron
      transport chain by catalyzing the oxidation of NADH and the reduction of quinones.
      These activities are crucial for the regeneration of NAD+, which is essential
      for various metabolic processes. Some members of this family are involved in
      alternative nonproton pumping pathways, which contribute to the respiratory
      chain without the translocation of protons across the membrane. Additionally,
      certain proteins within this family have a bifunctional oxidoreductase activity,
      playing a role in the biosynthesis of vitamin K1 and in the redox metabolism
      of plastoquinone-9. They are also involved in the tocopherol recycling pathway.
      The family includes proteins that can be inhibited by specific compounds such
      as dicumarol and quinone derivatives, indicating a regulatory aspect to their
      function.
