  name:
    name: Chloroplastic and Bacterial Serine Proteases
    short: Chloro_Bact_Ser_Proteases
  description:
  - text: The peptidase S1C family consists of serine proteases that play a role in
      the degradation of abnormal exported proteins, propeptide processing, and maturation
      of native proteins. They are involved in stress resistance, including responses
      to heat shock, ethanol, puromycin, and NaCl, during active exponential growth.
      Some family members act as regulatory proteases that are conditionally activated
      by environmental triggers, while others have a chaperone function, assisting
      in the refolding of misfolded proteins. The family includes proteases with PDZ
      domains that regulate activity and substrate specificity, such as by binding
      to peptides ending with C-terminal Tyr-X-Phe sequences. These proteases are
      implicated in various cellular processes, including the stress response network,
      virulence, and regulated intramembrane proteolysis cascades.
