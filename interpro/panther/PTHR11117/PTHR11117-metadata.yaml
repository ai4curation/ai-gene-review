  name:
    name: Succinate/malate CoA ligase alpha subunit
    short: Succ/Malate_CoA_lig_alpha
  description:
  - text: The succinate/malate CoA ligase alpha subunit family is involved in the
      citric acid cycle (TCA), specifically in the step coupling the hydrolysis of
      succinyl-CoA to the synthesis of ATP or GTP, which is the only substrate-level
      phosphorylation in the TCA. The alpha subunit binds coenzyme A and phosphate,
      while the beta subunit provides succinate binding and nucleotide specificity.
      Some members can use either ATP or GTP, with varying preferences. Additionally,
      one member is part of a variant sulfo-TK pathway, hydrolyzing sulfoacetyl-CoA
      to produce sulfoacetate and CoA, generating ATP. This family plays a crucial
      role in energy production and metabolic processes.
