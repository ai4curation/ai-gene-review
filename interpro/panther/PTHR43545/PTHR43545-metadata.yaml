  name:
    name: Formate Dehydrogenase Electron Transfer Unit
    short: FDH_Electron_Transfer_Unit
  description:
  - text: The protein family consists of electron transfer units involved in various
      respiratory processes. Members of the family participate in the reversible two-electron
      oxidation of formate to carbon dioxide, functioning as integral components of
      formate dehydrogenase complexes. These complexes facilitate the use of formate
      as a major electron donor during both anaerobic and aerobic respiration. In
      anaerobic respiration, formate dehydrogenase works in conjunction with nitrate
      reductases, using nitrate as an electron acceptor. During aerobic respiration,
      the family members transfer electrons from formate to a molybdenum cofactor.
      The proteins contain iron-sulfur clusters that are essential for their electron
      transfer activity. Additionally, some members are involved in the electron flow
      from periplasmic hydrogenase to cytoplasmic enzymes that reduce sulfates. Overall,
      the family plays a critical role in energy conservation and metabolic versatility,
      allowing organisms to adapt to varying oxygen levels.
