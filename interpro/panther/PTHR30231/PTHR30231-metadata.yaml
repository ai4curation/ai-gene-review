  name:
    name: Ribonuclease T
    short: RNase_T
  description:
  - text: The RNase T family proteins are involved in RNA processing and tRNA biosynthesis.
      They trim short 3' overhangs of various RNA species, typically leaving a one
      or two nucleotide 3' overhang. These enzymes play a crucial role in the end-turnover
      of tRNA by specifically removing the terminal AMP residue from uncharged tRNA
      (tRNA-C-C-A). Additionally, they contribute to the regulation of small RNAs
      (sRNA), aiding in their degradation. This activity is essential for maintaining
      RNA quality and proper cellular function. Some family members have expanded
      roles, such as being part of a CBASS antivirus system, where they act as effectors
      that degrade DNA to provide immunity against bacteriophage infections.
