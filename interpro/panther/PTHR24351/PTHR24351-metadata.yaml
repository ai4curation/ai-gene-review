  name:
    name: Serine/threonine-protein kinase
    short: Ser_Thr_protein_kinase
  description:
  - text: The protein family includes serine/threonine-protein kinases involved in
      a wide range of cellular processes such as metabolism, proliferation, cell survival,
      growth, and angiogenesis. These kinases mediate their effects by phosphorylating
      downstream substrates, including various ion channels, membrane transporters,
      cellular enzymes, and transcription factors. They play key roles in signaling
      pathways activated by growth factors, nutrients, and stress, contributing to
      cell cycle progression, protein synthesis, and apoptosis regulation. The family
      members are also implicated in cellular stress responses, regulation of renal
      sodium retention, neuronal excitability, and memory consolidation. Some kinases
      within the family are involved in the regulation of cytoskeletal proteins, cell
      adhesion, motility, migration, and immune responses. They are activated by multiple
      phosphorylation events and can be regulated by calcium, diacylglycerol, and
      phosphatidylserine, with some isoforms being constitutively active.
