  name:
    name: Flavohemoprotein Nitric Oxide Detoxification
    short: Flavohemoprotein_NO-Detox
  description:
  - text: 'The Flavohemoprotein family is involved in the detoxification of nitric
      oxide (NO) through an aerobic process known as the nitric oxide dioxygenase
      (NOD) reaction. This reaction utilizes oxygen (O2) and NAD(P)H to convert NO
      into nitrate, thereby protecting organisms from harmful nitrogen compounds.
      Members of this family play a pivotal role in the inducible response to nitrosative
      stress. The proteins consist of two distinct domains: an N-terminal heme-containing
      oxygen-binding domain and a C-terminal reductase domain with binding sites for
      FAD and NAD(P)H. Some members may also have additional activities, such as NADH
      oxidase, nitric oxide reductase, and FAD reductase activities, particularly
      under anaerobic conditions, although these are typically less pronounced than
      their NOD activity.'
