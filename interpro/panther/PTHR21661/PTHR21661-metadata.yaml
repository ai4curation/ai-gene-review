  name:
    name: Epoxide hydrolase enzymes
    short: Epoxide_hydrolase
  description:
  - text: This family of proteins includes enzymes that catalyze the hydrolysis of
      epoxides to dihydrodiols, a reaction that increases the solubility and decreases
      the reactivity of the substrates. These enzymes play a role in the detoxification
      of xenobiotic and endogenous compounds, including the metabolism of lipid epoxides.
      Some members are involved in the degradation of juvenile hormones, which are
      critical for insect development and reproduction. Others are implicated in the
      biosynthesis of mycotoxins, such as dothistromin, and host-selective toxins
      in plant pathogens. The family is characterized by a conserved peptidase S33
      domain, suggesting a shared catalytic mechanism across diverse biological contexts.
