  description:
  - text: The N-acetylmuramoyl-L-alanine amidase 3 family consists of cell-wall hydrolases
      involved in critical bacterial cellular processes. Members of this family play
      a role in septum cleavage during cell division, which is essential for bacterial
      proliferation and survival. Some proteins within the family also exhibit autolysin
      activity, contributing to cell-wall turnover and potentially participating in
      processes such as genetic transformation, flagella formation, and sporulation.
      The amidases hydrolyze the amide bond between N-acetylmuramic acid and L-alanine
      in peptidoglycan, a key component of the bacterial cell wall. This activity
      is crucial for cell-wall remodeling, maintenance, and during specific stages
      like germination and sporulation. The family includes proteins with broad-spectrum
      activity against various bacterial species, indicating a role in peptidoglycan
      fragment recycling. Regulatory mechanisms, such as autoregulation of the active
      site, are also observed in some family members.
