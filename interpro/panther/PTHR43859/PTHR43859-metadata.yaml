  name:
    name: ATP-dependent AMP-binding enzyme
    short: ATP-dep_AMP-bind_enzyme
  description:
  - text: The ATP-dependent AMP-binding enzyme family is involved in the activation
      of carboxylic acids by forming acyl-CoAs, which are essential intermediates
      in various metabolic pathways. Members of the family catalyze the ligation of
      CoA to a range of substrates including short-chain fatty acids, branched-chain
      fatty acids, and aromatic acids. These reactions are crucial for the biosynthesis
      of natural products, such as those contributing to the bitter taste of beer,
      and for the metabolism of fatty acids during lipid mobilization. The enzymes
      exhibit substrate specificity, which is conferred by their substrate-binding
      domains. They play roles in diverse biological processes including the glyoxylate
      cycle, defense mechanisms in plants, and the biosynthesis of volatile compounds
      in flowers.
