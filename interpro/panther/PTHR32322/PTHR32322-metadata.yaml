  name:
    name: Amino Acid and Vitamin Transporters
    short: AA-Vitamin_Transporters
  description:
  - text: This family of proteins includes transporters that are primarily involved
      in the cellular uptake and efflux of various substrates, including amino acids,
      their metabolites, and vitamins such as riboflavin. Some members are known to
      transport S-adenosylmethionine (SAM) and S-adenosylhomocysteine (SAH), playing
      a role in the acquisition of SAM from host cells and the removal of the toxic
      by-product SAH. Others are implicated in the efflux of specific amino acids
      like threonine, homoserine, and cysteine, as well as in the response to cystine.
      The family also contains proteins that may function as export pumps for amino
      acid metabolites. These transporters are part of larger superfamily groups,
      including the EamA transporter family and the drug/metabolite transporter (DMT)
      superfamily.
