  name:
    name: Cytochrome b561 superoxide oxidase
    short: Cytochrome_b561_oxidase
  description:
  - text: This family of proteins includes B-type di-heme cytochromes that are involved
      in the redox reactions of cellular respiration. They catalyze the oxidation
      of superoxide to molecular oxygen, playing a role in the detoxification of reactive
      oxygen species. Additionally, they transfer electrons to quinones such as ubiquinone
      and menaquinone, which are part of the electron transport chain. Some members
      of this family are also capable of reducing ubiquinol to superoxide under physiological
      conditions, indicating a dual role in both the formation and detoxification
      of superoxide.
