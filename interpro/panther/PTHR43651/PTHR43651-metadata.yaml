  name:
    name: Glycosyl hydrolase family 13, GlgB subfamily
    short: Glycosyl_hydrlase_13_GlgB
  description:
  - text: The glycosyl hydrolase 13 family GlgB subfamily members are enzymes that
      catalyze the formation of alpha-1,6-glucosidic linkages in glycogen and starch.
      This process involves the scission of a 1,4-alpha-linked oligosaccharide from
      a growing alpha-1,4-glucan chain and the subsequent attachment of the oligosaccharide
      to an alpha-1,6 position. This branching enzyme activity is essential for the
      biosynthesis of glycogen in bacteria, fungi, plants, and animals, contributing
      to the solubility and structure of the glycogen molecule. In some species, the
      enzyme is also involved in the biosynthesis of other glucans, such as capsular
      alpha-D-glucan and trehalose. The alpha-1,6 branches introduced by the GlgB
      subfamily enzymes play a crucial role in enhancing the solubility and increasing
      the catalytic efficiency due to the substrate binding close to the active site
      and regions near the N-terminus.
