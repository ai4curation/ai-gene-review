    name: Thiamine Pyrophosphokinase
    short: Thiamine_PPKinase
  description:
  - text: The Thiamine Pyrophosphokinase family is responsible for the biosynthesis
      of thiamine pyrophosphate (TPP), an essential cofactor for enzymes involved
      in metabolic processes such as glycolysis and energy production. Members of
      this family catalyze the phosphorylation of thiamine to TPP. In plants, TPP
      is particularly important for photosynthesis and carbohydrate metabolism in
      leaves. Some family members can also phosphorylate pyrithiamine, producing pyrithiamine
      pyrophosphate.
