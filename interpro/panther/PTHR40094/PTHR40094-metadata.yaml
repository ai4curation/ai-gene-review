  name:
    name: Bacterial alpha-2-macroglobulin
    short: Bacterial_a2-macroglobulin
  description:
  - text: This family of proteins includes bacterial alpha-2-macroglobulins, which
      serve a protective role for the cell. They act as protease inhibitors, safeguarding
      the bacterial cell from host-derived peptidases. These proteins employ a 'trapping'
      mechanism, where cleavage of a specific bait-region domain by host peptidases
      triggers a conformational change. This change results in the entrapment of the
      peptidase and activation of a thioester bond, which covalently binds to the
      peptidase. Although trapped, the peptidases remain active but are inhibited
      from attacking large substrates. This defense mechanism may protect the periplasm
      and associated lipoproteins from external endopeptidases. The structural rearrangement
      upon cleavage is significant, altering over half of the protein's domain structure
      from its native to an induced form.
