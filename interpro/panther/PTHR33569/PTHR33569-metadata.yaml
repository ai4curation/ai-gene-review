  name:
    name: Urease subunit
    short: Urease_subunit
  description:
  - text: The urease subunit family is involved in the hydrolysis of urea into ammonia
      and carbon dioxide, a reaction that plays a crucial role in nitrogen metabolism.
      Ureases are nickel-dependent enzymes found in bacteria, fungi, and plants, and
      are important for survival in acidic environments, such as the stomach, by increasing
      local pH. In some pathogens, urease activity contributes to virulence by helping
      the organism colonize host tissues. The family includes alpha, beta, and gamma
      subunits, which assemble into a functional multimeric enzyme. Some members of
      this family may also be involved in defense mechanisms against phytopathogenic
      fungi and have entomotoxic activity.
