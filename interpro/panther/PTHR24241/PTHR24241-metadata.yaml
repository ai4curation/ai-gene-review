  name:
    name: G-protein coupled receptor 1
    short: GPCR1
  description:
  - text: The G-protein coupled receptor 1 family is characterized by its ability
      to bind various ligands, including hormones and neuropeptides, and mediate diverse
      physiological responses. Members of this family are involved in the regulation
      of key processes such as hormone secretion, social behaviors, water and salt
      transport, and energy metabolism. They typically activate second messenger systems
      involving phosphatidylinositol-calcium or adenylate cyclase pathways, leading
      to cellular responses like intracellular calcium mobilization and modulation
      of cAMP production. Some receptors within this family are also implicated in
      adipogenesis, inflammation, and the regulation of appetite through the detection
      of long-chain fatty acids. Additionally, certain members are associated with
      the regulation of gonadotropic hormone secretion, influencing reproductive functions.
