  name:
    name: Aspartokinase enzyme
    short: Aspartokinase
  description:
  - text: The aspartokinase family includes enzymes that catalyze the phosphorylation
      of the beta-carboxyl group of aspartic acid with ATP to yield 4-phospho-L-aspartate.
      This reaction is the first step in the branched biosynthetic pathway for the
      production of essential amino acids such as lysine, threonine, isoleucine, and
      methionine. Members of the aspartokinase family are involved in various biosynthetic
      processes, including the synthesis of L-aspartate-beta-semialdehyde, a central
      intermediate in amino acid biosynthesis, and the production of fusaric acid,
      a mycotoxin with phytotoxic properties. The activity of aspartokinases is subject
      to regulation by feedback inhibition, with different members being sensitive
      to various amino acids such as lysine, threonine, and methionine. Some aspartokinases
      are also involved in the biosynthesis of loline alkaloids, which are insecticidal
      agents.
