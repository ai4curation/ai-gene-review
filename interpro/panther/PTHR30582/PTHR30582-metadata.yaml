  name:
    name: Bacterial L,D-transpeptidase
    short: LD-transpeptidase
  description:
  - text: The L,D-transpeptidase family is involved in cell wall biology, specifically
      in the formation of peptidoglycan cross-links which are crucial for bacterial
      cell wall integrity. Members of the family catalyze the formation of 3->3 cross-links
      between peptidoglycan layers by cleaving the mDap(3)-D-Ala(4) bond of a tetrapeptide
      donor stem and forming a bond with the mDap(3) side chain of an acceptor stem.
      This activity is specific to tetrapeptide stems as they cannot utilize pentapeptide
      stems. Some family members are also involved in anchoring major outer membrane
      lipoproteins to the peptidoglycan. The family includes proteins that are inactivated
      by beta-lactam antibiotics such as carbapenems, which acylate the catalytic
      Cys residue, although some members show resistance to this inactivation. The
      family proteins may contain domains such as LysM, which are thought to be involved
      in peptidoglycan binding, and immunoglobulin-like domains that may play a role
      in enzyme structure and function.
