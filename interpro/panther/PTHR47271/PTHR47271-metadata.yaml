    name: Arginine deiminase
    short: Arg_deiminase
  description:
  - text: The arginine deiminase family includes enzymes that catalyze the hydrolysis
      of arginine to citrulline and ammonia, a reaction that is part of the arginine
      deiminase pathway in fermentative arginine utilization. Members of this family
      are involved in various cellular processes, including providing an alternative
      energy source under anaerobic conditions and contributing to the acid tolerance
      response of some bacteria. Certain arginine deiminases also exhibit antitumor
      properties by inhibiting cell proliferation through cell cycle arrest and apoptosis
      induction. Additionally, some family members are implicated in biodegradation
      and drug resistance, such as the hydrolytic denitration of 2-nitroimidazole,
      conferring resistance to natural antibiotics and synthetic nitroimidazoles used
      in treating infections and cancer.
