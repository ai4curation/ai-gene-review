  name:
    name: Nicotinate and N-heterocyclic Hydroxylase
    short: N-heterocyclic_Hydroxylase
  description:
  - text: This family of proteins includes enzymes involved in the hydroxylation of
      nicotinate and other N-heterocyclic substrates. Members of this family function
      in the degradation pathways of nicotinate and isoquinoline, catalyzing the conversion
      of nicotinate to 6-hydroxynicotinate, as well as hydroxylating various N-containing
      heterocyclic compounds. Some family members are part of multi-component enzyme
      systems and may interact with the electron transfer chain, potentially delivering
      electrons to a cytochrome oxidase. The family includes proteins that are related
      to the xanthine dehydrogenase family and exhibit activity regulation by selenide
      and sulfide.
