  name:
    name: Bacterial tyrosine recombinase XerC/XerD complex
    short: Tyrosine_recombinase_XerCD
  description:
  - text: This family of proteins includes tyrosine recombinases, which are enzymes
      that catalyze the cutting and rejoining of DNA molecules in a site-specific
      manner. They play a crucial role in various DNA transactions, including chromosome
      segregation, by resolving dimers of the bacterial chromosome into monomers.
      This process is essential for proper cell division. Additionally, these proteins
      contribute to the segregational stability of plasmids, which are extrachromosomal
      DNA molecules. Some members of this family are involved in the integration and
      excision of bacteriophage DNA into and out of the host genome, as well as the
      regulation of gene expression through inversion of DNA segments.
