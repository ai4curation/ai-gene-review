  name:
    name: Proton-dependent sulfate transporter CysZ
    short: CysZ_sulfate_transptr
  description:
  - text: The CysZ family comprises high affinity, high specificity proton-dependent
      sulfate transporters. Members of this family are responsible for mediating sulfate
      uptake into the cell, which is a critical step in providing the sulfur source
      necessary for the cysteine synthesis pathway. Sulfate transport by these proteins
      is essential for the biosynthesis of sulfur-containing amino acids and plays
      a vital role in cellular sulfur homeostasis. Some members of the family are
      known to be inhibited by sulfite, indicating a regulatory mechanism for sulfate
      transport activity. The CysZ family proteins do not transport thiosulfate, highlighting
      their specificity for sulfate ions.
