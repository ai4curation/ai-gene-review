  name:
    name: Phage Integrase
    short: Phage_Integrase
  description:
  - text: The 'phage' integrase family comprises enzymes that are essential for the
      integration and excision of bacteriophage DNA into and from a host genome, respectively.
      These integrases catalyze site-specific recombination events, often requiring
      accessory proteins such as excisionase or integration host factors to form functional
      complexes known as intasomes. These complexes facilitate the precise insertion
      or removal of phage DNA at specific attachment sites within the host's genome.
      Some family members are also implicated in the mobility of conjugative elements,
      contributing to horizontal gene transfer among bacteria. The integrases share
      a common mechanism involving the catalytic activity of tyrosine recombinases,
      which cut and rejoin DNA strands during the recombination process.
