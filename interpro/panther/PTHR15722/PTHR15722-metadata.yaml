  name:
    name: Intraflagellar Transport Complex Component
    short: IFT_Complex_Component
  description:
  - text: This family of proteins is involved in the process of ciliogenesis, which
      is the formation and maintenance of cilia. Members of this family play a role
      in intraflagellar transport (IFT), a bidirectional system that is essential
      for the assembly and functioning of cilia and flagella. They are components
      of the IFT complex A or B, which are required for the anterograde or retrograde
      movement of proteins along the ciliary axoneme. These proteins are also implicated
      in the hedgehog signaling pathway, which is dependent on cilia for signal transduction.
      Some family members are specifically involved in the development and maintenance
      of photoreceptor cells in the eye, contributing to the delivery of opsins to
      the outer segments of these cells.
