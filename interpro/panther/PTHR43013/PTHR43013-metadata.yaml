  name:
    name: Glutamyl-tRNA reductase
    short: Glutamyl-tRNA_reductase
  description:
  - text: The glutamyl-tRNA reductase family is responsible for the NADPH-dependent
      reduction of glutamyl-tRNA(Glu) to glutamate 1-semialdehyde (GSA), a key step
      in the biosynthesis of tetrapyrroles. Members of this family are characterized
      by a unique extended V-shaped dimeric structure, with each monomer comprising
      three distinct domains arranged along a curved spinal alpha-helix. The N-terminal
      catalytic domain specifically recognizes the glutamate moiety of the substrate,
      the second domain binds NADPH, and the third domain is involved in dimerization.
      This family plays a crucial role in the biosynthetic pathway of various biochemically
      significant compounds, including chlorophyll, heme, and vitamin B12, which are
      essential for a wide range of biological functions such as oxygen transport,
      electron transfer, and light harvesting in photosynthesis.
