  name:
    name: Sugar Epimerase/Isomerase
    short: Sugar_Epim/Isomerase
  description:
  - text: The protein family includes enzymes that catalyze the isomerization of various
      sugars, primarily involving the epimerization at the C3 position of ketopentoses
      and ketohexoses. Members of the family are involved in metabolic pathways such
      as the anaerobic utilization of L-ascorbate, myo-inositol degradation, and the
      biosynthesis of D-psicose. They exhibit broad substrate specificity, with some
      members showing activity towards L-ribulose, D-ribulose, D-allulose, D-fructose,
      L-xylulose, D-xylulose, D-tagatose, L-sorbose, D-sorbose, and hydroxypyruvate.
      The family also includes enzymes that catalyze the isomerization of 2-oxo-tetronate
      to 3-oxo-tetronate. Activity of these enzymes can be regulated by metal ions
      and EDTA. The family is characterized by a conserved structure, with some members
      having unique C-terminal alpha-helices that may influence oligomerization and
      stability.
