  name:
    name: Alpha-aminoadipic semialdehyde synthase
    short: AASS
  description:
  - text: 'The Alpha-aminoadipic semialdehyde synthase family comprises bifunctional
      enzymes involved in lysine degradation. Members of the family catalyze the first
      two steps of this process, which involve the conversion of lysine to alpha-aminoadipic
      semialdehyde via the lysine ketoglutarate reductase activity and subsequently
      to saccharopine through saccharopine dehydrogenase activity. Additionally, some
      family members are involved in the alpha-aminoadipate pathway for lysine biosynthesis,
      where they catalyze the cleavage of saccharopine to L-lysine and 2-oxoglutarate.
      This dual functionality is reflected in the presence of two distinct domains
      within these proteins: the N-terminal domain, which belongs to the AlaDH/PNT
      family and contains lysine ketoglutarate reductase activity, and the C-terminal
      domain, which belongs to the saccharopine dehydrogenase family and exhibits
      saccharopine dehydrogenase activity. The enzymes are found in a variety of organisms,
      including mammals, fungi, and plants, indicating a conserved role in amino acid
      metabolism.'
