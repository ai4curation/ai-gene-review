  name:
    name: Ribosomal protein bS6--L-glutamate ligase
    short: RimK
  description:
  - text: The RimK family proteins are characterized by their enzymatic activity as
      L-glutamate ligases. They catalyze the ATP-dependent post-translational addition
      of glutamate residues to the C-terminus of ribosomal protein bS6 (RpsF). Some
      family members are also capable of synthesizing poly-alpha-glutamate in vitro
      through ATP hydrolysis using unprotected glutamate as a substrate. The extent
      of glutamate addition can vary with pH. Additionally, certain subfamilies within
      the RimK family, such as the MptN subfamily, are involved in the modification
      of tetrahydromethanopterin by adding a glutamate residue. Other subfamilies,
      like the LysX subfamily, catalyze the formation of a covalent bond between the
      amino group of alpha-aminoadipate and the gamma-carboxyl group of the C-terminal
      glutamate residue in LysW. The RimK family also includes enzymes that synthesize
      beta-citryl-L-glutamate and N-acetyl-L-aspartyl-L-glutamate, with some showing
      a preference for the former.
