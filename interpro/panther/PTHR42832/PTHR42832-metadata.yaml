  name:
    name: LL-diaminopimelate aminotransferase
    short: LL-DAP_aminotransferase
  description:
  - text: The LL-diaminopimelate aminotransferase family is involved in the biosynthesis
      of meso-diaminopimelate (m-DAP or DL-DAP), which is essential for both lysine
      and peptidoglycan production. Members of this family catalyze the conversion
      of tetrahydrodipicolinate to LL-diaminopimelate, a key step in the synthesis
      pathway. Some members can also catalyze the reverse reaction or use alternative
      substrates. This family is characterized by its dependence on pyridoxal-phosphate
      as a cofactor, typical of class-I aminotransferases. The enzymes in this family
      are crucial for bacterial cell wall integrity and represent potential targets
      for antibiotic development.
