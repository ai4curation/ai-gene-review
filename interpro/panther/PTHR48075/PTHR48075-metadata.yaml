  name:
    name: 3-Hydroxyacyl-CoA Dehydrogenase
    short: 3-Hydroxyacyl-CoA_DH
  description:
  - text: The 3-hydroxyacyl-CoA dehydrogenase family encompasses enzymes involved
      in various metabolic pathways, including the oxidation of L-carnitine, fatty
      acid degradation, and the detoxification of plant-produced benzoxazolinones.
      Members of this family catalyze the NAD+-dependent oxidation of substrates such
      as L-carnitine, 3-hydroxybutyryl-CoA, and 3-hydroxyadipyl-CoA, playing roles
      in energy production and cellular detoxification. Some members are involved
      in specialized pathways, such as the degradation of vitamin B6 or the biosynthesis
      of T-toxin in certain fungi. The family includes enzymes with specific activities,
      such as L-carnitine dehydrogenase, which is involved in L-carnitine degradation
      pathways in various bacteria, allowing them to utilize L-carnitine as a sole
      carbon and nitrogen source. The family also contains multifunctional enzymes,
      such as the trifunctional enzyme with both dehydrogenase and hydratase/isomerase
      activities, and enzymes like lambda-crystallin with additional non-enzymatic
      functions.
