  description:
  - text: This family of proteins includes GPI-anchored membrane proteins that are
      implicated in cell adhesion processes. Members of this family are involved in
      the formation of biofilms and may play roles in virulence by mediating cell-cell
      and cell-substrate interactions. The presence of serine/threonine-rich regions
      suggests potential post-translational modification sites that could be important
      for their function.
