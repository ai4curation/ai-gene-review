  name:
    name: Aldehyde Dehydrogenase Superfamily
    short: Aldehyde_DH_Superfamily
  description:
  - text: The aldehyde dehydrogenase family is involved in various metabolic pathways
      by catalyzing the oxidation of aldehydes to their corresponding acids. Members
      of this family display broad substrate specificity, including but not limited
      to succinate semialdehyde, glyceraldehydes, and glutarate semialdehyde. They
      play roles in the degradation of neurotransmitters like gamma-aminobutyric acid
      (GABA), the utilization of carbon sources such as L-arabinose and sulfoquinovose,
      and the metabolism of compounds like lactaldehyde, 3,6-anhydro-L-galactose,
      and trigonelline. The enzymes generally prefer NAD(P)(+) as a cosubstrate and
      are involved in processes such as stress response in plants and the maintenance
      of cellular redox states. Activity regulation is often redox-dependent, with
      inhibition under oxidizing conditions being a common feature.
