  name:
    name: WD repeat-containing protein WDR55/POC1
    short: WDR55_POC1
  description:
  - text: The WDR55/POC1 family is characterized by the presence of WD repeat domains
      and is involved in various cellular processes. Members of the WDR55 subfamily
      are nucleolar proteins that modulate rRNA synthesis and play a central role
      in organogenesis. They are implicated in the development of the thymus and other
      organs. The POC1 subfamily members are centriolar proteins that play a crucial
      role in centriole assembly, stability, and ciliogenesis. They are involved in
      the early steps of centriole duplication and the later steps of centriole length
      control, ensuring centriole integrity and proper mitotic spindle formation.
      Additionally, they are required for primary cilia formation, ciliary length,
      cell proliferation, and retinal integrity. The family is essential for various
      developmental processes across a range of organisms.
