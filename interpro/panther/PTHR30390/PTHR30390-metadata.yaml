  name:
    name: SIS family GmhA and DiaA subfamilies
    short: SIS_GmhA/DiaA_subfam
  description:
  - text: The SIS family GmhA subfamily proteins are primarily involved in the isomerization
      of sedoheptulose 7-phosphate to D-glycero-D-manno-heptose 7-phosphate, a reaction
      that is part of the biosynthetic pathway for ADP-L-glycero-D-manno-heptose.
      This compound is a precursor for the heptose moiety of lipopolysaccharides in
      Gram-negative bacteria, which are essential components of the outer membrane.
      The activity of these enzymes is crucial for the proper functioning of bacterial
      cell walls and for the virulence of pathogenic bacteria. The DiaA subfamily
      members within the SIS family are involved in the initiation of chromosomal
      replication by interacting with the DnaA initiator protein, which is essential
      for the timely and accurate duplication of the bacterial genome. The UPF0309
      family proteins, however, are uncharacterized within this context and their
      function remains to be elucidated.
