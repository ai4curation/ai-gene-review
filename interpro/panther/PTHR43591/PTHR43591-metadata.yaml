  name:
    name: UbiE/COQ5 methyltransferase
    short: UbiE/COQ5_MeTrfase
  description:
  - text: The UbiE/COQ5 methyltransferase family is involved in the biosynthesis of
      ubiquinone (coenzyme Q) and menaquinone (vitamin K2), which are essential components
      of the electron transport chain in mitochondria and bacteria, respectively.
      These enzymes catalyze the methylation of specific quinol precursors, a critical
      step in the biosynthetic pathway. The family includes ubiquinone/menaquinone
      biosynthesis C-methyltransferases, which convert demethylmenaquinol to menaquinol
      and 2-polyprenyl-6-methoxy-1,4-benzoquinol to 2-polyprenyl-3-methyl-6-methoxy-1,4-benzoquinol,
      using S-adenosyl-L-methionine as the methyl donor. Some family members are also
      involved in the biosynthesis of phylloquinol (vitamin K1) in plants and cyanobacteria.
      The family plays a key role in cellular energy metabolism and is essential for
      aerobic respiration.
