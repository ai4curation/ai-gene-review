  description:
  - text: The Huntingtin-interacting protein K family comprises components of N-terminal
      acetyltransferase complexes, specifically inhibiting the N-terminal acetylation
      activity of the NatA complex. Members of the family exhibit chaperone-like activity
      that prevents polyglutamine aggregation in neuronal cells, potentially while
      associated with the NatA complex. Additionally, they may be involved in the
      NatA complex-mediated N-terminal acetylation of proteins such as PCNP. One member
      is known to contact the emerging nascent chain on the ribosome, indicating a
      role in early protein synthesis processes.
