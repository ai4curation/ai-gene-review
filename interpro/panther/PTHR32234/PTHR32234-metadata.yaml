  description:
  - text: This family of proteins is involved in the formation of disulfide bonds
      in periplasmic proteins and the assembly of periplasmic c-type cytochromes.
      They function by transferring electrons from cytoplasmic thioredoxin to the
      periplasm through a series of disulfide bond formation and reduction steps,
      maintaining the reduced state of other proteins involved in disulfide bond formation.
