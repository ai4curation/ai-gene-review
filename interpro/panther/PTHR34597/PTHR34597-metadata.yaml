  name:
    name: Two-partner secretion system outer membrane transporter
    short: TPS_OM_transporter
  description:
  - text: This family of proteins is involved in a two-partner secretion (TPS) system,
      which is a mechanism for the transport of large proteins across the outer membrane
      of Gram-negative bacteria. Members of this family function as the outer membrane
      component, forming a beta-barrel structure that facilitates the translocation
      of partner proteins such as toxins, hemolysins, and other effector molecules.
      These transported proteins often play roles in bacterial pathogenesis, host
      interaction, or interbacterial competition. Some family members are associated
      with contact-dependent growth inhibition (CDI) systems, where they contribute
      to the secretion and assembly of toxins that inhibit the growth of competing
      bacteria upon direct cell contact.
