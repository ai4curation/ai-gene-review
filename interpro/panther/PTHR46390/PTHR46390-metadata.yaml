  name:
    name: Mannose-6-phosphate isomerase type 2
    short: Mannose-6P_isomerase_type2
  description:
  - text: The mannose-6-phosphate isomerase type 2 family includes enzymes primarily
      involved in the biosynthesis of GDP-mannose, which serves as a precursor for
      mannose residues in cell surface polysaccharides. Members of this family are
      implicated in the production of components critical for bacterial virulence,
      such as capsular polysaccharides, lipopolysaccharide O antigens, and alginate
      layers. These components contribute to the formation of protective barriers
      against host immune defenses and antibiotics, and are also involved in the biosynthesis
      of exopolysaccharides like xanthan, which have applications in various industries.
      The broad substrate specificity of some family members highlights a potential
      for diverse functional roles in bacterial carbohydrate metabolism.
