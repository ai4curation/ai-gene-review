  name:
    name: Multi Antimicrobial Extrusion (MATE)
    short: MATE_MdtK
  description:
  - text: The MATE (Multi Antimicrobial Extrusion) family of proteins are multidrug
      efflux pumps that confer resistance to a variety of antimicrobial compounds.
      These proteins function by utilizing ion gradients, primarily sodium or proton
      motive force, to extrude toxic substances out of the cell, thereby providing
      a protective mechanism against a range of drugs. Members of the MATE family
      are characterized by their ability to transport a wide array of substrates,
      including fluoroquinolones, ethidium bromide, acriflavine, and other cationic
      compounds. The MdtK subfamily, a subset of the MATE family, is noted for its
      probable function as a Na(+)/drug antiporter. The efflux activity of MATE proteins
      is crucial for bacterial survival in environments containing antimicrobial agents,
      and they play a significant role in the intrinsic and acquired multidrug resistance
      observed in many pathogenic bacteria.
