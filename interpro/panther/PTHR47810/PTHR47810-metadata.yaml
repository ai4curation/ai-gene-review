  name:
    name: NAD-dependent DNA ligase B
    short: NAD_dep_DNA_ligaseB
  description:
  - text: The NAD-dependent DNA ligase B family comprises enzymes that play a crucial
      role in DNA replication, recombination, and repair. Members of this family are
      responsible for catalyzing the formation of phosphodiester linkages between
      5'-phosphoryl and 3'-hydroxyl groups in double-stranded DNA. They utilize NAD
      as a coenzyme and as the energy source for the reaction. The enzymes are characterized
      by their ability to join broken DNA strands, thereby maintaining the integrity
      and continuity of the genetic information during cell division and in response
      to DNA damage.
