  name:
    name: Sterol biosynthesis ERG4/ERG24
    short: Sterol_biosynth_ERG4/ERG24
  description:
  - text: The ERG4/ERG24 family consists of enzymes involved in sterol biosynthesis
      pathways across various organisms. Members of this family function primarily
      as sterol reductases, catalyzing the reduction of specific double bonds in sterol
      intermediates. These reductions are crucial steps in the synthesis of important
      sterols such as cholesterol in animals and ergosterol in fungi. In cholesterol
      biosynthesis, for example, they reduce the C14-unsaturated bond of lanosterol.
      In ergosterol biosynthesis, they reduce the C14=C15 double bond within ergosta-8,14,24(28)-trienol
      or the C24(28) double bond in ergosta-5,7,22,24(28)-tetraen-3beta-ol. Some family
      members also anchor the lamina and heterochromatin to the inner nuclear membrane.
      The family's role is essential for various biological processes, including cell
      division, expansion, and membrane lipid raft formation for cell signaling.
