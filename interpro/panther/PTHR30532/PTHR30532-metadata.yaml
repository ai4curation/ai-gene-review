  name:
    name: Bacterial iron-siderophore binding
    short: Bact_iron-sidero_bind
  description:
  - text: The bacterial solute-binding protein 8 family is involved in the uptake
      of iron through various siderophores, which are molecules that bind and transport
      iron into cells. Members of this family are typically part of ABC transporter
      complexes and function as periplasmic binding proteins. They bind iron complexes
      such as ferric citrate, ferric hydroxamate, and other iron-siderophore complexes,
      and then deliver these complexes to membrane-bound permeases for transport into
      the cytoplasm. The siderophores recognized by this family include bacillibactin,
      enterobactin, ferrichrome, aerobactin, petrobactin, and anguibactin, among others.
      The binding specificity and transport function are crucial for bacterial iron
      acquisition, especially in iron-limited environments, contributing to the survival
      and virulence of various bacterial species.
