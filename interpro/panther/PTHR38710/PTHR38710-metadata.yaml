  description:
  - text: This family of proteins includes enzymes with sugar-1-kinase activity, specifically
      recognizing D-glucuronic acid and ATP as substrates. Members of this family
      are involved in the biosynthesis of UDP-glucuronic acid (UDP-GlcA), which is
      a precursor for nucleotide sugars required in the assembly of cell-wall polymers.
      Additionally, these proteins may participate in the recycling of glucuronic
      acid through a salvage pathway.
