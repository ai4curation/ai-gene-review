  name:
    name: HAD-like hydrolase superfamily enzymes
    short: HAD-like_hydrolase_sf
  description:
  - text: The HAD-like hydrolase superfamily protein family encompasses a group of
      enzymes with diverse substrate specificities and functions. Members of this
      family are involved in various metabolic processes, including the dephosphorylation
      of sugars, nucleotides, and phospholipids. They play roles in vitamin B6 metabolism,
      actin cytoskeleton reorganization, glycerol and energy metabolism, and photorespiratory
      metabolism in plants. Some family members have broad substrate specificity,
      hydrolyzing compounds ranging from acid sugars to polyphosphates and nucleoside
      monophosphates. Others are more specialized, such as those involved in the biosynthesis
      of phosphatidylglycerol in chloroplasts or cardiolipin in mitochondria, or those
      regulating cellular levels of glycerol-3-phosphate. The family also includes
      enzymes that dephosphorylate serine residues in actin-depolymerizing factors,
      contributing to cell division and cytoskeletal dynamics.
