  name:
    name: Farnesyl/Geranylgeranyl Diphosphate Synthase
    short: FPP/GGPP_synthase
  description:
  - text: The FPP/GGPP synthase family comprises enzymes that catalyze the condensation
      of isopentenyl diphosphate (IPP) with various allylic diphosphates to produce
      prenyl diphosphates of different chain lengths. These prenyl diphosphates serve
      as essential precursors for the biosynthesis of numerous biomolecules, including
      terpenoids, carotenoids, and diterpenes. Members of this family, such as farnesyl
      diphosphate synthase, are involved in the synthesis of farnesyl diphosphate
      (FPP), while geranylgeranyl diphosphate synthases catalyze the formation of
      geranylgeranyl diphosphate (GGPP). Some enzymes within this family exhibit specificity
      for the production of longer chain prenyl diphosphates, such as geranylfarnesyl
      diphosphate (GFDP), which are key intermediates in the biosynthesis of various
      natural products with defensive roles against herbivorous insects.
