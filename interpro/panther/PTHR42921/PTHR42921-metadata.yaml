  name:
    name: ATP-dependent AMP-binding Enzymes
    short: AMP-binding_Enzymes
  description:
  - text: This family of proteins includes enzymes that are primarily involved in
      the activation of acetoacetate to acetoacetyl-CoA, a key step in ketone body
      utilization. These enzymes play a crucial role in the synthesis of cholesterol
      and fatty acids within the cytosol. Additionally, some members are implicated
      in the degradation of poly-3-hydroxybutyrate, contributing to the growth on
      PHB cycle intermediates. The family also encompasses enzymes involved in the
      biosynthesis of complex compounds like viridicatumtoxin, indicating a diverse
      set of functions related to metabolic processes. All members share a commonality
      in their ATP-dependent AMP-binding capabilities, which is a characteristic feature
      of this enzyme family.
