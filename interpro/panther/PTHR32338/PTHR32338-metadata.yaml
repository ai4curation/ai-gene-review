  name:
    name: N-acetyl-gamma-glutamyl-phosphate reductase
    short: NAGSA_dehydrogenase
  description:
  - text: The NAGSA dehydrogenase family is involved in the biosynthesis of amino
      acids, specifically arginine and lysine. Members of this family are enzymes
      that catalyze the NADPH-dependent reduction of N-acetyl-5-glutamyl phosphate
      to yield N-acetyl-L-glutamate 5-semialdehyde. This reaction is a key step in
      the metabolic pathway that leads to the production of essential amino acids.
      The enzymes are characterized by their requirement for NADPH as a cofactor and
      are found across various organisms, indicating a conserved role in nitrogen
      metabolism. Some members of the family are also involved in the modification
      of the amino acid carrier protein LysW, participating in the conversion of [LysW]-aminoadipate
      6-phosphate to [LysW]-aminoadipate 6-semialdehyde.
