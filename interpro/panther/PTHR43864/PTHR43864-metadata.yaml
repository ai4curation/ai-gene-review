  name:
    name: Purine/Pyrimidine Phosphoribosyltransferase
    short: Pur/Pyrimidine_PRTase
  description:
  - text: This family of proteins is involved in the purine salvage pathway, which
      recycles purines from nucleic acid breakdown back into nucleotide pools, reducing
      the need for de novo synthesis. Members of this family catalyze the transfer
      of a phosphoribosyl group to various purine bases, forming nucleoside monophosphates.
      Some proteins in this family may also act as repressors, regulating the transcription
      of genes involved in purine biosynthesis. The exact substrate specificity can
      vary among family members, with some preferring hypoxanthine or guanine, while
      others may act on xanthine.
