  name:
    name: Molybdenum cofactor guanylyltransferase
    short: MobA_guanylyltransferase
  description:
  - text: The MobA family proteins are involved in the biosynthesis of the molybdenum
      cofactor (Moco), which is essential for the activity of molybdoenzymes. These
      proteins catalyze the transfer of a GMP moiety from GTP to Mo-molybdopterin
      (Mo-MPT) to form Mo-molybdopterin guanine dinucleotide (Mo-MGD), the active
      cofactor. The N-terminal domain of MobA family proteins is responsible for nucleotide
      recognition and binding, while the C-terminal domain facilitates specific binding
      to the target protein. This guanylyltransferase activity is crucial for the
      activation of various molybdoenzymes that participate in key metabolic pathways,
      including nitrogen, sulfur, and carbon cycles.
