  name:
    name: TatD-type Metallo-dependent Hydrolase
    short: TatD-type_Hydrolase
  description:
  - text: This family of proteins includes enzymes with endonuclease and exonuclease
      activities, capable of incising double-stranded DNA and excising DNA from the
      3'-to 5'-end. Members of this family preferentially act on single-stranded DNA
      and RNA substrates. They are implicated in DNA damage repair, particularly in
      response to oxidative stress. Additionally, some family members are involved
      in the decatenation of kinetoplast DNA, which is essential for chromosomal segregation
      and cell cycle progression, especially in eye development. The proteins belong
      to the metallo-dependent hydrolases superfamily and share a common TatD-type
      hydrolase domain.
