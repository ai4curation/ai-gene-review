  name:
    name: NAD(P)-dependent epimerase/dehydratase
    short: NAD(P)_epimerase/dehydratase
  description:
  - text: The NAD(P)-dependent epimerase/dehydratase family is involved in the reversible
      epimerization of nucleotide sugars, which is a critical process in carbohydrate
      metabolism. Members of this family catalyze the interconversion between UDP-glucose
      and UDP-galactose, as well as between UDP-N-acetylglucosamine and UDP-N-acetylgalactosamine.
      These reactions are essential in various biological pathways, including the
      Leloir pathway of galactose catabolism, glycoprotein and glycolipid synthesis,
      and the metabolism of galactose for incorporation into cell wall polymers and
      surface molecules like lipopolysaccharides. Some members also exhibit mutarotase
      activity, converting alpha-aldose to the beta-anomer across multiple sugars.
      The family plays a role in the detoxification of D-galactose, channeling UDP-sugars
      into cell wall biosynthesis, and is involved in the regulation of carbohydrate
      catabolism and biosynthesis.
