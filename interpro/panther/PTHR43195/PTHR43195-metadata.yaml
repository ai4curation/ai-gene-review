  name:
    name: Transketolase-like
    short: Transketolase-like
  description:
  - text: This family of proteins is involved in the pentose phosphate pathway, a
      metabolic pathway parallel to glycolysis. They catalyze the transfer of two-carbon
      units by transferring a ketol group from a ketose donor to an aldose acceptor,
      forming a covalent intermediate with the cofactor thiamine pyrophosphate. This
      reaction is crucial for the synthesis of nucleotides and the generation of reducing
      power in the form of NADPH. Some members of this family are also implicated
      in cell proliferation and carcinogenesis, suggesting a role beyond their enzymatic
      activity in the metabolism of cancer cells. They are essential for maintaining
      the activity of the transketolase enzyme complex and have been linked to the
      regulation of neural progenitor cells during fetal neocortex development.
