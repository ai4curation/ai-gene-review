  name:
    name: Collagen-modifying Glycosyltransferase 25
    short: Collagen_mod_GT25
  description:
  - text: The glycosyltransferase 25 family is involved in the post-translational
      modification of collagen, a structural protein essential for the integrity of
      various tissues. Family members include enzymes that hydroxylate lysine residues
      within collagen sequences, which is a prerequisite for the subsequent glycosylation
      of these residues. The hydroxylysine sites serve as attachment points for carbohydrate
      units, crucial for collagen fibril assembly, cross-linking, and stability. Some
      members exhibit multifunctional activities, catalyzing both hydroxylation and
      glycosylation, contributing to the formation of the collagen triple helix and
      the biosynthesis of different collagen types, including type I and IV. Others
      are involved in cell adhesion processes. The family also includes proteins that,
      despite sharing sequence similarity, are inactive as glycosyltransferases and
      may have divergent functions.
