  name:
    name: AB hydrolase superfamily lipase/esterase
    short: AB_hydrolase_lip/est
  description:
  - text: The AB hydrolase superfamily protein family is involved in the hydrolysis
      of various ester bonds, playing roles in plant virulence, degradation of plant
      cell walls, and lipid metabolism. Members of the family exhibit lipase activity,
      targeting mono-, di-, and triacylglycerols, as well as esterase activity, hydrolyzing
      ester bonds in arabinoxylans and pectin. Some proteins prefer specific substrates,
      such as p-nitrophenyl esters or acetylated compounds, and may be involved in
      pathogenicity by affecting plant defense mechanisms. Activity regulation is
      observed with inhibitors like ebelactone B or metal ions, and substrate specificity
      can be influenced by residues near the active site.
