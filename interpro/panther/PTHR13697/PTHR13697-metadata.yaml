  name:
    name: ATP-dependent 6-phosphofructokinase
    short: ATP-dep_6-PFK
  description:
  - text: The ATP-dependent 6-phosphofructokinase family is involved in the critical
      energy-producing glycolytic pathway. It catalyzes the phosphorylation of D-fructose
      6-phosphate to fructose 1,6-bisphosphate using ATP, representing the first committing
      step of glycolysis. This reaction is a key regulatory point in the glycolytic
      pathway. Members of this family are subject to complex allosteric regulation,
      typically activated by ADP and other diphosphonucleosides, and inhibited by
      phosphoenolpyruvate, ATP, or citrate. This family includes both eukaryotic and
      prokaryotic enzymes, with some members capable of utilizing inorganic phosphate
      (PPi) as a phosphoryl donor, functioning in both glycolysis and gluconeogenesis.
      The family also exhibits variations in allosteric regulation, reflecting a diversity
      of cellular energy requirements and metabolic controls.
