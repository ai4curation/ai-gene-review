  name:
    name: Orotate Phosphoribosyltransferase
    short: OPRT
  description:
  - text: The Orotate Phosphoribosyltransferase (OPRT) family consists of enzymes
      that play a crucial role in the de novo pyrimidine biosynthesis pathway. Members
      of this family catalyze the transfer of a ribosyl phosphate group from 5-phosphoribose
      1-diphosphate to orotate, resulting in the formation of orotidine monophosphate
      (OMP). This reaction is a key step in the production of uridine monophosphate
      (UMP), which is a precursor for all pyrimidine nucleotides. Some members of
      this family are bifunctional enzymes that also possess orotidine 5'-phosphate
      decarboxylase (ODC) activity, further converting OMP to UMP. The family is characterized
      by its conserved domain and is essential for nucleic acid synthesis and cellular
      metabolism in a wide range of organisms.
