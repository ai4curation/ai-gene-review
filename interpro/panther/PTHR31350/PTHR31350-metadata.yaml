  description:
  - text: This family of proteins includes components of the SCF-type E3 ubiquitin
      ligase complex, which are involved in substrate recognition for ubiquitination.
      Ubiquitination is a post-translational modification that typically targets proteins
      for degradation by the proteasome, thus regulating various cellular processes
      including the cell cycle, signal transduction, and gene expression. Some members
      of the family are implicated in bacterial pathogenicity, influencing the expression
      of specific genes necessary for host invasion. The family is characterized by
      a shared domain, suggesting a conserved structural framework that may underlie
      their diverse functions.
