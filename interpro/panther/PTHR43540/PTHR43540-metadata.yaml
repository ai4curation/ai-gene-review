  description:
  - text: This family of proteins is involved in various metabolic processes, including
      the hydrolysis of specific substrates to release ammonia and other products.
      Members of this family catalyze the breakdown of ureidoacrylate to aminoacrylate
      and carbamate, which further decomposes to release ammonia and CO2. Some proteins
      in this family are implicated in the biosynthesis of antibiotics like phenazine,
      siderophores such as enterobactin and vibriobactin, and in the degradation of
      herbicides. They may also be involved in the regulation of seed germination
      and in the suppression of plant immunity. The family includes isochorismatase-like
      hydrolases with high specificity for their respective substrates, playing roles
      in nitrogen metabolism and bacterial virulence.
