  name:
    name: UDP-glycosyltransferase
    short: UDP-glycosyltransferase
  description:
  - text: The UDP-glycosyltransferase family is involved in phase II biotransformation
      reactions, where they conjugate lipophilic substrates with glucuronic acid to
      enhance water solubility and facilitate excretion. They play a crucial role
      in detoxifying xenobiotics and metabolizing endogenous compounds, including
      steroid hormones and bile acids. Some family members also contribute to the
      biosynthesis of complex lipids and glycosides, influencing processes like olfaction
      and insect development. The family includes enzymes that act on a variety of
      substrates, from small phenolic compounds to large steroid molecules, and are
      implicated in the metabolism of drugs, such as angiotensin receptor antagonists
      and anticancer agents.
