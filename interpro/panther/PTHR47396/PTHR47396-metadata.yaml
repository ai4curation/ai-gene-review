  name:
    name: Helicase and Restriction-Modification Enzyme
    short: Helicase_Restrict-Modif_Enz
  description:
  - text: The protein family includes helicases and restriction-modification system
      enzymes. Helicases in the family are involved in processes such as postreplicative
      transcription termination, ATP-dependent release of nascent RNA, and DNA repair.
      They form stable complexes with single-stranded DNA and RNA. The restriction-modification
      enzymes recognize specific DNA sequences and cleave DNA at a distance from the
      recognition site, requiring both Res and Mod subunits for function. They also
      exhibit helicase domains and are involved in DNA restriction and modification.
