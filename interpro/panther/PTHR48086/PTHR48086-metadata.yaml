  description:
  - text: The Sodium:Solute Symporter (SSF) family encompasses a range of transporters
      that facilitate the movement of solutes across cellular membranes in conjunction
      with sodium ions. Members of this family are integral membrane proteins that
      typically operate via a secondary active transport mechanism, using the electrochemical
      gradient of sodium ions to drive the transport of solutes such as acetate, proline,
      pantothenate, monocarboxylates, and spermidine. These transporters play crucial
      roles in nutrient uptake, osmoregulation, and metabolic processes across various
      organisms. Some members are also involved in the uptake of compounds that are
      part of host defense mechanisms, such as histatin 5 in Candida albicans. The
      activity of these transporters can be regulated by various factors, including
      membrane lipid composition, osmotic conditions, and the presence of specific
      inhibitors.
