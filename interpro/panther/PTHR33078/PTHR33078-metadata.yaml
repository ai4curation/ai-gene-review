  description:
  - text: The Ycf2 family consists of probable ATPases of unknown function. Members
      of this family are found in a variety of plant species, including non-photosynthetic
      plants such as Epifagus virginiana. Experimental evidence from tobacco suggests
      that Ycf2 proteins have an essential function that is likely not related to
      photosynthesis. The exact role of these proteins remains to be elucidated, but
      their conservation across diverse plant species indicates a fundamental biological
      importance.
