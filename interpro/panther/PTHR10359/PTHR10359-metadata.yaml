  name:
    name: DNA N-glycosylase/AP-lyase
    short: DNA_N-glycosylase/AP-lyase
  description:
  - text: This family of proteins functions in the cellular response to DNA damage.
      Members exhibit DNA N-glycosylase activity, identifying and excising damaged
      or mismatched pyrimidine bases from DNA. Following base removal, these enzymes
      also display AP-lyase activity, cleaving the DNA backbone at the resulting apurinic/apyrimidinic
      site to initiate repair. The dual enzymatic activities are crucial for maintaining
      genomic stability by correcting oxidative lesions and other forms of base damage.
