  name:
    name: Plant Cellulose Synthase/Glycosyltransferase
    short: Plant_Cellulose_Synth/GTase
  description:
  - text: The glycosyltransferase 2 family, specifically the plant cellulose synthase
      and cellulose synthase-like subfamilies, are responsible for the biosynthesis
      of cell wall polysaccharides in plants. Members of this family catalyze the
      formation of beta-1,4-glucan microfibrils, which are crucial for cell wall formation
      and plant structural integrity. Some members also synthesize mixed-linked glucans,
      essential for the structure of grass and cereal cell walls. These enzymes are
      involved in primary and secondary cell wall formation, affecting cell expansion,
      elongation, and complex wall patterning in various plant tissues.
