  name:
    name: ER Membrane Protein Complex Subunit
    short: ER_Membrane_Complex_Subunit
  description:
  - text: This family of proteins is involved in the biogenesis and assembly of membrane
      proteins and complexes. Members of this family are part of the endoplasmic reticulum
      membrane protein complex (EMC), which facilitates the insertion of newly synthesized
      membrane proteins into the endoplasmic reticulum (ER) membrane. This process
      is energy-independent and can accommodate transmembrane domains with various
      features, including weak hydrophobicity and destabilizing residues like charges
      and aromatics. The family plays a role in the cotranslational insertion of multi-pass
      membrane proteins and the post-translational insertion of tail-anchored proteins
      into the ER membrane. It is also implicated in determining the topology of multi-pass
      membrane proteins, such as G protein-coupled receptors, by ensuring the correct
      orientation of N-terminal transmembrane domains. Additionally, some members
      may be involved in magnesium transport across membranes.
