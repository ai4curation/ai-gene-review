  name:
    name: Glycosyltransferase 2
    short: Glycosyltransferase_2
  description:
  - text: The glycosyltransferase 2 family is involved in various biosynthetic processes,
      including the modification of O antigen, the biosynthesis of 6-O-methylglucose
      lipopolysaccharides (MGLPs), and the assembly of N-linked glycans. Members of
      this family catalyze the transfer of sugar moieties from activated sugar donors
      like UDP-glucose to specific acceptor molecules, which can be lipids or other
      carbohydrates. This action is crucial for the formation of glycosidic bonds.
      A significant function of some members is the transfer of 4-deoxy-4-formamido-L-arabinose
      to undecaprenyl phosphate, modifying lipid A and conferring resistance to polymyxin
      and cationic antimicrobial peptides, which is essential for bacterial virulence
      and survival.
