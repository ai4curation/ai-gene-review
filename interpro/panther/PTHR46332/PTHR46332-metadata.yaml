  description:
  - text: This family of proteins includes enzymes that may function as 2-oxoglutarate-dependent
      dioxygenases. These enzymes are involved in various biological processes, including
      the hydroxylation of specific residues in proteins, which can affect protein
      stability, localization, and interaction with other molecules. Some family members
      are implicated in the biosynthesis of ornithine lipids, which are important
      for membrane structure in certain organisms and contribute to symbiotic performance
      and acid tolerance.
