  name:
    name: NADPH-dependent 7-cyano-7-deazaguanine reductase
    short: NADPH_dep_7-cyano-7-deazaG_red
  description:
  - text: This family of proteins includes enzymes that are involved in the biosynthesis
      of queuosine, a modified nucleoside found in the anticodon loop of tRNA. They
      catalyze the NADPH-dependent reduction of 7-cyano-7-deazaguanine (preQ0) to
      7-aminomethyl-7-deazaguanine (preQ1), which is a late step in the queuosine
      pathway. These enzymes exhibit high specificity for their natural substrate
      preQ0. They are characterized by their membership in the GTP cyclohydrolase
      I family and are found across various bacterial species. The activity of these
      enzymes is essential for the proper functioning of tRNA and the accuracy of
      protein synthesis.
