  name:
    name: Glycosyltransferase 29 (Sialyltransferase)
    short: Glycosyltr_29_Sialyltrsf
  description:
  - text: The glycosyltransferase 29 family is involved in the biosynthesis and modification
      of sialic acid-containing structures on glycoproteins and glycolipids. Members
      of this family catalyze the transfer of sialic acid through alpha-2,8-linkages,
      playing a crucial role in the formation of polysialic acid (PSA) chains and
      the synthesis of complex gangliosides. These enzymes are essential for neural
      cell plasticity, as they modify the embryonic neural cell adhesion molecule
      (N-CAM). They also contribute to the diversity of glycan structures by adding
      sialic acid to various acceptor substrates, including N-linked oligosaccharides
      and O-glycans. Their activity is implicated in the expression of PSA on glycoproteins
      and the synthesis of gangliosides such as GD1c, GT1a, GQ1b, GP1c, GT3, GD3,
      and potentially unusual sialylated lactosylceramide derivatives. The family's
      enzymes display substrate specificity, with some preferring substrates with
      alpha-2,3-linked terminal sialic acid and others showing a preference for O-glycans.
