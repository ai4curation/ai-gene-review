  name:
    name: Isopentenyl-diphosphate Delta-isomerase type 1
    short: IPP_isomerase_type1
  description:
  - text: The IPP isomerase type 1 family includes enzymes that catalyze the 1,3-allylic
      rearrangement of isopentenyl diphosphate (IPP) to its allylic isomer, dimethylallyl
      diphosphate (DMAPP). This reaction is a crucial step in the isoprenoid biosynthesis
      pathway, which leads to the production of various essential biomolecules such
      as cholesterol, steroid hormones, and vitamin K. Members of this family are
      found across different organisms, indicating a conserved role in cellular metabolism.
      The isomerization process facilitated by these enzymes ensures the availability
      of DMAPP, a substrate necessary for the prenylation of proteins and synthesis
      of terpenoids, which are key components of cellular membranes and signaling
      molecules.
