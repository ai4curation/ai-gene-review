  name:
    name: 7-carboxy-7-deazaguanine synthase
    short: 7-COOH-7-deazaG_synthase
  description:
  - text: The 7-carboxy-7-deazaguanine synthase family consists of enzymes that catalyze
      a radical-mediated transformation of 6-carboxy-5,6,7,8-tetrahydropterin (CPH4)
      into 7-carboxy-7-deazaguanine (CDG). This reaction is a critical step in the
      biosynthetic pathways of all 7-deazapurine-containing compounds. Members of
      this family are part of the radical SAM superfamily, which is characterized
      by the use of a radical mechanism to perform complex enzymatic transformations.
      The 7-carboxy-7-deazaguanine synthase family plays a pivotal role in the formation
      of 7-deazapurine derivatives, which are important in a variety of biological
      processes, including the biosynthesis of nucleotides and cofactors.
