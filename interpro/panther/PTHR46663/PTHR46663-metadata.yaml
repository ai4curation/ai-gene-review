  name:
    name: Diguanylate Cyclase/Regulatory Protein
    short: DGC-Regulatory_Protein
  description:
  - text: This family of proteins includes diguanylate cyclases and regulatory proteins
      involved in the synthesis of cyclic-di-GMP (c-di-GMP) and the regulation of
      nitrogen fixation. Diguanylate cyclases catalyze the formation of c-di-GMP from
      GTP, a signaling molecule that controls bacterial cell surface-associated traits,
      such as biofilm formation, motility, and cell division. These proteins are part
      of signaling systems that respond to environmental cues, such as oxygen levels
      and reductive stress, to modulate cellular processes. Regulatory proteins in
      this family are involved in controlling the activity of other proteins, such
      as NifA, in response to oxygen and nitrogen levels, which is crucial for nitrogen
      fixation in bacteria. The activity of diguanylate cyclases is tightly regulated
      by interactions with other proteins and domains, ensuring precise control of
      c-di-GMP levels in the cell.
