  name:
    name: Hypoxanthine-guanine phosphoribosyltransferase
    short: HGPRT
  description:
  - text: The Hypoxanthine-guanine phosphoribosyltransferase (HGPRT) family includes
      enzymes that play a central role in the purine salvage pathway. Members of this
      family catalyze the transfer of the ribosyl-5-phosphate group from 5-phospho-alpha-D-ribose
      1-diphosphate (PRPP) to the N9 position of the 6-oxopurines hypoxanthine and
      guanine, resulting in the formation of the ribonucleotides inosine 5'-monophosphate
      (IMP) and guanosine 5'-monophosphate (GMP), respectively, with the concurrent
      release of pyrophosphate (PPi). Some family members also act on xanthine to
      produce xanthine monophosphate (XMP). These reactions are essential for recycling
      purines and contribute to the nucleotide pool necessary for DNA and RNA synthesis.
      The activity of these enzymes is critical for organisms that rely on purine
      salvage due to the absence of de novo purine synthesis pathways.
