  name:
    name: RNR Ribonuclease
    short: RNR_Ribonuclease
  description:
  - text: The RNR ribonuclease family is characterized by its involvement in RNA processing
      and degradation. Members of this family exhibit 3'-5' exoribonuclease activity,
      releasing 5'-nucleoside monophosphates and participating in the maturation of
      structured RNAs such as rRNA, snRNA, snoRNA, and mRNAs. Some family members
      are implicated in mRNA degradation by hydrolyzing single-stranded polyribonucleotides
      processively from the 3' to 5' direction. Others are part of the RNA exosome
      complex, contributing to cellular RNA processing and degradation events, including
      the turnover of unstable mRNAs and surveillance pathways to prevent translation
      of aberrant mRNAs. Certain subfamilies, such as DIS3L2, specialize in recognizing
      and degrading polyuridylated RNAs, playing roles in cell proliferation and mitosis.
      The family's function is essential for maintaining RNA stability and integrity,
      ensuring proper gene expression and cellular homeostasis.
