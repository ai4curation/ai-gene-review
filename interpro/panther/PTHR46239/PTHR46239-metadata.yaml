  name:
    name: Homologous Recombination Repair Mediator
    short: HR_Repair_Mediator
  description:
  - text: This family of proteins is involved in the homologous recombination (HR)
      pathway of DNA repair, specifically in the repair of double-stranded DNA breaks
      that may arise during DNA replication or as a result of DNA-damaging agents.
      Members of this family participate in the formation of RAD51 foci in response
      to DNA damage, indicating a role in the early stages of HR, likely during the
      invasion step. They are also implicated in the phosphorylation of checkpoint
      kinase CHEK2, contributing to cell cycle arrest and HR activation. These proteins
      are components of RAD51 paralog protein complexes, such as BCDX2 and CX3, which
      function at different stages of the BRCA1-BRCA2-dependent HR pathway. They are
      involved in branch migration and Holliday junction resolution, essential for
      processing HR intermediates. Additionally, they contribute to DNA cross-link
      resistance, sister chromatid cohesion, genomic stability, and the maintenance
      of centrosome number during mitosis.
