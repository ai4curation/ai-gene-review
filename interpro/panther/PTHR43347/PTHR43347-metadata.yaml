  name:
    name: ATP-dependent AMP-binding enzyme
    short: ATP-dep_AMP-bind_enzyme
  description:
  - text: The ATP-dependent AMP-binding enzyme family is involved in the activation
      of short-chain fatty acids by catalyzing the synthesis of acyl-CoA derivatives.
      Members of this family preferentially convert propionate to propionyl-CoA, but
      they are also capable of utilizing acetate and butyrate to form acetyl-CoA and
      butyryl-CoA, respectively, albeit with lower affinity. These enzymatic activities
      are crucial for the metabolism of fatty acids, where they facilitate the incorporation
      of fatty acids into metabolic pathways for lipid synthesis or energy production.
      The family includes mitochondrial enzymes that play a significant role in energy
      metabolism and are found across various species, including mammals, bacteria,
      and other organisms.
