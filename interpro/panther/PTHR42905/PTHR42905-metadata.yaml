  name:
    name: Isocitrate lyase/PEP mutase superfamily, Oxaloacetate decarboxylase
    short: Isocit_lyase/PEP_mutase_OADC
  description:
  - text: The Oxaloacetate decarboxylase family is part of the broader isocitrate
      lyase/PEP mutase superfamily and includes enzymes that catalyze the decarboxylation
      of oxaloacetate into pyruvate, which is a critical step in maintaining cellular
      concentrations of bicarbonate and pyruvate. Some family members are involved
      in the catabolism of short chain fatty acids via the 2-methylcitrate cycle,
      cleaving 2-methylisocitrate into pyruvate and succinate. Others participate
      in the formation of carbon-phosphorus bonds, converting phosphoenolpyruvate
      to phosphonopyruvate, or are involved in the biosynthesis of natural-product
      antibiotics and herbicides by rearranging carboxyphosphono groups to form C-P
      bonds. Additionally, certain enzymes hydrolyze phosphonopyruvate and are regulated
      by metal ions, while some are implicated in the glyoxylate cycle and the methylcitric
      acid cycle.
