  name:
    name: Hsc70-interacting protein/Thioredoxin TDX
    short: HIP/Thioredoxin_TDX
  description:
  - text: The FAM10 family proteins are involved in cellular stress responses and
      protein homeostasis. Members of the family, such as the Hsc70-interacting protein
      (HIP), play a crucial role in the molecular chaperone system by binding to the
      ATPase domains of HSC70 molecules upon activation by HSP40. They stabilize the
      ADP-bound state of HSC70, enhancing its affinity for substrate proteins and
      facilitating protein folding and stabilization. Some family members, like TPR
      repeat-containing thioredoxin TDX, exhibit thiol-disulfide oxidoreductase activity
      and can switch from disulfide reductase and foldase chaperone to holdase chaperone
      upon heat shock. They may also interact with HSP70 proteins through TPR repeats,
      contributing to the chaperone network. The family includes proteins with putative
      chaperone activity, suggesting a broader role in protein-protein interactions
      and possibly in assisting the correct folding of other proteins under stress
      conditions.
