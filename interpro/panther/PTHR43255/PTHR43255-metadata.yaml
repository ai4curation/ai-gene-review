  name:
    name: Heterodisulfide reductase iron-sulfur subunit C
    short: HdrC_iron-sulfur_subunit
  description:
  - text: This family of proteins is involved in the reversible reduction of heterodisulfide
      compounds, specifically CoM-S-S-CoB, to their respective thiol-coenzymes H-S-CoM
      (coenzyme M) and H-S-CoB (coenzyme B). Members of this family participate in
      electron transfer processes, which are crucial in methanogenic pathways, including
      the transfer of electrons from reduced ferredoxin or coenzyme F420 to CoM-S-S-CoB.
      Some proteins within this family are also implicated in electron bifurcation
      mechanisms, which contribute to energy conservation in certain methanogens by
      simultaneously reducing ferredoxin and CoB-CoM heterodisulfide. Additionally,
      these proteins may be involved in other oxidoreductase activities, including
      the transfer of electrons to unidentified acceptors or to the menaquinone pool
      in the membrane during syntrophic growth.
