  name:
    name: Ribosome Quality Control Complex Subunit NEMF
    short: RQC_Subunit_NEMF
  description:
  - text: The NEMF family is involved in the ribosome quality control complex (RQC),
      which addresses stalled ribosome issues by mediating the extraction and degradation
      of incomplete nascent polypeptide chains. NEMF proteins bind to stalled ribosomal
      subunits, recognizing nascent chain-conjugated tRNA moieties. They facilitate
      CAT tailing by recruiting alanine-charged tRNA to the ribosomal A-site, leading
      to non-templated C-terminal alanine extensions. This process is crucial for
      exposing lysine residues for ubiquitination and subsequent proteasomal degradation,
      preventing the accumulation of potentially toxic nascent chains. Additionally,
      NEMF proteins may play roles in nuclear export, cell cycle regulation, DNA damage-induced
      apoptosis, mitochondrial stress responses, and binding to extracellular matrix
      proteins, contributing to bacterial virulence.
