  name:
    name: Low-density lipoprotein receptor-related
    short: LDLR-related
  description:
  - text: This family of proteins is involved in receptor-mediated endocytosis and
      internalization of various ligands, including lipoproteins, vitamins, hormones,
      and proteins. Members of this family play crucial roles in cellular lipid homeostasis,
      embryonic development, and the clearance of apoptotic cells. They are also implicated
      in the regulation of signaling pathways such as Wnt and BMP, and in the maintenance
      of the neuromuscular junction. Some members function as receptors for bacterial
      toxins. They are characterized by the presence of certain cytoplasmic motifs
      that interact with other proteins and domains essential for their sorting to
      specific cellular membranes.
