  name:
    name: Actin filament dynamics regulator
    short: Actin_filament_regulator
  description:
  - text: This family of proteins is involved in the organization and regulation of
      the cytoskeleton, particularly in actin filament dynamics and microtubule organization.
      Members of this family play crucial roles in various cellular processes including
      cytokinesis, cell polarity, and cell shape maintenance. They are characterized
      by their ability to nucleate actin filaments, cap the barbed ends of actin filaments,
      and interact with profilin to regulate actin polymerization. Some members are
      also involved in recruiting and activating the Arp2/3 complex, leading to actin
      polymerization. Additionally, these proteins are implicated in the positioning
      and movement of the spindle during cell division, and some have been associated
      with virulence in pathogenic organisms.
