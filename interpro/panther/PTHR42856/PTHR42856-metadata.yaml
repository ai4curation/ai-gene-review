  name:
    name: Acyl-coenzyme A thioesterase PaaI
    short: Acyl-CoA_thioesterase_PaaI
  description:
  - text: This family of proteins includes thioesterases that exhibit a preference
      for hydroxylated phenylacetyl-CoA esters. Members are known to hydrolyze substrates
      such as 3,4-dihydroxyphenylacetyl-CoA, 3-hydroxyphenylacetyl-CoA, and 4-hydroxyphenylacetyl-CoA.
      They are characterized by their inability to act on 4-hydroxybenzoyl-CoA and
      4-hydroxyphenacyl-CoA. The enzymatic activity of these proteins plays a role
      in the breakdown and utilization of aromatic compounds, contributing to various
      metabolic processes.
