  name:
    name: Cellulose-degrading glycosyl hydrolase 3
    short: Cellulose_deg_GH3
  description:
  - text: The glycosyl hydrolase 3 family encompasses enzymes primarily involved in
      the hydrolysis of glycosidic bonds, facilitating the degradation of cellulosic
      biomass. Members of this family catalyze the cleavage of beta-glucosidic linkages
      in cellobiose, cellotriose, and various glucan polymers, releasing glucose.
      This process is crucial in the cellulolytic system, as it represents the final
      step in the conversion of cellulose to glucose, which can then be utilized by
      the organism. Some family members exhibit broad substrate specificity, extending
      their activity to different oligosaccharides and glycosides. The activity of
      these enzymes is essential for the complete breakdown of cellulose, a major
      component of plant cell walls, and thus plays a significant role in carbon cycling
      and biomass conversion. Additionally, certain enzymes within the family are
      subject to regulation by metal ions, indicating a level of control over their
      catalytic activity in response to environmental factors.
