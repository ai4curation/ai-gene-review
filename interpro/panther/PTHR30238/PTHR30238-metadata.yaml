  name:
    name: TerC-related membrane-associated modulator
    short: TerC_related_modulator
  description:
  - text: This family of proteins includes members that are proposed to function as
      redox modulators, potentially involved in altering the redox state within the
      cell membrane. Some proteins in this family are also implicated in tellurium
      resistance, where they might change the intracellular level of tellurium or
      act as a barrier to its entry. Additionally, a member from Arabidopsis thaliana
      is an integral thylakoid membrane protein essential for chloroplast development,
      playing a role in thylakoid membrane biogenesis and the assembly of photosystem
      II core proteins.
