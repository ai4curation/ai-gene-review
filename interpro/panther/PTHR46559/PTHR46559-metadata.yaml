  name:
    name: Non-receptor type tyrosine phosphatase
    short: NR_tyrosine_phosphatase
  description:
  - text: This family of proteins includes non-receptor type tyrosine phosphatases
      that play a crucial role in signal transduction pathways. They act downstream
      of various receptor and cytoplasmic protein tyrosine kinases, participating
      in the relay of signals from the cell surface to the nucleus. These proteins
      are involved in the positive regulation of the MAPK signal transduction pathway.
      They exhibit phosphatase activity that can dephosphorylate a range of substrates,
      including GAB1, ARHGAP35, EGFR, ROCK2, CDC73, SOX9, and NEDD9/CAS-L. The phosphatase
      activity is regulated by SH2 domains that, when bound to phosphotyrosine-containing
      proteins, relieve auto-inhibition and may induce a conformational change in
      the enzyme. This modulation of activity is essential for various cellular processes
      such as growth factor signaling and ossification.
