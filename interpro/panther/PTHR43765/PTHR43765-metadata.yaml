  name:
    name: Ketopantoate reductase
    short: Ketopantoate_reductase
  description:
  - text: The ketopantoate reductase family includes enzymes that play a crucial role
      in the biosynthesis of key biological molecules. Members of this family are
      primarily involved in the reduction of keto acids to their corresponding hydroxy
      acids using NAD(P)H as a cofactor. Specifically, they catalyze the conversion
      of ketopantoate to pantoic acid, an essential step in the biosynthesis of pantothenate
      (vitamin B5), which is a precursor for the synthesis of coenzyme A. Additionally,
      some members are involved in the biosynthesis of non-ribosomal cyclic hexadepsipeptides,
      such as beauvericin, by reducing ketoisovaleric acid to hydroxyisovalerate.
      These peptides have various biological activities, including antibiotic, antifungal,
      and insecticidal properties. The activity of these enzymes can be regulated
      by environmental stimuli and metal ions, indicating a complex interaction with
      cellular processes.
