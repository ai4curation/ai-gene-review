  name:
    name: Intracellular Lectin and Glycoprotein Transporter
    short: Intracellular_Lectin-GPT
  description:
  - text: This family of proteins includes intracellular lectins that play roles in
      the early secretory pathway. They are involved in the recognition and transport
      of glycoproteins, particularly those with specific glycan structures such as
      high mannose-type glycans, N-acetyl-D-galactosamine, and potentially O-linked
      glycans. These proteins are implicated in the sorting or recycling of glycoproteins
      and lipids, and some form complexes that act as cargo receptors for ER-to-Golgi
      transport. Additionally, members of this family may regulate the export of a
      subset of glycoproteins from the endoplasmic reticulum and have motifs that
      are important for their localization and function within the cell.
