  name:
    name: Tumor necrosis factor receptor superfamily member 1A
    short: TNFRSF1A
  description:
  - text: This family of proteins includes receptors that bind to tumor necrosis factors
      such as TNFSF2/TNF-alpha and homotrimeric TNFSF1/lymphotoxin-alpha. Upon ligand
      binding, these receptors recruit the adapter molecule FADD, which in turn recruits
      caspase-8 to form the death-inducing signaling complex (DISC). Activation of
      caspase-8 initiates a cascade of caspases that leads to apoptosis. Additionally,
      these receptors are involved in non-apoptotic signaling pathways, including
      the induction of an anti-viral state and the activation of acid sphingomyelinase,
      contributing to various TNF-mediated effects.
