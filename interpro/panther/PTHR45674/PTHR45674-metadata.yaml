  name:
    name: ATP-dependent DNA ligase
    short: ATP-dep_DNA_ligase
  description:
  - text: The ATP-dependent DNA ligase family is characterized by its members' ability
      to catalyze the joining of DNA strands to facilitate the repair of single and
      double-stranded breaks. This enzymatic activity is crucial during DNA replication,
      recombination, and repair processes. Members of this family are known to interact
      with other DNA repair proteins, such as XRCC1, and may have additional domains
      like the PARP-type zinc finger required for ligase activity. Some variants can
      use alternative nucleotides like ADP or NAD(+) and may be regulated by factors
      such as PCNA or inhibited by certain ions or conditions. This family plays an
      essential role in maintaining genomic integrity across various organisms, including
      bacteria, archaea, and eukaryotes.
