  name:
    name: Mitochondrial and Chloroplastic Presequence Proteases
    short: Mito/Chloro_Preseq_Protease
  description:
  - text: The peptidase M16 family is characterized by its metalloendopeptidase activity,
      primarily functioning in the cleavage and degradation of peptides rather than
      in full protein processing. Members of this family, particularly the PreP subfamily,
      are involved in the degradation of mitochondrial and chloroplastic transit peptides
      following their initial cleavage. These enzymes play a crucial role in maintaining
      the functionality of the presequence processing machinery by clearing these
      peptides. They exhibit ATP-independent proteolytic activity, with a preference
      for cleaving after small polar residues and before basic residues. Some family
      members also degrade unstructured peptides and are implicated in the degradation
      of amyloid-beta proteins, contributing to mitochondrial health. The activity
      of these proteases is regulated by metal ions, nucleotides, and redox states,
      with some requiring MgCl(2) or CaCl(2) for full activation and others being
      inhibited by metal chelators or excess of certain metal ions.
