  name:
    name: NhaB Na(+)/H(+) antiporter
    short: NhaB_Na-H_antiporter
  description:
  - text: The NhaB Na(+)/H(+) antiporter family is involved in the extrusion of sodium
      ions in exchange for external protons across the cell membrane. Members of this
      family play a crucial role in maintaining intracellular pH and sodium homeostasis.
      They are capable of catalyzing the exchange of multiple protons per sodium ion,
      which can also include the transport of lithium ions. This function is essential
      for the growth of organisms on Na(+)/symport substrates such as glutamate and
      proline, particularly under conditions where other sodium/proton antiporters
      are not expressed. The activity of these antiporters is sometimes pH-dependent
      and can be inhibited by specific inhibitors like amiloride. The NhaB family
      is also implicated in the regulation of intracellular pH under alkaline conditions
      and is necessary for survival in environments with varying sodium concentrations.
