  name:
    name: Thiolase-like superfamily, Thiolase
    short: Thiolase-like_sf_Thiolase
  description:
  - text: The Thiolase family proteins are involved in key metabolic processes, primarily
      catalyzing the thiolytic cleavage of 3-ketoacyl-CoA to form acetyl-CoA and a
      CoA ester that is two carbons shorter, a crucial step in the beta-oxidation
      pathway of fatty acid metabolism. This reaction is fundamental for the breakdown
      of fatty acids, enabling their conversion into acetyl-CoA, which enters the
      citric acid cycle for energy production. Some family members also catalyze the
      cleavage of beta-ketoadipyl-CoA to succinyl-CoA and acetyl-CoA, and are implicated
      in the metabolism of aromatic compounds. Additionally, certain thiolases are
      involved in the biosynthesis of jasmonic acid, a plant hormone associated with
      stress responses, and in the production of floral scent compounds. The family
      includes both peroxisomal and non-peroxisomal enzymes, with some members possessing
      a peroxisomal targeting signal for localization.
