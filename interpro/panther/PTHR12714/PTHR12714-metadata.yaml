  name:
    name: Isoprenylcysteine Carboxyl Methyltransferase
    short: Isoprenylcys_Carbxl_Mtase
  description:
  - text: The Isoprenylcysteine Carboxyl Methyltransferase family comprises enzymes
      that catalyze the post-translational methylation of isoprenylated C-terminal
      cysteine residues in various proteins. This modification is crucial for the
      function and regulation of prenylated proteins, including small GTPases and
      heterotrimeric G protein subunits. The methylation process is reversible and
      can be regulated, potentially influencing signaling pathways such as abscisic
      acid signaling in plants and cAMP waves propagation in cellular communication.
      Some family members are known to be competitively inhibited by specific compounds,
      indicating a level of activity regulation. The family belongs to the class VI-like
      SAM-binding methyltransferase superfamily and is involved in the modification
      of signaling molecules like the M-factor and A-factor mating pheromones, as
      well as Ras proteins, without preference for the type of prenyl group attached.
