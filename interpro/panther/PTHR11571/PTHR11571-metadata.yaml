  description:
  - text: The Glutathione S-transferase (GST) superfamily includes enzymes that play
      a crucial role in the detoxification of endogenous compounds and xenobiotics.
      Members of the family catalyze the conjugation of the tripeptide glutathione
      to a variety of hydrophobic and electrophilic substrates, facilitating their
      solubilization and excretion. Some family members also exhibit peroxidase activity,
      reducing lipid hydroperoxides, and are involved in isomerization reactions important
      for steroid hormone biosynthesis. Additionally, certain GSTs are structural
      components of the eye lens in squids and octopi, with limited enzymatic activity.
      The family contributes to various physiological processes, including cellular
      proliferation, protection against oxidative stress, and regulation of cell signaling
      pathways.
