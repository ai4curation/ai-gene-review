  name:
    name: Structural Maintenance of Chromosomes (SMC)
    short: SMC
  description:
  - text: The SMC protein family is essential for chromosomal organization, segregation,
      and DNA repair. Members of the family play a crucial role in chromosome condensation
      and partitioning during cell division. They form complexes such as cohesin and
      condensin, which are necessary for maintaining sister chromatid cohesion and
      converting interphase chromatin into condensed mitotic chromosomes, respectively.
      These complexes may act as proteinaceous rings that trap sister chromatids or
      introduce supercoils into DNA. The SMC proteins are characterized by large globular
      ATPase domains, a central flexible hinge domain, and coiled-coil regions that
      facilitate the formation of V-shaped heterodimers and ring structures essential
      for their function in the cell cycle.
