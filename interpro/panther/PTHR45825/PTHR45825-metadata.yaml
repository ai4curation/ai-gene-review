  name:
    name: Glycosyltransferase 1 family, glycogen synthase subfamily
    short: Glycosyltr_1_glycogen_synth
  description:
  - text: The Glycosyltransferase 1 family, specifically the bacterial/plant glycogen
      synthase subfamily, is responsible for the biosynthesis of alpha-1,4-glucan
      chains. Members of this family utilize ADP-glucose as the glucosyl donor to
      elongate the glucan chains, which are essential components of glycogen in bacteria
      and starch in plants. The process is crucial for energy storage, as it allows
      organisms to stockpile glucose in a readily mobilizable form. Some members in
      plants are involved in the synthesis of amylopectin and amylose within starch
      granules, affecting the structure and functionality of the starch. The activity
      of these enzymes is vital for proper cellular function and energy management
      in a wide range of organisms, including bacteria, plants, and some algae.
