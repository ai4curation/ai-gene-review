  name:
    name: Hexapeptide-repeat containing acetyltransferases
    short: Hexapeptide_acetyltransf
  description:
  - text: The protein family is characterized by a group of acetyltransferases that
      share a common feature of belonging to the transferase hexapeptide repeat family.
      Members of this family are involved in various biochemical processes, including
      the O-acetylation of Nod factors, capsular polymeric sialic acid, and sophorolipids,
      as well as the acetylation of maltose, glucose, and other sugars. Some proteins
      within this family have been implicated in the biosynthesis of lipopolysaccharides
      and colanic acid. The family exhibits a range of substrate specificities and
      biological functions, with some members having a role in the regulation of host
      cell processes, such as peroxisome homeostasis during mycobacterial infection.
      The commonality among these proteins is their enzymatic activity, which involves
      the transfer of an acetyl group from acetyl-CoA to various substrates, a key
      step in the modification of molecules that can affect their stability, recognition,
      and biological activity.
