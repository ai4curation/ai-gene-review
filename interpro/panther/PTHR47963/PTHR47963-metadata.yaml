  name:
    name: DEAD box ATP-dependent RNA helicases
    short: DEAD_box_RNA_helicases
  description:
  - text: The DEAD box helicase family is characterized by its involvement in various
      RNA metabolic processes including ribosome biogenesis, mRNA degradation, and
      translation initiation. Members of this family are ATP-dependent RNA helicases
      that unwind double-stranded RNA in both 5'- and 3'-directions and exhibit RNA-dependent
      ATPase activity. They play roles in cellular responses to environmental stresses
      such as cold, oxidants, and pH changes. Some subfamilies are implicated in the
      assembly of ribosomal subunits and may work in conjunction with cold shock proteins.
      Others are involved in CRISPR immunity, acting as endonucleases and helicases.
      The family includes subfamilies such as CshA, CshB, DbpA, DeaD/CsdA, and DDX21/DDX50,
      each with specific functions and regulatory mechanisms.
