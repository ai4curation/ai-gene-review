  name:
    name: Mitochondrial Carrier
    short: Mitochondrial_Carrier
  description:
  - text: The mitochondrial carrier family is characterized by proteins that function
      as solute carriers within the mitochondrial inner membrane. These carriers facilitate
      the transport of various substances, including metabolites, nucleotides, and
      cofactors, which are essential for mitochondrial function and cellular metabolism.
      A notable function within the family is the transport of iron, which is critical
      for heme synthesis in hemoproteins and the assembly of iron-sulfur (Fe-S) clusters.
      This function is particularly vital in developing erythroid cells for heme biosynthesis.
      Some members also play a role in suppressing mitochondrial splice defects, potentially
      through the modulation of mitochondrial solute concentrations.
