  name:
    name: 2-isopropylmalate synthase
    short: IPM_synthase
  description:
  - text: This family of proteins is involved in the biosynthesis of leucine, an essential
      amino acid. Members of this family catalyze the first step in the leucine biosynthesis
      pathway, which is the condensation reaction of acetyl-CoA with 3-methyl-2-oxobutanoate
      to form 2-isopropylmalate. This reaction is a key regulatory point in the pathway.
      Some members of this family may also participate in the biosynthesis of other
      compounds, such as echinocandin B and AM-toxins, which are secondary metabolites
      with antifungal properties. The proteins typically contain a TIM barrel structure
      that binds substrates and a regulatory domain that may be involved in feedback
      inhibition by the end product, leucine.
