  name:
    name: Nitroreductase/BluB
    short: Nitroreductase/BluB
  description:
  - text: The Nitroreductase/BluB family includes enzymes that perform a variety of
      reduction and dehalogenation reactions. Members of this family are involved
      in the reduction of nitroaromatic compounds, often using NADH or NADPH as reducing
      equivalents, and in some cases, contributing to antibiotic resistance. A subset
      of the family, iodotyrosine deiodinases, play a crucial role in thyroid hormone
      biosynthesis by dehalogenating halotyrosines, facilitating iodide salvage. Another
      distinct subset, BluB enzymes, are involved in the biosynthesis of cobalamin
      (vitamin B12), catalyzing the oxidative fragmentation of FMNH2 to form 5,6-dimethylbenzimidazole.
      The family's diverse functions reflect its broad substrate specificity and involvement
      in various biological processes, including metabolism, detoxification, and hormone
      production.
