  name:
    name: Multicomponent Reductase Electron Transfer
    short: MRET
  description:
  - text: The protein family is involved in various electron transfer processes essential
      for the biodegradation of environmental pollutants and the metabolism of compounds
      such as cholesterol, aromatic compounds, and alkanes. Members of the family
      function as reductase components in multicomponent enzyme systems, transferring
      electrons from NAD(P)H to different oxygenase components. They play roles in
      the hydroxylation of phenolic compounds, degradation of steroids, and conversion
      of aliphatic compounds. Some members are also implicated in the luminescent
      systems of marine bacteria, supplying reduced flavin mononucleotide (FMNH2)
      for bioluminescence. The family includes proteins with iron-sulfur clusters
      and FAD-binding domains, indicating a diverse range of redox activities. They
      are characterized by their ability to interact with various substrates, including
      methane, toluene, phthalate, and others, highlighting their ecological importance
      in the breakdown of toxic environmental chemicals.
