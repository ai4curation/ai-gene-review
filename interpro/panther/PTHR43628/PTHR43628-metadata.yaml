  name:
    name: Mitotic Progression Regulator
    short: Mitotic_Regulator
  description:
  - text: This family of proteins includes regulators of mitotic progression. Members
      of this family are known to interact with kinases involved in the phosphorylation
      of key mitotic regulators. Through these interactions, they can inhibit kinase
      activity, which in turn affects the phosphorylation state of proteins that control
      the transition through the mitotic phase of the cell cycle. The inhibition of
      kinase activity by these proteins is crucial for maintaining proper control
      over cell division, ensuring that mitosis occurs at the appropriate time and
      that genomic integrity is preserved during cell proliferation.
