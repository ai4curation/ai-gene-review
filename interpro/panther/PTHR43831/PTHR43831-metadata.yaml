  name:
    name: Mitochondrial Isobutyryl-CoA Dehydrogenase
    short: Mito_Isobutyryl-CoADH
  description:
  - text: This family of proteins includes mitochondrial isobutyryl-CoA dehydrogenases
      that play a crucial role in the catabolism of valine, an essential branched-chain
      amino acid. Members of this family are primarily responsible for the oxidation
      of isobutyryl-CoA to methacrylyl-CoA, a critical step in the valine degradation
      pathway. Additionally, these enzymes have the ability to oxidize 2-methylbutanoyl-CoA,
      although with lower efficiency. Their activity is essential for the proper breakdown
      of valine, preventing the accumulation of toxic intermediates and maintaining
      metabolic balance.
