  name:
    name: Multidrug and toxin extrusion
    short: MATE_efflux
  description:
  - text: The MATE (multi antimicrobial extrusion) family of proteins functions as
      multidrug and toxin efflux transporters. These proteins typically act as H(+)/organic
      cation antiporters, playing a crucial role in the excretion of a variety of
      cationic compounds, including endogenous metabolites, drugs, and toxins. They
      are involved in processes such as detoxification, protection against inhibitory
      compounds, and homeostasis of plant hormones and metabolites. In plants, they
      contribute to growth regulation, response to drought, and iron homeostasis.
      In animals, they are essential for the excretion of drugs and metabolites through
      organs like the kidney and liver, and may regulate transport across barriers
      such as the blood-testis-barrier.
