  name:
    name: 3'-5' Exoribonuclease
    short: 3-5_Exoribonuclease
  description:
  - text: This family of proteins includes 3'-5' exoribonucleases involved in various
      RNA processing and degradation pathways. Members of this family play roles in
      the decay of histone mRNAs post-replication, suggesting a regulatory function
      in histone protein expression. They are capable of degrading RNA substrates
      with different structures, including stem-loop RNAs and short interfering RNAs
      (siRNAs), indicating a potential involvement in RNA interference (RNAi) mechanisms.
      Some family members are also implicated in rRNA biogenesis, specifically in
      the trimming of pre-5.8S rRNA. The activity of these proteins is regulated by
      interactions with other proteins and nucleic acids, and they exhibit a preference
      for RNA over DNA substrates. Their functions are essential for proper development,
      tissue formation, and cellular processes such as apoptosis and chromatin assembly.
