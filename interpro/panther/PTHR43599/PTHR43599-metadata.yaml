  name:
    name: SAICAR synthetase
    short: SAICAR_synthetase
  description:
  - text: The SAICAR synthetase family is responsible for an essential step in the
      de novo purine biosynthetic pathway. Members of this family catalyze the conversion
      of 4-carboxy-5-aminoimidazole ribonucleotide (CAIR) to 4-(N-succinylcarboxamide)-5-aminoimidazole
      ribonucleotide (SAICAR). This reaction is crucial for the biosynthesis of purine
      nucleotides, which are fundamental components of DNA and RNA and are also involved
      in energy transfer, metabolic regulation, and signaling processes. The activity
      of SAICAR synthetase is therefore vital for cellular growth and proliferation,
      and its function is conserved across a wide range of organisms.
