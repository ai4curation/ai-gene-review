  description:
  - text: The PqiA/PqiB family includes intermembrane transport proteins that play
      a crucial role in maintaining membrane integrity. Members of the family are
      involved in a transport pathway that likely spans the intermembrane space, facilitating
      the movement of substrates across the periplasm. The proteins are probable components
      of a larger transport system, contributing to the stability and function of
      the cellular membrane structure.
