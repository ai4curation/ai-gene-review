  name:
    name: Glycosyltransferase 29
    short: Glycosyltransferase_29
  description:
  - text: The glycosyltransferase 29 family is responsible for the sialylation of
      glycoproteins and glycolipids, a process critical for various biological functions.
      Members of this family transfer sialic acid to terminal carbohydrate groups,
      forming specific sequences that are essential in cell-cell recognition, signaling,
      and immune responses. They play roles in hemostasis by sialylating plasma proteins
      like von Willebrand factor, regulating platelet clearance, and contributing
      to leukocyte extravasation through the biosynthesis of sialyl Lewis X epitopes.
      Additionally, they are involved in ganglioside biosynthesis, affecting neuronal
      development and function. The family's enzymes exhibit substrate specificity,
      mainly acting on structures such as Gal-beta-1,4-GlcNAc, and are implicated
      in the formation of gangliosides like GM3, influencing cellular processes like
      proliferation, differentiation, and oncogenesis.
