  name:
    name: Autophagy-related key regulator
    short: ATG14_key_regulator
  description:
  - text: This family of proteins is involved in the autophagy pathway, particularly
      in the formation and maturation of autophagosomes. Members are essential for
      both basal and inducible autophagy, and they play a role in the recruitment
      and activation of the autophagy-specific PI3-kinase complex, which is crucial
      for the expansion of the autophagosomal membrane. These proteins also facilitate
      the conjugation of LC3 to phosphatidylethanolamine, a step necessary for autophagosome
      formation. Additionally, they are involved in the translocation of key autophagy
      proteins to preautophagosomal structures and autophagosomes. They interact with
      SNARE complexes, promoting the fusion of autophagosomes with endolysosomes,
      which is a vital step in the degradation of autophagic cargo. Furthermore, they
      have a role in modulating lipid metabolism in the liver.
