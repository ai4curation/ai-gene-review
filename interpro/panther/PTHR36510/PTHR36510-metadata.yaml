  name:
    name: Glutamate--cysteine ligase type 2, YbdK subfamily
    short: GCL_type2/YbdK_subfam
  description:
  - text: The glutamate--cysteine ligase type 2 family, specifically the YbdK subfamily,
      consists of ATP-dependent carboxylate-amine ligases. These enzymes exhibit weak
      glutamate--cysteine ligase activity, suggesting a potential role in the synthesis
      of gamma-glutamylcysteine (gamma-GC). Gamma-GC is a precursor to glutathione,
      a significant low-molecular-weight thiol compound. In certain halophilic archaea,
      these ligases catalyze the formation of gamma-GC as the main thiol compound
      instead of glutathione. The precise biological substrate and the full scope
      of functions for these enzymes remain to be elucidated, as the catalytic rates
      observed are low, raising questions about their role in vivo.
