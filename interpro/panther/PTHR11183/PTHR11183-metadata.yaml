  name:
    name: GNT1/Glycosyltransferase 8
    short: GNT1/Glycosyltrans_8
  description:
  - text: The GNT1/glycosyltransferase 8 family encompasses enzymes involved in the
      modification of glycans and the biosynthesis of oligosaccharides. Members of
      the GNT1 subfamily are N-acetylglucosaminyltransferases that participate in
      Golgi-specific N-linked glycan modification. The glycosyltransferase 8 subfamily
      includes galactinol synthases, which are key in synthesizing raffinose family
      oligosaccharides (RFOs) that serve as osmoprotectants under stress conditions.
      Glycogenins, another subfamily, initiate glycogen synthesis by self-glucosylating
      to form oligosaccharide primers for glycogen synthase. UDP-glucuronate:xylan
      alpha-glucuronosyltransferases contribute to cell wall biosynthesis by adding
      glucuronic acid branches to xylan. Inositol phosphorylceramide glucuronosyltransferase
      is essential for plant growth and defense. Collectively, the GNT1/glycosyltransferase
      8 family plays diverse roles in cellular metabolism, stress response, and structural
      integrity across different organisms.
