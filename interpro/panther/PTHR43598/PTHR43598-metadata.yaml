  name:
    name: Prokaryotic molybdopterin-containing oxidoreductase
    short: Molybdopterin_oxidoreductase
  description:
  - text: This family of proteins includes enzymes that catalyze the two-electron
      oxidation-reduction reactions involving various substrates such as formate and
      sulfite. Members of this family are involved in the metabolic processes where
      they function as oxidoreductases, often participating in respiratory chains
      under different environmental conditions, such as aerobic or anaerobic respiration.
      The enzymes typically contain a molybdopterin cofactor and are part of larger
      complexes that transfer electrons from substrates to acceptors like carbon dioxide
      or sulfate. They play a crucial role in energy conservation and cellular redox
      balance.
