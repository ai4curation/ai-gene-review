  name:
    name: Rh/Ammonium Transporter
    short: Rh/Ammonium_Transporter
  description:
  - text: The Rh/Ammonium Transporter family includes proteins involved in the transport
      of ammonium (NH4+) and ammonia (NH3) across cellular membranes, contributing
      to acid-base homeostasis and ammonia metabolism. Members of the family are found
      in a variety of organisms, including humans, other mammals, plants, and bacteria.
      These transporters can function in an electrogenic or electroneutral manner
      and may also transport methylammonium as a derivative of ammonium. Some family
      members are implicated in renal transepithelial ammonia transport, while others
      are involved in ammonia uptake from the soil or elimination in the gill. Additionally,
      certain Rh proteins in erythrocytes are associated with the ankyrin-1 complex
      and rhesus blood group antigen expression, and may have a role in CO2 transport.
      The family is characterized by a commonality in structure and function, despite
      the diverse biological roles and regulatory mechanisms across different species.
