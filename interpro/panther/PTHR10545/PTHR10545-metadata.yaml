  name:
    name: Diverse Substrate Acetyltransferase
    short: Diverse_Substrate_AcTransf
  description:
  - text: The Acetyltransferase family is characterized by a diverse set of enzymes
      that catalyze the transfer of an acetyl group from acetyl-CoA to various substrates,
      including amino acids, polyamines, and histones. Members of the family are involved
      in the regulation of intracellular polyamine levels, which is crucial for cell
      growth and differentiation. Some enzymes specifically acetylate polyamines such
      as norspermidine, spermidine, and spermine, while others target amino acid derivatives
      like thialysine or D-amino acids. Certain family members also play roles in
      plant defense by modifying ornithine or participate in stress response by synthesizing
      hydroxycinnamic acid amides. Additionally, some acetyltransferases are involved
      in histone modification, influencing chromatin structure and gene expression.
      The family includes enzymes with varying substrate specificities and biological
      functions, reflecting their adaptation to different cellular contexts and organisms.
