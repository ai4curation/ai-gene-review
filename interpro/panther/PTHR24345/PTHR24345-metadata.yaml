  name:
    name: Serine/threonine-protein kinase PLK
    short: Ser_Thr-protein_kinase_PLK
  description:
  - text: This family of proteins includes serine/threonine kinases that are pivotal
      in cell cycle regulation, particularly in the processes of centriole duplication,
      spindle assembly, and cytokinesis. Members of this family are involved in phosphorylating
      various substrates to ensure proper cell division and are often activated by
      binding to already phosphorylated motifs. Some members are known to play roles
      in synaptic plasticity, neuronal differentiation, and response to stress. Aberrations
      in the function of these kinases are linked to tumorigenesis due to their central
      role in centrosome duplication and regulation.
