  name:
    name: Protoporphyrinogen IX dehydrogenase
    short: Protoporphyrinogen_IX_DH
  description:
  - text: This family of proteins catalyzes the 6-electron oxidation of protoporphyrinogen
      IX to protoporphyrin IX, a key step in the biosynthesis of heme. The reaction
      is mediated by different electron acceptors depending on the environmental oxygen
      availability. Under anaerobic conditions, members of this family typically use
      menaquinone as an electron acceptor, while under aerobic conditions, ubiquinone
      is used. The activity of these enzymes is crucial for cellular respiration as
      it is linked to electron transfer across the cell membrane, contributing to
      ATP synthesis. Some family members have shown the ability to transfer electrons
      to various reductases and oxidases, highlighting their role in the electron
      transport chain.
