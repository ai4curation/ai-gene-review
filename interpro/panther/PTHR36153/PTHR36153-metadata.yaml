  description:
  - text: This family of proteins includes core components of the type VI secretion
      system (T6SS), which is involved in the secretion of effector molecules that
      target a variety of cells, including both eukaryotic and prokaryotic organisms.
      Members of this family are crucial for the stabilization of the TssK1 structure,
      which is necessary for the proper localization and function of the T6SS at the
      cellular membrane. The T6SS is a complex apparatus that contributes to bacterial
      competitiveness and virulence by delivering toxic proteins to competitor cells
      and host tissues.
