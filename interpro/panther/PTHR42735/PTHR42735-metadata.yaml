  name:
    name: Group II Amino Acid Decarboxylases
    short: GrpII_AminoAcid_Decarb
  description:
  - text: The Group II Decarboxylase family comprises enzymes that catalyze the decarboxylation
      of various amino acids, playing key roles in metabolic pathways. Members of
      the MfnA subfamily primarily decarboxylate L-tyrosine and L-aspartate, contributing
      to methanofuran biosynthesis and coenzyme A production, respectively. The Sphingosine-1-phosphate
      lyase subfamily members cleave phosphorylated sphingoid bases into fatty aldehydes
      and phosphoethanolamine, impacting lipid homeostasis, apoptosis, and stress
      responses. The Tyrosine decarboxylase subfamily is involved in tyramine production,
      which aids in acid resistance and gastrointestinal colonization, and can metabolize
      levodopa, affecting Parkinson's disease treatment. Other family members, such
      as Tryptophan decarboxylase, are involved in neurotransmitter synthesis. The
      family's diverse functions reflect its importance in various biological processes,
      including neurotransmission, stress response, lipid metabolism, and drug metabolism.
