  name:
    name: NAD(P)H dehydrogenase (quinone)
    short: NAD(P)H_dehydrogenase_qn
  description:
  - text: The NAD(P)H dehydrogenase (quinone) family comprises enzymes that catalyze
      the two-electron reduction of quinones to hydroquinones. These enzymes utilize
      NADH or NADPH as electron donors in a ping-pong kinetic mechanism, transferring
      electrons to a flavin cofactor and then to the quinone, avoiding semiquinone
      and reactive oxygen species formation. The family plays a crucial role in cellular
      redox state regulation, primarily through quinone detoxification, and may act
      as superoxide scavengers. Some family members are involved in biosynthetic processes,
      such as vitamin K-dependent gamma-carboxylation of glutamate residues in prothrombin
      synthesis. Additionally, they can activate quinones with antitumor potential
      or interact with tumor suppressors to inhibit their degradation under oxidative
      stress.
