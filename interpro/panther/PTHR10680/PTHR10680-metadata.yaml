  name:
    name: Peptidyl-glycine alpha-amidating monooxygenase
    short: PAM
  description:
  - text: 'The Peptidyl-glycine alpha-amidating monooxygenase family consists of bifunctional
      enzymes that catalyze the C-terminal alpha-amidation of peptides, a crucial
      post-translational modification for the activation of many neural and endocrine
      peptides. The family includes two distinct catalytic domains: the peptidyl alpha-hydroxylating
      monooxygenase (PHM) domain and the peptidylglycine amidoglycolate lyase (PAL)
      domain. The PHM domain, requiring copper, ascorbate, and oxygen, hydroxylates
      the C-terminal glycine of peptidylglycine substrates. The PAL domain then cleaves
      the N-C-alpha bond of the hydroxylated intermediate, producing an alpha-amidated
      peptide and glyoxylate. This family plays a vital role in the biosynthesis of
      bioactive peptides, with implications in various physiological processes.'
