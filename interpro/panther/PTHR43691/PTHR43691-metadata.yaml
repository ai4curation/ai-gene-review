  name:
    name: Purine nucleoside phosphorylase/UDP phosphorylase
    short: PNP_UDP_phosphorylase
  description:
  - text: The PNP/UDP phosphorylase family is involved in the purine salvage pathway
      and catalyzes the reversible phosphorolytic breakdown of the N-glycosidic bond
      in beta-(deoxy)ribonucleoside molecules. This reaction results in the formation
      of free purine bases and pentose-1-phosphate. Family members show broad substrate
      specificity, acting on various purine nucleosides such as inosine, guanosine,
      and adenosine, as well as their deoxy counterparts. Some members also act on
      pyrimidine nucleosides like uridine and thymidine. The produced molecules can
      be utilized as carbon and energy sources or in the rescue of pyrimidine bases
      for nucleotide synthesis. The family includes enzymes with regulatory mechanisms,
      such as conditional disulfide bridges that can disable the enzyme by dislocating
      critical phosphate-coordinating residues away from the active site.
