  name:
    name: Major Facilitator Superfamily (MFS) Transporters
    short: MFS_Transporters
  description:
  - text: The protein family is part of the major facilitator superfamily (MFS), which
      is one of the largest groups of secondary transporters. Members of this family
      are involved in a variety of functions, including the transport of a wide range
      of substrates across cell membranes. Specific subfamilies within this group
      confer resistance to multiple drugs by transporting harmful compounds out of
      the cell, while others are involved in the uptake of nutrients such as di- and
      tripeptides through a proton-dependent mechanism. Some members are implicated
      in the biomineralization process, likely transporting forms of iron, and others
      may function as antiporters exchanging different cations for protons. The diversity
      of functions reflects the versatility of the MFS in adapting to various substrates
      and transport needs within the cell.
