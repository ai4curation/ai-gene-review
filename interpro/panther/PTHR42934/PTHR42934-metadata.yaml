  name:
    name: FAD-linked Oxidoreductase/Transferase Type 4
    short: FAD-linked_OxidoTrans_Type4
  description:
  - text: This family of proteins includes enzymes that are involved in oxidative
      reactions of various substrates such as glycolate and D-lactate. Members of
      this family function as oxidoreductases, often utilizing FAD as a cofactor.
      They are involved in metabolic pathways where they catalyze the oxidation of
      specific substrates to their corresponding products, such as the conversion
      of glycolate to glyoxylate or D-lactate to pyruvate. These enzymes are important
      for the metabolism of carbon sources and may interact with different electron
      acceptors, although the physiological acceptors are often unknown. Some family
      members are known to be stimulated by divalent cations, and their activity can
      be regulated by various inhibitors.
