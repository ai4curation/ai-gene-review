  name:
    name: Peptidase M20A family, bacterial cell wall biosynthesis
    short: Peptidase_M20A
  description:
  - text: The peptidase M20A family includes enzymes that catalyze the hydrolysis
      of N-succinyl-L,L-diaminopimelic acid (SDAP) to form succinate and LL-2,6-diaminoheptanedioate
      (DAP), intermediates in bacterial biosynthesis of lysine and meso-diaminopimelic
      acid, essential components of bacterial cell walls. Some family members also
      hydrolyze the amide bond of N(2)-acetylated L-amino acids, releasing L-ornithine,
      an intermediate in L-arginine biosynthesis and polyamine synthesis. The family
      exhibits broad specificity, with some members able to deacetylate N-acetyl-L-citrulline,
      producing L-citrulline, or release L-lysine from [LysW]-gamma-L-lysine. The
      family's activity is regulated by metal ions and is inhibited by various compounds,
      including L,L-DAP and succinate.
