  name:
    name: CMP-NeuNAc synthase
    short: CMP-NeuNAc_synthase
  description:
  - text: The CMP-NeuNAc synthase family is involved in the biosynthesis of sialic
      acid derivatives, which are important for a variety of biological functions
      such as cell adhesion, signaling, and immune recognition. Members of this family
      catalyze the activation of N-acetylneuraminic acid (NeuNAc) and its derivatives
      to their corresponding cytidine 5'-monophosphate (CMP) conjugates, which are
      substrates required for the addition of sialic acid to various biomolecules.
      Some family members also participate in the biosynthesis of legionaminic acid
      and pseudaminic acid, sialic acid-like sugars that modify flagellin and potentially
      play roles in bacterial virulence. The family includes enzymes with specificity
      for different sialic acid derivatives, highlighting the diversity of sialic
      acid biology across different organisms.
