  name:
    name: Elongation Factors and Tetracycline Resistance
    short: EF-Tet_Resist
  description:
  - text: The protein family includes elongation factors and tetracycline resistance
      proteins. Elongation factors are GTPases that catalyze ribosomal translocation
      during translation elongation, moving tRNA and mRNA to facilitate protein synthesis.
      They are essential for mitochondrial genome maintenance and respiratory growth.
      Some members disassemble ribosomes from mRNA at the end of mitochondrial protein
      biosynthesis, working with MRRF for ribosome recycling. Chloroplast-localized
      members are involved in plastid protein synthesis and are necessary for chloroplast
      redifferentiation post-germination. Tetracycline resistance proteins counteract
      the inhibitory effects of tetracycline antibiotics on protein synthesis by non-covalently
      modifying ribosomes, thus conferring resistance.
