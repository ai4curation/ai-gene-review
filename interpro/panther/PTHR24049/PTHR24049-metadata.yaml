  name:
    name: Notch Signaling and Cell Fate Determination
    short: Notch_Cell-Fate_Det
  description:
  - text: The protein family is involved in cell fate determination, differentiation,
      proliferation, and apoptotic programs through Notch signaling. Members function
      as receptors for ligands such as Jagged and Delta proteins, influencing various
      developmental processes including cardiovascular development, hematopoiesis,
      neurogenesis, and angiogenesis. They also play roles in maintaining stem cell
      populations, regulating immune system development, and contributing to tissue
      morphogenesis and integrity. Some members regulate adipogenesis, while others
      are involved in maintaining the structure and function of photoreceptor cells
      or the extracellular matrix.
