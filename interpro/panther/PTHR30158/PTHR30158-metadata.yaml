  name:
    name: Membrane Fusion Protein (MFP) Efflux
    short: MFP_Efflux
  description:
  - text: The Membrane Fusion Protein (MFP) family consists of periplasmic linker
      proteins that are components of various efflux pumps. These proteins are involved
      in the transport of a wide range of substrates, including organic solvents,
      antibiotics, dyes, detergents, and other toxic compounds. The efflux activity
      is often driven by a proton gradient and is crucial for conferring resistance
      to these substances. Some family members are specific to certain substrates
      like toluene and styrene, while others have broad specificity. The MFPs may
      also play roles in quorum-sensing and secretion of siderophores. They are typically
      part of tripartite efflux systems that span the entire cell envelope, linking
      inner membrane transporters with outer membrane channels.
