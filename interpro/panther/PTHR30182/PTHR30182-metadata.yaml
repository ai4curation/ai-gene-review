  name:
    name: Iron-Sulfur Dependent L-Serine Dehydratase
    short: FeS_L-Serine_Dehydratase
  description:
  - text: The iron-sulfur dependent L-serine dehydratase family is characterized by
      enzymes that catalyze the deamination of L-serine to pyruvate and ammonia, a
      reaction that plays a crucial role in the metabolism of serine and in the overall
      carbon and nitrogen balance within the cell. Members of the family are also
      known to deaminate threonine, especially under conditions of high substrate
      concentration. The presence of an iron-sulfur cluster is essential for the catalytic
      activity of these enzymes, which is reflected in their classification as iron-sulfur
      dependent. The family includes both alpha and beta chains of the enzyme, suggesting
      that the active form of the enzyme may be a multimeric complex.
