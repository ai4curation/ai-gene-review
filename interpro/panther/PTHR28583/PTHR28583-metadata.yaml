  name:
    name: Acid Ceramidase and N-Acylethanolamine-Hydrolyzing Amidase
    short: Acid_Ceramidase/NAAA
  description:
  - text: The Acid Ceramidase family encompasses enzymes that play a crucial role
      in sphingolipid metabolism by hydrolyzing ceramides into sphingosine and free
      fatty acids within lysosomes, functioning optimally at acidic pH. Members of
      the family also exhibit reverse synthetic activity, converting fatty acids and
      sphingosine back into ceramides. These bioactive lipids are involved in cellular
      signaling pathways that influence cell proliferation, apoptosis, and differentiation.
      Additionally, some family members possess N-acylethanolamine hydrolase activity,
      degrading fatty acid amides like N-palmitoylethanolamine into corresponding
      acids and ethanolamine, which are implicated in various biological processes
      including inflammation and pain response. The family's regulatory role extends
      to epidermal differentiation, apoptosis modulation, and potentially steroidogenesis.
