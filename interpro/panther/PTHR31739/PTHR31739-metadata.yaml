  name:
    name: Plant terpene synthase
    short: Plant_terpene_synthase
  description:
  - text: The terpene synthase family is involved in the biosynthesis of a wide variety
      of terpenoid compounds, which play diverse roles in plant physiology and ecology.
      Members of this family are responsible for the conversion of prenyl diphosphate
      substrates into various terpenes, including monoterpenes, sesquiterpenes, and
      diterpenes. These enzymes are characterized by conserved motifs that are important
      for their catalytic activity, typically binding to Mg(2+) ions. Terpenes synthesized
      by this family contribute to plant defense against herbivores and pathogens,
      and have applications in medicine due to their antitumor, anti-inflammatory,
      and antibacterial properties. The family includes enzymes involved in the production
      of phytohormones like gibberellins, as well as phytoalexins, volatile emissions,
      and oleoresin secretions. Some terpenes also serve as precursors for fragrances
      and flavorings, and have potential therapeutic applications.
