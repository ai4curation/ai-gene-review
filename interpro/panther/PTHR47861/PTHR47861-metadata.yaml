  name:
    name: FKBP-type peptidyl-prolyl cis-trans isomerase
    short: FKBP-type_PPIase
  description:
  - text: This family of proteins includes peptidyl-prolyl cis-trans isomerases (PPIases)
      of the FKBP-type, which play a crucial role in protein folding by catalyzing
      the isomerization of prolyl peptide bonds. This accelerates the rate-limiting
      steps in protein folding, enhancing the efficiency and yield of the process.
      Members of this family also exhibit chaperone-like activities, preventing the
      aggregation of unfolded or partially folded proteins and aiding in their proper
      folding. Some proteins within this family are involved in the assembly of hydrogenase
      metallocenter, specifically in the nickel insertion step, which is essential
      for the biosynthesis of hydrogenase enzymes. The family includes proteins with
      a domain structure that typically features an N-terminal PPIase domain and,
      in some cases, a C-terminal metal-binding region that can bind nickel ions.
      This metal-binding ability modulates the isomerase activity and is important
      for the function in hydrogenase biosynthesis.
