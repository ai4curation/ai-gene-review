  name:
    name: NosZ/Cytochrome c oxidase subunit 2
    short: NosZ/Cyto_c_oxidase_sub2
  description:
  - text: The NosZ/Cytochrome c oxidase subunit 2 family includes enzymes that play
      a crucial role in bacterial respiratory systems under anaerobic conditions.
      Nitrous-oxide reductase, a member of this family, is responsible for the reduction
      of nitrous oxide, a potent greenhouse gas, during the final step of the denitrification
      process. Additionally, the cytochrome c oxidase subunit 2 is essential for the
      electron transfer in the enzyme complex, facilitating the conversion of oxygen
      into water in the presence of cytochrome c. This family is characterized by
      a functional core formed by the interaction of its subunits, which are involved
      in the electron transport chain, highlighting their significance in both energy
      conservation and environmental protection.
