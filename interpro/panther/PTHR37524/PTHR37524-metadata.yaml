  name:
    name: Ribosomal RNA large subunit methyltransferase M
    short: rRNA_methyltransferase_RlmM
  description:
  - text: The RlmM family of proteins is responsible for the post-transcriptional
      modification of bacterial ribosomal RNA. Specifically, members of this family
      catalyze the 2'-O-methylation of nucleotide C2498 within the 23S rRNA, a modification
      that is crucial for the proper function of the large ribosomal subunit. This
      methylation is performed by utilizing S-adenosyl-L-methionine (SAM) as the methyl
      group donor. The RlmM family is part of the class I-like SAM-binding methyltransferase
      superfamily and is associated with the RNA methyltransferase RlmE family. The
      precise role of this methylation in ribosomal function is not fully understood,
      but it is believed to contribute to the accuracy and efficiency of protein synthesis.
      The RlmM family is characterized by the presence of a THUMP domain and a catalytic
      Rossmann-like fold MTase domain, which together facilitate the recognition and
      modification of the target rRNA substrate.
