  name:
    name: Choline/Ethanolamine Kinase
    short: Choline/Ethanolamine_Kinase
  description:
  - text: The choline/ethanolamine kinase family encompasses enzymes with key roles
      in phospholipid metabolism. Members of this family are primarily involved in
      the biosynthesis of phosphatidylethanolamine and phosphatidylcholine, which
      are crucial components of cell membranes. They achieve this by catalyzing the
      phosphorylation of choline and ethanolamine. Some family members exhibit specificity
      for either choline or ethanolamine, while others can process both substrates
      with varying efficiencies. These kinases may also be involved in regulatory
      processes, such as lipolysis of lipid droplets in response to metabolic changes.
      Additionally, some isoforms have been implicated in tumor cell growth, indicating
      a potential role in cancer biology. The family's activity can be regulated by
      factors such as homodimerization, heterodimerization, and phosphorylation, and
      may be influenced by the presence of ions like Ca(2+) and Mg(2+).
