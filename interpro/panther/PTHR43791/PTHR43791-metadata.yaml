  name:
    name: Major Facilitator Superfamily Transporters
    short: MFS_Transporters
  description:
  - text: The Major Facilitator Superfamily (MFS) Transporters protein family is involved
      in a diverse range of transport functions across biological membranes. Members
      of this family are responsible for the uptake and efflux of various substrates
      including organic acids, vitamins, amino acids, and antibiotics. They play roles
      in nutrient acquisition, metabolite secretion, antibiotic resistance, and cellular
      homeostasis. The transporters operate via facilitated diffusion or proton motive
      force-driven active transport. Some are involved in specific biosynthetic pathways,
      contributing to the production and secretion of secondary metabolites with pharmaceutical
      potential. The family includes both characterized and uncharacterized transporters,
      with some implicated in resistance mechanisms and others in essential nutrient
      uptake.
