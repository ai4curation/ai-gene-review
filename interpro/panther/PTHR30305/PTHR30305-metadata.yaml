  name:
    name: HPr kinase/phosphorylase
    short: HPrK_P
  description:
  - text: The HPrK/P family includes enzymes that play a crucial role in the regulation
      of carbon metabolism and sugar transport in bacteria. These enzymes exhibit
      dual functionality, acting as both kinases and phosphorylases. As kinases, they
      catalyze the ATP-dependent phosphorylation of a specific serine residue in HPr,
      a component of the phosphoenolpyruvate-dependent sugar phosphotransferase system
      (PTS). They also perform a dephosphorylation (phosphorolysis) reaction, using
      inorganic phosphate to remove the phosphate group from seryl-phosphorylated
      HPr. The balance between these two activities is regulated by intracellular
      metabolites, which vary in concentration based on the availability of rapidly
      metabolizable carbon sources like glucose and fructose. This regulation allows
      the HPrK/P enzymes to function as sensor mechanisms, mediating carbon catabolite
      repression (CCR) and influencing the uptake of carbohydrates through the PTS,
      thus adapting bacterial metabolism to environmental nutrient availability.
