  name:
    name: Zinc-containing alcohol dehydrogenase
    short: Zinc_ADH
  description:
  - text: The zinc-containing alcohol dehydrogenase family is a group of enzymes that
      catalyze the oxidation of alcohols to aldehydes or ketones, and the reduction
      of aldehydes or ketones to alcohols, using NAD(+) or NADH as coenzymes. Members
      of this family exhibit a broad substrate specificity, including primary and
      secondary alcohols, and are involved in various metabolic processes such as
      ethanol catabolism, retinoid metabolism, fatty acid omega-oxidation, and formaldehyde
      detoxification. They play crucial roles in physiological processes like hypoxic
      survival, pheromone biosynthesis, and cellular response to toxic metabolites.
      The family includes several classes and subfamilies, each with distinct substrate
      preferences and functions, ranging from the metabolism of ethanol and long-chain
      fatty acids to the biosynthesis of plant secondary metabolites and pheromones.
