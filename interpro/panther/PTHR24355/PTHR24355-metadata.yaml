  name:
    name: G protein-coupled receptor kinase
    short: GPCR_kinase
  description:
  - text: The G protein-coupled receptor kinase (GRK) family is involved in the regulation
      of G protein-coupled receptors (GPCRs) by phosphorylating their activated forms,
      leading to receptor desensitization, internalization, and down-regulation. GRKs
      play key roles in various physiological processes, including visual signal transduction,
      chemotaxis, blood pressure regulation, and modulation of neurotransmitter signaling.
      Some GRKs are tissue-specific, such as those involved in retina-specific phosphorylation
      of rhodopsin and cone opsins, which are essential for vision adaptation and
      phototransduction cascade shutoff. Others are more broadly involved in the desensitization
      of a variety of GPCRs, impacting processes like chemokine-mediated cell chemotaxis
      and dopamine receptor signaling. Additionally, GRKs can phosphorylate non-GPCR
      substrates, influencing pathways like Wnt signaling and Hedgehog signaling.
