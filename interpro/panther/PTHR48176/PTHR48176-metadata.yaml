  name:
    name: DDRGK domain-containing protein
    short: DDRGK_domain-containing
  description:
  - text: This family of proteins serves as substrate adapters for ufmylation, a post-translational
      modification involving the covalent attachment of the ubiquitin-like modifier
      UFM1 to target proteins. Members of this family play a crucial role in reticulophagy,
      also known as ER-phagy, particularly in response to endoplasmic reticulum stress.
      They facilitate the recruitment of the E3 UFM1-protein ligase UFL1 to the endoplasmic
      reticulum membrane, which mediates the ufmylation of proteins, promoting the
      degradation of endoplasmic reticulum components. This process is vital for maintaining
      cellular homeostasis under stress conditions and is implicated in various biological
      processes, including hematopoiesis, inflammatory response, and cartilage development.
      Some family members are involved in regulating transcription through the ufmylation
      of transcriptional regulators, and may also play a role in NF-kappa-B-mediated
      transcription by influencing the phosphorylation and degradation of NFKBIA.
