  name:
    name: Trk/Ktr/HKT Potassium Transport
    short: Trk_Ktr_HKT_K-transport
  description:
  - text: The Trk/Ktr/HKT potassium transport family encompasses a variety of proteins
      involved in potassium uptake and regulation across different organisms. Members
      of the family participate in essential cellular processes such as maintaining
      osmotic balance, regulating cell volume, and contributing to the electrical
      excitability of cells. The family includes proteins that form part of constitutive
      potassium transport systems like TrkG and TrkH, which are regulated by binding
      to NAD(+) and NADH. Some members are involved in resistance to osmotic stress
      and antimicrobial peptides. Others are voltage-gated or calcium-gated potassium
      channels, which open in response to changes in membrane potential or the presence
      of calcium ions, respectively. The RCK N-terminal domain is a common feature
      within the family, binding NAD and other effectors to induce conformational
      changes that regulate potassium transport. While most family members are directly
      involved in potassium transport, some modulate the activity of other transporters
      or channels, highlighting the diversity of functions within this protein family.
