  name:
    name: Activating Molecule in BECN1-Regulated Autophagy
    short: AMBRA1_autophagy
  description:
  - text: The AMBRA1 family proteins are substrate-recognition components of the DCX
      E3 ubiquitin-protein ligase complex, playing a pivotal role in cell cycle control
      and autophagy. They mediate polyubiquitination and degradation of various target
      proteins, including BECN1 and cyclin-D, thereby regulating the G1 to S phase
      transition and maintaining genomic integrity. The AMBRA1 family also modulates
      the BECN1-PIK3C3 complex, essential for autophagosome nucleation and protein
      turnover, particularly during neuronal development. Additionally, these proteins
      are involved in mitophagy, either by interacting with PRKN and LC3 proteins
      or by acting as cofactors for ubiquitination enzymes. They contribute to Treg
      differentiation by promoting FOXO3 dephosphorylation and are implicated in intracellular
      trafficking and transcription regulation. The family's interaction with dynein
      light chains and protein phosphatase 2A highlights its role in cytoskeletal
      tethering and signal transduction.
