  name:
    name: Transferase hexapeptide repeat
    short: Trans_hexapeptide_repeat
  description:
  - text: The transferase hexapeptide repeat family is characterized by its members'
      ability to catalyze the transfer of acetyl groups from acetyl-CoA to various
      substrates. Key functions include the biosynthesis of diaminopimelate, an intermediate
      in lysine biosynthesis, through the acetylation of tetrahydrodipicolinate, and
      the modification of antibiotics such as chloramphenicol and streptogramin, conferring
      bacterial resistance. Members of the DapH subfamily are involved in lysine biosynthesis,
      while others modify UDP-4-amino sugars in glycosylation pathways or inactivate
      antibiotics. The hexapeptide repeats are a distinctive feature that suggests
      a common structural fold facilitating the acetyltransferase activity.
