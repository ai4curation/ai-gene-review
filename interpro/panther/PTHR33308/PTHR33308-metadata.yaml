  name:
    name: Glycosyl Hydrolase Family 73
    short: Glycosyl_Hydrolase_73
  description:
  - text: The glycosyl hydrolase 73 family encompasses enzymes with diverse functions
      related to cell wall metabolism. Members of this family are involved in the
      endohydrolysis of the di-N-acetylchitobiosyl unit in high-mannose glycopeptides
      and glycoproteins, playing a crucial role in cell division by cleaving peptidoglycan
      and facilitating the separation of daughter cells. Some act as autolysins, contributing
      to cell lysis in the presence of penicillin. Others are specific muramidases
      that hydrolyze peptidoglycan during flagellum assembly or cell wall degradation,
      aiding in processes such as motility, chemotaxis, and cell division. The family
      also includes enzymes that hydrolyze 1,4-beta-linkages between N-acetyl-D-glucosamine
      and N-acetylmuramic acid in peptidoglycan, influencing peptidoglycan structural
      determination during vegetative growth.
