  name:
    name: Gamma-glutamyl phosphate reductase
    short: Gamma-glutamyl_P_reductase
  description:
  - text: The gamma-glutamyl phosphate reductase family consists of enzymes that play
      a crucial role in amino acid metabolism, specifically in the biosynthesis of
      proline, ornithine, and arginine. Members of this family are responsible for
      the NADPH-dependent reduction of L-glutamate 5-phosphate into L-glutamate 5-semialdehyde
      and phosphate. This reaction is a key step in the conversion of glutamate to
      glutamate 5-semialdehyde, which spontaneously cyclizes to form 1-pyrroline-5-carboxylate.
      The activity of these enzymes is essential for the production of proline, which
      contributes to osmoregulation in plants and is also involved in stress responses.
      Some members of this family are bifunctional enzymes that also contain a glutamate
      5-kinase domain, contributing to the regulation of proline levels through feedback
      mechanisms.
