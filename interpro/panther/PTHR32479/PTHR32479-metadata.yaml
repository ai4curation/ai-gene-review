  name:
    name: Electron Transfer and Metabolic Process Iron-Sulfur Protein
    short: ET-Metab_Iron-Sulfur_Prot
  description:
  - text: This family of proteins includes electron transfer components that may also
      serve as membrane anchors for enzyme complexes. Members are involved in various
      metabolic processes, such as the reversible reduction of heterodisulfide compounds
      to thiol-coenzymes, the oxidation of glycolate to glyoxylate, and the reduction
      of fumarate. These proteins can interact with different electron acceptors and
      donors, and some exhibit specificity for thiol compounds. They are typically
      sensitive to oxygen and can be inhibited by various agents, indicating a role
      in anaerobic metabolic pathways.
