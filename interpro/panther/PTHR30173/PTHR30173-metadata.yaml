  name:
    name: ECF Sigma-70 Factor Domain-Containing Protein
    short: ECF_Sigma-70_Domain
  description:
  - text: This family of proteins includes extracytoplasmic function (ECF) sigma factors
      that are involved in the initiation of RNA transcription. They promote the attachment
      of RNA polymerase to specific promoter DNA sites, facilitating the opening of
      the DNA double helix and the formation of the transcription bubble. These proteins
      contain a sigma-70 factor domain-2 for interaction with the -10 element and
      a sigma-70 factor domain-4 with a helix-turn-helix motif for binding the -35
      element in promoter DNA. They interact with RNA polymerase subunits RpoA, RpoB,
      and RpoC. Although typically regulated by anti-sigma factors, no such regulators
      are known for these proteins, suggesting a unique regulatory mechanism within
      this subfamily.
