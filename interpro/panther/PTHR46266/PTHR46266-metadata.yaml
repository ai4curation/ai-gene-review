  name:
    name: Plant-specific bHLH transcription activators
    short: Plant_bHLH_trans_activators
  description:
  - text: This family of proteins includes transcription activators involved in the
      regulation of plant-specific processes such as epidermal cell fate specification,
      anthocyanin biosynthesis, and seed mucilage production. Members of this family
      typically function in association with MYB transcription factors to activate
      the transcription of target genes. They play roles in promoting trichome formation
      and inhibiting stomata formation in Arabidopsis, as well as controlling tissue-specific
      synthesis of anthocyanin pigments in maize and pea. Some members are also involved
      in the spatiotemporal regulation of anthocyanin biosynthesis in kiwifruits.
      The family belongs to the bHLH protein family, characterized by the basic helix-loop-helix
      domain that facilitates DNA binding and dimerization.
