  name:
    name: 3-phosphoshikimate 1-carboxyvinyltransferase
    short: EPSP_synthase
  description:
  - text: The EPSP synthase family proteins are responsible for a crucial step in
      the shikimate pathway, which is essential for the biosynthesis of aromatic amino
      acids in bacteria, fungi, and plants. These enzymes catalyze the reaction that
      transfers the enolpyruvyl moiety of phosphoenolpyruvate (PEP) to the 5-hydroxyl
      group of shikimate-3-phosphate (S3P), resulting in the formation of enolpyruvyl
      shikimate-3-phosphate and the release of inorganic phosphate. This reaction
      is a key regulatory point in the pathway and is the target of the herbicide
      glyphosate, which acts as a competitive inhibitor. The EPSP synthase family
      is characterized by its role in the synthesis of aromatic compounds necessary
      for protein synthesis and plant metabolism, making it a critical enzyme in both
      the growth and development of plants and the survival of various microorganisms.
