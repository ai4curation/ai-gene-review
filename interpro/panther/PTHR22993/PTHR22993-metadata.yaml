  name:
    name: Formamidopyrimidine-DNA glycosylase
    short: FPG
  description:
  - text: The FPG family proteins are involved in the base excision repair pathway,
      which is critical for repairing DNA damage caused by oxidation or mutagenic
      agents. These proteins function as DNA glycosylases that recognize and remove
      damaged bases from DNA. They exhibit a strong preference for oxidized purines,
      particularly 7,8-dihydro-8-oxoguanine (8-oxoG), among other lesions. Additionally,
      they possess AP (apurinic/apyrimidinic) lyase activity, which allows them to
      introduce nicks in the DNA strand. The cleavage of the DNA backbone by beta-delta
      elimination results in a single-strand break at the site of the removed base,
      leaving both 3'- and 5'-phosphates. This activity is essential for maintaining
      genomic stability and preventing mutations that could lead to various diseases,
      including cancer.
