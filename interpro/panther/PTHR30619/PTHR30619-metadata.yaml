  name:
    name: Bacterial competence-related DNA uptake protein
    short: Competence_DNA_uptake
  description:
  - text: This family of proteins appears to be involved in bacterial competence for
      transformation, a process where bacteria take up extracellular DNA from their
      environment. Members of this family may function as part of a membrane-bound
      pore complex known as the transformasome. They are likely to play roles in the
      binding, uptake, and internalization of transforming DNA, potentially acting
      as transporters or interacting directly with the DNA during translocation. Some
      members are essential for natural transformation, indicating a critical role
      in horizontal gene transfer and genetic diversity in bacterial populations.
