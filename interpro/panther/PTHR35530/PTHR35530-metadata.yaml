  name:
    name: 4-oxalocrotonate tautomerase
    short: 4-oxalocrotonate_tautomerase
  description:
  - text: The 4-oxalocrotonate tautomerase family comprises enzymes that catalyze
      the tautomerization of various substrates, including 2-hydroxymuconate. Members
      of this family are involved in the stereoselective ketonization of 2-hydroxymuconate
      to yield 2-oxo-3-hexenedioate. The reaction is a part of the degradation pathway
      for aromatic compounds, playing a role in the beta-ketoadipate pathway. The
      enzymes exhibit high stereoselectivity, producing specific isomers of the keto-enol
      tautomerization products. Some family members also catalyze the tautomerization
      of other diacid substrates, such as 2-hydroxy-2,4-pentadienoate and phenylenolpyruvate,
      indicating a broader substrate specificity within the family.
