  name:
    name: DEAH subfamily of DEAD box helicases
    short: DEAH_DEAD_box_helicases
  description:
  - text: The DEAH subfamily of the DEAD box helicase family is involved in various
      RNA metabolic processes, including pre-mRNA splicing, ribosome biogenesis, mRNA
      export, and translation initiation. Members of this family are ATP-dependent
      RNA helicases that unwind RNA in a 3' to 5' direction. They play roles in the
      assembly and disassembly of RNA-protein complexes, such as spliceosomes and
      ribonucleoprotein particles, and are involved in the regulation of gene expression
      at multiple levels. Some proteins in this family also function in the piRNA
      metabolic process, repressing transposable elements to maintain germline integrity
      during gametogenesis. Others are implicated in antiviral responses, sensing
      viral RNA and activating immune signaling pathways. The family includes helicases
      that are essential for the assembly of the mitochondrial large ribosomal subunit
      and those that influence the fidelity of branchpoint recognition in yeast splicing.
