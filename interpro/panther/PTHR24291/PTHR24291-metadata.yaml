  name:
    name: Cytochrome P450 Monooxygenases
    short: Cytochrome_P450_Monoox
  description:
  - text: The Cytochrome P450 family is a diverse group of enzymes that play a crucial
      role in the metabolism of a wide range of substrates, including fatty acids,
      steroids, xenobiotics, and insect hormones. These heme-thiolate monooxygenases
      are involved in various biological processes such as the biosynthesis of steroid
      hormones, detoxification of synthetic insecticides, and breakdown of fatty acids.
      They exhibit a remarkable ability to oxidize structurally unrelated compounds,
      often through hydroxylation reactions. Members of this family are also implicated
      in the synthesis of aromatic C18 estrogens from C19 androgens, known as aromatase
      activity. Additionally, some family members participate in the biosynthesis
      of secondary metabolites, such as antibiotics and mycotoxins, and in the metabolism
      of endocannabinoids. The Cytochrome P450 enzymes are characterized by their
      use of molecular oxygen, inserting one oxygen atom into substrates while reducing
      the second to water, with electrons supplied by NADPH via cytochrome P450 reductase.
