  name:
    name: Beta-1,4 N-acetylgalactosaminyltransferases
    short: B4GALNT
  description:
  - text: This family of proteins is involved in the biosynthesis of complex carbohydrates
      and glycoconjugates. Members are responsible for the transfer of N-acetylgalactosamine
      (GalNAc) to various acceptor molecules, playing a crucial role in the formation
      of gangliosides and other glycan structures. These enzymes contribute to the
      synthesis of the Sd(a) antigen, a carbohydrate determinant expressed on erythrocytes
      and other tissues, as well as the murine T-lymphocyte CT antigen. They act on
      substrates such as alpha-2,3-sialylated chains and low molecular weight acceptors
      to form non-reducing terminal tetrasaccharides and are key in the conversion
      of simpler gangliosides to more complex ones.
