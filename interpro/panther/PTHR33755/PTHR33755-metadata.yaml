  name:
    name: Type II TA system RelE-like toxin
    short: TA_system_RelE-like_toxin
  description:
  - text: This family of proteins includes toxic components of type II toxin-antitoxin
      (TA) systems. These toxins can inhibit cell growth and colony formation when
      expressed in bacteria such as E. coli. Their toxic effects are specifically
      neutralized by coexpression with their cognate antitoxins. In some cases, low
      levels of the toxin without its antitoxin can lead to decreased growth rates,
      cell death, or loss of colony formation abilities, and can result in greatly
      elongated cells. Mutations in these toxins can alter their effects on cell division
      and elongation.
