  name:
    name: OHCU Decarboxylase
    short: OHCU_Decarboxylase
  description:
  - text: This family of proteins is involved in the degradation of uric acid, a key
      step in purine catabolism. Members of this family catalyze the decarboxylation
      of 2-oxo-4-hydroxy-4-carboxy-5-ureidoimidazoline (OHCU) to (S)-allantoin. This
      reaction is stereoselective, ensuring the production of the biologically active
      S-enantiomer of allantoin. Some members of the family have additional functions,
      such as the bifunctional catalysis of both the oxidation of uric acid to 5-hydroxyisourate
      (HIU) and the subsequent decarboxylation step. The family includes enzymes that
      are solely responsible for the decarboxylation step as well as bifunctional
      proteins that participate in multiple steps of uric acid degradation.
