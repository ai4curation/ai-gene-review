  name:
    name: 4-diphosphocytidyl-2C-methyl-D-erythritol kinase
    short: GHMP_kinase-IspE_subfamily
  description:
  - text: The GHMP kinase family, IspE subfamily, consists of proteins that catalyze
      the phosphorylation of the position 2 hydroxy group of 4-diphosphocytidyl-2C-methyl-D-erythritol.
      This reaction is a key step in the non-mevalonate pathway for isoprenoid biosynthesis,
      which is essential for the production of various isoprenoids that serve as precursors
      for vital cellular components. The IspE subfamily enzymes are crucial for the
      synthesis of isopentenyl phosphate, isopentenol, and dimethylallyl alcohol,
      although they exhibit varying efficiencies for these substrates. The activity
      of these enzymes is vital for maintaining cellular functions and for the development
      of structures such as chloroplasts in plants. The IspE subfamily is characterized
      by its membership in the larger GHMP kinase family, which includes kinases involved
      in a variety of metabolic pathways.
