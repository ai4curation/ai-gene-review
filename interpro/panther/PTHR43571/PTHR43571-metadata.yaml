  description:
  - text: The Glu/Leu/Phe/Val dehydrogenases family includes enzymes that catalyze
      the reversible oxidative deamination of glutamate to alpha-ketoglutarate and
      ammonia, a reaction that plays a central role in nitrogen metabolism. Members
      of this family are primarily NADP-specific, although some can utilize both NAD
      and NADP as cofactors, indicating potential roles in both anabolic and catabolic
      pathways. The enzymes are competitively inhibited by various compounds, suggesting
      a regulatory role in amino acid metabolism. The family is characterized by a
      broad taxonomic distribution, with members found in various organisms including
      yeasts, bacteria, and fungi.
