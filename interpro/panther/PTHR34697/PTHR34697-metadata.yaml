  name:
    name: Phosphatidylglycerol lysyltransferase
    short: PG_lysyltransferase
  description:
  - text: The LPG synthase family catalyzes the transfer of a lysyl group from L-lysyl-tRNA(Lys)
      to membrane-bound phosphatidylglycerol (PG), resulting in the formation of lysylphosphatidylglycerol
      (LPG), which is a major component of the bacterial membrane with a positive
      net charge. The synthesis of LPG is crucial for bacterial virulence, as it plays
      a role in the resistance mechanism against cationic antimicrobial peptides (CAMPs)
      produced by the host's immune system and competing microorganisms. The lysinylation
      of PG by the LPG synthase family leads to a reduction in the overall negative
      charge of the bacterial membrane, thereby repelling CAMPs and contributing to
      the bacteria's defense against these antimicrobial agents.
