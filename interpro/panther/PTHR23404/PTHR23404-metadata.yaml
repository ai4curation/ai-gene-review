  name:
    name: Molybdopterin synthase MOCS2B subfamily
    short: MoaE_MOCS2B_subfamily
  description:
  - text: The MoaE family, specifically the MOCS2B subfamily, consists of proteins
      that function as the catalytic subunits of the molybdopterin synthase complex.
      These proteins are responsible for the biosynthesis of molybdopterin, a cofactor
      essential for the activity of various enzymes, including those involved in the
      metabolism of sulfur, nitrogen, and carbon. The catalytic process involves the
      conversion of precursor Z into molybdopterin by incorporating two sulfur atoms
      into the precursor to form a dithiolene group. The sulfur atoms are typically
      provided by a thiocarboxylated partner protein, such as MOCS2A in eukaryotes
      or MoaD in prokaryotes. This reaction is critical for the activation of molybdoenzymes,
      which play key roles in cellular redox reactions and the detoxification of sulfite,
      among other processes.
