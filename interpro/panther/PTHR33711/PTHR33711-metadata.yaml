  name:
    name: Intradiol Ring-Cleavage Dioxygenase
    short: Intradiol_RC_Dioxygenase
  description:
  - text: The Intradiol Ring-Cleavage Dioxygenase family comprises enzymes involved
      in the degradation of aromatic compounds through the beta-ketoadipate pathway.
      Members of this family are responsible for the ortho-cleavage of catechols and
      other dihydroxylated aromatic substrates, a critical step in the breakdown of
      complex aromatic molecules into simpler compounds that can be assimilated into
      central metabolic pathways such as the tricarboxylic acid cycle. These enzymes
      exhibit substrate specificity, with some preferring chlorinated catechols, while
      others act on non-chlorinated substrates or hydroxyquinol. Their activity is
      essential for the microbial utilization of a wide range of aromatic and hydroaromatic
      compounds, contributing to the biodegradation of pollutants and the recycling
      of organic matter in the environment.
