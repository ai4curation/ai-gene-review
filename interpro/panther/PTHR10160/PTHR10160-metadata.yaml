    name: NAD(P) transhydrogenase
    short: NAD(P)_transhydrogenase
  description:
  - text: The NAD(P) transhydrogenase family is involved in the transhydrogenation
      process between NADH and NADP+, which is essential for maintaining the balance
      of NADPH and NADH in cells. This process is coupled with respiration and ATP
      hydrolysis, serving as a proton pump across the membrane. The family plays a
      crucial role in cellular energy metabolism and may also be involved in the detoxification
      of reactive oxygen species (ROS), particularly in the adrenal gland. The activity
      of the NAD(P) transhydrogenase family is fundamental for redox homeostasis and
      is implicated in various physiological processes.
