  name:
    name: Amino acid/polyamine transporter 2
    short: AAAP_transporter_2
  description:
  - text: The amino acid/polyamine transporter 2 family, also known as the amino acid/auxin
      permease (AAAP) family, includes carrier proteins involved in the transport
      of amino acids and auxin across cellular membranes. Members of this family function
      as amino acid-proton symporters with varying substrate specificities, including
      neutral, acidic, and basic amino acids, as well as the plant hormone auxin.
      Some proteins mediate proton-driven auxin influx, contributing to the formation
      of auxin gradients essential for plant growth and development, such as leaf
      formation, root apex patterning, and response to gravity and touch. Others are
      involved in amino acid uptake for protein synthesis and nitrogen metabolism.
      The family is characterized by stereospecific transport and is regulated by
      various inhibitors, highlighting its role in cellular homeostasis and response
      to environmental stimuli.
