  name:
    name: GPI Anchor Biosynthesis Protein
    short: GPI_Anchor_Biosynth
  description:
  - text: This family of proteins is involved in the biosynthesis of glycosylphosphatidylinositol
      (GPI) anchors, which are glycolipid structures that anchor proteins to the cell
      membrane. Members of this family function as part of a complex that catalyzes
      the initial step of GPI biosynthesis, transferring N-acetylglucosamine from
      UDP-N-acetylglucosamine to phosphatidylinositol. This process is crucial for
      the proper localization and function of various cell surface proteins. In some
      organisms, these proteins also play a role in cell wall biosynthesis.
