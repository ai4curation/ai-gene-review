  name:
    name: Peptidoglycan biosynthesis MurE ligase
    short: MurE_ligase
  description:
  - text: The MurCDEF family, specifically the MurE subfamily, consists of enzymes
      that play a crucial role in the biosynthesis of bacterial cell-wall peptidoglycan.
      These enzymes catalyze the addition of specific amino acids to the nucleotide
      precursor UDP-N-acetylmuramoyl-L-alanyl-D-glutamate (UMAG). Depending on the
      bacterial species, the added amino acid can be meso-diaminopimelic acid or L-lysine,
      which are essential components of the peptidoglycan cross-linking structure.
      This process is vital for bacterial cell wall integrity and is a target for
      antibiotic development. Some members of the family, such as MurT, are involved
      in the ATP-dependent amidation of D-glutamate residue of lipid II, converting
      it to an isoglutamine residue, which is a modification in the cell wall lipid
      II stem peptide. Additionally, the family includes chloroplastic homologs in
      plants that are implicated in chloroplast biogenesis and the activity of the
      plastid-encoded RNA polymerase.
