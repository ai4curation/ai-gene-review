  name:
    name: Prokaryotic/Mitochondrial Release Factor
    short: PM_Release_Factor
  description:
  - text: This family of proteins is involved in the rescue of stalled ribosomes.
      Members of this family have the ability to hydrolyze peptidyl-tRNA on ribosomes
      that are stalled due to non-stop mRNAs, mRNAs with rare codon clusters, or other
      disruptions in the middle of mRNA translation. They serve as a complementary
      system for ribosome rescue when other quality control mechanisms, such as the
      SsrA(tmRNA)-SmpB system or alternative ribosome-rescue factor A (arfA), are
      insufficient. These proteins are characterized by a C-terminal region that is
      essential for ribosome binding and peptidyl-tRNA hydrolase activity, and an
      N-terminal domain that positions a conserved GGQ motif in the peptidyltransferase
      center to catalyze hydrolysis.
