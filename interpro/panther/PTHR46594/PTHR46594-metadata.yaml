  name:
    name: MerP/CopZ Metal Ion Transport
    short: MerP/CopZ_MetalIonTrans
  description:
  - text: The MerP/CopZ family includes proteins involved in metal ion transport and
      resistance. MerP members are periplasmic components that bind and scavenge mercuric
      ions, contributing to mercury resistance by passing the ions to cytoplasmic
      reductases. CopZ proteins function as copper chaperones, sequestering and transporting
      Cu(+) ions intracellularly, often delivering them to copper-exporting P-type
      ATPases. P-type ATPases in the family are involved in the detoxification and
      homeostasis of various heavy metals, including copper, by transporting these
      ions across membranes, often coupled to ATP hydrolysis. These proteins play
      crucial roles in processes such as ethylene signaling, melanin biosynthesis,
      and neuronal function.
