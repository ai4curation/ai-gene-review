  name:
    name: Glutathione S-transferase Omega/HSP26
    short: GST_Omega/HSP26
  description:
  - text: The GST Omega/HSP26 family is characterized by a diverse set of functions,
      primarily associated with enzymatic activities that involve glutathione. Members
      of the Omega subfamily exhibit glutathione-dependent thiol transferase and dehydroascorbate
      reductase activities, contributing to the recycling of ascorbic acid and the
      biotransformation of inorganic arsenic, reducing compounds such as monomethylarsonic
      acid. They also display S-(phenacyl)glutathione reductase activity and general
      glutathione S-transferase activity. In contrast, the HSP26 subfamily members
      form complexes with the RNA polymerase holoenzyme, playing roles in gene expression
      regulation during stringent starvation conditions. The family includes proteins
      that protect against environmental and oxidative stress, and some are involved
      in the biosynthesis of pigments, such as the red eye pigment drosopterin in
      Drosophila.
