  description:
  - text: This family of proteins includes serine/threonine kinases predominantly
      involved in ribosomal biogenesis, particularly in the maturation of the 40S
      ribosomal subunit. They are implicated in the processing of pre-rRNA into mature
      18S rRNA, and their catalytic activity is suggested to regulate their dynamic
      association with ribosomal subunits. Some members also play roles in cell cycle
      progression, chromosome stability, and mitotic segregation. Additionally, certain
      family members are involved in the immune response against viruses, acting as
      adapter proteins and modulating signaling pathways related to interferon response
      and apoptosis.
