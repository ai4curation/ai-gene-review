  name:
    name: Short-chain Dehydrogenases/Reductases
    short: SDR
  description:
  - text: The Short-chain Dehydrogenases/Reductases (SDR) family encompasses enzymes
      that catalyze the NAD(P)H-dependent reduction or oxidation of substrates with
      diverse functions. Members of the SDR family are involved in the biosynthesis
      of secondary metabolites, such as pigments and mycotoxins, and play roles in
      plant defense mechanisms by reducing aldehydes derived from lipid peroxidation.
      They are also implicated in the metabolism of carbohydrates and may participate
      in signal transduction pathways. The enzymes within the SDR family are characterized
      by their ability to act on a wide range of substrates, including saturated and
      alpha,beta-unsaturated aldehydes, ketones, and polyketides, contributing to
      various biological processes and chemical transformations.
