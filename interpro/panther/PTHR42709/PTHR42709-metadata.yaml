  name:
    name: DedA domain-containing protein
    short: DedA_domain
  description:
  - text: This family of proteins includes members that are involved in the transport
      of undecaprenyl phosphate (UndP) across the cytoplasmic membrane. These proteins
      function as flippases, facilitating the movement of UndP from the external side
      to the cytoplasmic side of the membrane. This process is crucial for the recycling
      of UndP during the synthesis of peptidoglycan, which is an essential component
      of the bacterial cell wall. The family is characterized by the presence of DedA
      domain-containing proteins, which are implicated in membrane-related processes.
      While some proteins within this family remain uncharacterized, the common feature
      among annotated members is their association with membrane transport and potential
      involvement in cell envelope biogenesis.
