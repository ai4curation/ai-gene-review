  name:
    name: TatD-type metal-dependent hydrolase
    short: TatD-type_hydrolase
  description:
  - text: The TatD-type hydrolase family comprises metal-dependent hydrolases that
      preferentially act as 3'-5' exonucleases on single-stranded DNA and RNA. Members
      of this family are implicated in DNA damage repair, particularly in response
      to oxidative stress such as H(2)O(2)-induced damage. Some proteins within this
      family also exhibit D-tyrosyl-tRNA deacylase activity, which suggests a role
      in the hydrolysis of D-aminoacyl-tRNA, contributing to the fidelity of protein
      synthesis by preventing the incorporation of D-amino acids. The family includes
      both characterized and uncharacterized proteins, with some members being specifically
      referred to as part of the TatD subfamily, indicating a closer functional and
      structural relationship. The activity of some members is known to be regulated
      by metal ions like Zn(2+), which can act as inhibitors.
