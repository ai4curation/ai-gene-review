  name:
    name: Bifunctional lipid A modification and metabolic enzymes
    short: Lipid_A_modif_metabolic_enz
  description:
  - text: This family of proteins includes enzymes with bifunctional activities, primarily
      involved in the modification of lipid A, which is a component of the bacterial
      outer membrane. The enzymes catalyze the oxidative decarboxylation of UDP-glucuronic
      acid to UDP-4-keto-arabinose and the addition of a formyl group to UDP-4-amino-4-deoxy-L-arabinose,
      resulting in UDP-L-4-formamido-arabinose. These modifications are crucial for
      bacterial resistance to polymyxin and other cationic antimicrobial peptides.
      Additionally, the family encompasses various dehydrogenases involved in steroid
      biosynthesis, as well as epimerases/dehydratases that participate in carbohydrate
      and nucleotide sugar metabolism, contributing to diverse biological processes
      such as cell wall biosynthesis and steroid hormone production.
