  name:
    name: Deoxyguanosinetriphosphate Triphosphohydrolase
    short: dGTPase
  description:
  - text: The dGTPase family is characterized by proteins that exhibit deoxyguanosinetriphosphate
      triphosphohydrolase activity, preferentially hydrolyzing dGTP over other canonical
      NTPs. This activity is crucial for maintaining the balance of deoxyribonucleotide
      triphosphates within the cell, which is essential for DNA replication and repair
      processes. The family includes several subfamilies, with proteins that may share
      similar structural domains but differ in regulatory mechanisms and specific
      functions. Some members act as host restriction factors, defending against viral
      infections by reducing cellular dNTP levels, thus inhibiting viral replication.
      Others are involved in DNA repair, promoting the resection of stalled replication
      forks independently of their dNTPase activity. The family also encompasses proteins
      that are allosterically regulated by GTP and dNTPs, forming active homotetramers
      upon binding these molecules.
