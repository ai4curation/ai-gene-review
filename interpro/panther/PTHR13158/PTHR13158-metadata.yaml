  name:
    name: Mitochondrial NAD(+) kinase
    short: mtNAD+_kinase
  description:
  - text: This family of proteins includes mitochondrial NAD(+) kinases that are responsible
      for the phosphorylation of NAD(+) to produce NADP(+). Members of this family
      can utilize ATP or inorganic polyphosphate as phosphoryl donors. Some members
      have been observed to exhibit weak NADH kinase activity in vitro, although this
      activity is significantly less pronounced than their NAD(+) kinase activity
      and may not be physiologically relevant. The activity of these kinases is regulated
      by inhibition in the presence of NADH, NADPH, and NADP(+).
