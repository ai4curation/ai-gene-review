  name:
    name: tRNA-dihydrouridine synthase
    short: tRNA-Dus_synthase
  description:
  - text: The Dus family is responsible for the synthesis of dihydrouridine, a modified
      uridine base found predominantly in the D-loop of tRNAs. Members of this family
      catalyze the reduction of the C5-C6 double bond in uridines, resulting in the
      formation of 5,6-dihydrouridine (D). This modification is thought to play a
      role in the stabilization of tRNA structure and possibly in the regulation of
      translation. Some subfamilies, such as DusB and Dus3, have been identified,
      with Dus3 also modifying uridines in some mRNAs and potentially affecting their
      translation. The DusC subfamily specifically modifies U16 in tRNAs. The activity
      of these enzymes is essential for proper tRNA function and protein synthesis.
