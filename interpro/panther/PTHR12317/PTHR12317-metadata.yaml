  name:
    name: Diacylglycerol O-acyltransferase/Retinol O-fatty-acyltransferase
    short: DGAT/ARAT
  description:
  - text: This family of proteins is involved in lipid metabolism, specifically in
      the synthesis of glycerolipids. Members of this family function as acyltransferases,
      catalyzing the transfer of fatty acyl-CoA to monoacylglycerol to form diacylglycerol,
      a precursor for triacylglycerol. Some members also possess acyl-CoA retinol
      acyltransferase activity, facilitating the synthesis of retinyl esters. Additionally,
      certain enzymes in this family can catalyze the formation of wax monoesters
      by esterifying fatty alcohols with fatty acyl-CoAs. The activity of these proteins
      is essential for the storage of intracellular triglycerides and may play a role
      in the absorption of dietary fat in the small intestine. The family includes
      enzymes with preferences for specific fatty acyl-CoA substrates and may be regulated
      by various lipid molecules and niacin.
