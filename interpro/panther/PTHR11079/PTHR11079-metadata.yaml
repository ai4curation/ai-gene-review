  name:
    name: Cytidine and Deoxycytidylate Deaminase
    short: Cyt_Deoxycyt_Deaminase
  description:
  - text: The cytidine and deoxycytidylate deaminase family is involved in the modification
      of nucleic acids through deamination reactions. Members of this family catalyze
      the deamination of adenosine to inosine at the wobble position 34 of tRNA(Arg2),
      a modification essential for the proper decoding of the genetic code during
      protein synthesis. Some family members are also involved in the pyrimidine salvage
      pathway by catalyzing the hydrolytic deamination of cytosine to uracil. Others
      participate in the riboflavin biosynthesis pathway or the deamination of guanine
      to xanthine. The family includes several subfamilies, such as ADAT2 and ADAT3,
      which are involved in tRNA editing across a range of organisms, from bacteria
      to humans. The diversity of functions within this family reflects its importance
      in various metabolic pathways and the maintenance of cellular homeostasis.
