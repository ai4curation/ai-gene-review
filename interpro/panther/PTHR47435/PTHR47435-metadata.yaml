  name:
    name: Glucosinolate-derived Nitrile Specifier
    short: GlcNitrile_Specifier
  description:
  - text: This family of proteins includes specifier proteins that are involved in
      the formation of simple nitriles from glucosinolates in the presence of myrosinase.
      They are responsible for constitutive and herbivore-induced nitrile formation
      in various plant tissues, such as seeds, roots, and seedlings. These proteins
      can convert a range of glucosinolate substrates, including allylglucosinolate,
      benzylglucosinolate, and indol-3-ylmethylglucosinolate, to their corresponding
      nitriles. Some family members also contribute to the formation of epithionitriles
      from alkenylglucosinolates. The activity of these proteins can be regulated
      by factors such as the presence of Fe(2+) and pH levels. They are also implicated
      in the regulation of glucosinolate content during plant development processes
      like seed stratification and germination.
