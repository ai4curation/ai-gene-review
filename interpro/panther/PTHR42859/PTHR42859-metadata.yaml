  name:
    name: Ion-translocating oxidoreductase complex subunit B
    short: RnfB_subfamily
  description:
  - text: The RnfB subfamily is a group of iron-sulfur proteins that are part of a
      membrane-bound complex known as the ion-translocating oxidoreductase complex.
      The primary function of the RnfB subfamily is to couple electron transfer with
      the translocation of ions across the membrane. These proteins are involved in
      a variety of metabolic reactions, facilitating the transfer of electrons. The
      RnfB subfamily is characterized by the presence of a 4Fe4S bacterial-type ferredoxin
      domain, which plays a crucial role in their electron transfer capabilities.
      Members of this subfamily are essential for the proper functioning of the ion-translocating
      oxidoreductase complex, contributing to the energy metabolism and homeostasis
      of the cell.
