  name:
    name: FAD-dependent Monooxygenases in Biosynthesis and Metabolism
    short: FAD-dep_Monooxygenase_BioMet
  description:
  - text: The FAD-dependent monooxygenase family is involved in a wide range of biosynthetic
      pathways, catalyzing hydroxylation, epoxidation, and oxidative decarboxylation
      reactions. These enzymes play key roles in the production of mycotoxins, pigments,
      quorum sensing molecules, and various secondary metabolites with antimicrobial,
      antiproliferative, and insecticidal activities. They are also implicated in
      the degradation of environmental toxins and in the metabolism of compounds like
      urate. The family includes enzymes that modify the structure of polyketides,
      indole alkaloids, and flavonoids, contributing to the structural diversity and
      biological activity of natural products.
