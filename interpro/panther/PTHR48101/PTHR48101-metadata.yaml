  name:
    name: Methylmalonyl-CoA Mutase
    short: Methylmalonyl-CoA_mutase
  description:
  - text: The Methylmalonyl-CoA Mutase Family consists of enzymes that catalyze the
      isomerization of succinyl-CoA to methylmalonyl-CoA, a key step in the metabolism
      of propionate, odd-chain fatty acids, and cholesterol. This reaction is part
      of the tricarboxylic acid cycle and is crucial for the synthesis of building
      blocks for polyketide antibiotic biosynthesis. Members of this family are also
      involved in the ethylmalonyl-CoA pathway for acetyl-CoA assimilation in some
      bacteria. The enzymes use radical chemistry and require the coenzyme B12 (adenosylcobalamin)
      as a cofactor. Activity of these enzymes can be regulated by the accumulation
      of oxidized cofactor and inhibited by itaconyl-CoA, which inactivates the B12
      cofactor.
