  name:
    name: Patatin Lipolytic Acyl Hydrolase
    short: Patatin_LAH
  description:
  - text: The patatin family comprises lipolytic acyl hydrolases (LAHs) that are thought
      to play a role in plant defense mechanisms, particularly in response to pathogen
      attacks in tubers. Members of this family are characterized by a conserved GGXR
      motif, which is crucial for the formation of an oxyanion hole during the catalytic
      process. This oxyanion hole stabilizes the transition state when the catalytic
      serine attacks the substrate, facilitating cleavage. Patatin proteins exhibit
      non-specific LAH activity, hydrolyzing various lipid substrates including phospholipids,
      galactolipids, and, in some cases, sulfolipids and mono- and diacylglycerols.
      Some family members are also involved in bacterial defense systems, where they
      function as effector phospholipases in cyclic oligonucleotide-based antiphage
      signaling systems (CBASS), providing immunity against bacteriophage infections
      by inducing cell lysis upon activation by specific cyclic dinucleotides.
