  name:
    name: Cyclic di-GMP and 3'3'-cGAMP-specific phosphodiesterases
    short: Cyclic_di-GMP/3'3'-cGAMP_PDE
  description:
  - text: This family of proteins includes cyclic di-GMP and 3'3'-cGAMP-specific phosphodiesterases.
      They are involved in the hydrolysis of cyclic dinucleotides, such as cyclic
      diguanylate (c-di-GMP) and 3'3'-cyclic GMP-AMP (3'3'-cGAMP), to linear nucleotides.
      These enzymes play key roles in bacterial signaling pathways, regulating processes
      such as motility, biofilm formation, and virulence. They act by modulating the
      levels of cyclic dinucleotides within the cell, which serve as secondary messengers.
      Some family members are regulated by metal ion binding or phosphorylation, which
      affects their catalytic activity. The proteins may contain specific domains,
      such as HD-GYP, that are crucial for their function and interaction with other
      proteins.
