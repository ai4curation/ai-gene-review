  name:
    name: Plant receptor-like serine/threonine-protein kinase
    short: Plant_receptor-like_S/T_kinase
  description:
  - text: This family of proteins includes receptor-like serine/threonine-protein
      kinases that play crucial roles in plant immunity and development. They are
      involved in the perception of pathogen-associated molecular patterns (PAMPs)
      and endogenous elicitors, triggering immune responses. Some members are responsible
      for the detection of specific bacterial proteins, leading to a series of intracellular
      events, such as protein cleavage, kinase chain release, and translocation to
      the nucleus to regulate transcription factors. Other members act as receptors
      for defense peptides or brassinosteroids, contributing to the regulation of
      plant growth, defense hormone expression, and feedback regulation of hormone
      biosynthesis. They may also possess dual specificity kinase activity, phosphorylating
      serine/threonine and tyrosine residues, and some have additional functions such
      as modulating seed size.
