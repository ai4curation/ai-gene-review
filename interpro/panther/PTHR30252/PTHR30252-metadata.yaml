  name:
    name: Peptide Transporter Carbon Starvation
    short: CstA
  description:
  - text: The peptide transporter carbon starvation (CstA) family is involved in the
      uptake and utilization of peptides, particularly under conditions of carbon
      starvation. Members of this family transport dipeptides and tripeptides, which
      can be used as carbon sources for growth and survival. The transport process
      is typically driven by the proton motive force. Some members are known to be
      involved in additional biological processes such as host-pathogen interactions,
      bacterial motility, agglutination, and stimulation of dendritic cells. The family
      is part of a nutrient-sensing regulatory network in some bacteria, which includes
      two-component regulatory systems that control the expression and activity of
      these transporters.
