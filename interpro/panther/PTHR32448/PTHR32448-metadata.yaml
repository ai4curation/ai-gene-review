  name:
    name: Oxygen-dependent FAD-linked Oxidoreductase
    short: O2_dep_FAD-oxidoreductase
  description:
  - text: The oxygen-dependent FAD-linked oxidoreductase family is involved in the
      biosynthesis of various alkaloid and terpenophenolic natural products. Members
      of this family catalyze key oxidation steps in the production of compounds with
      diverse biological activities, including plant defense mechanisms against herbivores
      and pathogens, and pharmacological properties in humans. These enzymes are responsible
      for the stereospecific conversion of precursor molecules into bioactive substances
      such as nicotine, nornicotine, berberine, cannabinoids, and other alkaloids.
      They play a crucial role in the formation of compounds with antiparasitic, pesticide,
      anti-inflammatory, antifungal, antimicrobial, and neurotoxic effects. Some family
      members are also involved in the oxidative cyclization of monoterpene moieties
      and the conversion of monolignols to their corresponding aldehydes, which are
      important for plant development and stress responses.
