  name:
    name: Ribonuclease H
    short: RNase_H
  description:
  - text: The RNase H family comprises endonucleases that specifically degrade the
      RNA moiety of RNA-DNA hybrids. These enzymes play a crucial role in various
      biological processes, including DNA replication, where they remove RNA primers
      from Okazaki fragments during lagging strand synthesis. They also participate
      in maintaining genomic stability by preventing initiation of replication at
      non-oriC origins and are involved in the production of retron-derived multicopy
      single-stranded DNA. RNase H enzymes are regulated by the presence of divalent
      metal ions, with magnesium being required for activity and manganese acting
      as an inhibitor.
