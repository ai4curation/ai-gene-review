  name:
    name: Riboflavin biosynthesis enzyme
    short: Riboflavin_biosynth_enzyme
  description:
  - text: This family of proteins is involved in the biosynthesis of riboflavin (vitamin
      B2), an essential nutrient for many organisms. Members of this family catalyze
      key enzymatic steps in the conversion of GTP and D-ribulose 5-phosphate into
      formate and other intermediates, which are then further processed into riboflavin.
      These enzymes play a critical role in the metabolic pathway by facilitating
      the formation of 3,4-dihydroxy-2-butanone 4-phosphate and 2,5-diamino-6-ribosylamino-4(3H)-pyrimidinone
      5'-phosphate (DARP), both of which are crucial intermediates in the synthesis
      of riboflavin. The activity of these proteins ensures the availability of riboflavin,
      which functions as a precursor for the synthesis of flavin mononucleotide (FMN)
      and flavin adenine dinucleotide (FAD), cofactors that are vital for numerous
      cellular processes.
