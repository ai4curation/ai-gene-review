  name:
    name: ATP-dependent AMP-binding enzyme
    short: ATP-dep_AMP-bd_enzyme
  description:
  - text: The ATP-dependent AMP-binding enzyme family is involved in various biochemical
      processes, including the activation of fatty acids, carboxylic acids, and other
      substrates by forming a thioester with CoA. Family members catalyze the transfer
      of CoA to specific substrates, generating activated intermediates necessary
      for subsequent biochemical reactions. These enzymes play roles in fatty acid
      metabolism, lysophospholipid acylation, siderophore biosynthesis, degradation
      of aromatic compounds, and biosynthesis of mycotoxins, antibiotics, and other
      secondary metabolites. They exhibit specificity towards substrates of varying
      chain lengths and structures, including medium-chain fatty acids, long-chain
      fatty acids, and aromatic compounds. Some enzymes within the family also display
      bifunctional activity, contributing to different metabolic pathways. The family
      is characterized by conserved motifs essential for catalytic activity and substrate
      recognition.
