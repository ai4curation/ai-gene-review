  name:
    name: Phosphoribosylformylglycinamidine synthase
    short: FGAMS
  description:
  - text: The FGAMS family is involved in the purines biosynthetic pathway. Members
      of this family are responsible for the ATP-dependent conversion of formylglycinamide
      ribonucleotide (FGAR) and glutamine into formylglycinamidine ribonucleotide
      (FGAM) and glutamate. This reaction is a critical step in the formation of purine
      nucleotides, which are essential building blocks of DNA and RNA. In some organisms,
      the FGAMS complex may consist of multiple subunits, including PurQ, which converts
      glutamine to glutamate, producing ammonia; PurL, which transfers the ammonia
      molecule to FGAR to form FGAM; and PurS, which assists in the transfer of ammonia
      between PurQ and PurL.
