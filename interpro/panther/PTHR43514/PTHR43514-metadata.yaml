  name:
    name: Molybdenum import ATP-binding protein ModC
    short: Molybdenum_import_ModC
  description:
  - text: The ModC family of proteins is involved in the import of molybdenum, a vital
      trace element required for the activity of various enzymes. These proteins are
      part of the ABC transporter complex ModABC, which is responsible for the uptake
      of molybdate ions into the cell. ModC serves as the ATP-binding component of
      the complex, providing the necessary energy for the transport process. The presence
      of ModC is crucial for the function of the ModABC complex, as it couples the
      energy derived from ATP hydrolysis to the translocation of molybdate across
      the cell membrane, ensuring the availability of molybdenum for essential cellular
      processes.
