  name:
    name: Shikimate kinase
    short: Shikimate_kinase
  description:
  - text: The shikimate kinase family is responsible for the phosphorylation of the
      3-hydroxyl group of shikimic acid, using ATP as a cosubstrate. This reaction
      is a key step in the shikimate pathway, which is essential for the biosynthesis
      of aromatic amino acids in bacteria, fungi, plants, and apicomplexan parasites.
      The family includes proteins with a LID domain that closes over the active site
      upon ATP or shikimate binding, indicating a conformational change during the
      catalytic process. Members of the AroL subfamily are also part of this family,
      sharing the same core function but with distinct structural features. This family
      plays a crucial role in the metabolic pathways leading to the synthesis of various
      essential compounds derived from aromatic amino acids.
