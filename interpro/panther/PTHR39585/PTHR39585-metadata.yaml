  name:
    name: SdhE FAD assembly factor
    short: SdhE_FAD_assembly_factor
  description:
  - text: The SdhE FAD assembly factor family consists of proteins that play a crucial
      role in the assembly of succinate dehydrogenase (SDH), a key enzyme complex
      in both the tricarboxylic acid cycle and the electron transport chain. These
      proteins are responsible for the flavinylation of the SdhA subunit of SDH, a
      process that involves the covalent attachment of the flavin adenine dinucleotide
      (FAD) cofactor. This post-translational modification is essential for the proper
      functioning of SDH, which catalyzes the oxidation of succinate to fumarate and
      the reduction of ubiquinone to ubiquinol. Members of the SdhE family may also
      be involved in the flavinylation of other flavoproteins, contributing to a range
      of metabolic and respiratory processes.
