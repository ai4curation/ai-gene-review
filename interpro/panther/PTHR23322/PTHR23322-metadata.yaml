  name:
    name: UBX domain-containing protein
    short: UBX_domain-protein
  description:
  - text: This family of proteins is involved in various cellular processes including
      ciliogenesis, endoplasmic reticulum-associated degradation (ERAD), and ubiquitin-dependent
      protein degradation. Members of this family function as ubiquitin-binding adapters
      or tethering factors, facilitating the recruitment of segregase VCP/p97 to specific
      protein complexes. They play roles in the regulation of protein turnover by
      mediating the degradation of misfolded proteins in the ER and the progression
      of DNA replication forks. Some members are also implicated in the disassembly
      of stress granules and may influence signaling pathways by controlling receptor
      expression levels. The family includes proteins with UBX domains that mediate
      interactions with VCP/p97 and may contain additional domains such as UBA and
      UIM, which are involved in binding ubiquitinated substrates and engaging NEDD8
      modifications on cullins, respectively.
