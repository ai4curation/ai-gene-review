  name:
    name: Metal Ion Import ATP-binding
    short: Metal_Ion_Import_ABC
  description:
  - text: The protein family is involved in the import and transport of various metal
      ions across cellular membranes, utilizing ATP-driven transport systems. Members
      of the family are part of ABC transporter complexes, which are binding protein-dependent
      and responsible for energy coupling to the transport system. The family includes
      proteins that import essential nutrients such as vitamin B12, zinc, manganese,
      and possibly other metals, indicating a role in metal homeostasis and cellular
      nutrition. The transporters function by hydrolyzing ATP to provide the necessary
      energy for the translocation of their respective substrates through the membrane,
      contributing to the survival and virulence of the organisms.
