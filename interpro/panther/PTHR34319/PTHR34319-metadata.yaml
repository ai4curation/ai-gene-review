  name:
    name: Type VI secretion system Hcp1 domain-containing protein
    short: T6SS_Hcp1_domain
  description:
  - text: This family of proteins is characterized by the presence of the Hcp1 domain,
      which is typically associated with a role in bacterial virulence. Members of
      this family are often involved in the type VI secretion system (T6SS), a mechanism
      used by Gram-negative bacteria to transport effector proteins into a variety
      of target cells. The Hcp1 domain-containing proteins are known to form hexameric
      tubes that can act as conduits for the translocation of effector molecules.
      These proteins are crucial for the assembly and function of the T6SS apparatus,
      which plays a significant role in interbacterial competition and pathogenesis
      in host organisms. The Hcp1 family members may also be involved in other cellular
      processes related to bacterial secretion systems.
