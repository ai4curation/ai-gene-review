  name:
    name: HAD-like hydrolase superfamily
    short: HAD-like_hydrolase_sf
  description:
  - text: The HAD-like hydrolase superfamily protein family is involved in a variety
      of biochemical processes, including the degradation of phosphonates, the dephosphorylation
      of 2-phosphoglycolate as part of the DNA repair system, and the hydrolysis of
      pyrophosphate. Members of this family play crucial roles in cellular metabolism,
      such as the dissimilation of 2-phosphoglycolate formed during oxidative stress-induced
      DNA repair, controlling intracellular pyrophosphate pools, and recycling cell
      wall components. Some family members are also implicated in pathogenicity by
      modulating phosphatase activity through phosphorylation. The family includes
      phosphonoacetaldehyde hydrolases, phosphoglycolate phosphatases, pyrophosphatases,
      and tyrosine-protein kinases, highlighting its diverse functional repertoire
      in bacterial physiology and stress response mechanisms.
