  name:
    name: Two-component system sensor histidine kinase
    short: TCS_sensor_his_kinase
  description:
  - text: This family of proteins includes sensor histidine kinases that are part
      of two-component regulatory systems, which are typically involved in response
      to environmental stimuli. These proteins undergo ATP-dependent autophosphorylation
      at a conserved histidine residue. The phosphoryl group is then transferred to
      a conserved aspartate residue in a receiver domain, initiating a phosphorelay
      signal transduction pathway. This mechanism allows the proteins to regulate
      various biological functions, including carbon metabolism, virulence factor
      production, cell-cell signaling, biofilm dispersal, and response to stress conditions
      such as osmotic changes and oxidative stress. Some family members are hybrid
      kinases with additional receiver domains or other atypical domain architectures,
      indicating diverse regulatory roles and complex signal integration.
