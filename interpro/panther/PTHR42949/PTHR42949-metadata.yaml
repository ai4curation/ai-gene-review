  name:
    name: 'Metabolic Enzymes: Cyanogenesis, Opine Oxidation, G-3-P Dehydrogenation'
    short: Metab_Enz_Cyan_OpOx_G3PDH
  description:
  - text: The protein family includes enzymes involved in distinct metabolic processes.
      One subgroup catalyzes the formation of hydrogen cyanide, a secondary metabolite,
      through a membrane-bound flavoenzyme system that transfers electrons to a cyanide-resistant
      branch of the aerobic respiratory chain. This process is regulated by various
      substrates and inhibitors and is oxygen-dependent. Another subgroup performs
      the oxidative cleavage of octopine into L-arginine and pyruvate. A third subgroup
      is responsible for the anaerobic conversion of glycerol 3-phosphate to dihydroxyacetone,
      using fumarate or nitrate as electron acceptors. The family encompasses proteins
      with diverse functions related to metabolism and electron transfer in various
      bacterial species.
