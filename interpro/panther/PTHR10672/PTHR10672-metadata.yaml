  name:
    name: Aldolase class II Adducin subfamily
    short: Aldolase-II_Adducin_sf
  description:
  - text: The Aldolase class II, Adducin subfamily, consists of membrane-cytoskeleton-associated
      proteins that promote the assembly of the spectrin-actin network, which is crucial
      for maintaining cell shape and integrity. Members of this family are involved
      in various cellular processes including actin filament capping, cell migration,
      cell adhesion, and regulation of ion channels. They play significant roles in
      the structural and functional organization of the podocyte in the kidney, affecting
      glomerular filtration and blood flow autoregulation. Adducins bind to calmodulin
      and can interact with erythrocyte membrane receptors, linking the cytoskeleton
      to the plasma membrane. Some members are implicated in the biosynthesis of antibiotics
      by mediating oxidative decarboxylation steps. The family also includes proteins
      with roles in meiosis and memory retention.
