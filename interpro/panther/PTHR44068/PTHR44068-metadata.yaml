  name:
    name: Erg6/SMT methyltransferase
    short: Erg6_SMT_methyltransf
  description:
  - text: The Erg6/SMT methyltransferase family is involved in various methylation
      processes essential for the biosynthesis of sterols, alkaloids, and other compounds.
      Members of this family catalyze the transfer of methyl groups from S-adenosyl-methionine
      to specific substrates, such as the C-24 position of sterols like zymosterol
      and lanosterol, leading to the production of ergosterol and other sterols. This
      modification is a key step in the ergosterol biosynthesis pathway, crucial for
      fungal cell membrane integrity. Additionally, family members participate in
      the biosynthesis of monoterpenoid indole alkaloids, including vindoline, and
      in the modification of lipid moieties of mycobacterial cell wall components.
      The family also includes enzymes involved in the biosynthesis of vitamin E,
      where they methylate tocopherols, and in the modification of antibiotics like
      erythromycin. The diverse functions of the Erg6/SMT family highlight its importance
      in the production of biologically active molecules with roles in cell structure,
      defense, and metabolism.
