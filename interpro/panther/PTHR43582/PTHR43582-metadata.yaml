  name:
    name: ABC Transporter ATP-Binding Protein
    short: ABC_Transporter_ATP-Binding
  description:
  - text: This family of proteins includes ATP-binding components of ABC transporter
      complexes involved in diverse biological processes. Members of this family are
      responsible for energy coupling to the transport system, which is essential
      for the function of the transporter. Some proteins in this family are involved
      in the export of specific molecules, such as nodulation factors in symbiotic
      bacteria or the removal of antibiotics like linearmycins in certain bacteria.
      These nodulation factors are crucial for symbiosis and nodulation induction,
      while the export of linearmycins contributes to antibiotic resistance. The ATP-binding
      activity is a common feature that facilitates the transport of substances across
      the cell membrane.
