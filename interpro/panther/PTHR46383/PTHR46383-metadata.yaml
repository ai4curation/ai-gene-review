  description:
  - text: The Class-I Pyridoxal-Phosphate-Dependent Aminotransferase family is characterized
      by its members' ability to catalyze the reversible transamination reactions
      involving various amino acids and keto acids. These enzymes typically utilize
      pyridoxal phosphate as a cofactor. The family includes enzymes that convert
      aspartate and 2-oxoglutarate to glutamate and oxaloacetate, with some members
      also able to transaminate prephenate. Other substrates like phenylalanine, tyrosine,
      tryptophan, and L-asparagine are also used by certain enzymes within the family.
      Some members exhibit specificity towards aromatic amino acids, while others
      participate in lysine catabolism or the biosynthesis of compounds such as methanofuran.
      This diversity reflects the family's involvement in various metabolic pathways,
      including amino acid biosynthesis, catabolism, and homeostasis.
