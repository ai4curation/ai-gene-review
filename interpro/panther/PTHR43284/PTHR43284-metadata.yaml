  name:
    name: Asparagine Synthetase/Amidase
    short: ASN_synthetase/amidase
  description:
  - text: This family of proteins includes enzymes that are primarily involved in
      the synthesis of asparagine from aspartate. Members of this family utilize glutamine
      as a nitrogen source in a two-step reaction, where glutamine is first hydrolyzed
      to glutamate and ammonia, and then the ammonia is transferred to aspartate to
      form asparagine. Some members are also implicated in the biosynthesis of secondary
      metabolites, such as the yellow pigment chrysogine, by catalyzing amidation
      reactions that contribute to the production of various compounds. The amidation
      process involves the transfer of an amino group from glutamine to a substrate
      molecule, which is a key step in the biosynthesis pathways of several bioactive
      molecules.
