  name:
    name: Nitrite and Sulfite Reductase 4Fe-4S Domain
    short: Nitrite/Sulfite_Rdtase_4Fe4S
  description:
  - text: The nitrite and sulfite reductase 4Fe-4S domain family encompasses enzymes
      involved in nitrogen and sulfur metabolism. Members of this family are responsible
      for the reduction of nitrite to ammonia, a step in nitrite assimilation, and
      the reduction of sulfite to sulfide, crucial for the biosynthesis of L-cysteine
      from sulfate. These processes are vital for the nitrogen and sulfur cycles in
      the environment and for the synthesis of essential amino acids in organisms.
      The family includes proteins with a 4Fe-4S domain, which is indicative of their
      involvement in electron transfer reactions during the catalysis of these reductions.
