  name:
    name: Nucleobase:Cation Symporter-2 (NCS2)
    short: NCS2
  description:
  - text: The Nucleobase:Cation Symporter-2 (NCS2) family is involved in the transport
      of nucleobases across cellular membranes. Members of the NCS2 family are predominantly
      proton-dependent and facilitate the uptake of purines and pyrimidines, such
      as uracil, xanthine, and uric acid. These transporters are integral membrane
      proteins and operate under the proton motive force. Some family members exhibit
      specificity for certain substrates, such as uracil or xanthine, while others
      can transport a broader range of nucleobases. Activity of these permeases can
      be regulated by various inhibitors, including the proton gradient disruptor
      carbonyl cyanide m-chlorophenylhydrazone (CCCP). The NCS2 family plays a crucial
      role in the cellular uptake of essential nutrients and building blocks for nucleic
      acid synthesis.
