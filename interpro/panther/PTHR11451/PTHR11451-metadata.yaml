  name:
    name: Threonine-tRNA ligase
    short: Thr-tRNA_synthase
  description:
  - text: The threonine-tRNA ligase family is responsible for the aminoacylation of
      tRNA(Thr) with threonine, a fundamental process in protein synthesis. These
      enzymes catalyze a two-step reaction where L-threonine is first activated by
      ATP to form Thr-AMP, then transferred to the acceptor end of tRNA(Thr). Additionally,
      they possess an editing function to hydrolyze incorrectly charged L-seryl-tRNA(Thr),
      ensuring the fidelity of protein translation. This family includes both cytoplasmic
      and mitochondrial variants, with some members having an archaea-specific tRNA-editing
      domain. The family plays a crucial role in maintaining the accuracy of protein
      synthesis by correcting mischarged tRNAs.
