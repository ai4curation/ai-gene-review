  name:
    name: Phosphatase regulators and Met sulfoxide reductases
    short: Phosphatase_reg/MetRdx
  description:
  - text: This family of proteins includes regulators of serine/threonine-protein
      phosphatases, particularly PP2A and PP4, and free methionine-R-sulfoxide reductases.
      Members involved in phosphatase regulation may act as allosteric regulators
      or inhibitors, affecting the catalytic activity and complex formation of these
      phosphatases. They are implicated in various cellular processes, including the
      DNA damage response and the regulation of the TOR signaling pathway. Other members
      of the family are involved in the reversible reduction of methionine sulfoxide
      to methionine, playing a role in cellular protection against oxidative stress.
