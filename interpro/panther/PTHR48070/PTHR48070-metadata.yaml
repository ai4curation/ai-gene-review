  name:
    name: Lovastatin nonaketide synthase thioesterase
    short: LovG
  description:
  - text: The LovG family proteins are primarily involved in the biosynthesis of various
      secondary metabolites with diverse biological activities, including antihypercholesterolemic
      agents, mycotoxins, antifungal agents, and other bioactive compounds. Members
      of the LovG family typically function as esterases or hydrolases, catalyzing
      the release of covalently bound intermediates from polyketide synthases or non-ribosomal
      peptide synthetases during the biosynthetic pathways. These enzymes play crucial
      roles in the processing and maturation of complex natural products, often contributing
      to the structural diversity and bioactivity of the compounds. The family is
      named after the LovG enzyme involved in the biosynthesis of lovastatin, a well-known
      cholesterol-lowering drug.
