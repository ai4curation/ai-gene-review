  name:
    name: Class-I pyridine nucleotide-disulfide oxidoreductase
    short: Class-I_Pyr_Nuc-Dis_Oxidored
  description:
  - text: This family of proteins is involved in redox reactions, where they play
      a crucial role in the transfer of electrons within cells. They are key components
      of various enzyme complexes, including the glycine cleavage system and alpha-ketoacid
      dehydrogenase complexes, which are essential for metabolic processes such as
      the conversion of pyruvate to acetyl-CoA and the degradation of glycine. Some
      members also participate in the reduction of mycothione, a unique antioxidant
      found in certain bacteria. Additionally, these proteins can have moonlighting
      functions, such as involvement in spermatazoa capacitation and acrosome reaction,
      or acting as serine proteases. Their activity is regulated by various factors,
      including the presence of metal ions and the formation of heterodimers.
