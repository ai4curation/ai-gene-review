  name:
    name: Isonitrile Hydratase and Quaternary Amine Regulator
    short: INH-QAR
  description:
  - text: This family of proteins includes enzymes and transcriptional regulators.
      The enzymes catalyze the hydration of isonitriles to formamides, likely playing
      a role in detoxification processes. They are sensitive to thiol and oxidizing
      reagents. The transcriptional regulators are involved in the metabolism of quaternary
      amines, such as choline and carnitine, by activating the transcription of genes
      involved in their catabolism and transport. These regulators are critical for
      the induction of specific genes in response to various metabolites and may be
      important for bacterial interactions with eukaryotes.
