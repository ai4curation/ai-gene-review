  name:
    name: Membrane Fusion Protein (MFP)
    short: Membrane_Fusion_Protein_MFP
  description:
  - text: The membrane fusion protein (MFP) family is involved in various efflux systems
      that transport substances across the cell membrane. Members of the MFP family
      function as part of tripartite complexes, which typically include an inner membrane
      transporter, an MFP, and an outer membrane channel. These systems can confer
      resistance to a range of substances, including macrolides, novobiocin, and deoxycholate.
      Some MFPs stimulate the ATPase activity of their associated transporters, promoting
      a closed, ATP-bound state that enhances substrate binding. They also provide
      a physical link between the inner membrane transporter and the outer membrane
      channel. Additionally, certain MFPs are involved in the secretion and recycling
      of siderophores, such as pyoverdine, which are critical for iron acquisition.
      The MFP family plays a role in antibiotic resistance, nodulation signaling,
      and potentially in the transport of glycolipids like rough-core lipopolysaccharide.
