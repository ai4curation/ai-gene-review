  name:
    name: Ubiquitin carboxyl-terminal hydrolase
    short: Ub_carboxyl-term_hydrolase
  description:
  - text: The ubiquitin carboxyl-terminal hydrolase family, also known as deubiquitinating
      enzymes (DUBs), plays a crucial role in various cellular processes by cleaving
      ubiquitin from ubiquitinated proteins, thus regulating protein turnover and
      preventing degradation. Members of this family are involved in cell cycle regulation,
      DNA repair, transcriptional regulation, autophagy, and signal transduction.
      They exhibit specificity for different ubiquitin linkages and substrates, including
      histones, signaling receptors, and structural proteins, thereby influencing
      pathways such as NF-kappa-B activation, TGF-beta receptor signaling, and the
      spindle assembly checkpoint. Their activities contribute to the maintenance
      of protein homeostasis, genomic stability, and cellular response to stress and
      damage.
