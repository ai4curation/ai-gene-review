  name:
    name: Tripeptidyl-peptidase I and related peptidases
    short: Tripeptidyl-peptidase_I
  description:
  - text: This family of proteins includes lysosomal serine proteases with tripeptidyl-peptidase
      I activity, which may act as non-specific lysosomal peptidases generating tripeptides
      from the breakdown products produced by lysosomal proteinases. These enzymes
      require substrates with an unsubstituted N-terminus. Additionally, the family
      encompasses secreted tripeptidyl-peptidases that degrade proteins at acidic
      pHs and are implicated in virulence. Some members are known to be inhibited
      by specific protease inhibitors, indicating a regulatory mechanism for their
      proteolytic activity. The family plays a role in protein degradation and processing,
      contributing to various physiological processes, including virulence in certain
      species.
