  name:
    name: FAD-linked Oxidoreductases in Biosynthesis Pathways
    short: FAD-linked_Oxidoreductases_BP
  description:
  - text: The FAD-linked oxidoreductase family is involved in various biosynthetic
      pathways across different organisms, catalyzing oxidation-reduction reactions.
      Members of this family play key roles in the biosynthesis of ergot alkaloids,
      cytokinins, mycotoxins, and other secondary metabolites. They are responsible
      for the transformation of specific substrates through redox reactions, often
      utilizing FAD as a cofactor. These enzymes are crucial for the production of
      compounds with pharmaceutical and agricultural significance, such as antimicrobial
      agents, plant hormones, and toxins. The family also includes enzymes involved
      in the biosynthesis of ascorbic acid and the epimerization of decaprenyl-phospho-ribose
      to decaprenyl-phospho-arabinose, a precursor for cell-wall arabinans in mycobacteria.
