  name:
    name: Coronaviruses polyprotein 1ab
    short: Coronavir_polyprotein_1ab
  description:
  - text: The coronaviruses polyprotein 1ab family is involved in the replication
      and transcription of viral RNA. It includes a multifunctional replicase polyprotein
      that contains enzymatic activities necessary for viral life cycle processes,
      such as RNA-directed RNA polymerase, helicase, and various proteinases. These
      enzymes participate in the formation of viral RNA cap structures, cleavage of
      the polyprotein into functional units, unwinding of RNA and DNA duplexes, and
      evasion of host immune responses. The family plays a critical role in the assembly
      of viral replication complexes, modulation of host cell survival pathways, inhibition
      of host translation, and manipulation of host membrane structures to facilitate
      viral replication.
