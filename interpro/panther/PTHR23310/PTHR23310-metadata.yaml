  name:
    name: Acyl-CoA-binding/ATG37
    short: ACBP/ATG37
  description:
  - text: The ACBP/ATG37 family comprises proteins that bind medium- and long-chain
      acyl-CoA esters with high to very high affinity, suggesting a role as intracellular
      carriers of acyl-CoA esters. Some family members are implicated in the biosynthesis
      of phospholipids by interacting with phosphatidic acid and phosphatidylcholine.
      The family includes proteins that may function in energy metabolism, with certain
      members acting as receptors for pexophagy. Some proteins within the family can
      displace diazepam from the benzodiazepine recognition site on the GABA type
      A receptor, indicating a potential role as neuropeptides modulating GABAergic
      neurotransmission. Additionally, there are indications of involvement in sperm
      energy metabolism, resistance to cold and freezing, and regulation of multiple
      biological processes including GABA neurotransmission and sporulation.
