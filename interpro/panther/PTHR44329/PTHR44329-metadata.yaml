  name:
    name: Serine/Threonine Kinases and Pseudokinases
    short: Ser/Thr_Kinases-Pseudokinases
  description:
  - text: This family of proteins includes both active serine/threonine kinases and
      pseudokinases. The active kinases are involved in various cellular processes
      such as signal transduction pathways, stress responses, and regulation of gene
      expression. They may function in defense mechanisms, potassium homeostasis,
      and viral egress. The pseudokinases, despite lacking catalytic activity, play
      crucial roles in programmed cell death processes like necroptosis. They are
      activated by phosphorylation and binding to specific inositol phosphates, leading
      to cellular events such as membrane localization and plasma membrane damage.
      Some family members are also involved in the regulation of nuclear envelope
      integrity in response to viral infection.
