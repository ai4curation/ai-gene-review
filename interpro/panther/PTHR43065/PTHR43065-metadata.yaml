  name:
    name: Bacterial Two-component Regulatory Systems
    short: Bact_2-compnt_RegSys
  description:
  - text: The protein family consists of sensor histidine kinases and response regulators
      that form part of two-component regulatory systems, which are pivotal in bacterial
      signal transduction. These proteins respond to various environmental stimuli,
      such as light, oxygen levels, nitrogen limitation, and the presence of specific
      compounds like zinc, lead, or dicarboxylates. Upon sensing these signals, the
      sensor kinases autophosphorylate and transfer the phosphate group to their corresponding
      response regulators, modulating their activity. This phosphorylation event leads
      to changes in gene expression, affecting processes like nitrogen fixation, sporulation,
      virulence, motility, and biofilm formation. The family also includes proteins
      that can act as phosphatases, reversing the phosphorylation under certain conditions
      to modulate the response to the changing environment.
