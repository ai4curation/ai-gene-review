  name:
    name: Non-receptor Tyrosine-protein Phosphatases
    short: NonRcpt_TyrProt_Phosphatase
  description:
  - text: The protein family includes tyrosine-protein phosphatases that are non-receptor
      types and are involved in various cellular processes. Members of the family
      are targeted to sites of actin polymerization in response to extracellular stimuli
      and exhibit tyrosine phosphatase activity towards tyrosyl phosphorylated substrates.
      Some family members negatively regulate apoptosis induced by FAS and NGFR-mediated
      pro-apoptotic signaling, potentially through the dephosphorylation of PIK3R2
      and regulation of PI3K signaling. Additionally, a member of the family may play
      a role in tight junction formation and binds to phosphatidylinositol 3,4-bisphosphate,
      which is necessary for localization to the basolateral cell membrane. The family's
      involvement in these processes highlights their role in cell signaling and structural
      organization.
