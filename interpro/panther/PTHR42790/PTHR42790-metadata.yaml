  name:
    name: Class-I PLP-Dependent Aminotransferase
    short: Class-I_PLP-Dep_Aminotransf
  description:
  - text: The Class-I Pyridoxal-Phosphate-Dependent Aminotransferase family is involved
      in a variety of metabolic pathways, catalyzing the transfer of amino groups
      between amino acids and alpha-keto acids. Members of this family exhibit broad
      substrate specificity, participating in the biosynthesis and degradation of
      amino acids such as alanine, methionine, and aromatic amino acids like phenylalanine,
      tyrosine, and tryptophan. They are also implicated in the production of secondary
      metabolites and can function in the salvage pathways of certain amino acids.
      Some members regulate the expression of efflux pumps in bacteria and may possess
      aminotransferase activity. The enzymes typically utilize pyridoxal phosphate
      as a cofactor and are essential for various cellular processes, including the
      synthesis of neurotransmitters and the interconversion of amino acids for energy
      metabolism.
