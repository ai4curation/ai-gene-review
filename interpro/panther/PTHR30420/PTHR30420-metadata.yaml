  name:
    name: Succinylarginine Dihydrolase
    short: Succinylarginine_dihydrolase
  description:
  - text: The succinylarginine dihydrolase family comprises enzymes that play a crucial
      role in the catabolism of arginine. Members of this family are responsible for
      the hydrolysis of N(2)-succinylarginine to produce N(2)-succinylornithine, ammonia,
      and CO(2). This reaction is part of the arginine degradation pathway, which
      is important for the regulation of arginine concentrations within the cell and
      for the generation of energy. The enzymes in this family are characterized by
      their ability to catalyze this specific hydrolytic reaction, which is essential
      for the proper functioning of the arginine catabolic process.
