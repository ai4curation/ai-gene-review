  name:
    name: DEAD box helicase family, DEAH subfamily, FANCM sub-subfamily
    short: DEAD-DEAH_FANCM_subfamily
  description:
  - text: The DEAD box helicase family, DEAH subfamily, FANCM sub-subfamily, is involved
      in DNA damage repair, genome maintenance, and homologous recombination. Members
      of this family exhibit ATP-dependent DNA helicase activity, capable of unwinding
      D-loops and playing a role in limiting crossover recombinants during mitotic
      DNA double-strand break repair. They are components of the FANCM-MHF complex,
      which promotes gene conversion at blocked replication forks, likely through
      stalled fork reversal. Some members are DNA-dependent ATPases in the Fanconi
      anemia core complex, crucial for FA pathway activation, DNA cross-linking drug
      resistance, and chromosomal breakage prevention. They bind various DNA substrates,
      including dsDNA, fsDNA, and Holliday junctions, with ATP-dependent DNA branch
      migration activity. This family also includes proteins involved in meiotic recombination,
      DSB repair, and synthesis-dependent strand annealing, contributing to DNA interstrand
      cross-link repair and SDSA pathway.
