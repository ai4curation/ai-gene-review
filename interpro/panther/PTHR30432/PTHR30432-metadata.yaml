  name:
    name: Molybdate-responsive transcriptional regulator
    short: Molybdate_resp_trans_reg
  description:
  - text: This family of proteins includes transcriptional regulators that interact
      with molybdate. They function as sensors and regulators of molybdate transport
      and metabolism within the cell. Upon molybdate binding, these proteins undergo
      conformational changes that facilitate dimerization. The resulting dimer is
      capable of binding DNA, particularly upstream of operons like modABC, which
      are involved in molybdate transport. These proteins can act as repressors or
      enhancers of gene expression, affecting not only molybdate transport systems
      but also genes encoding molybdoenzymes. Some family members have been shown
      to bind tungstate as well. Structurally, these proteins are characterized by
      a winged helix-turn-helix motif for DNA interaction and a molybdate-binding
      domain that stabilizes the dimer upon ligand binding.
