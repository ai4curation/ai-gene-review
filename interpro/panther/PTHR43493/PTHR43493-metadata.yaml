  name:
    name: Type II DNA Topoisomerases
    short: Type_II_DNA_Topoisomerases
  description:
  - text: This family of proteins includes type II topoisomerases, which are enzymes
      that modulate the topological states of DNA. They are involved in processes
      requiring DNA strand separation such as replication, transcription, recombination,
      and repair. These proteins can introduce negative supercoils into DNA in an
      ATP-dependent manner, and are also capable of relaxing supercoils and decatenating
      interlinked DNA circles. They function by creating transient double-stranded
      breaks in the DNA and passing another segment of the DNA helix through this
      break before resealing it. Some family members are targets for antibiotics that
      inhibit their activity, which is crucial for bacterial viability and cell division.
