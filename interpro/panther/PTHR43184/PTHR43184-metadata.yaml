  name:
    name: Major Facilitator Superfamily Organophosphate:Pi Antiporter
    short: MFS_OPA
  description:
  - text: This family of proteins includes transporters that are part of the major
      facilitator superfamily. Members of this family function primarily as inorganic
      phosphate and glucose-6-phosphate antiporters, facilitating the exchange of
      these molecules across the endoplasmic reticulum membrane. Some proteins within
      this family are capable of transporting cytoplasmic glucose-6-phosphate into
      the lumen of the endoplasmic reticulum while translocating inorganic phosphate
      in the opposite direction. Certain members, however, lack glucose-6-phosphate
      antiporter activity and instead may form complexes with other proteins to facilitate
      the transport of different substrates, such as nitrogen-containing-bisphosphonates
      in osteoclasts. The activity of some family members is known to be inhibited
      by vanadate.
