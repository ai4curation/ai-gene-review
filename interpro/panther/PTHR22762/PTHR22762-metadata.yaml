  name:
    name: Glycosyl Hydrolase Family 31
    short: Glycosyl_hydrolase_31
  description:
  - text: The glycosyl hydrolase 31 family encompasses enzymes with diverse functions
      primarily related to the hydrolysis and modification of glycosidic bonds. Members
      of this family are involved in the degradation of glycogen to glucose in lysosomes,
      cleaving both alpha-1,4 and alpha-1,6-glucosidic linkages. They play a role
      in the processing of N-linked oligosaccharides on newly synthesized glycoproteins
      and in the maturation and localization of certain proteins to the cell surface
      and cilia. Some enzymes exhibit alpha-transglucosylase activity, transferring
      glucosyl units to various acceptors, while others are involved in the degradation
      of cellulosic biomass, with both alpha- and beta-glucosidase activities. The
      family also includes enzymes that participate in the final stage of carbohydrate
      digestion in the small intestine, such as sucrase-isomaltase, which is specific
      for alpha-1,4- and alpha-1,6-oligosaccharides.
