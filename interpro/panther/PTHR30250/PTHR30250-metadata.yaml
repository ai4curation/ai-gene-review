  name:
    name: Polysaccharide Biosynthesis and Transport
    short: Poly_Biosynth_Transport
  description:
  - text: The AglR/Agl15 and polysaccharide synthase family is involved in various
      cellular processes related to the biosynthesis and transport of polysaccharides
      across the membrane. Members of this family function as flippases or transport
      proteins that facilitate the movement of lipid-linked saccharide precursors
      from the inner to the outer leaflet of the cytoplasmic membrane. These proteins
      are key components in the assembly of cell surface structures such as N-glycans,
      peptidoglycan, teichuronic acid, lipopolysaccharides, and capsular polysaccharides.
      They play crucial roles in the formation of protective layers, virulence factors,
      and biofilm matrices, contributing to the structural integrity and pathogenicity
      of various bacteria. The family includes proteins involved in the biosynthesis
      of specific glycan structures under low-salt conditions, the production of exopolysaccharides
      during biofilm formation, and the export of O-antigen components.
