  name:
    name: Class-III Pyridoxal-Phosphate-Dependent Aminotransferase
    short: Class-III_PLP-dep_AT
  description:
  - text: The Class-III Pyridoxal-Phosphate-Dependent Aminotransferase Family is involved
      in various amino acid and metabolite transamination processes. Members of this
      family catalyze the transfer of alpha-amino groups between donors and acceptors,
      playing key roles in metabolic pathways such as biotin biosynthesis, GABA degradation,
      and capsaicinoid biosynthesis. Notably, the BioA subfamily within this group
      is unique in utilizing S-adenosyl-L-methionine (SAM) as an amino donor to convert
      7-keto-8-aminopelargonic acid (KAPA) into 7,8-diaminopelargonic acid (DAPA),
      a precursor in biotin synthesis. Other members degrade gamma-amino butyric acid
      (GABA) or participate in the biosynthesis of capsaicinoids, the compounds responsible
      for the spiciness of chili peppers. This family is characterized by its dependence
      on the cofactor pyridoxal phosphate for aminotransferase activity.
