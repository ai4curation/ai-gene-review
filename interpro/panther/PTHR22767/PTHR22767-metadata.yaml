  name:
    name: N-terminal Acetyltransferase Complex Auxiliary
    short: NAT_Complex_Auxiliary
  description:
  - text: This family of proteins includes non-catalytic components of N-terminal
      acetyltransferase complexes, such as NatA and NatB, which are involved in the
      acetylation of the amino-terminal methionine residues of nascent polypeptides.
      Acetylation typically occurs on proteins beginning with specific amino acid
      sequences, including Met-Ser, Met-Gly, Met-Ala, Met-Asp, Met-Glu, Met-Asn, and
      Met-Met. This modification is important for a variety of cellular processes,
      including normal eukaryotic translation, protein stability, and protection against
      proteolytic degradation. Some members of this family also play roles in cell-cycle
      progression, development, immune response, and chromosome organization during
      meiosis.
