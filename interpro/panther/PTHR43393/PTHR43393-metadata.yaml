  name:
    name: LOG family pyrimidine/purine nucleotide 5'-monophosphatases
    short: LOG_family_nucleotidases
  description:
  - text: The LOG family proteins are enzymes that catalyze the hydrolysis of the
      N-glycosidic bond in various pyrimidine and purine nucleotide 5'-monophosphates,
      resulting in the production of ribose 5-phosphate and the corresponding nucleobases.
      The substrates for these reactions include AMP, GMP, IMP, CMP, dTMP, and UMP.
      The LOG family proteins do not have the capability to perform the reverse synthesis
      reactions. Their enzymatic activity is crucial for maintaining nucleoside pool
      homeostasis by breaking down surplus nucleotides and recycling the ribose component
      into metabolic pathways. This function is essential for optimal bacterial growth,
      especially in minimal glucose environments.
