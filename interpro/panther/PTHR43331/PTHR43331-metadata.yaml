  name:
    name: Homoserine Dehydrogenase
    short: HSD
  description:
  - text: This family of proteins is involved in the biosynthesis of amino acids,
      specifically catalyzing the reversible conversion of L-aspartate-beta-semialdehyde
      to L-homoserine. Members of this family are characterized by their enzymatic
      activity, which is highly specific for NAD(+) over NADP(+). The reaction they
      catalyze is an important step in the metabolic pathway leading to the synthesis
      of threonine, isoleucine, and methionine. Some members are subject to feedback
      inhibition by threonine, which regulates the flow of metabolites through the
      pathway according to cellular needs. The proteins do not display significant
      activity changes in the presence of NaCl or KCl, and L-threonine and L-serine
      do not markedly inhibit the oxidation activity in certain members.
