  name:
    name: Zinc Chaperone and cDPG Synthetase
    short: Zn_Chap_cDPG_Synth
  description:
  - text: This family of proteins includes zinc chaperones and cyclic 2,3-diphosphoglycerate
      synthetases. The zinc chaperones are involved in the direct transfer of zinc
      cofactors to target proteins, activating them. This transfer occurs from a CXCC
      motif within the GTPase domain to the zinc binding site of the target proteins
      and is dependent on GTP hydrolysis. These proteins contribute to optimal growth
      under zinc starvation conditions. The cyclic 2,3-diphosphoglycerate synthetases
      catalyze the formation of cyclic 2,3-diphosphoglycerate from ATP, forming an
      intramolecular phosphoanhydride bond.
