  name:
    name: Adenylate-forming Reductase
    short: Adenylate-forming_Reductase
  description:
  - text: The adenylate-forming reductase family is involved in natural product biosynthesis,
      resembling non-ribosomal peptide synthetases but typically modifying a single
      substrate rather than condensing multiple building blocks. Members activate
      substrate amino acids or carboxylic acids through an adenylation domain, link
      them as thioesters to a peptidyl carrier protein domain, and often feature a
      reductase domain for further processing. This family contributes to the biosynthesis
      of diverse compounds, including mycotoxins like fusaric acid, phytotoxins such
      as cichorine, and potential pharmaceuticals like ascochlorin and ascofuranone.
      Some members also participate in primary metabolism, such as phenylacetate-CoA
      ligases involved in phenylalanine metabolism. The family showcases versatility
      in substrate specificity, ranging from amino acids to aromatic and aliphatic
      acids, highlighting their role in the production of a wide array of bioactive
      secondary metabolites.
