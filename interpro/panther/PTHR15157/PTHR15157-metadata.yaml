  name:
    name: Autophagy and membrane trafficking regulator
    short: Autophagy_membrane_regulator
  description:
  - text: This family of proteins is involved in various cellular processes including
      autophagy, membrane trafficking, and chromosomal stability. Members of this
      family function as part of PI3-kinase complexes, which are essential for the
      formation of phosphatidylinositol 3-phosphate, recruitment of specific proteins
      to membranes, and maturation of autophagosomes. They also play roles in endosome-to-Golgi
      retrograde transport, endocytic trafficking, cytokinesis, and DNA repair. Some
      members are implicated in the regulation of organ development and pathogenicity
      in different organisms. The family includes proteins that can activate lipid
      kinase activity, mediate membrane fusion events, and are involved in the response
      to viral infection.
