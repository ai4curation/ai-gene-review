  name:
    name: Spindly/BICDR Dynein Motor Adapter
    short: Spindly/BICDR_Dynein_Adapter
  description:
  - text: The Spindly/BICDR protein family is involved in the regulation of dynein
      motor activity and cargo transport. Members of this family are essential for
      the localization of dynein and dynactin to the mitotic kinetochore, controlling
      the interaction between the kinetochore and spindle microtubules and facilitating
      the formation of end-on kinetochore-microtubule attachments via the NDC80 complex.
      They act as adapter proteins, linking dynein to various cargos and enhancing
      dynein processivity, which is crucial for long-distance movement along microtubules.
      Additionally, they play roles in correct spindle orientation, cell migration,
      and neurite outgrowth by regulating secretory vesicle transport in developing
      neurons.
