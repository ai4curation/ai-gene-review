  name:
    name: Tetrahydrofolate dehydrogenase/cyclohydrolase
    short: THF_dehydrog/cyclohydrlase
  description:
  - text: The tetrahydrofolate dehydrogenase/cyclohydrolase family is involved in
      folate metabolism, crucial for the biosynthesis of nucleotides and amino acids.
      Members of this family are bifunctional enzymes that catalyze the interconversion
      of various one-carbon-substituted forms of tetrahydrofolate (THF). Specifically,
      they oxidize 5,10-methylenetetrahydrofolate to 5,10-methenyltetrahydrofolate
      and subsequently hydrolyze it to 10-formyltetrahydrofolate. These reactions
      are essential for purine and thymidylate synthesis, as well as for the remethylation
      of homocysteine to methionine, thus playing a key role in the one-carbon metabolism
      pathway. The family includes both monofunctional and bifunctional proteins,
      with some members located in the mitochondria and others in the cytoplasm, indicating
      a compartmentalized regulation of folate-mediated one-carbon metabolism in eukaryotic
      cells.
