  name:
    name: Glycogen Synthase Kinase-3
    short: GSK-3
  description:
  - text: The GSK-3 protein family is a group of constitutively active serine/threonine
      kinases that play key roles in various cellular processes, including glucose
      homeostasis, Wnt signaling, transcription factor regulation, and microtubule
      stability. Members of the family phosphorylate a range of substrates, leading
      to diverse outcomes such as the inhibition of glycogen synthesis, modulation
      of circadian rhythms, and regulation of cell differentiation and apoptosis.
      In Wnt signaling, they form complexes with other proteins to phosphorylate and
      regulate the stability of beta-catenin. They also contribute to the development
      of insulin resistance and are implicated in neurodegenerative diseases like
      Alzheimer's through the phosphorylation of tau protein. Additionally, they are
      involved in the regulation of autophagy, cell polarity, axon outgrowth, and
      stress responses. The activity of GSK-3 family members is regulated by phosphorylation
      and can be inhibited by lithium.
