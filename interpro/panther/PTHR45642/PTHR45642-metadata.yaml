  description:
  - text: The GDSL lipolytic enzyme family is characterized by a broad range of esterase
      and lipase activities, with members capable of hydrolyzing ester bonds in substrates
      with varying acyl chain lengths. These enzymes are known for their roles in
      plant development, pollen coat formation, and male fertility, as well as bacterial
      processes such as biofilm formation, cell motility, and rhamnolipid production.
      The family includes proteins with a C-terminal autotransporter domain that facilitates
      the translocation of the catalytic domain to the cell surface in bacteria. In
      plants, the family is involved in diverse biological functions, including lipid
      metabolism and plant defense. The GDSL motif, a conserved sequence within the
      enzymes, is integral to their catalytic function.
