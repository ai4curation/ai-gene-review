  name:
    name: Ubiquitin ligases and GEF domain-containing protein
    short: Ub_ligase/GEF_domain
  description:
  - text: This family of proteins includes E3 ubiquitin-protein ligases and guanine
      nucleotide exchange factors (GEFs), which are involved in a variety of cellular
      processes. The E3 ubiquitin-protein ligases in this family are responsible for
      the ubiquitination of substrates, a post-translational modification that can
      lead to protein degradation, signal transduction, or other cellular responses.
      They play roles in DNA damage repair, iron metabolism, and the regulation of
      signaling pathways such as the insulin-like growth factor receptor pathway.
      The GEFs in this family are involved in the activation of small GTPases, which
      are molecular switches that regulate secretion processes. Other members of this
      family are implicated in UV-B photoreception, mitochondrial function, and the
      regulation of plant growth and development.
