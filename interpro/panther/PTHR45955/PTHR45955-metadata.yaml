  name:
    name: Phosphohexose Mutase
    short: Phosphohexose_Mutase
  description:
  - text: The Phosphohexose Mutase family includes enzymes that catalyze the isomerization
      of GlcNAc-6-P to GlcNAc-1-P, a crucial step in the synthesis of UDP-GlcNAc.
      UDP-GlcNAc serves as a vital sugar nucleotide in various glycosylation processes,
      such as protein N- and O-glycosylation, and is a precursor for chitin biosynthesis.
      Additionally, some family members exhibit phosphoglucomutase activity, further
      diversifying their functional repertoire. The activity of these enzymes is essential
      for the supply of amino sugars for glycoprotein oligosaccharide chains, underpinning
      their significance in cellular metabolism and structural integrity.
