  name:
    name: Mitochondrial and Chloroplastic Carrier
    short: Mito/Chloro_Carrier
  description:
  - text: This family of proteins includes mitochondrial and chloroplastic carriers
      that transport various substrates across the inner mitochondrial membrane or
      chloroplast membranes. Members are involved in the exchange of S-adenosylmethionine
      (SAM) and S-adenosylhomocysteine (SAH) as part of methylation processes, iron
      transport into chloroplasts, and magnesium homeostasis. Some proteins in this
      family have been described to transport nucleotides and cofactors, playing key
      roles in cellular metabolism and the maintenance of mitochondrial function.
