  description:
  - text: This family of proteins is part of the major facilitator superfamily and
      is involved in the active transport of specific substrates across cellular membranes.
      Members of this family function as transporters for various compounds, including
      cyanate and anionic 4-hydroxy-benzoate, and are also implicated in the efflux
      of 2-nitroimidazole. These transport activities suggest roles in cellular detoxification,
      nutrient uptake, and metabolic processes.
