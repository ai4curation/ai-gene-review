  name:
    name: PfkB Carbohydrate Kinase
    short: PfkB_Carb_Kinase
  description:
  - text: The PfkB family of carbohydrate kinases encompasses enzymes that catalyze
      the phosphorylation of various sugars and nucleosides, utilizing ATP or other
      nucleoside triphosphates as phosphate donors. Key members, known as ribokinases,
      specifically phosphorylate ribose at O-5 to produce D-ribose-5-phosphate, a
      precursor for nucleotide, histidine, and tryptophan synthesis, or for the pentose
      phosphate pathway. Other family members exhibit broader substrate specificity,
      phosphorylating different nucleosides and even non-sugar substrates. Activity
      is commonly regulated by monovalent cations, particularly potassium, which induce
      conformational changes affecting substrate affinity. Some enzymes also display
      inhibition by various compounds or alternative substrate inhibition at high
      ATP concentrations.
