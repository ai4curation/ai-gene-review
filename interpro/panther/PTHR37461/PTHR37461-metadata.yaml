  name:
    name: Anti-sigma-K/W factor
    short: Anti-sigma-K/W_factor
  description:
  - text: The anti-sigma-K factor family includes proteins that regulate the activity
      of extracytoplasmic function (ECF) sigma factors such as SigK by maintaining
      them in an inactive state. These anti-sigma factors bind to their respective
      sigma factors and prevent them from initiating transcription. The inactivation
      is reversed through a process known as regulated intramembrane proteolysis (RIP),
      which is triggered by extracytoplasmic signals. This proteolytic cascade involves
      sequential cleavage by site-1 protease (S1P) and site-2 protease (S2P, Rip1),
      followed by further degradation by cytoplasmic proteases, ultimately releasing
      the sigma factor to activate gene expression. Some members of the family may
      be dysfunctional due to genetic polymorphisms, leading to altered regulation
      of sigma factor-dependent genes. The family also includes proteins like RsiW,
      which belong to the zinc-associated anti-sigma factor (ZAS) superfamily and
      regulate sigma factors such as SigW.
