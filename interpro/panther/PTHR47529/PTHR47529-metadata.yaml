  name:
    name: Periplasmic chaperone PpiD
    short: PpiD_chaperone
  description:
  - text: The PpiD chaperone family comprises periplasmic chaperones that serve as
      gatekeepers at the SecYEG translocon, a protein-conducting channel in the bacterial
      inner membrane. Members of the family facilitate the translocation of precursor
      proteins across the SecYEG complex by interacting with substrates during translocation.
      They are also involved in the release and possibly the early folding of newly
      synthesized secreted proteins at the periplasmic exit site of the Sec translocon.
      While one member has been implicated in bacteriophage T4 infection, suggesting
      a role in the penetration of the inner membrane by the bacteriophage injection
      machinery, the family generally does not exhibit peptidyl-prolyl isomerase activity.
      The family's structure typically includes an N-terminal helix for membrane anchoring
      and multiple periplasm-facing domains, with at least one or possibly two acting
      as chaperone domains and a parvulin-like domain that lacks catalytic activity.
