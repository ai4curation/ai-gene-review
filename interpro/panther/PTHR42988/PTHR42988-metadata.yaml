  name:
    name: Cyclic nucleotide phosphodiesterase class-III
    short: CNP_phosphodiesterase-III
  description:
  - text: The cyclic nucleotide phosphodiesterase class-III family encompasses enzymes
      that hydrolyze cyclic nucleotides to their corresponding monophosphates, thus
      playing a crucial role in regulating intracellular concentrations of cyclic
      AMP (cAMP) and cyclic GMP (cGMP). These enzymes modulate cAMP-dependent pathways,
      influencing responses to nutritional stress and virulence factor regulation
      in various organisms. Some family members exhibit dual specificity for cAMP
      and cGMP, while others preferentially hydrolyze glycerophosphodiesters, indicating
      a broader substrate specificity. The activity of these phosphodiesterases is
      regulated by divalent metal ions such as Ca(2+), Mg(2+), and Mn(2+), with some
      also being influenced by the presence of transition-metal ions or activated
      by iron. The family includes enzymes with a C-terminal extension that adjusts
      substrate alignment in the active site and affects subcellular localization
      and expression levels.
