  name:
    name: Glycosyltransferase 2/OpgH subfamily
    short: Glycosyltr_2/OpgH_subfam
  description:
  - text: The Glycosyltransferase 2 family, specifically the OpgH subfamily, is involved
      in the biosynthesis of osmoregulated periplasmic glucans (OPGs), which are important
      for bacterial response to osmotic stress. Members of this subfamily transfer
      glucose from UDP-glucose to various lipid carriers, forming glucans that play
      a role in the protection and structural integrity of bacterial cells. Some members
      are also implicated in the biosynthesis of non-bilayer-forming membrane lipids
      and cellulose, contributing to membrane stability and cell wall structure, respectively.
      The cellulose synthase members of the family are activated by c-di-GMP and are
      involved in the production of extracellular cellulose for mechanical and chemical
      protection, particularly in multicellular bacterial communities.
