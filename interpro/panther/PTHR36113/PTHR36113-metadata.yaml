  name:
    name: Fosfomycin Resistance Enzymes
    short: Fosfomycin_Res_Enzymes
  description:
  - text: This family of proteins includes enzymes that confer resistance to the antibiotic
      fosfomycin. Members of this family are involved in the modification of fosfomycin,
      thereby inactivating its antibacterial properties. The primary mechanism involves
      the catalysis of the addition of a thiol or glutathione group to fosfomycin.
      Some members require potassium ions for optimal activity. Additionally, certain
      proteins within this family are capable of catalyzing the hydration of fosfomycin.
      These activities are crucial for bacterial survival in the presence of fosfomycin
      and are a part of the broader antibiotic resistance mechanisms found in various
      bacteria.
