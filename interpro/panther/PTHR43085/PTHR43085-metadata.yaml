  name:
    name: PfkB Carbohydrate Kinase
    short: PfkB_Carbo_kinase
  description:
  - text: The PfkB carbohydrate kinase family encompasses enzymes that catalyze the
      phosphorylation of various sugars and sugar derivatives, playing key roles in
      metabolic pathways. Members of this family are involved in the phosphorylation
      of adenosine, fructose, inositol, tagatose, and deoxygluconate, among others,
      contributing to the synthesis of AMP, starch formation, phytic acid biosynthesis,
      and the Entner-Doudoroff pathway. The family includes enzymes such as adenosine
      kinase, fructokinase, inositol 3-kinase, tagatose kinase, and 2-dehydro-3-deoxygluconokinase.
      These enzymes are regulated by various factors including substrate inhibition,
      competitive inhibition by analogs, and the presence of potassium ions. Some
      members are also involved in the metabolism of antimycobacterial compounds,
      indicating a potential role in therapeutic pathways.
