  name:
    name: Calcium-dependent Serine/Threonine Protein Kinases
    short: CDPK_Ser/Thr_kinases
  description:
  - text: Calcium-dependent protein kinases (CDPKs) are a family of serine/threonine
      protein kinases that play pivotal roles in calcium signaling pathways. They
      function as sensors and effectors of intracellular calcium levels, translating
      changes in calcium concentration into phosphorylation events that regulate various
      cellular processes. CDPKs are involved in a wide range of functions, including
      stress responses, cell cycle progression, cytokinesis, and motility. They are
      also implicated in the regulation of gene expression, development, and immune
      responses. CDPKs typically consist of a kinase domain, an autoinhibitory junction
      domain, and a calmodulin-like domain. The kinase activity of CDPKs is regulated
      by calcium binding, which induces conformational changes leading to autophosphorylation
      and activation of the kinase. This family is essential for the coordination
      of cellular responses to environmental cues and developmental signals across
      various organisms, particularly in plants and certain parasites.
