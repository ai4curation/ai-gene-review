  description:
  - text: The Amino Acid-Polyamine-Organocation (APC) Superfamily is a diverse group
      of membrane-bound transport proteins involved in the active transport of amino
      acids across the cytoplasmic membrane. Members of this family are permeases
      that facilitate the uptake of various amino acids, including aromatic amino
      acids like phenylalanine, tyrosine, and tryptophan, as well as others such as
      proline, asparagine, serine, and GABA (gamma-aminobutyric acid). Some permeases
      are specific for certain amino acids, while others have broader specificity.
      They play crucial roles in nutrient uptake, nitrogen assimilation, and cellular
      responses to environmental conditions. The transport mechanism is often coupled
      to the membrane potential and can be regulated by substrate availability and
      competition, as well as by the cellular metabolic state.
