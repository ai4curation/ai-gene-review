  name:
    name: REP-associated tyrosine transposase
    short: RAYT_transposase
  description:
  - text: This family of proteins includes transposases that are associated with repeated
      extragenic palindromes (REPs) and are involved in the transposition of insertion
      sequence (IS) elements. Members of this family are responsible for the excision
      of the IS element from the donor DNA and its reinsertion into the target DNA,
      which can result in an increase in the copy number of the IS. These proteins
      are typically flanked by REPs and can bind and cleave at these sites, potentially
      playing a role in the generation of variability and amplification of bacterial
      interspersed mosaic elements (BIMEs). The activity of these transposases is
      regulated by metal ions such as magnesium and manganese.
