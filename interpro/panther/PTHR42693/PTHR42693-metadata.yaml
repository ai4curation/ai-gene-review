  name:
    name: Sulfatase enzyme
    short: Sulfatase
  description:
  - text: The sulfatase family encompasses enzymes that hydrolyze sulfate esters from
      various substrates, including complex carbohydrates, steroids, and aromatic
      compounds. Members of the family are involved in diverse biological processes
      such as degradation of glycosaminoglycans, mineralization of sulfates, and conversion
      of sulfated steroid precursors to active steroids. Some sulfatases are implicated
      in the degradation of ulvan, a polysaccharide in green seaweed, while others
      are active towards artificial substrates like 4-methylumbelliferyl sulfate.
      Arylsulfatases, a subset within the family, hydrolyze sulfate from aromatic
      compounds, playing roles in cellular processes and environmental sulfate turnover.
      The family's activity is regulated by factors like phosphate, which can inhibit
      some members by forming a covalent bond with the active site 3-oxoalanine. The
      sulfatase family is essential for various organisms, from bacteria to humans,
      for maintaining sulfate homeostasis and processing sulfated molecules.
