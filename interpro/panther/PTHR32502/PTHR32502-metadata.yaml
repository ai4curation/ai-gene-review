  name:
    name: GatZ/KbaZ carbohydrate metabolism
    short: GatZ_KbaZ_carbometab
  description:
  - text: The GatZ/KbaZ family is involved in carbohydrate metabolism, specifically
      in the catabolism of galactitol and N-acetylgalactosamine. Members of the GatZ
      subfamily function as components of the tagatose-1,6-bisphosphate aldolase GatYZ
      complex, which is essential for full activity and stability of the Y subunit.
      GatZ alone lacks aldolase activity but may act as a chaperone for proper folding
      of GatY. Similarly, the KbaZ subfamily members are part of the tagatose-1,6-bisphosphate
      aldolase KbaYZ complex, also required for the Y subunit's activity and stability,
      with KbaZ potentially serving a chaperone-like role. The family also includes
      proteins involved in the phosphoenolpyruvate-dependent sugar phosphotransferase
      system (PTS), which transports and phosphorylates sugars like mannose, fructose,
      and N-acetylgalactosamine. Additionally, some family members are implicated
      in the isomerization-deamination of galactosamine 6-phosphate, contributing
      to the degradation pathways of specific amino sugars.
