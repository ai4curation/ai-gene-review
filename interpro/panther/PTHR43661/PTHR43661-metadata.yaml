  name:
    name: Branched-chain amino acid biosynthesis IlvD/Edd
    short: BCAA_biosynth_IlvD/Edd
  description:
  - text: The IlvD/Edd family proteins are involved in the biosynthesis of branched-chain
      amino acids, which are essential components for protein synthesis in all forms
      of life. These enzymes catalyze crucial dehydration reactions in the metabolic
      pathways leading to the production of L-isoleucine and L-valine. Specifically,
      they dehydrate (2R,3R)-2,3-dihydroxy-3-methylpentanoate into 2-oxo-3-methylpentanoate
      and (2R)-2,3-dihydroxy-3-methylbutanoate into 2-oxo-3-methylbutanoate. These
      reactions are penultimate steps in the formation of the respective amino acids.
      The family also includes phosphogluconate dehydratases, which catalyze the dehydration
      of 6-phospho-D-gluconate in the pentose phosphate pathway, and D-xylonate dehydratases,
      which dehydrate D-xylonic acid to form 2-dehydro-3-deoxy-D-pentonate. These
      enzymes are characterized by their specificity for certain isomers and are regulated
      by various ions and compounds.
