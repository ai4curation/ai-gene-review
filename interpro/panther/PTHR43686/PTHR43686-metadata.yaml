  name:
    name: tRNA-cytidine(32) 2-sulfurtransferase
    short: TtcA
  description:
  - text: The TtcA family of proteins is responsible for the ATP-dependent 2-thiolation
      of cytidine at position 32 in tRNA, resulting in the formation of 2-thiocytidine
      (s(2)C32). This post-transcriptional modification process is crucial for the
      proper functioning of tRNA. The sulfur atoms necessary for this reaction are
      sourced from the cysteine/cysteine desulfurase (IscS) system. The activity of
      the TtcA family is essential for maintaining the structural stability and function
      of tRNA, which in turn supports accurate and efficient protein synthesis.
