  name:
    name: Glutamate 5-kinase
    short: Glu_5-kinase
  description:
  - text: The glutamate 5-kinase family is responsible for the phosphorylation of
      glutamate, resulting in the formation of L-glutamate 5-phosphate. This reaction
      is a key step in the biosynthesis of proline, which is an important amino acid
      for protein synthesis and structure. The enzyme activity is regulated by feedback
      inhibition, with proline and ADP acting as inhibitors to modulate the function
      of the kinase. Some members of the family have been noted to be inhibited by
      L-proline and its analogs, suggesting a tight regulation of the proline biosynthetic
      pathway. The family includes proteins that may be important for growth and survival,
      indicating a fundamental role in cellular metabolism.
