  name:
    name: ExeA/AAA ATPase DNA-binding & secretion
    short: ExeA_AAA_ATPase_DNA-bind
  description:
  - text: The ExeA/AAA ATPase family includes proteins involved in various cellular
      processes such as general secretion pathways and DNA transposition. Members
      of the family may play regulatory roles in secretion systems, facilitating the
      export of proteins across membranes. Some proteins within the family function
      as ATP-dependent DNA activators, selecting target DNA sites for transposition,
      recruiting recombinases, and catalytically activating them. They exhibit non-specific
      DNA-binding properties and can polymerize into helical filaments around DNA.
      This activity is crucial for processes like target-primed replication and preventing
      self-integration into viral genomes, a mechanism known as target immunity. The
      family typically possesses an N-terminal DNA-binding region, a central ATPase
      module, and a C-terminal domain that can bind to double-stranded DNA.
