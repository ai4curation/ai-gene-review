  name:
    name: ESCRT-I complex UEV domain-containing protein
    short: ESCRT-I_UEV_domain
  description:
  - text: This family of proteins is involved in the endosomal sorting complex required
      for transport (ESCRT) pathway, specifically as components of the ESCRT-I complex.
      They play a crucial role in the sorting of ubiquitinated cargo into multivesicular
      bodies (MVBs), which is essential for vesicular trafficking processes. Members
      of this family are also implicated in the regulation of cell growth and differentiation,
      acting as negative growth regulators. They have a role in cytokinesis and are
      involved in the budding of various viruses. Additionally, these proteins are
      associated with the exosomal release of certain molecules and may participate
      in the release of microvesicles distinct from exosomes.
