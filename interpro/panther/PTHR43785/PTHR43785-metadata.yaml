  name:
    name: Glutamine Synthetase
    short: Glutamine_Synthetase
  description:
  - text: The Glutamine Synthetase family includes enzymes that play a central role
      in nitrogen metabolism by catalyzing the ATP-dependent conversion of glutamate
      and ammonia to glutamine. Members of this family are multitasking proteins that
      also function as transcription coregulators and chaperones. They are involved
      in ammonium assimilation and regulate genes related to nitrogen metabolism.
      Some family members interact with transcriptional regulators like TnrA and GlnR,
      modulating their activity in response to nitrogen availability. Additionally,
      certain enzymes within the family are involved in the catabolism of monoamine
      ethanolamine and polyamines, contributing to cellular responses under specific
      environmental conditions.
