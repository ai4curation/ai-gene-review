  name:
    name: Nonulosonic Acid Synthase
    short: Nonulosonic_Acid_Synth
  description:
  - text: This family of proteins includes enzymes involved in the biosynthesis of
      sialic acid-like sugars, which are important for the modification of flagellin
      and other glycoconjugates. Members of this family catalyze the condensation
      of activated sugar precursors with phosphoenolpyruvate to produce distinct nonulosonic
      acids such as N,N'-diacetyllegionaminic acid and pseudaminic acid. These acids
      are structurally similar to sialic acids and play roles in bacterial virulence
      and flagellar assembly. Some family members are also involved in the production
      of N-acetylneuraminic acid, a common form of sialic acid, which is essential
      for neuronal development in higher organisms.
