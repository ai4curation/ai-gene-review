  name:
    name: Bacterial Polysaccharide Export ATP-binding
    short: Bact_Polysacc_Export_ATP-bd
  description:
  - text: The protein family is involved in the transport of polysaccharides across
      the cytoplasmic membrane. Members of the family are ATP-binding proteins that
      form part of ABC transporter complexes, which are responsible for the energy-dependent
      export of substances such as capsule polysaccharides, teichoic acids, O-antigens,
      and polysialic acid. These proteins are essential for the proper functioning
      of bacterial cell walls and capsules, contributing to the structural integrity
      and potentially to the virulence of various bacterial species by facilitating
      the export of critical components to the extracellular space.
