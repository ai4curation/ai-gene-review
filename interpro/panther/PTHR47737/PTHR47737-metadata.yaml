  name:
    name: Binding-protein-dependent ABC transporter permease
    short: ABC_transporter_permease
  description:
  - text: This family of proteins is involved in the transport of various substrates
      across cellular membranes as part of ABC transporter complexes. Members of this
      family are typically responsible for the translocation of specific osmolytes,
      such as glycine betaine, choline, proline betaine, and trimethylamine N-oxide
      (TMAO), which play a role in osmoprotection and metabolism. Some proteins within
      this family are also implicated in the uptake of other osmoprotectants like
      ectoine, DMSA, DMSP, carnitine, and are involved in cryoprotection. The activity
      of these transport systems can be regulated by environmental factors such as
      osmotic gradients or temperature changes.
