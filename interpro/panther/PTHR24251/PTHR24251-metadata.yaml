  name:
    name: Developmental metalloproteases and endocytic receptors
    short: Dev_metalloprotease_endo_rcpt
  description:
  - text: This family of proteins includes various members with roles in developmental
      processes, extracellular matrix formation, and cellular signaling. Some act
      as metalloproteases involved in the cleavage and activation of precursor proteins,
      influencing dorsal-ventral patterning and skeletogenesis during embryonic development.
      Others function as endocytic receptors, mediating the uptake of essential nutrients
      and vitamins, and playing a role in lipid and iron metabolism. Certain members
      are accessory subunits of neuronal receptors, modulating receptor activity and
      synaptic transmission. Additionally, some proteins in this family are implicated
      in eye development and fertilization processes.
