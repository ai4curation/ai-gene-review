  name:
    name: Isopropylmalate dehydratase and related enzymes
    short: IPM_dehydratase_rel_enz
  description:
  - text: The protein family is involved in the isomerization of specific tricarboxylic
      acids, playing a crucial role in various biosynthetic pathways. Members of this
      family catalyze the reversible isomerization between 2-isopropylmalate and 3-isopropylmalate
      through the intermediate formation of 2-isopropylmaleate. This reaction is a
      key step in the biosynthesis of leucine, an essential amino acid. Some family
      members also exhibit broad substrate specificity, catalyzing reactions involving
      cis-unsaturated tricarboxylic acids, including the dehydration of (R)-homocitrate
      to cis-homoaconitate and its hydration to homoisocitrate, which are part of
      the biosynthesis pathway of coenzyme B. The family includes enzymes like homoaconitase,
      which are involved in the alpha-aminoadipate pathway for lysine biosynthesis.
      The enzymes are characterized by their membership in the aconitase/IPM isomerase
      family and are found across a wide range of organisms, including bacteria, archaea,
      and eukaryotes.
