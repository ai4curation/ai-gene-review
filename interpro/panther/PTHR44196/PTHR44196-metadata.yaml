  name:
    name: Short-chain Dehydrogenases/Reductases
    short: SDR
  description:
  - text: The Short-chain Dehydrogenases/Reductases (SDR) family comprises enzymes
      that perform NAD(P)(H)-dependent oxidation-reduction reactions on a wide range
      of substrates. Members of the SDR family are typically involved in metabolic
      processes, including the reduction of ketones and aldehydes, and the biosynthesis
      of hormones, toxins, and antibiotics. The enzymes share a common structural
      fold and catalytic mechanism but exhibit diverse functional roles, such as putative
      oxidoreductases, ketoacyl reductases, ribitol dehydrogenases, fatty acyl-CoA
      reductases, and others involved in specialized biosynthetic pathways. The variability
      in substrate specificity and function reflects the adaptability of the SDR family
      to different biological contexts and the evolutionary divergence of its members.
