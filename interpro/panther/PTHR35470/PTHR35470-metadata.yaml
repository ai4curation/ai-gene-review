  name:
    name: CYSTM1 Heavy Metal Tolerance
    short: CYSTM1_HM_Tolerance
  description:
  - text: The CYSTM1 family proteins are involved in conferring resistance to various
      heavy metal ions. They achieve this by chelating the ions at the plasma membrane
      of root cells, which prevents the ions from entering the cells and reduces their
      accumulation within the organism. Members of the CYSTM1 family have been shown
      to interact with metals such as cadmium, copper, and aluminium. The chelation
      process is crucial for the detoxification and tolerance of these potentially
      toxic ions, allowing organisms to survive in environments with high concentrations
      of heavy metals.
