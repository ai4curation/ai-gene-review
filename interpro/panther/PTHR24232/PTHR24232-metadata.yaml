  name:
    name: G-protein coupled receptor 1
    short: GPCR1
  description:
  - text: The G-protein coupled receptor 1 family is characterized by its diverse
      roles in physiological processes, including signal transduction, inflammation,
      immune response, and cellular migration. Members of this family are activated
      by various ligands such as thrombin, kynurenic acid, lysophosphatidic acid,
      and endocannabinoids, leading to the activation of multiple intracellular pathways.
      They are involved in platelet activation, lipid metabolism, neutrophil recruitment,
      macrophage chemotaxis, and regulation of blood pressure. Some receptors in this
      family also have a role in the maintenance of hair growth and texture, as well
      as in the regulation of immune cell functions, including T-cell activity and
      macrophage polarization.
