  description:
  - text: The OppBC subfamily of the binding-protein-dependent transport system permease
      family is involved in the transport of oligopeptides across cellular membranes.
      Members of this family are integral membrane proteins that likely function as
      part of a transport system, which is dependent on a substrate-binding protein
      to capture and deliver specific peptides to the permease for translocation.
      These proteins are essential for the uptake of nutrient peptides and may play
      a role in signaling or regulation processes that depend on extracellular peptides.
