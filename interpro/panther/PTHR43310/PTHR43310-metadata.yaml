  name:
    name: Membrane-associated Transporter-like
    short: Membrane-Transporter-like
  description:
  - text: This family of proteins includes members that are involved in transport
      across cellular membranes, particularly for sulfate ions. One characterized
      member is suggested to belong to the SLC26A/SulP transporter family, which is
      known for mediating the exchange of anions across the membrane. The functions
      of the other members are not well-defined, but they may be involved in similar
      transport processes or other vacuolar and membrane-associated roles in various
      organisms.
