  name:
    name: Mitochondrial Acyl-CoA Synthetase Medium-Chain
    short: Mitochondrial_ACSM
  description:
  - text: The ACSM family catalyzes the activation of fatty acids by CoA to form acyl-CoA,
      a crucial step in fatty acid metabolism. Members of this family are capable
      of activating medium-chain fatty acids, with some showing specificity for C6-12
      fatty acids or a preference for isobutyrate among C2-6 fatty acids. Additionally,
      certain members can activate carboxylate-containing xenobiotics, such as benzoate,
      and lipoate to lipoyl-nucleoside monophosphate. Lipoate activation is more efficient
      with GTP, particularly for the (R)-enantiomer. The family is characterized by
      its membership in the ATP-dependent AMP-binding enzyme family and is regulated
      by monovalent cations like potassium and rubidium.
