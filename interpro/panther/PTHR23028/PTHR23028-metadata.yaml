  description:
  - text: The Acyltransferase 3 family comprises enzymes responsible for acyl group
      transfer reactions across a diverse range of biological processes. Members of
      this family are involved in the modification of antibiotics, such as midecamycin
      and carbomycin biosynthesis, by acylating sugar moieties. They also play a role
      in bacterial cell wall integrity and resistance to lysozyme by O-acetylating
      N-acetylmuramyl residues in peptidoglycan. Additionally, they contribute to
      the biosynthesis of bioactive compounds like fusicoccins, which affect plant
      hormone activity, and squalestatin S1, a cholesterol-lowering agent. Some members
      regulate bacterial surface properties in response to plant cells, while others
      are involved in antigenic variation of bacterial O-antigens. The family's broad
      substrate specificity and involvement in various biosynthetic pathways highlight
      its functional versatility in acyl transfer reactions.
