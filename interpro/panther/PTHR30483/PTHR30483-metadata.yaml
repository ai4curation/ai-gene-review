  name:
    name: Branched-chain amino acid transport protein
    short: BCAA_transport
  description:
  - text: This family of proteins is involved in the transport of amino acids across
      cellular membranes, specifically the branched-chain amino acids leucine, isoleucine,
      and valine. Members of this family are typically part of larger amino-acid transport
      systems and may also play a role in chemotaxis by binding attractant amino acids
      and transducing signals to other components of the chemotactic system. Although
      primarily associated with transport, some members may function as receptors
      in chemotactic pathways without an additional role in transport.
