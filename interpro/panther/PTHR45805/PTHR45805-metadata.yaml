  name:
    name: Nuclear Hormone Receptor NR1
    short: Nuclear_Hormone_Rcpt_NR1
  description:
  - text: The Nuclear Hormone Receptor NR1 family is a group of transcription factors
      that play pivotal roles in regulating gene expression in response to hormonal
      and other signals. They are involved in diverse physiological processes including
      embryonic development, cellular differentiation, immunity, circadian rhythm
      regulation, and metabolism of lipids, steroids, xenobiotics, and glucose. Members
      of the family bind as monomers to specific DNA sequences known as ROR response
      elements (ROREs) and recruit various cofactors to modulate transcriptional activity.
      Some have known ligands like oxysterols, while others are considered orphan
      receptors with unidentified ligands. They also have roles in the development
      and function of the central nervous system, adipogenesis, thymopoiesis, and
      the differentiation of T-helper cells into T(H)17 cells, which are important
      for immune responses.
