  name:
    name: D-isomer specific 2-hydroxyacid dehydrogenase
    short: D-isomer_2-hydroxyacid_DH
  description:
  - text: The D-isomer specific 2-hydroxyacid dehydrogenase family is characterized
      by enzymes that perform oxidation-reduction reactions on various 2-hydroxyacids.
      Members of this family catalyze the NADPH-dependent reduction of glyoxylate
      and hydroxypyruvate to glycolate and glycerate, respectively. They also catalyze
      the reversible oxidation of 3-phospho-D-glycerate to 3-phosphonooxypyruvate,
      a step in L-serine biosynthesis, and the oxidation of erythronate-4-phosphate
      to 3-hydroxy-2-oxo-4-phosphonooxybutanoate. Some enzymes within this family
      display broader substrate specificity, reducing or oxidizing other 2-keto acids.
      The family includes subfamilies such as GhrB and PdxB, which have distinct substrate
      specificities. These enzymes play roles in various metabolic pathways, including
      glyoxylate detoxification, serine biosynthesis, and vitamin B6 metabolism, reflecting
      their diverse functions in cellular metabolism.
