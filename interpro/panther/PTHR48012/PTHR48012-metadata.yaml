  name:
    name: STE20/SPS1-related Proline-Alanine-rich Kinase
    short: STE20/SPS1-PAK
  description:
  - text: The STE20/SPS1-related proline-alanine-rich protein kinase family is involved
      in a variety of cellular processes including response to environmental stress,
      ion transport, cell polarity, growth, division, and apoptosis. Members of this
      family act as effector kinases in the WNK-SPAK/OSR1 kinase cascade, influencing
      ion cotransporter activity and contributing to the regulation of blood pressure
      and hypertonic stress response. They are also implicated in the regulation of
      cell migration, vesicle targeting, and fusion, as well as playing roles in developmental
      processes such as germ line development, spermatogenesis, and cytokinesis. Additionally,
      some members are involved in the JUN N-terminal pathway, acting upstream to
      mediate responses to stress stimuli.
