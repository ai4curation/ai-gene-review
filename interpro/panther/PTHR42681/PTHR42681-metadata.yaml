  name:
    name: Malonyl CoA-ACP Transacylase/Polyketide Synthase FabD
    short: Mal-CoA-ACP_Trans/PKS_FabD
  description:
  - text: The FabD family is involved in various biosynthetic processes related to
      fatty acid and polyketide synthesis. Members of this family function as malonyl
      CoA-acyl carrier protein transacylases, catalyzing the transfer of malonyl groups
      to acyl-carrier-proteins, which is a critical step in the elongation of fatty
      acid chains. Some members are specifically involved in the mitochondrial biosynthesis
      of fatty acids, while others participate in the assembly of complex polyketide
      structures, such as antibiotics like thailandamide and bacillaene. The family
      includes proteins with potential acyl transferase and flavin mononucleotide-dependent
      oxidoreductase activities, indicating a role in secondary metabolism and the
      synthesis of diverse bioactive compounds.
