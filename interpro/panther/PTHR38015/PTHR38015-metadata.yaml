  name:
    name: Opine/Lysopine Dehydrogenase
    short: Opine/Lysopine_DH
  description:
  - text: This family of proteins is involved in the reductive condensation of pyruvate
      with various amino acids to form corresponding opines. These reactions typically
      utilize NADPH as the preferred cofactor, although NADH can also be used. The
      family includes enzymes that act on arginine, lysine, histidine, or octopine,
      producing octopine, lysopine, histopine, or octopinic acid, respectively. Some
      members also exhibit broader substrate specificity, acting on secondary amine
      dicarboxylates or neutral amino acids. Additionally, certain enzymes in this
      family can catalyze reverse reactions of dehydrogenation. The activity of some
      members is regulated by substrate inhibition or competitive inhibition by similar
      compounds.
