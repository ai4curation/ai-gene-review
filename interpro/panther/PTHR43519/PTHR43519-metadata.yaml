  name:
    name: Potyviridae genome polyprotein
    short: Potyviridae_polyprotein
  description:
  - text: This family of proteins is involved in various stages of the viral life
      cycle in plants. Members possess RNA-dependent RNA polymerase activity, essential
      for viral RNA replication. They also exhibit RNA-binding and proteolytic activities,
      with the latter involving cleavage of a Gly-Gly dipeptide at the C-terminus.
      These proteins are crucial for aphid transmission of the virus, interacting
      with virions and aphid stylets, and can suppress RNA-mediated gene silencing,
      a plant defense mechanism. Additionally, they have helicase activity, potentially
      playing a role in viral replication. They mediate cap-independent, EIF4E-dependent
      translation of viral RNAs by binding to the host EIF4E cap-binding site, which
      interferes with host mRNA export and translation. They are also involved in
      cell-to-cell and systemic movement of the virus, encapsidation of viral RNA,
      and regulation of viral RNA amplification. The N-terminus interacts with aphid
      stylets, the central part with virions, and the C-terminus is implicated in
      cell-to-cell viral movement.
