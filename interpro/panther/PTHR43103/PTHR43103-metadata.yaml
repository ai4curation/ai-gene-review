  name:
    name: ADP-L-glycero-D-manno-heptose-6-epimerase
    short: HldD_epimerase
  description:
  - text: The HldD subfamily of proteins is involved in the biosynthesis of ADP-L-glycero-D-manno-heptose,
      a precursor for the inner core of lipopolysaccharides in Gram-negative bacteria.
      Members of this family catalyze the reversible epimerization at carbon 6 of
      the heptose moiety, converting ADP-D-glycero-beta-D-manno-heptose to ADP-L-glycero-beta-D-manno-heptose.
      This reaction is a critical step in the biosynthetic pathway and is essential
      for the proper assembly of the bacterial outer membrane. The proteins typically
      have a large N-terminal NADP-binding domain associated with a modified Rossman
      fold and a smaller C-terminal substrate-binding domain. Some members of the
      family may be regulated by nucleotides such as ADP and ADP-glucose, and their
      activity can be essential for bacterial virulence and survival.
