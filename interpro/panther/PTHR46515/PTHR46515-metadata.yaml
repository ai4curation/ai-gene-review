  name:
    name: Growth and transcription regulation protein
    short: Growth_transcription_reg
  description:
  - text: This family of proteins includes members involved in various cellular processes.
      Some proteins in this family are necessary for normal growth rates when utilizing
      specific sugars such as galactose and mannose. Other members are implicated
      in the regulation of gene expression, potentially acting as coactivators for
      hormone receptors and mediating the degradation of certain signal transducer
      proteins. Additionally, these proteins may have a role in intracellular transport,
      particularly in the retrograde movement of materials from endosomes to the Golgi
      apparatus and from the Golgi to the endoplasmic reticulum. The family also includes
      proteins that can bind to viral elements and inhibit transcriptional activation
      by general transcription factors.
