  name:
    name: Outer membrane protein assembly factor BamB
    short: BamB
  description:
  - text: The BamB family consists of outer membrane protein assembly factors that
      are part of the Bam complex. Members of this family are involved in the assembly
      and insertion of beta-barrel proteins into the outer membrane of Gram-negative
      bacteria. The Bam complex is essential for the proper folding and insertion
      of outer membrane proteins, which are crucial for maintaining the integrity
      and functionality of the bacterial outer membrane. The BamB proteins may assist
      in orienting the periplasmic domain of BamA for interaction with other components
      of the Bam complex, chaperones, and nascent outer membrane proteins. Efficient
      substrate folding and insertion into the outer membrane typically require the
      presence of all subunits of the Bam complex.
