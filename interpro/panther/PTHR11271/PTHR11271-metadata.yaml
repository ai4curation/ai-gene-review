  name:
    name: Metallo-dependent Hydrolases
    short: Metallo-dep_hydrolases
  description:
  - text: This family of proteins includes enzymes that catalyze the hydrolysis of
      specific substrates to produce ammonia. One member is known to hydrolyze N-formimino-L-glutamate
      to N-formyl-L-glutamate and ammonia. The majority of the family members are
      involved in the hydrolytic deamination of guanine to xanthine and ammonia. Some
      proteins within this family may also have additional enzymatic activities, such
      as the deamination of 7,8-dihydropterin, which contributes to the synthesis
      of certain pigments. Members of this family are inhibited by various compounds,
      which can include metal chelators, specific substrate analogs, and other inhibitors
      that affect enzymatic activity towards particular substrates. All members belong
      to the metallo-dependent hydrolases superfamily, with several being part of
      the ATZ/TRZ family, indicating a dependency on metal ions for their catalytic
      activity.
