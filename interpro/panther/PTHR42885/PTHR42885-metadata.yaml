  name:
    name: Histidinol-phosphate aminotransferase
    short: HisP_aminotransferase
  description:
  - text: The Histidinol-phosphate aminotransferase family is involved in the biosynthesis
      of histidine, an essential amino acid. Members of this family are pyridoxal
      phosphate (PLP)-dependent enzymes that catalyze the transfer of the amino group
      from histidinol-phosphate to an acceptor molecule, typically an alpha-keto acid.
      This reaction is part of the histidine biosynthetic pathway. Some members of
      the family may also have decarboxylase activity, participating in the biosynthesis
      of other compounds such as the corrin ring in cobalamin (vitamin B12) or the
      conversion of L-serine phosphate to ethanolamine phosphate, which is involved
      in the biosynthesis of cell surface structures like capsular polysaccharides.
