  name:
    name: ExbB/TolQ Biopolymer Transport
    short: ExbB/TolQ_transport
  description:
  - text: The ExbB/TolQ family is involved in energy-dependent transport processes
      across the bacterial outer membrane. Members of this family, such as ExbB and
      TolQ, are integral components of systems like the TonB-dependent transporter
      and the Tol-Pal system. In the TonB-dependent transport system, ExbB works in
      conjunction with ExbD and TonB to facilitate the uptake of various receptor-bound
      substrates, protecting ExbD from proteolysis and stabilizing TonB. The Tol-Pal
      system, which includes TolQ, is essential for cell division, contributing to
      outer membrane invagination and maintaining membrane integrity. It is also involved
      in the activation of TolA, interaction with Pal, and the uptake of colicins
      and phage DNA. The ExbB/TolQ family plays a critical role in bacterial survival
      and adaptation by mediating the transport of nutrients and maintaining cellular
      structures.
