  name:
    name: Peptidase U62 metalloprotease
    short: Peptidase_U62_metallo
  description:
  - text: This family of proteins includes metalloproteases that are characterized
      by a conserved motif which likely serves as their active site. Members of this
      family are involved in various biological processes, including the degradation
      of specific substrates such as azocasein and the bacterial CcdA protein. Some
      proteins in this family have been described to suppress the activity of the
      carbon storage regulator CsrA, indicating a role in the regulation of carbon
      storage and metabolism. The metalloprotease activity suggests that these proteins
      require a metal ion, such as zinc, for their catalytic function, which is consistent
      with the presence of a conserved motif indicative of metal binding and catalysis.
