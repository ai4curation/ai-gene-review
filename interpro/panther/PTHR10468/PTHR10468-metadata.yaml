  description:
  - text: The glycosyltransferase 13 family is responsible for the initiation of complex
      N-linked carbohydrate formation. Members of this family play a crucial role
      in the conversion of high-mannose N-glycans to hybrid and complex N-glycans.
      This enzymatic activity is essential for various biological processes, including
      proper protein folding and cellular signaling. In plants, such as Arabidopsis
      thaliana, the family member is also required for normal root growth and morphology,
      indicating a broader role in organismal development.
