  name:
    name: Atypical kinase ADCK
    short: Atypical_kinase_ADCK
  description:
  - text: The ADCK protein kinase family is involved in the biosynthesis of coenzyme
      Q (ubiquinone), a vital lipid-soluble electron transporter for aerobic cellular
      respiration. Members of the family are atypical kinases with unclear substrate
      specificity, lacking traditional protein kinase activity. They are hypothesized
      to function as small molecule kinases, possibly lipid kinases phosphorylating
      a prenyl lipid in the ubiquinone biosynthesis pathway. These proteins are characterized
      by an atypical protein kinase-like fold with a KxGQ motif that occludes the
      substrate binding pocket, which becomes catalytically competent upon nucleotide-binding.
      Some members show unusual selectivity for ADP over ATP and are autoinhibited
      by their N-terminal domain.
