  name:
    name: Hydroxymethyldihydropteridine Pyrophosphokinase
    short: HPPK
  description:
  - text: The HPPK family consists of enzymes that play a crucial role in the folate
      biosynthesis pathway. Members of this family are responsible for the pyrophosphorylation
      of 6-hydroxymethyl-7,8-dihydropterin, catalyzing the transfer of pyrophosphate
      from ATP to this substrate. This enzymatic reaction is a key step in the production
      of tetrahydrofolate, a vital cofactor involved in the synthesis of nucleotides
      and amino acids. The activity of HPPK family proteins is essential for cellular
      growth and replication, making them important targets for antibiotic drug design
      due to their presence in various pathogenic bacteria.
