  name:
    name: Alpha-ketoglutarate-dependent dioxygenase
    short: Alpha-KG-dependent_dioxygenase
  description:
  - text: This family of proteins includes alpha-ketoglutarate-dependent dioxygenases
      that are involved in diverse biological processes, including the degradation
      of sulfonates and sulfate esters, as well as the biosynthesis of natural products
      such as indole alkaloids and sesterterpenes. Members of this family catalyze
      oxidative reactions that typically result in the cleavage of C-S bonds in sulfonates
      or the hydroxylation of substrates, often yielding products like sulfite, succinate,
      or specific intermediates in complex biosynthetic pathways. Some proteins within
      this family are also implicated in the degradation of herbicides and resistance
      to antitubercular compounds. The enzymes are characterized by their requirement
      for alpha-ketoglutarate as a co-substrate and are regulated by various factors,
      including metal ions and ascorbate.
