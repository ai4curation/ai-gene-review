  name:
    name: Acid Sphingomyelinase
    short: Acid_Sphingo_Phosphodiest
  description:
  - text: The acid sphingomyelinase family is characterized by its ability to convert
      sphingomyelin to ceramide, a process that plays a crucial role in cell membrane
      dynamics, signaling, and stress response. Members of this family are involved
      in the reorganization of plasma membrane lipid rafts, facilitating host defense
      mechanisms such as internalization of pathogens and induction of apoptosis.
      Some family members possess additional enzymatic activities, including phospholipase
      C activity towards specific phospholipids and nucleotide phosphodiesterase activity
      with nucleoside triphosphates. The family includes both lysosomal forms that
      contribute to cholesterol export from intraendolysosomal membranes and secretory
      forms that are implicated in plasma membrane repair and modulation of cell signaling
      in response to stress, inflammation, and microbial infection.
