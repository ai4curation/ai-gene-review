  description:
  - text: This family of proteins is involved in the detoxification process by conjugating
      reduced glutathione to a variety of exogenous and endogenous hydrophobic electrophiles.
      Members of this family exhibit a range of activities, including sulfatase activity
      and the ability to bind to various substances such as steroids, bilirubin, carcinogens,
      and organic anions. Some proteins within this family also display glutathione
      peroxidase activity with specific hydroperoxides and are capable of dehalogenating
      dichloromethane. The diverse substrate specificity across family members reflects
      their role in cellular defense mechanisms against toxic compounds.
