  name:
    name: Threonylcarbamoyl-AMP synthase, SUA5
    short: TC-AMP_synthase_SUA5
  description:
  - text: The SUA5 family, specifically the TsaC subfamily, consists of enzymes known
      as Threonylcarbamoyl-AMP synthases. These enzymes are universally required for
      the biosynthesis of a unique threonylcarbamoyl modification at position 37 (t(6)A37)
      on tRNAs that read codons starting with adenine. This modification is crucial
      for maintaining the accuracy of protein synthesis by ensuring proper codon recognition
      and the maintenance of the reading frame during translation. The enzymes catalyze
      the formation of threonylcarbamoyl-AMP (TC-AMP) from L-threonine, bicarbonate/CO2,
      and ATP, releasing diphosphate as a byproduct. Some members of the family may
      also participate in other cellular processes, such as telomere replication in
      eukaryotes. The family is characterized by a conserved domain and has members
      in a wide range of organisms, including bacteria, archaea, and eukaryotes.
