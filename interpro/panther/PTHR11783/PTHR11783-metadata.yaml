  name:
    name: Cytosolic sulfotransferase 1
    short: Sulfotransferase_1
  description:
  - text: The sulfotransferase 1 family is involved in the sulfonation of a diverse
      range of substrates, including hormones, neurotransmitters, xenobiotics, and
      phenolic compounds. Members of this family utilize 3'-phospho-5'-adenylyl sulfate
      (PAPS) as a sulfonate donor to catalyze the transfer of sulfate groups, enhancing
      the water solubility and renal excretion of these compounds. This modification
      can lead to the inactivation of molecules, such as estrogens, or the bioactivation
      of xenobiotics, potentially resulting in the formation of reactive metabolites
      and DNA adducts. The family displays broad substrate specificity and plays a
      crucial role in the metabolism of endogenous compounds and detoxification processes.
      Some members are also involved in the metabolism of dietary and bacterial metabolites
      that can affect neurological development and function.
