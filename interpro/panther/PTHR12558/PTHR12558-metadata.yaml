  name:
    name: Anaphase Promoting Complex/Cyclosome Subunit
    short: APC/C_subunit
  description:
  - text: The APC/C subunit family is composed of proteins that are integral components
      of the anaphase promoting complex/cyclosome (APC/C), which is a cell cycle-regulated
      E3 ubiquitin-protein ligase complex. The APC/C is crucial for controlling progression
      through mitosis and the G1 phase of the cell cycle by mediating ubiquitination
      and subsequent degradation of target proteins. This includes the formation of
      'Lys-11'-linked polyubiquitin chains, and to a lesser extent, 'Lys-48'- and
      'Lys-63'-linked chains. The APC/C confers substrate specificity, catalyzes protein-ubiquitin
      conjugates in the presence of E2 enzymes, and targets proteins for proteolysis,
      facilitating the metaphase-to-anaphase transition and exit from mitosis. The
      family plays roles in various cellular processes including brain development,
      gametophyte development, and cell elongation, and is involved in the regulation
      of endoreduplication and neuronal functions.
