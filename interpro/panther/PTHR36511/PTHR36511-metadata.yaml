  name:
    name: Bacterial HTH-type regulators and antitoxins
    short: HTH-type_reg/antitoxin
  description:
  - text: This family of proteins includes transcriptional regulators and antitoxins
      involved in bacterial toxin-antitoxin (TA) systems. Members of this family function
      as antitoxins that neutralize the activity of cognate toxins, thereby preventing
      cell growth cessation and inhibition of cell proliferation. They can bind to
      DNA and regulate the transcription of various genes, including their own operons.
      Some members are known to bind to specific promoter regions, influencing processes
      such as biofilm formation, stress resistance, and cell motility. The transcriptional
      regulators within this family typically contain a helix-turn-helix (HTH) motif
      and may be involved in regulating a range of cellular responses.
