  name:
    name: Phosphopantetheine adenylyltransferase
    short: PPAT
  description:
  - text: This family of proteins is involved in the reversible adenylyl transfer
      from ATP to 4'-phosphopantetheine, resulting in the production of dephospho-CoA
      (dPCoA) and pyrophosphate. These proteins play a crucial role in the biosynthesis
      of coenzyme A (CoA), a vital cofactor for numerous enzymatic reactions in both
      prokaryotic and eukaryotic cells, including the transfer of acyl groups. CoA
      is essential for the metabolism of fatty acids, carbohydrates, and amino acids,
      making these enzymes critical for cellular energy homeostasis and lipid synthesis.
