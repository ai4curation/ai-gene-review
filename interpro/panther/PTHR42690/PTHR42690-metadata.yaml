  name:
    name: Threonine Synthase
    short: Threonine_Synthase
  description:
  - text: The Threonine Synthase family is characterized by enzymes that catalyze
      the final step in the biosynthesis of L-threonine from L-phosphohomoserine through
      a gamma-elimination of phosphate and beta-addition of water. Additionally, some
      family members possess catabolic phospho-lyase activity, degrading O-phospho-threonine
      to alpha-ketobutyrate, ammonia, and phosphate. Certain variants within the family
      may also degrade other substrates like L-serine, 3-chloroalanine, and vinylglycine,
      or have roles in inducing osteoblastic production of IL6, potentially influencing
      inflammation and bone turnover.
