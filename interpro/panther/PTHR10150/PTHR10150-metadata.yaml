  name:
    name: DNA Repair Endonuclease XPF
    short: XPF
  description:
  - text: The XPF family consists of structure-specific DNA repair endonucleases that
      play a crucial role in various DNA repair mechanisms. Members of the XPF family
      are responsible for the 5-prime incision during DNA repair processes. They are
      essential for nucleotide excision repair (NER) and interstrand cross-link (ICL)
      repair. The proteins in this family are also involved in homologous recombination,
      contributing to the resolution of Holliday junctions, repair of meiotic heteroduplex
      DNA, and the removal of DNA damage such as UV light-induced lesions, oxidative
      damage, and bulky adducts. Some family members are implicated in the induction
      of DNA-damage sensitive cell-cycle checkpoints and may also participate in double
      strand break repair and interchromosomal gene conversion.
