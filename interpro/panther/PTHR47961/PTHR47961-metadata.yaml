  name:
    name: Helicase Hel308/SKI2
    short: Hel308/SKI2
  description:
  - text: The Helicase Hel308/SKI2 family includes ATP-dependent DNA and RNA helicases
      involved in various cellular processes such as DNA repair, ribosome quality
      control (RQC), and pre-mRNA splicing. Members of the Hel308 subfamily primarily
      function in the 3'-5' unwinding of DNA at stalled replication forks, contributing
      to the repair mechanism. They exhibit DNA-dependent ATPase activity and may
      also process branched DNA structures like Holliday junctions. The SKI2 subfamily
      members are implicated in the RQC pathway, resolving stalled ribosomes during
      problematic translation, and play a role in pre-mRNA splicing as part of the
      spliceosomal complex. This family also includes helicases involved in homology-driven
      double-strand break (DSB) repair, such as unwinding DNA for microhomology-mediated
      end-joining (MMEJ) and other related DSB repair pathways.
