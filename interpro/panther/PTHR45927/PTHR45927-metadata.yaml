  name:
    name: Plant receptor-like kinase with LysM domain-containing protein
    short: Plant_RLK_LysM
  description:
  - text: This family of proteins includes receptor-like kinases with a role in plant
      innate immunity and symbiotic interactions. Members are involved in the perception
      of microbial signals, such as Nod factors and chitooligosaccharides, which are
      crucial for initiating plant defense responses and symbiotic nodule formation.
      Some proteins in this family possess LysM domains that bind chitooligosaccharides,
      contributing to the recognition of pathogen-associated molecular patterns and
      microbe-associated molecular patterns. This recognition triggers immune responses
      and symbiotic processes, including the formation of infection threads and nodule
      primordia in legumes. Additionally, members of this family are implicated in
      resistance to various pathogens, including oomycetes and fungi.
