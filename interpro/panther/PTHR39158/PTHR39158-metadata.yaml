  description:
  - text: The DnaJ homolog subfamily C member 28 family includes proteins that are
      potentially involved in protein folding or may function as chaperones. These
      proteins are likely to assist in the correct folding of other proteins or in
      the stabilization of unfolded or partially folded proteins, preventing their
      aggregation. The family is represented by members in both mouse and human, indicating
      a conserved role across these species. However, the exact functions of some
      family members, such as those from bacteria, remain uncharacterized.
