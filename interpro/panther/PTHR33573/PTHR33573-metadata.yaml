  description:
  - text: PTHR33573 is the CASParian strip membrane domain protein family, comprising
      the bona fide CASP proteins together with the much larger and more divergent
      CASP-like (CASPL) subfamily. All members are small four-transmembrane-span (tetraspan)
      integral membrane proteins related to the MARVEL-domain superfamily; they are
      non-enzymatic and act as membrane scaffolds rather than as transporters or catalysts.
      The small clade of founding CASP proteins (CASP1-CASP5 in Arabidopsis) localizes
      to a sharply delimited plasma-membrane domain in the root endodermis, where it
      recruits the lignin-polymerization machinery to direct deposition of the Casparian
      strip, a localized cell-wall modification that forms an apoplastic diffusion barrier.
      The CASPLs make up the bulk of the family and occur across all major divisions
      of land plants and in green algae (with non-plant homologs belonging to the MARVEL
      protein family). When ectopically expressed they can integrate the same membrane
      scaffold, but they are expressed in a wide variety of other cell types (e.g. trichomes,
      abscission-zone cells, peripheral root-cap cells, and xylem-pole pericycle cells)
      and most remain functionally uncharacterized. The Casparian-strip / membrane-cell-wall-junction
      function is therefore well established only for the small CASP clade, whereas
      the specific biological roles of the majority CASPL members are unknown.
