  name:
    name: Casparian Strip Membrane
    short: CASP
  description:
  - text: The Casparian strip membrane proteins (CASP) family is involved in the regulation
      of membrane-cell wall junctions and localized cell wall deposition. Members
      of the CASP family are essential for the establishment of the Casparian strip
      membrane domain (CSD) and the subsequent formation of Casparian strips. These
      are specialized cell wall modifications in the root endodermis that create an
      apoplastic barrier. This barrier is crucial for preventing lateral diffusion
      between the intraorganismal apoplasm and the extraorganismal apoplasm. Additionally,
      some CASP family members are implicated in plant defense responses against bacterial
      pathogens and may play a role in the regulation of biotic and abiotic stress
      responses.
