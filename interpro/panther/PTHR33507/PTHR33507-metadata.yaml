  name:
    name: Membrane-associated protease and related proteins
    short: Membrane_assoc_protease
  description:
  - text: This family of proteins includes membrane-bound proteases and uncharacterized
      membrane proteins. The protease member is known to cleave substrates preferentially
      near hydrophobic or aromatic residues and can degrade casein and a stomatin
      homolog in vitro. Its activity is regulated by inhibition with divalent metal
      cations and detergents. Other members of the family are less characterized but
      are suggested to have a role associated with the inner membrane, potentially
      in transport or signaling processes. The diversity within this family indicates
      a range of functions tied to membrane association and proteolysis.
