  name:
    name: Dictyostelium Calcium-Dependent Adhesion Molecules
    short: Dictyostelium_CAD
  description:
  - text: The Dictyostelium CAD family is characterized by its role in mediating calcium-dependent
      cell-cell adhesion, which is crucial during the early stages of development.
      Members of the family are involved in the formation of cell assemblies by adhering
      to one another in a calcium-dependent manner. The adhesive function is attributed
      to the N-terminal segment of the proteins, which is responsible for cell binding,
      while the C-terminal domain is important for anchoring the proteins to the cell
      membrane. The family is part of a larger group of calcium-dependent adhesion
      molecules that facilitate cellular interactions and communication, playing a
      vital role in the structural organization and function of multicellular organisms.
