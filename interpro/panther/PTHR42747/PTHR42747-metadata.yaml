  name:
    name: Nitronate Monooxygenase
    short: Nitronate_Monooxygenase
  description:
  - text: The Nitronate Monooxygenase family comprises enzymes that catalyze the oxidative
      denitrification of alkyl nitronates using molecular oxygen. The primary activity
      involves the conversion of propionate 3-nitronate (P3N), which is the presumed
      physiological substrate, into less toxic compounds. This detoxification process
      is crucial as P3N is a metabolic poison produced by plants and fungi as a defense
      mechanism. Members of the family are also involved in the degradation of P3N,
      allowing certain bacteria to utilize it as a sole source of nitrogen, carbon,
      and energy. The family's activity is specific to nitronate compounds and does
      not extend to nitroalkanes.
