  name:
    name: Replicative DNA helicase
    short: DNA_helicase_DnaB
  description:
  - text: This family of proteins includes replicative DNA helicases that are involved
      in the initiation and elongation processes of chromosome replication. They possess
      DNA-dependent ATPase activity and are characterized by having distinct active
      sites for ATP binding and DNA binding. These proteins also interact with other
      proteins involved in DNA replication, such as DnaC protein and primase. Some
      members of this family have additional functions, such as endonuclease activity
      within an intein region or specific roles in viral DNA replication and recombination.
