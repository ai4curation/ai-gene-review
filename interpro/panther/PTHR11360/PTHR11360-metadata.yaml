  name:
    name: Proton-linked Monocarboxylate Transporter
    short: Proton-linked_MCT
  description:
  - text: The Monocarboxylate Transporter (MCT) family comprises proteins that facilitate
      the proton-linked transport of monocarboxylates across the plasma membrane.
      Members of this family play diverse roles in the transport of metabolites such
      as lactate, pyruvate, ketone bodies, and thyroid hormones, contributing to various
      physiological processes including pH regulation, metabolic homeostasis, and
      hormone distribution. Some family members are also involved in the efflux of
      specific metabolites and secondary metabolites, including mycotoxins and antibiotics,
      in various organisms. The transport mechanism often involves symport or antiport
      with protons and is typically regulated by substrate concentration, pH, and
      other factors. The MCT family is part of the major facilitator superfamily (MFS)
      and is characterized by a common structural framework that facilitates the transport
      activity.
