  name:
    name: Plasmanylethanolamine desaturase
    short: Plasmalogen_desaturase
  description:
  - text: This family of proteins includes enzymes that are involved in the biogenesis
      of plasmalogens within the endoplasmic reticulum membrane. Plasmalogens are
      a type of glycerophospholipid characterized by a vinyl ether bond at the glycerol
      sn-1 position. These enzymes exhibit desaturase activity, introducing a double
      bond into the alkyl chain of plasmanylethanolamine. Plasmalogens play roles
      in antioxidative and signaling mechanisms. In one member, the enzyme is also
      implicated in sensing photooxidative stress and participating in light-dependent
      signaling pathways.
