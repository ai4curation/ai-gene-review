  name:
    name: Bacterial cell division protein FtsA/MreB
    short: FtsA/MreB
  description:
  - text: The FtsA/MreB family includes proteins that play a crucial role in bacterial
      cell division. Members of this family are involved in the assembly of the Z
      ring, which is essential for the cytokinesis process. These proteins may act
      as membrane anchors for the Z ring, facilitating the recruitment of other cell
      division proteins to the septal ring. They are also associated with ATP binding
      and hydrolysis, which suggests an active role in the conformational changes
      required during the cell division process. The extreme C-terminus of these proteins
      is particularly important for their localization, self-interaction, and activity.
