  name:
    name: Flavin adenine dinucleotide synthase
    short: FAD_synthase
  description:
  - text: 'This family of proteins catalyzes the adenylation of flavin mononucleotide
      (FMN) to form flavin adenine dinucleotide (FAD), an essential coenzyme. Members
      of this family are characterized by two distinct regions: one in the N-terminal
      section that is similar to the MoaB/Mog family, and another in the C-terminal
      section that is part of the PAPS reductase family, specifically the FAD1 subfamily.
      Although these proteins contain a molybdenum cofactor biosynthesis protein-like
      region, it is suggested that this region may not be functional in the context
      of their primary enzymatic activity.'
