  name:
    name: Zinc-containing alcohol dehydrogenase
    short: Zinc_ADH
  description:
  - text: This family of proteins includes zinc-containing alcohol dehydrogenases
      that catalyze the oxidation and reduction of various alcohols and aldehydes.
      They are characterized by their ability to bind zinc and are involved in metabolic
      processes that detoxify aldehydes, such as formaldehyde and acetaldehyde, into
      less toxic compounds. Some members show a preference for medium chain secondary
      alcohols and exhibit low activity with primary alcohols. They can function under
      physiological conditions to reduce aldehydes and 2-ketones to secondary alcohols.
      The family also includes multifunctional enzymes with both dehydrogenase and
      reductase activities, contributing to the metabolism of compounds like 2,3-butanediol,
      acetoin, and diacetyl. The activities of these enzymes are essential for various
      cellular processes, including the release of excess reducing power and the biosynthesis
      of complex organic molecules.
