  name:
    name: ABC transporter permease component
    short: ABC_transporter_permease
  description:
  - text: This family of proteins is involved in the transport of various substrates
      across cellular membranes. Members of this family are typically part of ATP-binding
      cassette (ABC) transporter complexes, which are binding-protein-dependent systems.
      These proteins are likely responsible for the translocation of substrates such
      as sugars, osmoprotective compounds, and other molecules, facilitating their
      uptake into the cell. The substrates mentioned include starch degradation products,
      sugars like melibiose, raffinose, lactose, and alpha-glucosides, as well as
      osmoprotective compounds like glucosylglycerol, sucrose, and trehalose. The
      transport process is probable and involves the movement of these molecules through
      the permease component of the ABC transporter, which is integral to the membrane.
