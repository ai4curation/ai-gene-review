  name:
    name: Bacterial Transcriptional Regulators and Dioxygenases
    short: Bact_TransReg_Diox
  description:
  - text: The protein family includes transcriptional regulators that control various
      metabolic and developmental processes in bacteria. Members of the family are
      involved in the regulation of short-chain fatty acid catabolism, glyoxylate
      cycle, propionate degradation, and cholesterol utilization. They act as transcriptional
      activators or repressors, depending on the presence of specific carbon sources
      or stress conditions. Some proteins within the family regulate the expression
      of genes involved in biofilm formation, sporulation, and the stress response
      to antibiotics. Additionally, the family encompasses proteins that control the
      expression of restriction-modification systems and those that respond to environmental
      stresses such as radiation and desiccation. The family also includes non-heme
      iron-dependent dioxygenases involved in the biosynthesis of antibiotics and
      other metabolic pathways.
