  name:
    name: Mitochondrial Carrier
    short: Mitochondrial_Carrier
  description:
  - text: This family of proteins is involved in the transport of various metabolites,
      nucleotides, and cofactors across the mitochondrial inner membrane. Members
      of this family function as carriers, facilitating the exchange of substances
      such as carnitine, acylcarnitines, amino acids, and NAD(+), among others. They
      play essential roles in metabolic processes including the urea cycle, fatty
      acid beta-oxidation, amino acid degradation, and mitochondrial energy metabolism.
      Some members are also implicated in maintaining tissue differentiation, magnesium
      homeostasis, and mitochondrial protein synthesis. The transport mechanisms include
      both counter-exchange and uniport, and are regulated by various inhibitors.
