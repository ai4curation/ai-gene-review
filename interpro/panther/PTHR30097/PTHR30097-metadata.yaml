  name:
    name: Membrane Fusion Protein Cation Efflux System
    short: MFP_Cation_Efflux
  description:
  - text: This family of proteins is involved in the transport of metal cations across
      cellular membranes, conferring resistance to various heavy metals such as copper,
      silver, zinc, nickel, cobalt, and cadmium. Members of this family are typically
      part of larger efflux systems that actively expel toxic metal ions from the
      cell, thereby mitigating metal toxicity. These proteins are thought to function
      as part of a proton/cation antiporter mechanism, where the efflux of metal ions
      is coupled with the influx of protons, maintaining electrochemical gradients
      across the membrane. The family includes proteins that may act in concert with
      other components to form membrane-bound complexes essential for the energy-dependent
      efflux process.
