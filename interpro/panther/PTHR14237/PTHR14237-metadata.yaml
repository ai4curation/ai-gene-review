  name:
    name: Molybdenum cofactor sulfurase
    short: Moco_sulfurase
  description:
  - text: 'The Molybdenum cofactor sulfurase family is involved in the sulfuration
      of the molybdenum cofactor, a critical step for the activation of enzymes such
      as xanthine dehydrogenase and aldehyde oxidase. These enzymes require a molybdenum
      cofactor liganded by one oxygen and one sulfur atom in its active form. Some
      family members also reduce N-oxygenated molecules, acting as counterparts to
      cytochrome P450 and flavin-containing monooxygenases in metabolic cycles. They
      are involved in the reduction of N-hydroxylated prodrugs, such as amidoximes,
      enhancing drug bioavailability and may regulate endogenous nitric oxide levels
      by reducing mitochondrial N(omega)-hydroxy-L-arginine. The family comprises
      two structural domains: the molybdenum cofactor/Moco sulfurase C-terminal domain
      and the MOSC N-terminal region, which together tightly coordinate Moco within
      the enzyme''s core.'
