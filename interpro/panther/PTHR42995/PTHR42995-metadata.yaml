  name:
    name: Acetyl coenzyme A carboxylase carboxyl transferase subunit beta
    short: AccD/PCCB
  description:
  - text: The AccD/PCCB family proteins are components of the acetyl coenzyme A carboxylase
      (ACC) complex, which plays a crucial role in fatty acid biosynthesis. The ACC
      complex consists of multiple subunits, including the biotin carboxylase (BC)
      and the carboxyl transferase subunit beta. The BC subunit catalyzes the carboxylation
      of biotin on its carrier protein (BCCP), and the carboxyl transferase subunit
      beta then transfers the CO2 group from carboxybiotin to the acetyl-CoA substrate,
      resulting in the formation of malonyl-CoA. Malonyl-CoA is a key building block
      for the synthesis of long-chain fatty acids. The activity of these enzymes is
      essential for lipid metabolism in various organisms, ranging from bacteria to
      plants and animals. In some instances, the activity of these enzymes can be
      regulated by inhibitors or by feedback mechanisms that ensure proper metabolic
      control.
