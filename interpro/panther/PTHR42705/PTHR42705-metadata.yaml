  name:
    name: Non-homologous end joining protein LigD
    short: NHEJ_LigD
  description:
  - text: The LigD protein family is involved in non-homologous end joining (NHEJ),
      a DNA repair mechanism that fixes double-strand breaks with varying fidelity.
      Members of the LigD family possess multiple functional domains, including a
      polymerase/primase domain that prefers ribonucleotides over deoxynucleotides,
      which may be beneficial in dormant cells with limited dNTP pools. The central
      3'-phosphoesterase domain is implicated in processing DNA ends, while the C-terminal
      ATP-dependent ligase domain is responsible for sealing nicks in DNA. The LigD
      family proteins often work in conjunction with the Ku protein to form a repair
      complex capable of handling blunt-end and 5'-overhang DSBs, as well as incompatible
      DSBs requiring 3'-resection, gap filling, and ligation. These multifunctional
      enzymes exhibit DNA ligase, DNA-directed DNA/RNA polymerase, terminal transferase,
      and 3'-ribonuclease/phosphatase activities, contributing to their role in maintaining
      genome integrity under various conditions.
