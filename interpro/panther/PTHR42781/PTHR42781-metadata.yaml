  name:
    name: ABC Transporter, Small Molecule Importer
    short: ABC_SmlMolc_Importer
  description:
  - text: The protein family described here is involved in the import of various small
      molecules across the cellular membrane using ATP-binding cassette (ABC) transporters,
      a mechanism that couples ATP hydrolysis to the translocation of substrates.
      Members of this family are responsible for the energy-dependent import of compounds
      such as spermidine, putrescine, thiamine, sulfate, thiosulfate, molybdate, tungstate,
      and Fe(3+) ions. These proteins are part of larger ABC transporter complexes,
      which typically consist of multiple subunits that work together to transport
      substances into the cell. The import of these molecules is crucial for cellular
      processes such as growth, metabolism, and response to environmental stress.
      The family includes proteins with regulatory domains that may inhibit transport
      activity in response to intracellular concentrations of the transported molecules,
      ensuring homeostasis within the cell.
