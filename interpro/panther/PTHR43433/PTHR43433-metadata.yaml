  name:
    name: AB Hydrolase Superfamily Enzymes
    short: AB_hydrolase_superfamily
  description:
  - text: This family of proteins includes enzymes that are part of the AB hydrolase
      superfamily. Members of this family are involved in various biological processes,
      including pyrimidine catabolism, where they may facilitate the hydrolysis of
      carbamate, a reaction that can occur spontaneously. Some proteins within this
      family have been implicated in the biosynthesis of antibiotics, such as chlorotetracycline
      and anthracyclines, which exhibit high cytotoxicity and are used in cancer chemotherapy.
      They may also have roles in oxidative stress defense by detoxifying peroxoacids.
      Additionally, certain members exhibit esterase, lipase, and perhydrolase activities,
      and are capable of halogenating organic compounds in the presence of halides
      and hydrogen peroxide.
