  name:
    name: ADP-ribosylation factor-like protein 8
    short: Arf-like_protein_8
  description:
  - text: The ADP-ribosylation factor-like protein 8 family, part of the small GTPase
      superfamily, plays a crucial role in lysosomal motility and positioning, which
      is essential for various cellular processes including nutrient sensing, antigen
      presentation, and natural killer cell-mediated cytotoxicity. Family members
      are involved in the anterograde axonal transport of presynaptic lysosome-related
      vesicles, contributing to presynaptic biogenesis and synaptic function in neurons.
      They cycle between active GTP-bound and inactive GDP-bound states, interacting
      with effector proteins to regulate lysosomal transport and fusion. The family
      is also implicated in endosome to lysosome trafficking, cargo delivery for antigen
      presentation, and the formation of phagolysosomes for microbial killing. Additionally,
      some members may play a role in chromosome segregation and are involved in viral
      RNA replication complexes during microbial infections.
