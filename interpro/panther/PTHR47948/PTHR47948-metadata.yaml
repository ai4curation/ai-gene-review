  description:
  - text: The Cytochrome P450 CYP73A family comprises enzymes that function as heme-thiolate
      monooxygenases. They play a crucial role in the phenylpropanoid pathway, catalyzing
      the transformation of trans-cinnamate into p-coumarate. This reaction is the
      first oxidative step in the biosynthesis of various compounds that are vital
      for plant life. These compounds include lignins, which are essential for plant
      structure and defense, as well as flavonoids and other phenolics that protect
      against ultraviolet radiation and contribute to pigmentation for pollination.
      Some family members are also involved in the synthesis of phytoalexins, which
      are antimicrobial and serve as a defense mechanism against pathogens. The activity
      of these enzymes can be regulated by specific inhibitors, and some can utilize
      alternative substrates, such as 2-naphthoic acid.
