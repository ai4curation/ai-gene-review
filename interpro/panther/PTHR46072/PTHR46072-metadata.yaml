  name:
    name: Amidase enzyme
    short: Amidase
  description:
  - text: The Amidase family comprises enzymes that catalyze the hydrolysis of amide
      bonds, converting them into carboxylic acids and amines. Members of this family
      are involved in various biological processes, including the biosynthesis of
      cyclic peptides with antifungal properties, the degradation of plant-produced
      benzoxazolinones as a detoxification mechanism, and the utilization of acetamide
      as a carbon or nitrogen source. Amidases are implicated in the synthesis of
      bioactive compounds, such as the cyclic decapeptide KK-1 and the mycotoxin butenolide,
      and play roles in the metabolism of phytoanticipins, contributing to the interaction
      between fungi and host plants. The family's enzymes are characterized by their
      ability to perform modifications on specific substrates, which may include N-methylation,
      O-methylation, and hydrolysis of lactone moieties, among others. The amidases
      are essential for the survival and adaptation of various organisms, reflecting
      their diverse functional roles in metabolic pathways.
