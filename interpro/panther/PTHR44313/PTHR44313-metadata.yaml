  name:
    name: Pre-mRNA-splicing and ERAD-associated protein
    short: Pre-mRNA-splicing_ERAD
  description:
  - text: This family of proteins includes members that are involved in pre-mRNA splicing,
      a fundamental process in gene expression where introns are removed and exons
      are joined to form a mature mRNA transcript. Some members of this family are
      also implicated in the endoplasmic reticulum-associated protein degradation
      pathway (ERAD), which is responsible for the disposal of misfolded proteins
      in the endoplasmic reticulum. Additionally, certain proteins within this family
      may play a role in the regulation of transcription, specifically by negatively
      affecting the transcription of thyroglobulin, which is mediated by the PAX8
      transcription factor.
