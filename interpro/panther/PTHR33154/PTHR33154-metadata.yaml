  name:
    name: HTH-type Metal-responsive Transcriptional Regulators
    short: HTH_MetalResp_TranReg
  description:
  - text: The protein family is comprised of helix-turn-helix (HTH) type transcriptional
      regulators involved in various cellular responses to environmental and intracellular
      signals. Members of the family function primarily as repressors or activators
      of gene expression. Several proteins within the family are responsive to metal
      ions, such as arsenic, antimony, bismuth, and zinc, regulating operons associated
      with metal resistance or homeostasis. For instance, some family members repress
      the ars operon and are derepressed by metalloids in their +III oxidation state.
      Others are involved in zinc homeostasis, repressing gene expression in the absence
      of zinc. Additionally, some regulators control genes related to lipid metabolism,
      hypoxic response, sporulation, and virulence. The family includes proteins that
      can bind to specific DNA sequences, with some showing metal ion-dependent binding
      regulation.
