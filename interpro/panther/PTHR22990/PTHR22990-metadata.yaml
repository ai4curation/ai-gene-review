  name:
    name: SCF Complex Subunits and Alginate Epimerases
    short: SCF-Subunits/Alg-Epimerases
  description:
  - text: This family of proteins includes components of SCF (SKP1-CUL1-F-box protein)
      E3 ubiquitin-protein ligase complexes, which are involved in the ubiquitination
      and proteasomal degradation of various target proteins. They play roles in cell
      cycle regulation, apoptosis, immune response, and differentiation. Some members
      mediate the degradation of specific substrates, such as BCL6, DTL, and p53,
      influencing processes like TGF-beta signaling, erythropoiesis, and antiviral
      responses. Other members are involved in the epimerization of polysaccharides
      during the synthesis of alginate, contributing to the protection of alginate
      from degradation and its transport through bacterial cells.
