  name:
    name: D-isomer specific 2-hydroxyacid dehydrogenase
    short: D-isomer_2-hydroxyacid_DH
  description:
  - text: The D-isomer specific 2-hydroxyacid dehydrogenase family is characterized
      by its ability to catalyze the reversible oxidation of various 2-hydroxyacids
      to their corresponding oxoacids using NAD(+) as a cofactor. Members of this
      family are involved in key metabolic pathways, including the phosphorylated
      L-serine biosynthesis pathway, where they convert 3-phospho-D-glycerate to 3-phosphonooxypyruvate.
      Other members are involved in the oxidation of erythronate-4-phosphate to 3-hydroxy-2-oxo-4-phosphonooxybutanoate,
      a step in vitamin B6 biosynthesis. Additionally, some enzymes in this family
      are responsible for the NAD(+)-dependent oxidation of formate to carbon dioxide,
      which is the final step in the methanol oxidation pathway in methylotrophic
      microorganisms and also contributes to the detoxification of exogenous formate
      in non-methylotrophic organisms. The family includes several subfamilies, such
      as the PdxB subfamily involved in vitamin B6 biosynthesis and the FDH subfamily
      of formate dehydrogenases.
