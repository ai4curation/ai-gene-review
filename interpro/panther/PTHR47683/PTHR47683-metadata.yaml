  name:
    name: Ribosomal RNA Pseudouridine Synthase RsuA
    short: RsuA_PseudoU_synthase
  description:
  - text: The RsuA family of pseudouridine synthases is responsible for catalyzing
      the isomerization of specific uracil residues to pseudouridine in ribosomal
      RNA, a modification that is essential for the proper functioning of ribosomes.
      Members of the RsuA family exhibit specificity for different rRNA targets, including
      the synthesis of pseudouridine from uracil-516 in 16S rRNA and uracil-2457,
      uracil-2604, and uracil-2605 in 23S rRNA. Some members also display dual specificity,
      modifying both rRNA and tRNA, such as the conversion of uracil-35 in the anticodon
      of tRNA(Tyr). These enzymes play a crucial role in the structure and function
      of the ribosome, contributing to the fidelity of protein synthesis.
