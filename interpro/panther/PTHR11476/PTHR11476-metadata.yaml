  name:
    name: Histidine-tRNA Ligase/ATP Phosphoribosyltransferase Regulator
    short: His-tRNA_Ligase/HisZ_regulator
  description:
  - text: The Histidine-tRNA Ligase/ATP Phosphoribosyltransferase Regulatory Subunit
      family includes enzymes involved in protein synthesis and histidine biosynthesis.
      Members of the family catalyze the ATP-dependent ligation of histidine to the
      3'-end of its cognate tRNA, forming an aminoacyl-adenylate intermediate (His-AMP).
      This reaction is essential for the incorporation of histidine into proteins
      during translation. Some members, belonging to the HisZ subfamily, are regulatory
      subunits for ATP phosphoribosyltransferase, the enzyme required for the first
      step of histidine biosynthesis. They may allow feedback regulation of the enzyme's
      activity by histidine. Additionally, certain members are involved in axon guidance
      and the general amino acid control pathway, responding to amino acid starvation
      by phosphorylating eIF-2-alpha, which affects global protein synthesis and gene
      expression related to amino acid biosynthesis.
