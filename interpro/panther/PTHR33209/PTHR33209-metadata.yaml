  name:
    name: Peptidase S49 family serine proteases
    short: Peptidase_S49_serine_prots
  description:
  - text: The peptidase S49 family consists of serine proteases involved in various
      cellular processes. In plants, members like Serine protease SPPA may participate
      in the light-dependent degradation of chloroplast components, aiding in high
      light acclimation. In bacteria, Protease 4 members are implicated in the digestion
      of cleaved signal peptides, a crucial step for maintaining proper secretion
      of mature proteins across the membrane. Additionally, in bacteriophages, related
      proteins like Head-tail preconnector protein GP5 and Capsid assembly protease
      C play roles in capsid assembly and maturation, with the latter catalyzing the
      cleavage of scaffolding proteins post-assembly.
