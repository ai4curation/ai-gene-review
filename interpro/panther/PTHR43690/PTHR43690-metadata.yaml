  name:
    name: Peptidase M16
    short: Peptidase_M16
  description:
  - text: The peptidase M16 family comprises endopeptidases that play diverse roles
      in peptide processing and regulation. Members of this family are involved in
      the degradation of small peptides, such as glucagon and insulin, which is crucial
      for blood glucose homeostasis. Some members act as insulin-degrading enzymes,
      contributing to the cellular breakdown of insulin and other peptides, thereby
      regulating peptide hormone signaling cascades. The family also includes proteins
      involved in the biosynthesis of coenzyme pyrroloquinoline quinone (PQQ) by cleaving
      peptide bonds in a precursor peptide. Additionally, some members are implicated
      in the maturation of chloroplastic protein precursors by cleaving transit peptides,
      and others participate in the positive regulation of axonal maturation and myelination
      by activating ectodomain shedding of pro-neuregulin. The family's proteolytic
      activity is generally regulated by nucleotide triphosphates, small peptides,
      and inhibited by specific chelating agents and inhibitors.
