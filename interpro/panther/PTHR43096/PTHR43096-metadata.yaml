  name:
    name: DnaJ
    short: DnaJ
  description:
  - text: The DnaJ protein family is involved in various cellular stress responses,
      including hyperosmotic and heat shock conditions, by preventing protein aggregation
      and assisting in protein folding. Members of the family function autonomously
      or in concert with DnaK and GrpE to form a chaperone system that facilitates
      the ATP-dependent folding of stress-denatured proteins. They also play roles
      in mitochondrial biogenesis, chloroplast development, DNA replication, and diphthamide
      biosynthesis. Some members bind to curved DNA and may act as molecular chaperones
      under environmental stresses. The family includes proteins that influence the
      interaction of DnaK with substrates and are involved in plant development and
      cell death processes during fertilization.
