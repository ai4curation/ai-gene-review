  name:
    name: Bacterial Secretion System Channel Protein
    short: Bact_Secretion_Sys_Channel
  description:
  - text: This family of proteins is involved in the formation of multimeric ring-shaped
      structures that create channels across the outer membrane of bacteria. These
      channels are essential for various secretion systems that transport proteins
      across the membrane. Some members are part of the type II secretion system (T2SS),
      which exports folded proteins, including enzymes and toxins. Others contribute
      to the type III secretion system (T3SS), also known as the injectisome, which
      injects effector proteins into eukaryotic host cells, playing a role in pathogenicity
      and host immune response evasion. Additionally, certain members are involved
      in the assembly and extrusion of bacteriophages, forming channels that allow
      phage particles to pass through the bacterial outer membrane. The family also
      includes proteins that may be involved in type IV piliation and localized adherence,
      contributing to bacterial colonization and biofilm formation.
