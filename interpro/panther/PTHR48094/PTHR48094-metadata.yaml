  name:
    name: Protein/nucleic acid deglycase
    short: Prot/Nucl_acid_deglycase
  description:
  - text: The protein family is involved in the cellular defense against glycation
      and oxidative stress. Members of the family function as protein and nucleotide
      deglycases, catalyzing the deglycation of Maillard adducts formed between amino
      groups of proteins or nucleotides and reactive carbonyl groups of glyoxals.
      They repair methylglyoxal- and glyoxal-glycated proteins, releasing repaired
      proteins and lactate or glycolate. They deglycate cysteine, arginine, and lysine
      residues in proteins, reactivating them by reversing glycation. They also repair
      glycated guanine in nucleotides and nucleic acids, thus participating in a nucleotide
      repair system named guanine glycation repair (GG repair). Additionally, some
      members have been reported to possess chaperone, protease, and metal-binding
      activities, contributing to cell protection against oxidative stress and cell
      death. They may also be involved in mitochondrial function, autophagy of dysfunctional
      mitochondria, and inflammatory responses.
