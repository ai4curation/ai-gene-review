  name:
    name: TonB-dependent transporter energy transducer
    short: TonB-dependent_transducer
  description:
  - text: This family of proteins interacts with outer membrane receptor proteins
      to facilitate the high-affinity binding and energy-dependent uptake of specific
      substrates into the periplasmic space. Members of this family are involved in
      the transduction of energy from the cytoplasmic membrane to outer membrane processes
      that require energy, such as the active transport of ligands. These proteins
      are essential for the utilization of various nutrients and are also implicated
      in the infection processes of certain bacteriophages and in bacterial virulence.
