  name:
    name: Major Facilitator Superfamily Transporter
    short: MFS_Transporter
  description:
  - text: This family of proteins includes members that are part of the major facilitator
      superfamily (MFS), which is one of the largest groups of secondary transporters.
      Proteins in this family are involved in the transport of a wide variety of substrates
      across cellular membranes. They function by utilizing the electrochemical gradient
      of ions, particularly protons, to facilitate the movement of substances in and
      out of the cell. This transport is essential for numerous cellular processes,
      including nutrient uptake, waste removal, and the maintenance of ion homeostasis.
      MFS-type transporters are characterized by their structural fold, which typically
      consists of 12 transmembrane helices. They are found in all kingdoms of life,
      indicating their fundamental role in cell biology.
