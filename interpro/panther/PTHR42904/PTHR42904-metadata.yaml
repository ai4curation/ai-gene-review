  name:
    name: NAD-capped RNA hydrolase NudC subfamily
    short: NAD-cap_RNA_hydrolase_NudC
  description:
  - text: The NudC subfamily of Nudix hydrolases is characterized by its ability to
      catalyze the hydrolysis of NAD-capped RNA, specifically removing the nicotinamide
      adenine dinucleotide (NAD) cap from a subset of mRNAs. This decapping activity
      results in the production of nicotinamide mononucleotide (NMN) and 5' monophosphate
      mRNA. The presence of the NAD cap at the 5'-end of mRNAs generally serves to
      stabilize the RNA against 5'-processing. Members of the NudC subfamily exhibit
      a preference for mRNAs that begin with a purine at the 5'-end and are capable
      of hydrolyzing a broad range of dinucleotide pyrophosphates. This decapping
      mechanism is distinct from the canonical removal of the N7 methylguanosine (m7G)
      cap, and in some cases, the NAD cap promotes mRNA decay. The NudC subfamily
      plays a role in regulating mRNA stability and turnover, impacting gene expression
      and cellular metabolism.
