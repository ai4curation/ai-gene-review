  name:
    name: Tol-Pal system protein TolB
    short: Tol-Pal_TolB
  description:
  - text: The TolB family proteins are components of the Tol-Pal system, which is
      implicated in the process of outer membrane invagination during bacterial cell
      division. These proteins are crucial for maintaining the integrity of the outer
      membrane. Members of the TolB family play a key intermediary role by interacting
      with membrane-embedded components, such as Pal in the outer membrane and TolA
      in the inner membrane, facilitating communication and coordination between these
      layers.
