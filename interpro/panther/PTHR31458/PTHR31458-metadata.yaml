  name:
    name: Polygalacturonase-associated BURP domain-containing protein
    short: PG-associated_BURP
  description:
  - text: This family of proteins includes non-catalytic subunits of polygalacturonase
      as well as proteins containing a BURP domain at the C-terminus. Members of this
      family are involved in the regulation of plant cell size and growth, with some
      acting as chaperones for other proteins through the secretory pathway. The BURP
      domain is unique to plant proteins and plays a critical role in the function
      of these proteins, although the exact mechanisms are not fully understood.
