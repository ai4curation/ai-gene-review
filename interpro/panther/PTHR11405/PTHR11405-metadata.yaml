  name:
    name: Carbamoyl Phosphate Synthase
    short: CPSase
  description:
  - text: The Carbamoyl Phosphate Synthase (CPSase) family includes multifunctional
      enzymes involved in the de novo pyrimidine biosynthetic pathway and the urea
      cycle. These enzymes catalyze the formation of carbamoyl phosphate from glutamine,
      hydrogencarbonate, and ATP. The large subunit of CPSase binds substrates and
      carries out the ATP-coupled ligase reaction, while the small subunit provides
      ammonia through glutamine amidotransferase activity. Some members also encode
      aspartate transcarbamylase (ATCase) and dihydroorotase (DHOase) activities,
      facilitating subsequent steps in pyrimidine synthesis. CPSase activity is essential
      for various biological processes, including nucleotide biosynthesis, mesophyll
      development, and ammonia detoxification in ureotelic animals. The activity of
      these enzymes is regulated allosterically and by phosphorylation, with feedback
      inhibition from pyrimidine nucleotides and activation by compounds such as N-acetyl-L-glutamate.
