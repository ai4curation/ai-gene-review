  name:
    name: Ion-translocating oxidoreductase complex subunit A/E
    short: NqrDE/RnfAE_oxidrdctase
  description:
  - text: The NqrDE/RnfAE family comprises membrane-bound complexes that couple electron
      transfer with ion translocation across the membrane. These complexes are involved
      in various cellular processes, including maintaining the reduced state of SoxR,
      nitrogen fixation, and energy conservation during autotrophic and heterotrophic
      growth. They catalyze the reduction of ubiquinone to ubiquinol, coupled with
      Na+ or H+ transport from the cytoplasm to the periplasm or out of the cell.
      This reaction is essential for various metabolic pathways, including methanogenesis
      from acetate. Some family members are specifically required for electron transfer
      to nitrogenase, which is crucial for nitrogen fixation. The activity of these
      complexes is tightly coupled to their ion pumping function and is essential
      for cellular energy metabolism and redox balance.
