  name:
    name: Alpha-1,4-glucan:maltose-1-phosphate maltosyltransferase
    short: GlgE_maltosyltransferase
  description:
  - text: The Alpha-1,4-glucan:maltose-1-phosphate maltosyltransferase family consists
      of enzymes that use maltose 1-phosphate (M1P) to elongate alpha-(1->4)-glucans,
      playing a crucial role in a branched alpha-glucan biosynthetic pathway derived
      from trehalose. Family members are involved in various reactions, including
      the extension of maltooligosaccharides, disproportionation, and the reverse
      reaction of releasing M1P from glycogen. They exhibit specificity for the alpha-anomer
      of M1P and show an alpha-retaining catalytic mechanism. Some family members
      are inhibited by compounds such as inorganic phosphate, arsenate, ATP, and cyclodextrins.
      The family is part of the glycosyl hydrolase 13 family, GlgE subfamily, and
      works in conjunction with other enzymes like TreS, Mak, and GlgB to facilitate
      the biosynthesis of branched alpha-glucans.
