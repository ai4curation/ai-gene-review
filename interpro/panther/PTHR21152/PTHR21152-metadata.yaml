  name:
    name: Class-V Pyridoxal-Phosphate-Dependent Aminotransferase
    short: Class-V_PLP-Dep_Aminotrans
  description:
  - text: The Class-V Pyridoxal-Phosphate-Dependent Aminotransferase family includes
      enzymes that catalyze various transamination reactions, which are essential
      for amino acid metabolism and detoxification processes. Members of the family
      are involved in the reversible conversion of 3-phosphohydroxypyruvate to phosphoserine,
      playing a key role in serine biosynthesis. They also contribute to the detoxification
      of glyoxylate by transaminating it to glycine, which is significant in gluconeogenesis
      and in mitigating the effects of toxic metabolites. Some family members participate
      in the catabolism of tryptophan derivatives, converting 3-hydroxykynurenine
      to xanthurenic acid. The family also includes enzymes that function in the degradation
      of L-serine via 3-hydroxypyruvate, and in the assimilation of glyoxylate via
      the beta-hydroxyaspartate cycle. The enzymes are characterized by their dependence
      on the cofactor pyridoxal 5'-phosphate and exhibit a broad substrate specificity,
      which reflects their diverse metabolic roles across different organisms.
