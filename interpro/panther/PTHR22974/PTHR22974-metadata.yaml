  name:
    name: Serine/Threonine and Dual Specificity Protein Kinases
    short: Ser_Thr_DualSpec_Kinases
  description:
  - text: The protein family is characterized by serine/threonine kinase activity,
      with some members also having dual specificity for tyrosine phosphorylation.
      Members are involved in various cellular processes including cell proliferation,
      mitotic checkpoint signaling, chromatin assembly, DNA replication, transcription,
      repair, and chromosome segregation. Some family members are essential for correct
      development and differentiation, such as the initiation of floral organ primordia
      in plants. Activity regulation is often cell cycle-dependent, with alterations
      in response to DNA damage. The family includes proteins that phosphorylate histone
      H3 and other substrates, playing roles in transcription elongation and the stabilization
      of chromatin assembly factors. Some are implicated in spindle pole body duplication
      and are essential for chromosome alignment during mitosis by enhancing the activity
      of other proteins at the centromere.
