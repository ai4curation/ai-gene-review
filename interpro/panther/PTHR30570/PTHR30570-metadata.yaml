  name:
    name: Phosphate-binding ABC transporter substrate-binding
    short: Phosphate_ABC_transporter
  description:
  - text: This family of proteins is primarily involved in the transport of phosphate
      across the cytoplasmic membrane. They are components of the ABC transporter
      complex PstSACB, which is responsible for phosphate import into the cell. These
      proteins have a high affinity for inorganic phosphate, which they bind to facilitate
      its transport. Some members of this family have been implicated in host cell
      adhesion and may play a role in virulence by acquiring phosphate from the host.
      Additionally, certain members are inhibited by arsenate, pyrophosphate, and
      polyphosphates, but not by organic phosphates.
