  name:
    name: Nitrate reductase/Sulfite oxidase
    short: Nitrate_red/Sulfite_oxi
  description:
  - text: The nitrate reductase family comprises enzymes that play a crucial role
      in the nitrogen cycle, specifically in the first step of nitrate assimilation.
      Members of this family are responsible for the reduction of nitrate to nitrite,
      a reaction that is essential for the metabolism of nitrogen in plants, fungi,
      and bacteria. Nitrate reductases are typically regulated by the nitrogen source
      and may also be controlled by circadian rhythms. Additionally, some members
      of this family, such as sulfite oxidases, are involved in the oxidation of sulfite
      to sulfate, which is a key step in the degradation of sulfur-containing amino
      acids in animals.
