  description:
  - text: This family of proteins includes enzymes that are characterized by their
      ability to catalyze the hydrolysis of amide bonds. Amidases are involved in
      various biological processes, including the metabolism of amino acids, nucleotides,
      and other small organic molecules. They play a crucial role in the nitrogen
      cycle by participating in the degradation of nitrogenous compounds, thereby
      contributing to nitrogen recycling in the environment. Amidases are found across
      different organisms and are essential for maintaining cellular nitrogen balance.
      They exhibit substrate specificity, which is determined by the structure of
      their active site, and are often regulated by the availability of their substrates
      and products.
