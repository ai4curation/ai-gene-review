  name:
    name: Branched-Chain Amino Acid Transport ATP-binding Protein LivF
    short: BCAA_Transport_ATP-bd_LivF
  description:
  - text: The LivF protein family is involved in the transport of branched-chain amino
      acids (BCAAs) such as leucine, isoleucine, and valine. Members of this family
      function as components of high-affinity transport systems that do not require
      sodium ions for activity. These systems are specialized for the uptake of BCAAs,
      which are essential nutrients in the cell. Some members are also capable of
      transporting alanine and threonine. The family belongs to the larger ABC transporter
      superfamily, which is characterized by the presence of ATP-binding domains that
      power the transport process.
