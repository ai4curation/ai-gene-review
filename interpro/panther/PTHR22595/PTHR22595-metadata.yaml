  name:
    name: Plant Chitinase Class I/II
    short: Plant_Chitinase_ClsI/II
  description:
  - text: The glycosyl hydrolase 19 family, specifically the chitinase class I and
      class II subfamilies, consists of enzymes predominantly involved in plant defense
      against chitin-containing fungal and bacterial pathogens. Members of the family
      hydrolyze chitin, a key component of fungal cell walls, thereby inhibiting the
      growth and development of potential pathogens. Some proteins within the family
      have evolved to lose catalytic activity but retain chitin-binding properties,
      contributing to defense mechanisms through non-hydrolytic means. Additionally,
      certain members are implicated in plant development processes, such as embryogenesis
      and seed maturation. The family also includes proteins with unique functions
      like lectin activity, alpha-amylase inhibition, and insecticidal properties,
      reflecting a diversification of roles beyond pathogen defense.
