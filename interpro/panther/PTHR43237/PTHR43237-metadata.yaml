  name:
    name: Malate Decarboxylating Enzymes
    short: Malate_Decarboxylase
  description:
  - text: This family of proteins includes enzymes that are primarily involved in
      the decarboxylation of malate to pyruvate, a key step in the tricarboxylic acid
      cycle. Some members also exhibit malolactic enzyme activity, converting malate
      to lactate, particularly in the presence of NADPH. These enzymes can use either
      NAD or NADP as a cofactor, although there is a preference for NADP in certain
      members. The family is characterized by a C-terminal domain that may be involved
      in oligomerization and is associated with regulatory functions, including inhibition
      by acetyl-CoA and activation by various metabolites. Additionally, some members
      are bifunctional, with the ability to decarboxylate oxaloacetate. The enzymes
      play crucial roles in metabolic processes such as nitrogen fixation in bacteria
      and maintaining cellular NADPH balance.
