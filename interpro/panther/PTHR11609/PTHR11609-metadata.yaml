  name:
    name: PurK/PurT family ATP-dependent AIR carboxylases
    short: PurK/PurT
  description:
  - text: The PurK/PurT family includes enzymes that catalyze the ATP-dependent carboxylation
      of 5-aminoimidazole ribonucleotide (AIR) to N5-carboxyaminoimidazole ribonucleotide
      (N5-CAIR) using bicarbonate as a substrate. This reaction is a critical step
      in the de novo biosynthesis of purine nucleotides, which are essential building
      blocks for DNA and RNA, as well as for the regulation of energy within cells.
      Members of the PurK/PurT family are found across various bacterial species,
      reflecting the fundamental nature of purine biosynthesis in cellular metabolism
      and genetic information processing.
