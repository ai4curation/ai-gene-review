  description:
  - text: <p>This family contains a number of bacterial stage II sporulation E proteins
      ([ec:3.1.3.16]). These are required for formation of a normal polar septum during
      sporulation. The N-terminal region is hydrophobic and is expected to contain
      up to 12 membrane-spanning segments [[cite:PUB00013052]].</p>
