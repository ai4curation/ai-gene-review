  description:
  - text: <p>This entry includes Outer membrane protein assembly factor BamB which
      consists of a beta-propeller made of PQQ (Pyrrolo-quinoline quinone) repeats,
      found in quinoproteins. BamB is part of the outer membrane protein assembly
      complex (Bam), which is involved in assembly and insertion of beta-barrel proteins
      into the outer membrane. It is not an essential component and it may orient
      the flexible periplasmic domain of BamA for interaction with other Bam components,
      chaperones and nascent outer membrane proteins [[cite:PUB00060770],[cite:PUB00106876],[cite:PUB00106877]].</p>
