  name:
    name: Protein kinase domain
    short: Prot_kinase_dom
  description:
  - text: <p>This entry represents the protein kinase domain containing the catalytic
      function of protein kinases [[cite:PUB00003569]]. This domain is found in serine/threonine-protein
      kinases, tyrosine-protein kinases and dual specificity protein kinases.</p>
    llm: false
    checked: false
    updated: false
  - text: <p>Eukaryotic protein kinases [[cite:PUB00003569], [cite:PUB00005115], [cite:PUB00015293],
      [cite:PUB00001530], [cite:PUB00003568]] are enzymes that belong to a very extensive
      family of proteins which share a conserved catalytic core common with both serine/threonine
      and tyrosine protein kinases. There are a number of conserved regions in the
      catalytic domain of protein kinases. In the N-terminal extremity of the catalytic
      domain there is a glycine-rich stretch of residues in the vicinity of a lysine
      residue, which has been shown to be involved in ATP binding. In the central
      part of the catalytic domain there is a conserved aspartic acid residue which
      is important for the catalytic activity of the enzyme [[cite:PUB00005145]].</p>
    llm: false
    checked: false
    updated: false
  - text: "<p>Protein phosphorylation, which plays a key role in most cellular activities,\
      \ is a reversible process mediated by protein kinases and phosphoprotein phosphatases.\
      \ Protein kinases catalyse the transfer of the gamma phosphate from nucleotide\
      \ triphosphates (often ATP) to one or more amino acid residues in a protein\
      \ substrate side chain, resulting in a conformational change affecting protein\
      \ function. Phosphoprotein phosphatases catalyse the reverse process. \nProtein\
      \ kinases fall into three broad classes, characterised with respect to substrate\
      \ specificity [[cite:PUB00005115]]:</p>\n\n<ul>\n<li>Serine/threonine-protein\
      \ kinases</li>\n<li>Tyrosine-protein kinases</li>\n<li>Dual specificity protein\
      \ kinases (e.g. MEK -phosphorylates both Thr and Tyr on target proteins)</li>\n\
      </ul>\n\n<p>Protein kinase function is evolutionarily conserved from Escherichia\
      \ coli to human [[cite:PUB00020114]]. Protein kinases play a role in a multitude\
      \ of cellular processes, including division, proliferation, apoptosis, and differentiation\
      \ [[cite:PUB00015362]]. Phosphorylation usually results in a functional change\
      \ of the target protein by changing enzyme activity, cellular location, or association\
      \ with other proteins. The catalytic subunits of protein kinases are highly\
      \ conserved, and several structures have been solved [[cite:PUB00034898]], leading\
      \ to large screens to develop kinase-specific inhibitors for the treatments\
      \ of a number of diseases [[cite:PUB00034899]].</p>"
    llm: false
    checked: false
    updated: false
