    short: Sigma_54_int
  description:
  - text: <p>This entry represents the whole ATP-binding domain, including the ATP-binding
      motif A and the motif B. This domain has been termed RNA polymerase sigma factor
      54 interaction domain.</p>
    llm: false
    checked: false
    updated: false
  - text: <p>Some bacterial regulatory proteins activate the expression of genes from
      promoters recognised by core RNA polymerase associated with the alternative
      sigma-54 factor. These have a conserved domain of about 230 residues involved
      in the ATP-dependent [[cite:PUB00002228], [cite:PUB00004389]] interaction with
      sigma-54. About half of the proteins in which this domain is found (algB, dcdT,
      flbD, hoxA, hupR1, hydG, ntrC, pgtA and pilR) belong to signal transduction
      two-component systems [[cite:PUB00000103]] and possess a domain that can be
      phosphorylated by a sensor-kinase protein in their N-terminal section. Almost
      all of these proteins possess a helix-turn-helix DNA-binding domain in their
      C-terminal section. The domain which interacts with the sigma-54 factor has
      an ATPase activity. This may be required to promote a conformational change
      necessary for the interaction [[cite:PUB00001221]]. The domain contains an atypical
      ATP-binding motif A (P-loop) as well as a form of motif B. The two ATP-binding
      motifs are located in the N-terminal section of the domain.</p>
    llm: false
    checked: false
    updated: false
