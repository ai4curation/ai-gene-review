  name:
    name: Pseudouridine synthase, catalytic domain superfamily
    short: PsdUridine_synth_cat_dom_sf
  description:
  - text: '<p>Pseudouridine synthases catalyse the isomerisation of uridine to pseudouridine
      (Psi) in a variety of RNA molecules, and may function as RNA chaperones. Pseudouridine
      is the most abundant modified nucleotide found in all cellular RNAs. There are
      four distinct families of pseudouridine synthases that share no global sequence
      similarity, but which do share the same fold of their catalytic domain(s) and
      uracil-binding site and are descended from a common molecular ancestor. The
      catalytic domain consists of two subdomains, each of which has an α+β structure
      that has some similarity to the ferredoxin-like fold (note: some pseudouridine
      synthases contain additional domains). The active site is the most conserved
      structural region of the superfamily and is located between the two homologous
      domains. These families are [[cite:PUB00045922], [cite:PUB00092579]]:</p>


      <ul><li>Pseudouridine synthase I, TruA.</li>

      <li>Pseudouridine synthase II, TruB, which contains and additional C-terminal
      PUA domain.</li>

      <li>Pseudouridine synthase RsuA. RluB, RluE and RluF are also part of this family.</li>

      <li>Pseudouridine synthase RluA. TruC, RluC and RluD belong to this family.</li>

      <li>Pseudouridine synthase TruD, which has a natural circular permutation in
      the catalytic domain, as well as an insertion of a family-specific α+β subdomain.</li></ul>'
    llm: false
    checked: false
    updated: false
  - text: "<p>TruA from Escherichia coli modifies positions U-38, U-39 and/or U-40\
      \ in tRNA [[cite:PUB00015686], [cite:PUB00042017]]. TruA contains one atom of\
      \ zinc essential for its native conformation and tRNA recognition and has a\
      \ strictly conserved aspartic acid that is likely to be involved in catalysis\
      \ [[cite:PUB00000455]]. These enzymes are dimeric proteins that contain two\
      \ positively charged, RNA-binding clefts along their surface. Each cleft contains\
      \ a highly conserved aspartic acid located at its centre. The structural domains\
      \ have a topological similarity to those of other RNA-binding proteins, though\
      \ the mode of interaction with tRNA appears to be unique.</p>\r\n<p>TruB is\
      \ responsible for the pseudouridine residue present in the T loops of virtually\
      \ all tRNAs. TruB recognises the preformed 3-D structure of the T loop primarily\
      \ through shape complementarity.  It accesses its substrate uridyl residue by\
      \ flipping out the nucleotide and disrupts the tertiary structure of tRNA [[cite:PUB00026665]].</p>\r\
      \n<p>RsuA from E. coli catalyses formation of pseudouridine at position U-516\
      \ in 16S rRNA during assembly of the 30S ribosomal subunit [[cite:PUB00018355]].\
      \ RsuA consists of an N-terminal domain connected by an extended linker to the\
      \ central and C-terminal domains. Uracil and UMP bind in a cleft between the\
      \ central and C-terminal domains near the catalytic residue Asp 102. The N-terminal\
      \ domain shows structural similarity to the ribosomal protein S4. Despite only\
      \ 15% amino acid identity, the other two domains are structurally similar to\
      \ those of the tRNA-specific psi-synthase TruA, including the position of the\
      \ catalytic Asp. Our results suggest that all four families of pseudouridine\
      \ synthases share the same fold of their catalytic domain(s) and uracil-binding\
      \ site.</p>\r\n<p>RluC and RluD are homologous enzymes which each convert three\
      \ specific uridine bases in E. coli ribosomal 23S RNA to pseudouridine: bases\
      \ U-955, U-2504, and U-2580 in the case of RluC and U-1911, U-1915, and U-1917\
      \ in the case of RluD [[cite:PUB00032035]]. RluD also possesses a second function\
      \ related to proper assembly of the 50S ribosomal subunit that is independent\
      \ of Psi-synthesis [[cite:PUB00037409]]. Both RluC and RluD have an N-terminal\
      \ S4 RNA binding domain. Despite the conserved topology shared by RluC and RluD,\
      \ the surface shape and charge distribution are very different.</p>"
    llm: false
    checked: false
    updated: false
