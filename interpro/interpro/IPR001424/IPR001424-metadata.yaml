    name: Superoxide dismutase, copper/zinc binding domain
    short: SOD_Cu_Zn_dom
  description:
  - text: "<p>Superoxide dismutases (SODs) are ubiquitous metalloproteins that prevent\
      \ damage by oxygen-mediated free radicals by catalysing the dismutation of superoxide\
      \ into molecular oxygen and hydrogen peroxide [[cite:PUB00000151]]. Superoxide\
      \ is a normal by-product of aerobic respiration and is produced by a number\
      \ of reactions, including oxidative phosphorylation and photosynthesis. The\
      \ dismutase enzymes have a very high catalytic efficiency due to the attraction\
      \ of superoxide to the ions bound at the active site [[cite:PUB00004789], [cite:PUB00001545]].</p>\r\
      \n\r\n<p>There are three forms of superoxide dismutase, depending on the metal\
      \ cofactor: Cu/Zn (which binds both copper and zinc), Fe and Mn types. The Fe\
      \ and Mn forms are similar in their primary, secondary and tertiary structures,\
      \ but are distinct from the Cu/Zn form [[cite:PUB00004722]]. Prokaryotes and\
      \ protists contain Mn, Fe or both types, while most eukaryotic organisms utilise\
      \ the Cu/Zn type.</p>"
    llm: false
    checked: false
    updated: false
  - text: <p>Defects in the human SOD1 gene causes familial amyotrophic lateral sclerosis
      (Lou Gehrig's disease). Cytoplasmic and periplasmic SODs exist as dimers, whereas
      chloroplastic and extracellular enzymes exist as tetramers. Structural analysis
      supports the notion of independent functional evolution in prokaryotes (P-class)
      and eukaryotes (E-class) [[cite:PUB00080003], [cite:PUB00032612], [cite:PUB00022943],
      [cite:PUB00023102], [cite:PUB00032697], [cite:PUB00026910], [cite:PUB00080004],
      [cite:PUB00001002]].</p>
    llm: false
    checked: false
    updated: false
