  name:
    name: Small GTPase, Ras-type
    short: Small_GTPase_Ras-type
  description:
  - text: '<p>Ras proteins are small GTPases that regulate cell growth, proliferation
      and differentiation. The different Ras isoforms: H-ras, N-ras and K-ras, generate
      distinct signal outputs, despite interacting with a common set of activators
      and effectors. Ras is activated by guanine nucleotide exchange factors (GEFs)
      that release GDP and allow GTP binding. Many RasGEFs have been identified. These
      are sequestered in the cytosol until activation by growth factors triggers recruitment
      to the plasma membrane or Golgi, where the GEF colocalises with Ras. Active
      GTP-bound Ras interacts with several effector proteins: among the best characterised
      are the Raf kinases, phosphatidylinositol 3-kinase (PI3K), RalGEFs and NORE/MST1.</p>'
    llm: false
    checked: false
    updated: false
  - text: '<p>Small GTPases form an independent superfamily within the larger class
      of regulatory GTP hydrolases. This superfamily contains proteins that control
      a vast number of important processes and possess a common, structurally preserved
      GTP-binding domain [[cite:PUB00052600], [cite:PUB00004087]]. Sequence comparisons
      of small G proteins from various species have revealed that they are conserved
      in primary structures at the level of 30-55% similarity [[cite:PUB00000348]].</p>


      <p>Crystallographic analysis of various small G proteins revealed the presence
      of a 20kDa catalytic domain that is unique for the whole superfamily [[cite:PUB00004087],
      [cite:PUB00023196]]. The domain is built of five α helices (A1-A5), six β-strands
      (B1-B6) and five polypeptide loops (G1-G5). A structural comparison of the GTP-
      and GDP-bound forms allows one to distinguish two functional loop regions: switch
      I and switch II that surround the gamma-phosphate group of the nucleotide. The
      G1 loop (also called the P-loop) that connects the B1 strand and the A1 helix
      is responsible for the binding of the phosphate groups. The G3 loop provides
      residues for Mg2 and phosphate binding and is located at the N terminus of the
      A2 helix. The G1 and G3 loops are sequentially similar to Walker A and Walker
      B boxes that are found in other nucleotide binding motifs. The G2 loop connects
      the A1 helix and the B2 strand and contains a conserved Thr residue responsible
      for Mg2 binding. The guanine base is recognised by the G4 and G5 loops. The
      consensus sequence NKXD of the G4 loop contains Lys and Asp residues directly
      interacting with the nucleotide. Part of the G5 loop located between B6 and
      A5 acts as a recognition site for the guanine base [[cite:PUB00015117]].</p>


      <p>The small GTPase superfamily can be divided into at least 8 different families,
      including:</p>


      <ul><li>Arf small GTPases. GTP-binding proteins involved in protein trafficking
      by modulating vesicle budding and uncoating within the Golgi apparatus.</li>

      <li>Ran small GTPases. GTP-binding proteins involved in nucleocytoplasmic transport.
      Required for the import of proteins into the nucleus and also for RNA export.</li>

      <li>Rab small GTPases. GTP-binding proteins involved in vesicular traffic.</li>

      <li>Rho small GTPases. GTP-binding proteins that control cytoskeleton reorganisation.</li>

      <li>Ras small GTPases. GTP-binding proteins involved in signalling pathways.</li>

      <li>Sar1 small GTPases. Small GTPase component of the coat protein complex II
      (COPII) which promotes the formation of transport vesicles from the endoplasmic
      reticulum (ER).</li>

      <li>Mitochondrial Rho (Miro). Small GTPase domain found in mitochondrial proteins
      involved in mitochondrial trafficking.</li>

      <li>Roc small GTPases domain. Small GTPase domain always found associated with
      the COR domain.</li></ul>'
    llm: false
    checked: false
    updated: false
