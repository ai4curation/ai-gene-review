 syntax="proto3";
 package
// metamodel_version: 1.7.0
// An alternative splicing product (isoform) of the gene. Corresponds to UniProt isoform entries. Use this to document isoform-specific functions where different isoforms have distinct or even antagonistic biological activities. DEPRECATED: Use FunctionalIsoform instead for curated functional classes.
message AlternativeProduct
 {
  string id = 0
  string name = 0
  string sequenceNote = 0
  string description = 0
 }
// A descriptor for an anatomical entity, tissue, organismal region, or structure.
message AnatomicalEntityDescriptor
 {
  string preferredTerm = 0
  string description = 0
  term term = 0
 repeated  evidenceItem evidence = 0
  string notes = 0
 }
message AnnotationExtension
 {
  string predicate = 0
  term term = 0
 }
// A descriptor for a biological process, pathway, reaction, or process-like module grounding.
message BiologicalProcessDescriptor
 {
  string preferredTerm = 0
  string description = 0
  term term = 0
 repeated  evidenceItem evidence = 0
  string notes = 0
 repeated  descriptor inputs = 0
 repeated  descriptor outputs = 0
 repeated  descriptor occursIn = 0
  descriptor startsWith = 0
  descriptor endsWith = 0
 }
// A descriptor for a cell type or cell state.
message CellTypeDescriptor
 {
  string preferredTerm = 0
  string description = 0
  term term = 0
 repeated  evidenceItem evidence = 0
  string notes = 0
 }
// A descriptor for a cellular component, organelle, compartment, or complex location.
message CellularComponentDescriptor
 {
  string preferredTerm = 0
  string description = 0
  term term = 0
 repeated  evidenceItem evidence = 0
  string notes = 0
 }
// A descriptor for a chemical entity, metabolite, cofactor, ion, or small molecule.
message ChemicalEntityDescriptor
 {
  string preferredTerm = 0
  string description = 0
  term term = 0
 repeated  evidenceItem evidence = 0
  string notes = 0
 }
// A role-bearing unit within a protein complex descriptor.
message ComplexUnit
 {
  string id = 0
  string label = 0
  participantSelector participant = 0
  string role = 0
  string stoichiometry = 0
  molecularFunctionDescriptor function = 0
 repeated  evidenceItem evidence = 0
  string notes = 0
 }
// Assessment of overlap between rule conditions
message ConditionOverlapAssessment
 {
  overlapEnum assessment = 0
  string notes = 0
 repeated  supportingTextInReference supportedBy = 0
 }
// A core function is a GO-CAM-like annotation of the core evolved functions of a gene. This is a synthesis of the reviewed core annotations, brought together into a unified GO-CAM-like representation.
message CoreFunction
 {
 repeated  knowledgeGap knowledgeGaps = 0
  string description = 0
 repeated  supportingTextInReference supportedBy = 0
  term molecularFunction = 0
  term contributesToMolecularFunction = 0
 repeated  term directlyInvolvedIn = 0
 repeated  term locations = 0
 repeated  term anatomicalLocations = 0
 repeated  term substrates = 0
  term inComplex = 0
 }
// A human-friendly descriptor with optional ontology/database grounding. The preferred_term may be more nuanced than the term label, and the term may be absent when no good identifier exists yet.
message Descriptor
 {
  string preferredTerm = 0
  string description = 0
  term term = 0
 repeated  evidenceItem evidence = 0
  string notes = 0
 }
// A descriptor for a developmental stage, life-cycle stage, or temporal window.
message DevelopmentalStageDescriptor
 {
  string preferredTerm = 0
  string description = 0
  term term = 0
 repeated  evidenceItem evidence = 0
  string notes = 0
 }
// A descriptor for a protein domain, motif, site, or architectural feature.
message DomainDescriptor
 {
  string preferredTerm = 0
  string description = 0
  term term = 0
 repeated  evidenceItem evidence = 0
  string notes = 0
 }
// An embedded representation of an ARBA or UniRule for storage in YAML. Captures the essential structure: conditions (antecedent) and GO annotations (consequent).
message EmbeddedRule
 {
  string ruleId = 0
 repeated  ruleConditionSet conditionSets = 0
 repeated  ruleGOAnnotation goAnnotations = 0
  interPro2GORedundancy ipr2goRedundancy = 0
 repeated  ruleReviewEntry entries = 0
  integer reviewedProteinCount = 0
  integer unreviewedProteinCount = 0
  string createdDate = 0
  string modifiedDate = 0
 }
// A lightweight citable source for module-level assertions. The source may be a PMID, DOI, database record, local file, pathway record, issue, or any other citable artifact. This is deliberately less strict than the publication quote validation used in gene reviews.
message EvidenceItem
 {
  string sourceId = 0
  string title = 0
  string statement = 0
  string supportingText = 0
  string url = 0
  string notes = 0
 }
// An existing annotation from the GO database, plus a review of the annotation.
message ExistingAnnotation
 {
  term term = 0
  annotationQualifierEnum qualifier = 0
 repeated  annotationExtension extensions = 0
  boolean negated = 0
  evidenceType evidenceType = 0
  reference originalReferenceId = 0
  boolean retired = 0
  string isoform = 0
 repeated  string supportingEntities = 0
  review review = 0
 }
// A suggested experiment to answer a question about the gene
message Experiment
 {
  string hypothesis = 0
  string description = 0
  string experimentType = 0
 }
// A descriptor for a protein family, orthogroup, or other evolutionary grouping.
message FamilyDescriptor
 {
  string preferredTerm = 0
  string description = 0
  term term = 0
 repeated  evidenceItem evidence = 0
  string notes = 0
 repeated  geneProductDescriptor representativeMembers = 0
 }
// A finding is a statement about a gene, which is supported by a reference. Similar to "comments" in uniprot
message Finding
 {
  string statement = 0
  string supportingText = 0
  boolean fullTextUnavailable = 0
  manuscriptSection referenceSectionType = 0
  findingReview findingReview = 0
 }
// Manual reviewer assessment of a specific finding within a reference - in particular whether it remains current, is disputed, or has been overturned/superseded by later evidence. This is finer-grained than reference_review (which assesses the whole reference); a paper may contain some findings that stand and others that are overturned. All fields optional and reviewer-supplied.
message FindingReview
 {
  findingReviewStatusEnum findingStatus = 0
 repeated  reference supersededBy = 0
  string reviewNotes = 0
 }
// A curated functional isoform class. Unlike AlternativeProduct (which maps 1:1 to UniProt isoforms), this captures FUNCTIONALLY RELEVANT distinctions that may: - Group multiple UniProt isoforms into a functional class (e.g., WT1 +KTS isoforms) - Represent cleavage products from polyproteins (e.g., POMC peptides) - Describe modification states or conformational variants Only create entries when there ARE functionally distinct forms worth documenting.
message FunctionalIsoform
 {
  string id = 0
  string name = 0
  functionalIsoformTypeEnum type = 0
 repeated  functionalIsoformMapping mapsTo = 0
  string description = 0
 repeated  term isoformSpecificTerms = 0
 }
// A mapping from a functional isoform class to underlying UniProt identifiers. Allows grouping multiple UniProt isoforms or chains into a single functional class.
message FunctionalIsoformMapping
 {
  functionalIsoformMappingTypeEnum type = 0
 repeated  string ids = 0
  string residues = 0
 }
// A descriptor for a gene or locus.
message GeneDescriptor
 {
  string preferredTerm = 0
  string description = 0
  term term = 0
 repeated  evidenceItem evidence = 0
  string notes = 0
 }
// A descriptor for a gene product, protein, isoform, or gene-product form.
message GeneProductDescriptor
 {
  string preferredTerm = 0
  string description = 0
  term term = 0
 repeated  evidenceItem evidence = 0
  string notes = 0
 }
// Complete review for a gene
message GeneReview
 {
  string id = 0
  string geneSymbol = 0
  productTypeEnum productType = 0
 repeated  string aliases = 0
 repeated  string tags = 0
  geneReviewStatusEnum status = 0
  string description = 0
  term taxon = 0
 repeated  alternativeProduct alternativeProducts = 0
 repeated  functionalIsoform functionalIsoforms = 0
 repeated  reference references = 0
 repeated  existingAnnotation existingAnnotations = 0
 repeated  coreFunction coreFunctions = 0
 repeated  proposedOntologyTerm proposedNewTerms = 0
 repeated  question suggestedQuestions = 0
 repeated  experiment suggestedExperiments = 0
 repeated  knowledgeGap knowledgeGaps = 0
 }
// Assessment of GO term specificity
message GOSpecificityAssessment
 {
  specificityEnum assessment = 0
  string notes = 0
 repeated  supportingTextInReference supportedBy = 0
 }
// Analysis of whether rule GO annotations are redundant with existing InterPro2GO mappings from the GO Consortium.
message InterPro2GORedundancy
 {
 repeated  redundantAnnotation redundantAnnotations = 0
 repeated  string novelAnnotations = 0
  string summary = 0
 }
// A curated, literature-grounded statement of what is NOT known about a gene product, core function, module, or step — its molecular activity, mechanism, partner(s), localization, or biological role. A knowledge gap is a reviewer judgment reached by reading the primary literature, NOT a pattern in the annotations: a heavily annotated gene can hide a gaping mechanistic hole, and a sparsely annotated one can be perfectly understood and merely under-curated. Each gap is a small, defensible scholarly object with the same evidentiary discipline used for positive claims. See projects/FUNCTION_KNOWLEDGE_GAPS.md for the methodology and worked exemplars.
message KnowledgeGap
 {
  string gapStatement = 0
  string boundary = 0
 repeated  knowledgeGapKindEnum gapKind = 0
  knowledgeGapAspectEnum darkAspect = 0
  knowledgeGapStatusEnum status = 0
  string significance = 0
  string resolution = 0
 repeated  supportingTextInReference provenance = 0
 repeated  proposedOntologyTerm proposedTerms = 0
 }
// Assessment of literature support for the rule
message LiteratureSupportAssessment
 {
  literatureSupportEnum assessment = 0
  string notes = 0
 repeated  supportingTextInReference supportedBy = 0
 }
// A leaf role assertion in a module. The participant may be a concrete gene or an abstract selector, and the function/process/location fields are descriptor holders rather than direct GO annotation exports.
message ModuleAnnoton
 {
  string id = 0
  string label = 0
  participantSelector participant = 0
  molecularFunctionDescriptor function = 0
 repeated  biologicalProcessDescriptor processes = 0
 repeated  cellularComponentDescriptor locations = 0
  string roleDescription = 0
 repeated  evidenceItem evidence = 0
  string notes = 0
 }
// A connection between module nodes, annotons, or other named elements. Source and target are IDs scoped to the module document.
message ModuleConnection
 {
  string source = 0
  string target = 0
  moduleConnectionTypeEnum connectionType = 0
  relationDescriptor predicate = 0
  string description = 0
  moduleContext context = 0
 repeated  evidenceItem evidence = 0
  string notes = 0
 }
// Context that applies to a module node, variant, annoton, or connection.
message ModuleContext
 {
 repeated  taxonDescriptor taxa = 0
 repeated  cellTypeDescriptor cellTypes = 0
 repeated  anatomicalEntityDescriptor anatomicalLocations = 0
 repeated  developmentalStageDescriptor developmentalStages = 0
 repeated  cellularComponentDescriptor cellularComponents = 0
 repeated  descriptor conditions = 0
 repeated  evidenceItem evidence = 0
  string notes = 0
 }
// A node in a module. Nodes can be recursively decomposed using parts and variant_sets, and may also carry leaf annotons and connections.
message ModuleNode
 {
 repeated  knowledgeGap knowledgeGaps = 0
  string id = 0
  string label = 0
  moduleTypeEnum moduleType = 0
  string description = 0
 repeated  descriptor concepts = 0
  moduleContext context = 0
 repeated  moduleAnnoton annotons = 0
 repeated  modulePart parts = 0
 repeated  moduleVariantSet variantSets = 0
 repeated  moduleConnection connections = 0
 repeated  evidenceItem evidence = 0
  string notes = 0
 }
// A conjunctive part or step of a module node.
message ModulePart
 {
  integer order = 0
  string role = 0
  boolean optional = 0
  moduleNode node = 0
 repeated  evidenceItem evidence = 0
  string notes = 0
 }
// Review or curation record for a recursively decomposable biological module. This can describe a pathway, organelle lifecycle, protein complex, molecular function, developmental process, or abstract/evolutionary functional plan.
message ModuleReview
 {
  string id = 0
  string title = 0
  string description = 0
 repeated  reference references = 0
 repeated  knowledgeGap knowledgeGaps = 0
  string status = 0
  moduleNode module = 0
 repeated  evidenceItem evidence = 0
  string notes = 0
 }
// A set of alternative implementations for a module node or part. Variants may themselves contain parts, annotons, connections, and nested variant sets.
message ModuleVariantSet
 {
  string id = 0
  string label = 0
  string axis = 0
  variantSelectionEnum selection = 0
 repeated  moduleNode variants = 0
 repeated  evidenceItem evidence = 0
  string notes = 0
 }
// A descriptor for a molecular function. Extra slots capture common functional nuance without requiring formal post-composition.
message MolecularFunctionDescriptor
 {
  string preferredTerm = 0
  string description = 0
  term term = 0
 repeated  evidenceItem evidence = 0
  string notes = 0
 repeated  descriptor substrates = 0
 repeated  descriptor products = 0
 repeated  descriptor cofactors = 0
 repeated  descriptor targets = 0
 repeated  descriptor cargo = 0
  cellularComponentDescriptor sourceLocation = 0
  cellularComponentDescriptor destinationLocation = 0
 }
// Overlap statistics between two domain conditions (InterPro, FunFam, etc.) in the same condition set. Provides set difference metrics to measure uniqueness and redundancy.
message PairwiseOverlap
 {
  string conditionA = 0
  string conditionB = 0
  string conditionALabel = 0
  string conditionBLabel = 0
  proteinDatabaseEnum proteinDatabase = 0
  integer countA = 0
  integer countB = 0
  integer intersectionCount = 0
  integer aMinusBCount = 0
  integer bMinusACount = 0
  float jaccardSimilarity = 0
  float containmentAInB = 0
  float containmentBInA = 0
  overlapInterpretationEnum interpretation = 0
 repeated  integer conditionAInSets = 0
 repeated  integer conditionBInSets = 0
 }
// Assessment of rule parsimony (simplicity vs complexity)
message ParsimonyAssessment
 {
  parsimonyEnum assessment = 0
  string notes = 0
 repeated  supportingTextInReference supportedBy = 0
 }
// A selector for a concrete or abstract participant in a module annoton. This can ground to a gene, gene product, complex, family, domain, ortholog, homolog, or any entity satisfying a functional/domain constraint.
message ParticipantSelector
 {
  participantSelectorTypeEnum selectorType = 0
  geneDescriptor gene = 0
  geneProductDescriptor geneProduct = 0
  proteinComplexDescriptor proteinComplex = 0
  familyDescriptor family = 0
  domainDescriptor domain = 0
  geneDescriptor homologOf = 0
  geneDescriptor orthologOf = 0
  molecularFunctionDescriptor requiredFunction = 0
  domainDescriptor requiredDomain = 0
  taxonDescriptor taxon = 0
  string description = 0
 repeated  evidenceItem evidence = 0
  string notes = 0
 }
// A single computational prediction and its review. Each prediction comes from a specific method and predicts a term (EC number, GO term, etc.) for the gene.
message PredictedAnnotation
 {
  string sourceMethod = 0
  string sourceVersion = 0
  string sourceReferenceId = 0
  term predictedTerm = 0
  predictedTermTypeEnum predictedTermType = 0
  predictionAssessment review = 0
 }
// Assessment of a single computational prediction. Uses categories from de Crécy-Lagard et al. 2025 (PMID:40703034) plus extensions for GO predictions.
message PredictionAssessment
 {
  predictionAssessmentEnum assessment = 0
  integer confidenceScore = 0
  predictionErrorTypeEnum errorType = 0
  string summary = 0
 repeated  supportingTextInReference supportedBy = 0
 }
// Review of computational/ML predictions for a gene that are NOT in the curated GOA/UniProt annotations. This captures predictions from methods like DeepECTF, PANTHER/IBA, InterPro2GO, CLEAN, GloEC, MAPred, etc. and evaluates them against literature and bioinformatic evidence. Inspired by the systematic evaluation in de Crécy-Lagard et al. 2025 (PMID:40703034).
message PredictionReview
 {
  string id = 0
  string geneSymbol = 0
  term taxon = 0
  string description = 0
 repeated  reference references = 0
  geneReviewStatusEnum status = 0
  string locusTag = 0
 repeated  string sourceDocuments = 0
 repeated  predictedAnnotation predictions = 0
 }
// A proposed new ontology term that should exist but doesn't currently
message ProposedOntologyTerm
 {
  string proposedName = 0
  string proposedDefinition = 0
  string justification = 0
  term proposedParent = 0
 repeated  termMapping proposedMappings = 0
 repeated  supportingTextInReference supportedBy = 0
 }
// A descriptor for a protein-containing complex or subcomplex.
message ProteinComplexDescriptor
 {
  string preferredTerm = 0
  string description = 0
  term term = 0
 repeated  evidenceItem evidence = 0
  string notes = 0
 repeated  complexUnit activeUnits = 0
 }
// A question to be answered about the gene
message Question
 {
  string question = 0
 repeated  string experts = 0
 }
// A GO annotation that is redundant with an existing InterPro2GO mapping
message RedundantAnnotation
 {
  string goId = 0
  string goLabel = 0
  string interproSource = 0
  string interproLabel = 0
 }
// A reference is a published text  that describes a finding or a method. References might be formal publications (where the ID is a PMID), or for methods, a GO_REF. Additionally, a reference to a local ad-hoc analysis or review can be made by using the `file:` prefix.
message Reference
 {
  string id = 0
  string title = 0
 repeated  finding findings = 0
  boolean isInvalid = 0
  publicationTypeEnum publicationType = 0
  boolean fullTextUnavailable = 0
  referenceReview referenceReview = 0
 }
// Manual reviewer assessment of a reference - how relevant it is to the gene's function, and whether it is correctly cited and scientifically sound. Distinct from the machine-fetched id/title fields; all fields are optional and reviewer-supplied.
message ReferenceReview
 {
  referenceRelevanceEnum relevance = 0
  referenceCorrectnessEnum correctness = 0
  string reviewNotes = 0
 }
// A relationship from this entry to another entry in the rule. Categorized as PREDICTS (this → other), PREDICTED_BY (other → this), or EQUIV (bidirectional).
message RelatedEntry
 {
  entryRelationshipEnum relationship = 0
  string targetId = 0
  float containment = 0
  float jaccardSimilarity = 0
  integer intersectionCount = 0
  integer exclusiveCount = 0
 }
// A descriptor for a relation or connection predicate.
message RelationDescriptor
 {
  string preferredTerm = 0
  string description = 0
  term term = 0
 repeated  evidenceItem evidence = 0
  string notes = 0
 }
// A review of an existing annotation.
message Review
 {
  string summary = 0
  actionEnum action = 0
  string reason = 0
 repeated  term proposedReplacementTerms = 0
 repeated  reference additionalReferenceIds = 0
 repeated  supportingTextInReference supportedBy = 0
 repeated  knowledgeGap knowledgeGaps = 0
 }
// A single condition in a rule antecedent
message RuleCondition
 {
  conditionTypeEnum conditionType = 0
  string value = 0
  string curie = 0
  string label = 0
  interProTypeEnum interproType = 0
  boolean negated = 0
  integer proteinCount = 0
  proteinDatabaseEnum proteinDatabase = 0
  float uniquenessScore = 0
 repeated  string sampleProteins = 0
 }
// A set of conditions that must ALL be true (conjunction/AND). Multiple condition sets in a rule are OR-ed together (disjunction).
message RuleConditionSet
 {
  integer number = 0
 repeated  ruleCondition conditions = 0
  string notes = 0
 repeated  pairwiseOverlap pairwiseOverlap = 0
 }
// A GO annotation produced by the rule
message RuleGOAnnotation
 {
  string goId = 0
  string goLabel = 0
  string aspect = 0
 }
// A review of a UniProt annotation rule (ARBA or UniRule). Each review covers ONE rule and assesses its quality, literature support, and biological appropriateness.
message RuleReview
 {
  string id = 0
  string description = 0
 repeated  reference references = 0
  ruleReviewStatusEnum status = 0
  ruleTypeEnum ruleType = 0
  embeddedRule rule = 0
  string reviewSummary = 0
  ruleActionEnum action = 0
  string actionRationale = 0
 repeated  string suggestedModifications = 0
  parsimonyAssessment parsimony = 0
  literatureSupportAssessment literatureSupport = 0
  conditionOverlapAssessment conditionOverlap = 0
  gOSpecificityAssessment goSpecificity = 0
  taxonomicScopeAssessment taxonomicScope = 0
  float confidence = 0
 repeated  supportingTextInReference supportedBy = 0
 }
// An entity in the rule - either a domain/family condition or a GO term target. Each entry tracks its relationships (predictions, predicted-by, equivalence) to other entries.
message RuleReviewEntry
 {
  string id = 0
  string label = 0
  entryTypeEnum type = 0
 repeated  integer appearsInConditionSets = 0
  integer proteinCount = 0
  string source = 0
 repeated  string assertedPredictedGoTerms = 0
 repeated  relatedEntry relatedEntries = 0
 }
// A supporting text in a reference.
message SupportingTextInReference
 {
  reference referenceId = 0
  string supportingText = 0
  string supportingTextFulltext = 0
  boolean fullTextUnavailable = 0
  manuscriptSection referenceSectionType = 0
 }
// A descriptor for a taxon or taxonomic scope.
message TaxonDescriptor
 {
  string preferredTerm = 0
  string description = 0
  term term = 0
 repeated  evidenceItem evidence = 0
  string notes = 0
 }
// Assessment of taxonomic restriction appropriateness
message TaxonomicScopeAssessment
 {
  taxonomicScopeEnum assessment = 0
  string notes = 0
 repeated  supportingTextInReference supportedBy = 0
 }
// A term in a specific ontology
message Term
 {
  string id = 0
  string label = 0
  string description = 0
  string ontology = 0
 }
// A mapping between the proposed term and an equivalent term in another ontology
message TermMapping
 {
  string predicate = 0
  term targetTerm = 0
 }
