---
name: Generate Pages

on:
  push:
    branches: [main]
    paths:
      - 'genes/**/*.yaml'
      - 'src/ai_gene_review/schema/**'
      - 'src/ai_gene_review/templates/**'
      - 'src/ai_gene_review/render.py'
      - 'src/ai_gene_review/render_projects.py'
      - 'src/ai_gene_review/render_modules.py'
      - 'src/ai_gene_review/export/**'
      - 'src/ai_gene_review/browser/**'
      - 'src/ai_gene_review/tools/minify_linkml_browser_data.py'
      - 'projects/*.md'
      - 'modules/**/*.yaml'
      - 'project.justfile'
      - '.github/workflows/generate-pages.yaml'
  workflow_dispatch:
    inputs:
      force:
        description: 'Force run even if already ran today'
        type: boolean
        default: false

concurrency:
  group: generate-pages
  cancel-in-progress: true

jobs:
  generate-pages:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # NOTE: The previous "Close stale regeneration PRs" step closed the
      # regeneration PR if it was older than one hour. Because the PR is created
      # as a draft and reuses a single branch, it was frequently auto-closed
      # before anyone merged it -- so newly added gene reviews had their YAML on
      # main but their rendered HTML never landed, producing 404s for those
      # pages. That step has been removed; the regeneration PR is now created
      # ready-for-review with auto-merge enabled so generated pages publish
      # reliably (see the "Create or update regeneration PR" step below).

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.12"

      - name: Install just
        run: uv tool install rust-just

      - name: Install project
        run: uv sync --dev

      - name: Get changed files
        id: changed
        run: |
          # Get YAML files changed in the triggering commit(s)
          CHANGED=$(git diff --name-only HEAD~1 HEAD -- 'genes/**/*-ai-review.yaml' 'rules/**/*-review.yaml' 2>/dev/null || echo "")
          echo "files<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGED" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          echo "Changed YAML files: $(echo "$CHANGED" | grep -c '.' || echo 0)"

      - name: Validate changed gene reviews
        run: |
          ERRORS=0
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            [ ! -f "$f" ] && continue
            if [[ "$f" == genes/*/*/*-ai-review.yaml ]]; then
              ORG=$(echo "$f" | cut -d/ -f2)
              GENE=$(echo "$f" | cut -d/ -f3)
              echo "=== Validating $ORG/$GENE ==="
              if ! just validate "$ORG" "$GENE"; then
                ERRORS=$((ERRORS + 1))
              fi
            fi
          done <<< "${{ steps.changed.outputs.files }}"
          if [ $ERRORS -gt 0 ]; then
            echo "❌ $ERRORS validation errors"
            exit 1
          fi
          echo "✅ All changed files valid"

      - name: Render all gene review HTML pages
        run: just render-all

      - name: Render project pages
        run: just render-projects

      - name: Validate module YAML files
        run: just validate-modules

      - name: Render module pages
        run: just render-modules

      - name: Deploy browser app (data.js + index.html)
        run: just deploy-browser

      - name: Check for changes
        id: check-changes
        run: |
          if git diff --quiet \
            genes/ \
            app/index.html \
            app/data.js \
            app/schema.js \
            pages/ \
            reports/; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "Changed files:"
            git diff --stat \
              genes/ \
              app/index.html \
              app/data.js \
              app/schema.js \
              pages/ \
              reports/
          fi

      - name: Compute regeneration metadata
        if: steps.check-changes.outputs.has_changes == 'true'
        id: pr-metadata
        shell: bash
        run: |
          GENE_COUNT=$(find genes -name '*-ai-review.yaml' | wc -l | tr -d ' ')
          HTML_COUNT=$(find genes -name '*-ai-review.html' | wc -l | tr -d ' ')
          PROJECT_COUNT=$(find pages/projects -name '*.html' 2>/dev/null | wc -l | tr -d ' ')
          MODULE_COUNT=$(find pages/modules -name '*.html' 2>/dev/null | wc -l | tr -d ' ')

          {
            echo "branch=auto/generate-pages"
            echo "gene_count=$GENE_COUNT"
            echo "html_count=$HTML_COUNT"
            echo "project_count=$PROJECT_COUNT"
            echo "module_count=$MODULE_COUNT"
          } >> "$GITHUB_OUTPUT"

      - name: Create or update regeneration PR
        if: steps.check-changes.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.PAT_FOR_PR != '' && secrets.PAT_FOR_PR || github.token }}
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          BRANCH_NAME="${{ steps.pr-metadata.outputs.branch }}"
          git fetch origin "$BRANCH_NAME:refs/remotes/origin/$BRANCH_NAME" || true
          git checkout -B "$BRANCH_NAME"

          git add \
            genes/ \
            app/index.html \
            app/data.js \
            app/schema.js \
            pages/ \
            reports/

          # SAFETY GUARD: this automated commit must only ever contain
          # generated build artifacts. If anything outside the generated set is
          # staged (e.g. a gene-review YAML, schema, src/, or projects/*.md
          # source file), abort rather than risk clobbering hand-authored
          # content. Allowed: gene-review HTML, everything under pages/, the
          # three browser-app files, and reports/.
          DISALLOWED="$(git diff --cached --name-only \
            | grep -vE '^(genes/[^[:space:]]+\.html|pages/|app/(index\.html|data\.js|schema\.js)$|reports/)' \
            || true)"
          if [ -n "$DISALLOWED" ]; then
            echo "❌ Refusing to commit non-artifact files:"
            echo "$DISALLOWED"
            exit 1
          fi

          git commit -m "$(cat <<EOF
            Regenerate pages, browser app, and reports

            - ${{ steps.pr-metadata.outputs.html_count }} gene review HTML pages (from ${{ steps.pr-metadata.outputs.gene_count }} YAML reviews)
            - ${{ steps.pr-metadata.outputs.project_count }} project pages
            - ${{ steps.pr-metadata.outputs.module_count }} module pages
            - Browser app data.js
            - Validation report

            Triggered by changes to gene reviews or templates.
          EOF
          )"

          git push --force-with-lease origin "$BRANCH_NAME"

          PR_BODY="$(mktemp)"
          {
            echo "## Summary"
            echo
            echo "Automated regeneration of static assets after gene review or template changes."
            echo
            echo "## Generated Assets"
            echo
            echo "| Asset | Count/Status |"
            echo "|-------|--------------|"
            echo "| Gene review YAML files | ${{ steps.pr-metadata.outputs.gene_count }} |"
            echo "| Gene review HTML pages | ${{ steps.pr-metadata.outputs.html_count }} |"
            echo "| Project pages | ${{ steps.pr-metadata.outputs.project_count }} |"
            echo "| Module pages | ${{ steps.pr-metadata.outputs.module_count }} |"
            echo "| Browser app (data.js) | Updated |"
            echo "| Validation report | Updated |"
            echo
            echo "## Trigger"
            echo
            echo "This PR was triggered by changes to:"
            echo "- genes/**/*.yaml - gene review data files"
            echo "- src/ai_gene_review/schema/** - LinkML schema files"
            echo "- src/ai_gene_review/templates/** - Jinja2 templates"
            echo "- src/ai_gene_review/render.py - rendering code"
            echo "- src/ai_gene_review/render_modules.py - module rendering code"
            echo "- src/ai_gene_review/export/** - export code"
            echo "- src/ai_gene_review/browser/** - browser app assets"
            echo "- src/ai_gene_review/tools/minify_linkml_browser_data.py - browser data compaction"
            echo "- projects/*.md - project definitions"
            echo "- modules/**/*.yaml - module definitions"
            echo "- project.justfile - just recipes used by CI"
            echo "- .github/workflows/generate-pages.yaml - workflow definition"
            echo
            echo "## Review"
            echo
            echo "- [ ] Spot-check a few gene review HTML pages render correctly"
            echo "- [ ] Spot-check module tree browser pages render correctly"
            echo "- [ ] Verify browser app loads and filters work"
            echo "- [ ] Check validation report for new issues"
          } > "$PR_BODY"

          PR_NUMBER="$(gh pr list \
            --repo "$GITHUB_REPOSITORY" \
            --head "$BRANCH_NAME" \
            --state open \
            --json number \
            --limit 1 \
            --jq '.[0].number // empty')"

          if [ -n "$PR_NUMBER" ]; then
            gh api \
              --method PATCH \
              "repos/$GITHUB_REPOSITORY/pulls/$PR_NUMBER" \
              -f body="$(cat "$PR_BODY")" \
              >/dev/null
            echo "Updated existing regeneration PR #$PR_NUMBER."
          else
            gh pr create \
              --repo "$GITHUB_REPOSITORY" \
              --base main \
              --head "$BRANCH_NAME" \
              --title "Regenerate pages and browser app" \
              --body-file "$PR_BODY"

            PR_NUMBER="$(gh pr list \
              --repo "$GITHUB_REPOSITORY" \
              --head "$BRANCH_NAME" \
              --state open \
              --json number \
              --limit 1 \
              --jq '.[0].number // empty')"

            if [ -z "$PR_NUMBER" ]; then
              echo "Failed to resolve regeneration PR number for $BRANCH_NAME."
              echo "Compare URL: https://github.com/${GITHUB_REPOSITORY}/compare/main...${BRANCH_NAME}?expand=1"
              exit 1
            fi
            echo "Created regeneration PR #$PR_NUMBER."
          fi

          # Publish automatically: enable auto-merge so the regeneration PR
          # lands on main once required checks (if any) pass, instead of sitting
          # unmerged until it expires. The PR only contains generated artifacts
          # (enforced by the safety guard above), so merging it cannot clobber
          # source files. Non-fatal if the repo does not allow auto-merge -- in
          # that case the PR simply stays open for a maintainer to merge.
          gh pr merge "$PR_NUMBER" \
            --repo "$GITHUB_REPOSITORY" \
            --auto \
            --squash \
            || echo "Auto-merge could not be enabled; PR #$PR_NUMBER left open for manual merge."
