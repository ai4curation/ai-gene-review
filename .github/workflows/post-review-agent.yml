name: Post Review Agent

# This workflow scans recent PRs for reviewer comments and takes action:
# 1. Creates suggested changes for concrete review-yaml fixes
# 2. Replies in review threads when clarification is needed
# 3. Creates issues for larger cross-gene or tooling follow-up work


on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:
    inputs:
      days_back:
        description: "Number of days back to scan PRs"
        required: false
        default: "7"
        type: string
      dry_run:
        description: "Dry run mode (no actual changes)"
        required: false
        default: false
        type: boolean
      pr_number:
        description: "Specific PR number to process (optional; leave empty for all recent PRs)"
        required: false
        type: string
      model:
        description: "Claude model to use"
        default: claude-opus-4-7
        type: choice
        options:
          - claude-sonnet-4-6
          - claude-haiku-4-5-20251001
          - claude-opus-4-7

jobs:
  post-review:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install python tools
        run: uv sync

      - name: Install just
        run: |
          uv tool install rust-just
          uv sync

      - name: Run Post Review Agent
        id: post-review-agent
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          show_full_output: true

          claude_args: |
            --dangerously-skip-permissions
            --mcp-config '{"mcpServers": {"ols": {"command": "uvx", "args": ["ols-mcp"]}}}'
            --model ${{ inputs.model || 'claude-opus-4-7' }}

          prompt: |
            # AIGR Post Review Agent Task

            You are a post-review agent for the AI Gene Review (AIGR) repository.
            Scan recent pull requests for substantive human review comments and take the
            most appropriate follow-up action.

            Use the `aigr-pr-review` skill and follow `CLAUDE.md`.

            ## Configuration

            - Repository: ${{ github.repository }}
            - Days back to scan: ${{ inputs.days_back || '7' }}
            - Dry run mode: ${{ inputs.dry_run || 'false' }}
            - Specific PR number: ${{ inputs.pr_number || 'all recent open PRs' }}

            ## Review scope

            Focus on AIGR curation judgment, especially:
            - GO term specificity and correct GO aspect placement
            - Evidence quality and whether citations actually support the review text
            - Whether `core_functions` captures the gene's real core role
            - Whether annotation `action` choices are justified
            - Whether reviewer comments point to missing deep research, weak UniProt-backed claims, or unsupported new annotations

            Trust schema validation. Do not spend review effort re-checking what `just validate`
            deterministically covers unless you can see an actual failing validation result in the PR discussion.

            Never invent GO IDs, PMIDs, UniProt accessions, evidence text, or file contents.

            Do not propose direct edits to derived context files such as:
            - `*-uniprot.txt`
            - `*-goa.tsv`
            - `*-deep-research*.md`
            - `publications/PMID_*.md`

            If a reviewer comment points to problems in those inputs, either reply in-thread with the right
            regeneration/follow-up guidance or create an issue. Suggested changes should normally target:
            - `*-ai-review.yaml`
            - `*-predictions-review.yaml`
            - `*-notes.md`
            - workflow or tooling files

            ## Step 1: Gather target PRs

            If a specific PR number is provided, process only that PR.

            Otherwise use `gh pr list --state open --json number,title,author,createdAt,updatedAt`
            and keep PRs created or updated within the configured `days_back` window.

            ## Step 2: Gather review comments and context

            For each target PR, collect review comments:

            ```bash
            gh api repos/${{ github.repository }}/pulls/PR_NUMBER/comments
            gh api repos/${{ github.repository }}/pulls/PR_NUMBER/reviews
            ```

            Filter for substantive reviewer feedback only:
            - Ignore approvals with no actionable content
            - Ignore bot comments
            - Ignore comments from the PR author unless they contain unresolved action items
            - Skip comments that are already substantively answered in-thread

            For each candidate comment, inspect the affected file and surrounding context from the PR head SHA:

            ```bash
            HEAD_SHA=$(gh pr view PR_NUMBER --json headRefOid --jq '.headRefOid')
            gh api repos/${{ github.repository }}/contents/FILE_PATH?ref=$HEAD_SHA --jq '.content' | base64 --decode
            ```

            Also inspect nearby PR diff/context as needed:

            ```bash
            gh api repos/${{ github.repository }}/pulls/PR_NUMBER/files
            gh pr diff PR_NUMBER -- FILE_PATH
            ```

            For gene-review comments, consult the relevant companion files where needed:
            - `genes/.../GENE/GENE-ai-review.yaml`
            - `genes/.../GENE/GENE-predictions-review.yaml`
            - `genes/.../GENE/GENE-uniprot.txt`
            - `genes/.../GENE/GENE-notes.md`
            - `genes/.../GENE/GENE-deep-research*.md`
            - cited `publications/PMID_*.md`

            Use OLS when you need to confirm GO term specificity or find a better GO term.

            ## Step 3: Choose exactly one action per unaddressed comment

            ### Action A: Create Suggested Change

            This is the preferred action whenever a concrete fix is possible.

            Strongly prefer a suggestion when:
            - The fix is localized and unambiguous
            - The reviewer clearly points to a correctable YAML/prose issue
            - You can identify the right GO term, evidence wording, action rationale, or note text from existing repo context

            Good AIGR examples:
            - Replacing an over-generic GO term with a more specific one
            - Fixing a wrong aspect classification in gene review YAML
            - Tightening a weak `review.reason` or `review.summary`
            - Moving a function from core to non-core when the evidence is clear
            - Correcting a UniProt-backed factual statement in review YAML or notes

            Do not use a suggestion when:
            - The change depends on missing literature access
            - The correct GO term or action is still uncertain
            - The reviewer is asking for broader curation judgment, not a concrete text fix
            - The work spans multiple files or multiple genes

            To create a suggested change, first get the head SHA:

            ```bash
            gh pr view PR_NUMBER --json headRefOid --jq '.headRefOid'
            ```

            Then post the suggestion:

            ```bash
            gh api repos/${{ github.repository }}/pulls/PR_NUMBER/comments \
              -f body='```suggestion
            corrected content here
            ```
            Short explanation of why this change addresses the review comment.' \
              -f commit_id='HEAD_SHA' \
              -f path='FILE_PATH' \
              -f line=LINE_NUMBER \
              -f side='RIGHT'
            ```

            Use exact indentation for YAML suggestions.

            IMPORTANT: if posting the change fails, report the error and stop rather than silently continuing.

            ### Action B: Reply in Thread

            Use this when:
            - The reviewer asked a question that needs an evidence-based answer
            - You have a recommendation but not a safe concrete edit
            - The comment identifies missing deep research or weak evidence and you cannot fully resolve it yourself
            - You need to explain why a UniProt/goa/deep-research file should be regenerated rather than edited

            Reply with specific reasoning tied to the file and evidence you inspected.
            Avoid empty agreement messages.

            To reply to a review comment:

            ```bash
            gh api repos/${{ github.repository }}/pulls/PR_NUMBER/comments \
              -f body='Targeted response here' \
              -F in_reply_to=ORIGINAL_COMMENT_ID
            ```

            ### Action C: Create Issue

            Use this when:
            - The comment identifies a problem pattern affecting multiple genes or many review files
            - The fix requires changes across 3+ files
            - The comment reveals a schema, workflow, or tooling gap
            - The reviewer is effectively asking for a reusable curation policy or automation improvement

            Common AIGR examples:
            - Systematic over-generic GO terms across many reviews
            - Missing workflow support for deep-research prerequisites
            - Repeated evidence/provenance problems that need tooling or schema work
            - Recurrent aspect-classification mistakes better solved in validation or templates

            Before creating an issue, search for duplicates:

            ```bash
            gh issue list --search "keyword from comment" --json number,title,state
            ```

            Create the issue only if none already covers the follow-up:

            ```bash
            gh issue create \
              --title "PR review follow-up: [descriptive title]" \
              --body "## Origin
            From PR #PR_NUMBER review comment by @REVIEWER:
            > original comment quote

            ## Why this needs broader follow-up
            Describe the repeated curation/tooling problem.

            ## Affected scope
            List affected genes/files/workflows if known.

            ## Proposed action
            Describe the larger fix."
            ```

            ## Step 4: Summary

            Keep a concise running summary for each PR you process:
            - PRs scanned
            - comments analyzed
            - suggested changes created
            - thread replies posted
            - issues created
            - already addressed comments skipped

            If `dry_run` is true, do not post comments or create issues. Instead report exactly what you would have done.

            If you process a single PR or take action on a PR, leave one concise top-level PR comment summarizing the actions taken.
            Avoid posting a summary-only comment when nothing needed action.

            Begin by identifying the target PRs, then process each unaddressed comment conservatively and precisely.
