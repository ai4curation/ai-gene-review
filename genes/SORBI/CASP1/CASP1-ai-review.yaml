proposed_new_terms:
- proposed_name: Casparian strip membrane domain
  proposed_definition: >-
    A specialized, highly stable subdomain of the root endodermal plasma membrane,
    occupied by a scaffold of CASP-family tetraspan proteins, that marks and
    determines the position of the Casparian strip cell wall modification.
  justification: >-
    GO currently has no cellular-component term for the plasma-membrane subdomain in
    which CASP proteins reside. The literature consistently distinguishes the
    "Casparian strip membrane domain (CSD)" — a plasma-membrane domain — from the
    "Casparian strip" itself (the cell wall lignin band, GO:0048226). A dedicated CC
    term would allow CASP-family proteins to be annotated to their precise
    localization rather than the generic GO:0005886 plasma membrane.
  proposed_parent:
    id: GO:0005886
    label: plasma membrane
  supported_by:
  - reference_id: PMID:21593871
    supporting_text: "These 'CASPs' (Casparian strip membrane domain proteins)
      specifically mark a membrane domain that predicts the formation of Casparian
      strips."
suggested_questions:
- question: Is SbCASP1 expression endodermis-specific in sorghum roots, and is it
    induced by abiotic stresses such as salt or drought, as reported for rice OsCASP1?
- question: Does sorghum, like rice, additionally form Casparian strips/suberin
    barriers in the exodermis or sclerenchyma, and does SbCASP1 contribute there?
- question: Which sorghum peroxidases, RBOH NADPH oxidase, and dirigent-like proteins
    constitute the lignin-polymerization machinery recruited by SbCASP1?
suggested_experiments:
- description: Generate sorghum Sbcasp1 loss-of-function (CRISPR) mutants and assess
    Casparian strip integrity (lignin staining, apoplastic tracer penetration) and
    ionomic / nutrient-homeostasis phenotypes.
  hypothesis: SbCASP1 is required for proper Casparian strip formation and the
    endodermal apoplastic diffusion barrier in sorghum roots.
  experiment_type: reverse genetics / phenotypic analysis
- description: Express a fluorescently tagged SbCASP1 in sorghum roots to confirm
    localization to a ring-shaped Casparian strip membrane domain in the endodermis.
  hypothesis: SbCASP1 localizes to a restricted ring-shaped plasma-membrane domain
    coinciding with the Casparian strip.
  experiment_type: fluorescence microscopy / live imaging
- description: Test SbCASP1 homo- and hetero-oligomerization with other sorghum CASPs
    (e.g. SbCASP2) by co-immunoprecipitation or split-fluorophore assays, and assess
    membrane-domain immobility by FRAP.
  hypothesis: SbCASP1 forms a stable, immobile oligomeric membrane scaffold with
    other CASP proteins.
  experiment_type: protein interaction / FRAP
- description: Functionally complement an Arabidopsis casp1 casp3 mutant with SbCASP1
    to test cross-species conservation of Casparian strip organizing activity.
  hypothesis: SbCASP1 can substitute for Arabidopsis CASP1 in organizing Casparian
    strip formation.
  experiment_type: cross-species complementation
