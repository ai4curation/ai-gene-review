id: C5YAP3
gene_symbol: CASP1
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:4558
  label: Sorghum bicolor
description: >-
  SbCASP1 (Casparian strip membrane protein 1) is a sorghum member of the CASP
  (CAsparian Strip membrane domain Protein) family, a plant-specific clade of the
  four-transmembrane-span MARVEL-domain protein superfamily. CASP proteins are
  small (here 229 aa) tetraspan integral plasma-membrane proteins that self-assemble
  into the Casparian Strip Membrane Domain (CSD), a highly stable, immobile
  plasma-membrane scaffold occupying a ring-like band around root endodermal cells.
  By forming this scaffold, CASPs recruit and correctly position the
  lignin-polymerization machinery — the peroxidase PER64, the NADPH oxidase RBOHF
  and the dirigent-like protein ESB1 — that deposits the lignified Casparian strip,
  a localized cell wall modification of the root endodermis. The Casparian strip
  acts as an extracellular (apoplastic) diffusion barrier, the "plant tight
  junction" that controls selective nutrient and water uptake into the vascular
  cylinder. The CASP family was discovered and characterized in Arabidopsis
  (CASP1-CASP5; Roppolo et al. 2011, 2014); the rice ortholog OsCASP1 is also
  experimentally characterized and shows the same scaffold-and-recruit mechanism in
  a grass. SbCASP1 belongs to the bona-fide CASP subfamily (PANTHER PTHR36488:SF11)
  and its function is inferred by orthology, with strong support from the
  conservation of the four-TM topology, the CASP-diagnostic first extracellular
  loop, and demonstrated Casparian-strip function across Poaceae.
