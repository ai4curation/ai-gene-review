- id: PMID:21593871
  title: A novel protein family mediates Casparian strip formation in the endodermis.
  findings:
  - statement: CASPs (Casparian strip membrane domain proteins) are transmembrane
      proteins that mark a plasma-membrane domain predicting Casparian strip formation;
      CASP1 forms complexes with other CASPs, becomes immobile upon localization, and
      sediments as a large polymer — the hallmarks of a membrane scaffold.
    supporting_text: "These 'CASPs' (Casparian strip membrane domain proteins)
      specifically mark a membrane domain that predicts the formation of Casparian
      strips. CASP1 displays numerous features required for a constituent of a plant
      junctional complex: it forms complexes with other CASPs; it becomes immobile
      upon localization; and it sediments like a large polymer."
  - statement: CASP double mutants display disorganized Casparian strips, showing
      CASPs structure and localize this cell wall modification.
    supporting_text: "CASP double mutants display disorganized Casparian strips,
      demonstrating a role for CASPs in structuring and localizing this cell wall
      modification."
- id: PMID:24920445
  title: Functional and Evolutionary Analysis of the CASPARIAN STRIP MEMBRANE DOMAIN
    PROTEIN Family.
  findings:
  - statement: CASPs are four-membrane-span proteins that mediate deposition of
      Casparian strips in the endodermis by recruiting the lignin polymerization
      machinery; the CASP membrane domain has all the hallmarks of a membrane scaffold.
    supporting_text: "CASPARIAN STRIP MEMBRANE DOMAIN PROTEINS (CASPs) are
      four-membrane-span proteins that mediate the deposition of Casparian strips in
      the endodermis by recruiting the lignin polymerization machinery. CASPs show
      high stability in their membrane domain, which presents all the hallmarks of a
      membrane scaffold."
  - statement: The broader CASP-like family is found across all land plants and green
      algae; non-plant homologs are MARVEL-family proteins. This is the family/
      nomenclature reference cited in the SbCASP1 UniProt entry.
    supporting_text: "CASPLs were found in all major divisions of land plants as well
      as in green algae; homologs outside of the plant kingdom were identified as
      members of the MARVEL protein family."
- id: PMID:23940370
  title: Dirigent domain-containing protein is part of the machinery required for
    formation of the lignin-based Casparian strip in the root.
  findings:
  - statement: The Casparian strip is composed of lignin polymerized by a NADPH
      oxidase and peroxidases; CASPs position this biosynthetic machinery by forming
      a plasma-membrane scaffold at the Casparian strip formation site.
    supporting_text: "This junction is composed of lignin that is polymerized by
      oxidative coupling of monolignols through the action of a NADPH oxidase and
      peroxidases. Casparian strip domain proteins (CASPs) correctly position this
      biosynthetic machinery by forming a protein scaffold in the plasma membrane at
      the site where the Casparian strip forms."
- id: PMID:26124109
  title: The MYB36 transcription factor orchestrates Casparian strip formation.
  findings:
  - statement: Localized CASPs recruit Peroxidase 64 (PER64), the NADPH oxidase
      RBOHF and the dirigent-like protein ESB1 to assemble the lignin polymerization
      machinery; the Casparian strip is a fine lignified band in the endodermal cell
      wall.
    supporting_text: "Localized CASPs recruit Peroxidase 64 (PER64), a Respiratory
      Burst Oxidase Homolog F, and Enhanced Suberin 1 (ESB1), a dirigent-like
      protein, to assemble the lignin polymerization machinery."
- id: PMID:21735349
  title: The endodermis - development and differentiation of the plant's inner skin.
  findings:
  - statement: The Casparian strip is the defining cell wall modification of the
      differentiated endodermis; CASPs localize precisely to a plasma-membrane domain
      underneath the Casparian strip, and the endodermis blocks apoplastic diffusion.
    supporting_text: "The recent isolation of a novel protein family, the CASPs, that
      localizes precisely to a domain of the plasma membrane underneath the CS
      represents an excellent point of entry to explore CS function and formation."
- id: PMID:36600916
  title: Rice OsCASP1 orchestrates Casparian strip formation and suberin deposition
    in small lateral roots to maintain nutrient homeostasis.
  findings:
  - statement: In rice (a grass, like sorghum), CASPs form a transmembrane scaffold
      to recruit lignin biosynthetic enzymes for Casparian strip formation; loss of
      OsCASP1 delays Casparian strip formation and causes uneven lignin deposition,
      disrupting nutrient homeostasis.
    supporting_text: "Casparian strip membrane domain proteins (CASPs) form a
      transmembrane scaffold to recruit lignin biosynthetic enzymes for Casparian
      strip (CS) formation."
- id: PMID:37653341
  title: A new family of proteins is required for tethering of Casparian strip
    membrane domain and nutrient homoeostasis in rice.
  findings:
  - statement: In rice, OsCASP1 is a core component of the Casparian strip-Casparian
      strip membrane domain (CS-CSD) junctional complex, forming a tight complex with
      GAPLESS proteins that tether the plasma membrane to the Casparian strip.
    supporting_text: "The GAPLESS protein forms a tight complex with OsCASP1 in the
      plasma membrane, thereby mediating the CS-CSD junction."
- id: file:SORBI/CASP1/CASP1-deep-research-falcon.md
  title: Falcon deep-research report — Functional annotation of Sorghum bicolor
    CASP1 (UniProt C5YAP3; Sb06g033470)
  findings:
  - statement: No primary publication directly assaying SbCASP1 (C5YAP3 / Sb06g033470)
      was retrieved; functional annotation rests on conserved CASP-family mechanism
      plus direct experimental evidence from closely related cereal CASP homologs
      (sorghum SbCASP4, sorghum SbCASP-LP1C1, rice OsCASP1) and Arabidopsis CASP
      research. SbCASP1 is most parsimoniously a CSD-localizing four-transmembrane
      scaffold protein, with function assigned by orthology.
  - statement: CASP-family proteins are four-transmembrane-span integral plasma-membrane
      proteins with cytosolic N- and C-termini that accumulate at the Casparian strip
      membrane domain (CSD), a specialized plasma-membrane region of root endodermal
      cells; sorghum SbCASP4 was experimentally localized to the plasma membrane and
      expressed in endodermal/Casparian-strip regions.
  - statement: The best-supported molecular role of CASP-family proteins is
      organizational rather than enzymatic — a stable membrane scaffold/fence that
      defines the CSD and recruits the lignin-polymerization machinery (RBOHF, ESB1,
      PER64, UCC1) to build the Casparian strip, a localized lignified cell wall
      modification of the endodermis.
  - statement: CASP-mediated barrier assembly is transcriptionally activated by MYB36
      (which directly induces CASP1, ESB1, PER64) and is monitored by the CIF1/2-SGN3-SGN1
      (SCHENGEN) surveillance pathway that triggers compensatory lignification/suberization
      when barrier defects are detected.
  - statement: Cereal CASP-family genes (sorghum SbCASP4, SbCASP-LP1C1; rice OsCASP1)
      provide direct experimental evidence that strengthening the root apoplastic
      barrier improves salt exclusion, ion homeostasis and selective mineral uptake,
      supporting the inferred role of SbCASP1 in the endodermal diffusion barrier and
      nutrient homeostasis.
existing_annotations:
# --- SPKW keyword-mapping annotation (GO_REF:0000043) ---
# Present in the Sept 2025 goa_uniprot_gcrp snapshot (go-db plant.ddb); REMOVED
# from the current (2026) GOA release. Reviewed retrospectively; retired: true.
- term:
    id: GO:0071555
    label: cell wall organization
  evidence_type: IEA
  original_reference_id: GO_REF:0000043
  retired: true
  review:
    summary: >-
      Retired SwissProt-keyword-derived (SPKW) annotation mapping the UniProt
      keyword "Cell wall biogenesis/degradation" (KW-0961, present in the SbCASP1
      entry) to GO:0071555 "cell wall organization". This annotation captures
      genuine, plant-specific biology: CASP proteins organize the formation of a
      specific localized cell wall structure, the lignified Casparian strip.
    action: MODIFY
    reason: >-
      The biology behind this annotation is correct and informative, not an
      over-annotation. CASP proteins are the founding molecular factors of
      Casparian strip formation: they self-assemble into a plasma-membrane scaffold
      that recruits the lignin-polymerization machinery depositing the Casparian
      strip, a localized cell wall modification of the root endodermis
      [PMID:21593871, PMID:24920445]. Genetic loss of CASP function produces
      "disorganized Casparian strips" [PMID:21593871], i.e. defective cell wall
      organization, and the UniProt FUNCTION text for SbCASP1 itself states it
      "Regulates membrane-cell wall junctions and localized cell wall deposition"
      and is "Required for ... the subsequent formation of Casparian strips, a cell
      wall modification of the root endodermis". Therefore GOA's removal of this
      SPKW annotation is a genuine loss of correct information — this gene
      exemplifies the "unique-but-correct, informative, plant-specific" category of
      SPKW annotation. However, GO:0071555 "cell wall organization" is broad. A more
      specific and more accurate term is now available: GO:0160073 "Casparian strip
      assembly", which exactly describes the CASP-mediated process. The recommended
      curation outcome is therefore not deletion but MODIFY to the specific term,
      preserving the biology at the correct granularity. (The retired: true flag is
      retained per the retrospective-review protocol; it records that GOA removed
      the SPKW annotation, while this review documents that the removal discarded
      correct biology that should be re-captured with GO:0160073.)
    proposed_replacement_terms:
    - id: GO:0160073
      label: Casparian strip assembly
    supported_by:
    - reference_id: PMID:21593871
      supporting_text: "CASP double mutants display disorganized Casparian strips,
        demonstrating a role for CASPs in structuring and localizing this cell wall
        modification."
    - reference_id: PMID:24920445
      supporting_text: "CASPARIAN STRIP MEMBRANE DOMAIN PROTEINS (CASPs) are
        four-membrane-span proteins that mediate the deposition of Casparian strips
        in the endodermis by recruiting the lignin polymerization machinery."
    - reference_id: PMID:23940370
      supporting_text: "Casparian strip domain proteins (CASPs) correctly position
        this biosynthetic machinery by forming a protein scaffold in the plasma
        membrane at the site where the Casparian strip forms."
# --- Current GOA annotations (2026 release) ---
- term:
    id: GO:0005886
    label: plasma membrane
  evidence_type: IEA
  original_reference_id: GO_REF:0000044
  review:
    summary: >-
      Subcellular-location-derived annotation from the UniProt "Cell membrane"
      location of SbCASP1. CASP proteins are tetraspan integral plasma-membrane
      proteins; the SbCASP1 entry has four predicted transmembrane helices and is
      annotated "Cell membrane; Multi-pass membrane protein".
    action: ACCEPT
    reason: >-
      Correct and well supported. CASP proteins are integral plasma-membrane
      proteins: the SbCASP1 UniProt record predicts four transmembrane helices
      (TRANSMEM 68-88, 116-136, 158-178, 206-226) and annotates "Cell membrane;
      Multi-pass membrane protein". Experimentally, Arabidopsis CASP1 marks a
      plasma-membrane domain (the Casparian strip membrane domain) and rice OsCASP1
      forms its scaffold complex in the plasma membrane [PMID:21593871,
      PMID:37653341]. GO:0005886 "plasma membrane" is generic relative to the
      CASP-specific localization (the restricted ring-shaped Casparian strip
      membrane domain noted in the UniProt SUBCELLULAR LOCATION text), but GO has no
      distinct cellular-component term for the plasma-membrane subdomain itself
      (GO:0048226 "Casparian strip" denotes the cell wall region, not the membrane
      domain). The annotation is accurate at the available granularity.
    supported_by:
    - reference_id: PMID:21593871
      supporting_text: "These 'CASPs' (Casparian strip membrane domain proteins)
        specifically mark a membrane domain that predicts the formation of Casparian
        strips."
    - reference_id: PMID:37653341
      supporting_text: "The GAPLESS protein forms a tight complex with OsCASP1 in the
        plasma membrane, thereby mediating the CS-CSD junction."
    - reference_id: file:SORBI/CASP1/CASP1-deep-research-falcon.md
      supporting_text: "consistent with sorghum SbCASP4 plasma-membrane localization
        and Casparian-strip region expression."
