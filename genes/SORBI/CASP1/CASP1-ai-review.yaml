    tetraspan-protein scaffold in a ring-like band of the root endodermal plasma
    membrane, via homo- and hetero-oligomerization with other CASP proteins.
  supported_by:
  - reference_id: PMID:21593871
    supporting_text: "CASP1 displays numerous features required for a constituent of
      a plant junctional complex: it forms complexes with other CASPs; it becomes
      immobile upon localization; and it sediments like a large polymer."
  - reference_id: PMID:24920445
    supporting_text: "CASPs show high stability in their membrane domain, which
      presents all the hallmarks of a membrane scaffold."
  - reference_id: file:SORBI/CASP1/CASP1-deep-research-falcon.md
    supporting_text: "their membrane domain is unusually stable, consistent with a
      **membrane scaffold/fence** that defines a restricted domain (CSD)"
- description: >-
    Organization and localized assembly of the Casparian strip, a lignified cell
