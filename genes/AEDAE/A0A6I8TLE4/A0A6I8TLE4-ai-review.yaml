  - term:
      id: GO:0005096
      label: GTPase activator activity
    qualifier: enables
    evidence_type: ISS
    original_reference_id: GO_REF:0000002
    review:
      summary: >-
        Proposed new annotation based on conserved RasGAP domain (IPR001936,
        Pfam PF00616), the RasGAP catalytic signature motif (PROSITE PS00509),
        PANTHER subfamily classification as raskol (PTHR10194:SF60), and CDD
