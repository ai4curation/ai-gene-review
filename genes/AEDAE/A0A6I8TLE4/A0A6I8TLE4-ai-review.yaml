        canonical function of the RasGAP domain, which stimulates the intrinsic
        GTPase activity of Ras-family small GTPases. This is also predicted by
        UniProt keyword mapping (IEA:UniProtKB-KW) and by ProtNLM2.
      action: NEW
      reason: >-
        Strong domain-based evidence from multiple independent sources (InterPro,
        CDD, PANTHER, PROSITE, Pfam) all converge on RasGAP function. The
        RasGAP domain is well-characterized with high predictive value for
        GTPase activator activity.
