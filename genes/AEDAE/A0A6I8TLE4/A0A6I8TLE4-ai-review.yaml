    review:
      summary: >-
        Proposed new annotation. RasGAPs are negative regulators of Ras
        signaling because they accelerate GTP hydrolysis, converting active
        GTP-Ras to inactive GDP-Ras. This regulatory directionality is inherent
        to the GAP mechanism.
      action: NEW
      reason: >-
        The GAP mechanism is inherently inhibitory toward Ras signaling. All
        characterized RasGAP domain proteins function as negative regulators.
