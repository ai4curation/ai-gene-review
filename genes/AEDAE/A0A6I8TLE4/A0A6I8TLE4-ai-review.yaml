    evidence_type: ISS
    original_reference_id: GO_REF:0000002
    review:
      summary: >-
        Proposed new annotation. Ras protein signal transduction is the direct
        biological process context for RasGAP activity. The protein's domain
        architecture (RasGAP + C2 + PH) is specific to Ras signaling regulators,
        and the PANTHER classification places it in the RasGAP family
