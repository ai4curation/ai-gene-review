suggested_questions:
  - question: >-
      Is A0A6I8TLE4 the true ortholog of Drosophila raskol, and does it share
      the same developmental and signaling roles in Aedes aegypti? PANTHER
      classifies it as PTHR10194:SF60 (RAS GTPASE-ACTIVATING PROTEIN RASKOL)
      but direct orthology confirmation via synteny or phylogenetic analysis
      would be valuable.
  - question: >-
      What are the specific Ras-family substrates of this protein? DAB2IP-type
      RasGAPs can act on H-Ras, R-Ras, and Rap1 with different specificities.
      The CDD match to RasGAP_DAB2IP (cd05136) suggests potential activity
      toward multiple Ras-family members.
  - question: >-
      Does this protein play a role in vector competence or innate immunity in
      Aedes aegypti? Ras signaling pathways are implicated in mosquito immune
      responses to arboviruses and Plasmodium parasites.
suggested_experiments:
  - hypothesis: >-
      A0A6I8TLE4 has GTPase activator activity toward Ras-family GTPases.
    description: >-
      Express and purify the RasGAP domain of A0A6I8TLE4 and test GAP activity
      in vitro using a GTPase assay (e.g., malachite green phosphate release
      assay) with recombinant H-Ras, K-Ras, R-Ras, and Rap1 as substrates.
      Compare catalytic efficiency to known RasGAPs.
    experiment_type: biochemical assay
  - hypothesis: >-
      A0A6I8TLE4 localizes to the plasma membrane via its C2 and PH domains.
    description: >-
      Generate a GFP-tagged A0A6I8TLE4 construct and express in Aedes aegypti
      Aag2 cells. Assess subcellular localization by confocal microscopy under
      basal conditions and after stimulation with growth factors or calcium
      ionophore to test stimulus-dependent membrane recruitment.
    experiment_type: cell biology / microscopy
