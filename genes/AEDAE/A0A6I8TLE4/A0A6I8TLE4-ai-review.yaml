description: >-
  A0A6I8TLE4 is a predicted Ras GTPase-activating protein (RasGAP) in Aedes
  aegypti, classified by PANTHER as an ortholog of the Drosophila raskol gene
  (PTHR10194:SF60). The protein is 1442 amino acids and contains a conserved
  multi-domain architecture characteristic of the DAB2IP/SynGAP-like RasGAP
  subfamily: a RasGAP catalytic domain (IPR001936), a C2 domain (IPR000008,
  SynGAP-like subtype per CDD cd04013), a PH domain (IPR001849, SynGAP-like
  subtype per CDD cd13262), and a DAB2P C-terminal domain (IPR021887). The
  RasGAP domain catalyzes stimulation of the intrinsic GTPase activity of
  Ras-family small GTPases, converting them from the active GTP-bound state to
  the inactive GDP-bound state, thereby functioning as a negative regulator of
  Ras signaling. The C2 and PH domains are predicted to mediate
  calcium-dependent and phosphoinositide-dependent membrane targeting,
  respectively, enabling recruitment to specific membrane compartments where
  Ras signaling occurs. The DAB2P_C domain is associated with scaffold/adaptor
  functions in related proteins such as human DAB2IP. No direct experimental
  characterization of this specific gene product has been published; functional
  annotation is based on conserved domain architecture, PANTHER subfamily
  classification, and orthology to characterized RasGAPs.
