        Proposed new annotation. The C2 and PH domains predict membrane
        targeting. Ras GTPases are predominantly plasma membrane-associated,
        and their GAPs must localize to the plasma membrane to exert their
        regulatory function. The SynGAP-like C2 domain (CDD cd04013) and
        PH domain (CDD cd13262) are specifically associated with
        membrane-targeting in this protein family.
      action: NEW
      reason: >-
        C2 and PH domains are well-established membrane-targeting modules.
        RasGAP function requires co-localization with membrane-anchored Ras
        GTPases at the plasma membrane.
core_functions:
  - description: >-
      Predicted Ras GTPase-activating protein that stimulates the intrinsic
      GTPase activity of Ras-family small GTPases, accelerating hydrolysis of
      GTP to GDP and thereby inactivating Ras signaling. This is the canonical
      function of all RasGAP domain-containing proteins and is strongly
      supported by the conserved RasGAP domain (IPR001936, Pfam PF00616),
      the RasGAP catalytic signature (PROSITE PS00509), and the PANTHER
      subfamily assignment to raskol (PTHR10194:SF60). The CDD match to
      cd05136 (RasGAP_DAB2IP) further specifies this as a DAB2IP-subfamily
      RasGAP.
