  label: Aedes aegypti
status: COMPLETE
description: >-
  ProtNLM2 predicted 1 GO term for this uncharacterized Aedes aegypti protein,
  a predicted Ras GTPase-activating protein classified by PANTHER as an ortholog
  of Drosophila raskol (PTHR10194:SF60). The single prediction, GO:0005096
  (GTPase activator activity), exactly matches the existing GOA annotation
  assigned by IEA:UniProtKB-KW from the GTPase activation keyword. While the
  prediction is correct -- the protein contains a well-conserved RasGAP domain
  (IPR001936/Pfam PF00616) with the catalytic signature motif (PROSITE PS00509),
  a SynGAP-like C2 domain (CDD cd04013), a SynGAP-like PH domain (CDD cd13262),
  and a DAB2IP-subtype RasGAP catalytic domain (CDD cd05136), all strongly
  supporting GTPase activator activity -- it is not novel since this annotation
  was already present in GOA and is likely derived from the same sequence features
  in the training data. ProtNLM2 failed to predict any of the more specific
  biological context that the domain architecture strongly implies: negative
  regulation of Ras protein signal transduction (GO:0046580), Ras protein signal
  transduction (GO:0007265), or the subcellular localizations (cytosol, plasma
  membrane) consistent with the C2 and PH membrane-targeting modules.
  Assessment: 1 correct but not novel (CNN), 0 incorrect. Total CS = 2/2.
