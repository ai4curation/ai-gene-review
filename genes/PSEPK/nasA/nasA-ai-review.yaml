suggested_questions:
- question: Is PP_2092 a strictly nitrate-selective importer in KT2440, or can it
    also mediate physiologically relevant nitrite flux under defined pH and nitrogen
    regimes?
- question: Does NasA operate as a symporter, antiporter, or facilitated transporter
    in the assimilatory nitrate pathway of P. putida KT2440?
suggested_experiments:
- hypothesis: NasA is the main nitrate uptake system required for assimilatory growth
    on nitrate in KT2440.
  experiment_type: genetic perturbation
  description: Create a clean nasA deletion and complemented strain, then compare
    growth and intracellular nitrate accumulation with nitrate as sole nitrogen source.
- hypothesis: Nitrite transport is weaker or context-dependent relative to nitrate
    transport for NasA.
  experiment_type: transport assay
  description: Measure uptake of labeled nitrate and nitrite in wild type and nasA
    mutant cells across a pH series to distinguish transporter-mediated flux from
    passive nitrous acid diffusion.
- hypothesis: NasT-dependent induction of nasA is a major control point for assimilatory
    nitrate use.
  experiment_type: gene expression analysis
  description: Quantify nasA transcript and protein levels in wild type, nasT mutant,
    and altered c-di-GMP backgrounds during shifts from ammonium to nitrate.
