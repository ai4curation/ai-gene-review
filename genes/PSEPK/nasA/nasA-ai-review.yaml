description: Plasma-membrane major facilitator superfamily nitrate/nitrite porter-family
  transporter that supports assimilatory nitrate use in Pseudomonas putida KT2440.
  In this strain, nasA refers to the transporter PP_2092 rather than an assimilatory
  nitrate reductase catalytic subunit. The protein is a predicted 12-pass membrane
  protein, is induced under nitrogen limitation in a NasT-associated regulatory context,
  and is best supported as a nitrate uptake component of the nitrate assimilation
  system. Nitrite transport remains plausible from family assignment, but the direct
  physiological evidence in KT2440 is stronger for nitrate than for nitrite as the
  core substrate.
