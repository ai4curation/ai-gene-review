suggested_questions:
- question: Which receptor panel beyond McpS/McpT depends on CheR2 under rhizosphere-like
    conditions?
- question: How does CheR2 substrate specificity map onto the named MCP receptor panel in
    ppu02030?
suggested_experiments:
- description: Measure CheR2 methylation of the KT2440 named MCP receptor panel using purified
