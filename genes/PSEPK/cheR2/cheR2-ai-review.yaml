taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: CheR2 is the chemotaxis receptor methyltransferase of Pseudomonas putida KT2440.
  It catalyzes SAM-dependent methylation of methyl-accepting chemotaxis proteins to form gamma-glutamyl
  methyl ester residues, with direct evidence for McpS and abstract-level evidence for McpT.
  CheR2 is the CheR paralog tied to chemotaxis in KT2440, as cheR2 mutants are deficient in
  chemotaxis toward malate and casamino acids, unlike cheR3.
