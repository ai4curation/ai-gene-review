  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: Ribokinase of Pseudomonas putida KT2440 (PP_2458). RbsK phosphorylates D-ribose to ribose
  5-phosphate using ATP, feeding ribose catabolism and ribose-phosphate pools that connect to PRPP synthesis
  and non-oxidative pentose phosphate metabolism. It is PPP-adjacent because it supplies ribose 5-phosphate,
  not because it performs a core PPP rearrangement.
