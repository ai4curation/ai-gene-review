status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: PP_2126 encodes a predicted DNA-binding response regulator in Pseudomonas putida KT2440.
  A CheY-like receiver domain and a helix-turn-helix output domain support a phosphorelay-dependent transcriptional
  regulatory role, with the upstream sensor, input signal, and target regulon unresolved.
