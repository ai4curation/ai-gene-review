description: PP_3078 encodes a predicted periplasmic SBP_5-family substrate-binding component of the PP_3076-PP_3078 Yej-like peptide ABC import candidate. Its periplasmic localization, peptide/nickel-binding SBP_5 domains, peptide transport keyword, and adjacent Yej-family permeases support a peptide-binding role in an ABC importer.
