id: Q88EH0
gene_symbol: ydiJ
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: >-
  YdiJ (D2HGDH) is an FAD-dependent oxidoreductase of Pseudomonas putida KT2440 that
  oxidizes D-2-hydroxyglutarate ((R)-2-hydroxyglutarate) to 2-oxoglutarate
  (2-ketoglutarate), corresponding to EC 1.1.99.39. The 1006-residue enzyme contains
  an N-terminal FAD-binding PCMH-type domain and binds one [4Fe-4S] cluster, and
  belongs to the FAD-binding oxidoreductase/transferase type 4 (glycolate
  dehydrogenase) family. It catalyzes the terminal step of the L-2-aminoadipate /
  D-lysine catabolic route, returning the D-2-hydroxyglutarate intermediate to
  central metabolism by producing 2-oxoglutarate, thereby connecting D-lysine
  degradation to the TCA cycle. Loss of the enzyme abolishes growth on D-lysine as a
  sole carbon source, attenuates growth on L-lysine, and causes intracellular
  accumulation of D-2-hydroxyglutarate; expression is induced by L-lysine, D-lysine,
  and 2-aminoadipate.
