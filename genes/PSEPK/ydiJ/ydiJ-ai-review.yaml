- id: file:interpro/panther/PTHR11748/PTHR11748-metadata.yaml
  title: 'PANTHER family PTHR11748 (D-LACTATE DEHYDROGENASE) and subfamily PTHR11748:SF119
    (D-2-HYDROXYGLUTARATE DEHYDROGENASE)'
  findings:
  - statement: >-
      YdiJ is assigned to PANTHER family PTHR11748 "D-LACTATE DEHYDROGENASE" and more
      specifically to subfamily PTHR11748:SF119 "D-2-HYDROXYGLUTARATE DEHYDROGENASE".
  - statement: >-
      The broad family-level name "D-LACTATE DEHYDROGENASE" is the root cause of the
      D-lactate dehydrogenase IEA mis-grafts (GO:0004458, GO:0008720, and the lactate
      catabolic process term), whereas the SF119 subfamily correctly assigns
      D-2-hydroxyglutarate dehydrogenase, supporting the MODIFY decisions redirecting
      to GO:0051990.
- id: PMID:31064836
  title: Massively Parallel Fitness Profiling Reveals Multiple Novel Enzymes in Pseudomonas
    putida Lysine Metabolism
  findings:
  - statement: >-
      YdiJ (PP_4493) is a putative FAD-dependent and 4Fe-4S cluster-containing
      glycolate-dehydrogenase-family enzyme whose deletion abolishes growth on
      D-lysine and causes accumulation of D-2-hydroxyglutarate, indicating it
      oxidizes D-2-hydroxyglutarate to 2-oxoglutarate as the terminal step of
      D-lysine catabolism.
    supporting_text: A putative flavin adenine dinucleotide (FAD)-dependent and
      4Fe-4S cluster-containing glycolate dehydrogenase, PP_4493, did show fitness
      defects on both d-lysine and l-lysine
  - statement: >-
      The ydiJ (PP_4493) deletion mutant accumulates D-2-hydroxyglutarate when grown
      on D-lysine, whereas wild type does not, confirming its in vivo role in
      D-2-hydroxyglutarate turnover.
    supporting_text: the mutant accumulated ∼500 μM 2HG (normalized to optical density
      [OD]), whereas wild-type P. putida did not accumulate any detectable 2HG
suggested_questions:
- question: >-
    What is the physiological electron acceptor for the YdiJ dehydrogenase reaction
    in vivo (e.g., a quinone or membrane electron carrier), given the EC 1.1.99
    "other acceptors" classification?
- question: >-
    Is purified YdiJ strictly specific for D-2-hydroxyglutarate, or does it retain
    measurable activity on other alpha-hydroxyacids such as D-lactate or glycolate
    as predicted by family membership?
suggested_experiments:
- description: >-
    Express and purify recombinant YdiJ and measure steady-state kinetics on
    D-2-hydroxyglutarate (and counter-screen L-2-hydroxyglutarate, D-lactate,
    glycolate) using an artificial electron acceptor (e.g., DCPIP/PMS) to confirm
    substrate specificity and the FAD/[4Fe-4S] requirement.
- description: >-
    Perform targeted metabolomics on wild-type and ydiJ deletion strains grown on
    D-lysine to quantify the 2-oxoglutarate/D-2-hydroxyglutarate flux and confirm
    pathway connectivity to central metabolism.
- description: >-
    Test in vivo complementation of the ydiJ deletion with catalytic-site or
    cofactor-binding (FAD / [4Fe-4S]) variants to establish residues required for
    growth on D-lysine.
