- term:
    id: GO:0004458
    label: D-lactate dehydrogenase (cytochrome) activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000118
  qualifier: enables
  review:
    summary: >-
      PANTHER/TreeGrafter family transfer from the D-lactate dehydrogenase
      family ancestor. The actual substrate is D-2-hydroxyglutarate, not
      D-lactate; this is a paralog/family over-annotation.
    action: MODIFY
    reason: >-
      The protein is a D-2-hydroxyglutarate dehydrogenase (EC 1.1.99.39),
      not a D-lactate dehydrogenase. The lactate-specific activity is not
      supported; replace with the specific demonstrated activity. This
      D-lactate-dehydrogenase transfer derives from the broad PANTHER
      family-level name (PTHR11748 "D-LACTATE DEHYDROGENASE"), whereas the
      SF119 subfamily correctly identifies the protein as D-2-hydroxyglutarate
      dehydrogenase.
    proposed_replacement_terms:
