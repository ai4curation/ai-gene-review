  review:
    summary: >-
      Root-level molecular function term. True but uninformative now that the
      specific (R)-2-hydroxyglutarate dehydrogenase activity is annotated.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      GO:0003824 is the generic parent of all enzyme activity. A specific
