id: Q88DL4
gene_symbol: proA
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: >-
  proA (PP_4811) encodes the cytoplasmic gamma-glutamyl phosphate
  reductase of the Pseudomonas putida KT2440 proline-biosynthesis pathway. ProA
  uses NADPH to reduce L-glutamyl 5-phosphate, the ProB product, to
  L-glutamate 5-semialdehyde and phosphate; the semialdehyde spontaneously
  cyclizes to 1-pyrroline-5-carboxylate. Its core role is therefore the second
  step in the glutamate-to-P5C branch of L-proline biosynthesis.
