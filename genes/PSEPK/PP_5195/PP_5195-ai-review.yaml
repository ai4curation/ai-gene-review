  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: PP_5195 encodes a predicted multi-pass membrane permease of a PP_5195-fbpA iron
  ABC import locus. Its iron ABC-transporter product name, cell-membrane localization, binding-protein-dependent
  permease family, and iron-utilization PANTHER support a membrane-channel role with fbpA.
