id: Q88N64
gene_symbol: panE
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: >-
  panE (PP_1351) encodes a soluble NADPH-dependent 2-dehydropantoate
  2-reductase, commonly called ketopantoate reductase. It reduces
  2-dehydropantoate to (R)-pantoate in the pantoate arm of pantothenate
  biosynthesis. Q88N64 belongs to the canonical PanE ketopantoate-reductase
  family and contains the expected ApbA, Rossmann-like, and KPR-specific domain
  signatures. No direct biochemical study of the KT2440 protein has been
  reported.
