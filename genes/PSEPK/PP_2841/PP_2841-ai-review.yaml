id: Q88J08
gene_symbol: PP_2841
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: >-
  PP_2841 encodes an unreviewed tyrosine recombinase domain-containing protein
  annotated as a site-specific recombinase of the phage integrase family. Its
  domain architecture supports DNA binding and tyrosine-based site-specific
  recombinase activity, with likely participation in DNA recombination or
  integration. Unlike named XerC and XerD proteins, PP_2841 is not yet supported
  as a core chromosome dimer resolution factor in Pseudomonas putida KT2440 and
  is best treated as a related mobile-element or boundary recombinase candidate.
existing_annotations:
- term:
    id: GO:0003677
    label: DNA binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: Correct supporting molecular function. PP_2841 contains integrase
      catalytic and recombinase N-terminal domains, consistent with DNA binding;
      the more informative predicted activity is tyrosine-based site-specific
      recombinase activity.
    action: KEEP_AS_NON_CORE
- term:
    id: GO:0006310
    label: DNA recombination
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: involved_in
  review:
    summary: Correct predicted biological process. The tyrosine recombinase
      domain architecture supports a role in DNA recombination, although the
      exact substrate or mobile-element context is not resolved in this first
      pass.
    action: ACCEPT
- term:
    id: GO:0009037
    label: tyrosine-based site-specific recombinase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000104
  qualifier: enables
  review:
    summary: Correct predicted molecular function. PP_2841 has the conserved
      tyrosine recombinase/integrase domain architecture and is assigned to the
      XerC/XerD-related PANTHER family, supporting tyrosine-based
      site-specific recombinase activity.
    action: ACCEPT
- term:
    id: GO:0015074
    label: DNA integration
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: involved_in
  review:
    summary: Plausible but not yet core. Phage-integrase-family tyrosine
      recombinases often mediate site-specific integration, but PP_2841 lacks
      gene-specific evidence tying it to a particular integration event or to
      the named XerC-XerD chromosome dimer resolution pathway.
    action: KEEP_AS_NON_CORE
