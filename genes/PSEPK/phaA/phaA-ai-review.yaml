        PhaC1-eYFP fusion was used as a positive control for carbonosome localization,
        confirming PhaC1 localizes to PHA granules in P. putida KT2440 via fluorescence
        microscopy.
      supporting_text: >-
        eYPF fusions to PhaI and PhaC1 served as positive controls since both are reported
        to localize to the carbonosome
    - statement: >-
        PhaC1 APMS identified nine potential interacting proteins including five putative
        lipoproteins; PhaI, PhaC1 and PhaZ are all located on the PHA granule.
      supporting_text: >-
        PhaI, PhaC, and PhaZ are all located on the PHA granule and involved in PHA
        metabolism
- id: file:PSEPK/phaA/phaA-deep-research-falcon.md
  title: Deep research report on phaA/phaC1 (PP_5003) in P. putida KT2440
  findings:
    - statement: >-
        PhaC1 catalyzes polymerization of (R)-3-hydroxyacyl-CoA monomers into mcl-PHA,
        functioning as the key chain-elongating enzyme. Carbon reaches PhaC1 through
        beta-oxidation of fatty acids and de novo fatty-acid synthesis routes.
      supporting_text: >-
        PhaC1 is a PHA polymerase/synthase that polymerizes (R)-3-hydroxyacyl-CoA monomers
        into mcl-PHA
core_functions:
- description: >-
    Catalyzes polymerization of (R)-3-hydroxyalkanoyl-CoA thioesters (preferentially
    medium-chain-length, C6-C14) into polyhydroxyalkanoates (mcl-PHAs) with
    concomitant release of CoA. Functions as the primary PHA synthase in P. putida
    KT2440.
  molecular_function:
    id: GO:0016746
    label: acyltransferase activity
  locations:
    - id: GO:0070088
      label: polyhydroxyalkanoate granule
  supported_by:
    - reference_id: PMID:17137299
      supporting_text: >-
        The biosynthesis of mcl-PHA was enhanced only by the overexpressed phaC1 gene
proposed_new_terms:
  - proposed_name: polyhydroxyalkanoate biosynthetic process
    proposed_definition: >-
      The chemical reactions and pathways resulting in the formation of polyhydroxyalkanoates
      (PHAs), polyesters of hydroxyalkanoic acids that serve as carbon and energy storage
      materials in prokaryotic cells. This includes both short-chain-length PHAs (such as
      poly-hydroxybutyrate) and medium-chain-length PHAs.
    justification: >-
      GO currently has GO:0042619 (poly-hydroxybutyrate biosynthetic process), which is
      specific to PHB (short-chain, C4). There is no broader term covering the biosynthesis
      of all polyhydroxyalkanoates, including medium-chain-length PHAs (mcl-PHAs, C6-C14)
      produced by Class II PHA synthases such as P. putida PhaC1. The cellular component
      term GO:0070088 (polyhydroxyalkanoate granule) uses the broader polyhydroxyalkanoate
      terminology, and a corresponding biosynthetic process term is needed. GO:0042619
      should be a child of this new term.
    proposed_parent:
      id: GO:0044249
      label: cellular biosynthetic process
    supported_by:
      - reference_id: PMID:17137299
        supporting_text: >-
          The biosynthesis of mcl-PHA was enhanced only by the overexpressed phaC1 gene
suggested_questions:
  - question: >-
      Should GO create a broader polyhydroxyalkanoate biosynthetic process term as a parent
      of GO:0042619 (poly-hydroxybutyrate biosynthetic process) to accommodate Class II PHA
      synthases that produce mcl-PHAs?
  - question: >-
      What is the functional distinction between PhaC1 and PhaC2 in P. putida KT2440? Is
      PhaC2 catalytically active under any conditions, or is PhaC1 solely responsible for
      mcl-PHA synthesis?
suggested_experiments:
  - description: >-
      In vitro reconstitution of PhaC1 activity with defined (R)-3-hydroxyalkanoyl-CoA
      substrates of varying chain lengths to establish kinetic parameters and determine
      the minimum and maximum chain length accepted.
  - description: >-
      In vitro enzyme assays with purified PhaC1 using different chain-length
      3-hydroxyalkanoyl-CoA substrates to determine substrate specificity and kinetic parameters.
