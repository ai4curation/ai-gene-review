  findings:
    - statement: >-
        The phaC1ZC2D operon is regulated by PhaD, a carbon source-dependent transcriptional
        activator of the pha cluster.
      supporting_text: >-
        Mutagenesis analyses demonstrated that PhaD, a TetR-like transcriptional regulator,
        behaves as a carbon source-dependent activator of the pha cluster
- id: PMID:38608840
