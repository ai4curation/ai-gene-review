id: Q88D25
gene_symbol: phaA
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: >-
  Poly(3-hydroxyalkanoate) polymerase 1 (PhaC1), a Class II PHA synthase that catalyzes
  polymerization of (R)-3-hydroxyalkanoyl-CoA thioesters into medium-chain-length
  polyhydroxyalkanoates (mcl-PHAs, C6-C14). PhaC1 is the primary PHA synthase in P. putida
  KT2440, encoded as the first gene in the phaC1-phaZ-phaC2-phaD operon (PP_5003). PHAs
  accumulate as intracellular granules serving as carbon and energy storage reserves under
  nutrient-limiting conditions. The gene is designated phaA in the KT2440 genome annotation
  but referred to as phaC1 in the broader PHA literature.
existing_annotations:
- term:
    id: GO:0016746
    label: acyltransferase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: >-
      PhaC1 (PP_5003) is annotated with EC 2.3.1.- (acyltransferase) based on its genome
      annotation (PMID:12534463). The enzyme catalyzes a transesterification reaction,
      transferring acyl groups from (R)-3-hydroxyalkanoyl-CoA donors to a growing polyester
      chain. GO:0016746 (acyltransferase activity) is a correct but relatively general
      molecular function term. The slightly more specific child term GO:0016747
      (acyltransferase activity, transferring groups other than amino-acyl groups) would be
      more informative, since PHA synthases transfer hydroxyalkanoyl groups, not amino-acyl
      groups. However, no PHA-synthase-specific MF term exists in GO, so GO:0016746 is
      acceptable as a broad classification. The InterPro match to IPR011287 (PHA_synth_II)
      is correct for this Class II PHA synthase.
    action: ACCEPT
    reason: >-
      The acyltransferase activity annotation is correct. PhaC1 is classified as EC 2.3.1.-
      and catalyzes acyl group transfer from CoA-linked substrates to polyester chains.
      While GO:0016747 would be slightly more specific, GO:0016746 is not wrong and
      accurately captures the molecular function. The InterPro domain match (IPR011287,
      PHA_synth_II) is a high-confidence match for this Class II PHA synthase.
    supported_by:
      - reference_id: PMID:12534463
        supporting_text: >-
          points to potential new applications in agriculture, biocatalysis,
          bioremediation and bioplastic production
      - reference_id: PMID:17137299
        supporting_text: >-
          The biosynthesis of mcl-PHA was enhanced only by the overexpressed phaC1 gene
- term:
    id: GO:0042619
    label: poly-hydroxybutyrate biosynthetic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: >-
      GO:0042619 (poly-hydroxybutyrate biosynthetic process) refers specifically to PHB, a
      short-chain-length polymer of beta-hydroxybutyrate (C4). However, P. putida KT2440
      PhaC1 is a Class II PHA synthase that preferentially polymerizes medium-chain-length
      (mcl, C6-C14) 3-hydroxyalkanoyl-CoA substrates, producing mcl-PHAs -- NOT
      poly-hydroxybutyrate (PHB). PHB biosynthesis is the function of Class I PHA synthases
      such as PhaC from Cupriavidus necator. This annotation is an incorrect assignment from
      the InterPro2GO mapping: both IPR010941 (PhaC_N) and IPR011287 (PHA_synth_II) map to
      GO:0042619, but the InterPro entries cover all PHA synthases (Class I and II) while the
      GO term is specific to PHB. There is no broader GO term for polyhydroxyalkanoate
      biosynthetic process that would correctly describe the mcl-PHA biosynthesis carried out
      by this enzyme.
    action: REMOVE
    reason: >-
      This annotation is factually incorrect for P. putida PhaC1. The enzyme is a Class II
      PHA synthase that produces medium-chain-length PHAs (mcl-PHAs, C6-C14), not
      poly-hydroxybutyrate (PHB, C4). The GO term GO:0042619 explicitly describes PHB
      biosynthesis, defined as a polymer of beta-hydroxybutyrate. The InterPro2GO mapping
      that generates this annotation does not distinguish between Class I (PHB-producing) and
      Class II (mcl-PHA-producing) synthases. P. putida KT2440 does not produce PHB. No
      appropriate broader GO BP term for polyhydroxyalkanoate biosynthesis currently exists;
      this represents a gap in the GO ontology.
    additional_reference_ids:
      - PMID:17137299
      - PMID:20406286
    supported_by:
      - reference_id: PMID:17137299
        supporting_text: >-
          The biosynthesis of mcl-PHA was enhanced only by the overexpressed phaC1 gene
- term:
    id: GO:0070088
    label: polyhydroxyalkanoate granule
  evidence_type: ISS
  original_reference_id: PMID:17137299
  review:
    summary: >-
      PHA synthases are integral components of PHA granules. The GO term GO:0070088
      (polyhydroxyalkanoate granule) description explicitly states that PHA synthase is one
      of the proteins associated with PHA granules. PhaC1 catalyzes the polymerization
      reaction at the granule surface and is physically associated with PHA granules in vivo.
      This is a well-established localization for Class II PHA synthases in Pseudomonas
      species.
    action: NEW
    reason: >-
      PHA synthase is explicitly listed in the GO:0070088 definition as a constituent
      protein of PHA granules. PhaC1 is the primary PHA synthase in P. putida KT2440 and
      localizes to PHA granules where it catalyzes polymer chain elongation. Direct
      experimental evidence from Kelly et al. (2024) used PhaC1-eYFP fusion as a positive
      control for carbonosome localization in fluorescence microscopy. This cellular
      component annotation is missing from the current GOA set and should be added.
    supported_by:
      - reference_id: PMID:38608840
        supporting_text: >-
          eYPF fusions to PhaI and PhaC1 served as positive controls since both are reported
          to localize to the carbonosome
      - reference_id: file:PSEPK/phaA/phaA-deep-research-falcon.md
        supporting_text: >-
          PHA granules (carbonosomes) are intracellular hydrophobic inclusions; proteins
          involved in polymerization and regulation are associated with granule surfaces
- term:
    id: GO:0016747
    label: acyltransferase activity, transferring groups other than amino-acyl groups
  evidence_type: ISS
  original_reference_id: PMID:17137299
  review:
    summary: >-
      GO:0016747 is a more specific child of GO:0016746 (acyltransferase activity) that
      excludes amino-acyl transfer. PHA synthases transfer hydroxyalkanoyl groups from CoA
      to a growing polyester chain, which falls under this more specific term. This would
      provide a more informative molecular function annotation than the current GO:0016746.
    action: NEW
    reason: >-
      PhaC1 transfers (R)-3-hydroxyalkanoyl groups from CoA-linked substrates to a growing
      polyester chain. This is a non-amino-acyl acyltransfer reaction, making GO:0016747 a
      correct and more specific alternative to the existing GO:0016746 annotation. Adding
      this more specific term improves annotation precision.
    supported_by:
      - reference_id: PMID:17137299
        supporting_text: >-
          The biosynthesis of mcl-PHA was enhanced only by the overexpressed phaC1 gene
