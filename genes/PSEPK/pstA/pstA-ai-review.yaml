description: pstA (PP_2658) encodes the second multi-pass inner-membrane permease component of the PstSACB high-affinity phosphate ABC importer. Its PstA-specific domain and adjacent pstS/pstC/pstB1 genes support phosphate movement across the plasma membrane.
