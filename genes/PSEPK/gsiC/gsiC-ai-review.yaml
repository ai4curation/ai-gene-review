description: gsiC encodes a predicted multi-pass permease subunit of a glutathione ABC import system in Pseudomonas putida KT2440. Its product name, MetI-like permease domains, and adjacency to gsiA support a membrane-channel role in a glutathione/opine-like ABC importer.
