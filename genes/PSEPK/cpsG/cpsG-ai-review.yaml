description: cpsG (PP_1777) encodes a phosphomannomutase-family phosphohexomutase. Its primary reaction is the magnesium-dependent interconversion of mannose 6-phosphate and mannose 1-phosphate, supplying activated mannose precursors for cell-envelope carbohydrate biosynthesis. It is carbohydrate-metabolism adjacent but not a core ED/gluconeogenic step.
