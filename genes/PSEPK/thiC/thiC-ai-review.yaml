id: Q88DA5
gene_symbol: thiC
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: thiC encodes a radical SAM phosphomethylpyrimidine synthase that converts aminoimidazole ribotide into the HMP-P pyrimidine moiety of thiamine. The enzyme contains a 4Fe-4S cluster and catalyzes an early committed step in the pyrimidine branch of thiamine diphosphate biosynthesis.
existing_annotations:
