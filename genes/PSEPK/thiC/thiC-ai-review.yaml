    label: cytosol
  evidence_type: IEA
  original_reference_id: GO_REF:0000118
  qualifier: located_in
  review:
    summary: Cytosol is reasonable for this soluble bacterial thiamine-pathway enzyme but is not a core functional claim.
    action: KEEP_AS_NON_CORE
    reason: Retain as non-core location context.
    supported_by:
    - reference_id: file:PSEPK/thiC/thiC-goa.tsv
      supporting_text: "GO:0005829\tcytosol"
- term:
    id: GO:0008270
    label: zinc ion binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000104
  qualifier: enables
  review:
    summary: Zinc ion binding is an automated UniRule-derived cofactor annotation and is secondary to the radical SAM synthase activity.
    action: KEEP_AS_NON_CORE
    reason: Retain as non-core cofactor context; the principal metal/cofactor evidence in UniProt is the 4Fe-4S radical SAM cluster.
    supported_by:
    - reference_id: file:PSEPK/thiC/thiC-goa.tsv
      supporting_text: "GO:0008270\tzinc ion binding"
- term:
    id: GO:0009228
    label: thiamine biosynthetic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: involved_in
  review:
    summary: ThiC participates in thiamine biosynthesis, but GO:0009229 is the more specific pathway process.
    action: KEEP_AS_NON_CORE
    reason: Retain as a broad parent process while treating thiamine diphosphate biosynthesis as core.
    supported_by:
    - reference_id: file:PSEPK/thiC/thiC-goa.tsv
      supporting_text: "GO:0009228\tthiamine biosynthetic process"
- term:
    id: GO:0009229
    label: thiamine diphosphate biosynthetic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: involved_in
  review:
    summary: ThiC supplies the HMP-P pyrimidine branch intermediate for thiamine diphosphate biosynthesis.
    action: ACCEPT
    reason: Retain as the core biological-process annotation, supported by the UniProt pathway statement and the specific enzyme function.
    supported_by:
    - reference_id: file:PSEPK/thiC/thiC-uniprot.txt
      supporting_text: 'PATHWAY: Cofactor biosynthesis; thiamine diphosphate biosynthesis.'
    - reference_id: file:PSEPK/thiC/thiC-goa.tsv
      supporting_text: "GO:0009229\tthiamine diphosphate biosynthetic process"
- term:
    id: GO:0016829
    label: lyase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000104
  qualifier: enables
  review:
    summary: Lyase activity is a broad parent term for ThiC's radical SAM phosphomethylpyrimidine synthase activity.
    action: MARK_AS_OVER_ANNOTATED
    reason: Retain the specific GO:0070284 activity rather than this broad parent.
    supported_by:
    - reference_id: file:PSEPK/thiC/thiC-goa.tsv
      supporting_text: "GO:0016829\tlyase activity"
    - reference_id: file:PSEPK/thiC/thiC-goa.tsv
      supporting_text: "GO:0070284\tphosphomethylpyrimidine synthase activity"
- term:
    id: GO:0016830
    label: carbon-carbon lyase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: Carbon-carbon lyase activity is less informative than the specific phosphomethylpyrimidine synthase activity.
    action: MARK_AS_OVER_ANNOTATED
    reason: The specific ThiC activity term captures the actual reaction and should be preferred.
    supported_by:
    - reference_id: file:PSEPK/thiC/thiC-goa.tsv
      supporting_text: "GO:0016830\tcarbon-carbon lyase activity"
    - reference_id: file:PSEPK/thiC/thiC-goa.tsv
      supporting_text: "GO:0070284\tphosphomethylpyrimidine synthase activity"
- term:
    id: GO:0051536
    label: iron-sulfur cluster binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: Iron-sulfur cluster binding is correct but can be made more specific because UniProt states that ThiC binds one 4Fe-4S cluster per subunit.
    action: MODIFY
    reason: Replace the broad iron-sulfur cluster binding term with GO:0051539 (4 iron, 4 sulfur cluster binding), which matches the radical SAM cofactor annotation.
    proposed_replacement_terms:
    - id: GO:0051539
      label: 4 iron, 4 sulfur cluster binding
    supported_by:
    - reference_id: file:PSEPK/thiC/thiC-uniprot.txt
      supporting_text: Note=Binds 1 [4Fe-4S] cluster per subunit
    - reference_id: file:PSEPK/thiC/thiC-goa.tsv
      supporting_text: "GO:0051536\tiron-sulfur cluster binding"
- term:
    id: GO:0070284
    label: phosphomethylpyrimidine synthase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: ThiC catalyzes radical SAM-dependent formation of the HMP-P moiety from AIR.
    action: ACCEPT
    reason: Retain as the core molecular function; UniProt and GOA agree on the specific activity.
    supported_by:
