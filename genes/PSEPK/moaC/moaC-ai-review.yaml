      supporting_text: >-
        Across bacteria and eukaryotes, Moco biosynthesis is commonly described as
        a sequence of conserved steps. A mechanistic perspective summarizes three
        conserved stages: (1) rearrangement of **GTP** into **cPMP**, (2) sulfur
        insertion to form **MPT**, and (3) insertion of molybdate (Mo) to produce Moco.
    - reference_id: file:PSEPK/moaC/moaC-deep-research-falcon.md
      supporting_text: the conserved role of MoaC in cPMP synthesis implies it is upstream of all KT2440 Moco-dependent enzymes
