  title: PANTHER family metadata for moaC
  findings:
  - statement: PANTHER places MoaC in the molybdopterin cofactor synthesis MoaA/MoaC family.
- id: file:PSEPK/moaC/moaC-deep-research-falcon.md
  title: Falcon deep research on moaC (Edison Scientific Literature)
  findings:
  - supporting_text: MoaC** is the **cPMP synthase** that converts **3′,8-cH2GTP →
      cPMP** via a complex rearrangement that constructs the pyranopterin framework
      and cyclic phosphate.
    reference_section_type: OTHER
  - supporting_text: bacterial MoaC is treated in the literature as a **soluble intracellular/cytosolic
      biosynthetic enzyme** functioning in early Moco biosynthesis rather than a membrane
      or secreted protein
    reference_section_type: OTHER
  - supporting_text: MoaC **forms a hexamer composed of a trimer of dimers**; the **active
      site lies at the interface of each dimer**
    reference_section_type: OTHER
