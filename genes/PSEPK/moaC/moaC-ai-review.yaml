  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: moaC encodes cyclic pyranopterin monophosphate synthase, the MoaC enzyme that converts a cyclic GTP-derived precursor
  to cPMP during molybdopterin cofactor biosynthesis.
existing_annotations:
- term:
    id: GO:0006777
    label: Mo-molybdopterin cofactor biosynthetic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  review:
    summary: MoaC should retain the Mo-molybdopterin cofactor biosynthetic process annotation.
    action: ACCEPT
    reason: UniProt places MoaC in molybdopterin biosynthesis and describes the cPMP-forming reaction.
    supported_by:
    - reference_id: file:PSEPK/moaC/moaC-uniprot.txt
      supporting_text: 'PATHWAY: Cofactor biosynthesis; molybdopterin biosynthesis'
    - reference_id: file:PSEPK/moaC/moaC-goa.tsv
      supporting_text: "GO:0006777\tMo-molybdopterin cofactor biosynthetic process"
    - reference_id: file:PSEPK/moaC/moaC-deep-research-falcon.md
      supporting_text: cPMP formation is the **first committed/conserved step** of
        Moco biosynthesis... (1) rearrangement of **GTP** into **cPMP**, (2) sulfur
        insertion to form **MPT**, and (3) insertion of molybdate (Mo) to produce
        Moco.
      reference_section_type: OTHER
    - reference_id: file:PSEPK/moaC/moaC-deep-research-falcon.md
      supporting_text: the conserved role of MoaC in cPMP synthesis implies it is upstream
        of all KT2440 Moco-dependent enzymes
      reference_section_type: OTHER
- term:
    id: GO:0061799
    label: cyclic pyranopterin monophosphate synthase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  review:
    summary: Cyclic pyranopterin monophosphate synthase activity is the correct core molecular function for MoaC.
    action: ACCEPT
    reason: UniProt assigns EC 4.6.1.17 and the Rhea reaction producing cyclic pyranopterin phosphate.
    supported_by:
    - reference_id: file:PSEPK/moaC/moaC-uniprot.txt
      supporting_text: Cyclic pyranopterin monophosphate synthase
    - reference_id: file:PSEPK/moaC/moaC-uniprot.txt
      supporting_text: EC=4.6.1.17
    - reference_id: file:PSEPK/moaC/moaC-goa.tsv
      supporting_text: "GO:0061799\tcyclic pyranopterin monophosphate synthase activity"
    - reference_id: file:PSEPK/moaC/moaC-deep-research-falcon.md
      supporting_text: MoaC catalyzes the conversion of the MoaA product, 3′,8-cH2GTP,
        into cyclic pyranopterin monophosphate (cPMP).
      reference_section_type: OTHER
    - reference_id: file:PSEPK/moaC/moaC-deep-research-falcon.md
      supporting_text: This establishes MoaC’s **substrate specificity** as being directed
        to **3′,8-cH2GTP** (not GTP directly) and its **product** as cPMP, the first
        stable committed intermediate in Moco biosynthesis.
      reference_section_type: OTHER
