id: Q88CF1
gene_symbol: xerC
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: >-
  xerC encodes the XerC subunit of the bacterial XerC-XerD tyrosine
  recombinase system. XerC is a cytoplasmic site-specific DNA recombinase that
  partners with XerD to cut and rejoin DNA at recombination sites, resolving
  bacterial chromosome dimers into monomers so chromosomes can segregate before
  cell division. The protein is a XerC-subfamily member of the phage
  integrase-related tyrosine recombinase family, but its main bacterial role is
  chromosome dimer resolution rather than generic transposition.
