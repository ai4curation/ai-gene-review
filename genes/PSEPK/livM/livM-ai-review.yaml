taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: livM (PP_1139) encodes a predicted multi-pass inner-membrane permease component of the PP_1137-PP_1141 LivFGMHK high-affinity branched-chain amino-acid ABC uptake system. Its LivM-like binding-protein-dependent transporter domains support a channel role in branched-chain amino-acid import rather than independent ATPase or soluble substrate-binding activity.
