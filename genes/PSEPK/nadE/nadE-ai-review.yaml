      summary: Correct expected location for soluble bacterial NadE.
      action: ACCEPT
      reason: The compact NadE enzyme is assigned to the bacterial cytoplasm.
  - term:
      id: GO:0008795
      label: NAD+ synthase activity
    evidence_type: IEA
    original_reference_id: GO_REF:0000120
    qualifier: enables
    review:
      summary: Correct core molecular function for the ammonia-dependent enzyme.
      action: ACCEPT
      reason: >-
        The reviewed target and HAMAP rule specify the ammonium-dependent
        deamido-NAD amidation reaction RHEA:21188.
      supported_by:
        - reference_id: file:PSEPK/nadE/nadE-uniprot.txt
          supporting_text: "Reaction=deamido-NAD(+) + NH4(+) + ATP = AMP + diphosphate + NAD(+) +"
  - term:
