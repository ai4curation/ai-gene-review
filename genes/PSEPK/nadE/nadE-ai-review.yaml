id: Q88DF6
gene_symbol: nadE
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: >-
  Ammonia-dependent NAD+ synthetase of Pseudomonas putida KT2440. NadE uses
  deamido-NAD, ATP, and free ammonium to form NAD+, AMP, and diphosphate in the
  terminal reaction of the deamido-NAD completion branch. This compact bacterial
  enzyme lacks the glutaminase module required for glutamine-dependent NAD+
  synthesis.
existing_annotations:
  - term:
      id: GO:0003952
      label: NAD+ synthase (glutamine-hydrolyzing) activity
    evidence_type: IEA
    original_reference_id: GO_REF:0000002
    qualifier: enables
    review:
      summary: Incorrect nitrogen-donor specificity propagated from a broad family.
      action: REMOVE
      reason: >-
        The reviewed target is explicitly an NH3-dependent NadE, carries the
        NH(3)-dependent NAD synthetase subfamily assignment, and lacks a
        glutaminase domain. Its defined reaction uses NH4+, not glutamine.
      supported_by:
        - reference_id: file:PSEPK/nadE/nadE-uniprot.txt
          supporting_text: "RecName: Full=NH(3)-dependent NAD(+) synthetase"
        - reference_id: file:PSEPK/nadE/nadE-uniprot.txt
          supporting_text: "Reaction=deamido-NAD(+) + NH4(+) + ATP = AMP + diphosphate + NAD(+) +"
  - term:
      id: GO:0004359
      label: glutaminase activity
    evidence_type: IEA
    original_reference_id: GO_REF:0000002
    qualifier: enables
    review:
      summary: Incorrect InterPro over-propagation to an ammonia-dependent enzyme.
      action: REMOVE
      reason: >-
        Q88DF6 is a 275-residue ammonia-dependent NadE with only the NAD
        synthetase module; no glutaminase catalytic module is present or needed
        for RHEA:21188.
      supported_by:
        - reference_id: file:PSEPK/nadE/nadE-uniprot.txt
          supporting_text: "InterPro; IPR022926; NH(3)-dep_NAD(+)_synth."
