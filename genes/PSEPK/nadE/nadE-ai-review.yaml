  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: nadE encodes an NH3-dependent NAD+ synthetase that uses ATP and ammonium to amidate deamido-NAD+ to NAD+. It catalyzes the final amidation step of NAD+ biosynthesis in P. putida KT2440.
