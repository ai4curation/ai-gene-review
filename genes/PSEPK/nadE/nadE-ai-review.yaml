    summary: The glutamine-hydrolyzing NAD+ synthase term captures NAD synthetase biology but the co-substrate specificity is wrong for this protein.
    action: MODIFY
    reason: UniProt identifies NadE as NH3-dependent NAD+ synthetase (EC 6.3.1.5), so the replacement should be the non-glutamine-specific NAD+ synthase activity term.
