suggested_questions:
  - question: Is free ammonium availability limiting for NadE-dependent NAD+ synthesis during nitrogen limitation in P. putida KT2440?
suggested_experiments:
  - description: >-
      Measure deamido-NAD and NAD+ pools across ammonium concentrations in wild
