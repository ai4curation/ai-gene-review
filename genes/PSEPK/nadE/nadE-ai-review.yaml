    review:
      summary: Correct catalytic co-substrate binding, retained as non-core.
      action: KEEP_AS_NON_CORE
      reason: >-
        ATP is a substrate of the NadE ligase reaction, but GO:0008795 is the
        informative catalytic function.
      supported_by:
        - reference_id: file:PSEPK/nadE/nadE-uniprot.txt
          supporting_text: "Reaction=deamido-NAD(+) + NH4(+) + ATP = AMP + diphosphate + NAD(+) +"
  - term:
