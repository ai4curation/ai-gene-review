  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: cbcX (PP_0296) encodes a signal-peptide-bearing periplasmic substrate-binding component of the predicted Cbc choline/betaine/carnitine ABC uptake system. Its OpuAC/ABC glycine-betaine substrate-binding domain and choline-binding GOA support a substrate-recognition role feeding the CbcV/CbcW transport machinery.
existing_annotations:
