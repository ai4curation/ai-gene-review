    id: GO:0015871
    label: choline transport
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: involved_in
  review:
    summary: Choline transport is appropriate process context for this periplasmic substrate-binding component.
    action: ACCEPT
    reason: CbcX is named as the substrate-binding protein of a choline/betaine/carnitine ABC transporter and carries ABC choline/glycine-betaine substrate-binding domains.
    supported_by:
    - reference_id: file:PSEPK/cbcX/cbcX-goa.tsv
      supporting_text: "GO:0015871\tcholine transport"
- term:
    id: GO:0022857
    label: transmembrane transporter activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: Generic transmembrane transporter activity is too broad and potentially misleading for a soluble periplasmic binding component.
    action: MARK_AS_OVER_ANNOTATED
    reason: CbcX likely contributes substrate recognition to an ABC importer rather than forming the membrane translocation pathway itself; choline binding and choline transport capture the role more accurately.
    supported_by:
    - reference_id: file:PSEPK/cbcX/cbcX-goa.tsv
      supporting_text: "GO:0022857\ttransmembrane transporter activity"
