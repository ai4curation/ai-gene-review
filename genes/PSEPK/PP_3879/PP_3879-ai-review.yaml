suggested_experiments:
- experiment_type: prophage locus inspection
  description: Inspect the genomic neighborhood of PP_3879 for synteny with terminase, portal, head, tail, and lysis modules.
  hypothesis: PP_3879 is part of a coherent prophage structural or packaging locus.
- experiment_type: comparative sequence analysis
  description: Compare PP_3879 against curated phage structural and packaging proteins to assess domain completeness and conserved
    motifs.
  hypothesis: PP_3879 retains the expected sequence features for its prophage structural/packaging role.
