  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: glgX encodes a glycogen debranching enzyme in Pseudomonas putida KT2440. It is a GH13-family amylo-alpha-1,6-glucosidase predicted to remove alpha-1,6 branch points during glycogen mobilization.
