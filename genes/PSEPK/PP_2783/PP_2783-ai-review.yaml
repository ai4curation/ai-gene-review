description: PP_2783 is a predicted 2,3-dihydroxy-2,3-dihydro-p-cumate dehydrogenase in Pseudomonas putida KT2440. UniProt places it in aromatic compound/p-cumate degradation, where it oxidizes a dihydrodiol intermediate; the fatty acid elongation annotation appears to be a broad SDR family propagation artifact rather than a supported FAS-II role.
