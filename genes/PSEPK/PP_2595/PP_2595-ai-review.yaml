suggested_questions:
- question: Do PP_2595 and PP_2596 form a redundant pair, a heteromeric exporter, or two independent ABCB-like exporters?
- question: Is either transporter linked to the adjacent ferric-siderophore uptake locus or to an unrelated envelope substrate?
suggested_experiments:
- description: Construct PP_2595/PP_2596 single and double mutants and assay siderophore sensitivity, envelope stress, and
    export phenotypes.
  experiment_type: targeted transporter phenotype and substrate assay
