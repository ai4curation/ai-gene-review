taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: PP_2595 encodes a fused cell-membrane ABCB/type-1-exporter-like permease/ATPase. It sits immediately downstream
  of a ferric-siderophore ABC uptake locus, but its own substrate is unresolved. ATP binding, ATP hydrolysis, plasma-membrane
  localization, and generic ABC-type transmembrane transporter activity are supportable; the lipid-transporter call is treated
  as automated family spillover.
