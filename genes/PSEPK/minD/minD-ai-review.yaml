taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: minD encodes the MinD septum-site-determining ATPase, a ParA/MinD-family P-loop NTPase in the MinCDE division-site selection system. MinD acts at the cytoplasmic side of the plasma membrane, recruits or positions MinC, and helps prevent polar FtsZ-ring and septum formation so that cell division occurs at the proper site.
