suggested_questions:
- question: >-
    Does KT2440 use galE primarily for galactose catabolism, UDP-galactose supply
    for envelope glycans, or both under physiological growth conditions?
suggested_experiments:
- description: >-
    Measure UDP-glucose and UDP-galactose pools, galactose utilization, and
    envelope glycan phenotypes in wild type, galE deletion, and complemented
    strains.
  experiment_type: nucleotide-sugar metabolomics and growth/envelope phenotyping
