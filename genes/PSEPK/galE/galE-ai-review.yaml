id: Q88I72
gene_symbol: galE
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: >-
  galE encodes a predicted UDP-glucose 4-epimerase in Pseudomonas putida KT2440.
  The enzyme interconverts UDP-alpha-D-glucose and UDP-alpha-D-galactose using an
  NAD-dependent epimerase/dehydratase fold, linking UDP-sugar balance to galactose
  handling and cell-envelope or glycoconjugate precursor metabolism.
existing_annotations:
- term:
    id: GO:0003978
    label: UDP-glucose 4-epimerase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: >-
      UDP-glucose 4-epimerase activity is the best-supported molecular function
      for galE/PP_3129.
    action: ACCEPT
    reason: >-
      The term matches the UniProt RecName, EC 5.1.3.2 catalytic activity,
      UniRule GO cross-reference, and UDP_G4E/epimerase domain context.
    supported_by:
    - reference_id: file:PSEPK/galE/galE-uniprot.txt
      supporting_text: 'DE   RecName: Full=UDP-glucose 4-epimerase'
    - reference_id: file:PSEPK/galE/galE-uniprot.txt
      supporting_text: 'CC       Reaction=UDP-alpha-D-glucose = UDP-alpha-D-galactose;'
    - reference_id: file:PSEPK/galE/galE-uniprot.txt
      supporting_text: 'DR   GO; GO:0003978; F:UDP-glucose 4-epimerase activity; IEA:UniProtKB-UniRule.'
- term:
    id: GO:0006012
    label: galactose metabolic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: involved_in
  review:
    summary: >-
      galE catalyzes UDP-glucose/UDP-galactose interconversion and is therefore
      relevant to galactose metabolism, but this broad process term should not be
      read as evidence for a complete canonical Leloir catabolic route in KT2440.
    action: KEEP_AS_NON_CORE
    reason: >-
      UniProt places the enzyme in carbohydrate/galactose metabolism, while the
      pathway batch indicates that the organism-level KEGG bucket lacks obvious
      canonical galactokinase and galactose-1-phosphate uridylyltransferase
      members. Retain the broad process as context and use the enzymatic activity
      as the core annotation.
    supported_by:
    - reference_id: file:PSEPK/galE/galE-uniprot.txt
      supporting_text: 'CC   -!- PATHWAY: Carbohydrate metabolism; galactose metabolism.'
    - reference_id: file:PSEPK/galE/galE-uniprot.txt
      supporting_text: 'DR   UniPathway; UPA00214; -.'
- term:
    id: GO:0033499
    label: beta-D-galactose catabolic process via UDP-galactose, Leloir pathway
  evidence_type: IEA
  original_reference_id: GO_REF:0000118
  qualifier: involved_in
  review:
    summary: >-
      galE is the UDP-sugar epimerase step used in the Leloir pathway, but the
      full canonical Leloir route is not established for KT2440 in this first
      pathway pass.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      The molecular function is well supported, but assigning the specific
      beta-D-galactose catabolic process overstates the current organism-level
      evidence because the ppu00052 batch does not identify clear galactokinase
      and GALT-like transferase steps. Treat galE as a UDP-sugar/galactose
      metabolism enzyme and revisit this process term after module-level hole
      filling.
    supported_by:
    - reference_id: file:PSEPK/galE/galE-uniprot.txt
      supporting_text: 'DR   GO; GO:0033499; P:galactose catabolic process via UDP-galactose, Leloir pathway; IEA:TreeGrafter.'
