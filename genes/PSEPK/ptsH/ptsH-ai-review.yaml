  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: >-
  PtsH is the HPr-family phosphocarrier protein of the Pseudomonas putida
  KT2440 phosphoenolpyruvate-dependent phosphotransferase system. It is a small
  soluble cytoplasmic protein with an HPr domain and conserved PTS HPr
  histidine/serine phosphorylation motifs. In the PTS phosphorelay, HPr-family
  proteins transfer phosphoryl groups between enzyme I-type phosphotransferases
  and downstream EIIA/EIIB components, linking phosphoenolpyruvate-dependent
  phosphoryl transfer to sugar PTS branches and regulatory PTS context.
