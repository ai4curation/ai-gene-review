suggested_questions:
- question: Does PtsH in KT2440 primarily feed the fructose PTS branch, the nitrogen-related PTS branch, or both under different carbon/nitrogen regimes?
suggested_experiments:
- description: Reconstitute phosphoryl transfer from enzyme I/PtsP to PtsH and downstream PTS partners, monitoring phosphoprotein intermediates by Phos-tag gels or mass spectrometry.
  experiment_type: biochemical phosphotransfer assay
- description: Compare fructose uptake and nitrogen-regulatory phenotypes in ptsH deletion and phosphosite mutant strains.
  experiment_type: genetic phenotype
