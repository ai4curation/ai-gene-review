taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: DNA mismatch repair protein MutL, a 632-residue member of the MutL/HexB family that functions in post-replicative DNA mismatch repair (MMR). MutL acts together with MutS to correct base-base mismatches and small insertion/deletion loops that escape replicative proofreading. It is a molecular matchmaker that couples mismatch recognition by MutS to downstream strand processing in an ATP-dependent manner via its N-terminal GHKL-type ATPase domain, and it dimerizes through its C-terminal domain. In Pseudomonas putida, which encodes MutS and MutL but lacks MutH and Dam methylation, MMR operates by a MutH-independent (methylation-independent) mechanism; MutL homologs in such systems typically carry a metal-dependent endonuclease motif and are positioned/activated by the replication beta-clamp (DnaN) to nick the error-containing strand. MutL acts in the cytoplasm, associated with the nucleoid and replisome. Loss or dominant-negative inhibition of MutL strongly elevates spontaneous mutation rates, establishing its role as a central determinant of genome fidelity.
