- id: PMID:31599106
  title: Mismatch repair hierarchy of Pseudomonas putida revealed by mutagenic ssDNA recombineering of the pyrF gene
  findings:
  - statement: P. putida KT2440 encodes MutS and MutL but lacks MutH and Dam methylation; MutL (PP_4896) shares ~44% identity with E. coli MutL. Dominant-negative mutL E36K transiently inhibits MMR, and deltamutS abolishes it, demonstrating MutL's central role in repairing replication mismatches.
  reference_review:
    relevance: HIGH
    correctness: UNVERIFIED
    review_notes: DOI reported in deep-research (Aparicio et al. 2020, Environ Microbiol 22:45-58); not independently verified via PubMed in this session.
- id: PMID:35210609
  title: Bacterial DNA excision repair pathways.
  findings:
  - statement: In MutH-independent (methylation-independent) bacterial MMR, many MutL homologs carry a conserved metal-dependent endonuclease motif (DQHA(X)2E(X)4E) and are activated/positioned by the replication beta-clamp (DnaN) to incise the error-containing strand.
  reference_review:
    relevance: MEDIUM
    correctness: UNVERIFIED
    review_notes: Review used for mechanistic inference about MutH-less MutL function; DOI reported in deep-research (Wozniak & Simmons 2022, Nat Rev Microbiol 20:465-477), not independently verified via PubMed in this session.
