  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: part_of
  review:
    summary: MutL functions as a dimer and assembles with MutS (and the beta-clamp in MutH-less systems) on mismatched DNA, forming the mismatch repair complex.
    action: ACCEPT
    reason: Appropriate cellular component for a MutL-family protein; MutL is a defining component of the MutS-MutL mismatch repair complex.
- term:
    id: GO:0140664
    label: ATP-dependent DNA damage sensor activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: This term describes ATP-dependent sensing/transduction of DNA lesions. MutL couples ATP binding/hydrolysis to recognition of MutS-bound mismatches and transduces the signal to downstream strand-processing steps. MutL does not itself recognize the mismatch (that is the role of MutS); it acts downstream as a matchmaker.
    action: KEEP_AS_NON_CORE
    reason: The activity is consistent with the established mechanism of MutL as an ATP-driven coordinator within MMR, but it is secondary to the core mismatch repair, ATPase, and mismatched-DNA-binding annotations. Retained as non-core rather than removed.
core_functions:
- description: Acts as an ATP-dependent molecular matchmaker in post-replicative DNA mismatch repair, coupling MutS-mediated recognition of base-base mismatches and small indels to downstream strand-discrimination and incision/excision steps.
  supported_by:
  - reference_id: PMID:31599106
    supporting_text: Transient suppression of MutL via dominant-negative mutL E36K allows ssDNA-recombineering-introduced mismatches to escape repair and become inherited, and permanent deletion of mutS elevates the mutational regime, demonstrating MutL's central role in MMR in P. putida KT2440.
    full_text_unavailable: true
  molecular_function:
    id: GO:0016887
    label: ATP hydrolysis activity
  directly_involved_in:
  - id: GO:0006298
    label: mismatch repair
- description: Binds ATP and mismatched DNA within the MutS-MutL repair complex; in P. putida, which lacks MutH and Dam methylation, MMR proceeds by a methylation-independent mechanism in which MutL-family endonuclease activity coupled to the beta-clamp is inferred to direct strand-specific incision.
  supported_by:
  - reference_id: PMID:35210609
    supporting_text: In bacteria lacking MutH/Dam, many MutL homologs contain a conserved metal-dependent endonuclease motif and are stimulated by the replication beta-clamp (DnaN) to incise the error-containing strand.
    full_text_unavailable: true
