proposed_new_terms: []
suggested_questions:
- question: Does P. putida MutL (PP_4896) possess intrinsic metal-dependent endonuclease activity, and is it stimulated by the beta-clamp (DnaN) as in other MutH-less bacteria?
- question: How is strand discrimination achieved in P. putida MMR in the absence of MutH and Dam methylation?
suggested_experiments:
- description: Biochemical reconstitution of P. putida MutL to test ATPase activity, mismatched-DNA binding, and DnaN-stimulated endonuclease (strand-incision) activity in vitro.
- description: Subcellular localization (e.g., fluorescent fusions) to test replisome/nucleoid association of MutL during replication and after mismatch induction.
