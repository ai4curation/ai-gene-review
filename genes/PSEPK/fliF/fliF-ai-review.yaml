description: fliF encodes the FliF MS/M-ring protein of the Pseudomonas putida KT2440 bacterial-type flagellum.
  It is a membrane-associated basal-body scaffold that forms the MS ring and supports flagellum-dependent
  motility by anchoring the export/motor architecture.
