description: PP_1726 encodes a predicted signal-peptide-bearing periplasmic solute-binding component of the PP_1722-PP_1724 2-aminoethylphosphonate/phosphonate ABC import system in Pseudomonas putida KT2440. The local transporter context supports organic phosphonate uptake, while the electronic thiamine-binding annotations appear to be over-propagated from the broad SBP_bac_6 family.
