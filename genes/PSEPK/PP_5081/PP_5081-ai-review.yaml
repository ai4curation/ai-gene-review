description: >-
  PP_5081 encodes a predicted type IV pilus biogenesis protein with PilO and
  PilP domains in Pseudomonas putida KT2440. Its single-pass membrane topology
  and PilO/PilP domain architecture support a role in the type IV pilus
  alignment or inner-membrane/periplasmic assembly complex.
