  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: hisQ encodes the second predicted multi-pass inner-membrane permease component of the PP_4483-PP_4486 His/ArgT-family basic-amino-acid ABC uptake system. Its HisMQ/MetI-like permease domains and product name support a membrane-channel role in ATP-driven transport of basic amino acids.
