suggested_questions:
- question: Does the PP_4483-PP_4486 His/ArgT-family ABC importer prefer L-histidine, L-lysine, L-arginine, L-ornithine, or a broader basic-amino-acid substrate range in P. putida KT2440?
suggested_experiments:
- description: Measure uptake and growth phenotypes for hisP, hisM, hisQ, and argT mutants with L-histidine, L-lysine, L-arginine, and L-ornithine supplied as nitrogen or carbon sources.
  experiment_type: targeted transporter mutant substrate-uptake and growth assay
