taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: 'Q88L84 is a FadA-like 3-ketoacyl-CoA thiolase, annotated as thiolase I. It is best treated
  as a fatty-acid beta-oxidation/acyl-CoA thiolase side node in the broad KEGG benzoate map, not as a
  dedicated beta-ketoadipate enzyme.'
