description: PP_2839 encodes a predicted DinG/Rad3-like superfamily helicase with ATP-binding and helicase domains. In the
  ppu03420 boundary it is treated as a candidate DNA repair helicase side node rather than a defined UvrABC core subunit,
  because current local metadata do not specify the physiological repair substrate or exact NER step.
