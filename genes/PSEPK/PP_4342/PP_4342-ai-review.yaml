description: PP_4342 encodes a predicted FlhG/FleN-family P-loop ATPase in Pseudomonas putida KT2440.
  Its strongest first-pass interpretation is as a flagellar synthesis or placement regulator, related
  to MinD/ParA-family ATPases, rather than as a standalone cell-division regulator.
