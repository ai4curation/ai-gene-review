suggested_questions:
- question: Does P. putida FtsEX directly regulate septal peptidoglycan hydrolases, and what partner proteins connect FtsEX ATP hydrolysis to divisome assembly or daughter-cell separation?
suggested_experiments:
- description: Measure septal-ring assembly, cell morphology, and division-site localization after ftsE or ftsX depletion or ATPase-motif mutation.
  experiment_type: cell-division localization and depletion assay
- description: Test physical and functional interactions between FtsEX and candidate septal peptidoglycan hydrolases or hydrolase activators in P. putida.
  experiment_type: FtsEX partner interaction and hydrolase-activation assay
