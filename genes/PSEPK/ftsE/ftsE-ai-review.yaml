  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: ftsE encodes the cytoplasmic-side ATP-binding component of the FtsEX ABC-like cell-division complex. UniProt describes FtsE as part of FtsEX, important for septal-ring assembly or stability, and forming a membrane-associated complex with FtsX. Its core molecular activity is ATP hydrolysis coupled to FtsEX cell-division function, not a specific transported-substrate reaction.
