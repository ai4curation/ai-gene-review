- term:
    id: GO:0043107
    label: type IV pilus-dependent motility
  evidence_type: IEA
  original_reference_id: GO_REF:0000118
  qualifier: involved_in
  review:
    summary: Type IV pilus-dependent motility is plausible but secondary to PilN's assembly role.
    action: KEEP_AS_NON_CORE
    reason: >-
      PilN is a type IV pilus biogenesis/alignment component, so defects are
      expected to affect type IV pilus-dependent motility. The core mechanistic
      process is type IV pilus assembly, which is captured separately.
