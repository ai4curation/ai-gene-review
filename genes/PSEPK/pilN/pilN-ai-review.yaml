taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: >-
  pilN encodes a PilN-family type IV pilus biogenesis protein in Pseudomonas
  putida KT2440. Its PilN/PF05137 domain and PANTHER assignment support a role
  in the inner-membrane/periplasmic alignment complex required for type IV
  pilus assembly and downstream type IV pilus-dependent motility.
