  title: Manual curation notes for PP_2325
  findings:
  - statement: >-
      The notes record the family distinction and OrtholugeDB reciprocal-best
      orthology between PP_2325 and P. aeruginosa PA1752/PaKPR2, and explain
      why that evidence supersedes the generic PanE inference in the gene-level
      retrieval report.
- id: file:PSEPK/PP_2325/PP_2325-deep-research-openscientist.md
  title: OpenScientist gene research for PP_2325
  findings:
  - statement: >-
      The report usefully retrieves generic KPR structure and mechanism but
      repeats the electronic PanE assignment from distant E. coli similarity
      without evaluating the closer PaKPR2 ortholog. It also confirms that no
      direct experiment has tested Q88KG5.
    supporting_text: "No direct experimental characterization of PP_2325."
- id: file:projects/P_PUTIDA/deep-research/PSEPK__coenzyme_a_biosynthesis__ppu00770-deep-research-openscientist.md
  title: OpenScientist pathway research for PSEPK pantothenate and CoA biosynthesis
  findings:
  - statement: >-
      The pathway report identifies paralog ambiguity at the ketopantoate
      reductase step; manual orthology review resolves PP_2325 away from the
      canonical PanE role.
