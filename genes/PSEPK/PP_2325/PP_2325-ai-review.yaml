      KT2440 ortholog of P. aeruginosa PaKPR2, which was structurally and
      biochemically shown to be inactive toward ketopantoate and active on
      other alpha-keto acids. This supports a broad oxidoreductase role but
      argues against retaining the specific ketopantoate reaction.
