suggested_questions:
- question: What are the native alpha-keto-acid substrate and physiological pathway of PP_2325?
suggested_experiments:
- description: >-
    Purify Q88KG5 and compare reduction of ketopantoate with the alpha-keto-acid
    panel used for PaKPR2, then test the strongest substrates in targeted
    KT2440 deletion and metabolomics experiments.
