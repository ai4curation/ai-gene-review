id: Q88KG5
gene_symbol: PP_2325
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: >-
  PP_2325 encodes a soluble ApbA-fold NAD(P)-dependent oxidoreductase related
  to ketopantoate reductases. Q88KG5 belongs to a KPR-related PANTHER subfamily
  distinct from the canonical PanE family. Its reciprocal-best Pseudomonas
  aeruginosa ortholog, PaKPR2, has evolved broad alpha-keto-acid reductase
  activity and is inactive toward ketopantoate, so the native substrate of the
  KT2440 protein remains unresolved.
