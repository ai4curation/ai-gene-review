description: davA encodes 5-aminopentanamidase (DavA; EC 3.5.1.30), a carbon-nitrogen hydrolase superfamily enzyme in Pseudomonas putida KT2440. It hydrolyzes 5-aminopentanamide to 5-aminovalerate as an entry step of the Dav L-lysine catabolic route.
