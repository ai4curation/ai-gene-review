description: PP_1491 encodes a CheW-family chemotaxis protein in the PP_1488-PP_1494 Wsp-like cluster.
  The protein likely acts as a CheW-like adaptor or scaffold within a local surface-sensing chemosensory
  array rather than as an enzyme.
