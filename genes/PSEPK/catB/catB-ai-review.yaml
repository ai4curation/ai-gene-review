suggested_questions:
- question: What sequence determinants distinguish KT2440 CatB from true chloromuconate cycloisomerases despite their shared InterPro assignment?
  experts:
  - aromatic-catabolism enzymologists
  - structure-function specialists in the mandelate racemase/muconate lactonizing family
- question: Under which aromatic substrates or stress conditions does catB become a major flux-control point relative to catA, catC, and parallel catechol-entry reactions in KT2440?
  experts:
  - Pseudomonas metabolism researchers
  - systems biologists studying aromatic funneling
suggested_experiments:
- experiment_type: substrate-specificity biochemistry
  description: Purify PP_3715 from KT2440 and compare turnover of cis,cis-muconate versus chlorinated muconate analogs to directly test and retire the chloromuconate activity inference.
- experiment_type: pathway-flux analysis
  description: Quantify growth, muconate accumulation, and catB expression in wild-type and catR-perturbed KT2440 on benzoate, catechol, phenol, and chlorobenzoate-related substrates to define the operational pathway scope of CatB.
