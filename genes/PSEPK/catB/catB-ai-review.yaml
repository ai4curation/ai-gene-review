- id: PMID:9726873
  title: 'Substrate specificity of and product formation by muconate cycloisomerases: an analysis of wild-type enzymes and engineered variants.'
  findings:
  - statement: wild-type P. putida muconate cycloisomerase accepts muconate and selected nonchlorinated analogs but not chlorinated muconates
    supporting_text: >-
      We show that they transform, in addition to cis,cis-muconate,
      3-fluoro-, 2-methyl-, and 3-methyl-cis, cis-muconate with high
      specificity constants but not 2-fluoro-, 2-chloro-, 3-chloro-, or
      2,4-dichloro-cis,cis-muconate.
  - statement: chloromuconate cycloisomerase specificity requires additional catalytic features not present in the wild-type muconate cycloisomerase
    supporting_text: >-
      These results show that the different catalytic characteristics of
      muconate and chloromuconate cycloisomerases are due to a number of
      features that can be changed independently of each other.
- id: PMID:21906639
  title: Generation of a catR deficient mutant of P. putida KT2440 that produces cis, cis-muconate from benzoate at high rate and yield.
  findings:
  - statement: cat operon induction in KT2440 depends on CatR and is important for benzoate utilization
    supporting_text: >-
      Transcriptome analysis showed that the cat operon was not induced in
      P. putida KT2440-JD1 in the presence of 5mM benzoate, due to a point
      mutation in the highly conserved DNA binding domain of the transcriptional
      regulator (catR) of the cat operon.
  - statement: blocking cat operon induction causes cis,cis-muconate accumulation from benzoate
    supporting_text: >-
      The mutant was no longer able to grow using benzoate as a sole carbon
      source, but co-metabolized benzoate to cis, cis-muconate during growth on
      glucose, which accumulated in the growth medium.
