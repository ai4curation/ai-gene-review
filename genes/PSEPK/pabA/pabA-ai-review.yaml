suggested_questions:
- question: Does PP_0420 have any measurable aminodeoxychorismate synthase/PabA role in folate biosynthesis in KT2440, or is its physiological role restricted to TrpG-like anthranilate synthase amidotransferase activity?
suggested_experiments:
- description: Compare growth and metabolite phenotypes of PP_0420 depletion or deletion under tryptophan, anthranilate, pABA, and folate supplementation to separate trpG and pabA physiological roles.
  experiment_type: targeted genetics and rescue phenotyping
