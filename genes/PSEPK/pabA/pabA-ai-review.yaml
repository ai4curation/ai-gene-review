taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: PP_0420 is a soluble class-I glutamine amidotransferase domain protein in Pseudomonas putida KT2440. Although the current UniProt gene name is pabA and the submitted product name emphasizes aminodeoxychorismate/para-aminobenzoate synthase, domain and family evidence support assignment as a TrpG-like anthranilate synthase amidotransferase. KT2440 aromatic-pathway literature describes tryptophan-biosynthesis genes in unlinked regions including a trpGDE operon. In the inferred TrpG-like role, PP_0420 would supply ammonia from L-glutamine to the TrpE synthase component for conversion of chorismate to anthranilate, the first committed step of L-tryptophan biosynthesis. A physiological folate/pABA role for PP_0420 in KT2440 remains possible but is not established by the available evidence.
existing_annotations:
- term:
    id: GO:0000162
    label: L-tryptophan biosynthetic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000118
  qualifier: involved_in
  review:
    summary: Domain and family evidence support PP_0420 as the TrpG-like amidotransferase component of anthranilate synthase; KT2440 aromatic-biosynthesis literature describes a trpGDE operon in the tryptophan pathway.
    action: ACCEPT
    reason: Correct process annotation for the best-supported physiological role of this protein. The local gene symbol "pabA" is misleading in this pathway context; PP_0420 should be considered a trpG-like component for tryptophan module satisfiability.
- term:
    id: GO:0004049
    label: anthranilate synthase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: The protein is the glutamine amidotransferase component of the two-subunit anthranilate synthase system, contributing ammonia for the TrpE-catalyzed chorismate-to-anthranilate reaction.
    action: ACCEPT
    reason: The complete anthranilate synthase activity is a complex-level function requiring TrpE plus this TrpG-like amidotransferase subunit. The GOA qualifier is not ideal for a subunit, but the functional assignment is correct for pathway curation.
- term:
    id: GO:0005829
    label: cytosol
  evidence_type: IEA
  original_reference_id: GO_REF:0000118
  qualifier: located_in
  review:
    summary: Anthranilate synthase/glutamine amidotransferase components are soluble cytosolic enzymes of amino acid biosynthesis.
    action: ACCEPT
    reason: The sequence is a soluble GATase-domain protein with no membrane or secretion features; cytosolic localization is appropriate.
- term:
    id: GO:0006541
    label: L-glutamine metabolic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000104
  qualifier: involved_in
  review:
    summary: TrpG/PabA-family amidotransferases use glutamine as an amide nitrogen donor, so this broad process context is chemically correct.
    action: KEEP_AS_NON_CORE
    reason: The term is broad and describes co-substrate use rather than the specific pathway role. Retain as non-core context; L-tryptophan biosynthesis is the informative biological process here.
- term:
    id: GO:0046654
    label: tetrahydrofolate biosynthetic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000118
  qualifier: involved_in
  review:
    summary: Folate/pABA pathway propagation follows the current pabA-like annotation, but domain and family evidence support a TrpG-like anthranilate synthase amidotransferase role.
    action: UNDECIDED
    reason: This protein may be homologous to PabA-family amidotransferases, but the supplied evidence does not establish a physiological tetrahydrofolate-biosynthetic role in KT2440. Leave undecided pending direct genetic or biochemical evidence for pABA/folate synthesis.
- term:
    id: GO:0046820
    label: aminodeoxychorismate synthase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: This EC/pABA-synthase activity follows the submitted pabA product name, but the KT2440 tryptophan-pathway literature assigns PP_0420 as trpG.
    action: UNDECIDED
    reason: The annotation conflicts with the best pathway-context evidence for PP_0420 as the anthranilate synthase amidotransferase component. Because TrpG/PabA homologs can be difficult to distinguish by sequence alone, do not remove it in a first pass; require direct evidence for aminodeoxychorismate synthase activity.
