taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: pvdI encodes a cytosolic multimodular non-ribosomal peptide synthetase subunit of ferribactin/pyoverdine assembly
  in Pseudomonas putida KT2440. Its adenylation, condensation, and phosphopantetheine carrier domains support pyoverdine siderophore
  peptide assembly, while enterobactin annotations are over-transfers from other NRPS systems.
