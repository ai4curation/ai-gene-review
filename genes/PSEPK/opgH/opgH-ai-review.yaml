proposed_new_terms: []
suggested_questions:
- question: Does KT2440 OpgH use ACP as a cofactor and produce the same beta-1,2/beta-1,6 OPG product structure inferred from characterized orthologs?
- question: How do OpgH and OpgG interact during KT2440 osmoregulated periplasmic glucan production?
- question: Does KT2440 OpgH retain the E. coli-like FtsZ-sequestration moonlighting role, or should that function be explicitly excluded for this organism?
suggested_experiments:
- description: Assay opgH deletion or depletion strains for osmoregulated periplasmic glucan production under low-osmolarity growth conditions.
  experiment_type: targeted genetics and glucan profiling
- description: Reconstitute OpgH membrane fractions with candidate UDP-glucose donor and OpgG to measure glucan polymer formation.
  experiment_type: in vitro glycosyltransferase assay
- description: Test OpgH-FtsZ colocalization and cell-size effects across nutrient conditions in KT2440.
  experiment_type: localization and cell-division phenotype assay
