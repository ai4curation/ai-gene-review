id: Q88D04
gene_symbol: opgH
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: opgH encodes a multi-pass inner-membrane GT2/OpgH-family glucosyltransferase that uses UDP-glucose to build the osmoregulated periplasmic glucan backbone with the periplasmic OpgG partner.
existing_annotations:
- term:
    id: GO:0005886
    label: plasma membrane
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: located_in
  review:
    summary: Plasma membrane is the appropriate GO cellular-component term for bacterial inner-membrane OpgH.
    action: ACCEPT
    reason: UniProt places OpgH in the cell inner membrane and records multiple transmembrane helices; GOA maps this bacterial inner-membrane location to plasma membrane.
    supported_by:
    - reference_id: file:PSEPK/opgH/opgH-uniprot.txt
      supporting_text: "SUBCELLULAR LOCATION: Cell inner membrane"
    - reference_id: file:PSEPK/opgH/opgH-uniprot.txt
      supporting_text: "FT   TRANSMEM        141..158"
    - reference_id: file:PSEPK/opgH/opgH-goa.tsv
      supporting_text: "GO:0005886\tplasma membrane"
- term:
    id: GO:0009250
    label: glucan biosynthetic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000104
  qualifier: involved_in
  review:
    summary: Glucan biosynthesis is correct but should be made specific to osmoregulated periplasmic glucan biosynthesis.
    action: MODIFY
    reason: UniProt and UniPathway specifically place OpgH in osmoregulated periplasmic glucan biosynthesis, and GO provides a specific process term for this pathway.
    proposed_replacement_terms:
    - id: GO:1900727
      label: osmoregulated periplasmic glucan biosynthetic process
    supported_by:
    - reference_id: file:PSEPK/opgH/opgH-uniprot.txt
      supporting_text: "FUNCTION: Involved in the biosynthesis of osmoregulated periplasmic"
    - reference_id: file:PSEPK/opgH/opgH-uniprot.txt
      supporting_text: "PATHWAY: Glycan metabolism; osmoregulated periplasmic glucan (OPG)"
    - reference_id: file:PSEPK/opgH/opgH-goa.tsv
      supporting_text: "GO:0009250\tglucan biosynthetic process"
- term:
    id: GO:0016758
    label: hexosyltransferase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: Hexosyltransferase activity is correct but less informative than glucosyltransferase activity for OpgH.
    action: MODIFY
    reason: OpgH is a glucans biosynthesis glucosyltransferase in the glycosyltransferase 2 family, so the child term glucosyltransferase activity better captures the transferred sugar.
    proposed_replacement_terms:
    - id: GO:0046527
      label: glucosyltransferase activity
    supported_by:
    - reference_id: file:PSEPK/opgH/opgH-uniprot.txt
      supporting_text: "RecName: Full=Glucans biosynthesis glucosyltransferase H"
    - reference_id: file:PSEPK/opgH/opgH-uniprot.txt
      supporting_text: "Belongs to the glycosyltransferase 2 family. OpgH"
    - reference_id: file:PSEPK/opgH/opgH-goa.tsv
      supporting_text: "GO:0016758\thexosyltransferase activity"
    - reference_id: file:PSEPK/opgH/opgH-deep-research-openscientist.md
      supporting_text: "Using cytoplasmic **UDP-glucose** as the sugar donor, OpgH assembles a β-linked polyglucose chain at the cytoplasmic face of the inner membrane"
