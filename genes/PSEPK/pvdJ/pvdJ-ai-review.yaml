  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: pvdJ encodes a large non-ribosomal peptide synthetase subunit of ferribactin/pyoverdine assembly in Pseudomonas
  putida KT2440. The protein has repeated adenylation, condensation, and phosphopantetheine carrier domains and is best interpreted
  as part of the pyoverdine siderophore assembly line rather than a translation factor.
