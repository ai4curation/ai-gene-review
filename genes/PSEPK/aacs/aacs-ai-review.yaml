description: >-
  aacs (PP_3071) encodes acetoacetyl-CoA synthetase/acetoacetate-CoA ligase, an ATP-dependent AMP-binding enzyme assigned EC 6.2.1.16. It activates acetoacetate to acetoacetyl-CoA and is treated as an acetoacetate/acyl-CoA endpoint enzyme in the ppu00280 boundary rather than as a committed upstream BCAA catabolic enzyme.
