- description: Porin-like cell outer membrane channel that provides substrate access (probable nicotinate or a related
    pathway metabolite) for the aerobic nicotinate degradation pathway of the KT2440 nic cluster. The specific
    transported substrate is inferred from cluster context and not experimentally resolved.
