id: Q88FY7
gene_symbol: nicP
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: nicP (PP_3939) encodes a porin-like outer-membrane protein within the experimentally validated aerobic
  nicotinate (nicotinic acid, NA) degradation gene cluster of Pseudomonas putida KT2440 (cluster organization
  nicTPFEDCXRAB). Within this cluster nicP is annotated as a "potential porin" and nicT as a "permease", together
  forming the putative transport/access module that brings NA (or a related pathway metabolite) into the cell for the
  maleamate pathway. NicP belongs to the outer membrane porin (Opr; TC 1.B.25) family. Direct experimental
  characterization of NicP itself - substrate, transport kinetics, knockout phenotype, localization, or structure - has
  not been reported; its porin activity and outer-membrane localization are inferences from family/cluster context, and
  its specific transported substrate remains unproven.
