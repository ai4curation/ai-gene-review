suggested_questions:
- question: Does NicP transport nicotinate, 6-hydroxynicotinate, or another nicotinate-pathway intermediate?
suggested_experiments:
- description: Measure nicotinate and 6-hydroxynicotinate uptake in nicP mutant and complemented strains, and test
    purified NicP channel selectivity in reconstituted membranes.
  experiment_type: transport substrate specificity assay
- description: Determine NicP subcellular localization by outer-membrane fractionation and proteomics to experimentally
    confirm the inferred outer-membrane localization.
  experiment_type: subcellular localization assay
