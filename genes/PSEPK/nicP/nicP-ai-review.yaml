  review:
    summary: NicP is a member of the experimentally validated KT2440 aerobic nicotinate degradation gene cluster and
      contributes to nicotinate catabolism by providing porin-mediated substrate access; a nicotinate catabolic
      process annotation captures this pathway role more specifically than generic transmembrane transport.
    action: NEW
    reason: Deep research establishes that nicP is part of the nicTPFEDCXRAB locus required for aerobic NA catabolism
      in KT2440 and is annotated as a potential porin within that locus, functioning as the cluster's transport/access
      module for nicotinate. GO:1901848 (nicotinate catabolic process) is the precise biological-process term for this
      pathway. IC is appropriate because the assignment is inferred from cluster membership and porin annotation
      rather than a direct nicP-specific assay.
