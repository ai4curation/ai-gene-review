description: PP_4363 encodes a SpoIIE/PPM-type phosphatase-like response regulatory protein in Pseudomonas putida
  KT2440. Receiver, HATPase-like, bacterial sigma-regulatory, and PPM-type phosphatase domain annotations place
  it in a phosphorelay or anti-sigma regulatory neighborhood, but its substrate and upstream signal are unresolved.
