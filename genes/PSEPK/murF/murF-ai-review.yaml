taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: >-
  MurF is the cytoplasmic UDP-N-acetylmuramoyl-tripeptide-D-Ala-D-Ala ligase
  of Pseudomonas putida KT2440. It uses ATP to add the D-Ala-D-Ala dipeptide
  to the meso-diaminopimelate-containing tripeptide, completing the soluble
  UDP-MurNAc pentapeptide precursor.
