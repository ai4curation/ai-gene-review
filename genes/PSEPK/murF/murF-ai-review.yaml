description: murF (PP_1333) encodes UDP-N-acetylmuramoyl-tripeptide--D-alanyl-D-alanine ligase, the MurF enzyme that completes cytoplasmic peptidoglycan pentapeptide precursor assembly. Its ppu00300 membership reflects use of a meso-diaminopimelate-containing tripeptide substrate, not L-lysine biosynthesis.
