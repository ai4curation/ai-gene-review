id: Q88CE6
gene_symbol: ubiK
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: >-
  ubiK encodes a small UbiK-family accessory factor for efficient bacterial
  ubiquinone biosynthesis. It is inferred to assist Ubi enzyme assembly,
  targeting, or stability in the ubiquinone biosynthetic complex, functioning
  with the lipid-binding UbiJ accessory factor rather than catalyzing a discrete
  chemical transformation.
