id: Q88CE6
gene_symbol: ubiK
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: >-
  ubiK encodes a small cytoplasmic accessory factor required for efficient
  ubiquinone biosynthesis. It associates with the bacterial Ubi machinery and
  is proposed to facilitate assembly, targeting, or both, without a defined
  catalytic molecular function.
