    label: 3-hydroxybutyryl-CoA dehydrogenase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000003
  qualifier: enables
  review:
    summary: 3-hydroxybutyryl-CoA dehydrogenase activity matches the product name and EC 1.1.1.157
      annotation.
    action: ACCEPT
    reason: This is the core molecular function.
- term:
