id: Q88GG9
gene_symbol: hbd
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: >-
  hbd encodes 3-hydroxybutyryl-CoA dehydrogenase, an NAD-dependent short-chain
  hydroxyacyl-CoA dehydrogenase. It is a butanoate/lipid CoA-metabolism
  side-node enzyme in broad KEGG aromatic and short-chain fatty-acid maps, and
  the ppu00071 Falcon pathway report promotes PP_3755 as a short-chain
  3-hydroxyacyl-CoA oxidation candidate rather than a strict benzoate
  degradation enzyme.
existing_annotations:
- term:
    id: GO:0003824
    label: catalytic activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000117
  qualifier: enables
  review:
    summary: Catalytic activity is too broad for a dehydrogenase.
    action: MARK_AS_OVER_ANNOTATED
    reason: Use the substrate-resolved dehydrogenase terms.
- term:
    id: GO:0006631
    label: fatty acid metabolic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: involved_in
  review:
    summary: Fatty acid metabolic process is plausible broad context but not a precise pathway
      assignment.
    action: MODIFY
    reason: The enzyme is better represented by its molecular function plus the more specific short-chain beta-oxidation context promoted by the ppu00071 Falcon pathway report.
    proposed_replacement_terms:
    - id: GO:0006635
      label: fatty acid beta-oxidation
    supported_by:
    - reference_id: file:projects/P_PUTIDA/deep-research/PSEPK__bacterial_fatty_acid_beta_oxidation__ppu00071-deep-research-falcon.md
      supporting_text: 'PP_3755: 3-Hydroxybutyryl-CoA dehydrogenase with preference for butyrate metabolism'
