    action: NEW
    reason: The fetched GOA table has multiple substrate-specific nucleoside phosphorylase molecular-function rows but no biological-process
      annotation. GO:0009164 captures the catabolic process implied by broad nucleoside phosphorolysis. Falcon confirms a
      catabolic role downstream of nucleoside uptake (producing bases plus ribose-1-phosphate) and notes that ppnP deletion
