taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: ppnP (PP_4248) encodes a broad-specificity pyrimidine/purine nucleoside phosphorylase (EC 2.4.2.1, EC 2.4.2.2)
  of the cupin-fold PpnP family. It catalyzes reversible phosphorolysis of diverse purine and pyrimidine nucleosides
  (uridine, adenosine, guanosine, cytidine, thymidine, inosine, xanthosine), yielding the free nucleobase plus
  alpha-D-ribose 1-phosphate, and functions in cytoplasmic nucleoside salvage/catabolism. The KT2440 enzyme itself
  has not been biochemically characterized; the functional assignment rests on HAMAP-Rule MF_01537 and falcon
  family/ortholog evidence rather than direct experimental proof.
