description: >-
  PP_4230 encodes a predicted MocA-type molybdenum-cofactor
  cytidylyltransferase. Orthology and PANTHER subfamily assignments support
  transfer of CMP from CTP to Mo-molybdopterin to form the MCD cofactor variant;
  this target-specific activity has not been assayed directly in KT2440.
