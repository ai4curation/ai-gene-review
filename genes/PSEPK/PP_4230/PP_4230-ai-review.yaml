- id: file:PSEPK/PP_4230/PP_4230-deep-research-openscientist.md
  title: OpenScientist gene research for PP_4230
  reference_review:
    relevance: HIGH
    correctness: MISCITED
    review_notes: >-
      The report is miscited for target-level curation. It treats a heterologous
      Cellulosimicrobium CsXodCBA production experiment in KT2440 as experimental
      evidence for the native PP_4230/PP_4231 locus, misidentifies PP_2482 as the
      MobA-like member of the PP_2483 cluster, and presents unsaved motif and
      AlphaFold analyses as target-specific support. None of those client,
      residue, structure, or locus claims are propagated. The predicted MocA
      assignment instead rests on the saved KEGG K07141, PANTHER, target UniProt,
      and local reproducible-analysis evidence; only the report's explicit
      no-target-assay statement is retained as a limitation.
  findings:
  - statement: The report explicitly acknowledges that PP_4230 has no target-specific experimental support.
    supporting_text: >-
      1. **No PP_4230-specific experimental study exists.** The entire
      annotation is inferential. There is no published enzyme assay, knockout,
      structure, or complementation experiment for PP_4230 itself.
  - statement: The report incorrectly treats a heterologous XodC experiment as native PP_4230-locus evidence.
    supporting_text: >-
      Crucially, the relevance of an XdhC-type factor to *P. putida* KT2440
      xanthine oxidase has now been shown experimentally in this very organism.
  - statement: The report's comparison table incorrectly puts PP_2482, rather than PP_2483, in the second predicted MocA cluster.
    supporting_text: >-
      | **PP_2483** | isoquinoline-1-oxidoreductase-like | PP_2478
      (Mo/β-subunit), PP_2479 (cyt *c*), PP_2480 (XdhC), PP_2482 (MobA-like) |
  - statement: The report presents an AlphaFold result that was not saved as a reproducible local artifact.
    supporting_text: >-
      The AlphaFold model of Q88F68 is high-confidence (**mean pLDDT 91.9**) and
      shows a folded N-terminal Rossmann-like nucleotidyltransferase domain (res
      ~5–162) plus a short C-terminal acceptor-binding extension (res ~163–188)
      — the domain that, per Neumann et al., confers dedication to a specific
      acceptor molybdoenzyme.
