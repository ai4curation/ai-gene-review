taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: >-
  PP_3602 encodes an aldehyde dehydrogenase-family enzyme in Pseudomonas putida
  KT2440 that is computationally annotated as 2,5-dioxovalerate dehydrogenase.
  UniProt-derived reaction mappings predict oxidation of 2,5-dioxopentanoate to
  2-oxoglutarate with NAD+ or NADP+. Pathway-level synthesis supports PP_3602
  as the strongest local aldarate-pathway KGSADH candidate, while related
  paralogs remain pathway-uncertain.
