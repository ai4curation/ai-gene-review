id: Q88H54
gene_symbol: ilvE
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: >-
  IlvE is the pyridoxal 5'-phosphate-dependent branched-chain amino-acid
  aminotransferase. It reversibly transfers amino groups between glutamate and
  the keto-acid precursors of valine, isoleucine, and leucine, supplying the
  terminal transamination in all three biosynthetic branches.
