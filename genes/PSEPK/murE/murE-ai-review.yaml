description: >-
  MurE is the cytoplasmic, ATP- and magnesium-dependent
  UDP-N-acetylmuramoyl-L-alanyl-D-glutamate--meso-diaminopimelate ligase of
  Pseudomonas putida KT2440. It adds meso-diaminopimelate as the third amino
  acid of the peptidoglycan stem peptide.
