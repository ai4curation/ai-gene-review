  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: murE (PP_1332) encodes UDP-N-acetylmuramoyl-L-alanyl-D-glutamate--2,6-diaminopimelate ligase, the MurE enzyme that incorporates meso-diaminopimelate into the bacterial peptidoglycan precursor. In the ppu00300 lysine-biosynthesis map it is a DAP-consuming cell-wall boundary node rather than an enzyme that forms L-lysine.
