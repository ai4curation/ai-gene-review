description: 'dacA encodes a serine-type D-Ala-D-Ala carboxypeptidase of Pseudomonas putida KT2440. The protein removes terminal D-alanyl residues from peptidoglycan sugar-peptide precursors and functions in peptidoglycan biosynthesis/remodeling.'
