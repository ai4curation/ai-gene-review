description: ruvC (PP_1215) encodes the bacterial Holliday junction resolvase, a magnesium-dependent crossover-junction endodeoxyribonuclease.
  RuvC acts with RuvA and RuvB in homologous recombination and recombinational repair by cleaving migrated Holliday junctions
  to resolve DNA crossover intermediates.
