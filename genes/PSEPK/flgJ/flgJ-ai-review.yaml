description: flgJ encodes a periplasmic flagellum-specific peptidoglycan hydrolase/muramidase. The protein
  combines FlgJ rod-associated context with glycosyl-hydrolase family 73 features, supporting local peptidoglycan
  remodeling during basal-body/rod assembly.
