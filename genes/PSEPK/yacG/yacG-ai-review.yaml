  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: yacG (PP_0630) encodes DNA gyrase inhibitor YacG, a small zinc-binding protein in Pseudomonas putida KT2440.
  UniProt/HAMAP metadata supports a YacG-family protein that binds the GyrB C-terminal domain and inhibits DNA gyrase by preventing
  productive DNA interaction. In this first pass it is curated as a DNA-topology regulatory side node, not as a general transcription
  regulator.
