description: kinB encodes a membrane-associated sensor histidine kinase in Pseudomonas putida KT2440.
  Its HAMP, PAS/sensor, HisKA, and HATPase domains support a role as a two-component phosphorelay input
  protein in the alginate/biofilm regulatory neighborhood.
