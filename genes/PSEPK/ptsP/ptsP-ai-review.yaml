taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: >-
  PtsP (PP_5145) is a cytoplasmic phosphoenolpyruvate--protein
  phosphotransferase of the PEP-utilizing enzyme family in Pseudomonas putida
  KT2440. It has enzyme I-like PTS domains plus an N-terminal GAF domain and is
  annotated with EC 2.7.3.9, transferring phosphoryl groups from
  phosphoenolpyruvate to protein histidine acceptors. In this KEGG bucket it is
  best interpreted as an enzyme I/Ntr-like upstream phosphotransferase for PTS
  regulatory or phosphorelay context, distinct from the membrane fructose PTS
  transporter component FruA.
