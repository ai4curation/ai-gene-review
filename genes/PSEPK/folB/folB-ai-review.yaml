description: folB (PP_0392) encodes 7,8-dihydroneopterin aldolase, the FolB enzyme of de novo folate biosynthesis. It acts
  on the pterin intermediate downstream of GTP cyclohydrolase I to supply hydroxymethyldihydropterin for tetrahydrofolate
  production in the bacterial cytoplasm.
