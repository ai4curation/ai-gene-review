description: PP_1846 encodes a bacterial reverse transcriptase-family RNA-directed DNA polymerase with group II intron/maturase-family
  domain support. Its supported first-pass role is RNA-templated DNA synthesis in retroelement or group-II-intron mobile-element
  biology, not chromosomal DNA replication or a resolved antiviral-defense module.
