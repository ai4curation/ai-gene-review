  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: nudC encodes a Nudix-family NAD-capped RNA hydrolase that removes NAD caps from RNA and can hydrolyze free NAD+ and NADH pyrophosphate bonds. It is an NAD-catabolism/RNA-decapping side node rather than a NAD biosynthetic enzyme.
