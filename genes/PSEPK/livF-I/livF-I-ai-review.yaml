taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: livF-I (PP_1137) encodes a predicted ATP-binding energy-coupling subunit of the PP_1137-PP_1141 LivFGMHK high-affinity branched-chain amino-acid ABC uptake system. Its ABC ATPase domain supports ATP hydrolysis-driven transport together with the LivM/LivH membrane permeases, the LivG ATP-binding partner, and the LivK periplasmic leucine/branched-chain amino-acid binding component.
