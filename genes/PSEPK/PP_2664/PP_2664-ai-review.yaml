  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: PP_2664 encodes a PAS/PAC-domain sensor histidine kinase in Pseudomonas putida KT2440. Its HisKA/HATPase
  catalytic region and receiver domain support a membrane phosphorelay sensor role, but the sensed cue and output
  branch are not yet assigned.
