  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: aceF (PP_0338) encodes the E2 acetyltransferase component of the pyruvate dehydrogenase complex. The protein carries lipoyl domains and a catalytic acyltransferase domain that transfers the acetyl group from S-acetyldihydrolipoyllysine to coenzyme A, coupling the E1 pyruvate-decarboxylating reaction to acetyl-CoA formation. It is a cytoplasmic component of the multienzyme pyruvate dehydrogenase complex, connecting pyruvate produced by lower central carbon metabolism to acetyl-CoA and the TCA cycle.
