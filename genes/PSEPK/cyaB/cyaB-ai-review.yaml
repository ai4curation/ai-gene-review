id: Q88DA0
gene_symbol: cyaB
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: cyaB encodes a predicted cell-membrane type-I-secretion ABC exporter/processing component with HlyB/CyaB-like
  ATPase_T1SS, ABC transmembrane, ABC ATP-binding, and C39 peptidase-family domains. The first-pass core call is ATP-driven
  type-I protein secretion, with cyclolysin-like substrate processing retained as domain-supported but not promoted as a broader
  proteolysis pathway.
