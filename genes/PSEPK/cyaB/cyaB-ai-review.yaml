suggested_questions:
- question: What is the physiological substrate exported by cyaB in P. putida KT2440?
- question: Which membrane-fusion and outer-membrane-channel partners form the complete cyaB-containing type-I secretion system?
suggested_experiments:
- description: Delete cyaB and test secretion of candidate RTX/toxin/protease substrates under inducing growth conditions.
  experiment_type: targeted secretion phenotype assay
- description: Use co-immunoprecipitation or tagged-complex purification to identify the cognate adaptor and outer-membrane
    channel for cyaB.
  experiment_type: transporter complex mapping
