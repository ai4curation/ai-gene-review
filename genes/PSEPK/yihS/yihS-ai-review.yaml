  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: yihS encodes an N-acylglucosamine 2-epimerase-family aldose-ketose isomerase in Pseudomonas putida KT2440. UniProt/GOA currently annotate the protein as EC 5.3.1.7 mannose isomerase, while KEGG assigns PP_1014 to K18479 sulfoquinovose isomerase (EC 5.3.1.31) in ppu00566. The substrate-specific function is therefore unresolved in this first-pass review.
