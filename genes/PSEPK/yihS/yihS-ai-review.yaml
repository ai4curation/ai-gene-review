    summary: Carbohydrate metabolic process is plausible but too broad for the unresolved YihS substrate specificity.
    action: KEEP_AS_NON_CORE
    reason: YihS is an aldose-ketose isomerase-family enzyme, but the useful curation question is whether the substrate is mannose or sulfoquinovose rather than the broad carbohydrate-process parent.
