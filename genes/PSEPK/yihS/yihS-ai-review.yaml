suggested_questions:
- question: Does KT2440 YihS act physiologically as sulfoquinovose isomerase, mannose isomerase, or another aldose-ketose isomerase-family enzyme?
suggested_experiments:
- hypothesis: YihS substrate specificity is unresolved between KEGG sulfoquinovose isomerase and UniProt/GOA mannose isomerase assignments.
  description: Purify YihS and compare activity on 6-sulfoquinovose and mannose/fructose substrates, then test yihS deletion or complementation during growth on sulfoquinovose or sulfolipid-derived substrates.
  experiment_type: biochemical substrate-specificity assay and growth genetics
