description: PP_3817 encodes the ATP-binding energy-coupling subunit of the PP_3814-PP_3817 polyamine ABC import locus in Pseudomonas putida KT2440. Its product name, PotA-family assignment, and local PP_3814/PP_3815/PP_3816 importer context support ATP-driven polyamine uptake.
