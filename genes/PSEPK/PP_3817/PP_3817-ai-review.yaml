suggested_questions:
- question: What substrate range is transported by the PP_3814-PP_3817 importer containing PP_3817, and how does it divide uptake of putrescine, spermidine, norspermidine, and related polyamines from other P. putida polyamine systems?
suggested_experiments:
- description: Measure uptake and growth phenotypes for a PP_3817 deletion or depletion strain with putrescine, spermidine, norspermidine, and related polyamines, and compare with complementation by the intact PP_3814-PP_3817 locus.
  experiment_type: targeted polyamine ABC-import mutant uptake/growth assay
