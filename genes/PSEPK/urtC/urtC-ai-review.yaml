description: urtC encodes the second multi-pass inner-membrane permease component
  of the PP_4841-PP_4845 UrtABCDE urea ABC uptake system. The local product name and
  UrtC-specific InterPro domain support a urea transporter role; branched-chain amino-acid
  annotations are likely spillover from LivM-like family features.
