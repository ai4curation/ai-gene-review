    summary: Correct holoenzyme activity that SdhB contributes to as the iron-sulfur electron-transfer subunit.
    action: ACCEPT
    reason: The complete SdhABCD complex catalyzes quinone-linked succinate oxidation, and UniProt lists EC 1.3.5.1 with the reaction a quinone + succinate = fumarate + a quinol. SdhB contributes electron transfer within this complex rather than carrying the flavin active site independently.
