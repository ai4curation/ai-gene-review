description: Iron-sulfur subunit of the membrane-bound succinate dehydrogenase/respiratory Complex II enzyme in Pseudomonas putida KT2440. SdhB transfers electrons from the SdhA flavoprotein catalytic subunit through iron-sulfur clusters toward the membrane anchor/quinone site, contributing to quinone-linked succinate oxidation. This places SdhB at the interface between the tricarboxylic acid cycle and the aerobic respiratory electron transport chain.
