  review:
    summary: Correct process annotation for the succinate-to-fumarate step of the TCA cycle.
    action: ACCEPT
    reason: SdhB is part of the succinate dehydrogenase complex that oxidizes succinate to fumarate in the TCA cycle. UniProt places Q88FA8 in the bacterial route from succinate to fumarate, and the PSEPK pathway report identifies the complete sdhCDAB operon as covering step 6.
    supported_by:
    - reference_id: file:PSEPK/sdhB/sdhB-uniprot.txt
      supporting_text: 'fumarate from succinate (bacterial route): step 1/1.'
