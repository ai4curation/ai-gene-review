  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: rffG encodes a dTDP-glucose 4,6-dehydratase in Pseudomonas putida KT2440. The enzyme converts dTDP-glucose to the 4-keto-6-deoxy dTDP-glucose intermediate used by downstream deoxy-sugar nucleotide enzymes, placing it in nucleotide-sugar metabolism upstream of dTDP-rhamnose production.
