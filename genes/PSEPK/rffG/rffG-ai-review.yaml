id: Q88LZ1
gene_symbol: rffG
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: >-
  rffG (PP_1785) encodes dTDP-glucose 4,6-dehydratase in the Pseudomonas putida
  KT2440 dTDP-L-rhamnose biosynthetic route. It converts dTDP-alpha-D-glucose
  to dTDP-4-dehydro-6-deoxy-alpha-D-glucose, producing the deoxy-keto
  nucleotide-sugar intermediate used by the RmlC/RfbC epimerase step.
