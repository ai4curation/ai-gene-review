  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: rnd encodes RNase D, a cytoplasmic 3'-5' exoribonuclease involved in 3' processing of precursor tRNAs. It initiates
  hydrolysis at RNA 3' termini and releases 5' mononucleotides, with the specific RNase D and tRNA 3'-end-processing terms
  capturing the core role.
