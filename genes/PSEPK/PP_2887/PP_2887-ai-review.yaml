description: PP_2887 encodes a catalase-family, catalase-related peroxidase predicted to have organic peroxide-dependent peroxidase activity. It should be treated as an oxidative-stress/oxidant-detoxification boundary enzyme in ppu00380 rather than as a core tryptophan-metabolism enzyme or as a confidently monofunctional catalase.
