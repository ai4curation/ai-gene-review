  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: >-
  PP_0370 encodes an FAD-dependent acyl-CoA dehydrogenase-family protein in
  Pseudomonas putida KT2440. UniProt currently names it as a
  3-methylmercaptopropionyl-CoA dehydrogenase, while the ppu00071 Falcon
  pathway synthesis flags PP_0370 as the best-supported medium-chain fatty-acid
  catabolism ACAD candidate for C6-C8 substrates. The first-pass review treats
  broad acyl-CoA dehydrogenase chemistry as supported and records the
  fatty-acid beta-oxidation role as a Falcon-promoted pathway proposal.
existing_annotations:
