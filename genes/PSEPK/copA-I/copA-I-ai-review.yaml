description: copA-I encodes a periplasmic copper-resistance protein A in Pseudomonas putida KT2440. The multicopper oxidase/CopA
  domain architecture and GOA support copper ion binding, broad oxidoreductase activity, and periplasmic localization; this
  first pass does not assign a narrower physiological copper-oxidation reaction.
