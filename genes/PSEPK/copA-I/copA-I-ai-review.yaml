suggested_questions:
- question: What exact substrate, redox partner, and stress phenotype define the physiological function of copA-I in Pseudomonas
    putida KT2440 metal resistance?
suggested_experiments:
- description: Test purified copA-I where feasible and compare clean deletion/complemented strains under arsenate, arsenite,
    organoarsenical, and copper stress as appropriate for the gene family.
  experiment_type: targeted enzyme assay and metal-stress phenotyping
