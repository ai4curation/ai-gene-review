  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: 'CheR3 is a putative CheR-family SAM-dependent methyltransferase in Pseudomonas
  putida KT2440. It is related to chemotaxis receptor methyltransferases, but the available
  first-pass evidence distinguishes it from CheR2: the cached CheR paralog study reports CheR2
  as the McpS/McpT methyltransferase and chemotaxis-essential paralog, while UniProt reports
  that cheR3 disruption does not affect chemotaxis or biofilm formation. CheR3 should therefore
  remain a methyltransferase candidate with unresolved biological target rather than a core
  chemotaxis methyltransferase.'
