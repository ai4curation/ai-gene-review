id: Q88IQ5
gene_symbol: PP_2944
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: PP_2944 encodes a predicted sensor histidine kinase in Pseudomonas putida KT2440. Histidine
  kinase catalytic domains and, for many family members, membrane or sensory domains support a two-component
  phosphorelay role that detects an input cue and passes phosphate to a response regulator. The specific
  cue and cognate response regulator are not established from the current annotations.
