suggested_questions:
- question: Does KT2440 FlgK have a measurable role in hook-filament junction stability or filament capping
    beyond conserved FlgK structural function?
suggested_experiments:
- hypothesis: FlgK is required for proper hook-filament junction assembly and flagellar motility in KT2440.
  description: Create an in-frame flgK deletion and complementation strain, then assess flagellar structure
    by electron microscopy and motility in swim plates.
  experiment_type: targeted mutant phenotype analysis
