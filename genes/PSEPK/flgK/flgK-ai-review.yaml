id: Q88ES2
gene_symbol: flgK
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: flgK encodes flagellar hook-associated protein 1, a structural component of the hook-filament
  junction in the P. putida KT2440 bacterial flagellum. Its core role is flagellar structure and assembly
  rather than enzymatic activity.
existing_annotations:
- term:
    id: GO:0005198
    label: structural molecule activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: This is the appropriate molecular-function annotation for FlgK. FlgK is a flagellar hook-associated
      structural protein, not an enzyme.
    action: ACCEPT
    reason: Structural molecule activity is the best current MF term for this flagellar junction component.
    supported_by:
    - reference_id: file:PSEPK/flgK/flgK-uniprot.txt
      supporting_text: 'RecName: Full=Flagellar hook-associated protein 1'
    - reference_id: file:PSEPK/flgK/flgK-goa.tsv
      supporting_text: "GO:0005198\tstructural molecule activity"
- term:
    id: GO:0005576
    label: extracellular region
  evidence_type: IEA
  original_reference_id: GO_REF:0000044
  review:
    summary: Extracellular region is directionally correct for an exported flagellar axial protein, but
      it is too broad compared with bacterial-type flagellum and hook annotations.
    action: KEEP_AS_NON_CORE
    reason: Keep as a broad location while treating the flagellar component terms as core.
    supported_by:
    - reference_id: file:PSEPK/flgK/flgK-uniprot.txt
      supporting_text: 'SUBCELLULAR LOCATION: Bacterial flagellum'
    - reference_id: file:PSEPK/flgK/flgK-goa.tsv
      supporting_text: "GO:0005576\textracellular region"
- term:
    id: GO:0009288
    label: bacterial-type flagellum
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  review:
    summary: This cellular-component annotation is correct. FlgK is a component of the bacterial flagellum.
    action: ACCEPT
    reason: The broad flagellum term is appropriate and complements the more specific hook-associated
      annotation.
    supported_by:
    - reference_id: file:PSEPK/flgK/flgK-uniprot.txt
      supporting_text: 'SUBCELLULAR LOCATION: Bacterial flagellum'
    - reference_id: file:PSEPK/flgK/flgK-goa.tsv
      supporting_text: "GO:0009288\tbacterial-type flagellum"
- term:
    id: GO:0009424
    label: bacterial-type flagellum hook
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: This imported hook annotation is close but not the most precise term for flgK. Flagellar
      hook-associated protein 1 is a hook-associated protein at the hook-filament junction, and GO:0009422
      bacterial-type flagellum hook-filament junction is the better cellular-component term.
    action: MODIFY
    reason: Use GO:0009422 because it names the hook-filament junction, whereas GO:0009424 describes the
      hook proper.
    proposed_replacement_terms:
    - id: GO:0009422
      label: bacterial-type flagellum hook-filament junction
    supported_by:
    - reference_id: file:PSEPK/flgK/flgK-uniprot.txt
      supporting_text: hook-associated protein
    - reference_id: file:PSEPK/flgK/flgK-goa.tsv
      supporting_text: "GO:0009424\tbacterial-type flagellum hook"
- term:
    id: GO:0044780
    label: bacterial-type flagellum assembly
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  review:
    summary: This process annotation is appropriate. As a hook-associated structural protein, FlgK contributes
      directly to bacterial-type flagellum assembly.
    action: ACCEPT
    reason: Flagellar assembly is the direct biological process for this structural component.
    supported_by:
    - reference_id: file:PSEPK/flgK/flgK-uniprot.txt
      supporting_text: 'RecName: Full=Flagellar hook-associated protein 1'
    - reference_id: file:PSEPK/flgK/flgK-goa.tsv
      supporting_text: "GO:0044780\tbacterial-type flagellum assembly"
