taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: >-
  dapA-I (PP_1237/Q88NH2) encodes a 4-hydroxy-tetrahydrodipicolinate synthase
  in the DapA family. It catalyzes condensation of aspartate semialdehyde with
  pyruvate in the diaminopimelate branch of L-lysine biosynthesis. In the
  ppu00261 context this is precursor amino-acid biosynthesis, not direct evidence
  for a complete monobactam pathway.
