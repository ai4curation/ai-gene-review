suggested_questions:
- question: What acyl-CoA substrate range does PP_4030 serve in KT2440 fatty-acid beta-oxidation, and does it specialize in unsaturated-fatty-acid auxiliary isomerization?
suggested_experiments:
- description: Compare wild-type and PP_4030 deletion strains during growth on saturated and unsaturated fatty acids, then measure acyl-CoA intermediates to test for accumulation of dienoyl-CoA substrates.
  experiment_type: mutant growth assay and targeted acyl-CoA metabolomics
