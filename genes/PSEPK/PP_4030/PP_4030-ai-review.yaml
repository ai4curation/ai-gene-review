description: PP_4030 encodes an uncharacterized enoyl-CoA hydratase/isomerase-family protein in Pseudomonas putida KT2440. UniProt links it to fatty acid beta-oxidation through UniPathway UPA00659, and its PANTHER subfamily assignment supports a candidate dienoyl-CoA isomerase role, but substrate specificity remains computationally inferred in this first pass.
existing_annotations:
- term:
    id: GO:0003824
    label: catalytic activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: Generic catalytic activity is too broad for an enoyl-CoA hydratase/isomerase-family beta-oxidation candidate.
    action: MARK_AS_OVER_ANNOTATED
    reason: The protein is placed in an enoyl-CoA hydratase/isomerase family and a PANTHER dienoyl-CoA isomerase subfamily, so the unqualified catalytic parent adds little useful functional information.
    supported_by:
    - reference_id: file:PSEPK/PP_4030/PP_4030-uniprot.txt
      supporting_text: 'SubName: Full=Enoyl-CoA hydratase/isomerase family protein'
    - reference_id: file:PSEPK/PP_4030/PP_4030-uniprot.txt
      supporting_text: DR   PANTHER; PTHR43149:SF1; DELTA(3,5)-DELTA(2,4)-DIENOYL-COA ISOMERASE, MITOCHONDRIAL; 1.
- term:
    id: GO:0005737
    label: cytoplasm
  evidence_type: IEA
  original_reference_id: GO_REF:0000117
  qualifier: located_in
  review:
    summary: Cytoplasm is the appropriate bacterial localization for this soluble beta-oxidation-family enzyme.
    action: ACCEPT
    reason: GOA assigns cytoplasm and this is compatible with bacterial fatty-acid beta-oxidation; the UniProt peroxisome keyword is an automated eukaryotic-location carryover and is not used.
    supported_by:
    - reference_id: file:PSEPK/PP_4030/PP_4030-uniprot.txt
      supporting_text: DR   GO; GO:0005737; C:cytoplasm; IEA:UniProtKB-ARBA.
    - reference_id: file:PSEPK/PP_4030/PP_4030-goa.tsv
      supporting_text: "GO:0005737\tcytoplasm"
- term:
    id: GO:0016853
    label: isomerase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: Isomerase activity is directionally correct but less informative than the PANTHER-supported dienoyl-CoA isomerase subfamily assignment.
    action: MODIFY
    reason: The InterPro/keyword-derived GOA term supports an isomerase-family enzyme, and UniProt's PANTHER subfamily label points to delta(3,5)-delta(2,4)-dienoyl-CoA isomerase activity. The replacement should remain computational first-pass until substrate-specific evidence is available.
    proposed_replacement_terms:
    - id: GO:0051750
      label: delta(3,5)-delta(2,4)-dienoyl-CoA isomerase activity
    supported_by:
    - reference_id: file:PSEPK/PP_4030/PP_4030-uniprot.txt
      supporting_text: DR   GO; GO:0016853; F:isomerase activity; IEA:UniProtKB-KW.
    - reference_id: file:PSEPK/PP_4030/PP_4030-uniprot.txt
      supporting_text: DR   PANTHER; PTHR43149:SF1; DELTA(3,5)-DELTA(2,4)-DIENOYL-COA ISOMERASE, MITOCHONDRIAL; 1.
    - reference_id: file:PSEPK/PP_4030/PP_4030-deep-research-asta.md
      supporting_text: '- **Protein Family:** Belongs to the enoyl-CoA hydratase/isomerase family.'
- term:
    id: GO:0006635
    label: fatty acid beta-oxidation
  evidence_type: IEA
  original_reference_id: GO_REF:0000041
  qualifier: involved_in
  review:
    summary: Fatty acid beta-oxidation is the best current pathway context for PP_4030.
    action: ACCEPT
    reason: UniProt explicitly places PP_4030 in lipid metabolism/fatty acid beta-oxidation and maps it to UniPathway UPA00659, alongside already-curated fadE, fadB, and fadA beta-oxidation genes.
    supported_by:
    - reference_id: file:PSEPK/PP_4030/PP_4030-uniprot.txt
