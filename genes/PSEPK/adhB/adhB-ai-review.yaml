  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: adhB (PP_3623) encodes a membrane-associated cytochrome c subunit of an alcohol dehydrogenase-type oxidoreductase. Its c-type cytochrome domains support heme-dependent electron transfer from periplasmic alcohol oxidation to respiratory acceptors. The record supports an alcohol dehydrogenase cytochrome c role, but the precise physiological alcohol substrate is not resolved in this first pass.
