    evidence_type: IEA
    original_reference_id: GO_REF:0000120
    qualifier: located_in
    review:
      summary: The soluble HemL enzyme is predicted to function in the bacterial cytoplasm.
      action: ACCEPT
      reason: UniProt explicitly assigns cytoplasmic localization and no targeting or membrane feature.
      supported_by:
        - reference_id: file:PSEPK/hemL/hemL-uniprot.txt
          supporting_text: "SUBCELLULAR LOCATION: Cytoplasm"
  - term:
      id: GO:0030170
      label: pyridoxal phosphate binding
    evidence_type: IEA
    original_reference_id: GO_REF:0000002
    qualifier: enables
    review:
      summary: PLP is the established cofactor for HemL-family aminomutases.
      action: KEEP_AS_NON_CORE
      reason: >-
        PLP binding is valid cofactor information, but the substrate-specific
        aminomutase activity is the core molecular function.
      supported_by:
        - reference_id: file:PSEPK/hemL/hemL-uniprot.txt
          supporting_text: "Name=pyridoxal 5'-phosphate; Xref=ChEBI:CHEBI:597326;"
  - term:
      id: GO:0033014
      label: tetrapyrrole biosynthetic process
    evidence_type: IEA
    original_reference_id: GO_REF:0000002
    qualifier: involved_in
    review:
      summary: HemL directly supplies 5-aminolevulinate for tetrapyrrole synthesis.
      action: ACCEPT
      reason: >-
        HemL completes 5-aminolevulinate formation in the C5 route, which occurs
        in bacteria, archaea, and plastid-bearing eukaryotes and can feed
        multiple tetrapyrrole products. GO:0033014 accurately captures that
        direct role without relying on an obsolete route-specific term.
      supported_by:
        - reference_id: file:PSEPK/hemL/hemL-uniprot.txt
          supporting_text: "biosynthesis; 5-aminolevulinate from L-glutamyl-tRNA(Glu): step 2/2."
        - reference_id: PMID:7883699
          supporting_text: be used by Pseudomonas aeruginosa, Pseudomonas putida, Pseudomonas stutzeri,
  - term:
      id: GO:0042286
      label: glutamate-1-semialdehyde 2,1-aminomutase activity
    evidence_type: IEA
    original_reference_id: GO_REF:0000120
