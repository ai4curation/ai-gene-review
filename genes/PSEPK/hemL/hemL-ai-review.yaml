id: Q88DP0
gene_symbol: hemL
product_type: PROTEIN
aliases:
  - PP_4784
status: COMPLETE
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: >-
  HemL is a cytoplasmic, pyridoxal-5'-phosphate-dependent glutamate-1-semialdehyde
  2,1-aminomutase. It catalyzes the second reaction of the C5 glutamyl-tRNA
  route, rearranging the HemA product glutamate 1-semialdehyde to
  5-aminolevulinate, the common precursor for the subsequent porphyrin pathway.
