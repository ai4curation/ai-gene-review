  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: secA (PP_1345) encodes the SecA ATPase subunit of the Sec protein translocase (EC 7.4.2.8), the central motor
  of the general secretory (Sec) pathway in P. putida. SecA couples ATP binding and hydrolysis to the stepwise threading of
  unfolded preproteins through the SecYEG channel in the inner membrane, acting both as a receptor for preprotein-SecB substrates
  and as an ATP-driven molecular motor. It is a DEAD-box-like ATPase that binds a single structural Zn2+ ion via a C-terminal
  CXCXC SEC-C motif, functions as a monomer/homodimer, and partitions roughly 50:50 between a soluble cytoplasmic pool and
  a membrane-associated pool at the cytoplasmic face of the inner membrane. SecA is an essential component of the Sec translocon
  (SecA-SecYEG with auxiliary SecDF-YajC and YidC) that drives protein export and membrane protein insertion.
