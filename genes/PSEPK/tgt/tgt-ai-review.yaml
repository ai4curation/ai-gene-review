description: tgt (PP_0833) encodes queuine tRNA-ribosyltransferase, the bacterial tRNA-guanine transglycosylase
  that exchanges guanine at wobble position 34 for the queuosine precursor preQ1 in specific tRNAs. This cytosolic
  enzyme initiates modification of target tRNAs within the tRNA queuosine biosynthetic pathway.
