gene_symbol: pdxJ
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: >-
    Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 /
    NCIMB 11950 / KT2440)
description: >-
  PdxJ is pyridoxine 5'-phosphate synthase (EC 2.6.99.2). It catalyzes the
  ring-closing condensation of 3-amino-2-oxopropyl phosphate with
  1-deoxy-D-xylulose 5-phosphate (DXP), forming pyridoxine 5'-phosphate. This is
  the branch-convergence reaction of DXP-dependent de novo vitamin-B6
  biosynthesis; PdxH subsequently oxidizes the product to PLP.
