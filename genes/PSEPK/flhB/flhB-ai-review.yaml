description: flhB encodes a multi-pass membrane FlhB/type-III secretion exporter-family component of the
  KT2440 flagellar export apparatus. It supports rod and basal-body formation and flagellin export together
  with the FliI/FliH cytosolic ATPase/regulator pair.
