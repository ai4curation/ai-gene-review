  title: Multi-omics analysis unravels a segregated metabolic flux network that tunes
    co-utilization of sugar and aromatic carbons in Pseudomonas putida
  findings:
  - statement: Phosphorylation of the ICD-associated protein PP_4011 changes with
      carbon source, consistent with post-translational tuning of flux at the TCA/glyoxylate
      branch point.
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
