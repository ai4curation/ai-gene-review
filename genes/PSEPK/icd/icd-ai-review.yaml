gene_symbol: icd
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: NADP-dependent isocitrate dehydrogenase (EC 1.1.1.42) of Pseudomonas
  putida KT2440 (locus PP_4011). It catalyzes the divalent-metal-dependent (Mg2+/Mn2+)
  oxidative decarboxylation of D-threo-isocitrate to 2-oxoglutarate and CO2 with the
  concomitant reduction of NADP+ to NADPH. The enzyme is a soluble cytoplasmic homodimer
  belonging to the isocitrate/isopropylmalate dehydrogenase family. It acts at the
  isocitrate node of the tricarboxylic acid cycle, where it both supplies 2-oxoglutarate
  for amino-acid biosynthesis and is a major source of anabolic reducing power (NADPH)
  for central metabolism and redox balance. In KT2440, biochemical assays of cell-free
  extracts show a strong (~89%) preference for NADP+ over NAD+. Activity at this branch
  point is subject to post-translational regulation (phosphorylation of a conserved
  serine), partitioning carbon between the TCA cycle and the glyoxylate shunt.
existing_annotations:
- term:
    id: GO:0000287
    label: magnesium ion binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: NADP-IDH requires a divalent metal ion (Mg2+ or Mn2+) per subunit for
      catalysis, and UniProt annotates a Mg2+-binding residue (position 309). Magnesium
      ion binding is well supported for this family.
    action: ACCEPT
    reason: Consistent with the IDH/IMDH family requirement for a divalent metal cofactor;
      UniProt records both Mg2+ and Mn2+ cofactors and a Mg2+-binding site.
- term:
    id: GO:0004450
    label: isocitrate dehydrogenase (NADP+) activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: This is the core molecular function. The enzyme catalyzes oxidative decarboxylation
      of D-threo-isocitrate to 2-oxoglutarate + CO2 with reduction of NADP+ (EC 1.1.1.42,
      RHEA:19629). KT2440-specific biochemistry confirms strong NADP+ preference (~89%
      NADP+ vs ~11% NAD+ in cell-free extracts).
    action: ACCEPT
    reason: Directly matches UniProt catalytic activity and is corroborated by organism-specific
      biochemical measurements of NADP cofactor preference (Nikel et al. 2015, PMID:26350459).
- term:
    id: GO:0006099
    label: tricarboxylic acid cycle
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: involved_in
  review:
    summary: Isocitrate dehydrogenase catalyzes the isocitrate to 2-oxoglutarate step
      of the TCA cycle. This is the appropriate biological process for the core function.
    action: ACCEPT
    reason: Standard, well-supported placement of IDH within the TCA cycle; consistent
      with central carbon metabolism studies in KT2440.
- term:
    id: GO:0016616
    label: oxidoreductase activity, acting on the CH-OH group of donors, NAD or NADP
      as acceptor
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: This is a generic parent term of the specific and more informative GO:0004450
      (isocitrate dehydrogenase (NADP+) activity), which is already annotated. It is
      not incorrect but adds no information beyond the specific child.
    action: MARK_AS_OVER_ANNOTATED
    reason: Redundant grandparent of the specific MF term GO:0004450 that is already
      present; provides no additional specificity.
- term:
    id: GO:0051287
    label: NAD binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: This enzyme is NADP+-specific, not NAD+-binding. UniProt annotates multiple
      NADP(+)-binding residues (positions 106, 341-347, 354, 393, 397) and no NAD-binding
      site, and KT2440 biochemistry shows ~89% NADP+ preference. The InterPro2GO mapping
      to NAD binding is a mis-propagation for this NADP-specific family member; the
      correct cofactor binding is NADP, not NAD.
    action: REMOVE
    reason: Contradicted by cofactor specificity. The enzyme binds NADP+, not NAD+;
      this is an over-propagated InterPro IEA inference. NADP binding (GO:0050661)
      would be the correct term.
    proposed_replacement_terms:
    - id: GO:0050661
      label: NADP binding
core_functions:
- description: NADP-dependent isocitrate dehydrogenase that catalyzes the divalent-metal-dependent
    oxidative decarboxylation of D-threo-isocitrate to 2-oxoglutarate and CO2, reducing
    NADP+ to NADPH, within the TCA cycle.
  supported_by:
  - reference_id: PMID:26350459
    supporting_text: KT2440 cell-free extract assays show isocitrate dehydrogenase
      with strong (~89%) preference for NADP+ over NAD+, identifying it as an NADPH-forming
      dehydrogenase in central carbon metabolism.
