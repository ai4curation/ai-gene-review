description: PP_4291 encodes a Tsx-like nucleoside-specific outer-membrane channel protein in Pseudomonas putida KT2440. The
  current evidence supports a channel/porin molecular function at the outer membrane, while the physiological substrate scope
  and relation to nucleoside uptake remain to be tested.
