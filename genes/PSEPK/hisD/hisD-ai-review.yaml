id: P59400
gene_symbol: hisD
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: >-
  hisD encodes histidinol dehydrogenase (HDH; EC 1.1.1.23), an
  NAD-dependent oxidoreductase that catalyzes the final two chemical steps
  of L-histidine biosynthesis. It carries out the sequential four-electron
  oxidation of L-histidinol first to the intermediate L-histidinaldehyde and then
  to L-histidine, reducing two molecules of NAD+ to NADH at a single active site.
  A bound zinc ion helps position the substrate but is not directly involved in
  the redox chemistry. The enzyme is a soluble cytoplasmic protein and completes the histidine
  biosynthetic pathway (step 9/9 from PRPP).
