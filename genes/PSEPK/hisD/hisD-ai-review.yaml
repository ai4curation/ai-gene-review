id: P59400
gene_symbol: hisD
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: >-
  hisD encodes histidinol dehydrogenase (HDH; EC 1.1.1.23), a bifunctional,
  zinc-dependent, NAD-dependent oxidoreductase that catalyzes the final two steps
  of L-histidine biosynthesis. It carries out the sequential four-electron
  oxidation of L-histidinol first to the intermediate L-histidinaldehyde and then
  to L-histidine, reducing two molecules of NAD+ to NADH at a single active site.
  A catalytic zinc ion is required to position the substrate for both oxidation
  steps. The enzyme is a soluble cytoplasmic protein and completes the histidine
  biosynthetic pathway (step 9/9 from PRPP).
