taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: >-
  glpK (PP_1075) encodes glycerol kinase (GK; EC 2.7.1.30), an ATP-dependent
  enzyme of the FGGY carbohydrate kinase family that catalyzes the
  phosphorylation of glycerol to sn-glycerol 3-phosphate, transferring the
  gamma-phosphate of ATP to the C3 hydroxyl of glycerol (glycerol + ATP =
  sn-glycerol 3-phosphate + ADP + H+). This is the first and committed step of
  glycerol catabolism in Pseudomonas putida KT2440, trapping glycerol inside the
  cell and channeling it into central carbon metabolism; the product
  sn-glycerol 3-phosphate is subsequently oxidized to dihydroxyacetone phosphate
  for entry into glycolysis/gluconeogenesis. The enzyme adopts an actin-like
  ATPase (two-domain) fold and its activity is allosterically inhibited by
  fructose 1,6-bisphosphate. Glycerol kinase is a soluble cytoplasmic enzyme.
