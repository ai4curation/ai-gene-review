    label: ATP binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000104
  qualifier: enables
  review:
    summary: Glycerol kinase binds ATP as the phosphoryl donor; UniProt lists multiple ATP/ADP binding residues (e.g. positions 17-19, 265, 308, 312, 409, 413) in the actin-like ATPase domain. Supported by the ATP-binding/Nucleotide-binding keywords and HAMAP rule. Accept as a supporting molecular function.
    action: ACCEPT
