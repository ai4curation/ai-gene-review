taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: ddl encodes a cytoplasmic ATP-dependent D-alanine--D-alanine ligase
  in Pseudomonas putida KT2440. The enzyme forms D-alanyl-D-alanine from two D-alanine
  molecules for incorporation into peptidoglycan stem peptides and is a third Ddl-family
  paralog alongside the already curated ddlA and ddlB entries.
