- id: file:PSEPK/PP_2483/PP_2483-deep-research-openscientist.md
  title: OpenScientist gene research for PP_2483
  reference_review:
    relevance: HIGH
    correctness: MISCITED
    review_notes: >-
      The report is miscited for target-level curation. It promotes PP_2482 to
      canonical MoaA despite the curated three-paralog uncertainty, treats
      indirect neighborhood and orthologous-enzyme evidence as decisive support
      for dedicated delivery to one KT2440 client, and presents an unsaved
      target alignment as evidence. None of those paralog, client, or sequence
      claims are propagated. The predicted MocA assignment instead rests on the
      saved KEGG K07141, PANTHER, target UniProt, and local reproducible-analysis
      evidence; only the report's explicit no-target-experiment statement is
      retained as a limitation.
  findings:
  - statement: The report explicitly acknowledges that PP_2483 has no target-specific experimental support.
    supporting_text: >-
      **No direct experimental data** exist for PP_2483; the annotation is
      inferred from orthology, conserved domains, genomic context, and
      characterized homologs. Q88K10 is an unreviewed TrEMBL entry.
  - statement: The report incorrectly promotes the unresolved PP_2482 paralog to canonical MoaA.
    supporting_text: "| **PP_2482** | **MoaA / GTP 3′,8-cyclase** (K03639, EC 4.1.99.22) | First committed step of Moco biosynthesis |"
  - statement: The report overstates indirect neighborhood evidence as direct evidence for dedicated client delivery.
    supporting_text: >-
      This parallel genomic architecture is direct evidence for **dedicated,
      acceptor-specific MCD delivery**
  - statement: The report presents a target sequence comparison that was not saved as a reproducible local artifact.
    supporting_text: >-
      Needleman-Wunsch global identity: PP_2483 is actually closer to *E. coli*
      **MobA** (34.3%) than to *E. coli* **MocA** (25.3%), while *E. coli* MobA
      vs MocA share only 24.2%, and PP_2483 vs its paralog PP_4230 = 48.1%.
