    - reference_id: file:PSEPK/PP_2483/PP_2483-uniprot.txt
      supporting_text: |-
        DR   PANTHER; PTHR43777; MOLYBDENUM COFACTOR CYTIDYLYLTRANSFERASE; 1.
        DR   PANTHER; PTHR43777:SF1; MOLYBDENUM COFACTOR CYTIDYLYLTRANSFERASE; 1.
    - reference_id: file:interpro/panther/PTHR43777/PTHR43777-entries.csv
