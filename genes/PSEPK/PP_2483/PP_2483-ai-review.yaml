    label: nucleotidyltransferase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000117
  qualifier: enables
  review:
    summary: The generic nucleotidyltransferase term should be replaced by predicted Mo-cofactor cytidylyltransferase activity.
    action: MODIFY
    reason: KEGG assigns Q88K10 to the exact MocA orthology K07141; PANTHER subfamily and neighborhood evidence independently support a predicted MocA assignment.
