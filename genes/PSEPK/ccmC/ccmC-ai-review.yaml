description: ccmC encodes a multi-pass inner-membrane CcmC/CycZ/HelC-family heme exporter and cytochrome c-type biogenesis protein. It contributes to heme handling across the inner membrane and supports cytochrome c-type biogenesis through conserved CcmC/CcsA-family domains.
