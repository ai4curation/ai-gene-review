id: Q88D61
gene_symbol: sahR
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: sahR encodes a predicted transcriptional regulator of methionine metabolism in Pseudomonas putida KT2440. The
  protein has an ArsR-like DNA-binding region and SAM-dependent methyltransferase-domain context; the regulatory target, effector,
  and catalytic relevance of the methyltransferase-like domain remain unresolved.
