  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: ccmD encodes a small inner-membrane CcmD/CycX/HelD-family protein in the Ccm heme-handling system for cytochrome c maturation. The protein is required for moving heme to the periplasmic side of the cell envelope during c-type cytochrome biogenesis and is predicted to contain a single transmembrane segment.
