taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: pilJ (PP_4989) encodes a membrane methyl-accepting-chemotaxis-protein-like transducer in
  the Pseudomonas putida KT2440 Pil/Chp-type signaling cluster. Its HAMP, MCP signaling, and PilJ-family
  domains support a receptor/transducer role at the membrane, but the direct ligand or pilus-associated
  input remains unresolved.
