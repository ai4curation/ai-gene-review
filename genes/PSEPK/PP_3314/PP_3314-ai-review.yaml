  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: PP_3314 encodes a predicted HSP20-family small heat shock protein in Pseudomonas putida KT2440. It contains an
  alpha-crystallin/HSP20 domain and is best treated as a putative stress-responsive holdase chaperone that binds non-native
  or unfolded proteins, while its specific KT2440 clients remain unknown.
