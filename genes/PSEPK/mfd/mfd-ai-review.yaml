  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: mfd (PP_2148) encodes transcription-repair coupling factor, an ATP-dependent UvrB/RecG-like DNA motor that recognizes
  stalled transcription complexes, removes or remodels RNA polymerase at DNA lesions, and recruits the UvrABC nucleotide-excision
  repair machinery for transcription-coupled repair.
