  description: OprF is the major outer membrane porin of KT2440. The best-supported
    core function is passive pore formation in the cell outer membrane, with a related
    contribution to overall envelope integrity.
suggested_questions:
- question: Does KT2440 OprF adopt the same low-abundance open-channel conformation
    described for the canonical Pseudomonas aeruginosa homolog?
- question: Is the InterPro-derived calcium ion binding assignment a false positive,
    or does the acidic C-terminal region bind calcium under any physiological condition?
- question: How much of the KT2440 ΔoprF envelope phenotype reflects loss of pore
    function versus loss of OmpA-like periplasmic tethering?
suggested_experiments:
- description: Reconstitute purified KT2440 OprF into liposomes or planar bilayers
    and quantify conductance, selectivity, and open-state frequency.
  experiment_type: electrophysiology
- description: Complement a KT2440 ΔoprF strain with domain truncations or targeted
    C-terminal mutants and measure membrane permeability and vesicle production.
  experiment_type: genetics
- description: Test direct calcium binding of purified full-length OprF or the isolated
    C-terminal domain by ITC, DSF, or metal-overlay assays.
  experiment_type: biochemistry
