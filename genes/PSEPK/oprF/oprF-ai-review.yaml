  title: Manual fallback deep research on oprF in Pseudomonas putida KT2440
  findings:
  - statement: OprF is the major outer membrane porin and supports envelope integrity
    supporting_text: OprF is the major outer membrane porin of Pseudomonas putida
      KT2440 and its loss causes membrane permeabilization and hypervesiculation.
    reference_section_type: RESULTS
  - statement: OprF has canonical OprF/OmpA family architecture
    supporting_text: The Q88L46 UniProt entry assigns a 24-aa signal peptide, an N-terminal
      outer membrane beta-barrel region, and a C-terminal OmpA-like domain (residues
      225-343).
    reference_section_type: RESULTS
  - statement: The calcium ion binding annotation is weak and likely non-core
    supporting_text: 'The InterPro-derived calcium ion binding annotation is weak:
      I found no direct biochemical evidence that KT2440 OprF binds calcium, and the
      predicted thrombospondin type 3 repeat appears non-core relative to the conserved
      porin/OmpA architecture.'
    reference_section_type: RESULTS
