id: Q88L46
gene_symbol: oprF
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: OprF is the major OmpA/OprF-family outer membrane protein of Pseudomonas
  putida KT2440. The protein has a signal peptide, an N-terminal outer-membrane beta-barrel
  porin region, and a C-terminal OmpA-like periplasmic domain. Combined evidence from
  KT2440 studies and canonical OprF literature supports a core role in outer membrane
  permeability and envelope integrity, while the current InterPro-derived calcium-binding
  prediction lacks direct biochemical support.
existing_annotations:
- term:
    id: GO:0005509
    label: calcium ion binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: This InterPro-derived annotation is weak for OprF. The established biology
      of OprF in KT2440 and canonical homologs is outer-membrane localization, porin
      activity, and envelope integrity rather than calcium binding.
    action: REMOVE
    reason: I found no direct biochemical evidence that KT2440 OprF binds calcium.
      The annotation appears to come from a low-specificity domain match in the acidic
      C-terminal region and does not reflect the conserved core function of the OprF
      family.
    supported_by:
    - reference_id: file:PSEPK/oprF/oprF-deep-research-falcon.md
      supporting_text: 'The InterPro-derived calcium ion binding annotation is weak:
        I found no direct biochemical evidence that KT2440 OprF binds calcium, and
        the predicted thrombospondin type 3 repeat appears non-core relative to the
        conserved porin/OmpA architecture.'
      reference_section_type: RESULTS
- term:
    id: GO:0009279
    label: cell outer membrane
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  review:
    summary: This is the correct specific localization for OprF. Both UniProt and
      KT2440 literature identify OprF as the major outer membrane porin.
    action: ACCEPT
    reason: Cell outer membrane localization is directly consistent with the protein
      architecture, UniProt subcellular annotation, and KT2440 studies manipulating
      OprF as a major outer membrane porin.
    supported_by:
    - reference_id: PMID:32211393
      supporting_text: Then the major outer membrane porin OprF and the specific porin
        OprE were overproduced during PHA producing conditions on decanoate-grown
        cells.
      reference_section_type: ABSTRACT
    - reference_id: file:PSEPK/oprF/oprF-deep-research-falcon.md
      supporting_text: The current evidence supports outer-membrane localization and
        porin activity as core features of KT2440 OprF.
      reference_section_type: RESULTS
- term:
    id: GO:0016020
    label: membrane
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  review:
    summary: This annotation is broadly correct but less informative than the coexisting
      cell outer membrane annotation.
    action: KEEP_AS_NON_CORE
    reason: OprF is certainly a membrane protein, but the more specific and biologically
      useful localization is GO:0009279 cell outer membrane.
    supported_by:
    - reference_id: file:PSEPK/oprF/oprF-deep-research-falcon.md
      supporting_text: The current evidence supports outer-membrane localization and
        porin activity as core features of KT2440 OprF.
      reference_section_type: RESULTS
- term:
    id: GO:0015288
    label: porin activity
  evidence_type: TAS
  review:
    summary: OprF should carry a core porin activity annotation even though it is
      absent from the current QuickGO snapshot. KT2440 papers call it the major outer
      membrane porin, and canonical OprF homologs have direct channel-forming evidence.
    action: NEW
    reason: This term captures the core molecular function of the OprF family more
      precisely than broad membrane localization terms. The addition is conservative
      because it is supported by direct author statements in KT2440 and by classic
      OprF pore-formation work in the canonical homolog.
    supported_by:
    - reference_id: PMID:32211393
      supporting_text: Then the major outer membrane porin OprF and the specific porin
        OprE were overproduced during PHA producing conditions on decanoate-grown
        cells.
      reference_section_type: ABSTRACT
    - reference_id: PMID:16595653
      supporting_text: The major nonspecific porin of Pseudomonas aeruginosa, OprF,
        produces a large channel yet allows only a slow diffusion of various solutes.
      reference_section_type: ABSTRACT
    - reference_id: file:PSEPK/oprF/oprF-deep-research-falcon.md
      supporting_text: Canonical OprF homologs are nonspecific porins; in P. aeruginosa,
        purified OprF produces large channels, although only a minority of molecules
        adopt the open pore conformation.
      reference_section_type: RESULTS
