  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: PP_1888 encodes a predicted fimbrial protein in Pseudomonas putida KT2440. Its fimbrial
  adhesion-domain/PF00419 profile, signal peptide, and position next to the curated FimD/PP_1890
  chaperone-usher pair support a secreted pilus or fimbrial surface-subunit role, while the precise
  assembled fiber and adhesion phenotype remain unresolved.
