- id: PMID:18245293
  title: A set of activators and repressors control peripheral glucose pathways in
    Pseudomonas putida to yield a common central intermediate.
  findings:
  - statement: HexR controls glucokinase/glucose-6-phosphate dehydrogenase genes, the
      Entner-Doudoroff enzyme genes, and gap-1 in P. putida KT2440.
  - statement: Glucose is channeled to the central intermediate 6-phosphogluconate
      via convergent pathways regulated by the repressors HexR, GnuR, and PtxS and
      the activator GltR-2.
- id: PMID:19506074
  title: 'Regulation of glucose metabolism in Pseudomonas: the phosphorylative branch
    and entner-doudoroff enzymes are regulated by a repressor containing a sugar isomerase
    domain.'
  findings:
  - statement: HexR is a monomer in solution but binds DNA as a dimer at a pseudopalindromic
      operator with consensus 5'-TTGTN(7-8)ACAA-3', recognizing P(edd), P(zwf), and
      P(gap-1) with nanomolar affinity.
  - statement: The Entner-Doudoroff intermediate KDPG binds HexR and releases it from
      its operators, whereas glucose, glucose-6-phosphate, and 6-phosphogluconate do
      not; the effector is sensed by the C-terminal SIS domain.
proposed_new_terms: []
suggested_questions:
- question: Beyond the gap-1, edd-glk-gltR-2, and zwf-pgl-eda operons, does the HexR
    regulon in P. putida extend to additional genes, and are any directly activated
    rather than repressed?
- question: What are the structural determinants in the SIS domain that confer specificity
    for KDPG over closely related phosphorylated sugars such as 6-phosphogluconate?
suggested_experiments:
- description: Determine a co-crystal or cryo-EM structure of HexR bound to operator
    DNA and to KDPG to define the allosteric mechanism linking effector binding to
    DNA release.
- description: Perform genome-wide ChIP-seq combined with RNA-seq in wild-type and
    hexR mutant strains under glucose and non-glucose conditions to define the complete
    HexR regulon.
