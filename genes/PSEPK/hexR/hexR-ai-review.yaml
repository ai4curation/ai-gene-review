  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: HexR is the HTH-type transcriptional repressor that controls central
  glucose catabolism in Pseudomonas putida. It is a two-domain protein with an N-terminal
  winged helix-turn-helix DNA-binding domain of the RpiR family and a C-terminal sugar
  isomerase (SIS) sensor domain. HexR binds inverted pseudopalindromic operator sequences
  (consensus 5'-TTGTN(7-8)ACAA-3') in the promoter regions of the gap-1 gene and of
  the edd-glk-gltR-2 and zwf-pgl-eda operons, thereby repressing the phosphorylative
  branch of glucose metabolism and the Entner-Doudoroff pathway. Although monomeric
  in solution, HexR binds DNA as a dimer. Its repressor activity is relieved by the
  Entner-Doudoroff intermediate 2-keto-3-deoxy-6-phosphogluconate (KDPG), which binds
  the SIS domain and releases HexR from its operators, providing metabolite-responsive
  induction of glucose catabolic genes.
