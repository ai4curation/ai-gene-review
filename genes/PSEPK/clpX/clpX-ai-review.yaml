id: Q88KI9
gene_symbol: clpX
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: >-
  ClpX is the AAA+ ATPase (unfoldase) subunit of the ATP-dependent ClpXP
  protease in Pseudomonas putida KT2440. It is the ATP-dependent specificity
  factor of the Clp protease that recognizes specific substrate proteins, uses
  cycles of ATP binding and hydrolysis to mechanically unfold them, and
  translocates the unfolded polypeptides through its central pore into the
  associated ClpP peptidase chamber for degradation. ClpX assembles into a
  homohexameric ring; in the presence of ATP this ring docks onto one or two
  heptameric ClpP rings (fourteen ClpP subunits) to form the barrel-shaped
  ClpXP protease whose internal proteolytic chamber resembles the architecture
  of the eukaryotic proteasome. The protein has an N-terminal C4-type
  zinc-binding (ZB) domain that coordinates a structural zinc ion through four
  cysteines and mediates substrate and adaptor recognition, and a central AAA+
  module with a P-loop/Walker A nucleotide-binding site that binds and
  hydrolyzes ATP to power unfolding and translocation. In the absence of ClpP,
  ClpX can act as a stand-alone molecular chaperone. Through regulated,
  ATP-driven proteolysis of specific cellular substrates, ClpXP contributes
  broadly to protein quality control and to the turnover of regulatory
  proteins.
