    ClpX-like, mitochondrial)
  findings:
  - statement: clpX (Q88KI9) is classified by PANTHER into family PTHR48102 and subfamily
      PTHR48102:SF7, the ClpX-like ATP-binding subunit subfamily.
  - statement: The ", MITOCHONDRIAL" tag on subfamily SF7 is a eukaryote-biased naming
      artifact reflecting the well-characterized eukaryotic mitochondrial ClpX members;
      this P. putida protein is the bacterial cytoplasmic ClpX unfoldase subunit of
      the ClpXP protease, and the subfamily assignment correctly identifies the ClpX
      AAA+ unfoldase.
existing_annotations:
- term:
    id: GO:0005524
    label: ATP binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: ClpX binds ATP at its AAA+ Walker A (P-loop) motif. This is a real molecular
      capability, but it is a broad term that is subsumed by the more informative
      ATP hydrolysis activity annotation (GO:0016887), which captures the catalytic
      function that powers unfolding and translocation.
    action: MARK_AS_OVER_ANNOTATED
    reason: ATP binding is correct but broad; the specific catalytic term GO:0016887
      (ATP hydrolysis activity) is also annotated and better represents the core function.
      The Walker A ATP-binding motif is present in the sequence.
    supported_by:
    - reference_id: file:PSEPK/clpX/clpX-uniprot.txt
      supporting_text: BINDING         137..144
- term:
    id: GO:0006457
    label: protein folding
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: involved_in
  review:
    summary: ClpX is an ATP-dependent unfoldase that recognizes substrates and feeds
      them to ClpP for degradation; its dominant cellular role is protein catabolism/quality
      control, not folding. The protein folding term is imprecise for the unfoldase/proteolytic
      activity and should be replaced with a protein catabolic process term.
    action: MODIFY
    reason: ClpX directs proteolytic degradation rather than folding. The biological
      process is better captured by protein catabolic process; ClpX unfolds substrates
      for ClpP rather than folding them.
    proposed_replacement_terms:
    - id: GO:0030163
      label: protein catabolic process
    supported_by:
    - reference_id: file:PSEPK/clpX/clpX-uniprot.txt
      supporting_text: It directs the protease to specific substrates.
- term:
    id: GO:0008270
    label: zinc ion binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: ClpX contains an N-terminal C4-type zinc-binding (ZB) domain that coordinates
      a structural zinc ion via four cysteine residues (positions 31, 34, 53, 56),
      involved in substrate/adaptor recognition. Zinc binding is well supported by
      the conserved domain and binding-site features.
    action: ACCEPT
    reason: The C4-type zinc finger with four cysteine zinc ligands is a defining,
      conserved feature of ClpX and is a genuine molecular function.
    supported_by:
    - reference_id: file:PSEPK/clpX/clpX-uniprot.txt
      supporting_text: DOMAIN          19..72
    - reference_id: file:PSEPK/clpX/clpX-uniprot.txt
      supporting_text: /ligand="Zn(2+)"
- term:
    id: GO:0009376
    label: HslUV protease complex
  evidence_type: IEA
  original_reference_id: GO_REF:0000118
  qualifier: part_of
  review:
    summary: ClpX forms the ClpXP (endopeptidase Clp) complex with ClpP, not the HslUV
      protease complex (which uses the distinct AAA+ ATPase HslU and the peptidase
      HslV). This TreeGrafter annotation mis-grafts across the AAA+ ATPase family;
      the correct complex term is the endopeptidase Clp complex.
    action: MODIFY
    reason: The HslUV protease complex is a different protease (HslU/HslV); ClpX is
      a component of the ClpX-ClpP complex. The cellular component should be corrected
      to the endopeptidase Clp complex.
    proposed_replacement_terms:
    - id: GO:0009368
      label: endopeptidase Clp complex
    supported_by:
    - reference_id: file:PSEPK/clpX/clpX-uniprot.txt
      supporting_text: Component of the ClpX-ClpP complex.
- term:
    id: GO:0016887
    label: ATP hydrolysis activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: ClpX hydrolyzes ATP via its AAA+ module to drive substrate unfolding and
      translocation into ClpP. This is a core enzymatic activity of the protein.
    action: ACCEPT
    reason: ATP hydrolysis is the central enzymatic activity that powers the ClpX unfoldase/translocase
      machine and is a defining molecular function of the AAA+ ATPase.
    supported_by:
    - reference_id: file:PSEPK/clpX/clpX-uniprot.txt
      supporting_text: Forms a hexameric ring that, in the presence of ATP, binds to
        fourteen ClpP subunits
- term:
    id: GO:0046983
    label: protein dimerization activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: ClpX assembles into a homohexameric ring, not a dimer. Protein dimerization
      activity is an imprecise InterPro-derived call that does not accurately describe
      the hexameric oligomerization of ClpX.
    action: MARK_AS_OVER_ANNOTATED
    reason: ClpX forms a homohexamer rather than a dimer; the dimerization term is
      an over-annotation derived from a generic InterPro signature and does not represent
      a core function.
    supported_by:
    - reference_id: file:PSEPK/clpX/clpX-uniprot.txt
      supporting_text: Forms a hexameric ring
- term:
    id: GO:0051301
    label: cell division
  evidence_type: IEA
  original_reference_id: GO_REF:0000118
  qualifier: involved_in
  review:
    summary: In several bacteria ClpXP influences cell division indirectly by degrading
      regulatory proteins (e.g. cell-division inhibitors and FtsZ-associated factors).
      This is a pleiotropic downstream consequence of ClpXP proteolysis rather than
      the core proteolytic function, and there is no P. putida-specific experimental
      evidence.
    action: KEEP_AS_NON_CORE
    reason: Cell division is an indirect, pleiotropic effect of ClpXP-mediated proteolysis
      of regulators, not the core molecular/biological function of ClpX. Retain as
      non-core.
    supported_by:
    - reference_id: file:PSEPK/clpX/clpX-uniprot.txt
      supporting_text: It directs the protease to specific substrates.
- term:
    id: GO:0140662
    label: ATP-dependent protein folding chaperone
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: ClpX is an ATP-dependent unfoldase/chaperone; UniProt notes it can perform
      chaperone functions in the absence of ClpP. This is the best available active
      molecular-function term capturing the ATP-dependent unfolding/chaperone activity
      of ClpX.
    action: ACCEPT
    reason: Best available active MF term for the ATP-dependent unfoldase/chaperone
      activity of ClpX; the stand-alone chaperone function is documented in UniProt.
      PANTHER subfamily PTHR48102:SF7 (the ClpX-like ATP-binding subunit subfamily)
      corroborates that this protein is the ClpX AAA+ unfoldase, despite the
      eukaryote-derived ", MITOCHONDRIAL" naming tag on the subfamily.
    supported_by:
    - reference_id: file:PSEPK/clpX/clpX-uniprot.txt
      supporting_text: Can perform chaperone functions in the absence of ClpP.
    - reference_id: file:PSEPK/clpX/clpX-uniprot.txt
      supporting_text: PTHR48102:SF7; ATP-DEPENDENT CLP PROTEASE ATP-BINDING SUBUNIT
        CLPX-LIKE, MITOCHONDRIAL
