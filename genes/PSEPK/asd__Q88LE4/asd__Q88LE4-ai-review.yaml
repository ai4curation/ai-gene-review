description: 'asd (PP_1989/Q88LE4) encodes aspartate-semialdehyde dehydrogenase, reducing aspartyl-phosphate to L-aspartate-semialdehyde in aspartate-family amino-acid biosynthesis. It is upstream of homoserine, threonine, lysine, isoleucine, and methionine branches but is outside the strict methionine-from-homoserine module.'
