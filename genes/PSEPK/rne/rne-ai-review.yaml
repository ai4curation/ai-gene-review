description: rne (PP_1905) encodes ribonuclease E, a bacterial endoribonuclease that initiates RNA processing and mRNA decay.
  RNase E cleaves RNA substrates, contributes to rRNA and tRNA processing, and is a central scaffold/activity in bacterial
  RNA-degradation machinery.
