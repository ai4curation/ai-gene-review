description: ycfJ encodes a predicted outer-membrane lipoprotein or surface-antigen-family protein in
  Pseudomonas putida KT2440. Although the product name says regulator of flagellation, the current
  first-pass evidence supports only membrane/outer-membrane localization and Bact_OM_lipoprot/surface
  antigen domain context; a direct flagellar regulatory mechanism remains unresolved.
