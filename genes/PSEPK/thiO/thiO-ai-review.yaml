id: Q88Q83
gene_symbol: thiO
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: thiO encodes a monomeric FAD-dependent glycine oxidase that oxidizes glycine to glyoxyl imine, hydrogen peroxide, and ammonia. The glyoxyl imine product feeds thiazole-ring formation in thiamine diphosphate biosynthesis.
existing_annotations:
- term:
    id: GO:0005737
    label: cytoplasm
  evidence_type: IEA
  original_reference_id: GO_REF:0000118
  review:
    summary: ThiO has an automated cytoplasm annotation; no primary localization evidence was found.
    action: KEEP_AS_NON_CORE
    reason: Retain as a non-core cellular-component annotation for this soluble bacterial enzyme, but do not treat localization as a core function.
    supported_by:
    - reference_id: file:PSEPK/thiO/thiO-uniprot.txt
      supporting_text: 'DR   GO; GO:0005737; C:cytoplasm; IEA:TreeGrafter.'
- term:
    id: GO:0016491
    label: oxidoreductase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: Generic oxidoreductase activity is less informative than glycine oxidase activity.
    action: MARK_AS_OVER_ANNOTATED
    reason: Retain GO:0043799 instead.
    supported_by:
    - reference_id: file:PSEPK/thiO/thiO-uniprot.txt
      supporting_text: Catalyzes the oxidation of glycine
- term:
    id: GO:0043799
    label: glycine oxidase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
