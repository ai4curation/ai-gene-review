id: Q88GD4
gene_symbol: dapF
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: >-
  DapF Q88GD4 (PP_3790) is a diaminopimelate epimerase (EC 5.1.1.7) that
  interconverts LL-2,6-diaminopimelate and meso-2,6-diaminopimelate in the
  diaminopimelate route to L-lysine. KT2440 also encodes the DapF-specific
  paralog Q88CF3; their relative physiological contributions are unresolved.
