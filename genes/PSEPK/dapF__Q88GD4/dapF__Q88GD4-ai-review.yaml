description: dapF/PP_3790 (Q88GD4) encodes a diaminopimelate epimerase paralog that converts L,L-diaminopimelate to meso-diaminopimelate in the diaminopimelate branch of L-lysine biosynthesis. PSEPK also has a second DapF-like protein, so paralog-specific flux remains unresolved in this first pass.
