taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: >-
  DapF Q88GD4 (PP_3790) is a diaminopimelate epimerase (EC 5.1.1.7) that
  interconverts LL-2,6-diaminopimelate and meso-2,6-diaminopimelate in the
  diaminopimelate route to L-lysine. Ser70 and Ser205 occupy the positions used
  by the catalytic cysteine pair in canonical DapF enzymes, making Q88GD4 a
  putative paired-serine DapF-SS enzyme; this subclass assignment has not been
  tested experimentally for Q88GD4. KT2440 also encodes the canonical
  cysteine-pair DapF paralog Q88CF3, and their relative physiological
  contributions are unresolved.
