- id: PMID:40774471
  title: Cofactor-Independent Amino Acid Epimerases with Catalytic Serines Instead of Cysteines.
  full_text_unavailable: true
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: >-
      PubMed metadata and abstract verified. The paper establishes the DapF-SS
      class but does not directly identify or assay Q88GD4.
  findings:
  - statement: >-
      Establishes that paired-serine DapF-SS proteins can catalyze the canonical
      DAP epimerization reaction; applying that subclass to Q88GD4 remains a
      sequence-based inference.
    supporting_text: >-
      DapF-SS enzymes catalyze reversible epimerization of DAP with similar
      kinetic parameters to that of DapF-CC enzymes.
- id: file:PSEPK/dapF__Q88GD4/dapF__Q88GD4-deep-research-openscientist.md
  title: OpenScientist literature and database synthesis for PSEPK DapF Q88GD4
  findings:
  - statement: Corroborates Q88GD4/PP_3790 as an EC 5.1.1.7 DapF candidate.
    supporting_text: >-
      *dapF* (Q88GD4, PP_3790) encodes **diaminopimelate epimerase (DapF)**
  - statement: >-
      Maps serines to both canonical catalytic positions, supporting a putative
      DapF-SS classification rather than interpreting the UniProt caution as
      evidence of inactivity.
    supporting_text: >-
      **serines (Ser70 and Ser205), not cysteines**
  - statement: >-
      No direct Q88GD4 assay was found; target-specific activity, kinetics,
      localization, and physiological division of labor with Q88CF3 remain
      unverified.
    supporting_text: >-
      Direct experimental evidence in *P. putida* KT2440 is lacking.
