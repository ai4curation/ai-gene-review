suggested_questions:
- question: Does PP_4841-PP_4845 function as a high-affinity UrtABCDE urea importer
    in P. putida KT2440, and under which nitrogen or nickel/urease-related conditions
    is the locus expressed?
suggested_experiments:
- description: Measure urea uptake, growth on urea as nitrogen source, and urease-linked
    physiology for urtA, urtB, urtC, urtD, and urtE mutants or complemented strains.
  experiment_type: targeted transporter mutant substrate-uptake and growth assay
