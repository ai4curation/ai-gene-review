description: urtB encodes a multi-pass inner-membrane permease component of the PP_4841-PP_4845
  UrtABCDE urea ABC uptake system. UniProt names the protein as a urea ABC transporter,
  places it in the cell inner membrane, and assigns a UrtB-specific transporter domain.
