proposed_new_terms: []
suggested_questions:
- question: >-
    Does PP_0375 directly cleave a PqqA-derived intermediate, promote PQQ
    excretion, or perform both functions, and how does its role differ from the
    M16-family PqqF route?
suggested_experiments:
- hypothesis: >-
    PP_0375 contributes serine-peptidase activity to PQQ precursor maturation
    in KT2440.
  description: >-
    Quantify intracellular and extracellular PQQ and PqqA-derived peptide
    intermediates in wild-type, PP_0375 deletion, catalytic-serine mutant, and
    complemented strains, then test purified PP_0375 against unmodified and
    PqqE-cross-linked PqqA by LC-MS/MS.
  experiment_type: targeted genetics and substrate-resolved peptidase assay
