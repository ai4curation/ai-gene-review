  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: >-
  PP_0375 encodes an S9-family serine peptidase located immediately downstream
  of pqqE in the Pseudomonas putida KT2440 pyrroloquinoline quinone (PQQ)
  locus. The KT2440 operon study refers to PP_0375 as pqqG, and related
  Pseudomonas proteins are called PqqG, PqqM, or PqqH. Sequence and locus
  conservation support a PQQ-pathway association, but the native substrate and
  whether the protein acts in precursor maturation, PQQ excretion, or both have
  not been established.
