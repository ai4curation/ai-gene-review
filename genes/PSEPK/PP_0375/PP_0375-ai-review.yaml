      supporting_text: The pqq gene cluster (pqqFABCDEG) encodes at least two independent transcripts
    - reference_id: PMID:19902179
      supporting_text: Gene PA1990 of Pseudomonas aeruginosa, located downstream of pqqE and encoding a putative peptidase, was shown to be involved in excretion of PQQ into the culture supernatant.
