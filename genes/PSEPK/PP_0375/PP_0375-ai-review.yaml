- term:
    id: GO:0018189
    label: pyrroloquinoline quinone biosynthetic process
  evidence_type: ISS
  original_reference_id: PMID:18055583
  qualifier: involved_in
  review:
    summary: >-
      PP_0375 is the S9 peptidase-family protein identified as the putative
      pqqG member of the KT2440 pqqFABCDEG locus. Disrupting the close B16
      PqqM ortholog abolished PQQ production, while a close Pseudomonas
      aeruginosa ortholog has direct genetic evidence for PQQ excretion rather
      than a defined biosynthetic reaction.
    action: NEW
    reason: >-
      Conserved locus position, sequence-family identity, cotranscription with
      pqqCDE in KT2440, and the B16 pqqM loss-of-PQQ phenotype support this
      pathway-level ISS proposal. The PA1990/PqqH phenotype shows that an
      S9-family role can instead affect PQQ excretion without defining a
      biosynthetic reaction. The proposal is therefore not a substrate or
      reaction claim and remains outside the core-function summary.
    additional_reference_ids:
    - PMID:27287323
    - PMID:19902179
    supported_by:
