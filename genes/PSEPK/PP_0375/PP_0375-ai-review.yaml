- term:
    id: GO:0006508
    label: proteolysis
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: involved_in
  review:
    summary: >-
      Proteolysis is a reasonable broad process annotation for PP_0375. The
      protein contains an S9 peptidase catalytic domain and is annotated as a
      prolyl oligopeptidase-family protein, although its native substrate is
      unknown.
    action: KEEP_AS_NON_CORE
    reason: >-
      The sequence-family evidence supports a proteolytic role, but the generic
      process is less informative than the serine-peptidase molecular function
      and the PQQ-pathway association. It does not specify that PqqA is the
      substrate.
