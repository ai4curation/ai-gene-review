      supporting_text: The NCBI protein record names AAX10035.1 as the *Pseudomonas fluorescens* B16 `pqqG` gene product, a dipeptidyl aminopeptidase/acylaminoacyl-peptidase.
    - reference_id: file:PSEPK/PP_0375/PP_0375-bioinformatics/RESULTS.md
      supporting_text: B16 full text names `pqqM` among 11 ORFs and states that "the Tn3-gusA insertions in each ORF abolished PQQ production"
