  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: glnD encodes the bifunctional PII uridylyltransferase/uridylyl-removing enzyme in Pseudomonas
  putida KT2440. The protein senses nitrogen status through glutamine and controls the uridylylation state
  of PII proteins, thereby regulating nitrogen assimilation and metabolism.
