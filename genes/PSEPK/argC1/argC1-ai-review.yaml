- id: file:PSEPK/argC1/argC1-deep-research-openscientist.md
  title: OpenScientist functional synthesis for PSEPK ArgC1
  findings:
  - statement: >-
      The report identifies the exact accession as a type 1 ArgC protein and
      retrieves the NADPH-dependent AGPR reaction. Its claims that KT2440 lacks
      ArgA, that ArgC1 is the dominant isoenzyme, and that ArgC2 lacks intact
      catalytic motifs are contradicted or unsupported and are not used here.
    supporting_text: >-
      N-acetyl-L-glutamyl-5-phosphate + NADPH + H⁺ →
      N-acetyl-L-glutamate-5-semialdehyde + NADP⁺ + phosphate
