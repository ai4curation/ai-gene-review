id: Q88QQ6
gene_symbol: argC1
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: >-
  ArgC1 (PP_0432) is a type 1 N-acetyl-gamma-glutamyl-phosphate reductase
  (EC 1.2.1.38). It uses NADPH to reduce N-acetyl-L-glutamyl 5-phosphate to
  N-acetyl-L-glutamate 5-semialdehyde in the acetylated-ornithine route to
  L-arginine. KT2440 also encodes the type 2 isoenzyme ArgC2.
existing_annotations:
- term:
    id: GO:0003942
    label: N-acetyl-gamma-glutamyl-phosphate reductase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: This is the defining ArgC1 molecular function.
    action: ACCEPT
    reason: The reviewed UniProt record assigns EC 1.2.1.38, RHEA:21588, and the type 1 ArgC family to Q88QQ6.
    supported_by:
    - reference_id: file:PSEPK/argC1/argC1-uniprot.txt
      supporting_text: Full=N-acetyl-gamma-glutamyl-phosphate reductase 1
    - reference_id: file:PSEPK/argC1/argC1-deep-research-openscientist.md
      supporting_text: >-
        N-acetyl-L-glutamyl-5-phosphate + NADPH + H⁺ →
        N-acetyl-L-glutamate-5-semialdehyde + NADP⁺ + phosphate
- term:
    id: GO:0005737
    label: cytoplasm
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: located_in
  review:
    summary: ArgC1 is a soluble cytoplasmic biosynthetic enzyme.
    action: KEEP_AS_NON_CORE
    reason: The location is supported but is secondary to the reaction.
- term:
    id: GO:0006526
    label: L-arginine biosynthetic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: involved_in
  review:
    summary: ArgC1 performs the third acetylated-ornithine reaction during L-arginine synthesis.
    action: ACCEPT
    reason: The reviewed UniProt pathway assignment directly supports this process.
- term:
    id: GO:0016620
    label: oxidoreductase activity, acting on the aldehyde or oxo group of donors,
      NAD or NADP as acceptor
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: This broad oxidoreductase term is redundant with the specific ArgC reaction.
    action: MARK_AS_OVER_ANNOTATED
    reason: GO:0003942 captures the substrate-specific NADPH-dependent reaction.
- term:
    id: GO:0051287
    label: NAD binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: The curated ArgC1 reaction uses NADP(H), not NAD(H).
    action: REMOVE
    reason: Reviewed UniProt and HAMAP specify NADPH-dependent reduction; this broad-domain InterPro mapping assigns the wrong nicotinamide cofactor.
- term:
    id: GO:0070401
    label: NADP+ binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: NADP(H) is the redox cofactor for the ArgC1 reaction.
    action: KEEP_AS_NON_CORE
    reason: Correct supporting chemistry, but the specific reductase activity is more informative.
