  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: Trigger factor (Tig) is the ribosome-associated molecular chaperone that
  is the first chaperone to contact nascent polypeptide chains as they emerge from
  the ribosomal exit tunnel, where it promotes co-translational protein folding and
  shields nascent chains from premature misfolding and aggregation by maintaining
  them in an open, folding-competent conformation. It is a three-domain protein - an
  N-terminal domain that binds the large ribosomal subunit near the polypeptide exit
  tunnel, a central FKBP-type peptidyl-prolyl cis-trans isomerase (PPIase, rotamase;
  EC 5.2.1.8) domain that catalyzes cis-trans isomerization of Xaa-Pro peptide bonds,
  and a C-terminal domain that carries intrinsic chaperone (holdase) activity. About
  half of the cellular pool is bound to ribosomes at the exit tunnel and the remainder
  is free in the cytoplasm. Trigger factor belongs to the FKBP-type PPIase family,
  Tig subfamily.
