- term:
    id: GO:0043335
    label: protein unfolding
  evidence_type: IEA
  original_reference_id: GO_REF:0000118
  qualifier: involved_in
  review:
    summary: This TreeGrafter/PANTHER transfer describes trigger factor as involved
      in protein unfolding. Trigger factor is a holdase/foldase that keeps nascent
      chains in an open conformation; it is not an active unfoldase or disaggregase.
    action: MODIFY
    reason: The term protein unfolding mischaracterizes the activity. Trigger factor
      binds and holds nascent or unfolded polypeptides in an open conformation rather
      than actively unfolding folded proteins. The molecular function is better captured
      by unfolded protein binding (GO:0051082).
