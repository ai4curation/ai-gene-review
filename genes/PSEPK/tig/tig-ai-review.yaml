      PTHR30560:SF3.
  - statement: The family name "TRIGGER FACTOR CHAPERONE AND PEPTIDYL-PROLYL CIS/TRANS
      ISOMERASE" confirms the dual trigger-factor chaperone plus PPIase function of
      tig, while the ", CHLOROPLASTIC" tag on the SF3 subfamily is a eukaryote-biased
      naming artifact and does not imply chloroplast localization for this bacterial
      protein.
