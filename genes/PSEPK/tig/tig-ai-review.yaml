- term:
    id: GO:0015031
    label: protein transport
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: involved_in
  review:
    summary: The UniRule/HAMAP function line states trigger factor is involved in
      protein export, reflecting a general/historical role in handling substrates
      destined for export. This is peripheral rather than the core function.
    action: KEEP_AS_NON_CORE
    reason: Plausible but homology-only and peripheral. In bacteria trigger factor
      is primarily a cytosolic co-translational folding chaperone; the dedicated export
      holdase role belongs to SecB. The export/transport involvement is broad and
      not the core function, so it is retained as non-core rather than as a core function.
    supported_by:
