proposed_new_terms: []
suggested_questions:
- question: Does P. putida trigger factor cooperate with the DnaK/DnaJ and GroEL/ES
    systems to handle overlapping nascent-chain substrate pools, as established in
    E. coli, and does its loss become lethal only in combination with dnaK deletion?
- question: What is the substrate specificity of P. putida trigger factor, and does
    it contribute to folding of the diverse catabolic and stress-response enzymes
    associated with this metabolically versatile soil bacterium?
suggested_experiments:
- experiment_type: selective ribosome profiling
  description: Use selective ribosome profiling against trigger factor in P. putida
    KT2440 to map the nascent-chain substrate repertoire and the timing of co-translational
    engagement at the exit tunnel.
- experiment_type: genetic epistasis
  description: Construct tig single, dnaK single, and tig/dnaK double deletion mutants
    in P. putida and assay growth, temperature sensitivity, and protein aggregation
    to test functional redundancy of trigger factor with the DnaK chaperone system.
- experiment_type: enzyme assay
  description: Purify recombinant P. putida trigger factor and measure PPIase (rotamase)
    activity with a proline-containing peptide substrate and holdase activity in an
    aggregation-prevention assay to directly confirm the homology-predicted activities.
