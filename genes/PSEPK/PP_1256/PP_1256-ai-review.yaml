id: Q88NF5
gene_symbol: PP_1256
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: >-
  PP_1256 encodes an aldehyde dehydrogenase-family enzyme in Pseudomonas putida
  KT2440 that is computationally annotated as 2,5-dioxovalerate dehydrogenase.
  The predicted reactions oxidize 2,5-dioxopentanoate to 2-oxoglutarate using
  either NAD+ or NADP+, placing the protein in sugar-acid or oxoaldehyde
  metabolism adjacent to pentose and uronate interconversion maps.
existing_annotations:
- term:
    id: GO:0016491
    label: oxidoreductase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: >-
      The broad oxidoreductase parent is consistent with the aldehyde
      dehydrogenase domain, but less informative than the specific
      2,5-dioxovalerate dehydrogenase annotations already present.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      UniProt records PP_1256 as a 2,5-dioxovalerate dehydrogenase with both
      NAD+ and NADP+ Rhea reactions. The parent oxidoreductase term is true but
      should not be treated as the core exported function when the specific
      enzyme activity is available.
    supported_by:
    - reference_id: file:PSEPK/PP_1256/PP_1256-uniprot.txt
      supporting_text: 'DE   RecName: Full=2,5-dioxovalerate dehydrogenase'
    - reference_id: file:PSEPK/PP_1256/PP_1256-uniprot.txt
      supporting_text: 'FT                   /note="Aldehyde dehydrogenase"'
