    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      The InterPro family assignment supports aldehyde dehydrogenase chemistry,
      while UniProt/Rhea provide the more precise NAD+ and NADP+
      2,5-dioxovalerate dehydrogenase reactions.
    supported_by:
    - reference_id: file:PSEPK/PP_1256/PP_1256-uniprot.txt
      supporting_text: 'CC   -!- SIMILARITY: Belongs to the aldehyde dehydrogenase family.'
    - reference_id: file:PSEPK/PP_1256/PP_1256-uniprot.txt
