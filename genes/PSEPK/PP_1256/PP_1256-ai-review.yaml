suggested_questions:
- question: What physiological substrate and sugar-acid route, if any, use PP_1256 in KT2440?
- question: Are PP_1256, PP_2585, and PP_3602 redundant 2,5-dioxovalerate dehydrogenases or condition-specific paralogs?
suggested_experiments:
- description: >-
