description: pcaC encodes 4-carboxymuconolactone decarboxylase, a protocatechuate-branch beta-ketoadipate
  pathway enzyme. It converts the PcaB product 4-carboxymuconolactone downstream toward beta-ketoadipate
  intermediates during aromatic compound catabolism in KT2440.
