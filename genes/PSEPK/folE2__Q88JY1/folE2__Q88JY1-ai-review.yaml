taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: folE2 (PP_2512/Q88JY1) encodes a canonical-family GTP cyclohydrolase I paralog that converts GTP to the pterin
  precursor 7,8-dihydroneopterin triphosphate. It is one of multiple P. putida KT2440 GTP cyclohydrolase I/FolE-like entries
  in ppu00790, so its specific contribution relative to folE1 and the GCYH-IB folE2 paralog Q88HM9 remains unresolved.
