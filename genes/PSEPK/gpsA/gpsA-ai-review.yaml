  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: >-
  gpsA (locus PP_4169) encodes the biosynthetic glycerol-3-phosphate dehydrogenase
  [NAD(P)+] (EC 1.1.1.94) of Pseudomonas putida KT2440. The cytoplasmic enzyme catalyzes
  the NAD(P)H-dependent reduction of the glycolytic intermediate dihydroxyacetone phosphate
  (glycerone phosphate, DHAP) to sn-glycerol 3-phosphate (G3P). G3P is the committed
  precursor for glycerophospholipid (membrane) biosynthesis, making GpsA the entry point
  that links central carbon metabolism to phospholipid synthesis. The enzyme belongs to the
  NAD-dependent glycerol-3-phosphate dehydrogenase family, with an N-terminal NAD(P)-binding
  Rossmann-like domain, and can use either NAD(H) or NADP(H) as the redox cofactor. In vivo
  the physiologically relevant flux is in the biosynthetic (reductive) DHAP-to-G3P direction.
