suggested_questions:
- question: Is GpsA the sole route to sn-glycerol 3-phosphate for phospholipid biosynthesis in
    P. putida KT2440, or can G3P also be supplied by glycerol kinase (GlpK) under glycerol-rich
    conditions?
  experts:
  - Pseudomonas lipid metabolism experts
- question: What is the in vivo cofactor preference (NADH vs NADPH) of P. putida GpsA, and how
    does it integrate with the cell's redox/NADPH balance during membrane lipid synthesis?
  experts:
  - Bacterial enzymology experts
suggested_experiments:
- experiment_type: enzyme kinetics assay
  description: Express and purify recombinant P. putida GpsA and measure steady-state kinetics
    for DHAP reduction with NADH and with NADPH to quantify dual cofactor specificity and the
    preferred physiological direction.
- experiment_type: gene knockout / complementation
  description: Construct a gpsA deletion in KT2440 and test for glycerol-3-phosphate auxotrophy
    and membrane phospholipid defects, with complementation to confirm the biosynthetic role.
- experiment_type: metabolite tracing
  description: Use isotopically labeled glucose/DHAP and lipidomics to trace flux through GpsA
    into sn-glycerol 3-phosphate and downstream glycerophospholipids in KT2440.
