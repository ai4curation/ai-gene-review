- term:
    id: GO:0046168
    label: glycerol-3-phosphate catabolic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: involved_in
  review:
    summary: Incorrect for this gene. gpsA is the biosynthetic isozyme that produces G3P; it
      does not catabolize it. G3P catabolism is carried out by the distinct respiratory GlpD/GlpABC
      dehydrogenases. This is a family-level InterPro transfer that conflates the two directions.
    action: REMOVE
    reason: The biosynthetic GpsA produces rather than degrades glycerol-3-phosphate; the
      catabolic annotation is the wrong direction for this gene. PANTHER classifies gpsA in
      the biosynthetic NAD(P)+ glycerol-3-phosphate dehydrogenase family/subfamily
      (PTHR11728 / PTHR11728:SF1), despite the eukaryote-biased ", CHLOROPLASTIC" subfamily
      naming artifact, reinforcing the G3P-producing rather than G3P-catabolizing assignment.
    supported_by:
