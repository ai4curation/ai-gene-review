description: fbpA (PP_5196) encodes a predicted periplasmic iron(III)-binding substrate-binding
  component of the PP_5195-fbpA iron ABC import locus. Its iron(III) ABC-transporter product
  name, ferric-binding domain, iron keyword, signal peptide, and iron-utilization PANTHER
  subfamily support ferric/iron binding.
