    action: MARK_AS_OVER_ANNOTATED
    reason: GO:0003985/GO:0003988 are more informative.
- term:
    id: GO:0016747
    label: acyltransferase activity, transferring groups other than amino-acyl groups
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: This broad acyltransferase grouping is redundant with the specific thiolase terms.
    action: MARK_AS_OVER_ANNOTATED
    reason: It lacks substrate specificity.
- term:
    id: GO:0033812
    label: 3-oxoadipyl-CoA thiolase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: 3-oxoadipyl-CoA thiolase activity is not supported for BktB.
    action: REMOVE
    reason: BktB is a beta-ketothiolase/acetoacetyl-CoA thiolase side-node enzyme, not the PcaF/PaaJ
      beta-ketoadipate thiolase.
