  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: 'bktB encodes beta-ketothiolase BktB, a thiolase-family enzyme with acetyl-CoA acetyltransferase/acyltransferase
  chemistry. It is a lipid or CoA-metabolism side-node enzyme in the broad KEGG benzoate map rather than
  a dedicated beta-ketoadipate thiolase.'
existing_annotations:
