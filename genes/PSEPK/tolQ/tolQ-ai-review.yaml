id: Q88NI8
gene_symbol: tolQ
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: >-
  tolQ encodes the inner-membrane TolQ component of the Gram-negative Tol-Pal
  envelope system. TolQ is an ExbB/TolQ-family multi-pass membrane protein that
  works with TolR and TolA to energize the Tol-Pal network linking the inner
  membrane, periplasm, peptidoglycan, and outer membrane. In the Tol-Pal system
  this supports outer-membrane invagination during cell division and helps
  maintain outer-membrane integrity; bacteriocin or protein import annotations
  are secondary domain/family contexts rather than the core Pseudomonas putida
  KT2440 pathway role.
