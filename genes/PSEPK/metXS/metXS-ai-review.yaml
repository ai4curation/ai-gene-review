suggested_questions:
- question: Does KT2440 rely primarily on the MetXS plus MetZ O-succinylhomoserine route
    under methionine-limited growth, or can the O-acetylhomoserine route substitute?
suggested_experiments:
- description: Compare growth of metXS, metZ, and PP_2528 deletion strains in defined
    medium with and without methionine, homocysteine, or sulfide supplementation.
  experiment_type: targeted genetics and metabolite rescue
