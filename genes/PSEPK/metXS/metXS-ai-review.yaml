      supporting_text: "Homoserine O-succinyltransferase"
    - reference_id: file:PSEPK/metXS/metXS-goa.tsv
      supporting_text: "GO:0016747\tacyltransferase activity, transferring groups other than amino-acyl groups"
- term:
    id: GO:0008899
    label: homoserine O-succinyltransferase activity
  evidence_type: EXP
  original_reference_id: PMID:28581482
  qualifier: enables
  review:
    summary: Experimental homoserine O-succinyltransferase activity is the defining MetXS function.
    action: ACCEPT
    reason: The GOA experimental annotation agrees with the reviewed UniProt catalytic
      activity and the primary MetA/MetX-family study, which tested diverse acyl-L-homoserine
      transferases and showed that these families are often misassigned by substrate.
    supported_by:
    - reference_id: file:PSEPK/metXS/metXS-uniprot.txt
      supporting_text: "ECO:0000269|PubMed:28581482"
    - reference_id: file:PSEPK/metXS/metXS-goa.tsv
      supporting_text: "GO:0008899\thomoserine O-succinyltransferase activity"
    - reference_id: PMID:28581482
      supporting_text: "We determined the enzymatic activities of 100 enzymes from diverse species"
