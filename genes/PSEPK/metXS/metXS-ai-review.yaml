id: Q88CT3
gene_symbol: metXS
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: metXS (PP_5097) encodes a cytosolic homoserine O-succinyltransferase
  that activates L-homoserine to O-succinyl-L-homoserine for de novo L-methionine
  biosynthesis. Although the protein belongs to a MetX-like acyltransferase family,
  UniProt and the experimental GOA annotation assign the succinyl-CoA-dependent
  MetA/MetXS reaction rather than homoserine O-acetyltransferase activity.
existing_annotations:
- term:
    id: GO:0004414
    label: homoserine O-acetyltransferase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: The acetyltransferase assignment is not appropriate for KT2440 MetXS.
    action: REMOVE
    reason: The reviewed UniProt entry names this enzyme homoserine O-succinyltransferase,
      records EC 2.3.1.46, and the GOA table also contains an experimental homoserine
      O-succinyltransferase annotation. The acetyltransferase term appears to come
      from broader family propagation in a family where MetX/MetA substrate usage is
      known to be frequently misannotated.
    supported_by:
    - reference_id: file:PSEPK/metXS/metXS-uniprot.txt
      supporting_text: "RecName: Full=Homoserine O-succinyltransferase"
    - reference_id: file:PSEPK/metXS/metXS-goa.tsv
      supporting_text: "GO:0008899\thomoserine O-succinyltransferase activity"
    - reference_id: PMID:28581482
      supporting_text: "Members of these families are prone to incorrect annotation because MetX and MetA enzymes are assumed to always use acetyl-CoA and succinyl-CoA, respectively."
    - reference_id: file:PSEPK/metXS/metXS-deep-research-openscientist.md
      supporting_text: "PP_5097 is a homoserine O-**succinyl**transferase (EC 2.3.1.46), not an acetyltransferase"
- term:
    id: GO:0005737
    label: cytoplasm
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: located_in
  review:
    summary: Cytoplasm is the expected location for this soluble amino-acid biosynthetic enzyme.
    action: ACCEPT
    reason: UniProt explicitly places MetXS in the cytoplasm, consistent with a soluble
      homoserine acyltransferase acting in methionine biosynthesis.
    supported_by:
    - reference_id: file:PSEPK/metXS/metXS-uniprot.txt
      supporting_text: "SUBCELLULAR LOCATION: Cytoplasm"
    - reference_id: file:PSEPK/metXS/metXS-goa.tsv
      supporting_text: "GO:0005737\tcytoplasm"
- term:
    id: GO:0008899
    label: homoserine O-succinyltransferase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: Homoserine O-succinyltransferase activity is the core MetXS molecular function.
    action: ACCEPT
    reason: UniProt describes the reaction from L-homoserine and succinyl-CoA to
      O-succinyl-L-homoserine and CoA, with EC 2.3.1.46/Rhea:22008, matching this
      GO term.
    supported_by:
    - reference_id: file:PSEPK/metXS/metXS-uniprot.txt
      supporting_text: "EC=2.3.1.46"
    - reference_id: file:PSEPK/metXS/metXS-uniprot.txt
      supporting_text: "Reaction=L-homoserine + succinyl-CoA = O-succinyl-L-homoserine + CoA"
    - reference_id: file:PSEPK/metXS/metXS-goa.tsv
      supporting_text: "GO:0008899\thomoserine O-succinyltransferase activity"
- term:
    id: GO:0009092
    label: L-homoserine metabolic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000118
  qualifier: involved_in
  review:
    summary: L-homoserine metabolism is correct but secondary to the methionine-biosynthesis role.
    action: KEEP_AS_NON_CORE
    reason: MetXS uses L-homoserine as substrate, but the biologically informative
      pathway context is activation of homoserine for L-methionine biosynthesis.
    supported_by:
    - reference_id: file:PSEPK/metXS/metXS-uniprot.txt
      supporting_text: "PATHWAY: Amino-acid biosynthesis; L-methionine biosynthesis via de novo"
    - reference_id: file:PSEPK/metXS/metXS-goa.tsv
      supporting_text: "GO:0009092\tL-homoserine metabolic process"
- term:
    id: GO:0016747
    label: acyltransferase activity, transferring groups other than amino-acyl groups
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: The generic acyltransferase term is correct but should be replaced by the specific succinyltransferase activity.
    action: MODIFY
    reason: MetXS is an acyltransferase, but the specific curated activity is homoserine
      O-succinyltransferase activity.
    proposed_replacement_terms:
