  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: PP_2240 encodes an unresolved fused cell-membrane ABC efflux transporter with ABC transmembrane and ATP-binding domains. Current first-pass evidence supports generic ABC-type ATP-dependent transmembrane transport, but does not identify a substrate or connect the protein to the type-I protein secretion candidates.
