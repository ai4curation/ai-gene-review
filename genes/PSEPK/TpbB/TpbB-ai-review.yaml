description: TpbB (PP_4670) encodes a CHASE8/HAMP/GGDEF diguanylate cyclase candidate in Pseudomonas putida
  KT2440. It is a membrane-associated c-di-GMP synthesis node in the ppu02025 biofilm bucket, likely linking
  periplasmic or membrane-proximal sensing to c-di-GMP production.
