  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: PP_0076 encodes a signal-peptide-bearing choline betaine-binding protein in the OpuAC/ABC glycine-betaine substrate-binding family. Its InterPro2GO annotations support a periplasmic substrate-recognition role in choline-family compatible-solute ABC uptake, while the cognate membrane and ATPase partners remain unresolved.
