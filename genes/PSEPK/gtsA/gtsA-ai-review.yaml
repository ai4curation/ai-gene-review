  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: gtsA (PP_1015) encodes the solute-binding component of the PP_1015-PP_1018 Gts glucose ABC uptake system in Pseudomonas putida KT2440. The product is annotated as a mannose/glucose ABC transporter glucose-binding periplasmic protein, and a P. putida glucose-catabolism study identifies PP1015-PP1018 as the ABC uptake system that transports glucose to the cytoplasm.
