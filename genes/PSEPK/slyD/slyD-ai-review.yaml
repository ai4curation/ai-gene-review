  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: SlyD is a cytoplasmic FKBP-type peptidyl-prolyl cis-trans isomerase. It catalyzes cis-trans isomerization of
  peptidyl-prolyl bonds and is also annotated as a chaperone-like factor linked to protein refolding and hydrogenase metallocenter
  assembly; the first-pass core call is the conserved PPIase/foldase activity.
