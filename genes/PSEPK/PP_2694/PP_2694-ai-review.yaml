suggested_questions:
- question: What aldehyde or oxo-acid substrate is used by PP_2694 in KT2440?
- question: Is PP_2694 linked to pentose/glucuronate metabolism, or is it only a broad aldehyde-dehydrogenase side node in KEGG ppu00040?
suggested_experiments:
- description: >-
    Screen purified PP_2694 against aldehyde, sugar-acid, and oxo-acid substrate
    panels with NAD+ and NADP+.
  experiment_type: enzyme substrate and cofactor screen
- description: >-
    Test PP_2694 mutant growth and metabolite accumulation on uronate,
    aldarate, and pentose-derived substrates.
  experiment_type: targeted genetics and metabolomics
