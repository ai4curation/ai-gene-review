id: Q88JF5
gene_symbol: PP_2694
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: >-
  PP_2694 encodes an aldehyde dehydrogenase-family protein in Pseudomonas
  putida KT2440. The current metadata support a broad NAD(P)-linked
  aldehyde/oxo-group oxidoreductase function, but do not establish a
  substrate-specific enzyme activity or a specific pentose/glucuronate pathway
  role.
existing_annotations:
- term:
    id: GO:0016491
    label: oxidoreductase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: >-
      The broad oxidoreductase annotation is sound but should be refined to the
      aldehyde/oxo-group NAD(P)-acceptor parent supported by the domain and
      UniProt cross-reference.
    action: MODIFY
    reason: >-
      PP_2694 carries an aldehyde dehydrogenase domain and UniProt lists the
      more informative GO:0016620 aldehyde/oxo-group oxidoreductase activity,
      but no substrate-specific activity is available.
    proposed_replacement_terms:
    - id: GO:0016620
      label: oxidoreductase activity, acting on the aldehyde or oxo group of donors, NAD or NADP as acceptor
    supported_by:
    - reference_id: file:PSEPK/PP_2694/PP_2694-uniprot.txt
      supporting_text: 'DE   SubName: Full=Aldehyde dehydrogenase family protein'
    - reference_id: file:PSEPK/PP_2694/PP_2694-uniprot.txt
      supporting_text: 'DR   GO; GO:0016620; F:oxidoreductase activity, acting on the aldehyde or oxo group of donors, NAD or NADP as acceptor; IEA:InterPro.'
