id: Q88DB5
gene_symbol: parC
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: parC (PP_4912) encodes DNA topoisomerase IV subunit A in Pseudomonas putida KT2440. Together with ParE it forms
  a type II topoisomerase heterotetramer that relaxes supercoiled DNA and performs the decatenation events required for segregation
  of circular chromosomes. ParC provides the GyrA/ParC-family DNA cleavage/rejoining subunit of the Topo IV complex; ATP binding
  is retained only as complex-level context because ParE is the ATPase subunit.
