description: pde (PP_4917) encodes a class III 3',5'-cyclic-nucleotide phosphodiesterase in Pseudomonas
  putida KT2440. It is retained in the ppu02025 turnover bucket as broad cyclic-nucleotide phosphodiesterase
  side context; the available GOA/UniProt evidence does not establish c-di-GMP-specific EAL-type hydrolysis.
