description: PP_1798 is a predicted outer-membrane efflux protein in Pseudomonas putida KT2440. It belongs
  to the outer membrane factor/TolC-like family and is best treated as an efflux-channel component of
  a tripartite transporter, contributing to resistance or export boundary context rather than a dedicated
  beta-lactamase.
