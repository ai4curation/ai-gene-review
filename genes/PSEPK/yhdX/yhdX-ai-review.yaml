  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: yhdX (PP_1298) encodes a predicted multi-pass inner-membrane permease subunit of the PP_1297-PP_1300 YhdWXYZ
  amino-acid ABC importer. UniProt and Asta identify it as a binding-protein-dependent amino-acid ABC transporter permease
  with MetI-like transporter features, supporting a membrane-channel role in ATP-driven amino-acid uptake.
