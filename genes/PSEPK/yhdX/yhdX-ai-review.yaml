suggested_questions:
- question: What is the exact substrate specificity of the PP_1297-PP_1300 YhdWXYZ ABC importer, and does it prefer one amino
    acid or a broader class of amino acids?
suggested_experiments:
- description: Measure amino-acid uptake and growth phenotypes for a yhdX deletion or depletion strain across a panel of individual
    amino acids, then compare with complementation by the intact PP_1297-PP_1300 locus.
  experiment_type: targeted ABC-importer mutant substrate-uptake and growth assay
