proposed_new_terms: []
suggested_questions:
- question: Does KT2440 bdhA oxidize/reduce 2,3-butanediol in vivo, or does this zinc alcohol dehydrogenase prefer a different polyol or aromatic alcohol substrate?
suggested_experiments:
- description: Purify BdhA and assay NAD(H)-dependent activity against (R,R)-2,3-butanediol, acetoin, and related alcohol/polyol substrates.
  experiment_type: biochemical enzyme assay
