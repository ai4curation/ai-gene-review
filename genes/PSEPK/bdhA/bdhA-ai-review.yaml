id: Q88QE2
gene_symbol: bdhA
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: >-
  bdhA encodes a zinc-containing medium-chain alcohol/polyol dehydrogenase in
  Pseudomonas putida KT2440. UniProt and GOA assign EC 1.1.1.4 and
  (R,R)-butanediol dehydrogenase activity, placing it as a butanediol/polyol
  redox side node in the broad KEGG butanoate metabolism map. The first-pass
  retrieval did not find gene-specific KT2440 biochemical literature, so the
  current review treats the substrate-specific EC mapping as the best supported
  function and keeps broader oxidoreductase terms as secondary context.
existing_annotations:
- term:
    id: GO:0000721
    label: (R,R)-butanediol dehydrogenase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000003
  qualifier: enables
  review:
    summary: >-
      This EC-derived term is the specific predicted molecular function for
      bdhA.
    action: ACCEPT
    reason: >-
      UniProt describes Q88QE2 as 2,3-butanediol dehydrogenase with EC 1.1.1.4,
      and GOA carries the matching (R,R)-butanediol dehydrogenase activity
      annotation.
    supported_by:
    - reference_id: file:PSEPK/bdhA/bdhA-uniprot.txt
      supporting_text: 'DE   SubName: Full=2,3-butanediol dehydrogenase'
    - reference_id: file:PSEPK/bdhA/bdhA-goa.tsv
      supporting_text: "GO:0000721\t(R,R)-butanediol dehydrogenase activity"
- term:
    id: GO:0008270
    label: zinc ion binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: >-
      Zinc binding is consistent with the medium-chain zinc alcohol
      dehydrogenase family assignment.
    action: KEEP_AS_NON_CORE
    reason: >-
      This is a valid cofactor/metal-binding annotation, but the catalytic
      dehydrogenase activity is the core functional annotation.
    supported_by:
    - reference_id: file:PSEPK/bdhA/bdhA-uniprot.txt
      supporting_text: 'CC       Name=Zn(2+); Xref=ChEBI:CHEBI:29105;'
    - reference_id: file:PSEPK/bdhA/bdhA-uniprot.txt
      supporting_text: 'DR   InterPro; IPR002328; ADH_Zn_CS.'
- term:
    id: GO:0016491
    label: oxidoreductase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: >-
      Oxidoreductase activity is true but too broad relative to the EC-derived
      butanediol dehydrogenase activity.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      GO:0000721 captures the substrate-level activity more informatively.
    supported_by:
    - reference_id: file:PSEPK/bdhA/bdhA-goa.tsv
      supporting_text: "GO:0016491\toxidoreductase activity"
- term:
    id: GO:0016616
    label: oxidoreductase activity, acting on the CH-OH group of donors, NAD or NADP
      as acceptor
  evidence_type: IEA
  original_reference_id: GO_REF:0000117
  qualifier: enables
  review:
    summary: >-
      This alcohol/CH-OH oxidoreductase class is compatible with the predicted
      enzyme chemistry but less specific than the EC-derived butanediol
      dehydrogenase term.
    action: KEEP_AS_NON_CORE
    reason: >-
      Retain as secondary classification while using GO:0000721 as the core
      molecular function.
    supported_by:
    - reference_id: file:PSEPK/bdhA/bdhA-goa.tsv
      supporting_text: "GO:0016616\toxidoreductase activity, acting on the CH-OH group of donors, NAD or NADP as acceptor"
