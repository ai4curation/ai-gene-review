description: cusA encodes a CusA/CzcA-family RND transmembrane transporter in Pseudomonas putida KT2440.
  Its RND-family and CusA-like domains support a plasma-membrane cation efflux role in the czcC-cusBAF
  copper or metal-cation export locus.
