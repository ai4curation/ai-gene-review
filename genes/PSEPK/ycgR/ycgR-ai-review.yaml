description: ycgR encodes a PilZ-domain cyclic-di-GMP-binding flagellar brake protein in Pseudomonas
  putida KT2440. It localizes to the flagellar basal body and negatively modulates flagellum-dependent
  motility by regulating motor speed in response to c-di-GMP.
