id: Q88MC9
gene_symbol: PP_1644
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: >-
  PP_1644 encodes a WrbA/flavodoxin-like FMN-binding NAD(P)H:quinone
  oxidoreductase-family protein. The current evidence supports a generic
  quinone reductase/electron-transfer role rather than a committed
  ubiquinone-biosynthetic enzyme; it is therefore treated as a ppu00130 side
  redox node pending stronger pathway-specific evidence.
existing_annotations:
- term:
    id: GO:0003955
    label: NAD(P)H dehydrogenase (quinone) activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: >-
      NAD(P)H dehydrogenase (quinone) activity matches the EC 1.6.5.2
      annotation and WrbA-family context.
    action: ACCEPT
    reason: >-
      UniProt describes Q88MC9 as NAD(P)H dehydrogenase (quinone) and places it
      in the WrbA flavoprotein family.
- term:
    id: GO:0009055
    label: electron transfer activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: >-
      Electron transfer activity is consistent with a quinone reductase but is
      less informative than GO:0003955.
    action: MODIFY
    reason: >-
      The more specific NAD(P)H dehydrogenase (quinone) activity term should be
      used for this flavoprotein-family assignment.
    proposed_replacement_terms:
    - id: GO:0003955
      label: NAD(P)H dehydrogenase (quinone) activity
- term:
    id: GO:0010181
    label: FMN binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: >-
      FMN binding is consistent with the flavodoxin-like WrbA family.
    action: KEEP_AS_NON_CORE
    reason: >-
      Cofactor binding supports the reductase mechanism but is not the core
      enzymatic activity.
- term:
    id: GO:0016020
    label: membrane
  evidence_type: IEA
  original_reference_id: GO_REF:0000118
  qualifier: located_in
  review:
    summary: >-
      Membrane localization is not supported by the current UniProt feature set
      for this soluble flavodoxin-like protein.
    action: UNDECIDED
    reason: >-
      TreeGrafter assigns a broad membrane term, but the first-pass UniProt
      record does not show a transmembrane feature or curated subcellular
      location. Leave unresolved rather than over-interpreting localization.
- term:
    id: GO:0016491
    label: oxidoreductase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: >-
      Oxidoreductase activity is correct but too broad.
    action: MODIFY
    reason: >-
      GO:0003955 captures the more specific NAD(P)H:quinone reductase activity.
    proposed_replacement_terms:
    - id: GO:0003955
      label: NAD(P)H dehydrogenase (quinone) activity
