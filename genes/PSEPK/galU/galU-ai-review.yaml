id: Q88GA4
gene_symbol: galU
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: >-
  galU encodes a predicted UTP:glucose-1-phosphate uridylyltransferase
  (UDP-glucose pyrophosphorylase) in Pseudomonas putida KT2440. The enzyme
  generates UDP-alpha-D-glucose from glucose 1-phosphate and UTP, supplying a
  central nucleotide-sugar donor for UDP-glucose metabolism, UDP-galactose
  recycling through GalE, and cell-envelope polysaccharide precursor pools.
existing_annotations:
- term:
    id: GO:0003983
    label: UTP:glucose-1-phosphate uridylyltransferase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: >-
      UTP:glucose-1-phosphate uridylyltransferase activity is the best-supported
      molecular function for galU/PP_3821.
    action: ACCEPT
    reason: >-
      The GO term matches the UniProt RecName, EC 2.7.7.9 catalytic reaction,
      GalU/TIGR01099 family assignment, and PANTHER UTP-glucose-1-phosphate
      uridylyltransferase family.
    supported_by:
    - reference_id: file:PSEPK/galU/galU-uniprot.txt
      supporting_text: 'DE   RecName: Full=UTP--glucose-1-phosphate uridylyltransferase'
    - reference_id: file:PSEPK/galU/galU-uniprot.txt
      supporting_text: 'CC       Reaction=alpha-D-glucose 1-phosphate + UTP + H(+) = UDP-alpha-D-glucose'
    - reference_id: file:PSEPK/galU/galU-uniprot.txt
      supporting_text: 'DR   GO; GO:0003983; F:UTP:glucose-1-phosphate uridylyltransferase activity; IEA:UniProtKB-EC.'
- term:
    id: GO:0006011
    label: UDP-alpha-D-glucose metabolic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: involved_in
  review:
    summary: >-
      galU directly produces UDP-alpha-D-glucose and is therefore part of
      UDP-alpha-D-glucose metabolism.
    action: ACCEPT
    reason: >-
      This process annotation follows directly from the reaction product and
      InterPro/GOA annotation. In the ppu00052 galactose bucket it should be
      interpreted as a UDP-glucose supply side node rather than a strict Leloir
      reaction.
    supported_by:
    - reference_id: file:PSEPK/galU/galU-uniprot.txt
      supporting_text: 'CC       Reaction=alpha-D-glucose 1-phosphate + UTP + H(+) = UDP-alpha-D-glucose'
    - reference_id: file:PSEPK/galU/galU-uniprot.txt
      supporting_text: 'DR   GO; GO:0006011; P:UDP-alpha-D-glucose metabolic process; IEA:InterPro.'
