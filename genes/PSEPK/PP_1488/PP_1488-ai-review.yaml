taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: PP_1488 encodes a predicted methyl-accepting chemotaxis transducer in the PP_1488-PP_1494
  Wsp-like surface-sensing cluster of Pseudomonas putida KT2440. It has HAMP and MCP signaling domains
  consistent with a membrane chemoreceptor or transducer that feeds the local CheW/CheA/CheB/GGDEF signaling
  branch; the specific ligand or surface cue is unresolved in this first pass.
