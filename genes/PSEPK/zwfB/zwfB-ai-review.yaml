suggested_questions:
- question: What nutrient or stress conditions change the relative flux carried by zwfA, zwfB, and zwfC?
suggested_experiments:
- description: >-
    Compare zwfA, zwfB, zwfC, and combinatorial mutants by enzyme activity,
    13C-flux analysis, and NADPH/NADP measurements across glucose, gluconate,
    and oxidative-stress conditions.
  experiment_type: genetics, enzyme assay, and fluxomics
