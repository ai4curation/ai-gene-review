core_functions:
- description: >-
    Dual-cofactor, NAD-leaning glucose-6-phosphate 1-dehydrogenase paralog that
    catalyzes the first oxidative pentose phosphate pathway step, generating
    6-phosphogluconolactone and reduced pyridine nucleotide. The KT2440 isozyme
    literature identifies zwfA and zwfB as the dominant G6PDH activity
    carriers.
