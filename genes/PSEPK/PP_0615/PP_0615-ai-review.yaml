description: PP_0615 encodes a predicted ATP-binding energy-coupling subunit of the PP_0615-PP_0619 high-affinity branched-chain amino-acid ABC uptake system. Its ABC ATPase domain and LivF-family PANTHER assignment support ATP hydrolysis-driven transport with the adjacent PP_0616 ATP-binding partner, PP_0617/PP_0618 permeases, and PP_0619 periplasmic substrate-binding component.
