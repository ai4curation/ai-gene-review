proposed_new_terms: []
suggested_questions:
- question: >-
    Is the NER activity of P. putida UvrA experimentally confirmed in vivo (e.g., UV
    sensitivity of a uvrA deletion), or is its function entirely inferred from homology?
- question: >-
    Does P. putida UvrA participate in transcription-coupled repair (via Mfd) or in any
    accessory damage-recognition roles beyond canonical global-genome NER?
suggested_experiments:
- experiment_type: phenotypic assay
  hypothesis: >-
    Loss of uvrA sensitizes P. putida to UV irradiation and bulky-adduct-forming agents.
  description: >-
    Construct a uvrA (PP_0483) deletion mutant in P. putida KT2440 and measure survival
    after UV-C exposure and after treatment with mitomycin C or 4-NQO, compared with wild
    type and a complemented strain.
- experiment_type: biochemical assay
  hypothesis: >-
    Recombinant P. putida UvrA exhibits ATP-stimulated preferential binding to
    UV-damaged DNA.
  description: >-
    Purify recombinant UvrA and use electrophoretic mobility shift assays and ATPase
    assays to test ATP-dependent binding to UV-irradiated versus undamaged DNA, and
    reconstitute incision in vitro with UvrB and UvrC.
