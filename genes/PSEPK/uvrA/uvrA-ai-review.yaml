id: Q88QK7
gene_symbol: uvrA
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: >-
  UvrA is the ATP-dependent DNA-damage-recognition subunit of the bacterial nucleotide
  excision repair (NER) UvrABC system. As a dimer it associates with two UvrB subunits to
  form a UvrA2UvrB2 complex that scans duplex DNA for bulky, helix-distorting lesions such
  as UV-induced pyrimidine dimers and chemical adducts. Upon lesion recognition and
  verification by UvrB, the UvrA molecules dissociate, leaving UvrB loaded at the damage
  site to direct the dual incision carried out by UvrC. UvrA is a cytoplasmic protein that
  contains two tandem ABC-type ATPase (P-loop NTPase) nucleotide-binding domains; ATP
  binding and hydrolysis power damage recognition and UvrB loading. It additionally
  coordinates zinc through two C4-type zinc-finger motifs that contribute to its structural
  integrity. Although it belongs to the ABC transporter superfamily by fold, UvrA functions
  in DNA repair rather than membrane transport, and its activity is part of the cellular
  response to DNA damage.
existing_annotations:
- term:
    id: GO:0003677
    label: DNA binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: >-
      UvrA is a DNA-binding protein; it binds duplex DNA and, as part of the UvrA2UvrB2
      complex, scans for damage. This generic DNA-binding term is the parent of the more
      specific damaged-DNA-binding activity that UvrA enables.
    action: ACCEPT
    reason: >-
      DNA binding is a genuine and core property of UvrA, required for its damage-scanning
      function. While generic, it is correct and consistent with the more specific
      excinuclease ABC activity also annotated.
    supported_by:
      - reference_id: file:PSEPK/uvrA/uvrA-uniprot.txt
        supporting_text: "UvrA is an ATPase and a DNA-binding protein."
- term:
    id: GO:0003824
    label: catalytic activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000117
  qualifier: enables
  review:
    summary: >-
      UvrA has catalytic (ATPase) activity, but this root-level molecular function term is
      uninformative and is subsumed by the specific catalytic terms already annotated
      (ATP hydrolysis activity GO:0016887 and excinuclease ABC activity GO:0009381).
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      'catalytic activity' is a top-level placeholder term that conveys no specific
      mechanistic information. More precise activities (ATP hydrolysis activity,
      excinuclease ABC activity) are present, making this annotation redundant.
- term:
    id: GO:0005524
    label: ATP binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: >-
      UvrA contains two ABC-type ATPase nucleotide-binding domains with two ATP-binding
      P-loop motifs (residues 31-38 and 639-646). ATP binding is mechanistically central
      to its damage-recognition and UvrB-loading cycle.
    action: ACCEPT
    reason: >-
      ATP binding is a core, mechanistically essential function of this ABC-family ATPase.
      Although ATP binding is a broad term, it is directly required for UvrA's DNA-damage
      recognition activity and is supported by the two annotated ATP-binding sites.
    supported_by:
      - reference_id: file:PSEPK/uvrA/uvrA-uniprot.txt
        supporting_text: "UvrA is an ATPase and a DNA-binding protein."
      - reference_id: file:PSEPK/uvrA/uvrA-uniprot.txt
        supporting_text: "/ligand=\"ATP\""
- term:
    id: GO:0005737
    label: cytoplasm
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: located_in
  review:
    summary: >-
      UvrA is a soluble cytoplasmic protein, consistent with its role acting on the
      bacterial chromosome.
    action: ACCEPT
    reason: >-
      Cytoplasmic localization is correct for UvrA, which acts on chromosomal DNA in the
      cytoplasm. Supported by the UniProt subcellular location.
    supported_by:
      - reference_id: file:PSEPK/uvrA/uvrA-uniprot.txt
        supporting_text: "Cytoplasm"
- term:
    id: GO:0006281
    label: DNA repair
  evidence_type: IEA
  original_reference_id: GO_REF:0000104
  qualifier: involved_in
  review:
    summary: >-
      UvrA participates in DNA repair, but specifically in nucleotide excision repair
      (GO:0006289), which is already annotated as a more precise child term.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      'DNA repair' is a broad parent of nucleotide-excision repair, which is annotated.
      The specific NER term should be retained in preference to this general process term.
- term:
    id: GO:0006289
    label: nucleotide-excision repair
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: involved_in
  review:
    summary: >-
      UvrA is the damage-recognition subunit of the bacterial NER (UvrABC) system. The
      UvrA2UvrB2 complex scans DNA for lesions and initiates the excision-repair pathway.
    action: ACCEPT
    reason: >-
      Nucleotide-excision repair is the core biological process of UvrA. This is the
      defining function of the UvrABC system and is the most informative process term.
    supported_by:
      - reference_id: file:PSEPK/uvrA/uvrA-uniprot.txt
        supporting_text: "The UvrABC repair system catalyzes the recognition and"
      - reference_id: file:PSEPK/uvrA/uvrA-uniprot.txt
        supporting_text: "A damage recognition complex composed of 2 UvrA and 2 UvrB subunits"
- term:
    id: GO:0006974
    label: DNA damage response
  evidence_type: IEA
  original_reference_id: GO_REF:0000117
  qualifier: involved_in
  review:
    summary: >-
      UvrA acts in the cellular response to DNA damage, but this very broad process term
      is subsumed by the specific nucleotide-excision repair annotation (GO:0006289).
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      'DNA damage response' is a broad ancestor of nucleotide-excision repair. Given the
      specific NER annotation, this general term adds no curation value.
- term:
    id: GO:0008270
    label: zinc ion binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000104
  qualifier: enables
  review:
    summary: >-
      UvrA coordinates zinc through two C4-type zinc-finger motifs (residues 253-280 and
      739-765) that contribute to its structural integrity. This is a real structural
      metal-binding property rather than the core repair function.
    action: KEEP_AS_NON_CORE
    reason: >-
      Zinc binding is supported by the two annotated C4-type zinc fingers and is genuine,
      but it is a structural cofactor role that is ancillary to the core DNA-damage
      recognition and repair functions. Retained as non-core.
    supported_by:
      - reference_id: file:PSEPK/uvrA/uvrA-uniprot.txt
        supporting_text: "C4-type"
      - reference_id: file:PSEPK/uvrA/uvrA-uniprot.txt
        supporting_text: "Zinc-finger"
- term:
    id: GO:0009380
    label: excinuclease repair complex
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: part_of
  review:
    summary: >-
      UvrA is a component of the bacterial excinuclease (UvrABC) repair complex, forming a
      UvrA2UvrB2 damage-recognition assembly during lesion scanning.
    action: ACCEPT
    reason: >-
      UvrA is a bona fide subunit of the excinuclease repair complex. The cellular
      component annotation correctly captures its assembly with UvrB (and the broader
      UvrABC system).
    supported_by:
      - reference_id: file:PSEPK/uvrA/uvrA-uniprot.txt
        supporting_text: "Forms a heterotetramer with UvrB during the search for lesions."
- term:
    id: GO:0009381
    label: excinuclease ABC activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000104
  qualifier: enables
  review:
    summary: >-
      UvrA contributes the ATP-dependent damage-recognition activity of the UvrABC
      excinuclease system, recognizing and processing DNA lesions as part of the complex.
    action: ACCEPT
    reason: >-
      Excinuclease ABC activity is the characteristic molecular function of the UvrABC
      system to which UvrA is annotated across the UvrA family. It is a core, specific
      molecular-function term for this protein.
    supported_by:
      - reference_id: file:PSEPK/uvrA/uvrA-uniprot.txt
        supporting_text: "The UvrABC repair system catalyzes the recognition and"
      - reference_id: file:PSEPK/uvrA/uvrA-uniprot.txt
        supporting_text: "PANTHER; PTHR43152:SF3; UVRABC SYSTEM PROTEIN A"
- term:
    id: GO:0009432
    label: SOS response
  evidence_type: IEA
  original_reference_id: GO_REF:0000104
  qualifier: involved_in
  review:
    summary: >-
      uvrA is a member of the bacterial SOS regulon; its expression is induced as part of
      the SOS response to DNA damage. This reflects regulatory context rather than UvrA's
      direct molecular activity.
    action: KEEP_AS_NON_CORE
    reason: >-
      SOS-response membership is a well-established regulatory feature of uvrA across
      bacteria, but in P. putida it is propagated by homology (IEA) and represents the
      transcriptional/regulatory context rather than the core NER mechanism. Retained as
      non-core.
- term:
    id: GO:0016887
    label: ATP hydrolysis activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: >-
      UvrA is an ABC-family ATPase; its two nucleotide-binding domains bind and hydrolyze
      ATP, and this ATPase cycle powers damage recognition and loading of UvrB.
    action: ACCEPT
    reason: >-
      ATP hydrolysis is a core, mechanistically essential molecular function of UvrA. It is
      directly supported by the ATPase description and the two ABC-transporter/P-loop
      nucleotide-binding domains, and is more specific than the generic 'catalytic activity'.
    supported_by:
      - reference_id: file:PSEPK/uvrA/uvrA-uniprot.txt
        supporting_text: "UvrA is an ATPase and a DNA-binding protein."
