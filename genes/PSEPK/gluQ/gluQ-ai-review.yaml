taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: gluQ encodes glutamyl-Q tRNA(Asp) synthetase, a cytosolic class-I aminoacyl-tRNA-synthetase-like enzyme that
  activates glutamate and transfers it to the queuosine wobble-base moiety of tRNA(Asp). This is best curated as tRNA modification
  context rather than ordinary tRNA(Glu) charging for translation.
