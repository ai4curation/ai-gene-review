- term:
    id: GO:0019346
    label: transsulfuration
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: involved_in
  review:
    summary: Transsulfuration is likely an over-broad family propagation for this direct sulfhydrylation enzyme.
    action: MARK_AS_OVER_ANNOTATED
    reason: The methionine pathway template distinguishes direct sulfhydrylation
      by MetZ from the two-enzyme trans-sulfuration route through cystathionine.
      UniProt describes MetZ as converting O-succinylhomoserine and sulfide directly
      to homocysteine, not as using cystathionine.
    supported_by:
    - reference_id: file:PSEPK/metZ/metZ-uniprot.txt
      supporting_text: "L-homocysteine from O-succinyl-L-homoserine: step 1/1"
    - reference_id: file:modules/experimental/gapmind-mining/cache/gapmind/aa/met.steps
      supporting_text: "homocysteine: homoserine metA metZ"
    - reference_id: file:PSEPK/metZ/metZ-goa.tsv
      supporting_text: "GO:0019346\ttranssulfuration"
- term:
    id: GO:0030170
    label: pyridoxal phosphate binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: Pyridoxal phosphate binding is a catalytic cofactor feature for MetZ.
    action: KEEP_AS_NON_CORE
    reason: PLP binding supports the enzyme mechanism but is secondary to the pathway
      reaction in methionine biosynthesis.
    supported_by:
