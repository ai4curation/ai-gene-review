description: metZ (PP_2001) encodes a cytosolic PLP-dependent O-succinylhomoserine
  sulfhydrylase that converts O-succinyl-L-homoserine and sulfide to L-homocysteine
  in the direct sulfhydrylation branch of de novo L-methionine biosynthesis.
