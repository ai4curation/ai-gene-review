  evidence_type: IEA
  original_reference_id: GO_REF:0000104
  qualifier: enables
  review:
    summary: The transferase parent is a coarse but compatible description of O-succinylhomoserine sulfhydrylation.
    action: KEEP_AS_NON_CORE
    reason: UniRule maps MetZ to a transferase parent because no specific GO molecular
      function term for O-succinylhomoserine sulfhydrylase is present in the current
      GOA record. The core function is better captured in the review description
      and module step, while this broad parent can be retained as non-core.
    supported_by:
