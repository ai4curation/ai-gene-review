    id: GO:0016846
    label: carbon-sulfur lyase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000118
  qualifier: enables
  review:
    summary: Carbon-sulfur lyase activity is a reasonable available parent for the MetZ reaction.
    action: ACCEPT
    reason: MetZ cleaves the O-succinylhomoserine carbon-sulfur chemistry to form
      L-homocysteine, and the specific UniProt reaction supports this carbon-sulfur
      lyase-family assignment.
    supported_by:
    - reference_id: file:PSEPK/metZ/metZ-uniprot.txt
      supporting_text: "Reaction=O-succinyl-L-homoserine + hydrogen sulfide = L-homocysteine +"
