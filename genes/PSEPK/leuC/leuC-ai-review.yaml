id: Q88LE8
gene_symbol: leuC
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: >-
  LeuC is the catalytic large subunit of the LeuC-LeuD 3-isopropylmalate
  dehydratase. The iron-sulfur enzyme reversibly isomerizes
  2-isopropylmalate to 3-isopropylmalate through a dehydration/rehydration
  sequence in L-leucine biosynthesis.
existing_annotations:
- term:
    id: GO:0003861
    label: 3-isopropylmalate dehydratase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: >-
      This is the specific activity of the LeuC-LeuD enzyme, to which LeuC
      contributes the catalytic iron-sulfur core.
    action: ACCEPT
    reason: >-
      EC 4.2.1.33, HAMAP, and LeuC-specific family assignments agree. Because
      the functional enzyme is a LeuC-LeuD heterodimer, `contributes_to` is a
      better qualifier than the machine-sourced `enables` for this subunit.
    supported_by:
    - reference_id: file:PSEPK/leuC/leuC-uniprot.txt
      supporting_text: Full=3-isopropylmalate dehydratase large subunit
    - reference_id: file:PSEPK/leuC/leuC-uniprot.txt
      supporting_text: Heterodimer of LeuC and LeuD.
    - reference_id: file:PSEPK/leuC/leuC-deep-research-openscientist.md
      supporting_text: >-
        The gene *leuC* (locus PP_1985; UniProt Q88LE8) of *Pseudomonas putida*
        KT2440 encodes the **large, catalytic subunit of 3-isopropylmalate
        dehydratase**
- term:
    id: GO:0009098
    label: L-leucine biosynthetic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: involved_in
  review:
    summary: LeuC participates in the second leucine-specific step.
    action: ACCEPT
    reason: UniProt places the LeuC-LeuD activity at step 2 of 4.
- term:
    id: GO:0043436
    label: oxoacid metabolic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000117
  qualifier: involved_in
  review:
    summary: This broad process adds no information beyond leucine biosynthesis.
    action: MARK_AS_OVER_ANNOTATED
    reason: GO:0009098 captures the specific biological pathway.
- term:
    id: GO:0051539
    label: 4 iron, 4 sulfur cluster binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: The LeuC catalytic subunit carries the 4Fe-4S cluster.
    action: KEEP_AS_NON_CORE
    reason: The aconitase-family active-site architecture supports this cofactor assignment.
