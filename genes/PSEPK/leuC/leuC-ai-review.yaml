  title: OpenScientist literature and database synthesis for PSEPK LeuC
  findings:
  - statement: >-
      Identifies Q88LE8 as the catalytic, iron-sulfur-containing large subunit
      of heterodimeric 3-isopropylmalate dehydratase.
    supporting_text: >-
      The gene *leuC* (locus PP_1985; UniProt Q88LE8) of *Pseudomonas putida*
      KT2440 encodes the **large, catalytic subunit of 3-isopropylmalate
      dehydratase**
  - statement: >-
      No direct biochemical or structural characterization of Q88LE8 was
      found; mechanistic and complex-level details are transferred from
      orthologous LeuCD enzymes.
    supporting_text: >-
      There is, to our knowledge, no published biochemical or structural
      characterization of Q88LE8 itself.
