status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: Ribose-5-phosphate isomerase A of Pseudomonas putida KT2440 (PP_5150), a soluble enzyme of
  non-oxidative pentose phosphate metabolism. RpiA reversibly interconverts ribose 5-phosphate and ribulose
  5-phosphate, linking oxidative PPP product pools, ribose metabolism, and ribose-5-phosphate supply for
  nucleotide and PRPP biosynthesis.
existing_annotations:
- term:
    id: GO:0004751
    label: ribose-5-phosphate isomerase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: Ribose-5-phosphate isomerase activity is the exact molecular function of RpiA.
    action: ACCEPT
    reason: The reviewed UniProt entry names the protein as ribose-5-phosphate isomerase A and gives the
      ribose 5-phosphate/ribulose 5-phosphate reaction.
    supported_by:
    - reference_id: file:PSEPK/rpiA/rpiA-uniprot.txt
