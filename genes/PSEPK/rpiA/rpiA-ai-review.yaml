- term:
    id: GO:0005829
    label: cytosol
  evidence_type: IEA
  original_reference_id: GO_REF:0000118
  qualifier: located_in
  review:
    summary: Cytosol is appropriate for this soluble pentose-phosphate isomerase.
    action: ACCEPT
    reason: The UniProt GO annotation places RpiA in the cytosol.
    supported_by:
    - reference_id: file:PSEPK/rpiA/rpiA-uniprot.txt
      supporting_text: DR   GO; GO:0005829; C:cytosol; IEA:TreeGrafter.
- term:
    id: GO:0006014
    label: D-ribose metabolic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000118
  qualifier: involved_in
  review:
    summary: D-ribose metabolic process is compatible with the ribose-5-phosphate isomerase reaction,
      but it is less specific than the non-oxidative PPP annotation.
    action: KEEP_AS_NON_CORE
    reason: RpiA contributes to ribose phosphate interconversion and ribose-5-phosphate supply, but the
      core pathway placement is the non-oxidative pentose phosphate branch.
    supported_by:
    - reference_id: file:PSEPK/rpiA/rpiA-uniprot.txt
      supporting_text: DR   GO; GO:0006014; P:D-ribose metabolic process; IEA:TreeGrafter.
- term:
    id: GO:0009052
    label: pentose-phosphate shunt, non-oxidative branch
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: involved_in
  review:
    summary: This process term captures the non-oxidative PPP placement of ribose-5-phosphate isomerase.
    action: ACCEPT
    reason: UniProt places RpiA in the non-oxidative stage and maps it to GO:0009052.
    supported_by:
    - reference_id: file:PSEPK/rpiA/rpiA-uniprot.txt
      supporting_text: '5-phosphate from D-ribulose 5-phosphate (non-oxidative stage): step'
    - reference_id: file:PSEPK/rpiA/rpiA-uniprot.txt
      supporting_text: DR   GO; GO:0009052; P:pentose-phosphate shunt, non-oxidative branch; IEA:UniProtKB-UniRule.
- term:
    id: GO:0006098
    label: pentose-phosphate shunt
  evidence_type: IEA
  original_reference_id: GO_REF:0000041
  qualifier: involved_in
  review:
    summary: The parent pentose-phosphate shunt term is appropriate because RpiA performs a canonical
      PPP pentose-phosphate interconversion reaction.
    action: ACCEPT
    reason: Although the seeded GOA reference is a UniPathway mapping, the reviewed UniProt pathway statement
      supports PPP placement.
    supported_by:
    - reference_id: file:PSEPK/rpiA/rpiA-uniprot.txt
      supporting_text: 'PATHWAY: Carbohydrate degradation; pentose phosphate pathway; D-ribose'
references:
- id: GO_REF:0000041
  title: Gene Ontology annotation based on UniPathway vocabulary mapping
  findings:
  - statement: UniPathway mapping places the enzyme in a pathway step and is reviewed here against the
      local PPP module.
- id: GO_REF:0000118
  title: TreeGrafter-generated GO annotations
  findings:
  - statement: TreeGrafter transfers annotations from phylogenetic families; curator review checks whether
      the transferred term fits the P. putida enzyme.
- id: GO_REF:0000120
  title: Combined Automated Annotation using Multiple IEA Methods
  findings:
  - statement: The combined UniProt automated pipeline supplies IEA annotations that are checked here
      against enzyme chemistry and pathway context.
- id: file:PSEPK/rpiA/rpiA-uniprot.txt
  title: UniProt record for rpiA (Q88CN0)
  findings:
  - statement: UniProt provides the enzyme name, EC/family/domain context, GO cross-references, and pathway
      statements used for first-pass PPP curation of rpiA.
- id: file:PSEPK/rpiA/rpiA-deep-research-asta.md
  title: Asta retrieval report for rpiA
  findings:
  - statement: Asta retrieval was generated for this first-pass review; retrieved papers were mostly generic
      or indirect, so mechanistic decisions are anchored primarily to UniProt/GOA and organism-specific
      literature where available.
