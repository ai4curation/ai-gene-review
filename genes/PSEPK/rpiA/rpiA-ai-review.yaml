id: Q88CN0
gene_symbol: rpiA
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: >-
  rpiA (PP_5150) encodes ribose-5-phosphate isomerase A, a homodimeric
  non-oxidative pentose phosphate pathway enzyme that reversibly interconverts
  ribose 5-phosphate and ribulose 5-phosphate. The reaction supplies ribose
  5-phosphate for nucleotide-biosynthesis exits and balances pentose-phosphate
  flux with the rest of central carbon metabolism.
