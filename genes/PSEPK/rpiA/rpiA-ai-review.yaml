    label: ribose-5-phosphate isomerase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: >-
      This is the exact catalytic activity for RpiA. UniProt describes reversible
      conversion of ribose-5-phosphate to ribulose 5-phosphate, and GOA links
      GO:0004751 to RHEA:14657, EC 5.3.1.6, and PANTHER:PTN002277990.
    action: ACCEPT
    reason: >-
      GO:0004751 captures the core molecular function of the protein.
    supported_by:
    - reference_id: file:PSEPK/rpiA/rpiA-uniprot.txt
      supporting_text: Catalyzes the reversible conversion of ribose-5-phosphate to
    - reference_id: file:PSEPK/rpiA/rpiA-goa.tsv
      supporting_text: "GO:0004751\tribose-5-phosphate isomerase activity"
    - reference_id: file:PSEPK/rpiA/rpiA-deep-research-openscientist.md
      supporting_text: The reaction catalyzed is the aldose–ketose interconversion between D-ribose-5-phosphate and D-ribulose-5-phosphate
