description: phoB encodes the PhoB response regulator of the PhoR/PhoB phosphate-starvation system in
  Pseudomonas putida KT2440. It is a cytoplasmic OmpR/PhoB-family DNA-binding regulator that activates
  the phosphate regulon when phosphate is limited.
