  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: >-
  PP_0368 encodes an FAD-dependent acyl-CoA dehydrogenase-family protein in
  Pseudomonas putida KT2440. UniProt currently names it as a
  3-methylmercaptopropionyl-CoA dehydrogenase, while the ppu00071 Falcon
  pathway synthesis flags PP_0368 as the best-supported long-chain fatty-acid
  catabolism ACAD candidate for C10+ substrates. The first-pass review therefore
  treats the broad acyl-CoA dehydrogenase chemistry as supported, with
  substrate/pathway specificity requiring expert follow-up.
