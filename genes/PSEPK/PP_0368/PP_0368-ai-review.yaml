    label: oxidoreductase activity, acting on the CH-CH group of donors
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: The broad oxidoreductase annotation is chemically compatible but less informative than acyl-CoA dehydrogenase activity.
    action: MODIFY
    reason: >-
      InterPro/UniProt support an FAD-dependent acyl-CoA dehydrogenase-family
      enzyme, and the PSEPK ppu00071 Falcon report identifies PP_0368 as a
      primary long-chain fatty-acid catabolism ACAD candidate. Replace the broad
      oxidoreductase parent with GO:0003995 until chain-length specificity is
      experimentally resolved.
    proposed_replacement_terms:
    - id: GO:0003995
      label: acyl-CoA dehydrogenase activity
    supported_by:
