id: Q88F02
gene_symbol: hyi
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: >-
  hyi encodes hydroxypyruvate isomerase in the glyoxylate/tartronate
  semialdehyde branch of KT2440 carbon metabolism. The enzyme interconverts
  hydroxypyruvate and 2-hydroxy-3-oxopropanoate, connecting hydroxypyruvate
  metabolism with the glyoxylate-derived tartronate-semialdehyde intermediate.
