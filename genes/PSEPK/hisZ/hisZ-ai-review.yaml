id: Q88DD7
gene_symbol: hisZ
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: hisZ encodes the catalytically inactive, histidyl-tRNA-synthetase-like (HisRS-like) regulatory subunit of the
  short-form ATP phosphoribosyltransferase (ATPPRT). With the catalytic HisGS subunit it forms a HisGS4/HisZ4 hetero-octamer
  that catalyzes the first committed step of L-histidine biosynthesis; HisZ allosterically activates HisGS and mediates
  L-histidine feedback inhibition. In P. putida KT2440, a hisZ (PP_4890) insertion mutant is a histidine auxotroph.
existing_annotations:
