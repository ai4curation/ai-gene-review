  findings:
  - statement: Automated InterPro/UniRule/UniPathway mapping supplies L-histidine biosynthesis and cytoplasm annotations.
- id: file:PSEPK/hisZ/hisZ-uniprot.txt
  title: UniProtKB reviewed entry for hisZ
  findings:
  - statement: UniProt identifies HisZ as the regulatory subunit required for step 1 of L-histidine biosynthesis.
- id: file:PSEPK/hisZ/hisZ-goa.tsv
  title: QuickGO GOA annotations for hisZ
  findings:
  - statement: The fetched GOA table contains the annotations reviewed for hisZ.
