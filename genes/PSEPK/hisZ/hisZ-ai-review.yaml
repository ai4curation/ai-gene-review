core_functions:
- description: Catalytically inactive (HisRS-like) regulatory subunit of the short-form ATP phosphoribosyltransferase (ATPPRT),
    forming a HisGS4/HisZ4 hetero-octamer; it allosterically activates the catalytic HisGS subunit and confers feedback
    inhibition by binding L-histidine, thereby regulating the first committed step of L-histidine biosynthesis.
