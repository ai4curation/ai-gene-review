    id: GO:0000105
    label: L-histidine biosynthetic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  review:
    summary: HisZ should retain the L-histidine biosynthetic process annotation.
    action: ACCEPT
    reason: UniProt states that HisZ is required for the first step of histidine biosynthesis and may mediate feedback regulation
      of ATP phosphoribosyltransferase activity. Falcon deep research adds direct genetic evidence in this strain, where a
      P. putida KT2440 hisZ (PP_4890) insertion mutant is a histidine auxotroph, confirming an essential role in endogenous
      histidine biosynthesis.
    supported_by:
    - reference_id: file:PSEPK/hisZ/hisZ-uniprot.txt
      supporting_text: Required for the first step of histidine biosynthesis
    - reference_id: file:PSEPK/hisZ/hisZ-goa.tsv
      supporting_text: "GO:0000105\tL-histidine biosynthetic process"
    - reference_id: file:PSEPK/hisZ/hisZ-deep-research-falcon.md
      supporting_text: |-
        This directly supports that *P. putida* KT2440 **requires hisZ** for endogenous histidine biosynthesis under minimal-medium conditions.
    - reference_id: file:PSEPK/hisZ/hisZ-deep-research-falcon.md
      supporting_text: |-
        Table 4 identifies it as a **histidine auxotroph** with **no growth on M9**, **growth restored by L-histidine**, and **no rescue by D-histidine**
- term:
    id: GO:0005737
    label: cytoplasm
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  review:
    summary: The cytoplasm annotation is correct for HisZ.
    action: KEEP_AS_NON_CORE
    reason: HisZ is a soluble cytoplasmic biosynthetic regulatory subunit; the location is accurate but non-core. Falcon deep
      research notes that direct localization was not measured but that the ATPPRT (HisGS/HisZ) complex acts on cytosolic
      metabolites and is purified as a soluble complex, consistent with cytosolic localization.
    supported_by:
