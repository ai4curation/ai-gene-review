      supporting_text: "GO:0000105\tL-histidine biosynthetic process"
- term:
    id: GO:0005737
    label: cytoplasm
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  review:
    summary: The cytoplasm annotation is correct for HisZ.
    action: KEEP_AS_NON_CORE
    reason: HisZ is a soluble cytoplasmic biosynthetic regulatory subunit; the location is accurate but non-core.
    supported_by:
    - reference_id: file:PSEPK/hisZ/hisZ-uniprot.txt
      supporting_text: 'SUBCELLULAR LOCATION: Cytoplasm'
