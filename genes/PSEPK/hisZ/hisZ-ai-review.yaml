      supporting_text: |-
        ATPPRT components (HisGS/HisZ) are soluble enzymes acting on cytosolic metabolites
    - reference_id: file:PSEPK/hisZ/hisZ-deep-research-falcon.md
      supporting_text: |-
        consistent with **cytosolic localization**
