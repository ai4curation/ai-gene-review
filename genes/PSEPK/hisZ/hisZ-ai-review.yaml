  title: PANTHER family metadata for hisZ
  findings:
  - statement: PANTHER places HisZ in a HisZ/histidyl-tRNA synthetase-related family; the reviewed UniProt entry supplies
      the regulatory-subunit function.
core_functions:
- description: Regulatory subunit of ATP phosphoribosyltransferase that supports the first step of L-histidine biosynthesis
    and feedback regulation by histidine.
  directly_involved_in:
  - id: GO:0000105
    label: L-histidine biosynthetic process
  supported_by:
  - reference_id: file:PSEPK/hisZ/hisZ-uniprot.txt
    supporting_text: Required for the first step of histidine biosynthesis
  - reference_id: file:PSEPK/hisZ/hisZ-uniprot.txt
    supporting_text: feedback regulation of ATP phosphoribosyltransferase activity
proposed_new_terms:
- proposed_name: ATP phosphoribosyltransferase regulatory subunit activity
  proposed_definition: A molecular function that contributes to ATP phosphoribosyltransferase regulation as a non-catalytic
    regulatory subunit of the enzyme complex.
  justification: HisZ is not annotated with an informative molecular function even though UniProt describes a specific regulatory-subunit
    role in the HisG/HisZ ATP phosphoribosyltransferase system.
  proposed_parent:
    id: GO:0030234
    label: enzyme regulator activity
  supported_by:
  - reference_id: file:PSEPK/hisZ/hisZ-uniprot.txt
    supporting_text: allow the feedback regulation of ATP phosphoribosyltransferase activity
  - reference_id: file:PSEPK/hisZ/hisZ-uniprot.txt
    supporting_text: Heteromultimer composed of HisG and HisZ subunits
suggested_questions:
- question: Does KT2440 HisZ directly bind histidine and mediate feedback inhibition of the HisG/HisZ ATP phosphoribosyltransferase
    complex?
suggested_experiments:
- description: Reconstitute HisG/HisZ ATP phosphoribosyltransferase and measure activity across histidine concentrations with
    and without HisZ.
  experiment_type: enzyme regulation assay
