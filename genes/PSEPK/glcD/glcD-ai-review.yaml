id: Q88GH8
gene_symbol: glcD
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: >-
  glcD encodes the FAD-linked GlcD subunit of a bacterial GlcDEF glycolate
  dehydrogenase/oxidase complex. In KT2440 it is predicted to participate in
  oxidation of glycolate to glyoxylate, connecting glycolate utilization with
  glyoxylate metabolism.
existing_annotations:
- term:
    id: GO:0003824
    label: catalytic activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: The generic catalytic activity annotation is compatible but uninformative.
    action: MARK_AS_OVER_ANNOTATED
    reason: The specific glycolate dehydrogenase activity annotation captures the expected catalytic role of GlcD.
    supported_by:
    - reference_id: file:PSEPK/glcD/glcD-goa.tsv
      supporting_text: "UniProtKB\tQ88GH8\tglcD\tenables\tGO:0019154\tglycolate dehydrogenase activity"
- term:
    id: GO:0003973
    label: (S)-2-hydroxy-acid oxidase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: This broader 2-hydroxy-acid oxidase term is compatible with the FAD-linked family but less precise than glycolate dehydrogenase activity.
    action: KEEP_AS_NON_CORE
    reason: InterPro supports the broader oxidase family assignment, while EC mapping provides the more pathway-specific glycolate dehydrogenase activity.
    supported_by:
    - reference_id: file:PSEPK/glcD/glcD-uniprot.txt
      supporting_text: "DR   InterPro; IPR004490; GlcD."
- term:
    id: GO:0009339
    label: glycolate oxidase complex
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: part_of
  review:
    summary: GlcD is part of the multicomponent glycolate oxidase/dehydrogenase complex.
    action: ACCEPT
    reason: The GlcD family assignment and local glcD/glcE/glcF cluster support membership in the glycolate oxidase complex.
    supported_by:
    - reference_id: file:PSEPK/glcD/glcD-goa.tsv
      supporting_text: "UniProtKB\tQ88GH8\tglcD\tpart_of\tGO:0009339\tglycolate oxidase complex"
- term:
    id: GO:0019154
    label: glycolate dehydrogenase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000003
  qualifier: enables
  review:
    summary: This is the specific pathway activity expected for GlcD in the GlcDEF complex.
    action: ACCEPT
    reason: UniProt assigns EC 1.1.99.14 and GOA maps GlcD to glycolate dehydrogenase activity.
    supported_by:
    - reference_id: file:PSEPK/glcD/glcD-uniprot.txt
      supporting_text: "DE            EC=1.1.99.14 {ECO:0000313|EMBL:AAN69340.1};"
    - reference_id: file:PSEPK/glcD/glcD-goa.tsv
      supporting_text: "UniProtKB\tQ88GH8\tglcD\tenables\tGO:0019154\tglycolate dehydrogenase activity"
    - reference_id: file:PSEPK/glcD/glcD-deep-research-openscientist.md
      supporting_text: "GlcD's precise physiological role is the committed oxidation of glycolate to glyoxylate"
- term:
    id: GO:0050660
    label: flavin adenine dinucleotide binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: FAD binding is supported, but the GOA also carries the exact FAD binding term.
    action: MARK_AS_OVER_ANNOTATED
    reason: GO:0071949 is the more direct retained FAD-binding annotation for this review.
    supported_by:
    - reference_id: file:PSEPK/glcD/glcD-goa.tsv
      supporting_text: "UniProtKB\tQ88GH8\tglcD\tenables\tGO:0071949\tFAD binding"
- term:
    id: GO:0071949
    label: FAD binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: GlcD is an FAD-linked oxidoreductase subunit, so FAD binding is part of the expected chemistry.
    action: ACCEPT
    reason: The UniProt record and InterPro signatures identify GlcD as an FAD-linked oxidoreductase component.
    supported_by:
    - reference_id: file:PSEPK/glcD/glcD-uniprot.txt
      supporting_text: "DR   InterPro; IPR016166; FAD-bd_PCMH."
    - reference_id: file:PSEPK/glcD/glcD-goa.tsv
      supporting_text: "UniProtKB\tQ88GH8\tglcD\tenables\tGO:0071949\tFAD binding"
- term:
    id: GO:0046487
    label: glyoxylate metabolic process
  evidence_type: ISS
  original_reference_id: file:PSEPK/glcD/glcD-goa.tsv
  qualifier: involved_in
  review:
    summary: GlcD is predicted to participate in glyoxylate metabolism through the GlcDEF glycolate-to-glyoxylate reaction.
    action: NEW
    reason: GOA and UniProt support glycolate dehydrogenase activity for GlcD, and this reaction produces glyoxylate in the glycolate/glyoxylate assimilation branch.
    supported_by:
    - reference_id: file:PSEPK/glcD/glcD-goa.tsv
      supporting_text: "UniProtKB\tQ88GH8\tglcD\tenables\tGO:0019154\tglycolate dehydrogenase activity"
    - reference_id: file:PSEPK/glcD/glcD-uniprot.txt
      supporting_text: "DE   SubName: Full=Glycolate oxidase, putative FAD-linked subunit"
    - reference_id: file:PSEPK/glcD/glcD-deep-research-openscientist.md
      supporting_text: "GlcD's precise physiological role is the committed oxidation of glycolate to glyoxylate"
