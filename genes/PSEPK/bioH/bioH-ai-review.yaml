    summary: This is the substrate-specific predicted BioH activity.
    action: ACCEPT
    reason: >-
      EC 3.1.1.85, the BioH-specific InterPro/PANTHER assignment, and the
      position of bioH within the bioBFHCD locus support this reaction.
