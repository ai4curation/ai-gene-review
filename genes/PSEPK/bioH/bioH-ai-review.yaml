description: bioH encodes a predicted pimeloyl-acyl carrier protein methyl ester
  esterase in Pseudomonas putida KT2440. It is an alpha/beta-hydrolase-family enzyme
  assigned to the BioC-BioH route that unmasks the pimeloyl-ACP intermediate used by
  BioF during biotin biosynthesis.
