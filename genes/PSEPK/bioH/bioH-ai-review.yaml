id: Q88QX0
gene_symbol: bioH
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: >-
  BioH is the predicted alpha/beta-hydrolase that hydrolyzes pimeloyl-ACP
  methyl ester after fatty-acid-synthase elongation in the BioC-BioH route.
  Demethylation releases pimeloyl-ACP for condensation with L-alanine by BioF
  during de novo biotin biosynthesis.
