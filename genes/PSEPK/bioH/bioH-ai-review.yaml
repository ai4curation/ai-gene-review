- id: PMID:33666816
  title: Engineering a heterologous synthetic pathway in Escherichia coli for efficient production of biotin.
  full_text_unavailable: true
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: >-
      The abstract verifies use of a P. putida bioBFHCD cluster plus bioA for
      heterologous biotin production. It does not name KT2440, isolate BioH, or
      establish Q88QX0 kinetics; added BioW also prevents treating the system as
      direct evidence for the native BioC-BioH early route.
  findings:
  - statement: >-
      Supports a functional P. putida biotin-gene cluster at pathway level,
      while not directly testing this BioH protein or its specific substrate.
    supporting_text: bioBFHCD cluster and a bioA gene, was engineered into Escherichia coli for
    reference_section_type: ABSTRACT
- id: file:PSEPK/bioH/bioH-deep-research-openscientist.md
  title: OpenScientist functional report for PSEPK BioH
  findings:
  - statement: >-
      Supports the BioH-family assignment, specific hydrolysis reaction, and
      intact catalytic-residue pattern by transfer from characterized bacterial
      BioH proteins. The report found no purified-enzyme assay, structure, or
      knockout study for Q88QX0; residue numbering, localization, substrate
      preference, and physiological essentiality remain inferred.
core_functions:
- description: >-
    Hydrolyzes pimeloyl-ACP methyl ester to release pimeloyl-ACP for the
    committed ring-assembly reactions of biotin biosynthesis.
