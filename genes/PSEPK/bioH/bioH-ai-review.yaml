suggested_questions:
- question: >-
    Is Q88QX0 the physiological pimeloyl-ACP methyl ester hydrolase in KT2440,
    and does another esterase provide measurable redundancy?
suggested_experiments:
- description: >-
    Purify Q88QX0 and measure hydrolysis of pimeloyl-ACP methyl ester against a
    panel of related acyl-ACP and small-molecule esters.
  experiment_type: substrate-specific enzyme assay
- description: >-
    Delete bioH and quantify biotin auxotrophy and pimeloyl-ACP methyl ester
    accumulation, with native-gene complementation.
  experiment_type: genetics and metabolomics
