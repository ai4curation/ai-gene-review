  review:
    summary: This is the substrate-specific predicted BioH activity.
    action: ACCEPT
    reason: >-
      EC 3.1.1.85, the BioH-specific InterPro/PANTHER assignment, and the
      position of bioH within the bioBFHCD locus support this reaction.
    supported_by:
    - reference_id: file:PSEPK/bioH/bioH-uniprot.txt
      supporting_text: Full=Pimeloyl-[acp] methyl ester esterase
    - reference_id: file:PSEPK/bioH/bioH-deep-research-openscientist.md
      supporting_text: >-
        The defining function of BioH is the hydrolysis of **pimeloyl-ACP
        methyl ester → pimeloyl-ACP + methanol**, the reaction assigned to
        Q88QX0 as EC 3.1.1.85.
