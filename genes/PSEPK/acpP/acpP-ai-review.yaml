id: Q88LL5
gene_symbol: acpP
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: >-
  AcpP is the canonical cytoplasmic acyl carrier protein of Pseudomonas putida
  KT2440 type-II fatty-acid synthesis. After phosphopantetheinylation, it
  carries malonyl and growing fatty-acyl chains as thioesters between the
  dissociated FAS-II enzymes and also supplies acyl-ACP intermediates to
  downstream lipid pathways.
