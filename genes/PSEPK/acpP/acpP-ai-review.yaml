  qualifier: involved_in
  review:
    summary: Plausible downstream use of acyl-ACP intermediates, but not AcpP's core pathway.
    action: KEEP_AS_NON_CORE
    reason: >-
      Lipid A synthesis consumes hydroxyacyl-ACP produced by FAS-II. This is a
      valid downstream carrier role but secondary to AcpP's central
      fatty-acid-synthesis function.
