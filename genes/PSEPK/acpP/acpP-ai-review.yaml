- id: file:PSEPK/acpP/acpP-deep-research-openscientist.md
  title: OpenScientist deep-research report for PSEPK acpP
  findings:
  - statement: >-
      The report identifies AcpP as a noncatalytic carrier that tethers and
      shuttles FAS-II acyl intermediates.
    supporting_text: >-
      AcpP is not itself a catalytic enzyme; it is a **carrier/adapter protein**
      that covalently tethers every acyl intermediate of fatty-acid synthesis
      as a thioester and physically shuttles those intermediates between the
      successive, freestanding enzymes of the FAS II cycle.
    reference_section_type: RESULTS
  - statement: No direct structural or biochemical study of Q88LL5 was located.
    supporting_text: >-
      No direct structural or biochemical study of Q88LL5 itself.
    reference_section_type: DISCUSSION
  reference_review:
    relevance: HIGH
    correctness: UNVERIFIED
    review_notes: >-
      Provider-generated gene report. Exact accession, locus, ACP domains, and
      carrier role agree with reviewed UniProt; mechanistic and pathway-branch
      details largely derive from orthologs or other Pseudomonas proteins.
