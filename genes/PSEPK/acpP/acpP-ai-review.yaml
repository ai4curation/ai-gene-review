description: acpP encodes the canonical cytoplasmic acyl carrier protein of Pseudomonas
  putida KT2440. After 4'-phosphopantetheinylation, ACP carries growing acyl chains
  as thioesters during type-II fatty acid biosynthesis and supplies acyl-chain carrier
  context for related lipid biosynthetic reactions.
