  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: mdtC encodes a predicted inner-membrane AcrB/RND-family multidrug efflux transporter subunit
  in Pseudomonas putida KT2440. It is likely part of the MdtABC tripartite efflux system with the adjacent
  MdtB transporter and MdtA membrane-fusion/adaptor protein.
