description: mnaT encodes a GNAT/acyltransferase-family methionine-derivative detoxifier in Pseudomonas putida KT2440. Existing
  GOA supports L-amino-acid N-acetyltransferase activity, consistent with acetylation of L-methionine sulfoximine or L-methionine
  sulfone.
