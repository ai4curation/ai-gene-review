- question: What substrate, reaction partner, and stress condition define the physiological function of mnaT in Pseudomonas
    putida KT2440?
suggested_experiments:
- description: Purify mnaT or test a clean deletion strain under candidate glutathione, thiol-redox, electrophile, formaldehyde,
    methionine-derivative, and metal-stress conditions as appropriate for the family.
  experiment_type: targeted enzyme assay and stress-phenotyping assay
