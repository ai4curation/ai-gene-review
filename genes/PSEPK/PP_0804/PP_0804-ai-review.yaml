id: Q88PP4
gene_symbol: PP_0804
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: PP_0804 encodes a predicted fused ABC permease/ATPase component of a protein secretion ABC efflux system. UniProt and InterPro support a cell-membrane type-I-exporter architecture with ATPase_T1SS and C39 peptidase-family domains. Oligopeptide-transporter annotations are treated as TreeGrafter spillover; the more defensible first-pass process is type-I protein secretion with the exported substrate unresolved.
