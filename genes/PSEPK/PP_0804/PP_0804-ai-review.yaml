suggested_questions:
- question: What is the physiological substrate exported by PP_0804 in P. putida KT2440?
- question: Which membrane-fusion and outer-membrane-channel partners form the complete PP_0804-containing type-I secretion system?
suggested_experiments:
- description: Delete PP_0804 and test secretion of candidate RTX/toxin/protease substrates under inducing growth conditions.
  experiment_type: targeted secretion phenotype assay
- description: Use co-immunoprecipitation or tagged-complex purification to identify the cognate adaptor and outer-membrane channel for PP_0804.
  experiment_type: transporter complex mapping
