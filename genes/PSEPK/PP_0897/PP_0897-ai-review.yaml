    summary: Correct intermediate hydro-lyase class term, but less informative than fumarate hydratase activity.
    action: KEEP_AS_NON_CORE
    reason: PP_0897 catalyzes a hydro-lyase reaction, but the specific enzyme activity GO:0004333 should be treated as core.
