description: Class-I, Fe-S-dependent fumarate hydratase of Pseudomonas putida KT2440. PP_0897 catalyzes the reversible interconversion of fumarate and (S)-malate, providing one of the organism's three fumarase activities at the fumarate/malate step of the tricarboxylic acid cycle. Its class-I fumarase family assignment and [4Fe-4S] cofactor distinguish it from the two class-II, iron-independent fumarases in the same strain.
existing_annotations:
- term:
    id: GO:0004333
    label: fumarate hydratase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: Correct core molecular function for this class-I fumarase.
    action: ACCEPT
    reason: UniProt annotates Q88PF3 as fumarate hydratase class I with EC 4.2.1.2 and the reaction (S)-malate = fumarate + H2O. The PSEPK TCA-cycle pathway report identifies PP_0897 as the class-I fumarase covering the fumarate hydration step alongside two class-II fumarases.
    supported_by:
    - reference_id: file:PSEPK/PP_0897/PP_0897-uniprot.txt
      supporting_text: Catalyzes the reversible hydration of fumarate to (S)-malate.
    - reference_id: file:projects/P_PUTIDA/deep-research/PSEPK__tca_cycle__ppu00020-deep-research-openscientist.md
      supporting_text: 'Triply redundant: one class-I fumarate hydratase (PP_0897, K01676) plus two class-II fumarases (K01679) (Finding F005).'
- term:
    id: GO:0006091
    label: generation of precursor metabolites and energy
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: involved_in
  review:
    summary: Broad central-metabolism process term; the more specific TCA-cycle process is the appropriate context.
    action: MODIFY
    reason: Fumarate hydration is part of energy-generating central carbon metabolism, but GO:0006091 is a broad parent-like process term. The pathway-specific role is the fumarate-to-malate step of the TCA cycle, so GO:0006099 should be used when a process annotation is needed.
    proposed_replacement_terms:
    - id: GO:0006099
      label: tricarboxylic acid cycle
    supported_by:
    - reference_id: file:projects/P_PUTIDA/deep-research/PSEPK__tca_cycle__ppu00020-deep-research-openscientist.md
      supporting_text: Step 7 is robustly covered.
