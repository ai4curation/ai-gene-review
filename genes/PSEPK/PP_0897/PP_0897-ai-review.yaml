  review:
    summary: Correct but too broad for a fumarase with a defined hydro-lyase activity.
    action: KEEP_AS_NON_CORE
    reason: Fumarate hydratase is a lyase, but this parent term lacks substrate and reaction specificity. GO:0004333 captures the core activity.
