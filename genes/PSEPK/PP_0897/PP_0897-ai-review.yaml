    summary: Correct broad cofactor-binding annotation for a class-I Fe-S fumarase.
    action: KEEP_AS_NON_CORE
    reason: UniProt annotates a [4Fe-4S] cluster cofactor, so metal ion binding is biologically plausible, but it is a broad parent of the more informative iron-sulfur cluster binding annotation and is not the core catalytic role.
