id: Q88D45
gene_symbol: PP_4983
aliases:
- iaaM
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: PP_4983 is an exported FAD-dependent amine oxidase family protein in
  Pseudomonas putida KT2440. It is reviewed here under the alias iaaM because UniProt/GO
  automation assigns tryptophan 2-monooxygenase activity and auxin biosynthesis to
  the locus, but the specific iaaM interpretation is weak. The same locus is annotated
  by KEGG as a putative amine oxidase / monoamine oxidase (K00274, EC 1.4.3.4), and
  KT2440 already contains distinct amino oxidase family members including davB/PP_0383.
  The best current synthesis is therefore monoamine-oxidase-like oxidoreductase activity
  with unresolved physiological substrate, rather than a confirmed indole-3-acetamide
  auxin-biosynthetic enzyme.
existing_annotations:
- term:
    id: GO:0016491
    label: oxidoreductase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  review:
    summary: PP_4983 is clearly an oxidoreductase-family protein, but this parent
      term is too broad to be useful. Both UniProt and KEGG place the protein within
      flavin-dependent amine oxidation chemistry, so a more specific amine-oxidase-like
      molecular function is preferable.
    action: MARK_AS_OVER_ANNOTATED
    reason: The broad oxidoreductase root term adds little information once the locus
      is interpreted as a monoamine-oxidase-like flavoprotein. It is directionally
      correct but not an informative core annotation.
    supported_by:
    - reference_id: file:PSEPK/iaaM/iaaM-notes.md
      supporting_text: The safest current synthesis is amine oxidase / monoamine oxidase-like
        flavoprotein rather than confirmed tryptophan 2-monooxygenase in auxin biosynthesis.
- term:
    id: GO:0050361
    label: tryptophan 2-monooxygenase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000003
  review:
    summary: This specific iaaM-style annotation is not well supported for PP_4983.
      The UniProt assignment is homology-based only, whereas KEGG classifies the same
      locus as a putative amine oxidase / monoamine oxidase and not as a dedicated
      indole-3-acetamide auxin enzyme. In the same genome, davB/PP_0383 is already
      assigned a distinct amino-oxidase chemistry, reinforcing that automatic family
      transfer is likely overspecific here.
    action: MODIFY
    reason: The protein is probably an amine oxidase, but the specific substrate assignment
      to tryptophan-to-indole-3-acetamide conversion is weaker than the broader monoamine
      oxidase interpretation from KEGG. Until biochemical data establish IAM formation
      in KT2440, the safer molecular function is monoamine oxidase activity.
    proposed_replacement_terms:
    - id: GO:0097621
      label: monoamine oxidase activity
    supported_by:
    - reference_id: file:PSEPK/iaaM/iaaM-uniprot.txt
      supporting_text: Belongs to the tryptophan 2-monooxygenase family.
    - reference_id: file:PSEPK/iaaM/iaaM-uniprot.txt
      supporting_text: 'PE   3: Inferred from homology;'
    - reference_id: file:PSEPK/iaaM/iaaM-notes.md
      supporting_text: KEGG contradicts the specific iaaM call for the same locus
        and instead labels PP_4983 as putative amine oxidase with orthology K00274
        monoamine oxidase [EC:1.4.3.4].
core_functions:
- molecular_function:
    id: GO:0097621
    label: monoamine oxidase activity
  description: 'Best current synthesis: PP_4983 is most likely an exported FAD-dependent
    monoamine oxidase / amine oxidase family protein. The exact in vivo substrate
    remains unresolved, and the available evidence does not justify confident assignment
    to indole-3-acetamide auxin biosynthesis in KT2440.'
  supported_by:
  - reference_id: file:PSEPK/iaaM/iaaM-notes.md
    supporting_text: The safest current synthesis is amine oxidase / monoamine oxidase-like
      flavoprotein rather than confirmed tryptophan 2-monooxygenase in auxin biosynthesis.
suggested_questions:
- question: Is PP_4983 able to convert L-tryptophan to indole-3-acetamide in vitro
    or in vivo, or is its physiological substrate a different monoamine?
- question: Does KT2440 encode a bona fide iaaH-like amidase that pairs with PP_4983
    in an indole-3-acetamide pathway?
suggested_experiments:
- hypothesis: PP_4983 is a monoamine oxidase-like flavoprotein rather than a dedicated
    iaaM tryptophan 2-monooxygenase.
  description: Purify PP_4983 and test FAD-dependent oxidation of L-tryptophan, methylamine,
    phenethylamine, tyramine, and related amines by LC-MS or targeted product assays.
    Compare turnover against authentic indole-3-acetamide production.
  experiment_type: biochemical enzyme assay
- hypothesis: If PP_4983 participates in IAM/IAA biosynthesis, deleting the locus
    should reduce indole-3-acetamide or indole-3-acetic acid accumulation from tryptophan.
  description: Construct a PP_4983 deletion strain and quantify indole-3-acetamide
    and indole-3-acetic acid in wild type and mutant cultures grown with supplemental
    tryptophan.
  experiment_type: genetics plus metabolomics
- hypothesis: PP_4983 and the other KT2440 amine oxidase candidates have distinct
    substrate scopes.
  description: Compare PP_4983, PP_4155, and davB mutant growth and transcriptional
    responses across candidate amine and amino-acid substrates to separate auxin-pathway
    and general amine-catabolic roles.
  experiment_type: comparative genetics and physiology
