taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: plsC encodes 1-acyl-sn-glycerol-3-phosphate acyltransferase (EC 2.3.1.51), the acyltransferase that converts 1-acyl-sn-glycerol-3-phosphate to phosphatidic acid. This is the second acylation step of the bacterial glycerol-3-phosphate route to diacylglycerol/CDP-diacylglycerol and membrane phospholipid biosynthesis. The P. putida KT2440 protein is predicted from conserved ARBA/RuleBase, EC/RHEA, PANTHER, and InterPro acyltransferase signatures and is associated with the plasma membrane/membrane lipid biosynthetic boundary.
