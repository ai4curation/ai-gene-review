description: PP_4867 encodes a signal-peptide-bearing BraC-like periplasmic substrate-binding component of the PP_4863-PP_4867 Bra/Liv branched-chain amino-acid ABC uptake system. UniProt names it as a branched-chain amino-acid ABC transporter periplasmic amino-acid-binding protein and places it in the leucine-binding protein family, supporting substrate capture for the adjacent Bra transport complex.
