  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: lpd (PP_5366) encodes a dihydrolipoyl dehydrogenase E3 component. It catalyzes FAD- and NAD+-dependent reoxidation of protein-bound dihydrolipoyllysine to lipoyllysine, producing NADH, and can serve multiple 2-oxoacid dehydrogenase complexes. This reaction connects pyruvate/TCA-derived acyl-transfer chemistry to respiratory redox metabolism.
