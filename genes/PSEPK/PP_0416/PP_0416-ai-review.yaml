  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: >-
  PP_0416 encodes a reviewed bacterial phosphoglycolate phosphatase. It
  hydrolyzes 2-phosphoglycolate to glycolate and phosphate, supporting
  phosphoglycolate cleanup and feeding glycolate into glycolate/glyoxylate
  metabolism in Pseudomonas putida KT2440.
