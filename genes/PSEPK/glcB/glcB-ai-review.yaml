description: glcB encodes malate synthase G, a cytosolic glyoxylate-shunt enzyme that condenses glyoxylate with acetyl-CoA
  to form malate. In the ppu00620 pyruvate-metabolism map it is a glyoxylate/TCA-overlap side node rather than a pyruvate-specific
  enzyme.
