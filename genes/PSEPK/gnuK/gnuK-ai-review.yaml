  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: Gluconokinase of Pseudomonas putida KT2440 (PP_3416). GnuK is a GntK/GntV-family kinase that
  phosphorylates gluconate in carbohydrate acid metabolism, feeding 6-phosphogluconate pools that connect
  to the Entner-Doudoroff and oxidative PPP map. It is therefore PPP-adjacent, not a strict PPP enzyme.
