  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: yhdZ (PP_1300) encodes the ATP-binding energy-coupling subunit of the adjacent PP_1297-PP_1300 YhdWXYZ amino-acid
  ABC importer. Its ABC ATPase domains, ATP binding and ATP hydrolysis annotations, amino-acid-import ATP-binding protein
  family assignment, and local pairing with YhdW/YhdX/YhdY support ATP-driven amino-acid transmembrane uptake.
