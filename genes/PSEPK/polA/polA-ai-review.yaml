description: polA (PP_0123) encodes DNA polymerase I, a bacterial family-A DNA polymerase with polymerase, 3'-5' exonuclease,
  and 5'-3' exonuclease activities. It acts in DNA repair-synthesis and Okazaki-fragment maturation, including the gap-filling
  step after nucleotide-excision repair has removed damaged DNA.
