id: Q88CL7
gene_symbol: maa
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: maa encodes a predicted cytosolic maltose O-acetyltransferase in
  Pseudomonas putida KT2440. Although its hexapeptide/LpxA-like fold triggered
  lipid-A-related keyword spillover, the gene name, EC mapping, Mac domain, and
  GOA annotations support maltose O-acetyltransferase activity as the primary
  first-pass function.
existing_annotations:
- term:
    id: GO:0005829
    label: cytosol
  evidence_type: IEA
  original_reference_id: GO_REF:0000118
  qualifier: located_in
  review:
    summary: Cytosol is consistent with the TreeGrafter location and absence of a
      signal peptide or membrane-domain claim in the fetched UniProt record.
    action: ACCEPT
    reason: The primary supported function is soluble maltose
      O-acetyltransferase activity; cytosol is a reasonable non-core location
      annotation.
    supported_by:
    - reference_id: file:PSEPK/maa/maa-uniprot.txt
      supporting_text: 'DR   GO; GO:0005829; C:cytosol; IEA:TreeGrafter.'
- term:
    id: GO:0008925
    label: maltose O-acetyltransferase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000003
  qualifier: enables
  review:
    summary: The specific EC-derived maltose O-acetyltransferase activity is the
      best current molecular-function annotation for maa.
    action: ACCEPT
    reason: UniProt names the protein maltose acetyltransferase and records EC
      2.3.1.79, and the Mac domain supports maltose/galactoside
      acetyltransferase-family function.
    supported_by:
    - reference_id: file:PSEPK/maa/maa-uniprot.txt
      supporting_text: 'DE   SubName: Full=Maltose acetyltransferase {ECO:0000313|EMBL:AAN70728.1};'
    - reference_id: file:PSEPK/maa/maa-uniprot.txt
      supporting_text: 'DE            EC=2.3.1.79 {ECO:0000313|EMBL:AAN70728.1};'
    - reference_id: file:PSEPK/maa/maa-uniprot.txt
      supporting_text: 'DR   GO; GO:0008925; F:maltose O-acetyltransferase activity; IEA:UniProtKB-EC.'
- term:
    id: GO:0016407
    label: acetyltransferase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: Acetyltransferase activity is true but less informative than the
      specific maltose O-acetyltransferase activity.
    action: MARK_AS_OVER_ANNOTATED
    reason: The existing EC-derived GO:0008925 captures the supported molecular
      function at the correct specificity; retaining this broad parent as core
      would overstate useful annotation content.
    supported_by:
    - reference_id: file:PSEPK/maa/maa-uniprot.txt
      supporting_text: 'DR   GO; GO:0008925; F:maltose O-acetyltransferase activity; IEA:UniProtKB-EC.'
- term:
    id: GO:0016413
    label: O-acetyltransferase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000117
  qualifier: enables
  review:
    summary: O-acetyltransferase activity is a correct parent-level description
      but is less specific than maltose O-acetyltransferase activity.
    action: KEEP_AS_NON_CORE
    reason: This annotation is compatible with the EC-derived maltose
      O-acetyltransferase call, but it should not be treated as the core
      functional statement when GO:0008925 is available.
    supported_by:
    - reference_id: file:PSEPK/maa/maa-uniprot.txt
      supporting_text: 'DR   GO; GO:0008925; F:maltose O-acetyltransferase activity; IEA:UniProtKB-EC.'
- term:
    id: GO:0016740
    label: transferase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: Transferase activity is a generic parent of the supported maltose
      O-acetyltransferase activity.
    action: MARK_AS_OVER_ANNOTATED
    reason: The specific EC-derived term GO:0008925 is already present and
      should be used for the core molecular function.
    supported_by:
    - reference_id: file:PSEPK/maa/maa-uniprot.txt
      supporting_text: 'DR   GO; GO:0008925; F:maltose O-acetyltransferase activity; IEA:UniProtKB-EC.'
