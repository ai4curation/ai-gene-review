proposed_new_terms: []
suggested_questions:
- question: Is the UniProt lipid-A-biosynthesis keyword on maa a family-level
    over-transfer from LpxA-like hexapeptide enzymes rather than a KT2440
    lipid-A function?
suggested_experiments:
- description: Assay purified Maa with maltose and candidate galactosides versus
    lipid A/core substrates, and profile maa deletion strains for carbohydrate
    acetylation and lipid A composition.
