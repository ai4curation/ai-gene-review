taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: Cytoplasmic glucose-6-phosphate isomerase (phosphoglucose isomerase,
  EC 5.3.1.9) of Pseudomonas putida KT2440. It catalyzes the reversible aldose-ketose
  isomerization between D-glucose 6-phosphate and D-fructose 6-phosphate, interconnecting
  the glucose-6-phosphate and fructose-6-phosphate hexose-phosphate pools. The enzyme
  is a soluble member of the GPI family that uses a proton-relay active site to open
  the sugar ring and shift the carbonyl between C1 and C2. Because P. putida catabolizes
  glucose through the Entner-Doudoroff pathway rather than the Embden-Meyerhof-Parnas
  (glycolytic) pathway, the physiologically prominent role of this enzyme is gluconeogenic
  and anabolic, supplying glucose-6-phosphate from fructose-6-phosphate for downstream
  biosynthesis and linking the hexose-phosphate pools to the oxidative pentose-phosphate
  branch.
