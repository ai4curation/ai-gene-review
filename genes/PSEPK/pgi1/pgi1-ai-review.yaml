proposed_new_terms: []
references:
- id: GO_REF:0000002
  title: Gene Ontology annotation through association of InterPro records with GO
    terms
  findings:
  - statement: InterPro2GO supplies broad domain-based binding and metabolic-process
      terms (carbohydrate derivative binding/metabolism) that are less specific than
      the catalytic and pathway terms already annotated.
- id: GO_REF:0000118
  title: TreeGrafter-generated GO annotations
  findings:
  - statement: TreeGrafter transfers GO terms from the glucose-6-phosphate isomerase
      phylogenetic family, including cytosol, monosaccharide binding, and glucose-6-phosphate
      metabolic process.
- id: GO_REF:0000120
  title: Combined Automated Annotation using Multiple IEA Methods
  findings:
  - statement: The combined UniProt/UniRule (HAMAP MF_00473) pipeline assigns the core
      catalytic, cytoplasmic, gluconeogenesis, and glycolytic-process terms; the glycolytic-process
      term is a homology transfer requiring organism-specific scrutiny.
- id: PMID:12534463
  title: Complete genome sequence and comparative analysis of the metabolically versatile
    Pseudomonas putida KT2440.
  findings:
  - statement: The KT2440 genome establishes the PP_1808/pgi1 locus and describes the
      strain's metabolic versatility; KT2440 lacks a complete Embden-Meyerhof-Parnas
      glycolytic route and degrades glucose via the Entner-Doudoroff pathway.
- id: file:PSEPK/pgi1/pgi1-notes.md
  title: Curator notes on pgi1 function
  findings:
  - statement: Curator notes synthesize UniProt and the pathway context of KT2440 to
      distinguish the gluconeogenic in vivo role of Pgi from the generic glycolytic-process
      homology transfer.
- id: file:PSEPK/pgi1/pgi1-uniprot.txt
  title: UniProt record for pgi1 (Q88LW9)
  findings:
  - statement: UniProt identifies Q88LW9 as glucose-6-phosphate isomerase 1 (EC 5.3.1.9),
      a cytoplasmic GPI-family enzyme assigned to gluconeogenesis and glycolysis pathways
      by HAMAP rule MF_00473.
suggested_questions:
- question: What is the quantitative in vivo flux direction and magnitude through Pgi
    in P. putida KT2440 under glucose, gluconate, and gluconeogenic (e.g. succinate)
    growth, given the dominance of the Entner-Doudoroff pathway?
  experts:
  - Pablo Iván Nikel
  - Daniel Christoph Volke
- question: Is pgi1 essential for growth on gluconeogenic carbon sources, and does loss
    of Pgi limit supply of glucose-6-phosphate for LPS, peptidoglycan, and other hexose-phosphate-derived
    biosynthesis?
  experts:
  - Pablo Iván Nikel
suggested_experiments:
- description: Construct a clean pgi1 (PP_1808) deletion and phenotype growth on glucose,
    fructose, gluconate, and gluconeogenic substrates (succinate, glycerol) to define
    the physiological requirement for the enzyme.
  experiment_type: gene knockout and growth phenotyping
- description: Perform 13C metabolic flux analysis comparing wild-type and a pgi1 mutant
    to determine the net direction and magnitude of glucose-6-phosphate/fructose-6-phosphate
    interconversion relative to the Entner-Doudoroff and EDEMP cycle fluxes.
  experiment_type: 13C metabolic flux analysis
- description: Purify recombinant PP_1808 and measure steady-state kinetics in both
    the glucose-6-phosphate and fructose-6-phosphate directions to confirm reversibility
    and substrate preference.
  experiment_type: enzymology
