- term:
    id: GO:0006094
    label: gluconeogenesis
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: involved_in
  review:
    summary: Gluconeogenesis is the physiologically prominent biological process for
      Pgi in P. putida KT2440. Because KT2440 catabolizes glucose via the Entner-Doudoroff
      pathway rather than glycolysis, the relevant in vivo direction of Pgi is anabolic,
      converting fructose-6-phosphate into glucose-6-phosphate for biosynthesis. UniProt
      assigns Pgi to the gluconeogenesis pathway.
    action: ACCEPT
    reason: Gluconeogenesis accurately reflects the anabolic hexose-phosphate role
      of Pgi in this organism and is supported by the curated UniProt pathway assignment.
    supported_by:
    - reference_id: file:PSEPK/pgi1/pgi1-uniprot.txt
      supporting_text: 'Carbohydrate biosynthesis; gluconeogenesis.'
    - reference_id: file:PSEPK/pgi1/pgi1-notes.md
      supporting_text: the physiologically relevant direction of Pgi is gluconeogenic
- term:
    id: GO:0006096
    label: glycolytic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: involved_in
  review:
    summary: This term is a HAMAP/UniRule homology transfer reflecting the canonical
      role of Pgi in the Embden-Meyerhof-Parnas pathway of organisms that run glycolysis.
      P. putida KT2440 does not use the EMP pathway for glucose catabolism; glucose
      is degraded almost exclusively via the Entner-Doudoroff pathway, and net glycolytic
      flux through fructose-6-phosphate does not occur. The term is true only at the
      generic enzyme-class level, not as the in vivo physiological role in this organism.
    action: MARK_AS_OVER_ANNOTATED
    reason: The glycolytic-process assignment is a family/pathway homology transfer
      that does not represent the actual physiological role of Pgi in KT2440, which
      routes glucose through Entner-Doudoroff rather than EMP; gluconeogenesis and
      glucose-6-phosphate metabolic process better capture its role here.
    supported_by:
    - reference_id: file:PSEPK/pgi1/pgi1-notes.md
      supporting_text: P. putida KT2440 does NOT use the Embden-Meyerhof-Parnas (EMP/glycolysis)
        pathway for glucose catabolism.
    - reference_id: file:PSEPK/pgi1/pgi1-notes.md
      supporting_text: is a HAMAP/UniRule homology transfer
- term:
    id: GO:0048029
    label: monosaccharide binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000118
  qualifier: enables
  review:
    summary: Pgi binds its phosphorylated monosaccharide substrates (glucose-6-phosphate
      and fructose-6-phosphate) in the active site, so substrate binding is real. However,
      it is an intrinsic, generic component of the catalytic activity rather than a
      separate informative function.
    action: KEEP_AS_NON_CORE
