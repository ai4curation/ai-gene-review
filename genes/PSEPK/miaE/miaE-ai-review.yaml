suggested_questions:
- question: Which KT2440 tRNA isoacceptors carry the ms2io6A37 product under aerobic and low-oxygen growth conditions?
- question: Does native KT2440 tRNA carry ms2io6A37, or does the apparent absence of canonical MiaB mean MiaE mainly produces io6A37 from i6A37?
suggested_experiments:
- description: Compare tRNA nucleoside profiles from wild-type, miaE knockout, and candidate methylthiotransferase-control KT2440 cells across oxygen conditions by LC-MS/MS, explicitly distinguishing i6A37, io6A37, ms2i6A37, and ms2io6A37.
  experiment_type: tRNA modification profiling
