- id: file:PSEPK/miaE/miaE-deep-research-falcon.md
  title: Falcon (Edison Scientific) deep research report for miaE (PSEPK)
  findings:
  - supporting_text: experimentally validated to encode **MiaE**, a tRNA 2-(methylthio)-N6-isopentenyladenosine(37) hydroxylase/monooxygenase that converts **ms2i6A37 → ms2io6A37** in tRNA
  - supporting_text: MiaE is a **non-heme diiron enzyme**.
  - supporting_text: MiaE is the terminal enzyme in the A37 hypermodification branch leading to **ms2io6A37**.
  - supporting_text: MiaE functions as a **soluble cytosolic enzyme** acting on cellular tRNAs
- id: file:PSEPK/miaE/miaE-deep-research-openscientist.md
  title: OpenScientist deep research report for miaE (PSEPK)
  findings:
  - supporting_text: MiaE (gene *miaE*, ordered locus PP_2188, UniProt Q88KV1) of *Pseudomonas putida* KT2440 is a soluble, cytoplasmic non-heme carboxylate-bridged diiron monooxygenase
  - supporting_text: MiaE is best understood as the **terminal tailoring enzyme** of a stepwise anticodon-loop hypermodification pathway
  - supporting_text: The investigation demonstrates that the putative pp-2188 gene encodes a MiaE enzyme.
- id: file:projects/P_PUTIDA/deep-research/PSEPK__trna_ms2io6a37_hydroxylation__upa00729-deep-research-openscientist.md
  title: OpenScientist PSEPK UPA00729 pathway satisfiability review
  findings:
  - supporting_text: Because MiaB is absent but MiaA and MiaE are present, the native KT2440 product is most likely **io6A37**, not ms2io6A37.
  - supporting_text: Mark the **UPA00729 MiaE hydroxylation step COVERED** (PP_2188, direct + structural evidence).
  - supporting_text: The generic module product label "ms2io6A37" is therefore likely **wrong for this organism**.
