id: Q88PE9
gene_symbol: colR
aliases:
  - PP_0901
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: >-
  ColR is the response-regulator output of the ColRS two-component system in
  Pseudomonas putida KT2440. It is an OmpR/PhoB-family phosphorelay regulator
  that binds a conserved promoter motif and modulates expression of membrane- and
  envelope-associated genes. Across genetic, binding-site, and proteome studies,
  ColR is best understood as a dual transcription factor that preserves envelope
  homeostasis during phenol stress, glucose-limitation hunger response, and metal
  excess, with especially strong roles in zinc and iron tolerance.
existing_annotations:
  - term:
      id: GO:0000156
      label: phosphorelay response regulator activity
    evidence_type: IEA
    original_reference_id: GO_REF:0000118
    review:
      summary: >-
        This is the canonical biochemical role of ColR. ColR is the receiver
        partner of ColS in the ColRS two-component system and its phosphoacceptor
        aspartate is required for signaling output.
      action: ACCEPT
      reason: >-
        The annotation matches both domain architecture and organism-specific
        genetics. It captures the core response-regulator activity of the protein.
      supported_by:
        - reference_id: file:PSEPK/colR/colR-deep-research-falcon.md
          supporting_text: ColR and ColS form a functional phosphorelay, and Asp51 of ColR is required for phosphotransfer-dependent output.
        - reference_id: file:PSEPK/colR/colR-uniprot.txt
          supporting_text: 'DR   GO; GO:0000156; F:phosphorelay response regulator activity; IEA:TreeGrafter.'
  - term:
      id: GO:0000160
      label: phosphorelay signal transduction system
    evidence_type: IEA
    original_reference_id: GO_REF:0000002
    review:
      summary: >-
        ColR functions in a bona fide two-component signaling pathway that connects
        surface stress cues to transcriptional remodeling. The phenol, starvation,
        and metal-tolerance phenotypes all fit a signaling role rather than a
        constitutive DNA-binding protein.
      action: ACCEPT
      reason: >-
        This is the correct process-level annotation for ColR's place in the ColRS
        pathway.
      supported_by:
        - reference_id: file:PSEPK/colR/colR-deep-research-falcon.md
          supporting_text: ColRS is required for tolerance to excess iron and zinc and contributes to manganese and cadmium tolerance.
        - reference_id: file:PSEPK/colR/colR-deep-research-falcon.md
          supporting_text: colR mutants are hypersensitive to phenol, and phenol stress magnifies the promoter defects of ColR-regulated targets.
  - term:
      id: GO:0000976
      label: transcription cis-regulatory region binding
    evidence_type: IEA
    original_reference_id: GO_REF:0000120
    review:
      summary: >-
        ColR contains the expected OmpR/PhoB DNA-binding output domain and direct
        binding has been established experimentally for multiple promoters in the
        KT2440 regulon.
      action: ACCEPT
      reason: >-
        This term is specific and accurate for a response regulator that binds
        target promoters directly.
      supported_by:
        - reference_id: file:PSEPK/colR/colR-deep-research-falcon.md
          supporting_text: ColR directly binds a 16-bp consensus motif and CollecTF curates seven binding sites in P. putida KT2440.
  - term:
      id: GO:0003677
      label: DNA binding
    evidence_type: IEA
    original_reference_id: GO_REF:0000120
    review:
      summary: >-
        ColR is unquestionably a DNA-binding protein, but this parent term adds
        little once promoter binding and activator/repressor activities are already
        represented.
      action: MARK_AS_OVER_ANNOTATED
      reason: >-
        GO:0000976 plus the activator/repressor annotations are more informative
        and better capture the biological role.
      supported_by:
        - reference_id: file:PSEPK/colR/colR-uniprot.txt
          supporting_text: 'SubName: Full=DNA-binding response regulator'
  - term:
      id: GO:0005829
      label: cytosol
    evidence_type: IEA
    original_reference_id: GO_REF:0000118
    review:
      summary: >-
        Cytosolic localization is plausible for a soluble bacterial response
        regulator, but it is not the most informative representation of ColR
        biology.
      action: KEEP_AS_NON_CORE
      reason: >-
        The annotation is not wrong, but the core biology is promoter engagement
        and regulon control rather than generic residence in the cytosol.
      supported_by:
        - reference_id: file:PSEPK/colR/colR-uniprot.txt
          supporting_text: 'DR   GO; GO:0005829; C:cytosol; IEA:TreeGrafter.'
  - term:
      id: GO:0006355
      label: regulation of DNA-templated transcription
    evidence_type: IEA
    original_reference_id: GO_REF:0000120
    review:
      summary: >-
        The literature shows that ColR is a dual transcriptional regulator. It
        activates most known direct targets but also represses a smaller set of
        promoters tied to envelope remodeling.
      action: ACCEPT
      reason: >-
        The general parent process remains appropriate because ColR has both
        positive and negative outputs.
      supported_by:
        - reference_id: file:PSEPK/colR/colR-deep-research-falcon.md
          supporting_text: ColR functions mainly as an activator but also directly represses at least oprQ, algD, and PP_0737.
  - term:
      id: GO:0032993
      label: protein-DNA complex
    evidence_type: IEA
    original_reference_id: GO_REF:0000118
    review:
      summary: >-
        DNA-bound ColR will transiently be part of protein-DNA complexes at target
        promoters, but this is a contextual state rather than the main curation
        message for the gene.
      action: KEEP_AS_NON_CORE
      reason: >-
        Keep the annotation because it follows from direct promoter binding, but do
        not treat it as a core evolved function.
      supported_by:
        - reference_id: file:PSEPK/colR/colR-deep-research-falcon.md
          supporting_text: ColR directly binds a 16-bp consensus motif and CollecTF curates seven binding sites in P. putida KT2440.
  - term:
      id: GO:0045892
      label: negative regulation of DNA-templated transcription
    evidence_type: IEA
    original_reference_id: GO_REF:0000108
    review:
      summary: >-
        Although ColR is activator-dominant overall, direct repression is a real
        part of the regulon and is well supported for specific targets.
      action: ACCEPT
      reason: >-
        This term captures the repressor side of ColR output and should be retained
        alongside the positive-regulation annotation.
      supported_by:
        - reference_id: file:PSEPK/colR/colR-deep-research-falcon.md
          supporting_text: ColR functions mainly as an activator but also directly represses at least oprQ, algD, and PP_0737.
  - term:
      id: GO:0045893
      label: positive regulation of DNA-templated transcription
    evidence_type: IEA
    original_reference_id: GO_REF:0000108
    review:
      summary: >-
        Positive transcriptional control is the dominant direct output in curated
        ColR-binding datasets and aligns with the regulatory logic of the membrane
        homeostasis regulon.
      action: ACCEPT
      reason: >-
        ColR is not exclusively an activator, but positive regulation is a genuine
        and frequent part of its transcription-factor activity.
      supported_by:
        - reference_id: file:PSEPK/colR/colR-deep-research-falcon.md
          supporting_text: In the curated binding dataset, most direct ColR targets are activated and a smaller subset are repressed.
  - term:
      id: GO:0000976
      label: transcription cis-regulatory region binding
    evidence_type: IPI
    original_reference_id: PMID:19445690
    review:
      summary: >-
        This is the experimentally grounded version of the promoter-binding
        annotation. ColR consensus discovery and curated target mapping directly
        support cis-regulatory binding.
      action: ACCEPT
      reason: >-
        Direct promoter binding is central to ColR function and experimentally
        supported.
      supported_by:
        - reference_id: file:PSEPK/colR/colR-deep-research-falcon.md
          supporting_text: ColR directly binds a 16-bp consensus motif and CollecTF curates seven binding sites in P. putida KT2440.
  - term:
      id: GO:0001216
      label: DNA-binding transcription activator activity
    evidence_type: IPI
    original_reference_id: PMID:19445690
    review:
      summary: >-
        ColR directly activates multiple target promoters in the curated regulon,
        especially loci linked to cell-envelope maintenance.
      action: ACCEPT
      reason: >-
        Activator activity is a core component of the ColR transcriptional program.
      supported_by:
        - reference_id: file:PSEPK/colR/colR-deep-research-falcon.md
          supporting_text: In the curated binding dataset, most direct ColR targets are activated and a smaller subset are repressed.
  - term:
      id: GO:0001217
      label: DNA-binding transcription repressor activity
    evidence_type: IPI
    original_reference_id: PMID:19445690
    review:
      summary: >-
        ColR also directly represses a smaller but biologically meaningful subset of
        promoters, including genes linked to outer-membrane behavior.
      action: ACCEPT
      reason: >-
        Repressor activity is directly supported and should be retained rather than
        collapsed into a purely activator-only model.
      supported_by:
        - reference_id: file:PSEPK/colR/colR-deep-research-falcon.md
          supporting_text: ColR functions mainly as an activator but also directly represses at least oprQ, algD, and PP_0737.
  - term:
      id: GO:0032993
      label: protein-DNA complex
    evidence_type: IPI
    original_reference_id: PMID:19445690
    review:
      summary: >-
        Experimental promoter occupancy implies a DNA-bound complex, but this
        remains secondary to the regulatory function itself.
      action: KEEP_AS_NON_CORE
      reason: >-
        Correct as context, not especially informative as a core annotation.
      supported_by:
        - reference_id: file:PSEPK/colR/colR-deep-research-falcon.md
          supporting_text: ColR directly binds a 16-bp consensus motif and CollecTF curates seven binding sites in P. putida KT2440.
