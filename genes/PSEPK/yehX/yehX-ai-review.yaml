taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: yehX (PP_0868) encodes the ATP-binding energy-coupling component of a predicted quaternary-amine compatible-solute ABC importer in the PP_0868-PP_0871 locus. UniProt/RuleBase records quaternary ammonium import chemistry and an ABC transporter complex architecture, consistent with glycine-betaine/osmoprotectant uptake rather than a generic amino-acid transport role.
