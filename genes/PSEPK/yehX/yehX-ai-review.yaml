  qualifier: enables
  review:
    summary: Nucleotide binding is true but less informative than ATP binding for this ABC transporter ATPase.
    action: MARK_AS_OVER_ANNOTATED
    reason: The protein has canonical ABC transporter ATP-binding domains, and the specific ATP-binding and ATP-hydrolysis annotations are more useful than generic nucleotide binding.
