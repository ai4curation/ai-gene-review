id: Q88NK1
gene_symbol: oprD
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: >-
  oprD (PP_1206) encodes a substrate-selective outer membrane porin of the OprD/Occ
  (TC 1.B.25) family in Pseudomonas putida KT2440. The protein is a monomeric
  beta-barrel channel located in the bacterial outer membrane that mediates the
  facilitated diffusion of small, charged solutes from the extracellular space into
  the periplasm. As the archetypal OccD-subfamily porin (the founding member historically
  named OprD/OccD1), it is associated with the uptake of basic amino acids (e.g.,
  arginine, lysine) and related small molecules, contributing to nutrient scavenging
  across the low-permeability Pseudomonas outer membrane. In P. putida its expression
  is integrated into carbon/nitrogen status regulatory networks: transcription is
  induced under dual carbon-plus-nitrogen limitation, and the carbon-status response
  regulator CbrB binds the oprD promoter directly. Although annotated with an EC
  3.4.21.- (serine peptidase) keyword inherited from the source EMBL record, there
  is no biochemical or structural support for a hydrolase/peptidase activity; the
  protein is a channel-forming porin, not an enzyme.
existing_annotations:
- term:
    id: GO:0015288
    label: porin activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: >-
      Channel/porin activity is the well-supported molecular function for this protein.
      It belongs to the outer membrane porin (Opr, TC 1.B.25) family / OprD-Occ
      superfamily of substrate-selective beta-barrel channels, and the InterPro/PANTHER
      and Pfam (PF03573 OprD) signatures are diagnostic. Porin activity is the correct,
      appropriately general molecular function.
    action: ACCEPT
    reason: >-
      Family membership (OprD/Occ porin), Pfam PF03573, and the OprD-family literature
      establish that this is a channel-forming outer membrane porin. A more specific
      "wide pore channel activity" subtype is plausible but the parent porin activity
      term is well supported and is the core molecular function.
- term:
    id: GO:0016020
    label: membrane
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: located_in
  review:
    summary: >-
      Localization to a membrane is correct but uninformatively general. OprD/Occ-family
      porins are integral outer membrane beta-barrel proteins; the protein carries a
      cleaved N-terminal signal peptide (residues 1-23) consistent with Sec-dependent
      export and outer membrane insertion. The annotation should be refined to the
      bacterial outer membrane.
    action: MODIFY
    proposed_replacement_terms:
    - id: GO:0019867
      label: outer membrane
    reason: >-
      The protein is an established OprD/Occ-family outer membrane porin; the generic
      "membrane" term under-specifies its known compartment. GO:0019867 (outer membrane)
      is the appropriate, evidence-consistent refinement.
- term:
    id: GO:0055085
    label: transmembrane transport
  evidence_type: IEA
  original_reference_id: GO_REF:0000108
  qualifier: involved_in
  review:
    summary: >-
      As a porin, this protein mediates diffusion of small solutes across the outer
      membrane, so participation in transmembrane transport is the correct biological
      process. This is a reasonable, appropriately general process term inferred logically
      from the porin molecular function.
    action: ACCEPT
    reason: >-
      Porin activity entails movement of solutes across a membrane; transmembrane transport
      is the consistent and correct BP annotation. A more specific child (e.g., amino acid
      transmembrane transport) is plausible based on family-level substrate preference but
      is not directly demonstrated for PP_1206 itself, so the general term is retained.
core_functions:
- description: >-
    Substrate-selective outer membrane porin (OprD/OccD family) forming a monomeric
    beta-barrel channel that mediates facilitated diffusion of small charged solutes,
    notably basic amino acids, from the extracellular environment into the periplasm
    across the Pseudomonas outer membrane.
  supported_by:
  - reference_id: PMID:22272184
    supporting_text: >-
      OprD-family channels were redefined as Occ (outer membrane carboxylate) channels;
      OccD1 (formerly OprD) is the archetype associated with uptake of basic amino acids.
  - reference_id: PMID:28981745
    supporting_text: >-
      Review describing the Pseudomonas OprD/Occ porin family, with OccD members linked
      to uptake of basic amino acids and the low intrinsic permeability of the Pseudomonas
      outer membrane that makes such specific porins physiologically important.
  molecular_function:
    id: GO:0015288
    label: porin activity
  directly_involved_in:
    id: GO:0055085
    label: transmembrane transport
  locations:
  - id: GO:0019867
    label: outer membrane
proposed_new_terms: []
suggested_questions:
- question: >-
    What is the precise substrate specificity of P. putida KT2440 OprD (PP_1206) -
    does it transport basic amino acids (arginine/lysine) and/or other small solutes,
    and with what selectivity, when assayed directly (e.g., single-channel electrophysiology
    or proteoliposome flux)?
- question: >-
    Does loss of PP_1206 produce a measurable growth or outer membrane permeability
    phenotype in P. putida, or is its function masked by redundancy within the large
    OprD/Occ porin repertoire of this organism?
suggested_experiments:
- description: >-
    Construct a clean PP_1206 deletion mutant in P. putida KT2440 and assess growth on
    basic amino acids (arginine, lysine, histidine) as sole nitrogen/carbon source and
    outer membrane permeability, complementing in trans to confirm specificity.
- description: >-
    Purify OprD (PP_1206), reconstitute into planar lipid bilayers or proteoliposomes,
    and measure single-channel conductance and substrate-dependent flux/competition to
    define the channel's selectivity profile.
references:
- id: GO_REF:0000002
  title: Gene Ontology annotation through association of InterPro records with GO
    terms
  findings: []
- id: GO_REF:0000108
  title: Automatic assignment of GO terms using logical inference, based on on inter-ontology
    links
  findings: []
- id: GO_REF:0000120
  title: Combined Automated Annotation using Multiple IEA Methods
  findings: []
- id: PMID:22272184
  title: Substrate specificity within a family of outer membrane carboxylate channels
  findings:
  - statement: >-
      The OprD family is redefined as Occ (outer membrane carboxylate) channels; OccD1
      (historically OprD) is the family archetype associated with transport of basic amino
      acids, with selectivity shaped by a constriction formed by extracellular loops and
      conserved charged residues.
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified (PMID:22272184, Eren et al. 2012, PLoS Biology). Establishes the
      OprD/Occ family framework and basic-amino-acid association of OccD1/OprD; family-level
      inference for PP_1206.
- id: PMID:28981745
  title: Structure, function and regulation of Pseudomonas aeruginosa porins
  findings:
  - statement: >-
      Authoritative review of Pseudomonas porins describing the OprD/Occ family split into
      OccD (basic amino acid uptake) and OccK (carboxylate/cyclic molecule uptake) subfamilies,
      and emphasizing the low intrinsic permeability of the Pseudomonas outer membrane.
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified (PMID:28981745, Chevalier et al. 2017, FEMS Microbiol Rev). Family-level
      structure/function/regulation context.
- id: PMID:16352820
  title: Role of the novel OprD family of porins in nutrient uptake in Pseudomonas aeruginosa
  findings:
  - statement: >-
      OprD-subfamily porins mediate uptake of amino acids and related molecules (e.g.,
      dipeptides) in Pseudomonas, with substrate-inducible expression.
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified (PMID:16352820, Tamber et al. 2006, J Bacteriol). P. aeruginosa OprD-family
      nutrient-uptake function; supports family-level substrate inference for PP_1206.
- id: PMID:30557364
  title: The CbrB regulon - promoter dissection reveals novel insights into the cbrAB
    expression network in Pseudomonas putida
  findings:
  - statement: >-
      In P. putida, the carbon-status response regulator CbrB binds the oprD (PP1206) promoter
      directly (EMSA), and PP1206 is part of the CbrB regulon, linking oprD expression to
      carbon/nitrogen status signaling.
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified (PMID:30557364, Barroso et al. 2018, PLoS ONE). Organism-specific
      (P. putida) regulatory evidence for PP_1206; informs regulation, not the channel function.
- id: PMID:22433058
  title: The metabolic response of P. putida KT2442 producing high levels of polyhydroxyalkanoate
    under single- and multiple-nutrient-limited growth
  findings:
  - statement: >-
      In P. putida KT2442 chemostats, the specific porin OprD (PP_1206) was induced under
      dual carbon-plus-nitrogen limitation; the authors note OprD is implicated in uptake
      of basic amino acids across the membrane.
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified (PMID:22433058, Poblete-Castro et al. 2012, Microb Cell Fact).
      Organism-specific expression/induction evidence for PP_1206 under nutrient limitation.
