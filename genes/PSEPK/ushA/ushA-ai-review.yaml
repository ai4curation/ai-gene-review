description: ushA encodes a periplasmic 5'-nucleotidase/2',3'-cyclic phosphodiesterase-family enzyme that hydrolyzes extracellular or periplasmic nucleotides and related phosphate esters. It is a nucleotide-scavenging side node in the broad KEGG NAD/nicotinate map rather than a dedicated NAD biosynthesis enzyme.
