description: cbcW (PP_0295) encodes the predicted multi-pass inner-membrane permease component of a choline/betaine/carnitine-family ABC importer. GOA and domain annotations support a substrate range spanning choline, glycine betaine, and carnitine compatible-solute transport, with CbcV providing ATPase activity and CbcX/CaiX-like proteins providing periplasmic substrate binding.
