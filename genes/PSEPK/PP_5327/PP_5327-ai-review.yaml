  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: PP_5327 encodes a PstA-like multi-pass inner-membrane permease component of the PP_5326-PP_5329 Pst-like phosphate ABC importer. Its PstA-specific domain, binding-protein-dependent transport-system family assignment, and adjacent pstB2, PP_5328, and phosphate-binding PP_5329 genes support phosphate translocation across the plasma membrane.
