  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: PP_3413 encodes a predicted BvgS-like hybrid sensor histidine kinase in Pseudomonas putida
  KT2440. Periplasmic input domains, HisKA/HATPase catalytic domains, receiver and Hpt domains support
  a membrane two-component phosphorelay sensor/phosphotransfer role, likely connected to the adjacent
  PP_3412 response regulator.
