    summary: PhhA is annotated with EC 1.14.16.1/RHEA:20273 and has the aromatic amino acid hydroxylase family profile and Fe-binding residues expected for phenylalanine-4-hydroxylase.
    action: ACCEPT
    reason: This is the specific core molecular function of the protein and is strongly supported by UniProt catalytic activity plus family/domain evidence.
- term:
    id: GO:0005506
    label: iron ion binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: Phenylalanine hydroxylase uses an Fe(2+) cofactor, and UniProt annotates conserved iron-binding residues in this protein.
    action: ACCEPT
    reason: Iron binding is mechanistically required for the aromatic amino acid hydroxylase reaction.
- term:
    id: GO:0006559
    label: L-phenylalanine catabolic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: involved_in
