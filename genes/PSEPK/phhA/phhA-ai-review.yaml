taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: phhA (PP_4490) encodes a biopterin-dependent phenylalanine-4-hydroxylase in Pseudomonas putida KT2440. The enzyme hydroxylates L-phenylalanine to L-tyrosine using molecular oxygen, reduced tetrahydrobiopterin, and an Fe(2+) cofactor, and UniProt places it as the first step of phenylalanine degradation. KT2440 PhhR-regulon literature connects phhAB expression to phenylalanine utilization and aromatic amino acid catabolism, and mutant growth assays support a role for PhhA during growth on L-phenylalanine as a nitrogen source.
