  review:
    summary: Root-level molecular function term; true but superseded by succinate-CoA ligase activity.
    action: MARK_AS_OVER_ANNOTATED
    reason: SucD is an enzymatic subunit, so catalytic activity is not false, but GO:0004775 and GO:0004776 are the informative activity terms for the succinate-CoA ligase complex.
