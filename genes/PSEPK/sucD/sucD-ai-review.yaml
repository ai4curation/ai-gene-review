suggested_questions:
- question: What is the physiological nucleotide preference of the P. putida KT2440 SucC/SucD succinate-CoA ligase complex under TCA-cycle growth conditions?
suggested_experiments:
- description: Purify the SucC/SucD complex and compare ADP/ATP versus GDP/GTP kinetic parameters, then test whether nucleotide preference changes with carbon source or growth phase in vivo.
