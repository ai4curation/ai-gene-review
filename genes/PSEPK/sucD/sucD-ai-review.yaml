    reason: UniProt annotates SucD as the alpha subunit of succinate--CoA ligase [ADP-forming], EC 6.2.1.5, and gives the ADP-forming succinate-CoA ligase reaction. The PSEPK pathway report identifies sucC/sucD as the canonical SCS pair for TCA step 5.
