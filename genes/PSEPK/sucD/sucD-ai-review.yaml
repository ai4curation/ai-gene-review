  review:
    summary: Correct TCA-cycle process annotation for succinyl-CoA to succinate conversion.
    action: ACCEPT
    reason: Succinate-CoA ligase catalyzes the substrate-level phosphorylation step of the TCA cycle. UniProt places sucD in succinate formation from succinyl-CoA by the ligase route, and the PSEPK pathway report marks sucC/sucD as the correct step-5 call.
    supported_by:
