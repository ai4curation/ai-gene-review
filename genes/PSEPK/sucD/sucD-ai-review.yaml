    summary: Plausible retained activity for the succinate-CoA ligase complex, consistent with the already curated sucC review.
    action: ACCEPT
    reason: The UniProt record includes the GTP/GDP succinate-CoA ligase reaction, and the matching SucC beta-subunit review accepts GDP-forming activity as part of the bacterial SCS catalytic range. The ADP-forming term remains the core representation for this module.
