description: Alpha subunit of succinate--CoA ligase/succinyl-CoA synthetase in Pseudomonas putida KT2440. Together with the beta subunit SucC, SucD forms the soluble succinate-CoA ligase complex that reversibly interconverts succinyl-CoA and succinate while coupling the reaction to nucleotide phosphorylation. This is the substrate-level phosphorylation step of the tricarboxylic acid cycle; the alpha subunit contributes the CoA/phosphate-binding and phosphohistidine chemistry, while nucleotide specificity is supplied by the beta subunit.
