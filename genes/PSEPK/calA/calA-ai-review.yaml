description: calA (PP_2426) encodes a zinc-dependent alcohol dehydrogenase annotated as coniferyl-alcohol dehydrogenase. It belongs to the medium-chain alcohol dehydrogenase/reductase fold and is predicted to oxidize or reduce aromatic alcohol/aldehyde substrates. This is peripheral aromatic-compound/alcohol metabolism, not a core ED/gluconeogenic reaction.
