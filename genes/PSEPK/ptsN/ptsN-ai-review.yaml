taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: >-
  PtsN (PP_0950) is a PTS EIIA type-2 / nitrogen-regulatory PTS protein in
  Pseudomonas putida KT2440. Its UniProt record names it as a phosphotransferase
  system enzyme IIA associated with regulation of potassium transport, and its
  domain profile contains PTS EIIA type-2 and PTS nitrogen-regulatory
  signatures. The best first-pass interpretation is that PtsN is a regulatory
  PTS phosphocarrier/EIIA-like protein, distinct from the fructose-specific
  transport branch encoded by fruBKA.
existing_annotations:
