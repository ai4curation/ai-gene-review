    label: protein-N(PI)-phosphohistidine-carbohydrate phosphotransferase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: The EIIA-type PTS domain supports phosphohistidine phosphotransferase context, but the carbohydrate/sugar wording is not ideal for the nitrogen-regulatory PtsN branch.
    action: ACCEPT
    reason: This is the closest available GO molecular-function term currently supplied by InterPro for the PTS_Nitro_regul domain. It should be interpreted as EIIA-like PTS phosphotransfer chemistry, not as evidence that PtsN is a substrate-specific sugar transporter.
    supported_by:
