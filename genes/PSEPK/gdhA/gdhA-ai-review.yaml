description: gdhA (PP_0675) encodes an NADP-specific glutamate dehydrogenase (GDH; EC 1.4.1.4), a homohexameric enzyme that catalyzes the reversible oxidative deamination of L-glutamate to 2-oxoglutarate and ammonium with reduction of NADP+ (L-glutamate + NADP+ + H2O = 2-oxoglutarate + NH4+ + NADPH + H+). Each subunit has an N-terminal substrate (Glu/Leu/Phe/Val dehydrogenase) domain and a C-terminal NAD(P)-binding Rossmann-fold domain, with a conserved lysine acting as the catalytic proton donor. GDH provides a low-affinity, single-step route for assimilating ammonia into glutamate (in the aminating direction) and, in the deaminating direction, links glutamate catabolism to the TCA cycle by feeding 2-oxoglutarate, thereby serving as a key node connecting carbon and nitrogen metabolism. It is a soluble cytoplasmic protein in P. putida.
existing_annotations:
- term:
    id: GO:0004353
    label: L-glutamate dehydrogenase [NAD(P)+] activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000117
  qualifier: enables
  review:
    summary: Dual-cofactor glutamate dehydrogenase activity term (EC 1.4.1.3) assigned by ARBA. The UniProt catalytic-activity statement and the EC-based annotation (GO:0004354) specify the NADP-dependent reaction (EC 1.4.1.4); this NAD(P)+ term is a closely related, slightly broader sibling covering the same chemistry. Correct but less precise than the NADP-specific term; kept as non-core.
    action: KEEP_AS_NON_CORE
- term:
    id: GO:0004354
    label: L-glutamate dehydrogenase (NADP+) activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: Core molecular function. This is the precise EC 1.4.1.4 activity matching the UniProt catalytic-activity statement (RHEA:11612) and the Glu/Leu/Phe/Val dehydrogenase family assignment (PIRSF000185, PANTHER NADP-specific glutamate dehydrogenase). Active-site and NAD(P)-binding residues annotated in UniProt support this. Strongly supported despite IEA evidence.
    action: ACCEPT
- term:
    id: GO:0005829
    label: cytosol
  evidence_type: IEA
  original_reference_id: GO_REF:0000118
  qualifier: located_in
  review:
    summary: Correct cellular component. Bacterial glutamate dehydrogenase is a soluble cytoplasmic homohexamer; the cytosol localization applied by TreeGrafter is consistent with the known localization of this enzyme family. Accept.
    action: ACCEPT
- term:
    id: GO:0006520
    label: amino acid metabolic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: involved_in
  review:
    summary: Correct but general biological process. GDH interconverts L-glutamate and 2-oxoglutarate, participating in glutamate (amino-acid) metabolism. The InterPro-derived term is broader than the specific glutamate biosynthetic/catabolic role; kept as a supporting non-core process term.
    action: KEEP_AS_NON_CORE
- term:
    id: GO:0016491
    label: oxidoreductase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: Very general oxidoreductase root-level term derived from InterPro signatures. GDH is an oxidoreductase, but this term is uninformative relative to the specific EC 1.4.1.4 activity already captured by GO:0004354.
    action: MARK_AS_OVER_ANNOTATED
- term:
    id: GO:0016639
    label: oxidoreductase activity, acting on the CH-NH2 group of donors, NAD or NADP
      as acceptor
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: A more specific parent describing the chemistry (oxidation of the L-glutamate CH-NH2/amino group with NAD(P) as electron acceptor), derived from InterPro IPR014362/IPR033922 (Glu_DH). Correct but a generalization of the precise glutamate dehydrogenase (NADP+) activity; kept as a non-core supporting term.
    action: KEEP_AS_NON_CORE
