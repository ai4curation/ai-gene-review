taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: bioB encodes biotin synthase in Pseudomonas putida KT2440, the radical
  SAM enzyme that inserts sulfur into dethiobiotin to complete de novo biotin biosynthesis.
  The protein binds iron-sulfur clusters required for this chemistry and functions as a
  soluble cofactor-biosynthetic enzyme.
