- id: file:PSEPK/bioB/bioB-deep-research-openscientist.md
  title: OpenScientist functional report for PSEPK BioB
  findings:
  - statement: >-
      Supports the radical-SAM BioB assignment, terminal sulfur-insertion
      reaction, and the two UniProt-recorded iron-sulfur cluster classes by
      transfer from characterized BioB orthologs and conserved ligand motifs.
      No direct KT2440 BioB biochemistry, structure, localization, electron
      donor, or turnover study was identified. The report's pimeloyl-CoA
      pathway shorthand, industrial bottleneck claims, and broad downstream
      metabolic consequences are not used as core evidence.
core_functions:
- description: >-
    Uses radical-SAM chemistry to insert sulfur into dethiobiotin, producing
    biotin in the terminal biosynthetic reaction.
  molecular_function:
    id: GO:0004076
    label: biotin synthase activity
