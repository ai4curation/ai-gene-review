id: Q88QX2
gene_symbol: bioB
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: >-
  BioB is the radical S-adenosyl-L-methionine biotin synthase that inserts
  sulfur into dethiobiotin to form biotin. The enzyme carries a catalytic
  4Fe-4S radical-SAM cluster and an auxiliary 2Fe-2S cluster and performs the
  terminal reaction of de novo biotin biosynthesis.
existing_annotations:
- term:
    id: GO:0003824
    label: catalytic activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: This generic term is redundant with biotin synthase activity.
    action: MARK_AS_OVER_ANNOTATED
    reason: GO:0004076 captures the specific BioB reaction.
- term:
    id: GO:0004076
    label: biotin synthase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: This is the specific BioB catalytic activity.
    action: ACCEPT
    reason: >-
      The reviewed UniProt record, EC 2.8.1.6, HAMAP rule, and radical-SAM
      biotin synthase family assignments agree on sulfur insertion into
      dethiobiotin.
    supported_by:
    - reference_id: file:PSEPK/bioB/bioB-uniprot.txt
      supporting_text: Full=Biotin synthase
    - reference_id: file:PSEPK/bioB/bioB-deep-research-openscientist.md
      supporting_text: >-
        The gene **bioB** (ordered locus **PP_0362**; UniProt accession
        **Q88QX2**) of *Pseudomonas putida* KT2440 encodes **biotin synthase**
        (EC 2.8.1.6), a member of the **radical S-adenosylmethionine
        (radical-SAM) superfamily**.
- term:
    id: GO:0005506
    label: iron ion binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000104
  qualifier: enables
  review:
    summary: Generic iron binding is redundant with the cluster-specific terms.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      BioB binds iron as parts of defined 4Fe-4S and 2Fe-2S cofactors rather
      than as an unstructured free-ion interaction.
- term:
    id: GO:0009102
    label: biotin biosynthetic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: involved_in
  review:
    summary: BioB catalyzes the terminal reaction of biotin synthesis.
    action: ACCEPT
    reason: >-
      The enzyme converts dethiobiotin directly into biotin.
- term:
    id: GO:0051536
    label: iron-sulfur cluster binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: This generic cluster term is redundant with the two specific cluster classes.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      UniProt assigns both a 4Fe-4S radical-SAM cluster and an auxiliary
      2Fe-2S cluster.
- term:
    id: GO:0051537
    label: 2 iron, 2 sulfur cluster binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000118
  qualifier: enables
  review:
    summary: The auxiliary 2Fe-2S cluster is a valid mechanistic feature of BioB.
    action: KEEP_AS_NON_CORE
    reason: >-
      The reviewed UniProt record assigns one 2Fe-2S cluster coordinated by
      three cysteines and one arginine.
- term:
    id: GO:0051539
    label: 4 iron, 4 sulfur cluster binding
  evidence_type: IEA
  original_reference_id: file:PSEPK/bioB/bioB-uniprot.txt
  qualifier: enables
  review:
    summary: BioB should also carry the radical-SAM 4Fe-4S cluster annotation.
    action: NEW
    reason: >-
      The exact UniProt record assigns one cysteine-coordinated 4Fe-4S cluster
      that binds exchangeable S-adenosyl-L-methionine.
    supported_by:
    - reference_id: file:PSEPK/bioB/bioB-uniprot.txt
      supporting_text: Name=[4Fe-4S] cluster
