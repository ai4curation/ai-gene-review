    supporting_text: Full=Biotin synthase
  - reference_id: file:PSEPK/bioB/bioB-deep-research-openscientist.md
    supporting_text: >-
      The gene **bioB** (ordered locus **PP_0362**; UniProt accession
      **Q88QX2**) of *Pseudomonas putida* KT2440 encodes **biotin synthase**
      (EC 2.8.1.6), a member of the **radical S-adenosylmethionine
      (radical-SAM) superfamily**.
suggested_questions:
- question: >-
    Does KT2440 BioB use the two UniProt-predicted iron-sulfur clusters and the
    same physiological electron donor as characterized bacterial BioB enzymes?
suggested_experiments:
- description: >-
    Purify anaerobically reconstituted Q88QX2, quantify its 4Fe-4S and 2Fe-2S
    clusters, and assay conversion of dethiobiotin to biotin with candidate
    KT2440 electron-donor systems.
  experiment_type: biochemical analysis
- description: >-
    Delete bioB and measure biotin auxotrophy and intracellular dethiobiotin
    accumulation, with native-gene complementation.
  experiment_type: genetics and metabolomics
