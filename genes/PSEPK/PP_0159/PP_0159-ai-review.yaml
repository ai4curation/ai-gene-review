description: PP_0159 encodes a predicted family III CoA-transferase in Pseudomonas putida KT2440. It is included in the broad lysine-degradation KEGG map as glutarate/glutaryl-CoA boundary context, but the first-pass evidence supports only a CoA-transferase family activity without a resolved physiological acyl-CoA donor or acceptor.
