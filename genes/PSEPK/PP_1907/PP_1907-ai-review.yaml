- term:
    id: GO:0006281
    label: DNA repair
  evidence_type: IEA
  original_reference_id: GO_REF:0000118
  qualifier: involved_in
  review:
    summary: The DNA-repair annotation is plausible as upstream source context for 2-phosphoglycolate cleanup, but it should not be treated as PP_1907's direct core role.
    action: KEEP_AS_NON_CORE
    reason: The inferred role is hydrolysis of 2-phosphoglycolate, a metabolite that can arise during repair of oxidatively damaged 3'-phosphoglycolate DNA ends. PP_1907 is not itself a DNA repair enzyme, so the process annotation is retained only as non-core context.
    supported_by:
    - reference_id: file:PSEPK/PP_1907/PP_1907-goa.tsv
      supporting_text: "UniProtKB\tQ88LM3\tPP_1907\tinvolved_in\tGO:0006281\tDNA repair"
    - reference_id: file:PSEPK/PP_1907/PP_1907-deep-research-openscientist.md
      supporting_text: "the enzyme is not a DNA-repair protein itself but processes a **by-product** of DNA-end repair"
- term:
    id: GO:0008967
    label: phosphoglycolate phosphatase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000118
  qualifier: enables
  review:
    summary: PP_1907 is a predicted phosphoglycolate phosphatase, although direct substrate assays are lacking and PP_0416 is the stronger principal paralog.
    action: ACCEPT
    reason: TreeGrafter, PANTHER, KEGG, and OpenScientist all converge on 2-phosphoglycolate phosphatase activity; the caveat is paralog ambiguity rather than evidence against the annotation.
    supported_by:
    - reference_id: file:PSEPK/PP_1907/PP_1907-goa.tsv
      supporting_text: "UniProtKB\tQ88LM3\tPP_1907\tenables\tGO:0008967\tphosphoglycolate phosphatase activity"
    - reference_id: file:PSEPK/PP_1907/PP_1907-deep-research-openscientist.md
      supporting_text: "Multiple independent resources converge on **2-phosphoglycolate phosphatase (EC 3.1.3.18)**"
- term:
