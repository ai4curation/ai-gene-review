id: Q88LM3
gene_symbol: PP_1907
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: >-
  PP_1907 encodes a small soluble HAD-superfamily phosphatase in Pseudomonas
  putida KT2440. Automated orthology, PANTHER, KEGG, and OpenScientist evidence
  support phosphoglycolate phosphatase activity, but the assignment is
  inferential and PP_0416 is the stronger candidate for the principal KT2440
  2-phosphoglycolate phosphatase. PP_1907 is therefore curated as a predicted
  cytosolic phosphoglycolate/small-phosphometabolite cleanup enzyme that may act
  redundantly with other HAD-family paralogs.
