    label: glyoxylate metabolic process
  evidence_type: ISS
  original_reference_id: file:PSEPK/PP_1907/PP_1907-deep-research-openscientist.md
  qualifier: involved_in
  review:
    summary: PP_1907 is predicted to feed glycolate/glyoxylate metabolism by converting 2-phosphoglycolate to glycolate.
    action: NEW
