    id: GO:0003824
    label: catalytic activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000117
  qualifier: enables
  review:
    summary: The generic catalytic activity annotation is compatible with PP_1907 but less informative than the specific predicted phosphoglycolate phosphatase activity.
    action: MARK_AS_OVER_ANNOTATED
    reason: UniProt identifies PP_1907 as a HAD-like hydrolase, and the OpenScientist report supports a Mg(2+)-dependent phosphatase mechanism with a more specific phosphoglycolate phosphatase prediction.
