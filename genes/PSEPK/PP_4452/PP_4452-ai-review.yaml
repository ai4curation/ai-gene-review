id: Q88EL0
gene_symbol: PP_4452
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: >-
  PP_4452 encodes a predicted soluble NAD(P)-dependent oxidoreductase in the
  opine/lysopine dehydrogenase family. Q88EL0 has an opine-dehydrogenase
  C-terminal domain and is encoded next to an opine ABC importer and the
  opine-oxidase genes ooxA and ooxB. This architecture and neighborhood support
  an opine-related metabolic role, but the native substrate, cofactor
  preference, and physiological reaction direction have not been determined
  experimentally.
existing_annotations:
- term:
    id: GO:0008677
    label: 2-dehydropantoate 2-reductase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000003
  qualifier: enables
  review:
    summary: The EC-derived ketopantoate-reductase assignment conflicts with the full-length family classification.
    action: REMOVE
    reason: >-
      Q88EL0 is assigned to the opine/lysopine-dehydrogenase PANTHER and
      InterPro families and contains the diagnostic Octopine_DH domain. KEGG
      independently assigns it K04940/EC 1.5.1.28, while canonical panE
      Q88N64 supplies the ketopantoate reaction. The EC 1.1.1.169 mapping is
      therefore a cross-family electronic over-propagation.
    supported_by:
    - reference_id: file:PSEPK/PP_4452/PP_4452-goa.tsv
      supporting_text: "GO:0008677\t2-dehydropantoate 2-reductase activity"
    - reference_id: file:PSEPK/PP_4452/PP_4452-uniprot.txt
      supporting_text: "DR   InterPro; IPR051729; Opine/Lysopine_DH."
    - reference_id: file:PSEPK/PP_4452/PP_4452-uniprot.txt
      supporting_text: "DR   Pfam; PF02317; Octopine_DH; 1."
    - reference_id: file:PSEPK/PP_4452/PP_4452-deep-research-openscientist.md
      supporting_text: "The evidence overwhelmingly favors an **opine/lysopine dehydrogenase**."
- term:
    id: GO:0016491
    label: oxidoreductase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: A broad oxidoreductase term is supported while the native opine substrate remains unknown.
    action: ACCEPT
    reason: >-
      The Rossmann-like NAD(P)-binding architecture, opine-dehydrogenase family
      assignment, and neighboring opine-catabolism genes support an
      oxidoreductase function. A substrate-specific GO term would be premature
      without direct biochemistry.
    supported_by:
    - reference_id: file:PSEPK/PP_4452/PP_4452-goa.tsv
      supporting_text: "GO:0016491\toxidoreductase activity"
    - reference_id: file:PSEPK/PP_4452/PP_4452-uniprot.txt
      supporting_text: "DR   SUPFAM; SSF51735; NAD(P)-binding Rossmann-fold domains; 1."
    - reference_id: file:PSEPK/PP_4452/PP_4452-deep-research-openscientist.md
      supporting_text: "The **exact opine substrate of PP_4452 has not been experimentally determined.**"
- term:
    id: GO:0015940
    label: pantothenate biosynthetic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000041
  qualifier: involved_in
  review:
    summary: Pantothenate-pathway placement derives from the erroneous EC 1.1.1.169 assignment.
    action: REMOVE
    reason: >-
      The opine-dehydrogenase family and local opine uptake/oxidation locus
      place Q88EL0 outside pantothenate biosynthesis. Canonical PanE Q88N64
      satisfies the pantoate-forming reaction in KT2440.
    supported_by:
    - reference_id: file:PSEPK/PP_4452/PP_4452-goa.tsv
      supporting_text: "GO:0015940\tpantothenate biosynthetic process"
    - reference_id: file:PSEPK/PP_4452/PP_4452-notes.md
      supporting_text: "This is a family mismatch, not merely a redundant paralog."
    - reference_id: file:projects/P_PUTIDA/deep-research/PSEPK__coenzyme_a_biosynthesis__ppu00770-deep-research-openscientist.md
      supporting_text: "PP_4452 (not in the supplied candidate list) is a mis-annotated opine dehydrogenase"
