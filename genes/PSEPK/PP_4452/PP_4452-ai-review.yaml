description: PP_4452 is an opine/lysopine dehydrogenase-domain oxidoreductase with electronic UniProt/GOA
  assignment to 2-dehydropantoate reductase and pantothenate biosynthesis. Because its family context
  is mixed and no direct KT2440 evidence was found in this first pass, it is retained as a candidate-uncertain
  pantothenate-biosynthesis paralog.
