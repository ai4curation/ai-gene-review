  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: aotP (PP_0283) encodes the ATP-binding energy-coupling subunit of a predicted arginine/ornithine ABC uptake system. Its ABC transporter ATP-binding domains support ATP hydrolysis-driven transport in the PP_0280-PP_0283 Art/Aot locus.
