description: 'PP_3254 encodes a predicted 5-methylthioadenosine/S-adenosylhomocysteine nucleosidase. It links SAM-dependent methylation chemistry to methionine salvage by cleaving methylthioadenosine and can also act on S-adenosylhomocysteine; it is a ppu00270 salvage/SAM-cycle side node rather than a de novo methionine-biosynthesis enzyme.'
