id: P0A173
gene_symbol: tolB
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: >-
  tolB encodes the periplasmic TolB component of the Gram-negative Tol-Pal
  envelope system. TolB belongs to the TolB beta-propeller family and is part of
  the network linking inner-membrane Tol proteins, periplasmic components,
  peptidoglycan, and the outer-membrane lipoprotein Pal. Its main role is
  envelope coordination during outer-membrane invagination in cell division and
  maintenance of outer-membrane integrity; broad protein transport/import
  annotations reflect Tol-family side contexts and are not the core KT2440
  pathway role.
