id: Q88MP1
gene_symbol: dapD
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: >-
  dapD encodes tetrahydrodipicolinate N-succinyltransferase (EC 2.3.1.117),
  which uses succinyl-CoA to mask tetrahydrodipicolinate in the succinylated
  diaminopimelate route of L-lysine biosynthesis. This reaction establishes the
  route-specific substrate used by DapC and DapE.
