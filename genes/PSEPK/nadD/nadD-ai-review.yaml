  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: >-
  Nicotinate-nucleotide adenylyltransferase of Pseudomonas putida KT2440. NadD
  adenylylates nicotinate D-ribonucleotide (NaMN) with ATP to form deamido-NAD
  and diphosphate. It is the first reaction of the shared NaMN-to-NAD+
  completion branch used by de novo and deamidating salvage routes.
