description: >-
  pilE encodes a predicted type IV pilus biogenesis protein in Pseudomonas
  putida KT2440. Its PilE-like/pilin-like domains, N-methylation signature, and
  transmembrane helix support a type IV pilus assembly role, likely as a
  minor-pilin or pilin-like assembly component rather than a characterized
  enzyme.
