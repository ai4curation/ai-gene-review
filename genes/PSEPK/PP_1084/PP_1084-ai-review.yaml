  evidence_type: IPI
  original_reference_id: PMID:26278368
  review:
    summary: Identical protein binding is supported by the IntAct self-interaction record and reflects the
      homo-oligomerization that is mechanistically central to TsaA/PpPrx function. The falcon report and PMID:26278368
      show PP_1084/PpPrx self-associates into high-molecular-weight (HMW, chaperone-active) and low-molecular-weight
      (LMW, peroxidase-active) forms, so self-association underpins the redox-dependent peroxidase/chaperone switch.
    action: KEEP_AS_NON_CORE
    reason: Retain as non-core self-association evidence; while peripheral to the catalytic chemistry itself,
      the homo-oligomerization it captures drives the functional switching between peroxidase and chaperone states.
