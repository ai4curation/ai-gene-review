description: tsaA (locus PP_1084) encodes a cytoplasmic AhpC/Prx1-family thioredoxin peroxidase/peroxiredoxin.
  Its core role is reduction and detoxification of hydrogen peroxide and organic hydroperoxides, contributing
  to cellular oxidant detoxification and redox stress protection in KT2440.
