proposed_new_terms: []
suggested_questions:
- question: Under which physiological oxidative-stress conditions in KT2440 does TsaA/PpPrx shift between the
    HMW chaperone-active and LMW peroxidase-active oligomeric states, and what is the in vivo balance of these
    two functions?
  experts:
  - Bacterial oxidative stress experts
- question: Does KT2440 TsaA reduce organic hydroperoxides and peroxynitrite in addition to H2O2, as predicted
    from AhpC/Prx1 subfamily membership?
  experts:
  - Peroxiredoxin enzymology experts
suggested_experiments:
- description: Measure peroxide-reduction kinetics (H2O2 and organic hydroperoxides) and oligomeric state changes
    for purified TsaA under peroxide and thioredoxin/thioredoxin-reductase conditions, using size-exclusion
    chromatography to resolve HMW versus LMW species.
  experiment_type: redox enzyme assay
- description: Assess molecular chaperone (holdase) activity of purified TsaA by thermal- and chemical-aggregation
    suppression assays with model substrates, correlating activity with oligomeric state and redox conditions.
  experiment_type: chaperone aggregation-suppression assay
