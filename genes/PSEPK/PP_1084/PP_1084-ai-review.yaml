- term:
    id: GO:0051082
    label: unfolded protein binding
  evidence_type: IDA
  original_reference_id: PMID:26278368
  review:
    summary: PP_1084/PpPrx has experimentally demonstrated molecular chaperone (holdase) activity. In its high-molecular-weight
      oligomeric state it suppresses thermal aggregation of model substrate proteins, and this chaperone state
      interconverts with the low-molecular-weight peroxidase-active form under redox control. This dual peroxidase/chaperone
      function is well documented for this protein but is not captured by any of the existing GOA annotations, so
      it is proposed as a NEW molecular-function annotation.
    action: NEW
    reason: An et al. (PMID:26278368, and PMID:21104173) directly show PpPrx (PP_1084) functions as a molecular
      chaperone in addition to its peroxidase activity, with chaperone activity associated with the HMW oligomeric
      form. Unfolded protein binding (GO:0051082) is the appropriate molecular-function term for this holdase activity.
    supported_by:
    - reference_id: PMID:26278368
      supporting_text: PpPrx and PaPrx can alternatively function as a peroxidase and chaperone
