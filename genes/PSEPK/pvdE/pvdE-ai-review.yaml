      involved in pyoverdine precursor translocation
    supporting_text: The best-supported specific role is ATP-dependent export of
      the pyoverdine precursor PVDIq from the cytoplasmic side of the inner
      membrane to the periplasm.
  - statement: The specific substrate assignment is orthology-based rather than
      directly demonstrated in KT2440
    supporting_text: The specific substrate assignment is based on experimental
      work in Pseudomonas aeruginosa and on strong orthology/domain conservation,
      not on a direct biochemical assay of the KT2440 protein.
