id: Q88F82
gene_symbol: pvdE
product_type: PROTEIN
aliases:
- PP_4216
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: >-
  PvdE is a predicted inner membrane ABC exporter required for pyoverdine
  biosynthesis in Pseudomonas putida KT2440. It is a fused transporter with an
  N-terminal multi-pass transmembrane domain and a C-terminal ABC ATPase domain.
  Based on conserved domain architecture, the UniProt annotation, and experimental
  work on homologous Pseudomonas PvdE proteins, its most likely role is ATP-driven
  export of the pyoverdine precursor PVDIq from the cytoplasmic membrane to the
  periplasm, where downstream maturation steps generate fluorescent pyoverdine.
  Direct biochemical evidence for the KT2440 protein itself appears limited, so
  substrate specificity should be interpreted as a strong orthology-based
  inference rather than a strain-specific demonstration.
existing_annotations:
- term:
    id: GO:0005524
    label: ATP binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: >-
      Correct but too generic. PvdE contains a canonical ABC transporter
      nucleotide-binding domain and necessarily binds ATP, but this parent term is
      much less informative than the existing transporter activity annotations.
    action: MARK_AS_OVER_ANNOTATED
- term:
    id: GO:0005886
    label: plasma membrane
  evidence_type: IEA
  original_reference_id: GO_REF:0000044
  review:
    summary: >-
      Correct. UniProt describes PvdE as a cell membrane multi-pass protein, and
      the sequence contains multiple predicted transmembrane helices in the
      N-terminal half, consistent with a bacterial inner membrane ABC exporter.
    action: ACCEPT
    supported_by:
    - reference_id: file:PSEPK/pvdE/pvdE-notes.md
      supporting_text: UniProt predicts cell membrane localization and multiple
        transmembrane helices, consistent with an inner membrane transporter.
- term:
    id: GO:0015833
    label: peptide transport
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: >-
      Only partially satisfactory. PvdE probably exports a peptidyl pyoverdine
      precursor, so the annotation is not entirely wrong, but the biologically
      relevant process is siderophore-related precursor traffic in the pyoverdine
      pathway rather than general peptide transport.
    action: MODIFY
    proposed_replacement_terms:
    - id: GO:0015891
      label: siderophore transport
- term:
    id: GO:0016020
    label: membrane
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: >-
      Too generic to be useful once GO:0005886 plasma membrane is present.
    action: REMOVE
- term:
    id: GO:0016887
    label: ATP hydrolysis activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: >-
      Correct but generic. ATP hydrolysis is expected for an ABC exporter and is
      mechanistically necessary, but the transporter-function terms carry the main
      biological meaning.
    action: KEEP_AS_NON_CORE
- term:
    id: GO:0034040
    label: ATPase-coupled lipid transmembrane transporter activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000118
  review:
    summary: >-
      Unsupported and likely incorrect. The best current functional inference is
      transport of a pyoverdine precursor, not a lipid substrate.
    action: REMOVE
    supported_by:
    - reference_id: file:PSEPK/pvdE/pvdE-notes.md
      supporting_text: GO:0034040 ATPase-coupled lipid transmembrane transporter
        activity is not supported; the inferred cargo is a pyoverdine precursor
        rather than a lipid.
- term:
    id: GO:0042626
    label: ATPase-coupled transmembrane transporter activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000118
  review:
    summary: >-
      Correct as a high-level molecular function term for an ABC exporter, but less
      informative than GO:0140359 and less substrate-aware than GO:1904680.
    action: KEEP_AS_NON_CORE
- term:
    id: GO:0055085
    label: transmembrane transport
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  review:
    summary: >-
      Too general. A more specific biological process term exists for the role most
      strongly supported here, namely movement of a siderophore-related precursor
      within the pyoverdine pathway.
    action: MODIFY
    proposed_replacement_terms:
    - id: GO:0015891
      label: siderophore transport
- term:
    id: GO:0140359
    label: ABC-type transporter activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: >-
      Correct and currently the best general molecular function term. The domain
      architecture and transporter topology strongly support classification as an
      ABC exporter.
    action: ACCEPT
    supported_by:
    - reference_id: file:PSEPK/pvdE/pvdE-notes.md
      supporting_text: GO:0140359 ABC-type transporter activity is the most
        reliable current molecular function term for the KT2440 protein.
- term:
    id: GO:1904680
    label: peptide transmembrane transporter activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: >-
      Probably the closest available substrate-class molecular function term. The
      experimentally supported role of homologous PvdE proteins is export of a
      peptidyl pyoverdine precursor, although the term still misses the
      siderophore-precursor context and should be interpreted cautiously.
    action: ACCEPT
    supported_by:
    - reference_id: file:PSEPK/pvdE/pvdE-notes.md
      supporting_text: The best-supported specific role is ATP-dependent export of
        the pyoverdine precursor PVDIq from the cytoplasmic side of the inner
        membrane to the periplasm.
- term:
    id: GO:0019290
    label: siderophore biosynthetic process
  evidence_type: ISS
  original_reference_id: PMID:24816606
  review:
    summary: >-
      Proposed new annotation. PvdE acts within the pyoverdine biosynthetic pathway
      by moving the precursor into the periplasm for subsequent maturation steps,
      so biosynthetic-process annotation is appropriate in addition to transport.
    action: NEW
    supported_by:
    - reference_id: file:PSEPK/pvdE/pvdE-notes.md
      supporting_text: GO:0019290 siderophore biosynthetic process is justified
        because PvdE acts within the pyoverdine maturation pathway rather than in
        general peptide transport.
