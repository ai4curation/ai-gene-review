proposed_new_terms:
- proposed_name: pyoverdine precursor transmembrane transporter activity
  proposed_definition: >-
    The ATP-dependent directed movement of a pyoverdine biosynthetic precursor,
    such as PVDIq, across a membrane.
  supported_by:
  - reference_id: file:PSEPK/pvdE/pvdE-notes.md
    supporting_text: A useful new term would be "pyoverdine precursor transmembrane
      transporter activity".
