  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: arcA (PP_1001) encodes arginine deiminase, the first enzyme of the arginine deiminase catabolic pathway. It converts
  L-arginine to L-citrulline and ammonia in the cytoplasm and is a side-route member of the KEGG arginine-biosynthesis map
  rather than a biosynthetic enzyme.
