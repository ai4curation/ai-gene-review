id: Q88Q89
gene_symbol: ispH
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: >-
  ispH encodes the [4Fe-4S]-dependent terminal reductase of the
  methylerythritol phosphate pathway. It reduces HMBPP to a mixture of
  isopentenyl diphosphate and dimethylallyl diphosphate, the universal
  five-carbon precursors used for downstream isoprenoid synthesis.
existing_annotations:
- term:
    id: GO:0016114
    label: terpenoid biosynthetic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000104
  qualifier: involved_in
  review:
    summary: Terpenoid biosynthesis is correct but broader than the product-specific terms.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      GO:0019288 and GO:0050992 capture the specific IPP and DMAPP
      biosynthetic roles of IspH, making this broad parent redundant.
    supported_by:
    - reference_id: file:PSEPK/ispH/ispH-goa.tsv
      supporting_text: "GO:0016114\tterpenoid biosynthetic process"
- term:
    id: GO:0019288
    label: isopentenyl diphosphate biosynthetic process, methylerythritol phosphate
      pathway
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: involved_in
  review:
    summary: The methylerythritol phosphate pathway is a core process for IspH.
    action: ACCEPT
    reason: >-
      UniProt places IspH at the terminal step of the six-reaction route from
      DXP to isopentenyl diphosphate.
    supported_by:
    - reference_id: file:PSEPK/ispH/ispH-uniprot.txt
      supporting_text: isopentenyl diphosphate biosynthesis via DXP pathway
- term:
    id: GO:0046872
    label: metal ion binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: Generic metal binding is redundant beside the specific [4Fe-4S] cluster term.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      UniProt identifies one [4Fe-4S] cluster as the catalytic cofactor, so
      generic metal binding adds no useful specificity.
    supported_by:
    - reference_id: file:PSEPK/ispH/ispH-uniprot.txt
      supporting_text: Binds 1 [4Fe-4S] cluster per subunit.
- term:
    id: GO:0050992
    label: dimethylallyl diphosphate biosynthetic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: involved_in
  review:
    summary: DMAPP biosynthesis is a direct core pathway output of IspH.
    action: ACCEPT
    reason: >-
      The IspH reaction produces DMAPP as one of two products from HMBPP, and
      UniProt assigns the corresponding one-step DMAPP biosynthetic pathway.
    supported_by:
    - reference_id: file:PSEPK/ispH/ispH-uniprot.txt
      supporting_text: and dimethylallyl diphosphate (DMAPP)
- term:
    id: GO:0051539
    label: 4 iron, 4 sulfur cluster binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000104
  qualifier: enables
  review:
    summary: The [4Fe-4S] cluster is required catalytic cofactor context for IspH.
    action: KEEP_AS_NON_CORE
    reason: >-
      UniProt records one [4Fe-4S] cluster per subunit, while the
      substrate-specific reductase term captures the evolved core function.
    supported_by:
    - reference_id: file:PSEPK/ispH/ispH-uniprot.txt
      supporting_text: Binds 1 [4Fe-4S] cluster per subunit.
- term:
    id: GO:0051745
    label: 4-hydroxy-3-methylbut-2-enyl diphosphate reductase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: HMBPP reductase activity is the specific catalytic function of IspH.
    action: ACCEPT
    reason: >-
      UniProt assigns EC 1.17.7.4 and Rhea 24488/24825 for reduction of HMBPP
      to IPP and DMAPP with a ferredoxin electron donor.
    supported_by:
    - reference_id: file:PSEPK/ispH/ispH-uniprot.txt
      supporting_text: Catalyzes the conversion of 1-hydroxy-2-methyl-2-(E)-butenyl
