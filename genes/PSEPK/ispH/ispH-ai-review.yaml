  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: ispH encodes 4-hydroxy-3-methylbut-2-enyl diphosphate reductase, the terminal iron-sulfur enzyme of the bacterial
  MEP pathway. It reduces HMBPP to a mixture of IPP and DMAPP, completing formation of the C5 building blocks for terpenoid
  biosynthesis.
