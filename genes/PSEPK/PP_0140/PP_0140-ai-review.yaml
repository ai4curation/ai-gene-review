  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: PP_0140 encodes a small membrane-associated Mce/MlaD-domain protein in the PP_0140-PP_0142 locus. The domain
  architecture and adjacent MlaE-family permease support a putative role as an MlaD-like phospholipid-binding component of
  a candidate envelope phospholipid ABC transporter, but no direct P. putida experimental evidence or named reviewed pathway
  annotation was found in this first pass.
