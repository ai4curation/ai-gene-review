  findings:
  - statement: Synthesizes literature establishing aceA/PP_4116 as isocitrate lyase
      of the glyoxylate shunt, required for growth on acetyl-CoA-yielding substrates
      (fatty acids, octane) in KT2440.
    reference_section_type: OTHER
- id: PMID:30200852
  title: The Glyoxylate Shunt, 60 Years On
  findings:
  - statement: Isocitrate lyase (AceA) cleaves isocitrate into succinate and glyoxylate,
      the committed step of the glyoxylate shunt, which is a branch of the TCA cycle
      that bypasses the two oxidative decarboxylation steps to conserve carbon.
    reference_section_type: RESULTS
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: PMID verified via PubMed (Dolan & Welch, Annu Rev Microbiol 2018;
      DOI 10.1146/annurev-micro-090817-062257). Authoritative review establishing
      the reaction and the glyoxylate-shunt-vs-TCA distinction used in this review.
- id: PMID:35651318
  title: Providing octane degradation capability to Pseudomonas putida KT2440 through
    the horizontal acquisition of oct genes located on an integrative and conjugative
    element
  findings:
  - statement: aceA (PP_4116, isocitrate lyase) is induced during alkane assimilation
      and an aceA knockout fails to grow on octane/octanoic acid, demonstrating its
      requirement for routing acetyl-CoA through the glyoxylate shunt in KT2440.
    reference_section_type: RESULTS
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: PMID verified via PubMed (Duque et al., Environ Microbiol Rep 2022;
      DOI 10.1111/1758-2229.13097). Provides gene-specific genetic and proteomic evidence
      for aceA function in P. putida KT2440.
- id: PMID:24951791
  title: The functional structure of central carbon metabolism in Pseudomonas putida
    KT2440
  findings:
  - statement: 13C flux analysis shows glyoxylate-cycle flux is carbon-source dependent
      in KT2440 (no detectable flux on glucose; ~4% of isocitrate flux diverted through
      the glyoxylate cycle on fructose).
    reference_section_type: RESULTS
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: PMID verified via PubMed (Sudarsan et al., Appl Environ Microbiol
      2014; DOI 10.1128/aem.01643-14). Supports condition-dependent engagement of
      the glyoxylate shunt.
