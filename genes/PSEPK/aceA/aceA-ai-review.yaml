id: Q88FI0
gene_symbol: aceA
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: aceA (PP_4116) encodes isocitrate lyase (ICL; EC 4.1.3.1), a cytosolic
  enzyme of the isocitrate lyase/PEP mutase superfamily that catalyzes the reversible
  retro-aldol cleavage of isocitrate into succinate and glyoxylate. This is the committed,
  first step of the glyoxylate shunt (glyoxylate bypass), a branch of the tricarboxylic
  acid cycle at the isocitrate node that conserves carbon skeletons by bypassing the
  two oxidative decarboxylation steps of the TCA cycle. Together with malate synthase
  (GlcB, PP_0356), which condenses the glyoxylate produced by ICL with acetyl-CoA to
  form malate, the shunt enables net assimilation of two-carbon and acetyl-CoA-yielding
  substrates into C4 intermediates that feed gluconeogenesis and biomass formation.
  In Pseudomonas putida KT2440 the enzyme is required for growth on substrates that
  are catabolized to acetyl-CoA, including many fatty acids and alkanes (e.g. octane/octanoate);
  glyoxylate-shunt flux is strongly carbon-source dependent and is regulated transcriptionally
  (e.g. by RccR/HexR-family regulators) and post-translationally.
