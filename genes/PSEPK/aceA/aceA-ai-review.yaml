- term:
    id: GO:0004451
    label: isocitrate lyase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: Core molecular function. aceA/PP_4116 is isocitrate lyase (EC 4.1.3.1),
      catalyzing cleavage of isocitrate to succinate plus glyoxylate (RHEA:13245).
    action: ACCEPT
    reason: Strongly supported by sequence/domain assignment (ICL/PEPM, IPR006254;
      TIGR01346) and consistent with the literature on the P. putida KT2440 glyoxylate
      shunt, where aceA induction and aceA-knockout growth phenotypes are observed
      under acetyl-CoA-yielding carbon sources [PMID:35651318 "aceA knockout failed
      to grow on octane"; PMID:30200852 "isocitrate lyase cleaves isocitrate into
      succinate and glyoxylate"].
- term:
    id: GO:0006097
    label: glyoxylate cycle
  evidence_type: IEA
  original_reference_id: GO_REF:0000117
  qualifier: involved_in
  review:
    summary: Core biological process. aceA catalyzes the committed step of the glyoxylate
      shunt/cycle.
    action: ACCEPT
    reason: The glyoxylate shunt in P. putida KT2440 is encoded by aceA (PP_4116,
      isocitrate lyase) and glcB (PP_0356, malate synthase); transposon disruption
      of aceA causes serious fitness defects on fatty acids and an aceA knockout cannot
      grow on octane, confirming the in vivo role in the glyoxylate cycle [PMID:35651318;
      file:PSEPK/aceA/aceA-deep-research-falcon.md].
- term:
    id: GO:0006099
    label: tricarboxylic acid cycle
  evidence_type: IEA
  original_reference_id: GO_REF:0000104
  qualifier: involved_in
  review:
    summary: Over-propagated process term. Isocitrate lyase acts at the isocitrate
      branch point but is an enzyme of the glyoxylate shunt that bypasses the TCA
      cycle, not a TCA cycle enzyme.
    action: MODIFY
    reason: The glyoxylate shunt diverts isocitrate away from the oxidative decarboxylation
      steps of the TCA cycle; ICL does not catalyze a reaction of the canonical TCA
      cycle [PMID:30200852 "the glyoxylate shunt is a branch of the TCA cycle that
      diverts carbon away from oxidative decarboxylation"]. The biological process
      is better captured by glyoxylate cycle (already annotated, GO:0006097). This
      IEA likely arises from electronic transfer at the shared isocitrate node and
      should be retargeted rather than retained as TCA cycle.
    proposed_replacement_terms:
    - id: GO:0006097
      label: glyoxylate cycle
