    title: Gene Ontology annotation through association of InterPro records with GO terms
    findings: []
  - id: GO_REF:0000120
    title: Combined Automated Annotation using Multiple IEA Methods
    findings: []
  - id: file:PSEPK/hemA/hemA-uniprot.txt
    title: UniProtKB entry for PSEPK hemA
    findings:
      - statement: HemA reduces glutamyl-tRNA(Glu) with NADPH.
        supporting_text: Catalyzes the NADPH-dependent reduction of glutamyl-tRNA(Glu)
      - statement: HemA is the first step of C5-route ALA synthesis.
        supporting_text: "biosynthesis; 5-aminolevulinate from L-glutamyl-tRNA(Glu): step 1/2."
  - id: PMID:7883699
    title: Regulation of the hemA gene during 5-aminolevulinic acid formation in Pseudomonas aeruginosa.
    full_text_unavailable: true
    findings:
      - statement: >-
          The abstract directly lists Pseudomonas putida among organisms shown
          to use the tRNA-dependent HemA/HemL route to ALA.
        supporting_text: be used by Pseudomonas aeruginosa, Pseudomonas putida, Pseudomonas stutzeri,
    reference_review:
      relevance: HIGH
      correctness: VERIFIED
      review_notes: >-
        PubMed-cached abstract-only primary research supports the route at the
        P. putida species level, not direct biochemistry of KT2440 Q88PW6.
  - id: file:PSEPK/hemA/hemA-deep-research-openscientist.md
    title: OpenScientist research report for PSEPK hemA
    findings:
      - statement: >-
          The report found no purified-enzyme kinetics for KT2440 Q88PW6 and
          treats regulatory and HemA-HemL channeling mechanisms as ortholog-based.
        supporting_text: No purified-enzyme kinetics
    reference_review:
      relevance: HIGH
      correctness: MISCITED
      review_notes: >-
        The report correctly identifies Q88PW6 and recovers direct species-level
        evidence for the P. putida C5 route. However, it presents an unsaved
        target-sequence alignment and exact residue mapping as confirmed analysis,
        attributes a P. aeruginosa complementation and operon result to KT2440,
        and promotes E. coli/Salmonella regulation and channeling results to the
        P. putida protein. Only the core reaction and species-level route evidence
        were retained.
core_functions:
  - description: >-
      Reduces glutamyl-tRNA(Glu) with NADPH to form glutamate 1-semialdehyde,
      initiating the C5 glutamyl-tRNA route to protoporphyrinogen IX and heme b.
    molecular_function:
      id: GO:0008883
      label: glutamyl-tRNA reductase (NADP+) activity
    directly_involved_in:
      - id: GO:0033014
        label: tetrapyrrole biosynthetic process
    supported_by:
      - reference_id: file:PSEPK/hemA/hemA-uniprot.txt
        supporting_text: Catalyzes the NADPH-dependent reduction of glutamyl-tRNA(Glu)
      - reference_id: PMID:7883699
        supporting_text: be used by Pseudomonas aeruginosa, Pseudomonas putida, Pseudomonas stutzeri,
suggested_questions:
  - question: >-
      How is KT2440 HemA flux regulated relative to glutamyl-tRNA demand for
      protein synthesis under iron or oxygen limitation?
suggested_experiments:
  - hypothesis: HemA is required for C5-route ALA production in KT2440.
    description: >-
      Measure ALA and downstream porphyrin intermediates after conditional hemA
      depletion, with rescue by exogenous ALA.
