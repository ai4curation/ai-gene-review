id: Q88PW6
gene_symbol: hemA
product_type: PROTEIN
aliases:
  - PP_0732
status: COMPLETE
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: >-
  HemA is the glutamyl-tRNA reductase that initiates the C5 glutamyl-tRNA route
  to 5-aminolevulinate. It uses NADPH to reduce glutamyl-tRNA(Glu), releasing
  tRNA(Glu) and forming glutamate 1-semialdehyde for conversion by HemL. This
  commits a translation-linked glutamyl-tRNA substrate to tetrapyrrole and heme
  precursor synthesis.
existing_annotations:
  - term:
      id: GO:0008883
      label: glutamyl-tRNA reductase (NADP+) activity
    evidence_type: IEA
    original_reference_id: GO_REF:0000120
    qualifier: enables
    review:
      summary: This is the defining catalytic activity of HemA.
      action: ACCEPT
      reason: >-
        UniProt assigns EC 1.2.1.70 and describes NADPH-dependent reduction of
        glutamyl-tRNA(Glu) to glutamate 1-semialdehyde. The GO identifier and
        canonical activity label are correct.
      supported_by:
        - reference_id: file:PSEPK/hemA/hemA-uniprot.txt
          supporting_text: Catalyzes the NADPH-dependent reduction of glutamyl-tRNA(Glu)
        - reference_id: file:PSEPK/hemA/hemA-deep-research-openscientist.md
          supporting_text: >-
            The gene **hemA** (ordered locus **PP_0732**; UniProt **Q88PW6**)
            of *Pseudomonas putida* KT2440 encodes **glutamyl-tRNA reductase
            (GluTR; EC 1.2.1.70)**
  - term:
      id: GO:0033014
      label: tetrapyrrole biosynthetic process
    evidence_type: IEA
    original_reference_id: GO_REF:0000002
    qualifier: involved_in
    review:
      summary: HemA directly supplies the first committed intermediate of tetrapyrrole synthesis.
      action: ACCEPT
      reason: >-
        The C5 route occurs in multiple tetrapyrrole-producing lineages and its
        early intermediates can feed several tetrapyrrole end products.
        GO:0033014 is therefore an accurate direct process annotation without
        implying a narrower, now-obsolete route term.
      supported_by:
        - reference_id: file:PSEPK/hemA/hemA-uniprot.txt
          supporting_text: "biosynthesis; 5-aminolevulinate from L-glutamyl-tRNA(Glu): step 1/2."
        - reference_id: PMID:7883699
          supporting_text: be used by Pseudomonas aeruginosa, Pseudomonas putida, Pseudomonas stutzeri,
  - term:
      id: GO:0050661
      label: NADP binding
    evidence_type: IEA
    original_reference_id: GO_REF:0000002
    qualifier: enables
    review:
      summary: NADPH binding supports catalysis but is not the substrate-level core function.
      action: KEEP_AS_NON_CORE
      reason: >-
        HemA contains an NADPH-binding domain and uses NADPH in the reductase
        reaction. The binding term is valid ancillary molecular-function
        information, while GO:0008883 captures the core activity.
      supported_by:
        - reference_id: file:PSEPK/hemA/hemA-uniprot.txt
          supporting_text: second domain is the NADPH-binding domain
references:
