  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: pqqD1 (PP_0377) encodes PqqA binding protein 1, a PqqD-family peptide chaperone in pyrroloquinoline quinone (PQQ) biosynthesis. It binds the PqqA precursor peptide and presents it to the radical-SAM enzyme PqqE, supporting formation of the early Glu-Tyr cross-linked PqqA intermediate during PQQ cofactor production.
