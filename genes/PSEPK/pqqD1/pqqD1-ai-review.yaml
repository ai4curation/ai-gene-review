    id: GO:0048038
    label: quinone binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: This InterPro-derived molecular-function annotation is unsupported and likely incorrect at the gene level. The KT2440 UniProt record describes PqqD1 as a PqqA-binding protein that presents the precursor peptide to PqqE; the available evidence supports peptide binding and presentation, not binding of a mature quinone.
    action: REMOVE
    reason: The InterPro mapping appears to conflate PqqD family association with the PQQ pathway and direct binding of the pathway's mature quinone product. Remove the annotation unless direct quinone-binding evidence emerges; a specific PqqA peptide-chaperone or peptide-presentation term would better represent the supported molecular role.
