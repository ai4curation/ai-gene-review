suggested_questions:
- question: Are pqqD1 and pqqD2 functionally redundant in KT2440 PQQ biosynthesis, or do they support different PqqA/PqqE complexes or growth conditions?
suggested_experiments:
- hypothesis: pqqD1 supports PqqE-dependent PqqA cross-linking during KT2440 PQQ biosynthesis.
  description: Construct pqqD1, pqqD2, and double deletion mutants, complement each allele, and quantify PQQ production plus PqqA cross-linked peptide intermediates by LC-MS under PQQ-inducing conditions.
  experiment_type: targeted genetics and metabolite/peptide mass spectrometry
