  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: davD encodes an NADP-dependent glutarate-semialdehyde dehydrogenase of the aldehyde dehydrogenase family. It functions in soluble amino-acid, especially lysine-derived, catabolism by oxidizing 5-oxopentanoate/glutarate semialdehyde to glutarate.
