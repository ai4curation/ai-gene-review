  qualifier: enables
  review:
    summary: Core molecular function. This is the precise EC 1.4.1.13 activity of the GOGAT holoenzyme, matching the UniProt RecName (Glutamate synthase [NADPH] large chain), the catalytic-activity statement (RHEA:15501) and the glutamate synthase family assignment. The large chain provides the glutamine amidotransferase and FMN-dependent synthase activities. Strongly supported despite IEA evidence.
    action: ACCEPT
- term:
    id: GO:0006541
    label: L-glutamine metabolic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000104
  qualifier: involved_in
  review:
    summary: Correct biological process. GOGAT consumes L-glutamine, hydrolyzing its amide group and transferring the nitrogen to 2-oxoglutarate; the large chain bears the type-2 glutamine amidotransferase domain (PROSITE PS51278, IPR017932). Consistent with the UniProt function statement. Kept as a supporting process term that is broader than the specific ammonia-assimilation role.
    action: KEEP_AS_NON_CORE
