description: gltB (PP_5076) encodes the large (alpha) chain of glutamate synthase [NADPH] (GOGAT; EC 1.4.1.13), a large iron-sulfur flavoprotein that, together with the small (beta) chain GltD, catalyzes the reductive transfer of the amide nitrogen of L-glutamine to 2-oxoglutarate to yield two molecules of L-glutamate (2 L-glutamate + NADP+ = L-glutamine + 2-oxoglutarate + NADPH + H+). The large chain carries an N-terminal class-II (PurF/Ntn) glutamine amidotransferase domain that hydrolyzes L-glutamine to release ammonia, an FMN-binding central domain where the ammonia is channelled to aminate 2-oxoglutarate, and a [3Fe-4S] cluster; reducing equivalents are supplied by NADPH via the FAD/[4Fe-4S]-containing GltD beta chain. Acting in concert with glutamine synthetase (GlnA), GOGAT constitutes the GS-GOGAT cycle, the high-affinity route of ammonia assimilation that builds L-glutamate (the major cellular amino-group donor) under nitrogen-limiting conditions. The enzyme is a soluble cytoplasmic protein of central nitrogen metabolism in P. putida.
