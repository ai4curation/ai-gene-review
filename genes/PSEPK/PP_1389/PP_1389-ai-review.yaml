description: PP_1389 encodes a predicted magnesium-dependent oxaloacetate decarboxylase (EC 4.1.1.112) of the isocitrate lyase/PEP
  mutase superfamily. It converts oxaloacetate to pyruvate and CO2 at the oxaloacetate/pyruvate node; a TreeGrafter methylisocitrate
  lyase annotation appears to reflect superfamily transfer rather than the specific UniProt/EC assignment.
