id: Q88QU2
gene_symbol: cca
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: >-
  cca encodes the multifunctional CCA protein (tRNA nucleotidyltransferase /
  CCA-adding enzyme, EC 2.7.7.72) of Pseudomonas putida KT2440. It catalyzes
  the template-independent, Mg2+-dependent addition and repair of the universal
  3'-terminal CCA sequence of tRNAs, adding C, C and A in order to tRNA
  nucleotide-73 using CTP and ATP as substrates and releasing inorganic
  pyrophosphate. CCA addition is essential for tRNA maturation, aminoacylation
  and repair of damaged tRNA 3' ends. A single active site in an N-terminal
  nucleotidyltransferase domain recognizes both ATP and CTP, while a C-terminal
  HD domain confers accessory end-repair activities (2'-nucleotidase,
  2',3'-cyclic phosphodiesterase and phosphatase). The enzyme also participates
  in tRNA quality control by adding a second CCA (CCACCA) to unstable tRNAs,
  marking them for degradation. The protein is a monomer that can also form
  homodimers and oligomers, and belongs to the bacterial type-1 CCA-adding
  enzyme subfamily.
