proposed_new_terms: []
suggested_questions:
- question: >-
    Are the predicted accessory HD-domain activities (2'-nucleotidase,
    2',3'-cyclic phosphodiesterase, phosphatase) of P. putida Cca biochemically
    active, and what tRNA end-repair substrates do they act on in vivo?
- question: >-
    Does P. putida Cca perform CCACCA-mediated tRNA surveillance under stress,
    and which destabilized tRNAs are targeted for degradation?
suggested_experiments:
- experiment_type: in vitro enzyme assay
  description: >-
    Express and purify recombinant Q88QU2 and assay CCA-adding activity on
    synthetic tRNA substrates with CTP/ATP, measuring Mg2+ dependence and
    confirming sequential C, C, A addition and tandem CCACCA formation.
- experiment_type: mutational analysis
  description: >-
    Mutate the predicted catalytic and nucleotide-binding residues (e.g.,
    positions 8, 11, 91, 137, 140 and Mg2+-binding 21/23) and assess loss of
    CCA-adding and end-repair activities to validate the single-active-site
    model.
- experiment_type: structural biology
  description: >-
    Determine the structure of P. putida Cca alone and in complex with a tRNA
    substrate to confirm the two-domain architecture and how a single active
    site discriminates and incorporates both CTP and ATP.
