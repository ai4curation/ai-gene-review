    label: acetylglutamate kinase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: This is the defining ArgB molecular function.
    action: ACCEPT
    reason: The reviewed UniProt record assigns EC 2.7.2.8, RHEA:14629, and the ArgB-specific family to P59300.
    supported_by:
    - reference_id: file:PSEPK/argB/argB-uniprot.txt
      supporting_text: Full=Acetylglutamate kinase
    - reference_id: file:PSEPK/argB/argB-deep-research-openscientist.md
      supporting_text: >-
        N-acetyl-L-glutamate + ATP = N-acetyl-L-glutamyl 5-phosphate + ADP
- term:
