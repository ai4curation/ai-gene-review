- id: file:PSEPK/argB/argB-deep-research-openscientist.md
  title: OpenScientist functional synthesis for PSEPK ArgB
  findings:
  - statement: >-
      The report retrieves the exact ArgB reaction for P59300. Its
      target-specific claims about rate limitation, hexamerization, arginine
      inhibition, and absence of PII regulation are comparative inferences and
      are not promoted here; the direct KT2440 auxotrophy result above also
      supersedes its suggestion that this knockout remains to be tested.
    supporting_text: >-
      N-acetyl-L-glutamate + ATP = N-acetyl-L-glutamyl 5-phosphate + ADP
