id: P59300
gene_symbol: argB
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: >-
  ArgB (PP_5289) is an ATP-dependent acetylglutamate kinase (EC 2.7.2.8) that
  phosphorylates N-acetyl-L-glutamate to N-acetyl-L-glutamyl 5-phosphate. It
  catalyzes the second reaction of the acetylated-ornithine route from glutamate
  to L-ornithine during L-arginine biosynthesis.
existing_annotations:
