suggested_questions:
- question: Which KT2440 promoters are directly dependent on RpoN under nutrient-limited and aromatic-compound growth conditions?
  experts:
  - Bacterial transcription and sigma-54 regulon experts
suggested_experiments:
- description: Combine RpoN ChIP-seq with transcriptomics in wild type and rpoN depletion strains across nitrogen limitation and aromatic-substrate growth to distinguish direct promoter targets from secondary effects.
