  review:
    summary: McpS functions as a transmembrane chemosensory receptor that detects extracellular
      attractants and transduces signals.
    action: ACCEPT
    reason: Retain as the molecular-function annotation available in GOA. This is the
      standard MF term for methyl-accepting chemotaxis proteins, which act as
      transmembrane chemosensory receptors. Falcon deep research independently
      confirms the transmembrane MCP receptor architecture.
