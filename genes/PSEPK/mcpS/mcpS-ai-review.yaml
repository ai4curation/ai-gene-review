- term:
    id: GO:0007165
    label: signal transduction
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: Signal transduction is true for a methyl-accepting chemotaxis receptor but is
      less specific than chemotaxis.
    action: KEEP_AS_NON_CORE
    reason: Retain as a broad non-core process. Signal transduction is the generic
      parent of the chemotaxis signaling that McpS performs via the CheA/CheW/CheY
      cascade; the more specific chemotaxis annotation captures the core function.
    supported_by:
    - reference_id: file:PSEPK/mcpS/mcpS-uniprot.txt
      supporting_text: transduce a signal from the outside to the inside of the cell
    - reference_id: file:PSEPK/mcpS/mcpS-deep-research-falcon.md
      supporting_text: '**MCP chemoreceptors** detect chemoeffectors and modulate the
        activity of the histidine kinase **CheA** (via coupling proteins such as CheW),
        which then controls the phosphorylation state of downstream regulators (e.g.,
        CheY) that alter swimming behavior'
      reference_section_type: OTHER
