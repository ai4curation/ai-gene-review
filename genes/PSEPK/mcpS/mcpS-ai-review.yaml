  title: Falcon (Edison Scientific) deep research report on P. putida KT2440 mcpS (Q88E10).
  findings:
  - statement: McpS is a methyl-accepting chemotaxis protein (MCP) that mediates chemotaxis
      toward TCA-cycle intermediates and short-chain carboxylates, with a distinctive
      HBM (helical bimodular) periplasmic ligand-binding domain.
    supporting_text: McpS is an MCP that mediates chemotaxis toward **organic acids**,
      especially **tricarboxylic acid (TCA) cycle intermediates** and short-chain carboxylates.
    reference_section_type: OTHER
  - statement: McpS has the canonical transmembrane MCP architecture, localizing in the
      cytoplasmic membrane with a periplasmic ligand-binding domain and cytosolic
      signaling/adaptation regions.
    supporting_text: McpS is described as a **canonical transmembrane MCP**, implying
      localization in the **cytoplasmic membrane** with a **periplasmic LBD** and cytosolic
      signaling/adaptation regions
    reference_section_type: OTHER
  - statement: McpS functions within the canonical chemotaxis cascade in which MCP
      chemoreceptors detect chemoeffectors and modulate the histidine kinase CheA (via
      CheW) to control downstream response regulators and swimming behavior.
    supporting_text: '**MCP chemoreceptors** detect chemoeffectors and modulate the
      activity of the histidine kinase **CheA** (via coupling proteins such as CheW),
      which then controls the phosphorylation state of downstream regulators (e.g.,
      CheY) that alter swimming behavior'
    reference_section_type: OTHER
