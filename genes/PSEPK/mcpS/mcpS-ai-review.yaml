id: Q88E10
gene_symbol: mcpS
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: mcpS encodes a methyl-accepting chemotaxis receptor for several organic acids,
  especially TCA-cycle intermediates such as malate, succinate, fumarate, and oxaloacetate.
  As a membrane chemoreceptor, McpS mediates chemotactic signal transduction toward these
  attractants in P. putida KT2440.
