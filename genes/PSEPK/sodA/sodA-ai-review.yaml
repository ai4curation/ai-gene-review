  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: sodA (PP_0946) encodes the manganese-type iron/manganese-family superoxide dismutase of Pseudomonas putida KT2440.
  It disproportionates superoxide radicals to oxygen and hydrogen peroxide as part of cytoplasmic oxidative-stress defense,
  and KT2440 proteomics reported a condition-dependent SodA/SodB heterodimer under iron limitation.
