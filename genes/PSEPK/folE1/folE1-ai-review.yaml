taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: folE1 (PP_1823) encodes a canonical GTP cyclohydrolase I enzyme that converts GTP to the pterin precursor 7,8-dihydroneopterin
  triphosphate. This reaction supplies the first committed pterin intermediate for tetrahydrofolate biosynthesis and may also
  feed other pterin branches represented in ppu00790.
