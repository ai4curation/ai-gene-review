id: Q88DW9
gene_symbol: panB
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: >-
  panB (PP_4699) encodes a soluble 3-methyl-2-oxobutanoate
  hydroxymethyltransferase, also called ketopantoate hydroxymethyltransferase.
  The enzyme transfers a hydroxymethyl group from
  5,10-methylenetetrahydrofolate to 3-methyl-2-oxobutanoate, producing
  2-dehydropantoate for pantothenate biosynthesis. Q88DW9 is a
  magnesium-dependent PanB-family protein with the expected conserved active
  site and substrate-binding residues. Direct KT2440 enzymology has not been
  reported.
