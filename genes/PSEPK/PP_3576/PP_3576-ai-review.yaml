description: PP_3576 encodes a predicted FecR-family transmembrane anti-sigma/sensor protein in Pseudomonas
  putida KT2440. Its FecR and ferric-dicitrate sensor transmembrane domains support a role in controlling
  a nearby ECF sigma factor in an iron-uptake regulatory system.
