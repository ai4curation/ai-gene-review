description: gltD (PP_5075) encodes the small (beta) chain of glutamate synthase [NADPH] (GOGAT), the FAD-containing flavoprotein/oxidoreductase subunit of the EC 1.4.1.13 holoenzyme. The beta chain carries an N-terminal 4Fe-4S ferredoxin-type domain and a NAD(P)-binding Rossmann/FAD-binding module; it accepts hydride from NADPH and channels electrons through its [4Fe-4S] cluster(s) to the FMN and [3Fe-4S] centers of the large (alpha) chain GltB, where 2-oxoglutarate is reductively aminated by the ammonia released from L-glutamine. The gltDB pair (PP_5075-PP_5076, an adjacent operon) thus reconstitutes the high-affinity ammonia-assimilatory glutamate synthase that, together with glutamine synthetase (GlnA), forms the GS-GOGAT cycle of central nitrogen metabolism. GltD is a soluble cytoplasmic iron-sulfur oxidoreductase in P. putida.
existing_annotations:
- term:
    id: GO:0004355
    label: glutamate synthase (NADPH) activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000003
  qualifier: enables
  review:
    summary: Core molecular function for the GOGAT holoenzyme (EC 1.4.1.13), of which GltD is the obligate NADPH-oxidizing beta subunit. The EC-based annotation reflects the activity of the complex; the beta chain supplies the diaphorase/electron-transfer half-reaction. Accepted as the activity GltD enables as part of the glutamate synthase complex.
    action: ACCEPT
- term:
    id: GO:0016491
    label: oxidoreductase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: Very general oxidoreductase term derived from the FAD/NAD-binding InterPro signature (IPR023753). Correct in that GltD is the flavin/NAD(P)-dependent oxidoreductase subunit, but uninformative relative to the specific glutamate synthase (NADPH) activity already annotated.
    action: MARK_AS_OVER_ANNOTATED
- term:
    id: GO:0051536
    label: iron-sulfur cluster binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: Parent term for iron-sulfur cluster binding (InterPro IPR009051, helical ferredoxin). Correct but more general than the specific [4Fe-4S] cluster binding term also annotated; kept as non-core to avoid redundancy.
    action: KEEP_AS_NON_CORE
- term:
    id: GO:0051539
    label: 4 iron, 4 sulfur cluster binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: Supporting molecular function. GltD binds a [4Fe-4S] cluster (UniProt COFACTOR; 4Fe-4S ferredoxin-type domain PROSITE PS51379, InterPro IPR006006/IPR017896) that mediates electron transfer to the catalytic large chain. Accept as a well-supported cofactor-binding function.
    action: ACCEPT
