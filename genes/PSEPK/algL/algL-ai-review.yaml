  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: >-
  AlgL is a periplasmic alginate lyase of the KT2440 alginate biosynthesis
  locus. It cleaves poly(beta-D-mannuronate)/alginate by beta-elimination and
  is thought to remove or process mislocalized alginate in the periplasm during
  polymer export.
