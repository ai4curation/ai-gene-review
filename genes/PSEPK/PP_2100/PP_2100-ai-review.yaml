  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: PP_2100 encodes a large predicted EvgS/BvgS-like hybrid sensor histidine kinase in Pseudomonas
  putida KT2440. It contains periplasmic sensory domains, HisKA/HATPase, Hpt, and receiver-domain architecture,
  consistent with a membrane phosphorelay sensor paired with EvgA.
