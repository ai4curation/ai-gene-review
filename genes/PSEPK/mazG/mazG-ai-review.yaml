  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: >-
  mazG (PP_1657) encodes a soluble tandem-domain nucleoside-triphosphate
  pyrophosphohydrolase. Q88MB7 belongs to the canonical bacterial MazG family,
  whose characterized members hydrolyze nucleoside triphosphates to the
  corresponding nucleoside monophosphates and diphosphate. This activity is
  consistent with nucleotide-pool quality control and turnover. The gene lies
  immediately downstream of relA in KT2440, but a specific role for Q88MB7 in
  the stringent or stress response has not been demonstrated experimentally.
