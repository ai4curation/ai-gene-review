- term:
    id: GO:0046047
    label: TTP catabolic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000118
  qualifier: involved_in
  review:
    summary: The ribothymidine-triphosphate process is not supported by canonical MazG substrate evidence.
    action: REMOVE
    reason: >-
      GO:0046047 is defined for ribosylthymine triphosphate, whereas the
      canonical deoxythymidine substrate is represented separately by
      GO:0046076 and is already present on Q88MB7. The family evidence supports
      the eight standard ribo- and deoxyribonucleoside triphosphates, not the
      unusual ribothymidine nucleotide. This TreeGrafter term appears to
      conflate TTP with dTTP.
