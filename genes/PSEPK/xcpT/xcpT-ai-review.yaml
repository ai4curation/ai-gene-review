description: xcpT (PP_3423) encodes Type II secretion system core protein G, a predicted pseudopilin or pilin-like component
  of a type II secretion system. Such proteins assemble the pseudopilus that helps drive substrate movement through the Xcp/Gsp
  secretion apparatus.
