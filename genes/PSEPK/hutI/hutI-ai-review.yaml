description: 'hutI encodes imidazolonepropionase (EC 3.5.2.7), a cytoplasmic metallo-dependent hydrolase in L-histidine catabolism. It hydrolyzes imidazolone propionate during conversion of histidine-derived urocanate toward glutamate, using metal ions for catalysis.'
