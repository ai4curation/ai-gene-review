description: rhlB (PP_1295) encodes a DEAD-box ATP-dependent RNA helicase of the RhlB subfamily. It is a soluble bacterial
  RNA-remodeling enzyme linked by UniProt/GOA to RNA catabolism, where it likely helps unwind structured RNA substrates for
  the RNA-degradation machinery.
