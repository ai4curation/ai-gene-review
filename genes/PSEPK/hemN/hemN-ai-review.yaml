id: Q88F35
gene_symbol: hemN
product_type: PROTEIN
aliases:
  - PP_4264
status: COMPLETE
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: >-
  HemN is a cytoplasmic radical-SAM coproporphyrinogen-III dehydrogenase that
  provides an oxygen-independent route to protoporphyrinogen IX. It binds a
  catalytic [4Fe-4S] cluster and consumes S-adenosyl-L-methionine while
  converting two propionate side chains of coproporphyrinogen III to vinyl
  groups. KT2440 also encodes the oxygen-dependent alternative HemF.
existing_annotations:
  - term:
      id: GO:0003824
      label: catalytic activity
    evidence_type: IEA
    original_reference_id: GO_REF:0000002
    qualifier: enables
    review:
      summary: HemN is catalytic, but this root molecular-function term is uninformative.
      action: MODIFY
      reason: >-
        GO:0051989 captures the specific radical-SAM coproporphyrinogen
        dehydrogenase reaction and should replace generic catalytic activity.
      proposed_replacement_terms:
        - id: GO:0051989
          label: coproporphyrinogen dehydrogenase activity
      supported_by:
        - reference_id: file:PSEPK/hemN/hemN-uniprot.txt
          supporting_text: "EC=1.3.98.3;"
  - term:
      id: GO:0004109
      label: coproporphyrinogen oxidase activity
    evidence_type: IEA
    original_reference_id: GO_REF:0000002
    qualifier: enables
    review:
      summary: This describes the pathway position but not HemN's specific radical-SAM chemistry.
      action: MODIFY
      reason: >-
        The oxygen-independent EC 1.3.98.3 reaction is represented by
        GO:0051989, whereas GO:0004109 is used for the distinct HemF-type
        oxidase activity.
      proposed_replacement_terms:
        - id: GO:0051989
          label: coproporphyrinogen dehydrogenase activity
      supported_by:
        - reference_id: file:PSEPK/hemN/hemN-uniprot.txt
          supporting_text: "Reaction=coproporphyrinogen III + 2 S-adenosyl-L-methionine ="
  - term:
      id: GO:0005737
      label: cytoplasm
    evidence_type: IEA
    original_reference_id: GO_REF:0000120
    qualifier: located_in
    review:
      summary: Cytoplasmic localization is explicitly predicted for HemN.
      action: ACCEPT
      reason: UniProt assigns the soluble radical-SAM enzyme to the cytoplasm.
      supported_by:
        - reference_id: file:PSEPK/hemN/hemN-uniprot.txt
          supporting_text: "SUBCELLULAR LOCATION: Cytoplasm"
  - term:
      id: GO:0006779
      label: porphyrin-containing compound biosynthetic process
    evidence_type: IEA
    original_reference_id: GO_REF:0000120
    qualifier: involved_in
    review:
      summary: The pathway assignment is correct and can be made endpoint-specific for KT2440.
      action: MODIFY
      reason: >-
        HemN forms protoporphyrinogen IX in the oxygen-independent late route
        leading to heme B, supporting the live endpoint term GO:0006785.
      proposed_replacement_terms:
        - id: GO:0006785
          label: heme B biosynthetic process
      supported_by:
        - reference_id: file:PSEPK/hemN/hemN-uniprot.txt
          supporting_text: "route): step 1/1."
  - term:
      id: GO:0046872
      label: metal ion binding
    evidence_type: IEA
    original_reference_id: GO_REF:0000104
    qualifier: enables
    review:
      summary: This broad metal-binding term is correct but less informative than the cluster term.
      action: KEEP_AS_NON_CORE
      reason: >-
        HemN's relevant metal center is a defined [4Fe-4S] radical-SAM cluster;
        generic metal binding remains true but is ancillary to catalysis.
      supported_by:
        - reference_id: file:PSEPK/hemN/hemN-uniprot.txt
          supporting_text: "Name=[4Fe-4S] cluster; Xref=ChEBI:CHEBI:49883;"
  - term:
      id: GO:0051536
      label: iron-sulfur cluster binding
    evidence_type: IEA
    original_reference_id: GO_REF:0000002
    qualifier: enables
    review:
      summary: This parent is valid but less informative than the specific cluster-type term.
      action: KEEP_AS_NON_CORE
      reason: >-
        GO:0051539 states the [4Fe-4S] cluster type established for HemN and is
        preferable as cofactor detail; the broader parent is still correct.
      supported_by:
        - reference_id: file:PSEPK/hemN/hemN-uniprot.txt
          supporting_text: "Binds 1 [4Fe-4S] cluster."
  - term:
      id: GO:0051539
      label: 4 iron, 4 sulfur cluster binding
    evidence_type: IEA
    original_reference_id: GO_REF:0000120
    qualifier: enables
    review:
      summary: A [4Fe-4S] center is integral to radical-SAM catalysis by HemN.
      action: KEEP_AS_NON_CORE
      reason: >-
        The cofactor assignment is specific and well supported by family-level
        residue predictions, but the substrate-level dehydrogenase term remains
        the core molecular function.
      supported_by:
        - reference_id: file:PSEPK/hemN/hemN-uniprot.txt
          supporting_text: "Binds 1 [4Fe-4S] cluster."
  - term:
      id: GO:0051989
      label: coproporphyrinogen dehydrogenase activity
    evidence_type: IEA
    original_reference_id: GO_REF:0000120
    qualifier: enables
    review:
      summary: This is the most precise available molecular-function term for HemN.
      action: ACCEPT
      reason: >-
        UniProt assigns EC 1.3.98.3 and RHEA:15425, the radical-SAM conversion
        of coproporphyrinogen III to protoporphyrinogen IX.
      supported_by:
        - reference_id: file:PSEPK/hemN/hemN-uniprot.txt
          supporting_text: "Reaction=coproporphyrinogen III + 2 S-adenosyl-L-methionine ="
references:
  - id: GO_REF:0000002
    title: Gene Ontology annotation through association of InterPro records with GO terms
    findings: []
  - id: GO_REF:0000104
    title: Electronic Gene Ontology annotations created by transferring manual GO annotations between related proteins based on shared sequence features
    findings: []
  - id: GO_REF:0000120
    title: Combined Automated Annotation using Multiple IEA Methods
    findings: []
  - id: file:PSEPK/hemN/hemN-uniprot.txt
    title: UniProtKB entry for PSEPK hemN
    findings:
      - statement: HemN catalyzes radical-SAM formation of protoporphyrinogen IX.
        supporting_text: "Reaction=coproporphyrinogen III + 2 S-adenosyl-L-methionine ="
      - statement: HemN binds one [4Fe-4S] cluster.
        supporting_text: "Binds 1 [4Fe-4S] cluster."
  - id: file:PSEPK/hemN/hemN-deep-research-openscientist.md
    title: OpenScientist research report for PSEPK hemN
    findings:
      - statement: >-
          The report recovers the HemN reaction but acknowledges the absence of
          direct experimental characterization of the KT2440 protein.
        supporting_text: >-
          No direct experimental characterization of the *P. putida* KT2440
          protein.
    reference_review:
      relevance: HIGH
      correctness: MISCITED
      review_notes: >-
        The report correctly identifies the radical-SAM
        coproporphyrinogen-III dehydrogenase reaction and [4Fe-4S] cofactor. It
        presents unarchived sequence-to-residue mapping, transfers E. coli
        structure and mechanism, transfers P. aeruginosa Anr/Dnr regulation,
        and treats the uncharacterized PP_3781 family protein as a redundant
        oxidase. Its pathway sketch also omits the KT2440 HemJ-family PP_0431
        step. Those target-specific conclusions were not retained.
core_functions:
  - description: >-
      Uses radical-SAM chemistry and a [4Fe-4S] cluster to convert
      coproporphyrinogen III to protoporphyrinogen IX without molecular oxygen.
    molecular_function:
      id: GO:0051989
      label: coproporphyrinogen dehydrogenase activity
    directly_involved_in:
      - id: GO:0006785
        label: heme B biosynthetic process
    locations:
      - id: GO:0005737
        label: cytoplasm
    supported_by:
      - reference_id: file:PSEPK/hemN/hemN-uniprot.txt
        supporting_text: "Reaction=coproporphyrinogen III + 2 S-adenosyl-L-methionine ="
      - reference_id: file:PSEPK/hemN/hemN-uniprot.txt
        supporting_text: "Binds 1 [4Fe-4S] cluster."
suggested_questions:
  - question: >-
      Is HemN used only under anoxia, or does it contribute under microoxic
      conditions where HemF is also expressed?
suggested_experiments:
  - hypothesis: HemN becomes the principal late-step enzyme when oxygen limits HemF activity.
    description: >-
      Compare hemN and hemF mutant phenotypes across controlled oxygen gradients,
      including heme-b and pathway-intermediate measurements.
