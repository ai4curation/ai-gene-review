      annotation.
- id: PMID:15317763
  title: Functional characterization of an aminotransferase required for pyoverdine siderophore biosynthesis
  findings:
  - statement: PvdH catalyzes L-2,4-diaminobutyrate synthesis and is required for pyoverdine production
      in a Pseudomonas pyoverdine system.
- id: PMID:19459056
  title: Siderophore-mediated iron acquisition in Pseudomonas entomophila L48 and Pseudomonas putida KT2440
  findings:
  - statement: KT2440 produces a characterized pyoverdine siderophore.
