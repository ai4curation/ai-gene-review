description: artJ (PP_0282) encodes a signal-peptide-bearing bacterial solute-binding protein 3 family member named as the L-arginine ABC transporter periplasmic binding subunit. It is the predicted periplasmic substrate recognition component of the adjacent PP_0280-PP_0283 Art/Aot ABC amino-acid uptake system.
