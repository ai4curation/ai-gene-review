taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: PP_4696 encodes an AlgB-like sigma-54 enhancer-binding response regulator in Pseudomonas
  putida KT2440. Its receiver and AAA+ sigma-54 activator domains support a phosphorelay-linked transcription-regulatory
  role, but the cognate sensor and direct targets remain unclear in this first pass.
