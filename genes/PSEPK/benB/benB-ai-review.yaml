suggested_questions:
- question: Does BenB alter substrate range or stability of the KT2440 BenAB oxygenase relative to other
    benzoate/toluate dioxygenase beta subunits?
  experts:
  - Pseudomonas aromatic catabolism experts
suggested_experiments:
- description: Purify or reconstitute BenABC variants lacking BenB or carrying BenB substitutions, then
    compare benzoate cis-diol formation and substrate range.
  experiment_type: enzyme reconstitution assay
