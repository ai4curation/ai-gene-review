id: Q88I39
gene_symbol: benB
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: benB encodes the beta subunit of the BenABC benzoate 1,2-dioxygenase system in Pseudomonas
  putida KT2440. Together with the BenA oxygenase alpha subunit and BenC electron-transfer component,
  BenB contributes to the first hydroxylating step of the chromosomal benzoate branch that feeds catechol
  and the beta-ketoadipate pathway.
existing_annotations:
- term:
    id: GO:0018623
    label: benzoate 1,2-dioxygenase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000003
  review:
    summary: BenB is the beta subunit of the multicomponent BenABC benzoate 1,2-dioxygenase, so the enzyme
      activity is correct only as a contributes_to annotation.
    action: ACCEPT
    reason: The beta subunit supports the BenABC oxygenase system but is not the complete dioxygenase
      by itself; the contributes_to qualifier captures that complex-level activity.
    supported_by:
    - reference_id: file:PSEPK/benB/benB-uniprot.txt
      supporting_text: 'SubName: Full=Benzoate 1,2-dioxygenase subunit beta'
    - reference_id: PMID:11053377
      supporting_text: The benABC genes likely encode benzoate dioxygenase
      reference_section_type: ABSTRACT
  qualifier: contributes_to
- term:
    id: GO:0019380
    label: 3-phenylpropionate catabolic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000118
  review:
    summary: The TreeGrafter 3-phenylpropionate process annotation is not the best pathway assignment
      for BenB in KT2440.
    action: REMOVE
    reason: BenB belongs to the benABCD benzoate catabolic branch, while the available KT2440 pathway
      literature maps ben genes to benzoate catabolism rather than 3-phenylpropionate catabolism.
    proposed_replacement_terms:
    - id: GO:0043640
      label: benzoate catabolic process via hydroxylation
    supported_by:
    - reference_id: PMID:12534466
      supporting_text: genes encoding the peripheral pathways for the catabolism of p-hydroxybenzoate
        (pob), benzoate (ben)
      reference_section_type: ABSTRACT
    - reference_id: PMID:11053377
      supporting_text: The benABC genes likely encode benzoate dioxygenase
      reference_section_type: ABSTRACT
- term:
    id: GO:0043640
    label: benzoate catabolic process via hydroxylation
  evidence_type: IC
  original_reference_id: PMID:12534466
  review:
    summary: BenB contributes to BenABC, the hydroxylating dioxygenase system that initiates benzoate
      catabolism.
    action: NEW
    reason: The pathway literature maps ben genes to benzoate catabolism, and BenB is the beta subunit
      of the BenABC dioxygenase inferred to catalyze the first hydroxylation step.
    supported_by:
