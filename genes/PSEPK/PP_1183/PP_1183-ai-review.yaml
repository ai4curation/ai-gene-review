  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: >-
  PP_1183 is an EntD-family 4'-phosphopantetheinyltransferase in Pseudomonas
  putida KT2440. The enzyme transfers the 4'-phosphopantetheine group from CoA
  to carrier-protein domains, activating aryl- and peptidyl-carrier proteins for
  siderophore assembly. Current UniProt and GOA metadata support an
  enterobactin/enterochelin siderophore-biosynthesis context; the KEGG ppu00074
  mycolic-acid assignment is therefore best treated as pathway spillover rather
  than evidence for mycolic-acid biosynthesis in KT2440.
