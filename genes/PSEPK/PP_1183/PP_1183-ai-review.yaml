suggested_questions:
- question: Is PP_1183 specific for enterobactin/enterochelin carrier proteins in KT2440, or does it also activate pyoverdine or other nonribosomal-peptide carrier domains?
- question: Why does KEGG ppu00074 include PP_1183 in mycolic-acid biosynthesis despite current UniProt/GOA evidence supporting siderophore carrier-protein activation?
suggested_experiments:
- description: >-
    Test PP_1183-dependent phosphopantetheinylation of candidate KT2440
    siderophore carrier-protein domains in vitro or by targeted proteomics.
- description: >-
    Compare siderophore production and iron-limited growth of a PP_1183 deletion
    mutant with complemented and wild-type strains.
