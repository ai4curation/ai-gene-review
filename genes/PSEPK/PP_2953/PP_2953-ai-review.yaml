description: PP_2953 encodes a predicted soluble zinc-type alcohol dehydrogenase-like oxidoreductase in Pseudomonas
  putida KT2440. The supported molecular function is NADPH-dependent quinone reductase activity with zinc-binding
  oxidoreductase-family context; no specific physiological quinone substrate or pathway role is established.
