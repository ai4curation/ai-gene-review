description: moaD encodes the molybdopterin synthase sulfur-carrier subunit. In the molybdopterin biosynthesis sulfur-relay
  step, MoaD is activated by MoeB and used with MoaE to insert sulfur into cyclic pyranopterin monophosphate, producing molybdopterin.
