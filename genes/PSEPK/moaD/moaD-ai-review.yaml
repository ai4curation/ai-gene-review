      supporting_text: |-
        The gene **moaD** (UniProt **Q88NB9**; ordered locus **PP_1293**) of *Pseudomonas putida* strain KT2440 encodes the **small sulfur-carrier subunit of molybdopterin (MPT) synthase**, the enzyme that catalyzes the **second of the four conserved steps of molybdenum cofactor (Moco) biosynthesis**.
- term:
