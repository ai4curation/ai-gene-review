    action: ACCEPT
    reason: MoeB-family proteins form a 2:2 complex with MoaD while adenylating its C-terminal glycine.
- term:
    id: GO:1990140
    label: molybdopterin synthase complex
  evidence_type: ISS
  original_reference_id: file:interpro/panther/PTHR33359/PTHR33359-entries.csv
  qualifier: part_of
  supporting_entities:
  - UniProtKB:P30748
  review:
    summary: Q88NB9 is proposed as a component of the MoaD-MoaE molybdopterin synthase complex.
    action: NEW
    reason: >-
      Q88NB9 and Escherichia coli MoaD P30748 occupy the same
      PTHR33359:SF1 sulfur-carrier subfamily, and Q88NB9 is encoded directly
      beside its MoaE partner. The conserved MoaD-MoaE heterotetramer therefore
      supports GO:1990140 by sequence similarity rather than direct KT2440
      complex measurement.
    supported_by:
    - reference_id: file:PSEPK/moaD/moaD-deep-research-openscientist.md
      supporting_text: |-
        Mechanistically, MoaD operates within a **MoaD₂–MoaE₂ heterotetramer**. Each MoaD subunit inserts its reactive C-terminus deep into a MoaE catalytic subunit, positioning the C-terminal Gly-thiocarboxylate adjacent to the substrate **cyclic pyranopterin monophosphate (cPMP / precursor Z)**.
