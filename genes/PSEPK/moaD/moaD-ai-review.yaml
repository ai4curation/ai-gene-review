id: Q88NB9
gene_symbol: moaD
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: >-
  moaD encodes the small sulfur-carrier subunit of molybdopterin synthase. Its
  C-terminal glycine is adenylated by MoeB and converted to a thiocarboxylate;
  two sulfur-loaded MoaD molecules then donate the dithiolene sulfurs incorporated
  into cyclic pyranopterin monophosphate by the MoaD-MoaE synthase complex.
