description: >-
  PP_3480 encodes a predicted PilO-type pilus assembly protein in Pseudomonas
  putida KT2440. Its T2SSM_b/PilO-like domain and predicted transmembrane helix
  support an inner-membrane type IV pilus assembly/alignment-complex role, but
  no precise molecular function is assigned.
