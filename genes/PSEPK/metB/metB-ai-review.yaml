    summary: Catalytic activity is correct but too broad for the MetB trans-sulfuration step.
    action: MODIFY
    reason: The protein name and pathway context support cystathionine gamma-synthase
      activity, which is more specific than the ARBA catalytic activity parent.
    proposed_replacement_terms:
    - id: GO:0003962
