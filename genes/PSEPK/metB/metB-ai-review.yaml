      supporting_text: "Q88Q39/PP_0659 as **cystathionine γ-synthase** of *P. putida* KT2440"
    - reference_id: file:PSEPK/metB/metB-goa.tsv
      supporting_text: "GO:0003824\tcatalytic activity"
