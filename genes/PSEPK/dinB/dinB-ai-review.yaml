  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: DinB (DNA polymerase IV, Pol IV) is a Y-family translesion DNA polymerase
  that performs template-directed, error-prone DNA synthesis. It is a poorly processive,
  low-fidelity nucleotidyltransferase (EC 2.7.7.7) that lacks 3'-5' exonuclease proofreading
  activity and uses a two-metal-ion mechanism dependent on Mg(2+). Pol IV extends
  primers at stalled replication forks, including mismatched or misaligned primer
  ends, and can bypass DNA lesions in conjunction with the beta clamp of DNA polymerase
  III, contributing to translesion synthesis and untargeted mutagenesis. It acts in
  the cytoplasm as a monomer and is part of the cellular response to DNA damage, with
  homologs across bacteria induced as part of the SOS regulon. It belongs to the DNA
  polymerase type-Y (UmuC/DinB) family.
existing_annotations:
- term:
    id: GO:0000287
    label: magnesium ion binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000104
  qualifier: enables
  review:
    summary: Mg(2+) is the catalytic cofactor of Pol IV, bound via a two-metal-ion
      mechanism. This is supportable but a generic cofactor-binding term that is non-core
      relative to the polymerase activity.
    action: MARK_AS_OVER_ANNOTATED
    reason: Magnesium ion binding is a general cofactor-binding term. While accurate
      (Pol IV binds 2 Mg(2+) per subunit), the informative molecular function is the
      DNA-directed DNA polymerase activity, so this should not be treated as a core
      function.
    supported_by:
    - reference_id: file:PSEPK/dinB/dinB-uniprot.txt
      supporting_text: Binds 2 magnesium ions per subunit.
