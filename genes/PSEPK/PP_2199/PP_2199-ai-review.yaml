description: PP_2199 encodes a predicted AFG1/ZapE-family P-loop ATPase in Pseudomonas putida KT2440. Automated family evidence supports ATP binding and ATP hydrolysis and places it in cell-division-site/cell-division context, but it lacks the stronger FtsZ-interaction annotation present for the canonical KT2440 zapE gene, so it is best treated as a candidate ZapE-like cell-division factor.
