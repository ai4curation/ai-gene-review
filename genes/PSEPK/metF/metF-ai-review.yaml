id: Q88D51
gene_symbol: metF
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: >-
  metF encodes the canonical soluble bacterial methylenetetrahydrofolate
  reductase of Pseudomonas putida KT2440. This FAD-dependent enzyme uses NADH
  to reduce 5,10-methylene-THF to 5-methyl-THF, providing the methyl-folate
  carrier used by methionine synthase. The compact 295-residue protein carries
  bacterial MetF family signatures and is assigned EC 1.5.1.54.
existing_annotations:
- term:
    id: GO:0004489
    label: methylenetetrahydrofolate reductase [NAD(P)H] activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: >-
      The broad NAD(P)H parent is correct in essence but less informative than
      the existing NADH-specific activity.
    action: KEEP_AS_NON_CORE
    reason: >-
      Q88D51 carries EC 1.5.1.54/RHEA:19821 and the bacterial MetF signatures;
      GO:0004489 remains correct, but GO:0106312 captures the supported cofactor
      specificity and is the core molecular function.
    supported_by:
    - reference_id: file:PSEPK/metF/metF-uniprot.txt
      supporting_text: "DR   GO; GO:0106312; F:methylenetetrahydrofolate reductase (NADH) activity; IEA:UniProtKB-EC."
- term:
    id: GO:0005829
    label: cytosol
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: located_in
  review:
    summary: >-
      Cytosol is consistent with the soluble, compact bacterial MetF
      architecture.
    action: ACCEPT
    reason: >-
      The assignment is computational, but the protein lacks signal peptide,
      transmembrane, or organelle-targeting features and functions in soluble
      folate metabolism.
    supported_by:
    - reference_id: file:PSEPK/metF/metF-uniprot.txt
      supporting_text: "DR   GO; GO:0005829; C:cytosol; IEA:InterPro."
- term:
    id: GO:0006555
    label: L-methionine metabolic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: involved_in
  review:
    summary: >-
      MetF contributes specifically to methionine biosynthesis by producing
      5-methyl-THF, rather than to all L-methionine metabolism.
    action: MODIFY
    reason: >-
      Replace the broad metabolic-process term with GO:0071265, which matches
      the UniProt pathway assignment and the strong metF-metH fitness
      relationship in KT2440.
    proposed_replacement_terms:
    - id: GO:0071265
      label: L-methionine biosynthetic process
    supported_by:
    - reference_id: file:PSEPK/metF/metF-uniprot.txt
      supporting_text: "DR   GO; GO:0009086; P:methionine biosynthetic process; IEA:UniProtKB-KW."
    - reference_id: PMID:33534785
      supporting_text: "The fitness pattern for metF from P. putida (PP_4977) is virtually identical to that of the methionine synthase metH (PP_2375; r = 0.96)"
- term:
    id: GO:0071949
    label: FAD binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000118
  qualifier: enables
  review:
    summary: >-
      FAD binding is a conserved mechanistic property of canonical bacterial
      MetF proteins.
    action: ACCEPT
    reason: >-
      Q88D51 has the full FAD-linked oxidoreductase/MTHFR architecture, and
      PANTHER PAINT propagates FAD binding from experimentally supported E.
      coli MetF at the conserved family node.
    supported_by:
    - reference_id: file:PSEPK/metF/metF-uniprot.txt
      supporting_text: "DR   GO; GO:0071949; F:FAD binding; IEA:TreeGrafter."
    - reference_id: file:interpro/panther/PTHR45754/PTHR45754-paint.tsv
