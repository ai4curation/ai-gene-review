references:
- id: GO_REF:0000002
  title: Gene Ontology annotation through association of InterPro records with GO
    terms
  findings: []
- id: GO_REF:0000118
  title: TreeGrafter-generated GO annotations
  findings: []
- id: GO_REF:0000120
  title: Combined Automated Annotation using Multiple IEA Methods
  findings: []
- id: PMID:33534785
  title: Four families of folate-independent methionine synthases.
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Full text directly reports KT2440 metF and PP_4638 fitness behavior and
      supports PP_4977 as the physiological MetF under the tested conditions.
  findings:
  - statement: >-
      Across 101 KT2440 fitness experiments, PP_4977 metF had a profile nearly
      identical to metH (r = 0.96), whereas PP_4638 had no significant
      phenotype and did not supply detectable redundant MTHFR activity.
- id: file:PSEPK/metF/metF-uniprot.txt
  title: UniProtKB entry for metF (Q88D51)
  findings:
  - statement: >-
      The record assigns EC 1.5.1.54/RHEA:19821, the bacterial MTHFR signature
      IPR004620, TIGR00676, FAD binding, and NAD usage.
- id: file:interpro/panther/PTHR45754/PTHR45754-paint.tsv
  title: PANTHER PAINT annotations for PTHR45754
  findings:
  - statement: >-
      PTN000472667 supports broad MTHFR activity and FAD binding but does not
      distinguish NADH from NADPH; cofactor specificity is therefore grounded
      in the EC/Rhea and bacterial-family evidence instead.
- id: file:PSEPK/metF/metF-deep-research-openscientist.md
  title: OpenScientist research for Pseudomonas putida metF (Q88D51)
  reference_review:
    relevance: MEDIUM
    correctness: UNVERIFIED
    review_notes: >-
      The report corroborates the target record and bacterial-family evidence
      and states that no PP_4977-specific biochemical study was found. Its
      unsaved identity and residue calculations, housekeeping-paralog claim,
      transferred essentiality and regulation, and kingdom-wide cofactor
      shorthand are not used as target-level evidence.
  findings:
  - statement: >-
      The report found no PP_4977-specific biochemical or structural study and
      grounded the compact NADH-linked MetF assignment in the target record and
      conserved bacterial MTHFR family architecture.
- id: file:projects/P_PUTIDA/deep-research/PSEPK__folate_one_carbon_interconversion__ppu00670-deep-research-openscientist.md
  title: OpenScientist pathway research for KT2440 folate one-carbon interconversion
  reference_review:
    relevance: HIGH
    correctness: UNVERIFIED
    review_notes: >-
      The final max3 report correctly recognizes the compact IPR004620 MetF
      implementation. Its inferred gene-neighborhood narrative and false claim
      that KT2440 has no MetE are not adopted; the direct KT2440 fitness paper
      and target record remain the evidence for this review.
  findings:
  - statement: >-
      The final report maps PP_4977 to the compact NADH-linked MetF branch from
      its target-record EC/domain architecture while acknowledging that the
      core in-target assignments lack direct KT2440 enzymology.
core_functions:
- description: >-
    MetF is an FAD-dependent NADH methylenetetrahydrofolate reductase that
    reduces 5,10-methylene-THF to 5-methyl-THF (EC 1.5.1.54; RHEA:19821).
    This carrier-state conversion supplies methyl-folate for methionine
    biosynthesis but is distinct from downstream methyl transfer to
    homocysteine.
  supported_by:
  - reference_id: file:PSEPK/metF/metF-uniprot.txt
    supporting_text: "DR   GO; GO:0106312; F:methylenetetrahydrofolate reductase (NADH) activity; IEA:UniProtKB-EC."
  - reference_id: PMID:33534785
    supporting_text: "The fitness pattern for metF from P. putida (PP_4977) is virtually identical to that of the methionine synthase metH (PP_2375; r = 0.96)"
  molecular_function:
    id: GO:0106312
    label: methylenetetrahydrofolate reductase (NADH) activity
  directly_involved_in:
  - id: GO:0035999
    label: tetrahydrofolate interconversion
  - id: GO:0071265
    label: L-methionine biosynthetic process
proposed_new_terms: []
suggested_questions:
- question: >-
    Which environmental conditions make PP_4977 metF essential, and can any
    other KT2440 flavoprotein compensate outside the 101 published fitness
    conditions?
suggested_experiments:
- description: >-
    Purify Q88D51 and measure FAD-dependent forward reduction with NADH versus
    NADPH, then test complementation of a metF deletion under cobalamin-limited
    growth conditions.
  experiment_type: enzyme kinetics and genetic complementation
