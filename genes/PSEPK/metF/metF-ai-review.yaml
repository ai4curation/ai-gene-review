- term:
    id: GO:0106312
    label: methylenetetrahydrofolate reductase (NADH) activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: >-
      This is the specific core reaction of canonical KT2440 MetF.
    action: ACCEPT
    reason: >-
      The EC 1.5.1.54/RHEA:19821 record, complete bacterial MetF
      IPR004620/TIGR00676 signatures, and close relationship to experimentally
      characterized bacterial MetF support NADH-linked reduction.
    supported_by:
    - reference_id: file:PSEPK/metF/metF-uniprot.txt
      supporting_text: "Xref=Rhea:RHEA:19821"
    - reference_id: file:PSEPK/metF/metF-uniprot.txt
      supporting_text: "DR   NCBIfam; TIGR00676; fadh2; 1."
- term:
    id: GO:0035999
    label: tetrahydrofolate interconversion
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: involved_in
  review:
    summary: >-
      Reduction of 5,10-methylene-THF to 5-methyl-THF is a direct
      tetrahydrofolate carrier-state interconversion.
    action: ACCEPT
    reason: >-
      The term precisely captures the biochemical process without conflating
      MetF with downstream methionine synthase activity.
    supported_by:
    - reference_id: file:PSEPK/metF/metF-uniprot.txt
