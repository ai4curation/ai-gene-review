    title: UniProt entry Q88I37
    findings:
      - statement: >-
          benD (PP_3164) is annotated as an SDR-family
          1,6-dihydroxycyclohexa-2,4-diene-1-carboxylate dehydrogenase with EC 1.3.1.25.
  - id: file:PSEPK/benD/benD-goa.tsv
    title: QuickGO annotation export for benD (Q88I37)
    findings:
      - statement: >-
          The current GOA set contains one precise molecular function term,
          one generic parent oxidoreductase term, and one likely erroneous
          fatty acid elongation process assignment from TreeGrafter/PANTHER.
  - id: file:PSEPK/benD/benD-deep-research-falcon.md
    title: Deep Research Report for benD generated with Falcon
    findings:
      - statement: >-
          Falcon synthesis identifies PP_3164 as the benzoate cis-dihydrodiol
          dehydrogenase that produces catechol and places it in the benABCD
          benzoate utilization module.
core_functions:
  - description: >-
      BenD is a substrate-specific cis-diol dehydrogenase that oxidizes
      1,6-dihydroxycyclohexa-2,4-diene-1-carboxylate to catechol in the peripheral
      benzoate degradation route of Pseudomonas putida KT2440.
    molecular_function:
      id: GO:0047116
      label: 1,6-dihydroxycyclohexa-2,4-diene-1-carboxylate dehydrogenase activity
    directly_involved_in:
      - id: GO:0043640
        label: benzoate catabolic process via hydroxylation
    supported_by:
      - reference_id: file:PSEPK/benD/benD-uniprot.txt
        supporting_text: >-
          SubName: Full=1,6-dihydroxycyclohexa-2,4-diene-1-carboxylate
          dehydrogenase
      - reference_id: file:PSEPK/benD/benD-deep-research-falcon.md
        supporting_text: >-
          Primary function: BenD/PP_3164 catalyzes oxidation of the benzoate
          cis-dihydrodiol (DHCDC; "benzoate diol") to catechol
suggested_questions:
  - question: >-
      Does BenD act only on the benzoate-derived cis-diol, or can it also process
      cis-dihydrodiol intermediates generated by other aromatic dioxygenases in
      P. putida KT2440?
  - question: >-
      Is benD strictly required for growth on benzoate, or can other SDR-family
      dehydrogenases partially compensate under some growth conditions?
suggested_experiments:
  - experiment_type: Enzyme kinetics
    hypothesis: >-
      BenD prefers NAD and is optimized for the benzoate-derived cis-diol rather
      than a broad set of aromatic cis-dihydrodiols.
    description: >-
      Purify BenD and measure cofactor preference plus steady-state kinetics against
      benzoate cis-diol and a panel of substituted aromatic cis-dihydrodiols.
  - experiment_type: Deletion and complementation
    hypothesis: >-
      Loss of benD blocks the benzoate-to-catechol conversion step, causing
      benzoate cis-diol accumulation and benzoate-specific growth defects while
      preserving growth on catechol.
    description: >-
      Construct benD deletion and complementation strains and compare growth and
      metabolite profiles on benzoate versus catechol.
