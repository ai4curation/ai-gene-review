id: Q88I37
gene_symbol: benD
product_type: PROTEIN
aliases:
  - PP_3164
status: COMPLETE
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB
    11950 / KT2440)
description: >-
  BenD is an SDR-family cis-diol dehydrogenase in the benzoate utilization locus
  of Pseudomonas putida KT2440. It catalyzes oxidation of the benzoate
  cis-dihydrodiol intermediate to catechol, acting downstream of benzoate
  1,2-dioxygenase in benzoate catabolic process via hydroxylation.
existing_annotations:
  - term:
      id: GO:0016616
      label: oxidoreductase activity, acting on the CH-OH group of donors, NAD
        or NADP as acceptor
    evidence_type: IEA
    original_reference_id: GO_REF:0000118
    review:
      summary: >-
        This TreeGrafter annotation captures the broad oxidoreductase chemistry
        of BenD, but the same GOA set also contains the exact EC-backed child term
        GO:0047116. The specific dehydrogenase term is the appropriate annotation
        for the core molecular function.
      action: MODIFY
      reason: >-
        BenD is not merely a generic CH-OH oxidoreductase. Its substrate and
        reaction are specifically the benzoate cis-diol to catechol conversion step.
      proposed_replacement_terms:
        - id: GO:0047116
          label: 1,6-dihydroxycyclohexa-2,4-diene-1-carboxylate dehydrogenase activity
      supported_by:
        - reference_id: file:PSEPK/benD/benD-uniprot.txt
          supporting_text: >-
            SubName: Full=1,6-dihydroxycyclohexa-2,4-diene-1-carboxylate
            dehydrogenase
        - reference_id: file:PSEPK/benD/benD-deep-research-falcon.md
          supporting_text: >-
            Primary function: BenD/PP_3164 catalyzes oxidation of the benzoate
            cis-dihydrodiol (DHCDC; "benzoate diol") to catechol
  - term:
      id: GO:0030497
      label: fatty acid elongation
    evidence_type: IEA
    original_reference_id: GO_REF:0000118
    review:
      summary: >-
        This TreeGrafter/PANTHER process assignment conflicts with the protein's
        named enzymatic activity and with benD's placement in the benABCD benzoate
        catabolic module. Nothing in the local evidence links PP_3164 to fatty acid
        metabolism.
      action: REMOVE
      reason: >-
        The annotation is a family-based overpropagation from a broad SDR lineage
        and is not compatible with the benzoate-to-catechol function supported by
        gene context and enzyme naming.
      supported_by:
        - reference_id: file:PSEPK/benD/benD-goa.tsv
          supporting_text: >-
            UniProtKB	Q88I37	benD	involved_in	GO:0030497	fatty acid elongation
        - reference_id: file:PSEPK/benD/benD-deep-research-falcon.md
          supporting_text: >-
            The UniProt target Q88I37 corresponds to Pseudomonas putida KT2440 locus
            PP_3164, annotated as 1,6-/1,2-dihydroxycyclohexa-2,4-/3,5-diene-1-carboxylate
            dehydrogenase
  - term:
      id: GO:0047116
      label: 1,6-dihydroxycyclohexa-2,4-diene-1-carboxylate dehydrogenase activity
    evidence_type: IEA
    original_reference_id: GO_REF:0000003
    review:
      summary: >-
        This is the precise catalytic activity for BenD and matches both the
        UniProt product name and the EC-based GO assignment. It captures the core
        molecular function much better than the generic parent oxidoreductase term.
      action: ACCEPT
      reason: >-
        The enzyme is explicitly identified as EC 1.3.1.25 and as a
        1,6-dihydroxycyclohexa-2,4-diene-1-carboxylate dehydrogenase.
      supported_by:
        - reference_id: file:PSEPK/benD/benD-uniprot.txt
          supporting_text: >-
            SubName: Full=1,6-dihydroxycyclohexa-2,4-diene-1-carboxylate
            dehydrogenase
        - reference_id: file:PSEPK/benD/benD-uniprot.txt
          supporting_text: EC=1.3.1.25
  - term:
      id: GO:0043640
      label: benzoate catabolic process via hydroxylation
    evidence_type: IEA
    original_reference_id: file:PSEPK/benD/benD-deep-research-falcon.md
    review:
      summary: >-
        BenD performs the dehydrogenation half of the benABCD pathway that converts
        benzoate to catechol. This specific biological process term should be added
        to capture the pathway context of the enzyme's core activity.
      action: NEW
      reason: >-
        The benD product is part of the benzoate-to-catechol peripheral pathway,
        not a generic oxidoreductase acting in unrelated metabolism.
      supported_by:
        - reference_id: file:PSEPK/benD/benD-deep-research-falcon.md
          supporting_text: >-
            BenD is a cis-diol dehydrogenase that converts the benzoate
            cis-dihydrodiol intermediate into catechol
        - reference_id: file:PSEPK/benD/benD-deep-research-falcon.md
          supporting_text: >-
            Aerobic benzoate catabolism in many Proteobacteria begins with benzoate
            1,2-dioxygenase (BenABC) forming a non-aromatic cis-dihydrodiol ...
            followed by BenD oxidizing this dihydrodiol to catechol
references:
  - id: GO_REF:0000003
    title: Gene Ontology annotation based on Enzyme Commission mapping
    findings: []
  - id: GO_REF:0000118
    title: TreeGrafter-generated GO annotations
    findings: []
