  findings:
  - reference_section_type: OTHER
    supporting_text: PhaC2 is a **granule-associated polymerase** that catalyzes intracellular
      polymerization of **(R)-3-hydroxyacyl-CoA** monomers into **medium-chain-length
      polyhydroxyalkanoates (mcl-PHAs)**, typically containing **C6–C14** monomers
      depending on substrate.
  - reference_section_type: OTHER
    supporting_text: The retrieved KT2440 literature consistently places PhaC2 in
      the **class II PhaC** family responsible for **mcl-PHA** production in pseudomonads,
      which is consistent with UniProt’s functional description “poly(3-hydroxyalkanoate)
      polymerase”
  - reference_section_type: OTHER
    supporting_text: one containing **phaC1 (PP_5003)**, **phaZ (PP_5004)**, **phaC2
      (PP_5005)**, and **phaD (PP_5006)**; and an adjacent, oppositely oriented operon
      encoding phasins **phaF (PP_5007)** and **phaI (PP_5008)**.
  - reference_section_type: OTHER
    supporting_text: PhaC proteins in *P. putida* are described as **granule-associated
      proteins (GAPs)** that coat cytoplasmic PHA storage granules along with other
      GAPs (e.g., depolymerase and phasins). This supports functional localization
      of PhaC2 at the **surface of intracellular PHA granules**
  - reference_section_type: OTHER
    supporting_text: PhaC2 functions in the **PHA cycle**, a dynamic synthesis/degradation
      system linked to central carbon metabolism and metabolic robustness. PHA accumulation
      is associated with **carbon excess and nutrient limitation**
  - reference_section_type: OTHER
    supporting_text: No retrieved text snippet provided **PhaC2-only** kinetic constants,
      purified-enzyme substrate preference measurements, or **single-gene phaC2 deletion/complementation
      phenotypes** in KT2440.
existing_annotations:
- term:
    id: GO:0016746
    label: acyltransferase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: Accept as the best currently available GO molecular-function term.
      It captures the correct transferase chemistry for PhaC-II, even though the
      true biological activity is more specifically PHA polymerization and would
      benefit from a dedicated synthase term in GO.
    action: ACCEPT
    supported_by:
    - reference_id: PMID:31468725
      supporting_text: These CoA monomers can then be polymerized into mcl‐PHAs
        via the PHA synthases, PhaC1 and PhaC2 (Ren et al., 2009)
    - reference_id: file:PSEPK/phaC/phaC-deep-research-openai.md
      supporting_text: '**PhaC2 is an enzyme that catalyzes the polymerization
        of (R)-3-hydroxyacyl-CoA monomers into PHA polyester**'
    - reference_id: file:PSEPK/phaC/phaC-deep-research-falcon.md
      supporting_text: PhaC polymerases (including PhaC2) use **(R)-3-hydroxyacyl-CoA**
        substrates to synthesize intracellular PHA polyesters. This reaction is the
        committed polymerization step converting the soluble monomer pool into stored
        polymer.
- term:
    id: GO:0042619
    label: poly-hydroxybutyrate biosynthetic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: Too narrow for the KT2440 enzyme. Pseudomonas putida KT2440 is described
      as an mcl-PHA producer, and the relevant pathway literature places PhaC2 in
      poly(3-hydroxyalkanoate) polymerization rather than specifically poly-hydroxybutyrate
      synthesis. Falcon deep research reinforces this; it explicitly assigns PhaC2/PP_5005
      to the class II PhaC family that produces medium-chain-length (C6-C14) PHA in
      pseudomonads, and notes the protein is granule-associated rather than a PHB
      (scl-PHA) synthase. Replace with the existing broader GO term for
      poly(3-hydroxyalkanoate) biosynthesis.
    action: MODIFY
    proposed_replacement_terms:
    - id: GO:0042621
      label: poly(3-hydroxyalkanoate) biosynthetic process
    supported_by:
    - reference_id: PMID:31468725
      supporting_text: Among these Pseudomonads, Pseudomonas putida KT2440 naturally
        produces mcl‐PHAs as a carbon storage compound in scenarios of carbon excess
        and nutrient limitation (de Eugenio et al., 2010)
    - reference_id: PMID:31468725
      supporting_text: These CoA monomers can then be polymerized into mcl‐PHAs
        via the PHA synthases, PhaC1 and PhaC2 (Ren et al., 2009)
    - reference_id: file:PSEPK/phaC/phaC-deep-research-falcon.md
      supporting_text: KT2440 is described as producing **medium-chain-length PHA
        copolymers** with monomers **ranging from C6 to C14** depending on carbon
        source.
    - reference_id: file:PSEPK/phaC/phaC-deep-research-falcon.md
      supporting_text: The retrieved KT2440 literature consistently places PhaC2 in
        the **class II PhaC** family responsible for **mcl-PHA** production in pseudomonads,
        which is consistent with UniProt’s functional description “poly(3-hydroxyalkanoate)
        polymerase”
core_functions:
- description: Catalyzes the committed polymerization step of the KT2440 medium-chain-length
    PHA pathway by converting (R)-3-hydroxyacyl-CoA monomers into intracellular poly(3-hydroxyalkanoate)
    storage polyester (C6-C14 mcl-PHA). As a class II PhaC synthase it is granule-associated,
    acting at the surface of cytoplasmic PHA storage granules. The best current GO
    molecular-function term is still the broad parent acyltransferase activity.
