taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida KT2440
description: Class II poly(3-hydroxyalkanoate) synthase (PhaC-II/PhaC2) in the
  phaC1-phaZ-phaC2-phaD locus of Pseudomonas putida KT2440. Current KT2440 evidence
  supports participation in medium-chain-length poly(3-hydroxyalkanoate) biosynthesis
  and transcriptional induction under PHA-producing conditions, but I did not find
  a purified biochemical study of the KT2440 enzyme alone. The seeded PHB-specific
  process annotation is therefore too narrow for this pseudomonad mcl-PHA polymerase.
