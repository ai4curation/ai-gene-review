existing_annotations:
- term:
    id: GO:0016746
    label: acyltransferase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: Accept as the best currently available GO molecular-function term.
      It captures the correct transferase chemistry for PhaC-II, even though the
      true biological activity is more specifically PHA polymerization and would
      benefit from a dedicated synthase term in GO.
    action: ACCEPT
    supported_by:
    - reference_id: PMID:31468725
      supporting_text: These CoA monomers can then be polymerized into mcl‐PHAs
        via the PHA synthases, PhaC1 and PhaC2 (Ren et al., 2009)
    - reference_id: file:PSEPK/phaC/phaC-deep-research-openai.md
      supporting_text: '**PhaC2 is an enzyme that catalyzes the polymerization
        of (R)-3-hydroxyacyl-CoA monomers into PHA polyester**'
- term:
    id: GO:0042619
    label: poly-hydroxybutyrate biosynthetic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: Too narrow for the KT2440 enzyme. Pseudomonas putida KT2440 is described
      as an mcl-PHA producer, and the relevant pathway literature places PhaC2 in
      poly(3-hydroxyalkanoate) polymerization rather than specifically poly-hydroxybutyrate
      synthesis. Replace with the existing broader GO term for poly(3-hydroxyalkanoate)
      biosynthesis.
    action: MODIFY
    proposed_replacement_terms:
    - id: GO:0042621
      label: poly(3-hydroxyalkanoate) biosynthetic process
    supported_by:
    - reference_id: PMID:31468725
      supporting_text: Among these Pseudomonads, Pseudomonas putida KT2440 naturally
        produces mcl‐PHAs as a carbon storage compound in scenarios of carbon excess
        and nutrient limitation (de Eugenio et al., 2010)
    - reference_id: PMID:31468725
      supporting_text: These CoA monomers can then be polymerized into mcl‐PHAs
        via the PHA synthases, PhaC1 and PhaC2 (Ren et al., 2009)
core_functions:
- description: Catalyzes the polymerization step of the KT2440 medium-chain-length
    PHA pathway by converting R-3-hydroxyacyl-CoA monomers into intracellular poly(3-hydroxyalkanoate)
    storage polyester. The best current GO molecular-function term is still the
    broad parent acyltransferase activity.
  molecular_function:
    id: GO:0016746
    label: acyltransferase activity
  directly_involved_in:
  - id: GO:0042621
    label: poly(3-hydroxyalkanoate) biosynthetic process
  supported_by:
  - reference_id: PMID:31468725
    supporting_text: These CoA monomers can then be polymerized into mcl‐PHAs via
      the PHA synthases, PhaC1 and PhaC2 (Ren et al., 2009)
proposed_new_terms:
- proposed_name: poly(3-hydroxyalkanoate) synthase activity
  proposed_definition: Catalysis of the transfer and polymerization of 3-hydroxyacyl
    groups from (R)-3-hydroxyacyl-CoA to a growing poly(3-hydroxyalkanoate) chain,
    releasing coenzyme A.
  justification: GO already contains process terms for poly(3-hydroxyalkanoate)
    biosynthesis, but it lacks the corresponding catalytic molecular-function term.
    This forces PHA polymerases such as PhaC-II/PhaC2 into the overly broad parent
    term acyltransferase activity.
  proposed_parent:
    id: GO:0016746
    label: acyltransferase activity
  supported_by:
  - reference_id: PMID:31468725
    supporting_text: These CoA monomers can then be polymerized into mcl‐PHAs via
      the PHA synthases, PhaC1 and PhaC2 (Ren et al., 2009)
suggested_questions:
- question: Under which carbon sources or stress states does PhaC-II make a distinct
    contribution relative to PhaC1 in the native KT2440 background?
  experts:
  - Pseudomonas PHA metabolism researchers
- question: Does PhaC-II primarily affect polymer composition or granule architecture
    rather than total PHA yield in KT2440?
  experts:
  - PHA enzyme biochemists
- question: Is PhaC-II preferentially associated with a specific subset of PHA granules
    or a specific phase of granule maturation?
  experts:
  - Bacterial cell biology and granule biogenesis researchers
suggested_experiments:
- hypothesis: PhaC-II contributes condition-specific polymerization activity that
    is masked in the wild-type dual-synthase background.
  description: Construct clean single-polymerase KT2440 strains and complementation
    series for phaC1 and phaC-II, then compare PHA yield and monomer composition
    across gluconate, fatty acids, and aromatic substrates.
  experiment_type: genetics and metabolite/polymer phenotyping
- hypothesis: KT2440 PhaC-II has a substrate range biased toward medium-chain R-3-hydroxyacyl-CoA
    substrates and may differ measurably from PhaC1 in chain-length preference.
  description: Purify KT2440 PhaC-II and measure polymerization activity against
    a panel of R-3-hydroxyacyl-CoA substrates spanning short- to medium-chain monomers.
  experiment_type: biochemical enzyme assay
- hypothesis: PhaC-II has a distinct role in granule nucleation or granule occupancy
    during nitrogen-limited PHA accumulation.
  description: Tag PhaC1 and PhaC-II separately and compare granule association by
    fluorescence microscopy or granule proteomics during PHA accumulation.
  experiment_type: cell biology and proteomics
