description: PP_2144 encodes a predicted PsrA-like TetR-family transcription regulator in Pseudomonas putida KT2440. GOA includes
  experimental curator annotations to promoter binding and both DNA-binding transcription activator and repressor activities
  from the PsrA literature, while UniProt/Asta domain evidence places the protein in the TetR/PsrA regulator family. This
  first pass preserves the experimental directionality but does not infer a broader regulon beyond the curated promoter-binding
  context.
