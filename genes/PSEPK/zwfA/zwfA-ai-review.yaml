    supporting_text: "CC   -!- FUNCTION: Catalyzes the oxidation of glucose 6-phosphate to 6-"
  - reference_id: file:PSEPK/zwf/zwf-notes.md
    supporting_text: the isoforms encoded by zwfA and zwfB carry most of the activity
  - reference_id: file:PSEPK/zwfA/zwfA-deep-research-openscientist.md
    supporting_text: ZwfA is the physiologically dominant of three G6PDH isozymes on glucose
