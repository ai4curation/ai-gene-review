status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: >-
  zwfA (PP_1022) encodes a glucose-6-phosphate 1-dehydrogenase paralog in
  Pseudomonas putida KT2440. UniProt and GOA support canonical NADP-dependent
  G6PDH chemistry, converting glucose 6-phosphate to
  6-phosphogluconolactone in the oxidative pentose phosphate pathway. The
  G6PDH isozyme literature indicates that zwfA together with zwfB carries most
  measurable G6PDH activity, whereas the PP_5351/zwfC paralog appears minor or
  condition-specific.
existing_annotations:
