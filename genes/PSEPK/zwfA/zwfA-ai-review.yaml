    id: GO:0004345
    label: glucose-6-phosphate dehydrogenase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: >-
      This is the exact catalytic activity for ZwfA. UniProt identifies Q88P31
      as glucose-6-phosphate 1-dehydrogenase with EC 1.1.1.49, and GOA links
      GO:0004345 to RHEA:15841, EC, InterPro, UniRule, and a PAINT node.
    action: ACCEPT
    reason: >-
      The term captures the core molecular function of zwfA.
    supported_by:
    - reference_id: file:PSEPK/zwfA/zwfA-uniprot.txt
      supporting_text: "CC   -!- FUNCTION: Catalyzes the oxidation of glucose 6-phosphate to 6-"
    - reference_id: file:PSEPK/zwfA/zwfA-goa.tsv
      supporting_text: "GO:0004345\tglucose-6-phosphate dehydrogenase activity"
    - reference_id: file:PSEPK/zwfA/zwfA-deep-research-openscientist.md
      supporting_text: ZwfA is a bona fide glucose-6-phosphate 1-dehydrogenase (EC 1.1.1.49)
