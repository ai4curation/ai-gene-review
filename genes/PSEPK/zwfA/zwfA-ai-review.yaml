taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: Glucose-6-phosphate 1-dehydrogenase isozyme A of Pseudomonas putida KT2440 (PP_1022). The
  enzyme catalyzes oxidation of glucose 6-phosphate to 6-phosphoglucono-1,5-lactone with reduction of
  pyridine nucleotide cofactor, providing the entry reaction into the oxidative pentose phosphate branch
  and the Entner-Doudoroff-linked upper glucose catabolic route. KT2440 contains three G6PDH isozymes,
  and the organism-specific isozyme study identifies zwfA and zwfB as the main carriers of measurable
  G6PDH activity, with zwfA acting as a major glucose-catabolism gatekeeper.
