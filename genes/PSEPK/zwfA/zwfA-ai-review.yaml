id: Q88P31
gene_symbol: zwfA
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
aliases:
  - PP_1022
  - zwf
description: >-
  zwfA encodes the major glucose-6-phosphate 1-dehydrogenase isozyme G6PDH-A of
  Pseudomonas putida KT2440. The enzyme oxidizes D-glucose 6-phosphate to
  6-phosphogluconolactone at the oxidative pentose-phosphate/Entner-Doudoroff
  interface, contributing to 6-phosphogluconate supply and redox cofactor balance
  during sugar catabolism. It is a predicted soluble cytosolic G6PDH-family enzyme
  and is part of the zwfA-pgl-eda upper glucose-catabolism operon; isozyme-level
  evidence indicates that zwfA and zwfB carry most G6PDH activity in KT2440,
  whereas the PP_5351 zwfC paralog is a minor, low-expression isozyme.
existing_annotations:
  - term:
      id: GO:0004345
      label: glucose-6-phosphate dehydrogenase activity
    evidence_type: IEA
    original_reference_id: GO_REF:0000120
    qualifier: enables
    review:
      summary: >-
        This is the specific catalytic activity of ZwfA. UniProt names Q88P31 as a
        glucose-6-phosphate 1-dehydrogenase, and the KT2440 isozyme paper shows
        that zwfA and zwfB carry most of the strain's G6PDH activity.
      action: ACCEPT
      reason: >-
        The term captures the core molecular function of the protein and is more
        informative than the broader oxidoreductase parent term also present in
        GOA.
      supported_by:
        - reference_id: file:PSEPK/zwfA/zwfA-uniprot.txt
          supporting_text: 'RecName: Full=Glucose-6-phosphate 1-dehydrogenase'
        - reference_id: PMID:33727391
          supporting_text: |-
            We show that the three G6PDHs of strain KT2440 have
            different cofactor specificities and that the isoforms encoded by zwfA and zwfB
            carry most of the activity
  - term:
      id: GO:0005829
      label: cytosol
    evidence_type: IEA
    original_reference_id: GO_REF:0000118
    qualifier: located_in
    review:
      summary: >-
        Cytosolic localization is plausible for the soluble glucose-6-phosphate
        dehydrogenase that acts on intracellular glucose 6-phosphate, and TreeGrafter
        provides the existing cytosol annotation.
      action: KEEP_AS_NON_CORE
      reason: >-
        Localization is compatible with ZwfA's central-carbon role, but the core
        reviewed function is its glucose-6-phosphate dehydrogenase chemistry and
        pathway placement.
      supported_by:
        - reference_id: file:PSEPK/zwfA/zwfA-uniprot.txt
          supporting_text: 'DR   GO; GO:0005829; C:cytosol; IEA:TreeGrafter.'
  - term:
      id: GO:0006006
      label: glucose metabolic process
    evidence_type: IEA
    original_reference_id: GO_REF:0000120
    qualifier: involved_in
    review:
      summary: >-
        This broad process annotation is biologically correct because ZwfA acts at
        the entry from glucose 6-phosphate into oxidative PP/ED-linked carbon
        metabolism. It is less specific than the oxidative pentose-phosphate terms,
        so it is useful as non-core context rather than the main pathway label.
      action: KEEP_AS_NON_CORE
      reason: >-
        The term is not wrong, but the more precise pathway context for curation is
        oxidative pentose-phosphate flux feeding the Entner-Doudoroff network.
      supported_by:
        - reference_id: PMID:29607620
          supporting_text: >-
            Next, the combined action of glucose 6‐phosphate dehydrogenase (Zwf) and 6‐phosphogluconolactonase (Pgl) convert G6P into 6‐phosphogluconate (6PG)
        - reference_id: PMID:19506074
          supporting_text: Entner-Doudoroff pathway are organized in two operons; one made up of the zwf,
  - term:
      id: GO:0006098
      label: pentose-phosphate shunt
    evidence_type: IEA
    original_reference_id: GO_REF:0000120
    qualifier: involved_in
    review:
      summary: >-
        UniProt places ZwfA in the oxidative stage of the pentose phosphate pathway,
        and the reaction supplies the first oxidative PP intermediate that also feeds
        P. putida's ED-centered glucose network.
      action: KEEP_AS_NON_CORE
      reason: >-
        G6PDH is the canonical first step of the oxidative pentose-phosphate
        route, but GO:0009051 is the more specific core process term.
      supported_by:
        - reference_id: file:PSEPK/zwfA/zwfA-uniprot.txt
          supporting_text: |-
            CC   -!- PATHWAY: Carbohydrate degradation; pentose phosphate pathway; D-
            CC       ribulose 5-phosphate from D-glucose 6-phosphate (oxidative stage): step
            CC       1/3.
  - term:
      id: GO:0009051
      label: pentose-phosphate shunt, oxidative branch
    evidence_type: IEA
    original_reference_id: GO_REF:0000118
    qualifier: involved_in
    review:
      summary: >-
        This is the most precise existing biological-process term for the ZwfA
        reaction in GOA. It captures the oxidative branch beginning with glucose
        6-phosphate dehydrogenase.
      action: ACCEPT
      reason: >-
        The term matches both the UniProt pathway statement and the chemistry of the
        ZwfA step.
      supported_by:
        - reference_id: file:PSEPK/zwfA/zwfA-uniprot.txt
          supporting_text: |-
            CC   -!- PATHWAY: Carbohydrate degradation; pentose phosphate pathway; D-
            CC       ribulose 5-phosphate from D-glucose 6-phosphate (oxidative stage): step
            CC       1/3.
  - term:
      id: GO:0016614
      label: oxidoreductase activity, acting on CH-OH group of donors
    evidence_type: IEA
    original_reference_id: GO_REF:0000002
    qualifier: enables
    review:
      summary: >-
        This parent oxidoreductase term is technically compatible with G6PDH
        chemistry but is redundant with the specific glucose-6-phosphate
        dehydrogenase activity annotation.
      action: MARK_AS_OVER_ANNOTATED
      reason: >-
        GO:0004345 captures the actual evolved activity, while this parent term adds
        no useful precision for this reviewed gene.
      supported_by:
        - reference_id: file:PSEPK/zwfA/zwfA-uniprot.txt
          supporting_text: 'DR   GO; GO:0004345; F:glucose-6-phosphate dehydrogenase activity; IEA:UniProtKB-UniRule.'
  - term:
      id: GO:0050661
      label: NADP binding
    evidence_type: IEA
    original_reference_id: GO_REF:0000120
    qualifier: enables
    review:
      summary: >-
        NADP binding is supported by UniProt feature and GO annotations and is
        biologically meaningful for KT2440 G6PDH isozymes, whose different cofactor
        preferences help balance NADPH and NADH production.
      action: ACCEPT
      reason: >-
        Cofactor binding is a specific property of this enzyme family and is central
        to the physiological distinction among the three KT2440 Zwf paralogs.
      supported_by:
        - reference_id: file:PSEPK/zwfA/zwfA-uniprot.txt
          supporting_text: 'DR   GO; GO:0050661; F:NADP binding; IEA:UniProtKB-UniRule.'
        - reference_id: PMID:33727391
          supporting_text: |-
            We propose that gene duplication
            and relaxation in cofactor specificity is an evolutionary strategy toward
            balancing the relative production of NADPH and NADH.
core_functions:
  - description: >-
      Major KT2440 glucose-6-phosphate dehydrogenase isozyme that oxidizes
      D-glucose 6-phosphate to 6-phosphogluconolactone, supplying the oxidative
      pentose-phosphate/Entner-Doudoroff interface and contributing to redox
      cofactor balance.
    molecular_function:
      id: GO:0004345
      label: glucose-6-phosphate dehydrogenase activity
    directly_involved_in:
      - id: GO:0009051
        label: pentose-phosphate shunt, oxidative branch
    supported_by:
      - reference_id: file:PSEPK/zwfA/zwfA-uniprot.txt
        supporting_text: 'RecName: Full=Glucose-6-phosphate 1-dehydrogenase'
      - reference_id: PMID:33727391
        supporting_text: |-
          We show that the three G6PDHs of strain KT2440 have
          different cofactor specificities and that the isoforms encoded by zwfA and zwfB
          carry most of the activity
suggested_questions:
  - question: >-
      Should zwfA receive an explicit Entner-Doudoroff pathway annotation, or is
      oxidative pentose-phosphate branch annotation sufficient because the ZwfA
      reaction precedes 6-phosphogluconate entry into the ED branch?
    experts:
      - Pseudomonas central-carbon metabolism curator
  - question: >-
      Under which carbon sources or redox states does zwfB contribute enough to be
      curated as a co-primary G6PDH for the ED/PP interface alongside zwfA?
    experts:
      - Pseudomonas central-carbon metabolism curator
suggested_experiments:
  - description: >-
      Compare zwfA, zwfB, and zwfC single and combinatorial deletion strains under
      glucose, gluconate, fructose, ribose, and oxidative stress with targeted
      NADPH/NADH flux measurements to resolve condition-specific dominance among
      the three G6PDH isozymes.
