  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: pet encodes a TenA-family aminopyrimidine aminohydrolase involved in thiamine salvage. The enzyme converts 4-amino-5-aminomethyl-2-methylpyrimidine to 4-amino-5-hydroxymethyl-2-methylpyrimidine, regenerating a precursor that can enter thiamine diphosphate biosynthesis.
