description: recQ (PP_4516) encodes a RecQ-family ATP-dependent 3'-to-5' DNA helicase. Although KEGG includes it in ppu03018,
  the local UniProt/GOA evidence supports DNA replication, repair, recombination, SOS-response, replisome, and nucleoid roles
  rather than RNA degradation.
