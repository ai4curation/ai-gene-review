  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: frmA (PP_1616) encodes a class III zinc-dependent alcohol dehydrogenase, also annotated as S-(hydroxymethyl)glutathione dehydrogenase. It oxidizes formaldehyde captured as S-hydroxymethylglutathione and can also reduce S-nitrosoglutathione, placing it in cytosolic formaldehyde and nitrosothiol detoxification rather than in the core ED/gluconeogenic trunk.
