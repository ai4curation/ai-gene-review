description: PP_2805 encodes an experimentally characterized FAD-binding Baeyer-Villiger monooxygenase from Pseudomonas putida KT2440.
  The enzyme inserts oxygen adjacent to ketone carbonyls using NADPH and/or NADH, with reported preference for short-chain aliphatic
  ketones. In broad KEGG xenobiotic maps it is best treated as redox side chemistry, not as evidence for a complete aminobenzoate route.
