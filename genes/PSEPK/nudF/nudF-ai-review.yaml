description: 'nudF encodes a Nudix-family ADP-ribose/ADP-sugar pyrophosphatase in Pseudomonas
  putida KT2440. The protein hydrolyzes ADP-ribose and related ADP-sugars and is better treated
  as nucleotide-sugar or ribose-phosphate metabolism context, not as a riboflavin-biosynthetic
  enzyme.'
