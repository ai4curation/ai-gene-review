description: livG (PP_1138) encodes the second predicted ATP-binding energy-coupling subunit of the PP_1137-PP_1141 LivFGMHK branched-chain amino-acid ABC uptake system. Automated annotations and PANTHER classification support an ATPase role in valine and isoleucine import with the adjacent LivF, LivM, LivH, and LivK transporter components.
