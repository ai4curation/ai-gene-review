description: PP_3312 encodes a predicted small heat shock protein in the HSP20
  family. It contains an alpha-crystallin/small-HSP domain and is best treated
  as a putative stress-responsive holdase chaperone that binds non-native or
  unfolded proteins, while its specific KT2440 substrates remain unknown.
