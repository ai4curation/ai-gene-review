suggested_questions:
- question: Has purified KT2440 Gnl/PP_1170 been directly tested on glucaro- and galactaro-1,5-lactones?
- question: Does Gnl function with PP_3602 as the main KGSADH branch in vivo, or are KGSADH paralogs condition-specific?
