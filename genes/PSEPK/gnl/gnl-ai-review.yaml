id: Q88NN7
gene_symbol: gnl
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: >-
  gnl encodes an SMP-30/Gluconolactonase/LRE-like beta-propeller hydrolase in
  Pseudomonas putida KT2440. Module-level evidence supports PP_1170 as the
  UxuL-family lactonase candidate that hydrolyzes glucaro- and
  galactaro-1,5-lactones in oxidative hexuronate catabolism, although direct
  biochemical confirmation of the KT2440 protein remains a follow-up need.
existing_annotations:
- term:
    id: GO:0004341
    label: gluconolactonase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: >-
      Accept this as a predicted molecular function: UniProt names the protein
      as a gluconolactonase, assigns EC 3.1.1.17, and identifies the
      SMP-30/Gluconolactonase/LRE-like domain. Module-level Falcon synthesis
      further identifies PP_1170 as the likely UxuL-family urono-1,5-lactonase
      that connects Udh to downstream aldarate dehydratases in KT2440.
    action: ACCEPT
    reason: >-
      The evidence is computational rather than direct enzymology for KT2440, so
      the review should not overstate the in vivo substrate. However, the EC
      assignment, Pfam/domain context, catalytic site annotation, and GOA
      UniProtKB-EC mapping are coherent with a gluconolactonase-family
      hydrolase. The pathway-level evidence supports a stronger physiological
      hypothesis: PP_1170 is adjacent to udh and is important for growth on
      D-glucuronate and D-galacturonate, consistent with an UxuL-like
      lactonase role.
    supported_by:
    - reference_id: file:PSEPK/gnl/gnl-uniprot.txt
      supporting_text: 'DE   SubName: Full=Gluconolactonase {ECO:0000313|EMBL:AAN66794.1};'
    - reference_id: file:PSEPK/gnl/gnl-uniprot.txt
      supporting_text: 'DE            EC=3.1.1.17 {ECO:0000313|EMBL:AAN66794.1};'
    - reference_id: file:PSEPK/gnl/gnl-uniprot.txt
      supporting_text: 'FT                   /note="SMP-30/Gluconolactonase/LRE-like region"'
    - reference_id: file:PSEPK/gnl/gnl-deep-research-asta.md
      supporting_text: 'uniprot_accession: Q88NN7'
    - reference_id: file:projects/P_PUTIDA/deep-research/PSEPK__hexuronate_aldarate_catabolism__ppu00053-deep-research-falcon.md
      supporting_text: 'is important for growth of *P. putida* KT2440 on both D-glucuronate and D-galacturonate'
- term:
    id: GO:0005509
    label: calcium ion binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000118
  qualifier: enables
  review:
    summary: >-
      Remove the calcium-specific binding annotation because the local evidence
      supports a zinc or generic divalent-metal cofactor rather than calcium.
    action: REMOVE
    reason: >-
      GO:0005509 is a specific calcium-binding assertion propagated by
      TreeGrafter. The UniProt record instead lists Zn(2+) and a generic
      divalent metal cation per subunit, which is consistent with a
      metal-dependent SMP-30/gluconolactonase fold but not with a
      calcium-specific molecular function annotation.
    supported_by:
    - reference_id: file:PSEPK/gnl/gnl-uniprot.txt
      supporting_text: 'DR   GO; GO:0005509; F:calcium ion binding; IEA:TreeGrafter.'
    - reference_id: file:PSEPK/gnl/gnl-uniprot.txt
      supporting_text: 'CC       Name=Zn(2+); Xref=ChEBI:CHEBI:29105;'
    - reference_id: file:PSEPK/gnl/gnl-uniprot.txt
      supporting_text: 'CC         Note=Binds 1 divalent metal cation per subunit.'
- term:
    id: GO:0019853
    label: L-ascorbic acid biosynthetic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000118
  qualifier: involved_in
  review:
    summary: >-
      Remove the L-ascorbic-acid biosynthesis annotation as likely
      over-propagation from animal SMP-30/regucalcin homologs.
    action: REMOVE
    reason: >-
      The KT2440 protein is a bacterial SMP-30/Gluconolactonase/LRE-like enzyme
      with a gluconolactonase EC assignment. The GOA biological-process
      annotation comes only from TreeGrafter, and the reviewed local evidence
      does not support placing this bacterial enzyme in L-ascorbate
      biosynthesis.
    supported_by:
    - reference_id: file:PSEPK/gnl/gnl-uniprot.txt
      supporting_text: 'DR   GO; GO:0019853; P:L-ascorbic acid biosynthetic process; IEA:TreeGrafter.'
    - reference_id: file:PSEPK/gnl/gnl-uniprot.txt
      supporting_text: 'CC   -!- SIMILARITY: Belongs to the SMP-30/CGR1 family.'
    - reference_id: file:PSEPK/gnl/gnl-uniprot.txt
      supporting_text: 'OS   Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950'
