description: ycfH encodes a TatD/YcfH-like metal-dependent hydrolase annotated as tRNA D-aminoacylase in Pseudomonas putida
  KT2440. The first-pass evidence supports a candidate tRNA/aminoacyl-tRNA deacylase role more strongly than a generic TatD-family
  DNA nuclease assertion.
