    summary: DNA nuclease activity is probably a TatD-family over-transfer for this record.
    action: MODIFY
    reason: The protein is named tRNA D-aminoacylase, PANTHER places it in a D-aminoacyl-tRNA deacylase family, and a tRNA
      deacylase term is a better first-pass call than generic TatD DNase activity.
