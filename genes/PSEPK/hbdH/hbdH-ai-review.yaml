  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: >-
  hbdH encodes a short-chain dehydrogenase/reductase annotated as
  3-hydroxybutyrate dehydrogenase in Pseudomonas putida KT2440. Its predicted
  reaction links 3-hydroxybutyrate and acetoacetate in the broad KEGG butanoate
  metabolism map and is adjacent to acetoacetate/PHA carbon-storage chemistry.
  The first-pass Asta retrieval did not find gene-specific KT2440 literature, so
  the current review accepts the UniProt/GOA EC-derived activity while leaving
  pathway placement as a question for future biochemical or genetic work.
