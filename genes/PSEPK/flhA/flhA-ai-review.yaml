description: flhA encodes a multi-pass membrane FlhA/FHIPEP-family component of the flagellar export apparatus
  in Pseudomonas putida KT2440. It acts in the type-III-like flagellar export gate used for rod and filament
  assembly, providing membrane export-apparatus context rather than a standalone secreted protein function.
