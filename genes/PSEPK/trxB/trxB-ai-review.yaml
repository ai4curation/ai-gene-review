suggested_questions:
- question: What is the dominant physiological substrate and pathway context for trxB under P. putida
    KT2440 glucose/gluconate/ribose growth conditions?
suggested_experiments:
- description: Construct a targeted deletion and complemented strain, then measure growth and pathway
    intermediates on glucose, gluconate, ribose, and related sugar-acid substrates.
  experiment_type: growth phenotype and metabolomics
- description: Purify the protein or relevant subunit complex and measure activity with the annotated
    substrate/cofactor set to resolve substrate specificity.
