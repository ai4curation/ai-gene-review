  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: Thioredoxin reductase of Pseudomonas putida KT2440 (PP_0786). TrxB is a soluble pyridine
  nucleotide-disulfide oxidoreductase that uses NADPH to reduce oxidized thioredoxin, supporting intracellular
  thiol-redox maintenance. It is included in the KEGG pentose phosphate map because NADPH production/consumption
  connects PPP redox output to antioxidant systems, but TrxB is not itself a pentose phosphate pathway
  enzyme.
