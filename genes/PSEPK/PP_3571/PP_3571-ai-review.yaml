id: Q88GZ4
gene_symbol: PP_3571
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: >-
  PP_3571 (Q88GZ4) encodes an uncharacterized M20A-family metallohydrolase
  predicted to deacylate an N-acylated amino acid. Its physiological substrate
  is unresolved and could fall among acetylornithine, N-acetylcitrulline,
  succinyldiaminopimelate, or a related metabolite. A direct role in L-arginine
  biosynthesis has not been established.
existing_annotations:
- term:
    id: GO:0006526
    label: L-arginine biosynthetic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: involved_in
  review:
    summary: A role in L-arginine biosynthesis is plausible but not established for PP_3571.
    action: UNDECIDED
    reason: >-
      The annotation is propagated from a broad M20A/ArgE-like family without
      direct KT2440 evidence. The same PANTHER subfamily contains proteins with
      DapE and N-acetylcitrulline-deacetylase assignments, and PP_3571 is not in
      an arginine-biosynthesis gene neighborhood.
    supported_by:
    - reference_id: file:PSEPK/PP_3571/PP_3571-deep-research-openscientist.md
      supporting_text: >-
        However, the specific-substrate assignment of "acetylornithine
        deacetylase" for PP_3571 is a homology inference with no experimental
        characterization of this particular protein.
- term:
    id: GO:0008777
    label: acetylornithine deacetylase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000118
  qualifier: enables
  review:
    summary: Acetylornithine is one plausible substrate, but the substrate-specific activity cannot be resolved from current evidence.
    action: UNDECIDED
    reason: >-
      TIGR01892 and IPR010169 support an ArgE-like enzyme, but Q88GZ4 lacks an
      ArgE HAMAP assignment and its PAINT/PANTHER branch spans multiple M20A
      substrate classes.
    supported_by:
    - reference_id: file:PSEPK/PP_3571/PP_3571-deep-research-openscientist.md
      supporting_text: >-
        However, the specific-substrate assignment of "acetylornithine
        deacetylase" for PP_3571 is a homology inference with no experimental
        characterization of this particular protein.
- term:
    id: GO:0016787
    label: hydrolase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: The M20A peptidase fold supports metal-dependent amide-bond hydrolysis.
    action: KEEP_AS_NON_CORE
    reason: This broad chemistry remains credible even though the physiological substrate is unresolved.
- term:
    id: GO:0019213
    label: deacetylase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: The protein is likely an N-acyl-amino-acid hydrolase, but acetyl-group specificity is unresolved.
    action: UNDECIDED
    reason: >-
      ArgE-like signals support deacetylation, whereas the same PANTHER branch
      also contains succinyl-amino-acid hydrolases. Current evidence does not
      distinguish acetyl from succinyl chemistry for Q88GZ4.
