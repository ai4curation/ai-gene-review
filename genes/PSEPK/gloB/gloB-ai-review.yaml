description: gloB encodes glyoxalase II (hydroxyacylglutathione hydrolase; EC 3.1.2.6), a metallo-beta-lactamase superfamily
  hydrolase in methylglyoxal detoxification. It hydrolyzes S-lactoylglutathione to regenerate glutathione and produce D-lactate
  downstream of GloA.
