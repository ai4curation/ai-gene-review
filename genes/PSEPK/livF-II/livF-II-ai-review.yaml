description: livF-II (PP_4863) encodes a predicted ATP-binding energy-coupling subunit of the PP_4863-PP_4867 Bra/Liv high-affinity branched-chain amino-acid ABC uptake system. Its ABC ATPase domain supports ATP hydrolysis-driven transport with BraF, BraE, BraD, and the BraC-like periplasmic substrate-binding component PP_4867.
