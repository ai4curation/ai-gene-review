- id: file:PSEPK/ubiH/ubiH-uniprot.txt
  title: UniProt entry Q88CI2 for ubiH
  findings:
  - statement: >-
      The unreviewed record assigns a UbiH-family FAD-dependent hydroxylase in
      ubiquinone biosynthesis.
- id: file:PSEPK/ubiH/ubiH-goa.tsv
  title: QuickGO GOA annotations for ubiH
  findings:
  - statement: The fetched GOA table contains the six annotations reviewed here.
- id: PMID:23709220
  title: "ubiI, a new gene in Escherichia coli coenzyme Q biosynthesis, is involved in aerobic C5-hydroxylation."
  findings:
  - statement: >-
      Structural and mutagenesis evidence for the paralogous E. coli UbiI
      establishes the PHBH-like FAD-binding architecture shared by bacterial
      ubiquinone hydroxylases; it does not directly establish PP_5199
      regioselectivity.
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: >-
      PubMed-cached abstract verified; used for family structural context, not
      as a direct UbiH or PP_5199 assay.
- id: file:PSEPK/ubiH/ubiH-deep-research-openscientist.md
  title: OpenScientist functional review of PSEPK ubiH
  findings:
  - statement: >-
      Family/domain assignment and sequence similarity support an aerobic
      UbiH-like hydroxylase. Exact regioselectivity and nonaprenyl substrate use
      remain untested in PP_5199. The report's genomic-context claims are not
      used because it misassigns PP_5197 as ubiV, PP_5317 as ubiX, and PP_5013
      as ubiC.
core_functions:
- description: >-
    Inferred UbiH-family FAD-dependent hydroxylation of a methoxy-substituted
    polyprenylphenol intermediate during aerobic ubiquinone biosynthesis. The
    exact reaction and regioselectivity are transferred from ortholog/family
    evidence and have not been assayed in PP_5199.
  molecular_function:
    id: GO:0008681
    label: 2-octaprenyl-6-methoxyphenol hydroxylase activity
  directly_involved_in:
  - id: GO:0006744
    label: ubiquinone biosynthetic process
  supported_by:
  - reference_id: file:PSEPK/ubiH/ubiH-uniprot.txt
    supporting_text: 2-octaprenyl-6-methoxyphenol hydroxylase activity
  - reference_id: file:PSEPK/ubiH/ubiH-deep-research-openscientist.md
    supporting_text: >-
      No published kinetic constants (Km, kcat), substrate-range data, or
      in-vitro reconstitution exist specifically
proposed_new_terms: []
suggested_questions:
- question: >-
    Does PP_5199 retain the exact UbiH regioselectivity and prefer the expected
    nonaprenyl P. putida intermediate over shorter polyprenyl substrates?
suggested_experiments:
- description: >-
    Delete and complement PP_5199 in P. putida, profile accumulated pathway
    intermediates, and assay purified Q88CI2 with FAD, oxygen, reductant, and
    defined polyprenyl-methoxyphenol substrates.
