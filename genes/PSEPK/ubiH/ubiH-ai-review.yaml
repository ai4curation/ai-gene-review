id: Q88CI2
gene_symbol: ubiH
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: >-
  ubiH encodes a UbiH/Coq6-family FAD-binding monooxygenase predicted to
  catalyze hydroxylation of a methoxy-polyprenylphenol intermediate in
  ubiquinone biosynthesis. In the PSEPK ppu00130 context, it represents a core
  aromatic-ring hydroxylation step, distinct from generic quinone reductase
  enzymes in the same broad KEGG map.
existing_annotations:
- term:
    id: GO:0003824
    label: catalytic activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000117
  qualifier: enables
  review:
    summary: >-
      Catalytic activity is true but too broad for a UbiH-family hydroxylase.
    action: MODIFY
    reason: >-
      The existing GOA includes the more informative
      2-octaprenyl-6-methoxyphenol hydroxylase term.
    proposed_replacement_terms:
    - id: GO:0008681
      label: 2-octaprenyl-6-methoxyphenol hydroxylase activity
- term:
    id: GO:0006744
    label: ubiquinone biosynthetic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: involved_in
  review:
    summary: >-
      UbiH-family hydroxylation is a core ubiquinone biosynthesis step.
    action: ACCEPT
    reason: >-
      UniProt places Q88CI2 in UniPathway/GO ubiquinone biosynthesis and the
      protein name/family support UbiH-like hydroxylation.
- term:
    id: GO:0008681
    label: 2-octaprenyl-6-methoxyphenol hydroxylase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: >-
      This is the substrate-resolved UbiH hydroxylase activity supported by the
      InterPro/PANTHER and UniPathway annotations.
    action: ACCEPT
    reason: >-
      The Q88CI2 record is named 2-octaprenyl-6-methoxyphenyl hydroxylase and
      carries the matching GO term.
- term:
    id: GO:0016705
    label: oxidoreductase activity, acting on paired donors, with incorporation or
      reduction of molecular oxygen
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: >-
      This parent oxidoreductase term is consistent with monooxygenase
      chemistry but less informative than the UbiH-specific term.
    action: MODIFY
    reason: >-
      Replace the broad oxygenase parent with GO:0008681, which captures the
      pathway substrate.
    proposed_replacement_terms:
    - id: GO:0008681
      label: 2-octaprenyl-6-methoxyphenol hydroxylase activity
- term:
    id: GO:0050660
    label: flavin adenine dinucleotide binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: >-
      FAD binding is consistent with the UbiH/Coq6 monooxygenase family.
    action: KEEP_AS_NON_CORE
    reason: >-
      Cofactor binding supports the enzyme mechanism but is not the core
      pathway function.
- term:
    id: GO:0071949
    label: FAD binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: >-
      FAD binding is consistent with the UniProt feature and domain annotation.
    action: KEEP_AS_NON_CORE
    reason: >-
      This duplicates the cofactor-binding interpretation and should be treated
      as non-core relative to the hydroxylase activity.
