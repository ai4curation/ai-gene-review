id: Q88CI2
gene_symbol: ubiH
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: >-
  ubiH encodes a predicted FAD-dependent monooxygenase that hydroxylates a
  methoxy-substituted polyprenylphenol intermediate during aerobic ubiquinone
  biosynthesis. It supplies one of three complementary ring hydroxylations in
  the Pseudomonas putida KT2440 pathway.
existing_annotations:
- term:
    id: GO:0003824
    label: catalytic activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000117
  qualifier: enables
  review:
    summary: Generic catalytic activity is correct but uninformative beside the exact hydroxylase term.
    action: MARK_AS_OVER_ANNOTATED
    reason: GO:0008681 captures the substrate-specific UbiH activity.
- term:
    id: GO:0006744
    label: ubiquinone biosynthetic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: involved_in
  review:
    summary: Ubiquinone biosynthesis is the core biological process for UbiH.
    action: ACCEPT
    reason: Orthology and pathway context assign UbiH to an aerobic ring-hydroxylation step.
    supported_by:
    - reference_id: file:PSEPK/ubiH/ubiH-uniprot.txt
      supporting_text: ubiquinone biosynthesis
- term:
    id: GO:0008681
    label: 2-octaprenyl-6-methoxyphenol hydroxylase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: This is the substrate-specific core molecular function of UbiH.
    action: ACCEPT
    reason: >-
      The UbiH-specific InterPro and NCBIfam assignments support this reaction.
      The GO term uses the historically characterized octaprenyl substrate;
      KT2440 is expected to use the corresponding longer-chain intermediate.
    supported_by:
    - reference_id: file:PSEPK/ubiH/ubiH-uniprot.txt
      supporting_text: 2-octaprenyl-6-methoxyphenol hydroxylase activity
- term:
    id: GO:0016705
    label: oxidoreductase activity, acting on paired donors, with incorporation or
      reduction of molecular oxygen
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: This oxygen-incorporating oxidoreductase parent is redundant with the exact UbiH term.
    action: MARK_AS_OVER_ANNOTATED
    reason: GO:0008681 more precisely identifies the substrate and reaction.
- term:
    id: GO:0050660
    label: flavin adenine dinucleotide binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: FAD binding is compatible with UbiH but broad and duplicated by GO:0071949.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      The exact hydroxylase activity captures the catalytic role, and both
      near-duplicate FAD-binding annotations are unnecessary.
- term:
    id: GO:0071949
    label: FAD binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: FAD binding is compatible with UbiH but broad and duplicated by GO:0050660.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      The exact hydroxylase activity captures the catalytic role, and both
      near-duplicate FAD-binding annotations are unnecessary.
