id: Q88DC5
gene_symbol: orn
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: orn encodes oligoribonuclease, a cytoplasmic 3'-to-5' exoribonuclease
  specific for small oligoribonucleotides. It participates in RNA turnover by
  degrading short RNA fragments that remain after upstream endoribonuclease and
  exonuclease processing.
existing_annotations:
- term:
    id: GO:0000175
    label: 3'-5'-RNA exonuclease activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: Accepted as a core molecular function for oligoribonuclease.
    action: ACCEPT
    reason: UniProt describes Orn as a 3'-to-5' exoribonuclease specific for small oligoribonucleotides, and the InterPro-backed GOA term captures that activity directly.
    supported_by:
    - reference_id: file:PSEPK/orn/orn-goa.tsv
      supporting_text: "GO:0000175\t3'-5'-RNA exonuclease activity"
    - reference_id: file:PSEPK/orn/orn-uniprot.txt
      supporting_text: 3'-to-5' exoribonuclease specific for small
    - reference_id: file:PSEPK/orn/orn-deep-research-asta.md
      supporting_text: 'uniprot_accession: Q88DC5'
- term:
    id: GO:0003676
    label: nucleic acid binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: Generic nucleic-acid binding is over-broad relative to the specific oligoribonuclease activity.
    action: MARK_AS_OVER_ANNOTATED
    reason: The protein acts on small oligoribonucleotide substrates, but the binding parent term is much less informative than the accepted RNA exonuclease activities.
    supported_by:
    - reference_id: file:PSEPK/orn/orn-goa.tsv
      supporting_text: "GO:0003676\tnucleic acid binding"
- term:
    id: GO:0004527
    label: exonuclease activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000117
  qualifier: enables
  review:
    summary: The broad exonuclease activity term should be replaced by RNA-specific exonuclease terms.
    action: MODIFY
    reason: Orn is an RNA exonuclease rather than a generic DNA/RNA exonuclease; GOA already includes the more specific 3'-5'-RNA exonuclease and RNA exonuclease terms.
    proposed_replacement_terms:
    - id: GO:0000175
      label: 3'-5'-RNA exonuclease activity
    - id: GO:0016896
      label: RNA exonuclease activity, producing 5'-phosphomonoesters
    supported_by:
    - reference_id: file:PSEPK/orn/orn-goa.tsv
      supporting_text: "GO:0004527\texonuclease activity"
- term:
    id: GO:0005737
    label: cytoplasm
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: located_in
  review:
    summary: Accepted cytoplasmic localization for a soluble bacterial RNA-turnover enzyme.
    action: ACCEPT
    reason: UniProt records cytoplasmic localization, consistent with oligoribonucleotide turnover in the bacterial cytoplasm.
    supported_by:
    - reference_id: file:PSEPK/orn/orn-goa.tsv
      supporting_text: "GO:0005737\tcytoplasm"
    - reference_id: file:PSEPK/orn/orn-uniprot.txt
      supporting_text: 'SUBCELLULAR LOCATION: Cytoplasm'
- term:
    id: GO:0016070
    label: RNA metabolic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000117
  qualifier: involved_in
  review:
    summary: RNA metabolic process is valid broad process context for oligoribonuclease, but not as informative as the molecular function.
    action: KEEP_AS_NON_CORE
    reason: Orn participates in RNA turnover by degrading small oligoribonucleotides, but this broad process term is secondary to the specific exonuclease activity.
    supported_by:
    - reference_id: file:PSEPK/orn/orn-goa.tsv
      supporting_text: "GO:0016070\tRNA metabolic process"
- term:
    id: GO:0016896
    label: RNA exonuclease activity, producing 5'-phosphomonoesters
  evidence_type: IEA
  original_reference_id: GO_REF:0000104
  qualifier: enables
  review:
    summary: Accepted as a core RNA exonuclease activity for oligoribonuclease.
    action: ACCEPT
    reason: This RNA-exonuclease term matches the UniRule-backed identity of Orn as a 3'-to-5' oligoribonuclease.
    supported_by:
    - reference_id: file:PSEPK/orn/orn-goa.tsv
      supporting_text: "GO:0016896\tRNA exonuclease activity, producing 5'-phosphomonoesters"
    - reference_id: file:PSEPK/orn/orn-uniprot.txt
      supporting_text: 3'-to-5' exoribonuclease specific for small
