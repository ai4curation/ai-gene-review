  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: PP_1198 encodes a predicted Transcriptional regulator, Cro/CI family (HigA antitoxin like) in Pseudomonas putida
  KT2440. The local UniProt and Asta records support a Cro/C1-type HTH regulator with antitoxin-family context where present.
  This first pass curates a generic DNA-binding transcription-regulator role while leaving the paired toxin, target operator,
  and stress signal unresolved.
