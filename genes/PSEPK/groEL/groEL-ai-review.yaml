suggested_questions:
- question: Which P. putida KT2440 proteins are obligate or stringent GroEL-GroES clients, and does the client set differ
    from that of E. coli given KT2440's distinct metabolic repertoire?
suggested_experiments:
- description: Conditional depletion or temperature-sensitive groEL alleles in KT2440 combined with quantitative proteomics/aggregation
    profiling to define the in vivo obligate substrate set under normal and solvent/heat stress conditions.
