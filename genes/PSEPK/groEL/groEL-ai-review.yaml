    label: ATP binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: GroEL binds and hydrolyzes ATP at its equatorial domains to drive the
      folding cycle; the UniProt record annotates multiple ATP-binding residues.
    action: ACCEPT
    reason: ATP binding is a well-established, conserved molecular function of GroEL
      and is directly supported by structural and biochemical evidence across the
      chaperonin family.
- term:
    id: GO:0005737
    label: cytoplasm
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: located_in
  review:
    summary: GroEL is a soluble cytoplasmic chaperonin; in situ cryo-electron tomography
      has directly visualized GroEL-GroES complexes inside bacterial cells.
    action: ACCEPT
    reason: Cytoplasmic localization is correct and well supported for bacterial GroEL.
- term:
    id: GO:0006457
    label: protein folding
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: involved_in
  review:
    summary: Assisting protein folding is the core biological process of GroEL, which
      encapsulates non-native substrates and provides an environment optimized to
      promote folding.
    action: ACCEPT
    reason: Directly captures the central biological role of the chaperonin and is
      consistent with the UniProt FUNCTION annotation and extensive literature.
- term:
    id: GO:0042026
    label: protein refolding
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: involved_in
  review:
    summary: GroEL refolds stress-denatured proteins; in P. putida it is induced under
      heat, solvent, and pressure stress as part of the RpoH regulon to restore proteostasis.
    action: ACCEPT
    reason: Protein refolding is an accurate and more specific aspect of GroEL function,
      complementing the broader protein folding term.
- term:
    id: GO:0140662
    label: ATP-dependent protein folding chaperone
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: GroEL is the prototypical ATP-dependent (chaperonin) folding machine,
      coupling ATP binding/hydrolysis to substrate encapsulation and folding with
      its co-chaperonin GroES.
    action: ACCEPT
    reason: This is the most precise molecular function term for GroEL and is strongly
      supported; it represents a core function of the gene.
core_functions:
- description: ATP-dependent chaperonin that mediates the folding and refolding of
    non-native cytosolic polypeptides, preventing aggregation, by encapsulating substrates
    in the GroEL-GroES nano-cage and coupling folding to an ATP-driven allosteric
    cycle.
  supported_by:
  - reference_id: GO_REF:0000002
    supporting_text: GroEL annotated as ATP-dependent protein folding chaperone and
      involved in protein folding via InterPro Cpn60/GroEL records.
  - reference_id: PMID:39169181
    supporting_text: GroEL forms a double-ring tetradecamer; apical domains bind non-native
      substrates and equatorial domains bind/hydrolyze ATP, with GroES capping to
      form a protected folding chamber in the cytosol.
    full_text_unavailable: true
  molecular_function:
    id: GO:0140662
    label: ATP-dependent protein folding chaperone
  directly_involved_in:
    id: GO:0006457
    label: protein folding
proposed_new_terms: []
suggested_questions:
- question: Which P. putida KT2440 proteins are obligate or stringent GroEL-GroES
    clients, and does the client set differ from that of E. coli given KT2440's distinct
    metabolic repertoire?
suggested_experiments:
- description: Conditional depletion or temperature-sensitive groEL alleles in KT2440
    combined with quantitative proteomics/aggregation profiling to define the in vivo
    obligate substrate set under normal and solvent/heat stress conditions.
