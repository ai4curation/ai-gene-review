  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: GroEL (Cpn60/Hsp60; locus PP_1361) is the Group I bacterial chaperonin of Pseudomonas putida KT2440. It is an
  ~800 kDa cytoplasmic complex assembled from two stacked heptameric rings (a tetradecamer) that, together with its co-chaperonin
  GroES (PP_1360, a heptameric lid), forms the GroEL-GroES folding machine. GroEL binds non-native polypeptides via hydrophobic
  surfaces in its apical domains and hydrolyzes ATP at its equatorial domains; ATP and GroES binding enclose the substrate
  in a hydrophilic nano-cage that promotes productive folding, after which the folded product is released through an ATP-driven
  allosteric cycle. It assists the folding and refolding of newly synthesized and stress-denatured cytosolic proteins, preventing
  aggregation and supporting recovery from proteotoxic stress. In P. putida the groESL operon is part of the RpoH (sigma-32)
  heat-shock regulon and is induced by heat, solvent/aromatic exposure, and elevated pressure/oxygen, reflecting its central
  role in maintaining proteostasis. EC 5.6.1.7.
