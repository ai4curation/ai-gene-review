    label: mRNA 3'-UTR binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000117
  qualifier: enables
  review:
    summary: ARBA machine-learning prediction of an RNA-binding moonlighting function, not supported by organism-specific evidence.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      This electronic ARBA prediction transfers an apo-aconitase moonlighting
      function demonstrated in other bacteria. No transcript-binding or
      post-transcriptional-regulation evidence was found for Q88KF1 in
      P. putida, so the term should not be treated as established for this
      target.
    supported_by:
    - reference_id: file:PSEPK/acnB/acnB-deep-research-openscientist.md
      supporting_text: >-
        Whether *P. putida* AcnB binds specific transcripts, and which ones,
        has not been established
