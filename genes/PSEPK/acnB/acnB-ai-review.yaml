id: Q88KF1
gene_symbol: acnB
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: >-
  AcnB is a [4Fe-4S]-dependent aconitate hydratase of Pseudomonas putida
  KT2440. It reversibly isomerizes citrate and isocitrate in the
  tricarboxylic-acid cycle and also catalyzes the interconversion of
  2-methyl-cis-aconitate and 2-methylisocitrate in propionate catabolism
  through the methylcitrate cycle.
existing_annotations:
