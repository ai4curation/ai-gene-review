- id: PMID:11294638
  title: 'In vitro conversion of propionate to pyruvate by Salmonella enterica enzymes:
    2-methylcitrate dehydratase (PrpD) and aconitase Enzymes catalyze the conversion
    of 2-methylcitrate to 2-methylisocitrate.'
  findings:
