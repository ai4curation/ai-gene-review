      activity and catalyzed the conversion of 2-methyl-cis-aconitate into
      2-methylisocitrate
    reference_section_type: ABSTRACT
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified primary biochemical study of the Salmonella ortholog;
      the cached record is abstract-only but reports the AcnB reaction
      directly.
- id: file:PSEPK/acnB/acnB-deep-research-openscientist.md
  title: OpenScientist functional-annotation report for PSEPK acnB
  findings:
  - statement: The report identifies the methylcitrate-cycle AcnB reaction.
    supporting_text: >-
      AcnB catalyzes the hydration of **2-methyl-*cis*-aconitate to
      2-methylisocitrate** (EC 4.2.1.99)
    reference_section_type: RESULTS
  - statement: The report records the lack of P. putida-specific RNA-binding evidence.
    supporting_text: >-
      Whether *P. putida* AcnB binds specific transcripts, and which ones, has
      not been established
    reference_section_type: DISCUSSION
  reference_review:
