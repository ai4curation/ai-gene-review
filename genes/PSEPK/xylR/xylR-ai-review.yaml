core_functions:
- description: XylR is an aromatic-effector-responsive enhancer-binding transcription
    activator on TOL plasmid pWW0. In response to aromatic inducers and ATP, it multimerizes
    at upstream activating sequences and activates the sigma54-dependent Pu and Ps promoters,
    initiating expression of the upper xyl operon and xylS for toluene and xylene catabolism.
  molecular_function:
