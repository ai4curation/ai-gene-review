id: P06519
gene_symbol: xylR
product_type: PROTEIN
aliases:
- 67 kDa protein
status: COMPLETE
taxon:
  id: NCBITaxon:303
  label: Pseudomonas putida
description: xylR encodes the plasmid-borne TOL transcriptional regulator XylR, a 566 aa
  NtrC-like enhancer-binding activator that senses aromatic effectors and uses ATP-dependent
  multimerization plus sequence-specific DNA binding to activate the sigma54-dependent
  Pu and Ps promoters of the xyl upper-pathway system and the downstream xylS regulator.
  The curated reviewed accession (P06519) belongs to the pWW0 system in the Pseudomonas
  putida mt-2 lineage (taxon 303), not the native KT2440 chromosome; this PSEPK folder
  should therefore be interpreted as a KT2440/pWW0-context review rather than a chromosomal
  KT2440 gene review.
existing_annotations:
- term:
    id: GO:0005524
    label: ATP binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: ATP binding is mechanistically credible for XylR because the protein contains
      the canonical AAA+/sigma54 activator core and UniProt annotates explicit ATP-binding
      residues. The 1998 promoter-switch paper further shows that ATP enhances active
      XylR multimerization at the UAS. However, ATP binding is a generic mechanistic
      property rather than the most informative description of the evolved role of this
      regulator.
    action: KEEP_AS_NON_CORE
    supported_by:
