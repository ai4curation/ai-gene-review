suggested_questions:
- question: Should this review remain in the PSEPK project bucket even though the reviewed
    accession is the plasmid-borne taxon 303 xylR protein rather than a native KT2440
    chromosomal gene?
- question: Do GO curators want a separate annotation strategy for XylR-mediated autorepression
    of Pr, or is capturing the dominant positive activation of Pu/Ps sufficient?
suggested_experiments:
- hypothesis: Aromatic effector binding and ATP-dependent multimerization jointly determine
    XylR promoter selectivity and output strength.
  description: Compare WT XylR and ATP-site mutants in KT2440(pWW0) or mini-TOL reporter
    strains across toluene, m-xylene, benzyl alcohol, and m-methylbenzyl alcohol and
    measure Pu, Ps, and Pr outputs.
  experiment_type: reporter assay
- hypothesis: XylR directly occupies the known UAS elements at the divergent Pr/Ps control
    region in an effector-dependent manner.
  description: Perform ChIP-qPCR or DAP-seq for XylR with and without aromatic inducer
    and test occupancy at Pu/Ps/Pr plus additional candidate TOL control regions.
  experiment_type: DNA binding assay
- hypothesis: Global catabolite repression acts both upstream and downstream of XylR.
  description: Measure TOL promoter activity and XylR protein levels in WT, crc, ptsN,
    and crc ptsN backgrounds carrying pWW0 during growth on preferred versus non-preferred
    carbon sources.
  experiment_type: genetic perturbation
