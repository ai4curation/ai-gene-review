      acts in a positive manner on xyl operons for degradation of toluene and xylenes
      in Pseudomonas putida.
  - reference_id: PMID:9489676
    supporting_text: The mechanism by which XylR, the toluene-responsive activator
      of the sigma54-dependent Pu and Ps promoters of the Pseudomonas TOL plasmid
      pWW0, downregulates its own sigma70 promoter Prhas been examined.
- description: XylR uses a C-terminal DNA-binding region to recognize promoter-proximal
    upstream activating sequences and to implement the Pr/Ps transcriptional switch
    that controls TOL pathway output.
