    label: regulation of DNA-templated transcription
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: This annotation captures the right general process class but is too broad.
      XylR is primarily a positive activator of the sigma54-dependent Pu and Ps promoters
      of the TOL system, although activated XylR also contributes to repression of the
      divergent Pr promoter. The more specific child term positive regulation of DNA-templated
      transcription better reflects the main curatable biology.
