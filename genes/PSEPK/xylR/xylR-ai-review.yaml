references:
- id: GO_REF:0000002
  title: Gene Ontology annotation through association of InterPro records with GO terms.
  findings:
  - statement: InterPro captures the sigma54 activator and DNA-binding domains of XylR
      but only yields broad seed annotations.
- id: PMID:2993247
  title: Determination of the transcription initiation site and identification of the protein
    product of the regulatory gene xylR for xyl operons on the TOL plasmid.
  findings:
  - statement: xylR acts positively on xyl operons for degradation of toluene and xylenes.
    supporting_text: The xylR gene is a regulatory gene on the TOL plasmid, which acts
      in a positive manner on xyl operons for degradation of toluene and xylenes in
      Pseudomonas putida.
  - statement: xylR transcription has two mapped start sites and is inducer-independent
      at the promoter level.
    supporting_text: Two initiation sites were detected which were identical in both
      P. putida and E. coli. The amounts of mRNA synthesized in both bacterial cells
      were almost the same and independent of the inducers for xyl operons.
  - statement: The xylR product is an approximately 67 kDa protein.
    supporting_text: The product of the xylR gene was identified by the maxicell system
      as a protein with an approximate molecular weight of 67,000.
- id: PMID:3169574
  title: Nucleotide sequence of the regulatory gene xylR of the TOL plasmid from Pseudomonas
    putida.
  findings:
  - statement: xylR encodes a 566 aa transcriptional activator for the aromatic-hydrocarbon
      degradative pathway.
    supporting_text: The 1698-bp sequence for a 566-amino acid (aa) protein (Mr 63741)
      was identified as the XylR-encoding sequence.
  - statement: The central region corresponds to the sigma-factor interaction region.
    supporting_text: The central region of XylR (aa 234-473) corresponds to the region
      that was proposed to interact with RNA polymerase having a sigma factor, NtrA
  - statement: The C-terminal region contains a putative DNA-binding structure.
    supporting_text: The C-terminal region (aa 515-558) has a putative DNA-binding structure.
- id: PMID:2430049
  title: Genetic, functional and sequence analysis of the xylR and xylS regulatory genes
    of the TOL plasmid pWW0.
  findings:
  - statement: xylR is one of the core regulatory genes of the TOL plasmid pWW0 system.
    supporting_text: Insertion mutations of the xylR and xylS regulatory genes of the
      catabolic pathway have been isolated and characterized
  - statement: Tn5 mutagenesis and functional analysis linked xylR to catechol 2,3-oxygenase
      induction.
    supporting_text: their ability to induce catechol 2,3-oxygenase activity determined.
- id: PMID:9489676
  title: Activation of the toluene-responsive regulator XylR causes a transcriptional
    switch between sigma54 and sigma70 promoters at the divergent Pr/Ps region of the
    TOL plasmid.
  findings:
  - statement: Activated XylR is a toluene-responsive regulator of the sigma54-dependent
      Pu and Ps promoters.
    supporting_text: The mechanism by which XylR, the toluene-responsive activator of
      the sigma54-dependent Pu and Ps promoters of the Pseudomonas TOL plasmid pWW0,
      downregulates its own sigma70 promoter Prhas been examined.
  - statement: ATP promotes multimerization at the UAS and contributes to the Pr/Ps
      transcriptional switch.
    supporting_text: The addition of ATP, known to trigger multimerization of the regulator
      at the UAS, enhanced the repression of Pr by XylR
- id: PMID:20529863
  title: The Crc global regulator inhibits the Pseudomonas putida pWW0 toluene/xylene
    assimilation pathway by repressing the translation of regulatory and structural genes.
  findings:
  - statement: Crc represses the TOL pathway partly by binding the translation-initiation
      regions of xylR and xylS mRNAs.
    supporting_text: This study reports that Crc binds to sites located at the translation
      initiation regions of the mRNAs coding for XylR and XylS
  - statement: XylR sits within a larger catabolite-repression hierarchy rather than
      acting alone.
    supporting_text: First, Crc inhibits the translation of the XylR and XylS regulators,
      thereby reducing the transcription of all TOL pathway genes.
- id: PMID:16085802
  title: Integration of signals through Crc and PtsN in catabolite repression of Pseudomonas
    putida TOL plasmid pWW0.
  findings:
  - statement: The pWW0 system has been studied in a KT2440 host background.
    supporting_text: Toluene degradation in Pseudomonas putida KT2440 pWW0 plasmid is
      subjected to catabolite repression.
  - statement: Global regulation through Crc and PtsN modulates XylR-dependent promoter
      output.
    supporting_text: Pu and P(S1) promoters of the pWW0 TOL plasmid are down-regulated
      in vivo during exponential growth in rich medium.
