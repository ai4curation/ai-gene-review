description: PP_4137 encodes a TonB-dependent outer-membrane receptor in the ferric siderophore receptor class (Outer membrane
  siderophore receptor). The protein is predicted to mediate energy-dependent uptake of an iron-loaded siderophore or related
  ferric complex across the outer membrane through its TonB-dependent beta-barrel/plug receptor architecture.
