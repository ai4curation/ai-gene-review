- term:
    id: GO:0071513
    label: phosphopantothenoylcysteine decarboxylase complex
  evidence_type: IEA
  original_reference_id: GO_REF:0000118
  qualifier: part_of
  review:
    summary: The oligomeric CoaBC assembly is a phosphopantothenoylcysteine decarboxylase complex.
    action: ACCEPT
    reason: >-
      GO:0071513 is defined by the complex's decarboxylase reaction rather than
      a fixed subunit architecture. Full-length bacterial CoaBC family members
      form oligomeric complexes whose CoaC regions catalyze this reaction;
      direct structural work shows a dodecameric fused CoaBC assembly.
