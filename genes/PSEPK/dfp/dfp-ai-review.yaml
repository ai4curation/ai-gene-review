  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: Generic catalytic activity should be replaced by both specific CoaBC reactions.
    action: MODIFY
    reason: >-
      Q88C96 contains distinct CoaB ligase and CoaC decarboxylase regions, and
      both exact molecular-function terms are already supported independently
      in GOA. The parent catalytic-activity term is true but uninformative.
    proposed_replacement_terms:
