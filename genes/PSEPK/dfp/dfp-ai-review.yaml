- id: PMID:33420031
  title: Inhibiting Mycobacterium tuberculosis CoaBC by targeting an allosteric site.
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified full-length CoaBC structural and biochemical study in
      mycobacteria. It establishes the fused two-reaction architecture and
      oligomeric complex but does not directly assay Q88C96.
  findings:
  - statement: >-
      In most prokaryotes a single fused CoaBC protein performs reactions 2 and
      3 of CoA biosynthesis and assembles as an oligomeric complex.
    supporting_text: "the second and third steps being catalysed in the vast majority of prokaryotes"
- id: PMID:11278255
  title: Phosphopantothenoylcysteine synthetase from Escherichia coli. Identification and characterization of the last unidentified coenzyme A biosynthetic enzyme in bacteria.
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified foundational biochemical evidence that bacterial Dfp is
      bifunctional CoaBC and that its ligase region uses CTP rather than ATP.
      The experiment used E. coli Dfp, not Q88C96.
  findings:
  - statement: >-
      E. coli Dfp combines phosphopantothenoylcysteine decarboxylase with a
      CTP-dependent phosphopantothenoylcysteine synthetase activity.
    supporting_text: "the protein encoded by the dfp gene, here renamed coaBC, also has phosphopantothenoylcysteine synthetase activity, using CTP rather than ATP"
