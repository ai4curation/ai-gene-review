id: Q88C96
gene_symbol: dfp
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: >-
  dfp (PP_5285), also called coaBC, encodes a bifunctional bacterial coenzyme A
  biosynthesis enzyme. Its C-terminal CoaB region uses CTP to ligate cysteine
  to 4'-phosphopantothenate, and its N-terminal FMN-dependent CoaC region then
  decarboxylates phosphopantothenoylcysteine to 4'-phosphopantetheine. Q88C96
  therefore performs reactions 2 and 3 of the five-reaction conversion of
  pantothenate to CoA. Its sequence has the expected fused CoaC-CoaB domain
  architecture, although direct KT2440 enzyme assays have not been reported.
