      The report supports the bifunctional domain assignment and CTP/FMN
      reaction chemistry, while finding no direct KT2440 enzymology. Claims
      about essentiality, oligomeric state, and feedback regulation remain
      ortholog-based and are not promoted into Q88C96 core functions.
    supporting_text: "No *P. putida* KT2440-specific enzymological study was located"
- id: file:projects/P_PUTIDA/deep-research/PSEPK__coenzyme_a_biosynthesis__ppu00770-deep-research-openscientist.md
  title: OpenScientist pathway research for PSEPK pantothenate and CoA biosynthesis
