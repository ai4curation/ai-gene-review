  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: PP_3559 encodes a predicted multi-pass membrane permease of a glycine betaine ABC transporter. Its product name, MetI-like ABC transmembrane domain, plasma membrane localization, and adjacent PP_3558 OpuAC-family binding component support a compatible-solute importer role, with the ATPase partner unresolved in the immediate two-gene locus.
