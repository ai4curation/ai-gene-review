    summary: oxidoreductase activity, acting on the aldehyde or oxo group of donors, NAD or NADP as acceptor captures the broad idea but is less precise than glyceraldehyde-3-phosphate dehydrogenase (NAD+) (phosphorylating) activity for this protein.
