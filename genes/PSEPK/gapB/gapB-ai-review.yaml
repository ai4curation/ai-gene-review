  review:
    summary: NADP binding cannot be confidently ruled out for gapB. UniProt lists gapB as EC 1.2.1.- with cofactor undetermined, and P. putida is known to carry both NAD- and NADP-dependent GAPDH isoforms, so removing the propagated NADP binding annotation while keeping NAD binding could be exactly backwards.
    action: KEEP_AS_NON_CORE
    reason: Cofactor specificity is not established for this entry; retain the propagated NADP binding annotation as non-core rather than removing it.
