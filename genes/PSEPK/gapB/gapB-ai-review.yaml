description: gapB (PP_2149) encodes a type I glyceraldehyde-3-phosphate dehydrogenase family enzyme. It is predicted to catalyze the NAD+-dependent phosphorylating oxidation of D-glyceraldehyde 3-phosphate to 1,3-bisphosphoglycerate, a lower central-carbon reaction shared by glycolytic and gluconeogenic flux. It is a plausible alternate or condition-specific GAPDH relative to the already curated gapA enzyme.
