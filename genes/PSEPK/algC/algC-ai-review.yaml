  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: algC (PP_5288) encodes a bifunctional phosphomannomutase/phosphoglucomutase. It interconverts mannose 6-phosphate with mannose 1-phosphate and glucose 6-phosphate with glucose 1-phosphate, supplying sugar-phosphate precursors for GDP-mannose, lipopolysaccharide, and related cell-envelope carbohydrate biosynthesis. It is not a core ED enzyme but draws on the same hexose-phosphate pools.
