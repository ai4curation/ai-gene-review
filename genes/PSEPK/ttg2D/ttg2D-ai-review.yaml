suggested_questions:
- question: Does the PP_0958-PP_0962 Mla/Ttg2 locus operate as a canonical retrograde phospholipid transport system in P. putida KT2440, and how does the adjacent Ttg2E STAS-domain protein affect that activity?
suggested_experiments:
- description: Measure outer-membrane phospholipid asymmetry, periplasmic phospholipid binding, and solvent-envelope stress phenotypes in single and combined mutants of mlaF, mlaE, mlaD, ttg2D, and ttg2E.
  experiment_type: targeted Mla/Ttg2 phospholipid transport and envelope-stress assay
