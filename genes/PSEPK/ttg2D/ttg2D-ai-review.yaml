description: ttg2D encodes a signal-peptide-containing MlaC/Ttg2D-family protein in the PP_0958-PP_0962 Mla/Ttg2 locus. Its protein-level evidence and MlaC-family phospholipid transport annotations support a periplasmic phospholipid-binding role in the bacterial outer-membrane lipid transport system, despite the legacy product name toluene tolerance protein.
