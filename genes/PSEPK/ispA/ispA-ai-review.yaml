id: Q88QG6
gene_symbol: ispA
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: ispA encodes a type-I prenyl diphosphate synthase annotated as farnesyl diphosphate synthase. It catalyzes prenyl-chain
  elongation reactions from C5 allylic substrates to produce geranyl and farnesyl diphosphate intermediates used in bacterial
  terpenoid and isoprenoid metabolism.
