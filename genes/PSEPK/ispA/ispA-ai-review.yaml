  qualifier: involved_in
  review:
    summary: The phospholipid-biosynthesis annotation is not supported by the specific IspA product name, EC mappings, or
      domain assignment.
    action: REMOVE
    reason: IspA makes short-chain prenyl diphosphates for isoprenoid/terpenoid metabolism; phospholipid biosynthesis appears
      to be an over-propagated ARBA process annotation.
    supported_by:
    - reference_id: file:PSEPK/ispA/ispA-goa.tsv
