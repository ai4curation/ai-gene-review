id: Q88MI3
gene_symbol: dapC
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: >-
  dapC encodes the PLP-dependent N-succinyl-LL-diaminopimelate
  aminotransferase (EC 2.6.1.17) of the succinylated DAP route. It transfers an
  amino group from L-glutamate to N-succinyl-2-amino-6-oxopimelate, producing
  the substrate subsequently deprotected by DapE.
existing_annotations:
- term:
    id: GO:0009016
    label: succinyldiaminopimelate:2-oxoglutarate transaminase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: This is the defining DapC molecular function.
    action: ACCEPT
    reason: EC 2.6.1.17 and the beta/gammaproteobacterial DapC-specific family support the reaction.
    supported_by:
    - reference_id: file:PSEPK/dapC/dapC-uniprot.txt
      supporting_text: N-succinyl-L,L-diaminopimelate aminotransferase alternative
- term:
    id: GO:0009085
    label: L-lysine biosynthetic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: involved_in
  review:
    summary: DapC supplies N-succinyl-LL-diaminopimelate in L-lysine biosynthesis.
    action: ACCEPT
    reason: The DapC-specific family and pathway context place this transamination in the succinylated DAP route.
- term:
    id: GO:0030170
    label: pyridoxal phosphate binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: PLP binding is valid cofactor context for DapC.
    action: KEEP_AS_NON_CORE
    reason: The aminotransferase family requires PLP, but binding is less informative than the substrate-specific reaction.
