id: Q88GI5
gene_symbol: vanB
product_type: PROTEIN
status: DRAFT
aliases:
- PP_3737
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida KT2440
description: vanB encodes the reductase component of the VanAB two-component vanillate
  O-demethylase in Pseudomonas putida KT2440. The protein is a flavin- and 2Fe-2S-containing
  electron-transfer subunit that supplies reducing equivalents from NADH to the oxygenase
  component VanA during conversion of vanillate to protocatechuate and formaldehyde.
  The cofactor-binding calls are well supported by sequence features, whereas the
  current GOA oxidoreductase annotation is too generic and should be narrowed to a
  subunit-level redox role plus a complex-level vanillate monooxygenase annotation.
existing_annotations:
- term:
    id: GO:0016491
    label: oxidoreductase activity
  qualifier: enables
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  review:
    summary: This annotation captures the redox nature of VanB but is too generic
      for a dedicated reductase subunit in a specific aromatic O-demethylase system.
      A narrower subunit-level term is more informative.
    action: MODIFY
    reason: VanB is best described as an electron-transfer reductase subunit rather
      than by the broad parent oxidoreductase term.
    proposed_replacement_terms:
    - id: GO:0009055
      label: electron transfer activity
    supported_by:
    - reference_id: file:PSEPK/vanB/vanB-uniprot.txt
      supporting_text: 'SubName: Full=Vanillate O-demethylase oxidoreductase'
- term:
    id: GO:0051536
    label: iron-sulfur cluster binding
  qualifier: enables
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: This parent term is not wrong, but the UniProt/InterPro evidence supports
      a specific 2Fe-2S ferredoxin-type cofactor rather than an unspecified iron-sulfur
      cluster.
    action: MARK_AS_OVER_ANNOTATED
    reason: GO:0051537 captures the same feature more precisely and should be preferred
      as the core cofactor-binding annotation.
    supported_by:
    - reference_id: file:PSEPK/vanB/vanB-uniprot.txt
      supporting_text: DOMAIN          229..316 ... /note="2Fe-2S ferredoxin-type"
- term:
    id: GO:0051537
    label: 2 iron, 2 sulfur cluster binding
  qualifier: enables
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: This is the strongest existing annotation. The C-terminal ferredoxin-type
      domain and conserved cysteine motif support a bound 2Fe-2S cluster.
    action: ACCEPT
    reason: The UniProt record explicitly assigns a 2Fe-2S ferredoxin-type domain
      and corresponding InterPro/PROSITE signatures.
    supported_by:
    - reference_id: file:PSEPK/vanB/vanB-uniprot.txt
      supporting_text: DOMAIN          229..316 ... /note="2Fe-2S ferredoxin-type"
- term:
    id: GO:0018489
    label: vanillate monooxygenase activity
  qualifier: contributes_to
  evidence_type: IC
  original_reference_id: PMID:33741529
  review:
    summary: vanB should carry a curator-proposed complex-level annotation to vanillate
      monooxygenase activity. The gene product is the reductase subunit of the two-component
      VanAB enzyme, so the proper qualifier is contributes_to rather than enables.
    action: NEW
    reason: The current GOA set misses the vanillate-specific catalytic context of
      VanB. Adding the complex activity with a contributes_to qualifier is more informative
      and avoids overclaiming that VanB alone performs the full monooxygenase reaction.
    supported_by:
    - reference_id: file:PSEPK/vanB/vanB-uniprot.txt
      supporting_text: 'SubName: Full=Vanillate O-demethylase oxidoreductase'
    - reference_id: PMID:33741529
      supporting_text_fulltext: Overexpression of vanAB enabled growth on syringate
        as the sole carbon source ... syringate was found to be O-demethylated to
        gallate by VanAB, a two-component monooxygenase ... the specificity (kcat/KM)
        of VanAB for syringate was within 25% that for vanillate.
      full_text_unavailable: true
core_functions:
- description: VanB is the flavin/2Fe-2S electron-transfer subunit of the VanAB two-component
    enzyme that channels reducing equivalents from NADH to the oxygenase component
    during vanillate O-demethylation.
  molecular_function:
    id: GO:0009055
    label: electron transfer activity
  contributes_to_molecular_function:
    id: GO:0018489
    label: vanillate monooxygenase activity
  supported_by:
  - reference_id: file:PSEPK/vanB/vanB-uniprot.txt
    supporting_text: 'SubName: Full=Vanillate O-demethylase oxidoreductase'
  - reference_id: file:PSEPK/vanB/vanB-uniprot.txt
    supporting_text: 'CC   -!- COFACTOR: ... Name=FMN'
  - reference_id: file:PSEPK/vanB/vanB-uniprot.txt
    supporting_text: DOMAIN          229..316 ... /note="2Fe-2S ferredoxin-type"
  - reference_id: PMID:33741529
    supporting_text_fulltext: Overexpression of vanAB enabled growth on syringate
      as the sole carbon source ... syringate was found to be O-demethylated to gallate
      by VanAB, a two-component monooxygenase ... the specificity (kcat/KM) of VanAB
      for syringate was within 25% that for vanillate.
    full_text_unavailable: true
proposed_new_terms:
- proposed_name: vanillate catabolic process
  proposed_definition: The chemical reactions and pathways resulting in the breakdown
    of vanillate (4-hydroxy-3-methoxybenzoate), typically by O-demethylation to protocatechuate
    and formaldehyde.
  justification: GO already contains the molecular function term vanillate monooxygenase
    activity (GO:0018489) but lacks a matching biological process term for the catabolic
    step catalyzed by VanAB and related systems.
suggested_questions:
- question: Does VanB transfer electrons exclusively within the VanAB complex, or
    can it reduce free flavins or alternative oxygenases in vivo?
  experts:
  - Bacterial redox enzymologists
  - Aromatic catabolism researchers
- question: Under native KT2440 expression levels, how much VanAB activity is devoted
    to vanillate versus promiscuous substrates such as syringate or 3-O-methylgallate?
  experts:
  - Pseudomonas metabolism researchers
  - Lignin valorization groups
suggested_experiments:
- description: Reconstitute purified VanA and VanB separately and together to measure
    NADH oxidation, flavin reduction, and vanillate O-demethylation and thereby resolve
    the subunit-specific electron-transfer step.
- description: Compare vanB deletion and complementation strains on vanillate, ferulate-derived
    vanillate, and syringate co-metabolism to distinguish the physiological substrate
    range from the enzyme's broader catalytic promiscuity.
- description: Measure VanB cofactor occupancy and redox properties by UV-visible
    spectroscopy and EPR to confirm the predicted FMN and 2Fe-2S centers.
references:
- id: GO_REF:0000002
  title: Gene Ontology annotation through association of InterPro records with GO
    terms.
  findings:
  - statement: InterPro2GO supports generic redox and cofactor terms for the VanB
      reductase subunit, but the annotations need refinement to the 2Fe-2S electron-transfer
      context.
- id: GO_REF:0000120
  title: Combined Automated Annotation using Multiple IEA Methods.
  findings:
  - statement: The combined UniProt automated pipeline supplies broad oxidoreductase
      terms; curator review narrows VanB to its reductase and electron-transfer role
      in VanAB.
- id: PMID:12534463
  title: Complete genome sequence and comparative analysis of the metabolically versatile
    Pseudomonas putida KT2440.
  findings:
  - statement: Provides the genome context and original sequence source for the PP_3737
      locus in Pseudomonas putida KT2440.
- id: PMID:33741529
  title: Metabolism of Syringyl Lignin-Derived Compounds in Pseudomonas putida Enables
    Convergent Production of 2-Pyrone-4,6-Dicarboxylic Acid.
  findings:
  - statement: VanAB is a two-component monooxygenase in KT2440, and kinetic analysis
      in that study treated vanillate as a native substrate.
    full_text_unavailable: true
- id: file:PSEPK/vanB/vanB-uniprot.txt
  title: UniProt entry Q88GI5
  findings:
  - statement: UniProt names vanB/PP_3737 as vanillate O-demethylase oxidoreductase.
  - statement: The protein is predicted to bind FMN and contains a 2Fe-2S ferredoxin-type
      domain.
