description: folM (PP_4632) encodes an SDR-family dihydromonapterin reductase with predicted dihydrofolate reductase activity.
  In ppu00790 it should be treated as a pterin/folate reductase side node; folA remains the canonical dedicated dihydrofolate
  reductase for tetrahydrofolate regeneration.
