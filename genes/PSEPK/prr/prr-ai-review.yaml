taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: prr encodes a predicted aldehyde dehydrogenase-family enzyme in Pseudomonas putida KT2440 with EC-based support for aminobutyraldehyde dehydrogenase activity. It is a beta-alanine/polyamine-side aldehyde dehydrogenase node in the broad ppu00310 map, not a committed Dav lysine-catabolic enzyme on current evidence.
existing_annotations:
- term:
    id: GO:0004030
    label: aldehyde dehydrogenase [NAD(P)+] activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000117
  qualifier: enables
  review:
    summary: Aldehyde dehydrogenase [NAD(P)+] activity is a valid family-level annotation for Prr.
    action: ACCEPT
    reason: The protein belongs to the aldehyde dehydrogenase family and carries EC 1.2.1.19-derived support; this broad term is acceptable as boundary aldehyde chemistry.
    supported_by:
    - reference_id: file:PSEPK/prr/prr-goa.tsv
      supporting_text: "GO:0004030\taldehyde dehydrogenase [NAD(P)+] activity"
    - reference_id: file:PSEPK/prr/prr-uniprot.txt
      supporting_text: Belongs to the aldehyde dehydrogenase family.
    - reference_id: file:PSEPK/prr/prr-deep-research-asta.md
      supporting_text: 'uniprot_accession: Q88J48'
- term:
    id: GO:0016491
    label: oxidoreductase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: Generic oxidoreductase activity is too broad for Prr.
    action: MODIFY
    reason: Replace with aldehyde dehydrogenase [NAD(P)+] activity or the EC-specific aminobutyraldehyde dehydrogenase activity.
    supported_by:
    - reference_id: file:PSEPK/prr/prr-goa.tsv
      supporting_text: "GO:0016491\toxidoreductase activity"
    - reference_id: file:PSEPK/prr/prr-uniprot.txt
      supporting_text: Belongs to the aldehyde dehydrogenase family.
    proposed_replacement_terms:
    - id: GO:0004030
      label: aldehyde dehydrogenase [NAD(P)+] activity
    - id: GO:0019145
      label: aminobutyraldehyde dehydrogenase (NAD+) activity
- term:
    id: GO:0019145
    label: aminobutyraldehyde dehydrogenase (NAD+) activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000003
  qualifier: enables
  review:
    summary: Aminobutyraldehyde dehydrogenase (NAD+) activity matches the EC 1.2.1.19 assignment.
    action: ACCEPT
    reason: This is the most specific current molecular-function annotation for Prr. No L-lysine catabolic process annotation is added because the evidence places it in side aldehyde chemistry rather than the Dav route.
    supported_by:
    - reference_id: file:PSEPK/prr/prr-goa.tsv
      supporting_text: "GO:0019145\taminobutyraldehyde dehydrogenase (NAD+) activity"
    - reference_id: file:PSEPK/prr/prr-uniprot.txt
      supporting_text: EC=1.2.1.19
