  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: dxr encodes 1-deoxy-D-xylulose 5-phosphate reductoisomerase, the NADPH-dependent MEP-pathway enzyme that converts
  DXP to 2-C-methyl-D-erythritol 4-phosphate. This reaction commits DXP-derived carbon to bacterial IPP and DMAPP precursor
  biosynthesis.
