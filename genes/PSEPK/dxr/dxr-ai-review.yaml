id: Q88MH4
gene_symbol: dxr
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: >-
  dxr encodes the NADPH-dependent DXP reductoisomerase that rearranges and
  reduces 1-deoxy-D-xylulose 5-phosphate to 2-C-methyl-D-erythritol
  4-phosphate. This reaction commits DXP to the methylerythritol phosphate
  pathway for synthesis of isoprenoid precursors.
