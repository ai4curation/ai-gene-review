  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: ompR encodes an OmpR-family two-component response regulator in Pseudomonas putida KT2440.
  The protein has a receiver domain and an OmpR/PhoB-type DNA-binding output domain, supporting a cytoplasmic
  transcription-regulatory role paired with the adjacent EnvZ sensor kinase.
