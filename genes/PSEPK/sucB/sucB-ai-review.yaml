description: E2 dihydrolipoyllysine-residue succinyltransferase component of the 2-oxoglutarate dehydrogenase complex in Pseudomonas putida KT2440. SucB transfers the succinyl group from succinyl-CoA to the lipoyl carrier during oxidative decarboxylation of 2-oxoglutarate to succinyl-CoA, forming the E2 core of the TCA-cycle 2-oxoglutarate dehydrogenase complex together with SucA and an Lpd-family E3 enzyme.
