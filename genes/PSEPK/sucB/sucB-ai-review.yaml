suggested_questions:
- question: Which Lpd-family E3 enzyme partners most strongly with SucA/SucB in the 2-oxoglutarate dehydrogenase complex under TCA-cycle growth conditions?
suggested_experiments:
- description: Reconstitute SucA/SucB with each Lpd-family E3 paralog and measure 2-oxoglutarate dehydrogenase activity, then validate partner usage with co-purification or targeted proteomics in cells grown on TCA-cycle substrates.
