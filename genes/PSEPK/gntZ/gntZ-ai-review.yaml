description: 6-phosphogluconate dehydrogenase, decarboxylating, of Pseudomonas putida KT2440 (PP_4043).
  GntZ belongs to the 6-phosphogluconate dehydrogenase family and catalyzes the oxidative decarboxylation
  of 6-phosphogluconate to ribulose 5-phosphate with NADP reduction. This reaction completes the oxidative
  pentose phosphate branch and links gluconate/6-phosphogluconate metabolism to pentose phosphate production
  and redox cofactor generation.
