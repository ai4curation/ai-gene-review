    label: phosphogluconate dehydrogenase (decarboxylating) activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: >-
      This is the exact catalytic activity for the annotated EC 1.1.1.44 enzyme.
      UniProt names Q88FP6 as decarboxylating 6-phosphogluconate dehydrogenase,
      and GOA links the term to InterPro and EC evidence.
    action: ACCEPT
    reason: >-
      The term captures the core molecular function of gntZ in the oxidative
      pentose phosphate pathway.
    supported_by:
