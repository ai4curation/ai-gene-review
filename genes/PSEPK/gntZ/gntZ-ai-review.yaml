id: Q88FP6
gene_symbol: gntZ
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: >-
  gntZ (PP_4043) encodes a 6-phosphogluconate dehydrogenase family enzyme in
  Pseudomonas putida KT2440. UniProt and GOA identify it as a decarboxylating
  6-phosphogluconate dehydrogenase (EC 1.1.1.44) with NADP binding, placing it
  in the pentose phosphate pathway step that oxidatively decarboxylates
  6-phosphogluconate to ribulose 5-phosphate while generating NADPH. Current
  evidence supports Q88FP6 as the single KT2440 6-phosphogluconate
  dehydrogenase, acting at the 6-phosphogluconate branch point between
  Entner-Doudoroff flux and the oxidative PPP.
existing_annotations:
