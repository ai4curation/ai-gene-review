description: PP_5135 encodes the predicted periplasmic substrate-binding component of the
  PP_5135-PP_5137 FbpABC-like ferric/iron ABC importer. The ferric-binding domain, iron keyword,
  signal peptide, and adjacent PP_5136 permease plus fbpC ATPase support ferric/iron import.
