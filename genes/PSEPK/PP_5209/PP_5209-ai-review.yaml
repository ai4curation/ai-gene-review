taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: PP_5209 encodes a FliL-family flagellar motor-associated protein in Pseudomonas
  putida KT2440. The protein is predicted to be a small single-pass membrane protein at the
  flagellar basal body. Its most conservative first-pass role is support of flagellum-dependent
  motility, likely through a motor/base or stator-stabilizing function, while the specific
  division of labor between the two KT2440 FliL-family paralogs remains unresolved.
