suggested_questions:
- question: Does PP_5209 act with MotAB, MotCD, or both stator systems in KT2440?
- question: Is PP_5209 required only under high-load or surface/agar conditions, or also during
    low-viscosity swimming?
suggested_experiments:
- description: Delete PP_5209 alone and in combination with the other FliL-family paralog,
    then compare swimming, wrapped-mode formation, and agar migration.
- description: Measure localization of tagged PP_5209 relative to MotAB/MotCD stator markers
    and basal-body proteins under different mechanical loads.
