id: Q88ND2
gene_symbol: algI
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: algI encodes a predicted membrane alginate O-acetylation component in Pseudomonas putida KT2440. It acts with AlgJ and AlgF in the alginate modification machinery that acetylates mannuronate residues during alginate biosynthesis.
existing_annotations:
- term:
    id: GO:0005886
    label: plasma membrane
  evidence_type: IEA
  original_reference_id: GO_REF:0000044
  qualifier: located_in
  review:
    summary: The plasma-membrane annotation is appropriate for AlgI.
    action: KEEP_AS_NON_CORE
    reason: UniProt describes AlgI as a multi-pass cell inner membrane protein. The location is useful context but secondary to the alginate biosynthetic role.
    supported_by:
    - reference_id: file:PSEPK/algI/algI-uniprot.txt
      supporting_text: 'SUBCELLULAR LOCATION: Cell inner membrane'
    - reference_id: file:PSEPK/algI/algI-goa.tsv
      supporting_text: "GO:0005886\tplasma membrane"
- term:
    id: GO:0016746
    label: acyltransferase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: The broad acyltransferase annotation is acceptable as the current first-pass molecular-function term for AlgI.
    action: ACCEPT
    reason: UniProt names AlgI as a probable alginate O-acetylase and places it in a membrane-bound acyltransferase family. GOA currently provides only the broad acyltransferase term, which is adequate until a more specific alginate O-acetyltransferase GO term is used.
    supported_by:
    - reference_id: file:PSEPK/algI/algI-uniprot.txt
      supporting_text: Probable alginate O-acetylase AlgI
    - reference_id: file:PSEPK/algI/algI-uniprot.txt
      supporting_text: Belongs to the membrane-bound acyltransferase family
    - reference_id: file:PSEPK/algI/algI-goa.tsv
      supporting_text: "GO:0016746\tacyltransferase activity"
- term:
    id: GO:0042121
    label: alginic acid biosynthetic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: involved_in
  review:
    summary: AlgI should retain the alginic acid biosynthetic process annotation.
    action: ACCEPT
    reason: UniProt describes AlgI as acting with AlgJ and AlgF to acetylate alginate mannuronate residues and places it in the alginate biosynthesis pathway.
    supported_by:
    - reference_id: file:PSEPK/algI/algI-uniprot.txt
      supporting_text: Together with AlgJ and AlgF
    - reference_id: file:PSEPK/algI/algI-uniprot.txt
      supporting_text: adds acetyl groups at the O-2 and O-3 positions
    - reference_id: file:PSEPK/algI/algI-uniprot.txt
      supporting_text: 'PATHWAY: Glycan biosynthesis; alginate biosynthesis'
    - reference_id: file:PSEPK/algI/algI-goa.tsv
      supporting_text: "GO:0042121\talginic acid biosynthetic process"
