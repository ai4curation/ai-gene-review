  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: 'Q88L01 is the FadA beta subunit of a fatty-acid oxidation complex, a 3-ketoacyl-CoA thiolase/acetyl-CoA
  acyltransferase. Its primary role is fatty-acid or lipid catabolism; KEGG benzoate membership reflects
  side-route CoA chemistry rather than a strict benzoate degradation step.'
