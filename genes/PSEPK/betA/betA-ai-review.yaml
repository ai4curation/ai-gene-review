suggested_questions:
- question: Does P. putida BetA perform both choline dehydrogenase and betaine-aldehyde dehydrogenase reactions in vivo, or
    is the second oxidation mainly BetB-dependent?
suggested_experiments:
- description: Test betA and betB contributions to choline-derived glycine betaine production under osmotic stress by targeted
