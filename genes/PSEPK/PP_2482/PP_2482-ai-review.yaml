  evidence_type: IEA
  original_reference_id: GO_REF:0000118
  qualifier: enables
  review:
    summary: Exact GTP 3',8'-cyclase activity cannot be established for this divergent paralog.
    action: UNDECIDED
    reason: Q88K11 lacks the MoaA-specific InterPro records present on reviewed Q88E69 and is only 36.25% identical to it; no direct assay resolves substrate specificity.
    supported_by:
    - reference_id: file:PSEPK/moaA/moaA-bioinformatics/RESULTS.md
      supporting_text: |-
