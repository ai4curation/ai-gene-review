- id: file:PSEPK/PP_2482/PP_2482-deep-research-openscientist.md
  title: OpenScientist gene research for PP_2482
  reference_review:
    relevance: HIGH
    correctness: MISCITED
    review_notes: >-
      The report is miscited for target-level curation: it declares Q88K11 the
      essential, nonredundant canonical GTP 3',8'-cyclase despite the distinct
      reviewed canonical KT2440 MoaA Q88E69 and the unresolved three-paralog
      relationship. It also presents unsaved residue, motif, neighborhood, and
      target-sequence analyses as decisive. None of its catalytic, essentiality,
      or residue-level claims are propagated; only its explicit no-target-assay
      limitation is retained.
  findings:
  - statement: The report incorrectly promotes the uncertain Q88K11 paralog to canonical MoaA with an exact catalytic assignment.
    supporting_text: >-
      **PP_2482 (UniProt Q88K11) of *Pseudomonas putida* KT2440 encodes MoaA, a
      cytoplasmic radical S-adenosyl-L-methionine (radical SAM) enzyme that
      catalyzes the first committed step of molybdenum cofactor (Moco)
      biosynthesis.**
  - statement: The report incorrectly calls PP_2482 an essential, nonredundant pathway gate despite the other KT2440 MoaA-family loci.
    supporting_text: >-
      MoaA (PP_2482) is a single-point, non-redundant gatekeeper: without it, none
      of these molybdoenzymes can be matured.
  - statement: The report presents unsaved residue-level analysis as decisive target evidence.
    supporting_text: >-
      Direct inspection of the 322-residue Q88K11 protein sequence confirms both
      metal-cluster signatures rather than relying on annotation alone.
  - statement: The report acknowledges that no direct PP_2482 experiment was found.
    supporting_text: >-
      1. **No direct experimental study of the *P. putida* ortholog.** All
      functional claims for PP_2482 specifically are made by inference.
- id: file:PSEPK/moaA/moaA-bioinformatics/RESULTS.md
  title: Reproducible sequence comparison of KT2440 MoaA-family and MobA-like proteins
  findings:
  - statement: Q88K11 lacks the two MoaA-specific InterPro records found on Q88E69.
    supporting_text: |-
      - The reviewed MoaA sequence Q88E69 is the only one of the three with the
        MoaA-specific InterPro entries IPR013483 and IPR000385 in its UniProt record.
        All three share broader MoaA-like/radical-SAM entries and PTHR22960.
  - statement: Q88K11 is 36.25% identical to canonical Q88E69 and is closer to Q88LG4.
    supporting_text: |-
      - Q88E69 is 36.25% identical to Q88K11 (PP_2482) and 37.85% identical to Q88LG4
        (PP_1969) over aligned residue pairs. Q88K11 and Q88LG4 are 66.15% identical
        to one another. This pattern supports a closer relationship between the two
        unreviewed candidates than either has to canonical moaA, and does not support
        assuming that all three are interchangeable copies.
- id: file:PSEPK/moaA/moaA-uniprot.txt
  title: UniProtKB entry for canonical KT2440 moaA
  findings:
  - statement: Canonical KT2440 MoaA is specifically named as GTP 3',8'-cyclase.
