description: MurI is the glutamate racemase of Pseudomonas putida KT2440. It catalyzes the reversible interconversion of L-glutamate and D-glutamate, supplying the D-glutamate required for peptidoglycan stem-peptide biosynthesis and bacterial cell-wall assembly.
