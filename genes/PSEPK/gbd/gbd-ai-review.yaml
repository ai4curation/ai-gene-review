id: Q88JJ9
gene_symbol: gbd
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: >-
  gbd encodes an iron-containing alcohol dehydrogenase annotated as
  4-hydroxybutyrate dehydrogenase in Pseudomonas putida KT2440. It is a
  butanoate/GABA-adjacent redox enzyme candidate that interconverts
  4-hydroxybutyrate and succinate semialdehyde in short-chain acid metabolism.
  The first-pass Asta retrieval did not provide gene-specific KT2440 literature,
  so this review uses the EC-derived UniProt/GOA assignment as the current core
  function and treats broader alcohol dehydrogenase, oxidoreductase, and metal
  binding annotations as secondary.
existing_annotations:
- term:
    id: GO:0004022
    label: alcohol dehydrogenase (NAD+) activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000118
  qualifier: enables
  review:
    summary: >-
      NAD+-dependent alcohol dehydrogenase activity is directionally consistent
      with the protein family but is less specific than the EC-derived
      4-hydroxybutyrate dehydrogenase term.
    action: KEEP_AS_NON_CORE
    reason: >-
      Retain as a broad family/class annotation while using GO:0047577 as the
      core molecular function.
    supported_by:
    - reference_id: file:PSEPK/gbd/gbd-goa.tsv
      supporting_text: "GO:0004022\talcohol dehydrogenase (NAD+) activity"
- term:
    id: GO:0016491
    label: oxidoreductase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: >-
      Oxidoreductase activity is true but generic for this predicted
      4-hydroxybutyrate dehydrogenase.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      GO:0047577 captures the substrate-specific dehydrogenase activity more
      informatively.
    supported_by:
    - reference_id: file:PSEPK/gbd/gbd-goa.tsv
      supporting_text: "GO:0016491\toxidoreductase activity"
- term:
    id: GO:0016616
    label: oxidoreductase activity, acting on the CH-OH group of donors, NAD or NADP
      as acceptor
  evidence_type: IEA
  original_reference_id: GO_REF:0000117
  qualifier: enables
  review:
    summary: >-
      This CH-OH donor oxidoreductase class is compatible but less specific than
      the 4-hydroxybutyrate dehydrogenase activity.
    action: KEEP_AS_NON_CORE
    reason: >-
      Keep as secondary classification rather than the core function.
    supported_by:
    - reference_id: file:PSEPK/gbd/gbd-goa.tsv
      supporting_text: "GO:0016616\toxidoreductase activity, acting on the CH-OH group of donors, NAD or NADP as acceptor"
- term:
    id: GO:0046872
    label: metal ion binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: >-
      Metal binding is consistent with the iron-containing alcohol
      dehydrogenase family.
    action: KEEP_AS_NON_CORE
    reason: >-
      UniProt records an Fe cation cofactor, but metal binding is a secondary
      feature relative to the dehydrogenase reaction.
    supported_by:
    - reference_id: file:PSEPK/gbd/gbd-uniprot.txt
      supporting_text: 'CC       Name=Fe cation; Xref=ChEBI:CHEBI:24875;'
- term:
    id: GO:0047577
    label: 4-hydroxybutyrate dehydrogenase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000003
  qualifier: enables
  review:
    summary: >-
      This EC-derived term is the specific predicted molecular function for gbd.
    action: ACCEPT
    reason: >-
      UniProt describes Q88JJ9 as 4-hydroxybutyrate dehydrogenase with EC
      1.1.1.61, and GOA carries the matching molecular-function annotation.
    supported_by:
    - reference_id: file:PSEPK/gbd/gbd-uniprot.txt
      supporting_text: 'DE   SubName: Full=4-hydroxybutyrate dehydrogenase'
    - reference_id: file:PSEPK/gbd/gbd-goa.tsv
      supporting_text: "GO:0047577\t4-hydroxybutyrate dehydrogenase activity"
