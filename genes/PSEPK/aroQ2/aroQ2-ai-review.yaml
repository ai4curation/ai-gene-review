  qualifier: enables
  review:
    summary: aroQ2 has the type-II dehydroquinase family assignment and the GOA molecular function corresponds to EC 4.2.1.10, dehydration of 3-dehydroquinate to 3-dehydroshikimate.
    action: ACCEPT
    reason: This is the specific, best-supported molecular function for the protein. No direct KT2440 assay was found for this paralog, but the family/domain evidence is strong.
- term:
