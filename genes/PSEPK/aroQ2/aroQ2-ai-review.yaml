  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: aroQ2 (PP_2407) encodes a predicted type II 3-dehydroquinate dehydratase in Pseudomonas putida KT2440. This enzyme family catalyzes dehydration of 3-dehydroquinate to 3-dehydroshikimate, a step of the shikimate pathway leading to chorismate and aromatic amino acid biosynthesis. P. putida KT2440 contains multiple aroQ-like paralogs (aroQ1, aroQ2, and aroQ-III), and their relative biosynthetic or catabolic flux contributions in vivo remain unresolved.
