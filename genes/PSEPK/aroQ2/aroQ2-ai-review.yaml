    label: chorismate biosynthetic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: involved_in
  review:
    summary: 3-dehydroquinate dehydratase is a shikimate-pathway enzyme upstream of chorismate.
    action: ACCEPT
    reason: Correct process annotation for a biosynthetic AroQ enzyme. The pathway-level review notes unresolved paralog assignment, but all three aroQ-like proteins are plausible contributors to the shared shikimate pathway.
- term:
    id: GO:0019631
    label: quinate catabolic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000118
  qualifier: involved_in
  review:
    summary: Quinate catabolism can pass through dehydroquinate/dehydroshikimate chemistry, but the available evidence does not establish aroQ2 as the physiologically relevant quinate-catabolic copy in KT2440.
    action: MARK_AS_OVER_ANNOTATED
    reason: This TreeGrafter process propagation may be biologically plausible at the pathway-family level, but it is not paralog-specific. The core supported role of aroQ2 is the dehydroquinate dehydratase step feeding chorismate biosynthesis.
