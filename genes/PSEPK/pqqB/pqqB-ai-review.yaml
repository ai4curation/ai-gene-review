suggested_questions:
- question: 'What is the native PqqB substrate and metal/co-substrate requirement in KT2440: cross-linked
    Glu-Tyr peptide, a cleaved diamino acid intermediate, or a downstream hydroxylated product?'
suggested_experiments:
- hypothesis: KT2440 PqqB catalyzes hydroxylation of a PqqA-derived cross-linked intermediate during PQQ
    biosynthesis.
  description: Reconstitute KT2440 PqqA/PqqD/PqqE/PqqB reactions and track oxygen incorporation and hydroxylated
    intermediates by LC-MS using wild-type and active-site mutant PqqB.
  experiment_type: reconstituted pathway biochemistry
