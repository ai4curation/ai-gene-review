description: pqqB encodes a conserved PqqB-family protein in the PQQ biosynthetic locus of P. putida KT2440.
  UniProt places it in the PQQ pathway and suggests a role in moving PQQ or a precursor to the periplasm,
  so the supported GO process is pyrroloquinoline quinone biosynthesis.
