taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: pqqB encodes a metallo-beta-lactamase-fold, non-heme iron hydroxylase in pyrroloquinoline quinone (PQQ) biosynthesis. PqqB catalyzes oxygen-insertion chemistry on a PqqA-derived cross-linked intermediate, helping form the quinone moiety required for subsequent PqqC-dependent production of mature PQQ. The exact native substrate, product, and relationship to pathway-specific proteolysis remain incompletely resolved.
