status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: pqqB encodes a conserved PQQ-pathway metallo-beta-lactamase-fold protein in P. putida KT2440.
  UniProt conservatively suggests transport of PQQ or a precursor, but structure and biochemical literature
  support a PqqB hydroxylase role in converting PqqA-derived cross-linked intermediates during pyrroloquinoline
  quinone biosynthesis.
existing_annotations:
- term:
    id: GO:0018189
    label: pyrroloquinoline quinone biosynthetic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  review:
    summary: This process annotation should be retained. PqqB is a conserved PQQ-pathway protein, and
      primary biochemical/structural work supports a PqqB hydroxylase role in maturation of PqqA-derived
      intermediates during PQQ biosynthesis.
    action: ACCEPT
    reason: PqqB is required for the PQQ pathway; the more recent literature refines its role from possible
      precursor transport to hydroxylase chemistry within pyrroloquinoline quinone biosynthesis.
    supported_by:
    - reference_id: file:PSEPK/pqqB/pqqB-uniprot.txt
      supporting_text: 'PATHWAY: Cofactor biosynthesis; pyrroloquinoline quinone biosynthesis.'
    - reference_id: file:PSEPK/pqqB/pqqB-goa.tsv
      supporting_text: "GO:0018189\tpyrroloquinoline quinone biosynthetic process"
    - reference_id: PMID:30811189
      supporting_text: strongly implicate PqqB as a novel non-heme hydroxylase
    - reference_id: file:PSEPK/pqqB/pqqB-deep-research-falcon.md
      supporting_text: PqqB is part of PQQ biosynthesis and is transcriptionally co-induced
        with neighboring pqq genes under antibiotic stress.
    - reference_id: file:PSEPK/pqqB/pqqB-deep-research-falcon.md
      supporting_text: PP_0379 is explicitly annotated as **pqqB** and is genomically
        adjacent to **pqqC (PP0378)** and **pqqA (PP0380)**
- term:
    id: GO:0016705
    label: oxidoreductase activity, acting on paired donors, with incorporation or reduction of molecular
      oxygen
  evidence_type: ISS
  original_reference_id: PMID:30811189
  review:
    summary: PqqB should have an oxygen-incorporating oxidoreductase molecular-function annotation. The
      available primary literature supports a non-heme hydroxylase activity, although GO currently lacks
      a PqqB-specific hydroxylase term.
    action: NEW
    reason: GO:0016705 is a broad current parent term for the conserved PqqB oxygenase/hydroxylase chemistry.
      The direct biochemical demonstration of iron-dependent hydroxylase activity was made on the
      Methylobacterium extorquens ortholog (PMID:30811189), so the KT2440 assignment is by orthology
      (ISS), not direct assay; falcon deep research independently corroborates the oxygenase-like
      molecular function from the metallo-beta-lactamase fold and a non-heme-oxygenase facial triad,
      while emphasizing that strain-specific kinetics for KT2440 PqqB remain unproven. The review
      remains DRAFT because export-quality ISS curation should add an explicit with/from source annotation.
    supported_by:
    - reference_id: PMID:30811189
      supporting_text: show that PqqB is a previously uncharacterized hydroxylase
    - reference_id: PMID:30811189
      supporting_text: strongly implicate PqqB as a novel non-heme hydroxylase
    - reference_id: file:PSEPK/pqqB/pqqB-deep-research-falcon.md
      supporting_text: PqqB likely acts as a **non-heme metallo-oxygenase** in PQQ biosynthesis
    - reference_id: file:PSEPK/pqqB/pqqB-deep-research-falcon.md
      supporting_text: a motif typical of **non-heme metal-binding oxygenases**, supporting
        an oxygenase-like hypothesis
