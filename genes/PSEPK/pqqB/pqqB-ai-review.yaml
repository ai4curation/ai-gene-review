proposed_new_terms:
- proposed_name: PqqB hydroxylase activity
  proposed_definition: Catalysis of oxygen-insertion/hydroxylation reactions on a PqqA-derived cross-linked
    amino acid intermediate during pyrroloquinoline quinone biosynthesis.
  justification: Primary biochemical and structural studies support PqqB as a non-heme hydroxylase in
    PQQ biosynthesis, but GO lacks a PqqB-specific hydroxylase molecular-function term.
