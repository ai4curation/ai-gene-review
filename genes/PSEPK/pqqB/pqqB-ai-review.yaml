suggested_questions:
- question: Does KT2440 PqqB transport a PQQ intermediate, mature PQQ, or act as a periplasmic chaperone
    during PQQ maturation?
suggested_experiments:
- hypothesis: PqqB is required for efficient periplasmic delivery or maturation of PQQ rather than catalyzing
    the cofactor-forming reaction itself.
  description: Compare periplasmic and cellular PQQ pools in wild-type, pqqB deletion, and complemented
    strains, and test rescue by exogenous PQQ.
