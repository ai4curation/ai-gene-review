- id: file:PSEPK/pqqB/pqqB-deep-research-falcon.md
  title: Falcon deep research report for pqqB (PP_0379, Q88QV5) in Pseudomonas putida KT2440
  findings:
  - supporting_text: PP_0379 is explicitly annotated as **pqqB** and is genomically adjacent
      to **pqqC (PP0378)** and **pqqA (PP0380)**
    reference_section_type: OTHER
  - supporting_text: PqqB is part of PQQ biosynthesis and is transcriptionally co-induced
      with neighboring pqq genes under antibiotic stress.
    reference_section_type: OTHER
  - supporting_text: 'pqqB upregulated 2.2-fold'
    reference_section_type: OTHER
  - supporting_text: Insertional disruption of **pqqB (PP_0379)** and **pqqC (PP_0378)**
      is associated with compromised growth under chloramphenicol
    reference_section_type: OTHER
  - supporting_text: PqqB proteins are homologous to the **metallo-β-lactamase fold** superfamily
      and have an X-ray structure (review cites **PDB 3JXP**)
    reference_section_type: OTHER
  - supporting_text: a motif typical of **non-heme metal-binding oxygenases**, supporting
      an oxygenase-like hypothesis
    reference_section_type: OTHER
  - supporting_text: PqqB also appears to contain a **structural Zn²⁺ site** (conserved cysteine
      motif) that may stabilize the protein rather than directly catalyze the primary chemistry
    reference_section_type: OTHER
  - supporting_text: non-heme metallo-oxygenase-like enzyme proposed to hydroxylate PqqA Tyr
      early in PQQ biosynthesis.
    reference_section_type: OTHER
  - supporting_text: Direct enzyme assay evidence for KT2440 PqqB substrate specificity and
      product formation is not present in the retrieved sources
    reference_section_type: OTHER
  - supporting_text: the catalytic assignment should be recorded as **inference supported by
      structure and pathway models**
    reference_section_type: OTHER
