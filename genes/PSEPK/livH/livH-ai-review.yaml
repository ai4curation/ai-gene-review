  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: livH (PP_1140) encodes a predicted multi-pass inner-membrane permease component of the PP_1137-PP_1141 LivFGMHK high-affinity branched-chain amino-acid ABC uptake system. Automated annotations support valine, isoleucine, and leucine transporter activity, while the adjacent LivK substrate-binding protein provides additional leucine/branched-chain amino-acid context.
