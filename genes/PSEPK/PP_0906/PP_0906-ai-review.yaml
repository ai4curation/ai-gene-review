  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: PP_0906 is a predicted inner-membrane RND multidrug efflux transporter in Pseudomonas putida
  KT2440. It is a multi-pass membrane protein with AcrB/acriflavine-resistance transporter domains and
  is best treated as the substrate-translocating component of a cell-envelope efflux system. In the beta-lactam
  resistance map it contributes generic xenobiotic/drug efflux capacity rather than a beta-lactam-specific
  enzymatic mechanism.
