  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: PP_0696 encodes a predicted TonB-family energy-transducer protein. TonB proteins are inner-membrane-anchored,
  periplasm-spanning components that couple the ExbB/ExbD proton-motive-force motor to TonB-dependent outer-membrane receptors.
  The lightweight evidence supports TonB-like energy transduction, but the specific receptor set and substrates for this orphan
  TonB paralog are unresolved.
