  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: fliY (PP_0227) encodes a predicted signal-peptide-bearing periplasmic cystine-binding protein of the bacterial solute-binding protein family. Despite the fliY symbol, this KT2440 protein is best treated in this first pass as the solute-binding component of the adjacent SctC/SctS cystine or sulfur-compound ABC uptake system.
existing_annotations:
- term:
    id: GO:0015276
    label: ligand-gated monoatomic ion channel activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: The ligand-gated ion-channel annotation is an InterPro2GO spillover and is not appropriate for this bacterial periplasmic solute-binding protein.
    action: REMOVE
    reason: FliY has a signal peptide and solute-binding protein family domains, with no evidence that it is a membrane ion channel; the ion-channel term appears to come from the ionotropic-glutamate-receptor-like domain mapping.
    supported_by:
