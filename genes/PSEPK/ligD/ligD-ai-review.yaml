suggested_questions:
- question: Which LigD domain activities are catalytically active in KT2440 and what repair-junction signatures do they generate in vivo?
- question: Does KT2440 LigD require Ku for recruitment and efficient ligation under desiccation or double-strand-break stress?
suggested_experiments:
- description: Purify KT2440 LigD and assay ligase, primer-extension, and exonuclease/phosphoesterase activities on defined DNA-end substrates, with and without Ku.
  experiment_type: in vitro enzymology
- description: Compare repair junctions in wild-type, ku-null, ligD-null, and LigD-domain-mutant strains after defined double-strand-break induction.
  experiment_type: DNA repair genetics and junction sequencing
