id: Q88HU3
gene_symbol: ligD
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: >-
  ligD (PP_3260) encodes the multifunctional LigD enzyme of the Pseudomonas
  putida KT2440 bacterial non-homologous end joining system. The protein has
  ATP-dependent DNA ligase signatures and additional LigD polymerase and
  phosphoesterase/end-processing domains, allowing it to process damaged DNA
  ends and seal double-strand break repair intermediates recruited by Ku. Its
  central biological role is therefore DNA end processing and ATP-dependent
  ligation during Ku/LigD-mediated NHEJ.
existing_annotations:
- term:
    id: GO:0003910
    label: DNA ligase (ATP) activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: >-
      ATP-dependent DNA ligase activity is the core catalytic activity of the
      LigD ligase domain.
    action: ACCEPT
    reason: >-
      UniProt records the EC 6.5.1.1 ATP-dependent DNA ligase reaction and
      conserved ATP-dependent DNA ligase domain signatures for Q88HU3.
    supported_by:
    - reference_id: file:PSEPK/ligD/ligD-uniprot.txt
      supporting_text: Reaction=ATP + (deoxyribonucleotide)n-3'-hydroxyl
- term:
    id: GO:0005524
    label: ATP binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: >-
      ATP binding is correct for the ATP-dependent ligase reaction but is less
      informative than the catalytic DNA ligase activity.
    action: KEEP_AS_NON_CORE
    reason: >-
      Retain as a supporting nucleotide-binding annotation; the core function is
      ATP-dependent DNA ligation.
- term:
    id: GO:0006281
    label: DNA repair
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: involved_in
  review:
    summary: >-
      DNA repair is correct as a broad parent process for the LigD role.
    action: KEEP_AS_NON_CORE
    reason: >-
      LigD functions in DNA repair, but the specific module context is
      bacterial non-homologous end joining.
- term:
    id: GO:0006310
    label: DNA recombination
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: involved_in
  review:
    summary: >-
      DNA recombination is broad and potentially misleading for LigD because
      the compact Ku/LigD pathway repairs breaks without a homologous template.
    action: MODIFY
    reason: >-
      The annotation likely reflects legacy keyword/domain propagation. LigD is
      part of non-homologous end joining; GO:0006303 is a more specific and
      biologically clearer process term than generic DNA recombination. Note
      that NHEJ (GO:0006303) sits under DNA repair and is not an ontology child
      of DNA recombination (GO:0006310), so replacing this term is a lateral
      correction to the accurate process branch rather than a specialization
      within DNA recombination.
    proposed_replacement_terms:
    - id: GO:0006303
      label: double-strand break repair via nonhomologous end joining
- term:
    id: GO:0003887
    label: DNA-directed DNA polymerase activity
  evidence_type: IEA
  original_reference_id: file:PSEPK/ligD/ligD-uniprot.txt
  qualifier: enables
  review:
    summary: >-
      LigD contains a polymerase domain and UniProt keyword/GO cross-references
      record DNA-directed DNA polymerase activity.
    action: NEW
    reason: >-
      Add as a secondary LigD end-processing activity that helps explain the
      NHEJ repair role, while keeping ATP-dependent DNA ligase activity as the
      primary core function.
    supported_by:
    - reference_id: file:PSEPK/ligD/ligD-uniprot.txt
      supporting_text: GO; GO:0003887; F:DNA-directed DNA polymerase activity
- term:
    id: GO:0046403
    label: polynucleotide 3'-phosphatase activity
  evidence_type: ISS
  original_reference_id: file:PSEPK/ligD/ligD-uniprot.txt
  qualifier: enables
  review:
    summary: >-
      The central LigD phosphoesterase (PE) domain (IPR014144 / TIGR02777) is a
      3'-phosphoesterase that removes 3'-phosphate (and 3'-ribonucleotide)
      groups to prepare broken DNA ends for ligation. This is the accurate
      end-processing activity of the PE domain, not a classic exonuclease.
    action: NEW
    reason: >-
      Replaces the imprecise UniProt-keyword-derived exonuclease
      cross-reference (GO:0004527). The LigD PE domain does not act as a
      processive exonuclease; its characterised end-processing chemistry is
      3'-phosphatase / 3'-phosphoesterase activity, so GO:0046403 (polynucleotide
      3'-phosphatase activity) is the accurate molecular-function term, inferred
      from the conserved LigD_PE_domain signature.
    supported_by:
    - reference_id: file:PSEPK/ligD/ligD-uniprot.txt
      supporting_text: InterPro; IPR014144; LigD_PE_domain.
    - reference_id: file:PSEPK/ligD/ligD-uniprot.txt
      supporting_text: NCBIfam; TIGR02777; LigD_PE_dom; 1.
- term:
    id: GO:0006303
    label: double-strand break repair via nonhomologous end joining
  evidence_type: ISS
  original_reference_id: file:PSEPK/ligD/ligD-uniprot.txt
  qualifier: involved_in
  review:
    summary: >-
      LigD is the catalytic partner of Ku in compact bacterial NHEJ.
    action: NEW
    reason: >-
      The UniProt entry identifies Q88HU3 as LigD/NHEJ DNA polymerase and
      records LigD NHEJ-family domains; the adjacent ku gene carries the direct
      NHEJ process annotation in the same PSEPK pathway bucket.
    supported_by:
    - reference_id: file:PSEPK/ligD/ligD-uniprot.txt
      supporting_text: "AltName: Full=NHEJ DNA polymerase"
    - reference_id: file:PSEPK/ligD/ligD-uniprot.txt
      supporting_text: InterPro; IPR052171; NHEJ_LigD.
