    summary: ATP binding is retained as ligase substrate/cofactor context but is less informative than DNA ligase activity.
    action: KEEP_AS_NON_CORE
    reason: ATP is required for the ligase reaction, but the core molecular function is ATP-dependent DNA ligase activity.
    supported_by:
