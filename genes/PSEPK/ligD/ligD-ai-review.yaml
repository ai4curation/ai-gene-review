    label: DNA ligase (ATP) activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: ATP-dependent DNA ligase activity is the core catalytic activity of LigD.
    action: ACCEPT
    reason: UniProt records EC 6.5.1.1 and the ATP-dependent DNA ligase reaction, and InterPro assigns the LigD ligase domain.
    supported_by:
    - reference_id: file:PSEPK/ligD/ligD-goa.tsv
      supporting_text: "GO:0003910\tDNA ligase (ATP) activity"
    - &ligd_reaction
      reference_id: file:PSEPK/ligD/ligD-uniprot.txt
      supporting_text: "CC       Reaction=ATP + (deoxyribonucleotide)n-3'-hydroxyl + 5'-phospho-"
