taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: LigD is the multifunctional bacterial non-homologous end-joining enzyme paired with Ku in Pseudomonas putida KT2440. Its domain architecture supports ATP-dependent DNA ligase activity plus NHEJ-associated polymerase and exonuclease/phosphoesterase activities that process broken DNA ends before final ligation in double-strand-break repair.
