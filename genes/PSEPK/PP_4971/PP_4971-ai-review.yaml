description: PP_4971 encodes a membrane-bound lytic murein transglycosylase A/MltA-family protein in Pseudomonas putida KT2440.
  The MltA/RlpA-like domains and GOA support a peptidoglycan lytic transglycosylase role in peptidoglycan turnover, with outer-membrane
  localization inferred from InterPro.
