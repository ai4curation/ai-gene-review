  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: PP_3076 encodes a predicted multi-pass inner-membrane permease component of a PP_3076-PP_3078 Yej-like peptide ABC import candidate. Its MetI-like permease domain, YejE-like PANTHER subfamily assignment, membrane localization, and adjacent YejB-like permease plus periplasmic peptide-binding component support a peptide-transporter role.
