taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: PP_4606 encodes a CntO-family TonB-dependent outer-membrane receptor predicted to import pseudopaline-metal complexes.
  UniProt metadata links CntO to pseudopaline-mediated acquisition of nickel and zinc, and the protein carries TonB-dependent
  receptor barrel/plug features. The supported role is metallophore-mediated metal uptake rather than a ferric-siderophore-specific
  receptor.
