taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: csrA__Q88EJ0 (PP_4472) encodes a CsrA/RsmA-family post-transcriptional regulator in Pseudomonas
  putida KT2440. It is a small cytoplasmic mRNA-binding protein predicted to bind 5-prime UTRs and regulate
  translation initiation and mRNA stability, placing it in the Csr/Rsm branch downstream of Gac signaling.
