taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: plsY encodes the PlsY-family glycerol-3-phosphate acyltransferase of the acyl-phosphate route to bacterial phospholipid synthesis. It catalyzes transfer of an acyl group from acyl-phosphate to sn-glycerol 3-phosphate, producing 1-acyl-sn-glycerol-3-phosphate/lysophosphatidic acid. In P. putida KT2440 this places PlsY at the membrane-associated first acylation step of glycerophospholipid precursor assembly, using acyl-phosphate generated by PlsX rather than acyl-CoA or acyl-ACP directly. UniProt/HAMAP predicts a multi-pass plasma-membrane protein.
