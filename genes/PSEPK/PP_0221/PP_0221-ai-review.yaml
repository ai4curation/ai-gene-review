  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: PP_0221 encodes a predicted MetQ-like lipoprotein substrate-binding component
  of a methionine ABC importer adjacent to metP and metN2. Its MetQ/NlpA-family assignment
  and product name support methionine-import context, although the exact L- versus
  D-methionine substrate range is inferred from its cognate MetP/MetN2 partners rather
  than directly assayed in KT2440.
