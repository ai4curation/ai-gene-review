references:
- id: GO_REF:0000117
  title: Electronic Gene Ontology annotations created by ARBA machine learning models
  findings:
  - statement: ARBA supplied broad enzyme-class and aromatic catabolism process annotations that need
      specificity review.
- id: GO_REF:0000120
  title: Combined automated GO annotation using multiple IEA methods
  findings:
  - statement: Automated EC/Rhea mapping supplies the GalC aldolase molecular-function term.
- id: file:PSEPK/galC/galC-uniprot.txt
  title: UniProtKB reviewed entry for galC
  findings:
  - statement: UniProt identifies GalC as the CHA aldolase in gallate degradation, converting CHA to pyruvate
      and oxaloacetate.
- id: PMID:21219457
  title: 'Unravelling the gallic acid degradation pathway in bacteria: the gal cluster from Pseudomonas
    putida'
  findings:
  - statement: The KT2440 gal cluster paper identifies GalC as the aldolase catalyzing CHA cleavage.
- id: file:PSEPK/galC/galC-deep-research-falcon.md
  title: Falcon (Edison Scientific) deep research report for galC (Pseudomonas putida KT2440)
  findings:
  - statement: GalC is the CHA (HMG/CHA) aldolase that cleaves CHA to pyruvate and oxaloacetate, the
      terminal carbon-splitting step of gallate catabolism.
    reference_section_type: OTHER
    supporting_text: |-
      GalC is identified as the **HMG/CHA aldolase** responsible for converting CHA into the TCA-cycle metabolites **pyruvate and oxaloacetate**
  - statement: GalC is the terminal carbon-carbon cleavage step of the gallate pathway, completing
      conversion of an aromatic compound into central metabolism.
    reference_section_type: OTHER
    supporting_text: |-
      GalC is the terminal carbon–carbon cleavage step that converts the ring-cleavage-derived intermediate (CHA) into **pyruvate + oxaloacetate**, thereby completing conversion of an aromatic compound into central metabolism
  - statement: GalC belongs to the class II, divalent metal-dependent pyruvate aldolases and uses an
      enolate (not Schiff-base) mechanism.
    reference_section_type: OTHER
    supporting_text: |-
      HMG/CHA aldolases as **class II, divalent metal-dependent pyruvate aldolases**, operating via an **enolate** mechanism (not a Schiff-base)
  - statement: The enzyme is divalent-metal dependent, with Mg2+ featuring in structural discussion and
      conserved acidic motifs supporting metal binding.
    reference_section_type: OTHER
    supporting_text: |-
      The enzyme is described as **divalent-metal dependent**; Mg2+ appears in structural discussion
  - statement: HMG/CHA aldolases show a secondary oxaloacetate decarboxylase activity, consistent with
      a shared pyruvate-enolate intermediate.
    reference_section_type: OTHER
    supporting_text: |-
      HMG/CHA aldolases are reported to show **secondary oxaloacetate decarboxylase activity**, rationalized by a shared pyruvate-enolate intermediate
  - statement: GalC adopts an RraA-like fold, consistent with its UniProt LigK/PcmE family and RraA-like
      domain assignment.
    reference_section_type: OTHER
    supporting_text: |-
      A solved structure (discussed for *Pseudomonas putida* F1 homologs) shows an **αββα sandwich fold** that is **structurally similar to RraA family proteins**
  - statement: GalC is a soluble metabolic enzyme acting intracellularly (likely cytosolic) on cytosolic
      intermediates.
    reference_section_type: OTHER
    supporting_text: |-
      the most defensible annotation from these sources is that GalC functions **intracellularly (likely cytosolic)** as part of central aromatic catabolism
  - statement: GalC functions within the KT2440 gallate-utilization gene cluster galDCBRPAT.
    reference_section_type: OTHER
    supporting_text: |-
      A KT2440 gallate-utilization gene cluster is described as **galDCBRPAT**, encoding enzymatic steps for gallate catabolism plus uptake/regulation
