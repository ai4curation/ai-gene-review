proposed_new_terms:
- proposed_name: 4-carboxy-4-hydroxy-2-oxoadipate aldolase activity
  proposed_definition: Catalysis of the cleavage of 4-carboxy-4-hydroxy-2-oxoadipate to pyruvate and oxaloacetate.
  justification: GalC has a characterized natural CHA cleavage reaction in gallate degradation; the current
    EC-mapped GO term label does not name this physiological substrate.
  proposed_parent:
    id: GO:0016833
    label: oxo-acid-lyase activity
  supported_by:
  - reference_id: file:PSEPK/galC/galC-uniprot.txt
    supporting_text: Catalyzes the conversion of 4-carboxy-4-hydroxy-2-oxoadipic
  - reference_id: PMID:21219457
    supporting_text: galC encodes the aldolase catalysing CHA cleavage to pyruvic and oxaloacetic acids
    reference_section_type: ABSTRACT
  - reference_id: file:PSEPK/galC/galC-deep-research-falcon.md
    reference_section_type: OTHER
    supporting_text: |-
      The same enzyme family is reported to accept **both CHA and HMG (4-hydroxy-4-methyl-2-oxoglutarate)** as substrates, motivating the common name “HMG/CHA aldolase.”
suggested_questions:
- question: Should GO represent GalC with a CHA-specific aldolase molecular-function term distinct from
    the current EC-name term?
  experts:
  - GO molecular function editors
  - Gallate catabolism experts
suggested_experiments:
- description: Measure GalC kinetics with CHA and 4-hydroxy-4-methyl-2-oxoglutarate to determine whether
    the GO EC-name term or a CHA-specific term best captures physiological activity.
  experiment_type: substrate specificity assay
