    reference_section_type: ABSTRACT
suggested_questions:
- question: Should GO represent GalC with a CHA-specific aldolase molecular-function term distinct from
    the current EC-name term?
  experts:
  - GO molecular function editors
  - Gallate catabolism experts
suggested_experiments:
- description: Measure GalC kinetics with CHA and 4-hydroxy-4-methyl-2-oxoglutarate to determine whether
    the GO EC-name term or a CHA-specific term best captures physiological activity.
  experiment_type: substrate specificity assay
