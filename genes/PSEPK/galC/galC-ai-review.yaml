references:
- id: GO_REF:0000117
  title: Electronic Gene Ontology annotations created by ARBA machine learning models
  findings:
  - statement: ARBA supplied broad enzyme-class and aromatic catabolism process annotations that need
      specificity review.
- id: GO_REF:0000120
  title: Combined automated GO annotation using multiple IEA methods
  findings:
  - statement: Automated EC/Rhea mapping supplies the GalC aldolase molecular-function term.
- id: file:PSEPK/galC/galC-uniprot.txt
  title: UniProtKB reviewed entry for galC
  findings:
  - statement: UniProt identifies GalC as the CHA aldolase in gallate degradation, converting CHA to pyruvate
      and oxaloacetate.
- id: PMID:21219457
  title: Gallate degradation by Pseudomonas putida
  findings:
  - statement: The KT2440 gal cluster paper identifies GalC as the aldolase catalyzing CHA cleavage.
