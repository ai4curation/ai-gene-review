taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: galC encodes 4-carboxy-4-hydroxy-2-oxoadipic acid aldolase, the terminal aldolase in the
  gallate degradation pathway. GalC cleaves CHA to pyruvate and oxaloacetate, linking gallate-derived
  carbon to central metabolism.
