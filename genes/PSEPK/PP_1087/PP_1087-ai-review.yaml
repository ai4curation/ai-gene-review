suggested_questions:
- question: Does PP_1087 have any experimentally detectable role in envelope stability, cell-surface interactions,
    or motility-associated envelope remodeling?
- question: Is PP_1087 physically or genetically linked to flagellar function, or is its ppu02040 membership
    an automated map spillover from OmpA/MotY-like family context?
suggested_experiments:
- description: Test a PP_1087 deletion for outer-membrane integrity, envelope stress sensitivity, and
    swimming/swarming phenotypes under matched growth conditions.
- description: Localize tagged PP_1087 and compare its abundance in planktonic versus surface-associated
    states to determine whether it is a general envelope protein or conditionally motility-associated.
