description: PP_1087 encodes a predicted signal-peptide-bearing OmpA-family outer-membrane/envelope protein
  in Pseudomonas putida KT2440. It appears in the broad ppu02040 flagellar-assembly map as an envelope
  side entry, but current first-pass evidence supports only membrane/envelope localization rather than
  a direct flagellar apparatus role.
