  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: mcpQ encodes an inner-membrane methyl-accepting chemotaxis receptor that recognizes
  citrate, especially citrate divalent-metal complexes. It works alongside broad-range McpS
  to cover citrate/TCA-cycle chemotaxis signals.
