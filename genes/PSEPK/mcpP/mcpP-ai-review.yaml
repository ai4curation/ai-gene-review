taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: mcpP encodes an inner-membrane methyl-accepting chemotaxis receptor for short-chain
  C2 and C3 carboxylic acids. The receptor ligand-binding domain recognizes acetate, pyruvate,
  propionate, and L-lactate, and McpP is the major chemoreceptor for chemotaxis toward these
  compounds.
