description: >-
  PP_5083 encodes a predicted PilM-family type IV pilus biogenesis protein in
  Pseudomonas putida KT2440. Its PilM and FtsA/MreB-like ATPase-domain profile
  supports a cytosolic or membrane-associated alignment-complex role in type IV
  pilus assembly, but ATP-binding or ATPase activity is not assigned without
  stronger evidence.
