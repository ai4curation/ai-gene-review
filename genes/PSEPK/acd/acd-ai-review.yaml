description: acd encodes an acyl-CoA dehydrogenase-family flavoprotein in Pseudomonas putida KT2440. UniProt names it as 3-sulfinopropanoyl-CoA desulfinase/cyclohexane-1-carbonyl-CoA dehydrogenase, so it is best treated as a CoA-thioester dehydrogenase/desulfinase side enzyme rather than a resolved core fatty-acid beta-oxidation enzyme.
