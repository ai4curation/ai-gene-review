id: Q88DV0
gene_symbol: rlmE
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: rlmE encodes 23S rRNA uridine 2552 2-O-ribose methyltransferase, an rRNA-modifying enzyme of the 50S ribosomal
  subunit.
existing_annotations:
- term:
    id: GO:0005737
    label: cytoplasm
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  review:
    summary: The cytoplasm annotation is correct for RlmE.
    action: KEEP_AS_NON_CORE
    reason: RlmE is a soluble bacterial rRNA modification enzyme; location is accurate but non-core.
    supported_by:
    - reference_id: file:PSEPK/rlmE/rlmE-uniprot.txt
      supporting_text: 'SUBCELLULAR LOCATION: Cytoplasm'
    - reference_id: file:PSEPK/rlmE/rlmE-goa.tsv
      supporting_text: "GO:0005737\tcytoplasm"
- term:
    id: GO:0006364
    label: rRNA processing
  evidence_type: IEA
  original_reference_id: GO_REF:0000104
  review:
    summary: rRNA processing is correct pathway context, but rRNA methylation is the more specific process for RlmE.
    action: MODIFY
    reason: RlmE directly methylates 23S rRNA, so GO:0031167 rRNA methylation is more consistent and specific than the parent
      rRNA processing term.
    proposed_replacement_terms:
    - id: GO:0031167
      label: rRNA methylation
    supported_by:
    - reference_id: file:PSEPK/rlmE/rlmE-uniprot.txt
      supporting_text: Specifically methylates the uridine in position 2552
    - reference_id: file:PSEPK/rlmE/rlmE-goa.tsv
      supporting_text: "GO:0006364\trRNA processing"
- term:
    id: GO:0008168
    label: methyltransferase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: This methyltransferase parent is over-annotated for RlmE.
    action: MARK_AS_OVER_ANNOTATED
    reason: GO:0008650 captures the specific rRNA substrate and modified nucleotide.
    supported_by:
    - reference_id: file:PSEPK/rlmE/rlmE-uniprot.txt
      supporting_text: EC=2.1.1.166
    - reference_id: file:PSEPK/rlmE/rlmE-goa.tsv
      supporting_text: "GO:0008168\tmethyltransferase activity"
- term:
    id: GO:0008173
    label: RNA methyltransferase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000118
  review:
    summary: RNA methyltransferase activity is true but less specific than the RlmE activity term.
    action: MARK_AS_OVER_ANNOTATED
    reason: GO:0008650 captures the exact 23S rRNA uridine 2-O-ribose methyltransferase activity.
    supported_by:
    - reference_id: file:PSEPK/rlmE/rlmE-uniprot.txt
      supporting_text: uridine in position 2552 of 23S
    - reference_id: file:PSEPK/rlmE/rlmE-goa.tsv
      supporting_text: "GO:0008173\tRNA methyltransferase activity"
- term:
    id: GO:0008650
    label: rRNA (uridine-2'-O-ribose)-methyltransferase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  review:
    summary: RlmE-specific rRNA uridine 2-O-ribose methyltransferase activity is the core molecular function.
    action: ACCEPT
    reason: UniProt assigns EC 2.1.1.166 and the Rhea reaction for uridine 2552 2-O-ribose methylation in 23S rRNA.
    supported_by:
    - reference_id: file:PSEPK/rlmE/rlmE-uniprot.txt
      supporting_text: Specifically methylates the uridine in position 2552
    - reference_id: file:PSEPK/rlmE/rlmE-uniprot.txt
      supporting_text: EC=2.1.1.166
    - reference_id: file:PSEPK/rlmE/rlmE-goa.tsv
      supporting_text: "GO:0008650\trRNA (uridine-2'-O-ribose)-methyltransferase activity"
