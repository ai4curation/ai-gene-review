      supporting_text: "GO:0050918\tpositive chemotaxis"
    - reference_id: PMID:31452860
      supporting_text: The phosphorylated form of CheY (CheY-P), which serves as a signaling
        molecule, binds to FliM and FliN in the C ring to switch the direction of flagellar
        motor rotation from CCW to CW.
