    id: GO:0050918
    label: positive chemotaxis
  evidence_type: IEA
  original_reference_id: GO_REF:0000118
  qualifier: involved_in
  review:
    summary: Positive chemotaxis is too direction-specific for this switch-complex subunit.
    action: MODIFY
    reason: FliM-family switch proteins participate in chemotactic motor control, but this
      evidence does not establish a specific positive-chemotaxis role. Use chemotaxis for
      the behavioral process and flagellum-dependent cell motility for the direct motor process.
    proposed_replacement_terms:
    - id: GO:0006935
      label: chemotaxis
    supported_by:
