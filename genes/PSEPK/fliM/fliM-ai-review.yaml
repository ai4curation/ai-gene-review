status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: fliM encodes a flagellar motor switch protein in Pseudomonas putida KT2440. The
  protein is part of the conserved FliG/FliM/FliN C-ring switch complex at the cytoplasmic
  face of the flagellar basal body. Its primary role is in flagellar motor switching and flagellum-dependent
  motility, with chemotaxis represented as the upstream behavioral signaling context rather
  than an independent enzymatic activity.
