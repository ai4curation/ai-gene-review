suggested_questions:
- question: How does fliM interact with the other KT2440 C-ring components and with CheY-P
    during switching?
- question: Does fliM contribute to differential MotAB versus MotCD stator usage under high-load
    or agar conditions?
suggested_experiments:
- description: Construct a fliM deletion and chromosomal complementation strain, then assay
    swimming trajectories, rotation-direction bias, and flagellation.
- description: Use bacterial two-hybrid or pull-down assays to test fliM interactions with
    FliG/FliM/FliN partners, CheY, and FliH where relevant.
