core_functions:
- description: fliM is a C-ring switch/rotor component of the bacterial flagellar motor. Together
    with the other FliG/FliM/FliN proteins it forms the rotor-mounted switch complex at the
    basal body, receives chemotaxis-output control through CheY-P-dependent C-ring remodeling,
    and controls flagellar rotation direction for motility.
