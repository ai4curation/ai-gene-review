description: kdpA encodes the potassium-binding and translocating membrane subunit of the Kdp high-affinity
  potassium transport system in Pseudomonas putida KT2440. Reviewed HAMAP annotation states that KdpA
  binds periplasmic potassium ions and delivers them to the KdpB membrane domain.
