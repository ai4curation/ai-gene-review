  title: Gene Ontology annotation through association of InterPro records with GO terms
  findings:
  - statement: InterPro2GO provides broad family/domain-based automated annotations that require specificity
      review against the precise enzyme activity.
- id: GO_REF:0000104
  title: Electronic Gene Ontology annotations created by transferring manual GO annotations between related
    proteins based on shared sequence features
  findings:
  - statement: Sequence-feature transfer supports conserved enzyme and cofactor terms but may over-propagate
      broad process terms.
- id: GO_REF:0000117
  title: Electronic Gene Ontology annotations created by ARBA machine learning models
  findings:
  - statement: ARBA supplies automated annotations that are reviewed here for specificity and pathway
      scope.
- id: GO_REF:0000120
  title: Combined Automated Annotation using Multiple IEA Methods
  findings:
  - statement: The combined UniProt automated pipeline supplies IEA annotations that are checked here
      against enzyme chemistry and pathway context.
- id: file:PSEPK/rpe/rpe-uniprot.txt
  title: UniProt record for rpe (Q88QS3)
  findings:
  - statement: UniProt provides the enzyme name, EC/family/domain context, GO cross-references, and pathway
      statements used for first-pass PPP curation of rpe.
- id: file:PSEPK/rpe/rpe-deep-research-asta.md
  title: Asta retrieval report for rpe
  findings:
  - statement: Asta retrieval was generated for this first-pass review; retrieved papers were mostly generic
      or indirect, so mechanistic decisions are anchored primarily to UniProt/GOA and organism-specific
      literature where available.
