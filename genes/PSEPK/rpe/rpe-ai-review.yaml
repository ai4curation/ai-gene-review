id: Q88QS3
gene_symbol: rpe
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: >-
  rpe (PP_0415) encodes ribulose-phosphate 3-epimerase, a metal-dependent
  enzyme that reversibly interconverts D-ribulose 5-phosphate and D-xylulose
  5-phosphate. This reaction supplies xylulose 5-phosphate for transketolase in
  the non-oxidative pentose phosphate pathway and connects pentose-phosphate
  rearrangements to central carbon metabolism.
existing_annotations:
- term:
    id: GO:0004750
    label: D-ribulose-phosphate 3-epimerase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: >-
      This is the precise catalytic activity of Rpe. UniProt states that Q88QS3
      catalyzes reversible epimerization of ribulose 5-phosphate to xylulose
      5-phosphate, and GOA links the term to RHEA:13677 and EC 5.1.3.1.
    action: ACCEPT
    reason: >-
      GO:0004750 is the defining molecular function for the gene product.
    supported_by:
    - reference_id: file:PSEPK/rpe/rpe-uniprot.txt
      supporting_text: "CC   -!- FUNCTION: Catalyzes the reversible epimerization of D-ribulose 5-"
    - reference_id: file:PSEPK/rpe/rpe-goa.tsv
      supporting_text: "GO:0004750\tD-ribulose-phosphate 3-epimerase activity"
    - reference_id: file:PSEPK/rpe/rpe-deep-research-openscientist.md
      supporting_text: The primary function of Q88QS3 is to catalyze the **reversible epimerization at C3 of D-ribulose-5-phosphate to yield D-xylulose-5-phosphate**
- term:
    id: GO:0005737
    label: cytoplasm
  evidence_type: IEA
  original_reference_id: GO_REF:0000117
  qualifier: located_in
  review:
    summary: >-
      Cytoplasmic localization is consistent with a soluble bacterial central
      carbon enzyme acting on sugar phosphates.
    action: KEEP_AS_NON_CORE
    reason: >-
      Retain as localization context; the enzymatic activity is the core
      function.
    supported_by:
    - reference_id: file:PSEPK/rpe/rpe-goa.tsv
      supporting_text: "GO:0005737\tcytoplasm"
    - reference_id: file:PSEPK/rpe/rpe-deep-research-openscientist.md
      supporting_text: All lines of evidence place Rpe in the **cytoplasm**
- term:
    id: GO:0005975
    label: carbohydrate metabolic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: involved_in
  review:
    summary: >-
      The broad carbohydrate metabolic process term is compatible with Rpe but
      less informative than the pentose-phosphate shunt and exact enzyme
      activity annotations.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      This broad parent process adds little once GO:0006098 and GO:0004750 are
      present.
- term:
    id: GO:0006098
    label: pentose-phosphate shunt
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: involved_in
  review:
    summary: >-
      Rpe supplies xylulose 5-phosphate for the non-oxidative PPP, so the
      pathway annotation is appropriate.
    action: ACCEPT
    reason: >-
      The pathway term matches the enzyme's direct role in pentose-phosphate
      interconversion.
    supported_by:
    - reference_id: file:PSEPK/rpe/rpe-goa.tsv
      supporting_text: "GO:0006098\tpentose-phosphate shunt"
- term:
    id: GO:0016857
    label: racemase and epimerase activity, acting on carbohydrates and derivatives
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: >-
      This parent MF is true for a ribulose-phosphate epimerase but redundant
      with the exact GO:0004750 activity.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      Prefer the specific catalytic activity already present in the annotation
      set.
- term:
    id: GO:0019323
    label: pentose catabolic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000104
  qualifier: involved_in
  review:
    summary: >-
      Rpe can participate in catabolic pentose-phosphate flux, but the reversible
      PPP epimerase role is broader than catabolism alone.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      GO:0006098 is the better process-level term for this central reversible
      step.
- term:
    id: GO:0046872
    label: metal ion binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000104
  qualifier: enables
  review:
    summary: >-
      Metal binding is a plausible catalytic cofactor property for Rpe; UniProt
      describes a divalent metal cation bound per subunit.
    action: KEEP_AS_NON_CORE
    reason: >-
      Keep as mechanistic context, not as the primary molecular function.
    supported_by:
