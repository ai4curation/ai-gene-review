taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: Ribulose-phosphate 3-epimerase of Pseudomonas putida KT2440 (PP_0415). Rpe is a conserved
  soluble carbohydrate isomerase/epimerase that reversibly interconverts D-ribulose 5-phosphate and D-xylulose
  5-phosphate. This reaction supplies xylulose 5-phosphate for non-oxidative pentose phosphate rearrangements
  and connects pentose phosphate interconversion with broader pentose and carbohydrate metabolism.
existing_annotations:
