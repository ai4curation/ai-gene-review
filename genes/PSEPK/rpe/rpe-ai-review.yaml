    id: GO:0004750
    label: D-ribulose-phosphate 3-epimerase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: This exact molecular function captures the Rpe reaction, D-ribulose 5-phosphate to D-xylulose
      5-phosphate.
    action: ACCEPT
    reason: UniProt names Q88QS3 as ribulose-phosphate 3-epimerase and gives EC 5.1.3.1 with the Rhea
      reaction.
    supported_by:
