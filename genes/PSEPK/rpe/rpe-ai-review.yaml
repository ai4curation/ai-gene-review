      supporting_text: Reaction=D-ribulose 5-phosphate = D-xylulose 5-phosphate;
- term:
    id: GO:0005737
    label: cytoplasm
  evidence_type: IEA
  original_reference_id: GO_REF:0000117
  qualifier: located_in
  review:
    summary: Cytoplasm is consistent with a soluble bacterial pentose-phosphate enzyme acting on phosphorylated
      sugar intermediates.
    action: ACCEPT
    reason: The UniProt GO annotation places Rpe in the cytoplasm, and no membrane or secreted role is
      suggested.
    supported_by:
    - reference_id: file:PSEPK/rpe/rpe-uniprot.txt
      supporting_text: DR   GO; GO:0005737; C:cytoplasm; IEA:UniProtKB-ARBA.
- term:
    id: GO:0005975
    label: carbohydrate metabolic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: involved_in
  review:
    summary: Carbohydrate metabolic process is true at a high level but much less informative than the
      specific epimerase and PPP terms.
    action: MARK_AS_OVER_ANNOTATED
    reason: The annotation is a broad parent process for the precise pentose-phosphate interconversion
      step.
- term:
    id: GO:0006098
    label: pentose-phosphate shunt
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: involved_in
  review:
    summary: Rpe supplies xylulose 5-phosphate from ribulose 5-phosphate and is a strict non-oxidative
      PPP interconversion enzyme.
    action: ACCEPT
    reason: The reaction and UniProt pathway annotation support placement in the pentose phosphate pathway.
    supported_by:
    - reference_id: file:PSEPK/rpe/rpe-uniprot.txt
      supporting_text: DR   GO; GO:0006098; P:pentose-phosphate shunt; IEA:UniProtKB-UniRule.
- term:
    id: GO:0016857
    label: racemase and epimerase activity, acting on carbohydrates and derivatives
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: This parent racemase/epimerase term is compatible with Rpe chemistry but redundant with GO:0004750.
    action: MARK_AS_OVER_ANNOTATED
    reason: The specific D-ribulose-phosphate 3-epimerase term captures the actual molecular function
      more precisely.
- term:
    id: GO:0019323
    label: pentose catabolic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000104
  qualifier: involved_in
  review:
    summary: Pentose catabolic process is plausible but overstates a generic catabolic direction for a
      reversible pentose-phosphate interconversion enzyme.
    action: MARK_AS_OVER_ANNOTATED
    reason: Rpe functions in reversible PPP sugar-phosphate interconversion and biosynthetic/catabolic
      routing; GO:0006098 is the better pathway-level term.
- term:
    id: GO:0046872
    label: metal ion binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000104
  qualifier: enables
  review:
    summary: Metal ion binding is mechanistically plausible for ribulose-phosphate 3-epimerase, but it
      is a secondary cofactor/property annotation rather than the core function.
    action: KEEP_AS_NON_CORE
    reason: UniProt transfers metal-binding features for the family, while the core annotation should
      remain the specific epimerase activity.
    supported_by:
    - reference_id: file:PSEPK/rpe/rpe-uniprot.txt
      supporting_text: DR   GO; GO:0046872; F:metal ion binding; IEA:UniProtKB-UniRule.
references:
