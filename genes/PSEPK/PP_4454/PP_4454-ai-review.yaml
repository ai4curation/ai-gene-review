  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: PP_4454 encodes a predicted multi-pass permease subunit of an opine/glutathione-like ABC import locus in Pseudomonas putida KT2440. UniProt names it as an opine ABC transporter permease, while adjacent gsiA and gsiC are glutathione-import subunits; this first pass therefore keeps the exact transported substrate range as unresolved.
