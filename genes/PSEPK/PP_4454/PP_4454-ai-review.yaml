suggested_questions:
- question: What substrate range is transported by the PP_4454-containing ABC importer in P. putida KT2440, and how are peptide, glutathione, and opine-like substrates partitioned among related loci?
suggested_experiments:
- description: Compare wild type, PP_4454 deletion, and complemented strains for uptake or growth on candidate dipeptide, glutathione, and opine substrates using LC-MS or radiotracer assays.
  experiment_type: targeted transporter mutant substrate-uptake assay
