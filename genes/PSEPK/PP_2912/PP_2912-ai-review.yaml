description: PP_2912 encodes an inferred RIO-type serine/threonine protein kinase-like
  protein with a conserved RIO kinase domain. Its currently supported molecular
  function is ATP-dependent protein serine/threonine kinase activity inferred
  from UniProt and InterPro-family evidence.
