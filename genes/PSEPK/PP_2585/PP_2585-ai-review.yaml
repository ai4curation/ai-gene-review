taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: >-
  PP_2585 encodes an aldehyde dehydrogenase-family enzyme in Pseudomonas putida
  KT2440 that is computationally annotated as 2,5-dioxovalerate dehydrogenase.
  The predicted chemistry oxidizes 2,5-dioxopentanoate to 2-oxoglutarate with
  NAD+ or NADP+, making it a candidate sugar-acid or oxoaldehyde catabolism
  enzyme in the pentose/glucuronate map.
