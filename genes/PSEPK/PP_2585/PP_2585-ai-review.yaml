    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      PP_2585 is annotated with specific NAD+ and NADP+ 2,5-dioxovalerate
      dehydrogenase reactions, so the parent oxidoreductase term should not be
      treated as the core function.
