      supporting_text: 'CC       bind to the biotin operator site and inhibit transcription of the'
- term:
    id: GO:0004077
    label: biotin--[biotin carboxyl-carrier protein] ligase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: Biotin-protein ligase activity is the core enzymatic function of BirA.
    action: ACCEPT
    reason: UniProt identifies BirA as a biotin-[acetyl-CoA-carboxylase] ligase and
      records the ATP-dependent protein biotinylation reaction.
    supported_by:
    - reference_id: file:PSEPK/birA/birA-goa.tsv
      supporting_text: "GO:0004077\tbiotin--[biotin carboxyl-carrier protein] ligase activity"
    - reference_id: file:PSEPK/birA/birA-uniprot.txt
      supporting_text: 'CC   -!- FUNCTION: Acts both as a biotin--[acetyl-CoA-carboxylase] ligase and a'
- term:
    id: GO:0005524
    label: ATP binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000104
  qualifier: enables
  review:
    summary: ATP binding is expected for BirA ligase chemistry but is not independently
      informative.
    action: KEEP_AS_NON_CORE
    reason: ATP participates in formation of the biotinyl-adenylate intermediate; the
      specific ligase activity is the core molecular function.
    supported_by:
    - reference_id: file:PSEPK/birA/birA-goa.tsv
      supporting_text: "GO:0005524\tATP binding"
- term:
    id: GO:0005737
    label: cytoplasm
  evidence_type: IEA
  original_reference_id: GO_REF:0000118
  qualifier: located_in
  review:
    summary: Cytoplasmic localization is plausible context for bacterial BirA.
    action: KEEP_AS_NON_CORE
    reason: The location is compatible with BirA's ligase and repressor functions, but
      it is not the central curation claim.
    supported_by:
    - reference_id: file:PSEPK/birA/birA-goa.tsv
      supporting_text: "GO:0005737\tcytoplasm"
- term:
    id: GO:0006355
    label: regulation of DNA-templated transcription
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: involved_in
  review:
    summary: Regulation of DNA-templated transcription is supported for the biotin
      operon repressor function of BirA.
    action: ACCEPT
    reason: UniProt states that holoBirA can bind the biotin operator and inhibit
      operon transcription. The current term is broad but appropriate for a first-pass
      review.
    supported_by:
    - reference_id: file:PSEPK/birA/birA-goa.tsv
      supporting_text: "GO:0006355\tregulation of DNA-templated transcription"
    - reference_id: file:PSEPK/birA/birA-uniprot.txt
      supporting_text: 'CC       operon. {ECO:0000256|HAMAP-Rule:MF_00978}.'
