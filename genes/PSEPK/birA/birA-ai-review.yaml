id: Q88QQ1
gene_symbol: birA
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: birA encodes the bifunctional biotin-protein ligase and biotin operon
  repressor in Pseudomonas putida KT2440. It biotinylates biotin carboxyl carrier
  proteins and, as holoBirA, binds the biotin operator to regulate transcription of
  biotin-biosynthesis genes.
existing_annotations:
- term:
    id: GO:0003677
    label: DNA binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000104
  qualifier: enables
  review:
    summary: DNA binding is a real part of BirA's repressor role, though generic.
    action: ACCEPT
    reason: UniProt states that holoBirA binds the biotin operator site and inhibits
      transcription of the operon. A more specific operator-binding term may be useful
      later, but the current GOA term is directionally correct.
    supported_by:
    - reference_id: file:PSEPK/birA/birA-goa.tsv
