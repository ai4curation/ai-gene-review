description: pgm (PP_3578) encodes an alpha-D-phosphohexomutase family phosphoglucomutase. It catalyzes the reversible conversion of alpha-D-glucose 1-phosphate and alpha-D-glucose 6-phosphate, linking central hexose-phosphate metabolism with nucleotide-sugar and storage/carbohydrate biosynthetic pools. Related phosphopentomutase and salvage annotations are plausible family-level inferences but are not the defining function in this record.
