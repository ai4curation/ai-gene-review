    id: GO:0008641
    label: ubiquitin-like modifier activating enzyme activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: This electronic annotation conflates MoeB-mediated acyl-adenylation with E1-like thiolester-forming modifier activation.
    action: REMOVE
    reason: >-
      The live GO:0008641 definition requires ATP-dependent formation of a
      high-energy thiolester bond. Q88PW3 is supported only as the enzyme that
      adenylates the C-terminal carboxylate of the MoaD sulfur carrier; that
      acyl-adenylate step does not itself perform the E1 thiolester chemistry
      specified by the term.
    supported_by:
