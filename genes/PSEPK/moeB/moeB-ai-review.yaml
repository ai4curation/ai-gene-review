taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: >-
  moeB encodes the cytosolic molybdopterin-synthase sulfur-carrier
  adenylyltransferase. MoeB uses ATP to adenylate the C-terminal glycine of MoaD,
  activating the carrier for thiocarboxylate formation and subsequent sulfur
  donation during molybdopterin synthesis.
