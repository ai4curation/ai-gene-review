  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: gor encodes glutathione reductase in Pseudomonas putida KT2440. The protein is a FAD/NADP-dependent pyridine nucleotide-disulfide oxidoreductase that reduces glutathione disulfide to glutathione, supporting glutathione redox cycling and oxidative-stress defense.
