description: PP_3087 encodes an unreviewed UvrA-family ATPase-like protein with ABC/P-loop ATPase and UvrA DNA-binding-domain
  signatures. KEGG places it in the Pseudomonas putida nucleotide-excision repair map, but the current GOA set supports only
  ATP-binding/hydrolysis and cytoplasmic localization, so this first pass treats it as a candidate UvrA-like NER boundary
  component.
