  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: efp encodes elongation factor P, a cytoplasmic bacterial translation factor that stimulates peptide-bond formation during elongation and helps rescue ribosomes stalled on difficult motifs such as polyproline sequences. In pseudomonads, EF-P function depends on EarP-mediated rhamnosylation of a conserved arginine.
