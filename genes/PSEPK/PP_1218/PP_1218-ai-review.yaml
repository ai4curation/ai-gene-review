  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: 'PP_1218 encodes a hotdog-fold acyl-CoA thioesterase-family protein, related to 4-hydroxybenzoyl-CoA
  thioesterases. The current annotation supports thioester hydrolase activity, but the physiological acyl-CoA
  substrate in KT2440 is not established.'
existing_annotations:
