    id: GO:0016787
    label: hydrolase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: Hydrolase activity is too broad for a predicted acyl-CoA thioesterase.
    action: MARK_AS_OVER_ANNOTATED
    reason: GO:0016790 provides a more informative thioester hydrolase class.
- term:
    id: GO:0016790
    label: thiolester hydrolase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: Thiolester hydrolase activity is the best supported current molecular-function term.
    action: ACCEPT
    reason: The UniProt description and hotdog thioesterase-family domains support acyl-CoA
      thioester hydrolysis.
- term:
    id: GO:0047617
    label: fatty acyl-CoA hydrolase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000118
  qualifier: enables
  review:
    summary: The fatty acyl-CoA substrate specificity is not established for this protein.
    action: UNDECIDED
    reason: The family is related to aromatic acyl-CoA thioesterases, so a fatty-acyl-CoA-specific
      annotation should not be accepted without stronger evidence.
