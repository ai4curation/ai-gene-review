taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: mcpU encodes an inner-membrane methyl-accepting chemotaxis receptor for polyamines.
  The receptor binds putrescine, cadaverine, spermidine, agmatine, and related amines and
  mediates chemotaxis toward polyamine signals that also contribute to plant-root colonization
  phenotypes.
