id: Q88R41
gene_symbol: hisF
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: >-
  hisF encodes the cyclase subunit of imidazole-glycerol-phosphate synthase
  (IGPS). In complex with the HisH glutaminase subunit, HisF converts PRFAR to
  imidazole-glycerol phosphate and AICAR using ammonia channelled from HisH.
  This reaction is the fifth step of L-histidine biosynthesis and also returns
  the ATP-derived AICAR moiety to purine metabolism. HisF is the catalytic
  scaffold for the cyclization chemistry but the physiological glutamine-
  dependent reaction requires HisH.
