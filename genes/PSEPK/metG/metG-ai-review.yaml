id: Q88NV7
gene_symbol: metG
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: MetG (PP_1097) is the cytosolic methionine--tRNA ligase, or methionyl-tRNA synthetase, that charges tRNA(Met) with L-methionine using ATP to form L-methionyl-tRNA(Met), AMP, and diphosphate. Its primary role is methionyl-tRNA aminoacylation for protein translation. In the KEGG selenocompound metabolism map it is boundary context for sulfur/selenium analog and methionine-related chemistry rather than a selenium-specific enzyme.
existing_annotations:
- term:
    id: GO:0000049
    label: tRNA binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: tRNA binding is required for MetG function but is not the most informative molecular function.
    action: KEEP_AS_NON_CORE
    reason: MetG binds tRNA(Met) as a substrate during methionyl-tRNA formation. Retain this as substrate-binding context; the core function is methionine-tRNA ligase activity.
    supported_by:
    - reference_id: file:PSEPK/metG/metG-uniprot.txt
      supporting_text: Reaction=tRNA(Met) + L-methionine + ATP = L-methionyl-tRNA(Met) + AMP +
    - reference_id: file:PSEPK/metG/metG-goa.tsv
      supporting_text: tRNA binding
- term:
    id: GO:0000166
    label: nucleotide binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: Nucleotide binding is a broad domain-level annotation for an ATP-dependent ligase.
    action: MARK_AS_OVER_ANNOTATED
    reason: MetG has a specific ATP-consuming methionine-tRNA ligase activity. The generic nucleotide binding annotation adds little beyond the specific activity and ATP-binding context.
    supported_by:
    - reference_id: file:PSEPK/metG/metG-uniprot.txt
      supporting_text: EC=6.1.1.10
    - reference_id: file:PSEPK/metG/metG-goa.tsv
      supporting_text: nucleotide binding
