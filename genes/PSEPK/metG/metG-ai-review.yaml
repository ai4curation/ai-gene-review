    label: cytosol
  evidence_type: IEA
  original_reference_id: GO_REF:0000118
  qualifier: located_in
  review:
    summary: Cytosol is consistent with the bacterial soluble translation enzyme context and overlaps the cytoplasm annotation.
    action: KEEP_AS_NON_CORE
    reason: The TreeGrafter cytosol annotation is plausible for a soluble methionyl-tRNA synthetase, but the reviewed functional annotation should emphasize methionyl-tRNA aminoacylation.
    supported_by:
    - reference_id: file:PSEPK/metG/metG-goa.tsv
      supporting_text: cytosol
