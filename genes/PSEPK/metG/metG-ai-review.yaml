- term:
    id: GO:0005737
    label: cytoplasm
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: located_in
  review:
    summary: Cytoplasm is the expected location for bacterial methionyl-tRNA synthetase.
    action: KEEP_AS_NON_CORE
    reason: MetG is a soluble bacterial translation enzyme acting on cytoplasmic tRNA. Keep the location as context rather than as a core function.
    supported_by:
    - reference_id: file:PSEPK/metG/metG-goa.tsv
      supporting_text: cytoplasm
- term:
