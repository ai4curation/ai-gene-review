- term:
    id: GO:0005524
    label: ATP binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: ATP binding is mechanistically relevant because ATP is a MetG substrate, but it is ancillary to the specific ligase function.
    action: KEEP_AS_NON_CORE
    reason: The MetG reaction consumes ATP during aminoacyl-adenylate formation and tRNA charging. Retain ATP binding as non-core substrate-binding context.
    supported_by:
    - reference_id: file:PSEPK/metG/metG-uniprot.txt
      supporting_text: Reaction=tRNA(Met) + L-methionine + ATP = L-methionyl-tRNA(Met) + AMP +
