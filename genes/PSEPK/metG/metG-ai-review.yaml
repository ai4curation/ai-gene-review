  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: Aminoacyl-tRNA ligase activity is correct but less specific than the accepted methionine-tRNA ligase function.
    action: MODIFY
    reason: UniProt and GOA identify MetG specifically as methionine--tRNA ligase, EC 6.1.1.10. The generic aminoacyl-tRNA ligase parent should be replaced by methionine-tRNA ligase activity.
    proposed_replacement_terms:
    - id: GO:0004825
      label: methionine-tRNA ligase activity
