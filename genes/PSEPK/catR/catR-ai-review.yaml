references:
- id: GO_REF:0000118
  title: TreeGrafter-generated GO annotations
  findings:
  - statement: TreeGrafter supplied broad transcription-factor annotations that require review against
      direct CatR literature.
- id: GO_REF:0000120
  title: Combined automated GO annotation using multiple IEA methods
  findings:
  - statement: Combined automated methods supplied protein-DNA complex and transcriptional regulation
      annotations for review.
- id: PMID:1649820
  title: Functional analysis of the Pseudomonas putida regulatory protein CatR
  findings:
  - statement: CatR specifically binds the catRBC promoter region and positively regulates catBC operon
      expression.
- id: PMID:9079907
  title: Activation of the catBCA promoter
  findings:
  - statement: In vitro transcription experiments show a requirement for CatR and cis,cis-muconate in
      catBCA promoter activation.
