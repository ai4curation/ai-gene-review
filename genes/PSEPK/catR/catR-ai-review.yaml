id: Q88GK5
gene_symbol: catR
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: catR encodes the LysR-family transcriptional activator CatR, which binds the divergent catRBC
  promoter region and activates catBCA/catBC expression in response to catechol-pathway inducer context
  such as cis,cis-muconate. Its core role is pathway-specific transcription activation of catechol branch
  genes rather than aromatic catabolism catalysis.
