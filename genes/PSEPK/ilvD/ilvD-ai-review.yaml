id: Q88CQ2
gene_symbol: ilvD
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: >-
  IlvD is the iron-sulfur-dependent dihydroxy-acid dehydratase that dehydrates
  the IlvC products in both valine and isoleucine biosynthesis. It forms
  2-oxoisovalerate or 3-methyl-2-oxopentanoate for terminal transamination by
  IlvE.
