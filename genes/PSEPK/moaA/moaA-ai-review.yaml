    summary: Generic metal-ion binding is compatible with the two iron-sulfur clusters but is non-core.
    action: KEEP_AS_NON_CORE
    reason: The more informative retained annotations specify iron-sulfur and [4Fe-4S] cluster binding.
- term:
    id: GO:0051536
    label: iron-sulfur cluster binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: Iron-sulfur cluster binding is a valid mechanistic property of MoaA.
    action: KEEP_AS_NON_CORE
    reason: Reviewed UniProt states that Q88E69 binds two [4Fe-4S] clusters.
- term:
    id: GO:0051539
    label: 4 iron, 4 sulfur cluster binding
  evidence_type: IEA
