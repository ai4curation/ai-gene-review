  qualifier: enables
  review:
    summary: The specific [4Fe-4S]-cluster binding annotation is supported but is not the catalytic function.
    action: KEEP_AS_NON_CORE
    reason: Reviewed UniProt explicitly assigns two [4Fe-4S] clusters to Q88E69.
- term:
    id: GO:0061798
    label: GTP 3',8'-cyclase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: GTP 3',8'-cyclase activity is the exact core molecular function of canonical KT2440 MoaA.
    action: ACCEPT
    reason: The reviewed entry supplies the exact reaction, Rhea:49576, and EC 4.1.99.22.
    supported_by:
    - reference_id: file:PSEPK/moaA/moaA-uniprot.txt
      supporting_text: |-
        CC   -!- CATALYTIC ACTIVITY:
        CC       Reaction=GTP + AH2 + S-adenosyl-L-methionine = (8S)-3',8-cyclo-7,8-
