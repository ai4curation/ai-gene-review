        CC         A + H(+); Xref=Rhea:RHEA:49576, ChEBI:CHEBI:13193, ChEBI:CHEBI:15378,
        CC         ChEBI:CHEBI:17319, ChEBI:CHEBI:17499, ChEBI:CHEBI:37565,
        CC         ChEBI:CHEBI:57844, ChEBI:CHEBI:59789, ChEBI:CHEBI:131766;
        CC         EC=4.1.99.22; Evidence={ECO:0000255|HAMAP-Rule:MF_01225};
- term:
    id: GO:0061799
    label: cyclic pyranopterin monophosphate synthase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000118
  qualifier: enables
  review:
    summary: Cyclic pyranopterin monophosphate synthase activity belongs to MoaC, not MoaA.
    action: REMOVE
    reason: MoaA makes the cyclic GTP intermediate; the distinct MoaC enzyme converts that intermediate to cPMP.
    supported_by:
    - reference_id: file:PSEPK/moaA/moaA-uniprot.txt
      supporting_text: "DE   RecName: Full=GTP 3',8-cyclase {ECO:0000255|HAMAP-Rule:MF_01225};"
    - reference_id: file:PSEPK/moaC/moaC-uniprot.txt
      supporting_text: "DE   RecName: Full=Cyclic pyranopterin monophosphate synthase {ECO:0000255|HAMAP-Rule:MF_01224};"
- term:
    id: GO:1904047
    label: S-adenosyl-L-methionine binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000104
  qualifier: enables
  review:
    summary: SAM binding is a valid radical-SAM mechanistic property but is not the core catalytic annotation.
    action: KEEP_AS_NON_CORE
    reason: S-adenosyl-L-methionine is a reactant coordinated by one of the two [4Fe-4S] clusters.
