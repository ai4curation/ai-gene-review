  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: moaA (PP_4597) encodes the canonical MoaA radical-SAM GTP 3',8-cyclase for the first committed step of Mo-molybdopterin
  cofactor biosynthesis. It is a MoCo side-branch enzyme in ppu00790, not a strict tetrahydrofolate-biosynthesis enzyme.
