    id: GO:0005525
    label: GTP binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000104
  qualifier: enables
  review:
    summary: GTP binding is a valid substrate-binding property but is less informative than the catalytic term.
    action: KEEP_AS_NON_CORE
