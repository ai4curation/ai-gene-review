id: Q88E69
gene_symbol: moaA
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: >-
  moaA encodes the canonical radical-SAM GTP 3',8'-cyclase of Pseudomonas putida
  KT2440. It binds two [4Fe-4S] clusters and converts GTP to the cyclic intermediate
  that MoaC rearranges to cyclic pyranopterin monophosphate during the first stage of
  molybdenum-cofactor biosynthesis.
existing_annotations:
