    id: GO:0003824
    label: catalytic activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: The generic catalytic-activity term should be replaced by the exact MoaA reaction.
    action: MODIFY
    reason: Reviewed UniProt/HAMAP assigns EC 4.1.99.22 GTP 3',8'-cyclase activity to Q88E69.
    proposed_replacement_terms:
    - id: GO:0061798
      label: GTP 3',8'-cyclase activity
    supported_by:
