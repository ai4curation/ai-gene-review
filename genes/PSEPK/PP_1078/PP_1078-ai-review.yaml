  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: PP_1078 encodes an unresolved ABC transporter ATP-binding protein with ABC ATPase, TOBE/OB-fold, and small-molecule-importer
  family signatures. Existing iron, ferric-iron, quaternary-ammonium, and generic transmembrane-transporter annotations are
  not supported by local transporter context; the defensible first-pass role is an ATP-hydrolyzing ABC energy-coupling component
  of unknown substrate specificity.
