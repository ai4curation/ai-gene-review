description: ruvA (PP_1216) encodes the DNA-binding recognition subunit of the bacterial RuvAB Holliday junction branch-migration
  machinery. RuvA binds four-way DNA junctions, holds the junction open, and recruits or organizes RuvB motor subunits for
  ATP-dependent branch migration before RuvC-mediated resolution.
