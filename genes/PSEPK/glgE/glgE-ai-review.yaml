    label: glycosyltransferase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: Glycosyltransferase activity is correct but too broad.
    action: MODIFY
    reason: UniProt identifies GlgE as a maltosyltransferase and GOA already carries the more specific hexosyltransferase activity.
    proposed_replacement_terms:
    - id: GO:0016758
      label: hexosyltransferase activity
    supported_by:
