id: Q88FM9
gene_symbol: glgE
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: glgE encodes an alpha-1,4-glucan:maltose-1-phosphate maltosyltransferase in Pseudomonas putida KT2440. It is predicted to elongate alpha-1,4-glucans from maltose 1-phosphate in the TreS/Mak/GlgE alpha-glucan biosynthetic route.
existing_annotations:
- term:
    id: GO:0004553
    label: hydrolase activity, hydrolyzing O-glycosyl compounds
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: The hydrolase annotation appears to reflect GH13 fold membership rather than the GlgE reaction.
    action: REMOVE
    reason: UniProt describes GlgE as a maltosyltransferase using maltose 1-phosphate to elongate alpha-glucans; this is transferase chemistry, not O-glycosyl hydrolase activity.
    supported_by:
    - reference_id: file:PSEPK/glgE/glgE-uniprot.txt
      supporting_text: "Maltosyltransferase that uses maltose 1-phosphate"
    - reference_id: file:PSEPK/glgE/glgE-uniprot.txt
      supporting_text: "Belongs to the glycosyl hydrolase 13 family. GlgE"
    - reference_id: file:PSEPK/glgE/glgE-goa.tsv
      supporting_text: hydrolase activity, hydrolyzing O-glycosyl compounds
- term:
    id: GO:0005975
    label: carbohydrate metabolic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: involved_in
  review:
    summary: Carbohydrate metabolic process is correct but broad.
    action: KEEP_AS_NON_CORE
    reason: GlgE acts in alpha-glucan biosynthesis from trehalose-derived maltose 1-phosphate; carbohydrate metabolism is accurate but not specific.
    supported_by:
    - reference_id: file:PSEPK/glgE/glgE-uniprot.txt
      supporting_text: "involved in a branched alpha-glucan biosynthetic pathway"
    - reference_id: file:PSEPK/glgE/glgE-goa.tsv
      supporting_text: carbohydrate metabolic process
- term:
