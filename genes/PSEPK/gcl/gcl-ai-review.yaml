      supporting_text: "The **primary function** of the Gcl gene product is to catalyze the decarboxylative condensation of **two molecules of glyoxylate** into **tartronate semialdehyde**"
- term:
    id: GO:0009099
    label: L-valine biosynthetic process
  evidence_type: IEA
