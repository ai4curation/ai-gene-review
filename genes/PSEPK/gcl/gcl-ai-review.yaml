  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: Catalytic activity is true but too broad for this enzyme.
    action: MARK_AS_OVER_ANNOTATED
    reason: Tartronate-semialdehyde synthase activity captures the specific reaction catalyzed by Gcl.
    supported_by:
