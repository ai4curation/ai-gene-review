id: Q88F03
gene_symbol: gcl
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: >-
  gcl encodes glyoxylate carboligase, a thiamine-diphosphate enzyme in the
  glyoxylate/tartronate semialdehyde branch. It condenses two glyoxylate
  molecules to 2-hydroxy-3-oxopropanoate (tartronate semialdehyde), linking
  glyoxylate catabolism to downstream glycerate formation in KT2440.
existing_annotations:
- term:
    id: GO:0000287
    label: magnesium ion binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: Magnesium binding is consistent with the TPP-dependent glyoxylate carboligase enzyme family.
    action: ACCEPT
    reason: The UniProt record lists a magnesium cofactor and InterPro supports the TPP-enzyme domain architecture.
    supported_by:
    - reference_id: file:PSEPK/gcl/gcl-goa.tsv
