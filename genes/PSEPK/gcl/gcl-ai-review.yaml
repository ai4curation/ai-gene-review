- term:
    id: GO:0030976
    label: thiamine pyrophosphate binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: TPP binding is expected for this glyoxylate carboligase.
    action: ACCEPT
    reason: The protein is a TPP-enzyme family member and the catalytic reaction is TPP-dependent.
    supported_by:
    - reference_id: file:PSEPK/gcl/gcl-uniprot.txt
      supporting_text: "DR   InterPro; IPR045229; TPP_enz."
    - reference_id: file:PSEPK/gcl/gcl-goa.tsv
      supporting_text: "UniProtKB\tQ88F03\tgcl\tenables\tGO:0030976\tthiamine pyrophosphate binding"
- term:
    id: GO:0050660
    label: flavin adenine dinucleotide binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000118
  qualifier: enables
  review:
    summary: FAD binding is plausible cofactor context for glyoxylate carboligase, but the catalytic role is better captured by tartronate-semialdehyde synthase activity.
    action: KEEP_AS_NON_CORE
    reason: OpenScientist and family evidence support Gcl as a ThDP/TPP-family enzyme with FAD binding; FAD is retained as cofactor context rather than treated as the core function.
    supported_by:
    - reference_id: file:PSEPK/gcl/gcl-uniprot.txt
      supporting_text: "DR   InterPro; IPR029035; DHS-like_NAD/FAD-binding_dom."
    - reference_id: file:PSEPK/gcl/gcl-deep-research-openscientist.md
      supporting_text: "The Gcl enzyme is a thiamine-pyrophosphate (TPP)- and FAD-dependent enzyme."
references:
