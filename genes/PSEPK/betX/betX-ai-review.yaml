taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: betX (PP_1741) encodes a signal-peptide-bearing substrate-binding component of the choline/betaine/carnitine ABC transporter family. Its product name, OpuAC/ABC glycine-betaine substrate-binding domain, and retrieved Cbc-family evidence support a compatible-solute recognition role, with glycine betaine as the strongest first-pass core substrate call.
