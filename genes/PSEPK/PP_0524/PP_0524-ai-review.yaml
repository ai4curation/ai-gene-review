description: PP_0524 encodes a predicted signal-peptide-bearing periplasmic cobalamin-binding protein in the PP_0524-PP_0525
  vitamin B12 uptake neighborhood. UniProt names the protein HutB and records an ABC-transporter solute-binding fold with
  a vitamin B12-binding signature. The lone GOA iron-response annotation is treated as a family-transfer spillover rather
  than the gene's core role.
