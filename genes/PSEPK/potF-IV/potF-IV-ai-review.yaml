description: potF-IV (PP_5341) encodes a predicted PotF-like periplasmic putrescine/polyamine substrate-binding protein in
  Pseudomonas putida KT2440. UniProt, InterPro/GOA, and Asta retrieval support periplasmic polyamine binding and polyamine-transport
  component context, while the cognate membrane permease and ATP-binding partners for this paralog remain unresolved.
