suggested_questions:
- question: What is the direct PqqF substrate in KT2440 PQQ biosynthesis, and does PP_0375 or another cellular protease contribute independently to precursor processing?
suggested_experiments:
- hypothesis: PqqF is the zinc metalloendopeptidase that processes PqqA-derived intermediates during KT2440 PQQ maturation.
  description: Compare PqqA-derived peptide fragments and PQQ accumulation in wild-type, pqqF deletion, and catalytic-site (Zn-binding) mutant strains using targeted LC-MS/MS, paralleling the in vitro PqqA cleavage assays established for the Methylorubrum extorquens PqqF/PqqG protease.
  experiment_type: genetics plus peptidomics
