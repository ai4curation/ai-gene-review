  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: pqqF (PP_0381, Q88QV3) encodes a 766-residue, zinc-dependent peptidase M16-family metalloendopeptidase associated with pyrroloquinoline quinone (PQQ) biosynthesis in P. putida KT2440. It lies in the chromosomal PQQ biosynthesis locus organized pqqFABCDEG, where pqqF is transcribed independently of the core pqqCDEG module. Q88QV3 has the single-chain M16A-like PqqF architecture; the characterized Methylorubrum extorquens two-component M16B PqqF/PqqG protease is an alternative realization and does not establish a heterodimeric partner for Q88QV3. In particular, the adjacent KT2440 PP_0375 protein called a putative pqqG is an S9-family peptidase, not the homologous M16B PqqG subunit. PqqF is inferred from its family, locus, and characterized orthologs to process a PqqA-derived peptide during PQQ maturation. No KT2440-specific knockout or biochemical assay of Q88QV3 has been reported, and its exact substrate state remains unresolved.
