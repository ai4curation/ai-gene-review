suggested_questions:
- question: What is the direct PqqF substrate in KT2440 PQQ biosynthesis, and does it process PqqA-derived
    intermediates?
suggested_experiments:
- hypothesis: PqqF is the zinc metalloendopeptidase that processes PqqA-derived intermediates during PQQ
    maturation.
  description: Compare PqqA-derived peptide fragments and PQQ accumulation in wild-type, pqqF deletion,
    and catalytic-site mutant strains using targeted LC-MS/MS.
  experiment_type: genetics plus peptidomics
