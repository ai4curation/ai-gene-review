id: Q88QV3
gene_symbol: pqqF
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: pqqF encodes a zinc-dependent M16-family metalloendopeptidase required for PQQ biosynthesis
  in P. putida KT2440. The likely curated interpretation is a pathway-specific proteolytic maturation
  role in PQQ production rather than generic proteolysis.
existing_annotations:
- term:
    id: GO:0004222
    label: metalloendopeptidase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  review:
    summary: This is the best current molecular-function annotation for PqqF. UniProt assigns PqqF to
      the peptidase M16 family and the GOA record maps it to metalloendopeptidase activity.
    action: ACCEPT
    reason: The peptidase-family assignment and zinc cofactor support a metalloendopeptidase function
      in PQQ maturation.
    supported_by:
    - reference_id: file:PSEPK/pqqF/pqqF-uniprot.txt
      supporting_text: Belongs to the peptidase M16 family.
    - reference_id: file:PSEPK/pqqF/pqqF-goa.tsv
      supporting_text: "GO:0004222\tmetalloendopeptidase activity"
- term:
    id: GO:0006508
    label: proteolysis
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: Proteolysis is directionally correct for an M16 metalloendopeptidase, but it is too broad
      to represent the core biological role of this pathway enzyme.
    action: KEEP_AS_NON_CORE
    reason: The more informative biological process is pyrroloquinoline quinone biosynthesis.
    supported_by:
    - reference_id: file:PSEPK/pqqF/pqqF-uniprot.txt
      supporting_text: Belongs to the peptidase M16 family.
    - reference_id: file:PSEPK/pqqF/pqqF-goa.tsv
      supporting_text: "GO:0006508\tproteolysis"
- term:
    id: GO:0008270
    label: zinc ion binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: Zinc ion binding is consistent with the metalloendopeptidase assignment and should be retained
      as a non-core cofactor-binding annotation.
    action: KEEP_AS_NON_CORE
    reason: The core function is the pathway metalloendopeptidase activity, with zinc binding as a supporting
      cofactor feature.
    supported_by:
    - reference_id: file:PSEPK/pqqF/pqqF-uniprot.txt
      supporting_text: 'COFACTOR:'
    - reference_id: file:PSEPK/pqqF/pqqF-goa.tsv
      supporting_text: "GO:0008270\tzinc ion binding"
- term:
    id: GO:0018189
    label: pyrroloquinoline quinone biosynthetic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  review:
    summary: This is the correct core process annotation. PqqF is explicitly required for coenzyme PQQ
      biosynthesis and is part of the PQQ pathway.
    action: ACCEPT
    reason: The pathway-specific PQQ biosynthesis term captures the physiological context of the peptidase
      activity.
    supported_by:
    - reference_id: file:PSEPK/pqqF/pqqF-uniprot.txt
      supporting_text: Required for coenzyme pyrroloquinoline quinone (PQQ)
    - reference_id: file:PSEPK/pqqF/pqqF-uniprot.txt
      supporting_text: 'PATHWAY: Cofactor biosynthesis; pyrroloquinoline quinone biosynthesis.'
    - reference_id: file:PSEPK/pqqF/pqqF-goa.tsv
      supporting_text: "GO:0018189\tpyrroloquinoline quinone biosynthetic process"
- term:
    id: GO:0046872
    label: metal ion binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: Metal ion binding is overly broad once zinc ion binding and metalloendopeptidase activity
      are present.
    action: MARK_AS_OVER_ANNOTATED
    reason: Prefer the more specific zinc ion binding term for the cofactor feature.
    supported_by:
    - reference_id: file:PSEPK/pqqF/pqqF-goa.tsv
      supporting_text: "GO:0046872\tmetal ion binding"
    - reference_id: file:PSEPK/pqqF/pqqF-goa.tsv
      supporting_text: "GO:0008270\tzinc ion binding"
