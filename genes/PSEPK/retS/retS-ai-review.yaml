id: Q88DK1
gene_symbol: retS
product_type: PROTEIN
aliases:
  - PP_4824
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: >-
  retS (PP_4824) encodes a membrane-anchored hybrid sensor histidine kinase of
  the RetS/Gac signaling family. Domain architecture and orthology support
  phosphorelay sensor kinase activity, with an N-terminal 7TMR-DISM sensory
  region, a C-terminal histidine kinase module, and two receiver domains. In
  Pseudomonas putida KT2440, the direct gene-specific evidence currently
  supports an upstream negative regulatory role for RetS in K1 type VI
  secretion system expression during exponential growth. By contrast, the
  current hyperosmotic-response GO annotation appears to be a family-level
  transfer without direct KT2440 support.
references:
  - id: GO_REF:0000002
    title: Gene Ontology annotation through association of InterPro records with GO terms.
    findings:
      - statement: InterPro-based annotation correctly captures the phosphorelay
          sensor kinase and general signal transduction functions inferred from
          the hybrid histidine kinase architecture.
  - id: GO_REF:0000118
    title: TreeGrafter-generated GO annotations
    findings:
      - statement: TreeGrafter assigned a hyperosmotic-response term, but that
          specific process is not directly supported by KT2440 experimental
          evidence located for retS.
  - id: GO_REF:0000120
    title: Combined Automated Annotation using Multiple IEA Methods.
    findings:
      - statement: Automated methods recover protein histidine kinase activity
          for the RetS-family hybrid sensor kinase.
  - id: PMID:36748579
    title: Transcriptional organization and regulation of the Pseudomonas putida
      K1 type VI secretion system gene cluster.
    findings:
      - statement: retS mutation increases K1-T6SS gene expression in
          exponential phase.
      - statement: GacS positively regulates K1-T6SS expression, placing RetS in
          an antagonistic upstream regulatory relationship to this pathway.
  - id: PMID:12534463
    title: Complete genome sequence and comparative analysis of the metabolically
      versatile Pseudomonas putida KT2440.
    findings:
      - statement: Provides the original genome-scale identification of locus
          PP_4824 in Pseudomonas putida KT2440.
  - id: PMID:26913973
    title: The revisited genome of Pseudomonas putida KT2440 enlightens its value
      as a robust metabolic chassis.
    findings:
      - statement: Confirms the revised genome context and locus assignments for
          KT2440 genes including PP_4824.
  - id: UniProt:Q88DK1
    title: UniProt entry Q88DK1
    findings:
      - statement: Q88DK1 is a 923 aa membrane histidine kinase with 7TMR-DISM,
          HisKA, HATPase_c, and two response regulator domains.
      - statement: UniProt assigns GO:0000155 phosphorelay sensor kinase
          activity and records membrane-associated topology with multiple
          transmembrane helices.
  - id: KEGG:ppu:PP_4824
    title: KEGG gene entry for PP_4824
    findings:
      - statement: KEGG assigns PP_4824 to K20972 two-component system, sensor
          histidine kinase RetS.
  - id: file:PSEPK/retS/retS-notes.md
    title: Research notes on retS function
    findings:
      - statement: KEGG and UniProt support identification of PP_4824 as the
          KT2440 RetS-family hybrid sensor kinase.
      - statement: Direct KT2440 literature supports repression of K1-T6SS
          expression by RetS during exponential growth.
existing_annotations:
  - term:
      id: GO:0000155
      label: phosphorelay sensor kinase activity
    evidence_type: IEA
    original_reference_id: GO_REF:0000002
    review:
      summary: >-
        This is the best-supported core molecular function for retS. KEGG assigns
        PP_4824 to the RetS ortholog group, and UniProt domain architecture
        matches a membrane hybrid sensor kinase with a histidine kinase catalytic
        module and receiver domains.
      action: ACCEPT
      supported_by:
        - reference_id: file:PSEPK/retS/retS-notes.md
          supporting_text: PP_4824 is a RetS-family hybrid sensor kinase with
            7TMR-DISM, HisKA, and two receiver domains.
  - term:
      id: GO:0000160
      label: phosphorelay signal transduction system
    evidence_type: IEA
    original_reference_id: GO_REF:0000002
    review:
      summary: >-
        Accept as the core biological-process-level description. RetS is a
        hybrid two-component sensor kinase, and the KT2440 literature places it
        upstream in the Gac/RetS signaling network that controls K1-T6SS gene
        expression.
      action: ACCEPT
      supported_by:
        - reference_id: file:PSEPK/retS/retS-notes.md
          supporting_text: Direct KT2440 evidence supports an upstream signaling
            role for RetS in the Gac/RetS circuit.
  - term:
      id: GO:0004673
      label: protein histidine kinase activity
    evidence_type: IEA
    original_reference_id: GO_REF:0000120
    review:
      summary: >-
        This is a sound enzymatic description of the kinase chemistry carried by
        RetS. It is slightly less informative than GO:0000155 for this gene
        because it omits the sensor/phosphorelay context, but it is still
        correct.
      action: ACCEPT
      supported_by:
        - reference_id: UniProt:Q88DK1
          supporting_text: histidine kinase
  - term:
      id: GO:0007165
      label: signal transduction
    evidence_type: IEA
    original_reference_id: GO_REF:0000002
    review:
      summary: >-
        This annotation is correct but too broad to represent the core biology
        of retS on its own. The more informative phosphorelay-specific term
        GO:0000160 should carry the main process summary.
      action: KEEP_AS_NON_CORE
      supported_by:
        - reference_id: file:PSEPK/retS/retS-notes.md
          supporting_text: RetS acts upstream in the Gac/RetS signaling network.
  - term:
      id: GO:0016772
      label: transferase activity, transferring phosphorus-containing groups
    evidence_type: IEA
    original_reference_id: GO_REF:0000002
    review:
      summary: >-
        This is a very high-level parent term of the kinase annotations already
        present. It adds little beyond GO:0004673 and GO:0000155.
      action: MARK_AS_OVER_ANNOTATED
      reason: >-
        The specific kinase activities already capture the meaningful molecular
        function. Retaining this broad parent term would reduce interpretability
        without adding biological precision.
  - term:
      id: GO:0071474
      label: cellular hyperosmotic response
    evidence_type: IEA
    original_reference_id: GO_REF:0000118
    review:
      summary: >-
        Remove this annotation. The currently available KT2440-specific evidence
        supports RetS as a regulator of K1-T6SS expression, but does not support
        a direct role in cellular hyperosmotic response. This looks like an
        overextended family-based transfer.
      action: REMOVE
      reason: >-
        No direct KT2440 experimental evidence for osmotic-response biology was
        identified, whereas direct gene-specific evidence exists for T6SS
        regulation. The hyperosmotic-response assignment likely reflects
        TreeGrafter transfer from related hybrid sensor kinases rather than
        organism-specific validation.
      supported_by:
        - reference_id: file:PSEPK/retS/retS-notes.md
          supporting_text: The hyperosmotic-response assignment appears to be a
            family-transfer inference rather than direct KT2440 evidence.
  - term:
      id: GO:0033103
      label: protein secretion by the type VI secretion system
    qualifier: acts_upstream_of_negative_effect
    evidence_type: IMP
    original_reference_id: PMID:36748579
    review:
      summary: >-
        Add this as a new process annotation with an upstream negative-effect
        qualifier. In KT2440, retS mutants derepress K1-T6SS genes during
        exponential growth, indicating that RetS normally acts upstream to
        repress this secretion program.
      action: NEW
      reason: >-
        This is the most specific experimentally supported process currently
        available in GO for the KT2440 phenotype. Because GO lacks a dedicated
        type VI secretion negative-regulation term, the upstream negative-effect
        qualifier is the best fit.
      supported_by:
        - reference_id: file:PSEPK/retS/retS-notes.md
          supporting_text: The three genes were significantly upregulated in the
            retS mutant, indicating RetS normally represses K1-T6SS expression.
core_functions:
  - description: >-
      RetS is a membrane-anchored hybrid sensor histidine kinase that
      participates in phosphorelay signaling. In KT2440, the experimentally
      supported output currently tied to this signaling node is repression of
      K1-T6SS gene expression during exponential growth.
    molecular_function:
      id: GO:0000155
      label: phosphorelay sensor kinase activity
    directly_involved_in:
      - id: GO:0000160
        label: phosphorelay signal transduction system
    locations:
      - id: GO:0005886
        label: plasma membrane
    supported_by:
      - reference_id: file:PSEPK/retS/retS-notes.md
        supporting_text: RetS is a membrane hybrid sensor histidine kinase and
          upstream regulator of K1-T6SS expression.
proposed_new_terms:
  - proposed_name: negative regulation of protein secretion by the type VI secretion system
    proposed_definition: >-
      Any process that stops, prevents, or reduces the frequency, rate, or
      extent of protein secretion by the type VI secretion system.
    justification: >-
      GO currently provides GO:0033103 for type VI secretion itself and generic
      regulation-of-secretion terms, but lacks a type VI-specific negative
      regulation term. RetS-family regulators in Pseudomonas are experimentally
      shown to repress T6SS expression and activity, and a dedicated term would
      allow more precise annotation than a generic secretion-regulation parent or
      repeated use of qualifier-only workarounds.
    proposed_parent:
      id: GO:0050709
      label: negative regulation of protein secretion
    supported_by:
      - reference_id: file:PSEPK/retS/retS-notes.md
        supporting_text: RetS acts upstream to repress K1-T6SS expression in
          KT2440, but GO lacks a type VI-specific negative-regulation term.
suggested_questions:
  - question: What environmental or host-associated ligand is sensed by the
      N-terminal 7TMR-DISM region of KT2440 RetS?
    experts:
      - Two-component signaling specialists
      - Pseudomonas sensory physiology researchers
  - question: Does KT2440 RetS regulate GacS through direct phosphotransfer or
      phosphatase interactions, as described for aeruginosa RetS-family systems?
    experts:
      - Signal transduction biochemists
      - Pseudomonas regulatory network researchers
  - question: Beyond K1-T6SS, which KT2440 biofilm or interbacterial competition
      programs are directly controlled by RetS?
    experts:
      - Rhizosphere ecology researchers
      - Pseudomonas competition and biofilm groups
suggested_experiments:
  - experiment_type: Genetics and reporter assays
    hypothesis: RetS represses K1-T6SS transcription during exponential growth
      through its kinase/phosphorelay module.
    description: Construct clean retS deletion, kinase-dead, and receiver-domain
      phosphosite mutants and quantify K1-T6SS promoter activity, transcript
      abundance, and Hcp secretion across growth phases.
  - experiment_type: Biochemical signaling analysis
    hypothesis: RetS directly modulates the GacS/GacA phosphorelay in KT2440.
    description: Test direct RetS-GacS interaction, autophosphorylation,
      phosphotransfer, and phosphatase activity using purified proteins and
      phosphosite mutants.
  - experiment_type: Sensory input mapping
    hypothesis: The 7TMR-DISM sensory region detects an extracellular cue that
      links environmental conditions to T6SS repression.
    description: Screen osmotic, plant-derived, and nutrient cues with RetS
      reporter strains and purified periplasmic/sensor-domain constructs to
      identify signals that alter RetS-dependent output.
