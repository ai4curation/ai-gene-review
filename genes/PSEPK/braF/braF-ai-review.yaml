  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: braF (PP_4864) encodes a predicted ATP-binding energy-coupling subunit of the PP_4863-PP_4867 Bra/Liv high-affinity branched-chain amino-acid ABC uptake system. Automated annotations support an ATPase role in valine and isoleucine import with the adjacent LivF-II, BraE, BraD, and PP_4867 transporter components.
