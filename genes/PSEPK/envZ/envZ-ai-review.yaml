description: envZ encodes the membrane sensor histidine kinase paired with OmpR in Pseudomonas putida
  KT2440. Its HAMP, HisKA, and HATPase domains support a bacterial inner-membrane sensor role that feeds
  phosphorelay control of OmpR-dependent transcription.
