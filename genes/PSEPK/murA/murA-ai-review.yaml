    - reference_id: file:PSEPK/murA/murA-uniprot.txt
      supporting_text: 'PATHWAY: Cell wall biogenesis; peptidoglycan biosynthesis.'
- term:
    id: GO:0016765
    label: transferase activity, transferring alkyl or aryl (other than methyl) groups
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: Broad catalytic parent of the specific MurA activity.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      The substrate-specific MurA term is more informative and avoids
      retaining a redundant generic molecular function.
    supported_by:
    - reference_id: file:PSEPK/murA/murA-uniprot.txt
      supporting_text: 'RecName: Full=UDP-N-acetylglucosamine 1-carboxyvinyltransferase'
- term:
    id: GO:0019277
    label: UDP-N-acetylgalactosamine biosynthetic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: involved_in
  review:
    summary: Incorrect substrate-derived process annotation.
    action: REMOVE
    reason: >-
      MurA uses UDP-N-acetylglucosamine, not UDP-N-acetylgalactosamine, and is
      assigned to peptidoglycan precursor synthesis. The InterPro mapping
      therefore propagates the wrong nucleotide-sugar process.
    supported_by:
    - reference_id: file:PSEPK/murA/murA-uniprot.txt
      supporting_text: 'Reaction=phosphoenolpyruvate + UDP-N-acetyl-alpha-D-glucosamine = UDP-'
