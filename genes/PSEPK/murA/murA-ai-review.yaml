taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: murA encodes UDP-N-acetylglucosamine 1-carboxyvinyltransferase in Pseudomonas putida KT2440. It adds an enolpyruvyl group to UDP-N-acetylglucosamine, initiating de novo UDP-N-acetylmuramate formation for peptidoglycan biosynthesis.
