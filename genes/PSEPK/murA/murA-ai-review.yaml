id: Q88P88
gene_symbol: murA
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: >-
  MurA is the cytoplasmic UDP-N-acetylglucosamine
  1-carboxyvinyltransferase of Pseudomonas putida KT2440. It transfers an
  enolpyruvyl group from phosphoenolpyruvate to UDP-N-acetylglucosamine,
  initiating formation of the UDP-MurNAc peptide precursor used for
  peptidoglycan synthesis.
