description: PP_0907 is a predicted membrane-fusion/periplasmic adaptor component of an RND efflux system
  in Pseudomonas putida KT2440. It carries membrane-fusion-protein domains and is best curated as a cell-envelope
  efflux-pump component that contributes to, but does not independently enable, transporter activity.
