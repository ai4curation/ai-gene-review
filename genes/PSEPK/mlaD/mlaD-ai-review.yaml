description: mlaD encodes an Mce/MlaD-domain phospholipid-binding component of the MlaFEDB phospholipid transport system. It is inferred to function as a periplasmic solute-binding component in the ABC transporter assembly that supports retrograde phospholipid trafficking and outer-membrane lipid asymmetry.
