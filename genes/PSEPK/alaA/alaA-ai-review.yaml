description: alaA (PP_1872) encodes glutamate-pyruvate aminotransferase AlaA, a PLP-dependent aminotransferase that interconverts
  L-alanine/2-oxoglutarate and pyruvate/L-glutamate. In the ppu00220 batch it is a broad nitrogen/aminotransferase boundary
  node rather than a committed L-arginine biosynthetic enzyme.
