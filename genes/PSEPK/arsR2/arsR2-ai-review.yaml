description: arsR2 encodes a named arsenic resistance transcriptional regulator in Pseudomonas putida KT2440. UniProt and
  the ArsR1/ArsR2 study support an ArsR-family DNA-binding regulator that binds arsenite and controls arsenic efflux operon
  expression. This first pass keeps the core GO function at DNA-binding transcription factor activity and treats cytoplasmic
  localization as supporting context.
