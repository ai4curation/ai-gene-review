description: aldB-I (PP_0545) encodes an aldehyde dehydrogenase family enzyme predicted to oxidize aldehydes to the corresponding carboxylates using NAD+ as electron acceptor. The protein carries the conserved aldehyde dehydrogenase catalytic cysteine and glutamate motifs and is best treated as a soluble detoxification or central-carbon-adjacent aldehyde oxidation enzyme rather than a defining Entner-Doudoroff step.
