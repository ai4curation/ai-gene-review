  title: TreeGrafter-generated Gene Ontology annotations based on phylogenetic placement.
  findings:
  - statement: TreeGrafter supplies phylogenetic annotations that can over-transfer generic
      location or process terms.
- id: PMID:15262943
  title: 'The homogentisate pathway: a central catabolic pathway involved in the degradation
    of L-phenylalanine, L-tyrosine, and 3-hydroxyphenylacetate in Pseudomonas putida.'
  findings:
  - statement: The homogentisate pathway paper identifies HmgA as the dioxygenase enzyme and
      HmgR, not HmgA, as the pathway repressor.
- id: PMID:23858455
  title: Visualizing the substrate-, superoxo-, alkylperoxo-, and product-bound states at
    the nonheme Fe(II) site of homogentisate dioxygenase.
  findings:
  - statement: Structural and biochemical work supports Fe(II)-dependent homogentisate dioxygenase
      activity.
