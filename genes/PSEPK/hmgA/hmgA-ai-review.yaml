- term:
    id: GO:0000976
    label: transcription cis-regulatory region binding
  evidence_type: IPI
  original_reference_id: PMID:15262943
  review:
    summary: This DNA cis-regulatory-region binding annotation does not describe HmgA. HmgA
      is a homogentisate dioxygenase enzyme. The CollecTF transcription-factor evidence
      captures the PhhR (and/or HmgR) binding site located in the hmgA promoter region,
      i.e. regulation OF hmgA, and mis-attributes the DNA-binding activity to the HmgA enzyme itself.
    action: REMOVE
    reason: Remove as a curation error that transfers a transcription-factor binding function
      to the HmgA enzyme. Falcon deep research shows hmgA is a TARGET of the PhhR regulon
      (a PhhR box lies upstream of PP4621 and PhhR binds the promoter by EMSA), confirming
      this DNA-binding describes the regulator at the hmgA promoter, not HmgA.
    supported_by:
    - reference_id: PMID:15262943
      supporting_text: experiments have shown that hmgR encodes a specific repressor
      reference_section_type: ABSTRACT
    - reference_id: file:PSEPK/hmgA/hmgA-deep-research-falcon.md
      supporting_text: |-
        A **PhhR box** was identified upstream of **PP4621 hmgA**, and **EMSA** showed that purified PhhR specifically retarded target promoter DNA containing such boxes.
      reference_section_type: OTHER
- term:
    id: GO:0001217
    label: DNA-binding transcription repressor activity
  evidence_type: IPI
  original_reference_id: PMID:15262943
  review:
    summary: HmgA is a dioxygenase enzyme, not a transcriptional repressor. The repressor
      role in the homogentisate pathway belongs to HmgR, and the hmgA promoter is itself
      a target of the PhhR transcription factor; neither makes HmgA a DNA-binding repressor.
    action: REMOVE
    reason: The repressor annotation is unsupported for hmgA and should be removed. Falcon
      deep research independently establishes hmgA as a regulated enzyme gene (PhhR binds
      its promoter), not a transcription factor.
    supported_by:
