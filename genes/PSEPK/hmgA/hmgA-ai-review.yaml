  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: hmgA encodes homogentisate 1,2-dioxygenase, a nonheme iron enzyme of the homogentisate
  pathway. It catalyzes oxidative ring cleavage of homogentisate to maleylacetoacetate during
  L-phenylalanine and L-tyrosine catabolism in P. putida. DNA-binding and transcription-repressor
  GO rows currently attached to hmgA appear to be misassigned from the neighboring hmgR regulator
  and should be removed.
