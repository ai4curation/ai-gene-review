references:
- id: GO_REF:0000120
  title: Combined automated GO annotation using multiple IEA methods.
  findings:
  - statement: Combined automated methods provide provisional GO annotations that require gene-level review.
- id: file:PSEPK/hmgA/hmgA-uniprot.txt
  title: UniProtKB reviewed entry for hmgA
  findings:
  - statement: UniProt identifies HmgA as homogentisate 1,2-dioxygenase with EC 1.13.11.5 and phenylalanine/tyrosine catabolic-pathway placement.
- id: file:PSEPK/hmgA/hmgA-deep-research-falcon.md
  title: Falcon (Edison Scientific) deep research report on hmgA (PSEPK)
  findings:
  - statement: PP_4621 is annotated as hmgA, encoding homogentisate 1,2-dioxygenase (HGDO; HmgA) in Pseudomonas putida KT2440.
    supporting_text: |-
      **PP_4621** is annotated as **hmgA**, encoding **homogentisate 1,2-dioxygenase** (HGDO; HmgA)
  - statement: HmgA (EC 1.13.11.5) catalyzes oxidative ring cleavage of homogentisate to maleylacetoacetate.
    supporting_text: |-
      **HmgA** (homogentisate 1,2-dioxygenase; HGDO; **EC 1.13.11.5**) catalyzes the oxidative ring cleavage of **homogentisic acid (homogentisate; HGA)** to form **maleylacetoacetate**.
  - statement: The primary substrate of HmgA is homogentisate (HGA), converted to maleylacetoacetate.
    supporting_text: |-
      The primary substrate for HmgA is **homogentisate (homogentisic acid; HGA)**. HmgA catalyzes conversion of HGA to **maleylacetoacetate**.
  - statement: In KT2440 hmgA functions in the homogentisate central pathway for aromatic amino-acid degradation, receiving carbon from L-phenylalanine/L-tyrosine and channeling products to fumarate and acetoacetate.
    supporting_text: |-
      In KT2440, hmgA functions in the **homogentisate central pathway** for aromatic amino-acid degradation. The pathway receives carbon from **L-phenylalanine/L-tyrosine** via **PhhA/PhhB**, aminotransferases (**TyrB1/TyrB2**), and **Hpd** (4-hydroxyphenylpyruvate dioxygenase), then channels products into central metabolism as **fumarate and acetoacetate/Krebs cycle intermediates**
  - statement: The best supported localization is cytosolic/intracellular by pathway context; no direct localization experiment was retrieved.
    supporting_text: |-
      HmgA is described as a soluble metabolic enzyme in the **intracellular homogentisate pathway** and is genetically linked to other central catabolic enzymes rather than secretion/transport components, the best supported annotation from available evidence is **cytosolic/intracellular** localization by pathway context, not direct experiment
  - statement: hmgA is a target of the phenylalanine-responsive PhhR regulon; a PhhR box lies upstream of PP4621 and EMSA shows PhhR binds such promoter DNA. This describes regulation OF hmgA, not a transcription-factor function of HmgA.
    supporting_text: |-
      A **PhhR box** was identified upstream of **PP4621 hmgA**, and **EMSA** showed that purified PhhR specifically retarded target promoter DNA containing such boxes.
  - statement: Loss of HmgA causes homogentisate accumulation, excretion, and polymerization to pyomelanin, confirming the conserved biochemical role of HmgA in HGA consumption.
    supporting_text: |-
      loss of HmgA causes HGA accumulation
- id: GO_REF:0000104
  title: GO_REF:0000104
  findings:
  - statement: Automated GO reference reviewed in this file.
- id: GO_REF:0000118
  title: TreeGrafter-generated Gene Ontology annotations based on phylogenetic placement.
  findings:
  - statement: TreeGrafter supplies phylogenetic annotations that can over-transfer generic location or process terms.
- id: PMID:15262943
  title: 'The homogentisate pathway: a central catabolic pathway involved in the degradation of L-phenylalanine, L-tyrosine, and 3-hydroxyphenylacetate in Pseudomonas putida.'
  full_text_unavailable: true
  findings:
  - statement: The homogentisate pathway paper identifies HmgA as the dioxygenase enzyme and HmgR, not HmgA, as the pathway repressor.
    supporting_text: >-
      Gel retardation assays and lacZ translational fusion experiments have
      shown that hmgR encodes a specific repressor that controls the inducible
      expression of the divergently transcribed hmgABC catabolic genes
    reference_section_type: ABSTRACT
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      The cached abstract explicitly distinguishes the HmgA metabolic enzyme
      from the HmgR DNA-binding repressor, making the transcription annotations
      on Q88E47 demonstrably misassigned despite their experimental codes.
- id: PMID:23858455
  title: Visualizing the substrate-, superoxo-, alkylperoxo-, and product-bound states at the nonheme Fe(II) site of homogentisate dioxygenase.
  findings:
  - statement: Structural and biochemical work supports Fe(II)-dependent homogentisate dioxygenase activity.
    supporting_text: producing maleylacetoacetate from homogentisate
    reference_section_type: ABSTRACT
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      The cached PubMed record confirms the title and reaction. UniProt Q88E47
      explicitly links this PMID to the reaction, iron cofactor, catalytic
      residues, mutagenesis, and PDB entries 3ZDS, 4AQ2, and 4AQ6, establishing
      that the experiments used this exact target protein.
