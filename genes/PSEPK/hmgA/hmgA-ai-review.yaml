    label: negative regulation of DNA-templated transcription
  evidence_type: IDA
  original_reference_id: PMID:15262943
  review:
    summary: Negative transcription regulation of the homogentisate pathway belongs to the
      HmgR repressor (and the pathway is also controlled by PhhR), not to HmgA. HmgA is the
