description: >-
  Rmd is a predicted NAD(P)-binding oxidoreductase in the KT2440 PP_1776-PP_1800
  deoxy-sugar branch. UniProt provides only a submitted Rmd name and domain
  context, but the ppu00051 Falcon pathway review and PANTHER reviewed-member
  table support a first-pass assignment as a GDP-4-dehydro-6-deoxy-D-mannose
  reductase candidate in GDP-D-rhamnose/LPS O-antigen biosynthesis.
