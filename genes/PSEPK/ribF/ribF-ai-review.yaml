description: 'ribF encodes a bifunctional flavin cofactor biosynthesis enzyme in Pseudomonas
  putida KT2440. It phosphorylates riboflavin to FMN and adenylylates FMN to FAD, connecting
  de novo riboflavin formation to the active FMN and FAD cofactors.'
