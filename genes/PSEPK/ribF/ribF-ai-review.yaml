  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: FMN adenylyltransferase activity is a core RibF function.
    action: ACCEPT
    reason: UniProt records the FMN + ATP to FAD reaction with EC 2.7.7.2.
- term:
