    label: FAD biosynthetic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: involved_in
  review:
    summary: FAD biosynthetic process is appropriate for the FMN adenylyltransferase
      step.
    action: ACCEPT
    reason: UniPathway and UniProt place RibF in FAD biosynthesis from FMN.
- term:
    id: GO:0006771
    label: riboflavin metabolic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000118
  qualifier: involved_in
  review:
    summary: Riboflavin metabolic process is appropriate because RibF consumes
      riboflavin to form FMN.
    action: ACCEPT
    reason: RibF directly acts on riboflavin, so metabolism is correct even though de
      novo riboflavin biosynthesis is upstream.
- term:
    id: GO:0008531
    label: riboflavin kinase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: Riboflavin kinase activity is a core RibF function.
    action: ACCEPT
    reason: UniProt records the riboflavin + ATP to FMN reaction with EC 2.7.1.26.
- term:
    id: GO:0009231
    label: riboflavin biosynthetic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: involved_in
  review:
    summary: Riboflavin biosynthetic process is too upstream for RibF, which consumes
      riboflavin to make FMN and FAD.
    action: MARK_AS_OVER_ANNOTATED
    reason: The more precise process terms are FMN biosynthetic process and FAD
      biosynthetic process.
- term:
    id: GO:0009398
    label: FMN biosynthetic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: involved_in
  review:
    summary: FMN biosynthetic process is appropriate for the riboflavin kinase step.
    action: ACCEPT
    reason: UniPathway and UniProt place RibF in FMN biosynthesis from riboflavin.
