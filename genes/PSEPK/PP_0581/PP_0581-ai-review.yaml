id: Q88QB3
gene_symbol: PP_0581
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: >-
  PP_0581 is a predicted high-molecular-weight FabG-family,
  NADH-dependent 3-oxoacyl-thioester reductase in Pseudomonas putida KT2440.
  Its submitted product name and PANTHER subfamily support
  beta-ketoacyl-ACP reduction, but the 457-residue protein is distinct from
  canonical FabG and its physiological substrate, pathway, and contribution
  to core fatty-acid synthesis remain unresolved.
