  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: >-
  PP_0581 is a predicted NADH-dependent 3-oxoacyl-ACP reductase-family protein
  in Pseudomonas putida KT2440. Its submitted product name and PANTHER
  subfamily support beta-ketoacyl-ACP reduction, but the 457-residue protein is
  distinct from canonical FabG and its physiological pathway, ACP partner, and
  contribution to core fatty-acid synthesis remain unresolved.
