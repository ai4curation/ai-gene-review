suggested_questions:
- question: Does PP_0581 reduce canonical FAS-II 3-oxoacyl-AcpP substrates or a specialized ACP pool?
suggested_experiments:
- description: >-
    Purify PP_0581 and test NADH- versus NADPH-dependent reduction of
    chain-length-resolved 3-oxoacyl-AcpP and candidate specialized ACP substrates.
