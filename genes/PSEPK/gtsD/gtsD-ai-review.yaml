taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: gtsD (PP_1018) encodes the ATP-binding energy-coupling subunit of the PP_1015-PP_1018 Gts glucose ABC uptake system. Although automated family annotation labels the protein as MalK/YcjV-like and assigns maltose transport, P. putida-specific evidence identifies PP1015-PP1018 as the ABC uptake system transporting glucose to the cytoplasm.
