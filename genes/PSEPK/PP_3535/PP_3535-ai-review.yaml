taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: >-
  PP_3535 encodes a predicted gamma-glutamyltransferase-family glutathione
  hydrolase proenzyme in Pseudomonas putida KT2440. UniProt assigns glutathione
  gamma-glutamate hydrolase activity and reactions that hydrolyze glutathione or
  S-substituted glutathione to cysteinylglycine and glutamate. In the
  taurine/hypotaurine KEGG bucket it is best treated as glutathione/sulfur
  metabolism boundary context rather than a taurine-specific enzyme.
