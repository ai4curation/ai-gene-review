  review:
    summary: Glutathione catabolism is consistent with the UniProt/UniRule glutathione hydrolase assignment.
    action: ACCEPT
    reason: >-
      The UniProt record explicitly places PP_3535 in glutathione metabolism and
      gives a glutathione hydrolysis reaction.
    supported_by:
