description: recO (PP_1435) encodes DNA repair protein RecO, a RecFOR-pathway recombination mediator. RecO acts with RecF
  and RecR during homologous recombination and recombinational repair, promoting RecA loading or stabilization on single-stranded
  DNA regions generated by DNA damage or stalled replication.
