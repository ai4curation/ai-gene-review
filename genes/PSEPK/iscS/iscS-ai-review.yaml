  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: iscS encodes the primary IscS cysteine desulfurase, a PLP-dependent sulfur mobilization enzyme that transfers sulfur from L-cysteine to acceptor proteins. It supports iron-sulfur cluster biogenesis, tRNA modification, and cofactor biosynthesis by delivering persulfide sulfur to partner proteins rather than acting as a thiamine-pathway enzyme by itself.
