id: Q88MF4
gene_symbol: frmC
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: >-
  frmC encodes a predicted cytosolic S-formylglutathione hydrolase in
  Pseudomonas putida KT2440. It is an alpha/beta-hydrolase/esterase D family
  enzyme that hydrolyzes S-formylglutathione to formate and glutathione,
  completing the glutathione-dependent formaldehyde detoxification sequence
  downstream of FrmA-like S-(hydroxymethyl)glutathione dehydrogenase activity.
