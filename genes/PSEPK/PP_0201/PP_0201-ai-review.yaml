description: PP_0201 encodes a predicted YbaK/aminoacyl-tRNA synthetase-associated domain protein in Pseudomonas putida KT2440.
  The current first-pass support is domain and IEA evidence for aminoacyl-tRNA deacylase activity, so it is best treated as
  a candidate aminoacyl-tRNA editing factor rather than a fully characterized enzyme.
