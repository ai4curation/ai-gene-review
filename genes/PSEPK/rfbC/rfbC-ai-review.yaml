id: Q88LZ4
gene_symbol: rfbC
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: >-
  rfbC (PP_1782) encodes a cytosolic dTDP-4-dehydrorhamnose 3,5-epimerase in
  the PP_1782-PP_1785 rhamnose-sugar cluster of Pseudomonas putida KT2440. It
  performs the same epimerase step as RmlC, producing
  dTDP-4-dehydro-beta-L-rhamnose for final reduction to dTDP-L-rhamnose.
existing_annotations:
- term:
    id: GO:0000271
    label: polysaccharide biosynthetic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000118
  qualifier: involved_in
  review:
    summary: >-
      This precursor enzyme does not establish a direct role in polysaccharide
      assembly.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      RfbC produces a soluble nucleotide-sugar precursor that may feed several
      glycans. Propagating the downstream generic assembly process to this
      epimerase is less informative than its direct dTDP-rhamnose process.
