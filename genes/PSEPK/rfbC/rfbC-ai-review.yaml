  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: rfbC encodes a dTDP-4-dehydrorhamnose 3,5-epimerase in Pseudomonas putida KT2440. It is the RmlC-like epimerase in the rfb/rff deoxy-sugar gene cluster and participates in dTDP-L-rhamnose precursor biosynthesis for envelope glycan metabolism.
