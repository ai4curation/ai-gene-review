  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: Transaldolase of Pseudomonas putida KT2440 (PP_2168), a cytoplasmic non-oxidative pentose
  phosphate pathway enzyme. Tal transfers a three-carbon unit between sedoheptulose 7-phosphate and glyceraldehyde
  3-phosphate to produce erythrose 4-phosphate and fructose 6-phosphate, linking pentose phosphate pools
  with glycolytic/gluconeogenic intermediates and aromatic-amino-acid precursor supply.
