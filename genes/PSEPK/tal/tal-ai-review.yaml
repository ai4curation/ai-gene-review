taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: >-
  tal (PP_2168) encodes transaldolase, a type 1 transaldolase family enzyme in
  the non-oxidative pentose phosphate pathway. It reversibly converts
  sedoheptulose 7-phosphate and glyceraldehyde 3-phosphate to erythrose
  4-phosphate and fructose 6-phosphate, helping balance PPP and glycolytic sugar
  phosphate pools.
