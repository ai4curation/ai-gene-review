suggested_questions:
- question: What substrate range is transported by the PP_0411-PP_0414 importer containing PP_0412, and how does it divide uptake of putrescine, spermidine, norspermidine, and related polyamines from other P. putida polyamine systems?
suggested_experiments:
- description: Measure purified PP_0412 ligand binding and compare deletion/complementation phenotypes for uptake or growth responses to putrescine, spermidine, norspermidine, and related polyamines.
  experiment_type: targeted polyamine-binding and uptake assay
