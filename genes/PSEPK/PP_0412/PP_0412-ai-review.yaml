description: PP_0412 encodes a predicted signal-peptide-bearing periplasmic substrate-binding component of the PP_0411-PP_0414 polyamine ABC import locus in Pseudomonas putida KT2440. Although GOA has no current annotations for this protein, UniProt product naming, SBP_bac_8/PANTHER family context, and adjacency to potA plus two permeases support a polyamine-binding importer role.
