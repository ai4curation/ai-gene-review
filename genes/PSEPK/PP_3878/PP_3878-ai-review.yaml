suggested_experiments:
- experiment_type: comparative sequence analysis
  description: Compare PP_3878 against curated phage prohead/minor-capsid proteases to verify domain completeness and catalytic
    motif conservation.
  hypothesis: PP_3878 retains the catalytic features expected for an active phage-associated protease.
- experiment_type: prophage locus inspection
  description: Inspect genes neighboring PP_3878 for coherent prophage head, tail, packaging, and lysis modules.
  hypothesis: PP_3878 belongs to a prophage structural maturation locus rather than a host protein-turnover pathway.
