  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: fba (PP_4960) encodes a class II fructose-1,6-bisphosphate aldolase. The zinc-dependent aldolase reversibly cleaves fructose 1,6-bisphosphate to dihydroxyacetone phosphate and D-glyceraldehyde 3-phosphate, and in the reverse direction condenses triose phosphates during gluconeogenic hexose-phosphate regeneration. In P. putida this reaction helps connect the ED-derived triose-phosphate pool to the EDEMP/gluconeogenic cycle.
