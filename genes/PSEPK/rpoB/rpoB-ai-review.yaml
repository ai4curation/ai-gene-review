  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: DNA binding is accepted as part of the beta subunit's role in the DNA-directed RNAP core.
    action: ACCEPT
    reason: GOA assigns DNA binding from RNAP beta-family UniRule/InterPro evidence, and UniProt identifies rpoB as a subunit of the DNA-dependent RNAP core.
    supported_by:
