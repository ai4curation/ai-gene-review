      supporting_text: "The RNAP catalytic core consists of 2 alpha, 1 beta, 1 beta'"
    - &rpob_asta_identity
      reference_id: file:PSEPK/rpoB/rpoB-deep-research-asta.md
      supporting_text: "uniprot_accession: Q88QP2"
- term:
    id: GO:0003899
    label: DNA-directed RNA polymerase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: DNA-directed RNA polymerase activity is accepted as the core complex-level activity of rpoB.
    action: ACCEPT
    reason: UniProt states that the DNA-dependent RNA polymerase transcribes DNA into RNA using ribonucleoside triphosphates, and rpoB is a beta subunit of that catalytic core.
    supported_by:
    - &rpob_go_rnap
      reference_id: file:PSEPK/rpoB/rpoB-goa.tsv
      supporting_text: "GO:0003899\tDNA-directed RNA polymerase activity"
    - &rpob_function
      reference_id: file:PSEPK/rpoB/rpoB-uniprot.txt
      supporting_text: "DNA-dependent RNA polymerase catalyzes the transcription of"
    - &rpob_reaction
      reference_id: file:PSEPK/rpoB/rpoB-uniprot.txt
      supporting_text: "Reaction=RNA(n) + a ribonucleoside 5'-triphosphate = RNA(n+1) +"
    - *rpob_subunit
- term:
    id: GO:0006351
    label: DNA-templated transcription
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: involved_in
  review:
    summary: DNA-templated transcription is accepted for rpoB as a core RNAP subunit.
    action: ACCEPT
    reason: The beta subunit is part of the RNAP core and holoenzyme that catalyzes and initiates transcription.
    supported_by:
    - reference_id: file:PSEPK/rpoB/rpoB-goa.tsv
      supporting_text: "GO:0006351\tDNA-templated transcription"
    - *rpob_function
    - reference_id: file:PSEPK/rpoB/rpoB-uniprot.txt
      supporting_text: "the holoenzyme is formed, which can initiate transcription."
- term:
    id: GO:0032549
    label: ribonucleoside binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: Ribonucleoside binding is retained as substrate-binding context but is less informative than RNAP activity.
    action: KEEP_AS_NON_CORE
    reason: The RNAP reaction uses ribonucleoside triphosphates, but the curated beta-subunit function should be represented by DNA-directed RNA polymerase activity.
    supported_by:
    - reference_id: file:PSEPK/rpoB/rpoB-goa.tsv
      supporting_text: "GO:0032549\tribonucleoside binding"
    - *rpob_reaction
- term:
    id: GO:0034062
    label: 5'-3' RNA polymerase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000116
  qualifier: enables
  review:
    summary: The Rhea-derived 5'-3' RNA polymerase activity is correct but should be represented by the more specific DNA-directed RNA polymerase term.
    action: MODIFY
    reason: The relevant reaction is DNA-template-directed RNA synthesis by bacterial RNAP; GO:0003899 captures the same activity with better biological specificity for rpoB.
    proposed_replacement_terms:
    - id: GO:0003899
      label: DNA-directed RNA polymerase activity
    supported_by:
    - reference_id: file:PSEPK/rpoB/rpoB-goa.tsv
      supporting_text: "GO:0034062\t5'-3' RNA polymerase activity"
    - *rpob_go_rnap
    - *rpob_reaction
- term:
    id: GO:0000428
    label: DNA-directed RNA polymerase complex
  evidence_type: IEA
  original_reference_id: file:PSEPK/rpoB/rpoB-uniprot.txt
  qualifier: part_of
  review:
    summary: rpoB should be explicitly connected to the DNA-directed RNA polymerase complex.
    action: NEW
    reason: The fetched GOA table lacks the complex term, but UniProt records GO:0000428 and describes the RNAP catalytic core containing the beta subunit.
    supported_by:
    - reference_id: file:PSEPK/rpoB/rpoB-uniprot.txt
      supporting_text: "DR   GO; GO:0000428; C:DNA-directed RNA polymerase complex; IEA:UniProtKB-KW."
    - *rpob_subunit
