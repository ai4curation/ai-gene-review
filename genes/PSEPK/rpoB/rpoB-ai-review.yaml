id: Q88QP2
gene_symbol: rpoB
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: rpoB encodes the beta subunit of the Pseudomonas putida KT2440 DNA-directed RNA polymerase core enzyme. Together with the beta-prime, two alpha, and omega subunits, RpoB forms the catalytic RNAP core that polymerizes RNA from a DNA template during transcription.
