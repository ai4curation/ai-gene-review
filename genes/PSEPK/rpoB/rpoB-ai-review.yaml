    label: cytosol
  evidence_type: ISS
  original_reference_id: file:PSEPK/rpoB/rpoB-uniprot.txt
  qualifier: located_in
  review:
    summary: >-
      RpoB is a soluble bacterial RNA polymerase core subunit and is expected to
      function in the cytosol/nucleoid.
    action: NEW
    reason: >-
      The reviewed UniProt record describes RpoB as a core RNAP subunit with no
      signal peptide or membrane-spanning localization; cytosol is the
      appropriate cellular location for bacterial core transcription machinery.
