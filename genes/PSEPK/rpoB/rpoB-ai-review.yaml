id: Q88QP2
gene_symbol: rpoB
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: >-
  rpoB (PP_0447) encodes the beta subunit of the bacterial DNA-directed RNA
  polymerase core enzyme. Together with the beta-prime subunit RpoC, RpoB forms
  the catalytic cleft of the alpha2-beta-beta-prime-omega RNAP core, binding
  nucleic-acid substrates and incoming ribonucleotides during RNA-chain
  elongation. RpoB is therefore a core catalytic-cleft subunit that contributes
  to DNA-directed RNA polymerase activity and DNA-templated transcription as
  part of the assembled core enzyme.
existing_annotations:
- term:
    id: GO:0003677
    label: DNA binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: >-
      DNA binding is plausible for the beta subunit as part of the RNAP
      catalytic cleft, but it is a broad supporting activity.
    action: KEEP_AS_NON_CORE
    reason: >-
      Retain as non-core supporting context. The more informative function is
      contribution to complex-level DNA-directed RNA polymerase activity.
- term:
    id: GO:0003899
    label: DNA-directed RNA polymerase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: >-
      RpoB is a core catalytic-cleft subunit of bacterial RNAP and is required
      for RNA synthesis, but activity is performed by the assembled complex.
    action: MODIFY
    reason: >-
      Interpret as contribution to complex-level polymerase activity rather
      than independent catalytic activity by isolated RpoB.
    proposed_replacement_terms:
    - id: GO:0003899
      label: DNA-directed RNA polymerase activity
    supported_by:
