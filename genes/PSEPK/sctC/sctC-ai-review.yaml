id: Q88RA8
gene_symbol: sctC
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: sctC (PP_0225) encodes the ATP-binding energy-coupling component of a predicted cystine/sulfur-compound ABC transporter. Its ABC ATPase domain and adjacency to sctS and the periplasmic cystine-binding protein fliY support a role in ATP-driven amino-acid/sulfur-compound uptake rather than an independent metabolic enzyme.
existing_annotations:
- term:
    id: GO:0000166
    label: nucleotide binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000104
  qualifier: enables
  review:
    summary: Nucleotide binding is true but less informative than ATP binding for this ABC ATPase.
    action: MARK_AS_OVER_ANNOTATED
    reason: The review retains the more specific ATP-binding and ATP-hydrolysis annotations for the transporter ATPase.
    supported_by:
    - reference_id: file:PSEPK/sctC/sctC-goa.tsv
      supporting_text: "GO:0000166\tnucleotide binding"
- term:
    id: GO:0003333
    label: amino acid transmembrane transport
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: involved_in
  review:
    summary: Amino acid transmembrane transport is correct but should be narrowed to the cystine-transport context of the local sctC-sctS-fliY locus.
    action: MODIFY
    reason: The neighboring sctS/fliY annotations and product names support an L-cystine/sulfur-compound ABC transporter; L-cystine transport is the better process term for this sub-batch.
    supported_by:
    - reference_id: file:PSEPK/sctC/sctC-goa.tsv
      supporting_text: "GO:0003333\tamino acid transmembrane transport"
    proposed_replacement_terms:
    - &id001
      id: GO:0015811
      label: L-cystine transport
- term:
    id: GO:0005524
    label: ATP binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: ATP binding is correct for the ABC-transporter nucleotide-binding component.
    action: ACCEPT
    reason: SctC has ABC transporter ATP-binding domains and is annotated as the ATP-binding subunit of the sulfur-compound transporter.
    supported_by:
    - reference_id: file:PSEPK/sctC/sctC-goa.tsv
      supporting_text: "GO:0005524\tATP binding"
- term:
    id: GO:0005886
    label: plasma membrane
  evidence_type: IEA
  original_reference_id: GO_REF:0000044
  qualifier: located_in
  review:
    summary: Plasma membrane localization is appropriate for the inner-membrane-associated ABC transporter ATPase.
    action: ACCEPT
    reason: UniProt places this ABC ATPase at the cell inner membrane as a peripheral membrane protein.
    supported_by:
    - reference_id: file:PSEPK/sctC/sctC-goa.tsv
      supporting_text: "GO:0005886\tplasma membrane"
- term:
    id: GO:0015424
    label: ABC-type amino acid transporter activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: ABC-type amino acid transporter activity is appropriate at first pass for the ATP-binding component.
    action: ACCEPT
    reason: The local transporter appears to import cystine or a related sulfur-containing amino acid, but the existing ABC-type amino acid transporter term is a reasonable complex-level activity for the ATPase subunit.
    supported_by:
    - reference_id: file:PSEPK/sctC/sctC-goa.tsv
      supporting_text: "GO:0015424\tABC-type amino acid transporter activity"
