      supporting_text: 'Protein Description:** SubName: Full=Sulfur compound ABC transporter-ATP-binding subunit'
- term:
    id: GO:0016887
    label: ATP hydrolysis activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: ATP hydrolysis activity is correct mechanistic context for the ABC ATPase.
    action: KEEP_AS_NON_CORE
    reason: ATP hydrolysis powers transport, while substrate-specific transport is captured in the process and transporter-complex context.
    supported_by:
    - reference_id: file:PSEPK/sctC/sctC-goa.tsv
      supporting_text: "GO:0016887\tATP hydrolysis activity"
- term: *id001
  evidence_type: IEA
  original_reference_id: file:PSEPK/sctC/sctC-uniprot.txt
  qualifier: involved_in
  review:
    summary: L-cystine transport is a useful missing process annotation for the SctC ATP-binding component.
    action: NEW
    reason: The adjacent SctS permease has L-cystine transporter and L-cystine transport annotations, and FliY is named as a periplasmic cystine-binding protein, supporting the same cystine-transport sub-batch for SctC.
    supported_by:
