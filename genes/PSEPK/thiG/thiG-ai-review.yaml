taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: thiG encodes thiazole synthase, the enzyme that rearranges 1-deoxy-D-xylulose 5-phosphate with the ThiS sulfur-carrier thiocarboxylate and glyoxyl imine to form the thiazole phosphate moiety of thiamine. This is the central thiazole-branch step of thiamine diphosphate biosynthesis.
