description: PP_0058 encodes an unreviewed phospholipid/glycerol acyltransferase-domain protein predicted to function as a 1-acyl-sn-glycerol-3-phosphate acyltransferase. The TreeGrafter/PANTHER assignment places it in the 1-acyl-sn-glycerol-3-phosphate acyltransferase family and supports participation in phosphatidic acid biosynthesis, where acyltransferase chemistry converts lysophosphatidic-acid-like precursors toward phosphatidic acid for bacterial membrane lipid assembly. No direct P. putida KT2440 experimental paper was recovered in the first-pass Asta retrieval, so this review treats the assignment as a high-confidence homology/domain inference rather than experimentally demonstrated activity.
