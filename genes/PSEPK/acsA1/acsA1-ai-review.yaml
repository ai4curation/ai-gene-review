  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: acsA1 (PP_4487) encodes an AMP-forming acetyl-CoA synthetase. It activates acetate with ATP to form an acetyl-adenylate intermediate and then transfers the acetyl group to coenzyme A, producing acetyl-CoA, AMP, and pyrophosphate. This cytosolic route assimilates acetate into acetyl-CoA and connects acetate metabolism to central carbon flux.
