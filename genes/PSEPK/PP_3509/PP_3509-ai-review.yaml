description: PP_3509 encodes a small VOC-domain bleomycin-resistance-family protein in Pseudomonas putida KT2440. UniProt/InterPro
  metadata supports antibiotic response context through the Bleomycin-R family and antibiotic-resistance keyword, but no precise
  molecular function is resolved in the fetched data. The first pass retains the broad response-to-antibiotic annotation and
  suggests the more specific response-to-bleomycin process as a conservative family-based refinement.
