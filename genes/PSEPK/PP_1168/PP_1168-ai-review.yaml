description: PP_1168 encodes the predicted DctQ-like small permease component of a tripartite ATP-independent
  periplasmic C4-dicarboxylate transporter in Pseudomonas putida KT2440. It is an inner-membrane TRAP
  permease adjacent to PP_1167 and dctP.
