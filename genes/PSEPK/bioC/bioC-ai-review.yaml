taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: bioC encodes malonyl-acyl carrier protein O-methyltransferase in Pseudomonas
  putida KT2440. This SAM-dependent methyltransferase initiates the BioC-BioH pimelate
  precursor route by methylating malonyl-ACP, allowing extension through fatty-acid-synthesis
  chemistry before BioH unmasks pimeloyl-ACP for biotin biosynthesis.
