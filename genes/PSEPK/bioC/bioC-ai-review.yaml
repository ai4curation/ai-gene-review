id: Q88QW9
gene_symbol: bioC
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: >-
  BioC is the S-adenosyl-L-methionine-dependent malonyl-ACP
  O-methyltransferase that initiates the BioC-BioH route for assembling the
  pimeloyl-ACP precursor of biotin. Methylation masks the free carboxyl group
  of malonyl-ACP so the intermediate can pass through fatty-acid-synthase
  elongation before BioH removes the methyl ester.
existing_annotations:
- term:
    id: GO:0008168
    label: methyltransferase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000117
  qualifier: enables
  review:
    summary: This generic term is redundant with the substrate-specific BioC activity.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      GO:0008168 does not identify the malonyl-ACP substrate or BioC pathway
      role captured by GO:0102130.
- term:
    id: GO:0008757
    label: S-adenosylmethionine-dependent methyltransferase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: This cofactor-defined parent term is redundant with GO:0102130.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      The specific BioC reaction already implies S-adenosyl-L-methionine as
      methyl donor and is more informative.
- term:
    id: GO:0009102
    label: biotin biosynthetic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: involved_in
  review:
    summary: BioC initiates pimeloyl-ACP precursor formation for biotin synthesis.
    action: ACCEPT
    reason: >-
      The BioC family assignment, catalytic reaction, and UniProt pathway record
      consistently place Q88QW9 in biotin biosynthesis.
- term:
    id: GO:0010340
    label: carboxyl-O-methyltransferase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: This chemistry-level parent is accurate but redundant with GO:0102130.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      GO:0102130 captures the same O-methylation chemistry with the BioC
      malonyl-ACP substrate.
- term:
    id: GO:0102130
    label: malonyl-CoA methyltransferase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: This is the specific BioC molecular function.
    action: ACCEPT
    reason: >-
      Despite the current GO label saying malonyl-CoA, the term definition and
      Rhea grounding describe methylation of malonyl-ACP, matching EC 2.1.1.197
      and the Q88QW9 UniProt reaction.
    supported_by:
    - reference_id: file:PSEPK/bioC/bioC-uniprot.txt
      supporting_text: Full=Malonyl-[acyl-carrier protein] O-methyltransferase
    - reference_id: file:PSEPK/bioC/bioC-deep-research-openscientist.md
      supporting_text: >-
        Its curated catalytic activity (EC **2.1.1.197**, RHEA:17105) is:
        **malonyl-[ACP] + S-adenosyl-L-methionine → malonyl-[ACP] methyl ester
        + S-adenosyl-L-homocysteine**.
