  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: >-
  Nicotinate phosphoribosyltransferase of Pseudomonas putida KT2440. PncB uses
  nicotinate, PRPP, ATP, and water to produce nicotinate D-ribonucleotide
  (NaMN), ADP, phosphate, and diphosphate. It is the entry enzyme for direct
  nicotinate salvage through the Preiss-Handler route, feeding NaMN into NadD
  and NadE for completion to NAD+.
