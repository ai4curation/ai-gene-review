description: >-
  AcnA-II (PP_2336) is the dedicated AcnD-family iron-sulfur
  2-methylcitrate dehydratase of Pseudomonas putida KT2440. In the
  two-component alternative to PrpD, it dehydrates 2-methylcitrate to a
  distinct AcnD-derived methylaconitate isomer that PrpF rearranges before the common
  aconitase-family hydration step of the 2-methylcitrate cycle.
