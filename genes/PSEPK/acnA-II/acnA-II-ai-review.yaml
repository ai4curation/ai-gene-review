id: Q88KF4
gene_symbol: acnA-II
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: >-
  acnA-II encodes an aconitase/IPM-isomerase-family iron-sulfur hydro-lyase in
  Pseudomonas putida KT2440. UniProt names the protein as aconitate hydratase
  and places it in propanoate degradation, while InterPro specifically connects
  it to Fe-S-dependent 2-methylisocitrate dehydratase/methylcitrate-cycle
  context. In the current first pass, acnA-II is treated as a soluble
  aconitase-family methylcitrate/propionate candidate, with AcnB retaining the
  stronger organism-specific evidence for the key in vivo methylcitrate-cycle
  dehydratase role.
existing_annotations:
- term:
    id: GO:0003994
    label: aconitate hydratase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: Aconitate hydratase activity is supported by EC/Rhea and the aconitase-family assignment.
    action: ACCEPT
    reason: >-
      UniProt names acnA-II as aconitate hydratase (EC 4.2.1.3), and GOA
      supports the term through EC/Rhea evidence. This is the most specific
      current molecular-function term in GOA.
    supported_by:
    - reference_id: file:PSEPK/acnA-II/acnA-II-goa.tsv
      supporting_text: "GO:0003994\taconitate hydratase activity"
    - reference_id: file:PSEPK/acnA-II/acnA-II-uniprot.txt
      supporting_text: "DE   RecName: Full=aconitate hydratase"
- term:
    id: GO:0016836
    label: hydro-lyase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000117
  qualifier: enables
  review:
    summary: Hydro-lyase activity is a broad parent of the specific aconitate hydratase activity.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      The ARBA hydro-lyase parent is not wrong for an aconitase-family enzyme,
      but GO:0003994 is already present and more informative for the molecular
      function represented in GOA.
    supported_by:
    - reference_id: file:PSEPK/acnA-II/acnA-II-goa.tsv
      supporting_text: "GO:0016836\thydro-lyase activity"
    - reference_id: file:PSEPK/acnA-II/acnA-II-goa.tsv
      supporting_text: "GO:0003994\taconitate hydratase activity"
- term:
    id: GO:0019543
    label: propionate catabolic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: involved_in
  review:
    summary: Propionate catabolic process is supported by the methylcitrate-cycle InterPro context.
    action: ACCEPT
    reason: >-
      GOA links the InterPro 2-methylisocitrate dehydratase Fe-S-dependent
      signature to propionate catabolism, and UniProt places acnA-II in
      propanoate degradation. This should be read as methylcitrate-cycle context,
      not proof that acnA-II is the sole in vivo dehydratase in KT2440.
    supported_by:
    - reference_id: file:PSEPK/acnA-II/acnA-II-goa.tsv
      supporting_text: "GO:0019543\tpropionate catabolic process"
    - reference_id: file:PSEPK/acnA-II/acnA-II-uniprot.txt
      supporting_text: "GO; GO:0019679; P:propionate metabolic process, methylcitrate cycle;"
