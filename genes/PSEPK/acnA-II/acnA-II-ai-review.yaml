proposed_new_terms:
- proposed_name: AcnD-type 2-methylcitrate dehydratase activity
  proposed_definition: >-
    Catalysis of the dehydration of 2-methylcitrate to
    an AcnD-derived methylaconitate isomer and water.
  justification: >-
    AcnD-family enzymes form a methylaconitate intermediate that requires PrpF
    isomerization. The existing 2-methylcitrate dehydratase term describes the
    direct PrpD reaction forming the cis product and therefore cannot represent
    AcnD accurately. The product is often inferred to be 4-methylaconitate, but
    its exact structure should not be fixed in the term until directly resolved.
  proposed_parent:
    id: GO:0016836
    label: hydro-lyase activity
  supported_by:
  - reference_id: file:projects/P_PUTIDA/deep-research/PSEPK__methylcitrate_cycle__ppu00640-deep-research-openscientist.md
    supporting_text: 'Its product is 2-methyl-*trans*-aconitate, which PrpF (2-methylaconitate isomerase, EC 5.3.3.-) converts to the 2-methyl-*cis*-aconitate accepted by aconitase'
  - reference_id: file:modules/methylcitrate_cycle-deep-research-openscientist.md
    supporting_text: 'points to **4-methylaconitate**, but the precise structure/stereochemistry'
suggested_questions:
- question: Is the AcnD/PrpF route used concurrently with PrpD or under distinct growth conditions?
suggested_experiments:
- description: >-
    Compare metabolite profiles and propionate growth in acnA-II, prpF, prpD,
    and combined mutants, and resolve the purified AcnA-II reaction product by
    NMR and targeted mass spectrometry.
