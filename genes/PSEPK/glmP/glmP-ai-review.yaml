taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: >-
  glmP encodes a small multi-pass membrane protein in Pseudomonas putida
  KT2440 whose submitted product name links it to efficient alginate
  biosynthesis. Its GlpM/YdgC-family domain and transmembrane helices support a
  conserved membrane-factor role, but the molecular mechanism is unresolved.
