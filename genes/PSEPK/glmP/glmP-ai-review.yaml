  review:
    summary: glmP is predicted to be a multi-pass plasma-membrane protein.
    action: NEW
    reason: >-
      UniProt/Phobius predicts three transmembrane helices and carries membrane
      and transmembrane keywords. For a bacterial multi-pass membrane protein,
      plasma membrane is the appropriate first-pass cellular-component term.
