- term:
    id: GO:0042121
    label: alginic acid biosynthetic process
  evidence_type: IEA
  original_reference_id: file:PSEPK/glmP/glmP-uniprot.txt
  qualifier: involved_in
  review:
    summary: glmP should be represented as an alginate-biosynthesis membrane factor.
    action: NEW
    reason: >-
      The UniProt product name explicitly states that glmP is a membrane protein
      required for efficient alginate biosynthesis, while the protein is
      predicted to have three transmembrane helices. No precise molecular
      activity is available from the first-pass evidence, so only the alginate
      biosynthetic process is proposed.
    supported_by:
    - reference_id: file:PSEPK/glmP/glmP-uniprot.txt
      supporting_text: 'DE   SubName: Full=Membrane protein required for efficient alginate biosynthesis {ECO:0000313|EMBL:AAN66690.1};'
