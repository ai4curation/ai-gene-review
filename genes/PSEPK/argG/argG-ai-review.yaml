  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: argG (PP_1088) encodes argininosuccinate synthase (also called citrulline--aspartate ligase; EC 6.3.4.5), a homotetrameric cytoplasmic enzyme that catalyzes the penultimate step of L-arginine biosynthesis. Using ATP, it condenses L-citrulline with L-aspartate to form 2-(N(omega)-L-arginino)succinate (argininosuccinate), releasing AMP and diphosphate. The argininosuccinate product is subsequently cleaved by argininosuccinate lyase (ArgH) to yield L-arginine and fumarate. ArgG performs the committed ATP-dependent condensation that incorporates the second nitrogen into the guanidinium group of arginine.
existing_annotations:
- term:
    id: GO:0000050
    label: urea cycle
  evidence_type: IEA
  original_reference_id: GO_REF:0000118
  qualifier: involved_in
  review:
    summary: Argininosuccinate synthase catalyzes a reaction shared between the urea cycle and arginine biosynthesis. In P. putida, a bacterium lacking a full ornithine/urea cycle, the biologically relevant role of ArgG is L-arginine biosynthesis rather than ureagenesis. This TreeGrafter-propagated "urea cycle" term reflects the shared chemistry but is not the process operating in this organism; keep as non-core.
    action: KEEP_AS_NON_CORE
- term:
    id: GO:0004055
    label: argininosuccinate synthase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: Core molecular function. This is the EC 6.3.4.5 activity (ATP-dependent condensation of L-citrulline and L-aspartate to argininosuccinate), matching the UniProt RecName (HAMAP-Rule MF_00005) and the argininosuccinate synthase family assignment. Accept as the defining activity.
    action: ACCEPT
- term:
    id: GO:0005524
    label: ATP binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: ArgG is an ATP-dependent ligase; ATP binding and hydrolysis (to AMP + PPi) provide the energy for the condensation. Correct supporting molecular function, but ATP binding is a general activity captured more informatively by the specific synthase activity term; keep as non-core.
    action: KEEP_AS_NON_CORE
- term:
