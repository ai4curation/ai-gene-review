id: P59604
gene_symbol: argG
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: >-
  ArgG (PP_1088) is argininosuccinate synthase (EC 6.3.4.5), a predicted
  homotetrameric cytoplasmic enzyme that catalyzes the penultimate reaction of
  L-arginine biosynthesis. Using ATP, it condenses L-citrulline with
  L-aspartate to form argininosuccinate, releasing AMP and diphosphate. ArgH
  then cleaves argininosuccinate to yield L-arginine and fumarate.
existing_annotations:
- term:
    id: GO:0000050
    label: urea cycle
  evidence_type: IEA
  original_reference_id: GO_REF:0000118
  qualifier: involved_in
  review:
    summary: PSEPK ArgG performs arginine biosynthesis, not a ureagenic urea cycle.
    action: REMOVE
    reason: >-
      This TreeGrafter IEA propagates a eukaryotic/ureagenic process from shared
      argininosuccinate chemistry. The reviewed bacterial record places P59604
      specifically in L-arginine biosynthesis, and KT2440 lacks a complete urea
      cycle.
- term:
    id: GO:0004055
    label: argininosuccinate synthase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: Core molecular function. This is the EC 6.3.4.5 activity (ATP-dependent
      condensation of L-citrulline and L-aspartate to argininosuccinate), matching
      the UniProt RecName (HAMAP-Rule MF_00005) and the argininosuccinate synthase
      family assignment. Accept as the defining activity.
    action: ACCEPT
    reason: >-
      Reviewed UniProt assigns EC 6.3.4.5, RHEA:10932, HAMAP MF_00005, and the
      type 1 argininosuccinate synthase family to P59604.
    supported_by:
    - reference_id: file:PSEPK/argG/argG-uniprot.txt
      supporting_text: Full=Argininosuccinate synthase
    - reference_id: file:PSEPK/argG/argG-deep-research-openscientist.md
      supporting_text: >-
        L-citrulline + L-aspartate + ATP → N-(L-argininosuccinate) + AMP + PPi
- term:
    id: GO:0005524
    label: ATP binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: ArgG is an ATP-dependent ligase; ATP binding and hydrolysis (to AMP +
      PPi) provide the energy for the condensation. Correct supporting molecular function,
      but ATP binding is a general activity captured more informatively by the specific
      synthase activity term; keep as non-core.
    action: KEEP_AS_NON_CORE
- term:
    id: GO:0005737
    label: cytoplasm
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: located_in
  review:
    summary: ArgG is a soluble cytoplasmic biosynthetic enzyme.
    action: KEEP_AS_NON_CORE
    reason: The location is supported but is secondary to the catalytic reaction.
- term:
    id: GO:0006526
    label: L-arginine biosynthetic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: involved_in
  review:
    summary: Core biological process. ArgG catalyzes step 2/3 of L-arginine biosynthesis
      from L-ornithine and carbamoyl phosphate, as annotated in the UniProt PATHWAY
      field. Accept.
    action: ACCEPT
    reason: >-
      The reviewed UniProt pathway assignment supports this process, and a
      KT2440 argG deletion is arginine auxotrophic.
    additional_reference_ids:
    - PMID:31451546
