  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: located_in
  review:
    summary: Correct cellular component. Argininosuccinate synthase is a soluble cytoplasmic enzyme, consistent with the UniProt SUBCELLULAR LOCATION annotation (Cytoplasm). Accept.
    action: ACCEPT
- term:
