description: PP_2124 encodes an uncharacterized predicted glycosyltransferase in Pseudomonas putida KT2440. It is included in the KEGG exopolysaccharide and biofilm context, but first-pass evidence does not identify a specific glycan acceptor or support a confident lipopolysaccharide-specific role.
existing_annotations:
- term:
    id: GO:0009103
    label: lipopolysaccharide biosynthetic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000118
  qualifier: involved_in
  review:
    summary: The LPS biosynthetic process annotation is likely over-propagated for PP_2124.
    action: MARK_AS_OVER_ANNOTATED
    reason: PP_2124 is a predicted glycosyltransferase with KEGG exopolysaccharide/biofilm context, but the UniProt entry gives only a generic glycosyl transferase name and no LPS-specific substrate or pathway detail. The TreeGrafter LPS process annotation should not be treated as a core process without stronger substrate evidence.
    supported_by:
    - reference_id: file:PSEPK/PP_2124/PP_2124-uniprot.txt
      supporting_text: 'SubName: Full=Glycosyl transferase'
    - reference_id: file:PSEPK/PP_2124/PP_2124-goa.tsv
      supporting_text: "GO:0009103\tlipopolysaccharide biosynthetic process"
- term:
    id: GO:0016757
    label: glycosyltransferase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: The broad glycosyltransferase activity annotation is acceptable as a first-pass molecular-function assignment.
    action: ACCEPT
    reason: UniProt, ARBA/PANTHER, Pfam, and the GOA entry consistently identify PP_2124 as a glycosyltransferase-family protein, although the donor, acceptor, and glycan product remain unresolved.
    supported_by:
    - reference_id: file:PSEPK/PP_2124/PP_2124-uniprot.txt
      supporting_text: 'SubName: Full=Glycosyl transferase'
    - reference_id: file:PSEPK/PP_2124/PP_2124-uniprot.txt
