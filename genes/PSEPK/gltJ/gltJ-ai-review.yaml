  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: gltJ (PP_1070) encodes the second predicted multi-pass inner-membrane permease of the GltIJKL glutamate/aspartate ABC uptake system. Its MetI-like binding-protein-dependent transporter domains and adjacency to gltL, gltK, and gltI support a membrane channel role in ATP-driven acidic amino-acid import.
