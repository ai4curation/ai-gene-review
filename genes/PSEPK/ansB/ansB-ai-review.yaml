description: ansB (PP_2453) encodes a periplasmic glutaminase-asparaginase with L-asparagine and L-glutamine amidohydrolase
  activity. It can influence nitrogen and glutamine availability but is a boundary node in ppu00220 rather than a committed
  arginine-biosynthesis enzyme.
