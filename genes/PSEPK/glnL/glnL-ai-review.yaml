taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: glnL encodes NtrB, the sensory histidine kinase/phosphatase of the NtrB/NtrC two-component
  system in Pseudomonas putida KT2440. It autophosphorylates under nitrogen limitation, transfers phosphoryl
  groups to NtrC/GlnG, and can dephosphorylate NtrC when nitrogen is available.
