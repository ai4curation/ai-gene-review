description: PP_0870 encodes a predicted periplasmic substrate-binding component of the PP_0868-PP_0871 glycine betaine/carnitine/choline ABC importer. Its product name and OpuAC/ABC glycine-betaine substrate-binding domain support a compatible-solute recognition role feeding the YehX/YehW/PP_0871 transport machinery.
