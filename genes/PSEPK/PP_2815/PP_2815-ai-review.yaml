  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: PP_2815 encodes a predicted PucR family transcriptional regulator in Pseudomonas putida KT2440. The protein is
  in the XRE/Cro batch because of HTH or product-name signals, but its domain context points to RodZ-like, CdaR/PucR, or LuxR/GerE-like
  regulator biology rather than phage-specific regulation. This first pass keeps the transcription-regulator assignment conservative
  and leaves pathway placement unresolved.
