description: queC (PP_1226) encodes 7-cyano-7-deazaguanine synthase, also called preQ0 synthase, in the bacterial queuosine-tRNA
  biosynthesis pathway. Its inclusion in ppu00790 reflects shared pterin/deazapurine chemistry, not a strict role in tetrahydrofolate
  synthesis.
