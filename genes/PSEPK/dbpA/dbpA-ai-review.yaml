  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: dbpA encodes a DEAD-box ATP-dependent RNA helicase with a DbpA/CsdA-like RNA-binding domain and predicted 23S-rRNA
  specificity. It is best retained as a cytosolic RNA helicase/ribosome-assembly boundary factor rather than a generic hydrolase.
