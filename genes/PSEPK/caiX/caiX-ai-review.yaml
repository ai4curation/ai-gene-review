description: caiX (PP_0304) encodes a signal-peptide-bearing periplasmic substrate-binding component of the same choline/glycine-betaine substrate-binding protein family as CbcX, with a product name pointing to carnitine uptake. In this first pass it is best treated as a related periplasmic compatible-solute binding component, with the exact choline versus carnitine substrate preference left for experimental follow-up.
