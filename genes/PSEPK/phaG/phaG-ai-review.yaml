    id: GO:0042621
    label: poly(3-hydroxyalkanoate) biosynthetic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000041
  review:
    summary: PhaG should be connected to poly(3-hydroxyalkanoate) biosynthesis.
    action: NEW
    reason: The fetched GOA table has no annotations, but the reviewed UniProt entry carries a UniPathway record for polyhydroxyalkanoate
      biosynthesis and describes PhaG as supplying 3-hydroxyacyl-ACP precursor for this pathway. This records a missing GOA-baseline
      pathway annotation rather than treating the broad UniProt transferase parent as the informative function. The IEA/GO_REF:0000041
      evidence code is used deliberately because this is a recovered missing UniPathway-derived annotation, not a curator-generated
      experimental assertion.
    supported_by:
    - reference_id: PMID:9727022
      supporting_text: enabled PHA synthesis on gluconate as the carbon source
    - reference_id: file:PSEPK/phaG/phaG-uniprot.txt
      supporting_text: 'PATHWAY: Polyester biosynthesis; polyhydroxyalkanoate biosynthesis'
    - reference_id: file:PSEPK/phaG/phaG-uniprot.txt
      supporting_text: DR   UniPathway; UPA00212
references:
