- id: file:PSEPK/phaG/phaG-deep-research-falcon.md
  title: Falcon deep research report for phaG (PP_1408; O85207) in Pseudomonas putida KT2440
  findings:
  - statement: PhaG is the enzyme that links de novo fatty-acid synthesis to PHA by converting (R)-3-hydroxyacyl-ACP to (R)-3-hydroxyacyl-CoA,
      an ACP:CoA transacylase/transferase activity that creates direct PHA-synthase substrates from ACP-bound FAS intermediates.
    supporting_text: PhaG is widely described as the enzyme that links de novo FAS to PHA** by converting **(R)-3-hydroxyacyl-ACP
      → (R)-3-hydroxyacyl-CoA** (i.e., an ACP:CoA transacylase/transferase activity), thereby creating direct PHA-synthase
      substrates from ACP-bound FAS intermediates
    reference_section_type: OTHER
  - statement: A high-impact engineering study using KT2440 PhaG (PP_1408) reported metabolite signatures (170 mg/L C7-C13
      methyl ketones with no detectable 3-hydroxy methyl esters) interpreted as evidence that PpuPhaG functions primarily as
      a 3-hydroxyacyl ACP:CoA transacylase rather than a thioesterase.
    supporting_text: PpuPhaG overexpression supported production of **170 mg/L C7–C13 methyl ketones** with **no detectable
      3-hydroxy methyl esters**, which the authors interpret as evidence that PpuPhaG “functions primarily as a 3-hydroxyacyl
      ACP:CoA transacylase”
    reference_section_type: OTHER
  - statement: The dominant in vivo mechanism of PhaG has been debated; in some heterologous E. coli contexts expression of
      phaG led to secretion of free 3-hydroxy fatty acids (58% 3-hydroxydecanoic, 42% 3-hydroxyoctanoic acid), interpreted
      as thioesterase-like behavior that requires a downstream acyl-CoA ligase to re-form CoA thioesters.
    supporting_text: expressing **phaG** led to secretion of ~**30 mg/L** free 3-hydroxy fatty acids (notably **58% 3-hydroxydecanoic
      acid** and **42% 3-hydroxyoctanoic acid**), interpreted as consistent with **thioesterase** function
    reference_section_type: OTHER
  - statement: 2023 deletion genetics in KT2440 show PhaG monomer supply is partially redundant — additional phaG deletion
      in a hydratase-deletion background caused a further 1.8-fold decrease in PHA but did not abolish PHA accumulation.
    supporting_text: Additional **phaG deletion** caused a **further 1.8-fold decrease** in PHA content but **did not abolish**
      PHA accumulation
    reference_section_type: OTHER
  - statement: PhaG is part of the monomer supply network but KT2440 can route carbon to PHA through other enzymes/pathways
      when PhaG is absent, indicating a robust redundant network rather than a single essential step.
    supporting_text: This indicates that (i) PhaG is part of the monomer supply network and (ii) KT2440 can route carbon to
      PHA through other enzymes/pathways when PhaG is absent
    reference_section_type: OTHER
  - statement: No direct experimental localization of KT2440 PhaG exists; activity on ACP-bound cytosolic fatty-acid-synthesis
      intermediates implies a cytosolic functional context as an inference from substrate context.
    supporting_text: all mechanistic descriptions place its activity on **ACP-bound intermediates of cytosolic fatty-acid synthesis**,
      implying a **cytosolic** functional context
    reference_section_type: OTHER
  - statement: phaG transcription is strongly induced under nitrogen limitation, reported as ~220-fold higher under low-nitrogen
      PHA-producing conditions versus high nitrogen in KT2440.
    supporting_text: In KT2440, phaG transcription was reported as ~**220-fold higher** under low-nitrogen, PHA-producing conditions
      versus high nitrogen
    reference_section_type: OTHER
  - statement: The chain-length window associated with PhaG-mediated monomer supply is consistent with medium-chain-length
      PHA products, classically the C6-C14 range.
    supporting_text: The **chain-length window** associated with PhaG-mediated monomer supply is consistent with mcl products
      (classically **C6–C14** range
    reference_section_type: OTHER
