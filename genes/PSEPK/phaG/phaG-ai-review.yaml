proposed_new_terms:
- proposed_name: (R)-3-hydroxyacyl-ACP:CoA transacylase activity
  proposed_definition: Catalysis of the transfer of an (R)-3-hydroxyacyl group (e.g., 3-hydroxydecanoyl) between acyl carrier
    protein and coenzyme A, interconverting (R)-3-hydroxyacyl-ACP and (R)-3-hydroxyacyl-CoA. This activity connects de novo
    fatty-acid synthesis to medium-chain-length polyhydroxyalkanoate monomer supply.
  justification: The reviewed UniProt entry describes a specific PhaG transacylase reaction, but the only UniProt DR GO molecular-function
    term is the broad parent GO:0016740 transferase activity and the fetched GOA table has no rows; an OLS search for an existing
    'acyl-ACP:CoA transacylase activity' / '3-hydroxyacyl-ACP transferase activity' MF term returned no result. A substrate-specific
    activity term would support informative annotation of PhaG-family proteins. The proposed reaction is written as a transfer
    between ACP and CoA to remain agnostic to the still-debated physiological directionality (ACP→CoA transacylase versus thioesterase-then-ligase),
    while the enzyme-name (R)-3-hydroxyacyl-ACP:CoA convention follows the reviewed UniProt RecName.
  proposed_parent:
    id: GO:0016746
    label: acyltransferase activity
  supported_by:
  - reference_id: file:PSEPK/phaG/phaG-uniprot.txt
    supporting_text: Catalyzes the transfer of the acyl moiety from in vitro
  - reference_id: file:PSEPK/phaG/phaG-uniprot.txt
    supporting_text: synthesized 3-hydroxydecanoyl-CoA to acyl carrier protein
  - reference_id: PMID:9727022
    supporting_text: It catalyzes the transfer of the acyl moiety from in vitro synthesized 3-hydroxydecanoyl-CoA to acyl carrier
      protein, indicating that PhaG exhibits a 3-hydroxyacyl-CoA-acyl carrier protein transferase activity
  - reference_id: file:PSEPK/phaG/phaG-deep-research-falcon.md
    supporting_text: converting **(R)-3-hydroxyacyl-ACP → (R)-3-hydroxyacyl-CoA** (i.e., an ACP:CoA transacylase/transferase
      activity), thereby creating direct PHA-synthase substrates from ACP-bound FAS intermediates
suggested_questions:
- question: Is PhaG active on additional 3-hydroxyacyl chain lengths in KT2440, or is 3-hydroxydecanoyl the physiologically
    dominant donor?
- question: What is the dominant in vivo activity of KT2440 PhaG — direct ACP:CoA transacylation or thioesterase-mediated release
    of free 3-hydroxy fatty acids followed by acyl-CoA ligase (e.g., AlkK/PP_0763) activation — and does this differ between
    native KT2440 and heterologous hosts?
suggested_experiments:
- description: Measure purified PhaG activity with a panel of 3-hydroxyacyl-ACP and 3-hydroxyacyl-CoA donors/acceptors to resolve
    directionality and chain-length specificity, and compare PHA monomer composition in a phaG knockout versus wild-type KT2440.
  experiment_type: enzyme substrate panel and PHA composition assay
- description: Reconstruct the FAS-to-PHA route in a thioesterase-minimized E. coli background with and without an acyl-CoA
    ligase to discriminate the transacylase versus thioesterase+ligase models for PhaG in vivo.
  experiment_type: heterologous pathway reconstruction with controlled thioesterase/ligase background
