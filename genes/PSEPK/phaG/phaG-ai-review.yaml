  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: phaG encodes a 3-hydroxyacyl-CoA-acyl carrier protein transacylase that supplies 3-hydroxyacyl-ACP intermediates
  for polyhydroxyalkanoate biosynthesis.
