proposed_new_terms:
- proposed_name: 3-hydroxydecanoyl-CoA:acyl-carrier-protein transacylase activity
  proposed_definition: Catalysis of the transfer of a 3-hydroxydecanoyl acyl group from 3-hydroxydecanoyl-CoA to acyl carrier
    protein.
  justification: The reviewed UniProt entry describes a specific PhaG transacylase reaction, but the only UniProt DR GO molecular-function
    term is the broad parent GO:0016740 transferase activity and the fetched GOA table has no rows. A substrate-specific activity
    term would support informative annotation of PhaG proteins. The proposed direction follows the UniProt functional statement
    that PhaG transfers the acyl moiety from 3-hydroxydecanoyl-CoA to acyl carrier protein, even though enzyme-name conventions
    for this activity can be written in the reverse ACP:CoA order.
  proposed_parent:
    id: GO:0016746
    label: acyltransferase activity
  supported_by:
  - reference_id: file:PSEPK/phaG/phaG-uniprot.txt
    supporting_text: Catalyzes the transfer of the acyl moiety from in vitro
  - reference_id: file:PSEPK/phaG/phaG-uniprot.txt
    supporting_text: synthesized 3-hydroxydecanoyl-CoA to acyl carrier protein
  - reference_id: PMID:9727022
    supporting_text: PhaG exhibits a 3-hydroxyacyl-CoA-acyl carrier protein transferase activity
suggested_questions:
- question: Is PhaG active on additional 3-hydroxyacyl-CoA chain lengths in KT2440, or is 3-hydroxydecanoyl-CoA the physiologically
    dominant donor?
suggested_experiments:
- description: Measure purified PhaG activity with a panel of 3-hydroxyacyl-CoA donors and ACP acceptor, and compare PHA monomer
    composition in a phaG knockout.
  experiment_type: enzyme substrate panel and PHA composition assay
