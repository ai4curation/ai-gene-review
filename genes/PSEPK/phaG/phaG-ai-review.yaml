taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: phaG encodes a 3-hydroxyacyl-ACP:CoA transacylase (originally characterized as (R)-3-hydroxydecanoyl-ACP:CoA
  transacylase) that connects de novo fatty-acid synthesis to medium-chain-length polyhydroxyalkanoate (mcl-PHA) biosynthesis
  by supplying (R)-3-hydroxyacyl-CoA monomers from ACP-bound fatty-acid-synthesis intermediates. The directionality and exact
  in vivo mechanism (ACP:CoA transacylase versus thioesterase coupled to an acyl-CoA ligase) have been debated, and deletion
  genetics in KT2440 show PhaG is a contributory but non-essential, partially redundant node in PHA monomer supply.
existing_annotations:
- term:
    id: GO:0042621
    label: poly(3-hydroxyalkanoate) biosynthetic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000041
  review:
    summary: PhaG should be connected to poly(3-hydroxyalkanoate) biosynthesis. PhaG supplies (R)-3-hydroxyacyl-CoA monomers
      to PHA synthase by acting on ACP-bound de novo fatty-acid-synthesis intermediates, and is the originally described "metabolic
      link" between fatty acid de novo synthesis and PHA accumulation. Deep-research evidence confirms a consistent role in
      mcl-PHA monomer supply, while also showing this supply is partially redundant in KT2440 (deletion reduces but does not
      abolish PHA), so the involvement is genuine but contributory.
    action: NEW
    reason: The fetched GOA table has no annotations, but the reviewed UniProt entry carries a UniPathway record for polyhydroxyalkanoate
      biosynthesis and describes PhaG as supplying 3-hydroxyacyl precursor for this pathway. This records a missing GOA-baseline
      pathway annotation rather than treating the broad UniProt transferase parent as the informative function. The IEA/GO_REF:0000041
      evidence code is used deliberately because this is a recovered missing UniPathway-derived annotation, not a curator-generated
      experimental assertion. Falcon deep research independently supports involvement in mcl-PHA biosynthesis and adds the
      important nuance that PhaG is contributory but non-essential (redundant monomer supply), which is consistent with an
      'involved_in' pathway annotation rather than a claim of indispensability.
    supported_by:
    - reference_id: PMID:9727022
      supporting_text: enabled PHA synthesis on gluconate as the carbon source
    - reference_id: file:PSEPK/phaG/phaG-uniprot.txt
      supporting_text: 'PATHWAY: Polyester biosynthesis; polyhydroxyalkanoate biosynthesis'
    - reference_id: file:PSEPK/phaG/phaG-uniprot.txt
      supporting_text: DR   UniPathway; UPA00212
    - reference_id: file:PSEPK/phaG/phaG-deep-research-falcon.md
      supporting_text: PhaG is consistently positioned as enabling flux from FAS to PHA precursors by acting on **ACP-bound
        (R)-3-hydroxyacyl** intermediates and supplying PHA monomers
    - reference_id: file:PSEPK/phaG/phaG-deep-research-falcon.md
      supporting_text: Additional **phaG deletion** caused a **further 1.8-fold decrease** in PHA content but **did not abolish**
        PHA accumulation
references:
- id: PMID:9727022
  title: A new metabolic link between fatty acid de novo synthesis and polyhydroxyalkanoic acid synthesis
  findings:
  - statement: Rehm and colleagues cloned phaG from Pseudomonas putida KT2440 by phenotypic complementation, showed phaG-dependent
      PHA synthesis from gluconate, and demonstrated PhaG 3-hydroxyacyl-ACP:CoA transferase activity on 3-hydroxydecanoyl-CoA.
    supporting_text: It catalyzes the transfer of the acyl moiety from in vitro synthesized 3-hydroxydecanoyl-CoA to acyl carrier
      protein, indicating that PhaG exhibits a 3-hydroxyacyl-CoA-acyl carrier protein transferase activity
    reference_section_type: ABSTRACT
  - statement: phaG transcription is induced by gluconate, the carbon source under which PHA synthesis occurs, linking phaG
      expression to growth on de novo fatty-acid-synthesis substrates.
    supporting_text: Transcriptional induction of phaG was observed when gluconate was provided
    reference_section_type: ABSTRACT
  - statement: PhaG is ~44% identical to the RhlA rhamnolipid biosynthesis enzyme of Pseudomonas aeruginosa, placing it in
      a shared HAA-synthase/thioesterase/transacylase family.
    supporting_text: 44% amino acid identity to the primary structure of the rhlA gene product
    reference_section_type: ABSTRACT
