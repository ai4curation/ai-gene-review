suggested_questions:
- question: Does KT2440 HmgC require glutathione stoichiometrically or catalytically under physiological homogentisate-pathway conditions?
suggested_experiments:
- description: Assay purified HmgC with maleylacetoacetate under varied glutathione conditions and compare hmgC mutant metabolite accumulation during tyrosine and phenylalanine growth.
