taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: hmgC encodes maleylacetoacetate isomerase (EC 5.2.1.2), a GST-zeta-family enzyme in the hmgABC homogentisate pathway. It isomerizes maleylacetoacetate to fumarylacetoacetate during degradation of L-phenylalanine and L-tyrosine to fumarate and acetoacetate.
