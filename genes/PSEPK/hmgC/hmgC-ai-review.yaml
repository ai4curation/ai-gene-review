id: Q88E49
gene_symbol: hmgC
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: >-
  HmgC is the glutathione-dependent maleylacetoacetate isomerase of the
  Pseudomonas putida KT2440 homogentisate pathway. It converts
  maleylacetoacetate to fumarylacetoacetate between the HmgA ring-cleavage and
  HmgB hydrolysis reactions during aromatic-compound catabolism.
existing_annotations:
- term:
    id: GO:0003824
    label: catalytic activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: Correct but uninformative parent-level catalytic annotation.
    action: MODIFY
    reason: >-
      Q88E49 has the specific maleylacetoacetate isomerase activity, so that
      term should replace generic catalytic activity.
    proposed_replacement_terms:
    - id: GO:0016034
      label: maleylacetoacetate isomerase activity
    supported_by:
    - reference_id: file:PSEPK/hmgC/hmgC-uniprot.txt
      supporting_text: 'SubName: Full=Maleylacetoacetate isomerase'
- term:
    id: GO:0004364
    label: glutathione transferase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000118
  qualifier: enables
  review:
    summary: Broad family-level activity associated with the GST-zeta HmgC enzyme.
    action: KEEP_AS_NON_CORE
    reason: >-
      HmgC belongs to the glutathione-transferase zeta family and uses
      glutathione in catalysis, but GO:0016034 captures its physiologically
      informative substrate-specific function.
    supported_by:
    - reference_id: file:PSEPK/hmgC/hmgC-uniprot.txt
      supporting_text: 'Belongs to the GST superfamily. Zeta family.'
- term:
    id: GO:0005737
    label: cytoplasm
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: located_in
  review:
    summary: Consistent localization for a soluble intracellular pathway enzyme.
    action: ACCEPT
    reason: >-
      HmgC acts between the soluble HmgA and HmgB reactions in the intracellular
      homogentisate pathway and has no signal peptide or membrane role.
- term:
    id: GO:0006559
    label: L-phenylalanine catabolic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000118
  qualifier: involved_in
  review:
    summary: Correct pathway annotation for phenylalanine degradation through homogentisate.
    action: ACCEPT
    reason: >-
      The P. putida pathway study establishes that phenylalanine is converted
      to homogentisate and then catabolized by HmgABC.
    supported_by:
    - reference_id: PMID:15262943
      supporting_text: >-
        Pseudomonas putida metabolizes Phe and Tyr through a peripheral pathway
        involving hydroxylation of Phe to Tyr (PhhAB), conversion of Tyr into
        4-hydroxyphenylpyruvate (TyrB), and formation of homogentisate (Hpd) as
        the central intermediate.
      full_text_unavailable: true
- term:
    id: GO:0006749
    label: glutathione metabolic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000118
  qualifier: involved_in
  review:
    summary: Over-propagated process annotation from the GST-zeta enzyme family.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      Glutathione is a catalytic cofactor for maleylacetoacetate isomerization;
      that cofactor requirement does not make HmgC part of glutathione
      biosynthesis, degradation, or homeostasis. Its established biological
      process is homogentisate catabolism.
    supported_by:
    - reference_id: file:PSEPK/hmgC/hmgC-deep-research-openscientist.md
      supporting_text: 'It uses reduced glutathione (GSH) as an **essential catalytic cofactor** that is regenerated each cycle rather than consumed.'
- term:
    id: GO:0009072
    label: aromatic amino acid metabolic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: involved_in
  review:
    summary: Broad parent process that obscures HmgC's defined pathway role.
    action: MODIFY
    reason: >-
      HmgC acts specifically in homogentisate catabolism, so GO:1902000 is more
      informative than generic aromatic amino acid metabolism.
    proposed_replacement_terms:
    - id: GO:1902000
      label: homogentisate catabolic process
    supported_by:
    - reference_id: PMID:15262943
      supporting_text: >-
        Homogentisate is then catabolized by a central catabolic pathway that
        involves three enzymes, homogentisate dioxygenase (HmgA),
        fumarylacetoacetate hydrolase (HmgB), and maleylacetoacetate isomerase
        (HmgC), finally yielding fumarate and acetoacetate.
      full_text_unavailable: true
