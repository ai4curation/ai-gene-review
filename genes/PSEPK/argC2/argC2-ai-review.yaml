id: P59308
gene_symbol: argC2
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: >-
  ArgC2 (PP_3633) is a type 2 N-acetyl-gamma-glutamyl-phosphate reductase
  (EC 1.2.1.38). It uses NADPH to reduce N-acetyl-L-glutamyl 5-phosphate to
  N-acetyl-L-glutamate 5-semialdehyde in the acetylated-ornithine route to
  L-arginine. KT2440 also encodes the structurally distinct type 1 isoenzyme
  ArgC1.
existing_annotations:
- term:
    id: GO:0003942
    label: N-acetyl-gamma-glutamyl-phosphate reductase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: This is the defining ArgC2 molecular function.
    action: ACCEPT
    reason: The reviewed UniProt record assigns EC 1.2.1.38, RHEA:21588, and the type 2 ArgC family to P59308.
    supported_by:
    - reference_id: file:PSEPK/argC2/argC2-uniprot.txt
      supporting_text: Full=N-acetyl-gamma-glutamyl-phosphate reductase 2
    - reference_id: file:PSEPK/argC2/argC2-deep-research-openscientist.md
      supporting_text: >-
        N-acetyl-L-glutamyl-5-phosphate + NADPH + H⁺ →
        N-acetyl-L-glutamate-5-semialdehyde + phosphate + NADP⁺
- term:
    id: GO:0005737
    label: cytoplasm
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: located_in
  review:
    summary: ArgC2 is a soluble cytoplasmic biosynthetic enzyme.
    action: KEEP_AS_NON_CORE
    reason: The location is supported but is secondary to the reaction.
- term:
    id: GO:0006526
    label: L-arginine biosynthetic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: involved_in
  review:
    summary: ArgC2 performs the third acetylated-ornithine reaction during L-arginine synthesis.
    action: ACCEPT
    reason: The reviewed UniProt pathway assignment directly supports this process.
- term:
    id: GO:0016620
    label: oxidoreductase activity, acting on the aldehyde or oxo group of donors,
      NAD or NADP as acceptor
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: This broad oxidoreductase term is redundant with the specific ArgC reaction.
    action: MARK_AS_OVER_ANNOTATED
    reason: GO:0003942 captures the substrate-specific NADPH-dependent reaction.
- term:
    id: GO:0051287
    label: NAD binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: The curated ArgC2 reaction uses NADP(H), not NAD(H).
    action: REMOVE
    reason: Reviewed UniProt and HAMAP specify NADPH-dependent reduction; this broad-domain InterPro mapping assigns the wrong nicotinamide cofactor.
