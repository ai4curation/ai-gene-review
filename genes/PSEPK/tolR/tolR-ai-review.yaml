      supports outer-membrane invagination during cell division and maintains
      envelope integrity.
    action: ACCEPT
- term:
    id: GO:0055085
    label: transmembrane transport
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: involved_in
  review:
    summary: Transmembrane transport is an over-broad electronic projection from
      ExbD/TolR-family membrane proteins. Keep the membrane location and
      Tol-Pal cell-division role, but do not treat TolR as a generic
      transmembrane transporter.
    action: MARK_AS_OVER_ANNOTATED
