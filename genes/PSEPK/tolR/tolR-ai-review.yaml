id: Q88NI7
gene_symbol: tolR
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: >-
  tolR encodes the TolR component of the Gram-negative Tol-Pal envelope system.
  TolR is an ExbD/TolR-family single-pass inner-membrane protein that works with
  TolQ and TolA as part of the energized Tol-Pal machinery connecting the inner
  membrane, periplasm, peptidoglycan, and outer membrane. Its main pathway role
  is envelope coordination during cell division and maintenance of
  outer-membrane integrity; generic transporter and protein-transport
  annotations are family spillovers rather than substrate-specific transport
  functions for TolR itself.
