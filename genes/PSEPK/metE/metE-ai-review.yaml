description: metE (PP_2698) encodes a cobalamin-independent methionine synthase, 5-methyltetrahydropteroyltriglutamate--homocysteine S-methyltransferase (EC 2.1.1.14). It catalyzes the terminal step of de novo L-methionine biosynthesis, transferring a methyl group from 5-methyltetrahydropteroyltri-L-glutamate (methyl-tetrahydrofolate) to the thiol of L-homocysteine to yield L-methionine and tetrahydropteroyltri-L-glutamate. Unlike the cobalamin-dependent MetH enzyme, MetE requires no vitamin B12 cofactor but uses a catalytic zinc ion to bind and activate the homocysteine thiolate. The enzyme is a soluble cytoplasmic protein and supplies methionine for protein synthesis and, via S-adenosylmethionine, for cellular methylation reactions.
