- term:
    id: GO:0009086
    label: L-methionine biosynthetic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: involved_in
  review:
    summary: Proposed new biological-process annotation. The current GOA lacks a BP term for metE, but cobalamin-independent methionine synthase catalyzes the committed terminal step of de novo L-methionine biosynthesis (5-methyltetrahydropteroyltriglutamate + L-homocysteine -> L-methionine + tetrahydropteroyltriglutamate; UniProt PATHWAY annotates L-methionine biosynthesis via de novo pathway, step 1/1). This BP is well supported by the EC 2.1.1.14 activity and the conserved MetE family assignment and should be added, mirroring the paired terminal-step biosynthetic enzymes lysA, proC, thrC, argG, and hisD that all carry the corresponding amino-acid biosynthetic-process term.
    action: NEW
