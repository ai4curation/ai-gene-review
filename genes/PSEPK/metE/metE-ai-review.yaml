id: Q88JF1
gene_symbol: metE
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: metE (PP_2698) encodes a compact single-barrel MetE-like enzyme predicted
  to catalyze cobalamin-independent methylation of L-homocysteine to L-methionine.
  It contains the conserved C-terminal/archaeal-type MetE catalytic barrel and zinc
  site rather than the canonical bacterial two-barrel architecture, so its activity
  is currently supported by domain, residue, and pathway evidence rather than direct
  KT2440 biochemical characterization.
existing_annotations:
- term:
    id: GO:0003871
    label: 5-methyltetrahydropteroyltriglutamate-homocysteine S-methyltransferase
      activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: Cobalamin-independent methionine synthase activity is the best predicted
      function for this compact MetE-like catalytic barrel.
    action: ACCEPT
    reason: PP_2698 is a 344-aa PF01717/Meth_synt_2 C-terminal/archaeal-type MetE
      protein with conserved zinc/homocysteine-site motifs. Gene-level retrieval
      supports a functional single-barrel MetE interpretation, though activity has
      not been directly tested in KT2440.
    supported_by:
    - reference_id: file:PSEPK/metE/metE-goa.tsv
      supporting_text: "GO:0003871\t5-methyltetrahydropteroyltriglutamate-homocysteine S-methyltransferase activity"
    - reference_id: file:PSEPK/metE/metE-uniprot.txt
      supporting_text: "SubName: Full=5-methyltetrahydropteroyltriglutamate-homocysteine methyltransferase"
    - reference_id: file:PSEPK/metE/metE-uniprot.txt
      supporting_text: "ID   Q88JF1_PSEPK            Unreviewed;       344 AA."
    - reference_id: file:projects/P_PUTIDA/deep-research/PSEPK__methionine_biosynthesis__ppu00270-deep-research-openscientist.md
      supporting_text: "Only 344 aa, PE=4 (predicted), carries **only** the C-terminal PF01717 (Meth_synt_2) domain."
    - reference_id: file:PSEPK/metE/metE-deep-research-openscientist.md
      supporting_text: "Q88JF1 is therefore a **single-domain, C-terminal-barrel (archaeal-type) MetE**"
- term:
    id: GO:0008270
    label: zinc ion binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: Zinc binding is a catalytic cofactor feature of the predicted compact
      MetE enzyme.
    action: KEEP_AS_NON_CORE
    reason: Zinc binding supports homocysteine activation in MetE catalysis, but
      the core molecular function is the methyltransferase reaction.
    supported_by:
