suggested_questions:
- question: Does PP_2698 act as a standalone single-barrel MetE in KT2440, or does
    PP_4637 improve activity or folate-polyglutamate binding as an auxiliary N-terminal
    barrel?
suggested_experiments:
- description: Test purified PP_2698 alone and together with PP_4637 for cobalamin-independent
    methionine synthase activity using polyglutamylated 5-methyltetrahydrofolate
    and L-homocysteine.
  experiment_type: biochemical reconstitution assay
