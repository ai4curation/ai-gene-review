core_functions:
  - description: >-
      PvdS is an extracytoplasmic-function sigma factor that associates with RNA
      polymerase core to direct transcription initiation at a specific class of promoters.
      In Pseudomonas putida KT2440, the available strain-specific evidence most strongly
      supports a role in activating the pyoverdine/siderophore transcriptional program
      during iron limitation.
    molecular_function:
      id: GO:0016987
      label: sigma factor activity
    directly_involved_in:
      - id: GO:0006352
        label: DNA-templated transcription initiation
      - id: GO:1900706
        label: positive regulation of siderophore biosynthetic process
    supported_by:
      - reference_id: file:PSEPK/pvdS/pvdS-deep-research-falcon.md
        supporting_text: "The most parsimonious interpretation is that PP_4244/pvdS is the iron-starvation ECF sigma factor that promotes transcription of pyoverdine biosynthetic and transport genes in KT2440."
      - reference_id: file:PSEPK/pvdS/pvdS-deep-research-falcon.md
        supporting_text: "In molecular terms, PvdS should be understood as a promoter-specificity subunit that associates with the RNA polymerase core enzyme to direct transcription initiation at iron-responsive promoters, not as an enzyme in pyoverdine chemistry itself."
suggested_questions:
  - question: What is the direct PvdS regulon in Pseudomonas putida KT2440 under iron limitation?
  - question: Does PvdS directly regulate only pyoverdine biosynthetic genes, or also siderophore export and uptake genes in KT2440?
suggested_experiments:
  - description: >-
      Compare wild-type and delta-pvdS transcriptomes during iron limitation with
      matched pyoverdine measurements to define the PvdS-dependent regulon and connect
      it to siderophore output.
    hypothesis: PvdS activates transcription of pyoverdine biosynthetic and transport genes during iron limitation in KT2440
    experiment_type: RNA-seq
  - description: >-
      Map direct promoter occupancy for PvdS under iron limitation by ChIP-seq or
      targeted promoter-binding assays using candidate pyoverdine biosynthetic and
      transport loci.
    hypothesis: PvdS directly binds promoters of pyoverdine-associated genes in KT2440
    experiment_type: ChIP-seq
