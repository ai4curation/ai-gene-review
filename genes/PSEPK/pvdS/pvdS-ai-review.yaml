id: Q88F55
gene_symbol: pvdS
product_type: PROTEIN
aliases:
- PP_4244
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: PvdS (PP_4244) is a 176 aa extracytoplasmic-function sigma factor of
  the sigma-70 family in Pseudomonas putida KT2440. Sequence architecture and database
  assignment strongly support a role as an RNA polymerase promoter-specificity factor
  rather than an enzyme. In KT2440, the most defensible strain-specific synthesis
  is that PvdS mediates an iron-limitation transcriptional program centered on pyoverdine/siderophore
  production, but this remains an inference from gene identity, conserved sigma-factor
  architecture, and KT2440 pyoverdine biology rather than a direct PP_4244 knockout
  or promoter-binding study.
existing_annotations:
- term:
    id: GO:0003677
    label: DNA binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: This broad molecular function is appropriate for PvdS. Sigma factors
      contact promoter DNA as part of the RNA polymerase holoenzyme, and the PvdS
      sequence contains the expected sigma-70 region 4 DNA-recognition module. The
      local UniProt record places the protein in the sigma-70 ECF family, and the
      deep research synthesis explicitly treats PvdS as a promoter-specificity factor
      for iron-responsive promoters.
    action: ACCEPT
    reason: DNA binding is a valid parent annotation for a sigma factor. Although
      GO:0016987 is more informative, GO:0003677 is still correct and not misleading
      here.
    supported_by:
    - reference_id: file:PSEPK/pvdS/pvdS-uniprot.txt
      supporting_text: Belongs to the sigma-70 factor family. ECF subfamily.
    - reference_id: file:PSEPK/pvdS/pvdS-deep-research-falcon.md
      supporting_text: In molecular terms, PvdS should be understood as a promoter-specificity
        subunit that associates with the RNA polymerase core enzyme to direct transcription
        initiation at iron-responsive promoters, not as an enzyme in pyoverdine chemistry
        itself.
- term:
    id: GO:0003700
    label: DNA-binding transcription factor activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: PvdS does regulate transcription and does bind promoter DNA, but the
      mechanism is sigma-factor mediated rather than that of a classical stand-alone
      transcription factor. This InterPro-derived annotation captures part of the
      biology but uses a less precise GO molecular function than the sigma-factor-specific
      term.
    action: MODIFY
    reason: Sigma factors are better annotated with GO:0016987 sigma factor activity.
      That term captures the defining molecular role of PvdS as the promoter-recognition
      subunit of RNA polymerase.
    proposed_replacement_terms:
    - id: GO:0016987
      label: sigma factor activity
    supported_by:
    - reference_id: file:PSEPK/pvdS/pvdS-uniprot.txt
      supporting_text: Belongs to the sigma-70 factor family. ECF subfamily.
    - reference_id: file:PSEPK/pvdS/pvdS-deep-research-falcon.md
      supporting_text: In molecular terms, PvdS should be understood as a promoter-specificity
        subunit that associates with the RNA polymerase core enzyme to direct transcription
        initiation at iron-responsive promoters, not as an enzyme in pyoverdine chemistry
        itself.
- term:
    id: GO:0006352
    label: DNA-templated transcription initiation
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: This is a core process annotation for PvdS. Sigma factors function specifically
      at transcription initiation by associating with RNA polymerase core and directing
      promoter selection. Both the UniProt family assignment and the deep research
      synthesis support this interpretation for PP_4244.
    action: ACCEPT
    reason: DNA-templated transcription initiation is the central step at which sigma
      factors act, so this annotation is specific and mechanistically correct.
    supported_by:
    - reference_id: file:PSEPK/pvdS/pvdS-deep-research-falcon.md
      supporting_text: In molecular terms, PvdS should be understood as a promoter-specificity
        subunit that associates with the RNA polymerase core enzyme to direct transcription
        initiation at iron-responsive promoters, not as an enzyme in pyoverdine chemistry
        itself.
- term:
    id: GO:0006355
    label: regulation of DNA-templated transcription
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  review:
    summary: PvdS is an alternative sigma factor, so a major consequence of its activity
      is selective transcriptional regulation of a defined regulon. For KT2440, the
      strongest strain-specific synthesis is regulation of iron-starvation and pyoverdine-associated
      genes rather than generic transcriptional control.
    action: ACCEPT
    reason: This biological process term correctly captures the regulatory outcome
      of sigma-factor activity and is appropriate even though more specific downstream
      regulon targets are still being inferred.
    supported_by:
    - reference_id: file:PSEPK/pvdS/pvdS-deep-research-falcon.md
      supporting_text: The most parsimonious interpretation is that PP_4244/pvdS is
        the iron-starvation ECF sigma factor that promotes transcription of pyoverdine
        biosynthetic and transport genes in KT2440.
- term:
    id: GO:0016987
    label: sigma factor activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  review:
    summary: This is the best molecular function annotation for PvdS. The UniProt
      record assigns PP_4244 to the sigma-70 ECF subfamily, and the protein architecture
      contains the conserved sigma regions expected for promoter recognition and RNA
      polymerase interaction.
    action: ACCEPT
    reason: Sigma factor activity is the defining molecular role of PvdS and should
      be retained as a core annotation.
    supported_by:
    - reference_id: file:PSEPK/pvdS/pvdS-uniprot.txt
      supporting_text: Belongs to the sigma-70 factor family. ECF subfamily.
    - reference_id: file:PSEPK/pvdS/pvdS-deep-research-falcon.md
      supporting_text: KEGG annotates PP_4244 as pvdS, an alternative sigma factor,
        and UniProt assigns it to the sigma-70 ECF subfamily with conserved region
        2 and region 4 domains.
- term:
    id: GO:2000142
    label: regulation of DNA-templated transcription initiation
  evidence_type: IEA
  original_reference_id: GO_REF:0000108
  review:
    summary: This logical-inference annotation is consistent with accepted sigma-factor
      biology. Because sigma factors act at the initiation step, PvdS regulates transcription
      specifically by determining which promoters can initiate transcription with
      the RNA polymerase holoenzyme.
    action: ACCEPT
    reason: The term is an appropriate process-level consequence of sigma factor activity
      and is more specific than generic transcription regulation.
    supported_by:
    - reference_id: file:PSEPK/pvdS/pvdS-deep-research-falcon.md
      supporting_text: In molecular terms, PvdS should be understood as a promoter-specificity
        subunit that associates with the RNA polymerase core enzyme to direct transcription
        initiation at iron-responsive promoters, not as an enzyme in pyoverdine chemistry
        itself.
- term:
    id: GO:1900706
    label: positive regulation of siderophore biosynthetic process
  evidence_type: IC
  original_reference_id: curator_inference
  review:
    summary: >-
      Added as a conservative curator inference to capture the most specific strain-level
      biological role currently supported for PvdS in KT2440. The gene is explicitly
      assigned as pvdS in UniProt and KEGG, and KT2440 literature consistently
      places pyoverdine production and secretion within the iron-limitation program.
      The evidence does not yet include a direct PP_4244 perturbation study in KT2440,
      so this should be treated as a synthesized regulatory annotation rather than
      a direct experimental claim.
    action: NEW
    reason: >-
      PvdS is most plausibly the sigma factor that positively regulates pyoverdine/siderophore
      gene expression in KT2440. This term captures that biology more precisely
      than the generic transcription terms already present in GOA.
    supported_by:
      - reference_id: file:PSEPK/pvdS/pvdS-deep-research-falcon.md
        supporting_text: "The most parsimonious interpretation is that PP_4244/pvdS is the iron-starvation ECF sigma factor that promotes transcription of pyoverdine biosynthetic and transport genes in KT2440."
      - reference_id: file:PSEPK/pvdS/pvdS-deep-research-falcon.md
        supporting_text: "Pyoverdine secretion and pyoverdine-related genes are stimulated by iron limitation in KT2440, supporting an iron-starvation regulon centered on siderophore production and export."
