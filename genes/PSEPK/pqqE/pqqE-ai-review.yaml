taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: pqqE encodes the radical-SAM PqqA peptide cyclase that initiates PQQ biosynthesis by cross-linking
  glutamate and tyrosine residues in the PqqA precursor peptide. Its core function is PqqA peptide cyclization
  with required SAM and [4Fe-4S] cofactors.
