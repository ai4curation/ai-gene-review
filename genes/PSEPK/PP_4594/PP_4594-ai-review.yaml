suggested_questions:
- question: Is PP_4594 a cystathionine gamma-lyase, a cystathionine gamma-synthase
    paralog, or a selenocompound/cysteine-pathway enzyme outside methionine biosynthesis?
suggested_experiments:
- description: Compare PP_4594 and MetB substrate preferences using cystathionine,
    O-succinylhomoserine, O-acetylhomoserine, cysteine, and selenium analogs.
  experiment_type: comparative PLP-enzyme substrate profiling
