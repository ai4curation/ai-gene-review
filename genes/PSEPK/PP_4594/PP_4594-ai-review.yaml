    id: GO:0004123
    label: cystathionine gamma-lyase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000118
  qualifier: enables
  review:
    summary: Cystathionine gamma-lyase activity may be correct for this paralog, but it is not resolved enough for module-core use.
    action: UNDECIDED
    reason: GOA/PANTHER assign cystathionine gamma-lyase activity, while UniProt's
      submitted protein name says cystathionine gamma-synthase. Without direct biochemical
      or phylogenetic evidence separating this paralog from metB, the specific activity
      should remain unresolved.
    supported_by:
