id: Q88EH2
gene_symbol: phhB
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: phhB encodes pterin-4-alpha-carbinolamine dehydratase, an enzyme in tetrahydrobiopterin recycling/biosynthesis that dehydrates 4-alpha-hydroxytetrahydrobiopterin to quinonoid dihydrobiopterin. The catalytic dehydratase annotation and tetrahydrobiopterin biosynthesis process are appropriate. The possible positive regulatory role for phhA expression is noted by similarity only, so no regulatory GO annotation is added here.
