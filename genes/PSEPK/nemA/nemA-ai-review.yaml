taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: nemA (PP_3173) encodes a predicted cytosolic FMN-linked N-ethylmaleimide/OYE-family reductase. It provides
  redox side context in the ppu00633 nitrotoluene-degradation map, but its KT2440 physiological substrate is unresolved.
existing_annotations:
- term:
    id: GO:0005829
    label: cytosol
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: located_in
  review:
    summary: Cytosol is plausible localization context for this soluble FMN-linked reductase.
    action: KEEP_AS_NON_CORE
    reason: UniProt/GOA place nemA in the cytosol. Localization supports the soluble enzyme assignment but is not
      itself a core function.
    supported_by:
    - reference_id: file:PSEPK/nemA/nemA-goa.tsv
      supporting_text: "GO:0005829\tcytosol"
    - reference_id: file:PSEPK/nemA/nemA-uniprot.txt
      supporting_text: "GO; GO:0005829; C:cytosol; IEA:UniProtKB-ARBA."
- term:
    id: GO:0010181
    label: FMN binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: FMN binding is supported by the OYE/NADH:flavin oxidoreductase family assignment.
    action: KEEP_AS_NON_CORE
    reason: FMN binding is expected for the OxRdtase_FMN_N/OYE-like domain and supports the reductase assignment,
      but the catalytic activity is the core function.
    supported_by:
    - reference_id: file:PSEPK/nemA/nemA-goa.tsv
      supporting_text: "GO:0010181\tFMN binding"
    - reference_id: file:PSEPK/nemA/nemA-uniprot.txt
      supporting_text: "Name=FMN; Xref=ChEBI:CHEBI:58210;"
- term:
    id: GO:0016491
    label: oxidoreductase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: Broad oxidoreductase activity is supported but should be refined to the more specific UniProt DR term for
      this FMN-linked OYE-family reductase.
    action: MODIFY
    reason: The GOA TSV supplies only the broad oxidoreductase parent, while the UniProt flat file carries the more
      specific CH-CH donor/NAD(P) acceptor oxidoreductase term for this NADH:flavin oxidoreductase family protein.
    proposed_replacement_terms:
    - id: GO:0016628
      label: oxidoreductase activity, acting on the CH-CH group of donors, NAD or NADP as acceptor
    supported_by:
    - reference_id: file:PSEPK/nemA/nemA-goa.tsv
      supporting_text: "GO:0016491\toxidoreductase activity"
    - reference_id: file:PSEPK/nemA/nemA-uniprot.txt
      supporting_text: "GO; GO:0016628; F:oxidoreductase activity, acting on the CH-CH group of donors, NAD or NADP as acceptor;"
