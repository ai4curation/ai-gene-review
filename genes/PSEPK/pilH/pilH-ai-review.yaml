description: pilH (PP_4991) encodes a small receiver-domain response-regulator candidate in the Pseudomonas
  putida KT2440 Pil/Chp-type signaling cluster. The protein is predicted to participate in phosphorelay
  signaling, but its direct phosphoryl donor, output target, and effect on twitching motility remain to
  be tested.
