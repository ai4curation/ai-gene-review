suggested_questions:
- question: Does PP_2170 supply a siderophore-group aryl-acid precursor in KT2440, or is its KEGG ppu01053 placement only broad chorismate-pathway context?
- question: Is the TreeGrafter salicylic-acid biosynthetic process annotation derived from a paralog with salicylate/isochorismate activity rather than from PP_2170-like chorismate mutases?
suggested_experiments:
- description: >-
    Measure PP_2170 activity on chorismate and test whether products are
    prephenate rather than isochorismate or salicylate.
- description: >-
    Compare siderophore production under iron limitation in a PP_2170 deletion
    strain and a complemented strain to test whether this chorismate mutase is
    physiologically coupled to siderophore-group NRPS precursor supply.
