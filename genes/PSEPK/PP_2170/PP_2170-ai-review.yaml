id: Q88KW9
gene_symbol: PP_2170
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: >-
  PP_2170 is a predicted chorismate mutase in Pseudomonas putida KT2440. It has
  a prokaryotic chorismate-mutase domain and is annotated with EC 5.4.99.5,
  supporting conversion of chorismate toward prephenate for aromatic amino acid
  biosynthesis. Its placement in the KEGG siderophore-group nonribosomal-peptide
  map is best treated as boundary context pending direct evidence that this
  enzyme supplies a siderophore aryl-acid precursor in KT2440.
existing_annotations:
- term:
    id: GO:0004106
    label: chorismate mutase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: PP_2170 is predicted to have chorismate mutase activity.
    action: ACCEPT
    reason: >-
      UniProt annotates PP_2170 as chorismate mutase with EC 5.4.99.5, and the
      protein carries a chorismate mutase domain. The GO:0004106 annotation is
      therefore the most specific supported molecular function in the current
      first-pass evidence.
    supported_by:
    - reference_id: file:PSEPK/PP_2170/PP_2170-uniprot.txt
      supporting_text: 'DE   RecName: Full=chorismate mutase {ECO:0000256|ARBA:ARBA00012404};'
    - reference_id: file:PSEPK/PP_2170/PP_2170-uniprot.txt
      supporting_text: 'DE            EC=5.4.99.5 {ECO:0000256|ARBA:ARBA00012404};'
    - reference_id: file:PSEPK/PP_2170/PP_2170-uniprot.txt
      supporting_text: 'FT                   /note="Chorismate mutase"'
    - reference_id: file:PSEPK/PP_2170/PP_2170-deep-research-asta.md
      supporting_text: '- **Protein Description:** RecName: Full=chorismate mutase {ECO:0000256|ARBA:ARBA00012404}; EC=5.4.99.5 {ECO:0000256|ARBA:ARBA00012404};'
- term:
    id: GO:0008652
    label: amino acid biosynthetic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000104
  qualifier: involved_in
  review:
    summary: The broad amino acid biosynthesis annotation is supported only through the more specific aromatic-amino-acid route.
    action: MODIFY
    reason: >-
      Chorismate mutase acts on chorismate at the aromatic amino acid branch,
      so the generic amino acid biosynthetic process annotation is too broad for
      PP_2170. The same GOA set already contains the more informative aromatic
      amino acid biosynthetic process term.
    proposed_replacement_terms:
    - id: GO:0009073
      label: aromatic amino acid family biosynthetic process
    supported_by:
    - reference_id: file:PSEPK/PP_2170/PP_2170-uniprot.txt
      supporting_text: 'DR   GO; GO:0004106; F:chorismate mutase activity; IEA:UniProtKB-EC.'
    - reference_id: file:PSEPK/PP_2170/PP_2170-goa.tsv
      supporting_text: "UniProtKB\tQ88KW9\tPP_2170\tinvolved_in\tGO:0009073\taromatic amino acid biosynthetic process"
- term:
    id: GO:0009073
    label: aromatic amino acid biosynthetic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000104
  qualifier: involved_in
  review:
    summary: PP_2170 is plausibly involved in aromatic amino acid biosynthesis through chorismate mutase activity.
    action: ACCEPT
    reason: >-
      A predicted chorismate mutase supplies prephenate from chorismate, a
      branch-point reaction in aromatic amino acid biosynthesis. The annotation
      is consistent with the EC assignment and domain architecture.
    supported_by:
    - reference_id: file:PSEPK/PP_2170/PP_2170-uniprot.txt
      supporting_text: 'DE   RecName: Full=chorismate mutase {ECO:0000256|ARBA:ARBA00012404};'
    - reference_id: file:PSEPK/PP_2170/PP_2170-uniprot.txt
      supporting_text: 'InterPro; IPR002701; CM_II_prokaryot.'
    - reference_id: file:PSEPK/PP_2170/PP_2170-uniprot.txt
      supporting_text: 'PANTHER; PTHR38041; CHORISMATE MUTASE; 1.'
- term:
    id: GO:0009697
    label: salicylic acid biosynthetic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000118
  qualifier: involved_in
  review:
    summary: The salicylic-acid biosynthesis annotation is not supported by the current PP_2170 evidence.
    action: REMOVE
    reason: >-
      PP_2170 is annotated as chorismate mutase, not as an isochorismate
      synthase or salicylate synthase. The TreeGrafter salicylic-acid process
      annotation appears to be over-propagated from siderophore-group pathway
      context and should not be retained without direct evidence for salicylate
      precursor production.
    supported_by:
    - reference_id: file:PSEPK/PP_2170/PP_2170-uniprot.txt
      supporting_text: 'DE   RecName: Full=chorismate mutase {ECO:0000256|ARBA:ARBA00012404};'
    - reference_id: file:PSEPK/PP_2170/PP_2170-uniprot.txt
      supporting_text: 'DR   GO; GO:0009697; P:salicylic acid biosynthetic process; IEA:TreeGrafter.'
    - reference_id: file:PSEPK/PP_2170/PP_2170-uniprot.txt
      supporting_text: 'FT                   /note="Chorismate mutase"'
