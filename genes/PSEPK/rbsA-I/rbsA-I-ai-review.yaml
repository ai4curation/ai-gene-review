description: rbsA-I (PP_2455) encodes the ATP-binding energy-coupling subunit of the PP_2454-PP_2456 Rbs D-ribose ABC importer. Its ABC-carbohydrate-import ATPase domains, ATP-binding annotation, and local rbsB/rbsC context support ATP-dependent D-ribose uptake.
