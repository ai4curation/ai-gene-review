taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: murB encodes UDP-N-acetylenolpyruvoylglucosamine reductase, also annotated as UDP-N-acetylmuramate dehydrogenase, in Pseudomonas putida KT2440. It reduces the MurA product to UDP-N-acetylmuramate in de novo peptidoglycan precursor biosynthesis and uses FAD as cofactor.
