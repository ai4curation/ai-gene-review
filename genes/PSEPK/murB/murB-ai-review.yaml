taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: >-
  MurB is the cytoplasmic, FAD-dependent
  UDP-N-acetylenolpyruvoylglucosamine reductase of Pseudomonas putida KT2440.
  It uses NADPH to produce UDP-N-acetylmuramate in the second committed step of
  peptidoglycan precursor biosynthesis.
