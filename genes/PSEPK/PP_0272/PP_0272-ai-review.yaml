  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: PP_0272 encodes a TonB-dependent outer-membrane receptor in the ferric siderophore receptor class (Outer membrane
  ferric siderophore receptor). The protein is predicted to mediate energy-dependent uptake of an iron-loaded siderophore
  or related ferric complex across the outer membrane through its TonB-dependent beta-barrel/plug receptor architecture.
