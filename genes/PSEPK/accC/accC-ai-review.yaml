  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: accC (PP_0558) encodes the biotin carboxylase subunit (BC) of the acetyl-CoA carboxylase (ACC) complex of Pseudomonas putida KT2440. Biotin carboxylase catalyzes the first, ATP-dependent half-reaction of ACC (EC 6.3.4.14), carboxylating the biotin prosthetic group covalently bound to the biotin carboxyl carrier protein (BCCP/AccB), using hydrogencarbonate (bicarbonate) as the CO2 donor and consuming ATP to yield ADP and phosphate. The carboxyl group is then transferred by the carboxyltransferase subunits (AccA/AccD) from carboxybiotin to acetyl-CoA to form malonyl-CoA, the committed precursor for fatty acid biosynthesis. The enzyme uses an ATP-grasp fold and requires a divalent metal ion (Mg2+) for catalysis. The complete ACC complex is a soluble heterohexamer (a 2:2 assembly of biotin carboxyl carrier protein, biotin carboxylase, and the two carboxyltransferase subunits) that performs the rate-limiting, committed step of fatty acid biosynthesis.
