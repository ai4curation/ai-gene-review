id: Q88QD6
gene_symbol: accC
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: >-
  AccC is the biotin carboxylase subunit of heteromeric acetyl-CoA
  carboxylase in Pseudomonas putida KT2440. It uses ATP and bicarbonate to
  carboxylate the biotin group attached to AccB in the first half-reaction of
  the complex. AccA and AccD then transfer that carboxyl group to acetyl-CoA,
  producing malonyl-CoA for fatty-acid synthesis.
