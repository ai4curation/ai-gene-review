description: gatB encodes subunit B of the bacterial GatCAB Asp/Glu-tRNA amidotransferase,
  a transamidation enzyme complex that converts misacylated Glu-tRNA(Gln) and/or Asp-tRNA(Asn)
  into correctly amidated Gln-tRNA(Gln) and Asn-tRNA(Asn).
