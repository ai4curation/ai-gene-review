    summary: Proteolysis is technically true but too broad for LspA's role in bacterial lipoprotein maturation.
    action: MARK_AS_OVER_ANNOTATED
    reason: LspA does not act as a general protease; it cleaves signal peptides from diacylglyceryl-modified prolipoproteins in the lipoprotein biosynthetic pathway. The separate NEW GO:0042158 annotation captures that process without creating a duplicate replacement landing point.
