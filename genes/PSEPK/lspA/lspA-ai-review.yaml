proposed_new_terms:
- proposed_name: lipoprotein signal peptidase activity
  proposed_definition: Catalysis of the hydrolysis of the signal peptide from a bacterial membrane diacylglyceryl-prolipoprotein, cleaving immediately N-terminal to the lipid-modified lipobox cysteine.
  justification: GOA currently represents LspA with the broad parent GO:0004190 aspartic-type endopeptidase activity, but LspA is a specific signal peptidase II/prolipoprotein signal peptidase with defined substrate context and pathway order.
  proposed_parent:
    id: GO:0004190
    label: aspartic-type endopeptidase activity
  supported_by:
  - reference_id: file:PSEPK/lspA/lspA-uniprot.txt
    supporting_text: "This protein specifically catalyzes the removal of signal"
  - reference_id: file:PSEPK/lspA/lspA-deep-research-openscientist.md
    supporting_text: "Its primary catalytic function is precise: it hydrolyzes the peptide bond immediately N-terminal to the lipid-modified cysteine of a diacylglyceryl-prolipoprotein"
suggested_questions:
- question: Should GO add a specific lipoprotein signal peptidase activity term for bacterial LspA/SPase II rather than relying on broad aspartic-type endopeptidase activity?
  experts:
  - GO molecular function curators
- question: Is PP_0604 essential under standard KT2440 growth conditions, and what lipoprotein substrates accumulate when LspA activity is inhibited or depleted?
  experts:
  - Pseudomonas envelope biogenesis experts
suggested_experiments:
- description: Construct a conditional lspA depletion strain and assay accumulation of unprocessed prolipoproteins, envelope stress, and growth defects.
  experiment_type: conditional depletion and lipoproteomics
- description: Reconstitute PP_0604 in membrane mimetics with diacylglyceryl-prolipoprotein peptide substrates and test cleavage plus globomycin/myxovirescin inhibition.
  experiment_type: in vitro peptidase assay
