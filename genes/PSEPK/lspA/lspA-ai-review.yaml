id: Q88Q91
gene_symbol: lspA
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: lspA encodes lipoprotein signal peptidase II, a multi-pass inner-membrane peptidase A8/aspartyl protease that removes signal peptides from diacylglyceryl-modified bacterial prolipoproteins. In the canonical bacterial lipoprotein maturation pathway, LspA acts after Lgt installs the diacylglyceryl group on the lipobox cysteine and before Lnt performs terminal N-acylation.
existing_annotations:
