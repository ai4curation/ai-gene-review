    id: GO:0004190
    label: aspartic-type endopeptidase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: LspA is a membrane-embedded peptidase A8/aspartyl protease that removes the signal peptide from diacylglyceryl-modified prolipoproteins.
    action: ACCEPT
    reason: GO:0004190 is broad, but it correctly captures the catalytic class currently available in GOA for LspA. UniProt assigns EC 3.4.23.36, names the protein lipoprotein signal peptidase, and annotates two aspartate active-site residues. A more specific lipoprotein signal peptidase molecular-function term would be preferable if GO adds one.
    supported_by:
    - reference_id: file:PSEPK/lspA/lspA-uniprot.txt
      supporting_text: "RecName: Full=Lipoprotein signal peptidase"
    - reference_id: file:PSEPK/lspA/lspA-uniprot.txt
      supporting_text: "EC=3.4.23.36"
    - reference_id: file:PSEPK/lspA/lspA-uniprot.txt
