  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: located_in
  review:
    summary: The membrane annotation is correct but less precise than plasma membrane for this bacterial inner-membrane enzyme.
    action: MODIFY
    reason: InterPro supports a membrane-associated LspA family assignment, but UniProt and GOA already provide the more precise bacterial plasma membrane annotation.
    proposed_replacement_terms:
