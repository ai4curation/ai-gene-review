references:
- id: GO_REF:0000002
  title: Gene Ontology annotation through association of InterPro records with GO terms
  findings:
  - statement: InterPro IPR001872 identifies LspA as a peptidase A8 membrane protease, but the broad proteolysis and membrane terms need refinement in review.
- id: GO_REF:0000120
  title: Combined Automated Annotation using Multiple IEA Methods
  findings:
  - statement: Combined UniProt automated evidence supplies the aspartic-type endopeptidase and plasma membrane annotations for LspA.
- id: file:PSEPK/lspA/lspA-uniprot.txt
  title: UniProtKB reviewed entry for lspA
  findings:
  - statement: UniProt/HAMAP identifies Q88Q91 as lipoprotein signal peptidase II, EC 3.4.23.36, in the lipoprotein biosynthesis signal-peptide cleavage pathway, with multi-pass inner-membrane localization and two aspartate active-site residues.
- id: file:PSEPK/lspA/lspA-goa.tsv
  title: QuickGO GOA annotations for lspA
  findings:
  - statement: The fetched GOA table contains the four existing annotations reviewed for lspA.
- id: file:interpro/panther/PTHR33695/PTHR33695-metadata.yaml
  title: PANTHER family metadata for lspA
  findings:
  - statement: PANTHER places LspA in the lipoprotein signal peptidase family, consistent with the peptidase A8/InterPro IPR001872 assignment.
- id: file:PSEPK/lspA/lspA-deep-research-openscientist.md
  title: OpenScientist gene research for lspA
  findings:
  - statement: OpenScientist supports LspA as the inner-membrane signal peptidase II step between Lgt and Lnt in bacterial lipoprotein maturation and notes that direct KT2440-specific biochemical characterization is still inferential from conserved orthologs.
