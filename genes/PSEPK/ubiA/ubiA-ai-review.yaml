taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: >-
  ubiA encodes an integral inner-membrane 4-hydroxybenzoate
  octaprenyltransferase. It attaches the octaprenyl side chain to
  4-hydroxybenzoate, generating the first membrane-bound aromatic intermediate
  in ubiquinone-8 biosynthesis.
