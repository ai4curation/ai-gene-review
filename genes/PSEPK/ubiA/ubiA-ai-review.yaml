id: Q88C65
gene_symbol: ubiA
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: >-
  ubiA encodes the membrane UbiA prenyltransferase that attaches an all-trans
  polyprenyl chain to 4-hydroxybenzoate. This reaction generates the first
  membrane-bound ubiquinone intermediate and commits the UbiC-derived
  4-hydroxybenzoate head group to ubiquinone biosynthesis.
existing_annotations:
- term:
    id: GO:0004659
    label: prenyltransferase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: >-
      Prenyltransferase activity is correct but less informative than the
      existing 4-hydroxybenzoate polyprenyltransferase annotation.
    action: MODIFY
    reason: >-
      UniProt/HAMAP assigns Q88C65 to UbiA EC 2.5.1.39, represented by
      GO:0008412.
    proposed_replacement_terms:
    - id: GO:0008412
      label: 4-hydroxybenzoate polyprenyltransferase activity
- term:
    id: GO:0005886
    label: plasma membrane
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: located_in
  review:
    summary: >-
      Plasma membrane is consistent with UbiA being a multi-pass inner-membrane
      prenyltransferase.
    action: KEEP_AS_NON_CORE
    reason: >-
      The membrane location is important context for the polyprenylated
      substrate but the core function is the transferase reaction.
- term:
    id: GO:0006744
    label: ubiquinone biosynthetic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: involved_in
  review:
    summary: >-
      UbiA performs the 4-hydroxybenzoate prenylation step in ubiquinone
      biosynthesis.
    action: ACCEPT
    reason: >-
      UniProt describes the reaction as the condensation of the polyisoprenoid
      side chain with 4-hydroxybenzoate in ubiquinone biosynthesis.
- term:
    id: GO:0008412
    label: 4-hydroxybenzoate polyprenyltransferase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: >-
      This is the substrate-resolved UbiA activity supported by UniProt/HAMAP
      and EC 2.5.1.39.
    action: ACCEPT
    reason: >-
      Q88C65 is named 4-hydroxybenzoate octaprenyltransferase and carries the
      matching GO molecular-function annotation.
- term:
    id: GO:0016020
    label: membrane
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: located_in
  review:
    summary: >-
      Membrane localization is consistent with UniProt's multi-pass membrane
      annotation.
    action: KEEP_AS_NON_CORE
    reason: >-
      The broader membrane term is redundant with the more specific plasma
      membrane annotation but still biologically consistent.
- term:
    id: GO:0016740
    label: transferase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000118
  qualifier: enables
  review:
    summary: >-
      Transferase activity is true but too broad for UbiA.
    action: MODIFY
    reason: >-
      Replace the broad transferase parent with the substrate-specific
      4-hydroxybenzoate polyprenyltransferase term.
    proposed_replacement_terms:
    - id: GO:0008412
      label: 4-hydroxybenzoate polyprenyltransferase activity
- term:
    id: GO:0016765
    label: transferase activity, transferring alkyl or aryl (other than methyl) groups
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: >-
      This transferase class is directionally correct but still less specific
      than the UbiA term.
    action: MODIFY
    reason: >-
      GO:0008412 directly captures the 4-hydroxybenzoate polyprenyltransferase
      reaction.
    proposed_replacement_terms:
    - id: GO:0008412
      label: 4-hydroxybenzoate polyprenyltransferase activity
