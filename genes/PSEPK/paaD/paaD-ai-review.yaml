suggested_questions:
- question: Does PaaD support epoxidase assembly, metal-cluster maturation, or protection from reactive intermediates?
suggested_experiments:
- description: >-
    Reconstitute PaaABCDE with PaaD omission and zinc-ribbon variants, then
    measure complex assembly, metal occupancy, and phenylacetyl-CoA epoxidation.
