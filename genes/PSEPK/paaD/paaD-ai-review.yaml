- id: file:projects/P_PUTIDA/deep-research/PSEPK__phenylacetate_catabolism__ppu00360-deep-research-openscientist.md
  title: OpenScientist PSEPK phenylacetate-catabolism pathway report
  findings:
  - statement: The pathway report maps PaaD to the PaaABCDE epoxidase by homology and synteny.
    supporting_text: '| paaD | PP_3275 | Q88HS8 | epoxidase component (Fe-S) | Homology + synteny | No EC in UniProt; "subunit of phenylacetate degradation enzyme" |'
    reference_section_type: RESULTS
  reference_review:
    relevance: HIGH
    correctness: UNVERIFIED
    review_notes: >-
      Provider-generated pathway report used for first-pass curation; its
      accession and conservative product name agree with UniProt.
- id: file:PSEPK/paaD/paaD-deep-research-openscientist.md
  title: OpenScientist deep research for PSEPK paaD
  findings:
  - statement: The minimal catalytic oxygenase does not require PaaD in vitro.
    supporting_text: >-
      In vitro reconstitution of the oxygenase subunits showed that each of the
      PaaA, B, C, and E subunits are necessary for catalysis, whereas PaaD is
      not essential
    reference_section_type: RESULTS
  - statement: A metallocenter-maturation role remains a domain-based hypothesis.
    supporting_text: >-
      The maturation role is inferred, not demonstrated for PaaD.
    reference_section_type: CONCLUSIONS
  reference_review:
    relevance: HIGH
    correctness: UNVERIFIED
    review_notes: >-
      The exact target is securely placed in the paa locus, but direct
      biochemical evidence is from the E. coli ortholog. The proposed
      metallocenter-maturation role was not promoted to a GO molecular
      function because it has not been demonstrated for PaaD.
core_functions:
- description: >-
    Predicted pathway-associated accessory factor encoded in the paa
    epoxidase locus. Its domain architecture suggests a metallocenter
    maturation or assembly role, but its exact biochemical function and in
