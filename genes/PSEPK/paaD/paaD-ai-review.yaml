id: Q88HS8
gene_symbol: paaD
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: >-
  PaaD is a predicted noncatalytic component associated with the
  multicomponent phenylacetyl-CoA epoxidase system in Pseudomonas putida
  KT2440. It is encoded within paaABCDE and contains MIP18-like and PaaD
  zinc-ribbon domains, but its precise role in complex assembly, maturation,
  or protection during aerobic phenylacetate catabolism remains unresolved.
