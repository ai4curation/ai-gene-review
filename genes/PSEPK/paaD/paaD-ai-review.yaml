      supporting_text: >-
        PaaD (gene *paaD*, ordered locus PP_3275; UniProt Q88HS8) is an
        accessory subunit of the ring-1,2-phenylacetyl-CoA epoxidase
        (phenylacetyl-CoA oxygenase) that carries out the committed oxygenation
        step of the aerobic phenylacetic acid (PAA) catabolic pathway in
        *Pseudomonas putida* KT2440.
