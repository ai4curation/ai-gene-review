  review:
    summary: Missing complex-level activity annotation for the PaaD component.
    action: NEW
    reason: >-
      The pathway report maps Q88HS8 by homology and synteny to the
      PaaABCDE epoxidase, while UniProt conservatively calls it a subunit of a
      phenylacetate degradation enzyme. Contribution semantics avoid claiming
      that isolated PaaD enables the complete reaction.
