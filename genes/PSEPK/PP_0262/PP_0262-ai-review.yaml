description: >-
  PP_0262, named MadB in the experimental literature, is a standalone
  hot-dog-fold malonyl-ACP decarboxylase. It converts malonyl-ACP to acetyl-ACP,
  providing an acyl-CoA-independent primer route for type-II fatty-acid
  synthesis in Pseudomonas putida KT2440.
