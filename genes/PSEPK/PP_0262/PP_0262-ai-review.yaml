proposed_new_terms:
- proposed_name: malonyl-[acyl-carrier-protein] decarboxylase activity
  proposed_definition: >-
    Catalysis of the reaction: malonyl-[acyl-carrier protein] + H+ =
    acetyl-[acyl-carrier protein] + carbon dioxide.
  justification: >-
    GO has a generic carboxy-lyase term and a malonyl-CoA decarboxylase term,
    but no substrate-specific term for the experimentally established
    ACP-linked Mad/YiiD reaction.
  proposed_parent:
    id: GO:0016831
    label: carboxy-lyase activity
