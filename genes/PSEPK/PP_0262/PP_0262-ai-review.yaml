suggested_questions:
- question: >-
    Which MadB-family sequence features distinguish physiological malonyl-ACP
    decarboxylases from related hot-dog-fold proteins?
suggested_experiments:
- description: >-
    Measure steady-state kinetics with malonyl-ACP and competing acyl-CoA or
    acyl-ACP substrates across representative MadB/YiiD family members.
