suggested_questions:
- question: Does the predicted PycA/PycB system catalyze pyruvate carboxylation in P. putida KT2440, and are oxaloacetate decarboxylase/sodium-transport annotations fully excluded biochemically?
suggested_experiments:
- description: Reconstitute PycA/PycB and assay pyruvate-dependent oxaloacetate production versus oxaloacetate decarboxylation and sodium dependence, then test pycB mutant growth under anaplerotic and gluconeogenic conditions.
