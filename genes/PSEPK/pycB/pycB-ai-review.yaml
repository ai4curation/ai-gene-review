- term:
    id: GO:0003824
    label: catalytic activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: Root-level molecular function term; true but superseded by pyruvate carboxylase activity.
    action: MARK_AS_OVER_ANNOTATED
    reason: PycB is an enzymatic subunit, so catalytic activity is not false, but GO:0004736 is the informative activity term for the inferred pyruvate carboxylase system.
- term:
    id: GO:0004736
    label: pyruvate carboxylase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: Correct inferred complex-level activity for PycB as the carboxyltransferase subunit of two-subunit pyruvate carboxylase.
    action: ACCEPT
    reason: UniProt names Q88C37 as pyruvate carboxylase subunit B with EC 6.4.1.1 and a pyruvate carboxyltransferase domain. The PSEPK pathway report identifies pycA/pycB as the two-subunit biotin-dependent pyruvate carboxylase system, while noting the PE4/predicted evidence tier.
    supported_by:
    - reference_id: file:PSEPK/pycB/pycB-uniprot.txt
      supporting_text: 'SubName: Full=Pyruvate carboxylase subunit B'
