description: Predicted pyruvate carboxylase subunit B of Pseudomonas putida KT2440. PycB carries pyruvate carboxyltransferase and biotin/lipoyl-carrier domains and is inferred to partner with the biotin carboxylase subunit PycA in a two-subunit biotin-dependent pyruvate carboxylase system. This enzyme is expected to produce oxaloacetate from pyruvate as an anaplerotic input that can support gluconeogenesis and central carbon metabolism, but the assignment is protein-existence level 4/predicted and should be experimentally verified.
