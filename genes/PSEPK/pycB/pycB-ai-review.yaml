  original_reference_id: GO_REF:0000118
  qualifier: located_in
  review:
    summary: Correct expected localization for a soluble bacterial pyruvate carboxylase subunit.
    action: ACCEPT
    reason: PycB lacks membrane/secretion features and is expected to function in the bacterial cytoplasm with PycA in central-carbon anaplerosis.
- term:
    id: GO:0006094
    label: gluconeogenesis
  evidence_type: IEA
  original_reference_id: GO_REF:0000118
  qualifier: involved_in
  review:
    summary: Correct process context for pyruvate carboxylase as an oxaloacetate-generating anaplerotic enzyme supporting gluconeogenesis.
    action: ACCEPT
    reason: Pyruvate carboxylase produces oxaloacetate from pyruvate, providing an anaplerotic input that supports gluconeogenic and central-carbon flux. The pathway report explicitly treats pycA/pycB as an anaplerotic oxaloacetate input rather than a cyclic TCA reaction.
    supported_by:
    - reference_id: file:projects/P_PUTIDA/deep-research/PSEPK__tca_cycle__ppu00020-deep-research-openscientist.md
      supporting_text: Provides anaplerotic oxaloacetate.
- term:
    id: GO:0006814
    label: sodium ion transport
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: involved_in
  review:
    summary: Over-propagated sodium-transport annotation from oxaloacetate decarboxylase/OadA-family similarity; not supported for PycB.
    action: REMOVE
    reason: The UniProt entry identifies Q88C37 as pyruvate carboxylase subunit B, not a sodium-pumping oxaloacetate decarboxylase transporter. The pycA/pycB pathway context is anaplerotic pyruvate carboxylation, and there is no evidence here for sodium ion transport.
- term:
    id: GO:0008948
    label: oxaloacetate decarboxylase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: Over-propagated reverse/decarboxylase activity from OadA-family domain similarity; the curated assignment is pyruvate carboxylase.
    action: REMOVE
    reason: Q88C37 is annotated as pyruvate carboxylase subunit B (EC 6.4.1.1), and the PSEPK pathway report places pycB with pycA in an anaplerotic pyruvate carboxylase system. Oxaloacetate decarboxylase activity and sodium transport are not supported for this gene in the current evidence.
