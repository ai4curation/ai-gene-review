description: PP_2714 encodes a predicted membrane histidine sensor kinase in Pseudomonas putida KT2440.
  Its HAMP, HisKA, and HATPase domains support a two-component phosphorelay sensor role, probably paired
  with the adjacent DNA-binding response regulator PP_2713.
