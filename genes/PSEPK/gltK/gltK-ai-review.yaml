  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: gltK (PP_1069) encodes a predicted multi-pass inner-membrane permease of the GltIJKL glutamate/aspartate ABC uptake system. UniProt describes GltK as part of the GltIJKL complex involved in glutamate and aspartate uptake, probably responsible for substrate translocation across the membrane.
