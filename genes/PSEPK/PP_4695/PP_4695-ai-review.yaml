taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: PP_4695 encodes a predicted membrane histidine kinase with PAS sensory, sodium:solute-symporter-like,
  HisKA, and HATPase domains in Pseudomonas putida KT2440. The best-supported conserved role is two-component
  sensor kinase signaling, while any transport output or sensed ligand remains unresolved.
