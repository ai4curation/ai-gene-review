    - reference_id: file:PSEPK/proR/proR-deep-research-falcon.md
      supporting_text: PLP was not included for ProR assays
- term:
    id: GO:0019470
    label: trans-4-hydroxy-L-proline catabolic process
  evidence_type: IC
  original_reference_id: PMID:23995642
  review:
    summary: ProR should be considered part of hydroxyproline catabolism in KT2440.
    action: NEW
    reason: GO:0019470 is an existing GO biological-process term for trans-4-hydroxy-L-proline catabolism. The KT2440 study shows hydroxyproline catabolism as a growth substrate and identifies ProR as the hydroxyproline epimerase step. IC is used because the logical basis is the accepted GO:0047580 molecular-function annotation plus the pathway-growth context, while the GOA baseline lacks the process row. Falcon deep research strengthens this inference by placing ProR at the initial epimerization (gateway) step of hydroxyproline catabolism that feeds downstream oxidation to alpha-ketoglutarate, and by noting KT2440 grows on either epimer of 4-hydroxyproline.
    supported_by:
    - reference_id: PMID:23995642
      supporting_text: hydroxyproline as the sole carbon and nitrogen sources
      reference_section_type: ABSTRACT
    - reference_id: PMID:23995642
