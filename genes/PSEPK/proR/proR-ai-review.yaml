- term:
    id: GO:0047580
    label: 4-hydroxyproline epimerase activity
  evidence_type: EXP
  original_reference_id: PMID:23995642
  review:
    summary: The experimental annotation is directly supported by the KT2440 racemization study.
    action: ACCEPT
    reason: The paper reports that ProR has strong hydroxyproline epimerization activity and negligible racemase activity with standard amino acids. Falcon deep research adds quantitative substrate profiling (highest normalized activity on cis-D-hydroxyproline, with measurable activity on trans-L-, cis-L-, and trans-D-hydroxyproline) and notes the enzyme is PLP-independent, reinforcing GO:0047580 as the core molecular function.
    supported_by:
    - reference_id: PMID:23995642
      supporting_text: strong epimerization activity with hydroxyproline as the substrate
      reference_section_type: ABSTRACT
