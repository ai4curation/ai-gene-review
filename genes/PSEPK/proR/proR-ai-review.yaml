- id: file:PSEPK/proR/proR-deep-research-falcon.md
  title: Falcon deep research report for proR (PP_1258; Q88NF3)
  findings:
  - statement: ProR shows strong preference for 4-hydroxyproline stereoisomers, with highest activity on cis-D-hydroxyproline, supporting its assignment as a 4-hydroxyproline epimerase.
    supporting_text: strong preference for 4-hydroxyproline stereoisomers
    reference_section_type: OTHER
  - statement: ProR is not a broad-spectrum amino-acid racemase; it had negligible activity on the 19 canonical chiral amino acids but substantial activity on 4-hydroxyproline stereoisomers.
    supporting_text: not a broad-spectrum amino-acid racemase
    reference_section_type: OTHER
  - statement: The enzyme is PLP-independent; PLP was not included in the ProR assays, consistent with PLP-independent catalysis for this proline racemase family member.
    supporting_text: PLP was not included for ProR assays
    reference_section_type: OTHER
  - statement: ProR is positioned at the initial epimerization (gateway) step of hydroxyproline catabolism, feeding downstream oxidation to alpha-ketoglutarate.
    supporting_text: initial epimerization step of hydroxyproline catabolism
    reference_section_type: OTHER
  - statement: P. putida KT2440 grows on either epimer of 4-hydroxyproline, consistent with pathway-level use of ProR in hydroxyproline catabolism.
    supporting_text: KT2440 grows on either epimer of 4-hydroxyproline
    reference_section_type: OTHER
  - statement: The authors propose renaming the enzyme from "proline racemase" to 4-hydroxyproline epimerase.
    supporting_text: propose renaming the enzyme from
    reference_section_type: OTHER
