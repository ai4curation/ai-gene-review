  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: proR encodes the experimentally characterized 4-hydroxyproline 2-epimerase of Pseudomonas putida KT2440. It reversibly interconverts cis-4-hydroxy-D-proline and trans-4-hydroxy-L-proline and supports hydroxyproline utilization.
