- question: What exact in-vivo cut, trimming, or branch-shaping reaction does KT2440 OpgG perform during OPG maturation?
- question: How does OpgG's beta-1,2-glucanase activity coordinate with the inner-membrane OpgH glucosyltransferase?
suggested_experiments:
- description: Compare OPG amount and size distribution in wild-type, opgG, opgH, and opgGH mutant strains under low-osmolarity conditions.
