  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: >-
  tktA (PP_4965) encodes a thiamine-diphosphate-dependent transketolase. It
  transfers two-carbon ketol units between sugar phosphates in the
  non-oxidative pentose phosphate pathway, linking ribose 5-phosphate and
  xylulose 5-phosphate to sedoheptulose 7-phosphate, erythrose 4-phosphate,
  fructose 6-phosphate, and glyceraldehyde 3-phosphate.
