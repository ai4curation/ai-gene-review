  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: Transketolase of Pseudomonas putida KT2440 (PP_4965), a thiamine-diphosphate-dependent enzyme
  of non-oxidative pentose phosphate metabolism. TktA transfers two-carbon ketol units among pentose and
  glycolytic sugar phosphates, connecting ribose/xylulose phosphate pools with sedoheptulose 7-phosphate,
  glyceraldehyde 3-phosphate, fructose 6-phosphate, and erythrose 4-phosphate.
