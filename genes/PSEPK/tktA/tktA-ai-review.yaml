suggested_questions:
- question: Which transketolase reactions dominate in KT2440 under glucose, gluconate, ribose, and aromatic-compound
    growth conditions?
- question: Does TktA control erythrose 4-phosphate supply for shikimate-pathway demand?
suggested_experiments:
- description: Measure growth, intracellular pentose-phosphate intermediates, and NAD(P)H pools in a targeted
    deletion/complementation strain across glucose, gluconate, ribose, and oxidative-stress conditions.
  experiment_type: growth physiology and metabolomics
- description: Purify the recombinant enzyme and measure steady-state kinetics with the annotated substrates
    and cofactors to resolve substrate and cofactor specificity in the KT2440 protein.
  experiment_type: enzyme kinetics
