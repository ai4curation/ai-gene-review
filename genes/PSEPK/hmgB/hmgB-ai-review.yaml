    label: L-tyrosine catabolic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000118
  qualifier: involved_in
  review:
    summary: Correct pathway annotation for tyrosine degradation through homogentisate.
    action: ACCEPT
    reason: >-
      The P. putida pathway study establishes that tyrosine is converted to
      homogentisate and then catabolized by HmgABC.
    supported_by:
    - reference_id: PMID:15262943
      supporting_text: >-
        Pseudomonas putida metabolizes Phe and Tyr through a peripheral pathway
        involving hydroxylation of Phe to Tyr (PhhAB), conversion of Tyr into
        4-hydroxyphenylpyruvate (TyrB), and formation of homogentisate (Hpd) as
        the central intermediate.
      full_text_unavailable: true
- term:
    id: GO:0009072
    label: aromatic amino acid metabolic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: involved_in
  review:
    summary: Broad, redundant process annotation for HmgB's defined pathway role.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      HmgB can receive homogentisate-derived carbon from aromatic amino-acid
      catabolism, but this broad umbrella term is redundant with the existing
      accepted GO:1902000 homogentisate catabolic process annotation.
    supported_by:
    - reference_id: PMID:15262943
      supporting_text: >-
        Homogentisate is then catabolized by a central catabolic pathway that
        involves three enzymes, homogentisate dioxygenase (HmgA),
        fumarylacetoacetate hydrolase (HmgB), and maleylacetoacetate isomerase
        (HmgC), finally yielding fumarate and acetoacetate.
      full_text_unavailable: true
