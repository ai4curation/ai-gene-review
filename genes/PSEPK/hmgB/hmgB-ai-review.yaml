description: hmgB encodes fumarylacetoacetase (EC 3.7.1.2), the terminal hydrolase of the hmgABC homogentisate pathway. It hydrolyzes fumarylacetoacetate to fumarate and acetoacetate during L-phenylalanine and L-tyrosine catabolism in Pseudomonas putida.
