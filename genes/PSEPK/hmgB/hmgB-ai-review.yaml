taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: >-
  HmgB is the fumarylacetoacetase of the Pseudomonas putida KT2440
  homogentisate pathway. It hydrolyzes fumarylacetoacetate to fumarate and
  acetoacetate in the terminal step shared by phenylalanine, tyrosine, and
  other substrates that are routed through homogentisate.
