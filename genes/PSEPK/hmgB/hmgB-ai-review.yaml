suggested_questions:
- question: Are hmgB and PP_1709 functionally redundant for any FAH-family substrates, or is hmgB uniquely responsible for fumarylacetoacetate hydrolysis in the homogentisate pathway?
suggested_experiments:
- description: Compare hmgB, PP_1709, and double mutants during tyrosine, phenylalanine, and candidate FAH-substrate growth, with LC-MS measurement of maleylacetoacetate/fumarylacetoacetate-derived intermediates.
  experiment_type: comparative mutant metabolomics
