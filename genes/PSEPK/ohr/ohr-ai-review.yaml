description: ohr encodes an OsmC/Ohr-family organic hydroperoxide resistance protein in Pseudomonas putida KT2440. The name,
  family assignment, and domain evidence support a peroxide-detoxification role in oxidative-stress defense, with the exact
  physiological hydroperoxide substrate still unresolved in this first pass.
