suggested_questions:
- question: What are the in vivo oxidant substrates, electron donor partners, and stress conditions that most strongly depend
    on ohr in Pseudomonas putida KT2440?
suggested_experiments:
- description: Purify ohr and assay peroxide, organic hydroperoxide, and donor-coupled activity with candidate reductants
    or redox partners, then test a clean deletion strain under matched oxidative-stress conditions.
  experiment_type: enzyme kinetics and targeted oxidative-stress phenotyping
