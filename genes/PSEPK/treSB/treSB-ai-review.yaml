  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: treSB encodes a bifunctional TreS/Mak-family maltose enzyme in Pseudomonas putida KT2440. UniProt describes maltokinase chemistry producing alpha-maltose 1-phosphate and maltose alpha-D-glucosyltransferase chemistry interconverting maltose and trehalose.
