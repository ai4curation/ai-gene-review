product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: crp (PP_0424) encodes a CRP/FNR-family cAMP-responsive DNA-binding transcription regulator
  in Pseudomonas putida KT2440. The protein has an N-terminal cyclic nucleotide-binding domain and a C-terminal
  CRP-type helix-turn-helix DNA-binding domain, and CollecTF-derived annotations support transcription
  cis-regulatory-region binding and transcription activator activity.
