  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: algE encodes an outer-membrane alginate production protein with channel-forming properties that likely forms
  the alginate permeability pore.
