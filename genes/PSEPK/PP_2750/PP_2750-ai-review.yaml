  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: PP_2750 encodes the second predicted multi-pass inner-membrane permease component of the PP_2748-PP_2753 branched-chain
  amino-acid ABC uptake system. Its LivM-like domain, high-affinity BCAA transport-system permease family assignment, and
  BCAA transporter GOA rows support a channel role in the same importer.
