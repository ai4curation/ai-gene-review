description: PP_0914 encodes an EAL/GGDEF-domain cyclic-guanylate-specific phosphodiesterase candidate
  in Pseudomonas putida KT2440. The protein is assigned to the KEGG ppu02025 c-di-GMP turnover bucket
  as a c-di-GMP hydrolysis node, but this first pass does not assign a specific upstream signal or biofilm
  phenotype.
