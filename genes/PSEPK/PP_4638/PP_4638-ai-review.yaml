    label: tetrahydrofolate interconversion
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: involved_in
  review:
    summary: >-
      Participation in tetrahydrofolate interconversion remains plausible at
      the family level but is not established for PP_4638.
    action: UNDECIDED
    reason: >-
      The MTHFR-like fold could support folate chemistry, including a
      noncanonical direction or partner-dependent reaction, but neither the
      actual substrate nor the physiological pathway has been demonstrated.
    supported_by:
    - reference_id: file:PSEPK/PP_4638/PP_4638-bioinformatics/RESULTS.md
      supporting_text: "These pairwise comparisons are not a phylogenetic or active-site classification and cannot assign forward versus reverse physiological direction."
references:
- id: GO_REF:0000002
  title: Gene Ontology annotation through association of InterPro records with GO
    terms
  findings: []
- id: GO_REF:0000118
  title: TreeGrafter-generated GO annotations
  findings: []
- id: GO_REF:0000120
  title: Combined Automated Annotation using Multiple IEA Methods
  findings: []
- id: PMID:33534785
  title: Four families of folate-independent methionine synthases.
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Full text directly reports PP_4638 and metF behavior across 101 KT2440
      fitness experiments and explicitly cautions that PP_4638 probably has
      another function.
  findings:
  - statement: >-
      PP_4638 had no significant phenotype in 101 KT2440 fitness experiments;
      PP_4977 metF instead tracked metH at r = 0.96, arguing against PP_4638 as
      a redundant canonical MTHFR under those conditions.
- id: PMID:40016375
  title: Discovery of a distinct type of methylenetetrahydrofolate reductase family that couples with tetrahydrofolate-dependent demethylases.
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: >-
      This paper characterizes BAK65950.1, not PP_4638. It is used only to show
      that sequence similarity within the MTHFR fold cannot assign physiological
      direction or electron acceptor.
  findings:
  - statement: >-
      Experimentally characterized type-4 MTHFRs can oxidize 5-methyl-THF and
      differ from canonical NADH-linked reductases, illustrating functional
      diversity within the fold.
- id: file:PSEPK/PP_4638/PP_4638-uniprot.txt
  title: UniProtKB entry for PP_4638 (Q88E30)
  findings:
  - statement: >-
      The unreviewed record transfers an MTHFR name and RHEA:19821 but shows an
      unusual 495-residue architecture with PF12225/IPR022026 and lacks the
      bacterial IPR004620/TIGR00676 signatures present in Q88D51.
- id: file:PSEPK/PP_4638/PP_4638-bioinformatics/RESULTS.md
  title: Reproducible PP_4638 MTHFR-family comparison
  findings:
  - statement: >-
      Domain and local-alignment analyses support an MTHFR-like FAD-linked
      fold but not equivalence to canonical MetF, cofactor specificity, or
      physiological reaction direction.
- id: file:interpro/panther/PTHR45754/PTHR45754-paint.tsv
  title: PANTHER PAINT annotations for PTHR45754
  findings:
  - statement: >-
      The ancestral node supports only broad MTHFR activity and FAD binding;
      it does not support a cofactor-specific child, and the SF3 label conflates
      bacterial NADH MetF with human MTHFR.
- id: file:projects/P_PUTIDA/deep-research/PSEPK__folate_one_carbon_interconversion__ppu00670-deep-research-openscientist.md
  title: OpenScientist pathway research for KT2440 folate one-carbon interconversion
  findings:
  - statement: >-
      The report independently flags PP_4638 as a divergent MTHFR-superfamily
      candidate that should not count as redundant coverage for the MetF step.
core_functions:
- description: >-
    PP_4638 is a predicted soluble FAD-binding MTHFR-like oxidoreductase. Its
    conserved N-terminal fold supports flavin binding, but the physiological
    substrate, electron donor or acceptor, reaction direction, and pathway role
    are unresolved; it is not equivalent to canonical KT2440 MetF on current
    evidence.
  supported_by:
  - reference_id: file:PSEPK/PP_4638/PP_4638-bioinformatics/RESULTS.md
    supporting_text: "The results therefore support conservative family-level language such as \"MTHFR-like FAD-linked oxidoreductase.\""
  molecular_function:
    id: GO:0071949
    label: FAD binding
proposed_new_terms: []
suggested_questions:
- question: >-
    What folate or non-folate substrate does PP_4638 act on, which redox
    partner does it use, and what role is played by its cysteine-rich
    C-terminal domain?
suggested_experiments:
- description: >-
    Purify PP_4638 and screen forward and reverse methylene-/methyl-THF
    reactions with NADH, NADPH, NAD+, NADP+, and candidate alternative electron
    acceptors while monitoring bound FAD and folate products directly.
  experiment_type: biochemical substrate and directionality screen
- description: >-
    Compare metF, PP_4638, and double mutants across the published fitness
    conditions and additional methylated-aromatic or oxidative regimes, then
    test whether PP_4638 complements a metF deletion.
  experiment_type: comparative genetics and complementation
