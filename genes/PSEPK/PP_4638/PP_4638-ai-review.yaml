status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: >-
  PP_4638 encodes a predicted soluble FAD-binding protein with an MTHFR-like
  catalytic fold and an unusual cysteine-rich C-terminal MTHFR-like domain.
  Its 495-residue architecture differs substantially from the canonical
  295-residue KT2440 MetF protein, and it lacks the bacterial MetF-specific
  IPR004620/TIGR00676 signatures. Published KT2440 fitness data do not support
  redundant methylenetetrahydrofolate reductase activity under the tested
  conditions, so its physiological substrate, reaction direction, and pathway
  role remain unresolved.
existing_annotations:
- term:
    id: GO:0004489
    label: methylenetetrahydrofolate reductase [NAD(P)H] activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: >-
      PP_4638 is an MTHFR-family protein, but current evidence does not establish
      that it catalyzes the canonical methylene-THF reductase reaction.
    action: UNDECIDED
    reason: >-
      The broad activity is transferred from the shared MTHFR-like fold.
      PP_4638 lacks bacterial MetF signatures, has a divergent 495-residue
      architecture, and showed no significant phenotype in 101 KT2440 fitness
      experiments. These data argue against assuming equivalence to Q88D51 but
      do not biochemically rule out all MTHFR-family chemistry.
    supported_by:
    - reference_id: file:PSEPK/PP_4638/PP_4638-bioinformatics/RESULTS.md
      supporting_text: "They do not independently support the specific NADH-dependent GO:0106312 activity, equivalence to Q88D51, or a direct role in methionine biosynthesis."
    - reference_id: PMID:33534785
      supporting_text: "PP_4638 has no significant phenotypes"
