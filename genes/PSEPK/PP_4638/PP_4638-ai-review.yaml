- term:
    id: GO:0106312
    label: methylenetetrahydrofolate reductase (NADH) activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: >-
      The NADH-specific canonical MetF reaction is not supported for PP_4638.
    action: REMOVE
    reason: >-
      The annotation derives from EC/Rhea transfer across a family that includes
      distinct cofactor and reaction-direction variants. PP_4638 lacks the
      canonical bacterial MetF signatures and is architecturally divergent,
      while KT2440 fitness evidence argues that it did not replace metF.
    supported_by:
    - reference_id: file:PSEPK/PP_4638/PP_4638-bioinformatics/RESULTS.md
      supporting_text: "They do not independently support the specific NADH-dependent GO:0106312 activity"
    - reference_id: PMID:33534785
      supporting_text: "which suggests that PP_4638 did not provide MTHFR activity in these growth conditions"
