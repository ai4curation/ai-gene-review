  qualifier: involved_in
  review:
    summary: >-
      A direct role for PP_4638 in methionine metabolism is not established,
      but current evidence does not exclude every such role.
    action: UNDECIDED
    reason: >-
      This process annotation is transferred from the generic MTHFR-like
      domain. In KT2440, canonical metF fitness tracks metH, whereas PP_4638
      did not supply detectable MTHFR redundancy in the tested conditions.
      Those experiments do not exclude a condition-specific or noncanonical
      contribution to methionine metabolism.
    supported_by:
