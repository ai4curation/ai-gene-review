id: Q88E13
gene_symbol: pcaG
aliases:
  - PP_4655
product_type: PROTEIN
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: pcaG encodes the alpha subunit of the heteromeric protocatechuate 3,4-dioxygenase
  (PcaHG) in Pseudomonas putida KT2440. In the assembled PcaHG complex, the alpha
  chain helps form the catalytic interface that carries out Fe(III)-dependent intradiol
  ring cleavage of protocatechuate to 3-carboxy-cis,cis-muconate in the protocatechuate
  branch of the beta-ketoadipate pathway. KT2440 deletion experiments show that loss
  of pcaHG blocks downstream protocatechuate consumption, while structural studies
  of the Pseudomonas enzyme indicate that ferric-iron ligation is provided by beta-subunit
  residues rather than by pcaG itself.
existing_annotations:
  - term:
      id: GO:0003824
      label: catalytic activity
    evidence_type: IEA
    original_reference_id: GO_REF:0000002
    review:
      summary: Technically true but much too generic to be useful once the specific
        protocatechuate 3,4-dioxygenase term is present.
      action: MARK_AS_OVER_ANNOTATED
      reason: GO:0018578 captures the relevant biochemical activity and substrate
        specificity. Retaining GO:0003824 does not add meaningful functional resolution.
  - term:
      id: GO:0005506
      label: iron ion binding
    evidence_type: IEA
    original_reference_id: GO_REF:0000002
    review:
      summary: Unsupported for the pcaG alpha subunit. Structural analyses place the
        catalytic Fe3+ ligands on beta-subunit residues, not on pcaG.
      action: REMOVE
      reason: The alpha chain contributes to the catalytic interface, but the iron-ligating
        residues defined for protocatechuate 3,4-dioxygenase are all on the beta subunit.
        This makes the iron-binding annotation a subunit-level overassignment for pcaG.
      supported_by:
        - reference_id: PMID:9485360
          supporting_text: is bound by axial ligands, Tyr447 (147beta) and His462
            (162beta), and equatorial ligands, Tyr408 (108beta), His460 (160beta)
        - reference_id: PMID:9254600
          supporting_text: Tyr447 is stabilized by hydrogen bonding to Tyr16 (16alpha)
            and Asp413 (113beta)
  - term:
      id: GO:0008199
      label: ferric iron binding
    evidence_type: IEA
    original_reference_id: GO_REF:0000002
    review:
      summary: Also unsupported for pcaG specifically. The holoenzyme uses Fe3+, but
        the identified ferric-iron ligands belong to the beta subunit.
      action: REMOVE
      reason: This annotation confuses a complex-level cofactor requirement with the
        subunit-level molecular function of pcaG. The structural data support retaining
        the complex dioxygenase activity while dropping ferric-iron binding on the
        alpha chain.
      supported_by:
        - reference_id: PMID:9485360
          supporting_text: is bound by axial ligands, Tyr447 (147beta) and His462
            (162beta), and equatorial ligands, Tyr408 (108beta), His460 (160beta)
        - reference_id: PMID:9254600
          supporting_text: Tyr447 is stabilized by hydrogen bonding to Tyr16 (16alpha)
            and Asp413 (113beta)
  - term:
      id: GO:0016702
      label: oxidoreductase activity, acting on single donors with incorporation of
        molecular oxygen, incorporation of two atoms of oxygen
    evidence_type: IEA
    original_reference_id: GO_REF:0000002
    review:
      summary: Broad parent term that is consistent with dioxygenase chemistry but
        over-annotated relative to the specific protocatechuate 3,4-dioxygenase term.
      action: MARK_AS_OVER_ANNOTATED
      reason: The specific molecular function GO:0018578 already captures the relevant
        oxygen-incorporating chemistry and substrate identity. The parent oxidoreductase
        term is therefore redundant.
  - term:
      id: GO:0018578
      label: protocatechuate 3,4-dioxygenase activity
    evidence_type: IEA
    original_reference_id: GO_REF:0000120
    qualifier: contributes_to
    review:
      summary: Correct core molecular function. pcaG is the alpha chain of the PcaHG
        protocatechuate 3,4-dioxygenase that cleaves protocatechuate in aromatic catabolism.
      action: ACCEPT
      reason: Classical cloning and biochemical work identify pcaG as the alpha subunit
        of protocatechuate 3,4-dioxygenase, Pseudomonas enzyme biochemistry shows an
        alpha-beta catalytic unit architecture, and KT2440 deletion experiments confirm
        the same two-subunit enzyme assignment in this strain. The qualifier should be
        contributes_to because the activity is realized by the assembled PcaHG complex,
        not by the isolated alpha chain.
      supported_by:
        - reference_id: PMID:8407791
          supporting_text: contain two successive open reading frames, designated pcaH
            and pcaG, corresponding to the beta and alpha subunits, respectively, of
            3,4-PCD
        - reference_id: PMID:6273403
          supporting_text: contains 4 alpha subunits of 23,000 daltons, 4 beta subunits
            of 26,500 daltons, and 4 ferric irons suggesting that the enzyme is a tetramer
            of (alpha beta Fe+3) catalytic units
        - reference_id: PMID:29765865
          supporting_text: deleting the genes pcaH and pcaG, which encode the two-subunit
            protocatechuate 3,4-dioxygenase
  - term:
      id: GO:0019618
      label: protocatechuate catabolic process, ortho-cleavage
    evidence_type: IC
    original_reference_id: PMID:29765865
    review:
      summary: Missing core biological-process term. pcaG contributes to the ortho-cleavage
        step that commits protocatechuate to downstream beta-ketoadipate metabolism.
      action: NEW
      reason: KT2440 pcaHG deletion blocks protocatechuate consumption, while classical
        Pseudomonas pcaGH studies define the enzyme as a protocatechuate ortho-cleavage
        dioxygenase. This term captures the direct pathway step more precisely than a
        generic aromatic catabolism term.
      supported_by:
        - reference_id: PMID:29765865
          supporting_text: deleting the genes pcaH and pcaG, which encode the two-subunit
            protocatechuate 3,4-dioxygenase
        - reference_id: PMID:10049847
          supporting_text: vanillin is degraded through the ortho-cleavage pathway in
            Pseudomonas sp. strain HR199
  - term:
      id: GO:0042952
      label: beta-ketoadipate pathway
    evidence_type: IC
    original_reference_id: PMID:18156252
    review:
      summary: Appropriate broader pathway annotation for an enzyme in the central
        protocatechuate branch of aromatic assimilation.
      action: NEW
      reason: pcaG is not merely associated with aromatic metabolism in general; it
        encodes one of the core ring-cleavage subunits that feeds the beta-ketoadipate
        pathway. This is broader than GO:0019618, but still directly applicable to the
        enzyme itself.
      supported_by:
        - reference_id: PMID:18156252
          supporting_text: the cat and pca genes of the central catechol and beta-ketoadipate
            pathways
        - reference_id: PMID:29765865
          supporting_text: native (in which PCA is metabolized via the β-ketoadipate
            pathway)
        - reference_id: file:PSEPK/pcaG/pcaG-deep-research-openai.md
          supporting_text: The pcaG gene product is a central enzyme in the β-ketoadipate
            pathway
