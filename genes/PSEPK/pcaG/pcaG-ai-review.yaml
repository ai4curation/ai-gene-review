proposed_new_terms: []
suggested_questions:
  - question: Which alpha-subunit interface residues in KT2440 PcaG most strongly
      determine substrate positioning and turnover once the beta-subunit Fe3+ center
      is assembled?
    experts:
      - Structural enzymologists
      - Aromatic-catabolism biochemists
  - question: Under mixed lignin-derived aromatic substrates, is PcaHG flux-limiting
      relative to upstream protocatechuate-producing enzymes in KT2440?
    experts:
      - Pseudomonas systems biologists
      - Metabolic engineers
suggested_experiments:
  - experiment_type: Site-directed mutagenesis
    description: Mutate alpha-subunit interface residues such as Tyr16 and assay
      protocatechuate cleavage kinetics, substrate range, and growth on protocatechuate,
      p-hydroxybenzoate, and vanillate.
  - experiment_type: Knockout-complement metabolomics
    description: Compare WT, delta-pcaG, delta-pcaH, and complemented strains during
      growth on protocatechuate and upstream aromatics to quantify protocatechuate
      accumulation and downstream beta-ketoadipate intermediates.
