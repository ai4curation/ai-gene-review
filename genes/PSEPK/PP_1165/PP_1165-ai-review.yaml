    summary: isomerase activity captures the broad idea but is less precise than racemase and epimerase activity, acting on carbohydrates and derivatives for this protein.
    action: MODIFY
    reason: Replace or supplement this broad term with GO:0016857 (racemase and epimerase activity, acting on carbohydrates and derivatives) based on the UniProt family and reaction evidence.
