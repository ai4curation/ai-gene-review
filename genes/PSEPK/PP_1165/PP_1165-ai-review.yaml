  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: PP_1165 encodes an aldose 1-epimerase/mutarotase family protein. The enzyme is predicted to catalyze interconversion of alpha and beta anomers of aldose sugars through carbohydrate epimerase/isomerase chemistry. The current GOA terms are broad domain-derived carbohydrate binding and isomerase annotations, so this first pass treats the protein as a carbohydrate-acting epimerase candidate rather than as a committed glycolytic enzyme.
