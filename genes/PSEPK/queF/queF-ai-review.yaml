  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: queF (PP_2160) encodes NADPH-dependent 7-cyano-7-deazaguanine reductase, the preQ1 synthase that reduces preQ0
  to preQ1 during bacterial tRNA queuosine biosynthesis. It is a cytoplasmic NADPH-dependent oxidoreductase in the deazaguanine
  branch that supplies the queuine precursor for downstream tRNA modification.
