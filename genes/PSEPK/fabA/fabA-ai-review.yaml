taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: >-
  FabA is the bifunctional cytoplasmic
  3-hydroxyacyl-ACP dehydratase/trans-2-decenoyl-ACP isomerase of
  Pseudomonas putida KT2440. It contributes to general FAS-II dehydration and
  introduces cis unsaturation by converting the trans-2-decenoyl-ACP
  intermediate to cis-3-decenoyl-ACP for FabB-dependent extension.
