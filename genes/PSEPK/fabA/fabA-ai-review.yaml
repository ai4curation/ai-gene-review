  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: FabA is the bifunctional dehydratase/isomerase that introduces cis unsaturation into fatty acids in Pseudomonas putida KT2440. It dehydrates 3-hydroxydecanoyl-ACP to trans-2-decenoyl-ACP and isomerizes that intermediate to cis-3-decenoyl-ACP, creating the unsaturated acyl-ACP branch used by FAS-II.
