description: PP_3759 encodes a predicted CheB-like protein-glutamate methylesterase in Pseudomonas
  putida KT2440. Unlike full-length CheB1, the available UniProt/domain evidence for PP_3759
  supports a compact methylesterase-domain protein rather than a complete CheA-phosphorylated
  receiver-domain response regulator. It is best treated as a chemotaxis adaptation/accessory
  methylesterase candidate.
