core_functions:
- description: PP_3759 is a CheB-like protein-glutamate methylesterase candidate in the chemotaxis
    adaptation/accessory boundary. It likely contributes to chemotaxis receptor demethylation,
    but the available first-pass evidence does not support treating it as a full receiver-domain
    response regulator.
