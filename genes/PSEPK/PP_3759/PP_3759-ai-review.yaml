suggested_questions:
- question: Which KT2440 MCPs are substrates for PP_3759, and does it act in the same chemotaxis
    branch as CheR3?
- question: Is PP_3759 regulated by protein-protein interaction rather than by CheA-dependent
    receiver-domain phosphorylation?
suggested_experiments:
- description: Assay PP_3759 methylesterase activity against methylated cytoplasmic domains
    of representative KT2440 MCPs.
- description: Compare chemotaxis adaptation kinetics in PP_3759, cheB1, and combined mutant
    backgrounds.
