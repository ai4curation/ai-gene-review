  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: >-
  PaaG is a 1,2-epoxyphenylacetyl-CoA isomerase in the aerobic
  phenylacetate degradation pathway of Pseudomonas putida KT2440. It acts
  downstream of the PaaABCE epoxidase system, rearranging the ring epoxide
  intermediate during conversion of phenylacetyl-CoA to open-chain products.
