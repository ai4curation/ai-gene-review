suggested_questions:
- question: What is the exact GarD reaction product in KT2440, and does it feed the PP_3599/KGSADH branch?
- question: Is GarD required for growth on galactarate itself, or mainly for galacturonate-derived galactarate produced by Udh and a lactonase?
suggested_experiments:
- description: >-
    Purify GarD and identify products from D-galactarate by LC-MS, comparing
    candidate downstream consumption by PP_3599 and KGSADH paralogs.
  experiment_type: enzyme product identification and pathway reconstitution
- description: >-
    Test garD deletion during growth on galactarate and galacturonate, with
    metabolite profiling of aldarate and keto-deoxy intermediates.
  experiment_type: targeted genetics with metabolomics
