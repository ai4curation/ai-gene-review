id: Q88GW6
gene_symbol: garD
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: >-
  garD encodes a predicted galactarate dehydratase from the UxaA-family
  altronate/galactarate dehydratases in Pseudomonas putida KT2440. Its
  supported role is dehydration of D-galactarate in aldarate catabolism.
existing_annotations:
- term:
    id: GO:0008867
    label: galactarate dehydratase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: >-
      Accept galactarate dehydratase activity as the core molecular function.
      UniProt, NCBIfam, InterPro, Panther, and GOA all converge on the GarD/UxaA
      family galactarate dehydratase assignment.
    action: ACCEPT
    reason: >-
      The UniProt entry names GarD as galactarate dehydratase, assigns EC
      4.2.1.42, records UxaA-family membership, and carries the matching GO
      activity through UniRule. The Asta report confirms the correct Q88GW6
      identity context.
    supported_by:
    - reference_id: file:PSEPK/garD/garD-uniprot.txt
      supporting_text: 'DE   RecName: Full=Galactarate dehydratase {ECO:0000256|NCBIfam:TIGR03248};'
    - reference_id: file:PSEPK/garD/garD-uniprot.txt
      supporting_text: 'DE            EC=4.2.1.42 {ECO:0000256|NCBIfam:TIGR03248};'
    - reference_id: file:PSEPK/garD/garD-uniprot.txt
      supporting_text: 'DR   GO; GO:0008867; F:galactarate dehydratase activity; IEA:UniProtKB-UniRule.'
    - reference_id: file:PSEPK/garD/garD-deep-research-asta.md
      supporting_text: 'uniprot_accession: Q88GW6'
- term:
    id: GO:0016829
    label: lyase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: >-
      Mark the generic lyase activity as over-annotated because the specific
      galactarate dehydratase molecular function is already available and
      better supported.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      Galactarate dehydratase is a lyase, but GO:0016829 is too broad to
      represent the curated function of this enzyme. The InterPro family and
      GOA UniRule annotation support the more specific activity.
    supported_by:
    - reference_id: file:PSEPK/garD/garD-uniprot.txt
      supporting_text: 'DR   GO; GO:0008867; F:galactarate dehydratase activity; IEA:UniProtKB-UniRule.'
    - reference_id: file:PSEPK/garD/garD-uniprot.txt
      supporting_text: 'DR   PANTHER; PTHR30536:SF1; GALACTARATE DEHYDRATASE (L-THREO-FORMING); 1.'
- term:
    id: GO:0019698
    label: D-galacturonate catabolic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000118
  qualifier: involved_in
  review:
    summary: >-
      Keep this as a non-core pathway-context annotation. Galacturonate can feed
      galactarate through the upstream Udh/lactonase route, but GarD itself is
      supported as a D-galactarate dehydratase rather than a direct
      galacturonate-processing enzyme.
    action: KEEP_AS_NON_CORE
    reason: >-
      The TreeGrafter process term is plausible in the pathway context seeded
      by ppu00053, but the strongest gene-level evidence points to the
      downstream D-galactarate catabolic branch. Keeping it as non-core avoids
      overstating GarD's direct substrate scope.
    supported_by:
    - reference_id: file:PSEPK/garD/garD-uniprot.txt
      supporting_text: 'DR   GO; GO:0019698; P:D-galacturonate catabolic process; IEA:TreeGrafter.'
    - reference_id: file:PSEPK/garD/garD-uniprot.txt
      supporting_text: 'DR   GO; GO:0046392; P:galactarate catabolic process; IEA:UniProtKB-UniRule.'
- term:
    id: GO:0046392
    label: D-galactarate catabolic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: involved_in
  review:
    summary: >-
      Accept D-galactarate catabolic process. GarD's specific activity and
      family assignment place it in the galactarate branch of aldarate
      catabolism.
    action: ACCEPT
    reason: >-
      The protein is named galactarate dehydratase, belongs to a UxaA-family
      altronate/galactarate dehydratase group, and carries the UniRule
      D-galactarate catabolic-process annotation. This is the most specific
      biological-process term currently present for GarD.
    supported_by:
    - reference_id: file:PSEPK/garD/garD-uniprot.txt
      supporting_text: 'CC   -!- SIMILARITY: Belongs to the UxaA family.'
    - reference_id: file:PSEPK/garD/garD-uniprot.txt
      supporting_text: 'DR   GO; GO:0046392; P:galactarate catabolic process; IEA:UniProtKB-UniRule.'
    - reference_id: file:PSEPK/garD/garD-uniprot.txt
      supporting_text: 'DR   PANTHER; PTHR30536; ALTRONATE/GALACTARATE DEHYDRATASE; 1.'
