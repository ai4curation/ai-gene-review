taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: >-
  LeuD is the required small swivel subunit of the LeuC-LeuD
  3-isopropylmalate dehydratase. The heterodimer isomerizes
  2-isopropylmalate to 3-isopropylmalate in the second committed reaction of
  L-leucine biosynthesis.
