- id: file:PSEPK/leuD/leuD-deep-research-openscientist.md
  title: OpenScientist literature and database synthesis for PSEPK LeuD
  findings:
  - statement: >-
      Identifies Q88LE7 as the non-catalytic small subunit that completes the
      LeuC-LeuD isopropylmalate dehydratase active site.
    supporting_text: >-
      *leuD* (Q88LE7, locus PP_1986) encodes the **small subunit of
      isopropylmalate isomerase
  - statement: >-
      No direct KT2440 LeuD enzymology was found; kinetic, structural, and
      substrate-specificity details are transferred from orthologous enzymes.
    supporting_text: >-
      Kinetic parameters (Km, kcat), the exact stereochemistry, and the
      physiological reversibility have been measured in *Salmonella*/*E. coli*,
      not in *P. putida* itself;
core_functions:
