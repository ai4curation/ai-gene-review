id: Q88LE7
gene_symbol: leuD
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: >-
  LeuD is the required small swivel subunit of the LeuC-LeuD
  3-isopropylmalate dehydratase. The heterodimer isomerizes
  2-isopropylmalate to 3-isopropylmalate in the second dedicated reaction of
  L-leucine biosynthesis.
existing_annotations:
- term:
    id: GO:0003861
    label: 3-isopropylmalate dehydratase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: >-
      LeuD is a required, non-catalytic subunit that contributes to the
      heterodimeric enzyme carrying this activity.
    action: ACCEPT
    reason: >-
      EC 4.2.1.33, HAMAP, and LeuD-specific family assignments agree. Because
      LeuD has no independent catalytic activity, `contributes_to` is a better
      qualifier than the machine-sourced `enables` for this subunit.
    supported_by:
    - reference_id: file:PSEPK/leuD/leuD-uniprot.txt
      supporting_text: Full=3-isopropylmalate dehydratase small subunit
    - reference_id: file:PSEPK/leuD/leuD-uniprot.txt
      supporting_text: Heterodimer of LeuC and LeuD.
    - reference_id: file:PSEPK/leuD/leuD-deep-research-openscientist.md
      supporting_text: >-
        It has **no independent catalytic activity**; instead it forms an
        **obligate 1:1 heterodimer with the large subunit LeuC (PP_1985)**.
- term:
    id: GO:0009098
    label: L-leucine biosynthetic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: involved_in
  review:
    summary: LeuD participates in the second leucine-specific step.
    action: ACCEPT
    reason: UniProt places the LeuC-LeuD heterodimer at step 2 of 4.
- term:
    id: GO:0009316
    label: 3-isopropylmalate dehydratase complex
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: part_of
  review:
    summary: This accurately records the defining LeuC-LeuD heterodimer membership.
    action: ACCEPT
    reason: >-
      LeuD has no independent catalytic activity; its required role is realized
      as the small subunit of this complex.
    supported_by:
    - reference_id: file:PSEPK/leuD/leuD-uniprot.txt
      supporting_text: Heterodimer of LeuC and LeuD.
