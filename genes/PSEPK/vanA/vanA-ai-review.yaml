id: Q88GI6
gene_symbol: vanA
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: VanA (PP_3736) is the Rieske oxygenase subunit of the two-component VanAB
  vanillate O-demethylase in Pseudomonas putida KT2440. The protein carries an N-terminal
  Rieske [2Fe-2S] cluster-binding domain and a C-terminal VanA_C catalytic domain
  characteristic of aromatic-ring-hydroxylating oxygenase alpha subunits. The core
  function is oxygen-dependent oxidative O-demethylation of vanillate during lignin-derived
  aromatic catabolism; overexpression studies also show activity toward syringate,
  but vanillate O-demethylation remains the most specific native assignment for this
  gene.
existing_annotations:
- term:
    id: GO:0003824
    label: catalytic activity
  qualifier: enables
  evidence_type: IEA
  original_reference_id: GO_REF:0000117
  review:
    summary: VanA is certainly catalytic, but this term is far too broad to be informative.
      The same annotation set already contains the specific child term vanillate monooxygenase
      activity, which captures the actual biochemical role.
    action: MARK_AS_OVER_ANNOTATED
    reason: GO:0003824 is a generic parent of the more specific enzyme activity already
      present. Retaining the parent term adds little value once GO:0018489 is accepted.
- term:
    id: GO:0005506
    label: iron ion binding
  qualifier: enables
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: VanA is a Rieske oxygenase subunit with a [2Fe-2S] cluster. The general
      iron ion binding annotation reflects that cofactor requirement, but the specific
      cluster-binding term is already present and is more informative.
    action: MARK_AS_OVER_ANNOTATED
    reason: GO:0005506 is true in a broad sense, but GO:0051537 precisely captures
      the relevant cofactor-binding chemistry for this protein and should be preferred.
- term:
    id: GO:0016491
    label: oxidoreductase activity
  qualifier: enables
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: VanA is an oxidoreductase, but this parent term is less informative than
      the specific vanillate monooxygenase activity annotation supported by the UniProt
      EC assignment and the KT2440 vanAB literature.
    action: MARK_AS_OVER_ANNOTATED
    reason: The annotation is redundant with GO:0018489, which states the actual substrate
      and reaction class.
- term:
    id: GO:0018489
    label: vanillate monooxygenase activity
  qualifier: enables
  evidence_type: IEA
  original_reference_id: GO_REF:0000003
  review:
    summary: This is the core molecular function of VanA. UniProt assigns EC 1.14.13.82
      to Q88GI6, recent KT2440 studies describe VanAB as the native Rieske non-heme
      iron monooxygenase used for vanillate O-demethylation, and vanAB engineering
      changes vanillate utilization in vivo.
    action: ACCEPT
    reason: GO:0018489 is the most specific and biologically appropriate annotation
      for vanA in KT2440.
    supported_by:
    - reference_id: file:PSEPK/vanA/vanA-uniprot.txt
      supporting_text: 'DE   SubName: Full=Vanillate O-demethylase oxygenase subunit'
    - reference_id: file:PSEPK/vanA/vanA-uniprot.txt
      supporting_text: DE            EC=1.14.13.82
    - reference_id: file:PSEPK/vanA/vanA-notes.md
      supporting_text: VanA is the oxygenase/Rieske subunit of the two-component VanAB
        vanillate O-demethylase in KT2440.
- term:
    id: GO:0051537
    label: 2 iron, 2 sulfur cluster binding
  qualifier: enables
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: VanA contains the canonical Rieske [2Fe-2S] domain and this cofactor
      is a defining feature of the oxygenase subunit. The annotation is specific and
      consistent with both the UniProt domain architecture and the literature description
      of VanAB as a Rieske monooxygenase.
    action: ACCEPT
    reason: This is a specific, mechanistically relevant molecular function that explains
      how the oxygenase subunit supports catalytic turnover.
    supported_by:
    - reference_id: file:PSEPK/vanA/vanA-uniprot.txt
      supporting_text: DR   GO; GO:0051537; F:2 iron, 2 sulfur cluster binding; IEA:UniProtKB-KW.
    - reference_id: file:PSEPK/vanA/vanA-uniprot.txt
      supporting_text: FT   DOMAIN          7..107
    - reference_id: file:PSEPK/vanA/vanA-notes.md
      supporting_text: VanA is the oxygenase/Rieske subunit of the two-component VanAB
        vanillate O-demethylase in KT2440.
- term:
    id: GO:0046191
    label: aerobic phenol-containing compound catabolic process
  evidence_type: IMP
  original_reference_id: DOI:10.1080/10826068.2019.1697935
  review:
    summary: Proposed new annotation. VanA participates in aerobic breakdown of methoxylated
      phenolic lignin-derived aromatics, most clearly vanillate. vanAB disruption
      blocks vanillic acid metabolism in KT2440, and recent KT2440 studies use native
      VanAB as the key O-demethylation step for vanillate and related substrates.
    action: NEW
    reason: The current GOA set lacks a biological process term capturing VanA's role
      in aerobic aromatic catabolism. GO:0046191 is broad but appropriate for the
      native vanillate/syringate O-demethylation context.
    additional_reference_ids:
    - DOI:10.1016/j.ymben.2024.06.009
    - DOI:10.1016/j.ymben.2021.02.005
    - DOI:10.1007/s00253-017-8211-y
    supported_by:
    - reference_id: file:PSEPK/vanA/vanA-notes.md
      supporting_text: A van AB nonfunctional mutant was defective in vanillic acid
        metabolism.
    - reference_id: file:PSEPK/vanA/vanA-notes.md
      supporting_text: KT2440 natively grows on vanillate, and pathway summaries for
        lignin model compound conversion identify VanAB as the vanillate O-demethylase
        complex in the upper aromatic pathway.
references:
- id: GO_REF:0000002
  title: Gene Ontology annotation through association of InterPro records with GO
    terms
  findings:
  - statement: InterPro correctly captures the Rieske [2Fe-2S] oxygenase architecture
      of VanA and supports specific cofactor-binding annotations.
- id: GO_REF:0000003
  title: Gene Ontology annotation based on Enzyme Commission mapping
  findings:
  - statement: EC 1.14.13.82 maps VanA to vanillate monooxygenase activity.
- id: GO_REF:0000117
  title: Electronic Gene Ontology annotations created by ARBA machine learning models
  findings:
  - statement: ARBA provides only a generic catalytic activity assignment here, which
      is better replaced by the more specific enzyme term.
- id: file:PSEPK/vanA/vanA-uniprot.txt
  title: UniProt entry Q88GI6
  findings:
  - statement: Q88GI6 is named vanillate O-demethylase oxygenase subunit.
  - statement: UniProt assigns EC 1.14.13.82 to VanA.
  - statement: The protein contains a Rieske domain and VanA_C catalytic domain.
- id: file:PSEPK/vanA/vanA-notes.md
  title: vanA literature notes
  findings:
  - statement: VanA is the oxygenase/Rieske subunit of the two-component VanAB vanillate
      O-demethylase in KT2440.
  - statement: VanAB overexpression accelerates vanillate utilization in KT2440.
  - statement: vanAB disruption blocks vanillic acid metabolism in an engineered KT2440
      background.
  - statement: VanAB can also O-demethylate syringate when overexpressed.
- id: DOI:10.1016/j.ymben.2024.06.009
  title: Evolution and engineering of pathways for aromatic O-demethylation in Pseudomonas
    putida KT2440
  findings:
  - statement: The native VanAB pathway was optimized in KT2440 with vanillate as
      a model substrate.
  - statement: VanB is the reductase partner of the vanillate O-demethylase system.
  - statement: Combining key mutations yielded approximately 5x faster vanillate consumption.
- id: DOI:10.1016/j.ymben.2021.02.005
  title: Metabolism of syringyl lignin-derived compounds in Pseudomonas putida enables
    convergent production of 2-pyrone-4,6-dicarboxylic acid
  findings:
  - statement: VanAB is a two-component monooxygenase that can O-demethylate syringate
      to gallate when overexpressed.
  - statement: VanAB shows substantial catalytic activity on syringate relative to
      vanillate.
- id: DOI:10.1080/10826068.2019.1697935
  title: Biotransformation of corn bran derived ferulic acid to vanillic acid using
    engineered Pseudomonas putida KT2440
  findings:
  - statement: A vanAB nonfunctional mutant is defective in vanillic acid metabolism.
- id: DOI:10.1007/s00253-017-8211-y
  title: Conversion of lignin model compounds by Pseudomonas putida KT2440 and isolates
    from compost
  findings:
  - statement: KT2440 grows on vanillate as a sole carbon source, albeit more slowly
      than on benzoate or 4-hydroxybenzoate.
  - statement: Pathway reconstruction identifies VanAB as the vanillate O-demethylase
      complex.
- id: DOI:10.1016/j.meteno.2017.05.002
  title: Eliminating a global regulator of carbon catabolite repression enhances the
    conversion of aromatic lignin monomers to muconate in Pseudomonas putida KT2440
  findings:
  - statement: VanAB is a target of Crc-mediated catabolite repression in engineered
      KT2440 strains.
core_functions:
- description: VanA is the oxygenase subunit of the two-component VanAB system that
    performs oxygen-dependent O-demethylation of vanillate during aerobic catabolism
    of lignin-derived phenolic aromatics. The same catalytic framework can accept
    syringate when VanAB is overexpressed, but vanillate O-demethylation is the clearest
    native functional assignment.
  molecular_function:
    id: GO:0018489
    label: vanillate monooxygenase activity
  directly_involved_in:
  - id: GO:0046191
    label: aerobic phenol-containing compound catabolic process
  supported_by:
  - reference_id: file:PSEPK/vanA/vanA-notes.md
    supporting_text: VanA is the oxygenase/Rieske subunit of the two-component VanAB
      vanillate O-demethylase in KT2440.
  - reference_id: file:PSEPK/vanA/vanA-notes.md
    supporting_text: VanAB-overexpressing KT2440 strains showed faster vanillate utilization,
      and the same study identifies VanB as the reductase partner for vanillate O-demethylase.
  - reference_id: file:PSEPK/vanA/vanA-notes.md
    supporting_text: VanAB also accepts syringate when overexpressed.
suggested_questions:
- question: Is syringate oxidation by native KT2440 VanAB physiologically relevant
    at endogenous vanAB expression levels, or mainly an overexpression phenotype?
- question: Which native transcription factors, in addition to carbon catabolite repression,
    dominate vanAB induction during growth on vanillate in KT2440?
- question: Does vanA contribute measurably to substrate hierarchy when KT2440 is
    exposed to mixed lignin-derived aromatics?
suggested_experiments:
- description: Construct clean vanA and vanB deletion/complementation strains and
    compare growth plus substrate disappearance on vanillate, vanillin-derived vanillate,
    and syringate under identical aerobic conditions.
  hypothesis: VanA is essential for native vanillate O-demethylation and any measurable
    syringate O-demethylation in KT2440.
  experiment_type: growth phenotype and substrate consumption assay
- description: Purify the VanAB complex and measure oxygen consumption plus product
    formation with vanillate, syringate, and additional methoxylated aromatics.
  hypothesis: VanA has highest catalytic efficiency on vanillate but retains measurable
    side activity on selected lignin-derived methoxylated phenolics.
  experiment_type: biochemical enzyme assay
- description: Perform RNA-seq or targeted promoter-reporter assays during growth
    on vanillate versus mixed aromatic substrates, with and without crc perturbation.
  hypothesis: vanAB expression is strongly substrate-responsive and further tuned
    by catabolite repression during mixed-substrate growth.
  experiment_type: transcriptional regulation analysis
