  qualifier: enables
  evidence_type: IEA
  original_reference_id: GO_REF:0000117
  review:
    summary: VanA is certainly catalytic, but this term is far too broad to be informative.
      The same annotation set already contains the specific child term vanillate monooxygenase
      activity, which captures the actual biochemical role.
    action: MARK_AS_OVER_ANNOTATED
    reason: GO:0003824 is a generic parent of the more specific enzyme activity already
      present. Retaining the parent term adds little value once GO:0018489 is accepted.
