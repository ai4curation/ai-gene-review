core_functions:
- description: VanA is the terminal Rieske non-heme iron oxygenase subunit of the two-component
    VanAB monooxygenase that performs oxygen-dependent O-demethylation of vanillate,
    yielding protocatechuate plus formaldehyde, during aerobic catabolism of lignin-derived
    guaiacyl aromatics. The protocatechuate product is funneled into the central protocatechuate/beta-ketoadipate
    pathway. The same catalytic framework can accept syringate when VanAB is overexpressed,
    but vanillate O-demethylation is the clearest native functional assignment.
