  qualifier: enables
  evidence_type: IEA
  original_reference_id: GO_REF:0000003
  review:
    summary: This is the core molecular function of VanA. UniProt assigns EC 1.14.13.82
      to Q88GI6, recent KT2440 studies describe VanAB as the native Rieske non-heme
      iron monooxygenase used for vanillate O-demethylation, and vanAB engineering
      changes vanillate utilization in vivo.
    action: ACCEPT
    reason: GO:0018489 is the most specific and biologically appropriate molecular
      function for vanA in KT2440. Falcon deep research confirms VanA is the terminal
      oxygenase of the two-component VanAB vanillate O-demethylase that converts vanillate
      to protocatechuate with release of formaldehyde.
