description: PP_1928 encodes a predicted low-molecular-weight arsenate reductase in Pseudomonas putida KT2440. UniProt names
  the product as arsenate reductase and marks arsenical-resistance context, but the fetched GOA table has no rows. The first-pass
  GO-level assignment is therefore conservative oxidoreductase activity plus response to arsenic-containing substance, without
  asserting a more specific arsenate reductase GO term.
