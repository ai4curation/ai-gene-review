taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: PP_1103 encodes the experimentally characterized P. putida Lhr-Core helicase. The protein is an ssDNA-dependent
  ATPase/dATPase and ATP-dependent 3'-to-5' helicase that unwinds DNA duplexes and RNA:DNA hybrids, and its locus context
  supports a probable DNA repair pathway role.
