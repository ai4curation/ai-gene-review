suggested_questions:
- question: What is the in vivo physiological balance between using 2-oxoglutarate
    versus 2-oxoadipate as the cosubstrate, and how does cosubstrate choice link the
    D- and L-lysine catabolic branches in P. putida?
- question: How is glaH expression regulated at the molecular level, and which transcription
    factor senses glutarate to induce the gene?
suggested_experiments:
- description: Determine steady-state kinetic parameters (kcat, Km) of purified GlaH
    for glutarate with 2-oxoglutarate versus 2-oxoadipate as cosubstrate to quantify
    cosubstrate preference.
- description: Solve or refine the crystal structure of GlaH with bound Fe(II), 2-oxoglutarate,
    and glutarate to confirm the 2-His-1-carboxylate facial triad and substrate-binding
    determinants of glutarate specificity.
- description: Use 13C-labeled L-lysine and metabolomics in wild-type versus glaH deletion
    strains to trace carbon flux through L-2-hydroxyglutarate into succinate and the
    TCA cycle.
