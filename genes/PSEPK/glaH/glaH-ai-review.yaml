- id: file:PSEPK/glaH/glaH-uniprot.txt
  title: UniProt entry Q88IU0 (GLAH_PSEPK), Glutarate 2-hydroxylase, Pseudomonas putida
    KT2440
  findings:
  - statement: GlaH (CsiD) is an alpha-ketoglutarate-dependent dioxygenase that hydroxylates
      glutarate to L-2-hydroxyglutarate and functions in L-lysine degradation.
    supporting_text: Acts as an alpha-ketoglutarate-dependent dioxygenase
  - statement: The enzyme is extremely specific for glutarate but can use either 2-oxoglutarate
      or 2-oxoadipate as the 2-oxoacid cosubstrate, and binds one ferrous iron per
      subunit.
    supporting_text: Is extremely specific for glutarate, but it can use both
  - statement: glaH has NO PANTHER family assignment. It is instead classified by
      InterPro/Pfam as a Fe(II)/2-oxoglutarate-dependent dioxygenase of the CsiD/GlaH
      family, with InterPro domains IPR015038 (GlaH) and IPR042098 (TauD-like superfamily)
      and Pfam domain PF08943 (CsiD).
  - statement: The TauD-like / clavaminate synthase-like fold of the CsiD/GlaH family
      is consistent with the experimentally validated glutarate dioxygenase activity,
      supported by NCBIfam NF002814 (PRK02963.1) and SUPFAM SSF51197 (Clavaminate
      synthase-like).
