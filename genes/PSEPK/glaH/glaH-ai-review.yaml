  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: Glutarate 2-hydroxylase (GlaH, also known as CsiD; locus PP_2909) of
  Pseudomonas putida KT2440, a soluble non-heme Fe(II)/2-oxoglutarate-dependent dioxygenase
  (EC 1.14.11.64) that hydroxylates glutarate to L-2-hydroxyglutarate. The reaction
  couples glutarate hydroxylation to oxidative decarboxylation of 2-oxoglutarate,
  consuming O2 and producing succinate and CO2. It binds one ferrous iron per subunit
  and assembles as a homotetramer. The enzyme is extremely specific for glutarate
  as the hydroxylation substrate but can use either 2-oxoglutarate or 2-oxoadipate
  as the 2-oxoacid cosubstrate. It carries out a key step of the CoA-independent route
  of glutarate and downstream L-lysine catabolism, feeding carbon into the TCA cycle
  as succinate; the L-2-hydroxyglutarate product is re-oxidized to 2-oxoglutarate
  by LghO, regenerating the cosubstrate.
