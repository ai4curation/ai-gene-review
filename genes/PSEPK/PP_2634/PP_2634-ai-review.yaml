- id: PMID:19400787
  title: BcsQ is an essential component of the Escherichia coli cellulose biosynthesis
    apparatus that localizes at the bacterial cell pole.
  full_text_unavailable: true
  findings:
  - statement: The primary BcsQ paper shows that yhjQ/BcsQ is essential for cellulose biosynthesis and polar localization in the enterobacterial reference system.
    supporting_text: "we show that yhjQ, but not yhjR, is essential for cellulose biosynthesis; it has therefore been renamed bcsQ"
  - statement: The same paper identifies BcsQ as a MinD homolog with polar localization.
    supporting_text: "we demonstrate that BcsQ, a MinD homologue, displays a polar localization"
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: PubMed-cached abstract-only primary research; directly supports BcsQ identity and accessory positioning role in a characterized ortholog.
- id: PMID:33563593
  title: Architecture and regulation of an enterobacterial cellulose secretion system.
  full_text_unavailable: true
  findings:
  - statement: Cryo-EM work supports BcsQ as part of the assembled Bcs macrocomplex and its ATP-dependent regulation.
    supporting_text: "assembled Bcs macrocomplex"
  - statement: The abstract reports ATP-dependent regulation of the cellulose secretion system.
    supporting_text: "unexpected subunit stoichiometry, multisite c-di-GMP recognition, and ATP-dependent regulation"
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: PubMed-cached abstract-only primary structural research; supports macrocomplex context but not a direct KT2440 assay.
