    label: cellulose biosynthetic process
  evidence_type: ISS
  original_reference_id: PMID:19400787
  qualifier: involved_in
  review:
    summary: PP_2634 should be added to cellulose biosynthetic process as a BcsQ/YhjQ-family accessory factor, not as a catalytic cellulose synthase.
    action: NEW
    reason: BcsQ/yhjQ is experimentally required for cellulose biosynthesis in E. coli, and PP_2634 has BcsQ/P-loop NTPase domain architecture in the KT2440 bcs operon immediately adjacent to bcsA/bcsB.
    supported_by:
    - reference_id: PMID:19400787
      supporting_text: "we show that yhjQ, but not yhjR, is essential for cellulose biosynthesis; it has therefore been renamed bcsQ"
