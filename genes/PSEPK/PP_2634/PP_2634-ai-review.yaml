    supporting_text: "BcsRQABEFG macrocomplex"
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: PubMed-cached abstract-only primary structural research; supports BcsRQ macrocomplex context for orthology transfer.
- id: PMID:30889223
  title: Transcriptional organization, regulation and functional analysis of flhF
    and fleN in Pseudomonas putida.
  findings:
  - statement: P. putida-specific work shows c-di-GMP/FleQ/FleN regulation of the bcs promoter, placing PP_2634's operon in the biofilm regulatory program.
