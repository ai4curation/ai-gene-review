suggested_questions:
- question: Should UniProt update PP_2634's submitted/display name from "Cellulose synthase" to BcsQ or cellulose biosynthesis protein BcsQ?
- question: Does KT2440 PP_2634 localize the cellulose synthase machinery to a specific subcellular site as shown for enterobacterial BcsQ?
suggested_experiments:
- description: Delete PP_2634 in KT2440, complement with wild-type and Walker-A mutant variants, and assay cellulose production and biofilm/rhizosphere phenotypes.
  experiment_type: targeted genetics and cellulose phenotype assay
- description: Express a functional fluorescent PP_2634/BcsQ fusion and image localization relative to BcsA/BcsB and sites of cellulose deposition.
  experiment_type: live-cell localization assay
