description: PP_2634 encodes a BcsQ/YhjQ-family P-loop NTPase accessory factor in the local bacterial cellulose synthase operon. Despite the generic UniProt submitted name "Cellulose synthase", its domain architecture and operon context support a non-catalytic BcsQ role in organizing or positioning the cellulose synthase/secretion machinery rather than polymerizing cellulose.
