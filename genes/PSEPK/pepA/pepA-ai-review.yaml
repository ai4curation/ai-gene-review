taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: pepA encodes a probable cytosolic leucine/cytosol aminopeptidase in Pseudomonas putida KT2440. It is an M17 metalloaminopeptidase predicted to remove N-terminal amino acids from peptides during intracellular protein turnover, using manganese as a catalytic metal.
