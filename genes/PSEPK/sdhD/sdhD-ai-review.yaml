  qualifier: located_in
  review:
    summary: Correct but less precise than the plasma membrane/inner membrane annotation.
    action: MODIFY
    reason: SdhD is a membrane protein, but UniProt specifies the bacterial cell inner membrane and GOA already has the more informative plasma membrane annotation. Use GO:0005886 as the preferred location term.
    proposed_replacement_terms:
    - id: GO:0005886
      label: plasma membrane
    supported_by:
