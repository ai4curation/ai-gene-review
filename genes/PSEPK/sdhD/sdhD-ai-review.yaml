- term:
    id: GO:0017004
    label: cytochrome complex assembly
  evidence_type: IEA
  original_reference_id: GO_REF:0000118
  qualifier: involved_in
  review:
    summary: Over-propagated assembly-process annotation; SdhD is a cytochrome/heme-containing subunit, not an assembly factor.
    action: REMOVE
    reason: UniProt supports SdhD as a membrane-anchoring subunit of succinate dehydrogenase with heme binding, but not as a factor that assembles cytochrome complexes. The annotation appears to over-interpret cytochrome b/heme membership as an assembly process.
