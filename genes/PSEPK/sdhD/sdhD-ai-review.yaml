description: Hydrophobic membrane anchor subunit of the succinate dehydrogenase/respiratory Complex II enzyme in Pseudomonas putida KT2440. SdhD is a multi-pass inner-membrane protein that helps anchor the SdhAB catalytic head to the plasma membrane and contributes to quinone-linked electron transfer through the SdhC/SdhD membrane domain. It binds heme together with the second transmembrane subunit and supports the succinate-to-fumarate TCA-cycle step carried out by the SdhABCD complex.
