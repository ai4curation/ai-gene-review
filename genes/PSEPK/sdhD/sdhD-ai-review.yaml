    summary: Correct heme-binding feature for the SdhC/SdhD membrane anchor domain.
    action: ACCEPT
    reason: UniProt annotates heme for SdhD and states that the heme is bound between the two transmembrane subunits. This is a meaningful molecular feature of the Complex II membrane domain.
    supported_by:
    - reference_id: file:PSEPK/sdhD/sdhD-uniprot.txt
