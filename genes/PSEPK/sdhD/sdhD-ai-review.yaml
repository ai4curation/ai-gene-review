  review:
    summary: Correct localization for the bacterial inner-membrane succinate dehydrogenase anchor subunit.
    action: ACCEPT
    reason: UniProt annotates SdhD as a cell inner membrane, multi-pass membrane protein. In Gram-negative bacteria the inner membrane corresponds to the GO plasma membrane.
