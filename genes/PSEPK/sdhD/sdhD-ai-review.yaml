    action: ACCEPT
    reason: The SdhABCD complex catalyzes the succinate-to-fumarate step of the TCA cycle. SdhD is not the catalytic flavoprotein subunit, but it is part of the required membrane anchor/quinone-transfer domain of the same complex.
