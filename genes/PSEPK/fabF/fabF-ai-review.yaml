- id: PMID:34181948
  title: A cryptic long-chain 3-ketoacyl-ACP synthase in the Pseudomonas putida F1 unsaturated fatty acid synthesis pathway.
  findings:
  - statement: >-
      Deletion genetics in P. putida F1 establishes the physiological
      contribution of its FabF1 protein to cis-vaccenic-acid synthesis.
    supporting_text: >-
      FabF1 is responsible for saturated fatty acid (SFA) synthesis and for
      conversion of C16:1-ACP to C18:1-ACP
    reference_section_type: RESULTS
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: >-
      Full text verified. The experiments concern P. putida strain F1 FabF1,
      not the exact KT2440 Q88LL4 protein, so they provide organism-level
      comparative support rather than direct target evidence.
