  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: >-
  FabF is a cytosolic 3-oxoacyl-ACP synthase II of Pseudomonas putida KT2440
  type-II fatty-acid synthesis. It performs iterative decarboxylative
  condensations that add two-carbon units from malonyl-ACP and is predicted to
  extend long-chain saturated and cis-unsaturated acyl-ACP substrates.
