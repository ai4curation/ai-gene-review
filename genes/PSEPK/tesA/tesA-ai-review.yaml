    label: phosphatidylcholine lysophospholipase A1 activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: The lysophospholipase A1 annotation is plausible for the SGNH/GDSL hydrolase named as lysophospholipase
      L1, but the exact lipid substrate has not been experimentally resolved for KT2440 TesA.
    action: KEEP_AS_NON_CORE
    reason: Retain as lipid-hydrolase context while treating the fatty acyl-ACP hydrolase annotation as
      the clearer pathway-relevant molecular function.
