taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: tesA encodes a predicted SGNH/GDSL hydrolase annotated as acyl-CoA thioesterase I/protease
  I/lysophospholipase L1. The best first-pass interpretation is a secreted or periplasmic lipid ester/thioester
  hydrolase with fatty acyl-ACP hydrolase and lysophospholipase/lipase activity, not a core unsaturated
  fatty acid biosynthesis enzyme.
