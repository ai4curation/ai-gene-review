- id: file:PSEPK/fadB/fadB-deep-research-falcon.md
  title: Falcon (Edison Scientific) deep research report for P. putida KT2440 fadB (PP_2136; Q88L02)
  findings:
  - statement: |-
      The locus **PP_2136** in *P. putida* KT2440 is explicitly mapped to **fadB** and described as the **FadB subunit** of the **FadBA β‑oxidation multienzyme complex**, adjacent to **fadA (PP_2137)** encoding a thiolase—matching the UniProt target context (Q88L02; fadB; PP_2136; multifunctional β‑oxidation enzyme).
    reference_section_type: OTHER
  - statement: |-
      An authoritative KT2440-focused review summarizes **four activities** for **FadB (PP_2136)**:
    reference_section_type: OTHER
  - statement: |-
      Mechanistically, the review describes FadB catalyzing the hydration of **2‑trans‑enoyl‑CoA → (S)‑3‑hydroxyacyl‑CoA**, followed by oxidation of **(S)‑3‑hydroxyacyl‑CoA → 3‑ketoacyl‑CoA** with **NAD\+ reduction**, corresponding to two successive β‑oxidation steps.
    reference_section_type: OTHER
  - statement: |-
      Disruption of the **fadB homolog PP_2136** produces **severe fitness defects on fatty acids with chain length C6 and longer**, implicating PP_2136 as the **primary enoyl‑CoA hydratase/3‑hydroxyacyl‑CoA dehydrogenase** for **C6+** fatty-acid catabolism.
    reference_section_type: OTHER
  - statement: |-
      FadB’s canonical role places it in the **β‑oxidation spiral** between acyl‑CoA dehydrogenation and thiolysis, producing 3‑ketoacyl‑CoA for **FadA thiolase** action.
    reference_section_type: OTHER
  - statement: |-
      although epimerase activity may be assigned to FadB by homology, this epimerase role **may not be physiologically relevant** in *Pseudomonas* under tested conditions, reinforcing the view that **PhaJ/FabG/PhaG**-type routes are principal connectors to PHA.
    reference_section_type: OTHER
