suggested_questions:
- question: >-
    Does PP_3157 carry substantial histidinol-phosphatase flux in KT2440, and
    how does its contribution overlap with the unrelated HAD enzyme PP_5147?
suggested_experiments:
- description: >-
    Compare PP_3157 and PP_5147 single and double deletions during histidine
    limitation, then assay both purified enzymes against histidinol phosphate
    and representative alternative phosphomonoesters.
  experiment_type: genetics and substrate-specific enzyme assay
