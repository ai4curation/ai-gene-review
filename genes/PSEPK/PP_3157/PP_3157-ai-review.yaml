id: Q88I44
gene_symbol: PP_3157
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: >-
  PP_3157 encodes the predicted histidinol-phosphate phosphatase (HisN-like;
  EC 3.1.3.15) of Pseudomonas putida KT2440. It hydrolyzes L-histidinol
  phosphate to L-histidinol in the penultimate reaction of L-histidine
  biosynthesis. The protein belongs to the metal-dependent
  inositol-monophosphatase superfamily and is assigned to the histidine-specific
  His_9/TIGR02067 branch. Experimentally defined HisN sequence motifs and the
  family model distinguish this branch from related CysQ/SuhB-like IMPases,
  although PP_3157 itself has not been assayed. KT2440 also encodes the
  unrelated HAD-family candidate PP_5147, so their relative physiological
  contributions remain unresolved.
existing_annotations:
- term:
    id: GO:0000105
    label: L-histidine biosynthetic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: involved_in
  review:
    summary: PP_3157 is the predicted penultimate enzyme of histidine biosynthesis.
    action: ACCEPT
    reason: >-
      UniRule, UniPathway UPA00031, KEGG ppu00340, and the His_9 family
      assignment consistently place Q88I44 in L-histidine biosynthesis. The
      family-level literature supports this assignment, but there is no direct
      PP_3157 knockout or enzyme assay.
    supported_by:
    - reference_id: file:PSEPK/PP_3157/PP_3157-deep-research-openscientist.md
      supporting_text: "specific PP_3157 protein has not itself been enzymatically assayed"
- term:
    id: GO:0004401
    label: histidinol-phosphatase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: This is the substrate-specific predicted activity of PP_3157.
    action: ACCEPT
    reason: >-
      GO:0004401 matches EC 3.1.3.15, RHEA:14465, the UniProt product name,
      UniRule UR001996117, and the histidine-specific IPR011809 family.
      Confidence is nevertheless limited because PMID:28720084 cautions that
      IMPase-like HisN homologs may lack HolPase activity in
      Gammaproteobacteria that also encode a HAD-type HolPase, as KT2440 does
      with PP_5147.
    supported_by:
    - reference_id: file:PSEPK/PP_3157/PP_3157-deep-research-openscientist.md
      supporting_text: "PP_3157 encodes a **histidinol-phosphate phosphatase"
    - reference_id: PMID:28720084
      supporting_text: >-
        the role of the putative HisN orthologs within those
        gammaproteobacterial families with concurrent occurrence of His(NB) and
        HisN homologs is less evident. It is possible, that these genera simply
        possess two different HolPases or that the HisN homologs from these
        families do not possess HolPase activity.
