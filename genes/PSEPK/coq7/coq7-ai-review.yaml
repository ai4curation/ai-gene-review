id: Q88QR1
gene_symbol: coq7
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: >-
  coq7 encodes a diiron 3-demethoxyubiquinol 3-hydroxylase that performs a late
  aromatic-ring hydroxylation during ubiquinone biosynthesis. The enzyme is
  predicted to be a peripheral protein associated with the bacterial cell
  membrane.
existing_annotations:
- term:
    id: GO:0004497
    label: monooxygenase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: Monooxygenase activity is correct but less informative than the substrate-specific hydroxylase term.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      GO:0008682 captures the evolved ubiquinone-intermediate hydroxylase
      function, making the generic monooxygenase parent redundant.
- term:
    id: GO:0005886
    label: plasma membrane
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: located_in
  review:
    summary: Coq7 is predicted to be a peripheral cell-membrane enzyme.
    action: ACCEPT
    reason: >-
      The reviewed UniProt record assigns Coq7 to the cell membrane as a
      peripheral membrane protein, consistent with the interfacial membrane
      model proposed for experimentally studied Coq7-family enzymes. Exact
      topology and membrane-face orientation have not been measured for
      PP_0427.
    supported_by:
    - reference_id: file:PSEPK/coq7/coq7-uniprot.txt
      supporting_text: Peripheral membrane protein
    - reference_id: PMID:11435415
      supporting_text: >-
        Based on the similarities to other well studied di-iron carboxylate
        proteins, we propose a structural model for Coq7 as an interfacial
        integral membrane protein.
- term:
    id: GO:0006744
    label: ubiquinone biosynthetic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: involved_in
  review:
    summary: Ubiquinone biosynthesis is the core process for Coq7.
    action: ACCEPT
    reason: Coq7 hydroxylates a late demethoxyubiquinol intermediate in this pathway.
    supported_by:
    - reference_id: file:PSEPK/coq7/coq7-uniprot.txt
      supporting_text: ubiquinone biosynthesis
    - reference_id: PMID:11435415
      supporting_text: >-
        We have cloned COQ7 from Pseudomonas aeruginosa and Thiobacillus
        ferrooxidans and show that indeed this gene complements an Escherichia
        coli mutant that lacks an unrelated 5-demethoxyubiquinone hydroxylase.
- term:
    id: GO:0008682
    label: 3-demethoxyubiquinol 3-hydroxylase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: This is the substrate-specific core molecular function of Coq7.
    action: ACCEPT
    reason: UniProt assigns EC 1.14.99.60 and Rhea 50908 to this hydroxylation reaction.
    supported_by:
    - reference_id: file:PSEPK/coq7/coq7-uniprot.txt
      supporting_text: 3-demethoxyubiquinol 3-hydroxylase
    - reference_id: PMID:11435415
      supporting_text: >-
        Here we identify Coq7 as belonging to a family of a di-iron containing
        oxidases/hydroxylases based on a conserved sequence motif for the iron
        ligands, supporting a direct function of Coq7 as a hydroxylase.
    - reference_id: file:PSEPK/coq7/coq7-deep-research-openscientist.md
      supporting_text: >-
        Q88QR1 belongs to the COQ7/CLK-1 family (Pfam PF03232; InterPro
        IPR011566), a group of di-iron carboxylate oxidases/hydroxylases.
references:
- id: GO_REF:0000002
  title: Gene Ontology annotation through association of InterPro records with GO
    terms
  findings: []
- id: GO_REF:0000120
  title: Combined Automated Annotation using Multiple IEA Methods
  findings: []
- id: file:PSEPK/coq7/coq7-uniprot.txt
  title: UniProt entry Q88QR1 for coq7
  findings:
  - statement: >-
      The reviewed entry assigns a membrane-associated, diiron
      3-demethoxyubiquinol 3-hydroxylase in ubiquinone biosynthesis.
- id: file:PSEPK/coq7/coq7-goa.tsv
  title: QuickGO GOA annotations for coq7
  findings:
  - statement: The fetched GOA table contains the four annotations reviewed here.
- id: PMID:11435415
  title: >-
    A new member of the family of di-iron carboxylate proteins. Coq7 (clk-1), a
    membrane-bound hydroxylase involved in ubiquinone biosynthesis.
  findings:
  - statement: >-
      A Pseudomonas aeruginosa Coq7 ortholog complemented an E. coli mutant
      lacking the unrelated DMQ hydroxylase UbiF, and conserved iron-ligand
      motifs support direct diiron hydroxylase chemistry.
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      PubMed-cached abstract verified. The experiment directly tests a
      Pseudomonas ortholog, not P. putida PP_0427, so transfer to Q88QR1 remains
      family and pathway inference.
- id: PMID:23445365
  title: >-
    Aging-associated enzyme human clock-1: substrate-mediated reduction of the
    diiron center for 5-demethoxyubiquinone hydroxylation.
  findings:
  - statement: >-
      Spectroscopic and kinetic work on human COQ7 directly establishes the
      carboxylate-bridged diiron mechanism and DMQ hydroxylase chemistry for the
      conserved family.
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: >-
      Full-text cached primary study verified; it supports family mechanism but
      is not a target-protein assay.
- id: file:PSEPK/coq7/coq7-deep-research-openscientist.md
  title: OpenScientist functional review of PSEPK coq7
  findings:
  - statement: >-
      Pseudomonas ortholog complementation, conserved diiron ligands, and the
      complete KT2440 ubiquinone pathway support the PP_0427 assignment. The
      report's target-specific UQ-9, exact membrane-face orientation, and Ubi
      metabolon-membership claims are not adopted because they were not
      demonstrated for PP_0427.
core_functions:
- description: >-
    Predicted membrane-associated diiron hydroxylation of
    3-demethoxyubiquinol during late ubiquinone biosynthesis, inferred for
    PP_0427 from conserved Coq7-family chemistry and pathway context.
