id: Q88QR1
gene_symbol: coq7
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: >-
  coq7 encodes a proteobacterial Coq7-family 3-demethoxyubiquinol
  3-hydroxylase, a di-iron monooxygenase associated with the bacterial plasma
  membrane. It catalyzes a late hydroxylation step in ubiquinone biosynthesis,
  converting a 5-methoxy-2-methyl-3-polyprenyl benzene-1,4-diol intermediate
  to 3-demethylubiquinol before the terminal UbiG methylation step.
existing_annotations:
- term:
    id: GO:0004497
    label: monooxygenase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: >-
      Monooxygenase activity is directionally correct but less informative than
      the substrate-resolved DMQ hydroxylase term already present in GOA.
    action: MODIFY
    reason: >-
      UniProt/HAMAP names Q88QR1 as 3-demethoxyubiquinol 3-hydroxylase and
      records EC 1.14.99.60; GO:0008682 is the appropriate specific
      molecular-function term.
    proposed_replacement_terms:
    - id: GO:0008682
      label: 3-demethoxyubiquinol 3-hydroxylase activity
- term:
    id: GO:0005886
    label: plasma membrane
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: located_in
  review:
    summary: >-
      The plasma-membrane localization is consistent with UniProt's
      peripheral-membrane annotation for this polyprenyl-intermediate enzyme.
    action: KEEP_AS_NON_CORE
    reason: >-
      The location is useful pathway context but the core function is the
      Coq7-catalyzed ubiquinone biosynthesis hydroxylation reaction.
- term:
    id: GO:0006744
    label: ubiquinone biosynthetic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: involved_in
  review:
    summary: >-
      Coq7 catalyzes a late hydroxylation in the ubiquinone biosynthetic
      pathway.
    action: ACCEPT
    reason: >-
      UniProt explicitly places the hydroxylation reaction during ubiquinone
      biosynthesis, so the biological-process annotation matches the enzyme's
      core role.
- term:
    id: GO:0008682
    label: 3-demethoxyubiquinol 3-hydroxylase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: >-
      This is the specific Coq7/DMQ hydroxylase activity supported by the
      UniProt/HAMAP assignment and EC 1.14.99.60.
    action: ACCEPT
    reason: >-
      The UniProt record describes Q88QR1 as 3-demethoxyubiquinol
      3-hydroxylase and records the corresponding Rhea reaction in ubiquinone
      biosynthesis.
