proposed_new_terms: []
suggested_questions:
- question: >-
    What physiological electron donor reduces the PP_0427 diiron center, and
    does PP_0427 physically associate with other KT2440 ubiquinone-biosynthesis
    proteins?
suggested_experiments:
- description: >-
    Delete PP_0427 and quantify demethoxyubiquinone accumulation and
    ubiquinone depletion by LC-MS, then complement the phenotype with wild-type
    PP_0427 and iron-ligand mutants.
