description: >-
  coq7 encodes a diiron 3-demethoxyubiquinol 3-hydroxylase that performs a late
  aromatic-ring hydroxylation during ubiquinone biosynthesis. The enzyme is a
  peripheral membrane protein associated with the bacterial cell membrane.
