    - reference_id: file:PSEPK/glcF/glcF-goa.tsv
      supporting_text: "UniProtKB\tQ88GH6\tglcF\tenables\tGO:0051539\t4 iron, 4 sulfur cluster binding"
- term:
    id: GO:0047809
    label: D-lactate dehydrogenase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000116
  qualifier: enables
  review:
    summary: The Rhea-derived D-lactate activity may reflect family chemistry, but glycolate oxidation is the pathway-relevant activity for this GlcF subunit.
    action: KEEP_AS_NON_CORE
    reason: UniProt lists both an R-lactate reaction and the glycolate-to-glyoxylate reaction; this review treats glycolate dehydrogenase as the core function in KT2440 ppu00630.
    supported_by:
    - reference_id: file:PSEPK/glcF/glcF-uniprot.txt
      supporting_text: "CC       Reaction=(R)-lactate + A = pyruvate + AH2; Xref=Rhea:RHEA:15089,"
