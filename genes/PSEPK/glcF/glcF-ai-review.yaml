id: Q88GH6
gene_symbol: glcF
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: >-
  glcF encodes the iron-sulfur electron-transfer subunit of the predicted KT2440
  GlcDEF glycolate dehydrogenase complex. It contributes to glycolate oxidation
  to glyoxylate through an Fe-S redox role and should not be interpreted as an
  independent glycolate-pathway enzyme outside the complex context.
existing_annotations:
