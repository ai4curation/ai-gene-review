  review:
    summary: GlcF is predicted to participate in glyoxylate metabolism as the iron-sulfur electron-transfer subunit of the GlcDEF glycolate dehydrogenase system.
    action: NEW
    reason: UniProt explicitly describes GlcF as part of the complex that oxidizes glycolate to glyoxylate, and GOA carries the glycolate dehydrogenase activity term.
