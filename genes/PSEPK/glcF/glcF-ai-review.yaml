      supporting_text: "UniProtKB\tQ88GH6\tglcF\tenables\tGO:0019154\tglycolate dehydrogenase activity"
    - reference_id: file:PSEPK/glcF/glcF-deep-research-openscientist.md
      supporting_text: "The holoenzyme catalyzes the two-electron oxidation of **glycolate to glyoxylate**."
- term:
    id: GO:0046872
    label: metal ion binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000104
  qualifier: enables
  review:
    summary: Metal ion binding is a broad parent of the more informative iron-sulfur cluster annotations.
    action: MARK_AS_OVER_ANNOTATED
    reason: The 4Fe-4S cluster binding annotation captures the relevant metal cofactor.
