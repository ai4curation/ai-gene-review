    id: GO:0016491
    label: oxidoreductase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000117
  qualifier: enables
  review:
    summary: The broad oxidoreductase term is compatible but less informative than the specific GlcDEF complex activity and Fe-S role.
    action: MARK_AS_OVER_ANNOTATED
    reason: Glycolate dehydrogenase contribution and 4Fe-4S cluster binding better capture GlcF function.
    supported_by:
    - reference_id: file:PSEPK/glcF/glcF-goa.tsv
      supporting_text: "UniProtKB\tQ88GH6\tglcF\tenables\tGO:0019154\tglycolate dehydrogenase activity"
- term:
