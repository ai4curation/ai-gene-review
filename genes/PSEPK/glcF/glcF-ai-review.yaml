  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: GlcF contributes to the GlcDEF glycolate dehydrogenase complex.
    action: ACCEPT
    reason: UniProt states that GlcF is a component of a complex oxidizing glycolate to glyoxylate and GOA carries the EC/Rhea-supported glycolate dehydrogenase term.
    supported_by:
    - reference_id: file:PSEPK/glcF/glcF-uniprot.txt
      supporting_text: "CC   -!- FUNCTION: Component of a complex that catalyzes the oxidation of"
