      supporting_text: "CC       Reaction=glycolate + A = glyoxylate + AH2; Xref=Rhea:RHEA:21264,"
    - reference_id: file:PSEPK/glcF/glcF-deep-research-openscientist.md
      supporting_text: "The substrate specificity of the associated uptake system further constrains the physiological role."
