taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: PP_4988 encodes a large CheA-family histidine kinase in the PP_4987-PP_4992 Pil/Chp-type
  signaling cluster of Pseudomonas putida KT2440. Its CheW-like, receiver, HPt, and HATPase/histidine-kinase
  domains support a local phosphorelay role that likely connects Pil/Chp sensory input to downstream twitching
  or surface-behavior regulators.
