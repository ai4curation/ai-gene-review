id: Q88NI6
gene_symbol: tolA
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: >-
  tolA encodes the TolA component of the Gram-negative Tol-Pal envelope system.
  TolA is a single-pass inner-membrane protein with periplasmic domains that
  connect the TolQ/TolR energy-coupling module to the outer-membrane and
  peptidoglycan-linked TolB/Pal arm. In Pseudomonas putida KT2440 it fills the
  missing core Tol-Pal component between TolQ/TolR and TolB/Pal. Its relevant
  pathway role is envelope coordination during cell division and maintenance of
  outer-membrane integrity; nucleosome, chromatin, and DNA-binding annotations
  are erroneous electronic spillovers from an H1/H5-like InterPro signature.
existing_annotations:
- term:
    id: GO:0000786
    label: nucleosome
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: part_of
  review:
    summary: Incorrect electronic annotation. TolA is a bacterial Tol-Pal
      envelope protein, not a nucleosome component; this appears to be a
      spillover from the H1/H5-like InterPro signature.
    action: REMOVE
- term:
    id: GO:0003677
    label: DNA binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: Incorrect electronic annotation for this protein. The DNA-binding
      call follows the same H1/H5-like signature that also produced chromatin
      and nucleosome annotations, but TolA's supported role is membrane-envelope
      coordination.
    action: REMOVE
- term:
    id: GO:0006334
    label: nucleosome assembly
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: involved_in
  review:
    summary: Incorrect electronic annotation. Bacterial TolA does not assemble
      nucleosomes; this is a chromatin-signature spillover and should be
      removed.
    action: REMOVE
- term:
    id: GO:0016020
    label: membrane
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: located_in
  review:
    summary: Correct cellular component. TolA is a single-pass membrane protein
      in the Tol-Pal envelope system.
    action: ACCEPT
- term:
    id: GO:0019534
    label: toxin transmembrane transporter activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: Plausible side-context molecular function. TolA-family proteins
      can participate in colicin or filamentous phage uptake, but this is not
      the core Tol-Pal envelope-maintenance role curated for KT2440 here.
    action: KEEP_AS_NON_CORE
- term:
    id: GO:0030527
    label: structural constituent of chromatin
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: Incorrect electronic annotation. TolA is not a chromatin
      constituent; this is the same H1/H5-like InterPro over-propagation that
      produced nucleosome and DNA-binding annotations.
    action: REMOVE
- term:
    id: GO:0043213
    label: bacteriocin transport
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: involved_in
  review:
    summary: Plausible side-context biological process. Bacteriocin transport
      is consistent with TolA-family colicin uptake roles, but the core KT2440
      module role is Tol-Pal envelope coordination during cell division.
    action: KEEP_AS_NON_CORE
- term:
    id: GO:0055085
    label: transmembrane transport
  evidence_type: IEA
  original_reference_id: GO_REF:0000108
  qualifier: involved_in
  review:
    summary: Correct but non-core parent process inferred from toxin transport.
      It should not be treated as TolA's primary pathway role in this
      envelope-division module.
    action: KEEP_AS_NON_CORE
- term:
    id: GO:0051301
    label: cell division
  evidence_type: ISS
  qualifier: involved_in
  review:
    summary: New process annotation for the promoted Tol-Pal hole-filling gene.
      TolA is a core Tol-Pal system component connecting TolQ/TolR with the
      TolB/Pal envelope arm, and the Tol-Pal system supports outer-membrane
      invagination during cell division.
    action: NEW
core_functions:
- description: Membrane Tol-Pal connector component that links TolQ/TolR energy coupling to the periplasmic and outer-membrane TolB/Pal arm during envelope invagination in cell division.
