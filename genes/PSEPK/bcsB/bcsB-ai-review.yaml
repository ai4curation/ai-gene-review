  title: Crystallographic snapshot of cellulose synthesis and membrane translocation.
  findings:
  - statement: The Rhodobacter BcsA-B structure establishes BcsB as a periplasmic, inner-membrane-anchored partner of the catalytic BcsA subunit.
    supporting_text: "BcsB is a periplasmic protein that is anchored to the inner membrane via a single, C-terminal TM-helix."
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: PMC-cached primary structural paper supporting the BcsA/BcsB division of labor.
- id: PMID:24704788
  title: Mechanism of activation of bacterial cellulose synthase by cyclic di-GMP.
  findings:
  - statement: The c-di-GMP activation mechanism maps the direct PilZ-domain switch to BcsA rather than requiring a new BcsB cyclic-di-GMP-binding annotation.
    supporting_text: "BcsA forms a PilZ domain within its C-terminal intracellular extension"
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: PMC-cached primary structural paper; supports c-di-GMP regulation of the BcsA/BcsB complex and cautions against assigning the direct binding step to BcsB here.
- id: file:PSEPK/bcsB/bcsB-deep-research-openscientist.md
  title: OpenScientist gene research for bcsB
  findings:
  - statement: OpenScientist identifies Q88JL3 as the membrane-anchored periplasmic BcsB accessory subunit and notes that BcsB is non-catalytic while the primary c-di-GMP sensor is BcsA.
    supporting_text: "The primary c-di-GMP sensor is the PilZ domain of BcsA, but BcsB is an integral member of the regulated complex"
