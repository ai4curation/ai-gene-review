      supporting_text: "GO:0006011\tUDP-alpha-D-glucose metabolic process"
- term:
    id: GO:0016020
    label: membrane
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: located_in
  review:
    summary: Membrane is correct but less specific than the bacterial plasma membrane assignment already present.
    action: MODIFY
    reason: BcsB is specifically assigned to the cell inner membrane, so GO:0005886 is the preferred location term.
    proposed_replacement_terms:
    - id: GO:0005886
      label: plasma membrane
    supported_by:
    - reference_id: file:PSEPK/bcsB/bcsB-uniprot.txt
      supporting_text: "SUBCELLULAR LOCATION: Cell inner membrane"
    - reference_id: file:PSEPK/bcsB/bcsB-goa.tsv
      supporting_text: "GO:0016020\tmembrane"
