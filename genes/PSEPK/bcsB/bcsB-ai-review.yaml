suggested_questions:
- question: Does KT2440 BcsB directly bind c-di-GMP, or is its regulatory role indirect through BcsA and local c-di-GMP-metabolism partners?
- question: Which local bcs-locus accessory proteins are required for BcsB-dependent cellulose synthesis and export?
suggested_experiments:
- description: Reconstitute KT2440 BcsA/BcsB membrane complexes and test whether BcsB variants affect cellulose synthase activity or BcsA PilZ-dependent c-di-GMP activation.
  experiment_type: in vitro regulatory and complex-assembly assay
- description: Compare cellulose production and biofilm matrix phenotypes in wild-type, bcsB deletion, and bcsB complementation strains.
  experiment_type: targeted genetics and biofilm polysaccharide assay
