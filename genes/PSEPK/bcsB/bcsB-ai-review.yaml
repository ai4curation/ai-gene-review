id: Q88JL3
gene_symbol: bcsB
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: bcsB encodes a single-pass inner-membrane/periplasmic BcsB-family accessory subunit of the bacterial cellulose synthase complex. It associates with the BcsA catalytic subunit and helps organize the periplasmic path for nascent cellulose during c-di-GMP-controlled cellulose biosynthesis.
existing_annotations:
- term:
    id: GO:0005886
    label: plasma membrane
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: located_in
  review:
    summary: Plasma membrane is the appropriate bacterial inner-membrane location for BcsB.
    action: ACCEPT
    reason: UniProt places BcsB in the cell inner membrane as a single-pass membrane protein.
    supported_by:
    - reference_id: file:PSEPK/bcsB/bcsB-uniprot.txt
      supporting_text: "SUBCELLULAR LOCATION: Cell inner membrane"
    - reference_id: file:PSEPK/bcsB/bcsB-goa.tsv
      supporting_text: "GO:0005886\tplasma membrane"
- term:
    id: GO:0006011
    label: UDP-alpha-D-glucose metabolic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: involved_in
  review:
    summary: UDP-alpha-D-glucose metabolism is an over-broad donor-substrate process for BcsB.
    action: MODIFY
    reason: BcsB is a cellulose synthase regulatory subunit in bacterial cellulose biosynthesis; the broad UDP-glucose metabolic-process term should be replaced by the pathway process.
    proposed_replacement_terms:
    - id: GO:0030244
      label: cellulose biosynthetic process
    supported_by:
    - reference_id: file:PSEPK/bcsB/bcsB-uniprot.txt
      supporting_text: "PATHWAY: Glycan metabolism; bacterial cellulose biosynthesis."
