description: PP_4379 is a predicted beta-ketoacyl-acyl carrier protein synthase III/FabH-like enzyme of Pseudomonas putida KT2440. Its EC and PANTHER placement support initiation-type KAS III acyl-ACP condensation chemistry in fatty acid biosynthesis, while related Pseudomonas evidence indicates that FabH-like essentiality should not be assumed because FabB may also support initiation.
