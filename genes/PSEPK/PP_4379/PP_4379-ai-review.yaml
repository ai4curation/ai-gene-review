id: Q88ES4
gene_symbol: PP_4379
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: >-
  PP_4379, named FabH1 in the experimental literature, is a
  beta-ketoacyl-ACP synthase III that initiates type-II fatty-acid synthesis
  with short-chain acyl-CoA primers in Pseudomonas putida KT2440. Its direct
  pathway role, KAS-III domains, and EC-derived activity resolve the
  inconsistent submitted KAS-I product name.
