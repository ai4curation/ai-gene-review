    label: secondary metabolite biosynthetic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000118
  qualifier: involved_in
  review:
    summary: Broad family-level process transfer unsupported as a core target role.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      The TreeGrafter term does not identify a specific secondary-metabolite
      pathway for PP_4379. Direct KT2440 evidence instead establishes a core
      fatty-acid chain-initiation role. Because its acyl products could feed
      specialized metabolites, the broad process is treated as over-annotated
      rather than definitively false.
