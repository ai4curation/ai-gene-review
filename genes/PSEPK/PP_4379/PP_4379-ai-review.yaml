suggested_questions:
- question: >-
    Under which growth conditions does FabH1 dominate over FabH2 and MadB as
    the physiological initiation route?
suggested_experiments:
- description: >-
    Quantify acyl-ACP pools and fatty-acid products in fabH1, fabH2, and madB
    single and combinatorial mutants across defined carbon sources.
