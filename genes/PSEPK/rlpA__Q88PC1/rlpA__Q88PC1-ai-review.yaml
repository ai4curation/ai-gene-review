  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: rlpA (PP_0929; UniProt Q88PC1) encodes one of two KT2440 RlpA-family endolytic peptidoglycan transglycosylase
  paralogs. The protein is a predicted membrane lipoprotein with an RlpA-like DPBB domain and is inferred to cleave peptidoglycan
  glycan strands as part of cell-wall remodeling.
