suggested_questions:
- question: What is the precise division of phosphoryl-transfer roles between FruA and the adjacent PTS components during fructose uptake in KT2440?
suggested_experiments:
- description: Measure fructose uptake and fructose-1-phosphate accumulation in wild type, fruA deletion, and complemented strains.
  experiment_type: transport phenotype and metabolomics
- description: Test growth on fructose versus non-PTS carbon sources in fruA and fruK single mutants.
  experiment_type: growth phenotype
