id: Q88PQ3
gene_symbol: fruA
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: >-
  FruA is the inner-membrane fructose-specific phosphotransferase-system
  component of Pseudomonas putida KT2440. It couples D-fructose import to
  phosphorylation, producing intracellular fructose 1-phosphate as the entry
  substrate for FruK.
existing_annotations:
- term:
    id: GO:0005351
    label: carbohydrate:proton symporter activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: This symporter term is not the best mechanistic description for a fructose PTS permease.
    action: REMOVE
    reason: UniProt describes phosphohistidine-dependent fructose phosphotransfer rather than proton symport; GO:0022877 captures the PTS transporter activity more directly.
    supported_by:
    - reference_id: file:PSEPK/fruA/fruA-uniprot.txt
      supporting_text: 'DE   RecName: Full=protein-N(pi)-phosphohistidine--D-fructose phosphotransferase {ECO:0000256|ARBA:ARBA00012799};'
- term:
    id: GO:0005886
    label: plasma membrane
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: located_in
  review:
    summary: FruA is an inner-membrane multipass PTS component.
    action: ACCEPT
    reason: The UniProt subcellular-location statement and transmembrane features support plasma/inner-membrane localization.
    supported_by:
    - reference_id: file:PSEPK/fruA/fruA-uniprot.txt
      supporting_text: 'CC   -!- SUBCELLULAR LOCATION: Cell inner membrane'
    - reference_id: file:PSEPK/fruA/fruA-uniprot.txt
      supporting_text: 'DR   GO; GO:0005886; C:plasma membrane; IEA:UniProtKB-SubCell.'
- term:
    id: GO:0008982
    label: protein-N(PI)-phosphohistidine-carbohydrate phosphotransferase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: This broad PTS carbohydrate phosphotransferase activity is compatible with FruA.
    action: ACCEPT
    reason: FruA carries the EIIB/EIIC PTS domains and UniProt gives the phosphohistidine-dependent fructose phosphotransfer reaction.
    supported_by:
    - reference_id: file:PSEPK/fruA/fruA-uniprot.txt
      supporting_text: 'CC       fructose 1-phosphate(in) + L-histidyl-[protein];'
- term:
    id: GO:0009401
    label: phosphoenolpyruvate-dependent sugar phosphotransferase system
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: involved_in
  review:
    summary: FruA is part of the fructose-specific PTS branch.
    action: ACCEPT
    reason: The protein name, PTS domains, keyword, and GO cross-reference all support involvement in the PTS.
    supported_by:
    - reference_id: file:PSEPK/fruA/fruA-uniprot.txt
      supporting_text: 'KW   Phosphotransferase system {ECO:0000256|ARBA:ARBA00022683};'
    - reference_id: file:PSEPK/fruA/fruA-uniprot.txt
      supporting_text: 'DR   GO; GO:0009401; P:phosphoenolpyruvate-dependent sugar phosphotransferase system; IEA:UniProtKB-KW.'
- term:
    id: GO:0015755
    label: fructose transmembrane transport
  evidence_type: IEA
  original_reference_id: GO_REF:0000108
  qualifier: involved_in
  review:
    summary: Fructose transport is correct for the substrate-specific PTS component.
    action: ACCEPT
    reason: UniProt gives a D-fructose(out) to fructose 1-phosphate(in) reaction, directly supporting fructose transmembrane uptake.
    supported_by:
    - reference_id: file:PSEPK/fruA/fruA-uniprot.txt
      supporting_text: 'CC       Reaction=D-fructose(out) + N(pros)-phospho-L-histidyl-[protein] = D-'
- term:
    id: GO:0016020
    label: membrane
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: located_in
  review:
    summary: Membrane is true but less specific than the plasma-membrane annotation.
    action: KEEP_AS_NON_CORE
    reason: The term is retained as a broad location parent, while GO:0005886 is the better location for core function.
- term:
    id: GO:0022877
    label: protein-N(PI)-phosphohistidine-fructose phosphotransferase system transporter activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: This is the best available molecular-function term for FruA.
    action: ACCEPT
    reason: The term matches the substrate-specific PTS transporter activity and is supported by InterPro and the UniProt catalytic reaction.
    supported_by:
    - reference_id: file:PSEPK/fruA/fruA-uniprot.txt
      supporting_text: 'DR   GO; GO:0022877; F:protein-N(PI)-phosphohistidine-fructose phosphotransferase system transporter activity; IEA:InterPro.'
- term:
    id: GO:0051119
    label: sugar transmembrane transporter activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000104
  qualifier: enables
  review:
    summary: Sugar transporter activity is directionally correct but too broad for FruA.
    action: MARK_AS_OVER_ANNOTATED
    reason: FruA should be represented by the fructose-specific PTS transporter term rather than this general transporter parent.
- term:
    id: GO:0090563
    label: protein-phosphocysteine-sugar phosphotransferase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000118
  qualifier: enables
  review:
    summary: This captures PTS phosphocarrier chemistry inferred for this EIIB/EIIC protein.
    action: KEEP_AS_NON_CORE
    reason: The term is compatible with the PTS domain architecture but less directly substrate-resolved than GO:0022877.
    supported_by:
    - reference_id: file:PSEPK/fruA/fruA-uniprot.txt
      supporting_text: 'DR   GO; GO:0090563; F:protein-phosphocysteine-sugar phosphotransferase activity; IEA:TreeGrafter.'
- term:
    id: GO:1902600
    label: proton transmembrane transport
  evidence_type: IEA
  original_reference_id: GO_REF:0000108
  qualifier: involved_in
  review:
    summary: Proton transport is an inference from the broad symporter annotation and is not supported by the PTS reaction.
    action: REMOVE
    reason: FruA is a phosphotransferase-system transporter that uses phosphoryl transfer, not a proton symporter mechanism.
    supported_by:
    - reference_id: file:PSEPK/fruA/fruA-uniprot.txt
      supporting_text: 'CC       fructose 1-phosphate(in) + L-histidyl-[protein];'
references:
