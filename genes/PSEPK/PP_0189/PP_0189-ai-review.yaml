    label: heme metabolic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: involved_in
  review:
    summary: Heme metabolism is correct but too broad for PP_0189's protoheme-biosynthesis context.
    action: MODIFY
    reason: UniProt places PP_0189 in a late step of protoheme IX synthesis and in protoheme biosynthesis, so GO:0006783 heme biosynthetic process is the better process term.
    proposed_replacement_terms:
