  qualifier: located_in
  review:
    summary: Plasma membrane is appropriate for the bacterial inner-membrane PP_0189 protein.
    action: ACCEPT
    reason: UniProt assigns PP_0189 to the cell inner membrane as a multi-pass membrane protein, which is the bacterial plasma membrane context.
    supported_by:
