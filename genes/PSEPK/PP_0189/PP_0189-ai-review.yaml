  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: PP_0189 encodes an inner-membrane HemY_N/TPR-associated heme biosynthesis protein. UniProt places it in a late step of protoheme IX synthesis, making it a membrane-associated heme-biosynthesis support factor in the porphyrin/tetrapyrrole module rather than a standalone enzyme with a resolved molecular function.
