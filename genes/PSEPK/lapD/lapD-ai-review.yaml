id: Q88RG5
gene_symbol: lapD
product_type: PROTEIN
aliases:
- PP_0165
- c-di-GMP receptor LapD
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: LapD (PP_0165; UniProt Q88RG5) is an inner-membrane c-di-GMP receptor
  with a LapD/MoxY periplasmic output domain, HAMP relay, and degenerate GGDEF/EAL
  signaling module. In Pseudomonas putida KT2440, LapD couples c-di-GMP sensing to
  sequestration of the periplasmic protease LapG, stabilizing the surface adhesin
  LapA and promoting surface attachment and biofilm formation. Recent work in KT2440
  further shows that the phosphodiesterase DibA interacts with LapD at the membrane
  and tunes this LapD-centered biofilm control circuit.
existing_annotations:
- term:
    id: GO:0007165
    label: signal transduction
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: This InterPro-derived annotation captures that LapD relays a signal across
      the membrane, but GO:0007165 is too generic to describe the specific biology.
      LapD is a c-di-GMP receptor that inhibits LapG-mediated adhesin cleavage and
      thereby promotes surface attachment and biofilm formation.
    action: MODIFY
    reason: The broad parent term "signal transduction" obscures the actual process
      controlled by LapD. A more informative representation is regulation of LapG-dependent
      proteolysis and positive regulation of adhesive/biofilm states driven by LapA
      retention at the cell surface.
    proposed_replacement_terms:
    - id: GO:0045861
      label: negative regulation of proteolysis
    - id: GO:1900189
      label: positive regulation of cell adhesion involved in single-species biofilm
        formation
    supported_by:
    - reference_id: file:PSEPK/lapD/lapD-notes.md
      supporting_text: In P. putida, DibA modulates the cell surface adhesin LapA
        level in a c-di-GMP receptor LapD-dependent manner and thereby inhibits biofilm
        formation.
    - reference_id: file:PSEPK/lapD/lapD-notes.md
      supporting_text: Activated LapD sequesters the periplasmic protease LapG and
        prevents cleavage of the surface adhesin LapA.
- term:
    id: GO:0016020
    label: membrane
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: Membrane localization is correct and central to LapD function. LapD is
      a single-pass inner-membrane receptor whose transmembrane anchor is required
      to couple cytoplasmic c-di-GMP sensing to periplasmic control of LapG.
    action: ACCEPT
    reason: Although generic, the term is accurate. LapD is unequivocally membrane
      associated, and membrane anchoring is essential for its inside-out signaling
      mechanism.
    supported_by:
    - reference_id: file:PSEPK/lapD/lapD-uniprot.txt
      supporting_text: FT   TRANSMEM        152..170
    - reference_id: file:PSEPK/lapD/lapD-notes.md
      supporting_text: LapD is a membrane c-di-GMP receptor whose cytoplasmic ligand
        binding is coupled to periplasmic control of LapG.
