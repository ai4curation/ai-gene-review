taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: PP_1494 encodes a receiver-domain GGDEF diguanylate cyclase in the PP_1488-PP_1494 Wsp-like
  surface-sensing cluster. It likely converts local Che-like signaling into c-di-GMP production that promotes
  biofilm-associated adhesion and reduces flagellar motility, although direct substrates and regulatory
  inputs remain unresolved.
