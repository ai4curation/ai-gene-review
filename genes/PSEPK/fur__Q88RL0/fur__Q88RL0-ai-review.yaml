description: fur__Q88RL0 (PP_0119) encodes a Fur-family ferric uptake regulation protein in Pseudomonas putida KT2440. It is a predicted cytoplasmic DNA-binding transcriptional regulator with FUR and winged-helix DNA-binding domains, supporting iron-responsive repression/regulation rather than direct quorum-signal synthesis or reception.
