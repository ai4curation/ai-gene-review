      a tryptophan auxotroph rescued by tryptophan or indole but not anthranilate,
      consistent with loss of PRAI activity acting downstream of anthranilate and upstream
      of indole.
  directly_involved_in:
    id: GO:0000162
    label: L-tryptophan biosynthetic process
