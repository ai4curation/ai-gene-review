id: Q88LE0
gene_symbol: trpF
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: trpF encodes N-(5'-phosphoribosyl)anthranilate isomerase (PRAI, EC 5.3.1.24),
  a cytoplasmic monomeric TIM-barrel ((beta/alpha)8) enzyme that catalyzes the third
  step of L-tryptophan biosynthesis from chorismate. It converts N-(5-phospho-beta-D-ribosyl)anthranilate
  (PRA) into 1-(2-carboxyphenylamino)-1-deoxy-D-ribulose 5-phosphate (CdRP) via an
  Amadori rearrangement that opens the ribose ring. This intermediate is subsequently
  used by TrpC (indole-3-glycerol-phosphate synthase) and tryptophan synthase (TrpAB)
  to complete tryptophan biosynthesis. In Pseudomonas putida KT2440 the gene (locus
  PP_1995) is unlinked to the other trp clusters and is most likely monocistronic;
  a targeted chromosomal knockout produces a tryptophan auxotroph that is rescued by
  tryptophan or indole but not by anthranilate, placing the enzyme downstream of anthranilate
  and upstream of indole as expected for PRAI.
existing_annotations:
- term:
    id: GO:0000162
    label: L-tryptophan biosynthetic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: involved_in
  review:
    summary: Correct and core. PRAI catalyzes step 3 of 5 in tryptophan biosynthesis
      from chorismate, and the KT2440 trpF knockout is a tryptophan auxotroph, directly
      confirming a required role in this process.
    action: ACCEPT
    reason: The biological process is supported both by family/pathway assignment (UniPathway
      UPA00035) and by experimental auxotrophy/complementation evidence in KT2440 (PMID:21261884).
- term:
    id: GO:0004640
    label: phosphoribosylanthranilate isomerase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: Correct core molecular function. This is the precise EC 5.3.1.24 activity
      (RHEA:21540) defining the TrpF family, consistent with the HAMAP rule, InterPro
      TrpF family (IPR044643) and PRAI domain (IPR001240), and the conserved TIM-barrel
      active site.
    action: ACCEPT
    reason: Directly matches the curated catalytic activity in UniProt and the protein's
      family/domain assignment; this is the defining function of the gene product.
- term:
    id: GO:0046394
    label: carboxylic acid biosynthetic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000117
  qualifier: involved_in
  review:
    summary: Not wrong but uninformative and over-general. Tryptophan is a carboxylic
      acid, so this high-level ARBA-derived term is technically true but adds nothing
      beyond the more specific GO:0000162 (L-tryptophan biosynthetic process), which
      is already annotated.
    action: MARK_AS_OVER_ANNOTATED
    reason: Generic parent term auto-generated from sequence features; the specific
      L-tryptophan biosynthetic process annotation already captures the biology precisely.
