    to 1-(2-carboxyphenylamino)-1-deoxy-D-ribulose 5-phosphate (CdRP), the third step
    of L-tryptophan biosynthesis.
  molecular_function:
    id: GO:0004640
    label: phosphoribosylanthranilate isomerase activity
  supported_by:
