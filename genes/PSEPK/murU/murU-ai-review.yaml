  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: murU encodes N-acetylmuramate alpha-1-phosphate uridylyltransferase, an enzyme
  in the P. putida KT2440 peptidoglycan recycling shortcut. It converts MurNAc-alpha-1-phosphate
  and UTP to UDP-MurNAc, supplying a cell-wall precursor through a recycling route that bypasses
  de novo UDP-MurNAc biosynthesis and contributes to intrinsic fosfomycin resistance.
