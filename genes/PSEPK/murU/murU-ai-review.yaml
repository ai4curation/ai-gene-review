  title: A cell wall recycling shortcut that bypasses peptidoglycan de novo biosynthesis.
  findings:
  - statement: A cell-wall recycling shortcut in P. putida uses AmgK and MurU to channel external
      MurNAc into peptidoglycan biosynthesis.
