- description: MurU catalyzes UTP-dependent formation of UDP-MurNAc from MurNAc-alpha-1-phosphate
    in a peptidoglycan recycling shortcut, supplying a cell-wall precursor and contributing
    to bypass of de novo UDP-MurNAc biosynthesis.
