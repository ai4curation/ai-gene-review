suggested_questions:
- question: Is PP_1778-PP_1779 an LPS exporter, a capsule/O-antigen/polysaccharide exporter, or another Wzt/KpsT-like envelope-glycoconjugate exporter distinct from canonical LptBFG/MsbA?
suggested_experiments:
- description: Compare LPS, O-antigen/capsular polysaccharide profiles, cell-envelope permeability, and surface-polysaccharide phenotypes in PP_1778 and PP_1779 deletion or depletion mutants.
  experiment_type: envelope polysaccharide/LPS export phenotype assay
- description: Reconstitute PP_1778-PP_1779 or assay membrane vesicles with candidate LPS-core, O-antigen, capsule, or polysialic-acid-like substrates to resolve transporter specificity.
  experiment_type: ABC transporter substrate-specificity assay
