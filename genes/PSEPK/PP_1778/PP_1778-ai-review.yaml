  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: PP_1778 encodes a predicted multi-pass inner-membrane ABC-2 permease component of a PP_1778-PP_1779 envelope polysaccharide/LPS ABC export candidate. Its ABC-2 transport domain, CtrC/capsule-polysaccharide-export PANTHER subfamily assignment, inner-membrane localization, and GOA lipopolysaccharide-transport annotation support a role in envelope glycoconjugate export, with exact substrate specificity still unresolved.
