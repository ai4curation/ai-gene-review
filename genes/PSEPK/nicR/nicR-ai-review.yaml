    label: negative regulation of DNA-templated transcription
  supported_by:
  - reference_id: file:PSEPK/nicR/nicR-uniprot.txt
    supporting_text: Transcriptional repressor for the nicCDEFTP and nicXR
  - reference_id: file:PSEPK/nicR/nicR-uniprot.txt
    supporting_text: repression of the nicCDEFTP and
  - reference_id: file:PSEPK/nicR/nicR-uniprot.txt
    supporting_text: In presence of 6HNA, repression is alleviated.
proposed_new_terms: []
suggested_questions:
- question: Are there condition-specific substrates, partners, or regulatory contexts for
    nicR that would justify narrower GO annotations than the conservative terms retained here?
  experts:
  - Pseudomonas putida functional-genomics and pathway experts
suggested_experiments:
- description: Generate a clean nicR deletion or CRISPRi depletion strain and assay the predicted
    pathway or molecular activity under the growth condition most directly tied to the retained
    core function.
