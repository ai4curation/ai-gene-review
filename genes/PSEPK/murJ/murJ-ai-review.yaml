description: 'murJ encodes the probable lipid II flippase of Pseudomonas putida KT2440. It is a multi-pass inner-membrane MurJ/MviN-family transporter that moves lipid-linked peptidoglycan precursors from the inner to the outer leaflet of the cytoplasmic membrane during peptidoglycan biosynthesis.'
