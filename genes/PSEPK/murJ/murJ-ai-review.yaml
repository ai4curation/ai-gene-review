taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: >-
  MurJ is the multispanning inner-membrane lipid II flippase of Pseudomonas
  putida KT2440. It transports lipid-linked peptidoglycan precursors from the
  cytoplasmic to the periplasmic leaflet, making lipid II available to the
  extracellular-facing peptidoglycan polymerization machinery.
