taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: PP_2074 encodes a predicted LysR-family DNA-binding transcriptional regulator in Pseudomonas
  putida KT2440. The conserved N-terminal helix-turn-helix DNA-binding domain and C-terminal LysR substrate-binding
  domain support regulation of DNA-templated transcription, while the target regulon, regulatory direction,
  and effector ligand are unresolved.
