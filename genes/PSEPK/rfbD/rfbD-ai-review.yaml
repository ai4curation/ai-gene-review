id: Q88LZ2
gene_symbol: rfbD
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: >-
  rfbD (PP_1784) encodes a cytosolic dTDP-4-dehydrorhamnose reductase in the
  Pseudomonas putida KT2440 rfbC-rfbA-rfbD-rffG sugar-nucleotide cluster. It
  catalyzes the final NADPH-dependent reduction of the epimerase product to
  dTDP-beta-L-rhamnose, completing the soluble dTDP-L-rhamnose biosynthetic
  pathway used by downstream glycan assembly pathways.
