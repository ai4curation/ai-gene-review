id: Q88FT1
gene_symbol: fluC
product_type: PROTEIN
aliases:
- crcB
- PP_4001
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: fluC (synonym crcB; locus PP_4001) encodes a 124 aa fluoride-specific
  inner-membrane ion channel of the Fluc/FEX family. Family-level structural work
  shows that Fluc proteins form dual-topology, double-barrelled channels specialized
  for fluoride export. In Pseudomonas putida KT2440, loss of this exporter causes
  fluoride hypersensitivity and intracellular fluoride accumulation, consistent with
  a primary role in fluoride efflux and cellular detoxification.
existing_annotations:
- term:
    id: GO:0062054
    label: fluoride channel activity
  qualifier: enables
  evidence_type: IEA
  original_reference_id: GO_REF:0000104
  review:
    summary: This is the most precise molecular-function annotation for FluC. Fluc/CrcB
      family proteins are bona fide fluoride-specific ion channels, and UniProt annotates
      Q88FT1 specifically as a fluoride-specific ion channel.
    action: ACCEPT
    reason: The term matches both family-level structural/functional work and the
      curated UniProt assignment. It captures the core evolved molecular activity
      more precisely than the broader transporter term.
    supported_by:
    - reference_id: file:PSEPK/crcB/crcB-notes.md
      supporting_text: Family-level studies established Fluc/CrcB proteins as fluoride-specific
        ion channels with dual-topology architecture and a double-barrelled channel
        assembly.
    - reference_id: UniProt:Q88FT1
      supporting_text: Fluoride-specific ion channel. Important for reducing fluoride
        concentration in the cell, thus reducing its toxicity.
- term:
    id: GO:1903425
    label: fluoride transmembrane transporter activity
  qualifier: enables
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  review:
    summary: This annotation is directionally correct, but it is broader than the
      more specific channel term already present for the same protein.
    action: MARK_AS_OVER_ANNOTATED
    reason: FluC is best described as a fluoride channel rather than by the parent-level
      transporter term. Retaining both molecular-function terms adds redundancy without
      increasing mechanistic precision.
    supported_by:
    - reference_id: file:PSEPK/crcB/crcB-notes.md
      supporting_text: Family-level studies established Fluc/CrcB proteins as fluoride-specific
        ion channels with dual-topology architecture and a double-barrelled channel
        assembly.
- term:
    id: GO:0140114
    label: cellular detoxification of fluoride
  qualifier: involved_in
  evidence_type: IEA
  original_reference_id: GO_REF:0000104
  review:
    summary: This is a core biological-process annotation. FluC lowers intracellular
      fluoride burden by exporting fluoride, and loss of the transporter in P. putida
      causes intracellular fluoride accumulation and fluoride stress phenotypes.
    action: ACCEPT
    reason: Detoxification is the key physiological consequence of FluC-mediated fluoride
      export. The organism-specific P. putida study directly supports this interpretation.
    supported_by:
    - reference_id: file:PSEPK/crcB/crcB-notes.md
      supporting_text: In P. putida KT2440, loss of CrcB/FluC causes marked fluoride
        sensitivity and intracellular fluoride accumulation, supporting a primary
        role in fluoride export and detoxification.
    - reference_id: UniProt:Q88FT1
      supporting_text: Important for reducing fluoride concentration in the cell,
        thus reducing its toxicity.
- term:
    id: GO:1903424
    label: fluoride transmembrane transport
  qualifier: involved_in
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  review:
    summary: This is the direct transport process carried out by FluC and should be
      retained as a core process annotation.
    action: ACCEPT
    reason: UniProt explicitly annotates the physiological reaction as fluoride(in)
      to fluoride(out), and the P. putida knockout phenotype is consistent with fluoride
      export across the membrane.
    supported_by:
    - reference_id: UniProt:Q88FT1
      supporting_text: Reaction=fluoride(in) = fluoride(out)
    - reference_id: file:PSEPK/crcB/crcB-notes.md
      supporting_text: In P. putida KT2440, loss of CrcB/FluC causes marked fluoride
        sensitivity and intracellular fluoride accumulation, supporting a primary
        role in fluoride export and detoxification.
- term:
    id: GO:0005886
    label: plasma membrane
  qualifier: located_in
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  review:
    summary: Plasma membrane is the appropriate specific cellular-component annotation
      for this bacterial inner-membrane channel.
    action: ACCEPT
    reason: UniProt places Q88FT1 in the cell inner membrane as a multi-pass membrane
      protein. In bacterial GO curation, this maps appropriately to plasma membrane.
    supported_by:
    - reference_id: UniProt:Q88FT1
      supporting_text: "Cell inner membrane; Cell membrane"
    - reference_id: file:PSEPK/crcB/crcB-notes.md
      supporting_text: FluC is a small multi-pass inner membrane protein with four
        predicted transmembrane helices.
- term:
    id: GO:0016020
    label: membrane
  qualifier: located_in
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: The annotation is not wrong, but it is too general relative to the more
      informative plasma-membrane localization.
    action: MARK_AS_OVER_ANNOTATED
    reason: GO:0005886 captures the relevant localization with the needed specificity.
      The generic membrane term adds little value once plasma membrane is retained.
    supported_by:
    - reference_id: UniProt:Q88FT1
      supporting_text: "Cell inner membrane; Cell membrane"
