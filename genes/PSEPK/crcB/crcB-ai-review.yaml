suggested_questions:
- question: Is fluC expression in P. putida KT2440 controlled directly by a fluoride-responsive
    riboswitch or by additional transcriptional regulators?
- question: Is FluC the sole physiologically relevant fluoride exporter in KT2440,
    or are additional fluoride-resistance systems engaged at high fluoride load?
- question: How strongly does structural Na+ occupancy modulate FluC activity under
    different environmental ionic conditions in vivo?
suggested_experiments:
- description: Quantify intracellular fluoride in wild type, delta-fluC/crcB, and
    complemented strains during NaF challenge.
  hypothesis: FluC is the dominant fluoride exporter in KT2440, so deletion will increase
    intracellular fluoride and complementation will restore export.
- description: Reconstitute purified P. putida FluC in proteoliposomes or use electrophysiology
    to test fluoride-selective channel activity and Na+-dependence.
  hypothesis: P. putida FluC behaves as a fluoride-selective channel whose activity
    requires structural Na+ but does not transport Na+.
- description: Build promoter or 5' UTR reporters for fluC and test induction by fluoride
    exposure.
  hypothesis: fluC expression is part of a dedicated fluoride-response regulatory
    module in KT2440.
