suggested_questions:
- question: What structural features of PedE at position 295 (Ser vs Asp in PedH)
    determine selective binding of Ca2+ over lanthanide ions?
- question: Does PedE have any residual activity with lanthanides or is it strictly
    Ca2+-dependent?
- question: What is the physiological significance of the alternative glycerol metabolism
    route initiated by PedE?
suggested_experiments:
- description: Crystal structure determination of PedE to confirm the Ca2+ binding
    geometry and compare with lanthanide-bound PedH
- description: Site-directed mutagenesis of S295D in PedE to test whether this single
    substitution is sufficient to switch metal preference from Ca2+ to lanthanides
- description: In vivo isotope tracing to quantify flux through the PedE-initiated
    glycerol metabolic route vs the canonical glpFKRD pathway
