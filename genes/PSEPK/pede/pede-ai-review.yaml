- term:
    id: GO:0052934
    label: alcohol dehydrogenase (cytochrome c) activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  review:
    summary: Excellent and highly specific annotation that precisely describes PedE's
      core molecular function. PedE is classified as EC 1.1.2.8 (alcohol dehydrogenase,
      cytochrome c). It oxidizes a broad range of alcohols with cytochrome c550 as
      electron acceptor. Kinetic parameters are well characterized with ethanol (Vmax
      6.1 U/mg, KM 85 uM), 2-phenylethanol (KM 115 uM), and acetaldehyde (KM 899
      uM) (PMID:28655819).
    action: ACCEPT
    reason: This is the most precise and informative molecular function term for PedE.
      The EC number 1.1.2.8 maps directly to this GO term, and the enzyme has been
      biochemically characterized with purified protein, detailed kinetics, and substrate
      profiling (PMID:28655819).
    supported_by:
    - reference_id: PMID:28655819
      supporting_text: the specific activities of purified PedE with a variety of substrates
        were determined (Table 1). For all linear primary alcohols and aldehydes, comparably
        high enzyme activities ranging from 1.9 ± 0.2 to 6.7 ± 0.9 U mg−1 were found
    - reference_id: PMID:28655819
      supporting_text: the maximal velocity (Vmax) of PedH was approximately 1.7-fold
        higher than that of PedE (10.6 versus 6.1 U mg−1; Fig. 3). However, the corresponding
        binding constant (KM) of PedE was 2-fold lower than that of PedH (85 versus
        177 µM)
    - reference_id: UniProt:Q88JH5
      supporting_text: EC=1.1.2.8 {ECO:0000305|PubMed:28655819}
- term:
    id: GO:0070968
    label: pyrroloquinoline quinone binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000117
  review:
    summary: Correct and essential annotation. PedE is a PQQ-dependent quinoprotein
      that binds 1 PQQ group non-covalently per subunit. UniProt lists 7 PQQ-binding
      residues (positions 103, 153, 197, 215-217, 221, 386, 531, 595). The PQQ KD
      for PedE is 3.5 uM (PMID:28655819).
    action: ACCEPT
    reason: PQQ binding is fundamental to PedE's catalytic mechanism. The cofactor
      requirement is confirmed by enzymatic assays requiring exogenous PQQ, by KD determination,
      and by multiple binding site residues identified by homology modeling (PMID:28655819,
      UniProt:Q88JH5).
    supported_by:
    - reference_id: PMID:28655819
      supporting_text: the reaction mechanism of PQQ-ADHs is still not completely resolved
        but most likely proceeds via an ion-assisted direct hydride transfer from the
        substrate to C-5 of the noncovalently bound cofactor PQQ
    - reference_id: UniProt:Q88JH5
      supporting_text: Binds 1 PQQ group non-covalently per subunit.
- term:
    id: GO:0006066
    label: alcohol metabolic process
  evidence_type: IEA
  review:
    summary: PedE catalyzes the periplasmic oxidation of a broad range of alcohols
      including ethanol, 1-butanol, 2-phenylethanol, cinnamyl alcohol, and farnesol.
      Deletion of pedE eliminates growth on these alcohols in the absence of lanthanides
      (PMID:28655819). This is the primary biological process in which PedE participates.
    action: NEW
    reason: No biological process terms are present in the existing GOA annotations
      for PedE. Alcohol metabolic process is the most direct and well-supported BP
      term, as PedE's primary role is the periplasmic oxidation of volatile alcohols
      enabling their catabolism as carbon and energy sources.
    supported_by:
    - reference_id: PMID:28655819
      supporting_text: efficient growth with all of the alcohols tested, except the
        microbial fermentation product 2,3-butanediol, was dependent on the functional
        expression of PedE or PedH
    - reference_id: PMID:28655819
      supporting_text: A ΔpedE strain displayed no growth under this condition
    - reference_id: file:PSEPK/pede/pede-deep-research-falcon.md
      supporting_text: PedE is experimentally characterized as a PQQ-dependent alcohol
        dehydrogenase/ethanol dehydrogenase that oxidizes alcohols (and some aldehydes)
        in the periplasm of P. putida KT2440
- term:
    id: GO:0042537
    label: benzene-containing compound metabolic process
  evidence_type: IEA
  review:
    summary: PedE is part of the 2-phenylethanol degradation (Ped) pathway, catalyzing
      oxidation of 2-phenylethanol to phenylacetaldehyde. Growth experiments confirm
      PedE is essential for 2-phenylethanol catabolism in the absence of lanthanides
      (PMID:28655819). PedE also shows activity on cinnamyl alcohol.
    action: NEW
    reason: PedE is named for the 2-phenylethanol degradation pathway and shows high
      specific activity on 2-phenylethanol (6.7 U/mg). This aromatic compound catabolism
      role is central to its biological function.
    supported_by:
    - reference_id: PMID:28655819
      supporting_text: 2-phenylethanol, the secondary alcohol 2-butanol, cinnamyl alcohol,
        and the acyclic sesquiterpene farnesol were efficiently converted, with specific
        activities ranging from 6.7 ± 1.1 to 2.0 ± 0.3 U mg−1
    - reference_id: PMID:28655819
      supporting_text: growth experiments with 2-phenylethanol in liquid M9 medium
    - reference_id: file:PSEPK/pede/pede-deep-research-falcon.md
      supporting_text: PedE and PedH are described as part of a periplasmic oxidation
        system enabling rapid oxidation of volatile alcohols/aldehydes
