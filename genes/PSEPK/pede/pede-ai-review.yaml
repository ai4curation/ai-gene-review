  full_text_unavailable: false
  findings:
  - statement: PedE is a Ca2+-dependent PQQ-ADH with broad substrate specificity
    supporting_text: Under optimized reaction conditions, which include the presence
      of 1 mM Ca2+, the specific activities of purified PedE with a variety of substrates
      were determined
    reference_section_type: RESULTS
  - statement: PedE has Ser at position 295 for Ca2+ coordination
    supporting_text: the PedE protein harbors a serine residue at amino acid position
      295 that is involved in the coordination of the Ca2+ ion
    reference_section_type: RESULTS
  - statement: PedE is essential for growth on volatile alcohols without lanthanides
    supporting_text: A ΔpedE strain displayed no growth under this condition. Even more
      interestingly, the addition of 20 µM La3+ to the agar medium not only resulted
      in growth of the ΔpedE strain but also restricted the growth of the ΔpedH strain
    reference_section_type: RESULTS
  - statement: PedE and PedH are inversely regulated in response to lanthanide availability
    supporting_text: KT2440 responds to lanthanide availability with the inverse transcriptional
      regulation of the two PQQ-ADHs to optimize growth with volatile alcoholic and
      aldehyde substrates
    reference_section_type: DISCUSSION
  - statement: PedE Ca2+ binding affinity KD 64 uM, active 10 uM-10 mM
    supporting_text: While PedE showed enzyme activity at concentrations of 10 µM
      to 10 mM CaCl2, with a peak in activity at 1 mM
    reference_section_type: RESULTS
  - statement: PedE kinetic parameters determined for multiple substrates
    supporting_text: the maximal velocity (Vmax) of PedH was approximately 1.7-fold
      higher than that of PedE (10.6 versus 6.1 U mg−1; Fig. 3). However, the corresponding
      binding constant (KM) of PedE was 2-fold lower than that of PedH (85 versus
      177 µM)
    reference_section_type: RESULTS
- id: PMID:30158283
  title: The PedS2/PedR2 Two-Component System Is Crucial for the Rare Earth Element
    Switch in Pseudomonas putida KT2440
  full_text_unavailable: false
  findings:
  - statement: PedS2/PedR2 TCS controls inverse regulation of pedE and pedH
    supporting_text: the PedS2/PedR2 (PP_2671/PP_2672) two-component system (TCS)
      plays a central role in the observed REE-mediated switch of PQQ-EDHs in P. putida
    reference_section_type: RESULTS
  - statement: PedR2 activates pedE transcription in absence of lanthanides
    supporting_text: in the absence of lanthanum (La3+), the sensor histidine kinase
      PedS2 phosphorylates its cognate LuxR-type response regulator PedR2, which in
      turn not only activates pedE gene transcription but is also involved in repression
      of pedH
    reference_section_type: RESULTS
