taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: Ca2+-dependent pyrroloquinoline quinone (PQQ)-dependent alcohol dehydrogenase
  (EC 1.1.2.8) that catalyzes the periplasmic oxidation of a broad range of primary
  and secondary alcohols and aldehydes using cytochrome c as electron acceptor. PedE
  is the calcium-utilizing counterpart of the lanthanide-dependent PedH (PP_2679),
  and the two enzymes are inversely regulated by the PedS2/PedR2 two-component system
  in response to lanthanide availability. PedE is essential for efficient growth on
  volatile organic compounds (ethanol, 1-butanol, 2-phenylethanol) in the absence
  of lanthanides. The enzyme has an eight-bladed beta-propeller fold, binds PQQ non-covalently,
  and requires two Ca2+ ions per subunit (one catalytic in the active site, one structural
  at the N-terminus). Distinguished from PedH by Ser at position 295 (vs Asp) which
  coordinates Ca2+ rather than lanthanides. Part of the 2-phenylethanol degradation
  (Ped) pathway and also contributes to an alternative glycerol metabolic route.
existing_annotations:
- term:
    id: GO:0005509
    label: calcium ion binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  review:
    summary: PedE is a Ca2+-dependent enzyme that binds two calcium ions per subunit,
      one catalytic and one structural. Ca2+ binding is experimentally demonstrated
      with KD ~64 uM and activity across 10 uM-10 mM CaCl2 (PMID:28655819). UniProt
      lists multiple Ca2+ binding residues (positions 53, 56, 59, 221, 308, 358).
      This annotation is well supported.
    action: ACCEPT
    reason: Calcium ion binding is a core function of PedE, distinguishing it from
      the lanthanide-dependent PedH. The enzyme requires Ca2+ for all catalytic activity,
      and the Ca2+ dissociation constant and functional concentration range have been
      experimentally determined (PMID:28655819).
    supported_by:
    - reference_id: PMID:28655819
      supporting_text: While PedE showed enzyme activity at concentrations of 10 µM
        to 10 mM CaCl2, with a peak in activity at 1 mM
    - reference_id: PMID:28655819
      supporting_text: we calculated the dissociation constant (Kd) for various metals
        and the corresponding enzymes and found that PedH has an 850- to 2,500-fold
        higher binding affinity for lanthanides
    - reference_id: UniProt:Q88JH5
      supporting_text: Binds 2 calcium ions per subunit. One is located in the active-
        site cavity near PQQ and the second calcium binds at the N-terminus and
        contributes to the stability of the native enzyme.
- term:
    id: GO:0016020
    label: membrane
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: Incorrect annotation. PedE is a soluble periplasmic enzyme, not membrane-associated.
      It has a signal peptide (aa 1-33) for periplasmic export, but the mature protein
      is soluble. The InterPro family IPR017512 (PQQ_MeOH/EtOH_DH) includes both
      membrane-bound and soluble members, but PedE is explicitly described as a soluble
      quinoprotein (PMID:28655819). UniProt lists subcellular location as Periplasm
      with no membrane association.
    action: REMOVE
    reason: PedE is a soluble periplasmic enzyme as stated in UniProt and confirmed
      by purification as a soluble His-tagged protein from E. coli lysates (PMID:28655819).
      The membrane annotation is an artifact of the InterPro mapping which does not
      distinguish soluble from membrane-bound PQQ-ADHs. This is the same conclusion
      reached for paralog PedH.
    supported_by:
    - reference_id: PMID:28655819
      supporting_text: PQQ-ADHs can be divided into different subclasses, depending
        either on their molecular composition (quinoproteins or quinohemoproteins)
        or whether they are membrane bound or freely soluble within the periplasm
    - reference_id: PMID:28655819
      supporting_text: A one-step affinity chromatography method produced soluble C-terminally
        His-tagged PedE and PedH to visible purity
    - reference_id: UniProt:Q88JH5
      supporting_text: "SUBCELLULAR LOCATION: Periplasm {ECO:0000305|PubMed:28655819}."
- term:
    id: GO:0016491
    label: oxidoreductase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000117
  review:
    summary: Technically correct but far too general and uninformative. The more specific
      term GO:0052934 (alcohol dehydrogenase, cytochrome c activity) is already present
      and captures the actual function precisely. This generic term adds no information
      beyond what is already conveyed by the specific term.
    action: ACCEPT
    reason: While too general to be informative on its own, this is a valid parent
      term of GO:0052934 which is also annotated. As an IEA from ARBA it is not wrong,
      just redundant with the more specific annotation. Keeping it as a broader IEA
      is acceptable.
    supported_by:
    - reference_id: PMID:28655819
      supporting_text: the specific activities of purified PedE with a variety of substrates
        were determined
- term:
    id: GO:0016614
    label: oxidoreductase activity, acting on CH-OH group of donors
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: Correct and captures the CH-OH oxidation specificity of PedE. This is
      an intermediate-specificity term between GO:0016491 and GO:0052934. PedE oxidizes
      alcohols (CH-OH groups) to aldehydes/ketones, well supported by substrate profiling
      (PMID:28655819).
    action: ACCEPT
    reason: This accurately describes the chemical group acted upon by PedE. It is
      less specific than GO:0052934 but correctly captures the CH-OH donor specificity,
      which is a valid intermediate annotation from InterPro domain mapping.
    supported_by:
    - reference_id: PMID:28655819
      supporting_text: For all linear primary alcohols and aldehydes, comparably high
        enzyme activities ranging from 1.9 ± 0.2 to 6.7 ± 0.9 U mg−1 were found
- term:
    id: GO:0020037
    label: heme binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000117
  review:
    summary: Incorrect annotation. PedE does not bind heme. It is a quinoprotein that
      uses PQQ as cofactor and transfers electrons to an external cytochrome c550 electron
      acceptor. PedE itself contains no heme group. UniProt lists only PQQ and Ca2+
      as cofactors with no mention of heme. The ARBA model likely confused the interaction
      with cytochrome c (heme-containing) with PedE itself binding heme.
    action: REMOVE
    reason: PedE is a quinoprotein, not a quinohemoprotein. It does not contain heme.
      The UniProt entry lists only PQQ and Ca2+ cofactors. The electron acceptor cytochrome
      c550 is a separate protein encoded by an adjacent gene. This is the same erroneous
      annotation and same conclusion as for paralog PedH.
    supported_by:
    - reference_id: PMID:28655819
      supporting_text: PedE is a homolog of ExaA from Pseudomonas aeruginosa, which
        is the most intensively studied member of the class of soluble ethanol dehydrogenases
    - reference_id: UniProt:Q88JH5
      supporting_text: "Name=pyrroloquinoline quinone; Xref=ChEBI:CHEBI:58442;"
- term:
    id: GO:0030288
    label: outer membrane-bounded periplasmic space
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: PedE is periplasmic, so the general periplasmic localization is correct.
      However, this term implies specific association with the outer membrane boundary
      of the periplasm. PedE is a soluble periplasmic enzyme without evidence for specific
      outer membrane association. GO:0042597 (periplasmic space) is already annotated
      and is more appropriate.
    action: REMOVE
    reason: While PedE is indeed in the periplasm, the more specific outer-membrane-bounded
      qualifier is not supported by evidence. PedE is a freely soluble enzyme in the
      periplasmic space, not specifically localized to the outer membrane boundary.
      The correct annotation GO:0042597 (periplasmic space) is already present. Same
      conclusion as for PedH.
    proposed_replacement_terms:
    - id: GO:0042597
      label: periplasmic space
    supported_by:
    - reference_id: PMID:28655819
      supporting_text: by using a periplasmic oxidation system, the organism is able
        to rapidly detoxify the often harmful chemicals without prior transport into
        the cytoplasm
    - reference_id: UniProt:Q88JH5
      supporting_text: "SUBCELLULAR LOCATION: Periplasm {ECO:0000305|PubMed:28655819}."
- term:
    id: GO:0042597
