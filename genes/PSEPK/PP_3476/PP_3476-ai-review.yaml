description: PP_3476 (PP_3476) encodes Type II secretion system protein G, a predicted pseudopilin or pilin-like component
  of a type II secretion system. Such proteins assemble the pseudopilus that helps drive substrate movement through the Xcp/Gsp
  secretion apparatus.
