    description: >-
      LapA is the principal surface adhesin that mediates stable attachment of
      P. putida KT2440 to abiotic substrates and supports biofilm development.
      Efficient execution of this role requires LapE-dependent secretion and
      surface retention, is enhanced by FleQ and c-di-GMP, and is reversed
      during dispersal by the LapD/LapG/BifA regulatory system.

suggested_questions:
  - question: Which LapA domains, beyond the vWFa region, determine substrate specificity on different abiotic or plant-associated surfaces in KT2440?

suggested_experiments:
  - hypothesis: Distinct extracellular LapA repeat blocks contribute differentially to adhesion on hydrophobic, hydrophilic, and plant-associated surfaces.
    experiment_type: domain-deletion adhesion assay
    description: >-
      Construct clean in-frame deletions spanning the vWFa domain and selected
      LapA repeat blocks, then compare surface retention, crystal violet biofilm
      formation, and single-cell attachment on glass, polystyrene, and root-like
      surfaces.
  - hypothesis: Calcium binding mainly stabilizes the mature surface-displayed adhesin rather than serving as the primary determinant of target specificity.
    experiment_type: secretion and retention assay
    description: >-
      Mutate conserved residues in representative hemolysin-type calcium-binding
      repeats and quantify LapA secretion, cell-surface retention, and biofilm
      formation under controlled calcium concentrations.
