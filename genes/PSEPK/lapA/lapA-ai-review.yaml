- id: file:PSEPK/lapA/lapA-deep-research-falcon.md
  title: Deep research on lapA in Pseudomonas putida KT2440
  findings:
    - statement: LapA is the major giant surface adhesin that promotes attachment and biofilm formation
      supporting_text: "LapA is a giant cell-surface adhesin of Pseudomonas putida KT2440 that promotes stable attachment and biofilm formation on abiotic surfaces."
    - statement: FleQ and c-di-GMP activate LapA secretion and biofilm formation
      supporting_text: "FleQ and c-di-GMP activate lapA and lapE transcription, increasing LapA secretion and biofilm formation."
    - statement: LapE is required for efficient LapA surface localization
      supporting_text: "LapE is an outer membrane pore protein required for efficient LapA secretion, cell-surface localization, and biofilm formation."
    - statement: Nutrient limitation promotes LapA-dependent biofilm dispersal
      supporting_text: "Nutrient starvation triggers LapG-dependent proteolysis and release of surface-associated LapA, and the stringent response further promotes dispersal by increasing bifA expression while reducing lapA, lapBC, and lapE transcription."
    - statement: The vWFa domain contributes to LapA-dependent biofilm formation
      supporting_text: "The vWFa domain of LapA is necessary for peptide-enhanced biofilm formation in Pseudomonas putida."

