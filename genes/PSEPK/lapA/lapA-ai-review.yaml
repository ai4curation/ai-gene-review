taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: >-
  LapA is a giant cell-surface adhesin of Pseudomonas putida KT2440. It is
  secreted by the LapEBC type I secretion system and retained at the cell
  surface to promote stable attachment and biofilm formation on abiotic
  surfaces. LapA-dependent biofilm formation is stimulated by c-di-GMP/FleQ and
  by Fis, and is antagonized during nutrient limitation by the LapD/LapG/BifA
  dispersal pathway. The protein contains a vWFa domain and many calcium-binding
  RTX-like repeats, making calcium binding a real but secondary mechanistic
  property relative to its core adhesin function.

existing_annotations:
- term:
    id: GO:0005509
    label: calcium ion binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: >-
      This InterPro-derived annotation is plausible because LapA contains
      multiple hemolysin-type calcium-binding repeats typical of RTX-like giant
      adhesins. However, the primary biological role of LapA in KT2440 is not
      general calcium binding but cell-surface adhesion and biofilm formation.
      Calcium binding is best treated as a structural or mechanistic feature of
      the adhesin rather than its core reviewed function.
    action: KEEP_AS_NON_CORE
    reason: >-
      The annotation is not wrong, but it under-describes LapA. Direct KT2440
      studies emphasize LapA's role as the major surface adhesin required for
      stable attachment and biofilm development, while UniProt domain structure
      explains why InterPro infers calcium binding. Retaining the term as
      non-core preserves the mechanistic signal without letting it dominate the
      review.
    supported_by:
      - reference_id: file:PSEPK/lapA/lapA-deep-research-falcon.md
        supporting_text: "LapA carries numerous LapA repeats and hemolysin-type calcium-binding repeats, so the InterPro-derived calcium ion binding annotation is plausible but under-describes the protein's primary adhesin role."

