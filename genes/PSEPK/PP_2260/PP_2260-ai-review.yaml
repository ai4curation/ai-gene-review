description: PP_2260 encodes an ATP-binding component of the PP_2260-PP_2264 unresolved sugar/glycerol-phosphate-like ABC importer locus. The product is named a glycerol-phosphate ABC transporter ATP-binding protein, but neighboring permease and binding-protein annotations are sugar-transporter-like, so the first-pass substrate call remains unresolved.
