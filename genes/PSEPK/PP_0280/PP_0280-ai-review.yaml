  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: PP_0280 encodes ArtM, a predicted multi-pass inner-membrane permease component of the PP_0280-PP_0283 arginine/basic-amino-acid ABC uptake locus. Its ArtM/MetI-like permease domains support a channel-forming role in an ATP-driven amino-acid importer rather than an independent ATPase or soluble substrate-binding protein.
