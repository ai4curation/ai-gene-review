id: Q88E33
gene_symbol: fabV
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: >-
  FabV is the canonical NADH-dependent enoyl-ACP reductase of Pseudomonas
  putida KT2440 type-II fatty-acid synthesis. It performs the final reduction
  in each elongation round, converting trans-2-enoyl-ACP to saturated
  acyl-ACP for re-entry into the condensing step.
