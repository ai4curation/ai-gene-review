  evidence_type: IEA
  original_reference_id: GO_REF:0000118
  qualifier: enables
  review:
    summary: >-
      Likely family-level over-annotation of a possible model-substrate
      activity rather than the physiological FAS-II reaction.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      Reviewed UniProt specifies an ACP-linked enoyl substrate for KT2440
      FabV. A characterized FabV ortholog can also reduce a crotonyl-CoA model
      substrate, so CoA activity is not refuted, but it has not been
      demonstrated for Q88E33 or established as its physiological role.
    supported_by:
    - reference_id: file:PSEPK/fabV/fabV-uniprot.txt
      supporting_text: 'acyl carrier protein (ACP).'
    - reference_id: file:PSEPK/fabV/fabV-deep-research-openscientist.md
      supporting_text: >-
        Purified FabV "is active with both crotonyl-ACP and the model substrate,
        crotonyl-CoA"
