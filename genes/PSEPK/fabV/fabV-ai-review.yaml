  title: OpenScientist deep-research report for PSEPK fabV
  findings:
  - statement: >-
      The report independently matches Q88E33 and PP_4635 to an
      NADH-dependent FabV enoyl-ACP reductase.
    supporting_text: >-
      **FabV (Q88E33, PP_4635) is the NADH-dependent
      enoyl-[acyl-carrier-protein] reductase (ENR; EC 1.3.1.9) of *Pseudomonas
      putida* KT2440.**
    reference_section_type: RESULTS
  - statement: No KT2440-specific FabV enzymology was located.
    supporting_text: >-
      No *P. putida* KT2440-specific enzymology was located; all
      mechanistic/structural data derive from orthologs.
    reference_section_type: DISCUSSION
  reference_review:
    relevance: HIGH
    correctness: UNVERIFIED
    review_notes: >-
      Provider-generated gene report. Exact accession, locus, family,
      reaction, and NADH preference agree with reviewed UniProt; claims about
      triclosan resistance, a second FabI isozyme, structure, and kinetics
      derive from other species and were not imported.
