  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: katE encodes a monofunctional HPII-family catalase that decomposes hydrogen peroxide to water and oxygen. It is best curated as an oxidative-stress/peroxide-detoxification enzyme and as a KEGG ppu00380 boundary member, not as a dedicated tryptophan-metabolism step.
