  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: puuD (PP_3099) encodes Uricase/urate oxidase (EC 1.7.3.3); despite an EC-derived uricase product name, its InterPro/Pfam/PANTHER
  profile supports a TssC/VipB-family type VI secretion contractile sheath large-subunit role. The protein is predicted to
  act as a secretion-apparatus component rather than as a standalone metabolic enzyme.
