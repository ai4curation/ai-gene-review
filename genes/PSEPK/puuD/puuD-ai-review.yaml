    label: urate oxidase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000003
  qualifier: enables
  review:
    summary: The EC-derived urate oxidase activity annotation is likely a product-name/EC over-propagation for this locus.
    action: REMOVE
    reason: The only GOA row is an IEA UniProtKB-EC mapping from the unreviewed EC 1.7.3.3 product name, while UniProt family/domain
      evidence places the protein in the TssC/VipB type VI secretion sheath family. This supports treating PP_3099/puuD as
      a T6SS sheath component rather than as a urate oxidase enzyme.
