suggested_questions:
- question: Which P. putida KT2440 T6SS locus and surface-associated phenotype depends directly on puuD, and is this gene
    required for secretion or only for apparatus assembly/regulation?
suggested_experiments:
- description: Create a targeted puuD perturbation and assay Hcp/VgrG secretion, T6SS-dependent interbacterial competition,
    and surface-growth or biofilm phenotypes under conditions where the neighboring T6SS locus is expressed.
  experiment_type: gene perturbation with secretion proteomics and surface-phenotype assay
