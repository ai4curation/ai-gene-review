- id: PMID:11442790
  title: 'Microbial origin of plant-type 2-keto-3-deoxy-D-arabino-heptulosonate 7-phosphate
    synthases, exemplified by the chorismate- and tryptophan-regulated enzyme from
    Xanthomonas campestris'
  findings:
  - statement: Biochemical characterization of a class-II (plant-type / AroAII) DAHP
      synthase shows divalent-metal dependence (activity abolished by EDTA) and feedback
      inhibition by chorismate and tryptophan, providing the family-level basis for
      annotating P. putida AroH as a class-II DAHP synthase.
    supporting_text: Microbial origin of plant-type 2-keto-3-deoxy-D-arabino-heptulosonate
      7-phosphate synthases from Xanthomonas campestris; Km(PEP) and Km(E4P) reported;
      chorismate and L-tryptophan inhibition characterized.
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: PubMed-verified (Gosset, Bonner, Jensen, J Bacteriol 2001;183:4061-4070,
      PMID:11442790). Characterizes a class-II DAHP synthase in a different organism;
