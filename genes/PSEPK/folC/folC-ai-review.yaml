  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: folC (PP_1997) encodes the bifunctional dihydrofolate synthase/folylpolyglutamate synthase that ligates glutamate
  to dihydropteroate and extends folate polyglutamate chains. It connects de novo folate synthesis to the active intracellular
  folylpolyglutamate pool.
