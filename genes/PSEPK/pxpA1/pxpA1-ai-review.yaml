id: Q88IS9
gene_symbol: pxpA1
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: pxpA1 encodes 5-oxoprolinase subunit A 1 in Pseudomonas putida KT2440. It is a PxpA/LamB-family component of the ATP-dependent 5-oxoprolinase complex that cleaves 5-oxoproline to L-glutamate as part of 5-oxoproline/glutathione-turnover metabolism.
existing_annotations:
- term:
    id: GO:0005524
    label: ATP binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000104
  qualifier: enables
  review:
    summary: ATP binding is consistent with ATP-dependent 5-oxoprolinase activity.
    action: KEEP_AS_NON_CORE
    reason: UniProt describes an ATP-hydrolyzing 5-oxoprolinase reaction, but ATP binding is a co-substrate feature rather than the most informative function.
    supported_by:
    - reference_id: file:PSEPK/pxpA1/pxpA1-uniprot.txt
      supporting_text: "coupled to the hydrolysis of ATP to ADP"
    - reference_id: file:PSEPK/pxpA1/pxpA1-goa.tsv
      supporting_text: ATP binding
- term:
    id: GO:0005975
    label: carbohydrate metabolic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: involved_in
  review:
    summary: Carbohydrate metabolic process appears to be a fold-level spillover annotation.
    action: REMOVE
    reason: UniProt assigns PxpA1 to ATP-dependent 5-oxoproline cleavage to L-glutamate, not carbohydrate metabolism. The carbohydrate term likely comes from a broad glycoside hydrolase/deacetylase fold annotation and should not be retained for this protein.
    supported_by:
    - reference_id: file:PSEPK/pxpA1/pxpA1-uniprot.txt
      supporting_text: "Catalyzes the cleavage of 5-oxoproline to form L-glutamate"
    - reference_id: file:PSEPK/pxpA1/pxpA1-uniprot.txt
      supporting_text: "Gene3D; 3.20.20.370; Glycoside hydrolase/deacetylase; 1."
    - reference_id: file:PSEPK/pxpA1/pxpA1-goa.tsv
      supporting_text: carbohydrate metabolic process
- term:
