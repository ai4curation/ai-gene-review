    label: 5-oxoprolinase (ATP-hydrolyzing) activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: ATP-hydrolyzing 5-oxoprolinase activity is the supported core function.
    action: ACCEPT
    reason: UniProt names pxpA1 as 5-oxoprolinase subunit A 1, assigns EC 3.5.2.9, and gives the 5-oxoproline-to-L-glutamate reaction.
