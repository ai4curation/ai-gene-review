id: Q88FX7
gene_symbol: nicS
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: nicS encodes a TetR-like DNA-binding transcriptional repressor that controls the nicAB operon in the aerobic nicotinate degradation regulon of Pseudomonas putida KT2440. NicS represses the Pa promoter under non-induced conditions, with repression relieved by nicotinate or 6-hydroxynicotinate.
existing_annotations:
- term:
    id: GO:0003677
    label: DNA binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: DNA binding is consistent with the HTH transcriptional repressor assignment, but it is less informative than the specific repressor activity.
    action: KEEP_AS_NON_CORE
    reason: NicS is a DNA-binding transcriptional regulator; the binding parent term is retained as background rather than the core function.
    supported_by:
    - reference_id: file:PSEPK/nicS/nicS-uniprot.txt
      supporting_text: Transcriptional repressor for the nicAB operon
    - reference_id: file:PSEPK/nicS/nicS-goa.tsv
      supporting_text: "GO:0003677\tDNA binding"
- term:
    id: GO:0003700
    label: DNA-binding transcription factor activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: The transcription-factor annotation is directionally correct but should be refined to repressor activity for NicS.
    action: MODIFY
    reason: UniProt and the nic regulatory paper identify NicS as a repressor of the nicAB Pa promoter, so GO:0001217 is more specific than generic DNA-binding transcription factor activity.
    proposed_replacement_terms:
    - id: GO:0001217
      label: DNA-binding transcription repressor activity
    supported_by:
    - reference_id: file:PSEPK/nicS/nicS-uniprot.txt
      supporting_text: Transcriptional repressor for the nicAB operon
    - reference_id: PMID:21450002
      supporting_text: encodes a TetR-like regulator that
      reference_section_type: ABSTRACT
- term:
    id: GO:0006355
    label: regulation of DNA-templated transcription
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: Regulation of DNA-templated transcription is correct but too broad for NicS.
    action: MODIFY
    reason: NicS represses nicAB transcription in the absence of nicotinate or 6-hydroxynicotinate, so negative regulation of DNA-templated transcription is the better process term.
    proposed_replacement_terms:
    - id: GO:0045892
      label: negative regulation of DNA-templated transcription
    supported_by:
    - reference_id: file:PSEPK/nicS/nicS-uniprot.txt
      supporting_text: repression of the nicAB operon becomes alleviated
    - reference_id: PMID:21450002
      supporting_text: represses the activity of Pa in the absence of the NA/6HNA inducers
      reference_section_type: ABSTRACT
