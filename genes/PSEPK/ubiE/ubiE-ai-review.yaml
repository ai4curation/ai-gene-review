- id: file:projects/P_PUTIDA/deep-research/PSEPK__ubiquinone_biosynthesis__ppu00130-deep-research-openscientist.md
  title: OpenScientist PSEPK ubiquinone pathway assessment
  findings:
  - statement: >-
      The species-level proteome audit found the canonical ubiquinone pathway
      but not the upstream canonical menaquinone pathway.
- id: PMID:9045837
  title: 'A C-methyltransferase involved in both ubiquinone and menaquinone biosynthesis:
    isolation and identification of the Escherichia coli ubiE gene.'
  findings:
  - statement: >-
      E. coli genetics establishes UbiE C-methylation in both ubiquinone and
      menaquinone biosynthesis; this supports conserved catalytic capacity but
      does not establish a menaquinone pathway in KT2440.
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      PubMed-cached abstract verified; direct evidence is for E. coli UbiE and
      is transferred to PP_5011 by close orthology.
- id: file:PSEPK/ubiE/ubiE-deep-research-openscientist.md
  title: OpenScientist functional review of PSEPK ubiE
  findings:
  - statement: >-
      Ortholog genetics and conserved family architecture support UbiE
      C-methyltransferase chemistry, but PP_5011 itself has not been assayed.
      The report's claims of a physiological KT2440 menaquinone role, target
      metabolon membership, essentiality, and downstream HskA regulation are
      not adopted as gene-level facts.
core_functions:
- description: >-
    SAM-dependent C-methylation of a polyprenylated benzoquinol intermediate
    during ubiquinone biosynthesis, inferred for PP_5011 from conserved
    UbiE/COQ5-family and close-ortholog evidence.
  molecular_function:
    id: GO:0008425
    label: 2-methoxy-6-polyprenyl-1,4-benzoquinol methyltransferase activity
  directly_involved_in:
