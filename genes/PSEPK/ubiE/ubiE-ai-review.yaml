id: Q88D17
gene_symbol: ubiE
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: >-
  ubiE encodes a SAM-dependent C-methyltransferase that methylates a
  polyprenylated benzoquinol intermediate during ubiquinone biosynthesis. In
  Pseudomonas putida KT2440 this enzyme supports ubiquinone formation; the
  strain lacks the canonical upstream menaquinone pathway needed to supply the
  alternative demethylmenaquinol substrate.
existing_annotations:
- term:
    id: GO:0006744
    label: ubiquinone biosynthetic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: involved_in
  review:
    summary: Ubiquinone biosynthesis is the core process for PSEPK UbiE.
    action: ACCEPT
    reason: UbiE installs the ring C-methyl group in a ubiquinone intermediate.
    supported_by:
    - reference_id: file:PSEPK/ubiE/ubiE-uniprot.txt
      supporting_text: ubiquinone biosynthesis
- term:
    id: GO:0008168
    label: methyltransferase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: The generic methyltransferase term is correct but less informative than the exact UbiE activity.
    action: MARK_AS_OVER_ANNOTATED
    reason: GO:0008425 captures the substrate-specific core molecular function.
- term:
    id: GO:0008425
    label: 2-methoxy-6-polyprenyl-1,4-benzoquinol methyltransferase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: This is the substrate-specific core C-methyltransferase activity of UbiE.
    action: ACCEPT
    reason: UniProt assigns EC 2.1.1.201 and Rhea 28286 to this reaction.
    supported_by:
    - reference_id: file:PSEPK/ubiE/ubiE-uniprot.txt
      supporting_text: 2-methoxy-6-polyprenyl-1,4-benzoquinol methylase
- term:
    id: GO:0009060
    label: aerobic respiration
  evidence_type: IEA
  original_reference_id: GO_REF:0000104
  qualifier: involved_in
  review:
    summary: This annotation overstates the indirect respiratory consequence of ubiquinone synthesis.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      UbiE synthesizes a respiratory quinone but does not itself catalyze an
      electron-transfer reaction in aerobic respiration.
- term:
    id: GO:0009234
    label: menaquinone biosynthetic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: involved_in
  review:
    summary: KT2440 lacks the canonical menaquinone pathway that would make this a physiological role.
    action: REMOVE
    reason: >-
      The species-level pathway audit found no canonical MenA/MenD pathway in
      the target proteome. This unconditioned HAMAP transfer is therefore not a
      supported biological process for PSEPK UbiE.
- term:
    id: GO:0042181
    label: ketone biosynthetic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000117
  qualifier: involved_in
  review:
    summary: This broad parent process is redundant with the specific ubiquinone pathway annotation.
    action: MARK_AS_OVER_ANNOTATED
    reason: GO:0006744 identifies the relevant ketone product and pathway.
- term:
    id: GO:0043770
    label: demethylmenaquinone methyltransferase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: The demethylmenaquinone activity is not supported in the target organism's pathway context.
    action: REMOVE
    reason: >-
      Although the family rule assigns this alternative reaction, KT2440 lacks
      the upstream canonical menaquinone pathway and therefore does not produce
      the physiological substrate. The target enzyme's supported role is the
      ubiquinone C-methylation reaction.
