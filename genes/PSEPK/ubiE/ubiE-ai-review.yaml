id: Q88D17
gene_symbol: ubiE
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: >-
  ubiE encodes a MenG/UbiE-family S-adenosyl-L-methionine-dependent
  C-methyltransferase. In Pseudomonas putida KT2440, its best-supported core
  role is methylation of a ubiquinone biosynthesis intermediate,
  2-methoxy-6-polyprenyl-1,4-benzoquinol. The enzyme family can also catalyze
  demethylmenaquinone methylation in organisms with menaquinone biosynthesis,
  but that process is treated here as non-core pending organism-level pathway
  evidence.
existing_annotations:
- term:
    id: GO:0006744
    label: ubiquinone biosynthetic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: involved_in
  review:
    summary: >-
      UbiE catalyzes a C-methylation step in ubiquinone biosynthesis.
    action: ACCEPT
    reason: >-
      The UniProt/HAMAP record includes the ubiquinone-pathway
      2-methoxy-6-polyprenyl-1,4-benzoquinol methylase reaction.
- term:
    id: GO:0008168
    label: methyltransferase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: >-
      Generic methyltransferase activity is true but too broad for UbiE.
    action: MODIFY
    reason: >-
      The specific ubiquinone C-methyltransferase term GO:0008425 is already
      present and should be used instead of the parent term.
    proposed_replacement_terms:
    - id: GO:0008425
      label: 2-methoxy-6-polyprenyl-1,4-benzoquinol methyltransferase activity
- term:
    id: GO:0008425
    label: 2-methoxy-6-polyprenyl-1,4-benzoquinol methyltransferase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: >-
      This is the specific ubiquinone biosynthesis C-methyltransferase activity
      supported for UbiE.
    action: ACCEPT
    reason: >-
      UniProt records the corresponding reaction and EC 2.1.1.201 for Q88D17.
- term:
    id: GO:0009060
    label: aerobic respiration
  evidence_type: IEA
  original_reference_id: GO_REF:0000104
  qualifier: involved_in
  review:
    summary: >-
      Ubiquinone is required for respiratory electron transfer, but UbiE's
      direct role is cofactor biosynthesis rather than respiration itself.
    action: KEEP_AS_NON_CORE
    reason: >-
      This process term is biologically connected through ubiquinone production
      but is less direct than GO:0006744.
- term:
    id: GO:0009234
    label: menaquinone biosynthetic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: involved_in
  review:
    summary: >-
      The UbiE/MenG family can methylate demethylmenaquinone, but the current
      PSEPK ppu00130 context supports ubiquinone biosynthesis as the core role.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      Pseudomonas putida KT2440 is primarily a ubiquinone-using aerobic
      gammaproteobacterium in this pathway context. The menaquinone annotation
      is best treated as family-level over-propagation unless Falcon or later
      organism-level evidence identifies a satisfiable menaquinone route.
- term:
    id: GO:0042181
    label: ketone biosynthetic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000117
  qualifier: involved_in
  review:
    summary: >-
      Ketone biosynthetic process is an unhelpfully broad ARBA process label
      for a ubiquinone methyltransferase.
    action: MODIFY
    reason: >-
      The biologically informative process for this enzyme in PSEPK is
      ubiquinone biosynthesis.
    proposed_replacement_terms:
    - id: GO:0006744
      label: ubiquinone biosynthetic process
- term:
    id: GO:0043770
    label: demethylmenaquinone methyltransferase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: >-
      Demethylmenaquinone methyltransferase activity is a plausible family-level
      activity for UbiE/MenG proteins, but it is not the core PSEPK ppu00130
      role.
    action: KEEP_AS_NON_CORE
    reason: >-
      UniProt/HAMAP records EC 2.1.1.163 for the family. In this organism-level
      batch, however, the best-supported pathway role is ubiquinone
      C-methylation via GO:0008425.
