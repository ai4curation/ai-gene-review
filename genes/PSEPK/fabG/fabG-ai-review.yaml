taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: >-
  FabG is the canonical NADPH-dependent 3-oxoacyl-ACP reductase of
  Pseudomonas putida KT2440 type-II fatty-acid synthesis. It performs the first
  reductive step of each elongation round, converting a 3-oxoacyl-ACP to the
  corresponding (3R)-hydroxyacyl-ACP.
