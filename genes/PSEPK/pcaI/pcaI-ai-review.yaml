    Heteromeric 3-oxoadipate CoA-transferase subunit that functions with PcaJ
    to transfer CoA from succinyl-CoA to 3-oxoadipate, producing 3-oxoadipyl-CoA
    and succinate during aromatic-compound assimilation through the beta-ketoadipate
    pathway.
  molecular_function:
    id: GO:0047569
    label: 3-oxoadipate CoA-transferase activity
  directly_involved_in:
  - id: GO:0042952
    label: beta-ketoadipate pathway
  supported_by:
