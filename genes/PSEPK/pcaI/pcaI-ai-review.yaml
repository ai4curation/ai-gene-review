      The pcaI/pcaJ locus encodes the beta-ketoadipate:succinyl-CoA
      transferase required for aromatic-compound catabolism through the
      beta-ketoadipate route.
  - statement: >-
      The study showed that the enzyme is composed of two nonidentical
      subunits, establishing that pcaI functions in a heteromeric transferase.
