proposed_new_terms: []
suggested_questions:
- question: >-
    Which catalytic and substrate-binding contributions are partitioned between
    PcaI and PcaJ in the KT2440 CoA-transferase active site?
  experts:
  - Enzyme mechanism researchers
  - Structural biologists
- question: >-
    Under which aromatic substrates and regulatory conditions is pcaI most
    strongly induced in KT2440?
  experts:
  - Pseudomonas regulatory-network specialists
  - Systems microbiologists

suggested_experiments:
- experiment_type: Gene knockout and growth profiling
  description: >-
    Delete pcaI and test growth on protocatechuate, 4-hydroxybenzoate, quinate,
    and benzoate to quantify its contribution to aromatic-carbon assimilation.
- experiment_type: Enzyme reconstitution
  description: >-
    Purify PcaI and PcaJ separately and together to test whether measurable
    3-oxoadipate CoA-transferase activity requires the heteromeric complex and
    to resolve the enables versus contributes_to qualifier nuance.
