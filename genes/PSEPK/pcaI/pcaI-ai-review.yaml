id: Q88FX5
gene_symbol: pcaI
product_type: PROTEIN
aliases:
- PP_3951
status: COMPLETE
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 
    11950 / KT2440)
description: >-
  pcaI encodes the PcaI subunit of the heteromeric 3-oxoadipate CoA-transferase
  (EC 2.8.3.6) in Pseudomonas putida KT2440. Together with PcaJ, it catalyzes
  transfer of CoA from succinyl-CoA to 3-oxoadipate to form 3-oxoadipyl-CoA and
  succinate, a late step in the protocatechuate branch of the beta-ketoadipate
  pathway that channels aromatic-carbon intermediates into central metabolism.
existing_annotations:
- term:
    id: GO:0008410
    label: CoA-transferase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  review:
    summary: >-
      This parent molecular-function term is broadly correct but substantially
      less informative than the specific 3-oxoadipate CoA-transferase activity
      annotation already present for pcaI.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      pcaI has a well-defined catalytic assignment within the beta-ketoadipate
      pathway. Retaining the generic parent term adds little information once
      GO:0047569 is present. The main curator-relevant nuance is not the term
      identity but that pcaI acts as one subunit of the heteromeric PcaI/PcaJ
      transferase complex.
    supported_by:
    - reference_id: UniProt:Q88FX5
      supporting_text: "RecName: Full=3-oxoadipate CoA-transferase"
    - reference_id: DOI:10.1128/jb.174.14.4657-4666.1992
      supporting_text: >-
        Parales and Harwood characterized pcaI and pcaJ as the genes for the
        beta-ketoadipate:succinyl-CoA transferase.

      full_text_unavailable: true
- term:
    id: GO:0047569
    label: 3-oxoadipate CoA-transferase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  review:
    summary: >-
      This is the correct specific molecular function for pcaI. The gene was
      originally characterized as part of the two-subunit beta-ketoadipate:succinyl-CoA
      transferase that catalyzes the 3-oxoadipate to 3-oxoadipyl-CoA conversion.
    action: ACCEPT
    reason: >-
      The reaction and EC assignment match both the KT2440 UniProt record and
      the original genetic characterization of pcaI/pcaJ. Strict GO semantics
      would arguably prefer a contributes_to qualifier because PcaI functions
      with PcaJ in a heteromeric enzyme, but the GO term itself accurately
      captures the core catalytic role and should be retained.
    supported_by:
    - reference_id: DOI:10.1128/jb.174.14.4657-4666.1992
      supporting_text: >-
        The cloned fragment complemented transferase-defective mutants and
        encoded one of the two nonidentical subunits of the enzyme.
      full_text_unavailable: true
    - reference_id: UniProt:Q88FX5
      supporting_text: "Reaction=3-oxoadipate + succinyl-CoA = 3-oxoadipyl-CoA + succinate"
    - reference_id: file:PSEPK/pcaI/pcaI-deep-research-falcon.md
      supporting_text: "**pcaI (Q88FX5)** in *Pseudomonas putida* KT2440 encodes the
        **A (α) subunit** of **β-ketoadipate (3-oxoadipate):succinyl-CoA transferase**
        (EC **2.8.3.6**)"

- term:
    id: GO:0042952
    label: beta-ketoadipate pathway
  evidence_type: IEA
  original_reference_id: GO_REF:0000041
  review:
    summary: >-
      This pathway annotation is appropriate and represents a core biological
      process assignment for pcaI in KT2440 because the enzyme performs a late,
      committed CoA-transfer step in the protocatechuate branch.
    action: ACCEPT
    reason: >-
      The beta-ketoadipate pathway is the central aromatic-compound funneling
      pathway in Pseudomonas, and pca genes specifically comprise the protocatechuate
      branch in KT2440. UniProt places pcaI at step 1 of 2 for conversion of
      3-oxoadipate to acetyl-CoA and succinyl-CoA, which is fully consistent
      with the pathway-level GO term.
    supported_by:
    - reference_id: DOI:10.1046/j.1462-2920.2002.00370.x
      supporting_text: >-
        The aromatic-catabolism analysis identified pca genes as the
        protocatechuate branch of the beta-ketoadipate pathway in KT2440.
      full_text_unavailable: true
    - reference_id: UniProt:Q88FX5
      supporting_text: "beta-ketoadipate pathway; acetyl-CoA and succinyl-CoA from
        3-oxoadipate: step 1/2."
    - reference_id: file:PSEPK/pcaI/pcaI-deep-research-falcon.md
      supporting_text: "a key activation step in the lower β-ketoadipate pathway."

