id: Q88PR1
gene_symbol: nadC
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: >-
  Quinolinate phosphoribosyltransferase of Pseudomonas putida KT2440. NadC uses
  quinolinate and 5-phospho-alpha-D-ribose 1-diphosphate to form nicotinate
  D-ribonucleotide (NaMN), carbon dioxide, and diphosphate. This reaction links
  quinolinate formation to the shared NaMN completion branch of de novo NAD+
  biosynthesis.
existing_annotations:
  - term:
      id: GO:0004514
      label: nicotinate-nucleotide diphosphorylase (carboxylating) activity
    evidence_type: IEA
    original_reference_id: GO_REF:0000120
    qualifier: enables
    review:
      summary: Correct specific molecular function for NadC.
      action: ACCEPT
      reason: >-
        The NadC-family assignment, EC 2.4.2.19, and RHEA:12733 support
        quinolinate phosphoribosylation to NaMN in the physiological direction.
      supported_by:
        - reference_id: file:PSEPK/nadC/nadC-uniprot.txt
          supporting_text: "Reaction=nicotinate beta-D-ribonucleotide + CO2 + diphosphate ="
  - term:
      id: GO:0005737
      label: cytoplasm
    evidence_type: IEA
    original_reference_id: GO_REF:0000118
    qualifier: located_in
    review:
      summary: Correct expected location for a soluble bacterial NadC enzyme.
      action: ACCEPT
      reason: The cytoplasmic assignment is consistent with the soluble de novo pathway.
  - term:
      id: GO:0009435
      label: NAD+ biosynthetic process
    evidence_type: IEA
    original_reference_id: GO_REF:0000120
    qualifier: involved_in
    review:
      summary: Correct core biological process.
      action: ACCEPT
      reason: >-
        UniProt explicitly places NadC in production of NaMN from quinolinate in
        NAD+ biosynthesis.
      supported_by:
        - reference_id: file:PSEPK/nadC/nadC-uniprot.txt
          supporting_text: "PATHWAY: Cofactor biosynthesis; NAD(+) biosynthesis; nicotinate D-"
  - term:
      id: GO:0016763
      label: pentosyltransferase activity
    evidence_type: IEA
    original_reference_id: GO_REF:0000002
    qualifier: enables
    review:
      summary: Correct parent chemistry but too broad for the known NadC reaction.
      action: MODIFY
      reason: GO:0004514 captures the substrate-specific phosphoribosyltransferase activity.
      proposed_replacement_terms:
        - id: GO:0004514
          label: nicotinate-nucleotide diphosphorylase (carboxylating) activity
  - term:
      id: GO:0034213
      label: quinolinate catabolic process
    evidence_type: IEA
    original_reference_id: GO_REF:0000118
    qualifier: involved_in
    review:
      summary: Chemically defensible substrate-level process, but not the core pathway framing.
      action: KEEP_AS_NON_CORE
      reason: >-
        NadC consumes quinolinate, so the term is not false. Its physiological
        role here is constructive NAD+ biosynthesis rather than a separate
        quinolinate-degradation pathway, making GO:0009435 the core process.
