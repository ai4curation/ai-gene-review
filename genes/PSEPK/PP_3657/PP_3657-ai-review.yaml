  review:
    summary: Accept broad oxidoreductase activity as the safest current GO term for this nitroreductase-family protein.
    action: ACCEPT
    reason: UniProt names PP_3657 as p-nitrobenzoate reductase NfnB and assigns nitroreductase-family/FMN context, but no current
      non-obsolete GO term captures p-nitrobenzoate reductase specificity. The broad oxidoreductase term is therefore retained pending
      substrate evidence.
