description: PP_3657 encodes a predicted FMN-dependent nitroreductase-family protein annotated as p-nitrobenzoate reductase NfnB.
  Current evidence supports a broad oxidoreductase/nitroreductase-family role, but the physiological substrate and contribution to
  aminobenzoate-map chemistry remain unresolved.
