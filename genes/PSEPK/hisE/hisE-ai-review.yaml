id: Q88D14
gene_symbol: hisE
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: >-
  hisE encodes phosphoribosyl-ATP diphosphatase (also called
  phosphoribosyl-ATP pyrophosphatase; EC 3.6.1.31), which hydrolyzes
  phosphoribosyl-ATP to phosphoribosyl-AMP and diphosphate in the second
  reaction of L-histidine biosynthesis. In Pseudomonas putida KT2440 this is a
  small standalone enzyme; the following cyclohydrolase reaction is carried out
  by the adjacent HisI protein.
existing_annotations:
- term:
    id: GO:0000105
    label: L-histidine biosynthetic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: involved_in
  review:
    summary: HisE performs the second reaction of the PRPP-to-histidine pathway.
    action: ACCEPT
    reason: >-
      The reviewed UniProt entry and UniPathway assignment place the exact
      diphosphatase reaction at step 2 of 9 in L-histidine biosynthesis.
    supported_by:
    - reference_id: file:PSEPK/hisI/hisI-deep-research-openscientist.md
      supporting_text: >-
        the upstream **HisE/PRA-PH** converts PR-ATP to PR-AMP
- term:
    id: GO:0004636
    label: phosphoribosyl-ATP diphosphatase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: This is the defining activity of the KT2440 HisE protein.
    action: ACCEPT
    reason: >-
      GO:0004636 matches EC 3.6.1.31, RHEA:22828, the reviewed product name,
      and HisE-specific InterPro and UniRule assignments.
    supported_by:
    - reference_id: file:PSEPK/hisI/hisI-deep-research-openscientist.md
      supporting_text: >-
        *hisE* = PP_5015 (Q88D14, 111 aa, EC 3.6.1.31, PRA-PH)
- term:
    id: GO:0005737
    label: cytoplasm
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: located_in
  review:
    summary: HisE is a soluble cytoplasmic biosynthetic enzyme.
    action: KEEP_AS_NON_CORE
    reason: >-
      The location is supported by UniProt but is contextual rather than the
      core biochemical function.
