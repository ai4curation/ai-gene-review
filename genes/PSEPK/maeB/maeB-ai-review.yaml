description: maeB encodes an NADP-dependent malic enzyme (malate dehydrogenase, decarboxylating; EC 1.1.1.40). It oxidatively
  decarboxylates malate to pyruvate with NADPH production, placing it at the malate/pyruvate node that overlaps ppu00620 and
  carbon-fixation/anaplerotic maps.
