  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: pilG (PP_4992) encodes a small receiver-domain response-regulator candidate in the Pseudomonas
  putida KT2440 Pil/Chp-type signaling cluster. The protein is predicted to participate in phosphorelay
  signaling downstream of a CheA-like kinase, with its direct type IV pilus or twitching-motility output
  unresolved.
