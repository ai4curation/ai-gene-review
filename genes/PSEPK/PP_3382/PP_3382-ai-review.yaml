description: PP_3382 encodes the cytochrome c subunit of a membrane-associated gluconate 2-dehydrogenase. The protein contains multiple c-type cytochrome/heme-binding signatures and supports electron transfer from periplasmic gluconate oxidation into the respiratory chain. This links peripheral glucose/gluconate oxidation to central carbon entry but is not itself an ED-core cytosolic enzyme.
