taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: kdpE encodes a KdpE-like two-component DNA-binding response activator in Pseudomonas putida
  KT2440. It combines a response-regulator receiver domain with an OmpR/PhoB-type DNA-binding domain,
  consistent with phosphorelay-dependent transcriptional activation; the exact KT2440 signal branch represented
  in the ppu02024 umbrella remains unresolved.
