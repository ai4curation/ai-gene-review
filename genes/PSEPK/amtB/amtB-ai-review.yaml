- id: PMID:17965157
  title: Transcriptome analysis of Pseudomonas putida in response to nitrogen availability
  findings:
  - statement: In P. putida KT2440, amtB (PP_5233) is a high-affinity ammonium transporter genetically linked to glnK and
      strongly induced under nitrogen limitation in an NtrC/sigma-54-dependent manner.
    reference_section_type: RESULTS
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: Corrected wrong identifier. The original PMID:18156253 resolved to an unrelated Thermotoga maritima glycerate
      2-kinase paper. The intended reference was recovered via DOI 10.1128/JB.01230-07 from the deep-research report and verified
      against PubMed as PMID:17965157 (Hervas AB, Canosa I, Santero E; J Bacteriol 190:416-420, 2008). Title and content directly
      establish KT2440-specific amtB identity, nitrogen-limitation induction, and NtrC/sigma-54 regulation. Full text not
      in cache; amtB-specific (~62-fold) details are paraphrased from the deep-research summary of the full text.
