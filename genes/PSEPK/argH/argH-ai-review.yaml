description: >-
  ArgH (PP_0184) is argininosuccinate lyase (EC 4.3.2.1), which cleaves
  argininosuccinate to L-arginine and fumarate. It catalyzes the terminal
  reaction of de novo L-arginine biosynthesis downstream of ArgG.
