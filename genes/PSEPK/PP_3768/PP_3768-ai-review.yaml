description: PP_3768 encodes a predicted shikimate-dehydrogenase-like oxidoreductase in Pseudomonas putida KT2440. The UniProt entry is based on genome annotation and domain inference, with a shikimate dehydrogenase substrate-binding region and NAD(P)-binding oxidoreductase fold, and GOA assigns NADP-dependent shikimate dehydrogenase activity. This protein is one of several aroE-like paralogs in KT2440; unlike the more canonical aroE entries, its name and EC assignment remain less specific, so its exact substrate preference and physiological contribution to shikimate/chorismate flux need experimental confirmation.
