id: Q88DW8
gene_symbol: panC
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: >-
  panC (PP_4700) encodes the soluble pantothenate synthetase that uses ATP to
  condense (R)-pantoate with beta-alanine, producing pantothenate, AMP, and
  diphosphate through a pantoyl-adenylate intermediate. Q88DW8 is a PanC-family
  homodimer with conserved substrate- and ATP-binding features.
  The reaction completes pantothenate synthesis but does not specify how
  KT2440 obtains beta-alanine, which is supplied by an upstream route.
