taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: gloA encodes glyoxalase I (lactoylglutathione lyase; EC 4.4.1.5), a metal-dependent enzyme of methylglyoxal detoxification.
  It converts the hemithioacetal formed from methylglyoxal and glutathione to S-lactoylglutathione, feeding the GloB glyoxalase
  II step toward D-lactate.
