  title: Engineering the Osmotic State of Pseudomonas putida KT2440 for Efficient
    Cell Disruption and Downstream Processing of Poly(3-Hydroxyalkanoates)
  findings:
  - statement: >-
      OprE (PP_0234) of P. putida KT2440 is an outer membrane integral porin; it
      was cloned and overexpressed (alone and with OprF) to modulate outer
      membrane permeability for cell disruption.
    reference_section_type: RESULTS
  reference_review:
    relevance: HIGH
    correctness: UNVERIFIED
    review_notes: >-
      PMID assigned from the Frontiers in Bioengineering and Biotechnology 2020
      paper (doi 10.3389/fbioe.2020.00161) cited in the deep-research report;
      establishes OprE as a KT2440 outer membrane porin. PubMed not directly
      confirmed in this review session.
- id: PMID:16352840
  title: Role of the novel OprD family of porins in nutrient uptake in Pseudomonas
    aeruginosa
  findings:
  - statement: >-
      Defines the OprD-family of outer membrane porins as substrate-selective
      nutrient-uptake channels in Pseudomonas; provides family-level functional
      context for OprE (substrate predictions are P. aeruginosa-oriented).
    reference_section_type: DISCUSSION
  reference_review:
    relevance: MEDIUM
    correctness: UNVERIFIED
    review_notes: >-
      Tamber, Ochs & Hancock, J Bacteriol 2006 (doi
      10.1128/JB.188.1.45-54.2006). Family-level context only; substrate
      specificity for P. putida KT2440 OprE is not directly demonstrated. PMID
      not directly confirmed against PubMed in this session.
