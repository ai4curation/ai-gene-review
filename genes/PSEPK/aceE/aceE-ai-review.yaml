  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: aceE (PP_0339) encodes the E1 component of pyruvate dehydrogenase, a thiamine-diphosphate enzyme that decarboxylates pyruvate and transfers the resulting hydroxyethyl/acetyl equivalent to the lipoyl group of the E2 component. Together with AceF and lipoamide dehydrogenase, it supports oxidative decarboxylation of pyruvate to acetyl-CoA in central carbon metabolism.
