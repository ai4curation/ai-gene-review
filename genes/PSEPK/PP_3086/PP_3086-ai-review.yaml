description: PP_3086 encodes an ECF-subfamily sigma-70 factor in Pseudomonas putida KT2440. The protein
  has conserved sigma-70 region 2 and region 4 domains, supporting a role in promoter selection and transcription-initiation
  control in the local PP_3085/PP_3086 ECF sigma anti-sigma pair.
