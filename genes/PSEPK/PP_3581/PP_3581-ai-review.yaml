  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: PP_3581 encodes a membrane-associated EAL/GGDEF cyclic-guanylate-specific phosphodiesterase
  candidate with MHYT sensor domains in Pseudomonas putida KT2440. It is a c-di-GMP hydrolysis node in
  the ppu02025 biofilm bucket, with a possible nitric-oxide-responsive sensor context inferred electronically.
