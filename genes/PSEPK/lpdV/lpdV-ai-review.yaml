  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: lpdV (PP_4404) encodes another dihydrolipoyl dehydrogenase-family E3 enzyme. The protein carries the FAD/NAD-linked disulfide oxidoreductase domains and is predicted to reoxidize dihydrolipoyl groups in 2-oxoacid dehydrogenase complexes. It is central-carbon adjacent but its specific partner complex is not resolved by the current electronic annotations.
