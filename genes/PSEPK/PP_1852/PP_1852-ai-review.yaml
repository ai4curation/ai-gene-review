description: >-
  PP_1852 is a predicted NADPH-dependent enoyl-ACP reductase-family protein in
  Pseudomonas putida KT2440. Its submitted EC assignment supports reduction of
  an ACP-linked enoyl substrate, but the protein is not the canonical FabV
  enzyme and its physiological pathway, ACP partner, and capacity to support
  core FAS-II elongation remain unresolved.
