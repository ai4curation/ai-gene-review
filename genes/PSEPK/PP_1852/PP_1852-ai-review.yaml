  reference_review:
    relevance: HIGH
    correctness: UNVERIFIED
    review_notes: >-
      Provider-generated gene report. Its database-conflict and
      no-target-study findings are retained. Its categorical fold-based
      rejection of enoyl reduction is not adopted because characterized FabL
      is an SDR-family NADPH-dependent enoyl-ACP reductase.
- id: PMID:11007778
  title: The enoyl-[acyl-carrier-protein] reductases FabI and FabL from Bacillus subtilis.
  findings:
  - statement: >-
      Purified Bacillus FabL establishes that an SDR-family protein can
      catalyze NADPH-dependent enoyl-ACP reduction.
    supporting_text: >-
      The purified YgaA protein catalyzed the NADPH-dependent reduction of
      trans-2-enoyl thioesters of both N-acetylcysteamine and ACP.
    reference_section_type: ABSTRACT
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified direct biochemical study of the FabL family exemplar,
      not PP_1852; used only to evaluate the provider's fold-based argument.
core_functions:
- description: >-
    Likely NADPH-dependent SDR-family oxidoreductase; whether PP_1852 performs
    enoyl-thioester reduction, carbonyl reduction, or another reaction remains
    unresolved, as does its physiological substrate and pathway.
  supported_by:
  - reference_id: file:PSEPK/PP_1852/PP_1852-uniprot.txt
    supporting_text: 'Belongs to the short-chain dehydrogenases/reductases (SDR)'
  - reference_id: file:PSEPK/PP_1852/PP_1852-deep-research-openscientist.md
    supporting_text: >-
      Both database EC assignments are unverified and contradictory. UniProt
      (EC 1.3.1.10, enoyl-ACP reductase) and KEGG (EC 1.1.1.100, FabG-type
      ketoreductase) disagree, and neither is experimentally grounded.
proposed_new_terms: []
suggested_questions:
- question: >-
    Does PP_1852 reduce an enoyl-ACP substrate, a 3-oxoacyl substrate, or a
    different small-molecule carbonyl?
suggested_experiments:
- description: >-
    Test purified PP_1852 with matched panels of chain-length-resolved
    enoyl-AcpP and 3-oxoacyl-AcpP substrates, compare NADPH with NADH, and ask
    whether expression rescues conditional fabV or fabG depletion.
