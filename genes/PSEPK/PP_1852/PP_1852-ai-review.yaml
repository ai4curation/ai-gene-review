id: Q88LS6
gene_symbol: PP_1852
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: >-
  PP_1852 is an experimentally uncharacterized short-chain
  dehydrogenase/reductase-family protein of Pseudomonas putida KT2440. Its
  submitted name and EC number predict NADPH-dependent enoyl-ACP reduction,
  whereas other database and domain interpretations favor a FabG-like carbonyl
  reductase. No direct study resolves its substrate or pathway, and it is not
  used as the canonical FAS-II enoyl reductase because KT2440 has FabV.
existing_annotations:
- term:
    id: GO:0141148
    label: enoyl-[acyl-carrier-protein] reductase (NADPH) activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000003
  qualifier: enables
  review:
    summary: Plausible electronic assignment, but the reaction remains unresolved.
    action: UNDECIDED
    reason: >-
      The target has no direct biochemical or genetic characterization. Its
      submitted EC 1.3.1.10 assignment conflicts with a FabG-like
      ketoreductase interpretation. An SDR fold alone cannot resolve the
      conflict because experimentally characterized Bacillus FabL is also an
      SDR-family NADPH-dependent enoyl-ACP reductase.
    supported_by:
    - reference_id: file:PSEPK/PP_1852/PP_1852-uniprot.txt
      supporting_text: 'SubName: Full=Enoyl-[acyl-carrier-protein] reductase (NADPH, B-specific)'
    - reference_id: file:PSEPK/PP_1852/PP_1852-deep-research-openscientist.md
      supporting_text: >-
        Both database EC assignments are unverified and contradictory. UniProt
        (EC 1.3.1.10, enoyl-ACP reductase) and KEGG (EC 1.1.1.100, FabG-type
        ketoreductase) disagree, and neither is experimentally grounded.
    - reference_id: PMID:11007778
      supporting_text: >-
        The purified YgaA protein catalyzed the NADPH-dependent reduction of
        trans-2-enoyl thioesters of both N-acetylcysteamine and ACP.
