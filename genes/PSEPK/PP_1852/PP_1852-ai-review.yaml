  title: OpenScientist deep-research report for PSEPK PP_1852
  findings:
  - statement: >-
      The report finds that the submitted enoyl-ACP and FabG-like ketoreductase
      assignments conflict and are both unverified for PP_1852.
    supporting_text: >-
      Both database EC assignments are unverified and contradictory. UniProt
