  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: >-
  PaaH is an NAD-dependent 3-hydroxyadipyl-CoA dehydrogenase in the aerobic
  phenylacetate degradation pathway of Pseudomonas putida KT2440. It acts in
  the beta-oxidation-like lower pathway on an open-chain CoA-ester
  intermediate generated after aromatic-ring opening.
