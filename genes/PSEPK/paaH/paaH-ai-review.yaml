  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: 'paaH encodes a 3-hydroxyacyl-CoA dehydrogenase-family enzyme in the phenylacetate catabolic
  pathway. The likely physiological role is dehydrogenation of an aromatic-pathway hydroxyacyl-CoA intermediate
  rather than generic fatty-acid beta-oxidation.'
