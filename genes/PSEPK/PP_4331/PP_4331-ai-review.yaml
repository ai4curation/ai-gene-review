description: PP_4331 encodes a small predicted single-pass membrane protein with a DUF2802
  domain in Pseudomonas putida KT2440. UniProt/ProtNLM names it as a chemotaxis protein,
  and its locus is adjacent to the curated PP_4332-PP_4340 Che cluster by ordered-locus
  numbering, but no GOA row currently supports a specific molecular function or biological
  process. This first pass therefore keeps PP_4331 as a low-confidence membrane accessory
  candidate rather than asserting a new chemotaxis term.
