    id: GO:0008677
    label: 2-dehydropantoate 2-reductase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: The family evidence does not resolve ketopantoate as the substrate of Q88IK1.
    action: UNDECIDED
    reason: >-
      The annotation is an electronic EC/rule transfer from an ApbA/KPR-related
      family rather than a direct assay. This family contains proteins assigned
      as ketopantoate reductases, but the experimentally characterized
      Pseudomonas member PaKPR2 has lost ketopantoate activity and instead
      reduces other alpha-keto acids. PP_2998 is not the reciprocal-best
      KT2440 ortholog of PaKPR2, so that negative result cannot be transferred
      confidently either. Direct biochemistry or closer orthology is needed.
    supported_by:
    - reference_id: file:PSEPK/PP_2998/PP_2998-goa.tsv
      supporting_text: "GO:0008677\t2-dehydropantoate 2-reductase activity"
    - reference_id: file:PSEPK/PP_2998/PP_2998-uniprot.txt
      supporting_text: "DR   InterPro; IPR051402; KPR-Related."
    - reference_id: file:PSEPK/PP_2998/PP_2998-notes.md
      supporting_text: "The family-level evidence therefore does not resolve Q88IK1 substrate"
    - reference_id: PMID:38962820
      supporting_text: "resulting in its inactivity toward the natural substrate ketopantoate"
    - reference_id: file:PSEPK/PP_2998/PP_2998-deep-research-openscientist.md
      supporting_text: "No direct experimental data on the *P. putida* protein."
