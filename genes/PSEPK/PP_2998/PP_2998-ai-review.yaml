id: Q88IK1
gene_symbol: PP_2998
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: >-
  PP_2998 encodes a soluble ApbA-fold NAD(P)-dependent oxidoreductase related
  to ketopantoate reductases. Q88IK1 belongs to a KPR-related PANTHER family
  distinct from the canonical PanE family. Members of this broader family have
  divergent alpha-keto-acid substrate preferences, and the native substrate
  and physiological pathway of the KT2440 protein remain unresolved.
