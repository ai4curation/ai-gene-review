suggested_questions:
- question: Does Q88IK1 reduce ketopantoate, and what substrate and pathway dominate in vivo?
suggested_experiments:
- description: >-
    Purify Q88IK1 and compare ketopantoate reduction with a diverse
    alpha-keto-acid panel using NADPH and NADH, then test panE and PP_2998
    single and double mutants for pantothenate auxotrophy and metabolite changes.
  experiment_type: biochemical and genetic analysis
