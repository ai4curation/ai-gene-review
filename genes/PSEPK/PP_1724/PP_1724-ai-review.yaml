description: PP_1724 encodes a multi-pass inner-membrane permease subunit of a predicted 2-aminoethylphosphonate/phosphonate ABC import system in Pseudomonas putida KT2440. Its product name and MetI-like ABC permease domain support a role with PP_1722 and PP_1723 in organic phosphonate uptake.
