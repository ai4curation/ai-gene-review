suggested_questions:
- question: Which organic phosphonate substrates are bound or transported by PP_1724, and is 2-aminoethylphosphonate the physiological substrate of the PP_1722-PP_1726 importer?
suggested_experiments:
- description: Test growth, radiotracer or LC-MS uptake, and phosphate-limitation induction for a PP_1724 deletion strain on 2-aminoethylphosphonate and related organic phosphonates, with genetic complementation.
  experiment_type: targeted transporter mutant substrate-uptake assay
