description: >-
  PP_3350 encodes a signal-peptide-bearing AlgE/alginate export-domain protein
  in Pseudomonas putida KT2440. Its PF13372/IPR025388 alginate export domain
  and IPR053728 alginate permeability-channel profile support a candidate
  alginate envelope-export role, but no precise GO molecular-function term is
  assigned in this first pass.
