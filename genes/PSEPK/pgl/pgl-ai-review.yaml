  review:
    summary: General carbohydrate metabolic process term; correct but superseded by
      the more specific pentose-phosphate shunt annotation.
    action: MARK_AS_OVER_ANNOTATED
    reason: This is a high-level grouping term. It is not incorrect, but the more
      specific child term GO:0006098 (pentose-phosphate shunt) is also annotated and
      better captures the precise biological process for 6-phosphogluconolactonase.
      Retain as non-core/over-annotated background.
- term:
    id: GO:0006098
    label: pentose-phosphate shunt
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: involved_in
  review:
    summary: 6-phosphogluconolactonase catalyzes step 2 of the oxidative stage of
      the pentose phosphate pathway (D-ribulose 5-phosphate from D-glucose 6-phosphate),
      consistent with UniPathway UPA00115 and the enzyme's established role.
    action: ACCEPT
    reason: Well-supported by enzyme function and pathway membership (UniPathway UER00409,
      oxidative PPP step 2/3). This is a core biological process for the gene. Note
      that in P. putida the 6-phosphogluconate product predominantly feeds the Entner-Doudoroff
      pathway, but the PPP oxidative-stage annotation accurately reflects the enzymatic
      step.
