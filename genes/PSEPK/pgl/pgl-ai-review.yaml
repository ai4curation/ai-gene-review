    action: ACCEPT
    reason: Core molecular function. Supported by UniRule/ARBA annotation, RHEA reaction
      mapping, EC 3.1.1.31, and family/domain assignment (TIGR01198 pgl; PANTHER PTHR11054;
      CDD cd01400 6PGL). The protein is a clear member of the 6-phosphogluconolactonase
      subfamily.
