taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: 6-phosphogluconolactonase (6PGL; EC 3.1.1.31) is a cytoplasmic hydrolase
  that catalyzes the hydrolysis of 6-phospho-D-glucono-1,5-lactone to 6-phospho-D-gluconate.
  This reaction is the second step of the oxidative branch of glucose-6-phosphate
  catabolism, following the glucose-6-phosphate dehydrogenase (Zwf) reaction. The
  6-phosphogluconate product is the central branch-point metabolite that feeds both
  the Entner-Doudoroff pathway and the pentose phosphate pathway. In Pseudomonas putida
  KT2440 the gene (PP_1023) is part of a conserved zwf-pgl-eda operon dedicated to
  upper glucose catabolism. The protein belongs to the glucosamine/galactosamine-6-phosphate
  isomerase family, 6-phosphogluconolactonase subfamily.
