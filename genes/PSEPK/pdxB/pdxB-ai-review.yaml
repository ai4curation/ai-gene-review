id: Q88L20
gene_symbol: pdxB
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: >-
    Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 /
    NCIMB 11950 / KT2440)
description: >-
  PdxB is an NAD-dependent erythronate-4-phosphate dehydrogenase
  (EC 1.1.1.290). It oxidizes 4-phospho-D-erythronate to
  (R)-3-hydroxy-2-oxo-4-phosphooxybutanoate in the second reaction of the
  DXP-dependent bacterial pyridoxine 5'-phosphate pathway. The product is
  transaminated by SerC and ultimately combined with DXP to form the vitamin-B6
  ring.
existing_annotations:
  - term:
      id: GO:0005737
      label: cytoplasm
    evidence_type: IEA
    original_reference_id: GO_REF:0000120
    qualifier: located_in
    review:
      summary: PdxB is a soluble cytoplasmic enzyme.
      action: KEEP_AS_NON_CORE
      reason: Cytoplasm is appropriate bacterial context but is not the core function.
  - term:
      id: GO:0005829
      label: cytosol
    evidence_type: IEA
    original_reference_id: GO_REF:0000118
    qualifier: located_in
    review:
      summary: Cytosol adds redundant precision to the existing cytoplasm annotation.
      action: MARK_AS_OVER_ANNOTATED
      reason: >-
        Retaining both terms duplicates the same useful localization statement
        for this soluble bacterial enzyme.
  - term:
      id: GO:0008615
      label: pyridoxine biosynthetic process
    evidence_type: IEA
    original_reference_id: GO_REF:0000120
    qualifier: involved_in
    review:
      summary: PdxB performs the second reaction of pyridoxine phosphate synthesis.
      action: ACCEPT
      reason: UniPathway UPA00244 assigns Q88L20 to step 2 of the pathway.
  - term:
      id: GO:0016491
      label: oxidoreductase activity
    evidence_type: IEA
    original_reference_id: GO_REF:0000104
    qualifier: enables
    review:
      summary: This root oxidoreductase term is uninformative.
      action: MARK_AS_OVER_ANNOTATED
      reason: The exact PdxB activity GO:0033711 is already present.
  - term:
      id: GO:0016616
      label: >-
        oxidoreductase activity, acting on the CH-OH group of donors, NAD or
        NADP as acceptor
    evidence_type: IEA
    original_reference_id: GO_REF:0000120
    qualifier: enables
    review:
      summary: This reaction-class parent is redundant with GO:0033711.
      action: MARK_AS_OVER_ANNOTATED
      reason: It omits the biologically informative phosphoerythronate substrate.
  - term:
      id: GO:0033711
      label: 4-phosphoerythronate dehydrogenase activity
    evidence_type: IEA
    original_reference_id: GO_REF:0000120
    qualifier: enables
    review:
      summary: This is the defining catalytic activity of PdxB.
      action: ACCEPT
      reason: >-
        GO:0033711 matches EC 1.1.1.290, RHEA:18829, the reviewed UniProt
        reaction, and the PdxB-specific family assignment.
      supported_by:
        - reference_id: file:PSEPK/pdxB/pdxB-deep-research-openscientist.md
          supporting_text: >-
            **pdxB** encodes **erythronate-4-phosphate dehydrogenase (PdxB; EC
            1.1.1.290)**
  - term:
      id: GO:0036001
      label: "'de novo' pyridoxal 5'-phosphate biosynthetic process"
    evidence_type: IEA
    original_reference_id: GO_REF:0000118
    qualifier: involved_in
    review:
      summary: PdxB is an established component of the DXP-dependent de novo PLP route.
      action: ACCEPT
      reason: The process term precisely captures the pathway context.
  - term:
      id: GO:0046983
      label: protein dimerization activity
    evidence_type: IEA
    original_reference_id: GO_REF:0000002
    qualifier: enables
    review:
      summary: Dimerization is a structural property rather than an informative activity annotation.
      action: MARK_AS_OVER_ANNOTATED
      reason: The term adds no pathway or reaction specificity beyond the exact enzyme activity.
  - term:
      id: GO:0051287
      label: NAD binding
    evidence_type: IEA
    original_reference_id: GO_REF:0000002
    qualifier: enables
    review:
      summary: NAD is the electron acceptor for the PdxB reaction.
      action: KEEP_AS_NON_CORE
      reason: Valid cofactor binding is secondary to the exact catalytic activity.
