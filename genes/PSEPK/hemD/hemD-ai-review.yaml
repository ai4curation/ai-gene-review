  - id: file:PSEPK/hemD/hemD-deep-research-openscientist.md
    title: OpenScientist research report for PSEPK hemD
    findings:
      - statement: >-
          The report recovers the HemD reaction but acknowledges the absence of
          direct characterization of the KT2440 protein.
        supporting_text: >-
          No direct experimental characterization of the *P. putida* protein.
    reference_review:
      relevance: HIGH
      correctness: MISCITED
      review_notes: >-
        The report correctly identifies hydroxymethylbilane cyclization and
        ring-D inversion. It presents unsaved hydropathy and sequence analyses,
        infers monomeric and cytoplasmic status, treats gene adjacency as an
        operon-level physiological argument, and transfers detailed mechanism
        and essentiality from orthologs. Its pathway sketch also omits the
        KT2440 HemJ-family PP_0431 step. Those target-specific conclusions were
        not retained.
core_functions:
  - description: >-
      Cyclizes hydroxymethylbilane with ring inversion to form
      uroporphyrinogen III, the shared tetrapyrrole precursor for heme b.
    molecular_function:
