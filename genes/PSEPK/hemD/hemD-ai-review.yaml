id: Q88RE4
gene_symbol: hemD
product_type: PROTEIN
aliases:
  - PP_0187
status: COMPLETE
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: >-
  HemD is uroporphyrinogen-III synthase. It cyclizes the linear HemC product
  hydroxymethylbilane with inversion of the terminal pyrrole ring to generate
  uroporphyrinogen III, the common branch-point tetrapyrrole used for heme and
  other modified tetrapyrroles.
existing_annotations:
  - term:
      id: GO:0004852
      label: uroporphyrinogen-III synthase activity
    evidence_type: IEA
    original_reference_id: GO_REF:0000120
    qualifier: enables
    review:
      summary: This is the specific catalytic function predicted for HemD.
      action: ACCEPT
      reason: >-
        UniProt assigns EC 4.2.1.75 and describes cyclization and terminal-ring
        inversion of hydroxymethylbilane to uroporphyrinogen III.
      supported_by:
        - reference_id: file:PSEPK/hemD/hemD-uniprot.txt
          supporting_text: Catalyzes cyclization of the linear tetrapyrrole,
  - term:
      id: GO:0006780
      label: uroporphyrinogen III biosynthetic process
    evidence_type: IEA
    original_reference_id: GO_REF:0000120
    qualifier: involved_in
    review:
      summary: HemD directly produces uroporphyrinogen III.
      action: ACCEPT
      reason: >-
        This process term exactly matches the product-forming role of HemD and
        is preferable to broader tetrapyrrole-process terms.
      supported_by:
        - reference_id: file:PSEPK/hemD/hemD-uniprot.txt
          supporting_text: "Reaction=hydroxymethylbilane = uroporphyrinogen III + H2O;"
  - term:
      id: GO:0033014
      label: tetrapyrrole biosynthetic process
    evidence_type: IEA
    original_reference_id: GO_REF:0000002
    qualifier: involved_in
    review:
      summary: This broad process parent is correct but less informative than the product-specific term.
      action: KEEP_AS_NON_CORE
      reason: >-
        HemD directly participates in tetrapyrrole synthesis, while GO:0006780
        more precisely captures formation of its uroporphyrinogen III product.
      supported_by:
        - reference_id: file:PSEPK/hemD/hemD-uniprot.txt
          supporting_text: "Reaction=hydroxymethylbilane = uroporphyrinogen III + H2O;"
