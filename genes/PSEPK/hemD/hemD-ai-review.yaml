        supporting_text: Catalyzes cyclization of the linear tetrapyrrole,
suggested_questions:
  - question: Does the hemC-hemD neighborhood support transcriptional coupling in KT2440?
suggested_experiments:
  - hypothesis: HemD is the principal uroporphyrinogen-III synthase in KT2440.
    description: >-
      Measure uroporphyrinogen isomers after hemD depletion and genetic
      complementation under controlled oxygen conditions.
