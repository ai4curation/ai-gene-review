description: mnmA encodes tRNA-specific 2-thiouridylase MnmA/TrmU. It catalyzes ATP-dependent 2-thiolation of wobble-position
  uridine in tRNA, using sulfur supplied through protein-bound sulfane sulfur from the upstream Tus sulfur-relay system.
