  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: pbpG (PP_3794) encodes a predicted periplasmic murein D-alanyl-D-alanine endopeptidase/serine-type D-Ala-D-Ala
  carboxypeptidase-family protein. It carries peptidase S11 and beta-lactam/transpeptidase-like domains and is inferred to
  participate in peptidoglycan maturation or remodeling rather than cytosolic precursor synthesis.
