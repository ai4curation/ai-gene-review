  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: DdlB is a D-alanine-D-alanine ligase of Pseudomonas putida KT2440. It uses ATP and divalent metal ions to ligate two D-alanine molecules into D-alanyl-D-alanine, supplying a key dipeptide for peptidoglycan biosynthesis.
