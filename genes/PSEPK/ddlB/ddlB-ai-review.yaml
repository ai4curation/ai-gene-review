- id: file:PSEPK/ddlB/ddlB-deep-research-openscientist.md
  title: OpenScientist deep-research report for PSEPK ddlB
  findings:
  - statement: The report identifies DdlB as the ATP-dependent enzyme that forms D-Ala-D-Ala for MurF-dependent pentapeptide assembly.
    supporting_text: >-
      DdlB provides the D-Ala-D-Ala dipeptide that the ligase **MurF** adds
      to UDP-MurNAc-tripeptide, completing **UDP-MurNAc-pentapeptide**
    reference_section_type: RESULTS
  - statement: Direct biochemical characterization of the KT2440 target remains unavailable.
    supporting_text: >-
      **Direct experimental evidence for PP_1339 (Q88N74) itself is
      lacking**; no *P. putida*-specific enzymology, structure, or knockout
      was found.
    reference_section_type: DISCUSSION
