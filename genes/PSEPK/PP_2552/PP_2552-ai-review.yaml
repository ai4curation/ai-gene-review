description: PP_2552 encodes a predicted cytoplasmic, pyridoxal phosphate-dependent aromatic-L-amino-acid decarboxylase annotated as DOPA decarboxylase (EC 4.1.1.28). In the ppu00350 batch it is a tyrosine/DOPA side-node enzyme rather than a committed homogentisate-pathway step.
