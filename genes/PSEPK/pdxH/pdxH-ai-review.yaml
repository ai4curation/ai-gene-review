id: Q88NS5
gene_symbol: pdxH
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: >-
    Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 /
    NCIMB 11950 / KT2440)
description: >-
  PdxH is an FMN-dependent pyridoxine/pyridoxamine 5'-phosphate oxidase
  (EC 1.4.3.5). It oxidizes pyridoxine 5'-phosphate or pyridoxamine
  5'-phosphate to pyridoxal 5'-phosphate (PLP), producing the active vitamin-B6
  cofactor. The enzyme completes DXP-dependent de novo PLP biosynthesis and also
  serves the vitamin-B6 salvage pathway.
existing_annotations:
  - term:
      id: GO:0004733
      label: pyridoxamine phosphate oxidase activity
    evidence_type: IEA
    original_reference_id: GO_REF:0000120
    qualifier: enables
    review:
      summary: This term captures both physiologically supported PNP/PMP oxidation reactions.
      action: ACCEPT
      reason: >-
        GO:0004733 matches EC 1.4.3.5, RHEA:15149 and RHEA:15817, and the
        reviewed PdxH entry.
      supported_by:
        - reference_id: file:PSEPK/pdxH/pdxH-deep-research-openscientist.md
          supporting_text: >-
            The product of *pdxH* (PP_1129) in *Pseudomonas putida* KT2440 is
            pyridoxine/pyridoxamine 5'-phosphate oxidase (PNPOx, EC 1.4.3.5)
  - term:
      id: GO:0008615
      label: pyridoxine biosynthetic process
    evidence_type: IEA
    original_reference_id: GO_REF:0000002
    qualifier: involved_in
    review:
      summary: PdxH consumes PNP or PMP and forms PLP; it does not synthesize pyridoxine.
      action: REMOVE
      reason: >-
        GO:0008615 names pyridoxine synthesis, whereas PdxH consumes PNP or PMP
        and forms PLP. The correct GO:0042823 PLP-biosynthesis annotation is
        already present separately, so replacement here would duplicate it.
  - term:
      id: GO:0010181
      label: FMN binding
    evidence_type: IEA
    original_reference_id: GO_REF:0000120
    qualifier: enables
    review:
      summary: PdxH binds one FMN cofactor per subunit.
      action: KEEP_AS_NON_CORE
      reason: FMN binding is valid but secondary to the oxidase activity.
  - term:
      id: GO:0016638
      label: oxidoreductase activity, acting on the CH-NH2 group of donors
    evidence_type: IEA
    original_reference_id: GO_REF:0000002
    qualifier: enables
    review:
      summary: This broad oxidoreductase parent is redundant with GO:0004733.
      action: MARK_AS_OVER_ANNOTATED
      reason: It omits the informative vitamin-B6 phosphate substrates.
  - term:
      id: GO:0042816
      label: vitamin B6 metabolic process
    evidence_type: IEA
    original_reference_id: GO_REF:0000120
    qualifier: involved_in
    review:
      summary: PdxH acts in both de novo synthesis and salvage of vitamin-B6 phosphates.
      action: ACCEPT
      reason: The broader process accurately spans both physiological contexts.
  - term:
      id: GO:0042823
      label: pyridoxal 5'-phosphate biosynthetic process
    evidence_type: IEA
    original_reference_id: GO_REF:0000118
    qualifier: involved_in
    review:
      summary: PdxH directly forms PLP from PNP or PMP.
      action: ACCEPT
      reason: This is the immediate product-forming step of PLP biosynthesis.
  - term:
      id: GO:0036001
      label: "'de novo' pyridoxal 5'-phosphate biosynthetic process"
    evidence_type: ISS
    original_reference_id: file:PSEPK/pdxH/pdxH-deep-research-openscientist.md
    qualifier: involved_in
    review:
      summary: PdxH performs the terminal oxidation in the de novo DXP-dependent route.
      action: NEW
      reason: >-
        The complete PSEPK pathway converges on PdxH after PdxJ forms PNP.
      supported_by:
        - reference_id: file:PSEPK/pdxH/pdxH-deep-research-openscientist.md
          supporting_text: >-
            PdxH sits at the **convergence point of de novo PLP biosynthesis and
            B6 salvage**
  - term:
      id: GO:0009443
      label: pyridoxal 5'-phosphate salvage
    evidence_type: ISS
    original_reference_id: file:PSEPK/pdxH/pdxH-uniprot.txt
    qualifier: involved_in
    review:
      summary: PdxH converts salvaged PNP or PMP to PLP.
      action: NEW
      reason: >-
        UniProt explicitly assigns both the PNP- and PMP-derived one-step PLP
        salvage routes to Q88NS5.
      supported_by:
        - reference_id: file:PSEPK/pdxH/pdxH-uniprot.txt
          supporting_text: >-
            pyridoxal 5'-phosphate from pyridoxamine 5'-phosphate: step 1/1.
