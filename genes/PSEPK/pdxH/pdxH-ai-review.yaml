    id: GO:0010181
    label: FMN binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: FMN binding is a required cofactor feature for PdxH but is
      secondary to oxidase activity.
    action: KEEP_AS_NON_CORE
    reason: The core molecular function is pyridoxamine phosphate oxidase
      activity.
    supported_by:
    - reference_id: file:PSEPK/pdxH/pdxH-uniprot.txt
      supporting_text: DR   GO; GO:0010181; F:FMN binding;
