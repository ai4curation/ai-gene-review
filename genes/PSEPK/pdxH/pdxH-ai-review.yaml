  - id: file:PSEPK/pdxH/pdxH-deep-research-openscientist.md
    title: OpenScientist functional report for PSEPK PdxH
    findings:
      - statement: >-
          Supports the exact PNP/PMP oxidase reaction and its convergence role
          in de novo PLP synthesis and salvage. No direct PP_1129 study was
          found; organism-specific essentiality, oligomerization, allosteric
          regulation, and PLP hand-off claims are not adopted.
