  review:
    summary: Vitamin B6 metabolic process is appropriate broad context for PdxH.
    action: ACCEPT
    reason: PdxH oxidizes phosphorylated B6 vitamers to PLP.
- term:
    id: GO:0042823
    label: pyridoxal 5'-phosphate biosynthetic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000118
  qualifier: involved_in
  review:
    summary: PdxH directly forms pyridoxal 5-phosphate from
      pyridoxine/pyridoxamine phosphate substrates.
    action: ACCEPT
    reason: This is the final oxidation step to the active PLP cofactor.
