description: PP_2182 encodes a predicted ProQ/FinO-domain RNA chaperone in Pseudomonas putida KT2440. The supported
  molecular functions are cytosolic RNA binding, RNA strand annealing, and RNA strand exchange, consistent with
  a general post-transcriptional RNA matchmaker rather than a dedicated rRNA, tRNA, or ribosome assembly factor.
