description: PP_3443 encodes an aldehyde dehydrogenase-superfamily enzyme annotated as glyceraldehyde-3-phosphate dehydrogenase [NAD(P)+] (phosphorylating), EC 1.2.1.59. The sequence is distinct from canonical type I GAPDH but is predicted to catalyze phosphorylating oxidation of glyceraldehyde 3-phosphate with NAD(P)+. It may provide an alternate lower-carbon-metabolism GAPDH-like activity.
