  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: mdtA encodes a predicted membrane-fusion/adaptor component of the MdtABC multidrug efflux
  system in Pseudomonas putida KT2440. Its RND-pump MFP domains support a periplasmic adaptor role in
  the efflux pump complex rather than independent transporter activity.
