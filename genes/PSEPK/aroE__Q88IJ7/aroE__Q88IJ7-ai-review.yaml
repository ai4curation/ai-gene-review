taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: aroE (PP_3002) encodes a predicted NADP-dependent shikimate dehydrogenase in Pseudomonas putida KT2440. Shikimate dehydrogenases catalyze the reversible NADP(H)-linked interconversion of 3-dehydroshikimate and shikimate, a central redox step of the shikimate pathway that supplies chorismate for aromatic amino acids, folate, ubiquinone, and other aromatic metabolites. The protein has shikimate-dehydrogenase substrate-binding and NAD(P)-binding domains and is inferred to be a soluble cytosolic enzyme. KT2440 encodes several aroE-like paralogs, so the in vivo division of labor among PP_0074, PP_2406, PP_3002, and PP_3768 is not resolved by current gene-level evidence.
existing_annotations:
- term:
    id: GO:0004764
    label: shikimate 3-dehydrogenase (NADP+) activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: PP_3002 is assigned to the shikimate dehydrogenase family with NAD(P)-binding and shikimate substrate-binding domains, and UniProt maps it to EC 1.1.1.25/RHEA-supported shikimate dehydrogenase activity.
    action: ACCEPT
    reason: This is the best-supported molecular function for the protein and is consistent with InterPro/HAMAP/ARBA evidence. No direct biochemical assay for this specific paralog was found, so the paralog-specific physiological contribution remains uncertain, but the molecular-function assignment is appropriate.
- term:
    id: GO:0005829
    label: cytosol
  evidence_type: IEA
  original_reference_id: GO_REF:0000118
  qualifier: located_in
  review:
    summary: Shikimate dehydrogenase is a soluble enzyme acting on central metabolic intermediates in the bacterial cytosol.
    action: ACCEPT
    reason: The sequence lacks membrane or secretion features and the inferred cytosolic localization is appropriate for a shikimate-pathway enzyme.
- term:
    id: GO:0009423
    label: chorismate biosynthetic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: involved_in
  review:
    summary: Shikimate dehydrogenase supplies shikimate for the pathway leading to chorismate, the aromatic-branch precursor.
    action: ACCEPT
    reason: Correct pathway context for a shikimate dehydrogenase. The P. putida pathway-level review notes paralog ambiguity among aroE-like genes, but that affects module assignment rather than the validity of this pathway annotation.
- term:
    id: GO:0016491
    label: oxidoreductase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000117
  qualifier: enables
  review:
    summary: Broad oxidoreductase parent term for the specific NADP-dependent shikimate dehydrogenase activity.
    action: MARK_AS_OVER_ANNOTATED
    reason: The specific term GO:0004764 already captures the molecular function. The parent oxidoreductase term adds little useful functional information.
- term:
    id: GO:0019632
    label: shikimate metabolic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: involved_in
  review:
    summary: Correct broader process context for a shikimate-pathway enzyme.
    action: KEEP_AS_NON_CORE
    reason: This is biologically true but less precise than chorismate biosynthetic process for the anabolic role captured here.
- term:
    id: GO:0050661
    label: NADP binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: NADP(H) binding is expected for NADP-dependent shikimate dehydrogenase and is supported by the conserved Rossmann-like NAD(P)-binding domain.
    action: ACCEPT
    reason: Cofactor binding is intrinsic to the annotated oxidoreductase reaction and is supported by sequence/domain evidence.
