taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: BglX (PP_1403) is a predicted periplasmic beta-glucosidase/glycoside hydrolase family 3 enzyme. It hydrolyzes terminal non-reducing beta-D-glucosyl residues, consistent with EC 3.2.1.21 and beta-glucosidase activity, and is predicted to be exported to the periplasm via an N-terminal signal peptide. In the P. putida KT2440 cyanoamino-acid KEGG map, BglX is best treated as carbohydrate/glucan catabolism boundary context rather than a dedicated cyanoamino-acid enzyme.
