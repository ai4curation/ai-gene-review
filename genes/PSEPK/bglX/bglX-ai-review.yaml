    summary: The broad O-glycosyl hydrolase annotation is correct at family level but less informative than beta-glucosidase activity.
    action: MODIFY
    reason: UniProt/GOA identify BglX specifically as a periplasmic beta-glucosidase with EC 3.2.1.21. The broad hydrolase activity should be refined to beta-glucosidase activity.
