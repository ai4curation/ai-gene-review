description: aruC (PP_0372) encodes a PLP-dependent acetylornithine/ornithine aminotransferase annotated with EC 2.6.1.11
  and EC 2.6.1.13. It is a KEGG ppu00220 boundary candidate and may overlap the acetylornithine aminotransferase chemistry
  of the canonical ArgD step, but local metadata does not distinguish a committed arginine-biosynthetic role from broader
  ornithine/lysine-side metabolism.
