  qualifier: enables
  review:
    summary: Generic self-binding does not identify a distinct biological function of PP_0372.
    action: MARK_AS_OVER_ANNOTATED
    reason: The TreeGrafter term is less informative than the enzyme reaction and lacks target-specific oligomer evidence.
- term:
    id: GO:0006526
    label: L-arginine biosynthetic process
  evidence_type: ISS
  original_reference_id: file:PSEPK/aruC/aruC-deep-research-openscientist.md
  qualifier: involved_in
  review:
    summary: PP_0372 is the strongest KT2440 candidate for the anabolic acetylornithine-transaminase step.
    action: NEW
    reason: >-
      K00821 orthology, the SF79 family assignment, separation from the
      PP_4481 AST operon, and the retained prototrophy of a PP_4481 insertion
      mutant support an inferred role in L-arginine biosynthesis.
    supported_by:
    - reference_id: file:PSEPK/aruC/aruC-deep-research-openscientist.md
      supporting_text: >-
        PP_0372 (Q88QW2) is best described as the **cytoplasmic, PLP-dependent
        acetylornithine aminotransferase (ArgD) of L-arginine biosynthesis** in
        *P. putida* KT2440
