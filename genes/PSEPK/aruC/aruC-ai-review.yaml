suggested_questions:
- question: >-
    Does PP_0372 preferentially transaminate N-acetylornithine in vivo, and
    does it also contribute measurably to free-ornithine or
    N-succinyldiaminopimelate metabolism?
  experts:
  - microbial arginine and lysine metabolism
  - PLP-dependent aminotransferases
suggested_experiments:
- description: >-
    Purify Q88QW2 and compare catalytic efficiencies for N-acetylornithine,
    free ornithine, N-succinylornithine, and N-succinyl-LL-diaminopimelate;
    test PP_0372 and PP_4481 single and double mutants for arginine auxotrophy.
  experiment_type: comparative enzyme kinetics and targeted genetics
