id: Q88QW2
gene_symbol: aruC
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: >-
  AruC/PP_0372 is a predicted pyridoxal-phosphate-dependent class-III
  acetylornithine aminotransferase (EC 2.6.1.11). Orthology and family evidence
  place it in the anabolic ArgD-like branch that forms N-acetyl-L-ornithine
  during L-arginine biosynthesis, distinct from the AstC-like PP_4481 enzyme in
  the arginine succinyltransferase catabolic operon. Direct PP_0372
  substrate-specificity and genetic data are not available, and its additional
  free-ornithine or lysine-pathway activities remain unresolved.
existing_annotations:
- term:
    id: GO:0003992
    label: N2-acetyl-L-ornithine:2-oxoglutarate 5-transaminase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000003
  qualifier: enables
  review:
    summary: This is the predicted anabolic ArgD-like reaction of PP_0372.
    action: ACCEPT
    reason: >-
      UniProt assigns EC 2.6.1.11, PANTHER places Q88QW2 in the predominantly
      anabolic SF79 branch, and OpenScientist retrieved a separate K00821
      orthology from the PP_4481/K00840 catabolic enzyme. The assignment remains
      an inference because PP_0372 has not been assayed directly.
    supported_by:
    - reference_id: file:PSEPK/aruC/aruC-uniprot.txt
      supporting_text: Full=Acetylornithine aminotransferase 2
    - reference_id: file:PSEPK/aruC/aruC-deep-research-openscientist.md
      supporting_text: >-
        **PP_0372 (UniProt Q88QW2), labelled "aruC," encodes a cytoplasmic,
        pyridoxal-5′-phosphate (PLP)-dependent class-III aminotransferase whose
        primary annotated function is acetylornithine aminotransferase (EC
        2.6.1.11), the ArgD step of L-arginine biosynthesis.**
- term:
    id: GO:0004587
    label: L-ornithine transaminase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000003
  qualifier: enables
  review:
    summary: Free L-ornithine transamination is possible but not established for PP_0372.
    action: UNDECIDED
    reason: >-
      EC 2.6.1.13 is present in the submitted UniProt annotation, but no direct
      substrate screen exists and the anabolic clade is better supported for
      N-acetylornithine transamination.
    supported_by:
    - reference_id: file:PSEPK/aruC/aruC-deep-research-openscientist.md
      supporting_text: >-
        **Residual EC ambiguity.** UniProt lists EC 2.6.1.11 **and** 2.6.1.13
        (ornithine aminotransferase), and KEGG adds 2.6.1.17.
- term:
    id: GO:0008483
    label: transaminase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000117
  qualifier: enables
  review:
    summary: This generic term is redundant with the substrate-specific ArgD-like activity.
    action: MARK_AS_OVER_ANNOTATED
    reason: GO:0003992 provides the informative predicted reaction.
- term:
    id: GO:0030170
    label: pyridoxal phosphate binding
