  title: OpenScientist functional synthesis for PSEPK AruC/PP_0372
  findings:
  - statement: >-
      Orthology and pathway context separate PP_0372 as the anabolic ArgD-like
      enzyme from catabolic PP_4481 while documenting the absence of direct
      PP_0372 enzymology.
    supporting_text: >-
      The key caveat is that all substrate and localization assignments for
      PP_0372 derive from orthology, genomic context, and conserved active-site
      residues — no direct enzymology has been performed on PP_0372 or its close
      ortholog PA0530 themselves.
core_functions:
