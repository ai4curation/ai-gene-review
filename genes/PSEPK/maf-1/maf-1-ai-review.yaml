  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: maf-1 encodes a Maf-family dTTP/UTP pyrophosphatase that hydrolyzes dTTP and UTP to the corresponding monophosphate
  plus diphosphate. It is a pyrimidine nucleotide-pool maintenance and sanitizing enzyme rather than a committed de novo UMP
  biosynthesis enzyme.
