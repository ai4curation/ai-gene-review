references:
- id: GO_REF:0000002
  title: Gene Ontology annotation through association of InterPro records with GO terms.
  findings:
  - statement: InterPro2GO supplies domain/family-based automated annotations that require
      review against the gene-specific UniProt and literature context.
- id: file:PSEPK/alr/alr-uniprot.txt
  title: UniProtKB reviewed entry for alr
  findings:
  - statement: UniProt identifies Alr as a broad-specificity amino-acid racemase with highest
      activity on lysine and arginine and periplasmic localization.
- id: GO_REF:0000118
  title: TreeGrafter-generated Gene Ontology annotations based on phylogenetic placement.
  findings:
  - statement: TreeGrafter supplies phylogenetic annotations that can over-transfer generic
      location or process terms.
- id: GO_REF:0000120
  title: Combined automated GO annotation using multiple IEA methods.
  findings:
  - statement: Combined automated methods provide provisional GO annotations that require
      gene-level review.
- id: GO_REF:0000116
  title: Gene Ontology annotation based on Rhea reaction mapping.
  findings:
  - statement: Rhea mapping supplies reaction-specific molecular-function annotations from
      curated reaction equations.
- id: PMID:30008699
  title: A Broad Spectrum Racemase in Pseudomonas putida KT2440 Plays a Key Role in Amino
    Acid Catabolism.
  findings:
  - statement: Genetic and biochemical work showed Alr is periplasmic and supports L-lysine/L-arginine
      catabolism.
- id: PMID:23995642
  title: Amino acid racemization in Pseudomonas putida KT2440.
  findings:
  - statement: Biochemical assays established broad amino-acid racemase activity, especially
      lysine and arginine racemization.
- id: file:PSEPK/alr/alr-deep-research-falcon.md
  title: Falcon (Edison Scientific) deep research report on alr (PP_3722; UniProt Q88GJ9)
    in Pseudomonas putida KT2440
  findings:
  - statement: |-
      encoding a **broad-spectrum amino-acid racemase** (often termed BSAR) rather than the canonical alanine-specific housekeeping racemase
    reference_section_type: OTHER
  - statement: |-
      physiologically, the strongest evidence supports racemization of **Lys** and **Arg** rather than a primary alanine-specific role
    reference_section_type: OTHER
  - statement: |-
      Alr activity was experimentally enriched in the **periplasmic fraction**, consistent with a predicted secretion/targeting signal
    reference_section_type: OTHER
  - statement: |-
      The best-supported organism-specific function is **basic amino-acid catabolism**, especially **L-Lys** and **L-Arg** utilization via racemization to their D-forms
    reference_section_type: OTHER
  - statement: |-
      Alr products were not detectably incorporated into peptidoglycan under the tested conditions
    reference_section_type: OTHER
  - statement: |-
      Stationary-phase peptidoglycan composition did **not differ significantly** between wild type and Δalr
    reference_section_type: OTHER
  - statement: |-
      its **highest catalytic efficiency is on lysine**
    reference_section_type: OTHER
  - statement: |-
      lysine catalytic efficiency is ~**3 orders of magnitude** higher than alanine
    reference_section_type: OTHER
  - statement: |-
      Family/domain context and experimental literature are consistent with a **PLP-dependent alanine racemase-like mechanism**
    reference_section_type: OTHER
  - statement: |-
      measurable racemase activity on **9 of 19** chiral amino acids
    reference_section_type: OTHER
  - statement: |-
      differential expression largely restricted to **amino-acid metabolism** genes, not a broad signaling regulon
    reference_section_type: OTHER
