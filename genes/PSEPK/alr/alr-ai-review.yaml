suggested_questions:
- question: Are there condition-specific substrates, partners, or regulatory contexts for
    alr that would justify narrower GO annotations than the conservative terms retained here?
  experts:
  - Pseudomonas putida functional-genomics and pathway experts
suggested_experiments:
- description: Generate a clean alr deletion or CRISPRi depletion strain and assay the predicted
    pathway or molecular activity under the growth condition most directly tied to the retained
    core function.
