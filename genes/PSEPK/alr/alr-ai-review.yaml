suggested_questions:
- question: Which downstream enzymes consume the D-arginine generated by periplasmic Alr
    during L-arginine catabolism in P. putida KT2440?
  experts:
  - Pseudomonas amino-acid metabolism experts
suggested_experiments:
- description: Compare wild type, alr deletion, and complemented strains for growth and
    extracellular D/L-lysine and D/L-arginine profiles when L-lysine or L-arginine is the
    sole carbon and nitrogen source.
  experiment_type: targeted metabolomics with growth complementation
