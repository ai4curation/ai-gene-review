  - reference_id: file:PSEPK/alr/alr-uniprot.txt
    supporting_text: Plays a primary role in the catabolism of basic amino acid
  - reference_id: PMID:30008699
    supporting_text: Data presented here support a role for Alr in the catabolism of l-Lys
      and l-Arg through conversion to their respective d-enantiomers.
    reference_section_type: DISCUSSION
