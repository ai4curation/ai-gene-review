  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: alr encodes a broad-specificity periplasmic amino-acid racemase in P. putida KT2440. Although annotated as alanine racemase by family inference, experimental work shows the enzyme has much higher catalytic efficiency for lysine and arginine than alanine and supports a primary role in L-lysine and L-arginine catabolism through conversion to the corresponding D-enantiomers.
