references:
- id: GO_REF:0000002
  title: Gene Ontology annotation through association of InterPro records with GO terms.
  findings:
  - statement: InterPro2GO supplies domain/family-based automated annotations that require
      review against the gene-specific UniProt and literature context.
- id: file:PSEPK/alr/alr-uniprot.txt
  title: UniProtKB reviewed entry for alr
  findings:
  - statement: UniProt identifies Alr as a broad-specificity amino-acid racemase with highest
      activity on lysine and arginine and periplasmic localization.
- id: GO_REF:0000118
  title: TreeGrafter-generated Gene Ontology annotations based on phylogenetic placement.
  findings:
  - statement: TreeGrafter supplies phylogenetic annotations that can over-transfer generic
      location or process terms.
- id: GO_REF:0000120
  title: Combined automated GO annotation using multiple IEA methods.
  findings:
  - statement: Combined automated methods provide provisional GO annotations that require
      gene-level review.
- id: GO_REF:0000116
  title: Gene Ontology annotation based on Rhea reaction mapping.
  findings:
  - statement: Rhea mapping supplies reaction-specific molecular-function annotations from
      curated reaction equations.
- id: PMID:30008699
  title: A Broad Spectrum Racemase in Pseudomonas putida KT2440 Plays a Key Role in Amino
    Acid Catabolism.
  findings:
  - statement: Genetic and biochemical work showed Alr is periplasmic and supports L-lysine/L-arginine
      catabolism.
- id: PMID:23995642
  title: Amino acid racemization in Pseudomonas putida KT2440.
  findings:
  - statement: Biochemical assays established broad amino-acid racemase activity, especially
      lysine and arginine racemization.
core_functions:
- description: Alr is a broad-spectrum periplasmic amino-acid racemase whose principal KT2440
    role is conversion of L-lysine and L-arginine to their D-enantiomers to support basic
    amino-acid catabolism.
