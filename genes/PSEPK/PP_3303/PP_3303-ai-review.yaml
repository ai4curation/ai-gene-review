  title: UniProtKB entry Q88HQ0 for Pseudomonas putida KT2440 PP_3303
  findings:
  - statement: UniProt assigns PP_3303 to the KAS-II family.
    supporting_text: 'InterPro; IPR017568; 3-oxoacyl-ACP_synth-2.'
    reference_section_type: RESULTS
  - statement: UniProt places the protein in type-II fatty-acid elongation.
    supporting_text: 'Involved in the type II fatty acid elongation cycle.'
    reference_section_type: RESULTS
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Exact target accession. The catalytic and pathway assignments are
      rule-based and do not resolve substrate specialization relative to FabF.
- id: file:PSEPK/PP_3303/PP_3303-deep-research-openscientist.md
  title: OpenScientist deep research for PSEPK PP_3303
  findings:
  - statement: The report supports KAS-II condensation while identifying PP_3303 as an accessory paralog.
    supporting_text: PP_3303's **molecular function is unambiguously KAS II condensation**
    reference_section_type: CONCLUSIONS
  - statement: No direct KT2440 biochemical or genetic characterization was found.
    supporting_text: >-
      Direct **biochemical or genetic characterization of PP_3303 specifically
      in *P. putida* KT2440 is not available in the literature**
    reference_section_type: CONCLUSIONS
  reference_review:
    relevance: HIGH
    correctness: UNVERIFIED
    review_notes: >-
      The family-level catalytic synthesis agrees with UniProt. Claims that
      PP_3303 specifically controls cis-vaccenate production, temperature
      adaptation, or solvent response are orthology transfers and are not
      incorporated as established KT2440 functions.
