taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: >-
  PP_3303 is a second predicted 3-oxoacyl-ACP synthase II-family enzyme in
  Pseudomonas putida KT2440. Its conserved condensing-enzyme architecture is
  consistent with malonyl-ACP-dependent chain elongation in type-II fatty-acid
  synthesis, but its substrate range and physiological division of labor with
  the canonical FabF protein remain unresolved.
