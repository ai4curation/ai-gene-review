suggested_questions:
- question: What is the physiological substrate exported by paxB in P. putida KT2440?
- question: Which membrane-fusion and outer-membrane-channel partners form the complete paxB-containing type-I secretion system?
suggested_experiments:
- description: Delete paxB and test secretion of candidate RTX/toxin/protease substrates under inducing growth conditions.
  experiment_type: targeted secretion phenotype assay
- description: Use co-immunoprecipitation or tagged-complex purification to identify the cognate adaptor and outer-membrane channel for paxB.
  experiment_type: transporter complex mapping
