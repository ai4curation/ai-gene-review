id: Q88RG3
gene_symbol: paxB
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: paxB encodes a predicted cell-membrane type-I-secretion ABC exporter component. The protein has a fused ABC transmembrane domain, ABC ATP-binding domain, ATPase_T1SS domain, Type_1_exporter signature, and C39 peptidase domain. The first-pass core call is an ATP-driven type-I-secretion exporter candidate, with toxin substrate identity unresolved.
