description: gtsB (PP_1016) encodes a multi-pass membrane permease component of the PP_1015-PP_1018 Gts glucose ABC uptake system. It is annotated as a mannose/glucose ABC transporter permease and belongs to the binding-protein-dependent transport-system permease family.
