description: rppH (PP_5146, also nudH) encodes an RNA pyrophosphohydrolase/Nudix-family enzyme. RppH removes pyrophosphate
  from 5' triphosphorylated mRNAs to generate decay-prone 5' monophosphate ends, thereby promoting bacterial mRNA degradation.
