id: Q88Q63
gene_symbol: pilC
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: >-
  pilC encodes a multi-pass inner-membrane GspF/PilC-family protein in
  Pseudomonas putida KT2440. Although shared type II secretion/type IV pilus
  domains produce broad secretion annotations, the submitted product name and
  local motility-bucket context support a type IV fimbrial/pilus assembly
  platform role rather than a standalone type II secretion assignment.
existing_annotations:
- term:
    id: GO:0005886
    label: plasma membrane
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: located_in
  review:
    summary: Plasma membrane localization is appropriate for PilC.
    action: ACCEPT
    reason: >-
      UniProt places PilC in the cell inner membrane and predicts three
      transmembrane helices. In GO, plasma membrane is the appropriate
      bacterial inner/cytoplasmic membrane component.
    supported_by:
    - reference_id: file:PSEPK/pilC/pilC-goa.tsv
      supporting_text: "GO:0005886\tplasma membrane"
    - reference_id: file:PSEPK/pilC/pilC-uniprot.txt
      supporting_text: 'CC   -!- SUBCELLULAR LOCATION: Cell inner membrane'
    - reference_id: file:PSEPK/pilC/pilC-uniprot.txt
      supporting_text: 'FT   TRANSMEM        167..190'
- term:
    id: GO:0009306
    label: protein secretion
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: involved_in
  review:
    summary: Broad protein secretion reflects the shared GspF/PilC domain but is less accurate than type IV pilus assembly here.
    action: MODIFY
    reason: >-
      The GspF/PilC family participates in related envelope machines, but this
      KT2440 protein is named type 4 fimbrial assembly protein PilC. The
      biologically useful process annotation is type IV pilus assembly rather
      than generic protein secretion.
    proposed_replacement_terms:
    - id: GO:0043683
      label: type IV pilus assembly
    supported_by:
    - reference_id: file:PSEPK/pilC/pilC-goa.tsv
      supporting_text: "GO:0009306\tprotein secretion"
    - reference_id: file:PSEPK/pilC/pilC-uniprot.txt
      supporting_text: 'DE   SubName: Full=Type 4 fimbrial assembly protein PilC {ECO:0000313|EMBL:AAN66258.1};'
    - reference_id: file:PSEPK/pilC/pilC-deep-research-asta.md
      supporting_text: 'Protein Description:** SubName: Full=Type 4 fimbrial assembly protein PilC {ECO:0000313|EMBL:AAN66258.1};'
    - reference_id: file:PSEPK/pilC/pilC-uniprot.txt
      supporting_text: DR   InterPro; IPR003004; GspF/PilC.
- term:
    id: GO:0015628
    label: protein secretion by the type II secretion system
  evidence_type: IEA
  original_reference_id: GO_REF:0000118
  qualifier: involved_in
  review:
    summary: The type II secretion process is likely over-propagated from the shared GspF/PilC domain.
    action: REMOVE
    reason: >-
      PilC is annotated as a type 4 fimbrial assembly protein, and the
      GspF/PilC domain is shared between type II secretion and type IV pilus
      systems. For this motility-bucket locus, the type II secretion process is
      a domain-transfer artifact; type IV pilus assembly is the appropriate
      replacement process.
    supported_by:
    - reference_id: file:PSEPK/pilC/pilC-goa.tsv
      supporting_text: "GO:0015628\tprotein secretion by the type II secretion system"
    - reference_id: file:PSEPK/pilC/pilC-uniprot.txt
      supporting_text: 'DE   SubName: Full=Type 4 fimbrial assembly protein PilC {ECO:0000313|EMBL:AAN66258.1};'
    - reference_id: file:PSEPK/pilC/pilC-deep-research-asta.md
      supporting_text: 'Protein Description:** SubName: Full=Type 4 fimbrial assembly protein PilC {ECO:0000313|EMBL:AAN66258.1};'
    - reference_id: file:PSEPK/pilC/pilC-uniprot.txt
      supporting_text: DR   InterPro; IPR001992; T2SS_GspF/T4SS_PilC_CS.
- term:
    id: GO:0016020
    label: membrane
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: located_in
  review:
    summary: Membrane localization is correct but less informative than plasma membrane.
    action: KEEP_AS_NON_CORE
    reason: >-
      The protein is a multi-pass inner-membrane component. The broad membrane
      term is not wrong, but the plasma membrane annotation captures the useful
      location more specifically.
    supported_by:
    - reference_id: file:PSEPK/pilC/pilC-goa.tsv
      supporting_text: "GO:0016020\tmembrane"
    - reference_id: file:PSEPK/pilC/pilC-uniprot.txt
      supporting_text: 'CC   -!- SUBCELLULAR LOCATION: Cell inner membrane'
    - reference_id: file:PSEPK/pilC/pilC-uniprot.txt
      supporting_text: 'KW   Membrane {ECO:0000256|ARBA:ARBA00023136, ECO:0000256|SAM:Phobius};'
- term:
    id: GO:0043683
    label: type IV pilus assembly
  evidence_type: IEA
  original_reference_id: file:PSEPK/pilC/pilC-uniprot.txt
  qualifier: involved_in
  review:
    summary: PilC should be represented as a type IV pilus assembly platform component.
    action: NEW
    reason: >-
      The product name and GspF/PilC-family membrane-platform domain support a
      type IV pilus assembly role, while the current GOA rows only contain
      generic or type-II-secretion process mappings.
    supported_by:
    - reference_id: file:PSEPK/pilC/pilC-uniprot.txt
      supporting_text: 'DE   SubName: Full=Type 4 fimbrial assembly protein PilC {ECO:0000313|EMBL:AAN66258.1};'
    - reference_id: file:PSEPK/pilC/pilC-deep-research-asta.md
