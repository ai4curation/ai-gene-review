  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: dnaE2 encodes an error-prone DnaE2-family DNA polymerase in Pseudomonas putida KT2440. UniProt/HAMAP describes
  a cytoplasmic DNA polymerase involved in damage-induced mutagenesis and translesion synthesis, not the major replicative
  DNA polymerase. It is part of the lexA2-imuA-imuB-dnaE2 damage-inducible cassette.
