  qualifier: involved_in
  review:
    summary: The transporter-process idea is plausible, but thiamine specificity is unsupported in this polyamine-import locus.
    action: MODIFY
    reason: PP_3814 is named as a polyamine ABC transporter periplasmic binding protein and sits next to polyamine transporter permease and ATP-binding genes; the TreeGrafter thiamine transport call is better replaced by polyamine transport.
