description: PP_3814 encodes a predicted signal-peptide-bearing periplasmic substrate-binding component of the PP_3814-PP_3817 polyamine ABC import locus in Pseudomonas putida KT2440. UniProt names it as a polyamine ABC transporter binding protein; TreeGrafter thiamine-binding annotations are therefore treated as over-propagated relative to the local polyamine importer context.
