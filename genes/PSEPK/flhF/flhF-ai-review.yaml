id: Q88EV9
gene_symbol: flhF
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: flhF encodes an SRP54-family GTPase required for bacterial flagellar biosynthesis and likely
  flagellar placement or translocation in Pseudomonas putida KT2440. Its core role is flagellar
  organization at the cytoplasmic side of the membrane, not general SRP-dependent cotranslational
  protein targeting.
existing_annotations:
- term:
    id: GO:0003924
    label: GTPase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: GTPase activity is the direct molecular function of FlhF.
    action: ACCEPT
    reason: FlhF is a GTP-binding SRP-family flagellar biosynthesis protein with a conserved SRP54-like
      GTPase domain.
    supported_by:
    - reference_id: file:PSEPK/flhF/flhF-uniprot.txt
      supporting_text: 'DR   GO; GO:0003924; F:GTPase activity; IEA:UniProtKB-UniRule.'
    - reference_id: file:PSEPK/flhF/flhF-deep-research-asta.md
      supporting_text: '- **Key Domains:** AAA+_ATPase. (IPR003593); FlhF. (IPR020006); FlhF__GTPase_dom.
        (IPR047040); P-loop_NTPase. (IPR027417); SRP54_GTPase_dom. (IPR000897)'
- term:
    id: GO:0005047
    label: signal recognition particle binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000118
  qualifier: enables
  review:
    summary: signal recognition particle binding is likely an SRP54-family over-propagation.
    action: REMOVE
    reason: FlhF is SRP54-family-like but the local UniProt function describes flagellar biosynthesis,
      not canonical SRP-dependent protein targeting or SRP binding. Retaining this term would obscure
      the flagellar placement/biosynthesis role.
    supported_by:
    - reference_id: file:PSEPK/flhF/flhF-uniprot.txt
      supporting_text: 'CC   -!- FUNCTION: Necessary for flagellar biosynthesis. May be involved in'
    - reference_id: file:PSEPK/flhF/flhF-uniprot.txt
      supporting_text: 'DR   InterPro; IPR020006; FlhF.'
- term:
    id: GO:0005525
    label: GTP binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: GTP binding is appropriate but less informative than GTPase activity.
    action: KEEP_AS_NON_CORE
    reason: Nucleotide binding is expected for the FlhF GTPase, but the catalytic GTPase activity is the
      more informative molecular-function annotation.
    supported_by:
    - reference_id: file:PSEPK/flhF/flhF-uniprot.txt
      supporting_text: 'DR   GO; GO:0005525; F:GTP binding; IEA:UniProtKB-UniRule.'
    - reference_id: file:PSEPK/flhF/flhF-uniprot.txt
      supporting_text: 'DR   InterPro; IPR047040; FlhF__GTPase_dom.'
- term:
    id: GO:0005886
    label: plasma membrane
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: located_in
  review:
    summary: plasma membrane localization is appropriate for FlhF.
    action: ACCEPT
    reason: UniProt places FlhF at the cell membrane as a peripheral protein on the cytoplasmic side,
      consistent with a flagellar placement or biosynthesis GTPase.
    supported_by:
    - reference_id: file:PSEPK/flhF/flhF-uniprot.txt
      supporting_text: 'CC   -!- SUBCELLULAR LOCATION: Cell membrane {ECO:0000256|ARBA:ARBA00004413};'
    - reference_id: file:PSEPK/flhF/flhF-uniprot.txt
      supporting_text: 'DR   GO; GO:0005886; C:plasma membrane; IEA:UniProtKB-SubCell.'
- term:
    id: GO:0006605
    label: protein targeting
  evidence_type: IEA
  original_reference_id: GO_REF:0000118
  qualifier: involved_in
  review:
    summary: generic protein targeting is likely an over-broad SRP-family annotation for FlhF.
    action: MARK_AS_OVER_ANNOTATED
    reason: FlhF may be involved in flagellar translocation/placement, but the core biological process
      is flagellar biosynthesis or organization rather than generic protein targeting.
    supported_by:
    - reference_id: file:PSEPK/flhF/flhF-uniprot.txt
      supporting_text: 'CC   -!- FUNCTION: Necessary for flagellar biosynthesis. May be involved in'
    - reference_id: file:PSEPK/flhF/flhF-uniprot.txt
      supporting_text: CC       translocation of the flagellum. {ECO:0000256|ARBA:ARBA00025337}.
- term:
    id: GO:0006614
    label: SRP-dependent cotranslational protein targeting to membrane
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: involved_in
  review:
    summary: SRP-dependent cotranslational protein targeting is not the supported role of FlhF.
    action: REMOVE
    reason: This appears to be propagated from SRP54-family similarity. The specific FlhF annotation
      supports flagellar biosynthesis and membrane-side flagellar placement/translocation, not general
      cotranslational protein targeting to membrane.
    supported_by:
    - reference_id: file:PSEPK/flhF/flhF-uniprot.txt
      supporting_text: 'CC   -!- FUNCTION: Necessary for flagellar biosynthesis. May be involved in'
    - reference_id: file:PSEPK/flhF/flhF-deep-research-asta.md
      supporting_text: '- **Protein Description:** RecName: Full=Flagellar biosynthesis protein FlhF
        {ECO:0000256|ARBA:ARBA00014919, ECO:0000256|NCBIfam:TIGR03499};'
- term:
    id: GO:0016020
    label: membrane
  evidence_type: IEA
  original_reference_id: GO_REF:0000118
  qualifier: located_in
  review:
    summary: membrane localization is true but less specific than plasma membrane/cytoplasmic-side
      localization.
    action: MARK_AS_OVER_ANNOTATED
    reason: FlhF is membrane-associated, but the plasma-membrane and cytoplasmic-side statements are
      more informative.
    supported_by:
    - reference_id: file:PSEPK/flhF/flhF-uniprot.txt
      supporting_text: 'CC   -!- SUBCELLULAR LOCATION: Cell membrane {ECO:0000256|ARBA:ARBA00004413};'
