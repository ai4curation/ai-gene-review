id: Q88F01
gene_symbol: glxR
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: >-
  glxR encodes a tartronate semialdehyde reductase in KT2440 glyoxylate
  metabolism. It is predicted to reduce 2-hydroxy-3-oxopropionate (tartronate
  semialdehyde) toward glycerate using NAD(H) or NADP(H)-linked
  oxidoreductase chemistry.
