description: 'lip (PP_4854) encodes an unreviewed predicted lipase/alpha-beta hydrolase-fold protein. UniProt records only a submitted protein name and AB_hydrolase_1/PF00561 domain support, and the current QuickGO GOA download has no GO annotations. This gene is therefore a ppu00561 boundary candidate rather than a curated glycerolipid-pathway enzyme: it may be an esterase/lipase-family hydrolase, but the native substrate, localization, and physiological role in P. putida KT2440 are not established by the local evidence used in this first pass.'
