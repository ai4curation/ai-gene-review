- question: What substrate does PP_4854/lip hydrolyze in P. putida KT2440, and is it connected to membrane glycerolipid turnover or to an unrelated ester substrate?
suggested_experiments:
- hypothesis: PP_4854/lip has measurable esterase or lipase activity, but its physiological substrate may not be a membrane glycerolipid.
  description: Purify PP_4854 or assay a deletion/complementation strain against a panel of triglyceride, phospholipid, lysophospholipid, and simple ester substrates, then test whether activity changes under lipid-turnover or envelope-stress conditions.
