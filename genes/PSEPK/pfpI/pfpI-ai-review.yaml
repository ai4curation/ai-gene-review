proposed_new_terms: []
suggested_questions:
- question: Does pfpI act as a protease in KT2440, and can its substrate specificity be distinguished from HSP31-like DJ-1/PfpI
    detoxification proteins?
  experts: []
suggested_experiments:
- experiment_type: comparative sequence analysis
  description: Check catalytic motif conservation and domain completeness for pfpI against experimentally characterized family
    members.
  hypothesis: pfpI retains the active-site features expected for the predicted peptidase family.
- experiment_type: substrate profiling
  description: Assay recombinant or tagged pfpI against peptide/protein substrate panels matched to its predicted peptidase
    family.
  hypothesis: pfpI has measurable peptidase activity but an unresolved physiological substrate.
