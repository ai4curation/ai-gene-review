  review:
    summary: This is the most specific current GO molecular-function term available for Lnt's phospholipid-dependent acyl transfer reaction.
    action: ACCEPT
    reason: Lnt transfers a non-amino-acyl group from a phospholipid donor to the N-terminal cysteine of apolipoprotein. The formerly narrower GO:0016410 is obsolete, so GO:0016747 should remain until an apolipoprotein N-acyltransferase term is added.
