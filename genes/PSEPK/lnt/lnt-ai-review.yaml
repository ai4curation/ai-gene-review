proposed_new_terms:
- proposed_name: apolipoprotein N-acyltransferase activity
  proposed_definition: Catalysis of the phospholipid-dependent N-acylation of the N-terminal S-diacylglyceryl-L-cysteine of a bacterial lipoprotein.
  justification: GO:0016747 is the best valid current parent term, but it does not capture Lnt's defined lipoprotein acceptor, phospholipid donor, or EC 2.3.1.269 reaction. The formerly used GO:0016410 N-acyltransferase activity is obsolete.
  proposed_parent:
    id: GO:0016747
    label: acyltransferase activity, transferring groups other than amino-acyl groups
  supported_by:
  - reference_id: file:PSEPK/lnt/lnt-uniprot.txt
    supporting_text: "RecName: Full=Apolipoprotein N-acyltransferase"
  - reference_id: file:PSEPK/lnt/lnt-uniprot.txt
    supporting_text: "Reaction=N-terminal S-1,2-diacyl-sn-glyceryl-L-cysteinyl-[lipoprotein]"
suggested_questions:
- question: Should GO add an apolipoprotein N-acyltransferase activity term for Lnt/EC 2.3.1.269 now that GO:0016410 is obsolete?
- question: Is PP_4790 essential under standard KT2440 growth conditions, and how does partial Lnt depletion affect outer-membrane lipoprotein localization?
- question: Which KT2440 lipoprotein substrates are most sensitive to loss of Lnt-mediated N-acylation?
suggested_experiments:
- description: Compare wild-type and conditional lnt-depletion KT2440 envelope fractions by lipoproteomics to identify substrates that accumulate as non-N-acylated intermediates or mislocalize.
  experiment_type: conditional depletion and envelope proteomics
- description: Reconstitute PP_4790 with diacylglyceryl lipoprotein substrate and glycerophospholipid acyl donors to measure N-acyltransferase activity and donor preference.
  experiment_type: in vitro enzyme assay
