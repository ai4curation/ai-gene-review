description: mlaE encodes the multi-pass inner-membrane permease subunit of the MlaFEDB ABC transporter system. It is the predicted membrane translocation component of the phospholipid transport pathway that retrogradely moves phospholipids from the outer membrane to the inner membrane to help maintain outer-membrane lipid asymmetry.
