taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: fleS encodes a soluble FleS-family sensor histidine kinase in Pseudomonas putida KT2440.
  The protein contains PAS, HisKA, and HATPase domains, supporting a two-component phosphorelay sensor
  role, most likely in flagellar or surface-behavior regulation.
