    label: L-methionine salvage from methylthioadenosine
  evidence_type: IC
  original_reference_id: file:PSEPK/mtnA/mtnA-uniprot.txt
  review:
    summary: MtnA should also be connected to methionine salvage.
    action: NEW
    reason: UniProt explicitly places MtnA at step 1 of the methionine salvage pathway from S-methyl-5-thioribose 1-phosphate; this NEW row records curator inference from the accepted enzyme activity plus the UniProt pathway statement.
