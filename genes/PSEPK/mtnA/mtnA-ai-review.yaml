description: mtnA encodes methylthioribose-1-phosphate isomerase, the first enzyme of the methionine salvage pathway that interconverts MTR-1-phosphate and methylthioribulose-1-phosphate. The fetched GOA contains the specific molecular function but lacks the pathway annotation present in UniProt.
