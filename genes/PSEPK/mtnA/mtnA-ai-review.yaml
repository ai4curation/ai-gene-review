  original_reference_id: GO_REF:0000120
  review:
    summary: The methylthioribose-1-phosphate isomerase annotation is the correct core molecular function.
    action: ACCEPT
    reason: UniProt assigns EC 5.3.1.23 and the MTR-1-P to MTRu-1-P isomerization reaction.
    supported_by:
