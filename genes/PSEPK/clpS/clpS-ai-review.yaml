existing_annotations:
- term:
    id: GO:0006508
    label: proteolysis
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  review:
    summary: Proteolysis is a broad pathway-level annotation for ClpS rather than a catalytic activity.
    action: KEEP_AS_NON_CORE
    reason: ClpS is not itself the protease; it modulates ClpAP substrate specificity. The annotation can be retained as pathway
      context, but protein catabolic process is a better description of the biological process.
    supported_by:
    - reference_id: file:PSEPK/clpS/clpS-uniprot.txt
      supporting_text: modulation of the specificity of the ClpAP-
