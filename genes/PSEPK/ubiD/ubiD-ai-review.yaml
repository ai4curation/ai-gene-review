id: Q88CG8
gene_symbol: ubiD
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: >-
  ubiD encodes a UbiD-family prenylated-FMN-dependent decarboxylase for
  ubiquinone biosynthesis. It catalyzes decarboxylation of
  4-hydroxy-3-polyprenylbenzoate to a polyprenylphenol intermediate and depends
  on the prenyl-FMN cofactor produced by UbiX. The protein is predicted to be
  peripheral membrane-associated in the bacterial ubiquinone pathway.
existing_annotations:
- term:
    id: GO:0005737
    label: cytoplasm
  evidence_type: IEA
  original_reference_id: GO_REF:0000118
  qualifier: located_in
  review:
    summary: >-
      Cytoplasmic localization is plausible for a peripheral/soluble face
      enzyme in the bacterial ubiquinone pathway.
    action: KEEP_AS_NON_CORE
    reason: >-
      Location is contextual; the core function is the
      4-hydroxy-3-polyprenylbenzoate decarboxylase activity.
- term:
    id: GO:0005829
    label: cytosol
  evidence_type: IEA
  original_reference_id: GO_REF:0000118
  qualifier: located_in
  review:
    summary: >-
      Cytosol is a reasonable soluble-compartment annotation for a peripheral
      UbiD enzyme.
    action: KEEP_AS_NON_CORE
    reason: >-
      UniProt also records peripheral membrane association; both locations are
      context rather than the core function.
- term:
    id: GO:0005886
    label: plasma membrane
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: located_in
  review:
    summary: >-
      Plasma membrane is consistent with UniProt's peripheral membrane
      annotation for UbiD.
    action: KEEP_AS_NON_CORE
    reason: >-
      The pathway intermediate is polyprenylated and membrane-associated, so a
      peripheral membrane assignment is biologically plausible.
- term:
    id: GO:0006744
    label: ubiquinone biosynthetic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: involved_in
  review:
    summary: >-
      UbiD catalyzes an intermediate decarboxylation step in ubiquinone
      biosynthesis.
    action: ACCEPT
    reason: >-
      UniProt/HAMAP explicitly describes the decarboxylation reaction as an
      intermediate step in ubiquinone biosynthesis.
- term:
    id: GO:0008694
    label: 4-hydroxy-3-polyprenylbenzoate decarboxylase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: >-
      This is the substrate-resolved UbiD decarboxylase activity supported by
      UniProt/HAMAP and EC 4.1.1.98.
    action: ACCEPT
    reason: >-
      Q88CG8 is named 3-octaprenyl-4-hydroxybenzoate carboxy-lyase and the
      UniProt record gives the matching reaction.
- term:
    id: GO:0016831
    label: carboxy-lyase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: >-
      Carboxy-lyase activity is correct but less informative than the
      substrate-resolved UbiD term.
    action: MODIFY
    reason: >-
      Replace the broad lyase class with GO:0008694, which captures the actual
      ubiquinone intermediate.
    proposed_replacement_terms:
    - id: GO:0008694
      label: 4-hydroxy-3-polyprenylbenzoate decarboxylase activity
