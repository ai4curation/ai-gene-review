id: Q88CG8
gene_symbol: ubiD
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: >-
  ubiD encodes a prenylated-FMN- and manganese-dependent decarboxylase that
  converts 4-hydroxy-3-polyprenylbenzoate to 2-polyprenylphenol during
  ubiquinone biosynthesis. It is a peripheral inner-membrane enzyme acting from
  the cytoplasmic side on the prenylated aromatic intermediate generated by
  UbiA.
existing_annotations:
- term:
    id: GO:0005737
    label: cytoplasm
  evidence_type: IEA
  original_reference_id: GO_REF:0000118
  qualifier: located_in
  review:
    summary: Cytoplasm is redundant with the more specific cytosol annotation.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      The record also carries cytosol and plasma-membrane annotations; the
      broad cytoplasm parent adds no useful localization information.
- term:
    id: GO:0005829
    label: cytosol
  evidence_type: IEA
  original_reference_id: GO_REF:0000118
  qualifier: located_in
  review:
    summary: >-
      Cytosolic exposure is plausible for this peripheral membrane enzyme and
      a soluble pool is possible, but this is not the primary target-specific
      localization call.
    action: KEEP_AS_NON_CORE
    reason: >-
      UniProt assigns peripheral association with the cytoplasmic side of the
      membrane. The cytosol call is phylogenetically transferred and has not
      been tested for PP_5213; notably, UbiD is not a member of the defined
      seven-protein E. coli Ubi metabolon.
- term:
    id: GO:0005886
    label: plasma membrane
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: located_in
  review:
    summary: UbiD is peripherally associated with the bacterial cell membrane.
    action: ACCEPT
    reason: The reviewed UniProt record explicitly assigns a peripheral cell-membrane location.
    supported_by:
    - reference_id: file:PSEPK/ubiD/ubiD-uniprot.txt
      supporting_text: Peripheral membrane protein
- term:
    id: GO:0006744
    label: ubiquinone biosynthetic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: involved_in
  review:
    summary: Ubiquinone biosynthesis is the core process for UbiD.
    action: ACCEPT
    reason: UbiD decarboxylates the prenylated 4-hydroxybenzoate pathway intermediate.
    supported_by:
    - reference_id: file:PSEPK/ubiD/ubiD-uniprot.txt
      supporting_text: ubiquinone biosynthesis
    - reference_id: file:PSEPK/ubiD/ubiD-deep-research-openscientist.md
      supporting_text: >-
        No purified-enzyme kinetics (kcat, Km), crystal structure, or
        gene-knockout phenotype has been reported specifically for the KT2440
        protein.
- term:
