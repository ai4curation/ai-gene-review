id: Q88CG8
gene_symbol: ubiD
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: >-
  ubiD encodes a prenylated-FMN- and manganese-dependent decarboxylase that
  converts 4-hydroxy-3-polyprenylbenzoate to 2-polyprenylphenol during
  ubiquinone biosynthesis. It is a peripheral membrane enzyme acting on the
  prenylated aromatic intermediate generated by UbiA.
