suggested_questions:
- question: >-
    Does Q88CG8 preferentially process the expected nonaprenyl P. putida
    intermediate, and how does it partition between membrane-associated and
    soluble cellular pools?
suggested_experiments:
- description: >-
    Purify Q88CG8 with UbiX-supplied prFMN, compare decarboxylation of defined
    polyprenyl-chain substrates, and test PP_5213-dependent ubiquinone and
    intermediate profiles in a complemented P. putida deletion strain.
