- id: file:PSEPK/ubiD/ubiD-deep-research-openscientist.md
  title: OpenScientist functional review of PSEPK ubiD
  findings:
  - statement: >-
      Ortholog biochemistry and the target UniProt record support the
      prFMN-dependent UbiD reaction. The report also distinguishes the generic
      polyprenyl reaction from legacy E. coli octaprenyl naming and notes the
      absence of direct PP_5213 experiments. Its placement of UbiD inside the
      defined soluble Ubi metabolon is not adopted because the experimentally
      recovered seven-protein complex does not contain UbiD.
