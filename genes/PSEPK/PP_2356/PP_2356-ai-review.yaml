description: PP_2356 encodes a predicted phytochrome-like sensor histidine kinase in Pseudomonas putida
  KT2440. Its GAF/PAS/phytochrome input domains and HisKA/HATPase catalytic domains support a membrane-associated
  sensory phosphorelay role near a Csu-like surface-adhesion cluster.
