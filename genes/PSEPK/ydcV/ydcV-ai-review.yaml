suggested_questions:
- question: What substrate range is transported by the ydcVUTS importer containing ydcV, and how does it divide uptake of putrescine, spermidine, norspermidine, and related polyamines from other P. putida polyamine systems?
suggested_experiments:
- description: Measure uptake and growth phenotypes for a ydcV deletion or depletion strain with putrescine, spermidine, norspermidine, and related polyamines, and compare with complementation by the intact ydcVUTS locus.
  experiment_type: targeted polyamine ABC-import mutant uptake/growth assay
