id: Q88R45
gene_symbol: hisB
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: >-
  hisB encodes imidazoleglycerol-phosphate dehydratase (IGPD; EC 4.2.1.19),
  which removes water from imidazole-glycerol phosphate to form
  imidazole-acetol phosphate in the sixth reaction of L-histidine biosynthesis.
  The Pseudomonas putida KT2440 protein is a compact monofunctional IGPD; unlike
  enterobacterial bifunctional HisB proteins, it does not contain a fused
  histidinol-phosphate phosphatase domain.
