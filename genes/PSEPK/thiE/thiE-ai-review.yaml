  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: thiE encodes thiamine-phosphate synthase, the enzyme that condenses the activated thiazole and hydroxymethylpyrimidine branches to form thiamine monophosphate. This is the branch-coupling step immediately upstream of ThiL-dependent thiamine diphosphate formation.
