- term:
    id: GO:0051537
    label: 2 iron, 2 sulfur cluster binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: Incorrect InterPro-derived cofactor annotation for the PrpD family.
    action: REMOVE
    reason: >-
      PrpD is mechanistically distinct from aconitases. Purified PrpD was shown
      not to contain an iron-sulfur center and not to require metal ions or
      reducing agents, directly contradicting this electronic annotation.
    supported_by:
    - reference_id: PMID:11294638
      supporting_text: >-
        Homogeneous PrpD enzyme did not contain an iron-sulfur center, displayed
        no requirements for metal cations or reducing agents for activity
      full_text_unavailable: true
