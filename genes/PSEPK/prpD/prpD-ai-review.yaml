suggested_questions:
- question: >-
    Under which carbon sources does KT2440 use PrpD rather than the adjacent
    AcnD/PrpF-like route for conversion of 2-methylcitrate to
    2-methylisocitrate?
suggested_experiments:
- description: >-
    Compare growth, pathway-intermediate accumulation, and isotope flux in
    prpD, acnD-like, prpF, and combined mutants during growth on propionate and
    odd-chain carbon sources.
