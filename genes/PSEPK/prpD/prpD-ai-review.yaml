taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: >-
  PrpD is the 2-methylcitrate dehydratase of Pseudomonas putida KT2440. It
  catalyzes the cofactor-independent dehydration of (2S,3S)-2-methylcitrate to
  2-methyl-cis-aconitate in the methylcitrate cycle for propionate catabolism.
  A separate aconitase catalyzes the subsequent hydration to
  2-methylisocitrate.
