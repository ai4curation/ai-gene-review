id: Q88KF2
gene_symbol: prpD
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: >-
  prpD encodes a PrpD-family 2-methylcitrate dehydratase in Pseudomonas putida
  KT2440. Sequence, EC/Rhea, and InterPro evidence support a methylcitrate-cycle
  hydro-lyase that converts 2-methylcitrate to 2-methyl-cis-aconitate in
  propionate catabolism. Organism-specific genetics in the existing AcnB review
  indicate that AcnB may be the key in vivo methylcitrate-cycle
  dehydratase/hydratase under odd-chain fatty-acid growth, so prpD is retained
  as a sequence-supported route member whose physiological contribution still
  needs direct KT2440 resolution.
existing_annotations:
- term:
    id: GO:0016829
    label: lyase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: Generic lyase activity should be replaced by the specific 2-methylcitrate dehydratase term.
    action: MODIFY
    reason: >-
      The broad InterPro-derived lyase parent is true but uninformative because
      GOA also includes GO:0047547, supported by EC 4.2.1.79/Rhea and the
      2-methylisocitrate-dehydratase PrpD InterPro signature.
    proposed_replacement_terms:
    - id: GO:0047547
      label: 2-methylcitrate dehydratase activity
    supported_by:
    - reference_id: file:PSEPK/prpD/prpD-goa.tsv
      supporting_text: "GO:0016829\tlyase activity"
    - reference_id: file:PSEPK/prpD/prpD-goa.tsv
      supporting_text: "GO:0047547\t2-methylcitrate dehydratase activity"
- term:
    id: GO:0019543
    label: propionate catabolic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: involved_in
  review:
    summary: PrpD-family evidence supports methylcitrate-cycle propionate catabolism context.
    action: ACCEPT
    reason: >-
      GOA links the PrpD-family InterPro signature to propionate catabolism, and
      UniProt places PrpD in propanoate degradation. This is accepted as route
      context while leaving the exact in vivo division of labor with AcnB open.
    supported_by:
    - reference_id: file:PSEPK/prpD/prpD-goa.tsv
      supporting_text: "GO:0019543\tpropionate catabolic process"
    - reference_id: file:PSEPK/prpD/prpD-uniprot.txt
      supporting_text: "CC   -!- PATHWAY: Organic acid metabolism; propanoate degradation."
- term:
    id: GO:0047547
    label: 2-methylcitrate dehydratase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: 2-methylcitrate dehydratase activity is the specific PrpD-family molecular-function assignment.
    action: ACCEPT
    reason: >-
      UniProt names the protein 2-methylcitrate dehydratase (EC 4.2.1.79), and
      GOA supports the term through InterPro, Rhea, and EC evidence. The term is
      appropriate even though organism-specific genetics suggest AcnB may carry
      the stronger in vivo growth phenotype in KT2440.
    supported_by:
    - reference_id: file:PSEPK/prpD/prpD-goa.tsv
      supporting_text: "GO:0047547\t2-methylcitrate dehydratase activity"
    - reference_id: file:PSEPK/prpD/prpD-uniprot.txt
      supporting_text: "DE   RecName: Full=2-methylcitrate dehydratase"
- term:
    id: GO:0051537
    label: 2 iron, 2 sulfur cluster binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: 2Fe-2S cluster binding is cofactor context for the PrpD-family enzyme.
    action: KEEP_AS_NON_CORE
    reason: >-
      The InterPro-derived Fe-S cluster annotation supports the enzyme family
      chemistry but is not the pathway-defining catalytic function.
    supported_by:
    - reference_id: file:PSEPK/prpD/prpD-goa.tsv
      supporting_text: "GO:0051537\t2 iron, 2 sulfur cluster binding"
    - reference_id: file:PSEPK/prpD/prpD-uniprot.txt
      supporting_text: "GO; GO:0051537; F:2 iron, 2 sulfur cluster binding;"
