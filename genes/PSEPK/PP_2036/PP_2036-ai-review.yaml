description: >-
  PP_2036 encodes an unreviewed DapA-like 4-hydroxy-tetrahydrodipicolinate
  synthase candidate with EC 4.3.3.7. It is best treated as an additional
  lysine/diaminopimelate-pathway precursor enzyme candidate in the ppu00261
  boundary set, not as direct evidence for monobactam biosynthesis.
