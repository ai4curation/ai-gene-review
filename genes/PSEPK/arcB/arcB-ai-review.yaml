  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: arcB (PP_1000) encodes the catabolic ornithine carbamoyltransferase of the arginine deiminase/carbamate kinase
  system. It catalyzes reversible ornithine/citrulline carbamoyltransferase chemistry but is annotated and named as the catabolic
  ArcB enzyme rather than the committed biosynthetic ArgF enzyme.
