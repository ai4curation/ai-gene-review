    reason: UniProt includes a TCA/citrate-synthase-family mapping, but the pathway-level review identifies prpC as K01659 2-methylcitrate synthase rather than the canonical TCA citrate synthase. GltA is the unambiguous TCA citrate synthase in KT2440, so PrpC should not be used to satisfy the core TCA citrate synthase step.
    supported_by:
