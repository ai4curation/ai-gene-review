suggested_questions:
- question: Does PrpC retain measurable citrate synthase activity in vitro, and if so is that activity physiologically relevant compared with GltA in P. putida KT2440?
suggested_experiments:
- description: Purify PrpC and compare kinetic parameters for propionyl-CoA plus oxaloacetate versus acetyl-CoA plus oxaloacetate, then test prpC and gltA mutants on propionate and canonical TCA carbon sources.
