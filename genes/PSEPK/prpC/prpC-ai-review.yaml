    summary: Broad and potentially misleading process annotation for a propionate/methylcitrate-cycle enzyme.
    action: REMOVE
    reason: The stronger process assignment is propionate catabolism via the methylcitrate cycle, not generic carbohydrate metabolism. The TreeGrafter process term appears to be broad family over-propagation and should be replaced with GO:0019543.
