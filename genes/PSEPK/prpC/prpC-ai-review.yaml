description: Citrate-synthase-family 2-methylcitrate synthase of Pseudomonas putida KT2440. PrpC is best interpreted as the propionyl-CoA/oxaloacetate-condensing enzyme of the methylcitrate cycle for propionate metabolism, producing 2-methylcitrate. Although electronic annotations also assign citrate synthase/TCA-cycle activity because of family similarity, the PSEPK pathway-level review identifies PrpC as a methylcitrate-cycle boundary enzyme rather than the canonical TCA citrate synthase; GltA is the unambiguous TCA citrate synthase.
