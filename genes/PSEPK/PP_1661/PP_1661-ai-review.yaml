description: Predicted GMC-family FAD-dependent dehydrogenase subunit of Pseudomonas putida KT2440 (PP_1661).
  Current UniProt/GOA evidence supports a flavoprotein oxidoreductase assignment but does not identify
  a specific substrate or pathway role. In the PPP batch this protein should be treated as an unresolved
  sugar-acid/redox side-node candidate, not a strict pentose phosphate enzyme.
