    id: GO:0008299
    label: isoprenoid biosynthetic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: Isoprenoid biosynthesis is correct but less specific than the MEP-pathway IPP biosynthetic process.
    action: KEEP_AS_NON_CORE
    reason: IspD acts in the methylerythritol phosphate branch of IPP biosynthesis; GO:0019288 is the more precise process annotation.
    supported_by:
    - reference_id: file:PSEPK/ispD/ispD-uniprot.txt
      supporting_text: via DXP pathway
