id: Q88MF7
gene_symbol: ispD
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: ispD encodes 2-C-methyl-D-erythritol 4-phosphate cytidylyltransferase, the MEP-pathway enzyme that converts MEP and CTP to 4-CDP-2-C-methyl-D-erythritol during isopentenyl diphosphate biosynthesis. Broad catalytic and cytidylyltransferase parent annotations are less informative than the specific activity.
existing_annotations:
- term:
    id: GO:0003824
    label: catalytic activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: Catalytic activity is true but too broad for IspD.
    action: MARK_AS_OVER_ANNOTATED
    reason: The specific MEP cytidylyltransferase term GO:0050518 captures the enzyme function.
    supported_by:
    - reference_id: file:PSEPK/ispD/ispD-uniprot.txt
      supporting_text: 2-C-methyl-D-erythritol 4-phosphate cytidylyltransferase
    - reference_id: file:PSEPK/ispD/ispD-goa.tsv
      supporting_text: "GO:0003824\tcatalytic activity"
