id: Q88RH2
gene_symbol: gcdH
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: 'gcdH encodes a FAD-dependent glutaryl-CoA dehydrogenase of the acyl-CoA dehydrogenase family.
  The enzyme is best represented as a glutaryl-CoA dehydrogenase rather than a fatty-acid beta-oxidation
  enzyme; its presence in the KEGG benzoate map is adjacent CoA-acid metabolism rather than a strict benzoate
  or beta-ketoadipate step.'
existing_annotations:
- term:
    id: GO:0000062
    label: fatty-acyl-CoA binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000118
  qualifier: enables
  review:
    summary: The fatty-acyl-CoA binding annotation is not supported for the named glutaryl-CoA
      dehydrogenase substrate.
    action: REMOVE
    reason: GcdH acts on glutaryl-CoA, a dicarboxylyl-CoA, and the fatty-acyl-CoA binding term is a
      family-level over-projection.
- term:
    id: GO:0003995
    label: acyl-CoA dehydrogenase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: Acyl-CoA dehydrogenase activity is directionally correct but less specific than
      glutaryl-CoA dehydrogenase activity.
    action: KEEP_AS_NON_CORE
    reason: Retain only as a broad parent-like activity; GO:0004361 is the core MF.
- term:
    id: GO:0004361
    label: glutaryl-CoA dehydrogenase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: This exact EC-derived term captures the core glutaryl-CoA dehydrogenase activity.
    action: ACCEPT
    reason: The UniProt product and EC 1.3.8.6 assignment identify the enzyme as glutaryl-CoA
      dehydrogenase.
- term:
    id: GO:0016627
    label: oxidoreductase activity, acting on the CH-CH group of donors
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: This oxidoreductase grouping is true but too broad to be informative for a glutaryl-CoA
      dehydrogenase.
    action: MARK_AS_OVER_ANNOTATED
    reason: GO:0004361 is the substrate-specific molecular function.
- term:
    id: GO:0033539
    label: fatty acid beta-oxidation using acyl-CoA dehydrogenase
  evidence_type: IEA
  original_reference_id: GO_REF:0000118
  qualifier: involved_in
  review:
    summary: Fatty acid beta-oxidation using acyl-CoA dehydrogenase is not the best process for this
      glutaryl-CoA dehydrogenase.
    action: REMOVE
    reason: The protein is not a canonical fatty-acyl-CoA dehydrogenase in this pathway context.
- term:
    id: GO:0046949
    label: fatty-acyl-CoA biosynthetic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000118
  qualifier: involved_in
  review:
    summary: Fatty-acyl-CoA biosynthetic process is not supported by the enzyme identity.
    action: REMOVE
    reason: The annotation appears to be an automated family-level projection unrelated to the GcdH
      reaction.
- term:
    id: GO:0050660
    label: flavin adenine dinucleotide binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: FAD binding is consistent with the acyl-CoA dehydrogenase fold and catalytic mechanism.
    action: ACCEPT
    reason: This is a cofactor annotation rather than the core reaction, but it is biologically
      plausible and should be retained.
references:
