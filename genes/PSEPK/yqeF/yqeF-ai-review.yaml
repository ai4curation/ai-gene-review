description: 'yqeF encodes an acetyl-CoA acetyltransferase/thiolase-family enzyme. The current evidence
  supports acetyl-CoA acetyltransferase chemistry, while the 3-oxoadipyl-CoA thiolase annotation appears
  over-specific for this side-node thiolase.'
