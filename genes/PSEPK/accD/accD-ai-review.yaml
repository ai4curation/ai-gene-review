  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: AccD is the beta carboxyltransferase subunit of the Pseudomonas putida KT2440 acetyl-CoA carboxylase complex. Together with AccA it performs the carboxyltransferase half-reaction that converts acetyl-CoA to malonyl-CoA, the committed acyl-chain extender precursor for fatty acid biosynthesis.
