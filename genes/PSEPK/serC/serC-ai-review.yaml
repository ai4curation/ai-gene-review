- term:
    id: GO:0008615
    label: pyridoxine biosynthetic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000104
  qualifier: involved_in
  review:
    summary: SerC is a genuine shared enzyme in bacterial pyridoxine/PLP biosynthesis as well as L-serine biosynthesis.
    action: ACCEPT
    reason: >-
      In the PSEPK ppu00750 pathway review, SerC is the transamination step that
      converts the PdxB product toward 4-phosphohydroxy-L-threonine for the
      PdxA/PdxJ branch. This is a shared, not B6-specific, role but should still
      be accepted for pyridoxine biosynthesis.
    supported_by:
    - reference_id: file:projects/P_PUTIDA/deep-research/PSEPK__vitamin_b6_metabolism__ppu00750-deep-research-falcon.md
      supporting_text: 'SerC (PP_1768) genuinely participates in both serine biosynthesis and PLP biosynthesis'
