id: Q88M07
gene_symbol: serC
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: >-
    Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 /
    NCIMB 11950 / KT2440)
description: >-
  SerC is a PLP-dependent class-V aminotransferase (EC 2.6.1.52) shared by two
  biosynthetic pathways. It reversibly transaminates 3-phosphohydroxypyruvate
  in L-serine biosynthesis and
  (R)-3-hydroxy-2-oxo-4-phosphooxybutanoate in DXP-dependent de novo PLP
  biosynthesis. In the vitamin-B6 route it forms
  4-(phosphooxy)-L-threonine for the PdxA reaction.
existing_annotations:
  - term:
      id: GO:0004648
      label: O-phospho-L-serine:2-oxoglutarate transaminase activity
    evidence_type: IEA
    original_reference_id: GO_REF:0000120
    qualifier: enables
    review:
      summary: This term captures the phosphoserine aminotransferase reaction.
      action: ACCEPT
      reason: >-
        GO:0004648 matches the phosphoserine reaction. SerC also catalyzes the
        distinct phosphohydroxythreonine reaction, for which no dedicated GO
        molecular-function term currently exists.
      supported_by:
        - reference_id: file:PSEPK/serC/serC-deep-research-openscientist.md
          supporting_text: >-
            phosphoserine aminotransferase (PSAT; EC 2.6.1.52)
  - term:
      id: GO:0005737
      label: cytoplasm
    evidence_type: IEA
    original_reference_id: GO_REF:0000120
    qualifier: located_in
    review:
      summary: SerC is a soluble cytoplasmic metabolic enzyme.
      action: KEEP_AS_NON_CORE
      reason: Localization is useful context but does not distinguish either reaction.
  - term:
      id: GO:0006564
      label: L-serine biosynthetic process
    evidence_type: IEA
    original_reference_id: GO_REF:0000120
    qualifier: involved_in
    review:
      summary: SerC performs the transamination step of phosphoserine synthesis.
      action: ACCEPT
      reason: UniPathway UPA00135 and the reviewed reaction support this core role.
      supported_by:
        - reference_id: file:PSEPK/serC/serC-deep-research-openscientist.md
          supporting_text: >-
            the **second of three committed steps** of the phosphorylated
            pathway of L-serine biosynthesis
  - term:
      id: GO:0008615
      label: pyridoxine biosynthetic process
    evidence_type: IEA
    original_reference_id: GO_REF:0000104
    qualifier: involved_in
    review:
      summary: SerC performs step 3 of the erythrose-derived PNP branch.
      action: ACCEPT
      reason: UniPathway UPA00244 assigns the phosphohydroxythreonine reaction to SerC.
      supported_by:
        - reference_id: file:PSEPK/serC/serC-deep-research-openscientist.md
          supporting_text: >-
            *serC* is the same protein as **PdxF**
  - term:
      id: GO:0036001
      label: "'de novo' pyridoxal 5'-phosphate biosynthetic process"
    evidence_type: ISS
    original_reference_id: file:PSEPK/serC/serC-uniprot.txt
    qualifier: involved_in
    review:
      summary: SerC/PdxF performs step 3 of the de novo DXP-dependent PLP route.
      action: NEW
      reason: >-
        The reviewed pathway record and the distinct RHEA:16573 reaction support
        the specific de novo process term.
      supported_by:
        - reference_id: file:PSEPK/serC/serC-uniprot.txt
          supporting_text: >-
            pyridoxine 5'-phosphate from D-erythrose 4-phosphate: step 3/5.
  - term:
      id: GO:0030170
      label: pyridoxal phosphate binding
    evidence_type: IEA
    original_reference_id: GO_REF:0000120
    qualifier: enables
    review:
      summary: PLP is the covalently bound aminotransferase cofactor.
      action: KEEP_AS_NON_CORE
      reason: The cofactor annotation is valid but secondary to the catalytic activity.
references:
  - id: GO_REF:0000104
    title: >-
      Electronic Gene Ontology annotations created by transferring manual GO
      annotations between related proteins based on shared sequence features
    findings: []
  - id: GO_REF:0000120
    title: Combined Automated Annotation using Multiple IEA Methods
    findings: []
  - id: file:PSEPK/serC/serC-uniprot.txt
    title: UniProtKB reviewed entry for PSEPK SerC
    findings:
      - statement: >-
          Documents the two EC 2.6.1.52 reactions and assigns SerC to both
          serine and pyridoxine-phosphate biosynthesis.
  - id: file:PSEPK/serC/serC-goa.tsv
    title: QuickGO annotation snapshot for PSEPK SerC
    findings:
      - statement: >-
          Contains the five machine-sourced annotations reviewed above; the
          de novo PLP process annotation is proposed separately.
  - id: file:PSEPK/serC/serC-deep-research-openscientist.md
    title: OpenScientist functional report for PSEPK SerC
    findings:
      - statement: >-
          Supports the exact phosphoserine and phosphohydroxythreonine
          aminotransferase roles and the shared serine/vitamin-B6 pathway use.
          No direct biochemical characterization of Q88M07 was found; broader
          aromatic-amino-acid claims in the report are not included in the core
          review.
core_functions:
  - description: >-
      PLP-dependent phosphoserine aminotransferase reaction in the phosphorylated
      pathway of L-serine biosynthesis.
    molecular_function:
      id: GO:0004648
      label: O-phospho-L-serine:2-oxoglutarate transaminase activity
    directly_involved_in:
      - id: GO:0006564
        label: L-serine biosynthetic process
    supported_by:
      - reference_id: file:PSEPK/serC/serC-deep-research-openscientist.md
        supporting_text: phosphoserine aminotransferase (PSAT; EC 2.6.1.52)
  - description: >-
      The distinct PdxF reaction reversibly transaminates
      (R)-3-hydroxy-2-oxo-4-phosphooxybutanoate to form
      4-(phosphooxy)-L-threonine in de novo PLP biosynthesis. No dedicated GO
      molecular-function term represents this reaction.
    directly_involved_in:
      - id: GO:0036001
        label: "'de novo' pyridoxal 5'-phosphate biosynthetic process"
    supported_by:
      - reference_id: file:PSEPK/serC/serC-uniprot.txt
        supporting_text: "pyridoxine 5'-phosphate from D-erythrose 4-phosphate: step 3/5."
      - reference_id: file:PSEPK/serC/serC-deep-research-openscientist.md
        supporting_text: >-
          In addition to serine biosynthesis, it transaminates the
          erythronate-derived keto-acid intermediate
proposed_new_terms:
  - proposed_name: phosphohydroxythreonine aminotransferase activity
    proposed_definition: >-
      Catalysis of the reversible reaction: 4-(phosphooxy)-L-threonine plus
      2-oxoglutarate equals (R)-3-hydroxy-2-oxo-4-phosphooxybutanoate plus
      L-glutamate.
    justification: >-
      SerC/PdxF catalyzes this reaction in de novo PLP biosynthesis, but
      GO:0004648 represents only its separate phosphoserine aminotransferase
      reaction.
    supported_by:
      - reference_id: file:PSEPK/serC/serC-uniprot.txt
        supporting_text: >-
          Reaction=4-(phosphooxy)-L-threonine + 2-oxoglutarate
