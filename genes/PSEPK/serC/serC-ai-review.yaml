  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: >-
  serC (PP_1768) encodes phosphoserine aminotransferase, a PLP-dependent
  transaminase with a shared role in L-serine biosynthesis and the
  DXP-dependent de novo vitamin B6/PLP pathway.
