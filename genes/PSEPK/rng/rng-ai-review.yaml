description: rng encodes RNase G, an RNase E/G-family S1-domain endoribonuclease in Pseudomonas putida KT2440. Its supported
  first-pass role is cytoplasmic RNA nuclease activity tied to rRNA/RNA processing rather than a fully resolved organism-specific
  RNA-decay pathway.
