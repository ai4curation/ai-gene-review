  title: OpenScientist literature and database synthesis for PSEPK LeuB
  findings:
  - statement: >-
      Identifies Q88LE5 as 3-isopropylmalate dehydrogenase, the enzyme for the
      oxidative decarboxylation step of leucine biosynthesis.
    supporting_text: >-
      The gene *leuB* (locus PP_1988; UniProt Q88LE5) of *Pseudomonas putida*
      KT2440 encodes **3-isopropylmalate dehydrogenase (3-IPMDH, EC
      1.1.1.85)**
  - statement: >-
      No direct KT2440 LeuB characterization was found, so family-level kinetic,
      oligomeric, residue, and regulatory details were not promoted to this review.
    supporting_text: >-
      No primary study has characterized *P. putida* KT2440 LeuB (Q88LE5)
      directly
core_functions:
- description: >-
