id: Q88LE5
gene_symbol: leuB
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: >-
  LeuB is the NAD-dependent 3-isopropylmalate dehydrogenase that oxidatively
  decarboxylates 3-isopropylmalate to 2-oxoisocaproate. This produces the keto
  acid used by IlvE for the terminal transamination of L-leucine biosynthesis.
existing_annotations:
- term:
    id: GO:0000287
    label: magnesium ion binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: Magnesium binding is valid cofactor information but not the core reaction.
    action: KEEP_AS_NON_CORE
    reason: The reviewed UniProt record assigns divalent metal to the LeuB reaction.
- term:
    id: GO:0003862
    label: 3-isopropylmalate dehydrogenase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: This is the specific LeuB catalytic function.
    action: ACCEPT
    reason: EC 1.1.1.85, HAMAP, and LeuB-specific family assignments agree.
    supported_by:
    - reference_id: file:PSEPK/leuB/leuB-uniprot.txt
      supporting_text: Full=3-isopropylmalate dehydrogenase
    - reference_id: file:PSEPK/leuB/leuB-deep-research-openscientist.md
      supporting_text: >-
        The gene *leuB* (locus PP_1988; UniProt Q88LE5) of *Pseudomonas putida*
