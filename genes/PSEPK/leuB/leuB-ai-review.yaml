- term:
    id: GO:0005829
    label: cytosol
  evidence_type: IEA
  original_reference_id: GO_REF:0000118
  qualifier: located_in
  review:
    summary: This duplicates the retained cytoplasm annotation.
    action: MARK_AS_OVER_ANNOTATED
    reason: No distinct LeuB pool is supported by the parent/child location pair.
- term:
    id: GO:0009098
    label: L-leucine biosynthetic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: involved_in
  review:
    summary: LeuB catalyzes the third leucine-specific reaction.
    action: ACCEPT
    reason: UniProt places Q88LE5 at step 3 of 4 in leucine biosynthesis.
- term:
    id: GO:0016616
    label: oxidoreductase activity, acting on the CH-OH group of donors, NAD or NADP as acceptor
  evidence_type: IEA
