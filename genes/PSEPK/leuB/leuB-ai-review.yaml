    action: MARK_AS_OVER_ANNOTATED
    reason: The substrate-specific LeuB term is more informative.
- term:
    id: GO:0051287
    label: NAD binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
