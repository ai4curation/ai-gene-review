description: PP_4136 encodes a predicted Transcriptional regulator, LuxR family in Pseudomonas putida KT2440. LuxR/GerE-family
  DNA-binding domain evidence supports a DNA-binding transcription-regulator role, but current first-pass evidence does not
  identify the regulated operon, ligand, or whether regulation is activating or repressing.
