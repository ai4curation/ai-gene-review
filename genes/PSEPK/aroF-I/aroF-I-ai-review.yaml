gene_symbol: aroF-I
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: aroF-I (PP_2324) encodes a predicted class-I 3-deoxy-D-arabino-heptulosonate 7-phosphate synthase (DAHP synthase; EC 2.5.1.54) in Pseudomonas putida KT2440. DAHP synthase catalyzes the aldol-like condensation of phosphoenolpyruvate and D-erythrose 4-phosphate to form DAHP, the first committed step of the shikimate pathway. That pathway produces chorismate, the branch-point precursor for phenylalanine, tyrosine, tryptophan, folate, ubiquinone, and other aromatic metabolites. KT2440 has multiple DAHP synthase paralogs, including aroH, aroF-I, and aroF-II, and the first-pass evidence supports the enzyme class while leaving feedback regulation and paralog-specific flux unresolved.
existing_annotations:
- term:
    id: GO:0003849
    label: 3-deoxy-7-phosphoheptulonate synthase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: aroF-I is a class-I DAHP synthase family protein with EC 2.5.1.54 annotation, matching condensation of phosphoenolpyruvate and erythrose 4-phosphate to DAHP.
    action: ACCEPT
    reason: This is the core molecular function and is supported by PIRNR/Pfam/InterPro family evidence. Direct biochemical data for this specific paralog were not found in this first pass.
- term:
    id: GO:0005737
    label: cytoplasm
  evidence_type: IEA
  original_reference_id: GO_REF:0000118
  qualifier: located_in
  review:
    summary: DAHP synthase is a soluble central-metabolism enzyme acting on cytoplasmic substrates.
    action: ACCEPT
    reason: Cytoplasmic localization is appropriate for a bacterial shikimate-pathway enzyme and no secretion or membrane features are indicated.
- term:
    id: GO:0009073
    label: aromatic amino acid biosynthetic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: involved_in
  review:
    summary: DAHP synthase initiates the shikimate pathway that supplies chorismate for all three aromatic amino acid branches.
    action: ACCEPT
    reason: Correct biological process for this enzyme class. The specific aromatic amino-acid branch affected by this paralog's feedback regulation is not resolved.
- term:
    id: GO:0042802
    label: identical protein binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000117
  qualifier: enables
  review:
    summary: Class-I DAHP synthases are commonly oligomeric, but identical protein binding is a generic structural interaction term rather than the informative biochemical function.
    action: MARK_AS_OVER_ANNOTATED
    reason: The annotation adds little beyond the catalytic DAHP synthase activity and appears electronically propagated. Generic protein-binding-style terms are not useful as core molecular functions here.
- term:
    id: GO:0009423
    label: chorismate biosynthetic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000041
  qualifier: involved_in
  review:
    summary: DAHP synthase catalyzes the entry reaction into the shikimate pathway, upstream of chorismate.
    action: ACCEPT
    reason: This is the most specific pathway-process annotation available in GOA for the anabolic role of aroF-I.
