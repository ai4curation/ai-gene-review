existing_annotations:
- term:
    id: GO:0003868
    label: 4-hydroxyphenylpyruvate dioxygenase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: Core molecular function. Q88HC7 belongs to the 4HPPD family (TIGR01263,
      IPR005956, PANTHER PTHR11959:SF1) and carries the conserved His/His/Glu Fe(II)-binding
      triad (residues 162, 241, 323). The HPPD function is strongly supported in P.
      putida by genetics, proteomics and RB-TnSeq fitness data (see hpd-deep-research-falcon.md;
      PMID:15262943).
    action: ACCEPT
    reason: Directly supported by family/domain assignment and by experimental evidence
      that hpd is required for growth on tyrosine/phenylalanine via the homogentisate
      pathway in P. putida.
- term:
    id: GO:0006572
    label: L-tyrosine catabolic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000118
  qualifier: involved_in
  review:
    summary: HPPD performs the gateway step (4-HPP to homogentisate) of the homogentisate
      pathway, the route by which P. putida degrades L-tyrosine. hpd mutants cannot
      grow on tyrosine as sole carbon source.
    action: ACCEPT
    reason: Accurate biological process; well supported by the homogentisate pathway
      literature in P. putida.
- term:
    id: GO:0009072
    label: aromatic amino acid metabolic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: involved_in
  review:
    summary: Correct but more general than the specific catabolic role. The homogentisate
      pathway degrades both tyrosine and phenylalanine, so an aromatic-amino-acid-level
      term is defensible, but the more informative term is the catabolic process.
    action: MODIFY
    reason: The annotation is correct but the generic metabolic term under-specifies
      the function. Replace with the catabolic process term, which captures the documented
      degradative role.
    proposed_replacement_terms:
    - id: GO:0009074
      label: aromatic amino acid catabolic process
