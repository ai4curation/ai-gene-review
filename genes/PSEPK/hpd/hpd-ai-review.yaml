description: hpd (PP_3433) encodes 4-hydroxyphenylpyruvate dioxygenase (HPPD; EC 1.13.11.27),
  a cytoplasmic non-heme Fe(II)-dependent oxygenase of the 4HPPD (VOC superfamily)
  family. It catalyzes the conversion of 4-hydroxyphenylpyruvate to homogentisate,
  coupling oxidative decarboxylation, aromatic hydroxylation, and a 1,2-side-chain
  migration in a single reaction that consumes molecular oxygen. This is the committed,
  gateway step of the homogentisate central catabolic pathway, through which Pseudomonas
  putida degrades L-tyrosine, L-phenylalanine, and 3-hydroxyphenylacetate to the central
  metabolites fumarate and acetoacetate. Loss of hpd abolishes growth on tyrosine
  or phenylalanine as sole carbon source, confirming its essential role in routing
  aromatic amino acids into central metabolism.
