id: Q88QR5
gene_symbol: PP_0423
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: >-
  PP_0423 encodes an uncharacterized BPL/LPL catalytic-domain protein assigned
  to the LipM/LipL octanoyltransferase family. This family contains both
  octanoyl-ACP:GcvH transferases and octanoyl-GcvH:E2 amidotransferases, and the
  available sequence-family evidence does not distinguish those activities for
  Q88QR5 or establish that it participates in protein lipoylation in KT2440.
existing_annotations: []
references:
- id: file:PSEPK/PP_0423/PP_0423-uniprot.txt
  title: UniProt entry Q88QR5 for PP_0423
  findings:
  - statement: >-
      Q88QR5 is an unreviewed 234-residue BPL/LPL catalytic-domain protein with
      an InterPro LipM/LipL-family assignment.
    supporting_text: 'DR   InterPro; IPR050664; Octanoyltrans_LipM/LipL.'
- id: file:interpro/panther/PTHR43679/PTHR43679-entries.csv
  title: Reviewed PANTHER PTHR43679 family members
  findings:
  - statement: >-
      Characterized Bacillus subtilis LipM and LipL proteins both occur in
      PTHR43679:SF2, so this subfamily does not resolve the two activities.
proposed_new_terms: []
suggested_questions:
- question: >-
    Does PP_0423 act as an octanoyl-ACP:GcvH transferase, an
    octanoyl-GcvH:E2 amidotransferase, or another BPL/LPL-family enzyme?
  experts:
  - bacterial protein lipoylation specialist
- question: >-
    Does Pseudomonas putida KT2440 route any octanoyl or lipoyl intermediates
    through GcvH despite retaining the direct LipB-LipA pathway?
  experts:
  - Pseudomonas metabolism specialist
suggested_experiments:
- description: >-
    Assay purified PP_0423 with octanoyl-ACP plus apo-GcvH and with
    octanoyl-GcvH plus apo E2 lipoyl domains, using mass spectrometry to detect
    and localize acyl transfer.
- description: >-
    Compare GcvH and E2 lipoylation in wild type, PP_0423 deletion, lipB
    deletion, and double-mutant strains to test relay or redundant-transferase
    models.
