  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: >-
  PP_3808 encodes a small MbtH-like protein, a family commonly associated with
  nonribosomal peptide and siderophore biosynthetic systems. Its current GOA
  places it in siderophore biosynthesis. In the ppu00261 monobactam bucket it is
  best treated as secondary-metabolite accessory context, not as proof of a
  complete monobactam pathway.
