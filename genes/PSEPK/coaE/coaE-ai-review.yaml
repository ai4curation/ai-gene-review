  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: >-
  coaE (PP_0631) encodes a soluble dephospho-CoA kinase that uses ATP to
  phosphorylate the 3'-hydroxyl of dephospho-CoA, producing coenzyme A and ADP.
  This is the fifth and final reaction in the conserved conversion of
  pantothenate to coenzyme A. Q88Q65 belongs to the bacterial CoaE family and
  contains the diagnostic P-loop NTPase and dephospho-CoA kinase domains;
  direct biochemical characterization of the KT2440 protein has not been
  reported.
