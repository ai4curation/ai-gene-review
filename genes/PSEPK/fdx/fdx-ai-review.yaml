description: 'fdx encodes a small 2Fe-2S ferredoxin/adrenodoxin-family electron carrier. In the broad
  KEGG benzoate map it is best treated as a redox partner side node, likely supporting monooxygenase or
  P450 chemistry, rather than as a substrate-specific benzoate degradation enzyme.'
