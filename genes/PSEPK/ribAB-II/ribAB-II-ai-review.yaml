id: Q88GB1
gene_symbol: ribAB-II
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 /
    KT2440)
description: 'ribAB-II encodes a second RibBX-type riboflavin-biosynthesis enzyme in
  Pseudomonas putida KT2440. The protein is supported as a DHBP synthase, while
  KT2440-specific evidence indicates that the C-terminal RibA-like domain is noncanonical
  and does not provide GTP cyclohydrolase II activity.'
existing_annotations:
- term:
    id: GO:0000287
    label: magnesium ion binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000104
  qualifier: enables
  review:
    summary: Magnesium binding is plausible supporting context but not the core
      function.
    action: KEEP_AS_NON_CORE
    reason: The specific enzyme activity and pathway role are more informative for this
      gene review.
- term:
    id: GO:0003824
    label: catalytic activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000117
  qualifier: enables
  review:
    summary: Generic catalytic activity is too broad for a RibBX-family enzyme with
      specific riboflavin-pathway DHBP synthase activity.
    action: MODIFY
    reason: The supported specific activity is DHBP synthase activity; the C-terminal
      RibA-like domain should not be propagated as GTP cyclohydrolase II activity.
    proposed_replacement_terms:
    - id: GO:0008686
      label: 3,4-dihydroxy-2-butanone-4-phosphate synthase activity
- term:
    id: GO:0003935
    label: GTP cyclohydrolase II activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000118
  qualifier: enables
  review:
    summary: GTP cyclohydrolase II activity is an over-propagated annotation for this
      RibBX protein.
    action: REMOVE
    reason: >-
      Species-specific Falcon research summarizes direct KT2440 ribBX evidence:
      PP_3813 complements a ribB mutant but fails to complement a ribA mutant,
      indicating DHBP synthase activity without GTP cyclohydrolase II activity.
    supported_by:
    - reference_id: file:projects/P_PUTIDA/deep-research/PSEPK__riboflavin_biosynthesis__ppu00740-deep-research-falcon.md
      supporting_text: 'complements an *E. coli* ribB mutant but fails to complement a ribA mutant'
