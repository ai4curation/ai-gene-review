taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: hisP encodes the ATP-binding energy-coupling subunit of the PP_4483-PP_4486 His/ArgT-family basic-amino-acid ABC uptake system. UniProt names the protein as a histidine/lysine/arginine/ornithine ABC transporter ATP-binding subunit, and its ABC ATPase domains support ATP hydrolysis-driven import with HisM/HisQ permeases and the ArgT periplasmic substrate-binding component.
