description: >-
  PP_0763 encodes a predicted ATP-dependent medium-chain fatty-acid CoA ligase
  in Pseudomonas putida KT2440. UniProt/PANTHER place it in the
  medium-chain-fatty-acid--CoA ligase subfamily, and the ppu00071 Falcon
  pathway report promotes it as a missing short-chain activation candidate for
  valerate and hexanoate entry into fatty-acid degradation.
