  review:
    summary: Acid-thiol ligase activity is compatible but too broad for the predicted medium-chain fatty-acid CoA ligase.
    action: MODIFY
    reason: >-
      UniProt names PP_0763 as a medium-chain-fatty-acid CoA ligase, PANTHER
      places it in the corresponding subfamily, and the PSEPK ppu00071 Falcon
      report promotes it as a missing fatty-acid activation enzyme. Replace the
      broad acid-thiol ligase parent with the medium-chain fatty acid-CoA ligase
      term.
