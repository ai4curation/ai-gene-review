description: Predicted biotin carboxylase subunit associated with the two-subunit pyruvate carboxylase system in Pseudomonas putida KT2440. PycA catalyzes ATP-dependent carboxylation of a biotinylated carrier and, together with the carboxyltransferase subunit PycB, is inferred to contribute to pyruvate carboxylase activity that provides an anaplerotic oxaloacetate input. The pycA/pycB assignment is weaker than the core TCA enzyme assignments because both UniProt entries are protein-existence level 4/predicted.
