suggested_questions:
- question: Is the predicted PycA/PycB two-subunit enzyme the physiologically relevant pyruvate carboxylase in P. putida KT2440, and how is it distinguished from acetyl-CoA carboxylase biotin-carboxylase chemistry?
suggested_experiments:
- description: Reconstitute PycA/PycB in vitro with the appropriate biotin carrier and test pyruvate-dependent oxaloacetate formation, then assess pycA/pycB mutant growth on gluconeogenic and anaplerotic carbon-source regimes.
