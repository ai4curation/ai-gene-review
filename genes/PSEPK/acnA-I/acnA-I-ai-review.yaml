description: Aconitate hydratase/aconitase of Pseudomonas putida KT2440. AcnA-I catalyzes the reversible citrate-to-isocitrate isomerization through cis-aconitate, covering the aconitase step of the tricarboxylic acid cycle. The pathway-level evidence indicates that P. putida has both acnA-I and acnB, with aconitase chemistry shared between the TCA cycle and methylcitrate-related metabolism.
