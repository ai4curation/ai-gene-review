taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: >-
  FabD is the cytosolic malonyl-CoA:acyl carrier protein transacylase of
  type-II fatty-acid synthesis in Pseudomonas putida KT2440. It transfers
  malonate from malonyl-CoA to holo-AcpP, generating malonyl-ACP for
  chain-initiation and iterative elongation condensations.
