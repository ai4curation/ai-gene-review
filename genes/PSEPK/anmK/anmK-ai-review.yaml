taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: anmK encodes anhydro-N-acetylmuramic acid kinase in Pseudomonas putida KT2440. It phosphorylates 1,6-anhydro-N-acetylmuramic acid during peptidoglycan recycling, allowing cell-wall turnover products to re-enter amino-sugar metabolism.
