id: Q88GX7
gene_symbol: amaC
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: amaC (PP_3590) encodes a cytosolic class-I pyridoxal 5'-phosphate-dependent aminotransferase in Pseudomonas putida KT2440. Sequence/domain evidence places it in the aromatic-amino-acid aminotransferase/aspartate aminotransferase superfamily, and RB-TnSeq/validation experiments identify AmaC as a key L-tyrosine aminotransferase needed for growth on L-phenylalanine and L-tyrosine as nitrogen sources. It functions as an aromatic amino acid aminotransferase involved in phenylalanine and tyrosine metabolism.
existing_annotations:
- term:
    id: GO:0003824
    label: catalytic activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: Generic root-level molecular function term for an enzyme.
    action: MARK_AS_OVER_ANNOTATED
    reason: Correct but uninformative. The specific aminotransferase terms, especially GO:0004838 and GO:0008483, capture the function more usefully.
- term:
    id: GO:0004838
    label: L-tyrosine:2-oxoglutarate transaminase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000118
  qualifier: enables
  review:
    summary: TreeGrafter assigns the aromatic/L-tyrosine aminotransferase function, and KT2440 RB-TnSeq validation supports PP_3590/AmaC as the dominant L-tyrosine aminotransferase for growth on L-Phe and L-Tyr nitrogen sources.
    action: ACCEPT
    reason: Best-supported molecular function. The protein has a class-I PLP aminotransferase domain, belongs to the PANTHER aromatic-amino-acid aminotransferase subfamily, and local KT2440 functional data support reannotation of AmaC as an L-Tyr aminotransferase.
- term:
    id: GO:0005829
    label: cytosol
  evidence_type: IEA
  original_reference_id: GO_REF:0000118
  qualifier: located_in
  review:
    summary: AmaC is a soluble PLP-dependent aminotransferase with no signal peptide or membrane features.
    action: ACCEPT
    reason: Cytosolic localization is appropriate for aromatic amino acid transamination in bacterial metabolism.
- term:
    id: GO:0006520
    label: amino acid metabolic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: involved_in
  review:
    summary: AmaC participates in amino acid metabolism, but the term is too broad for an aromatic aminotransferase with KT2440 evidence in phenylalanine/tyrosine utilization.
    action: MODIFY
    reason: Replace the root-level amino acid metabolism process with a more informative aromatic amino acid process term. Current evidence supports aromatic amino acid metabolism without requiring a narrower commitment to only biosynthesis or only catabolism in GOA.
    proposed_replacement_terms:
    - id: GO:0009072
      label: aromatic amino acid metabolic process
- term:
    id: GO:0008483
    label: transaminase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: General transaminase activity supported by class-I PLP-dependent aminotransferase family evidence.
    action: KEEP_AS_NON_CORE
    reason: Correct parent term, but less specific than the L-tyrosine/aromatic aminotransferase activity that represents the core function.
- term:
    id: GO:0030170
    label: pyridoxal phosphate binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: AmaC is a PLP-dependent class-I aminotransferase with conserved PLP-binding motifs.
    action: ACCEPT
    reason: PLP binding is required for the transamination mechanism and is strongly supported by InterPro/Pfam/PROSITE family evidence.
- term:
    id: GO:0042802
    label: identical protein binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000118
  qualifier: enables
  review:
    summary: UniProt predicts a homodimer, as is common for class-I aminotransferases, but identical protein binding is not an informative molecular function for this review.
    action: MARK_AS_OVER_ANNOTATED
    reason: Self-association is a structural property and the generic binding term adds little beyond the enzymatic activity; protein-binding-style terms are discouraged for core curation.
