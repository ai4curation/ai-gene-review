id: Q88Q07
gene_symbol: proB
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: >-
  proB (PP_0691) encodes the reviewed cytoplasmic glutamate 5-kinase of the
  Pseudomonas putida KT2440 proline-biosynthesis pathway. ProB uses ATP to
  phosphorylate L-glutamate, forming L-glutamyl 5-phosphate, the acyl phosphate
  intermediate subsequently reduced by ProA to L-glutamate 5-semialdehyde/P5C.
  Its core role is therefore the first enzymatic step in the
  glutamate-to-P5C branch of L-proline biosynthesis.
existing_annotations:
- term:
    id: GO:0003723
    label: RNA binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: >-
      RNA binding is predicted from the PUA domain and may reflect regulatory
      or ancestral domain behavior, but it is not the core ProB function.
    action: KEEP_AS_NON_CORE
    reason: >-
      Retain as a non-core domain-associated activity pending deeper evidence.
      The reviewed biochemical role is glutamate 5-kinase activity in proline
      biosynthesis.
- term:
    id: GO:0004349
    label: glutamate 5-kinase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: >-
      This is the core molecular function of ProB.
    action: ACCEPT
    reason: >-
      UniProt records the EC 2.7.2.11/Rhea reaction converting L-glutamate and
      ATP to L-glutamyl 5-phosphate and ADP.
    supported_by:
    - reference_id: file:PSEPK/proB/proB-uniprot.txt
      supporting_text: Reaction=L-glutamate + ATP = L-glutamyl 5-phosphate + ADP
- term:
    id: GO:0005524
    label: ATP binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: >-
      ATP binding is correct for the kinase reaction but less informative than
      the catalytic activity.
    action: KEEP_AS_NON_CORE
    reason: >-
      Retain as a supporting co-substrate binding annotation; the core function
      is glutamate 5-kinase activity.
- term:
    id: GO:0005737
    label: cytoplasm
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: located_in
  review:
    summary: >-
      Cytoplasm is appropriate for this soluble bacterial amino-acid
      biosynthetic enzyme.
    action: ACCEPT
    reason: >-
      UniProt records cytoplasmic localization for ProB.
    supported_by:
    - reference_id: file:PSEPK/proB/proB-uniprot.txt
      supporting_text: "SUBCELLULAR LOCATION: Cytoplasm"
- term:
    id: GO:0005829
    label: cytosol
  evidence_type: IEA
  original_reference_id: GO_REF:0000118
  qualifier: located_in
  review:
    summary: >-
      Cytosol is consistent with cytoplasmic localization but redundant with
      the cytoplasm annotation.
    action: KEEP_AS_NON_CORE
    reason: >-
      Keep as compatible automated localization, but use one cytoplasmic
      location in the core-function summary.
- term:
    id: GO:0008652
    label: amino acid biosynthetic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000117
  qualifier: involved_in
  review:
    summary: >-
      Amino acid biosynthesis is correct but too broad for ProB.
    action: MODIFY
    reason: >-
      The specific process is L-proline biosynthesis.
    proposed_replacement_terms:
    - id: GO:0055129
      label: L-proline biosynthetic process
- term:
    id: GO:0016301
    label: kinase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: >-
      Generic kinase activity is true but less informative than the
      substrate-specific ProB activity.
    action: MODIFY
    reason: >-
      Replace the broad kinase parent with glutamate 5-kinase activity.
    proposed_replacement_terms:
    - id: GO:0004349
      label: glutamate 5-kinase activity
- term:
    id: GO:0055129
    label: L-proline biosynthetic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: involved_in
  review:
    summary: >-
      ProB is step 1 of L-glutamate-5-semialdehyde formation from L-glutamate
      during proline biosynthesis.
    action: ACCEPT
    reason: >-
      UniProt places ProB in L-proline biosynthesis, step 1/2 of the
      L-glutamate-to-L-glutamate-5-semialdehyde branch.
    supported_by:
    - reference_id: file:PSEPK/proB/proB-uniprot.txt
      supporting_text: "PATHWAY: Amino-acid biosynthesis; L-proline biosynthesis"
