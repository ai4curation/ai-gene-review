proposed_new_terms: []
suggested_questions:
- question: What starter unit and amino acid substrates are selected by the KT2440 PvdL modules?
  experts: []
- question: Is KT2440 PvdL membrane-associated like the P. aeruginosa PvdL assembly hub, and does that organization control
    handoff to PvdI, PvdJ, and PvdD?
  experts: []
suggested_experiments:
- experiment_type: biochemical assay
  description: Clone and assay individual pvdL adenylation modules or module pairs against candidate pyoverdine/ferribactin
    substrate amino acids.
  hypothesis: pvdL adenylation modules select defined residues in the KT2440 pyoverdine precursor.
- experiment_type: protein interaction study
  description: Measure pvdL interaction with PvdL, PvdI, PvdJ, and PvdD by co-immunoprecipitation, cross-linking mass spectrometry,
    or bacterial two-hybrid assays under iron limitation.
  hypothesis: pvdL participates in a coordinated pyoverdine NRPS assembly line.
