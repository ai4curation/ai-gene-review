taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: pvdL encodes a very large non-ribosomal peptide synthetase subunit of ferribactin/pyoverdine assembly in Pseudomonas
  putida KT2440. Its multiple adenylation, condensation, and phosphopantetheine carrier domains, plus an FAAL/FAAC-like region,
  support an initiation/assembly role in pyoverdine siderophore biosynthesis rather than lipid biosynthesis or Actinobacterium-type
  cell-wall biogenesis.
