  review:
    summary: Core molecular function. This is the EC 5.6.2.2 type II topoisomerase activity of DNA gyrase, matching the UniProt RecName/FUNCTION, HAMAP-Rule MF_01897 (GyrA), TIGR01063 (gyrA), and the catalytic Topo IIA domain (PROSITE PS52040) bearing the active-site tyrosine (Tyr122). Strongly supported despite IEA evidence.
