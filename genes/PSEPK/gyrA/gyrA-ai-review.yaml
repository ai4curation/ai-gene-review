description: gyrA (PP_1767) encodes the A subunit of DNA gyrase, a bacterial type IIA topoisomerase (EC 5.6.2.2). DNA gyrase is a heterotetramer of two GyrA and two GyrB chains (A2B2) that uses ATP-dependent double-strand passage to introduce negative supercoils into closed circular double-stranded DNA, maintaining the chromosome in an underwound state and also resolving catenanes and knots. GyrA carries the active-site tyrosine (Tyr122 in this protein) that forms the transient covalent 5'-phosphotyrosine intermediate with the cleaved DNA, and contributes the DNA-binding/cleavage and C-terminal DNA-wrapping (GyrA-box) functions, while the partner GyrB subunit provides the ATPase and metal-binding activities. By managing DNA topology, gyrase supports replication, transcription, recombination, and repair in the cytoplasm of P. putida; it is a classic target of quinolone and aminocoumarin antibiotics.
