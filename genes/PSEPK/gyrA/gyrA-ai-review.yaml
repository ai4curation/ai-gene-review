  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: The gyrase holoenzyme reaction is ATP-dependent; the ATP-binding keyword propagates to the complex via UniRule. The ATPase/ATP-binding site resides in the partner GyrB subunit rather than GyrA, so for GyrA this is a supporting/complex-level rather than core GyrA-specific function. Retained as non-core.
    action: KEEP_AS_NON_CORE
