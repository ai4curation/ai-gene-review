id: Q88PL8
gene_symbol: queA
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: queA (PP_0832) encodes S-adenosylmethionine:tRNA ribosyltransferase-isomerase, a cytoplasmic QueA-family enzyme
  in bacterial tRNA queuosine biosynthesis. It transfers and isomerizes the ribose moiety from S-adenosylmethionine onto
  preQ1-modified tRNA to form epoxyqueuosine-modified tRNA.
