  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: PP_4987 encodes a small CheW-like chemotaxis protein in the PP_4987-PP_4992 Pil/Chp-type
  signaling cluster of Pseudomonas putida KT2440. Its CheW-domain signature supports an adaptor/scaffold
  role in a chemosensory signaling array rather than an enzymatic function.
