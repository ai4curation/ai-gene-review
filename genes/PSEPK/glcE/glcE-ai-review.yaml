    label: catalytic activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: The generic catalytic activity annotation is less useful than the complex-specific glycolate dehydrogenase annotation.
    action: MARK_AS_OVER_ANNOTATED
    reason: GlcE is best interpreted as a component of the GlcDEF glycolate dehydrogenase system, not as an unspecified catalyst.
    supported_by:
    - reference_id: file:PSEPK/glcE/glcE-goa.tsv
