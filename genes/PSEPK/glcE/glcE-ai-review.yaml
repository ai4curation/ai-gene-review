    label: glyoxylate metabolic process
  evidence_type: ISS
  original_reference_id: file:PSEPK/glcE/glcE-goa.tsv
  qualifier: involved_in
  review:
    summary: GlcE is predicted to participate in glyoxylate metabolism as an FAD-binding component of the GlcDEF glycolate dehydrogenase system.
    action: NEW
    reason: GOA and UniProt support glycolate dehydrogenase activity for GlcE, and this complex-level reaction produces glyoxylate in the glycolate/glyoxylate assimilation branch.
    supported_by:
    - reference_id: file:PSEPK/glcE/glcE-goa.tsv
      supporting_text: "UniProtKB\tQ88GH7\tglcE\tenables\tGO:0019154\tglycolate dehydrogenase activity"
    - reference_id: file:PSEPK/glcE/glcE-uniprot.txt
      supporting_text: "DE   SubName: Full=Glycolate oxidase, putative FAD-binding subunit"
    - reference_id: file:PSEPK/glcE/glcE-deep-research-openscientist.md
      supporting_text: "The enzyme operates in the **cytoplasm/inner-membrane interface** and constitutes the **committed step of glycolate and two-carbon (C2) catabolism**, generating glyoxylate for assimilation via the glyoxylate node"
