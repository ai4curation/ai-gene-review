id: Q88GH7
gene_symbol: glcE
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: >-
  glcE encodes the FAD-binding GlcE subunit of the predicted KT2440 GlcDEF
  glycolate dehydrogenase complex. It supports complex-level oxidation of
  glycolate to glyoxylate rather than acting as a standalone pathway enzyme.
existing_annotations:
