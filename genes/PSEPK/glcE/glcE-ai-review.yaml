  review:
    summary: The annotation captures the GlcDEF complex-level activity to which GlcE contributes.
    action: ACCEPT
    reason: UniProt assigns EC 1.1.99.14 to GlcE and GOA maps the protein to glycolate dehydrogenase activity; the review treats this as contribution to the GlcDEF complex reaction.
    supported_by:
