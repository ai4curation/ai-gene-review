proposed_new_terms: []
suggested_questions:
- question: Is fbp essential for growth of P. putida KT2440 on gluconeogenic carbon
    sources (organic acids, amino acids, aromatics) given that the organism lacks a
    glycolytic EMP route?
- question: Is the activity of Fbp allosterically regulated (e.g. by AMP or fructose
    2,6-bisphosphate) in P. putida, as seen for some class 1 FBPases?
suggested_experiments:
- hypothesis: Fbp is required for gluconeogenesis and growth on gluconeogenic substrates
    in P. putida KT2440.
  description: Construct an fbp deletion and complemented strain and compare growth
    on gluconeogenic carbon sources (e.g. succinate, acetate, glutamate) versus a
    glycolytic/ED substrate such as glucose.
  experiment_type: growth phenotype and complementation
- hypothesis: Purified Fbp is a Mg(2+)-dependent fructose-1,6-bisphosphatase with EC
    3.1.3.11 activity.
  description: Express and purify recombinant Fbp and measure steady-state kinetics
    for fructose 1,6-bisphosphate hydrolysis, including the magnesium dependence and
    quaternary structure (homotetramer).
  experiment_type: enzymology
