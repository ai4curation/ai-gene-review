- term:
    id: GO:0005986
    label: sucrose biosynthetic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000118
  qualifier: involved_in
  review:
    summary: This is a TreeGrafter/PANTHER homology transfer. Sucrose biosynthesis
      (via sucrose-phosphate synthase and sucrose-phosphate phosphatase) is a plant
      and cyanobacterial process, and the PANTHER family spans plant sedoheptulose-/fructose-bisphosphatases.
      Fbp is a gluconeogenic fructose-1,6-bisphosphatase and there is no evidence that
      P. putida KT2440 synthesizes sucrose, so this annotation is a spurious over-broad
      homology transfer.
    action: REMOVE
    reason: Sucrose biosynthesis is not a process of P. putida KT2440 nor a function
      of class 1 FBPase; this is an incorrect electronic transfer from plant-type
      enzymes in the same broad PANTHER family. The transfer source is the PANTHER
      subfamily PTHR11556:SF35, whose plant/chloroplast sedoheptulose-1,7-bisphosphatase
      (SBPase) name mis-classifies this bacterial enzyme and propagates the spurious
      sucrose/SBPase biological process.
    supported_by:
    - reference_id: file:PSEPK/fbp/fbp-uniprot.txt
      supporting_text: PANTHER; PTHR11556:SF35; SEDOHEPTULOSE-1,7-BISPHOSPHATASE, CHLOROPLASTIC;
        1.
    - reference_id: file:PSEPK/fbp/fbp-uniprot.txt
      supporting_text: PTHR11556:SF35; SEDOHEPTULOSE-1,7-BISPHOSPHATASE, CHLOROPLASTIC
    - reference_id: file:PSEPK/fbp/fbp-notes.md
      supporting_text: There is no evidence P. putida
