  review:
    summary: Fbp catalyzes the committed, essentially irreversible fructose-1,6-bisphosphate
      to fructose-6-phosphate step of gluconeogenesis. This matches the UniProt pathway
      assignment and is the core biological process for this enzyme, especially in
      P. putida KT2440 which catabolizes glucose via the Entner-Doudoroff pathway and
