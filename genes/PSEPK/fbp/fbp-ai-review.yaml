taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: Fbp (PP_5040) is the class 1 fructose-1,6-bisphosphatase (EC 3.1.3.11)
  of Pseudomonas putida KT2440, a 336-residue cytoplasmic enzyme that assembles into
  a homotetramer. It catalyzes the magnesium-dependent hydrolysis of beta-D-fructose
  1,6-bisphosphate to beta-D-fructose 6-phosphate and inorganic phosphate, binding
  two Mg(2+) ions per subunit. This reaction is the committed, essentially irreversible
  step of gluconeogenesis that converts triose-phosphate-derived fructose 1,6-bisphosphate
  into hexose phosphates, enabling the cell to build glucose 6-phosphate and downstream
  carbohydrate precursors when growing on gluconeogenic carbon sources. The enzyme
  belongs to the FBPase class 1 family.
