  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: pabB (PP_2329) encodes aminodeoxychorismate synthase, the chorismate-using enzyme of para-aminobenzoate biosynthesis
  for folate production. It is homologous to anthranilate-synthase-family enzymes, but its supported pathway role here is
  pABA/folate rather than tryptophan biosynthesis.
