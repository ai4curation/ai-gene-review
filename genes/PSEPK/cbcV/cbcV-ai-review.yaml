    label: nucleotide binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000104
  qualifier: enables
  review:
    summary: Nucleotide binding is true but less informative than ATP binding for this ABC transporter ATPase.
    action: MARK_AS_OVER_ANNOTATED
    reason: The protein has a canonical ABC transporter ATP-binding domain, and the specific ATP-binding and ATP-hydrolysis annotations are more useful than generic nucleotide binding.
    supported_by:
