  qualifier: involved_in
  review:
    summary: Response to osmotic stress is plausible compatible-solute context but should be kept as non-core for this transporter ATPase.
    action: KEEP_AS_NON_CORE
    reason: Choline and glycine betaine import can support osmoadaptation, but this broad stress-response term is less direct than transporter activity and choline/osmolyte transport.
    supported_by:
    - reference_id: file:PSEPK/cbcV/cbcV-goa.tsv
      supporting_text: "GO:0006970\tresponse to osmotic stress"
