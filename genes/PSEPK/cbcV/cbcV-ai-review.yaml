  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: cbcV (PP_0294) encodes the ATP-binding energy-coupling component of a predicted choline/betaine/carnitine-family ABC uptake system. Its ABC transporter ATP-binding domain and conserved choline/osmolyte-uptake ATPase signatures support a role in ATP-driven import of compatible solutes rather than a standalone metabolic activity.
