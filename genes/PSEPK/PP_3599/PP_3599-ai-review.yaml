id: Q88GW8
gene_symbol: PP_3599
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: >-
  PP_3599 is a DapA-fold 5-dehydro-4-deoxyglucarate dehydratase in
  Pseudomonas putida KT2440. It is predicted to catalyze the second dehydration
  step of D-glucarate degradation, converting 5-dehydro-4-deoxy-D-glucarate to
  2,5-dioxopentanoate, carbon dioxide, and water.
existing_annotations:
- term:
    id: GO:0008840
    label: 4-hydroxy-tetrahydrodipicolinate synthase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000118
  qualifier: enables
  review:
    summary: >-
      Remove this TreeGrafter DapA-family activity call. The protein belongs to
      a broad DapA/aldolase family, but the reviewed UniProt and Panther
      subfamily evidence identify this sequence as a
      5-dehydro-4-deoxyglucarate dehydratase rather than a lysine-biosynthetic
      4-hydroxy-tetrahydrodipicolinate synthase.
    action: REMOVE
    reason: >-
      This is a computational family over-propagation from a diverse DapA-like
      family. The entry is named KDGDH, has EC 4.2.1.41, is placed in
      D-glucarate degradation step 2/2, and is assigned to the Panther
      5-dehydro-4-deoxyglucarate dehydratase subfamily. Those more specific
      sources contradict the TreeGrafter 4-hydroxy-tetrahydrodipicolinate
      synthase assertion.
    supported_by:
    - reference_id: file:PSEPK/PP_3599/PP_3599-uniprot.txt
      supporting_text: 'DR   GO; GO:0008840; F:4-hydroxy-tetrahydrodipicolinate synthase activity; IEA:TreeGrafter.'
    - reference_id: file:PSEPK/PP_3599/PP_3599-uniprot.txt
      supporting_text: 'DE   RecName: Full=5-dehydro-4-deoxyglucarate dehydratase;'
    - reference_id: file:PSEPK/PP_3599/PP_3599-uniprot.txt
      supporting_text: 'DR   PANTHER; PTHR12128:SF19; 5-DEHYDRO-4-DEOXYGLUCARATE DEHYDRATASE 2-RELATED; 1.'
- term:
    id: GO:0016052
    label: carbohydrate catabolic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: involved_in
  review:
    summary: >-
      Mark this broad parent process as over-annotated. The protein is
      specifically supported as a D-glucarate-degradation enzyme, so the generic
      carbohydrate catabolic process term is true only at an uninformative
      ancestor level.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      UniProt places PP_3599 in D-glucarate degradation and GOA already includes
      the more informative D-glucarate catabolic process annotation. Keeping the
      broad InterPro2GO parent as a core biological-process statement would
      obscure the specific pathway role.
    supported_by:
    - reference_id: file:PSEPK/PP_3599/PP_3599-uniprot.txt
