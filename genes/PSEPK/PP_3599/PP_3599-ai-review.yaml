suggested_questions:
- question: Does PP_3599 participate only in the glucarate branch, or is it also used downstream of galactarate dehydration in KT2440?
- question: Which local 2,5-dioxovalerate or KGSADH paralog receives the PP_3599 product in vivo?
suggested_experiments:
- description: >-
    Purify PP_3599 and verify substrate specificity for
    5-dehydro-4-deoxy-D-glucarate and any galactarate-derived keto-deoxy
    intermediates.
  experiment_type: enzyme substrate kinetics
- description: >-
    Test PP_3599 deletion and combined PP_3599/KGSADH-paralog mutants for
    growth and metabolite accumulation on glucarate, glucuronate, and
    galacturonate.
  experiment_type: targeted genetics with metabolomics
