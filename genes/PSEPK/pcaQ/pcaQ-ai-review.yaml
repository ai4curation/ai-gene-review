id: Q88M61
gene_symbol: pcaQ
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: 'pcaQ encodes a predicted PcaQ-family DNA-binding transcriptional regulator associated with
  the protocatechuate/beta-ketoadipate gene module. Its core role is regulatory rather than catalytic:
  it is expected to bind DNA and promote transcription of pathway genes in response to aromatic-catabolic
  context.'
existing_annotations:
- term:
    id: GO:0003677
    label: DNA binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: DNA binding is plausible for a PcaQ-family transcriptional regulator but less informative
      than transcription-factor activity and cis-regulatory binding terms.
    action: KEEP_AS_NON_CORE
    reason: Retain as a broad molecular function while treating DNA-binding transcription factor activity
      as the clearer annotation.
    supported_by:
    - reference_id: file:PSEPK/pcaQ/pcaQ-uniprot.txt
      supporting_text: 'SubName: Full=Transcriptional regulator PcaQ'
    - reference_id: file:PSEPK/pcaQ/pcaQ-uniprot.txt
      supporting_text: DR   InterPro; IPR012787; TF_PcaQ
- term:
    id: GO:0003700
    label: DNA-binding transcription factor activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: The PcaQ-family protein identity supports DNA-binding transcription factor activity.
    action: ACCEPT
    reason: The UniProt name and PcaQ-family domain assignment are consistent with a pathway transcriptional
      regulator.
    supported_by:
    - reference_id: file:PSEPK/pcaQ/pcaQ-uniprot.txt
      supporting_text: 'SubName: Full=Transcriptional regulator PcaQ'
    - reference_id: file:PSEPK/pcaQ/pcaQ-uniprot.txt
      supporting_text: DR   InterPro; IPR012787; TF_PcaQ
- term:
    id: GO:0005829
    label: cytosol
  evidence_type: IEA
  original_reference_id: GO_REF:0000118
  review:
    summary: Cytosol is a plausible bacterial location for a soluble transcriptional regulator, but this
      is not the core biological role.
    action: KEEP_AS_NON_CORE
    reason: Retain as a non-core location annotation; there is no evidence for membrane or organellar
      localization.
    supported_by:
    - reference_id: file:PSEPK/pcaQ/pcaQ-uniprot.txt
      supporting_text: DR   GO; GO:0005829; C:cytosol; IEA:TreeGrafter
- term:
    id: GO:0006355
    label: regulation of DNA-templated transcription
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  review:
    summary: Regulation of DNA-templated transcription is correct but broad for a pathway-specific regulator.
    action: KEEP_AS_NON_CORE
    reason: The more specific positive-regulation and transcription-factor terms better capture the functional
      inference.
    supported_by:
    - reference_id: file:PSEPK/pcaQ/pcaQ-uniprot.txt
      supporting_text: 'SubName: Full=Transcriptional regulator PcaQ'
    - reference_id: file:PSEPK/pcaQ/pcaQ-uniprot.txt
      supporting_text: DR   InterPro; IPR012787; TF_PcaQ
- term:
    id: GO:0019619
    label: 3,4-dihydroxybenzoate catabolic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: A direct 3,4-dihydroxybenzoate catabolic process annotation overstates the role of PcaQ.
    action: MARK_AS_OVER_ANNOTATED
    reason: PcaQ is a transcriptional regulator, not a catalytic enzyme in protocatechuate breakdown.
      A regulation term is more appropriate than direct pathway participation.
    supported_by:
    - reference_id: file:PSEPK/pcaQ/pcaQ-uniprot.txt
      supporting_text: 'SubName: Full=Transcriptional regulator PcaQ'
    - reference_id: file:PSEPK/pcaQ/pcaQ-uniprot.txt
      supporting_text: DR   InterPro; IPR012787; TF_PcaQ
- term:
    id: GO:0045893
    label: positive regulation of DNA-templated transcription
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: Positive regulation of DNA-templated transcription is the best available process-level description
      for PcaQ-family regulatory function.
    action: ACCEPT
    reason: The protein is annotated as a transcriptional regulator and belongs to the PcaQ transcription-factor
      family, supporting positive regulation of pathway gene transcription.
    supported_by:
    - reference_id: file:PSEPK/pcaQ/pcaQ-uniprot.txt
      supporting_text: 'SubName: Full=Transcriptional regulator PcaQ'
    - reference_id: file:PSEPK/pcaQ/pcaQ-uniprot.txt
      supporting_text: DR   InterPro; IPR012787; TF_PcaQ
references:
