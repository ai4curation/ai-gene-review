description: PP_1421 encodes a predicted two-component sensor histidine kinase in Pseudomonas putida KT2440.
  Its 2CSK_N, HAMP, HisKA, and HATPase domains support a membrane-associated phosphorelay sensor role
  adjacent to tctD.
