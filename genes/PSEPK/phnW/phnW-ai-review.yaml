- id: file:PSEPK/phnW/phnW-deep-research-falcon.md
  title: Falcon deep research report for phnW (Q88KT0, Pseudomonas putida KT2440)
  findings:
  - supporting_text: PhnW is the PLP-dependent aminotransferase that converts AEP into phosphonoacetaldehyde (PAA/P-Ald)** while transferring the amino group to **pyruvate** to form **L-alanine**
    reference_section_type: OTHER
  - supporting_text: PhnW follows a classic **Bi–Bi ping-pong** aminotransferase mechanism involving formation of Schiff-base intermediates with the PLP cofactor
    reference_section_type: OTHER
  - supporting_text: This places PhnW as the *committing upstream step* that generates the specific substrate required by PhnX
    reference_section_type: OTHER
  - supporting_text: PhnX** (phosphonoacetaldehyde hydrolase/phosphonatase) cleaves PAA to **acetaldehyde + inorganic phosphate**, completing C–P bond cleavage
    reference_section_type: OTHER
  - supporting_text: A **dimeric** functional unit, with the active site at the domain interface and contributions from both subunits
    reference_section_type: OTHER
  - supporting_text: 'No detectable activity** with **oxaloacetate** as amino acceptor and only **very low activity** with **α-ketoglutarate'
    reference_section_type: OTHER
  - supporting_text: substitutions at **Asp168** or **Lys194** abolished detectable activity, while changes at **Arg340** substantially impaired catalysis and increased the AEP Km
    reference_section_type: OTHER
  - supporting_text: PhnW is a soluble PLP-dependent aminotransferase acting on imported AEP
    reference_section_type: OTHER
  - supporting_text: PhnW is most plausibly **cytosolic**
    reference_section_type: OTHER
