description: phnW (PP_2209) encodes 2-aminoethylphosphonate--pyruvate transaminase (AEP transaminase / AEPT; EC 2.6.1.37), a homodimeric, pyridoxal-5'-phosphate (PLP)-dependent class-V aminotransferase. It catalyzes the reversible transamination 2-aminoethylphosphonate (AEP/ciliatine) + pyruvate <-> phosphonoacetaldehyde + L-alanine via a Bi-Bi ping-pong mechanism, the committing first step of bacterial AEP (aminophosphonate) catabolism. By converting the amino group of AEP into a carbonyl, PhnW generates phosphonoacetaldehyde, the activated substrate required for subsequent C-P bond cleavage by PhnX (phosphonatase; PhnWX route) or oxidation by PhnY/PhnA (PhnWAY route), enabling phosphonate phosphorus acquisition. The enzyme is a soluble cytosolic protein acting on AEP imported by periplasmic-binding-protein-dependent transporters.
