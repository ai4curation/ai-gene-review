suggested_questions:
- question: Which phosphonate substrates induce the phnW-associated AEP degradation pathway in P. putida KT2440, and is PP_2209 co-transcribed with a phnX/phnA-type C-P cleavage enzyme?
- question: Is KT2440 phnW regulated by a LysR-family activator (AepR-like) and/or the Pho regulon under phosphate limitation, as reported for other Pseudomonas AEP operons?
suggested_experiments:
- description: Measure phnW (PP_2209) expression and phosphonoacetaldehyde formation after growth of KT2440 on 2-aminoethylphosphonate and related phosphonates, with and without phosphate, to define substrate induction and pathway flux.
  experiment_type: substrate induction and metabolite assay
- description: Heterologously express and purify KT2440 PhnW (Q88KT0) and determine steady-state kinetics for AEP/pyruvate and reverse substrates, confirming AEP/PAA specificity and PLP dependence directly for the KT2440 ortholog.
  experiment_type: enzyme kinetics
