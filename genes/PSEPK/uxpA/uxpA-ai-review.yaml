description: uxpA (PP_1044) encodes a lipoprotein with 5'-nucleotidase C-terminal and metallo-dependent phosphatase-like domains
  in Pseudomonas putida KT2440. The available evidence supports a nucleotide-catabolic hydrolase context, best represented
  as candidate 5'-nucleotidase activity, while envelope localization remains unresolved beyond lipoprotein metadata.
