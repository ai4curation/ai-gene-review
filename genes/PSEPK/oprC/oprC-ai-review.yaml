description: oprC encodes OprC, a TonB-dependent outer-membrane copper-receptor-family protein. It carries TonB-dependent
  receptor barrel/plug features and a copper-receptor family signature, supporting a metal-uptake receptor role while leaving
  the exact transported copper species unresolved.
