taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: adk encodes adenylate kinase, a cytoplasmic nucleotide-metabolism enzyme that reversibly transfers phosphate between ATP and AMP to produce two ADP molecules. It maintains adenine nucleotide balance and participates in AMP salvage, but it is a KEGG thiamine-map side node rather than a thiamine-biosynthesis enzyme.
