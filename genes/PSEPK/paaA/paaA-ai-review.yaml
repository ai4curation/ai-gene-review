- id: file:PSEPK/paaA/paaA-deep-research-openscientist.md
  title: OpenScientist deep research for PSEPK paaA
  findings:
  - statement: Ortholog evidence identifies PaaA as the catalytic alpha subunit.
    supporting_text: >-
      PaaAC forms a catalytic core with a monooxygenase fold with PaaA being
      the catalytic α subunit and PaaC, the structural β subunit
    reference_section_type: RESULTS
  - statement: Definitive subunit-level experiments were performed on the E. coli complex.
    supporting_text: >-
      Direct characterization is largely from *E. coli*, not *P. putida*
      KT2440.
    reference_section_type: CONCLUSIONS
  reference_review:
    relevance: HIGH
    correctness: UNVERIFIED
    review_notes: >-
      The family/domain interpretation supports a catalytic-alpha assignment
      for the exact target, but the definitive subunit reconstitution is from
      E. coli. PaaD dispensability, reverse deoxygenation, detailed di-iron
      mechanism, localization, and regulatory claims were not imported.
