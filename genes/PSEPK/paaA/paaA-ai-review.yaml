taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: >-
  PaaA is the predicted catalytic alpha subunit of the soluble PaaABCE ring
  1,2-phenylacetyl-CoA epoxidase system in Pseudomonas putida KT2440. As part
  of the multicomponent complex, it contributes to oxygen-dependent aromatic
  ring epoxidation during aerobic phenylacetate catabolism.
