id: Q88L15
gene_symbol: moaB-I
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: >-
  moaB-I encodes a soluble MoaB-family protein adjacent to moeA. MoaB-family
  proteins bind GTP and molybdopterin, but catalytic MPT adenylyltransferase
  activity is lineage-dependent; the exact biochemical contribution and
  necessity of this KT2440 paralog remain unresolved.
