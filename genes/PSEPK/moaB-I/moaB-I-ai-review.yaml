    id: GO:0005829
    label: cytosol
  evidence_type: IEA
  original_reference_id: GO_REF:0000118
  qualifier: located_in
  review:
    summary: Cytosolic localization is compatible with this small soluble MoaB-family protein.
    action: KEEP_AS_NON_CORE
    reason: Q88L15 lacks membrane/export features and is adjacent to cytosolic moeA.
- term:
    id: GO:0006777
    label: Mo-molybdopterin cofactor biosynthetic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: involved_in
  review:
    summary: Pathway involvement is plausible but the paralog's exact contribution and necessity are unresolved.
    action: UNDECIDED
    reason: UniProt says MoaB may participate but explicitly transfers a no-MPT-adenylyltransferase statement from the family; no gene-specific assay establishes Q88L15's role.
    supported_by:
    - reference_id: file:PSEPK/moaB-I/moaB-I-uniprot.txt
      supporting_text: |-
        CC   -!- FUNCTION: May be involved in the biosynthesis of molybdopterin. Can
        CC       bind GTP and has low GTPase activity. Can bind MPT, but has no MPT
        CC       adenylyl transferase activity. {ECO:0000256|ARBA:ARBA00055616}.
