  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: cheB3 encodes a CheB-family chemotaxis adaptation enzyme in the PP_1488-PP_1494 Wsp-like
  cluster. It has an N-terminal receiver domain and C-terminal CheB methylesterase domain and is predicted
  to demethylate and deamidate MCP-family receptor substrates during local surface-sensing or chemotaxis
  adaptation.
