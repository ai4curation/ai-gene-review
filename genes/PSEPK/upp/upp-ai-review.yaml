  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: upp encodes uracil phosphoribosyltransferase (UPRTase; EC 2.4.2.9), a cytoplasmic pyrimidine salvage enzyme that
  converts uracil and PRPP to UMP and diphosphate. It directly supports uracil and UMP salvage rather than de novo pyrimidine-ring
  synthesis.
