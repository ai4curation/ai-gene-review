description: metP (PP_0219) encodes the predicted multi-pass inner-membrane permease
  component of a second MetNIQ-like methionine ABC importer. Its product name, MetI-like
  PANTHER assignment, and adjacent metN2/PP_0221 genes support methionine translocation
  across the plasma membrane.
