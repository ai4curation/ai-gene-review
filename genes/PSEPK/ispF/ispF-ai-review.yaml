description: ispF encodes 2-C-methyl-D-erythritol 2,4-cyclodiphosphate synthase, the MEP-pathway enzyme that converts CDP-ME2P
  to MEcPP with release of CMP. It functions upstream of IspG and IspH in IPP and DMAPP precursor biosynthesis.
