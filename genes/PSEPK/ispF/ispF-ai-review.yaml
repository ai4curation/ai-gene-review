id: Q88MF3
gene_symbol: ispF
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: >-
  ispF encodes 2-C-methyl-D-erythritol 2,4-cyclodiphosphate synthase, the
  divalent-metal-dependent MEP-pathway enzyme that cyclizes CDP-ME
  2-phosphate to methylerythritol 2,4-cyclodiphosphate with release of CMP.
  This reaction supplies the substrate for the terminal reductive steps that
  form isopentenyl and dimethylallyl diphosphate.
