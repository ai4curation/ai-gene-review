  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: gltL (PP_1068) encodes the ATP-binding energy-coupling subunit of the predicted GltIJKL glutamate/aspartate ABC uptake system. Its ABC transporter ATP-binding domains support ATP hydrolysis-driven amino-acid transport with the adjacent GltK/GltJ permeases and GltI periplasmic solute-binding component.
