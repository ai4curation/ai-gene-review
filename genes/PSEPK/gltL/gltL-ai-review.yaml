  review:
    summary: Nucleotide binding is true but less informative than ATP binding for this ABC ATPase.
    action: MARK_AS_OVER_ANNOTATED
    reason: The review retains the more specific ATP-binding and ATP-hydrolysis annotations for the transporter ATPase.
