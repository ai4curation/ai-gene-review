  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: amiD (PP_0130) encodes an N-acetylmuramoyl-L-alanine amidase-family peptidoglycan hydrolase in Pseudomonas putida
  KT2440. The protein carries amidase and peptidoglycan-binding domains and is inferred to cleave the amide bond between N-acetylmuramate
  and L-alanine during peptidoglycan turnover or cell-wall remodeling.
