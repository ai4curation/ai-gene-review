  review:
    summary: Generic iron binding is redundant beside the specific [4Fe-4S] cluster term.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      UniProt records one [4Fe-4S] cluster as the catalytic cofactor, so the
      cluster-binding term is more informative than generic iron binding.
    supported_by:
