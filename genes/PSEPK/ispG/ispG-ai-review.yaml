description: ispG encodes the flavodoxin-dependent 4-hydroxy-3-methylbut-2-enyl-diphosphate synthase of the MEP pathway. It
  converts MEcPP to HMBPP using an iron-sulfur cofactor, immediately upstream of the terminal IspH reductase step.
