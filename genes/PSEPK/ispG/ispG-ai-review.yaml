id: Q88PJ7
gene_symbol: ispG
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: >-
  ispG encodes the [4Fe-4S]-dependent reductive enzyme of the
  methylerythritol phosphate pathway that converts methylerythritol
  2,4-cyclodiphosphate to HMBPP using reduced flavodoxin. Its product is the
  substrate for the terminal IspH reaction that forms isopentenyl and
  dimethylallyl diphosphate.
