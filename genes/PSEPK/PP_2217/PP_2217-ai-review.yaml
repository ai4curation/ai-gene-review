description: 'PP_2217 encodes an enoyl-CoA hydratase-family enzyme. It is best treated as a CoA-thioester
  hydration side-node enzyme, likely related to fatty-acid or other acyl-CoA metabolism rather than a
  strict benzoate/beta-ketoadipate step.'
