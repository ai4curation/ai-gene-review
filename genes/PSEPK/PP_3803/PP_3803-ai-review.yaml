suggested_questions:
- question: Does the PP_3801-PP_3803 Znu-like locus function as a second zinc-specific importer
    in KT2440, or does it prefer another transition-metal substrate?
suggested_experiments:
- description: Measure metal uptake and growth phenotypes for PP_3801, PP_3802, and PP_3803
    deletion mutants under zinc and related transition-metal limitation, then complement the
    full locus to confirm substrate specificity.
  experiment_type: targeted ABC-transporter mutant uptake and growth assay
