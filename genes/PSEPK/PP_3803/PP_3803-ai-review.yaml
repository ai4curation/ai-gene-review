  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: PP_3803 encodes the predicted multi-pass membrane permease component of the adjacent
  PP_3801-PP_3803 Znu-like cation ABC importer. UniProt places the protein in the cell membrane,
  records ABC-3/TroCD permease domains, and TreeGrafter associates the family with zinc response,
  supporting a membrane-channel role in zinc/cation import with PP_3801 and PP_3802.
