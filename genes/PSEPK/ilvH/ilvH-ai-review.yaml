id: Q88DY9
gene_symbol: ilvH
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: >-
  IlvH is the non-catalytic regulatory small subunit of the IlvI-IlvH
  acetohydroxy-acid synthase. Its ACT-domain architecture modulates the IlvI
  catalytic large subunit during the first shared reactions of valine and
  isoleucine biosynthesis.
existing_annotations:
- term:
    id: GO:0003984
    label: acetolactate synthase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: IlvH regulates the synthase complex but is not its catalytic subunit.
    action: REMOVE
    reason: >-
      Catalysis resides in IlvI. The existing GO:1990610 annotation captures
      IlvH's specific regulator function without assigning catalytic chemistry
      to the small subunit.
    supported_by:
    - reference_id: file:PSEPK/ilvH/ilvH-deep-research-openscientist.md
      supporting_text: Critically, **IlvH itself does not catalyze this reaction**.
- term:
    id: GO:0005737
    label: cytoplasm
  evidence_type: IEA
  original_reference_id: GO_REF:0000117
  qualifier: located_in
  review:
    summary: Cytoplasm is compatible with the soluble IlvI-IlvH complex.
    action: KEEP_AS_NON_CORE
    reason: This location is plausible but not the defining IlvH function.
- term:
    id: GO:0005829
    label: cytosol
  evidence_type: IEA
  original_reference_id: GO_REF:0000118
  qualifier: located_in
  review:
    summary: This duplicates the retained cytoplasm annotation.
    action: MARK_AS_OVER_ANNOTATED
    reason: No distinct IlvH pool is supported by the parent/child location pair.
- term:
    id: GO:0009082
    label: branched-chain amino acid biosynthetic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: involved_in
  review:
    summary: This broad process is redundant with the two specific branches.
    action: MARK_AS_OVER_ANNOTATED
    reason: IlvH regulates the shared first synthase for valine and isoleucine synthesis.
- term:
    id: GO:0009099
    label: L-valine biosynthetic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: involved_in
  review:
    summary: IlvH regulates the first valine-biosynthetic synthase reaction.
    action: ACCEPT
    reason: UniProt places the IlvI-IlvH complex at step 1 of the valine pathway.
- term:
    id: GO:1990610
    label: acetolactate synthase regulator activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: This is the informative molecular function of the non-catalytic small subunit.
    action: ACCEPT
    reason: >-
      The small-subunit, ACT-domain, and IlvI-IlvH heteromer assignments support
      regulation rather than catalytic acetolactate formation.
    supported_by:
    - reference_id: file:PSEPK/ilvH/ilvH-uniprot.txt
      supporting_text: Full=Acetolactate synthase small subunit
    - reference_id: file:PSEPK/ilvH/ilvH-deep-research-openscientist.md
      supporting_text: >-
        The gene **ilvH** (ordered locus **PP_4679**; UniProt **Q88DY9**) of
        *Pseudomonas putida* strain KT2440 encodes the **small, non-catalytic
        regulatory subunit of acetohydroxy-acid synthase (AHAS)**
- term:
    id: GO:1901705
    label: L-isoleucine biosynthetic process
  evidence_type: IEA
  original_reference_id: file:PSEPK/ilvH/ilvH-uniprot.txt
  qualifier: involved_in
  review:
    summary: IlvH also regulates the first isoleucine-biosynthetic synthase reaction.
    action: NEW
    reason: UniProt explicitly places the IlvI-IlvH complex at step 1 of this branch.
