      Identifies Q88DY9 as the non-catalytic regulatory small subunit of the
      IlvI-IlvH acetohydroxy-acid synthase.
    supporting_text: >-
      The gene **ilvH** (ordered locus **PP_4679**; UniProt **Q88DY9**) of
      *Pseudomonas putida* strain KT2440 encodes the **small, non-catalytic
      regulatory subunit of acetohydroxy-acid synthase (AHAS)**
  - statement: >-
      No direct Q88DY9 purification, kinetic measurement, structure, or mutant
      study was found; activation and feedback details are transferred from
      orthologous AHAS small subunits.
    supporting_text: >-
      There is no published purification, kinetic characterization, or in-vivo
      mutant analysis of Q88DY9/PP_4679 specifically.
