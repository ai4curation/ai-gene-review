id: Q88EW4
gene_symbol: cheA
product_type: PROTEIN
aliases:
- PP_4338
- cheA2
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: cheA encodes the chemotaxis histidine kinase CheA of Pseudomonas putida
  KT2440. The protein is a 747 aa phosphorelay kinase with an N-terminal HPt domain,
  a central histidine kinase ATPase/dimerization region, and a C-terminal CheW-like
  domain. In KT2440 literature this locus corresponds to PP_4338/cheA2, the CheA paralog
  assigned to the canonical chemotaxis pathway rather than the Wsp-like c-di-GMP signaling
  branch. Its core role is to relay chemoreceptor input by autophosphorylating on
  histidine and transferring phosphate to response regulators such as CheY and CheB,
  thereby controlling chemotaxis.
references:
- id: GO_REF:0000002
  title: Gene Ontology annotation through association of InterPro records with GO
    terms
  findings:
  - statement: InterPro mappings recover the broad conserved chemotaxis and phosphorelay
      context for CheA-family histidine kinases, but they also seed very broad parent
      terms that should be reviewed for redundancy.
- id: GO_REF:0000120
  title: Combined Automated Annotation using Multiple IEA Methods
  findings:
  - statement: Combined automated methods recover the kinase activity of CheA, but
      the broader phosphorelay sensor kinase term is less specific than protein histidine
      kinase activity for this gene.
- id: UniProt:Q88EW4
  title: UniProt entry Q88EW4 for Pseudomonas putida KT2440 chemotaxis protein CheA
  findings:
  - statement: UniProt identifies Q88EW4 as chemotaxis protein CheA and states that
      it is autophosphorylated and can transfer phosphate to CheB or CheY.
    supporting_text: >-
      RecName: Full=Chemotaxis protein CheA...CheA is autophosphorylated; it can
      transfer its phosphate group to either CheB or CheY.
  - statement: The sequence carries an HPt domain, a histidine kinase region, and
      a CheW-like domain, with a phosphohistidine annotated at residue 49.
- id: DOI:10.3389/fmicb.2019.00078
  title: Concentration Dependent Effect of Plant Root Exudates on the Chemosensory
    Systems of Pseudomonas putida KT2440
  findings:
  - statement: The KT2440 study identifies PP_4338 as cheA2 and reports that a cheA2
      mutant is entirely deficient in maize root exudate chemotaxis.
  - statement: The same study separates cheA paralog roles, with cheA1 affecting c-di-GMP
      and biofilm formation while cheA2 maps to the canonical chemotaxis pathway.
- id: file:PSEPK/cheA/cheA-deep-research-falcon.md
  title: Falcon deep research report for cheA in Pseudomonas putida KT2440
  findings:
  - statement: Synthesizes KT2440 cheA2 literature, conserved CheA domain architecture,
      and recent chemosensory-system reviews into a curation-focused assessment of
      core versus over-broad GO terms.
existing_annotations:
- term:
    id: GO:0000155
    label: phosphorelay sensor kinase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  review:
    summary: This annotation captures the general CheA-like phosphorelay kinase role,
      but it is broader than the more specific child term GO:0004673 protein histidine
      kinase activity, which is also already present for this gene.
    action: MARK_AS_OVER_ANNOTATED
    reason: Retaining the broader phosphorelay sensor kinase term adds little beyond
      the specific protein histidine kinase annotation and obscures the more informative
      catalytic term.
    supported_by:
    - reference_id: file:PSEPK/cheA/cheA-deep-research-falcon.md
      supporting_text: GO:0000155 is broader than GO:0004673 and becomes redundant
        when the child protein histidine kinase term is already present.
- term:
    id: GO:0004673
    label: protein histidine kinase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  review:
    summary: 'This is the best existing molecular-function term for cheA. UniProt
      assigns the canonical CheA chemistry: ATP-dependent autophosphorylation on histidine
      followed by phosphotransfer to downstream response regulators.'
    action: ACCEPT
    reason: Protein histidine kinase activity precisely captures the catalytic role
      of CheA in the chemotaxis phosphorelay and is supported by conserved domain
      architecture, phosphohistidine annotation, and the established CheA reaction.
    supported_by:
    - reference_id: UniProt:Q88EW4
      supporting_text: CheA is autophosphorylated; it can transfer its phosphate group
        to either CheB or CheY.
    - reference_id: UniProt:Q88EW4
      supporting_text: >-
        -!- CATALYTIC ACTIVITY: Reaction=ATP + protein L-histidine = ADP +
        protein N-phospho-L- histidine.; EC=2.7.13.3;
    - reference_id: file:PSEPK/cheA/cheA-deep-research-falcon.md
      supporting_text: CheA is the central histidine kinase of the canonical chemotaxis
        phosphorelay in KT2440.
- term:
    id: GO:0016772
    label: transferase activity, transferring phosphorus-containing groups
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: This annotation is technically true for a histidine kinase, but it is
      a very broad parent term that adds no information beyond GO:0004673.
    action: MARK_AS_OVER_ANNOTATED
    reason: The broader transferase term is redundant once the specific protein histidine
      kinase activity is retained.
    supported_by:
    - reference_id: file:PSEPK/cheA/cheA-deep-research-falcon.md
      supporting_text: GO:0016772 is a very broad parent term and does not add useful
        specificity beyond protein histidine kinase activity.
- term:
    id: GO:0000160
    label: phosphorelay signal transduction system
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: This is an appropriate core biological-process term for cheA because
      the protein is the autophosphorylating histidine kinase that relays sensory
      input to CheY/CheB response regulators.
    action: ACCEPT
    reason: The phosphorelay system is the direct mechanistic context of CheA function,
      and this term is specific enough to retain as a core process annotation.
    supported_by:
    - reference_id: UniProt:Q88EW4
      supporting_text: CheA is autophosphorylated; it can transfer its phosphate group
        to either CheB or CheY.
    - reference_id: file:PSEPK/cheA/cheA-deep-research-falcon.md
      supporting_text: CheA is the central histidine kinase of the canonical chemotaxis
        phosphorelay in KT2440.
- term:
    id: GO:0006935
    label: chemotaxis
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: Chemotaxis is a core process annotation for this locus. The strongest
      species-specific evidence in KT2440 shows that PP_4338/cheA2 is required for
      chemotaxis toward maize root exudates.
    action: ACCEPT
    reason: The KT2440 cheA2 mutant phenotype directly connects this paralog to the
      canonical chemotaxis pathway rather than only to generic signaling.
    supported_by:
    - reference_id: DOI:10.3389/fmicb.2019.00078
      supporting_text: a cheA2 mutant was entirely deficient in MRE chemotaxis
    - reference_id: file:PSEPK/cheA/cheA-deep-research-falcon.md
      supporting_text: PP_4338/Q88EW4 is the CheA paralog for the flagellar chemotaxis
        pathway rather than the Wsp-like surface signaling pathway.
- term:
    id: GO:0007165
    label: signal transduction
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: This term is true but too broad. CheA participates specifically in phosphorelay
      signaling for chemotaxis, which is already captured by more informative child
      terms.
    action: MARK_AS_OVER_ANNOTATED
    reason: GO:0007165 is a very high-level parent of the more informative phosphorelay
      and chemotaxis terms already present for this gene.
    supported_by:
    - reference_id: file:PSEPK/cheA/cheA-deep-research-falcon.md
      supporting_text: GO:0007165 is a broad parent term and does not add useful specificity
        once phosphorelay signal transduction system and chemotaxis are retained.
- term:
    id: GO:0005737
    label: cytoplasm
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: Cytoplasm is acceptable as a broad localization because CheA is a soluble
      signaling kinase rather than a transmembrane receptor. However, this term does
      not capture the membrane-proximal chemosensory array context in which the protein
      actually operates.
    action: KEEP_AS_NON_CORE
    reason: The annotation is not wrong, but it is too generic to represent the most
      informative localization context for the chemotaxis machinery.
    supported_by:
    - reference_id: UniProt:Q88EW4
      supporting_text: GO; GO:0005737; C:cytoplasm; IEA:InterPro
    - reference_id: file:PSEPK/cheA/cheA-deep-research-falcon.md
      supporting_text: The safest curation decision is to keep cytoplasm as a non-core
        location rather than assert a more specific cell-pole or membrane-complex
        term.
core_functions:
- description: CheA is the chemotaxis histidine kinase of the KT2440 chemosensory
    phosphorelay. It autophosphorylates on histidine and transfers phosphate to downstream
    response regulators such as CheY and CheB to couple chemoreceptor input to chemotactic
    behavior.
  molecular_function:
    id: GO:0004673
    label: protein histidine kinase activity
  directly_involved_in:
  - id: GO:0000160
    label: phosphorelay signal transduction system
  - id: GO:0006935
    label: chemotaxis
  supported_by:
  - reference_id: UniProt:Q88EW4
    supporting_text: Involved in the transmission of sensory signals from the chemoreceptors
      to the flagellar motors.
  - reference_id: UniProt:Q88EW4
    supporting_text: CheA is autophosphorylated; it can transfer its phosphate group
      to either CheB or CheY.
  - reference_id: DOI:10.3389/fmicb.2019.00078
    supporting_text: a cheA2 mutant was entirely deficient in MRE chemotaxis
proposed_new_terms: []
suggested_questions:
- question: Which KT2440 response regulators are the dominant in vivo phospho-acceptors
    for PP_4338/CheA during chemotaxis under rhizosphere conditions?
  experts:
  - Tino Krell
  - Miguel A Matilla
  - Jose A Reyes-Darias
- question: How are signaling duties partitioned among the three KT2440 CheA paralogs
    across defined attractants and surface-associated states?
  experts:
  - Tino Krell
  - Miguel A Matilla
- question: Does PP_4338 form stable polar chemosensory arrays with specific MCP and
    CheW partners in KT2440, and how condition-dependent is that assembly?
  experts:
  - Tino Krell
suggested_experiments:
- description: Purify PP_4338/CheA and test ATP-dependent autophosphorylation plus
    phosphotransfer to candidate KT2440 CheY and CheB proteins.
  hypothesis: PP_4338 is the cognate chemotaxis histidine kinase that directly transfers
    phosphate to the canonical chemotaxis response regulators.
  experiment_type: biochemical phosphotransfer assay
- description: Compare cheA1, cheA2, and cheA3 single and combinatorial mutants across
    defined attractants, root-exudate mixtures, motility, and root-colonization assays.
  hypothesis: cheA2 carries the core flagellar chemotaxis pathway, while the other
    paralogs control distinct surface-sensing or c-di-GMP-linked signaling branches.
  experiment_type: comparative mutant phenotyping
- description: Tag PP_4338 with a minimally perturbing fluorescent marker and image
    its localization relative to chemoreceptor arrays during planktonic and rhizosphere-like
    growth.
  hypothesis: The core chemotaxis CheA paralog forms membrane-proximal polar signaling
    arrays whose abundance changes with environmental context.
  experiment_type: live-cell localization microscopy
