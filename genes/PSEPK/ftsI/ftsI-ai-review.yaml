taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: ftsI encodes PBP3/FtsI, a septal peptidoglycan D,D-transpeptidase of Pseudomonas putida KT2440.
  The protein is an inner-membrane penicillin-binding protein with a periplasmic transpeptidase domain
  that cross-links peptidoglycan at the division septum.
