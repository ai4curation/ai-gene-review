proposed_new_terms: []
suggested_questions:
- question: Which KT2440 enzymes consume the LcdH product 3-dehydrocarnitine, and should they be modeled as adjacent steps to UPA00117 or as a separate carnitine-utilization module?
- question: Is there direct biochemical or genetic evidence for PP_0302-dependent L-carnitine utilization in P. putida KT2440, or is the current annotation entirely transferred from homologous L-carnitine dehydrogenases?
suggested_experiments:
- description: Compare wild-type and lcdH deletion KT2440 growth on L-carnitine as sole carbon or nitrogen source, and measure accumulation or loss of 3-dehydrocarnitine by targeted LC-MS.
  experiment_type: growth phenotype and metabolite profiling
- description: Purify PP_0302 and assay NAD(+)-dependent L-carnitine oxidation to 3-dehydrocarnitine across candidate related substrates to confirm substrate specificity.
  experiment_type: in vitro enzyme assay
