  title: PANTHER family metadata for lcdH
  findings:
  - statement: The fetched PANTHER metadata places L-carnitine dehydrogenases within a broad 3-hydroxyacyl-CoA dehydrogenase family, supporting caution around broad family-level fatty-acid annotations.
- id: file:PSEPK/lcdH/lcdH-deep-research-openscientist.md
  title: OpenScientist deep research report for lcdH
  findings:
  - statement: OpenScientist found same-species biochemical support for L-carnitine dehydrogenase activity, a KT2440 carnitine-catabolism gene-cluster context, and an important caveat that GO:0008859 in the report is not the correct GO term for LcdH.
- id: PMID:3058208
  title: Purification and properties of carnitine dehydrogenase from Pseudomonas putida.
  findings:
  - statement: Purified P. putida carnitine dehydrogenase catalyzes oxidation of L-carnitine to 3-dehydrocarnitine and is specific for L-carnitine and NAD(+).
- id: PMID:9037756
  title: Bacterial carnitine metabolism.
  findings:
  - statement: Review of bacterial carnitine metabolism describes Pseudomonas assimilation of L-carnitine and identifies L-carnitine dehydrogenase as the first catabolic step.
- id: PMID:565193
  title: "[Interrelationships between carnitine metabolism and fatty acid assimilation in Pseudomonas putida (author's transl)]."
  findings:
  - statement: P. putida physiology study reports growth on L-carnitine and induction of carnitine dehydrogenase by L-carnitine and gamma-butyrobetaine.
