  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: PP_1489 encodes a small CheW-domain protein in the PP_1488-PP_1494 Wsp-like surface-sensing
  cluster. It is likely an adaptor or scaffold candidate that links the MCP-like transducer layer to CheA-family
  signaling, but GO lacks a specific CheW molecular-function term and its exact partner set remains unresolved.
