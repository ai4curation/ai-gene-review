  findings:
  - statement: KT2440-specific evidence supports PcaK-dependent uptake of 4-hydroxybenzoate
      and protocatechuate
    supporting_text: PcaK is an inner-membrane MFS aromatic acid/H+ symporter that
      mediates uptake of 4-hydroxybenzoate and protocatechuate.
  - statement: pcaK loss strongly impairs aromatic acid utilization in KT2440
    supporting_text: In KT2440, delta pcaK impairs growth on 4-HBA and abolishes
      growth on PCA under tested conditions.
- id: PMID:10438780
  title: Conserved cytoplasmic loops are important for both the transport and chemotaxis
    functions of PcaK, a protein from Pseudomonas putida with 12 membrane-spanning
    regions
  findings:
  - statement: PcaK directly mediates 4-hydroxybenzoate transport
    supporting_text: Chemotaxis to the aromatic acid 4-hydroxybenzoate (4-HBA) by
      Pseudomonas putida is mediated by PcaK, a membrane-bound protein that also
      functions as a 4-HBA transporter.
  - statement: PcaK belongs to the major facilitator superfamily (MFS)
    supporting_text: PcaK belongs to the major facilitator superfamily (MFS) of transport
      proteins, none of which have so far been implicated in chemotaxis.
  - statement: PcaK transport and chemotaxis functions are coupled
    supporting_text: Amino acid changes that decreased 4-HBA transport also caused
      a decrease in 4-HBA chemotaxis, but the effect on chemotaxis was sometimes
      slightly more severe.
- id: PMID:11844776
  title: Charged amino acids conserved in the aromatic acid/H+ symporter family of
    permeases are required for 4-hydroxybenzoate transport by PcaK from Pseudomonas
    putida
  findings:
  - statement: Conserved charged residues are required for PcaK-mediated 4-HBA transport
    supporting_text: Charged amino acids in the predicted transmembrane portion of
      PcaK, a permease from Pseudomonas putida that transports 4-hydroxybenzoate
      (4-HBA), were required for 4-HBA transport, and they were also required for
      P. putida to have a chemotactic response to 4-HBA.
  - statement: PcaK belongs to the aromatic acid:H(+) symporter family
    supporting_text: An essential amino acid motif (DGXD) containing aspartate residues
      is located in the first transmembrane segment of PcaK and is conserved in the
      aromatic acid/H+ symporter family of the major facilitator superfamily of transporters.
- id: PMID:11053377
  title: BenR, a XylS homologue, regulates three different pathways of aromatic acid
    degradation in Pseudomonas putida
  findings:
  - statement: BenR mediates benzoate-dependent repression of pcaK expression
    supporting_text: BenR was required for benzoate-mediated repression of pcaK-lacZ
      fusion expression.
  - statement: BenR action contributes to repression of 4-HBA uptake
    supporting_text: The action of BenR in repressing 4-HBA uptake is probably indirect.
core_functions:
- molecular_function:
    id: GO:0008028
    label: monocarboxylic acid transmembrane transporter activity
  directly_involved_in:
  - id: GO:1905039
    label: carboxylic acid transmembrane transport
  locations:
  - id: GO:0005886
    label: plasma membrane
  description: PcaK is an inner membrane aromatic acid:H(+) symporter that mediates
    uptake of 4-hydroxybenzoate into P. putida cells. This transport activity is the
    best-supported core function of the protein and underlies its role in 4-hydroxybenzoate
    utilization and the unusual coupling between transport and chemotaxis.
proposed_new_terms:
- proposed_name: 4-hydroxybenzoate:proton symporter activity
  proposed_definition: Enables the coupled transport of 4-hydroxybenzoate and protons
    from one side of a membrane to the other.
  justification: Direct experiments in P. putida demonstrate 4-hydroxybenzoate transport
    by PcaK, and mechanistic studies place PcaK in the aromatic acid:H(+) symporter
    family. Existing GO terms capture only generic symporter activity or broad monocarboxylic
    acid transport, not the experimentally supported substrate-plus- coupling combination.
  proposed_parent:
    id: GO:0015293
    label: symporter activity
- proposed_name: 4-hydroxybenzoate transmembrane transport
  proposed_definition: The process in which 4-hydroxybenzoate is transported across
    a membrane.
  justification: PcaK-mediated uptake of 4-hydroxybenzoate is directly demonstrated
    in P. putida, but GO does not appear to include a dedicated 4-hydroxybenzoate
    transmembrane transport process term. A substrate-specific process term would
    better support annotation of PcaK and related transporters.
  proposed_parent:
    id: GO:1905039
    label: carboxylic acid transmembrane transport
suggested_questions:
- question: Does PcaK transport only 4-hydroxybenzoate in vivo in KT2440, or does
    it also physiologically import protocatechuate or other related aromatic monocarboxylates?
- question: How is PcaK coupled to chemotaxis signaling, given that it is not a classical
    methyl-accepting chemotaxis protein?
- question: What is the direct mechanism by which BenR represses pcaK expression in
    the presence of benzoate?
suggested_experiments:
- description: Reconstitute purified PcaK in proteoliposomes and measure uptake of
    4-hydroxybenzoate, protocatechuate, and benzoate across defined proton gradients.
  hypothesis: PcaK is a proton-coupled importer with strongest activity toward 4-hydroxybenzoate
    and possibly a restricted set of related aromatic monocarboxylates.
- description: Separate transport and signaling functions by targeted mutagenesis
    of cytoplasmic loops and conserved transmembrane acidic/basic residues, followed
    by paired uptake and chemotaxis assays.
  hypothesis: Some PcaK residues or conformational states are disproportionately important
    for chemotactic signaling relative to substrate uptake.
- description: Combine pcaK promoter-reporter assays with BenR perturbation and DNA-binding
    tests to determine whether repression is direct or mediated by additional regulators
    or metabolic intermediates.
  hypothesis: BenR-dependent repression of pcaK is indirect and requires additional
    pathway-specific regulatory inputs beyond simple BenR binding at the pcaK promoter.
