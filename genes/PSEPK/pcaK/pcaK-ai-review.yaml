id: Q88N40
gene_symbol: pcaK
product_type: PROTEIN
aliases:
- PP_1376
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: PcaK is an inner membrane major facilitator superfamily transporter in
  Pseudomonas putida KT2440 within the aromatic acid:H(+) symporter family. Direct
  experiments show that it mediates uptake of 4-hydroxybenzoate (4-HBA) and that
  mutations disrupting transport also impair chemotaxis toward 4-HBA. BenR-dependent
  regulation represses pcaK expression during growth on benzoate plus 4-HBA and contributes
  to hierarchical aromatic substrate utilization.
existing_annotations:
- term:
    id: GO:0022857
    label: transmembrane transporter activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: PcaK is unquestionably a membrane transporter, but this parent term is
      too broad to capture the experimentally supported function of the protein. The
      direct evidence is not merely that PcaK transports something across a membrane,
      but that it transports the aromatic monocarboxylate 4-hydroxybenzoate and belongs
      to the aromatic acid:H(+) symporter family.
    action: MODIFY
    reason: The generic transporter term should be replaced by terms that capture
      both substrate class and mechanism. The best existing GO terms are GO:0008028
      monocarboxylic acid transmembrane transporter activity and GO:0015293 symporter
      activity. A still more specific 4-hydroxybenzoate transporter term does not
      appear to exist in GO and is proposed below.
    proposed_replacement_terms:
    - id: GO:0008028
      label: monocarboxylic acid transmembrane transporter activity
    - id: GO:0015293
      label: symporter activity
    supported_by:
    - reference_id: PMID:10438780
      supporting_text: Chemotaxis to the aromatic acid 4-hydroxybenzoate (4-HBA) by
        Pseudomonas putida is mediated by PcaK, a membrane-bound protein that also
        functions as a 4-HBA transporter.
    - reference_id: PMID:11844776
      supporting_text: An essential amino acid motif (DGXD) containing aspartate residues
        is located in the first transmembrane segment of PcaK and is conserved in
        the aromatic acid/H+ symporter family of the major facilitator superfamily
        of transporters.
    - reference_id: file:PSEPK/pcaK/pcaK-uniprot.txt
      supporting_text: Belongs to the major facilitator superfamily. Aromatic acid:H(+)
        symporter (AAHS) family.
- term:
    id: GO:0046943
    label: carboxylic acid transmembrane transporter activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000118
  review:
    summary: This annotation captures the general biochemical class of transported
      substrate better than GO:0022857, but it is still broader than the experimental
      evidence. PcaK is directly shown to transport 4-HBA, which is an aromatic monocarboxylic
      acid, not carboxylic acids in general.
    action: MODIFY
    reason: GO has the more specific existing term GO:0008028 monocarboxylic acid
      transmembrane transporter activity, which better matches the demonstrated substrate
      class for 4-HBA transport. A dedicated 4-hydroxybenzoate transporter term is
      not currently available and is proposed below.
    proposed_replacement_terms:
    - id: GO:0008028
      label: monocarboxylic acid transmembrane transporter activity
    supported_by:
    - reference_id: PMID:10438780
      supporting_text: Chemotaxis to the aromatic acid 4-hydroxybenzoate (4-HBA) by
        Pseudomonas putida is mediated by PcaK, a membrane-bound protein that also
        functions as a 4-HBA transporter.
    - reference_id: PMID:11844776
      supporting_text: Charged amino acids in the predicted transmembrane portion of
        PcaK, a permease from Pseudomonas putida that transports 4-hydroxybenzoate
        (4-HBA), were required for 4-HBA transport, and they were also required for
        P. putida to have a chemotactic response to 4-HBA.
    - reference_id: file:PSEPK/pcaK/pcaK-deep-research-falcon.md
      supporting_text: PcaK is an inner-membrane MFS aromatic acid/H+ symporter that
        mediates uptake of 4-hydroxybenzoate and protocatechuate in KT2440.
- term:
    id: GO:0046942
    label: carboxylic acid transport
  evidence_type: IEA
  original_reference_id: GO_REF:0000118
  review:
    summary: PcaK participates in transport of an aromatic carboxylic acid, so this
      process term is not wrong. However, the direct substrate evidence is for 4-HBA,
      which places the protein more specifically in monocarboxylic acid transport
      rather than carboxylic acid transport generally.
    action: MODIFY
    reason: GO:0015718 monocarboxylic acid transport is a better process-level match
      to the demonstrated substrate class than GO:0046942. This keeps the process
      annotation aligned with the narrower molecular function replacement GO:0008028.
    proposed_replacement_terms:
    - id: GO:0015718
      label: monocarboxylic acid transport
    supported_by:
    - reference_id: PMID:10438780
      supporting_text: These results indicate that conserved amino acids in the 2-3
        and 8-9 loops of PcaK are required for 4-HBA transport.
- term:
    id: GO:0055085
    label: transmembrane transport
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: This process annotation is accurate at a very high level, but it adds
      little value once the more informative terms GO:1905039 and the transporter-function
      terms are considered.
    action: MARK_AS_OVER_ANNOTATED
    reason: GO:0055085 is a broad parent term that does not communicate substrate
      class or the special role of PcaK as an aromatic acid symporter. The existing
      GO:1905039 annotation captures the core transport process with better specificity.
    supported_by:
    - reference_id: PMID:10438780
      supporting_text: Conserved amino acids in the 2-3 and 8-9 loops of PcaK are
        required for 4-HBA transport.
- term:
    id: GO:1905039
    label: carboxylic acid transmembrane transport
  evidence_type: IEA
  original_reference_id: GO_REF:0000108
  review:
    summary: This is the best existing transmembrane transport process term among
      the GOA annotations. Direct uptake assays demonstrate membrane transport of
      4-HBA by PcaK, and GO does not appear to provide a dedicated monocarboxylic-acid
      transmembrane transport or 4-hydroxybenzoate transmembrane transport process
      term.
    action: ACCEPT
    reason: The annotation accurately reflects the experimentally demonstrated membrane
      transport process while remaining more informative than the parent term GO:0055085.
      It should be retained until a more specific 4-hydroxybenzoate transport process
      term exists in GO.
    supported_by:
    - reference_id: PMID:10438780
      supporting_text: Cells expressing mutant PcaK proteins had a range of phenotypes.
        Some transported at wild-type levels, while others were partially or completely
        defective in 4-HBA transport.
    - reference_id: PMID:11053377
      supporting_text: The action of BenR in repressing 4-HBA uptake is probably indirect.
    - reference_id: file:PSEPK/pcaK/pcaK-deep-research-falcon.md
      supporting_text: In KT2440, delta pcaK impairs growth on 4-HBA and abolishes
        growth on PCA under tested conditions.
- term:
    id: GO:0005886
    label: plasma membrane
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  review:
    summary: This cellular component annotation is correct. In bacteria, the inner
      membrane is annotated as plasma membrane in GO, and both UniProt and the experimental
      literature describe PcaK as a membrane-bound transporter.
    action: ACCEPT
    reason: PcaK is an integral inner membrane transporter, which corresponds to plasma
      membrane in bacterial GO annotation practice. This is an essential and noncontroversial
      aspect of the protein's function.
    supported_by:
    - reference_id: file:PSEPK/pcaK/pcaK-uniprot.txt
      supporting_text: Cell inner membrane; Multi-pass membrane protein.
    - reference_id: PMID:10438780
      supporting_text: Chemotaxis to the aromatic acid 4-hydroxybenzoate (4-HBA) by
        Pseudomonas putida is mediated by PcaK, a membrane-bound protein that also
        functions as a 4-HBA transporter.
- term:
    id: GO:0016020
    label: membrane
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: This annotation is technically correct because PcaK is an integral membrane
      protein, but it is much less informative than GO:0005886 plasma membrane.
    action: MARK_AS_OVER_ANNOTATED
    reason: The generic component term does not add useful information beyond the
      more specific plasma membrane annotation and should be treated as an automated
      parent-term over-annotation.
    supported_by:
    - reference_id: file:PSEPK/pcaK/pcaK-uniprot.txt
      supporting_text: Membrane.
