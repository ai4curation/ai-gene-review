id: Q88E31
gene_symbol: PP_4637
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: PP_4637 encodes a short MetE-like N-terminal barrel-domain protein
  in the cobalamin-independent methionine synthase family. Domain evidence supports
  a possible role in a split or auxiliary MetE-like system, while the protein lacks
  the C-terminal catalytic zinc/homocysteine-binding barrel found in full-length
  MetE enzymes.
existing_annotations:
- term:
    id: GO:0003871
    label: 5-methyltetrahydropteroyltriglutamate-homocysteine S-methyltransferase
      activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: Full MetE methionine synthase activity is not resolved for this short MetE-like protein.
    action: UNDECIDED
    reason: The annotation is derived from a MetE N-terminal domain InterPro mapping.
      A split-MetE model with PP_2698 is plausible, but PP_4637 is the non-catalytic
      N-terminal barrel and lacks the catalytic C-terminal zinc/homocysteine site.
      The current enables annotation should not be accepted as standalone methionine
      synthase activity without biochemical or complex evidence.
    supported_by:
    - reference_id: file:PSEPK/PP_4637/PP_4637-goa.tsv
      supporting_text: "InterPro\tCobalamin-independent methionine synthase MetE N-terminal domain-containing protein"
    - reference_id: file:PSEPK/PP_4637/PP_4637-uniprot.txt
      supporting_text: "SubName: Full=5-methyltetrahydropteroyltriglutamate-homocysteine S-methyltransferase family protein"
    - reference_id: file:projects/P_PUTIDA/deep-research/PSEPK__methionine_biosynthesis__ppu00270-deep-research-openscientist.md
      supporting_text: "PP_4637 (Q88E31) — MetE-family (274 aa, PF08267 only)."
    - reference_id: file:PSEPK/PP_4637/PP_4637-deep-research-openscientist.md
      supporting_text: "PP_4637 is not a full methionine synthase"
- term:
    id: GO:0008270
    label: zinc ion binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: Zinc binding is likely over-propagated to this N-terminal MetE-like domain.
    action: REMOVE
    reason: PP_4637 contains only the N-terminal MetE barrel. The gene-level report
      places the catalytic zinc/homocysteine site in the C-terminal PP_2698 partner,
      so PP_4637 should not carry a standalone zinc-binding molecular-function
      annotation unless direct residue-level evidence appears.
    supported_by:
    - reference_id: file:PSEPK/PP_4637/PP_4637-goa.tsv
      supporting_text: "GO:0008270\tzinc ion binding"
    - reference_id: file:PSEPK/PP_4637/PP_4637-uniprot.txt
      supporting_text: "Reference proteome"
    - reference_id: file:PSEPK/PP_4637/PP_4637-deep-research-openscientist.md
      supporting_text: "it lacks the entire C-terminal catalytic barrel and the zinc/homocysteine site"
- term:
    id: GO:0008652
    label: amino acid biosynthetic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: involved_in
  review:
    summary: Amino acid biosynthetic process is an over-broad domain-level inference.
    action: MARK_AS_OVER_ANNOTATED
    reason: The only current support is a MetE-like domain, and no direct evidence
      establishes PP_4637 as a methionine-biosynthesis enzyme. The broad process
      should not be used as module evidence.
    supported_by:
    - reference_id: file:PSEPK/PP_4637/PP_4637-goa.tsv
      supporting_text: "GO:0008652\tamino acid biosynthetic process"
    - reference_id: file:PSEPK/PP_4637/PP_4637-uniprot.txt
      supporting_text: "Cobalamin-independent methionine synthase MetE N-"
