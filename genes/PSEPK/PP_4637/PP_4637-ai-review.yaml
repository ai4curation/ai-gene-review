proposed_new_terms: []
suggested_questions:
- question: Does PP_4637 form a functional split cobalamin-independent MetE complex
    with PP_2698 in vivo, or is the association only a bioinformatic/domain-context
    prediction?
suggested_experiments:
- description: Co-purify PP_4637 with PP_2698 and test reconstituted cobalamin-independent
    methionine synthase activity with polyglutamylated methyl-tetrahydrofolate and
    L-homocysteine.
  experiment_type: biochemical reconstitution assay
