proposed_new_terms:
  - proposed_name: mannuronan C5-epimerase activity
    proposed_definition: >
      Catalysis of the polymer-level epimerization of beta-D-mannuronate residues
      in alginate to alpha-L-guluronate residues.
    justification: >
      GO currently has alginic acid biosynthetic process and broad epimerase
      terms, but it lacks a specific molecular function term for the defining
      AlgG reaction (EC 5.1.3.37). This forces curators to use the generic
      carbohydrate epimerase parent and loses the polymer-level substrate
      specificity that distinguishes AlgG from small-molecule epimerases.
    proposed_parent:
      id: GO:0016857
      label: racemase and epimerase activity, acting on carbohydrates and derivatives
    supported_by:
      - reference_id: file:PSEPK/algG/algG-deep-research-falcon.md
        supporting_text: AlgG converts beta-D-mannuronate residues in nascent alginate to alpha-L-guluronate after polymerization at the inner membrane.
      - reference_id: file:PSEPK/algG/algG-deep-research-falcon.md
        supporting_text: GO currently misses the core molecular function of AlgG.
suggested_questions:
  - question: How important is AlgG's non-catalytic scaffolding role in KT2440 relative to its epimerase activity during native alginate production?
    experts:
      - Svein Valla
      - Dennis E. Ohman
  - question: Under which physiological conditions does KT2440 deploy AlgG-dependent alginate remodeling most strongly?
    experts:
      - P. Lynne Howell
      - Martin Gimmestad
suggested_experiments:
  - description: Create an algG deletion strain and catalytic-site mutants in the DPHD motif, then compare polymer yield and uronate composition under alginate-inducing conditions.
    hypothesis: Catalytic-dead mutants will separate guluronate formation from the structural role of AlgG in polymer protection/export.
  - description: Measure secreted alginate composition by NMR or linkage-sensitive enzymology in wild type, algG-null, and complemented strains.
    hypothesis: KT2440 AlgG introduces guluronate and MG patterning into alginate rather than producing long guluronate blocks.
  - description: Test physical or genetic interactions between AlgG and AlgK, AlgX, AlgE, and AlgL in KT2440.
    hypothesis: AlgG participates in a periplasmic biosynthetic complex that channels alginate away from AlgL during export.
