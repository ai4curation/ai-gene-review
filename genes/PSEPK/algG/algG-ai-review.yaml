id: Q88NC9
gene_symbol: algG
product_type: PROTEIN
status: DRAFT
aliases:
  - PP_1283
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: >
  AlgG is the periplasmic alginate-modifying enzyme in the KT2440 alginate
  biosynthesis cluster. By strong orthology to experimentally characterized
  Pseudomonas AlgG proteins, it epimerizes beta-D-mannuronate residues in
  nascent alginate to alpha-L-guluronate after polymerization, thereby helping
  generate the characteristic polymannuronate/MG-block architecture of
  Pseudomonas alginate. Direct KT2440 biochemistry is limited, but the reviewed
  UniProt entry, conserved cluster context, signal peptide, and ortholog
  literature support a confident assignment to periplasmic alginate
  biosynthesis. Ortholog studies also indicate that AlgG has a second
  non-catalytic role in the periplasmic secretion/protection complex that limits
  AlgL-mediated degradation of the polymer.
existing_annotations:
  - term:
      id: GO:0042597
      label: periplasmic space
    evidence_type: IEA
    original_reference_id: GO_REF:0000044
    review:
      summary: >
        This localization is well supported. AlgG carries an N-terminal signal
        peptide and lacks any mature transmembrane segment, and the
        experimentally characterized Pseudomonas AlgG orthologs function on the
        alginate polymer after it enters the periplasm.
      action: ACCEPT
      reason: >
        The existing term is appropriately specific for a soluble or
        periplasm-associated catalytic step in alginate maturation. There is no
        evidence that AlgG itself is an inner-membrane enzyme.
      supported_by:
        - reference_id: file:PSEPK/algG/algG-deep-research-falcon.md
          supporting_text: "The mature enzyme is periplasmic: UniProt annotates a signal peptide at residues 1-25 and the catalytic chain from 26-519."
        - reference_id: file:PSEPK/algG/algG-deep-research-falcon.md
          supporting_text: AlgG converts beta-D-mannuronate residues in nascent alginate to alpha-L-guluronate after polymerization at the inner membrane.
  - term:
      id: GO:0042121
      label: alginic acid biosynthetic process
    evidence_type: IEA
    original_reference_id: GO_REF:0000041
    review:
      summary: >
        This process annotation should be retained. AlgG is the periplasmic
        modification enzyme that introduces guluronate residues into alginate and
        is part of the conserved alginate biosynthesis apparatus in Pseudomonas.
      action: ACCEPT
      reason: >
        Even though direct KT2440 biochemistry is limited, ortholog studies and
        the reviewed UniProt entry clearly place AlgG within alginate
        biosynthesis rather than in a generic carbohydrate-isomerase pathway.
      supported_by:
        - reference_id: file:PSEPK/algG/algG-deep-research-falcon.md
          supporting_text: AlgG converts beta-D-mannuronate residues in nascent alginate to alpha-L-guluronate after polymerization at the inner membrane.
        - reference_id: file:PSEPK/algG/algG-deep-research-falcon.md
          supporting_text: AlgG sits in the conserved alginate biosynthesis cluster of KT2440 and is the most plausible source of guluronate formation during alginate production.
  - term:
      id: GO:0016857
      label: racemase and epimerase activity, acting on carbohydrates and derivatives
    evidence_type: ISS
    original_reference_id: file:PSEPK/algG/algG-deep-research-falcon.md
    review:
      summary: >
        GOA currently misses the core molecular function of AlgG. The exact
        activity is mannuronan C5-epimerization at the polymer level; this broad
        carbohydrate epimerase term is the closest existing GO molecular
        function and should be added as a new annotation until GO contains a
        specific AlgG term.
      action: NEW
      reason: >
        UniProt assigns EC 5.1.3.37 and ortholog biochemistry defines the
        reaction precisely, but GO lacks a corresponding specific molecular
        function term for polymer-level mannuronan C5 epimerization.
      supported_by:
        - reference_id: file:PSEPK/algG/algG-deep-research-falcon.md
          supporting_text: AlgG converts beta-D-mannuronate residues in nascent alginate to alpha-L-guluronate after polymerization at the inner membrane.
        - reference_id: file:PSEPK/algG/algG-deep-research-falcon.md
          supporting_text: The Pseudomonas syringae AlgG structure shows a right-handed parallel beta-helix with a conserved DPHD motif, and His319 plus Arg345 are critical for catalysis.
        - reference_id: file:PSEPK/algG/algG-deep-research-falcon.md
          supporting_text: For KT2440 specifically, direct biochemical characterization is limited; functional assignment is based on strong orthology to experimentally characterized Pseudomonas AlgG proteins and conserved gene-cluster context.
