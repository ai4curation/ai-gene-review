  - id: PMID:12775688
    title: The Pseudomonas fluorescens AlgG protein, but not its mannuronan C-5-epimerase activity, is needed for alginate polymer formation
    full_text_unavailable: true
    findings:
      - statement: algG deletion caused AlgL-dependent degradation products instead of normal polymer
      - statement: Catalytically inactive AlgG could still support polymer formation, implying a structural role in the biosynthetic complex
  - id: PMID:24398681
    title: Catalytic Mechanism and Mode of Action of the Periplasmic Alginate Epimerase AlgG
    full_text_unavailable: true
    findings:
      - statement: Structural and mutational analysis identified His319 and Arg345 as key catalytic residues
      - statement: AlgG is a processive periplasmic polymer-level epimerase with an electropositive substrate-binding groove
