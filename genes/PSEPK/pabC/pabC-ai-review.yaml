description: pabC (PP_1917) encodes aminodeoxychorismate lyase, the PLP-dependent enzyme that converts 4-amino-4-deoxychorismate
  to para-aminobenzoate for folate biosynthesis. It belongs to the pABA branch that links chorismate metabolism to folate
  production.
