description: Cytoplasmic class-II fumarate hydratase of Pseudomonas putida KT2440. FumC-I catalyzes the reversible stereospecific interconversion of fumarate and (S)-malate, contributing to the fumarate/malate step of the tricarboxylic acid cycle. It is an iron-independent class-II fumarase and is one of three fumarase isozymes encoded by the strain.
