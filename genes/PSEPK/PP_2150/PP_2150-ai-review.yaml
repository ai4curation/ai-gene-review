description: PP_2150 encodes a predicted ApbE-family FAD:protein FMN transferase in Pseudomonas putida KT2440. It is an inner-membrane/periplasmic-side lipoprotein inferred to transfer the FMN moiety of FAD onto target flavoproteins, with Mg(2+) or Mn(2+) as catalytic metal cofactors.
