description: PP_3431 encodes a cytoplasmic ThiJ/PfpI/DJ-1-family, HSP31-like protein in Pseudomonas putida KT2440. TreeGrafter/PANTHER
  and DJ-1/PfpI domain evidence support glyoxalase III activity, a glutathione-independent conversion of methylglyoxal to
  D-lactate, and methylglyoxal catabolic process context.
