      Corroborates the monofunctional phosphoribosyl-AMP cyclohydrolase
      assignment and the separate adjacent HisE architecture. Detailed metal,
      mechanism, and oligomer claims are transferred from orthologs rather than
      demonstrated directly for Q88D15.
core_functions:
- description: >-
    Hydrolyzes the adenine ring of phosphoribosyl-AMP to form the ProFAR
    intermediate in L-histidine biosynthesis.
