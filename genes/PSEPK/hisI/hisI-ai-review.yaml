id: Q88D15
gene_symbol: hisI
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: >-
  hisI encodes phosphoribosyl-AMP cyclohydrolase (EC 3.5.4.19), which hydrolyzes
  the adenine ring of phosphoribosyl-AMP in the third reaction of L-histidine
  biosynthesis. The 130-residue Pseudomonas putida KT2440 enzyme is a standalone
  cyclohydrolase rather than a HisIE fusion and binds magnesium and zinc ions.
  The preceding phosphoribosyl-ATP diphosphatase reaction is carried out by the
  adjacent standalone HisE protein, Q88D14.
existing_annotations:
- term:
    id: GO:0000105
    label: L-histidine biosynthetic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: involved_in
  review:
    summary: HisI performs the third reaction of the PRPP-to-histidine pathway.
    action: ACCEPT
    reason: >-
      The reviewed UniProt entry and UniPathway assignment place the exact
      cyclohydrolase reaction at step 3 of 9 in L-histidine biosynthesis.
- term:
    id: GO:0000287
    label: magnesium ion binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000104
  qualifier: enables
  review:
    summary: Magnesium binding is supported for the standalone cyclohydrolase.
    action: KEEP_AS_NON_CORE
    reason: >-
      UniRule records one Mg2+ ion per subunit. This is relevant catalytic
      context but is less informative than the specific cyclohydrolase activity.
- term:
    id: GO:0004635
    label: phosphoribosyl-AMP cyclohydrolase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: This is the defining HisI activity in KT2440.
    action: ACCEPT
    reason: >-
      GO:0004635 matches EC 3.5.4.19, RHEA:20049, the reviewed product name,
      and the HisI/PRA-CH family assignments.
    supported_by:
    - reference_id: file:PSEPK/hisI/hisI-deep-research-openscientist.md
      supporting_text: >-
        encodes phosphoribosyl-AMP cyclohydrolase (PRA-CH; EC 3.5.4.19), the
        enzyme that catalyzes the third step of the *de novo* L-histidine
        biosynthetic pathway
- term:
    id: GO:0004636
    label: phosphoribosyl-ATP diphosphatase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000117
  qualifier: enables
  review:
    summary: The diphosphatase activity belongs to the separate HisE protein in KT2440.
    action: REMOVE
    reason: >-
      This ARBA assignment appears to have propagated across a family that also
      contains bifunctional HisIE proteins. Q88D15 is a 130-residue standalone
      phosphoribosyl-AMP cyclohydrolase, whereas adjacent Q88D14 is the reviewed
      standalone phosphoribosyl-ATP diphosphatase with EC 3.6.1.31 and
      RHEA:22828.
    supported_by:
    - reference_id: file:PSEPK/hisI/hisI-deep-research-openscientist.md
      supporting_text: >-
        *hisI* is a **standalone monofunctional gene** (PP_5014, 130 aa) sitting
        adjacent to a separate monofunctional *hisE* gene
- term:
    id: GO:0005737
    label: cytoplasm
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: located_in
  review:
    summary: HisI is a soluble cytoplasmic biosynthetic enzyme.
    action: KEEP_AS_NON_CORE
    reason: >-
      The location is supported by UniProt but is contextual rather than the
      core biochemical function.
- term:
    id: GO:0008270
    label: zinc ion binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000104
  qualifier: enables
  review:
    summary: Zinc binding is supported for the standalone cyclohydrolase.
    action: KEEP_AS_NON_CORE
    reason: >-
      UniRule records one Zn2+ ion per subunit. This is supporting cofactor
      context rather than a pathway-defining activity.
