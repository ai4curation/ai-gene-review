description: lysR encodes a predicted LysR-family DNA-binding transcriptional activator in Pseudomonas
  putida KT2440. The product annotation (Transcriptional activator protein LysR) and conserved LysR HTH
  and substrate-binding domains support transcriptional activation, but the direct promoters, effector
  ligand, and pathway-specific regulon require gene-specific validation.
