  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: algB encodes an AlgB/NtrC-family transcriptional regulatory protein in Pseudomonas putida
  KT2440. The protein combines an N-terminal receiver domain, a sigma-54 enhancer-binding AAA+ ATPase
  region, and an HTH/Fis DNA-binding domain, consistent with phosphorelay-linked transcriptional regulation
  of alginate biosynthesis genes.
