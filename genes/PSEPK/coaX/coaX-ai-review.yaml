  review:
    summary: Pantothenate kinase is the core predicted molecular function of CoaX.
    action: ACCEPT
    reason: >-
      Q88QQ0 is assigned to the type III pantothenate kinase family by HAMAP,
      InterPro, Pfam, and PANTHER, and UniProt records the exact Rhea reaction.
      Family-level structural work independently establishes this activity for
      PanK-III proteins.
