id: Q88QQ0
gene_symbol: coaX
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: >-
  coaX (PP_0438) encodes a soluble type III pantothenate kinase that uses ATP
  to phosphorylate pantothenate to 4'-phosphopantothenate. This is the first
  committed reaction in the five-step conversion of pantothenate to coenzyme A.
  The enzyme belongs to the ASKHA-fold PanK-III family, contains the conserved
  catalytic features, and requires a monovalent cation. Direct organism-specific
  enzymology has not been reported.
