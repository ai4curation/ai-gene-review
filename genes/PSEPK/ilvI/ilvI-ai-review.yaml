id: Q88DY8
gene_symbol: ilvI
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: >-
  IlvI is the thiamine-diphosphate-dependent catalytic large subunit of
  acetohydroxy-acid synthase. Together with the IlvH regulatory small subunit,
  it condenses pyruvate either with pyruvate or with 2-oxobutanoate to initiate
  the shared valine and isoleucine biosynthetic trunk.
existing_annotations:
- term:
    id: GO:0000287
    label: magnesium ion binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: Magnesium binding is valid cofactor information but not the core reaction.
    action: KEEP_AS_NON_CORE
    reason: The IlvI catalytic reaction requires divalent metal with thiamine diphosphate.
- term:
    id: GO:0003824
    label: catalytic activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: This generic term is redundant with acetolactate synthase activity.
    action: MARK_AS_OVER_ANNOTATED
    reason: GO:0003984 identifies the actual IlvI reaction.
- term:
    id: GO:0003984
    label: acetolactate synthase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: This is the specific catalytic function of the IlvI large subunit.
    action: ACCEPT
    reason: >-
      EC 2.2.1.6, the acetolactate-synthase large-subunit family, and both
      UniProt pathway statements support the reaction.
    supported_by:
    - reference_id: file:PSEPK/ilvI/ilvI-uniprot.txt
      supporting_text: Full=Acetolactate synthase
- term:
    id: GO:0005948
    label: acetolactate synthase complex
  evidence_type: IEA
  original_reference_id: GO_REF:0000118
  qualifier: part_of
  review:
    summary: IlvI is the catalytic subunit of the IlvI-IlvH complex.
    action: KEEP_AS_NON_CORE
    reason: Complex membership is correct but secondary to the enzyme activity.
- term:
    id: GO:0009082
    label: branched-chain amino acid biosynthetic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: involved_in
  review:
    summary: This broad process is redundant with the valine and isoleucine branch calls.
    action: MARK_AS_OVER_ANNOTATED
    reason: IlvI has explicit pathway assignments to both product-specific branches.
- term:
    id: GO:0030976
    label: thiamine pyrophosphate binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: Thiamine diphosphate binding is valid mechanistic information.
    action: KEEP_AS_NON_CORE
    reason: The TPP-enzyme domains and catalytic record support this cofactor interaction.
- term:
    id: GO:0050660
    label: flavin adenine dinucleotide binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: FAD binding is valid mechanistic information for bacterial AHAS.
    action: KEEP_AS_NON_CORE
    reason: It is a cofactor property rather than the substrate-specific reaction.
- term:
    id: GO:0009099
    label: L-valine biosynthetic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: involved_in
  review:
    summary: IlvI initiates the pyruvate-derived valine branch.
    action: ACCEPT
    reason: UniProt assigns IlvI to step 1 of 4 in valine biosynthesis.
- term:
    id: GO:0009097
    label: isoleucine biosynthetic process
  evidence_type: IEA
  original_reference_id: file:PSEPK/ilvI/ilvI-uniprot.txt
  qualifier: involved_in
  review:
    summary: IlvI also initiates the 2-oxobutanoate-derived isoleucine branch.
    action: NEW
    reason: UniProt explicitly assigns Q88DY8 to step 1 of 4 in isoleucine biosynthesis.
