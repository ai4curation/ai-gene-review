- term:
    id: GO:0044780
    label: bacterial-type flagellum assembly
  evidence_type: IEA
  review:
    summary: As the Class III (late-tier) flagellar sigma factor, FliA directs transcription
      of the genes that build the flagellar filament, a stator complex, and the chemotaxis
      apparatus, so it is functionally involved in completing bacterial-type flagellum
      assembly. This process is absent from the current IEA-only annotation set but is
      well supported by KT2440 primary literature summarized in the falcon deep research.
    action: NEW
    reason: KT2440 primary literature places FliA at the late tier of the flagellar cascade,
      where its transcriptional output completes filament, stator, and chemotaxis biogenesis;
      this flagellum-assembly process role complements the molecular sigma factor function
      and is not captured by the existing transcription-centric terms.
    supported_by:
    - reference_id: file:PSEPK/fliA/fliA-deep-research-falcon.md
      supporting_text: |-
        **Class III:** **FliA-dependent** transcription enables synthesis of the **filament**, at least one **stator** complex, and completion of the **chemotaxis apparatus**.
    - reference_id: file:PSEPK/fliA/fliA-deep-research-falcon.md
      supporting_text: |-
        In KT2440 the late output of FliA activity is explicitly described: **filament synthesis**, activation of at least one **stator complex**, and completion of the **chemotaxis apparatus**.
