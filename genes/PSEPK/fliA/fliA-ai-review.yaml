id: Q88EW1
gene_symbol: fliA
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: fliA encodes the flagellar alternative sigma factor Sigma-28 in P. putida KT2440. It confers
  promoter specificity on RNA polymerase for flagella-related genes, so its core curation should emphasize
  sigma factor activity and transcription initiation rather than RNA polymerase catalytic activity.
existing_annotations:
- term:
    id: GO:0003677
    label: DNA binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  review:
    summary: DNA binding is not entirely wrong for a sigma factor-containing holoenzyme, but it is too
      generic as a standalone description of FliA. The precise molecular function is sigma factor activity.
    action: MARK_AS_OVER_ANNOTATED
    reason: GO:0016987 captures promoter-specific sigma-factor function better than generic DNA binding.
    supported_by:
    - reference_id: file:PSEPK/fliA/fliA-uniprot.txt
      supporting_text: RNA polymerase sigma factor FliA
    - reference_id: file:PSEPK/fliA/fliA-goa.tsv
      supporting_text: "GO:0003677\tDNA binding"
- term:
    id: GO:0003700
    label: DNA-binding transcription factor activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: FliA is a transcription regulatory factor, but the generic DNA-binding transcription factor
      term is less precise than sigma factor activity for a bacterial RNA polymerase sigma subunit.
    action: MODIFY
    reason: Replace the broad transcription-factor term with the specific sigma factor molecular function.
    proposed_replacement_terms:
    - id: GO:0016987
      label: sigma factor activity
    supported_by:
    - reference_id: file:PSEPK/fliA/fliA-uniprot.txt
      supporting_text: RNA polymerase sigma factor FliA
    - reference_id: file:PSEPK/fliA/fliA-uniprot.txt
      supporting_text: Belongs to the sigma-70 factor family. FliA subfamily.
- term:
    id: GO:0003899
    label: DNA-directed RNA polymerase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: This annotation should be removed. FliA is a sigma factor that helps RNA polymerase initiate
      at flagellar promoters; it is not the catalytic RNA polymerase enzyme.
    action: REMOVE
    reason: RNA polymerase catalytic activity belongs to the core polymerase complex, whereas FliA provides
      promoter specificity.
    supported_by:
    - reference_id: file:PSEPK/fliA/fliA-uniprot.txt
      supporting_text: Sigma factors are initiation factors that promote the
    - reference_id: file:PSEPK/fliA/fliA-goa.tsv
      supporting_text: "GO:0003899\tDNA-directed RNA polymerase activity"
- term:
    id: GO:0005737
    label: cytoplasm
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  review:
    summary: This location annotation is appropriate for a bacterial sigma factor that associates with
      cytoplasmic RNA polymerase.
    action: ACCEPT
    reason: UniProt places FliA in the cytoplasm.
    supported_by:
    - reference_id: file:PSEPK/fliA/fliA-uniprot.txt
      supporting_text: 'SUBCELLULAR LOCATION: Cytoplasm'
    - reference_id: file:PSEPK/fliA/fliA-goa.tsv
      supporting_text: "GO:0005737\tcytoplasm"
- term:
    id: GO:0006352
    label: DNA-templated transcription initiation
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  review:
    summary: This is a core process annotation. Sigma factors act at transcription initiation by directing
      RNA polymerase to specific promoters.
    action: ACCEPT
    reason: FliA controls initiation at flagella-related promoters.
    supported_by:
    - reference_id: file:PSEPK/fliA/fliA-uniprot.txt
      supporting_text: Sigma factors are initiation factors that promote the
    - reference_id: file:PSEPK/fliA/fliA-goa.tsv
      supporting_text: "GO:0006352\tDNA-templated transcription initiation"
- term:
    id: GO:0006355
    label: regulation of DNA-templated transcription
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  review:
    summary: This broad transcription-regulation term is directionally correct but less informative than
      the initiation-specific process term already present.
    action: MODIFY
    reason: GO:2000142 is already present and ACCEPTED in this review; this MODIFY means the broad parent
      term should be dropped in favor of the existing initiation-specific term.
    proposed_replacement_terms:
    - id: GO:2000142
      label: regulation of DNA-templated transcription initiation
    supported_by:
    - reference_id: file:PSEPK/fliA/fliA-uniprot.txt
      supporting_text: controls the expression of flagella-related genes
    - reference_id: file:PSEPK/fliA/fliA-goa.tsv
      supporting_text: "GO:0006355\tregulation of DNA-templated transcription"
- term:
    id: GO:0010468
    label: regulation of gene expression
  evidence_type: IEA
  original_reference_id: GO_REF:0000104
  review:
    summary: Regulation of gene expression is too broad for FliA. The direct process is regulation of
      transcription initiation through sigma-factor promoter recognition.
    action: MODIFY
    reason: GO:2000142 is already present and ACCEPTED in this review; this MODIFY removes a redundant
      high-level gene-expression parent in favor of the existing initiation-specific term.
    proposed_replacement_terms:
    - id: GO:2000142
      label: regulation of DNA-templated transcription initiation
    supported_by:
    - reference_id: file:PSEPK/fliA/fliA-uniprot.txt
      supporting_text: controls the expression of flagella-related genes
    - reference_id: file:PSEPK/fliA/fliA-goa.tsv
      supporting_text: "GO:0010468\tregulation of gene expression"
- term:
    id: GO:0016987
    label: sigma factor activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  review:
    summary: This is the correct core molecular function for FliA. The protein is explicitly annotated
      as an RNA polymerase sigma factor and a sigma-70 family FliA subfamily member.
    action: ACCEPT
    reason: Sigma factor activity captures FliA promoter-specificity function.
    supported_by:
    - reference_id: file:PSEPK/fliA/fliA-uniprot.txt
      supporting_text: 'RecName: Full=RNA polymerase sigma factor FliA'
    - reference_id: file:PSEPK/fliA/fliA-uniprot.txt
