suggested_questions:
- question: Which KT2440 flagellar promoters are directly FliA-dependent rather than indirectly affected
    by the broader flagellar hierarchy?
suggested_experiments:
- hypothesis: FliA directly activates a defined late flagellar promoter set in KT2440.
  description: Compare RNA-seq and promoter-reporter activity in wild-type, fliA deletion, and complemented
    strains during flagellar gene induction.
  experiment_type: transcriptomics and promoter reporter analysis
