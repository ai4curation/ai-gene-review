id: Q88HU8
gene_symbol: ku
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: >-
  ku (PP_3255) encodes the prokaryotic Ku DNA-end binding factor in the
  Pseudomonas putida KT2440 non-homologous end joining system. Ku forms a
  homodimer, binds linear double-stranded DNA ends with 5-prime or 3-prime
  overhangs, and interacts with LigD to recruit and stimulate the LigD repair
  enzyme at double-strand breaks. It is therefore best treated as a DNA-end
  recognition and recruitment factor for bacterial NHEJ rather than as a
  standalone DNA-repair catalyst.
existing_annotations:
- term:
    id: GO:0003677
    label: DNA binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: >-
      Generic DNA binding is correct but less informative than the more specific
      double-stranded DNA end binding role of bacterial Ku.
    action: MODIFY
    reason: >-
      Ku binds linear double-stranded DNA ends during NHEJ. The broad DNA
      binding annotation can be retained only as a parent-level summary; the
      specific core molecular function is double-stranded DNA binding.
    proposed_replacement_terms:
    - id: GO:0003690
      label: double-stranded DNA binding
- term:
    id: GO:0003690
    label: double-stranded DNA binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: >-
      This is the core molecular function of prokaryotic Ku in bacterial NHEJ.
    action: ACCEPT
    reason: >-
      UniProt describes Q88HU8 as binding linear double-stranded DNA with
      5-prime and 3-prime overhangs, consistent with the GOA UniRule/PANTHER
      annotation.
    supported_by:
    - reference_id: file:PSEPK/ku/ku-uniprot.txt
      supporting_text: Binds linear dsDNA with 5'- and 3'- overhangs
- term:
    id: GO:0006281
    label: DNA repair
  evidence_type: IEA
  original_reference_id: GO_REF:0000104
  qualifier: involved_in
  review:
    summary: >-
      DNA repair is correct as a broad process parent for the Ku/LigD NHEJ
      system.
    action: KEEP_AS_NON_CORE
    reason: >-
      Retain as a general process term, but the specific core process is
      double-strand break repair via non-homologous end joining.
- term:
    id: GO:0006303
    label: double-strand break repair via nonhomologous end joining
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: involved_in
  review:
    summary: >-
      Ku directly participates in bacterial NHEJ by recognizing broken DNA ends
      and recruiting LigD.
    action: ACCEPT
    reason: >-
      This process term captures the specific pathway context for the Ku/LigD
      repair enzyme in P. putida KT2440.
    supported_by:
    - reference_id: file:PSEPK/ku/ku-uniprot.txt
      supporting_text: With LigD forms a non-homologous end joining (NHEJ) DNA
- term:
    id: GO:0006974
    label: DNA damage response
  evidence_type: IEA
  original_reference_id: GO_REF:0000104
  qualifier: involved_in
  review:
    summary: >-
      DNA damage response is biologically plausible but broad for a dedicated
      Ku/LigD double-strand break repair factor.
    action: KEEP_AS_NON_CORE
    reason: >-
      Keep as a broad damage-response context, while treating NHEJ as the
      specific core biological process.
references:
