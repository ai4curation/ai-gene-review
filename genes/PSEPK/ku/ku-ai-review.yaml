      InterPro-derived generic DNA binding reviewed as a broad parent-level
      annotation for Ku DNA-end binding.
- id: GO_REF:0000104
  title: Electronic Gene Ontology annotations created by transferring manual GO annotations
    between related proteins based on shared sequence features
  findings:
  - statement: >-
      UniRule-transferred DNA repair and DNA damage response terms reviewed as
