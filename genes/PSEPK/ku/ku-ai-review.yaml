taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: Ku is the bacterial Ku DNA-end-binding subunit of the non-homologous end-joining repair system in Pseudomonas putida KT2440. It binds linear double-stranded DNA ends, acts as a homodimer, and interacts with LigD to recruit and stimulate the ligase step that repairs double-strand breaks by NHEJ.
