suggested_questions:
- question: Under which double-strand-break stresses is the KT2440 Ku/LigD NHEJ module induced or required for survival?
- question: Does KT2440 Ku show the same end-structure preference and LigD stimulation observed for characterized bacterial Ku homologs?
suggested_experiments:
- description: Delete ku and ligD singly and together, then quantify survival and repair junction signatures after defined double-strand-break induction or desiccation-associated DNA damage.
  experiment_type: targeted DNA repair genetics and junction sequencing
