description: 'bluB encodes a predicted 5,6-dimethylbenzimidazole synthase in Pseudomonas putida
  KT2440. BluB-family enzymes use reduced flavin chemistry to form the dimethylbenzimidazole
  lower ligand for cobalamin, making this a flavin-consuming cobalamin-context enzyme rather
  than a riboflavin-biosynthetic enzyme.'
