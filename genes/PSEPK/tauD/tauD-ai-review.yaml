id: Q88RA3
gene_symbol: tauD
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: >-
  tauD encodes the Pseudomonas putida KT2440 alpha-ketoglutarate-dependent
  taurine dioxygenase, also annotated as AtsK. It is a soluble non-heme iron
  dioxygenase that uses taurine, 2-oxoglutarate, and oxygen to produce
  aminoacetaldehyde, sulfite, succinate, and carbon dioxide. The enzyme is part
  of organosulfonate/sulfur compound catabolism and has direct biochemical and
  structural support in KT2440.
existing_annotations:
- term:
    id: GO:0000908
    label: taurine dioxygenase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: The taurine dioxygenase activity is the specific core molecular function of TauD.
    action: ACCEPT
    reason: >-
      UniProt records the EC 1.14.11.17 reaction for Q88RA3, and the KT2440
      TauD paper reports biochemical characterization of P. putida TauD.
    supported_by:
    - reference_id: file:PSEPK/tauD/tauD-uniprot.txt
      supporting_text: 'CC       Reaction=taurine + 2-oxoglutarate + O2 = aminoacetaldehyde + sulfite +'
    - reference_id: PMID:22221834
      supporting_text: 'Here, we report the biochemical and kinetic characterization of the Fe(II)/α-ketoglutarate-dependent taurine dioxygenase from Pseudomonas putida'
- term:
    id: GO:0005737
    label: cytoplasm
  evidence_type: IEA
  original_reference_id: GO_REF:0000118
  qualifier: located_in
  review:
    summary: Cytoplasmic localization is consistent with a soluble bacterial taurine dioxygenase.
    action: KEEP_AS_NON_CORE
    reason: >-
      The protein has no membrane role in the curated function; cytoplasm is
      appropriate but is not the pathway-defining annotation.
- term:
    id: GO:0006790
    label: sulfur compound metabolic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000118
  qualifier: involved_in
  review:
    summary: Broad sulfur-compound metabolism is correct but less informative than sulfur compound catabolism for TauD.
    action: MODIFY
    reason: >-
      TauD degrades taurine to sulfite and aminoacetaldehyde. The experimental
      GOA already includes the narrower sulfur compound catabolic process term,
      which better captures the biological direction.
    proposed_replacement_terms:
    - id: GO:0044273
      label: sulfur compound catabolic process
- term:
    id: GO:0016491
    label: oxidoreductase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: Generic oxidoreductase activity is true but redundant with the specific dioxygenase annotations.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      The precise taurine dioxygenase and sulfonate dioxygenase annotations are
      present and should be used instead of this high-level parent term.
- term:
    id: GO:0016706
    label: 2-oxoglutarate-dependent dioxygenase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: This parent activity is accurate for the Fe(II)/2-oxoglutarate enzyme class.
    action: KEEP_AS_NON_CORE
    reason: >-
      TauD is an alpha-ketoglutarate-dependent dioxygenase, but the more specific
      taurine dioxygenase activity is the core molecular function.
- term:
    id: GO:0042802
    label: identical protein binding
  evidence_type: IPI
  original_reference_id: PMID:22221834
  qualifier: enables
  review:
    summary: The paper supports TauD oligomerization, but identical protein binding is not an informative core function.
    action: KEEP_AS_NON_CORE
    reason: >-
      PMID:22221834 reports tetrameric TauD(Pp) in solution and crystals. This
      supports self-association but does not describe the biological catalytic
      role, so it is retained as non-core.
    supported_by:
    - reference_id: PMID:22221834
      supporting_text: 'show that both TauD(Pp) and TauD(Ec) are tetramers in solution and in the crystals'
- term:
    id: GO:0000907
    label: sulfonate dioxygenase activity
  evidence_type: IDA
  original_reference_id: PMID:22221834
  qualifier: enables
  review:
    summary: Sulfonate dioxygenase activity is directly supported and correctly generalizes the taurine reaction.
    action: ACCEPT
    reason: >-
      TauD oxidatively cleaves the sulfonate substrate taurine to release sulfite.
      This is a valid experimental molecular-function annotation.
    supported_by:
    - reference_id: PMID:22221834
      supporting_text: 'catalyzes the hydroxylation of taurine yielding sulfite and aminoacetaldehyde'
- term:
    id: GO:0000908
    label: taurine dioxygenase activity
  evidence_type: IDA
  original_reference_id: PMID:22221834
  qualifier: enables
  review:
    summary: This is the experimentally supported core molecular function.
    action: ACCEPT
    reason: >-
      The KT2440 enzyme was biochemically and structurally characterized as a
      taurine dioxygenase, and UniProt records the exact taurine reaction.
    supported_by:
    - reference_id: PMID:22221834
      supporting_text: 'catalyzes the hydroxylation of taurine yielding sulfite and aminoacetaldehyde'
- term:
    id: GO:0005506
    label: iron ion binding
  evidence_type: IDA
  original_reference_id: PMID:22221834
  qualifier: enables
  review:
    summary: Iron binding is experimentally consistent with the non-heme iron dioxygenase mechanism.
    action: KEEP_AS_NON_CORE
    reason: >-
      TauD uses a mononuclear non-heme iron center for catalysis. This is a
      valid cofactor annotation but secondary to the catalytic activity.
    supported_by:
    - reference_id: PMID:22221834
      supporting_text: 'A mononuclear nonheme iron center is used to couple the decarboxylation of the cosubstrate'
- term:
    id: GO:0044273
    label: sulfur compound catabolic process
  evidence_type: IDA
  original_reference_id: PMID:22221834
  qualifier: involved_in
  review:
    summary: Taurine desulfonation releases sulfite, supporting sulfur compound catabolism.
    action: ACCEPT
    reason: >-
      TauD catalyzes degradation of the organosulfonate taurine to sulfite and
      aminoacetaldehyde, making sulfur compound catabolism the best process
      annotation in this review.
    supported_by:
    - reference_id: PMID:22221834
      supporting_text: 'catalyzes the hydroxylation of taurine yielding sulfite and aminoacetaldehyde'
