taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: SurA is a periplasmic chaperone and parvulin-type peptidyl-prolyl cis-trans
  isomerase (EC 5.2.1.8) that is the primary chaperone escorting unfolded outer membrane
  proteins (OMPs) across the periplasm. It binds nascent OMPs emerging from the Sec
  translocon, recognizing patterns of aromatic residues characteristic of integral
  outer membrane proteins, and delivers them to the BAM complex for folding and assembly
  into the outer membrane. The protein has a modular architecture comprising an N-terminal
  region, two parvulin (PpiC) domains, and a C-terminal tail; the isomerase activity
  resides in the second parvulin domain, whereas the holdase chaperone and substrate
  recognition activities reside in the N-terminal region and C-terminal tail and are
  independent of the isomerase activity. SurA is synthesized with a cleavable N-terminal
  signal peptide, resides in the periplasmic space, and is capable of associating with
  the outer membrane.
