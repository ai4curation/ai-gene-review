proposed_new_terms: []
suggested_questions:
- question: In Pseudomonas putida specifically, what is the relative contribution of
    SurA versus the Skp and DegP periplasmic chaperone pathways to outer membrane protein
    biogenesis, and which OMP clients depend most strongly on SurA?
- question: Is the parvulin PPIase activity of P. putida SurA required for any specific
    OMP client in vivo, or is the holdase chaperone activity alone sufficient as suggested
    by the ortholog?
suggested_experiments:
- experiment_type: genetics
  description: Construct a surA (PP_0403) deletion mutant in P. putida KT2440 and assess
    outer membrane integrity, OMP levels by SDS-PAGE/proteomics, and sensitivity to
    membrane-perturbing agents to confirm the OMP biogenesis role experimentally.
- experiment_type: biochemistry
  description: Purify recombinant P. putida SurA and assay peptidyl-prolyl cis-trans
    isomerase activity with a standard protease-coupled or fluorescence-based PPIase
    assay, and test holdase activity by suppression of aggregation of an unfolded OMP
    substrate.
- experiment_type: interaction mapping
  description: Use crosslinking or pull-down coupled to mass spectrometry to identify
    the in vivo OMP client repertoire of SurA and its physical association with the
    BAM complex in P. putida.
references:
- id: GO_REF:0000002
  title: Gene Ontology annotation through association of InterPro records with GO terms
  findings:
  - statement: InterPro2GO mapping assigns SurA to peptide binding, outer membrane-bounded
      periplasmic space, Gram-negative-bacterium-type cell outer membrane assembly,
      and protein stabilization based on the PPIase_SurA InterPro signature.
- id: GO_REF:0000120
  title: Combined Automated Annotation using Multiple IEA Methods
  findings:
  - statement: UniRule MF_01183 assigns PPIase activity, unfolded protein binding,
      protein folding, and periplasmic localization to SurA orthologs.
- id: file:PSEPK/surA/surA-uniprot.txt
  title: UniProt entry SURA_PSEPK (Q88QT4)
  findings:
  - statement: SurA is a chaperone involved in the correct folding and assembly of
      outer membrane proteins and recognizes aromatic residue patterns characteristic
      of integral OMPs.
  - statement: The PPIase activity resides only in the second parvulin domain and is
      dispensable for the chaperone function, which is conferred by the N-terminal region
      and C-terminal tail.
  - statement: SurA is periplasmic and capable of associating with the outer membrane.
- id: file:interpro/panther/PTHR47637/PTHR47637-metadata.yaml
  title: PANTHER family PTHR47637 (Chaperone SurA), subfamily PTHR47637:SF1 (CHAPERONE
    SURA)
  findings:
  - statement: surA is classified into PANTHER family PTHR47637 and subfamily PTHR47637:SF1,
      both named CHAPERONE SURA, confirming its assignment as the SurA periplasmic
      outer membrane protein chaperone.
  - statement: The PTHR47637:SF1 subfamily classification supports the SurA-specific
      outer-membrane-protein chaperone/PPIase function for this protein.
- id: file:PSEPK/surA/surA-notes.md
  title: Curation notes for surA (PSEPK)
  findings:
  - statement: Functional understanding of P. putida SurA derives from the HAMAP rule
      MF_01183 and the well-characterized E. coli ortholog; no organism-specific experimental
      publications exist.
