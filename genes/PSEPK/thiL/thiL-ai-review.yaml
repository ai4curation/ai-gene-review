  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: thiL encodes thiamine-phosphate kinase, the ATP-dependent enzyme that phosphorylates thiamine monophosphate to thiamine diphosphate, the active thiamine cofactor form. In Pseudomonas putida KT2440 this places ThiL at the terminal phosphorylation step of thiamine diphosphate biosynthesis.
