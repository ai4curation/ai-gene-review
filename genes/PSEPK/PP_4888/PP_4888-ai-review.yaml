  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: PP_4888 encodes a membrane methyl-accepting chemotaxis receptor/transducer with a
  methyl-accepting chemotaxis receptor domain plus HAMP and MCP signaling domains in Pseudomonas putida
  KT2440. It belongs in the orphan MCP receptor boundary as a ligand-unresolved chemotaxis receptor;
  no specific chemoeffector is assigned in this first pass.
