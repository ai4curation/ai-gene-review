  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: kdpD encodes the membrane sensor histidine kinase of the Kdp potassium-homeostasis system
  in Pseudomonas putida KT2440. Together with the already curated KdpE response regulator, it links potassium
  or osmotic stress signals to regulation of the adjacent Kdp potassium-transport operon.
