  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: PP_4781 encodes a predicted 7TMR-DISM sensor histidine kinase in Pseudomonas putida KT2440. Extracytoplasmic
  sensory, transmembrane, HisKA, and HATPase domains support a membrane phosphorelay sensor role, but the ligand
  and response-regulator partner are unresolved.
