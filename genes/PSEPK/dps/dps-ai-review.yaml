  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: dps (PP_1210) encodes a Dps/ferritin-like stress protein in Pseudomonas putida KT2440. The protein has a ferritin/Dps
  domain, EC-derived ferroxidase activity, ferric-iron-binding annotation, and UniProt/domain support for DNA binding. In
  this first pass it is curated as a Dps-family iron-sequestration and DNA-binding stress protein rather than as a fully experimentally
  characterized KT2440 DNA-protection factor.
