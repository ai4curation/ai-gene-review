description: PP_1167 encodes the predicted DctM-like large permease component of a tripartite ATP-independent
  periplasmic C4-dicarboxylate transporter in Pseudomonas putida KT2440. It is an inner-membrane TRAP
  permease located next to the DctQ small permease PP_1168 and DctP substrate-binding component.
