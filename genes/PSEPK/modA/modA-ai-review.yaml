description: modA encodes the periplasmic molybdate-binding component of the PP_3828-PP_3830 ModABC uptake system. Its signal peptide, ModA solute-binding family assignment, and GOA molybdate-binding and transport annotations support a substrate-recognition role for molybdate import, with tungstate binding retained as a secondary family-supported ligand lead.
