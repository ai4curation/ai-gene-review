  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: PP_3802 encodes the predicted ATP-binding energy-coupling component of the adjacent
  PP_3801-PP_3803 Znu-like cation ABC importer. Its ABC transporter ATP-binding domain, metal-ion-import
  ABC family assignment, and colocalization between the PP_3801 ZnuA-like binding component
  and PP_3803 cation permease support ATP hydrolysis-driven metal/zinc import.
