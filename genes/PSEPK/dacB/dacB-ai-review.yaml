- term:
    id: GO:0000270
    label: peptidoglycan metabolic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000118
  qualifier: involved_in
  review:
    summary: Peptidoglycan metabolism is the supported process context for this D-Ala-D-Ala carboxypeptidase.
    action: ACCEPT
    reason: DacB is annotated as a D-alanyl-D-alanine carboxypeptidase in a peptidase S13/PBP-family context, consistent with peptidoglycan remodeling.
    supported_by:
    - reference_id: file:PSEPK/dacB/dacB-uniprot.txt
