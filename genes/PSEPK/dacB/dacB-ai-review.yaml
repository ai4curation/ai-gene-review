    - reference_id: file:PSEPK/dacB/dacB-goa.tsv
      supporting_text: peptidoglycan metabolic process
- term:
    id: GO:0004185
    label: serine-type carboxypeptidase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: serine-type carboxypeptidase activity is directionally related to PBP/carboxypeptidase chemistry but is less precise than the D-Ala-D-Ala carboxypeptidase/transpeptidase term.
    action: MODIFY
    reason: dacB is supported as a D-Ala-D-Ala carboxypeptidase/transpeptidase-family peptidoglycan enzyme, so GO:0009002 is the better molecular-function term.
    proposed_replacement_terms:
    - id: GO:0009002
      label: serine-type D-Ala-D-Ala carboxypeptidase activity
    supported_by:
    - reference_id: file:PSEPK/dacB/dacB-uniprot.txt
      supporting_text: 'DE   SubName: Full=D-alanyl-D-alanine carboxypeptidase'
    - reference_id: file:PSEPK/dacB/dacB-uniprot.txt
      supporting_text: DR   GO; GO:0004185; F:serine-type carboxypeptidase activity; IEA:InterPro.
    - reference_id: file:PSEPK/dacB/dacB-goa.tsv
      supporting_text: serine-type carboxypeptidase activity
- term:
    id: GO:0006508
    label: proteolysis
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: involved_in
  review:
    summary: Proteolysis captures a broad peptidase aspect but is not the specific peptidoglycan remodeling function.
    action: KEEP_AS_NON_CORE
    reason: The annotation is retained as non-core because D-Ala-D-Ala carboxypeptidase/transpeptidase chemistry is the more informative function.
    supported_by:
