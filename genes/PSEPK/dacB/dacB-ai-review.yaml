  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: 'dacB encodes an unreviewed D-alanyl-D-alanine carboxypeptidase/peptidase S13-family protein of Pseudomonas putida KT2440. The first-pass evidence supports a peptidoglycan remodeling carboxypeptidase role rather than a de novo cytosolic precursor-synthesis role.'
