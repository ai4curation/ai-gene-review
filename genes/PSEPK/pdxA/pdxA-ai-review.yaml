id: Q88QT5
gene_symbol: pdxA
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: >-
    Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 /
    NCIMB 11950 / KT2440)
description: >-
  PdxA is an NAD(P)-dependent 4-hydroxythreonine-4-phosphate dehydrogenase
  (EC 1.1.1.262). It oxidizes 4-(phosphooxy)-L-threonine to an unstable
  amino-oxo intermediate that spontaneously decarboxylates to
  3-amino-2-oxopropyl phosphate. This is the fourth reaction of the
  DXP-dependent pyridoxine 5'-phosphate branch. The enzyme binds one divalent
  metal ion and can use zinc, magnesium, or cobalt.
