description: 'pdxA encodes 4-hydroxythreonine-4-phosphate dehydrogenase, a de novo
  vitamin B6 biosynthesis enzyme in Pseudomonas putida KT2440. It oxidizes 4-(phosphooxy)-L-threonine
  during pyridoxine 5''-phosphate formation, upstream of pyridoxal 5''-phosphate production.'
