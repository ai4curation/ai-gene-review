description: lysA-I (PP_2077) encodes a diaminopimelate decarboxylase paralog that decarboxylates meso-diaminopimelate to L-lysine in the final step of the bacterial diaminopimelate route. PSEPK also has a second LysA-like protein, so paralog-specific pathway contribution remains a first-pass uncertainty.
