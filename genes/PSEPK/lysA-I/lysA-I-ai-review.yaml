id: Q88L58
gene_symbol: lysA-I
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: >-
  lysA-I (PP_2077) encodes the PLP-dependent diaminopimelate decarboxylase
  (DAPDC; EC 4.1.1.20) that converts meso-2,6-diaminopimelate to L-lysine and
  carbon dioxide in the terminal reaction of the diaminopimelate pathway.
  KT2440 also encodes the LysA-II protein Q88CF4, and the relative physiological
  contributions of the two paralogs are unresolved.
existing_annotations:
