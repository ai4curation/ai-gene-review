id: Q88L14
gene_symbol: moeA
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: >-
  moeA encodes a soluble molybdopterin molybdenumtransferase that inserts
  molybdate into adenylylated molybdopterin, releases AMP, and forms
  Mo-molybdopterin. This reaction completes the conserved metal-insertion stage
  of molybdenum-cofactor biosynthesis before optional nucleotide maturation.
