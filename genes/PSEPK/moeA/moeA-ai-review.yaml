description: moeA (PP_2123) encodes molybdopterin molybdenumtransferase, the MoeA-family enzyme that inserts molybdenum into
  molybdopterin during Mo-molybdopterin cofactor biosynthesis. It is a MoCo branch component of the broad ppu00790 cofactor
  map.
