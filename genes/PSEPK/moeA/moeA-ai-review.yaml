- id: file:PSEPK/moeA/moeA-deep-research-openscientist.md
  title: OpenScientist gene research for moeA
  reference_review:
    relevance: HIGH
    correctness: LOW_QUALITY
    review_notes: >-
      The target MoeA reaction agrees with UniProt, but the report misassigns
      several KT2440 MoaD/MoaE/MoeB/MobA locus tags and overstates moaB-I as the
      missing active MPT adenylyltransferase. Those organism-specific claims were
      not used; no direct KT2440 assay was found.
  findings:
  - statement: The report gives the conserved MoeA reaction used here.
    supporting_text: >-
      > **adenylyl-molybdopterin (MPT-AMP) + molybdate (MoO₄²⁻) →
      Mo-molybdopterin (Moco) + AMP + H⁺**  (Mg²⁺-dependent)
  - statement: The report explicitly identifies the lack of target-specific experimental evidence.
    supporting_text: >-
      - No *P. putida* KT2440-specific biochemical or structural study of PP_2123
      was found; functional assignment relies on high-confidence orthology to *E.
      coli* MoeA and conserved domain architecture. Direct enzymatic characterization
      or a KT2440 knockout phenotype would confirm substrate specificity (Mo vs W)
      and downstream molybdoenzyme dependencies in this organism.
