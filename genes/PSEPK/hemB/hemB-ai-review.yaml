id: Q88IT6
gene_symbol: hemB
product_type: PROTEIN
aliases:
  - PP_2913
status: COMPLETE
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: >-
  HemB is one of two KT2440 delta-aminolevulinate dehydratase paralogs. It is an
  ALAD-family enzyme predicted to condense two 5-aminolevulinate molecules into
  porphobilinogen. Sequence-based site annotation identifies catalytic zinc
  ligands, a magnesium-binding site, and the conserved lysines that form
  Schiff-base intermediates, supporting a metal-dependent porphobilinogen
  synthase role in heme-b precursor synthesis.
existing_annotations:
  - term:
      id: GO:0004655
      label: porphobilinogen synthase activity
    evidence_type: IEA
    original_reference_id: GO_REF:0000120
    qualifier: enables
    review:
      summary: This is the specific predicted catalytic function of HemB.
      action: ACCEPT
      reason: >-
        UniProt assigns EC 4.2.1.24, the ALAD family, conserved catalytic
        Schiff-base sites, and metal-binding residues consistent with
        porphobilinogen synthase activity.
      supported_by:
        - reference_id: file:PSEPK/hemB/hemB-uniprot.txt
          supporting_text: "RecName: Full=Delta-aminolevulinic acid dehydratase"
  - term:
      id: GO:0005829
      label: cytosol
    evidence_type: IEA
    original_reference_id: GO_REF:0000118
    qualifier: located_in
    review:
      summary: A soluble cytosolic location is consistent with the ALAD-family architecture.
      action: ACCEPT
      reason: >-
        No signal peptide or transmembrane segment is predicted, and UniProt
        retains the TreeGrafter cytosol cross-reference.
      supported_by:
        - reference_id: file:PSEPK/hemB/hemB-uniprot.txt
          supporting_text: "GO; GO:0005829; C:cytosol;"
  - term:
      id: GO:0006779
      label: porphyrin-containing compound biosynthetic process
    evidence_type: IEA
    original_reference_id: GO_REF:0000117
    qualifier: involved_in
    review:
      summary: This is a correct broad pathway assignment for an early shared tetrapyrrole step.
      action: KEEP_AS_NON_CORE
      reason: >-
        Porphobilinogen formation supplies the common tetrapyrrole trunk. The
        annotation is biologically correct, but the catalytic activity and
        direct tetrapyrrole-biosynthesis role are more informative core claims.
      supported_by:
        - reference_id: file:PSEPK/hemB/hemB-uniprot.txt
          supporting_text: "PATHWAY: Porphyrin-containing compound metabolism; protoporphyrin-IX"
  - term:
      id: GO:0006783
      label: heme biosynthetic process
    evidence_type: IEA
    original_reference_id: GO_REF:0000118
    qualifier: involved_in
    review:
      summary: ALAD activity supplies porphobilinogen to the shared heme-b pathway.
      action: ACCEPT
      reason: >-
        The reaction is required upstream of hydroxymethylbilane,
        uroporphyrinogen III, and all subsequent heme-b intermediates.
      supported_by:
        - reference_id: file:PSEPK/hemB/hemB-uniprot.txt
          supporting_text: "KW   Heme biosynthesis"
  - term:
      id: GO:0008270
      label: zinc ion binding
    evidence_type: IEA
    original_reference_id: GO_REF:0000118
    qualifier: enables
    review:
      summary: HemB contains a predicted catalytic zinc site characteristic of one ALAD lineage.
      action: ACCEPT
      reason: >-
        Three residues are annotated as catalytic Zn2+ ligands, and the sequence
        contains the corresponding cysteine-rich region. This architecture is
        absent from the KT2440 HemBB paralog.
      supported_by:
        - reference_id: file:PSEPK/hemB/hemB-uniprot.txt
          supporting_text: 'ligand_note="catalytic"'
  - term:
      id: GO:0033014
      label: tetrapyrrole biosynthetic process
    evidence_type: IEA
    original_reference_id: GO_REF:0000002
    qualifier: involved_in
    review:
      summary: HemB directly participates in tetrapyrrole biosynthesis.
      action: ACCEPT
      reason: >-
        ALAD produces porphobilinogen for the shared tetrapyrrole trunk, so the
        broad process term is accurate and does not force a single downstream
        tetrapyrrole endpoint.
      supported_by:
        - reference_id: file:PSEPK/hemB/hemB-uniprot.txt
          supporting_text: "PATHWAY: Porphyrin-containing compound metabolism; protoporphyrin-IX"
  - term:
      id: GO:0046872
      label: metal ion binding
    evidence_type: IEA
    original_reference_id: GO_REF:0000002
    qualifier: enables
    review:
      summary: The broad metal call can be replaced by the additional predicted magnesium site.
      action: MODIFY
      reason: >-
        Zinc binding is already represented by GO:0008270, while UniProt also
        identifies a distinct Mg2+-binding residue. GO:0000287 records that
        second metal requirement without retaining a generic parent term.
      proposed_replacement_terms:
        - id: GO:0000287
          label: magnesium ion binding
      supported_by:
        - reference_id: file:PSEPK/hemB/hemB-uniprot.txt
          supporting_text: 'ligand="Mg(2+)"'
