    title: Combined Automated Annotation using Multiple IEA Methods
    findings: []
  - id: file:PSEPK/hemB/hemB-uniprot.txt
    title: UniProtKB entry for PSEPK hemB
    findings:
      - statement: HemB is an ALAD-family delta-aminolevulinate dehydratase.
        supporting_text: "RecName: Full=Delta-aminolevulinic acid dehydratase"
      - statement: HemB has predicted catalytic zinc and magnesium sites.
        supporting_text: 'ligand_note="catalytic"'
      - statement: HemB also has a predicted Mg2+-binding site.
        supporting_text: 'ligand="Mg(2+)"'
  - id: file:PSEPK/hemB/hemB-deep-research-openscientist.md
    title: OpenScientist research report for PSEPK hemB
    findings:
      - statement: >-
          The report identifies the ALAD-family reaction but acknowledges that
          Q88IT6 has not been directly characterized experimentally.
        supporting_text: "No direct experimental characterization of the *P. putida* enzyme."
    reference_review:
      relevance: HIGH
      correctness: MISCITED
      review_notes: >-
        The report recovers the correct reaction and a zinc-site prediction that
        is independently present in UniProt. It does not account for the KT2440
        hemBB paralog, calls a P. aeruginosa protein the close ortholog without
        resolving paralogy, and presents unsaved global alignments, exact residue
        maps, and ortholog-derived metal, oligomer, and inhibitor behavior as
        target-specific conclusions. Only the UniProt-supported ALAD reaction and
        predicted Zn/Mg sites were retained; physiological dominance is unresolved.
core_functions:
  - description: >-
      Condenses two 5-aminolevulinate molecules to porphobilinogen as a
      metal-dependent ALAD-family enzyme in tetrapyrrole precursor synthesis.
    molecular_function:
      id: GO:0004655
      label: porphobilinogen synthase activity
    directly_involved_in:
      - id: GO:0033014
        label: tetrapyrrole biosynthetic process
    locations:
      - id: GO:0005829
        label: cytosol
    supported_by:
      - reference_id: file:PSEPK/hemB/hemB-uniprot.txt
        supporting_text: "RecName: Full=Delta-aminolevulinic acid dehydratase"
suggested_questions:
  - question: >-
      Is HemB the principal aerobic ALAD isozyme, and how does its zinc site
      affect activity relative to HemBB?
suggested_experiments:
  - hypothesis: HemB and HemBB are active ALAD paralogs with different metal dependence.
    description: >-
      Purify both proteins and compare kinetics, oligomerization, and metal
      dependence, then phenotype single and double mutants with ALA rescue.
