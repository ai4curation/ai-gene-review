taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: PP_3801 encodes a predicted ZnuA-like high-affinity zinc-binding substrate-binding
  component. Its ZnuA/PsaA-like domains, zinc-transport keywords, signal peptide, and adjacent
  PP_3802/PP_3803 metal-import ABC ATPase/permease genes support a periplasmic substrate-recognition
  role in a second Znu-like zinc/cation ABC import system in KT2440.
