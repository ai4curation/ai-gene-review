  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: ampG encodes a predicted multi-pass MFS-family muropeptide permease in Pseudomonas putida
  KT2440. AmpG-family transporters import cell-wall recycling muropeptides across the inner membrane,
  linking peptidoglycan turnover to inducible beta-lactamase systems in organisms that carry an AmpC/AmpR-type
  response. The current GOA terms support a conservative transmembrane transporter role.
