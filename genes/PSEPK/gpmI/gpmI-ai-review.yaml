description: gpmI (PP_5056) encodes a 2,3-bisphosphoglycerate-independent phosphoglycerate mutase. The manganese-dependent enzyme interconverts 3-phosphoglycerate and 2-phosphoglycerate, a reversible lower central-carbon step that links phosphoglycerate kinase and enolase reactions in glycolytic and gluconeogenic flux.
