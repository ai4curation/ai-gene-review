  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: PP_5332 encodes a putative glucose-6-phosphate 1-epimerase, a mutarotase-family enzyme predicted to interconvert alpha- and beta-D-glucose 6-phosphate. This activity can equilibrate glucose-6-phosphate anomers for enzymes that have anomeric preference, making it a hexose-phosphate support enzyme rather than a committed ED/gluconeogenic step.
