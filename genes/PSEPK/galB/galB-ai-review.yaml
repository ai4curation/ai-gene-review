  evidence_type: IEA
  original_reference_id: GO_REF:0000118
  review:
    summary: The C-N-bond hydrolase annotation is the wrong molecular-function aspect for GalB chemistry.
    action: REMOVE
    reason: GalB is a hydratase/lyase-class enzyme acting in gallate degradation, not a hydrolase acting
      on linear amide C-N bonds. The specific GO:0047584 hydratase term should be retained.
    proposed_replacement_terms:
    - id: GO:0047584
      label: 4-oxalmesaconate hydratase activity
    supported_by:
