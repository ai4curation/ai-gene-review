  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: galB encodes 4-oxalmesaconate hydratase, a zinc-containing hydratase in the gallate degradation
  cluster. GalB converts oxalomesaconate enol to 4-carboxy-4-hydroxy-2-oxoadipate as the third step of
  the KT2440 gallate catabolic pathway.
