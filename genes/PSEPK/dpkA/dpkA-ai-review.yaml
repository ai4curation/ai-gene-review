  evidence_type: IEA
  original_reference_id: GO_REF:0000117
  qualifier: involved_in
  review:
    summary: L-proline metabolic process reflects one substrate branch of DpkA but is not the lysine-degradation core.
    action: KEEP_AS_NON_CORE
    reason: DpkA has a pyrroline-2-carboxylate/proline redox reaction in addition to piperideine/pipecolate chemistry; keep this process as side context.
    supported_by:
