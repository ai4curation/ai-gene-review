taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: dpkA encodes a bifunctional Delta(1)-pyrroline-2-carboxylate/Delta(1)-piperideine-2-carboxylate reductase in Pseudomonas putida KT2440. The enzyme links proline and pipecolate/piperideine redox chemistry and is best treated as D-lysine/pipecolate side-route context within ppu00310.
