id: Q88F54
gene_symbol: pvdY
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: pvdY encodes a predicted MbtK/IucB-like acyl-CoA N-acyltransferase annotated as a hydroxyproline acetylase. In KT2440 it is associated with siderophore biosynthesis, most likely as a cytosolic tailoring or precursor-modification enzyme rather than a core nonribosomal peptide synthetase component.
existing_annotations:
- term:
    id: GO:0005737
    label: cytoplasm
  evidence_type: IEA
  original_reference_id: GO_REF:0000044
  qualifier: located_in
  review:
    summary: Cytoplasm is a plausible non-core location for pvdY based on UniProt subcellular-location mapping.
    action: KEEP_AS_NON_CORE
    reason: The annotation is consistent with UniProt's predicted cytoplasmic location, but localization is supporting context rather than the pathway-defining function.
    supported_by:
    - reference_id: file:PSEPK/pvdY/pvdY-uniprot.txt
      supporting_text: 'CC   -!- SUBCELLULAR LOCATION: Cytoplasm'
    - reference_id: file:PSEPK/pvdY/pvdY-goa.tsv
      supporting_text: "GO:0005737\tcytoplasm"
- term:
    id: GO:0016746
    label: acyltransferase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: Broad acyltransferase activity is supported by the MbtK/IucB-like acyltransferase domain and hydroxyproline acetylase product name, but the current UniProt record carries the more informative N-acyltransferase activity term.
    action: MODIFY
    reason: Retain the acyltransferase inference but prefer GO:0016410 because the protein is annotated as an MbtK/IucB-like acyl-CoA N-acyltransferase/hydroxyproline acetylase rather than a generic transferase.
    supported_by:
    - reference_id: file:PSEPK/pvdY/pvdY-uniprot.txt
      supporting_text: 'SubName: Full=Hydroxyproline acetylase'
    - reference_id: file:PSEPK/pvdY/pvdY-uniprot.txt
      supporting_text: DR   GO; GO:0016410; F:N-acyltransferase activity; IEA:TreeGrafter.
    - reference_id: file:PSEPK/pvdY/pvdY-uniprot.txt
      supporting_text: DR   InterPro; IPR019432; Acyltransferase_MbtK/IucB-like.
    - reference_id: file:PSEPK/pvdY/pvdY-deep-research-asta.md
      supporting_text: '- **Key Domains:** Acyl_CoA_acyltransferase. (IPR016181); Acyltransferase_MbtK/IucB-like. (IPR019432); Acetyltransf_8 (PF13523)'
    - reference_id: file:PSEPK/pvdY/pvdY-goa.tsv
      supporting_text: "GO:0016746\tacyltransferase activity"
    proposed_replacement_terms:
    - id: GO:0016410
      label: N-acyltransferase activity
- term:
    id: GO:0019290
    label: siderophore biosynthetic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: involved_in
  review:
    summary: The siderophore biosynthetic process annotation is appropriate as a conservative pathway-level assignment for pvdY. UniProt places the protein in siderophore biosynthesis and the InterPro-derived GOA row assigns GO:0019290, while the available first-pass Asta retrieval did not provide stronger gene-specific mechanistic literature.
    action: ACCEPT
    reason: Accept the general siderophore biosynthesis term, but do not strengthen it to a specific pyoverdine process without direct evidence for this KT2440 protein.
    supported_by:
    - reference_id: file:PSEPK/pvdY/pvdY-uniprot.txt
      supporting_text: 'CC   -!- PATHWAY: Siderophore biosynthesis.'
    - reference_id: file:PSEPK/pvdY/pvdY-uniprot.txt
      supporting_text: DR   GO; GO:0019290; P:siderophore biosynthetic process; IEA:InterPro.
    - reference_id: file:PSEPK/pvdY/pvdY-goa.tsv
      supporting_text: "GO:0019290\tsiderophore biosynthetic process"
