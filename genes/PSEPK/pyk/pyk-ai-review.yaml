description: pyk (PP_4301) encodes the second pyruvate kinase isozyme of Pseudomonas putida KT2440, complementing pykA/PP_1362. Pyruvate kinase catalyzes transfer of phosphate from phosphoenolpyruvate to ADP to form pyruvate and ATP. In an ED-dominated organism, this terminal lower-glycolytic reaction lies at the PEP-pyruvate branchpoint, balancing pyruvate formation against PEP-consuming gluconeogenic and biosynthetic routes.
