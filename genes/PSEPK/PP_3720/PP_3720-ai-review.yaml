description: >-
  PP_3720 encodes a flavodoxin-fold NAD(P)H quinone oxidoreductase-family
  protein. Like PP_2789, it is best treated as a predicted soluble/cytosolic
  quinone redox enzyme rather than a committed ubiquinone biosynthetic enzyme
  unless later pathway-specific evidence resolves its substrate and role.
