suggested_questions:
- question: Does plpB encode a substrate-binding lipoprotein for a specific ABC importer in KT2440, and if so is its substrate
    methionine, another amino acid, or an unrelated envelope ligand?
- question: Is the proximity of plpB to the cysA/cysW/cysU/sbp-II sulfate-import locus functionally relevant, or only a locus-neighborhood
    artifact in the broad ppu02010 ABC-transporter partition?
suggested_experiments:
- description: Test plpB deletion and complementation for growth or uptake phenotypes under sulfate, thiosulfate, methionine,
    and other sulfur/amino-acid limitation conditions, separately from cysA/cysW/cysU/sbp-II mutants.
  experiment_type: targeted lipoprotein substrate and transporter-context phenotyping
