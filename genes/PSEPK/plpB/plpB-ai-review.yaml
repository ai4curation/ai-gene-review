description: plpB encodes a predicted membrane-anchored NlpA-family lipoprotein in Pseudomonas putida KT2440. The current
  record supports lipoprotein membrane localization and periplasmic-binding-protein-like family context, but does not establish
  a transported substrate or a direct role in the neighboring sulfate/thiosulfate ABC importer.
