taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: rbsD (PP_2459) encodes a reviewed cytosolic D-ribose pyranase associated with D-ribose utilization. It catalyzes interconversion of beta-pyran and beta-furan forms of D-ribose as the first step of the UniPathway D-ribose degradation route, and is best modeled as a ribose-catabolic accessory enzyme near the Rbs importer.
