id: Q88QX1
gene_symbol: bioF
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: >-
  BioF is a pyridoxal 5'-phosphate-dependent 8-amino-7-oxononanoate synthase.
  It condenses pimeloyl-ACP with L-alanine, releasing ACP and carbon dioxide,
  to begin assembly of the biotin heterocycle.
existing_annotations:
- term:
    id: GO:0008710
    label: 8-amino-7-oxononanoate synthase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: This is the specific BioF catalytic activity.
    action: ACCEPT
    reason: >-
      The reviewed UniProt record, EC 2.3.1.47, HAMAP rule, and
      proteobacterial BioF family assignments agree on this reaction.
    supported_by:
    - reference_id: file:PSEPK/bioF/bioF-uniprot.txt
      supporting_text: Full=8-amino-7-oxononanoate synthase
    - reference_id: file:PSEPK/bioF/bioF-deep-research-openscientist.md
      supporting_text: >-
        The gene **bioF** (UniProt **Q88QX1**; locus **PP_0363**) of
        *Pseudomonas putida* KT2440 encodes **8-amino-7-oxononanoate
        synthase** (AONS), also called **7-keto-8-aminopelargonate synthase**
        or **KAPA synthase** (**EC 2.3.1.47**).
- term:
    id: GO:0009102
    label: biotin biosynthetic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: involved_in
  review:
    summary: BioF catalyzes the first ring-assembly reaction of biotin synthesis.
    action: ACCEPT
    reason: >-
      Its pimeloyl-ACP/L-alanine condensation product is the precursor used by
      BioA, BioD, and BioB.
- term:
    id: GO:0030170
    label: pyridoxal phosphate binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: PLP binding is a valid mechanistic property but is not the core reaction.
    action: KEEP_AS_NON_CORE
    reason: >-
      The UniProt cofactor record and class-II PLP-dependent transferase family
      support PLP use; GO:0008710 remains the informative core function.
references:
- id: GO_REF:0000120
  title: Combined Automated Annotation using Multiple IEA Methods
  findings: []
- id: file:PSEPK/bioF/bioF-uniprot.txt
  title: UniProtKB entry for PSEPK BioF
  findings:
  - statement: Assigns Q88QX1 to EC 2.3.1.47 and biotin biosynthesis.
    supporting_text: Full=8-amino-7-oxononanoate synthase
- id: file:PSEPK/bioF/bioF-goa.tsv
  title: QuickGO annotation snapshot for PSEPK BioF
  findings:
  - statement: Contains the three existing annotations reviewed above.
- id: file:PSEPK/bioF/bioF-deep-research-openscientist.md
  title: OpenScientist functional report for PSEPK BioF
  findings:
  - statement: >-
      Supports the BioF-family assignment, PLP-dependent EC 2.3.1.47
      reaction, and pimeloyl-ACP substrate inference from the BioC-BioH route.
      No direct assay, structure, localization experiment, or knockout of
      Q88QX1 was identified. The report's inherited "first committed step"
      wording and one incomplete rendering of the local gene cluster are not
      used as curation evidence.
core_functions:
- description: >-
    Condenses pimeloyl-ACP with L-alanine to form
    8-amino-7-oxononanoate in biotin biosynthesis.
