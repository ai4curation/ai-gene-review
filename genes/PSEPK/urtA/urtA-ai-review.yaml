description: urtA encodes the signal-peptide-bearing periplasmic substrate-binding
  component of the PP_4841-PP_4845 UrtABCDE urea ABC uptake system. The product name
  and UrtA-specific InterPro domain support urea recognition, while the existing amino-acid
  transport annotation is treated as a broad family-transfer artifact.
