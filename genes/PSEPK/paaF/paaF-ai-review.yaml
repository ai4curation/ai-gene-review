description: >-
  PaaF is an enoyl-CoA hydratase-isomerase in the aerobic phenylacetate
  degradation pathway of Pseudomonas putida KT2440. It acts in the
  beta-oxidation-like lower segment of the pathway after aromatic-ring opening.
