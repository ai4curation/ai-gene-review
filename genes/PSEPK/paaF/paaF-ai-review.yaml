- id: file:PSEPK/paaF/paaF-uniprot.txt
  title: UniProtKB entry Q88HR9 for Pseudomonas putida KT2440 paaF
  findings:
  - statement: UniProt assigns PaaF as an enoyl-CoA hydratase-isomerase.
    supporting_text: 'SubName: Full=Enoyl-CoA hydratase-isomerase'
    reference_section_type: RESULTS
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: Exact target accession; the submitted name is genome-derived.
- id: PMID:22961985
  title: >-
    Protein-protein interactions in the β-oxidation part of the phenylacetate
    utilization pathway: crystal structure of the PaaF-PaaG
    hydratase-isomerase complex.
  full_text_unavailable: true
  findings:
  - statement: E. coli PaaF and PaaG form a stable hydratase-isomerase complex.
    supporting_text: >-
      stable complex, PaaFG, an enoyl-CoA hydratase and enoyl-Coa isomerase,
      both
    reference_section_type: RESULTS
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: >-
      PubMed identifier and abstract verified. This is direct structural
      evidence for the E. coli orthologous complex, not for KT2440 Q88HR9 or
      obligate complex formation across taxa.
- id: file:PSEPK/paaF/paaF-deep-research-openscientist.md
  title: OpenScientist deep research for PSEPK paaF
  findings:
  - statement: The report supports the crotonase-family enoyl-CoA hydratase assignment.
    supporting_text: >-
      encodes a **cytoplasmic enoyl-CoA hydratase** of the **crotonase
      superfamily** (EC 4.2.1.17)
    reference_section_type: RESULTS
  - statement: >-
      The report assigns hydration of the lower-pathway dicarboxylic enoyl-CoA
      intermediate.
    supporting_text: >-
      syn-hydration of the C2=C3 double bond of 2,3-dehydroadipyl-CoA to yield
      3-hydroxyadipyl-CoA
    reference_section_type: RESULTS
  - statement: Direct kinetic evidence for exact KT2440 Q88HR9 remains unavailable.
    supporting_text: >-
      Catalytic parameters (kcat, Km), the exact physiological substrate, and
      the degree of substrate promiscuity of Q88HR9 have not, to our knowledge,
      been measured directly.
    reference_section_type: DISCUSSION
  reference_review:
    relevance: HIGH
    correctness: UNVERIFIED
    review_notes: >-
      Provider-generated report. Exact identity, family, locus context, and EC
      assignment agree with local records. The substrate-level reaction and
      PaaFG architecture are inferred from orthologs and are not treated as
      direct KT2440 evidence.
core_functions:
- description: >-
    Catalyzes an enoyl-CoA hydration/isomerization step in the
    beta-oxidation-like lower segment of aerobic phenylacetate catabolism.
  molecular_function:
