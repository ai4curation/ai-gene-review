suggested_questions:
- question: Which open-chain phenylacetate intermediate is the preferred KT2440 PaaF substrate?
- question: >-
    Does KT2440 PaaF form the stable PaaFG complex observed for E. coli
    orthologs, and does complex formation affect pathway flux?
suggested_experiments:
- description: >-
    Measure PaaF kinetics with pathway-derived enoyl-CoA intermediates and
    representative fatty-acyl-CoAs to define physiological substrate preference.
