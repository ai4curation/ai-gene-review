    summary: Likely family-level over-annotation rather than the physiological pathway.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      PaaF is encoded in the phenylacetate catabolic locus and is assigned to
      the lower phenylacetate pathway. The fatty-acid process annotation was
      transferred from a broad enoyl-CoA hydratase family.
    supported_by:
    - reference_id: file:PSEPK/paaF/paaF-deep-research-openscientist.md
      supporting_text: >-
        The physiological substrate is the CoA-thioester of a short
        **dicarboxylic** enoyl intermediate produced by ring opening of
        phenylacetyl-CoA — not generic long-chain fatty enoyl-CoAs.
