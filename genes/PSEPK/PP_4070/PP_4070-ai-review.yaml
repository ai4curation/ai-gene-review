description: PP_4070 encodes RNA polymerase subunit sigma-70, a Nucleic-acid, tRNA-modification, recombination, or sigma-factor
  spillover pulled into the membrane bucket by weak membrane signal. This first-pass review treats it as a domain-resolved
  transport-bucket boundary member rather than evidence for a single coherent transport pathway.
