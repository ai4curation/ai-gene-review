- id: file:PSEPK/mobA/mobA-deep-research-openscientist.md
  title: OpenScientist gene research for mobA
  reference_review:
    relevance: HIGH
    correctness: MISCITED
    review_notes: >-
      The one-MGD reaction agrees with reviewed target UniProt, and the report
      explicitly acknowledges that Q88HA3 lacks direct target-specific study.
      However, it assigns moaA to PP_2123 (actually moeA) and a moeA-family gene
      to PP_1294 (actually moaE), conflates MobA-catalyzed Mo-MPT guanylylation
      with target-specific bis-MGD assembly and delivery, and presents unsaved
      target alignment, motif, neighborhood, MobB-absence, and client analyses.
      Those claims are not propagated.
  findings:
  - statement: The report gives the conserved one-MGD guanylyltransferase reaction that is independently supported by reviewed target UniProt.
    supporting_text: GTP  +  Mo-MPT   --(MobA, Mg2+)-->   MGD  +  PPi
  - statement: The report contains concrete KT2440 locus errors for two upstream genes.
    supporting_text: >-
      whereas the core upstream Moco machinery is present: *moaA* (K03750, PP_2123), a *moeA*-family gene (PP_1294), and *mobA* itself (K03752, PP_3457, EC 2.7.7.77).
  - statement: The report presents an unsaved target-specific pairwise alignment as evidence.
    supporting_text: >-
      A global BLOSUM62 (Needleman–Wunsch) alignment of *P. putida* MobA (Q88HA3, 191 aa) against the experimentally characterized *E. coli* MobA (P32173, 194 aa) gives **29.6 % identity and 52.4 % similarity over 189 aligned positions** (alignment score 199).
  - statement: The report explicitly states that no direct Q88HA3 biochemical or structural measurements were found.
    supporting_text: >-
      **No *P. putida*-specific experimental data.** Q88HA3 is annotated PE = 3 (inferred from homology). Its catalytic activity, kinetics, substrate specificity, and structure have not been measured directly; all functional claims are transferred from orthologs.
