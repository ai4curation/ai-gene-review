description: >-
  mobA encodes the cytoplasmic molybdenum-cofactor guanylyltransferase that
  transfers GMP from GTP to Mo-molybdopterin, producing the MGD cofactor variant
  used by a subset of molybdoenzymes. This is an optional nucleotide-maturation
  branch downstream of conserved Mo-MPT formation.
