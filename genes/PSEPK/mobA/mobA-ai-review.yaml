description: mobA (PP_3457) encodes molybdenum cofactor guanylyltransferase, the MobA-family enzyme that converts Mo-molybdopterin
  into molybdopterin guanine dinucleotide cofactor. It is part of molybdenum cofactor maturation within the broad ppu00790
  cofactor map.
