id: Q88C66
gene_symbol: ubiC
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: >-
  ubiC encodes chorismate pyruvate-lyase, the soluble UbiC enzyme that produces
  4-hydroxybenzoate from chorismate. This reaction supplies the aromatic
  head-group precursor for ubiquinone biosynthesis and releases pyruvate as a
  stoichiometric product.
existing_annotations:
- term:
    id: GO:0005737
    label: cytoplasm
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: located_in
  review:
    summary: >-
      Cytoplasmic localization is consistent with a soluble chorismate lyase.
    action: KEEP_AS_NON_CORE
    reason: >-
      Location is useful context but not the core molecular function.
- term:
    id: GO:0005829
    label: cytosol
  evidence_type: IEA
  original_reference_id: GO_REF:0000118
  qualifier: located_in
  review:
    summary: >-
      Cytosol is consistent with the expected location of bacterial UbiC.
    action: KEEP_AS_NON_CORE
    reason: >-
      This is location context for the chorismate lyase reaction.
- term:
    id: GO:0006744
    label: ubiquinone biosynthetic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: involved_in
  review:
    summary: >-
      UbiC supplies 4-hydroxybenzoate for the ubiquinone pathway.
    action: ACCEPT
    reason: >-
      UniProt/HAMAP explicitly states that the UbiC reaction provides
      4-hydroxybenzoate for the ubiquinone pathway.
- term:
    id: GO:0008813
    label: chorismate lyase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: >-
      Chorismate lyase activity is the core UbiC molecular function.
    action: ACCEPT
    reason: >-
      The UniProt record gives the chorismate to 4-hydroxybenzoate plus
      pyruvate reaction and EC 4.1.3.40.
- term:
    id: GO:0042866
    label: pyruvate biosynthetic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000104
  qualifier: involved_in
  review:
    summary: >-
      Pyruvate is produced by the chorismate lyase reaction, but pyruvate
      biosynthesis is not the biological role of UbiC.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      The process annotation follows a reaction byproduct and overstates the
      pathway role; UbiC should be curated primarily to ubiquinone biosynthesis.
