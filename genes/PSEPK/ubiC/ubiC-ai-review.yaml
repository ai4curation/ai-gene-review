taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: >-
  ubiC encodes chorismate pyruvate-lyase, which cleaves chorismate to
  4-hydroxybenzoate and pyruvate. The 4-hydroxybenzoate product supplies the
  aromatic head group for ubiquinone biosynthesis in the cytosol.
