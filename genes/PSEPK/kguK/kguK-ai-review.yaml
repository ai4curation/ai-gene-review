description: 2-ketogluconokinase of Pseudomonas putida KT2440 (PP_3378), a PfkB-family carbohydrate kinase
  that phosphorylates dehydrogluconate/2-ketogluconate. KguK belongs to the glucose/gluconate oxidation
  side branch feeding central carbon metabolism and is adjacent to the PPP/ED map rather than a strict
  PPP enzyme.
