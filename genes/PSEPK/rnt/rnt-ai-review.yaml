taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: rnt encodes RNase T, a magnesium-dependent 3'-5' exoribonuclease that trims short 3' overhangs on RNA substrates
  and participates in tRNA end-turnover and tRNA biosynthesis. The DNA proofreading annotation appears to be a family-transfer
  artifact rather than this enzyme's biological role.
