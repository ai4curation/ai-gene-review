  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: PP_3455 is a predicted membrane-fusion protein component of a multidrug RND efflux system
  in Pseudomonas putida KT2440. Its role is most conservatively described as an adaptor component of an
  efflux pump associated with antibiotic and xenobiotic response context, not as an independently active
  transporter.
