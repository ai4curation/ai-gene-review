id: Q88PX5
gene_symbol: ispE
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: >-
  ispE encodes the ATP-dependent kinase of the methylerythritol phosphate
  pathway. It phosphorylates 4-CDP-2-C-methyl-D-erythritol to form
  4-CDP-2-C-methyl-D-erythritol 2-phosphate during synthesis of isopentenyl and
  dimethylallyl diphosphate precursors.
existing_annotations:
- term:
    id: GO:0005524
    label: ATP binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: ATP binding is required mechanistic context for the IspE kinase reaction.
    action: KEEP_AS_NON_CORE
    reason: >-
      ATP is the phosphate donor, but the substrate-specific kinase term
      captures the evolved core function.
    supported_by:
    - reference_id: file:PSEPK/ispE/ispE-uniprot.txt
      supporting_text: 4-CDP-2-C-methyl-D-erythritol + ATP
- term:
    id: GO:0016114
    label: terpenoid biosynthetic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: involved_in
  review:
    summary: Terpenoid biosynthesis is correct but broader than the MEP pathway term.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      GO:0019288 captures the specific precursor-biosynthesis route in which
      IspE acts.
    supported_by:
    - reference_id: file:PSEPK/ispE/ispE-goa.tsv
      supporting_text: "GO:0016114\tterpenoid biosynthetic process"
- term:
    id: GO:0019288
    label: isopentenyl diphosphate biosynthetic process, methylerythritol phosphate
      pathway
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: involved_in
  review:
    summary: The methylerythritol phosphate pathway is the core process for IspE.
    action: ACCEPT
    reason: >-
      UniProt places IspE at step 3 of the six-reaction route from DXP to
      isopentenyl diphosphate.
    supported_by:
    - reference_id: file:PSEPK/ispE/ispE-uniprot.txt
      supporting_text: isopentenyl diphosphate biosynthesis via DXP pathway
- term:
    id: GO:0050515
    label: 4-(cytidine 5'-diphospho)-2-C-methyl-D-erythritol kinase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: CDP-ME kinase activity is the specific catalytic function of IspE.
    action: ACCEPT
    reason: >-
      UniProt assigns EC 2.7.1.148 and Rhea 18437 for phosphorylation of CDP-ME
      at its position-2 hydroxy group.
    supported_by:
    - reference_id: file:PSEPK/ispE/ispE-uniprot.txt
      supporting_text: Catalyzes the phosphorylation of the position 2 hydroxy group
    - reference_id: file:PSEPK/ispE/ispE-deep-research-openscientist.md
      supporting_text: >-
        The *ispE* gene (locus **PP_0723**; UniProt **Q88PX5**) of *Pseudomonas
        putida* KT2440 encodes **4-diphosphocytidyl-2-C-methyl-D-erythritol
        kinase**
