  title: UniProt entry Q88PX5 for ispE
  findings:
  - statement: >-
      UniProt identifies Q88PX5 as the ATP-dependent CDP-ME kinase at step 3 of
      the DXP/MEP route from DXP to IPP.
- id: file:PSEPK/ispE/ispE-goa.tsv
  title: QuickGO GOA annotations for ispE
  findings:
  - statement: The fetched GOA table contains the four annotations reviewed here.
- id: file:PSEPK/ispE/ispE-deep-research-openscientist.md
  title: OpenScientist gene research report for ispE
  findings:
  - statement: >-
      The report supports the ATP-dependent CDP-ME 2-hydroxyl kinase
      assignment, GHMP/IspE family placement, and downstream role in the MEP
      route.
  - statement: >-
      No direct biochemical study of Q88PX5 was identified. The report's
      wording that IspE is a committed step and fourth of eight is not used;
      commitment occurs at Dxr, and this module counts seven enzyme steps from
      DXS through IspH.
