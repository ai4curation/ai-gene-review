  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: 'PP_2215 encodes a thiolase-family acetyl-CoA acetyltransferase. The best current annotation
  is acetyl-CoA C-acetyltransferase activity; there is not enough evidence to treat it as a dedicated
  3-oxoadipyl-CoA thiolase in benzoate degradation.'
