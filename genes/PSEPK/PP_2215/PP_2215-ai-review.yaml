    action: MARK_AS_OVER_ANNOTATED
    reason: It adds no substrate specificity.
- term:
    id: GO:0033812
    label: 3-oxoadipyl-CoA thiolase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: 3-oxoadipyl-CoA thiolase activity is not supported for this acetyl-CoA
      acetyltransferase.
    action: REMOVE
    reason: The current product and EC annotation point to acetyl-CoA acetyltransferase, not
      beta-ketoadipate-pathway thiolase activity.
