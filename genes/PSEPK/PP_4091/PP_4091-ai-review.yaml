suggested_questions:
- question: Is PP_4091 part of an active IS66 insertion sequence in KT2440 or a decaying mobile-element copy?
suggested_experiments:
- experiment_type: genomic neighborhood inspection
  description: Inspect the local genomic neighborhood of PP_4091 for terminal inverted repeats, paired transposase ORFs, or
    disrupted coding sequence.
  hypothesis: PP_4091 belongs to an intact local mobile element rather than a decaying fragment.
- experiment_type: comparative sequence analysis
  description: Compare PP_4091 against curated IS66/Tni-family proteins to test whether catalytic and accessory residues are
    intact.
  hypothesis: PP_4091 retains the sequence features expected for its assigned transposase-related class.
