  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: trmB encodes a SAM-dependent tRNA guanine-N7 methyltransferase that forms N7-methylguanosine at position 46 of tRNA, supporting bacterial tRNA modification and translation fidelity.
existing_annotations:
- term:
    id: GO:0006400
    label: tRNA modification
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: involved_in
  review:
    summary: tRNA modification is the correct broad biological process for TrmB's m7G46 reaction.
    action: ACCEPT
    reason: UniProt/HAMAP describes TrmB as catalyzing formation of N7-methylguanine at tRNA position 46 and assigns the N7-methylguanine-tRNA biosynthesis pathway, so the broad tRNA modification process is appropriate.
    supported_by:
