    - reference_id: file:PSEPK/trmB/trmB-goa.tsv
      supporting_text: "GO:0006400\ttRNA modification"
- term:
    id: GO:0008176
    label: tRNA (guanine(46)-N7)-methyltransferase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: GO:0008176 is the exact molecular function for TrmB.
    action: ACCEPT
    reason: The UniProt entry names TrmB as a tRNA guanine-N7 methyltransferase and gives the Rhea/EC reaction converting guanosine(46) in tRNA plus SAM to N7-methylguanosine(46) plus S-adenosyl-L-homocysteine.
    supported_by:
    - reference_id: file:PSEPK/trmB/trmB-uniprot.txt
      supporting_text: "Reaction=guanosine(46) in tRNA + S-adenosyl-L-methionine = N(7)-"
    - reference_id: file:PSEPK/trmB/trmB-uniprot.txt
      supporting_text: Belongs to the class I-like SAM-binding methyltransferase
    - reference_id: file:PSEPK/trmB/trmB-goa.tsv
      supporting_text: "GO:0008176\ttRNA (guanine(46)-N7)-methyltransferase activity"
- term:
    id: GO:0030488
    label: tRNA methylation
  evidence_type: IEA
  original_reference_id: GO_REF:0000118
  qualifier: involved_in
  review:
    summary: tRNA methylation is a correct parent process for TrmB's N7-methylguanosine-46 reaction.
    action: ACCEPT
    reason: The specific TrmB reaction methylates guanosine at position 46 in tRNA using SAM, so the broader tRNA methylation process is valid even though GO:0106004 is the more precise process term.
    supported_by:
    - reference_id: file:PSEPK/trmB/trmB-uniprot.txt
      supporting_text: Catalyzes the formation of N(7)-methylguanine at position 46
    - reference_id: file:PSEPK/trmB/trmB-goa.tsv
      supporting_text: "GO:0030488\ttRNA methylation"
- term:
    id: GO:0036265
    label: RNA (guanine-N7)-methylation
  evidence_type: IEA
  original_reference_id: GO_REF:0000118
  qualifier: involved_in
  review:
    summary: RNA guanine-N7 methylation is a valid broad parent process, but the core TrmB process is tRNA-specific.
    action: KEEP_AS_NON_CORE
    reason: TrmB acts on guanosine(46) in tRNA rather than RNA generically. This parent process can be retained as non-core context, while GO:0106004 captures the specific process.
    supported_by:
    - reference_id: file:PSEPK/trmB/trmB-uniprot.txt
      supporting_text: Catalyzes the formation of N(7)-methylguanine at position 46
    - reference_id: file:PSEPK/trmB/trmB-goa.tsv
      supporting_text: "GO:0036265\tRNA (guanine-N7)-methylation"
- term:
    id: GO:0043527
    label: tRNA methyltransferase complex
  evidence_type: IEA
  original_reference_id: GO_REF:0000118
  qualifier: part_of
  review:
    summary: The TreeGrafter complex annotation is not supported by the local TrmB evidence.
    action: MARK_AS_OVER_ANNOTATED
    reason: UniProt and GOA support TrmB as a SAM-dependent tRNA methyltransferase enzyme, but the current first-pass evidence does not establish membership in a specific tRNA methyltransferase complex for PSEPK TrmB.
    supported_by:
    - reference_id: file:PSEPK/trmB/trmB-uniprot.txt
      supporting_text: "tRNA (guanine-N(7)-)-methyltransferase"
    - reference_id: file:PSEPK/trmB/trmB-goa.tsv
      supporting_text: "GO:0043527\ttRNA methyltransferase complex"
