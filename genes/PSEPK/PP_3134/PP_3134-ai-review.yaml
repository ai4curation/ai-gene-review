description: PP_3134 encodes an uncharacterized hexapeptide-repeat,
  LpxA-like acyltransferase-family protein in Pseudomonas putida KT2440.
  UniProt cross-references support O-acyltransferase activity and lipid A
  biosynthetic-process context, but the exact acyl donor and acceptor remain
  unresolved.
existing_annotations:
- term:
    id: GO:0016740
    label: transferase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: The generic transferase annotation is directionally correct but too
      broad for the hexapeptide/LpxA-like acyltransferase-family evidence.
    action: MODIFY
    reason: UniProt records a more informative O-acyltransferase activity
      cross-reference, and the InterPro/Pfam domains place PP_3134 in a
      hexapeptide-repeat acyltransferase family. The exact substrate is not
      resolved, so O-acyltransferase activity is a better replacement than a
      specific lipid-A acyltransferase term.
    proposed_replacement_terms:
    - id: GO:0008374
      label: O-acyltransferase activity
    supported_by:
