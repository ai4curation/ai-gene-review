id: Q88C82
gene_symbol: rpoZ
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: >-
  rpoZ (PP_5301) encodes the small omega subunit of the bacterial DNA-directed
  RNA polymerase core enzyme. RpoZ promotes RNA polymerase assembly by
  stabilizing the beta-prime subunit and facilitating its interaction with the
  beta and alpha subunits. It is a structural and assembly subunit of the
  alpha2-beta-beta-prime-omega RNAP core that contributes to complex-level
  DNA-directed RNA polymerase activity and DNA-templated transcription.
existing_annotations:
- term:
    id: GO:0003677
    label: DNA binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: >-
      The fetched IEA record assigns generic DNA binding to RpoZ, but the
      UniProt functional comment emphasizes RNA polymerase assembly/stability
      rather than a direct DNA-binding role for omega.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      DNA binding may be an indirect family-level projection from association
      with RNA polymerase. The core RpoZ role is structural assembly/stability
      of the RNAP core enzyme, so generic DNA binding should not be treated as a
      core function.
- term:
    id: GO:0003899
    label: DNA-directed RNA polymerase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: >-
      RpoZ is required for proper bacterial RNAP core assembly and contributes
      to the complex that performs RNA synthesis, but the omega subunit is not
      independently catalytic.
    action: ACCEPT
    reason: >-
      Interpret as contribution to complex-level polymerase activity rather than
      standalone RNA polymerase activity by the omega subunit.
    supported_by:
    - reference_id: file:PSEPK/rpoZ/rpoZ-uniprot.txt
      supporting_text: Promotes RNA polymerase assembly.
- term:
    id: GO:0006351
    label: DNA-templated transcription
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: involved_in
  review:
    summary: >-
      RpoZ participates in DNA-templated transcription through its structural
      role in the bacterial RNA polymerase core enzyme.
    action: ACCEPT
    reason: >-
      Correct process annotation for an RNAP core subunit, provided it is
      understood as participation through the assembled complex.
- term:
    id: GO:0034062
    label: 5'-3' RNA polymerase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000116
  qualifier: enables
  review:
    summary: >-
      The Rhea-derived polymerase reaction reflects RNA-chain elongation by the
      assembled RNAP core, not standalone catalysis by omega.
    action: MODIFY
    reason: >-
      RpoZ contributes structurally to the enzyme that performs this reaction,
      but its own specific role is RNA polymerase assembly/stability.
    proposed_replacement_terms:
    - id: GO:0003899
      label: DNA-directed RNA polymerase activity
    supported_by:
    - reference_id: file:PSEPK/rpoZ/rpoZ-uniprot.txt
      supporting_text: Promotes RNA polymerase assembly.
- term:
    id: GO:0005198
    label: structural molecule activity
  evidence_type: ISS
  original_reference_id: file:PSEPK/rpoZ/rpoZ-uniprot.txt
  qualifier: enables
  review:
    summary: >-
      RpoZ's specific role is structural support of RNA polymerase core assembly
      and stability.
    action: NEW
    reason: >-
      The UniProt/HAMAP functional comment supports an assembly/stability role
      for the omega subunit. GO:0005198 is a broad but more accurate
      subunit-specific molecular function than treating RpoZ as independently
      catalytic.
    supported_by:
    - reference_id: file:PSEPK/rpoZ/rpoZ-uniprot.txt
      supporting_text: Promotes RNA polymerase assembly.
- term:
    id: GO:0005829
    label: cytosol
  evidence_type: ISS
  original_reference_id: file:PSEPK/rpoZ/rpoZ-uniprot.txt
  qualifier: located_in
  review:
    summary: >-
      RpoZ is a soluble bacterial RNA polymerase core subunit and is expected to
      function in the cytosol/nucleoid.
    action: NEW
    reason: >-
      The reviewed UniProt record describes RpoZ as the omega subunit of the
      soluble RNAP catalytic core with no signal peptide or membrane-spanning
      localization; cytosol is the appropriate cellular location for bacterial
      core transcription machinery.
- term:
    id: GO:0000428
    label: DNA-directed RNA polymerase complex
  evidence_type: ISS
  original_reference_id: file:PSEPK/rpoZ/rpoZ-uniprot.txt
  qualifier: part_of
  review:
    summary: >-
      RpoZ is part of the bacterial DNA-directed RNA polymerase core complex.
    action: NEW
    reason: >-
      UniProt records Q88C82 as the omega subunit in the alpha2-beta-beta-prime-
      omega RNAP catalytic core, so explicit complex membership is useful for
      interpreting the complex-level polymerase MF.
    supported_by:
    - reference_id: file:PSEPK/rpoZ/rpoZ-uniprot.txt
      supporting_text: The RNAP catalytic core consists of 2 alpha, 1 beta, 1 beta'
