id: Q88C82
gene_symbol: rpoZ
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: rpoZ encodes the omega subunit of the Pseudomonas putida KT2440 DNA-directed RNA polymerase core enzyme. Omega promotes RNAP assembly by latching the beta-prime subunit and facilitating its interaction with the beta and alpha subunits, thereby supporting formation of the transcriptionally active core enzyme.
existing_annotations:
- term:
    id: GO:0003677
    label: DNA binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: DNA binding is likely over-propagated for rpoZ as a direct molecular function.
    action: MARK_AS_OVER_ANNOTATED
    reason: The omega subunit functions primarily in RNAP assembly and core stabilization; DNA binding is better captured at the RNAP complex level rather than as a standalone omega-subunit activity.
    supported_by:
    - reference_id: file:PSEPK/rpoZ/rpoZ-goa.tsv
      supporting_text: "GO:0003677\tDNA binding"
    - &rpoz_assembly
      reference_id: file:PSEPK/rpoZ/rpoZ-uniprot.txt
      supporting_text: "Promotes RNA polymerase assembly."
- term:
    id: GO:0003899
    label: DNA-directed RNA polymerase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: DNA-directed RNA polymerase activity is retained as a complex-level activity to which omega contributes, not as an independent catalytic activity.
    action: KEEP_AS_NON_CORE
    reason: UniProt gives rpoZ an RNAP subunit identity and EC reaction context, but its specific function is RNAP assembly; the core-function summary records contribution to the RNAP complex activity.
    supported_by:
    - &rpoz_go_rnap
      reference_id: file:PSEPK/rpoZ/rpoZ-goa.tsv
      supporting_text: "GO:0003899\tDNA-directed RNA polymerase activity"
    - &rpoz_reaction
      reference_id: file:PSEPK/rpoZ/rpoZ-uniprot.txt
      supporting_text: "Reaction=RNA(n) + a ribonucleoside 5'-triphosphate = RNA(n+1) +"
    - *rpoz_assembly
    - &rpoz_subunit
      reference_id: file:PSEPK/rpoZ/rpoZ-uniprot.txt
      supporting_text: "The RNAP catalytic core consists of 2 alpha, 1 beta, 1 beta'"
    - &rpoz_asta_identity
      reference_id: file:PSEPK/rpoZ/rpoZ-deep-research-asta.md
      supporting_text: "uniprot_accession: Q88C82"
- term:
    id: GO:0006351
    label: DNA-templated transcription
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: involved_in
  review:
    summary: DNA-templated transcription is accepted for rpoZ through its assembly role in the RNAP core.
    action: ACCEPT
    reason: Omega promotes formation of the RNAP core that transcribes DNA into RNA; this process annotation is appropriate when interpreted through the complex.
    supported_by:
    - reference_id: file:PSEPK/rpoZ/rpoZ-goa.tsv
      supporting_text: "GO:0006351\tDNA-templated transcription"
    - *rpoz_assembly
    - reference_id: file:PSEPK/rpoZ/rpoZ-uniprot.txt
      supporting_text: "the holoenzyme is formed, which can initiate transcription."
- term:
    id: GO:0034062
    label: 5'-3' RNA polymerase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000116
  qualifier: enables
  review:
    summary: The 5'-3' RNA polymerase activity annotation is over-specific as a direct omega-subunit activity.
    action: MARK_AS_OVER_ANNOTATED
    reason: rpoZ contributes to RNAP assembly rather than providing the catalytic activity independently; complex-level contribution to DNA-directed RNA polymerase activity is the appropriate first-pass interpretation.
    supported_by:
    - reference_id: file:PSEPK/rpoZ/rpoZ-goa.tsv
      supporting_text: "GO:0034062\t5'-3' RNA polymerase activity"
    - *rpoz_reaction
    - *rpoz_assembly
- term:
    id: GO:0000428
    label: DNA-directed RNA polymerase complex
  evidence_type: IEA
  original_reference_id: file:PSEPK/rpoZ/rpoZ-uniprot.txt
  qualifier: part_of
  review:
    summary: rpoZ should be explicitly connected to the DNA-directed RNA polymerase complex.
    action: NEW
    reason: The fetched GOA table lacks the complex term, but UniProt records GO:0000428 and describes omega as part of the alpha2-beta-beta-prime-omega RNAP catalytic core.
    supported_by:
    - reference_id: file:PSEPK/rpoZ/rpoZ-uniprot.txt
      supporting_text: "DR   GO; GO:0000428; C:DNA-directed RNA polymerase complex; IEA:UniProtKB-KW."
    - *rpoz_subunit
