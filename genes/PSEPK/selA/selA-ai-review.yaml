taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: SelA (PP_0493) is the bacterial L-seryl-tRNA(Sec) selenium transferase, also called selenocysteine synthase. It is a pyridoxal-5'-phosphate-dependent cytoplasmic enzyme that converts L-seryl-tRNA(Sec) and selenophosphate to L-selenocysteinyl-tRNA(Sec), the charged tRNA required for cotranslational selenocysteine incorporation. In the P. putida KT2440 selenocompound map, SelA acts downstream of SelD-derived selenophosphate in the selenium-specific Sec-tRNA biosynthesis spine.
