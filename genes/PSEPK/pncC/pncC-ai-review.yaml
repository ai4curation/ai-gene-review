taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: >-
  Compact bacterial nicotinamide-nucleotide amidohydrolase of Pseudomonas
  putida KT2440. PncC belongs to the CinA C-terminal/PncC NMN deamidase family
  and hydrolyzes nicotinamide mononucleotide (NMN) to nicotinate
  D-ribonucleotide (NaMN) and ammonium. This reaction channels NMN recovered
  from pyridine-nucleotide turnover into the shared NadD/NadE completion route.
