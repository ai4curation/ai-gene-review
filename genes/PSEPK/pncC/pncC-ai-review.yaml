suggested_questions:
  - question: Which NMN-producing turnover reactions supply physiologically relevant substrate to PncC, and does the second TIGR00199/CinA-C protein PP_3298 share or specialize this activity?
suggested_experiments:
  - description: >-
      Construct single and double deletions of pncC and PP_3298, quantify NMN,
      NaMN, and NAD+ during basal growth and NAD-consuming stress, and compare
      purified-protein NMN deamidase activities before assigning redundancy.
