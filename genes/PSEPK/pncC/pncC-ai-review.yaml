  - term:
      id: GO:0019159
      label: nicotinamide-nucleotide amidase activity
    evidence_type: IEA
    original_reference_id: GO_REF:0000003
    qualifier: enables
    review:
      summary: Defensible core activity for the target PncC-family protein.
      action: ACCEPT
      reason: >-
        The target is annotated as an NMN amidohydrolase with EC 3.5.1.42 and
        carries the PncC-specific TIGR00199 plus CinA C-terminal domains. The
        same compact bacterial family is experimentally established as the NMN
        deamidase that produces NaMN for salvage, although Q88ME5 itself has not
        been biochemically assayed.
