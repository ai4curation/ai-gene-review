  - id: PMID:21953451
    title: Identification of nicotinamide mononucleotide deamidase of the bacterial pyridine nucleotide cycle reveals a novel broadly conserved amidohydrolase family.
    findings:
      - statement: Biochemical and deletion-mutant evidence established the bacterial PncC family as an NMN deamidase with a physiological salvage role.
        supporting_text: Enzymatic characterization of the PncC protein, as well as phenotype analysis of deletion mutants, confirmed its proposed biochemical and physiological function in S. oneidensis.
        reference_section_type: RESULTS
      - statement: NMN deamidation feeds NaMN into the Preiss-Handler route.
        supporting_text: "the predominant route, PNC IV, proceeds via NMN deamidation to NaMN, which is then converted to NAD by entering the Preiss-Handler pathway;"
