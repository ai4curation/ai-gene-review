id: Q88KF3
gene_symbol: prpF
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: >-
  PrpF is the methylaconitate positional isomerase of the two-component
  AcnD/PrpF branch of the 2-methylcitrate cycle in Pseudomonas putida KT2440.
  It rearranges the methyl-trans-aconitate product of AcnD to the
  2-methyl-cis-aconitate substrate accepted by the downstream
  aconitase-family hydration step.
