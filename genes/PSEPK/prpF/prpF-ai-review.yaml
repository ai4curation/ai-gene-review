proposed_new_terms:
- proposed_name: 2-methylaconitate isomerase activity
  proposed_definition: >-
    Catalysis of the isomerization of 2-methyl-trans-aconitate to
    2-methyl-cis-aconitate.
  justification: >-
    The available generic isomerase term does not capture the PrpF substrate
    or its role in coupling AcnD to the downstream aconitase-family enzyme.
    The existing aconitate delta-isomerase term describes unmethylated
    trans-aconitate and is not an exact substitute.
  proposed_parent:
    id: GO:0016859
    label: cis-trans isomerase activity
  supported_by:
  - reference_id: file:projects/P_PUTIDA/deep-research/PSEPK__methylcitrate_cycle__ppu00640-deep-research-openscientist.md
    supporting_text: 'Its product is 2-methyl-*trans*-aconitate, which PrpF (2-methylaconitate isomerase, EC 5.3.3.-) converts to the 2-methyl-*cis*-aconitate accepted by aconitase'
suggested_questions:
- question: Does KT2440 PrpF accept unmethylated trans-aconitate or only the AcnD product?
suggested_experiments:
- description: >-
    Assay purified PrpF with methyl-trans-aconitate and trans-aconitate and
    identify products by targeted LC-MS.
