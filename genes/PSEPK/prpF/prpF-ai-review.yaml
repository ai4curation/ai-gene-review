  qualifier: enables
  review:
    summary: Broad isomerase activity is supported by PrpF-family membership and submitted aconitate isomerase naming.
    action: ACCEPT
    reason: >-
      GOA currently provides only the broad isomerase term for this PrpF-family
      protein. Because no more specific GO term is present in GOA, keep the term
      as a conservative first-pass molecular-function annotation.
