status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: >-
  prpF encodes a PrpF-family methylcitrate-cycle isomerase candidate in
  Pseudomonas putida KT2440. UniProt carries the submitted name aconitate
  isomerase and InterPro links PrpF-family membership to propionate catabolism
  through the 2-methylcitrate cycle. Current GOA has only the broad molecular
  function term "isomerase activity", so the first-pass review accepts this
  conservative term while recording the pathway context as propionate
  catabolism.
