description: dld2 encodes a predicted FAD/iron-sulfur D-lactate dehydrogenase. It is best treated as a cytochrome/electron-transfer-linked
  D-lactate dehydrogenase in lactate catabolism; the NAD+-specific D-lactate dehydrogenase annotation is likely an over-specific
  family-transfer artifact for this flavoprotein.
