description: phoR encodes the membrane-associated PhoR sensor histidine kinase of the PhoR/PhoB phosphate-starvation
  system in Pseudomonas putida KT2440. It phosphorylates PhoB in response to phosphate limitation and
  links extracellular phosphate status to phosphate-regulon expression.
