  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: >-
  PrpE is the AMP-forming propionyl-CoA synthetase of the 2-methylcitrate
  cycle in Pseudomonas putida KT2440. It activates propionate with CoA and ATP
  to provide the propionyl-CoA substrate used by PrpC at the entry to
  propionate catabolism.
