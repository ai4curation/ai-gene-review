id: Q88KD9
gene_symbol: prpE
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: >-
  prpE encodes a predicted propionyl-CoA synthetase/propionate-CoA ligase in
  Pseudomonas putida KT2440. As an ATP-dependent AMP-binding enzyme, it likely
  activates propionate to propionyl-CoA, supplying the methylcitrate route for
  propionate catabolism. The useful molecular-function annotation is
  propionate-CoA ligase activity; broad ligase and bacterial intracellular
  organelle-lumen annotations are not informative or are taxonomically
  inappropriate.
existing_annotations:
- term:
    id: GO:0005737
    label: cytoplasm
  evidence_type: IEA
  original_reference_id: GO_REF:0000117
  qualifier: located_in
  review:
    summary: Cytoplasm is plausible localization for this soluble AMP-binding propionyl-CoA synthetase.
    action: ACCEPT
    reason: >-
      PrpE is a bacterial soluble acyl-CoA synthetase candidate; the cytoplasm
      annotation is consistent with propionate activation and avoids the
      incorrect organelle-lumen call also present from ARBA.
    supported_by:
    - reference_id: file:PSEPK/prpE/prpE-goa.tsv
      supporting_text: "GO:0005737\tcytoplasm"
    - reference_id: file:PSEPK/prpE/prpE-deep-research-asta.md
      supporting_text: "protein_family: Belongs to the ATP-dependent AMP-binding enzyme family."
- term:
    id: GO:0016874
    label: ligase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000117
  qualifier: enables
  review:
    summary: Generic ligase activity should be replaced by the specific propionate-CoA ligase term.
    action: MODIFY
    reason: >-
      ARBA supplies a broad ligase parent, while the EC/PANTHER-supported GOA
      annotation identifies the more specific propionate-CoA ligase activity.
    proposed_replacement_terms:
    - id: GO:0050218
      label: propionate-CoA ligase activity
    supported_by:
    - reference_id: file:PSEPK/prpE/prpE-goa.tsv
      supporting_text: "GO:0016874\tligase activity"
    - reference_id: file:PSEPK/prpE/prpE-goa.tsv
      supporting_text: "GO:0050218\tpropionate-CoA ligase activity"
- term:
    id: GO:0050218
    label: propionate-CoA ligase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: Propionate-CoA ligase activity is the core molecular function for PrpE.
    action: ACCEPT
    reason: >-
      GOA supports GO:0050218 with EC 6.2.1.17 and PANTHER evidence, and UniProt
      names the protein propionyl-CoA synthetase.
    supported_by:
    - reference_id: file:PSEPK/prpE/prpE-goa.tsv
      supporting_text: "GO:0050218\tpropionate-CoA ligase activity"
    - reference_id: file:PSEPK/prpE/prpE-uniprot.txt
      supporting_text: "DE   SubName: Full=Propionyl-CoA synthetase"
- term:
    id: GO:0070013
    label: intracellular organelle lumen
  evidence_type: IEA
  original_reference_id: GO_REF:0000117
  qualifier: located_in
  review:
    summary: Intracellular organelle lumen is an inappropriate ARBA localization for a bacterial KT2440 enzyme.
    action: REMOVE
    reason: >-
      Pseudomonas putida is a bacterium and does not have a eukaryotic
      intracellular organelle lumen. This ARBA localization is inconsistent with
      the cytoplasmic soluble acyl-CoA synthetase interpretation and should not
      be retained.
    supported_by:
    - reference_id: file:PSEPK/prpE/prpE-goa.tsv
      supporting_text: "GO:0070013\tintracellular organelle lumen"
