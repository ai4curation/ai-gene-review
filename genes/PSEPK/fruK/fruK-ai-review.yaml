id: Q88PQ4
gene_symbol: fruK
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: >-
  FruK is the soluble 1-phosphofructokinase of the Pseudomonas putida KT2440
  fructose PTS branch. It phosphorylates fructose 1-phosphate to fructose
  1,6-bisphosphate using ATP, linking PTS-mediated fructose uptake to central
  carbohydrate catabolism.
existing_annotations:
- term:
    id: GO:0005524
    label: ATP binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000104
  qualifier: enables
  review:
    summary: ATP binding is expected for the ATP-dependent 1-phosphofructokinase reaction.
    action: KEEP_AS_NON_CORE
    reason: This captures a required nucleotide-binding feature, but the core function is the specific 1-phosphofructokinase activity.
    supported_by:
    - reference_id: file:PSEPK/fruK/fruK-uniprot.txt
      supporting_text: 'CC   -!- FUNCTION: Catalyzes the ATP-dependent phosphorylation of fructose-l-'
- term:
    id: GO:0005829
    label: cytosol
  evidence_type: IEA
  original_reference_id: GO_REF:0000118
  qualifier: located_in
  review:
    summary: FruK is a soluble carbohydrate kinase and the cytosolic localization is consistent with its pathway role.
    action: ACCEPT
    reason: The UniProt GO cross-reference and lack of membrane or secretion features support cytosolic action after fructose-PTS import.
    supported_by:
    - reference_id: file:PSEPK/fruK/fruK-uniprot.txt
      supporting_text: 'DR   GO; GO:0005829; C:cytosol; IEA:TreeGrafter.'
- term:
    id: GO:0005975
    label: carbohydrate metabolic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: involved_in
  review:
    summary: This is a true but very broad parent process for FruK.
    action: MARK_AS_OVER_ANNOTATED
    reason: FruK is more informatively described as a fructose-entry/1-phosphofructokinase enzyme in carbohydrate catabolism.
- term:
    id: GO:0008443
    label: phosphofructokinase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: FruK is a phosphofructokinase, but the substrate-resolved term GO:0008662 is more precise.
    action: MODIFY
    reason: UniProt gives the reaction as fructose 1-phosphate to fructose 1,6-bisphosphate, so the 1-phosphofructokinase child term is preferred.
    proposed_replacement_terms:
    - id: GO:0008662
      label: 1-phosphofructokinase activity
    supported_by:
    - reference_id: file:PSEPK/fruK/fruK-uniprot.txt
      supporting_text: 'DR   GO; GO:0008662; F:1-phosphofructokinase activity; IEA:UniProtKB-UniRule.'
- term:
    id: GO:0008662
    label: 1-phosphofructokinase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: This is the best-supported molecular function for FruK.
    action: ACCEPT
    reason: The UniProt function, Rhea/EC reaction, and GO cross-reference all support ATP-dependent phosphorylation of fructose 1-phosphate.
    supported_by:
    - reference_id: file:PSEPK/fruK/fruK-uniprot.txt
      supporting_text: 'CC       phosphate to fructose-l,6-bisphosphate.'
    - reference_id: file:PSEPK/fruK/fruK-uniprot.txt
      supporting_text: 'DR   GO; GO:0008662; F:1-phosphofructokinase activity; IEA:UniProtKB-UniRule.'
- term:
    id: GO:0016052
    label: carbohydrate catabolic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000117
  qualifier: involved_in
  review:
    summary: Carbohydrate catabolic process is directionally correct for the fructose-entry branch.
    action: KEEP_AS_NON_CORE
    reason: This process is broader than the direct reaction but is a reasonable non-core pathway context for fructose utilization.
    supported_by:
    - reference_id: file:PSEPK/fruK/fruK-uniprot.txt
      supporting_text: 'DR   GO; GO:0016052; P:carbohydrate catabolic process; IEA:UniProtKB-ARBA.'
- term:
    id: GO:0016301
    label: kinase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: Kinase activity is a generic parent of 1-phosphofructokinase activity.
    action: MARK_AS_OVER_ANNOTATED
    reason: The exact substrate-resolved kinase term GO:0008662 is already present and should carry the functional signal.
- term:
    id: GO:0016773
    label: phosphotransferase activity, alcohol group as acceptor
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: This broad phosphotransferase parent is less informative than the specific FruK enzyme activity.
    action: MARK_AS_OVER_ANNOTATED
    reason: Keep the direct GO:0008662 term as the core molecular-function annotation.
