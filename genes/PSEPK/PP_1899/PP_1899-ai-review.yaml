  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: PP_1899 encodes an ExbD/TolR-family inner-membrane protein. It is a candidate energy-transduction partner for
  an ExbB/TolQ-like motor and TonB-dependent uptake system, not a standalone substrate transporter. The cognate receptor system
  and transported substrates remain unresolved.
