  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: PP_3893 encodes a DnaB-family predicted DNA 5'-to-3' helicase. It is a second DnaB-like helicase in the KT2440
  DNA-replication KEGG map; current evidence supports ATP-dependent DNA helicase activity, while its exact physiological division
  of labor relative to canonical dnaB remains unresolved.
