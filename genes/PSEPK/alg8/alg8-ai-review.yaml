  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: >-
  Alg8 is an inner-membrane glycosyltransferase of the KT2440 alginate
  biosynthesis machinery. It is predicted to polymerize GDP-mannuronic acid
  into the alginate precursor polymer, working with Alg44 and downstream
  periplasmic/export components.
