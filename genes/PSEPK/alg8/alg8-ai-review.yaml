  review:
    summary: The polymerizing glycosyltransferase role is plausible, but the hyaluronan substrate is wrong for Alg8.
    action: MODIFY
    reason: UniProt says Alg8 possibly polymerizes GDP-mannuronic acid, which supports alginate synthase activity rather than hyaluronan synthase activity.
    proposed_replacement_terms:
