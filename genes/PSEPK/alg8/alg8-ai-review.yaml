suggested_questions:
- question: Does KT2440 Alg8 alone have measurable alginate synthase activity, or is activity strictly dependent on Alg44 and other envelope components?
suggested_experiments:
- description: Reconstitute Alg8 with Alg44 in membranes or proteoliposomes and assay GDP-mannuronate polymerization.
  experiment_type: reconstitution assay
- description: Mutate conserved GT2 active-site residues and measure alginate output in vivo.
  experiment_type: targeted mutagenesis
