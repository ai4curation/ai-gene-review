description: mltF (PP_1036) encodes membrane-bound lytic murein transglycosylase F in Pseudomonas putida KT2440. UniProt describes
  an outer-membrane peripheral enzyme that degrades murein glycan strands with SLT-family transglycosylase domains, supporting
  a role in peptidoglycan turnover and cell-wall macromolecule catabolism.
