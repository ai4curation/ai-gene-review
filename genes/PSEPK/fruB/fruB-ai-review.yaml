id: Q88PQ5
gene_symbol: fruB
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: >-
  FruB is the large cytoplasmic phosphoenolpyruvate-dependent PTS phosphotransfer
  protein encoded immediately upstream of fruK and fruA in the KT2440 fructose
  utilization operon. It contains PTS enzyme I/HPr/EIIA-like phosphotransfer
  domains and supplies the upstream phosphorelay needed for fructose-specific PTS
  import and phosphorylation through FruA.
existing_annotations:
- term:
    id: GO:0005737
    label: cytoplasm
  evidence_type: IEA
  original_reference_id: GO_REF:0000044
  qualifier: located_in
  review:
    summary: FruB is a soluble PTS phosphotransfer protein and UniProt places it in the cytoplasm.
    action: ACCEPT
    reason: The UniProt subcellular-location statement and lack of membrane-spanning transporter domains support cytoplasmic localization.
    supported_by:
    - reference_id: file:PSEPK/fruB/fruB-uniprot.txt
      supporting_text: 'CC   -!- SUBCELLULAR LOCATION: Cytoplasm {ECO:0000256|ARBA:ARBA00004496}.'
- term:
    id: GO:0008965
    label: phosphoenolpyruvate-protein phosphotransferase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: This is the best available molecular-function term for the FruB PEP-dependent PTS phosphorelay activity.
    action: ACCEPT
    reason: UniProt gives EC 2.7.3.9 and the Rhea reaction transferring phosphate from phosphoenolpyruvate to a histidyl protein acceptor.
    supported_by:
    - reference_id: file:PSEPK/fruB/fruB-uniprot.txt
      supporting_text: 'DE   RecName: Full=phosphoenolpyruvate--protein phosphotransferase {ECO:0000256|ARBA:ARBA00012232};'
    - reference_id: file:PSEPK/fruB/fruB-uniprot.txt
      supporting_text: 'DR   GO; GO:0008965; F:phosphoenolpyruvate-protein phosphotransferase activity; IEA:UniProtKB-EC.'
- term:
    id: GO:0009401
    label: phosphoenolpyruvate-dependent sugar phosphotransferase system
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: involved_in
  review:
    summary: FruB is part of the fructose PTS phosphorelay in the fruBKA operon.
    action: ACCEPT
    reason: UniProt assigns the PTS process, and the ppu00051 Falcon pathway review identified FruB as the missing phosphorelay component required with FruA for fructose PTS import.
    supported_by:
    - reference_id: file:PSEPK/fruB/fruB-uniprot.txt
      supporting_text: 'DR   GO; GO:0009401; P:phosphoenolpyruvate-dependent sugar phosphotransferase system; IEA:UniProtKB-KW.'
    - reference_id: file:projects/P_PUTIDA/deep-research/PSEPK__fructose_mannose_metabolism__ppu00051-deep-research-falcon.md
      supporting_text: 'FruB is encoded in the same fruBKA operon and must be added to the candidate gene list.'
- term:
    id: GO:0016301
    label: kinase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000104
  qualifier: enables
  review:
    summary: Kinase activity is a broad parent-like description of FruB phosphotransfer chemistry.
    action: MARK_AS_OVER_ANNOTATED
    reason: The specific phosphoenolpyruvate-protein phosphotransferase term GO:0008965 is more informative and should carry the functional signal.
- term:
    id: GO:0016740
    label: transferase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000104
  qualifier: enables
  review:
    summary: Generic transferase activity is true but less informative than the specific PTS phosphotransferase activity.
    action: MARK_AS_OVER_ANNOTATED
    reason: GO:0008965 captures the actual PEP-dependent protein phosphotransferase reaction.
- term:
    id: GO:0016772
    label: transferase activity, transferring phosphorus-containing groups
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: This broad phosphorus-transfer term is compatible with FruB but redundant.
    action: MARK_AS_OVER_ANNOTATED
    reason: The substrate- and acceptor-resolved phosphotransferase term GO:0008965 should be used instead of this generic parent term.
