suggested_questions:
- question: Is FruB dedicated to the fructose PTS under all KT2440 growth conditions, or does it have measurable phosphorelay interactions with other PTS components?
suggested_experiments:
- description: Compare fructose uptake, fructose-1-phosphate accumulation, and growth on fructose in wild type, fruB, fruA, and complemented strains.
  experiment_type: growth and metabolite phenotype
- description: Reconstitute FruB/FruA phosphotransfer in vitro with phosphoenolpyruvate and monitor phosphorylated protein intermediates.
  experiment_type: biochemical phosphotransfer assay
