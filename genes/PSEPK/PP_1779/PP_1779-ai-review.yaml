description: PP_1779 encodes a predicted ATP-binding energy-coupling subunit of a PP_1778-PP_1779 envelope polysaccharide/LPS ABC export candidate. The protein has ABC ATP-binding and Wzt/TagH-like bacterial polysaccharide export domains, and the source protein name specifies a lipopolysaccharide ABC export system. The exact exported substrate should be treated as a candidate LPS, O-antigen, capsule, or related envelope-polysaccharide substrate until experimentally resolved.
