taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: atoC encodes a predicted two-component response-regulator transcriptional activator in the
  Pseudomonas putida KT2440 flagellar regulatory region. The protein combines a receiver domain, sigma-54-interaction/AAA+
  ATPase module, and Fis-family helix-turn-helix DNA-binding domain, supporting a conserved role as a
  phosphorylation-responsive regulator of transcription rather than a structural flagellar apparatus component.
