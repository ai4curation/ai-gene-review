proposed_new_terms: []
suggested_questions:
- question: Is PP_4371/atoC the KT2440 FleR-like response regulator for a specific flagellar sigma-54
    promoter tier, or does it regulate a different local target set?
- question: What sensor kinase phosphorylates AtoC in KT2440, and under which motility or surface-growth
    conditions is this regulator active?
suggested_experiments:
- description: Construct an atoC deletion and test swimming motility, flagellar gene expression, and complementation
    under low- and high-c-di-GMP conditions.
- description: Map AtoC-bound promoters by ChIP-seq or targeted EMSA and test phosphorylation-dependent
    activation of candidate sigma-54 promoters in reporter assays.
