  review:
    summary: Generic catalytic activity is true but uninformative for LipA.
    action: MARK_AS_OVER_ANNOTATED
    reason: The specific lipoate synthase activity captures LipA's evolved function,
      making the broad catalytic parent redundant.
    supported_by:
