id: Q88DM5
gene_symbol: lipA
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: lipA encodes lipoyl synthase in Pseudomonas putida KT2440, a radical
  SAM enzyme that inserts sulfur atoms into octanoylated lipoyl-domain lysine residues
  to form the mature protein-bound lipoyl cofactor. It is the second committed step
  of endogenous protein lipoylation after LipB-dependent octanoyl transfer.
