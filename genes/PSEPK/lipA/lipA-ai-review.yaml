  review:
    summary: Generic catalytic activity is true but uninformative for LipA.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      The specific lipoate synthase term captures the evolved activity, making
      this broad catalytic parent redundant.
    supported_by:
    - reference_id: file:PSEPK/lipA/lipA-goa.tsv
