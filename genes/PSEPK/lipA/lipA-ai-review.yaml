suggested_questions:
- question: >-
    Should protein-bound sulfur insertion by LipA remain annotated to the
    broader lipoate biosynthetic process, or only to protein lipoylation?
suggested_experiments:
- description: >-
    Reconstitute Q88DM5 with defined Pseudomonas putida octanoylated GcvH and
    E2 lipoyl domains to confirm sulfur insertion and client range directly.
- description: >-
    Delete lipA and quantify lipoylation and activity of the major
    lipoate-dependent complexes, with native-gene complementation.
