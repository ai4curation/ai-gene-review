id: Q88DM5
gene_symbol: lipA
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: >-
  lipA encodes a radical-SAM lipoyl synthase that inserts sulfur atoms at the
  C6 and C8 positions of octanoyl groups already attached to lipoyl-domain
  lysine residues. This second step of endogenous protein lipoylation converts
  octanoylated domains into the mature protein-bound lipoyl cofactor used by
  lipoate-dependent enzyme complexes.
