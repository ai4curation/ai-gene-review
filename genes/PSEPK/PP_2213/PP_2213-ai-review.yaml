description: PP_2213 encodes an AMP-forming acyl-CoA synthetase family enzyme. The domain architecture supports adenylate-forming activation of a carboxylate substrate followed by thioester formation with coenzyme A. The exact in vivo acyl substrate is not resolved from the current record, so the review treats fatty acid/acyl-CoA ligase annotations as plausible but not pathway-defining for ED/gluconeogenesis.
