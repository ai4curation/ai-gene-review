id: Q88FS8
gene_symbol: ftsK
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: >-
  ftsK encodes DNA translocase FtsK, an inner-membrane cell-division protein
  that couples septation with chromosome segregation. The N-terminal membrane
  region localizes FtsK to the division septum, while the cytoplasmic
  C-terminal FtsK motor binds and translocates double-stranded DNA using ATP.
  This DNA motor directs chromosome arms toward the dif region and interacts
  with the XerC-XerD recombinase system to promote chromosome dimer resolution
  before daughter-cell separation.
