id: Q88HE1
gene_symbol: PP_3419
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: PP_3419 encodes a predicted sigma-54-dependent transcriptional regulator with a CheY-like
  receiver domain, AAA+ ATPase module, and HTH/Fis DNA-binding output in Pseudomonas putida KT2440. The
  domain architecture supports phosphorelay-modulated transcriptional regulation, but the upstream sensor
  and target regulon are unresolved.
