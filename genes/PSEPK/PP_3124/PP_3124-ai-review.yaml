description: PP_3124 encodes a predicted short-chain fatty-acid transporter in Pseudomonas putida KT2440.
  Its AtoE/SCFA transporter family domain and multiple transmembrane segments support a plasma-membrane
  monocarboxylate or carboxylate transport role, retained here as a transport side node.
