    id: GO:0016491
    label: oxidoreductase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: Broad oxidoreductase activity is supported but should be refined to the more specific UniProt DR term for
      this OYE-family enzyme.
    action: MODIFY
    reason: The GOA TSV supplies only the broad oxidoreductase parent, while the UniProt flat file carries the more
      specific CH-CH donor/NAD(P) acceptor oxidoreductase term for this NADH:flavin oxidoreductase family protein.
    proposed_replacement_terms:
    - id: GO:0016628
      label: oxidoreductase activity, acting on the CH-CH group of donors, NAD or NADP as acceptor
