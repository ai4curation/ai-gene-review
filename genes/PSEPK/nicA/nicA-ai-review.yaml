status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: 'nicA encodes the small subunit of NicAB nicotinate dehydrogenase, the two-component
  enzyme that catalyzes the first step of aerobic nicotinate degradation in P. putida KT2440:
  hydroxylation of nicotinate to 6-hydroxynicotinate. NicA contributes iron-sulfur electron-transfer
  cofactors within the NicAB oxidoreductase complex.'
