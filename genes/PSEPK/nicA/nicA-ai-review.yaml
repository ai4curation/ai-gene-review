suggested_questions:
- question: Should NicA annotations consistently use a contributes_to qualifier for the NicAB
    nicotinate dehydrogenase reaction rather than implying that the small Fe-S subunit alone
    enables the complete oxidoreductase activity?
  experts:
  - GO annotation and bacterial nicotinate catabolism curators
suggested_experiments:
- description: Purify NicA, NicB, and reconstituted NicAB to compare Fe-S binding, electron
    transfer, and nicotinate hydroxylation activity in the isolated subunits versus the
    assembled enzyme.
  experiment_type: in vitro enzyme reconstitution
