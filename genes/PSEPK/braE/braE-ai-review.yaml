description: braE (PP_4865) encodes a predicted multi-pass inner-membrane permease component of the PP_4863-PP_4867 Bra/Liv high-affinity branched-chain amino-acid ABC uptake system. Its LivM-like binding-protein-dependent transporter domains support a channel role in branched-chain amino-acid import.
