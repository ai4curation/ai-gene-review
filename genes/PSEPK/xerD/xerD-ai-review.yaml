id: Q88MV0
gene_symbol: xerD
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: >-
  xerD encodes the XerD subunit of the bacterial XerC-XerD tyrosine
  recombinase system. XerD is a cytoplasmic site-specific DNA recombinase that
  cuts and rejoins DNA at recombination sites with XerC, resolving bacterial
  chromosome dimers into monomers so chromosomes can segregate before cell
  division. The protein belongs to the phage integrase-related tyrosine
  recombinase family, but its curated bacterial role is chromosome dimer
  resolution rather than a general transposition or integration function.
