suggested_questions:
- question: Does Gcd have substrate specificity beyond glucose, or can it oxidize other
    aldose sugars in P. putida?
- question: What is the stoichiometry of PQQ binding and is it covalently or non-covalently
    attached in the P. putida enzyme?
- question: How does the interplay between GDH activity and the glucokinase pathway
    regulate carbon flux distribution under different environmental conditions?
suggested_experiments:
- description: Purification of recombinant P. putida Gcd and kinetic characterization
    with various sugar substrates to determine substrate specificity
- description: Crystallography of P. putida Gcd to determine detailed PQQ binding
    site architecture and membrane anchor organization
- description: Metabolic flux analysis comparing wild-type and gcd mutant strains
    under varying phosphate and glucose conditions to quantify contribution to
    phosphate solubilization
