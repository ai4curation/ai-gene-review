id: Q88MX4
gene_symbol: gcd
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: Membrane-bound quinoprotein glucose dehydrogenase (mGDH, EC 1.1.5.2)
  that catalyzes the periplasmic oxidation of D-glucose to D-glucono-1,5-lactone using
  pyrroloquinoline quinone (PQQ) as a tightly bound redox cofactor. The enzyme is anchored
  in the inner (plasma) membrane by 5 N-terminal transmembrane helices, with a large
  C-terminal PQQ beta-propeller catalytic domain exposed to the periplasm. Electrons
  from glucose oxidation are transferred to ubiquinone in the membrane respiratory chain.
  Gcd initiates two of three convergent peripheral glucose catabolic pathways in P. putida,
  the direct gluconate pathway and the 2-ketogluconate loop, both converging at 6-phosphogluconate
  which feeds into the Entner-Doudoroff pathway. Approximately 50% of glucose flux passes
  through the 2-ketogluconate loop. Gluconic acid produced by Gcd also solubilizes mineral
  phosphates, a key rhizosphere function.
existing_annotations:
- term:
    id: GO:0008876
    label: quinoprotein glucose dehydrogenase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  review:
    summary: This is the correct specific molecular function term for Gcd. The enzyme
      catalyzes D-glucose oxidation to D-glucono-1,5-lactone using PQQ as cofactor
      (EC 1.1.5.2). UniProt assigns EC 1.1.5.2 which maps directly to this GO term.
      The CDD domain assignment (cd10280, PQQ_mGDH) and PANTHER subfamily classification
      (PTHR32303:SF4, Quinoprotein Glucose Dehydrogenase) both confirm this is a membrane-bound
      glucose dehydrogenase. Enzyme activity has been directly measured in P. putida
      KT2440 cell extracts (PMID:27287323).
    action: ACCEPT
    reason: This is the core molecular function of Gcd. The term precisely matches the
      enzyme classification (EC 1.1.5.2), domain architecture (PQQ_mGDH), and experimentally
      measured activity. The IEA evidence from GO_REF:0000120 is well-supported by
      literature evidence.
    supported_by:
    - reference_id: PMID:27287323
      supporting_text: GDH specific activity and PQQ levels vary according to growth
        condition, with the highest levels of both occurring when glucose is used as
        the sole carbon source and under conditions of low soluble phosphate
    - reference_id: file:PSEPK/gcd/gcd-notes.md
      supporting_text: Catalyzes oxidation of D-glucose to D-glucono-1,5-lactone (spontaneously
        converts to gluconate) in the periplasm
- term:
    id: GO:0016020
    label: membrane
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: This annotation is correct but too vague. GO:0016020 (membrane) does not
      distinguish which membrane the protein is associated with, nor its topology.
      Gcd is an integral component of the plasma membrane (inner membrane in gram-negative
      bacteria), anchored by 5 transmembrane helices (aa 12-35, 41-59, 66-82, 88-109,
      121-142 per Phobius prediction in UniProt). The catalytic PQQ domain is exposed
      to the periplasm. GO:0005887 (integral component of plasma membrane) would be
      the most accurate and informative CC term.
    action: MODIFY
    reason: The generic membrane term fails to capture that Gcd is specifically an
      integral inner membrane protein with multiple transmembrane helices. UniProt
      features show 5 predicted TM helices and the protein is classified as a membrane-bound
      PQQ dehydrogenase (IPR017511, PQQ_mDH). GO:0005887 captures both the specific
      membrane identity and the integral nature of the association.
    proposed_replacement_terms:
    - id: GO:0005887
      label: integral component of plasma membrane
    supported_by:
    - reference_id: PMID:27287323
      supporting_text: produced from glucose by a periplasmic glucose dehydrogenase
        (GDH) that requires pyrroloquinoline quinone (PQQ) as a redox coenzyme
    - reference_id: file:PSEPK/gcd/gcd-notes.md
      supporting_text: Membrane-bound with 5 predicted transmembrane helices (aa 12-142)
- term:
    id: GO:0016614
    label: oxidoreductase activity, acting on CH-OH group of donors
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: This is a parent term of the more specific GO:0008876 (quinoprotein glucose
      dehydrogenase activity). The annotation is technically correct since Gcd does
      oxidize the CH-OH group of glucose, but the more specific term is already present.
      Retaining this broader term is acceptable since InterPro (IPR017511) maps to it,
      but it adds no information beyond what GO:0008876 already provides.
    action: KEEP_AS_NON_CORE
    reason: Redundant with the more specific GO:0008876 already annotated. The InterPro2GO
      mapping from IPR017511 generates this term automatically. While not wrong, the
      specific term GO:0008876 is more informative and already present.
    supported_by:
    - reference_id: PMID:27287323
      supporting_text: produced from glucose by a periplasmic glucose dehydrogenase
        (GDH) that requires pyrroloquinoline quinone (PQQ) as a redox coenzyme
- term:
    id: GO:0048038
    label: quinone binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: This annotation captures the PQQ cofactor binding but at insufficient
      specificity. GO:0048038 (quinone binding) is a broad term covering binding to
      any quinone. Gcd specifically binds pyrroloquinoline quinone (PQQ) as its tightly
      bound redox cofactor. UniProt explicitly lists PQQ (ChEBI:CHEBI:58442) as cofactor.
      The more specific term GO:0070968 (pyrroloquinoline quinone binding) exists and
      precisely describes this function. The PQQ beta-propeller domain (Pfam PF01011,
      SMART SM00564) is the defining structural feature of the protein.
    action: MODIFY
    reason: GO:0070968 (pyrroloquinoline quinone binding) is a more specific and accurate
      child term of GO:0048038 that precisely describes the cofactor binding of Gcd.
      UniProt annotates PQQ as cofactor, the protein belongs to the bacterial PQQ
      dehydrogenase family, and the PQQ repeat domain is the primary structural feature.
    proposed_replacement_terms:
    - id: GO:0070968
      label: pyrroloquinoline quinone binding
    supported_by:
    - reference_id: PMID:27287323
      supporting_text: requires pyrroloquinoline quinone (PQQ) as a redox coenzyme
    - reference_id: file:PSEPK/gcd/gcd-notes.md
      supporting_text: Uses PQQ (pyrroloquinoline quinone) as a tightly-bound redox
        cofactor (Km for PQQ <0.1 uM)
- term:
    id: GO:0006007
    label: glucose catabolic process
  evidence_type: IEA
  review:
    summary: Gcd initiates two of three convergent peripheral glucose catabolic pathways
      in P. putida KT2440 (PMID:17483213). The direct gluconate pathway and the
      2-ketogluconate loop both begin with periplasmic glucose oxidation by Gcd.
      Metabolic flux analysis shows approximately 50% of glucose is channeled through
      the 2-ketogluconate loop (PMID:20581202). A gcd mutant loses periplasmic glucose
      oxidation entirely and has significant growth defects on glucose. This is a core
      biological process for this enzyme.
    action: NEW
    reason: No biological process term is currently annotated for Gcd despite its
      well-characterized central role in glucose catabolism. This term captures the
      primary biological process in which Gcd participates.
    supported_by:
    - reference_id: PMID:17483213
      supporting_text: glucose catabolism in Pseudomonas putida occurs through the
        simultaneous operation of three pathways that converge at the level of
        6-phosphogluconate
    - reference_id: PMID:20581202
      supporting_text: about 50% of glucose taken up by the cells is channeled through
        the 2-ketogluconate peripheral pathway
    - reference_id: PMID:27287323
      supporting_text: produced from glucose by a periplasmic glucose dehydrogenase
        (GDH)
    - reference_id: file:PSEPK/gcd/gcd-deep-research-falcon.md
      supporting_text: Under aerobic growth conditions, approximately 90% of glucose
        entering the periplasm is oxidized to gluconate by Gcd; gcd deletion completely
        ablates gluconate and 2-ketogluconate formation
- term:
    id: GO:0042597
    label: periplasmic space
  evidence_type: IEA
  review:
    summary: The large C-terminal catalytic domain (PQQ beta-propeller, aa 171-778)
      of Gcd is exposed to the periplasmic space where it oxidizes glucose. While the
      protein is anchored in the inner membrane via 5 TM helices, the catalytic domain
      that performs the enzymatic reaction faces the periplasm. This is where glucose
      is converted to glucono-1,5-lactone. The periplasmic localization of the catalytic
      activity is a defining characteristic of the membrane-bound GDH (mGDH) class.
    action: NEW
    reason: The catalytic domain of Gcd faces the periplasm and this is where the
      enzymatic reaction occurs. This CC annotation complements GO:0005887 (integral
      component of plasma membrane) by capturing where the functional domain operates.
    supported_by:
    - reference_id: PMID:27287323
      supporting_text: produced from glucose by a periplasmic glucose dehydrogenase
        (GDH)
    - reference_id: PMID:20581202
      supporting_text: initial metabolism of glucose to 2-ketogluconate takes place
        in the periplasm through a set of reactions catalyzed by glucose dehydrogenase
    - reference_id: file:PSEPK/gcd/gcd-notes.md
      supporting_text: Large periplasmic PQQ beta-propeller domain (aa 171-778)
- term:
    id: GO:0070968
    label: pyrroloquinoline quinone binding
  evidence_type: IEA
  review:
    summary: Gcd requires PQQ as its tightly bound redox cofactor. UniProt annotates
      PQQ (ChEBI:CHEBI:58442) as cofactor. The PQQ repeat domain (Pfam PF01011,
      SMART SM00564) constitutes the major structural feature of the catalytic domain.
      PQQ availability is the limiting factor for Gcd activity under optimal growth
      conditions (PMID:27287323).
    action: NEW
    reason: While GO:0048038 (quinone binding) is already annotated, this more specific
      term should be added as a separate annotation capturing the precise cofactor
      identity. This is proposed as a replacement for GO:0048038 but also warrants
      its own independent annotation.
    supported_by:
    - reference_id: PMID:27287323
      supporting_text: requires pyrroloquinoline quinone (PQQ) as a redox coenzyme
    - reference_id: file:PSEPK/gcd/gcd-notes.md
      supporting_text: Uses PQQ (pyrroloquinoline quinone) as a tightly-bound redox
        cofactor (Km for PQQ <0.1 uM)
- term:
    id: GO:0005886
    label: plasma membrane
  evidence_type: IEA
  review:
    summary: Gcd is a membrane-bound protein with 5 transmembrane helices anchoring
      it in the inner (plasma) membrane of the gram-negative bacterium. UniProt
      features confirm 5 TM helices (Phobius), and the protein is classified under
      PANTHER as membrane-bound quinoprotein dehydrogenase. This term is the parent
      of the more specific GO:0005887 proposed above.
    action: NEW
    reason: This CC term captures the membrane localization at the plasma membrane
      level. While GO:0005887 (integral component of plasma membrane) is proposed
      as a replacement for GO:0016020, this slightly broader term is also appropriate
      and commonly used for bacterial inner membrane proteins.
    supported_by:
    - reference_id: file:PSEPK/gcd/gcd-notes.md
      supporting_text: Membrane-bound with 5 predicted transmembrane helices (aa 12-142)
    - reference_id: PMID:27287323
      supporting_text: produced from glucose by a periplasmic glucose dehydrogenase
        (GDH)
