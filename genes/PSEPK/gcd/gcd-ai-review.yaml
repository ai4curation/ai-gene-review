- id: PMID:27287323
  title: Regulation of Pyrroloquinoline Quinone-Dependent Glucose Dehydrogenase Activity
    in the Model Rhizosphere-Dwelling Bacterium Pseudomonas putida KT2440
  findings:
  - statement: GDH activity requires PQQ as redox coenzyme and is regulated by growth
      conditions
    supporting_text: GDH specific activity and PQQ levels vary according to growth
      condition, with the highest levels of both occurring when glucose is used as
      the sole carbon source and under conditions of low soluble phosphate
    reference_section_type: ABSTRACT
  - statement: Gcd produces gluconic acid that solubilizes mineral phosphates
    supporting_text: Soil-dwelling microbes solubilize mineral phosphates by secreting
      gluconic acid, which is produced from glucose by a periplasmic glucose dehydrogenase
      (GDH) that requires pyrroloquinoline quinone (PQQ) as a redox coenzyme
    reference_section_type: ABSTRACT
  - statement: PQQ levels limit phosphate solubilization activity
    supporting_text: Under these conditions, however, PQQ levels limit in vitro phosphate
      solubilization
    reference_section_type: ABSTRACT
- id: PMID:17483213
  title: Convergent peripheral pathways catalyze initial glucose catabolism in Pseudomonas
    putida
  findings:
  - statement: Three convergent glucose catabolic pathways operate simultaneously in
      P. putida
    supporting_text: glucose catabolism in Pseudomonas putida occurs through the simultaneous
      operation of three pathways that converge at the level of 6-phosphogluconate,
      which is metabolized by the Edd and Eda Entner/Doudoroff enzymes to central
      metabolites
    reference_section_type: ABSTRACT
  - statement: Gcd oxidizes glucose to gluconate in the periplasm
    supporting_text: When glucose enters the periplasmic space through specific OprB
      porins, it can either be internalized into the cytoplasm or be oxidized to gluconate
    reference_section_type: ABSTRACT
- id: PMID:20581202
  title: Compartmentalized glucose metabolism in Pseudomonas putida is controlled by
    the PtxS repressor
  findings:
  - statement: About 50% of glucose flux goes through the 2-ketogluconate loop initiated
      by Gcd
    supporting_text: about 50% of glucose taken up by the cells is channeled through
      the 2-ketogluconate peripheral pathway
    reference_section_type: ABSTRACT
  - statement: Gcd catalyzes the first periplasmic step in the 2-ketogluconate pathway
    supporting_text: initial metabolism of glucose to 2-ketogluconate takes place in
      the periplasm through a set of reactions catalyzed by glucose dehydrogenase and
      gluconate dehydrogenase
    reference_section_type: ABSTRACT
- id: PMID:23392768
  title: Influence of periplasmic oxidation of glucose on pyoverdine synthesis in Pseudomonas
    putida S11
  findings:
  - statement: gcd mutants show increased pyoverdine production due to loss of gluconic
      acid-mediated pH drop
    supporting_text: mutants of P. putida S11 with loss of glucose dehydrogenase gene
      (gcd) or cofactor pyrroloquinoline quinone biosynthesis gene (pqqF) showed increased
      pyoverdine synthesis and impaired acid production
    reference_section_type: ABSTRACT
  - statement: Periplasmic glucose oxidation by Gcd produces gluconic acid that lowers
      medium pH
    supporting_text: periplasmic oxidation of glucose to gluconic acid decreases the
      pH of MGM and thereby influences pyoverdine synthesis
    reference_section_type: ABSTRACT
