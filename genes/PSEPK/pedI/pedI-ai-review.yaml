suggested_questions:
- question: Is phenylacetaldehyde the dominant in vivo substrate of PedI in KT2440,
    or is PedI physiologically broader and shared with the ethylene glycol response?
- question: How is substrate partitioning between PedI and the second induced aldehyde
    dehydrogenase PP_0545 controlled during ethylene glycol oxidation?
suggested_experiments:
- description: Purify PedI and determine steady-state kinetics with phenylacetaldehyde,
    glycolaldehyde, acetaldehyde, and related Ped-pathway aldehydes using NAD+ and
    NADP+.
- description: Compare wild type, delta-pedI, delta-PP_0545, and double-mutant strains
    in growth or resting-cell bioconversions on 2-phenylethanol and ethylene glycol
    to separate substrate-specific roles.
