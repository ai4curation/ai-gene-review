taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: PedI is the KT2440 Ped-pathway aldehyde dehydrogenase encoded by PP_2680
  (UniProt Q88JG9), currently labeled aldB-II in UniProt. Comparative analysis of
  the KT2440 alcohol-oxidation region showed that PP_2680 is 97% identical to PedI
  from Pseudomonas putida U and 88% identical to Pseudomonas aeruginosa ExaC, and
  the KT2440 authors explicitly adopted Ped nomenclature for the homologous PP_2664-PP_2680
  cluster. PedI is therefore best interpreted as the aldehyde dehydrogenase step of
  the Ped alcohol oxidation system, likely oxidizing phenylacetaldehyde in 2-phenylethanol
  catabolism and participating more broadly in aldehyde oxidation during alcohol-derived
  carbon metabolism, including the ethylene glycol response described in KT2440.
existing_annotations:
- term:
    id: GO:0004029
    label: aldehyde dehydrogenase (NAD+) activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000003
  review:
    summary: The generic NAD+-dependent aldehyde dehydrogenase annotation is directionally
      correct, but the KT2440 literature supports a more specific PedI/ExaC-like function.
      PP_2680 was explicitly renamed PedI in KT2440 because it is nearly identical
      to P. putida U PedI and strongly similar to P. aeruginosa ExaC, both pathway
      aldehyde dehydrogenases downstream of alcohol oxidation.
    action: MODIFY
    reason: The broad EC-derived term underspecifies the likely physiological substrate.
      KT2440 PP_2680 is 97% identical to PedI from P. putida U, whose Ped pathway
      oxidizes 2-phenylethanol to phenylacetic acid via phenylacetaldehyde, and 88%
      identical to ExaC from the homologous ethanol oxidation pathway in P. aeruginosa.
      A more specific MF term better matches the conserved pathway role.
    proposed_replacement_terms:
    - id: GO:0008957
      label: phenylacetaldehyde dehydrogenase (NAD+) activity
    supported_by:
    - reference_id: file:PSEPK/pedI/pedI-notes.md
      supporting_text: PP_2680/Q88JG9 is annotated in UniProt as `aldB-II`, but the
        KT2440 ethylene glycol study explicitly maps this locus to PedI
      reference_section_type: LITERATURE_REVIEW
    - reference_id: file:PSEPK/pedI/pedI-deep-research-falcon.md
      supporting_text: pedI (PP_2680) encodes the aldehyde dehydrogenase AldB‑II
        (UniProt Q88JG9) in *P. putida* KT2440.
      reference_section_type: LITERATURE_REVIEW
    - reference_id: PMID:18177365
      supporting_text: for its oxidation to phenylacetic acid via phenylacetaldehyde.
      reference_section_type: ABSTRACT
    - reference_id: PMID:23023748
      supporting_text: In addition to the upregulation of proteins involved in the
        degradation of glyoxylic acid, our proteome analysis of ethylene glycol-induced
        cells of KT2440 and JM37 revealed the upregulation of the two PQQ-dependent
        ADHs PedE and PedH, as well as that of the NADH-dependent ALDHs PedI and
        PP_0545.
      reference_section_type: DISCUSSION
- term:
    id: GO:0004030
    label: aldehyde dehydrogenase [NAD(P)+] activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000117
  review:
    summary: This term is broadly compatible with PedI biochemistry, but it is less
      informative than either the NAD+-specific parent GO:0004029 or the pathway-specific
      phenylacetaldehyde dehydrogenase activity supported by conserved PedI/ExaC orthology.
    action: MARK_AS_OVER_ANNOTATED
    reason: The annotation is too broad for the available evidence. The curated view
      is that PP_2680 is a PedI ortholog with a specific role in aldehyde oxidation
      downstream of alcohol oxidation pathways, not just any NAD(P)-dependent aldehyde
      dehydrogenase.
    supported_by:
    - reference_id: file:PSEPK/pedI/pedI-notes.md
      supporting_text: PP_2680/Q88JG9 is annotated in UniProt as `aldB-II`, but the
        KT2440 ethylene glycol study explicitly maps this locus to PedI
      reference_section_type: LITERATURE_REVIEW
- term:
    id: GO:0016491
    label: oxidoreductase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: This high-level parent term is technically true but adds no useful biological
      information once aldehyde dehydrogenase activity is already present.
    action: MARK_AS_OVER_ANNOTATED
    reason: Generic redox activity is redundant here and obscures the more informative
      substrate-level aldehyde dehydrogenase function.
- term:
    id: GO:0046185
    label: aldehyde catabolic process
  evidence_type: ISS
  review:
    summary: PedI is part of conserved aldehyde oxidation modules linked to alcohol
      catabolism. In P. putida U, the Ped pathway uses an aldehyde dehydrogenase to
      oxidize phenylacetaldehyde on the route from 2-phenylethanol to phenylacetic
      acid, and in KT2440 PedI is induced in the ethylene glycol response where PedI
      and PP_0545 are proposed to oxidize aldehyde intermediates toward glyoxylate.
    action: NEW
    reason: A process-level term should capture PedI's likely biological role in catabolism
      of aldehyde intermediates generated by the Ped alcohol oxidation system. This
      is broader and safer than asserting every proposed aldehyde substrate as a direct,
      experimentally demonstrated PedI substrate in KT2440.
    supported_by:
    - reference_id: PMID:18177365
      supporting_text: for its oxidation to phenylacetic acid via phenylacetaldehyde.
      reference_section_type: ABSTRACT
    - reference_id: PMID:23023748
      supporting_text: In KT2440, this pathway is initiated by the PQQ-dependent ADHs
        PedE and PedH and the ALDHs PedI and PP_0545 producing glyoxylic acid via
        the intermediates glycolaldehyde and glycolic acid
      reference_section_type: DISCUSSION
