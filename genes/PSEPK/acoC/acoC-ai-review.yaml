description: acoC (PP_0553) encodes a lipoyl-domain acetyltransferase component annotated for the acetoin-cleaving system. It is an E2-like enzyme predicted to transfer acyl groups from a reduced lipoyllysine carrier to coenzyme A within a 2-oxoacid/acetoin dehydrogenase-type multienzyme system. This chemistry is adjacent to pyruvate metabolism but is not a core Entner-Doudoroff or gluconeogenic reaction.
