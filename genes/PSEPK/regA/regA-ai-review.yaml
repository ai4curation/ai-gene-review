  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: regA encodes a predicted HTH/Fis-family DNA-binding response regulator in Pseudomonas putida
  KT2440. The product name derives from RegA-like regulators, but in this non-photosynthetic bacterium
  the supported first-pass assignment is generic phosphorelay-dependent transcription regulation by a
  receiver-domain regulator.
