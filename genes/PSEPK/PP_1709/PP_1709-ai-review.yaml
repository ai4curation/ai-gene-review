- question: What is the physiological substrate of PP_1709, and is acetylpyruvate hydrolase activity separable from the hmgB fumarylacetoacetase role in the homogentisate pathway?
suggested_experiments:
- description: Assay purified PP_1709 against acetylpyruvate, fumarylacetoacetate, and related FAH-family substrates, and compare PP_1709 and hmgB deletion phenotypes on aromatic amino-acid substrates.
