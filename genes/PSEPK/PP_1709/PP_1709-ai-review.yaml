  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: PP_1709 encodes a fumarylacetoacetase-like hydratase/decarboxylase-family protein. Current automated annotation predicts acetylpyruvate hydrolase activity, but the P. putida homogentisate terminal fumarylacetoacetase step is assigned to hmgB, so PP_1709 is treated as a KEGG ppu00350 boundary FAH-family hydrolase rather than a committed tyrosine-catabolism enzyme.
