  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: PP_4332 encodes a predicted CheW-family chemotaxis protein in Pseudomonas putida
  KT2440. The protein is a small soluble CheW-like domain protein in the core PP_4332-PP_4340
  chemosensory cluster. Its likely role is as an adaptor/scaffold component of the bacterial
  chemotaxis signaling array, linking receptor input to CheA-mediated phosphorelay signaling
  rather than acting as an enzyme.
