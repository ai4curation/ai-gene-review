core_functions:
- description: PP_4332 is a CheW-family chemotaxis adaptor/scaffold candidate in the PP_4332-PP_4340
    Che cluster. Its first-pass core role is participation in bacterial chemotaxis signaling,
    likely helping couple methyl-accepting chemotaxis receptors to the CheA/CheY phosphorelay.
