proposed_new_terms: []
suggested_questions:
- question: Does PP_4332 bind CheA and specific methyl-accepting chemotaxis receptors in the
    KT2440 core chemosensory array?
- question: Is PP_4332 functionally redundant with the adjacent CheW-domain protein PP_4333,
    or do the two adaptors support different receptor subsets?
suggested_experiments:
- description: Construct a PP_4332 deletion and assay swimming chemotaxis toward defined attractants
    and root-exudate mixtures.
- description: Test PP_4332 interaction with CheA and representative KT2440 MCPs using pull-down
    or bacterial two-hybrid assays.
