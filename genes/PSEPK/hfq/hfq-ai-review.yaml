id: Q88DD3
gene_symbol: hfq
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: |-
  Hfq is a conserved bacterial RNA-binding protein of the Sm/Lsm (Sm-like) family
  that assembles into a homohexameric ring and acts as a global RNA chaperone in
  post-transcriptional gene regulation. It uses distinct RNA-binding surfaces
  (proximal, distal, and rim faces, plus a basic C-terminal region) to bind small
  regulatory RNAs (sRNAs) and mRNAs, accelerating sRNA-mRNA base pairing
  (matchmaking), remodeling RNA structure, protecting sRNAs from degradation, and
  modulating mRNA translation and stability. In Pseudomonas putida KT2440, Hfq is a
  central effector of carbon catabolite repression; together with the co-repressor
  Crc it binds A-rich catabolite-activity motifs near ribosome-binding sites to
  repress translation of catabolic mRNAs, and this repression is antagonized by the
  decoy sRNAs CrcZ and CrcY, which sequester Hfq/Crc. Hfq also contributes to the
  stability and processing of CrcZ. The protein acts in the cytoplasm.
existing_annotations:
- term:
    id: GO:0003723
    label: RNA binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: RNA binding is the defining and well-established molecular function of
      Hfq, supported by its Sm/Lsm domain and extensive literature on sRNA/mRNA binding
      in Pseudomonas and other bacteria.
    action: ACCEPT
    reason: Hfq is a canonical RNA-binding protein; this IEA term is correct and represents
      a core molecular function. A more specific child term (e.g. sRNA binding) could
      be added but the general term is accurate and should be retained.
- term:
    id: GO:0005829
    label: cytosol
  evidence_type: IEA
  original_reference_id: GO_REF:0000118
  qualifier: located_in
  review:
    summary: Hfq acts on cytoplasmic sRNAs and mRNAs and is a soluble intracellular
      RNA chaperone, consistent with cytosolic localization.
    action: ACCEPT
    reason: Localization is inferred from function rather than KT2440-specific imaging,
      but cytosolic localization is well established for Hfq across bacteria and is
      consistent with its post-transcriptional regulatory role.
- term:
    id: GO:0006355
    label: regulation of DNA-templated transcription
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: involved_in
  review:
    summary: Hfq is a post-transcriptional regulator acting on RNA, not a direct regulator
      of DNA-templated transcription. This InterPro2GO mapping mislocates Hfq's activity
      at the transcriptional level.
    action: MODIFY
    reason: Hfq does not bind DNA or directly regulate transcription initiation/elongation;
      its regulatory role is post-transcriptional (sRNA-mediated effects on translation
      and RNA stability). The more accurate term is ncRNA-mediated regulation of translation,
      which is already separately annotated. This generic transcription-regulation
      term is an over-broad/incorrect propagation and should be replaced.
    proposed_replacement_terms:
    - id: GO:0045974
      label: regulation of translation, ncRNA-mediated
- term:
    id: GO:0043487
    label: regulation of RNA stability
  evidence_type: IEA
  original_reference_id: GO_REF:0000118
  qualifier: involved_in
  review:
    summary: Hfq binds and stabilizes sRNAs (protecting them from nucleases) and also
      promotes targeted decay of mRNAs, directly influencing RNA stability. In KT2440,
      Hfq increases the stability of the CrcZ sRNA.
    action: ACCEPT
    reason: Regulation of RNA stability is a well-documented function of Hfq and is
      specifically supported in P. putida KT2440 (Hfq increases CrcZ stability).
- term:
    id: GO:0045974
    label: regulation of translation, ncRNA-mediated
  evidence_type: IEA
  original_reference_id: GO_REF:0000118
  qualifier: involved_in
  review:
    summary: Hfq mediates sRNA-dependent regulation of mRNA translation, the central
      function of the protein. In KT2440 this includes Crc/Hfq translational repression
      of catabolic mRNAs and its antagonism by the sRNAs CrcZ/CrcY.
    action: ACCEPT
    reason: This term precisely captures Hfq's core biological role as an sRNA-mediated
      post-transcriptional regulator of translation, strongly supported by Pseudomonas
      literature.
