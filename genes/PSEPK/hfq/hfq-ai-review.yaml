suggested_questions:
- Does P. putida KT2440 Hfq have direct experimental subcellular localization data
  (microscopy/fractionation) confirming cytosolic distribution?
- Beyond the CCR/Crc axis, which sRNA regulons (e.g. stress, iron, quorum sensing)
  does KT2440 Hfq control?
suggested_experiments:
- CLIP-seq or RIL-seq in P. putida KT2440 to define the genome-wide Hfq-bound sRNA
  and mRNA interactome
- Phenotypic and transcriptomic comparison of an hfq deletion mutant under carbon-source
  shifts and envelope/oxidative stress to map the Hfq regulon
