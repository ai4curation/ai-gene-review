id: Q88LI2
gene_symbol: PP_1950
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: 'PP_1950 encodes a cytochrome P450 monooxygenase. The heme/iron-dependent monooxygenase activity
  is clear from the P450 domain, but the physiological substrate and its connection to the KEGG benzoate
  map remain unresolved.'
existing_annotations:
- term:
    id: GO:0004497
    label: monooxygenase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: Monooxygenase activity is the best current molecular-function annotation for this P450
      enzyme.
    action: ACCEPT
    reason: The protein is a cytochrome P450 and no substrate-specific child term is yet supported.
- term:
    id: GO:0005506
    label: iron ion binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: Iron ion binding is consistent with the heme iron in cytochrome P450 enzymes.
    action: ACCEPT
    reason: This is a cofactor annotation rather than the core substrate-specific function.
- term:
    id: GO:0016705
    label: oxidoreductase activity, acting on paired donors, with incorporation or reduction of
      molecular oxygen
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: This oxidoreductase class term is mechanistically consistent but less informative than
      monooxygenase activity.
    action: KEEP_AS_NON_CORE
    reason: Retain as non-core because it describes the P450 reaction class broadly.
- term:
    id: GO:0020037
    label: heme binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: Heme binding is a defining cofactor feature of cytochrome P450 enzymes.
    action: ACCEPT
    reason: The P450 domain supports this annotation.
