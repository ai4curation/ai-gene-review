id: Q88P28
gene_symbol: leuA
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: >-
  LeuA is the magnesium-dependent 2-isopropylmalate synthase that condenses
  acetyl-CoA with 2-oxoisovalerate. This is the committed branch reaction that
  diverts the shared valine precursor into L-leucine biosynthesis.
existing_annotations:
- term:
    id: GO:0000287
    label: magnesium ion binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000104
  qualifier: enables
  review:
    summary: Magnesium binding is valid cofactor information but not the core reaction.
    action: KEEP_AS_NON_CORE
    reason: The reviewed UniProt record assigns Mg2+ to the LeuA reaction.
- term:
    id: GO:0003824
    label: catalytic activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: This generic term is redundant with 2-isopropylmalate synthase activity.
    action: MARK_AS_OVER_ANNOTATED
    reason: GO:0003852 identifies the actual LeuA reaction.
- term:
    id: GO:0003852
    label: 2-isopropylmalate synthase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: This is the specific LeuA catalytic function.
    action: ACCEPT
    reason: EC 2.3.3.13, HAMAP, and LeuA-specific family assignments agree.
    supported_by:
    - reference_id: file:PSEPK/leuA/leuA-uniprot.txt
      supporting_text: Full=2-isopropylmalate synthase
- term:
    id: GO:0003985
    label: acetyl-CoA C-acetyltransferase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000104
  qualifier: enables
  review:
    summary: This assigns thiolase chemistry that is not the LeuA reaction.
    action: REMOVE
    reason: >-
      LeuA condenses acetyl-CoA with 2-oxoisovalerate to form
      2-isopropylmalate; it does not condense two acetyl-CoA molecules to
      acetoacetyl-CoA. GO:0003852 is the correct specific term.
- term:
    id: GO:0005737
    label: cytoplasm
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: located_in
  review:
    summary: Cytoplasm is compatible with this soluble bacterial pathway enzyme.
    action: KEEP_AS_NON_CORE
    reason: UniProt predicts cytoplasmic localization, which is secondary to catalysis.
- term:
    id: GO:0009098
    label: L-leucine biosynthetic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: involved_in
  review:
    summary: LeuA catalyzes the first committed reaction of leucine synthesis.
    action: ACCEPT
    reason: UniProt places Q88P28 at step 1 of 4 in the leucine-specific branch.
- term:
    id: GO:0046912
    label: acyltransferase activity, acyl groups converted into alkyl on transfer
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: This chemistry-level parent is redundant with GO:0003852.
    action: MARK_AS_OVER_ANNOTATED
    reason: The substrate-specific LeuA term is more informative.
references:
- id: GO_REF:0000002
  title: Gene Ontology annotation through association of InterPro records with GO terms
  findings: []
- id: GO_REF:0000104
  title: Electronic Gene Ontology annotations created by transferring manual GO annotations between related proteins based on shared sequence features
  findings: []
- id: GO_REF:0000120
  title: Combined Automated Annotation using Multiple IEA Methods
  findings: []
- id: file:PSEPK/leuA/leuA-uniprot.txt
  title: UniProtKB entry for PSEPK LeuA
  findings:
  - statement: Assigns Q88P28 to EC 2.3.3.13 and leucine biosynthesis.
    supporting_text: Full=2-isopropylmalate synthase
- id: file:PSEPK/leuA/leuA-goa.tsv
  title: QuickGO annotation snapshot for PSEPK LeuA
  findings:
  - statement: Contains the seven existing annotations reviewed above.
core_functions:
- description: >-
    Condenses acetyl-CoA with 2-oxoisovalerate to form 2-isopropylmalate in the
    committed leucine-specific branch.
  molecular_function:
    id: GO:0003852
    label: 2-isopropylmalate synthase activity
  directly_involved_in:
  - id: GO:0009098
    label: L-leucine biosynthetic process
  supported_by:
  - reference_id: file:PSEPK/leuA/leuA-uniprot.txt
    supporting_text: Full=2-isopropylmalate synthase
