suggested_questions:
- question: What exact substrate, redox partner, and stress phenotype define the physiological function of PP_1927 in Pseudomonas
    putida KT2440 metal resistance?
suggested_experiments:
- description: Test purified PP_1927 where feasible and compare clean deletion/complemented strains under arsenate, arsenite,
    organoarsenical, and copper stress as appropriate for the gene family.
  experiment_type: targeted enzyme assay and metal-stress phenotyping
