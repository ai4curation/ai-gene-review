description: PP_1927 encodes an ArsH-family NADPH-dependent FMN reductase in Pseudomonas putida KT2440. The product and domain
  evidence support FMN reductase chemistry in arsenical-resistance operon context; this first pass does not assign a narrower
  organoarsenical substrate or detoxification reaction beyond the supported FMN reductase activity.
