taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: mpl encodes UDP-N-acetylmuramate--L-alanyl-gamma-D-glutamyl-meso-diaminoheptandioate
  ligase, an ATP-dependent MurCDEF-family Mpl enzyme in cell-wall precursor salvage.
  It reattaches the recycled L-Ala-gamma-D-Glu-meso-diaminopimelate tripeptide to
  UDP-N-acetylmuramate, returning peptidoglycan turnover products to UDP-MurNAc-peptide
  precursor metabolism.
