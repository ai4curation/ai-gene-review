      Mpl catalytic activity.
    action: KEEP_AS_NON_CORE
    reason: UniProt annotates ATP as a substrate/co-substrate in the EC 6.3.2.45 reaction and an ATP-binding
      feature in the Mur ligase central domain. Retain the binding term as non-core while using
      GO:0106418 for the actual molecular function.
