id: Q88DB2
gene_symbol: parE
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: parE (PP_4915) encodes DNA topoisomerase IV subunit B in Pseudomonas putida KT2440. Together with ParC it forms
  the type II Topo IV heterotetramer that uses ATP-dependent double-strand passage to relax supercoiled DNA and decatenate
  replicated circular chromosomes for segregation. ParE supplies the topoisomerase B-family ATPase/TOPRIM subunit of this
  complex.
