id: Q88I35
gene_symbol: catA-II
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: >-
  CatA-II (PP_3166, Q88I35) is a second catechol 1,2-dioxygenase paralog in
  Pseudomonas putida KT2440. It catalyzes Fe(III)-dependent intradiol
  ortho-cleavage of catechol to cis,cis-muconate, the first step of the
  catechol branch of the beta-ketoadipate pathway. Unlike the primary
  CatA-I/PP_3713 enzyme in the cat regulon, CatA-II is located downstream of
  the benABCD benzoate upper-pathway operon and is described in P. putida mt-2
  literature as a safety-valve paralog that helps relieve catechol surplus
  during benzoate-induced aromatic catabolism.
aliases:
  - PP_3166
  - catA2
existing_annotations:
  - term:
      id: GO:0003824
      label: catalytic activity
    evidence_type: IEA
    original_reference_id: GO_REF:0000002
    qualifier: enables
    review:
      summary: >-
        CatA-II is catalytic, but this top-level molecular-function term is too
        general for a gene product with a specific catechol 1,2-dioxygenase
        activity annotation.
      action: MODIFY
      reason: >-
        Replace the generic parent with GO:0018576, which captures the specific
        intradiol ring-cleavage reaction recorded in UniProt, GOA, EC, and Rhea.
      proposed_replacement_terms:
        - id: GO:0018576
          label: catechol 1,2-dioxygenase activity
      supported_by:
        - reference_id: file:PSEPK/catA-II/catA-II-uniprot.txt
          supporting_text: "RecName: Full=catechol 1,2-dioxygenase"
  - term:
      id: GO:0005506
      label: iron ion binding
    evidence_type: IEA
    original_reference_id: GO_REF:0000002
    qualifier: enables
    review:
      summary: >-
        Iron binding is true but less specific than the ferric iron binding term
        already present for CatA-II.
      action: MARK_AS_OVER_ANNOTATED
      reason: >-
        Intradiol catechol dioxygenases use non-heme Fe(III). GO:0008199
        captures that cofactor specificity, while GO:0005506 is a broad parent
        term.
      supported_by:
        - reference_id: file:PSEPK/catA-II/catA-II-uniprot.txt
          supporting_text: "Name=Fe(3+); Xref=ChEBI:CHEBI:29034;"
  - term:
      id: GO:0008199
      label: ferric iron binding
    evidence_type: IEA
    original_reference_id: GO_REF:0000002
    qualifier: enables
    review:
      summary: >-
        Ferric iron binding correctly captures the catalytic cofactor
        requirement of this intradiol catechol 1,2-dioxygenase.
      action: ACCEPT
      reason: >-
        The UniProt record explicitly lists Fe(3+) as the cofactor, consistent
        with the intradiol ring-cleavage dioxygenase family.
      supported_by:
        - reference_id: file:PSEPK/catA-II/catA-II-uniprot.txt
          supporting_text: "Name=Fe(3+); Xref=ChEBI:CHEBI:29034;"
  - term:
      id: GO:0009712
      label: catechol-containing compound metabolic process
    evidence_type: IEA
    original_reference_id: GO_REF:0000002
    qualifier: involved_in
    review:
      summary: >-
        The broad metabolic-process term is directionally correct but less
        precise than catechol catabolism by the ortho-cleavage branch.
      action: MODIFY
      reason: >-
        CatA-II performs the first catechol ortho-cleavage reaction. A
        catabolic child term is more appropriate than the generic parent.
      proposed_replacement_terms:
        - id: GO:0019615
          label: catechol catabolic process, ortho-cleavage
      supported_by:
        - reference_id: file:PSEPK/catA-II/catA-II-uniprot.txt
          supporting_text: "4,5-dihydro-2-furylacetate from catechol: step 1/3."
  - term:
      id: GO:0016702
      label: oxidoreductase activity, acting on single donors with incorporation of
        molecular oxygen, incorporation of two atoms of oxygen
    evidence_type: IEA
    original_reference_id: GO_REF:0000002
    qualifier: enables
    review:
      summary: >-
        This dioxygenase parent term is biologically consistent but redundant
        with the more specific catechol 1,2-dioxygenase activity annotation.
      action: MARK_AS_OVER_ANNOTATED
      reason: >-
        GO:0018576 fully specifies the substrate and reaction; retaining this
        broader parent as core would dilute the annotation.
      supported_by:
        - reference_id: file:PSEPK/catA-II/catA-II-uniprot.txt
          supporting_text: "Reaction=catechol + O2 = cis,cis-muconate + 2 H(+);"
  - term:
      id: GO:0018576
      label: catechol 1,2-dioxygenase activity
    evidence_type: IEA
    original_reference_id: GO_REF:0000120
    qualifier: enables
    review:
      summary: >-
        This is the precise core molecular function of CatA-II.
      action: ACCEPT
      reason: >-
        The UniProt record, EC 1.13.11.1, Rhea reaction, InterPro family, and
        the ben-locus catA2 literature all support CatA-II as a catechol
        1,2-dioxygenase.
      supported_by:
        - reference_id: file:PSEPK/catA-II/catA-II-uniprot.txt
          supporting_text: "RecName: Full=catechol 1,2-dioxygenase"
        - reference_id: file:PSEPK/catA-II/catA-II-uniprot.txt
          supporting_text: "Reaction=catechol + O2 = cis,cis-muconate + 2 H(+);"
        - reference_id: PMID:24341396
          supporting_text: >-
            located downstream of the ben operon that encodes an additional
            catechol-1,2-dioxygenase.
  - term:
      id: GO:0019614
      label: catechol-containing compound catabolic process
    evidence_type: IEA
    original_reference_id: GO_REF:0000002
    qualifier: involved_in
    review:
      summary: >-
        CatA-II participates in catechol catabolism by cleaving catechol to
        cis,cis-muconate.
      action: ACCEPT
      reason: >-
        CatA-II's specific catalytic reaction is the first step of catechol
        degradation through the ortho-cleavage branch.
      supported_by:
        - reference_id: file:PSEPK/catA-II/catA-II-uniprot.txt
          supporting_text: "4,5-dihydro-2-furylacetate from catechol: step 1/3."
  - term:
      id: GO:0042952
      label: beta-ketoadipate pathway
    evidence_type: IEA
    original_reference_id: GO_REF:0000041
    qualifier: involved_in
    review:
      summary: >-
        This pathway annotation is correct for CatA-II, which performs step 1/3
        of the catechol branch feeding the beta-ketoadipate pathway.
      action: ACCEPT
      reason: >-
        UniPathway/UniProt place the enzyme in the catechol-derived
        beta-ketoadipate route, and P. putida literature identifies PP_3166
        catA2 as a second catechol 1,2-dioxygenase downstream of the ben operon.
      supported_by:
        - reference_id: file:PSEPK/catA-II/catA-II-uniprot.txt
          supporting_text: "PATHWAY: Aromatic compound metabolism; beta-ketoadipate pathway; 5-oxo-"
        - reference_id: PMID:21906639
          supporting_text: >-
            This operon contains PP_3166 (catA2), which was shown to be a
            second catechol 1,2-dioxygenase besides catA.
