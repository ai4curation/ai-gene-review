  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: Catechol 1,2-dioxygenase activity is the exact core molecular function.
    action: ACCEPT
    reason: The product name, EC 1.13.11.1 assignment, and intradiol dioxygenase domains all support
