  - id: PMID:24341396
    title: A second chromosomal copy of the catA gene endows Pseudomonas putida mt-2 with an enzymatic safety valve for excess of catechol.
    findings:
      - statement: >-
          P. putida mt-2 carries a second catA copy downstream of the ben operon
          that encodes an additional catechol 1,2-dioxygenase.
        supporting_text: >-
          P. putida mt-2 has a second chromosomal copy of the catA gene (named
          catA2) located downstream of the ben operon that encodes an
          additional catechol-1,2-dioxygenase.
      - statement: >-
          The catA2 paralog acts as a metabolic safety valve for excess catechol
          during benzoate-induced ortho-pathway flux.
        supporting_text: >-
          The data consistently indicated that induction of the ortho pathway by
          benzoate plasmid-less strain P. putida KT2440 led to catechol surplus,
          the toxicity of which at high concentrations being counteracted by
          CatA2.
  - id: PMID:21906639
    title: Generation of a catR deficient mutant of P. putida KT2440 that produces cis, cis-muconate from benzoate at high rate and yield.
    findings:
      - statement: >-
          In a KT2440 catR mutant, the ben operon containing PP_3166/catA2 was
          highly expressed in benzoate and PP_3166 was identified as a second
          catechol 1,2-dioxygenase.
        supporting_text: >-
          This operon contains PP_3166 (catA2), which was shown to be a second
          catechol 1,2-dioxygenase besides catA.
  - id: file:PSEPK/catA-II/catA-II-deep-research-openscientist.md
    title: OpenScientist deep-research retrieval for catA-II
    findings:
      - statement: >-
          OpenScientist confirmed CatA-II as the PP_3166 catechol
          1,2-dioxygenase paralog and distinguished it from CatA-I/PP_3713 by
          genomic context.
        supporting_text: >-
          The only ambiguity is intra-organismal: KT2440 has two catechol
          1,2-dioxygenase paralogs, and this report distinguishes catA-II
          (PP_3166) from catA-I (PP_3713) explicitly (see Finding F007).
