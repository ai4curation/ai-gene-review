suggested_questions:
  - question: >-
      Under which KT2440 growth conditions does CatA-II materially contribute to
      catechol flux relative to CatA-I?
  - question: >-
      Does CatA-II differ from CatA-I in catechol affinity, inhibitor
      sensitivity, or response to substituted catechols?
suggested_experiments:
  - hypothesis: >-
      CatA-II acts as a benzoate-induced safety-valve enzyme when catechol
      production exceeds CatA-I capacity.
    description: >-
      Compare wild type, catA-I, catA-II, and double-mutant strains during
      growth on benzoate or catechol, measuring catechol accumulation,
      cis,cis-muconate production, and expression from the ben and cat loci.
    experiment_type: genetic perturbation with targeted metabolite profiling
