id: Q88I35
gene_symbol: catA-II
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: 'catA-II encodes a catechol 1,2-dioxygenase paralog that catalyzes intradiol ortho cleavage
  of catechol to cis,cis-muconate. It is a catechol-branch enzyme connected to benzoate-derived catechol
  and the beta-ketoadipate pathway, distinct from the catA-I paralog elsewhere in KT2440.'
existing_annotations:
- term:
    id: GO:0003824
    label: catalytic activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: Catalytic activity is too broad for a catechol 1,2-dioxygenase.
    action: MARK_AS_OVER_ANNOTATED
    reason: GO:0018576 is the specific core molecular function.
- term:
    id: GO:0005506
    label: iron ion binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: Iron ion binding is true but less specific than ferric iron binding for intradiol
      dioxygenases.
    action: MARK_AS_OVER_ANNOTATED
    reason: GO:0008199 is the better cofactor term.
- term:
    id: GO:0008199
    label: ferric iron binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: Ferric iron binding is consistent with intradiol catechol dioxygenase chemistry.
    action: ACCEPT
    reason: The Fe(III) cofactor is central to the enzyme mechanism.
- term:
