description: bioD encodes ATP-dependent dethiobiotin synthetase in Pseudomonas putida
  KT2440. This magnesium-dependent enzyme carboxylates 7,8-diaminopelargonic acid
  to form the ureido ring of dethiobiotin, the penultimate step of de novo biotin
  biosynthesis.
