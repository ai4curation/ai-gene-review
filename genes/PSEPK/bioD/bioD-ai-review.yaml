id: Q88QW8
gene_symbol: bioD
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: >-
  BioD is the ATP-dependent dethiobiotin synthetase that carboxylates and
  cyclizes 7,8-diaminononanoate to form dethiobiotin. It is a soluble enzyme in
  the penultimate committed reaction of de novo biotin biosynthesis.
existing_annotations:
- term:
    id: GO:0000287
    label: magnesium ion binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: Magnesium binding supports catalysis but is not the core molecular function.
    action: KEEP_AS_NON_CORE
    reason: >-
      UniProt records Mg2+ as the divalent cofactor for the ATP-dependent BioD
      reaction.
- term:
    id: GO:0004141
    label: dethiobiotin synthase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: This is the specific BioD catalytic activity.
    action: ACCEPT
    reason: >-
      EC 6.3.3.3, the HAMAP rule, and BioD-specific family assignments converge
      on ATP-dependent dethiobiotin formation.
    supported_by:
    - reference_id: file:PSEPK/bioD/bioD-uniprot.txt
      supporting_text: Full=ATP-dependent dethiobiotin synthetase BioD
    - reference_id: file:PSEPK/bioD/bioD-deep-research-openscientist.md
      supporting_text: >-
        The gene **bioD** (ordered locus **PP_0366**, UniProt accession
        **Q88QW8**) of *Pseudomonas putida* KT2440 encodes **ATP-dependent
        dethiobiotin synthetase (DTBS/DTB synthetase, EC 6.3.3.3)**
- term:
    id: GO:0005524
    label: ATP binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: ATP binding is valid mechanistic information but not the core reaction.
    action: KEEP_AS_NON_CORE
    reason: >-
      ATP is consumed by the ligase reaction already represented by GO:0004141.
- term:
    id: GO:0005737
    label: cytoplasm
  evidence_type: IEA
  original_reference_id: GO_REF:0000044
  qualifier: located_in
  review:
    summary: Cytoplasm is the preferred retained location for this soluble bacterial enzyme.
    action: KEEP_AS_NON_CORE
    reason: >-
      UniProt explicitly predicts cytoplasmic localization; the duplicate
      cytosol annotation adds no distinct localization information.
- term:
    id: GO:0005829
    label: cytosol
  evidence_type: IEA
  original_reference_id: GO_REF:0000118
  qualifier: located_in
  review:
    summary: This is redundant with the retained cytoplasm annotation.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      The two terms do not describe distinct BioD pools in this bacterium, and
      the UniProt source explicitly uses cytoplasm.
- term:
    id: GO:0009102
    label: biotin biosynthetic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: involved_in
  review:
    summary: BioD catalyzes the penultimate reaction of biotin synthesis.
    action: ACCEPT
    reason: >-
      Dethiobiotin is the direct substrate of the terminal BioB reaction.
- term:
    id: GO:0042803
    label: protein homodimerization activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000117
  qualifier: enables
  review:
    summary: Homodimerization is a structural property rather than the informative BioD function.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      The BioD reaction is fully captured by GO:0004141; generic
      self-association adds little functional information.
