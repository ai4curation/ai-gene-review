  title: OpenScientist functional report for PSEPK BioD
  findings:
  - statement: >-
      Supports the BioD-family assignment, ATP/Mg-dependent EC 6.3.3.3
      reaction, and dethiobiotin-forming pathway position by transfer from
      structurally characterized bacterial orthologs. No direct assay,
      structure, localization experiment, or gene-specific phenotype for
      Q88QW8 was identified; drug-target and indirect pathway-essentiality
      claims are not used as core evidence.
core_functions:
- description: >-
    Uses ATP and bicarbonate to cyclize 7,8-diaminononanoate into dethiobiotin
    in the penultimate reaction of biotin biosynthesis.
