suggested_questions:
- question: Is PP_5142 essential under standard KT2440 growth conditions, and are any noncanonical lipoprotein lipidation routes present in this strain?
- question: Which KT2440 lipoprotein substrates are most dependent on Lgt-mediated lipidation for envelope localization or function?
- question: Does PP_4236/Q88F63 carry an over-propagated Lgt-like annotation that should be corrected or qualified in a separate review?
suggested_experiments:
- description: Compare wild-type and conditional lgt-depletion KT2440 membrane proteomes to identify prolipoproteins that fail to mature or localize when Lgt activity is reduced.
  experiment_type: conditional depletion and membrane proteomics
- description: Reconstitute PP_5142 with phosphatidylglycerol and model prolipoprotein peptides to measure diacylglyceryl transfer activity and substrate preferences.
  experiment_type: in vitro enzyme assay
