      supporting_text: KW   Carotenoid biosynthesis
- term:
    id: GO:0016123
    label: xanthophyll biosynthetic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000118
  qualifier: involved_in
  review:
    summary: Xanthophyll biosynthesis is the appropriate process context for a beta-carotene hydroxylase.
    action: ACCEPT
    reason: Beta-carotene hydroxylation is a carotenoid-tailoring step that forms hydroxylated carotenoid/xanthophyll products. GOA assigns this process through the same TreeGrafter node as the specific beta-carotene 3-hydroxylase activity.
    supported_by:
    - reference_id: file:PSEPK/crtZ/crtZ-goa.tsv
      supporting_text: "GO:0016123\txanthophyll biosynthetic process"
    - reference_id: file:PSEPK/crtZ/crtZ-goa.tsv
      supporting_text: "GO:0010291\tbeta-carotene 3-hydroxylase activity"
- term:
    id: GO:0016491
    label: oxidoreductase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: Generic oxidoreductase activity is compatible with the hydroxylase-family assignment but less informative than beta-carotene 3-hydroxylase activity.
    action: KEEP_AS_NON_CORE
    reason: InterPro maps the BETA-OHASE-like family to broad oxidoreductase activity. The TreeGrafter beta-carotene 3-hydroxylase term should carry the core molecular-function interpretation.
    supported_by:
