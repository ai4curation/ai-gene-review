    label: beta-carotene 3-hydroxylase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000118
  qualifier: enables
  review:
    summary: Beta-carotene 3-hydroxylase activity is the specific inferred molecular function for crtZ.
    action: ACCEPT
    reason: GOA assigns this specific TreeGrafter/PANTHER term, and the UniProt record names the protein beta-carotene hydroxylase with a fatty-acid hydroxylase domain and PANTHER beta-carotene hydroxylase family assignment.
    supported_by:
