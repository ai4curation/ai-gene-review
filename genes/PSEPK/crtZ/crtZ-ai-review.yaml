suggested_questions:
- question: Does KT2440 encode upstream carotenoid-biosynthesis enzymes outside the KEGG ppu00906 assignment, or is crtZ an isolated carotenoid-tailoring/side-node prediction?
suggested_experiments:
- hypothesis: crtZ functions as a beta-carotene hydroxylase that can produce xanthophyll products when appropriate carotene substrates are available.
  description: Express and purify crtZ or express it heterologously in a carotene-producing host, then assay beta-carotene hydroxylation products by HPLC/LC-MS; compare to a crtZ deletion or complementation strain if KT2440 carotenoid substrates are detected.
  experiment_type: heterologous enzyme assay and carotenoid product profiling
