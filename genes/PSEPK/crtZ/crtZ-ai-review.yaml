description: crtZ encodes a small predicted membrane-associated beta-carotene 3-hydroxylase in Pseudomonas putida KT2440. The protein is inferred from TreeGrafter/PANTHER and UniProt domain context as a fatty-acid-hydroxylase/sterol-desaturase-family carotenoid hydroxylase that converts carotene substrates toward xanthophyll products, but local evidence supports only this single carotenoid-tailoring step rather than a complete carotenoid biosynthesis pathway.
