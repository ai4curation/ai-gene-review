    of (S)-malate to oxaloacetate with reduction of NAD+ to NADH, the oxaloacetate-regenerating
    step of the TCA cycle.
  molecular_function:
    id: GO:0030060
    label: L-malate dehydrogenase (NAD+) activity
  supported_by:
  - reference_id: file:PSEPK/mdh/mdh-deep-research-falcon.md
    supporting_text: P. putida KT2440 Mdh (PP_0654) catalyzes L-malate + NAD+ = oxaloacetate
