description: NAD-dependent malate dehydrogenase (EC 1.1.1.37) of the LDH/MDH superfamily.
  It is a soluble, cytoplasmic enzyme that catalyzes the reversible NAD(+)-linked oxidation
  of (S)-malate to oxaloacetate, generating NADH. The enzyme sits at the malate/oxaloacetate
  node of central carbon metabolism, providing the oxaloacetate-regenerating step of
  the tricarboxylic acid (TCA) cycle and contributing reducing equivalents to respiratory
  metabolism. In Pseudomonas putida KT2440, enzyme assays of cell-free extracts show
  strong specificity for NAD(+) over NADP(+) (~98% NAD+), consistent with a canonical
  TCA-cycle malate dehydrogenase. The protein adopts the two-domain LDH/MDH fold with
  an N-terminal NAD(P)-binding Rossmann domain and a C-terminal substrate-binding domain,
  with a conserved His proton-acceptor active site and Arg residues that recognize the
  substrate carboxylates.
