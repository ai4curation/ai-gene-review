existing_annotations:
- term:
    id: GO:0003824
    label: catalytic activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: Root-level molecular function term; correct but uninformative for an enzyme
      with a defined activity.
    action: KEEP_AS_NON_CORE
    reason: The gene product is an enzyme so catalytic activity is true, but this is
      a very general parent of the specific malate dehydrogenase activity (GO:0030060)
      and carries no specific information. Retained as non-core.
- term:
    id: GO:0004459
    label: L-lactate dehydrogenase (NAD+) activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000118
  qualifier: enables
  review:
    summary: TreeGrafter over-propagation from the LDH/MDH superfamily; this protein
      is a malate dehydrogenase, not a lactate dehydrogenase.
    action: REMOVE
    reason: This IEA (TreeGrafter/PANTHER) annotation reflects an electronic mis-assignment
      within the shared LDH/MDH superfamily node. UniProt and InterPro (Malate_DH_type3,
      IPR011275) classify Q88Q44 as a malate dehydrogenase (EC 1.1.1.37, GO:0030060),
      and experimental assays in KT2440 measured malate dehydrogenase, not L-lactate
      dehydrogenase, activity. L-lactate dehydrogenase activity is not supported and
      is contradicted by the malate-specific function; this is an over-propagated electronic
      inference appropriate to remove.
- term:
    id: GO:0006089
    label: lactate metabolic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000118
  qualifier: involved_in
  review:
    summary: TreeGrafter over-propagation paired with the erroneous L-lactate dehydrogenase
      activity call; the gene functions in the TCA cycle, not lactate metabolism.
    action: REMOVE
    reason: This process annotation derives from the same incorrect LDH-superfamily
      grafting as GO:0004459. The enzyme acts on malate/oxaloacetate in the TCA cycle,
      not on lactate. Over-propagated electronic inference, appropriate to remove. The
      correct process is tricarboxylic acid cycle (GO:0006099), captured by UniProt
      keyword but missing from GOA.
- term:
    id: GO:0016491
    label: oxidoreductase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: Correct high-level oxidoreductase parent; uninformative relative to the
      specific malate dehydrogenase activity.
    action: KEEP_AS_NON_CORE
    reason: True but general parent of GO:0030060. Retained as non-core background.
- term:
    id: GO:0016616
    label: oxidoreductase activity, acting on the CH-OH group of donors, NAD or NADP
      as acceptor
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: Correct intermediate-level parent describing NAD(P)-linked CH-OH oxidoreductases;
      more specific malate dehydrogenase activity is preferred as core.
    action: KEEP_AS_NON_CORE
    reason: Accurately describes the enzyme class (NAD-linked CH-OH oxidoreductase)
      but is a parent of the specific GO:0030060 L-malate dehydrogenase (NAD+) activity.
      Retained as non-core.
- term:
    id: GO:0030060
    label: L-malate dehydrogenase (NAD+) activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: Correct core molecular function, matching EC 1.1.1.37 and the UniProt
      catalytic activity (RHEA:21432, (S)-malate + NAD+ = oxaloacetate + NADH + H+).
    action: ACCEPT
    reason: This is the core, well-supported molecular function. The UniProt RHEA/EC
      mapping and InterPro Malate_DH_type3 domain agree, and KT2440 cell-free extract
      assays demonstrated strong NAD+-specific malate dehydrogenase activity.
- term:
    id: GO:0030060
    label: L-malate dehydrogenase (NAD+) activity
  evidence_type: ISS
  original_reference_id: GO_REF:0000024
  qualifier: enables
  review:
    summary: ISS transfer of the core malate dehydrogenase activity from a characterized
      ortholog (UniProtKB:P61889); consistent with all other evidence.
    action: ACCEPT
    reason: Sequence-similarity transfer of the core function from an experimentally
      characterized MDH ortholog. Concordant with the EC mapping, InterPro family,
      conserved active-site/binding residues, and KT2440 enzyme assay data. Represents
      the core function of the gene.
