      extract assays.
proposed_new_terms:
- term:
    id: GO:0006099
    label: tricarboxylic acid cycle
  reason: The enzyme is the malate dehydrogenase step of the TCA cycle. This biological
    process is captured by the UniProt keyword (KW Tricarboxylic acid cycle; GO:0006099,
    IEA UniProtKB-KW) but is absent from the GOA file. It should be added as the correct
    process annotation, replacing the erroneous lactate metabolic process (GO:0006089)
    call.
suggested_questions:
- question: Is mdh (PP_0654) the sole NAD-dependent malate dehydrogenase in P. putida
    KT2440, or do malate:quinone oxidoreductase (Mqo) isozymes and malic enzymes provide
    redundant routes through the malate node?
suggested_experiments:
- description: Purify recombinant PP_0654 and determine steady-state kinetic constants
    (Km, kcat) for L-malate, oxaloacetate, NAD+ and NADH to confirm the canonical ordered
    Bi-Bi mechanism and quantify directional preference under physiological conditions.
- description: Construct a clean mdh (PP_0654) deletion and assess growth on TCA-cycle
    and gluconeogenic carbon sources, with 13C-metabolic flux analysis to test rerouting
    of malate via malic enzyme and the glyoxylate shunt.
