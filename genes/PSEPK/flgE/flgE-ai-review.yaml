existing_annotations:
- term:
    id: GO:0005829
    label: cytosol
  evidence_type: IEA
  original_reference_id: GO_REF:0000118
  review:
    summary: This annotation should be removed. FlgE is explicitly identified as the flagellar
      hook protein and described as the flexible connector between filament and basal-body
      drive apparatus, which is inconsistent with a soluble cytosolic localization. The
      cytosol term appears to be a TreeGrafter overcall from broad family propagation rather
      than a gene-specific localization statement.
    action: REMOVE
    supported_by:
    - reference_id: UniProt:Q88ER5
      supporting_text: "RecName: Full=Flagellar hook protein FlgE"
    - reference_id: file:PSEPK/flgE/flgE-deep-research-falcon.md
      supporting_text: rather than in the cytosol.
    - reference_id: UniProt:Q88ER5
      supporting_text: A flexible structure which links the flagellar filament to ... the drive
        apparatus in the basal body.
    - reference_id: file:PSEPK/flgE/flgE-goa.tsv
      supporting_text: "GO:0009424\tbacterial-type flagellum hook"
