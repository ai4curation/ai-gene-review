  label: Pseudomonas putida KT2440
description: FlgE is the structural hook protein of the Pseudomonas putida KT2440 bacterial
  flagellum. It forms the flexible connector between the basal body motor and the filament,
  so its core biology is flagellar architecture and flagellum-dependent motility rather than
  cytosolic function or swarming-specific regulation.
