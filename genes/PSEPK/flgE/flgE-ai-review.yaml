- term:
    id: GO:0071973
    label: bacterial-type flagellum-dependent cell motility
  evidence_type: IEA
  original_reference_id: GO_REF:0000104
  review:
    summary: This annotation is acceptable and captures a core biological process for FlgE.
      A functional hook is required to mechanically couple the motor to the filament, so hook
      assembly directly supports flagellum-dependent motility even though FlgE is not itself
      a regulatory factor.
    action: ACCEPT
    supported_by:
    - reference_id: file:PSEPK/flgE/flgE-deep-research-falcon.md
      supporting_text: The hook’s mechanical role is as a “universal joint”
    - reference_id: UniProt:Q88ER5
      supporting_text: A flexible structure which links the flagellar filament to ... the drive
        apparatus in the basal body.
    - reference_id: file:PSEPK/flgE/flgE-goa.tsv
      supporting_text: "GO:0071973\tbacterial-type flagellum-dependent cell motility"
- term:
    id: GO:0071978
    label: bacterial-type flagellum-dependent swarming motility
  evidence_type: IEA
  original_reference_id: GO_REF:0000118
  review:
    summary: This term is likely over-annotated. FlgE is a core flagellar structural protein,
      so it may be required when a strain swarms, but swarming is a specialized surface-associated
      behavior with additional physiological determinants beyond simply encoding the hook subunit.
      There is no direct gene-specific evidence here for swarming in P. putida KT2440.
    action: MARK_AS_OVER_ANNOTATED
    supported_by:
    - reference_id: GO_REF:0000118
      supporting_text: TreeGrafter-generated GO annotations
    - reference_id: file:PSEPK/flgE/flgE-goa.tsv
      supporting_text: "GO:0071978\tbacterial-type flagellum-dependent swarming motility"
