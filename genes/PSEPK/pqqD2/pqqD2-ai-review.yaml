  reference_review:
    relevance: MEDIUM
    correctness: MISCITED
    review_notes: >-
      The report retrieves the conserved PqqD chaperone literature and correct
      locus neighborhood, but presents Ped-system specialization as the best
      interpretation without target-specific expression, genetic, or binding
      evidence. Its exact alignment and STRING-derived quantitative claims are
      not retained as reproducible artifacts and were not propagated.
