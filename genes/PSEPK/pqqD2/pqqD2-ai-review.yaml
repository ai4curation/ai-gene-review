  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: pqqD2 (PP_2681) encodes PqqA binding protein 2, a second PqqD-family peptide chaperone associated with pyrroloquinoline quinone (PQQ) biosynthesis in Pseudomonas putida KT2440. Like PqqD1, it is annotated as a PqqA-binding protein that presents PqqA to PqqE, supporting early precursor-peptide modification during PQQ cofactor production.
