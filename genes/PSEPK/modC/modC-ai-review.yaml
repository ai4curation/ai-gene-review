description: modC encodes the ATP-binding energy-coupling subunit of the PP_3828-PP_3830 ModABC molybdate importer. UniProt identifies the reviewed protein as ModC, part of the ModABC complex for molybdenum import, and assigns EC 7.3.2.5 for ATP-dependent molybdate import.
