- id: GO_REF:0000118
  title: TreeGrafter-generated GO annotations
  findings:
  - statement: >-
      Cytosol is retained, but DNA repair and phosphoglycolate phosphatase are
      not treated as core PhnX biology.
- id: GO_REF:0000120
  title: Combined Automated Annotation using Multiple IEA Methods
  findings:
  - statement: >-
      Combined IEA source for the specific phosphonoacetaldehyde hydrolase
      molecular function.
