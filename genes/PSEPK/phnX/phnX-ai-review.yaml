  qualifier: enables
  review:
    summary: Magnesium binding is consistent with the HAMAP/UniRule PhnX assignment and the annotated Mg(2+) cofactor site, but it is a cofactor requirement rather than the core activity.
    action: KEEP_AS_NON_CORE
    reason: UniProt states that PhnX binds one Mg(2+) ion per subunit and identifies Mg(2+) as the cofactor for the phosphonoacetaldehyde hydrolase reaction. The annotation should be retained as supporting biochemical context, while the core molecular function is phosphonoacetaldehyde hydrolase activity.
