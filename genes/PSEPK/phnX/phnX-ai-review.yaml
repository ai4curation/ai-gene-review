suggested_questions:
- question: Is the P. putida KT2440 phnW-phnX locus induced by 2-aminoethylphosphonate under phosphate limitation, and does it support growth on AEP as a phosphorus source?
- question: Does KT2440 PhnX accept only phosphonoacetaldehyde in vivo, or can related phosphonoaldehydes contribute to broader aminophosphonate use?
suggested_experiments:
- description: Grow KT2440 and phnW/phnX deletion strains with 2-aminoethylphosphonate as the phosphorus source and measure phosphate release, acetaldehyde formation, and pathway transcript induction.
  experiment_type: growth phenotype and metabolite assay
- description: Purify recombinant KT2440 PhnX and measure kinetic parameters for phosphonoacetaldehyde and candidate related aldehyde phosphonates, with Mg(2+) dependence tested explicitly.
  experiment_type: enzyme kinetics
