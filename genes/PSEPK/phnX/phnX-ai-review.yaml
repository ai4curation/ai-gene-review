id: Q88KT1
gene_symbol: phnX
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: >-
  phnX (PP_2208) encodes the reviewed phosphonoacetaldehyde
  hydrolase/phosphonatase of the Pseudomonas putida KT2440
  2-aminoethylphosphonate degradation route. It is a HAD-like, magnesium-
  dependent hydrolase that cleaves phosphonoacetaldehyde to acetaldehyde and
  inorganic phosphate, completing carbon-phosphorus bond cleavage after the
  upstream PhnW transaminase step. Its core role is therefore organic
  phosphonate catabolism, not DNA repair or generic phosphoglycolate
  phosphatase activity.
existing_annotations:
- term:
    id: GO:0000287
    label: magnesium ion binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000104
  qualifier: enables
  review:
    summary: >-
      Magnesium binding is correct for this PhnX phosphonatase.
    action: ACCEPT
    reason: >-
      UniProt records a magnesium cofactor and one magnesium ion bound per
      subunit for the HAMAP-supported PhnX enzyme.
    supported_by:
    - reference_id: file:PSEPK/phnX/phnX-uniprot.txt
      supporting_text: Binds 1 Mg(2+) ion per subunit.
- term:
    id: GO:0003824
    label: catalytic activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000117
  qualifier: enables
  review:
    summary: >-
      Generic catalytic activity is true but uninformative for a characterized
      phosphonoacetaldehyde hydrolase.
    action: MODIFY
    reason: >-
      Replace the broad catalytic parent with the specific PhnX molecular
      function already present in GOA.
    proposed_replacement_terms:
    - id: GO:0050194
      label: phosphonoacetaldehyde hydrolase activity
- term:
    id: GO:0005829
    label: cytosol
  evidence_type: IEA
  original_reference_id: GO_REF:0000118
  qualifier: located_in
  review:
    summary: >-
      Cytosol is appropriate for a soluble bacterial phosphonate-catabolic
      enzyme.
    action: ACCEPT
    reason: >-
      TreeGrafter assigns cytosol, and the UniProt entry has no membrane or
      secretion features suggesting another location.
- term:
    id: GO:0006281
    label: DNA repair
  evidence_type: IEA
  original_reference_id: GO_REF:0000118
  qualifier: involved_in
  review:
    summary: >-
      DNA repair is not supported for PhnX and conflicts with the reviewed
      phosphonoacetaldehyde hydrolase function.
    action: REMOVE
    reason: >-
      This TreeGrafter annotation appears to be an automated family-transfer
      artifact. The reviewed UniProt record and pathway context support
      phosphonate catabolism instead.
    proposed_replacement_terms:
    - id: GO:0019700
      label: organic phosphonate catabolic process
- term:
    id: GO:0008967
    label: phosphoglycolate phosphatase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000118
  qualifier: enables
  review:
    summary: >-
      Phosphoglycolate phosphatase activity is likely an over-propagated label
      from the broader HAD/PGP-like family.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      PSEPK PhnX is reviewed as phosphonoacetaldehyde hydrolase with EC
      3.11.1.1 and a matching Rhea reaction. Use the substrate-specific
      phosphonoacetaldehyde hydrolase term as the core molecular function.
    proposed_replacement_terms:
    - id: GO:0050194
      label: phosphonoacetaldehyde hydrolase activity
- term:
    id: GO:0019700
    label: organic phosphonate catabolic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: involved_in
  review:
    summary: >-
      Organic phosphonate catabolism is the correct pathway context for PhnX.
    action: ACCEPT
    reason: >-
      PhnX cleaves phosphonoacetaldehyde, the downstream intermediate generated
      by PhnW during 2-aminoethylphosphonate degradation.
    supported_by:
    - reference_id: file:PSEPK/phnX/phnX-uniprot.txt
      supporting_text: Involved in phosphonate degradation.
- term:
    id: GO:0050194
    label: phosphonoacetaldehyde hydrolase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: >-
      This is the specific core molecular function of PhnX.
    action: ACCEPT
    reason: >-
      UniProt records the EC 3.11.1.1/Rhea reaction converting
      phosphonoacetaldehyde and water to acetaldehyde and phosphate.
    supported_by:
    - reference_id: file:PSEPK/phnX/phnX-uniprot.txt
      supporting_text: Reaction=phosphonoacetaldehyde + H2O = acetaldehyde + phosphate
references:
