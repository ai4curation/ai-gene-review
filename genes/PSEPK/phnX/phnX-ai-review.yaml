taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: PhnX (PP_2208) is a HAD-like phosphonoacetaldehyde hydrolase, also called phosphonatase, that acts in bacterial organic phosphonate catabolism. It hydrolyzes phosphonoacetaldehyde to acetaldehyde, inorganic phosphate, and a proton, using a Mg(2+)-dependent active site. In P. putida KT2440 this enzyme forms the downstream C-P bond cleavage step of the compact PhnW/PhnX 2-aminoethylphosphonate catabolic route, following PhnW-dependent transamination of 2-aminoethylphosphonate to phosphonoacetaldehyde.
