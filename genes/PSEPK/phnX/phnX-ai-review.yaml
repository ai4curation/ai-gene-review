    summary: The DNA repair annotation is not supported by the PhnX-specific record and appears to be an over-transfer from a broad HAD/phosphatase family node.
    action: REMOVE
    reason: The same TreeGrafter source assigns both DNA repair and phosphoglycolate phosphatase activity, but the curated protein identity is phosphonoacetaldehyde hydrolase/phosphonatase in organic phosphonate degradation. UniProt, InterPro, HAMAP, Rhea, and GOA all support phosphonate catabolism and phosphonoacetaldehyde hydrolysis, with no gene-specific support for DNA repair.
