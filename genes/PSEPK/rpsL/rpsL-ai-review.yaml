description: rpsL (PP_0449) encodes Small ribosomal subunit protein uS12 (30S ribosomal protein S12),
  a conserved protein component of the bacterial 30S small ribosomal subunit in Pseudomonas putida KT2440.
  It functions as a structural constituent of the ribosome and supports protein translation as part of
  the small subunit. It contacts small-subunit rRNA as part of 30S subunit architecture and assembly.
