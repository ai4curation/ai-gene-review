description: PP_4333 encodes a predicted CheW-domain protein in Pseudomonas putida KT2440.
  The protein has a C-terminal CheW-like domain and is part of the same core chemosensory
  cluster as PP_4332, CheB1, CheA, CheZ, and CheY. It is best treated in this first pass as
  a chemotaxis adaptor/accessory candidate, with its precise relationship to the shorter PP_4332
  CheW protein left as a module-level knowledge gap.
