proposed_new_terms: []
suggested_questions:
- question: Does PP_4333 function as a second CheW adaptor in the core chemosensory cluster,
    or does its N-terminal extension confer a specialized regulatory role?
- question: Which MCPs, if any, preferentially require PP_4333 rather than PP_4332 for CheA
    coupling?
suggested_experiments:
- description: Compare PP_4332, PP_4333, and double mutants in swimming chemotaxis assays
    across representative organic-acid and amino-acid attractants.
- description: Map PP_4333 interaction partners within the KT2440 Che cluster by affinity
    purification or proximity labeling.
