core_functions:
- description: PP_4333 is a CheW-like chemotaxis adaptor/accessory candidate in the PP_4332-PP_4340
    Che cluster. The C-terminal CheW-like domain supports a role in bacterial chemotaxis signaling,
    but the specific receptor or CheA partner set is unresolved.
