taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: thiD encodes the bifunctional hydroxymethylpyrimidine/phosphomethylpyrimidine kinase of thiamine diphosphate biosynthesis. It phosphorylates the HMP branch intermediates that supply the activated pyrimidine moiety used by ThiE for thiamine phosphate synthesis.
