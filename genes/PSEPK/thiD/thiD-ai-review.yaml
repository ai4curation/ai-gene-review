    label: cytosol
  evidence_type: IEA
  original_reference_id: GO_REF:0000118
  qualifier: located_in
  review:
    summary: Cytosol is reasonable for this soluble bacterial thiamine-pathway kinase but is not its defining function.
    action: KEEP_AS_NON_CORE
    reason: Retain as location context only.
    supported_by:
    - reference_id: file:PSEPK/thiD/thiD-goa.tsv
      supporting_text: "GO:0005829\tcytosol"
- term:
    id: GO:0008902
    label: hydroxymethylpyrimidine kinase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: ThiD carries the hydroxymethylpyrimidine kinase activity needed to phosphorylate HMP in the thiamine pyrimidine branch.
    action: ACCEPT
    reason: Retain as a core molecular function; it is one of the two specific kinase activities assigned to this thiamine-pathway enzyme.
    supported_by:
    - reference_id: file:PSEPK/thiD/thiD-goa.tsv
      supporting_text: "GO:0008902\thydroxymethylpyrimidine kinase activity"
