    label: thiamine biosynthetic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: involved_in
  review:
    summary: ThiD participates in thiamine biosynthesis, but the more precise pathway endpoint is thiamine diphosphate biosynthesis.
    action: KEEP_AS_NON_CORE
    reason: Retain as a broad parent process; GO:0009229 is the preferred process term here.
    supported_by:
