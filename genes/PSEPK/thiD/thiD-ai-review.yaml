- term:
    id: GO:0008972
    label: phosphomethylpyrimidine kinase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: ThiD also phosphorylates phosphomethylpyrimidine, completing activation of the pyrimidine moiety for thiamine biosynthesis.
    action: ACCEPT
    reason: Retain as the second core ThiD kinase activity.
    supported_by:
    - reference_id: file:PSEPK/thiD/thiD-goa.tsv
      supporting_text: "GO:0008972\tphosphomethylpyrimidine kinase activity"
    - reference_id: file:PSEPK/thiD/thiD-uniprot.txt
      supporting_text: 'PATHWAY: Cofactor biosynthesis; thiamine diphosphate biosynthesis.'
- term:
