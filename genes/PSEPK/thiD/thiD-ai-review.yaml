  qualifier: enables
  review:
    summary: Catalytic activity is true but far less informative than the two specific ThiD kinase activities.
    action: MARK_AS_OVER_ANNOTATED
    reason: Retain the specific hydroxymethylpyrimidine kinase and phosphomethylpyrimidine kinase terms as the informative molecular functions.
    supported_by:
