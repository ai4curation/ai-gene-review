  title: Combined Automated Annotation using Multiple IEA Methods
  findings: []
- id: PMID:10960098
  title: Identification of Escherichia coli ubiB, a gene required for the first monooxygenase
    step in ubiquinone biosynthesis.
  findings:
  - statement: >-
      E. coli ubiB disruption eliminates CoQ and causes octaprenylphenol
      accumulation, establishing a conserved requirement for UbiB in the
      pathway without identifying UbiB as the hydroxylase.
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      PubMed-cached abstract verified; evidence is from E. coli and is applied
      to PP_5013 by orthology.
- id: PMID:27499294
  title: Cerebellar Ataxia and Coenzyme Q Deficiency through Loss of Unorthodox Kinase
    Activity.
  findings:
  - statement: >-
      Characterized COQ8/Coq8 homologs lack canonical trans protein kinase
      activity and instead show ATPase activity and lipid CoQ-intermediate
      interactions that the authors infer are conserved across domains.
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Full text verified; the biochemical assays are on mammalian and yeast
      homologs, so the PP_5013 ATPase assignment remains family-level transfer.
- id: file:PSEPK/ubiB/ubiB-uniprot.txt
  title: UniProt entry A0A140FWS4 for ubiB
  findings:
  - statement: >-
      The record assigns the UbiB/ABC1 family, a single C-terminal
      transmembrane segment, inner-membrane localization, and an inferred role
      in ubiquinone biosynthesis.
- id: file:PSEPK/ubiB/ubiB-goa.tsv
