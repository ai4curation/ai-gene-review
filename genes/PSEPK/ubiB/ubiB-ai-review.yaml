id: A0A140FWS4
gene_symbol: ubiB
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: >-
  ubiB encodes an inner-membrane-anchored member of the UbiB/ABC1 atypical
  protein-kinase-like family that is required for aerobic ubiquinone
  biosynthesis. Characterized UbiB-family homologs lack canonical protein
  kinase activity in trans and instead hydrolyze ATP and interact with lipid
  ubiquinone intermediates. For PP_5013, this ATP-dependent accessory role is
  inferred from conserved family architecture, orthology, and pathway context;
  the Pseudomonas putida protein itself has not been assayed.
existing_annotations:
- term:
    id: GO:0004672
    label: protein kinase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000104
  qualifier: enables
  review:
    summary: >-
      The UbiB protein-kinase-like fold does not establish canonical protein
      kinase activity. Characterized COQ8/Coq8 homologs lack trans protein
      kinase activity and instead show ATP hydrolysis activity.
    action: MODIFY
    reason: >-
      ATP hydrolysis is the experimentally supported family activity, whereas
      PP_5013 has no direct enzymatic characterization. The replacement is
      therefore a strong family-level inference rather than a target-specific
      assay result.
    proposed_replacement_terms:
    - id: GO:0016887
      label: ATP hydrolysis activity
    supported_by:
    - reference_id: PMID:27499294
      supporting_text: >-
        Although COQ8 was predicted to be a protein kinase, we demonstrate that
        it lacks canonical protein kinase activity in trans.
    - reference_id: PMID:27499294
      supporting_text: >-
        Instead, COQ8 has ATPase activity and interacts with lipid CoQ
        intermediates, functions that are likely conserved across all domains
        of life.
- term:
    id: GO:0005886
    label: plasma membrane
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: located_in
  review:
    summary: >-
      Plasma-membrane localization is consistent with the predicted
      single-pass inner-membrane topology of PP_5013.
    action: ACCEPT
    reason: >-
      UniProt/HAMAP places UbiB in the bacterial inner membrane and predicts a
      C-terminal transmembrane helix; this topology has not been measured in P.
      putida.
    supported_by:
    - reference_id: file:PSEPK/ubiB/ubiB-uniprot.txt
      supporting_text: Cell inner membrane
    - reference_id: file:PSEPK/ubiB/ubiB-uniprot.txt
      supporting_text: Single-pass membrane protein
- term:
    id: GO:0006744
    label: ubiquinone biosynthetic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: involved_in
  review:
    summary: >-
      Ubiquinone biosynthesis is the conserved core process of bacterial UbiB
      proteins.
    action: ACCEPT
    reason: >-
      E. coli ubiB disruption abolishes CoQ accumulation, and PP_5013 is a
      conserved UbiB-family ortholog in the P. putida ubiquinone pathway. This
      supports pathway requirement, not assignment of the blocked hydroxylase
      reaction to UbiB itself.
    supported_by:
    - reference_id: PMID:10960098
      supporting_text: >-
        Both the P. stuartii aarF and E. coli ubiB (yigR) disruption mutant
        strains lack CoQ and accumulate octaprenylphenol.
    - reference_id: file:PSEPK/ubiB/ubiB-deep-research-openscientist.md
      supporting_text: >-
        There is no published enzymatic assay, structure, knockout phenotype,
        or CoQ-profiling study specific to PP_5013/A0A140FWS4.
- term:
    id: GO:0010795
    label: regulation of ubiquinone biosynthetic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000104
  qualifier: involved_in
  review:
    summary: >-
      A specific regulatory role, especially regulation of UbiI activity, is
      more precise than the available evidence supports.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      UbiB is a required ATP-dependent pathway accessory factor, but neither a
      direct UbiI target nor the coupling between nucleotide turnover and
      pathway assembly has been established for PP_5013. GO:0006744 captures
      the defensible pathway role without asserting a regulatory mechanism.
    supported_by:
    - reference_id: file:PSEPK/ubiB/ubiB-uniprot.txt
      supporting_text: Is probably a protein kinase regulator of UbiI activity
    - reference_id: file:PSEPK/ubiB/ubiB-deep-research-openscientist.md
      supporting_text: >-
        The precise molecular "output" of UbiB remains debated even in model
        organisms.
references:
