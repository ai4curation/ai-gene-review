proposed_new_terms: []
suggested_questions:
- question: >-
    Does PP_5013 primarily couple ATP hydrolysis to lipid-intermediate handling,
    pathway-complex assembly, or an unresolved small-molecule phosphotransfer
    reaction?
suggested_experiments:
- description: >-
    Delete and complement PP_5013 in P. putida, profile ubiquinone and pathway
    intermediates, and assay purified UbiB for membrane- or
    intermediate-stimulated ATP hydrolysis.
