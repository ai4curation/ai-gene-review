id: A0A140FWS4
gene_symbol: ubiB
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: >-
  ubiB encodes an ABC1/UbiB-family kinase-like membrane protein associated with
  aerobic ubiquinone biosynthesis. In KT2440 it is annotated as a probable UbiB
  protein kinase/regulator of UbiI activity; current pathway synthesis treats it
  as an ATP-dependent accessory factor for Ubi-complex function rather than as a
  stand-alone protein kinase with a defined physiological substrate.
existing_annotations:
- term:
    id: GO:0004672
    label: protein kinase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000104
  qualifier: enables
  review:
    summary: >-
      The protein is kinase-like and ATP-binding, but a simple protein kinase
      activity annotation is over-specific for the current evidence.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      UniProt/HAMAP calls UbiB a probable protein kinase regulator of UbiI, but
      also cautions that conserved residues are missing. Falcon's module report
      summarizes the current model as an atypical UbiB/COQ8 ATPase or
      membrane-intermediate handling factor rather than a classical protein
      kinase with a defined protein substrate.
    additional_reference_ids:
    - file:projects/P_PUTIDA/deep-research/PSEPK__ubiquinone_biosynthesis__ppu00130-deep-research-falcon.md
- term:
    id: GO:0005886
    label: plasma membrane
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: located_in
  review:
    summary: >-
      Plasma-membrane localization is consistent with UniProt's cell inner
      membrane annotation and predicted transmembrane helix.
    action: KEEP_AS_NON_CORE
    reason: >-
      The membrane location is pathway-relevant because UbiB likely acts on
      membrane-associated ubiquinone intermediates, but the core annotation is
      its role in ubiquinone biosynthesis.
- term:
    id: GO:0006744
    label: ubiquinone biosynthetic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: involved_in
  review:
    summary: >-
      UbiB is a conserved accessory/regulatory factor for ubiquinone
      biosynthesis.
    action: ACCEPT
    reason: >-
      UniProt places A0A140FWS4 in cofactor biosynthesis; ubiquinone
      biosynthesis and describes it as a UbiB regulator of UbiI activity. The
      PSEPK Falcon report identified UbiB as an expected accessory component
      missing from the initial KEGG candidate list.
    additional_reference_ids:
    - file:projects/P_PUTIDA/deep-research/PSEPK__ubiquinone_biosynthesis__ppu00130-deep-research-falcon.md
- term:
    id: GO:0010795
    label: regulation of ubiquinone biosynthetic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000104
  qualifier: involved_in
  review:
    summary: >-
      Regulation of ubiquinone biosynthesis is consistent with the UbiB
      regulator/accessory assignment.
    action: ACCEPT
    reason: >-
      UniProt/HAMAP specifically describes UbiB as a probable regulator of UbiI
      activity involved in aerobic coenzyme Q biosynthesis, matching the
      biological-process regulation term.
