proposed_new_terms: []
suggested_questions:
- question: Does KT2440 UbiB function primarily as an ATPase-like intermediate handler, a protein kinase, or both?
suggested_experiments:
- hypothesis: UbiB is needed for efficient aerobic UQ-9 production by supporting UbiI-dependent ring hydroxylation.
  description: Measure ubiquinone intermediates in ubiB deletion and ATP-binding-site mutant backgrounds under aerobic growth.
  experiment_type: targeted metabolomics with genetic perturbation
