- id: file:PSEPK/ubiB/ubiB-deep-research-openscientist.md
  title: OpenScientist functional review of PSEPK ubiB
  findings:
  - statement: >-
      Family biochemistry, sequence architecture, and conserved pathway context
      support an ATP-dependent UbiB accessory role, while the report explicitly
      records the absence of direct PP_5013 experiments.
core_functions:
- description: >-
    Inner-membrane-anchored UbiB/ABC1 atypical kinase-like ATPase that supports
    aerobic ubiquinone biosynthesis. ATP hydrolysis is inferred from
    characterized homologs; its coupling to lipid-intermediate handling or
    pathway assembly remains unresolved for PP_5013.
  molecular_function:
    id: GO:0016887
    label: ATP hydrolysis activity
  directly_involved_in:
  - id: GO:0006744
    label: ubiquinone biosynthetic process
  locations:
