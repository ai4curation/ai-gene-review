taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: dgkA-I encodes one of two small bacterial diacylglycerol kinase paralogs in P. putida KT2440. It is predicted to catalyze ATP-dependent phosphorylation of 1,2-diacyl-sn-glycerol to phosphatidic acid, a membrane reaction that recycles diacylglycerol generated during membrane-derived oligosaccharide/envelope metabolism and returns it to phosphatidic-acid and phospholipid biosynthetic pools. The protein is a multi-pass plasma-membrane DAGK-family enzyme inferred from RuleBase/ARBA, EC/RHEA, and InterPro signatures.
