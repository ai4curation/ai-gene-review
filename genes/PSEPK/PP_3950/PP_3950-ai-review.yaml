  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: PP_3950 encodes a membrane methyl-accepting chemotaxis transducer with HAMP and MCP
  signaling domains in Pseudomonas putida KT2440. The protein belongs in the orphan MCP receptor
  boundary as a ligand-unresolved chemotaxis sensory transducer, with no specific chemoeffector
  assigned in this first pass.
