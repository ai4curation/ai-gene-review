description: >-
  mmsA-I (PP_0597) encodes methylmalonate-semialdehyde dehydrogenase (CoA-acylating), an aldehyde dehydrogenase-family enzyme assigned EC 1.2.1.27. It converts methylmalonate semialdehyde toward propanoyl-CoA and is in scope for the valine-catabolism branch of ppu00280, with thymine catabolism retained as secondary pathway context.
