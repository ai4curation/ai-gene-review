id: Q88HS3
gene_symbol: paaJ
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: 'paaJ encodes a thiolase in the phenylacetate catabolic pathway, annotated as 3-oxoadipyl-CoA/3-oxo-5,6-dehydrosuberyl-CoA
  thiolase. It is a CoA-thioester cleavage enzyme in an aromatic side route that overlaps KEGG benzoate
  maps but is distinct from the canonical pcaF terminal beta-ketoadipate thiolase.'
existing_annotations:
- term:
    id: GO:0003985
    label: acetyl-CoA C-acetyltransferase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000003
  qualifier: enables
  review:
    summary: Acetyl-CoA C-acetyltransferase activity is related thiolase chemistry but less
      informative than the aromatic-pathway thiolase annotation.
    action: KEEP_AS_NON_CORE
    reason: Keep as non-core because substrate specificity differs from a simple acetoacetyl-CoA
      thiolase.
- term:
    id: GO:0003988
    label: acetyl-CoA C-acyltransferase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: Acetyl-CoA C-acyltransferase activity is a broad thiolase term.
    action: KEEP_AS_NON_CORE
    reason: GO:0033812 and the phenylacetate process annotation better capture the pathway role.
- term:
