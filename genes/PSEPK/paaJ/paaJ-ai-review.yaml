core_functions:
- description: >-
    Thiolytically shortens 3-oxo-5,6-dehydrosuberyl-CoA to
    2,3-dehydroadipyl-CoA and acetyl-CoA in the first open-chain cleavage of
    aerobic phenylacetate catabolism.
  molecular_function:
