suggested_questions:
- question: What are the kinetic preferences of Q88HS3 for its two assigned pathway intermediates?
suggested_experiments:
- description: >-
    Purify Q88HS3 and compare thiolysis of
    3-oxo-5,6-dehydrosuberyl-CoA and 3-oxoadipyl-CoA, then measure both
    intermediates in a KT2440 paaJ mutant during growth on phenylacetate.
