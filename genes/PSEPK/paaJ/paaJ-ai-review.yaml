    summary: This broad acyltransferase grouping adds little beyond the thiolase-specific terms.
    action: MARK_AS_OVER_ANNOTATED
    reason: It is not useful as a core annotation.
- term:
    id: GO:0019619
    label: 3,4-dihydroxybenzoate catabolic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: involved_in
  review:
    summary: 3,4-dihydroxybenzoate catabolic process is not the primary pathway context for PaaJ.
    action: MARK_AS_OVER_ANNOTATED
    reason: PaaJ is better placed in phenylacetate catabolism; pcaF/pcaIJ cover the protocatechuate
