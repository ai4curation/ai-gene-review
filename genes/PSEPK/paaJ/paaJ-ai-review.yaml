taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: >-
  PaaJ is a thiolase-family 3-oxoadipyl-CoA/3-oxo-5,6-dehydrosuberyl-CoA
  thiolase in Pseudomonas putida KT2440. In aerobic phenylacetate catabolism
  it catalyzes both thiolytic shortenings of the ring-opened carbon skeleton:
  first releasing acetyl-CoA from 3-oxo-5,6-dehydrosuberyl-CoA and finally
  cleaving 3-oxoadipyl-CoA to succinyl-CoA and acetyl-CoA.
