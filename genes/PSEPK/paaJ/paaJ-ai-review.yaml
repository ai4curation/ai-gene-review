  qualifier: involved_in
  review:
    summary: Fatty acid beta-oxidation is not the core process for PaaJ.
    action: REMOVE
    reason: PaaJ belongs to phenylacetate/aromatic acyl-CoA catabolism rather than canonical
      fatty-acid beta-oxidation.
- term:
