id: Q88N78
gene_symbol: murD
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: MurD is the UDP-N-acetylmuramoylalanine-D-glutamate ligase of Pseudomonas putida KT2440. It uses ATP to add D-glutamate to the UDP-N-acetylmuramoyl-L-alanine peptidoglycan precursor, acting in bacterial cell-wall precursor assembly.
existing_annotations:
- term:
    id: GO:0005524
    label: ATP binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: ATP binding is biochemically correct for MurD but is cofactor/substrate context rather than the core function.
    action: KEEP_AS_NON_CORE
    reason: MurD is an ATP-dependent ligase. Retain ATP binding as non-core context while using the specific UDP-N-acetylmuramoylalanine-D-glutamate ligase activity as the core molecular function.
    supported_by:
    - reference_id: file:PSEPK/murD/murD-uniprot.txt
      supporting_text: Reaction=UDP-N-acetyl-alpha-D-muramoyl-L-alanine + D-glutamate + ATP =
