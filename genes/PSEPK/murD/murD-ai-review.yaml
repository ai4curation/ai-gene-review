  qualifier: located_in
  review:
    summary: Cytoplasm is the expected location for MurD but is non-core localization context.
    action: KEEP_AS_NON_CORE
    reason: UniProt places MurD in the cytoplasm, consistent with soluble peptidoglycan precursor synthesis. This should be retained as context rather than treated as the defining function.
