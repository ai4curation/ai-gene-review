description: >-
  MurD is the cytoplasmic UDP-N-acetylmuramoyl-L-alanine-D-glutamate ligase of
  Pseudomonas putida KT2440. It uses ATP to add D-glutamate to the MurC product
  during assembly of the peptidoglycan stem peptide.
