id: Q88CQ7
gene_symbol: coaD
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: >-
  coaD (PP_5123) encodes the soluble bacterial phosphopantetheine
  adenylyltransferase (PPAT) that reversibly transfers an adenylyl group from
  ATP to 4'-phosphopantetheine, producing 3'-dephospho-CoA and diphosphate.
  This is the fourth of five reactions that convert pantothenate to coenzyme A.
  Q88CQ7 is a compact CoaD-family homohexamer with the conserved PPAT domains
  and catalytic-site features; direct kinetics have not been reported for the
  KT2440 protein.
