description: proC (PP_3778) encodes pyrroline-5-carboxylate reductase (P5CR; EC 1.5.1.2), the enzyme catalyzing the final step of L-proline biosynthesis. It reduces (S)-1-pyrroline-5-carboxylate (P5C) to L-proline using NAD(P)H as the electron donor. This step converts the cyclized intermediate derived from L-glutamate 5-semialdehyde into proline, completing the glutamate-to-proline biosynthetic route. The enzyme is a soluble cytoplasmic protein and provides proline for protein synthesis and for osmotic adaptation in P. putida.
