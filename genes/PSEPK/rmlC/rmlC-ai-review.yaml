id: Q88R69
gene_symbol: rmlC
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: >-
  rmlC (PP_0265) encodes a cytosolic dTDP-4-dehydrorhamnose 3,5-epimerase in
  Pseudomonas putida KT2440. It epimerizes the C3 and C5 positions of the
  deoxy-keto dTDP-sugar intermediate to form dTDP-4-dehydro-beta-L-rhamnose,
  feeding the final reductase step of dTDP-L-rhamnose biosynthesis. Pseudomonas
  putida KT2440 also encodes the paralogous epimerase rfbC, which catalyzes the
  same 3,5-epimerization reaction.
