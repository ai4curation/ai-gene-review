    id: GO:0005737
    label: cytoplasm
  evidence_type: IEA
  original_reference_id: GO_REF:0000118
  qualifier: located_in
  review:
    summary: Cytoplasm is plausible for PP_1255, but it is supporting localization context rather than the core function.
    action: KEEP_AS_NON_CORE
    reason: The TreeGrafter cytoplasm annotation is consistent with a soluble bacterial hydroxyproline catabolic oxidoreductase, but the current functional signal is the predicted cis-4-hydroxy-D-proline oxidase/oxidoreductase activity.
