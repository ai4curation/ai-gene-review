  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: PP_1255 is a predicted cis-4-hydroxy-D-proline oxidase in the P. putida KT2440 hydroxyproline side-route region. Current evidence supports a first-pass oxidoreductase assignment for this soluble cytoplasmic enzyme, but a substrate-specific GO molecular-function term is not yet available in the local GOA record.
