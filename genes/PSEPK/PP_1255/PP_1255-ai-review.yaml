- term:
    id: GO:0016491
    label: oxidoreductase activity
  evidence_type: IEA
  original_reference_id: file:PSEPK/PP_1255/PP_1255-uniprot.txt
  qualifier: enables
  review:
    summary: A generic oxidoreductase activity annotation should be added pending a more specific hydroxy-D-proline oxidase GO term.
    action: NEW
    reason: UniProt lists PP_1255 as a cis-4-hydroxy-D-proline oxidase with EC 1.5.1.- and carries GO:0016491 by keyword. The Asta retrieval returns the same protein description. This supports oxidoreductase activity as the current conservative molecular-function annotation.
