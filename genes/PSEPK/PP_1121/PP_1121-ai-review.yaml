description: PP_1121 encodes an OmpA-family outer-membrane protein in Pseudomonas putida KT2440. A TSP type-3 repeat supports
  a calcium-binding inference, but the main curated role at this stage is envelope-localized OmpA-family context rather than
  a defined transport or remodeling pathway.
