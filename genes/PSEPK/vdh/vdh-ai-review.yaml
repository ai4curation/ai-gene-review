taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: vdh encodes vanillin dehydrogenase (EC 1.2.1.67), an aldehyde dehydrogenase-family enzyme in Pseudomonas putida KT2440
  that oxidizes vanillin to vanillate in lignin-derived hydroxycinnamate/ferulate catabolism. In ppu00627 it is aromatic side-funnel
  context rather than a dedicated aminobenzoate degradation enzyme.
