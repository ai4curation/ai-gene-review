id: Q88H28
gene_symbol: pobA
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: >-
  pobA encodes an FAD-dependent 4-hydroxybenzoate 3-monooxygenase that uses NADPH
  and molecular oxygen to hydroxylate 4-hydroxybenzoate to 3,4-dihydroxybenzoate
  (protocatechuate). This is a peripheral aromatic-catabolic step that feeds the
  protocatechuate branch of aromatic degradation rather than the unsubstituted
  benzoate-to-catechol branch.
existing_annotations:
- term:
    id: GO:0016491
    label: oxidoreductase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  review:
    summary: >-
      PobA is certainly an oxidoreductase, but this term is only a very broad parent
      of the much more informative catalytic term GO:0018659. The UniProt entry and
      KT2440 literature both identify PobA specifically as a 4-hydroxybenzoate
      3-monooxygenase.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      The term is technically correct but too general to be useful once the specific
      substrate-defined monooxygenase activity is present.
    supported_by:
      - reference_id: file:PSEPK/pobA/pobA-uniprot.txt
        supporting_text: "RecName: Full=4-hydroxybenzoate 3-monooxygenase; EC=1.14.13.2"
- term:
    id: GO:0016709
    label: oxidoreductase activity, acting on paired donors, with incorporation or reduction of molecular oxygen, NAD(P)H as one donor, and incorporation of one atom of oxygen
  evidence_type: IEA
  original_reference_id: GO_REF:0000117
  review:
    summary: >-
      This class-level monooxygenase term is mechanistically consistent with PobA,
      which is an FAD/NADPH-dependent oxygenase. However, GO:0018659 already captures
      the exact substrate-specific reaction carried out by this enzyme.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      The annotation is redundant with the more precise 4-hydroxybenzoate
      3-monooxygenase activity term and adds little biological specificity.
    supported_by:
      - reference_id: file:PSEPK/pobA/pobA-deep-research-falcon.md
        supporting_text: "PobA is the 4-HBA -> PCA gateway enzyme in KT2440"
- term:
    id: GO:0018659
    label: 4-hydroxybenzoate 3-monooxygenase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  review:
    summary: >-
      This is the core catalytic function of PobA. The enzyme is explicitly identified
      as 4-hydroxybenzoate 3-monooxygenase in UniProt, and KT2440-focused literature
      describes the PobA reaction as conversion of 4-hydroxybenzoate to
      3,4-dihydroxybenzoate/protocatechuate using oxygen, FAD, and NADPH.
    action: ACCEPT
    reason: >-
      The term precisely matches the known biochemical activity and is the most
      informative molecular-function annotation for this gene.
    supported_by:
      - reference_id: file:PSEPK/pobA/pobA-uniprot.txt
        supporting_text: "RecName: Full=4-hydroxybenzoate 3-monooxygenase; EC=1.14.13.2"
      - reference_id: file:PSEPK/pobA/pobA-deep-research-falcon.md
        supporting_text: "PobA catalyzing 4-HBA -> PCA with NADPH and O2"
- term:
    id: GO:0018874
    label: benzoate metabolic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000104
  review:
    summary: >-
      This biological-process assignment is likely an automated substrate overgeneralization.
      PobA acts on 4-hydroxybenzoate, not unsubstituted benzoate, and produces
      protocatechuate. That places the enzyme on the hydroxybenzoate/protocatechuate
      branch rather than generic benzoate metabolism.
    action: REMOVE
    reason: >-
      The substrate specificity is wrong for plain benzoate metabolism. A product-centric
      process such as 3,4-dihydroxybenzoate biosynthetic/metabolic process is a closer
      representation, and GO currently lacks a clean 4-hydroxybenzoate catabolic term.
    supported_by:
      - reference_id: file:PSEPK/pobA/pobA-deep-research-falcon.md
        supporting_text: "feeds the protocatechuate branch rather than benzoate-to-catechol"
- term:
    id: GO:0043639
    label: benzoate catabolic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: >-
      This annotation points to the wrong peripheral branch. Benzoate catabolism in
      KT2440 is associated with conversion of benzoate to catechol, whereas PobA
      converts 4-hydroxybenzoate to protocatechuate.
    action: REMOVE
    reason: >-
      There is no evidence here for direct participation in unsubstituted benzoate
      catabolism, and the annotation likely arose from family-level transfer rather
      than the actual substrate handled by PobA.
    supported_by:
      - reference_id: file:PSEPK/pobA/pobA-deep-research-falcon.md
        supporting_text: "PobA catalyzes 4-HBA -> PCA, not benzoate -> catechol"
- term:
    id: GO:0050660
    label: flavin adenine dinucleotide binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: >-
      PobA binds FAD as an obligate cofactor. The UniProt entry records a crystal
      structure of KT2440 PobA in complex with FAD and lists multiple FAD-contacting
      residues.
    action: ACCEPT
    reason: >-
      FAD binding is a direct, mechanistically central molecular property of the
      enzyme and is well supported by structural evidence.
    supported_by:
      - reference_id: file:PSEPK/pobA/pobA-uniprot.txt
        supporting_text: "X-RAY CRYSTALLOGRAPHY (2.20 ANGSTROMS) IN COMPLEX WITH FAD"
      - reference_id: file:PSEPK/pobA/pobA-uniprot.txt
        supporting_text: "BINDING 13 /ligand=\"FAD\""
- term:
    id: GO:0071949
    label: FAD binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: >-
      This annotation describes the same cofactor-binding function as GO:0050660.
      Keeping both terms would duplicate the same molecular property without adding
      biological specificity.
    action: REMOVE
    reason: >-
      GO:0050660 is the clearer and more descriptive FAD-binding term, so GO:0071949
      is best treated as a redundant duplicate here.
    supported_by:
      - reference_id: file:PSEPK/pobA/pobA-uniprot.txt
        supporting_text: "KW   FAD"
references:
- id: GO_REF:0000002
  title: Gene Ontology annotation through association of InterPro records with GO terms
  findings:
    - statement: InterPro correctly identifies PobA as a flavin-dependent monooxygenase scaffold and supports FAD binding.
    - statement: InterPro-derived biological-process transfer overreaches when it assigns PobA to unsubstituted benzoate catabolism.
- id: GO_REF:0000104
  title: Electronic Gene Ontology annotations created by transferring manual GO annotations between related proteins based on shared sequence features
  findings:
    - statement: Sequence-transfer rules recover broad pathway placement but can blur the important substrate distinction between benzoate and 4-hydroxybenzoate branches.
- id: GO_REF:0000117
  title: Electronic Gene Ontology annotations created by ARBA machine learning models
  findings:
    - statement: ARBA correctly places PobA among NAD(P)H-dependent oxygenases, but the substrate-specific monooxygenase term is the key curation outcome.
- id: GO_REF:0000120
  title: Combined Automated Annotation using Multiple IEA Methods.
  findings:
    - statement: Combined IEA methods correctly recover the exact monooxygenase activity term GO:0018659.
- id: PMID:12534463
  title: Complete genome sequence and comparative analysis of the metabolically versatile Pseudomonas putida KT2440.
  findings:
    - statement: Establishes pobA/PP_3537 as part of the KT2440 genome.
- id: DOI:10.1107/S2053230X19008653
  title: Structural comparison of p-hydroxybenzoate hydroxylase (PobA) from Pseudomonas putida with PobA from other Pseudomonas spp. and other monooxygenases.
  findings:
    - statement: Provides a KT2440 PobA crystal structure with bound FAD and supports classification as a flavin-dependent monooxygenase.
- id: DOI:10.1007/s00253-017-8211-y
  title: Conversion of lignin model compounds by Pseudomonas putida KT2440 and isolates from compost.
  findings:
    - statement: Places PobA at the 4-hydroxybenzoate-to-protocatechuate step in the KT2440 aromatic degradation map.
    - statement: Supports NADPH and oxygen use for the KT2440 pathway step.
- id: DOI:10.1016/j.ymben.2021.12.010
  title: Pseudomonas putida KT2440 engineered for efficient salicylate and gentisate production from lignin-derived para-coumarate.
  findings:
    - statement: Describes PobA in KT2440 as converting 4-hydroxybenzoic acid to 3,4-dihydroxybenzoic acid.
    - statement: Reinforces NADPH-dependent hydroxylation chemistry for the KT2440 enzyme.
- id: file:PSEPK/pobA/pobA-deep-research-falcon.md
  title: Deep research summary for pobA
  findings:
    - statement: Identifies PobA as the 4-HBA-to-PCA gateway enzyme in KT2440.
    - statement: Places PobA in the protocatechuate branch of aromatic degradation rather than the benzoate-to-catechol branch.
    - statement: Infers cytosolic localization for the soluble flavin monooxygenase.
- id: file:PSEPK/pobA/pobA-uniprot.txt
  title: UniProt entry Q88H28
  findings:
    - statement: Identifies PobA as EC 1.14.13.2 4-hydroxybenzoate 3-monooxygenase.
    - statement: Lists PDB 6DLL and multiple FAD-binding features for the KT2440 protein.
core_functions:
- description: >-
    PobA is an FAD-dependent monooxygenase that uses NADPH and molecular oxygen
    to hydroxylate 4-hydroxybenzoate to 3,4-dihydroxybenzoate (protocatechuate),
    supplying the protocatechuate branch of aromatic compound degradation.
  molecular_function:
    id: GO:0018659
    label: 4-hydroxybenzoate 3-monooxygenase activity
  directly_involved_in:
    - id: GO:0046279
      label: 3,4-dihydroxybenzoate biosynthetic process
  supported_by:
    - reference_id: file:PSEPK/pobA/pobA-deep-research-falcon.md
      supporting_text: "PobA catalyzing 4-HBA -> PCA with NADPH and O2"
    - reference_id: file:PSEPK/pobA/pobA-uniprot.txt
      supporting_text: "RecName: Full=4-hydroxybenzoate 3-monooxygenase; EC=1.14.13.2"
- description: >-
    PobA noncovalently binds FAD as the catalytic flavin cofactor required for
    oxygen activation during monooxygenase chemistry.
  molecular_function:
    id: GO:0050660
    label: flavin adenine dinucleotide binding
  directly_involved_in:
    - id: GO:0046279
      label: 3,4-dihydroxybenzoate biosynthetic process
  supported_by:
    - reference_id: file:PSEPK/pobA/pobA-uniprot.txt
      supporting_text: "X-RAY CRYSTALLOGRAPHY (2.20 ANGSTROMS) IN COMPLEX WITH FAD"
proposed_new_terms:
  - proposed_name: 4-hydroxybenzoate catabolic process
    proposed_definition: >-
      The chemical reactions and pathways resulting in the breakdown of
      4-hydroxybenzoate, beginning with its hydroxylation to 3,4-dihydroxybenzoate
      (protocatechuate) and continuing through downstream aromatic catabolic steps.
    justification: >-
      Existing GO terms capture benzoate catabolism and 3,4-dihydroxybenzoate
      metabolism, but they do not provide a substrate-specific term for the
      4-hydroxybenzoate branch. This gap encourages incorrect automated transfer of
      PobA annotations to benzoate catabolic process.
    proposed_parent:
      id: GO:0009056
      label: catabolic process
    supported_by:
      - reference_id: file:PSEPK/pobA/pobA-deep-research-falcon.md
        supporting_text: "PobA is the 4-HBA -> PCA gateway enzyme in KT2440"
suggested_questions:
  - question: Which regulator directly controls pobA transcription in KT2440 during growth on 4-hydroxybenzoate?
  - question: Is PobA the only physiologically relevant route from 4-hydroxybenzoate to protocatechuate under standard laboratory conditions?
suggested_experiments:
  - hypothesis: PobA is required for growth on 4-hydroxybenzoate but dispensable for growth on downstream protocatechuate.
    description: Construct a clean delta-pobA mutant and compare growth plus extracellular metabolite profiles on benzoate, 4-hydroxybenzoate, and protocatechuate.
    experiment_type: microbial growth assay with targeted metabolomics
  - hypothesis: pobA induction is specific to the 4-hydroxybenzoate branch and not to unsubstituted benzoate catabolism.
    description: Measure pobA, pca, and ben operon transcript levels by RT-qPCR or RNA-seq after shifting KT2440 cells to benzoate versus 4-hydroxybenzoate.
    experiment_type: transcriptional profiling
  - hypothesis: FAD-binding residues observed in the KT2440 structure are required for catalytic turnover.
    description: Mutate selected FAD-contacting residues from the UniProt/PDB annotation and assay recombinant enzyme activity with 4-hydroxybenzoate and NADPH.
    experiment_type: site-directed mutagenesis with enzyme kinetics
