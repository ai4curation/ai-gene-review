description: glmS encodes glutamine--fructose-6-phosphate aminotransferase (GlmS; EC 2.6.1.16), the cytoplasmic first enzyme
  of hexosamine/amino-sugar biosynthesis that converts fructose 6-phosphate and glutamine to glucosamine 6-phosphate and glutamate.
