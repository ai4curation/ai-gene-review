- id: file:PSEPK/eco/eco-deep-research-falcon.md
  title: Falcon (Edison Scientific) deep research report for eco (Q88IC7, PP_3072)
  findings:
  - statement: |-
      Ecotin is a bacterial (and more broadly microbial) **serine protease inhibitor** originally described in *E. coli* and classified as **MEROPS family I11**.
    reference_section_type: OTHER
  - statement: |-
      best understood as a **periplasmic, signal-peptide-directed, broad-spectrum inhibitor of trypsin-fold (S1A) serine proteases** that protects Gram-negative bacteria from **exogenous proteolytic attack**
    reference_section_type: OTHER
  - statement: |-
      A defining mechanistic concept is that ecotin forms a **contralateral dimer**, and this dimer binds **two protease molecules** to form a **2:2 heterotetrameric complex**
    reference_section_type: OTHER
  - statement: |-
      Ecotin’s **primary function** is inhibition of **trypsin-fold serine proteases** (S1A) rather than catalysis
    reference_section_type: OTHER
  - statement: |-
      Ecotin is described as a **periplasmic** inhibitor and is associated with a **signal peptide** for export to the periplasm, consistent with the “precursor” concept in UniProt-style annotations.
    reference_section_type: OTHER
  - statement: |-
      *P. putida* is explicitly named as an ecotin-containing species in Eggers et al., supporting that *P. putida* encodes an ecotin ortholog.
    reference_section_type: OTHER
