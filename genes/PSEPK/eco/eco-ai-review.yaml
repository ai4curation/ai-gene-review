      supporting_text: |-
        Ecotin’s **primary function** is inhibition of **trypsin-fold serine proteases** (S1A) rather than catalysis
- term:
    id: GO:0042597
    label: periplasmic space
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  review:
    summary: The periplasmic-space annotation is correct for ecotin.
    action: KEEP_AS_NON_CORE
    reason: Ecotin is periplasmic, which is relevant to its exposure to extracellular/periplasmic proteases, but the location
      is secondary to the inhibitor activity.
    supported_by:
    - reference_id: file:PSEPK/eco/eco-uniprot.txt
      supporting_text: 'SUBCELLULAR LOCATION: Periplasm'
    - reference_id: file:PSEPK/eco/eco-goa.tsv
      supporting_text: "GO:0042597\tperiplasmic space"
    - reference_id: file:PSEPK/eco/eco-deep-research-falcon.md
      supporting_text: |-
        Ecotin is described as a **periplasmic** inhibitor and is associated with a **signal peptide** for export to the periplasm, consistent with the “precursor” concept in UniProt-style annotations.
    - reference_id: file:PSEPK/eco/eco-deep-research-falcon.md
      supporting_text: |-
        The most likely core localization of Q88IC7 is the **periplasm**, consistent with ecotin being synthesized with an N-terminal signal peptide and functioning as a periplasmic inhibitor that protects the cell envelope from exogenous serine proteases.
