id: P59479
gene_symbol: lexA2
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: lexA2 encodes one of two P. putida LexA repressors. LexA2 is a DNA-binding transcriptional repressor with LexA-family autocleavage activity; literature indicates it mainly regulates its own imuA-imuB-dnaE2 transcriptional unit and a resident prophage gene rather than the conventional LexA1 SOS regulon.
