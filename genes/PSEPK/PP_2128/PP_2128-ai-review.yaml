suggested_questions:
- question: Which methyl-accepting chemotaxis receptors require PP_2128 for signaling or adaptation?
- question: Does PP_2128 act redundantly with the other CheV-like proteins in KT2440 or in
    a distinct chemosensory branch?
suggested_experiments:
- description: Delete PP_2128 alone and in combination with other CheV-like genes, then measure
    chemotaxis toward malate, amino acids, and root-exudate mixtures.
- description: Map PP_2128 interaction partners among KT2440 MCPs and CheA/CheW-like proteins.
