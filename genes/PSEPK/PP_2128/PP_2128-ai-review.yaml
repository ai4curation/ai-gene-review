core_functions:
- description: PP_2128 is a CheV-like chemotaxis accessory candidate with an N-terminal CheW-like
    adaptor region and a C-terminal receiver domain. It is retained as part of the chemotaxis
    adaptation/accessory boundary rather than the core CheA/CheY/CheZ/CheB1 cluster.
