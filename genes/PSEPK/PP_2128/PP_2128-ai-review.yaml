  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: PP_2128 encodes a predicted CheV-like chemotaxis accessory protein in Pseudomonas
  putida KT2440. The protein has a CheW-like adaptor domain and a receiver-domain response-regulator
  region, consistent with a non-core chemotaxis signaling/adaptation role. Its specific receptor
  partners and relationship to the PP_4332-PP_4340 core Che cluster remain unresolved in this
  first pass.
