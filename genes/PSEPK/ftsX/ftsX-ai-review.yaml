  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: ftsX encodes the multi-pass inner-membrane component of the FtsEX ABC-like cell-division complex. UniProt identifies FtsX as part of FtsEX, places it in the cell inner membrane, and assigns FtsX-specific cell-division domains and PANTHER family membership. The supported core role is participation in cell division at the membrane/division site rather than transport of a defined substrate.
