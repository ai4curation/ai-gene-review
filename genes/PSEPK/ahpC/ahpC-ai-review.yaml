suggested_questions:
- question: >-
    What is the in vivo substrate preference of P. putida AhpC for hydrogen
    peroxide versus organic hydroperoxides under different stress conditions?
- question: >-
    Does P. putida AhpC function exclusively with AhpF in vivo, or can it also
    draw reducing equivalents from thioredoxin-dependent systems?
suggested_experiments:
- description: >-
    Purify P. putida AhpC together with AhpF and measure steady-state kinetics
    against hydrogen peroxide and several organic hydroperoxides to resolve
    substrate preference and donor coupling.
  experiment_type: Enzyme kinetics with purified proteins
  hypothesis: >-
    P. putida AhpC will show higher catalytic efficiency toward organic
    hydroperoxides than toward hydrogen peroxide under AhpF/NADH-coupled assay
    conditions.
- description: >-
    Construct an ahpC deletion mutant and quantify growth, survival, and oxidant
    sensitivity during exposure to hydrogen peroxide, tert-butyl hydroperoxide,
    phenol, and toluene, followed by complementation with wild-type ahpC.
  experiment_type: Targeted knockout and stress-phenotyping assay
  hypothesis: >-
    Loss of ahpC will disproportionately sensitize P. putida to organic
    hydroperoxides and solvent-associated oxidative stress.
