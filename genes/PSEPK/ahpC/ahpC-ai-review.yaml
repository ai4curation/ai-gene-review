id: Q88K52
gene_symbol: ahpC
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: >-
  ahpC encodes the cytoplasmic peroxiredoxin/alkyl hydroperoxide reductase C
  subunit of the AhpCF peroxide-detoxification system in Pseudomonas putida
  KT2440. It reduces hydrogen peroxide and organic hydroperoxides, contributes
  to cellular oxidant detoxification and oxidative-stress defense, and is under
  OxyR control.
existing_annotations:
- term:
    id: GO:0004601
    label: peroxidase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  review:
    summary: >-
      This annotation is directionally correct, but it is too generic for an
      AhpC-family peroxiredoxin. More specific peroxiredoxin terms are available
      and better capture the chemistry and family assignment of this protein.
    action: MODIFY
    reason: >-
      AhpC is not just any peroxidase; it is specifically a peroxiredoxin/AhpC
      family peroxide reductase.
    proposed_replacement_terms:
    - id: GO:0051920
      label: peroxiredoxin activity
    supported_by:
    - reference_id: file:PSEPK/ahpC/ahpC-uniprot.txt
      supporting_text: >-
        Thiol-specific peroxidase that catalyzes the reduction of hydrogen
        peroxide and organic hydroperoxides to water and alcohols,
        respectively.
- term:
    id: GO:0005737
    label: cytoplasm
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  review:
    summary: >-
      Cytoplasmic localization is consistent with the UniProt record and with
      the role of AhpC as a soluble intracellular peroxide-detoxification
      enzyme.
    action: ACCEPT
    reason: >-
      The available evidence supports AhpC as a soluble cytoplasmic protein.
    supported_by:
    - reference_id: file:PSEPK/ahpC/ahpC-uniprot.txt
      supporting_text: "SUBCELLULAR LOCATION: Cytoplasm"
- term:
    id: GO:0005829
    label: cytosol
  evidence_type: IEA
  original_reference_id: GO_REF:0000118
  review:
    summary: >-
      This localization is not implausible, but for a bacterial protein it is
      largely redundant with the broader cytoplasm term already present in the
      annotation set.
    action: MODIFY
    reason: >-
      Cytoplasm is the clearer and less redundant cellular component term for
      this bacterial enzyme.
    proposed_replacement_terms:
    - id: GO:0005737
      label: cytoplasm
    supported_by:
    - reference_id: file:PSEPK/ahpC/ahpC-uniprot.txt
      supporting_text: "SUBCELLULAR LOCATION: Cytoplasm"
- term:
    id: GO:0006979
    label: response to oxidative stress
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  review:
    summary: >-
      AhpC is clearly part of the peroxide-stress response network in P.
      putida, but this biological-process term is broader than the protein's
      direct core activity in oxidant detoxification.
    action: KEEP_AS_NON_CORE
    reason: >-
      The annotation is supported, but more specific detoxification terms better
      capture the direct evolved function of AhpC.
    supported_by:
    - reference_id: PMID:15352239
      supporting_text: >-
        The up-regulated proteins include proteins involved in the: (i)
        oxidative stress response (AhpC, SodB,Tpx and Dsb)
    - reference_id: PMID:17107553
      supporting_text: >-
        These results are consistent with the conclusion, distinct from those
        observed in an opportunistic pathogen Pseudomonas aeruginosa, that OxyR
        controlled expression of all the principal peroxide-degrading enzymes in
        P. putida.
- term:
    id: GO:0008379
    label: thioredoxin peroxidase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000118
  review:
    summary: >-
      AhpC is a peroxide-reducing peroxiredoxin, but this thioredoxin-specific
      donor term is not the best fit for the P. putida AhpC protein, which
      functions in the AhpCF system and is paired with the dedicated reductase
      AhpF.
    action: MODIFY
    reason: >-
      A donor-independent peroxiredoxin term is safer for the AhpC subunit
      itself than a thioredoxin-specific term.
    proposed_replacement_terms:
    - id: GO:0051920
      label: peroxiredoxin activity
    supported_by:
    - reference_id: PMID:12483614
      supporting_text: >-
        The most abundantly produced 24-kDa soluble protein was found to be
        similar to AhpC, the small subunit of alkyl hydroperoxide reductase.
    - reference_id: file:PSEPK/ahpC/ahpC-deep-research-falcon.md
      supporting_text: >-
        In P. putida, the AhpC catalytic cycle is coupled to a dedicated
        reductase AhpF, characterized as a flavoprotein/disulfide reductase that
        uses NADH as the reducing equivalent to restore AhpC from its oxidized
        form.
- term:
    id: GO:0016209
    label: antioxidant activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: >-
      Antioxidant activity is consistent with AhpC biology, but it is a very
      broad parent molecular-function term compared with the more informative
      peroxiredoxin-specific annotations.
    action: KEEP_AS_NON_CORE
    reason: >-
      The annotation is not wrong, but it should not be treated as the primary
      functional statement when more specific child terms are available.
    supported_by:
    - reference_id: file:PSEPK/ahpC/ahpC-uniprot.txt
      supporting_text: >-
        Plays a role in cell protection against oxidative stress by detoxifying
        peroxides.
- term:
    id: GO:0016491
    label: oxidoreductase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: >-
      AhpC is an oxidoreductase in the broadest sense, but this label is too
      unspecific to be useful for curation when peroxiredoxin-specific terms are
      available.
    action: MODIFY
    reason: >-
      A more specific molecular-function term should replace this overly broad
      parent annotation.
    proposed_replacement_terms:
    - id: GO:0051920
      label: peroxiredoxin activity
    supported_by:
    - reference_id: file:PSEPK/ahpC/ahpC-uniprot.txt
      supporting_text: >-
        Thiol-specific peroxidase that catalyzes the reduction of hydrogen
        peroxide and organic hydroperoxides to water and alcohols,
        respectively.
- term:
    id: GO:0033554
    label: cellular response to stress
  evidence_type: IEA
  original_reference_id: GO_REF:0000118
  review:
    summary: >-
      This high-level stress-response term is broadly consistent with the
      experimental literature, but it is much less informative than the
      oxidant-detoxification and oxidative-stress terms.
    action: KEEP_AS_NON_CORE
    reason: >-
      The term is valid but too broad to count as a core functional summary.
    supported_by:
    - reference_id: PMID:15352239
      supporting_text: >-
        The up-regulated proteins include proteins involved in the: (i)
        oxidative stress response (AhpC, SodB,Tpx and Dsb)
- term:
    id: GO:0042744
    label: hydrogen peroxide catabolic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000118
  review:
    summary: >-
      AhpC does participate in hydrogen peroxide detoxification, but the
      protein's documented substrate range is broader and includes organic
      hydroperoxides, so the current process term is too narrow as the main
      biological-process statement.
    action: MODIFY
    reason: >-
      A broader oxidant-detoxification term better reflects the known chemistry
      of AhpC.
    proposed_replacement_terms:
    - id: GO:0098869
      label: cellular oxidant detoxification
    supported_by:
    - reference_id: file:PSEPK/ahpC/ahpC-uniprot.txt
      supporting_text: >-
        Thiol-specific peroxidase that catalyzes the reduction of hydrogen
        peroxide and organic hydroperoxides to water and alcohols,
        respectively.
- term:
    id: GO:0045454
    label: cell redox homeostasis
  evidence_type: IEA
  original_reference_id: GO_REF:0000118
  review:
    summary: >-
      AhpC contributes to maintenance of the intracellular redox environment,
      but this systems-level term is broader than the direct peroxide-reducing
      role of the enzyme.
    action: KEEP_AS_NON_CORE
    reason: >-
      The annotation is plausible and useful context, but it is secondary to the
      direct detoxification activity.
    supported_by:
    - reference_id: file:PSEPK/ahpC/ahpC-uniprot.txt
      supporting_text: >-
        Plays a role in cell protection against oxidative stress by detoxifying
        peroxides.
- term:
    id: GO:0051920
    label: peroxiredoxin activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  review:
    summary: >-
      This is the best existing GO molecular-function term for AhpC. The UniProt
      record, domain architecture, and the primary literature all support AhpC
      as an AhpC/Prx1-family peroxide-reducing peroxiredoxin.
    action: ACCEPT
    reason: >-
      This term captures the core catalytic identity of the protein without
      overcommitting to donor-specific chemistry at the single-gene-product
      level.
    supported_by:
    - reference_id: file:PSEPK/ahpC/ahpC-uniprot.txt
      supporting_text: >-
        Belongs to the peroxiredoxin family. AhpC/Prx1 subfamily.
    - reference_id: PMID:12483614
      supporting_text: >-
        The most abundantly produced 24-kDa soluble protein was found to be
        similar to AhpC, the small subunit of alkyl hydroperoxide reductase.
- term:
    id: GO:0098869
    label: cellular oxidant detoxification
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  review:
    summary: >-
      This term best captures the direct biological-process role of AhpC in
      peroxide removal. The enzyme detoxifies peroxides and is part of the
      OxyR-controlled peroxide-defense system in P. putida.
    action: ACCEPT
    reason: >-
      The process term aligns with both the known chemistry of the enzyme and
      the regulatory/physiological evidence from P. putida.
    supported_by:
    - reference_id: file:PSEPK/ahpC/ahpC-uniprot.txt
      supporting_text: >-
        Plays a role in cell protection against oxidative stress by detoxifying
        peroxides.
    - reference_id: PMID:17107553
      supporting_text: >-
        These results are consistent with the conclusion, distinct from those
        observed in an opportunistic pathogen Pseudomonas aeruginosa, that OxyR
        controlled expression of all the principal peroxide-degrading enzymes in
        P. putida.
- term:
    id: GO:0102039
    label: NADH-dependent peroxiredoxin activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  review:
    summary: >-
      This term likely reflects the chemistry of the AhpCF system rather than
      the AhpC subunit alone. AhpC is the peroxiredoxin component, whereas AhpF
      provides the NADH-linked reductant flow.
    action: MODIFY
    reason: >-
      For the single gene product ahpC, a donor-independent peroxiredoxin term
      is more defensible than a system-level NADH-dependent term.
    proposed_replacement_terms:
    - id: GO:0051920
      label: peroxiredoxin activity
    supported_by:
    - reference_id: PMID:12483614
      supporting_text: >-
        Molecular cloning of the P. putida ahpC based on the N-terminal sequence
        allowed cloning of closely located ahpF, the large subunit of alkyl
        hydroperoxide reductase.
    - reference_id: file:PSEPK/ahpC/ahpC-deep-research-falcon.md
      supporting_text: >-
        In P. putida, the AhpC catalytic cycle is coupled to a dedicated
        reductase AhpF, characterized as a flavoprotein/disulfide reductase that
        uses NADH as the reducing equivalent to restore AhpC from its oxidized
        form.
