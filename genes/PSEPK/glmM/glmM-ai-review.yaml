taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: glmM encodes phosphoglucosamine mutase in Pseudomonas putida KT2440. It converts glucosamine-6-phosphate to glucosamine-1-phosphate in UDP-N-acetylglucosamine biosynthesis, supplying amino-sugar precursors for peptidoglycan and other cell-envelope pathways.
