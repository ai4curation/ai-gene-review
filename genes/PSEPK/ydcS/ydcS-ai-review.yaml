suggested_questions:
- question: What substrate range is transported by the ydcVUTS importer containing ydcS, and how does it divide uptake of putrescine, spermidine, norspermidine, and related polyamines from other P. putida polyamine systems?
suggested_experiments:
- description: Measure purified ydcS ligand binding and compare deletion/complementation phenotypes for uptake or growth responses to putrescine, spermidine, norspermidine, and related polyamines.
  experiment_type: targeted polyamine-binding and uptake assay
