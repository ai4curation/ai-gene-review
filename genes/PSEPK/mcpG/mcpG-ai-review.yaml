  original_reference_id: GO_REF:0000002
  qualifier: involved_in
  review:
    summary: Signal transduction is correct but less informative than chemotaxis and receptor
      activity.
    action: KEEP_AS_NON_CORE
    reason: MCP receptors transduce ligand information across the membrane, but the specific
      biological role is chemotaxis.
    supported_by:
