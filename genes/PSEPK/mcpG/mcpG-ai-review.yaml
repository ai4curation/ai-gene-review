  review:
    summary: Transmembrane signaling receptor activity is the appropriate broad molecular-function
      term for an MCP chemoreceptor.
    action: ACCEPT
    reason: GO lacks substrate-specific bacterial MCP receptor activity terms for these chemoeffectors,
      so GO:0004888 is the best available MF term.
