taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: mcpG encodes an inner-membrane methyl-accepting chemotaxis receptor that specifically
  recognizes gamma-aminobutyric acid (GABA). It mediates GABA chemotaxis and contributes to
  plant-root colonization behavior in Pseudomonas putida KT2440.
