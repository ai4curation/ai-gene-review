  review:
    summary: The chemotaxis process annotation is appropriate for this GABA MCP receptor.
    action: ACCEPT
    reason: mcpG is a methyl-accepting chemotaxis receptor in the named KT2440 receptor panel.
      The ligand is GABA; for ctpL the ligand remains unresolved, but the MCP-family evidence
      supports a chemotaxis receptor role.
