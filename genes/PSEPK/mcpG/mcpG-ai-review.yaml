    action: MARK_AS_OVER_ANNOTATED
    reason: The more specific GO:0005886 plasma membrane annotation captures the relevant
      bacterial cell-membrane localization.
    supported_by:
    - reference_id: UniProt:Q88N45
      supporting_text: DR   GO; GO:0005886; C:plasma membrane; IEA:UniProtKB-SubCell.
