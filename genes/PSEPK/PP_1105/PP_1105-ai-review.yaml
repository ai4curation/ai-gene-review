suggested_questions:
- question: Is PP_1105 the principal ATP-dependent DNA ligase for a specific repair pathway in KT2440, or does it act redundantly with other bacterial DNA ligases?
- question: Does PP_1105 participate detectably in chromosome replication nick sealing in vivo, or mainly in repair/recombination-associated ligation?
suggested_experiments:
- description: Construct a PP_1105 deletion or depletion strain and assay sensitivity to DNA-damaging agents, recombination-associated repair, and plasmid or chromosomal ligation substrates.
  experiment_type: DNA repair genetics and ligase activity assay
