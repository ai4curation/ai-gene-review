description: PP_1105 encodes an ATP-dependent DNA ligase (EC 6.5.1.1) with the conserved ATP-dependent DNA ligase N-terminal, central, and C-terminal domains. The supported function is sealing DNA strand breaks by forming a phosphodiester bond between a 3'-hydroxyl and a 5'-phosphate DNA end using ATP, placing PP_1105 in DNA repair and related DNA-metabolism contexts rather than in the chromosome/cell-cycle module except as a broad keyword spillover.
