description: mcpH encodes an inner-membrane methyl-accepting chemotaxis protein that directly
  recognizes metabolizable purine derivatives, including purine, adenine, guanine, xanthine,
  hypoxanthine, and uric acid, and mediates chemotaxis toward these purine-degradation pathway
  intermediates.
