  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: Flavohemoprotein (flavohemoglobin) of Pseudomonas putida KT2440, a two-domain
  enzyme comprising an N-terminal heme-containing globin (oxygen-binding) domain and
  a C-terminal FAD/NAD(P)H reductase domain. It binds one heme b and one FAD per subunit.
  Its core catalytic activity is nitric oxide dioxygenase (NOD; EC 1.14.12.17), an
  aerobic reaction that uses O2 and NAD(P)H to convert nitric oxide to nitrate, thereby
  detoxifying NO. Through this activity the protein protects the bacterium against
  nitric oxide and other reactive nitrogen species and is central to the inducible
  response to nitrosative stress.
existing_annotations:
- term:
    id: GO:0005344
    label: oxygen carrier activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000104
  qualifier: enables
  review:
    summary: Oxygen carrier activity is a generic globin-family term transferred by
      UniRule from the globin domain. Bacterial flavohemoglobins do not function in
      physiological O2 transport/carriage; O2 is a co-substrate of the nitric oxide
      dioxygenase reaction, not cargo being carried. This mischaracterizes the protein's
      biological role.
    action: REMOVE
    reason: Misleading transfer from globin family homology. The protein's function
      is NO dioxygenation, in which O2 is consumed as a co-substrate, not an O2 carrier.
      PANTHER classifies hmp in the flavohemoprotein NO-detoxification family (PTHR43396),
      an enzymatic nitric oxide dioxygenase rather than an O2-transport globin.
    supported_by:
    - reference_id: file:PSEPK/hmp/hmp-uniprot.txt
      supporting_text: Is involved in NO detoxification in an aerobic process, termed
        nitric oxide dioxygenase (NOD) reaction that utilizes O(2) and NAD(P)H to convert
        NO to nitrate
    - reference_id: file:PSEPK/hmp/hmp-uniprot.txt
      supporting_text: PTHR43396; FLAVOHEMOPROTEIN
- term:
    id: GO:0008941
    label: nitric oxide dioxygenase [NAD(P)H] activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
