suggested_questions:
- question: Is hmp expression in P. putida KT2440 induced specifically by nitric oxide
    / reactive nitrogen species, and which regulator (e.g. an NsrR-like repressor)
    controls it?
- question: Does hmp contribute measurably to NO resistance and survival of P. putida
    under nitrosative stress in vivo, e.g. during exposure to NO donors or nitrite?
suggested_experiments:
- description: Construct an hmp deletion mutant in P. putida KT2440 and measure NO
    consumption rates and sensitivity to NO donors (e.g. DETA/NONOate) and acidified
    nitrite versus wild type.
- description: Biochemically characterize purified recombinant Hmp (Q88PP0) to confirm
    heme b and FAD content and measure nitric oxide dioxygenase kinetics with NADH
    and NADPH.
- description: Perform RT-qPCR or RNA-seq under NO/nitrosative stress to determine
    inducibility of hmp and identify its regulatory inputs.
