- id: file:PSEPK/hmp/hmp-uniprot.txt
  title: UniProt entry Q88PP0 (HMP_PSEPK), Flavohemoprotein, Pseudomonas putida KT2440
  findings:
  - statement: Hmp is a flavohemoglobin that performs NO detoxification via the nitric
      oxide dioxygenase reaction, converting NO to nitrate using O2 and NAD(P)H, and
      is central to the inducible response to nitrosative stress.
    supporting_text: Is involved in NO detoxification in an aerobic process, termed
      nitric oxide dioxygenase (NOD) reaction that utilizes O(2) and NAD(P)H to convert
      NO to nitrate, which protects the bacterium from various noxious nitrogen compounds.
  - statement: The protein has two domains, an N-terminal heme-binding oxygen-binding
      globin domain and a C-terminal FAD/NAD(P)H reductase domain, binding one heme
      b and one FAD per subunit.
    supporting_text: Consists of two distinct domains; an N-terminal heme-containing
      oxygen-binding domain and a C-terminal reductase domain with binding sites for
      FAD and NAD(P)H.
- id: file:interpro/panther/PTHR43396/PTHR43396-metadata.yaml
  title: PANTHER family PTHR43396 (FLAVOHEMOPROTEIN) and subfamily PTHR43396:SF3 (FLAVOHEMOPROTEIN)
  findings:
  - statement: hmp (Q88PP0) is classified in PANTHER family PTHR43396 and subfamily
      PTHR43396:SF3, the flavohemoprotein family.
  - statement: The family's flavohemoprotein nitric-oxide-detoxification identity supports
      annotation of the nitric oxide dioxygenase molecular function and argues against
      an oxygen-transport role for this protein.
