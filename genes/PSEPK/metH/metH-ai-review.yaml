id: Q88KB5
gene_symbol: metH
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: metH (PP_2375) encodes a large cobalamin-dependent methionine synthase
  that catalyzes the terminal methylation of L-homocysteine to L-methionine using
  5-methyltetrahydrofolate and a methylcobalamin cofactor. It provides the vitamin
  B12-dependent terminal route for de novo L-methionine biosynthesis in KT2440;
  the apparent MetE-like proteins in this proteome are partial-domain candidates
  rather than confirmed cobalamin-independent alternatives.
