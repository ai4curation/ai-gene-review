suggested_questions:
- question: Under which KT2440 growth conditions is the MetH route limited by cobalamin
    biosynthesis, salvage, or uptake rather than by the methionine-pathway enzymes
    themselves?
suggested_experiments:
- description: Compare metH mutant growth in defined media with controlled vitamin
    B12, cobalt, methionine, and homocysteine supplementation, and test whether
    partial MetE-like proteins can rescue the terminal methylation step in trans.
  experiment_type: targeted genetics and nutrient rescue
