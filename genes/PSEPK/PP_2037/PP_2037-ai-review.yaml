description: >-
  PP_2037 encodes an unreviewed class II aldolase/adducin N-terminal
  domain-containing protein in Pseudomonas putida KT2440. The current metadata
  support a broad class II aldolase-family assignment, but do not identify a
  substrate-specific aldolase reaction or a defined pentose/glucuronate pathway
  step.
