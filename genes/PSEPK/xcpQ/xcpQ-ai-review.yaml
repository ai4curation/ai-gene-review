description: xcpQ (PP_1046) encodes Type II secretion pathway protein XcpQ, a predicted outer-membrane secretin/channel component
  of a type II secretion system. Secretin components form the outer-membrane pore for type-II-dependent export of folded periplasmic
  proteins.
