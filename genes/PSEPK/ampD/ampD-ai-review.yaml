  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: ampD (PP_0789) encodes a cytoplasmic AmpD-family 1,6-anhydro-N-acetylmuramyl-L-alanine amidase in Pseudomonas
  putida KT2440. It is inferred to process peptidoglycan recycling products by cleaving the MurNAc-L-Ala amide bond and is
  kept distinct from envelope-localized wall hydrolases.
