id: Q88LX8
gene_symbol: gmd
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: >-
  Gmd is a predicted GDP-mannose 4,6-dehydratase in the KT2440 PP_1776-PP_1800
  deoxy-sugar branch. It converts GDP-mannose to a GDP-4-dehydro-6-deoxy-mannose
  intermediate and is best treated in this first pass as part of GDP-D-rhamnose
  and LPS/O-antigen nucleotide-sugar biosynthesis, not fructose catabolism.
existing_annotations:
- term:
    id: GO:0008446
    label: GDP-mannose 4,6-dehydratase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: This is the direct predicted catalytic activity of Gmd.
    action: ACCEPT
    reason: UniProt gives the enzyme name, EC 4.2.1.47, Rhea reaction, and GO cross-reference for GDP-mannose 4,6-dehydratase activity.
    supported_by:
    - reference_id: file:PSEPK/gmd/gmd-uniprot.txt
      supporting_text: 'DE   RecName: Full=GDP-mannose 4,6-dehydratase {ECO:0000256|ARBA:ARBA00011989, ECO:0000256|HAMAP-Rule:MF_00955};'
    - reference_id: file:PSEPK/gmd/gmd-uniprot.txt
      supporting_text: 'DR   GO; GO:0008446; F:GDP-mannose 4,6-dehydratase activity; IEA:UniProtKB-UniRule.'
- term:
    id: GO:0019673
    label: GDP-mannose metabolic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: involved_in
  review:
    summary: GDP-mannose metabolism is correct for the substrate of the dehydratase reaction.
    action: ACCEPT
    reason: The reaction consumes GDP-alpha-D-mannose and produces a deoxy-sugar intermediate.
    supported_by:
    - reference_id: file:PSEPK/gmd/gmd-uniprot.txt
      supporting_text: 'CC       Reaction=GDP-alpha-D-mannose = GDP-4-dehydro-alpha-D-rhamnose + H2O;'
- term:
    id: GO:0042351
    label: '''de novo'' GDP-L-fucose biosynthetic process'
  evidence_type: IEA
  original_reference_id: GO_REF:0000118
  qualifier: involved_in
  review:
    summary: GDP-L-fucose biosynthesis is a plausible generic deoxy-sugar transfer but appears less specific for the local KT2440 branch.
    action: MODIFY
    reason: The ppu00051 Falcon report places gmd with rmd in a GDP-D-rhamnose/LPS O-antigen branch, so GO:0019306 is the better first-pass process term for this locus context.
    proposed_replacement_terms:
    - id: GO:0019306
      label: GDP-D-rhamnose biosynthetic process
    supported_by:
    - reference_id: file:projects/P_PUTIDA/deep-research/PSEPK__fructose_mannose_metabolism__ppu00051-deep-research-falcon.md
      supporting_text: 'These are part of the LPS A-band O-antigen gene cluster'
- term:
    id: GO:0070401
    label: NADP+ binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000104
  qualifier: enables
  review:
    summary: NADP+ binding is compatible with the enzyme family but secondary to catalysis.
    action: KEEP_AS_NON_CORE
    reason: This term records a cofactor feature; the direct dehydratase activity should be the core annotation.
    supported_by:
    - reference_id: file:PSEPK/gmd/gmd-uniprot.txt
      supporting_text: 'CC       Name=NADP(+); Xref=ChEBI:CHEBI:58349;'
- term:
    id: GO:0019306
    label: GDP-D-rhamnose biosynthetic process
  evidence_type: IEA
  original_reference_id: file:projects/P_PUTIDA/deep-research/PSEPK__fructose_mannose_metabolism__ppu00051-deep-research-falcon.md
  qualifier: involved_in
  review:
    summary: Gmd is proposed as part of GDP-D-rhamnose biosynthesis in the LPS/O-antigen branch.
    action: NEW
    reason: Falcon identifies gmd and rmd as the GDP-D-rhamnose branch enzymes in the PP_1776-PP_1800 LPS/O-antigen cluster.
    supported_by:
    - reference_id: file:projects/P_PUTIDA/deep-research/PSEPK__fructose_mannose_metabolism__ppu00051-deep-research-falcon.md
      supporting_text: 'These are part of the LPS A-band O-antigen gene cluster'
