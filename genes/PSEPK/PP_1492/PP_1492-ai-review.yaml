  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: PP_1492 encodes a CheA-family histidine kinase in the PP_1488-PP_1494 Wsp-like surface-sensing
  cluster. Its CheW-like, receiver, HPt, and histidine-kinase domains support a local phosphorelay role
  that likely couples receptor/adaptor input to downstream c-di-GMP output rather than the canonical PP_4338
  CheA flagellar chemotaxis branch.
