  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: >-
  PP_1776 is an AlgA-like bifunctional nucleotide-sugar enzyme predicted to
  combine mannose-6-phosphate isomerase activity with mannose-1-phosphate
  guanylyltransferase activity. The ppu00051 Falcon pathway review places this
  paralog in the PP_1776-PP_1800 LPS/O-antigen nucleotide-sugar branch, likely
  as WbpW, rather than in the alginate operon role carried by algA/PP_1277.
