id: P59612
gene_symbol: argJ
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: >-
  ArgJ (PP_1346) is a bifunctional acetyltransferase in L-arginine biosynthesis.
  It can initiate the pathway by transferring an acetyl group from acetyl-CoA
  to L-glutamate and can close the cyclic acetyl route by transferring the
  acetyl group from N-acetyl-L-ornithine back to L-glutamate, releasing
  L-ornithine and regenerating N-acetyl-L-glutamate.
