description: argJ (PP_1346) encodes the bifunctional ArgJ enzyme of cyclic bacterial L-arginine biosynthesis. The protein
  supplies N-acetylglutamate synthase chemistry and glutamate N-acetyltransferase/ornithine acetyltransferase chemistry, recycling
  the acetyl group from N-acetylornithine to glutamate while producing ornithine.
