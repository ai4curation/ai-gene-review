    action: ACCEPT
    reason: Reviewed UniProt assigns EC 2.3.1.1 and RHEA:24292 to the bifunctional ArgJ protein.
    supported_by:
    - reference_id: file:PSEPK/argJ/argJ-uniprot.txt
      supporting_text: Reaction=L-glutamate + acetyl-CoA = N-acetyl-L-glutamate + CoA + H(+);
