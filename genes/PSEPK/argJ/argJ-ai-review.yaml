- term:
    id: GO:0006526
    label: L-arginine biosynthetic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: involved_in
  review:
    summary: Both ArgJ acetyltransferase reactions operate in L-arginine biosynthesis.
    action: ACCEPT
    reason: >-
      The reviewed UniProt pathway assignments place ArgJ in initiation and
      cyclic ornithine release. A KT2440 argJ mutant remains arginine
      prototrophic, consistent with compensation by the ArgA/ArgE route rather
      than evidence against these activities.
    additional_reference_ids:
    - PMID:31451546
- term:
    id: GO:0006592
    label: L-ornithine biosynthetic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000118
  qualifier: involved_in
  review:
    summary: ArgJ directly releases L-ornithine from N-acetyl-L-ornithine.
    action: ACCEPT
    reason: The EC 2.3.1.35 transacetylation reaction produces ornithine in the cyclic route.
