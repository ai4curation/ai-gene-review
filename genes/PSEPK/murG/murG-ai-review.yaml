- id: file:PSEPK/murG/murG-deep-research-openscientist.md
  title: OpenScientist deep research for PSEPK murG
  findings:
  - statement: The retrieved evidence supports the exact lipid I glycosyltransferase reaction.
    supporting_text: >-
      MurG is a UDP-GlcNAc:lipid I β-1,4-GlcNAc transferase producing lipid II
      (EC 2.4.1.227).
    reference_section_type: RESULTS
  - statement: Detailed biochemical evidence is transferred from bacterial orthologs.
    supporting_text: >-
      All kinetic, structural, and lipid-preference data derive from *E. coli*
      (or other bacteria). The *P. putida* KT2440 MurG has not been crystallized,
      purified, or assayed directly.
    reference_section_type: CONCLUSIONS
  reference_review:
    relevance: HIGH
    correctness: UNVERIFIED
    review_notes: >-
      The exact-target family, EC, and domain assignments agree with UniProt.
      Species-specific kinetic, membrane-lipid, essentiality, and structural
      claims were not imported from ortholog studies.
