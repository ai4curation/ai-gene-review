taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: >-
  MurG is the peripheral inner-membrane glycosyltransferase that forms lipid II
  in Pseudomonas putida KT2440. On the cytoplasmic face of the membrane it
  transfers N-acetylglucosamine from UDP-GlcNAc to lipid I, producing the
  disaccharide-pentapeptide precursor exported for peptidoglycan
  polymerization.
