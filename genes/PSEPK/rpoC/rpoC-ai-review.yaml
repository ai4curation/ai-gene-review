- term:
    id: GO:0003899
    label: DNA-directed RNA polymerase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: DNA-directed RNA polymerase activity is accepted as the core complex-level activity of rpoC.
    action: ACCEPT
    reason: UniProt states that DNA-dependent RNA polymerase transcribes DNA into RNA using ribonucleoside triphosphates, and rpoC is a beta-prime subunit of that catalytic core.
    supported_by:
    - &rpoc_go_rnap
      reference_id: file:PSEPK/rpoC/rpoC-goa.tsv
      supporting_text: "GO:0003899\tDNA-directed RNA polymerase activity"
    - &rpoc_function
      reference_id: file:PSEPK/rpoC/rpoC-uniprot.txt
      supporting_text: "DNA-dependent RNA polymerase catalyzes the transcription of"
    - &rpoc_reaction
      reference_id: file:PSEPK/rpoC/rpoC-uniprot.txt
      supporting_text: "Reaction=RNA(n) + a ribonucleoside 5'-triphosphate = RNA(n+1) +"
    - *rpoc_subunit
- term:
    id: GO:0005829
    label: cytosol
  evidence_type: IEA
  original_reference_id: GO_REF:0000117
  qualifier: located_in
  review:
    summary: Cytosol is retained as bacterial localization context but is not the most informative functional annotation.
    action: KEEP_AS_NON_CORE
    reason: Bacterial chromosomal transcription occurs in the cytosol/cytoplasm, but the core curation signal for rpoC is RNAP complex function and transcription.
    supported_by:
    - reference_id: file:PSEPK/rpoC/rpoC-goa.tsv
      supporting_text: "GO:0005829\tcytosol"
    - *rpoc_subunit
- term:
    id: GO:0006351
    label: DNA-templated transcription
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: involved_in
  review:
    summary: DNA-templated transcription is accepted for rpoC as a core RNAP subunit.
    action: ACCEPT
    reason: The beta-prime subunit is part of the RNAP core and holoenzyme that catalyzes and initiates transcription.
    supported_by:
    - reference_id: file:PSEPK/rpoC/rpoC-goa.tsv
      supporting_text: "GO:0006351\tDNA-templated transcription"
    - *rpoc_function
    - reference_id: file:PSEPK/rpoC/rpoC-uniprot.txt
      supporting_text: "the holoenzyme is formed, which can initiate transcription."
- term:
