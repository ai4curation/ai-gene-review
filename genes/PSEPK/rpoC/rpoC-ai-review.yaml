id: Q88QP1
gene_symbol: rpoC
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: rpoC encodes the beta-prime subunit of the Pseudomonas putida KT2440 DNA-directed RNA polymerase core enzyme. It is a metal-binding core subunit of the alpha2-beta-beta-prime-omega RNAP complex that contributes to DNA-directed RNA synthesis during transcription.
existing_annotations:
