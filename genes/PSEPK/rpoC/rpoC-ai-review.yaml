id: Q88QP1
gene_symbol: rpoC
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: >-
  rpoC (PP_0448) encodes the beta-prime subunit of the bacterial DNA-directed
  RNA polymerase core enzyme. RpoC pairs with the beta subunit RpoB to form the
  catalytic cleft of the alpha2-beta-beta-prime-omega RNAP core, coordinating
  divalent metal ions and nucleic-acid contacts needed for DNA-templated RNA
  synthesis. Its core role is contribution to complex-level RNA polymerase
  activity, with magnesium and zinc binding as important subunit-specific
  features.
existing_annotations:
- term:
    id: GO:0000287
    label: magnesium ion binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000104
  qualifier: enables
  review:
    summary: >-
      Magnesium ion binding is appropriate for the beta-prime subunit active
      center architecture.
    action: ACCEPT
    reason: >-
      UniProt records Mg(2+) as a cofactor for the RpoC subunit, consistent with
      the conserved RNAP catalytic mechanism.
    supported_by:
    - reference_id: file:PSEPK/rpoC/rpoC-uniprot.txt
      supporting_text: Binds 1 Mg(2+) ion per subunit.
- term:
    id: GO:0003677
    label: DNA binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: >-
      DNA binding is plausible for the beta-prime subunit within the RNAP cleft,
      but it is a broad supporting activity.
    action: KEEP_AS_NON_CORE
    reason: >-
      Retain as non-core context. Complex-level DNA-directed RNA polymerase
      activity and metal-binding features better capture the main role.
- term:
    id: GO:0003899
    label: DNA-directed RNA polymerase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: >-
      RpoC is an essential beta-prime subunit of the bacterial RNAP active-center
      cleft, but RNA synthesis is performed by the assembled core enzyme.
    action: MODIFY
    reason: >-
      Interpret as contribution to complex-level polymerase activity rather than
      independent catalytic activity by isolated RpoC.
    proposed_replacement_terms:
    - id: GO:0003899
      label: DNA-directed RNA polymerase activity
    supported_by:
    - reference_id: file:PSEPK/rpoC/rpoC-uniprot.txt
      supporting_text: DNA-dependent RNA polymerase catalyzes the transcription of
- term:
    id: GO:0005829
    label: cytosol
  evidence_type: IEA
  original_reference_id: GO_REF:0000117
  qualifier: located_in
  review:
    summary: >-
      Cytosolic localization is appropriate for a soluble bacterial RNA
      polymerase core subunit.
    action: ACCEPT
    reason: >-
      RpoC functions in the bacterial cytosol/nucleoid as part of the
      transcription machinery.
- term:
    id: GO:0006351
    label: DNA-templated transcription
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: involved_in
  review:
    summary: >-
      RpoC directly participates in DNA-templated transcription as an essential
      beta-prime subunit of bacterial RNA polymerase.
    action: ACCEPT
    reason: >-
      Correct process annotation for a core RNAP subunit.
- term:
    id: GO:0008270
    label: zinc ion binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000104
  qualifier: enables
  review:
    summary: >-
      Zinc ion binding is appropriate for the beta-prime subunit, which UniProt
      annotates as binding two Zn(2+) ions per subunit.
    action: ACCEPT
    reason: >-
      Retain as a subunit-specific cofactor/structural feature of RpoC.
    supported_by:
    - reference_id: file:PSEPK/rpoC/rpoC-uniprot.txt
      supporting_text: Binds 2 Zn(2+) ions per subunit.
- term:
    id: GO:0034062
    label: 5'-3' RNA polymerase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000116
  qualifier: enables
  review:
    summary: >-
      The Rhea-derived polymerase activity reflects RNA-chain extension by the
      assembled RNAP core.
    action: MODIFY
    reason: >-
      RpoC contributes to the complex-level reaction but should not be
      interpreted as a standalone polymerase enzyme.
    proposed_replacement_terms:
    - id: GO:0003899
      label: DNA-directed RNA polymerase activity
    supported_by:
    - reference_id: file:PSEPK/rpoC/rpoC-uniprot.txt
      supporting_text: DNA-dependent RNA polymerase catalyzes the transcription of
- term:
    id: GO:0000428
    label: DNA-directed RNA polymerase complex
  evidence_type: ISS
  original_reference_id: file:PSEPK/rpoC/rpoC-uniprot.txt
  qualifier: part_of
  review:
    summary: >-
      RpoC is part of the bacterial DNA-directed RNA polymerase core complex.
    action: NEW
    reason: >-
      UniProt records Q88QP1 as the beta-prime subunit in the alpha2-beta-
      beta-prime-omega RNAP catalytic core, so explicit complex membership is
      useful for interpreting the complex-level polymerase MF.
    supported_by:
    - reference_id: file:PSEPK/rpoC/rpoC-uniprot.txt
      supporting_text: The RNAP catalytic core consists of 2 alpha, 1 beta, 1 beta'
