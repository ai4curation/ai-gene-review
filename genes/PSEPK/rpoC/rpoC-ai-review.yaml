  qualifier: enables
  review:
    summary: Zinc ion binding is retained as cofactor/structural context for the beta-prime subunit.
    action: KEEP_AS_NON_CORE
    reason: UniProt records two Zn(2+) ions per rpoC subunit, but metal binding is ancillary to the RNAP complex activity and transcription role.
