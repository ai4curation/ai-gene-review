    id: GO:0000287
    label: magnesium ion binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000104
  qualifier: enables
  review:
    summary: Magnesium ion binding is retained as cofactor context for the beta-prime subunit.
    action: KEEP_AS_NON_CORE
    reason: UniProt records one Mg(2+) ion per rpoC subunit, but the core curated function is RNAP complex activity.
    supported_by:
