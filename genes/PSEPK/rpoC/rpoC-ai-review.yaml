- term:
    id: GO:0034062
    label: 5'-3' RNA polymerase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000116
  qualifier: enables
  review:
    summary: The Rhea-derived 5'-3' RNA polymerase activity is correct but should be represented by the more specific DNA-directed RNA polymerase term.
    action: MODIFY
    reason: The relevant reaction is DNA-template-directed RNA synthesis by bacterial RNAP; GO:0003899 captures the same activity with better biological specificity for rpoC.
    proposed_replacement_terms:
    - id: GO:0003899
      label: DNA-directed RNA polymerase activity
    supported_by:
    - reference_id: file:PSEPK/rpoC/rpoC-goa.tsv
      supporting_text: "GO:0034062\t5'-3' RNA polymerase activity"
