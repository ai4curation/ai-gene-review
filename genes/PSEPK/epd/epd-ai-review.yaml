id: Q88D63
gene_symbol: epd
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: >-
    Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 /
    NCIMB 11950 / KT2440)
description: >-
  Epd is an NAD-dependent erythrose-4-phosphate dehydrogenase (EC 1.2.1.72)
  that oxidizes D-erythrose 4-phosphate to 4-phospho-D-erythronate. This is the
  first reaction of the erythrose-derived branch of the DXP-dependent bacterial
  pathway that supplies pyridoxine 5'-phosphate for de novo pyridoxal
  5'-phosphate biosynthesis. The PSEPK protein is a soluble bacterial Epd-family
  enzyme.
existing_annotations:
  - term:
      id: GO:0005737
      label: cytoplasm
    evidence_type: IEA
    original_reference_id: GO_REF:0000002
    qualifier: located_in
    review:
      summary: Epd is a soluble cytoplasmic metabolic enzyme.
      action: KEEP_AS_NON_CORE
      reason: Localization is useful context but does not define the reaction.
  - term:
      id: GO:0008615
      label: pyridoxine biosynthetic process
    evidence_type: IEA
    original_reference_id: GO_REF:0000104
    qualifier: involved_in
    review:
      summary: Epd initiates the erythrose-derived branch of pyridoxine phosphate synthesis.
      action: ACCEPT
      reason: >-
        The Epd-specific NCBIfam assignment and ppu00750 pathway context support
        its role in the DXP-dependent vitamin-B6 pathway.
  - term:
      id: GO:0016620
      label: >-
        oxidoreductase activity, acting on the aldehyde or oxo group of donors,
        NAD or NADP as acceptor
    evidence_type: IEA
    original_reference_id: GO_REF:0000002
    qualifier: enables
    review:
      summary: This parent oxidoreductase term is redundant with the exact Epd activity.
      action: MARK_AS_OVER_ANNOTATED
      reason: GO:0048001 identifies the substrate and reaction directly.
  - term:
      id: GO:0042823
      label: pyridoxal 5'-phosphate biosynthetic process
    evidence_type: IEA
    original_reference_id: GO_REF:0000002
    qualifier: involved_in
    review:
      summary: Epd contributes to de novo PLP formation through the PNP precursor branch.
      action: ACCEPT
      reason: >-
        Epd supplies 4-phospho-D-erythronate for the ordered
        Epd-PdxB-SerC-PdxA-PdxJ-PdxH pathway.
  - term:
      id: GO:0036001
      label: "'de novo' pyridoxal 5'-phosphate biosynthetic process"
    evidence_type: ISS
    original_reference_id: file:PSEPK/epd/epd-deep-research-openscientist.md
    qualifier: involved_in
    review:
      summary: Epd initiates the erythrose-derived arm of de novo PLP synthesis.
      action: NEW
      reason: >-
        The Epd reaction and the complete downstream PdxB-SerC-PdxA-PdxJ-PdxH
        route support the more specific de novo process term.
  - term:
      id: GO:0048001
      label: erythrose-4-phosphate dehydrogenase activity
    evidence_type: IEA
    original_reference_id: GO_REF:0000120
    qualifier: enables
    review:
      summary: This is the defining catalytic activity of PSEPK Epd.
      action: ACCEPT
      reason: >-
        The term matches EC 1.2.1.72, the UniProt product name, and the
        Epd-specific NCBIfam family.
      supported_by:
        - reference_id: file:PSEPK/epd/epd-deep-research-openscientist.md
          supporting_text: >-
            encodes a **non-phosphorylating D-erythrose-4-phosphate
            dehydrogenase (E4PDH; EC 1.2.1.72)**
  - term:
      id: GO:0051287
      label: NAD binding
    evidence_type: IEA
    original_reference_id: GO_REF:0000002
    qualifier: enables
    review:
      summary: NAD is the electron acceptor for the Epd reaction.
      action: KEEP_AS_NON_CORE
      reason: Cofactor binding is valid but secondary to the exact catalytic term.
