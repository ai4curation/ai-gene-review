taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: queG (PP_4900) encodes epoxyqueuosine reductase, a cytoplasmic iron-sulfur enzyme in tRNA queuosine
  biosynthesis. It catalyzes the terminal reduction of epoxyqueuosine-modified tRNA to queuosine-modified tRNA in the
  wobble position of selected bacterial tRNAs.
