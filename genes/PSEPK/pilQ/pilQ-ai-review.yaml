status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: >-
  pilQ encodes an outer-membrane bacterial secretin-family protein of the type
  IV pilus biogenesis system in Pseudomonas putida KT2440. Its GspD/PilQ,
  secretin, and type IV pilus biogenesis domains support an outer-membrane pore
  or secretin role for pilus assembly, while generic protein secretion is a
  less precise shared-domain annotation.
