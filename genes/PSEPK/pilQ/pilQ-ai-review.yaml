    summary: PilQ is correctly localized to the cell outer membrane.
    action: ACCEPT
    reason: >-
      UniProt places PilQ in the cell outer membrane, and PilQ/GspD secretins
      are outer-membrane pores in type IV pilus and related secretion systems.
