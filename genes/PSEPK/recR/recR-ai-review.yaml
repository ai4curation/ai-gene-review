description: recR (PP_4267) encodes recombination protein RecR, a RecFOR pathway factor with conserved DNA-binding and zinc-associated
  domains. RecR acts with RecF and RecO to support RecA-mediated homologous recombination and DNA repair at single-stranded
  DNA gaps or damaged replication intermediates.
