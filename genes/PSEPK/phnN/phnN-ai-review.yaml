description: Ribose 1,5-bisphosphate phosphokinase PhnN of Pseudomonas putida KT2440 (PP_4469). PhnN phosphorylates
  ribose 1,5-bisphosphate to PRPP in the phosphonate-utilization pathway, connecting organic phosphonate
  metabolism to PRPP biosynthesis. It is adjacent to PPP maps through ribose-phosphate/PRPP chemistry,
  not a core pentose phosphate pathway enzyme.
