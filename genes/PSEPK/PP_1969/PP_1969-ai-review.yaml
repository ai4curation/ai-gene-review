id: Q88LG4
gene_symbol: PP_1969
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: >-
  PP_1969 encodes a MoaA-family radical-SAM protein with the conserved
  CxxxCxxC iron-sulfur-binding motif. It is closely related to PP_2482 but
  substantially diverged from canonical KT2440 MoaA; its physiological substrate
  and equivalence to the canonical cPMP-forming enzyme remain unresolved.
existing_annotations:
- term:
    id: GO:0003824
    label: catalytic activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: Catalytic activity is plausible for this radical-SAM family member, but the exact reaction is unresolved.
    action: UNDECIDED
    reason: Sequence features establish family membership but do not prove use of GTP as the physiological substrate.
    supported_by:
    - reference_id: file:PSEPK/moaA/moaA-bioinformatics/RESULTS.md
      supporting_text: |-
        - All three KT2440 proteins have comparable lengths (322-337 aa), the canonical
          radical-SAM `CxxxCxxC` pattern near the N terminus, and two detected `CxxC`
          patterns. These features support radical-SAM/MoaA-like family membership but
          do not establish the same physiological substrate or pathway contribution.
- term:
    id: GO:0006777
    label: Mo-molybdopterin cofactor biosynthetic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: involved_in
  review:
    summary: Molybdenum-cofactor pathway involvement is plausible from family assignment but lacks gene-specific evidence.
    action: UNDECIDED
    reason: Redundancy with, or specialization relative to, canonical moaA has not been demonstrated for PP_1969.
    supported_by:
    - reference_id: file:PSEPK/moaA/moaA-bioinformatics/RESULTS.md
      supporting_text: |-
        The sequence analysis therefore supports keeping PP_2482 and PP_1969 as
        MoaA-family candidates while reserving the unqualified GTP 3',8'-cyclase role
        for Q88E69 unless gene-specific biochemical, genetic, or stronger phylogenetic
        evidence resolves the paralogs.
- term:
    id: GO:0046872
    label: metal ion binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000104
  qualifier: enables
  review:
    summary: Metal-ion binding is consistent with the radical-SAM iron-sulfur motif but is non-core.
    action: KEEP_AS_NON_CORE
    reason: The sequence and UniProt record support an iron-sulfur-binding radical-SAM fold.
- term:
    id: GO:0051536
    label: iron-sulfur cluster binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: This broad iron-sulfur-cluster binding term is redundant with the more specific retained [4Fe-4S]-cluster binding annotation.
    action: MARK_AS_OVER_ANNOTATED
    reason: UniProt records a [4Fe-4S] cofactor for Q88LG4, so GO:0051539 captures the supported cofactor binding more precisely.
- term:
    id: GO:0051539
    label: 4 iron, 4 sulfur cluster binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: Specific [4Fe-4S]-cluster binding is plausible but is not an exact pathway-function assignment.
    action: KEEP_AS_NON_CORE
    reason: UniProt and the conserved cysteine motif support a radical-SAM [4Fe-4S] cluster.
- term:
    id: GO:0061798
    label: GTP 3',8'-cyclase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000118
  qualifier: enables
  review:
    summary: Exact GTP 3',8'-cyclase activity cannot be established for this divergent paralog.
    action: UNDECIDED
    reason: Q88LG4 lacks the MoaA-specific InterPro records present on reviewed Q88E69 and is only 37.85% identical to it; no direct assay resolves substrate specificity.
    supported_by:
    - reference_id: file:PSEPK/moaA/moaA-bioinformatics/RESULTS.md
      supporting_text: |-
        - Q88E69 is 36.25% identical to Q88K11 (PP_2482) and 37.85% identical to Q88LG4
          (PP_1969) over aligned residue pairs. Q88K11 and Q88LG4 are 66.15% identical
          to one another. This pattern supports a closer relationship between the two
          unreviewed candidates than either has to canonical moaA, and does not support
          assuming that all three are interchangeable copies.
    - reference_id: file:PSEPK/PP_1969/PP_1969-deep-research-openscientist.md
      supporting_text: >-
        - **Direct experimental evidence** (crystallography, ENDOR/EPR spectroscopy,
        in‑vitro reconstitution, mutagenesis) exists for the **MoaA family prototype**
        (from *Staphylococcus aureus*/*E. coli* systems) and the human ortholog MOCS1A
        — not specifically for the *P. putida* PP_1969 protein.
- term:
    id: GO:0061799
    label: cyclic pyranopterin monophosphate synthase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000118
  qualifier: enables
  review:
    summary: cPMP synthase is the distinct MoaC reaction and should not be assigned to a stand-alone MoaA-family protein.
    action: REMOVE
    reason: Even canonical bacterial MoaA forms the cyclic GTP intermediate; MoaC converts that intermediate to cPMP.
    supported_by:
    - reference_id: file:PSEPK/moaA/moaA-uniprot.txt
      supporting_text: "DE   RecName: Full=GTP 3',8-cyclase {ECO:0000255|HAMAP-Rule:MF_01225};"
    - reference_id: file:PSEPK/moaC/moaC-uniprot.txt
      supporting_text: "DE   RecName: Full=Cyclic pyranopterin monophosphate synthase {ECO:0000255|HAMAP-Rule:MF_01224};"
