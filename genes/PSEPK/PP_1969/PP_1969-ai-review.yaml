suggested_questions:
- question: Does PP_1969 cyclize GTP, act on another purine-derived substrate, or provide condition-specific redundancy with canonical moaA?
suggested_experiments:
- description: Compare purified PP_1969 with canonical MoaA for GTP turnover and cyclic intermediate formation, and test complementation of a moaA deletion.
