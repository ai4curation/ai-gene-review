- id: file:PSEPK/PP_1969/PP_1969-deep-research-openscientist.md
  title: OpenScientist gene research for PP_1969
  reference_review:
    relevance: HIGH
    correctness: MISCITED
    review_notes: >-
      The report is miscited for target-level curation: it declares the divergent
      Q88LG4 protein a canonical GTP 3',8'-cyclase without a target assay, mislabels
      PP_1294 (moaE) as moaB and PP_3457 (mobA) as mogA, and presents unsaved
      motif/residue analysis as verified. None of its catalytic, core-function,
      locus, or residue claims are propagated; only its explicit statement that no
      PP_1969-specific biochemical study was found is retained as a limitation.
  findings:
  - statement: The report incorrectly promotes Q88LG4 from a divergent MoaA-like candidate to canonical MoaA with an exact catalytic assignment.
    supporting_text: >-
      PP_1969 encodes **MoaA**, a cytoplasmic **radical
      S‑adenosyl‑L‑methionine (radical SAM) metalloenzyme** that catalyzes the
      **first committed step of molybdenum cofactor (Moco) biosynthesis**.
  - statement: The report contains concrete locus errors for PP_1294 and PP_3457.
    supporting_text: >-
      **moaC = PP_1292, moaD = PP_1293, moaB = PP_1294**, with **moeA =
      PP_2123** and **mogA = PP_3457**
  - statement: The report presents residue-level motif analysis that was not saved as a reproducible local analysis.
    supporting_text: >-
      - N‑terminal radical‑SAM **CX₃CX₂C** motif:
      **C36**‑N‑Y‑A‑**C40**‑T‑Y‑**C43**.
  - statement: The report does acknowledge the absence of direct PP_1969-specific biochemical evidence.
    supporting_text: >-
      - **Direct experimental evidence** (crystallography, ENDOR/EPR spectroscopy,
      in‑vitro reconstitution, mutagenesis) exists for the **MoaA family prototype**
      (from *Staphylococcus aureus*/*E. coli* systems) and the human ortholog MOCS1A
      — not specifically for the *P. putida* PP_1969 protein.
- id: file:PSEPK/moaA/moaA-bioinformatics/RESULTS.md
  title: Reproducible sequence comparison of KT2440 MoaA-family and MobA-like proteins
  findings:
  - statement: Q88LG4 lacks the two MoaA-specific InterPro records found on Q88E69.
    supporting_text: |-
      - The reviewed MoaA sequence Q88E69 is the only one of the three with the
        MoaA-specific InterPro entries IPR013483 and IPR000385 in its UniProt record.
        All three share broader MoaA-like/radical-SAM entries and PTHR22960.
  - statement: Q88LG4 is 37.85% identical to canonical Q88E69 and is closer to Q88K11.
    supporting_text: |-
      - Q88E69 is 36.25% identical to Q88K11 (PP_2482) and 37.85% identical to Q88LG4
        (PP_1969) over aligned residue pairs. Q88K11 and Q88LG4 are 66.15% identical
        to one another. This pattern supports a closer relationship between the two
        unreviewed candidates than either has to canonical moaA, and does not support
        assuming that all three are interchangeable copies.
- id: file:PSEPK/moaA/moaA-uniprot.txt
  title: UniProtKB entry for canonical KT2440 moaA
  findings:
