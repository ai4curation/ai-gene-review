description: PP_3223 encodes a predicted periplasmic solute-binding component of the PP_3220-PP_3223 dipeptide ABC importer in Pseudomonas putida KT2440. Its SBP_5/peptide-binding domains, peptide transport annotations, and local dipeptide transporter ATPase support a substrate-capture role for a dipeptide-like ABC import system.
