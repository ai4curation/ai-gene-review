- id: file:PSEPK/paaK/paaK-deep-research-openscientist.md
  title: OpenScientist deep research for PSEPK paaK
  findings:
  - statement: The report independently confirms the exact target's PaaK-family identity.
    supporting_text: >-
      The gene identity is **unambiguous and fully consistent with the UniProt
      annotation**: symbol *paaK*, EC 6.2.1.30, phenylacetyl-CoA ligase family,
      AMP-dependent synthetase/ligase domains (IPR000873, IPR028154,
      IPR045851, IPR042099), in *P. putida* KT2440.
    reference_section_type: RESULTS
  - statement: KT2440-specific kinetics were not identified.
    supporting_text: >-
      Most **quantitative kinetics** derive from *P. putida* U and
      thermophilic/other homologs; strain-KT2440-specific kinetic constants and
      any second paralog should be verified from the KT2440 genome.
    reference_section_type: CONCLUSIONS
  reference_review:
    relevance: HIGH
    correctness: UNVERIFIED
    review_notes: >-
      The exact-target identity agrees with UniProt. Detailed substrate
      specificity, kinetic, oligomeric, transport, and regulatory claims were
      not imported because the report derives them mainly from P. putida U or
      other homologs.
