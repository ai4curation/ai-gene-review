description: >-
  PaaK is the phenylacetate-CoA ligase of Pseudomonas putida KT2440. It uses
  ATP and CoA to convert phenylacetate to phenylacetyl-CoA, committing the
  substrate to the aerobic phenylacetyl-CoA catabolic pathway.
