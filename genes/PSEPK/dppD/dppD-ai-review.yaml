id: Q88PH1
gene_symbol: dppD
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: DppD is an ABC ATP-binding subunit of the predicted DppABCDF dipeptide uptake system. It belongs to the ABC transporter superfamily, contains ABC ATP-binding domains, and likely works with DppF as the energy-coupling pair for the DppB/DppC dipeptide permease.
