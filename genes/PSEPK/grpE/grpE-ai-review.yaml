id: Q88DU1
gene_symbol: grpE
product_type: PROTEIN
status: IN_PROGRESS
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: GrpE is the bacterial nucleotide exchange factor (NEF) for the Hsp70
  chaperone DnaK, functioning as the third component of the conserved DnaK/DnaJ/GrpE
  (KJE) chaperone system. It is a homodimeric, "cruciform"-shaped protein with a long
  N-terminal coiled-coil and a globular C-terminal head domain that docks onto the
  nucleotide-binding domain (NBD) of DnaK. In the chaperone cycle, unfolded substrate
  proteins are first bound by DnaJ (Hsp40), which delivers them to DnaK and stimulates
  ATP hydrolysis to produce the ADP-bound, high substrate-affinity state of DnaK.
  GrpE then binds the DnaK NBD and induces conformational opening of the nucleotide-binding
  cleft (notably rotation of NBD subdomain IIB), accelerating ADP release; subsequent
  ATP rebinding resets DnaK to its low-affinity state and triggers substrate release,
  completing the cycle. Through this activity GrpE enables the iterative ATP-driven
  cycles required for de novo protein folding, refolding of stress-denatured proteins,
  and prevention of protein aggregation. The thermolabile coiled-coil of GrpE has
  been proposed to act as a thermosensor that modulates NEF activity with temperature.
  GrpE acts in the cytoplasm/cytosol and is part of the heat-shock and general stress
  response; in P. putida KT2440 it is induced under heat and chemical (e.g. phenol/solvent)
  stress.
existing_annotations:
- term:
    id: GO:0000774
    label: adenyl-nucleotide exchange factor activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: This is the defining molecular function of GrpE - it is the nucleotide
      exchange factor for DnaK (Hsp70), promoting ADP release so that ATP can rebind.
      The annotation is from InterPro (IPR000740, the GrpE family signature) plus PANTHER
      and is fully consistent with the UniProt FUNCTION statement and the entire GrpE
      literature.
    action: ACCEPT
    reason: Core, defining molecular function of GrpE. Universally conserved across
      the GrpE family and well supported by the InterPro/HAMAP family signature and
      mechanistic structural studies of bacterial DnaK-GrpE complexes.
- term:
    id: GO:0005737
    label: cytoplasm
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: located_in
  review:
    summary: GrpE acts in the cytoplasm as a cofactor of the cytosolic DnaK chaperone.
      The UniProt SUBCELLULAR LOCATION (HAMAP MF_01151) annotates Cytoplasm, and KT2440
      proteomics detected GrpE among cytoplasmic stress-induced proteins.
    action: ACCEPT
    reason: Correct subcellular localization for a bacterial DnaK cofactor. Consistent
      with HAMAP rule and with the cytosolic localization of its DnaK/DnaJ partners.
- term:
    id: GO:0005829
    label: cytosol
  evidence_type: IEA
  original_reference_id: GO_REF:0000118
  qualifier: located_in
  review:
    summary: TreeGrafter (phylogenetic) annotation to cytosol, the more specific child
      of cytoplasm. Consistent with GrpE function as a soluble cofactor of cytosolic
      DnaK.
    action: ACCEPT
    reason: Correct and slightly more specific localization than the cytoplasm annotation.
      Both are biologically appropriate for GrpE; retaining the more specific cytosol
      term is reasonable.
- term:
    id: GO:0006457
    label: protein folding
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: involved_in
  review:
    summary: GrpE is an integral component of the DnaK/DnaJ/GrpE chaperone machine,
      which assists de novo protein folding and refolding of stress-denatured proteins.
      Several rounds of GrpE-driven nucleotide exchange are required for efficient
      folding. InterPro-based annotation is well supported.
    action: ACCEPT
    reason: Accurately captures the biological process in which GrpE participates.
      GrpE is not itself a foldase but is essential to the folding cycle of the KJE
      system.
- term:
    id: GO:0042803
    label: protein homodimerization activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: GrpE functions as a homodimer; dimerization (via the coiled-coil) is
      essential for its NEF activity and for engaging DnaK in the asymmetric 1:2 DnaK:GrpE
      complex. UniProt SUBUNIT annotates Homodimer. Well supported by InterPro and
      structural studies.
    action: ACCEPT
    reason: GrpE is obligately dimeric and dimerization is required for function.
      Correct molecular function annotation.
- term:
    id: GO:0051087
    label: protein-folding chaperone binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: GrpE binds directly to the Hsp70 chaperone DnaK (a protein-folding chaperone),
      docking onto its nucleotide-binding domain. This binding is the basis of its
      NEF activity. InterPro-based annotation is appropriate and more informative than
      generic protein binding.
    action: ACCEPT
    reason: GrpE's physical interaction with the DnaK chaperone is central to its function.
      The term correctly describes this binding to a folding chaperone rather than
      an uninformative generic protein binding term.
core_functions:
- description: Nucleotide exchange factor for the Hsp70 chaperone DnaK; binds the DnaK
    nucleotide-binding domain and accelerates ADP release, enabling ATP rebinding
    and substrate release to drive the chaperone cycle.
  supported_by:
  - reference_id: GO_REF:0000120
    supporting_text: GrpE annotated with adenyl-nucleotide exchange factor activity
      (GO:0000774) from InterPro IPR000740; UniProt FUNCTION states "It is the nucleotide
      exchange factor for DnaK ... GrpE releases ADP from DnaK; ATP binding to DnaK
      triggers the release of the substrate protein."
  molecular_function:
    id: GO:0000774
    label: adenyl-nucleotide exchange factor activity
  directly_involved_in:
