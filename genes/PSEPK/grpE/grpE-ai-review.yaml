references:
- id: file:PSEPK/grpE/grpE-deep-research-falcon.md
  title: Deep research report for grpE (Q88DU1 / PP_4728) in Pseudomonas putida KT2440
  findings:
  - statement: Synthesis of GrpE structure/function (dimeric NEF for DnaK), and KT2440-specific
      evidence that GrpE is upregulated among general-stress proteins under phenol stress;
      Pseudomonas grpE-dnaK-dnaJ chaperone gene cluster context.
    reference_section_type: OTHER
- id: GO_REF:0000002
  title: Gene Ontology annotation through association of InterPro records with GO
    terms
  findings: []
- id: GO_REF:0000118
  title: TreeGrafter-generated GO annotations
  findings: []
- id: GO_REF:0000120
  title: Combined Automated Annotation using Multiple IEA Methods
  findings: []
- id: PMID:38158176
  title: New insights into the structure and function of the complex between the Escherichia
    coli Hsp70, DnaK, and its nucleotide-exchange factor, GrpE
  findings:
  - statement: GrpE is the dimeric nucleotide exchange factor for DnaK; binding to
      the DnaK nucleotide-binding domain opens the nucleotide-binding cleft (movement
      of subdomain IIB), accelerating ADP release. Its coiled-coil is thermolabile.
    reference_section_type: ABSTRACT
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: PubMed-verified (J Biol Chem 2024, doi:10.1016/j.jbc.2023.105574).
      Provides the current structural/mechanistic basis for GrpE NEF activity used
      in this review. Describes the conserved E. coli DnaK-GrpE mechanism applicable
      to the P. putida ortholog.
- id: PMID:38263151
  title: Structure of the M. tuberculosis DnaK-GrpE complex reveals how key DnaK roles
    are controlled
  findings:
  - statement: Cryo-EM reveals an asymmetric 1:2 DnaK:GrpE complex; the GrpE dimer
      "ratchets" to remodel both the nucleotide-binding and substrate-binding domains
      of DnaK, coupling ADP release to substrate release.
    reference_section_type: ABSTRACT
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: PubMed-verified (Nat Commun 2024, doi:10.1038/s41467-024-44933-9).
      Supports the dimeric/allosteric NEF mechanism; bacterial DnaK-GrpE system relevant
      to the conserved P. putida ortholog.
- id: PMID:16291668
  title: The heat shock genes dnaK, dnaJ, and grpE are involved in regulation of putisolvin
    biosynthesis in Pseudomonas putida PCL1445
  findings:
  - statement: In P. putida PCL1445, grpE, dnaK, and dnaJ are genomically linked (dnaK
      downstream of grpE, upstream of dnaJ), supporting a conserved Pseudomonas KJE
      chaperone gene cluster.
    reference_section_type: RESULTS
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: PubMed-verified (J Bacteriol 2005, doi:10.1128/JB.187.17.5967-5976.2005).
      Provides Pseudomonas-genus genomic/operon context for grpE; downstream effects
      on putisolvin biosynthesis are most parsimoniously indirect consequences of
      chaperone-network perturbation.
suggested_questions:
- question: Does the proposed thermosensor behavior of the GrpE coiled-coil operate
    at physiologically relevant temperatures for P. putida, given its mesophilic environmental
    lifestyle?
suggested_experiments:
- experiment: Determine the operon structure and promoter(s) of the grpE-dnaK-dnaJ
    locus (PP_4728 region) in P. putida KT2440 (e.g. by RNA-seq/transcription start
    site mapping and co-transcription assays) to confirm the inferred Pseudomonas chaperone
    gene cluster organization.
- experiment: Test whether a grpE conditional/depletion mutant in KT2440 impairs growth
    and protein refolding under heat and solvent (phenol) stress, to directly link
    the NEF function to stress-tolerance phenotypes in this organism.
