- description: Acts as an obligate homodimer that binds the DnaK chaperone, forming
    part of the DnaK/DnaJ/GrpE machine that promotes folding and refolding of proteins
    and prevents aggregation of stress-denatured proteins during the heat-shock and
    general stress response.
  supported_by:
  - reference_id: GO_REF:0000002
    supporting_text: GrpE annotated with protein homodimerization activity (GO:0042803)
      and protein-folding chaperone binding (GO:0051087) from InterPro IPR000740,
      and involved_in protein folding (GO:0006457).
  - reference_id: file:PSEPK/grpE/grpE-deep-research-falcon.md
    supporting_text: GrpE is the dimeric DnaK/Hsp70 cofactor of the conserved bacterial
      DnaK/DnaJ/GrpE chaperone system; in P. putida KT2440, GrpE was among the general-stress
      proteins upregulated after phenol exposure, consistent with an intracellular
      proteostasis role under heat and chemical stress.
  molecular_function:
