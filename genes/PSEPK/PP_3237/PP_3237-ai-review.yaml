description: PP_3237 encodes a cytoplasmic tandem-domain Universal Stress Protein A-family protein in Pseudomonas putida KT2440.
  UniProt transfers a DNA-damaging-agent resistance comment by similarity, but this first pass treats that as context rather
  than a gene-specific GO process annotation.
