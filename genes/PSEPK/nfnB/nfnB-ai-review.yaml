id: Q88K59
gene_symbol: nfnB
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: nfnB (PP_2432) encodes a nitroreductase-family soluble oxidoreductase. Current automated metadata includes
  an EC-derived 6,7-dihydropteridine reductase annotation, but the physiological substrate in KT2440 remains unresolved.
existing_annotations:
- term:
    id: GO:0004155
    label: 6,7-dihydropteridine reductase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000003
  qualifier: enables
  review:
    summary: The EC-derived 6,7-dihydropteridine reductase activity may be correct, but the fetched first-pass evidence
      does not distinguish this substrate call from broader nitroreductase-family oxidoreductase function.
    action: UNDECIDED
    reason: UniProt carries EC 1.5.1.34 and the corresponding GOA term, but the same entry is also described as a
      nitroreductase-family protein. No direct KT2440 substrate evidence was retrieved, so this specific activity is
      left undecided rather than promoted to the core function.
    supported_by:
    - reference_id: file:PSEPK/nfnB/nfnB-goa.tsv
      supporting_text: "GO:0004155\t6,7-dihydropteridine reductase activity"
    - reference_id: file:PSEPK/nfnB/nfnB-uniprot.txt
      supporting_text: "SubName: Full=6,7-dihydropteridine reductase"
    - reference_id: file:PSEPK/nfnB/nfnB-uniprot.txt
      supporting_text: Belongs to the nitroreductase family.
- term:
    id: GO:0016491
    label: oxidoreductase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: Broad oxidoreductase activity is supported as the safest current molecular-function annotation for nfnB.
    action: ACCEPT
    reason: The protein is in the nitroreductase family and has oxidoreductase-family GOA support. Because substrate
      specificity is unresolved, the broad oxidoreductase term is retained as the current core function.
    supported_by:
    - reference_id: file:PSEPK/nfnB/nfnB-goa.tsv
      supporting_text: "GO:0016491\toxidoreductase activity"
    - reference_id: file:PSEPK/nfnB/nfnB-uniprot.txt
      supporting_text: Belongs to the nitroreductase family.
