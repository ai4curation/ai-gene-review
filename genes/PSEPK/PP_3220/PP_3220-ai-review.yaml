description: PP_3220 encodes the ATP-binding energy-coupling subunit of a predicted dipeptide ABC import system in Pseudomonas putida KT2440. The reviewed UniProt product name assigns ABC-type dipeptide transporter activity (EC 7.4.2.9), and the adjacent PP_3221/PP_3222 permeases plus PP_3223 periplasmic binding protein support a compact peptide-import locus.
