  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: etp encodes a low-molecular-weight protein tyrosine phosphatase in Pseudomonas putida KT2440.
  The protein has LMW_PTPase/Ptyr_pPase domains and catalytic-site features consistent with protein tyrosine
  dephosphorylation. It is a protein-phosphatase side spillover in KEGG ppu02020, not a His-Asp two-component
  relay member.
