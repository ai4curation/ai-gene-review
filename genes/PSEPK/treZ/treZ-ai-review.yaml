id: Q88FN8
gene_symbol: treZ
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: treZ encodes malto-oligosyltrehalose trehalohydrolase in Pseudomonas putida KT2440. It is a cytoplasmic glycosyl hydrolase that hydrolyzes maltooligosyltrehalose to release trehalose in the TreY/TreZ trehalose biosynthesis route.
