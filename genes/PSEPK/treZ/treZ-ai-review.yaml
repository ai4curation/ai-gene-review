  review:
    summary: The broad glycosyl hydrolase term is correct but less informative than TreZ activity.
    action: MODIFY
    reason: TreZ specifically catalyzes 4-alpha-D-(1->4)-alpha-D-glucanotrehalose trehalohydrolase activity.
    proposed_replacement_terms:
