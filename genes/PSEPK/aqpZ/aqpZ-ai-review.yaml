id: Q88F17
gene_symbol: aqpZ
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: aqpZ encodes aquaporin Z, an inner-membrane water-selective channel that mediates rapid osmotically driven water movement.
  Falcon deep research confirms the MIP/aquaporin family assignment and orthology-based inference of a homotetrameric, water-selective
  (not glycerol-permeable) channel, while noting that no primary experimental study directly characterizes the P. putida KT2440 ortholog (PP_4282/Q88F17).
