suggested_questions:
- question: Does KT2440 AqpZ measurably contribute to osmotic-shock survival under the environmental conditions where P. putida
    encounters rapid osmolarity changes?
suggested_experiments:
- description: Compare osmotic downshock survival and stopped-flow water permeability in wild-type, aqpZ knockout, and complemented
    strains.
  experiment_type: osmotic-shock and membrane permeability assay
