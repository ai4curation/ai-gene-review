- id: file:PSEPK/aqpZ/aqpZ-deep-research-falcon.md
  title: Falcon (Edison Scientific) deep research report on aqpZ (Q88F17, PP_4282) in Pseudomonas putida KT2440
  findings:
  - statement: |-
      Q88F17 is best annotated as a **water-selective aquaporin (AqpZ-like)** that increases membrane water permeability.
    reference_section_type: OTHER
  - statement: |-
      AqpZ (Q88F17) is likely an inner-membrane aquaporin that facilitates rapid, selective transmembrane water flux (osmotic water permeability).
    reference_section_type: OTHER
  - statement: |-
      functional data summarized in authoritative prokaryotic aquaporin reviews indicate that AqpZ behaves as an “exclusive water facilitator” (water transport detectable; glycerol/urea transport not detected in standard assays).
    reference_section_type: OTHER
  - statement: |-
      PP_4282 is expected to localize to the **cytoplasmic (inner) membrane** of this Gram-negative bacterium and form tetramers, with **one functional water pore per monomer**.
    reference_section_type: OTHER
  - statement: |-
      AqpZ in canonical bacterial contexts supports **rapid water influx/efflux during sudden osmotic shifts** (hypo-osmotic induction noted; role in osmoregulation and competitive viability).
    reference_section_type: OTHER
  - statement: |-
      no primary experimental study was found that directly characterizes PP_4282/Q88F17
    reference_section_type: OTHER
