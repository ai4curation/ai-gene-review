  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: pstC (PP_2657) encodes a multi-pass inner-membrane permease component of the PstSACB high-affinity phosphate ABC importer. Its PstC-specific domain, binding-protein-dependent transport-system family assignment, and local pstS-pstC-pstA-pstB1 locus support phosphate translocation across the plasma membrane.
