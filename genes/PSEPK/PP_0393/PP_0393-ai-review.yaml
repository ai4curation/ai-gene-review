  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: PP_0393 encodes an HPPK-family 2-amino-4-hydroxy-6-hydroxymethyldihydropteridine diphosphokinase predicted to
  phosphorylate the hydroxymethyldihydropterin folate precursor. It is one of two HPPK-like proteins assigned to the P. putida
  KT2440 folate map, so the paralog-specific division of labor with folK remains unresolved.
