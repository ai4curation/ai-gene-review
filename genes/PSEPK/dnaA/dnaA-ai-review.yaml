taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: dnaA encodes the chromosomal replication initiator protein DnaA in Pseudomonas putida KT2440.
  It is a DnaA-family AAA+ ATPase that binds DnaA boxes at replication origins and initiates and regulates
  bacterial chromosome replication. It is a DNA-replication side spillover in KEGG ppu02020, not a two-component
  signaling protein.
