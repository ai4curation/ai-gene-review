id: Q88NX4
gene_symbol: argF
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: >-
  ArgF (PP_1079) is the biosynthetic ornithine carbamoyltransferase
  (EC 2.1.3.3). It transfers the carbamoyl group of carbamoyl phosphate to
  L-ornithine to form L-citrulline, beginning the three-reaction conversion of
  ornithine to L-arginine. The distinct ArcB enzyme supplies the related
  catabolic ornithine carbamoyltransferase activity.
