    label: ornithine carbamoyltransferase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: This is the defining ArgF molecular function.
    action: ACCEPT
    reason: Reviewed UniProt assigns EC 2.1.3.3, RHEA:19513, and the biosynthetic OTCase family to Q88NX4.
    supported_by:
    - reference_id: file:PSEPK/argF/argF-uniprot.txt
      supporting_text: Full=Ornithine carbamoyltransferase
    - reference_id: file:PSEPK/argF/argF-deep-research-openscientist.md
      supporting_text: >-
        carbamoyl phosphate + L-ornithine → L-citrulline + phosphate
