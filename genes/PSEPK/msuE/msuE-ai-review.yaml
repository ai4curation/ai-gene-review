description: 'msuE encodes an NADPH-dependent FMN reductase in Pseudomonas putida KT2440.
  It belongs to the SsuE/MsuE-type flavin reductase family and likely supplies reduced FMN
  for flavin-dependent monooxygenase reactions, including sulfur-compound metabolism, rather
  than forming riboflavin, FMN, or FAD de novo.'
