core_functions:
- description: ATP-dependent MurNAc/GlcNAc kinase that channels recycled cell-wall sugars into peptidoglycan precursor metabolism;
    no exact current GO molecular-function term exists, so the specific activity is requested in proposed_new_terms.
  directly_involved_in:
  - id: GO:0009254
    label: peptidoglycan turnover
  - id: GO:0097172
    label: N-acetylmuramic acid metabolic process
  supported_by:
  - reference_id: file:PSEPK/amgK/amgK-uniprot.txt
    supporting_text: phosphorylation of N-acetylmuramate (MurNAc) and N-acetylglucosamine
  - reference_id: PMID:23831760
    supporting_text: anomeric sugar kinase AmgK
proposed_new_terms:
- proposed_name: N-acetylmuramate/N-acetylglucosamine kinase activity
  proposed_definition: Catalysis of the ATP-dependent phosphorylation of N-acetylmuramate or N-acetylglucosamine at the C1
    hydroxyl group.
  justification: The reviewed P. putida AmgK entry and PMID:23831760 define a substrate-specific MurNAc/GlcNAc kinase reaction,
    while GOA can currently represent only broad carbohydrate kinase activity.
  proposed_parent:
    id: GO:0019200
    label: carbohydrate kinase activity
  supported_by:
  - reference_id: file:PSEPK/amgK/amgK-uniprot.txt
    supporting_text: Sugar kinase that catalyzes the ATP-dependent phosphorylation
  - reference_id: file:PSEPK/amgK/amgK-uniprot.txt
    supporting_text: N-acetylmuramate (MurNAc) and N-acetylglucosamine
suggested_questions:
- question: What are the in vivo relative contributions of MurNAc, GlcNAc, and GalNAc phosphorylation by AmgK during KT2440
    cell-wall recycling?
suggested_experiments:
- description: Compare sugar-phosphate metabolite levels and fosfomycin sensitivity in wild-type, amgK knockout, and catalytic-site
    rescue strains.
  experiment_type: metabolomics and antibiotic sensitivity assay
