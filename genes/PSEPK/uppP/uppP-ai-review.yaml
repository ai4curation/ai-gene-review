description: 'uppP encodes undecaprenyl-diphosphatase/BacA of Pseudomonas putida KT2440. This multi-pass inner-membrane phosphatase dephosphorylates undecaprenyl diphosphate, recycling the lipid carrier needed for peptidoglycan and other cell-envelope glycan biosynthesis; the BacA name reflects bacitracin-resistance context.'
