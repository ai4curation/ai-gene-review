  review:
    summary: Peptidoglycan biosynthesis is a missing process annotation for UppP/BacA in the local GOA file.
    action: NEW
    reason: UniProt records peptidoglycan-process context for UppP and explains that bacitracin inhibits peptidoglycan synthesis by sequestering undecaprenyl diphosphate, the substrate UppP recycles. This makes peptidoglycan biosynthetic process an appropriate curator lead for this module.
