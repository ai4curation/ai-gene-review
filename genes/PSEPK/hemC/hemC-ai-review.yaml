    qualifier: involved_in
    review:
      summary: HemC is an obligatory middle enzyme in the protoporphyrin route to heme b.
      action: ACCEPT
      reason: >-
        The HemC reaction generates the linear tetrapyrrole precursor required
        for uroporphyrinogen III and all downstream heme-b intermediates.
      supported_by:
        - reference_id: file:PSEPK/hemC/hemC-uniprot.txt
          supporting_text: "PATHWAY: Porphyrin-containing compound metabolism; protoporphyrin-IX"
  - term:
      id: GO:0033014
      label: tetrapyrrole biosynthetic process
    evidence_type: IEA
    original_reference_id: GO_REF:0000002
    qualifier: involved_in
    review:
      summary: The annotation is true but can be made more specific to the immediate product route.
      action: MODIFY
      reason: >-
        HemC directly builds hydroxymethylbilane for conversion to
        uroporphyrinogen III, so GO:0006780 is more informative than the broad
        tetrapyrrole parent.
      proposed_replacement_terms:
        - id: GO:0006780
          label: uroporphyrinogen III biosynthetic process
      supported_by:
        - reference_id: file:PSEPK/hemC/hemC-uniprot.txt
          supporting_text: Tetrapolymerization of the monopyrrole PBG into the
