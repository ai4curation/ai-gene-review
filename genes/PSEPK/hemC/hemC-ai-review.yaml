status: COMPLETE
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: >-
  HemC is the cytoplasmic hydroxymethylbilane synthase, also called
  porphobilinogen deaminase. It uses a covalently bound dipyrromethane cofactor
  to polymerize four porphobilinogen molecules into the linear tetrapyrrole
  hydroxymethylbilane, which HemD cyclizes to uroporphyrinogen III.
