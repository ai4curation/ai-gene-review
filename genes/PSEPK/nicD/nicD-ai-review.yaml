id: Q88FY3
gene_symbol: nicD
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: nicD encodes N-formylmaleamate deformylase, an alpha/beta-hydrolase-fold enzyme in the aerobic
  nicotinate degradation cluster of Pseudomonas putida KT2440. NicD hydrolyzes N-formylmaleamate to maleamate
  and formate downstream of NicX, completing a key step in nicotinate catabolism.
existing_annotations:
- term:
    id: GO:0016020
    label: membrane
  evidence_type: IEA
  original_reference_id: GO_REF:0000118
  review:
    summary: The generic membrane annotation is unsupported for NicD.
    action: REMOVE
    reason: The curated UniProt entry describes a soluble enzymatic role in nicotinate degradation and
      has no subcellular-location or transmembrane evidence supporting membrane localization. Falcon
      deep research confirms NicD is best annotated as cytosolic, assayed in soluble crude extracts,
      with no membrane segment, signal peptide, or export evidence reported.
    supported_by:
    - reference_id: file:PSEPK/nicD/nicD-uniprot.txt
      supporting_text: Deformylase that catalyzes the conversion of N-formylmaleamic
    - reference_id: file:PSEPK/nicD/nicD-deep-research-falcon.md
      supporting_text: 'Best current annotation is **cytosolic**: NicD was assayed in **soluble crude
        extracts** after heterologous expression; no membrane segment, signal peptide, or export evidence
        is reported in the cited sources.'
      reference_section_type: OTHER
- term:
    id: GO:1901848
    label: nicotinate catabolic process
  evidence_type: IDA
  original_reference_id: PMID:18678916
  review:
    summary: Nicotinate catabolic process is the correct pathway for NicD.
    action: ACCEPT
    reason: The KT2440 nic cluster paper and UniProt pathway section place NicD in aerobic nicotinate
      degradation. Falcon deep research confirms NicD acts downstream of NicX and upstream of NicF in
      the maleamate pathway, and that disruption of nicD prevents growth on nicotinic acid as sole
      carbon source, establishing an essential pathway role.
    supported_by:
    - reference_id: file:PSEPK/nicD/nicD-uniprot.txt
      supporting_text: Deformylase that catalyzes the conversion of N-formylmaleamic
    - reference_id: PMID:18678916
      supporting_text: Further conversion of N-formylmaleamic acid to formic and maleamic acid is catalyzed
        by the NicD protein
      reference_section_type: ABSTRACT
    - reference_id: file:PSEPK/nicD/nicD-uniprot.txt
      supporting_text: 'PATHWAY: Cofactor degradation; nicotinate degradation'
    - reference_id: file:PSEPK/nicD/nicD-deep-research-falcon.md
      supporting_text: Disruption of **nicD** prevented growth on **nicotinic acid** as sole carbon source,
        supporting an essential pathway role in KT2440; the nic cluster as a cassette restored NA utilization
        in nondegrading backgrounds.
      reference_section_type: OTHER
- term:
    id: GO:0016811
    label: hydrolase activity, acting on carbon-nitrogen (but not peptide) bonds, in linear amides
  evidence_type: IDA
  original_reference_id: PMID:18678916
  review:
    summary: Hydrolase activity acting on C-N bonds in linear amides captures the current GO molecular-function
      support for NicD deformylase chemistry.
    action: ACCEPT
    reason: The exact deformylase activity lacks a specific GO term in the current annotations, but NicD
      hydrolyzes N-formylmaleamate to maleamate and formate through an amide-bond hydrolase reaction.
      Falcon deep research corroborates the deformylase reaction and the alpha/beta-hydrolase
      catalytic triad (S101-D125-H245) underpinning this molecular function.
    supported_by:
    - reference_id: file:PSEPK/nicD/nicD-uniprot.txt
      supporting_text: Deformylase that catalyzes the conversion of N-formylmaleamic
    - reference_id: PMID:18678916
      supporting_text: Further conversion of N-formylmaleamic acid to formic and maleamic acid is catalyzed
        by the NicD protein
      reference_section_type: ABSTRACT
    - reference_id: file:PSEPK/nicD/nicD-deep-research-falcon.md
      supporting_text: NicD catalyzes **N-formylmaleamic acid (NFM) → maleamic acid + formic acid**; this
        corresponds to **EC 3.5.1.106** (N-formylmaleamate deformylase) and removes the N-formyl group
        generated after pyridine-ring cleavage.
      reference_section_type: OTHER
    - reference_id: file:PSEPK/nicD/nicD-deep-research-falcon.md
      supporting_text: Site-directed mutagenesis supports **S101–D125–H245** as the catalytic triad;
        **S101A, D125A, H245A** abolished activity, whereas **E221A** retained ~**70%** of wild-type
        activity, arguing E221 is not the catalytic acid.
      reference_section_type: OTHER
    - reference_id: file:PSEPK/nicD/nicD-uniprot.txt
      supporting_text: Reaction=N-formylmaleamate + H2O = maleamate + formate
