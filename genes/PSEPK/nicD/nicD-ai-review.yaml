proposed_new_terms:
- proposed_name: N-formylmaleamate deformylase activity
  proposed_definition: Catalysis of the reaction N-formylmaleamate + H2O = maleamate + formate + H(+).
  justification: NicD has a characterized substrate-level deformylase reaction in nicotinate catabolism,
    while the current GO annotation can only use the broader linear-amide hydrolase parent.
