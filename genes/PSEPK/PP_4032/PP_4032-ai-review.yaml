description: PP_4032 encodes an outer-membrane lipoprotein Blc/lipocalin-family protein in Pseudomonas putida KT2440. The
  UniProt/PIRNR evidence supports lipid binding, likely lysophospholipid preference, and cell outer membrane localization,
  while the broad stress-response annotation is retained as non-core context.
