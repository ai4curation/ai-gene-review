id: A0A140FWS5
gene_symbol: betI
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: betI (PP_5719) encodes a TetR/BetI-family HTH transcriptional repressor that controls choline-responsive bet
  gene expression, including the BetT transporter and BetAB glycine betaine biosynthesis genes.
existing_annotations:
- term:
    id: GO:0000976
    label: transcription cis-regulatory region binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000118
  qualifier: enables
  review:
    summary: Transcription cis-regulatory region binding is consistent with BetI's HTH DNA-binding regulator role.
    action: ACCEPT
    reason: The UniProt record identifies BetI as an HTH-type transcriptional regulator and describes repression of bet genes;
      the GOA TreeGrafter annotation is therefore an appropriate molecular-function term for promoter/operator binding.
    supported_by:
    - reference_id: file:PSEPK/betI/betI-uniprot.txt
      supporting_text: HTH-type transcriptional regulator BetI
    - reference_id: file:PSEPK/betI/betI-uniprot.txt
      supporting_text: Repressor involved in choline regulation of the bet genes.
    - reference_id: file:PSEPK/betI/betI-goa.tsv
      supporting_text: "GO:0000976\ttranscription cis-regulatory region binding"
- term:
    id: GO:0003677
    label: DNA binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: DNA binding is correct but less informative than the cis-regulatory-region and transcription-factor terms.
    action: KEEP_AS_NON_CORE
    reason: BetI has an HTH DNA-binding motif and acts as a transcriptional repressor, so DNA binding is biologically sound;
      the more specific GOA annotations should carry the core interpretation.
    supported_by:
    - reference_id: file:PSEPK/betI/betI-uniprot.txt
      supporting_text: HTH tetR-type
    - reference_id: file:PSEPK/betI/betI-uniprot.txt
      supporting_text: H-T-H motif
    - reference_id: file:PSEPK/betI/betI-goa.tsv
      supporting_text: "GO:0003677\tDNA binding"
- term:
    id: GO:0003700
    label: DNA-binding transcription factor activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: DNA-binding transcription factor activity captures BetI's core molecular role as an HTH transcriptional regulator.
    action: ACCEPT
    reason: UniProt/HAMAP names the protein as an HTH-type transcriptional regulator and describes repression of BetT and BetAB
      transcription, matching the GOA transcription-factor activity assignment.
    supported_by:
    - reference_id: file:PSEPK/betI/betI-uniprot.txt
      supporting_text: HTH-type transcriptional regulator BetI
    - reference_id: file:PSEPK/betI/betI-uniprot.txt
      supporting_text: It represses transcription of the choline transporter
    - reference_id: file:PSEPK/betI/betI-goa.tsv
      supporting_text: "GO:0003700\tDNA-binding transcription factor activity"
- term:
    id: GO:0006355
    label: regulation of DNA-templated transcription
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: involved_in
  review:
    summary: Regulation of DNA-templated transcription is correct but broad for BetI.
    action: KEEP_AS_NON_CORE
    reason: BetI's reviewed role is negative regulation of bet operon transcription. The broad regulation term is retained as
      valid context, while the negative-regulation annotation is the better biological-process term for the core review.
    supported_by:
    - reference_id: file:PSEPK/betI/betI-uniprot.txt
      supporting_text: It represses transcription of the choline transporter
    - reference_id: file:PSEPK/betI/betI-goa.tsv
      supporting_text: "GO:0006355\tregulation of DNA-templated transcription"
- term:
    id: GO:0045892
    label: negative regulation of DNA-templated transcription
  evidence_type: IEA
  original_reference_id: GO_REF:0000104
  qualifier: involved_in
  review:
    summary: Negative regulation of DNA-templated transcription captures BetI's core process role as a repressor.
    action: ACCEPT
    reason: The UniProt record specifically states that BetI represses transcription of BetT and BetAB glycine betaine genes,
      so the UniRule negative-regulation annotation is appropriate.
    supported_by:
    - reference_id: file:PSEPK/betI/betI-uniprot.txt
      supporting_text: Repressor involved in choline regulation of the bet genes.
    - reference_id: file:PSEPK/betI/betI-uniprot.txt
      supporting_text: It represses transcription of the choline transporter
    - reference_id: file:PSEPK/betI/betI-goa.tsv
      supporting_text: "GO:0045892\tnegative regulation of DNA-templated transcription"
