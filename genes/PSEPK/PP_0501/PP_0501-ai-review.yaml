  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: >-
  PP_0501 encodes an unreviewed predicted NAD-dependent epimerase/dehydratase
  family protein in Pseudomonas putida KT2440. Current UniProt-derived metadata
  places the protein in a broad epimerase/dehydratase and lipid-A-modification
  related family, but does not assign an EC number, GO term, or substrate-specific
  function. It should be retained as a galactose/nucleotide-sugar pathway-adjacent
  candidate rather than curated as a specific Leloir or UDP-sugar enzyme in this
  first pass.
