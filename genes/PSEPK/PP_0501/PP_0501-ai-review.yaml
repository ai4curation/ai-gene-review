suggested_questions:
- question: >-
    What nucleotide-sugar or lipid-A-related substrate, if any, is used by
    PP_0501 in KT2440?
suggested_experiments:
- description: >-
    Purify PP_0501 and screen nucleotide-sugar epimerase/dehydratase substrates,
    including UDP-glucose, UDP-galactose, UDP-glucuronic acid, and lipid-A
    modification pathway intermediates.
  experiment_type: enzyme substrate panel
