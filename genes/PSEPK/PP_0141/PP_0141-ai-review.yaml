description: PP_0141 encodes the predicted ABC ATP-binding protein adjacent to the PP_0140 Mce/MlaD-domain protein and the
  PP_0142 MlaE-family permease. Its supported molecular role is ATP binding and ATP hydrolysis by an ABC transporter nucleotide-binding
  domain; its substrate pathway assignment to the PP_0140-PP_0142 putative phospholipid transporter is inferred from locus
  context.
