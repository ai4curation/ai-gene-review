proposed_new_terms: []
suggested_questions:
  - question: >-
      Does KT2440 LapG process only LapA, or are additional surface adhesins or
      secreted proteins direct physiological substrates under specific conditions?
  - question: >-
      Which environmental signals besides nutrient starvation most strongly shift
      LapD from LapG sequestration to substrate-cleavage permissive states in KT2440?
suggested_experiments:
  - hypothesis: >-
      KT2440 LapG directly cleaves the N-terminal retention region of LapA through
      its conserved cysteine protease active site.
    description: >-
      Purify LapG and LapA N-terminal substrate fragments, measure cleavage in vitro,
      and compare wild-type protein with catalytic-site mutants to verify direct
      substrate processing and define the cleavage requirements of the KT2440 enzyme.
    experiment_type: biochemical cleavage assay
  - hypothesis: >-
      LapG controls a broader exported-surface substrate set than LapA alone during
      biofilm dispersal transitions.
    description: >-
      Compare cell-surface and supernatant proteomes from wild type, lapG deletion,
      and lapD deletion strains during nutrient downshift or DibA activation to
      identify proteins whose release depends on LapG activity.
    experiment_type: comparative surface proteomics
