core_functions:
  - description: >-
      LapG is a periplasmic cysteine endopeptidase that cleaves the surface adhesin
      LapA when LapD-mediated sequestration is relieved, lowering cell-surface
      retention and contributing to release from the biofilm state.
    molecular_function:
      id: GO:0004197
      label: cysteine-type endopeptidase activity
    directly_involved_in:
