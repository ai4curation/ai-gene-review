id: Q88RG6
gene_symbol: lapG
product_type: PROTEIN
aliases:
  - PP_0164
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: >-
  lapG (PP_0164) encodes the LapG adhesin-processing protease of the LapD/LapG
  retention circuit in Pseudomonas putida KT2440. The protein is a small exported
  cysteine peptidase family member whose documented role in KT2440 is to cleave
  surface-retained LapA after LapD no longer sequesters LapG, thereby reducing
  adhesiveness and promoting biofilm dispersal.
references:
  - id: file:PSEPK/lapG/lapG-uniprot.txt
    title: UniProtKB Q88RG6 record for Pseudomonas putida KT2440 PP_0164
    findings:
      - statement: >-
          Q88RG6 is a 230 aa predicted transglutaminase-like cysteine protease
          family protein with NCBIfam CystProtLapG and Pfam Peptidase_C93
          assignments.
        supporting_text: DR   NCBIfam; NF045674; CystProtLapG; 1.
  - id: file:PSEPK/lapG/lapG-notes.md
    title: Curator notes for Pseudomonas putida KT2440 lapG
    findings:
      - statement: >-
          In KT2440, nutrient starvation promotes LapA proteolysis and release of
          biofilm cells through the LapD/LapG pathway.
        supporting_text: >-
          In KT2440, nutrient starvation relieves LapD inhibition of LapG, leading
          to LapA proteolysis and release of biofilm cells.
      - statement: >-
          DibA-dependent signaling modulates LapA levels through LapD and thereby
          inhibits biofilm formation in KT2440.
        supporting_text: >-
          DibA modulates LapA levels through LapD and thereby inhibits biofilm
          formation in P. putida KT2440.
      - statement: >-
          Cross-species evidence supports conserved periplasmic adhesin-processing
          activity for the LapG family.
  - id: file:PSEPK/lapG/lapG-deep-research-falcon.md
    title: Falcon deep research report for Pseudomonas putida KT2440 lapG
    findings:
      - statement: >-
          Falcon synthesis identifies PP_0164/Q88RG6 as the KT2440 LapG ortholog
          in the LapD-LapG-LapA adhesin control circuit.
      - statement: >-
          The report supports periplasmic cysteine protease activity linked to
          LapA release and biofilm dispersal.
