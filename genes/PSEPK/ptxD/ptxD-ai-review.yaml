taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: Phosphonate dehydrogenase of Pseudomonas putida KT2440 (PP_3376), annotated as EC 1.20.1.1
  and expected to oxidize reduced phosphorus compounds with NAD as cofactor. This is a phosphonate/phosphite
  metabolism side-node in the KEGG PPP map, not a strict pentose phosphate pathway enzyme.
