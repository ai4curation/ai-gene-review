id: Q88CN3
gene_symbol: PP_5147
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: >-
  PP_5147 is a predicted monofunctional HAD-family histidinol-phosphate
  phosphatase (EC 3.1.3.15) in Pseudomonas putida KT2440. It is a close
  full-length ortholog of Pseudomonas aeruginosa PA0335, whose phosphatase
  activity and histidine-biosynthesis phenotype have been demonstrated. This
  strongly supports hydrolysis of L-histidinol phosphate to L-histidinol in the
  penultimate pathway reaction, although PP_5147 itself has not been assayed.
  KT2440 also encodes the unrelated IMPase-like HisN candidate PP_3157, and the
  division of physiological flux between them is unknown.
existing_annotations:
- term:
    id: GO:0004401
    label: histidinol-phosphatase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000003
  qualifier: enables
  review:
    summary: Strong orthology supports the exact histidinol-phosphatase activity.
    action: ACCEPT
    reason: >-
      Q88CN3 is a full-length close ortholog of the experimentally validated
      P. aeruginosa enzyme PA0335 and shares its HAD-SF-IB family signatures.
      This is strong transfer evidence despite the absence of a direct KT2440
      assay; the coexistence of PP_3157 indicates possible redundancy rather
      than evidence against the activity.
    supported_by:
    - reference_id: file:PSEPK/PP_5147/PP_5147-deep-research-openscientist.md
      supporting_text: "67.7% amino-acid identity to the experimentally validated ortholog PA0335"
    - reference_id: PMID:31862725
      supporting_text: "PA0335 was shown to encode Hol-Pase"
- term:
    id: GO:0000105
    label: L-histidine biosynthetic process
  evidence_type: ISS
  original_reference_id: PMID:31862725
  qualifier: involved_in
  review:
    summary: >-
      PP_5147 should be annotated to histidine biosynthesis by close orthology
      to experimentally validated Pseudomonas PA0335.
    action: NEW
    reason: >-
      PA0335 disruption causes histidine-biosynthesis deficiency, and the
      full-length PP_5147 protein is highly similar with matching HAD-family
      signatures. This is an orthology-based proposal, not direct KT2440
      experimental evidence.
    supported_by:
    - reference_id: PMID:31862725
      supporting_text: "PA0335 was shown to encode Hol-Pase"
    - reference_id: file:PSEPK/PP_5147/PP_5147-deep-research-openscientist.md
      supporting_text: "67.7% amino-acid identity to the experimentally validated ortholog PA0335"
