suggested_questions:
- question: >-
    How much histidinol-phosphatase flux does PP_5147 carry in vivo, and is its
    role redundant with or conditionally distinct from PP_3157?
suggested_experiments:
- description: >-
    Compare single and double PP_5147/PP_3157 deletion strains for histidine
    auxotrophy and assay purified proteins against histidinol phosphate and
    phosphoserine.
  experiment_type: genetic complementation and substrate-specific enzyme assay
