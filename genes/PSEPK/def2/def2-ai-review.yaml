  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: >-
  def2 encodes peptide deformylase 2 in Pseudomonas putida KT2440, a cytoplasmic
  metallohydrolase that removes the N-formyl group from nascent bacterial
  proteins. Current UniProt, GOA, and PANTHER evidence support protein
  maturation/translation context, not fatty-acid beta-oxidation; the Falcon
  ppu00071 report's PP_4559 CoA-ligase statement is therefore treated as an
  identifier conflict requiring manual follow-up.
