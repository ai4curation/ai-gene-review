description: aspS encodes a non-discriminating aspartyl-tRNA synthetase that charges
  tRNA(Asp) and tRNA(Asn) with aspartate, feeding direct aspartyl-tRNA formation and
  indirect Asn-tRNA synthesis through GatCAB transamidation.
