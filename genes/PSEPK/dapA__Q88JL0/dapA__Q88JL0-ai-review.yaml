id: Q88JL0
gene_symbol: dapA
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: >-
  DapA-II (PP_2639) is a 4-hydroxy-tetrahydrodipicolinate synthase (EC 4.3.3.7)
  that condenses L-aspartate 4-semialdehyde with pyruvate in the first dedicated
  reaction of the diaminopimelate route to L-lysine. KT2440 also encodes the
  DapA-specific paralog Q88NH2; their relative physiological contributions are
  unresolved.
