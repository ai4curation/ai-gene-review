taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: >-
  dapA-II (PP_2639/Q88JL0) encodes a DapA-family
  4-hydroxy-tetrahydrodipicolinate synthase. It supports the
  diaminopimelate/L-lysine biosynthetic route and is a ppu00261 precursor
  context enzyme rather than direct evidence for monobactam biosynthesis.
