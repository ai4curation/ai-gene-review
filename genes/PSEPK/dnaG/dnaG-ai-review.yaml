description: dnaG (PP_0388) encodes the bacterial DNA primase. DnaG synthesizes short RNA primers on single-stranded DNA templates
  during chromosome replication and acts with the DnaB helicase within the primosome to initiate lagging-strand Okazaki fragment
  synthesis.
