description: urtE encodes the second ATP-binding energy-coupling subunit of the PP_4841-PP_4845
  UrtABCDE urea ABC uptake system. Its ABC ATPase domain and UrtE-specific InterPro
  assignment support ATP hydrolysis coupled to urea import, while amino-acid/BCAA
  transport annotations are likely over-propagated from related amino-acid transporter
  families.
