  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: recG (PP_5310) encodes ATP-dependent DNA helicase RecG, a RecG-family 3'-to-5' DNA helicase that remodels branched
  DNA structures including stalled replication forks and recombination intermediates. It contributes to DNA repair and homologous
  recombination by branch migration/fork regression outside the RuvAB motor system.
