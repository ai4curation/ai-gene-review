id: Q88NB8
gene_symbol: moaE
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: >-
  moaE encodes the catalytic subunit of molybdopterin synthase. In a complex with
  sulfur-loaded MoaD carrier subunits, MoaE incorporates two sulfurs into cyclic
  pyranopterin monophosphate to form molybdopterin during molybdenum-cofactor
  biosynthesis.
