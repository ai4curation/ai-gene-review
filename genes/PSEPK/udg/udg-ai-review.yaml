suggested_questions:
- question: Which cell-envelope or polysaccharide products consume most UDP-glucuronate made by Udg in KT2440?
- question: Is Udg essential for specific alginate, LPS, or exopolysaccharide phenotypes under stress or biofilm conditions?
suggested_experiments:
- description: >-
    Measure UDP-glucose and UDP-glucuronate pools in wild-type, udg deletion,
    and complemented strains.
  experiment_type: nucleotide-sugar metabolomics
- description: >-
    Compare polysaccharide composition, biofilm phenotypes, and envelope-stress
    sensitivity in udg deletion and complemented strains.
  experiment_type: targeted genetics and envelope phenotyping
