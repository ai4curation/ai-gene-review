id: Q88IS3
gene_symbol: udg
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: >-
  udg (PP_2926) encodes UDP-glucose 6-dehydrogenase in Pseudomonas putida
  KT2440. The enzyme oxidizes UDP-alpha-D-glucose to UDP-alpha-D-glucuronate
  using NAD+, supplying UDP-glucuronate for nucleotide-sugar and
  polysaccharide/cell-envelope precursor metabolism.
existing_annotations:
- term:
    id: GO:0000271
    label: polysaccharide biosynthetic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: involved_in
  review:
    summary: >-
      Keep as a non-core downstream process because UDP-glucuronate is a
      polysaccharide precursor, but the enzyme's direct function is
      UDP-glucose 6-dehydrogenase activity.
    action: KEEP_AS_NON_CORE
    reason: >-
      UniProt places Udg in UDP-alpha-D-glucuronate biosynthesis from
      UDP-alpha-D-glucose. That product can feed polysaccharide biosynthesis,
      but the direct core annotation should be the enzyme activity and
      UDP-glucuronate biosynthetic process.
    supported_by:
    - reference_id: file:PSEPK/udg/udg-uniprot.txt
      supporting_text: 'CC   -!- PATHWAY: Nucleotide-sugar biosynthesis; UDP-alpha-D-glucuronate'
    - reference_id: file:PSEPK/udg/udg-uniprot.txt
      supporting_text: 'DR   GO; GO:0000271; P:polysaccharide biosynthetic process; IEA:InterPro.'
- term:
    id: GO:0003979
    label: UDP-glucose 6-dehydrogenase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: Accept the UDP-glucose 6-dehydrogenase activity.
    action: ACCEPT
    reason: >-
      The UniProt record names Udg as UDP-glucose 6-dehydrogenase, assigns EC
      1.1.1.22, and gives the Rhea reaction from UDP-alpha-D-glucose to
      UDP-alpha-D-glucuronate.
    supported_by:
    - reference_id: file:PSEPK/udg/udg-uniprot.txt
      supporting_text: 'DE   RecName: Full=UDP-glucose 6-dehydrogenase'
    - reference_id: file:PSEPK/udg/udg-uniprot.txt
      supporting_text: 'Reaction=UDP-alpha-D-glucose + 2 NAD(+) + H2O = UDP-alpha-D-glucuronate'
- term:
    id: GO:0016616
    label: oxidoreductase activity, acting on the CH-OH group of donors, NAD or NADP as acceptor
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: >-
      The parent oxidoreductase class is correct but less informative than
      UDP-glucose 6-dehydrogenase activity.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      Udg has a specific EC/Rhea-backed enzyme activity, so the broader
      CH-OH-group oxidoreductase term should not be treated as the core function.
    supported_by:
    - reference_id: file:PSEPK/udg/udg-uniprot.txt
      supporting_text: 'DR   GO; GO:0003979; F:UDP-glucose 6-dehydrogenase activity; IEA:UniProtKB-EC.'
- term:
    id: GO:0051287
    label: NAD binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: Accept as a cofactor-binding feature of the UDP-glucose 6-dehydrogenase.
    action: KEEP_AS_NON_CORE
    reason: >-
      UniProt records multiple NAD+ binding features for Udg. This is a real
      cofactor-binding property, but less informative than the catalytic
      UDP-glucose 6-dehydrogenase activity.
    supported_by:
    - reference_id: file:PSEPK/udg/udg-uniprot.txt
      supporting_text: 'FT   BINDING         30'
    - reference_id: file:PSEPK/udg/udg-uniprot.txt
      supporting_text: '/ligand="NAD(+)"'
- term:
    id: GO:0006065
    label: UDP-glucuronate biosynthetic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000041
  qualifier: involved_in
  review:
    summary: Accept UDP-glucuronate biosynthesis as the direct nucleotide-sugar process.
    action: ACCEPT
    reason: >-
      UniProt explicitly places Udg in UDP-alpha-D-glucuronate biosynthesis from
      UDP-alpha-D-glucose and marks it as the single step in that UniPathway
      route.
    supported_by:
    - reference_id: file:PSEPK/udg/udg-uniprot.txt
      supporting_text: 'CC   -!- PATHWAY: Nucleotide-sugar biosynthesis; UDP-alpha-D-glucuronate'
    - reference_id: file:PSEPK/udg/udg-uniprot.txt
      supporting_text: 'biosynthesis; UDP-alpha-D-glucuronate from UDP-alpha-D-glucose: step'
