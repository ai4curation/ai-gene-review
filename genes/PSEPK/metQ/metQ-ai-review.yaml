  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: metQ (PP_0112) encodes the predicted lipoprotein substrate-binding component
  of the MetNIQ methionine ABC importer. The product name, MetQ/NlpA-family domain,
  and local metQ-metI-metN1 locus support a methionine-import role, with the exact
  L- versus D-methionine substrate range inferred from the cognate MetN1/MetI annotations
  rather than directly assayed in KT2440.
