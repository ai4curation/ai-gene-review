  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: Multifunctional D-isomer-specific 2-hydroxyacid dehydrogenase/reductase of Pseudomonas putida
  KT2440 (PP_1261), annotated as 2-ketoaldonate reductase / hydroxypyruvate/glyoxylate reductase. The
  protein carries EC annotations for gluconate 2-dehydrogenase, hydroxypyruvate reductase, and glyoxylate
  reductase activities and is best treated as a PPP-adjacent sugar-acid/one-carbon reductase rather than
  a strict pentose phosphate enzyme.
