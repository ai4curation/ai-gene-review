    label: protein dimerization activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: Alpha-subunit dimerization is retained as assembly context for the RNAP core.
    action: KEEP_AS_NON_CORE
