      supporting_text: "Reaction=RNA(n) + a ribonucleoside 5'-triphosphate = RNA(n+1) +"
    - &rpoa_subunit
      reference_id: file:PSEPK/rpoA/rpoA-uniprot.txt
      supporting_text: "The RNAP catalytic core consists of 2 alpha, 1"
