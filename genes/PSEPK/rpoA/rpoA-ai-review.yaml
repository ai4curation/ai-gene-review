  review:
    summary: DNA-directed RNA polymerase activity is accepted as the complex-level core activity to which rpoA contributes.
    action: ACCEPT
    reason: The rpoA product is a core RNAP subunit; UniProt states that the enzyme catalyzes DNA-to-RNA transcription using ribonucleoside triphosphates and records the EC 2.7.7.6 reaction.
