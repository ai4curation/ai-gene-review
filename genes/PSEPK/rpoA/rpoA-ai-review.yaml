id: Q88QL1
gene_symbol: rpoA
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: >-
  rpoA (PP_0479) encodes the alpha subunit of the bacterial DNA-directed RNA
  polymerase core enzyme. Two RpoA subunits form the alpha dimer that nucleates
  assembly of the beta, beta-prime, and omega subunits into the catalytic core.
  The N-terminal domain supports RNAP assembly and basal transcription, while
  the C-terminal domain contacts transcriptional regulators and upstream
  promoter elements. RpoA is therefore best treated as a cytosolic core
  RNA-polymerase structural/assembly subunit that contributes to DNA-templated
  RNA synthesis as part of the alpha2-beta-beta-prime-omega enzyme, rather than
  as an independently catalytic polymerase.
existing_annotations:
- term:
    id: GO:0003677
    label: DNA binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: >-
      DNA binding is plausible for the alpha subunit because the alpha C-terminal
      domain contacts upstream promoter elements and transcriptional regulators.
      It is less informative than the core RNAP complex role.
    action: KEEP_AS_NON_CORE
    reason: >-
      Retain as a broad supporting activity, but do not treat generic DNA
      binding as the main function of RpoA. The core role is alpha dimer
      assembly and contribution to complex-level RNA polymerase activity.
- term:
    id: GO:0003899
    label: DNA-directed RNA polymerase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: >-
      RpoA is required for the bacterial RNA polymerase core enzyme, but the
      alpha subunit does not independently catalyze RNA-chain elongation.
    action: MODIFY
    reason: >-
      The term is biologically correct as complex-level function, but the
      qualifier should be interpreted as contribution to the assembled core
      enzyme rather than standalone catalytic activity by RpoA alone.
    proposed_replacement_terms:
    - id: GO:0003899
      label: DNA-directed RNA polymerase activity
    supported_by:
    - reference_id: file:PSEPK/rpoA/rpoA-uniprot.txt
      supporting_text: DNA-dependent RNA polymerase catalyzes the transcription of
