    label: DNA binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: DNA binding is retained for rpoA because the alpha subunit participates in promoter/upstream-element contacts within bacterial RNAP.
    action: ACCEPT
    reason: UniProt describes the alpha C-terminal domain as interacting with transcriptional regulators and upstream promoter elements, and GOA assigns DNA binding from UniRule/InterPro evidence.
