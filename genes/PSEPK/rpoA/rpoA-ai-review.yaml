- term:
    id: GO:0006351
    label: DNA-templated transcription
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: involved_in
  review:
    summary: DNA-templated transcription is accepted as the biological process mediated by the RNAP core enzyme containing rpoA.
    action: ACCEPT
    reason: UniProt states that RNA polymerase transcribes DNA into RNA, and the alpha subunit is part of the core and holoenzyme that initiates transcription with sigma factor.
    supported_by:
    - reference_id: file:PSEPK/rpoA/rpoA-goa.tsv
      supporting_text: "GO:0006351\tDNA-templated transcription"
    - *rpoa_function
    - reference_id: file:PSEPK/rpoA/rpoA-uniprot.txt
      supporting_text: "the holoenzyme is formed, which can initiate"
- term:
    id: GO:0034062
    label: 5'-3' RNA polymerase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000116
  qualifier: enables
  review:
    summary: The Rhea-derived 5'-3' RNA polymerase activity is correct but should be represented by the more specific DNA-directed RNA polymerase term.
    action: MODIFY
    reason: The substrate-template context is DNA-directed transcription by bacterial RNAP; GO:0003899 captures the same reaction more specifically for rpoA.
    proposed_replacement_terms:
    - id: GO:0003899
      label: DNA-directed RNA polymerase activity
    supported_by:
