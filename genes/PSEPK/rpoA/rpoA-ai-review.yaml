    label: cytoplasm
  evidence_type: IEA
  original_reference_id: GO_REF:0000117
  qualifier: located_in
  review:
    summary: Cytoplasm is retained as bacterial localization context but is not the most informative functional annotation.
    action: KEEP_AS_NON_CORE
    reason: Bacterial chromosomal transcription occurs in the cytoplasm, but the core curation signal for rpoA is RNAP complex function and transcription.
    supported_by:
    - reference_id: file:PSEPK/rpoA/rpoA-goa.tsv
      supporting_text: "GO:0005737\tcytoplasm"
