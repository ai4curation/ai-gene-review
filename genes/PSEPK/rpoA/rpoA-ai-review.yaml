id: Q88QL1
gene_symbol: rpoA
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: rpoA encodes the alpha subunit of the Pseudomonas putida KT2440 DNA-directed RNA polymerase core enzyme. The alpha subunits dimerize, help assemble the alpha2-beta-beta-prime-omega catalytic core, support basal transcription, and provide contacts for transcriptional regulators and upstream promoter elements.
