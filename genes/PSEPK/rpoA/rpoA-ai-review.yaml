  evidence_type: IEA
  original_reference_id: GO_REF:0000117
  qualifier: located_in
  review:
    summary: >-
      Cytoplasmic localization is appropriate for a soluble bacterial RNA
      polymerase core subunit.
    action: ACCEPT
    reason: >-
      RpoA functions in the bacterial cytoplasm/nucleoid as part of the
      transcription machinery.
- term:
    id: GO:0006351
    label: DNA-templated transcription
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: involved_in
  review:
    summary: >-
      RpoA participates directly in DNA-templated transcription as an essential
      alpha subunit of the bacterial RNA polymerase core enzyme.
    action: ACCEPT
    reason: >-
      The process term correctly captures the biological process performed by
      the assembled RNAP core and sigma-factor-associated holoenzymes.
- term:
