description: PP_4521 encodes a predicted aerotaxis receptor in the MCP family with PAS and MCP signaling
  domains in Pseudomonas putida KT2440. The receptor is assigned to the ppu02030 chemotaxis boundary,
  but this first-pass curation does not assign a specific chemoeffector ligand.
