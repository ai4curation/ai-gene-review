description: PP_1006 encodes a TonB-dependent outer-membrane heme receptor. The protein has the beta-barrel/plug architecture
  of TonB-dependent receptors and heme/Hb-receptor family signatures, supporting heme uptake across the outer membrane as
  its primary substrate-specific role.
