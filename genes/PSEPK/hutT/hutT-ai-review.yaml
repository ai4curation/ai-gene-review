- id: file:PSEPK/hutT/hutT-deep-research-falcon.md
  title: Falcon (Edison Scientific) deep research report on hutT (Q88CZ8) in Pseudomonas putida KT2440
  findings:
  - statement: HutT is the major, high-affinity, high-specificity L-histidine:proton symporter of P. putida KT2440, using
      the proton motive force rather than ATP hydrolysis or Na+-symport to drive uptake.
    supporting_text: high-affinity, high-specificity L-histidine:H+ symporter** that uses the **proton motive force (pmf)**
      rather than ATP hydrolysis or Na+-symport to drive uptake
  - statement: Deletion of hutT severely impairs growth of P. putida KT2440 on histidine, establishing HutT as the dominant
      physiologically relevant histidine uptake route.
    supporting_text: Deleting **hutT** in *P. putida* KT2440 severely impairs growth on histidine, indicating HutT is the
      **dominant physiologically relevant uptake route** under tested conditions
  - statement: HutT has narrow substrate specificity for L-histidine, with little or no competition from arginine, lysine,
      proline, imidazole, 3-amino-1,2,4-triazole, or urocanate.
    supporting_text: HutT shows **narrow substrate specificity for L-histidine**
  - statement: Competition assays show little or no inhibition of histidine uptake by other amino acids or histidine analogs,
      supporting high specificity.
    supporting_text: little/no competition by arginine, lysine, cyclic proline, imidazole, 3-amino-1,2,4-triazole, or urocanate
  - statement: Protonophores CCCP and DNP abolish histidine uptake, and an imposed proton motive force stimulates uptake ~21-fold
      in proteoliposomes, indicating proton-coupled secondary active transport.
    supporting_text: "CCCP (20 \xB5M) and DNP (2 mM) abolish detectable ^3H-histidine uptake in whole cells"
  - statement: An imposed inward proton motive force stimulates HutT uptake about 21-fold in reconstituted proteoliposomes.
    supporting_text: "an inward **\u0394\u03C8 + \u0394pH (pmf)** stimulates uptake **~21-fold**"
  - statement: HutT mediates high-affinity uptake with apparent KM ~0.99 uM in intact P. putida cells and ~0.83 uM in reconstituted
      proteoliposomes.
    supporting_text: "apparent KM = 0.99 \xB1 0.23 \xB5M"
  - statement: Reconstituted HutT proteoliposomes give an apparent KM of ~0.83 uM for L-histidine, confirming high-affinity
      transport by the purified protein.
    supporting_text: "apparent KM = 0.83 \xB1 0.25 \xB5M"
  - statement: HutT is an integral cytoplasmic (inner) membrane protein with ~12 predicted transmembrane helices.
    supporting_text: HutT is an integral **cytoplasmic membrane** protein
  - statement: Topology prediction indicates approximately 12 mostly hydrophobic alpha-helical transmembrane segments.
    supporting_text: "~12 mostly hydrophobic \u03B1-helical transmembrane segments"
  - statement: hutT is the single hutT-like gene encoded within the P. putida histidine utilization (hut) cluster.
    supporting_text: hutT** is encoded within the histidine utilization (**hut**) cluster and in *P. putida* is the single
      hutT-like gene
  - statement: HutT belongs to the amino acid-polyamine-organocation (APC) superfamily of secondary transporters.
    supporting_text: "HutT belongs to the **amino acid\u2013polyamine\u2013organocation (APC)** superfamily of secondary transporters"
