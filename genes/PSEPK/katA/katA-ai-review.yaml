id: Q88QK9
gene_symbol: katA
product_type: PROTEIN
status: DRAFT
aliases:
- PP_0481
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida KT2440
description: >-
  katA encodes the major monofunctional heme catalase of Pseudomonas putida KT2440.
  It is a soluble catalase-family enzyme that disproportionates hydrogen peroxide to
  water and oxygen and serves as a principal peroxide detoxification activity in the
  oxidative-stress network. katA is strongly induced by hydrogen peroxide and is
  regulated within the OxyR-dependent peroxide response, but its most specific core
  GO role is hydrogen peroxide catabolism rather than the broader stress-response
  terms.
existing_annotations:
- term:
    id: GO:0004096
    label: catalase activity
  qualifier: enables
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  review:
    summary: >-
      This is the core molecular function of katA. UniProt assigns KatA as a catalase
      with EC 1.11.1.6 and the P. putida literature treats KatA as a major catalase
      responsible for peroxide decomposition.
    action: ACCEPT
    reason: >-
      The annotation is specific, mechanistically correct, and consistent with both
      the catalase-family sequence features and experimental literature on P. putida
      KatA physiology.
    additional_reference_ids:
    - PMID:17107553
    - PMID:11315113
    supported_by:
    - reference_id: file:PSEPK/katA/katA-uniprot.txt
      supporting_text: >-
        RecName: Full=Catalase ... EC=1.11.1.6 ... Reaction=2 H2O2 = O2 + 2 H2O;
- term:
    id: GO:0020037
    label: heme binding
  qualifier: enables
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  review:
    summary: >-
      Heme binding is appropriate for KatA because canonical monofunctional catalases
      use a heme cofactor at the active site and the UniProt record explicitly assigns
      heme as the cofactor.
    action: ACCEPT
    reason: >-
      This annotation captures an authentic cofactor-binding property of catalase and
      is not an over-annotation.
    supported_by:
    - reference_id: file:PSEPK/katA/katA-uniprot.txt
      supporting_text: >-
        COFACTOR: Name=heme;
- term:
    id: GO:0006979
    label: response to oxidative stress
  qualifier: involved_in
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: >-
      The annotation is biologically reasonable because katA is part of the OxyR-linked
      peroxide defense network and is strongly induced during oxidative stress, but it
      is broader than the direct chemistry performed by the enzyme.
    action: KEEP_AS_NON_CORE
    reason: >-
      KatA contributes to oxidative-stress survival, yet the more specific core process
      is hydrogen peroxide catabolism. This term is better treated as contextual rather
      than as the primary evolved function.
    additional_reference_ids:
    - PMID:17107553
    - PMID:28130298
    - PMID:24957251
- term:
    id: GO:0042542
    label: response to hydrogen peroxide
  qualifier: involved_in
  evidence_type: IEA
  original_reference_id: GO_REF:0000118
  review:
    summary: >-
      katA is a credible participant in the hydrogen peroxide response because its
      transcript is strongly induced by H2O2 and it encodes one of the principal
      peroxide-degrading enzymes in P. putida.
    action: KEEP_AS_NON_CORE
    reason: >-
      This term reflects the physiological context of katA induction and stress defense,
      but the direct catalytic process term GO:0042744 is the more specific core
      annotation.
    additional_reference_ids:
    - PMID:17107553
    - PMID:28130298
- term:
    id: GO:0042744
    label: hydrogen peroxide catabolic process
  qualifier: involved_in
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  review:
    summary: >-
      This is the most specific core biological process annotation for katA. Catalase
      activity directly removes hydrogen peroxide by converting it to water and oxygen.
    action: ACCEPT
    reason: >-
      The process follows directly from the enzyme reaction and is the clearest
      biological-process description of KatA function.
    additional_reference_ids:
    - PMID:17107553
    - PMID:28130298
    supported_by:
    - reference_id: file:PSEPK/katA/katA-uniprot.txt
      supporting_text: >-
        Reaction=2 H2O2 = O2 + 2 H2O;
- term:
    id: GO:0098869
    label: cellular oxidant detoxification
  qualifier: involved_in
  evidence_type: IEA
  original_reference_id: GO_REF:0000108
  review:
    summary: >-
      KatA clearly contributes to oxidant detoxification, but for this gene the term is
      a broader parent-like summary of the more informative hydrogen peroxide catabolic
      process annotation.
    action: KEEP_AS_NON_CORE
    reason: >-
      The annotation is directionally correct but less specific than GO:0042744 and is
      therefore better retained as a non-core process summary.
    additional_reference_ids:
    - PMID:24957251
    - PMID:28130298
- term:
    id: GO:0005737
    label: cytoplasm
  qualifier: located_in
  evidence_type: IEA
  original_reference_id: GO_REF:0000118
  review:
    summary: >-
      Cytoplasmic localization is plausible for KatA and consistent with a soluble
      bacterial monofunctional catalase carrying out intracellular peroxide detoxification.
    action: ACCEPT
    reason: >-
      There is no indication of secretion or membrane anchoring in the UniProt record,
      and cytoplasmic localization is compatible with the known role of catalases in
      intracellular peroxide defense.
    additional_reference_ids:
    - PMID:24957251
