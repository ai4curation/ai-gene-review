id: Q88N36
gene_symbol: pcaD
product_type: PROTEIN
aliases:
  - PP_1380
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: >-
  pcaD encodes a 3-oxoadipate enol-lactonase (EC 3.1.1.24) of the PcaD/CatD
  alpha/beta-hydrolase family. The enzyme hydrolyzes 3-oxoadipate enol-lactone
  to beta-ketoadipate in the lower beta-ketoadipate funnel for aromatic compound
  degradation. Classical genetics indicates that in Pseudomonas putida the pcaDE
  module supplies the shared enol-lactonase/CoA-transferase functions needed for
  both cat and pca branches, supporting pcaD as a core catabolic enzyme rather
  than a generic hydrolase.
existing_annotations:
  - term:
      id: GO:0042952
      label: beta-ketoadipate pathway
    evidence_type: IEA
    original_reference_id: GO_REF:0000002
    review:
      summary: >-
        This process annotation matches the established role of PcaD in the lower
        beta-ketoadipate funnel. Genetic work in Pseudomonas putida indicates
        that pcaDE provides the shared lower-pathway functions required for both
        cat and pca branch intermediates, so membership in the beta-ketoadipate
        pathway is a core, not peripheral, annotation.
      action: ACCEPT
      reason: >-
        The term is appropriately specific for the evolved biological role of this
        enzyme. PcaD catalyzes the enol-lactone hydrolysis step that feeds aromatic
        intermediates into beta-ketoadipate, and older pathway genetics explicitly
        place pcaDE in the shared P. putida beta-ketoadipate pathway.
      supported_by:
        - reference_id: PMID:3003031
          supporting_text: >-
            In Pseudomonas putida, the requirements for both catDE and pcaDE genes
            are met by a single set of genes, designated pcaDE.
        - reference_id: PMID:21237173
          supporting_text: >-
            The enol-lactone hydrolase (ELH) represents one such class of targeted
            enzymes and catalyzes the conversion of 3-oxoadipate-enol-lactone into
            the linear beta-ketoadipate.
        - reference_id: file:PSEPK/pcaD/pcaD-deep-research-falcon.md
          supporting_text: >-
            In KT2440 transcriptome datasets, PP_1380 is explicitly annotated as
            **pcaD** with product “3-oxoadipate enol-lactonase / enol-lactone
            hydrolase,” and appears with the canonical neighboring **pca** genes
            of the protocatechuate (PCA) / β-ketoadipate (3-oxoadipate) pathway.

  - term:
      id: GO:0047570
      label: 3-oxoadipate enol-lactonase activity
    evidence_type: IEA
    original_reference_id: GO_REF:0000120
    review:
      summary: >-
        This is the exact catalytic activity expected for PcaD. UniProt assigns
        EC 3.1.1.24 and places the protein in the PcaD/CatD family, while structural
        work on a homologous PcaD confirms enol-lactone hydrolase activity toward
        3-oxoadipate enol-lactone.
      action: ACCEPT
      reason: >-
        The annotation is specific, mechanistically informative, and consistent
        with both family assignment and direct biochemical/structural literature
        on PcaD homologs. It should be retained as the core molecular function
        rather than generalized to broader hydrolase terms.
      supported_by:
        - reference_id: UniProt:Q88N36
          supporting_text: >-
            SubName: Full=3-oxoadipate enol-lactonase 2
            {ECO:0000313|EMBL:AAN67003.1}; EC=3.1.1.24
            {ECO:0000313|EMBL:AAN67003.1};
        - reference_id: UniProt:Q88N36
          supporting_text: >-
            InterPro; IPR026968; PcaD/CatD.
        - reference_id: PMID:21237173
          supporting_text: >-
            The enol-lactone hydrolase (ELH) represents one such class of targeted
            enzymes and catalyzes the conversion of 3-oxoadipate-enol-lactone into
            the linear beta-ketoadipate.
        - reference_id: file:PSEPK/pcaD/pcaD-deep-research-falcon.md
          supporting_text: >-
            Functionally, PcaD catalyzes hydrolysis of **3-oxoadipate-enol-lactone**
            to the linear diacid **β-ketoadipate (3-oxoadipate)**, a central
            intermediate that can be further activated and funneled into central
            metabolism.

