suggested_questions:
  - question: >-
      Is pcaD in KT2440 transcriptionally coupled to neighboring pca genes under
      PcaR/beta-ketoadipate control, and how strongly does expression respond to
      different aromatic substrates?
  - question: >-
      Does KT2440 PcaD alone support flux from both catechol-derived and
      protocatechuate-derived lower-pathway intermediates in vivo?
  - question: >-
      Are the kinetic properties of KT2440 PcaD distinguishable from other PcaD/CatD
      homologs with respect to substrate range or product release?

suggested_experiments:
  - hypothesis: >-
      pcaD is required for growth on aromatic substrates that funnel through the
      beta-ketoadipate lower pathway.
    description: >-
      Construct a pcaD deletion or CRISPRi knockdown strain in Pseudomonas putida
      KT2440 and compare growth plus metabolite accumulation on protocatechuate,
      4-hydroxybenzoate, benzoate, and catechol. Accumulation of 3-oxoadipate
      enol-lactone-derived intermediates would directly test pathway placement.
  - hypothesis: >-
      KT2440 PcaD catalyzes hydrolysis of 3-oxoadipate enol-lactone with kinetics
      expected for a lower-funnel beta-ketoadipate enzyme.
    description: >-
      Purify recombinant PcaD and perform in vitro enzymatic assays with
      3-oxoadipate enol-lactone or validated analogs to measure turnover, substrate
      preference, and sensitivity to active-site substitutions predicted from the
      PcaD structural literature.
  - hypothesis: >-
      pcaD expression is coordinated with the pca catabolic module in response to
      beta-ketoadipate pathway substrates.
    description: >-
      Map the pcaD transcriptional unit by RT-PCR/RNA-seq and quantify induction
      after exposure to protocatechuate, 4-hydroxybenzoate, catechol, and benzoate.
      This would establish whether pcaD behaves as a shared lower-pathway enzyme
      at the regulatory level as well as the biochemical level.
