description: ycgM encodes a fumarylacetoacetase-like hydratase/decarboxylase-family protein. Current computational annotation
  predicts acetylpyruvate hydrolase activity, but its physiological substrate in KT2440 remains unresolved; it is treated
  as a ppu00620 boundary hydrolase candidate rather than a confirmed dedicated pyruvate-pathway step.
