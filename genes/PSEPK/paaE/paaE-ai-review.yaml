id: Q88HS9
gene_symbol: paaE
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: >-
  PaaE is the FAD- and [2Fe-2S]-containing reductase subunit of the PaaABCE
  ring 1,2-phenylacetyl-CoA epoxidase system in Pseudomonas putida KT2440. It
  supplies reducing equivalents to the multicomponent oxygenase during
  aerobic phenylacetate catabolism.
