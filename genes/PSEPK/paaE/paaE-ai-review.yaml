taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: paaE encodes the reductase/electron-transfer subunit of the ring 1,2-phenylacetyl-CoA epoxidase system in phenylacetate degradation. Its core role is supporting phenylacetyl-CoA epoxidation, with FAD and iron-sulfur cluster binding as cofactor features of the reductase subunit.
