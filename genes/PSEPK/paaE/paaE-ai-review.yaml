    action: ACCEPT
    reason: Q88HS9 is explicitly named as the phenylacetyl-CoA epoxidase reductase subunit.
    supported_by:
    - reference_id: file:PSEPK/paaE/paaE-uniprot.txt
      supporting_text: 'SubName: Full=Ring 1,2-phenylacetyl-CoA epoxidase, reductase subunit'
