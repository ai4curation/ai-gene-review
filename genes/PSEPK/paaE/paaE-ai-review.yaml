    action: KEEP_AS_NON_CORE
    reason: >-
      PaaE contains a [2Fe-2S] cluster, but this is ancillary to its reductase
      role in the epoxidase system.
    supported_by:
    - reference_id: file:PSEPK/paaE/paaE-uniprot.txt
      supporting_text: 'Name=[2Fe-2S] cluster;'
