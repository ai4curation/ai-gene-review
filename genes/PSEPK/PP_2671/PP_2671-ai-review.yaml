  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: PP_2671 encodes a predicted membrane-associated sensor histidine kinase in Pseudomonas putida
  KT2440. HAMP, HisKA_3, and HATPase domains support a two-component phosphorelay sensor role, but no
  cognate response regulator or specific input signal is assigned in this first pass.
