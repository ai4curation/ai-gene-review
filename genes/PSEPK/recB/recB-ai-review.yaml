- description: Mg2+-dependent exodeoxyribonuclease V (Exonuclease V) nuclease that degrades
    unwound DNA strands and, upon Chi recognition, nicks the 3'-ended strand and loads
    RecA, generating a recombinogenic 3' single-stranded overhang.
