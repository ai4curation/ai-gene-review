taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: >-
  RecB is the helicase-nuclease subunit of the heterotrimeric RecBCD enzyme
  (RecB-RecC-RecD; also called Exonuclease V), the major bacterial machine that
  initiates processing of double-strand DNA ends for homologous recombination
  and double-strand break repair. RecB is a bipartite, ATP-dependent enzyme. Its
  N-terminal motor domain is a single-strand-DNA-dependent ATPase with 3'-5'
  helicase activity that, together with RecD (a 5'-3' motor) and RecC, drives
  rapid, processive unwinding of duplex DNA from a blunt or near-blunt end. Its
  C-terminal domain carries a Mg2+-dependent nuclease center that degrades the
  unwound strands and, after recognition of a Chi recombination hotspot, nicks
  the 3'-ended strand and loads the RecA recombinase onto the resulting 3'
  single-stranded tail. The product of this reaction is a recombinogenic 3'
  overhang coated with RecA, committing the broken end to RecA-mediated strand
  invasion and downstream RuvABC-dependent resolution. RecBCD also rescues
  collapsed or broken replication forks. The enzyme acts on chromosomal DNA in
  the cytoplasm and nucleoid. Chi recognition is species-specific, and the
  cognate octamer differs among pseudomonads from the E. coli consensus.
existing_annotations:
- term:
    id: GO:0000166
    label: nucleotide binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000104
  qualifier: enables
  review:
    summary: RecB is an ATP-binding/ATP-hydrolyzing motor protein, so nucleotide binding
      is correct but it is a broad parent of the more specific ATP binding annotation.
    action: MARK_AS_OVER_ANNOTATED
    reason: Correct but uninformative; subsumed by the specific GO:0005524 ATP binding
      annotation, which captures the relevant nucleotide-binding activity.
- term:
    id: GO:0000287
    label: magnesium ion binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000104
  qualifier: enables
  review:
    summary: The RecB C-terminal nuclease center requires a divalent metal (Mg2+/Mn2+)
      for exodeoxyribonuclease V activity, consistent with this annotation.
    action: ACCEPT
    reason: Mg2+ dependence of the RecB PD-(D/E)XK nuclease center is well established
      for RecBCD/Exonuclease V and supported by the UvrD/AddAB-type nuclease domain.
- term:
    id: GO:0000724
    label: double-strand break repair via homologous recombination
  evidence_type: IEA
  original_reference_id: GO_REF:0000104
  qualifier: involved_in
  review:
    summary: RecBCD initiates double-strand break repair by homologous recombination;
      this is the central biological process for RecB.
    action: ACCEPT
    reason: Strongly supported by conserved RecBCD biology and by pseudomonad genetics
      (recB null mutants are UV/mitomycin C sensitive and accumulate fragmented chromosomal
      DNA); a core function.
- term:
    id: GO:0000725
    label: recombinational repair
  evidence_type: IEA
  original_reference_id: GO_REF:0000118
  qualifier: involved_in
  review:
    summary: RecB participates in recombinational repair; this is a broader parent
      of GO:0000724 double-strand break repair via homologous recombination.
    action: KEEP_AS_NON_CORE
    reason: Accurate but more general than the specific DSB-via-HR term, which better
      represents the core process; retain as supporting/non-core.
- term:
    id: GO:0003677
    label: DNA binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: RecB binds duplex and single-stranded DNA as part of its helicase/nuclease
      activity; a true but general molecular function.
    action: KEEP_AS_NON_CORE
    reason: Correct supporting activity, but subsumed by the more informative helicase
      and exonuclease V molecular-function annotations.
- term:
    id: GO:0003678
    label: DNA helicase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: RecB has ATP-dependent DNA helicase activity; this is captured more precisely
      by GO:0043138 (3'-5' DNA helicase activity).
    action: KEEP_AS_NON_CORE
    reason: Correct but a parent of the more specific 3'-5' DNA helicase activity term.
- term:
    id: GO:0004386
    label: helicase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000104
