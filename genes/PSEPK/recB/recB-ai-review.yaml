    action: ACCEPT
    reason: Core molecular function; the 3'-5' directionality of the RecB motor is
      a defining mechanistic feature of RecBCD.
core_functions:
- description: ATP-dependent 3'-5' DNA helicase/translocase motor of the RecBCD complex
    that unwinds duplex DNA from a double-strand end.
