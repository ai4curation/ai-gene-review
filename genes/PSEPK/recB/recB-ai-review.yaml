- id: PMID:38000388
  title: 'RecBCD enzyme: mechanistic insights from mutants of a complex helicase-nuclease'
  findings:
  - statement: RecBCD is a fast, processive ATP-dependent helicase-nuclease; RecB contributes
      the 3'-5' motor and a tethered Mg2+-dependent nuclease domain, and Chi recognition
      switches the enzyme to nick near Chi and load RecA.
    reference_section_type: ABSTRACT
  reference_review:
    relevance: HIGH
    correctness: UNVERIFIED
    review_notes: Amundsen & Smith 2023 MMBR review of RecBCD mechanism; PMID from
      deep-research summary, not independently PubMed-verified. Supports conserved
      RecB helicase/nuclease/RecA-loading functions.
- id: PMID:20195537
  title: All three subunits of RecBCD enzyme are essential for DNA repair and low-temperature
    growth in the Antarctic Pseudomonas syringae Lz4W
  findings:
  - statement: In a pseudomonad, recB/recC/recD null mutants are UV- and mitomycin
      C-sensitive and accumulate linear/fragmented chromosomal DNA; RecB ATPase/helicase
      activity is essential in vivo while the nuclease center is partly dispensable.
    reference_section_type: ABSTRACT
  reference_review:
    relevance: HIGH
    correctness: UNVERIFIED
    review_notes: Pavankumar et al. 2010 PLoS ONE; closest Pseudomonas genetic evidence
      for RecBCD function. PMID from deep-research summary, not independently PubMed-verified.
suggested_questions:
- question: What is the cognate Chi (recombination hotspot) sequence recognized by
    P. putida KT2440 RecBCD, and does it differ from the E. coli consensus and the
    P. syringae ChiPs octamer?
suggested_experiments:
- description: Construct a P. putida KT2440 recB (PP_4673) deletion and complement
    with wild-type and motor-dead/nuclease-dead alleles to test sensitivity to UV
    and mitomycin C and quantify homologous recombination capacity.
