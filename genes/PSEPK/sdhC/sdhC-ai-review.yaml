description: Cytochrome b556 membrane anchor subunit of the succinate dehydrogenase/respiratory Complex II enzyme in Pseudomonas putida KT2440. SdhC is a multi-pass inner-membrane protein that, together with SdhD, anchors the SdhAB catalytic head to the plasma membrane and forms the membrane electron-transfer/quinone-interaction domain. It supports the succinate-to-fumarate TCA-cycle step and respiratory quinone reduction by the SdhABCD complex.
