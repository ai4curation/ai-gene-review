id: Q88R06
gene_symbol: fdhA
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: fdhA encodes a predicted zinc-containing, glutathione-independent NAD-dependent formaldehyde dehydrogenase (EC 1.2.1.46)
  in Pseudomonas putida KT2440. The protein is assigned to the non-glutathione formaldehyde dehydrogenase family and is best
  interpreted as an aldehyde detoxification enzyme that oxidizes formaldehyde toward formate.
existing_annotations:
- term:
    id: GO:0008270
    label: zinc ion binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: Zinc ion binding is plausible from the zinc-type alcohol dehydrogenase domain context but is ancillary to the enzyme's
      formaldehyde dehydrogenase activity.
    action: KEEP_AS_NON_CORE
    reason: The ADH zinc-binding signature supports a metal-cofactor annotation, but zinc binding alone is not the pathway-defining
      molecular function for FdhA.
    supported_by:
    - reference_id: file:PSEPK/fdhA/fdhA-goa.tsv
      supporting_text: "GO:0008270\tzinc ion binding"
    - reference_id: file:PSEPK/fdhA/fdhA-uniprot.txt
      supporting_text: PANTHER; PTHR42813; ZINC-TYPE ALCOHOL DEHYDROGENASE-LIKE
- term:
    id: GO:0016491
    label: oxidoreductase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: The broad oxidoreductase annotation captures the enzyme class but should be replaced by the more specific NAD-dependent
      formaldehyde dehydrogenase activity already present in GOA.
    action: MODIFY
    reason: UniProt and GOA identify FdhA as EC 1.2.1.46/formaldehyde dehydrogenase, so the generic oxidoreductase term is less
      informative than GO:0018467.
    proposed_replacement_terms:
    - id: GO:0018467
      label: formaldehyde dehydrogenase (NAD+) activity
    supported_by:
    - reference_id: file:PSEPK/fdhA/fdhA-goa.tsv
      supporting_text: "GO:0016491\toxidoreductase activity"
    - reference_id: file:PSEPK/fdhA/fdhA-uniprot.txt
      supporting_text: EC=1.2.1.46
- term:
    id: GO:0018467
    label: formaldehyde dehydrogenase (NAD+) activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000003
  qualifier: enables
  review:
    summary: Accept NAD-dependent formaldehyde dehydrogenase activity as the core molecular function.
    action: ACCEPT
    reason: The UniProt product description, EC number, InterPro family, PANTHER family, and GOA EC mapping consistently support
      glutathione-independent formaldehyde dehydrogenase activity.
    supported_by:
    - reference_id: file:PSEPK/fdhA/fdhA-goa.tsv
      supporting_text: "GO:0018467\tformaldehyde dehydrogenase (NAD+) activity"
    - reference_id: file:PSEPK/fdhA/fdhA-uniprot.txt
      supporting_text: Full=Formaldehyde dehydrogenase
