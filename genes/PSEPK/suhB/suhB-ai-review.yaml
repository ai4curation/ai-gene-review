  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: suhB encodes an inositol-1-monophosphatase superfamily protein (EC 3.1.3.25) in Pseudomonas putida KT2440. The enzyme-family assignment supports Mg2+-dependent hydrolysis of myo-inositol phosphate to myo-inositol and phosphate, making SuhB the only direct inositol-phosphate enzyme in the KEGG ppu00562 batch. UniProt also assigns a bacterial role in the processive rRNA transcription and antitermination complex (rrnTAC), where SuhB helps organize an RNA-chaperone ring around RNA polymerase during rRNA operon transcription and ribosome biogenesis. The ppu00562 context should therefore be treated as a boundary map around SuhB rather than evidence for a complete phosphatidylinositol signalling pathway in this Gram-negative bacterium.
