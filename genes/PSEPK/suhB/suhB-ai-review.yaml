suggested_questions:
- question: Does P. putida KT2440 SuhB retain measurable inositol-monophosphatase activity in vivo, or is its dominant physiological role the rrnTAC/rRNA antitermination function?
suggested_experiments:
- hypothesis: SuhB retains EC 3.1.3.25 phosphatase activity but may be physiologically dominated by the bacterial rrnTAC/rRNA transcription-antitermination role.
  description: Assay purified SuhB against myo-inositol phosphate substrates and compare phenotypes of catalytic-site and interaction-surface mutants for rRNA transcription/ribosome biogenesis readouts in P. putida KT2440.
  experiment_type: biochemical enzyme assay and separation-of-function mutagenesis
