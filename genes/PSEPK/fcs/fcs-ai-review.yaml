taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: Feruloyl-CoA synthetase (Fcs; EC 6.2.1.34), the ATP-dependent acid-thiol
  ligase that initiates catabolism of hydroxycinnamic acids in Pseudomonas putida
  KT2440. Fcs is a member of the ANL/AMP-binding (acyl-CoA synthetase) enzyme
  superfamily and activates ferulate (and other hydroxycinnamates such as
  p-coumarate) to the corresponding coenzyme A thioester, e.g. ferulate + ATP + CoA
  -> feruloyl-CoA + AMP + diphosphate (with feruloyl-CoA being the first committed
  intermediate). The feruloyl-CoA produced is subsequently cleaved by the enoyl-CoA
  hydratase/aldolase Ech (PP_3358) to yield vanillin, which is oxidised by the
  vanillin dehydrogenase Vdh (PP_3357) to vanillate, funnelling the carbon through
  protocatechuate into the beta-ketoadipate pathway and central metabolism. The fcs
  gene is encoded adjacent to vdh and ech in a hydroxycinnamate catabolic gene
  cluster and acts in the cytoplasm. Fcs is the committed entry (activation) step of
  the peripheral hydroxycinnamate funnelling pathway, making it central to the
  ability of P. putida to grow on lignin-derived aromatic monomers.
existing_annotations:
- term:
    id: GO:0006631
    label: fatty acid metabolic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000118
  qualifier: involved_in
  review:
    summary: Over-broad and substrate-incorrect process term derived from a
      tree-graft over the AMP-binding/acyl-CoA synthetase superfamily.
    action: MODIFY
    reason: Fcs acts on ferulate, a hydroxycinnamic (aromatic) acid, not a fatty
      acid, and the supporting molecular function is feruloyl-CoA synthetase
      activity for hydroxycinnamate catabolism rather than fatty acid metabolism.
      The enzyme is the committed entry step of the ferulate/hydroxycinnamate
      catabolic funnel into the beta-ketoadipate pathway. The correct biological
      process is ferulate catabolic process (GO:1901067).
    proposed_replacement_terms:
    - id: GO:1901067
      label: ferulate catabolic process
- term:
    id: GO:0031956
    label: medium-chain fatty acid-CoA ligase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000118
  qualifier: enables
  review:
    summary: Imprecise molecular function inherited from the broad acyl-CoA
      synthetase tree-graft; the physiological substrate is a hydroxycinnamate, not
      a medium-chain fatty acid.
    action: MODIFY
    reason: Although Fcs is correctly placed in the AMP-binding/acyl-CoA synthetase
      superfamily, the medium-chain fatty acid-CoA ligase term (GO:0031956) does not
      describe its substrate. Fcs activates ferulate (and other hydroxycinnamates)
      to their CoA thioesters; the precise, EC-supported term trans-feruloyl-CoA
      synthase activity (GO:0050563) is already annotated and is the appropriate
      replacement.
    proposed_replacement_terms:
    - id: GO:0050563
      label: trans-feruloyl-CoA synthase activity
- term:
    id: GO:0050563
    label: trans-feruloyl-CoA synthase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000003
  qualifier: enables
  review:
    summary: Correct core molecular function, mapped from EC 6.2.1.34, matching the
      UniProt name and the gene's role in ferulate activation.
    action: ACCEPT
    reason: This is the precise, EC-based annotation for feruloyl-CoA synthetase
      (ATP + CoA + trans-ferulate -> feruloyl-CoA + ADP/AMP + phosphate). It is
      consistent with the protein name, the AMP-binding/ANL domain architecture, and
      pathway evidence placing Fcs (PP_3356) at the ferulate -> feruloyl-CoA
      activation step in P. putida KT2440. Represents the core function of the gene.
