  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: PP_3818 encodes a predicted signal-peptide-bearing PstS-family phosphate-binding protein. The protein has PBP/phosphate-ABC-transporter
  signatures and is near a separate polyamine ABC importer, but current evidence does not identify cognate phosphate permease
  or ATPase partners. It is best treated as a phosphate-binding singleton related to the phosphate-import boundary.
