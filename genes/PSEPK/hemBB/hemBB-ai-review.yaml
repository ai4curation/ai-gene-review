suggested_questions:
  - question: >-
      Does HemBB operate under a distinct metal or environmental regime from
      the zinc-site-containing HemB paralog?
suggested_experiments:
  - hypothesis: HemBB is an active Mg-dependent ALAD paralog rather than an inactive duplicate.
    description: >-
      Compare purified HemBB and HemB kinetics and metal dependence, then test
      single and double mutants across zinc and magnesium availability.
