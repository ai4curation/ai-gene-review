id: Q88HN1
gene_symbol: hemBB
product_type: PROTEIN
aliases:
  - PP_3322
status: COMPLETE
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: >-
  HemBB is one of two KT2440 delta-aminolevulinate dehydratase paralogs. It is an
  ALAD-family enzyme predicted to condense two 5-aminolevulinate molecules into
  porphobilinogen. Its sequence retains the conserved Schiff-base lysines and a
  predicted magnesium-binding site but lacks the catalytic zinc-site prediction
  present in HemB, suggesting a distinct metal-site architecture. Direct KT2440
  biochemistry is needed to establish the relative physiological contribution
  of the two paralogs.
existing_annotations:
  - term:
      id: GO:0004655
      label: porphobilinogen synthase activity
    evidence_type: IEA
    original_reference_id: GO_REF:0000120
    qualifier: enables
    review:
      summary: This is the specific predicted catalytic function of HemBB.
      action: ACCEPT
      reason: >-
        UniProt assigns EC 4.2.1.24, the ALAD family, conserved Schiff-base
        active sites, and a magnesium-binding residue. The assignment remains
        predictive because no KT2440 paralog-specific assay was identified.
      supported_by:
        - reference_id: file:PSEPK/hemBB/hemBB-uniprot.txt
          supporting_text: "RecName: Full=Delta-aminolevulinic acid dehydratase"
  - term:
      id: GO:0005829
      label: cytosol
    evidence_type: IEA
    original_reference_id: GO_REF:0000118
    qualifier: located_in
    review:
      summary: A soluble cytosolic location is consistent with the ALAD-family architecture.
      action: ACCEPT
      reason: >-
        No signal peptide or transmembrane segment is predicted, and UniProt
        retains the TreeGrafter cytosol cross-reference.
      supported_by:
        - reference_id: file:PSEPK/hemBB/hemBB-uniprot.txt
          supporting_text: "GO; GO:0005829; C:cytosol;"
  - term:
      id: GO:0006779
      label: porphyrin-containing compound biosynthetic process
    evidence_type: IEA
    original_reference_id: GO_REF:0000117
    qualifier: involved_in
    review:
      summary: This is a correct broad pathway assignment for an early shared tetrapyrrole step.
      action: KEEP_AS_NON_CORE
      reason: >-
        Predicted porphobilinogen formation supplies the common tetrapyrrole
        trunk. The annotation is biologically correct, while the catalytic
        activity and direct tetrapyrrole role are the more informative core claims.
      supported_by:
        - reference_id: file:PSEPK/hemBB/hemBB-uniprot.txt
          supporting_text: "PATHWAY: Porphyrin-containing compound metabolism; protoporphyrin-IX"
  - term:
      id: GO:0006783
      label: heme biosynthetic process
    evidence_type: IEA
    original_reference_id: GO_REF:0000118
    qualifier: involved_in
    review:
      summary: Predicted ALAD activity places HemBB in the heme-b precursor pathway.
      action: ACCEPT
      reason: >-
        Its predicted porphobilinogen product feeds the shared reactions leading
        to uroporphyrinogen III, protoporphyrin IX, and heme b.
      supported_by:
        - reference_id: file:PSEPK/hemBB/hemBB-uniprot.txt
          supporting_text: "KW   Heme biosynthesis"
  - term:
      id: GO:0008270
      label: zinc ion binding
    evidence_type: IEA
    original_reference_id: GO_REF:0000118
    qualifier: enables
    review:
      summary: The transferred zinc annotation does not match the metal-site prediction for HemBB.
      action: MODIFY
      reason: >-
        The current HemBB record predicts Mg2+ binding at residue 247 and does
        not identify the catalytic Zn2+-ligand triad found in HemB. Magnesium ion
        binding is therefore the conservative sequence-supported replacement.
      proposed_replacement_terms:
        - id: GO:0000287
          label: magnesium ion binding
      supported_by:
        - reference_id: file:PSEPK/hemBB/hemBB-uniprot.txt
          supporting_text: 'ligand="Mg(2+)"'
  - term:
      id: GO:0033014
      label: tetrapyrrole biosynthetic process
    evidence_type: IEA
    original_reference_id: GO_REF:0000002
    qualifier: involved_in
    review:
      summary: Predicted HemBB activity directly participates in tetrapyrrole biosynthesis.
      action: ACCEPT
      reason: >-
        An active ALAD paralog would produce porphobilinogen for the shared
        tetrapyrrole trunk. The process term is appropriately broad given that
        HemBB's relative physiological contribution remains unresolved.
      supported_by:
        - reference_id: file:PSEPK/hemBB/hemBB-uniprot.txt
          supporting_text: "PATHWAY: Porphyrin-containing compound metabolism; protoporphyrin-IX"
  - term:
      id: GO:0046872
      label: metal ion binding
    evidence_type: IEA
    original_reference_id: GO_REF:0000002
    qualifier: enables
    review:
      summary: Generic metal binding is compatible with the predicted magnesium site.
      action: KEEP_AS_NON_CORE
      reason: >-
        GO:0046872 is true if the predicted Mg2+ site is functional, but it is
        less informative than the magnesium-ion-binding replacement proposed
        for the unsupported zinc transfer.
      supported_by:
        - reference_id: file:PSEPK/hemBB/hemBB-uniprot.txt
          supporting_text: 'ligand="Mg(2+)"'
