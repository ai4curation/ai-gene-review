description: thrC (PP_1471) encodes threonine synthase (EC 4.2.3.1), a pyridoxal 5'-phosphate (PLP)-dependent enzyme that catalyzes the final step of L-threonine biosynthesis, the conversion of O-phospho-L-homoserine and water to L-threonine and inorganic phosphate (RHEA:10840). The enzyme belongs to the threonine synthase family within the fold-type II (TrpB-like) PLP-dependent enzyme superfamily, with PLP bound as a Schiff base to an active-site lysine. As the committed terminal step of the aspartate-derived threonine biosynthetic branch, thrC supplies L-threonine for protein synthesis and downstream isoleucine biosynthesis in P. putida.
