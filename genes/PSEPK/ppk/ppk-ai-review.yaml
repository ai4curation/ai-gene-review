- term:
    id: GO:0009358
    label: polyphosphate kinase complex
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: part_of
  review:
    summary: Cellular component annotation derived from InterPro2GO. PPK1 enzymes are cytoplasmic and the active form is oligomeric,
      so a "polyphosphate kinase complex" annotation is plausible. However, this is purely an InterPro electronic mapping
      with no direct evidence for a defined complex in P. putida, and the more informative localization is cytoplasm.
    action: KEEP_AS_NON_CORE
    reason: The annotation is not wrong (PPK1 functions as a homo-oligomer), but it is a generic InterPro2GO inference without
      organism-specific complex evidence and is not the core descriptor of the gene's activity. Retained as non-core rather
      than removed, per guidance against over-ruling electronic CC mappings that are biologically reasonable.
    supported_by:
    - *id001
