taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: Polyphosphate kinase 1 (PPK1; EC 2.7.4.1), the principal enzyme responsible for inorganic polyphosphate (polyP)
  synthesis in Pseudomonas putida KT2440 (locus PP_5217). It catalyzes the reversible, processive transfer of the terminal
  gamma-phosphate of ATP onto a growing linear polyP chain ([phosphate](n) + ATP = [phosphate](n+1) + ADP), using Mg2+ as
  cofactor and proceeding through an autophosphorylated histidine intermediate (His472 in this protein). The enzyme is a cytoplasmic
  ~82 kDa member of the PPK1 family, belonging to the phospholipase D superfamily of phosphotransferases. PolyP made by PPK1
  serves as a phosphate and high-energy phosphate (ATP) reservoir and as a metal-ion chelator. In P. putida, ppk deletion
  lowers intracellular polyP by roughly 70-90%, identifying PPK1 as the dominant polyP polymerase, and impairs stationary-phase
  survival, swimming motility, biofilm formation, and tolerance to multiple stresses (UV, beta-lactams, heavy metals, solvents,
  heat), partly through effects on the stress sigma factor RpoS. The gene is adjacent to the exopolyphosphatase gene ppx (PP_5216),
  with which it forms the polyP homeostasis module.
