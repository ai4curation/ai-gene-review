  review:
    summary: Core biological process. PPK1 is the enzyme that synthesizes long-chain polyP from ATP, and deletion of ppk in
      P. putida KT2440 reduces intracellular polyP by ~70-90%, directly confirming its role in polyP biosynthesis.
    action: ACCEPT
    reason: The IEA annotation is fully consistent with the experimentally validated function of this protein. Nikel et al.
      (2013, PMID:23687963) showed Delta-ppk abolishes the majority of cellular polyP, establishing PP_5217 as the main polyP
      polymerase. This is a core function of the gene.
