taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: >-
  AccB is the biotin carboxyl carrier protein of the heteromeric acetyl-CoA
  carboxylase complex in Pseudomonas putida KT2440. Its covalently attached
  biotin carries activated carbon dioxide from the AccC biotin-carboxylase
  half-reaction to the AccA/AccD carboxyltransferase, enabling malonyl-CoA
  production for fatty-acid synthesis.
