description: AccB is the biotin carboxyl carrier protein subunit of the Pseudomonas putida KT2440 acetyl-CoA carboxylase complex. It carries the covalently attached biotin cofactor that is carboxylated by AccC and then presents carboxybiotin to the AccA/AccD carboxyltransferase subunits, enabling malonyl-CoA formation for fatty acid biosynthesis.
