    summary: EarP-dependent rhamnosylation activates EF-P for rescue of polyproline-stalled ribosomes during translation elongation. Lassak et al. 2015 (the primary discovery paper) established the IMP evidence directly, showing that earP deletion increases doubling time and reduces translation of a polyproline-LacZ reporter about tenfold.
    action: NEW
