id: Q88MY5
gene_symbol: rnc
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: >-
  Ribonuclease 3 (RNase III, Rnc) is a magnesium-dependent, double-stranded-RNA-specific
  endoribonuclease (EC 3.1.26.3). It recognizes double-stranded RNA structures through a
  C-terminal double-stranded-RNA-binding domain and cleaves them via an N-terminal
  catalytic RNase III domain, generating products with 5'-phosphomonoester termini. The
  enzyme acts as a homodimer in the cytoplasm. Its principal role is the maturation of
  ribosomal RNA: it makes the initial endonucleolytic cuts in the primary polycistronic
  pre-rRNA transcript to release the immediate precursors of 16S and 23S rRNA, and it can
  process tRNAs encoded within the rRNA operon. RNase III also cleaves specific cellular
  mRNAs and participates in small-RNA-mediated regulation, thereby contributing to
  post-transcriptional control of gene expression.
existing_annotations:
- term:
    id: GO:0003723
    label: RNA binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: >-
      Generic RNA-binding parent term. RNase III binds and recognizes double-stranded RNA
      specifically; the more informative molecular function double-stranded RNA binding
      (GO:0003725) is co-annotated, so this broad term is an over-annotation.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      RNA binding is a generic parent of double-stranded RNA binding (GO:0003725), which is
      already annotated and better captures the substrate-recognition activity mediated by
      the DRBM domain.
    supported_by:
    - reference_id: file:PSEPK/rnc/rnc-uniprot.txt
      supporting_text: 'DOMAIN          154..224'
- term:
    id: GO:0003725
    label: double-stranded RNA binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000118
  qualifier: enables
  review:
    summary: >-
      RNase III is a double-stranded-RNA-specific endoribonuclease that recognizes its
      substrates via a C-terminal double-stranded-RNA-binding domain (DRBM). This is a
      correct, specific core molecular function.
    action: ACCEPT
    reason: >-
      Substrate recognition of double-stranded RNA is intrinsic to RNase III activity and is
      structurally supported by the dedicated DRBM domain.
    supported_by:
    - reference_id: file:PSEPK/rnc/rnc-uniprot.txt
      supporting_text: Digests double-stranded RNA.
    - reference_id: file:PSEPK/rnc/rnc-uniprot.txt
      supporting_text: 'DOMAIN          154..224'
- term:
    id: GO:0004525
    label: ribonuclease III activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: >-
      Defining catalytic activity of the protein: a double-stranded-RNA-specific
      endoribonuclease (EC 3.1.26.3) producing 5'-phosphomonoester products. Accept as a
      core molecular function.
    action: ACCEPT
    reason: >-
      This is the core enzymatic activity of Rnc, supported by the RecName, EC number,
      catalytic activity statement, and conserved active-site/Mg2+-binding residues.
    supported_by:
    - reference_id: file:PSEPK/rnc/rnc-uniprot.txt
      supporting_text: 'EC=3.1.26.3'
    - reference_id: file:PSEPK/rnc/rnc-uniprot.txt
      supporting_text: Reaction=Endonucleolytic cleavage to 5'-phosphomonoester.
- term:
    id: GO:0005737
    label: cytoplasm
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: located_in
  review:
    summary: >-
      RNase III acts in the cytoplasm, consistent with its role in cytoplasmic rRNA and mRNA
      processing. Accept.
    action: ACCEPT
    reason: >-
      Consistent with the annotated subcellular location and the cytoplasmic site of rRNA
      maturation.
    supported_by:
    - reference_id: file:PSEPK/rnc/rnc-uniprot.txt
      supporting_text: 'SUBCELLULAR LOCATION: Cytoplasm'
- term:
    id: GO:0006364
    label: rRNA processing
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: involved_in
  review:
    summary: >-
      Principal biological role: RNase III makes the initial cleavages of the primary rRNA
      transcript to yield the immediate precursors of 16S and 23S rRNA. Accept as a core
      biological process.
    action: ACCEPT
    reason: >-
      rRNA maturation is the defining and best-supported biological role of bacterial RNase
      III.
    supported_by:
    - reference_id: file:PSEPK/rnc/rnc-uniprot.txt
      supporting_text: >-
        Involved in the processing of primary rRNA transcript to yield the immediate
        precursors to the large and small rRNAs (23S and 16S).
- term:
    id: GO:0006396
    label: RNA processing
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: involved_in
  review:
    summary: >-
      Generic RNA processing parent term. The specific children rRNA processing (GO:0006364)
      and mRNA processing (GO:0006397) are already annotated, making this broad term an
      over-annotation.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      RNA processing is a generic parent of the more specific rRNA processing and mRNA
      processing terms that are already present.
    supported_by:
    - reference_id: file:PSEPK/rnc/rnc-uniprot.txt
      supporting_text: >-
        Involved in the processing of primary rRNA transcript to yield the immediate
        precursors to the large and small rRNAs (23S and 16S).
- term:
    id: GO:0006397
    label: mRNA processing
  evidence_type: IEA
  original_reference_id: GO_REF:0000104
  qualifier: involved_in
  review:
    summary: >-
      RNase III processes specific cellular mRNAs in addition to rRNA. This is a genuine but
      secondary (non-core) function relative to rRNA maturation.
    action: KEEP_AS_NON_CORE
    reason: >-
      Processing of specific mRNAs is a real RNase III activity but is a secondary role
      compared with the core rRNA maturation function.
    supported_by:
    - reference_id: file:PSEPK/rnc/rnc-uniprot.txt
      supporting_text: Processes some mRNAs, and tRNAs when they are encoded in the rRNA operon.
- term:
    id: GO:0010468
    label: regulation of gene expression
  evidence_type: IEA
  original_reference_id: GO_REF:0000118
  qualifier: involved_in
  review:
    summary: >-
      RNase III contributes to post-transcriptional regulation by cleaving specific mRNAs
      and small RNAs. The term is broad but biologically supported; keep as non-core.
    action: KEEP_AS_NON_CORE
    reason: >-
      Post-transcriptional regulation of gene expression is a downstream consequence of
      RNase III cleavage of specific mRNAs/sRNAs; it is supported but generic and secondary
      to the core processing activities.
    supported_by:
    - reference_id: file:PSEPK/rnc/rnc-uniprot.txt
      supporting_text: Processes some mRNAs, and tRNAs when they are encoded in the rRNA operon.
- term:
    id: GO:0042802
    label: identical protein binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000117
  qualifier: enables
  review:
    summary: >-
      The functional enzyme is a homodimer, so identical protein binding (homodimerization)
      is supported. This is a structural property rather than the core catalytic function;
      keep as non-core.
    action: KEEP_AS_NON_CORE
    reason: >-
      Supported by the homodimeric quaternary structure; reflects self-association required
      to assemble the catalytic dimer rather than an independent core function.
    supported_by:
    - reference_id: file:PSEPK/rnc/rnc-uniprot.txt
      supporting_text: 'SUBUNIT: Homodimer.'
