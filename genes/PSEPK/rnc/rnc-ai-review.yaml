proposed_new_terms: []
references:
- id: GO_REF:0000002
  title: Gene Ontology annotation through association of InterPro records with GO
    terms
  findings:
  - statement: >-
      InterPro2GO transfers RNA binding to Rnc based on the RNase III InterPro signature;
      this is a generic parent of the more specific double-stranded RNA binding activity.
- id: GO_REF:0000104
  title: Electronic Gene Ontology annotations created by transferring manual GO annotations
    between related proteins based on shared sequence features
  findings:
  - statement: >-
      UniRule MF_00104 transfers mRNA processing to Rnc, reflecting RNase III cleavage of
      specific cellular mRNAs.
- id: GO_REF:0000117
  title: Electronic Gene Ontology annotations created by ARBA machine learning models
  findings:
  - statement: >-
      ARBA infers identical protein binding, consistent with the homodimeric quaternary
      structure of RNase III.
- id: GO_REF:0000118
  title: TreeGrafter-generated GO annotations
  findings:
  - statement: >-
      TreeGrafter (PANTHER PTHR11207) assigns double-stranded RNA binding and regulation of
      gene expression to Rnc based on phylogenetic placement in the RNase III family.
- id: GO_REF:0000120
  title: Combined Automated Annotation using Multiple IEA Methods
  findings:
  - statement: >-
      Combined IEA pipelines assign ribonuclease III activity, rRNA processing, RNA
      processing, and cytoplasmic localization to Rnc.
- id: PMID:12534463
  title: >-
    Complete genome sequence and comparative analysis of the metabolically versatile
    Pseudomonas putida KT2440.
  findings:
  - statement: >-
      Source genome sequencing reference for P. putida KT2440 establishing the rnc/PP_1433
      locus; provides no gene-specific functional characterization of Rnc.
suggested_questions:
- question: >-
    Does the P. putida KT2440 Rnc ortholog cleave the same pre-rRNA stem structures and
    mRNA/sRNA substrates as the well-characterized E. coli enzyme, or does it have
    organism-specific targets?
- question: >-
    Which cellular mRNAs and small RNAs are direct RNase III substrates in P. putida, and
    how does their cleavage shape stress and metabolic regulation?
- question: >-
    Is rnc essential in P. putida, and what is the phenotypic consequence of its loss on
    ribosome biogenesis and growth?
suggested_experiments:
- experiment_type: in vitro biochemical assay
  description: >-
    Purify recombinant Rnc and assay Mg2+-dependent endonucleolytic cleavage of synthetic
    dsRNA and the P. putida pre-rRNA stem substrate, confirming EC 3.1.26.3 activity and
    5'-phosphomonoester product termini.
- experiment_type: transcriptomics / RNA-seq
  description: >-
    Compare rRNA maturation intermediates and global transcript abundances in a wild-type
    versus rnc deletion/depletion strain to map RNase III-dependent rRNA processing and
    identify regulated mRNA/sRNA targets.
- experiment_type: CLIP / RNA crosslinking and sequencing
  description: >-
    Perform transcriptome-wide RNA crosslinking and immunoprecipitation of Rnc to identify
    direct double-stranded RNA binding and cleavage sites in vivo.
