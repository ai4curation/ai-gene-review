    homodimeric ribonuclease III (EC 3.1.26.3), recognizing dsRNA via a double-stranded-RNA-
    binding domain.
  molecular_function:
    id: GO:0004525
    label: ribonuclease III activity
  directly_involved_in:
  - id: GO:0006364
    label: rRNA processing
  supported_by:
  - reference_id: file:PSEPK/rnc/rnc-uniprot.txt
