  - reference_id: file:PSEPK/rnc/rnc-uniprot.txt
    supporting_text: Reaction=Endonucleolytic cleavage to 5'-phosphomonoester.
- description: >-
    Binds double-stranded RNA structures through its C-terminal DRBM domain to recognize and
