  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: msbA encodes a homodimeric inner-membrane ATP-dependent lipid A-core flippase. The protein uses ATP hydrolysis to translocate lipid A-core oligosaccharide from the inner to the outer leaflet of the inner membrane, upstream of Lpt-mediated LPS transport to the outer membrane.
