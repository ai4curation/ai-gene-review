suggested_questions:
- question: How are the PP_0953-PP_0983 LptBFGAC genes, the distant lptD/lptE outer-membrane assembly site, and MsbA coordinated in P. putida KT2440 during LPS export and envelope stress?
suggested_experiments:
- description: Measure LPS surface display, outer-membrane permeability, lipid A-core accumulation, and growth phenotypes after depletion or perturbation of LptB, LptF, LptG, LptA, LptC, LptD, LptE, and MsbA.
  experiment_type: targeted Lpt/MsbA LPS transport and envelope-integrity assay
