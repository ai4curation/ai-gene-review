  findings: []
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: >-
      Genome sequence paper for P. putida KT2440 (UniProt reference 1);
      establishes the gene/locus PP_0387 (rpoD). PubMed-verified via the
