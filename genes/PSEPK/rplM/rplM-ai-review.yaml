description: rplM (PP_1315) encodes large ribosomal subunit protein uL13 (50S ribosomal protein L13),
  a conserved protein component of the bacterial 50S large ribosomal subunit in Pseudomonas putida KT2440.
  It functions as a structural constituent of the ribosome and supports protein translation as part of
  the large subunit. It also has an autoregulatory translation-control annotation that is treated as secondary
  to its ribosomal structural role.
