description: PP_0384 encodes a predicted AsnC/Lrp-family helix-turn-helix transcriptional regulator in Pseudomonas putida
  KT2440. Current evidence supports sequence-specific DNA binding, transcription regulation, and cytosolic localization, but
  does not resolve the regulated operon or amino-acid effector.
