description: rho (PP_5214) encodes the Rho transcription termination factor, an ATP-dependent RNA-binding translocase/helicase.
  Rho terminates transcription on nascent RNA and is included in the ppu03018 RNA-degradation map as RNA-turnover-adjacent
  termination context rather than a ribonuclease.
