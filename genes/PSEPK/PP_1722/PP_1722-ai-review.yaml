description: PP_1722 encodes the ATP-binding energy-coupling subunit of a predicted 2-aminoethylphosphonate/phosphonate ABC import system in Pseudomonas putida KT2440. Its ABC transporter ATP-binding domains and local PP_1723/PP_1724 2-aminoethylphosphonate permeases support assignment to ATP-driven organic phosphonate uptake rather than to a generic transporter process.
