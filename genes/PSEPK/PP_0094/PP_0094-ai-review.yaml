  evidence_type: IEA
  original_reference_id: GO_REF:0000118
  qualifier: enables
  review:
    summary: This TreeGrafter protein-tyrosine kinase annotation is inconsistent with the small-molecule HAD phosphatase evidence.
    action: REMOVE
    reason: PP_0094 has HAD phosphohydrolase motifs and a PGP-like cap domain; OpenScientist specifically interprets the cap as supporting small-metabolite phosphatase activity rather than protein phosphorylation.
    supported_by:
