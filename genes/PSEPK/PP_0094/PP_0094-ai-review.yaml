id: Q88RN5
gene_symbol: PP_0094
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: >-
  PP_0094 encodes a small soluble HAD-superfamily phosphatase in Pseudomonas
  putida KT2440. Although the original UniProt/GenBank submission names it as a
  5'-nucleotidase, domain, KEGG, PANTHER, and OpenScientist review evidence
  favor phosphoglycolate phosphatase as the most likely primary activity. The
  enzyme is therefore curated conservatively as a predicted cytosolic
  phosphoglycolate/phosphometabolite cleanup enzyme pending direct substrate
  assays.
