  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: folA (PP_5132) encodes the canonical dihydrofolate reductase that reduces dihydrofolate to tetrahydrofolate using
  NADPH/NADP(H)-linked chemistry. It regenerates tetrahydrofolate for one-carbon metabolism and is the strict folate-tail
  reductase in ppu00790.
