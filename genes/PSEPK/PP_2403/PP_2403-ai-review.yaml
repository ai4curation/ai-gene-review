description: PP_2403 encodes an OmpR/PhoB-family DNA-binding response regulator in Pseudomonas
  putida KT2440. Although the submitted product name says chemotaxis protein CheY, the
  receiver plus winged-helix/OmpR/PhoB effector-domain architecture and GOA transcriptional
  annotations support routing this protein to the orphan/generic two-component regulator
  boundary rather than treating it as a canonical CheY chemotaxis output protein.
