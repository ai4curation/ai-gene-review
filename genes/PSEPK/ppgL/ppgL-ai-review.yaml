description: Cycloisomerase/lactonase-family protein of Pseudomonas putida KT2440 (PP_2021), annotated
  by UniProt as L-alpha-hydroxyglutaric acid gamma-lactonase. GOA carries a TreeGrafter 6-phosphogluconolactonase
  activity annotation, but P. putida KT2440 already has the canonical pgl/PP_1023 6PGL enzyme. This first
  pass leaves ppgL as a PPP-adjacent lactonase-like candidate with unresolved physiological substrate
  rather than a confirmed PPP core enzyme.
