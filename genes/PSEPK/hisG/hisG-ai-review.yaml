  original_reference_id: GO_REF:0000120
  qualifier: involved_in
  review:
    summary: HisG catalyzes the first committed reaction of L-histidine biosynthesis.
    action: ACCEPT
    reason: >-
      The reviewed UniProt entry assigns HisG to step 1 of 9 in the PRPP-to-
      histidine pathway, and the exact ATPPRT chemistry requires this process.
    supported_by:
    - reference_id: file:PSEPK/hisG/hisG-deep-research-openscientist.md
      supporting_text: >-
        carries out the **first and committed step of de novo L-histidine
        biosynthesis**
