id: Q88P87
gene_symbol: hisG
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: >-
  hisG encodes the short-form catalytic subunit of ATP
  phosphoribosyltransferase (ATPPRT; EC 2.4.2.17), which catalyzes the first
  committed reaction of L-histidine biosynthesis by condensing ATP with PRPP.
  In Pseudomonas putida KT2440 this compact HisG protein functions with the
  separate HisZ regulatory subunit, which activates the catalytic subunit and
  provides histidine-responsive feedback control. HisG is a soluble
  cytoplasmic enzyme.
