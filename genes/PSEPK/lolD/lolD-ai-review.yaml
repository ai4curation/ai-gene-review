taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: lolD encodes the reviewed ATP-binding energy-coupling subunit of the
  PP_2154-PP_2156 LolCDE lipoprotein-releasing ABC transporter. UniProt describes
  LolCDE as translocating mature outer membrane-directed lipoproteins from the inner
  membrane to the periplasmic chaperone LolA and forming the LolA-lipoprotein complex
  in an ATP-dependent manner.
