core_functions:
- description: >-
    PtxS acts as a sequence-specific DNA-binding transcription repressor,
    binding as a homodimer to a palindromic operator that overlaps the RNA
    polymerase binding site in target promoters, thereby repressing
    transcription. Repression is relieved when the effector 2-ketogluconate
    binds the C-terminal domain and dissociates PtxS from DNA.
  molecular_function:
    id: GO:0001217
    label: DNA-binding transcription repressor activity
  directly_involved_in:
  - id: GO:0045892
    label: negative regulation of DNA-templated transcription
  supported_by:
  - reference_id: PMID:20581202
    supporting_text: This palindrome overlaps with the RNA polymerase binding site.
  - reference_id: file:PSEPK/ptxS/ptxS-uniprot.txt
    supporting_text: Negatively regulates glucose metabolism by binding directly to
      the promoter region of the kgu and gad operons
- description: >-
    PtxS binds sequence-specific cis-regulatory operator regions in the kgu and
    gad (ptx) catabolic operon promoters and in its own upstream region, forming
    a repressive protein-DNA complex that controls 2-ketogluconate/glucose
    catabolic gene expression.
  molecular_function:
    id: GO:0000976
    label: transcription cis-regulatory region binding
  supported_by:
  - reference_id: PMID:20581202
    supporting_text: PtxS binds to an almost perfect palindrome that is present within
      the three promoters
proposed_new_terms: []
suggested_questions:
- question: >-
    Beyond the kgu, gad, and ptxS operons, does PtxS regulate any additional
    genes in the 2-ketogluconate/glucose catabolic regulon, and are there
    secondary effectors in vivo?
- question: >-
    Does the in vivo induction by glucose and gluconate (which do not bind PtxS
    in vitro) reflect intracellular conversion to 2-ketogluconate, or cross-talk
    with another regulator?
suggested_experiments:
- description: >-
    Genome-wide ChIP-seq of PtxS in the presence and absence of 2-ketogluconate
    to define the complete PtxS regulon and confirm operator occupancy.
- description: >-
    RNA-seq comparison of wild-type versus a ptxS deletion mutant under glucose,
    gluconate, and 2-ketogluconate growth conditions to map de-repression
    dynamics.
- description: >-
    Structural determination of the PtxS-operator DNA complex with and without
    bound 2-ketogluconate to elucidate the allosteric de-repression mechanism.
