- id: PMID:20581202
  title: Compartmentalized glucose metabolism in Pseudomonas putida is controlled
    by the PtxS repressor.
  findings:
  - statement: >-
      PtxS is a dimeric LacI/GalR-family repressor that binds a palindromic
      operator overlapping the RNA polymerase binding site in the kgu and gad
      operon promoters and its own promoter, repressing them.
    supporting_text: Footprint analysis revealed that PtxS binds to an almost perfect
      palindrome that is present within the three promoters and whose consensus sequence
      is 5'-TGAAACCGGTTTCA-3'. This palindrome overlaps with the RNA polymerase binding
      site.
    reference_section_type: ABSTRACT
  - statement: >-
      2-Ketogluconate is the molecular effector, binding PtxS with an apparent
      KD of 15 microM and causing dissociation from target promoters
      (de-repression).
    supporting_text: in vitro we found that only 2-ketogluconate binds to the regulator
      with an apparent K(D) (equilibrium dissociation constant) of 15 muM, as determined
      using isothermal titration calorimetry assays.
    reference_section_type: ABSTRACT
  - statement: >-
      PtxS is a homodimer with an N-terminal HTH DNA-binding domain and a
      C-terminal effector-binding domain.
    supporting_text: PtxS is made of two domains, a helix-turn-helix DNA-binding domain
      located at the N terminus and a C-terminal domain that binds the effector.
    reference_section_type: ABSTRACT
- id: file:interpro/panther/PTHR30146/PTHR30146-metadata.yaml
  title: PANTHER family PTHR30146 (LacI/GalR/PurR-type HTH transcriptional regulators)
    subfamily PTHR30146:SF145 RIBOSE OPERON REPRESSOR
  findings:
  - statement: >-
      PtxS is classified in PANTHER family PTHR30146 (LacI-related transcriptional
      repressor) and subfamily PTHR30146:SF145 (RIBOSE OPERON REPRESSOR), placing
      it in the LacI/GalR family of HTH-type transcriptional repressors.
  - statement: >-
      The SF145 "RIBOSE OPERON REPRESSOR" name reflects the nearest characterized
      relative of PtxS, not its physiological role; PtxS's molecular effector is
      2-ketogluconate, so the subfamily name does not define its regulon or
      effector specificity.
