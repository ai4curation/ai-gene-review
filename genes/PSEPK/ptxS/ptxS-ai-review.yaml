gene_symbol: ptxS
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: >-
  PtxS is a LacI/GalR-family HTH-type transcriptional repressor that controls
  the 2-ketogluconate (2-KG) peripheral pathway of glucose metabolism in
  Pseudomonas putida. It binds as a homodimer to an almost-perfect palindromic
  operator (consensus 5'-TGAAACCGGTTTCA-3') present in the promoters of the kgu
  and gad (ptx) catabolic operons, where the operator overlaps the RNA
  polymerase binding site, thereby repressing transcription by steric
  hindrance. PtxS also negatively autoregulates its own synthesis by binding an
  operator in its upstream region. 2-Ketogluconate (2-keto-D-gluconate) is the
  molecular effector; it binds the C-terminal effector-binding domain (apparent
  KD ~15 microM) and causes dissociation of PtxS from its operators, leading to
  de-repression of the catabolic genes. The protein has the canonical
  LacI/GalR two-domain architecture: an N-terminal helix-turn-helix DNA-binding
  domain and a C-terminal periplasmic-binding-protein-like effector-binding
  domain.
