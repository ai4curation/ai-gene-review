id: Q88NC4
gene_symbol: algD
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: AlgD is the GDP-mannose 6-dehydrogenase that converts GDP-mannose to
  GDP-mannuronate, the committed precursor-forming step in alginate biosynthesis.
  In Pseudomonas putida KT2440, alginate production and algD expression are most
  prominent under water-limiting conditions, where alginate contributes to hydrated
  biofilm microenvironments and protection from dehydration-associated stress, while
  playing a comparatively minor role in standard biofilm stability assays.
