    label: NAD binding
  qualifier: enables
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: This annotation is correct as a supporting molecular function. AlgD
      is an NAD-dependent dehydrogenase with an N-terminal Rossmann-like nucleotide-binding
      domain, and the UniProt record lists multiple NAD(+) binding residues. This
      term is less informative than the catalytic activity term but remains valid.
    action: ACCEPT
    supported_by:
    - reference_id: file:PSEPK/algD/algD-uniprot.txt
      supporting_text: 'NAD(P)-binding Rossmann-like Domain'
    - reference_id: file:PSEPK/algD/algD-uniprot.txt
