- description: AlgD catalyzes the NAD-dependent oxidation of GDP-mannose to GDP-mannuronate,
    the committed precursor-forming step in alginate biosynthesis. In KT2440, algD-pathway
    expression is particularly evident under water-limiting conditions, where alginate
    contributes to hydrated biofilm structure and stress tolerance.
