      as acceptor
  qualifier: enables
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  review:
    summary: This mechanistic parent term is correct for AlgD. The enzyme oxidizes
      the CH-OH group of GDP-mannose using NAD+ as electron acceptor to generate GDP-mannuronate.
      It is less specific than GO:0047919 but still accurately describes the reaction chemistry.
    action: ACCEPT
