    summary: This is the most specific and best supported molecular function term
      for AlgD. The UniProt record identifies the protein as GDP-mannose 6-dehydrogenase
      and gives the expected NAD-dependent oxidation of GDP-mannose to GDP-mannuronate.
      This is the core catalytic activity of the gene product.
    action: ACCEPT
    supported_by:
