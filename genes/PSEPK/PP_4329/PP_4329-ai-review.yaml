    id: GO:0009306
    label: protein secretion
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: involved_in
  review:
    summary: generic protein secretion is directionally correct but should be interpreted as flagellar
      type-III-like export/assembly.
    action: MODIFY
    reason: PP_4329 is FlhB, a flagellar export apparatus component required for rod/basal-body
      formation and likely flagellin export. The generic protein secretion term should be replaced by
      more specific flagellar type III secretion and/or bacterial-type flagellum assembly context.
    proposed_replacement_terms:
