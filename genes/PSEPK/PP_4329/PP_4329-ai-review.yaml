  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: PP_4329 encodes a FlhB-family membrane component of the flagellar type-III-like export
  apparatus in Pseudomonas putida KT2440. It is implicated in rod/basal-body formation and export of
  flagellar substrates, so generic protein secretion is best interpreted as flagellar export/assembly
  context rather than a broad secretion role.
