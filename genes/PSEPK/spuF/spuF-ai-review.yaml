suggested_questions:
- question: What are the exact substrate preferences and division of labor of the PP_5177-PP_5181 Spu/Pot importer across
    putrescine, spermidine, norspermidine, and related polyamines?
suggested_experiments:
- description: Measure uptake and growth phenotypes for a spuF deletion or depletion strain with putrescine, spermidine, norspermidine,
    and related polyamines, and compare with complementation by the intact PP_5177-PP_5181 locus.
  experiment_type: targeted polyamine ABC-import mutant uptake/growth assay
