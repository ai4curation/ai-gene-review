  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: spuF (PP_5179) encodes the ATP-binding energy-coupling subunit of the PP_5177-PP_5181 Spu/Pot spermidine/putrescine
  ABC importer. UniProt names it as PotA, assigns EC 7.6.2.11 for ATP-driven polyamine import, and describes its role as energy
  coupling within a PotABCD-like polyamine transporter complex.
