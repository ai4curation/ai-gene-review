suggested_questions:
- question: What substrate range and regulation distinguish the PP_2748-PP_2753 BCAA ABC importer from the other P. putida
    KT2440 branched-chain amino-acid transporter loci?
suggested_experiments:
- description: Measure uptake and growth phenotypes for PP_2748-PP_2753 mutants, alone and in combination with other BCAA
    transporter loci, using L-leucine, L-isoleucine, L-valine, alanine, and related hydrophobic amino acids as candidate substrates.
  experiment_type: targeted transporter mutant substrate-uptake and redundancy assay
