taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: PP_2748 encodes a predicted ATP-binding energy-coupling subunit of the adjacent PP_2748-PP_2753 branched-chain
  amino-acid ABC uptake system. Its ABC transporter ATP-binding and BCA ABC-transporter C-terminal domains, together with
  the adjacent PP_2749/PP_2750 permeases, PP_2751/PP_2752 leucine-family binding proteins, and PP_2753 second ATPase, support
  ATP hydrolysis-driven branched-chain amino-acid import.
