  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: ispB encodes all-trans-octaprenyl-diphosphate synthase, a trans-prenyltransferase that extends farnesyl diphosphate
  with IPP units to produce octaprenyl diphosphate. This product supplies the long isoprenoid side chain precursor for bacterial
  quinones such as ubiquinone.
