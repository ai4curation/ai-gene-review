description: evgA encodes a predicted EvgA-family DNA-binding response regulator in Pseudomonas putida
  KT2440. Domain architecture and product naming support a transcription-regulatory output role paired
  with the adjacent PP_2100 EvgS/BvgS-like sensor kinase.
