suggested_questions:
- question: >-
    Do FolD1 and FolD2 differ in expression, kinetic properties, or condition-
    specific contribution to the KT2440 folate carrier pool?
suggested_experiments:
- description: >-
    Compare purified FolD1 and FolD2 dehydrogenase and cyclohydrolase kinetics,
    then measure single- and double-mutant fitness across carbon and nitrogen
    regimes that alter one-carbon demand.
  experiment_type: enzyme kinetics and comparative mutant fitness
