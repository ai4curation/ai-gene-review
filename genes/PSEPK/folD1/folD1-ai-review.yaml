- id: file:PSEPK/folD1/folD1-deep-research-openscientist.md
  title: OpenScientist research for Pseudomonas putida folD1 (Q88LI7)
  reference_review:
    relevance: MEDIUM
    correctness: UNVERIFIED
    review_notes: >-
      The report recovers the reviewed target UniProt/HAMAP assignment and
      states that no PP_1945-specific biochemical or genetic study was found.
      Its unsaved identities and exact residue mapping, gene-neighborhood
      interpretation, transferred essentiality and druggability, and downstream
      consumer claims are not used as target-level evidence.
  findings:
  - statement: >-
      The report supports both NADP-linked FolD activities from the target
      record while leaving the physiological division between FolD1 and FolD2
      unresolved in the absence of direct KT2440 experiments.
- id: file:projects/P_PUTIDA/deep-research/PSEPK__folate_one_carbon_interconversion__ppu00670-deep-research-openscientist.md
  title: OpenScientist pathway research for KT2440 folate one-carbon interconversion
  reference_review:
    relevance: HIGH
    correctness: UNVERIFIED
    review_notes: >-
      The final max3 report maps both KT2440 FolD proteins to both core
      reactions and acknowledges that the assignment is homology-based. Its
      redundancy, genome-neighborhood, and broad candidate-inventory claims do
      not establish expression, essentiality, or paralog dominance.
  findings:
  - statement: >-
      The final report maps Q88LI7 and Q88KM5 to both FolD core operations,
      explicitly frames the in-target evidence as homology/domain based rather
      than direct KT2440 enzymology, and leaves expression and dominance for
      future study.
