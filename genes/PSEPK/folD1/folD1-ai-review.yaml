  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: >-
  folD1 encodes one of two soluble bifunctional FolD enzymes in Pseudomonas
  putida KT2440. The protein catalyzes NADP+-linked oxidation of
  5,10-methylene-THF to 5,10-methenyl-THF and hydrolysis of
  5,10-methenyl-THF to 10-formyl-THF, thereby interconverting adjacent
  one-carbon carrier states. FolD1 and FolD2 have the same predicted catalytic
  repertoire, and their physiological division of labor is unknown.
