  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: yehW (PP_0869) encodes a predicted multi-pass inner-membrane permease component of the PP_0868-PP_0871 quaternary-amine/osmoprotectant ABC importer. Its osmoprotectant permease product name, MetI-like permease domains, and local YehX/PP_0870/PP_0871 partners support glycine-betaine-compatible-solute transport.
