description: vacJ encodes a predicted MlaA/VacJ-family lipoprotein in Pseudomonas putida KT2440. It has a signal peptide and MlaA-family domain evidence and is inferred to participate in intermembrane phospholipid transfer, consistent with outer-membrane lipid-asymmetry maintenance by the Mla pathway.
