taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: >-
  ubiJ encodes a cytoplasmic SCP2-domain accessory factor for bacterial
  ubiquinone biosynthesis. It binds hydrophobic polyprenylated pathway
  intermediates and provides a scaffold that stabilizes and organizes the Ubi
  metabolon, allowing soluble tailoring enzymes to access lipid-like substrates.
