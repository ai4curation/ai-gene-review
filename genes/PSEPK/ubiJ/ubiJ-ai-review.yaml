id: Q88D16
gene_symbol: ubiJ
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: >-
  ubiJ encodes a UbiJ-family SCP2-domain accessory factor for bacterial
  ubiquinone biosynthesis. It binds hydrophobic ubiquinone biosynthetic
  intermediates and helps stabilize or organize the Ubi enzyme complex so that
  membrane-associated polyprenylated intermediates can be presented to the
  catalytic enzymes.
existing_annotations:
- term:
    id: GO:0005737
    label: cytoplasm
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: located_in
  review:
    summary: >-
      Cytoplasmic localization is consistent with the UniProt/HAMAP
      subcellular-location annotation for UbiJ.
    action: KEEP_AS_NON_CORE
    reason: >-
      The location is useful context for the soluble accessory factor, but the
      review's core assertion is the UbiJ role in ubiquinone biosynthesis.
- term:
    id: GO:0006744
    label: ubiquinone biosynthetic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: involved_in
  review:
    summary: >-
      UbiJ is a conserved accessory factor required for efficient ubiquinone
      biosynthesis.
    action: ACCEPT
    reason: >-
      UniProt/HAMAP states that UbiJ is required for ubiquinone biosynthesis,
      binds hydrophobic pathway intermediates via an SCP2 domain, and stabilizes
      the Ubi complex. The ppu00130 Falcon report independently flagged UbiJ as
      a missing accessory component from the KEGG candidate list.
    additional_reference_ids:
    - file:projects/P_PUTIDA/deep-research/PSEPK__ubiquinone_biosynthesis__ppu00130-deep-research-falcon.md
references:
