suggested_questions:
- question: Should the KT2440 UbiJ/UbiK accessory pair be annotated to a Ubi complex term when organism-specific complex evidence is indirect?
suggested_experiments:
- hypothesis: UbiJ supports mature ubiquinone production by binding polyprenylated pathway intermediates and stabilizing the Ubi enzyme assembly.
  description: Compare quinone intermediates and mature UQ-9 levels in wild-type and ubiJ deletion strains by LC-MS.
  experiment_type: targeted metabolomics
