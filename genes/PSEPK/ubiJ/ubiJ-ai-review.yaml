  title: UniProt entry Q88D16 for ubiJ
  findings:
  - statement: UniProt describes UbiJ as a ubiquinone-biosynthesis accessory factor.
    supporting_text: 'DE   RecName: Full=Ubiquinone biosynthesis accessory factor UbiJ {ECO:0000256|HAMAP-Rule:MF_02215};'
  - statement: UniProt says UbiJ binds hydrophobic intermediates and stabilizes the Ubi complex.
    supporting_text: 'CC       hydrophobic ubiquinone biosynthetic intermediates via its SCP2 domain'
  - statement: UniProt places UbiJ in the ubiquinone biosynthesis pathway.
    supporting_text: 'CC   -!- PATHWAY: Cofactor biosynthesis; ubiquinone biosynthesis.'
