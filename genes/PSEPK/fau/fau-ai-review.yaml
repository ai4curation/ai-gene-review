id: Q88CH8
gene_symbol: fau
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: >-
  fau encodes an ATP-dependent 5-formyltetrahydrofolate cyclo-ligase in
  Pseudomonas putida KT2440. The enzyme converts the stable 5-formyl-THF
  salvage pool to 5,10-methenyl-THF with formation of ADP and phosphate,
  returning trapped folate to the interconvertible one-carbon carrier pool.
  This salvage reaction is distinct from de novo folate synthesis.
existing_annotations:
- term:
    id: GO:0009396
    label: folic acid-containing compound biosynthetic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000118
  qualifier: involved_in
  review:
    summary: >-
      Fau forms 5,10-methenyl-THF from salvaged 5-formyl-THF, so the broad
      folic acid-containing compound biosynthetic process is correct even
      though it does not specify the salvage reaction.
    action: KEEP_AS_NON_CORE
    reason: >-
      GO:0009396 includes formation of substituted folate carrier states and is
      supported at PTN000601268. GO:0035999 and GO:0030272 provide the more
      informative core process and molecular function.
    supported_by:
    - reference_id: file:PSEPK/fau/fau-uniprot.txt
      supporting_text: "DR   GO; GO:0035999; P:tetrahydrofolate interconversion; IEA:TreeGrafter."
    - reference_id: file:interpro/panther/PTHR23407/PTHR23407-paint.tsv
      supporting_text: "PTHR23407\tPTN000601268\tGO:0009396\tP\tIBD\tfalse"
- term:
    id: GO:0030272
    label: 5-formyltetrahydrofolate cyclo-ligase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: >-
      This term precisely describes the ATP-dependent 5-formyl-THF salvage
      reaction assigned to Fau.
    action: ACCEPT
    reason: >-
      The UniProt record specifies EC 6.3.3.2/RHEA:10488, Q88CH8 belongs to
      PTHR23407:SF1, and PAINT supports the activity at PTN000601268 using
      experimentally characterized family members.
    supported_by:
    - reference_id: file:PSEPK/fau/fau-uniprot.txt
      supporting_text: "DR   GO; GO:0030272; F:5-formyltetrahydrofolate cyclo-ligase activity; IEA:UniProtKB-EC."
    - reference_id: file:PSEPK/fau/fau-uniprot.txt
      supporting_text: "DR   PANTHER; PTHR23407:SF1; 5-FORMYLTETRAHYDROFOLATE CYCLO-LIGASE; 1."
    - reference_id: file:interpro/panther/PTHR23407/PTHR23407-paint.tsv
      supporting_text: "PTHR23407	PTN000601268	GO:0030272	F	IBD	false"
- term:
    id: GO:0035999
    label: tetrahydrofolate interconversion
  evidence_type: IEA
  original_reference_id: GO_REF:0000118
  qualifier: involved_in
  review:
    summary: >-
      Conversion of 5-formyl-THF to 5,10-methenyl-THF returns a salvaged
      carrier state to the tetrahydrofolate interconversion pool.
    action: ACCEPT
    reason: >-
      This process term is specific to the reaction's role and avoids assigning
      Fau to upstream folate synthesis or downstream one-carbon consumers.
    supported_by:
    - reference_id: file:PSEPK/fau/fau-uniprot.txt
      supporting_text: "DR   GO; GO:0035999; P:tetrahydrofolate interconversion; IEA:TreeGrafter."
