- id: file:PSEPK/fau/fau-deep-research-openscientist.md
  title: OpenScientist research for Pseudomonas putida fau (Q88CH8)
  reference_review:
    relevance: MEDIUM
    correctness: UNVERIFIED
    review_notes: >-
      The report corroborates the target UniProt/family assignment and states
      that no direct Q88CH8 assay was found. Its unsaved pairwise identities,
      exact residue mapping, inferred cytosolic location, and transfer of
      phenotypes from other bacteria are not used as target-level evidence.
  findings:
  - statement: >-
      The report found no direct biochemical or genetic characterization of
      Q88CH8 and therefore treated the cyclo-ligase assignment as a
      homology-based inference from the target record and family signatures.
- id: file:projects/P_PUTIDA/deep-research/PSEPK__folate_one_carbon_interconversion__ppu00670-deep-research-openscientist.md
  title: OpenScientist pathway research for KT2440 folate one-carbon interconversion
  reference_review:
    relevance: HIGH
    correctness: UNVERIFIED
    review_notes: >-
      The final max3 report correctly maps Q88CH8 to the optional salvage
      operation and notes its ppu04981 primary-bucket cross-mapping. This is
      homology/domain evidence rather than a direct KT2440 enzyme assay.
  findings:
  - statement: >-
      The final report maps Q88CH8 to ATP-dependent 5-formyl-THF salvage and
      identifies its ppu04981 primary-bucket assignment as a cross-mapping
      discrepancy rather than evidence against the reaction.
core_functions:
- description: >-
    Fau uses ATP to convert 5-formyl-THF to 5,10-methenyl-THF, ADP, and
    phosphate (EC 6.3.3.2; RHEA:10488), salvaging an otherwise trapped folate
    carrier state back into the one-carbon interconversion pool.
  supported_by:
  - reference_id: file:PSEPK/fau/fau-uniprot.txt
    supporting_text: "Xref=Rhea:RHEA:10488"
  molecular_function:
    id: GO:0030272
    label: 5-formyltetrahydrofolate cyclo-ligase activity
  directly_involved_in:
  - id: GO:0035999
    label: tetrahydrofolate interconversion
proposed_new_terms: []
suggested_questions:
- question: >-
    Under which KT2440 growth conditions does 5-formyl-THF accumulate enough
    for Fau-mediated salvage to affect folate homeostasis or fitness?
suggested_experiments:
- description: >-
    Measure ATP-dependent conversion of 5-formyl-THF by purified Q88CH8 and
    quantify intracellular 5-formyl- and 5,10-methenyl-THF in a fau deletion
    across one-carbon stress conditions.
  experiment_type: enzyme assay and targeted folate metabolomics
