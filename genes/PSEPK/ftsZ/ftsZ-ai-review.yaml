taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: >-
  ftsZ encodes the essential bacterial cell division protein FtsZ, a tubulin
  homolog and GTPase. FtsZ binds GTP and, in a strictly GTP-dependent manner,
  polymerizes into protofilaments that assemble into a dynamic contractile ring
  structure (the Z ring) at the cytoplasmic face of the inner membrane at the
  future division site (midcell). The Z ring marks the division plane and serves
  as the scaffold that recruits the downstream divisome proteins to the septum,
  driving constriction and synthesis of new cell wall (septum) to separate the two
  daughter cells. GTP hydrolysis controls the turnover and remodeling of the
  filaments, regulating the timing and positioning of cytokinesis.
