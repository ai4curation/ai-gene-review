    summary: Gyrase removes positive supercoils ahead of the replication fork and is required for chromosomal replication; the UniProt FUNCTION notes negative supercoiling favors replication, and UniRule transfers this process. Retained as a non-core process (gyrase supports replication topology rather than being a core replisome activity).
