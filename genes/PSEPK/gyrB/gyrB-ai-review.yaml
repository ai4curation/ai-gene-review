  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: gyrB (PP_0013) encodes the B subunit of DNA gyrase, a bacterial type IIA topoisomerase (EC 5.6.2.2). DNA gyrase is a heterotetramer of two GyrA and two GyrB chains (A2B2) that uses ATP-dependent double-strand passage to introduce negative supercoils into closed circular double-stranded DNA and to interconvert other topological isomers (catenanes, knots), maintaining the chromosome in an underwound state. GyrB provides the N-terminal GHKL ATPase domain that binds and hydrolyzes ATP to power strand passage, and a TOPRIM (topoisomerase/primase) domain that coordinates the catalytic Mg2+ ions (also Mn2+ or Ca2+) required for DNA cleavage and religation; the partner GyrA subunit contributes the active-site tyrosine and DNA-wrapping functions. Acting in the cytoplasm on the nucleoid, gyrase supports DNA replication, transcription, recombination, and repair in P. putida and is a target of aminocoumarin and quinolone antibiotics.
