    summary: Supporting molecular function. GyrB contains the N-terminal GHKL/HATPase ATP-binding and hydrolysis domain that powers gyrase strand passage; the UniProt ATP-binding keyword and the HATPase_C signature support this. This is a genuine GyrB activity but a broad term relative to the specific topoisomerase activity; retained as non-core.
