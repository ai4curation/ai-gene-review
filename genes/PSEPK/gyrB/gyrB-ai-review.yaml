    summary: Core molecular function. This is the EC 5.6.2.2 type II topoisomerase activity of DNA gyrase, matching the UniProt RecName/FUNCTION, HAMAP-Rule MF_01898 (GyrB), TIGR01059 (gyrB), and the GHKL ATPase plus TOPRIM domain architecture. GyrB supplies the ATPase and catalytic-metal functions central to the ATP-hydrolyzing double-strand-cut reaction. Strongly supported despite IEA evidence.
