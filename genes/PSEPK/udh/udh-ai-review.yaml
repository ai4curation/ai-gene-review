  review:
    summary: >-
      Accept the uronate dehydrogenase activity. The P. putida KT2440 enzyme was
      identified as a homolog of the cloned Pseudomonas syringae Udh, expressed
      recombinantly, purified, and characterized with glucuronate and
      galacturonate substrates.
    action: ACCEPT
    reason: >-
      Although the GOA annotation itself is an electronic EC mapping, the
      underlying UniProt entry cites primary experimental characterization for
      the KT2440 protein. The cached abstract explicitly includes P. putida
      KT2440 among the cloned uronate dehydrogenases and states that recombinant
      proteins from the three organisms were purified and characterized.
