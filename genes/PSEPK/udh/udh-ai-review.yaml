taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: >-
  Udh is a characterized NAD+-dependent uronate dehydrogenase from Pseudomonas
  putida KT2440. It oxidizes beta-D-glucuronate and beta-D-galacturonate to the
  corresponding lactones in the prokaryotic oxidative route for hexuronate
  metabolism.
