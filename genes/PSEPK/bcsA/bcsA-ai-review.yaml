- term:
    id: GO:0016760
    label: cellulose synthase (UDP-forming) activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: The UDP-forming cellulose synthase activity is the core catalytic function of BcsA.
    action: ACCEPT
    reason: UniProt describes BcsA as the catalytic subunit of cellulose synthase, maps EC 2.4.1.12/Rhea:19929, and GOA already contains the specific UDP-forming cellulose synthase term.
    supported_by:
