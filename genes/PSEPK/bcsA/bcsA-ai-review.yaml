  title: PANTHER family metadata for bcsA
  findings:
  - statement: PANTHER places BcsA in a glycosyltransferase 2/OpgH-family-related cellulose synthase subfamily.
- id: PMID:23222542
  title: Crystallographic snapshot of cellulose synthesis and membrane translocation.
  findings:
  - statement: The BcsA-B crystal structure establishes BcsA as the inner-membrane catalytic cellulose synthase subunit and BcsB as its membrane-anchored periplasmic partner.
    supporting_text: "The inner membrane protein BcsA is the catalytically active subunit and contains a conserved family two GT-domain between TM-helices 4 and 5"
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: PMC-cached primary structural paper supporting the BcsA catalytic and inner-membrane translocation role.
- id: PMID:24704788
  title: Mechanism of activation of bacterial cellulose synthase by cyclic di-GMP.
  findings:
  - statement: BcsA carries the PilZ-domain c-di-GMP switch that relieves autoinhibition of the cellulose synthase.
    supporting_text: "BcsA forms a PilZ domain within its C-terminal intracellular extension"
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: PMC-cached primary structural paper supporting c-di-GMP regulation of BcsA.
- id: file:PSEPK/bcsA/bcsA-deep-research-openscientist.md
  title: OpenScientist gene research for bcsA
  findings:
  - statement: OpenScientist verifies Q88JL4/PP_2635 as the canonical GT2/PilZ BcsA cellulose synthase rather than an orphan pseudomonad BcsA-like cyclic-beta-glucan synthase.
    supporting_text: "This is the *canonical* BcsA, distinct from the recently described \"orphan\" BcsA"
