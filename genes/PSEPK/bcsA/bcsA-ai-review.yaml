- term:
    id: GO:0035438
    label: cyclic-di-GMP binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: Cyclic-di-GMP binding is a relevant regulatory activity for BcsA but is secondary to the catalytic cellulose synthase function.
    action: KEEP_AS_NON_CORE
    reason: BcsA-family cellulose synthases are c-di-GMP regulated, and InterPro/UniProt support cyclic-di-GMP binding; the core catalytic output remains cellulose synthase activity.
    supported_by:
    - reference_id: file:PSEPK/bcsA/bcsA-goa.tsv
      supporting_text: "GO:0035438\tcyclic-di-GMP binding"
