suggested_questions:
- question: Does KT2440 BcsA produce extracellular cellulose under the tested low-nutrient or biofilm conditions, and which c-di-GMP signals activate it?
- question: Which neighboring bcs-locus proteins are required with BcsA for cellulose export and mature polymer assembly?
suggested_experiments:
- description: Assay cellulose production in wild-type and bcsA deletion strains using calcofluor/Congo red staining and beta-1,4-glucan quantification under biofilm-inducing conditions.
  experiment_type: targeted genetics and polysaccharide profiling
- description: Reconstitute BcsA/BcsB membrane complexes with UDP-glucose and c-di-GMP to measure cellulose synthase activity.
  experiment_type: in vitro glycosyltransferase assay
