description: bcsA encodes the multi-pass inner-membrane catalytic subunit of bacterial cellulose synthase, a GT2 enzyme that polymerizes UDP-glucose into cellulose during cellulose biosynthesis.
existing_annotations:
- term:
    id: GO:0005886
    label: plasma membrane
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: located_in
  review:
    summary: Plasma membrane is the appropriate bacterial inner-membrane location for BcsA.
    action: ACCEPT
    reason: UniProt places BcsA in the cell inner membrane and records it as a multi-pass membrane protein.
    supported_by:
    - reference_id: file:PSEPK/bcsA/bcsA-uniprot.txt
      supporting_text: "SUBCELLULAR LOCATION: Cell inner membrane"
    - reference_id: file:PSEPK/bcsA/bcsA-goa.tsv
      supporting_text: "GO:0005886\tplasma membrane"
- term:
    id: GO:0006011
    label: UDP-alpha-D-glucose metabolic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: involved_in
  review:
    summary: UDP-alpha-D-glucose metabolism is related to the donor substrate but is not the best process term for BcsA.
    action: MODIFY
    reason: BcsA uses UDP-glucose as the donor for cellulose polymerization, so the pathway-level annotation should be cellulose biosynthetic process rather than the broad donor-substrate metabolic process.
    proposed_replacement_terms:
    - id: GO:0030244
      label: cellulose biosynthetic process
    supported_by:
    - reference_id: file:PSEPK/bcsA/bcsA-uniprot.txt
      supporting_text: "PATHWAY: Glycan metabolism; bacterial cellulose biosynthesis."
    - reference_id: file:PSEPK/bcsA/bcsA-goa.tsv
      supporting_text: "GO:0006011\tUDP-alpha-D-glucose metabolic process"
- term:
    id: GO:0016020
    label: membrane
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: located_in
  review:
    summary: Membrane is correct but less specific than the bacterial plasma membrane assignment already present.
    action: MODIFY
    reason: BcsA is specifically an inner-membrane multi-pass protein; GO:0005886 is the more informative cellular-component term.
    proposed_replacement_terms:
    - id: GO:0005886
      label: plasma membrane
    supported_by:
    - reference_id: file:PSEPK/bcsA/bcsA-uniprot.txt
      supporting_text: "SUBCELLULAR LOCATION: Cell inner membrane"
    - reference_id: file:PSEPK/bcsA/bcsA-goa.tsv
      supporting_text: "GO:0016020\tmembrane"
