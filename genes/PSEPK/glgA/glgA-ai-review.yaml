  review:
    summary: The UDP-glucose donor term conflicts with the UniProt/HAMAP ADP-glucose glycogen synthase reaction.
    action: MODIFY
    reason: UniProt states that GlgA synthesizes alpha-1,4-glucan chains using ADP-glucose, so the ADP-glucose donor activity is the appropriate term.
