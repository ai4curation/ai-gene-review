taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: >-
  PP_0431 is a HemJ-family, multi-pass membrane protoporphyrinogen IX oxidase.
  It oxidizes protoporphyrinogen IX to protoporphyrin IX through a
  membrane-electron-acceptor reaction and binds one heme-b cofactor per subunit.
  The product is the macrocycle used by HemH in the terminal ferrochelation step
  of heme-b biosynthesis.
