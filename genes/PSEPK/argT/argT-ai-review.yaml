  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: argT encodes a signal-peptide-bearing periplasmic lysine/arginine/ornithine substrate-binding component associated with the adjacent HisP/HisM/HisQ ABC transporter. The local locus supports a basic-amino-acid import role, while exact substrate preference among histidine, lysine, arginine, and ornithine remains to be resolved experimentally in KT2440.
