description: dnaB (PP_4873) encodes the canonical bacterial replicative DNA helicase. DnaB is an ATP-dependent hexameric 5'-to-3'
  DNA helicase that unwinds parental duplex DNA at the replication fork and works with DnaG primase in the primosome during
  chromosome replication.
