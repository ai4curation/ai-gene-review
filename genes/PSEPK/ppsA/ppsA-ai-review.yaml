description: ppsA (PP_2082) encodes phosphoenolpyruvate synthase (PEP synthase, also called pyruvate, water dikinase; EC 2.7.9.2), a magnesium-dependent enzyme that catalyzes the ATP-driven conversion of pyruvate to phosphoenolpyruvate (pyruvate + ATP + H2O = phosphoenolpyruvate + AMP + phosphate + 2 H+). The enzyme belongs to the PEP-utilizing enzyme family and uses a swivelling phosphohistidine (mobile) domain to transfer a phosphoryl group from ATP, via a phosphohistidine intermediate, to pyruvate; it comprises an N-terminal ATP/AMP-binding (PPDK_N) domain, the central mobile PEP-utiliser domain, and a C-terminal PEP/pyruvate-binding TIM-barrel domain. PEP synthase catalyzes an essentially irreversible, anaplerotic/gluconeogenic step that regenerates PEP from pyruvate, enabling growth on substrates that enter metabolism as pyruvate or TCA-cycle intermediates and supplying the PEP precursor for gluconeogenesis and biosynthesis. It is a soluble cytoplasmic enzyme in P. putida.
existing_annotations:
- term:
    id: GO:0005524
    label: ATP binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: Correct supporting molecular function. PEP synthase binds and hydrolyzes ATP (to AMP + phosphate) as the phosphoryl donor; the N-terminal PPDK AMP/ATP-binding domain (InterPro IPR002192, IPR013815) and the ATP-binding keyword support this. Kept as non-core because it describes a substrate-binding capability subsidiary to the specific catalytic activity.
    action: KEEP_AS_NON_CORE
- term:
    id: GO:0008986
    label: pyruvate, water dikinase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: Core molecular function. This is the precise EC 2.7.9.2 activity matching the UniProt RecName (Phosphoenolpyruvate synthase / pyruvate, water dikinase), the catalytic-activity statement (RHEA:11364) and the PEP synthase family assignment (TIGR01418 PEP_synth, PIRSF000854). Strongly supported despite IEA evidence.
    action: ACCEPT
- term:
    id: GO:0016301
    label: kinase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: General kinase/phosphotransfer term derived from the InterPro PPDK AMP/ATP-binding signature (IPR002192). It is correct in that PEP synthase transfers a phosphoryl group, but it is uninformative relative to the specific pyruvate, water dikinase activity already captured.
    action: MARK_AS_OVER_ANNOTATED
- term:
    id: GO:0016740
    label: transferase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000117
  qualifier: enables
  review:
    summary: Root-level transferase term assigned by ARBA. Correct (PEP synthase is a phosphotransferase) but entirely uninformative relative to the specific EC 2.7.9.2 activity already annotated.
    action: MARK_AS_OVER_ANNOTATED
- term:
    id: GO:0016772
    label: transferase activity, transferring phosphorus-containing groups
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: A more specific parent describing the phosphoryl-transfer chemistry, derived from InterPro PEP-utiliser signatures (IPR000121, IPR008279, etc.). Correct but a generalization of the precise pyruvate, water dikinase activity; kept as a non-core supporting term.
    action: KEEP_AS_NON_CORE
- term:
    id: GO:0006094
    label: gluconeogenesis
  evidence_type: IEA
  original_reference_id: GO_REF:0000041
  qualifier: involved_in
  review:
    summary: Core biological process. PEP synthase regenerates phosphoenolpyruvate from pyruvate, the anaplerotic/gluconeogenic step required for growth on pyruvate- or TCA-derived carbon sources. Supported by the UniProt PATHWAY annotation (Carbohydrate biosynthesis; gluconeogenesis) and UniPathway UPA00138.
    action: ACCEPT
