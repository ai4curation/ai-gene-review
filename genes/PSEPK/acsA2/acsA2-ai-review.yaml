description: acsA2 (PP_4702, also annotated acsB) encodes a second AMP-forming acetyl-CoA synthetase. Like AcsA1, it catalyzes ATP-dependent activation of acetate and ligation to coenzyme A to generate acetyl-CoA. The duplicated acs genes likely support acetate assimilation under different regulatory or physiological contexts.
