taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: topA (PP_2139) encodes DNA topoisomerase I, a type IA topoisomerase in Pseudomonas putida KT2440. The protein
  is a monomeric, ATP-independent single-strand breakage/rejoining enzyme that releases supercoiling and torsional tension
  generated during DNA replication and transcription. Its primary role is DNA topological change on chromosomal DNA rather
  than a generic DNA-binding activity.
