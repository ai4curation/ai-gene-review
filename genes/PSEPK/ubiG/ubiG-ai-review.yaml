id: Q88M10
gene_symbol: ubiG
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: >-
  ubiG encodes a SAM-dependent ubiquinone O-methyltransferase that performs two
  distinct ring O-methylation reactions during ubiquinone biosynthesis. It acts
  on an early hydroxylated polyprenylphenol intermediate and again on
  3-demethylubiquinol near the end of the pathway.
existing_annotations:
- term:
    id: GO:0006744
    label: ubiquinone biosynthetic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: involved_in
  review:
    summary: Ubiquinone biosynthesis is the core biological process for UbiG.
    action: ACCEPT
    reason: UbiG catalyzes both pathway O-methylation reactions.
    supported_by:
    - reference_id: file:PSEPK/ubiG/ubiG-uniprot.txt
      supporting_text: ubiquinone biosynthetic pathway
- term:
    id: GO:0008168
    label: methyltransferase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000118
  qualifier: enables
  review:
    summary: The generic methyltransferase term is correct but redundant with two substrate-specific activities.
    action: MARK_AS_OVER_ANNOTATED
    reason: GO:0061542 and GO:0102208 capture the two evolved UbiG activities.
- term:
    id: GO:0010420
    label: polyprenyldihydroxybenzoate methyltransferase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: This carboxylated-substrate activity is not supported for PSEPK UbiG.
    action: REMOVE
    reason: >-
      The reviewed UniProt record assigns two reactions on decarboxylated
      polyprenylphenol/ubiquinol intermediates, not a
      polyprenyldihydroxybenzoate methylation reaction. This InterPro-derived
      term conflates a different proposed pathway ordering with UbiG's two
      established activities.
- term:
    id: GO:0061542
    label: 3-demethylubiquinol 3-O-methyltransferase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: This is the substrate-specific late O-methylation catalyzed by UbiG.
    action: ACCEPT
    reason: UniProt assigns EC 2.1.1.64 and Rhea 44380 to this reaction.
    supported_by:
    - reference_id: file:PSEPK/ubiG/ubiG-uniprot.txt
      supporting_text: 3-demethylubiquinol 3-O-methyltransferase
- term:
    id: GO:0102208
    label: 2-polyprenyl-6-hydroxyphenol methylase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: This is the substrate-specific early O-methylation catalyzed by UbiG.
    action: ACCEPT
    reason: UniProt assigns EC 2.1.1.222 and Rhea 31411 to this reaction.
    supported_by:
    - reference_id: file:PSEPK/ubiG/ubiG-uniprot.txt
      supporting_text: 2-polyprenyl-6-hydroxyphenol methylase
