- id: PMID:10419476
  title: Yeast and rat Coq3 and Escherichia coli UbiG polypeptides catalyze both
    O-methyltransferase steps in coenzyme Q biosynthesis.
  findings:
  - statement: >-
      Purified E. coli UbiG catalyzes both ubiquinone-pathway O-methylation
      steps, providing the direct experimental exemplar for the two activities
      transferred to PP_1765.
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      PubMed record and abstract verified; direct assays are on E. coli UbiG,
      not P. putida PP_1765.
- id: file:PSEPK/ubiG/ubiG-deep-research-openscientist.md
  title: OpenScientist functional review of PSEPK ubiG
  findings:
  - statement: >-
      Ortholog biochemistry and the reviewed target record support both UbiG
      O-methylation reactions. PP_1765 itself has not been experimentally
      characterized, and the report's claims about an anaerobic P. putida route
      or target-strain metabolon assembly are not treated as established.
