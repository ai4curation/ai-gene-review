id: Q88M10
gene_symbol: ubiG
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: >-
  ubiG encodes the UbiG/Coq3-family S-adenosyl-L-methionine-dependent
  O-methyltransferase for ubiquinone biosynthesis. In the bacterial ubiquinone
  route, UbiG performs two O-methylation reactions on polyprenylated aromatic
  intermediates: methylation of 2-polyprenyl-6-hydroxyphenol and terminal
  methylation of 3-demethylubiquinol to ubiquinol.
existing_annotations:
- term:
    id: GO:0006744
    label: ubiquinone biosynthetic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: involved_in
  review:
    summary: >-
      UbiG catalyzes two O-methylation steps in ubiquinone biosynthesis.
    action: ACCEPT
    reason: >-
      The UniProt/HAMAP assignment explicitly places Q88M10 in the ubiquinone
      biosynthetic pathway.
- term:
    id: GO:0008168
    label: methyltransferase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000118
  qualifier: enables
  review:
    summary: >-
      Methyltransferase activity is true but too broad for a UbiG enzyme with
      substrate-resolved GO terms already present.
    action: MODIFY
    reason: >-
      Q88M10 is specifically a ubiquinone-pathway O-methyltransferase with
      GO:0102208 and GO:0061542 annotations; those terms should replace the
      generic methyltransferase parent.
    proposed_replacement_terms:
    - id: GO:0102208
      label: 2-polyprenyl-6-hydroxyphenol methylase activity
    - id: GO:0061542
      label: 3-demethylubiquinol 3-O-methyltransferase activity
- term:
    id: GO:0010420
    label: polyprenyldihydroxybenzoate methyltransferase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: >-
      This captures the early UbiG O-methylation chemistry in the ubiquinone
      pathway.
    action: ACCEPT
    reason: >-
      The term is consistent with the UniProt/HAMAP reaction for methylation of
      a 3-polyprenyl benzene-1,2-diol-like intermediate.
- term:
    id: GO:0061542
    label: 3-demethylubiquinol 3-O-methyltransferase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: >-
      This is the terminal UbiG O-methylation step producing ubiquinol.
    action: ACCEPT
    reason: >-
      UniProt records the 3-demethylubiquinol plus SAM reaction for Q88M10 with
      EC 2.1.1.64.
- term:
    id: GO:0102208
    label: 2-polyprenyl-6-hydroxyphenol methylase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: >-
      This is the early UbiG O-methylation step in ubiquinone biosynthesis.
    action: ACCEPT
    reason: >-
      UniProt records the 2-polyprenyl-6-hydroxyphenol methylase reaction for
      Q88M10 with EC 2.1.1.222.
