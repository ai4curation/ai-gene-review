proposed_new_terms: []
suggested_questions:
- question: >-
    Does PP_1765 show the same relative efficiency for the early and late UbiG
    O-methylation reactions, and can it methylate the carboxylated Coq3-like
    substrate outside the physiological bacterial pathway?
suggested_experiments:
- description: >-
    Purify PP_1765 and compare SAM-dependent turnover of the two physiological
    polyprenyl substrates with the carboxylated pathway analog, then profile
    intermediates in a complemented P. putida ubiG deletion strain.
