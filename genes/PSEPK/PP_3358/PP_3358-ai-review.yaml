description: PP_3358 encodes a predicted hydroxycinnamoyl-CoA hydratase-lyase (EC 4.1.2.41/4.2.1.101), an enoyl-CoA hydratase/isomerase-family enzyme
  in the fcs-vdh hydroxycinnamate catabolic neighborhood. The best first-pass function is feruloyl-CoA hydratase/lyase activity,
  converting feruloyl-CoA toward vanillin in the ferulate/vanillin side funnel.
