  title: OpenScientist deep research report for Pseudomonas putida KT2440 mqo1
  findings:
  - statement: The report supports mqo1 as a membrane-associated FAD-dependent malate:quinone oxidoreductase at the TCA/respiratory-chain interface.
    supporting_text: Mqo1 therefore functions simultaneously as a **TCA-cycle enzyme and a primary dehydrogenase of the respiratory chain**, structurally and functionally analogous to succinate dehydrogenase.
    reference_section_type: RESULTS
  - statement: The report notes that the mqo1-specific contribution remains unresolved because P. putida KT2440 has three MQO paralogs plus NAD-dependent Mdh.
