suggested_questions:
- question: Which of the three P. putida KT2440 MQO paralogs is the dominant malate:quinone oxidoreductase under organic-acid and gluconeogenic growth conditions?
suggested_experiments:
- description: Purify recombinant Mqo1 and measure FAD content, L-malate kinetics, and quinone specificity using physiological ubiquinone analogs to confirm strict MQO activity and exclude 2-hydroxyglutarate dehydrogenase activity.
- description: Build single and combined mqo1, mqo2, mqo3, and mdh mutants and compare growth and flux on malate, succinate, acetate, and glucose to resolve paralog-specific contributions at the malate/oxaloacetate node.
