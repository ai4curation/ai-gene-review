  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: Membrane-associated, FAD-dependent malate:quinone oxidoreductase of the MQO family. Mqo1 catalyzes oxidation of (S)-malate to oxaloacetate while reducing a respiratory quinone, linking the malate/oxaloacetate step of the tricarboxylic acid cycle to the quinone pool of the aerobic electron transport chain. It is one of three MQO paralogs in Pseudomonas putida KT2440, so its exact paralog-specific physiological contribution is unresolved, but its domain architecture, HAMAP annotation, and orthology support a core role in respiratory malate oxidation.
