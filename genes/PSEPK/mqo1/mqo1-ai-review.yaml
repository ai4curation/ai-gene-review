  review:
    summary: Correct process annotation for an MQO enzyme catalyzing the malate-to-oxaloacetate step of the TCA cycle using a quinone acceptor.
    action: ACCEPT
    reason: UniProt/HAMAP annotates Mqo1 in the tricarboxylic acid cycle, specifically oxaloacetate formation from (S)-malate by the quinone route. The OpenScientist report independently supports this as the primary metabolic context for Q88PU7, while noting that the specific division of labor among mqo1, mqo2, mqo3, and NAD-dependent mdh is not experimentally resolved.
