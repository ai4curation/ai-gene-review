description: 'PP_0582 encodes an uncharacterized thiolase-family enzyme predicted to catalyze acetyl-CoA
  C-acyltransferase chemistry. The current evidence supports a soluble cytosolic thiolase-like acyltransferase
  but does not establish a specific role in benzoate or beta-ketoadipate degradation.'
