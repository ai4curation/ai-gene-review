suggested_questions:
- question: Which faces of KT2440 Alg44 interact with Alg8 and other alginate-envelope components, and how does cyclic-di-GMP binding regulate that complex?
suggested_experiments:
- description: Mutate conserved PilZ/cyclic-di-GMP-binding residues and measure alginate production under inducing conditions.
  experiment_type: targeted mutagenesis
- description: Reconstitute Alg8-Alg44 interaction and test cyclic-di-GMP dependence by pull-down or membrane-protein complex assays.
  experiment_type: protein interaction assay
