  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: >-
  Alg44 is a conserved alginate-biosynthesis factor in Pseudomonas putida
  KT2440. Its PilZ/cyclic-di-GMP-binding domain links alginate polymerization
  to cyclic-di-GMP regulation and it functions with the alginate biosynthesis
  machinery rather than as an independent metabolic enzyme.
