- id: file:PSEPK/paaZ/paaZ-uniprot.txt
  title: UniProtKB entry Q88HT3 for Pseudomonas putida KT2440 paaZ
  findings:
  - statement: UniProt assigns two pathway activities to the PaaZ polypeptide.
    supporting_text: 'SubName: Full=Oxepin-CoA hydrolase/3-oxo-5,6-dehydrosuberyl-CoA semialdehyde dehydrogenase'
    reference_section_type: RESULTS
