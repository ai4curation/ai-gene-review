id: Q88HT3
gene_symbol: paaZ
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: >-
  PaaZ is a predicted bifunctional oxepin-CoA hydrolase and
  3-oxo-5,6-dehydrosuberyl-CoA semialdehyde dehydrogenase in the aerobic
  phenylacetate pathway of Pseudomonas putida KT2440. Its two domains couple
  ring-opening hydrolysis to NADP-dependent aldehyde oxidation
  in the upper-to-lower pathway transition.
