- id: file:PSEPK/paaZ/paaZ-deep-research-openscientist.md
  title: OpenScientist deep-research report for PSEPK paaZ
  findings:
  - statement: The report assigns the two PaaZ domains consecutive ring-opening and aldehyde-oxidation reactions.
    supporting_text: >-
      The enzyme consists of a C-terminal (R)-specific enoyl-CoA hydratase
      domain (formerly MaoC) that cleaves the ring and produces a highly
      reactive aldehyde and an N-terminal NADP(+)-dependent aldehyde
      dehydrogenase domain that oxidizes the aldehyde to
      3-oxo-5,6-dehydrosuberyl-CoA
    reference_section_type: RESULTS
  - statement: Direct biochemical characterization of the KT2440 target remains limited.
    supporting_text: >-
      **Direct enzymology on the *P. putida* KT2440 ortholog is limited.**
    reference_section_type: DISCUSSION
  reference_review:
    relevance: HIGH
    correctness: UNVERIFIED
    review_notes: >-
      Provider-generated gene report. The exact accession, fusion-domain
      architecture, two EC assignments, and pathway context agree with local
      records; detailed catalysis and channeling derive from orthologs.
