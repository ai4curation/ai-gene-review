suggested_questions:
- question: Does GO need exact terms for the two PaaZ half-reactions, oxepin-CoA hydrolase activity and 3-oxo-5,6-dehydrosuberyl-CoA semialdehyde dehydrogenase activity, to replace the current broad class terms?
suggested_experiments:
- description: Assay purified PSEPK PaaZ with phenylacetate lower-pathway intermediates and map products by LC-MS to confirm both hydrolase and aldehyde dehydrogenase half-reactions.
  experiment_type: enzyme assay and metabolite identification
