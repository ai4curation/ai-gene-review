id: Q88HT3
gene_symbol: paaZ
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: paaZ encodes a bifunctional PaaZ-family enzyme in phenylacetate degradation, annotated as oxepin-CoA hydrolase/3-oxo-5,6-dehydrosuberyl-CoA semialdehyde dehydrogenase. The available first-pass evidence supports a phenylacetate lower-pathway aldehyde/oxo oxidoreductase role, with hydrolase chemistry noted by UniProt but not captured by a specific GOA molecular-function term.
existing_annotations:
- term:
    id: GO:0016491
    label: oxidoreductase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: Generic oxidoreductase activity is directionally correct but too broad for PaaZ.
    action: MODIFY
    reason: UniProt and InterPro support the narrower aldehyde/oxo-group oxidoreductase class for the dehydrogenase half of the bifunctional PaaZ enzyme.
    proposed_replacement_terms:
    - id: GO:0016620
      label: oxidoreductase activity, acting on the aldehyde or oxo group of donors, NAD or NADP as acceptor
    supported_by:
    - reference_id: file:PSEPK/paaZ/paaZ-uniprot.txt
      supporting_text: 'SubName: Full=Oxepin-CoA hydrolase/3-oxo-5,6-dehydrosuberyl-CoA semialdehyde dehydrogenase'
    - reference_id: file:PSEPK/paaZ/paaZ-uniprot.txt
      supporting_text: DR   GO; GO:0016620; F:oxidoreductase activity, acting on the aldehyde or oxo group of donors, NAD or NADP as acceptor; IEA:InterPro.
    - reference_id: file:PSEPK/paaZ/paaZ-goa.tsv
      supporting_text: "GO:0016491\toxidoreductase activity"
- term:
    id: GO:0010124
    label: phenylacetate catabolic process
  evidence_type: IEA
  original_reference_id: file:PSEPK/paaZ/paaZ-uniprot.txt
  qualifier: involved_in
  review:
    summary: PaaZ is a Paa lower-pathway enzyme and should be connected to phenylacetate catabolism.
    action: NEW
    reason: The gene name and UniProt product identify this as the PaaZ bifunctional enzyme used in the phenylacetate degradation pathway; this fills the missing process annotation while avoiding an invented exact hydrolase GO term.
    supported_by:
    - reference_id: file:PSEPK/paaZ/paaZ-uniprot.txt
      supporting_text: Name=paaZ
    - reference_id: file:PSEPK/paaZ/paaZ-uniprot.txt
      supporting_text: Oxepin-CoA hydrolase/3-oxo-5,6-dehydrosuberyl-CoA semialdehyde dehydrogenase
