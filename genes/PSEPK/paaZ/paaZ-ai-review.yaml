      3-oxo-5,6-dehydrosuberyl-CoA semialdehyde dehydrogenase.
    proposed_replacement_terms:
    - id: GO:0016620
      label: oxidoreductase activity, acting on the aldehyde or oxo group of donors, NAD or NADP as acceptor
