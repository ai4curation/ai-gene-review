id: Q88CF4
gene_symbol: lysA-II
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: >-
  lysA-II (PP_5227) encodes the PLP-dependent diaminopimelate decarboxylase
  (DAPDC; EC 4.1.1.20) that converts meso-2,6-diaminopimelate to L-lysine and
  carbon dioxide in the terminal reaction of the diaminopimelate pathway.
  KT2440 also encodes the closely related LysA-I protein, and the relative
  physiological contributions of the two paralogs are unresolved.
