id: Q88CF4
gene_symbol: lysA
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: lysA (PP_5227) encodes diaminopimelate decarboxylase (DAPDC, EC 4.1.1.20), a pyridoxal 5'-phosphate (PLP)-dependent enzyme that catalyzes the final step of L-lysine biosynthesis via the diaminopimelate (DAP) pathway, the decarboxylation of meso-2,6-diaminopimelate to L-lysine and CO2. The enzyme forms a homodimer and belongs to the Orn/Lys/Arg decarboxylase class-II (group IV / alanine racemase fold) family, with PLP attached as a Schiff base to an active-site lysine. As the committed terminal step of lysine biosynthesis, DAPDC supplies L-lysine for protein synthesis and, via the upstream DAP intermediate, links this pathway to peptidoglycan cross-bridge precursor metabolism in P. putida.
existing_annotations:
- term:
    id: GO:0003824
    label: catalytic activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: Root-level molecular function term assigned by InterPro2GO from generic decarboxylase signatures (IPR000183, IPR009006). It is correct but uninformative compared to the specific GO:0008836 (diaminopimelate decarboxylase activity) that is also annotated. Marking as over-annotated in favor of the precise EC 4.1.1.20 activity term.
    action: MARK_AS_OVER_ANNOTATED
- term:
    id: GO:0008836
    label: diaminopimelate decarboxylase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: Core molecular function. This is the EC 4.1.1.20 activity (meso-2,6-diaminopimelate -> L-lysine + CO2, RHEA:15101) matching the UniProt RecName, HAMAP-Rule MF_02120 (LysA), TIGR01048 (lysA), and the DAP decarboxylase subfamily assignment (IPR002986). Strongly supported despite IEA evidence.
    action: ACCEPT
- term:
    id: GO:0030170
    label: pyridoxal phosphate binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000104
  qualifier: enables
  review:
    summary: Supporting molecular function. DAPDC is a PLP-dependent decarboxylase; the UniProt cofactor annotation lists pyridoxal 5'-phosphate, and a Schiff-base lysine (MOD_RES at position 60) plus multiple PLP-binding residues are documented. Accept.
    action: ACCEPT
- term:
    id: GO:0009085
    label: L-lysine biosynthetic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: involved_in
  review:
    summary: Proposed new biological-process annotation. The current GOA lacks a BP term for lysA, but DAPDC catalyzes the committed terminal step (meso-DAP -> L-lysine) of the diaminopimelate route of lysine biosynthesis (UniProt PATHWAY). This BP is well supported by the EC 4.1.1.20 activity and the LysA family assignment and should be added. (The more specific term for the diaminopimelate route, GO:0009089, is obsolete.)
    action: NEW
