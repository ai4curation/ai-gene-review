  - statement: >-
      No direct Q88CF4 characterization was found, so target-specific kinetics,
      regulation, structure, essentiality, and relative flux versus Q88L58
      remain unverified.
    supporting_text: >-
      No direct experimental characterization of the Q88CF4 protein.
  - statement: >-
