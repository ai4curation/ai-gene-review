  qualifier: enables
  review:
    summary: Broad lyase activity is directionally correct but too general for this alginate lyase-domain protein.
    action: MODIFY
    reason: >-
      The InterPro/Pfam mapping supports an alginate lyase-domain protein, so
      poly(beta-D-mannuronate) lyase activity is the more informative
      molecular-function term than generic lyase activity.
    proposed_replacement_terms:
    - id: GO:0045135
