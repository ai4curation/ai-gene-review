  qualifier: involved_in
  review:
    summary: PP_1754 is a predicted alginate lyase-domain protein and should be connected to alginate breakdown or processing.
    action: NEW
    reason: >-
      The PF05426/IPR008397 alginate lyase-domain assignment supports an
      alginate-polymer cleavage role. The evidence is domain-based, so this is a
      candidate process annotation rather than a KT2440 experimentally proven
      catabolic role.
