  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: >-
  PP_1754 encodes a signal-peptide-bearing alginate lyase-domain protein in
  Pseudomonas putida KT2440. Its PF05426/IPR008397 alginate lyase-domain
  profile supports a periplasmic alginate/poly(beta-D-mannuronate) lyase
  candidate assignment, although direct KT2440 biochemical evidence was not
  recovered in this first pass.
