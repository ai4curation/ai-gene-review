description: urtD encodes an ATP-binding energy-coupling subunit of the PP_4841-PP_4845
  UrtABCDE urea ABC uptake system. The protein is an ABC transporter ATP-binding component
  with a UrtD-specific domain, supporting ATP hydrolysis coupled to urea import by
  the complex.
