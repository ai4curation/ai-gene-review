  original_reference_id: GO_REF:0000118
  qualifier: located_in
  review:
    summary: >-
      A cytosolic location is consistent with a soluble bacterial FolD enzyme
      lacking export or membrane-targeting features.
    action: ACCEPT
    reason: >-
      The localization is computational rather than experimentally measured in
      KT2440, but it is biologically appropriate and is the least redundant of
      the two existing compartment annotations.
    supported_by:
    - reference_id: file:PSEPK/folD2/folD2-uniprot.txt
