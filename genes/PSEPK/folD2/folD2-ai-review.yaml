    label: tetrahydrofolate interconversion
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: involved_in
  review:
    summary: >-
      The two FolD2 reactions directly interconvert methylene-, methenyl-, and
      10-formyl-THF carrier states.
    action: ACCEPT
    reason: >-
      This process term precisely describes the shared biochemical consequence
      of the accepted dehydrogenase and cyclohydrolase activities without
      importing downstream consumers.
    supported_by:
