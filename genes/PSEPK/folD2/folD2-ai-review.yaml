    label: oxidoreductase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000117
  qualifier: enables
  review:
    summary: >-
      FolD2 is an oxidoreductase, but this class term omits its folate substrate
      and NADP+ specificity.
    action: KEEP_AS_NON_CORE
    reason: >-
      GO:0016491 is correct but broad; GO:0004488 is the informative child term,
      so the parent is retained without treating it as a core function.
    supported_by:
    - reference_id: file:PSEPK/folD2/folD2-uniprot.txt
