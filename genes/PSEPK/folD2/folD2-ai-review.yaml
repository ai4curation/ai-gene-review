- id: file:PSEPK/folD2/folD2-deep-research-openscientist.md
  title: OpenScientist gene research for KT2440 folD2 (Q88KM5)
  findings:
  - statement: >-
      The report recovers the target UniProt/HAMAP assignment of both
      NADP-linked FolD activities and explicitly notes that no KT2440-specific
      biochemical or knockout study was found and paralog division of labor is
      unresolved.
  reference_review:
    relevance: MEDIUM
    correctness: UNVERIFIED
    review_notes: >-
      The catalytic-role summary is consistent with independently checked
      Q88KM5 evidence. Unsaved pairwise identities, exact residue mapping, the
      proposed FolD2 housekeeping hierarchy, and E. coli essentiality transfer
      are not treated as target-level evidence in this review.
- id: file:projects/P_PUTIDA/deep-research/PSEPK__folate_one_carbon_interconversion__ppu00670-deep-research-openscientist.md
  title: OpenScientist pathway research for KT2440 folate one-carbon interconversion
  reference_review:
    relevance: HIGH
    correctness: UNVERIFIED
    review_notes: >-
      The final max3 report maps both KT2440 FolD proteins to both core
      reactions and acknowledges that the assignment is homology-based. Its
      redundancy, genome-neighborhood, and broad candidate-inventory claims do
      not establish expression, essentiality, or paralog dominance.
  findings:
  - statement: >-
      The final report maps Q88KM5 and Q88LI7 to both FolD core operations,
      explicitly frames the in-target evidence as homology/domain based rather
      than direct KT2440 enzymology, and leaves expression and dominance for
      future study.
core_functions:
- description: >-
