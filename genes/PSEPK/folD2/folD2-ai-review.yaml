    5,10-methenyl-THF and NADPH (EC 1.5.1.5; RHEA:22812), one of its two
    independently modeled catalytic activities.
  supported_by:
  - reference_id: file:PSEPK/folD2/folD2-uniprot.txt
    supporting_text: "Xref=Rhea:RHEA:22812"
