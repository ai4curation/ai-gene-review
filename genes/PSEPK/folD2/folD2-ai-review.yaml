id: Q88KM5
gene_symbol: folD2
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: >-
  folD2 encodes one of two soluble bifunctional FolD enzymes in Pseudomonas
  putida KT2440. It catalyzes NADP+-linked oxidation of
  5,10-methylene-THF to 5,10-methenyl-THF and hydrolysis of
  5,10-methenyl-THF to 10-formyl-THF. FolD2 and FolD1 have the same predicted
  catalytic repertoire, and their condition-specific physiological roles are
  unknown.
