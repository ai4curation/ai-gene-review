description: PP_2775 encodes a signal-peptide-bearing glycine betaine/L-proline ABC transporter periplasmic component. Its OpuAC/ABC glycine-betaine substrate-binding domain and adjacent opuA ATPase/permease fusion support a substrate-recognition role in a predicted glycine-betaine compatible-solute ABC importer.
