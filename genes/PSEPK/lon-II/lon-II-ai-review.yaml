description: lon-II encodes a second cytoplasmic Lon/ATP-dependent protease La homolog. Like lon-I, it contains AAA+ ATPase
  and Lon protease domains and is best curated as an ATP-dependent serine protease involved in protein quality control and
  stress-linked protein turnover.
