description: ctpL encodes a predicted membrane methyl-accepting chemotaxis protein in Pseudomonas
  putida KT2440. Unlike the other named receptors in this panel, the fetched first-pass evidence
  supports MCP-family receptor architecture and chemotaxis signaling but does not resolve
  a KT2440 ligand or signaling branch for CtpL.
