description: PP_1898 encodes a MotA/TolQ/ExbB proton-channel-family inner-membrane protein. By family, it is best treated
  as an ExbB/TolQ-like proton-conducting energy-coupling subunit rather than a substrate-specific transporter or protein-import
  factor.
