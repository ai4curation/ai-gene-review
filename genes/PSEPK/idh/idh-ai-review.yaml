description: Monomeric-type NADP-dependent isocitrate dehydrogenase of Pseudomonas putida KT2440. Idh catalyzes oxidative decarboxylation of D-threo-isocitrate to 2-oxoglutarate with reduction of NADP+ to NADPH, contributing to the isocitrate oxidation step of the tricarboxylic acid cycle. Together with icd, it supports the organism's NADP-only isocitrate dehydrogenase module; no NAD-dependent isocitrate dehydrogenase is evident in the pathway report.
