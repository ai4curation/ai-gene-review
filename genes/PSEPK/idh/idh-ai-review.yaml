    action: ACCEPT
    reason: UniProt annotates Q88FS1 as isocitrate dehydrogenase [NADP], EC 1.1.1.42, with the reaction D-threo-isocitrate + NADP(+) = 2-oxoglutarate + CO2 + NADPH. The PSEPK pathway report identifies idh and icd as the NADP-dependent isocitrate dehydrogenases covering TCA-cycle step 3.
    supported_by:
