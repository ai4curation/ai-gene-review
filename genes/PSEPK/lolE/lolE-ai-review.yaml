taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: lolE encodes the second multi-pass membrane permease component of the
  PP_2154-PP_2156 LolCDE lipoprotein-releasing ABC transporter. UniProt names the
  protein as a lipoprotein releasing-system permease, places it in the cell membrane,
  and assigns the LolC/E domain family.
