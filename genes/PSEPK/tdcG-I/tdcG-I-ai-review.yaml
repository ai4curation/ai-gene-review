  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: 'tdcG-I (PP_0297) encodes an iron-sulfur dependent L-serine dehydratase. The enzyme deaminates L-serine to pyruvate and ammonia, contributing to amino acid catabolism and providing pyruvate that can feed central carbon metabolism; it is not a core methionine-biosynthesis enzyme.'
