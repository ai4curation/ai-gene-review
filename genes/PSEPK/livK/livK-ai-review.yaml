  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: livK (PP_1141) encodes a signal-peptide-bearing periplasmic substrate-binding component of the PP_1137-PP_1141 LivFGMHK branched-chain amino-acid ABC uptake system. UniProt and PANTHER classify it as a leucine/branched-chain amino-acid binding protein, supporting substrate capture for leucine and related branched-chain amino acids before delivery to the LivH/LivM permease complex.
