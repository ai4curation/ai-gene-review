  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: PP_3186 encodes a TenA-family thiamine-salvage amino-pyrimidine hydrolase. The protein hydrolyzes the C5' aminomethyl substituent of aminopyrimidine thiamine compounds, feeding hydroxymethylpyrimidine salvage into thiamine diphosphate biosynthesis.
