  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: PP_4107 encodes a predicted LysR-family DNA-binding transcriptional activator in Pseudomonas
  putida KT2440. The product annotation (HTH-type transcriptional regulator TrpI (TrpBA operon transcriptional
  activator)) and conserved LysR HTH and substrate-binding domains support transcriptional activation,
  but the direct promoters, effector ligand, and pathway-specific regulon require gene-specific validation.
