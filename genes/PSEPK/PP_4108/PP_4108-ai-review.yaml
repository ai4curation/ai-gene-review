taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: PP_4108 encodes 2-aminoadipate transaminase (L-2AA aminotransferase; EC 2.6.1.39), a PLP-dependent class III aminotransferase in Pseudomonas putida KT2440. Experimental genetics and enzymology place it in the D-lysine/L-2-aminoadipate route, where it converts L-2-aminoadipate to 2-oxoadipate and also shows secondary 5-aminovalerate transaminase activity in vitro.
