description: >-
  pilF encodes a signal-peptide-bearing TPR-repeat type IV pilus biogenesis
  protein in Pseudomonas putida KT2440. Its Pilus_4_PilW and TPR-repeat
  features support an accessory/scaffold role in type IV pilus assembly or
  stability, but its exact molecular activity is unresolved.
