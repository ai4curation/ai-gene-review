id: A0A140FWF3
gene_symbol: peaA
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: >-
  peaA encodes a predicted exported quinohaemoprotein amine dehydrogenase alpha
  subunit in Pseudomonas putida KT2440. The protein has an N-terminal signal
  peptide, cytochrome c-like/heme-binding and quinohemoprotein amine
  dehydrogenase alpha-subunit domains, and an EC-derived methylamine
  dehydrogenase annotation. In this first pass it is treated as a candidate
  periplasmic multi-subunit amine dehydrogenase component, not as evidence for
  methane oxidation or methanogenesis.
existing_annotations:
- term:
    id: GO:0009055
    label: electron transfer activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: >-
      Electron transfer activity is consistent with a cytochrome/heme-containing
      quinohaemoprotein dehydrogenase subunit but is less informative than the
      methylamine dehydrogenase complex-level activity.
    action: KEEP_AS_NON_CORE
    reason: >-
      The InterPro-derived electron-transfer term captures the redox subunit
      class; it should be retained as ancillary context rather than treated as
      the core function.
    supported_by:
    - reference_id: file:PSEPK/peaA/peaA-goa.tsv
      supporting_text: "GO:0009055\telectron transfer activity"
    - reference_id: file:PSEPK/peaA/peaA-uniprot.txt
      supporting_text: "DE   SubName: Full=Quinohaemoprotein amine dehydrogenase, alpha subunit"
- term:
    id: GO:0020037
    label: heme binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: >-
      Heme binding is supported by the alpha-subunit heme-binding domain but is
      a cofactor feature, not the pathway-defining activity.
    action: KEEP_AS_NON_CORE
    reason: >-
      UniProt records a heme-binding alpha-subunit domain and GOA carries the
      InterPro-derived heme-binding term; the more informative functional call
      is the amine dehydrogenase activity.
    supported_by:
    - reference_id: file:PSEPK/peaA/peaA-goa.tsv
      supporting_text: "GO:0020037\theme binding"
    - reference_id: file:PSEPK/peaA/peaA-uniprot.txt
      supporting_text: "FT                   /note=\"Quinohemoprotein amine dehydrogenase alpha subunit"
- term:
    id: GO:0052876
    label: methylamine dehydrogenase (amicyanin) activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000003
  qualifier: enables
  review:
    summary: >-
      Accept the methylamine dehydrogenase activity as the best current
      functional annotation, interpreted as a contribution by the alpha subunit
      to a multi-subunit quinohaemoprotein amine dehydrogenase.
    action: ACCEPT
    reason: >-
      The UniProt product name, EC 1.4.9.1 assignment, and quinohemoprotein
      amine dehydrogenase alpha-subunit domains consistently support this
      complex-level activity. The first pass does not resolve the in vivo
      substrate range or partner subunits in KT2440.
    supported_by:
    - reference_id: file:PSEPK/peaA/peaA-goa.tsv
      supporting_text: "GO:0052876\tmethylamine dehydrogenase (amicyanin) activity"
    - reference_id: file:PSEPK/peaA/peaA-uniprot.txt
      supporting_text: "DE   SubName: Full=Quinohaemoprotein amine dehydrogenase, alpha subunit"
core_functions:
- description: >-
    Predicted alpha subunit contributing to a quinohaemoprotein amine
    dehydrogenase/methylamine dehydrogenase activity; exact physiological amine
    substrate and partner subunits remain unresolved in KT2440.
  contributes_to_molecular_function:
