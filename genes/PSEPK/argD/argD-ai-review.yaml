description: argD (PP_4481) encodes acetylornithine aminotransferase, the PLP-dependent transamination step of L-arginine
  biosynthesis. It converts N-acetyl-L-glutamate 5-semialdehyde to N-acetyl-L-ornithine and is included in this ppu00220 checkpoint
  as a UniPathway-supported module-gap gene.
