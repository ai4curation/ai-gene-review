- term:
    id: GO:0006526
    label: L-arginine biosynthetic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: involved_in
  review:
    summary: The biosynthetic process assignment overstates the physiological role of PP_4481.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      The protein may provide secondary ACOAT activity, but its AST-operon
      context and AstC-like subfamily support arginine catabolism as the core
      process. The distinct PP_0372 paralog is the stronger biosynthetic candidate.
    additional_reference_ids:
