  review:
    summary: PP_4481 should be annotated to the AstC/AruC succinylornithine-transaminase activity.
    action: NEW
    reason: >-
      The protein is embedded in the AST operon, belongs to the AstC-like
      PANTHER SF113 branch, and is a close ortholog of characterized
      Pseudomonas aeruginosa AruC. This is an orthology/context inference, not a
