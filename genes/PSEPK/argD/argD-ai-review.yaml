id: P59319
gene_symbol: argD
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: >-
  ArgD (PP_4481) is a pyridoxal-phosphate-dependent acyl-ornithine
  aminotransferase embedded in the KT2440 arginine succinyltransferase catabolic
  operon. Its primary predicted physiological function is
  N2-succinyl-L-ornithine transamination (EC 2.6.1.81) in arginine catabolism.
  Secondary acetylornithine and succinyldiaminopimelate activities remain
  plausible because this enzyme family is substrate-promiscuous.
existing_annotations:
- term:
    id: GO:0003992
    label: N2-acetyl-L-ornithine:2-oxoglutarate 5-transaminase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: P59319 is likely capable of acetylornithine transamination, but this is not its primary pathway role.
    action: KEEP_AS_NON_CORE
    reason: >-
      Reviewed UniProt assigns EC 2.6.1.11, but PP_4481 lies in the AST
      catabolic operon and PANTHER places it in AstC-like SF113. Related AstC
      enzymes can retain ACOAT activity through substrate promiscuity.
    additional_reference_ids:
    - PMID:31451546
    supported_by:
    - reference_id: file:PSEPK/argD/argD-uniprot.txt
      supporting_text: Full=Acetylornithine aminotransferase
