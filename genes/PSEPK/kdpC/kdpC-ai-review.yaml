  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: kdpC encodes the KdpC accessory subunit of the high-affinity ATP-driven Kdp potassium transport
  system in Pseudomonas putida KT2440. Reviewed UniProt/HAMAP annotation describes KdpC as an inner-membrane
  catalytic chaperone that increases the ATP-binding affinity of KdpB.
