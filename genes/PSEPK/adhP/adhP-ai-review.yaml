description: adhP (PP_3839) encodes a zinc-containing short-chain or medium-chain alcohol dehydrogenase family protein. The seeded EC/GO evidence supports NAD+-dependent alcohol dehydrogenase chemistry, with zinc binding as a conserved structural/catalytic feature. It is an alcohol-metabolism enzyme adjacent to central carbon but not a core ED/gluconeogenic step.
