    summary: ABC transporter complex membership is appropriate for this PhnD-like phosphonate-binding component.
    action: ACCEPT
    reason: The protein is named as a phosphonate transport system-binding protein and carries PhnD/phosphonate-binding InterPro domains, consistent with a solute-binding component of an ABC-type importer.
