  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: ptxB (PP_0824) encodes a predicted periplasmic solute-binding component of a phosphonate ABC import system. Its signal peptide and PhnD-like phosphonate-binding domain support a role in capturing extracellular or periplasmic phosphonate substrate for delivery to the PhnC/PtxC/PhnE transporter complex.
