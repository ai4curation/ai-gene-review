  original_reference_id: GO_REF:0000120
  qualifier: involved_in
  review:
    summary: FucD is a carbohydrate catabolic enzyme for L-fuconate.
    action: ACCEPT
    reason: The specific dehydration of L-fuconate supports a carbohydrate-catabolism process context.
    supported_by:
    - reference_id: file:PSEPK/fucD/fucD-uniprot.txt
      supporting_text: 'DR   GO; GO:0016052; P:carbohydrate catabolic process; IEA:InterPro.'
