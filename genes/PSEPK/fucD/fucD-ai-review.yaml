id: Q88J18
gene_symbol: fucD
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: >-
  FucD is a predicted L-fuconate dehydratase of Pseudomonas putida KT2440. It
  is an enolase-superfamily hydro-lyase that dehydrates L-fuconate to
  2-dehydro-3-deoxy-L-fuconate in a carbohydrate catabolic side branch of the
  broad KEGG fructose/mannose map.
existing_annotations:
- term:
    id: GO:0000287
    label: magnesium ion binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000118
  qualifier: enables
  review:
    summary: Magnesium binding is compatible with the enolase-superfamily L-fuconate dehydratase reaction.
    action: KEEP_AS_NON_CORE
    reason: The metal ion is a cofactor feature; the core functional term is L-fuconate dehydratase activity.
    supported_by:
    - reference_id: file:PSEPK/fucD/fucD-uniprot.txt
      supporting_text: 'CC       Name=Mg(2+); Xref=ChEBI:CHEBI:18420;'
