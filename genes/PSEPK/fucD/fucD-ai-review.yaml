      label: L-fuconate dehydratase activity
    supported_by:
    - reference_id: file:PSEPK/fucD/fucD-uniprot.txt
      supporting_text: 'DR   GO; GO:0050023; F:L-fuconate dehydratase activity; IEA:UniProtKB-EC.'
