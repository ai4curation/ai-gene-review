  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: CheB1 is the chemotaxis receptor-adaptation enzyme of the PP_4332-PP_4340 Che
  cluster in Pseudomonas putida KT2440. It is a CheB-family response-regulator hydrolase with
  an N-terminal receiver domain and a C-terminal catalytic methylesterase domain. CheA-dependent
  phosphorylation activates its methylesterase activity, allowing CheB1 to demethylate methyl-accepting
  chemotaxis proteins and to deamidate selected receptor glutamine residues, thereby tuning
  receptor sensitivity during chemotaxis.
