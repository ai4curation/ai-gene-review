suggested_questions:
- question: What physical or chemical inputs besides surface contact and tetracycline
    most directly trigger WspR phosphorylation or activation in KT2440?
- question: Does the EAL domain of KT2440 WspR retain any physiologically relevant
    phosphodiesterase or purely regulatory function in vivo?
- question: How is WspR coordinated with other KT2440 c-di-GMP enzymes such as DibA,
    PP_3242, and PP_3319 during environmental stress responses?
suggested_experiments:
- hypothesis: Surface growth and tetracycline stress activate WspR through distinct
    upstream signaling inputs but converge on elevated c-di-GMP output.
  description: Quantify WspR-dependent c-di-GMP changes in wild type, delta-wspR,
    and phospho-acceptor mutants during surface growth and sub-MIC tetracycline exposure
    using LC-MS and fluorescent c-di-GMP reporters.
  experiment_type: c-di-GMP signaling assay
- hypothesis: The GGDEF domain provides the dominant catalytic activity while the
    EAL/I-site region mainly tunes feedback inhibition rather than net phosphodiesterase
    output.
  description: Purify KT2440 WspR and targeted GGDEF, EAL, and I-site mutants to measure
    GTP-to-c-di-GMP synthesis, possible phosphodiesterase activity, and c-di-GMP-dependent
    feedback inhibition in vitro.
  experiment_type: biochemical enzymology
- hypothesis: WspR-driven c-di-GMP controls biofilm and motility by rewiring FleQ/FleN-dependent
    transcriptional programs.
  description: Compare transcriptomes and phenotypes of wild type, delta-wspR, and
    catalytic-dead wspR strains during biofilm growth, with parallel assays for biofilm
    biomass, swimming motility, and K1-T6SS output.
  experiment_type: genetics and transcriptomics
