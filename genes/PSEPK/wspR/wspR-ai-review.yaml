taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: WspR (PP_4959) is the diguanylate cyclase output of the seven-gene Wsp
  surface-sensing/signaling system in Pseudomonas putida KT2440. It is a soluble REC-PAS-GGDEF-EAL
  response regulator-like protein that raises intracellular cyclic di-GMP in response
  to upstream Wsp signaling, thereby promoting the switch from swimming/planktonic
  growth toward sessile biofilm formation. In KT2440, Wsp signaling also feeds into
  FleQ/FleN-dependent regulation of downstream lifestyle programs such as biofilm
  formation and repression of antibacterial K1-T6SS expression. Structural work on
  WspR orthologs further supports feedback inhibition by c-di-GMP binding at an inhibitory
  site and oligomerization-dependent control of catalytic output.
existing_annotations:
- term:
    id: GO:0003824
    label: catalytic activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000117
  review:
    summary: This ARBA annotation is directionally correct but far too generic. WspR
      is specifically the c-di-GMP-producing output enzyme of the Wsp pathway, not
      merely an unspecified catalyst.
    action: MODIFY
    reason: KT2440 studies and foundational WspR biochemistry identify this protein
      as a diguanylate cyclase. The specific child term is available and should replace
      the generic parent term.
    proposed_replacement_terms:
    - id: GO:0052621
      label: diguanylate cyclase activity
    supported_by:
    - reference_id: PMID:32519402
      supporting_text: '...the key components include WspR, a protein that harbours
        the domain for producing cdGMP...'
      reference_section_type: ABSTRACT
    - reference_id: file:PSEPK/wspR/wspR-notes.md
      supporting_text: Among them, the diguanylate cyclase WspR displayed the most
        significant effect on c-di-GMP level and biofilm formation.
      reference_section_type: LITERATURE_REVIEW
- term:
    id: GO:0000160
    label: phosphorelay signal transduction system
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: Acceptable. WspR is the terminal output component of the Wsp surface-sensing
      phosphorelay/signaling system and transduces that signal into elevated c-di-GMP.
    action: ACCEPT
    supported_by:
    - reference_id: PMID:32519402
      supporting_text: '...the role of a 7-gene operon homologous to the wsp cluster
        of Pseudomonas aeruginosa-which regulates cyclic di-GMP (cdGMP) levels upon
        surface contact-remained to be investigated.'
      reference_section_type: ABSTRACT
- term:
    id: GO:0006355
    label: regulation of DNA-templated transcription
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: Over-annotated. WspR does not appear to be a DNA-binding transcription
      regulator. Instead, it alters transcription indirectly through c-di-GMP signaling
      and the downstream FleQ/FleN regulatory system.
    action: MARK_AS_OVER_ANNOTATED
    supported_by:
    - reference_id: PMID:35178858
      supporting_text: Transcriptional regulator FleQ and ATPase FleN functioned as
        repressors in the Wsp system-modulated K1-T6SS transcription.
      reference_section_type: ABSTRACT
- term:
    id: GO:0005886
    label: plasma membrane
  evidence_type: IEA
  original_reference_id: GO_REF:0000044
  review:
    summary: Likely incorrect for WspR itself. The membrane-spanning elements belong
      to the upstream Wsp intermembrane complex, whereas WspR is a soluble multidomain
      output regulator with no obvious transmembrane segment.
    action: REMOVE
- term:
    id: GO:0052621
    label: diguanylate cyclase activity
  evidence_type: ISS
  original_reference_id: PMID:18366254
  review:
    summary: This is the correct specific molecular function for WspR. Multiple KT2440
      studies identify WspR as the diguanylate cyclase responsible for raising c-di-GMP
      downstream of Wsp signaling.
    action: NEW
    reason: The existing GOA set lacks the specific catalytic term. KT2440 studies
      place WspR as the Wsp pathway c-di-GMP-producing output protein, and biochemical
      work on WspR-family GGDEF proteins directly supports diguanylate cyclase activity.
    supported_by:
    - reference_id: file:PSEPK/wspR/wspR-notes.md
      supporting_text: Among them, the diguanylate cyclase WspR displayed the most
        significant effect on c-di-GMP level and biofilm formation.
      reference_section_type: LITERATURE_REVIEW
    - reference_id: PMID:18366254
      supporting_text: Here, we present the crystal structure of the diguanylate cyclase
        WspR, a conserved GGDEF domain-containing response regulator in Gram-negative
        bacteria...
      reference_section_type: ABSTRACT
    - reference_id: file:PSEPK/wspR/wspR-deep-research-falcon.md
      supporting_text: This places WspR as the output diguanylate cyclase of the
        Wsp system rather than as a DNA-binding regulator.
