references:
- id: GO_REF:0000002
  title: Gene Ontology annotation through association of InterPro records with GO
    terms
  findings:
  - statement: InterPro2GO supplies signaling/domain-based terms for the REC/GGDEF/EAL
      architecture of WspR.
  full_text_unavailable: false
- id: GO_REF:0000044
  title: Gene Ontology annotation based on UniProtKB/Swiss-Prot Subcellular Location
    vocabulary mapping, accompanied by conservative changes to GO terms applied by
    UniProt
  findings:
  - statement: UniProt subcellular-location mapping contributes an automated localization
      call that needs review because WspR itself is best interpreted as a cytoplasmic
      signaling enzyme.
  full_text_unavailable: false
- id: GO_REF:0000117
  title: Electronic Gene Ontology annotations created by ARBA machine learning models
  findings:
  - statement: ARBA supplies broad catalytic and regulatory terms for WspR that need
      refinement to the diguanylate cyclase output function.
  full_text_unavailable: false
- id: file:PSEPK/wspR/wspR-deep-research-falcon.md
  title: Research Report - wspR Gene Function in Pseudomonas putida KT2440
  findings:
  - statement: WspR is the output diguanylate cyclase of the Wsp signaling system
    supporting_text: This places WspR as the output diguanylate cyclase of the Wsp
      system rather than as a DNA-binding regulator.
- id: PMID:18366254
  title: Phosphorylation-independent regulation of the diguanylate cyclase WspR.
  full_text_unavailable: false
  findings:
  - statement: WspR is a GGDEF response regulator diguanylate cyclase with product
      feedback inhibition
    supporting_text: Here, we present the crystal structure of the diguanylate cyclase
      WspR, a conserved GGDEF domain-containing response regulator in Gram-negative
      bacteria, bound to c-di-GMP at an inhibitory site.
    reference_section_type: ABSTRACT
  - statement: WspR activity is modulated through oligomerization
    supporting_text: By switching from an active to a product-inhibited dimer via
      a tetrameric assembly, WspR utilizes a novel mechanism for modulation of its
      activity through oligomerization.
    reference_section_type: ABSTRACT
- id: PMID:32519402
  title: The Wsp intermembrane complex mediates metabolic control of the swim-attach
    decision of Pseudomonas putida.
  full_text_unavailable: false
  findings:
  - statement: The KT2440 Wsp operon controls c-di-GMP during the swim-to-attach transition
    supporting_text: '...a 7-gene operon homologous to the wsp cluster of Pseudomonas
      aeruginosa-which regulates cyclic di-GMP (cdGMP) levels upon surface contact...'
    reference_section_type: ABSTRACT
  - statement: WspR is the c-di-GMP-producing output of the Wsp system
    supporting_text: In P. putida, the key components include WspR, a protein that
      harbours the domain for producing cdGMP, and WspF, which controls its activity.
    reference_section_type: ABSTRACT
- id: PMID:35178858
  title: Wsp system oppositely modulates antibacterial activity and biofilm formation
    via FleQ-FleN complex in Pseudomonas putida.
  full_text_unavailable: false
  findings:
  - statement: Wsp signaling controls downstream programs through c-di-GMP
    supporting_text: '...the Wsp signal transduction system regulated K1-T6SS expression
      via synthesizing the second messenger cyclic di-GMP (c-di-GMP)...'
    reference_section_type: ABSTRACT
  - statement: Wsp signaling promotes biofilm formation via FleQ/FleN
    supporting_text: '...FleQ and FleN functioned as activators in biofilm formation,
      and Wsp system promoted biofilm formation largely in a FleQ/FleN-dependent manner.'
    reference_section_type: ABSTRACT
- id: PMID:39589111
  title: Tetracycline induces wsp operon expression to promote biofilm formation in
    Pseudomonas putida.
  full_text_unavailable: false
  findings:
  - statement: WspR is a major c-di-GMP enzyme controlling biofilm formation under
      tetracycline stress
    supporting_text: Among them, the diguanylate cyclase WspR displayed the most significant
      effect on c-di-GMP level and biofilm formation.
    reference_section_type: ABSTRACT
  - statement: The wsp operon is induced to raise c-di-GMP and promote biofilm formation
    supporting_text: '...tetracycline treatment at sub-minimal inhibitory concentrations
      could induce the expression of the Wsp system via the sigma factor RpoS in P.
      putida, resulting in elevated c-di-GMP levels, which leads to increased biofilm
      formation.'
    reference_section_type: ABSTRACT
