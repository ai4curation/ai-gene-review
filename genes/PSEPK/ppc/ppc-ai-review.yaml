suggested_questions:
- Has the allosteric regulation of P. putida KT2440 Ppc (e.g., activation by
    acetyl-CoA/fructose-1,6-bisphosphate, inhibition by aspartate/malate) been
    measured directly, or is it inferred from E. coli/C. glutamicum homologs?
suggested_experiments:
- Determine kinetic parameters (Km for PEP and bicarbonate, kcat) and Mg2+
    dependence of purified KT2440 Ppc, and test the effect of candidate effectors
    (acetyl-CoA, fructose-1,6-bisphosphate, aspartate, malate).
- Characterize a ppc deletion/overexpression strain for growth phenotypes and
    13C-fluxomics of anaplerotic OAA supply on different carbon sources.
