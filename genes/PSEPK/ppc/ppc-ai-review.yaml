gene_symbol: ppc
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: Phosphoenolpyruvate carboxylase (PEPC/PEPCase; EC 4.1.1.31), a soluble
  cytosolic enzyme of the PEPCase type 1 family. It catalyzes the essentially
  irreversible, Mg2+-dependent carboxylation of phosphoenolpyruvate (PEP) using
  bicarbonate (hydrogencarbonate) to form oxaloacetate (OAA) and inorganic
  phosphate. In bacterial central carbon metabolism PEPC functions as an
  anaplerotic enzyme that replenishes oxaloacetate at the PEP-pyruvate-oxaloacetate
  node, supplying the tricarboxylic acid cycle and biosynthetic precursor pools
  (e.g., the aspartate family of amino acids) when TCA intermediates are withdrawn.
  Bacterial PEPCs are typically homotetramers subject to allosteric regulation,
  commonly activated by acetyl-CoA and fructose-1,6-bisphosphate and inhibited by
  aspartate and malate, allowing anaplerotic OAA formation to be tuned to glycolytic
  and biosynthetic demand.
existing_annotations:
- term:
    id: GO:0000287
    label: magnesium ion binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000104
  qualifier: enables
  review:
    summary: PEPC requires Mg2+ as a catalytic cofactor; the UniProt record lists
      Mg(2+) as the cofactor (HAMAP MF_00595). Correct molecular function for this
      enzyme.
    action: ACCEPT
    reason: Mg2+ is the established divalent metal cofactor of PEPCase type 1 enzymes,
      consistent with the conserved active-site residues and the family assignment.
- term:
    id: GO:0005829
    label: cytosol
  evidence_type: IEA
  original_reference_id: GO_REF:0000118
  qualifier: located_in
  review:
    summary: PEPC is a soluble enzyme of central carbon metabolism with no membrane
      or signal/transit-peptide features; cytosolic localization is the expected and
      consistent assignment.
    action: ACCEPT
    reason: Consistent with the soluble enzyme class and TreeGrafter/PANTHER family
      inference; bacterial PEPC has no localization signals and acts in the cytoplasm.
- term:
    id: GO:0006099
    label: tricarboxylic acid cycle
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: involved_in
  review:
    summary: PEPC is an anaplerotic enzyme that replenishes oxaloacetate feeding the
      TCA cycle, but it is not itself a reaction of the TCA cycle. The PEP->OAA
      carboxylation is an anaplerotic/CO2-fixation step at the PEP-pyruvate-OAA node,
      not a cyclic TCA reaction. This InterPro2GO inference over-states the role.
    action: MARK_AS_OVER_ANNOTATED
    reason: PEPC supports TCA cycle function anaplerotically but does not participate
      in the cycle's reactions; the more precise process annotations (oxaloacetate
      metabolic process, carbon fixation) better capture the actual role.
- term:
    id: GO:0006107
    label: oxaloacetate metabolic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000104
  qualifier: involved_in
  review:
    summary: PEPC directly produces oxaloacetate from PEP, so participation in the
      oxaloacetate metabolic process is well supported and captures the core
      anaplerotic role.
    action: ACCEPT
    reason: The catalytic product is oxaloacetate; this is a direct and accurate
      process annotation for an anaplerotic PEPC.
- term:
    id: GO:0008964
    label: phosphoenolpyruvate carboxylase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: This is the defining molecular function of the gene product (EC 4.1.1.31,
      RHEA:28370). Supported by the HAMAP rule, conserved active-site residues
      (His137, His542 region), and PEPCase type 1 family membership.
    action: ACCEPT
    reason: Core catalytic activity of PEPC; carboxylation of PEP with bicarbonate to
      yield oxaloacetate and phosphate. Represents the primary function of the gene.
    supported_by:
    - reference_id: PMID:34849727
      supporting_text: PEPC catalyzes PEP + HCO3- -> oxaloacetate + Pi, an essentially
        irreversible anaplerotic carboxylation at the PEP-pyruvate-oxaloacetate node
        (deep research; ppc-deep-research-falcon.md).
- term:
    id: GO:0015977
    label: carbon fixation
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: involved_in
  review:
    summary: PEPC fixes inorganic carbon (bicarbonate) into an organic compound
      (oxaloacetate), the molecular event underlying anaplerotic CO2/bicarbonate
      assimilation. The UniProt keyword "Carbon dioxide fixation" applies. This is
      heterotrophic anaplerotic carbon fixation rather than autotrophic primary
      production, but the term is appropriate.
    action: ACCEPT
    reason: The carboxylation reaction incorporates inorganic bicarbonate carbon into
      central metabolism, an accurate (if broad) description of the process.
core_functions:
- description: Catalyzes the Mg2+-dependent, essentially irreversible carboxylation of
    phosphoenolpyruvate with bicarbonate to form oxaloacetate and inorganic phosphate,
    serving as an anaplerotic enzyme that replenishes the oxaloacetate pool of the TCA
    cycle and central biosynthesis at the PEP-pyruvate-oxaloacetate node.
  molecular_function:
    id: GO:0008964
    label: phosphoenolpyruvate carboxylase activity
  supported_by:
  - reference_id: GO_REF:0000120
    supporting_text: EC 4.1.1.31; RHEA:28370 oxaloacetate + phosphate =
      phosphoenolpyruvate + hydrogencarbonate; HAMAP MF_00595 PEPCase type 1.
  directly_involved_in:
  - id: GO:0006107
    label: oxaloacetate metabolic process
  - id: GO:0015977
    label: carbon fixation
