description: spuD (PP_5181) encodes a predicted periplasmic substrate-binding subunit of the PP_5177-PP_5181 Spu/Pot spermidine/putrescine
  ABC importer. UniProt places the protein in the periplasm and assigns spermidine/putrescine-binding protein-family features,
  supporting polyamine substrate recognition for the importer.
