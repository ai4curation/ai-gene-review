taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: PP_2942 encodes a CheY-like receiver-domain response regulator with an HD-GYP phosphodiesterase-like
  output domain in Pseudomonas putida KT2440. The architecture places it at the interface of two-component
  signaling and cyclic-di-GMP turnover, but its activating signal, partner proteins, and physiological
  substrate remain unresolved.
