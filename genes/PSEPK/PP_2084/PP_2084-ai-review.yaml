suggested_questions:
- question: Is PP_2084 primarily a metabolic class II aldolase in KT2440, or does it also regulate RNase E/G-family RNA turnover
    in vivo?
suggested_experiments:
- description: Combine affinity pulldown/RNA co-purification with PP_2084 deletion or depletion to identify RNA or RNase partners
    before assigning a specific RNA-processing pathway role.
  experiment_type: RNA/protein interaction and perturbation assay
