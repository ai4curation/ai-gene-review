existing_annotations:
- term:
    id: GO:0007155
    label: cell adhesion
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: involved_in
  review:
    summary: Type IV pili are adhesive surface filaments, and the major pilin PilA
      mediates attachment to surfaces and other cells. Cell adhesion is a genuine,
      if general, function of this protein.
    action: ACCEPT
    reason: Adhesion is a well-established function of type IV pili and of the major
      pilin subunit. The InterPro2GO inference from the Pilin domain (IPR001082) is
      biologically appropriate, and surface-attachment-induced pilin expression in
      P. putida supports an adhesion role. The term is general but not incorrect; a
      more specific adhesion-during-biofilm term could be considered if experimental
      evidence in KT2440 were available.
- term:
    id: GO:0009289
    label: pilus
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: located_in
  review:
    summary: PilA is the major structural subunit of a pilus, so the pilus localization
      is correct. However, PilA specifically forms a type IV pilus (N-methyl-phenylalanine
      pilin family), for which a more precise term exists.
    action: MODIFY
    reason: The generic "pilus" term is correct but under-specific. PilA belongs to
      the N-Me-Phe (type IVa) pilin family and assembles into a type IV pilus, so the
      more informative child term GO:0044096 (type IV pilus) better captures the localization.
    proposed_replacement_terms:
    - id: GO:0044096
      label: type IV pilus
- term:
    id: GO:0015627
    label: type II protein secretion system complex
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: part_of
  review:
    summary: This annotation derives from the InterPro pilin-domain mapping (IPR000983,
      GSPG_pilin), which is shared between type IV major pilins and the pseudopilins
      of the type II secretion system. PilA is a type IV pilin, not a T2SS pseudopilin,
      so it is not part of the type II secretion system complex.
    action: REMOVE
    reason: The T4P major pilin and T2SS major pseudopilin share an ancestral pilin
      fold and InterPro signature, which causes InterPro2GO to over-propagate T2SS
      terms onto type IV pilins. PilA (PP_0634) is the major pilin of the type IV pilus
      system; its structural component is the type IV pilus, not the T2SS complex.
      This is a domain-homology over-annotation and should be removed.
- term:
    id: GO:0015628
    label: protein secretion by the type II secretion system
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: involved_in
  review:
    summary: Same InterPro2GO artifact as the T2SS complex annotation. PilA is a type
      IV pilin and does not function in type II protein secretion.
    action: REMOVE
    reason: This BP term is inferred from the shared pilin/pseudopilin domain signature
      and does not reflect PilA's actual role. PilA builds the type IV pilus and participates
      in type IV pilus assembly and twitching motility, not type II secretion. Remove
      as a domain-homology over-annotation; the appropriate processes (type IV pilus
      assembly, type IV pilus-dependent motility) are proposed as new terms.
core_functions:
- description: Major structural subunit of the type IV pilus; PilA polymerizes to form
    the dynamic surface filament that constitutes the type IV pilus.
  supported_by:
  - reference_id: PMID:12534463
    supporting_text: KT2440 PilA (PP_0634) is annotated as the major type IV pilin
      and belongs to the N-Me-Phe (type IVa) pilin family; the major pilin is the
      small subunit that polymerizes to form the helical surface filament of the type
      IV pilus (applied by family/domain homology to KT2440 PilA Q88Q62).
  molecular_function:
    id: GO:0005198
    label: structural molecule activity
  locations:
  - id: GO:0044096
    label: type IV pilus
- description: Through assembly into the type IV pilus, PilA mediates surface adhesion,
    twitching motility, and biofilm/microcolony formation; pilin expression is induced
    upon surface attachment in P. putida.
  supported_by:
  - reference_id: PMID:11673428
    supporting_text: In P. putida, PilA was not detected in planktonic culture but
      was detected after surface attachment and throughout biofilm development, with
      pilus-related genes upregulated within hours of attachment (strain ATCC 39168).
  biological_process:
    id: GO:0043107
    label: type IV pilus-dependent motility
proposed_new_terms:
- term:
    id: GO:0044096
    label: type IV pilus
  reason: More specific cellular component for PilA than the current generic GO:0009289
    pilus; PilA is an N-Me-Phe (type IVa) pilin that assembles into a type IV pilus.
  proposed_replacement_for: GO:0009289
- term:
    id: GO:0043683
    label: type IV pilus assembly
  reason: PilA is the major subunit that is polymerized during type IV pilus assembly;
    this biological process is a core, mechanistically appropriate annotation supported
    by family membership and the presence of the KT2440 T4P biogenesis gene set (pilA/C/D,
    pilQ, pilT).
- term:
    id: GO:0043107
    label: type IV pilus-dependent motility
  reason: Type IV pili built from PilA mediate twitching motility; this is the canonical
    process for the major pilin. Annotation is by family/domain inference (no direct
    KT2440 deletion phenotype was found in the retrieved literature).
suggested_questions:
- Does PilA (PP_0634) deletion in KT2440 abolish twitching motility and reduce surface
    attachment/biofilm formation, as expected for a major type IV pilin?
- How is the KT2440 type IV pilus assembled given the reported absence of the canonical
    assembly ATPase PilB, and is xcpR (or another ATPase) functionally substituting?
suggested_experiments:
- Construct a markerless pilA (PP_0634) deletion in KT2440 and assay twitching motility
    (subsurface stab/agar interstitial assay), surface adhesion, and biofilm formation,
    with complementation to confirm specificity.
- Verify PilA maturation by detecting N-terminal N-methylation/leader cleavage (mass
    spectrometry on purified pili) and confirm surface pilus assembly by immuno-EM or
    pilus shearing/Western blot.
