id: Q88Q62
gene_symbol: pilA
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: PilA (PP_0634) is the major type IV pilin of Pseudomonas putida KT2440,
  the principal structural subunit that polymerizes into type IV pili (T4P) — dynamic,
  retractile filaments on the bacterial cell surface. It belongs to the N-methyl-phenylalanine
  (type IVa) pilin family, with a hydrophobic N-terminal alpha-helix (a predicted
  transmembrane segment) that mediates subunit packing within the filament core, and
  a globular C-terminal head bearing a conserved disulfide-bonded loop. Like other
  T4a pilins, it is synthesized as a prepilin whose leader peptide is cleaved and whose
  new N-terminal phenylalanine is N-methylated by the prepilin peptidase PilD before
  the mature subunit is stored in the inner membrane and assembled into the filament.
  Cycles of pilus extension and retraction allow the assembled type IV pilus to mediate
  surface adhesion, twitching motility, microcolony and biofilm formation, and, in
  many species, DNA uptake during natural transformation. In P. putida, pilin expression
  is induced upon surface attachment and biofilm growth, consistent with a role in
  surface colonization.
