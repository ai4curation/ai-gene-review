id: Q88LL8
gene_symbol: plsX
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: plsX encodes phosphate acyltransferase (EC 2.3.1.274), the PlsX enzyme that reversibly converts fatty acyl-ACP and phosphate to acyl-phosphate and holo-ACP. This cytoplasmic/membrane-associated enzyme supplies the acyl-phosphate donor used by PlsY for glycerol-3-phosphate acylation, linking fatty-acid synthesis to bacterial phospholipid precursor biosynthesis. UniProt/HAMAP indicates that PlsX uses acyl-ACP, not acyl-CoA, and may associate with the membrane through PlsY.
