id: Q88C68
gene_symbol: rubA
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: rubA encodes a small cytosolic iron-binding rubredoxin that functions as a one-electron-transfer protein, likely with the adjacent AlkT rubredoxin reductase; the physiological terminal acceptor in KT2440 is not established.
existing_annotations:
- term:
    id: GO:0005506
    label: iron ion binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: Iron ion binding is appropriate for the conserved nonheme iron center of rubredoxin.
    action: ACCEPT
    reason: UniProt records a Fe(3+) cofactor and binding sites for the conserved rubredoxin cysteines, and GOA carries the InterPro-supported iron ion binding annotation.
    supported_by:
    - reference_id: file:PSEPK/rubA/rubA-uniprot.txt
      supporting_text: "Name=Fe(3+); Xref=ChEBI:CHEBI:29034"
    - reference_id: file:PSEPK/rubA/rubA-uniprot.txt
      supporting_text: "Note=Binds 1 Fe(3+) ion per subunit"
    - reference_id: file:PSEPK/rubA/rubA-goa.tsv
      supporting_text: "GO:0005506\tiron ion binding"
- term:
    id: GO:0005737
    label: cytoplasm
  evidence_type: IEA
  original_reference_id: GO_REF:0000044
  qualifier: located_in
  review:
    summary: Cytoplasm is the correct localization for this soluble bacterial rubredoxin.
    action: ACCEPT
    reason: UniProt assigns Q88C68 to the cytoplasm and the short protein lacks membrane or secretion features in the fetched entry.
    supported_by:
    - reference_id: file:PSEPK/rubA/rubA-uniprot.txt
      supporting_text: "SUBCELLULAR LOCATION: Cytoplasm"
    - reference_id: file:PSEPK/rubA/rubA-goa.tsv
      supporting_text: "GO:0005737\tcytoplasm"
- term:
    id: GO:0009055
    label: electron transfer activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: Electron transfer activity is the core molecular function of RubA.
    action: ACCEPT
    reason: UniProt and PANTHER describe RubA/rubredoxins as electron-transfer proteins, and OpenScientist supports Q88C68 as a small cytosolic rubredoxin electron shuttle rather than a catalytic enzyme.
    supported_by:
    - reference_id: file:PSEPK/rubA/rubA-uniprot.txt
      supporting_text: "transfers electrons from NADH to rubredoxin reductase"
    - reference_id: file:PSEPK/rubA/rubA-uniprot.txt
      supporting_text: "DR   GO; GO:0009055; F:electron transfer activity"
    - reference_id: file:PSEPK/rubA/rubA-goa.tsv
      supporting_text: "GO:0009055\telectron transfer activity"
    - reference_id: file:PSEPK/rubA/rubA-deep-research-openscientist.md
      supporting_text: "RubA is **not a catalytic enzyme**"
- term:
    id: GO:0046872
    label: metal ion binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: Metal ion binding is correct but less informative than the iron ion binding annotation already present.
    action: MODIFY
    reason: Rubredoxin binds a single iron center; GO:0005506 captures the relevant metal more precisely than the generic metal ion binding parent term.
    proposed_replacement_terms:
    - id: GO:0005506
      label: iron ion binding
    supported_by:
    - reference_id: file:PSEPK/rubA/rubA-uniprot.txt
      supporting_text: "Name=Fe(3+); Xref=ChEBI:CHEBI:29034"
    - reference_id: file:PSEPK/rubA/rubA-goa.tsv
      supporting_text: "GO:0046872\tmetal ion binding"
- term:
    id: GO:0043448
    label: alkane catabolic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: involved_in
  review:
    summary: Alkane catabolism appears to be over-propagated from alkane-system rubredoxins and should not be treated as established for KT2440 RubA.
    action: MARK_AS_OVER_ANNOTATED
    reason: UniProt places RubA in a hydrocarbon hydroxylating system, but OpenScientist's KT2440-specific genome check reports no alkane 1-monooxygenase and no direct KT2440 evidence for alkane catabolism by PP_5315. The safer curation is electron transfer activity with unresolved terminal acceptor.
    supported_by:
    - reference_id: file:PSEPK/rubA/rubA-uniprot.txt
      supporting_text: "FUNCTION: Involved in the hydrocarbon hydroxylating system"
    - reference_id: file:PSEPK/rubA/rubA-uniprot.txt
      supporting_text: "PATHWAY: Hydrocarbon metabolism; alkane degradation"
    - reference_id: file:PSEPK/rubA/rubA-goa.tsv
      supporting_text: "GO:0043448\talkane catabolic process"
    - reference_id: file:PSEPK/rubA/rubA-deep-research-openscientist.md
      supporting_text: "KT2440 encodes **no alkane 1-monooxygenase (KO K00496)**"
    - reference_id: file:PSEPK/rubA/rubA-deep-research-openscientist.md
      supporting_text: "The identity of the physiological terminal acceptor in KT2440 has not been established experimentally"
