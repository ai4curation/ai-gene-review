taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: nikA (PP_3342) encodes the signal-peptide-bearing periplasmic substrate-binding component of a predicted NikABCDE nickel ABC importer. Its nickel/peptide-binding solute-binding-protein domains and local nikABCDE locus support nickel capture for delivery to the NikB/NikC permease and NikD/NikE ATPase components.
