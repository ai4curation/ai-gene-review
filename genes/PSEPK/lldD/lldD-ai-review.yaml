  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: lldD encodes a membrane-associated FMN-dependent L-lactate dehydrogenase. It oxidizes L-lactate in the lactate/pyruvate
  side branch and likely feeds respiratory electron transfer; the broad L-lactate dehydrogenase annotation is appropriate,
  while the NAD+-specific term is too specific for the FMN-dependent membrane enzyme context.
