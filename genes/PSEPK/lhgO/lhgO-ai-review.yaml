taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: lhgO encodes an FAD-dependent L-2-hydroxyglutarate oxidase/dehydrogenase-family enzyme in Pseudomonas putida KT2440. It participates in the CoA-independent glutarate catabolic branch associated with L-lysine degradation by converting L-2-hydroxyglutarate back to 2-oxoglutarate after glutarate hydroxylation by GlaH/CsiD.
