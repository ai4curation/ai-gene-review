id: Q88R44
gene_symbol: hisH
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: >-
  hisH encodes the class-I glutamine amidotransferase subunit of
  imidazole-glycerol-phosphate synthase (IGPS). HisH hydrolyzes L-glutamine and
  channels the resulting ammonia to the HisF cyclase subunit, which converts
  PRFAR to imidazole-glycerol phosphate and AICAR. The coupled HisF-HisH reaction
  is the fifth step of L-histidine biosynthesis. HisH is not a
  pentosyltransferase; that annotation reflects an overly broad InterPro2GO
  mapping of this amidotransferase family.
existing_annotations:
- term:
    id: GO:0000105
    label: L-histidine biosynthetic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: involved_in
  review:
    summary: HisH is an obligate component of the fifth histidine-biosynthesis reaction.
    action: ACCEPT
    reason: >-
      UniProt, UniPathway, and HisH-specific family assignments place the
      HisF-HisH IGPS reaction at step 5 of 9 in L-histidine biosynthesis.
- term:
    id: GO:0000107
    label: imidazoleglycerol-phosphate synthase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: HisH contributes the ammonia-generating subunit of IGPS activity.
    action: ACCEPT
    reason: >-
      GO:0000107 and RHEA:24793 describe the coupled HisF-HisH reaction. HisH
      supplies channelled ammonia while HisF performs the cyclization chemistry.
    supported_by:
    - reference_id: file:PSEPK/hisH/hisH-deep-research-openscientist.md
      supporting_text: >-
        is the glutamine-hydrolyzing (glutaminase) subunit of imidazole glycerol
        phosphate synthase
- term:
    id: GO:0004359
    label: glutaminase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: HisH catalyzes glutamine hydrolysis as its subunit-level activity.
    action: ACCEPT
    reason: >-
      The reviewed UniProt entry assigns EC 3.5.1.2 and RHEA:15889 and describes
      glutamine hydrolysis as the source of ammonia channelled to HisF.
    supported_by:
    - reference_id: file:PSEPK/hisH/hisH-deep-research-openscientist.md
      supporting_text: >-
        catalyzes the hydrolysis of L-glutamine to L-glutamate plus ammonia (EC
        3.5.1.2)
- term:
    id: GO:0005737
    label: cytoplasm
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: located_in
  review:
    summary: HisH is a soluble cytoplasmic biosynthetic enzyme.
    action: KEEP_AS_NON_CORE
    reason: >-
      The location is supported by UniProt but is contextual rather than the
      core biochemical role.
- term:
    id: GO:0016763
    label: pentosyltransferase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: HisH does not catalyze pentosyl-group transfer.
    action: REMOVE
    reason: >-
      The InterPro2GO assignment conflicts with the HisH-specific family,
      EC 3.5.1.2 glutaminase chemistry, and the composite IGPS reaction. HisH
      hydrolyzes glutamine to supply ammonia; no pentosyl donor or transfer
      reaction is involved.
