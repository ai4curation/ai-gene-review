references:
- id: file:PSEPK/groES/groES-deep-research-falcon.md
  title: Deep research report for groES (Q88N56 / PP_1360) in Pseudomonas putida KT2440
  findings:
  - statement: In KT2440, groES (PP_1360) lies immediately upstream of groEL (PP_1361)
      and both are induced together with rpoH under elevated pressure and aromatic-solvent
      stress, consistent with membership in the sigma-32/RpoH heat-shock regulon.
    reference_section_type: RESULTS
