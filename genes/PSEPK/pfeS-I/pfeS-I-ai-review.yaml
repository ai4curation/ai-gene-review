  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: pfeS-I encodes a predicted membrane sensory histidine kinase in Pseudomonas putida KT2440.
  Its HAMP, HisKA, and HATPase domains support a two-component sensor role, and its ppu02020 partition
  with the adjacent PfeR-like response regulator places it in an iron/siderophore uptake regulatory context.
