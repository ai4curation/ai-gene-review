description: ptxC (PP_0827) encodes a predicted PhnE/PtxC-family multi-pass permease component of an ABC-type phosphonate import system. Together with PhnC, PhnE, and the PtxB solute-binding protein, it forms the membrane transport machinery for organic phosphonate uptake.
