id: P0A130
gene_symbol: cpoB
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: >-
  cpoB encodes the periplasmic cell division coordinator CpoB, a TPR-repeat
  protein that coordinates peptidoglycan synthesis with outer-membrane
  constriction during Gram-negative bacterial cell division. In Pseudomonas
  putida KT2440 it sits next to Tol-Pal genes and fits the same
  envelope-constriction boundary, but it is best viewed as a periplasmic
  septation coordinator rather than a Tol-Pal core structural subunit.
