taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: SelD (PP_0823) is the bacterial selenophosphate synthase, annotated as selenide, water dikinase. It uses hydrogenselenide, ATP, and water to form selenophosphate, AMP, and phosphate in a Mg(2+)-dependent reaction. Selenophosphate is the activated selenium donor required by SelA for L-selenocysteinyl-tRNA(Sec) formation, placing SelD upstream in bacterial selenocysteine biosynthesis.
