suggested_questions:
- question: What selenium source and growth conditions induce selD and downstream selenoprotein synthesis in P. putida KT2440?
- question: Does SelD provide selenophosphate only for selenocysteinyl-tRNA(Sec), or are there additional selenium-containing metabolites in KT2440?
