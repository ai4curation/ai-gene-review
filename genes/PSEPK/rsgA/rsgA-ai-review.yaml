  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: rsgA encodes a circularly permuted GTPase that assists late maturation of the bacterial 30S ribosomal subunit, including release of RbfA from mature subunits. It appears in KEGG thiamine metabolism because of guanine nucleotide side chemistry, not because it is part of thiamine biosynthesis.
