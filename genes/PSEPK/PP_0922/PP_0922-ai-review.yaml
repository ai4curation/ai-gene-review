id: Q88PC8
gene_symbol: PP_0922
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: >-
  PP_0922 encodes a predicted acyl-carrier-protein phosphodiesterase (AcpH).
  Q88PC8 belongs to the conserved ACP_PD family, whose characterized members
  hydrolyze the phosphodiester bond linking 4'-phosphopantetheine to acyl
  carrier protein and thereby generate apo-ACP. This is an ACP
  de-modification or turnover reaction, not a step in de novo pantothenate or
  coenzyme A synthesis. The physiological role of the KT2440 protein has not
  been tested directly.
existing_annotations:
- term:
    id: GO:0006633
    label: fatty acid biosynthetic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: involved_in
  review:
    summary: Family activity connects Q88PC8 to ACP state, but direct participation in fatty acid synthesis is not established.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      The IEA is propagated from the ACP_PD family. AcpH removes the
      phosphopantetheine prosthetic group required for ACP function rather
      than catalyzing a fatty-acid biosynthetic reaction. Experimental work on
      the E. coli enzyme found the proposed regulatory role in fatty acid
      synthesis unlikely and left its physiological function unresolved.
      Without organism-specific evidence, the broad process annotation
      overstates what the molecular-function prediction establishes.
