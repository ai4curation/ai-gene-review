  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: ACP phosphodiesterase activity is the supported family-level function of Q88PC8.
    action: ACCEPT
    reason: >-
      Q88PC8 is a full-length member of the ACP_PD InterPro, Pfam, and PANTHER
      families. Characterized E. coli AcpH hydrolyzes the same
      phosphopantetheine-to-ACP linkage and its catalytic residues define this
      phosphodiesterase family. No direct assay of Q88PC8 was identified, so
      the assignment remains homology-based.
    supported_by:
