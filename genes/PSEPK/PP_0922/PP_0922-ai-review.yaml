references:
- id: GO_REF:0000120
  title: Combined Automated Annotation using Multiple IEA Methods
  findings: []
- id: PMID:2168383
  title: Isolation and properties of acyl carrier protein phosphodiesterase of Escherichia coli.
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified biochemical characterization of E. coli ACP
      phosphodiesterase. It establishes the reaction and cautions that the
      proposed role in fatty acid synthesis was unsupported; it does not assay
      Q88PC8.
  findings:
  - statement: >-
      ACP phosphodiesterase cleaves the phosphopantetheine residue from ACP,
      while its physiological role remained unresolved.
    supporting_text: "catalyzes the hydrolytic cleavage of the 4'-phosphopantetheine residue from ACP"
- id: PMID:17198382
  title: Acyl carrier protein phosphodiesterase (AcpH) of Escherichia coli is a non-canonical member of the HD phosphatase/phosphodiesterase family.
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified mechanistic characterization of recombinant E. coli
      AcpH and its conserved family; transfer to Q88PC8 is homology-based.
  findings:
  - statement: >-
      E. coli AcpH is a metal-dependent phosphodiesterase that hydrolyzes the
      phosphopantetheine linkage on ACP.
    supporting_text: "AcpH hydrolyzes the link between 4'-phosphopanthetheine and the serine-36 side chain of acyl carrier protein"
- id: PMID:16107329
  title: 'The enigmatic acyl carrier protein phosphodiesterase of Escherichia coli: genetic and enzymological characterization.'
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified genetic and biochemical identification of E. coli acpH.
      It supports ACP prosthetic-group turnover and carrier-protein substrate
      range but does not assay Q88PC8.
  findings:
  - statement: >-
      AcpH is dispensable for E. coli growth but is required for ACP
      prosthetic-group turnover and cleaves multiple acyl-ACP substrates.
    supporting_text: "required for turnover of the ACP prosthetic group in vivo"
- id: PMID:20064615
  title: Expression, purification and characterization of the acyl carrier protein phosphodiesterase from Pseudomonas Aeruginosa.
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified biochemical characterization of a close Pseudomonas
      AcpH ortholog. It supports the family reaction and carrier-protein
      substrate range but does not directly assay Q88PC8.
  findings:
  - statement: >-
      P. aeruginosa AcpH removes phosphopantetheine from FAS and polyketide-
      synthase carrier proteins, including acylated substrates.
    supporting_text: "PaAcpH exhibits preferred substrate specificity towards the ACPs from the fatty acid synthesis pathway"
