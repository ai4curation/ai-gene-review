suggested_questions:
- question: Which KT2440 carrier proteins are physiological substrates of PP_0922, and under what conditions is the enzyme active?
suggested_experiments:
- description: >-
    Purify Q88PC8 and test holo- and acylated AcpP and selected secondary-
    metabolism carrier proteins with Mn2+, then quantify apo/holo carrier-
    protein pools in a PP_0922 deletion across nutrient and stress conditions.
  experiment_type: biochemical and physiological analysis
