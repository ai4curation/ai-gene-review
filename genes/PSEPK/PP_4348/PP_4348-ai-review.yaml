  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: PP_4348 encodes a PLP-dependent cystathionine beta-lyase-family enzyme.
  It is the candidate second enzyme of the trans-sulfuration branch of L-methionine
  biosynthesis in KT2440, hydrolyzing cystathionine to L-homocysteine, pyruvate,
  and ammonium.
