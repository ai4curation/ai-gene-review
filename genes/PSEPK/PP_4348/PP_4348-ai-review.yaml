      supporting_text: "transsulfuration: metA metB metC"
- term:
    id: GO:0030170
    label: pyridoxal phosphate binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: Pyridoxal phosphate binding is a catalytic cofactor feature for PP_4348.
    action: KEEP_AS_NON_CORE
    reason: PLP binding supports the beta-lyase reaction but is secondary to the
      cystathionine-cleavage function.
    supported_by:
    - reference_id: file:PSEPK/PP_4348/PP_4348-uniprot.txt
      supporting_text: "Name=pyridoxal 5'-phosphate"
    - reference_id: file:PSEPK/PP_4348/PP_4348-goa.tsv
