    summary: Amino acid metabolic process is true but too broad for PP_4348.
    action: MARK_AS_OVER_ANNOTATED
    reason: The InterPro2GO parent term should not obscure the specific cystathionine
      beta-lyase/trans-sulfuration role supported by the local protein name and UniProt
      catalytic activity.
    supported_by:
