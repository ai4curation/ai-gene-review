  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: PP_0500 encodes a predicted dTDP-4-dehydrorhamnose reductase in Pseudomonas putida KT2440. It is one of two RmlD/RfbD-like paralogs that reduce the dTDP-4-dehydro-rhamnose intermediate to dTDP-L-rhamnose, a deoxy-sugar nucleotide precursor used in bacterial envelope glycans.
