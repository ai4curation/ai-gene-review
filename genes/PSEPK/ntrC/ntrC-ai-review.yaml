suggested_questions:
  - question: Which genes in the broader KT2440 nitrogen-limitation transcriptome are direct in vivo NtrC targets versus indirect downstream effects?
    experts:
      - Ana B. Hervas
      - Ignacio Canosa
      - Estrella Santero
  - question: How does NtrC coordinate with CbrB and other global regulators to couple nitrogen limitation to carbon catabolism, oxidative stress defense, and biofilm-associated phenotypes?
    experts:
      - Ignacio Canosa
      - Estrella Santero
      - Wonsuck Park
  - question: What determines whether NtrC acts as a sigma54-dependent activator or as a direct repressor at a given promoter in P. putida KT2440?
    experts:
      - Ana B. Hervas
      - Estrella Santero
suggested_experiments:
  - description: Map the direct NtrC regulon under nitrogen-replete and nitrogen-limited conditions using ChIP-seq or DAP-seq combined with RNA-seq.
    hypothesis: Many broader nitrogen-limitation transcript changes in KT2440 are indirect, while a smaller subset represent direct NtrC-bound promoters.
    experiment_type: ChIP-seq/RNA-seq
  - description: Mutate the identified NtrC binding sites in the glnK, codB, ureD, and gdhA promoters and quantify promoter activity with transcriptional reporters.
    hypothesis: Direct promoter occupancy by NtrC is required for both activation of nitrogen-scavenging genes and repression of gdhA.
    experiment_type: Promoter mutagenesis and reporter assays
  - description: Compare wild-type NtrC with receiver-domain phospho-defective and ATPase-dead AAA+ mutants to separate phosphorylation-dependent signaling from ATP-dependent transcription activation.
    hypothesis: ATP hydrolysis is essential for sigma54-dependent activation, whereas promoter repression may have distinct requirements for phosphorylation and oligomerization.
    experiment_type: Targeted mutagenesis and transcription assays
