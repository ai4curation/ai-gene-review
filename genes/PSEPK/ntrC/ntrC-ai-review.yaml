description: >-
  NtrC (UniProt Q88CY1; primary locus name glnG) is the cognate response regulator
  of the NtrB/NtrC two-component system and the master transcriptional regulator
  of nitrogen assimilation in Pseudomonas putida KT2440. It combines an N-terminal
  receiver domain, a central AAA+ ATPase/sigma54-interaction module, and a C-terminal
  DNA-binding domain to control sigma54-dependent promoters used during nitrogen
  limitation. Experimental work in KT2440 shows that NtrC directly activates glnK
  and additional nitrogen-scavenging genes such as codB and ureD, while it can also
  directly repress selected targets such as gdhA under nitrogen-limiting conditions.
  Transcriptome studies place NtrC at the top of a broader nitrogen-responsive network
  that coordinates nitrogen source utilization with wider metabolic adjustments.
