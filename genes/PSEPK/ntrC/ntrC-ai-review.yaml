existing_annotations:
  - term:
      id: GO:0000156
      label: phosphorelay response regulator activity
    evidence_type: IEA
    original_reference_id: GO_REF:0000120
    review:
      summary: >-
        This is a core molecular function. NtrC is the response regulator partner
        of the NtrB/NtrC two-component system and uses its receiver domain to couple
        nitrogen status sensing to transcriptional control.
      action: ACCEPT
      reason: >-
        The response regulator role is central to NtrC biology and directly explains
        how the protein connects upstream nitrogen sensing with downstream gene regulation.
  - term:
      id: GO:0000160
      label: phosphorelay signal transduction system
    evidence_type: IEA
    original_reference_id: GO_REF:0000120
    review:
      summary: >-
        This process annotation is appropriate. NtrC operates within the NtrB/NtrC
        phosphorelay to convert nitrogen limitation signals into altered transcriptional
        output.
      action: ACCEPT
      reason: >-
        NtrC is not an isolated DNA-binding protein; it functions as the downstream
        regulator in a classical bacterial phosphorelay.
  - term:
      id: GO:0003677
      label: DNA binding
    evidence_type: IEA
    original_reference_id: GO_REF:0000120
    review:
      summary: >-
        NtrC certainly binds DNA, but this parent term adds little once the more
        informative annotations for transcription cis-regulatory region binding,
        sequence-specific DNA binding, and activator/repressor activity are retained.
      action: MARK_AS_OVER_ANNOTATED
      reason: >-
        The annotation is correct but too generic for a well-characterized bacterial
        transcription regulator with more specific child terms already present.
  - term:
      id: GO:0005524
      label: ATP binding
    evidence_type: IEA
    original_reference_id: GO_REF:0000002
    review:
      summary: >-
        This is appropriate for NtrC. The central AAA+ sigma54-interaction module
        binds ATP and uses nucleotide-dependent conformational changes to promote
        open-complex formation at sigma54-dependent promoters.
      action: ACCEPT
      reason: >-
        ATP binding is a core mechanistic requirement for enhancer-binding proteins
        such as NtrC, even though the GOA entry stops short of naming ATPase activity.
  - term:
      id: GO:0005737
      label: cytoplasm
    evidence_type: IEA
    original_reference_id: GO_REF:0000044
    review:
      summary: >-
        This localization is appropriate for a soluble bacterial response regulator
        that interacts with chromosomal promoter regions from the cytoplasmic side.
      action: ACCEPT
      reason: >-
        NtrC lacks membrane-targeting features and performs its signaling and DNA-binding
        functions in the bacterial cytoplasm/nucleoid.
  - term:
      id: GO:0006355
      label: regulation of DNA-templated transcription
    evidence_type: IEA
    original_reference_id: GO_REF:0000002
    review:
      summary: >-
        The overall concept is right, but the term is overly broad for NtrC. In
        P. putida KT2440, NtrC directly activates some promoters and directly represses
        others, so the specific positive and negative regulation terms are more informative.
      action: MODIFY
      reason: >-
        A generic transcription-regulation term obscures the experimentally demonstrated
        dual activator/repressor behavior of NtrC.
      proposed_replacement_terms:
        - id: GO:0045893
          label: positive regulation of DNA-templated transcription
        - id: GO:0045892
          label: negative regulation of DNA-templated transcription
  - term:
      id: GO:0006808
      label: regulation of nitrogen utilization
    evidence_type: IEA
    original_reference_id: GO_REF:0000120
    review:
      summary: >-
        This is one of the best high-level process annotations for NtrC. The KT2440
        literature defines NtrC as the master regulator of nitrogen assimilation and
        nitrogen-responsive gene expression.
      action: ACCEPT
      reason: >-
        Coordinating nitrogen source uptake and assimilation is the primary biological
        role of NtrC in this organism.
  - term:
      id: GO:0043565
      label: sequence-specific DNA binding
    evidence_type: IEA
    original_reference_id: GO_REF:0000002
    review:
      summary: >-
        This is appropriate and more informative than generic DNA binding. NtrC binds
        defined upstream regulatory sequences in promoters such as glnK and gdhA.
      action: ACCEPT
      reason: >-
        Sequence-specific promoter recognition is fundamental to the direct-regulator
        role of NtrC.
  - term:
      id: GO:0045893
      label: positive regulation of DNA-templated transcription
    evidence_type: IEA
    original_reference_id: GO_REF:0000108
    review:
      summary: >-
        This positive-regulation annotation is well supported by direct activation
        of sigma54-dependent nitrogen-responsive promoters, including glnK and other
        nitrogen-scavenging genes characterized in KT2440.
      action: ACCEPT
      reason: >-
        Positive transcriptional control is a core NtrC function and should be retained
        explicitly.
  - term:
      id: GO:0000976
      label: transcription cis-regulatory region binding
    evidence_type: IPI
    original_reference_id: PMID:19648236
    review:
      summary: >-
        This experimental annotation is appropriate. Footprinting and promoter analyses
        in the 2009 KT2440 study directly support NtrC binding upstream regulatory
        regions of nitrogen-responsive genes.
      action: ACCEPT
      reason: >-
        Direct promoter binding is a core, experimentally demonstrated property of
        NtrC in this organism.
  - term:
      id: GO:0000976
      label: transcription cis-regulatory region binding
    evidence_type: IPI
    original_reference_id: PMID:20735780
    review:
      summary: >-
        This annotation is also appropriate. The gdhA repression study showed direct
        NtrC interaction with multiple sites in the target promoter region.
      action: ACCEPT
      reason: >-
        The 2010 work provides independent promoter-binding evidence in a repressor
        context.
  - term:
      id: GO:0000976
      label: transcription cis-regulatory region binding
    evidence_type: IMP
    original_reference_id: PMID:20735780
    review:
      summary: >-
        This term remains appropriate with mutant/functional evidence from the gdhA
        repression study supporting promoter-region engagement by NtrC.
      action: ACCEPT
      reason: >-
        The biological effect depends on direct interaction with cis-regulatory DNA.
  - term:
      id: GO:0001216
      label: DNA-binding transcription activator activity
    evidence_type: IPI
    original_reference_id: PMID:19648236
    review:
      summary: >-
        This is a core molecular function. In vitro transcription and promoter studies
        show that NtrC directly activates sigma54-dependent genes involved in nitrogen
        assimilation.
      action: ACCEPT
      reason: >-
        Direct transcriptional activation of nitrogen-regulated promoters is one of
        the defining activities of NtrC.
  - term:
      id: GO:0001217
      label: DNA-binding transcription repressor activity
    evidence_type: IPI
    original_reference_id: PMID:20735780
    review:
      summary: >-
        This annotation is supported by direct repression of gdhA under nitrogen-limiting
        conditions. The KT2440 data show that NtrC can operate as a repressor as well
        as an activator.
      action: ACCEPT
      reason: >-
        Retaining the repressor term captures an experimentally demonstrated aspect
        of NtrC function that would otherwise be lost.
  - term:
      id: GO:0001217
      label: DNA-binding transcription repressor activity
    evidence_type: IMP
    original_reference_id: PMID:20735780
    review:
      summary: >-
        The phenotype-level and mechanistic evidence from the gdhA study supports
        NtrC-mediated transcriptional repression in vivo and in vitro.
      action: ACCEPT
      reason: >-
        NtrC is not solely an activator in KT2440; repressor activity is directly
        supported and biologically meaningful.
  - term:
      id: GO:0032993
      label: protein-DNA complex
    evidence_type: IPI
    original_reference_id: PMID:19648236
    review:
      summary: >-
        This annotation is accurate for the bound state of NtrC at target promoters,
        but it is a generic consequence of site-specific DNA binding rather than a
        particularly informative core localization.
      action: KEEP_AS_NON_CORE
      reason: >-
        The term is not wrong, but it adds less biological specificity than the direct
        DNA-binding and transcription-regulation annotations.
  - term:
      id: GO:0032993
      label: protein-DNA complex
    evidence_type: IPI
    original_reference_id: PMID:20735780
    review:
      summary: >-
        This is likewise an accurate bound-state annotation for promoter-associated
        NtrC complexes formed during repression of gdhA.
      action: KEEP_AS_NON_CORE
      reason: >-
        Useful as contextual cellular-component information, but not a principal
        core function term.
  - term:
      id: GO:0032993
      label: protein-DNA complex
    evidence_type: IMP
    original_reference_id: PMID:20735780
    review:
      summary: >-
        The annotation is acceptable but generic, reflecting promoter-bound complexes
        rather than a uniquely defining component annotation.
      action: KEEP_AS_NON_CORE
      reason: >-
        Better retained as non-core context than treated as a primary function.
  - term:
      id: GO:0045892
      label: negative regulation of DNA-templated transcription
    evidence_type: IDA
    original_reference_id: PMID:20735780
    review:
      summary: >-
        This term is directly supported by the gdhA study and should be retained.
        NtrC represses gdhA under nitrogen limitation through direct promoter binding.
      action: ACCEPT
      reason: >-
        Negative transcriptional regulation is an experimentally established component
        of the KT2440 NtrC regulon.
