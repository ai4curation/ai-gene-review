  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: PP_1875 encodes a membrane-associated hybrid sensor histidine kinase in Pseudomonas putida KT2440.
  HisKA/HATPase catalytic domains and a CheY-like receiver domain support a two-component phosphorelay role, while
  the input cue and downstream response regulator remain unresolved.
