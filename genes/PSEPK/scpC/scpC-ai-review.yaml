suggested_questions:
- question: >-
    Does purified P. putida KT2440 ScpC prefer succinyl-CoA:acetate transfer,
    propionyl-CoA:succinate transfer, or another short-chain acyl-CoA/carboxylate
    substrate pair?
suggested_experiments:
- description: >-
    Purify recombinant PP_0154 and measure CoA-transfer kinetics across
    acetyl-, propionyl-, and succinyl-CoA donors with acetate, propionate, and
    succinate acceptors, including a Glu288 active-site mutant as a negative
    control.
