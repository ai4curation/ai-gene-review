id: Q88RH5
gene_symbol: scpC
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: >-
  scpC (PP_0154) encodes a soluble class-I CoA-transferase of the
  acetyl-CoA hydrolase/transferase family. The protein has the conserved
  acetyl-CoA hydrolase/transferase N- and C-terminal domains, a catalytic
  glutamate annotated as a glutamyl-CoA intermediate site, and CoA-binding
  residues, supporting an active short-chain acyl-CoA:carboxylate
  CoA-transferase. Its exact physiological substrate pair in Pseudomonas putida
  KT2440 is not experimentally established; database and family evidence favor
  a succinate/succinyl-CoA-linked transferase, plausibly an AarC-like
  succinyl-CoA:acetate CoA-transferase rather than a canonical cyclic TCA
  enzyme.
existing_annotations:
- term:
    id: GO:0003986
    label: acetyl-CoA hydrolase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000118
  qualifier: enables
  review:
    summary: >-
      This hydrolase activity is not supported as the core activity. The protein
      belongs to the acetyl-CoA hydrolase/transferase fold, but the more
      specific and better-supported function is CoA transfer, not hydrolysis of
      acetyl-CoA.
    action: REMOVE
    reason: >-
      TreeGrafter appears to have propagated the broad family hydrolase label.
      UniProt/InterPro also identify a succinate CoA-transferase family
      signature, and OpenScientist found a complete class-I CoA-transferase
      active site with unresolved short-chain substrate specificity rather than
      evidence for an acetyl-CoA hydrolase reaction.
    supported_by:
    - reference_id: file:PSEPK/scpC/scpC-uniprot.txt
      supporting_text: 'SIMILARITY: Belongs to the acetyl-CoA hydrolase/transferase family.'
    - reference_id: file:PSEPK/scpC/scpC-uniprot.txt
      supporting_text: InterPro; IPR017821; Succinate_CoA_transferase.
    - reference_id: file:PSEPK/scpC/scpC-deep-research-openscientist.md
      supporting_text: No primary biochemistry exists for Q88RH5 itself.
- term:
    id: GO:0006083
    label: acetate metabolic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: involved_in
  review:
    summary: >-
      Acetate metabolism is plausible but should be kept as non-core until the
      P. putida enzyme's substrate pair is measured directly.
    action: KEEP_AS_NON_CORE
    reason: >-
      The best current inference favors an AarC-like succinyl-CoA:acetate
      CoA-transferase role, but the OpenScientist report notes that database
      annotations disagree between propionyl-CoA:succinate and
      succinyl-CoA:acetate transfer. This broad process term is therefore useful
      pathway context, not a definitive core process claim.
    supported_by:
    - reference_id: file:PSEPK/scpC/scpC-goa.tsv
      supporting_text: "GO:0006083\tacetate metabolic process"
    - reference_id: file:PSEPK/scpC/scpC-deep-research-openscientist.md
      supporting_text: the identity of the second partner (propionyl‑CoA vs acetate) is unresolved
- term:
    id: GO:0006084
    label: acetyl-CoA metabolic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: involved_in
  review:
    summary: >-
      Broad acetyl-CoA metabolic process context is consistent with an
      acyl-CoA/carboxylate CoA-transferase, but is not the most informative
      representation of the gene's function.
    action: KEEP_AS_NON_CORE
    reason: >-
      The enzyme is predicted to act on short-chain acyl-CoA pools and may
      produce or consume acetyl-CoA depending on the physiological substrate
      pair. The specific molecular function annotation is preferred as the core
      function.
    supported_by:
    - reference_id: file:PSEPK/scpC/scpC-goa.tsv
      supporting_text: "GO:0006084\tacetyl-CoA metabolic process"
    - reference_id: file:PSEPK/scpC/scpC-uniprot.txt
      supporting_text: 'SubName: Full=Propionyl-CoA:succinate CoA transferase'
- term:
    id: GO:0008410
    label: CoA-transferase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: >-
      Correct broad molecular-function parent for this class-I CoA-transferase.
    action: KEEP_AS_NON_CORE
    reason: >-
      CoA-transferase activity captures the enzyme class, but GO:0008775 acetate
      CoA-transferase activity is more informative for the current best
      functional assignment.
    supported_by:
    - reference_id: file:PSEPK/scpC/scpC-goa.tsv
      supporting_text: "GO:0008410\tCoA-transferase activity"
    - reference_id: file:PSEPK/scpC/scpC-uniprot.txt
      supporting_text: 'SIMILARITY: Belongs to the acetyl-CoA hydrolase/transferase family.'
- term:
    id: GO:0008775
    label: acetate CoA-transferase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: >-
      Best available molecular-function assignment for PP_0154, with the caveat
      that the exact substrate pair has not been directly tested in P. putida.
    action: ACCEPT
    reason: >-
      UniProt/GOA and InterPro support an acetate CoA-transferase annotation,
      and the OpenScientist report found that sequence, orthology, genomic
      context, and absence of an E. coli-like Sbm pathway collectively favor an
      AarC-like succinyl-CoA:acetate CoA-transferase role. The assignment should
      remain conservative because no P. putida enzyme kinetics are available.
    supported_by:
    - reference_id: file:PSEPK/scpC/scpC-goa.tsv
      supporting_text: "GO:0008775\tacetate CoA-transferase activity"
    - reference_id: file:PSEPK/scpC/scpC-deep-research-openscientist.md
      supporting_text: Sequence evidence (this work).
    - reference_id: file:PSEPK/scpC/scpC-deep-research-openscientist.md
      supporting_text: collectively favouring a **succinyl‑CoA:acetate CoA‑transferase (AarC‑type, EC 2.8.3.18)** role
- term:
    id: GO:0016740
    label: transferase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: >-
      Correct but too broad; this parent term adds no useful information beyond
      the specific CoA-transferase annotation.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      Transferase activity is a high-level parent of CoA-transferase functions.
      The specific GO:0008775 annotation and the broader but still informative
      GO:0008410 CoA-transferase annotation should carry the molecular-function
      interpretation instead.
    supported_by:
    - reference_id: file:PSEPK/scpC/scpC-goa.tsv
      supporting_text: "GO:0016740\ttransferase activity"
