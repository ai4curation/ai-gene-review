  review:
    summary: NusA is a transcription regulator, but generic DNA-binding transcription factor activity is not the
      best molecular-function description.
    action: MODIFY
    reason: NusA binds RNA polymerase and nascent RNA during elongation; transcription regulator activity is a better
      abstraction than DNA-binding transcription factor activity.
