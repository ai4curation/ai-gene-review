description: PP_1007 encodes a predicted FecR-like transmembrane sensor/anti-sigma protein in Pseudomonas
  putida KT2440. FecR, FecR_N/FecR_C, and ferric-dicitrate-sensor transmembrane domain annotations support
  a membrane-associated sigma factor antagonist role rather than a canonical His-Asp sensor kinase assignment.
