description: PP_2870 encodes a predicted signal-peptide-bearing spermidine/putrescine-binding periplasmic protein in Pseudomonas putida KT2440. The protein is best curated as a polyamine-binding substrate-capture component, while its cognate membrane permease and ATP-binding partners remain unresolved in this first-pass pathway partition.
