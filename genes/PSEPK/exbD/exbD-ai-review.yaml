  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: exbD encodes the ExbD subunit of the canonical exbB-exbD-tonB locus. ExbD is an inner-membrane component of the
  TonB energy-transduction motor that works with ExbB and TonB to energize TonB-dependent outer-membrane receptors. It supports
  nutrient uptake by energy coupling rather than directly transporting substrates.
