  qualifier: enables
  review:
    summary: Efflux transporter activity reflects the pump function, but PP_2064 is the membrane-fusion/adaptor
      component rather than the standalone transporter.
    action: MARK_AS_OVER_ANNOTATED
    reason: The TreeGrafter call is biologically close at complex level, but an MFP/adaptor subunit should
      be modeled as contributing to efflux pump activity as part of the complex.
