  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: PP_2064 encodes a predicted membrane-fusion protein/adaptor component of a resistance-nodulation-division
  (RND) multidrug efflux pump in Pseudomonas putida KT2440. The protein is best modeled as part of an
  efflux pump complex that contributes to drug/xenobiotic efflux rather than as a standalone transmembrane
  transporter.
