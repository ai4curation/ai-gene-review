description: >-
  Type 1 [4Fe-4S]-dependent quinolinate synthase of Pseudomonas putida KT2440.
  NadA condenses iminoaspartate from NadB with glycerone phosphate to produce
  quinolinate, linking L-aspartate oxidation to NaMN formation in the de novo
  NAD+ biosynthetic pathway.
