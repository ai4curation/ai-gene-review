taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: plsB encodes the PlsB glycerol-3-phosphate O-acyltransferase (GPAT; EC 2.3.1.15), a peripheral membrane enzyme on the cytoplasmic side of the plasma membrane. It acylates sn-glycerol 3-phosphate using acyl-CoA to form 1-acyl-sn-glycerol-3-phosphate, the first step toward phosphatidic acid, CDP-diacylglycerol, and downstream bacterial phospholipid synthesis. The P. putida KT2440 annotation is inferred from conserved HAMAP/UniRule, RHEA/EC, InterPro, and PANTHER signatures rather than a direct organism-specific biochemical paper.
