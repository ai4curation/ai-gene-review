id: Q88HS6
gene_symbol: paaB
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: >-
  PaaB is the regulatory subunit of the PaaABCE ring
  1,2-phenylacetyl-CoA epoxidase system in Pseudomonas putida KT2440. It
  contributes to assembly or operation of the multicomponent oxygenase during
  aerobic phenylacetate catabolism rather than independently catalyzing the
  complete epoxidation reaction.
