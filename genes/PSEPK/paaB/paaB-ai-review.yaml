    id: GO:0097266
    label: phenylacetyl-CoA 1,2-epoxidase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000003
  qualifier: enables
  review:
    summary: Correct activity at complex level, but overstates the isolated regulatory subunit.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      PaaB is explicitly the regulatory subunit of the multicomponent
      PaaABCE epoxidase. The core-function model therefore records that it
      contributes to, rather than independently enables, the reaction.
    supported_by:
    - reference_id: file:PSEPK/paaB/paaB-uniprot.txt
      supporting_text: 'SubName: Full=Ring 1,2-phenylacetyl-CoA epoxidase regulatory subunit'
