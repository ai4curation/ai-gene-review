  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: fepA encodes a TonB-dependent outer-membrane ferric-siderophore receptor in Pseudomonas putida
  KT2440. Its plug and beta-barrel TonB-dependent receptor domains support high-affinity siderophore-iron
  uptake across the Gram-negative outer membrane.
