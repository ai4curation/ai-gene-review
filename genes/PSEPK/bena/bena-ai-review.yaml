id: Q88I40
gene_symbol: benA
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida KT2440
description: BenA is the alpha (large) subunit of benzoate 1,2-dioxygenase (EC 1.14.12.10),
  the terminal oxygenase component of the three-component benzoate dioxygenase system (BenABC)
  in Pseudomonas putida KT2440. BenA contains a Rieske [2Fe-2S] cluster domain (residues 47-129)
  that accepts electrons from the BenC reductase, and a mononuclear non-heme iron catalytic site
  in the Ring_hydroxyl_A domain where dioxygen activation and substrate hydroxylation occur.
  The enzyme catalyzes the first committed step of the chromosomal beta-ketoadipate pathway,
  converting benzoate + NADH + O2 to cis-1,2-dihydroxycyclohexa-3,5-diene-1-carboxylate
  (benzoate cis-diol) + NAD+. It is encoded by the benABCD operon, which is transcriptionally
  activated by BenR in response to benzoate. BenA is a member of the bacterial ring-hydroxylating
  dioxygenase alpha subunit family, sharing 58.3% sequence identity with XylX from the TOL plasmid
  (PMID:1938949).
existing_annotations:
- term:
    id: GO:0005506
    label: iron ion binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: BenA binds iron ions in two distinct contexts. The Rieske [2Fe-2S] cluster domain
      (residues 47-129) coordinates two iron atoms via conserved cysteine and histidine ligands
      for electron transfer. Additionally, the catalytic Ring_hydroxyl_A domain contains a
      mononuclear non-heme iron center that is the site of dioxygen activation and substrate
      hydroxylation. The InterPro domains (IPR015879, IPR015881) that triggered this IEA
      annotation correctly identify iron-binding capacity. However, GO:0005506 (iron ion binding)
      is a general term. The more specific GO:0051537 (2 iron, 2 sulfur cluster binding) is
      already annotated separately and better captures the Rieske cluster function. The remaining
      iron-binding function (mononuclear non-heme iron) is also real but subsumed by the
      dioxygenase catalytic activity. This annotation is acceptable as a broad correct statement.
    action: ACCEPT
    reason: Iron ion binding is a legitimate molecular function of BenA. The Rieske [2Fe-2S]
      cluster requires iron for electron transfer, and the catalytic center uses a mononuclear
      non-heme iron for oxygen activation. While more specific terms exist for the cluster
      (GO:0051537, already annotated), the general iron ion binding term remains valid as an
      umbrella annotation. InterPro domains IPR015879 (Ring_hydroxyl_A) and IPR015881
      (ARHD_Rieske_2Fe_2S) correctly identify iron-binding capacity.
    supported_by:
    - reference_id: file:PSEPK/bena/bena-uniprot.txt
      supporting_text: "KW   Iron {ECO:0000256|ARBA:ARBA00023004}; Iron-sulfur {ECO:0000256|ARBA:ARBA00023014};
        Metal-binding {ECO:0000256|ARBA:ARBA00022723}"
    - reference_id: file:PSEPK/bena/bena-uniprot.txt
      supporting_text: "FT   DOMAIN          47..129 /note=\"Rieske\" /evidence=\"ECO:0000259|PROSITE:PS51296\""
    - reference_id: file:PSEPK/bena/bena-notes.md
      supporting_text: "Rieske [2Fe-2S] domain (residues 47-129, PROSITE PS51296) - electron transfer"
- term:
    id: GO:0018623
    label: benzoate 1,2-dioxygenase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000003
  review:
    summary: This is the primary molecular function of BenA. GO:0018623 (benzoate 1,2-dioxygenase
      activity) is mapped from EC 1.14.12.10, which describes the reaction benzoate + NADH + H+
      + O2 = (1R,6S)-1,6-dihydroxycyclohexa-2,4-diene-1-carboxylate + NAD+. BenA is
      specifically named as the alpha subunit of benzoate 1,2-dioxygenase in the genome
      annotation (PMID:12534463) and the benABCD operon is mapped to benzoate catabolism
      in P. putida KT2440 (PMID:12534466). This is the core catalytic annotation for this
      gene product.
    action: ACCEPT
    reason: Benzoate 1,2-dioxygenase activity is the defining molecular function of BenA.
      The EC number 1.14.12.10 correctly maps to GO:0018623. The gene is named benA precisely
      because it encodes the alpha subunit of this enzyme. Genomic analysis confirms the
      benABCD operon encodes the benzoate dioxygenase system (PMID:12534466), and the
      evolutionary relationship to XylX confirms the dioxygenase function (PMID:1938949).
    supported_by:
    - reference_id: file:PSEPK/bena/bena-uniprot.txt
      supporting_text: "SubName: Full=Benzoate 1,2-dioxygenase subunit alpha {ECO:0000313|EMBL:AAN68769.1};
        EC=1.14.12.10 {ECO:0000313|EMBL:AAN68769.1}"
    - reference_id: PMID:12534466
      supporting_text: "the genes encoding the peripheral pathways for the catabolism of
        p-hydroxybenzoate (pob), benzoate (ben), quinate (qui), phenylpropenoid compounds
        (fcs, ech, vdh, cal, van, acd and acs), phenylalanine and tyrosine (phh, hpd) and
        n-phenylalkanoic acids (fad) were mapped in the chromosome of P. putida KT2440"
    - reference_id: PMID:1938949
      supporting_text: "Corresponding genes from the two biological sources share common ancestry:
        comparison of aligned XylX-BenA, XylY-BenB, and XylZ-BenC amino acid sequences revealed
        respective identities of 58.3, 61.3, and 53%"
    - reference_id: file:PSEPK/bena/bena-notes.md
      supporting_text: "The enzyme catalyzes: benzoate + NADH + O2 -> cis-1,2-dihydroxycyclohexa-3,5-diene-1-carboxylate
        (benzoate cis-diol) + NAD+"
    - reference_id: file:PSEPK/bena/bena-deep-research-falcon.md
