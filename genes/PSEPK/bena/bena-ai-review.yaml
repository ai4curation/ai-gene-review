- term:
    id: GO:0051537
    label: 2 iron, 2 sulfur cluster binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: BenA contains a Rieske-type [2Fe-2S] cluster in its N-terminal domain (residues
      47-129), identified by PROSITE PS51296, Pfam PF00355 (Rieske), and multiple InterPro
      entries (IPR001663, IPR015879, IPR015881, IPR017941, IPR036922). The Rieske cluster
      is essential for electron transfer from the BenC reductase to the mononuclear iron
      active site where catalysis occurs. This is a well-established structural and functional
      feature of all ring-hydroxylating dioxygenase alpha subunits.
    action: ACCEPT
    reason: The 2Fe-2S cluster binding annotation is well-supported by multiple domain
      predictions (Rieske domain at residues 47-129) and is a defining feature of the
      ring-hydroxylating dioxygenase alpha subunit family. The UniProt keywords explicitly
      include "2Fe-2S" and "Iron-sulfur". The Rieske cluster is essential for the electron
      transfer chain that drives the dioxygenase catalytic cycle.
    supported_by:
    - reference_id: file:PSEPK/bena/bena-uniprot.txt
      supporting_text: "FT   DOMAIN          47..129 /note=\"Rieske\" /evidence=\"ECO:0000259|PROSITE:PS51296\""
    - reference_id: file:PSEPK/bena/bena-uniprot.txt
      supporting_text: "KW   2Fe-2S {ECO:0000256|ARBA:ARBA00022714}"
    - reference_id: file:PSEPK/bena/bena-notes.md
      supporting_text: "Rieske [2Fe-2S] domain (residues 47-129, PROSITE PS51296) - electron transfer"
- term:
    id: GO:0043640
    label: benzoate catabolic process via hydroxylation
  evidence_type: IEA
  original_reference_id: PMID:12534466
  review:
    summary: BenA is directly involved in benzoate catabolism via hydroxylation. The benzoate
      1,2-dioxygenase (BenABC) catalyzes the first step of this pathway, hydroxylating
      benzoate to cis-1,2-dihydroxycyclohexa-3,5-diene-1-carboxylate, which is then
      dehydrogenated by BenD to catechol. GO:0043640 is defined as the chemical reactions
      and pathways resulting in the breakdown of benzoate, by its hydroxylation to
      cis-1,2-dihydroxybenzoate followed by dehydrogenation to catechol. This precisely
      describes the pathway that BenA participates in. No biological process annotations
      currently exist for this gene in GOA, making this a critical gap.
    action: NEW
    reason: BenA is a core enzyme in the benzoate catabolic process via hydroxylation.
      The benABCD operon was mapped to benzoate catabolism in P. putida KT2440 (PMID:12534466),
      and the enzyme catalyzes the committed first step of the beta-ketoadipate pathway.
      This biological process annotation fills a gap since only molecular function annotations
      currently exist.
    supported_by:
    - reference_id: PMID:12534466
      supporting_text: "the genes encoding the peripheral pathways for the catabolism of
        p-hydroxybenzoate (pob), benzoate (ben), quinate (qui), phenylpropenoid compounds
        (fcs, ech, vdh, cal, van, acd and acs), phenylalanine and tyrosine (phh, hpd) and
        n-phenylalkanoic acids (fad) were mapped in the chromosome of P. putida KT2440"
    - reference_id: file:PSEPK/bena/bena-notes.md
      supporting_text: "BenA functions in the beta-ketoadipate pathway: 1. Benzoate -> benzoate
        cis-diol (BenABC - benzoate 1,2-dioxygenase)"
    - reference_id: PMID:12534466
      supporting_text: "the protocatechuate (pca genes) and catechol (cat genes) branches of the
        beta-ketoadipate pathway"
- term:
    id: GO:0043639
    label: benzoate catabolic process
  evidence_type: IEA
  original_reference_id: PMID:12534466
  review:
    summary: BenA participates in benzoate catabolism as the alpha subunit of the first enzyme
      in the pathway. GO:0043639 is the parent term of GO:0043640 (benzoate catabolic process
      via hydroxylation). While the more specific child term GO:0043640 is more appropriate
      (since BenA specifically catalyzes the hydroxylation step), this broader term is also
      correct and provides a useful annotation at a higher level.
    action: NEW
    reason: While GO:0043640 (benzoate catabolic process via hydroxylation) is the more
      specific and preferred annotation, including the parent term GO:0043639 provides
      broader discoverability. BenA is unambiguously involved in benzoate catabolism
      as confirmed by genome-wide mapping of aromatic catabolic pathways (PMID:12534466)
      and the gene naming convention (benA = benzoate degradation gene A).
    supported_by:
    - reference_id: PMID:12534466
      supporting_text: "the genes encoding the peripheral pathways for the catabolism of
        p-hydroxybenzoate (pob), benzoate (ben), quinate (qui), phenylpropenoid compounds
        (fcs, ech, vdh, cal, van, acd and acs), phenylalanine and tyrosine (phh, hpd) and
        n-phenylalkanoic acids (fad) were mapped in the chromosome of P. putida KT2440"
    - reference_id: PMID:12534463
      supporting_text: "Pseudomonas putida is a metabolically versatile saprophytic soil bacterium"
references:
- id: GO_REF:0000002
  title: Gene Ontology annotation through association of InterPro records with GO terms
  findings:
  - statement: InterPro domains IPR015879 (Ring_hydroxyl_A), IPR015881 (ARHD_Rieske_2Fe_2S),
      IPR001663 (Rng_hydr_dOase-A), and IPR017941 (Rieske_2Fe-2S) correctly identify BenA
      as a Rieske-type ring-hydroxylating dioxygenase alpha subunit with iron and [2Fe-2S]
      binding capacity.
- id: GO_REF:0000003
  title: Gene Ontology annotation based on Enzyme Commission mapping
  findings:
  - statement: EC 1.14.12.10 (benzoate 1,2-dioxygenase) correctly maps to GO:0018623.
      The EC number is assigned based on genome annotation of benA as the alpha subunit of
      benzoate 1,2-dioxygenase.
- id: PMID:12534463
  title: Complete genome sequence and comparative analysis of the metabolically versatile
    Pseudomonas putida KT2440.
  findings:
  - statement: Reports the complete genome sequence of P. putida KT2440 (6.18 Mb), in which
      benA (PP_3161) is annotated as benzoate 1,2-dioxygenase alpha subunit.
    supporting_text: "Pseudomonas putida is a metabolically versatile saprophytic soil bacterium
      that has been certified as a biosafety host for the cloning of foreign genes"
- id: PMID:12534466
  title: Genomic analysis of the aromatic catabolic pathways from Pseudomonas putida KT2440.
  findings:
  - statement: Mapped all aromatic catabolic pathways in KT2440 including the ben genes for
      benzoate degradation via the beta-ketoadipate pathway.
    supporting_text: "the genes encoding the peripheral pathways for the catabolism of
      p-hydroxybenzoate (pob), benzoate (ben), quinate (qui), phenylpropenoid compounds
      (fcs, ech, vdh, cal, van, acd and acs), phenylalanine and tyrosine (phh, hpd) and
      n-phenylalkanoic acids (fad) were mapped in the chromosome of P. putida KT2440"
  - statement: Identified four main pathways for catabolism of central aromatic intermediates
      including the catechol branch of the beta-ketoadipate pathway fed by benABCD.
    supporting_text: "the protocatechuate (pca genes) and catechol (cat genes) branches of the
      beta-ketoadipate pathway, the homogentisate pathway (hmg/fah/mai genes) and the
      phenylacetate pathway (pha genes)"
- id: PMID:1938949
  title: Potential DNA slippage structures acquired during evolutionary divergence of
    Acinetobacter calcoaceticus chromosomal benABC and Pseudomonas putida TOL pWW0 plasmid
    xylXYZ, genes encoding benzoate dioxygenases.
  findings:
  - statement: BenA (Acinetobacter) and XylX (Pseudomonas TOL plasmid) share 58.3% amino
      acid identity, establishing evolutionary relationship between chromosomal benzoate
      and plasmid-borne toluate dioxygenase systems.
    supporting_text: "Corresponding genes from the two biological sources share common ancestry:
      comparison of aligned XylX-BenA, XylY-BenB, and XylZ-BenC amino acid sequences revealed
      respective identities of 58.3, 61.3, and 53%"
- id: PMID:21906639
  title: Generation of a catR deficient mutant of P. putida KT2440 that produces cis,
    cis-muconate from benzoate at high rate and yield.
  findings:
  - statement: Demonstrated that deletion of catR leads to high expression of the ben operon
      during growth on benzoate, enabling high cis,cis-muconate production rates.
    supporting_text: "The ben operon was highly expressed in the presence of benzoate in the
      mutant and its parental strain"
- id: PMID:24341396
  title: A second chromosomal copy of the catA gene endows Pseudomonas putida mt-2 with
    an enzymatic safety valve for excess of catechol.
  findings:
  - statement: A second copy of catA (catA2) located downstream of the ben operon serves
      as a metabolic safety valve to prevent toxic catechol accumulation.
    supporting_text: "P. putida mt-2 has a second chromosomal copy of the catA gene (named catA2)
      located downstream of the ben operon that encodes an additional catechol-1,2-dioxygenase"
- id: file:PSEPK/bena/bena-deep-research-falcon.md
  title: Deep research report on benA (PP_3161) function in P. putida KT2440
  findings:
  - statement: BenA (PP_3161) is the alpha (large) subunit of benzoate 1,2-dioxygenase,
      the oxygenase component that initiates benzoate oxidation in the peripheral ben pathway
      feeding into the beta-ketoadipate central pathway.
    supporting_text: "benA (PP_3161) encodes the alpha (large) subunit of benzoate dioxygenase,
      the oxygenase component responsible for the initial oxidative attack on benzoate in
      aerobic benzoate catabolism"
  - statement: The ben operon is strongly induced by benzoate in KT2440, with benB showing
      14.83-fold induction in transcriptomics.
    supporting_text: "under benzoate conditions in wild-type KT2440, transcriptomic fold-changes
      include: catC ~16.29-fold, catA ~15.43-fold, and benB (PP_3162) ~14.83-fold induction"
  - statement: Explicit BenA enzyme kinetics, substrate spectrum, and subcellular localization
      have not been experimentally determined for the KT2440 protein specifically.
    supporting_text: "explicit BenA enzyme kinetics, expanded substrate spectrum, and
      experimentally validated subcellular localization were not found in the retrieved
      KT2440 evidence"
