  - statement: >-
      The report identifies the exact accession, ArgE-specific family signals,
      and substrate-specific hydrolysis reaction. Its claims that ArgJ is the
      dominant route, that ArgE is only a backup, and that PP_3571 is a second
      ArgE paralog are not used; it also missed the direct KT2440 argE-mutant
      study, which leaves route contribution unresolved.
