id: Q88CJ5
gene_symbol: argE
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: >-
  ArgE (PP_5186) is a predicted M20A-family acetylornithine deacetylase (EC
  3.5.1.16) that hydrolyzes N-acetyl-L-ornithine to L-ornithine and acetate in
  the linear acetylated-ornithine route to L-arginine. Direct KT2440 enzymology
  is unavailable, and its condition-specific contribution relative to the
  cyclic ArgJ route is unresolved.
