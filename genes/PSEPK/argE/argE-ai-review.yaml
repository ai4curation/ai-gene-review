    label: L-arginine biosynthetic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: involved_in
  review:
    summary: ArgE provides a hydrolytic route from N-acetyl-L-ornithine to ornithine during L-arginine synthesis.
    action: ACCEPT
    reason: >-
      The argE gene assignment, EC 3.5.1.16, and ArgE-specific HAMAP/NCBIfam
      families agree. A KT2440 argE mutant remains arginine prototrophic,
      consistent with compensation by the alternative ArgJ route rather than
      evidence against this pathway role.
