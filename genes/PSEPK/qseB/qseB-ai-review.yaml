taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: qseB encodes a QseB-like two-component DNA-binding transcriptional activator in Pseudomonas
  putida KT2440. It has a response-regulator receiver domain and an OmpR/PhoB-type DNA-binding domain,
  supporting phosphorelay-dependent transcriptional regulation rather than direct quorum-signal synthesis
  or reception.
