    summary: FAD binding is compatible with the enzyme but broad and duplicated by GO:0050660.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      The exact hydroxylase activity already captures the catalytic role, and
      retaining both near-duplicate FAD-binding terms would add redundancy.
- term:
    id: GO:0110142
    label: ubiquinone biosynthesis complex
  evidence_type: IEA
  original_reference_id: GO_REF:0000117
  qualifier: part_of
  review:
    summary: Conserved bacterial pathway context supports metabolon association, but it is not target-strain evidence.
    action: KEEP_AS_NON_CORE
    reason: >-
      UbiI-family hydroxylases participate in the bacterial Ubi metabolon, and
      KT2440 encodes the UbiJ/UbiK assembly factors. No direct Q88CI4 complex
      experiment was found, so this is retained as non-core inferred context.
