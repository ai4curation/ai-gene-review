id: Q88CI4
gene_symbol: visC
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: >-
  visC encodes a predicted FAD-dependent UbiI-type monooxygenase that performs
  an early oxygen-dependent ring hydroxylation during ubiquinone biosynthesis.
  It is one of three complementary hydroxylases in the Pseudomonas putida
  KT2440 pathway and is distinct from the anaerobic UbiT/UbiU/UbiV system.
