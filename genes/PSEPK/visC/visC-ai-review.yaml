- id: file:PSEPK/visC/visC-uniprot.txt
  title: UniProt entry Q88CI4 for visC
  findings:
  - statement: >-
      The unreviewed record places Q88CI4 in the UbiH/COQ6 family, assigns an
      FAD-binding domain, and links it to ubiquinone biosynthesis. Its submitted
      "anaerobic" product name is a legacy descriptor contradicted by the
      oxygen-dependent UbiI-family reaction.
- id: file:PSEPK/visC/visC-goa.tsv
  title: QuickGO GOA annotations for visC
  findings:
  - statement: The fetched GOA table contains the seven annotations reviewed here.
- id: file:projects/P_PUTIDA/deep-research/PSEPK__ubiquinone_biosynthesis__ppu00130-deep-research-openscientist.md
  title: OpenScientist PSEPK ubiquinone pathway assessment
  findings:
  - statement: >-
      The species-level reconstruction identifies PP_5197 as the UbiI/VisC
      aerobic hydroxylase and distinguishes it from the absent anaerobic route.
- id: PMID:23709220
  title: "ubiI, a new gene in Escherichia coli coenzyme Q biosynthesis, is involved in aerobic C5-hydroxylation."
  findings:
  - statement: >-
      Genetic, biochemical, and structural work identifies E. coli visC as
      UbiI, the FAD-dependent aerobic C5 hydroxylase; this is the experimental
      exemplar for the PP_5197 orthology transfer.
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      PubMed-cached abstract verified; direct evidence is for E. coli UbiI, not
      for PP_5197.
- id: PMID:30686758
  title: A Soluble Metabolon Synthesizes the Isoprenoid Lipid Ubiquinone.
  findings:
  - statement: >-
      Establishes a soluble cytoplasmic Ubi complex in E. coli; analogous
      complex membership remains untested in P. putida KT2440.
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: >-
      PubMed-cached abstract verified and used only as E. coli complex context,
      not as a direct PP_5197 localization or interaction result.
- id: file:PSEPK/visC/visC-deep-research-openscientist.md
  title: OpenScientist functional review of PSEPK visC
  findings:
  - statement: >-
      Orthology, family/domain, KO, and pathway context support a UbiI-like
      aerobic hydroxylase assignment. Exact regioselectivity, nonaprenyl
      substrate use, and metabolon membership remain untested in PP_5197; the
      report's pairwise comparisons are not treated as a reciprocal-best-hit
      analysis.
core_functions:
- description: >-
    Inferred UbiI-like FAD-dependent hydroxylation of an early
    polyprenylphenol intermediate in the aerobic ubiquinone biosynthetic
    pathway. The exact C5 regioselectivity is transferred from the E. coli
    ortholog and has not been assayed in PP_5197.
  molecular_function:
    id: GO:0019168
    label: 2-polyprenylphenol 6-hydroxylase activity
  directly_involved_in:
