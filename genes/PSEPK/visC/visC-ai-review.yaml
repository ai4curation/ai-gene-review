    action: ACCEPT
    reason: >-
      Orthology and pathway context identify this protein as the early aerobic
      ring hydroxylase in the complete KT2440 ubiquinone pathway.
    supported_by:
    - reference_id: file:PSEPK/visC/visC-uniprot.txt
