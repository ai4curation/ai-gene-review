    supporting_text: 'CC       ubiquinone biosynthesis proteins (UbiE, UbiF, UbiG, UbiH and UbiI) and'
  - statement: UniProt/TreeGrafter records the specific UbiI-like 2-polyprenylphenol hydroxylase activity.
    supporting_text: 'DR   GO; GO:0019168; F:2-polyprenylphenol 6-hydroxylase activity; IEA:TreeGrafter.'
  - statement: UniProt places Q88CI4 in PANTHER subfamily PTHR43876:SF7.
    supporting_text: 'DR   PANTHER; PTHR43876:SF7; UBIQUINONE BIOSYNTHESIS MONOOXYGENASE COQ6, MITOCHONDRIAL; 1.'
