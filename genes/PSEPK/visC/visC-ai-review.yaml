    label: oxidoreductase activity, acting on paired donors, with incorporation or
      reduction of molecular oxygen
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: This oxygen-incorporating oxidoreductase parent is redundant with the exact activity.
    action: MARK_AS_OVER_ANNOTATED
    reason: GO:0019168 more precisely identifies the substrate and reaction.
- term:
    id: GO:0019168
    label: 2-polyprenylphenol 6-hydroxylase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000118
  qualifier: enables
  review:
    summary: This is the predicted substrate-specific core activity of VisC/UbiI.
    action: ACCEPT
    reason: >-
      The UbiI/VisC orthology assignment, KEGG K18800 placement, and complete
      three-hydroxylase pathway support this oxygen-dependent reaction. The
      assignment is inferred rather than directly assayed in Q88CI4.
- term:
    id: GO:0050660
    label: flavin adenine dinucleotide binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: FAD binding is compatible with the enzyme but broad and duplicated by GO:0071949.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      The exact hydroxylase activity already captures the catalytic role, and
      retaining both near-duplicate FAD-binding terms would add redundancy.
- term:
