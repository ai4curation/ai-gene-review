id: Q88CI4
gene_symbol: visC
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: >-
  visC encodes a UbiH/Coq6-family FAD-binding monooxygenase-like protein in the
  PSEPK ubiquinone biosynthesis region. Despite the historical visC name and
  UniProt subname mentioning anaerobic ubiquinone synthesis, the current
  first-pass evidence supports a UbiI-like 2-polyprenylphenol 6-hydroxylase role
  in the aerobic ubiquinone biosynthesis sequence, upstream of the UbiG and UbiE
  methyltransferase reactions.
existing_annotations:
- term:
    id: GO:0004497
    label: monooxygenase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000117
  qualifier: enables
  review:
    summary: >-
      Monooxygenase activity is directionally correct but too broad for the
      UbiH/Coq6-family pathway assignment.
    action: MODIFY
    reason: >-
      The existing TreeGrafter annotation gives the more specific
      2-polyprenylphenol 6-hydroxylase activity.
    proposed_replacement_terms:
    - id: GO:0019168
      label: 2-polyprenylphenol 6-hydroxylase activity
- term:
    id: GO:0006744
    label: ubiquinone biosynthetic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: involved_in
  review:
    summary: >-
      The UniPathway and protein-family context support a ubiquinone
      biosynthesis role.
    action: ACCEPT
    reason: >-
      Q88CI4 is in the UbiH/Coq6 monooxygenase family, has a ubiquinone-pathway
      GOA process annotation, and is adjacent to other ppu00130 Ubi genes. The
      local PANTHER family cache places E. coli UbiI in the same PTHR43876:SF7
      subfamily, supporting interpretation of PSEPK visC as the UbiI-like C5
      hydroxylase candidate rather than as a resolved anaerobic-pathway gene.
    additional_reference_ids:
    - file:interpro/panther/PTHR43876/PTHR43876-entries.csv
- term:
    id: GO:0016705
    label: oxidoreductase activity, acting on paired donors, with incorporation or
      reduction of molecular oxygen
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: >-
      This parent oxygenase term is compatible with the predicted monooxygenase
      reaction but less informative than the pathway-specific term.
    action: MODIFY
    reason: >-
      Replace the broad oxidoreductase parent with GO:0019168 for the specific
      ubiquinone-intermediate hydroxylase activity.
    proposed_replacement_terms:
    - id: GO:0019168
      label: 2-polyprenylphenol 6-hydroxylase activity
- term:
    id: GO:0019168
    label: 2-polyprenylphenol 6-hydroxylase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000118
  qualifier: enables
  review:
    summary: >-
      This is the most specific current molecular-function annotation for the
      VisC-like UbiH/Coq6-family protein.
    action: ACCEPT
    reason: >-
      The function matches the UbiH/Coq6-family annotation and the
      ubiquinone-biosynthesis process assignment. This GO term corresponds to
      the UbiI-like 2-polyprenylphenol hydroxylation step that the ppu00130
      Falcon report flagged as missing from the initial KEGG candidate list.
- term:
    id: GO:0050660
    label: flavin adenine dinucleotide binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: >-
      FAD binding is consistent with the protein's FAD/NAD(P)-binding domain.
    action: KEEP_AS_NON_CORE
    reason: >-
      Cofactor binding supports the monooxygenase mechanism but is not the core
      pathway function.
- term:
    id: GO:0071949
    label: FAD binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: >-
      FAD binding is consistent with the InterPro annotation.
    action: KEEP_AS_NON_CORE
    reason: >-
      This duplicates the cofactor-binding interpretation and is non-core
      relative to the ubiquinone-intermediate hydroxylase activity.
- term:
    id: GO:0110142
    label: ubiquinone biosynthesis complex
  evidence_type: IEA
  original_reference_id: GO_REF:0000117
  qualifier: part_of
  review:
    summary: >-
      Membership in a ubiquinone biosynthesis complex is plausible for a
      UbiH/Coq6-family protein but should be kept as complex context.
    action: KEEP_AS_NON_CORE
    reason: >-
      UniProt ARBA states that this family can be part of a Ubi complex with
      UbiE/UbiF/UbiG/UbiH/UbiI and accessory factors; the core function remains
      the hydroxylase activity.
