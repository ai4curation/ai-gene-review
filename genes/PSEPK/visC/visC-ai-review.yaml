  - reference_id: file:PSEPK/visC/visC-deep-research-openscientist.md
    supporting_text: >-
      its activity, substrate specificity, and kinetic parameters have not been
      measured directly.
proposed_new_terms: []
suggested_questions:
- question: >-
    Does PP_5197 have the same ring regioselectivity as E. coli UbiI, and does
    it assemble into a KT2440 Ubi complex under aerobic growth?
suggested_experiments:
- description: >-
    Delete and complement PP_5197 in P. putida, profile accumulated
    polyprenylphenol intermediates, and assay purified protein with FAD,
    oxygen, and defined polyprenyl substrates to establish regioselectivity.
