id: Q88K01
gene_symbol: yqhD
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: >-
  yqhD encodes an iron-containing NAD(P)-dependent alcohol dehydrogenase-family
  enzyme in Pseudomonas putida KT2440. UniProt names it as a broad
  NAD(P)-dependent alcohol dehydrogenase, and GOA adds NAD+, NADP+, metal
  binding, methylglyoxal reductase, and butanol dehydrogenase predictions from
  EC, InterPro, ARBA, and TreeGrafter sources. The first-pass core assignment is
  broad alcohol dehydrogenase [NAD(P)+] activity in the cytosol, while specific
  methylglyoxal and butanol substrate claims remain unresolved for KT2440.
existing_annotations:
- term:
    id: GO:0004022
    label: alcohol dehydrogenase (NAD+) activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000003
  qualifier: enables
  review:
    summary: NAD-dependent alcohol dehydrogenase activity is plausible from the EC 1.1.1.1 mapping.
    action: ACCEPT
    reason: >-
      UniProt names yqhD as NAD(P)-dependent alcohol dehydrogenase with EC
      1.1.1.1, and the GOA EC mapping supports the NAD-dependent activity. This
      should be read as part of a broad NAD(P)-dependent ADH function rather
      than a substrate-specific propionate-pathway claim.
    supported_by:
    - reference_id: file:PSEPK/yqhD/yqhD-goa.tsv
      supporting_text: "GO:0004022\talcohol dehydrogenase (NAD+) activity"
    - reference_id: file:PSEPK/yqhD/yqhD-uniprot.txt
      supporting_text: "DE   SubName: Full=Alcohol dehydrogenase, NAD(P)-dependent"
- term:
    id: GO:0005829
    label: cytosol
  evidence_type: IEA
  original_reference_id: GO_REF:0000118
  qualifier: located_in
  review:
    summary: Cytosol is plausible localization for this soluble Fe-containing alcohol dehydrogenase.
    action: ACCEPT
    reason: >-
      TreeGrafter places yqhD in the cytosol, consistent with the soluble
      alcohol dehydrogenase family assignment. Localization supports the enzyme
      assignment and is appropriate context for the core soluble enzyme
      function.
    supported_by:
    - reference_id: file:PSEPK/yqhD/yqhD-goa.tsv
      supporting_text: "GO:0005829\tcytosol"
    - reference_id: file:PSEPK/yqhD/yqhD-uniprot.txt
      supporting_text: "InterPro; IPR001670; ADH_Fe/GldA."
