    - reference_id: file:PSEPK/yqhD/yqhD-uniprot.txt
      supporting_text: "DE   SubName: Full=Alcohol dehydrogenase, NAD(P)-dependent"
- term:
    id: GO:0016491
    label: oxidoreductase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: Broad oxidoreductase activity should be replaced by alcohol dehydrogenase [NAD(P)+] activity.
    action: MODIFY
    reason: >-
      The InterPro-derived oxidoreductase parent is true but less informative
      than the ADH-specific NAD(P)-dependent terms already present in GOA.
    proposed_replacement_terms:
    - id: GO:0018455
      label: alcohol dehydrogenase [NAD(P)+] activity
    supported_by:
    - reference_id: file:PSEPK/yqhD/yqhD-goa.tsv
      supporting_text: "GO:0016491\toxidoreductase activity"
    - reference_id: file:PSEPK/yqhD/yqhD-goa.tsv
      supporting_text: "GO:0018455\talcohol dehydrogenase [NAD(P)+] activity"
- term:
    id: GO:0016616
    label: oxidoreductase activity, acting on the CH-OH group of donors, NAD or NADP as acceptor
  evidence_type: IEA
  original_reference_id: GO_REF:0000117
  qualifier: enables
  review:
    summary: CH-OH/NAD(P) oxidoreductase activity is a correct but broader parent of the ADH assignment.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      This ARBA class-level term is consistent with an alcohol dehydrogenase, but
      GO:0018455 and the NAD+/NADP+ alcohol dehydrogenase terms are more
      informative for the molecular function.
    supported_by:
    - reference_id: file:PSEPK/yqhD/yqhD-goa.tsv
      supporting_text: "GO:0016616\toxidoreductase activity, acting on the CH-OH group of donors, NAD or NADP as acceptor"
- term:
    id: GO:0018455
    label: alcohol dehydrogenase [NAD(P)+] activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000118
  qualifier: enables
  review:
    summary: Alcohol dehydrogenase [NAD(P)+] activity is the best first-pass core function for yqhD.
    action: ACCEPT
    reason: >-
      TreeGrafter supports the NAD(P)-dependent alcohol dehydrogenase term, and
      UniProt names the protein as an NAD(P)-dependent alcohol dehydrogenase.
      This captures the enzyme class without overcommitting to a physiological
      substrate.
    supported_by:
    - reference_id: file:PSEPK/yqhD/yqhD-goa.tsv
      supporting_text: "GO:0018455\talcohol dehydrogenase [NAD(P)+] activity"
    - reference_id: file:PSEPK/yqhD/yqhD-uniprot.txt
      supporting_text: "PANTHER; PTHR43633; ALCOHOL DEHYDROGENASE YQHD;"
- term:
    id: GO:0046872
    label: metal ion binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: Metal binding is plausible cofactor context for an Fe-containing alcohol dehydrogenase.
    action: KEEP_AS_NON_CORE
    reason: >-
      InterPro supports an iron-containing alcohol dehydrogenase family
      assignment, so a metal-binding cofactor term is reasonable, but catalytic
      ADH activity is the core function.
    supported_by:
    - reference_id: file:PSEPK/yqhD/yqhD-goa.tsv
      supporting_text: "GO:0046872\tmetal ion binding"
    - reference_id: file:PSEPK/yqhD/yqhD-uniprot.txt
      supporting_text: "InterPro; IPR018211; ADH_Fe_CS."
- term:
    id: GO:1990002
    label: methylglyoxal reductase (NADPH) (acetol producing) activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000118
  qualifier: enables
  review:
    summary: Methylglyoxal reductase activity is a plausible YqhD-family substrate call but lacks KT2440-specific support here.
    action: UNDECIDED
    reason: >-
      TreeGrafter predicts methylglyoxal reductase activity, but the available
      UniProt/Asta context for KT2440 yqhD does not provide direct substrate
      evidence. Keep this undecided rather than promoting it to a core function.
    supported_by:
    - reference_id: file:PSEPK/yqhD/yqhD-goa.tsv
      supporting_text: "GO:1990002\tmethylglyoxal reductase (NADPH) (acetol producing) activity"
- term:
    id: GO:1990362
    label: butanol dehydrogenase (NAD+) activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: Butanol dehydrogenase activity is an InterPro-derived substrate-specific prediction that is not resolved for KT2440 yqhD.
    action: UNDECIDED
    reason: >-
      InterPro/BDH-like evidence may reflect a butanol-dehydrogenase-like
      subfamily, but no organism-specific substrate assay is available in this
      first pass. The broader NAD(P)-dependent alcohol dehydrogenase assignment
      is safer as core function.
    supported_by:
    - reference_id: file:PSEPK/yqhD/yqhD-goa.tsv
      supporting_text: "GO:1990362\tbutanol dehydrogenase (NAD+) activity"
    - reference_id: file:PSEPK/yqhD/yqhD-uniprot.txt
      supporting_text: "InterPro; IPR044731; BDH-like."
