id: Q88DZ0
gene_symbol: ilvC
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: ilvC encodes NADP-dependent ketol-acid reductoisomerase, a Mg-dependent enzyme in branched-chain amino acid biosynthesis.
existing_annotations:
- term:
    id: GO:0000287
    label: magnesium ion binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000104
  review:
    summary: Magnesium binding is a required cofactor feature but not the specific gene function.
    action: KEEP_AS_NON_CORE
    reason: UniProt indicates two Mg(2+) ions per subunit for IlvC; this supports retention as non-core cofactor information.
    supported_by:
    - reference_id: file:PSEPK/ilvC/ilvC-uniprot.txt
      supporting_text: Binds 2 magnesium ions per subunit
    - reference_id: file:PSEPK/ilvC/ilvC-goa.tsv
      supporting_text: "GO:0000287\tmagnesium ion binding"
    - reference_id: file:PSEPK/ilvC/ilvC-deep-research-falcon.md
      supporting_text: IlvC requires **NADPH** for the reduction half-reaction and a
        **divalent metal ion (most commonly Mg²⁺)** to support the alkyl-migration/isomerization
        chemistry, which is mechanistically integrated in a single catalytic cycle
        for most KARIs.
      reference_section_type: OTHER
- term:
    id: GO:0004455
    label: ketol-acid reductoisomerase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  review:
    summary: Ketol-acid reductoisomerase activity is the specific catalytic function of IlvC.
    action: ACCEPT
    reason: The reviewed UniProt entry assigns EC 1.1.1.86 and describes the alkyl-migration/reduction reaction in BCAA biosynthesis.
    supported_by:
    - reference_id: file:PSEPK/ilvC/ilvC-uniprot.txt
      supporting_text: Catalyzes an alkyl-migration followed by a ketol-acid reduction
    - reference_id: file:PSEPK/ilvC/ilvC-goa.tsv
      supporting_text: "GO:0004455\tketol-acid reductoisomerase activity"
    - reference_id: file:PSEPK/ilvC/ilvC-deep-research-falcon.md
      supporting_text: 'Ketol-acid reductoisomerase (KARI; IlvC/AHAIR)** is a conserved
        bacterial enzyme family within the 6-phosphogluconate dehydrogenase (6PGDH)-type
        superfamily that performs a chemically coupled **alkyl-migration (isomerization)**
        and **NADP(H)-dependent reduction** step in BCAA biosynthesis.'
      reference_section_type: OTHER
- term:
    id: GO:0005829
    label: cytosol
  evidence_type: IEA
  original_reference_id: GO_REF:0000118
  review:
    summary: Cytosol is plausible cellular context but not the defining function.
    action: KEEP_AS_NON_CORE
    reason: The TreeGrafter cytosol annotation is consistent with a soluble bacterial biosynthetic enzyme but should remain
      non-core. Falcon deep research supports cytosolic localization by homology, noting no KT2440-specific localization
      experiment was retrieved.
    supported_by:
    - reference_id: file:PSEPK/ilvC/ilvC-goa.tsv
      supporting_text: "GO:0005829\tcytosol"
    - reference_id: file:PSEPK/ilvC/ilvC-deep-research-falcon.md
      supporting_text: 'a Gram-negative bacterial IlvC homolog was reported as a **soluble
        protein** that could be purified without detergents, consistent with a **cytosolic
        enzyme** (as expected for a central-metabolism biosynthetic enzyme operating
        on cytosolic intermediates).'
      reference_section_type: OTHER
- term:
    id: GO:0009082
    label: branched-chain amino acid biosynthetic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: Branched-chain amino acid biosynthetic process is true but less specific than the valine/isoleucine branch terms.
    action: MARK_AS_OVER_ANNOTATED
    reason: IlvC acts at a shared BCAA pathway step; the specific L-valine annotation and missing isoleucine annotation are
      more informative.
    supported_by:
    - reference_id: file:PSEPK/ilvC/ilvC-uniprot.txt
      supporting_text: Involved in the biosynthesis of branched-chain amino acids
    - reference_id: file:PSEPK/ilvC/ilvC-goa.tsv
      supporting_text: "GO:0009082\tbranched-chain amino acid biosynthetic process"
    - reference_id: file:PSEPK/ilvC/ilvC-deep-research-falcon.md
      supporting_text: IlvC is the second step in the pyruvate-to-2-ketoisovalerate
        segment of **branched-chain amino-acid biosynthesis**. It supports synthesis
        of valine and isoleucine directly and leucine indirectly via 2-oxoisovalerate-derived
        metabolism.
      reference_section_type: OTHER
- term:
    id: GO:0009099
    label: L-valine biosynthetic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  review:
    summary: IlvC participates directly in L-valine biosynthesis.
    action: ACCEPT
    reason: UniProt maps IlvC to the L-valine biosynthesis route from pyruvate, step 2 of 4. Falcon deep research provides
      KT2440-specific genetic evidence (conditional essentiality on minimal medium and BCAA auxotrophy of ilvC mutants).
    supported_by:
    - reference_id: file:PSEPK/ilvC/ilvC-uniprot.txt
      supporting_text: 'L-valine from pyruvate: step 2/4'
    - reference_id: file:PSEPK/ilvC/ilvC-goa.tsv
      supporting_text: "GO:0009099\tL-valine biosynthetic process"
    - reference_id: file:PSEPK/ilvC/ilvC-deep-research-falcon.md
      supporting_text: 'A genome-wide knockout screen on glucose minimal medium identified
        **ilvC (PP4678)** among genes whose disruption prevents growth on M9 minimal
        medium, i.e., conditionally essential in that environment.'
      reference_section_type: OTHER
- term:
    id: GO:0016491
    label: oxidoreductase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: Oxidoreductase activity is a broad parent of the specific ketol-acid reductoisomerase function.
    action: MARK_AS_OVER_ANNOTATED
    reason: The specific EC-linked ketol-acid reductoisomerase annotation should be preferred over the broad oxidoreductase
      parent.
    supported_by:
    - reference_id: file:PSEPK/ilvC/ilvC-uniprot.txt
      supporting_text: EC=1.1.1.86
    - reference_id: file:PSEPK/ilvC/ilvC-goa.tsv
      supporting_text: "GO:0016491\toxidoreductase activity"
- term:
    id: GO:0050661
    label: NADP binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: NADP binding is a cofactor feature of IlvC.
    action: KEEP_AS_NON_CORE
    reason: The reaction uses NADP/NADPH, but binding alone is less informative than the enzyme activity.
    supported_by:
    - reference_id: file:PSEPK/ilvC/ilvC-uniprot.txt
      supporting_text: NADP(+)
    - reference_id: file:PSEPK/ilvC/ilvC-goa.tsv
      supporting_text: "GO:0050661\tNADP binding"
    - reference_id: file:PSEPK/ilvC/ilvC-deep-research-falcon.md
      supporting_text: IlvC requires **NADPH** for the reduction half-reaction and a
        **divalent metal ion (most commonly Mg²⁺)** to support the alkyl-migration/isomerization
        chemistry, which is mechanistically integrated in a single catalytic cycle
        for most KARIs.
      reference_section_type: OTHER
- term:
    id: GO:0009097
    label: isoleucine biosynthetic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  review:
    summary: IlvC also participates directly in isoleucine biosynthesis.
    action: NEW
    reason: The reviewed UniProt entry has an isoleucine biosynthesis pathway statement and DR GO line, but the fetched GOA
      table lacks this specific process annotation. Falcon deep research independently reports isoleucine auxotrophy of KT2440
      ilvC mutants, supporting a direct role in isoleucine biosynthesis.
    supported_by:
    - reference_id: file:PSEPK/ilvC/ilvC-uniprot.txt
      supporting_text: 'L-isoleucine from 2-oxobutanoate: step 2/4'
    - reference_id: file:PSEPK/ilvC/ilvC-uniprot.txt
      supporting_text: GO:0009097; P:isoleucine biosynthetic process
    - reference_id: file:PSEPK/ilvC/ilvC-deep-research-falcon.md
      supporting_text: '*ilvC* mutants showed branched-chain amino-acid auxotrophy,
        with reported requirements involving isoleucine and valine/leucine supplementation
        depending on the assay context.'
      reference_section_type: OTHER
