suggested_questions:
- question: Is PP_4300 primarily a hydroxypyruvate reductase, a glycerate kinase, or a dual/ambiguous
    enzyme under physiological conditions?
suggested_experiments:
- description: Construct a targeted deletion and complemented strain, then measure growth and pathway
    intermediates on glucose, gluconate, ribose, and relevant side-node substrates.
  experiment_type: growth phenotype and metabolomics
- description: Purify the protein and measure activity with the annotated substrate/cofactor set to resolve
    substrate specificity and conflicting automated annotations.
  experiment_type: enzyme kinetics
