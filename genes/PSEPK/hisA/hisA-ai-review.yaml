id: Q88R42
gene_symbol: hisA
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: >-
  hisA encodes ProFAR isomerase (EC 5.3.1.16), which rearranges the ProFAR
  intermediate to PRFAR in the fourth reaction of L-histidine biosynthesis.
  The Pseudomonas putida KT2440 protein belongs to the bacterial HisA branch of
  the HisA/PriA TIM-barrel superfamily. KT2440 encodes a separate TrpF enzyme
  for phosphoribosylanthranilate isomerization in tryptophan biosynthesis, so
  HisA is not needed to supply that reaction.
existing_annotations:
- term:
    id: GO:0000105
    label: L-histidine biosynthetic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: involved_in
  review:
    summary: HisA performs the fourth reaction of the PRPP-to-histidine pathway.
    action: ACCEPT
    reason: >-
      The reviewed UniProt entry, EC/Rhea chemistry, UniPathway assignment, and
      HisA-specific family signatures all support L-histidine biosynthesis.
- term:
    id: GO:0000162
    label: L-tryptophan biosynthetic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000118
  qualifier: involved_in
  review:
    summary: The TreeGrafter tryptophan-process assignment is a paralog-family over-propagation.
    action: REMOVE
    reason: >-
      Q88R42 has the HisA-specific activity and is assigned only to the
      histidine pathway by the reviewed UniProt record. KT2440 has a distinct
      reviewed TrpF protein, Q88LE0, that catalyzes the phosphoribosylanthranilate
      isomerase reaction in L-tryptophan biosynthesis. No evidence supports a
      PriA-like bifunctional role for Q88R42.
    supported_by:
    - reference_id: file:PSEPK/hisA/hisA-deep-research-openscientist.md
      supporting_text: "*P. putida* HisA is a monofunctional, dedicated ProFAR isomerase."
- term:
    id: GO:0003949
    label: 1-(5-phosphoribosyl)-5-[(5-phosphoribosylamino)methylideneamino]imidazole-4-carboxamide
      isomerase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: This is the defining catalytic activity of HisA.
    action: ACCEPT
    reason: >-
      GO:0003949 matches EC 5.3.1.16, RHEA:15469, the reviewed product name,
      and the bacterial HisA family assignments.
- term:
    id: GO:0005737
    label: cytoplasm
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: located_in
  review:
    summary: HisA is a soluble cytoplasmic biosynthetic enzyme.
    action: KEEP_AS_NON_CORE
    reason: >-
      The location is supported by UniProt but is contextual rather than the
      core biochemical function.
