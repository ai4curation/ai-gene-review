suggested_questions:
- question: What is the exact molecular role of PP_2638 in KT2440 cellulose export, pore formation, or synthase-complex assembly?
- question: Should PP_2638 be curated under a broader BcsC/export-support term if GO has or needs a more specific molecular-function representation?
suggested_experiments:
- description: Compare cellulose production, cell-surface cellulose retention, and extracellular cellulose export in wild-type and PP_2638 deletion strains.
