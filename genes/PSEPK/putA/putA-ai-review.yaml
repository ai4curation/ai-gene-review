description: putA encodes bifunctional proline utilization protein PutA, with proline dehydrogenase and delta-1-pyrroline-5-carboxylate
  dehydrogenase activities that oxidize L-proline to L-glutamate, plus a predicted DNA-binding transcriptional repressor role
  for the proline-utilization operon.
