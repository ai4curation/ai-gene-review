id: Q88ND5
gene_symbol: algA
product_type: PROTEIN
aliases:
- PP_1277
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: AlgA is a bifunctional nucleotide-sugar biosynthesis enzyme that combines
  mannose-6-phosphate isomerase activity with mannose-1-phosphate guanylyltransferase
  activity. In Pseudomonas putida KT2440 it catalyzes direct precursor-generating
  steps for GDP-mannose synthesis, linking central carbohydrate metabolism to mannose-containing
  envelope and exopolysaccharide pathways. The strongest supported biological process
  assignment is GDP-mannose biosynthetic process; generic polysaccharide process terms
  appear broader than the immediate catalytic evidence.
existing_annotations:
- term:
    id: GO:0004475
    label: mannose-1-phosphate guanylyltransferase (GTP) activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  review:
    summary: This is one of the two core catalytic activities of AlgA. UniProt explicitly
      annotates the enzyme as a mannose-1-phosphate guanylyltransferase with EC 2.7.7.13
      and gives the reaction converting mannose-1-phosphate plus GTP into GDP-mannose
      plus diphosphate.
    action: ACCEPT
    reason: This term precisely captures the C-terminal nucleotidyltransferase activity
      of AlgA and should be retained as a core molecular function.
    supported_by:
    - reference_id: UniProt:Q88ND5
      supporting_text: 'RecName: Full=Mannose-1-phosphate guanylyltransferase; EC=2.7.7.13;'
    - reference_id: UniProt:Q88ND5
      supporting_text: Reaction=alpha-D-mannose 1-phosphate + GTP + H(+) = GDP-alpha-D-mannose
        + diphosphate; EC=2.7.7.13;
- term:
    id: GO:0004476
    label: mannose-6-phosphate isomerase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  review:
    summary: UniProt also explicitly assigns AlgA mannose-6-phosphate isomerase activity
      with EC 5.3.1.8, catalyzing the reversible interconversion of mannose-6-phosphate
      and fructose-6-phosphate. This is the second core catalytic activity of the
      bifunctional enzyme.
    action: ACCEPT
    reason: This term precisely captures the N-terminal isomerase activity of AlgA
      and should be retained as a core molecular function.
    supported_by:
    - reference_id: UniProt:Q88ND5
      supporting_text: 'RecName: Full=Mannose-6-phosphate isomerase; EC=5.3.1.8;'
    - reference_id: UniProt:Q88ND5
      supporting_text: Reaction=D-mannose 6-phosphate = D-fructose 6-phosphate; EC=5.3.1.8;
- term:
    id: GO:0016779
    label: nucleotidyltransferase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: This annotation is directionally correct because AlgA has a guanylyltransferase/nucleotidyltransferase
      domain, but it is a broad parent term that adds little beyond the already present
      specific guanylyltransferase annotation.
    action: MARK_AS_OVER_ANNOTATED
    reason: GO:0004475 already captures the exact catalytic activity. The generic
      nucleotidyltransferase parent is redundant and not informative enough to represent
      core function.
    supported_by:
    - reference_id: UniProt:Q88ND5
      supporting_text: 'RecName: Full=Mannose-1-phosphate guanylyltransferase; EC=2.7.7.13;'
- term:
    id: GO:0000271
    label: polysaccharide biosynthetic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: AlgA contributes precursor supply for mannose-containing polysaccharides,
      including alginate by similarity, but the immediate biochemical evidence is
      for GDP-mannose precursor synthesis rather than a generic polysaccharide biosynthesis
      program.
    action: MARK_AS_OVER_ANNOTATED
    reason: The more direct process assignment is GO:0009298 GDP-mannose biosynthetic
      process. This broader term overstates the level of direct evidence for generic
      polysaccharide biosynthesis.
    supported_by:
    - reference_id: UniProt:Q88ND5
      supporting_text: Produces a precursor for alginate polymerization.
    - reference_id: UniProt:Q88ND5
      supporting_text: 'PATHWAY: Nucleotide-sugar biosynthesis; GDP-alpha-D-mannose
        biosynthesis; GDP-alpha-D-mannose from alpha-D-mannose 1-phosphate (GTP route):
        step 1/1.'
- term:
    id: GO:0005976
    label: polysaccharide metabolic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: This term is even broader than the polysaccharide biosynthetic process
      annotation and encompasses many downstream contexts not directly shown by the
      evidence reviewed here.
    action: MARK_AS_OVER_ANNOTATED
    reason: The evidence supports precursor synthesis in GDP-mannose metabolism, not
      a generic polysaccharide metabolic role. The more direct core process is GO:0009298.
    supported_by:
    - reference_id: UniProt:Q88ND5
      supporting_text: 'PATHWAY: Nucleotide-sugar biosynthesis; GDP-alpha-D-mannose
        biosynthesis; alpha-D-mannose 1-phosphate from D-fructose 6-phosphate: step
        1/2.'
    - reference_id: UniProt:Q88ND5
      supporting_text: 'PATHWAY: Nucleotide-sugar biosynthesis; GDP-alpha-D-mannose
        biosynthesis; GDP-alpha-D-mannose from alpha-D-mannose 1-phosphate (GTP route):
        step 1/1.'
- term:
    id: GO:0009298
    label: GDP-mannose biosynthetic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  review:
    summary: This is the most direct biological process assignment for AlgA. UniProt
      places the two AlgA catalytic reactions explicitly in the GDP-mannose biosynthetic
      pathway, with the isomerase activity contributing the upstream fructose-6-phosphate
      to mannose-phosphate conversion and the guanylyltransferase activity producing
      GDP-mannose itself.
    action: ACCEPT
    reason: This term captures the direct biochemical pathway role of AlgA and is
      the best-supported core process annotation among the available GOA process terms.
    supported_by:
    - reference_id: UniProt:Q88ND5
      supporting_text: 'PATHWAY: Nucleotide-sugar biosynthesis; GDP-alpha-D-mannose
        biosynthesis; GDP-alpha-D-mannose from alpha-D-mannose 1-phosphate (GTP route):
        step 1/1.'
    - reference_id: UniProt:Q88ND5
      supporting_text: 'PATHWAY: Nucleotide-sugar biosynthesis; GDP-alpha-D-mannose
        biosynthesis; alpha-D-mannose 1-phosphate from D-fructose 6-phosphate: step
        1/2.'
