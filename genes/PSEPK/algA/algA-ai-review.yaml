proposed_new_terms: []
suggested_questions:
- question: In P. putida KT2440, what fraction of AlgA-dependent GDP-mannose flux
    is committed to alginate production versus other mannose-containing envelope glycans
    under biofilm-inducing or stress conditions?
- question: Does AlgA have condition-specific regulatory coupling to the rest of the
    alginate biosynthetic machinery in KT2440, or is it primarily a shared housekeeping
    precursor enzyme that is recruited into multiple pathways?
suggested_experiments:
- description: Construct an algA depletion or conditional-expression strain and quantify
    GDP-mannose, alginate output, and other mannose-containing glycans across planktonic,
    biofilm, and osmotic-stress conditions.
  experiment_type: Conditional genetics with targeted metabolite and polysaccharide
    profiling
  hypothesis: AlgA is a shared precursor-supply enzyme whose contribution to alginate
    production becomes most apparent under conditions that induce matrix synthesis.
- description: Purify AlgA and measure both catalytic activities in vitro, including
    metal dependence of the isomerase reaction and kinetic partitioning between the
    two domains.
  experiment_type: Enzyme biochemistry
  hypothesis: AlgA will show robust bifunctional activity, with the isomerase reaction
    displaying the predicted cobalt dependence noted in UniProt and the guanylyltransferase
    reaction directly generating GDP-mannose.
