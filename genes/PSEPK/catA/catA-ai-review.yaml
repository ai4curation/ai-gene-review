- id: PMID:12534463
  title: Complete genome sequence and comparative analysis of the metabolically
    versatile Pseudomonas putida KT2440
  findings:
  - statement: >-
      The P. putida KT2440 genome encodes genes for aromatic compound
      degradation pathways including the beta-ketoadipate pathway via the cat
      regulon.
    supporting_text: >-
      Pseudomonas putida is a metabolically versatile saprophytic soil
      bacterium... Sequence analysis of the 6.18 Mb genome of strain KT2440
      reveals diverse transport and metabolic systems.
- id: PMID:24612402
  title: >-
    A second chromosomal copy of the catA gene endows Pseudomonas putida mt-2
    with an enzymatic safety valve for excess of catechol
  findings:
  - statement: >-
      CatA (PP_3713) is the dominant catechol 1,2-dioxygenase in P. putida
      KT2440, with Km=1.3 uM and Vmax=6.6 umol/min/mg for catechol. The
      paralog CatA2 (PP_3166) has lower affinity (Km=7.4 uM) and much lower
      activity (Vmax=0.3 umol/min/mg), serving as a safety valve at high
      catechol concentrations.
    supporting_text: >-
      WT crude extract C1,2O activity: 1.2 umol/min/mg; deltaCatA2: 0.96;
      deltaCatA: 0.08. Double knockout deltaCatA deltaCatA2 has no detectable
      activity and cannot grow on 5 mM benzoate.
  - statement: >-
      CatA has narrow substrate specificity: 100% on catechol, 44% on
      4-methylcatechol, 5% on 3-methylcatechol, 1.7% on 4-chlorocatechol,
      less than 1% on protocatechuate.
    supporting_text: >-
      Substrate specificity comparison between purified CatA and CatA2 enzymes
      from KT2440.
- id: PMID:12148539
  title: >-
    Genomic analysis of the aromatic catabolic pathways from Pseudomonas putida
    KT2440
  findings:
  - statement: >-
      KT2440 has both catA (PP_3713) in the cat cluster and catA2 in the ben
      cluster, both encoding catechol 1,2-dioxygenases.
    supporting_text: >-
      Genomic analysis identified both catA and catA2 annotated as catechol
      1,2-dioxygenases, with catA2 located in the benzoate (ben) cluster.
- id: PMID:21893120
  title: >-
    Generation of a catR deficient mutant of P. putida KT2440 that produces
    cis,cis-muconate from benzoate at high rate and yield
  findings:
  - statement: >-
      CatR is a LysR-type regulator that induces cat genes in response to
      cis,cis-muconate. A catR point mutation abolishes cat operon induction.
    supporting_text: >-
      A point mutation in catR can abolish cat operon induction, altering
      catechol processing capacity and enabling muconate accumulation
      phenotypes.
