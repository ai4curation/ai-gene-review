    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      Direct work identifies PP_4545 as the medium-chain-acyl-CoA-selective
      FabH2, and the EC mapping supplies the octanoyl-CoA-specific child term.
    supported_by:
