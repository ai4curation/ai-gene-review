taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: >-
  PP_4545, named FabH2 in the experimental literature, is a
  beta-ketoacyl-ACP synthase III that initiates type-II fatty-acid synthesis
  with medium-chain acyl-CoA primers. Its annotated octanoyl-CoA reaction
  produces 3-oxodecanoyl-ACP and allows fatty-acid synthesis to enter at a
  longer chain length than the acetyl-CoA-dependent FabH1 route.
