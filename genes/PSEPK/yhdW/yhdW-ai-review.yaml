  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: yhdW (PP_1297) encodes the predicted solute-binding component of the adjacent PP_1297-PP_1300 YhdWXYZ amino-acid
  ABC importer. Its product name, bacterial solute-binding protein 3 family assignment, signal peptide, and adjacency to the
  YhdX/YhdY permeases and YhdZ ABC ATPase support a substrate-recognition role in amino-acid uptake, while the exact transported
  amino acid remains unresolved.
