taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: ogt encodes O6-alkylguanine-DNA alkyltransferase/MGMT in Pseudomonas putida KT2440. It repairs O6-methylguanine
  and O4-methylthymine lesions by stoichiometric transfer of the alkyl group from damaged DNA to an active-site cysteine,
  a suicide methyltransferase reaction in the cytoplasm.
