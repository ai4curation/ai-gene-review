id: Q88QG7
gene_symbol: dxs
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: dxs encodes 1-deoxy-D-xylulose-5-phosphate synthase, a thiamine-diphosphate-dependent enzyme that condenses pyruvate
  and glyceraldehyde 3-phosphate to DXP. DXP is the entry metabolite feeding the bacterial MEP pathway for IPP/DMAPP biosynthesis
  and is also a precursor for thiamine biosynthesis.
