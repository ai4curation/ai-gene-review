    id: GO:0000287
    label: magnesium ion binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000104
  qualifier: enables
  review:
    summary: Magnesium binding is required cofactor context for Dxs catalysis.
    action: KEEP_AS_NON_CORE
    reason: >-
      UniProt records one bound Mg2+ per subunit, but the specific DXP synthase
      activity is the evolved core function.
    supported_by:
    - reference_id: file:PSEPK/dxs/dxs-uniprot.txt
      supporting_text: Binds 1 Mg(2+) ion per subunit.
