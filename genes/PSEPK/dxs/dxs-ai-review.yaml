id: Q88QG7
gene_symbol: dxs
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: >-
  dxs encodes thiamine-diphosphate-dependent 1-deoxy-D-xylulose-5-phosphate
  synthase. It condenses pyruvate with glyceraldehyde 3-phosphate to form DXP,
  the entry metabolite for the methylerythritol phosphate route to isoprenoid
  precursors and a shared precursor used in thiamine biosynthesis.
existing_annotations:
