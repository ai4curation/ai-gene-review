id: Q88DU4
gene_symbol: dapB
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: >-
  dapB (PP_4725/Q88DU4) encodes 4-hydroxy-tetrahydrodipicolinate reductase, the
  DapB enzyme of the diaminopimelate branch of L-lysine biosynthesis. It reduces
  4-hydroxy-tetrahydrodipicolinate using NAD(P)H-linked chemistry. In ppu00261 it
  is precursor amino-acid biosynthesis context rather than direct evidence for a
  complete monobactam pathway.
