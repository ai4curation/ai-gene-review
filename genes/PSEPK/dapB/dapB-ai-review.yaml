id: Q88DU4
gene_symbol: dapB
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: >-
  dapB encodes 4-hydroxy-tetrahydrodipicolinate reductase (EC 1.17.1.8), which
  reduces the DapA product to tetrahydrodipicolinate in the second dedicated
  reaction of the diaminopimelate route to L-lysine. The reviewed KT2440 enzyme
  can use NADPH or NADH.
existing_annotations:
