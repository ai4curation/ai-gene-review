    id: GO:0005737
    label: cytoplasm
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: located_in
  review:
    summary: DapB is a soluble cytoplasmic biosynthetic enzyme.
    action: KEEP_AS_NON_CORE
    reason: The location is valid but secondary to the reaction.
- term:
    id: GO:0005829
    label: cytosol
  evidence_type: IEA
  original_reference_id: GO_REF:0000118
  qualifier: located_in
  review:
    summary: This duplicates the retained bacterial cytoplasm annotation.
    action: MARK_AS_OVER_ANNOTATED
    reason: No distinct DapB pool is established by the parent/child location pair.
- term:
    id: GO:0008839
    label: 4-hydroxy-tetrahydrodipicolinate reductase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: This is the defining DapB molecular function.
    action: ACCEPT
    reason: EC 1.17.1.8, the reviewed UniProt record, HAMAP, and TIGR00036 agree.
    supported_by:
    - reference_id: file:PSEPK/dapB/dapB-uniprot.txt
