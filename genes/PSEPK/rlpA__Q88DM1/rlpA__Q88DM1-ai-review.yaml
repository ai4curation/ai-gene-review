description: rlpA (PP_4804; UniProt Q88DM1) encodes the second KT2440 RlpA-family endolytic peptidoglycan transglycosylase
  paralog. This copy has RlpA/DPBB and SPOR-like domains, supporting lytic endotransglycosylase activity plus peptidoglycan-binding
  context during cell-wall remodeling.
