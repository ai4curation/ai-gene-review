taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: spuH (PP_5177) encodes a predicted multi-pass inner-membrane permease subunit of the PP_5177-PP_5181 Spu/Pot
  spermidine/putrescine ABC importer. UniProt names it as a PotI-like putrescine transport-system permease and assigns MetI-like
  binding-protein-dependent transporter features, supporting a component role in polyamine transmembrane import.
