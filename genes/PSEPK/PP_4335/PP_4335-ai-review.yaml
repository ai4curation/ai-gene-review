    summary: Plasma membrane is correct for this single-pass MotB-like stator subunit, but
      the core biological context is the flagellar stator rather than generic membrane residence.
    action: KEEP_AS_NON_CORE
    reason: PP_4335 is inferred to be the B-like subunit of the MotCD stator in the main P.
      putida flagellar cluster. Plasma membrane is accurate as a cellular location, while
      the more informative synthesis is stator-complex anchoring and flagellum-dependent motility.
