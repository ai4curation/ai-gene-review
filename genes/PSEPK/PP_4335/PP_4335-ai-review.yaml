  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: PP_4335 encodes the MotB-like B subunit candidate of the MotCD flagellar stator
  in Pseudomonas putida KT2440. The protein is a single-pass membrane protein with MotB-plug
  and OmpA-like periplasmic-domain signatures, consistent with a role in anchoring the MotCD
  stator to the cell wall while ion flow through the stator powers flagellar rotation. It
  is distinct from the second MotAB stator encoded by motA/motB outside the main flagellar
  cluster.
