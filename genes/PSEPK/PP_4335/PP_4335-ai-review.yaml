suggested_questions:
- question: Under which viscosity or agar conditions does PP_4335/MotD contribute most strongly
    to KT2440 motility relative to the MotAB stator?
- question: Does PP_4335 directly bind peptidoglycan and the PP_4336 MotA-like partner in
    the same manner as canonical MotB-family stator B subunits?
suggested_experiments:
- description: Construct PP_4335, PP_4336, motAB, and combined stator deletions with complementation,
    then quantify swimming, wrapped-mode formation, and agar spreading.
- description: Test the predicted OmpA-like periplasmic domain for peptidoglycan binding and
    stator anchoring by domain mutagenesis and localization assays.
