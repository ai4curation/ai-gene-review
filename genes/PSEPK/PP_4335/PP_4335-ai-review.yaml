- id: PMID:36409076
  title: Role of the Two Flagellar Stators in Swimming Motility of Pseudomonas putida.
  findings:
  - statement: P. putida has MotAB and MotCD stators.
    supporting_text: In the soil bacterium Pseudomonas putida, the motor torque for flagellar
      rotation is generated by the two stators MotAB and MotCD.
  - statement: PP_4336 and PP_4335 encode the MotCD stator in the main flagellar cluster.
    supporting_text: P. putida has a large gene cluster for flagellar motility comprising
      the genes for the stator MotCD (PP4336 and PP4335).
