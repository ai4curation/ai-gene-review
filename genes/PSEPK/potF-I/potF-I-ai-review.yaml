description: potF-I (PP_0873) encodes a predicted periplasmic putrescine/polyamine substrate-binding protein adjacent to, but functionally distinct from, the PP_0868-PP_0871 compatible-solute ABC importer. UniProt and InterPro support polyamine binding and polyamine transport context, while the cognate permease/ATPase partners for this specific PotF-I copy remain unresolved.
