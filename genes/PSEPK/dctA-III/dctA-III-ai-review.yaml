description: dctA-III encodes a predicted C4-dicarboxylate inner-membrane symporter in Pseudomonas putida
  KT2440. Its sodium/dicarboxylate symporter domains support C4-dicarboxylate uptake by family-level inference,
  with exact substrate range unresolved.
