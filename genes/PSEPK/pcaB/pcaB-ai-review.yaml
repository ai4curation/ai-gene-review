id: Q88N37
gene_symbol: pcaB
product_type: PROTEIN
aliases:
  - PP_1379
status: COMPLETE
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: >-
  PcaB is a 3-carboxy-cis,cis-muconate cycloisomerase (EC 5.5.1.2) in the
  protocatechuate branch of the beta-ketoadipate pathway. It is a fumarase class
  II cycloisomerase that catalyzes anti cycloisomerization of
  3-carboxy-cis,cis-muconate during aromatic compound catabolism. Structural work
  on the Pseudomonas putida enzyme showed that it is a homotetrameric fumarase
  class II family enzyme, consistent with the UniProt/NCBIfam assignment of pcaB.
existing_annotations:
  - term:
      id: GO:0003824
      label: catalytic activity
    evidence_type: IEA
    original_reference_id: GO_REF:0000002
    review:
      summary: >-
        PcaB is catalytic, but this root-level molecular function is too broad to
        be useful when the specific cycloisomerase activity is already present as
        GO:0047472.
      action: MARK_AS_OVER_ANNOTATED
      reason: >-
        The annotation is technically true but uninformative. GO:0047472
        (3-carboxy-cis,cis-muconate cycloisomerase activity) captures the actual
        enzymatic function at the appropriate level of specificity.
      supported_by:
        - reference_id: UniProt:Q88N37
          supporting_text: "RecName: Full=3-carboxy-cis,cis-muconate cycloisomerase"
        - reference_id: UniProt:Q88N37
          supporting_text: "GO; GO:0047472; F:3-carboxy-cis,cis-muconate cycloisomerase activity; IEA:UniProtKB-UniRule"

  - term:
      id: GO:0016829
      label: lyase activity
    evidence_type: IEA
    original_reference_id: GO_REF:0000117
    review:
      summary: >-
        PcaB belongs to the fumarase/aspartase lyase superfamily, so lyase activity
        is not wrong. However, this parent term is redundant once the specific
        3-carboxy-cis,cis-muconate cycloisomerase activity annotation is present.
      action: MARK_AS_OVER_ANNOTATED
      reason: >-
        The review should retain the specific catalytic term rather than a generic
        parent. GO:0016829 adds little beyond indicating broad enzyme class, while
        GO:0047472 identifies the actual substrate-level reaction.
      supported_by:
        - reference_id: PMID:15301541
          supporting_text: "PpCMLE is a homotetramer and belongs to the ... fumarase class II superfamily."
        - reference_id: UniProt:Q88N37
          supporting_text: "Belongs to the class-II fumarase/aspartase family."

  - term:
      id: GO:0019619
      label: 3,4-dihydroxybenzoate catabolic process
    evidence_type: IEA
    original_reference_id: GO_REF:0000002
    review:
      summary: >-
        This process term matches the known biology of pcaB. PcaB/CMLE is a key
        enzyme in the protocatechuate branch of the beta-ketoadipate pathway, which
        catabolizes 3,4-dihydroxybenzoate (protocatechuate) through ring-cleavage
        intermediates en route to central metabolism.
      action: ACCEPT
      reason: >-
        The term is specific enough and consistent with both the enzyme literature
        and UniProt pathway assignment. PcaB acts downstream of protocatechuate
        ring cleavage as part of the canonical protocatechuate branch of aromatic
        compound degradation.
      supported_by:
        - reference_id: PMID:15301541
          supporting_text: "the key enzymes in the ... protocatechuate branch of the beta-ketoadipate pathway in microorganisms"
        - reference_id: UniProt:Q88N37
          supporting_text: "beta-ketoadipate pathway;"
        - reference_id: file:PSEPK/pcaB/pcaB-deep-research-falcon.md
          supporting_text: "encodes **3-carboxy-cis,cis-muconate cycloisomerase** (EC **5.5.1.2**), an enzyme of the **protocatechuate (PCA) branch of the β-ketoadipate pathway**"

  - term:
      id: GO:0047472
      label: 3-carboxy-cis,cis-muconate cycloisomerase activity
    evidence_type: IEA
    original_reference_id: GO_REF:0000120
    review:
      summary: >-
        This is the core molecular function of PcaB. The enzyme is explicitly
        annotated in UniProt as EC 5.5.1.2, and the Pseudomonas putida structure
        paper identifies the purified enzyme as a 3-carboxy-cis,cis-muconate
        lactonizing/cycloisomerizing enzyme in the protocatechuate branch.
      action: ACCEPT
      reason: >-
        GO:0047472 precisely describes the catalytic activity established for this
        protein family and directly supported for the P. putida enzyme by the
        2004 structure/biochemistry paper. This term should be treated as the core
        molecular-function annotation for pcaB.
      supported_by:
        - reference_id: UniProt:Q88N37
          supporting_text: "RecName: Full=3-carboxy-cis,cis-muconate cycloisomerase"
        - reference_id: UniProt:Q88N37
          supporting_text: "EC=5.5.1.2 {ECO:0000256|ARBA:ARBA00066791, ECO:0000256|NCBIfam:TIGR02426};"
        - reference_id: PMID:15301541
          supporting_text: "catalyze the conversion of 3-carboxy-cis,cis-muconate to muconolactones"
        - reference_id: file:PSEPK/pcaB/pcaB-deep-research-falcon.md
          supporting_text: "catalyzes cycloisomerization (lactonization) of **3-carboxy-cis,cis-muconate** to **γ-carboxymuconolactone / 4-carboxymuconolactone**"

