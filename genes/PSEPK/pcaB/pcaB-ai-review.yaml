core_functions:
  - description: >-
      PcaB is the cycloisomerase that converts 3-carboxy-cis,cis-muconate in the
      protocatechuate branch of aromatic-compound degradation. This activity
      channels ring-cleavage intermediates through the beta-ketoadipate pathway.
    molecular_function:
      id: GO:0047472
      label: 3-carboxy-cis,cis-muconate cycloisomerase activity
    directly_involved_in:
      - id: GO:0019619
        label: 3,4-dihydroxybenzoate catabolic process
    supported_by:
      - reference_id: PMID:15301541
        supporting_text: "the key enzymes in the ... protocatechuate branch of the beta-ketoadipate pathway in microorganisms"
      - reference_id: PMID:15301541
        supporting_text: "catalyze the conversion of 3-carboxy-cis,cis-muconate to muconolactones"
      - reference_id: UniProt:Q88N37
        supporting_text: "beta-ketoadipate pathway;"

suggested_questions:
  - question: >-
      Which residues in P. putida PcaB are most critical for the anti
      cycloisomerization mechanism in vivo?
  - question: >-
      How tightly is pcaB transcription coordinated with the rest of the pca
      regulon during growth on protocatechuate or 4-hydroxybenzoate?
  - question: >-
      Does PcaB display measurable substrate promiscuity toward related muconate
      intermediates in KT2440?

suggested_experiments:
  - description: >-
      Purify PcaB and measure turnover of 3-carboxy-cis,cis-muconate to define
      kinetic parameters and substrate specificity.
    hypothesis: >-
      PcaB is the principal 3-carboxy-cis,cis-muconate cycloisomerase supporting
      protocatechuate catabolism in KT2440.
  - description: >-
      Mutate active-site residues highlighted by the 1RE5 structure and test
      effects on enzyme activity and growth on protocatechuate-derived substrates.
    hypothesis: >-
      Conserved active-site residues identified in the structure are required for
      catalytic cycloisomerization in vivo.
  - description: >-
      Perform transcriptomics or promoter-reporter assays for pcaB during growth
      on protocatechuate, 4-hydroxybenzoate, and nonaromatic carbon sources.
    hypothesis: >-
      pcaB is induced as part of the protocatechuate branch of the beta-ketoadipate
      regulon rather than constitutively expressed.
