    label: L-glutamate N-acetyltransferase activity, acting on acetyl-CoA as donor
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: This is the defining ArgA reaction that initiates acetylated-ornithine synthesis.
    action: ACCEPT
    reason: The reviewed UniProt record assigns EC 2.3.1.1 and RHEA:24292 to P0A0Z9.
    supported_by:
    - reference_id: file:PSEPK/argA/argA-uniprot.txt
      supporting_text: Full=Amino-acid acetyltransferase
    - reference_id: file:PSEPK/argA/argA-deep-research-openscientist.md
      supporting_text: >-
        The gene **argA** (ordered locus **PP_5185**; UniProt **P0A0Z9**) of
        *Pseudomonas putida* (strain ATCC 47054 / DSM 6125 / KT2440) encodes
        **N-acetylglutamate synthase (NAGS; also called amino-acid
        acetyltransferase or AGS; EC 2.3.1.1)**.
