id: P0A0Z9
gene_symbol: argA
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: >-
  ArgA (PP_5185) is an amino-acid acetyltransferase (EC 2.3.1.1) that transfers
  an acetyl group from acetyl-CoA to L-glutamate, forming N-acetyl-L-glutamate
  in the first reaction of the acetylated-ornithine route to L-arginine. KT2440
  also encodes the bifunctional ArgJ enzyme with the same annotated initiating
  activity, although argA-mutant auxotrophy shows that ArgJ does not replace
  ArgA under the tested minimal-medium conditions.
existing_annotations:
