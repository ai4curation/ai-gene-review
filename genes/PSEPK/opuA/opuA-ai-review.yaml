  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: opuA (PP_2774) encodes a glycine betaine ABC transporter ATPase/permease fusion protein. Its N-terminal ABC transporter ATP-binding domain, C-terminal MetI-like multi-pass permease domain, plasma-membrane localization, and adjacent PP_2775 substrate-binding component support an ATP-dependent glycine-betaine compatible-solute import role.
