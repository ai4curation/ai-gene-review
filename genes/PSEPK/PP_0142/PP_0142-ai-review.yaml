suggested_questions:
- question: Does the PP_0140-PP_0142 Mce/MlaD-MlaE-like locus form an active phospholipid ABC transporter in P. putida KT2440,
    and what is the directionality and physiological envelope-stress role?
suggested_experiments:
- description: Construct PP_0140, PP_0141, and PP_0142 single and combined deletion mutants and assay outer-membrane phospholipid
    asymmetry, envelope permeability, solvent sensitivity, and complementation by the intact locus.
  experiment_type: targeted Mce/MlaD-MlaE-like phospholipid transport phenotyping
