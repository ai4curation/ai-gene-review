description: PP_0142 encodes a predicted multi-pass inner-membrane MlaE-family permease in the PP_0140-PP_0142 locus. UniProt
  places it in the cell inner membrane and assigns MlaE-family lipid ABC transporter permease features, supporting the existing
  phospholipid transport and ABC-transporter-complex annotations as a first-pass putative envelope phospholipid transporter
  call.
