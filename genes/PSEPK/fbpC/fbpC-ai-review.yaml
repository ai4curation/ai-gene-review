suggested_questions:
- question: Does the PP_5135-PP_5137 FbpABC-like locus import free ferric iron, a ferric chelate,
    or another iron compound in KT2440?
suggested_experiments:
- description: Measure iron uptake and growth phenotypes for the matched transporter deletion
    mutants under iron limitation, then complement the full locus to resolve substrate specificity
    and missing-partner assignments.
  experiment_type: targeted ABC-transporter mutant uptake and growth assay
