  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: fbpC (PP_5137) encodes the predicted ATP-binding energy-coupling component of
  the PP_5135-PP_5137 FbpABC-like ferric/iron ABC importer. Its ferric-iron ABC transporter
  product name and ABC ATPase domains support ATP hydrolysis-driven ferric/iron import with
  PP_5135 and PP_5136.
