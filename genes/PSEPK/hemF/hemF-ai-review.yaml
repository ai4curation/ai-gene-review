    review:
      summary: This term captures the oxygen-dependent HemF reaction.
      action: ACCEPT
      reason: >-
        UniProt assigns EC 1.3.3.3 and explicitly describes aerobic oxidative
        decarboxylation of coproporphyrinogen III to protoporphyrinogen IX.
      supported_by:
        - reference_id: file:PSEPK/hemF/hemF-uniprot.txt
          supporting_text: Catalyzes the aerobic
  - term:
