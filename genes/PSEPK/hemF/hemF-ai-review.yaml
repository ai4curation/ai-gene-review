      summary: The pathway assignment is correct and can be made endpoint-specific for KT2440.
      action: MODIFY
      reason: >-
        HemF forms protoporphyrinogen IX in the oxygen-dependent late route
        leading to heme B, supporting the live endpoint term GO:0006785.
      proposed_replacement_terms:
        - id: GO:0006785
          label: heme B biosynthetic process
      supported_by:
        - reference_id: file:PSEPK/hemF/hemF-uniprot.txt
          supporting_text: "route): step 1/1."
  - term:
      id: GO:0006783
      label: heme biosynthetic process
    evidence_type: IEA
    original_reference_id: GO_REF:0000104
    qualifier: involved_in
    review:
      summary: HemF is a late enzyme in an aerobic realization of heme-b synthesis.
      action: ACCEPT
      reason: >-
        Its protoporphyrinogen IX product is oxidized to protoporphyrin IX and
        then ferrochelated to heme b.
      supported_by:
        - reference_id: file:PSEPK/hemF/hemF-uniprot.txt
          supporting_text: "FUNCTION: Involved in the heme biosynthesis."
  - term:
      id: GO:0042803
      label: protein homodimerization activity
    evidence_type: IEA
    original_reference_id: GO_REF:0000104
    qualifier: enables
    review:
      summary: Homodimerization is a plausible structural property of HemF.
      action: KEEP_AS_NON_CORE
      reason: >-
        UniProt predicts a homodimer, but oligomerization is ancillary to the
        substrate-level oxidase function and should not define the core activity.
      supported_by:
        - reference_id: file:PSEPK/hemF/hemF-uniprot.txt
          supporting_text: "SUBUNIT: Homodimer."
  - term:
      id: GO:0042803
      label: protein homodimerization activity
    evidence_type: ISS
    original_reference_id: GO_REF:0000024
    qualifier: enables
    review:
      summary: This independent orthology transfer supports the same non-core oligomeric property.
      action: KEEP_AS_NON_CORE
      reason: >-
        Duplicate evidence is not intrinsically erroneous; both records can be
        retained as non-core while catalysis remains the defining function.
      supported_by:
        - reference_id: file:PSEPK/hemF/hemF-uniprot.txt
          supporting_text: "SUBUNIT: Homodimer."
