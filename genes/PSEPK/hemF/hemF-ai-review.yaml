  - id: file:PSEPK/hemF/hemF-deep-research-openscientist.md
    title: OpenScientist research report for PSEPK hemF
    findings:
      - statement: >-
          The report recovers the oxygen-dependent HemF reaction while
          acknowledging the absence of direct KT2440 enzymology or genetics.
        supporting_text: >-
          not by direct kinetic characterization of the KT2440 enzyme or a
          PP_0073 knockout
    reference_review:
      relevance: HIGH
      correctness: MISCITED
      review_notes: >-
        The report correctly identifies RHEA:18257, cytoplasmic localization,
        and the HemF/HemN oxygen-regime question. It presents unsaved sequence
        analysis and exact residue mapping, transfers human structure,
        mechanism, and dimer details, calls the target cofactor-free despite
        its UniProt-predicted divalent-metal sites, and assumes HemF dominance
        during aerobic KT2440 growth. Its pathway sketch also omits the
        HemJ-family PP_0431 step. Those target-specific claims were not retained.
