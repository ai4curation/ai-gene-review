suggested_questions:
  - question: Under which oxygen ranges does KT2440 switch flux between HemF and HemN?
suggested_experiments:
  - hypothesis: HemF is the principal coproporphyrinogen oxidase during aerobic growth.
    description: >-
      Compare hemF and hemN single and double mutants across oxygen gradients,
      measuring growth, heme b, and coproporphyrinogen/protoporphyrinogen ratios.
