status: COMPLETE
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: >-
  HemF is the cytoplasmic oxygen-dependent coproporphyrinogen-III oxidase. It
  uses molecular oxygen and a divalent metal cofactor to oxidatively
  decarboxylate two propionate side chains of coproporphyrinogen III, producing
  protoporphyrinogen IX. KT2440 also encodes HemN, providing a distinct
  oxygen-independent alternative for this pathway position.
