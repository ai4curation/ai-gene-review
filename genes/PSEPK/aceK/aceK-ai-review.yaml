taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: AceK is a bifunctional isocitrate dehydrogenase kinase/phosphatase (IDHK/P)
  that both phosphorylates (inactivating) and dephosphorylates (reactivating) isocitrate
  dehydrogenase (IDH) on a specific serine residue. By switching IDH between its active
  and inactive states, AceK controls the partitioning of isocitrate between the
  tricarboxylic acid (TCA) cycle and the glyoxylate bypass in response to the carbon
  source. When cells grow on glucose, IDH is unphosphorylated and fully active and flux
  proceeds through the TCA cycle; when cells grow on acetate, ethanol, or fatty acids,
  AceK phosphorylates and inactivates IDH, causing isocitrate to accumulate and be
  diverted through isocitrate lyase and malate synthase (the glyoxylate shunt), enabling
  net carbon assimilation from C2 substrates. Both the kinase and the opposing phosphatase
  reactions are ATP-dependent and catalyzed by the same enzyme. AceK is a cytoplasmic
  protein with a conserved active site and ATP-binding region, and belongs to the AceK
  family.
