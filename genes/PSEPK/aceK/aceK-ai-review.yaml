suggested_questions:
- question: Is the P. putida AceK phosphatase reaction ATP-dependent and carried out at the
    same active site as the kinase, as in the E. coli ortholog?
  experts:
  - Bacterial metabolism biochemists
  - Enzymologists
- question: Which metabolites (e.g. AMP, ADP, isocitrate, oxaloacetate, NADPH) allosterically
    bias AceK toward kinase versus phosphatase activity in P. putida?
  experts:
  - Metabolic regulation specialists
  - Structural enzymologists
- question: How is aceK expression and the glyoxylate-bypass switch regulated during growth
    of P. putida on fatty acids and other C2 substrates?
  experts:
  - Microbial physiologists
  - Systems biologists
suggested_experiments:
- experiment_type: Enzyme assay
  description: Reconstitute purified P. putida AceK with its cognate IDH and measure both
    ATP-dependent kinase and phosphatase activities, confirming bifunctionality and ATP
    dependence of dephosphorylation.
- experiment_type: Growth phenotyping
  description: Construct an aceK (PP_4565) deletion mutant and assay growth on acetate,
    ethanol, and fatty acids versus glucose to confirm the glyoxylate-bypass switching role.
- experiment_type: Phosphoproteomics
  description: Quantify IDH serine phosphorylation in P. putida across carbon sources
    (glucose vs acetate/fatty acids) to map AceK activity to in vivo IDH inactivation.
