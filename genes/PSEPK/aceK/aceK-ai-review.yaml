    summary: This InterPro2GO process term is misleading for AceK. AceK is active during
      growth on acetate/ethanol/fatty acids, where it phosphorylates and inactivates IDH;
      on glucose IDH is dephosphorylated and active and AceK signaling is largely off.
    action: MARK_AS_OVER_ANNOTATED
    reason: The functional context of AceK is the glyoxylate-bypass switch during growth
      on C2/fatty-acid substrates, not glucose metabolism. The glucose metabolic process
      term is over-broad and misleading.
