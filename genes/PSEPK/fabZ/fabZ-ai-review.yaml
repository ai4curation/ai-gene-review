- id: file:PSEPK/fabZ/fabZ-deep-research-openscientist.md
  title: OpenScientist deep research for PSEPK fabZ
  findings:
  - statement: The report independently supports the core FabZ dehydration step.
    supporting_text: >-
      FabZ (Q88MG9, PP_1602) is the
      (3R)-hydroxyacyl-[acyl-carrier-protein] dehydratase (EC 4.2.1.59) that
      catalyzes the third, dehydration step of every elongation cycle in the
      bacterial type II fatty acid synthase (FAS-II) system of *Pseudomonas
      putida* KT2440.
    reference_section_type: RESULTS
  - statement: No direct biochemical or structural study of Q88MG9 was found.
    supporting_text: >-
      The *P. putida* KT2440 FabZ has not been purified, assayed, or
      crystallized.
    reference_section_type: CONCLUSIONS
  reference_review:
    relevance: HIGH
    correctness: UNVERIFIED
    review_notes: >-
      The exact-target family and reaction assessment agrees with reviewed
      UniProt. P. aeruginosa essentiality and target-specific hexameric,
      catalytic-residue, chain-range, and lipid-A mechanism claims were not
      imported because they are transferred from orthologs.
