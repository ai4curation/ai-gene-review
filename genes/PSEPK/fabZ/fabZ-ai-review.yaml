id: Q88MG9
gene_symbol: fabZ
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: >-
  FabZ is the broad-chain-range cytoplasmic
  (3R)-hydroxyacyl-ACP dehydratase of Pseudomonas putida KT2440. It converts
  hydroxyacyl-ACP intermediates to trans-2-enoyl-ACP during type-II
  fatty-acid elongation and helps partition hydroxyacyl-ACP pools between
  phospholipid/fatty-acid synthesis and lipid A precursor production.
