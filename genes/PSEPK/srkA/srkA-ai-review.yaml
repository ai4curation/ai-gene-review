  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: srkA (PP_0359) encodes Stress response kinase A, a soluble cytoplasmic SrkA/RdoA-family protein kinase in Pseudomonas
  putida KT2440. UniRule, Rhea, and family/domain evidence support ATP- and magnesium-dependent phosphorylation of serine/threonine
  protein substrates, but this first pass does not resolve the physiological substrates or the precise stress-signaling pathway
  controlled by the kinase.
