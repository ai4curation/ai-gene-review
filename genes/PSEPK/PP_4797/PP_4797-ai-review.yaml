    supporting_text: 'DR   InterPro; IPR005589; ArfA.'
  - reference_id: file:PSEPK/PP_4797/PP_4797-goa.tsv
    supporting_text: "GO:0072344\trescue of stalled cytosolic ribosome"
proposed_new_terms: []
suggested_questions: []
suggested_experiments:
- description: >-
    Reconstitute PP_4797 with Pseudomonas putida 70S ribosomes, RF2, and a
    defined nonstop-mRNA substrate to test RF2-dependent peptide release
    directly.
- description: >-
    Compare PP_4797 and tmRNA single mutants with the double mutant to test
    whether the two rescue systems are functionally redundant in KT2440.
