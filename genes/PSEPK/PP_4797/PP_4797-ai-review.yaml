id: Q88DM8
gene_symbol: PP_4797
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: >-
  PP_4797 encodes a short ArfA-family alternative ribosome-rescue factor. Its
  basic 54-residue product carries the ArfA domain associated with rescue of
  cytosolic ribosomes stalled on nonstop or truncated messages.
existing_annotations:
- term:
    id: GO:0072344
    label: rescue of stalled cytosolic ribosome
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: involved_in
  review:
    summary: The ribosome-rescue annotation matches the ArfA-family identity.
    action: ACCEPT
    reason: >-
      The 54-residue sequence is identified independently by InterPro and Pfam
      as ArfA and lacks the radical-SAM/LipA architecture required for lipoate
      synthesis.
    supported_by:
    - reference_id: file:PSEPK/PP_4797/PP_4797-uniprot.txt
      supporting_text: 'DR   InterPro; IPR005589; ArfA.'
    - reference_id: file:PSEPK/PP_4797/PP_4797-deep-research-openscientist.md
      supporting_text: >-
        PP_4797 (UniProt Q88DM8) encodes ArfA (alternative ribosome-rescue
        factor A), a small, basic, intrinsically disordered protein that rescues
        bacterial ribosomes stalled on truncated "non-stop" mRNAs. It is *not*
        a lipoyl synthase.
references:
- id: GO_REF:0000002
  title: Gene Ontology annotation through association of InterPro records with GO
    terms
  findings: []
- id: file:PSEPK/PP_4797/PP_4797-uniprot.txt
  title: UniProt entry Q88DM8 for PP_4797
  findings:
  - statement: >-
      Domain databases identify the short Q88DM8 product as an ArfA-family
      protein rather than a radical-SAM lipoyl synthase.
    supporting_text: 'DR   InterPro; IPR005589; ArfA.'
- id: file:PSEPK/PP_4797/PP_4797-goa.tsv
  title: QuickGO GOA annotations for PP_4797
  findings:
  - statement: >-
      The fetched GOA table contains the ArfA-associated cytosolic
      ribosome-rescue annotation reviewed here.
- id: file:PSEPK/PP_4797/PP_4797-deep-research-openscientist.md
  title: OpenScientist gene research report for PP_4797
  findings:
  - statement: >-
      Domain, sequence-length, and ortholog literature evidence support an
      ArfA-family ribosome-rescue role and contradict the automated lipoyl
      synthase name.
  - statement: >-
      No direct experimental characterization of PP_4797 in Pseudomonas putida
      was identified, so detailed mechanism is transferred from characterized
      proteobacterial ArfA orthologs.
core_functions:
- description: >-
    ArfA-family alternative rescue of stalled cytosolic ribosomes.
  directly_involved_in:
  - id: GO:0072344
    label: rescue of stalled cytosolic ribosome
  supported_by:
