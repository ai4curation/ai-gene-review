  review:
    summary: The ribosome-rescue annotation matches the ArfA-family identity.
    action: ACCEPT
    reason: >-
      The 54-residue sequence is identified independently by InterPro and Pfam
      as ArfA and lacks the radical-SAM/LipA architecture required for lipoate
      synthesis.
    supported_by:
    - reference_id: file:PSEPK/PP_4797/PP_4797-uniprot.txt
      supporting_text: 'DR   InterPro; IPR005589; ArfA.'
