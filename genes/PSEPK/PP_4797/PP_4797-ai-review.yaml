taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: >-
  PP_4797 encodes a short ArfA-family alternative ribosome-rescue factor. Its
  basic 54-residue product carries the ArfA domain associated with rescue of
  cytosolic ribosomes stalled on nonstop or truncated messages. The protein is
  not a lipoyl synthase despite the automated name currently attached to its
  UniProt entry.
