description: PP_2760 encodes a multi-pass inner-membrane permease component of the PP_2758-PP_2761 RbsABC D-ribose ABC importer. Its ribose transport permease product name, AraH/RbsC permease-family assignment, and local rbsA/ribose-binding context support a membrane-channel role in D-ribose import.
