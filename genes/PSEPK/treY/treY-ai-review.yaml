description: treY encodes a predicted maltooligosyl trehalose synthase in Pseudomonas putida KT2440. The enzyme has EC 5.4.99.15 and supports the TreY/TreZ route that converts alpha-glucan-derived maltooligosaccharides toward trehalose.
