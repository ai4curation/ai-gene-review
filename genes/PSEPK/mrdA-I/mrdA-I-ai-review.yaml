id: Q88GI2
gene_symbol: mrdA-I
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: mrdA-I encodes a PBP2/MrdA peptidoglycan D,D-transpeptidase paralog of Pseudomonas putida
  KT2440. It is an inner-membrane penicillin-binding protein with a periplasmic transpeptidase domain
  implicated in peptidoglycan cross-linking during cell-wall growth.
existing_annotations:
- term:
    id: GO:0003824
    label: catalytic activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000104
  qualifier: enables
  review:
    summary: catalytic activity is directionally related to PBP/carboxypeptidase chemistry but is less
      precise than the D-Ala-D-Ala carboxypeptidase/transpeptidase term.
    action: MODIFY
    reason: mrdA-I is supported as a D-Ala-D-Ala carboxypeptidase/transpeptidase-family peptidoglycan
      enzyme, so GO:0009002 is the better molecular-function term.
    proposed_replacement_terms:
    - id: GO:0009002
      label: serine-type D-Ala-D-Ala carboxypeptidase activity
    supported_by:
