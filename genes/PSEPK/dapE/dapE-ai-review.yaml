taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: dapE (PP_1525) encodes succinyl-diaminopimelate desuccinylase, a metallopeptidase-family enzyme in the succinylated diaminopimelate branch of bacterial L-lysine biosynthesis. It hydrolyzes N-succinyl-L,L-diaminopimelate to release L,L-diaminopimelate.
existing_annotations:
- term:
    id: GO:0006526
    label: L-arginine biosynthetic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000118
  qualifier: involved_in
  review:
    summary: The arginine-biosynthesis annotation appears to be DapE/ArgE-family over-propagation rather than this protein's physiological role.
    action: REMOVE
    reason: UniProt names this protein succinyl-diaminopimelate desuccinylase and places it in L-lysine biosynthesis via DAP; no PSEPK evidence supports an arginine-biosynthetic role.
    supported_by:
    - reference_id: file:PSEPK/dapE/dapE-goa.tsv
      supporting_text: "GO:0006526\tL-arginine biosynthetic process"
    - reference_id: file:PSEPK/dapE/dapE-uniprot.txt
      supporting_text: 'CC   -!- FUNCTION: Catalyzes the hydrolysis of N-succinyl-L,L-diaminopimelic'
- term:
    id: GO:0008270
    label: zinc ion binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000104
  qualifier: enables
  review:
    summary: Zinc binding is consistent with the metallopeptidase-family DapE enzyme but is not the core reaction.
    action: KEEP_AS_NON_CORE
    reason: Retain as metal/cofactor context.
    supported_by:
