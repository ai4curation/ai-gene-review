id: Q88MP5
gene_symbol: dapE
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: >-
  dapE encodes the metallodependent succinyl-diaminopimelate desuccinylase
  (EC 3.5.1.18) that hydrolyzes N-succinyl-LL-diaminopimelate to
  LL-diaminopimelate and succinate in the succinylated route of L-lysine
  biosynthesis. Its proteobacterial DapE-specific family distinguishes it from
  related ArgE acetylornithine deacetylases.
existing_annotations:
- term:
    id: GO:0006526
    label: L-arginine biosynthetic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000118
  qualifier: involved_in
  review:
    summary: This TreeGrafter process call reflects related ArgE enzymes, not PSEPK DapE.
    action: REMOVE
    reason: Q88MP5 has the DapE-specific reaction, pathway assignment, and NCBIfam:TIGR01246 signature.
- term:
    id: GO:0008270
    label: zinc ion binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000104
  qualifier: enables
  review:
    summary: Zinc binding is valid catalytic-metal context for DapE.
    action: KEEP_AS_NON_CORE
    reason: The metallohydrolase annotation supports metal binding, which is secondary to substrate-specific catalysis.
- term:
    id: GO:0008777
    label: acetylornithine deacetylase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000118
  qualifier: enables
  review:
    summary: This activity belongs to related ArgE-family proteins.
    action: REMOVE
    reason: >-
      Q88MP5 is assigned to the proteobacterial DapE subfamily and EC 3.5.1.18;
      no evidence supports acetylornithine as its physiological substrate.
- term:
    id: GO:0009014
    label: succinyl-diaminopimelate desuccinylase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: This is the defining DapE molecular function.
    action: ACCEPT
    reason: EC 3.5.1.18, HAMAP MF_01690, and NCBIfam:TIGR01246 support the same reaction.
    supported_by:
    - reference_id: file:PSEPK/dapE/dapE-uniprot.txt
      supporting_text: Full=Succinyl-diaminopimelate desuccinylase
- term:
    id: GO:0009085
    label: L-lysine biosynthetic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: involved_in
  review:
    summary: DapE deprotects LL-diaminopimelate in L-lysine biosynthesis.
    action: ACCEPT
    reason: UniProt assigns Q88MP5 to L-lysine biosynthesis via the DAP pathway.
- term:
    id: GO:0016787
    label: hydrolase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: This generic hydrolase term is redundant with the specific DapE activity.
    action: MARK_AS_OVER_ANNOTATED
    reason: GO:0009014 captures the substrate-specific reaction.
- term:
    id: GO:0050897
    label: cobalt ion binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000104
  qualifier: enables
  review:
    summary: Cobalt binding is plausible catalytic-metal context for DapE.
    action: KEEP_AS_NON_CORE
    reason: UniProt records cobalt for this metallohydrolase, but metal binding is secondary to catalysis.
