description: davB encodes the Dav-pathway lysine 2-monooxygenase candidate in Pseudomonas putida KT2440. Although automated UniProt/GOA transfers also assign tryptophan 2-monooxygenase and auxin-biosynthesis context, the ppu00310 module and GOA EC mapping support DavB as the L-lysine oxidation step that forms 5-aminopentanamide upstream of DavA.
