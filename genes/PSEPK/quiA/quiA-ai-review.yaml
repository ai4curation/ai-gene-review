  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: quiA (PP_3569) encodes a predicted membrane-associated PQQ-dependent quinate dehydrogenase in Pseudomonas putida KT2440. The protein belongs to the bacterial PQQ membrane dehydrogenase family, has multiple N-terminal transmembrane helices and a large PQQ beta-propeller dehydrogenase domain, and is annotated with EC 1.1.5.8 for quinone-dependent quinate oxidation. Its likely biological role is quinate and aromatic-compound catabolism.
