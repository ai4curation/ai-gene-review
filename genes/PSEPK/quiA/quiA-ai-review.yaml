  review:
    summary: TreeGrafter propagates a quinoprotein glucose dehydrogenase-like activity from the broader PQQ dehydrogenase family, but this entry is specifically annotated as quinate dehydrogenase.
    action: MARK_AS_OVER_ANNOTATED
    reason: The specific EC2GO term GO:0047519 quinate dehydrogenase (quinone) activity is present and better matches the protein name, EC assignment, and pathway context. Glucose dehydrogenase specificity is not supported for this gene in the supplied evidence.
