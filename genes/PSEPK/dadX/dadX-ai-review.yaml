taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: DadX is the catabolic alanine racemase of Pseudomonas putida KT2440. It is an experimentally characterized PLP-dependent enzyme that interconverts L-alanine and D-alanine, shows narrow preference for alanine stereoisomers, and likely supplies D-alanine for oxidation by DadA during D-alanine catabolism while also fitting the D-alanine biosynthesis GO process.
