    label: acetyl-CoA carboxylase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: Correct complex-level function, but not independently enabled by AccA.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      AccA is one carboxyltransferase subunit of heteromeric ACC. The complete
      reaction requires AccB, AccC, AccA, and AccD, so the core function uses
      contribution semantics.
    supported_by:
