- term:
    id: GO:0016874
    label: ligase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: Incorrect standalone reaction-class assignment for the AccA subunit.
    action: REMOVE
    reason: >-
      The isolated AccA catalytic half-reaction is a carboxyltransferase
      reaction (EC 2.1.3.15), not a ligase reaction. Ligase classification
      applies to the ATP-coupled overall ACC reaction.
    supported_by:
    - reference_id: file:PSEPK/accA/accA-uniprot.txt
      supporting_text: 'EC=2.1.3.15'
