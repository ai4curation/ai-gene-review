id: Q88MG4
gene_symbol: accA
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: >-
  AccA is the alpha subunit of the carboxyltransferase component of
  heteromeric acetyl-CoA carboxylase in Pseudomonas putida KT2440. Together
  with AccD, it transfers the carboxyl group from carboxybiotinyl-AccB to
  acetyl-CoA, producing malonyl-CoA for de novo fatty-acid synthesis.
