    id: GO:0008233
    label: peptidase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: peptidase activity is directionally related to PBP/carboxypeptidase chemistry but is less precise than the D-Ala-D-Ala carboxypeptidase/transpeptidase term.
    action: MODIFY
    reason: mrcB is supported as a D-Ala-D-Ala carboxypeptidase/transpeptidase-family peptidoglycan enzyme, so GO:0009002 is the better molecular-function term.
    proposed_replacement_terms:
    - id: GO:0009002
      label: serine-type D-Ala-D-Ala carboxypeptidase activity
