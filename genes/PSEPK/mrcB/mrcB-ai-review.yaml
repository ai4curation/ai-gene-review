    label: plasma membrane
  evidence_type: IEA
  original_reference_id: GO_REF:0000044
  qualifier: located_in
  review:
    summary: Plasma membrane localization is supported for this membrane-associated peptidoglycan enzyme but is non-core context.
    action: KEEP_AS_NON_CORE
    reason: The location helps place the enzyme in the envelope, while the catalytic or transport activity carries the core functional assertion.
    supported_by:
