  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: 'mrcB encodes penicillin-binding protein 1B, a class A high-molecular-mass PBP/murein polymerase of Pseudomonas putida KT2440. The protein combines peptidoglycan glycosyltransferase and penicillin-sensitive transpeptidase activities to synthesize cross-linked peptidoglycan from lipid intermediates.'
