existing_annotations:
  - term:
      id: GO:0005886
      label: plasma membrane
    qualifier: located_in
    evidence_type: IEA
    original_reference_id: GO_REF:0000044
    review:
      summary: >-
        MotB is membrane-associated, but the imported annotation is less specific
        than the current biological understanding of the protein. MotB is a
        stator subunit of the bacterial flagellar motor rather than a generic
        membrane protein, and a stator-complex term better captures where the
        protein acts.
      action: MODIFY
      reason: >-
        Plasma membrane is correct but underspecified. MotB functions in the
        bacterial-type flagellum stator complex, which is the more informative
        cellular-component assignment for this gene product.
      proposed_replacement_terms:
        - id: GO:0120101
          label: bacterial-type flagellum stator complex
      additional_reference_ids:
