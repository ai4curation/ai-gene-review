          supporting_text: STATOR ELEMENT OF FLAGELLAR MOTOR COMPLEX
core_functions:
  - description: >-
      MotB is the B subunit of the proton-driven MotAB stator. Its periplasmic
      OmpA-like domain anchors the stator to peptidoglycan, while the MotAB
      complex contributes proton translocation that is coupled to torque
      generation and bacterial-type flagellum-dependent motility.
