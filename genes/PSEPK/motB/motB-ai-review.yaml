suggested_questions:
  - question: >-
      Under which environmental conditions does P. putida KT2440 preferentially
      deploy the MotAB stator containing MotB rather than the alternative MotCD
      stator?
  - question: >-
      Which residues in the MotB transmembrane Asp-containing ion path and the
      C-terminal OmpA-like domain are most important for stator assembly versus
      torque transmission in P. putida?
suggested_experiments:
  - hypothesis: >-
      MotB is the peptidoglycan-anchoring B subunit of the MotAB proton-driven
      stator and is specifically important for a subset of swimming conditions in
      the dual-stator P. putida motor.
    description: >-
      Construct motB, motD, and motB motD mutants with chromosomal
      complementation, then compare swim-plate motility, single-cell tracking,
      and bead/tethered-cell torque measurements across low- and high-viscosity
      conditions.
    experiment_type: genetics plus motor physiology
  - hypothesis: >-
      Conserved MotB residues separately control proton conduction and
      peptidoglycan anchoring.
    description: >-
      Introduce targeted substitutions in the conserved transmembrane acidic
      residue and in predicted OmpA-like peptidoglycan-binding residues, then
      assay stator localization, proton-motive-force sensitivity, and motor
      output.
    experiment_type: site-directed mutagenesis
