taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: >-
  motB encodes the B subunit of a proton-driven bacterial flagellar stator in
  Pseudomonas putida KT2440. The protein is a single-pass inner-membrane
  component with a large periplasmic OmpA-like domain that is expected to bind
  peptidoglycan and anchor the MotAB stator while ion flow through the stator
  powers flagellar rotation. In P. putida, this function should be interpreted
  in the context of a dual-stator motor system rather than as the sole stator in
  the organism.
