    evidence_type: IEA
    original_reference_id: GO_REF:0000104
    review:
      summary: >-
        This annotation is true at a very high level, but it is too generic to be
        useful for MotB. The protein acts in a specific membrane-embedded stator
        complex of the flagellar motor, and the broad membrane term adds little
        information once a more specific localization is recognized.
      action: REMOVE
      reason: >-
        GO:0016020 is overly broad and redundant for a well-characterized MotB
        family protein. More specific cellular-component terms such as plasma
        membrane and especially bacterial-type flagellum stator complex are more
        appropriate.
      additional_reference_ids:
