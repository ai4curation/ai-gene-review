    label: cellular response to heat
  evidence_type: IEA
  original_reference_id: GO_REF:0000118
  qualifier: involved_in
  review:
    summary: Correct and the more specific child of 'response to heat'. ClpB acts within the
      cell to process and resolubilize protein aggregates that accumulate after heat stress,
      mediating cellular recovery from heat-induced proteotoxic damage.
    action: ACCEPT
    supported_by:
    - reference_id: file:PSEPK/clpB/clpB-uniprot.txt
      supporting_text: Part of a stress-induced multi-chaperone system, it is involved in the
        recovery of the cell from heat-induced damage
- term:
    id: GO:0042026
    label: protein refolding
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: involved_in
  review:
    summary: Correct and a core biological process. ClpB drives solubilization of aggregated
      proteins and, in cooperation with DnaK, their refolding to the native state. This
      disaggregation/refolding activity is the defining function of ClpB.
    action: ACCEPT
    supported_by:
    - reference_id: file:PSEPK/clpB/clpB-uniprot.txt
      supporting_text: contributing to the solubilization and refolding of denatured protein
        aggregates by DnaK
- term:
    id: GO:0042802
    label: identical protein binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000117
  qualifier: enables
  review:
    summary: Technically correct - ClpB self-associates into an ATP-dependent homohexamer, so
      it binds identical protein subunits. This reflects structural oligomerization rather than
      the disaggregase activity itself, so it is retained as a non-core annotation.
    action: KEEP_AS_NON_CORE
    supported_by:
    - reference_id: file:PSEPK/clpB/clpB-uniprot.txt
      supporting_text: Homohexamer. The oligomerization is ATP-dependent
references:
- id: GO_REF:0000002
  title: Gene Ontology annotation through association of InterPro records with GO terms
  findings:
  - statement: InterPro correctly associates ClpB with AAA+ ATPase / protein refolding functions,
      but the IPR002078 (sigma-54 interaction) match incorrectly transfers a transcription
      regulation term based only on shared AAA+ fold.
- id: GO_REF:0000117
  title: Electronic Gene Ontology annotations created by ARBA machine learning models
  findings:
  - statement: ARBA assigns cytosol localization and identical protein binding (homohexamer),
      both consistent with the curated UniProt record.
- id: GO_REF:0000118
  title: TreeGrafter-generated GO annotations
  findings:
  - statement: TreeGrafter correctly propagates cellular response to heat from the ClpB/Hsp104
      family tree.
- id: GO_REF:0000120
  title: Combined Automated Annotation using Multiple IEA Methods
  findings:
  - statement: Combined methods correctly identify ATP hydrolysis activity, cytoplasmic
      localization, and the response to heat stress role.
- id: file:interpro/panther/PTHR11638/PTHR11638-metadata.yaml
  title: PANTHER family PTHR11638 (ATP-dependent Clp protease / Clp-Hsp100 AAA+ ATPase),
    subfamily PTHR11638:SF18 (Heat shock protein 104 / ClpB-Hsp104 disaggregase)
  findings:
  - statement: ClpB is classified in PANTHER family PTHR11638, the Clp/Hsp100 AAA+ ATPase
      family that includes ClpA, ClpB and ClpC, and within it the SF18 subfamily.
  - statement: PTHR11638:SF18 corresponds to the ClpB/Hsp104 disaggregase branch, which is
      not associated with the ClpP protease (unlike the ClpA/ClpC protease-adaptor branches),
      supporting the protein-refolding/disaggregase core function rather than a proteolytic role.
- id: file:PSEPK/clpB/clpB-uniprot.txt
  title: UniProt entry Q88Q71 (CLPB_PSEPK)
  findings:
  - statement: ClpB is part of a stress-induced multi-chaperone system that, with DnaK/DnaJ/GrpE,
      mediates recovery from heat-induced damage and acts before DnaK in processing protein
      aggregates.
  - statement: Substrate (protein) binding stimulates ATPase activity; ATP hydrolysis unfolds
      denatured aggregates, contributing to solubilization and refolding by DnaK.
  - statement: ClpB forms an ATP-dependent homohexamer; NBD2 mediates oligomerization, NBD1
      stabilizes the hexamer, and the mobile coiled-coil domain is essential for rescuing
      proteins from the aggregated state.
  - statement: Localized to the cytoplasm; belongs to the ClpA/ClpB family (does not associate
      with ClpP and is not a protease subunit).
- id: file:PSEPK/clpB/clpB-notes.md
  title: Curator notes for clpB (Q88Q71)
  findings:
  - statement: The regulation of DNA-templated transcription annotation is a spurious InterPro
      transfer from the sigma-54 interaction domain signature and should be removed.
  - statement: ATP binding is correct but broad and over-annotated given the specific ATP
      hydrolysis activity term is present.
