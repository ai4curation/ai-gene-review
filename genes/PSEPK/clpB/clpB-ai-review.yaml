id: Q88Q71
gene_symbol: clpB
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: ClpB is an ATP-dependent molecular chaperone of the HSP100/Clp (AAA+) family
  that functions as a protein disaggregase. Acting together with the DnaK/DnaJ/GrpE (Hsp70)
  co-chaperone system, it extracts polypeptides from protein aggregates formed during heat
  and other stresses and promotes their refolding to the native state, enabling the cell
  to recover from proteotoxic damage and conferring thermotolerance. ClpB assembles into an
  ATP-dependent homohexameric ring containing two nucleotide-binding domains (NBD1 and NBD2),
  an N-terminal substrate-discriminating Clp repeat domain, and a mobile coiled-coil M-domain
  whose motion drives the threading and pulling apart of aggregated substrates. Substrate
  binding stimulates its ATPase activity, and ATP hydrolysis powers solubilization of
  aggregates. Unlike the related ClpA and ClpX ATPases, ClpB does not associate with the ClpP
  peptidase and therefore acts purely as a disaggregating chaperone rather than as part of a
  protease. It is localized to the cytoplasm.
existing_annotations:
- term:
    id: GO:0005524
    label: ATP binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: ClpB is an AAA+ ATPase with two Walker-A (P-loop) nucleotide-binding sites, so
      ATP binding is correct. However, the more informative and specific molecular function
      'ATP hydrolysis activity' (GO:0016887) is also annotated; ATP binding is a broad
      parent that adds little on its own and should be marked as over-annotated in favor of
      the catalytic term.
    action: MARK_AS_OVER_ANNOTATED
    supported_by:
    - reference_id: file:PSEPK/clpB/clpB-uniprot.txt
      supporting_text: /ligand="ATP"
    - reference_id: file:PSEPK/clpB/clpB-notes.md
      supporting_text: broad "ATP binding" (GO:0005524) is subsumed by the more specific ATP
        hydrolysis activity
- term:
    id: GO:0005737
    label: cytoplasm
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: located_in
  review:
    summary: Correct subcellular localization. UniProt assigns ClpB to the cytoplasm, where
      the disaggregase acts on cytoplasmic protein aggregates together with the DnaK system.
    action: ACCEPT
    supported_by:
    - reference_id: file:PSEPK/clpB/clpB-uniprot.txt
      supporting_text: 'SUBCELLULAR LOCATION: Cytoplasm'
- term:
    id: GO:0005829
    label: cytosol
  evidence_type: IEA
  original_reference_id: GO_REF:0000117
  qualifier: located_in
  review:
    summary: Cytosol is the more specific sub-location consistent with the UniProt cytoplasm
      assignment for this soluble chaperone. Retained as a valid localization annotation,
      though redundant with the cytoplasm term; kept as non-core relative to the disaggregase
      activity.
    action: KEEP_AS_NON_CORE
    supported_by:
    - reference_id: file:PSEPK/clpB/clpB-uniprot.txt
      supporting_text: 'SUBCELLULAR LOCATION: Cytoplasm'
- term:
    id: GO:0006355
    label: regulation of DNA-templated transcription
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: involved_in
  review:
    summary: This annotation is incorrect. It derives from an InterPro match to IPR002078
      (sigma-54 interaction domain), which reflects only the shared AAA+ ATPase fold between
      ClpB and sigma-54-dependent transcriptional activators (e.g. NtrC), not a genuine
      transcriptional function. ClpB is a protein disaggregase with no DNA-binding or
      transcriptional regulatory role and should not carry this term.
    action: REMOVE
    supported_by:
    - reference_id: file:PSEPK/clpB/clpB-notes.md
      supporting_text: '"regulation of DNA-templated transcription" (GO:0006355) is a spurious
        InterPro transfer from IPR002078 (Sigma-54 interaction domain signature)'
    - reference_id: file:PSEPK/clpB/clpB-uniprot.txt
      supporting_text: 'InterPro; IPR002078; Sigma_54_int.'
- term:
    id: GO:0009408
    label: response to heat
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: involved_in
  review:
    summary: Correct. ClpB is part of a stress-induced multi-chaperone system involved in the
      recovery of the cell from heat-induced damage, a core stress-response role and the basis
      of acquired thermotolerance.
    action: ACCEPT
    supported_by:
    - reference_id: file:PSEPK/clpB/clpB-uniprot.txt
      supporting_text: it is involved in the recovery of the cell from heat-induced damage,
        in cooperation with DnaK, DnaJ and GrpE
- term:
    id: GO:0016887
    label: ATP hydrolysis activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: Correct and a core molecular function. ClpB hydrolyzes ATP at its two AAA+
      nucleotide-binding domains to power the unfolding and extraction of polypeptides from
      protein aggregates; substrate binding stimulates this ATPase activity.
    action: ACCEPT
    supported_by:
    - reference_id: file:PSEPK/clpB/clpB-uniprot.txt
      supporting_text: Protein binding stimulates the ATPase activity; ATP hydrolysis unfolds
        the denatured protein aggregates
    - reference_id: file:PSEPK/clpB/clpB-uniprot.txt
