  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: PP_2599 encodes a membrane-associated chemotaxis sensory-transducer-family protein with
  GAF, HAMP, HD/PDEase, and HD-GYP domains in Pseudomonas putida KT2440. The domain architecture
  supports a sensory cyclic-guanylate phosphodiesterase candidate in the c-di-GMP turnover boundary
  rather than a plain MCP receptor, but this first pass does not establish the upstream signal or
  physiological output.
