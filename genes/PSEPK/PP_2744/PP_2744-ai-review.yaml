description: Ribose-phosphate diphosphokinase / PRPP synthase paralog of Pseudomonas putida KT2440 (PP_2744).
  The enzyme converts ribose 5-phosphate to 5-phosphoribose 1-diphosphate (PRPP), placing it downstream
  of ribose 5-phosphate supply and nucleotide biosynthesis. It is adjacent to the PPP because it consumes
  ribose 5-phosphate rather than forming the PPP itself.
