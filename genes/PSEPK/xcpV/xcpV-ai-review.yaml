description: xcpV (PP_1051) encodes Type II secretion pathway protein XcpV, a predicted pseudopilin or pilin-like component
  of a type II secretion system. Such proteins assemble the pseudopilus that helps drive substrate movement through the Xcp/Gsp
  secretion apparatus.
