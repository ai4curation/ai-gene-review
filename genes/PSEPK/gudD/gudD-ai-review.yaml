id: Q88DR6
gene_symbol: gudD
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: >-
  gudD encodes a predicted magnesium-dependent glucarate dehydratase in
  Pseudomonas putida KT2440. It belongs to the mandelate racemase/muconate
  lactonizing enzyme family and is predicted to catalyze conversion of
  D-glucarate to 5-dehydro-4-deoxy-D-glucarate in D-glucarate degradation.
existing_annotations:
- term:
    id: GO:0000287
    label: magnesium ion binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: >-
      Keep magnesium ion binding as non-core. The UniProt entry records Mg(2+)
      as a cofactor and annotates Mg-binding residues, but the biologically
      informative function is glucarate dehydratase activity.
    action: KEEP_AS_NON_CORE
    reason: >-
      Magnesium binding is consistent with the predicted enolase-superfamily
      dehydratase mechanism. It should be retained as a supporting cofactor
      feature rather than promoted as the core function.
    supported_by:
    - reference_id: file:PSEPK/gudD/gudD-uniprot.txt
      supporting_text: 'CC       Name=Mg(2+); Xref=ChEBI:CHEBI:18420;'
    - reference_id: file:PSEPK/gudD/gudD-uniprot.txt
      supporting_text: 'DR   GO; GO:0000287; F:magnesium ion binding; IEA:UniProtKB-UniRule.'
    - reference_id: file:PSEPK/gudD/gudD-uniprot.txt
      supporting_text: 'FT                   /ligand="Mg(2+)"'
- term:
    id: GO:0008872
    label: glucarate dehydratase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: >-
      Accept glucarate dehydratase activity as the core molecular function of
      gudD.
    action: ACCEPT
    reason: >-
      UniProt names the protein glucarate dehydratase, assigns EC 4.2.1.40,
      records the Rhea reaction converting D-glucarate to
      5-dehydro-4-deoxy-D-glucarate, and places the sequence in the Panther
      glucarate dehydratase subfamily. The Asta report confirms the correct
      Q88DR6 identity context.
    supported_by:
    - reference_id: file:PSEPK/gudD/gudD-uniprot.txt
      supporting_text: 'DE   RecName: Full=Glucarate dehydratase {ECO:0000256|ARBA:ARBA00011973, ECO:0000256|NCBIfam:TIGR03247};'
    - reference_id: file:PSEPK/gudD/gudD-uniprot.txt
      supporting_text: 'CC       Reaction=D-glucarate = 5-dehydro-4-deoxy-D-glucarate + H2O;'
    - reference_id: file:PSEPK/gudD/gudD-uniprot.txt
      supporting_text: 'DR   GO; GO:0008872; F:glucarate dehydratase activity; IEA:UniProtKB-UniRule.'
    - reference_id: file:PSEPK/gudD/gudD-deep-research-asta.md
      supporting_text: 'uniprot_accession: Q88DR6'
- term:
    id: GO:0042838
    label: D-glucarate catabolic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: involved_in
  review:
    summary: >-
      Accept D-glucarate catabolic process. GudD is predicted to perform step
      1/2 of the D-glucarate degradation route to 2,5-dioxopentanoate.
    action: ACCEPT
    reason: >-
      UniProt records the D-glucarate degradation pathway assignment and GOA
      carries the corresponding UniPathway process annotation. The molecular
      reaction produces the PP_3599 substrate, making the process annotation
      coherent with the aldarate-catabolism module.
    supported_by:
    - reference_id: file:PSEPK/gudD/gudD-uniprot.txt
      supporting_text: 'CC   -!- PATHWAY: Carbohydrate acid metabolism; D-glucarate degradation; 2,5-'
    - reference_id: file:PSEPK/gudD/gudD-uniprot.txt
      supporting_text: 'CC       dioxopentanoate from D-glucarate: step 1/2.'
    - reference_id: file:PSEPK/gudD/gudD-uniprot.txt
      supporting_text: 'DR   GO; GO:0042838; P:D-glucarate catabolic process; IEA:UniProtKB-UniPathway.'
references:
