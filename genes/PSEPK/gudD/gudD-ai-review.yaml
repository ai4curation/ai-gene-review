proposed_new_terms: []
suggested_questions:
- question: Is gudD the only in vivo D-glucarate dehydratase for glucuronate/glucarate catabolism in KT2440?
- question: Which lactonase provides D-glucarate to GudD during oxidative glucuronate catabolism?
suggested_experiments:
- description: >-
    Purify GudD and measure Mg(2+)-dependent D-glucarate dehydration kinetics,
    including product confirmation by LC-MS.
  experiment_type: enzyme kinetics and product identification
- description: >-
    Test gudD deletion and gudD/PP_3599 combined perturbations for growth and
    metabolite accumulation on glucarate and glucuronate.
  experiment_type: targeted genetics with metabolomics
