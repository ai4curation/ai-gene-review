  - statement: UniProt records the D-glucarate to 5-dehydro-4-deoxy-D-glucarate reaction.
    supporting_text: 'CC       Reaction=D-glucarate = 5-dehydro-4-deoxy-D-glucarate + H2O;'
  - statement: UniProt records magnesium as a cofactor for the predicted dehydratase.
    supporting_text: 'CC       Name=Mg(2+); Xref=ChEBI:CHEBI:18420;'
