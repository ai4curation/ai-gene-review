  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: PP_4611 encodes an ECF-family sigma factor in Pseudomonas putida KT2440. Its sigma-70 region
  2 and region 4 domains support promoter-specific RNA polymerase recruitment, likely in an iron-uptake
  or cell-surface signaling regulon adjacent to FecR-family proteins.
