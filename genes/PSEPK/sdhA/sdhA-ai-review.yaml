gene_symbol: sdhA
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: Flavoprotein (catalytic) subunit of succinate dehydrogenase (respiratory
  Complex II) in Pseudomonas putida KT2440. SdhA carries a covalently bound FAD cofactor
  and the succinate/fumarate active site, catalysing the oxidation of succinate to
  fumarate with transfer of electrons into the membrane quinone pool (EC 1.3.5.1).
  This reaction couples the tricarboxylic acid (TCA) cycle to the aerobic respiratory
  electron transport chain. SdhA forms the soluble catalytic head of the four-subunit
  enzyme together with the iron-sulfur subunit SdhB (PP_4190) and the membrane anchor
  subunits SdhD (PP_4192) and SdhC (PP_4193), to which it is peripherally attached
  on the cytoplasmic face of the inner (plasma) membrane. FAD incorporation
  (flavinylation) depends on the accessory assembly factor SdhE.
existing_annotations:
- term:
    id: GO:0000104
    label: succinate dehydrogenase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000118
  qualifier: enables
  review:
    summary: SdhA is the flavoprotein catalytic subunit of succinate dehydrogenase
      (Complex II); succinate dehydrogenase activity is its core molecular function.
    action: ACCEPT
    reason: Strongly supported by family/domain assignment (TIGR01816 sdhA_forward,
      Pfam FAD_binding_2, FRD/SDH subfamily), conserved active-site and FAD-binding
      residues, and UniProt EC 1.3.5.1. Consistent across all lines of evidence.
- term:
    id: GO:0005886
    label: plasma membrane
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: located_in
  review:
    summary: SdhA is a peripheral membrane protein attached to the cytoplasmic
      (inner) face of the inner/plasma membrane as part of the membrane-bound Complex II.
    action: ACCEPT
    reason: Matches UniProt subcellular location (Cell inner membrane; peripheral
      membrane protein; cytoplasmic side). In Gram-negative bacteria the inner
      membrane is the GO plasma membrane.
- term:
    id: GO:0006099
    label: tricarboxylic acid cycle
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: involved_in
  review:
    summary: Succinate dehydrogenase catalyses the succinate-to-fumarate step of
      the TCA cycle; this is a core biological process for SdhA.
    action: ACCEPT
    reason: Supported by UniProt pathway annotation (tricarboxylic acid cycle;
      fumarate from succinate, step 1/1) and conserved enzyme function.
- term:
    id: GO:0008177
    label: succinate dehydrogenase (quinone) activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: This is the precise quinone-coupled reaction (succinate + quinone =
      fumarate + quinol, RHEA:40523, EC 1.3.5.1) catalysed by the holo-enzyme to
      which SdhA contributes the catalytic flavoprotein head.
    action: ACCEPT
    reason: Directly matches the UniProt CATALYTIC ACTIVITY (RHEA:40523) and EC
      1.3.5.1. Most informative molecular-function term for the complex's overall
      reaction.
- term:
    id: GO:0009055
    label: electron transfer activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: SdhA participates in electron transfer, passing electrons abstracted
      from succinate via FAD toward the iron-sulfur clusters of SdhB and the quinone
      pool.
    action: KEEP_AS_NON_CORE
    reason: Biologically true but more generic than the specific succinate
      dehydrogenase (quinone) activity that captures SdhA's core function. Retain
      as supporting/non-core rather than primary.
- term:
    id: GO:0009061
    label: anaerobic respiration
  evidence_type: IEA
  original_reference_id: GO_REF:0000118
  qualifier: involved_in
  review:
    summary: This subunit is the forward/aerobic succinate dehydrogenase flavoprotein
      (TIGR01816 sdhA_forward), not the fumarate reductase used in anaerobic
      respiration.
    action: MARK_AS_OVER_ANNOTATED
    reason: UniProt notes that two distinct FAD enzymes interconvert fumarate and
      succinate, with fumarate reductase (FrdA) used in anaerobic growth and
      succinate dehydrogenase used in aerobic growth. The forward SdhA is assigned
      to aerobic respiration; this TreeGrafter-propagated anaerobic respiration term
      reflects the broader SdhA/FrdA family and over-annotates the aerobic SdhA.
- term:
    id: GO:0016491
    label: oxidoreductase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: Generic parent of the specific succinate dehydrogenase (quinone)
      activity already annotated.
    action: KEEP_AS_NON_CORE
    reason: Correct but uninformative high-level term; subsumed by the specific
      EC 1.3.5.1 annotation. Retain as non-core.
- term:
    id: GO:0016627
    label: oxidoreductase activity, acting on the CH-CH group of donors
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: Accurate intermediate-level description of the chemistry (oxidation of
      the succinate CH-CH bond to the fumarate C=C bond), but less specific than
      succinate dehydrogenase (quinone) activity.
    action: KEEP_AS_NON_CORE
    reason: Correct grouping term but subsumed by the specific MF term; keep as
      non-core supporting annotation.
- term:
    id: GO:0022900
    label: electron transport chain
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: involved_in
  review:
    summary: Complex II feeds electrons from succinate into the respiratory quinone
      pool, contributing to the aerobic electron transport chain.
    action: ACCEPT
    reason: Supported by UniProt (electron transport keyword) and the established
      role of Complex II linking the TCA cycle to respiration.
- term:
    id: GO:0050660
    label: flavin adenine dinucleotide binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: SdhA binds a (covalently attached) FAD cofactor essential for succinate
      oxidation.
    action: ACCEPT
    reason: Supported by UniProt COFACTOR (FAD), multiple conserved FAD-binding
      residues, the Tele-8alpha-FAD histidine modified residue, and SdhE-dependent
      flavinylation.
- term:
    id: GO:0160308
    label: succinate dehydrogenase (FAD) activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: Describes the FAD-dependent succinate->fumarate half-reaction occurring
      at the SdhA flavin site, prior to electron transfer to quinone.
    action: ACCEPT
    reason: Accurately captures the FAD-coupled catalytic step intrinsic to the
      SdhA subunit; complementary to the holo-enzyme quinone-coupled term
      GO:0008177. Both are valid and informative.
core_functions:
- description: Catalytic flavoprotein subunit of succinate dehydrogenase (Complex II)
    that oxidises succinate to fumarate using a covalently bound FAD cofactor, the
    rate-limiting catalytic step linking the TCA cycle to the respiratory chain.
  molecular_function:
    id: GO:0008177
    label: succinate dehydrogenase (quinone) activity
  supported_by:
  - reference_id: GO_REF:0000120
    supporting_text: UniProt CATALYTIC ACTIVITY a quinone + succinate = fumarate +
      a quinol (RHEA:40523, EC 1.3.5.1).
- description: Binds FAD at the catalytic head to abstract electrons from succinate
    and feed them into the electron transport chain via the SdhB iron-sulfur clusters
    and the membrane quinone pool.
  molecular_function:
    id: GO:0050660
    label: flavin adenine dinucleotide binding
  directly_involved_in:
    id: GO:0022900
    label: electron transport chain
  supported_by:
  - reference_id: GO_REF:0000120
    supporting_text: UniProt COFACTOR FAD; conserved FAD-binding residues and
      Tele-8alpha-FAD histidine.
