- id: PMID:22474332
  title: SdhE is a conserved protein required for flavinylation of succinate
    dehydrogenase in bacteria
  findings:
  - statement: The accessory protein SdhE binds FAD and is required for flavinylation
      of the succinate dehydrogenase flavoprotein subunit (SdhA) and for SDH activity
      in bacteria.
    reference_section_type: RESULTS
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: McNeil et al., J Biol Chem 2012;287:18418-28 (Serratia); supports
      SdhE-dependent flavinylation of bacterial SdhA. PMID corrected from 22593091
      (which resolves to an unrelated orthopedics paper) to 22474332, recovered via
      DOI 10.1074/jbc.M111.293803 and PubMed-verified to the intended SdhE paper.
suggested_questions:
- question: Has the SdhA-SdhBCD Complex II of P. putida KT2440 been biochemically
    characterised (kinetics, FAD content, quinone specificity), and does it show any
    fumarate reductase activity in vitro?
suggested_experiments:
- experiment: Purify the P. putida KT2440 SdhABCD complex and measure succinate:quinone
    oxidoreductase kinetics and FAD flavinylation status, with and without SdhE, to
    confirm the conserved mechanism in this organism.
