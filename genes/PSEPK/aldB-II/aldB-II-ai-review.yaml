description: aldB-II (PP_2680) encodes a second aldehyde dehydrogenase B-related enzyme predicted to oxidize aldehydes to carboxylates using NAD+ as electron acceptor. Like aldB-I, it has the conserved aldehyde dehydrogenase fold and catalytic motifs and is best considered a broad aldehyde-oxidation enzyme adjacent to, but not defining, glycolysis or gluconeogenesis.
