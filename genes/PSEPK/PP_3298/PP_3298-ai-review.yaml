  - id: file:PSEPK/PP_3298/PP_3298-deep-research-openscientist.md
    title: OpenScientist research report for Pseudomonas putida KT2440 PP_3298
    findings: []
    reference_review:
      relevance: MEDIUM
      correctness: UNVERIFIED
      review_notes: >-
        Provider-generated synthesis correctly identifies the compact
        CinA-C/PncC-family architecture but overstates NMN-deamidase activity,
        cytoplasmic pathway placement, and housekeeping physiology for the
        untested target. Its exact alignment identity, motif mapping, and
        neighborhood analysis have no retained reproducible artifact, while
        the report itself acknowledges moderate identity, inactive family
        members, untested specificity, and no direct Q88HQ5 experiment. These
        inferences were not converted into a core function or NEW annotation.
        The report also omits comparison with Q88ME5/pncC, the
        better-annotated paralog in the same proteome.
existing_annotations: []
knowledge_gaps:
  - gap_statement: >-
      The molecular activity, substrate specificity, and physiological role of
      PP_3298/Q88HQ5 are unknown. CinA-C/PncC-family domain assignments do not
      establish that this paralog deamidates NMN.
    boundary: >-
      Q88HQ5 is a 167-residue TIGR00199/IPR008136/PF02464 protein and is the
      second compact CinA-C/PncC-family candidate in KT2440, but unlike
      Q88ME5/PncC it lacks a submitted NMN-amidohydrolase name, EC assignment,
      GO activity, or target-specific experiment.
    gap_kind:
      - BIOLOGY
      - CURATION
    dark_aspect: MF_DARK
    status: OPEN
    significance: >-
      Resolving this paralog is necessary to distinguish redundant NMN salvage
      from a different CinA-family activity or a catalytically inactive domain.
    resolution: >-
      Compare purified Q88HQ5 and Q88ME5 against NMN and plausible alternative
      substrates, verify reaction products, and test single and double mutants
      with targeted NMN, NaMN, and NAD+ metabolomics.
    provenance:
      - reference_id: file:PSEPK/PP_3298/PP_3298-uniprot.txt
        supporting_text: "SubName: Full=CinA domain protein"
        reference_section_type: RESULTS
      - reference_id: PMID:21953451
        supporting_text: >-
          The PncC family also comprises a few members with a nonfunctional PncC
          domain, bearing multiple mutations and deletions.
        reference_section_type: DISCUSSION
suggested_questions:
  - question: >-
      Does PP_3298 encode an active NMN deamidase, another CinA-family
      specificity, or a catalytically inactive paralog?
suggested_experiments:
  - description: >-
      Purify Q88HQ5 and Q88ME5 side by side, measure substrate-dependent product
      formation rather than binding alone, and combine single/double deletions
      with targeted pyridine-nucleotide metabolomics before assigning a GO
      molecular function to PP_3298.
