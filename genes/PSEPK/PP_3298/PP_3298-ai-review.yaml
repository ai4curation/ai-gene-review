taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: >-
  Small CinA C-terminal/PncC-family protein of Pseudomonas putida
  KT2440. The 167-residue protein carries the CinA/PncC domain signatures
  IPR008136, PF02464, and TIGR00199. Its catalytic activity, substrate
  specificity, and physiological role have not been established; membership
  in a family that includes inactive domains does not by itself establish NMN
  deamidase activity for this paralog.
