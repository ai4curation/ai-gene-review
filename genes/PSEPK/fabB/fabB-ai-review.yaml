  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: FabB is the 3-oxoacyl-acyl carrier protein synthase I of Pseudomonas putida KT2440. It condenses malonyl-ACP with acyl-ACP acceptors during FAS-II elongation and is especially associated with elongation of unsaturated acyl-ACP intermediates downstream of FabA. Related P. putida evidence also makes FabB a candidate for FabH-independent initiation of fatty acid synthesis.
