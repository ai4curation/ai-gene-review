    correctness: UNVERIFIED
    review_notes: >-
      The core elongation synthesis agrees with the exact UniProt reaction.
      The report's initiation evidence is from P. putida F1, not direct work on
      KT2440 Q88FC3, so that strain-transfer claim is not incorporated here.
core_functions:
- description: >-
    Decarboxylative acyl-ACP condensing enzyme that supports iterative FAS-II
    elongation and extends the FabA-derived cis-unsaturated intermediate.
