taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: >-
  FabB is the cytoplasmic 3-oxoacyl-ACP synthase I of Pseudomonas putida
  KT2440 type-II fatty-acid synthesis. It performs decarboxylative
  condensations between malonyl-ACP and acyl-ACP substrates and is especially
  important for extending the cis-3-decenoyl-ACP intermediate generated by
  FabA in unsaturated fatty-acid synthesis.
