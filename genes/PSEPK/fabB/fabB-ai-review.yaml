suggested_questions:
- question: What is the division of substrate range between KT2440 FabB and the two KAS-II paralogs?
- question: >-
    Does KT2440 FabB itself generate acetyl-ACP from malonyl-ACP, as shown for
    the FabB ortholog in P. putida strain F1, or does KT2440 rely on MadB for
    that primer-forming chemistry?
suggested_experiments:
- description: >-
    Compare purified FabB, FabF, and PP_3303 against saturated and
    cis-unsaturated acyl-ACP chain lengths using product-resolved LC-MS.
