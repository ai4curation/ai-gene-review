  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: PP_3558 encodes a signal-peptide-bearing substrate-binding component with an OpuAC/ABC glycine-betaine transport-system substrate-binding domain. Although the product name says amino acid-binding protein, the domain assignment and adjacent PP_3559 glycine-betaine permease support a first-pass role as the periplasmic binding component of a partial glycine-betaine-compatible-solute ABC transporter pair.
