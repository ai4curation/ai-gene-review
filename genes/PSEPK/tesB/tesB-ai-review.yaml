  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: tesB encodes a predicted cytosolic Acyl-CoA thioesterase 2 with double-HotDog/C-M-P thioester
  hydrolase domains. Its core first-pass function is fatty acyl-CoA hydrolysis in acyl-CoA and fatty-acid
  turnover, not the ACP-based FabA/FabB unsaturated fatty-acid biosynthesis branch.
