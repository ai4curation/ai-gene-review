id: Q88GK7
gene_symbol: catC
product_type: PROTEIN
aliases:
  - PP_3714
  - MIase
  - muconolactone delta-isomerase
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: >-
  catC encodes a muconolactone delta-isomerase family enzyme (EC 5.3.3.4) in the
  catechol ortho-cleavage branch of the beta-ketoadipate pathway. In Pseudomonas
  putida KT2440, CatC acts downstream of catechol 1,2-dioxygenase and muconate
  cycloisomerase to convert muconolactone to beta-ketoadipate enol-lactone, linking
  catechol degradation to the rest of central aromatic-compound assimilation.
existing_annotations:
  - term:
      id: GO:0016159
      label: muconolactone delta-isomerase activity
    evidence_type: IEA
    original_reference_id: GO_REF:0000120
    review:
      summary: >-
        This term matches the core enzymatic activity of CatC. The UniProt entry for
        Q88GK7 names the protein as a muconolactone delta-isomerase, assigns EC 5.3.3.4,
        and gives the expected catalytic reaction for the muconolactone isomerization
        step.
      action: ACCEPT
      reason: >-
        GO:0016159 is already the specific molecular function that defines this
        enzyme. The annotation is consistent with the UniProt catalytic activity
        statement and with CatC's placement in the catechol branch of aromatic
        compound degradation.
      supported_by:
        - reference_id: UniProt:Q88GK7
          supporting_text: "Reaction=(S)-muconolactone = (4,5-dihydro-5-oxofuran-2-yl)-acetate;"
        - reference_id: UniProt:Q88GK7
          supporting_text: "Belongs to the muconolactone Delta-isomerase family."
  - term:
      id: GO:0042952
      label: beta-ketoadipate pathway
    evidence_type: IEA
    original_reference_id: GO_REF:0000120
    review:
      summary: >-
        CatC clearly functions within the beta-ketoadipate pathway, but this term is
        broader than necessary. The gene product acts in the catechol ortho-cleavage
        branch specifically, rather than generically across the full beta-ketoadipate
        pathway.
      action: MODIFY
      reason: >-
        A more specific biological process term is available. UniProt places CatC at
        the catechol-derived step 3/3 of the pathway, and GO:0019615 captures the
        immediate process level better than the broader parent term GO:0042952.
      proposed_replacement_terms:
        - id: GO:0019615
          label: catechol catabolic process, ortho-cleavage
      supported_by:
        - reference_id: UniProt:Q88GK7
          supporting_text: "4,5-dihydro-2-furylacetate from catechol: step 3/3."
        - reference_id: file:PSEPK/catC/catC-deep-research-falcon.md
          supporting_text: "CatC functions in the **catechol branch of the β-ketoadipate pathway**, downstream of CatA and CatB."
references:
