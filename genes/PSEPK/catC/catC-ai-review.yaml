suggested_questions:
  - question: Is CatC the only physiologically relevant muconolactone delta-isomerase supporting catechol ortho-cleavage in KT2440, or is there redundancy with paralogous aromatic-catabolic enzymes?
  - question: How broad is CatC substrate tolerance for substituted muconolactones generated from alternative aromatic feedstocks?
suggested_experiments:
  - hypothesis: CatC is required for efficient flux through the catechol ortho-cleavage branch during growth on benzoate-derived substrates.
    description: Compare wild type, clean catC deletion, and complemented strains for growth on catechol, benzoate, and upstream aromatics that funnel through catechol, while measuring accumulation of muconolactone-pathway intermediates.
    experiment_type: growth assay with targeted metabolite profiling
  - hypothesis: CatC is a narrow-specificity muconolactone delta-isomerase rather than a broad aromatic-lactone isomerase.
    description: Purify recombinant CatC and quantify turnover of muconolactone and substituted analogs using LC-MS or coupled spectrophotometric assays that monitor beta-ketoadipate enol-lactone formation.
    experiment_type: in vitro enzyme assay
