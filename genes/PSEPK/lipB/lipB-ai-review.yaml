    label: protein lipoylation
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: involved_in
  review:
    summary: Protein lipoylation is the immediate biological process for LipB.
    action: ACCEPT
    reason: UniProt places LipB in the endogenous protein lipoylation pathway as the
      step that transfers octanoyl groups to lipoate-dependent enzyme domains before
      LipA sulfur insertion.
    supported_by:
    - reference_id: file:PSEPK/lipB/lipB-goa.tsv
      supporting_text: "GO:0009249\tprotein lipoylation"
    - reference_id: file:PSEPK/lipB/lipB-uniprot.txt
