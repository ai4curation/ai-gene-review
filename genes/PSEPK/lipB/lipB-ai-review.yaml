id: Q88DM4
gene_symbol: lipB
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: lipB encodes octanoyltransferase in Pseudomonas putida KT2440. It transfers
  the endogenously produced octanoyl group from octanoyl-acyl carrier protein to
  lipoyl-domain lysine residues, forming the octanoylated protein substrate that LipA
  converts to the mature lipoylated cofactor.
