- term:
    id: GO:0016746
    label: acyltransferase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000104
  qualifier: enables
  review:
    summary: Generic acyltransferase activity is true but less informative than the
      LipB-specific transferase term.
    action: KEEP_AS_NON_CORE
    reason: LipB is specifically an octanoyl/lipoyl transferase acting on acyl carrier
      protein and lipoyl-domain protein substrates.
    supported_by:
    - reference_id: file:PSEPK/lipB/lipB-goa.tsv
      supporting_text: "GO:0016746\tacyltransferase activity"
- term:
    id: GO:0033819
    label: lipoyl(octanoyl) transferase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
