    label: cytoplasm
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: located_in
  review:
    summary: Cytoplasmic localization is plausible context for bacterial LipB.
    action: KEEP_AS_NON_CORE
    reason: UniProt places LipB in the cytoplasm, but the specific octanoyltransferase
      activity is the core function.
    supported_by:
    - reference_id: file:PSEPK/lipB/lipB-uniprot.txt
