id: Q88DM4
gene_symbol: lipB
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: >-
  lipB encodes the octanoyltransferase that initiates endogenous protein
  lipoylation. It transfers an octanoyl group from octanoyl-acyl carrier
  protein to a conserved lysine in lipoyl domains, producing the
  protein-bound octanoyl intermediate that LipA converts to the mature lipoyl
  cofactor.
existing_annotations:
- term:
    id: GO:0005737
    label: cytoplasm
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: located_in
  review:
    summary: Cytoplasmic localization is plausible context for bacterial LipB.
    action: KEEP_AS_NON_CORE
    reason: >-
      UniProt places the protein in the cytoplasm, but localization is
      secondary to its specific octanoyltransferase activity.
    supported_by:
    - reference_id: file:PSEPK/lipB/lipB-uniprot.txt
      supporting_text: 'CC   -!- SUBCELLULAR LOCATION: Cytoplasm {ECO:0000255|HAMAP-Rule:MF_00013}.'
- term:
    id: GO:0009249
    label: protein lipoylation
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: involved_in
  review:
    summary: Protein lipoylation is the immediate biological process for LipB.
    action: ACCEPT
    reason: >-
      LipB performs step 1 of the endogenous route by transferring an octanoyl
      group to lipoyl-domain lysine residues before LipA sulfur insertion.
    supported_by:
    - reference_id: file:PSEPK/lipB/lipB-uniprot.txt
      supporting_text: 'CC   -!- PATHWAY: Protein modification; protein lipoylation via endogenous'
- term:
    id: GO:0016746
    label: acyltransferase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000104
  qualifier: enables
  review:
    summary: Generic acyltransferase activity is true but redundant.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      The specific lipoyl(octanoyl) transferase term captures the substrates
      and biological chemistry of LipB.
    supported_by:
    - reference_id: file:PSEPK/lipB/lipB-uniprot.txt
      supporting_text: 'CC   -!- FUNCTION: Catalyzes the transfer of endogenously produced octanoic acid'
    - reference_id: file:PSEPK/lipB/lipB-deep-research-openscientist.md
      supporting_text: >-
        LipB (UniProt Q88DM4; ordered locus PP_4801) is the
        octanoyltransferase (EC 2.3.1.181) that catalyzes the first committed
        step of de novo lipoic-acid cofactor biosynthesis in *Pseudomonas
        putida* KT2440.
- term:
    id: GO:0033819
    label: lipoyl(octanoyl) transferase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: Lipoyl(octanoyl) transferase activity is the specific LipB function.
    action: ACCEPT
    reason: >-
      UniProt records the EC 2.3.1.181/Rhea reaction transferring octanoyl from
      octanoyl-ACP to lysyl protein substrates.
    supported_by:
    - reference_id: file:PSEPK/lipB/lipB-uniprot.txt
      supporting_text: 'CC   -!- FUNCTION: Catalyzes the transfer of endogenously produced octanoic acid'
