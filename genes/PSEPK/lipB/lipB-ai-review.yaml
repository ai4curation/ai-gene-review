      function.
    action: ACCEPT
    reason: UniProt names Q88DM4 as octanoyltransferase and records transfer of octanoyl
      groups from octanoyl-ACP to lysyl protein substrates.
    supported_by:
    - reference_id: file:PSEPK/lipB/lipB-goa.tsv
      supporting_text: "GO:0033819\tlipoyl(octanoyl) transferase activity"
    - reference_id: file:PSEPK/lipB/lipB-uniprot.txt
