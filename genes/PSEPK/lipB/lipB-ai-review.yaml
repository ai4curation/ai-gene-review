suggested_experiments:
- description: >-
    Assay purified Q88DM4 with octanoyl-ACP and defined Pseudomonas putida GcvH
    and E2 lipoyl-domain acceptors to confirm activity and physiological
    substrate range.
- description: >-
    Delete lipB and quantify client-protein lipoylation and rescue by lipoate
    or octanoate to test the direct route and any salvage capacity in KT2440.
