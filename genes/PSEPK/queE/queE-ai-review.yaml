description: queE (PP_1225) encodes the radical-SAM 7-carboxy-7-deazaguanine synthase of queuosine precursor biosynthesis.
  It is a pterin/deazapurine side-branch enzyme in the broad KEGG folate map rather than a tetrahydrofolate-specific enzyme.
