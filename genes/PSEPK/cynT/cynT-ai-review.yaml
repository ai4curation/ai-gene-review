description: cynT (PP_0100) encodes a beta-class carbonic anhydrase that reversibly hydrates carbon dioxide to bicarbonate.
  In the KEGG nitrogen-metabolism map it is a carbonic-anhydrase/cyanate-assimilation boundary node rather than a strict inorganic-nitrogen
  redox enzyme.
