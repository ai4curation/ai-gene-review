description: ldhA encodes a predicted NAD-dependent D-lactate dehydrogenase (EC 1.1.1.28) in the D-isomer-specific 2-hydroxyacid
  dehydrogenase family. It links D-lactate and pyruvate by NAD-linked redox chemistry in the pyruvate/lactate side branch
  of ppu00620.
