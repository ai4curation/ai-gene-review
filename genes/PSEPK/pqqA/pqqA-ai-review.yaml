taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: pqqA encodes the small precursor peptide for pyrroloquinoline quinone (PQQ) biosynthesis
  in Pseudomonas putida KT2440. The peptide supplies the conserved glutamate and tyrosine residues that
  are cross-linked and processed into the PQQ cofactor, so the appropriate review focus is PQQ biosynthesis
  rather than an independent enzyme activity.
