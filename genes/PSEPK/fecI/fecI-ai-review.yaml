  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: fecI encodes an ECF-family sigma factor in Pseudomonas putida KT2440. Its sigma-70 region
  2 and region 4 domains support promoter-specific RNA polymerase recruitment, likely for an iron-uptake
  regulon controlled by an adjacent FecR-family transmembrane sensor.
