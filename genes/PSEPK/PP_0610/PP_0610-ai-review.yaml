description: >-
  PP_0610 encodes a predicted type IV pilus assembly protein PilX in
  Pseudomonas putida KT2440. The assignment currently rests on the UniProt
  protein-language-model name and local pilus-biosynthesis neighborhood rather
  than an explicit InterPro domain, so this review treats PP_0610 as a weaker
  type IV pilus assembly candidate.
