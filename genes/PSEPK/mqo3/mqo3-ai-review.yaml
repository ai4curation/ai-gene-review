    label: oxidoreductase activity, acting on CH-OH group of donors
  evidence_type: IEA
  original_reference_id: GO_REF:0000117
  qualifier: enables
  review:
    summary: True but broad parent of the specific malate:quinone oxidoreductase activity.
    action: KEEP_AS_NON_CORE
    reason: The enzyme is an oxidoreductase acting on the CH-OH group of malate, but GO:0008924 captures the specific substrate and quinone acceptor.
- term:
    id: GO:0047545
    label: (S)-2-hydroxyglutarate dehydrogenase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000118
  qualifier: enables
  review:
    summary: Electronic over-propagation from the PANTHER L-2-hydroxyglutarate dehydrogenase family name; not supported for this MQO.
    action: REMOVE
    reason: UniProt's curated catalytic activity for Q88IS4 is malate:quinone oxidoreductase, not (S)-2-hydroxyglutarate dehydrogenase. The protein carries MQO/HAMAP/Pfam evidence, while the 2-hydroxyglutarate annotation appears to derive from the broad PANTHER family label and has no gene-specific support.
