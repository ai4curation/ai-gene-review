    summary: Correct core molecular function for Mqo3, matching EC 1.1.5.4 and the UniProt catalytic activity.
    action: ACCEPT
    reason: Q88IS4 is a reviewed UniProtKB/Swiss-Prot MQO-family entry annotated by HAMAP MF_00212 with malate:quinone oxidoreductase activity. The curated reaction is (S)-malate + quinone = quinol + oxaloacetate.
    supported_by:
