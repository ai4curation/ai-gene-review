  review:
    summary: Correct process annotation for an MQO enzyme in the malate-to-oxaloacetate step of the TCA cycle.
    action: ACCEPT
    reason: UniProt/HAMAP places Mqo3 in the tricarboxylic acid cycle, specifically oxaloacetate formation from (S)-malate by the quinone route. The PSEPK pathway report treats mqo1, mqo2, and mqo3 as the primary quinone-linked malate oxidation branch.
