description: FAD-dependent malate:quinone oxidoreductase of the MQO family. Mqo3 catalyzes oxidation of (S)-malate to oxaloacetate while reducing a respiratory quinone, contributing to the quinone-linked malate oxidation branch of the tricarboxylic acid cycle. It is one of three MQO paralogs in Pseudomonas putida KT2440, so the paralog-specific division of labor remains unresolved, but the UniProt/HAMAP assignment supports malate:quinone oxidoreductase as its core activity.
