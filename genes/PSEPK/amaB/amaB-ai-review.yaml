description: amaB encodes an aldehyde dehydrogenase (NAD+) family protein in Pseudomonas putida KT2440. In the ppu00310 lysine-degradation batch it is treated as the aldehyde-dehydrogenase step of the D-lysine/pipecolate side-route context, with current GOA support for aldehyde dehydrogenase (NAD+) activity.
