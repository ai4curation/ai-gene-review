  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: ffh (PP_1461) encodes the signal recognition particle (SRP) protein Ffh, the bacterial homolog of eukaryotic
  SRP54. Together with a small 4.5S SRP RNA, Ffh forms the bacterial SRP ribonucleoprotein that co-translationally targets
  inner-membrane and secretory proteins to the cytoplasmic membrane. Ffh binds the hydrophobic signal-anchor sequence of a
  nascent polypeptide as it emerges from the translating ribosome (forming the SRP-RNC complex), then delivers it to the membrane-bound
  SRP receptor FtsY. Ffh is built from three domains, an N-terminal N domain for ribosome contact, a central G domain GTPase
  (EC 3.6.5.4), and a C-terminal M domain that binds both the SRP RNA and the signal sequence. Reciprocal GTP hydrolysis by
  Ffh and FtsY drives transfer of the nascent chain to the SecYEG translocase and dissociation of the targeting complex, allowing
  SRP and receptor to be recycled. SRP-dependent targeting is essential for membrane protein biogenesis in P. putida.
