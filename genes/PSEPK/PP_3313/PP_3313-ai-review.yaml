description: PP_3313 encodes a predicted HSP20-family small heat shock protein in Pseudomonas putida KT2440. It contains an
  alpha-crystallin/HSP20 domain and an HSP21-like family assignment, supporting a putative heat-responsive holdase chaperone
  that binds non-native or unfolded proteins.
