  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: rpsA (PP_1772) encodes 30S ribosomal protein S1, a conserved protein component of the bacterial
  30S small ribosomal subunit in Pseudomonas putida KT2440. It functions as a structural constituent of
  the ribosome and supports protein translation as part of the small subunit. It also has a specific mRNA-binding
  role in positioning transcripts on the small subunit.
