description: mdtB encodes a predicted inner-membrane AcrB/RND-family multidrug efflux transporter subunit
  in Pseudomonas putida KT2440. Together with MdtC and MdtA, it likely contributes to a tripartite efflux
  pump for xenobiotic export.
