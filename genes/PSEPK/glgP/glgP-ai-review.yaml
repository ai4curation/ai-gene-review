taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: glgP encodes an alpha-1,4-glucan/glycogen phosphorylase in Pseudomonas putida KT2440. It catalyzes phosphorolytic cleavage of glycogen or related alpha-1,4-glucans to generate glucose-1-phosphate and uses pyridoxal phosphate as cofactor.
