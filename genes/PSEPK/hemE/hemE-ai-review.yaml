  - id: file:PSEPK/hemE/hemE-deep-research-openscientist.md
    title: OpenScientist research report for PSEPK hemE
    findings:
      - statement: >-
          The report recovers the HemE reaction but acknowledges that the
          target protein has not been characterized directly.
        supporting_text: >-
          No direct experimental characterization of the *P. putida* KT2440 protein.
    reference_review:
      relevance: HIGH
      correctness: MISCITED
      review_notes: >-
        The report correctly identifies the four-decarboxylation reaction,
        cytoplasmic assignment, and absence of direct KT2440 experiments. It
        presents an unsaved human-target alignment and exact residue map,
        transfers kinetics, substrate breadth, mechanism, dimer behavior, and
        essentiality from other organisms, and its KT2440 pathway sketch omits
        the HemJ-family PP_0431 step. Those target-specific conclusions were not
        retained.
