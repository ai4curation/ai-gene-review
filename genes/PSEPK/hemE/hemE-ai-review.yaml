  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: >-
  HemE is a cytoplasmic uroporphyrinogen decarboxylase. It removes the four
  acetate carboxyl groups of uroporphyrinogen III without an external cofactor,
  producing coproporphyrinogen III for the oxygen-dependent HemF or
  oxygen-independent HemN branch of protoporphyrinogen IX synthesis.
