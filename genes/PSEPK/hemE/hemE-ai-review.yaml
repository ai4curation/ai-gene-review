  - term:
      id: GO:0006779
      label: porphyrin-containing compound biosynthetic process
    evidence_type: IEA
    original_reference_id: GO_REF:0000002
    qualifier: involved_in
    review:
      summary: The biosynthetic assignment is sound and can be made endpoint-specific for KT2440.
      action: MODIFY
      reason: >-
        In KT2440, HemE supplies coproporphyrinogen III to the HemF/HemN,
        protoporphyrinogen oxidase, and ferrochelatase reactions that produce
        heme B, supporting the live endpoint term GO:0006785.
      proposed_replacement_terms:
