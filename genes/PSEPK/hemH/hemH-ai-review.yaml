    title: UniProtKB entry for PSEPK hemH
    findings:
      - statement: HemH inserts ferrous iron into protoporphyrin IX.
        supporting_text: Catalyzes the ferrous insertion into protoporphyrin IX.
      - statement: HemH is the sole protoheme-forming step represented by this reaction.
