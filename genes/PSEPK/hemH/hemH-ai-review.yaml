id: Q88PV4
gene_symbol: hemH
product_type: PROTEIN
aliases:
  - PP_0744
status: COMPLETE
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: >-
  HemH is the cytoplasmic ferrochelatase that catalyzes the terminal reaction of
  heme-b biosynthesis. It inserts ferrous iron into protoporphyrin IX to form
  protoheme (heme b), supplying the cofactor used by respiratory and other
  hemoproteins.
existing_annotations:
  - term:
      id: GO:0004325
      label: protoporphyrin ferrochelatase activity
    evidence_type: IEA
    original_reference_id: GO_REF:0000120
    qualifier: enables
    review:
      summary: This term precisely describes the terminal HemH reaction.
      action: ACCEPT
      reason: >-
        UniProt assigns EC 4.98.1.1 and explicitly describes ferrous insertion
        into protoporphyrin IX.
      supported_by:
        - reference_id: file:PSEPK/hemH/hemH-uniprot.txt
          supporting_text: Catalyzes the ferrous insertion into protoporphyrin IX.
  - term:
      id: GO:0005737
      label: cytoplasm
    evidence_type: IEA
    original_reference_id: GO_REF:0000120
    qualifier: located_in
    review:
      summary: Cytoplasmic localization is explicitly predicted for the KT2440 enzyme.
      action: ACCEPT
      reason: UniProt assigns HemH to the cytoplasm and does not predict a membrane anchor.
      supported_by:
        - reference_id: file:PSEPK/hemH/hemH-uniprot.txt
          supporting_text: "SUBCELLULAR LOCATION: Cytoplasm"
  - term:
      id: GO:0006779
      label: porphyrin-containing compound biosynthetic process
    evidence_type: IEA
    original_reference_id: GO_REF:0000104
    qualifier: involved_in
    review:
      summary: The broad porphyrin process is correct but can be replaced by the exact product process.
      action: MODIFY
      reason: >-
        HemH directly produces heme B, so GO:0006785 is a supported live
        replacement for this broad porphyrin-biosynthesis annotation.
      proposed_replacement_terms:
        - id: GO:0006785
          label: heme B biosynthetic process
      supported_by:
        - reference_id: file:PSEPK/hemH/hemH-uniprot.txt
          supporting_text: "biosynthesis; protoheme from protoporphyrin-IX: step 1/1."
  - term:
      id: GO:0006783
      label: heme biosynthetic process
    evidence_type: IEA
    original_reference_id: GO_REF:0000120
    qualifier: involved_in
    review:
      summary: HemH directly performs the final heme-b biosynthetic step.
      action: ACCEPT
      reason: >-
        Insertion of Fe2+ into protoporphyrin IX creates heme b, making this the
        most specific available process annotation for the gene product.
      supported_by:
        - reference_id: file:PSEPK/hemH/hemH-uniprot.txt
          supporting_text: "biosynthesis; protoheme from protoporphyrin-IX: step 1/1."
references:
  - id: GO_REF:0000104
