  - id: file:PSEPK/hemH/hemH-deep-research-openscientist.md
    title: OpenScientist research report for PSEPK hemH
    findings: []
core_functions:
  - description: >-
      Inserts ferrous iron into protoporphyrin IX to form heme b in the terminal
      reaction of the pathway.
    molecular_function:
      id: GO:0004325
      label: protoporphyrin ferrochelatase activity
    directly_involved_in:
      - id: GO:0006785
        label: heme B biosynthetic process
    locations:
      - id: GO:0005737
        label: cytoplasm
    supported_by:
      - reference_id: file:PSEPK/hemH/hemH-uniprot.txt
        supporting_text: Catalyzes the ferrous insertion into protoporphyrin IX.
suggested_questions:
  - question: Which iron-delivery factors supply ferrous iron to HemH in KT2440?
suggested_experiments:
  - hypothesis: HemH is the terminal ferrochelatase required for heme-b production.
    description: >-
      Quantify protoporphyrin IX and heme b after conditional hemH depletion,
      iron perturbation, and complementation.
