taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: >-
  rfbA (PP_1783) encodes glucose-1-phosphate thymidylyltransferase in the
  Pseudomonas putida KT2440 dTDP-L-rhamnose biosynthetic route. It catalyzes
  formation of dTDP-alpha-D-glucose from dTTP and alpha-D-glucose 1-phosphate,
  supplying the activated sugar nucleotide for downstream dehydration,
  epimerization, and reduction to dTDP-L-rhamnose.
