taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: >-
  FAD-dependent L-aspartate oxidase of Pseudomonas putida KT2440. NadB catalyzes
  oxidation of L-aspartate to iminoaspartate with formation of hydrogen
  peroxide, initiating de novo NAD+ biosynthesis from L-aspartate. The unstable
  iminoaspartate product is used by quinolinate synthase NadA in the next step.
