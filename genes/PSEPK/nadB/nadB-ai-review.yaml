suggested_questions:
  - question: How is flux through NadB coordinated with oxygen availability and the downstream iron-sulfur enzyme NadA in P. putida KT2440?
suggested_experiments:
  - description: >-
      Measure growth and intracellular quinolinate, NaMN, and NAD+ in a clean
