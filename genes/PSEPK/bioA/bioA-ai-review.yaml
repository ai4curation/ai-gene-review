taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: bioA encodes adenosylmethionine-8-amino-7-oxononanoate aminotransferase
  in Pseudomonas putida KT2440. This PLP-dependent enzyme transfers an amino group
  from S-adenosyl-L-methionine to KAPA/AON to form diaminopelargonic acid during
  de novo biotin biosynthesis.
