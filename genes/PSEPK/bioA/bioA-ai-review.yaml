id: Q88D44
gene_symbol: bioA
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: >-
  BioA is the pyridoxal 5'-phosphate-dependent aminotransferase that transfers
  the amino group of S-adenosyl-L-methionine to 8-amino-7-oxononanoate. The
  resulting 7,8-diaminononanoate is the substrate for dethiobiotin formation by
  BioD in de novo biotin biosynthesis.
existing_annotations:
- term:
    id: GO:0004015
    label: S-adenosyl-L-methionine:8-amino-7-oxononanoate transaminase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: This is the substrate-specific BioA catalytic activity.
    action: ACCEPT
    reason: >-
      EC 2.6.1.62, the HAMAP rule, and BioA-specific family assignments agree
      on the SAM-dependent aminotransferase reaction.
    supported_by:
    - reference_id: file:PSEPK/bioA/bioA-uniprot.txt
      supporting_text: Full=Adenosylmethionine-8-amino-7-oxononanoate aminotransferase
- term:
    id: GO:0005737
    label: cytoplasm
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: located_in
  review:
    summary: A cytoplasmic location is compatible with this soluble bacterial pathway enzyme.
    action: KEEP_AS_NON_CORE
    reason: >-
      UniProt predicts cytoplasmic localization, but compartment is not the
      defining function of BioA.
- term:
    id: GO:0009102
    label: biotin biosynthetic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: involved_in
  review:
    summary: BioA forms the diamino precursor used for dethiobiotin synthesis.
    action: ACCEPT
    reason: >-
      UniProt assigns the reaction to the first of the final two precursor
      steps leading from 8-amino-7-oxononanoate to dethiobiotin.
- term:
    id: GO:0030170
    label: pyridoxal phosphate binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: PLP binding is valid mechanistic information but not the core reaction.
    action: KEEP_AS_NON_CORE
    reason: >-
      The UniProt cofactor record and class-III aminotransferase family support
      PLP use; GO:0004015 captures the informative function.
