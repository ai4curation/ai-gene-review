id: Q88KF6
gene_symbol: prpB
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: >-
  PrpB is the magnesium-dependent 2-methylisocitrate lyase of the
  2-methylcitrate cycle in Pseudomonas putida KT2440. It cleaves
  2-methylisocitrate to pyruvate and succinate, completing propionate-derived
  carbon entry into central metabolism.
existing_annotations:
- term:
    id: GO:0000287
    label: magnesium ion binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000104
  qualifier: enables
  review:
    summary: Correct catalytic cofactor binding, but ancillary to the lyase reaction.
    action: KEEP_AS_NON_CORE
    reason: UniProt specifies Mg2+ as the PrpB cofactor.
    supported_by:
    - reference_id: file:PSEPK/prpB/prpB-uniprot.txt
      supporting_text: 'Name=Mg(2+);'
- term:
    id: GO:0003824
    label: catalytic activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: Correct in branch but too broad for this substrate-specific lyase.
    action: MODIFY
    reason: UniProt assigns the exact 2-methylisocitrate cleavage reaction.
    proposed_replacement_terms:
    - id: GO:0046421
      label: methylisocitrate lyase activity
    supported_by:
    - reference_id: file:PSEPK/prpB/prpB-uniprot.txt
      supporting_text: 'Full=2-methylisocitrate lyase'
- term:
    id: GO:0004451
    label: isocitrate lyase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: Incorrect substrate-specific activity transferred from the related lyase fold.
    action: REMOVE
    reason: >-
      PrpB cleaves 2-methylisocitrate, whereas the separate AceA enzyme is the
      isocitrate lyase of the glyoxylate shunt. UniProt places this target in
      the methylisocitrate-lyase family and records the methyl-substituted
      reaction.
    supported_by:
    - reference_id: file:PSEPK/prpB/prpB-uniprot.txt
      supporting_text: 'Methylisocitrate lyase family.'
- term:
    id: GO:0019543
    label: propionate catabolic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: involved_in
  review:
    summary: Correct biological-process annotation for the terminal cycle step.
    action: ACCEPT
    reason: UniProt places PrpB in propanoate degradation through the 2-methylcitrate cycle.
    supported_by:
    - reference_id: file:PSEPK/prpB/prpB-uniprot.txt
      supporting_text: 'via the 2-methylcitrate cycle (propionate degradation route).'
- term:
    id: GO:0046421
    label: methylisocitrate lyase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: Exact core molecular function for PrpB.
    action: ACCEPT
    reason: UniProt records cleavage of 2-methylisocitrate to pyruvate and succinate.
    supported_by:
    - reference_id: file:PSEPK/prpB/prpB-uniprot.txt
      supporting_text: 'Full=2-methylisocitrate lyase'
references:
