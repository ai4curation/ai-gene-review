    supporting_text: 'Full=2-methylisocitrate lyase'
suggested_questions:
- question: How strongly does KT2440 PrpB exclude isocitrate relative to 2-methylisocitrate?
suggested_experiments:
- description: >-
    Compare purified PrpB kinetics with 2-methylisocitrate and isocitrate and
    test prpB complementation during growth on propionate.
