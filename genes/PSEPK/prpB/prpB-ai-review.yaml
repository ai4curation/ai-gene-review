id: Q88KF6
gene_symbol: prpB
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: >-
  prpB encodes a PrpB-family 2-methylisocitrate lyase in Pseudomonas putida
  KT2440. The enzyme is part of the methylcitrate branch of propionate
  catabolism, where it cleaves 2-methylisocitrate to pyruvate and succinate. It
  belongs to the isocitrate lyase/phosphoenolpyruvate mutase superfamily and is
  magnesium-associated, but its informative molecular-function assignment is
  methylisocitrate lyase rather than generic catalytic activity or glyoxylate
  shunt isocitrate lyase.
existing_annotations:
- term:
    id: GO:0000287
    label: magnesium ion binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000104
  qualifier: enables
  review:
    summary: Magnesium binding is plausible cofactor context for this PrpB-family lyase.
    action: KEEP_AS_NON_CORE
    reason: >-
      UniProt/GOA carry a UniRule magnesium-binding annotation for PrpB. This is
      useful cofactor context, but the core function is the C-C lyase reaction in
      propionate/methylcitrate catabolism.
    supported_by:
    - reference_id: file:PSEPK/prpB/prpB-goa.tsv
      supporting_text: "GO:0000287\tmagnesium ion binding"
    - reference_id: file:PSEPK/prpB/prpB-uniprot.txt
      supporting_text: "GO; GO:0000287; F:magnesium ion binding; IEA:UniProtKB-UniRule."
- term:
    id: GO:0003824
    label: catalytic activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: Generic catalytic activity is too broad for a PrpB-family methylisocitrate lyase.
    action: MODIFY
    reason: >-
      The InterPro-derived catalytic parent is true but uninformative because
      GOA also contains the specific methylisocitrate lyase term supported by
      EC/Rhea, InterPro, PANTHER, and UniRule evidence.
    proposed_replacement_terms:
    - id: GO:0046421
      label: methylisocitrate lyase activity
    supported_by:
    - reference_id: file:PSEPK/prpB/prpB-goa.tsv
      supporting_text: "GO:0003824\tcatalytic activity"
    - reference_id: file:PSEPK/prpB/prpB-goa.tsv
      supporting_text: "GO:0046421\tmethylisocitrate lyase activity"
- term:
    id: GO:0004451
    label: isocitrate lyase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000003
  qualifier: enables
  review:
    summary: Isocitrate lyase is a related superfamily/EC mapping but is less appropriate than methylisocitrate lyase for PrpB.
    action: MODIFY
    reason: >-
      The protein is named and rule-supported as 2-methylisocitrate lyase
      (EC 4.1.3.30), and the propionate/methylcitrate route is the relevant
      pathway context. The glyoxylate-cycle isocitrate lyase term should be
      replaced by the methylisocitrate lyase term for this gene.
    proposed_replacement_terms:
    - id: GO:0046421
      label: methylisocitrate lyase activity
    supported_by:
    - reference_id: file:PSEPK/prpB/prpB-uniprot.txt
      supporting_text: "DE   RecName: Full=2-methylisocitrate lyase"
    - reference_id: file:PSEPK/prpB/prpB-uniprot.txt
      supporting_text: "GO; GO:0046421; F:methylisocitrate lyase activity;"
- term:
    id: GO:0019543
    label: propionate catabolic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: involved_in
  review:
    summary: PrpB is a methylcitrate-cycle enzyme in propionate catabolism.
    action: ACCEPT
    reason: >-
      UniProt describes PrpB as involved in short-chain fatty-acid catabolism
      through the 2-methylcitrate cycle, and GOA links the PrpB-family InterPro
      signature to propionate catabolism.
    supported_by:
    - reference_id: file:PSEPK/prpB/prpB-goa.tsv
      supporting_text: "GO:0019543\tpropionate catabolic process"
    - reference_id: file:PSEPK/prpB/prpB-uniprot.txt
      supporting_text: "via the 2-methylcitrate cycle (propionate degradation route)"
- term:
    id: GO:0046421
    label: methylisocitrate lyase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: Methylisocitrate lyase is the specific core molecular function for PrpB.
    action: ACCEPT
    reason: >-
      The combined automated annotation is supported by EC 4.1.3.30/Rhea and
      PrpB-family signatures. UniProt describes cleavage of
      2-methylisocitrate to pyruvate and succinate.
    supported_by:
    - reference_id: file:PSEPK/prpB/prpB-goa.tsv
      supporting_text: "GO:0046421\tmethylisocitrate lyase activity"
    - reference_id: file:PSEPK/prpB/prpB-uniprot.txt
      supporting_text: "yield pyruvate and succinate"
