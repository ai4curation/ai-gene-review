  title: UniProtKB entry Q88KF6 for Pseudomonas putida KT2440 prpB
  findings:
  - statement: UniProt assigns PrpB as a magnesium-dependent 2-methylisocitrate lyase.
    supporting_text: 'Full=2-methylisocitrate lyase'
    reference_section_type: RESULTS
  - statement: UniProt places the reaction in the propionate-degradation cycle.
    supporting_text: 'via the 2-methylcitrate cycle (propionate degradation route).'
    reference_section_type: RESULTS
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: Exact target accession; catalytic assignment is homology-inferred.
- id: file:projects/P_PUTIDA/deep-research/PSEPK__methylcitrate_cycle__ppu00640-deep-research-openscientist.md
  title: OpenScientist PSEPK 2-methylcitrate-cycle pathway report
  findings:
  - statement: The pathway analysis distinguishes PrpB from the AceA isocitrate-lyase decoy.
    supporting_text: 'Map the cleavage step to PrpB only and exclude AceA to prevent over-propagation of 2-methylisocitrate-lyase activity.'
    reference_section_type: RESULTS
  reference_review:
    relevance: HIGH
    correctness: UNVERIFIED
    review_notes: >-
      Provider-generated pathway report used for first-pass paralog
      disambiguation; the exact PrpB accession and family agree with UniProt.
core_functions:
- description: >-
    Cleaves 2-methylisocitrate to pyruvate and succinate in the terminal step
    of the 2-methylcitrate cycle.
  molecular_function:
