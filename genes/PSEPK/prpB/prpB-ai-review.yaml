- id: file:projects/P_PUTIDA/deep-research/PSEPK__methylcitrate_cycle__ppu00640-deep-research-openscientist.md
  title: OpenScientist PSEPK 2-methylcitrate-cycle pathway report
  findings:
  - statement: The pathway analysis distinguishes PrpB from the AceA isocitrate-lyase decoy.
    supporting_text: 'Map the cleavage step to PrpB only and exclude AceA to prevent over-propagation of 2-methylisocitrate-lyase activity.'
    reference_section_type: RESULTS
  reference_review:
    relevance: HIGH
    correctness: UNVERIFIED
    review_notes: >-
      Provider-generated pathway report used for first-pass paralog
      disambiguation; the exact PrpB accession and family agree with UniProt.
- id: file:PSEPK/prpB/prpB-deep-research-openscientist.md
  title: OpenScientist deep-research report for PSEPK prpB
  findings:
  - statement: The report assigns PrpB the terminal 2-methylisocitrate-cleavage reaction of the methylcitrate cycle.
    supporting_text: 'PrpB (EC 4.1.3.30) catalyzes the **retro-aldol cleavage of (2R,3S)-2-methylisocitrate into succinate + pyruvate**, which is the **last step of the 2-methylcitrate cycle** for propionate oxidation.'
    reference_section_type: RESULTS
  - statement: Structural studies of enterobacterial orthologs distinguish isocitrate as an inhibitor rather than a PrpB substrate.
    supporting_text: 'isocitrate — which lacks the C2 methyl group but is otherwise similar — binds in the active site as a **dead-end inhibitor**'
    reference_section_type: RESULTS
  reference_review:
    relevance: HIGH
    correctness: UNVERIFIED
    review_notes: >-
      Provider-generated gene report. The exact target accession and reaction
      agree with UniProt; the substrate-discrimination experiment is
      ortholog-level evidence, not direct KT2440 enzymology.
