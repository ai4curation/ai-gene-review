suggested_questions:
- question: Does KT2440 PrpB show any measurable isocitrate lyase activity, or is its physiological substrate specificity restricted to 2-methylisocitrate?
suggested_experiments:
- description: Assay purified PrpB with 2-methylisocitrate and isocitrate substrates, and compare growth/fitness phenotypes on propionate or odd-chain fatty acids.
