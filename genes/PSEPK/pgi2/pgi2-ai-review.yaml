  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: pgi2 (PP_4701) encodes a second glucose-6-phosphate isomerase, catalyzing reversible interconversion of D-glucose 6-phosphate and D-fructose 6-phosphate. In P. putida KT2440 this reaction is especially relevant to gluconeogenic and anabolic hexose-phosphate regeneration because glucose catabolism primarily uses the Entner-Doudoroff network rather than a complete forward EMP route.
