description: rplP (PP_0461) encodes large ribosomal subunit protein uL16 (50S ribosomal protein L16),
  a conserved protein component of the bacterial 50S large ribosomal subunit in Pseudomonas putida KT2440.
  It functions as a structural constituent of the ribosome and supports protein translation as part of
  the large subunit. It contacts large-subunit rRNA as part of 50S subunit architecture and assembly.
