description: glnA (PP_5046) encodes glutamine synthetase (GS; EC 6.3.1.2), the ATP-dependent ligase that catalyzes the condensation of L-glutamate and ammonium into L-glutamine (L-glutamate + NH4+ + ATP = L-glutamine + ADP + phosphate + H+). The enzyme is a magnesium-dependent dodecamer of identical subunits arranged as two stacked hexameric rings, with catalytic sites formed at the interfaces between adjacent subunits; each subunit comprises an N-terminal beta-grasp domain and a C-terminal catalytic domain and binds two Mg2+ ions. Together with glutamate synthase (GOGAT, GltB/GltD), GS forms the GS-GOGAT cycle, the principal high-affinity route for assimilating ammonia into glutamate and glutamine under nitrogen-limiting conditions, making L-glutamine the central amino-group donor for biosynthesis of amino acids, nucleotides and other nitrogenous compounds. Bacterial GS activity is regulated post-translationally by reversible adenylylation of a conserved active-site tyrosine. GS is a soluble cytoplasmic protein of central nitrogen metabolism in P. putida.
