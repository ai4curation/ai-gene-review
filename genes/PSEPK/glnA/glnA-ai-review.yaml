  review:
    summary: Core molecular function. This is the precise EC 6.3.1.2 activity matching the UniProt RecName (Glutamine synthetase), the catalytic-activity statement (RHEA:16169) and the glutamine synthetase family assignment (TIGR00653 GlnA, InterPro IPR004809). The Mg2+/ATP/L-glutamate binding-site residues annotated in UniProt further support this. Strongly supported despite IEA evidence.
    action: ACCEPT
- term:
    id: GO:0005737
    label: cytoplasm
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: located_in
  review:
    summary: Correct cellular component. Bacterial glutamine synthetase is a soluble cytoplasmic dodecamer, consistent with the UniProt SUBCELLULAR LOCATION (Cytoplasm) annotation. Accept.
    action: ACCEPT
- term:
    id: GO:0016020
    label: membrane
  evidence_type: IEA
  original_reference_id: GO_REF:0000118
  qualifier: located_in
  review:
    summary: TreeGrafter-propagated localization that conflicts with the experimentally established and UniProt-annotated cytoplasmic localization of glutamine synthetase. GS is a soluble cytoplasmic enzyme with no membrane association; this is a spurious electronic annotation.
    action: REMOVE
- term:
    id: GO:0019740
    label: nitrogen utilization
  evidence_type: IEA
  original_reference_id: GO_REF:0000118
  qualifier: involved_in
  review:
    summary: Core biological process. Glutamine synthetase is the entry point of ammonia into organic nitrogen via the GS-GOGAT cycle, supplying L-glutamine as the major amino-group donor under nitrogen-limiting conditions. Well supported for this gene by PANTHER TreeGrafter and consistent with the GlnA family role in nitrogen assimilation.
    action: ACCEPT
