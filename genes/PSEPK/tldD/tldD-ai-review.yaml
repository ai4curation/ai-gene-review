description: tldD encodes a TldD/PmbA-family U62 metalloprotease associated with proteolysis. In the KT2440 record, its supported
  functions are cytosolic metallopeptidase activity and proteolysis, with product-name context linking the family to microcin
  B17 maturation and sensitivity to the gyrase inhibitor LetD.
