id: Q88JF3
gene_symbol: metR-II
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: metR-II encodes a predicted MetR-like LysR-family DNA-binding transcriptional regulator in
  Pseudomonas putida KT2440. The conserved HTH and LysR substrate-binding domains support transcriptional
  regulation, while the methionine-biosynthesis regulon and effector response remain inferred from product
  and family context.
