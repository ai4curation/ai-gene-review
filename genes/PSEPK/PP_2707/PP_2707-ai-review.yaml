description: PP_2707 encodes an ExoIII-like AP/ExoA-family nuclease with endonuclease/exonuclease-phosphatase domains. The
  current annotations support a cytoplasmic magnesium-dependent DNA repair nuclease likely acting on BER-associated AP-site
  or DNA-end substrates.
