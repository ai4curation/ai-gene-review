taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: priA (PP_5088) encodes replication restart protein PriA, an ATP-dependent 3'-to-5' DNA helicase that recognizes
  stalled or repaired replication fork structures and helps reload the primosome/replisome. In homologous-recombination maps
  it marks the replication-restart output of recombinational repair rather than the RecA strand-exchange core.
