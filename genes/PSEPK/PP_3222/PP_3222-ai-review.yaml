description: PP_3222 encodes a second multi-pass membrane permease subunit of the predicted PP_3220-PP_3223 dipeptide ABC importer in Pseudomonas putida KT2440. It has MetI-like binding-protein-dependent transporter domains and is best curated as contributing to the membrane transport activity of the local dipeptide ABC import system.
