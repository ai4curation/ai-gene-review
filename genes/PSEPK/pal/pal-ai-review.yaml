description: pal (synonym oprL; locus PP_1223) encodes the peptidoglycan-associated outer-membrane lipoprotein (Pal) of the Tol-Pal
  system. It is a lipid-anchored outer-membrane protein whose periplasmic OmpA-like domain binds peptidoglycan non-covalently, tethering
  the outer membrane to the cell wall. This structural (non-enzymatic) function maintains Gram-negative envelope integrity and supports
  outer-membrane invagination during cell division, when the energized Tol-Pal machinery (TolQ/TolR/TolA/TolB/Pal) mobilizes Pal to the
  division septum. In P. putida KT2440, pal/oprL is essential or near-essential (clean deletions could not be generated), and recent
  proteomics additionally identifies OprL/Pal as a phasin-associated protein localizing to PHA carbonosomes.
