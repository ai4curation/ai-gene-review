description: fadE encodes a predicted acyl-CoA dehydrogenase of Pseudomonas putida KT2440. UniProt assigns both long-chain and medium-chain fatty acyl-CoA dehydrogenase reactions and places the enzyme in fatty acid beta-oxidation, consistent with a first-step FAD-dependent dehydrogenase role in fatty-acid degradation.
