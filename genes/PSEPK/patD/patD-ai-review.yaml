    label: gamma-guanidinobutyraldehyde dehydrogenase (NAD+) activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000003
  qualifier: enables
  review:
    summary: Gamma-guanidinobutyraldehyde dehydrogenase (NAD+) activity matches the EC 1.2.1.54 assignment.
    action: ACCEPT
    reason: This EC-derived activity is plausible for the aldehyde dehydrogenase family, but it remains side-route context for the lysine-degradation batch.
    supported_by:
