  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: patD encodes a medium-chain aldehyde dehydrogenase-family enzyme in Pseudomonas putida KT2440 with automated EC assignments for aminobutyraldehyde and gamma-guanidinobutyraldehyde dehydrogenase activities. In the ppu00310 lysine-degradation map it is best treated as aldehyde-dehydrogenase boundary chemistry rather than a committed lysine-catabolic enzyme.
existing_annotations:
- term:
    id: GO:0004030
    label: aldehyde dehydrogenase [NAD(P)+] activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000117
  qualifier: enables
  review:
    summary: Aldehyde dehydrogenase [NAD(P)+] activity is a valid family-level activity for PatD.
    action: ACCEPT
    reason: The protein is annotated as a medium-chain aldehyde dehydrogenase with EC 1.2.1.19 and 1.2.1.54; the broad aldehyde dehydrogenase term captures this boundary role without overclaiming a lysine-specific process.
    supported_by:
    - reference_id: file:PSEPK/patD/patD-goa.tsv
      supporting_text: "GO:0004030\taldehyde dehydrogenase [NAD(P)+] activity"
    - reference_id: file:PSEPK/patD/patD-uniprot.txt
      supporting_text: Belongs to the aldehyde dehydrogenase family.
    - reference_id: file:PSEPK/patD/patD-deep-research-asta.md
      supporting_text: 'uniprot_accession: Q88MT7'
- term:
    id: GO:0016491
    label: oxidoreductase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: Generic oxidoreductase activity is too broad for PatD.
    action: MODIFY
    reason: Replace the broad oxidoreductase parent with aldehyde dehydrogenase [NAD(P)+] activity, which better reflects the family and EC assignments.
    supported_by:
    - reference_id: file:PSEPK/patD/patD-goa.tsv
      supporting_text: "GO:0016491\toxidoreductase activity"
    - reference_id: file:PSEPK/patD/patD-uniprot.txt
      supporting_text: Belongs to the aldehyde dehydrogenase family.
    proposed_replacement_terms:
    - id: GO:0004030
      label: aldehyde dehydrogenase [NAD(P)+] activity
- term:
    id: GO:0019145
    label: aminobutyraldehyde dehydrogenase (NAD+) activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000003
  qualifier: enables
  review:
    summary: Aminobutyraldehyde dehydrogenase (NAD+) activity matches the EC 1.2.1.19 assignment.
    action: ACCEPT
    reason: This is one of the specific EC-derived activities assigned to PatD, but it should be interpreted as beta-alanine/polyamine-side boundary chemistry rather than proof of a committed lysine-catabolic step.
    supported_by:
    - reference_id: file:PSEPK/patD/patD-goa.tsv
      supporting_text: "GO:0019145\taminobutyraldehyde dehydrogenase (NAD+) activity"
    - reference_id: file:PSEPK/patD/patD-uniprot.txt
      supporting_text: EC=1.2.1.19
- term:
