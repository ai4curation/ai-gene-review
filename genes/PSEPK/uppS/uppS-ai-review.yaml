taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: uppS encodes undecaprenyl diphosphate synthase, a cis-prenyltransferase that extends farnesyl diphosphate with
  IPP units to produce undecaprenyl diphosphate. This lipid carrier precursor supports bacterial cell-envelope polysaccharide
  biosynthesis, including peptidoglycan and lipopolysaccharide assembly.
