id: Q88QE6
gene_symbol: ubiX
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: >-
  ubiX encodes a metal-independent flavin prenyltransferase that uses
  dimethylallyl phosphate to synthesize prenylated FMN. This cofactor activates
  the UbiD decarboxylase used in ubiquinone biosynthesis.
existing_annotations:
- term:
    id: GO:0003824
    label: catalytic activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: Catalytic activity is uninformative beside the exact flavin prenyltransferase term.
    action: MARK_AS_OVER_ANNOTATED
    reason: GO:0106141 captures the specific evolved activity of UbiX.
- term:
    id: GO:0004659
    label: prenyltransferase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: Prenyltransferase activity is correct but too broad.
    action: MARK_AS_OVER_ANNOTATED
    reason: The flavin substrate and prenylated-FMN product are captured by GO:0106141.
- term:
    id: GO:0016831
    label: carboxy-lyase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000118
  qualifier: enables
  review:
    summary: UbiX is not itself the carboxy-lyase.
    action: REMOVE
    reason: >-
      UbiX synthesizes prenylated FMN, whereas the partner UbiD protein performs
      the 4-hydroxy-3-polyprenylbenzoate decarboxylation. This TreeGrafter
      propagation confuses cofactor supply with the UbiD reaction.
    supported_by:
    - reference_id: file:PSEPK/ubiX/ubiX-uniprot.txt
      supporting_text: prenylated FMN cofactor
    - reference_id: PMID:26083743
      supporting_text: >-
        Despite structural and biochemical characterization of UbiX as a flavin
        mononucleotide (FMN)-binding protein, no decarboxylase activity has been
        detected.
- term:
    id: GO:0106141
    label: flavin prenyltransferase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: Flavin prenyltransferase activity is the core function of UbiX.
    action: ACCEPT
    reason: UniProt assigns EC 2.5.1.129 and Rhea 37743 for prenylated-FMN synthesis.
    supported_by:
    - reference_id: file:PSEPK/ubiX/ubiX-uniprot.txt
      supporting_text: Flavin prenyltransferase UbiX
    - reference_id: PMID:26083743
      supporting_text: >-
        UbiX acts as a flavin prenyltransferase, linking a dimethylallyl moiety
        to the flavin N5 and C6 atoms.
references:
- id: GO_REF:0000002
  title: Gene Ontology annotation through association of InterPro records with GO
    terms
  findings: []
- id: GO_REF:0000118
  title: TreeGrafter-generated GO annotations
  findings: []
- id: GO_REF:0000120
  title: Combined Automated Annotation using Multiple IEA Methods
  findings: []
- id: file:PSEPK/ubiX/ubiX-uniprot.txt
  title: UniProt entry Q88QE6 for ubiX
  findings:
  - statement: >-
      The entry assigns UbiX as the flavin prenyltransferase that supplies the
      prenylated-FMN cofactor to UbiD.
- id: file:PSEPK/ubiX/ubiX-goa.tsv
  title: QuickGO GOA annotations for ubiX
  findings:
  - statement: The fetched GOA table contains the four annotations reviewed here.
- id: PMID:26083743
  title: UbiX is a flavin prenyltransferase required for bacterial ubiquinone biosynthesis.
  findings:
  - statement: >-
      Direct UbiX biochemistry establishes metal-independent transfer of a
      dimethylallyl group to FMN, producing the novel cofactor required by UbiD
      rather than catalyzing decarboxylation itself.
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      PubMed record and abstract verified; the primary biochemical evidence is
      from characterized orthologs rather than PP_0548.
- id: file:PSEPK/ubiX/ubiX-deep-research-openscientist.md
  title: OpenScientist functional review of PSEPK ubiX
  findings:
  - statement: >-
      Family biochemistry, sequence/domain conservation, and the cognate UbiD
      pathway context support prFMN cofactor synthesis by PP_0548. The target
      itself has not been assayed, and octaprenyl substrate wording from E. coli
      is not treated as KT2440-specific chemistry.
core_functions:
- description: >-
    Synthesis of prenylated FMN from reduced FMN and dimethylallyl phosphate,
    supplying the cofactor required by UbiD-family decarboxylases. The PP_0548
    reaction is inferred from conserved UbiX-family evidence rather than a
    target-specific assay.
  molecular_function:
    id: GO:0106141
    label: flavin prenyltransferase activity
  supported_by:
  - reference_id: file:PSEPK/ubiX/ubiX-uniprot.txt
    supporting_text: prenylated FMN cofactor
  - reference_id: PMID:26083743
    supporting_text: >-
      UbiX produces a novel flavin-derived cofactor required for the
      decarboxylase activity of UbiD.
  - reference_id: file:PSEPK/ubiX/ubiX-deep-research-openscientist.md
    supporting_text: >-
      No published in vitro characterization, crystal structure, or deletion
      phenotype exists for the P. putida KT2440 UbiX specifically.
proposed_new_terms: []
suggested_questions:
- question: >-
    Is PP_0548 the only physiologically relevant prFMN supplier in KT2440, and
    are there conditional prFMN-dependent clients beyond UbiD PP_5213?
suggested_experiments:
- description: >-
    Reconstitute PP_0548 with reduced FMN and dimethylallyl phosphate, verify
    prFMN by LC-MS, and test whether the product activates purified PP_5213
    UbiD on a P. putida-relevant polyprenyl substrate.
