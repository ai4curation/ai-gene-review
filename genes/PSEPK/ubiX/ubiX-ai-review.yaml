id: Q88QE6
gene_symbol: ubiX
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: >-
  ubiX encodes a UbiX/PAD1-family flavin prenyltransferase in Pseudomonas
  putida KT2440. The protein catalyzes formation of prenylated FMN from reduced
  FMN and dimethylallyl phosphate, supplying the cofactor used by UbiD-family
  decarboxylases such as the ubiquinone-pathway 4-hydroxy-3-polyprenylbenzoic
  acid decarboxylase. In aromatic-degradation pathway maps this is a cofactor
  side node rather than a ring-cleavage or beta-ketoadipate enzyme.
existing_annotations:
- term:
    id: GO:0003824
    label: catalytic activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: >-
      Catalytic activity is true but too broad for a protein with a specific
      UbiX/PAD1-family flavin prenyltransferase assignment.
    action: MODIFY
    reason: >-
      UniProt names Q88QE6 as flavin prenyltransferase UbiX and gives the
      dimethylallyl phosphate plus FMNH2 reaction; the specific GOA term
      GO:0106141 should be preferred over generic catalytic activity.
    proposed_replacement_terms:
    - id: GO:0106141
      label: flavin prenyltransferase activity
- term:
    id: GO:0004659
    label: prenyltransferase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: >-
      Prenyltransferase activity is directionally correct but less informative
      than the existing flavin prenyltransferase activity annotation.
    action: MODIFY
    reason: >-
      The UniProt/HAMAP functional assignment is the UbiX reaction that attaches
      a dimethylallyl moiety to FMN, so GO:0106141 is the better molecular
      function term.
    proposed_replacement_terms:
    - id: GO:0106141
      label: flavin prenyltransferase activity
- term:
    id: GO:0016831
    label: carboxy-lyase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000118
  qualifier: enables
  review:
    summary: >-
      Carboxy-lyase activity appears to be an over-propagated UbiX/PAD1-family
      annotation.
    action: REMOVE
    reason: >-
      Q88QE6 is annotated as the UbiX flavin prenyltransferase that makes the
      prenyl-FMN cofactor for UbiD decarboxylases. The decarboxylase/carboxy-
      lyase chemistry is carried out by UbiD-family enzymes, not by UbiX itself.
- term:
    id: GO:0106141
    label: flavin prenyltransferase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: >-
      Flavin prenyltransferase activity matches the UniProt/HAMAP EC 2.5.1.129
      assignment and the recorded reaction chemistry.
    action: ACCEPT
    reason: >-
      This is the specific molecular function supported for UbiX: synthesis of
      prenylated FMN from FMNH2 and dimethylallyl phosphate.
- term:
    id: GO:0006744
    label: ubiquinone biosynthetic process
  evidence_type: IEA
  original_reference_id: file:PSEPK/ubiX/ubiX-uniprot.txt
  qualifier: involved_in
  review:
    summary: >-
      UbiX supplies prenylated FMN for UbiD-family decarboxylases, including the
      4-hydroxy-3-polyprenylbenzoic acid decarboxylase step of ubiquinone
      biosynthesis.
    action: NEW
    reason: >-
      The current GOA contains only molecular-function annotations. UniProt
      explicitly places UbiX upstream of UbiD cofactor use, supporting a
      ubiquinone biosynthetic process annotation while keeping aromatic
      degradation as a secondary map context.
    supported_by:
    - reference_id: file:PSEPK/ubiX/ubiX-uniprot.txt
      supporting_text: 'CC       prenylated FMN cofactor (prenyl-FMN) for 4-hydroxy-3-polyprenylbenzoic'
