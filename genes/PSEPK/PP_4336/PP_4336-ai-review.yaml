proposed_new_terms: []
suggested_questions:
- question: Does PP_4336/MotC assemble with PP_4335/MotD in the same motor as MotA/MotB, or
    are the two stators recruited under different load conditions?
- question: Which conserved charged residues in PP_4336 mediate rotor contact with FliG and
    ion-coupled torque generation?
suggested_experiments:
- description: Tag PP_4336 and MotA at native loci to measure stator recruitment during liquid
    swimming, high-viscosity swimming, and agar migration.
- description: Mutate conserved MotA/ExbB-channel residues in PP_4336 and test effects on
    motor rotation, motility, and complementation of a PP_4336 deletion.
