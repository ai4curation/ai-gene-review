id: Q88EW6
gene_symbol: PP_4336
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: PP_4336 encodes the MotA-like A subunit candidate of the MotCD flagellar stator
  in Pseudomonas putida KT2440. It is a multi-pass inner-membrane protein with MotA/ExbB proton-channel
  domains and is paired in the main flagellar cluster with the MotB-like PP_4335 protein.
  The inferred role is ion-coupled stator function for flagellar rotation and motility, distinct
  from the MotAB stator encoded by motA/motB elsewhere in the genome.
