- term:
    id: GO:0006935
    label: chemotaxis
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: involved_in
  review:
    summary: Chemotaxis is biologically downstream of stator-dependent flagellar motility,
      but PP_4336 is not a chemotaxis signaling protein.
    action: MARK_AS_OVER_ANNOTATED
    reason: The direct role is MotCD stator function in flagellar rotation and motility. Chemotaxis
      behavior depends on motor output, but the PP_4336 product is a motor/stator component
      rather than a receptor, Che protein, or adaptation enzyme.
