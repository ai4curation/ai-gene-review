- term:
    id: GO:0071978
    label: bacterial-type flagellum-dependent swarming motility
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: involved_in
  review:
    summary: Swarming motility is too specific for the available PP_4336 evidence.
    action: MARK_AS_OVER_ANNOTATED
    reason: PP_4336/MotC contributes to flagellar stator function and thus flagellum-dependent
      cell motility, but swarming is a specialized surface behavior. The P. putida stator
      study explicitly distinguishes liquid swimming and agar spreading and notes that P.
      putida does not swarm in a flagella-dependent manner.
    supported_by:
