description: ccmA encodes the ATP-binding nucleotide-binding subunit of the CcmAB ABC transporter complex involved in cytochrome c-type biogenesis. It hydrolyzes ATP at the inner membrane to energize the CcmAB heme-handling system, although the exact direct transport role of CcmA is unresolved in the reviewed UniProt annotation.
