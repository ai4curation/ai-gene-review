description: pilI (PP_4990) encodes a small CheW-family protein in the Pseudomonas putida KT2440 Pil/Chp-type
  signaling cluster. Its CheW-domain signature supports an adaptor/scaffold role in a local chemosensory
  signaling array rather than an enzyme.
