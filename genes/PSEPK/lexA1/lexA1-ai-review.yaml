gene_symbol: lexA1
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: lexA1 encodes the conventional LexA repressor in Pseudomonas putida KT2440. It is a LexA-family DNA-binding transcriptional
  repressor and RecA-stimulated autocleaving serine peptidase that controls the main E. coli-like SOS regulon in KT2440, in
  contrast to the narrower lexA2-imuA-imuB-dnaE2 cassette regulator.
