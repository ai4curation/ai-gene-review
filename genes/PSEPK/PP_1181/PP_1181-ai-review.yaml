  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: PP_1181 encodes a predicted OmpR/PhoB-family DNA-binding response regulator in Pseudomonas
  putida KT2440. Its CheY-like receiver and OmpR/PhoB-type DNA-binding domains support a cytosolic phosphorelay-dependent
  transcriptional regulatory role, likely paired with the adjacent PP_1182 sensor kinase.
