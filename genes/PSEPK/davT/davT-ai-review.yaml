description: davT encodes 5-aminovalerate aminotransferase (DavT; EC 2.6.1.48), a PLP-dependent class III aminotransferase
  in the lysine catabolic pathway that converts 5-aminovalerate and 2-oxoglutarate to 5-oxopentanoate and L-glutamate.
