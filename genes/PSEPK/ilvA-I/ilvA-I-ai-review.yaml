id: Q88HB4
gene_symbol: ilvA-I
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:160488
  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950
    / KT2440)
description: >-
  IlvA-I is a full-length, PLP-dependent biosynthetic threonine deaminase that
  converts L-threonine to 2-oxobutanoate, the entry metabolite for L-isoleucine
  biosynthesis. It contains the catalytic serine/threonine-dehydratase domain
  and two C-terminal ACT-like regulatory domains. KT2440 also encodes the
  closely related IlvA-II, and their relative physiological contributions have
  not been established.
existing_annotations:
- term:
    id: GO:0003941
    label: L-serine ammonia-lyase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000118
  qualifier: enables
  review:
    summary: The family can show serine-dehydratase chemistry, but this is not the defining IlvA-I function.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      Q88HB4 carries the biosynthetic-threonine-deaminase signature and an exact
      threonine reaction/pathway assignment. TreeGrafter transfer across the
      broader serine/threonine-dehydratase family does not establish a
      physiologically relevant serine reaction for this paralog.
- term:
    id: GO:0004794
    label: threonine deaminase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: This is the defining IlvA-I molecular function.
    action: ACCEPT
    reason: >-
      EC 4.3.1.19, RHEA:22108, InterPro:IPR005787, and the full-length ACT-domain
      architecture support biosynthetic L-threonine deamination.
    supported_by:
    - reference_id: file:PSEPK/ilvA-I/ilvA-I-uniprot.txt
      supporting_text: Full=L-threonine dehydratase
- term:
    id: GO:0006520
    label: amino acid metabolic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: involved_in
  review:
    summary: This broad parent is redundant with the specific isoleucine pathway assignment.
    action: MARK_AS_OVER_ANNOTATED
    reason: GO:1901705 states the relevant physiological process more precisely.
- term:
    id: GO:0006565
    label: L-serine catabolic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000118
  qualifier: involved_in
  review:
    summary: No evidence establishes a physiological serine-catabolic role for IlvA-I.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      This TreeGrafter call follows the broad enzyme family. The exact UniProt
      reaction and pathway record instead identify threonine use for
      2-oxobutanoate supply in isoleucine biosynthesis.
- term:
    id: GO:0006567
    label: L-threonine catabolic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000118
  qualifier: involved_in
  review:
    summary: Consuming threonine in isoleucine synthesis is not a threonine-catabolic pathway assignment.
    action: REMOVE
    reason: >-
      Q88HB4 channels the threonine-derived carbon skeleton into isoleucine.
      TreeGrafter has conflated substrate consumption with a physiological
      L-threonine catabolic process.
- term:
    id: GO:0030170
    label: pyridoxal phosphate binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: PLP binding is valid cofactor context for the deaminase reaction.
    action: KEEP_AS_NON_CORE
    reason: The PLP-dependent enzyme-family signatures support this binding term, which is less informative than the reaction.
- term:
    id: GO:1901705
    label: L-isoleucine biosynthetic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: involved_in
  review:
    summary: IlvA-I supplies 2-oxobutanoate to the isoleucine branch.
    action: ACCEPT
    reason: >-
      UniProt assigns Q88HB4 to the single conversion of L-threonine to
      2-oxobutanoate in L-isoleucine biosynthesis.
    supported_by:
    - reference_id: file:PSEPK/ilvA-I/ilvA-I-uniprot.txt
      supporting_text: L-isoleucine biosynthesis
