description: yejF encodes the predicted ATP-binding energy-coupling component of the PP_4146-PP_4150 Yej/Dpp-like peptide ABC import candidate. Its ABC ATPase domains, EC 7.4.2.9 annotation, and UniProt function text for di/tripeptide uptake support ATP hydrolysis-driven peptide import with the adjacent binding and permease components.
