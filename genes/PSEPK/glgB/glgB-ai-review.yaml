- term:
    id: GO:0004553
    label: hydrolase activity, hydrolyzing O-glycosyl compounds
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: The hydrolase annotation appears to be a GH13-family over-propagation rather than the GlgB reaction.
    action: REMOVE
    reason: GlgB is described as a branching enzyme that transfers a glucan segment to create alpha-1,6 linkages, not as an O-glycosyl hydrolase; the InterPro hydrolase label is likely inherited from the GH13 fold.
    supported_by:
    - reference_id: file:PSEPK/glgB/glgB-uniprot.txt
