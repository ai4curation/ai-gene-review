  label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
description: glgB encodes the bacterial 1,4-alpha-glucan branching enzyme in Pseudomonas putida KT2440. It forms alpha-1,6-glucosidic branch linkages in glycogen/alpha-glucan during glycogen biosynthesis.
