description: ureA (PP_2843) encodes the gamma subunit of cytoplasmic urease, a nickel metalloenzyme complex that hydrolyzes
  urea to ammonia and carbon dioxide. It is an arginine-map side node connected through urea/nitrogen metabolism, not a committed
  L-arginine biosynthesis step.
