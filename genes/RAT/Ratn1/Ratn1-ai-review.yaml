core_functions:
- description: Secreted lipocalin that binds and releases volatile pheromones/odorants in its beta-barrel
    calyx, mediating chemical communication; shed in urine and dander (major rodent inhalant allergen).
  molecular_function:
    id: GO:0005550
    label: pheromone binding
  supported_by:
