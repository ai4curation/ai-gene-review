    label: extracellular region
  knowledge_gaps:
  - gap_statement: Whether this MUP allergen has any genuine endocrine/metabolic function (as ISS-propagated
      from MUP metabolic studies) is unresolved and probably spurious for this protein.
    boundary: 'Established: pheromone/odorant binding by the secreted lipocalin. Unknown/disputed: the
      insulin-receptor / glucose-lipid-metabolism roles transferred by similarity across the MUP family.'
    gap_kind:
    - BIOLOGY
    - CURATION
    provenance:
    - reference_id: file:RAT/Ratn1/Ratn1-uniprot.txt
      supporting_text: Major urinary proteins (Mups) bind and release pheromones.
