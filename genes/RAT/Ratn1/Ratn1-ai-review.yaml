id: P02761
gene_symbol: Ratn1
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:10116
  label: Rattus norvegicus
description: Rat n 1 (major urinary protein), a secreted lipocalin (calycin superfamily, lipocalin family)
  and the major rat allergen. MUPs bind and release volatile pheromones in their beta-barrel calyx and
  may protect them from oxidation, regulating social behaviours (aggression, mating, territory) and acting
  as kairomones. Rat n 1 is shed in urine and dander and is the dominant rat inhalant allergen (laboratory-animal
  allergy).
