description: >-
  ProtNLM2 predicted GO:0004438 (phosphatidylinositol-3-phosphate phosphatase activity) for
  Mytilus galloprovincialis MTMR9 (A0A8B6GS20), a 607-aa myotubularin-related protein
  belonging to the protein-tyrosine phosphatase family, non-receptor class myotubularin
  subfamily. This prediction is incorrect (NPI): MTMR9 is a catalytically inactive
  pseudophosphatase that lacks the critical catalytic cysteine residue in the conserved CX5R
  motif of the phosphatase domain, rendering it unable to dephosphorylate any
  phosphoinositide substrate. The ProtNLM2 model likely recognized the myotubularin
  phosphatase domain (Pfam PF06602, PROSITE PS51339) and predicted catalytic activity
  characteristic of the broader myotubularin family without distinguishing the active
  members (MTMR1-4, MTMR6-8) from the catalytically dead pseudophosphatases (MTMR5/9-13).
  MTMR9 instead functions as a regulatory scaffold that heterodimerizes with active MTMR
  partners via its coiled-coil domain.
  Assessment: 0 correct, 0 uncertain, 1 incorrect (NPI).
