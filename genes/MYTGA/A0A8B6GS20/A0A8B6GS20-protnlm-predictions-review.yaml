      summary: >-
        ProtNLM2 predicted GO:0004438 (phosphatidylinositol-3-phosphate phosphatase
        activity) for MTMR9, but this is a catalytic activity that MTMR9 cannot perform.
        MTMR9 is a well-characterized catalytically inactive pseudophosphatase within the
        myotubularin subfamily. It retains the overall myotubularin phosphatase domain fold
        (Pfam PF06602, Myotub-related; PROSITE PS51339, PPASE_MYOTUBULARIN) but lacks the
        critical catalytic cysteine in the conserved CX5R motif required for phosphoinositide
        dephosphorylation. The existing GOA annotations reflect this biology correctly:
        MTMR9 is annotated with protein phosphatase binding (GO:0019903), capturing its role
        as a scaffold that heterodimerizes with catalytically active family members (MTMR6,
        MTMR7, MTMR8), and its involvement in phosphatidylinositol dephosphorylation
        (GO:0046856) was flagged in the ai-review as requiring modification to the regulatory
        term GO:0060304 (regulation of phosphatidylinositol dephosphorylation). The ProtNLM2
        error is a classic paralog overannotation (Type 6): the sequence-based model
        recognized the conserved myotubularin domain architecture and predicted the catalytic
        activity of the active subfamily members (MTMR1-4, MTMR6-8) without detecting the
        degenerate active site that distinguishes the pseudophosphatase branch (MTMR5, MTMR9,
        MTMR10-13). This is precisely the kind of subfamily-level functional divergence that
        sequence similarity methods struggle to capture, as the overall domain architecture is
        preserved despite loss of catalytic competence. PI(3)P phosphatase activity is the
        canonical substrate specificity of the active myotubularins, making it a plausible but
        biologically incorrect prediction for this catalytically dead family member.
        An independent OpenScientist investigation (see file reference) confirms the dispute:
        the protein is a catalytically dead pseudophosphatase (MTMR9-like) that acts as a
        non-catalytic adaptor for active myotubularin partners, so GO:0004438 should not be a
        direct molecular function. Caveats it raises (neither rescuing the missing catalytic
        residues): the exact human paralog assignment is provisional (weak k-mer similarity),
        and the mollusc protein has an atypical N-terminal zona-pellucida/D8C_UMOD-like region
        (IPR057774) absent from vertebrate MTMR9, raising gene-model questions. NPI confirmed.
      supported_by:
        - reference_id: file:MYTGA/A0A8B6GS20/A0A8B6GS20-hypotheses/prediction-pi3p-phosphatase/openscientist.md
          supporting_text: catalytically dead pseudophosphatase
