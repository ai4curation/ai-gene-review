id: A0A8B6BFL6
gene_symbol: A0A8B6BFL6
taxon:
  id: NCBITaxon:29158
  label: Mytilus galloprovincialis
status: COMPLETE
description: >-
  ProtNLM2 predicted 3 GO terms for this reverse transcriptase domain-containing
  protein (MGAL_10B073878) from Mediterranean mussel. The protein contains a Pfam
  RVT_1 reverse transcriptase domain (PF00078) and an RNase_HI_RT_DIRS1 domain
  (CDD cd09275), indicating it is encoded by a DIRS1-type retrotransposon rather
  than a LINE element. DIRS1 retrotransposons replicate via an RNA intermediate and
  integrate into the host genome using tyrosine recombinase-mediated recombination
  at inverted terminal repeats, not the target-primed reverse transcription used by
  LINEs. All three predictions (DNA binding, DNA recombination, DNA integration)
  are biologically plausible for a DIRS1 retrotransposon-encoded protein, but DNA
  binding is overly generic (LSP), while DNA recombination and DNA integration are
  correct novel predictions consistent with the DIRS1 tyrosine recombinase-mediated
  integration mechanism.
  Assessment: 2 correct novel (COR), 1 less precise (LSP), 0 uncertain (UNC),
  0 incorrect (NPI/PLI).
