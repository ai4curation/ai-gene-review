predictions:
  - source_method: ProtNLM2
    source_version: UniProt 2024_06 pilot
    predicted_term:
      id: GO:0003677
      label: DNA binding
    predicted_term_type: GO_MF
    review:
      assessment: LSP
      confidence_score: 2
      summary: >-
        DNA binding is technically correct for a reverse transcriptase
        domain-containing protein from a DIRS1-type retrotransposon, since the
        protein must interact with DNA during reverse transcription (cDNA
        synthesis) and integration. However, GO:0003677 is a very broad molecular
        function term that fails to capture the actual enzymatic activity. The
        primary molecular function of this protein is RNA-directed DNA polymerase
        activity (GO:0003964), which is far more informative. Additionally, DIRS1
        elements encode a tyrosine recombinase domain for integration that also
        binds DNA, but again, the specific catalytic function is more informative
        than generic DNA binding. Assessed as LSP because the prediction is
        correct at a high level but substantially less precise than what domain
        architecture alone would support.
  - source_method: ProtNLM2
    source_version: UniProt 2024_06 pilot
    predicted_term:
      id: GO:0006310
      label: DNA recombination
    predicted_term_type: GO_BP
    review:
      assessment: COR
      confidence_score: 2
      summary: >-
        DNA recombination is a correct novel prediction for a DIRS1-type
        retrotransposon protein. Unlike LINE retrotransposons that use
        target-primed reverse transcription (TPRT) for integration, DIRS1
        elements integrate into the host genome via tyrosine recombinase-mediated
        site-specific recombination. The CDD domain RNase_HI_RT_DIRS1 (cd09275)
        specifically identifies this protein as belonging to the DIRS1 class,
        whose integration mechanism is fundamentally recombination-based. DIRS1
        elements produce circular DNA intermediates that are then integrated
        through recombination at their inverted terminal repeats. This term is
        absent from GOA for this protein and represents a biologically accurate
        prediction supported by the known mechanism of DIRS1 element propagation.
  - source_method: ProtNLM2
    source_version: UniProt 2024_06 pilot
    predicted_term:
      id: GO:0015074
      label: DNA integration
    predicted_term_type: GO_BP
    review:
      assessment: COR
      confidence_score: 2
      summary: >-
        DNA integration is a correct novel prediction for a retrotransposon-encoded
        reverse transcriptase. Retrotransposons replicate via a copy-and-paste
        mechanism in which the element is transcribed to RNA, reverse-transcribed
        to DNA, and then integrated into new genomic loci. For DIRS1-type
        elements (as indicated by the RNase_HI_RT_DIRS1 CDD domain cd09275),
        integration proceeds through tyrosine recombinase-mediated insertion of
        circular DNA intermediates. The protein's domain architecture (RT domain
        plus DIRS1-associated RNase H) directly supports involvement in the
        retrotransposition cycle that culminates in genomic integration. This is
        a core biological process for any active retrotransposon and is not
        present in GOA for this uncharacterized protein from M. galloprovincialis,
        making it a genuinely informative novel prediction.
