  review:
    summary: IEA annotation mapping the InterPro family III CoA-transferase signature
      (IPR003673) to the root catalytic activity term. This is uninformative because
      HadA has been biochemically characterized (PMID:16957230) as a specific (R)-2-hydroxy-4-methylpentanoate
      CoA-transferase (EC 2.8.3.24). A much more specific molecular function term
      is available.
    action: MODIFY
    reason: GO:0003824 (catalytic activity) is the root molecular function term and
      provides no information beyond "this protein is an enzyme." HadA's reaction
      has been directly demonstrated biochemically by Kim et al. (PMID:16957230),
      who showed CoA-transferase activity with (R)-2-hydroxyisocaproyl-CoA as donor
      and isocaproate or (E)-2-isocaprenoate as acceptor, with substrate specificity
      confirmed by lack of activity with acetyl-CoA or butyryl-CoA. The matching specific
      term GO:0043712 (2-hydroxyisocaproate CoA-transferase activity) corresponds
      exactly to the UniProt RecName and EC 2.8.3.24 reaction.
