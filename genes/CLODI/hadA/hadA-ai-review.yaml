gene_symbol: hadA
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:1496
  label: Clostridioides difficile
description: HadA is a family III CoA-transferase (EC 2.8.3.24) that catalyzes the
  transfer of the CoA moiety from 4-methylpentanoyl-CoA (isocaproyl-CoA) to (R)-2-hydroxy-4-methylpentanoate
  ((R)-2-hydroxyisocaproate), producing (R)-2-hydroxy-4-methylpentanoyl-CoA and 4-methylpentanoate
  (isocaproate). It functions in the reductive branch of L-leucine fermentation in
  the strictly anaerobic gut pathogen Clostridioides difficile, where leucine is dismutated
  to isovalerate (oxidation) and isocaproate (reduction). HadA activates (R)-2-hydroxyisocaproate
  as its CoA thioester so the downstream radical 2-hydroxyacyl-CoA dehydratase HadBC
  (activated by HadI) can dehydrate it to (E)-2-isocaprenoyl-CoA. The enzyme is a
  homodimer with Asp-171 as the catalytic nucleophile (probably forming a mixed-anhydride
  intermediate with the acyl-CoA substrate); other CoA thioesters such as acetyl-CoA
  or butyryl-CoA are not accepted as donors (PMID:16957230).
