references:
- id: GO_REF:0000002
  title: Gene Ontology annotation through association of InterPro records with GO
    terms
  findings:
  - statement: InterPro2GO mapping links the CoA-transferase family III signature
      (IPR003673) only to the root term GO:0003824 (catalytic activity), which is
      uninformative for a biochemically characterized enzyme.
- id: GO_REF:0000041
  title: Gene Ontology annotation based on UniPathway vocabulary mapping
  findings:
  - statement: UniPathway UPA00363 (L-leucine degradation) maps to GO:0006552 (L-leucine
      catabolic process); this correctly captures HadA's pathway role in C. difficile.
- id: PMID:16957230
  title: Characterization of (R)-2-hydroxyisocaproate dehydrogenase and a family III
    coenzyme A transferase involved in reduction of L-leucine to isocaproate by Clostridium
    difficile.
  findings:
  - statement: Primary biochemical characterization of HadA. Recombinant Strep-tagged
      HadA was purified and shown to catalyze CoA transfer between (R)-2-hydroxyisocaproyl-CoA
      (donor) and isocaproate or (E)-2-isocaprenoate (acceptor). Acetyl-CoA and butyryl-CoA
      were not accepted as donors, demonstrating specificity for the leucine-derived
      branched-chain acyl-CoA.
    supporting_text: HadA showed CoA transferase activity with (R)-2-hydroxyisocaproyl-CoA
      as a donor and isocaproate or (E)-2-isocaprenoate as an acceptor.
  - statement: Asp-171 is the catalytic nucleophile, identified by site-directed mutagenesis;
      the conserved aspartate is proposed to form a mixed anhydride intermediate with
      the acyl group of the thioester substrate. D171A and D171N variants are inactive.
    supporting_text: By site-directed mutagenesis, the conserved D171 was identified
      as an essential catalytic residue probably involved in the formation of a mixed
      anhydride with the acyl group of the thioester substrate.
  - statement: HadA functions in the reductive branch of leucine fermentation in C.
      difficile (leucine -> isocaproate), one of two branches by which this gut anaerobe
      dismutates leucine for energy. The CoA transferase and the partner dehydrogenase
      (LdhA) together generate the substrate for the downstream radical dehydratase
      HadBC.
    supporting_text: The dehydrogenase and the CoA transferase fit well into the proposed
      pathway of leucine reduction to isocaproate.
- id: PMID:15654892
  title: 2-Hydroxyisocaproyl-CoA dehydratase and its activator from Clostridium difficile.
  findings:
  - statement: Characterization of the downstream dehydratase HadBC and its ATP-dependent
      one-electron activator HadI, establishing the pathway context for HadA. (R)-2-hydroxyisocaproyl-CoA
      (the product of HadA) is dehydrated to (E)-2-isocaprenoyl-CoA en route to isocaproate.
    supporting_text: The activated enzyme catalyses the dehydration of (R)-2-hydroxyisocaproyl-CoA
      to isocaprenoyl-CoA in the pathway of leucine fermentation.
- id: PMID:22989714
  title: Global transcriptional control by glucose and carbon regulator CcpA in Clostridium
    difficile.
  findings:
  - statement: hadA is a direct CcpA target. The carbon catabolite regulator CcpA
      binds the creCD site upstream of hadA (CD0395), and the entire leucine reductive-branch
      operon (ldhA-hadA-hadI-acdB-etfB1) is approximately 4-fold glucose-repressed
      in a CcpA-dependent manner. Independent regulatory evidence that hadA functions
      in the leucine reductive (Stickland) branch yielding isocaproate.
    supporting_text: The expression of ldhA, hadA, hadI, acdB and etfB1 genes (CD0394,
      CD0395, CD0396, CD0399 and CD0400) required for the leucine reductive branch
      leading to the formation of isocaproate was 4-fold repressed by glucose by a
      CcpA-dependent mechanism
  - statement: ChIP-on-Chip and EMSA confirmed direct CcpA binding at the hadA promoter,
      with the creCD site essential for binding. Reinforces operon-level regulation
      of the leucine reductive branch.
    supporting_text: We also identified hadA as a CcpA direct target by ChIP-on-Chip
      analysis (Table 2) and demonstrated that the creCD site located upstream of
      hadA was essential for CcpA binding, as its deletion no longer showed a shift
      by EMSA analysis
- id: PMID:24586458
  title: Semiquantitative analysis of clinical heat stress in Clostridium difficile
    strain 630 using a GeLC/MS workflow with emPAI quantitation.
  findings:
  - statement: HadA (CD0395) and HadC (CD0398, dehydratase subunit) are upregulated
      under heat stress at the protein level in C. difficile strain 630. Confirms
      gene-name assignment CD0395 = hadA and pathway-level coordinate regulation of
      the leucine reductive branch.
    supporting_text: isocaprenoyl-CoA:2-hydroxyisocaproate CoA-transferase (CD0395,
      hadA), and a subunit of the oxygen-sensitive 2-hydroxyisocaproyl-CoA dehydratase
      (CD0398, hadC), were both upregulated under heat stress
- id: PMID:30619231
  title: Iron Regulation in Clostridioides difficile.
  findings:
  - statement: hadA and the hadAIBCB / etfBA operons are strongly downregulated under
      low-iron conditions, consistent with the ferredoxin-dependent nature of the
      leucine (and phenylalanine, glycine, butyrate) fermentation pathways. Independent
      transcriptomic confirmation that hadA functions in the leucine reductive branch
      yielding isocaproate.
    supporting_text: At low iron conditions the ferredoxin-dependent pathways of phenylalanine,
      leucine (hadAIBCB, etfBA, CDIF630erm_00523 – 00529), glycine degradation (grdDCBAE,trxBA
      (CDIF630erm_02587 – 02597) and butyrate fermentation (CDIF630erm_01194 – 01199)
- id: PMID:32967909
  title: 'Diverse Energy-Conserving Pathways in Clostridium difficile: Growth in the
    Absence of Amino Acid Stickland Acceptors and the Role of the Wood-Ljungdahl Pathway.'
  findings:
  - statement: Reviews the central role of Stickland amino-acid fermentations (including
      the leucine reductive branch) as alternative electron-accepting pathways in
      C. difficile, framing the physiological importance of HadA's CoA-transfer activity
      for energy conservation. (HadA itself is not named in the abstract; the connection
      to the leucine reductive branch is inferred from the established pathway placement
      in PMID:16957230.)
    supporting_text: C. difficile contains various other reductive pathways, including
      a heavy reliance on Stickland reactions
- id: PMID:36252736
  title: In-Depth Characterization of the Clostridioides difficile Phosphoproteome
    to Identify Ser/Thr Kinase Substrates.
  findings:
  - statement: HadA (CD0395) is phosphorylated in vivo on two threonines, T143 (peptide
      DKPGFDYT(1)AYFAR) and T374 (peptide VGQHT(1)VEVLK), identified by TiO2-enriched
      phosphoproteomics of C. difficile strain 630Δerm. T143 phosphorylation was reported
      to be PrkC-dependent. Indicates HadA is a substrate of one or more Ser/Thr kinases,
      suggesting post-translational regulation; functional consequences for CoA-transferase
      activity remain unknown.
    supporting_text: CD0395hadAIsocaprenoyl-CoA:2-hydroxyisocaproate CoA-transferaseDKPGFDYT(1)AYFART143
  - statement: T374 phosphopeptide for HadA (VGQHT(1)VEVLK), independently identified.
    supporting_text: CD0395hadAIsocaprenoyl-CoA:2-hydroxyisocaproate CoA-transferaseVGQHT(1)VEVLKT374
core_functions:
- description: HadA catalyzes the CoA-transfer step of the reductive branch of L-leucine
    fermentation in C. difficile, transferring CoA from 4-methylpentanoyl-CoA (isocaproyl-CoA)
    to (R)-2-hydroxy-4-methylpentanoate to yield (R)-2-hydroxy-4-methylpentanoyl-CoA
    and free isocaproate (EC 2.8.3.24, PMID:16957230). It is a homodimeric family
    III CoA-transferase with Asp-171 as the catalytic nucleophile and is specific
    for the leucine-derived branched-chain acyl-CoA (acetyl-CoA and butyryl-CoA are
    not accepted as donors). The product (R)-2-hydroxyisocaproyl-CoA is the substrate
    for the radical dehydratase HadBC, coupling HadA's activity to the downstream
    steps of isocaproate formation.
