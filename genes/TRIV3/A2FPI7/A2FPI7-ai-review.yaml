  label: Trichomonas vaginalis (strain ATCC PRA-98 / G3)
description: >-
  A2FPI7 (TVAG_233530/TVAG_559790) is a 129-amino-acid KilA-N domain-containing
  protein from Trichomonas vaginalis. The KilA-N domain (Pfam PF04383) was
  originally identified in bacteriophage proteins associated with DNA-binding
  and transcriptional regulatory functions, and is structurally related to the
  APSES DNA-binding domain found in fungal transcription factors. T. vaginalis
  harbors numerous laterally transferred genes of viral and bacterial origin in
  its unusually large genome (~160 Mb). Based on conserved domain architecture,
  A2FPI7 is most likely a DNA-binding protein with a possible role in
  transcriptional regulation. No direct experimental characterization of this
  protein has been reported; the protein existence level is PE4 (Predicted),
  and no GO annotations are present in GOA.
existing_annotations:
  - term:
      id: GO:0003677
      label: DNA binding
    evidence_type: ISM
    original_reference_id: file:TRIV3/A2FPI7/A2FPI7-deep-research-falcon.md
    review:
      summary: >-
        DNA binding is inferred from the KilA-N domain (PF04383/IPR017880), which
        belongs to the KilA-N/APSES helix-turn-helix superfamily. This domain has been
        experimentally validated as a DNA-binding domain in fungal APSES transcription
        factors and bacteriophage regulatory proteins. ProtNLM2 also independently
        predicted this term. No direct experimental evidence exists for A2FPI7.
      action: NEW
      reason: >-
        Domain-based inference strongly supports DNA binding as the primary molecular
        function; independently predicted by ProtNLM2.
      supported_by:
        - reference_id: file:TRIV3/A2FPI7/A2FPI7-deep-research-falcon.md
          supporting_text: >-
            the strongest evidence-based inference is therefore that its primary molecular
            role is likely DNA binding, with possible participation in gene-expression control
  - term:
