          No primary publication directly characterizing A2FPI7 was found. Domain-based
          inference supports classification as a probable DNA-binding regulatory protein
          based on the KilA-N/APSES_HTH domain architecture.
      - statement: >-
          The KilA-N domain is a conserved DNA-binding domain originally defined in large
          DNA viruses and later recognized in cellular proteins; fungal APSES
          transcription-factor DNA-binding domains are homologous to KilA-N.
