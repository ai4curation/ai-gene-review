suggested_questions:
  - question: >-
      Is A2FPI7 (TVAG_233530) expressed at the protein level in T. vaginalis, and
      if so, does it localize to the nucleus? T. vaginalis has an atypical nuclear
      architecture, and confirming nuclear localization would strengthen the
      transcription factor hypothesis.
  - question: >-
      Does A2FPI7 bind DNA in vitro (e.g., via EMSA or ChIP-seq), and if so, does
      it show sequence-specific binding similar to fungal APSES domain proteins?
  - question: >-
      Is the TVAG_233530 locus part of a laterally transferred genomic island of
      viral origin, and are there paralogous KilA-N domain proteins in the
      T. vaginalis genome with overlapping or distinct functions?
suggested_experiments:
  - hypothesis: >-
      A2FPI7 binds double-stranded DNA via its KilA-N domain.
    description: >-
      Express recombinant A2FPI7 and perform electrophoretic mobility shift assay
      (EMSA) with random and designed DNA probes to test for DNA-binding activity.
      Include a KilA-N domain deletion mutant as a negative control.
    experiment_type: EMSA
  - hypothesis: >-
      A2FPI7 localizes to the T. vaginalis nucleus.
    description: >-
      Tag A2FPI7 with GFP or an epitope tag, express it in T. vaginalis, and
      determine subcellular localization by fluorescence microscopy with DAPI
      co-staining for nuclear DNA.
    experiment_type: fluorescence microscopy
