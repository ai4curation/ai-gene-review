      label: nucleus
    evidence_type: ISM
    original_reference_id: file:TRIV3/A2FPI7/A2FPI7-deep-research-falcon.md
    review:
      summary: >-
        Nuclear localization is inferred from the predicted DNA-binding function.
        DNA-binding transcriptional regulators characteristically function in the
        nucleus. However, T. vaginalis has an atypical nuclear architecture and
        this localization has not been experimentally verified for A2FPI7.
      action: NEW
      reason: >-
        Inferred localization based on predicted DNA-binding function; awaits
        experimental confirmation.
      supported_by:
        - reference_id: file:TRIV3/A2FPI7/A2FPI7-deep-research-falcon.md
          supporting_text: >-
            The most likely cellular localization for a DNA-binding regulatory protein
            is the nucleus, but this remains an inference from domain architecture
