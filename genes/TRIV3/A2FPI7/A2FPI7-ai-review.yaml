core_functions:
  - description: >-
      A2FPI7 is predicted to bind DNA based on the presence of a KilA-N domain (PF04383),
      which belongs to the KilA-N/APSES helix-turn-helix superfamily. This domain has
      been experimentally demonstrated to mediate sequence-specific DNA binding in fungal
      APSES transcription factors and in bacteriophage regulatory proteins. No direct
      experimental evidence exists for A2FPI7 specifically; this annotation is a
      domain-based inference.
