  label: Populus trichocarpa
description: Chloroplast-encoded small ribosomal subunit protein uS7c (30S ribosomal protein S7). It is one of
  the primary rRNA-binding proteins, binding directly to 16S rRNA where it nucleates assembly of the head domain
  of the 30S small subunit. As a structural constituent of the chloroplast ribosome it is essential for plastid
  translation.
