id: B9HQZ6
gene_symbol: ALARS
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:3694
  label: Populus trichocarpa
description: >-
  Organellar alanyl-tRNA synthetase (alanine--tRNA ligase) that catalyzes the ATP-dependent
  attachment of L-alanine to tRNA(Ala), generating the L-alanyl-tRNA(Ala) substrate for
  protein translation. The reaction proceeds in two steps: alanine is first activated by
  ATP to form Ala-AMP, then transferred to the acceptor end of tRNA(Ala). The enzyme also
  has a proofreading/editing (deacylase) activity that removes incorrectly charged amino
  acids from mischarged tRNA(Ala), ensuring translational fidelity. It is a class-II
  aminoacyl-tRNA synthetase that binds one zinc ion per subunit and consists of an
  N-terminal catalytic domain, an editing domain, and a C-terminal C-Ala domain. The
  protein is dual-targeted to the chloroplast and mitochondrion via an N-terminal transit
  peptide.
