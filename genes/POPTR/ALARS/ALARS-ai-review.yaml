suggested_questions:
- question: Is the dual chloroplast/mitochondrion targeting of poplar AlaRS achieved through
    alternative transcription/translation start sites or a single ambiguous transit peptide?
suggested_experiments:
- description: Express the N-terminal transit peptide fused to a fluorescent reporter and
    assess chloroplast versus mitochondrion targeting in poplar protoplasts, and assay
    recombinant enzyme for aminoacylation and editing (deacylation of Ser/Gly-tRNA-Ala) activities.
  experiment_type: subcellular targeting and enzyme biochemistry
