id: A4GYW8
gene_symbol: ndhE
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:3694
  label: Populus trichocarpa
description: 'Chloroplast NDH subunit 4L membrane protein that contributes to NAD(P)H-plastoquinone electron
  transfer coupled to proton translocation in the thylakoid membrane.'
existing_annotations:
- term:
    id: GO:0030964
    label: NADH dehydrogenase complex
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: NADH dehydrogenase complex is the available GO complex term for chloroplast NDH.
    action: ACCEPT
    reason: The reviewed entry describes this protein as a subunit of the multi-subunit chloroplast 
      NDH complex, and the local GO term cache has no more specific plastid NDH complex term.
    supported_by:
    - reference_id: file:POPTR/ndhE/ndhE-uniprot.txt
      supporting_text: NDH shuttles electrons from NAD(P)H:plastoquinone, via FMN and iron-sulfur 
        (Fe-S) centers, to quinones in the photosynthetic chain
- term:
    id: GO:0009535
    label: chloroplast thylakoid membrane
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  review:
    summary: Chloroplast thylakoid membrane is the correct localization for this plastid NDH 
      subunit.
    action: ACCEPT
    reason: The reviewed entry places the NDH subunit in the chloroplast thylakoid membrane.
    supported_by:
    - reference_id: file:POPTR/ndhE/ndhE-uniprot.txt
      supporting_text: 'SUBCELLULAR LOCATION: Plastid, chloroplast thylakoid membrane'
- term:
    id: GO:0009536
    label: plastid
  evidence_type: IEA
  original_reference_id: GO_REF:0000117
  review:
    summary: Plastid is correct but less specific than chloroplast thylakoid membrane.
    action: MODIFY
    reason: Use the specific thylakoid membrane location supported by UniProt.
    supported_by:
    - reference_id: file:POPTR/ndhE/ndhE-uniprot.txt
      supporting_text: 'SUBCELLULAR LOCATION: Plastid, chloroplast thylakoid membrane'
    proposed_replacement_terms:
    - &id002
      id: GO:0009535
      label: chloroplast thylakoid membrane
- term:
    id: GO:0016651
    label: oxidoreductase activity, acting on NAD(P)H
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: Oxidoreductase activity acting on NAD(P)H is correct but less specific than the 
      quinone-acceptor reaction.
    action: MODIFY
    reason: The reviewed reaction transfers electrons from NADH/NADPH to plastoquinone.
    supported_by:
    - reference_id: file:POPTR/ndhE/ndhE-uniprot.txt
      supporting_text: Reaction=a plastoquinone + NADH + (n+1) H(+)(in) = a plastoquinol + NAD(+) + 
        n H(+)(out).
    proposed_replacement_terms:
    - &id001
      id: GO:0016655
      label: oxidoreductase activity, acting on NAD(P)H, quinone or similar compound as acceptor
- term:
    id: GO:0016655
    label: oxidoreductase activity, acting on NAD(P)H, quinone or similar compound as acceptor
  evidence_type: IEA
  original_reference_id: GO_REF:0000104
  review:
    summary: This oxidoreductase term matches the chloroplast NAD(P)H-plastoquinone NDH reaction.
    action: ACCEPT
    reason: It captures the redox chemistry without imposing an incorrect ubiquinone acceptor.
    supported_by:
    - reference_id: file:POPTR/ndhE/ndhE-uniprot.txt
      supporting_text: Reaction=a plastoquinone + NADH + (n+1) H(+)(in) = a plastoquinol + NAD(+) + 
        n H(+)(out).
- term:
    id: GO:0019684
    label: photosynthesis, light reaction
  evidence_type: IEA
  original_reference_id: GO_REF:0000104
  review:
    summary: Photosynthesis, light reaction is appropriate for chloroplast NDH electron flow.
    action: ACCEPT
    reason: NDH transfers electrons to quinones in the photosynthetic chain and contributes to 
      thylakoid proton gradients.
    supported_by:
    - reference_id: file:POPTR/ndhE/ndhE-uniprot.txt
      supporting_text: NDH shuttles electrons from NAD(P)H:plastoquinone, via FMN and iron-sulfur 
        (Fe-S) centers, to quinones in the photosynthetic chain
    - reference_id: file:POPTR/ndhE/ndhE-uniprot.txt
      supporting_text: Couples the redox reaction to proton translocation, and thus conserves the 
        redox energy in a proton gradient.
- term:
    id: GO:0042773
    label: ATP synthesis coupled electron transport
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: ATP synthesis coupled electron transport is plausible as a downstream consequence of 
      the proton gradient but broader than direct NDH function.
    action: KEEP_AS_NON_CORE
    reason: Keep as non-core; the direct process is electron transport coupled proton transport.
    supported_by:
    - reference_id: file:POPTR/ndhE/ndhE-uniprot.txt
      supporting_text: Couples the redox reaction to proton translocation, and thus conserves the 
        redox energy in a proton gradient.
- term:
    id: GO:0015990
    label: electron transport coupled proton transport
  evidence_type: IEA
  original_reference_id: file:POPTR/ndhE/ndhE-uniprot.txt
  review:
    summary: Electron transport coupled proton transport is the direct process for chloroplast NDH.
    action: NEW
    reason: The existing GOA rows lack this direct process term even though UniProt states that the 
      NDH redox reaction is coupled to proton translocation.
    supported_by:
    - reference_id: file:POPTR/ndhE/ndhE-uniprot.txt
      supporting_text: Couples the redox reaction to proton translocation, and thus conserves the 
        redox energy in a proton gradient.
    - reference_id: file:POPTR/ndhE/ndhE-uniprot.txt
      supporting_text: Reaction=a plastoquinone + NADH + (n+1) H(+)(in) = a plastoquinol + NAD(+) + 
        n H(+)(out).
