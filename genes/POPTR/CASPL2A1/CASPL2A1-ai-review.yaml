gene_symbol: CASPL2A1
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:3694
  label: Populus trichocarpa
description: CASP-like protein 2A1 (PtCASPL2A1) is a small tetraspan membrane protein belonging
  to the CASP-like (CASPL) subfamily, the more divergent relatives of the bona fide Casparian
  strip membrane domain proteins (CASP1-5). Like other family members it has a central MARVEL-like
  four-transmembrane domain and is predicted to reside in the plasma membrane as a multi-pass
  protein. CASP-like proteins are not enzymes; by analogy with the characterized CASP scaffolds
  they are thought to organize plasma-membrane microdomains, but the specific biological role and
  tissue context of CASPL2A1 remain uncharacterized. The protein is predicted to form homodimers
  and heterodimers.
