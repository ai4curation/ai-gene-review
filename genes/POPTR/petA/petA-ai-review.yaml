id: A4GYS4
gene_symbol: petA
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:3694
  label: Populus trichocarpa
description: 'Cytochrome f, the heme-binding chloroplast cytochrome b6-f subunit that mediates electron transfer
  between photosystem II and photosystem I.'
existing_annotations:
- term:
    id: GO:0005506
    label: iron ion binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: Iron ion binding reflects the heme cofactor of cytochrome f but is not the core function.
    action: KEEP_AS_NON_CORE
    reason: The more informative cofactor term is heme binding, and the core molecular role is electron 
      transfer.
    supported_by:
    - reference_id: file:POPTR/petA/petA-uniprot.txt
      supporting_text: Binds 1 heme group covalently.
- term:
    id: GO:0009055
    label: electron transfer activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  review:
    summary: Electron transfer activity captures the cytochrome f role in the cytochrome b6-f complex.
    action: ACCEPT
    reason: The reviewed entry states that cytochrome b6-f mediates electron transfer between PSII and PSI.
    supported_by:
    - reference_id: file:POPTR/petA/petA-uniprot.txt
      supporting_text: Component of the cytochrome b6-f complex, which mediates electron transfer between 
        photosystem II (PSII) and photosystem I (PSI), cyclic electron flow around PSI, and state transitions.
- term:
    id: GO:0009535
    label: chloroplast thylakoid membrane
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  review:
    summary: Chloroplast thylakoid membrane is the correct localization for petA/cytochrome f.
    action: ACCEPT
    reason: The reviewed entry places this single-pass cytochrome b6-f subunit in the chloroplast thylakoid 
      membrane.
    supported_by:
    - reference_id: file:POPTR/petA/petA-uniprot.txt
      supporting_text: 'SUBCELLULAR LOCATION: Plastid, chloroplast thylakoid membrane'
- term:
    id: GO:0015979
    label: photosynthesis
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  review:
    summary: Photosynthesis is an appropriate broad biological process for cytochrome f.
    action: ACCEPT
    reason: Cytochrome b6-f transfers electrons between photosystem II and photosystem I in photosynthesis.
    supported_by:
    - reference_id: file:POPTR/petA/petA-uniprot.txt
      supporting_text: Component of the cytochrome b6-f complex, which mediates electron transfer between 
        photosystem II (PSII) and photosystem I (PSI), cyclic electron flow around PSI, and state transitions.
- term:
    id: GO:0020037
    label: heme binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: Heme binding is a real cofactor-binding feature of cytochrome f.
    action: ACCEPT
    reason: The reviewed entry states that cytochrome f covalently binds one heme group.
    supported_by:
    - reference_id: file:POPTR/petA/petA-uniprot.txt
      supporting_text: Binds 1 heme group covalently.
- term:
    id: GO:0042651
    label: thylakoid membrane
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: Thylakoid membrane is correct but less specific than chloroplast thylakoid membrane.
    action: MODIFY
    reason: Use the specific chloroplast thylakoid membrane location.
    supported_by:
    - reference_id: file:POPTR/petA/petA-uniprot.txt
      supporting_text: 'SUBCELLULAR LOCATION: Plastid, chloroplast thylakoid membrane'
    proposed_replacement_terms:
    - id: GO:0009535
      label: chloroplast thylakoid membrane
