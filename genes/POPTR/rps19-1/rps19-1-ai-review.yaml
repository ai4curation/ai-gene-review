id: A4GYV1
gene_symbol: rps19-1
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:3694
  label: Populus trichocarpa
description: Chloroplast small ribosomal subunit protein uS19c, encoded by duplicated plastid rps19 copies, that
  supports plastid translation and 16S rRNA binding as part of the small ribosomal subunit.
existing_annotations:
- term:
    id: GO:0003723
    label: RNA binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: Generic RNA binding is better represented as small-subunit rRNA binding for rps19; this converges
      with the separate rRNA binding source annotation on one replacement term.
    action: MODIFY
    reason: UniProt states that S19 forms a complex with S13 that binds 16S rRNA; the ribosomal context is more
      specific than generic RNA binding, so this row and the rRNA binding row should yield a single
      GO:0070181 replacement annotation rather than duplicate downstream annotations.
    supported_by:
    - reference_id: file:POPTR/rps19-1/rps19-1-uniprot.txt
      supporting_text: Protein S19 forms a complex with S13 that binds strongly to the 16S ribosomal RNA.
    proposed_replacement_terms:
    - id: GO:0070181
      label: small ribosomal subunit rRNA binding
- term:
    id: GO:0003735
    label: structural constituent of ribosome
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: Structural constituent of ribosome is the core molecular function for rps19.
    action: ACCEPT
    reason: rps19 encodes a conserved chloroplast small-subunit ribosomal protein.
    supported_by:
    - reference_id: file:POPTR/rps19-1/rps19-1-uniprot.txt
      supporting_text: 'RecName: Full=Small ribosomal subunit protein uS19c'
- term:
    id: GO:0005737
    label: cytoplasm
  evidence_type: IEA
  original_reference_id: GO_REF:0000117
  review:
    summary: Cytoplasm is the wrong compartment for this plastid-encoded ribosomal protein.
    action: MODIFY
    reason: The reviewed UniProt entry places rps19 in the chloroplast, not the cytoplasm.
    supported_by:
    - reference_id: file:POPTR/rps19-1/rps19-1-uniprot.txt
      supporting_text: 'SUBCELLULAR LOCATION: Plastid, chloroplast.'
    proposed_replacement_terms:
    - id: GO:0009507
      label: chloroplast
- term:
    id: GO:0005840
    label: ribosome
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: Ribosome is true but less specific than the small ribosomal subunit.
    action: KEEP_AS_NON_CORE
    reason: The protein is a small-subunit ribosomal component; the more specific small ribosomal subunit term captures
      the core complex.
    supported_by:
    - reference_id: file:POPTR/rps19-1/rps19-1-uniprot.txt
      supporting_text: 'RecName: Full=Small ribosomal subunit protein uS19c'
- term:
    id: GO:0006412
    label: translation
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  review:
    summary: Translation is the core biological process for a chloroplast small-subunit ribosomal protein.
    action: ACCEPT
    reason: Chloroplast ribosomal proteins directly support plastid translation.
    supported_by:
    - reference_id: file:POPTR/rps19-1/rps19-1-uniprot.txt
      supporting_text: 'AltName: Full=30S ribosomal protein S19, chloroplastic'
- term:
    id: GO:0009507
    label: chloroplast
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  review:
    summary: Chloroplast localization is directly supported.
    action: ACCEPT
    reason: UniProt annotates rps19 as plastid/chloroplast localized.
    supported_by:
    - reference_id: file:POPTR/rps19-1/rps19-1-uniprot.txt
      supporting_text: 'SUBCELLULAR LOCATION: Plastid, chloroplast.'
- term:
    id: GO:0015935
    label: small ribosomal subunit
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: Small ribosomal subunit is the correct complex term.
    action: ACCEPT
    reason: The protein is a chloroplast 30S/small-subunit ribosomal protein.
    supported_by:
    - reference_id: file:POPTR/rps19-1/rps19-1-uniprot.txt
      supporting_text: 'RecName: Full=Small ribosomal subunit protein uS19c'
- term:
    id: GO:0019843
    label: rRNA binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000104
  review:
    summary: rRNA binding is correct but can be made small-subunit-specific; this converges with the generic
      RNA binding source annotation on one replacement term.
    action: MODIFY
    reason: UniProt specifically links S19 to 16S rRNA binding in the small subunit, so this row and the
      generic RNA binding row should yield a single GO:0070181 replacement annotation rather than duplicate
      downstream annotations.
    supported_by:
    - reference_id: file:POPTR/rps19-1/rps19-1-uniprot.txt
      supporting_text: Protein S19 forms a complex with S13 that binds strongly to the 16S ribosomal RNA.
    proposed_replacement_terms:
    - id: GO:0070181
      label: small ribosomal subunit rRNA binding
