id: P29031
gene_symbol: WIN6.2B
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:3694
  label: Populus trichocarpa
description: Wound-inducible secreted acidic endochitinase of glycoside hydrolase family 19 (class I
  chitinase). It contains an N-terminal chitin-binding type-1 (hevein-like) domain and a C-terminal
  catalytic chitinase domain, and randomly hydrolyzes the beta-1,4 linkages of chitin and chitodextrins.
  The enzyme contributes to plant defense against chitin-containing fungal pathogens and is induced by
  wounding.
