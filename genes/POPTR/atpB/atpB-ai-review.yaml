  label: Populus trichocarpa
description: 'Chloroplast ATP synthase CF1 beta subunit, the catalytic beta component of the thylakoid
  F-type ATP synthase that produces ATP from ADP using the proton gradient.'
existing_annotations:
- term:
    id: GO:0005774
    label: vacuolar membrane
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: Vacuolar membrane is a misleading IBA transfer from non-chloroplast ATPase biology.
    action: REMOVE
    reason: The reviewed atpB entry places this plastid-encoded ATP synthase beta subunit at the 
      chloroplast thylakoid membrane, not the vacuolar membrane.
    supported_by:
    - reference_id: file:POPTR/atpB/atpB-uniprot.txt
      supporting_text: 'SUBCELLULAR LOCATION: Plastid, chloroplast thylakoid membrane'
- term:
    id: GO:1902600
    label: proton transmembrane transport
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: Proton transmembrane transport is part of ATP synthase complex function but is not the 
      isolated beta subunit's most direct role.
    action: KEEP_AS_NON_CORE
    reason: The beta subunit is in the CF1 catalytic core; ATP synthesis is coupled to proton 
      movement through CF0.
    supported_by:
    - reference_id: file:POPTR/atpB/atpB-uniprot.txt
      supporting_text: F-type ATPases have 2 components, CF(1) - the catalytic core - and CF(0) - 
        the membrane proton channel.
    - reference_id: file:POPTR/atpB/atpB-uniprot.txt
      supporting_text: Produces ATP from ADP in the presence of a proton gradient across the 
        membrane. The catalytic sites are hosted primarily by the beta subunits.
- term:
    id: GO:0046961
    label: proton-transporting ATPase activity, rotational mechanism
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: The ATPase term is directionally related but less appropriate than ATP synthase 
      activity for chloroplast atpB.
    action: MODIFY
    reason: Use the ATP synthase activity term that captures ATP production from ADP in the presence
      of a proton gradient.
    supported_by:
    - reference_id: file:POPTR/atpB/atpB-uniprot.txt
      supporting_text: Produces ATP from ADP in the presence of a proton gradient across the 
        membrane. The catalytic sites are hosted primarily by the beta subunits.
    proposed_replacement_terms:
    - &id001
      id: GO:0046933
      label: proton-transporting ATP synthase activity, rotational mechanism
