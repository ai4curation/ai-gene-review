    action: ACCEPT
    reason: PsaC is the terminal Fe-S electron acceptor of PSI and donates electrons to ferredoxin.
    supported_by:
    - reference_id: file:POPTR/psaC/psaC-uniprot.txt
      supporting_text: FB is the terminal electron acceptor of PSI, donating electrons to 
        ferredoxin.
