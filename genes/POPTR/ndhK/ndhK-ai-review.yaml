id: A4GYR4
gene_symbol: ndhK
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:3694
  label: Populus trichocarpa
description: Chloroplast NDH complex subunit K, a 4Fe-4S protein in the plastid NAD(P)H-plastoquinone
  oxidoreductase system that couples photosynthetic electron transport to proton translocation.
existing_annotations:
- term:
    id: GO:0009060
    label: aerobic respiration
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: The respiratory-chain/aerobic-respiration propagation is not appropriate for chloroplast
      ndhK.
    action: REMOVE
    reason: Poplar ndhK is a chloroplast NDH subunit in photosynthetic electron transport, not a mitochondrial
      respiratory complex I subunit.
    supported_by:
    - reference_id: file:POPTR/ndhK/ndhK-uniprot.txt
      supporting_text: 'SUBCELLULAR LOCATION: Plastid, chloroplast thylakoid membrane.'
- term:
    id: GO:0045271
    label: respiratory chain complex I
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: Respiratory chain complex I is a misleading cellular-component assignment for a plastid NDH
      subunit.
    action: REMOVE
    reason: The chloroplast NDH complex is complex-I-like but is not respiratory chain complex I.
    supported_by:
    - reference_id: file:POPTR/ndhK/ndhK-uniprot.txt
      supporting_text: 'FUNCTION: NDH shuttles electrons from NAD(P)H:plastoquinone to quinones in the
        photosynthetic chain.'
- term:
    id: GO:0008137
    label: NADH dehydrogenase (ubiquinone) activity
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: NADH dehydrogenase (ubiquinone) activity is too mitochondrial/bacterial for the chloroplast
      NDH reaction.
    action: MODIFY
    reason: The UniProt-curated reaction uses plastoquinone and NAD(P)H, so the broader quinone-acceptor
      oxidoreductase term is safer.
    supported_by:
    - reference_id: file:POPTR/ndhK/ndhK-uniprot.txt
      supporting_text: 'CATALYTIC ACTIVITY: a plastoquinone + NADH/NADPH + protons = a plastoquinol +
        NAD/NADP.'
    proposed_replacement_terms:
    - id: GO:0016655
      label: oxidoreductase activity, acting on NAD(P)H, quinone or similar compound as acceptor
- term:
    id: GO:0015990
    label: electron transport coupled proton transport
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: Electron transport coupled proton transport is a core process for chloroplast NDH.
    action: ACCEPT
    reason: The NDH reaction conserves redox energy as a proton gradient.
    supported_by:
    - reference_id: file:POPTR/ndhK/ndhK-uniprot.txt
      supporting_text: Couples the redox reaction to proton translocation, and thus conserves the redox
        energy in a proton gradient.
- term:
    id: GO:0005506
    label: iron ion binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000104
  review:
    summary: Generic iron ion binding is less informative than the specific 4Fe-4S cluster binding annotation.
    action: MODIFY
    reason: The relevant iron is in the 4Fe-4S cluster bound by ndhK.
    supported_by:
    - reference_id: file:POPTR/ndhK/ndhK-uniprot.txt
      supporting_text: 'COFACTOR: Binds 1 [4Fe-4S] cluster.'
    proposed_replacement_terms:
    - id: GO:0051539
      label: 4 iron, 4 sulfur cluster binding
