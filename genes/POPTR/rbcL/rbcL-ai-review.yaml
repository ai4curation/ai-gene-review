id: A4GYR8
gene_symbol: rbcL
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:3694
  label: Populus trichocarpa
description: Chloroplast ribulose-bisphosphate carboxylase/oxygenase large subunit that catalyzes the
  carboxylation step of the Calvin cycle and also participates in photorespiration.
existing_annotations:
- term:
    id: GO:0000287
    label: magnesium ion binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  review:
    summary: Magnesium binding is a real cofactor feature of RuBisCO but is not the core functional annotation.
    action: KEEP_AS_NON_CORE
    reason: The core function is ribulose-bisphosphate carboxylase activity; Mg binding supports catalysis.
    supported_by:
    - reference_id: file:POPTR/rbcL/rbcL-uniprot.txt
      supporting_text: 'COFACTOR: Binds 1 Mg(2+) ion per subunit.'
- term:
    id: GO:0009507
    label: chloroplast
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  review:
    summary: Chloroplast localization is correct for the plastid-encoded RuBisCO large subunit.
    action: ACCEPT
    reason: The UniProt entry places rbcL in the chloroplast.
    supported_by:
    - reference_id: file:POPTR/rbcL/rbcL-uniprot.txt
      supporting_text: 'SUBCELLULAR LOCATION: Plastid, chloroplast.'
- term:
    id: GO:0015977
    label: carbon fixation
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  review:
    summary: carbon fixation is the correct biological-process context for RuBisCO carboxylase activity.
    action: ACCEPT
    reason: RuBisCO catalyzes the primary carbon dioxide fixation reaction of the Calvin cycle.
    supported_by:
    - reference_id: file:POPTR/rbcL/rbcL-uniprot.txt
      supporting_text: 'FUNCTION: RuBisCO catalyzes the carboxylation of D-ribulose 1,5-bisphosphate.'
- term:
    id: GO:0016984
    label: ribulose-bisphosphate carboxylase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  review:
    summary: This is the core RuBisCO large-chain molecular function.
    action: ACCEPT
    reason: The term exactly captures the EC 4.1.1.39 carboxylase activity.
    supported_by:
    - reference_id: file:POPTR/rbcL/rbcL-uniprot.txt
      supporting_text: 'RecName: Full=Ribulose bisphosphate carboxylase large chain; EC=4.1.1.39.'
- term:
    id: GO:0019253
    label: reductive pentose-phosphate cycle
  evidence_type: IEA
  original_reference_id: GO_REF:0000104
