id: A4GYU3
gene_symbol: rpoA
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:3694
  label: Populus trichocarpa
description: 'Chloroplast plastid-encoded RNA polymerase alpha subunit that contributes to the PEP catalytic
  core for DNA-templated transcription in plastids.'
existing_annotations:
- term:
    id: GO:0003677
    label: DNA binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  review:
    summary: DNA binding is plausible for an RNA polymerase subunit but less informative than 
      polymerase contribution.
    action: KEEP_AS_NON_CORE
    reason: Retain as a non-core feature while treating RNA polymerase contribution as the central 
      role.
    supported_by:
    - reference_id: file:POPTR/rpoA/rpoA-uniprot.txt
      supporting_text: DNA-dependent RNA polymerase catalyzes the transcription of DNA into RNA 
        using the four ribonucleoside triphosphates as substrates.
- term:
    id: GO:0003899
    label: DNA-directed RNA polymerase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  review:
    summary: rpoA contributes to DNA-directed RNA polymerase activity as a subunit of 
      plastid-encoded RNA polymerase.
    action: ACCEPT
    reason: The catalytic activity belongs to the polymerase complex, so contributes_to is the 
      correct relationship for this subunit.
    supported_by:
    - reference_id: file:POPTR/rpoA/rpoA-uniprot.txt
      supporting_text: DNA-dependent RNA polymerase catalyzes the transcription of DNA into RNA 
        using the four ribonucleoside triphosphates as substrates.
    - reference_id: file:POPTR/rpoA/rpoA-uniprot.txt
      supporting_text: "In plastids the minimal PEP RNA polymerase catalytic core is composed of four
        subunits: alpha, beta, beta', and beta''."
  qualifier: contributes_to
- term:
    id: GO:0005737
    label: cytoplasm
  evidence_type: IEA
  original_reference_id: GO_REF:0000117
  review:
    summary: Cytoplasm is a misleading ARBA localization for a plastid-encoded chloroplast RNA 
      polymerase subunit.
    action: MODIFY
    reason: Use chloroplast localization from the reviewed entry.
    supported_by:
    - reference_id: file:POPTR/rpoA/rpoA-uniprot.txt
      supporting_text: 'SUBCELLULAR LOCATION: Plastid, chloroplast.'
    proposed_replacement_terms:
    - &id001
      id: GO:0009507
      label: chloroplast
- term:
    id: GO:0006351
    label: DNA-templated transcription
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  review:
    summary: DNA-templated transcription is the direct biological process for plastid RNA polymerase
      rpoA.
    action: ACCEPT
    reason: The reviewed entry describes DNA-dependent RNA polymerase activity producing RNA from a 
      DNA template.
    supported_by:
    - reference_id: file:POPTR/rpoA/rpoA-uniprot.txt
      supporting_text: DNA-dependent RNA polymerase catalyzes the transcription of DNA into RNA 
        using the four ribonucleoside triphosphates as substrates.
- term:
    id: GO:0009507
    label: chloroplast
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  review:
    summary: Chloroplast localization is correct for this plastid-encoded RNA polymerase subunit.
    action: ACCEPT
    reason: The reviewed entry places rpoA in the chloroplast.
    supported_by:
    - reference_id: file:POPTR/rpoA/rpoA-uniprot.txt
      supporting_text: 'SUBCELLULAR LOCATION: Plastid, chloroplast.'
- term:
    id: GO:0034062
    label: 5'-3' RNA polymerase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000116
  review:
    summary: 5'-3' RNA polymerase activity reflects the RNA polymerase reaction but overstates the 
      isolated subunit as the whole enzyme.
    action: MARK_AS_OVER_ANNOTATED
    reason: The catalytic reaction belongs to the plastid RNA polymerase complex, with rpoA 
      contributing as one core subunit.
    supported_by:
    - reference_id: file:POPTR/rpoA/rpoA-uniprot.txt
      supporting_text: DNA-dependent RNA polymerase catalyzes the transcription of DNA into RNA 
        using the four ribonucleoside triphosphates as substrates.
    - reference_id: file:POPTR/rpoA/rpoA-uniprot.txt
      supporting_text: "In plastids the minimal PEP RNA polymerase catalytic core is composed of four
        subunits: alpha, beta, beta', and beta''."
- term:
    id: GO:0046983
    label: protein dimerization activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: Protein dimerization is plausible for the RNAP alpha subunit but not the main 
      functional annotation.
    action: KEEP_AS_NON_CORE
    reason: Retain as non-core; the central role is contribution to plastid RNA polymerase activity.
    supported_by:
    - reference_id: file:POPTR/rpoA/rpoA-uniprot.txt
      supporting_text: "In plastids the minimal PEP RNA polymerase catalytic core is composed of four
        subunits: alpha, beta, beta', and beta''."
- term:
    id: GO:0000428
    label: DNA-directed RNA polymerase complex
  evidence_type: IEA
  original_reference_id: file:POPTR/rpoA/rpoA-uniprot.txt
  review:
    summary: rpoA is part of the plastid DNA-directed RNA polymerase complex.
    action: NEW
    reason: The existing GOA rows include chloroplast localization and polymerase activity but lack 
      the complex annotation stated by UniProt.
    supported_by:
    - reference_id: file:POPTR/rpoA/rpoA-uniprot.txt
      supporting_text: "In plastids the minimal PEP RNA polymerase catalytic core is composed of four
        subunits: alpha, beta, beta', and beta''."
  qualifier: part_of
