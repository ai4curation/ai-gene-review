  label: Populus trichocarpa
description: >-
  Chloroplast-localized bifunctional ArgJ enzyme of the cyclic arginine/ornithine
  biosynthesis pathway. It is synthesized as a precursor that autocatalytically
  self-cleaves into an alpha and a beta chain forming the mature heterodimer. The
  enzyme couples two acetyltransferase reactions. Ornithine acetyltransferase
  (glutamate N-acetyltransferase) activity transfers the acetyl group from
  N2-acetyl-L-ornithine to L-glutamate to regenerate N-acetyl-L-glutamate and
  release L-ornithine, while amino-acid acetyltransferase (N-acetylglutamate
  synthase) activity acetylates L-glutamate using acetyl-CoA to prime the pathway.
  Through these activities it supplies ornithine for arginine biosynthesis in plastids.
