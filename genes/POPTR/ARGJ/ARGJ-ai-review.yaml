suggested_questions:
- question: Is the relative balance of the ornithine acetyltransferase versus N-acetylglutamate
    synthase activities of poplar ArgJ regulated by pathway demand or arginine feedback?
suggested_experiments:
- description: Express and purify recombinant poplar ArgJ and assay both transacetylase
