  label: Populus trichocarpa
description: Wound-inducible poplar endochitinase that binds chitin and hydrolyzes chitin polymers as
  part of plant defense.
existing_annotations:
- term:
    id: GO:0004568
    label: chitinase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: Chitinase activity is correct but less specific than the EC-supported endochitinase activity.
    action: MODIFY
    reason: Use endochitinase activity for the random endo-hydrolysis reaction.
    supported_by:
    - reference_id: file:POPTR/WIN8/WIN8-uniprot.txt
      supporting_text: 'RecName: Full=Endochitinase WIN8; EC=3.2.1.14.'
    proposed_replacement_terms:
    - id: GO:0008843
      label: endochitinase activity
- term:
    id: GO:0005975
    label: carbohydrate metabolic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: Carbohydrate metabolic process is too broad for a chitinase with chitin catabolism evidence.
    action: MODIFY
    reason: Replace with the specific chitin catabolic process term already supported by the enzyme reaction.
    supported_by:
    - reference_id: file:POPTR/WIN8/WIN8-uniprot.txt
      supporting_text: Reaction=Random endo-hydrolysis of N-acetyl-beta-D-glucosaminide linkages in chitin
        and chitodextrins.
    proposed_replacement_terms:
    - id: GO:0006032
      label: chitin catabolic process
- term:
    id: GO:0006032
    label: chitin catabolic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: Chitin catabolic process is the correct process for endochitinase WIN8.
    action: ACCEPT
    reason: The enzyme hydrolyzes chitin and chitodextrins.
    supported_by:
    - reference_id: file:POPTR/WIN8/WIN8-uniprot.txt
      supporting_text: Reaction=Random endo-hydrolysis of N-acetyl-beta-D-glucosaminide linkages in chitin
        and chitodextrins.
- term:
    id: GO:0008061
    label: chitin binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: Chitin binding is appropriate for the chitinase/chitin-binding domain architecture.
    action: ACCEPT
    reason: UniProt and GO annotations support chitin binding for this plant chitinase.
    supported_by:
    - reference_id: file:POPTR/WIN8/WIN8-uniprot.txt
      supporting_text: DR   GO; GO:0008061; F:chitin binding; IEA:UniProtKB-KW.
- term:
    id: GO:0008843
    label: endochitinase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000003
  review:
    summary: Endochitinase activity is the specific core molecular function.
    action: ACCEPT
    reason: The term matches EC 3.2.1.14 and the random endo-hydrolysis reaction.
    supported_by:
    - reference_id: file:POPTR/WIN8/WIN8-uniprot.txt
      supporting_text: 'RecName: Full=Endochitinase WIN8; EC=3.2.1.14.'
- term:
    id: GO:0016998
    label: cell wall macromolecule catabolic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: Cell wall macromolecule catabolic process is correct but broader than chitin catabolism.
    action: KEEP_AS_NON_CORE
    reason: Retain as non-core; chitin catabolic process and endochitinase activity are more informative.
    supported_by:
    - reference_id: file:POPTR/WIN8/WIN8-uniprot.txt
      supporting_text: 'FUNCTION: Defense against chitin-containing fungal pathogens.'
