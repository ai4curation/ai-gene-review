taxon:
  id: NCBITaxon:3694
  label: Populus trichocarpa
description: Chloroplast NDH subunit H that participates in NAD(P)H-plastoquinone electron transfer 
  and proton translocation in the thylakoid membrane.
existing_annotations:
- term:
    id: GO:0009535
    label: chloroplast thylakoid membrane
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  review:
    summary: Chloroplast thylakoid membrane is the correct localization for this NDH subunit.
    action: ACCEPT
    reason: The reviewed entry places ndhH in the chloroplast thylakoid membrane.
    supported_by:
    - reference_id: file:POPTR/ndhH/ndhH-uniprot.txt
      supporting_text: 'SUBCELLULAR LOCATION: Plastid, chloroplast thylakoid membrane'
- term:
    id: GO:0016651
    label: oxidoreductase activity, acting on NAD(P)H
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: Generic NAD(P)H oxidoreductase activity is correct but less specific than 
      quinone-acceptor oxidoreductase activity.
    action: MODIFY
    reason: The reviewed chloroplast NDH reaction uses plastoquinone/quinone as the electron 
      acceptor.
    supported_by:
    - reference_id: file:POPTR/ndhH/ndhH-uniprot.txt
      supporting_text: NDH shuttles electrons from NAD(P)H:plastoquinone, via FMN and iron-sulfur 
        (Fe-S) centers, to quinones in the photosynthetic chain
    proposed_replacement_terms:
    - &id001
      id: GO:0016655
      label: oxidoreductase activity, acting on NAD(P)H, quinone or similar compound as acceptor
- term:
    id: GO:0016655
    label: oxidoreductase activity, acting on NAD(P)H, quinone or similar compound as acceptor
  evidence_type: IEA
  original_reference_id: GO_REF:0000104
  review:
    summary: NAD(P)H quinone oxidoreductase activity is the best available activity term for 
      chloroplast NDH.
    action: ACCEPT
    reason: The UniProt entry identifies ndhH as a NAD(P)H-quinone oxidoreductase subunit that 
      transfers electrons to plastoquinone.
    supported_by:
    - reference_id: file:POPTR/ndhH/ndhH-uniprot.txt
      supporting_text: NAD(P)H-quinone oxidoreductase subunit H, chloroplastic
    - reference_id: file:POPTR/ndhH/ndhH-uniprot.txt
      supporting_text: NDH shuttles electrons from NAD(P)H:plastoquinone
- term:
    id: GO:0019684
    label: photosynthesis, light reaction
  evidence_type: IEA
  original_reference_id: GO_REF:0000104
  review:
    summary: Photosynthesis light reaction is correct but less specific than cyclic photosynthetic 
      phosphorylation for chloroplast NDH.
    action: MODIFY
    reason: Chloroplast NDH reduces plastoquinone and builds the proton gradient used in cyclic 
      photosynthetic phosphorylation; QuickGO identifies GO:0009778, not GO:0009773, as the cyclic 
      photophosphorylation process term.
    supported_by:
    - reference_id: file:POPTR/ndhH/ndhH-uniprot.txt
      supporting_text: NDH shuttles electrons from NAD(P)H:plastoquinone, via FMN and iron-sulfur 
        (Fe-S) centers, to quinones in the photosynthetic chain
    - reference_id: file:POPTR/ndhH/ndhH-uniprot.txt
      supporting_text: Couples the redox reaction to proton translocation, and thus conserves the 
        redox energy in a proton gradient.
    proposed_replacement_terms:
    - id: GO:0009778
      label: cyclic photosynthetic phosphorylation
- term:
    id: GO:0048038
    label: quinone binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: Quinone binding is plausible for the NDH quinone-acceptor module but is less 
      informative than the oxidoreductase activity.
    action: KEEP_AS_NON_CORE
    reason: Retain as a substrate-binding feature; the core function is contribution to 
      NAD(P)H-quinone oxidoreductase activity.
    supported_by:
    - reference_id: file:POPTR/ndhH/ndhH-uniprot.txt
      supporting_text: NDH shuttles electrons from NAD(P)H:plastoquinone
- term:
    id: GO:0051287
    label: NAD binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: NAD binding is plausible for NDH chemistry but is less informative than the 
      oxidoreductase activity.
    action: KEEP_AS_NON_CORE
    reason: Retain as a nucleotide/cofactor-binding feature rather than the core function of the 
      subunit.
    supported_by:
    - reference_id: file:POPTR/ndhH/ndhH-uniprot.txt
      supporting_text: NDH shuttles electrons from NAD(P)H:plastoquinone
- term:
    id: GO:0015990
    label: electron transport coupled proton transport
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  review:
    summary: Electron transport coupled proton transport is the direct process for chloroplast NDH.
    action: NEW
    reason: The existing GOA rows lack this direct process term even though UniProt states that NDH 
      couples the redox reaction to proton translocation.
    supported_by:
    - reference_id: file:POPTR/ndhH/ndhH-uniprot.txt
      supporting_text: Couples the redox reaction to proton translocation, and thus conserves the 
        redox energy in a proton gradient.
- term:
    id: GO:0030964
    label: NADH dehydrogenase complex
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  review:
    summary: ndhH is part of the chloroplast NDH complex.
    action: NEW
    reason: The existing GOA rows lack a complex annotation even though UniProt describes NDH as a 
      multi-subunit complex.
    supported_by:
    - reference_id: file:POPTR/ndhH/ndhH-uniprot.txt
      supporting_text: NDH is composed of at least 16 different subunits
  qualifier: part_of
- term:
    id: GO:0009778
    label: cyclic photosynthetic phosphorylation
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  review:
