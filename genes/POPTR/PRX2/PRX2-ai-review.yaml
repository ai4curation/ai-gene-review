id: A9PCL4
gene_symbol: PRX2
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:3694
  label: Populus trichocarpa
description: Type II (1-Cys, glutaredoxin/thioredoxin-dependent) peroxiredoxin of the Prx5 subfamily.
  It is a thiol-based peroxidase that uses a conserved redox-active peroxidatic cysteine to reduce
  hydrogen peroxide and organic, fatty acid, and phospholipid hydroperoxides to water and the
  corresponding alcohols, receiving reducing equivalents preferentially from glutaredoxin or from
  thioredoxin. Through peroxide detoxification it contributes to cell protection against oxidative
  stress and to cellular redox homeostasis.
existing_annotations:
- term:
    id: GO:0008379
    label: thioredoxin peroxidase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: Thioredoxin peroxidase activity is supported because the enzyme can use thioredoxin as a
      reductant, but the protein preferentially uses glutaredoxin, so this term captures only part of
      the demonstrated activity.
    action: KEEP_AS_NON_CORE
    reason: UniProt and the biochemical literature show this peroxiredoxin uses either glutaredoxin or
      thioredoxin as a proton donor and preferentially uses glutaredoxin; the more general peroxiredoxin
      activity term better represents the core function, while thioredoxin peroxidase activity remains
      a correct supporting molecular function.
    supported_by:
    - reference_id: file:POPTR/PRX2/PRX2-uniprot.txt
      supporting_text: Thiol-specific peroxidase that catalyzes the reduction of hydrogen peroxide and
        organic hydroperoxides to water and alcohols
    - reference_id: file:POPTR/PRX2/PRX2-deep-research-openai.md
      supporting_text: Peroxiredoxin activity reducing peroxides with electron donation via thioredoxin
        and/or glutaredoxin systems.
- term:
    id: GO:0016491
    label: oxidoreductase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: Oxidoreductase activity is a high-level parent term that adds little information for a
      characterized peroxiredoxin.
    action: MARK_AS_OVER_ANNOTATED
    reason: The specific peroxiredoxin activity and thioredoxin peroxidase activity terms already capture
      the redox catalysis; the generic oxidoreductase parent is uninformative.
    supported_by:
    - reference_id: file:POPTR/PRX2/PRX2-uniprot.txt
      supporting_text: Thiol-specific peroxidase that catalyzes the reduction of hydrogen peroxide and
        organic hydroperoxides to water and alcohols
