- id: file:POPTR/EIN2.1/EIN2.1-deep-research-falcon.md
  title: Falcon (Edison) deep research report on Populus trichocarpa EIN2.1 function and GO annotation
  findings:
  - statement: EIN2 is the central transducer of the ethylene signaling pathway, acting downstream of ER-membrane
      ethylene receptors and CTR1 and upstream of EIN3/EIL transcription factors.
    supporting_text: EIN2 is widely described as the **central transducer** linking receptor/CTR1 activity to
      downstream transcriptional reprogramming via EIN3/EIL transcription factors
    reference_section_type: OTHER
  - statement: Full-length EIN2 is ER-tethered; ethylene-triggered proteolytic cleavage releases a C-terminal
      fragment that accumulates in the nucleus and acts in cytoplasmic P-bodies.
    supporting_text: Ethylene/ACC signaling promotes **cleavage of the EIN2 C-terminus** into multiple fragments
      and drives **nuclear accumulation** of EIN2-derived material
    reference_section_type: OTHER
  - statement: At the family level EIN2.1 is inferred to act as a signal transducer converting receptor/CTR1
      activity into nuclear and post-transcriptional outputs via cleavage of its C-terminal signaling domain.
    supporting_text: EIN2.1 is expected to function as a **signal transducer** in the ethylene signaling pathway,
      converting receptor/CTR1 activity into nuclear and post-transcriptional outputs via cleavage of its
      C-terminal signaling domain
    reference_section_type: OTHER
  - statement: No biochemical transport assay or substrate-specificity evidence supports a metal-ion transport
      function for Populus EIN2.1; the NRAMP-derived transporter annotations are family-based inference.
    supporting_text: no biochemical transport assay, substrate specificity, or direct evidence
    reference_section_type: OTHER
  - statement: Populus ethylene signaling is functionally important in wood biology, and EIN2-family proteins are
      expected to serve as central transducers by analogy to Arabidopsis and rice.
    supporting_text: EIN2-family proteins are expected to serve as central transducers by analogy to Arabidopsis/rice
    reference_section_type: OTHER
