    label: intracellular iron ion homeostasis
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: intracellular iron ion homeostasis appears to be an NRAMP-family over-transfer for EIN2 rather than
      this protein's demonstrated core role.
    action: MARK_AS_OVER_ANNOTATED
    reason: The reviewed entry describes EIN2 ethylene signaling and C-terminal trafficking by similarity, not a
      demonstrated Fe/Mn homeostasis function for this paralog.
