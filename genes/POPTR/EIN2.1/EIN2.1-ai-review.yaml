- term:
    id: GO:0035591
    label: signaling adaptor activity
  evidence_type: ISS
  original_reference_id: GO_REF:0000024
  review:
    summary: EIN2.1 should be annotated as a signaling adaptor by similarity to characterized Arabidopsis EIN2.
    action: NEW
    reason: The existing GOA rows include ethylene signaling and localization but lack a molecular-function term
      for the central EIN2 signaling role. Falcon deep research describes EIN2 as a signal transducer that converts
      receptor/CTR1 activity into nuclear and post-transcriptional outputs via cleavage of its C-terminal signaling
      domain, consistent with a signaling-adaptor molecular function rather than the family-derived NRAMP transporter
      activity.
    supported_by:
    - reference_id: file:POPTR/EIN2.1/EIN2.1-uniprot.txt
      supporting_text: 'FUNCTION: Central factor in signaling pathways regulated by ethylene (ET)'
    - reference_id: file:POPTR/EIN2.1/EIN2.1-uniprot.txt
      supporting_text: 'FUNCTION: [EIN2.1-CEND]: Trafficking signal inducing ethylene response (By similarity).'
    - reference_id: file:POPTR/EIN2.1/EIN2.1-deep-research-falcon.md
      supporting_text: EIN2.1 is expected to function as a **signal transducer** in the ethylene signaling pathway,
        converting receptor/CTR1 activity into nuclear and post-transcriptional outputs via cleavage of its
        C-terminal signaling domain
      reference_section_type: OTHER
