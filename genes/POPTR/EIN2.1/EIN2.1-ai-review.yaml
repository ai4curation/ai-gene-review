suggested_questions:
- question: Is EIN2.1 functionally redundant with the other Populus EIN2 paralog in ethylene response assays?
- question: Do any Populus-specific data support metal transport for EIN2.1, or are the NRAMP-derived annotations
    over-transfer artifacts?
suggested_experiments:
- description: Create EIN2.1 loss-of-function or complementation lines and measure canonical ethylene responses
    and EIN3/EIL reporter activation.
  experiment_type: targeted functional assay
