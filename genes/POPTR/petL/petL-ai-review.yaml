taxon:
  id: NCBITaxon:3694
  label: Populus trichocarpa
description: 'Cytochrome b6-f complex subunit PetL, a small chloroplast thylakoid membrane subunit that
  supports cytochrome b6-f stability and photosynthetic electron transfer between PSII and PSI.'
existing_annotations:
- term:
    id: GO:0009055
    label: electron transfer activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  review:
    summary: Electron transfer activity is likely an over-annotation for PetL as an individual 
      structural/stability subunit.
    action: MARK_AS_OVER_ANNOTATED
    reason: UniProt describes PetL as supporting electron-transfer efficiency and cytochrome b6-f 
      complex stability, not as the direct electron-transfer catalyst.
    supported_by:
    - reference_id: file:POPTR/petL/petL-uniprot.txt
      supporting_text: Component of the cytochrome b6-f complex, which mediates electron transfer 
        between photosystem II (PSII) and photosystem I (PSI), cyclic electron flow around PSI, and 
        state transitions.
    - reference_id: file:POPTR/petL/petL-uniprot.txt
      supporting_text: PetL is important for photoautotrophic growth as well as for electron 
        transfer efficiency and stability of the cytochrome b6-f complex.
- term:
    id: GO:0009512
    label: cytochrome b6f complex
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: PetL is a small subunit of the cytochrome b6-f complex.
    action: ACCEPT
    reason: The reviewed entry explicitly lists PetL among the small subunits of the cytochrome b6-f
      complex.
    supported_by:
    - reference_id: file:POPTR/petL/petL-uniprot.txt
      supporting_text: The 4 small subunits are PetG, PetL, PetM and PetN.
    - reference_id: file:POPTR/petL/petL-uniprot.txt
      supporting_text: Component of the cytochrome b6-f complex, which mediates electron transfer 
