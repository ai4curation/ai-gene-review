taxon:
  id: NCBITaxon:3694
  label: Populus trichocarpa
description: Chloroplast plastid-encoded RNA polymerase beta double-prime subunit that contributes to DNA-templated
  transcription in plastids.
existing_annotations:
- term:
    id: GO:0003899
    label: DNA-directed RNA polymerase activity
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: contributes_to
  review:
    summary: rpoC2 contributes to the catalytic activity of the plastid-encoded RNA polymerase complex.
    action: ACCEPT
    reason: The subunit is part of the PEP RNA polymerase catalytic core, so the contributes_to qualifier is appropriate
      for both transferred RNA polymerase activity rows.
    supported_by:
    - reference_id: file:POPTR/rpoC2/rpoC2-uniprot.txt
      supporting_text: 'FUNCTION: DNA-dependent RNA polymerase catalyzes the transcription of DNA into RNA using
        the four ribonucleoside triphosphates as substrates.'
- term:
    id: GO:0006351
    label: DNA-templated transcription
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: DNA-templated transcription is the direct biological process for plastid RNA polymerase rpoC2.
    action: ACCEPT
    reason: The reviewed entry describes DNA-dependent RNA polymerase activity producing RNA from a DNA template.
    supported_by: &id001
    - &id002
      reference_id: file:POPTR/rpoC2/rpoC2-uniprot.txt
      supporting_text: 'FUNCTION: DNA-dependent RNA polymerase catalyzes the transcription of DNA into RNA using
        the four ribonucleoside triphosphates as substrates.'
- term:
    id: GO:0003677
    label: DNA binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  review:
    summary: DNA binding is plausible for an RNA polymerase subunit but is less informative than the polymerase
      contribution.
    action: KEEP_AS_NON_CORE
    reason: Retain as a non-core domain-derived annotation while treating RNA polymerase contribution as the central
      role.
    supported_by: *id001
- term:
    id: GO:0003899
    label: DNA-directed RNA polymerase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  review:
