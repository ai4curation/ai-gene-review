- term:
    id: GO:0008270
    label: zinc ion binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000104
  review:
    summary: Zinc ion binding is supported as a cofactor feature of the rpoC2 subunit.
    action: ACCEPT
    reason: UniProt/HAMAP curates one Zn(2+) ion bound per subunit.
    supported_by:
    - reference_id: file:POPTR/rpoC2/rpoC2-uniprot.txt
      supporting_text: 'COFACTOR: Binds 1 Zn(2+) ion per subunit.'
- term:
    id: GO:0009507
    label: chloroplast
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  review:
    summary: Chloroplast localization is correct for this plastid-encoded RNA polymerase subunit.
    action: ACCEPT
    reason: The reviewed entry places rpoC2 in the chloroplast.
    supported_by:
    - &id003
      reference_id: file:POPTR/rpoC2/rpoC2-uniprot.txt
      supporting_text: 'SUBCELLULAR LOCATION: Plastid, chloroplast.'
- term:
    id: GO:0034062
    label: 5'-3' RNA polymerase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000116
  review:
    summary: 5'-3' RNA polymerase activity reflects the RNA polymerase reaction but overstates the isolated subunit
      as the whole enzyme.
    action: MARK_AS_OVER_ANNOTATED
    reason: The catalytic reaction belongs to the plastid RNA polymerase complex, with rpoC2 contributing as one
      core subunit.
    supported_by: *id001
