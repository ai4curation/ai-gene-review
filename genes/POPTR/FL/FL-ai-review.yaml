  review:
    summary: Regulation of flower development is appropriate for the Populus LEAFY/PTLF homolog.
    action: ACCEPT
    reason: The source IBA is supported by the PTLF/LEAFY identity and Populus 
      overexpression/expression evidence in developing inflorescences.
