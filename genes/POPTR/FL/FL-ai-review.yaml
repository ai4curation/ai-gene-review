- term:
    id: GO:0003677
    label: DNA binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: DNA binding is correct but under-specific for a LEAFY-family sequence-specific
      transcription factor; a more informative molecular-function term is available.
    action: MODIFY
    reason: FL/PTLF is a FLO/LFY-family transcription factor with a characteristic LEAFY
      DNA-binding fold. The generic GO:0003677 (DNA binding) should be refined to
      GO:0003700 (DNA-binding transcription factor activity), which captures the sequence-specific,
      cis-regulatory DNA-binding mechanism of LEAFY-class transcription factors. Falcon deep
      research recommends annotating O04064 first-and-foremost by its DNA-binding fold/class and
      TF mechanism rather than a generic label.
    proposed_replacement_terms:
    - id: GO:0003700
      label: DNA-binding transcription factor activity
