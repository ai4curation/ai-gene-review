suggested_questions:
- question: Which direct PTLF/FL target genes drive Populus floral competence and how do they differ
    from Arabidopsis LFY targets?
- question: Should FL/PTLF be upgraded from broad GO:0003677 DNA binding to GO:0003700 DNA-binding 
    transcription factor activity if curator review accepts the LEAFY-family sequence-specific 
    DNA-binding evidence?
suggested_experiments:
- description: Perform ChIP-seq or CUT&RUN for FL/PTLF in developing Populus inflorescences paired 
    with RNA-seq after FL perturbation.
  experiment_type: targeted functional assay
