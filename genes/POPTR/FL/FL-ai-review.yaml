suggested_questions:
- question: Which direct PTLF/FL target genes drive Populus floral competence and how do they differ
    from Arabidopsis LFY targets?
- question: Does Populus FL/PTLF act with UFO cofactors to activate B-class MADS-box genes (e.g. PI)
    as suggested by orthology to the LFY-UFO module?
suggested_experiments:
- description: Perform ChIP-seq or CUT&RUN for FL/PTLF in developing Populus inflorescences paired
    with RNA-seq after FL perturbation to define direct targets.
  experiment_type: targeted functional assay
- description: Determine FL/PTLF subcellular localization in Populus (e.g. PTLF-GFP), since direct
    Populus localization evidence is currently lacking and nuclear localization is inferred from orthologs.
  experiment_type: localization assay
