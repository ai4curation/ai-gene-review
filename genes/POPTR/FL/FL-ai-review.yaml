      supporting_text: PTLF, the Populus trichocarpa homolog of LEAFY (LFY) and FLORICAULA, was 
        cloned to assess its function in a dioecious tree species.
    - reference_id: PMID:10849341
      supporting_text: In situ hybridization studies showed that the gene was expressed most 
        strongly in developing inflorescences.
    - reference_id: PMID:10849341
      supporting_text: Although ectopic expression of the PTLF cDNA in Arabidopsis accelerated 
        flowering
