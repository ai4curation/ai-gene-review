taxon:
  id: NCBITaxon:3694
  label: Populus trichocarpa
description: Floricaula/LEAFY homolog PTLF, a nuclear plant-specific DNA-binding transcription
  factor of the FLO/LFY family. It controls the reproductive transition and floral meristem
  identity, regulating floral development programs in Populus. In poplar it is strongly
  expressed in developing inflorescences and acts (by orthology) with UFO cofactors to
  activate B-class MADS-box genes during floral organ specification.
