  title: UniProtKB reviewed entry for ADLE (AXEP_POPTR)
  findings:
  - statement: UniProt identifies ADLE as an L-Ala-D/L-amino acid epimerase (EC 5.1.1.-)
      of the mandelate racemase/muconate lactonizing enzyme family that epimerizes
      hydrophobic and polar dipeptides and binds one Mg2+ per subunit.
