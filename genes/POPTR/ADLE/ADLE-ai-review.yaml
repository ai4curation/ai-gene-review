proposed_new_terms: []
suggested_questions:
- question: What is the physiological substrate and in vivo biological role of this
    dipeptide epimerase in poplar, given that plants lack the peptidoglycan-recycling
    context of the bacterial Ala-Glu epimerase homologs?
- question: Does the in vitro promiscuity across L-Ala dipeptides reflect genuine
    substrate ambiguity in vivo, or is there a single preferred physiological substrate?
suggested_experiments:
- description: Determine the full kinetic substrate profile (kcat/KM) across a broad
    panel of L,L-dipeptides to identify the preferred physiological substrate beyond
    the qualitative in vitro hits.
  experiment_type: enzyme kinetics
- description: Use metabolomics of D-amino-acid-containing dipeptides in poplar tissues
    and ADLE knockout/knockdown lines to identify the in vivo substrate and pathway.
  experiment_type: metabolomics
