id: B9I2J6
gene_symbol: ADLE
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:3694
  label: Populus trichocarpa
description: A divalent-metal-dependent member of the enolase superfamily (mandelate
  racemase/muconate lactonizing enzyme family) that catalyzes the epimerization of
  dipeptides. The poplar enzyme has demonstrated in vitro epimerase activity on hydrophobic
  and polar L-Ala-containing dipeptides (L-Ala-L-Ala, L-Ala-L-Ser, L-Ala-L-Thr and
  L-Ala-L-Trp), interconverting the L,L and L,D diastereomers. Catalysis requires one
  Mg2+ ion per subunit, coordinated within the (beta/alpha)8 TIM-barrel C-terminal
  domain, which stabilizes the enolate intermediate formed by abstraction of the alpha-proton.
  As is typical for the functionally divergent enolase superfamily, substrate specificity
  is broad and the precise physiological substrate and in vivo role in poplar remain
  undetermined; in bacterial homologs Ala-Glu epimerases participate in peptidoglycan
  (murein) recycling, but plants lack peptidoglycan, so the biological context here is
  uncertain.
