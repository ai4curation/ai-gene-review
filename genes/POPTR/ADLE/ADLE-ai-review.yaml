references:
- id: GO_REF:0000002
  title: Gene Ontology annotation through association of InterPro records with GO
    terms
  findings:
  - statement: GO_REF:0000002 supplied the InterPro-based IEA epimerase (acting on
      amino acids and derivatives) annotation reviewed here.
- id: GO_REF:0000033
  title: Annotation inferences using phylogenetic trees
  findings:
  - statement: GO_REF:0000033 (PANTHER IBA) supplied phylogenetic molecular-function
      and process annotations reviewed here.
- id: GO_REF:0000117
  title: Electronic Gene Ontology annotations created by ARBA machine learning models
  findings:
  - statement: GO_REF:0000117 (ARBA) supplied the machine-learning IEA epimerase
      activity annotation reviewed here.
- id: PMID:22392983
  title: Homology models guide discovery of diverse enzyme specificities among dipeptide
    epimerases in the enolase superfamily.
  findings:
  - statement: Computational homology modeling and metabolite docking guided experimental
      characterization of enolase-superfamily dipeptide epimerases; the poplar enzyme
      was experimentally verified as a Mg2+-dependent dipeptide epimerase acting on
      L-Ala-containing dipeptides.
  - statement: The biological roles of these divergent dipeptide-epimerase specificities
      are unknown, and in vitro activities provide only a starting point for in vivo
      studies.
