id: A4GYW9
gene_symbol: ndhG
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:3694
  label: Populus trichocarpa
description: Chloroplast NDH subunit 6 membrane protein that contributes to NAD(P)H-plastoquinone oxidoreductase-linked
  proton translocation.
existing_annotations:
- term:
    id: GO:0008137
    label: NADH dehydrogenase (ubiquinone) activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: NADH dehydrogenase (ubiquinone) activity is too respiratory-chain specific for a chloroplast
      NDH subunit.
    action: MODIFY
    reason: The chloroplast reaction uses plastoquinone and NAD(P)H, so the broader quinone-acceptor oxidoreductase
      term is safer.
    supported_by:
    - reference_id: file:POPTR/ndhG/ndhG-uniprot.txt
      supporting_text: Reaction=a plastoquinone + NADH/NADPH = a plastoquinol + NAD/NADP.
    proposed_replacement_terms:
    - id: GO:0016655
      label: oxidoreductase activity, acting on NAD(P)H, quinone or similar compound as acceptor
- term:
    id: GO:0009535
    label: chloroplast thylakoid membrane
  evidence_type: IEA
  original_reference_id: GO_REF:0000044
  review:
    summary: Chloroplast thylakoid membrane is the correct localization for this plastid NDH subunit.
    action: ACCEPT
    reason: The reviewed UniProt entry places this multi-pass NDH subunit in the chloroplast thylakoid
      membrane.
    supported_by:
    - reference_id: file:POPTR/ndhG/ndhG-uniprot.txt
      supporting_text: 'SUBCELLULAR LOCATION: Plastid, chloroplast thylakoid membrane.'
- term:
    id: GO:1902600
    label: proton transmembrane transport
  evidence_type: IEA
  original_reference_id: GO_REF:0000108
  review:
    summary: Proton transmembrane transport is directionally correct but less precise than electron transport
      coupled proton transport for NDH.
    action: MODIFY
    reason: The NDH complex couples quinone redox chemistry to proton translocation.
    supported_by:
    - reference_id: file:POPTR/ndhG/ndhG-uniprot.txt
      supporting_text: Couples the redox reaction to proton translocation, and thus conserves the redox
        energy in a proton gradient.
    proposed_replacement_terms:
    - id: GO:0015990
      label: electron transport coupled proton transport
