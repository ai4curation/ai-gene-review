id: A4GYW4
gene_symbol: ndhF
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:3694
  label: Populus trichocarpa
description: Chloroplast NDH subunit 5 membrane protein that contributes to NAD(P)H-plastoquinone electron transfer
  coupled to proton translocation in the thylakoid membrane.
existing_annotations:
- term:
    id: GO:0015990
    label: electron transport coupled proton transport
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: Electron transport coupled proton transport is the core process for chloroplast NDH.
    action: ACCEPT
    reason: The NDH redox reaction is coupled to proton translocation across the thylakoid membrane.
    supported_by: &id001
    - &id003
      reference_id: file:POPTR/ndhF/ndhF-uniprot.txt
      supporting_text: Couples the redox reaction to proton translocation, and thus conserves the redox energy in
        a proton gradient.
- term:
    id: GO:0008137
    label: NADH dehydrogenase (ubiquinone) activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: NADH dehydrogenase (ubiquinone) activity is too respiratory-chain specific for chloroplast NDH.
    action: MODIFY
    reason: The reviewed chloroplast reaction uses plastoquinone and NAD(P)H; the broader quinone-acceptor oxidoreductase
      term is safer.
    supported_by:
    - &id002
      reference_id: file:POPTR/ndhF/ndhF-uniprot.txt
      supporting_text: Reaction=a plastoquinone + NADH/NADPH = a plastoquinol + NAD/NADP.
    proposed_replacement_terms:
    - id: GO:0016655
      label: oxidoreductase activity, acting on NAD(P)H, quinone or similar compound as acceptor
- term:
    id: GO:0009535
    label: chloroplast thylakoid membrane
  evidence_type: IEA
  original_reference_id: GO_REF:0000044
  review:
    summary: Chloroplast thylakoid membrane is the correct localization for ndhF.
    action: ACCEPT
    reason: The reviewed entry places this multi-pass NDH subunit in the chloroplast thylakoid membrane.
    supported_by:
    - &id004
      reference_id: file:POPTR/ndhF/ndhF-uniprot.txt
      supporting_text: 'SUBCELLULAR LOCATION: Plastid, chloroplast thylakoid membrane.'
- term:
    id: GO:0042773
    label: ATP synthesis coupled electron transport
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: ATP synthesis coupled electron transport is plausible as a downstream consequence of the proton gradient
      but broader than the direct NDH role.
    action: KEEP_AS_NON_CORE
    reason: Keep as non-core; the direct process is electron transport coupled proton transport.
    supported_by: *id001
