suggested_questions:
- question: Does Populus ndhF contribute most strongly to cyclic electron flow, chlororespiration, or stress-specific
    photosynthetic balancing?
- question: Are ubiquinone-specific NDH annotations systematically over-transferred to plastid ndh genes?
suggested_experiments:
- description: Measure chlorophyll fluorescence and P700 redox kinetics in ndhF perturbation lines under fluctuating
    light.
  experiment_type: targeted functional assay
