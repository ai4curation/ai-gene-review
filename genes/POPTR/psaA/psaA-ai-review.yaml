id: A4GYR0
gene_symbol: psaA
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:3694
  label: Populus trichocarpa
description: Photosystem I P700 chlorophyll a apoprotein A1, a chloroplast thylakoid membrane reaction-center
  subunit that binds PSI cofactors and supports light-driven electron transfer to ferredoxin.
existing_annotations:
- term:
    id: GO:0000287
    label: magnesium ion binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000104
  review:
    summary: Magnesium binding is a cofactor-related feature of PSI pigments but not the core annotation.
    action: KEEP_AS_NON_CORE
    reason: The core function is light-driven electron transfer in photosystem I.
    supported_by:
    - reference_id: file:POPTR/psaA/psaA-uniprot.txt
      supporting_text: P700 is a chlorophyll a/chlorophyll a prime dimer.
- term:
    id: GO:0009055
    label: electron transfer activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000104
  review:
    summary: Electron transfer activity captures the reaction-center role of PsaA.
    action: ACCEPT
    reason: PsaA binds P700 and the early PSI electron acceptors that execute charge separation and electron
      transfer.
    supported_by:
    - reference_id: file:POPTR/psaA/psaA-uniprot.txt
      supporting_text: PsaA and PsaB bind P700 and the electron acceptors A0, A1 and FX.
- term:
    id: GO:0009535
    label: chloroplast thylakoid membrane
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  review:
    summary: Chloroplast thylakoid membrane is the correct localization for PsaA.
    action: ACCEPT
    reason: The UniProt entry places PsaA in the chloroplast thylakoid membrane.
    supported_by:
    - reference_id: file:POPTR/psaA/psaA-uniprot.txt
      supporting_text: 'SUBCELLULAR LOCATION: Plastid, chloroplast thylakoid membrane.'
- term:
    id: GO:0009579
    label: thylakoid
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: Thylakoid is correct but less precise than chloroplast thylakoid membrane.
    action: MODIFY
    reason: The reviewed protein is a multi-pass chloroplast thylakoid membrane protein.
    supported_by:
    - reference_id: file:POPTR/psaA/psaA-uniprot.txt
      supporting_text: 'SUBCELLULAR LOCATION: Plastid, chloroplast thylakoid membrane.'
    proposed_replacement_terms:
    - id: GO:0009535
      label: chloroplast thylakoid membrane
- term:
    id: GO:0015979
    label: photosynthesis
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  review:
    summary: Photosynthesis is an appropriate biological process for a photosystem I reaction-center subunit.
    action: ACCEPT
    reason: PsaA is part of the photosynthetic electron transfer chain.
    supported_by:
    - reference_id: file:POPTR/psaA/psaA-uniprot.txt
      supporting_text: PSI is a plastocyanin-ferredoxin oxidoreductase.
- term:
    id: GO:0016020
    label: membrane
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: Generic membrane is correct but too broad for a chloroplast thylakoid membrane PSI core protein.
    action: MODIFY
    reason: Use the specific chloroplast thylakoid membrane term.
    supported_by:
    - reference_id: file:POPTR/psaA/psaA-uniprot.txt
      supporting_text: 'SUBCELLULAR LOCATION: Plastid, chloroplast thylakoid membrane.'
    proposed_replacement_terms:
    - id: GO:0009535
      label: chloroplast thylakoid membrane
- term:
    id: GO:0046872
    label: metal ion binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: Generic metal ion binding is less informative than the specific PSI 4Fe-4S cofactor context.
    action: MODIFY
    reason: The UniProt entry describes the FX 4Fe-4S iron-sulfur center bound by the PSI reaction center.
    supported_by:
    - reference_id: file:POPTR/psaA/psaA-uniprot.txt
      supporting_text: FX is a shared 4Fe-4S iron-sulfur center.
    proposed_replacement_terms:
    - id: GO:0051539
      label: 4 iron, 4 sulfur cluster binding
- term:
    id: GO:0003729
    label: mRNA binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000107
  review:
    summary: mRNA binding is not a supported core or accessory function for the PsaA photosystem I reaction-center
      protein.
    action: REMOVE
    reason: The reviewed UniProt record supports photosystem I cofactor binding and electron transfer,
      not RNA binding; this appears to be an over-transferred orthology annotation.
    supported_by:
    - reference_id: file:POPTR/psaA/psaA-uniprot.txt
      supporting_text: 'RecName: Full=Photosystem I P700 chlorophyll a apoprotein A1.'
