- id: file:POPTR/psaA/psaA-uniprot.txt
  title: UniProtKB reviewed entry for psaA
  findings:
  - statement: UniProt identifies psaA as Photosystem I P700 chlorophyll a apoprotein A1, a thylakoid
      membrane subunit involved in plastocyanin-ferredoxin oxidoreduction.
core_functions:
- description: Forms the PsaA half of the PSI reaction center, supporting light-driven electron transfer
    from plastocyanin through PSI acceptors to ferredoxin.
  molecular_function:
    id: GO:0009055
    label: electron transfer activity
  directly_involved_in:
  - id: GO:0015979
    label: photosynthesis
  locations:
  - id: GO:0009535
    label: chloroplast thylakoid membrane
  supported_by:
  - reference_id: file:POPTR/psaA/psaA-uniprot.txt
    supporting_text: 'FUNCTION: PsaA and PsaB bind P700, the primary electron donor of photosystem I,
      as well as electron acceptors A0, A1 and FX.'
  - reference_id: file:POPTR/psaA/psaA-uniprot.txt
    supporting_text: 'CATALYTIC ACTIVITY: reduced plastocyanin plus light plus oxidized ferredoxin yields
      oxidized plastocyanin plus reduced ferredoxin.'
  - reference_id: file:POPTR/psaA/psaA-uniprot.txt
    supporting_text: 'SUBCELLULAR LOCATION: Plastid, chloroplast thylakoid membrane.'
proposed_new_terms: []
suggested_questions:
- question: How do Populus psaA variants influence PSI electron-transfer efficiency under fluctuating
    light?
suggested_experiments:
- description: Measure PSI donor and acceptor side kinetics in leaves under controlled light transitions.
  experiment_type: targeted functional assay
