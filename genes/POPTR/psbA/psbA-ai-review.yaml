id: A4GYN9
gene_symbol: psbA
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:3694
  label: Populus trichocarpa
description: Photosystem II D1 reaction center protein, a chloroplast thylakoid membrane subunit that
  binds PSII cofactors and supports light-driven water-plastoquinone oxidoreductase electron transfer.
existing_annotations:
- term:
    id: GO:0009523
    label: photosystem II
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: PsbA/D1 is a core subunit of photosystem II.
    action: ACCEPT
    reason: The term correctly places the D1 protein in the PSII complex.
    supported_by:
    - reference_id: file:POPTR/psbA/psbA-uniprot.txt
      supporting_text: The D1/D2 reaction center heterodimer binds P680 and electron acceptors.
  qualifier: part_of
- term:
    id: GO:0005506
    label: iron ion binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000104
  review:
    summary: Iron binding is a cofactor-related feature of the PSII reaction center but not the main annotation.
    action: KEEP_AS_NON_CORE
    reason: The core function is electron transfer in PSII; iron binding reflects the shared non-heme
      iron/cofactor environment.
    supported_by:
    - reference_id: file:POPTR/psbA/psbA-uniprot.txt
      supporting_text: The D1/D2 heterodimer shares a non-heme iron.
- term:
    id: GO:0009055
    label: electron transfer activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  review:
    summary: Electron transfer activity captures the D1 reaction-center role.
    action: ACCEPT
    reason: D1 binds reaction-center cofactors and supports charge separation and electron transfer.
    supported_by:
    - reference_id: file:POPTR/psbA/psbA-uniprot.txt
      supporting_text: The D1/D2 reaction center heterodimer binds P680 and subsequent electron acceptors.
- term:
    id: GO:0009535
    label: chloroplast thylakoid membrane
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  review:
    summary: Chloroplast thylakoid membrane is the correct localization for PsbA.
    action: ACCEPT
    reason: PsbA is a multi-pass thylakoid membrane protein.
    supported_by:
    - reference_id: file:POPTR/psbA/psbA-uniprot.txt
      supporting_text: 'SUBCELLULAR LOCATION: Plastid, chloroplast thylakoid membrane.'
- term:
    id: GO:0009772
    label: photosynthetic electron transport in photosystem II
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: This is the best process annotation for the D1 reaction-center protein.
    action: ACCEPT
    reason: PsbA is directly involved in PSII electron transport.
    supported_by:
    - reference_id: file:POPTR/psbA/psbA-uniprot.txt
      supporting_text: Photosystem II uses light energy to abstract electrons from H2O and reduce plastoquinone.
- term:
    id: GO:0010242
    label: oxygen evolving activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  review:
    summary: Oxygen-evolving activity is a PSII complex-level activity to which D1 contributes.
    action: ACCEPT
    reason: D1 supplies ligands for the Mn4-Ca-O5 oxygen-evolving cluster; the qualifier should be contributes_to.
    supported_by:
    - reference_id: file:POPTR/psbA/psbA-uniprot.txt
      supporting_text: D1 provides most of the ligands for the Mn4-Ca-O5 cluster of the oxygen-evolving
        complex.
  qualifier: contributes_to
- term:
    id: GO:0015979
    label: photosynthesis
  evidence_type: IEA
  original_reference_id: GO_REF:0000104
  review:
    summary: Photosynthesis is correct but broad relative to the specific PSII electron-transport role.
    action: KEEP_AS_NON_CORE
    reason: Retain as a non-core broader process; the core process is photosynthetic electron transport
      in PSII.
    supported_by:
    - reference_id: file:POPTR/psbA/psbA-uniprot.txt
      supporting_text: Photosystem II is a light-driven water:plastoquinone oxidoreductase.
- term:
    id: GO:0016168
    label: chlorophyll binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000104
  review:
    summary: Chlorophyll binding is a real cofactor-binding feature of the D1/D2 reaction center.
    action: ACCEPT
    reason: D1 binds the P680 chlorophyll reaction-center system and associated cofactors.
    supported_by:
    - reference_id: file:POPTR/psbA/psbA-uniprot.txt
      supporting_text: The D1/D2 heterodimer binds P680, chlorophylls that are the primary electron donor
        of PSII.
- term:
    id: GO:0016682
    label: oxidoreductase activity, acting on diphenols and related substances as donors, oxygen as acceptor
  evidence_type: IEA
  original_reference_id: GO_REF:0000104
  review:
    summary: This oxidoreductase term describes the PSII complex reaction that PsbA helps execute.
    action: ACCEPT
    reason: Because D1 is one subunit of PSII, the molecular-function relationship should be contributes_to.
    supported_by:
    - reference_id: file:POPTR/psbA/psbA-uniprot.txt
      supporting_text: 'CATALYTIC ACTIVITY: 2 plastoquinone + light + 2 H2O = 2 plastoquinol + O2.'
  qualifier: contributes_to
- term:
    id: GO:0019684
    label: photosynthesis, light reaction
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: The PSII D1 protein directly participates in the photosynthetic light reaction.
    action: ACCEPT
    reason: This process-level term is appropriate for a core thylakoid reaction-center subunit.
    supported_by:
    - reference_id: file:POPTR/psbA/psbA-uniprot.txt
      supporting_text: Photosystem II uses light energy to generate O2 and a proton gradient.
