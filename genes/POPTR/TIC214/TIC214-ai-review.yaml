id: A4GYX4
gene_symbol: TIC214
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:3694
  label: Populus trichocarpa
description: Chloroplast-encoded (ycf1) multi-pass integral protein of the chloroplast inner envelope membrane and
  the largest subunit of the TIC (Translocon at the Inner envelope membrane of Chloroplasts) complex. It is involved
  in the import of nucleus-encoded protein precursors into chloroplasts, where it may form part of an intermediate
  translocation complex acting as a protein-conducting channel at the inner envelope.
