taxon:
  id: NCBITaxon:3694
  label: Populus trichocarpa
description: Chloroplast-targeted translation factor GTPase of the TRAFAC class, classic
  translation factor GTPase family, LepA (EF-4) subfamily. Synthesized as a precursor
  with an N-terminal chloroplast transit peptide, the mature protein localizes to the
  plastid stroma where it associates with the chloroplast ribosome. It binds and hydrolyzes
  GTP and acts as a translational fidelity factor, catalyzing a one-codon backward
  translocation (back-translocation) of tRNAs on improperly translocated ribosomes,
  thereby promoting accurate chloroplast protein synthesis.
