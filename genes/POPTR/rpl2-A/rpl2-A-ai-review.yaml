id: A4GYV2
gene_symbol: rpl2-A
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:3694
  label: Populus trichocarpa
description: Chloroplast large ribosomal subunit protein uL2 encoded by duplicated plastid rpl2 copies, supporting
  plastid translation and large-subunit rRNA binding.
existing_annotations:
- term:
    id: GO:0005762
    label: mitochondrial large ribosomal subunit
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: Mitochondrial large ribosomal subunit is the wrong organelle context for rpl2.
    action: MODIFY
    reason: The reviewed protein is chloroplast-localized; use the compartment-neutral large ribosomal subunit term.
    supported_by:
    - reference_id: file:POPTR/rpl2-A/rpl2-A-uniprot.txt
      supporting_text: 'SUBCELLULAR LOCATION: Plastid, chloroplast.'
    - reference_id: file:POPTR/rpl2-A/rpl2-A-uniprot.txt
      supporting_text: 'RecName: Full=Large ribosomal subunit protein uL2cz/uL2cy'
    proposed_replacement_terms:
    - id: GO:0015934
      label: large ribosomal subunit
- term:
    id: GO:0032543
    label: mitochondrial translation
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: Mitochondrial translation is the wrong organelle context for rpl2.
    action: MODIFY
    reason: The protein is a chloroplast ribosomal subunit; use the general translation process term already appropriate
      for plastid ribosomes.
    supported_by:
    - reference_id: file:POPTR/rpl2-A/rpl2-A-uniprot.txt
      supporting_text: 'SUBCELLULAR LOCATION: Plastid, chloroplast.'
    - reference_id: file:POPTR/rpl2-A/rpl2-A-uniprot.txt
      supporting_text: 'AltName: Full=50S ribosomal protein L2, chloroplastic'
    proposed_replacement_terms:
    - id: GO:0006412
      label: translation
- term:
    id: GO:0003723
    label: RNA binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: Generic RNA binding is better represented as large-subunit rRNA binding.
    action: MODIFY
    reason: rpl2 is a large ribosomal subunit protein with a ribosomal RNA-binding domain; use the specific large-subunit
      rRNA binding term.
    supported_by:
    - reference_id: file:POPTR/rpl2-A/rpl2-A-uniprot.txt
      supporting_text: DR   GO; GO:0019843; F:rRNA binding; IEA:UniProtKB-UniRule.
    - reference_id: file:POPTR/rpl2-A/rpl2-A-uniprot.txt
      supporting_text: 'SUBUNIT: Part of the 50S ribosomal subunit.'
    proposed_replacement_terms:
    - id: GO:0070180
      label: large ribosomal subunit rRNA binding
- term:
    id: GO:0003735
    label: structural constituent of ribosome
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: Structural constituent of ribosome is the core molecular function for rpl2.
    action: ACCEPT
    reason: rpl2 encodes a conserved chloroplast large-subunit ribosomal protein.
    supported_by:
    - reference_id: file:POPTR/rpl2-A/rpl2-A-uniprot.txt
      supporting_text: 'RecName: Full=Large ribosomal subunit protein uL2cz/uL2cy'
- term:
    id: GO:0005840
    label: ribosome
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: Ribosome is true but less specific than the large ribosomal subunit.
    action: KEEP_AS_NON_CORE
    reason: The more specific large ribosomal subunit term captures the core complex.
    supported_by:
    - reference_id: file:POPTR/rpl2-A/rpl2-A-uniprot.txt
      supporting_text: 'AltName: Full=50S ribosomal protein L2, chloroplastic'
- term:
    id: GO:0006412
    label: translation
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  review:
    summary: Translation is the core process for a chloroplast large-subunit ribosomal protein.
    action: ACCEPT
    reason: Chloroplast ribosomal proteins directly support plastid translation.
    supported_by:
    - reference_id: file:POPTR/rpl2-A/rpl2-A-uniprot.txt
      supporting_text: 'AltName: Full=50S ribosomal protein L2, chloroplastic'
- term:
    id: GO:0009507
    label: chloroplast
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  review:
    summary: Chloroplast localization is directly supported.
    action: ACCEPT
    reason: UniProt annotates rpl2 as plastid/chloroplast localized.
    supported_by:
    - reference_id: file:POPTR/rpl2-A/rpl2-A-uniprot.txt
      supporting_text: 'SUBCELLULAR LOCATION: Plastid, chloroplast.'
- term:
    id: GO:0015934
    label: large ribosomal subunit
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: Large ribosomal subunit is the correct complex term.
    action: ACCEPT
    reason: The protein is a chloroplast 50S/large-subunit ribosomal protein.
    supported_by:
    - reference_id: file:POPTR/rpl2-A/rpl2-A-uniprot.txt
      supporting_text: 'RecName: Full=Large ribosomal subunit protein uL2cz/uL2cy'
- term:
    id: GO:0016740
    label: transferase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: Transferase activity is an over-annotation for this individual ribosomal protein.
    action: MARK_AS_OVER_ANNOTATED
    reason: The large ribosomal subunit/rRNA catalyzes peptide-bond formation; UniProt supports rpl2 as a structural/rRNA-binding
      ribosomal protein rather than an individual transferase enzyme.
    supported_by:
    - reference_id: file:POPTR/rpl2-A/rpl2-A-uniprot.txt
      supporting_text: 'RecName: Full=Large ribosomal subunit protein uL2cz/uL2cy'
- term:
    id: GO:0019843
    label: rRNA binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000104
  review:
    summary: rRNA binding is correct but can be made large-subunit-specific.
    action: MODIFY
    reason: Use the large ribosomal subunit rRNA binding term for a chloroplast 50S subunit protein.
    supported_by:
    - reference_id: file:POPTR/rpl2-A/rpl2-A-uniprot.txt
      supporting_text: DR   GO; GO:0019843; F:rRNA binding; IEA:UniProtKB-UniRule.
    - reference_id: file:POPTR/rpl2-A/rpl2-A-uniprot.txt
      supporting_text: 'SUBUNIT: Part of the 50S ribosomal subunit.'
    proposed_replacement_terms:
    - id: GO:0070180
      label: large ribosomal subunit rRNA binding
