id: A0A2K1YKA4
gene_symbol: XGOAT3
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:3694
  label: Populus trichocarpa
description: Golgi membrane xyloglucan O-acetyltransferase that acetylates fucosylated galactose residues on xyloglucan
  side chains.
existing_annotations:
- term:
    id: GO:0000139
    label: Golgi membrane
  evidence_type: IEA
  original_reference_id: GO_REF:0000044
  review:
    summary: Golgi membrane localization is correct for this type II membrane XGOAT enzyme.
    action: ACCEPT
    reason: UniProt places the enzyme in the Golgi apparatus membrane.
    supported_by:
    - &id004
      reference_id: file:POPTR/XGOAT3/XGOAT3-uniprot.txt
      supporting_text: 'SUBCELLULAR LOCATION: Golgi apparatus membrane; Single-pass type II membrane protein.'
- term:
    id: GO:0016413
    label: O-acetyltransferase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: O-acetyltransferase activity is supported for xyloglucan acetylation.
    action: ACCEPT
    reason: The paper and UniProt entry describe transfer of acetyl groups onto xyloglucan oligomers.
    supported_by: &id001
    - &id002
      reference_id: file:POPTR/XGOAT3/XGOAT3-uniprot.txt
      supporting_text: 'FUNCTION: Xyloglucan acetyltransferase that catalyzes the acetylation of fucosylated Gal
        residues on xyloglucan side chains.'
    - &id003
      reference_id: PMID:30083810
      supporting_text: PtrXGOATs are O-acetyltransferases acetylating fucosylated galactose residues on xyloglucan
      reference_section_type: ABSTRACT
- term:
    id: GO:0016740
    label: transferase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: Generic transferase activity is correct but too broad for an experimentally characterized O-acetyltransferase.
    action: MODIFY
    reason: Use O-acetyltransferase activity; no current GO term specifically names xyloglucan O-acetyltransferase
      activity.
    supported_by: *id001
    proposed_replacement_terms:
    - id: GO:0016413
      label: O-acetyltransferase activity
- term:
    id: GO:1990538
    label: xylan O-acetyltransferase activity
  evidence_type: IDA
  original_reference_id: PMID:30083810
  review:
    summary: The xylan O-acetyltransferase term does not match the cited substrate, which is xyloglucan.
    action: MODIFY
    reason: The experimental paper demonstrates xyloglucan side-chain acetylation, so the safer existing GO replacement
      is O-acetyltransferase activity.
    supported_by: *id001
    proposed_replacement_terms:
    - id: GO:0016413
      label: O-acetyltransferase activity
