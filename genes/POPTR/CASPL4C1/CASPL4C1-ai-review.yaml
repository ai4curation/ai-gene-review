- question: Does PtCASPL4C1 modulate cold tolerance and negatively regulate growth/biomass in poplar,
    as shown for its Arabidopsis ortholog AtCASPL4C1?
- question: Is PtCASPL4C1 cold-inducible and expressed in vascular tissue rather than the root
    endodermal Casparian strip?
