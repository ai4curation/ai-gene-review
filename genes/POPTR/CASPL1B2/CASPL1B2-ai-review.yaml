suggested_questions:
- question: Does PtCASPL1B2 interact with a poplar PIP2-type aquaporin and mark suberized endodermal
    cells, as shown for its Arabidopsis CASPL1B/1D orthologs?
- question: In which poplar tissues is PtCASPL1B2 expressed, and does it form a distinct plasma-membrane
    microdomain?
suggested_experiments:
- description: Test physical interaction between PtCASPL1B2 and poplar plasma-membrane intrinsic
    protein (PIP2) aquaporins (e.g. split-ubiquitin or BiFC) and determine whether the protein is
    expressed in suberized endodermis.
