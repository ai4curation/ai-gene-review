  label: Populus trichocarpa
description: CASP-like protein 1B2 (PtCASPL1B2) is a small tetraspan membrane protein
  belonging to the CASP-like (CASPL) subfamily, the more divergent relatives of the bona
  fide Casparian strip membrane domain proteins (CASP1-5). Like other family members it has
  a central MARVEL-like four-transmembrane domain and is predicted to reside in the plasma
  membrane as a multi-pass protein. CASP-like proteins are not enzymes; by analogy with the
  characterized CASP scaffolds they are thought to organize plasma-membrane microdomains, but
  the specific biological role and tissue context of CASPL1B2 remain uncharacterized. Notably, by orthology within the unified CASP/CASPL nomenclature, the Arabidopsis members of the CASPL1B/1D subfamilies (AtCASPL1B1, AtCASPL1B2, AtCASPL1D1, AtCASPL1D2) are expressed specifically in suberized endodermal cells and physically interact with the plasma-membrane aquaporin PIP2;1, implicating this subfamily in endodermal suberization and the modulation of aquaporin-mediated water transport rather than in Casparian strip formation itself. The protein
  is predicted to form homodimers and heterodimers.
