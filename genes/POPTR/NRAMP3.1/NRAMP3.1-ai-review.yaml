    label: intracellular iron ion homeostasis
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: The iron homeostasis annotation is supported by experimental evidence that this NRAMP3 paralog
      transports Fe and affects intracellular metal distribution.
    action: ACCEPT
    reason: Fe transport by this protein provides direct support for an intracellular iron homeostasis
      role.
    supported_by:
