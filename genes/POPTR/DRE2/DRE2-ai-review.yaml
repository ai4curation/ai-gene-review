taxon:
  id: NCBITaxon:3694
  label: Populus trichocarpa
description: >-
  Anamorsin/DRE2 homolog that is a component of the cytosolic iron-sulfur protein
  assembly (CIA) machinery required for the maturation of extramitochondrial Fe-S
  proteins. It functions in an early electron-transfer step of cytosolic Fe-S
  cluster biogenesis, accepting electrons from NADPH via a FAD/FMN-containing
  diflavin oxidoreductase and facilitating de novo assembly of a [4Fe-4S] cluster
  on the cytosolic Fe-S scaffold complex. The protein binds two Fe-S clusters
  (a [2Fe-2S] and a [4Fe-4S]) through its C-terminal domain, while its N-terminal
  SAM-methyltransferase-like domain is required for correct cluster assembly. It
  resides in the cytoplasm and, via twin Cx2C motifs recognized by the MIA40-ERV1
  relay, in the mitochondrial intermembrane space.
