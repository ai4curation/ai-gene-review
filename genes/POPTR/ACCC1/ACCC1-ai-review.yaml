  evidence_type: IEA
  original_reference_id: GO_REF:0000044
  review:
    summary: Chloroplast localization is directly supported; the nucleus-encoded precursor carries an
      N-terminal transit peptide and is imported into the plastid stroma where heteromeric ACCase functions.
    action: ACCEPT
    reason: UniProt places this biotin carboxylase in the chloroplast, and falcon deep research confirms
      that the heteromeric ACCase (with BC/BCCP/CT subunits) is primarily plastid-localized and that
      BC-type subunits are nucleus-encoded and chloroplast-imported.
