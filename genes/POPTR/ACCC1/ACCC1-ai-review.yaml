- term:
    id: GO:2001295
    label: malonyl-CoA biosynthetic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000041
  review:
    summary: Malonyl-CoA biosynthetic process is the direct pathway outcome of ACCase function and is the
      committed entry step of de novo plastid fatty-acid synthesis.
    action: ACCEPT
    reason: UniProt states that acetyl-CoA carboxylase forms malonyl-CoA through the carrier-protein carboxylation
      and transcarboxylase steps (malonyl-CoA biosynthesis, step 1/1), and falcon deep research frames this as
      the committed step of de novo fatty-acid synthesis, with the BC subunit contributing the
      biotin-carboxylation half-reaction that drives malonyl-CoA formation.
    supported_by:
