proposed_new_terms:
- proposed_name: xyloglucan O-acetyltransferase activity
  proposed_definition: Catalysis of the transfer of an acetyl group to xyloglucan, including acetylation of 
    galactosyl side-chain residues of fucosylated xyloglucan.
  justification: Populus XGOAT proteins experimentally acetylate fucosylated galactose residues on xyloglucan,
    but the existing GO xylan O-acetyltransferase term names the wrong polysaccharide substrate.
  proposed_parent: *id002
  supported_by:
  - *id003
  - *id004
suggested_questions:
- question: Should GO add a xyloglucan O-acetyltransferase activity term to avoid misusing xylan 
    O-acetyltransferase?
- question: Which xyloglucan side-chain acetylation sites are preferred by XGOAT1 in Populus cell walls?
suggested_experiments:
- description: Assay recombinant XGOAT1 against defined xyloglucan oligomers and xylan controls to confirm 
    substrate specificity.
  experiment_type: targeted functional assay
