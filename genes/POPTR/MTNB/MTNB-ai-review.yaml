gene_symbol: MTNB
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:3694
  label: Populus trichocarpa
description: Probable bifunctional methylthioribulose-1-phosphate dehydratase / enolase-phosphatase E1 acting in the
  cytoplasmic methionine salvage (Yang) cycle. The N-terminal class II aldolase domain catalyzes the dehydration of
  5-(methylsulfanyl)-D-ribulose 1-phosphate (MTRu-1-P) to 5-methylsulfanyl-2,3-dioxopentyl phosphate (EC 4.2.1.109), a
  zinc-dependent reaction, while the C-terminal HAD-like domain catalyzes the subsequent enolization and dephosphorylation
  to 1,2-dihydroxy-5-(methylsulfanyl)pent-1-en-3-one (acireductone) (EC 3.1.3.77), a magnesium-dependent reaction. These
  consecutive steps recycle 5'-methylthioadenosine, a byproduct of polyamine and ethylene biosynthesis, back toward
  L-methionine.
