suggested_questions:
- question: Does poplar MTNB function as a single bifunctional polypeptide catalyzing both the dehydratase and
    enolase-phosphatase steps in vivo, as predicted by its two-domain architecture?
suggested_experiments:
- description: Express poplar MTNB and assay both MTRu-1-P dehydratase (EC 4.2.1.109) and enolase-phosphatase E1
    (EC 3.1.3.77) activities, testing the Zn2+ and Mg2+ cofactor requirements.
  experiment_type: enzyme assay
