id: B9HCR2
gene_symbol: MRI1
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:3694
  label: Populus trichocarpa
description: Methylthioribose-1-phosphate isomerase that catalyzes the interconversion of S-methyl-5-thio-alpha-D-ribose
  1-phosphate (MTR-1-P) and 5-(methylsulfanyl)-D-ribulose 1-phosphate (MTRu-1-P), the first committed step of the
  methionine salvage (Yang) cycle. This pathway recycles 5'-methylthioadenosine, a byproduct of polyamine and ethylene
  biosynthesis, back to L-methionine, conserving sulfur and methylthio groups. The enzyme belongs to the eIF-2B
  alpha/beta/delta subunit family (MtnA subfamily) and acts in the cytoplasm.
