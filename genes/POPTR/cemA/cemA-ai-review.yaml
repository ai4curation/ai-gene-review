suggested_questions:
- question: How directly does Populus CemA control chloroplast stromal pH, inorganic carbon uptake, 
    and non-photochemical quenching under fluctuating light?
- question: When the GOA snapshot is regenerated, should the UniProt DR IBA annotations for
    potassium:proton antiporter activity (GO:0015386), potassium ion transmembrane transport
    (GO:0071805), proton transmembrane transport (GO:1902600), and regulation of intracellular pH
    (GO:0051453) be reviewed for CemA?
suggested_experiments:
- description: Measure chloroplast pH dynamics, K(+)/H(+) flux, non-photochemical quenching, and 
    photosynthetic carbon uptake in cemA perturbation or plastid-editing lines.
  experiment_type: targeted functional assay
