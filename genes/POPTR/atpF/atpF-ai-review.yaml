  label: Populus trichocarpa
description: Chloroplast ATP synthase subunit b, a thylakoid F0-sector peripheral-stalk component 
  that links F1 to F0 and contributes to rotary proton-coupled ATP synthesis.
existing_annotations:
- term:
    id: GO:0009535
    label: chloroplast thylakoid membrane
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  review:
    summary: Chloroplast thylakoid membrane is the correct localization for atpF.
    action: ACCEPT
    reason: UniProt places ATP synthase subunit b in the chloroplast thylakoid membrane.
    supported_by:
    - reference_id: file:POPTR/atpF/atpF-uniprot.txt
      supporting_text: 'SUBCELLULAR LOCATION: Plastid, chloroplast thylakoid membrane'
- term:
    id: GO:0015078
    label: proton transmembrane transporter activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: Proton transmembrane transporter activity is appropriate as a complex-level function to
      which atpF contributes.
    action: MODIFY
    reason: AtpF is a F0-channel/peripheral-stalk component of proton-transporting ATP synthase 
      rather than an independent proton transporter, so the source enables qualifier should be 
      changed to contributes_to.
    supported_by:
    - reference_id: file:POPTR/atpF/atpF-uniprot.txt
      supporting_text: F(1)F(0) ATP synthase produces ATP from ADP in the presence of a proton or 
        sodium gradient.
    - reference_id: file:POPTR/atpF/atpF-uniprot.txt
      supporting_text: Component of the F(0) channel, it forms part of the peripheral stalk, linking
        F(1) to F(0).
    proposed_replacement_terms:
    - id: GO:0015078
      label: proton transmembrane transporter activity
  qualifier: contributes_to
- term:
    id: GO:0015986
    label: proton motive force-driven ATP synthesis
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  review:
    summary: Proton motive force-driven ATP synthesis is the core process for chloroplast ATP 
      synthase.
    action: ACCEPT
    reason: UniProt describes F1F0 ATP synthase as producing ATP from ADP using a proton or sodium 
      gradient.
    supported_by:
    - reference_id: file:POPTR/atpF/atpF-uniprot.txt
      supporting_text: F(1)F(0) ATP synthase produces ATP from ADP in the presence of a proton or 
        sodium gradient.
- term:
    id: GO:0045259
    label: proton-transporting ATP synthase complex
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: atpF/subunit b is part of the proton-transporting ATP synthase complex.
    action: ACCEPT
    reason: UniProt identifies subunit b as one of the main F0 components linking F1 and F0.
    supported_by:
    - reference_id: file:POPTR/atpF/atpF-uniprot.txt
      supporting_text: Component of the F(0) channel, it forms part of the peripheral stalk, linking
        F(1) to F(0).
    - reference_id: file:POPTR/atpF/atpF-uniprot.txt
      supporting_text: "F(0) has four main subunits: a(1), b(1), b'(1) and c(10-14)."
