    - reference_id: file:POPTR/atpF/atpF-uniprot.txt
      supporting_text: Component of the F(0) channel, it forms part of the peripheral stalk, linking
        F(1) to F(0).
    proposed_replacement_terms:
    - id: GO:0046933
      label: proton-transporting ATP synthase activity, rotational mechanism
  qualifier: contributes_to
- term:
    id: GO:1902600
    label: proton transmembrane transport
  evidence_type: IEA
  original_reference_id: GO_REF:0000108
  review:
    summary: Proton transmembrane transport is an appropriate ATP synthase F0-associated process for
