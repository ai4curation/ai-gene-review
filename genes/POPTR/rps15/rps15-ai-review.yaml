id: A4GYX3
gene_symbol: rps15
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:3694
  label: Populus trichocarpa
description: Chloroplast small ribosomal subunit protein uS15c that supports plastid translation.
existing_annotations:
- term:
    id: GO:0003735
    label: structural constituent of ribosome
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: Structural constituent of ribosome is the core molecular function for rps15.
    action: ACCEPT
    reason: rps15 encodes a conserved chloroplast small-subunit ribosomal protein.
    supported_by:
    - reference_id: file:POPTR/rps15/rps15-uniprot.txt
      supporting_text: 'RecName: Full=Small ribosomal subunit protein uS15c'
- term:
    id: GO:0005737
    label: cytoplasm
  evidence_type: IEA
  original_reference_id: GO_REF:0000117
  review:
    summary: Cytoplasm is the wrong compartment for this plastid ribosomal protein.
    action: MODIFY
    reason: The reviewed UniProt entry places rps15 in the chloroplast.
    supported_by:
    - reference_id: file:POPTR/rps15/rps15-uniprot.txt
      supporting_text: 'SUBCELLULAR LOCATION: Plastid, chloroplast.'
    proposed_replacement_terms:
    - id: GO:0009507
      label: chloroplast
- term:
    id: GO:0005840
    label: ribosome
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: Ribosome is true but less specific than the small ribosomal subunit.
    action: KEEP_AS_NON_CORE
    reason: The protein is a chloroplast small-subunit ribosomal protein; the new small ribosomal subunit term is
      more informative.
    supported_by:
    - reference_id: file:POPTR/rps15/rps15-uniprot.txt
      supporting_text: 'RecName: Full=Small ribosomal subunit protein uS15c'
- term:
    id: GO:0006412
    label: translation
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  review:
    summary: Translation is the core biological process for rps15.
    action: ACCEPT
    reason: Chloroplast ribosomal proteins directly support plastid translation.
    supported_by:
    - reference_id: file:POPTR/rps15/rps15-uniprot.txt
      supporting_text: 'AltName: Full=30S ribosomal protein S15, chloroplastic'
- term:
    id: GO:0009507
    label: chloroplast
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  review:
    summary: Chloroplast localization is directly supported.
    action: ACCEPT
    reason: UniProt annotates rps15 as plastid/chloroplast localized.
    supported_by:
    - reference_id: file:POPTR/rps15/rps15-uniprot.txt
      supporting_text: 'SUBCELLULAR LOCATION: Plastid, chloroplast.'
- term:
    id: GO:0015935
    label: small ribosomal subunit
  evidence_type: IEA
  review:
    summary: Small ribosomal subunit is supported by the reviewed protein name but absent from the fetched GOA rows.
    action: NEW
    reason: UniProt identifies rps15 as a chloroplast 30S/small ribosomal subunit protein; this more specific complex
      term should accompany the generic ribosome annotation.
    supported_by:
    - reference_id: file:POPTR/rps15/rps15-uniprot.txt
      supporting_text: 'RecName: Full=Small ribosomal subunit protein uS15c'
    - reference_id: file:POPTR/rps15/rps15-uniprot.txt
      supporting_text: 'AltName: Full=30S ribosomal protein S15, chloroplastic'
