    summary: Regulation of transcription by RNA polymerase II fits the RBR transcriptional 
      coregulator role.
    action: ACCEPT
    reason: UniProt states that RBL901 recruits a histone deacetylase to control gene transcription.
    supported_by:
    - reference_id: file:POPTR/RBL901/RBL901-uniprot.txt
      supporting_text: Regulator of biological processes that recruits a histone deacetylase to 
        control gene transcription.
- term:
    id: GO:0032875
    label: regulation of DNA endoreduplication
  evidence_type: IEA
  original_reference_id: GO_REF:0000117
