taxon:
  id: NCBITaxon:3694
  label: Populus trichocarpa
description: Retinoblastoma-related protein, a nuclear chromatin-associated transcriptional 
  coregulator that recruits histone deacetylase activity and regulates cell-cycle progression.
existing_annotations:
- term:
    id: GO:0000785
    label: chromatin
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: Chromatin is an appropriate cellular context for a retinoblastoma-related 
      transcriptional regulator.
    action: ACCEPT
    reason: RBR proteins regulate transcription through chromatin-associated repressor complexes, 
      and the reviewed entry describes histone deacetylase recruitment.
    supported_by:
    - reference_id: file:POPTR/RBL901/RBL901-uniprot.txt
      supporting_text: Regulator of biological processes that recruits a histone deacetylase to 
        control gene transcription.
    - reference_id: file:POPTR/RBL901/RBL901-uniprot.txt
      supporting_text: Belongs to the retinoblastoma protein (RB) family.
- term:
    id: GO:0000977
    label: RNA polymerase II transcription regulatory region sequence-specific DNA binding
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: Sequence-specific RNA polymerase II regulatory-region DNA binding overstates the likely
      direct activity of RBL901.
    action: MODIFY
    reason: Retinoblastoma-related proteins are transcriptional coregulators that act through 
      associated transcription factors and chromatin regulators; use transcription coregulator 
      activity rather than direct sequence-specific DNA binding.
    supported_by:
    - reference_id: file:POPTR/RBL901/RBL901-uniprot.txt
      supporting_text: Regulator of biological processes that recruits a histone deacetylase to 
        control gene transcription.
    - reference_id: file:POPTR/RBL901/RBL901-uniprot.txt
      supporting_text: Belongs to the retinoblastoma protein (RB) family.
    proposed_replacement_terms:
    - id: GO:0003712
      label: transcription coregulator activity
- term:
    id: GO:2000134
    label: negative regulation of G1/S transition of mitotic cell cycle
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: Negative regulation of G1/S transition is consistent with retinoblastoma-related 
      cell-cycle control.
    action: ACCEPT
    reason: The reviewed entry describes a role in cell proliferation control and negative 
      regulation around mitotic entry.
    supported_by:
    - reference_id: file:POPTR/RBL901/RBL901-uniprot.txt
      supporting_text: May play a role in the entry into mitosis, negatively regulating the cell 
        proliferation.
    - reference_id: file:POPTR/RBL901/RBL901-uniprot.txt
      supporting_text: Belongs to the retinoblastoma protein (RB) family.
- term:
    id: GO:0005634
    label: nucleus
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  review:
    summary: Nuclear localization is correct for RBL901.
