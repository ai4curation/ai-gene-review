  label: Populus trichocarpa
description: Chloroplast acetyl-CoA carboxylase carboxyltransferase beta subunit that contributes to malonyl-CoA
  production for plastid fatty acid biosynthesis.
existing_annotations:
- term:
    id: GO:0006633
    label: fatty acid biosynthetic process
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: Fatty acid biosynthesis is the correct process context for plastid ACCase.
    action: ACCEPT
    reason: Malonyl-CoA produced by ACCase is the committed precursor for fatty acid synthesis.
    supported_by:
    - reference_id: file:POPTR/accD/accD-uniprot.txt
      supporting_text: 'PATHWAY: Lipid metabolism; malonyl-CoA biosynthesis; malonyl-CoA from acetyl-CoA: step 1/1.'
- term:
    id: GO:0003989
    label: acetyl-CoA carboxylase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: Acetyl-CoA carboxylase activity is correct as a complex-level function, but the source enables annotation
      should be represented with contributes_to for AccD.
    action: MODIFY
    reason: AccD is the plastid-coded beta carboxyltransferase subunit of the ACCase complex rather than the entire
      enzyme alone; the qualifier change is the modification.
    supported_by:
    - reference_id: file:POPTR/accD/accD-uniprot.txt
      supporting_text: 'FUNCTION: Component of the acetyl coenzyme A carboxylase (ACC) complex.'
    proposed_replacement_terms:
    - id: GO:0003989
      label: acetyl-CoA carboxylase activity
  qualifier: contributes_to
