  evidence_type: IEA
  original_reference_id: GO_REF:0000117
  review:
    summary: Cytoplasm is too broad and misleading for this plastid-encoded ribosomal protein.
    action: MODIFY
    reason: Use the chloroplast location supported by UniProt.
    supported_by:
    - reference_id: file:POPTR/rpl33/rpl33-uniprot.txt
      supporting_text: 'SUBCELLULAR LOCATION: Plastid, chloroplast.'
