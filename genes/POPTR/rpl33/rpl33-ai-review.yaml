    summary: Chloroplast localization is correct for rpl33.
    action: ACCEPT
    reason: UniProt places rpl33 in the chloroplast.
    supported_by:
    - reference_id: file:POPTR/rpl33/rpl33-uniprot.txt
      supporting_text: 'SUBCELLULAR LOCATION: Plastid, chloroplast.'
