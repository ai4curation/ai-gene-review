- term:
    id: GO:0005840
    label: ribosome
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: Ribosome is correct but less specific than large ribosomal subunit.
    action: KEEP_AS_NON_CORE
    reason: Retain the generic ribosome annotation as non-core because GO:0015934 is more precise 
      for a 50S/large-subunit protein.
    supported_by:
    - reference_id: file:POPTR/rpl33/rpl33-uniprot.txt
      supporting_text: 'RecName: Full=Large ribosomal subunit protein bL33c'
    - reference_id: file:POPTR/rpl33/rpl33-uniprot.txt
      supporting_text: 'AltName: Full=50S ribosomal protein L33, chloroplastic'
- term:
    id: GO:0006412
    label: translation
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  review:
    summary: Translation is the correct biological process for a chloroplast ribosomal protein.
    action: ACCEPT
    reason: rpl33 is a chloroplast 50S/large-subunit ribosomal protein and supports plastid 
      translation.
    supported_by:
    - reference_id: file:POPTR/rpl33/rpl33-uniprot.txt
      supporting_text: 'RecName: Full=Large ribosomal subunit protein bL33c'
    - reference_id: file:POPTR/rpl33/rpl33-uniprot.txt
      supporting_text: 'AltName: Full=50S ribosomal protein L33, chloroplastic'
    - reference_id: file:POPTR/rpl33/rpl33-uniprot.txt
      supporting_text: 'SUBCELLULAR LOCATION: Plastid, chloroplast.'
