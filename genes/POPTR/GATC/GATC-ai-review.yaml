- term:
    id: GO:0032543
    label: mitochondrial translation
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: Mitochondrial translation is a valid organellar process consequence of Gln-tRNA(Gln) formation but
      is not the most direct function.
    action: KEEP_AS_NON_CORE
    reason: The direct function is tRNA-dependent glutamine formation by transamidation; translation is downstream.
    supported_by: &id001
