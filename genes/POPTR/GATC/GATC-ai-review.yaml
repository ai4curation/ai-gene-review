suggested_questions:
- question: Is Populus GatC dual-targeting to chloroplasts and mitochondria experimentally confirmed by proteomics
    or fluorescent tagging?
- question: Does GatC abundance limit organellar translational fidelity under stress?
suggested_experiments:
- description: Tag endogenous GatC and test co-localization with chloroplast and mitochondrial markers while measuring
    organellar tRNA charging.
  experiment_type: targeted functional assay
