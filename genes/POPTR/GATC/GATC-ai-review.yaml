  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: contributes_to
  review:
    summary: Glutaminyl-tRNA synthase (glutamine-hydrolyzing) activity is the correct molecular function for GatCAB
      with GatC as a subunit.
    action: ACCEPT
    reason: The reaction converts Glu-tRNA(Gln), glutamine, and ATP to Gln-tRNA(Gln); the contributes_to qualifier is
      appropriate because GatC is the accessory subunit and the catalysis is performed by the assembled GatCAB complex.
    supported_by:
