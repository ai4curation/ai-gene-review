- term:
    id: GO:0016884
    label: carbon-nitrogen ligase activity, with glutamine as amido-N-donor
  evidence_type: IEA
  original_reference_id: GO_REF:0000104
  review:
    summary: Carbon-nitrogen ligase activity with glutamine as amido-N-donor is correct but less specific than the
      GatCAB reaction term.
    action: MODIFY
    reason: This generic parent term should be replaced by the specific GatCAB reaction term, glutaminyl-tRNA synthase
      (glutamine-hydrolyzing) activity, which is the precise activity of the complex (and is separately annotated for
      this entry).
    supported_by:
