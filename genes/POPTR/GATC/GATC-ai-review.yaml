id: B9INH0
gene_symbol: GATC
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:3694
  label: Populus trichocarpa
description: Organellar GatC subunit of the GatCAB amidotransferase complex that forms correctly charged Gln-tRNA(Gln)
  by transamidation in chloroplasts and mitochondria.
existing_annotations:
- term:
    id: GO:0005739
    label: mitochondrion
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: mitochondrion localization is supported for organellar GatC.
    action: ACCEPT
    reason: UniProt places GatC in both mitochondrion and chloroplast, and comparative plant evidence shows that plant
      GatCAB subunits (including GatC) are dual-targeted to both organelles by in vitro import assays in Arabidopsis.
    supported_by:
    - reference_id: file:POPTR/GATC/GATC-uniprot.txt
      supporting_text: 'SUBCELLULAR LOCATION: Mitochondrion'
    - reference_id: file:POPTR/GATC/GATC-deep-research-falcon.md
      supporting_text: GatA, GatB, and GatC** are imported into **both mitochondria and chloroplasts** and processed
        to mature, protease-protected forms
- term:
    id: GO:0030956
    label: glutamyl-tRNA(Gln) amidotransferase complex
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: GatC is part of the glutamyl-tRNA(Gln) amidotransferase complex.
    action: ACCEPT
    reason: The protein is a subunit of the heterotrimeric GatCAB amidotransferase complex; in the conserved and plant
      enzymes GatC is the small accessory/structural subunit that stabilizes the GatA/GatB catalytic core.
    supported_by:
    - reference_id: file:POPTR/GATC/GATC-uniprot.txt
      supporting_text: Subunit of the heterotrimeric GatCAB amidotransferase (AdT) complex, composed of A, B and
        C subunits.
    - reference_id: file:POPTR/GATC/GATC-deep-research-falcon.md
      supporting_text: GatC as a **structural/linker** element that interacts with GatA and GatB via its termini
- term:
    id: GO:0032543
    label: mitochondrial translation
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: Mitochondrial translation is a valid organellar process consequence of Gln-tRNA(Gln) formation but
      is not the most direct function.
    action: KEEP_AS_NON_CORE
    reason: The direct function is tRNA-dependent glutamine formation by transamidation; supplying correctly charged
      Gln-tRNA(Gln) to organellar ribosomes (mitochondrial translation) is the downstream consequence.
    supported_by:
    - reference_id: file:POPTR/GATC/GATC-uniprot.txt
      supporting_text: Allows the formation of correctly charged Gln-tRNA(Gln) through the transamidation of misacylated
        Glu-tRNA(Gln) in chloroplasts and mitochondria.
    - reference_id: file:POPTR/GATC/GATC-deep-research-falcon.md
      supporting_text: GatCAB sits in the **organellar translation supply chain**, upstream of ribosomal protein synthesis
- term:
    id: GO:0070681
    label: glutaminyl-tRNAGln biosynthesis via transamidation
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: Glutaminyl-tRNAGln biosynthesis via transamidation is the direct biological process for GatC.
    action: ACCEPT
    reason: UniProt describes transamidation of misacylated Glu-tRNA(Gln) to correctly charged Gln-tRNA(Gln); in plant
      organelles this indirect (transamidation) route is the established mechanism for producing Gln-tRNA(Gln).
    supported_by:
    - reference_id: file:POPTR/GATC/GATC-uniprot.txt
      supporting_text: Allows the formation of correctly charged Gln-tRNA(Gln) through the transamidation of misacylated
        Glu-tRNA(Gln) in chloroplasts and mitochondria.
    - reference_id: file:POPTR/GATC/GATC-deep-research-falcon.md
      supporting_text: It ensures availability of correctly charged **Gln‑tRNA\*Gln\*** in organelles that may not have
        an organellar GlnRS, by correcting ND‑GluRS misacylation via transamidation
