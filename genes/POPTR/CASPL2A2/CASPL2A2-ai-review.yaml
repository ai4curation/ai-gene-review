taxon:
  id: NCBITaxon:3694
  label: Populus trichocarpa
description: CASP-like protein 2A2 (PtCASPL2A2) is a small tetraspan membrane protein belonging to the
  CASP-like (CASPL) subfamily, the more divergent relatives of the bona fide Casparian strip membrane
  domain proteins (CASP1-5). Like other family members it has a central MARVEL-like four-transmembrane
  domain and is predicted to reside in the plasma membrane as a multi-pass protein. CASP-like proteins
  are not enzymes; by analogy with the characterized CASP scaffolds they are thought to organize plasma-membrane
  microdomains, but the specific biological role and tissue context of CASPL2A2 remain uncharacterized.
  The protein is predicted to form homodimers and heterodimers. In poplar, PtCASPL2A2 is leaf-enriched
  (~24 TPM) at baseline (EBI Expression Atlas E-GEOD-81077).
