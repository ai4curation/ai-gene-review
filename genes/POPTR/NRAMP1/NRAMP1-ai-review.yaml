id: B9N9Y7
gene_symbol: NRAMP1
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:3694
  label: Populus trichocarpa
description: >-
  NRAMP-family (TC 2.A.55) integral membrane transporter predicted to function as a
  divalent metal transporter. It is a multi-pass membrane protein with twelve predicted
  transmembrane helices and N-linked glycosylation sites, structurally typical of the
  NRAMP/SLC11 family of proton-coupled divalent cation (Mn, Fe, and related metals)
  symporters. Beyond its assignment to the NRAMP family and a predicted role in divalent
  metal transport, the specific substrate selectivity and in-planta physiological role of
  this poplar paralog have not been experimentally characterized and are inferred from
  family membership and orthology.
existing_annotations:
- term:
    id: GO:0006879
    label: intracellular iron ion homeostasis
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: involved_in
  review:
    summary: Intracellular iron ion homeostasis is inferred from NRAMP family membership;
      the poplar NRAMP1 substrate and in-planta iron role have not been experimentally
      demonstrated.
    action: MARK_AS_OVER_ANNOTATED
    reason: UniProt only states a probable divalent metal transporter with no functional
      characterization of substrate or homeostatic role; the specific intracellular iron
      homeostasis claim overstates the available evidence for this paralog.
    supported_by:
    - reference_id: file:POPTR/NRAMP1/NRAMP1-uniprot.txt
      supporting_text: 'FUNCTION: Probable divalent metal transporter.'
    - reference_id: file:POPTR/NRAMP1/NRAMP1-uniprot.txt
      supporting_text: 'SIMILARITY: Belongs to the NRAMP (TC 2.A.55) family.'
- term:
    id: GO:0030026
    label: intracellular manganese ion homeostasis
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: involved_in
  review:
    summary: Intracellular manganese ion homeostasis is plausible for an NRAMP transporter
      but is inferred from family membership rather than poplar NRAMP1 functional data.
    action: KEEP_AS_NON_CORE
    reason: Manganese is a canonical NRAMP substrate, making this a reasonable phylogenetic
      inference, but no experimental characterization of poplar NRAMP1 supports it as a
      demonstrated core function.
    supported_by:
    - reference_id: file:POPTR/NRAMP1/NRAMP1-uniprot.txt
      supporting_text: 'FUNCTION: Probable divalent metal transporter.'
    - reference_id: file:POPTR/NRAMP1/NRAMP1-uniprot.txt
      supporting_text: 'SIMILARITY: Belongs to the NRAMP (TC 2.A.55) family.'
