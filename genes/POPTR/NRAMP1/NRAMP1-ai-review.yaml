suggested_questions:
- question: What is the specific divalent metal substrate (Mn, Fe, Cd, or other) and subcellular
    membrane localization of poplar NRAMP1, and what is its physiological role in metal
    homeostasis or stress tolerance?
suggested_experiments:
- description: Test poplar NRAMP1 for metal transport by heterologous expression in yeast metal
    uptake mutants (e.g. smf1, fet3fet4) across a panel of divalent cations, and determine its
    membrane localization with a fluorescent fusion in poplar cells.
  experiment_type: heterologous transport assay and subcellular localization
