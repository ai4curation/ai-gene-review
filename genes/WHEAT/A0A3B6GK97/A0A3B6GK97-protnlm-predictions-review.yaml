id: A0A3B6GK97
gene_symbol: A0A3B6GK97
taxon:
  id: NCBITaxon:4565
  label: Triticum aestivum
status: COMPLETE
description: >-
  ProtNLM2 predicted 2 GO terms for this PNPLA/patatin domain-containing protein
  from bread wheat. The protein belongs to the pPLAII subfamily of plant
  patatin-related phospholipase A (soluble lipid-acyl-hydrolase / defense-stress
  clade). GO_Central IBA annotations already assign monoacylglycerol lipase
  activity (GO:0047372) and glycerophospholipase activity (GO:0004620), while
  GOA carries the general lipid metabolic process (GO:0006629). The ProtNLM2
  lipase activity prediction (GO:0016298) is correct but less specific than the
  existing IBA monoacylglycerol lipase annotation. The lipid catabolic process
  prediction (GO:0016042) is a plausible narrowing of the existing lipid metabolic
  process annotation, but the reviewed evidence indicates the patatin family acts
  in remodeling and signaling as well as degradation, so the more general term is
  deliberately preferred. Note that the deposited 302-aa sequence model lacks the
  catalytic-serine nucleophile elbow (G-T-S-T-G), so all functional assignments
  are family/subfamily-level inferences rather than confirmed for this specific
  protein.
  Assessment: 1 less precise (LSP), 1 correct but not novel (CNN),
  0 uncertain (UNC), 0 incorrect (NPI/PLI).
source_documents:
  - genes/WHEAT/A0A3B6GK97/A0A3B6GK97-uniprot.txt
  - genes/WHEAT/A0A3B6GK97/A0A3B6GK97-goa.tsv
predictions:
  - source_method: ProtNLM2
    source_version: UniProt 2024_06 pilot
    predicted_term:
      id: GO:0016298
      label: lipase activity
    predicted_term_type: GO_MF
    review:
      assessment: LSP
      confidence_score: 2
      summary: >-
        ProtNLM2 predicted GO:0016298 (lipase activity) for this patatin/PNPLA
        domain-containing protein. The prediction is biologically sound: the
        patatin family comprises non-specific lipid acyl hydrolases that cleave
        acyl-ester bonds of glycerolipids using a Ser-Asp catalytic dyad
        (PMID:12779324), and lipase activity is a correct descriptor at the family
        level. However, this protein already carries more specific IBA
        (phylogenetic) annotations from GO_Central: GO:0047372 monoacylglycerol
        lipase activity and GO:0004620 glycerophospholipase activity
        (GO_REF:0000033). These were assigned by manual phylogenetic inference and
        provide substrate-resolved specificity that the ProtNLM2 prediction lacks.
        Additionally, the ai-review proposed GO:0052689 (carboxylic ester hydrolase
        activity) as an informative unifying parent. Therefore, while correct,
        GO:0016298 is less precise than the existing GO:0047372 and adds no
        information beyond what is already captured.
      supported_by:
        - reference_id: PMID:12779324
          supporting_text: Patatin is a nonspecific lipid acyl hydrolase
        - reference_id: GO_REF:0000033
          supporting_text: Annotation inferences using phylogenetic trees
  - source_method: ProtNLM2
    source_version: UniProt 2024_06 pilot
    predicted_term:
      id: GO:0016042
      label: lipid catabolic process
    predicted_term_type: GO_BP
    review:
      assessment: CNN
      confidence_score: 2
      summary: >-
        ProtNLM2 predicted GO:0016042 (lipid catabolic process), which is a
        child of the existing GOA annotation GO:0006629 (lipid metabolic process,
        IEA via InterPro2GO from the PNPLA domain IPR002641). While the patatin
        family does participate in lipid catabolism (e.g., lipid mobilization
        during seed germination and storage-oil breakdown), the ai-review
        deliberately retained the broader GO:0006629 rather than sharpening to
        lipid catabolic process, because patatin-family acyl hydrolases also act
        in membrane phospholipid remodeling and lipid-based defense signaling -
        roles that are not purely catabolic. The deep-research report supports
        diverse patatin functions including membrane phospholipid turnover and
        remodeling of lipid-droplet surfaces. Furthermore, the pPLAII subfamily
        placement (from bioinformatics analysis) associates this protein with the
        defense/stress response clade rather than a dedicated degradative role.
        The prediction is therefore correct in that lipid catabolism is one
        component of patatin function, but it is not novel relative to the
        existing broader annotation and arguably narrows the functional scope
        beyond what is justified by available evidence for this uncharacterized
        protein.
      supported_by:
        - reference_id: GO_REF:0000002
          supporting_text: GO:0006629 lipid metabolic process; IEA; WITH InterPro:IPR002641
            (PNPLA domain)
        - reference_id: file:WHEAT/A0A3B6GK97/A0A3B6GK97-deep-research-falcon.md
          supporting_text: The best-supported plant functions are lipid mobilization during
            seed germination, initiation of storage-oil breakdown, membrane phospholipid
            turnover, and remodeling of LD surfaces to allow access of TAG lipases
        - reference_id: file:WHEAT/A0A3B6GK97/A0A3B6GK97-bioinformatics/RESULTS.md
          supporting_text: A0A3B6GK97 belongs to the pPLAII subfamily
