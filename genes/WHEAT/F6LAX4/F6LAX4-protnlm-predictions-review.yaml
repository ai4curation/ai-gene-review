id: F6LAX4
gene_symbol: F6LAX4
taxon:
  id: NCBITaxon:4565
  label: Triticum aestivum
status: COMPLETE
description: >-
  ProtNLM2 predicted 6 GO terms for the Triticum aestivum (bread wheat) PP2A
  structural/scaffolding A subunit F6LAX4. All 6 predictions are assessed as
  incorrect. Two predictions (GO:0043025 neuronal cell body, GO:0043005 neuron
  projection) assign animal-specific neuronal cellular compartments to a plant
  protein that entirely lacks a nervous system, representing clear
  PATHWAY_CONTEXT_IGNORED errors. Two predictions (GO:0007059 chromosome
  segregation, GO:0000775 chromosome centromeric region) reflect the fact that
  animal PP2A orthologs participate in kinetochore-centromere function and
  sister chromatid cohesion, but this role is lineage-specific and not
  established for the plant A-subunit scaffold; these are frequency-biased
  cross-kingdom mis-transfers. One prediction (GO:0046982 protein
  heterodimerization activity) is a generic protein-interaction term that is
  less informative than the existing GO:0019888 (protein phosphatase regulator
  activity) and mischaracterizes the A subunit as a generic heterodimerizer
  rather than a phosphatase regulatory scaffold; it represents frequency bias
  toward a common MF label. One prediction (GO:1990405 protein antigen
  binding) is an immune-system-specific molecular function with no relevance
  to a plant PP2A scaffold, another cross-kingdom PATHWAY_CONTEXT_IGNORED
  error. Assessment: 0 correct, 0 uncertain, 6 incorrect (4 NPI, 2 REP).
  Total CS = 0/12.
source_documents:
  - genes/WHEAT/F6LAX4/F6LAX4-uniprot.txt
  - genes/WHEAT/F6LAX4/F6LAX4-goa.tsv
  - genes/WHEAT/F6LAX4/F6LAX4-ai-review.yaml
predictions:
  - source_method: ProtNLM2
    source_version: UniProt 2024_06 pilot
    predicted_term:
      id: GO:0046982
      label: protein heterodimerization activity
    predicted_term_type: GO_MF
    review:
      assessment: NPI
      confidence_score: 0
      summary: >-
        GO:0046982 (protein heterodimerization activity) is a generic
        protein-protein interaction term that technically applies to any protein
        forming a heterodimer. While the PP2A A subunit does form an A-C
        heterodimer with the catalytic C subunit, this term is uninformative and
        misleading: the A subunit's molecular function is not generic
        heterodimerization but rather a highly specific scaffolding/regulatory
        role captured by GO:0019888 (protein phosphatase regulator activity),
        which is already annotated with IBA evidence. The A subunit's HEAT-repeat
        solenoid architecture provides a platform for both the catalytic C subunit
        and a regulatory B subunit, forming a heterotrimer rather than a simple
        heterodimer. Annotating this protein with GO:0046982 would obscure its
        specific phosphatase-regulatory scaffold function and replace it with a
        term that applies to thousands of unrelated proteins. This prediction
        likely reflects frequency bias, as protein heterodimerization activity is
        among the most commonly assigned MF terms in GO training data and is
        frequently predicted for any protein with protein-protein interaction
        domains such as HEAT repeats. An independent OpenScientist investigation (see file
        reference) confirms all six disputed animal-context predictions on F6LAX4 (this term
        plus GO:0043005, GO:0043025, GO:1990405, GO:0000775, GO:0007059): it identifies F6LAX4
        as the wheat PP2A A/PR65 scaffold subunit (85-90% identity to the Arabidopsis PP2A A
        subunits; local fold RMSD ~0.29 Angstrom), rules the neuronal and antigen terms
        taxon-inappropriate for a plant (no neurons, no adaptive immune system), and finds the
        centromere/segregation terms are a Shugoshin-PP2A function mediated by the B56
        regulatory subunit -- not by the A scaffold intrinsically -- so not assertable on this
        subunit. All six NPI calls upheld.
      error_type: FREQUENCY_BIAS
      supported_by:
        - reference_id: file:WHEAT/F6LAX4/F6LAX4-hypotheses/prediction-animal-specific-terms/openscientist.md
          supporting_text: not by the A scaffold intrinsically
        - reference_id: file:WHEAT/F6LAX4/F6LAX4-hypotheses/prediction-animal-specific-terms/openscientist.md
          supporting_text: They must not be asserted on a wheat protein
  - source_method: ProtNLM2
    source_version: UniProt 2024_06 pilot
    predicted_term:
      id: GO:0043025
      label: neuronal cell body
    predicted_term_type: GO_CC
    review:
      assessment: NPI
      confidence_score: 0
      summary: >-
        GO:0043025 (neuronal cell body) is an animal-specific cellular component
        term that refers to the soma of a neuron. Triticum aestivum is a
        monocotyledonous plant (Poaceae) that entirely lacks neurons, a nervous
        system, and any neuronal cell types. This prediction is biologically
        impossible for a plant protein. The error likely arises because mammalian
        PP2A orthologs (PPP2R1A/PPP2R1B) are abundantly expressed in neurons and
        are annotated to neuronal compartments in human and mouse GOA; ProtNLM2
        appears to have transferred these animal-specific localization annotations
        across kingdoms without regard to the organism's biology. The PP2A A
        subunit in wheat functions in cytoplasm and nucleus (as annotated via IBA
        and ARBA), consistent with its role in plant hormone signaling (auxin
        transport, brassinosteroid signaling) rather than any neural function.
      error_type: PATHWAY_CONTEXT_IGNORED
  - source_method: ProtNLM2
    source_version: UniProt 2024_06 pilot
    predicted_term:
      id: GO:0007059
      label: chromosome segregation
    predicted_term_type: GO_BP
    review:
      assessment: NPI
      confidence_score: 0
      summary: >-
        GO:0007059 (chromosome segregation) is predicted based on the known role
        of animal PP2A holoenzymes at kinetochores and centromeres during mitosis,
        where PP2A-B56 complexes dephosphorylate cohesin protectors (e.g.,
        shugoshin-bound substrates) to regulate sister chromatid cohesion and
        chromosome segregation. However, this role is mediated by specific B56
        regulatory subunits that recruit PP2A to centromeric substrates -- the A
        subunit itself is the generic scaffold present in all PP2A holoenzymes
        regardless of substrate. More critically, while PP2A catalytic activity
        is conserved in plants, the specific centromeric/kinetochore PP2A-B56
        chromosome segregation pathway characterized in animal cells has not been
        demonstrated for plant PP2A A subunits. The existing reviewed annotations
        for F6LAX4 deliberately exclude chromosome segregation terms: the
        AI review notes that GO_Central correctly did NOT propagate the
        lineage-specific GO:0051225 (spindle assembly) and GO:0051754 (meiotic
        sister chromatid cohesion) annotations from human PPP2R1A to this plant
        ortholog. This prediction represents frequency-biased cross-kingdom
        transfer of an animal-specific PP2A role.
      error_type: FREQUENCY_BIAS
  - source_method: ProtNLM2
    source_version: UniProt 2024_06 pilot
    predicted_term:
      id: GO:0043005
      label: neuron projection
    predicted_term_type: GO_CC
    review:
      assessment: NPI
      confidence_score: 0
      summary: >-
        GO:0043005 (neuron projection) refers to neurites (axons, dendrites) of
        neuronal cells. Like GO:0043025 (neuronal cell body), this is an
        animal-specific cellular component that is biologically impossible for a
        plant protein. Triticum aestivum has no neurons or neuron projections.
        The prediction stems from the same cross-kingdom mis-transfer as
        GO:0043025: mammalian PP2A is localized to neuronal projections where it
        regulates synaptic signaling and cytoskeletal dynamics, but these
        annotations are entirely irrelevant to a wheat scaffolding subunit. The
        wheat PP2A A subunit localizes to cytoplasm and nucleus, where it
        assembles PP2A holoenzymes for plant-specific signaling pathways
        (auxin, brassinosteroid, stress responses).
      error_type: PATHWAY_CONTEXT_IGNORED
  - source_method: ProtNLM2
    source_version: UniProt 2024_06 pilot
    predicted_term:
      id: GO:0000775
      label: "chromosome, centromeric region"
    predicted_term_type: GO_CC
    review:
      assessment: NPI
      confidence_score: 0
      summary: >-
        GO:0000775 (chromosome, centromeric region) is predicted based on the
        well-characterized role of animal PP2A-B56 holoenzymes at centromeres,
        where they dephosphorylate cohesin protectors (shugoshin/Sgo1) to maintain
        sister chromatid cohesion until anaphase onset. In animal cells, the PP2A
        A subunit is recruited to centromeres as part of these specific
        holoenzymes. However, centromeric localization of PP2A in plants is not
        established. The A subunit is a generic scaffold present in all PP2A
        complexes, and its localization is determined by the B regulatory subunit
        it assembles with. No evidence places the wheat A subunit specifically at
        centromeres; its characterized plant roles center on cytoplasmic/nuclear
        signaling (hormone transport, stress responses). This prediction
        represents frequency-biased transfer from animal PP2A annotations where
        centromeric localization is well-documented but lineage-specific.
      error_type: FREQUENCY_BIAS
  - source_method: ProtNLM2
    source_version: UniProt 2024_06 pilot
    predicted_term:
      id: GO:1990405
      label: protein antigen binding
    predicted_term_type: GO_MF
    review:
      assessment: NPI
      confidence_score: 0
      summary: >-
        GO:1990405 (protein antigen binding) is an immune-system-specific
        molecular function term describing the binding of protein antigens by
        antibodies, T-cell receptors, or antigen-presenting molecules (MHC).
        Plants lack an adaptive immune system, do not produce antibodies or
        T-cell receptors, and have no MHC-based antigen presentation machinery.
        The PP2A A subunit is a HEAT-repeat scaffolding protein with no
        structural or functional relationship to antigen-binding proteins. This
        prediction is biologically nonsensical for any plant protein, let alone
        a PP2A scaffold. The HEAT-repeat solenoid domain found in the PP2A A
        subunit mediates specific protein-protein interactions within the PP2A
        holoenzyme (binding the C and B subunits), not antigen recognition. This
        represents a severe cross-kingdom pathway context error, likely arising
        from spurious sequence or term co-occurrence patterns in ProtNLM2
        training data.
      error_type: PATHWAY_CONTEXT_IGNORED
