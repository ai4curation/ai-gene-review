description: >-
  ProtNLM2 predicted 1 GO term for A0A3B6NKR6 (GHMP kinase N-terminal
  domain-containing protein). The prediction of GO:0016310 (phosphorylation) is
  technically correct at a high level -- the protein is a predicted glucuronokinase
  (EC 2.7.1.43) that catalyzes ATP-dependent phosphorylation of D-glucuronic acid --
  but is far too imprecise to be informative. The more specific biological process
  is UDP-glucuronate biosynthesis (GO:0006065), and the defining molecular function
  is glucuronokinase activity (GO:0047940). Assessment: 0 correct novel (COR),
  1 less precise (LSP), 0 incorrect.
