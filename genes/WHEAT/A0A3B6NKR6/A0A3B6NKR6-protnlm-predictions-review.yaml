      summary: >-
        GO:0016310 (phosphorylation) is a correct but uninformative prediction for
        this protein. A0A3B6NKR6 contains GHMP kinase N-terminal (IPR006204) and
        C-terminal (IPR013750) domains together with a glucuronokinase-like domain
        (IPR053034), and its closest characterized ortholog is Arabidopsis GLAK2
        (Q9LY82, EC 2.7.1.43). Glucuronokinases catalyze the ATP-dependent
        phosphorylation of D-glucuronic acid to D-glucuronate-1-phosphate, so
        phosphorylation is technically correct at the broadest level. However, the
        prediction is far too generic: GO:0016310 is a high-level biological process
        term that encompasses all kinase reactions and fails to capture the specific
        pathway context. The informative annotation would be involvement in
        UDP-glucuronate biosynthetic process (GO:0006065) via the myo-inositol
        oxidation pathway, with glucuronokinase activity (GO:0047940) as the
        molecular function. Additionally, GO:0016310 does not overlap with the
        existing GOA annotations, which include ATP binding (IEA) and cytosol
        localization (IBA), though it is semantically consistent with the kinase
        function implied by the ATP binding annotation. Scored as LSP because the
        prediction is correct at a coarse granularity but does not add biological
        insight beyond what is already implied by the GHMP kinase domain assignment.
