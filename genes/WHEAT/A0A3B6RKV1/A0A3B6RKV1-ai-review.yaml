- id: file:WHEAT/A0A3B6RKV1/A0A3B6RKV1-deep-research-falcon.md
  title: Deep research report for A0A3B6RKV1 (LOC123148885) in Triticum aestivum
  findings:
  - statement: >-
      LOC123148885 belongs to the KDM5/JARID1 subfamily of JmjC domain-containing histone
      demethylases, which specifically catalyze the removal of methyl groups from histone
      H3 lysine 4 marks (H3K4me1/2/3) via Fe(II)- and 2-oxoglutarate-dependent oxidative
      demethylation.
  - statement: >-
      Wang et al. (2022) identified 24 JmjC genes in wheat, of which 9 belong to the
      KDM5/JARID subfamily, and 18 of 24 are predicted to localize to the nucleus. Wheat
      JmjC genes show dynamic expression under drought stress.
  - statement: >-
      The protein contains both a JmjC histone demethylase domain and an F-box domain,
      suggesting potential dual functionality in epigenetic regulation and SCF-mediated
      protein degradation.
