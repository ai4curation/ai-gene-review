predictions:
  - source_method: ProtNLM2
    source_version: UniProt 2024_06 pilot
    predicted_term:
      id: GO:0010099
      label: regulation of photomorphogenesis
    predicted_term_type: GO_BP
    review:
      assessment: NPI
      confidence_score: 0
      summary: >-
        The closest characterized ortholog in Arabidopsis (AT5G06550, JMJ22/PKDM7D)
        participates in photomorphogenesis through histone demethylation at target
        gene loci, making this prediction biologically plausible at the ortholog
        level. However, no experimental evidence exists for photomorphogenesis
        regulation by any wheat JmjC family member. Photomorphogenesis regulatory
        networks differ between monocots and dicots, and wheat KDM5/JARID1 members
        show dynamic expression under drought stress rather than light-responsive
        regulation in published studies (Wang et al. 2022). The protein has PE
        level 3 (inferred from homology) with no direct functional characterization.
        This prediction likely reflects training data from the well-characterized
        Arabidopsis JMJ22 ortholog rather than wheat-specific evidence. An independent
        OpenScientist investigation (see file reference) confirms A0A3B6RKV1 is a
        catalytically competent JMJ22 co-ortholog (a JMJD6-type histone arginine
        demethylase -- correcting the KDM5/JARID lysine-demethylase framing above --
        with an intact JmjC Fe(II)/2-oxoglutarate active site), but concludes the four
        Arabidopsis-specific developmental BP terms are IMP-derived redundant-pair
        (JMJ20/JMJ22) seed-biology phenotypes not transferable to wheat by orthology
        alone. Downgraded from UNC to NPI; retain only the histone-demethylase molecular
        function at ISS/IBA strength.
      supported_by:
        - reference_id: file:WHEAT/A0A3B6RKV1/A0A3B6RKV1-hypotheses/prediction-jmj22-developmental-roles/openscientist.md
          supporting_text: >-
            Projecting photomorphogenesis / red-light / GA-signaling / seed-germination BP
            terms onto the wheat protein by ProtNLM orthology alone is unwarranted
  - source_method: ProtNLM2
    source_version: UniProt 2024_06 pilot
    predicted_term:
      id: GO:0010476
      label: gibberellin mediated signaling pathway
    predicted_term_type: GO_BP
    review:
      assessment: NPI
      confidence_score: 0
      summary: >-
        Arabidopsis JMJ22/PKDM7D demethylates histones at GA biosynthesis gene
        loci, linking it to gibberellin-mediated signaling. Wheat JmjC gene
        promoters contain GA-responsive cis-elements (Wang et al. 2022; Ma et al.
        2022), providing indirect support for GA pathway involvement. However,
        the presence of hormone-responsive promoter elements is common across many
        gene families and does not establish direct involvement in GA signaling.
        No experimental evidence demonstrates that this specific wheat protein
        regulates GA biosynthesis or signaling. The prediction is plausible through
        orthology to JMJ22 but remains unverifiable without wheat-specific functional
        data. An independent OpenScientist investigation (see file reference) confirms
        A0A3B6RKV1 is a catalytically competent JMJ22 co-ortholog (a JMJD6-type histone
        arginine demethylase with an intact JmjC Fe(II)/2-oxoglutarate active site), but
        concludes the four Arabidopsis-specific developmental BP terms are IMP-derived
        redundant-pair (JMJ20/JMJ22) seed-biology phenotypes not transferable to wheat by
        orthology alone. Downgraded from UNC to NPI; retain only the histone-demethylase
        molecular function at ISS/IBA strength.
      supported_by:
        - reference_id: file:WHEAT/A0A3B6RKV1/A0A3B6RKV1-hypotheses/prediction-jmj22-developmental-roles/openscientist.md
          supporting_text: >-
            Projecting photomorphogenesis / red-light / GA-signaling / seed-germination BP
            terms onto the wheat protein by ProtNLM orthology alone is unwarranted
  - source_method: ProtNLM2
    source_version: UniProt 2024_06 pilot
    predicted_term:
      id: GO:0040029
      label: epigenetic regulation of gene expression
    predicted_term_type: GO_BP
    review:
      assessment: COR
      confidence_score: 2
      summary: >-
        This is a correct novel prediction. A0A3B6RKV1 contains a JmjC catalytic
        domain (residues 285-445) and belongs to the KDM5/JARID1 histone demethylase
        subfamily, which catalyzes Fe(II)- and 2-oxoglutarate-dependent oxidative
        removal of methyl groups from histone H3K4me1/2/3 marks. Histone demethylation
        is by definition a mechanism of epigenetic gene expression regulation.
        Phylogenetic analysis across 21 plant species confirms that KDM5/JARID subfamily
        members function as H3K4 demethylases (Ma et al. 2022), and 18 of 24 wheat
        JmjC family members localize to the nucleus consistent with chromatin-associated
        function (Wang et al. 2022). The ai-review independently lists this term as a
        core function. This GO term was not present in the existing GOA annotations,
        making it a genuinely novel and correct prediction that follows directly from
        the established enzymatic activity of the protein family.
  - source_method: ProtNLM2
    source_version: UniProt 2024_06 pilot
    predicted_term:
      id: GO:0010114
      label: response to red light
    predicted_term_type: GO_BP
    review:
      assessment: NPI
      confidence_score: 0
      summary: >-
        Red light response is mechanistically linked to photomorphogenesis and
        phytochrome signaling, and some Arabidopsis JmjC proteins participate in
        light-mediated developmental pathways. However, this is a more specific
        prediction than regulation of photomorphogenesis, and the evidence
        supporting it is weaker. No published study demonstrates response to red
        light for any wheat KDM5/JARID1 member, nor has the Arabidopsis ortholog
        JMJ22 been specifically characterized as red-light responsive (its
        photomorphogenesis role involves broader light signaling). The deep
        research report for A0A3B6RKV1 does not mention red light or phytochrome
        signaling among the biological processes of wheat JmjC proteins. This
        prediction may reflect frequency bias from ProtNLM2 associating
        photomorphogenesis-related terms as a cluster for JmjC-like sequences
        in the training data. An independent OpenScientist investigation (see file
        reference) confirms A0A3B6RKV1 is a catalytically competent JMJ22 co-ortholog
        (a JMJD6-type histone arginine demethylase with an intact JmjC
        Fe(II)/2-oxoglutarate active site), but concludes the four Arabidopsis-specific
        developmental BP terms are IMP-derived redundant-pair (JMJ20/JMJ22) seed-biology
        phenotypes not transferable to wheat by orthology alone. Downgraded from UNC to
        NPI; retain only the histone-demethylase molecular function at ISS/IBA strength.
      supported_by:
        - reference_id: file:WHEAT/A0A3B6RKV1/A0A3B6RKV1-hypotheses/prediction-jmj22-developmental-roles/openscientist.md
          supporting_text: >-
            Projecting photomorphogenesis / red-light / GA-signaling / seed-germination BP
            terms onto the wheat protein by ProtNLM orthology alone is unwarranted
  - source_method: ProtNLM2
    source_version: UniProt 2024_06 pilot
    predicted_term:
      id: GO:0010030
      label: positive regulation of seed germination
    predicted_term_type: GO_BP
    review:
      assessment: NPI
      confidence_score: 0
      summary: >-
        Arabidopsis JMJ22/PKDM7D participates in seed germination through histone
        arginine demethylation at GA biosynthesis gene loci, providing ortholog-based
        support for this prediction. GA signaling is a key regulator of seed
        germination across angiosperms, and the mechanistic link between histone
        demethylation and GA-dependent germination is well-established in
        Arabidopsis. However, the specific polarity of regulation (positive vs.
        negative) has not been established for this wheat protein. Note the OpenScientist
        analysis reassigns the enzyme as a JMJD6-type histone arginine demethylase
        (H4R3me2 at GA3ox loci), not a KDM5/JARID1 H3K4 lysine demethylase, so the
        H3K4-based directionality argument below does not apply. Without wheat-specific
        experimental data, both the involvement in germination and the direction of
        regulation remain unverified. An independent OpenScientist investigation (see file
        reference) confirms A0A3B6RKV1 is a catalytically competent JMJ22 co-ortholog with
        an intact JmjC Fe(II)/2-oxoglutarate active site, but concludes the four
        Arabidopsis-specific developmental BP terms are IMP-derived redundant-pair
        (JMJ20/JMJ22) seed-biology phenotypes not transferable to wheat by orthology alone.
        Downgraded from UNC to NPI; retain only the histone-demethylase molecular function
        at ISS/IBA strength.
      supported_by:
