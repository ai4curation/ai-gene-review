  - genes/WHEAT/A0A3B6RKV1/A0A3B6RKV1-uniprot.txt
  - genes/WHEAT/A0A3B6RKV1/A0A3B6RKV1-goa.tsv
  - genes/WHEAT/A0A3B6RKV1/A0A3B6RKV1-ai-review.yaml
