id: A0A3B6RKV1
gene_symbol: A0A3B6RKV1
taxon:
  id: NCBITaxon:4565
  label: Triticum aestivum
status: COMPLETE
description: >-
  ProtNLM2 predicted 5 biological process GO terms for this JmjC domain-containing
  histone demethylase (KDM5/JARID1 subfamily). One prediction (epigenetic regulation of
  gene expression) is assessed as correct and novel, since histone demethylation is
  definitionally an epigenetic regulatory mechanism and this term was absent from GOA.
  The remaining four predictions (regulation of photomorphogenesis, gibberellin mediated
  signaling, response to red light, positive regulation of seed germination) all derive
  from the biology of the closest characterized Arabidopsis ortholog JMJ22/PKDM7D
  (AT5G06550), but cannot be verified for this specific wheat protein (PE level 3,
  no direct experimental data). These remain uncertain because monocot-dicot functional
  divergence is well-documented for epigenetic regulators, and the specific downstream
  processes regulated by wheat KDM5/JARID1 members have not been experimentally
  characterized.
