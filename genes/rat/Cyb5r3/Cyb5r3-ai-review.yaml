id: P20070
gene_symbol: Cyb5r3
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:10116
  label: Rattus norvegicus
description: 'Cyb5r3 encodes NADH-cytochrome b5 reductase 3, a flavoprotein that transfers electrons from NADH to
  cytochrome b5. The review accepts the cytochrome-b5 reductase activities as direct functions, modifies generic
  oxidoreductase activity, keeps cofactor/nucleotide binding and membrane/localization terms as context, and removes
  the uninformative ND biological_process annotation.'
