- id: file:rat/Cyb5r3/Cyb5r3-deep-research-falcon.md
  title: Falcon deep research report on rat Cyb5r3 (NADH-cytochrome b5 reductase 3)
  findings:
  - statement: |
      Rat Cyb5r3 (UniProt P20070) corresponds to NADH-cytochrome b5 reductase 3 (EC 1.6.2.2),
      historically termed diaphorase-1 (DIA1); an FAD-dependent flavoprotein oxidoreductase that uses
      NADH as the electron donor.
    supporting_text: |-
      The rat gene symbol **Cyb5r3** corresponds to **NADH–cytochrome b5 reductase 3** (EC **1.6.2.2**), historically termed **diaphorase-1 (DIA1)** in the methemoglobin reductase literature.
    reference_section_type: OTHER
  - statement: |
      The core redox chemistry is electron transfer from NADH to acceptors such as cytochrome b5 or
      coenzyme Q (CoQ), producing NAD+.
    supporting_text: |-
      A recent 2024 study summarizes the core redox chemistry as **electron transfer from NADH to acceptors such as cytochrome b5 or coenzyme Q (CoQ)**, resulting in **NAD+** production.
    reference_section_type: OTHER
  - statement: |
      CYB5R3 is a prominent one-electron CoQ (ubiquinone) reductase, contrasted with NQO1, which reduces
      CoQ by a two-electron mechanism; one-electron CoQ chemistry generates semiquinone intermediates.
    supporting_text: |-
      A key contemporary framing is that CYB5R3 is a prominent **one-electron CoQ reductase**, contrasted with **NQO1**, which reduces CoQ by a **two-electron** mechanism (avoiding semiquinone formation).
    reference_section_type: OTHER
  - statement: |
      The membrane-bound isoform localizes to the endoplasmic reticulum, mitochondrial outer membrane
      (cytosolic face), and plasma membrane; the soluble N-terminally truncated isoform is the principal
      erythrocyte methemoglobin-reducing system.
    supporting_text: |-
      A 2024 review of “free radical reductases” similarly describes CYB5R3 as **membrane-tethered** on **MOM (cytosolic face), ER, and plasma membrane**, positioning it to reduce ferric heme and oxidized CoQ species.
    reference_section_type: OTHER
  - statement: |
      Membrane targeting of CYB5R3 is regulated by N-terminal myristoylation, which influences targeting
      to the mitochondrial outer membrane versus the ER.
    supporting_text: |-
      Membrane targeting includes regulation by **N-terminal myristoylation**, which influences targeting (e.g., MOM vs ER).
    reference_section_type: OTHER
  - statement: |
      At the ER, membrane-bound Cb5R/CYB5R3 transfers electrons to fatty-acid desaturation/elongation
      pathways and works in detoxification alongside cytochrome b5 and cytochrome P450 systems.
    supporting_text: |-
      At the **ER**, membrane-bound Cb5R/CYB5R3 transfers electrons to pathways including **fatty-acid desaturation/elongation** and works in detoxification alongside **cytochrome b5 and cytochrome P450** systems.
    reference_section_type: OTHER
  - statement: |
      Membrane CYB5R3 participates in lipid/cholesterol metabolism and drug metabolism.
    supporting_text: |-
      A 2024 cancer-focused study reiterates participation of membrane CYB5R3 in lipid/cholesterol metabolism and drug metabolism, while emphasizing its broad metabolic involvement.
    reference_section_type: OTHER
  - statement: |
      CYB5R3 maintains the soluble guanylate cyclase (sGC) heme iron in the reduced NO-responsive state,
      sustaining NO-stimulated cGMP/PKG signaling; loss of CYB5R3 shifts reliance toward sGC activators
      that act on oxidized/heme-free sGC.
    supporting_text: |-
      In a 2023 pulmonary fibrosis model, CYB5R3 is described as maintaining **sGC heme iron redox state**, enabling NO responsiveness and downstream **cGMP/PKG** signaling.
    reference_section_type: OTHER
  - statement: |
      As a membrane free-radical reductase, CYB5R3 maintains reduced CoQ pools that regenerate tocopherol
      (vitamin E) by reducing tocopheroxyl radicals, thereby suppressing lipid peroxidation (ferroptosis-
      relevant antioxidant recycling).
    supporting_text: |-
      reduced CoQ can regenerate **tocopherol (vitamin E)** by reducing tocopheroxyl radicals, thereby suppressing lipid peroxidation—an organizing concept relevant to ferroptosis sensitivity.
    reference_section_type: OTHER
  - statement: |
      Direct rat genetic/physiology studies of Cyb5r3 in 2023-2024 were not present in the accessible
      corpus; rat support is strongest for biochemical/membrane evidence (erythrocyte and
      synaptosomal/plasma membrane contexts) while recent mechanistic/translational updates are primarily
      mouse/human.
    supporting_text: |-
      Direct **rat** genetic/physiology studies of Cyb5r3 in 2023–2024 were not present in the accessible corpus; therefore, recent mechanistic and translational updates are primarily drawn from **mouse/human** systems, while rat support is strongest for biochemical/membrane evidence (erythrocyte and synaptosomal/plasma membrane contexts) and vascular pharmacology discussion.
    reference_section_type: OTHER
