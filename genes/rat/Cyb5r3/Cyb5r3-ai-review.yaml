- term:
    id: GO:0006809
    label: nitric oxide biosynthetic process
  evidence_type: ISO
  original_reference_id: GO_REF:0000121
  review:
    summary: nitric oxide biosynthetic process is retained as contextual support for Cyb5r3, but it is not the
      core function (ISO, GO_REF:0000121). Falcon deep research clarifies that CYB5R3's connection to NO
      biology is via maintaining soluble guanylate cyclase (sGC) heme in the reduced NO-responsive state
      rather than directly catalyzing NO synthesis, supporting retention as indirect/non-core context.
    action: KEEP_AS_NON_CORE
    reason: nitric oxide biosynthetic process is kept only as non-core orthology-derived context; the cached
      rat literature primarily supports NADH-cytochrome b5 reductase activity, and the falcon-synthesized
      mechanism is heme-redox control of sGC (sustaining NO/cGMP signaling), not a dedicated rat NO-forming
      assay.
    additional_reference_ids:
    - file:rat/Cyb5r3/Cyb5r3-deep-research-falcon.md
    supported_by:
    - reference_id: UniProtKB:P20070
      supporting_text: 'FUNCTION: Catalyzes the reduction of two molecules of cytochrome b5 using NADH as the electron
        donor.'
    - reference_id: file:rat/Cyb5r3/Cyb5r3-deep-research-falcon.md
      supporting_text: |-
        In a 2023 pulmonary fibrosis model, CYB5R3 is described as maintaining **sGC heme iron redox state**, enabling NO responsiveness and downstream **cGMP/PKG** signaling.
