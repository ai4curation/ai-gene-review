    reference_section_type: ABSTRACT
- id: PMID:7744844
  title: Two rat intestinal alkaline phosphatase isoforms with different carboxyl-terminal peptides are both
    membrane-bound by a glycan phosphatidylinositol linkage
  findings:
  - statement: For Alpi, this publication provides evidence/provenance for direct annotations to alkaline
      phosphatase activity and contextual annotations to external side of plasma membrane.
    supporting_text: Two cDNAs encode rat intestinal alkaline phosphatases having completely different
      carboxyl-terminal peptides; one is hydrophobic and fulfills the consensus requirements for glycan
      phosphatidylinositol linkage, and the other is neither hydrophobic nor hydrophilic, but contains a small
