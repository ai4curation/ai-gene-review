id: P15693
gene_symbol: Alpi
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:10116
  label: Rattus norvegicus
description: Alpi encodes rat intestinal alkaline phosphatase 1, a GPI-anchored brush-border ectoenzyme that
  hydrolyzes phosphate monoesters at the external/apical plasma membrane. The review accepts alkaline
  phosphatase activity and dephosphorylation as the core function, treats metal binding, homodimerization,
  protease binding and localization as non-core context, and marks the uninformative generic protein binding
  (GO:0005515) and the BMP-response annotation as over-annotated. Falcon deep research corroborates the
  phosphomonoesterase activity, the GPI-anchored brush-border localization, and downstream physiological roles
  (LPS/endotoxin detoxification, purinergic ATP/ADP/AMP-to-adenosine dephosphorylation, and gut barrier
  maintenance) that are consequences of the core catalytic activity rather than distinct molecular functions.
