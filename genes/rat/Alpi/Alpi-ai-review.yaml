description: Alpi encodes rat intestinal alkaline phosphatase 1, a GPI-anchored alkaline phosphatase that
  hydrolyzes phosphate monoesters at the external plasma membrane. The review accepts alkaline phosphatase
  activity and dephosphorylation as the main function, while metal/protein binding and BMP-response
  annotations are non-core context.
