- id: PMID:11015594
  title: The two isozymes of rat intestinal alkaline phosphatase are products of two distinct genes
  findings:
  - statement: For Alpi, this publication supports direct annotations to alkaline phosphatase activity.
    supporting_text: Rat intestinal alkaline phosphatases (IAP-I and -II) differ in primary structure,
      substrate specificity, tissue localization, and response to fat feeding.
    reference_section_type: ABSTRACT
- id: PMID:15885097
  title: Characterization of structural and catalytic differences in rat intestinal alkaline phosphatase
    isozymes
  findings:
  - statement: For Alpi, this publication provides evidence/provenance for direct annotations to alkaline
      phosphatase activity and contextual annotations to magnesium ion binding; zinc ion binding.
    supporting_text: To understand the differences between the rat intestinal alkaline phosphatase isozymes
      rIAP-I and rIAP-II, we constructed structural models based on the previously determined crystal
      structure for human placental alkaline phosphatase (hPLAP).
    reference_section_type: ABSTRACT
