- id: file:rat/Alpi/Alpi-deep-research-falcon.md
  title: 'Falcon (Edison Scientific) deep research report: rat Alpi (intestinal-type alkaline phosphatase 1,
    UniProt P15693)'
  findings:
  - statement: Falcon confirms the core catalytic function of rat Alpi as an alkaline phosphomonoesterase,
      corroborating the GO:0004035 (alkaline phosphatase activity) and GO:0016311 (dephosphorylation) core
      annotations.
    supporting_text: |-
      Intestinal alkaline phosphatase (IAP; including rat ALPI) is a **phosphomonoesterase** that hydrolyzes phosphate monoesters (optimal activity at alkaline pH), releasing **inorganic phosphate**.
    reference_section_type: OTHER
  - statement: Falcon corroborates the brush-border, GPI-anchored, external/apical plasma-membrane localization
      of Alpi (supporting GO:0009897 external side of plasma membrane and GO:0005886 plasma membrane).
    supporting_text: |-
      IAP is a **brush-border ectoenzyme** expressed by enterocytes. It is described as **GPI-anchored** to the apical membrane/brush border and is also detected outside the cell because it can be released from the brush border.
    reference_section_type: OTHER
  - statement: Falcon notes the GPI anchor and that released IAP can be detected in lymph/serum and associate
      with membrane/surfactant-like particles, consistent with both membrane-bound and luminal/extracellular
      modes of action.
    supporting_text: |-
      Cross-species intestinal IAP biology indicates that “IAP is anchored via a glycosyl-phosphatidylinositol (GPI) anchor” in the apical brush border, yet IAP activity can be detected in **lymph/serum** and can associate with membrane/surfactant-like particles from enterocytes, supporting both membrane-bound and extracellular/luminal modes of action.
    reference_section_type: OTHER
  - statement: Falcon describes a downstream physiological role in endotoxin detoxification via dephosphorylation
      of bacterial LPS lipid A; this is a consequence of the dephosphorylation activity rather than a distinct
      direct molecular function, and is not in the existing GOA set for rat Alpi.
    supporting_text: |-
      In the gut, the “canonical” functional reaction emphasized in modern mechanistic literature is **detoxification of bacterial lipopolysaccharide (LPS)** by **dephosphorylating lipid A phosphate groups**, which markedly reduces LPS inflammatory potency.
    reference_section_type: OTHER
  - statement: Falcon describes a second physiological axis whereby Alpi degrades extracellular ATP/ADP/AMP to
      adenosine (purinergic nucleotide dephosphorylation); again a downstream consequence of the broad
      phosphomonoesterase activity rather than a separate annotated molecular function.
    supporting_text: |-
      Beyond LPS, a major mechanistic axis is **purinergic nucleotide dephosphorylation**: IAP can dephosphorylate extracellular **ATP, ADP, and AMP** to generate **adenosine**, an anti-inflammatory mediator that signals through adenosine receptors and suppresses inflammatory signaling pathways.
    reference_section_type: OTHER
  - statement: Falcon summarizes the broader physiological role of intestinal alkaline phosphatase in
      maintaining gut barrier integrity and microbial homeostasis; these are pleiotropic downstream effects,
      not the direct molecular function of the gene product.
    supporting_text: |-
      Intestinal alkaline phosphatase is repeatedly implicated in maintaining **intestinal barrier integrity** (tight junctions/mucus layer), limiting permeability and translocation of bacteria/endotoxin, and contributing to microbial homeostasis and microbiota composition.
    reference_section_type: OTHER
