- id: file:rat/Cyp2a1/Cyp2a1-deep-research-falcon.md
  title: 'Falcon (Edison Scientific) deep research report: rat Cyp2a1 (UniProt P11711)'
  findings:
  - statement: Falcon verified the research target is rat CYP2A1 (P11711) and distinguished it from rodent
      paralogs (mouse Cyp2a4/Cyp2a5) and human CYP2A6/CYP2A13, supporting steroid 7-alpha-hydroxylation
      (testosterone) as the defensible core function.
    supporting_text: |-
      The most defensible function assignment for rat *Cyp2a1* in the current evidence set is **microsomal steroid 7α-hydroxylation**, with testosterone 7α-hydroxylation serving as both a mechanistic readout and a practical ADME/tox tool.
    reference_section_type: OTHER
  - statement: A rat transcriptome study explicitly states rat CYP2A1 is highly involved in 7-alpha-hydroxylation
      of testosterone, corroborating the IDA steroid hydroxylase annotation independently of the original
      reference.
    supporting_text: |-
      A rat transcriptome study explicitly states that in rat, **CYP2A1 is highly involved in 7α-hydroxylation of testosterone**
    reference_section_type: OTHER
  - statement: Cytochrome P450 enzymes are heme-thiolate monooxygenases catalyzing Phase I oxidative reactions,
      supporting the monooxygenase activity, iron ion binding and heme binding molecular-function annotations.
    supporting_text: |-
      Cytochrome P450 enzymes are **heme-thiolate monooxygenases** that catalyze Phase I oxidative reactions, increasing substrate polarity and typically preparing metabolites for Phase II conjugation.
    reference_section_type: OTHER
  - statement: Microsomal CYPs are ER-anchored and depend on NADPH-cytochrome P450 reductase for electron
      transfer, supporting endoplasmic reticulum membrane localization and the paired-donor oxidoreductase
      activity.
    supporting_text: |-
      Microsomal CYPs are **endoplasmic reticulum (ER)-anchored** (via an N-terminal transmembrane helix) and use electrons supplied from **NADPH** through **cytochrome P450 reductase (CPR)** (FAD/FMN-containing).
    reference_section_type: OTHER
  - statement: Rat liver microsome assays measure CYP2A activity as testosterone 7-alpha-hydroxylation,
      localizing the activity to the hepatic microsomal (ER) fraction.
    supporting_text: |-
      A dedicated rat pharmacology/toxicology study uses **testosterone 7α-hydroxylation** in **rat liver microsomes** as the **assay readout for CYP2A activity**
    reference_section_type: OTHER
  - statement: In ochratoxin A toxicology models, low CYP2A abundance is interpreted as a less detoxifying
      profile, supporting a xenobiotic detoxification/metabolism role for the CYP2A family.
    supporting_text: |-
      high expression of certain “toxifying” isoforms** and **little detection of “detoxifying” isoforms including CYP2A**
    reference_section_type: OTHER
