- term:
    id: GO:0009804
    label: coumarin metabolic process
  evidence_type: IDA
  original_reference_id: PMID:12162851
  review:
    summary: coumarin metabolic process is retained for Cyp2a1; the rat orthologue CYP2A1 metabolizes
      coumarin via 3,4-epoxidation (distinct from the 7-hydroxylation seen for human CYP2A6 and mouse
      CYP2A5), consistent with rat coumarin metabolism (IDA, PMID:12162851).
    action: ACCEPT
    reason: This term is directly compatible with Cyp2a1 as a heme P450 monooxygenase/steroid hydroxylase
      involved in xenobiotic and coumarin metabolism. Note an evidence-code caveat - PMID:12162851 (Lewis
      & Lake 2002) is a molecular-modelling/QSAR study, so the GOA evidence code IDA (inferred from direct
      assay) overstates the evidence type; an in-silico/modelling code (e.g. analogous to ISS/RCA) would be
      more appropriate. The process assignment itself (rat CYP2A1 catalyzes coumarin 3,4-epoxidation) is
      supported by the modelling and consistent with established rat coumarin biochemistry, so the term is
      accepted.
    supported_by:
    - reference_id: PMID:12162851
      supporting_text: the rat orthologue (CYP2A1) exhibits 3,4-epoxidation of coumarin, which is also
        consistent with the modelled interaction between enzyme and substrate.
      reference_section_type: ABSTRACT
