id: P16290
gene_symbol: Pgam2
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:10116
  label: Rattus norvegicus
description: Pgam2 encodes rat muscle phosphoglycerate mutase, a glycolytic mutase that interconverts 3-phosphoglycerate and
  2-phosphoglycerate and can also act on 2,3-bisphosphoglycerate. The review accepts phosphoglycerate/bisphosphoglycerate
  mutase activities and glycolysis/gluconeogenesis terms as core/direct metabolism, while localization, Notch, spermatogenesis,
  and stress-response annotations are non-core or over-annotated.
