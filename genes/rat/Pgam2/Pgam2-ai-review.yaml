  evidence_type: IDA
  original_reference_id: PMID:2158448
  review:
    summary: ooplasm is an over-annotation. The cited reference (PMID:2158448) is an immunogold study of
      rat skeletal muscle that localized the enzyme to cytosol and nucleus; it does not provide evidence
      for an oocyte/ooplasm localization. Falcon deep research finds no support for non-cytosolic
      localization of mammalian PGAM2 beyond the intracellular carbohydrate-metabolism context.
    action: MARK_AS_OVER_ANNOTATED
    reason: ooplasm (an oocyte cytoplasm term) is not supported by the muscle immunocytochemistry reference,
      and PGAM2 is a muscle/heart-enriched cytosolic glycolytic enzyme; the dominant functional context is
      intracellular carbohydrate metabolism.
    supported_by:
    - reference_id: PMID:2158448
      supporting_text: The subcellular distribution of phosphoglycerate mutase was studied by immunogold
        techniques. With the aid of highly affinity-purified anti-phosphoglycerate mutase antibodies, the
        enzyme was found in both cytosol and nucleus of rat skeletal muscle.
      reference_section_type: ABSTRACT
    - reference_id: file:rat/Pgam2/Pgam2-deep-research-falcon.md
      supporting_text: |-
        No evidence in the retrieved texts supports stable extracellular localization for mammalian PGAM2, and the dominant functional context is **intracellular carbohydrate metabolism**
