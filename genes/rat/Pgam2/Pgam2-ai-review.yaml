id: P16290
gene_symbol: Pgam2
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:10116
  label: Rattus norvegicus
description: Pgam2 encodes rat muscle-specific phosphoglycerate mutase (PGAM-M; UniProt P16290), the
  muscle/heart-enriched, cytosolic glycolytic isoform distinct from the brain-predominant Pgam1. It is a
  2,3-bisphosphoglycerate-dependent phospho-histidine mutase that interconverts 3-phosphoglycerate and
  2-phosphoglycerate in lower glycolysis and can also act on 2,3-bisphosphoglycerate. The review accepts
  phosphoglycerate/bisphosphoglycerate mutase activities and glycolysis/gluconeogenesis terms as core/direct
  metabolism, while localization, Notch, spermatogenesis, and stress-response annotations are non-core or
  over-annotated. Falcon deep research corroborates the cytosolic muscle/heart enzymatic role and supports
  treating the muscle-skeletal-immunogold-derived ooplasm annotation as an over-annotation.
