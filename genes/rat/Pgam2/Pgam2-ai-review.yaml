- term:
    id: GO:0007283
    label: spermatogenesis
  evidence_type: IEP
  original_reference_id: PMID:7867621
  review:
    summary: spermatogenesis is treated as over-annotation. PMID:7867621 shows that the muscle-specific
      PGAM-M gene is developmentally expressed in testis during spermatogenesis, where the paper frames
      PGAM as "an essential glycolytic enzyme for the spermatozoa energy supply". This testis expression
      reflects the same core glycolytic mutase function operating in a germ-cell context (an IEP
      expression-pattern observation) rather than a distinct, direct involvement of PGAM2 in the
      spermatogenesis differentiation program itself.
    action: MARK_AS_OVER_ANNOTATED
    reason: The evidence is an IEP expression-pattern observation; although PMID:7867621 frames PGAM-M as
      essential for spermatozoa energy supply, this is the same glycolytic mutase activity deployed in
      germ cells, not a direct PGAM2 role in the spermatogenesis developmental process, so annotating
      Pgam2 to spermatogenesis over-states its function.
    supported_by:
    - reference_id: PMID:7867621
      supporting_text: we have investigated the expression during spermatogenesis of the genes that encode
        phosphoglycerate mutase, an essential glycolytic enzyme for the spermatozoa energy supply
      reference_section_type: ABSTRACT
