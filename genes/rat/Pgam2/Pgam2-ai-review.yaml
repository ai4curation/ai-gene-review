- term:
    id: GO:0004619
    label: phosphoglycerate mutase activity
  evidence_type: IDA
  original_reference_id: PMID:15720133
  review:
    summary: phosphoglycerate mutase activity is a specific catalytic activity consistent with Pgam2's
      core role. Note that in PMID:15720133 (Sakai et al. 2005) phosphoglycerate mutase activity was
      measured as a negative control and shown NOT to be inactivated by MCA (in contrast to GAPDH);
      the measurement nonetheless demonstrates assayable PGAM activity, so the activity annotation is
      retained as a correct molecular function term.
    action: ACCEPT
    reason: phosphoglycerate mutase activity is a specific catalytic activity matching Pgam2's documented
      role; PMID:15720133 directly measured this activity (as an MCA-insensitive negative control).
    supported_by:
    - reference_id: PMID:15720133
      supporting_text: GAPDH was inactivated by MCA in vitro, but enolase, phosphoglycerate mutase, and
        phosphoglycerate kinase were not inactivated at the same or higher concentrations of MCA.
      reference_section_type: ABSTRACT
- term:
    id: GO:0006094
    label: gluconeogenesis
  evidence_type: IDA
  original_reference_id: PMID:15720133
  review:
    summary: The cited reference (PMID:15720133, Sakai et al. 2005) does not provide IDA support for a
      direct PGAM role in gluconeogenesis. The paper concludes that MCA-induced inhibition of liver
      gluconeogenesis is caused by inactivation of GAPDH, and explicitly shows that phosphoglycerate
      mutase (along with enolase and phosphoglycerate kinase) was NOT inactivated; PGAM was measured
      only as a negative control. While PGAM2 catalyzes a reversible reaction and can in principle
      participate in gluconeogenesis, this reference actively argues that PGAM is not the operative
      enzyme in the studied effect, so the IDA annotation to gluconeogenesis from this paper is an
      over-annotation.
    action: MARK_AS_OVER_ANNOTATED
    reason: PMID:15720133 implicates GAPDH (not PGAM) in MCA-induced inhibition of liver gluconeogenesis
      and shows phosphoglycerate mutase was not inactivated, so it does not support a direct IDA
      annotation of PGAM2 to gluconeogenesis.
    supported_by:
    - reference_id: PMID:15720133
      supporting_text: GAPDH was inactivated by MCA in vitro, but enolase, phosphoglycerate mutase, and
        phosphoglycerate kinase were not inactivated at the same or higher concentrations of MCA.
      reference_section_type: ABSTRACT
