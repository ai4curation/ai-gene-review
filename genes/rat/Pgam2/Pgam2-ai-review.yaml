- id: PMID:15720133
  title: Monochloroacetic acid inhibits liver gluconeogenesis by inactivating glyceraldehyde-3-phosphate
    dehydrogenase
  findings:
  - statement: This paper concludes that MCA-induced inhibition of liver gluconeogenesis is caused by
      inactivation of GAPDH, not PGAM. Phosphoglycerate mutase was measured as a negative control and
      shown NOT to be inactivated by MCA. It therefore demonstrates assayable phosphoglycerate mutase
      activity but does not support a direct PGAM role in gluconeogenesis.
    supporting_text: GAPDH was inactivated by MCA in vitro, but enolase, phosphoglycerate mutase, and
      phosphoglycerate kinase were not inactivated at the same or higher concentrations of MCA.
    reference_section_type: ABSTRACT
- id: PMID:2158448
  title: Location of phosphoglycerate mutase in rat skeletal muscle. An immunocytochemical and biochemical
    study
  findings:
  - statement: For Pgam2, this immunocytochemical/biochemical study localizes PGAM to both cytosol and
      nucleus of rat skeletal muscle (nuclear localization confirmed biochemically, ~25% of total
      specific activity in nuclei). It is the supporting evidence for nucleus/nucleoplasm (kept as
      non-core) and argues against the ooplasm annotation (the study is skeletal muscle, not oocyte).
    supporting_text: With the aid of highly affinity-purified anti-phosphoglycerate mutase antibodies, the
      enzyme was found in both cytosol and nucleus of rat skeletal muscle.
    reference_section_type: ABSTRACT
- id: PMID:2850701
  title: Inactivation of type MM phosphoglycerate mutase by sulfhydryl group reagents during facial
    embryogenesis
  findings:
  - statement: For Pgam2, this publication provides evidence/provenance for direct annotations to
      phosphoglycerate mutase activity and contextual annotations to response to mercury ion.
    supporting_text: Type MM phosphoglycerate mutase from free dissected mandibular processes from embryonic
      rats was reversibly inactivated by tetrathionate, p-chloromercuribenzoate, and Hg2+.
    reference_section_type: ABSTRACT
- id: PMID:7867621
  title: The muscle-specific phosphoglycerate mutase gene is specifically expressed in testis during
    spermatogenesis
  findings:
  - statement: For Pgam2, this publication shows the muscle-specific PGAM-M gene is developmentally
      expressed in testis during spermatogenesis, framing PGAM as an essential glycolytic enzyme for the
      spermatozoa energy supply (IEP expression evidence; reviewed as context for spermatogenesis, which
      is treated as over-annotation).
    supporting_text: we have investigated the expression during spermatogenesis of the genes that encode
      phosphoglycerate mutase, an essential glycolytic enzyme for the spermatozoa energy supply
    reference_section_type: ABSTRACT
- id: file:rat/Pgam2/Pgam2-deep-research-falcon.md
  title: Falcon (Edison Scientific) deep research report for rat Pgam2 (UniProt P16290)
  findings:
  - statement: PGAM2 is the muscle-specific phosphoglycerate mutase isoform (PGAM-M), distinct from the
      brain-predominant PGAM1, consistent with the UniProt identity for P16290 and the muscle/heart bias of
      Pgam2 expression.
    supporting_text: |-
      Mammals express at least two major PGAM isoforms: **PGAM1 (Pgam1; often described as brain-predominant)** and **PGAM2 (Pgam2; muscle-specific)**
    reference_section_type: OTHER
  - statement: PGAM2 catalyzes the reversible interconversion of 3-phosphoglycerate and 2-phosphoglycerate in
      lower glycolysis, supporting the phosphoglycerate mutase activity and glycolysis annotations.
    supporting_text: |-
      PGAM2 is a **glycolytic enzyme** that catalyzes the **reversible isomerization of 3-phosphoglycerate (3-PG) to 2-phosphoglycerate (2-PG)** in the “lower” portion of glycolysis
    reference_section_type: OTHER
  - statement: The PGAM-family catalytic mechanism is a 2,3-bisphosphoglycerate-dependent phospho-histidine
      cycle, consistent with the BPG-dependent PGAM subfamily assignment and bisphosphoglycerate mutase
      activity.
    supporting_text: |-
      The canonical PGAM-family mechanism proceeds via a **phospho-histidine catalytic cycle**, commonly summarized as involving an **active-site histidine (often referred to as His11)** and a **2,3-bisphosphoglycerate (2,3-BPG/2,3-DPG)**-dependent priming/turnover mechanism
    reference_section_type: OTHER
  - statement: PGAM2 is a cytosolic enzyme; no evidence supports stable non-cytosolic localization, with the
      dominant functional context being intracellular carbohydrate metabolism.
    supporting_text: |-
      Within the provided evidence set, PGAM2 is described as a **cytosolic** enzyme in an isoform table summary
    reference_section_type: OTHER
  - statement: No support for stable extracellular or organellar localization of mammalian PGAM2; the
      dominant context is intracellular carbohydrate metabolism (argues against the ooplasm over-annotation).
    supporting_text: |-
      No evidence in the retrieved texts supports stable extracellular localization for mammalian PGAM2, and the dominant functional context is **intracellular carbohydrate metabolism**
    reference_section_type: OTHER
  - statement: PGAM2 is expressed mainly in skeletal muscle and heart, the basis for its muscle-context
      annotations (e.g. striated muscle contraction kept as non-core/over-annotation rather than core MF).
    supporting_text: |-
      PGAM2 is described as expressed mainly in **skeletal muscle and heart**
    reference_section_type: OTHER
  - statement: PGAM2 activity is regulated by SUMOylation at K49 and K176, which is functionally tied to
      myogenic differentiation (regulatory context, not a core catalytic annotation).
    supporting_text: |-
      PGAM2 is reported to undergo **SUMOylation**, with two primary SUMO acceptor lysines **K49 and K176**; mutating either lysine prevents SUMOylation
    reference_section_type: OTHER
  - statement: PGAM2 catalytic activity is gated by reversible acetylation at K100, with SIRT2-mediated
      deacetylation activating the enzyme under oxidative stress (regulatory context).
    supporting_text: |-
      PGAM2 activity is strongly regulated by lysine acetylation at **K100**: acetylation at K100 inhibits PGAM2 activity, whereas deacetylation activates it
    reference_section_type: OTHER
  - statement: Inherited human PGAM2 (PGAM-M) deficiency causes glycogen storage disease type X with exercise
      intolerance and cramps, underscoring its essential role in high-flux muscle glycolysis.
    supporting_text: |-
      Heart-focused work cites that **human PGAM deficiency** causes **glycogen storage disease type X**, characterized by **exercise intolerance and cramps**, consistent with an essential role for PGAM2 in high-flux muscle glycolysis
    reference_section_type: OTHER
