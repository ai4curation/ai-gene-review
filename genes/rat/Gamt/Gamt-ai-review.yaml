description: 'Gamt encodes guanidinoacetate N-methyltransferase, the SAM-dependent enzyme that converts guanidinoacetate
  to creatine and S-adenosylhomocysteine. The review accepts the methyltransferase and creatine-biosynthesis annotations,
  keeps localization and oligomeric-context annotations as non-core, and marks broad developmental or growth annotations
  as over-annotations.'
existing_annotations:
- term:
    id: GO:0005634
    label: nucleus
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: |-
      nucleus is an unsupported IBA pan-ancestor localization call for Gamt. GAMT is a soluble cytosolic
      metabolic enzyme; rat liver subcellular fractionation localizes GAMT activity to the cytosolic fraction,
      and there is no experimental evidence for a nuclear pool or nuclear function. Downgraded from non-core
      to over-annotated.
    action: MARK_AS_OVER_ANNOTATED
    reason: This compartment is not supported by the rat evidence, which places GAMT in the cytosolic fraction
      of liver; the nucleus call derives solely from an IBA pan-ancestor inference with no direct support.
    supported_by:
    - reference_id: file:rat/Gamt/Gamt-deep-research-falcon.md
      supporting_text: In rat liver, GAMT is primarily localized to the cytosolic fraction.
      reference_section_type: OTHER
