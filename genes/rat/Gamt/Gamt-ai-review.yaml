- id: PMID:12069495
  title: 'Myocellular creatine and creatine transporter serine phosphorylation after starvation.'
  findings:
  - statement: This starvation study measured GAMT activity as a secondary assay and found it unchanged; it is
      only marginal support for baseline GAMT activity.
    supporting_text: Myocellular creatine and creatine transporter serine phosphorylation after starvation.
    reference_section_type: TITLE
- id: PMID:12079381
  title: 'Crystal structure of guanidinoacetate methyltransferase from rat liver: a model structure of protein arginine
    methyltransferase.'
  findings:
  - statement: Rat GAMT crystal structure and subunit data support enzyme identity and structural context for 
      creatine biosynthesis.
    supporting_text: 'Crystal structure of guanidinoacetate methyltransferase from rat liver: a model structure
      of protein arginine methyltransferase.'
    reference_section_type: TITLE
- id: PMID:15533043
  title: 'Catalytic mechanism of guanidinoacetate methyltransferase: crystal structures of guanidinoacetate methyltransferase
    ternary complexes.'
  findings:
  - statement: Rat GAMT ternary-complex structures support the catalytic mechanism for guanidinoacetate 
      methyltransferase activity.
    supporting_text: 'Catalytic mechanism of guanidinoacetate methyltransferase: crystal structures of guanidinoacetate
      methyltransferase ternary complexes.'
    reference_section_type: TITLE
- id: PMID:15918910
  title: 'Creatine synthesis and transport during rat embryogenesis: spatiotemporal expression of AGAT, GAMT and
    CT1.'
  findings:
  - statement: Gamt is expressed during rat embryogenesis, including hepatic primordium, but the paper 
      supports expression pattern rather than a direct morphogenesis function.
    supporting_text: 'Creatine synthesis and transport during rat embryogenesis: spatiotemporal expression of AGAT,
      GAMT and CT1.'
    reference_section_type: TITLE
- id: PMID:3277179
  title: 'Molecular cloning, sequence analysis, and expression in Escherichia coli of the cDNA for guanidinoacetate
    methyltransferase from rat liver.'
  findings:
  - statement: Rat liver Gamt cDNA expression in bacteria produced active guanidinoacetate methyltransferase.
    supporting_text: Molecular cloning, sequence analysis, and expression in Escherichia coli of the cDNA for 
      guanidinoacetate methyltransferase from rat liver.
    reference_section_type: TITLE
core_functions:
- description: Gamt catalyzes the SAM-dependent methylation of guanidinoacetate to creatine, completing 
    creatine biosynthesis.
