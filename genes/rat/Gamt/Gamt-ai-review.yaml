references:
- id: file:rat/Gamt/Gamt-deep-research-falcon.md
  title: Falcon (Edison Scientific) deep research report on rat Gamt (guanidinoacetate N-methyltransferase,
    UniProt P10868)
  findings:
  - statement: GAMT is the SAM-dependent terminal enzyme of endogenous creatine biosynthesis, methylating
      guanidinoacetate to creatine.
    supporting_text: |-
      The UniProt accession **P10868** corresponds to **guanidinoacetate N‑methyltransferase (GAMT)** encoded by **Gamt** in **Rattus norvegicus (rat)**, the canonical terminal enzyme of endogenous creatine biosynthesis.
    reference_section_type: OTHER
  - statement: GAMT transfers a methyl group from SAM to guanidinoacetate to yield creatine, with
      S-adenosylhomocysteine as the coproduct.
    supporting_text: GAMT transfers a methyl group from S-adenosylmethionine (SAM/AdoMet) to guanidinoacetate
      (GAA), yielding creatine.
    reference_section_type: OTHER
  - statement: SAM is the required methyl donor/cofactor and guanidinoacetate is the acceptor substrate.
    supporting_text: 'Required methyl donor/cofactor: SAM; acceptor substrate: guanidinoacetate.'
    reference_section_type: OTHER
  - statement: GAMT is the second (terminal) enzyme of the two-step endogenous creatine biosynthetic pathway,
      downstream of AGAT/GATM.
    supporting_text: GAMT is the second/terminal enzyme in the 2-step endogenous creatine pathway.
    reference_section_type: OTHER
  - statement: In rat liver, GAMT enzymatic activity is primarily localized to the cytosolic fraction,
      consistent with a soluble cytoplasmic metabolic enzyme.
    supporting_text: In rat liver, GAMT is primarily localized to the cytosolic fraction.
    reference_section_type: OTHER
  - statement: Rat liver is a central organ of creatine synthesis, with high GAMT activity converting GAA to
      creatine in isolated hepatocytes.
    supporting_text: Rat liver exhibits high GAMT activity and readily converts GAA to creatine in isolated
      hepatocytes, supporting liver as a central organ of creatine synthesis.
    reference_section_type: OTHER
  - statement: Rat brain expresses Gamt mRNA in neurons, astrocytes, and oligodendrocytes, supporting local
      creatine synthesis within the CNS.
    supporting_text: Rat brain expresses Gamt mRNA in neurons, astrocytes, and oligodendrocytes, supporting
      local creatine synthesis within the CNS.
    reference_section_type: OTHER
  - statement: GAMT activity is governed by methylation potential; SAH is a competitive inhibitor of rat liver
      GAMT.
    supporting_text: SAH is a competitive inhibitor of rat liver GAMT.
    reference_section_type: OTHER
  - statement: GAMT maintains creatine supply and prevents accumulation of guanidinoacetate, whose excess is
      neurotoxic and diagnostic in GAMT deficiency.
    supporting_text: GAMT helps maintain creatine supply and also prevents accumulation of GAA, a metabolite
      whose excess is neurotoxic and diagnostic in GAMT deficiency.
    reference_section_type: OTHER
