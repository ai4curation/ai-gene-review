description: 'Ldhb encodes the lactate dehydrogenase B chain, which interconverts L-lactate and pyruvate with coupled
  NAD+/NADH conversion. The review accepts L-lactate dehydrogenase activity and lactate/pyruvate metabolism as direct
  functions, modifies generic catalytic/oxidoreductase terms, and keeps NAD binding, protein interactions, complexes,
  and localizations as context.'
