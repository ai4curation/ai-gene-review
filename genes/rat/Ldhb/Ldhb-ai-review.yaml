      supporting_text: |-
        The subunit-specific “directionality” framing in recent literature describes LDHB as supporting **lactate oxidation to pyruvate** with concomitant **NAD+ → NADH**, consistent with its canonical role in oxidative tissues that consume lactate.
      reference_section_type: OTHER
- term:
    id: GO:0005739
    label: mitochondrion
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: |-
      mitochondrion is retained as contextual support for Ldhb, but it is not the core function (IBA,
      GO_REF:0000033). Falcon deep research flags that mitochondrial LDH localization is contested; in
      isolated rat soleus mitochondria, LDH activity was only ~0.7% of total and lactate alone did not
      support respiration, arguing against robust direct mitochondrial lactate oxidation. LDHB is
      predominantly a cytosolic enzyme.
    action: KEEP_AS_NON_CORE
    reason: mitochondrion records localization context for Ldhb, not the defining molecular function, and the
      mitochondrial pool is minor and contested per the falcon evidence.
    supported_by:
    - reference_id: file:rat/Ldhb/Ldhb-deep-research-falcon.md
      supporting_text: |-
        However, a direct rat mitochondrial preparation study in **soleus muscle** found LDH activity in the mitochondrial fraction to be only **0.7% of total activity** and reported **no detectable mitochondrial respiration on lactate alone**.
      reference_section_type: OTHER
