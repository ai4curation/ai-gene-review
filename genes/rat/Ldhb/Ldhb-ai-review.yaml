    reason: 'Generic ''protein binding'' adds no functional information per curation guidelines; the meaningful
      interaction (subunit oligomerization into LDH tetramers) is more precisely represented by GO:0042802.
      Falcon deep research confirms LDHB assembles into homotetramers/heterotetramers.'
