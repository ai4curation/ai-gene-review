- term:
    id: GO:0004457
    label: lactate dehydrogenase activity
  evidence_type: IDA
  original_reference_id: PMID:7138505
  review:
    summary: lactate dehydrogenase activity (GO:0004457) is the generic, stereochemically unspecified parent
      class (lactate + NAD+ = pyruvate + NADH). The characterized activity of the LDH-B (heart-type) subunit
      is specifically the L-lactate/NAD+ reaction, captured more precisely by GO:0004459. For consistency
      with the other catalytic-activity annotations modified in this review, this is updated to the more
      specific term.
    action: MODIFY
    reason: GO:0004457 is the L-stereochemistry-agnostic parent term; GO:0004459 (L-lactate dehydrogenase
      (NAD+) activity) is the more specific term that matches the documented L-lactate/NAD+ activity of the
      LDHB subunit. (Note GO:0004459 is not a direct child of GO:0004457 in the GO hierarchy — they sit in
      parallel CH-OH oxidoreductase branches — but GO:0004459 is the more specific and accurate term for
      this enzyme.)
    proposed_replacement_terms:
    - id: GO:0004459
      label: L-lactate dehydrogenase (NAD+) activity
    supported_by:
    - reference_id: PMID:7138505
      supporting_text: We have developed procedures for purifying lactate dehydrogenase isoenzymes from rat
        tissues that involve two affinity-chromatography steps and that facilitate the isolation of milligram
        quantities of highly purified proteins within 2--3 days.
      reference_section_type: ABSTRACT
- term:
    id: GO:0005515
    label: protein binding
  evidence_type: IPI
  original_reference_id: PMID:7138505
  review:
    summary: protein binding is an uninformative generic MF term. The only well-characterized protein-protein
      interaction of LDHB is its assembly into LDH homotetramers (and heterotetramers with LDHA), which is
      already captured by the more informative term GO:0042802 (identical protein binding). The cited
      reference (PMID:7138505) is an isoenzyme purification methods paper that does not provide specific
      interaction evidence.
