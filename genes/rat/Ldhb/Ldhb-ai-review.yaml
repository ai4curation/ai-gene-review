- term:
    id: GO:0005777
    label: peroxisome
  evidence_type: ISS
  original_reference_id: PMID:25247702
  review:
    summary: |-
      NEW annotation. Schueren et al. (2014) showed that a low-abundance LDHB isoform (LDHBx) is produced
      by translational readthrough that appends a conserved hidden PTS1 signal, targeting at least ~1.6% of
      total cellular LDHB to the peroxisome, where LDHBx can also co-import LDHA. The mechanism is conserved
      across mammals (the paper carries the Rats MeSH term), so it applies to rat LDHB by sequence
      conservation. This subcellular pool is absent from the existing GOA set but is well supported and is
      the basis for a new contextual cellular component annotation.
    action: NEW
    reason: Peroxisomal targeting of LDHB via readthrough-generated LDHBx is documented in mammals and
      conserved, justifying a new GO:0005777 (peroxisome) annotation for rat Ldhb. Evidence type is ISS
      because the experimental demonstration was in human cells and is transferred to rat by conservation of
      the stop-codon context and PTS1.
    supported_by:
    - reference_id: PMID:25247702
      supporting_text: at least 1.6% of the total cellular LDHB is targeted to the peroxisome by a conserved
        hidden PTS1.
      reference_section_type: ABSTRACT
