- id: file:rat/Ldhb/Ldhb-deep-research-falcon.md
  title: Falcon (Edison Scientific) deep research report on rat Ldhb (P42123)
  findings:
  - statement: |-
      Rat LDHB is the heart-type (LDH-H) subunit of lactate dehydrogenase (EC 1.1.1.27), an
      NAD(H)-dependent oxidoreductase catalyzing the reversible interconversion of pyruvate and L-lactate
      coupled to NADH/NAD+, with LDHB favoring the lactate-to-pyruvate direction.
    supporting_text: |-
      Ldhb encodes a subunit of **lactate dehydrogenase (LDH; EC 1.1.1.27)**, a **NAD(H)-dependent oxidoreductase** that catalyzes the reversible interconversion:
    reference_section_type: OTHER
  - statement: |-
      LDHB-associated direction is lactate to pyruvate with NAD+ reduced to NADH, while LDHA is commonly
      discussed as catalyzing the reverse direction.
    supporting_text: |-
      explicitly states the **LDHB-associated direction** as lactate→pyruvate with **NAD+ reduced to NADH** (while noting LDHA is commonly discussed as catalyzing the reverse direction).
    reference_section_type: OTHER
  - statement: |-
      Mammalian LDH is a tetramer assembled from the two principal subunits LDHA (muscle-type, M) and LDHB
      (heart-type, H), forming homotetramers and heterotetramers that tune glycolysis and redox balance.
    supporting_text: |-
      Mammalian LDH is a **tetramer** built from the two principal subunits **LDHA** (muscle-type; historically “M”) and **LDHB** (heart-type; historically “H”), producing a set of major isoenzymes that differ in catalytic properties and tissue distribution.
    reference_section_type: OTHER
  - statement: |-
      LDHB-rich (LDH-1, heart-type) isoenzymes have lower KM values for pyruvate (~0.1 mM) and NADH
      (~0.04 mM) than LDHA-rich (LDH-5) isoenzymes, consistent with specialization for lactate handling in
      oxidative tissues such as heart.
    supporting_text: |-
      - **LDH-1/LDHB**: KM(pyruvate) ≈ **0.1 mM**; KM(NADH) ≈ **0.04 mM**
    reference_section_type: OTHER
  - statement: |-
      LDHB is predominantly cytosolic, positioned at the end of glycolysis to regenerate NAD+ and
      interconvert lactate/pyruvate, shaping cytosolic redox balance.
    supporting_text: |-
      LDH is classically treated as a cytosolic enzyme positioned at the end of glycolysis to regenerate NAD+ and interconvert lactate/pyruvate, thereby shaping cytosolic redox balance.
    reference_section_type: OTHER
  - statement: |-
      A minor peroxisomal LDHB pool (LDHBx) is generated by translational readthrough that adds a hidden
      PTS1 signal; at least ~1.6% of cellular LDHB is targeted to peroxisomes and LDHBx can co-import LDHA,
      supporting peroxisomal redox-equivalent regeneration. This mechanism is conserved across mammals.
    supporting_text: |-
      A major mechanistic advance in subcellular targeting is the discovery that **a low-abundance peroxisomal LDHB isoform (LDHBx)** is generated through **translational readthrough**, adding a hidden **PTS1 peroxisome targeting signal**.
    reference_section_type: OTHER
  - statement: |-
      Direct mitochondrial lactate oxidation by LDHB is contested: in isolated rat soleus mitochondria, LDH
      activity was only ~0.7% of total and lactate alone did not support respiration, cautioning against
      overcalling mitochondrial LDHB localization/function.
    supporting_text: |-
      These data argue against robust direct mitochondrial lactate oxidation in this rat skeletal muscle context, emphasizing that mitochondrial LDH claims can be tissue- and preparation-dependent.
    reference_section_type: OTHER
