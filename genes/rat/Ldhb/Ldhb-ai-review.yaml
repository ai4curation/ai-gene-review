- term:
    id: GO:0005515
    label: protein binding
  evidence_type: IPI
  original_reference_id: PMID:7138505
  review:
    summary: protein binding is an uninformative generic MF term. The only well-characterized protein-protein
      interaction of LDHB is its assembly into LDH homotetramers (and heterotetramers with LDHA), which is
      already captured by the more informative term GO:0042802 (identical protein binding). The cited
      reference (PMID:7138505) is an isoenzyme purification methods paper that does not provide specific
      interaction evidence.
    action: MARK_AS_OVER_ANNOTATED
    reason: 'Generic ''protein binding'' adds no functional information per curation guidelines; the meaningful
      interaction (subunit oligomerization into LDH tetramers) is more precisely represented by GO:0042802.
      Falcon deep research confirms LDHB assembles into homotetramers/heterotetramers.'
    supported_by:
    - reference_id: file:rat/Ldhb/Ldhb-deep-research-falcon.md
      supporting_text: |-
        Mammalian LDH is a **tetramer** built from the two principal subunits **LDHA** (muscle-type; historically “M”) and **LDHB** (heart-type; historically “H”), producing a set of major isoenzymes that differ in catalytic properties and tissue distribution.
      reference_section_type: OTHER
