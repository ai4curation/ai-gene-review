    label: mitochondrial inner membrane
  evidence_type: ISS
  original_reference_id: GO_REF:0000024
  review:
    summary: |-
      mitochondrial inner membrane is retained as contextual support for Ldhb, but it is not the core
      function (ISS, GO_REF:0000024). Falcon deep research notes that LDH presence on the mitochondrial
      inner membrane (possibly via cardiolipin binding) has been reported in rat heart and skeletal muscle,
      but the association is contested and any mitochondrial pool is minor relative to the dominant cytosolic
      pool.
    action: KEEP_AS_NON_CORE
    reason: mitochondrial inner membrane records a minor, contested localization context for Ldhb, not the
      defining molecular function.
    supported_by:
    - reference_id: UniProtKB:P42123
      supporting_text: 'FUNCTION: Interconverts simultaneously and stereospecifically pyruvate and lactate with
        concomitant interconversion of NADH and NAD(+).'
    - reference_id: file:rat/Ldhb/Ldhb-deep-research-falcon.md
      supporting_text: |-
        A biochemical study on heart- vs muscle-type LDH interactions with acidic phospholipids cites literature for LDH presence on/in the **mitochondrial inner membrane**, including in **rat heart and skeletal muscle**, and proposes cardiolipin-mediated binding influenced by pH and nucleotide/cofactor environment.
      reference_section_type: OTHER
