description: Gsta1 encodes rat glutathione S-transferase alpha-1, a cytosolic detoxification enzyme that
  conjugates glutathione to electrophilic endogenous and xenobiotic substrates. The review accepts glutathione
  transferase activity and direct xenobiotic/glutathione-metabolism annotations as core or direct functions,
  while treating binding, localization, differentiation, and stimulus-response terms as non-core context.
