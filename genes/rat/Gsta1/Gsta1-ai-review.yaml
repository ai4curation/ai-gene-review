- id: file:rat/Gsta1/Gsta1-deep-research-falcon.md
  title: Falcon (Edison Scientific) deep research report on rat Gsta1 (P00502)
  findings:
  - statement: Falcon verified identity (UniProt P00502 = rat Gsta1, cytosolic alpha-class GST / GST A1-1 /
      ligandin) and corroborates the canonical phase II glutathione-conjugation function.
    supporting_text: |-
      **Glutathione S-transferases (GSTs)** are enzymes best known for catalyzing **phase II detoxification** reactions by promoting the **conjugation of reduced glutathione (GSH)** to a wide range of **electrophilic** endogenous and exogenous compounds, thereby increasing their solubility and facilitating elimination.
    reference_section_type: OTHER
  - statement: Falcon describes the cytosolic GST fold (homodimer, thioredoxin-like N-terminal domain, GSH
      G-site plus hydrophobic substrate site), corroborating the homodimerization and glutathione-binding
      annotations.
    supporting_text: |-
      Mammalian cytosolic GSTs are typically **homodimers** and have an N-terminal domain with a thioredoxin-like fold; they contain a **G-site** that binds GSH and a hydrophobic substrate-binding site.
    reference_section_type: OTHER
  - statement: Falcon corroborates alpha-class selenium-independent glutathione peroxidase (GPx)-like activity
      toward lipid and sterol hydroperoxides and conjugation of lipid-derived electrophiles such as 4-HNE,
      supporting the secondary peroxidase / oxidant-detoxification annotations.
    supporting_text: |-
      In mammalian systems, **A-class (alpha) GSTs** are noted for (i) high activity in detoxification pathways and (ii) **selenium-independent glutathione peroxidase (GPx)-like activity**, including reduction of lipid and sterol hydroperoxides in membranes. Anionic A-class enzymes are described as efficient catalysts for conjugation of lipid-derived electrophiles such as **4-hydroxynonenal (4-HNE)**.
    reference_section_type: OTHER
  - statement: Falcon supports cytosolic localization as the primary site of Gsta1 function.
    supporting_text: |-
      The evidence base supports the view that GSTs are primarily **cytosolic enzymes**, consistent with cytosolic GST fold proteins and classic phase II metabolism.
    reference_section_type: OTHER
  - statement: Falcon notes isomerase and non-enzymatic ligandin (ligand-binding) functions as recognized
      alpha-class GST activities, consistent with the steroid Delta-isomerase and binding annotations.
    supporting_text: |-
      - **Ligandin/binding functions** (non-enzymatic ligand binding; historically associated with alpha-class GSTs) (stoian2025modulationofglutathionestransferase pages 1-2)
    reference_section_type: OTHER
  - statement: Falcon explicitly cautions that the detailed small-molecule substrate list it reports is from a
      human GSTA1 table and must not be transferred to rat P00502 without direct rat evidence, since substrate
      specificity varies among the near-identical alpha paralogs (Gsta1 vs Gsta2/3/4). This caveat is the basis
      for keeping broad substrate-level annotations cautious and not asserting paralog-specific substrates.
    supporting_text: |-
      **Species transfer requires caution.** While mammalian alpha-class GSTs are functionally similar, substrate specificity can vary between paralogs (Gsta1 vs Gsta2/3/4) and species; thus, rat-specific experiments should be sought for precise annotation of P00502.
    reference_section_type: OTHER
