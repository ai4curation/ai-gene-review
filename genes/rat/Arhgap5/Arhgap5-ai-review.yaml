id: A0A0G2K7N9
gene_symbol: Arhgap5
product_type: PROTEIN
status: IN_PROGRESS
taxon:
  id: NCBITaxon:10116
  label: Rattus norvegicus
description: >-
  Arhgap5 (also known as p190-B or p190RhoGAP-B) encodes a Rho GTPase-activating protein (RhoGAP) that
  stimulates the intrinsic GTPase activity of Rho family members, converting them from the active GTP-bound
  state to the inactive GDP-bound state. The protein contains multiple functional domains including four FF
  domains, two pseudoGTPase domains (PG1 and PG2), and a C-terminal RhoGAP domain (UniProt A0A0G2K7N9).
  Arhgap5 may interact with RASA1/p120GAP via SH2 domain binding. It localizes to the cytoplasm and
  peripheral cell membrane. The protein participates in Rho protein signal transduction and is involved in
  multiple Rho family GTPase cycles including RHOA, RHOB, CDC42, RAC1, and others (Reactome). During normal
  mammary gland development, p190-B mRNA is highest in the virgin mammary gland and decreases during late
  pregnancy and lactation, with preferential expression in terminal end buds [PMID:10939588]. Overexpression
  disrupts the actin cytoskeleton, suggesting a role in regulating signaling pathways that influence cell
  migration and invasion [PMID:10939588]. Through its RhoGAP activity, Arhgap5 acts upstream of processes
  including regulation of cell size, cell migration, and mesenchymal cell proliferation.

existing_annotations:
- term:
    id: GO:0007266
    label: Rho protein signal transduction
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      Arhgap5 is a RhoGAP that stimulates the GTPase activity of Rho family members, directly placing it
      within the Rho protein signal transduction pathway. The IBA annotation is based on phylogenetic inference
      from orthologs including Drosophila (FB:FBgn0026375) and is consistent with Reactome annotations showing
      Arhgap5 participation in RHOA, RHOB, CDC42, RAC1, RHOD, RHOQ, RHOG, RHOJ, RHOF, RND1, RND2, and RND3
      GTPase cycles. UniProt confirms the protein is a GTPase-activating protein for Rho family members.
    action: ACCEPT
    reason: >-
      Rho protein signal transduction is a core function of Arhgap5. As a RhoGAP, the protein directly
      modulates Rho GTPase activity, which is the defining mechanism of Rho signal transduction. The IBA
      annotation is well-supported by domain architecture (RhoGAP domain confirmed by InterPro, Pfam, SMART,
      and CDD) and Reactome pathway membership in multiple Rho GTPase cycles.
    supported_by:
    - reference_id: GO_REF:0000033
      supporting_text: >-
        IBA annotation inferred from phylogenetic tree including FB:FBgn0026375, PANTHER:PTN002508977
    - reference_id: PMID:10939588
      supporting_text: >-
        One clone exhibited 87% homology to the human p190-B gene encoding a novel Rho-Gap

- term:
    id: GO:0005829
    label: cytosol
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      Cytosol localization is supported by IBA inference from orthologs (PANTHER:PTN002508977, UniProtKB:Q13017
      human ortholog). UniProt annotates the protein as localizing to the cytoplasm. The cytosol annotation is
      a more specific compartment within the cytoplasm and is consistent with the protein's role in cytoplasmic
      signaling.
    action: ACCEPT
    reason: >-
      Cytosol localization is consistent with the known function of Arhgap5 as a cytoplasmic signaling
      protein. The IBA annotation is phylogenetically supported. This is a core localization for the protein.
    supported_by:
    - reference_id: GO_REF:0000033
      supporting_text: >-
        IBA annotation inferred from PANTHER:PTN002508977 and UniProtKB:Q13017

- term:
    id: GO:0005096
    label: GTPase activator activity
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      GTPase activator activity is the primary molecular function of Arhgap5. The IBA annotation is based on
      phylogenetic inference from multiple orthologs (FB:FBgn0026375, MGI:MGI:1929494, PANTHER:PTN002508977,
      RGD:1308738, UniProtKB:Q9NRY4). The protein contains a well-characterized RhoGAP domain (aa 1262-1449)
      confirmed by PROSITE, Pfam, SMART, InterPro, and CDD. UniProt explicitly states the protein is a
      GTPase-activating protein for Rho family members.
    action: ACCEPT
    reason: >-
      This is the core molecular function of Arhgap5. The RhoGAP domain catalyzes the hydrolysis of
      GTP bound to Rho family GTPases. Domain architecture and phylogenetic evidence strongly support this
      annotation.
    supported_by:
    - reference_id: GO_REF:0000033
      supporting_text: >-
        IBA annotation inferred from FB:FBgn0026375, MGI:MGI:1929494, PANTHER:PTN002508977, RGD:1308738,
        UniProtKB:Q9NRY4
    - reference_id: PMID:10939588
      supporting_text: >-
        the human p190-B gene encoding a novel Rho-Gap

- term:
    id: GO:0008361
    label: regulation of cell size
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      Regulation of cell size is annotated via IBA based on phylogenetic inference from orthologs including
      Drosophila (FB:FBgn0026375) and mouse (MGI:MGI:1332637). Rho GTPases are known regulators of the
      actin cytoskeleton, and disruption of Rho signaling by RhoGAPs can affect cell morphology and size.
      The PMID:10939588 study shows that p190-B overexpression in MCF-10A cells resulted in disruption of
      the actin cytoskeleton, consistent with effects on cell shape/size.
    action: KEEP_AS_NON_CORE
    reason: >-
      While regulation of cell size is a downstream consequence of Rho GTPase modulation by Arhgap5, it is
      not the core evolved function of the protein. The core function is GTPase activation; cell size
      regulation is a downstream phenotypic effect. The IBA annotation is phylogenetically supported but
      represents a downstream biological process rather than a direct function.
    supported_by:
    - reference_id: GO_REF:0000033
      supporting_text: >-
        IBA annotation inferred from FB:FBgn0026375, MGI:MGI:1332637, PANTHER:PTN002508977
    - reference_id: PMID:10939588
      supporting_text: >-
        Transient transfection of a p190-B expression construct into MCF-10A human mammary epithelial cells
        resulted in disruption of the actin cytoskeleton

- term:
    id: GO:0005096
    label: GTPase activator activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000104
  review:
    summary: >-
      This IEA annotation transfers GTPase activator activity based on shared sequence features
      (UniRule:UR000415149). It is consistent with and broader confirmation of the IBA annotation for the
      same term.
    action: ACCEPT
    reason: >-
      Redundant with the IBA annotation but independently supported by sequence feature analysis. GTPase
      activator activity is the core molecular function of this protein. The IEA evidence provides additional
      computational support.

- term:
    id: GO:0005737
    label: cytoplasm
  evidence_type: IEA
  original_reference_id: GO_REF:0000044
  review:
    summary: >-
      Cytoplasm localization is annotated via IEA based on UniProtKB subcellular location mapping. UniProt
      explicitly states the protein localizes to the cytoplasm. This is a broader term than the IBA-annotated
      cytosol (GO:0005829), and both are valid.
    action: ACCEPT
    reason: >-
      Cytoplasm localization is well-supported by UniProt subcellular location annotation and is consistent
      with the more specific cytosol annotation. As a broader parent term it provides additional context.
    supported_by:
    - reference_id: GO_REF:0000044
      supporting_text: >-
        UniProtKB-SubCell:SL-0086 mapping to cytoplasm

- term:
    id: GO:0005886
    label: plasma membrane
  evidence_type: IEA
  original_reference_id: GO_REF:0000044
  review:
    summary: >-
      Plasma membrane localization is annotated via IEA based on UniProtKB subcellular location mapping.
      UniProt states the protein is a peripheral membrane protein associated with the cell membrane. This
      is consistent with the protein's role in signal transduction at the membrane where Rho GTPases are
      active.
    action: ACCEPT
    reason: >-
      Peripheral membrane localization is supported by UniProt annotation and is biologically consistent
      with Arhgap5's role in regulating membrane-associated Rho GTPases. Many RhoGAPs cycle between cytoplasm
      and membrane, and membrane localization likely reflects the active signaling state.
    supported_by:
    - reference_id: GO_REF:0000044
      supporting_text: >-
        UniProtKB-SubCell:SL-0039 mapping to cell membrane; peripheral membrane protein

- term:
    id: GO:0007165
    label: signal transduction
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: >-
      Signal transduction is annotated via IEA based on InterPro RhoGAP domain mapping (IPR000198). This
      is a very broad term; the more specific term GO:0007266 (Rho protein signal transduction) is already
      annotated via IBA.
    action: ACCEPT
    reason: >-
      While this is a broader parent of the more informative GO:0007266 (Rho protein signal transduction),
      it is not incorrect. The IEA mapping from InterPro domain is a valid computational inference. It is
      acceptable for IEA annotations to be broader than IBA annotations.

- term:
    id: GO:0005829
    label: cytosol
  evidence_type: IEA
  original_reference_id: GO_REF:0000107
  review:
    summary: >-
      Cytosol annotation transferred from Ensembl Compara ortholog mapping to human ARHGAP5
      (UniProtKB:Q13017). Consistent with the IBA annotation for the same term.
    action: ACCEPT
    reason: >-
      Redundant with IBA annotation but independently supported by Ensembl ortholog transfer. Cytosol
      localization is well-established for this protein.

- term:
    id: GO:0042169
    label: SH2 domain binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000107
  review:
    summary: >-
      SH2 domain binding is annotated via IEA from Ensembl Compara ortholog transfer from human ARHGAP5
      (UniProtKB:Q13017). This likely reflects the reported interaction between p190-B and RASA1/p120GAP,
      which contains SH2 domains. UniProt notes that Arhgap5 may interact with RASA1/p120GAP.
    action: ACCEPT
    reason: >-
      SH2 domain binding is consistent with the known interaction between p190-B RhoGAP and RASA1/p120GAP,
      which is an SH2-containing protein. This interaction is functionally relevant as it connects Ras and
      Rho signaling pathways. The annotation is independently supported by ISO evidence from RGD as well.
    supported_by:
    - reference_id: GO_REF:0000107
      supporting_text: >-
        Ensembl Compara ortholog transfer from UniProtKB:Q13017 (human ARHGAP5)

- term:
    id: GO:0005829
    label: cytosol
  evidence_type: ISO
  original_reference_id: GO_REF:0000121
  review:
    summary: >-
      Cytosol annotation transferred from human ortholog (UniProtKB:Q13017) by RGD ISO annotation.
      Consistent with IBA and IEA annotations for the same term.
    action: ACCEPT
    reason: >-
      Redundant with IBA and IEA annotations for cytosol. All three independent evidence lines converge on
      cytosol localization, providing strong support.

- term:
    id: GO:0030879
    label: mammary gland development
  evidence_type: ISO
  original_reference_id: GO_REF:0000121
  review:
    summary: >-
      Mammary gland development annotation transferred from mouse ortholog (MGI:MGI:1332637) via RGD ISO.
      This is consistent with the IEP annotation from PMID:10939588, which showed differential expression
      of p190-B in terminal end buds during mammary gland development in rats.
    action: KEEP_AS_NON_CORE
    reason: >-
      Mammary gland development is a tissue-specific developmental process that represents a downstream
      consequence of Rho GTPase regulation rather than a core molecular function. The expression evidence
      shows p190-B is differentially expressed during mammary development, but this is a pleiotropic
      downstream effect of Rho signaling modulation, not the core function of the protein.
    supported_by:
    - reference_id: PMID:10939588
      supporting_text: >-
        During normal mammary gland development, p190-B mRNA expression was highest in the virgin mammary
        gland and decreased during late pregnancy and lactation

- term:
    id: GO:0030879
    label: mammary gland development
  evidence_type: IEP
  original_reference_id: PMID:10939588
  review:
    summary: >-
      The IEP annotation is based on expression pattern data from PMID:10939588, which used in situ
      hybridization to show that p190-B is differentially expressed in terminal end buds (TEBs) of the
      mammary gland during development. Expression was highest in the outer layer of TEBs in virgin rats
      and decreased during late pregnancy and lactation. Note that IEP evidence indicates expression
      correlation, not direct functional involvement.
    action: KEEP_AS_NON_CORE
    reason: >-
      The evidence is expression-based (IEP), showing differential expression during mammary development.
      While this suggests a role in mammary gland development, it represents a tissue-specific downstream
      effect of general Rho signaling regulation. The qualifier in GOA is appropriately "involved_in"
      but the evidence is only expression correlation. Mammary gland development is not a core function of
      a broadly expressed RhoGAP.
    supported_by:
    - reference_id: PMID:10939588
      supporting_text: >-
        p190-B was detected in both the TEBs and the terminal ducts, with the highest expression observed
        in the outer layer of TEBs. During normal mammary gland development, p190-B mRNA expression was
        highest in the virgin mammary gland and decreased during late pregnancy and lactation

- term:
    id: GO:0002053
    label: positive regulation of mesenchymal cell proliferation
  evidence_type: ISO
  original_reference_id: GO_REF:0000121
  review:
    summary: >-
      Positive regulation of mesenchymal cell proliferation is annotated via ISO transfer from mouse ortholog
      (MGI:MGI:1332637). This is a downstream phenotypic effect of Rho GTPase signaling modulation.
      Rho GTPases regulate cell proliferation, and Arhgap5-mediated regulation of Rho activity could
      influence mesenchymal cell proliferation.
    action: KEEP_AS_NON_CORE
    reason: >-
      Regulation of mesenchymal cell proliferation is a downstream developmental/phenotypic consequence of
      Rho signaling modulation, not a core function of the RhoGAP. This is a context-specific biological
      process. The qualifier in GOA is "acts_upstream_of_or_within" which appropriately reflects the indirect
      nature of this involvement.

- term:
    id: GO:0030335
    label: positive regulation of cell migration
  evidence_type: ISO
  original_reference_id: GO_REF:0000121
  review:
    summary: >-
      Positive regulation of cell migration is annotated via ISO from mouse ortholog (MGI:MGI:1332637).
      This is consistent with the known role of Rho GTPases in cytoskeletal dynamics and cell migration.
      PMID:10939588 showed that p190-B overexpression disrupts the actin cytoskeleton, suggesting a role
      in regulating cell migration and invasion.
    action: KEEP_AS_NON_CORE
    reason: >-
      Cell migration regulation is a downstream consequence of Rho GTPase modulation by Arhgap5. While
      PMID:10939588 provides some evidence for a role in migration-related signaling, this is a pleiotropic
      downstream effect rather than a core function. The qualifier in GOA is "acts_upstream_of_or_within"
      which appropriately reflects the indirect involvement.
    supported_by:
    - reference_id: PMID:10939588
      supporting_text: >-
        Transient transfection of a p190-B expression construct into MCF-10A human mammary epithelial cells
        resulted in disruption of the actin cytoskeleton, which suggests a role for p190-B in regulating the
        signaling pathways that influence cell migration and invasion

- term:
    id: GO:0042169
    label: SH2 domain binding
  evidence_type: ISO
  original_reference_id: GO_REF:0000121
  review:
    summary: >-
      SH2 domain binding is annotated via ISO from human ortholog (UniProtKB:Q13017) by RGD. This reflects
      the reported interaction between p190-B and RASA1/p120GAP, an SH2-containing protein. UniProt notes
      that Arhgap5 may interact with RASA1/p120GAP.
    action: ACCEPT
    reason: >-
      SH2 domain binding is functionally relevant and reflects the interaction with RASA1/p120GAP, which
      connects Ras and Rho signaling pathways. This is supported by both ISO and IEA evidence and is
      consistent with the known biology of p190 RhoGAP proteins.

- term:
    id: GO:0008361
    label: regulation of cell size
  evidence_type: ISO
  original_reference_id: GO_REF:0000121
  review:
    summary: >-
      Regulation of cell size is annotated via ISO from mouse ortholog (MGI:MGI:1332637). This is consistent
      with the IBA annotation for the same term and reflects the downstream effects of Rho GTPase regulation
      on cell morphology.
    action: KEEP_AS_NON_CORE
    reason: >-
      Redundant with the IBA annotation. Regulation of cell size is a downstream consequence of Rho GTPase
      modulation, not a core function. Both IBA and ISO evidence support this as a real but non-core
      biological role.

