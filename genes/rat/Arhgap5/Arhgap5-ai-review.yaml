  description: >-
    Arhgap5 contains a RhoGAP domain (aa 1262-1449) that stimulates the intrinsic GTPase activity
    of Rho family proteins, converting them from the active GTP-bound to the inactive GDP-bound
    state. This is the defining molecular function of the protein, supported by domain architecture
    (RhoGAP domain confirmed by InterPro, Pfam, SMART, CDD), phylogenetic inference (IBA), and
    computational annotation (IEA). Reactome annotates Arhgap5 in RHOA, RHOB, CDC42, RAC1, and
    multiple other Rho GTPase cycles.
