      p190-B mRNA is differentially expressed in terminal end buds of the rat mammary gland, with
      highest expression in virgin glands. Overexpression disrupts the actin cytoskeleton in MCF-10A
      cells, suggesting a role in cell migration and invasion.
    supporting_text: >-
      Microdissection and differential display PCR were used to identify genes preferentially expressed
      in the highly proliferative terminal end buds (TEBs) in the mammary gland of 45-day-old virgin
      rats. One clone exhibited 87% homology to the human p190-B gene encoding a novel Rho-Gap ...
      Transient transfection of a p190-B expression construct into MCF-10A human mammary epithelial
      cells resulted in disruption of the actin cytoskeleton

