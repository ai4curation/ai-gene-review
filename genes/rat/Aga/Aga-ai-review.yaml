  - term:
      id: GO:0042802
      label: identical protein binding
    evidence_type: IDA
    original_reference_id: PMID:2775174
    review:
      summary: identical protein binding reflects the homo-oligomeric assembly of active Aga (a
        dimer of identical alpha/beta protomers / alpha2beta2 tetramer) rather than its defining
        molecular activity, so it is marked as over-annotated (IDA, PMID:2775174).
      action: MARK_AS_OVER_ANNOTATED
      reason: Falcon deep research clarifies that active Aga assembles by self-association of two
        identical alpha/beta heterodimers into an alpha2beta2 tetramer; the IDA identical protein
        binding annotation captures this oligomerization but is not informative of the enzyme's
        core catalytic function, so it is retained only as an over-annotation rather than removed.
      supported_by:
        - reference_id: PMID:2775174
          supporting_text: Rat liver glycosylasparaginase
            [N4-(beta-N-acetylglucosaminyl)-L-asparaginase, EC 3.5.1.26] was purified to
            homogeneity.
          reference_section_type: ABSTRACT
        - reference_id: file:rat/Aga/Aga-deep-research-falcon.md
          supporting_text: |-
            Mature AGA assembles as an active **αβ heterodimer** or more commonly an **α2β2 / (αβ)2 tetramer**, depending on species and preparation.
