  - id: file:rat/Aga/Aga-deep-research-falcon.md
    title: Falcon (Edison Scientific) deep research report on rat Aga (P30919, aspartylglucosaminidase)
    findings:
      - statement: Aga is the lysosomal amidase aspartylglucosaminidase (EC 3.5.1.26) that catabolizes
          N-linked glycoproteins.
        supporting_text: |-
          Aspartylglucosaminidase (AGA) is a lysosomal amidase (**EC 3.5.1.26**) required for catabolism of **N-linked glycoproteins**
        reference_section_type: OTHER
      - statement: Aga cleaves the Asn-GlcNAc amide bond in glycoasparagine degradation intermediates.
        supporting_text: |-
          it cleaves the **amide bond between N-acetylglucosamine (GlcNAc) in the glycan and the asparagine (Asn) side chain** (i.e., the Asn–GlcNAc linkage) in glycoasparagine degradation intermediates.
        reference_section_type: OTHER
      - statement: Aga is a soluble lysosomal hydrolase, not a cytoplasmic protein.
        supporting_text: AGA is a **soluble lysosomal hydrolase**.
        reference_section_type: OTHER
      - statement: Aga is trafficked to lysosomes via the mannose-6-phosphate pathway and secreted
          enzyme can be recaptured by M6P receptor-mediated endocytosis.
        supporting_text: |-
          trafficked to lysosomes through the **mannose-6-phosphate (M6P) pathway**, and secreted AGA can be **recaptured by M6P receptor–mediated endocytosis**
        reference_section_type: OTHER
      - statement: Aga acts at a terminal step of the lysosomal N-linked glycoprotein degradation pathway.
        supporting_text: |-
          AGA functions in the **lysosomal N-linked glycoprotein degradation pathway**, acting at a terminal step in which glycoasparagine intermediates are converted into products that can be fully catabolized.
        reference_section_type: OTHER
      - statement: Active Aga assembles by self-association of identical alpha/beta heterodimers into
          an alpha2beta2 tetramer.
        supporting_text: |-
          Mature AGA assembles as an active **αβ heterodimer** or more commonly an **α2β2 / (αβ)2 tetramer**, depending on species and preparation.
        reference_section_type: OTHER
      - statement: Aga is synthesized as a precursor that undergoes autocatalytic cleavage between
          Asp205 and Thr206, exposing the catalytic N-terminal Thr206 nucleophile (Ntn-hydrolase).
        supporting_text: |-
          Precursor molecules dimerize and undergo **autocatalytic cleavage** between **Asp205-Thr206**, generating **α** and **β** subunits; cleavage exposes the catalytic **N-terminal Thr206** nucleophile required for activity.
        reference_section_type: OTHER
      - statement: Rat liver Aga was purified as a ~49 kDa heterodimer with ~24 kDa alpha and ~20 kDa
          beta subunits, confirming the alpha/beta processing architecture.
        supporting_text: |-
          Rat liver glycosylasparaginase has been purified and characterized as an approximately **49 kDa heterodimer** with subunits around **24 kDa (α)** and **20 kDa (β)**, providing direct rat evidence of the expected α/β processing architecture.
        reference_section_type: OTHER
      - statement: Aga deficiency causes the lysosomal storage disorder aspartylglucosaminuria (AGU)
          with accumulation of uncleaved glycoasparagines.
        supporting_text: |-
          AGA deficiency causes **aspartylglucosaminuria (AGU)**, a lysosomal storage disorder characterized by accumulation of **uncleaved glycoasparagines/aspartylglucosamine** in tissues and body fluids.
        reference_section_type: OTHER
