description: 'Aga encodes lysosomal glycosylasparaginase/aspartylglucosaminidase, which cleaves the GlcNAc-Asn
  linkage in N-linked glycopeptide degradation. The review accepts the specific N4-(beta-N-acetylglucosaminyl)-L-asparaginase
  activity and protein deglycosylation process, keeps lysosomal/secretory localization as context, and
  removes unsupported cytoplasmic, ND, and identical-protein-binding annotations.'
