  - description: Tpi1 interconverts triose phosphates in glycolysis and gluconeogenesis.
    supported_by:
      - reference_id: UniProtKB:P48500
        supporting_text: 'FUNCTION: Triosephosphate isomerase catalyzes the interconversion between dihydroxyacetone
          phosphate and D-glyceraldehyde-3-phosphate in glycolysis and gluconeogenesis.'
    molecular_function:
      id: GO:0004807
      label: triose-phosphate isomerase activity
    directly_involved_in:
      - id: GO:0006096
        label: glycolytic process
      - id: GO:0006094
        label: gluconeogenesis
