id: P48500
gene_symbol: Tpi1
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:10116
  label: Rattus norvegicus
description: 'Tpi1 encodes cytosolic triose-phosphate isomerase, which interconverts dihydroxyacetone
  phosphate and glyceraldehyde-3-phosphate in glycolysis and gluconeogenesis. The review accepts the specific
  isomerase activity and central carbohydrate pathway annotations, keeps cytosolic localization, homodimerization,
  and methylglyoxal side activity as non-core, modifies broad isomerase/glucose terms, and removes uninformative
  protein-binding annotation.'
