id: P48500
gene_symbol: Tpi1
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:10116
  label: Rattus norvegicus
description: 'Tpi1 encodes cytosolic triose-phosphate isomerase, which interconverts dihydroxyacetone
  phosphate and glyceraldehyde-3-phosphate in glycolysis and gluconeogenesis. The review accepts the specific
  isomerase activity and central carbohydrate pathway annotations, keeps cytosolic localization and
  homodimerization as non-core, marks the methylglyoxal synthase/biosynthetic-process annotations as
  over-annotations (methylglyoxal is a minor non-negligible side-product of isomerization, not a dedicated
  enzyme function, with no evidence rat Tpi1 is a bona fide methylglyoxal synthase), modifies broad
  isomerase/glucose terms, and removes the uninformative protein-binding annotation. Enriched with falcon
  (Edison Scientific) deep research, which corroborates the canonical DHAP/G3P isomerase function, obligate
  homodimer/cis-enediol mechanism, cytosolic localization, and the methylglyoxal interpretation.'
