  - term:
      id: GO:0008929
      label: methylglyoxal synthase activity
    evidence_type: IEA
    original_reference_id: GO_REF:0000120
    review:
      summary: methylglyoxal synthase activity is an over-annotation for Tpi1. The "methylglyoxal
        synthase" label reflects a non-enzymatic/non-negligible side-reaction (beta-elimination of
        phosphate from the enediol intermediate), not a dedicated enzymatic function. Falcon deep
        research found no evidence that rat Tpi1/P48500 is a bona fide methylglyoxal synthase and
        interprets the methylglyoxal-related literature as dicarbonyl-stress/modification biology
        affecting TPI rather than a distinct primary enzyme activity (IEA, GO_REF:0000120).
      action: MARK_AS_OVER_ANNOTATED
      reason: methylglyoxal production is a minor, mechanistically unavoidable byproduct of triose
        phosphate isomerization rather than a discrete molecular function of Tpi1; annotating it as a
        standalone methylglyoxal synthase activity over-states this side-reaction.
      supported_by:
        - reference_id: UniProtKB:P48500
          supporting_text: 'FUNCTION: It is also responsible for the non-negligible production of
            methylglyoxal a reactive cytotoxic side-product that modifies and can alter proteins, DNA
            and lipids.'
        - reference_id: file:rat/Tpi1/Tpi1-deep-research-falcon.md
          supporting_text: |-
            no retrieved evidence supports rat P48500 being a bona fide methylglyoxal synthase, so the methylglyoxal-related literature is best interpreted as modification/stress biology affecting TPI rather than a different primary enzyme function.
          reference_section_type: OTHER
