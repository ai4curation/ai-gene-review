  - id: file:rat/Tpi1/Tpi1-deep-research-falcon.md
    title: Falcon (Edison Scientific) deep research report on rat Tpi1 (UniProt P48500)
    findings:
      - statement: Falcon confirms gene identity (rat Tpi1 / P48500) and the canonical reaction
          catalyzed by triosephosphate isomerase, the reversible interconversion of the triose
          phosphates DHAP and G3P, as the primary molecular function.
        supporting_text: |-
          **Triosephosphate isomerase 1 (TPI1)** catalyzes the **reversible interconversion** of the triose phosphates
        reference_section_type: OTHER
      - statement: Falcon describes TPI as a cofactor-independent homodimeric enzyme in which
          dimerization is required for catalytic activity, supporting the homodimerization annotation
          as functionally relevant context.
        supporting_text: |-
          each monomer contributes a catalytic site but **dimerization is required for activity**
