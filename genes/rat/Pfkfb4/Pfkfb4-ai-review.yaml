description: 'Pfkfb4 encodes a bifunctional 6-phosphofructo-2-kinase/fructose-2,6-bisphosphatase. It both synthesizes
  and degrades fructose 2,6-bisphosphate, a regulator of glycolysis and gluconeogenesis. The review accepts the
  two catalytic activities and fructose 2,6-bisphosphate metabolism as direct functions, modifies generic catalytic
  activity, and keeps ATP binding, cytosol/complex, glycolysis, and gluconeogenesis as context.'
