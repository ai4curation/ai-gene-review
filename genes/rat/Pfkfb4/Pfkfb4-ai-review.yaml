- id: file:rat/Pfkfb4/Pfkfb4-deep-research-falcon.md
  title: 'Falcon (Edison Scientific) deep research report: Pfkfb4 (rat, UniProt P25114) functional annotation'
  findings:
  - statement: Falcon confirms the gene identity (UniProt P25114, rat Pfkfb4) as the testis-type member
      of the bifunctional PFKFB1-4 family, with two independent catalytic domains.
    supporting_text: |-
      PFKFB enzymes are **bifunctional homodimers** with **two independent catalytic domains**: an **N-terminal kinase (PFK-2)** domain that synthesizes F-2,6-BP and a **C-terminal phosphatase (FBPase-2)** domain that degrades F-2,6-BP.
    reference_section_type: OTHER
  - statement: Falcon corroborates the two opposing catalytic activities and their EC numbers, consistent
      with the existing kinase and phosphatase annotations.
    supporting_text: |-
      Fructose-2,6-bisphosphate is produced from fructose-6-phosphate by **6-phosphofructo-2-kinase (PFK-2; EC 2.7.1.105)** and hydrolyzed by **fructose-2,6-bisphosphatase (FBPase-2; EC 3.1.3.46)**; in mammals these opposing activities occur within the same bifunctional PFKFB enzymes.
    reference_section_type: OTHER
  - statement: Falcon describes the metabolic role of fructose-2,6-bisphosphate as a potent allosteric
      regulator that activates PFK1 and inhibits fructose-1,6-bisphosphatase, supporting the glycolysis
      and gluconeogenesis process annotations as downstream regulatory context.
    supporting_text: |-
      At **submicromolar concentrations**, it stimulates glycolysis and inhibits gluconeogenesis by:
    reference_section_type: OTHER
  - statement: Falcon supports the cytosolic localization annotation as the primary family-level evidence,
      noting nuclear staining is a human-cancer context not to be generalized to rat.
    supporting_text: |-
      **Cellular component:** primary evidence supports a **cytosolic** enzyme family location; nuclear staining has been observed in a human COAD context but should not be treated as canonical for rat without direct validation.
    reference_section_type: OTHER
  - statement: Falcon confirms the testis-enriched expression matching the UniProt testis-type isozyme identity.
    supporting_text: |-
      PFKFB4 is repeatedly described as being **mainly expressed in the testes** and as the **testis isoform** within the four PFKFB genes
    reference_section_type: OTHER
  - statement: Falcon notes PFKFB4 has a kinase-biased activity ratio (recombinant human kinase ~4.3-fold
      greater than phosphatase), consistent with retaining both catalytic activities as core functions.
    supporting_text: |-
      Recombinant PFKFB4 kinase activity 4.3-fold greater than phosphatase activity
    reference_section_type: OTHER
