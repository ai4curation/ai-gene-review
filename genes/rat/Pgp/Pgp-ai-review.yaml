- id: PMID:26755581
  title: 'Identification of a mammalian glycerol-3-phosphate phosphatase: Role in metabolism and signaling in pancreatic beta-cells
    and hepatocytes'
  findings: []
- id: file:rat/Pgp/Pgp-deep-research-falcon.md
  title: 'Falcon (Edison Scientific) deep research report: rat Pgp (UniProt D3ZDK7), glycerol-3-phosphate phosphatase (G3PP/PGP/AUM)'
  findings:
  - statement: |-
      The best-supported physiological function of rat Pgp is glycerol-3-phosphate phosphatase (G3PP), catalyzing Gro3P -> glycerol + phosphate and operating a "glycerol shunt".
    supporting_text: |-
      catalyzing **glycerol-3-phosphate (Gro3P) → glycerol + inorganic phosphate** and thereby operating a **“glycerol shunt”**
    reference_section_type: OTHER
  - statement: |-
      Despite the historical name phosphoglycolate phosphatase, Gro3P is the dominant physiological substrate because cellular Gro3P is near the enzyme Km while 2-phosphoglycolate is orders of magnitude lower.
    supporting_text: |-
      the 2016 data argue that **Gro3P is the dominant physiological substrate** in the tested mammalian contexts because cellular Gro3P levels are in the low-mM range (near the enzyme Km), while measured **2-phosphoglycolate** levels were orders of magnitude lower.
    reference_section_type: OTHER
  - statement: |-
      Measured cellular 2-phosphoglycolate in hepatocytes is far below Gro3P and below enzyme Km, so 2-PG is unlikely to be the main physiological substrate.
    supporting_text: |-
      measured cellular 2-PG in hepatocytes was **<0.02 mM**, far below Gro3P (**~2–4.5 mM**) and below enzyme Km, arguing that 2-PG is unlikely the main physiological substrate in these settings
    reference_section_type: OTHER
  - statement: |-
      In beta-cells, G3PP knockdown increases glucose-stimulated insulin secretion while overexpression decreases it.
    supporting_text: |-
      In β-cells, **G3PP knockdown increases glucose-stimulated insulin secretion (GSIS)**, while **overexpression decreases GSIS**
    reference_section_type: OTHER
  - statement: |-
      In primary rat hepatocytes, G3PP knockdown greatly increases gluconeogenesis while overexpression virtually abolishes it, supporting a role in negative regulation of gluconeogenesis.
    supporting_text: |-
      In primary rat hepatocytes, **G3PP knockdown greatly increased gluconeogenesis** (from glycerol and from pyruvate+lactate), while **hG3PP overexpression virtually abolished gluconeogenesis** in the reported conditions.
    reference_section_type: OTHER
  - statement: |-
      In vivo adenoviral liver overexpression in rats raised plasma glycerol and lowered hepatic glucose production from glycerol, plasma triglycerides, and body weight.
    supporting_text: |-
      Adenoviral liver overexpression in rats increased **plasma glycerol**, reduced **hepatic glucose production from glycerol** during glycerol load testing, lowered **plasma triglycerides**, reduced **body weight gain/body weight**
    reference_section_type: OTHER
  - statement: |-
      Native rat G3PP Vmax in INS832/13 beta-cell extracts was ~47 nmol/min/mg, matching the UniProt-reported rat kinetic value.
    supporting_text: |-
      Native rat G3PP activity Vmax in INS832/13 extracts: **~47 nmol·min−1·mg−1**
    reference_section_type: OTHER
  - statement: |-
      No direct subcellular localization experiment was retrieved; a soluble cytosolic site of action is inferred from the metabolic pathway logic.
    supporting_text: |-
      The available evidence in the retrieved sources supports a **soluble intracellular/cytosolic metabolic role**; no firm subcellular localization experiment was reported in the extracted passages.
    reference_section_type: OTHER
