id: D3ZDK7
gene_symbol: Pgp
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:10116
  label: Rattus norvegicus
description: Pgp encodes rat glycerol-3-phosphate phosphatase, the mammalian G3PP enzyme that hydrolyzes glycerol-3-phosphate
  to glycerol and thereby modulates glycerolipid, glucose, and energy metabolism. The review accepts the specific glycerol-phosphate
  phosphatase activities and closely related metabolic-process terms as core, while treating generic phosphatase and broad
  metabolic terms as less informative.
