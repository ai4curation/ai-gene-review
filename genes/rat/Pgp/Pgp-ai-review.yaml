  review:
    summary: The phosphoglycolate phosphatase activity annotation is plausible for Pgp but should be kept as non-core context
      rather than used to define the gene product function. Falcon deep research reinforces this non-core call, noting that
      despite the historical name, cellular 2-phosphoglycolate sits far below the enzyme Km whereas Gro3P is near Km, so
      Gro3P (not 2-PG) is the dominant physiological substrate.
    action: KEEP_AS_NON_CORE
    reason: The annotation is compatible with Pgp biology but is broader or more contextual than the core molecular function.
    supported_by:
    - reference_id: UniProtKB:D3ZDK7
      supporting_text: GO; GO:0008967; F:phosphoglycolate phosphatase activity; ISO:RGD.
