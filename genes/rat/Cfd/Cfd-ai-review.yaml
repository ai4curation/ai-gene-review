        reference_section_type: ABSTRACT
core_functions:
  - description: Cfd is the secreted factor D serine protease that activates the alternative 
      complement pathway by cleaving factor B in a C3b-containing complex.
    supported_by:
      - reference_id: UniProtKB:P32038
        supporting_text: 'FUNCTION: Serine protease that initiates the alternative pathway of the complement
          system. Activated CFD cleaves factor B when the latter is complexed with complement C3b, activating
          the C3 convertase of the alternative pathway.'
    molecular_function:
      id: GO:0004252
      label: serine-type endopeptidase activity
    directly_involved_in:
      - id: GO:0006957
        label: complement activation, alternative pathway
