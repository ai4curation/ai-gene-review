        supporting_text: Rat factor D has been purified to homogeneity (10,559-fold) from serum by 
          chromatography on CM-Sepharose Fast Flow, phenyl-Sepharose CL-4B and Mono S and has been 
          shown to resemble its human and mouse counterparts both in substrate specificity and in 
          its susceptibility to inhibition by the organophosphorous inhibitor 
          di-isopropylfluorophosphate.
        reference_section_type: ABSTRACT
