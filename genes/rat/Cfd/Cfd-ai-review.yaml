    title: Reduced adipsin mRNA and circulating adipsin protein are modulated by adrenal steroids in
      obese Zucker rats.
    findings:
      - statement: For Cfd, this publication was assessed for annotations including extracellular 
          region.
        supporting_text: The data show that both adipsin mRNA and adipsin protein are reduced in 
          obese compared with lean rats and that adrenalectomy restores these values toward normal 
          in obese rats.
        reference_section_type: ABSTRACT
