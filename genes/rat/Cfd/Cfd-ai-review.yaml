id: P32038
gene_symbol: Cfd
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:10116
  label: Rattus norvegicus
description: 'Cfd encodes complement factor D/adipsin, a secreted serine protease that cleaves factor
  B in the C3b-factor B complex to initiate the alternative complement pathway. The review accepts serine
  endopeptidase and alternative complement pathway annotations, keeps extracellular/maturation context
  as non-core, and removes developmental or Notch-response annotations that reflect expression changes
  rather than Cfd function.'
existing_annotations:
  - term:
      id: GO:0004252
      label: serine-type endopeptidase activity
    evidence_type: IBA
    original_reference_id: GO_REF:0000033
    review:
      summary: serine-type endopeptidase activity is retained for Cfd because it matches the 
        documented core enzymatic role or its direct pathway consequence (IBA, GO_REF:0000033).
      action: ACCEPT
      reason: serine-type endopeptidase activity is directly supported by the curated function of
        Cfd and is not merely a downstream phenotype or expression response.
      supported_by:
        - reference_id: UniProtKB:P32038
          supporting_text: 'FUNCTION: Serine protease that initiates the alternative pathway of the complement
            system. Activated CFD cleaves factor B when the latter is complexed with complement C3b, activating
            the C3 convertase of the alternative pathway.'
        - reference_id: file:rat/Cfd/Cfd-deep-research-falcon.md
          supporting_text: |-
            Complement factor D (CFD) is the **essential serine protease** that drives formation of the alternative pathway C3 convertase by **cleaving complement factor B (FB/CFB)** *only after* factor B binds to C3b (surface) or hydrolyzed C3 (fluid-phase C3(H2O)).
  - term:
      id: GO:0051604
      label: protein maturation
    evidence_type: IBA
    original_reference_id: GO_REF:0000033
    review:
      summary: protein maturation is retained as contextual support for Cfd, but it is not the core 
        function (IBA, GO_REF:0000033).
      action: KEEP_AS_NON_CORE
      reason: protein maturation records localization, cofactor/substrate binding, oligomeric state,
        or physiological context rather than the defining molecular activity of Cfd.
      supported_by:
        - reference_id: UniProtKB:P32038
          supporting_text: 'FUNCTION: Serine protease that initiates the alternative pathway of the complement
            system. Activated CFD cleaves factor B when the latter is complexed with complement C3b, activating
            the C3 convertase of the alternative pathway.'
        - reference_id: file:rat/Cfd/Cfd-deep-research-falcon.md
          supporting_text: |-
            CFD is synthesized as **pro-factor D (pro-FD)** and is converted to mature factor D in blood primarily by **MASP-3** (mannan-binding lectin–associated serine protease-3), positioning MASP-3 as an upstream controller of AP readiness.
  - term:
      id: GO:0004175
      label: endopeptidase activity
    evidence_type: IEA
    original_reference_id: GO_REF:0000117
    review:
      proposed_replacement_terms:
        - id: GO:0004252
          label: serine-type endopeptidase activity
      summary: endopeptidase activity captures part of Cfd biology, but more specific replacement 
        term(s) better represent the supported function (IEA, GO_REF:0000117).
      action: MODIFY
      reason: 'endopeptidase activity is too broad or imprecise for Cfd; replace with the more specific
        supported term(s): GO:0004252 serine-type endopeptidase activity.'
      supported_by:
        - reference_id: UniProtKB:P32038
          supporting_text: 'FUNCTION: Serine protease that initiates the alternative pathway of the complement
            system. Activated CFD cleaves factor B when the latter is complexed with complement C3b, activating
            the C3 convertase of the alternative pathway.'
        - reference_id: file:rat/Cfd/Cfd-deep-research-falcon.md
          supporting_text: |-
            Rat CFD (Cfd/adipsin; UniProt P32038) should be annotated as a **secreted trypsin-like serine endopeptidase** of the alternative complement pathway that **cleaves factor B only efficiently when factor B is complexed with C3b/C3(H2O)**, enabling formation of the alternative pathway C3 convertase (C3bBb or C3(H2O)Bb).
