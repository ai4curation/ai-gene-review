  - id: file:rat/Cfd/Cfd-deep-research-falcon.md
    title: 'Falcon (Edison Scientific) deep research report: rat Cfd (P32038), complement factor D / adipsin'
    findings:
      - statement: Falcon confirms rat Cfd encodes complement factor D / adipsin, the secreted
          serine protease that is the rate-limiting enzyme of the alternative complement pathway,
          and that the UniProt-provided P32038 description matches.
        supporting_text: |-
          The user-specified target is **Rattus norvegicus Cfd** encoding **Complement factor D (CFD)**, also known as **adipsin**. In the retrieved 2023–2024 literature, *CFD*, *factor D*, and *adipsin* are consistently used as synonyms for the same secreted ~24 kDa serine protease that is the rate-limiting enzyme of the alternative complement pathway (AP).
        reference_section_type: OTHER
      - statement: Falcon corroborates the core molecular function and biological process - factor D
          cleaves factor B only after factor B binds C3b/C3(H2O), generating Ba and Bb and forming
          the alternative pathway C3 convertase.
        supporting_text: |-
          Complement factor D (CFD) is the **essential serine protease** that drives formation of the alternative pathway C3 convertase by **cleaving complement factor B (FB/CFB)** *only after* factor B binds to C3b (surface) or hydrolyzed C3 (fluid-phase C3(H2O)).
        reference_section_type: OTHER
      - statement: Falcon documents the product of the cleavage reaction (Ba and Bb fragments and the
          C3bBb / C3(H2O)Bb convertases), supporting the alternative complement pathway annotation.
        supporting_text: |-
          This cleavage produces **Ba and Bb** fragments and yields the active convertases **C3bBb** (surface) and **C3(H2O)Bb** (fluid).
        reference_section_type: OTHER
      - statement: Falcon describes factor D's defining substrate specificity for C3b-bound factor B,
          a hallmark of the serine-type endopeptidase activity annotation.
        supporting_text: |-
          CFD exhibits extreme substrate preference: it cleaves factor B efficiently only in the **C3bB (pro-convertase) complex**, and activity on **free factor B** is negligible.
        reference_section_type: OTHER
      - statement: Falcon notes factor D activity is rate-limiting for AP C3 convertase generation,
          underscoring its central catalytic role in the pathway.
        supporting_text: |-
          Reviews emphasize that factor D activity is rate-limiting for AP C3 convertase generation, such that changes in CFD abundance or activity modulate AP output.
        reference_section_type: OTHER
      - statement: Falcon corroborates the zymogen activation / protein maturation context - CFD is
          synthesized as pro-FD and matured in blood primarily by MASP-3.
        supporting_text: |-
          CFD is synthesized as **pro-factor D (pro-FD)** and is converted to mature factor D in blood primarily by **MASP-3** (mannan-binding lectin–associated serine protease-3), positioning MASP-3 as an upstream controller of AP readiness.
        reference_section_type: OTHER
      - statement: Falcon supports the extracellular localization annotation - CFD's canonical
          alternative pathway function occurs extracellularly, in plasma and tissue interstitial spaces.
        supporting_text: |-
          CFD’s canonical AP function occurs **extracellularly**, particularly in **plasma** and extracellular tissue compartments where C3bB complexes form.
        reference_section_type: OTHER
      - statement: Falcon explains the adipsin/adipokine name via predominant adipocyte production,
          consistent with the secreted extracellular role.
        supporting_text: |-
          CFD is widely described as being produced predominantly by **adipocytes**, explaining the historical adipokine name **adipsin**.
        reference_section_type: OTHER
      - statement: Falcon's annotation conclusion summarizes rat Cfd (P32038) as a secreted
          trypsin-like serine endopeptidase of the alternative complement pathway.
        supporting_text: |-
          Rat CFD (Cfd/adipsin; UniProt P32038) should be annotated as a **secreted trypsin-like serine endopeptidase** of the alternative complement pathway that **cleaves factor B only efficiently when factor B is complexed with C3b/C3(H2O)**, enabling formation of the alternative pathway C3 convertase (C3bBb or C3(H2O)Bb).
        reference_section_type: OTHER
