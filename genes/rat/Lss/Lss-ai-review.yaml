description: 'Lss encodes lanosterol synthase/2,3-oxidosqualene cyclase, an endoplasmic-reticulum-associated
  enzyme that cyclizes (S)-2,3-epoxysqualene to lanosterol in sterol and cholesterol biosynthesis. The
  review accepts lanosterol synthase activity and cholesterol/sterol biosynthesis annotations, keeps membrane/lipid-droplet
  and lens protein-stability contexts as non-core, and modifies generic transferase or sterol-metabolism
  parents to the specific activity/pathway.'
