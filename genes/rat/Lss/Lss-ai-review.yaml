  - id: file:rat/Lss/Lss-deep-research-falcon.md
    title: 'Falcon (Edison Scientific) deep research report: rat Lss (lanosterol synthase /
      oxidosqualene cyclase; UniProt P48450)'
    findings:
      - statement: Falcon confirms the core catalytic function of rat Lss as the oxidosqualene
          cyclase that forms lanosterol, the gateway reaction of the cyclic sterol pathway.
