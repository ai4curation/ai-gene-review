- id: PMID:11453994
  title: Dichloromethane mediated in vivo selection and functional characterization of rat glutathione
    S-transferase theta 1-1 variants
  findings:
  - statement: For Gstt1, this publication provides direct evidence that rat GST T1-1 dehalogenates
      dichloromethane (supporting alkylhalidase activity and dichloromethane metabolic process), and that
      this dehalogenation is mutagenic (supporting the DNA modification over-annotation as a downstream
      consequence rather than the direct enzyme reaction).
    supporting_text: the dehalogenation of dichloromethane by GST T1-1 from rat was highly mutagenic and toxic
      to methylotrophic bacteria.
    reference_section_type: ABSTRACT
- id: PMID:12588193
  title: Glutathione transferase theta 1-1-dependent metabolism of the water disinfection byproduct
    bromodichloromethane
  findings:
  - statement: For Gstt1, this publication supports direct annotations to glutathione transferase activity.
    supporting_text: Bromodichloromethane (CHBrCl(2)), a prevalent drinking water disinfection byproduct, was
      previously shown to be mutagenic in Salmonella that express rat GSH transferase (GST) theta 1-1 (GST
      T1-1).
    reference_section_type: ABSTRACT
- id: PMID:20097269
  title: Residue 234 is a master switch of the alternative-substrate activity profile of human and rodent
    theta class glutathione transferase T1-1
  findings:
  - statement: For Gstt1, this publication supports direct annotations to glutathione metabolic process;
      glutathione transferase activity.
