      alkylhalidase activity; dichloromethane metabolic process and contextual annotations to DNA
      modification.
    supporting_text: Methylobacterium dichloromethanicum DM4 is able to grow with dichloromethane as the sole
      carbon and energy source by using a dichloromethane dehalogenase/glutathione S-transferase (GST) for the
      conversion of dichloromethane to formaldehyde.
    reference_section_type: ABSTRACT
