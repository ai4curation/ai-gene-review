description: Gstt1 encodes rat glutathione S-transferase theta-1, a theta-class GST with glutathione
  transferase, glutathione peroxidase, and dichloromethane dehalogenase activities. The review accepts these
  experimentally supported catalytic activities and dichloromethane/glutathione metabolism as core/direct
  functions, while keeping exposure-response and localization annotations non-core.
