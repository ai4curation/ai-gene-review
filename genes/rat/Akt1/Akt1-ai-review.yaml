id: P47196
gene_symbol: Akt1
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:10116
  label: Rattus norvegicus
description: Akt1 encodes the rat RAC-alpha/PKB alpha serine/threonine kinase downstream of PI3K. Rat experiments support kinase activity and roles in insulin-responsive signaling, substrate phosphorylation, glucose transport/metabolism, cell survival, and growth-factor responses. The current ISO set is propagated mainly from human AKT1 and mouse Akt1; this review keeps the conserved kinase and canonical PI3K/insulin signaling functions, but removes or downranks many donor-derived developmental, neuronal, immune, stress-response, and highly context-specific terms as ISO over-annotation.
