id: O88267
gene_symbol: Acot1
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:10116
  label: Rattus norvegicus
description: Acot1 encodes rat cytosolic acyl-CoA thioesterase 1 (CTE-I), a long-chain acyl-CoA hydrolase that releases free
  fatty acids and CoA from saturated and unsaturated C12-C20 acyl-CoA substrates (no detectable activity on C8 or shorter).
  It is PPARalpha/HNF4alpha-inducible and acts in the cytosol to regulate intracellular acyl-CoA, free fatty acid, and CoA
  pools. The review accepts long-chain acyl-CoA hydrolase activity, long-chain fatty acid / acyl-CoA metabolic processes, and
  the defining cytosolic localization as core; it downranks generic hydrolase terms and broader pathway effects (e.g.
  cardioprotection), and flags two family-level over-annotations. The IBA peroxisome localization is flagged because rat Acot1
  is cytosolic (the peroxisomal localization belongs to the distinct Acot3-6 paralogs), and the IBA/ISO very long-chain fatty
  acid (C22+) process is flagged because Acot1's documented substrate range is long-chain C12-C20, so GO:0001676 (long-chain
  fatty acid metabolic process) is the accurate process term.
existing_annotations:
- term:
    id: GO:0000038
    label: very long-chain fatty acid metabolic process
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: This very long-chain fatty acid (VLCFA, C22+) annotation is an IBA phylogenetic inference made across the whole
      ACOT family panel (which includes paralogs with broader substrate ranges). Rat Acot1 is characterized as a long-chain
      (C12-C20) acyl-CoA thioesterase with no documented activity on substrates above C20 - UniProt records it as "More active
      towards saturated and unsaturated long chain fatty acyl-CoAs (C12-C20)" and the falcon deep research describes it
      exclusively as a long-chain thioesterase (C12-C20). VLCFA per GO:0000038 requires aliphatic tails of more than 22 carbons,
      which falls outside the experimentally supported substrate range; the closest accurate process term is GO:0001676
      (long-chain fatty acid metabolic process), which is separately annotated. This VLCFA term is therefore an over-annotation
      propagated from family members with different substrate ranges.
    action: MARK_AS_OVER_ANNOTATED
    reason: IBA family-level inference that conflicts with the experimentally documented C12-C20 (long-chain) substrate range
      for rat Acot1; very long-chain (C22+) activity is not supported by UniProt or the deep research, so the long-chain term
      GO:0001676 is the accurate process term.
    supported_by:
    - reference_id: UniProtKB:O88267
      supporting_text: 'FUNCTION: Catalyzes the hydrolysis of acyl-CoAs into free fatty acids and coenzyme A (CoASH), regulating
        their respective intracellular levels. More active towards saturated and unsaturated long chain fatty acyl-CoAs (C12-C20).'
    - reference_id: file:rat/Acot1/Acot1-deep-research-falcon.md
      supporting_text: |-
        ACOT1 is a **long-chain acyl-CoA thioesterase** with preference for **C12-C20** saturated and monounsaturated acyl-CoAs; no detectable activity is reported for acyl-CoAs of **C8 or shorter** in comparative ACOT1/2 studies.
