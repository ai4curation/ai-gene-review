- term:
    id: GO:0005777
    label: peroxisome
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: This peroxisome annotation is an IBA phylogenetic inference made across the whole ACOT family panel, which includes
      peroxisomal paralogs. Rat Acot1 is specifically a cytosolic enzyme - UniProt records its subcellular location as
      "Cytoplasm, cytosol" (PMID:9490035) with no peroxisomal localization, and the falcon deep research consistently
      places Acot1 in the cytosol while explicitly assigning the peroxisomal localization to the distinct paralogs Acot3-6.
      The peroxisome term is therefore an over-annotation propagated from family members with different localization.
    action: MARK_AS_OVER_ANNOTATED
    reason: IBA family-level localization that conflicts with experimental and review evidence placing rat Acot1 in the cytosol,
      not the peroxisome; the peroxisomal localization belongs to the distinct Acot3-6 paralogs.
    supported_by:
    - reference_id: UniProtKB:O88267
      supporting_text: 'SUBCELLULAR LOCATION: Cytoplasm, cytosol {ECO:0000269|PubMed:9490035}.'
    - reference_id: file:rat/Acot1/Acot1-deep-research-falcon.md
      supporting_text: |-
        In rodent ACOT clusters, **Acot1** is the **cytosolic** member; **Acot2** is **mitochondrial**; **Acot3-6** are **peroxisomal**.
