description: Acot1 encodes rat cytosolic acyl-CoA thioesterase 1, a long-chain acyl-CoA hydrolase that releases free fatty
  acids and CoA from saturated and unsaturated acyl-CoA substrates. The review accepts long-chain acyl-CoA hydrolase activity
  and direct fatty-acid metabolic roles as core, and downranks generic hydrolase terms and broader pathway effects.
