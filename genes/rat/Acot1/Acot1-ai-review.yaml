- id: file:rat/Acot1/Acot1-deep-research-falcon.md
  title: 'Falcon (Edison Scientific) deep research report: rat Acot1 (UniProt O88267)'
  findings:
  - statement: |-
      Acot1 is a cytosolic long-chain acyl-CoA thioesterase that hydrolyzes acyl-CoAs to free fatty acid plus CoA.
    supporting_text: |-
      Acot1 (acyl-CoA thioesterase 1) is described as a **cytosolic enzyme that hydrolyzes long-chain acyl-CoA esters** to free fatty acid plus CoA, with chain-length preference **C12–C20**.
    reference_section_type: OTHER
  - statement: |-
      Acot1 catalyzes the canonical thioesterase reaction acyl-CoA + water to free fatty acid + CoA.
    supporting_text: |-
      ACOT1 catalyzes **acyl-CoA + H2O → free fatty acid + CoA**.
    reference_section_type: OTHER
  - statement: |-
      Substrate preference is long-chain (C12-C20) acyl-CoAs, with no detectable activity on C8 or shorter, supporting the long-chain (not medium-chain) hydrolase assignment.
    supporting_text: |-
      ACOT1 is a **long-chain acyl-CoA thioesterase** with preference for **C12-C20** saturated and monounsaturated acyl-CoAs; no detectable activity is reported for acyl-CoAs of **C8 or shorter** in comparative ACOT1/2 studies.
    reference_section_type: OTHER
  - statement: |-
      Acot1 is the cytosolic ACOT family member; localization distinguishes it from mitochondrial Acot2 and peroxisomal Acot3-6, indicating the peroxisome annotation is a family-level over-annotation.
    supporting_text: |-
      In rodent ACOT clusters, **Acot1** is the **cytosolic** member; **Acot2** is **mitochondrial**; **Acot3-6** are **peroxisomal**.
    reference_section_type: OTHER
  - statement: |-
      Acot1/ACOT1 is consistently reported as cytosolic in comparative cluster analyses and reviews.
    supporting_text: |-
      Acot1/ACOT1 is consistently described as **cytosolic** in comparative gene-cluster analyses and reviews.
    reference_section_type: OTHER
  - statement: |-
      Acot1 restrains fatty-acid oxidative flux by hydrolyzing cytosolic acyl-CoAs, supporting a direct role in fatty acid / acyl-CoA metabolism.
    supporting_text: |-
      ACOT1 restrains fatty-acid oxidative flux by hydrolyzing cytosolic acyl-CoAs
    reference_section_type: OTHER
  - statement: |-
      ACOT1 has a cardioprotective role in diabetic heart, reducing oxidative stress and improving cardiac dysfunction via PPARalpha/PGC1alpha signaling.
    supporting_text: |-
      In diabetic heart, ACOT1 overexpression reduced oxidative stress and improved cardiac dysfunction via effects on PPARα/PGC1α signaling
    reference_section_type: OTHER
