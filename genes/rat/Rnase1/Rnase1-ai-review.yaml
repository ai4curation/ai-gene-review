- term:
    id: GO:0005576
    label: extracellular region
  evidence_type: IEA
  original_reference_id: GO_REF:0000044
  review:
    summary: |-
      The extracellular region is the primary functional compartment for Rnase1: as a signal-peptide-bearing secreted
      ptRNase it is routed through the secretory pathway and carries out its physiological RNA-degrading activity
      extracellularly, where it is not constrained by the cytosolic ribonuclease inhibitor. Retained as well-supported
      non-core localization context.
    action: KEEP_AS_NON_CORE
    reason: The localization is well supported and is the principal site of action, but it is context for, rather than equivalent to, the core molecular function (ribonuclease A activity).
    supported_by:
    - reference_id: UniProtKB:P00684
      supporting_text: GO; GO:0005576; C:extracellular region; IEA:UniProtKB-SubCell.
    - reference_id: file:rat/Rnase1/Rnase1-deep-research-falcon.md
      supporting_text: |-
        ptRNases are **vertebrate secreted endoribonucleases**. A defining feature is a **signal peptide** that routes these proteins through the secretory pathway, consistent with their predominant activity in extracellular compartments.
