    label: response to bacterium
  evidence_type: ISO
  original_reference_id: GO_REF:0000121
  review:
    summary: |-
      The link between Rnase1 and bacteria is indirect: bacterial extracellular vesicles repress endothelial RNASE1
      expression via LPS/TLR4 signaling, and RNase1 degrades extracellular RNA released during inflammation, rather
      than acting as a direct effector against bacteria. The broad 'response to bacterium' term is contextual and is
      retained as non-core.
