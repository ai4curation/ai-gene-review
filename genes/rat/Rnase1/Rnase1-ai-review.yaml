description: Rnase1 encodes the rat pancreatic RNase A-type ribonuclease, a secreted/cytosolic ribonuclease that cleaves RNA
  after pyrimidine nucleotides. The review accepts the RNase A/RNA nuclease activities as core and treats broad nucleic-acid
  binding, localization, and immune-response transfer annotations as non-core or low-specificity.
