- id: file:rat/Rnase1/Rnase1-deep-research-falcon.md
  title: 'Falcon (Edison Scientific) deep research: rat Rnase1 (P00684) functional annotation and translational context'
  findings:
  - statement: |-
      P00684 is explicitly confirmed as rat RNase1, a pancreatic-type ribonuclease (ptRNase/RNase A family),
      distinct from other RNase A-family members such as angiogenin/RNASE5.
    supporting_text: |-
      An authoritative review explicitly lists the UniProt accessions for RNase 1 homologs across species and identifies **rat RNase 1 as UniProtKB P00684**, alongside human P07998 and mouse P00683, confirming that P00684 corresponds to **rat RNase1** and not a different RNase family member (e.g., angiogenin/RNASE5).
    reference_section_type: OTHER
  - statement: |-
      RNase1 is a catalytic endoribonuclease with a conserved His/Lys catalytic triad that cleaves RNA via a
      2',3'-cyclic phosphodiester intermediate, supporting ribonuclease A activity as the core molecular function.
    supporting_text: |-
      RNase 1 is a **catalytic endoribonuclease** that cleaves RNA phosphodiester bonds. Mechanistically, ptRNases share a highly conserved active site in which **His12, Lys41, and His119** mediate catalysis; cleavage proceeds via formation of a **2′,3′-cyclic phosphodiester intermediate**, followed by hydrolysis in a second step.
    reference_section_type: OTHER
  - statement: |-
      Cleavage occurs on the 3' side of pyrimidine residues, the canonical chemical signature of RNase A-family
      catalysis, consistent with the GO:0004522 ribonuclease A activity definition.
    supporting_text: |-
      The ptRNase catalytic triad (two histidines and a lysine) enables cleavage of the **P–O5′ bond on the 3′ side of pyrimidine residues**, a canonical chemical signature of RNase A-family catalysis.
    reference_section_type: OTHER
  - statement: |-
      RNase1 is a nonspecific endoribonuclease preferring single-stranded RNA (poly(C) > poly(U) >> poly(A)) and
      can also cleave double-stranded RNA and RNA:DNA hybrids, supporting broad RNA nuclease activity.
    supporting_text: |-
      RNase 1 is widely described as a **nonspecific ribonuclease** with a characteristic preference for **single-stranded RNA** and, in humans, a substrate bias **poly(C) > poly(U) >> poly(A)**. RNase 1 can also cleave **double-stranded RNA** and **RNA:DNA hybrids**.
    reference_section_type: OTHER
  - statement: |-
      ptRNases including RNase1 are secreted endoribonucleases with a signal peptide that routes them through the
      secretory pathway, with predominant activity in extracellular compartments.
    supporting_text: |-
      ptRNases are **vertebrate secreted endoribonucleases**. A defining feature is a **signal peptide** that routes these proteins through the secretory pathway, consistent with their predominant activity in extracellular compartments.
    reference_section_type: OTHER
  - statement: |-
      Cytosolic ribonuclease inhibitor binds ptRNases with femtomolar affinity and blocks the active site, which is
      why RNase1 is framed as acting primarily extracellularly rather than as a broad intracellular RNase.
    supporting_text: |-
      A major regulatory concept for ptRNases is inhibition by the **cytosolic ribonuclease inhibitor (RI)**, which forms a **1:1 complex** with ptRNases and binds extremely tightly (**Kd ~10−15 M**), sterically blocking access to the active site. This helps explain why RNase 1 is often framed as acting primarily in **extracellular** contexts (where RI is less dominant) rather than as a broadly acting intracellular RNase.
    reference_section_type: OTHER
  - statement: |-
      The documented immune-relevant role of RNase1 is degradation of extracellular RNA (eRNA), which acts as a
      damage-associated molecular pattern (DAMP) promoting inflammation, rather than direct antibacterial killing.
    supporting_text: |-
      extracellular RNAs (often ribosomal RNA released from damaged cells) can act as **damage-associated molecular patterns (DAMPs)** that promote inflammation, endothelial barrier disruption, and coagulation-related signaling. RNase1 is positioned as a high-activity extracellular RNase that **degrades eRNA**, thereby limiting these downstream pathologies.
    reference_section_type: OTHER
  - statement: |-
      Direct rat functional evidence: in the Langendorff-perfused rat heart, exogenous RNase1 in perfusate protected
      tissue during ischemia/reperfusion, consistent with an extracellular enzyme acting on released eRNA.
    supporting_text: |-
      in the **Langendorff-perfused rat heart**, exogenous RNase1 applied in perfusate protected tissue during ischemia/reperfusion (I/R), which is consistent with an extracellular enzyme acting on released extracellular RNA (eRNA) during injury.
    reference_section_type: OTHER
core_functions:
- description: 'Rnase1 encodes rat pancreatic ribonuclease A, a secreted RNase A-family endoribonuclease. FUNCTION: Endonuclease
    that catalyzes the cleavage of RNA on the 3'' side of pyrimidine nucleotides via a His/Lys catalytic triad and a
    2'',3''-cyclic phosphodiester intermediate. Acts on single-stranded and double-stranded RNA (By similarity), with a
    nonspecific poly(C) > poly(U) >> poly(A) preference and activity on RNA:DNA hybrids. The enzyme functions
    predominantly in the extracellular space, where it degrades extracellular RNA (eRNA); rat ex vivo evidence
    (Langendorff-perfused heart) supports this protective extracellular role.'
  supported_by:
  - reference_id: UniProtKB:P00684
    supporting_text: 'FUNCTION: Endonuclease that catalyzes the cleavage of RNA on the 3'' side of pyrimidine nucleotides.
      Acts on single-stranded and double-stranded RNA (By similarity).'
  - reference_id: file:rat/Rnase1/Rnase1-deep-research-falcon.md
    supporting_text: |-
      RNase 1 is a **catalytic endoribonuclease** that cleaves RNA phosphodiester bonds. Mechanistically, ptRNases share a highly conserved active site in which **His12, Lys41, and His119** mediate catalysis; cleavage proceeds via formation of a **2′,3′-cyclic phosphodiester intermediate**, followed by hydrolysis in a second step.
  molecular_function:
