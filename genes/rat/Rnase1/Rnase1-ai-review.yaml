  review:
    summary: Rnase1 is a pancreatic ribonuclease A; the RNA nuclease activity annotation is supported by the fetched UniProt/GOA
      evidence (IBA, GO_REF:0000033) and represents a core or direct activity/process.
    action: ACCEPT
    reason: This term captures a directly supported part of Rnase1 core biochemistry or the closest GO process for that activity.
    supported_by:
    - reference_id: UniProtKB:P00684
      supporting_text: GO; GO:0004540; F:RNA nuclease activity; ISO:RGD.
    - reference_id: file:rat/Rnase1/Rnase1-deep-research-falcon.md
      supporting_text: |-
        RNase 1 is widely described as a **nonspecific ribonuclease** with a characteristic preference for **single-stranded RNA** and, in humans, a substrate bias **poly(C) > poly(U) >> poly(A)**. RNase 1 can also cleave **double-stranded RNA** and **RNA:DNA hybrids**.
- term:
    id: GO:0050830
    label: defense response to Gram-positive bacterium
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: |-
      This IBA term propagates a direct antibacterial defense role across the RNase A family tree, but the documented
      immune function of RNase1 specifically is degradation of extracellular RNA (eRNA), a damage-associated molecular
      pattern that drives sterile inflammation, rather than direct killing of Gram-positive bacteria. Direct
      antimicrobial/bactericidal activity is the hallmark of distinct RNase A-family members (e.g. RNase3/ECP, RNase7),
      not pancreatic RNase1. The falcon deep research, which surveys RNase1's immune biology in detail, describes its
      role as an eRNA-degrading counter-regulator of inflammation and provides no evidence for direct Gram-positive
      bactericidal activity. This term is therefore an over-annotation likely arising from family-level IBA transfer.
    action: MARK_AS_OVER_ANNOTATED
    reason: |-
      Direct antibacterial defense is not an established function of pancreatic RNase1; its documented immune role is
      degrading extracellular RNA (a DAMP). The Gram-positive defense term appears to be a family-level IBA
      over-annotation more appropriate to bactericidal RNase A members (RNase3/RNase7).
    supported_by:
    - reference_id: UniProtKB:P00684
      supporting_text: GO; GO:0050830; P:defense response to Gram-positive bacterium; IBA:GO_Central.
    - reference_id: file:rat/Rnase1/Rnase1-deep-research-falcon.md
      supporting_text: |-
        extracellular RNAs (often ribosomal RNA released from damaged cells) can act as **damage-associated molecular patterns (DAMPs)** that promote inflammation, endothelial barrier disruption, and coagulation-related signaling. RNase1 is positioned as a high-activity extracellular RNase that **degrades eRNA**, thereby limiting these downstream pathologies.
