  label: Rattus norvegicus
description: Ddo encodes rat D-aspartate oxidase, a peroxisomal FAD-dependent oxidase that degrades D-aspartate and related
  D-amino acids. The review keeps D-aspartate oxidase activity and D-amino-acid catabolism as the core function, retains peroxisomal
  localization and cofactor binding as non-core context, and downranks broader or phenotype-level inferences.
