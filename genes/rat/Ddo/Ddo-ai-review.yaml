- term:
    id: GO:0047821
    label: D-glutamate oxidase activity
  evidence_type: ISS
  original_reference_id: GO_REF:0000024
  review:
    summary: The D-glutamate oxidase annotation is not supported as an in-vivo rat Ddo function; the cited mammalian evidence
      distinguishes rat Ddo from C. elegans DDO-1 and does not support efficient D-glutamate degradation by rat Ddo.
    action: MARK_AS_OVER_ANNOTATED
    reason: Rat Ddo is best supported as D-aspartate/NMDA oxidase; D-glutamate oxidase over-extends the mammalian enzyme evidence.
    supported_by:
    - reference_id: UniProtKB:D3ZDM7
      supporting_text: 'FUNCTION: Has strict substrate specificity for D-aspartate and NMDA and no activity on L-amino acids
        or D-alanine (PubMed:25747990, PubMed:29292239, PubMed:32376478).'
