- id: file:rat/Ddo/Ddo-deep-research-falcon.md
  title: 'Falcon (Edison Scientific) deep research report: rat Ddo (D3ZDM7), D-aspartate oxidase (EC 1.4.3.1)'
  findings:
  - reference_section_type: OTHER
    supporting_text: |-
      **Ddo/DDO (D-aspartate oxidase; EC 1.4.3.1)** is an **FAD-containing flavoprotein** that catalyzes **oxidative deamination** of acidic D-amino acids to yield the corresponding **2-oxo acid**, **hydrogen peroxide (H2O2)**, and **ammonia (NH3)**
  - reference_section_type: OTHER
    supporting_text: |-
      In the case of **D-Asp**, the 2-oxo acid product is **oxaloacetate**
  - reference_section_type: OTHER
    supporting_text: |-
      DDO is **highly selective for acidic D-amino acids**, classically **D-Asp** and **D-glutamate (D-Glu)**
  - reference_section_type: OTHER
    supporting_text: |-
      the NMDA analog **N-methyl-D-aspartate (NMDA)** can be an efficient substrate; other D-amino acids are weak substrates
  - reference_section_type: OTHER
    supporting_text: |-
      Ddo is not a broad-spectrum D-amino acid oxidase (DAO-like), but rather a specialized enzyme controlling the pool of **acidic D-amino acids**
  - reference_section_type: OTHER
    supporting_text: |-
      DDO is an **FAD-dependent flavoenzyme**, and experimental recombinant preparations and assays include FAD, consistent with tight cofactor dependence
  - reference_section_type: OTHER
    supporting_text: |-
      peroxisomal localization positions DDO as a source of **peroxisomal H2O2**, linking Ddo activity not only to D-Asp turnover but also potentially to redox signaling/oxidative stress microdomains, depending on tissue context
  - reference_section_type: OTHER
    supporting_text: |-
      **Rat DASPO/DDO:** Km **2.3 mM**, kcat **31.1 s−1**, kcat/Km **14.1 s−1·mM−1**, specific activity **71.7 U/mg**
  - reference_section_type: OTHER
    supporting_text: |-
      D-Asp can stimulate **NMDA receptors** by binding the L-glutamate site, and DDO therefore indirectly modulates glutamatergic neurotransmission through D-Asp availability
  - reference_section_type: OTHER
    supporting_text: |-
      Ddo knockout is associated with **~10–20× higher brain D-Asp** in multiple regions, demonstrating that DDO-mediated catabolism strongly limits steady-state D-Asp
  - reference_section_type: OTHER
    supporting_text: |-
      rat Ddo likely contributes to endocrine regulation by limiting D-Asp in these tissues
core_functions:
- description: 'Ddo encodes rat D-aspartate oxidase, a peroxisomal FAD-dependent flavoenzyme that catalyzes the oxidative deamination
    of acidic D-amino acids. Its core (preferred) substrate is D-aspartate (and the NMDA analog N-methyl-D-aspartate), yielding
    the corresponding 2-oxo acid (oxaloacetate for D-aspartate), H2O2, and ammonia; other acidic D-amino acids such as D-glutamate
    are weaker substrates. By controlling tissue D-aspartate levels it indirectly modulates NMDA-receptor/glutamatergic signaling.'
  supported_by:
  - reference_id: UniProtKB:D3ZDM7
    supporting_text: Reaction=D-aspartate + O2 + H2O = oxaloacetate + H2O2 + NH4(+);
