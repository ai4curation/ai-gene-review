- term:
    id: GO:0047821
    label: D-glutamate oxidase activity
  evidence_type: ISS
  original_reference_id: GO_REF:0000024
  review:
    summary: D-glutamate is a genuine, acidic D-amino-acid substrate of DDO, although it is a much weaker substrate than D-aspartate.
      The rat UniProt record lists D-glutamate oxidation (RHEA:10028) as a catalytic activity by similarity, and falcon deep
      research confirms DDO is selective for acidic D-amino acids classically including D-glutamate. This is therefore a real
      but minor (non-core) activity rather than an over-annotation; the prior MARK_AS_OVER_ANNOTATED reasoning ("no activity")
      conflated the much lower turnover of D-glutamate with absence of activity.
    action: KEEP_AS_NON_CORE
    reason: D-glutamate is a bona fide but minor acidic D-amino-acid substrate of DDO; it is supported by similarity but is not
      the defining/core activity, which is D-aspartate oxidation.
    supported_by:
    - reference_id: UniProtKB:D3ZDM7
      supporting_text: Reaction=D-glutamate + O2 + H2O = 2-oxoglutarate + H2O2 + NH4(+);
    - reference_id: file:rat/Ddo/Ddo-deep-research-falcon.md
      supporting_text: |-
        DDO is **highly selective for acidic D-amino acids**, classically **D-Asp** and **D-glutamate (D-Glu)**
- term:
    id: GO:0047821
    label: D-glutamate oxidase activity
  evidence_type: ISO
  original_reference_id: GO_REF:0000121
  review:
    summary: D-glutamate is a genuine, acidic D-amino-acid substrate of DDO, although it is a much weaker substrate than D-aspartate.
      The rat UniProt record lists D-glutamate oxidation (RHEA:10028) as a catalytic activity by similarity, and falcon deep
      research confirms DDO acts on acidic D-amino acids beyond D-aspartate (e.g. D-Glu at ~12.8% of D-Asp activity). This is
      a real but minor (non-core) activity rather than an over-annotation.
    action: KEEP_AS_NON_CORE
    reason: D-glutamate is a bona fide but minor acidic D-amino-acid substrate of DDO; it is supported by similarity but is not
      the defining/core activity, which is D-aspartate oxidation.
    supported_by:
