- term:
    id: GO:0050877
    label: nervous system process
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  review:
    summary: The nervous system process annotation likely reflects indirect phenotype, expression, or pathway context rather
      than the direct conserved function of Ddo. Falcon deep research clarifies that any neural effect is mediated indirectly
      through DDO control of D-aspartate, which in turn modulates NMDA-receptor/glutamatergic signaling; the direct molecular
      activity remains acidic D-amino-acid oxidation, so this process term is best treated as downstream context.
    action: MARK_AS_OVER_ANNOTATED
    reason: This phenotype or tissue/developmental term overstates the direct functional role of Ddo; it is better treated
      as downstream context.
    supported_by:
    - reference_id: UniProtKB:D3ZDM7
      supporting_text: GO; GO:0050877; P:nervous system process; ISO:RGD.
    - reference_id: file:rat/Ddo/Ddo-deep-research-falcon.md
      supporting_text: |-
        D-Asp can stimulate **NMDA receptors** by binding the L-glutamate site, and DDO therefore indirectly modulates glutamatergic neurotransmission through D-Asp availability
