- id: file:rat/Sdsl/Sdsl-deep-research-falcon.md
  title: 'Falcon (Edison Scientific) deep research report: Rat Sdsl (UniProt A0A6N3IN21) functional annotation evidence, gaps, and best-supported inferences'
  findings:
  - statement: |-
      Falcon's tool-retrieved literature did not include the primary rat characterization paper (PMID:33079132); it could not independently re-verify the rat enzymology in this run and flags rat-specific enzymology and localization as high-priority curation gaps. The catalytic activities in this review nonetheless remain directly supported by the UniProt record and PMID:33079132 (the rat Sdsl characterization study by Katane et al.).
    supporting_text: |-
      Therefore, the report separates (i) **directly supported** statements from retrieved sources (mostly **human/mammalian SDSL**), from (ii) **inferences** relevant to rat Sdsl based on close family/structural evidence and cross-species homology.
    reference_section_type: OTHER
  - statement: |-
      Falcon independently corroborates the PLP-dependent catalytic architecture of mammalian SDSL: human SDSL (Q96GA7) is a PLP-dependent structural fold II enzyme with PLP visualized in the active site (PDB 2RKB). This supports the pyridoxal phosphate binding annotation.
    supporting_text: |-
      A 2023 structural analysis explicitly treats **human SDSL (UniProt Q96GA7)** as a **PLP-dependent structural fold II** enzyme, and visualizes **PLP in the active site** in the structure used for SDSL (PDB **2RKB**).
    reference_section_type: OTHER
  - statement: |-
      The C-terminal end of a conserved structural motif is positioned adjacent to (vicinal to) the catalytic PLP in fold II enzymes including SDSL, consistent with a PLP-associated active site.
    supporting_text: |-
      in fold II enzymes—including **SDSL**—the **C-terminal end of the motif is vicinal to PLP**, consistent with a role near the catalytic PLP site.
    reference_section_type: OTHER
  - statement: |-
      SDSL is ~61% identical to the canonical human L-serine dehydratase/L-threonine deaminase (P20132), supporting its membership in the serine/threonine dehydratase family and the plausibility of related PLP-dependent amino-acid chemistry.
    supporting_text: |-
      Aleshin & Bunik (2023) note that a **human L-serine dehydratase/L-threonine deaminase sequence (UniProt P20132)** is **61% identical to SDSL**, implying close relationship to canonical serine/threonine dehydratase-like enzymes
    reference_section_type: OTHER
  - statement: |-
      Disease-context finding (human, not a direct rat molecular function): SDSL is upregulated in heart failure and experimentally linked to cardiomyocyte apoptosis via PARP1/cleaved-PARP1 in AC16 cells. This is disease-association/expression evidence, not evidence of the rat protein's evolved catalytic function, and is recorded here as non-core context only.
    supporting_text: |-
      Wang et al. (Frontiers in Cardiovascular Medicine; received 2023-11-02, accepted 2023-12-19, published **2024-01-05**; https://doi.org/10.3389/fcvm.2023.1332287) report that **SDSL is upregulated in heart failure**, and experimentally link it to apoptosis signaling via **PARP1/cleaved-PARP1** in AC16 cardiomyocytes.
    reference_section_type: OTHER
  - statement: |-
      No subcellular localization (cytosol, mitochondrion, or nucleus) was established for SDSL in falcon's retrieved texts, so no cellular_component annotation can be supported from this evidence.
    supporting_text: |-
      no precise subcellular localization (e.g., cytosol, mitochondrion, nucleus) was established in the retrieved texts
    reference_section_type: OTHER
