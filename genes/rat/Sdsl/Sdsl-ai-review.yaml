description: Sdsl encodes rat serine dehydratase-like protein, a pyridoxal-phosphate-dependent multifunctional enzyme experimentally
  shown to deaminate L-serine and L-threonine and to racemize L- and D-glutamate. The review keeps the specific catalytic
  activities as core functions and removes the ND biological-process placeholder; protein/cofactor-binding terms are retained
  only as supporting, non-core annotations.
