taxon:
  id: NCBITaxon:10116
  label: Rattus norvegicus
description: Sdsl encodes rat serine dehydratase-like protein (UniProt A0A6N3IN21), a pyridoxal-phosphate-dependent multifunctional
  enzyme experimentally shown in the rat protein characterization study (PMID:33079132) to deaminate L-serine and L-threonine
  and to racemize L- and D-glutamate. It is a paralog of serine dehydratase (Sds) but is independently characterized; the
  catalytic activities here are established for the rat protein itself, not imported from Sds. The review keeps the specific
  catalytic activities as core functions and removes the ND biological-process placeholder; protein/cofactor-binding terms
  are retained only as supporting, non-core annotations. Falcon (Edison Scientific) deep research did not retrieve the rat
  characterization paper and so could not independently re-verify the enzymology in that run, flagging rat-specific enzymology
  and localization as gaps; it does independently corroborate the PLP-dependent fold II active-site architecture and serine/threonine
  dehydratase family membership, and adds a non-core human disease-association (SDSL upregulated in heart failure, promoting
  cardiomyocyte apoptosis via PARP1).
