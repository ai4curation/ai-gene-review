proposed_new_terms:
- proposed_name: N-acetyl-L-aspartate biosynthetic process
  proposed_definition: The chemical reactions and pathways resulting in the formation of N-acetyl-L-aspartate (NAA), typically
    via transfer of an acetyl group from acetyl-CoA to L-aspartate.
  justification: Nat8l's defining biological contribution is the synthesis of N-acetyl-L-aspartate (NAA), but no GO biological
    process term currently captures this specifically. OLS searches for 'N-acetyl-L-aspartate biosynthetic process' and 'N-acetylaspartate
    metabolic process' returned no existing GO term (checked via OLS, 2026-06). The only BP annotations available are generic
    (GO:0006531 aspartate metabolic process, shared by many aspartate-consuming enzymes across diverse pathways), which fail
    to distinguish Nat8l's specific role. A dedicated NAA biosynthetic process term would be the appropriate BP counterpart
    to the molecular function GO:0017188 (L-aspartate N-acetyltransferase activity).
  proposed_parent:
    id: GO:0046394
    label: carboxylic acid biosynthetic process
  supported_by:
  - reference_id: UniProtKB:D3ZVU9
    supporting_text: 'FUNCTION: Catalyzes the synthesis of N-acetylaspartate acid (NAA) from L-aspartate and acetyl-CoA (PubMed:18621030).'
  - reference_id: file:rat/Nat8l/Nat8l-deep-research-falcon.md
    supporting_text: |-
      *Rattus norvegicus* **Nat8l** encodes **N-acetylaspartate synthetase / aspartate N-acetyltransferase (NAT8L; Asp-NAT; EC 2.3.1.17)**, the enzyme that synthesizes **N-acetylaspartate (NAA)** from **acetyl‑CoA** and **L‑aspartate**.
