description: Nat8l encodes rat N-acetylaspartate synthetase, an acetyltransferase that forms N-acetyl-L-aspartate from L-aspartate
  and acetyl-CoA and is reported at intracellular membranes including mitochondria and microsomes. The review accepts the
  specific L-aspartate N-acetyltransferase activity as core and treats broad acetyltransferase, localization, and dopamine-uptake
  transfer annotations as non-core or overly broad.
