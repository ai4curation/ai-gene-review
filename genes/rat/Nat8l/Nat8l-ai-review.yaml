- term:
    id: GO:0006083
    label: acetate metabolic process
  evidence_type: ISO
  original_reference_id: GO_REF:0000121
  review:
    summary: Nat8l does not directly participate in acetate metabolism. Its product is N-acetylaspartate (NAA); acetate is
      generated two enzymatic steps and one cell-type boundary downstream, when oligodendroglial ASPA hydrolyzes NAA into
      acetate and aspartate. This term therefore over-annotates Nat8l with a downstream pathway product it does not produce.
    action: MARK_AS_OVER_ANNOTATED
    reason: Acetate is produced by ASPA in oligodendrocytes, not by Nat8l. Nat8l synthesizes NAA in neurons; the acetate it
      ultimately gives rise to is a downstream catabolite generated by a different enzyme in a different cell type, so this
      is an over-annotation rather than a direct or core function.
    supported_by:
    - reference_id: UniProtKB:D3ZVU9
      supporting_text: GO; GO:0006083; P:acetate metabolic process; ISO:RGD.
    - reference_id: file:rat/Nat8l/Nat8l-deep-research-falcon.md
      supporting_text: |-
        NAT8L initiates the **NAA pathway** in neurons. NAA is transferred to oligodendrocytes, where **ASPA hydrolyzes NAA → acetate + aspartate**; acetate supports **acetyl-CoA**, **lipid/myelin synthesis**, and acetylation reactions.
