- term:
    id: GO:0051586
    label: positive regulation of dopamine uptake involved in synaptic transmission
  evidence_type: ISO
  original_reference_id: GO_REF:0000121
  review:
    summary: The positive regulation of dopamine uptake involved in synaptic transmission annotation reflects an indirect,
      phenotype-level link (the Shati/Nat8l addiction-neurobiology literature connects Nat8l/NAA to dopaminergic signaling
      via neuroplasticity), not a direct molecular activity. Nat8l has no transporter or signaling activity at the synapse;
      its only established biochemical role is NAA synthesis. Notably, the falcon deep research does not mention dopamine at
      all, consistent with this being a peripheral, indirect connection rather than a core function.
    action: MARK_AS_OVER_ANNOTATED
    reason: Nat8l does not directly regulate dopamine uptake. Any effect on dopamine signaling is an indirect, downstream
      phenotypic consequence of altered NAA/neuroplasticity rather than a direct conserved molecular function, so this term
      overstates Nat8l's role and is better treated as downstream context.
    supported_by:
    - reference_id: UniProtKB:D3ZVU9
      supporting_text: GO; GO:0051586; P:positive regulation of dopamine uptake involved in synaptic transmission; ISO:RGD.
