- term:
    id: GO:0009268
    label: response to pH
  evidence_type: IDA
  original_reference_id: PMID:6137211
  qualifier: involved_in
  review:
    summary: >-
      O'Fagain et al. 1983 is a biophysical/enzyme-kinetics study of rat
      liver arylsulphatases showing pH dependence of activity with pK
      values 4.4-4.5 and 5.7-5.8, and proposing a general acid-base-
      catalysed mechanism. The paper measures how enzyme activity depends
      on assay pH (a property of the catalytic mechanism), not a biological
      response to pH process by the organism/cell.
    action: REMOVE
    reason: >-
      This annotation misinterprets an enzyme-kinetics observation
      (pH-dependent catalytic rate) as involvement in the biological
      process response to pH. Almost every enzyme has some pH dependence;
      that does not make it part of a cellular pH-response pathway. This
      IDA is a demonstrable mis-classification of the evidence and should
      be removed.
    supported_by:
    - reference_id: PMID:6137211
      supporting_text: >-
        The effect of pH on the kinetics of rat liver arylsulphatases A and
        B is very similar and shows that two groups with pK values of
        4.4-4.5 and 5.7-5.8 are important for enzyme activity
