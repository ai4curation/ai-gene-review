- id: PMID:19536613
  title: >-
    Cell-surface arylsulfatase A and B on sinusoidal endothelial cells,
    hepatocytes, and Kupffer cells in mammalian livers.
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified. Direct immunohistochemistry/EM evidence for
      cell-surface localisation of ARSA and ARSB in liver parenchymal and
      sinusoidal cell types. Supports the extra-lysosomal cell-surface
      annotation.
  findings:
  - statement: >-
      Mammalian ARSA and ARSB localise to the cell surface of sinusoidal
      endothelial cells, hepatocytes, and Kupffer cells in liver, in
      addition to their lysosomal localisation
    supporting_text: >-
      mammalian ARSA and ARSB exist on the cell surface of sinusoidal
      endothelial cells, hepatocytes, and sinusoidal macrophages (Kupffer
      cells), as well as in the lysosome. They are also colocalized with
      heparan sulfate proteoglycan.
- id: PMID:2290353
  title: >-
    Characterization of liver lysosomal enzyme activity in hepatocytes,
    Kupffer and endothelial cells during aging: effect of dietary
    restriction.
  reference_review:
    relevance: LOW
    correctness: MISCITED
    review_notes: >-
      PubMed-verified. Shows age- and diet-dependent changes in hepatic
      lysosomal enzyme activities (including Arsb) but does not demonstrate
      that Arsb is a component of a nutrient-response pathway.
  findings:
  - statement: >-
      Rat hepatic arylsulfatase B activity increases with age and is
      further elevated by dietary restriction in Kupffer/endothelial cells
    supporting_text: >-
      Rats exposed to dietary restriction (R) showed higher activities of
      beta-galactosidase, arylsulfatase B and cathepsin D when compared to
      corresponding A animals with the exception of the younger age group.
- id: PMID:24311516
  title: >-
    Arylsulfatase B modulates neurite outgrowth via astrocyte
    chondroitin-4-sulfate: dysregulation by ethanol.
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified with PMC full text. Mechanistically links astrocyte
      Arsb activity to chondroitin-4-sulfate and neurocan levels and to
      hippocampal neurite outgrowth; identifies ethanol-induced Arsb
      inhibition as a candidate mechanism for FASD.
  findings:
  - statement: >-
      Astrocyte Arsb silencing (or ethanol-mediated Arsb inhibition)
      increases sulfated GAGs, C4S, and neurocan and reduces cocultured
      hippocampal neurite outgrowth; recombinant Arsb rescues the ethanol
      effect
    supporting_text: >-
      ARSB silencing increased the levels of sulfated GAGs, C4S, and
      neurocan in astrocytes and inhibited neurite outgrowth in cocultured
      neurons, indicating that ARSB activity directly regulates C4S and
      affects neurocan expression.
- id: PMID:2884099
  title: >-
    Isolation and characterization of rat hepatic ascorbic acid-2-sulfatases.
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified. Biochemical demonstration that rat arylsulfatase B
      hydrolyses ascorbic acid-2-sulfate (as a minor substrate), supporting
      the sulfuric ester hydrolase MF.
  findings:
  - statement: >-
      Rat arylsulfatase B hydrolyses ascorbic acid-2-sulfate as a minor
      substrate (0.6% relative to p-nitrocatechol sulfate)
    supporting_text: >-
      The comparative biochemical properties suggest that arylsulfatase B
      is responsible for the cationic ascorbic acid-2-sulfatase activity
- id: PMID:6137211
  title: The effect of pH on the kinetics of arylsulphatases A and B.
  reference_review:
