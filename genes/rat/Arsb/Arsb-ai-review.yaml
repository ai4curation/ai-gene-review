id: P50430
gene_symbol: Arsb
product_type: PROTEIN
status: IN_PROGRESS
taxon:
  id: NCBITaxon:10116
  label: Rattus norvegicus
description: >-
  Rat Arylsulfatase B (Arsb) is a lysosomal sulfohydrolase that removes
  4-sulfate groups from N-acetylgalactosamine-4-sulfate residues in dermatan
  sulfate and chondroitin-4-sulfate glycosaminoglycan chains. Catalysis
  requires a post-translationally generated formylglycine at the active-site
  cysteine and a Ca(2+) cofactor. Rat Arsb is ~80/85% identical (nt/aa) to
  human ARSB and rescues MPS VI when supplied enzymatically; a homozygous
  507insC mutation in the MPR rat colony causes an authentic model of human
  MPS VI. Beyond its classical lysosomal role, rat Arsb has been detected at
  the plasma membrane of hepatocytes, sinusoidal endothelial cells, and
  Kupffer cells, and (via astrocytes) modulates chondroitin sulfate and
  neurocan levels that regulate neurite outgrowth.
