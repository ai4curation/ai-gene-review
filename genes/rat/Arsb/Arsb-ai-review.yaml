- question: >-
    Does rat Arsb have any direct effector role in autophagy (e.g.
    autophagosome maturation, autolysosome formation, or cargo selection),
    or is its detection in autophagic vacuoles simply a consequence of
    being a lysosomal enzyme delivered to autolysosomes?
