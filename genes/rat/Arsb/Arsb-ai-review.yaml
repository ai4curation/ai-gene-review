- term:
    id: GO:0043890
    label: N-acetylgalactosamine-6-sulfatase activity
  evidence_type: ISO
  original_reference_id: GO_REF:0000121
  qualifier: enables
  review:
    summary: >-
      This annotation is likely an overreach. ARSB is characterised primarily
      as a 4-sulfatase; the 6-sulfatase activity is catalysed by GALNS
      (galactose-6-sulfatase / N-acetylgalactosamine-6-sulfatase), a distinct
      enzyme. Reactome R-HSA-1793207 notes that ARSB can act on GalNAc
      6-sulfate units within chondroitin sulfate as a minor secondary
      activity, but the dedicated 6-sulfatase MF term belongs to GALNS.
    action: REMOVE
    reason: >-
      The specific molecular function N-acetylgalactosamine-6-sulfatase
      activity is the defining activity of GALNS. Arsb primarily hydrolyses
      4-sulfate groups; assigning it the 6-sulfatase MF is a mis-propagation
      that conflates the two paralogous sulfatase enzymes. Any residual
      6-sulfate activity on chondroitin chains is better captured by the
      broader sulfuric ester hydrolase activity and by the substrate-focused
      biological process terms.
