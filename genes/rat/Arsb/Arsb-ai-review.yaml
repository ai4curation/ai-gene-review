- id: PMID:8037
  title: >-
    Autophagy-related changes of arylsulphatases A and B in rat liver
    lysosomes.
  reference_review:
    relevance: MEDIUM
    correctness: MISCITED
    review_notes: >-
      PubMed-verified. Sanghavi & Koenig 1976 describes arylsulphatase A/B
      activity ratio changes during hepatic autophagocytosis, with A
      converted to B by other lysosomal hydrolases active in autophagic
      vacuoles. The paper shows Arsb is a target/substrate of autophagic
      processing, not evidence that Arsb has a role in autophagy. Flagged
      for community adjudication under geneontology/go-annotation issue
      6467.
  findings:
  - statement: >-
      Arylsulphatase A/B activity ratio in rat liver lysosomes declines
      during enhanced autophagocytosis; A is converted to B by other
      lysosomal hydrolases active in autophagic vacuoles
    supporting_text: >-
      the arylsulphatase A/arylsulphatase B activity ratio in liver
      lysosomes of normal rats is maintained within rather narrow limits,
      and this ratio declines during enhanced autophagocytosis. These
      findings, together with observations that suggest that
      arylsulphatase B may be a partially degraded form of arylsulphatase
      A, are consistent with the view that the A form is more rapidly
      converted into the B form during autophagy, owing to the digestive
      activity of the other lysosomal hydrolases present in autophagic
      vacuoles.
- id: PMID:8575749
  title: >-
    Mucopolysaccharidosis type VI in rats: isolation of cDNAs encoding
    arylsulfatase B, chromosomal localization of the gene, and
    identification of the mutation.
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified. Foundational paper cloning rat Arsb, mapping the
      gene to rat chromosome 2, and identifying the causative 507insC
      frameshift mutation in the MPR rat MPS VI model.
  findings:
  - statement: >-
      Rat Arsb cDNA is ~80/85% identical (nt/aa) to human ARSB; a
      homozygous 507insC frameshift mutation in the MPR rat colony causes
      rat MPS VI, an authentic model of human MPS VI
    supporting_text: >-
      The nucleotide and deduced amino acid sequences of rat ARSB had
      approximately 80 and 85% identity with the human ARSB sequences,
      respectively
