- term:
    id: GO:0006914
    label: autophagy
  evidence_type: IDA
  original_reference_id: PMID:8037
  qualifier: involved_in
  review:
    summary: >-
      Sanghavi & Koenig (1976) measured the ratio of lysosomal
      arylsulphatase A to arylsulphatase B activity in rat liver under
      conditions that induce hepatic autophagocytosis (starvation, sham
      or subtotal hepatectomy, glucagon + starvation). They observed that
      the A/B activity ratio declines during enhanced autophagocytosis and
      interpreted this as arylsulphatase A being converted to arylsulphatase
      B by other lysosomal hydrolases active in autophagic vacuoles. The
      arylsulphatases are described as targets/substrates of autophagic
      processing, not as effectors of autophagy. This is the concern raised
      in geneontology/go-annotation issue 6467 by curator @vanaukenk. Only
      the abstract is available for this 1976 paper; a full-text review
      may add information, but the abstract itself does not support a role
      for Arsb in the autophagy process.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      The cited paper (PMID:8037) describes autophagy-associated changes in
      arylsulphatase A/B activity ratios (with A converted to B during
      autophagic proteolysis), not a functional role for Arsb in autophagy
      itself. This IDA is the source that has been electronically propagated
      to the human ortholog ARSB (P15848), where the propagated autophagy
      annotation is already flagged for removal (see
      genes/human/ARSB/ARSB-ai-review.yaml). Marking as over-annotated
      (rather than REMOVE) preserves the original curator judgment while
      flagging the annotation for community adjudication under
      geneontology/go-annotation issue 6467.
    supported_by:
    - reference_id: PMID:8037
      supporting_text: >-
        the arylsulphatase A/arylsulphatase B activity ratio in liver
        lysosomes of normal rats is maintained within rather narrow limits,
        and this ratio declines during enhanced autophagocytosis. These
        findings, together with observations that suggest that
        arylsulphatase B may be a partially degraded form of arylsulphatase
        A, are consistent with the view that the A form is more rapidly
        converted into the B form during autophagy, owing to the digestive
        activity of the other lysosomal hydrolases present in autophagic
        vacuoles.
- term:
    id: GO:0007584
    label: response to nutrient
  evidence_type: IDA
  original_reference_id: PMID:2290353
  qualifier: involved_in
  review:
    summary: >-
      Ferland et al. 1990 measured lysosomal enzyme activities in
      hepatocytes, Kupffer, and endothelial cells of rats aged 3.5, 12, and
      24 months under ad libitum vs dietary-restricted feeding. Dietary
      restriction elevated Arsb (and beta-galactosidase, cathepsin D)
      activity in Kupffer/endothelial cells. This is an expression/activity
      change of Arsb in response to dietary state; it does not show that
      Arsb is part of a nutrient-response signalling or effector pathway.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      The observation that Arsb activity changes with dietary restriction
      is a phenotypic/expression response, not evidence that Arsb is a
      component of a response to nutrient biological process. The primary
      function of Arsb is lysosomal GAG catabolism; this IDA should be
      flagged rather than accepted as a core involvement.
    supported_by:
    - reference_id: PMID:2290353
      supporting_text: >-
        Rats exposed to dietary restriction (R) showed higher activities of
        beta-galactosidase, arylsulfatase B and cathepsin D when compared to
        corresponding A animals with the exception of the younger age
        group.
