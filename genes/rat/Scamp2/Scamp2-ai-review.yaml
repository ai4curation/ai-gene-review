- id: PMID:11050114
  title: >-
    Novel SCAMPs lacking NPF repeats: ubiquitous and synaptic vesicle-specific
    forms implicate SCAMPs in multiple membrane-trafficking functions.
  findings:
  - statement: >-
      Fernandez-Chacon and Sudhof (2000) characterize the SCAMP family, identifying
      SCAMPs 4 and 5 as novel members lacking NPF repeats. SCAMPs 1-4 are ubiquitously
      coexpressed, while SCAMP5 is brain-specific. All SCAMPs share conserved TMRs that
      mediate a core function in membrane traffic. SCAMPs 1-3 contain NPF repeats that
      recruit EH-domain proteins for endocytosis.
    supporting_text: >-
      SCAMPs probably function in endocytosis by recruiting EH-domain proteins to the
      N-terminal NPF repeats but may have additional functions mediated by their other
      sequences ... all SCAMPs perform a "core" function in membrane traffic mediated
      by their TMRs ... SCAMPs 1-4 are ubiquitously coexpressed, whereas SCAMP 5 is
      only detectable in brain
- id: PMID:16870614
  title: >-
    Subcellular redistribution of the serotonin transporter by secretory carrier
    membrane protein 2.
  findings:
  - statement: >-
      Mueller et al. (2006) identify SCAMP2 as a SERT-interacting protein via yeast
      two-hybrid screening. The interaction is confirmed by GST-pulldown and co-IP from
      rat brain. SCAMP2 co-expression decreases surface SERT and reduces 5-HT uptake.
      The conserved cysteine-201 in the E peptide is required for SCAMP2-mediated SERT
      redistribution but not for the physical interaction. SCAMP2 and SERT co-localize
      in structures containing flotillin-1 and syntaxin 1A.
    supporting_text: >-
      GST-pulldown assays confirmed the physical interaction between SCAMP2 and the
      N-terminal domain of SERT

core_functions:
- description: >-
    SCAMP2 functions as an integral membrane protein in post-Golgi recycling pathways,
    mediating vesicle trafficking between the trans-Golgi network, plasma membrane, and
    recycling endosomes. Its N-terminal NPF repeats recruit EH-domain proteins to facilitate
    endocytosis, while its conserved transmembrane regions mediate a core membrane trafficking
    function shared across the SCAMP family [PMID:11050114]. SCAMP2 also regulates the
    subcellular distribution of the serotonin transporter (SERT), decreasing surface SERT
    and reducing 5-HT uptake via a mechanism requiring cysteine-201 in its E peptide
    [PMID:16870614].
