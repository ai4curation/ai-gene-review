id: A0A8I6GL39
gene_symbol: Scamp2
product_type: PROTEIN
status: IN_PROGRESS
taxon:
  id: NCBITaxon:10116
  label: Rattus norvegicus
description: >-
  Scamp2 (Secretory Carrier-Associated Membrane Protein 2) is an integral membrane protein
  belonging to the SCAMP family. SCAMPs are characterized by four central transmembrane regions
  (TMRs) and, in the case of SCAMPs 1-3, cytoplasmic N-terminal NPF repeats that recruit
  EH-domain proteins involved in endocytosis [PMID:11050114]. SCAMP2 is ubiquitously expressed
  and localizes to the trans-Golgi network membrane and recycling endosome membrane, consistent
  with roles in post-Golgi recycling pathways and cell surface delivery. SCAMP2 has been shown
  to physically interact with the serotonin transporter (SERT) and regulate its subcellular
  distribution, causing decreased cell surface SERT and reduced 5-HT uptake activity via a
  mechanism requiring the conserved cysteine-201 in its cytoplasmic E peptide [PMID:16870614].
  The conservation of TMRs across all SCAMPs suggests a core function in membrane trafficking
  mediated by these domains [PMID:11050114]. This is an unreviewed UniProt entry (TrEMBL) with
  372 amino acids and four predicted transmembrane helices.

existing_annotations:
- term:
    id: GO:0006887
    label: exocytosis
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      IBA annotation based on phylogenetic inference from the SCAMP family. SCAMPs are
      established membrane trafficking proteins involved in post-Golgi recycling pathways
      and cell surface delivery. SCAMP2 has been shown to regulate the subcellular
      redistribution of SERT, decreasing its surface expression [PMID:16870614], which
      implicates SCAMP2 in trafficking processes including exocytosis. The SCAMP family
      is broadly implicated in multiple membrane-trafficking functions including both
      exocytosis and endocytosis [PMID:11050114].
    action: ACCEPT
    reason: >-
      Exocytosis is a core function of the SCAMP family. IBA annotations for SCAMPs
      are well-supported by phylogenetic conservation across the family. SCAMP2 functions
      in post-Golgi recycling and cell surface delivery pathways, which are exocytic
      processes. The evidence from PMID:16870614 showing SCAMP2-mediated redistribution
      of SERT to intracellular compartments is consistent with a role in regulating
      exocytic trafficking.
    supported_by:
    - reference_id: PMID:11050114
      supporting_text: >-
        SCAMPs probably function in endocytosis by recruiting EH-domain proteins to the
        N-terminal NPF repeats but may have additional functions mediated by their other
        sequences ... all SCAMPs perform a "core" function in membrane traffic mediated
        by their TMRs
    - reference_id: PMID:16870614
      supporting_text: >-
        Co-expression of SERT and SCAMP2 in mammalian cells results in the subcellular
        redistribution of SERT with a decrease in cell surface SERT and a concomitant
        reduction in 5-HT uptake activity

