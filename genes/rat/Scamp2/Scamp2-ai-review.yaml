- term:
    id: GO:0005515
    label: protein binding
  evidence_type: IPI
  original_reference_id: PMID:16870614
  review:
    summary: >-
      IPI annotation based on the physical interaction between SCAMP2 and the serotonin
      transporter (SERT/SLC6A4). Mueller et al. (2006) demonstrated this interaction
      using yeast two-hybrid screening, GST-pulldown assays, and co-immunoprecipitation
      from both a heterologous expression system and rat brain homogenate [PMID:16870614].
      The interaction is with the N-terminal domain of SERT and is functionally significant,
      as it leads to subcellular redistribution of SERT.
    action: REMOVE
    reason: >-
      While the SCAMP2-SERT interaction is experimentally well-validated, the generic
      term "protein binding" (GO:0005515) is uninformative and does not capture the
      functional nature of this interaction. Per GO curation guidelines, protein binding
      should be avoided in favor of more specific molecular function terms. The functional
      consequence of this interaction (regulation of SERT subcellular distribution) is
      better captured by process-level annotations. There is no suitable specific MF
      binding term that precisely describes the SCAMP2-SERT interaction in the context
      of membrane trafficking regulation.
    supported_by:
    - reference_id: PMID:16870614
      supporting_text: >-
        Using the yeast two-hybrid approach we screened a human brain cDNA library and
        identified secretory carrier membrane protein 2 (SCAMP2) as a novel SERT-interacting
        protein. GST-pulldown assays confirmed the physical interaction between SCAMP2
        and the N-terminal domain of SERT ... SERT was found to form a complex with
        SCAMP2 as demonstrated by co-immunoprecipitation from a heterologous expression
        system and from rat brain homogenate

