    - reference_id: PMID:11050114
      supporting_text: >-
        SCAMPs probably function in endocytosis by recruiting EH-domain proteins to the
        N-terminal NPF repeats

- term:
    id: GO:0015031
    label: protein transport
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  review:
    summary: >-
      IEA annotation from combined automated methods, based on orthology to human SCAMP2
      (O15127) and InterPro SCAMP domain (IPR007273). Protein transport is a general
      term that encompasses the more specific vesicle-mediated trafficking functions of
      SCAMPs.
    action: ACCEPT
    reason: >-
      While this is a broad term, it is accurate for SCAMP2. The protein is established
      as a membrane trafficking protein involved in protein transport between the TGN,
      plasma membrane, and endosomes. The more specific IBA annotation for exocytosis
      (GO:0006887) and TAS annotations for intracellular protein transport (GO:0006886)
      and endocytosis (GO:0006897) provide additional specificity. This IEA correctly
      captures the general function.
    supported_by:
    - reference_id: PMID:16870614
      supporting_text: >-
        our results suggest that SCAMP2 plays an important role in the regulation of the
        subcellular distribution of SERT

- term:
    id: GO:0016020
    label: membrane
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  review:
    summary: >-
      IEA annotation from combined automated methods. SCAMP2 is an integral multi-pass
      membrane protein with four transmembrane helices, as confirmed by UniProt annotation
      and sequence analysis. The protein contains the SCAMP domain (IPR007273) which
      encompasses the transmembrane regions.
    action: ACCEPT
    reason: >-
      Membrane localization is an unambiguous core feature of SCAMP2. The protein has
      four predicted transmembrane helices (residues 196-218, 224-246, 258-282, 302-326
      per UniProt). While more specific membrane terms (TGN membrane, recycling endosome
      membrane) are also annotated, the generic membrane term is appropriate for an IEA
      annotation and is not incorrect.
    supported_by:
    - reference_id: PMID:11050114
      supporting_text: >-
        secretory carrier membrane proteins (SCAMPs) 1-3 constitute a family of putative
        membrane-trafficking proteins composed of cytoplasmic N-terminal sequences with
        NPF repeats, four central transmembrane regions (TMRs), and a cytoplasmic tail

