- term:
    id: GO:0006886
    label: intracellular protein transport
  evidence_type: TAS
  original_reference_id: PMID:11050114
  review:
    summary: >-
      TAS annotation based on Fernandez-Chacon and Sudhof (2000), which characterizes
      SCAMPs as a heterogeneous family of membrane-trafficking proteins. The paper
      demonstrates that SCAMPs 1-4 are ubiquitously coexpressed and that all SCAMPs
      perform a core function in membrane traffic mediated by their transmembrane regions
      [PMID:11050114]. SCAMP2 is specifically identified as one of three isoforms
      primarily synthesized outside of neurons.
    action: ACCEPT
    reason: >-
      Intracellular protein transport is a core function of SCAMP2. This is a more
      specific child of "protein transport" (GO:0015031) and accurately reflects the
      vesicle-mediated intracellular trafficking role of SCAMPs. The TAS evidence from
      PMID:11050114 is appropriate as the paper provides a comprehensive characterization
      of the SCAMP family.
    supported_by:
    - reference_id: PMID:11050114
      supporting_text: >-
        all SCAMPs perform a "core" function in membrane traffic mediated by their TMRs
    - reference_id: PMID:16870614
      supporting_text: >-
        our results suggest that SCAMP2 plays an important role in the regulation of the
        subcellular distribution of SERT

- term:
    id: GO:0006897
    label: endocytosis
  evidence_type: TAS
  original_reference_id: PMID:11050114
  review:
    summary: >-
      TAS annotation based on Fernandez-Chacon and Sudhof (2000). SCAMPs 1-3 contain
      N-terminal NPF repeats that recruit EH-domain proteins involved in endocytosis
      [PMID:11050114]. SCAMP2 specifically contains NPF repeats (visible in its
      N-terminal sequence: NPFA at positions 7-10, NPFS at position 38-41), consistent
      with a direct role in endocytosis via EH-domain protein recruitment.
    action: ACCEPT
    reason: >-
      Endocytosis is a core function of SCAMP2. The N-terminal NPF repeats of SCAMPs
      1-3 (including SCAMP2) are specifically implicated in endocytosis via recruitment
      of EH-domain proteins. The SCAMP2 sequence confirms the presence of NPF repeats.
      Additionally, PMID:16870614 shows that SCAMP2 regulates the subcellular
      redistribution of SERT, which involves endocytic processes.
    supported_by:
    - reference_id: PMID:11050114
      supporting_text: >-
        SCAMPs probably function in endocytosis by recruiting EH-domain proteins to the
        N-terminal NPF repeats ... The conservation of the TMRs in all SCAMPs with the
        variable presence of N-terminal NPF repeats suggests that in addition to the role
        of some SCAMPs in endocytosis mediated by their NPF repeats, all SCAMPs perform
        a "core" function in membrane traffic mediated by their TMRs
    - reference_id: PMID:16870614
      supporting_text: >-
        Co-expression of SERT and SCAMP2 in mammalian cells results in the subcellular
        redistribution of SERT with a decrease in cell surface SERT

- term:
    id: GO:1990175
    label: EH domain binding
  evidence_type: IBA
  original_reference_id: PMID:11050114
  review:
    summary: >-
      SCAMP2 contains N-terminal NPF repeats that recruit EH-domain proteins. SCAMPs 1-3
      all share these NPF repeats, which are specifically implicated in endocytosis through
      EH-domain protein recruitment [PMID:11050114]. EH domain binding is a specific
      molecular function describing the interaction between NPF motifs and EH domains.
    action: NEW
    reason: >-
      EH domain binding is a core molecular function of SCAMP2 that is not currently
      annotated in GOA. The NPF repeats in SCAMPs 1-3 are well-established to recruit
      EH-domain proteins, and this specific MF term captures the molecular basis of
      SCAMP2 endocytic function more precisely than the generic "protein binding" term.
      This term is used in the core_functions section as the primary molecular function.
    supported_by:
    - reference_id: PMID:11050114
      supporting_text: >-
        SCAMPs probably function in endocytosis by recruiting EH-domain proteins to the
        N-terminal NPF repeats

