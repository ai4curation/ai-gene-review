- term:
    id: GO:0055038
    label: recycling endosome membrane
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      IBA annotation based on phylogenetic inference from SCAMP family members. SCAMPs
      function in endocytic recycling pathways. The co-localization of SCAMP2 with SERT
      in discrete intracellular structures [PMID:16870614] is consistent with recycling
      endosome localization.
    action: ACCEPT
    reason: >-
      Recycling endosome membrane localization is consistent with the established role
      of SCAMPs in post-Golgi recycling pathways and endocytic trafficking. This is a
      core localization for SCAMP family proteins. The IBA annotation draws on experimental
      evidence from human SCAMP orthologs.
    supported_by:
    - reference_id: PMID:16870614
      supporting_text: >-
        SERT co-localizes with SCAMP2 in discrete structures also containing the lipid
        raft marker flotillin-1 and the SNARE protein syntaxin 1A. In contrast, SERT
