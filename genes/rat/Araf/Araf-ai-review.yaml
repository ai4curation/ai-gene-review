- term:
    id: GO:0004709
    label: MAP kinase kinase kinase activity
  evidence_type: IDA
  original_reference_id: PMID:10648842
  review:
    summary: MAP kinase kinase kinase activity is biologically consistent with Araf, but PMID:10648842 is not 
      positive IDA support for A-Raf activity; it detected A-Raf protein while immunoprecipitation kinase 
      assays failed to identify known Rafs as the EGF-sensitive MEK kinase.
    action: ACCEPT
    reason: 'Retain the term for Araf only because converging non-PMID:10648842 evidence supports RAF-family MAPK
      kinase kinase biology. The original IDA PMID should be flagged as evidence-mismatched: it argues the relevant
      EGF-sensitive hepatic MEK kinase may be unidentified rather than A-Raf.'
    supported_by:
    - reference_id: PMID:10648842
      supporting_text: Western immunoblotting confirmed that Raf-1, A-Raf, B-Raf, MEKK1 and MEKK2 were present
        at similar levels in E19 and adult liver. However, specific immunoprecipitation kinase assays did not 
        detect any kinases that could account for marked EGF sensitivity or the higher level of activity in 
        E19 fetuses.
      reference_section_type: ABSTRACT
    - reference_id: PMID:9779826
      supporting_text: Expression of mitogen-activated protein kinase pathways during postnatal development of
        rat heart.
      reference_section_type: TITLE
    - reference_id: UniProtKB:P14056
      supporting_text: 'FUNCTION: Involved in the transduction of mitogenic signals from the cell membrane to the
        nucleus.'
      reference_section_type: DATABASE_ENTRY
    additional_reference_ids:
    - PMID:9779826
    - UniProtKB:P14056
