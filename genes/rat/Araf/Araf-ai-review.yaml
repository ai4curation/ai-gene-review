- id: file:rat/Araf/Araf-deep-research-falcon.md
  title: 'Falcon deep research report: rat Araf (A-Raf proto-oncogene serine/threonine-protein kinase, UniProt P14056)'
  findings:
  - statement: Falcon synthesis confirms rat Araf/P14056 is a RAF-family Ser/Thr kinase acting as an upstream
      node in the canonical RAS->RAF->MEK->ERK MAPK cascade, with RAFs acting as MEK kinases that phosphorylate
      and activate MEK1/2.
    supporting_text: |-
      Araf encodes a RAF-family serine/threonine kinase that functions as an upstream node in the canonical **RAS→RAF→MEK→ERK** MAPK cascade.
    reference_section_type: OTHER
  - statement: Falcon notes A-Raf is repeatedly characterized as a comparatively weak/low-activity MEK kinase
      relative to B-Raf, so its physiological roles may be more context- and scaffolding-dependent.
    supporting_text: |-
      However, multiple sources emphasize that **A‑Raf has comparatively low MEK kinase activity** relative to B‑Raf
    reference_section_type: OTHER
  - statement: Falcon describes canonical RAF localization - cytosolic inactive monomers recruited to the plasma
      membrane upon RAS-GTP engagement, supporting plasma membrane and cytosol localization annotations.
    supporting_text: |-
      RAF family members are described as cytosolic in the inactive state and recruited to the **plasma membrane** upon RAS‑GTP engagement as part of activation.
    reference_section_type: OTHER
  - statement: Falcon reports context-dependent A-Raf mitochondrial localization (with MST2) in tumor contexts,
      supporting the mitochondrion annotation as inference for the rat ortholog from broader ARAF biology.
    supporting_text: |-
      A‑Raf has been reported to localize to **mitochondria** (together with MST2) in tumor contexts
    reference_section_type: OTHER
  - statement: Falcon describes a kinase-independent A-Raf function - binding MST2 and suppressing MST2-mediated
      apoptosis - supporting the negative regulation of apoptotic process annotation.
    supporting_text: |-
      A‑Raf is described as binding **MST2** and suppressing MST2-mediated apoptosis, indicating kinase-independent pathway crosstalk.
    reference_section_type: OTHER
  - statement: Falcon highlights a non-catalytic mechanism whereby ARAF increases RAS-GTP by antagonizing NF1
      (a RasGAP) binding to RAS, positioning A-Raf as a regulator of the RAS node in addition to acting downstream.
    supporting_text: |-
      **ARAF can increase RAS‑GTP by antagonizing NF1 (a RasGAP) binding to RAS**, thereby reducing NF1-stimulated GTP hydrolysis.
    reference_section_type: OTHER
  - statement: Rat-specific evidence - A-Raf protein (P14056) is upregulated in rat retina two weeks after partial
      optic nerve transection, consistent with RAF/MAPK roles in survival/stress signaling.
    supporting_text: |-
      In rat retina two weeks after partial optic nerve transection, integrated SWATH and targeted MRM proteomics quantified **A‑Raf (P14056)** as **upregulated** in the temporal quadrant with **ratio 1.55**, **log2FC ~0.63**, **p = 0.04**.
    reference_section_type: OTHER
