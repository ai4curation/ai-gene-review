id: P14056
gene_symbol: Araf
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:10116
  label: Rattus norvegicus
description: 'Araf encodes serine/threonine-protein kinase A-Raf, a RAF-family MAP kinase kinase kinase that transduces
  mitogenic signals through the MAPK cascade. The review accepts kinase, MAPKKK, phosphorylation, and MAPK/signal-transduction
  annotations, keeps localization/cofactor and TOR/apoptosis context as non-core, and modifies generic kinase or
  broad phosphorylation-regulation terms to more specific supported terms.'
