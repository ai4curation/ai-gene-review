- id: PMID:10648842
  title: 'Hepatic epidermal growth factor-regulated mitogen-activated protein kinase kinase kinase activity in the
    rat: lack of identity with known forms of raf and MEKK.'
  findings:
  - statement: 'Araf evidence concern: the paper detects A-Raf protein but does not positively identify A-Raf as
      the EGF-sensitive hepatic MEK kinase.'
    supporting_text: Western immunoblotting confirmed that Raf-1, A-Raf, B-Raf, MEKK1 and MEKK2 were present 
      at similar levels in E19 and adult liver. However, specific immunoprecipitation kinase assays did not 
      detect any kinases that could account for marked EGF sensitivity or the higher level of activity in E19 
      fetuses.
    reference_section_type: ABSTRACT
- id: PMID:9779826
  title: 'Expression of mitogen-activated protein kinase pathways during postnatal development of rat heart.'
  findings:
  - statement: Raf/MAPK pathway components are documented in rat heart development, supporting MAPK signaling 
      context by traceable author statement rather than a direct Araf kinase assay.
    supporting_text: Expression of mitogen-activated protein kinase pathways during postnatal development of 
      rat heart.
    reference_section_type: TITLE
