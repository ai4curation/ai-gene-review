      reference_section_type: OTHER
- term:
    id: GO:0004709
    label: MAP kinase kinase kinase activity
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: MAP kinase kinase kinase activity is retained for Araf because it matches the documented core
      molecular role or a direct pathway consequence (IBA, GO_REF:0000033). Falcon notes A-Raf is a comparatively
      weak MEK kinase relative to B-Raf, but still functions as a RAF-family MEK kinase in the cascade.
    action: ACCEPT
    reason: This term directly reflects Araf RAF-family serine/threonine kinase activity and its role in MAPK
      signal transduction.
    supported_by:
    - reference_id: UniProtKB:P14056
      supporting_text: 'FUNCTION: Involved in the transduction of mitogenic signals from the cell membrane to the
        nucleus; may also regulate the TOR signaling cascade; phosphorylates PFKFB2 by similarity.'
    - reference_id: file:rat/Araf/Araf-deep-research-falcon.md
      supporting_text: |-
        At the pathway level, RAF kinases act as **MEK kinases**, phosphorylating/activating MEK1/2, which then phosphorylates ERK to drive transcriptional programs.
      reference_section_type: OTHER
    - reference_id: file:rat/Araf/Araf-deep-research-falcon.md
      supporting_text: |-
        However, multiple sources emphasize that **A‑Raf has comparatively low MEK kinase activity** relative to B‑Raf
      reference_section_type: OTHER
