id: A0A8I6GKZ9
gene_symbol: Dpagt1
product_type: PROTEIN
status: IN_PROGRESS
taxon:
  id: NCBITaxon:10116
  label: Rattus norvegicus
description: >-
  Dpagt1 (UDP-N-acetylglucosamine--dolichyl-phosphate N-acetylglucosaminephosphotransferase,
  EC 2.7.8.15) catalyzes the first committed step in the dolichol pathway of N-linked
  glycosylation. It transfers GlcNAc-1-phosphate from cytosolic UDP-GlcNAc onto the carrier
  lipid dolichyl phosphate (P-dolichol), yielding GlcNAc-PP-dolichol embedded in the
  cytoplasmic leaflet of the endoplasmic reticulum membrane. This reaction initiates the
  assembly of the dolichol-linked oligosaccharide (Glc3Man9GlcNAc2) that is ultimately
  transferred en bloc to asparagine residues of nascent glycoproteins by the
  oligosaccharyltransferase complex. The enzyme is a multi-pass ER membrane protein belonging
  to glycosyltransferase family 4 (GT4), requires Mg2+ as a cofactor, and functions as a
  homodimer. It contains 8 predicted transmembrane helices and a DPAGT1 insertion domain
  (Pfam PF21383). The rat entry (A0A8I6GKZ9) is an unreviewed TrEMBL record with 380 amino
  acids. Mutations in the human ortholog DPAGT1 (Q9H3H5) cause congenital disorder of
  glycosylation type Ij (CDG-Ij) and congenital myasthenic syndrome, underscoring the
  essential role of this enzyme in protein N-glycosylation. The GOA annotation set for the
  rat protein is extremely sparse (5 IEA annotations only), whereas the human ortholog has
  33 annotations including multiple IDA and IMP entries.

existing_annotations:
- term:
    id: GO:0003975
    label: UDP-N-acetylglucosamine-dolichyl-phosphate N-acetylglucosaminephosphotransferase
      activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  review:
    summary: >-
      IEA annotation from combined automated methods (ARBA, InterPro IPR033895, EC 2.7.8.15).
      This is the precise molecular function term for Dpagt1. The human ortholog DPAGT1
      (Q9H3H5) has been annotated with this same term by IDA (PMID:29459785, PMID:8179616),
      IMP (PMID:12872255), TAS (Reactome), and IBA evidence. The UniProt record for
      A0A8I6GKZ9 describes this activity in detail: "Catalyzes the initial step of
      dolichol-linked oligosaccharide biosynthesis, transfering GlcNAc-1-P from cytosolic
      UDP-GlcNAc onto the carrier lipid dolichyl phosphate."
    action: ACCEPT
    reason: >-
      This is the core molecular function of Dpagt1. The IEA annotation is correct and
      well-supported by domain architecture (InterPro IPR033895, Pfam PF00953 Glycos_transf_4),
      EC number assignment (2.7.8.15), and extensive experimental evidence on the human
      ortholog including direct enzymatic assays (PMID:8179616, PMID:29459785). The PANTHER
      family assignment (PTHR10571) also specifically matches UDP-N-acetylglucosamine--dolichyl-
      phosphate N-acetylglucosaminephosphotransferase.
    supported_by:
    - reference_id: GO_REF:0000120
      supporting_text: >-
        Combined automated annotation using ARBA:ARBA00026931, InterPro:IPR033895, and
        EC:2.7.8.15 [all pointing to the specific GPT transferase activity].

- term:
    id: GO:0005789
    label: endoplasmic reticulum membrane
  evidence_type: IEA
  original_reference_id: GO_REF:0000044
  review:
    summary: >-
      IEA annotation based on UniProtKB subcellular location vocabulary mapping
      (UniProtKB-SubCell:SL-0097). The UniProt record for A0A8I6GKZ9 states: "Endoplasmic
      reticulum membrane; Multi-pass membrane protein." The human ortholog has this annotation
      supported by ISS (GO_REF:0000024), TAS (Reactome R-HSA-446191, R-HSA-4549334), and
      multiple IEA methods. This is the expected localization for an enzyme that catalyzes the
      first step of dolichol-linked oligosaccharide biosynthesis on the cytoplasmic face of the
      ER membrane.
    action: ACCEPT
    reason: >-
      ER membrane localization is a core attribute of Dpagt1. The enzyme must be located in the
      ER membrane to access its lipid substrate dolichyl phosphate and to initiate the dolichol
      pathway. The UniProt record describes it as a multi-pass membrane protein with 8 predicted
      transmembrane helices (Phobius prediction). The human ortholog has ISS and TAS evidence
      for this same localization.
    supported_by:
    - reference_id: GO_REF:0000044
      supporting_text: >-
        Mapping from UniProtKB-SubCell:SL-0097 [Endoplasmic reticulum membrane] to
        GO:0005789.

- term:
    id: GO:0006488
    label: dolichol-linked oligosaccharide biosynthetic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: >-
      IEA annotation from InterPro2GO mapping (InterPro:IPR033895). Dpagt1 catalyzes the
      first committed step of dolichol-linked oligosaccharide biosynthesis. The human ortholog
      has this term annotated by IDA (PMID:29459785) and TAS (Reactome R-HSA-446193) in
      addition to IEA. The UniProt function description for A0A8I6GKZ9 explicitly states it
      "operates in the biosynthetic pathway of dolichol-linked oligosaccharides."
    action: ACCEPT
    reason: >-
      This is a core biological process annotation. Dpagt1 catalyzes the very first step of
      dolichol-linked oligosaccharide assembly -- the transfer of GlcNAc-1-P to dolichyl
      phosphate. Without this enzyme, the entire dolichol pathway cannot proceed. The human
      ortholog has IDA evidence from PMID:29459785 for this same term.
    supported_by:
    - reference_id: GO_REF:0000002
      supporting_text: >-
        InterPro:IPR033895 (GPT family) mapped to GO:0006488 [dolichol-linked oligosaccharide
        biosynthetic process].

- term:
    id: GO:0016020
    label: membrane
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  review:
    summary: >-
      IEA annotation from combined automated methods (ARBA:ARBA00028763, InterPro:IPR000715).
      The term "membrane" (GO:0016020) is very broad. The more specific term GO:0005789
      (endoplasmic reticulum membrane) is already annotated. However, the human ortholog also
      carries GO:0016020 with IDA (PMID:8179616), ISS, IBA, and IEA evidence, so this
      annotation is not incorrect.
    action: ACCEPT
    reason: >-
      While GO:0016020 (membrane) is broad and GO:0005789 (endoplasmic reticulum membrane) is
      already present, it is acceptable for IEA annotations to be broader than the most specific
      term. The human ortholog also has GO:0016020 annotated by IDA and IBA. Dpagt1 is indeed
      a multi-pass membrane protein with 8 predicted transmembrane helices.

- term:
    id: GO:0016780
    label: phosphotransferase activity, for other substituted phosphate groups
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: >-
      IEA annotation from InterPro2GO mapping (InterPro:IPR000715, Glycosyltransferase family
      4). This is a parent term of GO:0003975 in the molecular function hierarchy. The human
      ortholog also has this term from the same InterPro mapping. The enzyme catalyzes a
      phosphotransferase reaction, transferring GlcNAc-1-phosphate from UDP-GlcNAc to dolichyl
      phosphate.
    action: ACCEPT
    reason: >-
      This is a correct but broad parent term of the more specific GO:0003975. The enzyme does
      transfer a substituted phosphate group (GlcNAc-1-phosphate). It is acceptable for IEA
      annotations from InterPro domain mappings to be broader than the most specific function.
      The more specific GO:0003975 is already annotated.

# NEW annotations - core functions missing from the sparse GOA set
- term:
    id: GO:0006487
    label: protein N-linked glycosylation
  evidence_type: ISS
  original_reference_id: GO_REF:0000024
  review:
    summary: >-
      Protein N-linked glycosylation (GO:0006487) is not in the GOA file for rat Dpagt1 but
      is a core biological process. Dpagt1 catalyzes the first step of the dolichol pathway
      that produces the oligosaccharide precursor (Glc3Man9GlcNAc2-PP-Dol) transferred to
      asparagine residues of nascent glycoproteins. The human ortholog Q9H3H5 has this
      annotation with IMP evidence (PMID:19549906). The UniProt function description for
      A0A8I6GKZ9 states the enzyme "operates in the biosynthetic pathway of dolichol-linked
      oligosaccharides, the glycan precursors employed in protein asparagine (N)-glycosylation."
    action: NEW
    reason: >-
      This is a critical missing annotation. Protein N-linked glycosylation is the ultimate
      biological process that Dpagt1 contributes to. The human ortholog has IMP evidence from
      PMID:19549906. The UniProt PATHWAY annotation for A0A8I6GKZ9 explicitly states "Protein
      modification; protein glycosylation." This should be added to capture the broader
      biological context of the enzyme's role.
    supported_by:
    - reference_id: GO_REF:0000024
      supporting_text: >-
        Sequence similarity to human DPAGT1 (Q9H3H5), which has IMP evidence for protein
        N-linked glycosylation [PMID:19549906].

- term:
    id: GO:0000287
    label: magnesium ion binding
  evidence_type: ISS
  original_reference_id: GO_REF:0000024
  review:
    summary: >-
      Magnesium ion binding is not in the GOA file for rat Dpagt1 but is a well-supported
      molecular function. The UniProt record for A0A8I6GKZ9 lists "Mg(2+)" as a cofactor
      (ChEBI:CHEBI:18420) with ARBA evidence, and includes keywords "Magnesium" and
      "Metal-binding." The human ortholog has GO:0046872 (metal ion binding) annotated by IEA
      from UniProtKB-KW. The more specific term GO:0000287 (magnesium ion binding) better
      reflects the documented cofactor requirement.
    action: NEW
    reason: >-
      The UniProt record explicitly annotates Mg2+ as a cofactor for A0A8I6GKZ9. The human
      ortholog also has metal ion binding annotated. This is a core cofactor requirement for
      enzymatic activity and should be captured.
    supported_by:
    - reference_id: GO_REF:0000024
      supporting_text: >-
        UniProt cofactor annotation for A0A8I6GKZ9: "Name=Mg(2+); Xref=ChEBI:CHEBI:18420"
        [ARBA evidence, consistent with known Mg2+ requirement for glycosyltransferase 4
        family enzymes].

- term:
    id: GO:0016757
    label: glycosyltransferase activity
  evidence_type: ISS
  original_reference_id: GO_REF:0000024
  review:
    summary: >-
      Glycosyltransferase activity (GO:0016757) is not in the GOA file but is annotated for
      the human ortholog Q9H3H5 by IEA from UniProtKB-KW. The UniProt record for A0A8I6GKZ9
      lists "Glycosyltransferase" as a keyword, and the protein belongs to glycosyltransferase
      family 4 (Pfam PF00953 Glycos_transf_4). While GO:0003975 is more specific, this parent
      term provides additional context and is consistent with the domain architecture.
    action: NEW
    reason: >-
      This parent term is present on the human ortholog and is supported by the UniProt keyword
      and domain classification. While GO:0003975 is already annotated, adding this broader
      glycosyltransferase activity term is consistent with the annotation pattern for the
      human ortholog and provides useful functional context for database queries.

- term:
    id: GO:0042802
    label: identical protein binding
  evidence_type: ISS
  original_reference_id: GO_REF:0000024
  review:
    summary: >-
      The UniProt record for A0A8I6GKZ9 states "Homodimer" under SUBUNIT (ARBA:ARBA00011738).
      The human ortholog Q9H3H5 has GO:0042802 (identical protein binding) annotated by ISS
      (GO_REF:0000024). Homodimerization is a functionally relevant property of DPAGT1 enzymes.
    action: NEW
    reason: >-
      Homodimerization is documented in the UniProt record and the human ortholog has ISS
      evidence for this term. This is a structurally and functionally relevant annotation
      that captures the quaternary structure of the enzyme.
    supported_by:
    - reference_id: GO_REF:0000024
      supporting_text: >-
        UniProt SUBUNIT annotation for A0A8I6GKZ9: "Homodimer" [ARBA evidence, consistent
        with human ortholog Q9H3H5 ISS annotation for identical protein binding].

references:
- id: GO_REF:0000002
  title: Gene Ontology annotation through association of InterPro records with GO terms
  findings:
  - statement: >-
      InterPro domain IPR033895 (GPT) maps to both GO:0003975 (specific transferase activity)
      and GO:0006488 (dolichol-linked oligosaccharide biosynthetic process). InterPro domain
      IPR000715 (Glycosyltransferase family 4) maps to GO:0016780 (phosphotransferase
      activity) and GO:0016020 (membrane).
- id: GO_REF:0000024
  title: Gene Ontology annotation based on sequence similarity with experimentally
    characterized orthologs
  findings:
  - statement: >-
      The human ortholog DPAGT1 (UniProtKB:Q9H3H5) has extensive experimental annotations
      including IDA for GO:0003975 (PMID:8179616, PMID:29459785), IMP for GO:0006487
      (PMID:19549906), ISS for GO:0005789 and GO:0042802, providing a strong basis for
      ortholog transfer to rat Dpagt1.
- id: GO_REF:0000044
  title: Gene Ontology annotation based on UniProtKB/Swiss-Prot Subcellular Location
    vocabulary mapping, accompanied by conservative changes to GO terms applied by
    UniProt
  findings:
  - statement: >-
      Maps UniProtKB-SubCell:SL-0097 (Endoplasmic reticulum membrane) to GO:0005789.
- id: GO_REF:0000120
  title: Combined Automated Annotation using Multiple IEA Methods
  findings:
  - statement: >-
      Combines ARBA, InterPro, and EC-based annotations to assign GO:0003975 and GO:0016020.
- id: PMID:8179616
  title: >-
    Major defect of carbohydrate-deficient-glycoprotein syndrome is not found in
    the synthesis of dolichyl phosphate or N-acetylglucosaminyl-pyrophosphoryl-dolichol.
  findings:
  - statement: >-
      GlcNAc-1-P transferase activity and dolichyl phosphate content were measured in
      CDG syndrome fibroblasts, demonstrating that GPT activity is normal in CDG syndrome
      and the defect lies elsewhere in the oligosaccharide assembly pathway.
    supporting_text: >-
      The amount of dolichyl phosphate and GlcNAc-1-P transferase activity in CDG syndrome
      fibroblasts were similar to those in normal fibroblasts, suggesting that CDG syndrome
      may not be due to a deficiency of a biosynthetic enzyme for dolichol-oligosaccharide
      intermediates, but to a metabolic error in assembly of asparagine-linked
      oligosaccharide.
- id: PMID:29459785
  title: >-
    GlcNAc-1-P-transferase-tunicamycin complex structure reveals basis for
    inhibition of N-glycosylation.
  findings:
  - statement: >-
      Crystal structure of human GPT (DPAGT1) solved in complex with tunicamycin. The enzyme
      catalyzes the first and committed step of N-linked glycosylation on the cytoplasmic face
      of the ER membrane, transferring GlcNAc-1-P from UDP-GlcNAc to dolichyl phosphate.
    supporting_text: >-
      The integral membrane enzyme UDP-N-acetylglucosamine:dolichyl-phosphate
      N-acetylglucosaminephosphotransferase (GlcNAc-1-P-transferase or GPT; DPAGT1 gene in
      human or ALG7 in yeast) catalyzes the first and committed step of N-linked glycosylation
      on the cytosolic face of endoplasmic reticulum (ER) membrane
  - statement: >-
      Loss-of-function mutations in DPAGT1 cause congenital myasthenic syndrome and
      congenital disorder of glycosylation type Ij.
    supporting_text: >-
      Recent studies demonstrate that loss-of-function mutations in DPAGT1 are the etiologies
      of two types of human neurological diseases, congenital myasthenic syndrome (CMS) 13
      and congenital disorder of glycosylation type lj (CDG-Ij)
- id: PMID:12872255
  title: >-
    Deficiency of UDP-GlcNAc:Dolichol Phosphate N-Acetylglucosamine-1 Phosphate
    Transferase (DPAGT1) causes a novel congenital disorder of Glycosylation Type Ij.
  findings:
  - statement: >-
      Identified DPAGT1 mutations causing CDG-Ij. GPT activity in patient fibroblasts was
      reduced to approximately 10% of normal levels, establishing IMP evidence for GO:0003975.
    supporting_text: >-
      the GPT activity is reduced to approximately 10% of normal levels while parents have
      heterozygous levels
  - statement: >-
      Metabolic labeling showed reduced incorporation into dolichol-linked oligosaccharides
      and glycoproteins, confirming involvement in N-glycosylation pathway.
    supporting_text: >-
      Metabolic labeling of cultured dermal fibroblasts from the patient with
      [2-(3)H]-mannose revealed lowered incorporation of radiolabel into full-length
      dolichol-linked oligosaccharides and glycoproteins
- id: PMID:19549906
  title: >-
    Overexpression of DPAGT1 leads to aberrant N-glycosylation of E-cadherin and
    cellular discohesion in oral cancer.
  findings:
  - statement: >-
      DPAGT1 overexpression drives aberrant N-glycosylation of E-cadherin in oral cancer,
      demonstrating that DPAGT1 controls the extent of protein N-glycosylation.
    supporting_text: >-
      By regulating the abundance of LLO, DPAGT1 controls the extent of protein
      N-glycosylation
  - statement: >-
      Partial inhibition of DPAGT1 with siRNA reduced complex N-glycans on E-cadherin
      and promoted formation of mature adherens junctions, providing IMP-level evidence
      for DPAGT1 involvement in protein N-linked glycosylation.
    supporting_text: >-
      Partial inhibition of DPAGT1 with small interfering RNA reduced the complex N-glycans
      of E-cadherin and increased the abundance of alpha-catenin and stabilizing proteins in
      adherens junctions

core_functions:
- molecular_function:
    id: GO:0003975
    label: UDP-N-acetylglucosamine-dolichyl-phosphate N-acetylglucosaminephosphotransferase
      activity
  description: >-
    Dpagt1 catalyzes the transfer of GlcNAc-1-phosphate from UDP-N-acetylglucosamine to
    dolichyl phosphate, producing GlcNAc-PP-dolichol and UMP. This is the first committed
    step in the dolichol pathway of N-linked glycosylation. The reaction occurs on the
    cytoplasmic face of the ER membrane and requires Mg2+ as a cofactor. The enzyme belongs
    to glycosyltransferase family 4 and functions as a homodimer. It is the rate-limiting
    initiating enzyme for the entire dolichol-linked oligosaccharide assembly pathway.
  directly_involved_in:
  - id: GO:0006488
    label: dolichol-linked oligosaccharide biosynthetic process
  - id: GO:0006487
    label: protein N-linked glycosylation
  locations:
  - id: GO:0005789
    label: endoplasmic reticulum membrane
  supported_by:
  - reference_id: PMID:8179616
    supporting_text: >-
      Cloning and expression of hamster GPT demonstrated UDP-GlcNAc:dolichol phosphate
      GlcNAc-1-P transferase activity [orthologous to rat Dpagt1].
  - reference_id: PMID:29459785
    supporting_text: >-
      Structural and enzymatic characterization confirmed the catalytic mechanism of DPAGT1
      in initiating dolichol-linked oligosaccharide biosynthesis.

proposed_new_terms: []

suggested_questions:
- question: >-
    Is there direct experimental evidence for Dpagt1 enzymatic activity in rat tissues or
    cells, or is all evidence inferred from orthology to the well-characterized human and
    hamster enzymes?
- question: >-
    Has the rat Dpagt1 been shown to be essential for embryonic development or N-glycosylation
    in rat models, analogous to the human CDG-Ij phenotype?

suggested_experiments:
- description: >-
    Direct enzymatic assay of recombinant rat Dpagt1 (A0A8I6GKZ9) measuring transfer of
    GlcNAc-1-P from UDP-GlcNAc to dolichyl phosphate, to establish IDA evidence for
    GO:0003975 specific to the rat protein.
- description: >-
    Immunofluorescence co-localization of rat Dpagt1 with ER markers (e.g., calnexin, PDI)
    in rat cell lines to directly confirm ER membrane localization (GO:0005789) for the rat
    protein.
- description: >-
    CRISPR-Cas9 knockout or knockdown of Dpagt1 in rat cells followed by analysis of protein
    N-glycosylation status (e.g., sensitivity to Endo H/PNGase F, lectin blotting) to
    establish IMP evidence for GO:0006487.
