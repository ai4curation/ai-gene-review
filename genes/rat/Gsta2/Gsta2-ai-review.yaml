description: Gsta2 encodes rat glutathione S-transferase alpha-2, an alpha-class GST that conjugates glutathione to electrophilic
  compounds. The review keeps glutathione transferase activity and direct glutathione/xenobiotic metabolism as the main functions
  and downranks binding, localization, and response terms.
