- id: file:rat/Sult1b1/Sult1b1-deep-research-falcon.md
  title: 'Falcon (Edison Scientific) deep research report: Functional annotation of rat Sult1b1 (UniProt P52847, ST1B1)'
  findings:
  - statement: Falcon confirms target identity as the canonical rat cytosolic SULT1B1/ST1B1 (UniProt P52847),
      distinguished from other SULT1 isoforms by phylogeny, and not a paralog-misassigned gene.
    supporting_text: |-
      The collected evidence supports that “Sult1b1” here refers to the canonical **rat cytosolic SULT1B1/ST1B1** enzyme (target UniProt P52847), not an unrelated gene.
    reference_section_type: OTHER
  - statement: Falcon corroborates the core enzymatic mechanism — PAPS-dependent transfer of a sulfonate group
      to acceptor substrates, generating sulfated metabolites and PAP.
    supporting_text: |-
      encodes a **cytosolic sulfotransferase 1 family enzyme** (SULT1B1/ST1B1) that catalyzes **sulfate conjugation (sulfonation/sulfation)** of small molecules by transferring **SO3−** from the universal donor **PAPS** to nucleophilic atoms (commonly oxygen on hydroxyl groups), generating **sulfate esters** and **PAP**.
    reference_section_type: OTHER
  - statement: Falcon corroborates rat-specific substrate specificity for L-DOPA, tyrosine, p-nitrophenol, and
      thyroid hormones from early enzyme characterization.
    supporting_text: |-
      Rat Sult1b1 was reported to show high substrate specificity for **L-DOPA** and **tyrosine**, with additional sulfating activity toward **p-nitrophenol (pNP)** and **thyroid hormones**.
    reference_section_type: OTHER
  - statement: Falcon corroborates cytosolic (soluble) localization, supporting the cytoplasm annotation and
      excluding a membrane/secreted role.
    supporting_text: |-
      SULTs are described as **soluble cytosolic enzymes**; SULT1B1 is therefore a cytosolic phase II sulfotransferase rather than a membrane transporter or secreted protein.
    reference_section_type: OTHER
  - statement: Falcon flags a paralog caution — broad SULT1B1 xenobiotic/drug substrate compilations are not
      rat-isoform-specific and should be interpreted cautiously, supporting keeping such terms as non-core.
    supporting_text: |-
      the broader substrate compilation supports involvement in xenobiotic/drug sulfation but should be interpreted cautiously because it is not rat-isoform-specific in the cited excerpt.
    reference_section_type: OTHER
  - statement: Falcon notes human SULT1B1 functions as a physiological homodimer with cofactor-dependent
      subunit communication, informing the molecular architecture of the rat ortholog.
    supporting_text: |-
      human SULT isoforms—including SULT1B1—are described as **homodimers** with conserved dimer interfaces, and their activity depends critically on efficient binding/release of PAPS and PAP.
    reference_section_type: OTHER
