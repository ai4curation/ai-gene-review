description: 'Sult1b1 encodes a cytosolic aryl sulfotransferase that uses PAPS to sulfate dopamine, small phenols,
  and thyroid hormones. The review accepts aryl sulfotransferase activity, sulfation, and thyroid/phenolic substrate
  metabolism, keeps cytoplasmic and xenobiotic/flavonoid context as non-core, and marks developmental or ethanol-catabolic
  inferences as over-annotations.'
