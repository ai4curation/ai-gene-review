- id: file:rat/Echs1/Echs1-deep-research-falcon.md
  title: Falcon (Edison Scientific) deep research report for rat Echs1 (P14604)
  findings:
  - statement: Confirms the core enoyl-CoA hydratase activity (EC 4.2.1.17) as the second step of mitochondrial
      fatty acid beta-oxidation, supporting the hydratase MF and fatty acid beta-oxidation process annotations.
    supporting_text: |-
      ECHS1/SCEH catalyzes the **reversible hydration of trans‑2‑enoyl‑CoA thioesters to 3‑hydroxyacyl‑CoA (3(S)‑hydroxyacyl‑CoA)**—the canonical short‑chain enoyl‑CoA hydratase reaction (EC **4.2.1.17**). This hydration is the **second step of mitochondrial fatty‑acid β‑oxidation** for short‑chain enoyl‑CoA intermediates.
    reference_section_type: OTHER
  - statement: Documents broad short-chain substrate specificity with highest activity toward crotonyl-CoA,
      consistent with the (2E)-butenoyl-CoA (crotonyl-CoA) hydratase activity annotation.
    supporting_text: |-
      ECHS1 has **broad short‑chain substrate specificity**, with highest activity commonly reported toward **crotonyl‑CoA** (C4:1‑CoA).
    reference_section_type: OTHER
  - statement: Establishes a specific role in valine catabolism via hydration of methacrylyl-CoA and conversion
      of acryloyl-CoA to 3-hydroxypropionyl-CoA, supporting the L-valine catabolic process and
      3-hydroxypropionyl-CoA dehydratase activity annotations.
    supporting_text: |-
      ECHS1 is particularly important in **valine degradation**, where it detoxifies/reacts with reactive intermediates such as **methacrylyl-CoA** and **acryloyl-CoA**. Current disease-oriented literature suggests this valine pathway role is especially important to pathogenesis.
    reference_section_type: OTHER
  - statement: Confirms mitochondrial matrix localization and precursor processing on import, supporting the
      mitochondrial matrix cellular component annotation.
    supporting_text: |-
      ECHS1 is described as a **mitochondrial matrix enzyme**. It is synthesized as a **precursor** and processed upon mitochondrial import to the mature enzyme.
    reference_section_type: OTHER
  - statement: Notes the homohexameric (dimer-of-trimers) crotonase-family quaternary structure, with rat
      liver mitochondrial ECHS1 cited as establishing the hexameric assembly and catalytic glutamate residues.
    supporting_text: |-
      ECHS1 forms a **homohexamer** (six identical subunits), a hallmark of crotonase‑family enzymes. Structural work explicitly references a **rat liver mitochondrial ECHS1** structure (with acetoacetyl‑CoA) showing hexameric assembly, and identifies catalytic residues (e.g., glutamates) important for proton transfer/water activation during hydration.
    reference_section_type: OTHER
  - statement: Records that the gathered literature emphasizes the hydratase reaction over the UniProt-listed
      isomerase (EC 5.3.3.8) activity, a caveat for the delta(3)-delta(2)-enoyl-CoA isomerase annotation that
      remains supported by experimental UniProt evidence (PubMed:10074351).
    supporting_text: |-
      UniProt also lists **EC 5.3.3.8**; the broader literature retrieved here mainly supports the hydratase reaction, with isomerase-related annotation not directly emphasized in the cited texts.
    reference_section_type: OTHER
