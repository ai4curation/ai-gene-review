id: P14604
gene_symbol: Echs1
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:10116
  label: Rattus norvegicus
description: 'Echs1 encodes mitochondrial short-chain enoyl-CoA hydratase. It hydrates trans-2-enoyl-CoA substrates
  and has lower enoyl-CoA isomerase activity, supporting fatty acid beta-oxidation and related valine/lysine catabolic
  steps. The review accepts specific hydratase/isomerase activities and direct catabolic processes, while keeping
  mitochondrial localization as context and modifying generic catalytic activity.'
existing_annotations:
- term:
    id: GO:0005739
    label: mitochondrion
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: mitochondrion is retained as contextual support for Echs1, but it is not the core function (IBA,
      GO_REF:0000033).
    action: KEEP_AS_NON_CORE
    reason: mitochondrion records localization or complex context for Echs1, not the defining molecular
      function.
    supported_by:
    - reference_id: UniProtKB:P14604
      supporting_text: 'FUNCTION: Converts unsaturated trans-2-enoyl-CoA species to the corresponding 3(S)-3-hydroxyacyl-CoA
        species and plays a key role in the beta-oxidation spiral of short- and medium-chain fatty acid oxidation.'
- term:
    id: GO:0006635
    label: fatty acid beta-oxidation
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: Echs1's mitochondrial enoyl-CoA hydration and isomerization in fatty acid and amino acid
      catabolism supports retaining fatty acid beta-oxidation as a direct annotation (IBA, GO_REF:0000033).
    action: ACCEPT
    reason: fatty acid beta-oxidation is a direct process-level consequence of Echs1's documented role in
      mitochondrial enoyl-CoA hydration and isomerization in fatty acid and amino acid catabolism.
    supported_by:
    - reference_id: UniProtKB:P14604
      supporting_text: 'FUNCTION: Converts unsaturated trans-2-enoyl-CoA species to the corresponding 3(S)-3-hydroxyacyl-CoA
        species and plays a key role in the beta-oxidation spiral of short- and medium-chain fatty acid oxidation.'
- term:
    id: GO:0003824
    label: catalytic activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: catalytic activity captures part of Echs1 biology, but a more specific replacement better
      represents the direct role (IEA, GO_REF:0000002).
    action: MODIFY
    reason: 'catalytic activity is directionally related to Echs1 but should be replaced by the more specific term(s):
      enoyl-CoA hydratase activity, delta(3)-delta(2)-enoyl-CoA isomerase activity.'
    proposed_replacement_terms:
    - id: GO:0004300
      label: enoyl-CoA hydratase activity
    - id: GO:0004165
      label: delta(3)-delta(2)-enoyl-CoA isomerase activity
    supported_by:
    - reference_id: UniProtKB:P14604
      supporting_text: 'FUNCTION: Converts unsaturated trans-2-enoyl-CoA species to the corresponding 3(S)-3-hydroxyacyl-CoA
        species and plays a key role in the beta-oxidation spiral of short- and medium-chain fatty acid oxidation.'
    - reference_id: file:rat/Echs1/Echs1-deep-research-falcon.md
      supporting_text: |-
        ECHS1/SCEH catalyzes the **reversible hydration of trans‑2‑enoyl‑CoA thioesters to 3‑hydroxyacyl‑CoA (3(S)‑hydroxyacyl‑CoA)**—the canonical short‑chain enoyl‑CoA hydratase reaction (EC **4.2.1.17**). This hydration is the **second step of mitochondrial fatty‑acid β‑oxidation** for short‑chain enoyl‑CoA intermediates.
