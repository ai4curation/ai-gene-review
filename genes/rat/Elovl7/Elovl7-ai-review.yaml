- id: file:rat/Elovl7/Elovl7-deep-research-falcon.md
  title: 'Falcon (Edison Scientific) deep research report: rat Elovl7 (UniProt D4ADY9), very long chain fatty acid elongase 7'
  findings:
  - reference_section_type: OTHER
    supporting_text: |-
      Biochemical characterization of mammalian ELOVL7 demonstrates that it catalyzes the **condensation** of an **acyl‑CoA** (fatty acyl donor) with **malonyl‑CoA** (two-carbon donor) to yield a **3‑ketoacyl‑CoA**, which is then further processed by downstream elongation enzymes (reduction, dehydration, reduction) to produce an elongated acyl‑CoA.
  - reference_section_type: OTHER
    supporting_text: |-
      ELOVL7 belongs to the mammalian **ELOVL (elongation of very long-chain fatty acids)** family, which catalyzes the *rate-limiting first step* of microsomal fatty-acid elongation.
  - reference_section_type: OTHER
    supporting_text: |-
      In purified-enzyme assays (reconstituted into proteoliposomes), mammalian ELOVL7 shows activity toward **C16–C20** acyl‑CoA substrates, with the **highest activity toward C18 substrates**, and comparatively little/no activity toward longer saturated substrates (e.g., **C22–C26** saturated acyl‑CoAs) under the tested conditions.
  - reference_section_type: OTHER
    supporting_text: |-
      A particularly high activity was reported for **C18:3(n‑3)** and **C18:3(n‑6)** acyl‑CoAs.
  - reference_section_type: OTHER
    supporting_text: |-
      A hallmark of ELOVL family condensing enzymes is the conserved **HxxHH** motif. In mammalian ELOVL7, this motif is reported as **HVFHH**, and mutation to **HVFAA** abolishes activity, demonstrating that these histidines are essential for catalysis.
  - reference_section_type: OTHER
    supporting_text: |-
      Mammalian ELOVL7 is a **membrane-embedded elongase** associated with the **endoplasmic reticulum (ER)**. Experimentally, activity is **lost upon detergent solubilization** (e.g., Triton X‑100) and **restored upon reconstitution into phosphatidylcholine proteoliposomes**, indicating that correct membrane embedding/lipid bilayer context is required for functional catalysis.
