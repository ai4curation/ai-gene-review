id: D4ADY9
gene_symbol: Elovl7
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:10116
  label: Rattus norvegicus
description: Elovl7 encodes rat very-long-chain fatty acid elongase 7, an endoplasmic-reticulum condensing enzyme for the
  first, rate-limiting step of long-chain and very-long-chain fatty-acid elongation. The review accepts fatty acid elongase
  activity and fatty-acid elongation terms as core and keeps ER membrane localization as non-core context.
existing_annotations:
- term:
    id: GO:0005789
    label: endoplasmic reticulum membrane
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: The endoplasmic reticulum membrane annotation is plausible for Elovl7 but should be kept as non-core context
      rather than used to define the gene product function. Falcon deep research confirms ELOVL7 is a membrane-embedded ER
      elongase whose catalytic activity strictly depends on the lipid bilayer context (lost on detergent solubilization,
      restored on proteoliposome reconstitution), so the ER membrane is the obligate setting for its core function.
    action: KEEP_AS_NON_CORE
    reason: The localization is useful context but is not the core molecular function of Elovl7.
    supported_by:
    - reference_id: UniProtKB:D4ADY9
      supporting_text: GO; GO:0005789; C:endoplasmic reticulum membrane; IBA:GO_Central.
    - reference_id: file:rat/Elovl7/Elovl7-deep-research-falcon.md
      supporting_text: |-
        Mammalian ELOVL7 is a **membrane-embedded elongase** associated with the **endoplasmic reticulum (ER)**.
- term:
    id: GO:0030148
    label: sphingolipid biosynthetic process
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: This IBA annotation propagates a sphingolipid biosynthesis role across the ELOVL family, but ELOVL7's measured
      substrate preference argues against a dedicated sphingolipid (ceramide) role for this paralog. Sphingolipids
      characteristically incorporate very-long-chain fatty acids (C22-C26 and longer), whereas purified ELOVL7 is most active
      toward C18 acyl-CoAs over a C16-C20 range and shows little or no activity toward C22-C26 saturated acyl-CoAs. The VLCFAs
      destined for sphingolipid/ceramide synthesis are predominantly produced by other ELOVL paralogs (e.g., ELOVL1/ELOVL4).
      This is therefore best treated as a family-level over-annotation rather than a specific ELOVL7 function.
    action: MARK_AS_OVER_ANNOTATED
    reason: The IBA-propagated sphingolipid biosynthesis role does not match ELOVL7's C16-C20 (C18-preferring) substrate
      specificity; the long-chain substrates characteristic of sphingolipids are elongated mainly by other ELOVL paralogs.
    supported_by:
    - reference_id: UniProtKB:D4ADY9
      supporting_text: GO; GO:0030148; P:sphingolipid biosynthetic process; IBA:GO_Central.
    - reference_id: file:rat/Elovl7/Elovl7-deep-research-falcon.md
      supporting_text: |-
        In purified-enzyme assays (reconstituted into proteoliposomes), mammalian ELOVL7 shows activity toward **C16–C20** acyl‑CoA substrates, with the **highest activity toward C18 substrates**, and comparatively little/no activity toward longer saturated substrates (e.g., **C22–C26** saturated acyl‑CoAs) under the tested conditions.
