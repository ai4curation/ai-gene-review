description: Elovl7 encodes rat very-long-chain fatty acid elongase 7, an endoplasmic-reticulum condensing enzyme for the
  first, rate-limiting step of long-chain and very-long-chain fatty-acid elongation. The review accepts fatty acid elongase
  activity and fatty-acid elongation terms as core and keeps ER membrane localization as non-core context.
