core_functions:
  - description: >-
      Ap2a1 is an obligate subunit of the heterotetrameric AP-2 adaptor protein complex
      (alpha, beta, mu, sigma subunits). As a structural subunit, the alpha-1 adaptin
      contributes to the clathrin-cargo adaptor activity of the complex, linking clathrin
      to transmembrane cargo proteins and membrane lipids. The alpha subunit specifically
      contributes to cargo recognition (dileucine motifs), membrane anchoring via PIP2
      binding, and recruitment of endocytic accessory proteins via its C-terminal ear domain.
    molecular_function:
      id: GO:0035615
      label: clathrin-cargo adaptor activity
    directly_involved_in:
      - id: GO:0072583
        label: clathrin-dependent endocytosis
    locations:
      - id: GO:0030136
        label: clathrin-coated vesicle
      - id: GO:0005886
        label: plasma membrane
    in_complex:
      id: GO:0030122
      label: AP-2 adaptor complex
