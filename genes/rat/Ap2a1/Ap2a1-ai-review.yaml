# --- IMP annotations (mutant phenotype) ---
- term:
    id: GO:0010976
    label: positive regulation of neuron projection development
  evidence_type: IMP
  original_reference_id: PMID:11717353
  review:
    summary: >-
      PMID:11717353 showed that blocking alpha-adaptin function with an antibody in growth cones
      inhibited L1 endocytosis and decreased growth cone migration. This suggests AP-2-dependent
      endocytosis of L1 is required for normal neuron projection development.
    action: KEEP_AS_NON_CORE
    reason: >-
      The paper demonstrates that AP-2-mediated endocytic trafficking of L1 CAM is important for
      growth cone migration and adhesion. However, positive regulation of neuron projection development
      is a downstream developmental consequence of the core endocytic function, not a direct function
      of Ap2a1. AP-2 is a general endocytic adaptor; its role in neurite growth reflects the
      importance of endocytosis in this context.
    supported_by:
      - reference_id: PMID:11717353
        supporting_text: "Inhibition of L1 endocytosis by this antibody also decreased the rate of L1-dependent growth cone migration"
      - reference_id: PMID:11717353
        supporting_text: "inhibition of L1 endocytosis in the growth cone by intracellular loading of a function-blocking antibody against alpha-adaptin, a subunit of the clathrin-associated AP-2 adaptor"

- term:
    id: GO:0048260
    label: positive regulation of receptor-mediated endocytosis
  evidence_type: IMP
  original_reference_id: PMID:11717353
  review:
    summary: >-
      PMID:11717353 showed that AP-2 function is required for L1-mediated endocytosis in growth
      cones. The annotation implies Ap2a1 positively regulates receptor-mediated endocytosis.
    action: ACCEPT
    reason: >-
      AP-2 is a direct positive regulator of receptor-mediated endocytosis. The paper showed that
      blocking alpha-adaptin with a function-blocking antibody inhibited L1 endocytosis, directly
      demonstrating that AP-2 promotes receptor-mediated endocytosis. This is closely aligned with
      the core function of AP-2 as a clathrin-cargo adaptor.
    supported_by:
      - reference_id: PMID:11717353
        supporting_text: "the rate of L1-based neurite growth has a positive correlation with the amount of endocytosed L1 in the growth cone"
      - reference_id: PMID:11717353
        supporting_text: "inhibition of L1 endocytosis in the growth cone by intracellular loading of a function-blocking antibody against alpha-adaptin"

# --- IDA annotations (direct assay) ---
- term:
    id: GO:0030136
    label: clathrin-coated vesicle
  evidence_type: IDA
  original_reference_id: PMID:11889126
  review:
    summary: >-
      PMID:11889126 identified HIP1 as a major component of the clathrin coat that interacts with
      the ear domain of alpha-adaptin. The study used purified clathrin-coated vesicle preparations
      from rat brain, where alpha-adaptin was identified as a major component.
    action: ACCEPT
    reason: >-
      AP-2 is a defining component of clathrin-coated vesicles. The alpha subunit was identified
      in CCV preparations from rat brain [PMID:11889126] and is essential for CCV formation.
      UniProt states AP-2 complexes "are vesicle coat components" involved in "the formation of
      clathrin-coated vesicles."
    supported_by:
      - reference_id: PMID:11889126
        supporting_text: "HIP1 contains a clathrin-box and AP2 consensus-binding sites that display high affinity binding to the terminal domain of the clathrin heavy chain and the ear domain of the AP2 alpha subunit"

- term:
    id: GO:0016323
    label: basolateral plasma membrane
  evidence_type: IDA
  original_reference_id: PMID:12703553
  review:
    summary: >-
      PMID:12703553 studied localization of endocytosis-related proteins in rat parotid glands.
      The paper states alpha-adaptin was immunohistochemically distributed along the plasma membrane,
      though it specifically noted coexistence with Rab4 only at the apical region.
    action: KEEP_AS_NON_CORE
    reason: >-
      The paper showed alpha-adaptin distributed along the plasma membrane in parotid gland cells,
      which includes the basolateral domain. However, this is a tissue-specific localization in
      parotid gland epithelial cells rather than a universal localization.
    supported_by:
      - reference_id: PMID:12703553
        supporting_text: "alpha-adaptin was immunohistochemically distributed along the plasma membrane, this protein coexisted with Rab4 only at the apical region"

- term:
    id: GO:0016324
    label: apical plasma membrane
  evidence_type: IDA
  original_reference_id: PMID:12703553
  review:
    summary: >-
      PMID:12703553 showed alpha-adaptin colocalized with Rab4 specifically at the apical region
      in rat parotid gland acinar cells.
    action: KEEP_AS_NON_CORE
    reason: >-
      The paper demonstrates apical localization in parotid gland cells where AP-2 participates
      in endocytosis at the apical membrane. This is a tissue-specific localization rather than
      a universal feature.
    supported_by:
      - reference_id: PMID:12703553
        supporting_text: "alpha-adaptin was immunohistochemically distributed along the plasma membrane, this protein coexisted with Rab4 only at the apical region"

- term:
    id: GO:0032991
    label: protein-containing complex
  evidence_type: IDA
  original_reference_id: PMID:11423532
  review:
    summary: >-
      PMID:11423532 showed that EHD1 and SNAP29 form complexes with alpha-adaptin of AP-2 and
      co-localize in endocytic vesicles. The "protein-containing complex" annotation is very generic.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      "Protein-containing complex" is an extremely broad CC term that adds no information beyond
      what is already captured by the AP-2 adaptor complex annotation (GO:0030122). The actual
      finding in PMID:11423532 is about specific protein-protein interactions between alpha-adaptin,
      EHD1, and SNAP29 in the context of IGF-1R endocytosis.
    supported_by:
      - reference_id: PMID:11423532
        supporting_text: "EHD1 and SNAP29 form complexes with alpha-adaptin of AP-2 and co-localize in endocytic vesicles"

# --- IPI annotations (physical interaction) ---
- term:
    id: GO:0005515
    label: protein binding
  evidence_type: IPI
  original_reference_id: PMID:9920862
  review:
    summary: >-
      PMID:9920862 demonstrated that epsin and Eps15 bind to the appendage domain of alpha-adaptin.
      However, "protein binding" is uninformative.
    action: MODIFY
    reason: >-
      "Protein binding" is too vague. The paper demonstrates specific binding of endocytic accessory
      proteins (epsin, Eps15) to the alpha-adaptin appendage domain. This is part of the scaffolding
      function of the AP-2 alpha subunit, better captured by the existing clathrin-cargo adaptor
      activity annotation. If a more specific MF term for endocytic scaffold protein binding existed,
      that would be preferable.
    proposed_replacement_terms:
      - id: GO:0035615
        label: clathrin-cargo adaptor activity
    supported_by:
      - reference_id: PMID:9920862
        supporting_text: "their mitotic phosphorylation inhibits binding to the appendage domain of alpha-adaptin"
      - reference_id: PMID:9920862
        supporting_text: "their binding to AP-2 in brain extracts is enhanced by dephosphorylation"

- term:
    id: GO:0044877
    label: protein-containing complex binding
  evidence_type: IPI
  original_reference_id: PMID:23719817
  review:
    summary: >-
      PMID:23719817 demonstrated that AP-2 interacts with otoferlin in cochlear inner hair cells
      via coimmunoprecipitation. The annotation to "protein-containing complex binding" is generic.
    action: KEEP_AS_NON_CORE
    reason: >-
      The paper shows AP-2 interacts with otoferlin, which itself is a multi-domain protein that
      may exist in complexes. While the interaction is real, "protein-containing complex binding"
      is quite generic. This interaction is specific to cochlear inner hair cells and represents
      the context-specific recruitment of AP-2 for CME at ribbon synapses.
    supported_by:
      - reference_id: PMID:23719817
        supporting_text: "We identified multiple subunits of the adaptor protein complex AP-2 (CLAP), an essential component of clathrin-mediated endocytosis, as binding partners of otoferlin"
      - reference_id: PMID:23719817
        supporting_text: "The interaction between otoferlin and AP-2 was confirmed by coimmunoprecipitation"

- term:
    id: GO:0019901
    label: protein kinase binding
  evidence_type: ISO
  original_reference_id: GO_REF:0000121
  review:
    summary: >-
      ISO transfer from mammalian ortholog. The alpha-adaptin ear domain recruits AAK1 kinase.
    action: KEEP_AS_NON_CORE
    reason: >-
      Consistent with the IEA annotation. Kinase binding is a regulatory interaction, not a
      core function of the alpha subunit.

- term:
    id: GO:1900126
    label: negative regulation of hyaluronan biosynthetic process
  evidence_type: ISO
  original_reference_id: GO_REF:0000121
  review:
    summary: >-
      ISO transfer from mammalian ortholog. Duplicate of IEA annotation.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      Same rationale as IEA annotation. Downstream phenotypic consequence, not a direct function.

- term:
    id: GO:0005515
    label: protein binding
  evidence_type: IPI
  original_reference_id: PMID:12213833
  review:
    summary: >-
      PMID:12213833 identified enthoprotin as a novel clathrin-associated protein through subcellular
      proteomics of clathrin-coated vesicles from rat brain. Alpha-adaptin was identified in CCV
      preparations. The study focuses on enthoprotin's interactions with AP1 and clathrin, with
      limited direct interaction with AP-2.
    action: MODIFY
    reason: >-
      "Protein binding" is uninformative. The paper actually notes "Only limited colocalization was
      seen between enthoprotin and clathrin at peripheral punctae or between enthoprotin and AP2."
      The protein binding annotation here may be based on co-isolation in CCV fractions. The core
      function is better captured by clathrin-cargo adaptor activity.
    proposed_replacement_terms:
      - id: GO:0035615
        label: clathrin-cargo adaptor activity
    supported_by:
      - reference_id: PMID:12213833
        supporting_text: "Only limited colocalization was seen between enthoprotin and clathrin at peripheral punctae or between enthoprotin and AP2"

- term:
    id: GO:0005515
    label: protein binding
  evidence_type: IPI
  original_reference_id: PMID:11423532
  review:
    summary: >-
      PMID:11423532 showed that EHD1 and SNAP29 form complexes with alpha-adaptin of AP-2
      in the context of IGF-1R endocytosis.
    action: MODIFY
    reason: >-
      "Protein binding" is uninformative. The actual interaction is between alpha-adaptin and
      EHD1/SNAP29, which are endocytic accessory proteins. This reflects the scaffolding function
      of the alpha-adaptin ear domain.
    proposed_replacement_terms:
      - id: GO:0035615
        label: clathrin-cargo adaptor activity
    supported_by:
      - reference_id: PMID:11423532
        supporting_text: "EHD1 and SNAP29 form complexes with alpha-adaptin of AP-2 and co-localize in endocytic vesicles, indicating a role for them in endocytosis"

