id: A0A8I6A4J2
gene_symbol: Ap2a1
product_type: PROTEIN
status: IN_PROGRESS
taxon:
  id: NCBITaxon:10116
  label: Rattus norvegicus
description: >-
  Ap2a1 encodes the alpha-1 adaptin subunit of the AP-2 adaptor protein complex, a heterotetrameric
  complex composed of alpha, beta, mu, and sigma subunits. AP-2 is a key component of clathrin-coated
  vesicles at the plasma membrane, where it links clathrin to transmembrane cargo proteins and
  phosphoinositide-containing lipids during clathrin-dependent endocytosis. The alpha subunit
  specifically binds phosphatidylinositol 4,5-bisphosphate (PIP2) at the plasma membrane, anchoring
  the complex to the membrane. Through its C-terminal appendage (ear) domain, the alpha subunit
  serves as a scaffolding platform for recruitment of endocytic accessory proteins such as epsin,
  Eps15, and HIP1. Together with the sigma subunit, the alpha subunit contributes to the recognition
  of dileucine-based [ED]XXXL[LI] endocytosis sorting motifs in cargo molecules. AP-2-mediated
  endocytosis is critical for receptor internalization, synaptic vesicle recycling, and regulation
  of cell surface receptor density.
existing_annotations:
# --- IBA annotations (phylogenetic) ---
- term:
    id: GO:0030122
    label: AP-2 adaptor complex
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      Ap2a1 is a core subunit of the AP-2 adaptor complex. This is the defining complex for this gene,
      well supported by UniProt annotation and extensive literature [PMID:9920862, PMID:23719817].
    action: ACCEPT
    reason: >-
      The alpha-1 adaptin subunit is an obligate component of the AP-2 heterotetrameric complex.
      UniProt describes it as "Component of the adaptor protein complex 2 (AP-2)". This is among
      the most fundamental annotations for this gene.
    supported_by:
      - reference_id: PMID:9920862
        supporting_text: "both rat epsin and Eps15 are mitotic phosphoproteins and that their mitotic phosphorylation inhibits binding to the appendage domain of alpha-adaptin"
      - reference_id: PMID:23719817
        supporting_text: "We identified multiple subunits of the adaptor protein complex AP-2 (CLAP), an essential component of clathrin-mediated endocytosis"

- term:
    id: GO:0035615
    label: clathrin-cargo adaptor activity
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      AP-2 functions as a clathrin-cargo adaptor, bridging clathrin to transmembrane cargo proteins
      during endocytosis. The alpha subunit contributes to cargo selection and recruits clathrin
      lattice components. This is a core molecular function of AP-2.
    action: ACCEPT
    reason: >-
      UniProt states "AP-2 also serves as a cargo receptor to selectively sort the membrane proteins
      involved in receptor-mediated endocytosis" and "Clathrin-associated adaptor protein (AP) complexes
      which can bind directly to both the clathrin lattice and to the lipid and protein components of
      membranes are considered to be the major clathrin adaptors contributing the CCV formation."
      This is the defining molecular function of the AP-2 complex.
    supported_by:
      - reference_id: PMID:11889126
        supporting_text: "HIP1 contains a clathrin-box and AP2 consensus-binding sites that display high affinity binding to the terminal domain of the clathrin heavy chain and the ear domain of the AP2 alpha subunit"

- term:
    id: GO:0072583
    label: clathrin-dependent endocytosis
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      Clathrin-dependent endocytosis is the primary biological process in which AP-2 functions.
      The alpha subunit anchors the complex to the plasma membrane via PIP2 binding and recruits
      accessory endocytic proteins.
    action: ACCEPT
    reason: >-
      UniProt states "AP-2 is involved in clathrin-dependent endocytosis in which cargo proteins are
      incorporated into vesicles surrounded by clathrin (clathrin-coated vesicles, CCVs) which are
      destined for fusion with the early endosome." This is the core biological process for AP-2.
    supported_by:
      - reference_id: PMID:11717353
        supporting_text: "Inhibition of L1 endocytosis by this antibody also decreased the rate of L1-dependent growth cone migration"
      - reference_id: PMID:23719817
        supporting_text: "an essential component of clathrin-mediated endocytosis, as binding partners of otoferlin"

# --- IEA annotations (electronic) ---
- term:
    id: GO:0005886
    label: plasma membrane
  evidence_type: IEA
  original_reference_id: GO_REF:0000044
  review:
    summary: >-
      AP-2 is recruited to the cytoplasmic face of the plasma membrane via PIP2 binding by the alpha
      subunit. UniProt annotates it to "Cell membrane" and "Membrane, coated pit; Peripheral membrane
      protein; Cytoplasmic side."
    action: ACCEPT
    reason: >-
      The plasma membrane is the primary site of AP-2 function. The alpha subunit binds
      polyphosphoinositide-containing lipids, positioning AP-2 on the membrane. Experimentally
      confirmed by immunohistochemistry in parotid glands [PMID:12703553].
    supported_by:
      - reference_id: PMID:12703553
        supporting_text: "alpha-adaptin was immunohistochemically distributed along the plasma membrane"

- term:
    id: GO:0006886
    label: intracellular protein transport
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  review:
    summary: >-
      AP-2 mediates transport of cargo proteins from the plasma membrane to early endosomes via
      clathrin-coated vesicles. This is a broad parent term of clathrin-dependent endocytosis.
    action: ACCEPT
    reason: >-
      While more general than the specific clathrin-dependent endocytosis term, intracellular
      protein transport accurately encompasses the AP-2 function. UniProt keywords include
      "Protein transport." It is acceptable for IEA annotations to be broader than IBA annotations.

- term:
    id: GO:0015031
    label: protein transport
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: >-
      Protein transport is a very broad parent term. AP-2 is indeed involved in protein transport
      as it sorts and internalizes transmembrane cargo proteins.
    action: ACCEPT
    reason: >-
      This is a broad but accurate IEA annotation. UniProt keywords include "Protein transport"
      and "Transport." Acceptable as a general IEA mapping from InterPro.

- term:
    id: GO:0016020
    label: membrane
  evidence_type: IEA
  original_reference_id: GO_REF:0000044
  review:
    summary: >-
      AP-2 is a peripheral membrane protein that associates with the cytoplasmic face of the
      plasma membrane at coated pits. The more specific plasma membrane term is also annotated.
    action: ACCEPT
    reason: >-
      Broad but not incorrect. UniProt annotates the protein to "Cell membrane" and "Membrane,
      coated pit." The more specific terms (plasma membrane, coated pit) are captured by other
      annotations.

- term:
    id: GO:0016192
    label: vesicle-mediated transport
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: >-
      AP-2-mediated clathrin-dependent endocytosis is a form of vesicle-mediated transport.
      This is a broad parent term.
    action: ACCEPT
    reason: >-
      Accurate broad IEA annotation. AP-2 is directly involved in the formation and cargo
      selection for clathrin-coated vesicles, which is a major form of vesicle-mediated transport.

- term:
    id: GO:0030117
    label: membrane coat
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  review:
    summary: >-
      AP-2 is a component of the clathrin coat on the cytoplasmic face of coated vesicles.
      Together with clathrin, AP-2 forms the protein coat of clathrin-coated vesicles.
    action: ACCEPT
    reason: >-
      UniProt states "Adaptor protein complexes are vesicle coat components" and annotates
      the protein to "Membrane, coated pit." AP-2 is literally part of the membrane coat.

- term:
    id: GO:0030122
    label: AP-2 adaptor complex
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  review:
    summary: >-
      Duplicate of IBA annotation for AP-2 adaptor complex. Same term, different evidence source.
    action: ACCEPT
    reason: >-
      Redundant with the IBA annotation but from a different evidence pipeline (UniRule).
      Both correctly annotate this gene to its defining protein complex.

- term:
    id: GO:0030131
    label: clathrin adaptor complex
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: >-
      Clathrin adaptor complex is a parent term of AP-2 adaptor complex. AP-2 is indeed a
      clathrin adaptor complex.
    action: ACCEPT
    reason: >-
      Accurate IEA annotation. AP-2 is one of several clathrin adaptor complexes (AP-1, AP-2, AP-3).
      The more specific GO:0030122 (AP-2 adaptor complex) is also annotated.

- term:
    id: GO:0035615
    label: clathrin-cargo adaptor activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: >-
      Duplicate of IBA annotation for clathrin-cargo adaptor activity. Same term, different evidence.
    action: ACCEPT
    reason: >-
      Redundant with the IBA annotation but from InterPro2GO mapping. Both correctly capture
      the core molecular function of AP-2.

- term:
    id: GO:0072583
    label: clathrin-dependent endocytosis
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  review:
    summary: >-
      Duplicate of IBA annotation for clathrin-dependent endocytosis. Same term, different evidence.
    action: ACCEPT
    reason: >-
      Redundant with the IBA annotation but from UniRule. Correctly captures the core biological
      process for AP-2.

- term:
    id: GO:0099503
    label: secretory vesicle
  evidence_type: IEA
  original_reference_id: GO_REF:0000117
  review:
    summary: >-
      This ARBA-predicted annotation to secretory vesicle is questionable. AP-2 primarily functions
      at the plasma membrane in clathrin-coated pits and vesicles, not in secretory vesicles per se.
      While AP-2 may be detected in synaptic vesicle preparations [PMID:33376223], this likely
      reflects its role in synaptic vesicle recycling via endocytosis rather than being a resident
      secretory vesicle protein.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      AP-2 is primarily a plasma membrane-associated coat protein. Its detection in synaptic vesicle
      fractions [PMID:33376223] likely reflects its role in clathrin-mediated endocytosis of synaptic
      vesicle membrane components rather than being a bona fide secretory vesicle resident. The ARBA
      machine learning annotation may have been triggered by association with synaptic vesicle recycling
      literature.

- term:
    id: GO:0019901
    label: protein kinase binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  review:
    summary: >-
      The alpha-adaptin ear domain interacts with AAK1, a serine/threonine kinase that phosphorylates
      the mu2 subunit of AP-2. However, kinase binding is not a core function of the alpha subunit;
      it is a regulatory interaction.
    action: KEEP_AS_NON_CORE
    reason: >-
      The AP-2 alpha subunit ear domain recruits AAK1 kinase [PMID:12213833 identifies AAK1 as
      KIAA1048, "identified through its association with the ear domain of alpha-adaptin"]. This
      interaction is real but represents a regulatory aspect rather than the core function of Ap2a1.

- term:
    id: GO:0032433
    label: filopodium tip
  evidence_type: IEA
  original_reference_id: GO_REF:0000107
  review:
    summary: >-
      Transferred from mouse/human ortholog data via Ensembl Compara. AP-2 is involved in endocytosis
      at the leading edge of migrating cells and growth cones [PMID:11717353], and filopodia are
      dynamic structures at growth cone tips where endocytic cycling occurs.
    action: KEEP_AS_NON_CORE
    reason: >-
      While AP-2 is known to participate in endocytosis at the leading edge of growth cones
      [PMID:11717353], localization specifically to the filopodium tip represents a specialized
      context rather than a core localization.
    supported_by:
      - reference_id: PMID:11717353
        supporting_text: "L1, a member of the immunoglobulin superfamily of CAMs, is endocytosed at the central domain of the growth cone followed by centrifugal vesicular transport and reinsertion into the plasma membrane of the leading edge"

- term:
    id: GO:0048488
    label: synaptic vesicle endocytosis
  evidence_type: IEA
  original_reference_id: GO_REF:0000107
  review:
    summary: >-
      Transferred from ortholog data. AP-2 plays a role in the recycling of synaptic vesicle
      membranes from the presynaptic surface. This is a well-established specialized function
      of AP-2 at synapses.
    action: KEEP_AS_NON_CORE
    reason: >-
      UniProt states "AP-2 seems to play a role in the recycling of synaptic vesicle membranes
      from the presynaptic surface." PMID:9920862 demonstrates AP-2 regulation in nerve terminals.
      PMID:23719817 shows AP-2 involvement in CME at inner hair cell synapses. This is a real
      but tissue-specific manifestation of the core clathrin-dependent endocytosis function.
    supported_by:
      - reference_id: PMID:9920862
        supporting_text: "Both epsin and Eps15, like other cytosolic components of the synaptic vesicle endocytic machinery, undergo constitutive phosphorylation and depolarization-dependent dephosphorylation in nerve terminals"
      - reference_id: PMID:23719817
        supporting_text: "an otoferlin-AP-2 interaction drives Ca(2+)- and stimulus-dependent compensating CME in mature IHCs"

- term:
    id: GO:0050750
    label: low-density lipoprotein particle receptor binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000107
  review:
    summary: >-
      Transferred from ortholog data. AP-2 recognizes endocytosis sorting signals in LDL receptor
      family members (YXXO motifs), mediating their internalization. Reactome annotates the rat
      ortholog to LDL clearance (R-RNO-8964038) and VLDLR internalization (R-RNO-8866427).
    action: KEEP_AS_NON_CORE
    reason: >-
      AP-2 is a general cargo adaptor that mediates internalization of many receptors, including
      LDL receptor family members. While the interaction is real, LDL receptor binding is just
      one of many cargo interactions and does not represent a core-defining function of Ap2a1.

- term:
    id: GO:0098843
    label: postsynaptic endocytic zone
  evidence_type: IEA
  original_reference_id: GO_REF:0000107
  review:
    summary: >-
      Transferred from ortholog data. AP-2 is involved in endocytic recycling of AMPA receptors
      at the postsynaptic endocytic zone. Reactome annotates the rat ortholog to trafficking of
      GluR2-containing AMPA receptors (R-RNO-416993).
    action: KEEP_AS_NON_CORE
    reason: >-
      Localization to the postsynaptic endocytic zone is a synapse-specific context for AP-2
      function, not a core localization. This reflects the specialized role of AP-2 in AMPA
      receptor trafficking at glutamatergic synapses.

- term:
    id: GO:0098978
    label: glutamatergic synapse
  evidence_type: IEA
  original_reference_id: GO_REF:0000107
  review:
    summary: >-
      Transferred from ortholog data. AP-2 is present at glutamatergic synapses where it mediates
      endocytic recycling of AMPA receptors. Reactome annotates to trafficking of GluR2-containing
      AMPA receptors (R-RNO-416993).
    action: KEEP_AS_NON_CORE
    reason: >-
      AP-2 is widely distributed and not specific to glutamatergic synapses. Its presence there
      reflects the general role of clathrin-mediated endocytosis in receptor recycling rather
      than a synapse-type-specific function.

- term:
    id: GO:1900126
    label: negative regulation of hyaluronan biosynthetic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000107
  review:
    summary: >-
      Transferred from ortholog data. This annotation likely derives from AP-2-mediated endocytosis
      of hyaluronan synthase or related receptors. This is a downstream consequence of endocytosis
      rather than a direct function of Ap2a1.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      Negative regulation of hyaluronan biosynthesis is a downstream phenotypic consequence of
      AP-2-mediated receptor endocytosis, not a direct function. AP-2 is a general endocytic
      adaptor and does not specifically regulate hyaluronan biosynthesis. This represents
      over-annotation of a downstream effect.

# --- Experimental annotations ---
- term:
    id: GO:0008021
    label: synaptic vesicle
  evidence_type: EXP
  original_reference_id: PMID:33376223
  review:
    summary: >-
      PMID:33376223 used ultra-definition subcellular proteomics to identify 1,466 proteins in
      purified synaptic vesicle fractions from rat brain. AP-2 subunits were likely detected as
      SV-visitor proteins rather than SV-resident proteins, reflecting their role in clathrin-mediated
      endocytic recycling of SV membranes.
    action: KEEP_AS_NON_CORE
    reason: >-
      PMID:33376223 distinguished SV-resident from SV-visitor proteins. AP-2 subunits are expected
      to be visitors (transiently associated during endocytic recycling) rather than residents.
      The annotation is experimentally supported but represents a non-core localization reflecting
      the synaptic vesicle recycling role of AP-2.
    supported_by:
      - reference_id: PMID:33376223
        supporting_text: "Comparison of UD quantifications between SV and synaptosomal fractions has enabled us to distinguish SV-resident proteins from potential SV-visitor proteins"

- term:
    id: GO:0008021
    label: synaptic vesicle
  evidence_type: IDA
  original_reference_id: PMID:33376223
  review:
    summary: >-
      Same evidence as the EXP annotation above from the SV proteomics study. Duplicate with
      different evidence code.
    action: KEEP_AS_NON_CORE
    reason: >-
      Same rationale as the EXP annotation. The proteomics identification is real but AP-2 is
      a visitor protein on synaptic vesicles, not a resident. Reflects the synaptic vesicle
      recycling function.
    supported_by:
      - reference_id: PMID:33376223
        supporting_text: "Comparison of UD quantifications between SV and synaptosomal fractions has enabled us to distinguish SV-resident proteins from potential SV-visitor proteins"

