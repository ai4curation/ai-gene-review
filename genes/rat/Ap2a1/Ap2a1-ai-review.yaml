    summary: >-
      ISO transfer from mammalian ortholog. Duplicate of IEA annotation.
    action: ACCEPT
    reason: >-
      AP-2 is a vesicle coat component. Consistent with IEA annotation.

# --- New annotations ---
- term:
    id: GO:0005546
    label: phosphatidylinositol-4,5-bisphosphate binding
  evidence_type: ISS
  original_reference_id: GO_REF:0000024
  review:
    summary: >-
      The AP-2 alpha subunit specifically binds PIP2 to anchor the complex at the plasma membrane.
      UniProt annotates binding residues for PtdIns(3,4,5)P3 at positions 78, 88, and 92-96,
      and the PIRNR annotation describes that "The AP-2 alpha subunit binds polyphosphoinositide-containing
      lipids, positioning AP-2 on the membrane." This is a well-characterized function of the alpha
      subunit that is not currently annotated in GOA.
    action: NEW
    reason: >-
      PIP2 binding by the alpha subunit is essential for plasma membrane recruitment of AP-2 and
      is a defining molecular function of this subunit. UniProt PIRSR evidence documents specific
      binding residues for phosphoinositides. This function is distinct from and complementary to
      the clathrin-cargo adaptor activity.

