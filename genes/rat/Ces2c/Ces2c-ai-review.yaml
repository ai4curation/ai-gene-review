  label: Rattus norvegicus
description: Ces2c encodes a rat carboxylesterase family enzyme annotated as acylcarnitine hydrolase and experimentally supported
  for retinyl ester hydrolase activity. The review keeps acylcarnitine and retinyl-palmitate hydrolase activities as the central
  enzymatic roles, while treating broad ester-hydrolase annotations and ER/organelle localization as lower-specificity context.
