id: F7F8L9
gene_symbol: Klf4
product_type: PROTEIN
status: IN_PROGRESS
taxon:
  id: NCBITaxon:10116
  label: Rattus norvegicus
description: >-
  Klf4 (Kruppel-like factor 4, also known as GKLF and EZF) is a C2H2 zinc finger
  transcription factor belonging to the Kruppel-like factor (KLF) family. It contains
  three tandem C-terminal C2H2-type zinc finger domains (residues 399-482) that bind
  GC-rich and CACCC elements in gene promoters. KLF4 functions as both a transcriptional
  activator and repressor depending on promoter context and interacting cofactors. It
  was originally identified as a gut-enriched factor (GKLF) highly expressed in growth-arrested
  cells and in differentiated intestinal epithelial cells (PMID:8702718). KLF4 is a critical
  regulator of cell proliferation (acting as a negative regulator), epithelial cell
  differentiation, and skin barrier function. It is also one of the four Yamanaka factors
  (Oct4, Sox2, Klf4, c-Myc) sufficient to reprogram somatic cells into induced pluripotent
  stem cells (PMID:16904174). In the rat, KLF4 was shown to synergistically activate the
  laminin gamma1 chain promoter with Sp1 (PMID:12034813). The protein has an N-terminal
  activation domain and a separate repression domain, consistent with its dual transcriptional
  role (PMID:9422764).
existing_annotations:
- term:
    id: GO:0005634
    label: nucleus
  evidence_type: IEA
  original_reference_id: GO_REF:0000044
  review:
    summary: >-
      KLF4 is a transcription factor that localizes to the nucleus. The IEA annotation
      is based on UniProtKB subcellular location mapping (GO_REF:0000044). Nuclear
      localization was demonstrated by indirect immunofluorescence in the original
      characterization of GKLF (PMID:8702718). The human ortholog has an IBA annotation
      for nucleus (GO:0005634) and IDA evidence for chromatin localization (PMID:21539536).
      The UniProt entry for rat Klf4 also lists nucleus as subcellular location.
    action: ACCEPT
    reason: >-
      Nuclear localization is well-established for KLF4 across species. The original
      GKLF paper demonstrated nuclear localization by immunofluorescence. As a
      DNA-binding transcription factor with three C2H2 zinc finger domains, nuclear
      localization is fundamental to its function.
    supported_by:
      - reference_id: PMID:8702718
        supporting_text: "By indirect immunofluorescence, GKLF is localized to the cell nucleus."
      - reference_id: PMID:9422764
        supporting_text: "hEZF, is the human homologue of the recently reported mouse EZF and GKLF"

- term:
    id: GO:0045893
    label: positive regulation of DNA-templated transcription
  evidence_type: IEA
  original_reference_id: GO_REF:0000117
  review:
    summary: >-
      KLF4 positively regulates transcription of specific target genes. The IEA annotation
      is based on ARBA machine learning models (GO_REF:0000117). KLF4 was shown to activate
      the rat laminin gamma1 chain (LAMC1) promoter synergistically with Sp1 (PMID:12034813).
      The human ortholog has IDA evidence for positive regulation of transcription by RNA
      polymerase II (PMID:27431648, PMID:20629177) and activates the hTERT promoter
      (PMID:20629177). The original characterization also identified an activation domain
      (PMID:9422764). However, KLF4 also represses transcription of other targets, so this
      annotation captures only one aspect of its dual regulatory activity.
    action: ACCEPT
    reason: >-
      Transcriptional activation is a core function of KLF4. The rat-specific study
      (PMID:12034813) directly demonstrated that KLF4 activates the LAMC1 promoter,
      with activity dependent on its activation domain and DNA-binding domain. The human
      ortholog has extensive experimental evidence (IDA, IMP) for positive regulation of
      transcription. While KLF4 can also repress transcription, the positive regulation
      annotation correctly captures its activator function.
    supported_by:
      - reference_id: PMID:12034813
        supporting_text: "GKLF binds bcn-1, but this binding is not required for the GKLF-mediated activation of the LAMC1 promoter. The activity of GKLF is dependent on a synergism with another Kruppel-like factor, Sp1."
      - reference_id: PMID:9422764
        supporting_text: "we also found that amino acids 91-117 of hEZF confer an activation function on the GAL4 DNA-binding domain"
      - reference_id: PMID:20629177
        supporting_text: "KLF4 sufficiently activated expression of the human telomerase catalytic subunit, human telomerase reverse transcriptase (hTERT)"

- term:
    id: GO:1990859
    label: cellular response to endothelin
  evidence_type: IEA
  original_reference_id: GO_REF:0000117
  review:
    summary: >-
      This IEA annotation was generated by ARBA machine learning models (GO_REF:0000117).
      While KLF4 is expressed in vascular endothelial cells where endothelin signaling
      occurs, and endothelin-1 has been reported to modulate KLF4 expression in some
      contexts, this is a very specific biological process annotation applied to the rat
      protein based solely on automated inference. There is no direct experimental evidence
      in rat or strong ortholog evidence for this specific annotation. The human ortholog
      does not carry this annotation with experimental evidence.
    action: UNDECIDED
    reason: >-
      This annotation was generated by ARBA automated methods without direct experimental
      support. While KLF4 is expressed in vascular endothelial cells (PMID:9422764) and
      may respond to endothelin signaling, the specific term "cellular response to
      endothelin" is not well-supported by available literature for KLF4 specifically.
      The human ortholog does not have experimental evidence for this term. Without access
      to the specific literature that might support an endothelin-KLF4 axis in rat, this
      annotation should remain undecided.
    supported_by:
      - reference_id: PMID:9422764
        supporting_text: "we cloned a cDNA encoding a member of this family from a human vascular endothelial cell cDNA library"

# --- NEW annotations for well-established functions missing from GOA ---

- term:
    id: GO:0000981
    label: DNA-binding transcription factor activity, RNA polymerase II-specific
  evidence_type: ISS
  original_reference_id: PMID:9422764
  review:
    summary: >-
      KLF4 is a well-characterized DNA-binding transcription factor that acts on RNA
      polymerase II-transcribed genes. It contains three C2H2 zinc fingers that bind
      GC-rich/CACCC elements and has both activation and repression domains (PMID:9422764).
      The rat protein was shown to activate the LAMC1 promoter (PMID:12034813). The human
      ortholog has IDA (PMID:20629177) and ISA evidence for this term.
    action: NEW
    reason: >-
      This is a core molecular function of KLF4 completely missing from the rat GOA.
      KLF4 is fundamentally a DNA-binding transcription factor. The evidence from the
      rat-specific study (PMID:12034813) and the human ortholog studies strongly support
      this annotation.
    supported_by:
      - reference_id: PMID:12034813
        supporting_text: "we cloned the gut-enriched Kruppel-like factor (GKLF or KLF4) from a rat mesangial cell library. We show that GKLF binds bcn-1"
      - reference_id: PMID:9422764
        supporting_text: "purified recombinant hEZF protein bound specifically to a probe containing the CACCC core sequence"

- term:
    id: GO:1990837
    label: sequence-specific double-stranded DNA binding
  evidence_type: ISS
  original_reference_id: PMID:12034813
  review:
    summary: >-
      KLF4 binds specifically to CACCC and GC-rich sequences in double-stranded DNA
      through its three C2H2 zinc finger domains. The rat protein was demonstrated to
      bind the bcn-1 element in the LAMC1 promoter (PMID:12034813). The human ortholog
      has IDA evidence for this term (PMID:28473536).
    action: NEW
    reason: >-
      Sequence-specific DNA binding is a fundamental molecular function of KLF4 that is
      missing from the rat GOA. The rat-specific publication directly demonstrates DNA
      binding activity.
    supported_by:
      - reference_id: PMID:12034813
        supporting_text: "We show that GKLF binds bcn-1 ... the synergistic action of GKLF and Sp1 is dependent on the promoter context and the integrity of GKLF activation and DNA-binding domain"
      - reference_id: PMID:9422764
        supporting_text: "purified recombinant hEZF protein bound specifically to a probe containing the CACCC core sequence"

- term:
    id: GO:0008270
    label: zinc ion binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000043
  review:
    summary: >-
      KLF4 contains three C2H2-type zinc finger domains (residues 399-428, 429-458,
      459-482 per UniProt) that require zinc ions for structural integrity and DNA binding.
      This annotation is present in the UniProt DR lines for rat Klf4 (IEA via
      UniProtKB-KW) but absent from the GOA file. The original GKLF characterization
      identified the three zinc fingers (PMID:8702718).
    action: NEW
    reason: >-
      Zinc ion binding is inherent to the C2H2 zinc finger structure of KLF4 and should
      be annotated. The protein has three confirmed C2H2 zinc finger domains.
    supported_by:
      - reference_id: PMID:8702718
        supporting_text: "The deduced GKLF amino acid sequence contains three tandem zinc fingers that are related to members of the Kr\xFCppel family of transcription factors"

- term:
    id: GO:0000122
    label: negative regulation of transcription by RNA polymerase II
  evidence_type: ISS
  original_reference_id: PMID:9422764
  review:
    summary: >-
      KLF4 contains a transcriptional repression domain (amino acids 181-388 in the human
      ortholog) that was mapped using GAL4 fusion experiments (PMID:9422764). The human
      ortholog decreased reporter activity by 6-fold in co-transfection experiments. The
      human ortholog has IDA evidence for this term (PMID:20551324). KLF4 is known to
      repress transcription of several target genes involved in cell proliferation and
      inflammation.
    action: NEW
    reason: >-
      Transcriptional repression is a core function of KLF4, complementary to its
      activator role. The dual activator/repressor activity is a defining feature of
      KLF4 biology. The human ortholog has IDA experimental evidence for this term.
    supported_by:
      - reference_id: PMID:9422764
        supporting_text: "sense but not antisense hEZF decreased the activity of a reporter plasmid containing the CACCC sequence upstream of the thymidine kinase promoter by 6-fold ... we mapped a repression domain in hEZF to amino acids 181-388"
      - reference_id: PMID:20551324
        supporting_text: "constitutive Erk5 activation elicits an overall protective phenotype characterized by increased apoptosis resistance and a decreased angiogenic, migratory, and inflammatory potential"

- term:
    id: GO:0008285
    label: negative regulation of cell population proliferation
  evidence_type: ISS
  original_reference_id: PMID:8702718
  review:
    summary: >-
      KLF4 was originally characterized as a growth arrest-associated gene. GKLF mRNA
      is found at high levels in growth-arrested cells and is nearly undetectable in
      proliferating cells. Transfection of a GKLF-expressing construct inhibited DNA
      synthesis (PMID:8702718). The human ortholog has a TAS annotation for this term
      (PMID:8702718).
    action: NEW
    reason: >-
      Negative regulation of cell proliferation is one of the most well-established
      functions of KLF4, demonstrated in the original characterization paper. This is
      a core biological function that is critically missing from the rat GOA.
    supported_by:
      - reference_id: PMID:8702718
        supporting_text: "GKLF mRNA is found in high levels in growth-arrested cells and is nearly undetectable in cells that are in the exponential phase of proliferation. The growth-arresting nature of GKLF is demonstrated by an inhibition of DNA synthesis in cells transfected with a GKLF-expressing plasmid construct."

- term:
    id: GO:0045595
    label: regulation of cell differentiation
  evidence_type: ISS
  original_reference_id: PMID:8940147
  review:
    summary: >-
      KLF4 expression is closely associated with epithelial cell differentiation. It is
      expressed at high levels in differentiated epithelial cells of the skin, tongue,
      esophagus, stomach, and colon (PMID:8940147). Klf4 knockout mice die at birth due
      to loss of skin barrier function, demonstrating its essential role in terminal
      differentiation of epidermal cells (PMID:10431239). The human ortholog has ISS and
      IEA evidence for this term.
    action: NEW
    reason: >-
      Regulation of cell differentiation, particularly in epithelial cells, is a core
      function of KLF4. The Klf4 knockout mouse phenotype (PMID:10431239) provides strong
      genetic evidence. This function is well-conserved across mammals.
    supported_by:
      - reference_id: PMID:8940147
        supporting_text: "Expression in epithelial cells is first detected at the time of their differentiation during embryonic development"
      - reference_id: PMID:10431239
        supporting_text: "Klf4-/- mice die shortly after birth due to loss of skin barrier function"
      - reference_id: PMID:8702718
        supporting_text: "these results suggest that GKLF is potentially a negative regulator of cell growth in tissues such as the gut mucosa, where cell proliferation is intimately coupled to growth arrest and differentiation"

- term:
    id: GO:0045944
    label: positive regulation of transcription by RNA polymerase II
  evidence_type: ISS
  original_reference_id: PMID:12034813
  review:
    summary: >-
      KLF4 positively regulates transcription by RNA polymerase II at specific target
      gene promoters. The rat protein was directly shown to synergistically activate the
      LAMC1 promoter with Sp1 in co-transfection experiments (PMID:12034813). The human
      ortholog has extensive experimental evidence for this term including IDA
      (PMID:20629177), IMP (PMID:22430140, PMID:22723415, PMID:27907090), and IGI
      (PMID:20551324) evidence codes.
    action: NEW
    reason: >-
      This is a more specific version of the existing GO:0045893 annotation. The rat-
      specific publication provides direct evidence for activation of an RNA pol II
      promoter. The human ortholog has extensive experimental support.
    supported_by:
      - reference_id: PMID:12034813
        supporting_text: "The activity of GKLF is dependent on a synergism with another Kruppel-like factor, Sp1. The LAMC1 promoter appears to have multiple GKLF- and Sp1-responsive elements which may account for the synergistic activation."
      - reference_id: PMID:9422764
        supporting_text: "we also found that amino acids 91-117 of hEZF confer an activation function on the GAL4 DNA-binding domain"

- term:
    id: GO:0000978
    label: RNA polymerase II cis-regulatory region sequence-specific DNA binding
  evidence_type: ISS
  original_reference_id: PMID:12034813
  review:
    summary: >-
      KLF4 binds to specific cis-regulatory elements in promoters of RNA polymerase II-
      transcribed genes. The rat protein binds the bcn-1 element in the LAMC1 promoter
      (PMID:12034813). The human ortholog has IDA evidence for this term (PMID:20629177,
      PMID:21539536).
    action: NEW
    reason: >-
      Sequence-specific binding to cis-regulatory regions is a core molecular function
      of KLF4 as a transcription factor. Direct evidence exists from the rat study
      showing binding to the LAMC1 promoter bcn-1 element.
    supported_by:
      - reference_id: PMID:12034813
        supporting_text: "Using the bcn-1 element as a bait in the yeast one-hybrid screen, we cloned the gut-enriched Kruppel-like factor (GKLF or KLF4) from a rat mesangial cell library. We show that GKLF binds bcn-1"

- term:
    id: GO:0019827
    label: stem cell population maintenance
  evidence_type: ISS
  original_reference_id: PMID:16904174
  review:
    summary: >-
      KLF4 is one of the four Yamanaka factors (Oct4, Sox2, Klf4, c-Myc) sufficient to
      reprogram somatic cells into induced pluripotent stem cells (PMID:16904174,
      PMID:18035408). KLF4 maintains telomerase activity in stem cells by activating
      hTERT transcription (PMID:20629177). The human ortholog has ISS evidence for this
      term.
    action: NEW
    reason: >-
      KLF4 plays a well-established role in stem cell maintenance and pluripotency
      reprogramming. While this is often studied in mouse and human, the function is
      conserved across mammals including rat.
    supported_by:
      - reference_id: PMID:16904174
        supporting_text: "we demonstrate induction of pluripotent stem cells from mouse embryonic or adult fibroblasts by introducing four factors, Oct3/4, Sox2, c-Myc, and Klf4"
      - reference_id: PMID:20629177
        supporting_text: "In human embryonic stem cells, expression of hTERT replaced KLF4 function to maintain their self-renewal"

references:
- id: GO_REF:0000044
  title: Gene Ontology annotation based on UniProtKB/Swiss-Prot Subcellular Location
    vocabulary mapping, accompanied by conservative changes to GO terms applied by
    UniProt
  findings: []
- id: GO_REF:0000117
  title: Electronic Gene Ontology annotations created by ARBA machine learning models
  findings: []
- id: GO_REF:0000043
  title: Gene Ontology annotation based on UniProtKB/Swiss-Prot keyword mapping, accompanied
    by conservative changes to GO terms applied by UniProt
  findings: []
- id: PMID:8702718
  title: "Identification and characterization of a gene encoding a gut-enriched Kr\xFCppel-like
    factor expressed during growth arrest."
  findings:
    - statement: >-
        GKLF (KLF4) was identified as a growth arrest-associated Kruppel-like zinc finger
        transcription factor enriched in gut epithelial cells. GKLF mRNA is high in
        growth-arrested cells, nearly absent in proliferating cells, and GKLF expression
        inhibits DNA synthesis.
      supporting_text: "GKLF mRNA is found in high levels in growth-arrested cells and is nearly undetectable in cells that are in the exponential phase of proliferation. The growth-arresting nature of GKLF is demonstrated by an inhibition of DNA synthesis in cells transfected with a GKLF-expressing plasmid construct."
- id: PMID:8940147
  title: A gene for a novel zinc-finger protein expressed in differentiated epithelial
    cells and transiently in certain mesenchymal cells
  findings:
    - statement: >-
        KLF4 is expressed at high levels in differentiated epithelial cells and can
        function as a transcriptional activator. Expression is first detected at the
        time of epithelial cell differentiation during embryonic development.
- id: PMID:9422764
  title: "Human EZF, a Kr\xFCppel-like zinc finger protein, is expressed in vascular
    endothelial cells and contains transcriptional activation and repression domains."
  findings:
    - statement: >-
        Human KLF4 (EZF) binds CACCC sequences, contains both transcriptional activation
        (aa 91-117) and repression (aa 181-388) domains, and can repress CACCC-dependent
        reporter activity by 6-fold.
      supporting_text: "purified recombinant hEZF protein bound specifically to a probe containing the CACCC core sequence"
- id: PMID:10431239
  title: Klf4 is a transcription factor required for establishing the barrier function
    of the skin
  findings:
    - statement: >-
        Klf4 knockout mice die shortly after birth due to loss of skin barrier function,
        demonstrating KLF4 is essential for terminal epidermal differentiation and skin
        barrier acquisition.
- id: PMID:12034813
  title: Synergistic activation of the rat laminin gamma1 chain promoter by the
    gut-enriched Kruppel-like factor (GKLF/KLF4) and Sp1
  findings:
    - statement: >-
        Rat KLF4 was cloned from a rat mesangial cell library. KLF4 binds the bcn-1
        element and synergistically activates the LAMC1 promoter with Sp1. Activity
        depends on the activation domain and DNA-binding domain integrity.
- id: PMID:16904174
  title: Induction of pluripotent stem cells from mouse embryonic and adult fibroblast
    cultures by defined factors
  findings:
    - statement: >-
        KLF4 is one of the four Yamanaka factors (Oct3/4, Sox2, c-Myc, Klf4) sufficient
        to reprogram differentiated somatic cells into induced pluripotent stem cells.
- id: PMID:18035408
  title: Induction of pluripotent stem cells from adult human fibroblasts by defined
    factors
  findings:
    - statement: >-
        The same four factors including KLF4 reprogram adult human fibroblasts into iPS
        cells, demonstrating conservation of KLF4 reprogramming function in mammals.
- id: PMID:20629177
  title: "Kr\xFCppel-like transcription factor 4 contributes to maintenance of telomerase
    activity in stem cells."
  findings:
    - statement: >-
        KLF4 activates hTERT expression by binding its proximal promoter. In embryonic
        stem cells, hTERT expression can replace KLF4 function for self-renewal.
- id: PMID:20551324
  title: Erk5 activation elicits a vasoprotective endothelial phenotype via induction
    of Kruppel-like factor 4 (KLF4)
  findings:
    - statement: >-
        KLF4 mediates vasoprotective effects downstream of Erk5, including anti-
        inflammatory, anti-angiogenic, and anti-migratory functions in endothelial cells.
- id: PMID:21539536
  title: "Kr\xFCppel-like Factor 4 activates HBG gene expression in primary erythroid cells."
  findings:
    - statement: >-
        KLF4 positively regulates gamma-globin gene transcription by binding the CACCC
        element in the HBG promoter and interacting with CREBBP.
- id: PMID:22430140
  title: A regulatory role of Kruppel-like factor 4 in endothelial argininosuccinate
    synthetase 1 expression in response to laminar shear stress
  findings:
    - statement: >-
        KLF4 regulates endothelial ASS1 expression and NO production in response to
        laminar shear stress, demonstrating its role in vascular homeostasis.

