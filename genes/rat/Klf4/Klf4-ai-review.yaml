    description: >-
      KLF4 is a C2H2 zinc finger transcription factor that binds GC-rich and CACCC
      elements in promoters of RNA polymerase II-transcribed genes. It has both activation
      and repression domains, enabling context-dependent transcriptional regulation. In
      rat, KLF4 synergistically activates the LAMC1 promoter with Sp1 (PMID:12034813).
    directly_involved_in:
