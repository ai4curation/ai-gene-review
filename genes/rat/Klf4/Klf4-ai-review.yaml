        supporting_text: "the synergistic action of GKLF and Sp1 is dependent on the promoter context and the integrity of GKLF activation and DNA-binding domain"
      - reference_id: PMID:9422764
        supporting_text: "purified recombinant hEZF protein bound specifically to a probe containing the CACCC core sequence ... we mapped a repression domain in hEZF to amino acids 181-388. We also found that amino acids 91-117 of hEZF confer an activation function"
  - molecular_function:
      id: GO:0000981
      label: DNA-binding transcription factor activity, RNA polymerase II-specific
    description: >-
      KLF4 negatively regulates cell proliferation by controlling the expression of
      cell cycle genes. GKLF mRNA is high in growth-arrested cells and its overexpression
      inhibits DNA synthesis (PMID:8702718). This antiproliferative function is
      particularly important in gut epithelial tissue homeostasis.
    directly_involved_in:
      - id: GO:0008285
        label: negative regulation of cell population proliferation
    supported_by:
      - reference_id: PMID:8702718
        supporting_text: "GKLF mRNA is found in high levels in growth-arrested cells and is nearly undetectable in cells that are in the exponential phase of proliferation. The growth-arresting nature of GKLF is demonstrated by an inhibition of DNA synthesis"
  - molecular_function:
      id: GO:0000981
      label: DNA-binding transcription factor activity, RNA polymerase II-specific
    description: >-
      KLF4 regulates epithelial cell differentiation and is essential for establishment
      of skin barrier function. Klf4 knockout mice die at birth due to barrier defects
      (PMID:10431239). KLF4 is expressed in differentiated epithelial cells and its
      expression correlates with differentiation onset (PMID:8940147).
