suggested_questions:
  - question: >-
      What is the mechanism by which KLF4 switches between activator and repressor modes
      at different promoters?
  - question: >-
      Does rat KLF4 have the same reprogramming efficiency as mouse/human KLF4 in iPSC
      generation?
  - question: >-
      What are the key rat-specific target genes of KLF4 beyond LAMC1?

suggested_experiments:
  - description: >-
      ChIP-seq of KLF4 in rat intestinal epithelial cells to identify genome-wide binding
      sites and target genes
    experiment_type: ChIP-seq
  - description: >-
      Reporter assays with the rat KLF4 repression domain to confirm dual regulatory
      activity in rat cells
    experiment_type: reporter assay
  - description: >-
      Conditional Klf4 knockout in rat intestinal epithelium to assess differentiation
      phenotype
    experiment_type: conditional knockout
