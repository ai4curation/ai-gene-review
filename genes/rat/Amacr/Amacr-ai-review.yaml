- id: file:rat/Amacr/Amacr-deep-research-falcon.md
  title: 'Falcon (Edison Scientific) deep research report: Rat Amacr / AMACR (UniProt P70473) functional annotation'
  findings:
  - statement: AMACR is a cofactor-independent racemase/epimerase that inverts the C2 (alpha-carbon)
      stereochemistry of 2-methyl-branched acyl-CoA thioesters, interconverting (2R) and (2S) forms.
    supporting_text: |-
      AMACR is a **cofactor-independent racemase/epimerase** that catalyzes the **stereochemical inversion (racemization/epimerization) at C2 (α-carbon)** of **2-methyl-branched acyl-CoA thioesters**, converting **(2R) ↔ (2S)** forms.
    reference_section_type: OTHER
  - statement: Pristanoyl-CoA and chain-shortened derivatives from branched-chain lipid metabolism are
      among the best-supported AMACR substrate classes.
    supporting_text: |-
      **Pristanoyl-CoA** and **chain-shortened derivatives** from branched-chain lipid metabolism.
    reference_section_type: OTHER
  - statement: AMACR acts on CoA esters of bile-acid side-chain intermediates, particularly DHCA-CoA and
      THCA-CoA stereoisomers.
    supporting_text: |-
      **CoA esters of bile-acid side-chain intermediates**, particularly **DHCA-CoA** and **THCA-CoA** stereoisomers (commonly discussed as 25R/25S-related stereochemistry).
    reference_section_type: OTHER
  - statement: AMACR enables catabolism of dietary or isoprenoid-derived alpha-methyl-branched fatty acids
      in the phytanic to pristanic acid axis by converting the 2R-enantiomer to the 2S-enantiomer used by
      beta-oxidation.
    supporting_text: |-
      AMACR is positioned as a key node enabling catabolism of dietary or isoprenoid-derived **α-methyl-branched fatty acids**, particularly in the **phytanic → pristanic acid** metabolic axis, by converting the 2R-enantiomer to the 2S-enantiomer used by β-oxidation.
    reference_section_type: OTHER
  - statement: AMACR participates in side-chain shortening of C27 bile-acid intermediates (DHCA/THCA) that
      contributes to formation of mature bile acids.
    supporting_text: |-
      AMACR also participates in metabolism/processing of **C27 bile-acid intermediates** (DHCA/THCA) during side-chain shortening steps that contribute to formation of mature bile acids.
    reference_section_type: OTHER
  - statement: Rat-focused evidence places AMACR/racemase activity in both peroxisomes and mitochondria, with
      purification from rat liver mitochondrial fractions despite peroxisomal targeting features in the sequence.
    supporting_text: |-
      Primary rat-focused evidence indicates AMACR/racemase activity occurs in **both peroxisomes and mitochondria**, and that AMACR was purified from **rat liver mitochondrial fractions** (monomeric protein ~45–47 kDa) despite peroxisomal targeting features in the sequence.
    reference_section_type: OTHER
