id: P70473
gene_symbol: Amacr
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:10116
  label: Rattus norvegicus
description: 'Amacr encodes alpha-methylacyl-CoA racemase, a peroxisomal and mitochondrial enzyme that interconverts
  stereoisomers of alpha-methyl-branched acyl-CoA esters, including pristanoyl-CoA and bile-acid intermediates.
  The review accepts the racemase activity and bile-acid/fatty-acid metabolic roles, keeps organelle locations as
  non-core, and removes generic or unsupported receptor-binding annotations.'
