description: 'Crot encodes peroxisomal carnitine O-octanoyltransferase, which transfers medium-chain acyl groups
  such as octanoyl-CoA to carnitine in fatty acid beta-oxidation. The review accepts carnitine O-octanoyltransferase
  activity and medium-chain fatty acid metabolism/transport as direct functions, modifies generic or long-chain
  transport terms to the medium-chain transfer role, and keeps peroxisomal localization as context.'
