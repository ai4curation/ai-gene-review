  label: Rattus norvegicus
description: 'Spr encodes sepiapterin reductase, which performs the final one or two NADP-dependent reductions in
  tetrahydrobiopterin biosynthesis. The review accepts sepiapterin reductase activity and tetrahydrobiopterin/pteridine
  metabolism as direct functions, keeps monoamine/nitric-oxide/phenylalanine processes as BH4-dependent context,
  and marks broader growth, movement, differentiation, and proliferation phenotypes as over-annotation.'
