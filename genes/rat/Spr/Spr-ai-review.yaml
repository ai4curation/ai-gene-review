- term:
    id: GO:0004757
    label: sepiapterin reductase (NADP+) activity
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: Spr's NADP-dependent sepiapterin reduction in tetrahydrobiopterin biosynthesis supports retaining
      sepiapterin reductase (NADP+) activity as a direct annotation (IBA, GO_REF:0000033).
    action: ACCEPT
    reason: sepiapterin reductase (NADP+) activity directly matches Spr's documented role in NADP-dependent
      sepiapterin reduction in tetrahydrobiopterin biosynthesis.
    supported_by:
    - reference_id: UniProtKB:P18297
      supporting_text: 'FUNCTION: Catalyzes the final one or two reductions in tetrahydrobiopterin biosynthesis
        to form 5,6,7,8-tetrahydrobiopterin.'
    - reference_id: file:rat/Spr/Spr-deep-research-falcon.md
      supporting_text: |-
        In the **salvage pathway**, SPR catalyzes **NADPH-dependent reduction of sepiapterin to 7,8-dihydrobiopterin (BH2)**, which can then be reduced further to BH4 by other cellular reductases.
    - reference_id: file:rat/Spr/Spr-deep-research-falcon.md
      supporting_text: |-
        Canonical SPR catalysis for sepiapterin reduction is **strictly NADPH-dependent** in experimental assays (NADH does not support the sepiapterin→BH2 reaction in a detailed enzymology study).
