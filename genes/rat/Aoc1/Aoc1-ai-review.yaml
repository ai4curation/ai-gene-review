        - reference_id: file:rat/Aoc1/Aoc1-deep-research-falcon.md
          supporting_text: |-
            Within the CAO family, **AOC1 (DAO)** is functionally categorized as the **diamine-preferring** oxidase (EC 1.4.3.22). Structural and phylogenetic analyses emphasize that AOC1 prefers diamines including **histamine** (often described as a principal physiological substrate) and other diamines such as **1-methylhistamine**; related literature also highlights **putrescine** as a physiologically relevant diamine substrate in polyamine homeostasis contexts.
          reference_section_type: OTHER
