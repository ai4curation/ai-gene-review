references:
  - id: file:rat/Aoc1/Aoc1-deep-research-falcon.md
    title: 'Falcon (Edison Scientific) deep research report: rat Aoc1/Abp1 (P36633), copper-containing diamine oxidase (EC 1.4.3.22)'
    findings:
      - statement: Aoc1/DAO catalyzes oxidative deamination of primary (di)amines, producing aldehyde, ammonium, and hydrogen peroxide; it is the diamine-preferring copper amine oxidase subtype.
        supporting_text: |-
          CAOs catalyze the **oxidative deamination of primary amines** to yield the corresponding **aldehyde**, with concomitant formation of **ammonium/ammonia (NH4+/NH3)** and **hydrogen peroxide (H2O2)**. This catalytic outcome is a defining feature of CAOs and provides the mechanistic basis for AOC1’s roles in **histamine and diamine clearance** and **polyamine (e.g., putrescine) metabolism**.
        reference_section_type: OTHER
      - statement: Aoc1/DAO is the diamine-preferring copper amine oxidase (EC 1.4.3.22), with histamine a principal physiological substrate.
        supporting_text: |-
          Within the CAO family, **AOC1 (DAO)** is functionally categorized as the **diamine-preferring** oxidase (EC 1.4.3.22). Structural and phylogenetic analyses emphasize that AOC1 prefers diamines including **histamine** (often described as a principal physiological substrate) and other diamines such as **1-methylhistamine**; related literature also highlights **putrescine** as a physiologically relevant diamine substrate in polyamine homeostasis contexts.
        reference_section_type: OTHER
      - statement: Aoc1/DAO substrate range spans histamine, 1-methylhistamine, putrescine, and cadaverine.
        supporting_text: |-
          AOC1/DAO preferentially oxidizes **diamines**, especially **histamine**, **1-methylhistamine**, **putrescine**, and **cadaverine**; field reviews note highest affinity for **histamine and putrescine**.
        reference_section_type: OTHER
      - statement: Catalysis requires a copper ion and the protein-derived TPQ (topaquinone) cofactor formed by post-translational tyrosine modification.
        supporting_text: |-
          CAOs require a catalytic **copper ion** and a protein-derived quinone cofactor, **TPQ (topaquinone; 2,4,5-trihydroxyphenylalanine quinone)**. TPQ is generated by **post-translational modification of a tyrosine residue** within the CAO polypeptide; notably, TPQ biogenesis is described as a self-processing event requiring only **O2 and Cu(II)**.
        reference_section_type: OTHER
      - statement: Diamine specificity is conferred by a conserved active-site aspartate interacting with the second amino group of diamine substrates.
        supporting_text: |-
          an **Asp residue conserved across diamine oxidases** (and absent from other CAO subfamilies) is implicated in **diamine specificity**, rationalized as enabling interaction with the **second amino group** of diamine substrates.
        reference_section_type: OTHER
      - statement: AOC1 is a soluble/secreted extracellular homodimeric glycoprotein, contrasting with membrane-bound AOC3/VAP-1.
        supporting_text: |-
          broader mammalian literature describes AOC1 as a **secreted/extracellular homodimeric glycoprotein**, consistent with systemic accessibility.
        reference_section_type: OTHER
      - statement: AOC1/DAO is the major extracellular enzyme for histamine degradation, placing it in a histamine clearance axis especially relevant at the intestinal mucosa.
        supporting_text: |-
          DAO (AOC1) is widely described as the major **extracellular** enzyme responsible for histamine degradation (in contrast to intracellular histamine N-methylation pathways), and AOC1 is explicitly described as the diamine-preferring CAO subtype that oxidizes histamine.
        reference_section_type: OTHER
      - statement: In rat, DAO is concentrated in small intestinal mucosa and is the primary source of circulating plasma DAO activity.
        supporting_text: |-
          A foundational primary study in rat demonstrates that diamine oxidase activity is present at **high concentrations in small intestinal mucosa**, and that the intestine is the **primary source of circulating (plasma) DAO activity** in rats.
        reference_section_type: OTHER
      - statement: In rat enterocytes, DAO activity localizes to mature villus-tip absorptive cells and is predominantly in the soluble (cytosolic) fraction.
        supporting_text: |-
          In rat small intestine, DAO activity was localized to **mature villus-tip absorptive cells** (rather than proliferative crypt cells). Subcellular fractionation placed the activity predominantly in the **soluble (cytosolic) fraction**.
        reference_section_type: OTHER
