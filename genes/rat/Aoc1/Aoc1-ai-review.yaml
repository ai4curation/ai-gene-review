core_functions:
  - description: Aoc1 is a copper/TPQ-dependent diamine oxidase that oxidatively deaminates diamines
      such as histamine and putrescine, producing the corresponding aldehyde, ammonia, and hydrogen
      peroxide; in rat it is concentrated in intestinal mucosa (mature villus-tip absorptive cells)
      where the activity is predominantly cytosolic, while a secreted/circulating extracellular pool
      makes plasma DAO a marker of mucosal status.
    supported_by:
      - reference_id: UniProtKB:P36633
        supporting_text: 'FUNCTION: Catalyzes the oxidative deamination of primary amines to the corresponding
          aldehydes with the concomitant production of hydrogen peroxide and ammonia. Its preferred substrates
          in vitro are the diamines histamine and 1-methylhistamine.'
      - reference_id: file:rat/Aoc1/Aoc1-deep-research-falcon.md
        supporting_text: |-
          CAOs catalyze the **oxidative deamination of primary amines** to yield the corresponding **aldehyde**, with concomitant formation of **ammonium/ammonia (NH4+/NH3)** and **hydrogen peroxide (H2O2)**. This catalytic outcome is a defining feature of CAOs and provides the mechanistic basis for AOC1’s roles in **histamine and diamine clearance** and **polyamine (e.g., putrescine) metabolism**.
        reference_section_type: OTHER
    molecular_function:
