  - term:
      id: GO:0008131
      label: primary methylamine oxidase activity
    evidence_type: IEA
    original_reference_id: GO_REF:0000120
    review:
      summary: primary methylamine oxidase activity is retained for Aoc1 because it falls within
        the enzyme's broad primary-amine oxidase activity (IEA, GO_REF:0000120). Note that Aoc1
        is specifically characterized as a diamine-preferring oxidase (EC 1.4.3.22), so its
        principal physiological substrates are diamines such as histamine and putrescine rather
        than monoamines like methylamine.
      action: ACCEPT
      reason: primary methylamine oxidase activity is directly supported by the curated function of
        Aoc1 and is not merely a downstream phenotype or expression response.
      supported_by:
        - reference_id: UniProtKB:P36633
          supporting_text: 'FUNCTION: Catalyzes the oxidative deamination of primary amines to the corresponding
            aldehydes with the concomitant production of hydrogen peroxide and ammonia. Its preferred
            substrates in vitro are the diamines histamine and 1-methylhistamine.'
        - reference_id: file:rat/Aoc1/Aoc1-deep-research-falcon.md
          supporting_text: |-
            CAOs catalyze the **oxidative deamination of primary amines** to yield the corresponding **aldehyde**, with concomitant formation of **ammonium/ammonia (NH4+/NH3)** and **hydrogen peroxide (H2O2)**. This catalytic outcome is a defining feature of CAOs and provides the mechanistic basis for AOC1’s roles in **histamine and diamine clearance** and **polyamine (e.g., putrescine) metabolism**.
          reference_section_type: OTHER
  - term:
      id: GO:0009308
      label: amine metabolic process
    evidence_type: IEA
    original_reference_id: GO_REF:0000002
    review:
      proposed_replacement_terms:
        - id: GO:0009445
          label: putrescine metabolic process
        - id: GO:0001695
          label: histamine catabolic process
      summary: amine metabolic process captures part of Aoc1 biology, but more specific biological-process
        replacement term(s) better represent the supported function (IEA, GO_REF:0000002). The previously
        proposed GO:0052597 diamine oxidase activity was removed here because it is a molecular function
        (cross-aspect) and is already captured by the dedicated MF annotations.
      action: MODIFY
      reason: 'amine metabolic process is too broad for Aoc1; replace with more specific biological-process
        term(s): GO:0009445 putrescine metabolic process and GO:0001695 histamine catabolic process,
        reflecting the enzyme''s diamine/histamine deamination role.'
      supported_by:
        - reference_id: UniProtKB:P36633
          supporting_text: 'FUNCTION: Catalyzes the oxidative deamination of primary amines to the corresponding
            aldehydes with the concomitant production of hydrogen peroxide and ammonia. Its preferred
            substrates in vitro are the diamines histamine and 1-methylhistamine.'
        - reference_id: file:rat/Aoc1/Aoc1-deep-research-falcon.md
          supporting_text: |-
            DAO (AOC1) is widely described as the major **extracellular** enzyme responsible for histamine degradation (in contrast to intracellular histamine N-methylation pathways), and AOC1 is explicitly described as the diamine-preferring CAO subtype that oxidizes histamine.
          reference_section_type: OTHER
