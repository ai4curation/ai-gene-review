        function (IBA, GO_REF:0000033).
      action: KEEP_AS_NON_CORE
      reason: plasma membrane records localization, cofactor/substrate binding, oligomeric state, or
        physiological context rather than the defining molecular activity of Aoc1.
      supported_by:
        - reference_id: UniProtKB:P36633
          supporting_text: 'FUNCTION: Catalyzes the oxidative deamination of primary amines to the corresponding
            aldehydes with the concomitant production of hydrogen peroxide and ammonia. Its preferred
            substrates in vitro are the diamines histamine and 1-methylhistamine.'
