  - term:
      id: GO:0070062
      label: extracellular exosome
    evidence_type: ISO
    original_reference_id: GO_REF:0000121
    review:
      summary: extracellular exosome is an over-annotation for Aoc1. UniProt and the curated
        literature describe Aoc1 as a secreted/extracellular-space glycoprotein, but extracellular
        exosome is a specific vesicle subtype that is not the same as general secretion. This
        localization is typically derived from high-throughput exosome proteomics rather than
        targeted evidence for Aoc1 vesicle packaging.
      action: MARK_AS_OVER_ANNOTATED
      reason: extracellular exosome is a specific vesicle compartment not supported by Aoc1-specific
        evidence; UniProt documents secreted/extracellular-space localization, which is captured by
        the extracellular region annotations, not exosomal packaging.
      supported_by:
        - reference_id: UniProtKB:P36633
          supporting_text: 'SUBCELLULAR LOCATION: Secreted, extracellular space'
