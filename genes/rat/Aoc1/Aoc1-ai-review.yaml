id: P36633
gene_symbol: Aoc1
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:10116
  label: Rattus norvegicus
description: 'Aoc1 encodes copper-containing diamine oxidase/histaminase, an extracellular or membrane-associated
  amine oxidase that oxidatively deaminates histamine, putrescine, and related primary amines. The review
  accepts diamine/putrescine/histamine oxidase activity and putrescine metabolism, keeps cofactor, dimerization,
  and localization annotations as non-core, and removes the tight-junction and ND process annotations
  unsupported by the cited evidence.'
