id: P14942
gene_symbol: Gsta4
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:10116
  label: Rattus norvegicus
description: Gsta4 encodes rat glutathione S-transferase alpha-4 (GSTA4-4), an alpha-class cytosolic GST that
  conjugates reduced glutathione to hydrophobic electrophiles. Among the alpha-class paralogs (Gsta1/2/3/4),
  Gsta4 is functionally distinguished by its high catalytic efficiency toward lipid peroxidation-derived
  alpha,beta-unsaturated aldehydes, especially 4-hydroxynonenal (4-HNE), which it detoxifies by GSH conjugation
  (Michael addition). The review treats glutathione transferase activity and glutathione/xenobiotic metabolism as
  core or direct functions; stress-response and toxicant-response annotations are retained only as context from
  expression or perturbation studies. Note that much of the strongest mechanistic/kinetic and loss-of-function
  evidence derives from mouse Gsta4-null models, human GSTA4-4 enzyme assays, or unspecified GSTA4-4, not rat
  P14942 specifically; these are treated as orthology-based support rather than rat-specific facts.
