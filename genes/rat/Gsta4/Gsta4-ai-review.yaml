description: Gsta4 encodes rat glutathione S-transferase alpha-4, a GST that conjugates reduced glutathione to hydrophobic
  electrophiles. The review treats glutathione transferase activity and glutathione/xenobiotic metabolism as core or direct
  functions; stress-response and toxicant-response annotations are retained only as context from expression or perturbation
  studies.
