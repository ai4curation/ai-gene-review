references:
- id: file:rat/Gsta4/Gsta4-deep-research-falcon.md
  title: Deep research report on rat Gsta4 (GSTA4-4, UniProt P14942) - falcon/Edison Scientific
  findings:
  - statement: Gsta4 is the alpha-class cytosolic GST specialized for conjugating lipid peroxidation-derived
      alkenals, especially 4-hydroxynonenal (4-HNE), distinguishing it from other alpha-class GST paralogs.
    supporting_text: |-
      GSTA4-4 is repeatedly characterized as unusually efficient for **lipid-derived α,β-unsaturated aldehydes**, especially **4-HNE**
    reference_section_type: OTHER
  - statement: The core reaction is GSH conjugation (Michael addition) of electrophilic lipid alkenals, with
      4-HNE clearance occurring predominantly via GSTA4-4-catalyzed glutathione conjugation.
    supporting_text: |-
      A major cellular clearance pathway is **GSH conjugation (Michael addition)** catalyzed predominantly by **GSTA4-4**.
    reference_section_type: OTHER
  - statement: Canonical GST architecture - N-terminal G-site binds/activates GSH, C-terminal H-site binds the
      hydrophobic electrophilic substrate.
    supporting_text: |-
      Cytosolic GSTs are typically **homo- or heterodimeric** enzymes with an N-terminal **G-site** (binds/activates glutathione, GSH) and a C-terminal **H-site** (binds hydrophobic electrophilic substrates).
    reference_section_type: OTHER
  - statement: GSTA4-4 is best known as a cytosolic GST but has strong evidence for stress-inducible
      mitochondrial association, positioning it to protect mitochondria from reactive aldehydes.
    supporting_text: |-
      Although GSTs are classically described as **cytosolic**, GSTA4-4 has strong evidence for **mitochondrial association**
    reference_section_type: OTHER
  - statement: The best-supported biological role is detoxification of reactive lipid aldehydes (especially
      4-HNE), limiting protein carbonylation, oxidative damage, and downstream stress signaling.
    supporting_text: |-
      The best-supported biological role is **detoxification of reactive lipid aldehydes**, especially **4-HNE**, thereby limiting **protein carbonylation**, oxidative damage, and downstream stress signaling.
    reference_section_type: OTHER
  - statement: In rat liver specifically, Gsta4 mRNA is low prenatally and increases after birth to adulthood;
      this is one of the few rat-specific expression observations in the corpus.
    supporting_text: |-
      Gsta4 mRNA was low prenatally and **increased after birth to adulthood**
    reference_section_type: OTHER
  - statement: GSTA4 is inducible via Nrf2/ARE antioxidant defense programs, consistent with its role in
      oxidative-stress responses (rat liver-focused work).
    supporting_text: |-
      Rat liver-focused work notes that GSTA4 can be induced by **Nrf2 inducers**
    reference_section_type: OTHER
  - statement: CAVEAT - the accession-level mapping P14942 to rat Gsta4 and UniProt synonyms (GST 8-8, GST K,
      GST Yk) were NOT explicit in the retrieved full text; functional identity is inferred from the
      characteristic 4-HNE substrate preference of alpha-class GSTA4-4. Treat as orthology/family-based support.
    supporting_text: |-
      the accession-level mapping “**P14942 → rat Gsta4**” and all UniProt-listed synonyms (e.g., “GST 8-8”, “GST K”, “GST Yk”) were not explicitly stated, so the UniProt accession verification remains database-dependent
    reference_section_type: OTHER
  - statement: CAVEAT - quantitative loss-of-function data (e.g., 23% residual 4-HNE-conjugating activity)
      derive from mouse Gsta4-null heart, not rat P14942; do not import as rat-specific kinetics.
    supporting_text: |-
      In mouse heart, Gsta4-null tissue retains only **23%** of WT 4-HNE-conjugating activity
    reference_section_type: OTHER
  - statement: CAVEAT - inhibitor kinetics and docking data are from human GSTA4-4 (hGSTA4-4), not rat
      P14942; treated as conserved-function context, not rat-specific facts.
    supporting_text: |-
      While this is human enzyme work, it is a concrete 2024 example of real-world implementation
    reference_section_type: OTHER
