description: Gys2 encodes rat liver glycogen synthase, a UDP-glucose-dependent alpha-1,4-glucan
  glucosyltransferase that extends glycogen chains during glycogen biosynthesis. The review accepts the
  transferase activity and glycogen biosynthetic/metabolic process annotations as core/direct, and treats
  glucose binding, cytoskeletal localization, and glucose-response terms as non-core context.
