id: P17625
gene_symbol: Gys2
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:10116
  label: Rattus norvegicus
description: Gys2 encodes rat liver glycogen synthase, a UDP-glucose-dependent alpha-1,4-glucan glucosyltransferase that extends
  glycogen chains during glycogen biosynthesis. The review accepts the transferase activity and glycogen biosynthetic/metabolic
  process annotations as core/direct, and treats glucose binding, cytoskeletal localization, and glucose-response terms as
  non-core context.
