- id: file:rat/Gys2/Gys2-deep-research-falcon.md
  title: 'Falcon (Edison Scientific) deep research report: rat Gys2 (UniProt P17625), glycogen [starch] synthase, liver'
  findings:
  - statement: Falcon verifies target identity as the liver-restricted glycogen synthase isoform, distinct from muscle/broadly expressed GYS1.
    supporting_text: |-
      GYS2 is consistently described as the **liver-specific/liver-restricted** glycogen synthase isoform
    reference_section_type: OTHER
  - statement: Falcon describes the catalyzed reaction as transfer of a glucosyl unit from UDP-glucose to the non-reducing end of a glucan chain, forming an alpha-1,4 linkage and releasing UDP, corroborating GO:0004373.
    supporting_text: |-
      transferring a glucosyl unit from **UDP-glucose** to the non-reducing end of an existing glucan chain (glycogen or glycogenin-primed chain), creating an **α-1,4 glycosidic linkage** and releasing **UDP**
    reference_section_type: OTHER
  - statement: Falcon places the function in the cytosol on glycogen particles/granules, corroborating cytosol/cytoplasm localization while noting recruitment to glycogenic structures.
    supporting_text: |-
      Functionally, glycogen synthesis occurs in the **cytosol** on **glycogen particles/granules**; GYS2 can be recruited to discrete glycogenic structures through glycogen-targeted PP1 complexes
    reference_section_type: OTHER
  - statement: Falcon clarifies that glucose-6-phosphate is a major allosteric activator of liver glycogen synthase, not the glucosyl donor, framing glucose-related binding/response as regulatory context rather than core catalysis.
    supporting_text: |-
      G6P is a **major allosteric activator** of glycogen synthase in liver, but it is not the glucosyl donor for chain elongation
    reference_section_type: OTHER
