    supporting_text: >-
      TGIF sequesters Axin1 or Axin2 into the nucleus and thereby interfering with the assembly
      of the beta-Catenin destruction complex, leading to beta-Catenin accrual.
  - statement: Wnt signaling induces TGIF expression, creating a feed-forward loop
    supporting_text: >-
      activation of Wnt signaling induces the expression of TGIF, which unveils a feed-forward
      loop that ensures effective integration of Wnt signaling.
  - statement: Tgif1 ablation impedes mammary tumor development in MMTV-Wnt1 mice
    supporting_text: >-
      genetic experiments revealed that Tgif1 ablation impeded mammary tumor development in
      MMTV-Wnt1 mice, further underscoring a requirement of TGIF for oncogenic Wnt signaling.
  - statement: TGIF1 is a TALE homeodomain protein with roles in embryonic development
    supporting_text: >-
