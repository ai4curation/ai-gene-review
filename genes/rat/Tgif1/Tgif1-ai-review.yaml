id: A0A8I5ZTL5
gene_symbol: Tgif1
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:10116
  label: Rattus norvegicus
description: >-
  Tgif1 (TGFB-induced factor homeobox 1) encodes a TALE-class homeodomain transcription factor
  that functions primarily as a transcriptional repressor. The protein represses transcription both
  by binding directly to DNA via its homeodomain (recognizing TGCA-containing retinoid response
  elements) and by being recruited to SMAD-responsive promoters through direct interaction with
  TGF-beta-activated SMAD2. TGIF1 recruits corepressors including HDAC1 and CtBP to mediate
  transcriptional silencing. It is a key negative regulator of TGF-beta/SMAD signaling, competing
  with SMAD co-activators for SMAD2 binding. TGIF1 also represses retinoid signaling by binding
  retinoid X receptor response elements. Loss-of-function mutations in the human ortholog TGIF1
  cause holoprosencephaly type 4. More recently, TGIF1 has been shown to participate in Wnt
  signaling by sequestering Axin1/Axin2 in the nucleus, diverting them from the beta-catenin
  destruction complex. The protein localizes to the nucleus/nucleoplasm. UniProt classifies it as
  belonging to the TALE/TGIF homeobox family. The rat protein is unreviewed (TrEMBL) and
  annotations are inferred from the well-characterized human ortholog (Q15583) and mouse ortholog
  (P70284).

existing_annotations:
- term:
    id: GO:0003677
    label: DNA binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  review:
    summary: >-
      TGIF1 is a homeodomain transcription factor that binds DNA via its TALE homeodomain.
      The UniProt entry for rat Tgif1 contains a DNA_BIND feature (residues 58-120, homeobox)
      and InterPro matches to IPR001356 (Homeodomain) and IPR008422 (KN homeodomain). TGIF1 has
      been shown to bind DNA directly at TGCA-containing retinoid response elements to repress
      transcription (PMID:10995736).
    action: ACCEPT
    reason: >-
      DNA binding is a fundamental molecular function of TGIF1 as a homeodomain transcription
      factor. This is supported by the annotated homeobox DNA-binding domain (residues 58-120),
      InterPro domain matches, and literature demonstrating direct DNA binding at specific
      promoter elements. While more specific DNA binding terms exist (see GO:0000978 and
      GO:1990837 below), this general term from InterPro mapping is acceptable.
    supported_by:
    - reference_id: PMID:10995736
      supporting_text: >-
        The homeodomain protein TGIF represses transcription in part by recruiting histone
        deacetylases. TGIF binds directly to DNA to repress transcription or interacts with
        TGF-beta-activated Smads, thereby repressing genes normally activated by TGF-beta.

- term:
    id: GO:0005634
    label: nucleus
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  review:
    summary: >-
      TGIF1 is a nuclear transcription factor. The UniProt entry for rat Tgif1 explicitly
      states subcellular location as Nucleus (ECO:0000256|ARBA, ECO:0000256|PROSITE-ProRule).
      Nuclear localization is also confirmed by Ensembl transfer from both human (Q15583) and
      mouse (P70284) orthologs. As a homeodomain transcription factor that functions in
      transcriptional repression, nuclear localization is essential.
    action: ACCEPT
    reason: >-
      Nuclear localization is a core property of TGIF1, consistent with its function as a
      DNA-binding transcriptional repressor that operates on chromatin-bound SMAD complexes.
      Supported by UniProt subcellular location annotation and ortholog data.
    supported_by:
    - reference_id: PMID:10995736
      supporting_text: >-
        The homeodomain protein TGIF represses transcription in part by recruiting histone
        deacetylases.
    - reference_id: PMID:25873176
      supporting_text: >-
        Our results clearly demonstrate that TGIF sequesters Axin1 or Axin2 into the nucleus
        and thereby interfering with the assembly of the β-Catenin destruction complex, leading
        to β-Catenin accrual.

- term:
    id: GO:0006355
    label: regulation of DNA-templated transcription
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: >-
      TGIF1 is a well-established transcriptional regulator. This annotation comes from
      InterPro2GO mapping via IPR008422 (KN homeodomain). TGIF1 functions as a transcriptional
      repressor both by direct DNA binding and by recruitment to SMAD complexes (PMID:10995736).
      However, this term is too general -- TGIF1 specifically functions as a negative regulator
      of transcription by RNA polymerase II.
    action: MODIFY
    reason: >-
      While the annotation is correct in essence, the term is too broad. TGIF1 is specifically
      a transcriptional repressor acting on RNA polymerase II-dependent transcription. The more
      specific term GO:0000122 (negative regulation of transcription by RNA polymerase II)
      already exists in the annotation set and better captures TGIF1's function.
    proposed_replacement_terms:
    - id: GO:0000122
      label: negative regulation of transcription by RNA polymerase II
    supported_by:
    - reference_id: PMID:10995736
      supporting_text: >-
        The homeodomain protein TGIF represses transcription in part by recruiting histone
        deacetylases. TGIF binds directly to DNA to repress transcription or interacts with
        TGF-beta-activated Smads, thereby repressing genes normally activated by TGF-beta.

- term:
    id: GO:0010470
    label: regulation of gastrulation
  evidence_type: IEA
  original_reference_id: GO_REF:0000117
  review:
    summary: >-
      This ARBA machine learning annotation suggests TGIF1 involvement in regulation of
      gastrulation. TGIF1 is a key regulator of TGF-beta/nodal signaling, which is critical
      for gastrulation. Tgif1 knockout mice show developmental abnormalities consistent with
      disrupted gastrulation processes (PMID:25873176). However, TGIF1's role in gastrulation
      is indirect, mediated through its repression of TGF-beta/nodal signaling rather than
      direct involvement in gastrulation per se.
    action: KEEP_AS_NON_CORE
    reason: >-
      Regulation of gastrulation is a pleiotropic developmental consequence of TGIF1's core
      transcriptional repressor function, mediated through its modulation of TGF-beta/nodal
      signaling. While supported by mouse knockout phenotypes, this is a downstream
      developmental effect rather than a core molecular function.
    supported_by:
    - reference_id: PMID:25873176
      supporting_text: >-
        Genetic ablation of Tgif1 in mice resulted in a large spectrum of phenotypes,
        including placental defects, craniofacial abnormalities, and runting ( Bartholin et al., 2008 ; Taniguchi et al., 2012 )

- term:
    id: GO:0038092
    label: nodal signaling pathway
  evidence_type: IEA
  original_reference_id: GO_REF:0000117
  review:
    summary: >-
      This ARBA annotation links TGIF1 to the nodal signaling pathway. Nodal signals through
      SMAD2/3, and TGIF1 is a well-established repressor of SMAD-mediated transcription.
      TGIF1 competes with co-activators for binding to SMAD2 and recruits corepressors (HDAC1,
      CtBP) to SMAD-responsive elements (PMID:10995736). TGIF1 thus functions as a negative
      regulator within the nodal/TGF-beta signaling pathway.
    action: ACCEPT
    reason: >-
      TGIF1 is a direct repressor of SMAD2/3-dependent transcription, which is the core
      effector mechanism of nodal signaling. This represents a core function of TGIF1.
      The Reactome pathway R-RNO-2173795 (Downregulation of SMAD2/3:SMAD4 transcriptional
      activity) directly references TGIF1 in this context.
    supported_by:
    - reference_id: PMID:10995736
      supporting_text: >-
        TGIF binds directly to DNA to repress transcription or interacts with TGF-beta-activated
        Smads, thereby repressing genes normally activated by TGF-beta.
    - reference_id: PMID:25873176
      supporting_text: >-
        The mechanism of TGIF-induced suppression of TGF-β signaling has been primarily
        attributed to its ability to recruit a complex of general transcriptional corepressors
        to DNA-bound Smad transcription complexes ( Wotton et al., 1999 )

- term:
    id: GO:0045666
    label: positive regulation of neuron differentiation
  evidence_type: IEA
  original_reference_id: GO_REF:0000117
  review:
    summary: >-
      This ARBA annotation suggests TGIF1 positively regulates neuron differentiation.
      TGIF1 is expressed during neural development and mutations cause holoprosencephaly
      (a severe forebrain developmental defect) in humans (PMID:10995736). However, TGIF1
      functions as a transcriptional repressor, and its role in neural development is likely
      through repression of TGF-beta/nodal signaling during neural patterning rather than
      direct positive regulation of neuron differentiation.
    action: KEEP_AS_NON_CORE
    reason: >-
      While TGIF1 loss causes holoprosencephaly demonstrating importance in neural development,
      the specific mechanism is indirect -- TGIF1 represses TGF-beta/SMAD signaling which
      modulates neural patterning. The term suggests a direct positive regulatory role which
      may be an oversimplification. This is a pleiotropic developmental consequence of its
      core repressor function.
    supported_by:
    - reference_id: PMID:10995736
      supporting_text: >-
        Loss of function mutations in TGIF result in holoprosencephaly (HPE) in humans.

- term:
    id: GO:0060041
    label: retina development in camera-type eye
  evidence_type: IEA
  original_reference_id: GO_REF:0000117
  review:
    summary: >-
      This ARBA annotation links TGIF1 to retina development. TGIF1 represses retinoid
      signaling by binding to retinoid X receptor response elements, and retinoid signaling
      is critical for retinal development. The UniProt entry for rat Tgif1 lists additional
      Ensembl-transferred annotations including amacrine cell differentiation and positive
      regulation of amacrine cell differentiation from the mouse ortholog, suggesting some
      role in retinal cell fate. However, this is a downstream developmental consequence.
    action: KEEP_AS_NON_CORE
    reason: >-
      Retina development involvement is a pleiotropic developmental consequence of TGIF1's
      core transcriptional repressor activities, particularly its repression of retinoid
      signaling. Not a core molecular function of the protein.

- term:
    id: GO:0000122
    label: negative regulation of transcription by RNA polymerase II
  evidence_type: IEA
  original_reference_id: GO_REF:0000107
  review:
    summary: >-
      This Ensembl Compara transfer from human TGIF1 (Q15583) correctly identifies TGIF1
      as a negative regulator of RNA polymerase II-dependent transcription. TGIF1 represses
      transcription by recruiting HDAC1 and CtBP corepressors to target promoters, both
      through direct DNA binding at TGCA motifs and through interaction with SMAD2 at
      SMAD-responsive elements (PMID:10995736).
    action: ACCEPT
    reason: >-
      This is the core biological process function of TGIF1. It is a transcriptional repressor
      that recruits HDAC1 and CtBP to silence gene expression at RNA polymerase II-dependent
      promoters. Well-supported by multiple publications on the human ortholog.
    supported_by:
    - reference_id: PMID:10995736
      supporting_text: >-
        The homeodomain protein TGIF represses transcription in part by recruiting histone
        deacetylases.
    - reference_id: PMID:10995736
      supporting_text: >-
        Efficient repression of TGF-beta-activated gene responses by TGIF is dependent on
        interaction with CtBP, and we show that TGIF is able to recruit CtBP to a TGF-beta-activated
        Smad complex.

- term:
    id: GO:0000978
    label: RNA polymerase II cis-regulatory region sequence-specific DNA binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000107
  review:
    summary: >-
      This Ensembl Compara transfer from human TGIF1 (Q15583) annotates sequence-specific
      DNA binding at RNA polymerase II cis-regulatory regions. TGIF1 contains a TALE homeodomain
      (residues 58-120) that binds specific DNA sequences including TGCA-containing retinoid
      response elements. The protein acts at RNA polymerase II-dependent promoters to repress
      transcription (PMID:10995736).
    action: ACCEPT
    reason: >-
      TGIF1 is a sequence-specific DNA binding protein that acts at RNA polymerase II
      cis-regulatory regions. Its homeodomain recognizes specific DNA sequences. This is
      a core molecular function of TGIF1.
    supported_by:
    - reference_id: PMID:10995736
      supporting_text: >-
        TGIF binds directly to DNA to repress transcription or interacts with TGF-beta-activated
        Smads, thereby repressing genes normally activated by TGF-beta.

- term:
    id: GO:0001227
    label: DNA-binding transcription repressor activity, RNA polymerase II-specific
  evidence_type: IEA
  original_reference_id: GO_REF:0000107
  review:
    summary: >-
      This Ensembl Compara transfer from human TGIF1 (Q15583) identifies TGIF1 as having
      DNA-binding transcription repressor activity specific to RNA polymerase II. This is the
      most precise and informative molecular function term for TGIF1. The protein represses
      transcription by binding DNA via its homeodomain and recruiting corepressors HDAC1 and
      CtBP (PMID:10995736).
    action: ACCEPT
    reason: >-
      This is the single most informative and accurate molecular function annotation for
      TGIF1. It precisely captures the protein's core activity as a sequence-specific
      DNA-binding transcriptional repressor that acts on RNA polymerase II transcription.
      Strongly supported by literature.
    supported_by:
    - reference_id: PMID:10995736
      supporting_text: >-
        The homeodomain protein TGIF represses transcription in part by recruiting histone
        deacetylases. TGIF binds directly to DNA to repress transcription or interacts with
        TGF-beta-activated Smads, thereby repressing genes normally activated by TGF-beta.
    - reference_id: PMID:10995736
      supporting_text: >-
        Disruption of the PLDLS motif in TGIF abolishes the interaction of CtBP with TGIF
        and compromises the ability of TGIF to repress transcription.

- term:
    id: GO:0003682
    label: chromatin binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000107
  review:
    summary: >-
      This Ensembl Compara transfer from mouse Tgif1 (P70284) annotates chromatin binding.
      As a homeodomain transcription factor that recruits HDAC1 (a chromatin-modifying enzyme)
      and CtBP corepressor complexes to target loci, TGIF1 is expected to interact with
      chromatin (PMID:10995736). The protein binds DNA directly via its homeodomain and
      mediates chromatin modification through its corepressor recruitment.
    action: ACCEPT
    reason: >-
      Chromatin binding is consistent with TGIF1's role as a transcriptional repressor that
      recruits histone deacetylases. TGIF1 binds DNA within a chromatin context and mediates
      chromatin remodeling through HDAC1 recruitment.
    supported_by:
    - reference_id: PMID:10995736
      supporting_text: >-
        The homeodomain protein TGIF represses transcription in part by recruiting histone
        deacetylases.

- term:
    id: GO:0005654
    label: nucleoplasm
  evidence_type: IEA
  original_reference_id: GO_REF:0000107
  review:
    summary: >-
      This Ensembl Compara transfer from human TGIF1 (Q15583) identifies nucleoplasm
      localization. As a nuclear transcription factor, TGIF1 functions in the nucleoplasm
      where it interacts with SMAD complexes and binds DNA at target promoters. This is
      more specific than the nucleus (GO:0005634) annotation and is well-supported.
    action: ACCEPT
    reason: >-
      Nucleoplasm is the expected compartment for a nuclear transcription factor like TGIF1.
      Consistent with its function in transcriptional repression and interaction with
      SMAD2 complexes at gene promoters.
    supported_by:
    - reference_id: PMID:25873176
      supporting_text: >-
        Our results clearly demonstrate that TGIF sequesters Axin1 or Axin2 into the nucleus
        and thereby interfering with the assembly of the β-Catenin destruction complex, leading
        to β-Catenin accrual.

- term:
    id: GO:1990837
    label: sequence-specific double-stranded DNA binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000107
  review:
    summary: >-
      This Ensembl Compara transfer from human TGIF1 (Q15583) annotates sequence-specific
      double-stranded DNA binding. TGIF1 binds specific DNA sequences via its TALE homeodomain
      (residues 58-120), including TGCA-containing retinoid response elements and SMAD-responsive
      elements (PMID:10995736). This is a valid molecular function annotation.
    action: ACCEPT
    reason: >-
      Sequence-specific double-stranded DNA binding is a core molecular function of TGIF1's
      homeodomain. Supported by the annotated DNA-binding domain and literature evidence of
      sequence-specific binding.
    supported_by:
    - reference_id: PMID:10995736
      supporting_text: >-
        TGIF binds directly to DNA to repress transcription or interacts with TGF-beta-activated
        Smads, thereby repressing genes normally activated by TGF-beta.

- term:
    id: GO:0030512
    label: negative regulation of transforming growth factor beta receptor signaling pathway
  evidence_type: TAS
  original_reference_id: PMID:10995736
  review:
    summary: >-
      TGIF1 is one of the best-characterized negative regulators of TGF-beta signaling.
      It represses TGF-beta-activated gene expression by competing with co-activators for
      SMAD2 binding and by recruiting corepressors HDAC1 and CtBP to SMAD-responsive
      elements. The Reactome pathway R-RNO-2173795 (Downregulation of SMAD2/3:SMAD4
      transcriptional activity) explicitly includes TGIF1. This core function is not
      represented in the current GOA annotation set.
    action: NEW
    reason: >-
      This is arguably the most important biological process annotation for TGIF1 and is
      conspicuously absent from the current GOA set. TGIF1 was originally identified as a
      repressor of TGF-beta/SMAD signaling and this remains its best-characterized function.
      The Reactome pathway R-RNO-2173795 directly captures this role.
    supported_by:
    - reference_id: PMID:10995736
      supporting_text: >-
        Efficient repression of TGF-beta-activated gene responses by TGIF is dependent on
        interaction with CtBP, and we show that TGIF is able to recruit CtBP to a TGF-beta-activated
        Smad complex.
    - reference_id: PMID:25873176
      supporting_text: >-
        The mechanism of TGIF-induced suppression of TGF-β signaling has been primarily
        attributed to its ability to recruit a complex of general transcriptional corepressors
        to DNA-bound Smad transcription complexes ( Wotton et al., 1999 )

- term:
    id: GO:0048387
    label: negative regulation of retinoic acid receptor signaling pathway
  evidence_type: IEA
  original_reference_id: GO_REF:0000107
  review:
    summary: >-
      TGIF1 represses retinoid signaling by binding to retinoid X receptor response elements
      via its homeodomain. This is listed in the UniProt entry as an Ensembl-transferred GO
      annotation (IEA:Ensembl) but is not present in the GOA TSV provided. The TGIF acronym
      itself (TG-interacting factor) derives from its original identification as a homeodomain
      protein that binds a retinoid response element. This is a well-established secondary
      function of TGIF1.
    action: NEW
    reason: >-
      Repression of retinoic acid receptor signaling is a well-established function of TGIF1
      and appears in the UniProt GO annotation list but was missing from the GOA file provided.
      This should be included as it represents one of TGIF1's two principal repressor activities
      (TGF-beta and retinoid signaling).

