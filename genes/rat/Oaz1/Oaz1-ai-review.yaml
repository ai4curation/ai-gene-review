description: 'Oaz1 encodes ornithine decarboxylase antizyme 1, a polyamine-responsive inhibitor of ODC that suppresses
  polyamine biosynthesis and uptake and promotes ubiquitin-independent proteasomal degradation of ODC. The review
  accepts these core regulatory activities, keeps localization and binding/transport contexts as non-core, and marks
  stress or drug-response annotations as over-annotations.'
