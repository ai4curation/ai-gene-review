core_functions:
- description: Oaz1 inhibits ornithine decarboxylase, represses polyamine biosynthesis and uptake, and
    promotes proteasomal degradation of ODC monomers.
  supported_by:
  - reference_id: UniProtKB:P54370
    supporting_text: Negatively regulates ODC activity and intracellular polyamine biosynthesis and uptake;
