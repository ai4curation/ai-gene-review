references:
- id: file:rat/Oaz1/Oaz1-deep-research-falcon.md
  title: Falcon deep research report for rat Oaz1 (ornithine decarboxylase antizyme 1)
  findings:
  - statement: Falcon report confirms OAZ1 is a polyamine-inducible regulatory (non-catalytic) protein
      that binds ODC, inhibits its activity, and accelerates ubiquitin-independent 26S proteasomal degradation.
    supporting_text: |-
      OAZ1 is a polyamine-inducible antizyme produced by **programmed +1 ribosomal frameshifting**, binds **ornithine decarboxylase (ODC)**, inhibits its enzymatic activity, and accelerates its **ubiquitin-independent 26S proteasomal degradation**.
    reference_section_type: OTHER
  - statement: OAZ1 binds ODC monomers and prevents formation of the active ODC dimer, thereby inhibiting
      decarboxylase activity.
    supporting_text: |-
      OAZ1 binds ODC subunits/monomers and prevents formation of the active ODC dimer, thereby inhibiting decarboxylase activity
    reference_section_type: OTHER
  - statement: The OAZ1-ODC complex promotes rapid 26S proteasomal degradation of ODC without ubiquitination.
    supporting_text: |-
      The OAZ1–ODC complex promotes **rapid ODC degradation by the 26S proteasome without ubiquitination**
    reference_section_type: OTHER
  - statement: OAZ1 also regulates polyamine uptake and excretion, coupling it functionally to membrane
      transport processes although OAZ1 itself is not a membrane protein.
    supporting_text: |-
      OAZ1 is also described as regulating **polyamine uptake and excretion**, implying a role functionally coupled to transport processes at cellular membranes (even if OAZ1 itself is not a membrane protein)
    reference_section_type: OTHER
  - statement: OAZ1's primary molecular function is regulatory rather than catalytic, consistent with an
      ODC inhibitor activity rather than an enzymatic activity.
    supporting_text: |-
      OAZ1’s primary molecular function is regulatory rather than catalytic
    reference_section_type: OTHER
  - statement: Among antizyme isoforms, OAZ1 is the most effective stimulator of ODC degradation, with
      OAZ2 able to partially compensate when OAZ1 is lost.
    supporting_text: |-
      all OAZ proteins can inhibit ODC, but **OAZ1 is the most effective stimulator of ODC degradation**, and **OAZ2 may partially compensate if OAZ1 is lost**
    reference_section_type: OTHER
  - statement: OAZ1 functions in the cytosol/nucleocytosol where it physically engages cytosolic ODC and
      delivers it to the 26S proteasome.
    supporting_text: |-
      OAZ1’s core action requires physical interaction with cytosolic ODC subunits and delivery of ODC to the **26S proteasome**, strongly supporting that OAZ1 functions primarily in compartments where ODC and proteasomes interact (cytosol/nucleocytosol)
    reference_section_type: OTHER
