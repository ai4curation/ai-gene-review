- id: file:rat/Ube2d2b/Ube2d2b-deep-research-falcon.md
  title: 'Falcon (Edison Scientific) deep research report: Functional annotation of rat Ube2d2b (UniProt P70711),
    Ubiquitin-conjugating enzyme E2 D2B (EC 2.3.2.23)'
  findings:
  - statement: Identity verified as a canonical UBE2D-family E2 with a conserved UBC domain and catalytic
      active-site cysteine, but no rat-specific primary literature keyed to P70711/Ube2d2b was retrieved, so the
      functional annotation is conserved-inference rather than rat-specific discovery.
    supporting_text: |-
      The UniProt target **P70711** corresponds to a rat (**Rattus norvegicus**) ubiquitin‑conjugating enzyme of the **UBE2D (UbcH5) family**, consistent with a canonical E2 enzyme carrying a conserved **UBC domain** and catalytic **active‑site cysteine** used to transfer ubiquitin in the E1
    reference_section_type: OTHER
  - statement: Direct rat-specific literature for P70711/Ube2d2b was not found; annotation rests on UBE2D
      family evidence, supporting conservative action calls for this poorly characterized paralog.
    supporting_text: |-
      However, **direct rat‑specific primary literature explicitly keyed to UniProt P70711 / gene symbol Ube2d2b was not retrieved** in the available corpus.
    reference_section_type: OTHER
  - statement: UBE2D enzymes are promiscuous E2s that work with many E3 ligases and support either
      monoubiquitination or polyubiquitin chains, with linkage outcome set by the E3 partner rather than intrinsic
      linkage specificity.
    supporting_text: |-
      UBE2D family members are widely described as **promiscuous E2s** that can work with many E3 ligases and can support either monoubiquitination or polyubiquitin chain building depending strongly on the **E3 partner and reaction context**, rather than having a strict intrinsic linkage specificity.
    reference_section_type: OTHER
  - statement: UBE2D supports initial monoubiquitination in APC/C-linked mitotic ubiquitination, with K11 chain
      extension provided by other E2s, corroborating involvement in K11-linked ubiquitination.
    supporting_text: |-
      - **APC/C‑linked mitotic ubiquitination**, where UBE2D can support **initial monoubiquitination**, and other E2s (e.g., UBE2C/UBE2S) extend K11 chains in that context
    reference_section_type: OTHER
  - statement: The proposed primary molecular function is canonical E2 ubiquitin-conjugating enzyme activity,
      accepting ubiquitin from E1 onto a catalytic cysteine and donating it to substrates with numerous E3 ligases.
    supporting_text: |-
      Ube2d2b encodes a canonical **ubiquitin‑conjugating enzyme E2** that accepts ubiquitin from E1 onto a catalytic cysteine (forming E2~Ub thioester) and donates ubiquitin to substrate proteins in conjunction with numerous E3 ligases
    reference_section_type: OTHER
  - statement: The most plausible primary function is broad E2 donor activity, with biological specificity
      conferred by the E3 ligase network rather than a single substrate specificity.
    supporting_text: |-
      the most plausible “primary function” is not a single substrate specificity but rather **broad E2 donor activity** whose biological specificity is conferred by the **E3 ligase network** and regulatory context.
    reference_section_type: OTHER
core_functions:
- description: Ube2d2b is an E2 ubiquitin-conjugating enzyme that transfers ubiquitin to protein substrates in
    ubiquitination and ubiquitin-dependent protein catabolism. As a UBE2D (UbcH5) family member, it acts as a
    promiscuous E2 donor whose linkage outcome and biological specificity are conferred by its partner E3 ligases
    rather than an intrinsic substrate or linkage specificity.
  supported_by:
  - reference_id: UniProtKB:P70711
    supporting_text: Catalyzes the covalent attachment of ubiquitin to other proteins; pathway protein
      ubiquitination.
  - reference_id: file:rat/Ube2d2b/Ube2d2b-deep-research-falcon.md
    supporting_text: |-
      Ube2d2b encodes a canonical **ubiquitin‑conjugating enzyme E2** that accepts ubiquitin from E1 onto a catalytic cysteine (forming E2~Ub thioester) and donates ubiquitin to substrate proteins in conjunction with numerous E3 ligases
    reference_section_type: OTHER
