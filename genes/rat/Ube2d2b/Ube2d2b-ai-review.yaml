- term:
    id: GO:0070979
    label: protein K11-linked ubiquitination
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: protein K11-linked ubiquitination is marked as over-annotated for Ube2d2b; UBE2D-family E2s provide
      monoubiquitination priming in the APC/C context, whereas the K11 chains that define this term are assembled
      by dedicated chain-elongating E2s (UBE2C/UBE2S), so the linkage-specific claim overstates the UBE2D role
      (IBA, GO_REF:0000033).
    action: MARK_AS_OVER_ANNOTATED
    reason: GO:0070979 denotes formation of polyubiquitin chains linked through ubiquitin Lys11. The UBE2D family
      evidence indicates UBE2D contributes the initial monoubiquitination (priming) step in APC/C-mediated
      ubiquitination, while K11 chain elongation is carried out by other E2s (UBE2C/UBE2S). The K11-specific term
      therefore over-attributes direct K11 chain assembly to Ube2d2b; the general ubiquitination and E2 activity
      terms (GO:0016567, GO:0061631) capture its actual role.
    supported_by:
    - reference_id: UniProtKB:P70711
      supporting_text: 'FUNCTION: Catalyzes the covalent attachment of ubiquitin to other proteins. Mediates the
        selective degradation of short-lived and abnormal proteins.'
