description: 'Ube2d2b encodes a ubiquitin-conjugating enzyme E2 D family member that transfers ubiquitin in protein
  ubiquitination reactions and supports ubiquitin-dependent protein catabolism. The review accepts the E2 activity
  and ubiquitination/catabolic annotations, modifies a generic transferase term to the E2-specific activity, and
  marks metal/metalloid response annotations as expression-context over-annotations.'
