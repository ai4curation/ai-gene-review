id: P55213
gene_symbol: Casp3
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:10116
  label: Rattus norvegicus
description: Casp3 encodes rat caspase-3, the conserved effector cysteine protease
  that executes apoptosis after initiator-caspase activation. The ISO trace shows
  that the best-supported conserved transfers are cysteine-type endopeptidase activity,
  proteolysis, cytoplasmic/cytosolic localization, apoptotic process, execution phase
  of apoptosis, and apoptotic DNA fragmentation. Many additional ISO rows are second-hop
  transitive transfers or over-specific context terms from human, mouse, dog, pig,
  and chinchilla ortholog records, especially for stimulus-specific responses, pyroptosis,
  and pleiotropic developmental or immune phenotypes; those are kept as non-core,
  modified to more precise core terms, or removed.
