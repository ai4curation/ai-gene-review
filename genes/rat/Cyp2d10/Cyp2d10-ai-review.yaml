- term:
    id: GO:0019369
    label: arachidonate metabolic process
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: |-
      arachidonate metabolic process is an over-annotation for rat Cyp2d10. Arachidonic acid epoxygenation/
      hydroxylation is characteristic of other P450 families (e.g. CYP2C, CYP2J, CYP4A epoxygenases/hydroxylases),
      not the CYP2D subfamily, whose substrate profile is dominated by basic, drug-like xenobiotics. This IBA is
      propagated from a narrow PANTHER node (PTN000670525, supported only by RGD:620640) and is not corroborated
      by any direct rat Cyp2d10 evidence. Falcon deep research surveyed CYP2D substrate chemistry and found no
      arachidonate-metabolism evidence for rat Cyp2d10 (or for the CYP2D family); the documented CYP2D substrates
      are debrisoquine, codeine, imipramine, and thioridazine.
    action: MARK_AS_OVER_ANNOTATED
    reason: |-
      Arachidonate metabolism is a paralog-misassigned substrate for the CYP2D subfamily; it reflects activity of
      epoxygenase/hydroxylase P450 families rather than CYP2D, and no direct evidence supports it for rat Cyp2d10.
    supported_by:
    - reference_id: UniProtKB:P12939
      supporting_text: GO; GO:0019369; P:arachidonate metabolic process; IBA:GO_Central.
    - reference_id: file:rat/Cyp2d10/Cyp2d10-deep-research-falcon.md
      supporting_text: |-
        CYP2D enzymes catalyze multiple oxidative reactions (hydroxylation, N-dealkylation, oxidation) and are known to metabolize substrates including **debrisoquine** and **codeine** among others.
