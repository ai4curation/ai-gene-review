- id: file:rat/Cyp2d10/Cyp2d10-deep-research-falcon.md
  title: 'Falcon (Edison Scientific) deep research report: rat Cyp2d10 (UniProt P12939) functional annotation'
  findings:
  - statement: |-
      Falcon confirms gene identity (rat Cyp2d10, UniProt P12939, a CYP2D-family monooxygenase historically
      annotated as debrisoquine 4-hydroxylase) and emphasizes that no direct rat Cyp2d10 catalytic/substrate
      evidence was retrievable, so molecular function must rest on CYP2D-family inference.
    supporting_text: |-
      Cytochrome P450 2D10 (gene **Cyp2d10**, UniProt **P12939**) is a rat CYP2D-family monooxygenase, historically annotated as *debrisoquine 4-hydroxylase* and therefore expected to catalyze NADPH- and O2-dependent oxidation (hydroxylation/dealkylation) of basic, drug-like xenobiotics typical of CYP2D enzymes. However, within the literature retrievable in this run, **direct primary enzymology evidence for rat CYP2D10/P12939 substrate specificity and kinetic constants (Km/Vmax) was not found**
    reference_section_type: OTHER
  - statement: |-
      CYP2D enzymes catalyze oxidative biotransformations of basic, drug-like xenobiotics, supporting the
      monooxygenase / oxidoreductase MF and xenobiotic metabolic process BP annotations.
    supporting_text: |-
      CYP2D enzymes are members of the cytochrome P450 superfamily that catalyze oxidative biotransformations (e.g., aromatic/aliphatic hydroxylation, N-dealkylation, oxidation of reduced alcohols) for many xenobiotics, particularly compounds with a **basic atom positioned ~5–7 Å from the site of metabolism**, a structural feature classically discussed for human CYP2D6 and used to rationalize substrate recognition across the CYP2D subfamily.
    reference_section_type: OTHER
  - statement: |-
      Documented CYP2D substrate chemistry (hydroxylation, N-dealkylation, oxidation) targets drug-like
      molecules such as debrisoquine and codeine; no arachidonate-metabolism activity is reported, consistent
      with arachidonate metabolism being a non-CYP2D (paralog) function.
    supporting_text: |-
      CYP2D enzymes catalyze multiple oxidative reactions (hydroxylation, N-dealkylation, oxidation) and are known to metabolize substrates including **debrisoquine** and **codeine** among others.
    reference_section_type: OTHER
  - statement: |-
      Rat Cyp2d10 protein is detectable in extracellular vesicles from primary rat hepatocytes, supporting
      hepatocyte/liver association.
    supporting_text: |-
      Cyp2D10 protein is detectable in extracellular vesicles (EVs) derived from primary rat hepatocytes
    reference_section_type: OTHER
  - statement: |-
      Hepatocyte association of Cyp2d10 is supported by EV proteomics from primary rat hepatocytes, and assays
      are performed in liver microsomes consistent with the microsomal/ER context of P450 activities.
    supporting_text: |-
      **Hepatocyte association** is supported by EV proteomics from primary rat hepatocytes.
    reference_section_type: OTHER
  - statement: |-
      CYP2D-family expression is under transcription-factor control; cited mouse data show Cyp2d10 expression
      decreases in HNF1alpha-null animals.
    supporting_text: |-
      in **HNF1α-null mice, Cyp2d10 expression decreases while Cyp2d9 increases**
    reference_section_type: OTHER
