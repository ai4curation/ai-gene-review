  review:
    summary: cholesterol metabolic process is retained for Sqle because it matches the documented core
      molecular role or a direct pathway consequence (IEA, GO_REF:0000117).
    action: ACCEPT
    reason: The annotation is directly consistent with Sqle catalyzing squalene epoxidation in
      sterol/cholesterol biosynthesis.
    supported_by:
    - reference_id: UniProtKB:P52020
      supporting_text: 'FUNCTION: Catalyzes the stereospecific oxidation of squalene to (S)-2,3-epoxysqualene, and
        is considered to be a rate-limiting enzyme in steroid biosynthesis.'
    - reference_id: file:rat/Sqle/Sqle-deep-research-falcon.md
      supporting_text: |-
        SQLE functions in the **mevalonate-cholesterol pathway** after squalene synthase and before oxidosqualene cyclase, controlling flux into sterol production. Because it is one of the principal regulated steps in cholesterol synthesis, altered SQLE activity changes levels of cholesterol, squalene, and related metabolites such as CoQ pathway outputs indirectly via pathway flux redistribution.
      reference_section_type: OTHER
