id: P52020
gene_symbol: Sqle
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:10116
  label: Rattus norvegicus
description: 'Sqle encodes squalene monooxygenase, a FAD-dependent endoplasmic-reticulum-associated enzyme that
  oxidizes squalene to (S)-2,3-epoxysqualene in sterol and cholesterol biosynthesis. The review accepts the monooxygenase
  activity and general sterol/cholesterol biosynthetic roles, keeps ER/FAD/lipid-droplet context as non-core, and
  modifies or marks route-specific and response/proliferation terms that overstate the direct evidence.'
existing_annotations:
- term:
    id: GO:0004506
    label: squalene monooxygenase activity
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: squalene monooxygenase activity is retained for Sqle because it matches the documented core 
      molecular role or a direct pathway consequence (IBA, GO_REF:0000033).
    action: ACCEPT
    reason: The annotation is directly consistent with Sqle catalyzing squalene epoxidation in
      sterol/cholesterol biosynthesis.
    supported_by:
    - reference_id: UniProtKB:P52020
      supporting_text: 'FUNCTION: Catalyzes the stereospecific oxidation of squalene to (S)-2,3-epoxysqualene, and
        is considered to be a rate-limiting enzyme in steroid biosynthesis.'
    - reference_id: file:rat/Sqle/Sqle-deep-research-falcon.md
      supporting_text: |-
        SQLE catalyzes the **stereospecific epoxidation** of **squalene** to **2,3(S)-oxidosqualene** (also termed 2,3-epoxysqualene), which is the **first oxygenation step** and a committed transformation within the sterol branch of the mevalonate–cholesterol pathway.
      reference_section_type: OTHER
- term:
    id: GO:0005783
    label: endoplasmic reticulum
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: endoplasmic reticulum is retained for Sqle as supported contextual biology, but it is not the
      defining core function (IBA, GO_REF:0000033).
    action: KEEP_AS_NON_CORE
    reason: This term records subcellular location, FAD/cofactor binding, membrane association, or
      lipid-droplet context rather than the defining catalytic function.
    supported_by:
    - reference_id: UniProtKB:P52020
      supporting_text: 'FUNCTION: Catalyzes the stereospecific oxidation of squalene to (S)-2,3-epoxysqualene, and
        is considered to be a rate-limiting enzyme in steroid biosynthesis.'
    - reference_id: file:rat/Sqle/Sqle-deep-research-falcon.md
      supporting_text: |-
        SQLE is an **endoplasmic reticulum (ER) membrane-associated** protein. A regulatory **N-terminal ~100 aa (N100)** region mediates lipid sensing and degradation, while the **catalytic domain** spans the C-terminus (approximately aa 101–574 in human; highly conserved across mammals).
      reference_section_type: OTHER
