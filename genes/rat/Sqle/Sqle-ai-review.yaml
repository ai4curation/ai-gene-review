- id: file:rat/Sqle/Sqle-deep-research-falcon.md
  title: Falcon deep research on rat Sqle (Edison Scientific Literature)
  findings:
  - statement: SQLE catalyzes the stereospecific epoxidation of squalene to 2,3(S)-oxidosqualene, the first
      oxygenation step of the sterol branch of the mevalonate-cholesterol pathway, corroborating the squalene
      monooxygenase activity (GO:0004506) annotation.
    supporting_text: |-
      SQLE catalyzes the **stereospecific epoxidation** of **squalene** to **2,3(S)-oxidosqualene** (also termed 2,3-epoxysqualene), which is the **first oxygenation step** and a committed transformation within the sterol branch of the mevalonate–cholesterol pathway.
    reference_section_type: OTHER
  - statement: SQLE is an FAD-dependent monooxygenase, supporting the FAD/flavin adenine dinucleotide binding
      annotations as cofactor context.
    supporting_text: |-
      **Cofactor:** SQLE is **FAD-dependent**; crystal structures of the human catalytic domain show SQLE bound to **FAD**.
    reference_section_type: OTHER
  - statement: SQLE is an endoplasmic reticulum membrane-associated protein, supporting the ER/ER membrane
      localization annotations.
    supporting_text: |-
      SQLE is an **endoplasmic reticulum (ER) membrane-associated** protein. A regulatory **N-terminal ~100 aa (N100)** region mediates lipid sensing and degradation, while the **catalytic domain** spans the C-terminus (approximately aa 101–574 in human; highly conserved across mammals).
    reference_section_type: OTHER
  - statement: SQLE acts after squalene synthase and before oxidosqualene cyclase in the mevalonate-cholesterol
      pathway, controlling flux into sterol production; this supports the general sterol/cholesterol biosynthetic
      process annotations and the demotion of pathway-branch (desmosterol/lathosterol/zymosterol) terms.
    supporting_text: |-
      SQLE functions in the **mevalonate-cholesterol pathway** after squalene synthase and before oxidosqualene cyclase, controlling flux into sterol production. Because it is one of the principal regulated steps in cholesterol synthesis, altered SQLE activity changes levels of cholesterol, squalene, and related metabolites such as CoQ pathway outputs indirectly via pathway flux redistribution.
    reference_section_type: OTHER
  - statement: SQLE receives electrons mainly via NADPH-cytochrome P450 reductase (POR/CPR) on the ER membrane,
      consistent with the catalytic activity using a reduced NADPH-hemoprotein reductase as electron donor.
    supporting_text: |-
      The principal electron donation route is **NADPH → NADPH–cytochrome P450 reductase (POR/CPR/P450R) → SQLE**.
    reference_section_type: OTHER
  - statement: Proliferation/cancer phenotypes attributed to SQLE arise from downstream cholesterol-dependent
      cellular states and recent tumor-immunity studies, not a direct SQLE molecular function; this supports
      marking regulation of cell population proliferation as over-annotated.
    supporting_text: |-
      making SQLE a metabolic “valve” controlling sterol pathway flux and altering levels of squalene and downstream cholesterol-dependent cellular states. Recent 2023–2024 studies extend SQLE’s relevance to ferroptosis modulation and tumor immunity, with pharmacologic inhibition (notably terbinafine) being evaluated in vivo for cancer-immunity contexts.
    reference_section_type: OTHER
