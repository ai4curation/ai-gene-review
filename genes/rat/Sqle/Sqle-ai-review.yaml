- term:
    id: GO:0033489
    label: cholesterol biosynthetic process via desmosterol
  evidence_type: IEA
  original_reference_id: GO_REF:0000107
  review:
    summary: cholesterol biosynthetic process via desmosterol captures part of Sqle biology, but a more 
      specific or better-aspected GO term should replace it (IEA, GO_REF:0000107).
    action: MODIFY
    reason: Sqle acts at the common early squalene-to-epoxysqualene step; pathway-branch terms such as 
      desmosterol, lathosterol, or zymosterol routes are more specific than the direct evidence warrants. 
      Replace with general cholesterol biosynthetic process.
    supported_by:
    - reference_id: UniProtKB:P52020
      supporting_text: 'FUNCTION: Catalyzes the stereospecific oxidation of squalene to (S)-2,3-epoxysqualene, and
        is considered to be a rate-limiting enzyme in steroid biosynthesis.'
    proposed_replacement_terms:
