  title: 'The crystallographic structure of a human dihydropteridine reductase NADH binary complex expressed in
    Escherichia coli by a cDNA constructed from its rat homologue'
  findings:
  - statement: For Qdpr, this publication supports direct annotations to 6,7-dihydropteridine reductase
      activity.
    supporting_text: A human dihydropteridine reductase (EC 1.6.99.10) has been created from a rat cDNA clone
      by a single five-oligonucleotide mutagenesis reaction and expressed in good yield in Escherichia coli.
    reference_section_type: ABSTRACT
- id: PMID:8631945
  title: 'Altered structural and mechanistic properties of mutant dihydropteridine reductases'
  findings:
  - statement: For Qdpr, this publication was reviewed as context for NADH binding.
    supporting_text: Nine single genetic mutants of rat dihydropteridine reductase (EC 1.6.99.7), D37I, W86I,
      Y146F, Y146H, K150Q, K150I, K150M, N186A, and A133S and one double mutant, Y146F/K150Q, have been
      engineered, overexpressed in Escherichia coli and their proteins purified.
    reference_section_type: ABSTRACT
- id: PMID:9235988
  title: 'The comparative interaction of quinonoid (6R)-dihydrobiopterin and an alternative dihydropterin substrate
    with wild-type and mutant rat dihydropteridine reductases'
  findings:
  - statement: For Qdpr, this publication supports direct annotations to tetrahydrobiopterin biosynthetic
      process.
    supporting_text: Kinetic parameters and primary deuterium isotope effects have been determined for
      wild-type dihydropteridine reductase (EC 1.6.99.7) and the Ala133Ser, Lys150Gln, Tyr146His, Tyr146Phe
      single, and Tyr146Phe/Ala133Ser and Tyr146Phe/Lys150Gln double mutant enzyme forms using the natural
      substrate, quinonoid (6R)-l-erythro-dihydrobiopterin (qBH2) and an alternate substrate, quinonoid
      6,7-dimethyldihydropteridine.
    reference_section_type: ABSTRACT
core_functions:
- description: Qdpr reduces quinonoid dihydrobiopterin to tetrahydrobiopterin, supporting tetrahydrobiopterin
    recycling and pteridine metabolism.
  supported_by:
  - reference_id: UniProtKB:P11348
    supporting_text: 'FUNCTION: Catalyzes the conversion of quinonoid dihydrobiopterin into tetrahydrobiopterin.'
