description: 'Qdpr encodes rat dihydropteridine reductase, which reduces quinonoid dihydrobiopterin back to tetrahydrobiopterin
  using NADH or NADPH. The review accepts the reductase activity and tetrahydrobiopterin/pteridine metabolism as
  direct functions, while treating nucleotide binding, localization, liver-development, and metal/xenobiotic response
  terms as context or over-annotation.'
