- term:
    id: GO:0005730
    label: nucleolus
  evidence_type: ISO
  original_reference_id: GO_REF:0000121
  negated: true
  review:
    summary: >-
      NOT annotation indicating MCM7 is not localized to the nucleolus, based on
      human ortholog data. This is a useful negative annotation that distinguishes
      MCM7 from nucleolar proteins.
    action: ACCEPT
    reason: >-
      Negative annotations provide valuable information. MCM7 functions in DNA
      replication on chromosomal DNA and is not associated with the nucleolus.
- term:
    id: GO:0071466
    label: cellular response to xenobiotic stimulus
  evidence_type: ISO
  original_reference_id: GO_REF:0000121
  review:
    summary: >-
      ISO annotation based on mouse ortholog. MCM7 expression is modulated by
      xenobiotic compounds such as statins (PMID:12591091) and PPARgamma agonists
      (PMID:12677008). However, MCM7 is not itself a sensor or responder to
      xenobiotics; rather, its expression is transcriptionally regulated as a
      downstream target. The annotation reflects that MCM7 levels change in
      response to xenobiotic stimulus, which is a secondary/downstream effect.
    action: KEEP_AS_NON_CORE
    reason: >-
      MCM7 expression changes in response to xenobiotic stimuli (statins, PPARgamma
      agonists), but this is a downstream transcriptional effect on a proliferation
      marker, not a core function of MCM7 in xenobiotic response. The qualifier
      in the GOA is 'acts_upstream_of_or_within' which is appropriately cautious.
    supported_by:
      - reference_id: PMID:12591091
        supporting_text: >-
          Stimulation of quiescent rat aortic vascular smooth muscle cells with fetal bovine serum induced MCM6 and MCM7 protein and mRNA expression, which was potently attenuated by atorvastatin in a dose-dependent fashion
- term:
    id: GO:0009410
    label: response to xenobiotic stimulus
  evidence_type: IEP
  original_reference_id: PMID:12591091
  review:
    summary: >-
      IEP annotation based on expression changes. PMID:12591091 shows that
      atorvastatin (a statin/xenobiotic) inhibits MCM7 expression in rat vascular
      smooth muscle cells. The paper demonstrates transcriptional downregulation
      of MCM7 by atorvastatin via an E2F-dependent mechanism. However, MCM7 is
      the target of regulation, not a participant in xenobiotic response per se.
    action: KEEP_AS_NON_CORE
    reason: >-
      The IEP evidence shows MCM7 expression is altered by xenobiotic treatment,
      but MCM7 is a proliferation marker whose downregulation is a consequence
      of growth arrest induced by the xenobiotic. This is not a core function
      of MCM7 but rather an indirect downstream effect.
    supported_by:
      - reference_id: PMID:12591091
        supporting_text: >-
          atorvastatin inhibited MCM6 and MCM7 promoter activity, implicating a transcriptional mechanism ... Inhibition of MCM6 and MCM7 expression by blocking E2F function may contribute importantly to the inhibition of vascular smooth muscle cell DNA synthesis by atorvastatin
- term:
    id: GO:0071364
    label: cellular response to epidermal growth factor stimulus
  evidence_type: IEP
  original_reference_id: PMID:19821535
  review:
    summary: >-
      IEP annotation based on PMID:19821535 which studies Cdk1 role in DNA
      replication during rat liver regeneration. The paper shows MCM7 is loaded
      onto DNA during replication initiation in hepatocytes, and its expression
      correlates with proliferative signals. However, the paper is primarily about
      Cdk1 function, and MCM7 is examined as a replication licensing marker. EGF
      is a mitogenic stimulus for hepatocytes, and MCM7 expression increases as
      part of the proliferative response, not as a specific EGF response gene.
    action: KEEP_AS_NON_CORE
    reason: >-
      MCM7 expression increases in proliferating hepatocytes responding to growth
      factors including EGF, but this reflects its role as a proliferation marker
      rather than a specific function in EGF signaling. MCM7 is an effector of
      DNA replication that is upregulated as a consequence of mitogenic signaling.
    supported_by:
      - reference_id: PMID:19821535
        supporting_text: >-
          replication initiation components such as the minichromosome maintenance 7 (Mcm7) protein were loaded onto DNA
- term:
    id: GO:0006974
    label: DNA damage response
  evidence_type: ISO
  original_reference_id: GO_REF:0000121
  review:
    summary: >-
      ISO annotation based on human ortholog (UniProtKB:P33993). MCM7 interacts
      with ATR-ATRIP and RAD17 checkpoint proteins per UniProt. Reactome pathway
      R-RNO-176187 (Activation of ATR in response to replication stress) includes
      MCM7. This is consistent with the IEA annotation for the same term.
    action: ACCEPT
    reason: >-
      Consistent with the IEA annotation. MCM7 participates in DNA damage
      checkpoint signaling through its interactions with ATR-ATRIP and RAD17
      at stalled replication forks.
- term:
    id: GO:0042325
    label: regulation of phosphorylation
  evidence_type: ISO
  original_reference_id: GO_REF:0000121
  review:
    summary: >-
      ISO annotation based on human ortholog (UniProtKB:P33993). MCM7 interacts
      with ATR-ATRIP which is a kinase complex involved in checkpoint
      phosphorylation. MCM7 may serve as a substrate or platform for checkpoint
      kinase signaling. However, "regulation of phosphorylation" is quite vague
      and does not specifically capture MCM7's role.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      While MCM7 participates in checkpoint signaling involving phosphorylation
      events (as a substrate of checkpoint kinases and interactor of ATR-ATRIP),
      the term "regulation of phosphorylation" is overly broad and does not
      accurately describe MCM7's specific role. MCM7 is more accurately described
      as participating in DNA damage response (GO:0006974) which is already
      annotated.
- term:
    id: GO:0003677
    label: DNA binding
  evidence_type: TAS
  original_reference_id: PMID:12677008
  review:
    summary: >-
      TAS annotation citing PMID:12677008. This paper describes MCM7 as a
      protein "required for the initiation and elongation stages of DNA
      replication" and studies its transcriptional regulation by PPARgamma.
      DNA binding is an intrinsic property of MCM proteins documented in
      general literature.
    action: ACCEPT
    reason: >-
      DNA binding is a core molecular function of MCM7, consistent with its
      role as a replicative helicase subunit. The TAS evidence is appropriate.
    supported_by:
      - reference_id: PMID:12677008
        supporting_text: >-
          MCM proteins are required for the initiation and elongation stages of DNA replication and are regulated by the transcription factor E2F
- term:
    id: GO:0005524
    label: ATP binding
  evidence_type: TAS
  original_reference_id: PMID:12677008
  review:
    summary: >-
      TAS annotation citing PMID:12677008. ATP binding is intrinsic to MCM7
      through its AAA+ ATPase domain (Walker A motif). The paper describes
      MCM7 as essential for DNA replication, which requires ATP hydrolysis.
    action: ACCEPT
    reason: >-
      ATP binding is a core molecular function of MCM7. Consistent with the
      IEA annotation and UniProt domain annotation.
    supported_by:
      - reference_id: PMID:12677008
        supporting_text: >-
          MCM proteins are required for the initiation and elongation stages of DNA replication
- term:
    id: GO:0006260
    label: DNA replication
  evidence_type: TAS
  original_reference_id: PMID:12677008
  review:
    summary: >-
      TAS annotation citing PMID:12677008 which explicitly states MCM proteins
      are "required for the initiation and elongation stages of DNA replication."
    action: ACCEPT
    reason: >-
      DNA replication is the core biological process for MCM7. The TAS evidence
      from PMID:12677008 directly supports this annotation.
    supported_by:
      - reference_id: PMID:12677008
        supporting_text: >-
          MCM proteins are required for the initiation and elongation stages of DNA replication
- term:
    id: GO:0006355
    label: regulation of DNA-templated transcription
  evidence_type: TAS
  original_reference_id: PMID:12677008
  review:
    summary: >-
      TAS annotation citing PMID:12677008. This paper studies transcriptional
      regulation OF MCM7 by PPARgamma and E2F, not regulation of transcription
      BY MCM7. The paper shows PPARgamma agonists inhibit MCM7 promoter activity
      via E2F-dependent mechanisms. MCM7 is the target of transcriptional
      regulation, not a transcriptional regulator itself. There is no established
      role for MCM7 in regulating transcription.
    action: REMOVE
    reason: >-
      This annotation appears to be a misinterpretation of PMID:12677008. The
      paper demonstrates that MCM7 transcription is regulated by PPARgamma and
      E2F, not that MCM7 regulates transcription. MCM7 is a DNA replication
      factor, not a transcription regulator. The paper states "activation of
      PPARgamma attenuates MCM7 transcription" - MCM7 is the target, not the
      regulator.
    supported_by:
      - reference_id: PMID:12677008
        supporting_text: >-
          activation of PPARgamma attenuates MCM7 transcription and support the important role of this nuclear receptor in regulating vascular smooth muscle cell proliferation
- term:
    id: GO:0008094
    label: ATP-dependent activity, acting on DNA
  evidence_type: TAS
  original_reference_id: PMID:12677008
  review:
    summary: >-
      TAS annotation citing PMID:12677008. MCM7 has ATP-dependent helicase
      activity that acts on DNA. This term is a parent of DNA helicase activity
      (GO:0003678) and is therefore less specific. UniProt classifies MCM7 as
      EC 3.6.4.12.
    action: ACCEPT
    reason: >-
      ATP-dependent activity acting on DNA is accurate for MCM7 as a helicase
      subunit. While less specific than GO:0003678 (DNA helicase activity),
      it is not incorrect and provides a valid broader annotation. The TAS
      evidence is appropriate given that PMID:12677008 describes MCM7 as
      essential for DNA replication which requires ATP-dependent DNA unwinding.
    supported_by:
      - reference_id: PMID:12677008
        supporting_text: >-
          MCM proteins are required for the initiation and elongation stages of DNA replication
- term:
    id: GO:0008283
    label: cell population proliferation
  evidence_type: ISO
  original_reference_id: GO_REF:0000121
  review:
    summary: >-
      ISO annotation based on mouse ortholog. MCM7 is essential for DNA
      replication and therefore for cell proliferation. PMID:12677008 and
      PMID:12591091 both demonstrate that MCM7 downregulation correlates
      with inhibition of vascular smooth muscle cell proliferation.
    action: KEEP_AS_NON_CORE
    reason: >-
      Cell proliferation is a downstream consequence of MCM7's role in DNA
      replication rather than a direct molecular function. While MCM7 is
      essential for proliferation (as all replication factors are), this is
      a high-level biological process that is too general to be informative
      as a core annotation. The GOA qualifier is 'acts_upstream_of_or_within'
      which appropriately reflects this indirect relationship.
    supported_by:
      - reference_id: PMID:12677008
        supporting_text: >-
          Inhibition of MCM6 and MCM7 expression ... paralleled their effect to inhibit phosphorylation of the retinoblastoma protein and cell proliferation
- term:
    id: GO:0071162
    label: CMG complex
  evidence_type: ISO
  original_reference_id: GO_REF:0000121
  review:
    summary: >-
      UniProt lists MCM7 as a "Component of the CMG helicase complex, a hexameric
      ring of related MCM2-7 subunits stabilized by CDC45 and the tetrameric GINS
      complex." The CMG complex (GO:0071162) is the activated form of the
      replicative helicase and is listed in the UniProt GO annotations (ISO:RGD).
      This annotation is present in UniProt cross-references but missing from the
      existing GOA annotations in this review.
    action: NEW
    reason: >-
      MCM7 is a subunit of the CMG complex, which is the activated replicative
      helicase. This is a core cellular component annotation that complements
      the MCM complex annotation. UniProt lists this as ISO:RGD.
