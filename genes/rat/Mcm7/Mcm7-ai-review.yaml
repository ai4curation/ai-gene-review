- id: PMID:19821535
  title: >-
    Cyclin-dependent kinase 1 plays a critical role in DNA replication control
    during rat liver regeneration.
  findings:
    - statement: >-
        MCM7 is loaded onto DNA as a replication initiation component during
        liver regeneration. Cdk1 is essential for DNA replication downstream
        of MCM7 loading in hepatocytes.
      supporting_text: >-
        replication initiation components such as the minichromosome maintenance 7 (Mcm7) protein were loaded onto DNA. Moreover, Mcm7 expression and loading onto DNA were not modified by Cdk1 silencing
core_functions:
- molecular_function:
    id: GO:0003678
    label: DNA helicase activity
  description: >-
    MCM7 is a subunit of the MCM2-7 replicative helicase (EC 3.6.4.12). The hexameric
    ring unwinds duplex DNA at replication forks during S-phase. Each subunit contributes
    an ATPase active site formed by the Walker A box and an arginine finger motif provided
    in trans by the adjacent subunit. The helicase activity is a collective property of
    the assembled ring. MCM7 also participates in the CMG complex (Cdc45-MCM-GINS), which
    is the fully activated replicative helicase.
  directly_involved_in:
  - id: GO:0006260
    label: DNA replication
  - id: GO:0006270
    label: DNA replication initiation
  locations:
  - id: GO:0005634
    label: nucleus
  - id: GO:0042555
    label: MCM complex
  - id: GO:0071162
    label: CMG complex
  supported_by:
  - reference_id: PMID:12677008
    supporting_text: >-
      MCM proteins are required for the initiation and elongation stages of DNA replication
  - reference_id: PMID:19821535
    supporting_text: >-
      replication initiation components such as the minichromosome maintenance 7 (Mcm7) protein were loaded onto DNA
- molecular_function:
    id: GO:0005524
    label: ATP binding
  description: >-
    MCM7 binds ATP through its Walker A motif in the AAA+ ATPase domain (positions
    332-537). ATP binding and hydrolysis drive conformational changes in the MCM2-7
    ring required for DNA unwinding. The ATPase activity is integral to the helicase
    function.
  directly_involved_in:
  - id: GO:0006260
    label: DNA replication
  locations:
  - id: GO:0005634
    label: nucleus
