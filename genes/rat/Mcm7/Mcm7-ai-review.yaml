- term:
    id: GO:0003678
    label: DNA helicase activity
  evidence_type: ISO
  original_reference_id: GO_REF:0000121
  qualifier: contributes_to
  review:
    summary: >-
      ISO annotation with contributes_to qualifier, based on human ortholog
