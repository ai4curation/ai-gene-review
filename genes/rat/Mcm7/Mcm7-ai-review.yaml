- term:
    id: GO:0006260
    label: DNA replication
  evidence_type: ISO
  original_reference_id: GO_REF:0000121
  review:
    summary: >-
      ISO annotation based on human ortholog (UniProtKB:P33993). DNA replication
      is the primary function of MCM7 across all eukaryotes.
    action: ACCEPT
    reason: >-
      Consistent with IEA and TAS annotations. DNA replication is the core
