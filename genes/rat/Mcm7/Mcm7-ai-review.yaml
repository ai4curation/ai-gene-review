id: A6KSS8
gene_symbol: Mcm7
product_type: PROTEIN
status: IN_PROGRESS
taxon:
  id: NCBITaxon:10116
  label: Rattus norvegicus
description: >-
  Mcm7 (DNA replication licensing factor MCM7) is a subunit of the hexameric MCM2-7
  replicative helicase complex, which is essential for DNA replication initiation and
  elongation in eukaryotic cells. The MCM2-7 complex forms a toroidal ring with the
  subunit order MCM2-MCM6-MCM4-MCM7-MCM3-MCM5, and acts as the core helicase that
  unwinds duplex DNA at replication forks. MCM7 has an AAA+ ATPase domain (EC 3.6.4.12)
  that contributes to the collective helicase activity of the ring, with each subunit
  providing an arginine finger motif in trans to the ATP-binding site of its neighbor.
  MCM7 is also a component of the CMG (Cdc45-MCM-GINS) complex, the activated form of
  the replicative helicase. It localizes to the nucleus and is loaded onto chromatin
  during replication licensing in G1 phase. MCM7 interacts with ATR-ATRIP and RAD17,
  linking it to DNA damage checkpoint signaling. Expression of Mcm7 is regulated by
  E2F transcription factors and is inhibited by PPARgamma agonists and statins in
  vascular smooth muscle cells (PMID:12677008, PMID:12591091).
existing_annotations:
- term:
    id: GO:0003677
    label: DNA binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: >-
      DNA binding is a fundamental property of MCM7 as part of the MCM2-7 helicase
      complex that directly engages with DNA during replication. UniProt lists DNA-binding
      as a keyword and the protein contains MCM domain (InterPro:IPR001208) with OB-fold
      and AAA+ domains consistent with DNA interaction.
    action: ACCEPT
    reason: >-
      MCM7 is a component of the replicative helicase that directly contacts DNA.
      DNA binding is a core molecular function of this protein, well-supported by
      domain architecture (MCM_OB, MCM domain) and its enzymatic classification
      (EC 3.6.4.12, DNA helicase).
- term:
    id: GO:0003678
    label: DNA helicase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  review:
    summary: >-
      MCM7 is classified as EC 3.6.4.12 (DNA helicase) in UniProt. The MCM2-7 complex
      is the replicative helicase essential for unwinding DNA at replication forks. The
      helicase activity is a collective property of the hexameric ring, with each subunit
      contributing through its ATPase active site.
    action: ACCEPT
    reason: >-
      DNA helicase activity is the core enzymatic function of the MCM2-7 complex.
      MCM7 contributes its ATPase site to the ring, and the EC classification
      (3.6.4.12) directly maps to this GO term. Note that some GOA entries use
      the 'contributes_to' qualifier for this annotation on MCM7, which is also
      appropriate since helicase activity is a property of the whole complex.
- term:
    id: GO:0005524
    label: ATP binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  review:
    summary: >-
      MCM7 contains a Walker A box ATP-binding motif within its AAA+ ATPase domain
      (InterPro:IPR003593, PROSITE:PS50051 MCM C-terminal AAA(+) ATPase at positions
      332-537). UniProt lists ATP-binding as a keyword.
    action: ACCEPT
    reason: >-
      ATP binding is essential for MCM7 ATPase and helicase function. The Walker A
      motif in the AAA+ domain directly binds ATP. This is a core molecular function.
- term:
    id: GO:0005634
    label: nucleus
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  review:
    summary: >-
      MCM7 localizes to the nucleus where it functions in DNA replication. UniProt
      lists nucleus as a subcellular location keyword and the FUNCTION section states
      nuclear localization.
    action: ACCEPT
    reason: >-
      Nuclear localization is essential for MCM7 function in DNA replication.
      This is a core cellular component annotation.
- term:
    id: GO:0005694
    label: chromosome
  evidence_type: IEA
  original_reference_id: GO_REF:0000044
  review:
    summary: >-
      MCM7 is loaded onto chromatin during replication licensing. UniProt lists
      chromosome as a subcellular location. PMID:19821535 describes MCM7 being
      "loaded onto DNA" during replication initiation in rat hepatocytes.
    action: ACCEPT
    reason: >-
      Chromatin/chromosome association is a core property of MCM7 as a DNA replication
      licensing factor. The MCM complex is loaded onto origins of replication on
      chromosomal DNA during G1 phase.
    supported_by:
      - reference_id: PMID:19821535
        supporting_text: >-
          replication initiation components such as the minichromosome maintenance 7 (Mcm7) protein were loaded onto DNA
- term:
    id: GO:0006260
    label: DNA replication
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  review:
    summary: >-
      DNA replication is the primary biological process for MCM7. UniProt states
      it is "essential for 'once per cell cycle' DNA replication initiation and
      elongation in eukaryotic cells." PMID:12677008 and PMID:12591091 both describe
      MCM7 as essential for DNA replication.
    action: ACCEPT
    reason: >-
      DNA replication is the core biological process of MCM7. This is its defining
      function as a replicative helicase subunit.
    supported_by:
      - reference_id: PMID:12677008
        supporting_text: >-
          MCM proteins are required for the initiation and elongation stages of DNA replication
- term:
    id: GO:0006270
    label: DNA replication initiation
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: >-
      MCM7 is specifically involved in DNA replication initiation as part of the
      pre-replicative complex (pre-RC). The MCM2-7 complex is loaded onto origins
      during licensing. UniProt describes MCM7 as essential for "DNA replication
      initiation and elongation." Reactome pathways include assembly of the
      pre-replicative complex (R-RNO-68867) and activation of the pre-replicative
      complex (R-RNO-68962).
    action: ACCEPT
    reason: >-
      DNA replication initiation is a core biological process for MCM7. The MCM2-7
      complex is a key component of the pre-RC and its loading onto origins is
      the licensing step that initiates replication.
    supported_by:
      - reference_id: PMID:19821535
        supporting_text: >-
          replication initiation components such as the minichromosome maintenance 7 (Mcm7) protein were loaded onto DNA
- term:
    id: GO:0042555
    label: MCM complex
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  review:
    summary: >-
      MCM7 is a subunit of the MCM2-7 complex. UniProt states it is a "Component of
      the MCM2-7 complex" with "the proposed subunit order MCM2-MCM6-MCM4-MCM7-MCM3-MCM5."
    action: ACCEPT
    reason: >-
      Membership in the MCM complex is a defining characteristic of MCM7. This is
      a core cellular component annotation.
- term:
    id: GO:0003697
    label: single-stranded DNA binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: contributes_to
  review:
    summary: >-
      As the MCM2-7 complex unwinds duplex DNA, the central channel of the ring
      encircles single-stranded DNA. The 'contributes_to' qualifier is appropriate
      as ssDNA binding is a property of the assembled complex rather than MCM7 alone.
      The MCM_OB domain (Pfam:PF17207) is an OB-fold domain characteristic of
      ssDNA-binding proteins.
    action: ACCEPT
    reason: >-
      The contributes_to qualifier correctly captures that ssDNA binding is a
      property of the MCM2-7 complex to which MCM7 contributes through its OB-fold
      domain. This is a core function related to helicase activity.
- term:
    id: GO:0006974
    label: DNA damage response
  evidence_type: IEA
  original_reference_id: GO_REF:0000107
  review:
    summary: >-
      MCM7 has a documented role in DNA damage checkpoint signaling. UniProt notes
      that MCM7 "Interacts with the ATR-ATRIP complex and with RAD17." Reactome
      pathway R-RNO-176187 (Activation of ATR in response to replication stress)
      includes MCM7. The MCM complex is a sensor of replication stress and
      activates checkpoint kinases.
    action: ACCEPT
    reason: >-
      DNA damage response is a well-supported function for MCM7 based on its
      interaction with ATR-ATRIP and RAD17 checkpoint components. This is a
      secondary but important function closely tied to its role at the replication
      fork.
