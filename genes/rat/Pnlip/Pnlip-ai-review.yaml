id: P27657
gene_symbol: Pnlip
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:10116
  label: Rattus norvegicus
description: 'Pnlip encodes secreted pancreatic triglyceride lipase, the colipase-dependent digestive
  lipase that hydrolyzes dietary triacylglycerols and can also hydrolyze retinyl esters. The review accepts
  the specific lipase and retinyl ester hydrolase activities, keeps secretion and lipid/sterol absorption
  contexts as non-core, and removes or modifies terms that confuse Pnlip with related pancreatic lipases
  or downstream expression responses.'
existing_annotations:
  - term:
      id: GO:0019433
      label: triglyceride catabolic process
    evidence_type: IBA
    original_reference_id: GO_REF:0000033
    review:
      summary: triglyceride catabolic process is retained for Pnlip because it matches the 
        documented core enzymatic role or its direct pathway consequence (IBA, GO_REF:0000033).
      action: ACCEPT
      reason: triglyceride catabolic process is directly supported by the curated function of Pnlip 
        and is not merely a downstream phenotype or expression response.
      supported_by:
        - reference_id: UniProtKB:P27657
          supporting_text: 'FUNCTION: Plays an important role in fat metabolism. It preferentially splits
            the esters of long-chain fatty acids at positions 1 and 3, producing mainly 2-monoacylglycerol
            and free fatty acids, and shows considerably higher activity against insoluble emulsified
            substrates than against soluble ones.'
