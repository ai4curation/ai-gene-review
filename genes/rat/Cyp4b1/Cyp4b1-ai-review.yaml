- id: file:rat/Cyp4b1/Cyp4b1-deep-research-falcon.md
  title: Deep research report on rat Cyp4b1 (CYP4B1, UniProt P15129) - Edison Scientific (falcon)
  findings:
  - statement: |-
      CYP4B1 is a heme-thiolate P450 monooxygenase that catalyzes NADPH- and O2-dependent oxygen insertion,
      consistent with retaining monooxygenase / paired-donor oxidoreductase activity as core for Cyp4b1.
    supporting_text: |-
      CYP enzymes are heme-thiolate monooxygenases that generally catalyze **NADPH- and O2-dependent** oxygen insertion into substrates, frequently generating hydroxylated metabolites.
    reference_section_type: OTHER
  - statement: |-
      The hallmark, rat-specific function is metabolic activation of the pulmonary protoxin 4-ipomeanol in lung
      and liver microsomes, a P450-catalyzed (NADPH/O2-dependent, CO-inhibited) reaction. Supports xenobiotic
      metabolic process and microsomal/ER localization.
    supporting_text: |-
      In rat lung and liver microsomes, production of an alkylating 4-IPO metabolite was NADPH- and oxygen-dependent and inhibited by carbon monoxide; chemical inhibition with p-xylene protected rats from 4-IPO-induced lung damage, supporting CYP4B1 involvement
    reference_section_type: OTHER
  - statement: |-
      Mechanistically CYP4B1 oxygenates the furan ring of 4-ipomeanol to a reactive metabolite that alkylates
      macromolecules, underpinning its bioactivation/xenobiotic metabolism role.
    supporting_text: |-
      CYP4B1 transfers an oxygen atom to the furan ring of 4-IPO, generating a reactive metabolite that causes DNA–protein cross-links, strand breaks, and apoptosis.
    reference_section_type: OTHER
  - statement: |-
      CYP4B1 bioactivates additional xenobiotics including aromatic amines (e.g. 2-aminofluorene) to DNA-binding
      reactive metabolites, supporting its role in metabolism of biphenyl/aromatic-amine bladder carcinogens.
    supporting_text: |-
      CYP4B1 is discussed as bioactivating or oxidizing multiple xenobiotics (species-dependent), including **3‑methylindole** and aromatic amines such as **2‑aminoanthracene** and **2‑aminofluorene** to DNA-binding/reactive metabolites.
    reference_section_type: OTHER
  - statement: |-
      Consistent with CYP4 family chemistry, CYP4B1 hydroxylates medium-chain fatty acids, fatty alcohols and
      hydrocarbons (terminal omega hydroxylation), supporting the fatty acid omega/omega-1 hydroxylase and fatty
      acid oxidation annotations.
    supporting_text: |-
      Rabbit CYP4B1 hydroxylates medium-chain fatty acids, n-alkanes, and fatty alcohols; review states CYP4B1 family enzymes can act on saturated fatty acids, fatty alcohols, and hydrocarbons.
    reference_section_type: OTHER
  - statement: |-
      CYP4 family enzymes perform terminal (omega) hydroxylation of lipids/hydrocarbons, at the interface of
      lipid homeostasis and xenobiotic clearance, supporting fatty acid oxidation as a relevant process term.
    supporting_text: |-
