description: Cyp4b1 encodes rat cytochrome P450 4B1, a microsomal heme-thiolate monooxygenase that oxidizes
  diverse lipids and xenobiotics. The review accepts monooxygenase/paired-donor oxidoreductase activities and
  direct xenobiotic/lipid metabolic terms, with heme/iron/heterocycle binding and ER localization retained as
  non-core context.
