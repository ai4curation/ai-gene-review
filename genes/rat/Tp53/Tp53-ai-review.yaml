core_functions:
- description: >-
    p53 is a sequence-specific DNA-binding transcription factor that recognizes
    p53 response elements via its central DNA-binding domain and, as a homotetramer,
    activates (and represses) RNA polymerase II transcription of stress-response
    target genes. This is the single core evolved molecular function from which all
    downstream p53 biology derives.
  molecular_function:
    id: GO:0000981
    label: DNA-binding transcription factor activity, RNA polymerase II-specific
  directly_involved_in:
  - id: GO:0072331
    label: signal transduction by p53 class mediator
  - id: GO:0006974
    label: DNA damage response
  locations:
  - id: GO:0005634
    label: nucleus
  - id: GO:0000785
    label: chromatin
  supported_by:
  - reference_id: file:rat/Tp53/Tp53-deep-research-falcon.md
    supporting_text: Tp53 encodes p53, a sequence-specific DNA-binding transcription
      factor** that acts as a central stress-response node and tumor suppressor
  - reference_id: file:rat/Tp53/Tp53-deep-research-falcon.md
    supporting_text: 'Central DNA-binding domain (DBD)**: mediates sequence-specific
      recognition of response elements'
- description: >-
    Acting downstream of its DNA-binding/transcription-factor activity, p53
    transactivates pro-apoptotic targets (PUMA, BAX, NOXA) to drive the
    p53-mediated intrinsic (mitochondrial) apoptotic pathway in response to DNA
    damage; a stress-stabilized cytoplasmic pool can also engage BCL-2 family
    proteins at mitochondria for transcription-independent apoptosis.
  molecular_function:
    id: GO:0001228
    label: DNA-binding transcription activator activity, RNA polymerase II-specific
  directly_involved_in:
  - id: GO:0042771
    label: intrinsic apoptotic signaling pathway in response to DNA damage by p53
      class mediator
  - id: GO:0043065
    label: positive regulation of apoptotic process
  locations:
  - id: GO:0005634
    label: nucleus
  supported_by:
  - reference_id: file:rat/Tp53/Tp53-deep-research-falcon.md
    supporting_text: p53 activates pro-apoptotic genes including **PUMA, BAX, NOXA**
      and can also contribute through non-transcriptional mitochondrial mechanisms
- description: >-
    p53 enforces the DNA-damage cell-cycle checkpoint by transactivating CDKN1A/p21,
    producing G1 (and G2/M) arrest; sustained activation drives cellular senescence.
    These antiproliferative outputs underlie p53's tumor-suppressor function.
  molecular_function:
    id: GO:0001228
    label: DNA-binding transcription activator activity, RNA polymerase II-specific
  directly_involved_in:
  - id: GO:0031571
    label: mitotic G1 DNA damage checkpoint signaling
  - id: GO:0008285
    label: negative regulation of cell population proliferation
  - id: GO:0090398
    label: cellular senescence
  locations:
  - id: GO:0005634
    label: nucleus
  supported_by:
  - reference_id: file:rat/Tp53/Tp53-deep-research-falcon.md
    supporting_text: p53 transcriptionally activates CDKN1A/p21 and additional checkpoint
      mediators
