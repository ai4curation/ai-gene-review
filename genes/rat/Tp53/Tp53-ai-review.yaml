id: P10361
gene_symbol: Tp53
product_type: PROTEIN
status: IN_PROGRESS
taxon:
  id: NCBITaxon:10116
  label: Rattus norvegicus
description: >-
  Tp53 (rat; UniProt P10361) encodes cellular tumor antigen p53, a conserved
  p53-family, sequence-specific DNA-binding transcription factor that acts as the
  central node of the cellular stress response and as a tumor suppressor
  ("guardian of the genome"). p53 has a modular architecture (N-terminal
  transactivation domains, proline-rich region, central sequence-specific
  DNA-binding domain, and an oligomerization/tetramerization domain); the active
  protein assembles into homotetramers that bind p53 response elements in target
  gene promoters/enhancers. In response to diverse stresses (notably DNA damage,
  but also oxidative stress, hypoxia, ribosomal/nucleolar stress and oncogene
  activation), p53 is stabilized — chiefly by escape from MDM2/MDM4-mediated
  ubiquitination — and drives transcriptional programs governing cell-cycle
  arrest (via CDKN1A/p21), apoptosis (via PUMA, BAX, NOXA), DNA repair and
  senescence. p53 also induces MDM2, forming an autoregulatory negative-feedback
  loop. It functions predominantly as a nuclear transcription factor but also has
  transcription-independent cytoplasmic/mitochondrial pro-apoptotic actions. The
  core, conserved function captured here is sequence-specific DNA-binding
  transcription factor activity coupled to the DNA-damage/stress response; the
  vast catalog of downstream tissue- and stimulus-specific responses in the GOA
  set reflects p53's pleiotropy rather than additional distinct molecular
  functions.
