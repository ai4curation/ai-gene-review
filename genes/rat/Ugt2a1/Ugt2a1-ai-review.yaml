description: 'Ugt2a1 encodes an olfactory UDP-glucuronosyltransferase that glucuronidates odorants and
  other lipophilic substrates, contributing to odorant signal termination and phase II biotransformation.
  The review accepts glucuronosyltransferase activity and olfactory/xenobiotic metabolism contexts, keeps
  membrane and bile-acid context as non-core, and removes unsupported response annotations.'
