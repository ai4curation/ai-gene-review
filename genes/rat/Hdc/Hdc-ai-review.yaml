description: 'Hdc encodes histidine decarboxylase, the enzyme that converts L-histidine to histamine. The review
  accepts histidine decarboxylase activity, histamine biosynthesis, and L-histidine catabolism as direct functions;
  generic lyase/amino-acid metabolism terms are modified to the specific decarboxylase role, while cofactor binding
  and neuronal/localization terms are non-core context.'
