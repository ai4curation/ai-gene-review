references:
- id: file:rat/Hdc/Hdc-deep-research-falcon.md
  title: |-
    Falcon (Edison Scientific) deep research report: rat Hdc (histidine decarboxylase, UniProt P16453)
  findings:
  - statement: |-
      Falcon confirms the core molecular function: HDC catalyzes the single-step PLP-dependent decarboxylation of L-histidine to histamine (EC 4.1.1.22), the committed biosynthetic step for histamine.
    supporting_text: |-
      Histidine decarboxylase (HDC)** catalyzes the **single-step decarboxylation of L-histidine to histamine**, which is the committed biosynthetic step generating histamine
    reference_section_type: OTHER
  - statement: Falcon corroborates the pyridoxal 5'-phosphate (PLP) cofactor dependence
      that underlies the pyridoxal phosphate binding annotation.
    supporting_text: |-
      Mammalian HDC is **pyridoxal-5′-phosphate (PLP)-dependent**.
    reference_section_type: OTHER
  - statement: |-
      Falcon corroborates the homodimeric quaternary structure, supporting the identical protein binding annotation; each active site is shared between subunits.
    supporting_text: A functional **homodimer**, with each active site involving residues
      contributed by the partner subunit.
    reference_section_type: OTHER
  - statement: Falcon assigns HDC to the group II PLP-dependent decarboxylase family,
      consistent with the UniProt family/domain annotations.
    supporting_text: Member of the **group II PLP-dependent decarboxylase** family (fold
      type I / aromatic amino acid decarboxylase-related family)
    reference_section_type: OTHER
  - statement: Falcon provides subcellular localization context supporting the endoplasmic
      reticulum and cytosol annotations - the C-terminus of the precursor mediates ER
      association while processed forms are more cytosolic.
    supporting_text: Specific C-terminal residues (e.g., **588–607**) have been reported
      to mediate **endoplasmic reticulum (ER) association** of the precursor, while processed
      forms are more cytosolic.
    reference_section_type: OTHER
  - statement: Falcon supports the neuronal localization annotations (dendrite, neuronal
      cell body) - in the CNS, histamine-producing neurons reside in the tuberomammillary
      nucleus and project widely.
    supporting_text: In the CNS, histamine-producing neurons are localized to the **tuberomammillary
      nucleus (TMN)** of the posterior hypothalamus and project widely throughout the brain
    reference_section_type: OTHER
  - statement: Falcon describes the precursor maturation that contextualizes the post-translational
      processing referenced in the localization studies - a ~74 kDa precursor is C-terminally
      processed to catalytically competent ~53-55 kDa forms.
    supporting_text: Mammalian HDC is commonly described as being translated as an approximately
      **~74 kDa precursor** that undergoes **C-terminal proteolytic processing** into smaller,
      catalytically competent forms
    reference_section_type: OTHER
