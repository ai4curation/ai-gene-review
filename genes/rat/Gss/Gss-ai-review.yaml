description: 'Gss encodes glutathione synthetase, the ATP-dependent ligase that catalyzes the final step
  of glutathione biosynthesis from gamma-glutamylcysteine and glycine. The review accepts glutathione
  synthase activity and glutathione biosynthesis, keeps substrate/cofactor binding and homodimerization
  as context, modifies generic ligase activity, and marks stress/nutrient expression-response annotations
  as non-core over-annotations.'
