description: 'Aprt encodes adenine phosphoribosyltransferase, the purine salvage enzyme that converts
  adenine and PRPP to AMP. The review accepts the specific enzyme activity and adenine/AMP salvage annotations,
  keeps substrate/product binding and cytosolic localization as context, modifies broad binding/salvage
  parents, and flags lactation, grooming, insulin-response, IMP, and GMP annotations as over-extended
  relative to APRT specificity.'
