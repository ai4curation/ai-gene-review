  - id: file:rat/Aprt/Aprt-deep-research-falcon.md
    title: Deep research report on rat Aprt (adenine phosphoribosyltransferase, UniProt P36972) (falcon / Edison Scientific)
    findings:
      - statement: APRT catalyzes the canonical purine-salvage reaction adenine + PRPP -> AMP + PPi, defining its core molecular function.
        supporting_text: |-
          **Adenine phosphoribosyltransferase (APRT)** is a purine salvage enzyme that transfers a phosphoribosyl group from **5-phosphoribosyl-1-pyrophosphate (PRPP)** to **adenine**, generating **adenosine monophosphate (AMP)** and releasing **pyrophosphate (PPi)**
        reference_section_type: OTHER
      - statement: The reaction recycles free adenine into the cellular adenylate pool, conserving energy relative to de novo purine synthesis, consistent with the adenine-salvage and AMP-salvage process annotations.
        supporting_text: |-
          Conceptually, this reaction “recycles” adenine arising from nucleic-acid turnover or extracellular sources into the cellular adenylate pool (AMP/ADP/ATP), conserving energy relative to de novo purine synthesis.
        reference_section_type: OTHER
      - statement: APRT is a key node in purine salvage that supplies AMP from adenine to support nucleotide pools.
        supporting_text: |-
          APRT is a key node in **purine salvage**, supplying AMP from adenine and thereby supporting nucleotide pools for energy metabolism and nucleic-acid synthesis.
        reference_section_type: OTHER
      - statement: Catalysis is Mg2+-dependent and follows an ordered sequential (bi-bi) mechanism in which PRPP binds before adenine.
        supporting_text: |-
          Mechanistic and structural work in mammals indicates APRT is **Mg2+-dependent** and uses an **ordered sequential (bi–bi)** mechanism in the forward direction, where **PRPP binds before adenine**.
        reference_section_type: OTHER
      - statement: APRT is an intracellular soluble enzyme acting in the cytosol, supporting the cytosol/cytoplasm localization annotations.
        supporting_text: |-
          multiple lines of evidence indicate APRT is an **intracellular soluble enzyme** assayed robustly in **cell lysates** (erythrocytes, fibroblasts), consistent with a primarily **cytosolic** role in purine salvage.
        reference_section_type: OTHER
      - statement: Rat APRT activity is enzymatically active and quantifiable in rat erythrocyte lysates, providing direct species-specific functional evidence.
        supporting_text: |-
          A rat in vivo toxicology study measured **APRT activity in erythrocyte lysates** and demonstrated that APRT is enzymatically active and quantifiable in rat blood.
        reference_section_type: OTHER
      - statement: Loss of APRT diverts adenine to 2,8-dihydroxyadenine via xanthine oxidoreductase, causing radiolucent kidney stones and crystal nephropathy, illustrating the functional consequence of losing adenine salvage.
        supporting_text: |-
