  label: Rattus norvegicus
description: 'Hsd11b2 encodes NAD-dependent 11beta-hydroxysteroid dehydrogenase type 2, an endoplasmic-reticulum
  enzyme that oxidizes active 11beta-hydroxyglucocorticoids such as corticosterone to inactive 11-keto
  forms. The review accepts glucocorticoid metabolism and NAD-dependent dehydrogenase activity, keeps
  steroid/NAD binding and renal/placental physiological contexts as non-core, and marks stimulus-response
  expression annotations and Smoothened signaling as over-extensions.'
