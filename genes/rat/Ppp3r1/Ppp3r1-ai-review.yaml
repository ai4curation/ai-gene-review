      supporting_text: |-
        Zona glomerulosa-specific deletion of CnB1 diminished **Cyp11b2 (aldosterone synthase)** expression and disrupted **K+-stimulated aldosterone** synthesis, and phosphoproteomics implicated **NFATC4** as a calcineurin dephosphorylation target mediating this effect.
- term:
    id: GO:0019902
    label: phosphatase binding
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: phosphatase binding is retained for Ppp3r1 because it captures a direct, informative interaction
      rather than generic protein binding - CnB1 physically binds and is a constitutive subunit of the catalytic
      protein phosphatase (calcineurin A) (IBA, GO_REF:0000033).
    action: ACCEPT
    reason: As the regulatory B subunit, Ppp3r1 directly binds the calcineurin catalytic (phosphatase) A subunit
      to form the holoenzyme; this is a specific phosphatase-binding interaction, not vacuous protein binding.
    supported_by:
    - reference_id: UniProtKB:P63100
      supporting_text: 'FUNCTION: Regulatory subunit of calcineurin, a calcium-dependent, calmodulin stimulated
        protein phosphatase. Confers calcium sensitivity.'
    - reference_id: file:rat/Ppp3r1/Ppp3r1-deep-research-falcon.md
      supporting_text: |-
        Rising intracellular Ca2+ binds EF-hands in CnB (PPP3R1/PPP3R2) and also promotes binding of Ca2+/calmodulin to a regulatory region of catalytic CnA, which **displaces the CnA autoinhibitory domain (AID)** from the catalytic site and activates phosphatase activity.
- term:
    id: GO:0005509
    label: calcium ion binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: calcium ion binding is a core molecular function of Ppp3r1, which is built from four EF-hand
      Ca2+-binding sites that sense intracellular Ca2+ and confer calcium sensitivity to the calcineurin
      holoenzyme (IEA, GO_REF:0000002).
    action: ACCEPT
    reason: Ppp3r1/CnB1 contains four EF-hand calcium-binding motifs (UniProt; PDB 4IL1) that directly bind
      Ca2+; this is a defining molecular function of the protein, supported by structural and review evidence.
    supported_by:
    - reference_id: UniProtKB:P63100
      supporting_text: 'FUNCTION: Regulatory subunit of calcineurin, a calcium-dependent, calmodulin stimulated
        protein phosphatase. Confers calcium sensitivity.'
    - reference_id: file:rat/Ppp3r1/Ppp3r1-deep-research-falcon.md
      supporting_text: |-
        Authoritative 2023–2024 reviews describe the **PPP3R1-encoded CnB1** as **calmodulin-like** and containing **four EF-hand motifs** (Ca2+-binding sites) arranged as paired lobes with different Ca2+ affinities; these EF-hands are central to Ca2+-dependent control of the holoenzyme.
