- id: file:rat/Ppp3r1/Ppp3r1-deep-research-falcon.md
  title: 'Falcon (Edison Scientific) deep research report: rat Ppp3r1 (UniProt P63100), calcineurin subunit
    B type 1 (CnB1/CNB1)'
  findings:
  - statement: Ppp3r1 encodes the ubiquitous Ca2+-binding regulatory B subunit (CnB1) of the calcineurin/PPP3
      phosphatase holoenzyme; it is not itself the catalytic phosphatase but assembles with PPP3C catalytic
      subunits.
    supporting_text: |-
      **PPP3R1 encodes the ubiquitous regulatory B subunit (CnB1/CNB1)**, whereas **PPP3R2 encodes a testis-enriched regulatory B isoform (CnB2/CNB2)**; both are Ca2+-binding EF-hand proteins that assemble with calcineurin catalytic subunits (PPP3C) to form active holoenzymes.
    reference_section_type: OTHER
  - statement: CnB1 is calmodulin-like and contains four EF-hand Ca2+-binding motifs that are central to
      Ca2+-dependent control of the holoenzyme.
    supporting_text: |-
      Authoritative 2023–2024 reviews describe the **PPP3R1-encoded CnB1** as **calmodulin-like** and containing **four EF-hand motifs** (Ca2+-binding sites) arranged as paired lobes with different Ca2+ affinities; these EF-hands are central to Ca2+-dependent control of the holoenzyme.
    reference_section_type: OTHER
  - statement: Ppp3r1 does not catalyze a reaction itself; its core molecular role is the Ca2+-binding
      regulatory subunit required for normal operation of calcineurin and for Ca2+ sensing via its EF-hands.
    supporting_text: |-
      PPP3R1 does not catalyze a reaction itself; rather, it encodes the **Ca2+-binding regulatory B subunit** required for normal operation of **calcineurin**, a serine/threonine phosphatase.
    reference_section_type: OTHER
  - statement: Ca2+ binding by CnB EF-hands, together with Ca2+/calmodulin binding to CnA, relieves
      autoinhibition and activates the calcineurin phosphatase.
    supporting_text: |-
      Rising intracellular Ca2+ binds EF-hands in CnB (PPP3R1/PPP3R2) and also promotes binding of Ca2+/calmodulin to a regulatory region of catalytic CnA, which **displaces the CnA autoinhibitory domain (AID)** from the catalytic site and activates phosphatase activity.
    reference_section_type: OTHER
  - statement: The canonical downstream output of CnB1-containing calcineurin is dephosphorylation of NFAT
      transcription factors, driving their nuclear translocation.
    supporting_text: |-
      **Canonical Ca2+/calcineurin/NFAT pathway:** calcineurin dephosphorylates NFAT family transcription factors, promoting their nuclear translocation and transcriptional activation.
    reference_section_type: OTHER
  - statement: Genetic deletion of CnB1 (Ppp3r1) in adrenal zona glomerulosa impairs K+-stimulated
      aldosterone synthesis via NFATC4, demonstrating an in vivo CnB1-dependent calcineurin-NFAT output.
    supporting_text: |-
      Zona glomerulosa-specific deletion of CnB1 diminished **Cyp11b2 (aldosterone synthase)** expression and disrupted **K+-stimulated aldosterone** synthesis, and phosphoproteomics implicated **NFATC4** as a calcineurin dephosphorylation target mediating this effect.
    reference_section_type: OTHER
  - statement: Calcineurin (with the CNB regulatory subunit) is predominantly cytoplasmic with partly
      nuclear activity, consistent with control of NFAT translocation.
    supporting_text: |-
      **Cytoplasmic (and partly nuclear) localization** consistent with transcription factor control.
    reference_section_type: OTHER
