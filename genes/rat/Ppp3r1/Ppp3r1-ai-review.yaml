description: 'Ppp3r1 encodes calcineurin subunit B type 1, the calcium-binding regulatory subunit of the calcium/calmodulin-dependent
  protein phosphatase calcineurin. The review accepts the calcineurin regulatory, complex, calcium-binding, phosphatase-binding,
  and calcineurin-NFAT signaling annotations and keeps subcellular localization terms as non-core context.'
