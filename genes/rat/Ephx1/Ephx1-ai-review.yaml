- id: file:rat/Ephx1/Ephx1-deep-research-falcon.md
  title: 'Falcon (Edison Scientific) deep research: Rat Ephx1 (UniProt P07687), microsomal epoxide hydrolase 1 (mEH; EC 3.3.2.9)'
  findings:
  - statement: Confirms gene identity as the microsomal epoxide hydrolase whose primary activity is hydrolysis of epoxides to vicinal diols, central to xenobiotic detoxification.
    supporting_text: |-
      Rat **Ephx1** encodes **microsomal epoxide hydrolase 1 (EPHX1/mEH)**, a membrane-anchored **α/β-hydrolase-fold** enzyme best known for catalyzing the **hydrolysis of epoxides to the corresponding vicinal diols**. This reaction is central to **xenobiotic detoxification** (and in some cases **bioactivation**) because many epoxides are reactive intermediates generated by cytochrome P450s.
    reference_section_type: OTHER
  - statement: Distinguishes Ephx1 (microsomal mEH) from the soluble epoxide hydrolase EPHX2/sEH, confirming the correct target protein.
    supporting_text: |-
      It must be distinguished from **EPHX2**, the **soluble epoxide hydrolase (sEH)**, which is cytosolic/peroxisomal and has a different physiological emphasis in lipid-epoxide signaling.
    reference_section_type: OTHER
  - statement: Describes the two-step covalent catalytic mechanism and the conserved Asp226-Glu404-His431 catalytic triad of mEH.
    supporting_text: |-
      Catalysis proceeds by a **two-step covalent mechanism** requiring a conserved catalytic triad **Asp226–Glu404–His431**, with Tyr residues contributing to epoxide activation/positioning.
    reference_section_type: OTHER
  - statement: Localizes mEH primarily to the endoplasmic reticulum (microsomes) via an N-terminal membrane anchor.
    supporting_text: |-
      EPHX1 is primarily localized to the **endoplasmic reticulum (microsomes)** with a single **N-terminal membrane anchor**
    reference_section_type: OTHER
  - statement: Supports a role in arachidonate/fatty-acid epoxide metabolism, hydrolyzing EETs and EpOMEs to their corresponding diols.
    supporting_text: |-
      arachidonic-acid-derived **epoxyeicosatrienoic acids (EETs)** and linoleic-acid-derived **EpOMEs**, which are hydrolyzed to corresponding diols (**DHETs** and **DiHOMEs**).
    reference_section_type: OTHER
  - statement: Reports a non-canonical activity hydrolyzing the endocannabinoid 2-arachidonoylglycerol to arachidonic acid and glycerol.
    supporting_text: |-
      metabolism of the endocannabinoid **2-arachidonoylglycerol (2-AG)** to **arachidonic acid + glycerol**
    reference_section_type: OTHER
  - statement: Reports epoxysteroids (e.g. androstene oxide) among endogenous substrates, consistent with oxysterol/steroid-epoxide binding context.
    supporting_text: |-
      **epoxysteroids** such as androstene oxide/estroxide
    reference_section_type: OTHER
  - statement: Notes additional detection at the hepatocyte sinusoidal/plasma membrane linked to bile acid transport, supporting non-core membrane localization beyond the ER.
    supporting_text: |-
      EPHX1 has also been detected at the **hepatocyte sinusoidal/plasma membrane**, where it has been linked to **sodium-dependent bile acid transport** phenomena in hepatocytes
    reference_section_type: OTHER
