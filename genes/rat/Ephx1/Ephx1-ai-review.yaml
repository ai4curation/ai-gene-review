id: P07687
gene_symbol: Ephx1
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:10116
  label: Rattus norvegicus
description: Ephx1 encodes rat microsomal epoxide hydrolase, an endoplasmic-reticulum membrane biotransformation enzyme that
  hydrolyzes arene and aliphatic epoxides to dihydrodiols. The review accepts epoxide hydrolase activity and direct epoxide/lipid
  metabolism as core or direct functions, and keeps membrane localization, oxysterol/enzyme binding, and hormone-response
  annotations as non-core context.
