id: P07687
gene_symbol: Ephx1
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:10116
  label: Rattus norvegicus
description: Ephx1 encodes rat microsomal epoxide hydrolase, an endoplasmic-reticulum membrane
  biotransformation enzyme that hydrolyzes arene and aliphatic epoxides to dihydrodiols. The review accepts
  epoxide hydrolase activity and direct epoxide/lipid metabolism as core or direct functions, and keeps
  membrane localization, oxysterol/enzyme binding, and hormone-response annotations as non-core context.
existing_annotations:
- term:
    id: GO:0004301
    label: epoxide hydrolase activity
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: Ephx1's microsomal epoxide hydrolase detoxification of arene and fatty-acid epoxides supports
      retaining epoxide hydrolase activity as a direct annotation (IBA, GO_REF:0000033).
    action: ACCEPT
    reason: epoxide hydrolase activity is a specific catalytic activity matching Ephx1's documented role in
      microsomal epoxide hydrolase detoxification of arene and fatty-acid epoxides.
    supported_by:
    - reference_id: UniProtKB:P07687
      supporting_text: GO; GO:0004301; F:epoxide hydrolase activity; IDA:RGD.
    - reference_id: file:rat/Ephx1/Ephx1-deep-research-falcon.md
      supporting_text: |-
        Rat **Ephx1** encodes **microsomal epoxide hydrolase 1 (EPHX1/mEH)**, a membrane-anchored **α/β-hydrolase-fold** enzyme best known for catalyzing the **hydrolysis of epoxides to the corresponding vicinal diols**. This reaction is central to **xenobiotic detoxification** (and in some cases **bioactivation**) because many epoxides are reactive intermediates generated by cytochrome P450s.
