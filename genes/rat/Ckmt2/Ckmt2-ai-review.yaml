- id: file:rat/Ckmt2/Ckmt2-deep-research-falcon.md
  title: 'Falcon (Edison Scientific) deep research report: rat Ckmt2 / mitochondrial creatine kinase S-type (UniProt P09605)'
  findings:
  - statement: |-
      Ckmt2/sMtCK is a phosphotransferase that transfers the gamma-phosphoryl group of ATP to creatine, catalyzing the reversible creatine kinase reaction (EC 2.7.3.2), supporting GO:0004111 creatine kinase activity as the core molecular function.
    supporting_text: |-
      CKMT2 is a **phosphotransferase** transferring the γ-phosphoryl group of ATP to creatine.
    reference_section_type: OTHER
  - statement: |-
      The creatine kinase / phosphocreatine system buffers and transfers high-energy phosphoryl groups using the creatine/phosphocreatine pair, the biochemical basis for GO:0046314 phosphocreatine biosynthetic process.
    supporting_text: |-
      The creatine kinase system buffers and transfers high-energy phosphoryl groups using the creatine/phosphocreatine (Cr/PCr) pair to maintain cellular energy homeostasis
    reference_section_type: OTHER
  - statement: |-
      Mitochondrial CK localizes to the mitochondrial intermembrane and cristae space as a peripherally membrane-associated octamer, consistent with the mitochondrion (GO:0005739) and mitochondrial inner membrane (GO:0005743) localization annotations.
    supporting_text: |-
      Mitochondrial CK is localized to the **mitochondrial intermembrane and cristae space** and assembles into **cuboidal homooctamers** that are peripherally membrane-associated.
    reference_section_type: OTHER
  - statement: |-
      mtCK forms proteolipid complexes via direct interaction with cardiolipin and with the outer-membrane VDAC channel, recruiting ANT into inner-outer membrane contact sites; this supports the IDA-based cardiolipin binding annotation (GO:1901612) as a real but non-catalytic, membrane-anchoring activity.
    supporting_text: |-
      A key mechanistic concept is that mtCK forms **proteolipid complexes** via direct interaction with **cardiolipin**
    reference_section_type: OTHER
  - statement: |-
      In heart, CKMT2 converts mitochondrial ATP into phosphocreatine that diffuses to cytosolic ATPases (the CK/phosphocreatine shuttle), the physiological role underpinning phosphocreatine biosynthesis rather than direct developmental control.
    supporting_text: |-
      In heart, CKMT2 is positioned to convert mitochondrial ATP into PCr, which diffuses to ATPases
    reference_section_type: OTHER
  - statement: |-
      CKMT2 is the muscle (sarcomeric) mitochondrial CK isoform co-expressed with cytosolic muscle CK, so its association with heart and skeletal muscle reflects tissue-specific expression context rather than a direct role in tissue development.
    supporting_text: |-
      It is the muscle mitochondrial CK isoform co-expressed with cytosolic muscle CK.
    reference_section_type: OTHER
