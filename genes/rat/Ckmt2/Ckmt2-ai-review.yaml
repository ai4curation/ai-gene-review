description: Ckmt2 encodes rat mitochondrial creatine kinase S-type, a mitochondrial phosphotransferase that reversibly transfers
  phosphate between ATP and creatine to support phosphocreatine-based energy buffering in tissues with high energy demand.
  The review accepts creatine kinase activity and phosphocreatine biosynthesis as core and marks broad kinase/transferase
  and developmental expression annotations as non-core or over-annotated.
