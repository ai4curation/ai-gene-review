- term:
    id: GO:0004030
    label: aldehyde dehydrogenase [NAD(P)+] activity
  evidence_type: IDA
  original_reference_id: PMID:1848231
  review:
    summary: aldehyde dehydrogenase [NAD(P)+] activity captures part of Aldh1l1 biology, but a more specific
      replacement better represents the direct role (IDA, PMID:1848231).
    action: MODIFY
    reason: 'aldehyde dehydrogenase [NAD(P)+] activity is directionally related to Aldh1l1 but should be replaced
      by the more specific term(s): aldehyde dehydrogenase (NADP+) activity.'
    proposed_replacement_terms:
    - id: GO:0033721
      label: aldehyde dehydrogenase (NADP+) activity
    supported_by:
    - reference_id: PMID:1848231
      supporting_text: Intact 10-formyltetrahydrofolate dehydrogenase exhibits NADP-dependent aldehyde
        dehydrogenase activity.
      reference_section_type: ABSTRACT
