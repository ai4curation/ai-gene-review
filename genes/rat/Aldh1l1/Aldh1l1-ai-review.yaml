id: P28037
gene_symbol: Aldh1l1
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:10116
  label: Rattus norvegicus
description: 'Aldh1l1 encodes cytosolic 10-formyltetrahydrofolate dehydrogenase. It converts 10-formyltetrahydrofolate
  to tetrahydrofolate and carbon dioxide with NADPH generation, and has secondary NADP-dependent aldehyde dehydrogenase
  activity. The review accepts formyltetrahydrofolate dehydrogenase and folate/one-carbon process terms, modifies
  generic oxidoreductase/catalytic and NAD(P) aldehyde-dehydrogenase parents where appropriate, keeps complex/binding
  context, and removes a mitochondrial localization annotation inconsistent with the cytosolic protein.'
