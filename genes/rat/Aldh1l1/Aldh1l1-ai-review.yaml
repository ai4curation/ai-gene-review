references:
- id: file:rat/Aldh1l1/Aldh1l1-deep-research-falcon.md
  title: Falcon deep research report on rat Aldh1l1 (cytosolic 10-formyltetrahydrofolate dehydrogenase)
  findings:
  - statement: |-
      Rat Aldh1l1 (UniProt P28037) is the cytosolic 10-formyltetrahydrofolate dehydrogenase (FDH/10-FTHFDH, EC 1.5.1.6),
      a multidomain tetrameric folate/one-carbon enzyme that is explicitly distinct from the mitochondrial paralog ALDH1L2.
    supporting_text: |-
      The UniProt accession **P28037** corresponds to **rat Aldh1l1**, encoding **cytosolic 10‑formyltetrahydrofolate dehydrogenase** (common synonyms: **ALDH1L1**, **FDH**, **10‑FTHFDH**; EC **1.5.1.6**). The literature consistently describes this protein as a **cytosolic**, **multidomain**, **tetrameric** enzyme in folate/one‑carbon metabolism, and explicitly distinguishes it from the related **mitochondrial paralog ALDH1L2** (which has a mitochondrial leader peptide and different compartmental role).
    reference_section_type: OTHER
  - statement: |-
      The canonical reaction oxidizes 10-formyl-THF to THF plus CO2 in an NADP+-dependent dehydrogenase reaction,
      generating NADPH; an NADP+-independent hydrolase activity that releases formate proceeds at ~21% of the dehydrogenase rate.
    supporting_text: |-
      ALDH1L1 also exhibits an **NADP+‑independent hydrolase** activity that releases **formate** from 10‑formyl‑THF, but this hydrolase reaction is part of a coupled mechanism in the intact enzyme; in recombinant enzyme work, the hydrolase activity was reported to proceed at **~21%** of the dehydrogenase rate.
    reference_section_type: OTHER
  - statement: |-
      ALDH1L1 is cytosolic and part of the cytosolic folate/one-carbon pathway; mitochondrial one-carbon oxidation to CO2
      is carried out by the paralog ALDH1L2, supporting removal of the mitochondrion annotation for rat Aldh1l1.
    supporting_text: |-
      **Cytosolic/cytoplasmic** enzyme; part of the **cytosolic folate/one-carbon pathway**. Not the mitochondrial enzyme. | Cytosolic localization is a core identifier throughout the FDH/ALDH1L1 literature; mitochondrial one-carbon oxidation to CO2 is carried out by **ALDH1L2**, not ALDH1L1
    reference_section_type: OTHER
  - statement: |-
      ALDH1L1 is a ~902 aa multidomain fusion enzyme (~100 kDa subunits) that assembles as a tetramer, with an
      N-terminal folate-binding/hydrolase domain, a 4'-phosphopantetheine carrier/linker domain, and a C-terminal ALDH-like domain.
    supporting_text: |-
      ALDH1L1 is described as a **~902 amino‑acid** multidomain fusion enzyme (subunit ~100 kDa) assembling as a **tetramer**. It contains (i) an **N‑terminal folate‑binding/hydrolase domain**, (ii) an **intermediate carrier/linker domain** homologous to acyl‑carrier modules that bears a **4′‑phosphopantetheine (4′‑PP)** prosthetic group, and (iii) a **C‑terminal aldehyde dehydrogenase (ALDH)‑like domain** that performs the NADP+‑dependent oxidation step.
    reference_section_type: OTHER
  - statement: |-
      Key catalytic residues: His106 and Asp142 (hydrolase center), Ser354 (4'-phosphopantetheine attachment), and
      Glu673 and Cys707 (ALDH dehydrogenase center).
    supporting_text: |-
      **His106** and **Asp142** define the hydrolase active center; **Ser354** carries the **4′-phosphopantetheine (4′-PP)** prosthetic group; **Glu673** and **Cys707** are key ALDH-domain catalytic residues for the oxidative step.
    reference_section_type: OTHER
  - statement: |-
      Rat ALDH1L1 is an unusually abundant metabolic enzyme, comprising about 1.2% of total rat liver cytosolic protein,
      with highest expression in liver, kidney, and pancreas.
    supporting_text: |-
      Highly expressed in **liver, kidney, pancreas**; in rat liver cytosol ALDH1L1 can comprise about **1.2% of total cytosolic protein**, indicating an unusually abundant metabolic enzyme.
    reference_section_type: OTHER
  - statement: |-
      Aldh1l1 is widely used as a pan-astrocyte marker/promoter in neuroscience (e.g. Aldh1l1-EGFP/Rpl10a TRAP),
      an expression-pattern application that does not change the enzyme's core biochemical identity.
    supporting_text: |-
      ALDH1L1 is widely used as a **pan-astrocyte marker/promoter** in neuroscience, although this reflects expression pattern rather than the primary enzymatic function.
    reference_section_type: OTHER
