    label: formyltetrahydrofolate dehydrogenase activity
  evidence_type: TAS
  original_reference_id: PMID:14729668
  review:
    summary: Aldh1l1's cytosolic 10-formyltetrahydrofolate oxidation to tetrahydrofolate, CO2, and NADPH
      supports retaining formyltetrahydrofolate dehydrogenase activity as a direct annotation (TAS,
      PMID:14729668).
    action: ACCEPT
    reason: formyltetrahydrofolate dehydrogenase activity directly matches Aldh1l1's documented role in
      cytosolic 10-formyltetrahydrofolate oxidation to tetrahydrofolate, CO2, and NADPH.
    supported_by:
    - reference_id: PMID:14729668
      supporting_text: 10-Formyltetrahydrofolate dehydrogenase (FDH) converts 10-formyltetrahydrofolate, a
        precursor for nucleotide biosynthesis, to tetrahydrofolate.
      reference_section_type: ABSTRACT
