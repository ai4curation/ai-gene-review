id: A0A8I6AEP5
gene_symbol: Paox
product_type: PROTEIN
status: IN_PROGRESS
taxon:
  id: NCBITaxon:10116
  label: Rattus norvegicus
description: >-
  Paox (peroxisomal N1-acetyl-spermine/spermidine oxidase) is a FAD-dependent polyamine oxidase
  belonging to the flavin monoamine oxidase family. It catalyzes the oxidative deamination of
  N1-acetylspermine and N1-acetylspermidine, producing spermidine and putrescine respectively,
  as part of the polyamine interconversion/back-conversion pathway. The enzyme is localized
  exclusively to the peroxisomal matrix, where it generates H2O2 as a byproduct of its oxidase
  reaction. Paox acts specifically on acetylated polyamine substrates (not free spermine or
  spermidine), distinguishing it from spermine oxidase (SMOX) which acts on non-acetylated
  spermine. The enzyme plays a key role in polyamine homeostasis and catabolism in liver,
  kidney, and intestinal epithelium. The rat entry is an unreviewed TrEMBL record (A0A8I6AEP5)
  with 564 amino acids containing an amine oxidase domain (Pfam PF01593) and FAD cofactor
  requirement.

existing_annotations:
- term:
    id: GO:0005737
    label: cytoplasm
  evidence_type: IEA
  original_reference_id: GO_REF:0000044
  review:
    summary: >-
      IEA annotation based on UniProtKB/Swiss-Prot subcellular location vocabulary mapping.
      The UniProt TrEMBL record for A0A8I6AEP5 lists cytoplasm based on ARBA automated
      annotation. However, direct experimental evidence from PMID:7560898 demonstrates that
      polyamine oxidase activity is localized exclusively to the peroxisomal matrix, not the
      general cytoplasm.
    action: MODIFY
    reason: >-
      The cytoplasm annotation is too broad and potentially misleading. PMID:7560898
      demonstrated at the ultrastructural level that polyamine oxidase activity is
      localized exclusively to peroxisomes. While the peroxisomal matrix is technically
      within the cytoplasm in a general sense, the more specific term GO:0005782
      (peroxisomal matrix) is already annotated with IDA evidence and is more accurate.
      This should be modified to peroxisome (GO:0005777) or peroxisomal matrix (GO:0005782).
    proposed_replacement_terms:
    - id: GO:0005782
      label: peroxisomal matrix
    supported_by:
    - reference_id: PMID:7560898
      supporting_text: >-
        Ultrastructural studies revealed that polyamine oxidase activity is localized
        exclusively to the matrix of peroxisomes of kidney and liver and to
        microperoxisomes of the duodenum.

- term:
    id: GO:0016491
    label: oxidoreductase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  review:
    summary: >-
      IEA annotation from combined automated methods. Paox is indeed an oxidoreductase
      (FAD-dependent amine oxidase). However, this term is very broad and the more specific
      term GO:0046592 (polyamine oxidase activity) is already annotated with IDA evidence
      from multiple publications.
    action: ACCEPT
    reason: >-
      While GO:0016491 (oxidoreductase activity) is broad, it is not incorrect for an IEA
      annotation. The more specific GO:0046592 (polyamine oxidase activity) is already captured
      by IDA annotations. It is acceptable for IEA annotations to be broader than what is
      determined by IDA or literature. UniProt lists oxidoreductase as a keyword, and
      the protein belongs to the flavin monoamine oxidase family.

- term:
    id: GO:0009446
    label: putrescine biosynthetic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000107
  review:
    summary: >-
      IEA annotation transferred from experimentally verified ortholog via Ensembl Compara.
      Paox catalyzes the oxidation of N1-acetylspermidine to putrescine, so it does produce
      putrescine as a product. However, calling this a "biosynthetic process" is somewhat
      misleading -- Paox is a catabolic enzyme that degrades acetylated polyamines, and
      putrescine production is a byproduct of polyamine back-conversion rather than de novo
      biosynthesis.
    action: KEEP_AS_NON_CORE
    reason: >-
      While Paox does generate putrescine from N1-acetylspermidine catabolism, this annotation
      represents a downstream consequence of the enzyme's primary catabolic function rather
      than a core biosynthetic role. The core function is polyamine catabolism via the
      back-conversion pathway. Putrescine biosynthesis is technically accurate but not the
      primary biological role of Paox.
    supported_by:
    - reference_id: PMID:7560898
      supporting_text: >-
        Biochemical studies have shown that N1-acetylation of spermine and spermidine
        dramatically increases the specificity of these compounds for peroxisomal polyamine
        oxidase to produce spermidine and putrescine, respectively.

- term:
    id: GO:0009447
    label: putrescine catabolic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000107
  review:
    summary: >-
      IEA annotation transferred from ortholog. Paox does not catabolize putrescine.
      PMID:7560898 explicitly tested putrescine as a substrate and found no activity.
      The enzyme acts specifically on N1-acetylated polyamines (N1-acetylspermine and
      N1-acetylspermidine), not on putrescine.
    action: REMOVE
    reason: >-
      This annotation is incorrect. PMID:7560898 directly tested putrescine as a substrate
      for polyamine oxidase and found no activity. Paox acts on acetylated spermine and
      spermidine, producing spermidine and putrescine respectively -- it does not catabolize
      putrescine. This is likely an erroneous transfer from an ortholog annotation.
    supported_by:
    - reference_id: PMID:7560898
      supporting_text: >-
        Final reaction product was not observed in any of the tissues after incubation in
        the presence of putrescine, spermidine, or spermine.

- term:
    id: GO:0046203
    label: spermidine catabolic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000107
  review:
    summary: >-
      IEA annotation transferred from ortholog. Paox does not directly catabolize free
      spermidine. It catabolizes N1-acetylspermidine (the acetylated form), which is
      distinct from spermidine. The broader polyamine catabolic process (GO:0006598)
      is more appropriate.
    action: ACCEPT
    reason: >-
      While Paox acts on N1-acetylspermidine rather than free spermidine, the GO term
      "spermidine catabolic process" encompasses the degradation of spermidine and its
      derivatives. This IEA annotation is consistent with the IDA annotation for the
      same term (PMID:7560898). The N1-acetylation step (by SSAT/SAT1) precedes Paox
      action, and the net result is catabolism of the spermidine pool.

- term:
    id: GO:0046208
    label: spermine catabolic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000107
  review:
    summary: >-
      IEA annotation transferred from ortholog. Similar to spermidine catabolism, Paox
      acts on N1-acetylspermine rather than free spermine. This is consistent with the
      IDA annotation for the same term from PMID:7560898.
    action: ACCEPT
    reason: >-
      The annotation is consistent with the known enzymatic activity of Paox. Although the
      direct substrate is N1-acetylspermine, the GO term "spermine catabolic process"
      encompasses the broader pathway of spermine degradation including via acetylated
      intermediates. This is supported by the IDA annotation from PMID:7560898 and the
      observation that mitoguazone-induced Paox activity is associated with polyamine
      catabolism (PMID:15541750).

