- id: PMID:15541750
  title: Effect of mitoguazone on polyamine oxidase activity in rat liver.
  findings:
  - statement: >-
      Mitoguazone induces hepatic polyamine oxidase activity in rat liver, with the enzyme
      acting specifically on acetylated polyamine substrates, distinct from spermine oxidase.
    supporting_text: >-
      Mitoguazone administration induced hepatic polyamine oxidase activity starting at
      4 h after administration, and the enzyme returned to basal levels 96 h after
      treatment.
  - statement: >-
      Paox acts on acetylated polyamines as substrates, distinguishing it from spermine
      oxidase which was not affected by mitoguazone treatment.
    supporting_text: >-
      we hypothesized that the enzyme involved in mitoguazone response of the liver is
      the polyamine oxidase, which acts on acetylated polyamines as substrate.
- id: PMID:23425626
  title: Dexamethasone decreases the spermidine and spermine concentrations and polyamine
    oxidase activity in rat thymus.
  findings:
  - statement: >-
      Polyamine oxidase activity is measurable in rat thymus and is decreased by
      dexamethasone treatment.
    supporting_text: >-
      PAO activity significantly decreased under hormone influence in comparison with
      the control group (PAO Control, 0.449±0.121 U/mg prot.; PAO Exp. Group,
      0.312±0.096 U/mg prot.).
  - statement: >-
      The polyamine decrease in rat thymus is not solely due to PAO activity changes.
    supporting_text: >-
      The decrease in polyamine amounts in the rat thymus is not due to the change in
      PAO activity.
- id: PMID:7560898
  title: In situ substrate specificity and ultrastructural localization of polyamine
    oxidase activity in unfixed rat tissues.
  findings:
  - statement: >-
      Polyamine oxidase is localized exclusively to the peroxisomal matrix and acts
      specifically on N1-acetylated polyamines, not on free spermine, spermidine, or
      putrescine.
    supporting_text: >-
      Ultrastructural studies revealed that polyamine oxidase activity is localized
      exclusively to the matrix of peroxisomes of kidney and liver and to
      microperoxisomes of the duodenum. ... Final reaction product was not observed in
      any of the tissues after incubation in the presence of putrescine, spermidine,
      or spermine.
  - statement: >-
      Activity is present in hepatocytes, proximal tubule epithelial cells, and duodenal
      villus epithelial cells with strong intra- and inter-cellular heterogeneity.
    supporting_text: >-
      final reaction product specifically generated by polyamine oxidase activity was found
      exclusively in a granular form in hepatocytes, epithelial cells of proximal
      tubules of the kidney, and epithelial cells of duodenal villi with
      N1-acetylspermidine or N1-acetylspermine as substrates.

core_functions:
- molecular_function:
    id: GO:0046592
    label: polyamine oxidase activity
  description: >-
    Paox is a peroxisomal FAD-dependent polyamine oxidase that catalyzes the oxidative
    deamination of N1-acetylspermine to spermidine and N1-acetylspermidine to putrescine,
    producing H2O2 and 3-acetamidopropanal as byproducts. This is the core enzymatic
    activity of the polyamine back-conversion/interconversion pathway, working downstream
    of spermidine/spermine N1-acetyltransferase (SSAT/SAT1) which acetylates the substrates.
    The enzyme is distinct from spermine oxidase (SMOX) which acts on non-acetylated spermine
    in the cytoplasm.
  directly_involved_in:
  - id: GO:0006598
    label: polyamine catabolic process
  - id: GO:0046208
    label: spermine catabolic process
  - id: GO:0046203
    label: spermidine catabolic process
  locations:
  - id: GO:0005782
    label: peroxisomal matrix
  supported_by:
  - reference_id: PMID:7560898
    supporting_text: >-
      Ultrastructural studies revealed that polyamine oxidase activity is localized
      exclusively to the matrix of peroxisomes of kidney and liver and to
      microperoxisomes of the duodenum.
  - reference_id: PMID:15541750
    supporting_text: >-
      we hypothesized that the enzyme involved in mitoguazone response of the liver is
      the polyamine oxidase, which acts on acetylated polyamines as substrate.

proposed_new_terms: []

suggested_questions:
- question: >-
    What is the precise kinetic characterization of rat Paox for N1-acetylspermine
    versus N1-acetylspermidine? Does it show preference for one substrate over the other,
    and how does this compare to the human ortholog PAOX?
- question: >-
    What is the physiological significance of the heterogeneous distribution of Paox
    activity across different peroxisomes within the same cell, as observed in PMID:7560898?
    Does this relate to metabolic zonation or cell cycle state?

suggested_experiments:
- description: >-
    Recombinant expression and kinetic characterization of rat Paox (A0A8I6AEP5) with
    N1-acetylspermine and N1-acetylspermidine substrates to establish Km and Vmax values,
    confirming substrate specificity in a purified system.
- description: >-
    Immunofluorescence co-localization of Paox protein with peroxisomal markers (PMP70,
    catalase) in rat tissues to confirm the histochemical localization data from PMID:7560898
    at the protein level rather than activity level.
