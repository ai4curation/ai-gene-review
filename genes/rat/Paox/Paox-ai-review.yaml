- term:
    id: GO:1901307
    label: positive regulation of spermidine biosynthetic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000107
  review:
    summary: >-
      IEA annotation transferred from ortholog. Paox catabolizes N1-acetylspermine to
      produce spermidine, so in that sense it contributes to the spermidine pool. However,
      this is a downstream consequence of polyamine back-conversion rather than a direct
      regulatory role in spermidine biosynthesis.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      This annotation is an over-annotation. Paox produces spermidine as a product of
      N1-acetylspermine oxidation, but this is not "positive regulation of spermidine
      biosynthetic process" in the regulatory sense. The enzyme performs polyamine
      back-conversion (catabolism), and spermidine is a product of that catabolic
      reaction. Describing this as regulation of biosynthesis misrepresents the
      biological role. The polyamine catabolic process annotations already capture this
      function correctly.
    supported_by:
    - reference_id: PMID:7560898
      supporting_text: >-
        Biochemical studies have shown that N1-acetylation of spermine and spermidine
        dramatically increases the specificity of these compounds for peroxisomal polyamine
        oxidase to produce spermidine and putrescine, respectively.

- term:
    id: GO:0005782
    label: peroxisomal matrix
  evidence_type: IDA
  original_reference_id: PMID:7560898
  review:
    summary: >-
      IDA annotation based on ultrastructural localization in PMID:7560898. The study
