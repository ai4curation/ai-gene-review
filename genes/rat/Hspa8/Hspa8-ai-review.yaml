id: P63018
gene_symbol: Hspa8
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:10116
  label: Rattus norvegicus
description: >-
  Hspa8 (UniProt P63018; HSP7C_RAT) encodes the rat Heat shock cognate 71 kDa
  protein, the constitutively expressed cytosolic HSP70-family chaperone known as
  HSC70/HSC73. Unlike the stress-inducible Hspa1a/Hspa1b (HSP70) paralogs, HSC70 is
  expressed under basal conditions and is the housekeeping HSP70. Its core molecular
  function is an ATP-dependent (EC 3.6.4.10) protein-folding chaperone activity built
  on the canonical HSP70 architecture: an N-terminal nucleotide-binding/ATPase domain
  and a C-terminal substrate-binding domain with a helical lid, whose nucleotide state
  (ATP = low affinity/fast client exchange; ADP = high affinity) governs cyclic binding
  and release of unfolded/misfolded client polypeptides. The ATPase cycle is driven by
  J-domain (HSP40/DNAJ) co-chaperones that stimulate ATP hydrolysis and reset by
  nucleotide-exchange factors. Three best-supported, mechanistically distinct roles
  emerge: (1) general proteostasis - protein folding, refolding, unfolding and
  disassembly of protein complexes; (2) clathrin-coated vesicle uncoating - the
  clathrin-uncoating ATPase activity in which the J-domain co-chaperone auxilin
  (DNAJC6) recruits HSC70 to clathrin-coated vesicles and stimulates its ATPase to
  disassemble clathrin coats, central to clathrin-mediated endocytosis and synaptic
  vesicle recycling; and (3) chaperone-mediated autophagy (CMA) - cytosolic HSC70
  recognizes KFERQ-like pentapeptide motifs in soluble client proteins and delivers
  them to LAMP-2A at the lysosomal membrane, with lysosomal HSC70 supporting
  translocation into the lysosomal lumen for degradation. HSC70 acts predominantly in
  the cytosol, with additional functional pools at the lysosomal membrane/lumen and
  at endocytic/synaptic trafficking structures. It is a highly pleiotropic protein;
  many of its annotated processes and locations reflect this pleiotropy rather than its
  evolved core function.
