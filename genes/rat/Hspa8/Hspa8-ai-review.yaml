core_functions:
- description: >-
    ATP-dependent (EC 3.6.4.10) protein-folding chaperone activity: cyclic, nucleotide-state-dependent
    binding and release of unfolded/misfolded client polypeptides to assist protein folding, refolding,
    unfolding and disassembly of protein complexes, with the ATPase cycle regulated by J-domain (HSP40/DNAJ)
    co-chaperones and nucleotide-exchange factors.
  molecular_function:
    id: GO:0044183
    label: protein folding chaperone
  directly_involved_in:
  - id: GO:0042026
    label: protein refolding
  - id: GO:0006457
    label: protein folding
  locations:
  - id: GO:0005829
    label: cytosol
  supported_by:
  - reference_id: file:rat/Hspa8/Hspa8-deep-research-falcon.md
    reference_section_type: OTHER
    supporting_text: |-
      Hspa8/HSC70 is a **constitutive** HSP70-family **ATPase chaperone** that supports proteostasis by assisting **protein folding/refolding**, **unfolding**, and **disassembly of protein complexes**
  - reference_id: file:rat/Hspa8/Hspa8-deep-research-falcon.md
    reference_section_type: OTHER
    supporting_text: |-
      nucleotide state controls substrate affinity (ATP-bound low affinity/fast exchange; ADP-bound high affinity/slow exchange)
  - reference_id: file:rat/Hspa8/Hspa8-deep-research-falcon.md
    reference_section_type: OTHER
    supporting_text: |-
      J-domain proteins (HSP40/DNAJ)** stimulate ATP hydrolysis through engagement of the nucleotide-binding domain, and nucleotide exchange factors reset the cycle by promoting ADP→ATP exchange
- description: >-
    Clathrin-uncoating ATPase activity: HSC70, recruited by the J-domain co-chaperone auxilin (DNAJC6),
    hydrolyzes ATP to disassemble clathrin coats from clathrin-coated vesicles, recycling the pool of free
    clathrin in clathrin-mediated endocytosis and synaptic vesicle recycling.
  molecular_function:
    id: GO:1990833
    label: clathrin-uncoating ATPase activity
  directly_involved_in:
  - id: GO:0072318
    label: clathrin coat disassembly
  locations:
  - id: GO:0005829
    label: cytosol
  supported_by:
  - reference_id: file:rat/Hspa8/Hspa8-deep-research-falcon.md
    reference_section_type: OTHER
    supporting_text: |-
      the **J-domain co-chaperone auxilin (DNAJC6)** recruits HSC70 to CCVs and **stimulates HSC70 ATPase activity** to disassemble clathrin coats
- description: >-
    Chaperone-mediated autophagy: cytosolic HSC70 recognizes KFERQ-like pentapeptide motifs in soluble
    client proteins and delivers them to LAMP-2A at the lysosomal membrane; lysosomal HSC70 supports
    substrate translocation into the lysosomal lumen for degradation. In this role HSC70 acts as a
    cargo selector/adaptor, bringing the client protein together with the LAMP-2A receptor.
  molecular_function:
    id: GO:0030674
    label: protein-macromolecule adaptor activity
  directly_involved_in:
  - id: GO:0061684
    label: chaperone-mediated autophagy
  - id: GO:0061740
    label: protein targeting to lysosome involved in chaperone-mediated autophagy
  locations:
  - id: GO:0005829
    label: cytosol
  - id: GO:0005765
    label: lysosomal membrane
  supported_by:
  - reference_id: file:rat/Hspa8/Hspa8-deep-research-falcon.md
    reference_section_type: OTHER
    supporting_text: |-
      recognition of KFERQ-like pentapeptide motifs** in client proteins targeted for **chaperone-mediated autophagy (CMA)**
  - reference_id: file:rat/Hspa8/Hspa8-deep-research-falcon.md
    reference_section_type: OTHER
    supporting_text: |-
      Lysosomal HSC70 (Lys‑HSC70)** facilitates **substrate translocation** into the lysosome lumen
references:
- id: file:rat/Hspa8/Hspa8-deep-research-falcon.md
  title: 'Falcon (Edison Scientific) deep research report: rat Hspa8 (HSC70/HSC73, UniProt P63018)'
  findings:
  - statement: >-
      Hspa8 (UniProt P63018) is the constitutively expressed HSP70-family chaperone HSC70/HSC73,
      with an N-terminal nucleotide-binding/ATPase domain and a substrate-binding domain with a
      C-terminal lid whose nucleotide state controls substrate affinity.
    supporting_text: |-
      The UniProt accession **P63018** corresponds to **Rattus norvegicus Hspa8**, encoding the constitutively expressed HSP70-family chaperone commonly referred to as **HSC70/HSC73 (HSPA8)**.
    reference_section_type: OTHER
  - statement: >-
      The core molecular function is an ATP-dependent chaperone that assists protein folding,
      refolding, unfolding and disassembly of protein complexes, with the ATP/ADP cycle regulated
      by J-domain co-chaperones and nucleotide-exchange factors.
    supporting_text: |-
      Hspa8/HSC70 is a **constitutive** HSP70-family **ATPase chaperone** that supports proteostasis by assisting **protein folding/refolding**, **unfolding**, and **disassembly of protein complexes**
    reference_section_type: OTHER
  - statement: >-
      A second core role is clathrin-coated vesicle uncoating, in which the J-domain co-chaperone
      auxilin (DNAJC6) recruits HSC70 and stimulates its ATPase to disassemble clathrin coats.
    supporting_text: |-
      the **J-domain co-chaperone auxilin (DNAJC6)** recruits HSC70 to CCVs and **stimulates HSC70 ATPase activity** to disassemble clathrin coats
    reference_section_type: OTHER
  - statement: >-
      A third core role is chaperone-mediated autophagy: HSC70 recognizes KFERQ-like motifs in
      client proteins selected for CMA.
    supporting_text: |-
      recognition of KFERQ-like pentapeptide motifs** in client proteins targeted for **chaperone-mediated autophagy (CMA)**
    reference_section_type: OTHER
  - statement: >-
      Lysosomal HSC70 facilitates substrate translocation into the lysosome lumen during CMA.
    supporting_text: |-
      Lysosomal HSC70 (Lys‑HSC70)** facilitates **substrate translocation** into the lysosome lumen
    reference_section_type: OTHER
  - statement: >-
      The cytosol is the predominant compartment where HSC70 performs general chaperoning and
      recognizes CMA substrates.
    supporting_text: |-
      **Cytosol**: the predominant pool performing general chaperoning and recognizing CMA substrates (KFERQ-like motifs)
    reference_section_type: OTHER
  - statement: >-
      During CMA, the HSC70-substrate complex binds LAMP-2A at the lysosomal membrane and HSC70
      helps assemble the translocation complex there, corroborating the experimental
      lysosomal-membrane localization of HSC70 (GO:0005765) from PMID:18644871.
    supporting_text: |-
      The complex binds **LAMP‑2A** at the lysosomal membrane; HSC70 helps **assemble the translocation complex**.
    reference_section_type: OTHER
