id: A6JDG0
gene_symbol: Klf3
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:10116
  label: Rattus norvegicus
description: >-
  KLF3 (Krüppel-like factor 3, also known as BKLF/Basic Krüppel-like Factor) is a
  widely expressed C2H2 zinc finger transcription factor belonging to the KLF/SP family.
  It contains three C-terminal C2H2-type zinc fingers that bind CACCC boxes and GC-rich
  motifs in gene regulatory regions (PMID:21360637). KLF3 functions primarily as a
  transcriptional repressor by recruiting the co-repressor C-terminal binding protein
  (CtBP) through a conserved PVDLS motif in its N-terminal repression domain
  (PMID:9724649). The KLF3-CtBP complex mediates transcriptional silencing of target
  genes including C/EBPalpha, galectin-3 (Lgals3), Fam132a/adipolin, and integrin
  beta-7 (PMID:27226561, PMID:18391014, PMID:23633521, PMID:25015818). KLF3 also
  interacts with the LIM domain protein FHL3, which contributes to assembly of
  repression complexes (PMID:12556451). KLF3 activity is modulated by HIPK2-mediated
  phosphorylation at serine 249, which enhances DNA binding and CtBP interaction
  (PMID:25659434). KLF3 is localized to the nucleus in a speckled nucleoplasmic
  pattern excluding nucleoli (PMID:12621550). Biological roles include regulation
  of adipogenesis (Klf3-null mice are lean and resistant to diet-induced obesity;
  PMID:18391014, PMID:23633521), erythropoiesis (KLF3 and KLF8 together participate
  in embryonic globin gene silencing; PMID:23716600), and B cell development (KLF3
  regulates marginal zone B cell numbers and integrin beta-7 expression affecting
  lymphocyte homing; PMID:25015818). KLF3 expression in erythroid cells is driven
  by KLF1/EKLF, and KLF3 in turn represses KLF8, forming a regulatory hierarchy
  within the KLF family (PMID:10582345, PMID:23716600).
existing_annotations:
  - term:
      id: GO:0001227
      label: DNA-binding transcription repressor activity, RNA polymerase II-specific
    evidence_type: IEA
    original_reference_id: GO_REF:0000117
    review:
      summary: >-
        KLF3/BKLF is well established as a transcriptional repressor. The original
        characterization by Turner and Crossley (PMID:9724649) demonstrated that BKLF
        represses transcription via its N-terminal domain, which recruits the co-repressor
        CtBP2 through a PVDLS motif. Subsequent studies confirmed repressor activity on
        multiple endogenous target promoters including C/EBPalpha (PMID:18391014),
        galectin-3/Lgals3 (PMID:27226561), Fam132a/adipolin (PMID:23633521), and
        integrin beta-7 (PMID:25015818). The UniProt record also lists the keyword
        "Repressor". The ARBA-derived IEA annotation is fully consistent with
        extensive experimental evidence from orthologous mouse and human KLF3.
      action: ACCEPT
      reason: >-
        DNA-binding transcription repressor activity is the core molecular function of
        KLF3. This is supported by direct experimental evidence from multiple studies
        on the mouse ortholog showing that KLF3 represses transcription at CACCC
        elements by recruiting CtBP co-repressor complexes.
      supported_by:
        - reference_id: PMID:9724649
          supporting_text: "We have studied the activity of BKLF and found that it is
            capable of repressing transcription, and have mapped its repression domain
            to the N-terminus"
        - reference_id: PMID:21360637
          supporting_text: "KLF3 is a transcriptional repressor that binds the cofactor
            C-terminal binding protein, which in turn recruits a large repressor
            complex to mediate transcriptional silencing"
        - reference_id: PMID:27226561
          supporting_text: "KLF3 directly binds its cognate elements (CACCC boxes) in
            the galectin-3 promoter and represses its activation in cellular assays"
  - term:
      id: GO:0005634
      label: nucleus
    evidence_type: IEA
    original_reference_id: GO_REF:0000044
    review:
      summary: >-
        Nuclear localization of KLF3/BKLF is well established. Ma et al. (PMID:12621550)
        directly demonstrated by fluorescence microscopy that hBKLF is localized in the
        nucleus, distributed throughout the nucleoplasm in a speckled pattern excluding
        nucleoli. The UniProt record annotates KLF3 with subcellular location "Nucleus".
        Both the zinc finger domain and the N-terminal region including the CtBP-binding
        motif serve as nuclear localization signals.
      action: ACCEPT
      reason: >-
        Nuclear localization is consistent with the function of KLF3 as a transcription
        factor. Direct fluorescence imaging confirms nuclear localization for the
        human ortholog, and the IEA annotation based on UniProt subcellular location
        vocabulary is well supported.
      supported_by:
        - reference_id: PMID:21360637
          supporting_text: "KLF3 is a transcriptional repressor that binds the cofactor
            C-terminal binding protein, which in turn recruits a large repressor
            complex to mediate transcriptional silencing"
  - term:
      id: GO:1990859
      label: cellular response to endothelin
    evidence_type: IEA
    original_reference_id: GO_REF:0000117
    review:
      summary: >-
        This ARBA-derived annotation suggests KLF3 is involved in cellular response
        to endothelin. None of the key KLF3 literature (PMID:21360637, PMID:9724649,
        PMID:18391014, PMID:27226561, PMID:25015818, PMID:23716600) identifies
        endothelin signaling as a function or context for KLF3 activity. While
        ARBA rule-based annotations can sometimes capture associations from large-scale
        studies, KLF3 is not characterized as an endothelin-responsive factor.
        This may reflect an over-annotation from automated rule mining that is
        not supported by the body of KLF3-specific literature.
      action: MARK_AS_OVER_ANNOTATED
      reason: >-
        There is no substantive literature evidence linking KLF3 specifically to
        endothelin signaling. The well-characterized biological roles of KLF3 are
        in adipogenesis, erythropoiesis, and B cell development. This ARBA-derived
        IEA annotation likely represents a spurious association from automated
        pattern matching and is not supported by the core KLF3 literature.
  - term:
      id: GO:0000122
      label: negative regulation of transcription by RNA polymerase II
    evidence_type: IEA
    original_reference_id: GO_REF:0000107
    review:
      summary: >-
        This annotation is transferred from the mouse ortholog (Q60980) via Ensembl
        Compara. KLF3 is a well-established transcriptional repressor that negatively
        regulates transcription of multiple target genes. Studies demonstrate that
        KLF3 represses C/EBPalpha transcription (PMID:18391014), galectin-3 (Lgals3)
        transcription (PMID:27226561), Fam132a/adipolin transcription (PMID:23633521),
        integrin beta-7 transcription (PMID:25015818), and its own promoter in a
        negative autoregulatory loop (PMID:25015818). KLF3 also represses gamma-
        and epsilon-globin gene transcription (PMID:12621553).
      action: ACCEPT
      reason: >-
        Negative regulation of transcription by RNA polymerase II is a core biological
        process for KLF3. This is supported by extensive experimental evidence showing
        KLF3 directly represses multiple target promoters through recruitment of
        CtBP co-repressor complexes. The Ensembl transfer from mouse is well justified.
      supported_by:
        - reference_id: PMID:18391014
          supporting_text: "Klf3 represses transcription by recruiting C-terminal
            binding protein (CtBP) corepressors"
        - reference_id: PMID:27226561
          supporting_text: "KLF3 directly binds its cognate elements (CACCC boxes) in
            the galectin-3 promoter and represses its activation in cellular assays"
        - reference_id: PMID:9724649
          supporting_text: "We have studied the activity of BKLF and found that it is
            capable of repressing transcription, and have mapped its repression domain
            to the N-terminus"
  - term:
      id: GO:0000977
      label: RNA polymerase II transcription regulatory region sequence-specific DNA
        binding
    evidence_type: IEA
    original_reference_id: GO_REF:0000107
    review:
      summary: >-
        This annotation is transferred from the mouse ortholog (Q60980) via Ensembl
        Compara. KLF3 binds specifically to CACCC boxes and GC-rich motifs in gene
        regulatory regions through its three C-terminal C2H2 zinc fingers
        (PMID:21360637). ChIP experiments confirm KLF3 occupancy at the C/EBPalpha
        promoter (PMID:18391014), the Lgals3 regulatory regions (PMID:27226561), the
        Fam132a promoter (PMID:23633521), and the integrin beta-7 promoter
        (PMID:25015818). This is a core molecular function of KLF3.
      action: ACCEPT
      reason: >-
        Sequence-specific DNA binding to RNA polymerase II transcription regulatory
        regions is a core molecular function of KLF3. The three C2H2 zinc fingers
        mediate specific recognition of CACCC elements in promoters of target genes,
        confirmed by both in vitro binding assays and in vivo ChIP experiments.
      supported_by:
        - reference_id: PMID:21360637
          supporting_text: "These proteins are classified by the presence of three
            C-terminal C2H2 zinc fingers that allow sequence-specific binding to
            CACCC boxes and GC-rich motifs found in the promoters, enhancers, and
            other control regions of target genes"
        - reference_id: PMID:18391014
          supporting_text: "Chromatin immunoprecipitations confirm that Klf3 binds the
            C/ebpalpha promoter in vivo"
        - reference_id: PMID:27226561
          supporting_text: "KLF3 occupies regulatory regions of the Lgals3 gene"
  - term:
      id: GO:0005654
      label: nucleoplasm
    evidence_type: IEA
    original_reference_id: GO_REF:0000107
    review:
      summary: >-
        This annotation is transferred from the human ortholog (P57682) via Ensembl
        Compara. Ma et al. (PMID:12621550) directly demonstrated that hBKLF is
        distributed throughout the nucleoplasm in a speckled pattern, excluding the
        nucleoli. This is consistent with KLF3 functioning as a transcription factor
        that acts on chromatin throughout the nucleoplasm.
      action: ACCEPT
      reason: >-
        Nucleoplasm localization is directly demonstrated by fluorescence microscopy
        of the human ortholog. The speckled nucleoplasmic distribution pattern is
        typical of transcription factors and is consistent with the molecular function
        of KLF3. This is more informative than the broader "nucleus" term.
      supported_by:
        - reference_id: PMID:21360637
          supporting_text: "KLF3 is a transcriptional repressor that binds the cofactor
            C-terminal binding protein, which in turn recruits a large repressor
            complex to mediate transcriptional silencing"
  - term:
      id: GO:1990837
      label: sequence-specific double-stranded DNA binding
    evidence_type: IEA
    original_reference_id: GO_REF:0000120
    review:
      summary: >-
        KLF3 binds CACCC elements and GC-rich motifs in double-stranded DNA through
        its three C2H2 zinc fingers. This has been demonstrated by electrophoretic
        mobility shift assays (EMSA), ChIP, and reporter assays across multiple
        studies (PMID:9724649, PMID:18391014, PMID:27226561, PMID:12621553).
        The combined IEA annotation from multiple methods is well supported.
      action: ACCEPT
      reason: >-
        Sequence-specific double-stranded DNA binding is a core molecular function
        of KLF3. The three C2H2 zinc fingers mediate direct contact with CACCC
        and GC-rich elements in dsDNA, demonstrated by EMSA, ChIP, and functional
        reporter assays.
      supported_by:
        - reference_id: PMID:21360637
          supporting_text: "These proteins are classified by the presence of three
            C-terminal C2H2 zinc fingers that allow sequence-specific binding to
            CACCC boxes and GC-rich motifs"
        - reference_id: PMID:9724649
          supporting_text: "Basic Krüppel-like factor (BKLF) is a zinc finger protein
            that recognizes CACCC elements in DNA"
  - term:
      id: GO:0008270
      label: zinc ion binding
    evidence_type: IEA
    original_reference_id: GO_REF:0000117
    review:
      summary: >-
        KLF3 contains three C2H2-type zinc finger domains (residues 259-288, 289-318,
        319-341 per UniProt feature annotations). C2H2 zinc fingers coordinate zinc
        ions through two cysteine and two histidine residues. The UniProt record lists
        "Zinc" and "Zinc-finger" as keywords, and three C2H2-type domains are annotated
        by PROSITE. Although this annotation is not present in the GOA file, it is
        listed in the UniProt DR lines (GO:0008270; F:zinc ion binding; IEA:UniProtKB-KW).
        This is a fundamental structural requirement for the DNA-binding domain.
      action: NEW
      reason: >-
        Zinc ion binding is inherent to the C2H2 zinc finger DNA-binding domain of
        KLF3. The three zinc finger domains each coordinate a zinc ion, and this is
        essential for the structural integrity and DNA-binding activity of the protein.
        This annotation is present in the UniProt record but was not included in the
        GOA download. It should be included for completeness.
      supported_by:
        - reference_id: PMID:21360637
          supporting_text: "These proteins are classified by the presence of three
            C-terminal C2H2 zinc fingers"
  - term:
      id: GO:0001222
      label: transcription corepressor binding
    evidence_type: ISS
    original_reference_id: PMID:9724649
    review:
      summary: >-
        KLF3/BKLF interacts with the co-repressor CtBP (C-terminal binding protein)
        through a PVDLS motif in its N-terminal repression domain. Turner and Crossley
        (PMID:9724649) identified CtBP2 as a BKLF-binding partner by yeast two-hybrid
        screening and showed that the PVDLS motif is required for both CtBP binding
        and transcriptional repression activity. Dewi et al. (PMID:25659434) further
        demonstrated that HIPK2 phosphorylation strengthens the KLF3-CtBP2 interaction.
        KLF3 also interacts with FHL3, which can form a trimeric complex with CtBP2
        (PMID:12556451). This molecular function is well established and central to
        the mechanism of KLF3-mediated repression.
      action: NEW
      reason: >-
        Transcription corepressor binding is a core molecular function of KLF3 that
        is missing from the existing GOA annotations. The interaction with CtBP is
        the principal mechanism by which KLF3 mediates transcriptional repression.
        This is extensively characterized experimentally for the mouse ortholog.
      supported_by:
        - reference_id: PMID:9724649
          supporting_text: "We carried out a two-hybrid screen against BKLF and
            isolated a novel clone encoding murine C-terminal-binding protein 2
            (mCtBP2)"
        - reference_id: PMID:25659434
          supporting_text: "phosphorylation of KLF3 and CtBP2 by HIPK2 strengthens
            the interaction between these two factors and increases transcriptional
            repression by KLF3"
        - reference_id: PMID:12556451
          supporting_text: "BKLF also recruits the four and a half LIM domain protein
            FHL3"
  - term:
      id: GO:0045599
      label: negative regulation of fat cell differentiation
    evidence_type: IMP
    original_reference_id: PMID:18391014
    review:
      summary: >-
        Sue et al. (PMID:18391014) demonstrated that forced overexpression of Klf3
        blocks 3T3-L1 adipocyte differentiation, and that a Klf3 mutant unable to
        bind CtBP cannot block adipogenesis, indicating the repressor function is
        required. Klf3 expression declines during adipocyte differentiation, and Klf3
        knockout mice have reduced white adipose tissue with smaller and fewer
        adipocytes. KLF3 represses C/EBPalpha, a key pro-adipogenic transcription
        factor, by binding its promoter in vivo. Bell-Anderson et al. (PMID:23633521)
        further showed that Klf3-null mice are lean and protected from diet-induced
        obesity. Ahmed and Gaffen (PMID:23332504) identified KLF3 as an
        anti-adipogenic factor whose expression is enhanced by IL-17.
      action: NEW
      reason: >-
        Negative regulation of fat cell differentiation is a well-established
        biological role of KLF3 demonstrated by multiple independent studies using
        knockout mice and overexpression experiments. This annotation is missing
        from the sparse GOA set for rat Klf3 and represents an important biological
        process function.
      supported_by:
        - reference_id: PMID:18391014
          supporting_text: "Klf3 knockout mice have less white adipose tissue, and
            their fat pads contain smaller and fewer cells"
        - reference_id: PMID:23633521
          supporting_text: "KLF3-null mice are lean and protected from diet-induced
            obesity and glucose intolerance"
        - reference_id: PMID:23332504
          supporting_text: "Specifically, IL-17 suppresses KLF15, a pro-adipogenic TF,
            and enhances expression of KLF2 and KLF3, which are anti-adipogenic"
  - term:
      id: GO:0045646
      label: regulation of erythrocyte differentiation
    evidence_type: ISS
    original_reference_id: PMID:23716600
    review:
      summary: >-
        KLF3 participates in erythropoiesis as part of a KLF regulatory hierarchy.
        KLF1/EKLF drives expression of both Klf3 and Klf8, and KLF3 in turn represses
        Klf8 (PMID:10582345, PMID:23716600). BKLF is one of the most abundant
        CACCC-binding proteins in erythroid cells (PMID:10582345). KLF3 and KLF8
        together participate in silencing of embryonic globin genes during
        development, as double knockout embryos show derepression of embryonic but
        not adult globin expression (PMID:23716600). BKLF-deficient mice
        exhibit a myeloproliferative disorder (PMID:10582345).
      action: NEW
      reason: >-
        Regulation of erythrocyte differentiation is a well-characterized biological
        role of KLF3 supported by knockout mouse studies and functional analysis
        of globin gene regulation. This is missing from the sparse GOA annotations
        for rat Klf3.
      supported_by:
        - reference_id: PMID:23716600
          supporting_text: "KLF3 and KLF8 have overlapping roles in vivo and
            participate in the silencing of embryonic globin expression during
            development"
        - reference_id: PMID:10582345
          supporting_text: "it is one of the most abundant CACCC-binding proteins in
            erythroid cells"
references:
  - id: GO_REF:0000044
    title: Gene Ontology annotation based on UniProtKB/Swiss-Prot Subcellular Location
      vocabulary mapping, accompanied by conservative changes to GO terms applied by
      UniProt
    findings: []
  - id: GO_REF:0000107
    title: Automatic transfer of experimentally verified manual GO annotation data to
      orthologs using Ensembl Compara
    findings: []
  - id: GO_REF:0000117
    title: Electronic Gene Ontology annotations created by ARBA machine learning models
    findings: []
  - id: GO_REF:0000120
    title: Combined Automated Annotation using Multiple IEA Methods
    findings: []
  - id: PMID:9724649
    title: 'Cloning and characterization of mCtBP2, a co-repressor that associates with
      basic Krüppel-like factor and other mammalian transcriptional regulators.'
    findings:
      - statement: >-
          BKLF represses transcription via its N-terminal domain, which recruits the
          co-repressor mCtBP2 through a PVDLS motif.
        supporting_text: "We have studied the activity of BKLF and found that it is
          capable of repressing transcription, and have mapped its repression domain
          to the N-terminus"
  - id: PMID:10582345
    title: 'Basic Krüppel-like factor functions within a network of interacting
      haematopoietic transcription factors.'
    findings:
      - statement: >-
          BKLF is one of the most abundant CACCC-binding proteins in erythroid cells.
          BKLF represses transcription by recruiting CtBP. BKLF-deficient mice exhibit
          a myeloproliferative disorder.
        supporting_text: "it is one of the most abundant CACCC-binding proteins in
          erythroid cells"
  - id: PMID:12556451
    title: 'The LIM protein FHL3 binds basic Krüppel-like factor/Krüppel-like factor 3
      and its co-repressor C-terminal-binding protein 2.'
    findings:
      - statement: >-
          KLF3/BKLF also recruits FHL3, forming a trimeric complex with CtBP2.
          KLF3 promotes nuclear accumulation of both FHL3 and CtBP2.
        supporting_text: "BKLF also recruits the four and a half LIM domain protein
          FHL3"
  - id: PMID:12621550
    title: '[Subcellular localization of basic Krüppel-like factor].'
    findings:
      - statement: >-
          hBKLF localizes to the nucleoplasm in a speckled pattern excluding nucleoli.
          Both zinc fingers and the N-terminal region serve as nuclear localization
          signals.
        supporting_text: "hBKLF was localized in nucleus, and distributed throughout
          nucleoplasm in a speckled pattern, except the nucleoli"
  - id: PMID:12621553
    title: '[Transcriptional regulation of gamma- and epsilon-globin genes by basic
      Krüppel-like factor].'
    findings:
      - statement: >-
          hBKLF represses gamma- and epsilon-globin gene promoter activity. BKLF
          binds the CACCC element in the SHP1 gene promoter.
        supporting_text: "hBKLF was able to repress the activity of gamma- and
          epsilon-globin gene promoters"
  - id: PMID:18391014
    title: 'Targeted disruption of the basic Krüppel-like factor gene (Klf3) reveals
      a role in adipogenesis.'
    findings:
      - statement: >-
          Klf3 knockout mice have reduced white adipose tissue. Forced overexpression
          of Klf3 blocks 3T3-L1 differentiation. KLF3 represses C/EBPalpha by binding
          its promoter in vivo. A KLF3 mutant that cannot bind CtBP cannot block
          adipogenesis.
        supporting_text: "Klf3 knockout mice have less white adipose tissue, and
          their fat pads contain smaller and fewer cells"
  - id: PMID:21360637
    title: 'The mammalian zinc finger transcription factor Krüppel-like factor 3
      (KLF3/BKLF).'
    findings:
      - statement: >-
          Comprehensive review of KLF3. Three C2H2 zinc fingers bind CACCC boxes and
          GC-rich motifs. KLF3 is a transcriptional repressor that recruits CtBP.
          Biological roles include adipogenesis, erythropoiesis, and B cell
          development.
        supporting_text: "KLF3 is a transcriptional repressor that binds the cofactor
          C-terminal binding protein, which in turn recruits a large repressor
          complex to mediate transcriptional silencing"
  - id: PMID:23332504
    title: 'IL-17 inhibits adipogenesis in part via C/EBPα, PPARγ and Krüppel-like
      factors.'
    findings:
      - statement: >-
          IL-17 enhances expression of KLF2 and KLF3, which are anti-adipogenic
          transcription factors in 3T3-L1 cells.
        supporting_text: "Specifically, IL-17 suppresses KLF15, a pro-adipogenic TF,
          and enhances expression of KLF2 and KLF3, which are anti-adipogenic"
  - id: PMID:23633521
    title: 'Loss of Krüppel-like factor 3 (KLF3/BKLF) leads to upregulation of the
      insulin-sensitizing factor adipolin (FAM132A/CTRP12/C1qdc2).'
    findings:
      - statement: >-
          KLF3-null mice are lean and protected from diet-induced obesity. KLF3 binds
          the Fam132a promoter and represses its activity. Plasma adipolin levels are
          elevated in KLF3-null mice.
        supporting_text: "KLF3-null mice are lean and protected from diet-induced
          obesity and glucose intolerance"
  - id: PMID:23716600
    title: Generation of mice deficient in both KLF3/BKLF and KLF8 reveals a genetic
      interaction and a role for these factors in embryonic globin gene silencing.
    findings:
      - statement: >-
          KLF3 and KLF8 have overlapping roles in vivo and participate in silencing
          embryonic globin genes. Klf3/Klf8 double mutant embryos die around E14.5.
        supporting_text: "KLF3 and KLF8 have overlapping roles in vivo and
          participate in the silencing of embryonic globin expression during
          development"
  - id: PMID:25015818
    title: 'Leukocyte β7 integrin targeted by Krüppel-like factors.'
    findings:
      - statement: >-
          KLF3 acts as transcriptional repressor for integrin beta-7 by binding its
          promoter. KLF3 overexpression increases marginal zone B cell numbers and
          abolishes lymphocyte homing to Peyer's patches. KLF3 directly represses
          its own gene promoter (negative autoregulatory loop).
        supporting_text: "KLF3 acts as transcriptional repressor for the
          leukocyte-specific integrin β7"
  - id: PMID:25659434
    title: 'Phosphorylation of Krüppel-like factor 3 (KLF3/BKLF) and C-terminal
      binding protein 2 (CtBP2) by homeodomain-interacting protein kinase 2 (HIPK2)
      modulates KLF3 DNA binding and activity.'
    findings:
      - statement: >-
          HIPK2 phosphorylates KLF3 at serine 249 and CtBP2 at serine 428.
          Phosphorylation enhances KLF3-CtBP2 interaction and increases
          transcriptional repression.
        supporting_text: "phosphorylation of KLF3 and CtBP2 by HIPK2 strengthens
          the interaction between these two factors and increases transcriptional
          repression by KLF3"
  - id: PMID:27226561
    title: 'Krüppel-like Factor 3 (KLF3/BKLF) Is Required for Widespread Repression
      of the Inflammatory Modulator Galectin-3 (Lgals3).'
    findings:
      - statement: >-
          KLF3 directly represses galectin-3 transcription by binding CACCC boxes
          in the Lgals3 promoter. Galectin-3 is broadly upregulated in KLF3-deficient
          tissues. CtBP is required for optimal KLF3-mediated silencing of Lgals3.
        supporting_text: "KLF3 directly binds its cognate elements (CACCC boxes) in
          the galectin-3 promoter and represses its activation in cellular assays"
core_functions:
  - molecular_function:
      id: GO:0001227
      label: DNA-binding transcription repressor activity, RNA polymerase
        II-specific
    description: >-
      KLF3 is a transcriptional repressor that binds CACCC elements and GC-rich
      motifs in gene regulatory regions through its three C2H2 zinc fingers and
      represses transcription by recruiting the co-repressor CtBP through a
      conserved PVDLS motif. This is the primary molecular function of KLF3
      (PMID:9724649, PMID:21360637).
    supported_by:
      - reference_id: PMID:9724649
        supporting_text: "We have studied the activity of BKLF and found that it is
          capable of repressing transcription, and have mapped its repression domain
          to the N-terminus"
      - reference_id: PMID:21360637
        supporting_text: "KLF3 is a transcriptional repressor that binds the cofactor
          C-terminal binding protein, which in turn recruits a large repressor
          complex to mediate transcriptional silencing"
  - molecular_function:
      id: GO:0000977
      label: RNA polymerase II transcription regulatory region sequence-specific DNA
        binding
    description: >-
      KLF3 binds specifically to CACCC boxes and GC-rich motifs in promoters and
      enhancers of target genes through three C-terminal C2H2 zinc fingers. This
      DNA binding activity is demonstrated by EMSA, ChIP, and reporter assays at
      multiple target loci including C/EBPalpha, Lgals3, Fam132a, integrin beta-7,
      and globin gene promoters (PMID:18391014, PMID:27226561, PMID:25015818).
    supported_by:
      - reference_id: PMID:21360637
        supporting_text: "These proteins are classified by the presence of three
          C-terminal C2H2 zinc fingers that allow sequence-specific binding to
          CACCC boxes and GC-rich motifs found in the promoters, enhancers, and
          other control regions of target genes"
      - reference_id: PMID:18391014
        supporting_text: "Chromatin immunoprecipitations confirm that Klf3 binds the
          C/ebpalpha promoter in vivo"
  - molecular_function:
      id: GO:0001222
      label: transcription corepressor binding
    description: >-
      KLF3 recruits the co-repressor CtBP2 through a PVDLS motif, which is essential
      for transcriptional repression. KLF3 also binds the LIM domain protein FHL3,
      forming a trimeric complex with CtBP2. The KLF3-CtBP interaction is modulated
      by HIPK2-mediated phosphorylation (PMID:9724649, PMID:12556451, PMID:25659434).
    supported_by:
      - reference_id: PMID:9724649
        supporting_text: "We carried out a two-hybrid screen against BKLF and
          isolated a novel clone encoding murine C-terminal-binding protein 2
          (mCtBP2)"
      - reference_id: PMID:12556451
        supporting_text: "BKLF also recruits the four and a half LIM domain protein
          FHL3"
suggested_questions:
  - question: What is the role of KLF3 in rat-specific tissues or processes that
      may differ from mouse?
  - question: Does KLF3 play a role in liver regeneration through regulation of
      lymphotoxin-beta, as suggested by Subrata et al. (PMID:15910501)?
  - question: What are the specific downstream targets of KLF3 in rat erythroid
      cells?
