id: G3V667
gene_symbol: Itga6
product_type: PROTEIN
status: IN_PROGRESS
taxon:
  id: NCBITaxon:10116
  label: Rattus norvegicus
description: >-
  Itga6 encodes integrin subunit alpha-6, a type I transmembrane glycoprotein of the integrin alpha chain family.
  Integrin alpha-6 heterodimerizes with either integrin beta-1 (forming VLA-6/alpha6beta1) or integrin beta-4
  (forming alpha6beta4). The alpha6beta1 complex functions as a major laminin receptor mediating cell-matrix adhesion,
  while the alpha6beta4 complex is a key structural component of hemidesmosomes in epithelial cells, anchoring the
  cytoskeleton to the basement membrane. Both complexes play roles in cell adhesion, migration, and signaling.
  The alpha6beta4 complex can also switch from an adhesion-promoting to a migration-promoting role through association
  with tetraspanins (PMID:13130099). In rat testis, alpha6beta1-integrin at the apical ectoplasmic specialization
  binds laminin-332 (alpha3beta3gamma3), mediating Sertoli cell-spermatid adhesion (PMID:16608848). The protein
  contains FG-GAP repeats forming a beta-propeller domain for ligand binding, three immunoglobulin-like domains,
  a single transmembrane helix, and a short cytoplasmic tail. The rat entry (G3V667) is unreviewed in TrEMBL;
  the well-characterized human ortholog is P23229 (ITGA6).
existing_annotations:
# ============================================================
# IBA ANNOTATIONS (phylogenetic inference from GO_Central)
# ============================================================
- term:
    id: GO:0007229
    label: integrin-mediated signaling pathway
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      Integrin-mediated signaling is a well-established core function of all integrin alpha subunits.
      Integrin alpha-6, when paired with beta-1 or beta-4, activates intracellular signaling cascades
      upon ligand (laminin) binding. This IBA annotation is well-supported phylogenetically across
      multiple integrin alpha subunits.
    action: ACCEPT
    reason: >-
      Core function of integrin alpha-6. Integrin signaling is fundamental to all integrins, and
      alpha6-containing complexes signal through focal adhesion kinase and other pathways upon
      laminin engagement. Phylogenetically conserved across the integrin alpha family.

- term:
    id: GO:0038023
    label: signaling receptor activity
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      Integrins function as signaling receptors that transduce extracellular matrix signals into
      intracellular responses (outside-in signaling). This is a core molecular function for
      integrin alpha-6 as part of the alpha6beta1 and alpha6beta4 heterodimers.
    action: ACCEPT
    reason: >-
      Appropriate molecular function term for integrin alpha-6. Integrins are bona fide signaling
      receptors that activate intracellular cascades upon ECM ligand binding. The IBA annotation
      is phylogenetically well-supported across integrin alpha subunits.

- term:
    id: GO:0098609
    label: cell-cell adhesion
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      IBA annotation for cell-cell adhesion. While integrins primarily mediate cell-matrix adhesion,
      alpha6-containing integrins also participate in cell-cell adhesion contexts, such as the
      Sertoli cell-spermatid interaction in testis (PMID:16557522, PMID:16608848). The IBA annotation
      reflects broad integrin family involvement in cell-cell adhesion.
    action: ACCEPT
    reason: >-
      Supported by rat-specific experimental data. PMID:16557522 demonstrates that integrin alpha6 and
      beta1 subunits are involved in spermatogenic cell attachment to Sertoli cells, and blocking
      anti-beta1 antibody causes spermatogenic cell detachment. PMID:16608848 shows alpha6beta1
      at the apical ectoplasmic specialization mediating Sertoli-spermatid adhesion.
    supported_by:
      - reference_id: PMID:16557522
        supporting_text: >-
          integrin beta1, alpha3, and alpha6 subunits, and CD9 and CD81 transcripts are expressed
          in the fetal testis and throughout testicular maturation
      - reference_id: PMID:16608848
        supporting_text: >-
          Apical ectoplasmic specialization (ES) is a testis-specific hybrid cell/cell actin-based
          adherens junction and cell/matrix focal contact anchoring junction type restricted to
          the interface between Sertoli cells and developing spermatids

- term:
    id: GO:0009986
    label: cell surface
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      Cell surface localization is a core attribute of integrin alpha-6. As a type I transmembrane
      protein forming heterodimers with beta-1 or beta-4, integrin alpha-6 is displayed on the
      cell surface to interact with extracellular laminin ligands. Broadly supported across
      the integrin family.
    action: ACCEPT
    reason: >-
      Fundamental localization for a transmembrane receptor. Integrin alpha-6 must be at the cell
      surface to function as a laminin receptor. Phylogenetically conserved across integrin alpha subunits.

- term:
    id: GO:0034675
    label: integrin alpha6-beta1 complex
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      Integrin alpha-6 is a defining subunit of the alpha6-beta1 complex (VLA-6), one of the two
      major heterodimeric complexes formed by this subunit. The alpha6beta1 complex is the primary
      laminin receptor in many cell types. This is a core cellular component annotation.
    action: ACCEPT
    reason: >-
      Defining complex membership for integrin alpha-6. The alpha6beta1 complex (VLA-6) is one
      of the two canonical heterodimers formed by this subunit. Confirmed in rat testis by
      PMID:16608848 showing alpha6beta1-integrin at the apical ectoplasmic specialization.
    supported_by:
      - reference_id: PMID:16608848
        supporting_text: >-
          alpha 6beta 1-integrin localized in Sertoli cells at the apical ES

- term:
    id: GO:0034676
    label: integrin alpha6-beta4 complex
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      Integrin alpha-6 is a defining subunit of the alpha6-beta4 complex, which is a major
      component of hemidesmosomes in epithelial cells. This is a core cellular component
      annotation for integrin alpha-6.
    action: ACCEPT
    reason: >-
      Defining complex membership. The alpha6beta4 complex is the other canonical heterodimer
      of integrin alpha-6. Directly confirmed in rat by PMID:13130099 which identifies alpha6beta4
      by mass spectrometry and cloning in a rat pancreatic adenocarcinoma cell line.
    supported_by:
      - reference_id: PMID:13130099
        supporting_text: >-
          An antibody-defined molecule was identified by mass spectrometry and cloning as
          alpha6beta4 integrin

- term:
    id: GO:0050900
    label: leukocyte migration
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      IBA annotation for leukocyte migration. Integrin alpha-6 is expressed on leukocytes and
      contributes to their migration, particularly through interactions with vascular basement
      membrane laminins. This is a tissue-specific role rather than the core molecular function.
    action: KEEP_AS_NON_CORE
    reason: >-
      While integrin alpha-6 does participate in leukocyte migration through laminin binding on
      vascular basement membranes, this represents a specific biological context rather than
      the core evolved function of the gene. The IBA phylogenetic support is noted but this
      is a downstream tissue-specific process.

# ============================================================
# IEA ANNOTATIONS (electronic annotation)
# ============================================================
- term:
    id: GO:0007155
    label: cell adhesion
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: >-
      Cell adhesion is the broadest biological process term applicable to integrins. IEA annotation
      from InterPro domain mapping (IPR000413, integrin alpha chain). While correct, this is very
      general; more specific child terms (cell-matrix adhesion, cell adhesion mediated by integrin)
      are also annotated.
    action: ACCEPT
    reason: >-
      Correct but general. As a broad IEA annotation from InterPro domain recognition, this is
      acceptable alongside the more specific child terms. Cell adhesion is indeed the fundamental
      biological role of all integrins.

- term:
    id: GO:0007160
    label: cell-matrix adhesion
  evidence_type: IEA
  original_reference_id: GO_REF:0000117
  review:
    summary: >-
      Cell-matrix adhesion is a core function of integrin alpha-6. Both alpha6beta1 and alpha6beta4
      complexes mediate cell adhesion to laminin-containing extracellular matrices. ARBA machine
      learning annotation is well-supported by the biology.
    action: ACCEPT
    reason: >-
      Core function. Integrin alpha-6 mediates cell-matrix adhesion through laminin binding.
      Supported by experimental evidence in rat (PMID:16608848, PMID:13130099).

- term:
    id: GO:0008305
    label: integrin complex
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  review:
    summary: >-
      Generic integrin complex annotation from combined IEA methods. Correct but less informative
      than the specific alpha6-beta1 and alpha6-beta4 complex annotations already present.
    action: ACCEPT
    reason: >-
      Correct parent term. Integrin alpha-6 is indeed part of an integrin complex. While less specific
      than GO:0034675 and GO:0034676, this IEA annotation is not incorrect and provides a valid
      broader categorization.

- term:
    id: GO:0009986
    label: cell surface
  evidence_type: IEA
  original_reference_id: GO_REF:0000117
  review:
    summary: >-
      Duplicate cell surface annotation from ARBA. Same term as the IBA annotation above.
      Correct localization for a transmembrane integrin receptor.
    action: ACCEPT
    reason: >-
      Correct localization. Duplicate of IBA annotation for the same term; both are valid entries
      from different evidence pipelines.

- term:
    id: GO:0016020
    label: membrane
  evidence_type: IEA
  original_reference_id: GO_REF:0000044
  review:
    summary: >-
      Generic membrane localization from UniProt subcellular location mapping. Correct but very
      broad; more specific terms (plasma membrane, cell surface, basal plasma membrane) are
      also annotated.
    action: ACCEPT
    reason: >-
      Correct but very general. Integrin alpha-6 is a type I transmembrane protein as confirmed
      by UniProt annotation and the presence of a transmembrane helix (residues 1052-1076).
      Acceptable as a broad IEA annotation.

# ============================================================
# ISO ANNOTATIONS (sequence orthology from RGD, transferred from human/mouse)
# ============================================================
- term:
    id: GO:0007160
    label: cell-matrix adhesion
  evidence_type: ISO
  original_reference_id: GO_REF:0000121
  review:
    summary: >-
      Cell-matrix adhesion transferred from human ITGA6 (P23229). Core function of integrin
      alpha-6 as a laminin receptor mediating cell adhesion to the extracellular matrix.
      Also supported by rat-specific data (PMID:16608848).
    action: ACCEPT
    reason: >-
      Core function. Duplicate of the IEA annotation for the same term. ISO transfer from
      human ortholog P23229 is well-justified given the high conservation of integrin function.

- term:
    id: GO:0043589
    label: skin morphogenesis
  evidence_type: ISO
  original_reference_id: GO_REF:0000121
  review:
    summary: >-
      Skin morphogenesis transferred from human ITGA6. In humans, ITGA6 mutations cause
      epidermolysis bullosa with pyloric atresia, demonstrating a role in skin integrity.
      The alpha6beta4 complex in hemidesmosomes is essential for epidermal-dermal adhesion.
    action: KEEP_AS_NON_CORE
    reason: >-
      Tissue-specific developmental role. While integrin alpha-6 is essential for skin integrity
      via hemidesmosomes, skin morphogenesis is a downstream tissue-specific consequence of the
      core cell adhesion function rather than the core molecular role itself.

- term:
    id: GO:0010976
    label: positive regulation of neuron projection development
  evidence_type: ISO
  original_reference_id: GO_REF:0000121
  review:
    summary: >-
      Transferred from mouse Itga6 (MGI:96605). Integrin alpha-6 has been shown to promote
      neurite outgrowth on laminin substrates in neuronal cells. This is a tissue-specific
      developmental role.
    action: KEEP_AS_NON_CORE
    reason: >-
      Tissue-specific developmental effect. Neuron projection development on laminin is a
      downstream consequence of laminin binding and cell-matrix adhesion in neuronal contexts.
      Not a core function of the gene but a valid pleiotropic role.

- term:
    id: GO:0031994
    label: insulin-like growth factor I binding
  evidence_type: ISO
  original_reference_id: GO_REF:0000121
  review:
    summary: >-
      IGF-I binding transferred from human ITGA6. There is evidence that integrin alpha-6
      can interact with IGF-1 in certain contexts, but this is not a well-established core
      function of the protein. The molecular basis for this interaction is not fully characterized.
    action: UNDECIDED
    reason: >-
      Uncertain annotation. IGF-I binding is not a canonical function of integrins. While
      there may be evidence for cross-talk between integrin and IGF signaling pathways,
      direct IGF-I binding by integrin alpha-6 is atypical and the supporting evidence
      is not accessible for review. This may represent an over-annotation.

- term:
    id: GO:0038132
    label: neuregulin binding
  evidence_type: ISO
  original_reference_id: GO_REF:0000121
  review:
    summary: >-
      Neuregulin binding transferred from human ITGA6. Some studies have reported interactions
      between integrins and neuregulin/ErbB signaling, but direct neuregulin binding by
      integrin alpha-6 is not a canonical integrin function.
    action: UNDECIDED
    reason: >-
      Uncertain annotation. Neuregulin binding is not a typical integrin function. While
      alpha6beta4 has been shown to interact with ErbB2/HER2 signaling in some contexts,
      direct neuregulin binding by the integrin alpha-6 subunit itself is questionable.
      Unable to access the original supporting evidence for the human annotation.

- term:
    id: GO:0030335
    label: positive regulation of cell migration
  evidence_type: ISO
  original_reference_id: GO_REF:0000121
  review:
    summary: >-
      Positive regulation of cell migration transferred from human ITGA6. Integrin alpha-6
      promotes cell migration, particularly when alpha6beta4 associates with tetraspanins
      (PMID:13130099). This is a well-supported function.
    action: ACCEPT
    reason: >-
      Well-supported function. PMID:13130099 directly demonstrates that alpha6beta4 in association
      with tetraspanin D6.1A promotes cell motility in rat pancreatic adenocarcinoma cells.
      Cell migration on laminin substrates is a well-established integrin alpha-6 function.
    supported_by:
      - reference_id: PMID:13130099
        supporting_text: >-
          when the non-metastasizing subline was doubly transfected to express alpha6beta4 and
          the D6.1A tetraspanin, intraperitoneally injected tumor cells frequently formed liver
          metastasis

- term:
    id: GO:0043547
    label: positive regulation of GTPase activity
  evidence_type: ISO
  original_reference_id: GO_REF:0000121
  review:
    summary: >-
      Positive regulation of GTPase activity transferred from human ITGA6. Integrin signaling
      activates small GTPases (Rac1, RhoA, Cdc42) as part of downstream signaling cascades.
      However, this is an indirect regulatory effect rather than a direct molecular function.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      This is an indirect downstream effect of integrin signaling. Integrins activate small
      GTPases through adaptor proteins and guanine nucleotide exchange factors, but do not
      directly regulate GTPase activity. This represents an over-annotation of the signaling
      cascade downstream of integrin engagement.

- term:
    id: GO:0035878
    label: nail development
  evidence_type: ISO
  original_reference_id: GO_REF:0000121
  review:
    summary: >-
      Nail development transferred from human ITGA6. Human ITGA6 mutations can cause nail
      dystrophy as part of epidermolysis bullosa syndromes. This is a very specific
      tissue-specific developmental phenotype.
    action: KEEP_AS_NON_CORE
    reason: >-
      Tissue-specific developmental phenotype. Nail development defects result from loss of
      hemidesmosome integrity in nail matrix epithelium. This is a downstream consequence of
      the core cell adhesion function in a specific tissue, not a core function of the gene.

- term:
    id: GO:0009986
    label: cell surface
  evidence_type: ISO
  original_reference_id: GO_REF:0000121
  review:
    summary: >-
      Cell surface localization transferred from human ITGA6 (P23229). Duplicate of IBA and
      IEA annotations for the same term. Correct localization.
    action: ACCEPT
    reason: >-
      Correct localization, consistent with IBA annotation. Multiple lines of evidence
      confirm cell surface localization.

- term:
    id: GO:0010668
    label: ectodermal cell differentiation
  evidence_type: ISO
  original_reference_id: GO_REF:0000121
  review:
    summary: >-
      Ectodermal cell differentiation transferred from human ITGA6. Integrin alpha-6 plays
      roles in ectodermal tissue development including skin and hair follicles. This is a
      tissue-specific developmental role.
    action: KEEP_AS_NON_CORE
    reason: >-
      Tissue-specific developmental process. Ectodermal cell differentiation depends on
      integrin-mediated adhesion to basement membranes, but this is a downstream developmental
      effect in a specific lineage, not the core function of integrin alpha-6.

- term:
    id: GO:0031589
    label: cell-substrate adhesion
  evidence_type: ISO
  original_reference_id: GO_REF:0000121
  review:
    summary: >-
      Cell-substrate adhesion transferred from human ITGA6. This is a broader parent term
      of cell-matrix adhesion. Correct for integrin alpha-6 as a laminin receptor mediating
      cell adhesion to substrate.
    action: ACCEPT
    reason: >-
      Core function. Cell-substrate adhesion encompasses the primary adhesive role of
      integrin alpha-6, including both cell-matrix adhesion and adhesion to laminin-coated
      surfaces. Supported by rat experimental data (PMID:13130099, PMID:16608848).

- term:
    id: GO:0009897
    label: external side of plasma membrane
  evidence_type: ISO
  original_reference_id: GO_REF:0000121
  review:
    summary: >-
      External side of plasma membrane localization transferred from mouse Itga6. As a
      transmembrane protein with a large extracellular domain containing FG-GAP repeats and
      immunoglobulin-like domains, the ligand-binding portion of integrin alpha-6 is exposed
      on the external side of the plasma membrane.
    action: ACCEPT
    reason: >-
      Correct and specific localization. The extracellular domain of integrin alpha-6 (residues
      24-1051 based on UniProt features) is exposed on the external face of the plasma membrane
      for laminin ligand binding.

- term:
    id: GO:2001237
    label: negative regulation of extrinsic apoptotic signaling pathway
  evidence_type: ISO
  original_reference_id: GO_REF:0000121
  review:
    summary: >-
      Negative regulation of extrinsic apoptotic signaling pathway transferred from human ITGA6.
      Integrin-mediated adhesion provides survival signals; loss of adhesion (anoikis) can trigger
      apoptosis. Alpha6beta4 has been specifically linked to anti-apoptotic signaling.
    action: KEEP_AS_NON_CORE
    reason: >-
      Secondary signaling consequence. While integrin alpha-6 engagement does provide anti-apoptotic
      signals through adhesion-dependent survival pathways, this is a downstream signaling
      consequence rather than the core evolved function. Relevant but not a primary role.

- term:
    id: GO:0030056
    label: hemidesmosome
  evidence_type: ISO
  original_reference_id: GO_REF:0000121
  review:
    summary: >-
      Hemidesmosome localization transferred from mouse Itga6. The alpha6beta4 integrin complex
      is a defining structural component of hemidesmosomes, anchoring epithelial cells to the
      basement membrane. This is a core localization for integrin alpha-6.
    action: ACCEPT
    reason: >-
      Core cellular component annotation. The alpha6beta4 complex is a well-established
      structural component of hemidesmosomes. Mutations in human ITGA6 cause epidermolysis
      bullosa precisely because of disrupted hemidesmosome function.

- term:
    id: GO:0009925
    label: basal plasma membrane
  evidence_type: ISO
  original_reference_id: GO_REF:0000121
  review:
    summary: >-
      Basal plasma membrane localization transferred from mouse Itga6. In polarized epithelial
      cells, integrin alpha-6 localizes to the basal surface where it contacts the basement
      membrane via hemidesmosomes (alpha6beta4) or focal contacts (alpha6beta1).
    action: ACCEPT
    reason: >-
      Correct and informative localization for polarized epithelial cells. The basal membrane
      is where integrins engage basement membrane laminins. Consistent with hemidesmosome
      localization.

- term:
    id: GO:0005886
    label: plasma membrane
  evidence_type: ISO
  original_reference_id: GO_REF:0000121
  review:
    summary: >-
      Plasma membrane localization transferred from human ITGA6. Correct general localization
      for a type I transmembrane protein. More specific terms (basal plasma membrane, external
      side of plasma membrane) are also annotated.
    action: ACCEPT
    reason: >-
      Correct but general localization. Integrin alpha-6 is a single-pass type I transmembrane
      protein (UniProt: transmembrane helix at residues 1052-1076) and is localized to the
      plasma membrane.

- term:
    id: GO:0045944
    label: positive regulation of transcription by RNA polymerase II
  evidence_type: ISO
  original_reference_id: GO_REF:0000121
  review:
    summary: >-
      Positive regulation of transcription by RNA polymerase II transferred from human ITGA6.
      While integrin signaling can ultimately influence gene transcription through pathways
      like MAPK/ERK, directly annotating a cell surface receptor with transcription regulation
      represents a very distal downstream effect.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      Over-annotation. This is a very distal downstream effect of integrin signaling. Many
      signaling receptors ultimately influence transcription, but annotating integrin alpha-6
      with positive regulation of transcription by RNA polymerase II conflates the receptor's
      direct function with the end of a long signaling cascade. Not informative about the
      specific role of this gene.

- term:
    id: GO:0045178
    label: basal part of cell
  evidence_type: ISO
  original_reference_id: GO_REF:0000121
  review:
    summary: >-
      Basal part of cell localization transferred from mouse Itga6. Consistent with the
      basal plasma membrane annotation. In polarized cells, integrin alpha-6 concentrates
      at the basal surface for basement membrane contact.
    action: ACCEPT
    reason: >-
      Correct localization. Consistent with other basal localization annotations (basal plasma
      membrane, hemidesmosome). Integrin alpha-6 is concentrated at the basal surface of
      polarized epithelial cells.

- term:
    id: GO:0043065
    label: positive regulation of apoptotic process
  evidence_type: ISO
  original_reference_id: GO_REF:0000121
  review:
    summary: >-
      Positive regulation of apoptotic process transferred from human ITGA6. This annotation
      appears to conflict with GO:2001237 (negative regulation of extrinsic apoptotic signaling
      pathway) also annotated for this gene. Context-dependent roles in both pro- and
      anti-apoptotic signaling have been reported for integrins.
    action: UNDECIDED
    reason: >-
      Conflicting with the anti-apoptotic annotation (GO:2001237). While context-dependent
      roles in apoptosis are possible, having both positive and negative regulation of apoptosis
      annotated for the same gene product is confusing without clear context. The GOA qualifier
      is 'acts_upstream_of_or_within' which is weaker than 'involved_in'. Unable to access
      the original human evidence to resolve this apparent contradiction.

- term:
    id: GO:0010811
    label: positive regulation of cell-substrate adhesion
  evidence_type: IMP
  original_reference_id: PMID:13130099
  review:
    summary: >-
      IMP annotation from PMID:13130099 (Herlevsen et al. 2003). The study showed that
      transfection-induced expression of alpha6beta4 in a non-metastasizing rat pancreatic
      adenocarcinoma subline supported cell adhesion. The alpha6beta4 complex promotes
      cell-substrate adhesion when expressed.
    action: ACCEPT
    reason: >-
      Directly supported by rat experimental evidence. PMID:13130099 demonstrates that
      alpha6beta4 expression in transfected cells supports cell adhesion and motility on
      laminin substrates in rat pancreatic adenocarcinoma cells.
    supported_by:
      - reference_id: PMID:13130099
        supporting_text: >-
          Transfection-induced expression of alpha6beta4 in the non-metastasizing subline
          did not support migration on laminin 5 or tumor progression

- term:
    id: GO:0030175
    label: filopodium
  evidence_type: IDA
  original_reference_id: PMID:13130099
  review:
    summary: >-
      IDA annotation from PMID:13130099. The study observed redistribution of alpha6beta4/D6.1A
      complexes during PKC stimulation, including localization to the leading lamella. Filopodium
      localization may have been observed during the migratory phenotype induced by PKC stimulation.
    action: ACCEPT
    reason: >-
      Supported by direct experimental observation in rat cells. PMID:13130099 describes
      redistribution of alpha6beta4 to the leading edge structures during PKC-stimulated
      migration. Filopodia are characteristic leading-edge structures during cell migration.
    supported_by:
      - reference_id: PMID:13130099
        supporting_text: >-
          during PKC stimulation they become transiently internalized and are (re-)expressed
          in the leading lamella

- term:
    id: GO:0034676
    label: integrin alpha6-beta4 complex
  evidence_type: IDA
  original_reference_id: PMID:13130099
  review:
    summary: >-
      IDA annotation from PMID:13130099. The alpha6beta4 integrin was identified by mass
      spectrometry and cloning in rat pancreatic adenocarcinoma cells. This provides direct
      experimental evidence for the alpha6beta4 complex in rat.
    action: ACCEPT
    reason: >-
      Strong direct experimental evidence in rat. PMID:13130099 identified alpha6beta4 by
      mass spectrometry and confirmed its expression through transfection. This is a core
      complex for integrin alpha-6. Duplicate with IBA annotation but with direct rat evidence.
    supported_by:
      - reference_id: PMID:13130099
        supporting_text: >-
          An antibody-defined molecule was identified by mass spectrometry and cloning as
          alpha6beta4 integrin

- term:
    id: GO:1904628
    label: cellular response to phorbol 13-acetate 12-myristate
  evidence_type: IEP
  original_reference_id: PMID:13130099
  review:
    summary: >-
      IEP annotation from PMID:13130099. PKC stimulation (via PMA/phorbol ester) induced
      redistribution of alpha6beta4/D6.1A complexes and a migratory phenotype. The expression
      pattern of integrin alpha-6 changes in response to PMA treatment.
    action: KEEP_AS_NON_CORE
    reason: >-
      IEP (inferred from expression pattern) evidence that integrin alpha-6 expression/localization
      is modulated by PMA. While this reflects a real observation, it describes a response to
      an experimental pharmacological stimulus rather than a core physiological function.
      PKC stimulation causing redistribution is interesting but represents experimental context.
    supported_by:
      - reference_id: PMID:13130099
        supporting_text: >-
          Co-localization is strengthened by PKC stimulation...PKC stimulation, which induces
          a migratory phenotype, leads to a redistribution of alpha6beta4/D6.1A complexes

- term:
    id: GO:0005604
    label: basement membrane
  evidence_type: ISO
  original_reference_id: GO_REF:0000121
  review:
    summary: >-
      Basement membrane localization transferred from mouse Itga6. Integrin alpha-6, particularly
      as alpha6beta4 in hemidesmosomes, directly contacts the basement membrane. Also supported
      by rat data showing alpha6beta1 at the apical ectoplasmic specialization interacting
      with laminin in the basement membrane region (PMID:16608848).
    action: ACCEPT
    reason: >-
      Core localization. Integrin alpha-6 complexes directly interface with the basement membrane
      through laminin binding. This is where the receptor carries out its primary adhesive function.

- term:
    id: GO:0050873
    label: brown fat cell differentiation
  evidence_type: ISO
  original_reference_id: GO_REF:0000121
  review:
    summary: >-
      Brown fat cell differentiation transferred from mouse Itga6. The qualifier in GOA is
      'acts_upstream_of_or_within' which is weaker. This is a very specific tissue/cell-type
      differentiation process.
    action: KEEP_AS_NON_CORE
    reason: >-
      Very specific tissue developmental role. Brown fat cell differentiation is a highly
      specialized downstream biological context for integrin-mediated adhesion. The
      'acts_upstream_of_or_within' qualifier suggests indirect involvement. Not a core
      function of integrin alpha-6.

- term:
    id: GO:0005178
    label: integrin binding
  evidence_type: ISO
  original_reference_id: GO_REF:0000121
  review:
    summary: >-
      Integrin binding transferred from mouse Itga6. This term indicates that integrin alpha-6
      binds to other integrins. As integrin alpha subunits heterodimerize with beta subunits,
      this could reflect alpha-beta binding. However, the term is somewhat circular and
      uninformative for an integrin subunit.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      Somewhat tautological for an integrin subunit. Integrin alpha-6 binds integrin beta-1 and
      beta-4 to form heterodimers, but annotating an integrin subunit with 'integrin binding'
      is not very informative. The specific complex annotations (alpha6-beta1, alpha6-beta4)
      are much more useful. This is analogous to annotating a protein with 'protein binding'.

- term:
    id: GO:0033627
    label: cell adhesion mediated by integrin
  evidence_type: ISO
  original_reference_id: GO_REF:0000121
  review:
    summary: >-
      Cell adhesion mediated by integrin transferred from mouse Itga6. This is the most
      specific and appropriate process term for integrin alpha-6 function, as it captures
      the core role of this protein in mediating cell adhesion through integrin complexes.
    action: ACCEPT
    reason: >-
      Highly appropriate and specific term for integrin alpha-6. This term directly describes
      the core biological process function of the gene product. More informative than the
      generic 'cell adhesion' term.

- term:
    id: GO:0022409
    label: positive regulation of cell-cell adhesion
  evidence_type: ISO
  original_reference_id: GO_REF:0000121
  review:
    summary: >-
      Positive regulation of cell-cell adhesion transferred from mouse Itga6. The qualifier
      in GOA is 'acts_upstream_of_or_within'. Integrin alpha-6 can promote cell-cell adhesion
      in specific contexts, such as Sertoli-spermatid adhesion in testis.
    action: KEEP_AS_NON_CORE
    reason: >-
      Context-dependent regulatory role. While integrin alpha-6 participates in cell-cell adhesion
      (supported by PMID:16557522, PMID:16608848), the positive regulation aspect is more of a
      downstream phenotypic effect. The 'acts_upstream_of_or_within' qualifier indicates indirect
      involvement.

- term:
    id: GO:0005912
    label: adherens junction
  evidence_type: IDA
  original_reference_id: PMID:16608848
  review:
    summary: >-
      IDA annotation from PMID:16608848 (Yan and Cheng 2006). The study identified alpha6beta1-
      integrin at the apical ectoplasmic specialization in adult rat testes, which is described
      as a testis-specific hybrid adherens junction and focal contact type.
    action: ACCEPT
    reason: >-
      Direct experimental evidence in rat testis. PMID:16608848 explicitly describes the apical
      ectoplasmic specialization as "a testis-specific hybrid cell/cell actin-based adherens
      junction" where alpha6beta1-integrin is localized.
    supported_by:
      - reference_id: PMID:16608848
        supporting_text: >-
          Apical ectoplasmic specialization (ES) is a testis-specific hybrid cell/cell actin-based
          adherens junction and cell/matrix focal contact anchoring junction type restricted to
          the interface between Sertoli cells and developing spermatids

- term:
    id: GO:0043236
    label: laminin binding
  evidence_type: IPI
  original_reference_id: PMID:16608848
  review:
    summary: >-
      IPI annotation from PMID:16608848. Co-immunoprecipitation studies confirmed interactions
      between laminin alpha3, beta3, gamma3 chains and beta1-integrin at the apical ectoplasmic
      specialization in rat testes. This directly demonstrates laminin binding by the alpha6beta1
      complex in rat tissue.
    action: ACCEPT
    reason: >-
      Core molecular function directly demonstrated in rat. Laminin binding is the primary
      ligand interaction for integrin alpha-6. PMID:16608848 provides IPI evidence through
      co-immunoprecipitation showing laminin-integrin interaction in rat testis.
    supported_by:
      - reference_id: PMID:16608848
        supporting_text: >-
          co-immunoprecipitation studies have confirmed the interactions among laminin alpha 3,
          beta3, and gamma3, as well as beta1-integrin

- term:
    id: GO:0098609
    label: cell-cell adhesion
  evidence_type: IMP
  original_reference_id: PMID:16557522
  review:
    summary: >-
      IMP annotation from PMID:16557522 (Kierszenbaum et al. 2006). The study showed that
      blocking integrin beta1 (which pairs with alpha6 in testis) caused spermatogenic cell
      detachment from Sertoli cell surfaces, demonstrating integrin alpha6/beta1 involvement
      in cell-cell adhesion in this tissue.
    action: ACCEPT
    reason: >-
      Direct experimental evidence in rat Sertoli-spermatogenic cell co-cultures. PMID:16557522
      demonstrates that blocking integrin beta1 (co-expressed with alpha6 in testis) disrupts
      spermatogenic cell attachment to Sertoli cells.
    supported_by:
      - reference_id: PMID:16557522
        supporting_text: >-
          A blocking anti body targeting the extracellular domain (N-terminal) of the integrin
          beta1 subunit causes rapid contraction of Sertoli cells leading to the gradual
          detachment of associated spermatogenic cells

- term:
    id: GO:0050900
    label: leukocyte migration
  evidence_type: ISO
  original_reference_id: GO_REF:0000121
  review:
    summary: >-
      Leukocyte migration transferred from mouse Itga6. Duplicate of the IBA annotation for
      the same term with different evidence. The 'acts_upstream_of_or_within' qualifier in
      GOA indicates indirect involvement.
    action: KEEP_AS_NON_CORE
    reason: >-
      Tissue-specific role, duplicate of IBA annotation. Leukocyte migration is a specific
      biological context for integrin alpha-6 function, not the core molecular role.
      Consistent assessment with the IBA annotation for the same term.

- term:
    id: GO:0016323
    label: basolateral plasma membrane
  evidence_type: ISO
  original_reference_id: GO_REF:0000121
  review:
    summary: >-
      Basolateral plasma membrane localization transferred from mouse Itga6. In polarized
      epithelial cells, integrin alpha-6 localizes to the basolateral surface. Consistent
      with basal plasma membrane annotation.
    action: ACCEPT
    reason: >-
      Correct localization for polarized cells. Integrin alpha-6 is found at the basolateral
      membrane of polarized epithelial cells, consistent with its role in basement membrane
      adhesion via hemidesmosomes and focal contacts.

- term:
    id: GO:0042475
    label: odontogenesis of dentin-containing tooth
  evidence_type: ISO
  original_reference_id: GO_REF:0000121
  review:
    summary: >-
      Odontogenesis transferred from mouse Itga6. Integrin alpha-6 is expressed in developing
      teeth and plays roles in tooth morphogenesis through epithelial-mesenchymal interactions
      at basement membranes.
    action: KEEP_AS_NON_CORE
    reason: >-
      Tissue-specific developmental role. Odontogenesis is a highly specialized developmental
      process where integrin-mediated adhesion to dental basement membranes plays a role.
      Not a core function of the gene but a valid pleiotropic developmental role.

- term:
    id: GO:0046847
    label: filopodium assembly
  evidence_type: ISO
  original_reference_id: GO_REF:0000121
  review:
    summary: >-
      Filopodium assembly transferred from mouse Itga6. Integrin signaling can promote
      filopodium formation through activation of Cdc42 and other actin regulators. Consistent
      with the IDA filopodium localization from PMID:13130099.
    action: KEEP_AS_NON_CORE
    reason: >-
      Downstream cytoskeletal effect. Filopodium assembly is a downstream consequence of
      integrin signaling rather than a core function. While integrin alpha-6 is found at
      filopodia (PMID:13130099), actively driving filopodium assembly is a secondary effect
      of integrin-mediated signaling.

- term:
    id: GO:0044877
    label: protein-containing complex binding
  evidence_type: IDA
  original_reference_id: PMID:13130099
  review:
    summary: >-
      IDA annotation from PMID:13130099. The study demonstrated that integrin alpha6beta4
      associates with the tetraspanin D6.1A in a complex. This binding to a protein-containing
      complex (tetraspanin web) was directly observed.
    action: MODIFY
    reason: >-
      While the experimental observation is sound (alpha6beta4 associates with tetraspanin D6.1A),
      'protein-containing complex binding' is too vague and uninformative. A more specific term
      describing the tetraspanin interaction would be more appropriate. However, the most
      relevant specific term would be related to tetraspanin binding or tetraspanin-enriched
      microdomain association.
    proposed_replacement_terms:
      - id: GO:0050839
        label: cell adhesion molecule binding
    supported_by:
      - reference_id: PMID:13130099
        supporting_text: >-
          The 2 molecules can associate and co-localize

- term:
    id: GO:0008305
    label: integrin complex
  evidence_type: ISO
  original_reference_id: GO_REF:0000121
  review:
    summary: >-
      Integrin complex annotation from RGD ISO transfer. Duplicate of the IEA annotation for
      the same term. Correct but less specific than the alpha6-beta1 and alpha6-beta4 complex
      annotations.
    action: ACCEPT
    reason: >-
      Correct parent complex annotation. Duplicate of IEA annotation with different evidence
      source. Valid broader categorization alongside the specific complex annotations.

