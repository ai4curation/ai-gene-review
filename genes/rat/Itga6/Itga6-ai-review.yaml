references:
- id: GO_REF:0000002
  title: Gene Ontology annotation through association of InterPro records with GO terms
  findings: []
- id: GO_REF:0000033
  title: Annotation inferences using phylogenetic trees
  findings:
    - statement: >-
        IBA annotations for integrin alpha-6 are based on phylogenetic inference across the
        integrin alpha subunit family, providing well-supported functional annotations.
- id: GO_REF:0000044
  title: Gene Ontology annotation based on UniProtKB/Swiss-Prot Subcellular Location vocabulary
    mapping, accompanied by conservative changes to GO terms applied by UniProt
  findings: []
- id: GO_REF:0000117
  title: Electronic Gene Ontology annotations created by ARBA machine learning models
  findings: []
- id: GO_REF:0000120
  title: Combined Automated Annotation using Multiple IEA Methods
  findings: []
- id: GO_REF:0000121
  title: RGD ISO annotations to rat from other mammalian species
  findings:
    - statement: >-
        ISO annotations for rat Itga6 are transferred from human ITGA6 (P23229) and mouse
        Itga6 (MGI:96605) via sequence orthology. The human ortholog is well-characterized
        and reviewed in Swiss-Prot with extensive experimental annotations.
- id: PMID:13130099
  title: The association of the tetraspanin D6.1A with the alpha6beta4 integrin supports
    cell motility and liver metastasis formation.
  findings:
    - statement: >-
        Alpha6beta4 integrin was identified by mass spectrometry and cloning in rat pancreatic
        adenocarcinoma cells. Expression of alpha6beta4 alone supported adhesion but not
        migration; co-expression with tetraspanin D6.1A enabled cell motility and liver
        metastasis. PKC stimulation enhanced co-localization and redistribution to the leading
        edge.
      supporting_text: >-
        An antibody-defined molecule was identified by mass spectrometry and cloning as
        alpha6beta4 integrin. Transfection-induced expression of alpha6beta4 in the
        non-metastasizing subline did not support migration on laminin 5 or tumor progression.
        However, when the non-metastasizing subline was doubly transfected to express alpha6beta4
        and the D6.1A tetraspanin, intraperitoneally injected tumor cells frequently formed
        liver metastasis
- id: PMID:16557522
  title: Role of integrins, tetraspanins, and ADAM proteins during the development of
    apoptotic bodies by spermatogenic cells.
  findings:
    - statement: >-
        Integrin alpha6 and beta1 subunits are co-expressed in rat testis throughout development.
        Blocking integrin beta1 causes Sertoli cell contraction and spermatogenic cell detachment,
        leading to apoptosis. Integrin alpha6B isoform is exclusively expressed in fetal testis,
        while both alpha6A and alpha6B co-exist in prepubertal testes.
      supporting_text: >-
        integrin beta1, alpha3, and alpha6 subunits, and CD9 and CD81 transcripts are expressed
        in the fetal testis and throughout testicular maturation...A blocking anti body targeting
        the extracellular domain (N-terminal) of the integrin beta1 subunit causes rapid
        contraction of Sertoli cells leading to the gradual detachment of associated spermatogenic
        cells
- id: PMID:16608848
  title: Laminin alpha 3 forms a complex with beta3 and gamma3 chains that serves as
    the ligand for alpha 6beta1-integrin at the apical ectoplasmic specialization in
    adult rat testes.
  findings:
    - statement: >-
        Alpha6beta1-integrin localizes to Sertoli cells at the apical ectoplasmic specialization
        in rat testes. Laminin alpha3-beta3-gamma3 on germ cells serves as the ligand. Co-
        immunoprecipitation confirmed interactions between laminin chains and beta1-integrin.
        Blocking laminin alpha3 or gamma3 disrupted Sertoli-germ cell adhesion.
      supporting_text: >-
        Apical ectoplasmic specialization (ES) is a testis-specific hybrid cell/cell actin-based
        adherens junction and cell/matrix focal contact anchoring junction type restricted to
        the interface between Sertoli cells and developing spermatids...co-immunoprecipitation
        studies have confirmed the interactions among laminin alpha 3, beta3, and gamma3, as
        well as beta1-integrin
core_functions:
  - description: >-
      Laminin receptor: Integrin alpha-6 forms heterodimeric complexes with beta-1 (alpha6beta1/VLA-6)
      or beta-4 (alpha6beta4) that bind laminin isoforms in the extracellular matrix, mediating
      cell-matrix adhesion. This is the primary molecular function of integrin alpha-6.
    molecular_function:
      id: GO:0043236
      label: laminin binding
    directly_involved_in:
      - id: GO:0007160
        label: cell-matrix adhesion
      - id: GO:0033627
        label: cell adhesion mediated by integrin
    locations:
      - id: GO:0009986
        label: cell surface
      - id: GO:0009925
        label: basal plasma membrane
    in_complex:
      id: GO:0034675
      label: integrin alpha6-beta1 complex
    supported_by:
      - reference_id: PMID:16608848
        supporting_text: >-
          co-immunoprecipitation studies have confirmed the interactions among laminin alpha 3,
          beta3, and gamma3, as well as beta1-integrin
  - description: >-
      Hemidesmosome-associated adhesion receptor: The alpha6beta4 complex is a defining structural
      component of hemidesmosomes in epithelial cells, anchoring the intermediate filament
      cytoskeleton to the basement membrane via laminin binding.
    molecular_function:
      id: GO:0043236
      label: laminin binding
    directly_involved_in:
      - id: GO:0031589
        label: cell-substrate adhesion
    locations:
      - id: GO:0030056
        label: hemidesmosome
      - id: GO:0005604
        label: basement membrane
    in_complex:
      id: GO:0034676
      label: integrin alpha6-beta4 complex
  - description: >-
      Integrin-mediated signaling receptor: Both alpha6beta1 and alpha6beta4 activate intracellular
      signaling cascades upon laminin engagement, functioning as signaling receptors that transmit
      outside-in signals affecting cell survival, migration, and gene expression.
    molecular_function:
      id: GO:0038023
      label: signaling receptor activity
    directly_involved_in:
      - id: GO:0007229
        label: integrin-mediated signaling pathway
      - id: GO:0030335
        label: positive regulation of cell migration
    locations:
      - id: GO:0009986
        label: cell surface
    supported_by:
      - reference_id: PMID:13130099
        supporting_text: >-
          when the non-metastasizing subline was doubly transfected to express alpha6beta4 and
          the D6.1A tetraspanin, intraperitoneally injected tumor cells frequently formed liver
          metastasis
