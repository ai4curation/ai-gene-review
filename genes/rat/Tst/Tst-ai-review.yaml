id: P24329
gene_symbol: Tst
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:10116
  label: Rattus norvegicus
description: 'Tst encodes thiosulfate sulfurtransferase/rhodanese. It catalyzes sulfur transfer to cyanide, contributes
  to sulfur/iron-sulfur metabolism, and together with MRPL18 supports mitochondrial import of cytosolic 5S rRNA.
  The review accepts sulfurtransferase, cyanide detoxification, 5S rRNA binding/import, rRNA transport, and iron-sulfur
  cluster assembly annotations, while keeping mitochondrial localization as context and marking epithelial differentiation
  as over-annotation.'
