id: P24329
gene_symbol: Tst
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:10116
  label: Rattus norvegicus
description: 'Tst encodes thiosulfate sulfurtransferase/rhodanese, a mitochondrial two-domain rhodanese-fold enzyme.
  It catalyzes sulfane-sulfur transfer from thiosulfate to cyanide (the classical cyanide-detoxification reaction)
  via an active-site cysteine persulfide intermediate, and more broadly acts as a mitochondrial sulfur-species
  processing enzyme in H2S/persulfide catabolism and iron-sulfur cluster homeostasis. By similarity it also,
  together with MRPL18, supports mitochondrial import of cytosolic 5S rRNA; this rRNA role was not corroborated
  by the falcon deep research. The review accepts the specific thiosulfate-cyanide sulfurtransferase activity,
  cyanide detoxification, 5S rRNA binding, rRNA import into mitochondrion, and iron-sulfur cluster assembly
  annotations as core, while keeping the generic GO parents (sulfurtransferase activity, rRNA transport) and
  mitochondrial localization as non-core context and marking epithelial differentiation as over-annotation.
  Falcon (Edison Scientific) deep research corroborates the sulfurtransferase chemistry, mitochondrial matrix
  localization, cyanide detoxification, and iron-sulfur cluster roles.'
