- id: file:rat/Tst/Tst-deep-research-falcon.md
  title: 'Falcon (Edison Scientific) deep research report: rat Tst (P24329), thiosulfate sulfurtransferase / rhodanese'
  findings:
  - statement: TST catalyzes the canonical rhodanese reaction transferring sulfane sulfur from thiosulfate to
      cyanide, the classical basis for its cyanide-detoxification function.
    supporting_text: |-
      In the historical and most widely cited assay reaction for TST, the enzyme catalyzes detoxification of cyanide:

      **Thiosulfate + CN− ⇄ sulfite + thiocyanate**
    reference_section_type: OTHER
  - statement: TST is a rhodanese-fold sulfurtransferase that forms an enzyme persulfide intermediate on its
      active-site cysteine to transfer sulfane sulfur to nucleophilic acceptors.
    supporting_text: |-
      Rhodanese-family sulfurtransferases operate via formation of an **enzyme persulfide intermediate** on the **active-site cysteine**, enabling transfer of “sulfane sulfur” from a donor to a nucleophilic acceptor
    reference_section_type: OTHER
  - statement: TST is a two-domain rhodanese-fold protein with a single catalytic cysteine in its C-terminal
      rhodanese domain, matching the UniProt domain architecture for P24329.
    supporting_text: |-
      TST is described as a **two-domain rhodanese-fold** protein with one catalytically active cysteine located in the C-terminal domain
    reference_section_type: OTHER
  - statement: TST localizes to the mitochondrion / mitochondrial matrix, where it participates in sulfur
      metabolism.
    supporting_text: |-
      TST is consistently described as **mitochondrial** in mammalian cells—often discussed in the context of **mitochondrial matrix sulfur metabolism**
    reference_section_type: OTHER
  - statement: Beyond cyanide detoxification, TST is a mitochondrial sulfur-species processing enzyme that
      participates in H2S catabolism (SQOR/ETHE1/TST), converting persulfide/sulfane sulfur into thiosulfate and
      limiting toxic H2S accumulation.
    supporting_text: |-
      TST is best understood not only as a cyanide detoxification enzyme but also as a **mitochondrial sulfur-species processing enzyme** central to maintaining an appropriate window of reactive sulfur species (persulfides/polysulfides) and limiting toxic H2S accumulation
    reference_section_type: OTHER
  - statement: TST contributes to iron-sulfur cluster homeostasis by interacting with Fe-S centers in
      mitochondrial redox proteins and forming enzyme persulfides from labile Fe-S sulfur.
    supporting_text: |-
      TST interacts functionally with **iron–sulfur centers** in mitochondrial redox proteins and can form enzyme persulfides by extracting labile sulfur from Fe–S centers
    reference_section_type: OTHER
