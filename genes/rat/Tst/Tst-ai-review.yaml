- term:
    id: GO:0004792
    label: thiosulfate-cyanide sulfurtransferase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  review:
    summary: Tst's rhodanese sulfur transfer, cyanide detoxification, and mitochondrial 5S rRNA import
      supports retaining thiosulfate-cyanide sulfurtransferase activity as a direct annotation (IEA,
      GO_REF:0000120).
    action: ACCEPT
    reason: thiosulfate-cyanide sulfurtransferase activity directly matches Tst's documented role in rhodanese
      sulfur transfer, cyanide detoxification, and mitochondrial 5S rRNA import support.
    supported_by:
    - reference_id: UniProtKB:P24329
      supporting_text: 'FUNCTION: Together with MRPL18, acts as a mitochondrial import factor for the cytosolic
        5S rRNA and is involved in formation of iron-sulfur complexes, cyanide detoxification, or modification of
        sulfur-containing enzymes.'
