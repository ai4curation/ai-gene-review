      that might have protective roles in water-deficient environments

suggested_questions:
- question: >-
    Does RvLEAM actually bind unfolded or aggregation-prone mitochondrial
    client proteins in vitro and in cells, and is the predicted amphipathic
    helical conformation under water-deficient conditions required for that
    activity? Direct binding has not yet been demonstrated for RvLEAM.
- question: >-
    Does RvLEAM also stabilize mitochondrial membranes during desiccation
    (e.g. preventing inner-membrane fusion or cardiolipin clustering), and
    does it act synergistically with the cytosolic and mitochondrial CAHS /
    MAHS proteins?
- question: >-
    What is the in vivo consequence of RvLEAM loss-of-function in R.
    varieornatus - specifically, does loss compromise mitochondrial
    morphology/function during anhydrobiosis, or is it buffered by the
    paralogous MAHS and other mitochondrial protectants?

suggested_experiments:
- description: >-
    Express and purify recombinant RvLEAM (and a transit-peptide-cleaved
    mature form) and test (i) anti-aggregation activity on representative
    mitochondrial matrix clients (e.g. citrate synthase, MDH) by light
    scattering during heat- and desiccation-induced aggregation; and
    (ii) protection of model mitochondrial-membrane liposomes (cardiolipin /
    PC bilayers) from drying-induced fusion. Use circular dichroism to
    confirm disorder-to-amphipathic-helix transitions under low-water
    conditions.
  hypothesis: >-
    Purified RvLEAM prevents aggregation of mitochondrial matrix clients and
    stabilizes cardiolipin-containing liposomes during desiccation, and
    these activities track its disorder-to-helix transition.
  experiment_type: in vitro biochemical and biophysical assay
- description: >-
    Generate a CRISPR knockout (or RNAi knockdown) of RvLEAM in R.
    varieornatus, alone and in combination with MAHS, and assay
    anhydrobiosis survival, mitochondrial respiration, and ultrastructure
    (EM) before / during / after desiccation-rehydration cycles.
  hypothesis: >-
    Loss of RvLEAM compromises mitochondrial integrity and reduces survival
    of desiccation in vivo, with stronger phenotypes when MAHS is also
    knocked out.
  experiment_type: in vivo loss-of-function phenotyping
- description: >-
    In human HEK293 / HEp-2 cells, target RvLEAM to the mitochondrial matrix
    using a defined mitochondrial transit peptide and quantify protection of
    mitochondrial respiration, membrane potential, and oxidative
    phosphorylation efficiency under hyperosmotic, oxidative, and
    drying-rehydration stress, including a transit-peptide-deleted (cytosolic)
    control.
  hypothesis: >-
    Mitochondrial matrix localization is required for RvLEAM's protective
    activity in human cells; mis-localized cytosolic RvLEAM provides little
    or no protection against mitochondrial dysfunction under stress.
  experiment_type: heterologous expression with subcellular targeting controls
