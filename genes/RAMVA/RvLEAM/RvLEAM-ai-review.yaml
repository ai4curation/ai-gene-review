- id: PMID:27649274
  title: >-
    Extremotolerant tardigrade genome and improved radiotolerance of human cultured
    cells by tardigrade-unique protein
  findings:
  - statement: Genome sequencing of R. varieornatus (YOKOZUNA-1 strain)
- id: file:RAMVA/RvLEAM/RvLEAM-deep-research-falcon.md
  title: Deep research synthesis on RvLEAM (A0A0E4AVP3) from R. varieornatus
  findings:
    - statement: >-
        RvLEAM shows sequence similarity to nematode LEA proteins (e-value < 1e-05)
        and matches the LEA-related PANTHER motif PTHR23241, with nine LEA-like
        11-mer motifs consistent with group 3 LEA architecture and predicted
        amphipathic helical repeats.
    - statement: >-
        RvLEAM is highly hydrophilic (GRAVY -0.94) with no transmembrane region,
        consistent with a soluble protein; combined with the N-terminal
        mitochondrial transit peptide this strongly implies mitochondrial
        matrix rather than membrane localization.
    - statement: >-
        Heterologous expression in human HEp-2 cells significantly improves
        hyperosmotic tolerance (~2x metabolic activity at 300 mM sucrose for
        48 h), supporting a transferable cell-autonomous protective function
        consistent with the LEA family molecular-shield model.

core_functions:
- description: >-
    RvLEAM is a group 3 LEA protein that acts as a molecular shield in the mitochondrial
    matrix during water-deficient conditions. Its 9 LEA 11-mer repeat motifs form
    amphipathic helices that interact with macromolecules to prevent aggregation
    and protect lipid membranes. Expression in human cells improves osmotic tolerance
    (PMID:25675104).
  molecular_function:
    id: GO:0051082
    label: unfolded protein binding
