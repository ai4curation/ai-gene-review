id: J7MAN2
gene_symbol: SAHS2
product_type: PROTEIN
status: IN_PROGRESS
taxon:
  id: NCBITaxon:947166
  label: Ramazzottius varieornatus
description: >-
  Secretory-abundant heat soluble protein 2 (SAHS2) is a tardigrade-specific secreted protein
  belonging to the SAHS family, which adopts a beta-barrel fold structurally similar to fatty
  acid-binding proteins (FABPs). SAHS proteins are abundantly expressed, heat-soluble, and are
  proposed to act as molecular shields that protect extracellular components during desiccation
  (anhydrobiosis). SAHS2 has a signal peptide (residues 1-19), three conserved SAHS domains
  (SAHS-c1, c2, c3), and an N-linked glycosylation site. The SAHS family is unique to
  tardigrades and has no homologs outside Tardigrada, except for distant structural similarity
  to metazoan FABPs. Crystal structures of the paralog SAHS1 (RvSAHS1) revealed two putative
  ligand binding sites where fatty acids can bind (PMID:28703282), establishing SAHS proteins
  as a new FABP-like family. SAHS2 is one of 13 SAHS paralogs encoded in the R. varieornatus
  genome and is constitutively and abundantly expressed (PMID:27649274).
existing_annotations:
- term:
    id: GO:0005576
    label: extracellular region
  evidence_type: IEA
  original_reference_id: GO_REF:0000044
  review:
    summary: >-
      SAHS2 is annotated to the extracellular region based on IEA mapping from UniProtKB
      subcellular location vocabulary. UniProt marks SAHS2 as "Secreted" based on similarity
      to SAHS1 (J7MFT5). The protein has a predicted signal peptide (residues 1-19) and was
      originally identified in the heat-soluble proteome of tardigrades (PMID:22937162).
      SAHS proteins are described as having a secretory localization distinct from the
      cytoplasmic CAHS family (PMID:22937162). The annotation to GO:0005576 extracellular
      region is well supported.
    action: ACCEPT
    reason: >-
      SAHS2 has a signal peptide and is described as a secretory protein. The original
      proteomics study identified SAHS proteins as having distinct subcellular localization
      from CAHS proteins, with SAHS being secretory (PMID:22937162). The name itself
      (Secretory Abundant Heat Soluble) reflects this localization. Extracellular region is
      the appropriate GO CC term for a secreted protein.
    supported_by:
      - reference_id: PMID:22937162
        supporting_text: >-
          We named them Cytoplasmic Abundant Heat Soluble (CAHS) and Secretory Abundant
          Heat Soluble (SAHS) protein families, according to their localization.
      - reference_id: PMID:28703282
        supporting_text: >-
          Secretory abundant heat-soluble (SAHS) proteins have been reported as candidates
          for anhydrobiosis-related proteins in tardigrades, which seem to protect
          extracellular components and/or secretory organelles.
- term:
    id: GO:0008289
    label: lipid binding
  evidence_type: ISS
  original_reference_id: PMID:28703282
  review:
    summary: >-
      SAHS2 is not currently annotated with lipid binding in GOA, but structural studies of
      the paralog SAHS1 (RvSAHS1) demonstrate that SAHS proteins adopt a beta-barrel fold
      homologous to fatty acid-binding proteins (FABPs) with two putative ligand binding sites
      (PMID:28703282). CDD classifies SAHS2 as containing an FABP domain (cd00742), InterPro
      assigns calycin fold (IPR012674), and SUPFAM classifies it in the Lipocalin superfamily
      (SSF50814). Crystal structure of SAHS4 showed variant binding preferences at these sites
      (PMID:29493034), suggesting functional diversification within the SAHS family.
    action: NEW
    reason: >-
      Although no direct lipid binding assay has been performed on SAHS2 specifically, the
      structural evidence from the SAHS1 crystal structure (PMID:28703282) combined with the
      FABP domain classification (CDD cd00742) and calycin/lipocalin superfamily membership
      strongly supports lipid binding as a molecular function. SAHS1 (J7MFT5) already has an
      IEA lipid binding annotation via InterPro. The same structural basis applies to SAHS2,
      which shares the conserved SAHS domains and FABP-like fold. ISS evidence from the
      paralog SAHS1 crystal structure is appropriate.
    additional_reference_ids:
      - PMID:29493034
    supported_by:
      - reference_id: PMID:28703282
        supporting_text: >-
          RvSAHS1 shows a beta-barrel structure similar to fatty acid-binding proteins
          (FABPs), in which hydrophilic residues form peculiar hydrogen bond networks...
          We identified two putative ligand-binding sites: one that superimposes on those
          of some FABPs and the other, unique to and conserved in SAHS proteins. These
          results indicate that SAHS proteins constitute a new FABP family.
      - reference_id: PMID:29493034
        supporting_text: >-
          A previous crystallographic study revealed that a SAHS protein (RvSAHS1) from one
          of the toughest tardigrades, Ramazzottius varieornatus, has a beta-barrel
          architecture similar to fatty acid binding proteins (FABPs) and two putative
          ligand binding sites (LBS1 and LBS2) where fatty acids can bind.
- term:
    id: GO:0009269
    label: response to desiccation
  evidence_type: IDA
  original_reference_id: PMID:22937162
  review:
    summary: >-
      SAHS proteins were discovered through heat-soluble proteomics specifically aimed at
      identifying desiccation tolerance factors in tardigrades (PMID:22937162). SAHS2 changes
      conformation from beta-structure to alpha-helical structure under water-deficient
      conditions, similar to LEA proteins, suggesting a direct protective role during
      desiccation. The protein is constitutively and abundantly expressed, consistent with the
      fact that R. varieornatus tolerates rapid desiccation without significant transcriptional
      regulation (PMID:27649274). UniProt annotates SAHS2 as acting as a molecular shield in
      water-deficient conditions.
    action: NEW
    reason: >-
      Response to desiccation (GO:0009269) is a core biological process for SAHS2. The
      protein was identified specifically in the context of anhydrobiosis research, changes
      conformation under desiccating conditions, and is proposed to function as a molecular
      shield protecting extracellular components during desiccation. The evidence from
      PMID:22937162 includes direct characterization of the protein behavior under
      water-deficient conditions and its abundant expression pattern consistent with a
      desiccation protection role.
    additional_reference_ids:
      - PMID:27649274
    supported_by:
      - reference_id: PMID:22937162
        supporting_text: >-
          proteins in both families changed their conformation to an alpha-helical structure
          in water-deficient conditions as LEA proteins do
      - reference_id: PMID:38796644
        supporting_text: >-
          Recombinantly expressed SAHS proteins prevent desiccated liposomes from fusion,
          and enhance desiccation tolerance of E. coli and Rhizobium tropici upon
          extracellular application
      - reference_id: PMID:27649274
        supporting_text: >-
          These abundantly expressed proteins included previously identified
          tardigrade-unique heat-soluble proteins, CAHS and SAHS, both of which maintain
          solubility even after heat treatment and are proposed to be involved in the
          protection of biomolecules during desiccation
      - reference_id: file:RAMVA/SAHS2/SAHS2-deep-research-falcon.md
        supporting_text: "secreted, heat-soluble stress protein likely functioning as an extracellular protectant during desiccation/anhydrobiosis"
references:
- id: GO_REF:0000044
  title: >-
    Gene Ontology annotation based on UniProtKB/Swiss-Prot Subcellular Location
    vocabulary mapping, accompanied by conservative changes to GO terms applied by
    UniProt
  findings:
    - statement: >-
        UniProt SUBCELLULAR LOCATION for SAHS2 (J7MAN2) records the protein as
        "Secreted" by similarity to SAHS1 (J7MFT5); SAHS2 carries a predicted
        signal peptide (residues 1-19). This mapping reference converts the
        controlled-vocabulary "Secreted" location into the GO:0005576
        (extracellular region) annotation with IEA evidence.
- id: PMID:22937162
  title: >-
    Two novel heat-soluble protein families abundantly expressed in an anhydrobiotic
    tardigrade
  findings:
    - statement: >-
        SAHS proteins were identified via heat-soluble proteomics of R. varieornatus
        as one of two novel protein families (CAHS and SAHS) abundantly expressed in
        anhydrobiotic tardigrades.
    - statement: >-
        SAHS proteins are secretory, rich in beta-structure in hydrated conditions,
        and shift to alpha-helical conformation under water-deficient conditions.
    - statement: >-
        The "molecular shield" role (via amphiphilic alpha-helical 19-mer motifs) is
        proposed in this paper specifically for CAHS proteins, not SAHS. SAHS proteins
        are shown to share the beta-to-alpha conformational change under water-deficient
        conditions as LEA proteins do, but the molecular-shield mechanism is not
        attributed to SAHS in this study.
- id: PMID:27649274
  title: >-
    Extremotolerant tardigrade genome and improved radiotolerance of human cultured
    cells by tardigrade-unique protein
  findings:
    - statement: >-
        R. varieornatus genome encodes 13 SAHS genes; SAHS family members are
        constitutively and abundantly expressed.
    - statement: >-
        SAHS proteins maintain solubility after heat treatment and are proposed to
        protect biomolecules during desiccation.
- id: PMID:28703282
  title: >-
    Structural insights into a secretory abundant heat-soluble protein from an
    anhydrobiotic tardigrade, Ramazzottius varieornatus
  findings:
    - statement: >-
        Crystal structure of RvSAHS1 reveals a beta-barrel fold similar to FABPs with
        two putative ligand binding sites, establishing SAHS as a new FABP family.
    - statement: >-
        Hydrophilic residues form peculiar hydrogen bond networks in the SAHS1 structure,
        which may provide better tolerance against dehydration.
- id: PMID:29493034
  title: >-
    Crystal structure of secretory abundant heat soluble protein 4 from one of the
    toughest water bears micro-animals Ramazzottius Varieornatus
  findings:
    - statement: >-
        SAHS4 has different amino acid residues at ligand binding sites compared to SAHS1,
        preferring uncharged molecules, suggesting functional diversification within the
        SAHS family.
- id: PMID:38796644
  title: >-
    Tardigrade secretory proteins protect biological structures from desiccation.
  findings:
    - statement: >-
        Recombinantly expressed SAHS proteins prevent desiccated liposomes from
        fusion and enhance desiccation tolerance of E. coli and Rhizobium tropici
        upon extracellular application, while not protecting soluble enzymes -
        implicating membrane/bilayer protection as the central SAHS-family role.
    - statement: >-
        Molecular dynamics and comparative structural analysis suggest SAHS
        proteins undergo a structural transition upon desiccation in which
        removal of water and solutes from the large internal cavity destabilizes
        the beta-sheet structure.
- id: PMID:36693101
  title: >-
    In vivo expression vector derived from anhydrobiotic tardigrade genome
    enables live imaging in Eutardigrada.
  findings:
    - statement: >-
        Using the TardiVec in vivo expression system, SAHS proteins were shown
        to be expressed exclusively in storage cells - tardigrade-specific
        free-floating cells in the body cavity - whereas CAHS genes are mainly
        expressed in epidermal cells with cytosolic localization, refuting the
        prior single-cell hypothesis and supporting an extracellular,
        storage-cell origin for SAHS proteins.
- id: file:RAMVA/SAHS2/SAHS2-deep-research-falcon.md
  title: Deep research synthesis on SAHS2 (J7MAN2) from R. varieornatus
  findings:
    - statement: >-
        SAHS proteins prevent desiccation-induced membrane / liposome fusion
        in vitro (POPC liposomes retain ~60-100 nm size after drying with SAHS,
        whereas drying without SAHS gives ~360 and ~4000 nm aggregates) and
        provide >10-fold survival improvement to dried E. coli, supporting an
        extracellular membrane-stabilization role for the SAHS family that
        likely extends to SAHS2; SAHS does not strongly protect soluble enzymes
        such as LDH.
    - statement: >-
        SAHS-family promoter activity (pRvSAHS1) is highly enriched in tardigrade
        storage cells, with SAHS transcripts ~5-20x enriched in storage cells
        vs whole body; SAHS1-mEGFP localizes to vesicle-like structures and
        can be detected in the body cavity, suggesting SAHS proteins originate
        in storage cells and are secreted into the extracellular space.
    - statement: >-
        SAHS proteins are beta-structure-rich in hydrated conditions and shift
        toward alpha-helix under water-deficient/desolvating conditions (CD
        minimum at 215 nm; alpha-helical conversion above >50% TFE), consistent
        with a stress-induced conformational change that may underlie
        protective activity.

core_functions:
- description: >-
    SAHS2 is a tardigrade-specific, secreted heat-soluble protein whose family
    adopts an FABP-like beta-barrel (calycin / lipocalin) fold with two
    putative ligand-binding sites and is proposed to function as an
    extracellular molecular shield protecting membranes and extracellular
    components during anhydrobiosis. In hydrated conditions SAHS proteins are
    beta-rich, and they shift to alpha-helical conformation under water-
    deficient conditions, analogous to LEA proteins. Family-level functional
    assays show SAHS proteins stabilize liposomes against drying-induced
    fusion and dramatically improve microbial survival after desiccation,
    while showing little protection of soluble enzymes - implicating membrane
    and bilayer-structure protection rather than enzyme chaperoning as the
    central role.
  directly_involved_in:
  - id: GO:0009269
    label: response to desiccation
  locations:
  - id: GO:0005576
    label: extracellular region
  supported_by:
  - reference_id: PMID:22937162
    supporting_text: "proteins in both families changed their conformation to an alpha-helical structure in water-deficient conditions as LEA proteins do"
  - reference_id: PMID:28703282
    supporting_text: "Secretory abundant heat-soluble (SAHS) proteins have been reported as candidates for anhydrobiosis-related proteins in tardigrades, which seem to protect extracellular components and/or secretory organelles."
  - reference_id: PMID:38796644
    supporting_text: "Recombinantly expressed SAHS proteins prevent desiccated liposomes from fusion, and enhance desiccation tolerance of E. coli and Rhizobium tropici upon extracellular application"
  - reference_id: PMID:36693101
    supporting_text: "SAHS proteins are expressed exclusively in storage cells, which are tardigrade-specific free-floating cells in the body cavity"
  - reference_id: file:RAMVA/SAHS2/SAHS2-deep-research-falcon.md
    supporting_text: "secreted, heat-soluble stress protein likely functioning as an extracellular protectant during desiccation/anhydrobiosis"

suggested_questions:
- question: >-
    Does SAHS2, like other SAHS paralogs, bind fatty acids or other lipid
    ligands at LBS1/LBS2, and is ligand binding required for its
    membrane-protective activity during desiccation?
- question: >-
    Is SAHS2 primarily released into the body cavity / extracellular space
    from storage cells in vivo, and does its activity depend on this
    extracellular localization?
- question: >-
    Among the 13 R. varieornatus SAHS paralogs, what is the functional
    specialization of SAHS2 (e.g. in tissue distribution, ligand preference,
    or membrane-protection efficacy), and how redundant is its function with
    SAHS1, SAHS3 and other family members?

suggested_experiments:
- description: >-
    Express and purify recombinant SAHS2 with a cleavable signal peptide,
    confirm secretion in a heterologous system, and test its activity in
    liposome (POPC) drying-rehydration DLS assays and in microbial desiccation
    survival assays, benchmarking against SAHS1/4/6, BSA and trehalose.
  hypothesis: >-
    Purified SAHS2 prevents desiccation-induced liposome fusion and improves
    survival of dried bacteria at concentrations comparable to other tested
    SAHS paralogs, confirming its membrane-protective function.
  experiment_type: in vitro biophysical and microbial protection assays
- description: >-
    Solve the crystal or cryo-EM structure of SAHS2 in apo and ligand-bound
    states, and test fatty acid / hydrophobic ligand binding by ITC,
    fluorescence and competition assays. Compare LBS1/LBS2 residue identities
    with SAHS1 and SAHS4 to predict and test ligand preferences.
  hypothesis: >-
    SAHS2 retains a calycin/FABP-like beta-barrel fold with two ligand binding
    sites whose residue substitutions (relative to SAHS1) determine a
    distinct hydrophobic ligand preference.
  experiment_type: structural biology / binding biochemistry
- description: >-
    Use TardiVec-style in vivo reporters (pRvSAHS2-mEGFP) and CRISPR knock-in
    of an epitope tag to determine the native tissue distribution and
    subcellular fate of SAHS2 in R. varieornatus (storage cells, vesicles,
    body cavity), with secretion confirmed by immunoblot of body cavity
    fluid.
  hypothesis: >-
    Endogenous SAHS2 is expressed predominantly in storage cells and is
    secreted into the body cavity where it accumulates and acts during
    anhydrobiosis.
  experiment_type: in vivo expression and secretion mapping
