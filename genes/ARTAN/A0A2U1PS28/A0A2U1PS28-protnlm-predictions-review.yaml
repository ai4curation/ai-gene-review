id: A0A2U1PS28
gene_symbol: A0A2U1PS28
taxon:
  id: NCBITaxon:35608
  label: Artemisia annua
status: COMPLETE
description: >-
  ProtNLM2 predicted chloroplast localization (GO:0009507) for this Artemisia annua
  Translation factor GUF1 homolog. This prediction conflicts with the HAMAP-derived
  mitochondrial localization annotations (GO:0005743, GO:0005759) in GOA, but is
  partially supported by the PANTHER subfamily classification PTHR43512:SF4
  ("TRANSLATION FACTOR GUF1 HOMOLOG, CHLOROPLASTIC"). In plants, LepA/GUF1 family
  members can be targeted to either mitochondria or chloroplasts, and dual targeting
  is possible. Without experimental subcellular localization data for this specific
  protein, the chloroplast prediction cannot be confirmed or refuted. Assessed as
  UNC (uncertain).
source_documents:
  - genes/ARTAN/A0A2U1PS28/A0A2U1PS28-uniprot.txt
  - genes/ARTAN/A0A2U1PS28/A0A2U1PS28-goa.tsv
predictions:
  - source_method: ProtNLM2
    source_version: UniProt 2024_06 pilot
    predicted_term:
      id: GO:0009507
      label: chloroplast
    predicted_term_type: GO_CC
    review:
      assessment: COR
      confidence_score: 2
      summary: >-
        Upgraded from UNC to COR. An independent OpenScientist investigation (see file
        reference) supports the ProtNLM2 chloroplast prediction and identifies the existing
        GOA/HAMAP mitochondrial annotation (GO:0005743, GO:0005759 via HAMAP-Rule MF_03137)
        as an automated misapplication. Two convergent lines of evidence: (1) orthology --
        A0A2U1PS28 is ~78% identical to the Arabidopsis chloroplastic paralog Q9FNM5
        (cpLEPA/EF4, experimentally plastid-localized) but only ~47% to the mitochondrial
        paralog Q9FLE4, placing it in the chloroplast cpLEPA clade rather than the
        mitochondrial GUF1 clade; (2) its N-terminal region has the Ser/Thr-rich,
        acidic-residue-devoid chloroplast transit-peptide signature rather than an
        amphipathic Arg-rich mitochondrial presequence. COR because chloroplast localization
        is correct and novel relative to GOA. The existing mitochondrial CC annotations are a
        curation lead for correction. Caveat: dedicated targeting predictors (TargetP-2.0 /
        DeepLoc) were unavailable in the run environment, so the conclusion rests on orthology
        plus composition -- both strong and mutually consistent -- rather than experimental
        localization of the Artemisia protein.
      supported_by:
        - reference_id: file:ARTAN/A0A2U1PS28/A0A2U1PS28-hypotheses/prediction-organellar-localization/openscientist.md
          supporting_text: >-
            77.8% identical (80.6% over min length) to the Arabidopsis chloroplastic paralog
            Q9FNM5
        - reference_id: file:ARTAN/A0A2U1PS28/A0A2U1PS28-hypotheses/prediction-organellar-localization/openscientist.md
          supporting_text: the existing UniProt mitochondrial annotation is an automated misapplication
