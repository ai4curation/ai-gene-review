description: >-
  ProtNLM2 predicted chloroplast localization (GO:0009507) for this Artemisia annua
  Translation factor GUF1 homolog. This prediction conflicts with the HAMAP-derived
  mitochondrial localization annotations (GO:0005743, GO:0005759) in GOA, but is
  partially supported by the PANTHER subfamily classification PTHR43512:SF4
  ("TRANSLATION FACTOR GUF1 HOMOLOG, CHLOROPLASTIC"). In plants, LepA/GUF1 family
  members can be targeted to either mitochondria or chloroplasts, and dual targeting
  is possible. Without experimental subcellular localization data for this specific
  protein, the chloroplast prediction cannot be confirmed or refuted. Assessed as
  UNC (uncertain).
