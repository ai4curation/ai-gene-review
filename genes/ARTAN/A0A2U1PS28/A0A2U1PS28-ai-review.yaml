core_functions:
- description: >-
    GUF1/EF-4 is a ribosome-dependent GTPase that hydrolyzes GTP upon interaction with
    mitochondrial ribosomes. GTP hydrolysis is coupled to conformational changes that
    catalyze back-translocation of tRNAs on improperly translocated ribosomes or stabilize
    specific ribosome conformations to enhance translation fidelity. The GTPase activity is
    triggered by interaction with the ribosomal sarcin-ricin loop.
