id: A0A2U1PS28
gene_symbol: A0A2U1PS28
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:35608
  label: Artemisia annua
description: >-
  Translation factor GUF1 homolog (also known as elongation factor 4, EF-4, or ribosomal
  back-translocase) is a chloroplastic ribosome-dependent GTPase in Artemisia annua. It belongs
  to the LepA subfamily of the TRAFAC class translation factor GTPase superfamily and is
  classified by PANTHER as subfamily PTHR43512:SF4 (CHLOROPLASTIC). Phylogenetic analysis
  across multiple plant species, k-mer similarity (>95% identity with chloroplastic isoform
  A0A2U1PRZ2; 9.6x more similar to Arabidopsis chloroplastic Q9FNM5 than mitochondrial
  Q9FLE4), and PANTHER classification all confirm this is the chloroplastic GUF1 paralog.
  The true mitochondrial GUF1 paralog in A. annua is A0A2U1PCN3 (gene CTI12_AA167920).
  A. annua encodes five EF-4 family members with separate chloroplastic and mitochondrial
  paralogs. The protein catalyzes GTP hydrolysis upon interaction with chloroplast ribosomes,
  particularly at the conserved sarcin-ricin loop. GUF1/EF-4 functions as a translation
  quality control factor that can catalyze reverse (back-)translocation of tRNAs on improperly
  translocated ribosomes, stabilize specific ribosome conformations, and enhance translation
  fidelity. It binds to ribosomes in a GTP-dependent manner. The protein contains a
  five-domain architecture shared with EF-G (domains I, II, III, V) plus a unique C-terminal
  domain (LepA_C) that makes extensive contacts with ribosome-bound tRNAs. GUF1/EF-4 family
  members are generally dispensable under optimal growth conditions but become important under
  stress, promoting faithful protein synthesis under challenging conditions.
existing_annotations:
- term:
    id: GO:0003924
    label: GTPase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: >-
      GTPase activity is the core enzymatic function of GUF1/EF-4 family members.
      The protein hydrolyzes GTP in a ribosome-dependent manner, and the conserved
      GKS motif in the G-domain nucleotide-binding site is essential for in vivo
      function. This annotation is well-supported by the domain architecture
      (IPR000795) and extensive characterization of orthologous proteins.
    action: ACCEPT
    reason: >-
      GTPase activity is the defining molecular function of the GUF1/EF-4 translation
      factor family. The protein contains the canonical G-domain with P-loop, switch I,
      and switch II regions. Direct kinetic measurements in E. coli LepA (PMID:25712150)
      demonstrate ribosome-dependent multiple turnover GTPase activity, and the conserved
      catalytic His (His164 in A0A2U1PS28) is essential for this activity.
- term:
    id: GO:0005525
    label: GTP binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: >-
      GTP binding is intrinsic to the GTPase catalytic cycle of GUF1/EF-4. The protein
      binds ribosomes in a GTP-dependent manner, and the G-domain contains conserved
      nucleotide-binding elements including the P-loop and switch regions. This is a
      well-established property of all GUF1/EF-4 family members.
    action: ACCEPT
    reason: >-
      GTP binding is a prerequisite for the ribosome-dependent GTPase activity of GUF1.
      Multiple conserved GTP-binding motifs are present in the G-domain, and GTP-dependent
      ribosome association has been demonstrated for orthologous EF-4 proteins. Crystal
      structure at 2.6 A resolution (PMID:27092003) directly visualizes EF-4 bound to a
      nonhydrolyzable GTP analog on the ribosome.
- term:
    id: GO:0005743
    label: mitochondrial inner membrane
  evidence_type: IEA
  original_reference_id: GO_REF:0000044
  qualifier: located_in
  review:
    summary: >-
      Mitochondrial inner membrane localization is INCORRECT for this protein.
      Phylogenetic analysis across 8 plant species, PANTHER subfamily classification
      (PTHR43512:SF4, CHLOROPLASTIC), and >95% k-mer identity with chloroplastic
      isoform A0A2U1PRZ2 demonstrate that A0A2U1PS28 is the chloroplastic GUF1
      paralog. The true mitochondrial paralog in A. annua is A0A2U1PCN3.
      This annotation should be replaced with GO:0009507 (chloroplast).
    action: MODIFY
    reason: >-
      OpenScientist deep research revealed a critical organelle mis-assignment.
      A0A2U1PS28 is classified by PANTHER as PTHR43512:SF4 (CHLOROPLASTIC) and
      clusters with chloroplastic orthologs across 8 plant species in phylogenetic
      analysis (distance 0.05 to nearest chloroplastic member vs >0.97 to all
      mitochondrial members). The Arabidopsis ortholog Q9FNM5 was detected in
      purified chloroplast preparations by proteomics (PMID:18431481). The
      mitochondrial annotation was propagated from yeast Guf1 via HAMAP but
      applies to the wrong paralog.
    supported_by:
    - reference_id: file:ARTAN/A0A2U1PS28/A0A2U1PS28-deep-research-falcon.md
      supporting_text: >-
        Mitochondrial and chloroplast forms in various plant species
    - reference_id: file:ARTAN/A0A2U1PS28/A0A2U1PS28-hypotheses/core-function-3-go-0043022/openscientist.md
      supporting_text: >-
        PANTHER classifies A0A2U1PS28 as subfamily PTHR43512:SF4 (CHLOROPLASTIC). K-mer
        analysis shows 9.6x higher similarity to Arabidopsis chloroplastic Q9FNM5 than
        mitochondrial Q9FLE4.
    proposed_replacement_terms:
    - id: GO:0009507
      label: chloroplast
- term:
    id: GO:0005759
    label: mitochondrial matrix
  evidence_type: IEA
  original_reference_id: GO_REF:0000104
  qualifier: located_in
  review:
    summary: >-
      Mitochondrial matrix localization is INCORRECT for this protein. This is the
      chloroplastic GUF1 paralog, not the mitochondrial one. Phylogenetic analysis,
      PANTHER classification (PTHR43512:SF4, CHLOROPLASTIC), and k-mer similarity
      all place A0A2U1PS28 in the chloroplastic clade. The correct localization
      term is GO:0009570 (chloroplast stroma), by analogy with mitochondrial matrix
      localization of the yeast mitochondrial GUF1.
    action: MODIFY
    reason: >-
      The mitochondrial matrix annotation was propagated via HAMAP from yeast Guf1,
      but A0A2U1PS28 is the chloroplastic paralog. K-mer analysis shows 9.6x higher
      similarity to Arabidopsis chloroplastic Q9FNM5 than mitochondrial Q9FLE4.
      The chloroplast stroma is the functional equivalent of the mitochondrial matrix
      for organellar translation.
    proposed_replacement_terms:
    - id: GO:0009570
      label: chloroplast stroma
- term:
    id: GO:0043022
    label: ribosome binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: >-
      Ribosome binding is a core property of GUF1/EF-4 and essential for its function.
      The protein binds to ribosomes in a GTP-dependent manner, with extensive contacts
      mediated by its five-domain architecture including the unique C-terminal domain that
      interacts with ribosome-bound tRNAs. Structural studies show that EF4 interacts with
      both PRE-state and POST-state ribosome complexes. Crystal structure at 2.6 A
      (PMID:27092003) and cryo-EM at 3.8 A (PMID:27137929) directly visualize the
      ribosome-EF4 complex.
    action: ACCEPT
    reason: >-
      GUF1/EF-4 is a ribosome-dependent GTPase whose functional substrate is the ribosome
      itself. Cryo-EM studies reveal extensive contacts between EF-4 domains and ribosomal
      RNA/tRNAs, and the unique C-terminal domain makes contacts with acceptor stems of
      A-site and P-site tRNAs. This is a well-characterized property of the entire family.
      For A0A2U1PS28 (the chloroplastic paralog), this means binding to chloroplast 70S-type
      ribosomes. No chloroplast-specific ribosome binding GO term currently exists, so
      GO:0043022 is the most specific available term.
- term:
    id: GO:0045727
    label: positive regulation of translation
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: involved_in
  review:
    summary: >-
      GUF1/EF-4 promotes organellar protein synthesis, particularly under stress conditions.
      However, GO:0045727 (positive regulation of translation) is overly broad. Since this
      protein is the chloroplastic paralog (not mitochondrial), a term like positive regulation
      of plastid translation would be appropriate, but no such specific term currently exists
      in GO. Retaining GO:0045727 as a general annotation is acceptable but imprecise.
    action: KEEP_AS_NON_CORE
    reason: >-
      The generic positive regulation of translation does not capture the organellar context.
      GO:0070131 (positive regulation of mitochondrial translation) is incorrect because
      A0A2U1PS28 is the chloroplastic paralog. No plastid-specific translation regulation
      term currently exists in GO. Retained as non-core pending availability of a more
      specific term.
- term:
    id: GO:0006412
    label: translation
  evidence_type: ISS
  original_reference_id: PMID:18442968
  qualifier: involved_in
  review:
    summary: >-
      Translation (GO:0006412) is proposed as a new annotation to replace the incorrect
      GO:0070125 (mitochondrial translational elongation) that was removed. A0A2U1PS28
      is the chloroplastic GUF1 paralog and participates in chloroplast/plastid
      translation, not mitochondrial translation. GO:0006412 is the appropriate general
      term since GO:0032544 (plastid translation) may not be available in all GO caches.
      EF-4/GUF1 family proteins are well-characterized translation factors that function
      in organellar protein synthesis.
    action: NEW
    reason: >-
      The previously proposed GO:0070125 (mitochondrial translational elongation) was
      incorrect because A0A2U1PS28 is the chloroplastic paralog, not the mitochondrial
      one. GO:0006412 (translation) captures the core biological process of this protein
      without specifying the wrong organellar context. The yeast ortholog Guf1 promotes
      mitochondrial protein synthesis (PMID:18442968), and by analogy the chloroplastic
      paralog participates in plastid translation.
    supported_by:
    - reference_id: PMID:18442968
      supporting_text: >-
        It binds to mitochondrial ribosomes in a GTP-dependent manner
    - reference_id: file:ARTAN/A0A2U1PS28/A0A2U1PS28-hypotheses/core-function-3-go-0043022/openscientist.md
      supporting_text: >-
        A0A2U1PS28 is the chloroplastic paralog (PANTHER PTHR43512:SF4, CHLOROPLASTIC).
        The true mitochondrial paralog in A. annua is A0A2U1PCN3 (gene CTI12_AA167920),
        which shares only ~5% k-mer Jaccard similarity with A0A2U1PS28.
