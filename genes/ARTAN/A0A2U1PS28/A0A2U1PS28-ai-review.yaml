product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:35608
  label: Artemisia annua
description: >-
  Translation factor GUF1 homolog (also known as elongation factor 4, EF-4, or ribosomal
  back-translocase) is a mitochondrial ribosome-dependent GTPase in Artemisia annua. It belongs
  to the LepA subfamily of the TRAFAC class translation factor GTPase superfamily. The protein
  catalyzes GTP hydrolysis upon interaction with mitochondrial ribosomes, particularly at the
  conserved sarcin-ricin loop. GUF1/EF-4 functions as a translation quality control factor that
  can catalyze reverse (back-)translocation of tRNAs on improperly translocated ribosomes,
  stabilize specific ribosome conformations, and enhance translation fidelity. It binds to
  mitoribosomes in a GTP-dependent manner and is peripherally associated with the mitochondrial
  inner membrane on the matrix side. The protein contains a five-domain architecture shared with
  EF-G (domains I, II, III, V) plus a unique C-terminal domain that makes extensive contacts
  with ribosome-bound tRNAs. GUF1/EF-4 family members are generally dispensable under optimal
  growth conditions but become important under stress, promoting faithful synthesis of
  mitochondrially encoded OXPHOS subunits under challenging conditions.
existing_annotations:
- term:
    id: GO:0003924
    label: GTPase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: >-
      GTPase activity is the core enzymatic function of GUF1/EF-4 family members.
      The protein hydrolyzes GTP in a ribosome-dependent manner, and the conserved
      GKS motif in the G-domain nucleotide-binding site is essential for in vivo
      function. This annotation is well-supported by the domain architecture
      (IPR000795) and extensive characterization of orthologous proteins.
    action: ACCEPT
    reason: >-
      GTPase activity is the defining molecular function of the GUF1/EF-4 translation
      factor family. The protein contains the canonical G-domain with P-loop, switch I,
      and switch II regions. Studies on related mitochondrial GTPases confirm that
      mutation of the conserved GKS motif abolishes function in vivo.
- term:
    id: GO:0005525
    label: GTP binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: >-
      GTP binding is intrinsic to the GTPase catalytic cycle of GUF1/EF-4. The protein
      binds ribosomes in a GTP-dependent manner, and the G-domain contains conserved
      nucleotide-binding elements including the P-loop and switch regions. This is a
      well-established property of all GUF1/EF-4 family members.
    action: ACCEPT
    reason: >-
      GTP binding is a prerequisite for the ribosome-dependent GTPase activity of GUF1.
      Multiple conserved GTP-binding motifs are present in the G-domain, and GTP-dependent
      ribosome association has been demonstrated for orthologous EF-4 proteins.
- term:
    id: GO:0005743
    label: mitochondrial inner membrane
  evidence_type: IEA
  original_reference_id: GO_REF:0000044
  qualifier: located_in
  review:
    summary: >-
      Mitochondrial inner membrane localization is consistent with the known subcellular
      distribution of eukaryotic GUF1 homologs. The UniProt annotation specifies that the
      protein is a peripheral membrane protein on the matrix side of the inner membrane,
      consistent with its function in translating mitochondrially encoded OXPHOS subunits
      at the inner membrane.
    action: ACCEPT
    reason: >-
      Biochemical fractionation in yeast demonstrates that related mitochondrial translation
      GTPases localize to the mitochondrial inner membrane facing the matrix side. This is
      consistent with the HAMAP-Rule MF_03137 prediction and the role of GUF1 in synthesizing
      hydrophobic inner-membrane OXPHOS subunits on membrane-associated mitoribosomes.
- term:
    id: GO:0005759
    label: mitochondrial matrix
  evidence_type: IEA
  original_reference_id: GO_REF:0000104
  qualifier: located_in
  review:
    summary: >-
      Mitochondrial matrix localization is consistent with GUF1 functioning in the matrix
      compartment where mitochondrial translation occurs. The protein associates with
      mitoribosomes and is peripherally attached to the inner membrane from the matrix side.
    action: ACCEPT
    reason: >-
      Mitochondrial translation occurs in the matrix, and GUF1 functions as part of the
      mitochondrial translation elongation machinery alongside mtEF-Tu, mtEF-Ts, and mtEF-G1.
      The matrix localization is complementary to the inner membrane association and reflects
      the protein's soluble/peripheral membrane nature.
- term:
    id: GO:0043022
    label: ribosome binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: >-
      Ribosome binding is a core property of GUF1/EF-4 and essential for its function.
      The protein binds to ribosomes in a GTP-dependent manner, with extensive contacts
      mediated by its five-domain architecture including the unique C-terminal domain that
      interacts with ribosome-bound tRNAs. Structural studies show that EF4 interacts with
      both PRE-state and POST-state ribosome complexes.
    action: ACCEPT
    reason: >-
      GUF1/EF-4 is a ribosome-dependent GTPase whose functional substrate is the ribosome
      itself. Cryo-EM studies reveal extensive contacts between EF-4 domains and ribosomal
      RNA/tRNAs, and the unique C-terminal domain makes contacts with acceptor stems of
      A-site and P-site tRNAs. This is a well-characterized property of the entire family.
- term:
    id: GO:0045727
    label: positive regulation of translation
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: involved_in
  review:
    summary: >-
      GUF1/EF-4 promotes mitochondrial protein synthesis, particularly under stress conditions.
      However, GO:0045727 (positive regulation of translation) is overly broad, as it does not
      specify mitochondrial translation. A more precise term would be GO:0070131 (positive
      regulation of mitochondrial translation), which accurately captures the organelle-specific
      context of GUF1's translational role.
    action: MODIFY
    reason: >-
      GUF1 is specifically a mitochondrial translation factor, not a cytoplasmic translation
      regulator. The generic "positive regulation of translation" term does not distinguish
      mitochondrial from cytoplasmic translation. GO:0070131 (positive regulation of
      mitochondrial translation) more precisely captures the biological process.
    proposed_replacement_terms:
    - id: GO:0070131
      label: positive regulation of mitochondrial translation
- term:
    id: GO:0070125
    label: mitochondrial translational elongation
  evidence_type: NAS
  original_reference_id: GO_REF:0000120
  qualifier: involved_in
  review:
    summary: >-
      GUF1/EF-4 functions as a fourth elongation factor in mitochondrial translation,
      operating alongside mtEF-Tu, mtEF-Ts, and mtEF-G1 during the elongation cycle.
      It catalyzes back-translocation of tRNAs on improperly translocated ribosomes,
      directly participating in the elongation process. This term is proposed as a new
      annotation based on the well-characterized role of GUF1/EF-4 orthologs.
    action: NEW
    reason: >-
      Mitochondrial translational elongation (GO:0070125) more precisely captures the
      core biological process that GUF1/EF-4 participates in than the existing generic
      positive regulation of translation annotation. The protein directly participates
      in elongation by catalyzing back-translocation and quality control during the
      elongation cycle.
