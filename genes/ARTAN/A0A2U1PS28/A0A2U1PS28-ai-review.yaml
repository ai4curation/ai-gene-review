proposed_new_terms: []
suggested_questions:
- question: >-
    OpenScientist analysis strongly indicates A0A2U1PS28 is the chloroplastic GUF1 paralog
    based on PANTHER classification, phylogenetic analysis, and k-mer similarity. Can this
    be confirmed with experimental localization data, e.g. GFP-fusion with chloroplast and
    mitochondrial markers in plant cells?
  experts: []
- question: >-
    Is there a more specific GO molecular function term for translational back-translocase
    activity that would better capture the unique catalytic mechanism of GUF1/EF-4 compared
    to other translation-associated GTPases?
  experts: []
- question: >-
    Should a GO term for plastid translational elongation be proposed, analogous to
    GO:0070125 (mitochondrial translational elongation)? Currently GO:0032544 (plastid
    translation) is the most specific available BP term for chloroplast translation.
  experts: []
suggested_experiments:
- description: >-
    Express A0A2U1PS28-GFP in A. annua protoplasts or Nicotiana benthamiana leaves and
    perform confocal microscopy co-stained with MitoTracker and chloroplast autofluorescence
    to confirm chloroplast targeting and definitively rule out mitochondrial localization.
  hypothesis: >-
    Based on PANTHER classification (PTHR43512:SF4, CHLOROPLASTIC), phylogenetic clustering,
    and >95% k-mer identity with chloroplastic isoform A0A2U1PRZ2, A0A2U1PS28 is predicted
    to localize to chloroplasts rather than mitochondria.
- description: >-
    Complement a yeast guf1-delta mutant with A0A2U1PS28 (chloroplastic paralog) vs
    A0A2U1PCN3 (mitochondrial paralog) and assess mitochondrial translation at optimal and
    suboptimal temperatures. Compare complementation efficiency to test organelle specificity.
  hypothesis: >-
    The mitochondrial paralog A0A2U1PCN3 should rescue yeast guf1 defects more efficiently
    than the chloroplastic paralog A0A2U1PS28, reflecting organelle-specific adaptation.
- description: >-
    Characterize the Arabidopsis ortholog At5g08650 (Q9FNM5) T-DNA knockout/knockdown lines
    for chloroplast translation defects using ribosome profiling of chloroplast mRNAs,
    especially under cold stress where EF-4 function is most critical.
  hypothesis: >-
    Loss of the chloroplastic EF-4 paralog will impair chloroplast translation efficiency,
    particularly under stress conditions, analogous to the stress-dependent phenotype of
    yeast guf1-delta for mitochondrial translation.
