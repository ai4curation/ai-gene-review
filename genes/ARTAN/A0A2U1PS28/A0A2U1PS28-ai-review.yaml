proposed_new_terms: []
suggested_questions:
- question: >-
    Does the Artemisia annua GUF1 homolog localize to mitochondria, chloroplasts, or both?
    The PANTHER classification suggests chloroplastic targeting, while HAMAP predicts
    mitochondrial localization. Plants can have separate organellar EF-4 paralogs.
  experts: []
- question: >-
    Is there a more specific GO molecular function term for translational back-translocase
    activity that would better capture the unique catalytic mechanism of GUF1/EF-4 compared
    to other translation-associated GTPases?
  experts: []
suggested_experiments:
- description: >-
    Express the A. annua GUF1 homolog with a fluorescent tag in plant cells and perform
    confocal microscopy with mitochondrial and chloroplast markers to determine whether
    it localizes to mitochondria, chloroplasts, or both organelles.
  hypothesis: >-
    The A. annua GUF1 homolog localizes specifically to mitochondria based on its HAMAP
    annotation, but dual-targeting to chloroplasts should be evaluated given the PANTHER
    chloroplastic classification.
- description: >-
    Complement a yeast guf1-delta mutant with the A. annua GUF1 homolog and assess
    mitochondrial translation at optimal and suboptimal temperatures using in organello
    translation assays.
  hypothesis: >-
    The A. annua GUF1 homolog can rescue defective mitochondrial protein synthesis in
    yeast guf1 mutants, particularly under stress conditions such as low temperature.
