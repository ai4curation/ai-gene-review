core_functions:
- description: >-
    GUF1/EF-4 is a ribosome-dependent GTPase that hydrolyzes GTP upon interaction with
    chloroplast ribosomes. GTP hydrolysis is coupled to conformational changes that
    catalyze back-translocation of tRNAs on improperly translocated ribosomes or stabilize
    specific ribosome conformations to enhance translation fidelity. The GTPase activity is
    triggered by interaction with the ribosomal sarcin-ricin loop. A. annua encodes five
    EF-4 family members; A0A2U1PS28 is the chloroplastic paralog (PANTHER PTHR43512:SF4,
    CHLOROPLASTIC), while the mitochondrial paralog is A0A2U1PCN3 (gene CTI12_AA167920).
