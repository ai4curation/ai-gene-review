    supporting_text: >-
      Promotes mitochondrial protein synthesis. May act as a fidelity factor of the
      translation reaction, by catalyzing a one-codon backward translocation of tRNAs on
      improperly translocated ribosomes. Binds to mitochondrial ribosomes in a GTP-dependent
      manner.
- description: >-
    GUF1/EF-4 binds GTP as a prerequisite for its ribosome-dependent function. The G-domain
    contains conserved nucleotide-binding elements (P-loop, switch I, switch II) and the GTP-bound
    form is required for association with translating mitoribosomes.
