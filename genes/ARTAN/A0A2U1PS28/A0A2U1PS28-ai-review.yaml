- id: PMID:18442968
  title: >-
    The membrane-bound GTPase Guf1 promotes mitochondrial protein synthesis under
    suboptimal conditions.
  findings:
  - statement: >-
      Yeast Guf1 binds to mitochondrial ribosomes in a GTP-dependent manner and
      promotes mitochondrial protein synthesis. This study characterizes the yeast
      mitochondrial ortholog, not the chloroplastic paralog represented by A0A2U1PS28.
    supporting_text: >-
      It binds to mitochondrial ribosomes in a GTP-dependent manner
- id: PMID:27092003
  title: >-
    Elongation factor 4 remodels the A-site tRNA on the ribosome.
  findings:
  - statement: >-
      Crystal structure at 2.6 A shows EF-4 bound to the ribosome with tRNAs,
      revealing the C-terminal domain contacts with the A-site tRNA acceptor stem.
    supporting_text: >-
      we present the crystal structure at 2.6-Å resolution of the Thermus thermophilus
      70S ribosome bound to EF-4 with a nonhydrolyzable GTP analog and A-, P-, and
