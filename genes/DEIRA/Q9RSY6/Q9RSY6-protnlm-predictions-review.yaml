id: Q9RSY6
gene_symbol: Q9RSY6
taxon:
  id: NCBITaxon:243230
  label: Deinococcus radiodurans
status: COMPLETE
description: >-
  ProtNLM2 predicted 2 GO terms for D. radiodurans 30S ribosomal protein bS1 (Q9RSY6),
  both of which are correct but less precise than existing curated annotations. GO:0003676
  (nucleic acid binding) is a shallow ancestor of the established mRNA binding activity
  (GO:0003729) that S1 performs via its five S1/OB-fold domains during translation initiation.
  GO:0005840 (ribosome) is a parent of the curated localization to the cytosolic small
  ribosomal subunit (GO:0022627). Both predictions demonstrate that ProtNLM2 captures the
  broad functional category (RNA-binding ribosomal protein) but lacks the resolution to
  distinguish the specific molecular function and sub-ribosomal compartment already established
  by phylogenetic inference from experimentally characterized orthologs. Assessment: 2 LSP
  (less precise), 0 novel, 0 incorrect.
source_documents:
  - genes/DEIRA/Q9RSY6/Q9RSY6-uniprot.txt
  - genes/DEIRA/Q9RSY6/Q9RSY6-goa.tsv
predictions:
  - source_method: ProtNLM2
    source_version: UniProt 2024_06 pilot
    predicted_term:
      id: GO:0003676
      label: nucleic acid binding
    predicted_term_type: GO_MF
    review:
      assessment: LSP
      confidence_score: 2
      summary: >-
        Less precise than the existing curated annotation. ProtNLM2 predicted GO:0003676
        (nucleic acid binding), which is a high-level ancestor of GO:0003729 (mRNA binding)
        already present in GOA via both IBA (GO_REF:0000033, inferred from E. coli RpsA
        P0AG67) and IEA (GO_REF:0000117, ARBA). Ribosomal protein bS1 specifically binds
        mRNA 5-prime UTRs through its five tandem S1/OB-fold domains (residues 122-539) to
        recruit messages to the 30S subunit for translation initiation -- this is a defined
        and well-characterized molecular activity, not generic nucleic acid binding. The
        ai-review itself marked the existing GO:0003676 IEA annotation (from InterPro2GO
        mapping of the S1 domain IPR003029) as MARK_AS_OVER_ANNOTATED because GO:0003729
        already captures the function at higher specificity. The ProtNLM2 prediction thus
        recapitulates an annotation already flagged as uninformatively broad, adding no
        biological insight beyond what the curated mRNA binding annotation provides.
      supported_by:
        - reference_id: file:DEIRA/Q9RSY6/Q9RSY6-uniprot.txt
          supporting_text: "RNA-binding {ECO:0000256|ARBA:ARBA00022884}"
        - reference_id: file:DEIRA/Q9RSY6/Q9RSY6-uniprot.txt
          supporting_text: "Pfam; PF00575; S1; 5."
  - source_method: ProtNLM2
    source_version: UniProt 2024_06 pilot
    predicted_term:
      id: GO:0005840
      label: ribosome
    predicted_term_type: GO_CC
    review:
      assessment: LSP
      confidence_score: 2
      summary: >-
        Less precise than the existing curated annotation. ProtNLM2 predicted GO:0005840
        (ribosome), which is a direct parent of GO:0022627 (cytosolic small ribosomal
        subunit) already annotated via IBA (GO_REF:0000033). As a canonical bacterial
        ribosomal protein, bS1 is specifically a component of the 30S (small) ribosomal
        subunit -- not the 50S large subunit or the assembled 70S ribosome in general.
        D. radiodurans bS1 belongs to the bacterial ribosomal protein bS1 family
        (COG0539) and its name explicitly identifies it as the small subunit protein.
        The prediction correctly places the protein in a ribosomal context but fails to
        resolve which ribosomal subunit it occupies, information that is both biologically
        important (bS1 functions exclusively in the 30S subunit during mRNA recruitment)
        and already captured by the existing IBA annotation to GO:0022627.
      supported_by:
        - reference_id: file:DEIRA/Q9RSY6/Q9RSY6-uniprot.txt
          supporting_text: "RecName: Full=Small ribosomal subunit protein bS1"
        - reference_id: file:DEIRA/Q9RSY6/Q9RSY6-uniprot.txt
          supporting_text: "SIMILARITY: Belongs to the bacterial ribosomal protein bS1 family."
references:
  - id: file:DEIRA/Q9RSY6/Q9RSY6-uniprot.txt
    title: UniProt entry Q9RSY6
    findings:
      - statement: >-
          Q9RSY6 is the 30S ribosomal protein S1 (bS1) of D. radiodurans R1, a 629 aa
          protein with five S1/OB-fold domains belonging to the bacterial ribosomal protein
          bS1 family (COG0539).
        supporting_text: "RecName: Full=Small ribosomal subunit protein bS1"
