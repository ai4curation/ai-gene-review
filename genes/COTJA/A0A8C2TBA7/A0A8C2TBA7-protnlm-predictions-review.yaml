id: A0A8C2TBA7
gene_symbol: PAM
taxon:
  id: NCBITaxon:93934
  label: Coturnix japonica
status: COMPLETE
description: >-
  ProtNLM2 predicted 2 GO molecular function terms for peptidylglycine alpha-amidating
  monooxygenase (PAM) from Coturnix japonica. GO:0004598 (peptidylamidoglycolate lyase
  activity) is correct but already present in GOA as a direct annotation from EC number
  mapping (EC:4.3.2.5), making it not novel (CNN). GO:0031418 (L-ascorbic acid binding)
  is a biologically correct novel prediction (COR): the PHM domain requires L-ascorbate
  as an obligate electron donor for its copper-dependent monooxygenase reaction, consuming
  one mole of ascorbate per mole of amidated product. While the existing GO:0016715
  annotation implicitly references ascorbate as a paired donor, no explicit ascorbate
  binding annotation exists in GOA. Overall assessment: 1 CNN (score 2), 1 COR (score 2);
  combined score 4/4.
source_documents:
  - genes/COTJA/A0A8C2TBA7/A0A8C2TBA7-uniprot.txt
  - genes/COTJA/A0A8C2TBA7/A0A8C2TBA7-goa.tsv
predictions:
  - source_method: ProtNLM2
    source_version: UniProt 2024_06 pilot
    predicted_term:
      id: GO:0004598
      label: peptidylamidoglycolate lyase activity
    predicted_term_type: GO_MF
    review:
      assessment: CNN
      confidence_score: 2
      summary: >-
        GO:0004598 (peptidylamidoglycolate lyase activity) corresponds to the enzymatic
        activity of the C-terminal PAL domain of PAM, which cleaves the
        peptidyl-alpha-hydroxyglycine intermediate produced by the PHM domain to yield the
        mature alpha-amidated peptide and glyoxylate (EC:4.3.2.5). This prediction is
        biologically correct: PAM is a bifunctional enzyme and the PAL lyase activity is
        one of its two core catalytic functions. However, GO:0004598 is already directly
        annotated in GOA via EC number mapping (GO_REF:0000003, with/from EC:4.3.2.5),
        making this a correct but not novel prediction. The automated overlap analysis
        flagged this as matching the parent term GO:0003824 (catalytic activity), but the
        exact term GO:0004598 is itself present in GOA. The UniProt entry explicitly lists
        EC=4.3.2.5 and documents the PAL reaction.
      supported_by:
        - reference_id: file:COTJA/A0A8C2TBA7/A0A8C2TBA7-uniprot.txt
          supporting_text: "EC=4.3.2.5"
        - reference_id: file:COTJA/A0A8C2TBA7/A0A8C2TBA7-deep-research-falcon.md
          supporting_text: >-
            The PAL domain cleaves the peptidyl-α-hydroxyglycine intermediate produced
            by PHM to generate the α-amidated peptide product and glyoxylate
  - source_method: ProtNLM2
    source_version: UniProt 2024_06 pilot
    predicted_term:
      id: GO:0031418
      label: L-ascorbic acid binding
    predicted_term_type: GO_MF
    review:
      assessment: COR
      confidence_score: 2
      summary: >-
        GO:0031418 (L-ascorbic acid binding) is a biologically correct novel prediction for
        PAM. The N-terminal PHM (peptidylglycine alpha-hydroxylating monooxygenase) domain
        is a copper-dependent monooxygenase that requires L-ascorbate as an obligate electron
        donor for its catalytic mechanism. The UniProt catalytic activity record explicitly
        shows "2 L-ascorbate" as a substrate in the PHM reaction, and the deep research
        confirms that "reduced ascorbate as an electron donor" is one of three essential
        cofactors, with "one mole of ascorbate consumed per mole of amidated product formed."
        While GOA contains GO:0016715 (oxidoreductase activity, acting on paired donors, with
        reduced ascorbate as one donor), which implicitly references ascorbate in the reaction
        mechanism, no explicit ascorbate binding term is present in the curated annotations.
        GO:0031418 captures a genuine molecular interaction -- the PHM domain must physically
        bind L-ascorbate to accept electrons for the copper center reduction -- that is not
        redundant with existing annotations. The InterPro domain signatures
        (Cu2_ascorb_mOase_N, Cu2_ascorb_mOase_CS-1/2) further confirm ascorbate dependence
        as a defining feature of this enzyme family. This represents a meaningful addition to
        the functional annotation of PAM.
      supported_by:
        - reference_id: file:COTJA/A0A8C2TBA7/A0A8C2TBA7-uniprot.txt
          supporting_text: >-
            a [peptide]-C-terminal glycine + 2 L-ascorbate + O2 = a
            [peptide]-C-terminal (2S)-2-hydroxyglycine + 2 monodehydro-L-
            ascorbate radical + H2O
        - reference_id: file:COTJA/A0A8C2TBA7/A0A8C2TBA7-deep-research-falcon.md
          supporting_text: >-
            This rate-limiting step requires three essential cofactors: (1) copper ions
            (two copper atoms per PHM domain), (2) molecular oxygen, and (3) reduced
            ascorbate as an electron donor. One mole of ascorbate is consumed per mole
            of amidated product formed
