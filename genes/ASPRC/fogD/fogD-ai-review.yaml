- id: GO_REF:0000117
  title: Electronic Gene Ontology annotations created by ARBA machine learning models
  findings: []
- id: GO_REF:0000118
  title: TreeGrafter-generated GO annotations
  findings:
  - statement: All six TreeGrafter annotations for fogD derive from PANTHER family
      PTHR44169 (NADPH-dependent 1-acyldihydroxyacetone phosphate reductase) and are
      incorrect, having been propagated from Ayr1p-like lipid metabolism enzymes that
      share the SDR fold but perform completely different biological functions.
