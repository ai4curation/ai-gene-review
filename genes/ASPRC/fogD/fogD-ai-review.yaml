existing_annotations:
- term:
    id: GO:0000140
    label: acylglycerone-phosphate reductase (NADP+) activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000118
  review:
    summary: This annotation assigns DHAP reductase (Ayr1p) activity to fogD based on
      TreeGrafter placement in PANTHER family PTHR44169. fogD is an SDR enzyme in the
      fog biosynthetic gene cluster for flavoglaucin production. It is proposed to catalyze
      reductive release of polyketide intermediates from the fogA PKS, not DHAP reduction
      for lipid biosynthesis. The SDR superfamily is extremely large and functionally
      diverse; sequence similarity within this superfamily does not imply shared substrate
      specificity. fogD has no demonstrated or predicted acylglycerone-phosphate reductase
      activity.
    action: REMOVE
    reason: Incorrect function propagated from Ayr1p/DHAP reductase family members
      in PANTHER PTHR44169. fogD is a secondary metabolite biosynthetic enzyme, not a
      lipid metabolism enzyme. No experimental or bioinformatic evidence supports this
      activity for fogD.
    supported_by:
    - reference_id: PMID:32134669
      supporting_text_fulltext: fogD is part of the fog cluster and is probably involved
        in the reductive release of the modified PKS products, not in lipid metabolism
      full_text_unavailable: true
- term:
    id: GO:0004806
    label: triacylglycerol lipase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000118
  review:
    summary: This annotation assigns lipase (hydrolase) activity to fogD, which is an
      oxidoreductase (SDR family). Lipase activity is a completely different reaction
      type from the oxidoreductase activity of SDR enzymes. This is a particularly
      egregious mis-annotation -- fogD catalyzes NAD(P)-dependent oxidation/reduction
      reactions, not triacylglycerol hydrolysis. The annotation likely originates from
      a multifunctional or multidomain protein elsewhere in the PANTHER family tree.
    action: REMOVE
    reason: Completely wrong reaction type. fogD is an oxidoreductase (EC 1.1.1.-),
      not a hydrolase/lipase. No SDR enzyme catalyzes triacylglycerol lipase activity.
      This represents a clear error in phylogenetic annotation transfer.
    supported_by:
    - reference_id: PMID:32134669
      supporting_text_fulltext: fogD is classified as EC 1.1.1.- (oxidoreductase), and
        UniProt confirms SDR family membership with NADP binding residues
      full_text_unavailable: true
- term:
    id: GO:0005783
    label: endoplasmic reticulum
  evidence_type: IEA
  original_reference_id: GO_REF:0000118
  review:
    summary: This annotation places fogD in the endoplasmic reticulum, propagated from
      the PANTHER PTHR44169 family where Ayr1p-like DHAP reductases localize to the ER.
      There is no evidence that fogD localizes to the ER. fogD functions as a trans-acting
      SDR that interacts with the cytoplasmic polyketide synthase fogA. Secondary
      metabolite biosynthetic gene cluster enzymes in fungi are typically cytoplasmic.
      fogD lacks any signal peptide or transmembrane domains that would direct it to the
      ER.
    action: REMOVE
    reason: No experimental or bioinformatic evidence supports ER localization. fogD
      lacks signal peptides and transmembrane domains. The annotation is incorrectly
      propagated from lipid metabolism enzymes in the same PANTHER family.
    supported_by:
    - reference_id: PMID:32134669
      supporting_text_fulltext: fogD is a soluble SDR enzyme that participates in
        polyketide biosynthesis, with no evidence for ER targeting
      full_text_unavailable: true
- term:
    id: GO:0005811
    label: lipid droplet
  evidence_type: IEA
  original_reference_id: GO_REF:0000118
  review:
    summary: This annotation places fogD at lipid droplets, propagated from the PANTHER
      family where Ayr1p-like enzymes are associated with lipid droplets as part of
      their role in lipid metabolism. fogD is not a lipid metabolism enzyme; it is a
      secondary metabolite biosynthetic enzyme in the fog cluster. There is no evidence
      for lipid droplet localization.
    action: REMOVE
    reason: No evidence for lipid droplet localization. fogD is a secondary metabolite
      biosynthetic enzyme, not a lipid metabolism enzyme. Incorrectly propagated from
      Ayr1p-like DHAP reductases.
    supported_by:
    - reference_id: PMID:32134669
      supporting_text_fulltext: fogD functions in secondary metabolite biosynthesis within
        the fog gene cluster, not in lipid metabolism
      full_text_unavailable: true
- term:
    id: GO:0006654
    label: phosphatidic acid biosynthetic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000118
  review:
    summary: This annotation assigns fogD to phosphatidic acid biosynthesis, a lipid
      metabolic pathway. fogD has no role in phospholipid biosynthesis. It functions
      exclusively in secondary metabolite (polyketide) biosynthesis within the fog gene
      cluster. This annotation is propagated from Ayr1p-like DHAP reductases that
      participate in ether lipid/phospholipid biosynthesis.
    action: REMOVE
    reason: fogD has no role in phospholipid or phosphatidic acid biosynthesis. It is
      a secondary metabolite biosynthetic enzyme involved in flavoglaucin production.
      Incorrectly propagated from lipid metabolism enzymes.
    supported_by:
    - reference_id: PMID:32134669
      supporting_text_fulltext: fogD is part of the fog secondary metabolite gene cluster,
        not a lipid biosynthesis pathway
      full_text_unavailable: true
- term:
    id: GO:0019433
    label: triglyceride catabolic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000118
  review:
    summary: This annotation assigns fogD to triglyceride catabolism, which is inconsistent
      with its role as an SDR in secondary metabolite biosynthesis. fogD has no role in
      triglyceride metabolism. This is particularly incongruous given that fogD is an
      oxidoreductase (not a lipase) and is part of a biosynthetic (not catabolic) pathway.
    action: REMOVE
    reason: fogD has no role in triglyceride catabolism. It is a biosynthetic enzyme
      (not catabolic) and an oxidoreductase (not a lipase). Incorrectly propagated from
      PANTHER family PTHR44169.
    supported_by:
    - reference_id: PMID:32134669
      supporting_text_fulltext: fogD participates in flavoglaucin biosynthesis, a
        secondary metabolite biosynthetic pathway, not triglyceride catabolism
      full_text_unavailable: true
- term:
    id: GO:0044550
    label: secondary metabolite biosynthetic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000117
  review:
    summary: This ARBA annotation correctly identifies fogD's involvement in secondary
      metabolite biosynthesis. fogD is part of the fog gene cluster responsible for
      biosynthesis of flavoglaucin and congeners (prenylated salicylaldehyde derivatives).
      Disruption of fogD impairs production of these metabolites. This is the only
      correct GO annotation among the seven assigned to fogD.
    action: ACCEPT
    reason: Accurately reflects fogD's experimentally supported role in secondary
      metabolite biosynthesis. Confirmed by gene disruption and heterologous expression
      studies in Nies et al. (2020).
    supported_by:
    - reference_id: PMID:32134669
      supporting_text_fulltext: The fog cluster mediates biosynthesis of flavoglaucin
        and congeners; fogD disruption impairs production of these secondary metabolites
      full_text_unavailable: true
- term:
    id: GO:0016616
    label: oxidoreductase activity, acting on the CH-OH group of donors, NAD or NADP
      as acceptor
  evidence_type: IEA
  original_reference_id: PMID:32134669
  review:
    summary: fogD is an SDR family enzyme classified as EC 1.1.1.- with confirmed NADP
      binding residues (by homology). This oxidoreductase activity is the appropriate
      molecular function annotation, supported by SDR family membership, active site
      residues (Tyr-147 proton acceptor, Lys-151), and multiple NADP(+) binding sites
      identified by sequence similarity. This should replace the incorrect TreeGrafter
      annotations for DHAP reductase and lipase activity.
    action: NEW
    reason: Correct molecular function for fogD based on SDR family membership, EC
      1.1.1.- classification, and NADP binding sites. Should be added to replace the
      six incorrect TreeGrafter annotations.
    supported_by:
    - reference_id: PMID:32134669
      supporting_text_fulltext: fogD is a short-chain dehydrogenase classified as EC
        1.1.1.- with demonstrated involvement in flavoglaucin biosynthesis
      full_text_unavailable: true
- term:
    id: GO:0030639
    label: polyketide biosynthetic process
  evidence_type: IEA
  original_reference_id: PMID:32134669
  review:
    summary: fogD participates in the biosynthesis of polyketide-derived secondary
      metabolites (flavoglaucin and congeners) as part of the fog gene cluster. The fog
      pathway is a polyketide biosynthetic pathway where fogA is the core HR-PKS and
      fogD contributes to the release of polyketide products. This is a more specific
      biological process annotation than GO:0044550 and accurately reflects the
      polyketide nature of the pathway.
    action: NEW
    reason: fogD is directly involved in polyketide biosynthesis as a trans-acting SDR
      in the fog cluster. GO:0030639 provides a more specific biological process
      annotation than the existing GO:0044550.
    supported_by:
    - reference_id: PMID:32134669
      supporting_text_fulltext: The fog cluster produces polyketide-derived prenylated
        salicylaldehyde derivatives; fogD is required for the polyketide biosynthetic
        pathway
      full_text_unavailable: true
core_functions:
- description: fogD is a trans-acting short-chain dehydrogenase/reductase proposed to
    catalyze the NADP-dependent reductive release of modified polyketide intermediates
    from the fogA polyketide synthase, yielding salicyl alcohol products that serve as
    substrates for subsequent hydroxylation (fogE), prenylation (fogH), and reoxidation
    (fogF) in the flavoglaucin biosynthetic pathway. This temporary reduction to salicyl
    alcohol is a prerequisite for decorating enzymes to act before the final oxidation
    back to aryl aldehydes.
  supported_by:
  - reference_id: PMID:32134669
    supporting_text_fulltext: The polyketide skeleton was released as alkylated salicyl
      alcohols, which is a prerequisite for consecutive hydroxylation and prenylation,
      before reoxidation to the final aldehyde products...fogD is probably involved in
      the reductive release of the modified PKS products
    full_text_unavailable: true
  - reference_id: file:ASPRC/fogD/fogD-notes.md
    supporting_text: fogD is proposed to catalyze the reductive release of modified
      polyketide intermediates from the PKS fogA
  molecular_function:
    id: GO:0016616
    label: oxidoreductase activity, acting on the CH-OH group of donors, NAD or NADP
      as acceptor
  directly_involved_in:
  - id: GO:0044550
    label: secondary metabolite biosynthetic process
  - id: GO:0030639
    label: polyketide biosynthetic process
proposed_new_terms:
- proposed_name: flavoglaucin biosynthetic process
  proposed_definition: The chemical reactions and pathways resulting in the formation
    of flavoglaucin, a prenylated salicylaldehyde derivative produced by Aspergillus
    species via a polyketide biosynthetic pathway involving the fog gene cluster.
  justification: Flavoglaucin (CHEBI:68188) is a well-characterized fungal secondary
    metabolite with a defined biosynthetic pathway (Nies et al. 2020), but no specific
    GO term exists for its biosynthesis. A specific term would enable precise annotation
    of the fog cluster genes.
  proposed_parent:
    id: GO:0044550
    label: secondary metabolite biosynthetic process
  supported_by:
  - reference_id: PMID:32134669
    supporting_text_fulltext: The biosynthetic pathway of the prenylated salicylaldehyde
      flavoglaucin and congeners was elucidated
    full_text_unavailable: true
suggested_questions:
- question: What is the exact catalytic mechanism of fogD? Does it perform a true NADPH-dependent
    reductive release of the thioester-bound polyketide from fogA, or does it catalyze
    a different modification of the PKS-bound intermediate?
  experts:
  - Shu-Ming Li (Philipps-Universitat Marburg, senior author of PMID:32134669)
  - Jonas Nies (first author of PMID:32134669)
- question: Does fogD interact directly with the fogA polyketide synthase via protein-protein
    interaction, and if so, which domains mediate this interaction?
  experts:
  - Shu-Ming Li (Philipps-Universitat Marburg)
- question: Why does the PANTHER family PTHR44169 group fogD with Ayr1p-like DHAP
    reductases despite their completely different biological functions? Is there a better
    subfamily placement that would prevent this mis-annotation?
  experts: []
suggested_experiments:
- hypothesis: fogD catalyzes the NADPH-dependent reductive release of polyketide
    intermediates from the fogA PKS, generating salicyl alcohol products.
  description: Express and purify recombinant fogD, then test its ability to release
    polyketide intermediates from purified fogA-bound substrates in vitro. Measure
    NADPH consumption and product formation (salicyl alcohols) by LC-MS. Include controls
    without NADPH and with catalytically inactive fogD (Y147F active site mutant) to
    confirm the reductive mechanism.
  experiment_type: in vitro biochemical assay
- hypothesis: fogD forms a direct physical interaction with the fogA polyketide synthase
    to perform trans-acting reductive release.
  description: Perform co-immunoprecipitation or pull-down assays using tagged fogD and
    fogA expressed in A. nidulans. Alternatively, use bacterial two-hybrid or yeast
    two-hybrid assays to test for direct protein-protein interaction between fogD and
    specific domains of fogA (KS, ACP, or thioesterase-like domains).
  experiment_type: protein-protein interaction assay
- hypothesis: Specific active site residues (Tyr-147, Lys-151) are essential for fogD
    catalytic activity in the fog pathway.
  description: Generate site-directed mutants of fogD at predicted active site residues
    (Y147F, K151A) and cofactor binding residues. Express these in a fogD-deletion
    background in A. ruber or heterologously in A. nidulans with fogA/B/C, and measure
    flavoglaucin and salicyl alcohol production by HPLC/LC-MS. Loss of pathway products
    would confirm these residues are catalytically essential.
  experiment_type: site-directed mutagenesis with metabolite profiling
