description: >-
  fogD is a short-chain dehydrogenase/reductase (SDR) family enzyme encoded within
  the fog (flavoglaucin) biosynthetic gene cluster in Aspergillus ruber CBS 135680.
  The fog cluster contains nine genes (fogA-fogI) responsible for the biosynthesis of
  flavoglaucin and congeners (dihydroauroglaucin, auroglaucin, aspergin), which are
  prenylated salicylaldehyde derivatives. fogD is proposed to catalyze the reductive
  release of modified polyketide intermediates from the PKS fogA, yielding salicyl
  alcohol products. This is a trans-acting SDR that works in concert with fogA (HR-PKS),
  fogB (SDR), and fogC (cupin oxidoreductase) to form the aromatic core of the
  salicylaldehyde products. Disruption of fogD impairs production of flavoglaucin and
  congeners. A key feature of this pathway is the temporary reduction to salicyl alcohol
  for subsequent hydroxylation and prenylation, before final reoxidation to aryl
  aldehydes. Six of seven TreeGrafter GO annotations for this protein are incorrect,
  having been propagated from Ayr1p/DHAP reductase family members in the same PANTHER
  family (PTHR44169), which are lipid metabolism enzymes unrelated to fogD's actual
  function in secondary metabolite biosynthesis.
references:
