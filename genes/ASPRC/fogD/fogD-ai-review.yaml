  - statement: fogA, fogB, fogC, and fogD together are necessary for formation of the
      aromatic core and the cyclized PKS products are released as salicyl alcohols.
    supporting_text: The polyketide skeleton was released as alkylated salicyl alcohols,
      which is a prerequisite for consecutive hydroxylation and prenylation, before
      reoxidation to the final aldehyde products
  - statement: fogD is probably involved in the reductive release of the modified PKS
      products from the fogA polyketide synthase.
    full_text_unavailable: true
  - statement: Disruption of fogD impairs the production of flavoglaucin and congeners
