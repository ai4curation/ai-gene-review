    review:
      assessment: NPI
      confidence_score: 0
      summary: >-
        MCM-4 is a subunit of the MCM2-7 replicative DNA helicase complex and has
        no known role in transcription initiation at RNA polymerase II promoters.
        The protein's sole domain in this 74 AA fragment is the winged-helix domain
        WHD_MCM4 (PF21128), which is structurally related to winged-helix domains
        found in some transcription factors. This structural similarity likely
        caused ProtNLM2 to predict a transcription-related function. However, the
        MCM4 WHD is specifically involved in DNA binding during replication origin
        licensing and replication fork progression, not in transcription. All
        established functions of MCM-4 -- DNA helicase activity, DNA replication
        initiation, and participation in the MCM complex -- are in the DNA
        replication pathway, not the transcription pathway. No literature or
        ortholog evidence supports a direct role for any MCM4 subunit in RNA
        polymerase II transcription initiation.
      error_type: FREQUENCY_BIAS
  - source_method: ProtNLM2
    source_version: UniProt 2024_06 pilot
    predicted_term:
      id: GO:0005634
      label: nucleus
    predicted_term_type: GO_CC
    review:
      assessment: COR
      confidence_score: 2
      summary: >-
        Nuclear localization is well-established for MCM complex subunits across
        eukaryotes, and this prediction is biologically correct. The MCM2-7 complex,
        of which MCM-4 is a constitutive subunit, is loaded onto chromatin at
        replication origins in the nucleus during late mitosis and G1 phase and
        operates at replication forks during S phase. In C. elegans, MCM-4::mCherry
        fusion proteins have been observed associated with chromosomes in live-cell
        imaging, directly confirming nuclear localization. The AI review of this
        protein independently proposed nucleus (GO:0005634) as a NEW annotation
        with ISS evidence. Since this accession has no existing GOA annotations,
        this ProtNLM2 prediction represents a correct novel prediction that is
        consistent with both the known biology of MCM helicase subunits and direct
        experimental observations in C. elegans.
