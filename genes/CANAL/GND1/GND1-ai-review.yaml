id: A0A1D8PFS4
gene_symbol: GND1
product_type: PROTEIN
taxon:
  id: NCBITaxon:237561
  label: Candida albicans SC5314
description: GND1 encodes 6-phosphogluconate dehydrogenase (decarboxylating) (EC 1.1.1.44),
  the canonical NADP+-dependent enzyme of the oxidative pentose phosphate pathway
  (oxPPP). It catalyses 6-phosphogluconate + NADP+ -> ribulose-5-phosphate + CO2 +
  NADPH, providing the second NADPH-generating step of the oxPPP and feeding ribulose-5-phosphate
  into the non-oxidative branch for nucleotide and pentose-sugar interconversions.
  In Candida albicans, Gnd1 is predominantly cytosolic but a minor peroxisomal pool
  (~5-10% of activity) is generated through alternative splicing of an intron that
  encodes an in-frame PTS2 signal; import of this isoform depends on the PTS2 receptor
  Pex7 and is more evident under peroxisome-inducing conditions such as oleate growth.
  Iron limitation up-regulates GND1 as part of a broader metabolic remodeling toward
  PPP-derived NADPH.
