predictions:
- source_method: BioReason-Pro-SFT
  source_version: wanglab/protein_catalogue
  source_reference_id: doi:10.64898/2026.03.19.712954
  predicted_term:
    id: GO:0042802
    label: identical protein binding
  predicted_term_type: GO_MF
  review:
    assessment: COR
    confidence_score: 2
    summary: Correct novel prediction. DivIVA forms oligomeric structures through
      its N-terminal membrane-binding domain and C-terminal coiled-coil regions
      that mediate tetramerization and higher-order self-assembly. DivIVA homooligomerization
      is essential for its function as a scaffold at cell poles and septa. This
      self-association is not currently annotated in the GOA curated set for divIVA,
      making it a correct novel prediction.
- source_method: BioReason-Pro-SFT
  source_version: wanglab/protein_catalogue
  source_reference_id: doi:10.64898/2026.03.19.712954
  predicted_term:
    id: GO:0044780
    label: bacterial-type flagellum assembly
  predicted_term_type: GO_BP
  review:
    assessment: NPI
    confidence_score: 0
    summary: Incorrect prediction. DivIVA is a cell division scaffold protein
      that senses membrane curvature at cell poles and septa to recruit the MinJ/MinCD
      system for division site selection. DivIVA has no role in flagellum assembly.
      This is a major functional misassignment, likely resulting from confusion
      with other membrane-associated proteins involved in cell polarity. The error
      may arise from training data co-occurrence of cell division proteins with
      flagellar proteins, both being cell-shape-related processes.
    error_type: PATHWAY_CONTEXT_IGNORED
- source_method: BioReason-Pro-SFT
  source_version: wanglab/protein_catalogue
  source_reference_id: doi:10.64898/2026.03.19.712954
  predicted_term:
    id: GO:0071978
    label: bacterial-type flagellum-dependent swarming motility
  predicted_term_type: GO_BP
  review:
    assessment: NPI
    confidence_score: 0
    summary: Incorrect prediction. DivIVA has no role in flagellum-dependent swarming
      motility. DivIVA is a division plane organizer that functions through the
      MinCD system, not through flagellar regulation. This is a downstream consequence
      of the incorrect flagellum assembly prediction above.
    error_type: PATHWAY_CONTEXT_IGNORED
- source_method: BioReason-Pro-SFT
  source_version: wanglab/protein_catalogue
  source_reference_id: doi:10.64898/2026.03.19.712954
  predicted_term:
    id: GO:0032991
    label: protein-containing complex
  predicted_term_type: GO_CC
  review:
    assessment: LSP
    confidence_score: 2
    summary: While technically correct (DivIVA forms oligomeric complexes at
      poles and septa, interacts with MinJ/MinCD), this term is too generic.
      The curated annotation already has cytoplasm/membrane localizations. More
      specific terms would include the DivIVA-MinJ complex or division septum.
      The prediction captures a real aspect of DivIVA biology but at an overly
      broad level.
