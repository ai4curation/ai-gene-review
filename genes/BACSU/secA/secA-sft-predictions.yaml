    summary: Correct and core biological process for SecA. SecA is the ATPase motor
      of the Sec translocase that drives post-translational protein translocation
      across the cytoplasmic membrane. This is SecA's defining function. Already
      in curated annotations (accepted in ai-review.yaml). In training data.
- source_method: BioReason-Pro-SFT
  source_version: wanglab/protein_catalogue
  source_reference_id: doi:10.64898/2026.03.19.712954
