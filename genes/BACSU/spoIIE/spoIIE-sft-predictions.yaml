    summary: Incorrect prediction. SpoIIE is a PP2C-family sporulation-specific
      phosphatase that dephosphorylates SpoIIAA-P to activate sigma-F in the
      forespore. SpoIIE has absolutely no role in flagellum assembly. This is a
      major functional misassignment. The error likely arises because SpoIIE has
      a large N-terminal transmembrane domain with multiple helices that superficially
      resembles transmembrane regions of some flagellar proteins, or from training
      data co-occurrence artifacts with other membrane proteins in sporulation-related
      literature.
