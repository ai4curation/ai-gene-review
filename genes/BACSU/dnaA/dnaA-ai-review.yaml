- id: PMID:12060778
  title: An expanded view of bacterial DNA replication.
  findings:
  - statement: DnaA interacts with YabA in yeast two-hybrid screens
    supporting_text: "These interactions provide insights on the relations of DNA replication with recombination and repair, membrane-bound protein complexes, and signaling pathways. They also lead to the biological role of unknown proteins, as illustrated for the highly conserved YabA, which is shown here to act in initiation control."
- id: PMID:16461910
  title: 'Functional dissection of YabA, a negative regulator of DNA replication initiation
    in Bacillus subtilis.'
  findings: []
- id: PMID:18854156
  title: Dynamic control of the DNA replication initiation protein DnaA by Soj/ParA.
  findings:
  - statement: Soj/ParA controls the activity of DnaA as a spatially regulated molecular switch
    supporting_text: "the ParA ortholog in B. subtilis (Soj) controls the activity of the DNA replication initiator protein DnaA. Subcellular localization of several Soj mutants indicates that Soj acts as a spatially regulated molecular switch, capable of either inhibiting or activating DnaA."
  - statement: Soj effect on sporulation is indirect through DnaA
    supporting_text: "the classical effect of Soj inhibiting sporulation is an indirect consequence of its action on DnaA through activation of the Sda DNA replication checkpoint"
- id: PMID:21630458
  title: 'An expanded protein-protein interaction network in Bacillus subtilis reveals
    a group of hubs: Exploration by an integrative approach.'
  findings:
  - statement: Large-scale protein-protein interaction network identified DnaA interactions via yeast two-hybrid
    supporting_text: "We have generated a protein-protein interaction network in Bacillus subtilis focused on several essential cellular processes such as cell division, cell responses to various stresses, the bacterial cytoskeleton, DNA replication and chromosome maintenance by careful application of the yeast two-hybrid approach."
- id: PMID:2167836
  title: "Isolation of a dnaA mutant of Bacillus subtilis defective in initiation of
    replication: amount of DnaA protein determines cells' initiation potential."
  findings:
  - statement: DnaA is essential for initiation of chromosomal replication in B. subtilis
    supporting_text: "The dnaA gene is essential for initiation of chromosomal replication in Escherichia coli. A gene homologous with the E. coli dnaA was found in the replication origin region of the Bacillus subtilis chromosome."
  - statement: Temperature-sensitive dnaA mutant stops DNA replication at nonpermissive temperature
    supporting_text: "At a nonpermissive temperature, 49 degrees C, DNA replication stops completely after 60% increase in a rich medium, while cell mass continues to increase exponentially at 2.5 times the rate at 30 degrees C."
  - statement: Amount of DnaA protein determines initiation potential
    supporting_text: "We observed a remarkable correlation between the amount of DnaA protein and the amount of initiation potential accumulated during incubation at the non-permissive temperature."
- id: PMID:27281207
  title: The bacterial DnaA-trio replication origin element specifies single-stranded
    DNA initiator binding.
  findings:
  - statement: DnaA-trio is a novel replication origin element composed of repeating trinucleotide motifs
    supporting_text: "Here we identify a new indispensable bacterial replication origin element composed of a repeating trinucleotide motif that we term the DnaA-trio."
  - statement: DnaA-trio stabilizes DnaA filaments on single-stranded DNA
    supporting_text: "the function of the DnaA-trio is to stabilize DnaA filaments on a single DNA strand, thus providing essential precision to this binding mechanism."
  - statement: DnaA self-assembles into filaments on ssDNA in an ATP-dependent manner
    supporting_text: "Formation of DnaA oligomers on the 5′-tailed substrate was dependent upon both ATP and the ssDNA binding residue Ile190 located within the ISM of the AAA+ domain"
  - statement: DnaA oligomer formation is specific for oriC sequences
    supporting_text: "DnaA filament assembly was abolished when the DnaA-box sequences within the duplex region were scrambled and it was significantly reduced when the single-stranded region was replaced with its complementary sequence"
- id: PMID:35576203
  title: Structure and kinase activity of bacterial cell cycle regulator CcrZ.
  findings:
  - statement: CcrZ interacts with DnaA domains I and III in bacterial two-hybrid assays
    supporting_text: "we tested CcrZ against DnaA domains I and III and identified an interaction between CcrZ and both DnaA domains for some of the two-hybrid constructs"
  - statement: CcrZ and YabA function in the same pathway regulating DnaA
    supporting_text: "We conclude that YabA and CcrZ function in the same pathway and that CcrZ interacts with DnaA and DnaB."
  - statement: Overexpression of CcrZ results in over-initiation of DNA replication
    supporting_text: "We find that overexpression of ccrZ results in over-initiation of DNA replication and that CcrZ interacts with initiation proteins DnaA and DnaB."
existing_annotations:
- term:
    id: GO:0006260
    label: DNA replication
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: DnaA is unequivocally involved in DNA replication as the master replication
      initiator protein. However, GO:0006260 is a broad parent term and the more
      specific term GO:0006270 (DNA replication initiation) better captures DnaA's
      core role. This annotation is redundant with the more specific term.
    action: KEEP_AS_NON_CORE
    reason: While correct, this is the parent term of the more informative GO:0006270
      (DNA replication initiation). DnaA's specific role is in replication initiation,
      not elongation or other replication steps.
- term:
    id: GO:0006270
    label: DNA replication initiation
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: DnaA is the master initiator of chromosomal DNA replication in B. subtilis.
      This is the core biological process for DnaA, well-supported by phylogenetic
      inference from conserved DnaA function across bacteria.
    action: ACCEPT
    reason: DNA replication initiation is the primary biological process of DnaA,
      supported by extensive experimental evidence in B. subtilis and conservation
      across bacteria.
    supported_by:
    - reference_id: PMID:2167836
      supporting_text: "The dnaA gene is essential for initiation of chromosomal replication in Escherichia coli. A gene homologous with the E. coli dnaA was found in the replication origin region of the Bacillus subtilis chromosome."
- term:
    id: GO:0003688
    label: DNA replication origin binding
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: DnaA binds specifically to the replication origin (oriC) at DnaA-box
      consensus sequences. This is a core molecular function of DnaA, well-supported
      by phylogenetic inference and extensive direct experimental evidence.
    action: ACCEPT
    reason: DNA replication origin binding is one of the two essential DNA-binding
      activities of DnaA, binding dsDNA at DnaA-boxes in oriC to initiate replication.
    supported_by:
    - reference_id: PMID:27281207
      supporting_text: "DnaA monomers recognize the replication origin (oriC) by binding double-stranded DNA sequences (DnaA-boxes)"
- term:
    id: GO:0005886
    label: plasma membrane
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: Membrane association of DnaA is inferred by phylogenetic analogy with
      E. coli DnaA, which binds acidic phospholipids. The UniProt entry notes this
      as "by similarity" for B. subtilis DnaA. The primary localization of DnaA in
      B. subtilis is the nucleoid/cytoplasm, where it forms foci coinciding with
      replication machinery.
    action: KEEP_AS_NON_CORE
    reason: While DnaA may associate with the plasma membrane via phospholipid binding
      (by analogy to E. coli), the primary functional localization in B. subtilis
      is the nucleoid and cytoplasm. Membrane association is not the core localization.
- term:
    id: GO:0003677
    label: DNA binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: DnaA is definitively a DNA-binding protein, binding both dsDNA at DnaA-boxes
      and ssDNA at DnaA-trio motifs. However, GO:0003677 is too general. The more
      specific terms GO:0003688 (DNA replication origin binding) and GO:0043565
      (sequence-specific DNA binding) better capture DnaA's functions.
    action: MODIFY
    reason: The generic DNA binding term does not capture the specificity of DnaA's
      DNA binding activities. DnaA binds oriC at specific DnaA-box sequences and
      ssDNA at DnaA-trio motifs.
    proposed_replacement_terms:
    - id: GO:0003688
      label: DNA replication origin binding
    supported_by:
