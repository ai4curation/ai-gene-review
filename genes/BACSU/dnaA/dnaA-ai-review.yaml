- term:
    id: GO:0006275
    label: regulation of DNA replication
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  review:
    summary: DnaA both initiates and regulates DNA replication. It autorepresses its
      own operon and is subject to regulation by multiple factors (YabA, Soj, SirA,
      CcrZ). While DnaA is a target of regulation rather than a regulator per se,
      its role in controlling replication timing through cooperative oriC binding
      and transcriptional autoregulation qualifies it for this term.
    action: KEEP_AS_NON_CORE
