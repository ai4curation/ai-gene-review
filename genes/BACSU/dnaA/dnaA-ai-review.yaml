id: P05648
gene_symbol: dnaA
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:224308
  label: Bacillus subtilis (strain 168)
description: >-
  DnaA is the essential chromosomal replication initiator protein in Bacillus subtilis.
  It is a multifunctional AAA+ ATPase that binds the replication origin (oriC) at 9-bp
  DnaA-box consensus sequences (5'-TTATCCACA-3') and promotes duplex unwinding at the
  DNA unwinding element (DUE) by assembling into right-handed helical filaments on
  single-stranded DNA at DnaA-trio motifs (3'-GAT-5' consensus). ATP-bound DnaA
  oligomerizes cooperatively on oriC, forming a spiral filament where dsDNA binds to
  the exterior and ssDNA is stabilized in the interior, enabling loading of the
  replication machinery (DnaD, DnaB, DnaI-DnaC helicase). DnaA activity is tightly
  regulated by multiple negative regulators during the cell cycle: YabA prevents
  cooperative DnaA-ATP binding to oriC during vegetative growth and tethers DnaA to
  replication forks via DnaN; Soj/ParA acts as a spatially regulated molecular switch
  that can inhibit or activate DnaA; and SirA inhibits DnaA binding to oriC during
  sporulation. DnaA also functions as a transcriptional regulator, autorepressing its
  own dnaA-dnaN operon and controlling expression of at least 20 operons (56 genes)
  in response to replication status. DnaA possesses intrinsic ATPase activity, with
  rapid nucleotide turnover (ADP-DnaA half-life ~1.5 min, ATP-DnaA half-life ~5 min
  at 37C). The cell cycle regulator CcrZ interacts with DnaA domains I and III and
  positively regulates replication initiation.
