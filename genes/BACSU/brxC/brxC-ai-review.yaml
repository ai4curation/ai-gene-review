    label: cytoplasm
  evidence_type: IDA
  original_reference_id: PMID:33722570
  review:
    summary: BrxC acts on cytosolic S-bacillithiolated proteins including GapA and
      GapB, consistent with cytoplasmic localization. The protein lacks signal peptides
      or transmembrane domains.
    action: NEW
    reason: BrxC is implicated in debacillithiolation of cytosolic proteins (GapA,
      GapB) in vivo, and functions on soluble substrates, consistent with cytoplasmic
      localization.
    supported_by:
    - reference_id: PMID:33722570
      supporting_text: the YtxJ protein is identified as a monothiol bacilliredoxin,
        renamed BrxC, and is implicated in BSH removal from oxidized cytosolic proteins
references:
- id: PMID:33722570
  title: The Bacillus subtilis monothiol bacilliredoxin BrxC (YtxJ) and the Bdr (YpdA)
    disulfide reductase reduce S-bacillithiolated proteins.
  findings:
  - statement: BrxC (YtxJ) is identified as a monothiol bacilliredoxin that debacillithiolates
      S-bacillithiolated proteins
    supporting_text: the YtxJ protein is identified as a monothiol bacilliredoxin,
      renamed BrxC, and is implicated in BSH removal from oxidized cytosolic proteins,
      including the glyceraldehyde 3-phosphate dehydrogenases GapA and GapB
  - statement: Deletion of the brxC operon leads to increased S-bacillithiolation
      of GapA and GapB in vivo under oxidative stress
    supporting_text: the hpx strain additionally carrying a brxC operon deletion
      (ytxGH brxC) had a substantial increase in the level of both GapA and GapB
      S-bacillithiolation
  - statement: BrxC debacillithiolates BrxB-SSB in vitro via its active-site Cys-31
    supporting_text: incubation of BrxB-SSB with BrxC results in the partial transfer
      of the BSH moiety from BrxB to BrxC
  - statement: BrxC debacillithiolates S-bacillithiolated Bdr in vitro, dependent
      on active-site C31
    supporting_text: addition of BrxC leads to efficient de-bacillithiolation of Bdr,
      with concomitant appearance of the S-bacillithiolated BrxC product. As expected,
      this activity requires the active site C31 residue in BrxC
  - statement: Affinity trapping proteomics under stringent conditions identified
      approximately 20 candidate BrxC substrates
    supporting_text: Using this more stringent protocol, ~20 proteins were reproducibly
      retained (n = 3) and all contained at least one cysteine residue
  - statement: BrxC is induced as part of the sigma-B general stress response and
      is the only stress-inducible bacilliredoxin
    supporting_text: only BrxC is induced as part of the σB-dependent general stress
      response
  - statement: BrxC functions similarly to monothiol glutaredoxins that reduce GSH-mixed
      disulfides
    supporting_text: BrxC is a monothiol bacilliredoxin and functions similarly to
      glutaredoxins
core_functions:
- molecular_function:
    id: GO:0016491
    label: oxidoreductase activity
  description: BrxC is a monothiol bacilliredoxin (oxidoreductase) that catalyzes
    the reductive removal of bacillithiol (BSH) from S-bacillithiolated proteins.
    It uses its active-site Cys-31 residue to cleave the mixed disulfide bond between
    BSH and substrate protein cysteine residues, functioning analogously to monothiol
    glutaredoxins. Demonstrated substrates include GapA-SSB and GapB-SSB (in vivo),
    and BrxB-SSB and Bdr-SSB (in vitro).
