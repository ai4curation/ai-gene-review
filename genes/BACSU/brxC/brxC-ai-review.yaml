proposed_new_terms: []
suggested_questions:
- question: What is the full range of in vivo substrates for BrxC, beyond GapA and
    GapB? Many candidate substrates were identified by proteomics but not validated
    in vivo.
- question: What is the relative contribution of BrxC versus BrxA and BrxB to protein
    debacillithiolation under different stress conditions?
- question: Is BrxC's debacillithiolation activity regulated, for example by post-translational
    modification of its Cys-31 residue via S-bacillithiolation?
suggested_experiments:
- description: Quantitative proteomics comparing S-bacillithiolation levels of all
    candidate substrates (Table 1) in wild-type versus brxC deletion strains under
    oxidative stress, to determine which substrates are debacillithiolated by BrxC
    in vivo.
- description: In vitro kinetic characterization of BrxC debacillithiolation activity
    with purified S-bacillithiolated substrates (beyond BrxB and Bdr) to determine
    substrate specificity and catalytic efficiency.
- description: Crystal structure determination of BrxC in complex with a substrate-BSH
    intermediate to understand the molecular basis of substrate recognition and the
    monothiol mechanism.
