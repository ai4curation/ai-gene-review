id: P39914
gene_symbol: brxC
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:224308
  label: Bacillus subtilis (strain 168)
description: BrxC (formerly YtxJ) is a monothiol bacilliredoxin in Bacillus subtilis
  that functions analogously to monothiol glutaredoxins. It catalyzes the removal
  of bacillithiol (BSH) from S-bacillithiolated proteins, thereby restoring their
  reduced (active) state. BrxC contains a thioredoxin-like fold with a TCIPS motif
  and uses its active-site Cys-31 residue to cleave mixed disulfide bonds between
  BSH and substrate proteins. Demonstrated in vivo substrates include the glyceraldehyde-3-phosphate
  dehydrogenases GapA and GapB, and in vitro substrates include BrxB and Bdr. BrxC
  is encoded in the stress-inducible ytxGH-brxC operon under sigma-B and sigma-H
  control, and is the only bacilliredoxin induced as part of the general stress response.
  It plays a role in the broader BSH redox network that maintains cytosolic redox homeostasis
  under disulfide stress conditions.
existing_annotations:
- term:
    id: GO:0006979
    label: response to oxidative stress
  evidence_type: IDA
  original_reference_id: PMID:33722570
  review:
    summary: BrxC is implicated in the response to oxidative stress. Deletion of
      the ytxGH-brxC operon in a hydroperoxidase-deficient (hpx) background leads
      to increased S-bacillithiolation of GapA and GapB, demonstrating that BrxC
      functions to reduce oxidized proteins under conditions of elevated oxidative
      stress.
    action: ACCEPT
    reason: The evidence directly supports involvement in oxidative stress response.
      BrxC debacillithiolates proteins that become S-bacillithiolated under oxidative
      stress, and deletion of brxC leads to accumulation of S-bacillithiolated substrates
      in stressed cells. The operon is also induced as part of the sigma-B general
      stress response.
    supported_by:
    - reference_id: PMID:33722570
      supporting_text: the hpx strain additionally carrying a brxC operon deletion
        (ytxGH brxC) had a substantial increase in the level of both GapA and GapB
        S-bacillithiolation
- term:
    id: GO:0045454
    label: cell redox homeostasis
  evidence_type: IDA
  original_reference_id: PMID:33722570
  review:
    summary: BrxC functions as a monothiol bacilliredoxin that debacillithiolates
      S-bacillithiolated proteins, restoring their reduced state. This activity
      directly contributes to maintaining redox homeostasis in the cytosol.
    action: ACCEPT
    reason: BrxC is part of the BSH redox network comprising three bacilliredoxins
      and a BSSB reductase that collectively maintain cellular redox balance. Its
      debacillithiolation activity on multiple substrates (GapA, GapB, BrxB, Bdr)
      supports a role in cell redox homeostasis.
    supported_by:
    - reference_id: PMID:33722570
      supporting_text: these results expand our understanding of the BSH redox network
        comprised of three bacilliredoxins and a BSSB reductase that serve to counter
        the widespread protein S-bacillithiolation that results from conditions of
        disulfide stress
- term:
    id: GO:0005515
    label: protein binding
  evidence_type: IPI
  original_reference_id: PMID:33722570
  review:
    summary: BrxC interacts with multiple proteins including AbrB, BdhA, Bdr, BrxB,
      FolD, GapA, GapB, GatA, PfkA, PyrAA, PyrAB, PyrE, PyrG, PyrH, RpsB, RpsK,
      RpsL, SalA, SucC, Tuf and YtsJ, as identified by affinity trapping proteomics.
      However, protein binding is uninformative per GO guidelines and the interactions
      are better captured by more specific terms.
    action: REMOVE
    reason: Per GO curation guidelines, protein binding (GO:0005515) is uninformative
      and should not be annotated. The specific interactions are better described
      by the enzyme binding and translation elongation factor binding annotations
      already present.
    supported_by:
    - reference_id: PMID:33722570
      supporting_text: Using this more stringent protocol, ~20 proteins were reproducibly
        retained (n = 3) and all contained at least one cysteine residue
- term:
    id: GO:0019899
    label: enzyme binding
  evidence_type: IPI
  original_reference_id: PMID:33722570
  review:
    summary: BrxC was shown to interact with multiple enzymes by affinity trapping
      under stringent (6 M guanidine HCl wash) conditions, identifying covalently
      linked substrates including BdhA, PyrH, PyrAA, PyrAB, PyrG, PyrE, GapB,
      PfkA, YtsJ, SucC, Bdr, and FolD. These interactions reflect BrxC's function
      as a bacilliredoxin that forms transient mixed disulfide intermediates with
      S-bacillithiolated enzyme substrates.
    action: KEEP_AS_NON_CORE
    reason: The enzyme binding annotation captures the fact that BrxC interacts with
      numerous enzymes as part of its debacillithiolation function. While the interactions
      are real, they reflect the substrate recognition aspect of its oxidoreductase
      activity rather than a separate core function. The binding is transient and
      functional (enzyme-substrate relationship).
    supported_by:
    - reference_id: PMID:33722570
      supporting_text: To identify those proteins that are likely to be direct targets
        for BrxC, the affinity purification was repeated with addition of a 6 M
        guanidine hydrochloride wash to unfold and remove non-covalently associated
        proteins prior to elution with DTT
- term:
    id: GO:0061770
    label: translation elongation factor binding
  evidence_type: IPI
  original_reference_id: PMID:33722570
  review:
    summary: TufA (elongation factor Tu) was retained on the BrxC affinity column
      under stringent conditions, indicating a covalent interaction consistent with
      TufA being an S-bacillithiolated substrate of BrxC.
    action: KEEP_AS_NON_CORE
    reason: TufA was identified as a putative BrxC substrate via affinity trapping,
      consistent with published data that TufA is S-bacillithiolated under oxidative
      stress. This binding reflects substrate recognition rather than a distinct
      core function of BrxC.
    supported_by:
    - reference_id: PMID:33722570
      supporting_text: Among the putative BrxC-target proteins, BrxB and Bdr were
        detected together with several other proteins previously shown to be S-bacillithiolated
        in vivo under oxidative stress conditions. The latter include AbrB, PyrAB,
        PyrG, PyrE, PfkA, GapB, SucC and TufA
- term:
    id: GO:0016491
    label: oxidoreductase activity
  evidence_type: IDA
  original_reference_id: PMID:33722570
  review:
    summary: BrxC functions as a monothiol bacilliredoxin oxidoreductase that catalyzes
      the reductive removal of bacillithiol from S-bacillithiolated proteins. This
      activity was demonstrated in vitro for BrxB-SSB and Bdr-SSB substrates and
      is dependent on the active-site Cys-31 residue.
    action: NEW
    reason: BrxC has demonstrated oxidoreductase activity, specifically debacillithiolation
      of S-bacillithiolated proteins. This is the core molecular function of the
      protein and is well supported by the biochemical data in Gaballa et al. 2021.
    supported_by:
    - reference_id: PMID:33722570
      supporting_text: BrxC is a monothiol bacilliredoxin and functions similarly to
        glutaredoxins
- term:
