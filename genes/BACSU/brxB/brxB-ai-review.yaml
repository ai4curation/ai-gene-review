  title: The Bacillus subtilis monothiol bacilliredoxin BrxC (YtxJ) and the Bdr (YpdA)
    disulfide reductase reduce S-bacillithiolated proteins.
  findings:
  - statement: BrxC can debacillithiolate S-bacillithiolated BrxB, providing a recycling
      pathway for oxidized BrxB.
    supporting_text: BrxC can also debacillithiolate the mixed disulfide form of the
      bacilliredoxin BrxB
  - statement: Bdr functions as an NADPH-dependent bacilliredoxin reductase that can
      regenerate reduced BrxB, enabling cooperative de-bacillithiolation of OhrR.
    supporting_text: Bdr and BrxB function cooperatively to debacillithiolate OhrR,
      a transcription factor regulated by S-bacillithiolation on its sole cysteine residue
