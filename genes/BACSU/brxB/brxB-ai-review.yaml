- term:
    id: GO:0005515
    label: protein binding
  evidence_type: IPI
  original_reference_id: PMID:33722570
  review:
    summary: This annotation records that BrxB interacts with BrxC (YtxJ). While the
      interaction is real (BrxC can debacillithiolate BrxB-SSB), the term "protein binding"
      is uninformative per GO guidelines and should be removed.
    action: REMOVE
    reason: GO:0005515 (protein binding) is uninformative and does not describe the
      actual functional relationship. BrxB is a substrate of BrxC in a de-bacillithiolation
      reaction, which is better captured by the disulfide oxidoreductase and redox
      homeostasis annotations.
    supported_by:
    - reference_id: PMID:33722570
      supporting_text: BrxC can also debacillithiolate the mixed disulfide form of the
        bacilliredoxin BrxB
