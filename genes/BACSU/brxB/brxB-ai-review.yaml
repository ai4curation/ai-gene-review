- term:
    id: GO:0033194
    label: response to hydroperoxide
  evidence_type: IMP
  original_reference_id: PMID:7961792
  review:
    summary: This annotation attributes response to hydroperoxide (IMP) to PMID:7961792,
      which describes the BmrR multidrug transporter regulator and does not contain
      experimental data about brxB/yqiW disruption phenotypes. The brxB gene is adjacent
      to bmr/bmrR on the genome, and PMID:7961792 only determined partial N-terminal
      sequence of the brxB locus. The disruption phenotype data (CHP sensitivity) likely
      originates from PMID:24313874 (Gaballa et al. 2014). This appears to be a reference
      misattribution.
    action: UNDECIDED
    reason: The cited reference PMID:7961792 does not contain experimental evidence
      for brxB disruption phenotype or hydroperoxide response. The paper describes BmrR,
      a multidrug transporter regulator. The actual disruption data appears to come from
      PMID:24313874.
