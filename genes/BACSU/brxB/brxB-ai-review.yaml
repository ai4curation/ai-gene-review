id: P54534
gene_symbol: brxB
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:224308
  label: Bacillus subtilis (strain 168)
description: >-
  BrxB (formerly YqiW) is a dithiol bacilliredoxin that functions in redox homeostasis
  in Bacillus subtilis. It catalyzes the removal of bacillithiol (BSH) from S-bacillithiolated
  proteins (de-bacillithiolation), functioning analogously to glutaredoxins in glutathione-utilizing
  organisms. BrxB contains a CXC (specifically CGC) active site motif where the N-terminal
  cysteine (Cys52) acts as the nucleophilic residue that attacks protein-BSH mixed disulfides,
  and the C-terminal cysteine (Cys54) serves as the resolving residue. Demonstrated substrates
  include the redox-sensing transcription factor OhrR and the methionine synthase MetE. BrxB
  can restore DNA-binding activity to S-bacillithiolated OhrR. The protein is itself a substrate
  of the monothiol bacilliredoxin BrxC and the NADPH-dependent disulfide reductase Bdr, which
  regenerate reduced BrxB for further catalytic cycles. Expression is induced by cumene
  hydroperoxide stress.
