  review:
    summary: BrxB mediates de-bacillithiolation of S-bacillithiolated proteins OhrR and
      MetE, directly maintaining the reduced state of critical protein thiols. This is
      a core function of the protein and well supported by the biochemical evidence.
    action: ACCEPT
    supported_by:
