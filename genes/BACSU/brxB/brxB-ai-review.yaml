suggested_questions:
- question: Is the GO annotation of response to hydroperoxide (IMP) based on PMID:7961792
    a misattribution? The paper describes BmrR and does not appear to contain brxB
    disruption phenotype data.
- question: What is the full spectrum of BrxB substrates beyond OhrR and MetE? Are
    there additional S-bacillithiolated proteins that require BrxB for reduction?
- question: What are the relative contributions of the monothiol versus dithiol mechanisms
    in BrxB-mediated de-bacillithiolation in vivo?
suggested_experiments:
- description: Perform a comprehensive proteomics survey of S-bacillithiolated proteins
    that accumulate in a brxB deletion mutant compared to wild type under oxidative
    stress, to identify the full range of BrxB substrates.
  experiment_type: quantitative proteomics
- description: Determine the crystal structure of BrxB in complex with a BSH-modified
    substrate peptide to elucidate the structural basis for BSH recognition and the
    catalytic mechanism of de-bacillithiolation.
  experiment_type: structural biology
