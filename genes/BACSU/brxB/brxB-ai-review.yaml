core_functions:
- description: >-
    BrxB is a dithiol bacilliredoxin that catalyzes the removal of bacillithiol (BSH)
    from S-bacillithiolated proteins. It reduces BSH-mixed protein disulfides via thiol-disulfide
    exchange using its CXC active site motif. Known substrates include the transcriptional
    repressor OhrR and the methionine synthase MetE. This de-bacillithiolation activity
    is analogous to the glutaredoxin-mediated de-glutathionylation in glutathione-utilizing
    organisms.
