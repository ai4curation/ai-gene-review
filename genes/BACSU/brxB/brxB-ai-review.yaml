references:
- id: GO_REF:0000033
  title: Annotation inferences using phylogenetic trees
  findings: []
- id: PMID:24313874
  title: 'Redox regulation in Bacillus subtilis: The bacilliredoxins BrxA(YphP) and
    BrxB(YqiW) function in de-bacillithiolation of S-bacillithiolated OhrR and MetE.'
  findings:
  - statement: BrxB has de-bacillithiolation activity, removing BSH from S-bacillithiolated
      proteins via its CXC active site motif.
    supporting_text: BrxA and BrxB paralogs have de-bacillithiolation activity
  - statement: The N-terminal Cys of the CXC motif attacks protein-BSH mixed disulfides,
      and BSH is transferred to this residue during the catalytic cycle.
    supporting_text: Both the BrxA and BrxB bacilliredoxins mediate de-bacillithiolation of
      OhrR accompanied by the transfer of BSH to the amino-terminal cysteine of their
      CGC active site motif
  - statement: BrxB can restore DNA-binding activity to S-bacillithiolated OhrR but
      not to S-cysteinylated OhrR, demonstrating substrate specificity for BSH-mixed
      disulfides.
    supporting_text: BrxB can restore DNA-binding activity to OhrR which is S-bacillithiolated,
      but not to OhrR that is S-cysteinylated
  - statement: MetE is efficiently de-bacillithiolated by BrxB at Cys719.
    supporting_text: MetE is most strongly S-bacillithiolated at Cys719 in vitro
      and can be efficiently de-bacillithiolated by both BrxA and BrxB
  - statement: BrxB functions analogously to glutaredoxins in maintaining redox homeostasis.
    supporting_text: Bacilliredoxins function in concert with other thiol-disulfide
      oxidoreductases to maintain redox homeostasis in response to disulfide stress
      conditions
