gene_symbol: yloC
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:224308
  label: Bacillus subtilis (strain 168)
description: YloC is an endoribonuclease in Bacillus subtilis that belongs to the highly
  conserved YicC/YloC family (UPF0701) widespread in bacteria. The enzyme endonucleolytically
  cleaves single-stranded RNA, preferentially at U residues, generating 3'-OH and
  (presumably) 5'-phosphate ends. YloC is a metal-dependent enzyme with highest activity
  in the presence of Mn2+, followed by Mg2+ and Co2+. It oligomerizes, likely as a
  hexamer. YloC has no activity on double-stranded RNA or DNA. The in vivo function
  in B. subtilis remains to be fully elucidated, but heterologous expression in E. coli
  demonstrated that YloC, like its homolog YicC, promotes degradation of the small RNA
  RyhB, suggesting a role in small RNA regulation. A yloC deletion mutant shows no
  visible phenotype, and even a quintuple ribonuclease deletion (pnp, rph, rnr, yhaM,
  yloC) is viable.
existing_annotations:
- term:
    id: GO:0006401
    label: RNA catabolic process
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: This phylogenetic annotation assigns involvement in RNA catabolic process
      based on PANTHER tree inference from characterized orthologs. YloC is an endoribonuclease
      that cleaves single-stranded RNA, which is consistent with a role in RNA catabolism.
      However, the primary evidence from PMID:34815358 suggests YloC may function
      specifically in small RNA regulation rather than general mRNA decay.
    action: ACCEPT
    reason: YloC has demonstrated endoribonuclease activity on single-stranded RNA
      substrates in vitro, and its heterologous expression in E. coli promotes decay
      of the small RNA RyhB. Although its precise in vivo substrates in B. subtilis
      are unknown, involvement in RNA catabolism is well supported by the available
      evidence.
    supported_by:
    - reference_id: PMID:34815358
      supporting_text: YloC is an endoribonuclease and is a member of the highly conserved
        "YicC family" of proteins that is widespread in bacteria
- term:
    id: GO:0016891
    label: RNA endonuclease activity producing 5'-phosphomonoesters, hydrolytic mechanism
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: This phylogenetic annotation from PANTHER assigns a specific RNA endonuclease
      activity term. This is consistent with the direct experimental evidence from
      PMID:34815358 demonstrating that YloC cleaves RNA endonucleolytically via a
      hydrolytic mechanism producing 3'-OH ends and presumably 5'-phosphate ends.
    action: ACCEPT
    reason: The term accurately describes the catalytic mechanism of YloC. The hydrolytic
      mechanism was demonstrated by the absence of phosphate-dependence, and the 3'-OH
      / 5'-phosphate product ends were confirmed by ligation assays.
    supported_by:
    - reference_id: PMID:34815358
      supporting_text: The results of a ribonuclease assay in cell extracts showed
        a limit product of ∼5–7 nt, in the presence or absence of added inorganic
        phosphate, indicating a hydrolytic activity
