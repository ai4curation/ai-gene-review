  title: Discovery and initial characterization of YloC, a novel endoribonuclease
    in Bacillus subtilis.
  findings:
  - statement: YloC was identified as a novel endoribonuclease through biochemical
      fractionation of a quadruple 3' exoribonuclease mutant strain of B. subtilis
    supporting_text: the ribonuclease assay (Fig. 1B) showed clearly that only YloC
      digested the RNA substrate to a limit product that was similar in size to that
      found in the BG505 extract (Fig. 1A). Thus, we identified YloC as a new B. subtilis
      ribonuclease
  - statement: YloC cleaves single-stranded RNA endonucleolytically, with preference
      for U residues
    supporting_text: The results (Fig. 5B) indicated a preference for pyrimidines,
      with poly(U) nucleotide being preferred over poly(C)
  - statement: YloC is a metal-dependent enzyme with highest activity with Mn2+
    supporting_text: YloC RNase activity was dependent on the presence of a divalent
      cation
  - statement: YloC exists as an oligomer, most likely a hexamer
    supporting_text: the 33.5-kDa YloC exists in solution predominantly in an oligomeric
      form, with a molecular weight of >160 kDa
  - statement: YloC promotes degradation of the small RNA RyhB when expressed heterologously
      in E. coli
    supporting_text: Expression of YloC in the E. coli reporter strain resulted in
      increased fluorescence, as measured by a microplate reader and fluorescence microscopy,
      similar to what was observed with the cloned yicC gene
  - statement: YloC interacts with PNPase in E. coli as shown by bacterial two-hybrid
      assay
    supporting_text: These results demonstrated a strong interaction between YloC and
      PNPase
  - statement: Conserved residues H228 and E256 in the C-terminal domain are critical
      for catalytic activity
    supporting_text: YloC H228A and E256A showed drastically reduced activity
  - statement: A yloC knockout has no visible growth phenotype in B. subtilis
    supporting_text: a B. subtilis strain that was deleted for the yloC gene showed
      no overt growth phenotype
core_functions:
- molecular_function:
    id: GO:0016891
    label: RNA endonuclease activity producing 5'-phosphomonoesters, hydrolytic mechanism
  description: YloC is a metal-dependent endoribonuclease that cleaves single-stranded
    RNA preferentially at U residues, generating 3'-OH and 5'-phosphate ends via a
    hydrolytic mechanism. The catalytic site resides in the highly conserved C-terminal
    DUF1732 domain, with H228 and E256 being essential for activity. The enzyme requires
    divalent metal cations (Mn2+ > Mg2+ > Co2+) as cofactors. YloC has no activity
    on double-stranded RNA or DNA.
  directly_involved_in:
  - id: GO:0006401
    label: RNA catabolic process
  supported_by:
  - reference_id: PMID:34815358
    supporting_text: the ribonuclease assay (Fig. 1B) showed clearly that only YloC
      digested the RNA substrate to a limit product that was similar in size to that
      found in the BG505 extract (Fig. 1A). Thus, we identified YloC as a new B. subtilis
      ribonuclease
proposed_new_terms: []
suggested_questions:
- question: What are the in vivo RNA substrates of YloC in B. subtilis, and does it
    play a role in small RNA regulation analogous to YicC in E. coli?
- question: Does YloC interact with PNPase in B. subtilis as it does in the heterologous
    E. coli system, and is this interaction required for its in vivo function?
- question: What is the structural basis for YloC's catalytic mechanism, given that
    the C-terminal DUF1732 domain appears to contain the active site?
suggested_experiments:
- description: Perform RNA-seq or CLASH experiments in wild-type vs yloC deletion
    B. subtilis strains under stress conditions to identify in vivo RNA substrates
    of YloC
- description: Determine the crystal or cryo-EM structure of YloC hexamer to reveal
    the active site architecture and mechanism of metal-dependent RNA cleavage
- description: Test YloC-PNPase interaction in B. subtilis using co-immunoprecipitation
    or bacterial two-hybrid assays to determine if the functional partnership observed
    in E. coli is conserved
