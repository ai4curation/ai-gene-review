- term:
    id: GO:0016891
    label: RNA endonuclease activity producing 5'-phosphomonoesters, hydrolytic mechanism
  evidence_type: IDA
  original_reference_id: PMID:34815358
  review:
    summary: This IDA annotation directly supported by PMID:34815358 assigns the most
      specific RNA endonuclease activity term. The study demonstrated that purified
      recombinant YloC protein cleaves single-stranded RNA endonucleolytically through
      a hydrolytic (phosphate-independent) mechanism, leaving 3'-OH ends. Mutagenesis
      of conserved residues H228 and E256 in the carboxy-terminal domain dramatically
      reduced activity, confirming the activity is intrinsic to YloC.
    action: ACCEPT
    reason: This is the core molecular function of YloC, directly demonstrated by
      biochemical assays with purified protein. The hydrolytic mechanism was confirmed
      by phosphate-independence, endonuclease mode was proven by 3'-end labeling
      experiments, and the activity was validated by site-directed mutagenesis.
    supported_by:
    - reference_id: PMID:34815358
      supporting_text: YloC cleavage products could also be ligated to the DNA oligo,
        even without prior polynucleotide kinase treatment. Thus, YloC cleaves to leave
        a 3′ hydroxyl and, presumably, a 5′ phosphate
    - reference_id: PMID:34815358
      supporting_text: YloC H228A and E256A showed drastically reduced activity
