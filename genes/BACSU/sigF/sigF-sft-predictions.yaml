id: P07860
gene_symbol: sigF
taxon:
  id: uniprot:BACSU
  label: BACSU
status: COMPLETE
description: >-
  BioReason-Pro SFT predictions for sigF (BACSU). 7 GO terms extracted from HF protein_catalogue.
  Reviewed against the curated AIGR review and GOA annotation file. Of 7 predictions: 2 are CNN
  (correct but already in GOA), 1 is UNC (plausible but not well-supported for sigF specifically),
  1 is LSP (generic complex term vs. more specific annotation in GOA), and 3 are NPI (incorrect
  cellular component terms for a cytoplasmic sigma factor). The SFT model correctly identifies
  sigma factor activity and sporulation involvement but fails on cellular localization, predicting
  membrane and spore wall terms that are biologically wrong for a cytoplasmic transcription factor.
  The RL model showed a similar pattern of CC localization errors, indicating a systematic
  confusion between the sigma factor itself and its target gene products.
references:
- id: doi:10.64898/2026.03.19.712954
  title: BioReason-Pro (Fallahpour et al. 2026)
predictions:
# MF prediction: sigma factor activity - correct and already in GOA (IBA + IEA)
- source_method: BioReason-Pro-SFT
  source_version: wanglab/protein_catalogue
  source_reference_id: doi:10.64898/2026.03.19.712954
  predicted_term:
    id: GO:0016987
    label: sigma factor activity
  predicted_term_type: GO_MF
  review:
    assessment: CNN
    confidence_score: 2
    summary: >-
      Correct prediction: sigF is a well-characterized sigma-70 family sigma factor. This term
      is already in GOA with IBA evidence (GO_REF:0000033) and IEA evidence (GO_REF:0000120),
      and is accepted as the primary molecular function in the curated AIGR review. The SFT
      model correctly identifies the core MF of this protein.

# MF prediction: protein binding - generic, uninformative, and not in GOA
- source_method: BioReason-Pro-SFT
  source_version: wanglab/protein_catalogue
  source_reference_id: doi:10.64898/2026.03.19.712954
  predicted_term:
    id: GO:0005515
    label: protein binding
  predicted_term_type: GO_MF
  review:
    assessment: REP
    error_type: FREQUENCY_BIAS
    confidence_score: 0
    summary: >-
      Frequency-biased prediction. While sigF does bind proteins (SpoIIAB anti-sigma factor,
      RNAP core subunits), GO:0005515 (protein binding) is explicitly discouraged in GO
      curation guidelines as it is uninformative without specifying the binding partner or
      functional context. The curated AIGR review flags this term as one to avoid. SigF
      protein-protein interactions are better captured by GO:1903865 (sigma factor antagonist
      complex), which is in GOA. This prediction likely reflects training data frequency bias
      toward common generic MF terms rather than protein-specific function.

# BP prediction: regulation of transcription in response to stress - plausible but not well-supported
- source_method: BioReason-Pro-SFT
  source_version: wanglab/protein_catalogue
  source_reference_id: doi:10.64898/2026.03.19.712954
  predicted_term:
    id: GO:0043620
    label: regulation of DNA-templated transcription in response to stress
  predicted_term_type: GO_BP
  review:
    assessment: UNC
    confidence_score: 2
    summary: >-
      Uncertain. SigF is activated during sporulation, which can be triggered by nutrient stress
      and other environmental signals. However, sigF is not characteristically described as a
      stress-response sigma factor -- that role in B. subtilis belongs to SigB. SigF is the
      forespore-early sigma factor activated after asymmetric septation as part of a developmental
      program, not a general stress response regulator. The curated GOA and AIGR review do not
      include this term; the accepted BP terms are regulation of DNA-templated transcription
      (GO:0006355) and sporulation (GO:0030435). While sporulation onset is stress-linked, the
      mechanistic activation of sigF (partner-switching via SpoIIE/SpoIIAA/SpoIIAB) is
      developmental rather than a canonical stress response. Cannot fully refute but this
      annotation would be misleading given sigF's well-characterized forespore-specific role.

# BP prediction: sporulation - correct and already in GOA
- source_method: BioReason-Pro-SFT
  source_version: wanglab/protein_catalogue
  source_reference_id: doi:10.64898/2026.03.19.712954
  predicted_term:
    id: GO:0030435
    label: sporulation resulting in formation of a cellular spore
  predicted_term_type: GO_BP
  review:
    assessment: CNN
    confidence_score: 2
    summary: >-
      Correct prediction: sigF plays an essential role in sporulation and is already annotated
      with GO:0030435 via IEA evidence (GO_REF:0000043, UniProtKB-KW:KW-0749) in GOA. The
      curated AIGR review accepts this annotation; sigF loss-of-function mutations abolish
      spore formation. The SFT model correctly identifies this biological process.

# CC prediction: protein-containing complex - less specific than existing annotation
- source_method: BioReason-Pro-SFT
  source_version: wanglab/protein_catalogue
  source_reference_id: doi:10.64898/2026.03.19.712954
  predicted_term:
    id: GO:0032991
    label: protein-containing complex
  predicted_term_type: GO_CC
  review:
    assessment: LSP
    confidence_score: 1
    summary: >-
      Less specific than existing annotation. sigF is annotated in GOA with GO:1903865 (sigma
      factor antagonist complex, IBA evidence), which is a child term of protein-containing
      complex. The curated AIGR review accepts the more specific sigma factor antagonist complex
      annotation, reflecting the well-characterized SigF-SpoIIAB inhibitory complex that is
      central to the partner-switching regulatory mechanism. GO:0032991 is a trivially broad
      term; the model should have predicted the more specific GO:1903865.

# CC prediction: plasma membrane - incorrect for a cytoplasmic sigma factor
- source_method: BioReason-Pro-SFT
  source_version: wanglab/protein_catalogue
  source_reference_id: doi:10.64898/2026.03.19.712954
  predicted_term:
    id: GO:0005886
    label: plasma membrane
  predicted_term_type: GO_CC
  review:
    assessment: NPI
    error_type: PATHWAY_CONTEXT_IGNORED
    confidence_score: 0
    summary: >-
      Incorrect. sigF encodes a cytoplasmic sigma factor that associates with the RNA polymerase
      core enzyme in the cytoplasm. It is not a membrane protein and is not localized to the
      plasma membrane. UniProt does not annotate sigF with any membrane localization. The RL
      review similarly flagged membrane-associated CC predictions as incorrect. This error likely
      reflects the model confusing the sigma factor itself with membrane-associated sporulation
      proteins (e.g., SpoIIE, which is a septal membrane protein that regulates SigF but is not
      SigF itself), or conflating sigF with the downstream targets of the SigF regulon which
      include membrane-associated proteins.

# CC prediction: spore wall - incorrect for a transcription factor
- source_method: BioReason-Pro-SFT
  source_version: wanglab/protein_catalogue
  source_reference_id: doi:10.64898/2026.03.19.712954
  predicted_term:
    id: GO:0031160
    label: spore wall
  predicted_term_type: GO_CC
  review:
    assessment: NPI
    error_type: PATHWAY_CONTEXT_IGNORED
    confidence_score: 0
    summary: >-
      Incorrect. sigF is a cytoplasmic sigma factor (transcription initiation factor) and has
      no structural role in the spore wall. GO:0031160 (spore wall) is an appropriate annotation
      for structural spore wall proteins (e.g., CotA, CotB, SpoVID), not for the transcription
      factors that regulate their expression. The RL review likewise flagged spore wall as an
      incorrect CC prediction. This represents a category-level error: the model predicts the
      cellular compartment associated with sporulation rather than the compartment where the
      transcription factor itself resides and functions.
