description: aadK encodes an aminoglycoside nucleotidyltransferase in Bacillus subtilis (strain 168). UniProt/CARD identify this entry as an aminoglycoside-modifying resistance enzyme that inactivates aminoglycoside antibiotics by adenylylation/nucleotidyl transfer. UniProt names the protein 'Aminoglycoside 6-adenylyltransferase' (accession P17585).
