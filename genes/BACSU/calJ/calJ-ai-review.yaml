id: O31539
gene_symbol: calJ
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:224308
  label: Bacillus subtilis (strain 168)
description: CalJ (BsYetJ) is a pH-sensitive calcium channel belonging to the transmembrane
  Bax inhibitor motif (TMBIM) protein family. It is a 7-transmembrane helix integral
  membrane protein that mediates calcium ion flux across the plasma membrane in a
  pH-dependent manner. The channel is regulated by a conserved aspartyl dyad (Asp171-Asp195)
  that acts as both a pH sensor and calcium gating mechanism. Protonation of Asp171
  weakens its interaction with Arg60, facilitating pore opening via lateral movement
  of TM2. Calcium binding is inhibited by monovalent cations (Na+, K+, Li+) and
  lanthanides (Gd3+, Yb3+, Lu3+), but not by Mg2+ or Mn2+. CalJ functions as a
  monomer and is the bacterial prototype for understanding TMBIM family Ca2+ leak
  channels, which in eukaryotes regulate calcium homeostasis, cell death, and disease
  progression.
existing_annotations:
- term:
    id: GO:0005262
    label: calcium channel activity
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: Phylogenetic inference of calcium channel activity is well supported
      by direct experimental evidence from multiple studies demonstrating that BsYetJ
      mediates pH-dependent calcium flux in proteoliposomes and permeabilized mammalian
      cells.
    action: ACCEPT
    reason: The IBA annotation is consistent with extensive experimental characterization
      of BsYetJ as a calcium channel. Crystal structures in open and closed conformations,
      45Ca2+ binding assays, and Ca2+ flux assays in proteoliposomes and permeabilized
      HeLa cells all confirm calcium channel activity.
- term:
    id: GO:0030162
    label: regulation of proteolysis
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: This annotation is inferred from phylogenetic association with eukaryotic
      TMBIM family members that have anti-apoptotic (Bax inhibitor) activity. However,
      there is no direct evidence that BsYetJ regulates proteolysis in B. subtilis.
      The TMBIM family was originally identified through Bax inhibition screening in
      yeast, but the anti-apoptotic function is a eukaryotic adaptation linked to
      calcium homeostasis regulation, not a conserved proteolytic regulatory function.
    action: REMOVE
    reason: No evidence supports a role for BsYetJ in regulation of proteolysis in
      bacteria. The phylogenetic inference from eukaryotic TMBIM family members that
      suppress apoptosis is not transferable to this bacterial protein, as apoptotic
      pathways involving Bax do not exist in B. subtilis.
- term:
    id: GO:0005886
    label: plasma membrane
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: Localization to the plasma membrane is consistent with the UniProt annotation
      indicating cell membrane localization and with the multi-pass transmembrane topology
      determined by X-ray crystallography.
    action: ACCEPT
    reason: BsYetJ is a 7-transmembrane helix protein. As a bacterial protein without
      intracellular organellar membranes, plasma membrane localization is the expected
      location and is supported by structural data.
- term:
    id: GO:0005886
    label: plasma membrane
  evidence_type: IEA
  original_reference_id: GO_REF:0000044
  review:
    summary: Automatic annotation from UniProt subcellular location vocabulary mapping.
      Consistent with the experimentally determined multi-pass transmembrane topology
      and bacterial cell membrane localization.
    action: ACCEPT
    reason: The IEA annotation is redundant with the IBA annotation but is correct.
      UniProt records BsYetJ as a cell membrane multi-pass membrane protein based
      on crystallographic evidence.
- term:
    id: GO:0070588
    label: calcium ion transmembrane transport
  evidence_type: IEA
  original_reference_id: GO_REF:0000108
  review:
    summary: Logical inference from calcium channel activity (GO:0005262) to calcium
      ion transmembrane transport is valid and well supported by direct experimental
      evidence showing Ca2+ flux across membranes.
    action: ACCEPT
    reason: BsYetJ mediates calcium ion transport across membranes as demonstrated
      by 45Ca2+ flux assays in proteoliposomes and permeabilized HeLa cells. The
      logical inference from the IDA-supported calcium channel activity annotation
      is sound.
- term:
    id: GO:0005262
    label: calcium channel activity
  evidence_type: IDA
  original_reference_id: PMID:30930064
  review:
    summary: Direct experimental evidence from multiple assays demonstrates that BsYetJ
      has calcium channel activity. The protein mediates Ca2+ efflux from ER stores
      in permeabilized HeLa cells, binds 45Ca2+ in a pH-dependent manner with an
      EC50 of 65.4 uM, and crystal structures reveal open and closed conformations
      consistent with a gated channel mechanism.
    action: ACCEPT
    reason: This is the core molecular function of CalJ, supported by comprehensive
      biochemical and structural evidence.
    supported_by:
    - reference_id: PMID:30930064
      supporting_text: addition of 2.5 μM BsYetJ provoked a major increase in the
        45Ca2+ release
- term:
    id: GO:0006816
    label: calcium ion transport
  evidence_type: IDA
  original_reference_id: PMID:30930064
  review:
    summary: BsYetJ mediates calcium ion transport as demonstrated by 45Ca2+ flux
      assays. This biological process annotation is well supported by the direct
      experimental evidence showing Ca2+ flux across membranes in multiple systems.
    action: ACCEPT
    reason: Calcium ion transport is the core biological process enabled by CalJ's
      calcium channel activity, supported by reconstitution experiments in proteoliposomes
      and permeabilized cells.
    supported_by:
    - reference_id: PMID:30930064
      supporting_text: bacterial BsYetJ, when added to permeabilized human HeLa cells,
        may reconstitute to the membranes of intracellular Ca2+ stores, thereby functioning
        as Ca2+-permeable channel-like proteins that mediate Ca2+ flux across membranes
- term:
    id: GO:0016020
    label: membrane
  evidence_type: IDA
  original_reference_id: PMID:30930064
  review:
    summary: BsYetJ is an integral membrane protein with 7 transmembrane helices as
      determined by X-ray crystallography. The term GO:0016020 (membrane) is correct
      but less specific than GO:0005886 (plasma membrane).
    action: MODIFY
    reason: While the annotation is correct, the more specific term GO:0005886 (plasma
      membrane) should be used for this bacterial protein, as it localizes to the cell
      membrane and has no intracellular membrane compartments.
    proposed_replacement_terms:
    - id: GO:0005886
      label: plasma membrane
    supported_by:
    - reference_id: PMID:30930064
      supporting_text: These structures reveal a unique fold of 7 transmembrane helices
        (TM) with its second transmembrane helix (TM2) capable of opening and closing
        laterally within the membrane bilayer
