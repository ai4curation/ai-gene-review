- id: PMID:30930064
  title: Ion and pH Sensitivity of a TMBIM Ca(2+) Channel.
  findings:
  - statement: BsYetJ mediates Ca2+ flux from ER calcium stores in permeabilized mammalian
      cells
    supporting_text: addition of 2.5 μM BsYetJ provoked a major increase in the
      45Ca2+ release
  - statement: Ca2+ binding by BsYetJ is pH-dependent with a bell-shaped profile
      peaking at pH 7.5
    supporting_text: Ca2+ binding was pH dependent in bell-shaped fashion, with higher
      activity at pH 7.5 and lower activity at pH 6 and 8
  - statement: Monovalent cations Na+, K+, and Li+ inhibit Ca2+ binding at physiological
      concentrations
    supporting_text: Na+, K+ and Li+ inhibited 45Ca2+ binding with IC50 of 18.5±5.7
      mM, 14.0 ± 3.9 mM, and 16.1 ± 6.5 mM, respectively
  - statement: Mg2+ and Mn2+ do not inhibit Ca2+ binding, while lanthanides Gd3+,
      Yb3+, and Lu3+ do
    supporting_text: Mg2+ and Mn2+ had no apparent inhibition of Ca2+ binding (Figure
      1E), while Yb3+ and Lu3+, and most notably Gd3+, inhibited Ca2+ binding
  - statement: The conserved Asp171-Asp195 dyad is critical for Ca2+ affinity and pH-dependent
      gating
    supporting_text: both mutants have much weaker Ca2+ affinity relative to the wild-type,
      suggesting that Asp171 and Asp195 play a critical role in BsYetJ function
  - statement: D171E and D195E mutant structures are in open conformations even at
      neutral pH, indicating disrupted gating
    supporting_text: The two mutant structures are in their open conformations even
      though they were crystallized at a neutral pH 7.5 (D171EBsYetJ) and 7.0 (D195EBsYetJ)
  - statement: MD simulations show protonation of Asp171 weakens Arg60-Asp171 salt
      bridge, facilitating channel opening
    supporting_text: protonation of Asp171 not only disrupted the Arg60-Asp171 salt
      bridge, the conformation of the Asp171-Asp195 dyad is different from the Asp171-deprotonated
      condition as well
  - statement: BsYetJ Ca2+ flux activity is conserved from bacteria to humans
    supporting_text: it provides direct evidence that the Ca2+-flux property of TMBIM-related
      proteins is highly conserved from bacteria to human, indicating that the ability
      to mediate Ca2+ flux is an inherent property of the TMBIM family occurring already
      very early in evolution
