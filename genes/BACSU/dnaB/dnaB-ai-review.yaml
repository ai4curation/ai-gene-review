- term:
    id: GO:0006260
    label: DNA replication
  evidence_type: IMP
  original_reference_id: PMID:3027697
  review:
    summary: DnaB is essential for DNA replication initiation in B. subtilis. Temperature-sensitive
      dnaB mutants lose the ability to initiate chromosome replication at non-permissive
      temperature. DnaB functions in the ordered assembly of the replisome at oriC,
      acting after DnaA and DnaD to facilitate loading of the DnaC replicative helicase.
      It is also required for replication restart at stalled forks. This is a well-supported
      core annotation.
    action: ACCEPT
    reason: Strong experimental evidence from multiple studies demonstrates that DnaB
      is essential for DNA replication, both for initiation at oriC and for replication
      restart.
    supported_by:
    - reference_id: PMID:3027697
      supporting_text: The dnaB gene is essential for both replication initiation and
        membrane attachment of the origin region of the chromosome and plasmid pUB110
core_functions:
- description: DnaB functions as a replicative helicase loader, helping DnaI load the
    DnaC replicative helicase onto single-stranded DNA during both replication initiation
    at oriC and replication restart at stalled forks. It acts as part of an ordered
    assembly pathway (DnaA > DnaD > DnaB > DnaI-DnaC) at the origin of replication.
    DnaB weakly binds ssDNA and preferentially binds dsDNA and replication fork-like
    substrates.
