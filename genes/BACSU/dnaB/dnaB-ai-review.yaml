id: P07908
gene_symbol: dnaB
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:224308
  label: Bacillus subtilis (strain 168)
description: DnaB is a replicative helicase loading and DNA remodeling protein essential
  for DNA replication in Bacillus subtilis. It functions as part of the ordered assembly
  of the DNA replisome at the origin of replication (oriC), acting after DnaA and DnaD
  but before the DnaI-DnaC helicase loading step. DnaB helps load the DnaC replicative
  helicase onto single-stranded DNA together with DnaI. It is also a component of the
  replication restart primosome, which reloads the helicase at sites other than oriC.
  DnaB forms homotetramers and higher-order oligomers, binds both single-stranded and
  double-stranded DNA, and remodels DNA by laterally compacting supercoiled and linear
  DNA. It is essential for both replication initiation and membrane attachment of the
  chromosomal origin region. DnaB localizes to both the cytoplasm and cell membrane,
  and its C-terminal proteolytic processing regulates its oligomerization and localization
  at oriC. DnaB interacts with DnaD, DnaC, and the cell cycle regulator CcrZ.
