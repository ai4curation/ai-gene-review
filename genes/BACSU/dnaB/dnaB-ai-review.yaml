    label: protein binding
  evidence_type: IPI
  original_reference_id: PMID:35576203
  review:
    summary: This annotation records a physical interaction between DnaB and the cell
      cycle regulator CcrZ, detected by bacterial two-hybrid assay. While the interaction
      is real, the term "protein binding" (GO:0005515) is uninformative per GO annotation
      guidelines and should be removed.
