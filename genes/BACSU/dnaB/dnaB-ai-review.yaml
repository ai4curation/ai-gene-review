existing_annotations:
- term:
    id: GO:0005737
    label: cytoplasm
  evidence_type: IEA
  original_reference_id: GO_REF:0000044
  review:
    summary: DnaB localizes to the cytoplasm as shown by fluorescence microscopy studies.
      Full-length DnaB forms foci near both cell poles and in the middle of cells.
      C-terminally truncated DnaB is found only in cytoplasmic fractions. This IEA
      annotation based on UniProt subcellular location mapping is consistent with
      experimental evidence from multiple studies (PMID:10844689, PMID:20071750).
    action: ACCEPT
    reason: Consistent with experimental evidence showing cytoplasmic localization of DnaB.
- term:
    id: GO:0005886
    label: plasma membrane
  evidence_type: IEA
  original_reference_id: GO_REF:0000044
  review:
    summary: DnaB associates with the cell membrane, and this association is functionally
      important for membrane attachment of the chromosomal origin region. Temperature-sensitive
      dnaB mutants lose membrane association of the origin region at non-permissive
      temperature. This IEA annotation is well supported by experimental evidence from
      multiple studies (PMID:15186423, PMID:20071750, PMID:6771760).
    action: ACCEPT
    reason: Consistent with experimental evidence showing membrane association of DnaB
      is essential for origin region membrane attachment.
