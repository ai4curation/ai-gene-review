taxon:
  id: NCBITaxon:224308
  label: Bacillus subtilis (strain 168)
description: Bacilliredoxin BrxA (formerly YphP) is a dithiol bacilliredoxin that functions
  in de-bacillithiolation, removing bacillithiol (BSH) from S-bacillithiolated proteins
  under oxidative stress. BSH is the major low-molecular-weight thiol in Firmicutes,
  functionally analogous to glutathione in other organisms. BrxA uses a CXC (CGC) active
  site motif, with Cys53 as the attacking nucleophile, to cleave mixed disulfide bonds
  between BSH and target proteins such as OhrR and MetE. The protein is structurally
  related to thioredoxins but has a reduction potential of -130 mV consistent with
  disulfide isomerase/oxidase activity. BrxA also displays weak protein disulfide
  isomerase activity in vitro. Expression is upregulated by cumene hydroperoxide,
  and the protein contributes to redox homeostasis during disulfide stress.
