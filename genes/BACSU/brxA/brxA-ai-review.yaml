references:
- id: GO_REF:0000033
  title: Annotation inferences using phylogenetic trees
  findings: []
- id: PMID:19653655
  title: Structure and function of Bacillus subtilis YphP, a prokaryotic disulfide
    isomerase with a CXC catalytic motif.
  findings:
  - statement: BrxA (YphP) has a thioredoxin-like fold with a CXC (CGC) active site
      motif located at Cys53-Gly54-Cys55.
    supporting_text: The protein shows remarkable structural similarity to thioredoxins,
      with a canonical alphabetaalphabetaalphabetabetaalpha topology, despite low amino
      acid sequence identity to thioredoxin. The CXC motif is found in the loop immediately
      downstream of the first beta-strand
  - statement: The reduction potential of BrxA is -130 mV, consistent with disulfide
      isomerase or oxidase activity rather than reductase activity.
    supporting_text: The experimentally determined reduction potential of YphP is E
      degrees' = -130 mV, significantly higher than that of thioredoxin and consistent
      with disulfide isomerase activity
  - statement: BrxA catalyzes isomerization of disulfide bonds in scrambled tachyplesin
      I with kcat/KM of 4.7 x 10^3 M-1 s-1, approximately 3% of PDI activity.
    supporting_text: YphP was able to catalyze the isomerization of non-native to
      native disulfide bonds using tachyplesin I peptide as a substrate, yielding a
      kcat/KM value of (4.7 ± 0.03) × 103 M−1 s−1. This activity is ∼3% that of
      protein disulfide isomerase (PDI)
  - statement: Both Cys53 and Cys55 individually can catalyze disulfide isomerization,
      but the double mutant C53A/C55A abolishes activity.
    supporting_text: both of these variants catalyzed the isomerization of disulfide
      bonds in the scrambled tachyplesin substrate. The C53A and C55A variants had
      kcat/KM values of (2.6 ± 0.2) × 103 and (3.3 ± 0.1) × 103 M−1 s−1, respectively,
      only slightly lower than that of the wild-type protein. Yet, when both active
      site cysteine residues were replaced with alanines, resulting in the C53A/C55A
      variant, isomerase activity was abolished completely
- id: PMID:24313874
  title: 'Redox regulation in Bacillus subtilis: The bacilliredoxins BrxA(YphP) and
    BrxB(YqiW) function in de-bacillithiolation of S-bacillithiolated OhrR and MetE.'
  findings:
  - statement: BrxA and BrxB are bacilliredoxins that catalyze de-bacillithiolation
      of S-bacillithiolated proteins OhrR and MetE.
    supporting_text: BrxA and BrxB paralogs have de-bacillithiolation activity. This
      Brx activity results from attack of the amino-terminal Cys residue in a CGC
      motif on protein BSH-mixed disulfides
  - statement: De-bacillithiolation by BrxA proceeds through transfer of BSH to the
      amino-terminal cysteine of the CGC active site motif.
    supporting_text: Both the BrxA and BrxB bacilliredoxins mediate de-bacillithiolation
      of OhrR accompanied by the transfer of BSH to the amino-terminal cysteine of
      their CGC active site motif
  - statement: BrxA and BrxB represent a new class of bacterial redox-regulatory
      proteins analogous to glutaredoxins.
    supporting_text: These results provide biochemical evidence for a new class of
      bacterial redox-regulatory proteins, the bacilliredoxins, which function analogously
      to glutaredoxins
  - statement: Bacilliredoxins maintain redox homeostasis in response to disulfide
      stress conditions.
    supporting_text: Bacilliredoxins function in concert with other thiol-disulfide
      oxidoreductases to maintain redox homeostasis in response to disulfide stress
      conditions
