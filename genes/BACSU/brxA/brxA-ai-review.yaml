- term:
    id: GO:0003756
    label: protein disulfide isomerase activity
  evidence_type: IMP
  original_reference_id: PMID:19653655
  review:
    summary: BrxA (YphP) was shown to catalyze isomerization of non-native to native
      disulfide bonds in scrambled tachyplesin I substrate in vitro, with a kcat/KM
      of 4.7 x 10^3 M-1 s-1, approximately 3% of the activity of protein disulfide
      isomerase (PDI). Single Cys-to-Ala mutants (C53A, C55A) retained activity, but
      the double mutant C53A/C55A abolished activity. However, subsequent work
      (PMID:24313874) established that the primary biological function is
      de-bacillithiolation rather than disulfide isomerization.
    action: KEEP_AS_NON_CORE
    reason: While the in vitro disulfide isomerase activity is experimentally demonstrated,
      it is weak (3% of PDI activity) and is unlikely to represent the primary biological
      function. The 2014 study by Gaballa et al. established that BrxA functions
      primarily as a bacilliredoxin in de-bacillithiolation. The disulfide isomerase
      activity may be a secondary consequence of the thioredoxin-like fold and CXC
      active site.
    supported_by:
    - reference_id: PMID:19653655
      supporting_text: the protein displays a level of isomerase activity that might
        be biologically significant
    - reference_id: PMID:19653655
      supporting_text: YphP was able to catalyze the isomerization of non-native to
