proposed_new_terms: []
suggested_questions:
- question: What is the complete set of S-bacillithiolated protein substrates for BrxA
    in vivo, beyond OhrR and MetE?
- question: Is there functional redundancy or specialization between BrxA and BrxB
    for specific substrates?
- question: What is the electron donor that regenerates reduced BrxA after
    de-bacillithiolation?
- question: Does the weak in vitro disulfide isomerase activity have any biological
    relevance in vivo?
suggested_experiments:
- description: Proteome-wide identification of BrxA substrates using trapping mutants
    (e.g., C55A) combined with mass spectrometry under oxidative stress conditions
  hypothesis: BrxA likely de-bacillithiolates additional protein substrates beyond
    OhrR and MetE, particularly enzymes with reactive cysteines important for catalysis
- description: Comparative phenotypic analysis of brxA, brxB, and brxA/brxB double
    deletion mutants under various oxidative stress conditions (NaOCl, CHP, diamide)
  hypothesis: brxA and brxB have partially overlapping substrate specificities, and
    double deletion will show more severe oxidative stress sensitivity than single
    deletions
- description: Identification of the physiological electron donor for BrxA regeneration,
    testing candidates such as thioredoxin, NADPH-dependent reductases, or BSH itself
  hypothesis: A dedicated thiol-disulfide reductase (possibly Bdr/YpdA) regenerates
    BrxA after de-bacillithiolation, analogous to glutathione reductase regenerating
    glutaredoxins
