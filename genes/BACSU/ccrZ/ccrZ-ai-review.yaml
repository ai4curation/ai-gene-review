  title: CcrZ is a pneumococcal spatiotemporal cell cycle regulator that interacts
    with FtsZ and controls DNA replication by modulating the activity of DnaA.
  findings:
    - statement: CcrZ is essential in S. pneumoniae and conserved in Firmicutes including B. subtilis
      supporting_text: "CcrZ couples cell division with DNA replication by controlling the activity of the master initiator of DNA replication, DnaA"
    - statement: B. subtilis ccrZ deletion causes reduced DNA replication initiation
      supporting_text: "deletion or depletion of CcrZ caused a clear reduction in oriC/ter ratios"
    - statement: B. subtilis ccrZ mutants are morphologically altered but not anucleate
      supporting_text: "no anucleate cells were observed for B. subtilis"
    - statement: B. subtilis CcrZ does not localize to mid-cell like in S. pneumoniae
      supporting_text: "CcrZSa and CcrZBs did not localize as clear rings at mid-cell in S. aureus and B. subtilis"
    - statement: Suppressor mutations in dnaA and yabA rescue ccrZ deletion
      supporting_text: "mutations that increase the rate of initiation of DNA replication can rescue the ∆ccrZ phenotype"
- id: PMID:35576203
  title: Structure and kinase activity of bacterial cell cycle regulator CcrZ.
  findings:
    - statement: CcrZ deletion sensitizes cells to diverse DNA damaging agents
      supporting_text: "Deletion of ccrZ renders cells sensitive to the crosslinking agent MMC [32], the methylating agent methyl methanesulfonate (MMS) [33], the topoisomerase inhibitor ciprofloxacin [34], and the break inducing peptide phleomycin [35] (Fig 1A)"
    - statement: CcrZ overexpression causes over-initiation of DNA replication
      supporting_text: "overexpression of ccrZ results in over-initiation of DNA replication further supporting the model that CcrZ acts to regulate replication initiation"
    - statement: CcrZ interacts with DnaA domains I and III, and with DnaB
      supporting_text: "we tested CcrZ against DnaA domains I and III and identified an interaction between CcrZ and both DnaA domains for some of the two-hybrid constructs"
    - statement: Crystal structure reveals choline kinase-like fold with wider inter-lobe cleft
      supporting_text: "The overall three-dimensional structure of CcrZ resembles that of LicA choline kinase in S. pneumoniae and other related kinases, consisting of a bilobal structure with a cleft between the two lobes for binding ATP and substrate"
    - statement: CcrZ phosphorylates D-ribose and 2-deoxy-D-ribose but not choline
      supporting_text: "CcrZ ATPase activity was stimulated in the presence of D-ribose and 2-deoxy-D-ribose at similar levels"
    - statement: Kinase active site integrity is required for in vivo function
      supporting_text: "ablation of the kinase active site results in a mutant unable to complement the ΔccrZ phenotype, demonstrating that kinase activity is required for function in vivo"
    - statement: YabA and CcrZ function in the same genetic pathway
      supporting_text: "When we combine the yabA null with ΔccrZ, we observe the single ΔccrZ phenotype suggesting genetic interaction"

core_functions:
  - molecular_function:
      id: GO:0004747
      label: ribokinase activity
    description: >-
      CcrZ is a kinase that phosphorylates D-ribose and 2-deoxy-D-ribose using ATP. The crystal
      structure reveals a choline kinase-like fold with a restructured substrate-binding pocket adapted
      for sugar substrates. The catalytic residue D166 is essential for activity both in vitro and
      in vivo. CcrZ may phosphorylate a ribose-like metabolite as a second messenger to signal
      replication initiation timing.
    directly_involved_in:
      - id: GO:0006270
        label: DNA replication initiation
    locations:
      - id: GO:0005737
        label: cytoplasm

  - molecular_function:
      id: GO:0019200
      label: carbohydrate kinase activity
    description: >-
      CcrZ functions as a carbohydrate kinase, phosphorylating sugar substrates including D-ribose
      and 2-deoxy-D-ribose. This kinase activity is coupled to cell cycle regulation, as the
      phosphorylated product may serve as a signaling molecule that modulates DnaA-dependent
      replication initiation.
    directly_involved_in:
      - id: GO:0006974
        label: DNA damage response
    locations:
      - id: GO:0005737
        label: cytoplasm

suggested_questions:
  - question: >-
      What is the physiological substrate of CcrZ in vivo? While D-ribose and 2-deoxy-D-ribose
      stimulate activity in vitro, the actual in vivo substrate and phosphorylated product
      that signals to DnaA remain unknown.
  - question: >-
      How does CcrZ mechanistically regulate DnaA activity? CcrZ interacts with DnaA domains
      I and III and DnaB, but whether regulation occurs through direct protein-protein interaction,
      phosphorylation of a second messenger, or both is unclear.
  - question: >-
      Why does B. subtilis ccrZ deletion show milder phenotypes than S. pneumoniae? B. subtilis
      ΔccrZ cells have no anucleate cells and normal growth rate, unlike the severe phenotypes
      in pneumococci, suggesting redundant regulatory mechanisms in B. subtilis.
  - question: >-
      What is the relationship between CcrZ kinase activity and the DNA damage response? CcrZ
      deletion causes sensitivity to diverse DNA damaging agents, but it is unclear whether this
      reflects a direct role in DNA repair or is secondary to replication initiation defects.

suggested_experiments:
  - description: >-
      Metabolomics analysis of ΔccrZ versus wild-type B. subtilis cells to identify the in vivo
      phosphorylated product of CcrZ. Comparing metabolite profiles could reveal the second
      messenger that signals to DnaA for replication initiation.
  - description: >-
      Co-immunoprecipitation or crosslinking mass spectrometry of CcrZ with DnaA and DnaB in
      B. subtilis to map the interaction interfaces and determine whether kinase activity
      modulates these protein-protein interactions.
  - description: >-
      Time-resolved ChIP-seq of DnaA at oriC in synchronized ΔccrZ and wild-type cells to
      determine whether CcrZ affects DnaA occupancy at the origin during the cell cycle.
  - description: >-
      Structure-guided mutagenesis of the CcrZ substrate-binding pocket to identify residues
      critical for substrate recognition, combined with in vitro kinase assays using candidate
      metabolites structurally related to ribose.

