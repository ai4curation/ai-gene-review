id: C0SPC1
gene_symbol: ccrZ
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:224308
  label: Bacillus subtilis (strain 168)
description: >-
  CcrZ (Cell Cycle Regulator protein interacting with FtsZ) is a conserved kinase in Bacillus subtilis
  that couples DNA replication initiation with cell cycle progression. Structurally related to choline
  kinases, CcrZ has evolved to phosphorylate ribose-like substrates rather than choline. The crystal
  structure reveals a bilobal fold with a pronounced inter-lobe cleft harboring the ATP-binding site
  and a restructured substrate-binding pocket. CcrZ interacts with the replication initiation proteins
  DnaA (domains I and III) and DnaB, and functions in the same genetic pathway as the negative initiation
  regulator YabA. Deletion of ccrZ causes sensitivity to diverse DNA damaging agents and significant
  induction of the SOS response, while overexpression leads to over-initiation of DNA replication and
  cell elongation. The kinase active site is essential for in vivo function, suggesting CcrZ may
  phosphorylate a second messenger or metabolite to regulate DnaA-dependent replication initiation timing.
existing_annotations:
- term:
    id: GO:0006270
    label: DNA replication initiation
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      CcrZ regulates DNA replication initiation in B. subtilis. Deletion causes under-initiation and
      overexpression causes over-initiation. This phylogenetically inferred annotation is well supported
      by experimental data from both B. subtilis and S. pneumoniae.
    action: ACCEPT
    reason: >-
      DNA replication initiation is a core biological process for CcrZ. Both PMID:34373624 and
      PMID:35576203 provide direct experimental evidence in B. subtilis for CcrZ involvement in
      replication initiation through oriC/ter ratio measurements and genetic interactions with DnaA
      and YabA.
    supported_by:
      - reference_id: PMID:34373624
        supporting_text: "deletion or depletion of CcrZ caused a clear reduction in oriC/ter ratios"
      - reference_id: PMID:35576203
        supporting_text: "overexpression of ccrZ results in over-initiation of DNA replication further supporting the model that CcrZ acts to regulate replication initiation"

- term:
    id: GO:0006974
    label: DNA damage response
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      CcrZ is involved in the DNA damage response in B. subtilis. Deletion causes sensitivity to a
      broad range of DNA damaging agents and significant SOS induction. This phylogenetic annotation
      is well supported by direct experimental evidence.
    action: ACCEPT
    reason: >-
      DNA damage response involvement is well supported by PMID:35576203 showing ΔccrZ is sensitive
      to MMC, MMS, ciprofloxacin, phleomycin, and UV, and that both deletion and overexpression
      induce the SOS response.
    supported_by:
      - reference_id: PMID:35576203
        supporting_text: "Deletion of ccrZ renders cells sensitive to the crosslinking agent MMC [32], the methylating agent methyl methanesulfonate (MMS) [33], the topoisomerase inhibitor ciprofloxacin [34], and the break inducing peptide phleomycin [35]"
      - reference_id: PMID:35576203
        supporting_text: "We found significant SOS induction in cells lacking ccrZ compared to WT with ~6% of ΔccrZ B. subtilis cells showing induction"

- term:
    id: GO:0016301
    label: kinase activity
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      CcrZ has kinase activity demonstrated in vitro. The crystal structure confirms a kinase fold
      and ATPase assays show activity on D-ribose and 2-deoxy-D-ribose. However, this is redundant
      with the more specific ribokinase activity and carbohydrate kinase activity annotations.
    action: KEEP_AS_NON_CORE
    reason: >-
      Kinase activity is correct but is a broad parent term. More specific child terms (ribokinase
      activity GO:0004747, carbohydrate kinase activity GO:0019200) are already annotated with direct
      experimental evidence from PMID:35576203. The IBA annotation is not wrong but is less informative.
    supported_by:
      - reference_id: PMID:35576203
        supporting_text: "CcrZ ATPase activity was stimulated in the presence of D-ribose and 2-deoxy-D-ribose at similar levels"

- term:
    id: GO:0004747
    label: ribokinase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  review:
    summary: >-
      Ribokinase activity from automated annotation based on EC:2.7.1.15 mapping. This is consistent
      with the direct experimental evidence from PMID:35576203 showing ATPase activity stimulated
      by D-ribose.
    action: ACCEPT
    reason: >-
      This IEA annotation is consistent with the IDA annotation for the same term from PMID:35576203.
      CcrZ has been experimentally demonstrated to phosphorylate D-ribose in vitro.
    supported_by: []

- term:
    id: GO:0005737
    label: cytoplasm
  evidence_type: IEA
  original_reference_id: GO_REF:0000044
  review:
    summary: >-
      Cytoplasmic localization inferred from UniProt subcellular location mapping. CcrZ is a
      soluble cytoplasmic protein (monomer in solution by size-exclusion chromatography).
    action: ACCEPT
    reason: >-
      Cytoplasm is the correct cellular component annotation. The UniProt record indicates
      cytoplasmic localization by similarity to S. pneumoniae CcrZ. Size-exclusion chromatography
      confirms CcrZ is a soluble monomer in solution.
    supported_by:
      - reference_id: PMID:35576203
        supporting_text: "size-exclusion analysis of purified CcrZ obtained recombinantly from E. coli suggests that CcrZ protein is a monomer in solution"

- term:
    id: GO:0004747
    label: ribokinase activity
  evidence_type: IDA
  original_reference_id: PMID:35576203
  review:
    summary: >-
      CcrZ demonstrates ribokinase activity in vitro. ATPase assays show activity on D-ribose
      and 2-deoxy-D-ribose, and the catalytic residue D166 is required for this activity. The
      protein has evolved from a choline kinase fold to phosphorylate ribose-like substrates.
    action: ACCEPT
    reason: >-
      Ribokinase activity is a core molecular function of CcrZ, directly demonstrated in vitro
      by ATPase assays using purified protein. The D166A catalytic mutant abolishes activity,
      confirming the specificity of the assay.
    supported_by:
      - reference_id: PMID:35576203
        supporting_text: "CcrZ ATPase activity was stimulated in the presence of D-ribose and 2-deoxy-D-ribose at similar levels"
      - reference_id: PMID:35576203
        supporting_text: "Alanine substitution of the catalytic D166 residue in the phosphotransferase motif abolished ATPase activity, confirming that purified CcrZ is responsible for the activity detected"

- term:
    id: GO:0005515
    label: protein binding
  evidence_type: IPI
  original_reference_id: PMID:35576203
  review:
    summary: >-
      CcrZ interacts with DnaA (P07908) as shown by bacterial two-hybrid assays. Interaction was
      detected with DnaA domains I and III but not full-length DnaA.
    action: REMOVE
    reason: >-
      Protein binding (GO:0005515) is uninformative per GO annotation guidelines. The interaction
      with DnaA is biologically meaningful and well-documented, but should be captured with a more
      specific molecular function term rather than the generic protein binding term.
    supported_by:
      - reference_id: PMID:35576203
        supporting_text: "we tested CcrZ against DnaA domains I and III and identified an interaction between CcrZ and both DnaA domains for some of the two-hybrid constructs"

- term:
    id: GO:0005524
    label: ATP binding
  evidence_type: IDA
  original_reference_id: PMID:35576203
  review:
    summary: >-
      CcrZ binds ATP as demonstrated by the crystal structure solved with AMP-PNP (an ATP analog)
      at 2.6 angstrom resolution. The N-terminal lobe contains the P-loop for ATP binding.
    action: ACCEPT
    reason: >-
      ATP binding is a core molecular function of CcrZ, directly demonstrated by the co-crystal
      structure with AMP-PNP. The adenine base is sandwiched between hydrophobic/aromatic residues
      in the bilobal cleft. ATP binding is essential for kinase activity.
    supported_by:
      - reference_id: PMID:35576203
        supporting_text: "the adenine base is sandwiched between hydrophobic/aromatic residues lining the bilobal cleft (F39 and W77 of the N-terminal lobe, and L173 and I183 of the C-terminal lobe)"

- term:
    id: GO:0005737
    label: cytoplasm
  evidence_type: ISS
  original_reference_id: GO_REF:0000024
  review:
    summary: >-
      Cytoplasmic localization inferred by sequence similarity to S. pneumoniae CcrZ (A0A0H2ZQL5).
      Consistent with the IEA annotation and with CcrZ being a soluble protein.
    action: ACCEPT
    reason: >-
      Cytoplasm annotation by sequence similarity is consistent with the IEA annotation. CcrZ
      is a soluble cytoplasmic protein. In S. pneumoniae, CcrZ localizes to mid-cell via
      interaction with FtsZ, but in B. subtilis, CcrZ does not show clear mid-cell localization.
    supported_by:
      - reference_id: PMID:34373624
        supporting_text: "CcrZSa and CcrZBs did not localize as clear rings at mid-cell in S. aureus and B. subtilis"

- term:
    id: GO:0006270
    label: DNA replication initiation
  evidence_type: IMP
  original_reference_id: PMID:34373624
  review:
    summary: >-
      Deletion of ccrZ in B. subtilis causes decreased oriC/ter ratios indicating reduced DNA
      replication initiation. Suppressor mutations in dnaA and yabA restore wild-type replication
      initiation levels, confirming CcrZ acts through the DnaA pathway.
    action: ACCEPT
    reason: >-
      DNA replication initiation is a core biological process for CcrZ. Marker frequency analysis
      directly demonstrates reduced replication initiation in ccrZ deletion mutants. Suppressor
      analysis in dnaA and yabA provides strong genetic support.
    supported_by:
      - reference_id: PMID:34373624
        supporting_text: "deletion or depletion of CcrZ caused a clear reduction in oriC/ter ratios"
      - reference_id: PMID:34373624
        supporting_text: "mutations that increase the rate of initiation of DNA replication can rescue the ∆ccrZ phenotype"

- term:
    id: GO:0006974
    label: DNA damage response
  evidence_type: IMP
  original_reference_id: PMID:35576203
  review:
    summary: >-
      CcrZ deletion sensitizes B. subtilis to a broad range of DNA damaging agents and induces the
      SOS response. Overexpression also induces SOS, suggesting that proper CcrZ levels are critical
      for genome maintenance.
    action: ACCEPT
    reason: >-
      DNA damage response involvement is directly demonstrated by sensitivity assays and SOS reporter
      experiments. The breadth of DNA damaging agents to which ΔccrZ is sensitive (MMC, MMS,
      ciprofloxacin, phleomycin, UV) indicates a general role in genome integrity rather than a
      specific repair pathway.
    supported_by:
      - reference_id: PMID:35576203
        supporting_text: "Deletion of ccrZ renders cells sensitive to the crosslinking agent MMC [32], the methylating agent methyl methanesulfonate (MMS) [33], the topoisomerase inhibitor ciprofloxacin [34], and the break inducing peptide phleomycin [35] (Fig 1A)"
      - reference_id: PMID:35576203
        supporting_text: "We found significant SOS induction in cells lacking ccrZ compared to WT with ~6% of ΔccrZ B. subtilis cells showing induction"

- term:
    id: GO:0016773
    label: phosphotransferase activity, alcohol group as acceptor
  evidence_type: IDA
  original_reference_id: PMID:35576203
  review:
    summary: >-
      CcrZ has phosphotransferase activity on alcohol-group-containing substrates (D-ribose and
      2-deoxy-D-ribose), demonstrated by ATPase assays with purified protein. The catalytic
      residue D166 is required for this activity.
    action: KEEP_AS_NON_CORE
    reason: >-
      This is a correct but broad parent term for CcrZ activity. The more specific ribokinase
      activity (GO:0004747) and carbohydrate kinase activity (GO:0019200) annotations better
      describe the substrate specificity. Retaining as non-core since it is technically correct.
    supported_by:
      - reference_id: PMID:35576203
        supporting_text: "CcrZ ATPase activity was stimulated in the presence of D-ribose and 2-deoxy-D-ribose at similar levels"

- term:
    id: GO:0019200
    label: carbohydrate kinase activity
  evidence_type: IDA
  original_reference_id: PMID:35576203
  review:
    summary: >-
      CcrZ phosphorylates the carbohydrate substrates D-ribose and 2-deoxy-D-ribose. This is a
      more informative parent term than generic kinase activity and accurately describes CcrZ
      substrate preference.
    action: ACCEPT
    reason: >-
      Carbohydrate kinase activity correctly captures CcrZ substrate specificity for sugar substrates.
      The in vitro ATPase assays demonstrate activity on D-ribose and 2-deoxy-D-ribose, both
      carbohydrate substrates.
    supported_by:
      - reference_id: PMID:35576203
        supporting_text: "CcrZ ATPase activity was stimulated in the presence of D-ribose and 2-deoxy-D-ribose at similar levels"
      - reference_id: PMID:35576203
        supporting_text: "We conclude that CcrZ evolved from a choline kinase-like structural scaffold to utilize substrates that share chemical features with sugars such as ribose"

- term:
    id: GO:0005515
    label: protein binding
  evidence_type: IPI
  original_reference_id: PMID:35576203
  review:
    summary: >-
      CcrZ interacts with DnaB (P05648) as shown by bacterial two-hybrid assay.
    action: REMOVE
    reason: >-
      Protein binding (GO:0005515) is uninformative per GO annotation guidelines. The interaction
      with DnaB is biologically meaningful but should be captured with a more specific molecular
      function term rather than the generic protein binding term.
    supported_by:
      - reference_id: PMID:35576203
        supporting_text: "we did detect an interaction between CcrZ and DnaB, suggesting CcrZ and DnaB could bind in B. subtilis"

