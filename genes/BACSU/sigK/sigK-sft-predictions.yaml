    summary: Incorrect prediction. SigK is a transcriptional activator (sigma
      factor) that directs RNA polymerase to mother-cell-specific promoters to
      activate late sporulation genes (coat proteins cotA, cotB, cotD, cotE, cotH;
      cortex and germination genes). Sigma factors are positive regulators of transcription,
      not negative regulators. The curated ai-review.yaml explicitly notes that
      annotations attributing negative regulation to sigma factors are incorrect.
      This confusion likely arises from the complex regulatory network around sigK
      where GerE represses some sigK-activated genes, but SigK itself is an activator.
