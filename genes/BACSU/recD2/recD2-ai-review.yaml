id: O34481
gene_symbol: recD2
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:224308
  label: Bacillus subtilis (strain 168)
description: >-
  RecD2 is an ATP-dependent 5'-to-3' DNA helicase in Bacillus subtilis that plays a key role in
  maintaining replication fork integrity and modulating RecA-mediated recombination. Unlike E. coli
  RecD, which functions as part of the RecBCD complex, B. subtilis RecD2 acts independently (there
  are no RecB or RecC homologs in this organism). RecD2 stabilizes replication fork progression,
  limits replication fork stress, and acts as a negative modulator of the RecA-ssDNA filament,
  preventing unnecessary recombination at stalled replication forks. It interacts with the
  single-stranded DNA binding protein SsbA and localizes to the nucleoid. Loss of recD2 results
  in increased sensitivity to multiple DNA-damaging agents and more frequent replication fork collapse.

existing_annotations:
- term:
    id: GO:0006261
    label: DNA-templated DNA replication
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      RecD2 is important for normal replication fork progression in B. subtilis. Deletion of recD2
      results in more frequent replication fork collapse, indicating a role in DNA replication
      maintenance. The annotation is well supported by phylogenetic inference and experimental data.
    action: ACCEPT
    reason: >-
      RecD2 functions to stabilize replication fork progression and prevent fork collapse.
      Although it is not a core replisome component, its role in replication fork integrity
      is well established experimentally.

- term:
    id: GO:0006974
    label: DNA damage response
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      RecD2 is important for survival after treatment with DNA-damaging agents. Loss of RecD2
      sensitizes cells to mitomycin C, phleomycin, MMS, UV, and H2O2. RecD2 modulates RecA
      activity at damaged replication forks, consistent with a role in the DNA damage response.
    action: ACCEPT
    reason: >-
      Multiple independent studies confirm that recD2 deletion increases sensitivity to a broad
      range of DNA-damaging agents. RecD2 acts by modulating RecA dynamics at damaged forks.

- term:
    id: GO:0017116
    label: single-stranded DNA helicase activity
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      RecD2 has been demonstrated to have helicase activity on DNA substrates. The IBA annotation
      from phylogenetic inference is consistent with direct experimental evidence showing 5'-3'
      helicase activity for B. subtilis RecD2.
    action: ACCEPT
    reason: >-
      Consistent with direct biochemical characterization of B. subtilis RecD2 as a 5'-3' DNA
      helicase. The more specific term GO:0043139 (5'-3' DNA helicase activity) is also annotated.

- term:
    id: GO:0043139
    label: 5'-3' DNA helicase activity
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      RecD2 has been directly shown to have 5'-3' DNA helicase activity in B. subtilis. This IBA
      annotation is consistent with direct experimental evidence (IDA from PMID:24443534).
    action: ACCEPT
    reason: >-
      Well-supported by direct biochemical characterization. This is the most specific and
      accurate helicase activity term for RecD2.

- term:
    id: GO:1903775
    label: regulation of DNA double-strand break processing
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      RecD2 modulates RecA-ssDNA filament formation and strand exchange, and is synthetically
      lethal with recG and ruvAB, indicating a role in regulating double-strand break processing.
      However, this annotation is based on phylogenetic inference from eukaryotic orthologs and
      the mechanism in B. subtilis may differ.
    action: KEEP_AS_NON_CORE
    reason: >-
      While RecD2 does have a role in DNA repair and modulates recombination, the primary
      function in B. subtilis appears to be replication fork maintenance rather than direct
      regulation of DSB processing. The annotation is not incorrect but is not the core function.

- term:
    id: GO:2000042
    label: negative regulation of double-strand break repair via homologous recombination
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      RecD2 acts as a negative modulator of RecA-ssDNA filament formation, which could negatively
      regulate homologous recombination-mediated repair. However, in B. subtilis the primary role
      appears to be preventing unnecessary recombination at stalled replication forks rather than
      regulating DSB repair per se.
    action: KEEP_AS_NON_CORE
    reason: >-
      RecD2 does negatively modulate RecA activity, but the biological context in B. subtilis
      is primarily at replication forks rather than at DSBs. The annotation captures a real
      activity but the biological process context may not precisely match.

- term:
    id: GO:0006310
    label: DNA recombination
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      RecD2 modulates RecA-mediated recombination and is synthetically lethal with recG and ruvAB
      helicases involved in recombination. A role in recombinational DNA repair is probable.
    action: ACCEPT
    reason: >-
      RecD2 interacts with RecA and modulates strand exchange, and genetic interactions with
      recG and ruvAB support a role in recombinational repair processes.

- term:
    id: GO:0009338
    label: exodeoxyribonuclease V complex
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      The exodeoxyribonuclease V complex annotation is based on homology to E. coli RecD which
      is part of the RecBCD complex. However, B. subtilis lacks RecB and RecC entirely, and RecD2
      is not known to function as part of a larger complex in this organism. This annotation is
      incorrect for B. subtilis.
    action: REMOVE
    reason: >-
      B. subtilis does not have RecB or RecC proteins. RecD2 functions independently, not as
      part of an exodeoxyribonuclease V (RecBCD) complex. This annotation is a mis-transfer
      from E. coli RecD biology that does not apply to B. subtilis RecD2.

- term:
    id: GO:0003677
    label: DNA binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  review:
    summary: >-
      RecD2 binds single-stranded DNA as part of its helicase activity. DNA binding is a
      prerequisite for helicase function and is well established.
    action: KEEP_AS_NON_CORE
    reason: >-
      DNA binding is inherent to RecD2's helicase function. The annotation is correct but
      redundant given the more specific helicase activity annotations.

- term:
    id: GO:0003678
    label: DNA helicase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000117
  review:
    summary: >-
      RecD2 has DNA helicase activity. This is a less specific parent term of the
      experimentally validated GO:0043139 (5'-3' DNA helicase activity).
    action: KEEP_AS_NON_CORE
    reason: >-
      Correct but less specific than the experimentally validated 5'-3' DNA helicase activity
      annotation. The more specific term is preferred.

- term:
    id: GO:0005524
    label: ATP binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000104
  review:
    summary: >-
      RecD2 binds ATP and has ATPase activity. The K373A mutation abolishes ATPase and helicase
      activities. ATP binding is well supported.
    action: KEEP_AS_NON_CORE
    reason: >-
      ATP binding is inherent to RecD2's function as an ATP-dependent helicase. Correct but
      subsidiary to the more informative helicase activity annotation.

- term:
    id: GO:0006310
    label: DNA recombination
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: >-
      Duplicate of the IBA annotation for DNA recombination. RecD2 has a role in modulating
      recombination through its interaction with RecA.
    action: ACCEPT
    reason: >-
      Consistent with experimental evidence showing RecD2 modulates RecA-mediated recombination.

- term:
    id: GO:0009295
    label: nucleoid
  evidence_type: IEA
  original_reference_id: GO_REF:0000044
  review:
    summary: >-
      RecD2 localizes in tight foci on the nucleoid, targeted via the C-terminal domain of SsbA.
      This localization is consistent with its function at replication forks.
    action: ACCEPT
    reason: >-
      Nucleoid localization is experimentally supported and functionally relevant to RecD2's
      role at active replication forks.

- term:
    id: GO:0016887
    label: ATP hydrolysis activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000116
  review:
    summary: >-
      RecD2 has ATPase activity that is coupled to its helicase function. The K373A mutation
      abolishes both ATPase and helicase activities.
    action: KEEP_AS_NON_CORE
    reason: >-
      ATP hydrolysis is a mechanistic aspect of RecD2's helicase function. Correct but
      subsidiary to the more informative 5'-3' DNA helicase activity annotation.

- term:
    id: GO:0043139
    label: 5'-3' DNA helicase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  review:
    summary: >-
      Duplicate IEA annotation for 5'-3' DNA helicase activity. Consistent with direct
      experimental evidence (IDA from PMID:24443534).
    action: ACCEPT
    reason: >-
      Consistent with direct biochemical characterization of RecD2 helicase activity.

- term:
    id: GO:0043139
    label: 5'-3' DNA helicase activity
  evidence_type: IDA
  original_reference_id: PMID:24443534
  review:
    summary: >-
      Direct experimental demonstration that B. subtilis RecD2 is a 5'-3' DNA helicase. This
      is the strongest evidence for RecD2's molecular function.
    action: ACCEPT
    reason: >-
      Direct biochemical assay demonstrating 5'-3' helicase activity. This is the core
      molecular function of RecD2.
    supported_by:
    - reference_id: PMID:24443534
      supporting_text: >-
        Biochemical characterization of B. subtilis RecD2 showed that it is a 5'-3' helicase and that it directly binds single-stranded DNA binding protein.

