- id: PMID:24443534
  title: RecD2 helicase limits replication fork stress in Bacillus subtilis.
  findings:
  - statement: >-
      RecD2 is a 5'-3' DNA helicase that directly binds single-stranded DNA binding protein SsbA.
    supporting_text: >-
      Biochemical characterization of B. subtilis RecD2 showed that it is a 5'-3' helicase and that it directly binds single-stranded DNA binding protein.
  - statement: >-
      RecD2 is important for replication fork integrity; deletion causes more frequent fork collapse.
    supporting_text: >-
      Measurement of replication fork progression in vivo showed that forks collapse more frequently in ΔrecD2 cells, supporting the hypothesis that RecD2 is important for normal replication fork progression.
  - statement: >-
      Loss of RecD2 sensitizes cells to DNA-damaging agents that block or impair replication fork movement.
    supporting_text: >-
      loss of RecD2 in B. subtilis sensitized cells to several DNA-damaging agents that can block or impair replication fork movement.
  - statement: >-
      RecD2 deletion causes a modest increase in spontaneous mutation rate, but not consistent with mismatch repair defect.
    supporting_text: >-
      deletion of recD2 confers a modest increase in the spontaneous mutation rate and that the mutational signature in ΔrecD2 cells is not consistent with an MMR defect, indicating a new function for RecD2 in B. subtilis.

core_functions:
- description: >-
    RecD2 is an ATP-dependent 5'-3' DNA helicase that functions to maintain replication fork
    integrity. It limits replication fork stress by stabilizing fork progression and preventing
    unnecessary RecA-mediated recombination at stalled forks. RecD2 interacts with SsbA at the
    replication fork and acts as a negative modulator of RecA-ssDNA filaments.
  molecular_function:
    id: GO:0043139
    label: 5'-3' DNA helicase activity
  directly_involved_in:
  - id: GO:0006261
    label: DNA-templated DNA replication
  - id: GO:0006310
    label: DNA recombination
  locations:
  - id: GO:0009295
    label: nucleoid
  supported_by:
  - reference_id: PMID:24443534
    supporting_text: >-
      Biochemical characterization of B. subtilis RecD2 showed that it is a 5'-3' helicase and that it directly binds single-stranded DNA binding protein.

suggested_questions:
- question: >-
    Does RecD2 directly disassemble RecA-ssDNA filaments, or does it prevent RecA loading
    by competing for ssDNA binding sites at stalled forks?
- question: >-
    What is the functional relationship between RecD2 and PriA-dependent replication restart
    in vivo?
- question: >-
    Is the synthetic lethality of recD2 with recG and ruvAB due to an overlapping role in
    processing stalled replication fork intermediates?

suggested_experiments:
- description: >-
    Single-molecule imaging of RecD2 and RecA dynamics at replication forks in live B. subtilis
    cells to determine whether RecD2 actively displaces RecA filaments or prevents their formation.
- description: >-
    In vitro reconstitution of RecD2-mediated replication fork restart using purified B. subtilis
    replisome components to determine the minimal factors required for RecD2-dependent fork rescue.
- description: >-
    ChIP-seq analysis of RecD2 occupancy across the B. subtilis genome under normal and
    DNA-damage conditions to identify whether RecD2 preferentially associates with specific
    genomic regions prone to replication stress.
