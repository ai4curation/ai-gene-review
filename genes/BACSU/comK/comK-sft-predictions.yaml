  predicted_term_type: GO_CC
  review:
    assessment: NPI
    confidence_score: 0
    summary: Incorrect prediction. ComK is the master regulator of genetic competence,
      not sporulation. ComK-expressing cells are in the K-state (competent state)
      which is mutually exclusive with sporulation commitment. ComK does not localize
      to the endospore core and has no known role in sporulation. This is a context
      confusion, likely because competence and sporulation are both stationary-phase
      responses in B. subtilis and share some regulators (e.g., Spo0A~P relieves
      AbrB repression of both pathways).
