  label: Neurospora crassa (strain ATCC 24698 / 74-OR23-1A / CBS 708.71 / DSM 1257 / FGSC 987)
description: eas (also ccg-2, clock-controlled gene 2) encodes a class I hydrophobin that forms the rodlet
  layer on the surface of Neurospora crassa macroconidia and aerial hyphae. This small, amphipathic, self-assembling
  protein confers spore-surface hydrophobicity required for aerial growth and conidial dispersal; its
  expression is light-induced and clock-controlled.
