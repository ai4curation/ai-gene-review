description: con-6 (conidiation-specific protein 6) is a small protein whose gene is expressed specifically
  during the late stages of macroconidiation in Neurospora crassa and is present in mature conidia. Its
  biochemical function is not established; it may protect dormant spores from desiccation. It is used
  here as a conidiation-specific structural/output marker of the program.
