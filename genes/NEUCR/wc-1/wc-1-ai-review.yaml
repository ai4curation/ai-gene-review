  label: Neurospora crassa (strain ATCC 24698 / 74-OR23-1A / CBS 708.71 / DSM 1257 / FGSC 987)
description: 'wc-1 (white collar-1) encodes the principal blue-light photoreceptor of Neurospora crassa:
  a GATA-type zinc-finger transcription factor with a light-sensing LOV (PAS) domain. With WC-2 it forms
  the White Collar Complex (WCC), the master activator of light-induced transcription that drives photoadaptation,
  entrainment of the circadian clock (activating frq), and light/clock gating of conidiation.'
