  label: Neurospora crassa (strain ATCC 24698 / 74-OR23-1A / CBS 708.71 / DSM 1257 / FGSC 987)
description: wc-2 (white collar-2) encodes a GATA-type zinc-finger transcription factor that partners
  WC-1 to form the White Collar Complex (WCC), the master activator of blue-light-induced transcription
  in Neurospora crassa. The WCC drives photoresponses, entrains the circadian clock (activating frq),
  and gates the timing of conidiation.
