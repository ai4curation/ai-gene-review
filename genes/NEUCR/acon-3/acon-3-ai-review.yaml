  label: Neurospora crassa (strain ATCC 24698 / 74-OR23-1A / CBS 708.71 / DSM 1257 / FGSC 987)
description: 'acon-3 (aconidiate-3; ''Acr1'', NCU07617) encodes a nuclear protein of the MEDUSA/MedA family
  of fungal conidiation regulators (PANTHER PTHR39463; DUF7082 domain). It acts downstream of the fluffy
  (FL) master regulator and upstream of the conidiation-specific con genes, and is required for later
  stages of macroconidiation: elevated FL expression does not bypass the acon-3 conidiation defect. Its
  precise molecular function is uncharacterized.'
