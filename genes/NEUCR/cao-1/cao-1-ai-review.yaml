    label: carotenoid dioxygenase activity
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: enables
  review:
    summary: >-
      Phylogenetic (IBA) propagation of a carotenoid dioxygenase activity from the CCO
      family. This is directly contradicted by experimental characterization: purified
      CAO-1 does not cleave beta-carotene or any carotenoid/apocarotenoid tested. The
      true molecular function is stilbenoid (resveratrol/piceatannol) cleavage, captured
      by the IDA GO:0016702 annotations.
    action: REMOVE
    reason: >-
      An IBA inference refuted by direct experimental evidence (PMID:23893079,
      PMID:28493664). CAO-1 has no demonstrable carotenoid-cleaving activity; keeping this
      term would misrepresent the enzyme's molecular function. GOA already carries a
      corrective NOT carotenoid-metabolism annotation from the same work.
    propagation_review:
      root_cause: PROPAGATION_BAD
      failure_modes:
        - FUNCTIONAL_DIVERGENCE
    supported_by:
      - reference_id: PMID:23893079
        supporting_text: >-
          we tested CAO-1 activity with carotenoid substrates that were, however, not converted
      - reference_id: PMID:23893079
        supporting_text: >-
          Here, we show that CAO-1 is not a carotenoid or apocarotenoid cleavage enzyme.
