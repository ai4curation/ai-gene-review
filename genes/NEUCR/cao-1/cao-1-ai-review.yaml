core_functions:
- description: >-
    Mononuclear non-heme Fe(II) dioxygenase that oxidatively cleaves the interphenyl
    Calpha-Cbeta double bond of the hydroxystilbene resveratrol (and piceatannol),
    incorporating both atoms of molecular oxygen to yield aromatic aldehydes. GO:0016702 is used
    here as the most specific VALIDATED MF term; the specific term GO:7770086 (resveratrol
    dioxygenase activity, RHEA:73735) was added in go-ontology master (Jul 2026) but is not yet in
    the released snapshot, and a hydroxystilbene grouping is proposed as its parent (see
    proposed_new_terms). Iron and resveratrol (substrate) binding are integral to this activity.
  molecular_function:
    id: GO:0016702
    label: oxidoreductase activity, acting on single donors with incorporation of
      molecular oxygen, incorporation of two atoms of oxygen
  directly_involved_in:
    - id: GO:0046272
      label: stilbene catabolic process
  supported_by:
    - reference_id: PMID:23893079
      supporting_text: >-
        it efficiently cleaved resveratrol and its derivative piceatannol
    - reference_id: PMID:28493664
      supporting_text: >-
        The crystal structure of a fungal stilbenoid-cleaving CCO, CAO1, reveals strong
        similarity between its iron center and those of carotenoid-cleaving CCOs, but with a
        markedly different substrate-binding cleft
proposed_new_terms:
- proposed_name: hydroxystilbene alpha,beta-dioxygenase activity
  proposed_definition: >-
    Catalysis of the oxidative cleavage of the interphenyl Calpha-Cbeta double bond of a
    hydroxystilbene (a stilbenoid bearing free phenolic hydroxyl group(s)), incorporating both
    atoms of molecular oxygen to yield two aromatic aldehydes. Example substrates include
    resveratrol and piceatannol (RHEA:73735, RHEA:73815) and lignostilbene (RHEA:21340).
  justification: >-
    Proposed as a grouping (substrate-class) molecular-function term that sits under GO:0016702 and
    is the PARENT of the existing/added leaf terms GO:0050054 (lignostilbene alpha,beta-dioxygenase
    activity, EC 1.13.11.43) and GO:7770086 (resveratrol dioxygenase activity, RHEA:73735, added Jul
    2026 in go-ontology issue #32332). It captures the evolved chemistry of the fungal/bacterial
    stilbenoid-cleaving CCO subfamily (interphenyl double-bond scission of hydroxystilbenes) at the
    grain a gene product is plausibly selected for, filling the gap between the generic GO:0016702 and
    the single-reaction leaves. Rhea deliberately models only fully-specified leaf reactions and has
    no generic "a hydroxystilbene + O2" reaction, so GO molecular function is the appropriate layer
    for this grouping - mirroring the carotenoid side of the same family, where GO:0010436 (carotenoid
    dioxygenase activity) already groups the specific carotenoid-cleaving activities.
    Scope note (fixing an earlier over-broad draft): the class is HYDROXYstilbene, not all stilbenoids
    (CHEBI:26776) - family members require free hydroxyls (CAO-1 does not cleave non-hydroxylated
    trans-stilbene, pinosylvin lacking the 4'-OH, or fully methoxylated/glycosylated stilbenes), so a
    "stilbenoid"-scoped term would over-claim their specificity.
    Annotation grain: CAO-1 itself is best annotated to the demonstrated leaf activities (GO:7770086
    resveratrol dioxygenase, plus a piceatannol counterpart), while this grouping is the right grain
    for the family/subfamily node (IBA propagation) and would organize the currently-flat set of
    stilbenoid leaf terms. A narrower intermediate ("4'-hydroxystilbene alpha,beta-dioxygenase",
    covering just resveratrol + piceatannol but not lignostilbene) is the tightest fit to CAO-1's own
    range if an enzyme-level grouping is also wanted.
    Nomenclature note: "hydroxystilbene alpha,beta-dioxygenase activity" is a descriptive name coined
    here, not established terminology. The literature calls this class stilbene cleavage oxygenases
    (SCOs) / lignostilbene alpha,beta-dioxygenases (LSDs, EC 1.13.11.43); by the lignostilbene
    precedent the conventional grouping name would be "stilbene alpha,beta-dioxygenase activity"
    (a suitable exact_synonym). The class is chemistry-defined (alpha,beta / interphenyl double-bond
    scission of stilbenes); per-member substrate specificity varies (CAO-1 needs several free
    hydroxyls, bacterial LsdA cleaves even 4-hydroxystilbene) and should be captured by the leaf terms,
    not the grouping. There is substantial structural/mechanistic literature on the class - CAO-1
    co-crystals with resveratrol/piceatannol (PMID:28493664), NOV1 structure + mechanism
    (PMID:27911781), and bacterial LSD residue-level SAR (PMID:31292192) - but a predictive
    structure-based derivation of CAO-1's full specificity has not been done; the specificity claim is
    empirical (substrate panel) and structure-consistent (the hydroxyls form specific active-site
    hydrogen bonds, e.g. piceatannol's 3'-OH to Thr151).
  proposed_parent:
    id: GO:0016702
    label: oxidoreductase activity, acting on single donors with incorporation of
      molecular oxygen, incorporation of two atoms of oxygen
  proposed_mappings:
    - predicate: skos:narrowMatch
      target_term:
        id: RHEA:73735
        label: trans-resveratrol + O2 = 3,5-dihydroxybenzaldehyde + 4-hydroxybenzaldehyde
    - predicate: skos:narrowMatch
      target_term:
        id: RHEA:73815
        label: piceatannol + O2 = 3,5-dihydroxybenzaldehyde + 3,4-dihydroxybenzaldehyde
    - predicate: skos:narrowMatch
      target_term:
        id: RHEA:21340
        label: lignostilbene + O2 = 2 vanillin
  supported_by:
    - reference_id: PMID:23893079
      supporting_text: >-
        it efficiently cleaved resveratrol and its derivative piceatannol
suggested_questions:
- question: >-
    What is the natural physiological role and selective advantage of resveratrol/stilbene
    cleavage for Neurospora crassa, a primary colonizer of burned vegetation - detoxification
    of plant phytoalexins, competition with resveratrol-producing microbes, or catabolism of
    lignin-derived biphenolics?
suggested_experiments:
- description: >-
    Profile the stilbenoid content (resveratrol, piceatannol, and 4'-hydroxystilbene derivatives)
    of the specific burned host substrates Neurospora colonizes in the wild - especially grasses/
    sugarcane, which accumulate both resveratrol and piceatannol - and test each as a CAO-1
    substrate, to identify the ecologically relevant natural substrate rather than the convenient
    laboratory one.
- description: >-
    Untargeted metabolomics of wild-type versus delta-cao-1 mycelia grown with and without
    resveratrol/piceatannol (and candidate lignin-derived stilbenoids) to identify the full in vivo
    substrate range and downstream fate of the aldehyde cleavage products.
- description: >-
    Competition/co-culture assays of wild-type versus delta-cao-1 Neurospora against
    resveratrol-producing microbes (e.g. Aspergillus, Penicillium, Mucor) to test whether CAO-1
    provides a fitness advantage by degrading a competitor-derived stilbenoid.
- description: >-
    Determine subcellular localization of CAO-1 (e.g. fluorescent fusion or fractionation) to
    test the inference from PMID:23893079 that resveratrol cleavage occurs intracellularly
    (cytoplasm) rather than via secretion.
knowledge_gaps:
- gap_statement: >-
    The natural physiological substrate and biological role of CAO-1 in Neurospora crassa are
    undetermined. The in vitro substrates resveratrol and piceatannol are plant stilbenoids of
    uncertain ecological relevance to this fungus, and it is unknown whether the selected substrate
    is a 4'-hydroxylated hydroxystilbene of plant origin, one produced by a competing microbe, or a
    lignin-derived biphenolic encountered in its burned-vegetation niche.
  boundary: >-
    Known: CAO-1 cleaves the interphenyl double bond of resveratrol and piceatannol in vitro. Its
    specificity is empirical (a 7-compound substrate panel, PMID:23893079): the authors' stated
    requirement is "a minimal number of unmodified hydroxyl groups" - not a single position. Both
    substrates are polyhydroxylated (>=3 free OH) and bear a free 4'-OH, whereas the non-substrates
    have too few free hydroxyls (trans-stilbene, 4-monohydroxystilbene, pinosylvin) or have them
    blocked (trismethoxy-resveratrol; a 4'-methoxy glucoside). Note 4-monohydroxystilbene has a 4'-OH
    yet is not cleaved, so a free 4'-OH is necessary-ish but not sufficient. CAO-1 is also more
    restrictive than bacterial family members (e.g. LsdA reportedly cleaves 4-hydroxystilbene). Unknown:
    the endogenous substrate and the fitness role.
  gap_kind:
    - BIOLOGY
  dark_aspect: BP_DARK
  significance: >-
    Determines whether the enzyme's evolved (selected-effect) function is resveratrol-specific or a
    broader hydroxystilbene catabolism, and thus the correct grain for its process annotation. The
    requirement for several free/unmodified hydroxyls rules out conifer pinosylvin and methoxylated
    lignin phenolics and points to angiosperm polyhydroxystilbenes - resveratrol and especially
    piceatannol.
    Ecologically, Neurospora is a post-fire pioneer of burned biomass, and among its burned hosts
    grasses/sugarcane accumulate both resveratrol and piceatannol, making a burned stilbenoid-
    producing host (or a resveratrol-producing microbial competitor) the leading candidate source.
  provenance:
    - reference_id: PMID:23893079
      supporting_text: >-
        mutants were not impaired by the presence of resveratrol, a phytoalexin
        active against different fungi, which did not significantly affect the growth and
        development of wild-type Neurospora
- gap_statement: >-
    The retinal-forming (beta-carotene cleaving) enzyme of Neurospora crassa is unidentified. The
    hypothesis that motivated the study of cao-1 - that it supplies retinal, the chromophore of the
    NOP-1 rhodopsin - was disproven, and its paralog CAO-2 cleaves torulene (not beta-carotene to
    retinal); N. crassa also lacks a clear ortholog of the retinal-forming CarX of Fusarium fujikuroi.
    It remains unknown which enzyme (if any) makes retinal in N. crassa, and whether the physiological
    NOP-1 chromophore is retinal at all or an apocarotenal such as CAO-2's product beta-apo-4'-carotenal.
  boundary: >-
    Known: cao-1 does not cleave carotenoids and is excluded as the retinal source; NOP-1 binds retinal
    in vitro. Unknown: the identity of any retinal-forming enzyme in N. crassa and the true
    physiological NOP-1 chromophore.
  gap_kind:
    - BIOLOGY
  dark_aspect: BP_DARK
  significance: >-
    This is the "negative space" that generated the original cao-1 mis-annotation: assuming a carotenoid/
    retinal role for a CCO-family member. Identifying the retinal (or alternative-chromophore) source
    would explain NOP-1 rhodopsin function and close the loop on the carotenoid-pathway assumption.
  provenance:
    - reference_id: PMID:23893079
      supporting_text: >-
        our results demonstrate that this enzyme is not CAO-1
    - reference_id: PMID:23893079
      supporting_text: >-
        the physiological NOP-1 chromophore may be a nonretinal molecule
