gene_symbol: cao-1
product_type: PROTEIN
status: IN_PROGRESS
taxon:
  id: NCBITaxon:367110
  label: Neurospora crassa (strain ATCC 24698 / 74-OR23-1A / CBS 708.71 / DSM 1257
    / FGSC 987)
description: >-
  cao-1 encodes CAO-1 (NCU07008), one of two carotenoid cleavage oxygenase (CCO)
  family members in Neurospora crassa. Despite its family name and "carotenoid
  cleavage oxygenase 1" designation, CAO-1 does not act on carotenoids. It is a
  mononuclear non-heme Fe(II) dioxygenase that oxidatively cleaves the interphenyl
  Calpha-Cbeta double bond of the stilbenoid resveratrol, and of its dihydroxy
  derivative piceatannol, producing aromatic aldehydes (trans-resveratrol yields
  3,5-dihydroxybenzaldehyde plus 4-hydroxybenzaldehyde; piceatannol yields
  3,5-dihydroxybenzaldehyde plus 3,4-dihydroxybenzaldehyde). The enzyme uses a
  four-His-coordinated Fe(II) center shared with carotenoid-cleaving CCOs but has a
  distinct substrate-binding cleft that accommodates stilbenoids rather than
  carotenoids. Biologically CAO-1 acts in stilbene catabolism: expression is strongly
  and specifically induced by resveratrol (a plant phytoalexin) and, unlike genuine
  carotenoid-pathway genes, is not regulated by light. It was originally proposed to
  supply retinal by cleaving beta-carotene, but heterologously expressed CAO-1 does not
  convert beta-carotene or any apocarotenoid tested, so it is not part of carotenoid
  metabolism.
existing_annotations:
