gene_symbol: cao-1
product_type: PROTEIN
status: IN_PROGRESS
taxon:
  id: NCBITaxon:367110
  label: Neurospora crassa (strain ATCC 24698 / 74-OR23-1A / CBS 708.71 / DSM 1257
    / FGSC 987)
description: >-
  cao-1 encodes CAO-1 (NCU07008), one of two carotenoid cleavage oxygenase (CCO)
  family members in Neurospora crassa. Despite its family name and "carotenoid
  cleavage oxygenase 1" designation, CAO-1 does not act on carotenoids. It is a
  mononuclear non-heme Fe(II) dioxygenase that oxidatively cleaves the interphenyl
  Calpha-Cbeta double bond of the stilbenoid resveratrol, and of its dihydroxy
  derivative piceatannol, producing aromatic aldehydes (trans-resveratrol yields
  3,5-dihydroxybenzaldehyde plus 4-hydroxybenzaldehyde; piceatannol yields
  3,5-dihydroxybenzaldehyde plus 3,4-dihydroxybenzaldehyde). The enzyme uses a
  four-His-coordinated Fe(II) center shared with carotenoid-cleaving CCOs but has a
  distinct substrate-binding cleft that accommodates stilbenoids rather than
  carotenoids. Biologically CAO-1 acts in stilbene catabolism: expression is strongly
  and specifically induced by resveratrol (a plant phytoalexin) and, unlike genuine
  carotenoid-pathway genes, is not regulated by light. It was originally proposed to
  supply retinal by cleaving beta-carotene, but heterologously expressed CAO-1 does not
  convert beta-carotene or any apocarotenoid tested, so it is not part of carotenoid
  metabolism.
existing_annotations:
- term:
    id: GO:0010436
    label: carotenoid dioxygenase activity
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: enables
  review:
    summary: >-
      Phylogenetic (IBA) propagation of a carotenoid dioxygenase activity from the CCO
      family. This is directly contradicted by experimental characterization: purified
      CAO-1 does not cleave beta-carotene or any carotenoid/apocarotenoid tested. The
      true molecular function is stilbenoid (resveratrol/piceatannol) cleavage, captured
      by the IDA GO:0016702 annotations.
    action: REMOVE
    reason: >-
      An IBA inference refuted by direct experimental evidence (PMID:23893079,
      PMID:28493664). CAO-1 has no demonstrable carotenoid-cleaving activity; keeping this
      term would misrepresent the enzyme's molecular function. GOA already carries a
      corrective NOT carotenoid-metabolism annotation from the same work. Root cause is at
      the PANTHER level: cao-1 is placed in subfamily PTHR10543:SF89, labelled "carotenoid
      9,10(9',10')-cleavage dioxygenase 1", which is functionally heterogeneous - it lumps
      genuine carotenoid cleavers (Arabidopsis CCD1), stilbenoid/resveratrol cleavers
      (U. maydis RCO1, B. fuckeliana rco1, and cao-1), and phenylpropanoid cleavers
      (Pseudomonas isoeugenol monooxygenase) - so the carotenoid label over-propagates to
      the stilbenoid clade.
