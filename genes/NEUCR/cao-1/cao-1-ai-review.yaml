proposed_new_terms:
- proposed_name: stilbenoid alpha,beta-dioxygenase activity
  proposed_definition: >-
    Catalysis of the oxidative cleavage of the interphenyl Calpha-Cbeta double bond of a
    stilbenoid (CHEBI:26776), incorporating both atoms of molecular oxygen to yield two
    aromatic aldehydes. Example substrates include resveratrol and piceatannol
    (RHEA:73735, RHEA:73815) and lignostilbene (RHEA:21340).
  justification: >-
    This is a grouping (substrate-class) molecular-function term, proposed to sit under
    GO:0016702 and to subsume the existing leaf term GO:0050054 (lignostilbene
    alpha,beta-dioxygenase activity, EC 1.13.11.43). It captures the evolved chemistry of
    the fungal/bacterial stilbenoid-cleaving CCO subfamily (interphenyl double-bond
    scission of stilbenoids) at the grain a gene product is plausibly selected for, rather
    than at a single fully-specified reaction. Rhea deliberately models only leaf reactions
    (resveratrol RHEA:73735, piceatannol RHEA:73815, lignostilbene RHEA:21340) and has no
    generic "a stilbenoid + O2" reaction, even though the ChEBI class (stilbenoid,
    CHEBI:26776) exists; GO molecular function is the appropriate layer for the class-level
    grouping. This mirrors the carotenoid side of the same family, where GO:0010436
    (carotenoid dioxygenase activity) already provides a substrate-class grouping over
    specific carotenoid-cleaving activities. For CAO-1 this grouping term is a better fit
    than a resveratrol-only term, because the enzyme cleaves both resveratrol and
    piceatannol and its true physiological stilbenoid substrate in Neurospora is uncertain
    (resveratrol is the tractable experimental proxy).
  proposed_parent:
    id: GO:0016702
    label: oxidoreductase activity, acting on single donors with incorporation of
      molecular oxygen, incorporation of two atoms of oxygen
  proposed_mappings:
    - predicate: skos:narrowMatch
      target_term:
        id: RHEA:73735
        label: trans-resveratrol + O2 = 3,5-dihydroxybenzaldehyde + 4-hydroxybenzaldehyde
    - predicate: skos:narrowMatch
      target_term:
        id: RHEA:73815
        label: piceatannol + O2 = 3,5-dihydroxybenzaldehyde + 3,4-dihydroxybenzaldehyde
  supported_by:
    - reference_id: PMID:23893079
      supporting_text: >-
        it efficiently cleaved resveratrol and its derivative piceatannol
suggested_questions:
- question: >-
    What is the natural physiological role and selective advantage of resveratrol/stilbene
    cleavage for Neurospora crassa, a primary colonizer of burned vegetation - detoxification
    of plant phytoalexins, competition with resveratrol-producing microbes, or catabolism of
    lignin-derived biphenolics?
suggested_experiments:
- description: >-
    Untargeted metabolomics of wild-type versus delta-cao-1 mycelia grown with and without
    resveratrol (and candidate lignin-derived stilbenoids) to identify the full in vivo
    substrate range and downstream fate of the aldehyde cleavage products.
- description: >-
    Determine subcellular localization of CAO-1 (e.g. fluorescent fusion or fractionation) to
    test the inference from PMID:23893079 that resveratrol cleavage occurs intracellularly
    (cytoplasm) rather than via secretion.
