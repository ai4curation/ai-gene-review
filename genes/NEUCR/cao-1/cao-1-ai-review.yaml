core_functions:
- description: >-
    Mononuclear non-heme Fe(II) dioxygenase that oxidatively cleaves the interphenyl
    Calpha-Cbeta double bond of the stilbenoid resveratrol (and piceatannol),
    incorporating both atoms of molecular oxygen to yield aromatic aldehydes. GO:0016702
    is the most specific available MF term; iron and resveratrol binding are integral to
    this activity.
  molecular_function:
