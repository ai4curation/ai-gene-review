      this review (PMID:21073977 U. maydis Rco1; PMID:30115012 a Pseudomonas stilbene cleavage
      oxygenase structure) as leads on the stilbenoid-cleaving subclade; these are not yet verified/
      cached and are not asserted here as annotations.
