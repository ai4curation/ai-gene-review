  label: Neurospora crassa (strain ATCC 24698 / 74-OR23-1A / CBS 708.71 / DSM 1257 / FGSC 987)
description: fl (fluffy) is the central regulator of asexual sporulation (macroconidiation) in Neurospora
  crassa. It encodes a Gal4-type binuclear Zn(II)2Cys6 zinc-cluster transcription factor that is necessary
  and sufficient to induce conidiation; fl-null strains grow as undifferentiated 'fluffy' aerial hyphae.
  FL directly activates developmentally regulated targets (including the eas/ccg-2 hydrophobin gene) and
  acts with the stage genes acon-2 and acon-3. FL is the functional analog of the Aspergillus BrlA master-switch
  role, but the two are non-orthologous.
