taxon:
  id: NCBITaxon:367110
  label: Neurospora crassa (strain ATCC 24698 / 74-OR23-1A / CBS 708.71 / DSM 1257 / FGSC 987)
description: acon-2 (aconidiate-2, NCU00478) encodes a cyclic-nucleotide (cAMP) phosphodiesterase that
  hydrolyzes cyclic nucleotides and negatively regulates cAMP/PKA signaling in Neurospora crassa. It acts
  upstream of the fluffy (FL) master regulator and is required for normal induction of conidiation; acon-2
  loss-of-function blocks macroconidiation (aconidiate phenotype), and elevated FL expression can bypass
  the acon-2 defect. acon-2 links nutrient/cAMP signal transduction to the FL-driven conidiation program.
