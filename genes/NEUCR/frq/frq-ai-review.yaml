taxon:
  id: NCBITaxon:367110
  label: Neurospora crassa (strain ATCC 24698 / 74-OR23-1A / CBS 708.71 / DSM 1257 / FGSC 987)
description: frq (frequency) encodes the central negative-feedback component of the Neurospora crassa
  circadian clock. FRQ, activated by the White Collar Complex, feeds back to inhibit WCC activity, generating
  the ~22 h oscillation that gates rhythmic (banded) conidiation. FRQ is an intrinsically disordered protein
  that homodimerizes and forms molecular condensates (membraneless organelles) as part of clock function.
