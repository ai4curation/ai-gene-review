id: S0EDH7
gene_symbol: S0EDH7
taxon:
  id: NCBITaxon:1279085
  label: Gibberella fujikuroi
status: COMPLETE
description: >-
  ProtNLM2 predicted 2 GO terms for S0EDH7 (FFUJ_06423), an uncharacterized 342-aa
  protein kinase domain-containing protein from Fusarium fujikuroi. The protein has no
  curated GOA annotations and no experimental characterization (UniProt PE level 4:
  Predicted). However, independent domain classification by InterPro (IPR011009,
  Kinase-like domain superfamily), Gene3D (1.10.510.10, Phosphotransferase domain), and
  SUPFAM (SSF56112, Protein kinase-like) all converge on a kinase-like fold. Both
  predictions -- protein phosphorylation (GO:0006468) and ATP binding (GO:0005524) --
  are the canonical activities of protein kinases and are well supported by the structural
  domain evidence. These represent correct novel predictions for a protein with no existing
  GO annotations.
  Assessment: 2 correct (COR), 0 uncertain (UNC), 0 incorrect (NPI/PLI).
source_documents:
  - genes/GIBF5/S0EDH7/S0EDH7-uniprot.txt
  - genes/GIBF5/S0EDH7/S0EDH7-goa.tsv
predictions:
  - source_method: ProtNLM2
    source_version: UniProt 2024_06 pilot
    predicted_term:
      id: GO:0006468
      label: protein phosphorylation
    predicted_term_type: GO_BP
    review:
      assessment: COR
      confidence_score: 2
      summary: >-
        Protein phosphorylation is the canonical biological process catalyzed by protein
        kinases. S0EDH7 contains a kinase-like domain fold confirmed by three independent
        domain classification methods: InterPro IPR011009 (Kinase-like domain superfamily),
        Gene3D 1.10.510.10 (Transferase/Phosphotransferase domain 1), and SUPFAM SSF56112
        (Protein kinase-like). There are no existing GOA annotations for this protein, making
        this a genuinely novel prediction. While no experimental evidence exists (PE level 4),
        the convergent domain evidence strongly supports protein kinase activity. In Fusarium
        fujikuroi, protein kinases are central to signaling pathways regulating growth,
        secondary metabolism, and pathogenicity, though S0EDH7 itself has not been assigned
        to any specific kinase subfamily or signaling module. Assessed as COR (correct novel)
        because the domain architecture robustly supports this function despite the absence
        of direct experimental validation.
  - source_method: ProtNLM2
    source_version: UniProt 2024_06 pilot
    predicted_term:
      id: GO:0005524
      label: ATP binding
    predicted_term_type: GO_MF
    review:
      assessment: COR
      confidence_score: 2
      summary: >-
        ATP binding is the essential molecular function underpinning protein kinase
        catalysis, as protein kinases use ATP as the phosphoryl group donor for substrate
        phosphorylation. The Gene3D classification of S0EDH7 as containing a
        Transferase(Phosphotransferase) domain (1.10.510.10) directly implies ATP-dependent
        phosphotransferase activity. The SUPFAM classification (SSF56112, Protein kinase-like)
        and InterPro (IPR011009, Kinase-like domain superfamily) further corroborate a fold
        architecture that accommodates ATP binding. No GOA annotations exist for this protein,
        so this is a novel prediction. The prediction is biologically coherent with the
        protein phosphorylation prediction (GO:0006468) -- together they describe the
        expected enzymatic mechanism of a protein kinase. Assessed as COR (correct novel)
        based on strong convergent structural domain evidence for kinase-like fold and
        phosphotransferase activity.
