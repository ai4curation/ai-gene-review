id: Q8P365
gene_symbol: btuE
taxon:
  id: NCBITaxon:190485
  label: Xanthomonas campestris pv. campestris
status: COMPLETE
description: >-
  ProtNLM2 predicted 1 GO term for the X. campestris BtuE glutathione peroxidase
  (Q8P365): GO:0006979 (response to oxidative stress). This prediction is correct
  but not novel -- the protein already carries a curated IBA annotation to the more
  specific child term GO:0034599 (cellular response to oxidative stress) from
  PANTHER phylogenetic inference, as well as an IEA annotation to the identical
  term GO:0006979 from InterPro2GO mapping. BtuE belongs to the glutathione
  peroxidase family (Pfam PF00255, InterPro IPR000889) with a conserved active-site
  residue at position 37 and a thioredoxin-like fold (IPR036249). Glutathione
  peroxidases catalyze reduction of hydrogen peroxide and organic hydroperoxides,
  directly linking them to oxidative stress defense. ProtNLM2 correctly identified
  this core biological process but failed to reach the more specific term
  (GO:0034599) that the IBA pipeline already provides, and did not predict the
  molecular function (glutathione peroxidase activity, GO:0004602) or the directly
  related process (cellular oxidant detoxification, GO:0098869) that more precisely
  characterize this enzyme. Assessment: 1 correct but not novel (CNN). Total CS =
  2/2.
