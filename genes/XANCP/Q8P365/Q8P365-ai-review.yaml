id: Q8P365
gene_symbol: btuE
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:190485
  label: Xanthomonas campestris pv. campestris (strain ATCC 33913 / DSM 3586 / NCPPB
    528 / LMG 568 / P 25)
description: >-
  BtuE (XCC4213) is a predicted glutathione peroxidase-family protein in
  Xanthomonas campestris pv. campestris. The protein contains a conserved
  glutathione peroxidase domain (IPR000889, PF00255) and a thioredoxin-like
  fold (IPR036249), with a predicted active-site residue at position 37. As a
  member of the glutathione peroxidase family, BtuE is expected to catalyze the
  reduction of hydrogen peroxide and organic hydroperoxides using glutathione or
  a thiol-based reductant, thereby protecting the cell from oxidative damage.
  No direct experimental characterization of this protein in X. campestris has
  been reported; functional inference is based entirely on conserved domain
  architecture and family membership.
existing_annotations:
- term:
    id: GO:0034599
    label: cellular response to oxidative stress
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: involved_in
  review:
    summary: >-
      ACCEPT. Phylogenetic inference from orthologs in multiple organisms
      supports involvement of glutathione peroxidase-family proteins in cellular
      response to oxidative stress.
    action: ACCEPT
    reason: >-
      This IBA annotation is derived from phylogenetic inference (PANTHER)
      across a set of experimentally characterized orthologs from diverse model
      organisms including yeast (SGD), mouse (MGI), worm (WB), and fission
      yeast (PomBase). The conserved domain architecture of Q8P365 is fully
      consistent with glutathione peroxidase family membership, and the broader
      literature supports that bacterial GPx-family proteins participate in
      oxidative stress defense. While no X. campestris-specific experiment has
      been reported, the phylogenetic evidence is well-grounded.
    supported_by:
    - reference_id: file:XANCP/Q8P365/Q8P365-uniprot.txt
      supporting_text: Belongs to the glutathione peroxidase family.
    - reference_id: file:XANCP/Q8P365/Q8P365-deep-research-falcon.md
      supporting_text: >-
        bacterial glutathione peroxidases generally function in peroxide
        detoxification, reducing hydrogen peroxide and/or organic hydroperoxides
        and thereby contributing to oxidative-stress defense.
- term:
    id: GO:0004601
    label: peroxidase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: >-
      MODIFY. The annotation to the broad peroxidase activity term is correct
      but imprecise; glutathione peroxidase activity (GO:0004602) is more
      appropriate given the domain and family assignment.
    action: MODIFY
    reason: >-
      InterPro maps IPR000889 (Glutathione_peroxidase) to the general
      peroxidase activity term GO:0004601. However, the protein is specifically
      classified in the glutathione peroxidase family with the GSHPx Pfam domain
      (PF00255) and the GPX active site motif (IPR029759). The more specific
      term GO:0004602 (glutathione peroxidase activity) better reflects the
      predicted enzymatic function. This is a standard InterPro2GO mapping
      limitation where the mapping is broader than the family assignment
      warrants.
    proposed_replacement_terms:
    - id: GO:0004602
      label: glutathione peroxidase activity
    supported_by:
    - reference_id: file:XANCP/Q8P365/Q8P365-uniprot.txt
      supporting_text: "RecName: Full=Glutathione peroxidase {ECO:0000256|RuleBase:RU000499};"
    - reference_id: file:XANCP/Q8P365/Q8P365-uniprot.txt
      supporting_text: Belongs to the glutathione peroxidase family.
    - reference_id: file:XANCP/Q8P365/Q8P365-uniprot.txt
      supporting_text: Pfam; PF00255; GSHPx; 1.
- term:
    id: GO:0006979
    label: response to oxidative stress
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: involved_in
  review:
    summary: >-
      KEEP_AS_NON_CORE. This is a broader parent of GO:0034599 (cellular
      response to oxidative stress) which is already annotated via IBA.
      Biologically consistent but redundant with the more specific IBA
      annotation.
    action: KEEP_AS_NON_CORE
    reason: >-
      GO:0006979 (response to oxidative stress) is an ancestor of GO:0034599
      (cellular response to oxidative stress). The IBA annotation to the more
      specific child term already captures the biology. Retaining this broader
      IEA annotation is not incorrect but adds no new information; it is kept
      as non-core.
    supported_by:
    - reference_id: file:XANCP/Q8P365/Q8P365-uniprot.txt
      supporting_text: Belongs to the glutathione peroxidase family.
    - reference_id: file:XANCP/Q8P365/Q8P365-deep-research-falcon.md
      supporting_text: >-
        The domain architecture of Q8P365 is consistent with this
        interpretation, but this should be treated as an inference rather than a
        confirmed species-specific function.
- term:
    id: GO:0098869
    label: cellular oxidant detoxification
  evidence_type: IEA
  original_reference_id: GO_REF:0000108
  qualifier: involved_in
  review:
    summary: >-
      ACCEPT. Logical inference from peroxidase activity to cellular oxidant
      detoxification is well-founded for a glutathione peroxidase.
    action: ACCEPT
    reason: >-
      This annotation is derived from GO logical inference (GO_REF:0000108):
      proteins with peroxidase activity (GO:0004601) are inferred to be
      involved in cellular oxidant detoxification (GO:0098869). For a
      glutathione peroxidase-family protein, this inference is biologically
      sound. GPx enzymes reduce reactive oxygen species and organic
      hydroperoxides, which is precisely what cellular oxidant detoxification
      describes. This represents the core biological process role of the enzyme.
    supported_by:
    - reference_id: file:XANCP/Q8P365/Q8P365-uniprot.txt
      supporting_text: "RecName: Full=Glutathione peroxidase {ECO:0000256|RuleBase:RU000499};"
    - reference_id: file:XANCP/Q8P365/Q8P365-deep-research-falcon.md
      supporting_text: >-
        a predicted glutathione peroxidase-family antioxidant enzyme likely
        involved in cellular peroxide defense.
