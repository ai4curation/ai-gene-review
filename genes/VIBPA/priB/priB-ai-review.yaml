id: Q87L73
gene_symbol: priB
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:223926
  label: Vibrio parahaemolyticus serotype O3:K6 (strain RIMD 2210633)
description: >-
  PriB is a homodimeric OB-fold single-stranded DNA-binding protein that functions
  as an accessory factor in the PriA-dependent replication restart primosome. It
  stabilizes PriA at stalled or abandoned replication forks and facilitates recruitment
  of DnaT, ultimately enabling reloading of the replicative helicase DnaB to resume
  chromosomal DNA replication. PriB is not an enzyme; its molecular activity is ssDNA
  binding and scaffolding protein-DNA assemblies for replication restart. In Vibrionaceae,
  priB is typically essential but can be lost in lineages that acquire viral helicase
  loader genes.
existing_annotations:
- term:
    id: GO:0003697
    label: single-stranded DNA binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  review:
    summary: >-
      PriB is a well-characterized ssDNA-binding protein with an OB-fold domain.
      Crystal structures of E. coli PriB bound to ssDNA demonstrate direct ssDNA
      contacts via key residues (Phe42, Trp47, Lys82) with a wild-type Kd of ~35 nM
      for 30-nt ssDNA. The V. parahaemolyticus protein contains the conserved SSB/PriB
      OB-fold domain (IPR000424, IPR023646). UniProt annotates this protein with the
      SSB domain spanning the full length (residues 1-100). This is the core molecular
      function of PriB.
    action: ACCEPT
    reason: >-
      Single-stranded DNA binding is the primary and best-supported molecular function
      of PriB. Structural and biochemical studies across multiple bacterial species
      confirm this activity. The V. parahaemolyticus protein has the conserved OB-fold
      domain and key residues for ssDNA binding. The IEA annotation via InterPro domain
      mapping is well-supported.
    supported_by:
      - reference_id: file:VIBPA/priB/priB-deep-research-falcon.md
        supporting_text: >-
          PriB uses its OB-fold surface in a binding mode distinct from tetrameric
          EcoSSB, supporting the view that OB-fold proteins can diversify binding
          geometries even when fold is conserved.
      - reference_id: file:VIBPA/priB/priB-deep-research-falcon.md
        supporting_text: >-
          A fluorescence anisotropy analysis of E. coli PriB binding to a 30-nt ssDNA
          reported WT Kd = 34.6 +/- 7.7 nM and showed that mutations at residues
          implicated in ssDNA binding reduce affinity.
      - reference_id: file:VIBPA/priB/priB-deep-research-falcon.md
        supporting_text: >-
          Primary structure/structural studies define PriB as a homodimer with each
          monomer adopting an oligonucleotide/oligosaccharide-binding (OB) fold and
          having prominent flexible loops (e.g., L45) important for ssDNA binding.

- term:
    id: GO:0006260
    label: DNA replication
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: >-
      GO:0006260 (DNA replication) is a very broad biological process term. While PriB
      is involved in DNA replication in the sense that it helps restart stalled
      replication forks, its specific role is in replication restart/fork processing,
      not in general DNA replication initiation or elongation. A more specific term,
      GO:0031297 (replication fork processing), precisely captures PriB's biological
      process: restoring stalled replication forks to a functional state and restarting
      replication.
    action: MODIFY
    reason: >-
      PriB does not participate in origin-dependent replication initiation or general
      replication elongation. Its role is specifically in the PriA-dependent replication
      restart pathway, which reloads the replicative helicase at stalled or abandoned
      forks. GO:0031297 (replication fork processing), defined as "the process in which
      a DNA replication fork that has stalled is restored to a functional state and
      replication is restarted", is the appropriate specific term. The broad term
      GO:0006260 is not wrong per se but is insufficiently specific.
    proposed_replacement_terms:
      - id: GO:0031297
        label: replication fork processing
    supported_by:
      - reference_id: file:VIBPA/priB/priB-deep-research-falcon.md
        supporting_text: >-
          Involved in the restart of stalled replication forks, which reloads the
          replicative helicase on sites other than the origin of replication; the
          PriA-PriB pathway is the major replication restart pathway.
      - reference_id: file:VIBPA/priB/priB-deep-research-falcon.md
        supporting_text: >-
          PriB acts within the PriA-dependent replication restart pathway and is part
          of the early pre-primosome assembly sequence (PriA first, PriB second,
          followed by DnaT recruitment and helicase loading).

- term:
    id: GO:0006261
    label: DNA-templated DNA replication
  evidence_type: IEA
  original_reference_id: GO_REF:0000104
  review:
    summary: >-
      GO:0006261 (DNA-templated DNA replication) is a child of GO:0006260 (DNA
      replication) and is still too broad for PriB's function. PriB does not directly
      participate in the general process of DNA-templated DNA replication (polymerase
      activity, elongation, etc.). Its role is specifically in restarting stalled
      replication forks via the primosome pathway. GO:0031297 (replication fork
      processing) is the correct specific term.
    action: MODIFY
    reason: >-
      Same reasoning as for GO:0006260. PriB's biological process is replication
      restart, not general DNA-templated replication. The term GO:0031297 (replication
      fork processing) more accurately captures the function of PriB as an accessory
      factor that helps restore stalled replication forks. While DNA-templated DNA
      replication is an ancestor term of replication fork processing in the GO
      hierarchy, annotating directly to the more specific term is preferable.
    proposed_replacement_terms:
      - id: GO:0031297
        label: replication fork processing
    supported_by:
      - reference_id: file:VIBPA/priB/priB-deep-research-falcon.md
        supporting_text: >-
          Essential component of the origin-independent DNA replication restart pathway.
          Operates within the primosome complex to reactivate prematurely abandoned or
          stalled replication forks, culminating in the reloading of the replicative
          DNA helicase (DnaB).
      - reference_id: file:VIBPA/priB/priB-deep-research-falcon.md
        supporting_text: >-
          Bacterial chromosome replication frequently encounters impediments that can
          stall or collapse replisomes; restart pathways reload the replicative helicase
          (DnaB in E. coli) and rebuild replisomes at abandoned forks to ensure genome
          duplication completes.

- term:
    id: GO:0030894
    label: replisome
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: >-
      GO:0030894 (replisome) is defined as the multiprotein complex that carries out
      DNA replication at the replication fork, typically including DNA polymerase,
      helicase, primase, and associated factors. PriB is not a component of the active
      replisome. It is a component of the replication restart primosome, which is a
      distinct complex that assembles transiently at stalled forks to reload the
      replicative helicase. The correct cellular component term is GO:1990077
      (primosome complex), which is already annotated separately.
    action: MODIFY
    reason: >-
      PriB is explicitly described in the literature and UniProt as a component of the
      replication restart primosome, not the replisome. The replisome is the complex
      that actively replicates DNA (including polymerase, helicase, primase), while the
      primosome is a transient assembly that reloads the helicase at stalled forks.
      UniProt states PriB is a "Component of the replication restart primosome" and the
      correct CC term GO:1990077 (primosome complex) is already annotated. This
      InterPro-based IEA mapping to replisome appears to be an over-broad mapping from
      the IPR023646 domain. The annotation should be modified to GO:1990077.
    proposed_replacement_terms:
      - id: GO:1990077
        label: primosome complex
    supported_by:
      - reference_id: file:VIBPA/priB/priB-deep-research-falcon.md
        supporting_text: >-
          Homodimer. Interacts with PriA and DnaT. Component of the replication restart
          primosome. Primosome assembly occurs via a 'hand-off' mechanism. PriA binds
          to replication forks, subsequently PriB then DnaT bind.
      - reference_id: file:VIBPA/priB/priB-deep-research-falcon.md
        supporting_text: >-
          A canonical E. coli restart primosome is described as comprising PriA helicase,
          PriB, PriC, DnaT, DnaC, DnaB, and DnaG primase, with assembly occurring on
          forked DNA substrates.

- term:
    id: GO:1990077
    label: primosome complex
  evidence_type: IEA
  original_reference_id: GO_REF:0000104
  review:
    summary: >-
      GO:1990077 (primosome complex) is the correct cellular component for PriB. PriB
      is explicitly described as a component of the replication restart primosome in
      both UniProt (HAMAP-Rule:MF_00720) and the primary literature. The primosome
      assembles at stalled replication forks in a sequential manner: PriA binds first,
      PriB stabilizes PriA, and DnaT is subsequently recruited. This is PriB's core
      cellular component annotation.
    action: ACCEPT
    reason: >-
      PriB is a bona fide primosome component. UniProt explicitly states it is a
      "Component of the replication restart primosome." Structural and biochemical
      studies confirm PriB's role as the second protein to assemble in the primosome
      after PriA. The 2023 cryo-EM structure directly visualizes PriB docked onto PriA
      at a replication fork. This IEA annotation is well-supported.
    supported_by:
      - reference_id: file:VIBPA/priB/priB-deep-research-falcon.md
        supporting_text: >-
          Component of the replication restart primosome. Primosome assembly occurs via
          a 'hand-off' mechanism. PriA binds to replication forks, subsequently PriB
          then DnaT bind; DnaT then displaces ssDNA to generate the helicase loading
          substrate.
      - reference_id: file:VIBPA/priB/priB-deep-research-falcon.md
        supporting_text: >-
          A major advance is a cryo-EM structure of an E. coli PriA/PriB/replication
          fork complex (Nature Communications, May 2023). The study reports a ~3.2 A
          global-resolution map from a major class representing ~80% of particles.

