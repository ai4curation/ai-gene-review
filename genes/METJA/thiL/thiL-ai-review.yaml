        phosphorylation of thiamin monophosphate (TMP) to form thiamin
        pyrophosphate (TPP), the active form of vitamin B 1.
    - reference_id: PMID:30867460
      supporting_text: >-
        Thiamine monophosphate kinase (ThiL) catalyzes the last step of thiamine
        pyrophosphate (TPP) synthesis, the ATP-dependent phosphorylation of
        thiamine monophosphate (TMP) to thiamine pyrophosphate.
suggested_questions:
- question: >-
    Has ThiL from M. jannaschii been directly assayed for thiamine-phosphate kinase
    activity, and does the hyperthermophilic enzyme show any unusual kinetic or
    stability properties compared to mesophilic homologs?
- question: >-
    What is the physiological source of TMP in M. jannaschii -- does it use the
    canonical ThiE (thiamine phosphate synthase) or the bifunctional ThiDN?
suggested_experiments:
- description: >-
    Express and purify recombinant M. jannaschii ThiL (Q60337) and perform in vitro
    kinase assays at thermophilic temperatures (65-85 C) to confirm thiamine-phosphate
    kinase activity and determine kinetic parameters. Compare with mesophilic ThiL
    enzymes to assess thermoadaptation.
  hypothesis: >-
    M. jannaschii ThiL will show optimal activity at hyperthermophilic temperatures
    (around 80 C) with kinetic parameters comparable to characterized ThiL enzymes
    from mesophilic organisms.
- description: >-
    Determine the crystal structure of M. jannaschii ThiL to compare the active
    site architecture with the known structures from A. aeolicus and A. baumannii,
    particularly examining metal coordination geometry at the higher physiological
    temperature of this organism.
  hypothesis: >-
    The M. jannaschii ThiL structure will reveal conserved active-site geometry with
    potential thermostabilizing features (e.g., additional salt bridges, compact
    hydrophobic core) compared to mesophilic homologs.
