id: Q60337
gene_symbol: thiL
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:243232
  label: Methanocaldococcus jannaschii (strain ATCC 43067 / DSM 2661 / JAL-1 / JCM
    10045 / NBRC 100440)
description: >-
  thiL encodes thiamine-monophosphate kinase (EC 2.7.4.16), which catalyzes the
  ATP-dependent phosphorylation of thiamine monophosphate (TMP) to form thiamine
  pyrophosphate (TPP), the biologically active cofactor form of vitamin B1. ThiL
  is a homodimeric enzyme belonging to the PurM-like ATP-binding superfamily with a
  bilobal fold (N-terminal and C-terminal PurM-like domains). Structural studies on
  homologs from Aquifex aeolicus and Acinetobacter baumannii demonstrate that ThiL
  uses a direct in-line transfer of the gamma-phosphate of ATP to TMP, rather than
  a phosphorylated enzyme intermediate. The active site requires multiple magnesium
  ions and sits at the dimer interface. In M. jannaschii, thiamine biosynthesis uses
  a chimeric pathway with a eukaryote-like Thi4 (iron-dependent thiazole synthase)
  and bacterium-like ThiC (HMP-P synthase), regulated by the transcriptional
  repressor ThiR rather than a riboswitch. ThiL catalyzes the terminal step of this
  pathway, converting TMP to the active cofactor TPP. All current annotations for
  Q60337 are based on homology; no direct experimental characterization of this
  specific M. jannaschii protein exists.
existing_annotations:
- term:
    id: GO:0000287
    label: magnesium ion binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000104
  review:
    summary: >-
      IEA annotation for magnesium ion binding based on UniRule transfer (HAMAP
      MF_02128). Crystal structures of ThiL homologs show multiple magnesium ions
      coordinating the phosphate groups of ATP and TMP in the active site.
      Sullivan et al. (2019) demonstrated that the transferred phosphate groups
      specifically require magnesium ions, while other metal positions in the active
      site show more plasticity.
    action: ACCEPT
    reason: >-
      Magnesium binding is well supported by structural studies of ThiL homologs.
      Crystal structures from both A. aeolicus and A. baumannii confirm multiple
      Mg2+ ions in the active site. The M. jannaschii protein conserves all
      HAMAP-predicted magnesium binding residues. This is a core mechanistic
      feature of the enzyme.
    supported_by:
      - reference_id: PMID:30867460
        supporting_text: >-
          a distinct variability of metal content of the active site
      - reference_id: PMID:18311927
        supporting_text: >-
          Thiamin monophosphate kinase (ThiL) catalyzes the ATP-dependent
          phosphorylation of thiamin monophosphate (TMP) to form thiamin
          pyrophosphate (TPP), the active form of vitamin B 1.
- term:
    id: GO:0005524
    label: ATP binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000104
  review:
    summary: >-
      IEA annotation for ATP binding based on UniRule transfer (HAMAP MF_02128).
      ThiL is a member of the PurM-like ATP-binding superfamily and ATP is one of
      the two substrates of the enzyme. Crystal structures confirm a deeply buried
      ATP binding pocket at the dimer interface.
    action: ACCEPT
    reason: >-
      ATP is a direct substrate of ThiL. The ATP binding site is formed by
      conserved residues in the interdomain cleft of the bilobal PurM-like fold.
      Structural studies on homologs confirm ATP binding in this pocket. The
      M. jannaschii protein conserves the key ATP-binding residues predicted
      by HAMAP.
    supported_by:
      - reference_id: PMID:18311927
        supporting_text: >-
          ThiL is a member of a small ATP binding superfamily that also includes
          the purine biosynthetic enzymes, PurM and PurL, NiFe hydrogenase
          maturation protein, HypE, and selenophosphate synthase, SelD.
      - reference_id: PMID:30867460
        supporting_text: >-
          the ATP-dependent phosphorylation of thiamine
          monophosphate (TMP) to thiamine pyrophosphate
- term:
    id: GO:0009030
    label: thiamine-phosphate kinase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  review:
    summary: >-
      IEA annotation for the core molecular function of ThiL, based on combined
      automated annotation methods including InterPro IPR006283, RHEA:15913, and
      EC:2.7.4.16. This is the defining enzymatic activity of the ThiL family:
      ATP-dependent phosphorylation of TMP to form TPP.
    action: ACCEPT
    reason: >-
      This is the core molecular function of ThiL. The M. jannaschii protein matches
      all family-defining signatures (IPR006283, TIGR01379, PTHR30270, CDD cd02194)
      and conserves the catalytic residues. Structural studies on homologs demonstrate
      this activity proceeds via direct in-line transfer of the gamma-phosphate of
      ATP to TMP.
    supported_by:
      - reference_id: PMID:18311927
        supporting_text: >-
          Thiamin monophosphate kinase (ThiL) catalyzes the ATP-dependent
          phosphorylation of thiamin monophosphate (TMP) to form thiamin
          pyrophosphate (TPP), the active form of vitamin B 1.
      - reference_id: PMID:30867460
        supporting_text: >-
          Thiamine monophosphate kinase (ThiL) catalyzes the last step of thiamine
          pyrophosphate (TPP) synthesis
      - reference_id: file:METJA/thiL/thiL-deep-research-bioreason.md
        supporting_text: >-
          A cytosolic enzyme that phosphorylates thiamine monophosphate using ATP
          to produce thiamine pyrophosphate, the active coenzyme form required
          for central carbon metabolism.
- term:
    id: GO:0009228
    label: thiamine biosynthetic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: >-
      IEA annotation for involvement in thiamine biosynthetic process based on
      InterPro2GO mapping from IPR006283 (Thiamine-monophosphate kinase-like). ThiL
      catalyzes the terminal step of thiamine diphosphate biosynthesis, converting
      TMP to TPP. While ThiL is correctly part of the thiamine biosynthetic pathway,
      the more specific term GO:0009229 (thiamine diphosphate biosynthetic process)
      better captures its role.
    action: KEEP_AS_NON_CORE
    reason: >-
      ThiL is part of the overall thiamine biosynthetic pathway, so this annotation
      is not incorrect. However, it is less specific than GO:0009229 (thiamine
      diphosphate biosynthetic process), which directly describes the step ThiL
      catalyzes. The more specific term is already annotated. This broader term is
      retained as non-core since it provides useful pathway context via InterPro2GO
      but does not capture the precise biological role.
    supported_by:
      - reference_id: PMID:18311927
        supporting_text: >-
          Thiamin monophosphate kinase (ThiL) catalyzes the ATP-dependent
          phosphorylation of thiamin monophosphate (TMP) to form thiamin
          pyrophosphate (TPP), the active form of vitamin B 1.
- term:
    id: GO:0009229
    label: thiamine diphosphate biosynthetic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  review:
    summary: >-
      IEA annotation for involvement in the thiamine diphosphate biosynthetic
      process based on combined automated methods (UniRule, UniPathway UPA00060).
      ThiL directly catalyzes the conversion of TMP to TPP (thiamine diphosphate),
      which is the sole step of this sub-pathway.
    action: ACCEPT
    reason: >-
      This is the most specific and accurate biological process annotation for ThiL.
      The enzyme catalyzes the single step from TMP to TPP, which is precisely the
      thiamine diphosphate biosynthetic process. UniPathway UPA00060 step UER00142
      confirms this is a one-step pathway.
    supported_by:
      - reference_id: PMID:30867460
        supporting_text: >-
          Thiamine monophosphate kinase (ThiL) catalyzes the last step of thiamine
          pyrophosphate (TPP) synthesis, the ATP-dependent phosphorylation of
          thiamine monophosphate (TMP) to thiamine pyrophosphate.
      - reference_id: PMID:18311927
        supporting_text: >-
          Thiamin monophosphate kinase (ThiL) catalyzes the ATP-dependent
          phosphorylation of thiamin monophosphate (TMP) to form thiamin
          pyrophosphate (TPP), the active form of vitamin B 1.
- term:
    id: GO:0005737
    label: cytoplasm
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: >-
      NEW annotation. ThiL is a soluble cytoplasmic enzyme with no transmembrane
      domains or signal peptides. The protein lacks any predicted export signals
      and the PurM-like bilobal fold is characteristic of soluble cytoplasmic
      enzymes. The BioReason SFT analysis also inferred cytoplasmic localization
      based on domain architecture.
    action: NEW
    reason: >-
      ThiL is a soluble enzyme that acts on cytoplasmic substrates (ATP and TMP).
      The protein has no transmembrane domains, signal peptides, or other
      localization signals. Cytoplasmic localization is consistent with its
      enzymatic role in the thiamine biosynthetic pathway, where substrates and
      products are cytoplasmic metabolites. Although no direct experimental
      localization data exists for this archaeal protein, the inference is strong
      based on protein architecture and pathway context.
    supported_by:
      - reference_id: file:METJA/thiL/thiL-deep-research-bioreason.md
        supporting_text: >-
          the architecture lacks transmembrane segments or export signals and
          matches a soluble PurM-like bilobal enzyme, the most plausible cellular
          location is the cytosol
references:
- id: GO_REF:0000002
  title: Gene Ontology annotation through association of InterPro records with GO
    terms
  findings:
    - statement: >-
        InterPro2GO mapping from IPR006283 (Thiamine-monophosphate kinase-like)
        to GO:0009228 (thiamine biosynthetic process). This is a correct but
        relatively broad annotation.
- id: GO_REF:0000104
  title: Electronic Gene Ontology annotations created by transferring manual GO annotations
    between related proteins based on shared sequence features
  findings:
    - statement: >-
        UniRule HAMAP MF_02128 transfers ATP binding and magnesium ion binding
        annotations from characterized ThiL proteins. These are core mechanistic
        features supported by crystal structures.
- id: GO_REF:0000120
  title: Combined Automated Annotation using Multiple IEA Methods
  findings:
    - statement: >-
        Combined evidence from InterPro, RHEA, EC number, UniRule, and UniPathway
        supports thiamine-phosphate kinase activity and thiamine diphosphate
        biosynthetic process annotations.
- id: PMID:8688087
  title: Complete genome sequence of the methanogenic archaeon, Methanococcus jannaschii.
  findings:
    - statement: >-
        MJ0028 (thiL) was identified as part of the complete M. jannaschii genome
        sequence. Only 38% of predicted proteins could be assigned a putative
        function with high confidence.
      supporting_text: >-
        A total of 1738 predicted protein-coding genes were identified; however,
        only a minority of these (38 percent) could be assigned a putative
        cellular role with high confidence.
- id: PMID:18311927
  title: Structural studies of thiamin monophosphate kinase in complex with substrates
    and products.
  findings:
    - statement: >-
        Crystal structures of A. aeolicus ThiL with AMP-PCP/TMP (substrates) and
        ADP/TPP (products) established the direct in-line phosphoryl transfer
        mechanism, distinguishing ThiL from other PurM superfamily members that
        use phosphorylated enzyme intermediates.
      supporting_text: >-
        The results suggest that AaThiL utilizes a direct, inline transfer of the
        gamma-phosphate of ATP to TMP rather than a phosphorylated enzyme
        intermediate.
- id: PMID:30867460
  title: Crystal structures of thiamine monophosphate kinase from Acinetobacter
    baumannii in complex with substrates and products.
  findings:
    - statement: >-
        High-resolution structures of A. baumannii ThiL confirm the in-line attack
        mechanism and reveal plasticity in active-site metal identity, though
        magnesium is preferred for the transferred phosphate groups.
      supporting_text: >-
        The structures further support a previously proposed in-line attack reaction
        mechanism and show a distinct variability of metal content of the active
        site.
    - statement: >-
        ThiL is essential for A. baumannii growth and is a potential antimicrobial
        target.
      supporting_text: >-
        the ATP-dependent phosphorylation of thiamine
        monophosphate (TMP) to thiamine pyrophosphate
      full_text_unavailable: true
- id: PMID:6284709
  title: thiK and thiL loci of Escherichia coli.
  findings:
    - statement: >-
        Original identification and naming of the thiL gene in E. coli, encoding
        thiamine monophosphate kinase activity. Mutants lacking ThiL respond only
        to thiamine pyrophosphate, not thiamine monophosphate.
      supporting_text: >-
        the latter lacks thiamine monophosphate kinase activity
- id: PMID:28115546
  title: ThiN as a versatile domain of transcriptional repressors and catalytic
    enzymes of thiamine biosynthesis.
  findings:
    - statement: >-
        Archaeal thiamine biosynthesis is regulated by a transcriptional repressor
        ThiR (not a riboswitch), and uses a chimeric pathway with eukaryote-like
        Thi4 and bacterium-like ThiC components.
      supporting_text: >-
        thiamine biosynthesis in archaea is regulated by a transcriptional repressor,
        ThiR, and not by a riboswitch
- id: PMID:26928142
  title: From suicide enzyme to catalyst -- the iron-dependent sulfide transfer in
    Methanococcus jannaschii thiamin thiazole biosynthesis.
  findings:
    - statement: >-
        The M. jannaschii Thi4 ortholog uses exogenous sulfide and is catalytic
        (multiple turnover), unlike the yeast Thi4p which is a suicide enzyme.
        This establishes the upstream thiazole synthesis pathway feeding into ThiL.
      supporting_text: >-
        the Thi4 ortholog from Methanococcus jannaschii uses exogenous sulfide and
        is catalytic
- id: PMID:12376536
  title: Comparative genomics of thiamin biosynthesis in procaryotes.
  findings:
    - statement: >-
        Comparative genomics analysis reveals that archaea, eubacteria, and
        eukaryota have different pathways for HMP and thiazole biosynthesis, but
        the terminal ThiL step (TMP to TPP) is broadly conserved.
      supporting_text: >-
        eubacteria, archaea, and eukaryota have different pathways for the HMP
        and hydroxyethylthiazole biosynthesis
core_functions:
- description: >-
    ThiL catalyzes the ATP-dependent phosphorylation of thiamine monophosphate (TMP)
    to form thiamine pyrophosphate (TPP), the active cofactor form of vitamin B1.
    This is the terminal step of the thiamine diphosphate biosynthetic pathway.
    The enzyme functions as a homodimer with a bilobal PurM-like fold, using a
    direct in-line phosphoryl transfer mechanism with multiple magnesium ions
    in the active site.
