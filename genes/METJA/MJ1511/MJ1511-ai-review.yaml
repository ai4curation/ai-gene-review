  label: Methanocaldococcus jannaschii (strain ATCC 43067 / DSM 2661 / JAL-1 / JCM
    10045 / NBRC 100440)
description: MJ1511 is a small (107 aa), uncharacterized protein from the hyperthermophilic
  archaeon Methanocaldococcus jannaschii. It belongs to the AhpD-like / CMD (carboxymuconolactone
  decarboxylase-like) structural superfamily (IPR029032, IPR003779, Pfam PF02627).
  However, MJ1511 lacks the conserved CXXC catalytic motif that is essential for
  canonical AhpD peroxidase activity. Its two cysteines (Cys-17 and Cys-107) are
  separated by 90 residues, unlike the 2-3 residue spacing seen in functionally
  characterized AhpD enzymes. No direct experimental literature exists for this protein.
  Its function remains genuinely uncertain.
existing_annotations:
- term:
    id: GO:0016491
    label: oxidoreductase activity
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: IBA annotation for oxidoreductase activity based on PANTHER phylogenetic
      inference (PTN002142863) using M. tuberculosis AhpD (P9WQB5) as reference.
      The phylogenetic transfer is questionable because MJ1511 lacks the conserved
      CXXC catalytic motif that is essential for AhpD-type thiol-disulfide oxidoreductase
      activity. P9WQB5 has Cys-130/Cys-133 in a CXXC motif, while MJ1511 has only
      Cys-17 and Cys-107 separated by 90 residues. The AhpD-like fold is conserved,
      but the catalytic machinery for oxidoreductase activity appears absent.
    action: UNDECIDED
    reason: The structural fold is conserved (AhpD-like), which supports membership
      in the broader superfamily. However, the absence of the CXXC catalytic motif
      means the specific oxidoreductase activity that characterizes functional AhpD
      enzymes may not apply to MJ1511. Without experimental data, it is impossible
      to confirm whether this protein retains oxidoreductase activity through a
      non-canonical mechanism or has diverged to a different function entirely.
    supported_by:
    - reference_id: PMID:11914371
      supporting_text: The two catalytic sulfhydryl groups, Cys-130 and Cys-133, are
        located near a central cavity in the trimer
    - reference_id: PMID:12761216
      supporting_text: The collective results strongly support the proposed catalytic
        mechanism for AhpD
    - reference_id: PMID:21615954
      supporting_text: the functional activity is supplied by a proton relay system
        of five residues, Glu36, Cys48, Tyr50, Cys51, and His55, and one structural
        water molecule
    - reference_id: file:METJA/MJ1511/MJ1511-deep-research-bioreason.md
      supporting_text: '[BioReason SFT trace identifies AhpD-like fold but functional
        claims are largely unsupported]'
core_functions:
- description: MJ1511 has the AhpD-like structural fold but lacks the conserved CXXC
    catalytic motif found in functionally characterized AhpD peroxidases. Its molecular
    function is genuinely unknown. The AhpD-like fold could potentially support a
    non-canonical redox function, a decarboxylase function (CMD-like), or a structural
    or regulatory role unrelated to peroxide detoxification. Without experimental
    data, no specific molecular function can be confidently assigned.
  supported_by:
  - reference_id: PMID:11914371
    supporting_text: The two catalytic sulfhydryl groups, Cys-130 and Cys-133, are
      located near a central cavity in the trimer
  - reference_id: PMID:21615954
    supporting_text: A comparison of five other related hypothetical proteins from
      various species, assigned to the alkyl hydroperoxidase D-like protein family,
      shows they contain the same conserved structural motif and catalytic sequence
      Cys-X-X-Cys
  molecular_function:
    id: GO:0003674
    label: molecular_function
references:
- id: PMID:8688087
  title: Complete genome sequence of the methanogenic archaeon, Methanococcus jannaschii
  findings:
  - statement: MJ1511 was identified as an ORF in the M. jannaschii genome sequence.
      No function was assigned.
    supporting_text: A total of 1738 predicted protein-coding genes were identified;
      however, only a minority of these (38 percent) could be assigned a putative
      cellular role with high confidence
- id: PMID:11914371
  title: The crystal structure of Mycobacterium tuberculosis alkylhydroperoxidase
    AhpD, a potential target for antitubercular drug design
  findings:
  - statement: M. tuberculosis AhpD has a CXXC catalytic motif (Cys-130, Cys-133)
      essential for alkylhydroperoxidase activity. The structure reveals an all-helical
      fold.
    supporting_text: The two catalytic sulfhydryl groups, Cys-130 and Cys-133, are
      located near a central cavity in the trimer
  - statement: The catalytic mechanism involves deprotonation of Cys-133 via a proton
      relay and subsequent disulfide bond formation.
    supporting_text: The structure supports a mechanism for the alkylhydroperoxidase
      activity in which Cys-133 is deprotonated by a distant glutamic acid via the
      relay action of His-137 and a water molecule
- id: PMID:12761216
  title: The mechanism of Mycobacterium tuberculosis alkylhydroperoxidase AhpD as
    defined by mutagenesis, crystallography, and kinetics
  findings:
  - statement: Mutagenesis confirms the CXXC-dependent catalytic mechanism of AhpD,
      with both catalytic cysteines essential for activity.
    supporting_text: The collective results strongly support the proposed catalytic
      mechanism for AhpD
- id: PMID:21615954
  title: Crystal structure of alkyl hydroperoxidase D like protein PA0269 from Pseudomonas
    aeruginosa
  findings:
  - statement: P. aeruginosa AhpD-like protein has the same conserved CXXC motif and
      proton relay system as M. tuberculosis AhpD, with weak peroxidase activity.
    supporting_text: the functional activity is supplied by a proton relay system
      of five residues, Glu36, Cys48, Tyr50, Cys51, and His55, and one structural
      water molecule
  - statement: The conserved catalytic CXXC sequence is present across functional
      members of the AhpD-like family.
    supporting_text: A comparison of five other related hypothetical proteins from
      various species, assigned to the alkyl hydroperoxidase D-like protein family,
      shows they contain the same conserved structural motif and catalytic sequence
      Cys-X-X-Cys
- id: PMID:26402328
  title: Structure of lpg0406, a carboxymuconolactone decarboxylase family protein
    possibly involved in antioxidative response from Legionella pneumophila
  findings:
  - statement: CMD family proteins share the AhpD-like fold and can have CXXC-dependent
      redox activity, but substrate preferences vary across family members.
    supporting_text: The protein has an all-helical fold with a conserved thioredoxin-like
      active site CXXC motif and a proton relay system similar to that of alkylhydroperoxidase
      from Mycobacterium tuberculosis
- id: PMID:31974167
  title: Structure-function analyses of alkylhydroperoxidase D from Streptococcus
    pneumoniae reveal an unusual three-cysteine active site architecture
  findings:
  - statement: Not all AhpD family members function as classical peroxidases. S. pneumoniae
      AhpD does not transfer electrons to AhpC and may instead act as a redox switch.
    supporting_text: We propose that it is unlikely that SpAhpD removes peroxides either
      directly or via AhpC, and that SpAhpD cysteine oxidation may act as a redox switch
      or mediate electron transfer with other thiol proteins
