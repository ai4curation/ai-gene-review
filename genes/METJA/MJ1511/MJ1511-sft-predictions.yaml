  predicted_term:
    id: GO:0016671
    label: oxidoreductase activity, acting on a sulfur group of donors, disulfide
      as acceptor
  predicted_term_type: GO_MF
  review:
    assessment: NPI
    confidence_score: 0
    error_type: PSEUDOENZYME_OVERANNOTATION
    summary: >-
      An independent OpenScientist structural/comparative investigation (see file
      reference) refutes this prediction. MJ1511 lacks the CxxC redox motif that is
      universally required across characterized AhpD-like proteins, has zero histidines
      for the proton-relay mechanism, and its only two cysteines lie ~36.5 Angstroms
      apart in the high-confidence AlphaFold model -- far beyond the ~4-5 Angstroms
      needed to form a catalytic disulfide. The fold is retained but the catalytic
      machinery is absent, so this is a pseudoenzyme over-annotation; the generic GOA
      GO:0016491 (IBA from PANTHER) reflects the same unvalidated domain/phylogenetic
      transfer. Upgraded from UNC to NPI on this residue-level evidence. Caveat: no
      direct biochemical assay of MJ1511 has been published, so this is a strong
      computational lead rather than experimental proof.
    supported_by:
      - reference_id: file:METJA/MJ1511/MJ1511-hypotheses/prediction-thiol-disulfide-oxidoreductase/openscientist.md
        supporting_text: >-
          completely lacks the CxxC motif universally required across all characterized
          AhpD-like proteins
      - reference_id: file:METJA/MJ1511/MJ1511-hypotheses/prediction-thiol-disulfide-oxidoreductase/openscientist.md
        supporting_text: >-
          only two cysteines are separated by 36.5 Angstroms in the high-confidence
          AlphaFold structure
