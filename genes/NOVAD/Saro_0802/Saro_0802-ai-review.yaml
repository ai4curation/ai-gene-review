gene_symbol: Saro_0802
product_type: PROTEIN
status: IN_PROGRESS
taxon:
  id: NCBITaxon:279238
  label: Novosphingobium aromaticivorans (strain ATCC 700278 / DSM 12444 / CCUG 56034
    / CIP 105152 / NBRC 16084 / F199)
description: >-
  Saro_0802 encodes NOV1, a bacterial resveratrol-cleaving dioxygenase (stilbene cleavage oxygenase,
  SCO) of Novosphingobium aromaticivorans. It is a non-heme Fe(II) enzyme of the carotenoid cleavage
  oxygenase (CCO/RPE65) superfamily that oxidatively cleaves the central interphenyl Calpha-Cbeta
  double bond of stilbenes into two aromatic aldehydes; it has been structurally characterized in
  complex with the substrate resveratrol and the product vanillin. NOV1 is a seven-bladed beta-propeller
  with an iron cofactor coordinated by four histidines, and its mechanism proceeds via a side-on
  ferric-superoxide that reacts with substrate activated by deprotonation of the 4-hydroxyl (4'-OH),
  making the 4'-OH catalytically essential; NOV1 cleaves a wide range of 4'-hydroxy stilbene-like
  compounds. It also converts the lignin-derived phenylpropene isoeugenol to vanillin and is of interest
  for lignin valorization. Despite automated annotations to the contrary, NOV1 is not a carotenoid
  cleavage enzyme.
