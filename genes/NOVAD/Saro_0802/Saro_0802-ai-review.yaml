core_functions:
- description: >-
    Non-heme Fe(II) stilbene cleavage dioxygenase that oxidatively cleaves the interphenyl Calpha-Cbeta
    double bond of resveratrol and other 4'-hydroxy stilbenes (and isoeugenol) into aromatic aldehydes.
    The 4'-OH is catalytically essential (its deprotonation activates the substrate for the side-on
    ferric-superoxide). GO:0016702 is the validated MF term; the specific term is GO:7770086 (resveratrol
    dioxygenase activity, RHEA:73735), not yet in the released ontology snapshot.
  molecular_function:
    id: GO:0016702
    label: oxidoreductase activity, acting on single donors with incorporation of
      molecular oxygen, incorporation of two atoms of oxygen
  directly_involved_in:
    - id: GO:0046272
      label: stilbene catabolic process
  supported_by:
    - reference_id: PMID:27911781
      supporting_text: >-
        activated by deprotonation of a phenol group at position 4 of the substrate
suggested_questions:
- question: >-
    The carotenoid dioxygenase activity/process annotations on NOV1 come from the TreeGrafter rule
    (GO_REF:0000118); should this rule be corrected so it does not assign carotenoid terms to the
    stilbene-cleaving (SCO) branch of the CCO family?
suggested_experiments:
- description: >-
    Comparative substrate-panel + structural analysis of NOV1 versus CAO-1 to test whether the wider
    4'-hydroxy-stilbene tolerance of NOV1 reflects a more open binding cleft than CAO-1's two-anchor
    (4'-OH -> Tyr/Lys; 3/5-OH -> Glu) pocket.
references:
- id: GO_REF:0000002
  title: Gene Ontology annotation through association of InterPro records with GO
    terms
  findings: []
- id: GO_REF:0000118
  title: TreeGrafter-generated GO annotations
  findings: []
  reference_review:
    relevance: LOW
    correctness: MISCITED
    review_notes: >-
      TreeGrafter propagated carotenoid dioxygenase activity and carotene catabolic process onto NOV1,
      a stilbene cleavage oxygenase - a substrate-class over-annotation from the mixed CCO family. The
      InterPro2GO dioxygenase term is fine; the two carotenoid terms are the error.
- id: PMID:27911781
  title: Structure and mechanism of NOV1, a resveratrol-cleaving dioxygenase.
  findings:
  - statement: >-
      NOV1 is a resveratrol-cleaving stilbene cleavage oxygenase with a seven-bladed beta-propeller and
      a four-His non-heme iron center; solved with resveratrol (substrate) and vanillin (product).
    supporting_text: >-
      an iron cofactor coordinated by four histidines
  - statement: >-
      Catalysis requires deprotonation of the substrate 4-hydroxyl to activate it for the ferric-
      superoxide, so NOV1 cleaves a wide range of 4'-OH stilbene-like compounds.
    supporting_text: >-
      NOV1 cleaves a wide range of other stilbene-like compounds with a 4'-OH group
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Primary structural + mechanistic paper establishing NOV1 as a resveratrol/stilbene cleavage
      dioxygenase (not carotenoid) and defining the 4'-OH-deprotonation mechanism. PMC full text verified.
- id: PMID:35687874
  title: Rationally Guided Improvement of NOV1 Dioxygenase for the Conversion of Lignin-Derived
    Isoeugenol to Vanillin.
  findings:
  - statement: >-
      NOV1 also cleaves the lignin-derived phenylpropene isoeugenol to vanillin and has been engineered
      for improved conversion - a lignin-valorization application.
    supporting_text: >-
      Isoeugenol to Vanillin
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: >-
      Establishes a second (biotechnologically relevant) substrate for NOV1; supports the broader
      substrate range and the non-carotenoid function. PMC full text available.
