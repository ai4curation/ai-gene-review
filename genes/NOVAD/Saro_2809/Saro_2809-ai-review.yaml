  findings:
  - statement: >-
      NOV2 is a stilbenoid cleavage oxygenase characterized (with CAO-1) using resveratrol and
      piceatannol as substrates; it shares the four-His non-heme iron center of the CCO family.
    supporting_text: >-
      resveratrol and piceatannol for NOV2 and CAO1
  reference_review:
