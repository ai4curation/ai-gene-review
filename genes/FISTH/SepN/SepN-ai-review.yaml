id: G6FVY1
gene_symbol: SepN
aliases:
  - G6FVY1
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:741277
  label: Fischerella thermalis JSC-11
description: >-
  SepN (locus FJSC11DRAFT_3072; UniProt G6FVY1) is a bitopic cytoplasmic-membrane protein
  of the filamentous, heterocyst-forming cyanobacterium Fischerella thermalis JSC-11, a
  true-branching member of the deep-branching Stigonematales. It is the ortholog of the
  experimentally characterized SepN of Nostoc sp. PCC 7120, the plug-forming structural
  component of the septal junction (SJ) - the gap-junction-like intercellular channel that
  traverses the septal peptidoglycan and connects adjacent cells in a filament to allow
  gated cell-cell molecular exchange. SepN has an N-terminal transmembrane helix that
  anchors it in the cytoplasmic membrane and a large cytoplasmic domain; in the
  characterized ortholog five SepN copies assemble into a central pentameric plug that is
  surrounded by peripheral FraD anchors and gates (opens and closes) the intercellular
  channel, thereby controlling cell-cell communication along the filament. SepN lacks any
  Pfam/InterPro/PANTHER family model and is a signature protein of the order Nostocales
  that co-occurs with FraD.
references:
  - id: PMID:36470860
    title: "SepN is a septal junction component required for gated cell-cell communication in the filamentous cyanobacterium Nostoc."
    reference_review:
      relevance: HIGH
      correctness: VERIFIED
      review_notes: >-
        Discovery/characterization paper for the PCC 7120 SepN ortholog (Kieninger et al.,
        Nat Commun 2022). Identifies SepN as the FraD-interacting septal-junction plug
        component required for gated cell-cell communication, and reports conserved SepN
        homologs reaching the Stigonematales. Functional statements are transferred to
        F. thermalis G6FVY1 by orthology (ISS); no direct assay on G6FVY1. Full text
        available in cache; PMID matches title.
  - id: PMID:42424141
    title: "The SepN-FraD structural module serves as an anchor and assembly platform for septal junctions in cyanobacteria."
    reference_review:
      relevance: HIGH
      correctness: VERIFIED
      review_notes: >-
        Structural paper for the PCC 7120 SepN ortholog (Kieninger et al., Cell Rep 2026).
        Models SepN as a pentameric plug anchored by FraD. Basis for the transferred
        structural-plug function; PubMed-verified.
  - id: file:FISTH/SepN/SepN-notes.md
    title: SepN (G6FVY1 / FJSC11DRAFT_3072) research notes
    reference_review:
      relevance: HIGH
      correctness: VERIFIED
      review_notes: >-
        Orthology-evidence notes for G6FVY1: reciprocal-best-hit homology to PCC 7120 SepN
