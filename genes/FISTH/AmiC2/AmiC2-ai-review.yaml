core_functions:
- description: >-
    Septal cell-wall N-acetylmuramoyl-L-alanine amidase that hydrolyses peptidoglycan to
    drill and pattern the nanopore array in the septal cross-wall, thereby creating the
    framework for septal junctions and enabling intercellular communication, filament
    integrity and heterocyst differentiation (inferred by reciprocal-best-hit orthology to
    the characterized PCC 7120 / N. punctiforme AmiC2). In F. thermalis this AmiC2
    (FJSC11DRAFT_3096) is one of a retained tandem AmiC1/AmiC2 pair (AmiC1 = FJSC11DRAFT_3094).
