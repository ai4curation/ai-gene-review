- term:
    id: GO:0009253
    label: peptidoglycan catabolic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: involved_in
  review:
    summary: >-
      Core biological process. As an N-acetylmuramoyl-L-alanine amidase, AmiC2 hydrolyses
      (breaks down) peptidoglycan. In the characterized PCC 7120 ortholog, the enzyme
      perforates the septal peptidoglycan to drill the nanopore array; the biologically
      salient activity is specialized, localized septal PG remodelling rather than bulk PG
      turnover, but amidase cleavage of PG is legitimately peptidoglycan catabolism.
    action: ACCEPT
    reason: >-
      Amidase cleavage of peptidoglycan is peptidoglycan catabolism; supported by the
      catalytic domain and by the PG-perforating activity of the AmiC2 ortholog.
    supported_by:
    - reference_id: PMID:28929086
      supporting_text: This enzyme perforates the septal peptidoglycan creating an array
        of nanopores, which may be the framework for septal junction complexes
- term:
    id: GO:0030288
    label: outer membrane-bounded periplasmic space
  evidence_type: IEA
  original_reference_id: GO_REF:0000118
  qualifier: located_in
  review:
    summary: >-
      Localization annotation. AmiC2 is a secreted amidase (N-terminal signal peptide,
      residues 1-24) that acts on the septal peptidoglycan, which in this outer-membrane-
      bearing (diderm) cyanobacterium lies within the periplasmic space between the
      cytoplasmic and outer membranes. The TreeGrafter periplasmic-space call is therefore
      defensible. However, the orthology-supported and more informative location is the
      cell septum / cross-wall (see the added GO:0030428 annotation).
    action: ACCEPT
    reason: >-
      Consistent with a secreted amidase acting on periplasmic septal PG; not wrong, though
      less specific than the septal localization observed for the AmiC2 ortholog.
    supported_by:
    - reference_id: PMID:28929086
      supporting_text: both amidases, AmiC1 and AmiC2, localized to the septa of young
        vegetative cells and to the septal and polar neck areas connecting heterocysts with
        vegetative cells
    - reference_id: file:FISTH/AmiC2/AmiC2-uniprot.txt
      supporting_text: 'SubName: Full=Cell wall hydrolase/autolysin'
- term:
    id: GO:0071555
    label: cell wall organization
  evidence_type: ISS
  original_reference_id: PMID:28929086
  qualifier: involved_in
  review:
    summary: >-
      By orthology (63.8% identity, reciprocal best hit) to the characterized PCC 7120 /
      N. punctiforme AmiC2, G6FW05 is inferred to remodel and pattern the septal cell wall
      by drilling the nanopore array, a specialized cell-wall organization process distinct
      from bulk PG turnover. Not in the GOA set; added by ISS transfer to capture the septal
      PG remodelling core function.
    action: NEW
    reason: >-
      The characterized AmiC2 ortholog does not merely degrade PG but organizes the septal
      cross-wall into a patterned nanopore array; genetics show loss of amiC2 alters septal
      nanopore structure and number. Transferred to G6FW05 by orthology (ISS).
    supported_by:
    - reference_id: PMID:28929086
      supporting_text: This enzyme perforates the septal peptidoglycan creating an array
        of nanopores, which may be the framework for septal junction complexes
- term:
    id: GO:0007267
    label: cell-cell signaling
  evidence_type: ISS
  original_reference_id: PMID:28929086
  qualifier: involved_in
  review:
    summary: >-
      By orthology to the characterized AmiC2, G6FW05 is inferred to drill the septal
      nanopore array through which septal junctions connect neighbouring cytoplasms, and so
      to be required (upstream) for intercellular communication: in PCC 7120, amiC2 (and
      amiC1) inactivation reduces FRAP tracer exchange, and in N. punctiforme loss of AmiC2
      abolishes intercellular communication. Not in the GOA set; added by ISS transfer.
    action: NEW
    reason: >-
      Strong genetic evidence in the characterized orthologs that AmiC2 is required for
      cell-cell communication (the nanopores it creates are the conduits for septal
      junctions); an enabling/upstream role rather than direct signal transfer. Transferred
      to G6FW05 by orthology (ISS).
    supported_by:
    - reference_id: PMID:28929086
      supporting_text: Inactivation of either amidase resulted in significant reduction
        in nanopore count and in the rate of fluorescent tracer exchange between neighboring
        cells measured by FRAP analysis. In an amiC1 amiC2 double mutant, filament morphology
        was affected and heterocyst differentiation was abolished.
    - reference_id: PMID:21244533
      supporting_text: mutation of a single gene, encoding cell wall amidase AmiC2, completely
        changes the morphology and abrogates cell differentiation and intercellular communication
- term:
