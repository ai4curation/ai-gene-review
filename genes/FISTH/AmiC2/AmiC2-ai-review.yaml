taxon:
  id: NCBITaxon:741277
  label: Fischerella thermalis JSC-11
description: >-
  AmiC2 (ORF FJSC11DRAFT_3096, UniProt G6FW05) of the filamentous, true-branching,
  heterocyst-forming cyanobacterium Fischerella thermalis JSC-11 (Stigonematales) is a
  secreted, Zn-dependent cell-wall N-acetylmuramoyl-L-alanine amidase (EC 3.5.1.28). The
  616-residue protein has an N-terminal signal peptide (residues 1-24), tandem AMIN
  peptidoglycan-targeting domains (Pfam PF11741, InterPro IPR021731) and a C-terminal
  Amidase_3 / MurNAc-LAA catalytic domain (Pfam PF01520, InterPro IPR002508; PANTHER
  PTHR30404 "AmiC"), and hydrolyses the amide bond between N-acetylmuramoyl residues and
  L-alanine in peptidoglycan. It is the ortholog (reciprocal best hit, 63.8% identity,
  forward E-value 4.3e-250) of the experimentally characterized AmiC2 of Nostoc/Anabaena sp.
  PCC 7120 (alr0093) and Nostoc punctiforme (Npun_F1846). In these characterized relatives,
  AmiC2 does not split the septum for daughter-cell separation (the role of housekeeping
  amidases in unicellular bacteria) but instead drills a regular array of nanopores into the
  septal cross-wall (murein). This nanopore array forms the framework through which septal
  junctions connect the cytoplasms of adjacent cells in the filament, enabling intercellular
  exchange of metabolites and signalling molecules, filament integrity and differentiation of
  nitrogen-fixing heterocysts. AmiC2 localises to the newly formed septum / cross-wall
  (periplasmic cell-wall compartment). Unlike Cylindrospermum stagnale and Chlorogloeopsis
  fritschii (each with a single AmiC), F. thermalis retains the ancestral tandem AmiC1/AmiC2
  amidase pair: this AmiC2 (FJSC11DRAFT_3096, G6FW05) together with a distinct adjacent AmiC1
  ortholog (FJSC11DRAFT_3094, G6FW03).
references:
- id: PMID:28929086
  title: Role of Two Cell Wall Amidases in Septal Junction and Nanopore Formation in
    the Multicellular Cyanobacterium Anabaena sp. PCC 7120.
  findings:
  - statement: Inactivation of either amidase (AmiC1 or AmiC2) reduces septal nanopore
      number and the rate of intercellular tracer exchange; the amiC1 amiC2 double mutant
      loses filament morphology and heterocyst differentiation.
    supporting_text: Inactivation of either amidase resulted in significant reduction
      in nanopore count and in the rate of fluorescent tracer exchange between neighboring
      cells measured by FRAP analysis. In an amiC1 amiC2 double mutant, filament morphology
      was affected and heterocyst differentiation was abolished.
  - statement: The AmiC2 amidase perforates the septal peptidoglycan to create the nanopore
      array proposed to frame septal junction complexes.
    supporting_text: This enzyme perforates the septal peptidoglycan creating an array
      of nanopores, which may be the framework for septal junction complexes
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: PubMed-verified primary paper directly characterizing Anabaena PCC 7120
      AmiC2 (alr0093) and AmiC1 (alr0092) mutants; full text cached. Used here as the
      characterization basis for transferring AmiC2 function to the F. thermalis ortholog
      G6FW05 by orthology (ISS). G6FW05 itself is not assayed in this paper.
- id: PMID:21244533
  title: The morphogene AmiC2 is pivotal for multicellular development in the cyanobacterium
    Nostoc punctiforme.
  findings:
  - statement: Mutation of the single amiC2 gene in N. punctiforme abolishes cell
      differentiation and intercellular communication; AmiC2-GFP localizes to the cross-walls
      of dividing cells.
    supporting_text: mutation of a single gene, encoding cell wall amidase AmiC2, completely
      changes the morphology and abrogates cell differentiation and intercellular communication
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: PubMed-verified. Characterizes the N. punctiforme ortholog (Npun_F1846)
      of the AmiC2 clade; establishes AmiC2 as a morphogene required for multicellularity.
      Abstract cached. Basis (with PMID:28929086) for the ISS transfer to G6FW05.
- id: file:FISTH/AmiC2/AmiC2-notes.md
  title: AmiC2 (FJSC11DRAFT_3096 / G6FW05) gene review notes
  findings:
  - statement: RBH orthology assigns AmiC2 = G6FW05 (FJSC11DRAFT_3096) in F. thermalis, with
      a distinct tandem AmiC1 = G6FW03 (FJSC11DRAFT_3094); forward E=4.3e-250, 63.8% identity
      reciprocal best hit vs PCC 7120 AmiC2 A0ACD7S2F2.
    supporting_text: '*Fischerella thermalis* (Stigonematales) has **both** an
      AmiC2 ortholog (G6FW05 / FJSC11DRAFT_3096) and an AmiC1 ortholog (G6FW03 /
      FJSC11DRAFT_3094)'
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: Reviewer notes documenting the domain architecture, orthology/RBH basis
      (from modules/septal_junction/RESULTS.md), the tandem AmiC1/AmiC2 retention in this
      Stigonematales genome, and paralog disambiguation (AmiC2 = 3096, AmiC1 = 3094).
