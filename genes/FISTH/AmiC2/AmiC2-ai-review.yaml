    label: N-acetylmuramoyl-L-alanine amidase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: >-
      Core molecular function. G6FW05 carries an Amidase_3 (MurNAc-LAA) catalytic domain
      (Pfam PF01520, InterPro IPR002508) and is assigned EC 3.5.1.28 by UniProt. It is the
      reciprocal-best-hit ortholog (63.8% identity, forward E=4.3e-250) of the experimentally
      characterized AmiC2 of Nostoc/Anabaena PCC 7120 (alr0093) and N. punctiforme
      (Npun_F1846), a bona fide N-acetylmuramoyl-L-alanine amidase. The IEA amidase-activity
      assignment is therefore well supported by both the catalytic domain and the orthologous
      biochemistry.
    action: ACCEPT
    reason: >-
      Supported by the Amidase_3 catalytic domain, the UniProt EC 3.5.1.28 assignment, and
      reciprocal-best-hit orthology to the directly characterized AmiC2; represents the
      primary evolved molecular function of the gene product.
