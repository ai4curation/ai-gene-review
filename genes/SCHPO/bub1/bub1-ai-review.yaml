- id: PMID:11331883
  title: Fission yeast Bub1 is essential in setting up the meiotic pattern of chromosome
    segregation.
  findings:
  - statement: |-
      Bub1 is required to prevent meiosis I non-disjunction and is essential for unification of
      sister kinetochores and retention of centromeric cohesion (Rec8) in anaphase I.
    supported_by:
    - reference_id: PMID:11331883
      supporting_text: Bub1, besides its functions in monitoring chromosome attachment, is essential for two other significant aspects of MI - unification of sister kinetochores and retention of centromeric cohesion.
      reference_section_type: ABSTRACT
- id: PMID:11882285
  title: Requirement of chromatid cohesion proteins rad21/scc1 and mis4/scc2 for normal
    spindle-kinetochore interaction in fission yeast.
  findings:
  - statement: |-
      Bub1 localizes briefly to early mitotic kinetochores and to the central centromere region;
      loss of cohesion prolongs Bub1 kinetochore residence (tensionless attachment).
    supported_by:
    - reference_id: PMID:11882285
      supporting_text: Bub1 is bound to the central centromere region of mitotic cells.
      reference_section_type: ABSTRACT
- id: PMID:12426374
  title: Spindle-kinetochore attachment requires the combined action of Kin I-like
    Klp5/6 and Alp14/Dis1-MAPs in fission yeast.
  findings:
  - statement: |-
      Bub1 marks kinetochores that are captured but lack tension, independently of Mad2,
      consistent with a role in monitoring attachment/tension.
    supported_by:
    - reference_id: PMID:12426374
      supporting_text: there are kinetochores to which only Bub1, but not Mad2, localizes. These kinetochores are likely to have been captured, yet lack tension.
      reference_section_type: ABSTRACT
- id: PMID:12606573
  title: Function of Cdc2p-dependent Bub1p phosphorylation and Bub1p kinase activity
    in the mitotic and meiotic spindle checkpoint.
  findings:
  - statement: |-
      Bub1 kinase activity is required (but not sufficient) for full spindle checkpoint
      function; its role in maintaining meiotic Rec8 centromeric localization depends entirely
      on its kinase activity. A Bub1-dependent meiotic checkpoint exists.
    supported_by:
    - reference_id: PMID:12606573
      supporting_text: The role of Bub1p in maintaining centromeric localization of Rec8p during meiosis I is entirely dependent upon its kinase activity
      reference_section_type: ABSTRACT
- id: PMID:15509783
  title: Kinetochore targeting of fission yeast Mad and Bub proteins is essential
    for spindle checkpoint function but not for all chromosome segregation roles of
    Bub1p.
  findings:
  - statement: |-
      Bub1 and Bub3 are mutually dependent for kinetochore localization and interact with the
      central domain of centromeres; the Bub1 N-terminal domain is needed for robust targeting
      of Bub1/Bub3/Mad3 and for the checkpoint, but not for all of Bub1's segregation roles.
    supported_by:
    - reference_id: PMID:15509783
      supporting_text: Bub1p and Bub3p are dependent upon one another, but independent of the Mad proteins, for their kinetochore localization.
      reference_section_type: ABSTRACT
- id: PMID:15525673
  title: The A78V mutation in the Mad3-like domain of Schizosaccharomyces pombe Bub1p
    perturbs nuclear accumulation and kinetochore targeting of Bub1p, Bub3p, and Mad3p
    and spindle assembly checkpoint function.
  findings:
  - statement: |-
      Nuclear accumulation of Bub1 is required for its kinetochore targeting and SAC function;
      the Mad3-like (TPR) region residue Ala78 is required for nuclear and kinetochore
      accumulation of Bub1, Bub3 and Mad3.
    supported_by:
    - reference_id: PMID:15525673
