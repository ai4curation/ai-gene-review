proposed_new_terms: []
suggested_questions:
- question: |-
    Is Bub1 kinase activity (H2A-S121 phosphorylation) genetically and temporally separable
    from its kinetochore-scaffolding (Mad/Bub recruitment) function in fission yeast, and
    which is rate-limiting for accurate mitotic segregation?
  experts: []
- question: |-
    What governs the differential residence time of Bub1 at mitotic versus meiotic
    kinetochores (transient vs persistent until anaphase I), beyond Moa1(meikin)-Plo1?
  experts: []
suggested_experiments:
- experiment: |-
    Use a separation-of-function comparison of bub1 kinase-dead (H2A-S121 phospho-null) versus
    TPR/N-terminal kinetochore-targeting mutants, with quantitative live-cell imaging of Mad1,
    Mad3, Sgo1 and CPC recruitment, to dissect the contribution of each Bub1 activity to
    checkpoint arrest and biorientation.
- experiment: |-
    Perform phosphoproteomics and in vitro kinase assays with recombinant Bub1 to determine
    whether H2A-S121 is the sole physiological substrate or whether additional substrates
    contribute to chromosome segregation.
