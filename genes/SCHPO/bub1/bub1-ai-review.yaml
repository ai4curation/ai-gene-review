- term:
    id: GO:0006338
    label: chromatin remodeling
  evidence_type: IEA
  original_reference_id: GO_REF:0000108
  qualifier: involved_in
  review:
    summary: |-
      This term was inferred automatically by an inter-ontology logical link from the
      molecular function histone H2AS121 kinase activity (GO:0072371). Bub1 phosphorylates
      H2A-S121 to create a signaling mark that recruits shugoshin and the CPC; this is a
      post-translational histone modification used for protein recruitment, not chromatin
      remodeling (which implies ATP-dependent repositioning/restructuring of nucleosomes).
      The annotation is an over-broad logical-link artifact: the underlying H2A-S121 kinase
      function is real, but labeling Bub1 a chromatin "remodeler" over-reaches the inference.
    action: MARK_AS_OVER_ANNOTATED
    reason: Automated inter-ontology inference from Bub1's bona fide histone H2A-S121 kinase activity. H2A-S121 phosphorylation is a recruitment mark, not nucleosome remodeling, so the term is flagged as over-annotated rather than removed (the underlying histone-kinase function is genuine).
    supported_by:
    - reference_id: PMID:19965387
      supporting_text: Bub1 kinase creates a mark for shugoshin localization and the correct partitioning of chromosomes.
      reference_section_type: ABSTRACT
