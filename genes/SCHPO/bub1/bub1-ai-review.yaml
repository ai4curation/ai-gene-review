gene_symbol: bub1
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:284812
  label: Schizosaccharomyces pombe (strain 972 / ATCC 24843)
description: >-
  Bub1 is a conserved serine/threonine protein kinase (EC 2.7.11.1) of the spindle
  assembly checkpoint (SAC) in the fission yeast Schizosaccharomyces pombe. It has an
  N-terminal tetratricopeptide-repeat (TPR/Mad3-like) region and a C-terminal protein
  kinase domain. During mitosis Bub1, as part of the Bub1-Bub3 complex, is recruited
  early to unattached or tensionless kinetochores when the Mph1 (Mps1) kinase
  phosphorylates the MELT motifs of the outer-kinetochore protein Spc7 (KNL1). At
  kinetochores Bub1 serves as a scaffold for assembly of the SAC, helping recruit Bub3,
  Mad1-Mad2, Mad3 and the chromosomal passenger complex (CPC), thereby generating the
  diffusible "wait anaphase" signal that inhibits the anaphase-promoting complex/cyclosome
  until all chromosomes are bioriented. Independently of its checkpoint scaffolding role,
  Bub1 kinase activity phosphorylates histone H2A on serine 121 at the centromeric core/
  inner centromere; this mark recruits the shugoshin proteins (Sgo1/Sgo2), which protect
  centromeric cohesin and, together with Haspin-mediated H3-T3 phosphorylation, target the
  CPC to the inner centromere to promote sister-chromatid biorientation and error
  correction. Bub1 is essential for accurate chromosome segregation in unperturbed
  mitosis and for the meiosis I program, where it is required for mono-orientation of
  sister kinetochores and protection of centromeric Rec8 cohesin in anaphase I. Loss of
  Bub1 abolishes the spindle checkpoint, causes chromosome lagging and loss, and
  destabilizes ploidy.
