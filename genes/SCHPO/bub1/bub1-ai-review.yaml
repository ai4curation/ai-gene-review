  findings:
  - statement: |-
      Mph1 phosphorylates Spc7 MELT repeats to promote binding of the Bub1-Bub3 complex,
      required for kinetochore-based SAC activation (Mad1-Mad2-Mad3 localization) and chromosome
      bi-orientation.
    supported_by:
    - reference_id: PMID:22660415
      supporting_text: This phosphorylation promotes the in vitro binding to the Bub1-Bub3 complex, which is required for kinetochore-based SAC activation (Mad1-Mad2-Mad3 localization) and chromosome alignment.
      reference_section_type: ABSTRACT
- id: PMID:22825872
  title: Mph1 kinetochore localization is crucial and upstream in the hierarchy of
    spindle assembly checkpoint protein recruitment to kinetochores.
  findings:
  - statement: |-
      In the kinetochore SAC-recruitment hierarchy, Bub1 (with Bub3) occupies the middle tier,
      below Ark1/Mph1 and above Mad3 and the Mad1-Mad2 complex.
    supported_by:
    - reference_id: PMID:22825872
      supporting_text: a three-layered hierarchy with Ark1 and Mph1 on top, Bub1 and Bub3 in the middle, and Mad3 as well as the Mad1-Mad2 complex at the lower end of the hierarchy.
      reference_section_type: ABSTRACT
- id: PMID:23695164
  title: Cross-species protein interactome mapping reveals species-specific wiring
    of stress response pathways.
  findings:
  - statement: |-
      Large-scale yeast two-hybrid interactome (StressNet) provides the basis for the Bub1
      self-interaction (identical protein binding) annotation.
    supported_by:
    - reference_id: PMID:23695164
      supporting_text: We present a large-scale verified binary protein-protein interactome network, "StressNet," based on high-throughput yeast two-hybrid screens
      reference_section_type: ABSTRACT
- id: PMID:24477934
  title: Mad1 contribution to spindle assembly checkpoint signalling goes beyond presenting
    Mad2 at kinetochores.
  findings:
  - statement: |-
      Bub1 mutations impair kinetochore localization of the Mad1-Mad2 complex and abrogate
      checkpoint activity, indicating Bub1 is required for Mad1-Mad2 recruitment and signaling.
    supported_by:
    - reference_id: PMID:24477934
      supporting_text: mutations in Bub1 and within the Mad1 C-terminal domain impair the kinetochore localization of Mad1:Mad2 and abrogate checkpoint activity.
      reference_section_type: ABSTRACT
- id: PMID:28497540
  title: Meikin-associated polo-like kinase specifies Bub1 distribution in meiosis
    I.
  findings:
  - statement: |-
      In meiosis I, Moa1(meikin)-recruited Plo1 phosphorylates Spc7 to accumulate Bub1, so that
      meiotic Bub1 persists at kinetochores until anaphase I, ensuring robust Sgo1 localization
      and centromeric cohesion protection.
    supported_by:
    - reference_id: PMID:28497540
      supporting_text: in contrast to the transient kinetochore localization of mitotic Bub1, meiotic Bub1 persists at kinetochores until anaphase I.
      reference_section_type: ABSTRACT
- id: PMID:29769606
  title: Malonylation of histone H2A at lysine 119 inhibits Bub1-dependent H2A phosphorylation
    and chromosomal localization of shugoshin proteins.
  findings:
  - statement: |-
      Bub1-dependent H2A-S121 phosphorylation and consequent shugoshin localization are
      inhibited by H2A-K119 malonylation, which blocks the Bub1-H2A interaction; confirms Bub1
      serine/threonine kinase activity toward H2A.
    supported_by:
    - reference_id: PMID:29769606
      supporting_text: H2A-K119 malonylation inhibited the interaction between Bub1 and H2A, leading to a decrease in Bub1-dependent H2A-S121 phosphorylation.
      reference_section_type: ABSTRACT
- id: PMID:31257143
  title: The Bub1-TPR Domain Interacts Directly with Mad3 to Generate Robust Spindle
    Checkpoint Arrest.
  findings:
  - statement: |-
      The conserved N-terminal TPR domain of Bub1 is necessary and sufficient to bind and
      recruit Mad3, bringing it into proximity with Mad1-Mad2 and Mph1 to generate the MCC.
    supported_by:
    - reference_id: PMID:31257143
      supporting_text: We demonstrate that the Bub1 TPR domain is both necessary and sufficient to bind and recruit Mad3.
      reference_section_type: ABSTRACT
- id: PMID:36537249
  title: The fission yeast kinetochore complex Mhf1-Mhf2 regulates the spindle assembly
    checkpoint and faithful chromosome segregation.
  findings:
  - statement: |-
      The outer kinetochore is the platform for SAC initiation; Bub1 kinetochore localization is
      examined in the context of the Mhf1-Mhf2 (CENP-S-CENP-X) complex's role in the checkpoint.
    supported_by:
    - reference_id: PMID:36537249
      supporting_text: The outer kinetochore serves as a platform for the initiation of the spindle assembly checkpoint (SAC)
      reference_section_type: ABSTRACT
- id: PMID:9864354
  title: Fission yeast bub1 is a mitotic centromere protein essential for the spindle
    checkpoint and the preservation of correct ploidy through mitosis.
  findings:
  - statement: |-
      Bub1 is essential for the fission yeast spindle checkpoint and for accurate chromosome
      segregation in unperturbed mitosis; it is recruited to kinetochores early in mitosis and a
      pool persists at centromeres until telophase. Loss of bub1 causes lagging chromosomes,
      chromosome loss and ploidy instability.
    supported_by:
    - reference_id: PMID:9864354
      supporting_text: bub1(+) is essential for the fission yeast spindle checkpoint response to spindle damage and to defects in centromere function.
      reference_section_type: ABSTRACT
