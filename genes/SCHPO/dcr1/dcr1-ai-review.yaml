core_functions:
- description: >-
    Ribonuclease III endonuclease that processes double-stranded RNA into ~21-23 nt siRNA
    duplexes, the initiating step of RNA interference in fission yeast.
  supported_by:
  - reference_id: PMID:12482946
    supporting_text: Dcr1p degraded double-stranded RNA into approximately 23 nucleotide fragments in vitro
    reference_section_type: ABSTRACT
  molecular_function:
    id: GO:0004525
    label: ribonuclease III activity
  directly_involved_in:
    id: GO:0030422
    label: siRNA processing
- description: >-
    Generates the siRNAs that, loaded onto Argonaute (Ago1) and amplified by RDRC/Rdp1,
    direct H3K9 methylation and heterochromatin assembly at pericentromeric repeats,
    essential for centromere function and chromosome segregation.
  supported_by:
  - reference_id: PMID:12193640
    supporting_text: This is accompanied by transcriptional de-repression of transgenes integrated at the centromere, loss of histone H3 lysine-9 methylation, and impairment of centromere function
    reference_section_type: ABSTRACT
  directly_involved_in:
    id: GO:0140727
    label: siRNA-mediated pericentric heterochromatin formation
- description: >-
    Mediates co-transcriptional gene silencing by associating with chromatin, silencing
    centromeric repeats, the silent mating-type locus, and certain euchromatic loci.
  supported_by:
  - reference_id: PMID:21151114
    supporting_text: Physical association of RNAi with chromatin is sufficient to trigger a silencing response but not to assemble heterochromatin
    reference_section_type: ABSTRACT
  directly_involved_in:
    id: GO:0033562
    label: co-transcriptional gene silencing by RNA interference machinery
- description: >-
    Binds double-stranded RNA and coordinates a structural zinc ion via its C-terminal
    extended dsRBD; zinc binding is required for nuclear retention of Dcr1 and hence for
    RNAi-mediated heterochromatin assembly.
  supported_by:
  - reference_id: PMID:21847092
    supporting_text: coordination of zinc by the C-terminus of Dcr1 is required for its nuclear retention and thus RNAi-mediated heterochromatin assembly
    reference_section_type: RESULTS
  molecular_function:
    id: GO:0008270
    label: zinc ion binding
