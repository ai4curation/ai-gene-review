- id: PMID:12193640
  title: Regulation of heterochromatic silencing and histone H3 lysine-9 methylation
    by RNAi.
  findings:
  - statement: >-
      Deletion of the dicer (dcr1) homolog causes accumulation of complementary
      transcripts from centromeric repeats, loss of H3K9 methylation, and impaired
      centromere function, establishing RNAi-directed heterochromatin formation.
    supporting_text: This is accompanied by transcriptional de-repression of transgenes integrated at the centromere, loss of histone H3 lysine-9 methylation, and impairment of centromere function
    reference_section_type: ABSTRACT
- id: PMID:12482946
  title: Dicer is required for chromosome segregation and gene silencing in fission
    yeast cells.
  findings:
  - statement: Dcr1 cleaves dsRNA into ~23 nt fragments in vitro and is required for centromeric silencing and chromosome segregation.
    supporting_text: Deletion of the Dicer (dcr1+) gene caused slow growth, sensitivity to thiabendazole, lagging chromosomes during anaphase, and abrogated silencing of centromeric repeats
    reference_section_type: ABSTRACT
  - statement: Dcr1 contains an N-terminal helicase/ATP-binding domain and tandem RNase III domains.
    supporting_text: an N-terminal helicase domain containing an ATP-binding site motif 32 M RTGAGKT 39 and a 145 DECH 148 box, and tandem C-terminal ribonuclease (RNase) III signatures
    reference_section_type: RESULTS
- id: PMID:15615848
  title: RNA-dependent RNA polymerase is an essential component of a self-enforcing
    loop coupling heterochromatin assembly to siRNA production.
  findings:
  - statement: Dicer, Argonaute and Rdp1 are required for heterochromatin assembly at centromeric repeats and the silent mating-type region.
    supporting_text: factors involved in the RNA interference (RNAi) pathway including Argonaute, Dicer, and RNA-dependent RNA polymerase are required for heterochromatin assembly at centromeric repeats and the silent mating-type region
    reference_section_type: ABSTRACT
- id: PMID:16246721
  title: The nucleation and maintenance of heterochromatin by a histone deacetylase
    in fission yeast.
  findings:
  - statement: RNAi-directed heterochromatin nucleation operates at the silent mating-type region and centromeres in parallel with the Clr3 HDAC pathway.
    supporting_text: acts in a distinct pathway parallel to RNAi-directed heterochromatin nucleation to recruit Clr4 and mediate H3K9 methylation at the silent mating-type region and centromeres
    reference_section_type: ABSTRACT
- id: PMID:16823372
  title: ORFeome cloning and global analysis of protein localization in the fission
    yeast Schizosaccharomyces pombe.
  findings:
  - statement: High-throughput GFP localization detected Dcr1 in the cytoplasm/cytosol.
    supporting_text: ORFeome cloning and global analysis of protein localization in the fission yeast Schizosaccharomyces pombe
    reference_section_type: TITLE
- id: PMID:17512405
  title: RNAi-dependent and -independent RNA turnover mechanisms contribute to heterochromatic
    gene silencing.
  findings:
  - statement: RNAi is required for heterochromatin-dependent silencing of centromeric repeat transgenes and contributes at the mating-type locus.
    supporting_text: the RNAi pathway is required for heterochromatin-dependent silencing of transgene insertions at centromeric repeats and acts together with other pathways to silence transgenes at the silent mating-type locus
    reference_section_type: ABSTRACT
- id: PMID:17981703
  title: Involvement of Dcr1 in post-transcriptional regulation of gene expression
    in Schizosaccharomyces pombe.
  findings:
  - statement: Dcr1 contributes to post-transcriptional regulation of cellular proteins, including glycolytic enzymes.
    supporting_text: compatible with the existence of a post-transcriptional gene regulatory mechanism involving Dcr1 or a Dcr1 complex
    reference_section_type: ABSTRACT
- id: PMID:21151114
  title: Dicer associates with chromatin to repress genome activity in Schizosaccharomyces
    pombe.
  findings:
  - statement: Dcr1 physically associates with chromatin (euchromatic genes, ncRNA genes, retrotransposon LTRs); association is sufficient to trigger co-transcriptional silencing.
    supporting_text: Physical association of RNAi with chromatin is sufficient to trigger a silencing response but not to assemble heterochromatin
    reference_section_type: ABSTRACT
- id: PMID:21847092
  title: An extended dsRBD with a novel zinc-binding motif mediates nuclear retention
    of fission yeast Dicer.
  findings:
  - statement: The C-terminal extended dsRBD coordinates one zinc ion via a novel CHCC motif; zinc coordination is required for nuclear retention and heterochromatin assembly.
    supporting_text: coordination of zinc by the C-terminus of Dcr1 is required for its nuclear retention and thus RNAi-mediated heterochromatin assembly
    reference_section_type: RESULTS
  - statement: The dsRBD binds A-form dsRNA strongly and B-form dsDNA, but this nucleic-acid binding is dispensable for Dcr1 function.
    supporting_text: dsRNA binding through the dsRBD is also dispensable for heterochromatin silencing and siRNA generation
    reference_section_type: RESULTS
- id: PMID:22431512
  title: RNAi keeps Atf1-bound stress response genes in check at nuclear pores.
  findings:
  - statement: RNAi components, including Dcr1, interact with chromatin at nuclear pores to repress stress-response genes via CTGS; heat stress deports Dicer to the cytoplasm.
    supporting_text: RNAi components interact with chromatin at nuclear pores to keep stress response genes in check
    reference_section_type: ABSTRACT
- id: PMID:22895252
  title: A novel RNAi protein, Dsh1, assembles RNAi machinery on chromatin to amplify
    heterochromatic siRNA.
  findings:
  - statement: Dcr1, with RDRC and the factor Dsh1, amplifies pericentromeric siRNA on chromatin, essential for stable heterochromatin formation.
    supporting_text: siRNA is amplified by the RNA-dependent RNA polymerase complex (RDRC) and the endoribonuclease Dcr1, which synthesizes dsRNA and processes the dsRNA, respectively. The amplification is essential for stable heterochromatin formation
    reference_section_type: ABSTRACT
- id: PMID:25417108
  title: Dicer promotes transcription termination at sites of replication stress to
    maintain genome stability.
  findings:
  - statement: Dcr1 specifically promotes release of RNA Pol II (and Pol I/III antisense transcription at rDNA/tDNA) at sites of replication stress, independently of other RNAi components, maintaining genome stability.
    supporting_text: Dcr1, but not other components of the canonical RNAi pathway, promotes the release of Pol II from the 3? end of highly transcribed genes
    reference_section_type: ABSTRACT
  - statement: This termination role does not require siRNA biogenesis or other RNAi pathway components.
    supporting_text: transcriptional termination was not dependent on sRNA biogenesis or other RNAi pathway components, demonstrating for the first time a Dcr1-specific role in Pol II release
    reference_section_type: ABSTRACT
- id: PMID:25543137
  title: Dicer and Hsp104 function in a negative feedback loop to confer robustness
    to environmental stress.
  findings:
  - statement: Dicer and Hsp104 form a negative feedback loop buffering environmentally induced phenotypic variation; without Hsp104, Dicer accumulates in cytoplasmic inclusions and heterochromatin becomes unstable.
    supporting_text: In the absence of Hsp104, Dicer accumulates in cytoplasmic inclusions and heterochromatin becomes unstable at elevated temperatures
    reference_section_type: ABSTRACT
- id: PMID:27738016
  title: RNA interference is essential for cellular quiescence.
  findings:
  - statement: RNAi (Dcr1) is essential for fission yeast quiescence; dcr1Δ cells lose viability at G0 entry and cannot maintain long-term quiescence.
    supporting_text: RNAi mutants lose viability at G0 entry and are unable to maintain long-term quiescence
    reference_section_type: ABSTRACT
proposed_new_terms: []
suggested_questions:
- question: >-
    Is the transcription-termination / Pol-release activity of Dcr1 a direct biochemical
    function of the enzyme (e.g. cleavage of nascent RNA at collision sites) or an indirect
    consequence of chromatin association, given it is independent of siRNA biogenesis?
- question: >-
    What is the nuclear retention factor recognized by the conserved surface of the
    extended dsRBD, and how does it integrate Dcr1 into the chromatin-bound RNAi machinery?
suggested_experiments:
- description: >-
    Use a catalytically dead RNase III Dcr1 (point mutations in RIIIa/RIIIb Mg2+-binding
    residues) versus zinc-coordination mutants to separate the contribution of siRNA
    production from the chromatin/Pol-release functions genome-wide (ChIP-seq of Pol I/II/III,
    H3K9me2, and small-RNA-seq).
- description: >-
    Reconstitute Dcr1-RDRC-Dsh1 on nucleosomal templates in vitro to test whether Dcr1
    can promote polymerase release independently of siRNA generation, directly probing the
    Dcr1-specific termination activity.
