  qualifier: is_active_in
  review:
    summary: >-
      Dcr1 has a documented cytoplasmic pool, but its core RNAi/heterochromatin function
      occurs in the nucleus where it is retained via its zinc-binding C-terminal domain.
      Cytoplasmic localization is real but represents a contextual/secondary compartment
      (e.g. upon heat stress when Dicer is deported to the cytoplasm).
    action: KEEP_AS_NON_CORE
    reason: >-
      Cytoplasmic localization is experimentally supported but is not the principal site
      of Dcr1's core function; nuclear retention is required for heterochromatin assembly.
    supported_by:
