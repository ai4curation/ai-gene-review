id: Q09884
gene_symbol: dcr1
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:284812
  label: Schizosaccharomyces pombe (strain 972 / ATCC 24843)
description: >-
  Dcr1 is the sole Dicer (ribonuclease III family endoribonuclease) of fission yeast and
  the enzyme that initiates the RNA interference (RNAi) pathway. It processes
  double-stranded RNA precursors, arising largely from pericentromeric repeat transcripts
  and amplified by the RNA-dependent RNA polymerase complex (RDRC/Rdp1), into ~21-23 nt
  siRNA duplexes that are loaded onto the single Argonaute protein (Ago1) to form the RITS
  complex. The protein has a modular architecture: an N-terminal DExD/H-box ATP-binding
  helicase domain (with an MRTGAGKT ATP-binding motif and a DECH box), a helicase
  C-terminal domain, a Dicer dsRNA-binding/dimerization fold, tandem catalytic RNase III
  domains (RIIIa and RIIIb) that coordinate Mg2+/Mn2+, and a C-terminal extended
  double-stranded RNA-binding domain (dsRBD) bearing a novel CHCC zinc-binding motif that
  binds one Zn2+ and is required for nuclear retention of the protein. Through siRNA
  biogenesis Dcr1 is essential for RNAi-directed heterochromatin assembly (H3K9
  methylation by Clr4) at centromeres, the silent mating-type locus, and telomeres, and
  hence for accurate chromosome segregation. Beyond canonical RNAi, Dcr1 has roles in
  co-transcriptional gene silencing at euchromatic loci, in releasing RNA polymerases
  (Pol I/II/III) at sites of transcription-replication collision to maintain genome
  stability, and in cellular quiescence (G0). Dcr1 is predominantly nuclear, associating
  with chromatin and the nuclear periphery, with a smaller cytoplasmic pool.
