- term:
    id: GO:0051306
    label: mitotic sister chromatid separation
  evidence_type: NAS
  original_reference_id: PMID:8978688
  qualifier: involved_in
  review:
    summary: >-
      The Cut1-Cut2 complex is essential for sister-chromatid separation, so the
      complex participates in this process (ComplexPortal annotation). However,
      Cut2 itself acts as a negative regulator/inhibitor of separation by holding
      separase inactive, and it is the regulated destruction of Cut2 that permits
      separation. Keeping this as a non-core participation term is appropriate,
      with the inhibitory regulation captured separately as the core role.
    action: KEEP_AS_NON_CORE
    reason: >-
      Cut2 participates in sister-chromatid separation as part of the Cut1-Cut2
      complex, but its direct molecular role is inhibition; the regulatory term
      better captures the core function.
    supported_by:
    - reference_id: PMID:8978688
      supporting_text: The essential function of the Cut1-Cut2 complex which ensures sister chromatid separation may be regulated by Cut2 proteolysis.
      reference_section_type: ABSTRACT
