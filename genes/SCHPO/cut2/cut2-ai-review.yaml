gene_symbol: cut2
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:284812
  label: Schizosaccharomyces pombe (strain 972 / ATCC 24843)
description: >-
  Cut2 is the securin of the fission yeast Schizosaccharomyces pombe, the
  ortholog of budding-yeast Pds1 and human PTTG/securin. It is the inhibitory
  partner and molecular chaperone of the separase Cut1 (Esp1 ortholog), with
  which it forms the separase-securin (Cut1-Cut2) complex. Cut2 binds the
  N-terminus of Cut1 through its own C-terminus and is required both to keep
  separase proteolytically inactive before anaphase and to load Cut1 onto the
  mitotic spindle at prophase. Cut2 carries two N-terminal destruction boxes
  (D-box 1 and D-box 2); at the metaphase-anaphase transition the
  anaphase-promoting complex/cyclosome (APC/C), co-activated by Slp1(Cdc20),
  polyubiquitinates Cut2 and targets it for proteasomal degradation. This
  destruction, which occurs by the same machinery that degrades cyclin B,
  liberates active separase to cleave the cohesin subunit Rad21, triggering
  sister-chromatid separation and anaphase spindle elongation. Cut2 localizes to
  the nucleus and concentrates along the short metaphase spindle. The
  Cut1-Cut2 complex acts analogously in meiosis, where separase cleaves the
  meiotic cohesin Rec8, and the complex also participates in separase-mediated
  cohesin cleavage required for DNA repair in interphase. Loss of cut2 function
  produces the "cut" phenotype, in which cells attempt division without having
  separated their chromosomes, bisecting the undivided nucleus.
