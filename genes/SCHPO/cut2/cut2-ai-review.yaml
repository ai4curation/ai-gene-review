- term:
    id: GO:0004866
    label: endopeptidase inhibitor activity
  evidence_type: TAS
  original_reference_id: PMID:10651900
  qualifier: enables
  review:
    summary: >-
      This is the core molecular function of Cut2. As securin, Cut2 binds the
      caspase-like (CD-clan cysteine) endopeptidase separase Cut1 and inhibits
      its proteolytic activity until anaphase. This inhibitory activity, and its
      relief by Cut2 destruction, is the central mechanism of the gene.
    action: ACCEPT
    reason: >-
      Core molecular function; securin inhibits separase endopeptidase activity
      until APC-mediated destruction.
    supported_by:
    - reference_id: PMID:10651900
      supporting_text: Separin is a large protein (MW approximately 180 kDa), the C-terminus of which is conserved, and is thought to be inhibited by association with securin at the nonconserved N-terminus.
      reference_section_type: ABSTRACT
    - reference_id: PMID:14532136
      supporting_text: But the proteolytic activity of separase is inhibited by securin until the onset of anaphase when the anaphase-promoting complex (APC) promotes the degradation of securin.
      reference_section_type: INTRODUCTION
