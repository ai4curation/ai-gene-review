references:
- id: GO_REF:0000002
  title: Gene Ontology annotation through association of InterPro records with GO
    terms
  findings:
  - statement: >-
      InterPro2GO pipeline that propagates GO terms from the securin domain
      (IPR006940). Yields the correct chromosome-related processes but also a
      generic cytoplasm term that is not supported for Cut2 specifically.
- id: GO_REF:0000120
  title: Combined Automated Annotation using Multiple IEA Methods
  findings:
  - statement: >-
      Automated multi-method pipeline that assigns nuclear localization,
      consistent with the experimental record for Cut2.
- id: PMID:10651900
  title: Cell cycle mechanisms of sister chromatid separation; roles of Cut1/separin
    and Cut2/securin.
  findings:
  - statement: >-
      Review establishing that securin (Cut2) inhibits separin (Cut1) by binding
      its nonconserved N-terminus, and is an APC/cyclosome target whose
      destruction-box-dependent destruction is required for proper anaphase.
    supporting_text: Securin, like mitotic cyclins, is the target of the anaphase promoting complex (APC)/cyclosome and is polyubiquitinated before destruction in a manner dependent upon the destruction sequence. The anaphase never occurs properly in the absence of securin destruction.
    reference_section_type: ABSTRACT
- id: PMID:14532136
  title: Rec8 cleavage by separase is required for meiotic nuclear divisions in fission
    yeast.
  findings:
  - statement: >-
      Establishes that separase (Cut1) activation, following securin (Cut2)
      degradation by the APC, cleaves the meiotic cohesin Rec8 to drive meiotic
      chromosome segregation; describes the nuclear/spindle transfer and securin
      inhibition of separase.
    supporting_text: The separase (Cut1/Esp1 in fission/budding yeast) forms a complex with a guardian protein, securin (Cut2/Pds1), and this complex is transferred to the nucleus and spindle microtubules where the separase must be activated.
    reference_section_type: INTRODUCTION
- id: PMID:15329725
  title: Separase-mediated cleavage of cohesin at interphase is required for DNA repair.
  findings:
  - statement: >-
      Shows securin (Cut2) is essential for separase stability and for proper
      repair of UV/X-ray/gamma DNA damage, acting via separase-mediated cohesin
      cleavage in interphase; cut2(EA2) is repair-defective with a normal
      checkpoint.
    supporting_text: Here we show that securin is essential for separase stability and also for proper repair of DNA damaged by ultraviolet, X-ray and gamma-ray irradiation.
    reference_section_type: ABSTRACT
- id: PMID:16823372
  title: ORFeome cloning and global analysis of protein localization in the fission
    yeast Schizosaccharomyces pombe.
  findings:
  - statement: >-
      Genome-wide YFP localization study reporting Cut2 as nuclear, consistent
      with focused studies.
    reference_section_type: ABSTRACT
- id: PMID:1934126
  title: Common genes and pathways in the regulation of the mitotic and meiotic cell
    cycles of Schizosaccharomyces pombe.
  findings:
  - statement: >-
      Genetic analysis showing cut1 cut2 double mutants form two-spored asci,
      implicating cut2 in meiotic nuclear division while single mutants do not
      affect sporulation.
    supporting_text: Single mutants in cut1 or cut2 did not effect sporulation, whereas the double mutant cut1 cut2 formed two-spored asci.
    reference_section_type: ABSTRACT
- id: PMID:8632802
  title: Cut2 proteolysis required for sister-chromatid seperation in fission yeast.
  findings:
  - statement: >-
      Demonstrates anaphase-specific APC/Cut9-dependent degradation of Cut2,
      requiring its N-terminus; non-degradable Cut2 blocks sister-chromatid
      separation but not cell-cycle progression. Cut2 is nuclear and
      spindle-concentrated.
    supporting_text: Expression of non-degradable Cut2 blocks sister-chromatid separation but not cell-cycle progression. This defect can be overcome by grafting the N terminus of cyclin B onto the truncated Cut2, demonstrating that the regulated proteolysis of Cut2 is essential for sister-chromatid separation.
    reference_section_type: ABSTRACT
- id: PMID:8978688
  title: Fission yeast Cut1 and Cut2 are essential for sister chromatid separation,
    concentrate along the metaphase spindle and form large complexes.
  findings:
  - statement: >-
      Shows Cut1 and Cut2 are essential, interact genetically, physically
      associate (co-IP, co-sediment as 30/40S complexes), concentrate on the
      metaphase spindle, and that Cut2 (not Cut1) is degraded in anaphase by the
      cyclin-B-degrading machinery.
    supporting_text: Cut1 (approximately 200 kDa) and Cut2 (42 kDa) associate, as shown by immunoprecipitation, and co-sediment as large complexes (30 and 40S) in sucrose gradient centrifugation.
    reference_section_type: ABSTRACT
- id: PMID:9635190
  title: Cut1 is loaded onto the spindle by binding to Cut2 and promotes anaphase
    spindle movement upon Cut2 proteolysis.
  findings:
  - statement: >-
      Maps the Cut2 C-terminus / Cut1 N-terminus interaction; shows Cut2 is
      required to load Cut1 onto the prophase spindle and that Cut2 proteolysis
      is required for separase to actively participate in sister-chromatid
      separation and anaphase spindle elongation.
    supporting_text: Cut2 is required for loading Cut1 onto the spindle at prophase and Cut2 proteolysis is needed for the active participation of Cut1 in sister chromatid separation.
    reference_section_type: ABSTRACT
- id: PMID:9312055
  title: Fission yeast Cut2 required for anaphase has two destruction boxes.
  findings:
  - statement: >-
      Identifies two N-terminal destruction boxes in Cut2 (D-box 1 at 28-31,
      D-box 2 at 47-50); mutating both abolishes APC-mediated ubiquitination and
      degradation, blocking anaphase. (Abstract not in local cache; cited from
      UniProt feature annotation.)
suggested_questions:
- question: >-
    What is the structural basis by which Cut2 inhibits Cut1 separase activity,
    and does it occlude the active site or act allosterically as suggested by the
    "covering its active site" model?
- question: >-
    Beyond holding separase inactive, how does Cut2 promote separase folding,
    stability, and spindle loading, and are these chaperone roles separable from
    its inhibitory role?
- question: >-
    How is the DNA-repair function of the securin-separase complex regulated in
    interphase, and what determines the local, rather than genome-wide, cohesin
    cleavage proposed for repair?
suggested_experiments:
- description: >-
    Reconstitute purified Cut1-Cut2 and assay separase endopeptidase activity
    against Rad21 substrate in vitro, with and without Cut2 and with the
    non-degradable (D-box mutant) Cut2, to quantify inhibition and its relief by
    APC-mediated degradation.
- description: >-
    Determine a cryo-EM or crystal structure of the Cut1-Cut2 complex to define
    the inhibitory interface and test the active-site occlusion model by
    structure-guided mutagenesis.
- description: >-
    Use degron or auxin-inducible depletion of Cut2 combined with live-cell
    imaging of Rad21 cleavage reporters to dissect the kinetics linking Cut2
    destruction, separase activation, and sister-chromatid separation in mitosis
    versus meiosis.
- description: >-
    Map the genomic sites and timing of interphase cohesin cleavage after UV
    damage in wild-type versus cut2(EA2) and protease-dead cut1 cells to test the
    proposed local-cohesin-removal model for DNA repair.
