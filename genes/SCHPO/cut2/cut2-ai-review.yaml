  original_reference_id: GO_REF:0000002
  qualifier: located_in
  review:
    summary: >-
      This generic cytoplasm prediction (InterPro2GO from the securin domain) is
      not supported by the experimental data for Cut2, which localizes to the
      nucleus and the metaphase spindle. It is the separase partner Cut1 that is
      retained in the cytoplasm during interphase, not Cut2. The cytoplasmic
      term appears to be an over-propagation from the securin family signature.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      Experimental evidence places Cut2 in the nucleus/spindle; the cytoplasmic
      pool is a feature of its partner Cut1, making this an InterPro over-annotation.
