- id: PMID:15647375
  title: The roles of fission yeast ase1 in mitotic cell division, meiotic nuclear
    oscillation, and cytokinesis checkpoint signaling.
  findings:
  - statement: >-
      Ase1 localizes to microtubule overlap zones, with weak metaphase spindle signal
      and robust midzone enrichment in anaphase; ase1 deletion causes spindle collapse
      in mid anaphase B and defects in nuclear/septum positioning and cytokinesis
      completion.
    supporting_text: >-
      Time-lapse imaging shows that elongating spindles collapse abruptly in the middle
      of anaphase B.
    reference_section_type: ABSTRACT
  - statement: >-
      Ase1 is a dose-dependent microtubule-bundling factor; both absence and
      overproduction cause opposed bundling defects.
    supporting_text: >-
      Either absence or overproduction of Ase1 results in profound defects on
      microtubule bundling in an opposed manner, indicating that Ase1 is a
      dose-dependent microtubule-bundling factor.
    reference_section_type: ABSTRACT
  - statement: >-
      Ase1 is required for meiotic astral microtubule bundling and oscillatory nuclear
      movement, for correct Aurora kinase (Ark1) localization to central spindles, and
      for cytokinesis checkpoint signaling.
    supporting_text: >-
      Finally Ase1 acts as a regulatory component in the cytokinesis checkpoint that
      operates to inhibit nuclear division when the cytokinesis apparatus is perturbed.
    reference_section_type: ABSTRACT
- id: PMID:15689489
  title: Ase1p organizes antiparallel microtubule arrays during interphase and mitosis
    in fission yeast.
  findings:
  - statement: >-
      Ase1 is a MAP65/PRC1 family bundler that organizes the spindle midzone; ase1
      deletion abolishes antiparallel overlapping bundles, causing interphase nuclear
      positioning defects and premature mitotic spindle collapse.
    supporting_text: >-
      ase1Delta mutants fail to form overlapping antiparallel microtubule bundles,
      leading to interphase nuclear positioning defects, and premature mitotic spindle
      collapse.
    reference_section_type: ABSTRACT
- id: PMID:16823372
  title: ORFeome cloning and global analysis of protein localization in the fission
    yeast Schizosaccharomyces pombe.
  findings:
  - statement: High-throughput GFP localization assigns Ase1 to the microtubule cytoskeleton.
    supporting_text: >-
      ORFeome cloning and global analysis of protein localization in the fission yeast
      Schizosaccharomyces pombe.
    reference_section_type: TITLE
- id: PMID:17254972
  title: Crosslinkers and motors organize dynamic microtubules to form stable bipolar
    arrays in fission yeast.
  findings:
  - statement: >-
      Ase1 binds along the full length of antiparallel microtubules and regulates
      sliding forces by polarity and overlap length, organizing dynamic microtubules
      into stable bipolar arrays.
    supporting_text: >-
      the bundler ase1p localized all along the length of antiparallel MTs, whereas the
      motor klp2p (kinesin-14) accumulated only at MT plus ends.
    reference_section_type: ABSTRACT
- id: PMID:18061564
  title: Stabilization of overlapping microtubules by fission yeast CLASP.
  findings:
  - statement: >-
      A direct Ase1-Cls1 (CLASP) interaction targets Cls1 to regions of antiparallel
      microtubule overlap, where Cls1 stabilizes overlapping microtubules.
    supporting_text: >-
      A direct interaction with ase1p (PRC1/MAP65) targets cls1p to regions of
      antiparallel MT overlap.
    reference_section_type: ABSTRACT
- id: PMID:19686686
  title: Phospho-regulated interaction between kinesin-6 Klp9p and microtubule bundler
    Ase1p promotes spindle elongation.
  findings:
  - statement: >-
      Ase1 directly binds kinesin-6 Klp9 (via Ase1 residues 416-639) and recruits it to
      the midzone at anaphase B onset; the interaction is gated by Cdc2 phosphorylation
      and Clp1 dephosphorylation, and failure to bind reduces spindle elongation
      velocity.
    supporting_text: >-
      Failure of klp9p-ase1p binding leads to decreased spindle elongation velocity.
    reference_section_type: ABSTRACT
  - statement: Cdc2-dependent phosphorylation promotes Ase1 transit into the nucleus at G2/M.
    supporting_text: >-
      One function of cdc2p-dependent phosphorylation is to allow ase1p to transit from
      the cytoplasm into the nucleus during the G2/M transition
    reference_section_type: RESULTS
- id: PMID:21151990
  title: The fission yeast XMAP215 homolog Dis1p is involved in microtubule bundle
    organization.
  findings:
  - statement: >-
      Ase1 is the major determinant of inter-microtubule spacing in interphase bundles
      and partially co-localizes with Dis1 at microtubule overlap regions.
    supporting_text: >-
      ase1p is the major determinant of inter-microtubule spacing in interphase bundles
      since ase1 deleted cells have an inter-microtubule spacing that differs from that
      observed in wild-type cells.
    reference_section_type: ABSTRACT
- id: PMID:21892183
  title: Adaptive braking by Ase1 prevents overlapping microtubules from sliding completely
    apart.
  findings:
  - statement: >-
      In vitro, Ase1 enables stable antiparallel overlaps by adaptive braking of
      kinesin-14-driven sliding: it compacts in the shrinking overlap and slows sliding
      dose-dependently.
    supporting_text: >-
      As overlapping microtubules start to slide apart, Ase1 molecules become compacted
      in the shrinking overlap and the sliding velocity gradually decreases in a
      dose-dependent manner.
    reference_section_type: ABSTRACT
- id: PMID:24239120
  title: Antagonistic spindle motors and MAPs regulate metaphase spindle length and
    chromosome segregation.
  findings:
  - statement: >-
      Ase1 contributes to outward-pushing forces that set metaphase spindle length,
      antagonizing inward-pulling kinetochore kinesins.
    supporting_text: >-
      the spindle midzone proteins kinesin-5 cut7p and MT bundler ase1p contribute to
      outward-pushing forces
    reference_section_type: ABSTRACT
- id: PMID:25963819
  title: Nucleocytoplasmic transport in the midzone membrane domain controls yeast
    mitotic spindle disassembly.
  findings:
  - statement: >-
      Ase1 localizes to the spindle midzone, which is surrounded by a midzone membrane
      domain where Imp1-mediated transport controls spindle disassembly.
    supporting_text: >-
      nucleocytoplasmic transport at the membrane domain surrounding the mitotic spindle
      midzone, here named the midzone membrane domain (MMD)
    reference_section_type: ABSTRACT
- id: PMID:26124291
  title: A stable microtubule array drives fission yeast polarity reestablishment upon
    quiescence exit.
  findings:
  - statement: >-
      In quiescence, microtubules form a stable antiparallel Q-MT bundle at the spindle
      pole body, of which Ase1 is a crosslinking component.
    supporting_text: >-
      MTs are also stabilized and rearranged into a novel antiparallel bundle associated
      with the spindle pole body, named Q-MT bundle.
    reference_section_type: ABSTRACT
- id: PMID:28513584
  title: Kinesin-5-independent mitotic spindle assembly requires the antiparallel microtubule
    crosslinker Ase1 in fission yeast.
  findings:
  - statement: >-
      In cut7Δpkl1Δ cells, bipolar spindle assembly requires Ase1 to recruit CLASP/Cls1
      and stabilize microtubules; Ase1 and Cls1 activity is sufficient for initial
      bipolar spindle formation in silico.
    supporting_text: >-
      cut7Δpkl1Δ spindle bipolarity requires the microtubule antiparallel bundler
      PRC1/Ase1 to recruit CLASP/Cls1 to stabilize microtubules.
    reference_section_type: ABSTRACT
- id: PMID:30806623
  title: Kinesin-6 regulates cell-size-dependent spindle elongation velocity to keep
    mitosis duration constant in fission yeast.
  findings:
  - statement: >-
      Cell-size-dependent accumulation of kinesin-6 Klp9 (recruited via the Ase1
      midzone) tunes anaphase B spindle elongation velocity to keep mitosis duration
      constant.
    supporting_text: >-
      coupled to cell size, the amount of kinesin-6 Klp9 molecules increases, resulting
      in an acceleration of spindle elongation in anaphase B.
    reference_section_type: ABSTRACT
- id: PMID:32502403
  title: Selective Nuclear Pore Complex Removal Drives Nuclear Envelope Division in
    Fission Yeast.
  findings:
  - statement: >-
      Ase1/PRC1 at the spindle midzone is required for local concentration and
      subsequent removal of nuclear pore complexes in the nuclear envelope contacting
      the central spindle, driving nuclear envelope division.
    supporting_text: >-
      the microtubule bundler Ase1/PRC1 at the spindle midzone is required for the local
      concentration of nuclear pore complexes (NPCs) in the region of the NE in contact
      with the central spindle.
    reference_section_type: ABSTRACT
- id: PMID:32723864
  title: Klp2 and Ase1 synergize to maintain meiotic spindle stability during metaphase
    I.
  findings:
  - statement: >-
      Ase1 synergizes with kinesin-14 Klp2 to maintain metaphase spindle stability
      specifically during meiosis I.
    supporting_text: >-
      the maintenance of metaphase spindle stability during meiosis I requires the
      synergism between Klp2 and the conserved microtubule cross-linker Ase1
    reference_section_type: ABSTRACT
- id: PMID:34346498
  title: Loss of kinesin-8 improves the robustness of the self-assembled spindle in
    Schizosaccharomyces pombe
  findings:
  - statement: >-
      Ase1/PRC1 is an essential crosslinker component of the self-assembled meiotic
      spindle, required for meiotic spindle integrity, midzone, and elongation.
    supporting_text: >-
      Loss of kinesin-8 improves the robustness of the self-assembled spindle in
      Schizosaccharomyces pombe
    reference_section_type: TITLE
- id: PMID:36980258
  title: Actin-Microtubule Crosstalk Imparts Stiffness to the Contractile Ring in
    Fission Yeast.
  findings:
  - statement: >-
      The post-anaphase array forms a dynamic polygon of Ase1-crosslinked microtubules
      inside the contractile ring, imparting stiffness to the contractile ring.
    supporting_text: >-
      The PAA microtubules form a dynamic polygon of Ase1p crosslinked microtubules
      inside the contractile ring.
    reference_section_type: ABSTRACT
- id: PMID:18257517
  title: Phosphoproteome analysis of fission yeast.
  findings:
  - statement: Ase1 is phosphorylated at Ser537, identified by mass spectrometry.
    supporting_text: Phosphoproteome analysis of fission yeast.
    reference_section_type: TITLE
suggested_questions:
- What determines the antiparallel specificity of Ase1 crosslinking, and does it bind
  parallel microtubules with measurably lower affinity in vivo?
- How is the dose-dependent balance between Ase1 bundling/braking and motor-driven
  sliding tuned across mitosis, meiosis, and quiescence?
- What is the full set of midzone partners recruited by Ase1 beyond Klp9, Cls1, and Dis1,
  and how are their recruitment hierarchies established?
suggested_experiments:
- In vitro reconstitution with purified Ase1, Klp9, and Cls1 on engineered antiparallel
  microtubule overlaps to dissect the contribution of each partner to overlap stability
  and sliding velocity.
- Quantitative single-molecule imaging of Ase1 turnover (FRAP / single-molecule
  tracking) at the midzone versus interphase bundles across the cell cycle to test
  differential regulation.
- Separation-of-function mutants (e.g., C-terminal Cls1-recruitment truncation,
  Klp9-binding region 416-639) to genetically uncouple Ase1 bundling from partner
  recruitment in spindle elongation, nuclear envelope division, and cytokinesis
  coordination.
