id: Q9HDY1
gene_symbol: ase1
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:284812
  label: Schizosaccharomyces pombe (strain 972 / ATCC 24843)
description: >-
  Ase1 is the fission-yeast member of the conserved Ase1/PRC1/MAP65 family of
  microtubule-associated proteins. It is a homodimer that specifically crosslinks
  and bundles antiparallel microtubules, defining and stabilizing the region of
  interdigitating antiparallel microtubule overlap at the spindle midzone. During
  mitosis Ase1 localizes weakly to the metaphase spindle and accumulates robustly
  at the spindle midzone in anaphase, where it provides structural integrity to
  the elongating bipolar spindle; cells lacking Ase1 form disorganized midzones
  and spindles that collapse during anaphase B. Ase1 also organizes antiparallel
  overlaps in interphase microtubule bundles (contributing to nuclear centering by
  microtubule pushing forces), in the post-anaphase array of microtubules at the
  division site, and in stable quiescence-associated microtubule bundles. As a
  midzone scaffold it recruits and concentrates partner proteins, including the
  kinesin-6 Klp9 (driving anaphase B spindle elongation velocity), the CLASP
  microtubule-stabilizer Cls1/Peg1, and contributes to local nuclear pore complex
  remodeling that drives nuclear envelope division. Its overlap-stabilizing
  activity also brakes kinesin-14-driven microtubule sliding, preventing
  antiparallel bundles from sliding apart. Ase1 additionally functions in meiotic
  spindle and astral microtubule bundling, in nuclear oscillatory movement during
  meiotic prophase, and as a regulatory component coupling completion of anaphase
  with cytokinesis.
