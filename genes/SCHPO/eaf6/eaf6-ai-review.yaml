id: O14240
gene_symbol: eaf6
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:284812
  label: Schizosaccharomyces pombe (strain 972 / ATCC 24843)
description: >-
  Chromatin modification-related protein eaf6 is a small (138 AA) structural
  subunit shared between the NuA4 and Mst2 histone acetyltransferase complexes
  in S. pombe. As a component of the NuA4 complex, it participates in
  transcriptional activation through acetylation of nucleosomal histones H4
  and H2A, and in DNA repair-dependent chromatin remodeling (by similarity to
  S. cerevisiae). As a component of the Mst2 complex, it contributes to
  H3K14 acetylation that is critical for DNA damage checkpoint activation
  (PMID:22184112). The Mst2 complex composed of eaf6, mst2, nto1, pdp3,
  ptf1, ptf2, and tfg3 was identified by mass spectrometry (PMID:22184112).
  Elimination of Mst2 complex activity bypasses the requirement for the RNAi
  pathway in pericentric heterochromatin functions (PMID:21289066). eaf6
  itself has no known independent enzymatic activity; it functions as a
  scaffolding or regulatory subunit within these acetyltransferase complexes.
  The protein localizes primarily to the nucleus, with some cytosolic
  detection in a high-throughput localization study (PMID:16823372).
existing_annotations:
  - term:
      id: GO:0035267
      label: NuA4 histone acetyltransferase complex
    evidence_type: IBA
    original_reference_id: GO_REF:0000033
    review:
      summary: >-
        IBA annotation based on phylogenetic inference from orthologs including
        human MEAF6 (Q9HAF1) and other eukaryotic EAF6 family members. UniProt
        states eaf6 is a "Component of the NuA4 histone acetyltransferase
        complex" by similarity (ECO:0000250). The PANTHER family PTHR13476
        confirms the orthology. This is well-supported by the conserved NuA4
        domain (Pfam PF09340) and is consistent with the known biology of this
        protein family.
      action: ACCEPT
      reason: >-
        The IBA annotation is phylogenetically sound and supported by domain
        evidence (Pfam NuA4 domain PF09340, InterPro IPR015418). The S. pombe
        eaf6 protein is the ortholog of S. cerevisiae Eaf6, a known NuA4
        subunit. UniProt confirms this component relationship by similarity.
  - term:
      id: GO:0000123
      label: histone acetyltransferase complex
    evidence_type: IEA
    original_reference_id: GO_REF:0000120
    review:
      summary: >-
        IEA annotation based on automated methods (InterPro IPR015418 and
        ARBA). This is a parent term of both GO:0035267 (NuA4 HAT complex)
        and GO:0036410 (Mst2 HAT complex), both of which are already annotated
        with stronger evidence. The annotation is correct but redundant.
      action: ACCEPT
      reason: >-
        While more general than the specific complex annotations, this IEA is
        consistent with the IBA for NuA4 and TAS for Mst2. It is not wrong and
        serves as an acceptable broader annotation.
  - term:
      id: GO:0005634
      label: nucleus
    evidence_type: IEA
    original_reference_id: GO_REF:0000044
    review:
      summary: >-
        IEA annotation based on UniProt subcellular location mapping. UniProt
        records nuclear localization by similarity (ECO:0000250). This is also
        supported by the HDA annotation from PMID:16823372.
      action: ACCEPT
      reason: >-
        Nuclear localization is expected for a histone acetyltransferase complex
        subunit and is supported by both the UniProt similarity annotation and
        the experimental HDA evidence from PMID:16823372.
  - term:
      id: GO:0003674
      label: molecular_function
    evidence_type: ND
    original_reference_id: GO_REF:0000015
    review:
      summary: >-
        ND (No biological Data) annotation indicating no molecular function has
        been experimentally determined for eaf6. This is appropriate as eaf6
        is a scaffolding/structural subunit with no known independent enzymatic
        activity.
      action: ACCEPT
      reason: >-
        eaf6 has no known independent molecular function. It acts as a
        structural subunit of the NuA4 and Mst2 HAT complexes. The ND
        annotation correctly reflects the current state of knowledge.
  - term:
      id: GO:0140861
      label: DNA repair-dependent chromatin remodeling
    evidence_type: IC
    original_reference_id: GO_REF:0000111
    review:
      summary: >-
        IC annotation inferred by curator from the NuA4 complex membership
        (GO:0035267). The NuA4 complex is involved in DNA repair in
        S. cerevisiae, and eaf6 membership in this complex implies participation
        in DNA repair-dependent chromatin remodeling. UniProt states the NuA4
        complex "is also involved in DNA repair (By similarity)."
      action: ACCEPT
      reason: >-
        This IC annotation is logically inferred from the NuA4 complex
        membership. The NuA4 complex has a well-established role in DNA repair
        chromatin remodeling in yeast. Additionally, the Mst2 complex
        (containing eaf6) regulates H3K14ac required for DNA damage checkpoint
        activation (PMID:22184112), further supporting a role in DNA
        repair-related chromatin processes.
  - term:
      id: GO:0036410
      label: Mst2 histone acetyltransferase complex
    evidence_type: TAS
    original_reference_id: PMID:21289066
    review:
      summary: >-
        TAS annotation based on PMID:21289066, which describes elimination of
        the Mst2 acetyltransferase complex and its effect on pericentric
        heterochromatin. The companion study PMID:22184112 directly identified
        eaf6 in the Mst2 complex by mass spectrometry. UniProt states eaf6 is
        a "Component of the mst2 complex composed of at least eaf6, mst2,
        nto1, pdp3, ptf1, ptf2 and tfg3" citing PMID:22184112.
      action: ACCEPT
      reason: >-
        Membership in the Mst2 complex is experimentally supported by mass
        spectrometry identification (PMID:22184112) and functional studies
        (PMID:21289066). This is a core annotation for eaf6.
      supported_by:
        - reference_id: PMID:21289066
          supporting_text: >-
            when the activity of the histone H3 Lys 14 (H3K14) acetyltransferase
            Mst2 is eliminated, the RNAi machinery is no longer required for
            pericentric heterochromatin functions
  - term:
      id: GO:0005634
      label: nucleus
    evidence_type: HDA
    original_reference_id: PMID:16823372
    review:
      summary: >-
        HDA annotation from a high-throughput protein localization study in
        S. pombe (PMID:16823372). The study used YFP-tagged ORFs to determine
        localization of approximately 90% of the S. pombe proteome. Nuclear
        localization is consistent with eaf6 function as a subunit of nuclear
        histone acetyltransferase complexes.
      action: ACCEPT
      reason: >-
        Nuclear localization is expected for a histone acetyltransferase complex
        subunit and is experimentally supported by this proteome-wide
        localization study.
      supported_by:
        - reference_id: PMID:16823372
          supporting_text: >-
            we determined the localization of 4,431 proteins, corresponding to
            approximately 90% of the fission yeast proteome, by tagging each
            ORF with the yellow fluorescent protein
  - term:
      id: GO:0005829
      label: cytosol
    evidence_type: HDA
    original_reference_id: PMID:16823372
    review:
      summary: >-
        HDA annotation from the same high-throughput localization study
        (PMID:16823372). Cytosolic detection may represent a secondary
        localization or overexpression artifact in this high-throughput system.
        While eaf6 primarily functions in the nucleus as part of HAT complexes,
        cytosolic signal could reflect newly synthesized protein or a fraction
        not yet assembled into complexes.
      action: KEEP_AS_NON_CORE
      reason: >-
        Cytosolic localization is not inconsistent with the data but is
        secondary to the nuclear localization where eaf6 performs its known
        functions in histone acetyltransferase complexes. High-throughput
        tagging studies can sometimes detect cytosolic pools of predominantly
        nuclear proteins.
      supported_by:
        - reference_id: PMID:16823372
          supporting_text: >-
            we determined the localization of 4,431 proteins, corresponding to
            approximately 90% of the fission yeast proteome, by tagging each
            ORF with the yellow fluorescent protein
core_functions:
  - description: >-
      Structural subunit of the NuA4 and Mst2 histone acetyltransferase
      complexes. eaf6 has no known independent enzymatic activity but serves
      as a scaffolding component within these multi-subunit complexes that
      acetylate histones H4, H2A (NuA4) and H3K14 (Mst2), contributing to
      transcriptional activation and DNA damage checkpoint signaling.
    molecular_function:
      id: GO:0003674
      label: molecular_function
    directly_involved_in:
      - id: GO:0140861
        label: DNA repair-dependent chromatin remodeling
    locations:
      - id: GO:0005634
        label: nucleus
