    findings: []
  - id: GO_REF:0000120
    title: Combined Automated Annotation using Multiple IEA Methods
    findings: []
  - id: PMID:16823372
    title: >-
      ORFeome cloning and global analysis of protein localization in the
      fission yeast Schizosaccharomyces pombe.
    findings:
      - statement: >-
          Proteome-wide localization study determined subcellular localization
          of approximately 90% of S. pombe proteins using YFP tagging,
          detecting eaf6 in both nucleus and cytosol
        supporting_text: >-
          we determined the localization of 4,431 proteins, corresponding to
          approximately 90% of the fission yeast proteome, by tagging each
          ORF with the yellow fluorescent protein
  - id: PMID:21289066
    title: >-
      Elimination of a specific histone H3K14 acetyltransferase complex
      bypasses the RNAi pathway to regulate pericentric heterochromatin
      functions.
    findings:
      - statement: >-
          Elimination of the Mst2 H3K14 acetyltransferase complex bypasses
          the requirement for RNAi in pericentric heterochromatin maintenance
        supporting_text: >-
          when the activity of the histone H3 Lys 14 (H3K14) acetyltransferase
          Mst2 is eliminated, the RNAi machinery is no longer required for
          pericentric heterochromatin functions
  - id: PMID:22184112
    title: >-
      Histone H3 lysine 14 acetylation is required for activation of a DNA
      damage checkpoint in fission yeast.
    findings:
      - statement: >-
          eaf6 was identified as a component of the Mst2 complex by mass
          spectrometry. The Mst2 complex is a H3K14 acetyltransferase that
          functions with Gcn5 to regulate H3K14ac levels critical for DNA
          damage checkpoint activation.
suggested_questions:
  - question: >-
      Does eaf6 have distinct functional roles within the NuA4 versus Mst2
      complexes, or does it serve the same structural purpose in both?
  - question: >-
      Is there an eaf6-specific phenotype when it is deleted, distinct from
      deletion of other shared subunits between NuA4 and Mst2?
  - question: >-
      Does eaf6 contribute to the substrate specificity or regulation of the
      acetyltransferase activity in either complex?
suggested_experiments:
  - description: >-
      Create eaf6 deletion strain and characterize phenotypes related to
      heterochromatin silencing, DNA damage sensitivity, and H3K14/H4
      acetylation levels
  - description: >-
      Determine whether eaf6 deletion differentially affects NuA4 versus Mst2
      complex integrity using co-immunoprecipitation
  - description: >-
      Test DNA damage checkpoint activation (e.g. response to MMS or
      hydroxyurea) in eaf6 deletion strains to assess contribution to DNA
      damage signaling
