    findings:
      - statement: >-
          IBA annotation for NuA4 complex membership based on phylogenetic
          inference from orthologs including human MEAF6 and S. cerevisiae Eaf6
        supporting_text: >-
          Phylogenetic annotation transfer from characterized orthologs
  - id: GO_REF:0000044
    title: >-
      Gene Ontology annotation based on UniProtKB/Swiss-Prot Subcellular
