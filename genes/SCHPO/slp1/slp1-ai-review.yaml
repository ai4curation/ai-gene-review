core_functions:
- description: >-
    Substrate-recognition co-activator of the anaphase-promoting complex/cyclosome (APC/C): Slp1
    binds the APC/C and, via its WD40 beta-propeller, recognizes D-box and KEN-box degrons to
    activate APC/C-mediated polyubiquitination of mitotic substrates.
  supported_by:
  - reference_id: PMID:26882497
    supporting_text: >-
      a corresponding decrease in Cdc20 Slp1-APC/C dependent ubiquitination of the radio-labelled
      securinCut2 substrate was observed
    reference_section_type: RESULTS
  molecular_function:
    id: GO:1990757
    label: ubiquitin ligase activator activity
  directly_involved_in:
    id: GO:0031145
    label: anaphase-promoting complex-dependent catabolic process
- description: >-
    Driver of the metaphase-to-anaphase transition and mitotic exit: by activating APC/C-dependent
    degradation of securin (Cut2) and cyclin B (Cdc13), Slp1 triggers separase activation, cohesin
    cleavage, sister-chromatid separation, and Cdk1 inactivation.
  supported_by:
  - reference_id: PMID:26882497
    supporting_text: >-
      Once securin is destroyed, cohesin is cleaved and sister chromatids separate and segregate in
      anaphase
    reference_section_type: INTRODUCTION
  molecular_function:
    id: GO:1990757
    label: ubiquitin ligase activator activity
  directly_involved_in:
    id: GO:0045842
    label: positive regulation of mitotic metaphase/anaphase transition
- description: >-
    Principal target of the spindle assembly checkpoint: when kinetochores are unattached or lack
    tension, Slp1(Cdc20) is bound and inhibited within the mitotic checkpoint complex (Mad2-Mad3-Slp1),
    which obstructs its degron-recognition sites and displaces it from the APC/C until correct
    bi-orientation is achieved.
  supported_by:
  - reference_id: PMID:22437499
    supporting_text: >-
      The MCC inhibits the APC/C by obstructing degron recognition sites on Cdc20 (the substrate
      recruitment subunit of the APC/C) and displacing Cdc20 to disrupt formation of a bipartite
      D-box receptor with the APC/C subunit Apc10
    reference_section_type: ABSTRACT
  molecular_function:
    id: GO:0010997
    label: anaphase-promoting complex binding
  directly_involved_in:
    id: GO:0007094
    label: mitotic spindle assembly checkpoint signaling
