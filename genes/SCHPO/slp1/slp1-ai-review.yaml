id: P78972
gene_symbol: slp1
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:284812
  label: Schizosaccharomyces pombe (strain 972 / ATCC 24843)
description: >-
  Slp1 is the fission-yeast ortholog of Cdc20/p55CDC/Fizzy, a WD40 beta-propeller
  substrate-recognition co-activator of the anaphase-promoting complex/cyclosome (APC/C),
  the multi-subunit RING E3 ubiquitin ligase that drives mitotic and meiotic progression.
  Slp1 binds the APC/C and, by recognizing destruction (D-box) and KEN-box degrons on
  substrates, activates the APC/C at the metaphase-to-anaphase transition. The principal
  Slp1-APC/C substrates are securin (Cut2) and mitotic cyclin B (Cdc13): their
  ubiquitin-dependent degradation by the 26S proteasome triggers separase (Cut1) activation,
  cleavage of cohesin, sister-chromatid separation, and inactivation of Cdk1, leading to
  anaphase and mitotic exit. Slp1 is the key target of the spindle assembly checkpoint: when
  kinetochores are unattached or lack tension, the mitotic checkpoint complex
  (Mad2-Mad3-Slp1, with Bub3 in many other species) binds and inhibits Slp1, obstructing its
  substrate-degron recognition sites and displacing it from the APC/C until correct
  bi-orientation is achieved. Slp1 is also the only APC/C coactivator essential for meiosis I
  progression, and its activity is fine-tuned during meiosis by the meiosis-specific
  inhibitor/substrate Mes1. Slp1 acts predominantly in the nucleus and associates with mitotic
  structures (spindle, spindle pole body) and the kinetochore where checkpoint signalling
  occurs.
