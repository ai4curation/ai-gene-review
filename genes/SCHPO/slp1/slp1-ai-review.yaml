  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: part_of
  review:
    summary: >-
      Slp1/Cdc20 is the substrate-recognition coactivator that associates with the APC/C; it
      cofractionates with the APC/C and is the recruited activator early in mitosis. As a
      transiently bound coactivator rather than a constitutive core subunit, "part_of APC/C" is
      conventionally used for Cdc20 family activators. ACCEPT.
    action: ACCEPT
    reason: >-
      Phylogenetic inference is fully consistent with strong experimental data that Slp1 is the
      APC/C activator that binds the complex.
    supported_by:
    - reference_id: PMID:18556659
      supporting_text: >-
        In order for the APC/C to become active, it must interact with a transiently available
        activator; early in mitosis, this is Slp1/Cdc20, and later in mitosis and in G1, it
        switches to Ste9/Cdh1
      reference_section_type: INTRODUCTION
