proposed_new_terms: []
suggested_questions:
- question: >-
    What are the temporal dynamics of Slp1 protein levels and APC/C association across the mitotic
    and meiotic cell cycles, and how is Slp1 itself turned over?
- question: >-
    Beyond securin (Cut2) and cyclin B (Cdc13), what is the full repertoire of Slp1-specific APC/C
    substrates, and how does substrate degron preference differ between Slp1 and the Cdh1-type
    activators Ste9 and Fzr1/Mfr1?
- question: >-
    How is the Mad2-independent Mad3-Slp1 inhibitory complex regulated relative to the canonical
    Mad2-Mad3-Slp1 MCC, and what physiological situations rely on each?
suggested_experiments:
- description: >-
    Quantitative live-cell imaging of endogenously tagged Slp1 (e.g., GFP knock-in) to determine its
    subcellular dynamics (nucleus, kinetochore, spindle, SPB) during unperturbed and checkpoint-arrested
    mitosis, to clarify which of the high-throughput localizations reflect functional sites.
- description: >-
    Reconstituted in vitro APC/C ubiquitination assays comparing Slp1 versus Ste9/Fzr1 coactivators
    with defined substrates (Cut2, Cdc13, Mes1) to map activator-specific degron recognition.
- description: >-
    Proximity labeling (e.g., TurboID) of endogenous Slp1 across mitosis and meiosis to define the
    in vivo interactome and substrate landscape, including condition-dependent MCC versus
    Mad3-only inhibitory complexes.
references:
- id: GO_REF:0000002
  title: Gene Ontology annotation through association of InterPro records with GO terms
  findings:
  - statement: >-
      InterPro Cdc20/Fizzy signature (IPR033010) maps Slp1 to APC/C binding and ubiquitin-protein
      transferase activator activity; concordant with experimental data.
- id: GO_REF:0000033
  title: Annotation inferences using phylogenetic trees
  findings:
  - statement: >-
      Phylogenetic (PANTHER) inference of APC/C component, APC/C binding, ubiquitin ligase activator
      activity, and positive regulation of APC/C-dependent catabolic process, all consistent with
      experimental evidence in S. pombe.
- id: GO_REF:0000051
  title: S. pombe keyword mapping
  findings:
  - statement: >-
      PomBase keyword-mapped NAS annotations for ubiquitin ligase activator activity and positive
      regulation of mitotic metaphase/anaphase transition.
- id: GO_REF:0000117
  title: Electronic Gene Ontology annotations created by ARBA machine learning models
  findings:
  - statement: >-
      ARBA electronic annotation of APC/C-dependent catabolic process, concordant with experimental
      annotations.
- id: PMID:15791259
  title: Fission yeast Mes1p ensures the onset of meiosis II by blocking degradation of cyclin Cdc13p.
  findings:
  - statement: >-
      Mes1 interacts with Slp1 and blocks degradation of cyclin Cdc13 to control meiotic progression;
      basis for an Slp1-Mes1 protein-interaction annotation.
    supporting_text: >-
      Fission yeast Mes1p ensures the onset of meiosis II by blocking degradation of cyclin Cdc13p
    reference_section_type: TITLE
- id: PMID:15930132
  title: Spindle checkpoint signaling requires the mis6 kinetochore subcomplex, which interacts with
    mad2 and mitotic spindles.
  findings:
  - statement: >-
      The Mis6 kinetochore subcomplex interacts with Mad2 when the checkpoint is active, establishing
      the kinetochore as the SAC signalling platform that controls Slp1.
    supporting_text: >-
      The Mis6-complex physically interacts with Mad2 under the condition that the Mad2-dependent
      checkpoint is activated
    reference_section_type: ABSTRACT
- id: PMID:16823372
  title: ORFeome cloning and global analysis of protein localization in the fission yeast
    Schizosaccharomyces pombe.
  findings:
  - statement: >-
      Proteome-scale GFP localization study; Slp1 localizes to nucleus and mitotic structures
      (spindle, spindle pole body, cell division site).
    supporting_text: >-
      we determined the localization of 4,431 proteins
    reference_section_type: ABSTRACT
- id: PMID:18331722
  title: A mutual inhibition between APC/C and its substrate Mes1 required for meiotic progression in
    fission yeast.
  findings:
  - statement: >-
      Mes1 binds the WD40 domain of Fizzy-family APC/C activators (including Slp1) and is both an
      inhibitor and a substrate, forming a ternary APC/C-Cdc20-Mes1 complex.
    supporting_text: >-
      Mes1 directly binds the WD40 domain of the Fizzy family of APC/C activators
    reference_section_type: ABSTRACT
- id: PMID:18556659
  title: The spindle checkpoint functions of Mad3 and Mad2 depend on a Mad3 KEN box-mediated
    interaction with Cdc20-anaphase-promoting complex (APC/C).
  findings:
  - statement: >-
      Slp1/Cdc20 is the APC/C activator early in mitosis and the key SAC target; it is incorporated
      into the S. pombe MCC (Mad3-Mad2-Slp1) and cofractionates with the APC/C.
    supporting_text: >-
      abolishes incorporation of Mad3 into the mitotic checkpoint complex (Mad3-Mad2-Slp1 in S. pombe,
      where Slp1 is the Cdc20 homolog
    reference_section_type: ABSTRACT
- id: PMID:21389117
  title: Mes1 controls the meiosis I to meiosis II transition by distinctly regulating the
    anaphase-promoting complex/cyclosome coactivators Fzr1/Mfr1 and Slp1 in fission yeast.
  findings:
  - statement: >-
      Slp1/Cdc20 is the only coactivator essential for meiosis I progression; Mes1 acts as a
      competitive substrate for Slp1, distinct from its pseudosubstrate inhibition of Fzr1/Mfr1.
    supporting_text: >-
      find that only Slp1/Cdc20 is essential for meiosis I progression
    reference_section_type: ABSTRACT
- id: PMID:22437499
  title: Structure of the mitotic checkpoint complex.
  findings:
  - statement: >-
      The S. pombe MCC crystal structure (Mad2-Mad3-Cdc20/Slp1) reveals that the MCC inhibits the
      APC/C by obstructing Cdc20 degron-recognition sites and displacing Cdc20.
    supporting_text: >-
      The MCC inhibits the APC/C by obstructing degron recognition sites on Cdc20 (the substrate
      recruitment subunit of the APC/C) and displacing Cdc20 to disrupt formation of a bipartite
      D-box receptor with the APC/C subunit Apc10
    reference_section_type: ABSTRACT
- id: PMID:26882497
  title: Mps1Mph1 Kinase Phosphorylates Mad3 to Inhibit Cdc20Slp1-APC/C and Maintain Spindle
    Checkpoint Arrests.
  findings:
  - statement: >-
      Cdc20Slp1-APC/C ubiquitinates securin (Cut2) in vitro; Mps1/Mph1 phosphorylation of Mad3
      potentiates inhibition of Cdc20Slp1-APC/C.
    supporting_text: >-
      a corresponding decrease in Cdc20 Slp1-APC/C dependent ubiquitination of the radio-labelled
      securinCut2 substrate was observed
    reference_section_type: RESULTS
- id: PMID:28178520
  title: Identification of a Sgo2-Dependent but Mad2-Independent Pathway Controlling Anaphase Onset in
    Fission Yeast.
  findings:
  - statement: >-
      A Mad2-independent Mad3-Slp1(Cdc20) complex also inhibits the APC/C, with Mad3 binding Slp1 in a
      KEN20-dependent manner.
    supporting_text: >-
      Mad3 interacts with Slp1 in a cell cycle- and KEN20-dependent manner
    reference_section_type: RESULTS
- id: PMID:9461438
  title: 'Fission yeast Slp1: an effector of the Mad2-dependent spindle checkpoint.'
  findings:
  - statement: >-
      Slp1 is a WD-repeat protein essential for anaphase onset that forms a complex with Mad2;
      disrupting the Slp1-Mad2 interaction abolishes the spindle checkpoint.
    supporting_text: >-
      Mad2 formed a complex with Slp1, a WD (tryptophan-aspartic acid)-repeat protein essential for
      the onset of anaphase. When the physical interaction between the two proteins was disrupted, the
      spindle checkpoint was no longer functional
    reference_section_type: ABSTRACT
