id: P78972
gene_symbol: slp1
taxon:
  id: NCBITaxon:284812
  label: Schizosaccharomyces pombe
status: COMPLETE
description: >-
  InterPro2GO domain-based review for slp1 (P78972), the fission-yeast Cdc20/Fizzy
  ortholog and activator (coactivator) of the anaphase-promoting complex/cyclosome
  (APC/C). From its Cdc20/Fizzy WD40 architecture (InterPro:IPR033010), InterPro2GO
  predicts GO:1904668 (positive regulation of ubiquitin protein ligase activity).
  Assessment: CNN (correct but not novel). The prediction is biologically correct - slp1
  is a substrate-recruiting activator of the APC/C E3 ligase - but the function is already
  captured in curated GOA (GO:0097027 ubiquitin-protein transferase activator activity,
  plus anaphase-promoting complex binding and APC-dependent catabolic process). This is a
  clean example of a domain predictor re-deriving an established annotation, not a novel
  discovery. See projects/VIRTUAL_YEAST for the aggregate benchmark.
source_documents:
  - genes/SCHPO/slp1/slp1-uniprot.txt
  - genes/SCHPO/slp1/slp1-goa.tsv
  - rules/arba/_interpro2go.txt
predictions:
  - source_method: InterPro2GO
    source_version: "rules/arba/_interpro2go.txt (repo snapshot)"
    predicted_term:
      id: GO:1904668
      label: positive regulation of ubiquitin protein ligase activity
    predicted_term_type: GO_BP
    review:
      assessment: CNN
      confidence_score: 2
      summary: >-
        GO:1904668 (positive regulation of ubiquitin protein ligase activity) correctly
        describes slp1: as the Cdc20/Fizzy ortholog it activates the APC/C ubiquitin ligase
        and recruits substrates (e.g. cdc13/cyclin B) for ubiquitin-dependent degradation.
        However it is not novel - curated GOA already annotates slp1 with GO:0097027
        (ubiquitin-protein transferase activator activity, IEA), GO:0010997 (APC binding,
        IPI), and GO:0031145 (APC-dependent catabolic process, IDA/IMP). The predicted term
        is a sibling regulatory-BP restatement of the curated activator-activity MF, so the
        prediction recapitulates existing knowledge (CS=2, Correct-but-Not-Novel). Contrast
        with the domain-based misassignments elsewhere in this set (SSZ1 PLI, aah1 PLI):
        here the Cdc20/Fizzy domain is isofunctionally specific, so the inference is safe.
      supported_by:
        - reference_id: UniProtKB:P78972
          supporting_text: >-
            Promotes ubiquitin-dependent degradation of cdc13 by the anaphase promoting
            complex/cyclosome (APC/C).
