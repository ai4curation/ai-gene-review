- id: PMID:10436027
  title: Plo1 kinase recruitment to the spindle pole body and its role in cell division
    in Schizosaccharomyces pombe.
  findings:
  - statement: Plo1 associates with the mitotic but not interphase SPB; this is the earliest recorded fission yeast mitotic event, requiring MPF and reversed by the APC.
    supporting_text: We show that Plo1 associates with the mitotic but not interphase spindle pole body (SPB). SPB association of Plo1 is the earliest fission yeast mitotic event recorded to date.
    reference_section_type: ABSTRACT
- id: PMID:11250892
  title: The role of Plo1 kinase in mitotic commitment and septation in Schizosaccharomyces
    pombe.
  findings:
  - statement: Plo1-associated kinase activity peaks in mitosis, is phosphorylation-dependent, and requires prior MPF activation.
    supporting_text: Plo1-associated casein kinase activity peaked during mitosis before septation. Phosphatase treatment abolished this activity.
    reference_section_type: ABSTRACT
  - statement: Plo1 acts upstream of the septation initiation network to control septation.
    supporting_text: We propose that Plo1 acts before the SIN to control septation.
    reference_section_type: ABSTRACT
- id: PMID:11777938
  title: Polo boxes and Cut23 (Apc8) mediate an interaction between polo kinase and
    the anaphase-promoting complex for fission yeast mitosis.
  findings:
  - statement: Plo1 physically interacts with the APC through its non-catalytic (polo box) region and the Cut23/Apc8 subunit; this interaction is required for mitotic progression.
    supporting_text: We show that Plo1 kinase physically interacts with the anaphase-promoting complex (APC)/cyclosome through the noncatalytic domain of Plo1 and the tetratricopeptide repeat domain of the subunit, Cut23. A new cut23 mutation, which specifically disrupts the interaction with Plo1, results in a metaphase arrest.
    reference_section_type: ABSTRACT
- id: PMID:12411492
  title: Plo1(+) regulates gene transcription at the M-G(1) interval during the fission
    yeast mitotic cell cycle.
  findings:
  - statement: Plo1 kinase regulates PBF transcription-factor binding to PCB promoter elements, controlling M-G1 mitotic gene transcription in an auto-feedback loop.
    supporting_text: we show that PBF binding activity and consequent gene transcription are regulated by the Plo1p protein kinase, thus invoking a potential auto-feedback loop mechanism that regulates mitotic gene transcription and passage through septation and cytokinesis.
    reference_section_type: ABSTRACT
- id: PMID:12615979
  title: Polo boxes form a single functional domain that mediates interactions with
    multiple proteins in fission yeast polo kinase.
  findings:
  - statement: The polo boxes form a single functional unit essential for cellular function and cell-cycle-regulated localisation to the SPB, and mediate interactions with multiple partner proteins.
    supporting_text: the polo boxes form a single functional unit that is essential for both cellular function and cell-cycle-regulated localisation to the spindle pole bodies.
    reference_section_type: ABSTRACT
- id: PMID:12815070
  title: Physical and functional interactions between polo kinase and the spindle
    pole component Cut12 regulate mitotic commitment in S. pombe.
  findings:
  - statement: Cut12 binds Plo1 and is required for full mitotic activation of Plo1; Plo1 is an integral part of the controls modulating MPF activation and mitotic commitment.
    supporting_text: the delayed mitotic commitment of plo1.ts2 cells suggests that Plo1 is an integral part of the core controls that modulate MPF activation in S. pombe.
    reference_section_type: ABSTRACT
- id: PMID:15917811
  title: Polo kinase links the stress pathway to cell cycle control and tip growth
    in fission yeast.
  findings:
  - statement: Stress-response-pathway phosphorylation of Plo1 Ser402 promotes its recruitment to SPBs and commitment to mitosis, and ensures efficient tip growth and cell division during stress recovery (linking to cell size and signalling).
    supporting_text: SRP-mediated phosphorylation of Ser 402 promotes Plo1 recruitment to SPBs and thus commitment to mitosis. Ser 402 phosphorylation also ensures efficient reinitiation of cell tip growth and cell division during recovery from particular stresses.
    reference_section_type: ABSTRACT
- id: PMID:16823372
  title: ORFeome cloning and global analysis of protein localization in the fission
    yeast Schizosaccharomyces pombe.
  findings: []
- id: PMID:20826461
  title: The role of Schizosaccharomyces pombe dma1 in spore formation during meiosis.
  findings: []
- id: PMID:21376600
  title: Temporal control of contractile ring assembly by Plo1 regulation of myosin
    II recruitment by Mid1/anillin.
  findings:
  - statement: Plo1 triggers recruitment of contractile ring components to medial cortical nodes via the anillin Mid1, providing temporal control of contractile ring assembly at mitotic onset.
    supporting_text: the Polo-like kinase Plo1 is known to activate Mid1 nuclear export at mitotic onset, coupling division plane specification to nuclear position. Here we provide evidence that Plo1 also triggers the recruitment of contractile ring components
    reference_section_type: ABSTRACT
- id: PMID:21965528
  title: Aurora promotes cell division during recovery from TOR-mediated cell cycle
    arrest by driving spindle pole body recruitment of Polo.
  findings:
  - statement: Aurora kinase Ark1 phosphorylates Plo1 in its linker region to drive Plo1 onto the spindle poles, where it promotes mitosis.
    supporting_text: Ark1 phosphorylation of polo kinase Plo1 within the linker region between the kinase domain and polo boxes drives Plo1 onto the spindle poles where it promotes mitosis.
    reference_section_type: ABSTRACT
- id: PMID:22375062
  title: Plo1 phosphorylates Dam1 to promote chromosome bi-orientation in fission
    yeast.
  findings:
  - statement: Plo1 phosphorylates Dam1 on serine 143 during prometaphase and metaphase to aid tension-dependent chromosome bi-orientation.
    supporting_text: Dam1 is instead phosphorylated on serine 143 by the Polo kinase homologue, Plo1, during prometaphase and metaphase ... aids tension-dependent chromosome bi-orientation.
    reference_section_type: ABSTRACT
- id: PMID:22438582
  title: Spindle pole body components are reorganized during fission yeast meiosis.
  findings:
  - statement: Plo1 is excluded from the SPB during meiotic prophase, and its exclusion/activity is essential for meiosis-specific SPB remodeling; forced SPB targeting causes SPB overduplication.
    supporting_text: the polo kinase Plo1, which normally localizes to the SPB during mitosis, is excluded from them in meiotic prophase, when meiosis-specific, horse-tail nuclear movement occurs. We found that exclusion of Plo1 during this period was essential to properly remodel SPBs, because artificial targeting of Plo1 to SPBs resulted in an overduplication of SPBs.
    reference_section_type: ABSTRACT
- id: PMID:23333317
  title: Removal of centrosomal PP1 by NIMA kinase unlocks the MPF feedback loop to
    promote mitotic commitment in S. pombe.
  findings:
  - statement: NIMA-family (Fin1) removal of centrosomal PP1 unlocks the MPF positive-feedback loop that employs Polo (Plo1) and Cut12 to boost Cdc25 and promote mitotic commitment.
    supporting_text: The generation of a critical "trigger" of active MPF promotes a positive feedback loop that employs Polo kinase to boost Cdc25 activity and inhibit Wee1, thereby ensuring that mitotic commitment is a bistable switch.
    reference_section_type: ABSTRACT
- id: PMID:23770679
  title: Microtubules and Alp7-Alp14 (TACC-TOG) reposition chromosomes before meiotic
    segregation.
  findings:
  - statement: Plo1 phosphorylates the Alp7-Alp14 (TACC-TOG) complex, promoting its meiosis-specific association with the Nuf2-Ndc80 outer kinetochore to retrieve scattered kinetochores to the poles before meiotic segregation.
    supporting_text: the microtubule-associated protein complex Alp7-Alp14 (the fission yeast orthologues of mammalian TACC-TOG) is phosphorylated by Polo kinase, which promotes its meiosis-specific association to the outer kinetochore complex Nuf2-Ndc80 of scattered kinetochores, thereby assisting in capturing remote kinetochores.
    reference_section_type: ABSTRACT
- id: PMID:24920823
  title: Cdk1 promotes cytokinesis in fission yeast through activation of the septation
    initiation network.
  findings:
  - statement: Polo-like kinase promotes SIN activation and is partially responsible for phosphorylation of the Spg1 GAP component Byr4.
    supporting_text: Polo-like kinase, which promotes SIN activation, is partially responsible for Byr4 phosphorylation.
    reference_section_type: ABSTRACT
- id: PMID:25356547
  title: A complex network of interactions between mitotic kinases, phosphatases and
    ESCRT proteins regulates septation and membrane trafficking in S. pombe.
  findings:
  - statement: Plo1 interacts (two-hybrid) with multiple ESCRT proteins, forming a network with ark1 and clp1 that coordinates septation and membrane trafficking.
    supporting_text: two-hybrid in vivo interactions are reported between Plo1p and Sst4p, Vps28p, Vps25p, Vps20p and Vps32p
    reference_section_type: ABSTRACT
- id: PMID:25487150
  title: A PP1-PP2A phosphatase relay controls mitotic progression.
  findings: []
- id: PMID:25533956
  title: Meikin is a conserved regulator of meiosis-I-specific kinetochore function.
  findings:
  - statement: Meiosis-I-specific kinetochore functions (mono-orientation, cohesion protection) are mediated mainly by Polo-like kinase activity enriched at kinetochores in a meikin (Moa1)-dependent manner.
    supporting_text: These functions are mediated mainly by the activity of Polo-like kinase PLK1, which is enriched to kinetochores in a MEIKIN-dependent manner.
    reference_section_type: ABSTRACT
- id: PMID:28497540
  title: Meikin-associated polo-like kinase specifies Bub1 distribution in meiosis
    I.
  findings:
  - statement: Moa1 (meikin) recruits Plo1 to kinetochores, where Plo1 phosphorylates Spc7 (KNL1) to accumulate Bub1 in meiosis I, supporting Sgo1-dependent cohesion protection.
    supporting_text: Moa1 (meikin), which associates stably with CENP-C during meiosis I, recruits Plo1 (polo-like kinase) to the kinetochores and phosphorylates Spc7 (KNL1) to accumulate Bub1.
    reference_section_type: ABSTRACT
- id: PMID:33176152
  title: Acute Heat Stress Leads to Reversible Aggregation of Nuclear Proteins into
    Nucleolar Rings in Fission Yeast.
  findings:
  - statement: Acute heat stress sequesters nuclear/nucleolar proteins, including cell-cycle regulators, into reversible nucleolar peripheral ring aggregates; these dissolve on return to growth temperature.
    supporting_text: acute HS results in the segregation and aggregation of multiple nuclear and nucleolar proteins into ring-like structures located at the nucleolar periphery (nucleolar rings [NuRs]).
    reference_section_type: ABSTRACT
- id: PMID:33888556
  title: Meikin synergizes with shugoshin to protect cohesin Rec8 during meiosis I.
  findings:
  - statement: Plo1 associated with Moa1 phosphorylates Rec8, potentiating Sgo1-associated PP2A to dephosphorylate Rec8 at another site, preventing separase cleavage and protecting centromeric cohesion in meiosis I.
    supporting_text: The phosphorylation of Rec8 by Moa1-Plo1 potentiates the activity of PP2A associated with Sgo1. This leads to dephosphorylation of Rec8 at another site, which thereby prevents cleavage of Rec8 by separase.
    reference_section_type: ABSTRACT
- id: PMID:38448160
  title: Phosphorylation of Rec8 cohesin complexes regulates mono-orientation of kinetochores
    in meiosis I.
  findings:
  - statement: Plo1 (associated with Moa1) phosphorylates sites in cohesin subunits Rec8 and Psm3; non-phosphorylatable mutations cause specific defects in kinetochore mono-orientation in meiosis I.
    supporting_text: we identify Plo1 phosphorylation sites in the cohesin subunits, Rec8 and Psm3. The non-phosphorylatable mutations at these sites showed specific defects in mono-orientation.
    reference_section_type: ABSTRACT
- id: PMID:7744248
  title: The conserved Schizosaccharomyces pombe kinase plo1, required to form a bipolar
    spindle, the actin ring, and septum, can drive septum formation in G1 and G2 cells.
  findings:
  - statement: plo1+ is essential; its loss causes mitotic arrest with a monopolar spindle or failure of septation (no F-actin ring, no septal material), placing it high in the regulatory cascade controlling septation.
    supporting_text: Loss of plo1+ function leads to a mitotic arrest in which condensed chromosomes are associated with a monopolar spindle or to the failure of septation following the completion of nuclear division. In the latter case, cells show a failure both in the formation of an F-actin ring and in the deposition of septal material, suggesting that plo1+ function is required high in the regulatory cascade that controls septation.
    reference_section_type: ABSTRACT
- id: PMID:9852154
  title: Role of polo kinase and Mid1p in determining the site of cell division in
    fission yeast.
  findings:
  - statement: Plo1 is required for Mid1 nuclear export and medial-ring formation, localizes to SPBs, spindles and the medial ring, and is a key molecule for spatial and temporal coordination of cytokinesis with mitosis.
    supporting_text: Plo1p localizes to the spindle pole bodies and spindles of mitotic cells and also to the medial ring at the time of its formation.
    reference_section_type: ABSTRACT
  - statement: Plo1 is required for Mid1p to exit the nucleus and form a ring.
    supporting_text: Plo1p is required for Mid1p to exit the nucleus and form a ring, and Pom1p is required for proper placement of the Mid1p ring.
    reference_section_type: ABSTRACT
