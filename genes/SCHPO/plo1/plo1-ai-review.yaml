suggested_questions:
- question: >-
    What is the complete in vivo substrate repertoire of Plo1 across mitotic
    commitment, spindle assembly, the metaphase/anaphase transition, and the SIN, and
    how is substrate selection partitioned by the polo-box phosphopeptide-docking
    module?
- question: >-
    How are the multiple upstream inputs to Plo1 SPB recruitment (Cut12, Pcp1,
    Aurora/Ark1, stress-pathway Ser402, NIMA/Fin1-PP1) integrated to set the timing
    and threshold of mitotic commitment?
suggested_experiments:
- description: >-
    Analog-sensitive (as) plo1 allele combined with phosphoproteomics across
    synchronized mitosis to define the temporal order of Plo1-dependent
    phosphorylation events on the spindle, kinetochore, and division-site machineries.
- description: >-
    Separation-of-function polo-box and kinase-domain mutants, scored for
    SPB/kinetochore/division-site localisation and for individual outputs (bipolar
    spindle, biorientation, SIN initiation, contractile ring), to map which Plo1
    functions are catalytic versus scaffolding.
