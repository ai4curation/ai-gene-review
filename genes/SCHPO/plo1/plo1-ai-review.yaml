taxon:
  id: NCBITaxon:284812
  label: Schizosaccharomyces pombe (strain 972 / ATCC 24843)
description: >-
  Plo1 is the sole Polo-like kinase (PLK) of the fission yeast Schizosaccharomyces
  pombe, a serine/threonine protein kinase (EC 2.7.11.21) with an N-terminal kinase
  domain and a C-terminal Polo-box domain (POLO box 1 and POLO box 2) that together
  form a single phosphopeptide-binding module targeting the enzyme to the spindle
  pole body (SPB), kinetochores, the mitotic spindle and the cell-division
  site/contractile ring. Plo1 is an essential master regulator of M phase. Its
  kinase activity is low in interphase and peaks in mitosis downstream of M-phase
  promoting factor (Cdc2/Cdc13) activation. Plo1 promotes commitment to mitosis by
  reinforcing the Cdc25/Wee1 positive-feedback loop on MPF, an activity gated by its
  recruitment to the SPB through the SPB component Cut12 and by activating
  phosphorylation from the Aurora (Ark1) and stress-response (Sty1) pathways. Plo1
  is required to form a bipolar spindle, contributes to chromosome bi-orientation
  by phosphorylating the DASH/Dam1 component Dam1, engages the anaphase-promoting
  complex through the Cut23/Apc8 subunit to drive the metaphase-to-anaphase
  transition, and couples mitosis to cytokinesis by triggering medial/contractile
  ring assembly (via the anillin Mid1) and by initiating the septation initiation
  network (SIN) that drives division-septum formation. In meiosis Plo1 partners
  with meikin (Moa1) at kinetochores to direct mono-orientation of sister
  kinetochores in meiosis I and to protect centromeric cohesin (Rec8) from
  separase, and it remodels the meiotic SPB.
