suggested_questions:
- Which of the >200 identified Cdc2 substrates are individually rate-limiting for ordering specific cell-cycle
  events, versus collectively contributing through the activity-threshold model?
- To what extent is substrate selection determined by cyclin identity (Cdc13 vs Cig1/Cig2/Puc1) versus
  simply by total CDK activity level in vivo?
- How do the spatially distinct Cdc2 pools (nuclear, spindle pole body, kinetochore, chromatin, cytoplasmic)
  differ in their substrate repertoire and regulation?
suggested_experiments:
- Systematic analog-sensitive (as-CDK) chemical-genetic inactivation combined with quantitative phosphoproteomics
  across synchronized mitotic and meiotic time-courses to map substrate-specific activity thresholds and
  assign each substrate to a cell-cycle event.
- Targeted, substrate-non-phosphorylatable (S/T-to-A) allele panels for individual Cdc2 substrates to
  determine which downstream processes (e.g. condensation, kinetochore assembly, cytokinesis timing) genetically
  require direct Cdc2 phosphorylation.
- Live-cell imaging with cyclin-specific tagged Cdc2 complexes to quantify the spatiotemporal dynamics
  of distinct Cdc2-cyclin pools at SPBs, kinetochores and chromatin during mitosis and meiosis.
