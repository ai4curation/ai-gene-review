  title: CDK Substrate Phosphorylation and Ordering the Cell Cycle.
  findings:
  - statement: A single Cdc13-Cdc2 cyclin-CDK can substitute for all the cyclin-CDK complexes of the cell
      cycle, and a single rising CDK activity orders substrate phosphorylation via substrate-specific
      activity thresholds; >200 substrates were identified.
    supporting_text: a single rising CDK activity orders substrate phosphorylation via the sequential
      passage through substrate-specific activity thresholds and that this, in turn, orders cell cycle
      events.
