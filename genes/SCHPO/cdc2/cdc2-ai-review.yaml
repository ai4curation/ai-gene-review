id: P04551
gene_symbol: cdc2
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:284812
  label: Schizosaccharomyces pombe (strain 972 / ATCC 24843)
description: Cdc2 (p34cdc2, Cdk1) is the founding cyclin-dependent serine/threonine protein kinase and
  the master regulator of the fission-yeast cell cycle, driving both the G1/S and G2/M transitions of
  the mitotic cycle as well as the meiotic divisions. It is catalytically inert as a monomer and becomes
  an active kinase only when bound to a B-type cyclin (chiefly the mitotic cyclin Cdc13, with Cig1/Cig2/Puc1
  acting at G1/S) together with the small Suc1/Cks1 subunit, forming the cyclin-dependent kinase holoenzyme
  (MPF). Its activity is further controlled by activating phosphorylation of Thr167 in the activation
  loop by CAK (Csk1/Mcs6), by inhibitory phosphorylation of Tyr15 (and Thr14) by the Wee1/Mik1 kinases,
  by activating Tyr15 dephosphorylation by the Cdc25 phosphatase, and by the CDK inhibitor Rum1 that restrains
  it during G1. Active Cdc2-cyclin phosphorylates Ser/Thr-Pro motifs on more than 200 substrates, and
  a single rising CDK activity is sufficient to order cell-cycle events through substrate-specific activity
  thresholds. Through these substrates it controls DNA replication initiation and prevents re-replication,
  chromosome condensation and segregation, spindle and kinetochore dynamics, mitotic exit, cytokinesis
  timing, and meiotic progression. Cdc2 acts mainly in the nucleus, at spindle pole bodies, spindles,
  kinetochores and on chromatin, and its inactivation by checkpoint signaling enforces cell-cycle arrest
  in response to DNA damage and replication stress.
