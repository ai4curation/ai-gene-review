    Involvement of mitochondrial ferredoxin and Cox15p in hydroxylation of
    heme O.
  findings:
  - statement: >-
      Cox15 mutants in S. pombe are blocked in heme A but not heme O
      biosynthesis, establishing the two-step pathway (heme B -> heme O ->
      heme A) in which Cox10 catalyzes the first step.
    supporting_text: >-
      cox15 mutants are blocked in heme A but not heme O biosynthesis
  - statement: >-
      In S. pombe, COX15 is fused with YAH1 (mitochondrial ferredoxin),
      suggesting close functional coupling between the heme O hydroxylase
      and ferredoxin in this organism.
    supporting_text: >-
      In Schizosaccharomyces pombe COX15 is fused to YAH1, the yeast gene
      for mitochondrial ferredoxin (adrenodoxin)
