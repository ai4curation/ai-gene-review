gene_symbol: cox10
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:284812
  label: Schizosaccharomyces pombe (strain 972 / ATCC 24843)
description: >-
  Cox10 is the S. pombe protoheme IX farnesyltransferase (heme O synthase,
  EC 2.5.1.141), a multi-pass mitochondrial inner membrane enzyme that
  catalyzes the conversion of protoheme IX (heme B) and farnesyl diphosphate
  to heme O. This reaction is the first committed step in heme A biosynthesis,
  which is essential for cytochrome c oxidase assembly and aerobic respiration.
  Cox10 belongs to the UbiA prenyltransferase family. Notably, in S. pombe
  the COX15 gene (encoding the heme O monooxygenase that converts heme O to
  heme A) is fused with YAH1 (mitochondrial ferredoxin), suggesting close
  functional coupling of these pathway components (PMID:11248251).
existing_annotations:
- term:
    id: GO:0005739
    label: mitochondrion
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      IBA annotation of Cox10 to the mitochondrion based on phylogenetic
      inference. This is fully consistent with the known biology: Cox10 is a
      mitochondrial membrane protein in all characterized eukaryotic orthologs.
      UniProt annotates the subcellular location as "Mitochondrion membrane"
      and the protein has a predicted mitochondrial transit peptide.
    action: ACCEPT
    reason: >-
      Mitochondrial localization is well established for Cox10 orthologs across
      eukaryotes. The IBA annotation is supported by the HDA localization data
      from PMID:16823372 and UniProt annotation by similarity.
- term:
    id: GO:0006784
    label: heme A biosynthetic process
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      IBA annotation for involvement in heme A biosynthetic process. Cox10
      catalyzes the first step (heme B to heme O) in the two-step heme A
      biosynthesis pathway. This is a core function of the gene.
    action: ACCEPT
    reason: >-
      Heme A biosynthesis is the primary biological process for Cox10. The
      farnesylation of heme B to heme O is the first committed step in heme A
      synthesis. This is corroborated by IMP evidence from PMID:11248251, where
      cox15 mutants (which act in the second step) were "blocked in heme A but
      not heme O biosynthesis," establishing the pathway context in which
      Cox10 operates.
- term:
    id: GO:0008495
    label: protoheme IX farnesyltransferase activity
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      IBA annotation for protoheme IX farnesyltransferase activity. This is the
      defining molecular function of Cox10, converting protoheme IX and farnesyl
      diphosphate to heme O. UniProt assigns EC 2.5.1.141 by similarity to
      S. cerevisiae COX10 (P24009).
    action: ACCEPT
    reason: >-
      This is the core molecular function of Cox10, supported by sequence
      homology to characterized orthologs, InterPro domain assignments
      (IPR006369), HAMAP family MF_00154, and the UbiA prenyltransferase
      domain (Pfam PF01040).
- term:
    id: GO:0006783
    label: heme biosynthetic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: >-
      IEA annotation from InterPro2GO mapping (IPR006369, IPR016315) to the
      broader term heme biosynthetic process. While technically correct since
      heme A biosynthesis is a subtype of heme biosynthesis, the more specific
      term GO:0006784 (heme A biosynthetic process) is already annotated.
    action: ACCEPT
    reason: >-
      This is a valid broader annotation derived from InterPro domain mapping.
      While GO:0006784 (heme A biosynthetic process) is more specific and also
      annotated, keeping this broader IEA annotation is acceptable as it
      correctly reflects the InterPro mapping and is not incorrect.
- term:
    id: GO:0006784
    label: heme A biosynthetic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000117
  review:
    summary: >-
      IEA annotation from ARBA machine learning model for heme A biosynthetic
      process. This duplicates the IBA and IMP annotations for the same term
      but provides independent computational evidence.
    action: ACCEPT
    reason: >-
      Correct annotation consistent with core function. Duplicate GO IDs with
      different evidence codes are acceptable.
- term:
    id: GO:0008495
    label: protoheme IX farnesyltransferase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  review:
    summary: >-
      IEA annotation from combined automated methods (InterPro, Rhea, EC number)
      for protoheme IX farnesyltransferase activity. Consistent with the IBA
      annotation to the same term and with UniProt EC 2.5.1.141 assignment.
    action: ACCEPT
    reason: >-
      Correct annotation for the core molecular function, supported by multiple
      independent sources including InterPro domain (IPR006369), Rhea reaction
      (RHEA:28070), and EC classification (EC:2.5.1.141).
- term:
    id: GO:0016020
    label: membrane
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: >-
      IEA annotation from InterPro2GO mapping to the generic term "membrane."
      Cox10 is a multi-pass membrane protein with 8 predicted transmembrane
      helices. While correct, more specific localization terms (mitochondrial
      membrane, mitochondrial inner membrane) are also annotated.
    action: ACCEPT
    reason: >-
      While generic, this annotation is not incorrect. Cox10 has 8 predicted
      transmembrane helices per UniProt feature annotations. The more specific
      mitochondrial membrane and mitochondrial inner membrane annotations are
      also present, making this a valid but less informative IEA annotation.
- term:
    id: GO:0016765
    label: transferase activity, transferring alkyl or aryl (other than methyl) groups
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: >-
      IEA annotation from InterPro (UbiA prenyltransferase family IPR000537)
      to a broad transferase activity term. Cox10 transfers a farnesyl group
      to protoheme IX, which falls under this category. The more specific term
      GO:0008495 (protoheme IX farnesyltransferase activity) is already present.
    action: ACCEPT
    reason: >-
      A valid parent-level annotation from the InterPro UbiA domain mapping.
      While the more specific term GO:0008495 is also annotated, this broader
      IEA mapping is technically correct and acceptable to retain.
- term:
    id: GO:0031966
    label: mitochondrial membrane
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  review:
    summary: >-
      IEA annotation from combined automated methods to mitochondrial membrane.
      UniProt annotates the subcellular location as "Mitochondrion membrane"
      by similarity. This is consistent with the NAS annotation to
      mitochondrial inner membrane (GO:0005743) and HDA annotation to
      mitochondrion (GO:0005739).
    action: ACCEPT
    reason: >-
      Consistent with the known biology. Cox10 is a multi-pass mitochondrial
      membrane protein. The InterPro mapping from IPR016315 and UniProt
      subcellular location both support this annotation.
- term:
    id: GO:0006784
    label: heme A biosynthetic process
  evidence_type: IMP
  original_reference_id: PMID:11248251
  review:
    summary: >-
      IMP annotation based on mutant phenotype data from Barros et al. (2001).
      The paper studies Cox15p and its role in the hydroxylation step of heme A
      biosynthesis (heme O to heme A), demonstrating that "cox15 mutants are
      blocked in heme A but not heme O biosynthesis." While the paper primarily
      characterizes Cox15p rather than Cox10, it establishes the heme A
      biosynthetic pathway context. The cox10 mutant phenotype (respiratory
      deficiency due to loss of heme O/A synthesis) is well characterized in
      the S. cerevisiae ortholog.
    action: ACCEPT
    reason: >-
      Cox10 is essential for heme A biosynthesis as the enzyme catalyzing the
      first step (heme B to heme O). The referenced paper establishes the
      pathway context in S. pombe, showing the two-step nature of heme A
      synthesis, and S. pombe Cox10 is mentioned in the pathway context.
    supported_by:
    - reference_id: PMID:11248251
      supporting_text: >-
        cox15 mutants are blocked in heme A but not heme O biosynthesis
- term:
    id: GO:0005739
    label: mitochondrion
  evidence_type: HDA
  original_reference_id: PMID:16823372
  review:
    summary: >-
      HDA (high-throughput direct assay) annotation of Cox10 to the
      mitochondrion based on the proteome-wide YFP-tagging localization study
      by Matsuyama et al. (2006) in S. pombe. The study determined
      localization of approximately 90% of the fission yeast proteome.
    action: ACCEPT
    reason: >-
      Direct experimental evidence from a systematic localization study fully
      consistent with Cox10 being a mitochondrial membrane protein.
    supported_by:
    - reference_id: PMID:16823372
      supporting_text: >-
        we determined the localization of 4,431 proteins, corresponding to
        approximately 90% of the fission yeast proteome, by tagging each ORF
        with the yellow fluorescent protein
- term:
    id: GO:0005743
    label: mitochondrial inner membrane
  evidence_type: NAS
  original_reference_id: GO_REF:0000051
  review:
    summary: >-
      NAS annotation from S. pombe keyword mapping to mitochondrial inner
      membrane. Cox10 orthologs in S. cerevisiae are localized to the
      mitochondrial inner membrane, and UniProt annotates the subcellular
      location as "Mitochondrion membrane" by similarity. The protein has a
      predicted mitochondrial transit peptide and 8 transmembrane helices,
      consistent with inner membrane localization.
    action: ACCEPT
    reason: >-
      Inner membrane localization is consistent with the known biology of
      Cox10 orthologs and with the protein's predicted topology (multi-pass
      membrane protein with transit peptide). This is more specific than
      the mitochondrial membrane IEA annotation but consistent with all
      available evidence.
