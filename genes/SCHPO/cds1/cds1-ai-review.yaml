- id: PMID:10521402
  title: Meiotic DNA replication checkpoint control in fission yeast.
  findings:
  - statement: >-
      Cds1 is absolutely required for the meiotic DNA replication checkpoint that
      blocks meiosis I when replication is incomplete; Cds1 is not required for
      the mitotic DNA damage checkpoint.
    supporting_text: >-
      the Cds1 protein kinase are required for the DNA replication checkpoint
      during meiosis, with Cds1 playing a more prominent role than it does during
      mitosis.
    reference_section_type: ABSTRACT
- id: PMID:11027263
  title: Schizosaccharomyces pombe Hsk1p is a potential cds1p target required for
    genome integrity.
  findings:
  - statement: Hsk1 (DDK catalytic subunit) is a direct in vitro substrate of purified Cds1.
    supporting_text: >-
      it is a direct substrate of purified Cds1p kinase in vitro.
    reference_section_type: ABSTRACT
- id: PMID:11313465
  title: Threonine-11, phosphorylated by Rad3 and atm in vitro, is required for activation
    of fission yeast checkpoint kinase Cds1.
  findings:
  - statement: >-
      Rad3 phosphorylates Cds1 at Thr11 (priming) which is required for HU-induced
      activation and S-M checkpoint enforcement.
    supporting_text: >-
      Substitution of threonine-11 with alanine (T11A) abolished Cds1 activation
      that occurs when DNA replication is inhibited by hydroxyurea (HU) treatment.
    reference_section_type: ABSTRACT
- id: PMID:12032307
  title: A single unbranched S-phase DNA damage and replication fork blockage checkpoint
    pathway.
  findings:
  - statement: Intra-S-phase slowing of replication after damage depends strongly on Cds1.
    supporting_text: >-
      The slowing of S phase depends strongly on the six checkpoint-Rad proteins,
      on Cds1, and on Rad4/Cut5
    reference_section_type: ABSTRACT
- id: PMID:12960401
  title: Intra-G1 arrest in response to UV irradiation in fission yeast.
  findings:
  - statement: >-
      Cds1 is activated at the onset of S phase after UV and contributes to the
      intra-S delay; Cds1 kinase activity assayed on MBP.
    supporting_text: >-
      Immunoprecipitates of Cds1 were used to measure Cds1 kinase activity, with
      myelin basic protein (MBP) as substrate
    reference_section_type: METHODS
- id: PMID:16618806
  title: Two-stage mechanism for activation of the DNA replication checkpoint kinase
    Cds1 in fission yeast.
  findings:
  - statement: >-
      Cds1 is activated in two stages: Mrc1-mediated FHA recruitment and
      Rad3-dependent priming, then FHA-mediated dimerization and autoactivation.
    supporting_text: >-
      Mrc1 recruits Cds1 to stalled replication forks by interactions between the
      FHA domain of Cds1 and specific phosphorylated Rad3 consensus sites in Mrc1.
    reference_section_type: ABSTRACT
- id: PMID:16823372
  title: ORFeome cloning and global analysis of protein localization in the fission
    yeast Schizosaccharomyces pombe.
  findings:
  - statement: >-
      Global GFP localization reports Cds1 in nucleus, cytosol and cell division
      site.
    supporting_text: >-
      ORFeome cloning and global analysis of protein localization in the fission
      yeast Schizosaccharomyces pombe.
    reference_section_type: TITLE
- id: PMID:18180284
  title: Minichromosome maintenance proteins interact with checkpoint and recombination
    proteins to promote s-phase genome stability.
  findings:
  - statement: Mcm4 binds Cds1 and is phosphorylated by Cds1 upon checkpoint activation.
    supporting_text: >-
      Mcm4 binds the Cds1 kinase and undergoes Cds1-dependent phosphorylation.
    reference_section_type: ABSTRACT
- id: PMID:18682565
  title: DNA replication checkpoint promotes G1-S transcription by inactivating the
    MBF repressor Nrm1.
  findings:
  - statement: >-
      Cds1 phosphorylates the MBF repressor Nrm1, promoting its dissociation from
      MBF and inducing replication/repair gene expression.
    supporting_text: >-
      Phosphorylation of Nrm1 by the Cds1 (Chk2) checkpoint protein kinase, which
      is activated in response to DNA replication stress, promotes its
      dissociation from the MBF transcription factor.
    reference_section_type: ABSTRACT
- id: PMID:19037101
  title: Mus81, Rhp51(Rad51), and Rqh1 form an epistatic pathway required for the
    S-phase DNA damage checkpoint.
  findings:
  - statement: cds1Δ shows a complete S-phase DNA damage checkpoint defect after MMS.
    supporting_text: >-
      upon treatment with the alkylating agent methyl methane sulfonate,
      cds1Delta mutants display a complete checkpoint defect.
    reference_section_type: ABSTRACT
- id: PMID:19357077
  title: Autoinhibition and autoactivation of the DNA replication checkpoint kinase
    Cds1.
  findings:
  - statement: >-
      Autophosphorylation of activation-loop Thr328 is the only modification
      required for Cds1 kinase activation; the C-terminal tail is autoinhibitory.
    supporting_text: >-
      phosphorylation of a highly conserved threonine residue (Thr 328 ) in the
      activation loop is the only covalent modification required for kinase
      activation in vitro and in vivo.
    reference_section_type: ABSTRACT
- id: PMID:21084840
  title: The Mek1 phosphorylation cascade plays a role in meiotic recombination of
    Schizosaccharomyces pombe.
  findings:
  - statement: >-
      Reviews Cds1 (Rad53) as the major replication-checkpoint effector with an
      SQ/TQ cluster, FHA domain and Ser/Thr kinase domain; primary experimental
      focus is the paralog Mek1.
    supporting_text: >-
      Cds1 and its orthologs in other species ( S. cerevisiae Rad53 and mammalian
      CHK2) are characterized by an N-terminal Ser-Gln/Thr-Gln (SQ/TQ) cluster
      and forkhead-associated (FHA) domain and a Ser-Thr kinase domain.
    reference_section_type: INTRODUCTION
- id: PMID:22682245
  title: The intra-S phase checkpoint targets Dna2 to prevent stalled replication
    forks from reversing.
  findings:
  - statement: >-
      Cds1 phosphorylates Dna2 on S220 in vivo and in vitro to stabilize stalled
      forks and prevent fork reversal.
    supporting_text: >-
      the Cds1(Chk2) effector kinase targets Dna2 on S220 to regulate, both in
      vivo and in vitro, Dna2 association with stalled replication forks in
      chromatin.
    reference_section_type: ABSTRACT
- id: PMID:24478458
  title: The checkpoint-dependent nuclear accumulation of Rho1p exchange factor Rgf1p
    is important for tolerance to chronic replication stress.
  findings:
  - statement: >-
      Cds1 (with Rad24) drives nuclear accumulation of Rgf1 under chronic
      replication stress via phosphorylation of Cds1-consensus serines.
    supporting_text: >-
      Rgf1p nuclear accumulation during replication arrest depends on the 14-3-3
      chaperone Rad24p and the DNA replication checkpoint kinase Cds1p.
    reference_section_type: ABSTRACT
- id: PMID:24478943
  title: Pcf1, a large subunit of CAF-1, required for maintenance of checkpoint kinase
    Cds1 activity.
  findings:
  - statement: >-
      Cds1 is recruited to chromatin (nucleus); chromatin recruitment depends on
      CAF-1 subunit Pcf1 and histone H4 acetylation status.
    supporting_text: >-
      Chromatin recruitment of Cds1 is enhanced by Pcf1 overproduction but is
      attenuated by the Δpcf1 mutation.
    reference_section_type: ABSTRACT
- id: PMID:25492408
  title: Meiotic nuclear movements in fission yeast are regulated by the transcription
    factor Mei4 downstream of a Cds1-dependent replication checkpoint pathway.
  findings:
  - statement: >-
      The Cds1-dependent meiotic replication checkpoint represses mei4 and
      thereby prolongs horsetail nuclear movement when replication stalls.
    supporting_text: >-
      this prolongation was caused by the Cds1-dependent replication checkpoint,
      which represses expression of the mei4(+) gene encoding a meiosis-specific
      transcription factor.
    reference_section_type: ABSTRACT
- id: PMID:28806726
  title: Replication fork slowing and stalling are distinct, checkpoint-independent
    consequences of replicating damaged DNA.
  findings:
  - statement: >-
      The intra-S checkpoint slows replication by inhibiting origin firing (not
      by decreasing fork rate) and facilitates replication of damaged templates.
    supporting_text: >-
      the checkpoint slows replication by inhibiting origin firing, but not by
      decreasing fork rates. However, the checkpoint appears to facilitate
      replication of damaged templates, allowing forks to more quickly pass
      lesions.
    reference_section_type: ABSTRACT
- id: PMID:7723827
  title: A kinase from fission yeast responsible for blocking mitosis in S phase.
  findings:
  - statement: >-
      cds1 encodes a protein kinase that is a key component of the DNA
      replication-monitoring S/G2 checkpoint blocking mitosis during DNA synthesis.
    supporting_text: >-
      this protein kinase is a key component of the DNA replication-monitoring
      S/G2 checkpoint system.
    reference_section_type: ABSTRACT
- id: PMID:9774107
  title: Replication checkpoint requires phosphorylation of the phosphatase Cdc25
    by Cds1 or Chk1.
  findings:
  - statement: >-
      Cds1 (redundantly with Chk1) phosphorylates Cdc25 on S99/S192/S359 to
      promote 14-3-3 binding as part of the replication checkpoint.
    supporting_text: >-
      both kinases phosphorylate Cdc25 on the same sites, which include serine
      residues at positions 99, 192 and 359.
    reference_section_type: ABSTRACT
