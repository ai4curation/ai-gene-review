- term:
    id: GO:0044773
    label: mitotic DNA damage checkpoint signaling
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: involved_in
  review:
    summary: >-
      This broad term encompasses G1, S and G2 DNA-damage checkpoints. For Cds1
      the well-supported, specific role is the mitotic intra-S DNA damage
      checkpoint (slowing S phase when forks encounter damage). Cds1 is NOT the
      G2 DNA-damage checkpoint effector (that is Chk1). The annotation is best
      replaced by the precise intra-S child term.
    action: MODIFY
    reason: >-
      Term is too general/imprecise; Cds1 functions specifically in the intra-S
      DNA damage checkpoint, not the G2 DNA-damage checkpoint.
    proposed_replacement_terms:
