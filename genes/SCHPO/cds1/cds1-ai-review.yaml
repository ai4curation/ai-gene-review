- term:
    id: GO:0031573
    label: mitotic intra-S DNA damage checkpoint signaling
  evidence_type: IMP
  original_reference_id: PMID:12032307
  qualifier: involved_in
  review:
    summary: >-
      Core biological process. Genetic analysis shows the intra-S-phase
      slowing of replication in response to damage depends strongly on Cds1,
      defining a single unbranched S-phase damage/fork-blockage checkpoint
      pathway.
    action: ACCEPT
    reason: >-
      Genetic dependence of the intra-S checkpoint on Cds1.
    supported_by:
    - reference_id: PMID:12032307
      supporting_text: >-
        The slowing of S phase depends strongly on the six checkpoint-Rad
        proteins, on Cds1, and on Rad4/Cut5
      reference_section_type: ABSTRACT
core_functions:
- description: >-
    Protein serine/threonine kinase activity: as the effector kinase of the DNA
    replication checkpoint, Cds1 phosphorylates serine/threonine residues on
    downstream targets (Cdc25, Wee1, Hsk1/Dfp1, Dna2, Mus81, Rad60, Mcm4, Nrm1,
    Rgf1).
  supported_by:
  - reference_id: PMID:19357077
    supporting_text: >-
      phosphorylation of a highly conserved threonine residue (Thr 328 ) in the
      activation loop is the only covalent modification required for kinase
      activation in vitro and in vivo.
    reference_section_type: ABSTRACT
  - reference_id: PMID:22682245
    supporting_text: >-
      the Cds1(Chk2) effector kinase targets Dna2 on S220 to regulate, both in
      vivo and in vitro, Dna2 association with stalled replication forks in
      chromatin.
    reference_section_type: ABSTRACT
  molecular_function:
    id: GO:0004674
    label: protein serine/threonine kinase activity
- description: >-
    Mitotic DNA replication (S/M) checkpoint signaling: Cds1 couples mitosis to
    the completion of DNA synthesis, blocking mitotic entry when replication is
    incomplete, in part by phosphorylating Cdc25 to promote 14-3-3 binding and
    keep Cdc2 inhibited.
  supported_by:
  - reference_id: PMID:11313465
    supporting_text: >-
      Cds1 enforces the S-M checkpoint that couples mitosis (M) to the completion
      of DNA synthesis (S).
    reference_section_type: ABSTRACT
  - reference_id: PMID:9774107
    supporting_text: >-
      both kinases phosphorylate Cdc25 on the same sites, which include serine
      residues at positions 99, 192 and 359.
    reference_section_type: ABSTRACT
  biological_process:
    id: GO:0033314
    label: mitotic DNA replication checkpoint signaling
- description: >-
    Mitotic intra-S DNA damage checkpoint signaling and stalled-fork protection:
    Cds1 mediates the slowing of S phase and the stabilization of stalled
    replication forks in response to replication stress and DNA damage
    encountered during replication.
  supported_by:
  - reference_id: PMID:19037101
    supporting_text: >-
      upon treatment with the alkylating agent methyl methane sulfonate,
      cds1Delta mutants display a complete checkpoint defect.
    reference_section_type: ABSTRACT
  - reference_id: PMID:22682245
    supporting_text: >-
      stabilizes stalled forks to maintain genome stability during replication
      stress.
    reference_section_type: ABSTRACT
  biological_process:
    id: GO:0031573
    label: mitotic intra-S DNA damage checkpoint signaling
- description: >-
    Meiotic DNA replication checkpoint signaling: Cds1 is required to block
    meiosis I and to delay meiotic progression when meiotic DNA replication is
    incomplete, playing a more prominent role than in the mitotic cycle.
  supported_by:
  - reference_id: PMID:10521402
    supporting_text: >-
      the Cds1 protein kinase are required for the DNA replication checkpoint
      during meiosis, with Cds1 playing a more prominent role than it does during
      mitosis.
    reference_section_type: ABSTRACT
  biological_process:
    id: GO:0033315
    label: meiotic G2/MI DNA replication checkpoint signaling
proposed_new_terms: []
suggested_questions:
- question: >-
    Beyond the known substrates (Cdc25, Wee1/Mik1, Hsk1/Dfp1, Dna2, Mus81,
    Rad60, Mcm4, Nrm1, Rgf1), what is the complete in vivo Cds1 phosphoproteome
    at stalled forks, and which substrates mediate fork protection versus
    cell-cycle arrest?
- question: >-
    How is Cds1 inactivated and the checkpoint terminated after fork recovery,
    and what role do CAF-1/Pcf1 and histone H4 deacetylation play in resetting
    the kinase?
suggested_experiments:
- description: >-
    Analog-sensitive cds1 (e.g. gatekeeper mutant) combined with quantitative
    phosphoproteomics in HU- and MMS-treated cells to define the direct,
    activation-dependent Cds1 substrate network and distinguish fork-protection
    from cell-cycle-arrest targets.
- description: >-
    Single-molecule DNA combing and fork-reversal assays (e.g. electron
    microscopy of replication intermediates) in cds1Δ and Cds1 substrate-site
    mutants (dna2-S220A, mus81 phospho-mutants) to quantify the contribution of
    each substrate to stalled-fork stability.
