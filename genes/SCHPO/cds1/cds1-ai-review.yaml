id: Q09170
gene_symbol: cds1
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:284812
  label: Schizosaccharomyces pombe (strain 972 / ATCC 24843)
description: >-
  Cds1 is the effector serine/threonine protein kinase of the DNA replication
  (intra-S phase) checkpoint of the fission yeast Schizosaccharomyces pombe, and
  is the ortholog of human CHK2 and budding-yeast Rad53 (CHEK2 subfamily). The
  460-residue protein comprises an N-terminal SQ/TQ regulatory motif and a
  forkhead-associated (FHA) domain followed by a C-terminal protein kinase
  domain and a short C-terminal autoinhibitory tail. Cds1 is activated
  specifically in S phase when replication forks stall (for example upon
  nucleotide depletion by hydroxyurea, or when forks encounter DNA damage): the
  apical kinase Rad3 (ATR), working through the mediator Mrc1 (Claspin),
  phosphorylates Cds1 at Thr11, which primes FHA-dependent dimerization and
  autophosphorylation of the activation-loop residue Thr328, yielding the active
  kinase. Active Cds1 enforces the S/M checkpoint by phosphorylating Cdc25
  (creating 14-3-3/Rad24 binding sites and excluding it from the nucleus) and by
  activating Wee1/Mik1, thereby keeping Cdc2 (CDK1) inhibited and blocking
  mitosis until replication is complete. Cds1 also phosphorylates targets that
  stabilize and protect stalled forks and govern the replication-stress response,
  including Dna2, Mus81, the DDK kinase Hsk1/Dfp1, Rad60, Mcm4, the MBF
  repressor Nrm1, and Rgf1. A Cds1-dependent replication checkpoint also operates
  during meiosis, where Cds1 plays an even more prominent role than in the
  mitotic cycle. Cds1 acts in the nucleus at chromatin/stalled forks. It is
  distinct in function from Chk1, the G2 DNA-damage checkpoint effector kinase.
