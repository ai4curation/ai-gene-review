      supporting_text: >-
        the core motor-microtubule interaction is tightly conserved, reflected in similar
        Cut7 ATPase activities on each microtubule type.
      reference_section_type: ABSTRACT
- id: PMID:1538784
  title: Kinesin-related cut7 protein associates with mitotic and meiotic spindles
    in fission yeast.
  findings:
  - statement: >-
      Cut7 concentrates on/near spindle pole bodies throughout mitotic and meiotic division
      and associates with spindle microtubules in a stage-specific manner including the
      anaphase B midzone; cut7 mutants form two unconnected half-spindles and fail chromosome
      separation.
    supported_by:
    - reference_id: PMID:1538784
      supporting_text: >-
        cut7 protein concentrates on or near the spindle pole bodies throughout mitotic and
        meiotic nuclear division and associates with mitotic spindle microtubules in a
        stage-specific manner, associating with the mid-anaphase B midzone.
      reference_section_type: ABSTRACT
- id: PMID:16823372
  title: ORFeome cloning and global analysis of protein localization in the fission
    yeast Schizosaccharomyces pombe.
  findings:
  - statement: >-
      Genome-wide YFP localization assigns Cut7 to the nucleus, microtubule cytoskeleton and
      mitotic spindle pole body, consistent with directed-evidence localizations.
    supported_by:
    - reference_id: PMID:16823372
      supporting_text: >-
        we determined the localization of 4,431 proteins, corresponding to approximately 90%
        of the fission yeast proteome, by tagging each ORF with the yellow fluorescent protein.
      reference_section_type: ABSTRACT
- id: PMID:18418055
  title: Protein complexes at the microtubule organizing center regulate bipolar spindle
    assembly.
  findings:
  - statement: >-
      The cut7-22(ts) allele is essential for spindle bipolarity; its bipolarity defects are
      rescued by stabilizing microtubules or deleting kinesin-14 pkl1, establishing the
      Cut7-Pkl1 force antagonism at the MTOC/spindle.
    supported_by:
    - reference_id: PMID:18418055
      supporting_text: >-
        Altering the Alp4/gamma-tubulin interaction, conserved residues in helix 11 or deletion
        of pkl1 each are sufficient to rescue bipolarity in our cut7-22(ts) strain.
      reference_section_type: ABSTRACT
- id: PMID:2145514
  title: Novel potential mitotic motor protein encoded by the fission yeast cut7+
    gene.
  findings:
  - statement: >-
      Discovery of cut7+; its product has a kinesin-heavy-chain-like N-terminal head domain
      and resembles A. nidulans bimC; cut7 mutations block spindle formation.
    supported_by:
    - reference_id: PMID:2145514
      supporting_text: >-
        The predicted product of one of these genes, cut7+, contains an amino-terminal domain
        similar to the kinesin heavy chain head domain, indicating that the cut7+ product could
        be a spindle motor.
      reference_section_type: ABSTRACT
- id: PMID:24239120
  title: Antagonistic spindle motors and MAPs regulate metaphase spindle length and
    chromosome segregation.
  findings:
  - statement: >-
      Acute inactivation of cut7 collapses the metaphase spindle into a monopolar structure;
      Cut7 is the active outward-force producer that slides interpolar microtubules apart and
      is indispensable for spindle length maintenance in fission yeast.
    supported_by:
    - reference_id: PMID:24239120
      supporting_text: >-
        Upon inactivation of cut7p at the non-permissive 35°C, the metaphase spindle
        immediately shortened until the spindle became a focused monopolar structure.
      reference_section_type: RESULTS
- id: PMID:26258632
  title: Mad1 promotes chromosome congression by anchoring a kinesin motor to the
    kinetochore.
  findings:
  - statement: >-
      Mad1 binds Cut7 and recruits it to kinetochores of misaligned chromosomes to promote
      plus-end-directed chromosome gliding toward the spindle equator (chromosome congression),
      a context-specific role.
    supported_by:
    - reference_id: PMID:26258632
      supporting_text: >-
        Mad1 recruits Cut7 to kinetochores of misaligned chromosomes and promotes chromosome
        gliding towards the spindle equator.
      reference_section_type: ABSTRACT
- id: PMID:27834216
  title: Schizosaccharomyces pombe kinesin-5 switches direction using a steric blocking
    mechanism.
  findings:
  - statement: >-
      Full-length Cut7 is bidirectional in vitro; stepping direction is set by motor crowding
      on the microtubule lattice (greater crowding -> plus-end-directed). The N-terminus binds
      microtubules directly and increases occupancy.
    supported_by:
    - reference_id: PMID:27834216
      supporting_text: >-
        the key determinant of stepping direction is the degree of motor crowding on the
        microtubule lattice, with greater crowding converting the motor from minus end-directed
        to plus end-directed stepping.
      reference_section_type: ABSTRACT
- id: PMID:28513584
  title: Kinesin-5-independent mitotic spindle assembly requires the antiparallel
    microtubule crosslinker Ase1 in fission yeast.
  findings:
  - statement: >-
      Cut7 and kinesin-14 Pkl1 are antagonistic; co-deletion restores bipolarity. Cut7 also
      contributes to anaphase B spindle elongation (its loss reduces elongation velocity ~30%)
      in addition to bipolar spindle assembly.
    supported_by:
    - reference_id: PMID:28513584
      supporting_text: >-
        spindle elongation velocity during anaphase B was reduced in cut7Δpkl1Δ cells (30%
        reduction compared to wild-type cells); suggesting that Cut7 participates in anaphase
        spindle elongation in addition to its established function in spindle bipolarity.
      reference_section_type: RESULTS
- id: PMID:30659798
  title: Cryo-EM Structure (4.5-Å) of Yeast Kinesin-5-Microtubule Complex Reveals
    a Distinct Binding Footprint and Mechanism of Drug Resistance.
  findings:
  - statement: >-
      Cryo-EM of the Cut7 motor domain on fission yeast microtubules shows canonical kinesin
      microtubule binding (helix-α4), a plus-end-docked neck linker, and slow
      microtubule-stimulated ATPase; loop5 divergence renders Cut7 resistant to the
      mammalian kinesin-5 inhibitor STLC.
    supported_by:
    - reference_id: PMID:30659798
      supporting_text: >-
        Cut7MD contacts Sp_tub MTs using canonical kinesin structural elements: helix-α4 at the
        intradimer interface, with additional contacts formed with β-tubulin.
      reference_section_type: RESULTS
- id: PMID:32327557
  title: Kinesin-14 family proteins and microtubule dynamics define S. pombe mitotic
    and meiotic spindle assembly, and elongation.
  findings:
  - statement: >-
      Cut7 crosslinks antiparallel polar microtubules to drive spindle pole separation; its
      concentration is constant between mitosis and meiosis I, and it is required for meiotic
      (MI) bipolar spindle assembly, where kinesin-14 Klp2 antagonizes it.
    supported_by:
    - reference_id: PMID:32327557
      supporting_text: >-
        Spindle bipolarity is achieved when interdigitating MTs are crosslinked and organized
        into antiparallel arrays by the kinesin-5 family protein Cut7 (Hagan and Yanagida,
        1992; Kapitein et al., 2005; Sharp et al., 1999), inducing the separation of spindle
        poles.
      reference_section_type: INTRODUCTION
