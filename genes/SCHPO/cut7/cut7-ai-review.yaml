core_functions:
- description: >-
    Plus-end-directed microtubule motor activity: a microtubule-stimulated ATPase that uses
    ATP binding and hydrolysis in its N-terminal kinesin motor domain to move toward
    microtubule plus ends.
  supported_by:
  - reference_id: PMID:30659798
    supporting_text: >-
      Density corresponding to the C-terminal neck linker ... directed toward the MT plus end.
      This docked conformation is consistent with the AMPPNP state of the motor and with
      canonical concepts of plus-end directed motor movement.
  - reference_id: PMID:27834216
    supporting_text: >-
      greater crowding converting the motor from minus end-directed to plus end-directed
      stepping.
