id: P24339
gene_symbol: cut7
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:284812
  label: Schizosaccharomyces pombe (strain 972 / ATCC 24843)
description: >-
  Cut7 is the sole kinesin-5 (BimC/Eg5 family) motor protein of the fission yeast
  Schizosaccharomyces pombe. It is an essential, microtubule-dependent ATPase that
  assembles into bipolar homotetramers, crosslinks antiparallel interpolar
  microtubules and slides them apart to generate outward pushing force. This
  activity drives separation of the duplicated spindle pole bodies and establishes
  and maintains the bipolarity of the mitotic (and meiotic) spindle; in cut7
  mutants spindle pole bodies fail to separate and two unconnected half-spindles
  form, blocking chromosome segregation. Cut7 concentrates at the spindle pole
  bodies throughout nuclear division and associates with spindle (polar)
  microtubules in a stage-specific manner, including the anaphase B midzone. Its
  outward force opposes the inward pulling force of the minus-end-directed
  kinesin-14 motors Pkl1 and Klp2. The N-terminal motor domain has very slow,
  microtubule-stimulated ATPase activity and is plus-end-directed, although
  full-length oligomeric Cut7 can reverse stepping direction depending on motor
  crowding on the microtubule lattice.
