proposed_new_terms: []
suggested_questions:
- question: >-
    What is the in-vivo stepping direction and processivity of full-length tetrameric Cut7 on
    the spindle, and how is the crowding-dependent directional switch observed in vitro
    regulated within the spindle midzone?
- question: >-
    Beyond Mad1 and tubulin, what is the full set of functionally relevant Cut7 protein
    interactions, and which of the generic "protein binding" annotations can be replaced with
    informative molecular-function or complex terms?
- question: >-
    How is Cut7 activity regulated by cell-cycle phosphorylation (e.g., the predicted CDC2/
    Cdk1 site at Thr1011), and does this control its localization or motor output?
suggested_experiments:
- description: >-
    Single-molecule and microtubule-gliding/sliding assays with purified full-length Cut7
    tetramers on defined antiparallel microtubule overlaps to quantify directionality,
    crosslinking and sliding velocity under physiological crowding.
- description: >-
    Live-cell imaging of endogenously tagged Cut7 combined with fast (microfluidic)
    inactivation of temperature-sensitive alleles to dissect its distinct contributions to
    phase-one spindle formation versus anaphase B (phase-three) elongation.
- description: >-
    Phospho-site mutant analysis (e.g., Thr1011A/Thr1011D) and Cdk1 inhibition to test whether
    cell-cycle phosphorylation regulates Cut7 spindle localization, tetramer assembly, or motor
    activity.
references:
- id: GO_REF:0000002
  title: Gene Ontology annotation through association of InterPro records with GO
    terms
  findings:
  - statement: >-
      InterPro kinesin motor domain signatures (IPR001752, IPR019821) correctly support ATP
      binding, microtubule binding and microtubule-based movement for Cut7.
    supported_by:
    - reference_id: PMID:30659798
      supporting_text: >-
        Kinesin-5s are microtubule-dependent motors that drive spindle pole separation during
        mitosis.
      reference_section_type: INTRODUCTION
- id: GO_REF:0000033
  title: Annotation inferences using phylogenetic trees
  findings:
  - statement: >-
      Phylogenetic (kinesin-5/BimC family) inferences for plus-end-directed motor activity,
      mitotic spindle assembly, spindle pole body separation and spindle localization are
      consistent with the experimental data for Cut7.
    supported_by:
    - reference_id: PMID:28513584
      supporting_text: >-
        Kinesin-5 family members are plus-end directed motors organized as homo-tetramers that
        crosslink antiparallel MTs and slide them apart, pushing on the spindle poles.
      reference_section_type: INTRODUCTION
- id: GO_REF:0000044
  title: Gene Ontology annotation based on UniProtKB/Swiss-Prot Subcellular Location
