core_functions:
- description: >-
    Phosphatidylinositol 3-phosphate (PI3P) phosphatase activity that dephosphorylates
    PI3P to generate phosphatidylinositol. This is the core conserved enzymatic function
    of the myotubularin family, involved in regulating PI3P levels on endosomal membranes
    and controlling membrane trafficking and signaling.
