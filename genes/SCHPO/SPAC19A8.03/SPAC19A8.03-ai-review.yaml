  title: Annotation inferences using phylogenetic trees
  findings:
  - statement: >-
      IBA annotations for SPAC19A8.03 were inferred from well-characterized myotubularin
      family orthologs including human MTMRs, mouse Mtmr genes, Drosophila mtm, C. elegans
      mtm genes, and S. cerevisiae YMR1, supporting PI3P phosphatase activity, membrane
      and cytoplasm localization, and phosphatidylinositol dephosphorylation.
