id: O13819
gene_symbol: SPAC19A8.03
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:284812
  label: Schizosaccharomyces pombe (strain 972 / ATCC 24843)
description: >-
  SPAC19A8.03 encodes a phosphoinositide 3-phosphatase of the myotubularin subfamily
  (EC 3.1.3.64). It is the S. pombe ortholog of S. cerevisiae Ymr1 and human myotubularin
  (MTM1/MTMR) family members. The protein contains a PH-GRAM domain and a myotubularin-type
  dual-specificity phosphatase catalytic domain with the characteristic CxxGWDR active site
  motif. Its primary enzymatic function is dephosphorylation of phosphatidylinositol
  3-monophosphate (PI3P) to generate phosphatidylinositol. By analogy with characterized
  orthologs, this activity is involved in regulating PI3P-dependent signaling and maintaining
  endosomal membrane integrity. The protein localizes to the cytoplasm based on high-throughput
  fluorescence microscopy (PMID:16823372).
existing_annotations:
- term:
    id: GO:0005737
    label: cytoplasm
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      Cytoplasmic localization is well-supported for myotubularin family members across
      eukaryotes. The IBA annotation is consistent with the HDA evidence from PMID:16823372
      showing cytoplasmic localization of this protein by fluorescence microscopy.
    action: ACCEPT
    reason: >-
      Cytoplasm is a well-established localization for this myotubularin-family phosphatase.
      Multiple lines of evidence converge: IBA from phylogenetic inference across many
      myotubularin orthologs (including human MTMRs and worm mtm genes), the UniProt subcellular
      location annotation, and the direct HDA evidence from the S. pombe localization study
      (PMID:16823372).
- term:
    id: GO:0016020
    label: membrane
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      Membrane association is consistent with the function of myotubularin phosphatases, which
      act on phosphoinositide lipids embedded in membranes. The IBA annotation is based on
      multiple orthologs including human MTMR proteins that associate with endosomal membranes.
      However, the localization data from PMID:16823372 shows predominantly cytoplasmic signal.
    action: ACCEPT
    reason: >-
      Myotubularin phosphatases dephosphorylate membrane-embedded PI3P substrates and are
      expected to transiently associate with membranes, particularly endosomal membranes.
      The IBA is supported by membrane localization of several orthologs. This is consistent
      with the Reactome pathways associating this protein with synthesis of PIPs at ER, plasma,
      early endosome, and late endosome membranes.
- term:
    id: GO:0004438
    label: phosphatidylinositol-3-phosphate phosphatase activity
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      PI3P phosphatase activity is the canonical molecular function of myotubularin family
      members. The IBA annotation is well-supported by the conserved catalytic domain with
      active site cysteine (Cys342) and the phylogenetic relationship to characterized
      myotubularin enzymes in yeast and mammals.
    action: ACCEPT
    reason: >-
      This is the core molecular function of the gene product. UniProt assigns EC 3.1.3.64
      with the catalytic reaction dephosphorylating PI3P to PI. The protein contains the
      myotubularin phosphatase domain (PROSITE PS51339) with the conserved phosphocysteine
      active site at position 342. The IBA is derived from well-characterized orthologs
      including S. cerevisiae YMR1 and multiple human MTMRs.
- term:
    id: GO:0046856
    label: phosphatidylinositol dephosphorylation
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      Phosphatidylinositol dephosphorylation is the biological process directly enabled by
      the PI3P phosphatase activity of this enzyme. The IBA is well-supported by the conserved
      enzymatic function across the myotubularin family.
    action: ACCEPT
    reason: >-
      This biological process annotation is the direct consequence of the PI3P phosphatase
      molecular function (GO:0004438). The IBA is based on characterized orthologs from
      yeast and mammals, and is fully consistent with the UniProt catalytic activity annotation
      (EC 3.1.3.64).
- term:
    id: GO:0004438
    label: phosphatidylinositol-3-phosphate phosphatase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  review:
    summary: >-
      This IEA annotation derives from the Rhea reaction RHEA:12316 and EC 3.1.3.64,
      automatically mapped to GO:0004438. It is redundant with the IBA annotation for the
      same term but provides independent computational support.
    action: ACCEPT
    reason: >-
      The IEA is based on the EC number and Rhea reaction cross-references in UniProt, which
      directly map to PI3P phosphatase activity. Consistent with the IBA annotation and the
      domain architecture of the protein.
- term:
    id: GO:0005737
    label: cytoplasm
  evidence_type: IEA
  original_reference_id: GO_REF:0000044
  review:
    summary: >-
      This IEA annotation is derived from UniProt subcellular location vocabulary mapping.
      It is redundant with the IBA and HDA annotations for cytoplasm.
    action: ACCEPT
    reason: >-
      The UniProt subcellular location field states "Cytoplasm", which maps to GO:0005737.
      Consistent with the IBA and HDA evidence.
- term:
    id: GO:0005737
    label: cytoplasm
  evidence_type: HDA
  original_reference_id: PMID:16823372
  review:
    summary: >-
      Cytoplasmic localization was determined by high-throughput fluorescence microscopy of
      YFP-tagged S. pombe proteins in the ORFeome localization study by Matsuyama et al. (2006).
      The study determined subcellular localization of approximately 4,431 proteins.
    action: ACCEPT
    reason: >-
      The HDA evidence from PMID:16823372 provides direct experimental support for cytoplasmic
      localization. While high-throughput, this is the only experimental localization data
      available for this protein and is consistent with all other lines of evidence.
    supported_by:
    - reference_id: PMID:16823372
      supporting_text: >-
        we determined the localization of 4,431 proteins, corresponding to approximately 90%
        of the fission yeast proteome, by tagging each ORF with the yellow fluorescent protein
- term:
    id: GO:0005829
    label: cytosol
  evidence_type: HDA
  original_reference_id: PMID:16823372
  review:
    summary: >-
      Cytosol localization from the same ORFeome localization study (PMID:16823372). This is
      more specific than cytoplasm and indicates the protein was observed in the soluble
      cytoplasmic fraction, consistent with a soluble phosphatase that transiently associates
      with membranes.
    action: ACCEPT
    reason: >-
      Cytosol is consistent with a soluble phosphatase that acts on membrane-embedded
      substrates but is predominantly found in the soluble fraction. Supported by the
      same HDA evidence as the cytoplasm annotation.
    supported_by:
    - reference_id: PMID:16823372
      supporting_text: >-
        we determined the localization of 4,431 proteins, corresponding to approximately 90%
        of the fission yeast proteome, by tagging each ORF with the yellow fluorescent protein
- term:
    id: GO:0035556
    label: intracellular signal transduction
  evidence_type: IC
  original_reference_id: GO_REF:0000111
  review:
    summary: >-
      This IC annotation infers involvement in intracellular signal transduction from the
      PI3P phosphatase activity (GO:0004438). While PI3P metabolism does contribute to
      intracellular signaling, this is a very broad term. The more specific process of
      phosphatidylinositol dephosphorylation (GO:0046856) is already captured.
    action: KEEP_AS_NON_CORE
    reason: >-
      Intracellular signal transduction is a broad umbrella term. While PI3P metabolism
      does affect signaling cascades, this annotation is less informative than the more
      specific phosphatidylinositol dephosphorylation term (GO:0046856). The IC evidence
      was inferred from the molecular function annotation. Retaining as non-core because
      the link to signaling is real but peripheral to the core enzymatic function.
references:
