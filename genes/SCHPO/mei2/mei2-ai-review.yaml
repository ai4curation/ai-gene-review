  findings:
  - statement: >-
      Mei2 binds preferentially to the 5' region of meiRNA-L, whereas Mmi1 binds
      the DSR-containing 3' region; meiRNA acts as a decoy to lure Mmi1.
    supported_by: []
    supporting_text: >-
