core_functions:
- description: >-
    Sequence-specific RNA-binding protein (via the C-terminal RRM3) that binds the
    long non-coding meiRNA and other U-rich/lncRNA targets, the molecular basis for
    all downstream meiotic functions.
  molecular_function:
    id: GO:0003723
    label: RNA binding
  supported_by:
  - reference_id: PMID:35512546
    supporting_text: >-
      We found that Mei2 RRM3 interacted in a sequence-specific manner with a
      UUC(U) motif of meiRNA.
    reference_section_type: ABSTRACT
  - reference_id: PMID:7520368
    supporting_text: >-
      A novel, polyadenylated RNA species (meiRNA), which suppresses this
      temperature-sensitive defect if overexpressed, specifically binds to Mei2
      both in vivo and in vitro.
    reference_section_type: ABSTRACT
- description: >-
    Master switch driving the transition from the mitotic to the meiotic cell
    cycle; accumulation of the active (unphosphorylated) form is sufficient to
    commit cells to meiosis and is required for premeiotic DNA synthesis and
    meiosis I.
  directly_involved_in:
    id: GO:0051728
    label: cell cycle switching, mitotic to meiotic cell cycle
  supported_by:
  - reference_id: PMID:9062192
    supporting_text: >-
      the RNA-binding protein Mei2 is a substrate of Pat1 kinase and that
      dephosphorylation of Mei2 is sufficient to switch cells from the mitotic
      cell cycle into meiosis.
    reference_section_type: ABSTRACT
  - reference_id: PMID:7520368
    supporting_text: >-
      A temperature-sensitive mei2 mutant performs premeiotic DNA synthesis but
      does not undergo meiotic divisions, suggesting that Mei2 is required also
      for meiosis I.
    reference_section_type: ABSTRACT
- description: >-
    Sequesters the YTH-family protein Mmi1 (with meiRNA) into the nuclear Mei2
    dot, switching off the DSR-Mmi1/MTREC selective-elimination system and thereby
    stabilizing meiosis-specific mRNAs to enable the meiotic program.
  molecular_function:
    id: GO:0140311
    label: protein sequestering activity
  directly_involved_in:
    id: GO:0051446
    label: positive regulation of meiotic cell cycle
  locations:
  - id: GO:0033620
    label: Mei2 nuclear dot complex
  supported_by:
  - reference_id: PMID:16823445
    supporting_text: >-
      We propose that Mei2 turns off the DSR-Mmi1 system by sequestering Mmi1 to
      the dot and thereby secures stable expression of meiosis-specific
      transcripts.
    reference_section_type: ABSTRACT
  - reference_id: PMID:22144909
    supporting_text: >-
      The RRM-type RNA-binding protein Mei2 is a master regulator of meiosis in
      fission yeast, in which it stabilizes meiosis-specific mRNAs by blocking
      their destruction.
    reference_section_type: ABSTRACT
- description: >-
    Cytosolic, zygote-specific component of P-bodies that represses translation of
    target mRNAs to arrest mitotic growth and drive zygotic development.
  directly_involved_in:
    id: GO:2000766
    label: negative regulation of cytoplasmic translation
  locations:
  - id: GO:0000932
    label: P-body
  supported_by:
  - reference_id: PMID:41298081
    supporting_text: >-
      We found that Mei2 is a zygote-specific component of P-bodies that inhibits
      the translation of tethered mRNAs.
    reference_section_type: ABSTRACT
proposed_new_terms:
- proposed_name: mRNA stabilization
  proposed_definition: >-
    Mei2 stabilizes meiosis-specific mRNAs by sequestering Mmi1 and thereby
    blocking their Mmi1/MTREC/exosome-mediated destruction. The existing GO term
    mRNA stabilization (GO:0048255) captures this biological process and would be
    an appropriate, specific BP annotation for Mei2 based on direct experimental
    evidence.
  rationale: >-
    Mei2's defining downstream effect is the stabilization (prevention of
    degradation) of meiosis-specific transcripts; this is currently only captured
    indirectly via protein sequestering activity and positive regulation of the
    meiotic cell cycle.
  supported_by:
  - reference_id: PMID:22144909
    supporting_text: >-
      The RRM-type RNA-binding protein Mei2 is a master regulator of meiosis in
      fission yeast, in which it stabilizes meiosis-specific mRNAs by blocking
      their destruction.
    reference_section_type: ABSTRACT
suggested_questions:
- question: >-
    What is the precise molecular mechanism by which the Mei2-meiRNA dot
    inactivates Mmi1 - is sequestration alone sufficient, or are additional
    activities (e.g., conformational or post-translational changes to Mmi1)
    required?
- question: >-
    Beyond stabilizing meiotic mRNAs by antagonizing Mmi1, does Mei2 have a
    distinct, direct activity that promotes premeiotic DNA synthesis and meiosis
    I, as suggested by the fact that inactivating Mmi1 alone does not trigger the
    full meiotic program?
- question: >-
    How are the nuclear (meiosis-switch/Mmi1-antagonism) and cytosolic
    (P-body/translational-repression) pools of Mei2 functionally and temporally
    coordinated during the gamete-to-zygote transition?
- question: >-
    What are the full repertoires of RNA targets bound by Mei2 RRM3 in vivo
    (beyond meiRNA, mamRNA, and omt3), and which are functionally important?
suggested_experiments:
- description: >-
    Transcriptome-wide CLIP-seq / iCLIP of endogenous Mei2 in vegetative,
    meiotic, and zygotic cells to define its in vivo RNA-binding landscape and
    distinguish nuclear versus cytosolic targets.
- description: >-
    Separation-of-function and compartment-restricted alleles (nuclear-only vs
    cytosol-only Mei2) combined with phenotypic and RNA-stability assays to
    dissect which Mei2 functions require which subcellular pool.
- description: >-
    Quantitative single-molecule imaging of Mei2, meiRNA, and Mmi1 during the
    mitosis-to-meiosis transition to determine the stoichiometry and dynamics of
    Mmi1 sequestration in the Mei2 dot.
- description: >-
    Ribosome profiling in zygotes expressing wild-type versus RNA-binding-defective
    (e.g., F644A) Mei2 to define the set of mRNAs whose translation is repressed
    by cytosolic/P-body Mei2.
