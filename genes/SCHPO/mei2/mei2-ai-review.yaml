      motifs, whereas Mei2 interacts preferentially with the 5′ region of
      meiRNA-L.
    reference_section_type: RESULTS
- id: PMID:30089908
  title: Gamete fusion triggers bipartite transcription factor assembly to block re-fertilization.
  findings:
  - statement: >-
      Gamete fusion triggers a signalling cascade (sharing components with meiotic
      induction) that blocks re-fertilization and induces meiosis.
    supported_by: []
    supporting_text: >-
      a cytoplasmic connection upon gamete fusion leads to asymmetric
      reconstitution of a bipartite transcription factor to rapidly block
      re-fertilization and induce meiosis, ensuring genome maintenance during
      sexual reproduction.
    reference_section_type: ABSTRACT
- id: PMID:31533287
  title: meiRNA, A Polyvalent Player in Fission Yeast Meiosis.
  findings:
  - statement: >-
      Mei2 is a nucleocytoplasmic shuttling RNA-binding protein and the molecular
      switch for meiosis; with meiRNA it forms the Mei2 dot.
    supported_by: []
    supporting_text: >-
      Forced expression of an unphosphorylated active form of Mei2 leads to
      induction of the whole process of meiosis even in haploid cells under
      nutrient rich conditions, indicating that Mei2 is a molecular switch to
      turn on meiosis.
    reference_section_type: RESULTS
- id: PMID:33536434
  title: A scaffold lncRNA shapes the mitosis to meiosis switch.
  findings:
  - statement: >-
      The lncRNA mamRNA scaffolds Mmi1 and Mei2 to enforce their reciprocal
      inhibition; Mei2 RRM3 binds poly-U RNA with 1:1 stoichiometry.
    supported_by: []
    supporting_text: >-
      this regulatory RNA, termed mamRNA, scaffolds the antagonistic RNA-binding
      proteins Mmi1 and Mei2 to ensure their reciprocal inhibition and fine tune
      meiotic mRNA degradation during mitotic growth.
    reference_section_type: ABSTRACT
- id: PMID:35512546
  title: Structural insights reveal the specific recognition of meiRNA by the Mei2
    protein.
  findings:
  - statement: >-
      Mei2 RRM3 is necessary and sufficient for meiRNA binding and recognizes a
      U-rich UUC(U) motif; the F644A mutation abolishes binding and causes
      defective karyogamy and fewer zygotes.
    supported_by: []
    supporting_text: >-
      a structure-based Mei2 mutation, Mei2F644A causes defective karyogamy,
      suggesting an essential role of the RNA-binding ability of Mei2 in
      regulating meiosis.
    reference_section_type: ABSTRACT
  - statement: Mei2 RRM3 is necessary and sufficient for meiRNA binding; RRM1-RRM2 do not bind meiRNA.
    supported_by: []
    supporting_text: >-
      Mei2 RRM1-RRM2 plays a dispensable role in the Mei2-meiRNA interaction, and
      Mei2 RRM3 is necessary and sufficient for Mei2 to interact with meiRNA.
    reference_section_type: RESULTS
- id: PMID:41298081
  title: Gamete fusion triggers cytosolic functions and P-body recruitment of the
    RNA-binding protein Mei2 to drive fission yeast zygotic development.
  findings:
  - statement: >-
      Cytosolic Mei2 is a zygote-specific P-body component that represses
      translation of tethered mRNAs to arrest mitotic growth and drive zygotic
      development; recruitment depends on the Mei2 RNA-binding domain and is
      blocked by Pat1 phosphorylation.
