id: P08965
gene_symbol: mei2
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:284812
  label: Schizosaccharomyces pombe (strain 972 / ATCC 24843)
description: >-
  Mei2 is the master RNA-binding regulator of meiosis in the fission yeast
  Schizosaccharomyces pombe. It is an RRM-domain protein (three RRMs; the
  C-terminal RRM3 is necessary and sufficient for RNA binding) that binds the
  meiosis-specific long non-coding RNA meiRNA (encoded by sme2) through a U-rich
  motif and accumulates with it as a single nuclear body, the "Mei2 dot," at the
  sme2 chromosomal locus. Mei2 is essential both for premeiotic DNA synthesis and
  for entry into the first meiotic division (meiosis I). Accumulation of the
  unphosphorylated, active form of Mei2 acts as the molecular switch that commits
  cells from the mitotic to the meiotic cell cycle, and its activity reinforces
  meiotic commitment. A central role of Mei2 is to antagonize the Mmi1/MTREC
  selective-elimination system: by sequestering the YTH-family protein Mmi1 into
  the dot (together with meiRNA), Mei2 stabilizes meiosis-specific mRNAs that
  would otherwise be degraded by the nuclear exosome during vegetative growth.
  Mei2 shuttles between cytoplasm and nucleus; in zygotes it is also recruited to
  cytoplasmic P-bodies where it represses translation of target mRNAs and drives
  zygotic development. Mei2 is held inactive during vegetative growth by Pat1(Ran1)
  kinase phosphorylation, by 14-3-3 (Rad24) binding to the phosphorylated form, and
  by TORC1/Tor2-dependent phosphorylation that targets it for ubiquitin-proteasomal
  degradation.
