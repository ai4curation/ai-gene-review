id: Q01112
gene_symbol: cdc42
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:284812
  label: Schizosaccharomyces pombe (strain 972 / ATCC 24843)
description: >-
  Cdc42 is an essential Rho-family small GTPase that is the master regulator of
  cell polarity and polarized (tip) growth in fission yeast. It cycles between an
  inactive GDP-bound and an active GTP-bound state; activation is catalyzed by the
  guanine nucleotide exchange factors Scd1 (local, tip-associated) and Gef1
  (global), and inactivation is accelerated by GTPase-activating proteins such as
  Rga4. In its GTP-bound state Cdc42 binds and activates CRIB-domain effectors,
  including the p21-activated kinases Shk1/Pak1/Orb2 and Shk2/Pak2, the scaffold
  Scd2, and the formin For3, thereby organizing the actin cytoskeleton, polarized
  exocytosis (via the exocyst and delivery of glucan synthases Bgs1/Bgs4), and
  establishment of cell polarity. Active Cdc42 forms self-organizing zones that
  oscillate between cell tips to drive bipolar growth and set cell width, and is
  recruited to the cell division site where it coordinates cytokinesis and
  restrains premature Rho1 activation. During sexual reproduction Cdc42 explores
  the cell periphery for mate selection and is required for shmoo (mating
  projection) formation and cell-cell fusion. Cdc42 is geranylgeranylated at its
  C-terminal CAAX cysteine, which anchors it to the cytoplasmic face of the plasma
  membrane, concentrating at growing cell tips and the division site.
references:
- id: GO_REF:0000002
  title: Gene Ontology annotation through association of InterPro records with GO
    terms
  findings:
  - statement: >-
      InterPro2GO mapping assigns Cdc42 generic small-GTPase molecular functions
      (GTP binding, GTPase activity) and small GTPase-mediated signal transduction
      based on Rho-family domain signatures. These are correct generic functions
      for Cdc42.
- id: GO_REF:0000003
  title: Gene Ontology annotation based on Enzyme Commission mapping
  findings:
  - statement: >-
      EC-to-GO mapping assigned 'G protein activity' (GO:0003925) via EC 3.6.5.2. This is
      appropriate: GO:0003925 is the general molecular-switch function (GTP/GDP cycling +
      effector binding) whose narrow synonyms include "small monomeric GTPase activity",
      and EC 3.6.5.2 (small monomeric GTPase) maps to it. It correctly applies to the
      Rho-family GTPase Cdc42 and overlaps with the GTPase activity (GO:0003924)
      annotation.
- id: GO_REF:0000033
  title: Annotation inferences using phylogenetic trees
  findings:
  - statement: >-
      Phylogenetic (PANTHER) inference assigns conserved Cdc42/Rho functions:
      actin filament organization, establishment of cell polarity, endocytosis,
      and protein kinase (PAK) binding, all of which are independently supported by
      direct fission yeast experiments.
- id: GO_REF:0000044
  title: Gene Ontology annotation based on UniProtKB/Swiss-Prot Subcellular Location
    vocabulary mapping, accompanied by conservative changes to GO terms applied by
    UniProt
  findings:
  - statement: >-
      Maps UniProt subcellular location (cell membrane, lipid anchor) to plasma
      membrane; consistent with prenylation-dependent membrane localization.
- id: GO_REF:0000117
  title: Electronic Gene Ontology annotations created by ARBA machine learning models
  findings:
  - statement: >-
      ARBA machine-learning annotations recapitulate experimentally supported
      localizations (cell tip, site of polarized growth, plasma membrane) and
      establishment of cell polarity.
- id: PMID:10961446
  title: The Cdc42p GTPase is targeted to the site of cell division in the fission
    yeast Schizosaccharomyces pombe.
  findings:
  - statement: >-
      Functional GFP-Cdc42p localizes to the medial cell-division site during
      cytokinesis and to the cell periphery and internal membranes; medial
      localization depends on the actin cytoskeleton and the actomyosin ring.
    reference_section_type: ABSTRACT
- id: PMID:12529446
  title: Gef1p, a new guanine nucleotide exchange factor for Cdc42p, regulates polarity
    in Schizosaccharomyces pombe.
  findings:
  - statement: >-
      Gef1p is a Cdc42-specific GEF that binds inactive Cdc42p and stimulates its
      guanine nucleotide exchange in vitro; gef1 and scd1 share an essential
      Cdc42-activating function.
    reference_section_type: ABSTRACT
- id: PMID:12972551
  title: Gef1p and Scd1p, the Two GDP-GTP exchange factors for Cdc42p, form a ring
    structure that shrinks during cytokinesis in Schizosaccharomyces pombe.
  findings:
  - statement: >-
      Cdc42p is essential for proliferation and rod-shaped morphology; the two
      GEFs Gef1p and Scd1p form a ring at the division site that recruits active
      Cdc42p to the septation site during cytokinesis.
    reference_section_type: ABSTRACT
- id: PMID:17363901
  title: Hob3p, the fission yeast ortholog of human BIN3, localizes Cdc42p to the
    division site and regulates cytokinesis.
  findings:
  - statement: >-
      Hob3p (BAR-domain protein) interacts directly with Cdc42p and is required to
      recruit and concentrate Cdc42p at the cell division site for cytokinesis.
    reference_section_type: ABSTRACT
- id: PMID:18328707
  title: Pom1 DYRK regulates localization of the Rga4 GAP to ensure bipolar activation
    of Cdc42 in fission yeast.
  findings:
  - statement: >-
      GTP-bound active Cdc42 (CRIB-GFP) is concentrated at growing cell ends with
      F-actin, where the GAP Rga4 is excluded; bipolar Cdc42 activation requires
      Pom1-dependent Rga4 localization. GTP-Cdc42 binds CRIB-domain effectors
      including PAKs and WASp.
    reference_section_type: RESULTS
- id: PMID:18793338
  title: Rga2 is a Rho2 GAP that regulates morphogenesis and cell integrity in S.
    pombe.
  findings:
  - statement: >-
      This study characterizes Rga2 as a GAP for Rho2 (not Cdc42); it does not
      directly assay Cdc42 intrinsic GTPase activity.
    reference_section_type: ABSTRACT
- id: PMID:19646873
  title: The conserved NDR kinase Orb6 controls polarized cell growth by spatial regulation
    of the small GTPase Cdc42.
  findings:
  - statement: >-
      Orb6 NDR kinase spatially restricts Cdc42 (and Cdc42-dependent For3 and GEF
      Gef1) to cell tips; loss of Orb6 activity causes lateral cortex localization
      of Cdc42 and increased cell diameter.
    reference_section_type: ABSTRACT
- id: PMID:20870879
  title: Reorganization of the growth pattern of Schizosaccharomyces pombe in invasive
    filament formation.
  findings:
  - statement: >-
      In invasive filaments, activated Cdc42 (with Spo20, Bgs4, Crn1) becomes
      concentrated at the single growing cell tip.
    reference_section_type: ABSTRACT
- id: PMID:21849474
  title: Spatial control of Cdc42 activation determines cell width in fission yeast.
  findings:
  - statement: >-
      The GAP Rga4 (cell sides) and GEF Scd1 (cell tips) establish a gradient of
      activated Cdc42 at the tip plasma membrane that determines growth-zone size
      and normal cell width. Small GTPases are switches with intrinsic GTP
      hydrolysis facilitated by GAPs.
    reference_section_type: RESULTS
- id: PMID:21899677
  title: Cdc42 regulates multiple membrane traffic events in fission yeast.
  findings:
  - statement: >-
      A cdc42L160S thermosensitive allele has actin-independent membrane traffic
      defects: decreased acid phosphatase secretion, vesicle accumulation, vacuole
      fragmentation, and exocyst mislocalization, indicating Cdc42 regulates
      polarized secretion and vesicle fusion.
    reference_section_type: ABSTRACT
- id: PMID:23060961
  title: Cdc42 regulation of polarized traffic in fission yeast.
  findings:
  - statement: >-
      Cdc42 is required for exocyst function and for correct transport/recycling
      of the glucan synthases Bgs1 and Bgs4 to the plasma membrane at cell tips.
    reference_section_type: ABSTRACT
- id: PMID:23200991
  title: Cdc42 explores the cell periphery for mate selection in fission yeast.
  findings:
  - statement: >-
      Under low-level pheromone signaling, active Cdc42 with GEF Scd1 and scaffold
      Scd2 form dynamic colocalizing zones (cortical polarity patches) that sample
      the cell periphery to orient growth toward a mating partner at the mating
      projection tip.
    reference_section_type: ABSTRACT
- id: PMID:24146635
  title: Hsp70-Hsp40 chaperone complex functions in controlling polarized growth by
    repressing Hsf1-driven heat stress-associated transcription.
  findings:
  - statement: >-
      Thermal stress transiently decreases Cdc42 activity and induces monopolar
      growth; under these conditions Cdc42 activity at the lateral/growing cortex
      is altered.
    reference_section_type: ABSTRACT
- id: PMID:24147005
  title: The coordination of cell growth during fission yeast mating requires Ras1-GTP
    hydrolysis.
  findings:
  - statement: >-
      During mating, Ras1-GTP hydrolysis is required to coordinate active Cdc42
      into a single growth zone; hyperactive Ras1 causes disorganized Cdc42 and
      actin and elongation from multiple tips, supporting Cdc42's role in mating
      projection assembly.
    reference_section_type: ABSTRACT
- id: PMID:25837586
  title: Spontaneous Cdc42 polarization independent of GDI-mediated extraction and
    actin-based trafficking.
  findings:
  - statement: >-
      A functional internally tagged Cdc42 (mCherry/sfGFP sandwich) is enriched at
      cell tips and division sites, present along cell sides and on internal
      (nuclear, vacuolar) membranes, and is trafficked on exocytic vesicles
      (accumulates sub-apically upon Sec8 depletion). CAAX-mediated membrane
      targeting is essential; Cdc42-GTP shows slower membrane mobility, consistent
      with positive-feedback accumulation at sites of activity.
    reference_section_type: RESULTS
- id: PMID:26941334
  title: Unique spatiotemporal activation pattern of Cdc42 by Gef1 and Scd1 promotes
    different events during cytokinesis.
  findings:
  - statement: >-
      Cdc42 localizes to the cell division site/cleavage furrow and is activated
      with distinct spatiotemporal pattern in cytokinesis - Gef1-dependent before
      ring constriction (promoting timely constriction) and Scd1-dependent after
      (promoting septum formation).
    reference_section_type: ABSTRACT
- id: PMID:29930085
  title: Local and global Cdc42 guanine nucleotide exchange factors for fission yeast
    cell polarity are coordinated by microtubules and the Tea1-Tea4-Pom1 axis.
  findings:
  - statement: >-
      Active Cdc42 localizes to the cell cortex and the mitotic actomyosin ring;
      the two GEFs Scd1 (local, membrane-associated) and Gef1 (global, cytosolic)
      are coordinated via microtubules and the Tea1-Tea4-Pom1/Rga4 axis.
    reference_section_type: RESULTS
- id: PMID:31719163
  title: A novel interplay between GEFs orchestrates Cdc42 activity during cell polarity
    and cytokinesis in fission yeast.
  findings:
  - statement: >-
      A Cdc42 feedforward pathway in which active Cdc42 recruits the scaffold Scd2
      (and thereby Scd1) underlies GEF interplay during polarity and cytokinesis,
      illustrating Cdc42's role as a signaling hub/adaptor coordinating its own
      activators.
    reference_section_type: ABSTRACT
- id: PMID:37039135
  title: Cdc42 prevents precocious Rho1 activation during cytokinesis in a Pak1-dependent
    manner.
  findings:
  - statement: >-
      Active Cdc42 at the division site prevents early (precocious) Rho1
      activation during cytokinesis through its effector kinase Pak1, coordinating
      timely septum formation.
    reference_section_type: ABSTRACT
- id: PMID:41855172
  title: Distinct Cdc42 protein levels differentially regulate polarized growth and
    cell fusion in Schizosaccharomyces pombe.
  findings:
  - statement: >-
      Cdc42 functions in cell-cell fusion (cytogamy) during sexual reproduction,
      concentrating at the mating projection tip/fusion site; mating and fusion
      require higher Cdc42 protein levels than mitotic polarized growth.
    reference_section_type: ABSTRACT
- id: PMID:7597098
  title: Shk1, a homolog of the Saccharomyces cerevisiae Ste20 and mammalian p65PAK
    protein kinases, is a component of a Ras/Cdc42 signaling module in the fission
    yeast Schizosaccharomyces pombe.
  findings:
  - statement: >-
      The PAK kinase Shk1 (Pak1) physically and functionally interacts with Cdc42,
      forming a Ras/Cdc42 signaling module required for normal morphology and
      mating.
    reference_section_type: ABSTRACT
- id: PMID:7923372
  title: Cooperative interaction of S. pombe proteins required for mating and morphogenesis.
  findings:
  - statement: >-
      Scd1, Scd2, Cdc42, and GTP-bound Ras1 act cooperatively to form a protein
      complex; Scd2 binds both Scd1 and Cdc42. This pathway is required for mating
      and cell morphology (establishment of polarity / mating projection).
    reference_section_type: ABSTRACT
- id: PMID:8289788
  title: Cdc42p GTPase is involved in controlling polarized cell growth in Schizosaccharomyces
    pombe.
  findings:
  - statement: >-
      cdc42+ is essential; null cells arrest as small, round, dense cells, and
      GTP-binding-domain mutants give large misshapen cells, establishing Cdc42 as
      a controller of polarized cell growth. The protein partitions between soluble
      and particulate (membrane) pools.
    reference_section_type: ABSTRACT
- id: PMID:8887550
  title: Rho 1 GTPase activates the (1-3)beta-D-glucan synthase and is involved in
    Schizosaccharomyces pombe morphogenesis.
  findings:
  - statement: >-
      Rho1, not Cdc42, directly activates (1-3)beta-D-glucan synthase; neither
      cdc42+ nor constitutively active cdc42 (V12G, Q61L) alleles affect glucan
      synthase activity when overexpressed. Thus Cdc42's link to beta-glucan
      biosynthesis is indirect at best.
    reference_section_type: ABSTRACT
- id: PMID:8943016
  title: The highly conserved skb1 gene encodes a protein that interacts with Shk1,
    a fission yeast Ste20/PAK homolog.
  findings:
  - statement: >-
      Shk1 (Pak1), Cdc42, and Skb1 form a ternary complex in vivo, with Skb1
      binding an Shk1 region distinct from the Cdc42-binding site.
    reference_section_type: ABSTRACT
- id: PMID:9660817
  title: Cloning and characterization of shk2, a gene encoding a novel p21-activated
    protein kinase from fission yeast.
  findings:
  - statement: >-
      Shk2 (Pak2) is a PAK that binds Cdc42 in vivo and in vitro and participates
      with Cdc42 in Ras-dependent morphological control and mating-response
      pathways.
    reference_section_type: ABSTRACT
- id: PMID:9660818
  title: Characterization of Pak2p, a pleckstrin homology domain-containing, p21-activated
    protein kinase from fission yeast.
  findings:
  - statement: >-
      Pak2p is a p21-activated kinase whose membrane localization and biological
      activity depend in part on its interaction with Cdc42p, consistent with
      Cdc42 functioning as an activator of PAK kinases.
    reference_section_type: ABSTRACT
existing_annotations:
- term:
    id: GO:0007015
    label: actin filament organization
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: involved_in
  review:
    summary: >-
      Organization of the actin cytoskeleton is a core, conserved Cdc42 function.
      In fission yeast active Cdc42 at cell tips is accompanied by developed
      F-actin and acts through the formin For3 and PAK effectors to polarize actin.
    action: ACCEPT
    reason: >-
      Well supported by phylogenetic inference and direct fission yeast evidence
      that Cdc42 organizes tip F-actin via For3/PAK effectors.
    supported_by:
    - reference_id: PMID:18328707
      supporting_text: >-
        GTP-bound, active Cdc42 is concentrated to growing cell ends accompanied
        by developed F-actin structures, where the Rga4 GAP is excluded.
      reference_section_type: RESULTS
- term:
    id: GO:0030010
    label: establishment of cell polarity
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: involved_in
  review:
    summary: >-
      Establishment of cell polarity is the central function of Cdc42 in fission
      yeast, supported by both phylogenetic inference and direct experimental data
      (essential gene controlling polarized growth).
    action: ACCEPT
    reason: Core conserved function, independently supported by IMP evidence below.
    supported_by:
    - reference_id: PMID:8289788
      supporting_text: >-
        the cdc42 mutants did exhibit an abnormal morphological phenotype of
        large, misshapen cells, suggesting that S. pombe Cdc42p is involved in
        controlling polarized cell growth
      reference_section_type: ABSTRACT
- term:
    id: GO:0006897
    label: endocytosis
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: involved_in
  review:
    summary: >-
      Cdc42 has conserved roles in endocytosis and is implicated in endocytic
      recycling in fission yeast. Retain as a genuine but non-core process for the
      pombe gene (its dominant role is polarity/tip growth).
    action: KEEP_AS_NON_CORE
    reason: >-
      Phylogenetically conserved; fission yeast Cdc42 affects endosome recycling
      and membrane traffic, though endocytosis per se is a secondary role.
    supported_by:
    - reference_id: PMID:21899677
      supporting_text: >-
        Cdc42 and the scaffold Pob1 are required for membrane trafficking and
        fusion, contributing to polarized secretion, endosome recycling, vacuole
        formation and growth
      reference_section_type: ABSTRACT
- term:
    id: GO:0019901
    label: protein kinase binding
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: enables
  review:
    summary: >-
      Cdc42 binds and activates CRIB-domain PAK kinases (Shk1/Pak1 and Shk2/Pak2)
      in fission yeast. 'Protein kinase binding' is correct but generic; the more
      informative function is its activator activity toward these kinases.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      The binding is real and conserved, but a more informative term (protein
      serine/threonine kinase activator activity) is annotated separately and
      better captures the function.
    supported_by:
    - reference_id: PMID:7597098
      supporting_text: >-
        We provide genetic evidence for physical and functional interaction
        between Shk1 and the Cdc42 GTP-binding protein required for normal cell
        morphology and mating in S. pombe.
      reference_section_type: ABSTRACT
- term:
    id: GO:0003924
    label: GTPase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: >-
      Cdc42 is a Rho-family small GTPase with intrinsic GTP hydrolysis activity
      (the molecular-switch core function), facilitated by GAPs. This is the
      central molecular function.
    action: ACCEPT
    reason: Core molecular function, supported by InterPro and the GEF/GAP literature.
    supported_by:
    - reference_id: PMID:21849474
      supporting_text: >-
        They have intrinsic GTPase activity and can hydrolyze GTP to GDP, but this
        hydrolysis is usually inefficient. It is facilitated when the small GTPase
        binds to a GTPase-activating protein (GAP)
      reference_section_type: INTRODUCTION
- term:
    id: GO:0003925
    label: G protein activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000003
  qualifier: enables
  review:
    summary: >-
      'G protein activity' (GO:0003925) was assigned by EC mapping (EC 3.6.5.2). Despite
      the historical name, GO:0003925 is the general "molecular switch" function that
      cycles between active GTP-bound and inactive GDP-bound states and binds effectors;
      its narrow synonyms explicitly include "small monomeric GTPase activity" and "Ras
      superfamily protein", and EC 3.6.5.2 (small monomeric GTPase) maps to it. It
      therefore correctly applies to Cdc42, capturing the GTP/GDP molecular-switch
      behaviour that is central to Cdc42 function. It overlaps with the separately
      annotated GTPase activity (GO:0003924).
    action: KEEP_AS_NON_CORE
    reason: >-
      Correct term: GO:0003925 covers small monomeric GTPases (EC 3.6.5.2), so it is
      valid for Cdc42 and captures its molecular-switch behaviour. Kept as non-core only
      because it overlaps with the GTPase activity (GO:0003924) annotation. (An earlier
      REMOVE call claiming this term is exclusive to heterotrimeric G proteins was
      incorrect.)
    supported_by:
    - reference_id: PMID:21849474
      supporting_text: >-
        They have intrinsic GTPase activity and can hydrolyze GTP to GDP, but this
        hydrolysis is usually inefficient.
      reference_section_type: INTRODUCTION
- term:
    id: GO:0005525
    label: GTP binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: >-
      GTP binding is a core molecular function; Cdc42 has canonical P-loop GTP/GDP
      binding motifs and cycles between GTP- and GDP-bound states.
    action: ACCEPT
    reason: Core conserved function; supported by sequence motifs and the switch mechanism.
    supported_by:
    - reference_id: PMID:18328707
      supporting_text: >-
        the GTP-bound form of Cdc42 binds and activates a group of proteins with
        the CRIB (Cdc42/Rac-interactive binding) domain
      reference_section_type: INTRODUCTION
- term:
    id: GO:0005886
    label: plasma membrane
  evidence_type: IEA
  original_reference_id: GO_REF:0000044
  qualifier: located_in
  review:
    summary: >-
      Cdc42 is prenyl-anchored to the cytoplasmic face of the plasma membrane,
      concentrating at cell tips and the division site. Plasma membrane
      localization is correct and core.
    action: ACCEPT
    reason: Supported by direct localization of functional tagged Cdc42 and prenylation requirement.
    supported_by:
    - reference_id: PMID:25837586
      supporting_text: >-
        Cdc42-mCherrySW was enriched at the cell tips and division sites.
      reference_section_type: RESULTS
- term:
    id: GO:0005938
    label: cell cortex
  evidence_type: IEA
  original_reference_id: GO_REF:0000117
  qualifier: located_in
  review:
    summary: >-
      Cdc42 localizes to the cell cortex (the cytoplasmic face of the plasma
      membrane and associated cortical structures), consistent with direct IDA
      evidence below.
    action: ACCEPT
    reason: Supported by direct cortical localization evidence.
    supported_by:
    - reference_id: PMID:29930085
      supporting_text: >-
        Active Cdc42 localizes to the cell cortex and the mitotic actomyosin ring
      reference_section_type: RESULTS
- term:
    id: GO:0007264
    label: small GTPase-mediated signal transduction
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: involved_in
  review:
    summary: >-
      Cdc42 is the prototypical small GTPase switch transducing signals to
      cytoskeletal and polarity effectors; this is a correct core process term.
    action: ACCEPT
    reason: Core conserved process for a Rho-family GTPase; well supported.
    supported_by:
    - reference_id: PMID:7597098
      supporting_text: >-
        signaling modules composed of small GTP-binding proteins and protein
        kinases related to Shk1, Ste20, and p65PAK, are highly conserved in
        evolution and participate in both cytoskeletal functions and
        mitogen-activated protein kinase signaling pathways
      reference_section_type: ABSTRACT
- term:
    id: GO:0012505
    label: endomembrane system
  evidence_type: IEA
  original_reference_id: GO_REF:0000117
  qualifier: located_in
  review:
    summary: >-
      Cdc42 is present on internal/endomembranes (nuclear and vacuolar membranes,
      exocytic vesicles) in addition to the plasma membrane, consistent with its
      trafficking through the secretory pathway. A broad but accurate localization.
    action: KEEP_AS_NON_CORE
    reason: >-
      Supported by direct imaging of internal membranes; the functionally
      important site is the plasma membrane of the cell tip, so endomembrane is non-core.
    supported_by:
    - reference_id: PMID:25837586
      supporting_text: >-
        Significant levels of Cdc42-mCherrySW were also found along the cell sides
        and on internal membranes including the nuclear and presumably vacuolar
        membranes.
      reference_section_type: RESULTS
- term:
    id: GO:0016020
    label: membrane
  evidence_type: IEA
  original_reference_id: GO_REF:0000117
  qualifier: located_in
  review:
    summary: >-
      'Membrane' is a high-level parent of the experimentally supported plasma
      membrane localization and is uninformative on its own.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      Redundant generic parent term; the specific plasma membrane / cell tip
      membrane terms are annotated and preferred.
    supported_by:
    - reference_id: PMID:25837586
      supporting_text: >-
        removal of the CAAX sequence yielded a diffuse, non-functional Cdc42
        allele unable to complement the cdc42-1625 temperature-sensitive mutant
      reference_section_type: RESULTS
- term:
    id: GO:0030010
    label: establishment of cell polarity
  evidence_type: IEA
  original_reference_id: GO_REF:0000117
  qualifier: involved_in
  review:
    summary: >-
      Duplicate of the establishment of cell polarity annotation (also IBA and
      IMP). Core function; accept.
    action: ACCEPT
    reason: Redundant with IMP/IBA annotations of the same core function.
    supported_by:
    - reference_id: PMID:8289788
      supporting_text: >-
        S. pombe Cdc42p is involved in controlling polarized cell growth
      reference_section_type: ABSTRACT
- term:
    id: GO:0030427
    label: site of polarized growth
  evidence_type: IEA
  original_reference_id: GO_REF:0000117
  qualifier: located_in
  review:
    summary: >-
      Cdc42 localizes to and acts at the site of polarized growth (cell tips).
