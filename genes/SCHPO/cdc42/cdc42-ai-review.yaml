core_functions:
- description: >-
    Acts as a GTP/GDP-regulated molecular switch (Rho-family small GTPase): binds
    GTP and GDP and hydrolyzes GTP (intrinsic GTPase activity accelerated by GAPs),
    cycling between active and inactive states to control downstream effectors.
  supported_by:
  - reference_id: PMID:21849474
    supporting_text: >-
      They have intrinsic GTPase activity and can hydrolyze GTP to GDP, but this
      hydrolysis is usually inefficient. It is facilitated when the small GTPase
      binds to a GTPase-activating protein (GAP)
    reference_section_type: INTRODUCTION
  molecular_function:
    id: GO:0003924
    label: GTPase activity
- description: >-
    Establishes and regulates cell polarity and polarized (bipolar tip) growth by
    forming zones of active GTP-Cdc42 at the cell-tip plasma membrane that organize
    the actin cytoskeleton (via the formin For3) and recruit PAK effectors,
    determining growth-zone size and cell width.
  supported_by:
  - reference_id: PMID:21849474
    supporting_text: >-
      the GAP Rga4 and the GEF Scd1 establish a gradient of activated Cdc42 within
      the cellular tip plasma membrane, and it is this gradient that determines cell
      growth-zone size and normal cell width
    reference_section_type: ABSTRACT
  - reference_id: PMID:8289788
    supporting_text: >-
      S. pombe Cdc42p is involved in controlling polarized cell growth
    reference_section_type: ABSTRACT
  molecular_function:
    id: GO:0003924
    label: GTPase activity
  directly_involved_in:
    id: GO:0030010
    label: establishment of cell polarity
  locations:
  - id: GO:0031520
    label: plasma membrane of cell tip
- description: >-
    Binds and activates CRIB-domain PAK serine/threonine kinases (Shk1/Pak1,
    Shk2/Pak2) as a core effector-activation function downstream of GTP loading.
  supported_by:
  - reference_id: PMID:9660818
    supporting_text: >-
      the membrane localization of Pak2p, directed by its interactions with
      membrane lipids and Cdc42p, is critical to its biological activity
    reference_section_type: ABSTRACT
  molecular_function:
    id: GO:0043539
    label: protein serine/threonine kinase activator activity
- description: >-
    Localizes to the cell division site and contributes to cytokinesis - it is
    recruited via Gef1/Scd1 GEFs and Hob3, helps recruit septum-building enzymes
    (Bgs1), and through its effector Pak1 prevents precocious Rho1 activation to
    coordinate timely septum formation.
  supported_by:
  - reference_id: PMID:37039135
    supporting_text: >-
      We show that Cdc42 prevents early Rho1 activation during fission yeast
      cytokinesis.
    reference_section_type: ABSTRACT
  - reference_id: PMID:26941334
    supporting_text: >-
      Cdc42 promotes cytokinesis via a unique spatiotemporal activation pattern due
      to the distinct action of its GEFs, Gef1 and Scd1
    reference_section_type: ABSTRACT
  directly_involved_in:
    id: GO:0032955
    label: regulation of division septum assembly
  locations:
  - id: GO:0032153
    label: cell division site
proposed_new_terms: []
suggested_questions:
- question: >-
    What is the relative contribution of intrinsic versus GAP-stimulated GTP
    hydrolysis to spatial restriction of Cdc42 activity, and which GAP(s) besides
    Rga4 act on Cdc42 in vivo?
- question: >-
    How is the switch-like (all-or-none) response of mating/cell fusion to Cdc42
    protein levels, versus the linear response of mitotic growth, encoded
    molecularly?
suggested_experiments:
- description: >-
    Quantitative in vitro GTPase assays of purified S. pombe Cdc42 with and without
    candidate GAPs (e.g., Rga4) and GEFs (Scd1, Gef1) to directly measure intrinsic
    and stimulated nucleotide cycling rates for the fission yeast protein.
- description: >-
    Proximity-labeling (TurboID) of active versus inactive Cdc42 (using GTP- and
    GDP-locked alleles) at cell tips and the division site to define the
    state-specific effector interactome and distinguish core effectors from
    context-specific partners.
