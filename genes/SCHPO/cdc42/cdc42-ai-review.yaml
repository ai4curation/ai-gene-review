    action: ACCEPT
    reason: Supported by direct localization; redundant with IDA annotation.
    supported_by:
    - reference_id: PMID:25837586
      supporting_text: >-
        Cdc42-mCherrySW was enriched at the cell tips and division sites.
      reference_section_type: RESULTS
- term:
    id: GO:0051286
    label: cell tip
