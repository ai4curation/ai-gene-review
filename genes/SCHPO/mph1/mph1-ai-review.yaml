proposed_new_terms: []
suggested_questions:
- question: >-
    Does Mph1 phosphorylate any physiological tyrosine substrate in fission yeast, or
    is its tyrosine activity restricted to autophosphorylation, as the dual-specificity
    EC assignment would predict?
- question: >-
    What is the relative contribution of kinetochore-localized Mph1 (Spc7 MELT
    phosphorylation) versus nucleoplasmic Mph1 (direct Mad2/Mad3 phosphorylation) to
    establishing versus maintaining the checkpoint arrest?
- question: >-
    Is the meiosis I homolog non-disjunction phenotype of mph1Delta solely a
    consequence of a weakened SAC and precocious anaphase I, or does Mph1 contribute
    directly to the meikin/Bub1/Sgo1 cohesion-protection pathway?
suggested_experiments:
- description: >-
    Use analog-sensitive mph1 (or chemical Mps1 inhibition) combined with quantitative
    phosphoproteomics across synchronized mitosis to define the in vivo Mph1 substrate
    repertoire and distinguish kinetochore from nucleoplasmic targets.
- description: >-
    Reconstitute Mph1 with recombinant Spc7, Bub1-Bub3 and Mad1-Mad2 in vitro to test
    whether MELT phosphorylation is sufficient to assemble a functional checkpoint
    signaling module and to map the order of recruitment events.
- description: >-
    Separate Mph1 mitotic and meiotic functions using meiosis-specific depletion or
    separation-of-function alleles, and score homolog disjunction, Bub1/Sgo1 centromeric
    accumulation, and Rec8 cohesion protection in meiosis I.
