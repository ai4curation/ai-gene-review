- id: PMID:16823372
  title: ORFeome cloning and global analysis of protein localization in the fission
    yeast Schizosaccharomyces pombe.
  findings:
  - statement: Genome-wide YFP tagging localized Mph1 to the nucleus and cytosol.
    supporting_text: we determined the localization of 4,431 proteins, corresponding to approximately 90% of the fission yeast proteome, by tagging each ORF with the yellow fluorescent protein.
    reference_section_type: ABSTRACT
- id: PMID:22184248
  title: Centromere-tethered Mps1 pombe homolog (Mph1) kinase is a sufficient marker
    for recruitment of the spindle checkpoint protein Bub1, but not Mad1.
  findings:
  - statement: Kinetochore-localized Mph1 is sufficient to recruit Bub1 and to arrest cells in a checkpoint-dependent manner; Mad1 association requires an additional condition.
    supporting_text: We propose that Mph1 is a sufficient marker for recruitment of Bub1. Mad1, in contrast, requires an additional condition/component for stable association with kinetochores.
    reference_section_type: ABSTRACT
- id: PMID:22281223
  title: Kinase activity of fission yeast Mph1 is required for Mad2 and Mad3 to stably
    bind the anaphase promoting complex.
  findings:
  - statement: Mph1 is an active kinase (phosphorylates itself and Mad2 in vitro); D459A abolishes activity; kinase activity is required for the SAC and MCC-APC/C binding.
    supporting_text: a kinase-dead allele of the fission yeast MPS1 homolog (Mph1) is checkpoint defective and that levels of APC/C-associated Mad2 and Mad3 are dramatically reduced in this mutant.
    reference_section_type: ABSTRACT
  - statement: Mph1 has chromosome segregation functions independent of extrinsic spindle perturbation.
    supporting_text: These experiments demonstrate that Mph1 kinase has important chromosome segregation function(s), even when there are no extrinsic perturbations of spindle microtubules.
    reference_section_type: RESULTS
- id: PMID:22521786
  title: Phosphodependent recruitment of Bub1 and Bub3 to Spc7/KNL1 by Mph1 kinase
    maintains the spindle checkpoint.
  findings:
  - statement: Mph1 phosphorylates Spc7 MELT-motif threonines (e.g. T453, T507) to recruit Bub1-Bub3 to kinetochores and maintain the SAC.
    supporting_text: phosphorylation of the conserved MELT motifs in Spc7 by Mph1 (Mps1) recruits Bub1 and Bub3 to the kinetochore and that this is required to maintain the SAC signal.
    reference_section_type: ABSTRACT
- id: PMID:22660415
  title: MPS1/Mph1 phosphorylates the kinetochore protein KNL1/Spc7 to recruit SAC
    components.
  findings:
  - statement: Mph1 at unattached kinetochores phosphorylates Spc7 MELT repeats, creating a mark crucial for SAC activation and chromosome biorientation.
    supporting_text: MPS1/Mph1 kinase locating at the unattached kinetochores initially creates a mark, which is crucial for SAC activation and chromosome bi-orientation.
    reference_section_type: ABSTRACT
- id: PMID:22825872
  title: Mph1 kinetochore localization is crucial and upstream in the hierarchy of
    spindle assembly checkpoint protein recruitment to kinetochores.
  findings:
  - statement: Mph1 (with Ark1) is at the top of the kinetochore SAC recruitment hierarchy; loss of Mph1 kinetochore enrichment abolishes SAC signaling and forced recruitment restores it.
    supporting_text: a three-layered hierarchy with Ark1 and Mph1 on top, Bub1 and Bub3 in the middle, and Mad3 as well as the Mad1-Mad2 complex at the lower end of the hierarchy.
    reference_section_type: ABSTRACT
- id: PMID:23370392
  title: A knockout screen for protein kinases required for the proper meiotic segregation
    of chromosomes in the fission yeast Schizosaccharomyces pombe.
  findings:
  - statement: mph1Delta causes meiosis I homolog non-disjunction; Mph1 is required for efficient homolog disjunction during meiosis I.
    supporting_text: Mph1, a member of the Mps1 family of spindle assembly checkpoint kinases, is required to prevent meiosis I homolog non-disjunction.
    reference_section_type: ABSTRACT
- id: PMID:26882497
  title: Mps1Mph1 Kinase Phosphorylates Mad3 to Inhibit Cdc20Slp1-APC/C and Maintain
    Spindle Checkpoint Arrests.
  findings:
  - statement: Mad3 is a direct Mph1 substrate; Mph1-dependent modification of Mad3 and Mad2 stabilizes MCC-APC/C binding and maintains the checkpoint arrest.
    supporting_text: Mps1(Mph1) kinase-dependent modifications of Mad3 and Mad2 act in a concerted manner to maintain spindle checkpoint arrests.
    reference_section_type: ABSTRACT
- id: PMID:27618268
  title: Bub3-Bub1 Binding to Spc7/KNL1 Toggles the Spindle Checkpoint Switch by Licensing
    the Interaction of Bub1 with Mad1-Mad2.
  findings:
  - statement: Mph1 phosphorylates Spc7 MELT motifs to recruit Bub1/Bub3/Mad3; multisite Bub3 binding to the MELT array toggles the checkpoint by licensing Bub1-Mad1-Mad2 interaction.
    supporting_text: Mph1 (Mps1) phosphorylates multiple conserved MELT motifs in the Spc7 (Spc105/KNL1) protein to recruit Bub1, Bub3, and Mad3 (BubR1) to kinetochores
    reference_section_type: ABSTRACT
- id: PMID:28497540
  title: Meikin-associated polo-like kinase specifies Bub1 distribution in meiosis
    I.
  findings:
  - statement: In meiosis I, the meikin(Moa1)-Plo1 module phosphorylates Spc7 to accumulate Bub1 at kinetochores, supporting Sgo1-dependent centromeric cohesion protection.
    supporting_text: recruits Plo1 (polo-like kinase) to the kinetochores and phosphorylates Spc7 (KNL1) to accumulate Bub1
    reference_section_type: ABSTRACT
- id: PMID:9601094
  title: Mph1, a member of the Mps1-like family of dual specificity protein kinases,
    is required for the spindle checkpoint in S. pombe.
  findings:
  - statement: mph1 is a spindle checkpoint gene required for checkpoint activation in response to spindle defects, acting upstream of mad2; unlike S. cerevisiae Mps1 it is not required for SPB duplication.
    supporting_text: mph1 functions upstream of mad2, a previously characterized component of the spindle checkpoint.
    reference_section_type: ABSTRACT
