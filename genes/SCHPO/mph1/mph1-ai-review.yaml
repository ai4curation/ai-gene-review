      The same genome-wide study reported a cytosolic signal for Mph1. A soluble/cytoplasmic pool is
      plausible (only a fraction of Mph1 is kinetochore-bound at any time), but the functionally
      important pools are the kinetochore and nucleoplasm. Retained as non-core.
    action: KEEP_AS_NON_CORE
    reason: High-throughput cytosolic signal; plausible soluble pool but not the principal functional site.
    supported_by:
    - reference_id: PMID:16823372
      supporting_text: we determined the localization of 4,431 proteins, corresponding to approximately 90% of the fission yeast proteome, by tagging each ORF with the yellow fluorescent protein.
      reference_section_type: ABSTRACT
core_functions:
- description: >-
    Dual-specificity (predominantly Ser/Thr) protein kinase that, localized at
    unattached kinetochores, phosphorylates the Spc7/KNL1 MELT-motif threonines to
    create a phospho-mark that recruits the Bub1-Bub3 complex and downstream SAC
    proteins, thereby establishing the mitotic spindle assembly checkpoint signal.
  supported_by:
  - reference_id: PMID:22660415
    supporting_text: fission yeast Mph1 (MPS1 homologue) phosphorylates the kinetochore protein Spc7 (KNL1/Blinkin homologue) at the MELT repeat sequences. This phosphorylation promotes the in vitro binding to the Bub1-Bub3 complex, which is required for kinetochore-based SAC activation (Mad1-Mad2-Mad3 localization) and chromosome alignment.
    reference_section_type: ABSTRACT
  - reference_id: PMID:22521786
    supporting_text: phosphorylation of the conserved MELT motifs in Spc7 by Mph1 (Mps1) recruits Bub1 and Bub3 to the kinetochore and that this is required to maintain the SAC signal.
    reference_section_type: ABSTRACT
  molecular_function:
    id: GO:0004674
    label: protein serine/threonine kinase activity
  directly_involved_in:
    id: GO:0007094
    label: mitotic spindle assembly checkpoint signaling
  locations:
  - id: GO:0000776
    label: kinetochore
- description: >-
    Apical SAC kinase whose kinetochore localization is required and sufficient to
    initiate the checkpoint: tethering Mph1 to the kinetochore recruits Bub1 and
    imposes a checkpoint-dependent metaphase arrest, placing Mph1 at the top of the
    SAC protein recruitment hierarchy.
  supported_by:
  - reference_id: PMID:22825872
    supporting_text: An Mph1 mutant that eliminates kinetochore enrichment abolishes SAC signaling, whereas forced recruitment of this mutant to kinetochores restores SAC signaling.
    reference_section_type: ABSTRACT
  - reference_id: PMID:22184248
    supporting_text: localization of Mph1 at centromeres/kinetochores is sufficient to recruit Bub1
    reference_section_type: ABSTRACT
  directly_involved_in:
    id: GO:0034501
    label: protein localization to kinetochore
- description: >-
    Maintains the checkpoint arrest by directly phosphorylating the MCC components
    Mad2 and Mad3, stabilizing binding of the mitotic checkpoint complex to and
    inhibition of the Cdc20(Slp1)-APC/C, thereby delaying anaphase onset until
    biorientation is achieved.
  supported_by:
  - reference_id: PMID:22281223
    supporting_text: a kinase-dead allele of the fission yeast MPS1 homolog (Mph1) is checkpoint defective and that levels of APC/C-associated Mad2 and Mad3 are dramatically reduced in this mutant. Thus, MCC binding to fission yeast APC/C is dependent on Mph1 kinase activity.
    reference_section_type: ABSTRACT
  - reference_id: PMID:26882497
    supporting_text: Mps1(Mph1) kinase-dependent modifications of Mad3 and Mad2 act in a concerted manner to maintain spindle checkpoint arrests.
    reference_section_type: ABSTRACT
