gene_symbol: mph1
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:284812
  label: Schizosaccharomyces pombe (strain 972 / ATCC 24843)
description: >-
  Mph1 (Mps1p-like pombe homolog; also called Mps1) is the fission-yeast member of
  the Mps1 family of dual-specificity protein kinases and an apical kinase of the
  spindle assembly checkpoint (SAC). It localizes to kinetochores, becoming enriched
  at unattached/tensionless kinetochores during mitosis, where it phosphorylates the
  conserved MELT repeats of the outer-kinetochore scaffold Spc7 (KNL1/Blinkin
  homolog). MELT phosphorylation creates a docking mark that recruits the Bub1-Bub3
  complex and, downstream, Mad1-Mad2 and Mad3, generating the "wait-anaphase" signal
  that delays the metaphase-to-anaphase transition until all chromosomes are
  bioriented. Mph1 is the most upstream SAC protein in the kinetochore recruitment
  hierarchy (with Aurora B/Ark1), and tethering Mph1 to the kinetochore is sufficient
  to recruit Bub1 and to impose a checkpoint-dependent arrest. Mph1 kinase activity is
  also required for the mitotic checkpoint complex (Mad2-Mad3-Cdc20/Slp1) to bind and
  inhibit the anaphase-promoting complex (APC/C); Mph1 directly phosphorylates Mad2 and
  Mad3 to stabilize MCC-APC/C and maintain the arrest. Beyond the checkpoint, Mph1 is
  required for accurate chromosome biorientation and segregation, and mph1 deletion
  elevates chromosome loss even without spindle perturbation. Unlike S. cerevisiae
  Mps1, Mph1 is dispensable for spindle pole body duplication and for viability. Mph1
  also acts in meiosis I, where it is required to prevent homolog non-disjunction.
  (Note: this Mps1-family kinase is unrelated to the budding-yeast/human MPH1 DNA
  helicase.)
