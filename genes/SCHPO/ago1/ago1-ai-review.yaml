suggested_questions:
- question: >-
    Beyond constitutive heterochromatin, how broadly does Ago1-mediated co-transcriptional gene
    silencing regulate euchromatic stress-response and developmental genes under physiological
    conditions?
- question: >-
    What determines the partitioning of Ago1 between cytoplasmic siRNA-loading/slicing and
    nuclear chromatin-tethered silencing, and is this regulated across the cell cycle?
suggested_experiments:
- experiment: >-
    Genome-wide CLIP-seq (or eCLIP) of Ago1 to map the full repertoire of bound small RNAs and
    target transcripts, distinguishing constitutive (pericentric) from facultative and
    euchromatic targets.
- experiment: >-
    Separation-of-function analysis combining the slicer-dead (D580A) allele with degron-based
    nuclear vs cytoplasmic restriction of Ago1 to dissect which steps (loading, slicing,
    chromatin tethering) require each compartment.
