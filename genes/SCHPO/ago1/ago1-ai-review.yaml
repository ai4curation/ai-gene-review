id: O74957
gene_symbol: ago1
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:284812
  label: Schizosaccharomyces pombe (strain 972 / ATCC 24843)
description: >-
  Ago1 is the sole Argonaute protein of the fission yeast Schizosaccharomyces pombe and
  the catalytic core ("slicer") of the RNA interference (RNAi) machinery. The 834-residue
  protein has the canonical Argonaute architecture, including a PAZ domain (residues
  210-326) that anchors the 3' end of small RNAs and a PIWI domain (residues 500-799) that
  adopts an RNase H-like fold carrying the catalytic Asp-Asp-His triad (Asp580, Asp651,
  His788). Ago1 binds single-stranded small interfering RNAs (siRNAs, ~22 nt with 3' 2-nt
  overhangs) and uses them as sequence-specific guides to base-pair with nascent
  centromeric and other transcripts. It is the central subunit of the RNA-induced
  transcriptional silencing (RITS) complex (together with the chromodomain protein Chp1 and
  Tas3), which is tethered to heterochromatic loci and recruits the Clr4/CLRC H3K9
  methyltransferase complex and the RNA-directed RNA polymerase complex (RDRC, Rdp1) to
  drive co-transcriptional gene silencing and RNAi-directed heterochromatin assembly. Ago1
  is also the core of the Argonaute siRNA chaperone (ARC) complex (with Arb1 and Arb2),
  which loads small RNAs onto Ago1 and licenses RITS assembly. siRNA-loaded, slicer-active
  Ago1 directs heterochromatin formation at pericentromeric repeats (essential for accurate
  chromosome segregation), the silent mating-type locus, subtelomeres, and facultative
  heterochromatin islands over meiotic genes. Ago1 additionally recruits the trimmer
  exonuclease Triman to generate mature priRNAs and siRNAs, and its bound small RNAs are
  subject to tailing and turnover surveillance. Ago1 is found in both the cytoplasm/cytosol
  (siRNA loading and slicing) and the nucleus (chromatin-associated silencing at
  centromeres, mating-type region, and telomeres).
