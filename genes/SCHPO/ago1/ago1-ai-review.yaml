core_functions:
- description: >-
    Binds single-stranded small interfering RNAs (siRNAs, ~22 nt) as sequence-specific guides
    and is the catalytic slicer of the RNAi pathway, using its PIWI-domain RNase H-like
    Asp-Asp-His triad to cleave target RNAs complementary to the guide.
  supported_by:
  - reference_id: PMID:16931764
    supporting_text: |-
      conserved aspartate-aspartate-histidine motif for heterochromatic silencing and
      for ribonuclease H-like cleavage (slicing) of target messages complementary to
      siRNA.
    reference_section_type: ABSTRACT
- description: >-
    Functions as the central subunit of the RITS effector complex (with Chp1 and Tas3) that,
    guided by centromeric siRNAs, base-pairs with nascent transcripts and tethers to
    heterochromatic loci to direct H3K9 methylation and silencing.
  supported_by:
  - reference_id: PMID:14704433
    supporting_text: |-
      The RITS complex contains Ago1 (the fission yeast Argonaute homolog), Chp1 (a
      heterochromatin-associated chromodomain protein), and Tas3 (a novel protein).
    reference_section_type: ABSTRACT
- description: >-
    Drives siRNA-directed (co-transcriptional) heterochromatin assembly at pericentromeric
    repeats, required for H3K9 methylation, gene silencing, and accurate chromosome
    segregation; deletion abolishes pericentric silencing.
  supported_by:
  - reference_id: PMID:12193640
    supporting_text: |-
      of histone H3 lysine-9 methylation, and impairment of centromere function.
    reference_section_type: ABSTRACT
- description: >-
    Is the core of the ARC complex (with Arb1 and Arb2) that loads small RNAs onto Ago1,
    licensing assembly into the RITS silencing complex, and recruits the trimmer Triman to
    generate mature priRNAs and siRNAs.
  supported_by:
  - reference_id: PMID:17310250
    supporting_text: |-
      fission yeast Argonaute complex (Argonaute siRNA chaperone, ARC), which
      contains, in addition to Ago1, two previously uncharacterized proteins, Arb1 and
      Arb2
    reference_section_type: ABSTRACT
  - reference_id: PMID:24095277
    supporting_text: |-
      Argonaute, loaded with longer RNA precursors, recruits Triman to generate mature
      priRNAs and siRNAs.
    reference_section_type: ABSTRACT
