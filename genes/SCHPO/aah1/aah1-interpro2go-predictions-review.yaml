id: O74922
gene_symbol: aah1
taxon:
  id: NCBITaxon:284812
  label: Schizosaccharomyces pombe
status: COMPLETE
description: >-
  InterPro2GO domain-based review for aah1 (O74922), a glycoside hydrolase family 13
  (GH13) alpha-glucan-active enzyme. From its GH13 catalytic domain (InterPro:IPR006047)
  and alpha-amylase C-domain (IPR015340), InterPro2GO predicts GO:0004556 (alpha-amylase
  activity). Assessment: PLI (paralog/subfamily over-annotation). Curated evidence assigns
  aah1 a DIFFERENT GH13 isofunctional activity - GO:0004134 (4-alpha-glucanotransferase
  activity, ISS/ISO/IEA) - and a role in cell wall polysaccharide biosynthesis, not
  hydrolytic starch degradation. GH13 (clan GH-H) is a large, multi-activity family
  (alpha-amylase, glucanotransferase, branching enzyme, ...); predicting the archetypal
  alpha-amylase activity for a transglucosylase member is the classic nonisofunctional-
  paralog error. See projects/VIRTUAL_YEAST for the aggregate benchmark and the full
  37-prediction adjudication.
source_documents:
  - genes/SCHPO/aah1/aah1-uniprot.txt
  - genes/SCHPO/aah1/aah1-goa.tsv
  - rules/arba/_interpro2go.txt
predictions:
  - source_method: InterPro2GO
    source_version: "rules/arba/_interpro2go.txt (repo snapshot)"
    predicted_term:
      id: GO:0004556
      label: alpha-amylase activity
    predicted_term_type: GO_MF
    review:
      assessment: PLI
      confidence_score: 0
      error_type: PARALOG_OVERANNOTATION
      summary: >-
        InterPro2GO maps the GH13 catalytic domain (IPR006047) + alpha-amylase C-domain
        (IPR015340) to GO:0004556 (alpha-amylase activity), the archetypal hydrolytic
        activity of GH13 clan GH-H. This is a subfamily over-annotation for aah1. Curated
        GOA instead assigns GO:0004134 (4-alpha-glucanotransferase activity) by orthology
        (ISS/ISO), and UniProt describes aah1 as transferring a segment of a
        (1->4)-alpha-D-glucan to an acceptor oligosaccharide and contributing to cell wall
        polysaccharide biosynthesis (PubMed:40668835) - a transglucosylase, not a starch
        hydrolase. Alpha-amylase and 4-alpha-glucanotransferase are nonisofunctional GH13
        paralogous activities; assigning the hydrolase term to a transferase member is a
        paralog-subfamily error (CS=0). The correct, curated MF (GO:0004134) is a sibling,
        not a parent, of the predicted term, so this is a misassignment rather than a
        loss of precision.
      supported_by:
        - reference_id: UniProtKB:O74922
          supporting_text: >-
            Transfers a segment of a (1->4)-alpha-D-glucan to an acceptor oligosaccharide;
            may exhibit activity on alpha(1,3)- and alpha(1,4)-linked oligosaccharides.
            Contributes to cell wall polysaccharide biosynthesis and cell wall assembly.
