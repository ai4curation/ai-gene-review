- id: PMID:10440376
  title: Cohesin Rec8 is required for reductional chromosome segregation at meiosis.
  findings:
  - statement: Rec8 is the meiosis-specific kleisin; Rad21 is the mitotic kleisin.
      Nuclear localization of cohesin subunits including Rad21 is assayed.
    reference_section_type: ABSTRACT
- id: PMID:10779336
  title: Fission yeast Eso1p is required for establishing sister chromatid cohesion
    during S phase.
  findings:
  - statement: Establishment of sister chromatid cohesion occurs during S phase; failure
      to establish cohesion causes M-phase arrest and loss of viability.
    reference_section_type: ABSTRACT
- id: PMID:11069892
  title: 'Characterization of fission yeast cohesin: essential anaphase proteolysis
    of Rad21 phosphorylated in the S phase.'
  findings:
  - statement: Rad21 forms a stable complex with Psm1 and Psm3; cohesin is enriched
      at broad centromere regions; Rad21 is cleaved specifically in anaphase (essential
      though only <5% cleaved); Mis4 loads Rad21 onto chromatin.
    reference_section_type: ABSTRACT
- id: PMID:11598020
  title: Establishment and maintenance of sister chromatid cohesion in fission yeast
    by a unique mechanism.
  findings:
  - statement: Eso1 establishes cohesion coupled to replication; Pds5 hinders establishment
      until counteracted by Eso1 but stabilizes cohesion once established.
    reference_section_type: ABSTRACT
- id: PMID:11882285
  title: Requirement of chromatid cohesion proteins rad21/scc1 and mis4/scc2 for normal
    spindle-kinetochore interaction in fission yeast.
  findings:
  - statement: rad21-K1 cohesion loss activates the Mad2/Bub1 spindle checkpoint due
      to diminished microtubule-kinetochore interaction.
    reference_section_type: ABSTRACT
- id: PMID:12748297
  title: Cohesins determine the attachment manner of kinetochores to spindle microtubules
    at meiosis I in fission yeast.
  findings:
  - statement: Substitutive Rad21 relocates to centromeres in rec8 mutants and directs
      bipolar (equational) meiosis-I attachment; Rec8 and Rad21 define monopolar and
      bipolar attachment respectively.
    reference_section_type: ABSTRACT
- id: PMID:1480481
  title: Cloning and characterization of rad21 an essential gene of Schizosaccharomyces
    pombe involved in DNA double-strand-break repair.
  findings:
  - statement: rad21 is essential for mitotic growth; the radiation-sensitive rad21-45
      mutant is DSB-repair-deficient and plasmid-borne rad21 fully restores DSB repair.
    reference_section_type: ABSTRACT
- id: PMID:15329725
  title: Separase-mediated cleavage of cohesin at interphase is required for DNA repair.
  findings:
  - statement: Interphase separase cleavage of cohesin is required for DNA repair;
      cohesin is hyper-modified after UV in a Rad3-dependent manner.
    reference_section_type: ABSTRACT
- id: PMID:16823372
  title: ORFeome cloning and global analysis of protein localization in the fission
    yeast Schizosaccharomyces pombe.
  findings:
  - statement: Genome-wide GFP localization assigns Rad21 to the nucleus.
    reference_section_type: ABSTRACT
- id: PMID:19948483
  title: Ase1/Prc1-dependent spindle elongation corrects merotely during anaphase
    in fission yeast.
  findings:
  - statement: Rad21 cohesion/separation is assayed in the context of anaphase spindle
      elongation and merotely correction.
    reference_section_type: ABSTRACT
- id: PMID:22144463
  title: RNA elimination machinery targeting meiotic mRNAs promotes facultative heterochromatin
    formation.
  findings:
  - statement: Rad21/cohesin localizes to facultative heterochromatin islands over
      meiotic genes.
    reference_section_type: ABSTRACT
- id: PMID:24291789
  title: Biochemical reconstitution of topological DNA binding by the cohesin ring.
  findings:
  - statement: The reconstituted four-subunit fission yeast cohesin (Psm1, Psm3, Rad21,
      Psc3) binds dsDNA (ATP-independent) and topologically loads onto DNA in an ATP-dependent,
      loader-stimulated manner.
    reference_section_type: INTRODUCTION
- id: PMID:25778919
  title: Aurora B prevents chromosome arm separation defects by promoting telomere
    dispersion and disjunction.
  findings:
  - statement: Aurora B promotes dissociation of Swi6/HP1 and cohesin Rad21 from telomeres
      for telomere dispersion.
    reference_section_type: ABSTRACT
- id: PMID:25847133
  title: RNA pol II transcript abundance controls condensin accumulation at mitotically
    up-regulated and heat-shock-inducible genes in fission yeast.
  findings:
  - statement: Cohesin (Rad21) accumulation sites at pericentric/rDNA heterochromatin
      and subtelomeric regions are distinct from condensin sites.
    reference_section_type: ABSTRACT
- id: PMID:26583750
  title: The ATPases of cohesin interface with regulators to modulate cohesin-mediated
    DNA tethering.
  findings:
  - statement: Cohesin ATPases interface with regulators (Eco1, Wpl1) to modulate
      DNA tethering critical for cohesion, DNA repair and transcriptional regulation.
    reference_section_type: ABSTRACT
- id: PMID:26687354
  title: DNA Entry into and Exit out of the Cohesin Ring by an Interlocking Gate Mechanism.
  findings:
  - statement: The kleisin Rad21 bridges the SMC ATPase heads; Wapl disengages the
      kleisin (after ATP rebinds) to open the ring for DNA exit.
    reference_section_type: INTRODUCTION
- id: PMID:29358048
  title: Establishment of DNA-DNA Interactions by the Cohesin Ring.
  findings:
  - statement: The purified fission yeast cohesin ring mediates DNA-DNA tethering,
      the biochemical basis of sister chromatid cohesion.
    reference_section_type: ABSTRACT
- id: PMID:29735656
  title: Suppressor mutation analysis combined with 3D modeling explains cohesin's
    capacity to hold and release DNA.
  findings:
  - statement: The Psm1-Rad21 and Psm3-Rad21 interfaces govern cohesin's hold/release
      of DNA; destabilizing them can bypass Cut1 cleavage.
    reference_section_type: ABSTRACT
- id: PMID:33176147
  title: DNA Binding by the Mis4(Scc2) Loader Promotes Topological DNA Entrapment
    by the Cohesin Ring.
  findings:
  - statement: Cohesin is a ring-shaped ATPase that topologically embraces DNA; Mis4
      DNA binding promotes topological entrapment by the ring.
    reference_section_type: ABSTRACT
- id: PMID:34309513
  title: A Brownian ratchet model for DNA loop extrusion by the cohesin complex.
  findings:
  - statement: Cohesin extrudes DNA loops, reflecting chromatin domain formation.
    reference_section_type: ABSTRACT
- id: PMID:7706319
  title: The rad21 gene product of Schizosaccharomyces pombe is a nuclear, cell cycle-regulated
    phosphoprotein.
  findings:
  - statement: Rad21 is a nuclear, cell-cycle-regulated phosphoprotein with an NLS
      in the C-terminal third, multiply phosphorylated on serines, peaking near G1/S.
    reference_section_type: ABSTRACT
suggested_questions:
- What kinase(s) are responsible for the cell-cycle-regulated hyperphosphorylation
  of Rad21 during S/G2, and is this phosphorylation required for cohesion establishment
  versus only for anaphase proteolysis?
- Is the functionally essential anaphase-cleaved pool of Rad21 spatially restricted
  (e.g., to centromeres), explaining why only a small fraction of cleaved product
  is sufficient for sister separation?
- How are cohesin's loop-extrusion (chromatin looping) and cohesive (sister chromatid
  cohesion) activities partitioned at the level of the same Rad21-containing ring?
suggested_experiments:
- Phospho-site mutagenesis (S219, S547, S553 and N-terminal Cdc2 sites) combined with
  ChIP and cohesion assays to dissect the role of Rad21 phosphorylation in loading,
  cohesion establishment, and anaphase cleavage.
- Auxin-inducible or fast-degron depletion of Rad21 at defined cell-cycle stages followed
  by Hi-C/Micro-C to separate its contributions to sister chromatid cohesion versus
  intra-chromatid loop formation.
- Single-molecule reconstitution comparing wild-type and Psm1-Rad21 / Psm3-Rad21 interface
  mutants to quantify how each interface governs DNA hold versus release without separase
  cleavage.
