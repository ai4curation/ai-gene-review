    label: replication-born double-strand break repair via sister chromatid exchange
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: involved_in
  review:
    summary: >-
      Cohesin promotes recombinational repair of replication-associated
      double-strand breaks by holding the sister chromatid available as a repair
      template. This IBA term is a specific, mechanistically plausible elaboration
      of cohesin's repair role, consistent with Rad21's documented role in DSB
      repair, but the specific sister-chromatid-exchange sub-process has not been
      directly demonstrated for S. pombe rad21 in our cached evidence.
    action: KEEP_AS_NON_CORE
    reason: >-
      Plausible phylogenetically inferred repair role; supported in general terms
      by Rad21's experimental DSB-repair phenotype, but the precise SCE
      sub-process is not directly assayed here. Retained as a non-core repair
      function.
    supported_by:
    - reference_id: PMID:1480481
      supporting_text: The plasmid-borne gene completely reestablished the DNA dsb
        repair pathway.
      reference_section_type: ABSTRACT
