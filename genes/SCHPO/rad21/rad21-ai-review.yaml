core_functions:
- description: >-
    Acts as the alpha-kleisin (Scc1/Mcd1/RAD21 ortholog) that bridges the Psm1
    (Smc1) and Psm3 (Smc3) ATPase head domains and is contacted by Psc3 (Scc3),
    closing the tripartite cohesin ring; this protein-macromolecule adaptor /
    structural role is required to assemble a functional cohesin complex.
  supported_by:
  - reference_id: PMID:11069892
    supporting_text: Immunoprecipitation demonstrates stable complex formation of
      Rad21 with Psm1 and Psm3 but not with Psc3.
    reference_section_type: ABSTRACT
  - reference_id: PMID:26687354
    supporting_text: A kleisin subunit (Rad21 in fission yeast) bridges the ATPase
      heads and stabilizes their interaction.
    reference_section_type: INTRODUCTION
- description: >-
    Enables ATP-dependent topological entrapment of DNA by the cohesin ring,
    establishing and maintaining mitotic sister chromatid cohesion from S phase
    until anaphase.
  supported_by:
  - reference_id: PMID:33176147
    supporting_text: 'cohesion, is a ring-shaped multi-subunit ATPase that topologically
      embraces DNA.'
    reference_section_type: ABSTRACT
  - reference_id: PMID:29358048
    supporting_text: Here, we demonstrate DNA-DNA tethering by the purified fission
    reference_section_type: ABSTRACT
- description: >-
    Required for faithful mitotic sister chromatid segregation; cohesion provides
    the resistance to spindle forces needed for proper microtubule-kinetochore
    interaction, and timely separase (Cut1) cleavage of Rad21 at anaphase
    triggers sister separation.
  supported_by:
  - reference_id: PMID:11882285
    supporting_text: The loss of chromatid cohesion in fission yeast mutants (mis4-242
      and rad21-K1) leads to the activation of Mad2- and Bub1-dependent checkpoint,
      possibly due to a diminished microtubule-kinetochore interaction.
    reference_section_type: ABSTRACT
  - reference_id: PMID:11069892
    supporting_text: overexpression of noncleavable double mutant Rad21 protein (R179ER231E)
      in wild-type cells was highly toxic and prevented sister chromatid separation.
    reference_section_type: RESULTS
- description: >-
    Functions in DNA double-strand-break repair; rad21 was originally identified
    as a radiation-sensitive DSB-repair-deficient mutant, and cohesin promotes
    recombinational repair using the sister chromatid.
  supported_by:
  - reference_id: PMID:1480481
    supporting_text: The plasmid-borne gene completely reestablished the DNA dsb repair
      pathway.
    reference_section_type: ABSTRACT
