- term:
    id: GO:0003677
    label: DNA binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000117
  qualifier: enables
  review:
    summary: >-
      Generic DNA binding from an ARBA machine-learning model. Clr4 acts on
      chromatin but is not a sequence-specific DNA-binding factor; its targeting
      to DNA is mediated by RNAi/RITS and the CLRC scaffold (Rik1/Dos1), not by
      intrinsic DNA recognition. This uninformative parent term should not be
      retained as a function.
    action: REMOVE
    reason: >-
      Low-evidence electronic annotation to an over-general term. Clr4's
      chromatin association is mediated by its chromodomain (H3K9me reading) and
      by CLRC/RNAi recruitment, not by intrinsic sequence-specific DNA binding.
    supported_by:
    - reference_id: PMID:24449894
      supporting_text: H3K9me deposition depends on the RNAi pathway.
      reference_section_type: ABSTRACT
- term:
