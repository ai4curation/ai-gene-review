# Summary: SFT model recapitulates the classic interpro2go pseudoenzyme error -- 3 of 7
# predictions assign catalytic activity to a protein with a degenerate active site;
# the 4 remaining predictions (protein binding, heterochromatin boundary formation,
# heterochromatin, nucleus) are all already in GOA (CNN). No novel correct predictions.
description: BioReason-Pro SFT predictions for Epe1 (SCHPO) reviewed against curated
  AIGR ground truth. All 7 predictions are either NPI (catalytic activity assigned to
  pseudoenzyme) or CNN (already in GOA); zero novel correct predictions identified.
references:
- id: doi:10.64898/2026.03.19.712954
  title: BioReason-Pro (Fallahpour et al. 2026)
predictions:
- source_method: BioReason-Pro-SFT
  source_version: wanglab/protein_catalogue
  source_reference_id: doi:10.64898/2026.03.19.712954
  predicted_term:
    id: GO:0005515
    label: protein binding
  predicted_term_type: GO_MF
  review:
    # Protein binding is in GOA via IPI (IntAct, PMID:21215368, interaction with
    # Q10990/Swi6). However, this is a low-information term that the AIGR guidelines
    # discourage. Prediction is technically correct (Epe1 does bind proteins,
    # notably HP1/Swi6) but uninformative and already captured in GOA.
    assessment: CNN
    confidence_score: 2
    summary: Protein binding is in GOA via IPI evidence (IntAct, PMID:21215368).
      Epe1 binds HP1/Swi6 and SAGA complex subunits. Correct but not novel and
      uninformative -- GO curation guidelines discourage annotating to protein binding
      alone when more specific terms are available.

- source_method: BioReason-Pro-SFT
  source_version: wanglab/protein_catalogue
  source_reference_id: doi:10.64898/2026.03.19.712954
  predicted_term:
    id: GO:0016706
    label: oxidoreductase activity, acting on paired donors, with incorporation or
      reduction of molecular oxygen, 2-oxoglutarate as one donor
  predicted_term_type: GO_MF
  review:
    assessment: NPI
    confidence_score: 0
    error_type: PSEUDOENZYME_OVERANNOTATION
    summary: >-
      Incorrect catalytic activity assigned to a pseudoenzyme. Epe1 has a degenerate JmjC active site (HVD
      not HXD; Tyr307 not catalytic His) and shows no detectable 2-oxoglutarate-dependent oxidoreductase
      activity in vitro. The AIGR curated review removes all oxidoreductase annotations. SFT model recapitulates
      the interpro2go error by inferring activity from domain fold without verifying catalytic residue conservation.
      [ONTOLOGY_LABEL_AUDIT] Raw model pair mismatch: GO:0016706 resolves to '2-oxoglutarate-dependent dioxygenase
      activity', not 'oxidoreductase activity, acting on paired donors, with incorporation or reduction
      of molecular oxygen, 2-oxoglutarate as one donor'. The raw ID and label are retained for provenance;
      the assessment applies to the GO ID and explicitly flags the label error.

- source_method: BioReason-Pro-SFT
  source_version: wanglab/protein_catalogue
  source_reference_id: doi:10.64898/2026.03.19.712954
  predicted_term:
    id: GO:0005506
    label: iron ion binding
  predicted_term_type: GO_MF
  review:
    assessment: NPI
    confidence_score: 0
    error_type: PSEUDOENZYME_OVERANNOTATION
    summary: >-
      Iron ion binding is incorrect for this pseudoenzyme. Epe1 lacks the conserved Fe(II)-coordinating
      residues (HXD motif) of catalytically active JmjC demethylases. The curated review removes the broader
      metal ion binding IEA annotation from GOA. Prediction over-annotates the catalytic apparatus of a
      pseudoenzyme (driven by JmjC-family frequency in training data).

- source_method: BioReason-Pro-SFT
  source_version: wanglab/protein_catalogue
  source_reference_id: doi:10.64898/2026.03.19.712954
  predicted_term:
    id: GO:0031409
    label: 2-oxoglutarate binding
  predicted_term_type: GO_MF
  review:
    assessment: NPI
    confidence_score: 0
    error_type: PSEUDOENZYME_OVERANNOTATION
    summary: >-
      2-oxoglutarate binding is not in GOA and is biologically incorrect for this pseudoenzyme. The term
      implies an intact cofactor-binding pocket that Epe1 lacks due to its degenerate HVD motif. No experimental
      evidence supports this activity. Prediction over-annotates the catalytic cofactor apparatus of a pseudoenzyme
      (driven by co-occurrence of 2-oxoglutarate binding with JmjC-domain proteins in training data). [ONTOLOGY_LABEL_AUDIT]
      Raw model pair mismatch: GO:0031409 resolves to 'pigment binding', not '2-oxoglutarate binding'. The
      raw ID and label are retained for provenance; the assessment applies to the GO ID and explicitly flags
      the label error.

