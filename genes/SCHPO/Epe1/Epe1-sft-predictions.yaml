# Summary: SFT model recapitulates the classic interpro2go pseudoenzyme error -- 3 of 7
# predictions assign catalytic activity to a protein with a degenerate active site;
# the 4 remaining predictions (protein binding, heterochromatin boundary formation,
# heterochromatin, nucleus) are all already in GOA (CNN). No novel correct predictions.
description: BioReason-Pro SFT predictions for Epe1 (SCHPO) reviewed against curated
  AIGR ground truth. All 7 predictions are either NPI (catalytic activity assigned to
  pseudoenzyme) or CNN (already in GOA); zero novel correct predictions identified.
references:
- id: doi:10.64898/2026.03.19.712954
  title: BioReason-Pro (Fallahpour et al. 2026)
predictions:
- source_method: BioReason-Pro-SFT
  source_version: wanglab/protein_catalogue
  source_reference_id: doi:10.64898/2026.03.19.712954
  predicted_term:
    id: GO:0005515
    label: protein binding
  predicted_term_type: GO_MF
  review:
    # Protein binding is in GOA via IPI (IntAct, PMID:21215368, interaction with
    # Q10990/Swi6). However, this is a low-information term that the AIGR guidelines
    # discourage. Prediction is technically correct (Epe1 does bind proteins,
    # notably HP1/Swi6) but uninformative and already captured in GOA.
    assessment: CNN
    confidence_score: 2
    summary: Protein binding is in GOA via IPI evidence (IntAct, PMID:21215368).
      Epe1 binds HP1/Swi6 and SAGA complex subunits. Correct but not novel and
      uninformative -- GO curation guidelines discourage annotating to protein binding
      alone when more specific terms are available.

- source_method: BioReason-Pro-SFT
  source_version: wanglab/protein_catalogue
  source_reference_id: doi:10.64898/2026.03.19.712954
  predicted_term:
    id: GO:0016706
    label: oxidoreductase activity, acting on paired donors, with incorporation or
      reduction of molecular oxygen, 2-oxoglutarate as one donor
  predicted_term_type: GO_MF
  review:
    # This term implies active Fe(II)/2-oxoglutarate-dependent catalysis, which
    # is the canonical JmjC demethylase mechanism. Epe1 is a pseudoenzyme: its
    # active site carries HVD instead of the canonical HXD motif and Tyr307
    # instead of the catalytic His; purified Epe1 shows no demethylase activity
    # in mass-spectrometry-based assays (Raiymbek 2020). The AIGR curated review
    # marks the parent term GO:0016491 (oxidoreductase activity) for REMOVE.
    # This is the same interpro2go error identified in the RL review: the SFT
    # model infers catalysis from domain architecture without checking residue
    # conservation. error_type FREQUENCY_BIAS applies because 2-oxoglutarate
    # oxygenase activity is the dominant annotation for JmjC-family members in
    # training data.
    assessment: NPI
    confidence_score: 1
    error_type: FREQUENCY_BIAS
    summary: Incorrect catalytic activity assigned to a pseudoenzyme. Epe1 has a
      degenerate JmjC active site (HVD not HXD; Tyr307 not catalytic His) and
      shows no detectable 2-oxoglutarate-dependent oxidoreductase activity in vitro.
      The AIGR curated review removes all oxidoreductase annotations. SFT model
      recapitulates the interpro2go error by inferring activity from domain fold
      without verifying catalytic residue conservation.

- source_method: BioReason-Pro-SFT
  source_version: wanglab/protein_catalogue
  source_reference_id: doi:10.64898/2026.03.19.712954
  predicted_term:
    id: GO:0005506
    label: iron ion binding
  predicted_term_type: GO_MF
  review:
    # GOA contains GO:0046872 (metal ion binding, IEA, UniProt keyword KW-0479)
    # as a broader term, but the curated AIGR review marks GO:0046872 for REMOVE
    # because Fe(II) binding requires intact HXD and Tyr catalytic residues that
    # Epe1 lacks. Iron ion binding is a prerequisite for catalysis; assigning it
    # to a pseudoenzyme with a degenerate Fe-binding site is biologically
    # incorrect. No experimental evidence supports iron binding by Epe1.
    assessment: NPI
    confidence_score: 1
    error_type: FREQUENCY_BIAS
    summary: Iron ion binding is incorrect for this pseudoenzyme. Epe1 lacks the
      conserved Fe(II)-coordinating residues (HXD motif) of catalytically active
      JmjC demethylases. The curated review removes the broader metal ion binding
      IEA annotation from GOA. Prediction reflects frequency bias from JmjC-family
      training data.

- source_method: BioReason-Pro-SFT
  source_version: wanglab/protein_catalogue
  source_reference_id: doi:10.64898/2026.03.19.712954
  predicted_term:
    id: GO:0031409
    label: 2-oxoglutarate binding
  predicted_term_type: GO_MF
  review:
    # Not in GOA. 2-oxoglutarate binding is the cofactor-binding activity for
    # active JmjC demethylases. Epe1's degenerate active site cannot coordinate
    # Fe(II), making 2-oxoglutarate binding structurally implausible. No
    # experimental evidence for 2-oxoglutarate binding by Epe1 exists. This is
    # the most specific of the three catalytic-machinery predictions and the
    # most clearly incorrect for a pseudoenzyme.
    assessment: NPI
    confidence_score: 1
    error_type: FREQUENCY_BIAS
    summary: 2-oxoglutarate binding is not in GOA and is biologically incorrect for
      this pseudoenzyme. The term implies an intact cofactor-binding pocket that
      Epe1 lacks due to its degenerate HVD motif. No experimental evidence supports
      this activity. Prediction reflects frequency bias from co-occurrence of
      2-oxoglutarate binding with JmjC-domain proteins in training data.

