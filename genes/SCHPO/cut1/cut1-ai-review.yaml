proposed_new_terms: []
suggested_questions:
- question: >-
    What is the relative biological importance of Cut1's proteolytic cohesin-cleavage
    function versus its protease-independent contributions to anaphase spindle elongation
    and SPB positioning?
- question: >-
    How is Cut1 catalytic activity regulated beyond securin binding (e.g.,
    phosphorylation, autocleavage) in fission yeast?
suggested_experiments:
- description: >-
    Quantitative mass spectrometry / N-terminomics on synchronized mitotic and meiotic
    cells expressing protease-dead Cut1 (Cys1730 mutant) versus wild type to map the full
    set of in vivo Cut1 cleavage substrates and confirm Rad21/Rec8 cleavage sites.
- description: >-
    Live-cell imaging of Cut1, Cut2, and Rad21 with degron-based acute depletion to
    dissect the temporal coupling between securin degradation, Cut1 activation, cohesin
    cleavage, and anaphase spindle midzone behaviour.
