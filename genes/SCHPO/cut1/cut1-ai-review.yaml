id: P18296
gene_symbol: cut1
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:284812
  label: Schizosaccharomyces pombe (strain 972 / ATCC 24843)
description: >-
  Cut1 is the separase (separin) of the fission yeast Schizosaccharomyces pombe, a
  large (1828-residue) CD-clan cysteine endopeptidase (EC 3.4.22.49) and the ortholog
  of budding yeast Esp1 and human separase (ESPL1). Its catalytic activity resides in a
  C-terminal peptidase C50 domain with the active-site cysteine at position 1730. Cut1
  triggers the metaphase-to-anaphase transition by proteolytically cleaving the kleisin
  subunit of cohesin (Rad21/Scc1 in mitosis, Rec8 in meiosis), opening the cohesin ring
  and allowing sister chromatids (or homologues) to separate. Through most of the cell
  cycle Cut1 is held catalytically inactive by binding its inhibitory chaperone securin
  Cut2, forming the separase-securin complex; at the metaphase-anaphase transition the
  APC/C (activated by Slp1/Cdc20) ubiquitinates Cut2 and targets it for degradation,
  liberating active Cut1. Cut1 is cytoplasmic during interphase and relocates to the
  spindle pole bodies and mitotic spindle upon entry into prophase, remaining bound to
  the anaphase spindle midzone, where it also promotes anaphase spindle elongation. Beyond
  mitosis, Cut1 cleaves Rec8 to drive meiotic chromosome segregation and cleaves cohesin
  locally during interphase to support DNA repair. Loss of Cut1 produces the "cut" (cell
  untimely torn) phenotype, in which chromosomes fail to segregate yet cytokinesis
  proceeds, bisecting the undivided nucleus.
