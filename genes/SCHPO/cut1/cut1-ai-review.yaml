  - statement: >-
      Separase activated by securin destruction cleaves the cohesin subunit Scc1/Rad21
      enriched in kinetochores; Cut1 resides in interphase cytoplasm and mobilizes to the
      spindle and SPBs in mitosis. A C-terminal, protease-independent activity affects SPB
      positioning (pointed nuclear formation).
    reference_section_type: ABSTRACT
- id: PMID:14532136
  title: Rec8 cleavage by separase is required for meiotic nuclear divisions in fission
    yeast.
  findings:
  - statement: >-
      Separase Cut1 cleaves the meiotic kleisin Rec8 at two identified sites; a
      non-cleavable Rec8 blocks homologue disjunction at meiosis I, establishing Cut1's
      meiotic endopeptidase function.
    reference_section_type: ABSTRACT
- id: PMID:15329725
  title: Separase-mediated cleavage of cohesin at interphase is required for DNA repair.
  findings:
  - statement: >-
      The securin-separase (Cut2-Cut1) complex aids DNA repair by cleaving cohesin
      locally in interphase; the function requires separase protease activity and
      cleavable cohesin.
    reference_section_type: ABSTRACT
- id: PMID:16823372
  title: ORFeome cloning and global analysis of protein localization in the fission
    yeast Schizosaccharomyces pombe.
  findings:
  - statement: Genome-wide YFP localization assigns Cut1 to the cytosol.
    reference_section_type: ABSTRACT
- id: PMID:1934126
  title: Common genes and pathways in the regulation of the mitotic and meiotic cell
    cycles of Schizosaccharomyces pombe.
  findings:
  - statement: >-
      A cut1 cut2 double mutant forms two-spored asci whereas single cut1 or cut2 mutants
      do not affect sporulation, indicating involvement in the meiotic program.
    reference_section_type: ABSTRACT
- id: PMID:8065367
  title: Identification of cut8+ and cek1+, a novel protein kinase gene, which complement
    a fission yeast mutation that blocks anaphase.
  findings:
  - statement: >-
      cut1+ is a multicopy suppressor of the anaphase-blocking cut8-563 mutation and is
      described as essential for nuclear division.
    reference_section_type: ABSTRACT
- id: PMID:8978688
  title: Fission yeast Cut1 and Cut2 are essential for sister chromatid separation,
    concentrate along the metaphase spindle and form large complexes.
  findings:
  - statement: >-
      cut1 ts mutants fail to separate sister chromatids in anaphase (cut phenotype);
      Cut1 concentrates along the metaphase spindle and forms a large complex with securin
      Cut2; Cut2 is degraded in anaphase while Cut1 is stable throughout the cell cycle.
    reference_section_type: ABSTRACT
- id: PMID:9635190
  title: Cut1 is loaded onto the spindle by binding to Cut2 and promotes anaphase spindle
    movement upon Cut2 proteolysis.
  findings:
  - statement: >-
      Cut1 is cytoplasmic in interphase and relocates to SPBs and the spindle at prophase;
      Cut2 loads Cut1 onto the spindle, and Cut2 proteolysis is needed for active Cut1
      participation in sister chromatid separation and anaphase spindle movement.
    reference_section_type: ABSTRACT
