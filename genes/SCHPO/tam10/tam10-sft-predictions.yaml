    summary: Not in GOA and biologically unsupported. tam10 is a sequence orphan with
      no RNA-binding domains, no spliceosomal features, and no experimental evidence for
      splicing function. The AIGR review removes the ISO RNA binding annotation (GO:0003723)
      from GOA because the orthology to human KNOP1 is invalid (only 16.7% sequence
      identity). This prediction likely derives from the same spurious orthology inference
      to KNOP1 (a nucleolar protein involved in RNA processing) that caused the incorrect
      ISO annotation in GOA.

