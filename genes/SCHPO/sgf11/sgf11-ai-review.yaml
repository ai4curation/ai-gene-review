id: Q5FC18
gene_symbol: sgf11
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:284812
  label: Schizosaccharomyces pombe (strain 972 / ATCC 24843)
description: >-
  Sgf11 (SAGA-associated factor 11) is a small zinc finger protein (117 aa) and a dedicated subunit
  of the deubiquitinating (DUB) module of the SAGA transcriptional co-activator complex in S. pombe.
  It contains an SGF11-type zinc finger domain (residues 72-93) that, together with the catalytic domain
  of Ubp8, forms the catalytic lobe of the DUB module. Sgf11 is required to recruit Ubp8 and Sus1 into
  the SAGA complex and to fully activate the ubiquitin hydrolase activity of Ubp8, enabling histone H2B
  deubiquitination. Through its role in the SAGA complex, Sgf11 contributes to transcriptional regulation
  by RNA polymerase II, including the control of the switch between proliferation and sexual differentiation.
  The SAGA complex was purified and characterized in S. pombe by Helmlinger et al. (2008), who identified
  Sgf11 as one of 19 subunits, with a composition identical to S. cerevisiae SAGA.
existing_annotations:
- term:
    id: GO:0000124
    label: SAGA complex
  evidence_type: IEA
  original_reference_id: GO_REF:0000104
  review:
    summary: >-
      IEA annotation transferring SAGA complex membership from orthologous proteins via UniRule.
      Sgf11 is experimentally confirmed as a SAGA complex subunit in S. pombe (PMID:19056896),
      so this electronic annotation is correct and consistent with direct experimental evidence.
    action: ACCEPT
    reason: >-
      Sgf11 was identified as one of 19 subunits of the S. pombe SAGA complex by mass spectrometry
      (PMID:19056896). This is a core identity annotation for this protein. The IEA annotation is
      redundant with the IDA annotation from PMID:19056896 but is not wrong.
    supported_by:
    - reference_id: PMID:19056896
      supporting_text: >-
        Purification of the S. pombe SAGA complex showed that its subunit composition is identical to that of Saccharomyces cerevisiae
- term:
    id: GO:0003713
    label: transcription coactivator activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000104
  review:
    summary: >-
      IEA annotation transferring transcription coactivator activity from orthologous proteins.
      Sgf11 is a structural/accessory subunit of the DUB module of SAGA; it does not independently
      possess transcription coactivator activity but contributes to SAGA's overall coactivator function.
      The IC annotation with the 'contributes_to' qualifier is more accurate.
    action: ACCEPT
    reason: >-
      While Sgf11 does not independently enable transcription coactivator activity, this IEA
      annotation is broadly consistent with the protein's role in SAGA. It is redundant with the
      IC annotation that uses the more precise 'contributes_to' qualifier, but not incorrect as
      a general mapping. The SAGA complex as a whole acts as a coactivator (PMID:19056896).
    supported_by:
    - reference_id: PMID:19056896
      supporting_text: >-
        The SAGA complex is a conserved multifunctional coactivator known to play broad roles in eukaryotic transcription
- term:
    id: GO:0005634
    label: nucleus
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  review:
    summary: >-
      IEA annotation for nuclear localization based on combined automated annotation methods.
      Sgf11 is a subunit of the SAGA complex, which functions in transcriptional regulation at
      promoters in the nucleus. UniProt annotates nuclear localization by similarity to orthologs
      and HAMAP rule.
    action: ACCEPT
    reason: >-
      Nuclear localization is expected and consistent with Sgf11's role as a component of the
      nuclear SAGA complex. UniProt states "Nucleus {ECO:0000250|UniProtKB:Q03067,
      ECO:0000255|HAMAP-Rule:MF_03047}". The SAGA complex functions at promoters in the nucleus
      for RNA polymerase II transcription.
- term:
    id: GO:0008270
    label: zinc ion binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000104
  review:
    summary: >-
      IEA annotation for zinc ion binding transferred from orthologous proteins. Sgf11 contains
      a C-terminal SGF11-type zinc finger domain (residues 72-93) with four zinc-coordinating
      residues (Cys74, Cys77, Cys89, Cys93) annotated in UniProt by similarity to S. cerevisiae
      Sgf11 (Q03067).
    action: ACCEPT
    reason: >-
      The zinc finger domain is a well-characterized structural feature of the SGF11 family.
      UniProt annotates four zinc binding residues (positions 74, 77, 89, 93) based on similarity
      to S. cerevisiae. The zinc finger domain forms part of the catalytic lobe of the DUB module
      and is functionally important for activating Ubp8.
- term:
    id: GO:0045893
    label: positive regulation of DNA-templated transcription
  evidence_type: IEA
  original_reference_id: GO_REF:0000104
  review:
    summary: >-
      IEA annotation for positive regulation of transcription. The SAGA complex acts as a
      transcriptional coactivator, and Sgf11 contributes to this function as a DUB module subunit.
      However, SAGA has both activating and repressing roles depending on context (PMID:19056896).
    action: ACCEPT
    reason: >-
      As a subunit of the SAGA coactivator complex, Sgf11 contributes to positive transcriptional
      regulation. SAGA is required for transcription pre-initiation complex recruitment at promoters
      (UniProt). While SAGA also has repressive roles (e.g., Gcn5-mediated repression of ste11 in
      rich medium per PMID:19056896), positive regulation of transcription is a core function of the
      complex as a whole.
    supported_by:
    - reference_id: PMID:19056896
      supporting_text: >-
        The SAGA complex is a conserved multifunctional coactivator known to play broad roles in eukaryotic transcription
- term:
    id: GO:0071819
    label: DUBm complex
  evidence_type: IEA
  original_reference_id: GO_REF:0000104
  review:
    summary: >-
      IEA annotation for membership in the DUB module complex. Sgf11 is one of four subunits
      of the DUB module (ubp8, sgf11, sgf73, sus1) within SAGA. UniProt describes Sgf11 as
      essential for DUB module assembly, recruiting ubp8 and sus1 into the complex.
    action: ACCEPT
    reason: >-
      DUBm complex membership is a core annotation for Sgf11. UniProt states that Sgf11 is
      required to recruit ubp8 and sus1 into the SAGA complex, and that within the DUB module,
      the zinc finger domains of sgf11 and sgf73 are both required to fully activate ubp8.
      This is the most specific complex annotation for Sgf11's role.
- term:
    id: GO:0006357
    label: regulation of transcription by RNA polymerase II
  evidence_type: NAS
  original_reference_id: PMID:19056896
  review:
    summary: >-
      NAS annotation from ComplexPortal based on PMID:19056896. Helmlinger et al. (2008) showed
      that the S. pombe SAGA complex regulates transcription, particularly controlling the switch
      between proliferation and sexual differentiation through the opposing roles of Gcn5 and Spt8
      in regulating ste11 expression.
    action: ACCEPT
    reason: >-
      PMID:19056896 demonstrates that the SAGA complex regulates RNA pol II transcription in S. pombe.
      While the study focuses on the roles of Gcn5 and Spt8 subunits specifically, Sgf11 as a
      SAGA subunit participates in this regulatory function. This is consistent with the EXP
      annotation from PMID:21642955.
    supported_by:
    - reference_id: PMID:19056896
      supporting_text: >-
        The SAGA complex is a conserved multifunctional coactivator known to play broad roles in eukaryotic transcription
- term:
    id: GO:0045815
    label: transcription initiation-coupled chromatin remodeling
  evidence_type: IC
  original_reference_id: GO_REF:0000111
  review:
    summary: >-
      IC annotation inferred from SAGA complex membership. The SAGA complex performs chromatin
      remodeling through histone acetylation (HAT module) and deubiquitination (DUB module) at
      promoters during transcription initiation. This inference from SAGA complex membership
      is logical.
    action: ACCEPT
    reason: >-
      As a DUB module subunit that activates Ubp8 for histone H2B deubiquitination, Sgf11
      contributes to chromatin remodeling coupled to transcription initiation. UniProt describes
      that SAGA influences transcriptional activity through chromatin modification including
      histone deubiquitination. The IC inference from SAGA complex membership is sound.
- term:
    id: GO:0000124
    label: SAGA complex
  evidence_type: IPI
  original_reference_id: PMID:29079657
  review:
    summary: >-
      IPI annotation based on physical interaction evidence from PMID:29079657. Laboucarié et al.
      (2017) studied SAGA regulation by TORC1/TORC2 through phosphorylation of its Taf12 subunit,
      using proteomic approaches that confirmed SAGA complex composition in S. pombe.
    action: ACCEPT
    reason: >-
      PMID:29079657 used biochemical and proteomic approaches to study the SAGA complex in
      S. pombe, confirming Sgf11's presence as a SAGA component through physical interaction
      studies. This provides independent confirmation of the IDA result from PMID:19056896.
    supported_by:
    - reference_id: PMID:29079657
      supporting_text: >-
        using a combination of genetic, biochemical, and proteomic approaches, we show that SAGA responds to nutrients through the differential phosphorylation of its Taf12 component
- term:
    id: GO:0003713
    label: transcription coactivator activity
  evidence_type: IC
  original_reference_id: GO_REF:0000111
  qualifier: contributes_to
  review:
    summary: >-
      IC annotation with 'contributes_to' qualifier, inferred from SAGA complex membership.
      This accurately reflects that Sgf11 contributes to SAGA's transcription coactivator activity
      but does not independently possess this activity. Sgf11 is a structural/regulatory subunit
      of the DUB module.
    action: ACCEPT
    reason: >-
      The 'contributes_to' qualifier is appropriate for Sgf11, which is an accessory subunit
      that enables the DUB module's catalytic activity but does not independently function as
      a transcription coactivator. This is more precise than the IEA annotation for the same
      term without the qualifier.
- term:
    id: GO:0006357
    label: regulation of transcription by RNA polymerase II
  evidence_type: EXP
  original_reference_id: PMID:21642955
  review:
    summary: >-
      EXP annotation from PomBase based on Helmlinger et al. (2011). This study examined the
      role of Tra1 within SAGA and found that it has specific regulatory roles rather than
      global functions. The study analyzed SAGA-dependent gene regulation in S. pombe, providing
      experimental evidence that SAGA subunits regulate RNA pol II transcription.
    action: ACCEPT
    reason: >-
      PMID:21642955 provides experimental evidence for SAGA-mediated regulation of RNA pol II
      transcription in S. pombe. While the study primarily focuses on Tra1, it examines SAGA
      function broadly and Sgf11 participates in this regulatory function as a DUB module subunit.
      Deubiquitination of H2B by the DUB module is required for maintaining H3 methylation levels,
      which influences transcriptional regulation.
    supported_by:
    - reference_id: PMID:21642955
      supporting_text: >-
        The SAGA complex is a conserved, multifunctional co-activator that has broad roles in eukaryotic transcription
- term:
    id: GO:0000124
    label: SAGA complex
  evidence_type: IDA
  original_reference_id: PMID:19056896
  review:
    summary: >-
      IDA annotation from PomBase based on Helmlinger et al. (2008), who purified and
      characterized the S. pombe SAGA complex by mass spectrometry, identifying Sgf11 as one
      of 19 subunits. This is the primary experimental evidence for Sgf11's SAGA membership.
    action: ACCEPT
    reason: >-
      PMID:19056896 provides direct experimental identification of Sgf11 as a SAGA complex
      subunit through purification and mass spectrometry. The paper's title and supplementary
      data confirm Sgf11 in the S. pombe SAGA complex. This is the strongest evidence for
      this annotation.
    supported_by:
    - reference_id: PMID:19056896
      supporting_text: >-
        Purification of the S. pombe SAGA complex showed that its subunit composition is identical to that of Saccharomyces cerevisiae
references:
- id: GO_REF:0000104
  title: Electronic Gene Ontology annotations created by transferring manual GO annotations
    between related proteins based on shared sequence features
  findings:
  - statement: >-
      UniRule-based IEA annotations transferred SAGA complex membership, transcription coactivator
      activity, zinc ion binding, positive regulation of transcription, and DUB module membership
      to S. pombe Sgf11.
- id: GO_REF:0000111
  title: Gene Ontology annotations Inferred by Curator (IC) using at least one Inferred
    by Sequence Similarity (ISS) annotation to support the inference
  findings:
  - statement: >-
      IC annotations infer transcription initiation-coupled chromatin remodeling and transcription
      coactivator activity (contributes_to) from SAGA complex membership.
- id: GO_REF:0000120
  title: Combined Automated Annotation using Multiple IEA Methods
  findings:
  - statement: >-
      Combined automated methods annotate nuclear localization based on UniProt subcellular
      location and HAMAP rule.
- id: PMID:19056896
  title: The S. pombe SAGA complex controls the switch from proliferation to sexual
    differentiation through the opposing roles of its subunits Gcn5 and Spt8.
  findings:
  - statement: >-
      Helmlinger et al. (2008) purified the S. pombe SAGA complex and identified all 19 subunits
      by mass spectrometry, confirming that Sgf11 is a component of SAGA.
    supporting_text: >-
      Purification of the S. pombe SAGA complex showed that its subunit composition is identical to that of Saccharomyces cerevisiae
  - statement: >-
      The SAGA complex controls the switch from proliferation to sexual differentiation through
      opposing roles of Gcn5 (represses ste11 in rich media) and Spt8 (activates ste11 during
      starvation).
    supporting_text: >-
      SAGA has two opposing roles regulating sexual differentiation. First, in nutrient-rich conditions, the SAGA histone acetyltransferase Gcn5 represses ste11(+), which encodes the master regulator of the mating pathway. In contrast, the SAGA subunit Spt8 is required for the induction of ste11(+) upon nutrient starvation
- id: PMID:21642955
  title: Tra1 has specific regulatory roles, rather than global functions, within
    the SAGA co-activator complex.
  findings:
  - statement: >-
      Helmlinger et al. (2011) showed that Tra1 has specific regulatory roles in SAGA rather
      than being globally required, and that SAGA assembles without Tra1 in S. pombe.
    supporting_text: >-
      in a tra1Δ mutant, SAGA assembles and is recruited to some, but not all, promoters. Consistent with these findings, Tra1 regulates the expression of only a subset of SAGA-dependent genes
  - statement: >-
      The SAGA complex is a conserved multifunctional co-activator with broad roles in
      eukaryotic transcription.
    supporting_text: >-
      The SAGA complex is a conserved, multifunctional co-activator that has broad roles in eukaryotic transcription
- id: PMID:29079657
  title: TORC1 and TORC2 converge to regulate the SAGA co-activator in response to
    nutrient availability.
  findings:
  - statement: >-
      Laboucarié et al. (2017) demonstrated that SAGA is regulated by TORC1 and TORC2 signaling
      pathways through differential phosphorylation of the Taf12 subunit, controlling cell fate
      decisions in S. pombe.
    supporting_text: >-
      SAGA responds to nutrients through the differential phosphorylation of its Taf12 component, downstream of both the TORC1 and TORC2 pathways
  - statement: >-
      Proteomic and biochemical approaches confirmed the composition of the SAGA complex in
      S. pombe, including Sgf11.
    supporting_text: >-
      using a combination of genetic, biochemical, and proteomic approaches, we show that SAGA responds to nutrients through the differential phosphorylation of its Taf12 component
core_functions:
- description: >-
    Sgf11 is a structural subunit of the DUB module of the SAGA complex. Its zinc finger domain
    forms the catalytic lobe with Ubp8, and it is required to recruit Ubp8 and Sus1 into SAGA.
    Through this role, it contributes to SAGA-mediated transcription coactivator activity and
    chromatin remodeling via histone H2B deubiquitination.
