id: P87303
gene_symbol: tfb2
product_type: PROTEIN
status: IN_PROGRESS
taxon:
  id: NCBITaxon:284812
  label: Schizosaccharomyces pombe (strain 972 / ATCC 24843)
description: >-
  Tfb2 (transcription factor B subunit 2) is a core subunit of the general
  transcription and DNA repair factor IIH (TFIIH) complex in S. pombe. It is
  a component of the 7-subunit TFIIH core complex (containing XPB/ptr8,
  XPD/rad15, ssl1, tfb1, tfb2, tfb4, and tfb5), which participates in
  nucleotide excision repair (NER) of damaged DNA. The core complex also
  associates with the 3-subunit TFIIK kinase module (mcs2/cyclin H,
  mcs6/cdk7, pmh1/tfb3) to form the 10-subunit holo-TFIIH, which is
  essential for RNA polymerase II transcription initiation. Tfb2 is the
  ortholog of human GTF2H4 (p52 subunit) and S. cerevisiae Tfb2, and is
  known to stimulate the ATPase activity of the XPB helicase subunit.
  Reconstitution experiments in S. pombe demonstrated that TFIIH containing
  tfb2 supports both basal and activated transcription in vitro (PMID:15182371,
  PMID:8303296). Tfb2 was identified as a component of the S. pombe TFIIH
  complex through biochemical purification (PMID:14534314).
existing_annotations:
- term:
    id: GO:0000439
    label: transcription factor TFIIH core complex
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      Tfb2 is a well-established component of the TFIIH core complex in S. pombe.
      The UniProt record states it is a "Component of the 7-subunit TFIIH core
      complex composed of XPB/ptr8, XPD/rad15, ssl1, tfb1, tfb2, tfb4 and tfb5"
      (PMID:14534314). This IBA annotation is phylogenetically supported by orthologs
      in S. cerevisiae (Tfb2/S000006043), human (GTF2H4/Q92759), and Drosophila.
    action: ACCEPT
    reason: >-
      Tfb2 is a defining subunit of the TFIIH core complex. This is one of the
      best-established aspects of the protein's function, confirmed by biochemical
      purification and co-purification studies in S. pombe (PMID:14534314).
      The IBA annotation is well-supported by phylogenetic conservation across eukaryotes.
    supported_by:
      - reference_id: PMID:14534314
        supporting_text: >-
          We have now purified S. pombe RNA polymerase II and its
          general initiation factors TFIIB, TFIIF, TFIIE, and TFIIH to near homogeneity
- term:
    id: GO:0003690
    label: double-stranded DNA binding
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      This IBA annotation assigns double-stranded DNA binding activity to tfb2,
      inferred from phylogenetic analysis with S. cerevisiae Tfb2 and other orthologs.
      TFIIH as a complex interacts with DNA during both transcription initiation and
      NER, and the p52/Tfb2 subunit is known to contribute to the DNA-binding
      properties of the complex. However, direct experimental evidence for
      independent DNA binding by the tfb2 subunit alone in S. pombe is limited.
      The IBA annotation is reasonable given the phylogenetic support.
    action: ACCEPT
    reason: >-
      The IBA annotation is phylogenetically supported and consistent with the
      known role of TFIIH in DNA binding during transcription and NER. The p52/Tfb2
      family is known to interact with DNA within the TFIIH complex context.
- term:
    id: GO:0005675
    label: transcription factor TFIIH holo complex
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      Tfb2 is part of the TFIIH holo complex, which comprises the core complex
      plus the TFIIK kinase module. The UniProt record explicitly states that
      "The core complex associates with the 3-subunit CTD-kinase module TFIIK
      composed of mcs2/cyclin H, mcs6/cdk7 and pmh1/tfb3 to form the 10-subunit
      holoenzyme (holo-TFIIH) active in transcription" (PMID:14534314).
    action: ACCEPT
    reason: >-
      The core complex containing tfb2 is incorporated into the holo-TFIIH, and
      this is well supported by co-purification data in S. pombe. The IBA
      annotation aligns with experimental evidence from PMID:14534314.
    supported_by:
      - reference_id: PMID:14534314
        supporting_text: >-
          We have now purified S. pombe RNA polymerase II and its
          general initiation factors TFIIB, TFIIF, TFIIE, and TFIIH to near homogeneity
- term:
    id: GO:0006289
    label: nucleotide-excision repair
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      TFIIH has a well-established role in nucleotide excision repair (NER), and
      tfb2 is a core subunit of this complex. The UniProt function annotation
      states that TFIIH "is involved in general and transcription-coupled nucleotide
      excision repair (NER) of damaged DNA" and "In NER, TFIIH acts by opening DNA
      around the lesion to allow the excision of the damaged oligonucleotide."
      The IBA annotation is phylogenetically supported across eukaryotes.
    action: ACCEPT
    reason: >-
      NER is one of the two core biological functions of the TFIIH complex
      (along with transcription). As a core subunit of TFIIH, tfb2 is directly
      involved in NER. This is supported by the conserved function of TFIIH
      across eukaryotes and by phylogenetic inference.
- term:
    id: GO:0000439
    label: transcription factor TFIIH core complex
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: >-
      This IEA annotation from InterPro (IPR004598, TFIIH_p52/Tfb2 family)
      correctly identifies tfb2 as a component of the TFIIH core complex. This
      is consistent with the IBA annotation and experimental evidence.
    action: ACCEPT
    reason: >-
      Redundant with the IBA annotation but correctly assigns tfb2 to the TFIIH
      core complex based on domain family membership. The InterPro mapping is
      accurate for this well-characterized protein family.
- term:
    id: GO:0001671
    label: ATPase activator activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: >-
      This IEA annotation from InterPro assigns ATPase activator activity to tfb2.
      The p52/Tfb2 subunit of TFIIH is known to stimulate the ATPase activity of
      the XPB helicase subunit (ptr8 in S. pombe). Studies in the human and
      yeast systems have shown that p52 directly interacts with XPB and enhances
      its ATPase activity, which is essential for promoter opening during
      transcription initiation and for DNA unwinding during NER. This is a
      well-characterized function of the Tfb2/p52 family across eukaryotes.
    action: ACCEPT
    reason: >-
      ATPase activator activity is a well-established molecular function of the
      p52/Tfb2 family. The stimulation of XPB ATPase by p52 has been demonstrated
      biochemically in multiple organisms and is consistent with the InterPro
      family assignment.
- term:
    id: GO:0005634
    label: nucleus
  evidence_type: IEA
  original_reference_id: GO_REF:0000044
  review:
    summary: >-
      This IEA annotation assigns nuclear localization to tfb2, inferred from the
      UniProt subcellular location annotation. UniProt lists the subcellular
      location as "Nucleus" (by similarity). As a transcription factor and DNA
      repair component, nuclear localization is expected and consistent with
      its function.
    action: ACCEPT
    reason: >-
      Nuclear localization is the expected primary localization for a TFIIH
      subunit involved in transcription and DNA repair. The UniProt annotation
      is based on similarity to characterized orthologs.
- term:
    id: GO:0006289
    label: nucleotide-excision repair
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: >-
      This IEA annotation from InterPro assigns NER involvement, consistent with
      the IBA annotation for the same term. The InterPro family IPR004598
      (TFIIH_p52/Tfb2) maps correctly to the NER process.
    action: ACCEPT
    reason: >-
      Redundant with the IBA annotation but correctly assigns NER involvement
      based on the InterPro domain family. NER is a core function of the TFIIH
      complex of which tfb2 is a subunit.
- term:
    id: GO:0006366
    label: transcription by RNA polymerase II
  evidence_type: IEA
  original_reference_id: GO_REF:0000117
  review:
    summary: >-
      This IEA annotation from ARBA assigns involvement in transcription by RNA
      polymerase II. TFIIH is a general transcription factor required for RNA Pol II
      transcription initiation. This is broader than the more specific GO:0006367
      (transcription initiation at RNA polymerase II promoter) assigned by
      experimental evidence. The broader term is acceptable as the TFIIH complex
      is involved in multiple aspects of Pol II transcription including initiation,
      promoter escape, and early elongation.
    action: ACCEPT
    reason: >-
      This term is broader than GO:0006367 but remains accurate. TFIIH
      participates in multiple steps of Pol II transcription beyond just
      initiation, including promoter escape and CTD phosphorylation. The ARBA
      annotation is consistent with the known role of tfb2 as part of TFIIH.
- term:
    id: GO:0006367
    label: transcription initiation at RNA polymerase II promoter
  evidence_type: EXP
  original_reference_id: PMID:8303296
  review:
    summary: >-
      Li et al. (1994) reconstituted an RNA polymerase II transcription system from
      S. pombe extracts, demonstrating that TFIIH (along with other general
      transcription factors including TFIIB, TFIIE, TFIIF) is required for
      transcription initiation. The study resolved and reconstituted the complete
      transcription system and showed functional interactions between TFIIE-TFIIH.
      As tfb2 is a core subunit of the TFIIH complex, this supports its
      involvement in transcription initiation.
    action: ACCEPT
    reason: >-
      The experimental evidence from PMID:8303296 directly demonstrates that the
      S. pombe TFIIH complex is functional in transcription initiation. The study
      used a reconstituted system from S. pombe extracts and showed that TFIIH
      components participate in start site selection and transcription initiation.
    supported_by:
      - reference_id: PMID:8303296
        supporting_text: >-
          An RNA polymerase II transcription system was resolved and reconstituted from
          extracts of Schizosaccharomyces pombe
- term:
    id: GO:0016251
    label: RNA polymerase II general transcription initiation factor activity
  evidence_type: EXP
  original_reference_id: PMID:8303296
  review:
    summary: >-
      Li et al. (1994) demonstrated that S. pombe TFIIH (containing tfb2) functions
      as a general transcription initiation factor in a reconstituted in vitro system.
      The study showed that TFIIH along with TFIIB, TFIIE, TFIIF, and TBP are
      required for Pol II transcription initiation in S. pombe. Tfb2 as a core
      subunit of TFIIH contributes to this general transcription factor activity.
    action: ACCEPT
    reason: >-
      TFIIH is one of the canonical general transcription factors required for
      RNA polymerase II transcription initiation. The study directly demonstrates
      TFIIH function in the S. pombe in vitro transcription system. This MF
      annotation accurately describes the molecular function of the TFIIH complex
      to which tfb2 contributes.
    supported_by:
      - reference_id: PMID:8303296
        supporting_text: >-
          Two components, counterparts of human
          transcription factor IIF (TFIIF) and TFIIH, could be exchanged individually
          between systems without effect on the start site
- term:
    id: GO:0016251
    label: RNA polymerase II general transcription initiation factor activity
  evidence_type: IDA
  original_reference_id: PMID:15182371
  review:
    summary: >-
      Tamayo et al. (2004) reconstituted an in vitro transcription system from
      S. pombe using affinity-purified RNAPII, TFIIH, and recombinant TBP, TFIIB,
      TFIIE, and TFIIF. The system supported both basal transcription from the
      adenovirus major late promoter and activated transcription when the Mediator
      was included. This directly demonstrates that S. pombe TFIIH (containing tfb2)
      has general transcription initiation factor activity.
    action: ACCEPT
    reason: >-
      The study provides direct experimental evidence for TFIIH function as a
      general transcription factor in S. pombe. The reconstituted system using
      purified S. pombe factors confirms the activity.
    supported_by:
      - reference_id: PMID:15182371
        supporting_text: >-
          we describe a reconstituted in vitro
          transcription system that consists of the following preparations of factors from
          the yeast Schizosaccharomyces pombe: affinity-purified RNAPII, TFIIH, and
          recombinant TBP, TFIIB, TFIIE and TFIIF
- term:
    id: GO:0006367
    label: transcription initiation at RNA polymerase II promoter
  evidence_type: IDA
  original_reference_id: PMID:15182371
  review:
    summary: >-
      Tamayo et al. (2004) showed that the reconstituted S. pombe system with
      purified TFIIH supports basal transcription from the adenovirus major late
      promoter and activated transcription with the Mediator holoenzyme. This
      demonstrates TFIIH involvement in transcription initiation at Pol II promoters.
    action: ACCEPT
    reason: >-
      Direct experimental evidence confirms TFIIH-dependent transcription initiation
      in S. pombe. The reconstituted system demonstrates that TFIIH is required for
      both basal and activated transcription from Pol II promoters.
    supported_by:
      - reference_id: PMID:15182371
        supporting_text: >-
          We show that this system can support
          basal transcription from the adenovirus major late promoter when purified RNAPII
          is used and activated transcription when the RNAPII holoenzyme (RNAPII plus the
          Mediator proteins) is included in the reaction
- term:
    id: GO:0005737
    label: cytoplasm
  evidence_type: HDA
  original_reference_id: PMID:16823372
  review:
    summary: >-
      Matsuyama et al. (2006) performed a global protein localization study in
      S. pombe using YFP-tagged ORFs, determining the localization of approximately
      90% of the proteome. The HDA (high-throughput direct assay) annotation
      assigns cytoplasmic localization to tfb2. While the nuclear localization is
      expected for a TFIIH subunit, cytoplasmic localization may reflect the site
      of protein synthesis or a cytoplasmic pool of unassembled subunits. In the
      high-throughput study, some nuclear proteins may appear cytoplasmic if the
      C-terminal YFP tag interferes with nuclear import or complex assembly.
    action: KEEP_AS_NON_CORE
    reason: >-
      Cytoplasmic localization from a high-throughput tagging study may represent
      a genuine secondary pool or could be an artifact of C-terminal tagging
      interfering with nuclear import. The primary functional localization of tfb2
      is nuclear, as expected for a TFIIH subunit. This annotation is not incorrect
      but does not represent the core functional localization.
    supported_by:
      - reference_id: PMID:16823372
        supporting_text: >-
          we determined the localization of 4,431 proteins, corresponding to
          approximately 90% of the fission yeast proteome, by tagging each ORF with the
          yellow fluorescent protein
- term:
    id: GO:0000112
    label: nucleotide-excision repair factor 3 complex
  evidence_type: ISO
  original_reference_id: GO_REF:0000024
  review:
    summary: >-
      This ISO annotation assigns tfb2 to the NER factor 3 complex (NEF3, also
      known as TFIIH), inferred from the S. cerevisiae ortholog Tfb2 (SGD:S000006043).
      The NER factor 3 complex is essentially another name for TFIIH in its NER
      role. This is consistent with the well-established role of tfb2 as a TFIIH
      core subunit. The term GO:0000112 is defined as "A protein complex that
      catalyzes the formation of an open bubble structure in the DNA around the
      site of the lesion" and is synonymous with TFIIH in the NER context.
    action: ACCEPT
    reason: >-
      TFIIH functions as NER factor 3 during nucleotide excision repair. The ISO
      annotation from S. cerevisiae Tfb2 is well justified, as the TFIIH complex
      composition and NER function are highly conserved between S. pombe and S.
      cerevisiae.
references:
- id: GO_REF:0000002
  title: Gene Ontology annotation through association of InterPro records with GO terms
  findings:
    - statement: >-
        InterPro family IPR004598 (TFIIH_p52/Tfb2) maps to GO terms for TFIIH core
        complex membership, ATPase activator activity, and nucleotide-excision repair.
- id: GO_REF:0000024
  title: Manual transfer of experimentally-verified manual GO annotation data to orthologs
    by curator judgment of sequence similarity
  findings:
    - statement: >-
        Annotations transferred from S. cerevisiae Tfb2 (SGD:S000006043) to S. pombe
        tfb2 based on sequence similarity and conserved function within the TFIIH complex.
- id: GO_REF:0000033
  title: Annotation inferences using phylogenetic trees
  findings:
    - statement: >-
        IBA annotations for TFIIH core complex, holo complex, DNA binding, and NER
        are inferred from phylogenetic analysis of the Tfb2/p52 protein family across
        eukaryotes, supported by orthologs in S. cerevisiae, human, and Drosophila.
- id: GO_REF:0000044
  title: Gene Ontology annotation based on UniProtKB/Swiss-Prot Subcellular Location
    vocabulary mapping, accompanied by conservative changes to GO terms applied by
    UniProt
  findings:
    - statement: >-
        Nuclear localization inferred from UniProt subcellular location annotation.
- id: GO_REF:0000117
  title: Electronic Gene Ontology annotations created by ARBA machine learning models
  findings:
    - statement: >-
        ARBA model ARBA00028158 predicts involvement in transcription by RNA polymerase II,
        consistent with the known function of the TFIIH complex.
- id: PMID:15182371
  title: Mediator is required for activated transcription in a Schizosaccharomyces
    pombe in vitro system.
  findings:
    - statement: >-
        Reconstituted S. pombe in vitro transcription system using purified RNAPII,
        TFIIH, and recombinant general transcription factors (TBP, TFIIB, TFIIE, TFIIF)
        supports both basal and activated transcription.
      supporting_text: >-
        we describe a reconstituted in vitro
        transcription system that consists of the following preparations of factors from
        the yeast Schizosaccharomyces pombe: affinity-purified RNAPII, TFIIH, and
        recombinant TBP, TFIIB, TFIIE and TFIIF
    - statement: >-
        Mediator is required for activated transcription but not basal transcription
        in the S. pombe system.
      supporting_text: >-
        We show that this system can support
        basal transcription from the adenovirus major late promoter when purified RNAPII
        is used and activated transcription when the RNAPII holoenzyme (RNAPII plus the
        Mediator proteins) is included in the reaction
    - statement: >-
        S. pombe uses the same set of general transcription factors as other eukaryotes.
      supporting_text: >-
        These results indicate that Sc. pombe uses the same set of
        general transcription factors as other eukaryotes and that the Mediator is
        involved in activated transcription
- id: PMID:16823372
  title: ORFeome cloning and global analysis of protein localization in the fission
    yeast Schizosaccharomyces pombe.
  findings:
    - statement: >-
        Global protein localization study using YFP-tagged ORFs determined the
        subcellular localization of approximately 90% of the S. pombe proteome.
        Tfb2 was assigned cytoplasmic localization in this high-throughput screen.
      supporting_text: >-
        we determined the localization of 4,431 proteins, corresponding to
        approximately 90% of the fission yeast proteome, by tagging each ORF with the
        yellow fluorescent protein
- id: PMID:8303296
  title: RNA polymerase II initiation factor interactions and transcription start
    site selection.
  findings:
    - statement: >-
        An RNA polymerase II transcription system was resolved and reconstituted from
        S. pombe extracts, demonstrating functional TFIIH in transcription initiation.
      supporting_text: >-
        An RNA polymerase II transcription system was resolved and reconstituted from
        extracts of Schizosaccharomyces pombe
    - statement: >-
        TFIIH and TFIIF could be exchanged between S. pombe and S. cerevisiae systems
        individually without affecting the transcription start site, demonstrating
        functional conservation.
      supporting_text: >-
        Two components, counterparts of human
        transcription factor IIF (TFIIF) and TFIIH, could be exchanged individually
        between systems without effect on the start site
    - statement: >-
        Functional interactions exist between TFIIE-TFIIH and between TFIIB-RNA
        polymerase II during transcription initiation.
      supporting_text: >-
        Three components, counterparts
        of human TFIIB, TFIIE, and RNA polymerase II, could not be exchanged
        individually but could be swapped in the pairs TFIIE-TFIIH and TFIIB-RNA
        polymerase II, which demonstrates that there are functional interactions between
        these components
- id: PMID:14534314
  title: Mediator influences Schizosaccharomyces pombe RNA polymerase II-dependent
    transcription in vitro.
  findings:
    - statement: >-
        Tfb2 was identified as a subunit of the S. pombe TFIIH complex through
        biochemical purification. TFIIH was purified to near homogeneity and shown
        to function in reconstituted transcription.
      supporting_text: >-
        We have now purified S. pombe RNA polymerase II and its
        general initiation factors TFIIB, TFIIF, TFIIE, and TFIIH to near homogeneity
core_functions:
- description: >-
    Tfb2 functions as a core structural subunit of the TFIIH complex, serving as a
    general transcription initiation factor for RNA polymerase II. As part of the
    holo-TFIIH complex, it is essential for promoter opening and transcription
    initiation. The p52/Tfb2 subunit stimulates the ATPase activity of the XPB
    helicase, which is required for DNA strand separation during both transcription
    initiation and NER.
  molecular_function:
    id: GO:0016251
    label: RNA polymerase II general transcription initiation factor activity
  directly_involved_in:
    - id: GO:0006367
      label: transcription initiation at RNA polymerase II promoter
  locations:
    - id: GO:0005634
      label: nucleus
  in_complex:
    id: GO:0005675
    label: transcription factor TFIIH holo complex
  supported_by:
    - reference_id: PMID:8303296
      supporting_text: >-
        An RNA polymerase II transcription system was resolved and reconstituted from
        extracts of Schizosaccharomyces pombe
    - reference_id: PMID:15182371
      supporting_text: >-
        we describe a reconstituted in vitro
        transcription system that consists of the following preparations of factors from
        the yeast Schizosaccharomyces pombe: affinity-purified RNAPII, TFIIH, and
        recombinant TBP, TFIIB, TFIIE and TFIIF
- description: >-
    As part of the TFIIH core complex, tfb2 is involved in nucleotide excision
    repair (NER). The TFIIH complex opens DNA around the lesion to allow excision
    of the damaged oligonucleotide and its replacement. Tfb2 stimulates the XPB
    ATPase activity needed for this DNA unwinding step.
  molecular_function:
    id: GO:0001671
    label: ATPase activator activity
  directly_involved_in:
    - id: GO:0006289
      label: nucleotide-excision repair
  locations:
    - id: GO:0005634
      label: nucleus
  in_complex:
    id: GO:0000439
    label: transcription factor TFIIH core complex
