description: SFT model incorrectly predicts alcohol dehydrogenase and arabitol metabolism
  for this sorbose reductase (sou1); mitochondrion prediction is in GOA but AIGR flags
  for removal due to likely false-positive HDA localization.
references:
- id: doi:10.64898/2026.03.19.712954
  title: BioReason-Pro (Fallahpour et al. 2026)
predictions:
- source_method: BioReason-Pro-SFT
  source_version: wanglab/protein_catalogue
  source_reference_id: doi:10.64898/2026.03.19.712954
  predicted_term:
    id: GO:0008106
    label: alcohol dehydrogenase (NADP+) activity
  predicted_term_type: GO_MF
  review:
    assessment: LSP
    confidence_score: 2
    summary: >-
      Reassessed from NPI to LSP on independent review. sou1/SPAC8E11.10 is a sorbose reductase
      (GO:0032115, EC 1.1.1.289) whose catalytic activity is D-sorbitol + NADP(+) = keto-L-sorbose
      + NADPH -- a genuine NADP+-dependent polyol/alcohol oxidoreductase. GO:0008106 (alcohol
      dehydrogenase (NADP+) activity) is therefore not wrong, just less precise than the specific
      sorbose-reductase term the review accepts as core (GO:0032115). An independent OpenScientist
      investigation (see file reference) reaches the same conclusion, rating GO:0008106 defensible
      as a broad activity class but less informative. LSP rather than NPI (the earlier
      "not an alcohol dehydrogenase" wording is superseded).
    supported_by:
      - reference_id: file:SCHPO/SPAC8E11.10/SPAC8E11.10-hypotheses/prediction-nadp-arabitol-dehydrogenase/openscientist.md
        supporting_text: Defensible as a broad activity class

- source_method: BioReason-Pro-SFT
  source_version: wanglab/protein_catalogue
  source_reference_id: doi:10.64898/2026.03.19.712954
  predicted_term:
    id: GO:0019677
    label: arabitol metabolic process
  predicted_term_type: GO_BP
  review:
    assessment: NPI
    confidence_score: 0
    error_type: PARALOG_OVERANNOTATION
    summary: Incorrect. sou1 acts on L-sorbose and D-sorbitol (hexose sugar and hexitol),
      not arabitol (a pentitol). UniProt confirms "Catalyzes the NADP dependent reduction
      of L-sorbose to D-glucitol." The AIGR review proposes sorbitol metabolic process
      (GO:0006060) and L-sorbose catabolic process (GO:0042850) as appropriate process
      terms, not arabitol metabolism. Confusion likely arises from sequence similarity
      among SDR polyol-active enzymes. An independent OpenScientist investigation (see file
      reference) confirms this NPI -- no assay links SPAC8E11.10 to arabitol (a pentitol); its
      characterized activity is on L-sorbose / D-sorbitol (a hexose/hexitol), so arabitol
      metabolic process is a substrate misassignment.
    supported_by:
      - reference_id: file:SCHPO/SPAC8E11.10/SPAC8E11.10-hypotheses/prediction-nadp-arabitol-dehydrogenase/openscientist.md
        supporting_text: No assay links SPAC8E11.10 to arabitol

- source_method: BioReason-Pro-SFT
  source_version: wanglab/protein_catalogue
  source_reference_id: doi:10.64898/2026.03.19.712954
  predicted_term:
    id: GO:0005739
    label: mitochondrion
  predicted_term_type: GO_CC
  review:
    assessment: CNN
    confidence_score: 1
    summary: In GOA as HDA evidence from a large-scale YFP localization study (PMID:16823372).
      However, the AIGR review recommends REMOVE for this annotation because sou1 lacks
      signal peptides or transmembrane domains and SDR enzymes of this type are typically
      cytosolic; the HDA is likely a false positive from proteome-wide screens. Prediction
      is technically CNN but the GOA annotation itself is of low confidence and flagged
      for removal.
