core_functions:
- description: >-
    Binds and sequesters the APC/C coactivator Slp1 (Cdc20), the key target of the spindle
    assembly checkpoint, preventing it from activating APC/C-dependent proteolysis.
  supported_by:
  - reference_id: PMID:9461438
    supporting_text: >-
      Mad2 formed a complex with Slp1, a WD (tryptophan-aspartic acid)-repeat protein essential
      for the onset of anaphase. When the physical interaction between the two proteins was
      disrupted, the spindle checkpoint was no longer functional.
    reference_section_type: ABSTRACT
- description: >-
    As a component of the mitotic checkpoint complex (Mad2-Mad3-Slp1/Cdc20), C-Mad2 stabilizes
    the MCC and the assembled complex binds and inhibits the mitotic APC/C E3 ubiquitin ligase by
    obstructing Cdc20 degron-recognition sites.
  supported_by:
  - reference_id: PMID:22437499
    supporting_text: >-
      The MCC inhibits the APC/C by obstructing degron recognition sites on Cdc20 ... Mad2, in the
      closed conformation (C-Mad2), stabilizes the complex by optimally positioning the Mad3
      KEN-box degron to bind Cdc20.
    reference_section_type: ABSTRACT
- description: >-
    Acts in mitotic spindle assembly checkpoint signaling at unattached kinetochores, generating
    the wait-anaphase signal that delays the metaphase-to-anaphase transition until bipolar
    attachment is achieved.
  supported_by:
  - reference_id: PMID:9223296
    supporting_text: >-
      mad2 overexpression activates the checkpoint and causes a cell cycle arrest at the
      metaphase-to-anaphase transition.
    reference_section_type: ABSTRACT
  - reference_id: PMID:24477934
    supporting_text: >-
      A complex between the checkpoint proteins Mad1 and Mad2 provides a platform for Mad2:Mad2
      dimerization at unattached kinetochores, which enables Mad2 to delay anaphase.
    reference_section_type: ABSTRACT
proposed_new_terms: []
suggested_questions:
- question: >-
    How is the conformational conversion of O-Mad2 to C-Mad2 templated at fission yeast unattached
    kinetochores, and what controls its rate to set checkpoint sensitivity?
- question: >-
    What is the in vivo stoichiometry and turnover of the Mad2-Slp1/Cdc20 and MCC pools, and how
    does Mph1-dependent phosphorylation of Mad2 modulate them?
suggested_experiments:
- description: >-
    Quantitative live-cell imaging of O-Mad2/C-Mad2 conversion at unattached kinetochores using
    conformation-specific reporters, combined with mad1 and mph1 perturbations, to dissect the
    Mad2 template mechanism in fission yeast.
- description: >-
    Structure-guided separation-of-function mutants of the Mad2-Slp1/Cdc20 interface assayed for
    APC/C inhibition in vitro and for checkpoint maintenance in vivo, to define the contribution of
    direct Mad2-Cdc20 binding versus MCC assembly.
