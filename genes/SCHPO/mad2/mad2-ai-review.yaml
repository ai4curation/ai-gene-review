- id: PMID:11331883
  title: Fission yeast Bub1 is essential in setting up the meiotic pattern of chromosome
    segregation.
  findings:
  - statement: >-
      Mad2 (with Bub1) is required to prevent meiosis I non-disjunction, showing that the mitotic
      SAC machinery also operates in meiosis.
    supporting_text: >-
      Both proteins are required to prevent the occurrence of non-disjunction events in MI, which is
      consistent with recent findings that components of the mitotic-spindle checkpoint also operate
      during meiosis.
    reference_section_type: ABSTRACT
- id: PMID:11432827
  title: Fission yeast ch-TOG/XMAP215 homologue Alp14 connects mitotic spindles with
    the kinetochore and is a component of the Mad2-dependent spindle checkpoint.
  findings:
  - statement: Alp14 is a component of the Mad2-dependent spindle checkpoint cascade.
    supporting_text: >-
      Alp14 itself is a component of the Mad2-dependent spindle checkpoint cascade
    reference_section_type: ABSTRACT
- id: PMID:11909965
  title: Fission yeast Mad3p is required for Mad2p to inhibit the anaphase-promoting
    complex and localizes to kinetochores in a Bub1p-, Bub3p-, and Mph1p-dependent
    manner.
  findings:
  - statement: >-
      Mad3 coimmunoprecipitates Bub3, Mad2 and Slp1/Cdc20, and Mad3 is required for overexpressed
      Mad2 to cause metaphase arrest.
    supporting_text: >-
      Mad3p coimmunoprecipitates Bub3p, Mad2p, and the spindle checkpoint effector Slp1/Cdc20p.
    reference_section_type: ABSTRACT
- id: PMID:11950879
  title: Control of localization of a spindle checkpoint protein, Mad2, in fission
    yeast.
  findings:
  - statement: >-
      Mad2 targets Slp1/Cdc20 to prevent proteolysis; colocalizes with Slp1 at unattached
      kinetochores; localizes to nuclear periphery and chromatin in interphase in a Mad1-dependent
      manner; on the spindle after attachment.
    supporting_text: >-
      the Mad2-Slp1 complex was stable and the two proteins were colocalized to unattached
      kinetochores. When the spindle attachment was completed ... only Mad2 was found associated to
      the spindle.
    reference_section_type: ABSTRACT
- id: PMID:12426374
  title: Spindle-kinetochore attachment requires the combined action of Kin I-like
    Klp5/6 and Alp14/Dis1-MAPs in fission yeast.
  findings:
  - statement: Mad2 is recruited to unattached mitotic kinetochores in klp5 mutants.
    supporting_text: >-
      In klp5 mutants, spindle checkpoint proteins Mad2 and Bub1 are recruited to mitotic
      kinetochores for a prolonged duration, indicating that these kinetochores are unattached.
    reference_section_type: ABSTRACT
- id: PMID:12676091
  title: S. pombe aurora kinase/survivin is required for chromosome condensation and
    the spindle checkpoint attachment response.
  findings:
  - statement: >-
      Ark1 (aurora) is required for full-scale Mad2 association with kinetochores and for formation
      of the Mad2-Mad3 complex during checkpoint activation.
    supporting_text: >-
      it was required for two aspects of Mad2 function that accompany checkpoint activation:
      full-scale association with kinetochores and formation of a complex with Mad3.
    reference_section_type: ABSTRACT
- id: PMID:15930132
  title: Spindle checkpoint signaling requires the mis6 kinetochore subcomplex, which
    interacts with mad2 and mitotic spindles.
  findings:
  - statement: >-
      Mad2 accumulates at unattached kinetochores; the Mis6 and Nuf2 complexes are required for
      Mad2 kinetochore loading, and Mis6 physically interacts with Mad2 when the checkpoint is
      active.
    supporting_text: >-
      The Mis6-complex physically interacts with Mad2 under the condition that the Mad2-dependent
      checkpoint is activated.
    reference_section_type: ABSTRACT
- id: PMID:18556659
  title: The spindle checkpoint functions of Mad3 and Mad2 depend on a Mad3 KEN box-mediated
    interaction with Cdc20-anaphase-promoting complex (APC/C).
  findings:
  - statement: >-
      Mad2 and Mad3 stably bind the mitotic APC/C (Mad2 via Cdc20); the S. pombe MCC consists
      exclusively of Mad3, Mad2 and Cdc20; the Mad3 N-terminal KEN box is required for APC/C
      inhibition and anaphase delay.
    supporting_text: >-
      we find that the Mad3 and Mad2 spindle checkpoint proteins interact stably with the APC/C in
      mitosis
    reference_section_type: ABSTRACT
- id: PMID:21920317
  title: Repositioning of aurora B promoted by chiasmata ensures sister chromatid
    mono-orientation in meiosis I.
  findings:
  - statement: >-
      In meiosis I, erroneous biorientation of univalents persists and eventually evades the spindle
      assembly checkpoint.
    supporting_text: >-
      this undesirable biorientation of univalents persists and eventually evades the spindle
      assembly checkpoint, provoking abnormal anaphase.
    reference_section_type: ABSTRACT
- id: PMID:22281223
  title: Kinase activity of fission yeast Mph1 is required for Mad2 and Mad3 to stably
    bind the anaphase promoting complex.
  findings:
  - statement: >-
      Mph1 (Mps1) kinase activity is required for Mad2/Mad3 to stably bind the APC/C; Mad2
      phosphosite mutants show reduced Cdc20-APC/C binding and cannot maintain checkpoint arrest.
    supporting_text: >-
      We map and mutate several phosphorylation sites in Mad2, producing mutants that display
      reduced Cdc20-APC/C binding and an inability to maintain checkpoint arrest.
    reference_section_type: ABSTRACT
- id: PMID:22437499
  title: Structure of the mitotic checkpoint complex.
  findings:
  - statement: >-
      Crystal structure of the S. pombe MCC (Mad2-Mad3-Cdc20); C-Mad2 stabilizes the MCC and the
      complex inhibits APC/C by obstructing Cdc20 degron-recognition sites and displacing Cdc20.
    supporting_text: >-
      The MCC inhibits the APC/C by obstructing degron recognition sites on Cdc20 (the substrate
      recruitment subunit of the APC/C) and displacing Cdc20 to disrupt formation of a bipartite
      D-box receptor with the APC/C subunit Apc10.
    reference_section_type: ABSTRACT
- id: PMID:24161933
  title: Determinants of robustness in spindle assembly checkpoint signalling.
  findings:
  - statement: >-
      Checkpoint-mediated stoichiometric inhibition of Slp1/Cdc20 underlies robustness; a ~20%
      reduction in core checkpoint proteins can impair signaling.
    supporting_text: >-
      Checkpoint-mediated stoichiometric inhibition of the anaphase activator Cdc20 (Slp1 in
      Schizosaccharomyces pombe) can account for the tolerance towards small fluctuations in protein
      abundance
    reference_section_type: ABSTRACT
- id: PMID:24477934
  title: Mad1 contribution to spindle assembly checkpoint signalling goes beyond presenting
    Mad2 at kinetochores.
  findings:
  - statement: >-
      The Mad1-Mad2 complex provides a platform for Mad2:Mad2 dimerization at unattached
      kinetochores, enabling Mad2 to delay anaphase.
    supporting_text: >-
      A complex between the checkpoint proteins Mad1 and Mad2 provides a platform for Mad2:Mad2
      dimerization at unattached kinetochores, which enables Mad2 to delay anaphase.
    reference_section_type: ABSTRACT
- id: PMID:26258632
  title: Mad1 promotes chromosome congression by anchoring a kinesin motor to the
    kinetochore.
  findings:
  - statement: >-
      Mad1 (the Mad2 partner) binds and anchors kinesin-5 Cut7 at kinetochores to promote chromosome
      congression, revealing a SAC-coupled congression function of the Mad1-Mad2 module.
    supporting_text: >-
      fission yeast Mad1 binds the plus-end-directed kinesin-5 motor protein Cut7 (Eg5 homologue)
    reference_section_type: ABSTRACT
- id: PMID:26483559
  title: Nup132 modulates meiotic spindle attachment in fission yeast by regulating
    kinetochore assembly.
  findings:
  - statement: >-
      Nup132 regulates timely KMN kinetochore assembly during meiosis, modulating meiotic spindle
      attachment in a SAC-relevant context.
    supporting_text: >-
      the nucleoporin Nup132 is required for timely assembly of the KMN proteins
    reference_section_type: ABSTRACT
- id: PMID:26882497
  title: Mps1Mph1 Kinase Phosphorylates Mad3 to Inhibit Cdc20Slp1-APC/C and Maintain
    Spindle Checkpoint Arrests.
  findings:
  - statement: >-
      Mps1(Mph1) phosphorylates Mad3 to inhibit Cdc20Slp1-APC/C and maintain spindle checkpoint
      arrests; Mad2 functions within this MCC pathway.
    supporting_text: >-
      Mps1Mph1 Kinase Phosphorylates Mad3 to Inhibit Cdc20Slp1-APC/C and Maintain Spindle Checkpoint
      Arrests
    reference_section_type: TITLE
- id: PMID:9223296
  title: The Schizosaccharomyces pombe spindle checkpoint protein mad2p blocks anaphase
    and genetically interacts with the anaphase-promoting complex.
  findings:
  - statement: >-
      mad2 is a fission yeast SAC component; deletion is TBZ-hypersensitive and bypasses mitosis
      without a spindle; overexpression arrests cells at the metaphase-to-anaphase transition by
      inhibiting APC-dependent proteolysis.
    supporting_text: >-
      mad2 overexpression activates the checkpoint and causes a cell cycle arrest at the
      metaphase-to-anaphase transition.
    reference_section_type: ABSTRACT
- id: PMID:9461438
  title: 'Fission yeast Slp1: an effector of the Mad2-dependent spindle checkpoint.'
  findings:
  - statement: >-
      Mad2 forms a complex with Slp1 (Cdc20); disrupting the interaction abolishes the spindle
      checkpoint and deregulates APC/C-mediated proteolysis.
    supporting_text: >-
      Mad2 formed a complex with Slp1, a WD (tryptophan-aspartic acid)-repeat protein essential for
      the onset of anaphase. When the physical interaction between the two proteins was disrupted,
      the spindle checkpoint was no longer functional.
    reference_section_type: ABSTRACT
