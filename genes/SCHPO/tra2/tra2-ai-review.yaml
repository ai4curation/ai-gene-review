id: Q10064
gene_symbol: tra2
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:284812
  label: Schizosaccharomyces pombe (strain 972 / ATCC 24843)
description: >-
  Tra2 is the NuA4-specific paralog of the PIKK-family pseudokinase Tra1 in S. pombe.
  Unlike S. cerevisiae, which has a single Tra1 shared between NuA4, SAGA, and ASTRA,
  S. pombe encodes two paralogs: Tra1 (SAGA/ASTRA-specific) and Tra2 (NuA4-specific).
  Tra2 serves as a central scaffold subunit essential for the overall integrity and
  assembly of the NuA4 histone acetyltransferase complex. Conditional depletion of Tra2
  causes a global decrease of all NuA4 subunits, demonstrating its structural importance
  for complex stability. Tra2 requires the Hsp90 chaperone and its cochaperone TTT
  (Tti2-Tel2-Tti1) for de novo incorporation into NuA4. It is also found as a shared
  subunit in the Swr1 chromatin remodeling complex. Tra2 belongs to the PI3K/PI4K-related
  kinase family but lacks catalytic residues, making it a pseudokinase. It contains
  26 HEAT repeats, FAT, PI3K/PI4K catalytic-like, and FATC domains.
existing_annotations:
- term:
    id: GO:0005634
    label: nucleus
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      IBA annotation inferred from phylogenetic analysis of PIKK family members
      including orthologs from S. cerevisiae, Drosophila, mouse, and human. Tra2 is
      a component of the nuclear NuA4 and Swr1 complexes, which function on chromatin,
      consistent with nuclear localization.
    action: ACCEPT
    reason: >-
      Nuclear localization is well supported by the known biology of Tra2 as a subunit
      of the NuA4 and Swr1 complexes, both of which act on chromatin in the nucleus.
      The IBA inference from conserved PIKK family members is phylogenetically sound.
    supported_by:
    - reference_id: PMID:19040720
      supporting_text: >-
        Complex IV (Sp_NuA4) comprises orthologues of the 12 core members of the
        Sc_NuA4 complex
    - reference_id: PMID:31748520
      supporting_text: >-
        Tra2 contributes to the scaffolding and stabilisation of the entire NuA4
        complex

- term:
    id: GO:0140861
    label: DNA repair-dependent chromatin remodeling
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      IBA annotation inferring involvement in DNA repair-dependent chromatin remodeling,
      propagated from PANTHER family PTN000124276. NuA4 is known to be involved in DNA
      repair through chromatin remodeling in S. cerevisiae, and UniProt describes Tra2
      as a component of NuA4 involved in transcription and DNA repair (PMID:19040720,
      PMID:21642955).
    action: ACCEPT
    reason: >-
      The NuA4 complex has a well-established role in DNA repair-dependent chromatin
      remodeling across eukaryotes. As a central scaffold subunit of NuA4, Tra2
      participates in this process. The IBA inference is phylogenetically sound
      and consistent with functional evidence.
    supported_by:
    - reference_id: PMID:31748520
      supporting_text: >-
        Tra2 contributes to the scaffolding and stabilisation of the entire NuA4
        complex

- term:
    id: GO:0035267
    label: NuA4 histone acetyltransferase complex
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      IBA annotation for NuA4 complex membership, inferred from phylogenetic analysis
      across multiple species. This is a core annotation for Tra2 and is independently
      confirmed by direct experimental evidence (IDA from PMID:19040720).
    action: ACCEPT
    reason: >-
      Tra2 membership in NuA4 is the central, most well-supported annotation for this
      gene product. It has been confirmed by mass spectrometry in multiple studies.
      The IBA annotation is consistent with and reinforced by direct experimental data.
    supported_by:
    - reference_id: PMID:19040720
      supporting_text: >-
        The other, Tra2, is a subunit of Sp_NuA4 and presumably the S. pombe
        SAGA/SLIK complexes
    - reference_id: PMID:31748520
      supporting_text: >-
        Quantitative MS analyses of Vid21 purification eluates confirmed an overall
        decrease of all 13 NuA4 subunits when Tra2 is depleted

- term:
    id: GO:0000785
    label: chromatin
  evidence_type: ISS
  original_reference_id: GO_REF:0000114
  review:
    summary: >-
      ISS annotation transferred from homologous complex data (ComplexPortal:CPX-2122).
      As a subunit of NuA4, which acts on chromatin to acetylate histones H4 and H2A.Z,
      localization to chromatin is expected.
    action: ACCEPT
    reason: >-
      NuA4 functions on chromatin to perform histone acetylation. As a scaffold
      subunit essential for NuA4 integrity, Tra2 would be expected to localize to
      chromatin as part of the complex. The ISS transfer from a well-characterized
      homologous complex is reasonable.

- term:
    id: GO:0006355
    label: regulation of DNA-templated transcription
  evidence_type: NAS
  original_reference_id: PMID:19915592
  review:
    summary: >-
      NAS annotation for transcription regulation. PMID:19915592 focuses on H2A.Z
      (Pht1) biology and the Swr1 and Mst1 complexes. Tra2 is not directly discussed
      in this paper but is part of NuA4 which is involved in transcription regulation.
      UniProt describes Tra2 as a component of NuA4 involved in transcription
      (PMID:21642955).
    action: ACCEPT
    reason: >-
      Tra2 is the NuA4-specific scaffold subunit. NuA4 is a histone acetyltransferase
      complex with established roles in transcriptional regulation. PMID:21642955
      directly demonstrates that Tra1 (the SAGA paralog) regulates expression of a
      subset of SAGA-dependent genes, and NuA4 similarly regulates transcription. As
      the scaffold subunit, Tra2 participates in this process. The NAS evidence code
      is appropriate for this general biological process annotation.
    supported_by:
    - reference_id: PMID:21642955
      supporting_text: >-
        Tra1 has specific regulatory roles, rather than global functions, within
        the SAGA co-activator complex

- term:
    id: GO:0000812
    label: Swr1 complex
  evidence_type: IDA
  original_reference_id: PMID:19915592
  review:
    summary: >-
      IDA annotation for Swr1 complex membership from PMID:19915592. This study
      characterized the Sp SWR-C by sequential affinity purification and mass
      spectrometry, identifying shared subunits between the SWR-C and the Mst1
      acetyltransferase (NuA4) complex. Tra2 was identified as a shared subunit.
      This is also consistent with the ComplexPortal entry CPX-26459 (Swr1 chromatin
      remodelling complex) listed in the UniProt record.
    action: ACCEPT
    reason: >-
      Direct experimental identification by mass spectrometry in PMID:19915592.
      The UniProt record cross-references ComplexPortal:CPX-26459 for the Swr1
      complex. In S. cerevisiae, the single Tra1 is shared between NuA4, SAGA,
      and also interacts with SWR-C components, so this is phylogenetically consistent.
    supported_by:
    - reference_id: PMID:19915592
      supporting_text: >-
        Reciprocal tagging and purification of these factors delineates the Sp SWR-C.
        This is almost identical in composition to the Sc SWR-C, even to the level
        where subunits shared between the Sp SWR and Mst1-acetyltransferase complexes
        are those shared by their Sc counterparts, the SWR-C and NuA4

- term:
    id: GO:0005198
    label: structural molecule activity
  evidence_type: EXP
  original_reference_id: PMID:31748520
  review:
    summary: >-
      EXP annotation for structural molecule activity from PMID:31748520. This study
      demonstrated that Tra2 has a general scaffolding role in NuA4 assembly. Conditional
      depletion of Tra2 caused a global decrease of all 13 NuA4 subunits, in contrast
      to Tra1 in SAGA where loss does not affect overall complex assembly.
    action: ACCEPT
    reason: >-
      Well-supported by direct experimental evidence. Elias-Villalobos et al. (2019)
      showed through conditional depletion, silver staining, and quantitative mass
      spectrometry that Tra2 serves as a structural scaffold for the entire NuA4
      complex. Loss of Tra2 destabilizes the whole complex, demonstrating that its
      structural role is its primary molecular function.
    supported_by:
    - reference_id: PMID:31748520
      supporting_text: >-
        Tra2 contributes to the scaffolding and stabilisation of the entire NuA4
        complex
    - reference_id: PMID:31748520
      supporting_text: >-
        upon Tra2 conditional depletion, we observed an overall decrease in the
        amount of purified NuA4 in both Epl1 and Vid21 purification eluates
    - reference_id: PMID:31748520
      supporting_text: >-
        Quantitative MS analyses of Vid21 purification eluates confirmed an overall
        decrease of all 13 NuA4 subunits when Tra2 is depleted

- term:
    id: GO:0035267
    label: NuA4 histone acetyltransferase complex
  evidence_type: IDA
  original_reference_id: PMID:19040720
  review:
    summary: >-
      IDA annotation for NuA4 complex membership from PMID:19040720. This study
      used sequential affinity purification and mass spectrometry to map the Chromatin
      Central proteomic environment in S. pombe, directly identifying Tra2 as a
      subunit of the NuA4 complex.
    action: ACCEPT
    reason: >-
      Direct experimental identification by mass spectrometry. Shevchenko et al. (2008)
      mapped the proteomic environment of chromatin-associated complexes in S. pombe
      and identified Tra2 as a subunit of the NuA4 complex. This is a core annotation
      for the gene product.
    supported_by:
    - reference_id: PMID:19040720
      supporting_text: >-
        The other, Tra2, is a subunit of Sp_NuA4 and presumably the S. pombe
        SAGA/SLIK complexes. In S. cerevisiae, the single Tra1 was found in all
        three complexes.

