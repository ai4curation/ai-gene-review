core_functions:
- description: >-
    Structural scaffold subunit of the NuA4 histone acetyltransferase complex. Tra2
    is essential for the integrity and stability of the entire NuA4 complex, with its
    conditional depletion causing a global decrease of all 13 NuA4 subunits. As a
    pseudokinase of the PIKK family, Tra2 lacks catalytic kinase activity but serves
    as a central structural platform for NuA4 assembly.
