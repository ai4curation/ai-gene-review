  label: Schizosaccharomyces pombe (strain 972 / ATCC 24843)
description: >-
  cmp7 (Charged multivesicular body protein 7; SPBC1604.18c) is the
  Schizosaccharomyces pombe ortholog of human CHMP7, an ESCRT-III-like /
  ESCRT-II–ESCRT-III hybrid protein of the SNF7 family. In fission yeast cmp7
  acts at the nuclear envelope (NE): it is recruited by the inner-nuclear-membrane
  LEM-domain protein Lem2 to the single NE hole formed by mitotic spindle pole
  body (SPB) extrusion during closed mitosis, where it forms a transient
  "grommet" that restricts the NE hole during anaphase B and is subsequently
  replaced by an ESCRT-III sealing module (Cmp2/Cmp3/Ist1/Vps4) that closes the
  NE in interphase. cmp7 is required for NE integrity, mitotic NE re-sealing,
  and the spontaneous loss-of-function suppression of the vps4 NE-morphology
  phenotype.
