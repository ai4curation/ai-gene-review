suggested_questions:
- question: Is the cmp7 grommet a stoichiometrically defined polymer (e.g., open
    spiral, helical filament) at the NE hole, and does its turnover require Vps4
    ATPase activity in S. pombe?
- question: Should the InterPro2GO mapping IPR005024 → GO:0007034 vacuolar transport
    be split / refined so that NE-specific Snf7-family members like cmp7/CHMP7
    do not inherit a vacuolar-transport annotation by default?
- question: Does cmp7 have any non-NE function in S. pombe (e.g., contribution to
    MVB sorting or vacuolar trafficking), or is the NE the exclusive functional
    compartment in this organism?
suggested_experiments:
- description: Use vps4-as / cmp7 timed depletion combined with super-resolution
    imaging of fluorescently tagged cmp7 to measure the lifetime, geometry, and
    Vps4-dependence of the grommet at the SPB-extrusion site, and to test whether
    cmp7 is displaced before sealing-module assembly.
  hypothesis: cmp7 forms a transient grommet whose disassembly requires Vps4 ATPase
    activity and is a prerequisite for assembly of the Cmp2/Cmp3/Ist1 sealing
    module on the NE hole.
- description: Compare cmp7Δ phenotypes for canonical MVB sorting / vacuolar
    delivery cargoes (e.g., CPY-like, Sty1-GFP) against NE-sealing assays under
    matched conditions to determine whether cmp7 contributes detectably to MVB
    sorting in S. pombe.
  hypothesis: cmp7 will be dispensable for MVB / vacuolar sorting in S. pombe,
    supporting removal of the IPR005024-derived vacuolar-transport IEA on this
    gene.
- description: Reconstitute cmp7 + lem2 with downstream ESCRT-III subunits on
    giant unilamellar vesicles containing inner-nuclear-membrane lipids and
    monitor whether cmp7 alone confers grommet-like restriction of a model
    membrane hole.
  hypothesis: cmp7 is sufficient (with Lem2) to establish a grommet-like membrane
    constriction independently of the downstream sealing module.
