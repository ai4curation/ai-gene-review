core_functions:
- description: cmp7 is the Lem2-recruited ESCRT-III-like / ESCRT-II–ESCRT-III hybrid
    factor that forms a transient grommet at the mitotic SPB-extrusion hole in the
    nuclear envelope of S. pombe. The grommet restricts the NE hole during anaphase
    B; cmp7 is then displaced by a downstream ESCRT-III sealing module
    (Cmp2/Cmp3/Ist1) that, with Vps4, closes the NE in interphase.
