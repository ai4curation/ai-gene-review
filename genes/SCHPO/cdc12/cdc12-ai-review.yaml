- id: PMID:10469572
  title: Movement of a cytokinesis factor cdc12p to the site of cell division.
  findings:
  - statement: Cdc12 is required specifically for medial-ring assembly and is a component
      of the ring; during interphase it is a motile cytoplasmic spot that moves to
      the future division site at mitotic onset.
    reference_section_type: ABSTRACT
- id: PMID:12214236
  title: Actin dynamics in the contractile ring during cytokinesis in fission yeast.
  findings:
  - statement: The contractile ring is an active site of actin assembly requiring
      the formin Cdc12, Arp3, profilin and WASP.
    reference_section_type: ABSTRACT
- id: PMID:12796476
  title: The fission yeast cytokinesis formin Cdc12p is a barbed end actin filament
    capping protein gated by profilin.
  findings:
  - statement: The FH1 domain binds profilin and the FH2 domain binds actin; Cdc12(FH1FH2)p
      caps barbed ends, inhibits annealing, and nucleates filaments; profilin gates
      capping to allow rapid barbed-end growth.
    reference_section_type: ABSTRACT
- id: PMID:12939254
  title: The PCH family protein, Cdc15p, recruits two F-actin nucleation pathways
    to coordinate cytokinetic actin ring formation in Schizosaccharomyces pombe.
  findings:
  - statement: Cdc15p binds directly to Cdc12p; the two display mutual dependence
      for contractile-ring localization and exist together in a ring-nucleating structure
      before ring formation.
    reference_section_type: ABSTRACT
- id: PMID:14602073
  title: Spatial and temporal pathway for assembly and constriction of the contractile
    ring in fission yeast cytokinesis.
  findings:
  - statement: Formin Cdc12p joins the broad equatorial band around the time of SPB
      separation, independent of actin filaments, before condensation into the contractile
      ring.
    reference_section_type: ABSTRACT
- id: PMID:16823372
  title: ORFeome cloning and global analysis of protein localization in the fission
    yeast Schizosaccharomyces pombe.
  findings:
  - statement: Genome-wide YFP-tagging localization study reporting cdc12 localization
      to cytoplasm and cell division site.
    reference_section_type: ABSTRACT
- id: PMID:16864655
  title: Assembly of the cytokinetic contractile ring from a broad band of nodes in
    fission yeast.
  findings:
  - statement: Cortical nodes mature by addition of formin Cdc12p and coalesce into
      a compact ring when Cdc12p and profilin Cdc3p stimulate actin polymerization.
    reference_section_type: ABSTRACT
- id: PMID:21422229
  title: Assembly and architecture of precursor nodes during fission yeast cytokinesis.
  findings:
  - statement: Both precursor node modules recruit the formin Cdc12 to nucleate actin
      filaments that are captured to condense nodes into the contractile ring.
    reference_section_type: ABSTRACT
- id: PMID:22918943
  title: Anillin-related protein Mid1p coordinates the assembly of the cytokinetic
    contractile ring in fission yeast.
  findings:
  - statement: In Delta-mid1 cells Cdc12p accumulates in scattered cytokinetic nodes
      and produces actin filaments; cytokinetic nodes contain anillin Mid1p, myosin-II
      and formin Cdc12p.
    reference_section_type: ABSTRACT
- id: PMID:24115772
  title: SIN-dependent phosphoinhibition of formin multimerization controls fission
    yeast cytokinesis.
  findings:
  - statement: SIN kinase Sid2 phosphorylates Cdc12, abrogating multimerization of
      a Cdc12 domain that confers F-actin bundling activity; Cdc12 localizes to the
      contractile ring and cytoplasm.
    reference_section_type: ABSTRACT
- id: PMID:24127216
  title: The formins Cdc12 and For3 cooperate during contractile ring assembly in
    cytokinesis.
  findings:
  - statement: Cdc12 and For3 cooperate during contractile ring assembly; de novo
      actin assembly at the division site is predominant for ring formation.
    reference_section_type: ABSTRACT
- id: PMID:24790095
  title: Characterization of the roles of Blt1p in fission yeast cytokinesis.
  findings:
  - statement: Cytokinesis proteins including the formin accumulate in interphase
      nodes that condense into the contractile ring.
    reference_section_type: ABSTRACT
- id: PMID:24954052
  title: Formins determine the functional properties of actin filaments in yeast.
  findings:
  - statement: Fission yeast formins For3 and Cdc12 dictate which tropomyosin isoform
      associates with the actin filaments they nucleate, specifying filament functional
      properties.
    reference_section_type: ABSTRACT
- id: PMID:25688133
  title: The F-BAR Cdc15 promotes contractile ring formation through the direct recruitment
    of the formin Cdc12.
  findings:
  - statement: A short N-terminal motif of Cdc12 binds directly to the F-BAR domain
      of Cdc15; disrupting this interaction reduces Cdc12 and F-actin at the contractile
      ring and delays ring formation.
    reference_section_type: ABSTRACT
- id: PMID:26702831
  title: Oligomerization but Not Membrane Bending Underlies the Function of Certain
    F-BAR Proteins in Cell Motility and Cytokinesis.
  findings:
  - statement: Tip-to-tip oligomerization of the Cdc15 F-BAR stabilizes contractile
      ring components at the medial cortex and supports cytokinesis fidelity.
    reference_section_type: ABSTRACT
- id: PMID:28914606
  title: Nanoscale architecture of the Schizosaccharomyces pombe contractile ring.
  findings:
  - statement: Formin localizes to the most membrane-proximal layer (0-80 nm) of the
      contractile ring together with membrane-binding scaffolds and the myosin-II tail.
    reference_section_type: ABSTRACT
- id: PMID:29343550
  title: Cdk1-dependent phosphoinhibition of a formin-F-BAR interaction opposes cytokinetic
    contractile ring formation.
  findings:
  - statement: Cdk1 phosphorylates Cdc12 on N-terminal residues near the Cdc15-binding
      site, inhibiting the Cdc12-Cdc15 F-BAR interaction and opposing Cdc12 recruitment
      to the contractile ring.
    reference_section_type: ABSTRACT
- id: PMID:38603491
  title: Molecular mechanism of actin filament elongation by formins.
  findings:
  - statement: Cryo-EM structures of formin-bound F-actin barbed ends reveal an undock-and-lock
      mechanism of processive elongation and resolve profilin release from the barbed
      end during filament elongation.
    reference_section_type: ABSTRACT
- id: PMID:8834798
  title: Isolation and characterization of fission yeast mutants defective in the
    assembly and placement of the contractile actin ring.
  findings:
  - statement: cdc12 is one of six genes required for actin ring formation; cdc12
      mutants show disorganized actin patches during mitosis but normal interphase
      actin patterns.
    reference_section_type: ABSTRACT
- id: PMID:8978670
  title: 'Fission yeast Sop2p: a novel and evolutionarily conserved protein that interacts
    with Arp3p and modulates profilin function.'
  findings:
  - statement: Sop2p is an essential Arp3-associated protein that modulates profilin
      function in cortical actin processes; cited as an interactor in the curated
      cdc12 IPI annotation.
    reference_section_type: ABSTRACT
- id: PMID:9105045
  title: cdc12p, a protein required for cytokinesis in fission yeast, is a component
    of the cell division ring and interacts with profilin.
  findings:
  - statement: cdc12 is an essential gene required for actin ring assembly and septum
      formation; cdc12p localizes to the cell division ring and its proline-rich domain
      binds directly to profilin Cdc3p.
    reference_section_type: ABSTRACT
