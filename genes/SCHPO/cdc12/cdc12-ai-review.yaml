- term:
    id: GO:0043332
    label: mating projection tip
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: is_active_in
  review:
    summary: >-
      This localization is inferred phylogenetically across the formin family, which
      includes the dedicated mating formin Fus1 that localizes to the shmoo tip.
      Cdc12 is specifically the cytokinesis formin and has not been shown to
      localize to or function at the mating projection tip; this appears to be an
      over-propagation from the broader formin family.
    action: MARK_AS_OVER_ANNOTATED
    reason: IBA propagated across the formin family (including the mating formin Fus1);
      no experimental support for cdc12 acting at the mating projection tip, which is
      the role of a distinct paralog.
    supported_by:
    - reference_id: PMID:12796476
      supporting_text: 'Fission yeast has three formin genes: cdc12, required for cytokinesis
        (Chang et al., 1997), for3, required for interphase actin cables (Feierbach
        and Chang, 2001b; Nakano et al., 2002), and fus1, required for mating (Petersen
        et al., 1998).'
      reference_section_type: ABSTRACT
