id: Q10059
gene_symbol: cdc12
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:284812
  label: Schizosaccharomyces pombe (strain 972 / ATCC 24843)
description: >-
  Cdc12 is the single essential cytokinesis formin of fission yeast, a member of
  the formin homology (FH) family (BNI1/diaphanous subfamily). Through its
  C-terminal FH1 and FH2 domains it nucleates and processively elongates the
  unbranched actin filaments that form the cytokinetic actomyosin contractile
  ring (CAR). The proline-rich FH1 domain binds the profilin Cdc3, delivering
  profilin-actin to the growing filament, while the FH2 domain binds and caps
  the barbed end; in the absence of profilin Cdc12 caps barbed ends and
  nucleates filaments that grow only from pointed ends, whereas with profilin it
  nucleates fewer filaments that elongate rapidly from their barbed ends
  (profilin-gated capping). Cdc12 is recruited to the medial cell-division site
  early in mitosis, first to anillin (Mid1)-organized cortical nodes and then to
  the condensing ring, in part through direct binding of an N-terminal motif to
  the F-BAR domain of the scaffold Cdc15. Its activity and localization are
  cell-cycle regulated by phosphorylation: Cdk1 phosphorylation near the
  Cdc15-binding motif antagonizes recruitment, and SIN kinase Sid2
  phosphorylation modulates a multimerization/F-actin-bundling domain. Cdc12 is
  one of three S. pombe formins, distinct from For3 (interphase actin cables/cell
  polarity) and Fus1 (mating), and is essential for actin ring assembly and
  septum formation during cell division.
