- term:
    id: GO:0031267
    label: small GTPase binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: >-
      This annotation is based solely on the presence of a GTPase-binding domain
      (GBD/FH3) detected by InterPro. While many formins are regulated by Rho-family
      GTPases, there is no experimental evidence that S. pombe Cdc12 binds a small
      GTPase; its recruitment and regulation are mediated by Mid1/Cdc15 and by Cdk1
      and SIN/Sid2 phosphorylation rather than a Rho GTPase (the Rho-regulated
      fission yeast formin is For3). Treated as a domain-based over-annotation.
    action: MARK_AS_OVER_ANNOTATED
    reason: InterPro domain-only prediction with no experimental support for GTPase
      binding by cdc12; regulation is via scaffold binding and phosphorylation, not
      a small GTPase.
    supported_by:
    - reference_id: PMID:25688133
      supporting_text: we define a short motif within the N terminus of Cdc12 that
        binds directly to the F-BAR domain of the scaffolding protein Cdc15.
      reference_section_type: ABSTRACT
