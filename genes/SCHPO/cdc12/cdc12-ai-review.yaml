core_functions:
- description: Nucleates and processively elongates unbranched actin filaments via its
    FH2 domain, providing the F-actin for the cytokinetic contractile ring
  supported_by:
  - reference_id: PMID:12796476
    supporting_text: Like capping protein, purified Cdc12(FH1FH2)p caps the barbed end
      of actin filaments, preventing subunit addition and dissociation, inhibits end
      to end annealing of filaments, and nucleates filaments that grow exclusively
      from their pointed ends.
    reference_section_type: ABSTRACT
  molecular_function:
    id: GO:0051015
    label: actin filament binding
  directly_involved_in:
    id: GO:0030041
    label: actin filament polymerization
- description: Profilin-gated barbed-end capping; the FH1 domain binds profilin (Cdc3)
    to deliver profilin-actin, switching the formin from a barbed-end capper to a
    processive barbed-end elongator
  supported_by:
  - reference_id: PMID:12796476
    supporting_text: 'Thus, formins are profilin-gated barbed end capping proteins with
      the ability to initiate actin filaments from actin monomers bound to profilin.'
    reference_section_type: ABSTRACT
  - reference_id: PMID:9105045
    supporting_text: a proline-rich domain of cdc12p binds directly to profilin cdc3p
      in vitro, suggesting that one function of cdc12p in ring assembly is to bind
      profilin.
    reference_section_type: ABSTRACT
  molecular_function:
    id: GO:0051016
    label: barbed-end actin filament capping
- description: Assembles the mitotic actomyosin contractile ring at the medial cell
    division site, recruited via Mid1-organized cortical nodes and direct binding to
    the Cdc15 F-BAR domain
  supported_by:
  - reference_id: PMID:9105045
    supporting_text: Schizosaccharomyces pombe cdc12 is an essential gene necessary
      for actin ring assembly and septum formation.
    reference_section_type: ABSTRACT
  - reference_id: PMID:25688133
    supporting_text: we define a short motif within the N terminus of Cdc12 that binds
      directly to the F-BAR domain of the scaffolding protein Cdc15.
    reference_section_type: ABSTRACT
  directly_involved_in:
    id: GO:1903475
    label: mitotic actomyosin contractile ring assembly
  in_complex:
    id: GO:0110085
    label: mitotic actomyosin contractile ring
proposed_new_terms: []
suggested_questions:
- question: Is S. pombe Cdc12 regulated by a Rho-family small GTPase, or is its activity
    controlled exclusively through scaffold binding (Mid1/Cdc15) and phosphorylation
    (Cdk1, SIN/Sid2)?
- question: What is the in vivo significance of the N-terminal autoinhibitory/regulatory
    regions of full-length Cdc12 relative to the constitutively active FH1FH2 fragment?
- question: How do Cdk1 and SIN/Sid2 phosphorylation events on Cdc12 integrate temporally
    to switch Cdc12 from inhibited to active during the cell cycle?
suggested_experiments:
- description: Reconstitute full-length Cdc12 (rather than the FH1FH2 fragment) with
    profilin Cdc3 and actin in TIRF assays to test autoinhibition and its relief by
    Cdc15 F-BAR binding and dephosphorylation.
- description: Use phosphomutant Cdc12 alleles (Cdk1 sites and Sid2 sites) with live-cell
    imaging to quantify the kinetics of Cdc12 recruitment, ring assembly and constriction.
- description: Test directly whether purified Cdc12 binds any S. pombe Rho/Cdc42 GTPase
    via its GBD/FH3 region to resolve the InterPro-predicted small GTPase binding annotation.
