  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: involved_in
  review:
    summary: >-
      Cdc12 possesses an F-actin bundling activity that is regulated by SIN kinase
      Sid2 phosphorylation of a multimerization domain. Bundling is a genuine but
      regulated, secondary activity of the formin relative to its core
      nucleation/elongation role.
    action: KEEP_AS_NON_CORE
    reason: Supported by phylogenetic inference and by experimental identification of
      a Sid2-regulated Cdc12 multimerization domain conferring F-actin bundling; secondary
      to the core nucleation/elongation function.
    supported_by:
    - reference_id: PMID:24115772
      supporting_text: Sid2 phosphorylation of Cdc12 abrogates multimerization of a
        previously unrecognized Cdc12 domain that confers F-actin bundling activity.
