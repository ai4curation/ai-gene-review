proposed_new_terms: []
suggested_questions:
- question: >-
    What distinguishes the in vivo division of labor between Rhp51 and the meiosis-specific
    recombinase Dmc1 in fission yeast meiosis, given their similar biochemical activities?
- question: >-
    How is Rhp51 filament loading and turnover quantitatively balanced by positive
    mediators (Rad22, Rhp55-Rhp57, Swi5-Sfr1) versus negative regulators (Fbh1, Rrp1, Srs2)?
suggested_experiments:
- description: >-
    Single-molecule (e.g. magnetic tweezers or DNA curtains) measurement of Rhp51
    filament nucleation, growth and disassembly kinetics in the presence and absence
    of Swi5-Sfr1, Fbh1-Skp1 and Rrp1 to map regulator effects on the C1-C2 strand-exchange intermediates.
- description: >-
    Genome-wide ChIP-seq of Rhp51 across the mitotic and meiotic cell cycles, combined
    with separation-of-function alleles (DNA-binding-only vs strand-exchange-competent),
    to dissect fork protection versus recombination roles.
