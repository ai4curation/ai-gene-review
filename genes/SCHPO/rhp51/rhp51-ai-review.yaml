- id: PMID:11560889
  title: Multiple interactions among the components of the recombinational DNA repair
    system in Schizosaccharomyces pombe.
  findings:
  - statement: >-
      Rhp51 interacts with the C-terminal region of Rad22 and Rti1, and strongly
      interacts with Rhp57 (but not Rhp55) and with Rhp54, defining the HR repair network.
    supported_by:
    - reference_id: PMID:11560889
      supporting_text: Both putative Rad52 homologs in S. pombe, Rad22p and Rti1p, were found to interact with the C-terminal region of Rhp51 protein
      reference_section_type: ABSTRACT
- id: PMID:11600706
  title: SUMO modification of Rad22, the Schizosaccharomyces pombe homologue of the
    recombination protein Rad52.
  findings:
  - statement: Rhp51 interacts with Rad22 and is SUMO (Pmt3)-modified in vitro.
    supported_by:
    - reference_id: PMID:11600706
      supporting_text: Rad22 interacts with Rhp51 and Rpa70 (the fission yeast homologues of Rad51 and the large subunit of RPA, respectively)
      reference_section_type: ABSTRACT
- id: PMID:12023299
  title: Cdc2-cyclin B kinase activity links Crb2 and Rqh1-topoisomerase III.
  findings:
  - statement: >-
      Rhp51 forms ionizing-radiation-induced foci at DSB sites; focus formation
      depends on Cdc2-cyclin B activity (redundant with Rad50).
    supported_by:
    - reference_id: PMID:12023299
      supporting_text: affects the formation of Rhp51 (Rad51(sp)) foci in response to ionizing radiation in a process that is redundant with the function of Rad50.
      reference_section_type: ABSTRACT
- id: PMID:12050150
  title: Physical interaction between recombinational proteins Rhp51 and Rad22 in
    Schizosaccharomyces pombe.
  findings:
  - statement: >-
      Rhp51 and Rad22 directly associate and self-associate; the Rhp51-Rad22
      interaction is required for Rhp51's DNA repair function.
    supported_by:
    - reference_id: PMID:12050150
      supporting_text: we found that mutant Rhp51 protein, which cannot interact with either Rad22 or Rti1 (G282D), lost its DNA repair ability
      reference_section_type: ABSTRACT
- id: PMID:12628934
  title: Pathway utilization in response to a site-specific DNA double-strand break
    in fission yeast.
  findings:
  - statement: rhp51 is required for efficient HR repair (interchromosomal gene conversion) of an HO-induced DSB.
    supported_by:
    - reference_id: PMID:12628934
      supporting_text: the homologous recombination (HR) genes rhp51(+), rad22A(+), rad32(+) and the nucleotide excision repair gene rad16(+) were required for efficient interchromosomal gene conversion.
      reference_section_type: ABSTRACT
- id: PMID:12930956
  title: Fission yeast Rhp51 is required for the maintenance of telomere structure
    in the absence of the Ku heterodimer.
  findings:
  - statement: >-
      Rhp51 binds telomeric G-overhangs and promotes homologous pairing of telomere
      ends, maintaining telomere structure when Ku is absent.
    supported_by:
    - reference_id: PMID:12930956
      supporting_text: Rhp51 binds to the G-rich overhang and promotes homologous pairing between two different telomere ends in the absence of Ku heterodimer.
      reference_section_type: ABSTRACT
- id: PMID:14551247
  title: Schizosaccharomyces pombe Rdh54 (TID1) acts with Rhp54 (RAD54) to repair
    meiotic double-strand breaks.
  findings:
  - statement: Rhp51 interacts with Rhp54/Rdh54 and Dmc1 in two-hybrid assays in the meiotic context.
    supported_by:
    - reference_id: PMID:14551247
      supporting_text: It interacts with Rhp51 and the meiotic Rhp51 homolog Dmc1 in yeast two-hybrid assays.
      reference_section_type: ABSTRACT
- id: PMID:14663140
  title: Two different Swi5-containing protein complexes are involved in mating-type
    switching and recombination repair in fission yeast.
  findings:
  - statement: >-
      Swi5-Sfr1-Rhp51 functions in recombination repair (Rhp55/57-independent), while
      Swi5-Swi2-Rhp51 functions in mating-type switching.
    supported_by:
    - reference_id: PMID:14663140
      supporting_text: the Swi5-Sfr1-Rhp51 interactions function specifically in DNA recombination repair, whereas the Swi5-Swi2-Rhp51 interactions may function, together with chromodomain protein Swi6 (HP1 homolog), in mating-type switching.
      reference_section_type: ABSTRACT
- id: PMID:15238514
  title: Conserved and nonconserved proteins for meiotic DNA breakage and repair in
    yeasts.
  findings:
  - statement: Rhp51 (with Swi5 and Rad22/Rti1) is required for full repair of meiotic DSBs in S. pombe.
    supported_by:
    - reference_id: PMID:15238514
      supporting_text: Rhp51, Swi5, and Rad22 + Rti1 were required for full levels of DNA repair in S. pombe, as are the related S. cerevisiae proteins Rad51, Sae3, and Rad52.
      reference_section_type: ABSTRACT
- id: PMID:15899844
  title: Fission yeast rad51 and dmc1, two efficient DNA recombinases forming helical
    nucleoprotein filaments.
  findings:
  - statement: >-
      Purified Rhp51 forms homo-oligomers, preferentially binds ssDNA, has DNA-stimulated
      ATPase activity, promotes ssDNA renaturation, and catalyzes ATP-dependent strand
      exchange forming helical nucleoprotein filaments.
    supported_by:
    - reference_id: PMID:15899844
      supporting_text: Purified Rad51 and Dmc1 form homo-oligomers, bind single-stranded DNA preferentially, and exhibit DNA-stimulated ATPase activity. Both Rad51 and Dmc1 promote the renaturation of complementary single-stranded DNA. Importantly, Rad51 and Dmc1 proteins catalyze ATP-dependent strand exchange reactions with homologous duplex DNA.
      reference_section_type: ABSTRACT
- id: PMID:16823372
  title: ORFeome cloning and global analysis of protein localization in the fission
    yeast Schizosaccharomyces pombe.
  findings:
  - statement: Genome-wide localization places Rhp51 in the nucleus (and a nuclear-envelope signal).
    supported_by:
    - reference_id: PMID:16823372
      supporting_text: we determined the localization of 4,431 proteins
      reference_section_type: ABSTRACT
- id: PMID:16921379
  title: The Swi5-Sfr1 complex stimulates Rhp51/Rad51- and Dmc1-mediated DNA strand
    exchange in vitro.
  findings:
  - statement: >-
      The Swi5-Sfr1 complex, at substoichiometric levels, stimulates Rhp51-mediated
      strand exchange, overcoming RPA inhibition and preferentially stimulating Rhp51 ssDNA-dependent ATPase.
    supported_by:
    - reference_id: PMID:16921379
      supporting_text: the Swi5-Sfr1 complex preferentially stimulates the ssDNA-dependent ATPase activity of Rhp51
      reference_section_type: ABSTRACT
- id: PMID:18180284
  title: Minichromosome maintenance proteins interact with checkpoint and recombination
    proteins to promote s-phase genome stability.
  findings:
  - statement: MCM proteins interact with HR proteins including Rhp51 to promote recovery from replication arrest.
    supported_by:
    - reference_id: PMID:18180284
      supporting_text: MCM proteins also interact with proteins involved in homologous recombination, which promotes recovery from arrest by ensuring normal mitosis.
      reference_section_type: ABSTRACT
- id: PMID:18923422
  title: Rad51 suppresses gross chromosomal rearrangement at centromere in Schizosaccharomyces
    pombe.
  findings:
  - statement: Rhp51 localizes at the centromere around S phase and suppresses isochromosome-type GCRs.
    supported_by:
    - reference_id: PMID:18923422
      supporting_text: Chromatin immunoprecipitation analysis shows that Rad51 localizes at centromere around S phase.
      reference_section_type: ABSTRACT
- id: PMID:22405003
  title: Mechanistic insights into the activation of Rad51-mediated strand exchange
    from the structure of a recombination activator, the Swi5-Sfr1 complex.
  findings:
  - statement: >-
      The Swi5-Sfr1 complex binds directly within the helical groove of the Rhp51
      filament to activate strand exchange.
    supported_by:
    - reference_id: PMID:22405003
      supporting_text: The Swi5-Sfr1 complex interacts directly with Rad51 and stimulates strand exchange.
      reference_section_type: ABSTRACT
- id: PMID:23093942
  title: Recovery of arrested replication forks by homologous recombination is error-prone.
  findings:
  - statement: HR-dependent (Rhp51-dependent) recovery of arrested/collapsed forks is error-prone, causing GCRs.
    supported_by:
    - reference_id: PMID:23093942
      supporting_text: recovery of impeded replication forks by homologous recombination is error-prone.
      reference_section_type: ABSTRACT
- id: PMID:23695164
  title: Cross-species protein interactome mapping reveals species-specific wiring
    of stress response pathways.
  findings:
  - statement: High-throughput interactome confirms Rhp51 interactions with HR partners (Rad22, Rhp54, Sfr1).
    supported_by:
    - reference_id: PMID:23695164
      supporting_text: Cross-species protein interactome mapping reveals species-specific wiring of stress response pathways.
      reference_section_type: TITLE
- id: PMID:24192486
  title: The conserved Fanconi anemia nuclease Fan1 and the SUMO E3 ligase Pli1 act
    in two novel Pso2-independent pathways of DNA interstrand crosslink repair in
    yeast.
  findings:
  - statement: rhp51-dependent recombination contributes to Pso2-independent ICL repair in S. pombe.
    supported_by:
    - reference_id: PMID:24192486
      supporting_text: Fan1 is a key component of a previously unidentified ICL-resolution pathway.
      reference_section_type: ABSTRACT
- id: PMID:25165823
  title: Multiple regulation of Rad51-mediated homologous recombination by fission
    yeast Fbh1.
  findings:
  - statement: >-
      Fbh1-Skp1 disrupts Rhp51 nucleoprotein filaments (ATP-dependent) and SCF-Fbh1
      ubiquitinates Rhp51, negatively regulating recombination; Swi5-Sfr1 alleviates filament disruption.
    supported_by:
    - reference_id: PMID:25165823
      supporting_text: Purified Fbh1 in complex with Skp1 (Fbh1-Skp1 complex) inhibited Rad51-driven DNA strand exchange by disrupting Rad51 nucleoprotein filaments in an ATP-dependent manner; this disruption was alleviated by the Swi5-Sfr1 complex
      reference_section_type: ABSTRACT
- id: PMID:28475874
  title: Unprotected Replication Forks Are Converted into Mitotic Sister Chromatid
    Bridges.
  findings:
  - statement: >-
      The DNA-binding activity of Rhp51 (not its strand-exchange activity) protects
      terminally arrested replication forks from Exo1 resection.
    supported_by:
    - reference_id: PMID:28475874
      supporting_text: Rad52 and the DNA binding activity of Rad51, but not its strand-exchange activity, act to protect terminally arrested forks from unrestrained Exo1-nucleolytic activity.
      reference_section_type: ABSTRACT
- id: PMID:29323270
  title: Two three-strand intermediates are processed during Rad51-driven DNA strand
    exchange.
  findings:
  - statement: >-
      Rhp51-driven strand exchange proceeds via two three-strand intermediates (C1, C2),
      both containing Rad51; Swi5-Sfr1 drives the C1-C2 transition and ssDNA release.
    supported_by:
    - reference_id: PMID:29323270
      supporting_text: strand exchange by fission yeast Rad51 proceeds via two distinct three-strand intermediates, C1 and C2. Both intermediates contain Rad51
      reference_section_type: ABSTRACT
- id: PMID:33159083
  title: The nuclear pore primes recombination-dependent DNA synthesis at arrested
    forks by promoting SUMO removal.
  findings:
  - statement: >-
      Rhp51 loading/activity at arrested forks promotes their relocation to the
      nuclear pore, priming recombination-dependent DNA synthesis.
    supported_by:
    - reference_id: PMID:33159083
      supporting_text: The nuclear pore primes recombination-dependent DNA synthesis at arrested forks by promoting SUMO removal.
      reference_section_type: TITLE
- id: PMID:34157114
  title: Rrp1 translocase and ubiquitin ligase activities restrict the genome destabilising
    effects of Rad51 in fission yeast.
  findings:
  - statement: >-
      Rrp1 directly interacts with Rad51, removes it from dsDNA, ubiquitinates it, and
      restricts its genome-destabilizing effects; Rad51 is nuclear and binds ss/dsDNA.
    supported_by:
    - reference_id: PMID:34157114
      supporting_text: Rrp1 directly interacts with Rad51 and removes it from double-stranded DNA, confirming that Rrp1 is a translocase capable of modulating Rad51 function.
      reference_section_type: ABSTRACT
- id: PMID:39340300
  title: The Swi5-Sfr1 complex regulates Dmc1- and Rad51-driven DNA strand exchange
    proceeding through two distinct three-stranded intermediates by different mechanisms.
  findings:
  - statement: >-
      Swi5-Sfr1 acts as a strand-exchange activator for Rad51 (facilitating the C1-C2
      transition and ssDNA release), distinct from its mediator role with Dmc1.
    supported_by:
    - reference_id: PMID:39340300
      supporting_text: Swi5-Sfr1 facilitates the C1-C2 transition and releases single-stranded DNA (ssDNA) from C2, acting as a strand exchange activator.
      reference_section_type: ABSTRACT
- id: PMID:8610150
  title: Mammalian ubiquitin-conjugating enzyme Ubc9 interacts with Rad51 recombination
    protein and localizes in synaptonemal complexes.
  findings:
  - statement: >-
      Mammalian Rad51 interacts with the SUMO conjugase Ubc9; by orthology the S. pombe
      Rhp51-hus5 interaction is asserted.
    supported_by:
    - reference_id: PMID:8610150
      supporting_text: HsUbc9 protein interacts with human recombination protein Rad51.
      reference_section_type: ABSTRACT
