id: P36601
gene_symbol: rhp51
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:284812
  label: Schizosaccharomyces pombe (strain 972 / ATCC 24843)
description: >-
  Rhp51 (Rad51) is the fission yeast ortholog of the eukaryotic RecA-family DNA
  recombinase Rad51 and the central catalytic engine of homologous recombination
  (HR). It binds single-stranded DNA generated by end resection (and also
  double-stranded DNA) in an ATP-dependent manner to assemble a helical
  nucleoprotein filament that searches for a homologous duplex and catalyzes DNA
  strand invasion and strand exchange, using cycles of ATP binding and hydrolysis.
  Through this activity Rhp51 repairs DNA double-strand breaks, restarts and
  protects stalled or collapsed replication forks, and drives meiotic
  recombination, also contributing to telomere maintenance and to suppression of
  gross chromosomal rearrangements at repetitive regions such as centromeres.
  Its loading and activity are governed by mediators and regulators including the
  Rad52 ortholog Rad22/Rti1, the Rhp55-Rhp57 (Rad55-Rad57) paralog complex, the
  Swi5-Sfr1 activator, and the motor protein Rhp54 (Rad54); negative regulators
  such as the Fbh1 anti-recombinase and the Rrp1 translocase/ubiquitin ligase
  strip Rhp51 from DNA to limit untimely or excessive recombination. Rhp51 is a
  nuclear protein that concentrates as foci at sites of DNA double-strand breaks.
