- id: file:SCHPO/poz1/poz1-deep-research-falcon.md
  title: Deep research review of S. pombe Poz1
  findings:
    - statement: Poz1 is a core shelterin bridge factor that restrains telomerase-dependent
        telomere elongation.
      supporting_text: >-
        [Poz1 is a core subunit of the S. pombe shelterin complex and its best-supported
        primary role is to assemble the shelterin bridge and negatively regulate
        telomerase-dependent telomere elongation.]
    - statement: Poz1 is best interpreted as a nonenzymatic adaptor or scaffold rather
        than a catalytic factor.
      supporting_text: >-
        [No catalytic activity is attributed to Poz1; structural and genetic studies
        instead support an architectural bridge or adaptor role linking Rap1 and Tpz1.]

core_functions:
- description: >-
    Poz1 functions as a nonenzymatic shelterin adaptor that links the Pot1-Tpz1
    single-stranded telomere subcomplex to the Taz1-Rap1 double-stranded telomere
    subcomplex. By stabilizing this bridge, Poz1 promotes telomere capping and
    telomere organization while negatively regulating telomerase-dependent telomere
    lengthening through restraint of Ccq1 phosphorylation and telomerase recruitment.
  molecular_function:
    id: GO:0060090
    label: molecular adaptor activity
  directly_involved_in:
    - id: GO:0016233
      label: telomere capping
    - id: GO:0032200
      label: telomere organization
    - id: GO:1904357
      label: negative regulation of telomere maintenance via telomere lengthening
  locations:
    - id: GO:0140445
      label: chromosome, telomeric repeat region
  in_complex:
    id: GO:0070187
    label: shelterin complex
  supported_by:
    - reference_id: PMID:18535244
      supporting_text: >-
        Poz1 bridges Pot1-Tpz1 and Taz1-Rap1, thereby connecting the single-stranded
        and double-stranded telomeric DNA regions.
    - reference_id: PMID:25330395
      supporting_text: >-
        Loss of Poz1 from telomeres leads to increases in Ccq1 Thr93 phosphorylation
        and telomerase recruitment.
    - reference_id: PMID:29149597
      supporting_text: >-
        Biochemical analyses reveal that shelterin bridge assembly is a hierarchical
        process in which Tpz1 binding to Poz1 elicits structural changes in Poz1,
        allosterically promoting Rap1 binding to Poz1.
    - reference_id: file:SCHPO/poz1/poz1-deep-research-falcon.md
      supporting_text: >-
        [Poz1 is best interpreted as a nonenzymatic adaptor or scaffold that assembles
        the shelterin bridge and restrains telomerase-dependent elongation.]

proposed_new_terms: []

suggested_questions:
- question: >-
    What is the in vivo functional significance of the dimeric Poz1 architecture
    seen in structural studies? It remains unclear whether Poz1 dimerization is
    a crystallographic feature, a regulatory state of shelterin, or a determinant
    of telomere-length homeostasis in living cells.
- question: >-
    How much of Poz1's contribution to telomere protection reflects immediate
    chromosome-end capping versus longer-term control of shelterin architecture,
    heterochromatin, and telomerase access across the cell cycle?

suggested_experiments:
- description: >-
    Generate separation-of-function Poz1 mutants that specifically disrupt the
    dimer interface while preserving Tpz1 and Rap1 binding, then assay telomere
    length, telomerase recruitment, and telomeric heterochromatin.
  hypothesis: >-
    If Poz1 dimerization has an in vivo role, dimer-interface mutants will perturb
    telomere homeostasis without fully phenocopying loss of the Tpz1-Poz1-Rap1 bridge.
- description: >-
    Quantify Ccq1 phosphorylation, telomerase recruitment, and chromosome-end
    protection in wild-type, poz1 null, and bridge-defective poz1 mutants through
    synchronized cell-cycle experiments.
  hypothesis: >-
    Poz1 primarily protects telomeres by stabilizing a nonextendible shelterin
    state that limits Ccq1 phosphorylation and telomerase access during late S phase.
