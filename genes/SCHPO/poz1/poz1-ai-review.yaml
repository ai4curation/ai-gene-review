  original_reference_id: GO_REF:0000044
  review:
    summary: >-
      The automated telomeric-region localization is directionally correct, but
      direct experiments place Poz1 more specifically at telomeric repeat regions
      as part of shelterin.
    action: MODIFY
    reason: >-
      GO:0000781 is a broad parent term. PMID:18535244 provides direct support
      for GO:0140445 chromosome, telomeric repeat region, which better captures
      Poz1's specific chromosomal localization.
    proposed_replacement_terms:
