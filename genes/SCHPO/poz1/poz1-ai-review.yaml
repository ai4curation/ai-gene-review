references:
- id: GO_REF:0000044
  title: Gene Ontology annotation based on UniProtKB/Swiss-Prot Subcellular Location
    vocabulary mapping, accompanied by conservative changes to GO terms applied by
    UniProt
  findings:
    - statement: Poz1 is annotated to chromosome telomeric region, nucleus, and cytoplasm
        based on UniProtKB/Swiss-Prot subcellular location vocabulary mapping.
      supporting_text: Gene Ontology annotation based on UniProtKB/Swiss-Prot Subcellular
        Location vocabulary mapping, accompanied by conservative changes to GO terms
        applied by UniProt.
      reference_section_type: METHODS
      full_text_unavailable: true
- id: PMID:16823372
  title: ORFeome cloning and global analysis of protein localization in the fission
    yeast Schizosaccharomyces pombe.
  findings:
    - statement: Poz1 (SPAC19G12.13c) was localized to the nucleus in a global YFP-tagging
        protein localization study of the S. pombe proteome.
      supporting_text: We determined the localization of 4,431 proteins, corresponding
        to approximately 90% of the fission yeast proteome, by tagging each ORF with
        the yellow fluorescent protein.
      reference_section_type: ABSTRACT
      full_text_unavailable: true
- id: PMID:18535244
  title: Fission yeast Pot1-Tpp1 protects telomeres and regulates telomere length.
  findings:
    - statement: Poz1 was identified as a previously undiscovered protein that interacts
        with Tpz1 and is a component of the fission yeast shelterin complex.
      supporting_text: Tpz1 binds to Ccq1 and the previously undiscovered protein Poz1
        (Pot1-associated in Schizosaccharomyces pombe), which protect telomeres redundantly
        and regulate telomerase in positive and negative manners, respectively.
      reference_section_type: ABSTRACT
      full_text_unavailable: true
    - statement: Poz1 functions as a negative regulator of telomerase-dependent telomere
        elongation.
      supporting_text: Tpz1 binds to Ccq1 and the previously undiscovered protein Poz1,
        which protect telomeres redundantly and regulate telomerase in positive and
        negative manners, respectively.
      reference_section_type: ABSTRACT
      full_text_unavailable: true
    - statement: Poz1 bridges the Pot1-Tpz1 (single-stranded DNA binding) and Taz1-Rap1
        (double-stranded DNA binding) subcomplexes, connecting ss and ds telomeric DNA
        regions.
      supporting_text: Poz1 bridges Pot1-Tpz1 and Taz1-Rap1, thereby connecting the
        single-stranded and double-stranded telomeric DNA regions.
      reference_section_type: ABSTRACT
      full_text_unavailable: true
    - statement: The molecular architecture of the fission yeast shelterin complex including
        Poz1 is conserved with mammalian shelterin, where Poz1 is the functional analog
        of TIN2.
      supporting_text: Such molecular architectures are similar to those of mammalian
        shelterin, indicating that the overall DNA-protein architecture is conserved
        across evolution.
      reference_section_type: ABSTRACT
      full_text_unavailable: true
    - statement: Ccq1 and Poz1 have redundant roles in telomere protection, as the
        Pot1-Tpz1 complex accomplishes its functions by recruiting both effector molecules.
      supporting_text: Thus, the Pot1-Tpz1 complex accomplishes its functions by recruiting
        effector molecules Ccq1 and Poz1.
      reference_section_type: ABSTRACT
      full_text_unavailable: true
- id: PMID:22959349
  title: Telomere-nuclear envelope dissociation promoted by Rap1 phosphorylation ensures
    faithful chromosome segregation.
  findings:
    - statement: Rap1, a direct interaction partner of Poz1, is phosphorylated by Cdc2
        during mitosis to promote telomere dissociation from the nuclear envelope,
        providing context for the Poz1-Rap1 interaction in the shelterin complex during
        the cell cycle.
      supporting_text: The phosphorylation of the telomere protein Rap1 during mitosis,
        primarily by Cdc2, impedes the interaction between Rap1 and Bqt4, a nuclear
        membrane protein, thereby inducing telomere dissociation from the NE.
      reference_section_type: ABSTRACT
      full_text_unavailable: true
- id: PMID:24013504
  title: Tpz1 controls a telomerase-nonextendible telomeric state and coordinates
    switching to an extendible state via Ccq1.
  findings:
    - statement: The complete shelterin linkage bridging telomeric dsDNA to ssDNA, which
        requires Poz1 as the central bridge component, defines the telomerase-nonextendible
        state of telomeres.
      supporting_text: Tpz1 (the ortholog of human TPP1)-mediated complete linkage within
        the shelterin complex, bridging telomeric dsDNA to ssDNA, controls the telomerase-nonextendible
        state. Disruption of this linkage leads to unregulated telomere elongation while
        still retaining the shelterin components on telomeres.
      reference_section_type: ABSTRACT
      full_text_unavailable: false
    - statement: Disruption of the Tpz1–Poz1 interaction results in dramatically elongated
        telomeres, demonstrating that Poz1 connection within the shelterin bridge is
        essential for negative regulation of telomerase.
      supporting_text: Disruption of Tpz1–Poz1 interaction results in dramatically elongated
        telomeres.
      reference_section_type: RESULTS
      full_text_unavailable: false
    - statement: Both Tpz1–Poz1 and Tpz1–Pot1 interactions function in the same pathway
        as Rap1 and Poz1 in negatively regulating telomerase.
      supporting_text: Both Tpz1–Poz1 and Tpz1–Pot1 interactions function in the same
        pathway as Rap1 and Poz1 in negatively regulating telomerase.
      reference_section_type: RESULTS
      full_text_unavailable: false
    - statement: The complete linkage between ds and ss telomeric DNA through the shelterin
        bridge (including Poz1) defines a telomerase-nonextendible state that must be
        activated before telomerase can extend the telomere.
      supporting_text: Taken together, our finding implies that the complete linkage between
        the double-stranded and single-stranded telomeric DNA may define the telomerase-nonextendible
        telomeric state in which the telomere is a "dead" substrate for telomerase to
        elongate and has to be activated before telomerase can extend it.
      reference_section_type: DISCUSSION
      full_text_unavailable: false
- id: PMID:25330395
  title: Tpz1-Ccq1 and Tpz1-Poz1 interactions within fission yeast shelterin modulate
    Ccq1 Thr93 phosphorylation and telomerase recruitment.
  findings:
    - statement: Tpz1-Poz1 interaction promotes the telomere association of Poz1, and
        loss of Poz1 from telomeres leads to increased Ccq1 Thr93 phosphorylation and
        telomerase recruitment.
      supporting_text: We demonstrate that Tpz1-Poz1 interaction promotes telomere association
        of Poz1, and loss of Poz1 from telomeres leads to increases in Ccq1 Thr93 phosphorylation
        and telomerase recruitment, and telomeric heterochromatin formation defect.
      reference_section_type: ABSTRACT
      full_text_unavailable: false
    - statement: Disruption of Tpz1-Poz1 interaction phenocopies poz1 deletion, causing
        massive telomere elongation, confirming that Poz1 exerts its negative regulatory
        function through its interaction with Tpz1.
      supporting_text: Disruption of Tpz1-Poz1 interaction resembles Poz1 deletion.
      reference_section_type: RESULTS
      full_text_unavailable: false
    - statement: Tpz1-Poz1 and Tpz1-Ccq1 interactions redundantly fulfill the essential
        telomere protection function of shelterin; simultaneous loss of both causes
        cell death and generation of survivors with circular chromosomes.
      supporting_text: Our studies establish that Tpz1-Poz1 and Tpz1-Ccq1 interactions
        redundantly fulfill the essential telomere protection function of the shelterin
        complex, since simultaneous loss of both interactions caused immediate loss
        of cell viability for the majority of cells and generation of survivors with
        circular chromosomes.
      reference_section_type: ABSTRACT
      full_text_unavailable: false
    - statement: The negative regulatory function of the Tpz1-Poz1 interaction operates
        upstream of Rad3/ATR kinase to limit Ccq1 Thr93 phosphorylation and telomerase
        recruitment.
      supporting_text: We suggest that the negative regulatory function of Tpz1-Poz1
        interaction works upstream of Rad3ATR kinase, while Tpz1-Ccq1 interaction works
        downstream of Rad3ATR kinase to facilitate Ccq1 Thr93 phosphorylation and telomerase
        recruitment.
      reference_section_type: ABSTRACT
      full_text_unavailable: false
    - statement: Poz1 is required for heterochromatin formation at telomeres, and disruption
        of Poz1-Rap1 interaction leads to massively elongated telomeres and loss of
        heterochromatin.
      supporting_text: Poz1, besides functioning as a negative regulator of telomerase
        recruitment, is also required for heterochromatin formation at telomeres, and
        disruption of Poz1-Rap1 interaction leads to massively elongated telomeres and
        loss of heterochromatin.
      reference_section_type: INTRODUCTION
      full_text_unavailable: false
    - statement: The Tpz1 region responsible for Poz1 binding maps to residues 486-508,
        with Tpz1 W498 and I501 being critical for the Tpz1-Poz1 interaction.
      supporting_text: The current study identified Tpz1 W498 and I501 as critical for
        Tpz1-Poz1 interaction.
      reference_section_type: RESULTS
      full_text_unavailable: false
- id: PMID:27253066
  title: Multi-step coordination of telomerase recruitment in fission yeast through
    two coupled telomere-telomerase interfaces.
  findings:
    - statement: Poz1 is part of the shelterin bridge architecture connecting Taz1 (dsDNA
        binder) to Pot1 (ssDNA binder) via Rap1-Poz1-Tpz1 interactions, which is
        conserved with the mammalian shelterin arrangement.
      supporting_text: The shelterin complex contains the double-stranded DNA (dsDNA)
        binding protein Taz1 and the single-stranded DNA (ssDNA) binding protein Pot1,
        which are bridged via direct protein-protein interactions between Rap1, Poz1,
        and Tpz1 (human RAP1, TIN2 and TPP1 orthologs, respectively).
      reference_section_type: INTRODUCTION
      full_text_unavailable: false
    - statement: Deletion of poz1 leads to a constitutively telomerase-extendible state,
        and the Tpz1 TEL-patch mutation (R81E) still causes progressive telomere shortening
        even in poz1-deleted cells, showing that Tpz1 TEL-patch function is downstream
        of the shelterin linkage controlled by Poz1.
      supporting_text: tpz1-R81E/poz1 delta cells presented EST phenotype and the cells
        senesced at a later generation, similar to the trt1 delta/poz1 delta mutant.
        This result clearly indicates that Tpz1-Arg81 functions downstream of telomere
        switching from the non-extendible to the extendible state.
      reference_section_type: RESULTS
      full_text_unavailable: false
- id: PMID:29149597
  title: Structural Basis for Shelterin Bridge Assembly.
  findings:
    - statement: The crystal structure of the Tpz1(475-508)-Poz1-Rap1(467-496) complex
        reveals that shelterin bridge assembly is a hierarchical process in which Tpz1
        binding to Poz1 allosterically promotes Rap1 binding to Poz1.
      supporting_text: Biochemical analyses reveal that shelterin bridge assembly is a
        hierarchical process in which Tpz1 binding to Poz1 elicits structural changes
        in Poz1, allosterically promoting Rap1 binding to Poz1.
      reference_section_type: ABSTRACT
      full_text_unavailable: false
    - statement: Tpz1 binding induces folding of the N-terminal helix alpha-1 of Poz1,
        which acts as a conformational trigger for Rap1 binding.
      supporting_text: Tpz1 binding induces the folding of the N-terminal helix alpha-1
        of Poz1.
      reference_section_type: RESULTS
      full_text_unavailable: false
    - statement: Tpz1 and Rap1 bind to two distinctly different surfaces on Poz1; the
        Tpz1-Poz1 interaction allosterically triggers formation of the high-affinity
        Rap1 binding groove on Poz1.
      supporting_text: Taken together, based on the crystal structure of the Tpz1(475-508)-Poz1-Rap1(467-496)
        complex, Tpz1 does not provide any additional binding surface for Rap1 and is
        located in a distinctively different site on Poz1 from Rap1. Thus, Tpz1-Poz1
        interaction most likely triggers allosteric changes in Poz1 that lead to the
        formation of the high affinity Rap1 binding groove.
      reference_section_type: RESULTS
      full_text_unavailable: false
    - statement: Mutation of the conformational trigger in Poz1 leads to unregulated
        telomere lengthening, demonstrating that proper hierarchical assembly of the
        shelterin bridge is required for telomere length regulation.
      supporting_text: Perturbation of the cooperative Tpz1-Poz1-Rap1 assembly through
        mutation of the "conformational trigger" in Poz1 leads to unregulated telomere
        lengthening.
      reference_section_type: ABSTRACT
      full_text_unavailable: false
    - statement: The hierarchical cooperative assembly mechanism is conserved between
        fission yeast (Tpz1-Poz1-Rap1) and human (TPP1-TIN2-TRF2) shelterin bridge
        components.
      supporting_text: Furthermore, we find that the human shelterin counterparts TPP1-TIN2-TRF2
        also assemble hierarchically, indicating cooperativity as a conserved driving
        force for shelterin assembly.
      reference_section_type: ABSTRACT
      full_text_unavailable: false
- id: PMID:29160296
  title: Structure of the fission yeast S. pombe telomeric Tpz1-Poz1-Rap1 complex.
  findings:
    - statement: The crystal structure of Poz1 in complex with Poz1-binding motifs of
        Tpz1 and Rap1 shows that Poz1 employs two different binding surfaces to interact
        with Tpz1 and Rap1.
      supporting_text: The crystal structure shows that Poz1 employs two different binding
        surfaces to interact with Tpz1 and Rap1.
      reference_section_type: ABSTRACT
      full_text_unavailable: false
    - statement: Poz1 unexpectedly adopts a dimeric conformation in the crystal structure.
      supporting_text: Unexpectedly, the structure also reveals that Poz1 adopts a dimeric
        conformation.
      reference_section_type: ABSTRACT
      full_text_unavailable: false
    - statement: Proper interactions between Tpz1, Poz1, and Rap1 in the shelterin core
        complex are required for both telomere length homeostasis and heterochromatin
        structure maintenance at telomeres.
      supporting_text: Mutational analyses suggest that proper interactions between Tpz1,
        Poz1, and Rap1 in the shelterin core complex are required for telomere length
        homeostasis and heterochromatin structure maintenance at telomeres.
      reference_section_type: ABSTRACT
      full_text_unavailable: false
    - statement: Poz1 shares structural resemblance with the TRFH domains of Taz1, human
        TRF1, and human TRF2, suggesting they belong to the same TRFH protein family
        and may share a common evolutionary ancestor.
      supporting_text: Structural resemblance between Poz1 and the TRFH domains of other
        shelterin proteins in fission yeast and humans suggests a model for the evolution
        of shelterin proteins.
      reference_section_type: ABSTRACT
      full_text_unavailable: false
    - statement: The Poz1-Rap1 interaction is required for telomere maintenance mediated
        by homologous recombination when Ccq1 is absent from telomeres.
      supporting_text: The Poz1-Rap1 interaction is also required for telomere maintenance
        mediated by homologous recombination (HR) when Ccq1 is absent from telomeres.
      reference_section_type: INTRODUCTION
      full_text_unavailable: false
    - statement: Simultaneous deletion of ccq1 and poz1 leads to severe telomere deprotection
        reminiscent of tpz1 and pot1 deletion, confirming Ccq1 and Poz1 have redundant
        roles in end protection.
      supporting_text: Although ccq1 delta cells are only partially defective in telomere
        protection, the simultaneous deletion of the ccq1+ and poz1+ genes leads to
        a severe telomere deprotection phenotype reminiscent of tpz1 delta and pot1
        delta cells, suggesting that Ccq1 and Poz1 play redundant roles in end protection.
      reference_section_type: INTRODUCTION
      full_text_unavailable: false
