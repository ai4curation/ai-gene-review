    label: positive regulation of telomere maintenance
  evidence_type: NAS
  original_reference_id: PMID:18535244
  review:
    summary: >-
      This annotation captures that Poz1 affects telomere maintenance, but the
      direction and specificity are off. Poz1 primarily restrains telomerase-dependent
      lengthening rather than positively promoting it.
    action: MODIFY
    reason: >-
      The strongest evidence shows that Poz1 is a negative regulator of telomerase
      recruitment and telomere elongation. A descendant term for negative regulation
