        supporting_text: >-
          Poz1 bridges Pot1-Tpz1 and Taz1-Rap1, thereby connecting the single-stranded
          and double-stranded telomeric DNA regions.
- term:
    id: GO:0005634
    label: nucleus
  evidence_type: IEA
  original_reference_id: GO_REF:0000044
  review:
    summary: >-
      Poz1 is a nuclear protein, but this annotation is much broader than the
      experimentally supported telomeric-repeat localization that best reflects
      its site of action.
    action: KEEP_AS_NON_CORE
    reason: >-
      The nucleus term is correct, yet Poz1 functions specifically at telomeres
      within nuclear shelterin. Keeping this parent localization as non-core
      preserves a true annotation without elevating an overly broad term to the
      primary localization.
    supported_by:
      - reference_id: file:SCHPO/poz1/poz1-uniprot.txt
        supporting_text: >-
          UniProt lists Poz1 in the nucleus and at chromosome/telomere and
          summarizes it as a telomere-associated negative regulator of telomerase.
- term:
    id: GO:0005737
    label: cytoplasm
  evidence_type: IEA
  original_reference_id: GO_REF:0000044
  review:
    summary: >-
      A cytoplasmic pool is noted in UniProt-derived localization mappings, but
      the curated literature overwhelmingly places Poz1 at telomeres in the
      nucleus as a shelterin bridge factor.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      This broad cytoplasm mapping is not clearly false, but it is not informative
      for Poz1's established biology and likely reflects a secondary or transient
      pool rather than the biologically important site of action.
    supported_by:
      - reference_id: file:SCHPO/poz1/poz1-uniprot.txt
        supporting_text: >-
          UniProt includes a cytoplasmic localization call, but also places Poz1
          in the nucleus and at chromosome telomeres where its telomere-regulatory
          function is executed.
