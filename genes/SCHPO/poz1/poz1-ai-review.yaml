id: O13852
gene_symbol: poz1
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:284812
  label: Schizosaccharomyces pombe (strain 972 / ATCC 24843)
description: >-
  Poz1 is a core shelterin bridge protein in Schizosaccharomyces pombe that links
  the Pot1-Tpz1 single-stranded telomere module to the Taz1-Rap1 double-stranded
  telomere module. It promotes telomere capping and telomeric heterochromatin
  organization while restraining telomerase-dependent telomere lengthening by
  limiting Ccq1 phosphorylation and telomerase recruitment at chromosome ends.
