proposed_new_terms: []
suggested_questions:
- question: How is the dual (positive vs negative) regulation of the G2/M transition
    by Sty1 partitioned between conditions, and what determines whether Sty1 promotes
    or delays mitotic entry?
- question: What is the full in vivo substrate repertoire of Sty1 beyond Atf1, Srk1,
    Cmk2, Lsk1, Rum1 and the Pol II CTD, and how is substrate selection achieved between
    the cytoplasmic, nuclear, and mitochondrial pools?
- question: What is the functional significance of the mitochondrial and stress-granule
    pools of Sty1 relative to its dominant cytoplasmic-to-nuclear signaling role?
suggested_experiments:
- description: Quantitative phosphoproteomics of wild-type versus analog-sensitive
    sty1 (sty1-as) cells across distinct stresses (osmotic, oxidative, heat, nitrogen
    starvation) to define the stress-specific in vivo substrate landscape.
- description: Compartment-restricted Sty1 alleles (forced cytoplasmic, nuclear, or
    mitochondrial targeting) to dissect which functions require each subcellular pool.
- description: ChIP-seq of Sty1 and phospho-CTD (Ser5) across the genome under oxidative
    versus osmotic stress to map direct chromatin recruitment and its dependence on
    Atf1 versus Pap1.
