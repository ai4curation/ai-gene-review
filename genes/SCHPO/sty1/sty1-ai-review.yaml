      cell-cycle control.
- id: PMID:9450957
  title: The Win1 mitotic regulator is a component of the fission yeast stress-activated
    Sty1 MAPK pathway.
  findings:
  - statement: Win1 and Wak1 MAPKKKs coordinately control activation of Sty1 in response
      to multiple environmental stresses.
- id: PMID:9585505
  title: 'Regulation of the fission yeast transcription factor Pap1 by oxidative stress:
    requirement for the nuclear export factor Crm1 (Exportin) and the stress-activated
    MAP kinase Sty1/Spc1.'
  findings:
  - statement: Sty1 is required for the oxidative-stress-induced relocalization of
      the Pap1 transcription factor from cytoplasm to nucleus and for oxidative-stress
      gene expression.
- id: PMID:9585506
  title: Phosphorylation and association with the transcription factor Atf1 regulate
    localization of Spc1/Sty1 stress-activated kinase in fission yeast.
  findings:
  - statement: Stress induces transient nuclear localization of Spc1, which requires
      Wis1 phosphorylation and Atf1-dependent nuclear retention.
- id: PMID:9693384
  title: The fission yeast mitotic regulator win1+ encodes an MAP kinase kinase kinase
    that phosphorylates and activates Wis1 MAP kinase kinase in response to high osmolarity.
  findings:
  - statement: Win1 is a MAPKKK that phosphorylates and activates Wis1, upstream of
      Sty1, in response to high osmolarity.
- id: PMID:9718372
  title: Evidence for a novel MAPKKK-independent pathway controlling the stress activated
    Sty1/Spc1 MAP kinase in fission yeast.
  findings:
  - statement: A MAPKKK-independent route can allow Wis1 to activate Sty1 in response
      to stress.
- id: PMID:9819443
  title: Regulation of the Mts1-Mts2-dependent ade6-M26 meiotic recombination hot
    spot and developmental decisions by the Spc1 mitogen-activated protein kinase
    of fission yeast.
  findings:
  - statement: Spc1 phosphorylates Atf1/Mts1, regulating its occupancy of the ade6-M26
      meiotic recombination hotspot and developmental decisions.
core_functions:
- description: Stress-activated MAP kinase (serine/threonine protein kinase) activity;
    the central catalytic effector of the fission yeast core environmental stress response,
    activated by dual Thr-171/Tyr-173 phosphorylation by the MAPKK Wis1.
  supported_by:
  - reference_id: PMID:7657164
    supporting_text: the sty1 gene, which encodes a MAP kinase that is closely related
      to a subfamily of MAP kinases regulated by osmotic stress including Saccharomyces
      cervisiae HOG1 and human CSBP1
    reference_section_type: ABSTRACT
  - reference_id: PMID:8649397
    supporting_text: Spc1 is most closely related to Saccharomyces cerevisiae Hog1
      and mammalian p38 kinases.
    reference_section_type: ABSTRACT
- description: Operates as the terminal kinase of the stress-activated (p38-like) MAPK
    cascade, integrating osmotic, oxidative, heat, and nutrient signals transmitted
    through the Mcs4-Win1/Wak1-Wis1 module.
  supported_by:
  - reference_id: PMID:9136929
    supporting_text: Sty1 is activated by a range of environmental insults including
      osmotic stress, hydrogen peroxide, menadione, heat shock, and the protein synthesis
      inhibitor anisomycin.
    reference_section_type: ABSTRACT
- description: Phosphorylates the bZIP transcription factor Atf1 (and regulates the
    Pap1 pathway) to drive stress-responsive gene transcription, including via direct
    phosphorylation of the RNA polymerase II CTD at stress promoters.
  supported_by:
  - reference_id: PMID:8824588
    supporting_text: We show that Atf1 associates stably and is phosphorylated by the
      Sty1 kinase in vitro.
    reference_section_type: ABSTRACT
  - reference_id: PMID:33410907
    supporting_text: Anchored Sty1 recruits Pol II through direct association with
      Rpb1-CTD and phosphorylates the reiterated heptad sequence at Serine 5.
    reference_section_type: ABSTRACT
- description: Couples the extracellular environment to the cell cycle by regulating
    the G2/M transition (both promoting mitotic entry and, via Srk1/Rad24-Cdc25, delaying
    it) and is required for sexual differentiation and meiosis under nitrogen starvation.
  supported_by:
  - reference_id: PMID:7501024
    supporting_text: A lethal interaction of spc1 and cdc25 mutations shows that Spc1
      promotes the onset of mitosis.
    reference_section_type: ABSTRACT
  - reference_id: PMID:8824587
    supporting_text: Mutant spc1- cells are defective at arresting in G2 during nitrogen
      starvation and exhibit a poor mating ability.
    reference_section_type: ABSTRACT
