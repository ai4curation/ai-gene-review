- id: PMID:10233152
  title: Active nucleocytoplasmic shuttling required for function and regulation of
    stress-activated kinase Spc1/StyI in fission yeast.
  findings:
  - statement: Active nucleocytoplasmic shuttling (Pim1-dependent import, Crm1-dependent
      export) is required for both the function and regulation of Spc1 during osmotic
      stress.
- id: PMID:10398679
  title: Heat-shock-induced activation of stress MAP kinase is regulated by threonine-
    and tyrosine-specific phosphatases.
  findings:
  - statement: Sty1/Spc1 is strongly activated upon heat shock, with PP2C phosphatases
      Ptc1/Ptc3 dephosphorylating Thr-171 to attenuate its activity.
- id: PMID:10428959
