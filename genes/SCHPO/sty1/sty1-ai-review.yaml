id: Q09892
gene_symbol: sty1
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:284812
  label: Schizosaccharomyces pombe (strain 972 / ATCC 24843)
description: Sty1 (also called Spc1, Phh1; ortholog of S. cerevisiae Hog1 and human
  p38/JNK) is the fission yeast stress-activated MAP kinase (SAPK), the central effector
  of the core environmental stress response. It is a serine/threonine protein kinase
  of the HOG1 sub-subfamily that is activated by dual phosphorylation of its Thr-171/Tyr-173
  (TGY) activation-loop motif, catalyzed by the MAP kinase kinase Wis1, and is inactivated
  by the tyrosine phosphatases Pyp1 and Pyp2 and by PP2C-type serine/threonine phosphatases.
  Sty1 is activated by a wide range of stresses including hyperosmotic shock, oxidative
  stress (hydrogen peroxide, menadione, methylglyoxal, arsenite), heat shock, UV, toxic
  cations, and nutrient/nitrogen limitation. In unstressed cells Sty1 is predominantly
  cytoplasmic, but upon activation it rapidly and transiently accumulates in the nucleus,
  where it phosphorylates the bZIP transcription factor Atf1 (and influences the Pap1
  pathway) to drive transcription of stress-response genes, in part by binding and
  phosphorylating the RNA polymerase II C-terminal domain at stress promoters. Sty1
  also phosphorylates the downstream MAPKAP kinase Srk1 and other substrates to couple
  the environment to the G2/M cell-cycle transition (it both promotes and, under certain
  conditions, delays mitotic entry), and it is required for sexual differentiation,
  meiosis, and meiotic recombination during nitrogen starvation.
