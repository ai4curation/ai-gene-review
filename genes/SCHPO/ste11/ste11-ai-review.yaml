- id: GO_REF:0000033
  title: Annotation inferences using phylogenetic trees
  findings: []
- id: GO_REF:0000044
  title: Gene Ontology annotation based on UniProtKB/Swiss-Prot Subcellular Location
    vocabulary mapping, accompanied by conservative changes to GO terms applied by
    UniProt
  findings: []
- id: PMID:10867006
  title: Sequence-specific high mobility group box factors recognize 10-12-base pair
    minor groove motifs.
  findings:
  - statement: >-
      Ste11 recognizes an extended ~12-bp minor-groove motif and bends DNA upon
      binding via its HMG box.
    supporting_text: >-
      By site selection, we identify a highly specific 12-base pair motif for
      Ste11, AGAACAAAGAAA.
    reference_section_type: ABSTRACT
- id: PMID:10908327
  title: Dmc1 of Schizosaccharomyces pombe plays a role in meiotic recombination.
  findings:
  - statement: >-
      The meiotic dmc1/rad24 bicistronic transcript is induced under Ste11
      control, illustrating Ste11 regulation of meiotic recombination genes.
    supporting_text: >-
      Induction of the bicistronic transcript is under the control of a
      meiosis-specific transcription factor, Ste11.
    reference_section_type: ABSTRACT
- id: PMID:10982411
  title: A zinc-finger protein, Rst2p, regulates transcription of the fission yeast
    ste11(+) gene, which encodes a pivotal transcription factor for sexual development.
  findings:
  - statement: >-
      ste11 transcription is induced by starvation/low PKA via the zinc-finger
      activator Rst2 and is positively autoregulated through a TR-box in its own
      promoter.
    supporting_text: >-
      A complete Ste11p-binding motif (TR box) found in the promoter region was
      necessary for the full expression of ste11, suggesting that Ste11p is
      involved in the activation of ste11.
    reference_section_type: ABSTRACT
- id: PMID:11554925
  title: The RGS domain-containing fission yeast protein, Rgs1p, regulates pheromone
    signalling and is required for mating.
  findings:
  - statement: rgs1 is a direct Ste11 target gene required for mating.
    supporting_text: >-
      rgs1, a member of the Regulator of G-protein Signalling (RGS) family, as a
      novel Ste11 target gene.
    reference_section_type: ABSTRACT
- id: PMID:1435723
  title: Functional conservation between Schizosaccharomyces pombe ste8 and Saccharomyces
    cerevisiae STE11 protein kinases in yeast signal transduction.
  findings:
  - statement: >-
      Study of the fission-yeast pheromone signaling pathway controlling mat1-Pm
      transcription and meiotic entry. The cached abstract foregrounds the upstream
      kinase ste8 (= byr2); PomBase used this paper as the IMP source for ste11's
      positive regulation of Pol II transcription (ste11 is the master activator in this
      pathway). Full text is not in our cache.
    supporting_text: >-
      the mat1-Pm gene, which is required for entry into meiosis, is
      expressed in response to a pheromone signal
    reference_section_type: ABSTRACT
- id: PMID:15713656
  title: Constitutive activation of the fission yeast pheromone-responsive pathway
    induces ectopic meiosis and reveals ste11 as a mitogen-activated protein kinase
    target.
  findings:
  - statement: >-
      Ste11 is a direct target of the pheromone-pathway MAPK Spk1 (physical
      interaction and in vitro phosphorylation) and of the Pat1 kinase; ste11 is
      required for pheromone-induced G1 arrest.
    supporting_text: >-
      we show that Spk1 can interact physically with Ste11 and also phosphorylate
      the transcription factor in vitro.
    reference_section_type: ABSTRACT
- id: PMID:1657709
  title: Schizosaccharomyces pombe ste11+ encodes a transcription factor with an HMG
    motif that is a critical regulator of sexual development.
  findings:
  - statement: >-
      Ste11 is an HMG-box transcription factor essential for sexual development; it
      binds the TR-box (TTCTTTGTTY) and positively regulates mating-type and mei2
      gene transcription.
    supporting_text: >-
      Expression of ste11 is essential for induction of sexual development, and its
      ectopic expression stimulates uncontrolled mating and sporulation.
    reference_section_type: ABSTRACT
- id: PMID:16823372
  title: ORFeome cloning and global analysis of protein localization in the fission
    yeast Schizosaccharomyces pombe.
  findings:
  - statement: >-
      High-throughput GFP localization detects Ste11 in nucleus and cytosol.
    supporting_text: >-
      ORFeome cloning and global analysis of protein localization in the fission
      yeast Schizosaccharomyces pombe.
    reference_section_type: TITLE
- id: PMID:17046992
  title: Fission yeast Tor2 promotes cell growth and represses cell differentiation.
  findings:
  - statement: >-
      Tor2 (TORC1) represses sexual differentiation by interfering with Ste11 and
      Mei2, defining the Tor2-Mei2-Ste11 regulatory association.
    supporting_text: >-
      This newly revealed function of Tor2 appears to operate by interfering with
      the functions of the transcription factor Ste11 and the meiosis-promoting
      RNA-binding protein Mei2.
    reference_section_type: ABSTRACT
- id: PMID:20634885
  title: TOR and PKA pathways synergize at the level of the Ste11 transcription factor
    to prevent mating and meiosis in fission yeast.
  findings:
  - statement: >-
      PKA and TOR pathways repress Ste11 by blocking its nuclear accumulation;
      Ste11 shuttles between cytoplasm and nucleus and accumulates in the nucleus
      under starvation.
    supporting_text: >-
      both the PKA and the TOR pathways inhibit Ste11 nuclear accumulation to
      repress Ste11-dependent gene expression.
    reference_section_type: ABSTRACT
- id: PMID:21879336
  title: Multistep regulation of protein kinase A in its localization, phosphorylation
    and binding with a regulatory subunit in fission yeast.
  findings:
  - statement: >-
      In PKA-null (sam) mutants Ste11 is induced and localizes to the nucleus even
      in rich medium, confirming PKA-dependent control of Ste11.
    supporting_text: >-
      Rst2 and Ste11 proteins were induced and localized to the nucleus of sam5 and
      sam7 mutants even under rich glucose conditions
    reference_section_type: ABSTRACT
- id: PMID:37788281
  title: A dominant negative 14-3-3 mutant in Schizosaccharomyces pombe distinguishes
    the binding proteins involved in sexual differentiation and check point.
  findings:
  - statement: >-
      Ste11 is among the 14-3-3-related sexual-differentiation factors; it is
      active in the nucleoplasm.
    supporting_text: >-
      A dominant negative 14-3-3 mutant in Schizosaccharomyces pombe distinguishes
      the binding proteins involved in sexual differentiation and check point.
    reference_section_type: TITLE
- id: PMID:40015273
  title: A comprehensive Schizosaccharomyces pombe atlas of physical transcription
    factor interactions with proteins and chromatin.
  findings:
  - statement: >-
      Genome-wide atlas confirms Ste11 physical interactions with chromatin at RNA
      polymerase II cis-regulatory regions.
    supporting_text: >-
      A comprehensive Schizosaccharomyces pombe atlas of physical transcription
      factor interactions with proteins and chromatin.
    reference_section_type: TITLE
- id: PMID:7975894
  title: 'Mating pheromone-induced expression of the mat1-Pm gene of Schizosaccharomyces
    pombe: identification of signalling components and characterization of upstream
    controlling elements.'
  findings:
  - statement: >-
      mat1-Pm induction requires a TR-box recognized by Ste11; ste11 deletion
      abolishes and Ste11 overexpression boosts mat1-Pm expression.
    supporting_text: >-
      Almost no expression of mat1-Pm was detected in a ste11 deletion mutant,
      whereas overproduction of Ste11 greatly increased the expression.
    reference_section_type: ABSTRACT
- id: PMID:8196631
  title: 'Analysis of the structural genes encoding M-factor in the fission yeast
    Schizosaccharomyces pombe: identification of a third gene, mfm3.'
  findings:
  - statement: >-
      Transcription of the M-factor pheromone genes (mfm) requires mat1-Mc and
      ste11.
    supporting_text: >-
      Their transcription is limited to M cells and requires the mat1-Mc and ste11
      gene products.
    reference_section_type: ABSTRACT
- id: PMID:8945514
  title: 'Molecular mimicry in development: identification of ste11+ as a substrate
    and mei3+ as a pseudosubstrate inhibitor of ran1+ kinase.'
  findings:
  - statement: >-
      Ste11 is a substrate of the meiosis-repressing Pat1/Ran1 kinase, a reaction
      inhibited by the Mei3 pseudosubstrate.
    supporting_text: >-
      the ste11+ transcription factor is a substrate for ran1+ in vitro and that
      this reaction is directly inhibited by mei3+.
    reference_section_type: ABSTRACT
- id: PMID:9233811
  title: 'Cell differentiation by interaction of two HMG-box proteins: Mat1-Mc activates
    M cell-specific genes in S.pombe by recruiting the ubiquitous transcription factor
    Ste11 to weak binding sites.'
  findings:
  - statement: >-
      Mat1-Mc cooperates with Ste11, enhancing Ste11 binding to weak M-cell
      TR-boxes and forming a Ste11-Mat1-Mc-DNA complex for M-specific activation.
    supporting_text: >-
      The Mat1-Mc protein caused a dramatic increase in the DNA-binding of Ste11 to
      this box
    reference_section_type: ABSTRACT
