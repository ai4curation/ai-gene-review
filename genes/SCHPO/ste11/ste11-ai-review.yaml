  evidence_type: IMP
  original_reference_id: PMID:1435723
  qualifier: involved_in
  review:
    summary: >-
      Positive regulation of transcription by RNA polymerase II is the defining, core
      function of the ste11 HMG transcription factor, supported by extensive experimental
      evidence (it activates mat-Pc/Pm, mei2, mfm pheromone genes, etc.). This PomBase
      IMP annotation cites Styrkarsdottir et al. 1992, a study of the pheromone signaling
