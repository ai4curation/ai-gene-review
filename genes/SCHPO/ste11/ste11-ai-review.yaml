id: P36631
gene_symbol: ste11
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:284812
  label: Schizosaccharomyces pombe (strain 972 / ATCC 24843)
description: >-
  Ste11 is an HMG-box DNA-binding transcription factor that is the master
  regulator of sexual differentiation (mating/conjugation and meiotic entry) in
  the fission yeast Schizosaccharomyces pombe. It binds sequence-specifically, via
  its single N-terminal HMG box, to T-rich TR-box elements (consensus TTCTTTGTTY)
  in the promoters of genes required for mating and meiosis, where it bends DNA
  and activates RNA polymerase II transcription. Direct Ste11 targets include the
  mating-type genes mat1-Pc/mat1-Mc, the meiotic master-switch gene mei2, the
  M-factor pheromone genes (mfm1/2/3), pheromone-pathway genes such as map3, mam2,
  ste6 and rgs1, and meiotic recombination genes (dmc1/rad24); Ste11 also
  positively autoregulates its own promoter. Ste11 expression and activity are
  controlled by nutrient signaling: nitrogen/carbon starvation lowers cAMP and
  PKA activity, relieving repression of the upstream activator Rst2 and activating
  the Sty1 SAPK/Atf1 pathway, both of which induce ste11 transcription; the PKA and
  TORC1 (Tor2) pathways together repress Ste11 by blocking its nuclear
  accumulation, and Ste11 protein shuttles between the cytoplasm and the nucleus,
  accumulating in the nucleus upon starvation and pheromone stimulation. Ste11
  activity is further gated by phosphorylation: it is a substrate of the
  meiosis-repressing Pat1/Ran1 kinase (antagonized by the Mei3 pseudosubstrate
  inhibitor) and a target of the pheromone-pathway MAPK Spk1, and it cooperates
  with the M-cell HMG-box protein Mat1-Mc to drive M-cell-specific transcription.
