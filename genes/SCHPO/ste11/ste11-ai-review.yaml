core_functions:
- description: >-
    Sequence-specific HMG-box transcription factor that binds and bends T-rich
    TR-box (consensus TTCTTTGTTY) cis-regulatory elements in RNA polymerase II
    promoters of sexual-development genes.
  supported_by:
  - reference_id: PMID:1657709
    supporting_text: >-
      Ste11 protein synthesized in vitro binds specifically to a DNA fragment
      carrying a 10-base motif TTCTTTGTTY that is an essential cis-acting element
      for the induction of mei2
  - reference_id: PMID:10867006
    supporting_text: >-
      The sequence-specific interaction of Ste11 with these 3' base pairs
      contributes significantly to binding and bending of the DNA motif.
  molecular_function:
    id: GO:0000981
    label: DNA-binding transcription factor activity, RNA polymerase II-specific
  directly_involved_in:
  - id: GO:0045944
    label: positive regulation of transcription by RNA polymerase II
  locations:
  - id: GO:0005634
    label: nucleus
- description: >-
    Master transcriptional activator of sexual differentiation: upon nutrient
    starvation Ste11 activates transcription of mating-type genes (mat1-Pc/Mc),
    the meiotic switch gene mei2, M-factor pheromone genes and other
    pheromone-pathway/meiotic genes, driving conjugation and meiotic entry; it
    cooperates with Mat1-Mc on M-cell-specific promoters and autoregulates its own
    promoter.
  supported_by:
  - reference_id: PMID:1657709
    supporting_text: >-
      Ste11 protein regulates positively transcription of the following genes
      required for sexual development: the mating type genes, matP and matM, and
      the mei2 gene, which is essential for commitment to meiosis.
  - reference_id: PMID:9233811
    supporting_text: >-
      This regulation requires two HMG-box proteins: the ubiquitous Ste11
      transcription factor and the M cell-controlling protein Mat1-Mc.
  molecular_function:
    id: GO:0001228
    label: DNA-binding transcription activator activity, RNA polymerase II-specific
  directly_involved_in:
  - id: GO:0031139
    label: positive regulation of conjugation with cellular fusion
  locations:
  - id: GO:0005634
    label: nucleus
proposed_new_terms: []
suggested_questions:
- question: >-
    What is the precise composition and stoichiometry of the Ste11-containing
    transcription regulator complexes at different target promoters (e.g., with
    Mat1-Mc, Mat1-Pc, Atf1/Pcr1, Mediator)?
- question: >-
    How do the Pat1/Ran1 and Spk1 (MAPK) phosphorylation events mechanistically
    switch Ste11 between inactive and active states during the transition from
    mating to meiosis?
suggested_experiments:
- experiment: >-
    Genome-wide ChIP-seq of Ste11 under vegetative growth, nitrogen starvation and
    pheromone stimulation to define the complete direct target gene set and TR-box
    occupancy dynamics.
- experiment: >-
    Phospho-site mapping and phosphomutant analysis (Pat1/Ran1 and Spk1/MAPK
    sites) combined with nuclear-localization and target-gene reporter assays to
    quantify how each modification gates Ste11 activity and nuclear accumulation.
