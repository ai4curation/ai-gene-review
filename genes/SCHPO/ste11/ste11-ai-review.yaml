      upstream kinase ste8 (= byr2) in that pathway, and the full text is not available
      in our cache. Because the function is unambiguously core for ste11 and PomBase made
      an experimental (IMP) assignment, the annotation is accepted; we lack the full text
      to second-guess the curator's choice of evidence.
    action: ACCEPT
    reason: >-
      Positive regulation of Pol II transcription is the core, well-established function
      of the ste11 transcription factor. The cited PomBase IMP comes from a study of the
      pheromone-induced mat1-Pm transcription pathway in which ste11 is the master
      activator; the full text is not in our cache, so we defer to the curator rather
      than overrule the annotation. (An earlier REMOVE call asserting "wrong gene / name
      confusion" was based only on the cached abstract and is retracted.)
    supported_by:
    - reference_id: PMID:1435723
      supporting_text: >-
        the mat1-Pm gene, which is required for entry into meiosis, is
        expressed in response to a pheromone signal
