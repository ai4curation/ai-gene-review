core_functions:
- description: >-
    Dual-specificity protein kinase that phosphorylates the cyclin-dependent
    kinase Cdc2 (Cdk1) on the inhibitory residue Tyr15, acting as the
    rate-limiting, dose-dependent negative regulator of the mitotic G2/M
    transition and coupling cell size to mitotic entry.
  supported_by:
  - reference_id: PMID:1372994
    supporting_text: >-
      These results indicate that p107wee1 functions as a mitotic inhibitor by
      directly phosphorylating p34cdc2 on Tyr-15 and that the preferred substrate
      for phosphorylation is the p34cdc2/cyclin complex.
  - reference_id: PMID:3032459
    supporting_text: >-
      Thus wee1+ functions as a dose-dependent inhibitor of mitosis, the first
      such element to be specifically identified and cloned.
  molecular_function:
    id: GO:0004713
    label: protein tyrosine kinase activity
  directly_involved_in:
  - id: GO:0010972
    label: negative regulation of G2/M transition of mitotic cell cycle
  - id: GO:0031569
    label: mitotic G2 cell size control checkpoint signaling
  locations:
  - id: GO:0005634
    label: nucleus
  - id: GO:0071341
    label: medial cortical node
- description: >-
    Shared cell-cycle-arrest effector and meiotic regulator: Wee1 enforces G2/M
    (and meiotic G2/MI) delay downstream of the DNA-damage (Chk1), DNA-
    replication (Cds1), and cytokinesis checkpoints by inhibitory Tyr15
    phosphorylation of Cdc2, and also contributes to stable kinetochore-
    microtubule attachment during mitosis.
  supported_by:
  - reference_id: PMID:25492408
    supporting_text: >-
      Meanwhile, activation of Cds1 inhibits CDK activity by activating Mik1 and
      Wee1 tyrosine kinases (Murakami & Nurse 1999), thus preventing entry into
      meiotic nuclear divisions.
  - reference_id: PMID:10704373
    supporting_text: >-
      We conclude that an F-actin and Wee1p dependent checkpoint blocks G(2)/M
      transition until previous cytokinesis is completed.
