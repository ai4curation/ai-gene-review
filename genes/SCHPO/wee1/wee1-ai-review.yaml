id: P07527
gene_symbol: wee1
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:284812
  label: Schizosaccharomyces pombe (strain 972 / ATCC 24843)
description: >-
  Wee1 is the prototypical dose-dependent negative regulator of mitotic entry in
  fission yeast and the founding member of the WEE1 protein kinase subfamily. It
  is a dual-specificity protein kinase (acting on both serine and tyrosine
  residues; EC 2.7.10.2) whose principal physiological substrate is the
  cyclin-dependent kinase Cdc2 (Cdk1). Wee1 phosphorylates Cdc2 on the inhibitory
  residue Tyr15, keeping the Cdc2/cyclin complex inactive until cells reach a
  threshold size; the antagonistic phosphatase Cdc25 removes this phosphate to
  trigger the G2/M transition. Loss of Wee1 causes premature mitosis at roughly
  half the normal cell size (the "wee" small-cell phenotype). Wee1 localizes
  predominantly to the nucleus and spindle pole body, where it can act on Cdc2,
  and is recruited in transient bursts to medial cortical Cdr2 nodes, where the
  upstream SAD-family kinases Cdr1 and Cdr2 phosphorylate and inhibit it in a
  cell-size-dependent manner. Beyond canonical G2/M size control, Wee1 serves as
  the shared effector that enforces cell-cycle delay downstream of the DNA-damage
  (Chk1), DNA-replication (Cds1), and cytokinesis checkpoints, contributes to
  stable kinetochore-microtubule attachment in mitosis, and (together with the
  related kinase Mik1) restrains premature meiotic divisions.
