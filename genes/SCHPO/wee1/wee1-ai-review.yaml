- term:
    id: GO:0110031
    label: negative regulation of G2/MI transition of meiotic cell cycle
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: involved_in
  review:
    summary: >-
      Unlike many S. pombe meiotic over-annotations that stem from expression
      ("mug") keywords, this is a genuine meiotic function. Wee1, together with
      Mik1, inhibits CDK to prevent premature meiotic nuclear divisions
      downstream of the Cds1 replication checkpoint; inactivation of Mik1/Wee1
      triggers meiotic divisions. The phylogenetic inference is corroborated by
      experimental genetics.
    action: ACCEPT
    reason: >-
      Genuine meiotic effector role (Tyr15 phosphorylation of Cdc2 restraining
      meiotic divisions), supported by phylogeny and experimental evidence;
      non-core relative to the principal mitotic function.
    supported_by:
    - reference_id: PMID:25492408
      supporting_text: >-
        Meanwhile, activation of Cds1 inhibits CDK activity by activating Mik1
        and Wee1 tyrosine kinases (Murakami & Nurse 1999), thus preventing entry
        into meiotic nuclear divisions.
      reference_section_type: INTRODUCTION
