references:
- id: GO_REF:0000002
  title: Gene Ontology annotation through association of InterPro records with GO
    terms
  findings:
  - statement: >-
      InterPro domain mapping assigns protein kinase activity and ATP binding,
      consistent with the experimentally validated Wee1 kinase domain
      (residues 566-843) and ATP-binding site (K596).
    supporting_text: >-
      Belongs to the protein kinase superfamily. Ser/Thr protein kinase family.
      WEE1 subfamily.
- id: GO_REF:0000003
  title: Gene Ontology annotation based on Enzyme Commission mapping
  findings: []
- id: GO_REF:0000033
  title: Annotation inferences using phylogenetic trees
  findings:
  - statement: >-
      Phylogenetic (PANTHER) inference assigns Wee1 the conserved WEE1-family
      functions of tyrosine kinase activity and negative regulation of the G2/M
      transition, concordant with the S. pombe experimental data.
    supporting_text: >-
      Protein kinase that acts both on serines and on tyrosines. It acts as a
      dosage-dependent negative regulator of entry into mitosis (G2 to M
      transition). Phosphorylates and inhibits cdc2.
- id: GO_REF:0000044
  title: Gene Ontology annotation based on UniProtKB/Swiss-Prot Subcellular Location
    vocabulary mapping, accompanied by conservative changes to GO terms applied by
    UniProt
  findings: []
- id: GO_REF:0000116
  title: Automatic Gene Ontology annotation based on Rhea mapping
  findings: []
- id: PMID:10704373
  title: A checkpoint that monitors cytokinesis in Schizosaccharomyces pombe.
  findings:
  - statement: >-
      Wee1 is the G2/M effector of a cytokinesis-monitoring checkpoint; a wee1
      mutation suppresses the G2/M delay of cytokinesis-defective cps1-191 cells.
    supporting_text: >-
      The G(2)/M transition defect of cps1-191 mutants is suppressed by a
      mutation in the wee1 gene and also by the dominant cdc2 allele cdc2-1w, but
      not the cdc2-3w allele.
- id: PMID:12186947
  title: A novel chk1-dependent G1/M checkpoint in fission yeast.
  findings:
  - statement: >-
      In checkpoint-arrested orp1-4 cells, Wee1 phosphorylates and inactivates
      Cdc2, acting as the effector enforcing the Chk1-dependent arrest.
    supporting_text: >-
      We show that in G1-arrested orp1-4 cells, Wee1 phosphorylates and
      inactivates Cdc2.
- id: PMID:1372994
  title: p107wee1 is a dual-specificity kinase that phosphorylates p34cdc2 on tyrosine
    15.
  findings:
  - statement: >-
      Purified Wee1 catalytic domain is a dual-specificity (Ser + Tyr) kinase
      that directly phosphorylates Cdc2 on Tyr15, preferentially when Cdc2 is
      complexed with cyclin, thereby inhibiting Cdc2 H1 kinase activity.
    supporting_text: >-
      These results indicate that p107wee1 functions as a mitotic inhibitor by
      directly phosphorylating p34cdc2 on Tyr-15 and that the preferred substrate
      for phosphorylation is the p34cdc2/cyclin complex.
- id: PMID:16823372
  title: ORFeome cloning and global analysis of protein localization in the fission
    yeast Schizosaccharomyces pombe.
  findings:
  - statement: >-
      Genome-wide YFP-tagging localization screen detected Wee1 at the mitotic
      spindle pole body.
    supporting_text: >-
      we determined the localization of 4,431 proteins, corresponding to
      approximately 90% of the fission yeast proteome, by tagging each ORF with
      the yellow fluorescent protein.
- id: PMID:1825699
  title: Fission yeast p107wee1 mitotic inhibitor is a tyrosine/serine kinase.
  findings:
  - statement: >-
      Wee1 is a tyrosine/serine (dual-specificity) protein kinase; its kinase
      activities depend on an intact ATP-binding domain.
    supporting_text: >-
      Both kinase activities are attributable to p107wee1 because they are also
      observed when wee1+ is expressed in heterologous systems; both are
      abolished by a point mutation in the ATP-binding domain
- id: PMID:19474789
  title: A spatial gradient coordinates cell size and mitotic entry in fission yeast.
  findings:
  - statement: >-
      Wee1 is a component of medial cortical nodes (with Cdr1, Cdr2, Mid1) that,
      together with the Pom1 polar gradient, couple cell size to mitotic entry;
      Wee1 also localizes to the nucleus and spindle pole body.
    supporting_text: >-
      This network is located at cortical nodes in the middle of interphase
      cells, and these nodes contain the Cdk1 inhibitor Wee1, the Wee1-inhibitory
      kinases Cdr1 (also known as Nim1) and Cdr2, and the anillin-like protein
      Mid1.
- id: PMID:19474792
  title: Polar gradients of the DYRK-family kinase Pom1 couple cell length with the
    cell cycle.
  findings:
  - statement: >-
      The Pom1 polar gradient measures cell length and inhibits the SAD-family
      Wee1 inhibitors Cdr1 and Cdr2 at the medial cortex, controlling Wee1-
      dependent mitotic entry.
    supporting_text: >-
      Genetic analyses indicate that Pom1 negatively regulates Cdr1 and Cdr2, two
      previously described Wee1 inhibitors of the SAD kinase family.
- id: PMID:24508166
  title: Dueling kinases regulate cell size at division through the SAD kinase Cdr2.
  findings:
  - statement: >-
      Cdr2 organizes medial cortical nodes that promote mitotic entry through
      Wee1 and Cdk1; Ssp1 activates and Pom1 inhibits Cdr2, integrating cell size
      with Wee1 regulation.
    supporting_text: >-
      Key to this integration in fission yeast is the SAD family kinase Cdr2,
      which organizes a set of cortical nodes in the cell middle to promote
      mitotic entry through Wee1 and Cdk1.
- id: PMID:25492408
  title: Meiotic nuclear movements in fission yeast are regulated by the transcription
    factor Mei4 downstream of a Cds1-dependent replication checkpoint pathway.
  findings:
  - statement: >-
      Mik1 and Wee1 tyrosine kinases are activated by the Cds1 replication
      checkpoint to inhibit CDK and prevent premature entry into meiotic nuclear
      divisions; their inactivation overcomes the replication checkpoint and
      triggers meiotic divisions.
    supporting_text: >-
      Meanwhile, activation of Cds1 inhibits CDK activity by activating Mik1 and
      Wee1 tyrosine kinases (Murakami & Nurse 1999), thus preventing entry into
      meiotic nuclear divisions.
- id: PMID:29514920
  title: Cell size-dependent regulation of Wee1 localization by Cdr2 cortical nodes.
  findings:
  - statement: >-
      Endogenous Wee1 localizes to Cdr2 cortical nodes in transient bursts whose
      frequency scales ~20-fold with cell size; recruitment requires Cdr2 kinase
      activity and the Wee1 N terminus, and node-based Cdr1/Cdr2 phosphorylation
      inhibits Wee1 to promote mitotic entry.
    supporting_text: >-
      increasing Cdr2 activity during cell growth promotes Wee1 localization to
      nodes, where inhibitory phosphorylation of Wee1 by Cdr1 and Cdr2 kinases
      promotes mitotic entry.
- id: PMID:3032459
  title: Negative regulation of mitosis by wee1+, a gene encoding a protein kinase
    homolog.
  findings:
  - statement: >-
      wee1+ is a dose-dependent inhibitor of mitosis; wee1- mutants enter mitosis
      at half the normal cell size, and wee1+ competes with cdc25+ to regulate
      the cdc2+ kinase.
    supporting_text: >-
      Fission yeast wee1- mutants initiate mitosis at half the cell size of wild
      type.
  - statement: >-
      Wee1 acts within a control system regulating Cdc2, antagonized by Cdc25.
    supporting_text: >-
      Genetic evidence indicates that wee1+ and cdc25+ compete in a control
      system regulating the cdc2+ protein kinase, which is required for mitotic
      initiation.
- id: PMID:34958661
  title: Arf6 anchors Cdr2 nodes at the cell cortex to control cell size at division.
  findings:
  - statement: >-
      Cdr2 forms medial cortical multiprotein nodes that inhibit Wee1 to couple
      cell surface area with the G2/M transition; Arf6 anchors these nodes, and
      its loss reduces Wee1 inhibitory phosphorylation.
    supporting_text: >-
      The protein kinase Cdr2 contributes to this size control system by forming
      multiprotein nodes that inhibit Wee1 at the medial cell cortex.
- id: PMID:38166399
  title: Fission yeast Wee1 is required for stable kinetochore-microtubule attachment.
  findings:
  - statement: >-
      Wee1 is required for stable kinetochore-microtubule attachment and accurate
      chromosome segregation; wee1 mutants rely on the spindle checkpoint for
      biorientation, and this requirement is genetically separable from premature
      mitotic onset.
    supporting_text: >-
      It appears that the wee1 mutant cannot maintain stable
      kinetochore-microtubule attachment, and relies on the delay imposed by the
      spindle checkpoint for establishing biorientation of kinetochores.
- id: PMID:7681363
  title: Negative regulation of the wee1 protein kinase by direct action of the nim1/cdr1
    mitotic inducer.
  findings:
  - statement: >-
      Nim1/Cdr1 directly phosphorylates the Wee1 C-terminus, reducing its cdc2-
      specific tyrosine kinase activity; Wee1 is thus subject to negative
      regulation by phosphorylation.
    supporting_text: >-
      The nim1-catalyzed phosphorylation of the wee1 protein occurs in its
      C-terminal region and leads to a substantial drop in its activity as a
      cdc2-specific tyrosine kinase.
- id: PMID:8256510
  title: Comparison of the biochemical and biological functions of tyrosine phosphatases
    from fission yeast, budding yeast and animal cells.
  findings:
  - statement: >-
      p107wee1 is an in vitro substrate for the Pyp1 tyrosine phosphatase, which
      (with Pyp2) acts as a mitotic inhibitor upstream of the wee1/mik1 pathway.
    supporting_text: >-
      32P-labeled p107wee1 is an in vitro substrate for pyp1.
- id: PMID:872890
  title: Controls over the timing of DNA replication during the cell cycle of fission
    yeast.
  findings:
  - statement: >-
      Genetic analysis of cell-cycle timing in fission yeast underpins the role
      of wee1 in G2 cell-size control (and the absence of a comparable G1 size-
      control role).
    supporting_text: >-
      Controls over the timing of DNA replication during the cell cycle of
      fission yeast.
- id: PMID:9034337
  title: Chk1 is a wee1 kinase in the G2 DNA damage checkpoint inhibiting cdc2 by
    Y15 phosphorylation.
  findings:
  - statement: >-
      In the G2 DNA-damage checkpoint, Chk1 phosphorylates Wee1 directly; Wee1
      is required for chk1-induced cell-cycle arrest, maintaining inhibitory
      Cdc2 Tyr15 phosphorylation and G2 delay.
    supporting_text: >-
      We observed that p107wee1 is hyperphosphorylated in cells delayed by chk1
      overexpression or UV irradiation, and that p56chk1 can phosphorylate
      p107wee1 directly in vitro.
- id: Reactome:R-SPO-75040
  title: Phosphorylation of Wee1 kinase by Chk1
  findings: []
suggested_questions:
- question: >-
    Which Wee1 residues are phosphorylated by Cdr1 (C-terminal kinase domain)
    versus Cdr2 (N-terminal region), and how do these modifications quantitatively
    combine to switch off Wee1 catalytic activity as cells grow?
- question: >-
    What is the substrate of Wee1 relevant to kinetochore-microtubule attachment?
    Is the kinetochore role mediated by Cdc2 Tyr15 phosphorylation, or by a
    distinct substrate analogous to Drosophila KLP61F/kinesin-5?
- question: >-
    How is the nuclear/SPB pool of Wee1 (where it acts on Cdc2) exchanged with
    the cortical node pool (where it is inhibited), and is nucleocytoplasmic
    shuttling a regulated step in size control?
suggested_experiments:
- description: >-
    Phospho-mapping (mass spectrometry) of Wee1 from cdr1Delta versus cdr2Delta
    cells, combined with phospho-site mutants, to define the inhibitory
    phosphorylation code and test the proposed processive Cdr2-then-Cdr1
    phosphorylation model.
- description: >-
    Separation-of-function analysis using a Wee1 kinase-active allele defective
    only in kinetochore function to determine whether the kinetochore-microtubule
    attachment role requires Cdc2 Tyr15 phosphorylation or a separate substrate.
- description: >-
    Quantitative live-cell imaging of endogenously tagged Wee1 to measure the
    relative sizes and exchange rates of the nuclear, SPB, and cortical-node
    pools across the cell cycle and as a function of cell size.
- description: >-
    Genetic and biochemical dissection of the relative contributions of Wee1 and
    Mik1 to meiotic G2/MI control downstream of Cds1, including Cdc2 Tyr15
    phosphorylation status during meiotic replication-checkpoint arrest.
