      exogenous substrate on tyrosine, with activity abolished by an
      ATP-binding-site mutation. Core molecular function.
    action: ACCEPT
    reason: >-
      Direct, ATP-binding-dependent demonstration of the core tyrosine kinase
      activity.
    supported_by:
    - reference_id: PMID:1825699
      supporting_text: >-
        Both kinase activities are attributable to p107wee1 because they are also
        observed when wee1+ is expressed in heterologous systems; both are
        abolished by a point mutation in the ATP-binding domain
      reference_section_type: ABSTRACT
