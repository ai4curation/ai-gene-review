taxon:
  id: NCBITaxon:284812
  label: Schizosaccharomyces pombe (strain 972 / ATCC 24843)
description: |-
  Cdc15 (SPAC20G8.05c) is the founding member of the PCH/F-BAR (Pombe Cdc15
  Homology) protein family and an essential membrane-cytoskeleton scaffolding
  protein required for cytokinesis in fission yeast. It has a three-part domain
  architecture: an N-terminal FCH/F-BAR membrane-binding module, a central
  intrinsically disordered region (IDR) that is uniquely essential and heavily
  phosphoregulated, and a C-terminal SH3 protein-interaction domain. Its core
  molecular role is to couple the plasma membrane to actomyosin contractile-ring
  components and regulators, thereby driving assembly, anchoring, and integrity
  of the contractile ring at the cell division site. The F-BAR domain binds
  membrane phospholipids and provides a protein-binding platform that directly
  recruits the formin Cdc12 (and type-I myosin Myo1), while the SH3 domain (partly
  redundant with the SH3 of the paralog Imp2) recruits ring-stabilizing proteins
  such as Pxl1 (paxillin) and Fic1. Cdc15 is hyperphosphorylated in interphase
  (localizing to cortical patches at cell tips) and becomes hypophosphorylated
  during mitosis/cytokinesis (relocalizing to the medial contractile ring);
  dephosphorylation (involving the Clp1/Cdc14-family phosphatase) promotes an
  assembly-competent open conformation, increased membrane binding, oligomerization,
  and phase separation, whereas multiple polarity kinases (Pom1, Kin1, Shk1/Pak1,
  Pck1) phosphorylate the IDR to antagonize condensation and ring assembly. Note
  that S. pombe Cdc15 is an F-BAR/SH3 scaffold and is NOT a protein kinase
  (unlike the unrelated budding-yeast Cdc15 of the Mitotic Exit Network).
