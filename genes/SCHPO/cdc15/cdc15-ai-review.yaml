id: Q09822
gene_symbol: cdc15
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:284812
  label: Schizosaccharomyces pombe (strain 972 / ATCC 24843)
description: >-
  Essential F-BAR domain scaffold protein and founding member of the PCH (Pombe Cdc15 Homology)
  family. Cdc15 links the cytokinetic contractile ring to the plasma membrane via its N-terminal
  F-BAR domain, which oligomerizes tip-to-tip for high-avidity membrane binding without tubulating
  membranes. Directly recruits formin Cdc12 for F-actin nucleation and type I myosin Myo1 for
  Arp2/3-dependent actin assembly. The C-terminal SH3 domain scaffolds a network of cytokinesis
  proteins including Pxl1, Fic1, and Imp2. Phosphoregulation by Pom1, Cdk1, and other kinases
  controls Cdc15 activity through the cell cycle. Also functions in clathrin-dependent endocytosis
  at actin cortical patches during interphase.
