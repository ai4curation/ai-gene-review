core_functions:
- description: >-
    Cytoskeletal protein-membrane anchor activity at the cytokinetic contractile ring.
    The F-BAR domain oligomerizes tip-to-tip to create a membrane-bound platform that
    simultaneously recruits CR components (formin Cdc12, myosin Myo1, paxillin Pxl1)
    via distinct binding surfaces.
  molecular_function:
    id: GO:0106006
    label: cytoskeletal protein-membrane anchor activity
