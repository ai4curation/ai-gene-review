- id: file:SCHPO/cdc15/cdc15-deep-research-falcon.md
  title: Falcon deep research report on S. pombe cdc15
  findings:
  - statement: |
      Cdc15 is an essential cytokinetic scaffold with an N-terminal FCH/F-BAR
      module and a C-terminal SH3 domain, localizing to cell tips in interphase
      and the medial contractile ring during mitosis.
    supporting_text: |-
      The *S. pombe* protein studied in the primary cytokinesis literature is consistently named **Cdc15/Cdc15p**, described as an **essential cytokinetic scaffold** with an **N-terminal FCH/F-BAR module and a C-terminal SH3 domain**, localizing to **cell tips in interphase** and the **medial contractile ring during mitosis**
    reference_section_type: OTHER
  - statement: |
      The defining molecular role of Cdc15 is to couple the plasma membrane to
      contractile-ring components and regulators, organizing proteins needed to
      build and stabilize the ring.
    supporting_text: |-
      Its defining molecular role is to **couple the plasma membrane to contractile-ring components and regulators**, organizing proteins needed to build and stabilize the ring and coordinate furrow ingression/septation
    reference_section_type: OTHER
  - statement: |
      Cdc15 has a three-part architecture: an N-terminal FCH/F-BAR membrane-binding
      domain (platform for recruiting factors including formin Cdc12), a central
      intrinsically disordered region that is uniquely essential and the major
      substrate for multisite phosphorylation, and a C-terminal SH3 domain.
    supporting_text: |-
      - **N-terminal FCH/F-BAR domain**: a dimeric/oligomeric membrane-binding module that acts as a platform for recruiting factors (including the formin Cdc12) and physically linking the ring to the plasma membrane
    reference_section_type: OTHER
  - statement: |
      The central IDR is uniquely essential and cannot be replaced by the Imp2 IDR;
      it is the major substrate for multisite phosphorylation controlling
      conformational state and assembly behavior.
    supporting_text: |-
      a regulatory and interaction module that is **uniquely essential** in Cdc15 (cannot be replaced by the Imp2 IDR) and is the major substrate for multisite phosphorylation controlling conformational state and assembly behavior
    reference_section_type: OTHER
  - statement: |
      The C-terminal SH3 domain recruits ring proteins (notably Fic1 and Pxl1) and
      is partly redundant with the SH3 domain of the paralog Imp2.
    supporting_text: |-
      a protein–protein interaction module that recruits specific ring proteins (notably Fic1 and Pxl1) and contributes to ring integrity; it is partly **redundant with the SH3 domain of the paralog Imp2**
    reference_section_type: OTHER
  - statement: |
      The Cdc15 F-BAR domain binds the formin Cdc12 with a Kd of approximately 5
      micromolar (ITC) at a stoichiometry of one peptide per Cdc15 dimer; Cdc12
      binding is phosphorylation-state dependent (hypophosphorylated binds well).
    supporting_text: |-
      Cdc15 directly binds Cdc12, and Cdc12 binding is phosphorylation-state dependent (hypophosphorylated Cdc15 binds; hyperphosphorylated binds poorly)
    reference_section_type: OTHER
  - statement: |
      Cdc15 is hyperphosphorylated in interphase and becomes hypophosphorylated
      during division; dephosphorylation (involving the Clp1/Cdc14-like phosphatase)
      promotes cortical/medial localization, oligomerization, and membrane binding.
    supporting_text: |-
      Cdc15 is **hyperphosphorylated in interphase** and becomes **hypophosphorylated during division**
    reference_section_type: OTHER
  - statement: |
      Multiple polarity kinases (Pom1, Kin1, Shk1/Pak1, Pck1) phosphorylate the IDR;
      phosphorylation inhibits Cdc15 liquid-liquid phase separation and antagonizes
      cytokinetic ring assembly, whereas dephosphorylated Cdc15 forms droplets in
      vitro and PM-bound condensates in cells.
    supporting_text: |-
      **Dephosphorylated Cdc15 forms droplets in vitro**, while phosphorylation (e.g., by Pom1) inhibits droplet formation
    reference_section_type: OTHER
  - statement: |
      The membrane-binding concave F-BAR surface and the opposite protein-binding
      surface create a membrane platform; F-BAR oligomerization (not membrane
      bending) is important for stable ring architecture.
    supporting_text: |-
      The **concave F-BAR surface** binds membranes, while the **opposite surface** binds protein ligands such as **Cdc12** and **Pxl1**, creating a membrane platform that coordinates cytoskeletal and signaling components. F-BAR oligomerization is important for stable ring architecture
    reference_section_type: OTHER
  - statement: |
      S. pombe Cdc15 is an F-BAR/SH3 scaffold, NOT a protein kinase, and should not
      be confused with budding yeast Cdc15 (a Mitotic Exit Network kinase).
    supporting_text: |-
      do not confuse this target with **budding yeast Cdc15**, which is a **protein kinase** in the Mitotic Exit Network (MEN). The *S. pombe* Cdc15 described here is an **F-BAR/SH3 scaffold**, not a kinase
    reference_section_type: OTHER
core_functions:
- description: |-
    Cdc15 functions as a membrane-cytoskeleton anchor: its F-BAR domain binds the
    cytoplasmic face of the plasma membrane and couples it to the actomyosin
    contractile ring, providing a membrane-attached scaffold that recruits and
    organizes ring components (notably the formin Cdc12, type-I myosin Myo1, and
    the SH3-recruited stabilizers Pxl1 and Fic1) during cytokinesis.
  molecular_function:
    id: GO:0106006
    label: cytoskeletal protein-membrane anchor activity
