    label: mitotic actomyosin contractile ring assembly
  locations:
  - id: GO:0120104
    label: mitotic actomyosin contractile ring, proximal layer
  - id: GO:0032153
    label: cell division site
  - id: GO:0071341
    label: medial cortical node
- description: >-
    Phospholipid binding by the F-BAR domain enables direct membrane association at the
    cytoplasmic face of the plasma membrane. This binding is essential for positioning
    the CR and is regulated by phosphorylation from kinases Pom1, Cdk1, and Kin1.
  molecular_function:
    id: GO:0005543
    label: phospholipid binding
  directly_involved_in:
  - id: GO:1903475
    label: mitotic actomyosin contractile ring assembly
