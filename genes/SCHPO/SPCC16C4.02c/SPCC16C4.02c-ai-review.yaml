  - term:
      id: GO:0005634
      label: nucleus
    evidence_type: HDA
    original_reference_id: PMID:16823372
    review:
      summary: |-
        Nuclear localization assigned from a genome-wide GFP localization
        screen (HDA, PMID:16823372) and retained by PomBase. The human
        neurochondrin ortholog is predominantly cytoplasmic, so a nuclear pool
        was previously treated as possibly transient or artifactual. However,
        falcon deep research surfaced independent literature (Tay et al. 2013,
        PMID:23365689) in which SPCC16C4.02 was grouped among nuclear
        doxorubicin-resistance (DXR) factors of the Ino80 chromatin-remodeler
        set. That grouping derives from a high-throughput GO-enrichment screen,
        is reported with a gene-ID typo (Spcc16c4.20c), and is NOT corroborated
        by the protein's neurochondrin/ARM-repeat domain content, its curated
        physical interactors (sfi1, num1/mcp5, ecl1, pof4, rng10 - none of which
        are Ino80 subunits), or its NCDN orthology; it should be read as weak,
        screen-level support for a nuclear pool rather than evidence of genuine
        Ino80 complex membership. On balance a nuclear localization is plausible
        but not a core function.
      action: KEEP_AS_NON_CORE
      reason: |-
        HDA nuclear localization is retained by PomBase and receives weak
        additional (screen-level) support from the Tay et al. 2013 DXR network;
        downgraded from the previous REMOVE recommendation. It is kept as
        non-core because the protein is a cytoplasmic-type neurochondrin
        ortholog and no specific nuclear molecular function is established.
      supported_by:
        - reference_id: PMID:16823372
          supporting_text: ORFeome cloning and global analysis of protein
            localization in the fission yeast Schizosaccharomyces pombe.
        - reference_id: PMID:23365689
          supporting_text: |-
            chromatin remodeler Ino80 (Nht1, SPCC16C4.02, Iec1, Ies2, Iec3, Ies4, Ies6, Arp5,
          reference_section_type: SUPPLEMENTARY_MATERIAL
        - reference_id: file:SCHPO/SPCC16C4.02c/SPCC16C4.02c-deep-research-falcon.md
          supporting_text: |-
            **Directly listed as an Ino80 chromatin-remodeling complex subunit/member** in fission yeast: “Ino80 (Nht1, SPCC16C4.02, Iec1, Ies2, Iec3, Ies4, Ies6, Arp5, Arp8)”
          reference_section_type: OTHER
