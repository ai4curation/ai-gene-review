id: O74447
gene_symbol: SPCC16C4.02c
taxon:
  id: NCBITaxon:284812
  label: Schizosaccharomyces pombe 972h-
description: |-
  Conserved-unknown protein (PomBase gene name asi1/ceo6) orthologous to human
  neurochondrin (NCDN, HGNC:17597). Carries a neurochondrin / ARM-type-fold
  domain architecture (Pfam PF05536, PANTHER NEUROCHONDRIN, SUPERFAMILY ARM
  repeat) and is predicted to act as a scaffolding/adaptor protein. Curated
  binary interactions include the spindle pole body component Sfi1, the cortical
  dynein anchor Num1/Mcp5, the chronological-lifespan regulator Ecl1, Pof4 and
  Rng10, implicating it in spindle pole body, cortical microtubule and cellular
  aging contexts. Falcon deep research additionally surfaced Tay et al. 2013
  (PMID:23365689), where SPCC16C4.02 was grouped by a high-throughput
  GO-enrichment screen among the nuclear Ino80 chromatin-remodeler set of
  doxorubicin-resistance factors; this grouping is reported with a gene-ID typo
  (Spcc16c4.20c) and is NOT corroborated by the protein's domain content,
  orthology, or curated interactors (none of which are Ino80 subunits), so it is
  treated here as weak, screen-level context rather than evidence of genuine
  Ino80 complex membership. No direct biochemical activity, substrate, or
  definitive localization has been demonstrated.
