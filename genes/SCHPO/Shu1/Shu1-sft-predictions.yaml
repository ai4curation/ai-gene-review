    label: plasma membrane organization
  predicted_term_type: GO_BP
  review:
    assessment: NPI
    confidence_score: 0
    summary: Not in GOA and not supported by AIGR review. Shu1 is involved in heme import
      (GO:0140420) and heme transport (GO:0015886), both ACCEPT in AIGR. Plasma membrane
      organization is not a known function -- Shu1 resides at the plasma membrane but does
      not organize it. This is a biologically incorrect prediction.

- source_method: BioReason-Pro-SFT
