    label: protein binding
  predicted_term_type: GO_MF
  review:
    assessment: REP
    confidence_score: 1
    error_type: FREQUENCY_BIAS
    summary: Uninformative generic term. Not in GOA. Shu1 is a GPI-anchored heme receptor
      with well-characterized molecular function (heme receptor activity GO:0140488, heme
      binding GO:0020037, both ACCEPT in AIGR). Protein binding adds no functional
      information and is a frequency-biased default prediction.

