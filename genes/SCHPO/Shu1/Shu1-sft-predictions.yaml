description: SFT model misidentifies Shu1 (heme receptor/importer at plasma membrane)
  as an ER membrane protein; protein binding and plasma membrane organization are not
  supported; ER/ER membrane predictions are biologically wrong for this GPI-anchored
  plasma membrane heme receptor.
references:
