    label: endoplasmic reticulum
  predicted_term_type: GO_CC
  review:
    assessment: NPI
    confidence_score: 0
    summary: Not in GOA and biologically incorrect. Shu1 is a GPI-anchored protein at the
      plasma membrane and fungal-type vacuole membrane, both confirmed in GOA with strong
      experimental evidence (ACCEPT in AIGR). ER localization is not supported. This is a
      wrong compartment prediction, likely from misidentifying Shu1 as an integral ER
      membrane protein based on transmembrane topology prediction.

