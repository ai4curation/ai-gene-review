    label: unfolded protein binding
  predicted_term_type: GO_MF
  review:
    assessment: CNN
    confidence_score: 2
    summary: In GOA (IDA evidence). pmp20 inhibits thermal aggregation of citrate synthase,
      demonstrating holdase-type chaperone activity (PMID:20356456). This is the true
      molecular function identified by AIGR -- pmp20 has neo-functionalized from peroxidase
      to chaperone within the peroxiredoxin family due to loss of the resolving cysteine.
      Correct and not novel, and consistent with the AIGR-confirmed core function.

- source_method: BioReason-Pro-SFT
  source_version: wanglab/protein_catalogue
  source_reference_id: doi:10.64898/2026.03.19.712954
  predicted_term:
    id: GO:0051920
    label: peroxiredoxin activity
  predicted_term_type: GO_MF
  review:
    assessment: NPI
    confidence_score: 0
    error_type: PSEUDOENZYME_OVERANNOTATION
    summary: >-
      Biologically incorrect per direct assay; the prediction over-annotates the peroxiredoxin
      family's ancestral catalytic activity to a fold-retaining pseudoenzyme. An independent
      OpenScientist investigation (see file reference) corrects the mechanistic rationale: pmp20
      is a 1-Cys peroxiredoxin (Prx5/PRDX6-type) with a single cysteine (Cys43) in an intact
      peroxidatic P-x-x-x-T-x-x-C motif and a fully assembled Pro36/Thr40/Cys43/Arg122 catalytic
      tetrad -- so this is NOT a "lost resolving cysteine" case (1-Cys peroxiredoxins never have
      a resolving cysteine). The prediction of active peroxiredoxin/peroxidase activity is
      nonetheless refuted by direct experiment: Kim et al. (PMID:20356456) found recombinant
      S. pombe pmp20 has neither thioredoxin-dependent nor glutathione-dependent peroxidase
      activity, and GOA carries a curated NOT|enables GO:0004602 (glutathione peroxidase, IDA).
      pmp20 instead acts as a molecular chaperone (captured in this review as GO:0042026 protein
      refolding / GO:0051082 unfolded protein binding). NPI stands: the peroxidatic active site
      is structurally present but no peroxidase activity is detectable. (OpenScientist rated this
      "partially supported" as an antioxidant lead, but that rested on an untested
      glutathione-reductant escape hatch that the NOT|GSH-peroxidase IDA directly closes.)
    supported_by:
      - reference_id: file:SCHPO/pmp20/pmp20-goa.tsv
        supporting_text: "NOT|enables\tGO:0004602\tglutathione peroxidase activity\tmolecular_function\tECO:0000314\tIDA\tPMID:20356456"
      - reference_id: file:SCHPO/pmp20/pmp20-hypotheses/prediction-peroxiredoxin-activity/openscientist.md
        supporting_text: 1-Cys peroxiredoxin

