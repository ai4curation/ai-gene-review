  review:
    assessment: NPI
    confidence_score: 0
    error_type: FREQUENCY_BIAS
    summary: Not in GOA and biologically incorrect per AIGR review. pmp20 belongs to the
      Prx5 subfamily of peroxiredoxins but has lost peroxidase activity due to absence of
      the resolving cysteine residue. PMID:20356456 demonstrated recombinant pmp20 has no
      thioredoxin-dependent peroxidase activity. The AIGR review removes the broader
      thioredoxin peroxidase (GO:0008379) and peroxidase activity (GO:0004601) IEA
      annotations from GOA. This prediction reflects frequency bias from peroxiredoxin
      family training data applied to a pseudoenzyme that has lost the catalytic function.

