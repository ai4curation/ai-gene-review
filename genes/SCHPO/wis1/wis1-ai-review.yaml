- term:
    id: GO:0010971
    label: positive regulation of G2/M transition of mitotic cell cycle
  evidence_type: IMP
  original_reference_id: PMID:1756736
  qualifier: involved_in
  review:
    summary: >-
      Wis1 was originally identified as a dosage-dependent inducer of mitosis:
      overexpression advances mitosis (small cell size) and loss delays it
      (elongated cells). This G2/M role is genuine but operates through the
      downstream Sty1/Spc1 cascade and reflects the pathway's coupling of stress and
      nutritional sensing to mitotic timing; it is a non-core, pleiotropic aspect
      relative to the core MAPKK signaling function.
    action: KEEP_AS_NON_CORE
    reason: Genuine mitotic-timing role but a downstream, pleiotropic output of the SAPK pathway rather than a core biochemical function.
    supported_by:
    - reference_id: PMID:1756736
      supporting_text: wis1+ plays an important role in the regulation of entry into mitosis, as it shares with cdc25+ and nim1+/cdr1+ the property of inducing mitosis in a dosage-dependent manner
