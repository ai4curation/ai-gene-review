core_functions:
- description: >-
    Dual-specificity MAP kinase kinase (MAP2K) that phosphorylates and activates the
    Spc1/Sty1 p38-class MAP kinase on activation-loop Thr-171 and Tyr-173, serving as
    the sole MAPKK of the fission-yeast stress-activated MAPK cascade.
  supported_by:
  - reference_id: PMID:12181336
    supporting_text: Wis1 is the only MAPKK responsible for the phosphorylation and activation of Spc1 MAPK under various stress conditions
    reference_section_type: DISCUSSION
  - reference_id: PMID:10749922
    supporting_text: Spc1 is activated through phosphorylation of Thr-171 and Tyr-173, which is carried out by a MEK homologue, Wis1.
    reference_section_type: INTRODUCTION
  molecular_function:
    id: GO:0004708
    label: MAP kinase kinase activity
- description: >-
    Transduces osmotic, oxidative, heat and nutritional stress signals from the
    Wis4/Win1 MAPKKK module (organized by the Mcs4 response regulator) to Spc1,
    enabling the cellular response to osmotic and other environmental stress.
  supported_by:
  - reference_id: PMID:9321395
    supporting_text: integrity of the Wis1-Spc1 pathway is required for survival in extreme conditions of heat, osmolarity, oxidation or limited nutrition
    reference_section_type: ABSTRACT
  - reference_id: PMID:7859738
    supporting_text: The Wis1 sequence is most closely related to the Saccharomyces cerevisiae MEK encoded by PBS2, which is required for osmoregulation.
    reference_section_type: ABSTRACT
  biological_process:
    id: GO:0038066
    label: p38MAPK cascade
- description: >-
    Acts as a cytoplasmic activator kinase whose Crm1-dependent cytoplasmic
    localization is required for stress-induced nuclear accumulation of Spc1 and
    downstream Atf1-dependent transcription.
  supported_by:
  - reference_id: PMID:12181336
    supporting_text: cytoplasmic localization of Wis1 MAPKK by its NES is important for stress signaling to the nucleus
    reference_section_type: ABSTRACT
  cellular_component:
    id: GO:0005829
    label: cytosol
