id: P33886
gene_symbol: wis1
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:284812
  label: Schizosaccharomyces pombe (strain 972 / ATCC 24843)
description: >-
  Wis1 is the sole MAP kinase kinase (MAP2K/MAPKK; EC 2.7.12.2) of the fission-yeast
  stress-activated protein kinase (SAPK) pathway. It is a dual-specificity protein
  kinase that phosphorylates and activates the p38/Hog1-related MAP kinase Spc1
  (also called Sty1/Phh1) on the activation-loop residues threonine-171 and
  tyrosine-173 in response to osmotic, oxidative, heat and nutritional stress.
  Wis1 is itself activated by the two partially redundant MAPKKKs Wis4 (Wik1/Wak1)
  and Win1, which phosphorylate the conserved Wis1 activation-loop residues
  serine-469 and threonine-473; Win1 is the major transducer of osmotic-stress
  signals. The upstream module is organized around the Mcs4 response regulator,
  which forms a stable heteromer with Wis4 and Win1 and receives peroxide-stress
  signals through a Mak2/Mak3-Mpr1 multistep phosphorelay. Wis1 is predominantly
  cytoplasmic, retained there by an N-terminal nuclear export signal acting via
  the exportin Crm1, and its cytoplasmic localization is required for stress-induced
  nuclear accumulation of Spc1. Downstream, activated Spc1 phosphorylates the
  bZIP transcription factor Atf1 to drive stress-response gene expression. The
  pathway also couples environmental conditions to G2/M cell-cycle progression,
  and Wis1 was originally identified as a dosage-dependent inducer of mitosis.
