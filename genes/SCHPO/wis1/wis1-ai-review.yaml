suggested_questions:
- question: >-
    What distinguishes the substrate selectivity of Wis1 for both Thr-171 and Tyr-173
    of Spc1, and is the order of dual phosphorylation regulated?
- question: >-
    Does the stress-induced nuclear translocation of a fraction of Wis1 have a
    function beyond delivering/retaining Spc1, such as nuclear substrate phosphorylation?
- question: >-
    How is release of Wis1 from the Mcs4-Wis4-Win1 complex coupled to its activation,
    and is complex disassembly required for productive Spc1 phosphorylation?
suggested_experiments:
- description: >-
    Quantitative in vitro kinase assays with recombinant active Wis1 and Spc1
    activation-loop variants (T171A, Y173F, double mutant) to measure the kinetics
    and order of dual Thr/Tyr phosphorylation.
- description: >-
    Phosphoproteomic comparison of wild-type versus analog-sensitive wis1 (or
    constitutively active wis1DD) strains to define the direct and pathway-dependent
    Wis1 substrate/target landscape under osmotic versus oxidative stress.
- description: >-
    Live-cell imaging of endogenously tagged Wis1, Spc1 and Mcs4-Wis4-Win1 to track
    complex assembly/disassembly and Wis1 nucleocytoplasmic shuttling kinetics during
    a defined stress time course.
