- term:
    id: GO:0031507
    label: heterochromatin formation
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: involved_in
  review:
    summary: >-
      In fission yeast Cnp1/CENP-A occupies the central core (kinetochore)
      chromatin and is explicitly excluded from the flanking heterochromatin,
      which is instead occupied by Swi6/HP1 and assembled by the RNAi-Clr4
      pathway. Attributing heterochromatin formation to CENP-A is misleading for
      S. pombe; the central core CENP-A domain is structurally and functionally
      distinct from heterochromatin.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      The IBA conflicts with experimental data showing Cnp1 binds central core
      DNA exclusively and not the flanking heterochromatic repeats, which are
      bound by Swi6.
    supported_by:
    - reference_id: PMID:11553715
      supporting_text: >-
        The centromere-associated proteins, Mis6p and Cnp1p (SpCENP-A),
        associate exclusively with central core DNA, whereas the Swi6 protein
        binds the surrounding repeats
      reference_section_type: ABSTRACT
