- id: PMID:10864871
  title: Requirement of Mis6 centromere connector for localizing a CENP-A-like protein
    in fission yeast.
  findings:
  - statement: >-
      SpCENP-A (Cnp1) is essential for establishing centromere chromatin for
      equal chromosome segregation and localizes to the nonrepetitive inner
      centromere in a Mis6-dependent manner.
    supporting_text: >-
      the fission yeast homolog SpCENP-A is essential for establishing centromere
      chromatin associated with equal chromosome segregation. SpCENP-A binding to
      the nonrepetitious inner centromeres depended on Mis6
    reference_section_type: ABSTRACT
- id: PMID:11553715
  title: The domain structure of centromeres is conserved from fission yeast to humans.
  findings:
  - statement: >-
      Cnp1 associates exclusively with the central core DNA and not the flanking
      heterochromatic repeats, which are bound by Swi6.
    supporting_text: >-
      The centromere-associated proteins, Mis6p and Cnp1p (SpCENP-A), associate
      exclusively with central core DNA, whereas the Swi6 protein binds the
      surrounding repeats
    reference_section_type: ABSTRACT
- id: PMID:12773390
  title: The role of Ppe1/PP6 phosphatase for equal chromosome segregation in fission
    yeast kinetochore.
  findings:
  - statement: >-
      spCENP-A is located to central centromere regions in a Mis6-dependent
      manner; recorded IntAct interaction (Mis12) underlies the protein binding
      annotation.
    supporting_text: >-
      In fission yeast, spCENP-A is located to central centromere regions in a
      Mis6-dependent manner
    reference_section_type: INTRODUCTION
- id: PMID:16823372
  title: ORFeome cloning and global analysis of protein localization in the fission
    yeast Schizosaccharomyces pombe.
  findings:
  - statement: Genome-wide YFP localization screen confirming nuclear localization of Cnp1.
    supporting_text: >-
      we determined the localization of 4,431 proteins, corresponding to
      approximately 90% of the fission yeast proteome, by tagging each ORF with
      the yellow fluorescent protein
    reference_section_type: ABSTRACT
- id: PMID:17035632
  title: Reconstruction of the kinetochore during meiosis in fission yeast Schizosaccharomyces
    pombe.
  findings:
  - statement: >-
      Cnp1 belongs to the Mis6-like group that remains at the centromere
      throughout meiosis, forming the structural basis of the centromere.
    supporting_text: >-
      Mis6-like group proteins remain at the centromere throughout meiosis
    reference_section_type: ABSTRACT
- id: PMID:17627824
  title: The kinetochore proteins Pcs1 and Mde4 and heterochromatin are required to
    prevent merotelic orientation.
  findings:
  - statement: >-
      Pcs1 and Mde4 localize to the central core of centromeres where Cnp1
      chromatin resides; recorded IntAct interaction (Mis12) underlies the
      protein binding annotation.
    supporting_text: >-
      Both Pcs1 and Mde4 localize to the central core of centromeres.
    reference_section_type: ABSTRACT
- id: PMID:17677001
  title: Plasticity of fission yeast CENP-A chromatin driven by relative levels of
    histone H3 and H4.
  findings:
  - statement: >-
      CENP-A(Cnp1) replaces H3 across the central domain forming the specialized
      chromatin essential for kinetochore assembly; the H3:H4:CENP-A ratio
      governs CENP-A deposition and segregation fidelity.
    supporting_text: >-
      Within the central domain most histone H3 is replaced by the
      centromere-specific H3 variant CENP-ACnp1 to form the unusual chromatin
      that occupies most of the 10–12 kb comprising imr and cnt
    reference_section_type: RESULTS
- id: PMID:18077559
  title: Biphasic incorporation of centromeric histone CENP-A in fission yeast.
  findings:
  - statement: >-
      Cnp1/CENP-A is deposited at centromeres in two phases (S and G2), with the
      S-phase pathway requiring the Ams2 GATA factor.
    supporting_text: >-
      the fission yeast Schizosaccharomyces pombe has at least two distinct
      CENP-A deposition phases across the cell cycle: S and G2
    reference_section_type: ABSTRACT
- id: PMID:19217404
  title: 'Fission yeast Scm3: A CENP-A receptor required for integrity of subkinetochore
    chromatin.'
  findings:
  - statement: >-
      Scm3 is the HJURP-related CENP-A receptor that physically binds Cnp1 and,
      with Mis16/Mis18, mediates its assembly into subkinetochore chromatin.
    supporting_text: >-
      Scm3(Sp) coaffinity purifies with CENP-A(Cnp1) and associates with
      CENP-A(Cnp1) in vitro
    reference_section_type: ABSTRACT
- id: PMID:23166349
  title: Csi1 links centromeres to the nuclear envelope for centromere clustering.
  findings:
  - statement: >-
      Cnp1-marked centromeres cluster at the nuclear envelope near the spindle
      pole body during interphase.
    supporting_text: >-
      the centromeres of each chromosome are clustered together and attached to
      the nuclear envelope near the site of the spindle pole body during
      interphase
    reference_section_type: ABSTRACT
- id: PMID:23314747
  title: Myb-domain protein Teb1 controls histone levels and centromere assembly in
    fission yeast.
  findings:
  - statement: >-
      Reducing Teb1 function lowers histone levels and reduces centromeric Cnp1
      binding and centromeric silencing.
    supporting_text: >-
      we examined localization of the centromeric histone H3 variant Cnp1 and
      found reduced centromeric binding along with reduced centromeric silencing
    reference_section_type: ABSTRACT
- id: PMID:26275423
  title: Inner Kinetochore Protein Interactions with Regional Centromeres of Fission
    Yeast.
  findings:
  - statement: >-
      The central domain is occupied by CENP-A nucleosomes (two H4 per particle),
      with inner-kinetochore proteins enriched throughout; H3 is nearly absent.
    supporting_text: >-
      H3 nucleosomes are nearly absent from the central domain, which is occupied
      by centromere-specific H3 (cenH3 or CENP-A) nucleosomes with two H4s per
      particle
    reference_section_type: ABSTRACT
- id: PMID:29194511
  title: Prolyl isomerization of the CENP-A N-terminus regulates centromeric integrity
    in fission yeast.
  findings:
  - statement: >-
      The Cnp1 N-terminal GRANT motif (prolyl isomerization) regulates
      centromeric targeting; the escort chaperone Sim3 binds the Cnp1 NTD.
    supporting_text: >-
      we further identified the SpCENP-A-localizing chaperone Sim3 as a SpCENP-A
      NTD interacting protein that is dependent on GRANT proline residues
    reference_section_type: ABSTRACT
core_functions_summary: >-
  Cnp1/CENP-A is the fission-yeast centromeric histone H3 variant that, as a
  structural constituent of chromatin, replaces H3 in central-core CENP-A
  nucleosomes, epigenetically specifies centromere identity, and provides the
  platform for inner-kinetochore assembly and accurate chromosome segregation.
suggested_questions:
- question: >-
    Does fission yeast CENP-A truly bind centromeric DNA in a sequence-specific
    manner, or is the GO:0019237 centromeric DNA binding annotation better
    interpreted purely as epigenetic, sequence-independent occupancy?
- question: >-
    What is the precise stoichiometry and composition of the S. pombe CENP-A
    nucleosome in vivo (octameric vs. alternative particles, H2A/H2B content)?
- question: >-
    How do the S-phase (Ams2-dependent) and G2 deposition pathways divide the
    labor of CENP-A loading, and which is the primary maintenance pathway?
suggested_experiments:
- description: >-
    Genome-wide native-ChIP and cleavage mapping of Cnp1 across the cell cycle to
    quantify CENP-A nucleosome positioning, density, and the relative
    contributions of S-phase vs G2 deposition.
- description: >-
    In vitro reconstitution of S. pombe CENP-A nucleosomes with Scm3, Sim3, and
    Mis16/Mis18 to define the minimal assembly machinery and the particle
    composition (H2A/H2B content) of central-core nucleosomes.
- description: >-
    Targeted degron depletion of Cnp1 followed by quantitative imaging of
    inner-kinetochore protein recruitment and chromosome segregation fidelity to
    dissect the order of kinetochore assembly downstream of CENP-A.
