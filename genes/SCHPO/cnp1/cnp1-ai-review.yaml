- description: >-
    Structural constituent of centromeric chromatin: Cnp1/CENP-A is the
    centromere-specific histone H3 variant that replaces canonical H3 in
    specialized nucleosomes of the central core/inner-repeat domain, forming the
    structural foundation of subkinetochore chromatin.
  supported_by:
  - reference_id: PMID:17677001
    supporting_text: >-
      Within the central domain most histone H3 is replaced by the
      centromere-specific H3 variant CENP-ACnp1 to form the unusual chromatin
      that occupies most of the 10–12 kb comprising imr and cnt
    reference_section_type: RESULTS
  molecular_function:
    id: GO:0030527
    label: structural constituent of chromatin
  locations:
  - id: GO:0061638
    label: CENP-A containing chromatin
  - id: GO:0034506
    label: chromosome, centromeric core domain
- description: >-
    Epigenetic specification of centromere identity and assembly of CENP-A
    chromatin: Cnp1 is required to establish and propagate centromeric CENP-A
    chromatin at the nonrepetitive central core, serving as the epigenetic mark
    of centromere identity.
  supported_by:
  - reference_id: PMID:10864871
    supporting_text: >-
      the fission yeast homolog SpCENP-A is essential for establishing
      centromere chromatin associated with equal chromosome segregation
    reference_section_type: ABSTRACT
  biological_process:
    id: GO:0034080
    label: CENP-A containing chromatin assembly
  locations:
  - id: GO:0043505
    label: CENP-A containing nucleosome
- description: >-
    Foundation for inner-kinetochore assembly and accurate chromosome
    segregation: CENP-A chromatin is the platform on which the inner kinetochore
    is built, required for kinetochore assembly and equal chromosome segregation.
  supported_by:
  - reference_id: PMID:17677001
    supporting_text: >-
      CENP-A is essential for the assembly of a functional kinetochore and as
      such must represent a key component in establishing and/or maintaining the
      site of kinetochore assembly at the centromere
    reference_section_type: INTRODUCTION
  biological_process:
    id: GO:0051382
    label: kinetochore assembly
  locations:
  - id: GO:0000776
    label: kinetochore
