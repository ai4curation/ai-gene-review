id: Q9Y812
gene_symbol: cnp1
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:284812
  label: Schizosaccharomyces pombe (strain 972 / ATCC 24843)
description: >-
  Cnp1 is the fission-yeast CENP-A (CenH3), the centromere-specific histone H3
  variant that replaces canonical histone H3 in centromeric nucleosomes and
  epigenetically defines centromere identity. It is restricted to the
  nonrepetitive central core/inner-repeat (cnt/imr) "central domain" of all three
  S. pombe centromeres, where it forms specialized CENP-A nucleosomes (a
  Cnp1-H4 heterotetramer together with H2A-H2B) that constitute the structural
  foundation of subkinetochore chromatin. Cnp1 is essential: it is required for
  recruitment and assembly of inner-kinetochore proteins, for mitotic
  progression, and for accurate chromosome segregation. Its centromeric
  deposition occurs in S and G2 phases and is mediated by the CENP-A receptor and
  chaperone system (the HJURP-related Scm3 receptor, the Sim3/NASP escort, and
  the Mis16/Mis18 complex), with centromeric retention dependent on the Mis6-Sim4
  inner-kinetochore connector. Cnp1 thereby serves as the epigenetic mark that
  propagates centromere identity through replication and cell division.
