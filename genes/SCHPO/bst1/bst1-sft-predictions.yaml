    label: phosphatidylinositol biosynthetic process
  predicted_term_type: GO_BP
  review:
    assessment: NPI
    confidence_score: 0
    summary: Not in GOA and biologically incorrect. bst1 is a GPI inositol-deacylase
      that removes an acyl chain from GPI intermediates -- it is a modifying/remodeling
      enzyme, not a phosphatidylinositol biosynthetic enzyme. GOA contains GO:0006506
      (GPI anchor biosynthetic process, IBA -- ACCEPT in AIGR). Phosphatidylinositol
      biosynthesis and GPI anchor biosynthesis are related but distinct pathways. The
      prediction conflates phosphatidylinositol modification with its biosynthesis.

