id: Q01663
gene_symbol: pap1
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:284812
  label: Schizosaccharomyces pombe (strain 972 / ATCC 24843)
description: >-
  Pap1 (also caf3, Caffeine resistance protein 3) is the fission yeast AP-1-like
  basic-leucine-zipper (bZIP) transcription factor of the Yap1/c-Jun (YAP)
  subfamily. It is the principal redox-regulated transcriptional activator of the
  oxidative-stress response and a determinant of multidrug/caffeine resistance.
  Pap1 binds AP-1/TRE-like sites (consensus TTACGTAA) as a homodimer through its
  bZIP domain and bends the target DNA. Its activity is controlled by regulated
  nucleocytoplasmic shuttling: in unstressed cells reduced Pap1 is continuously
  exported to the cytoplasm by the exportin Crm1, whereas under low hydrogen
  peroxide the peroxiredoxin Tpx1 transmits a disulfide relay that oxidizes the
  cysteine-rich domains of Pap1 (forming an intramolecular Cys278-Cys501
  disulfide) and masks its C-terminal nuclear export signal, causing nuclear
  accumulation. Nuclear Pap1 then activates antioxidant genes (catalase ctt1,
  thioredoxin reductase trr1, sulfiredoxin srx1, thioredoxin) - many in concert
  with the response regulator Prr1 - and drug-efflux/MDR genes (the ABC
  transporters bfr1/hba2 and pmd1, the efflux pump caf5, obr1). At high peroxide
  doses the Sty1/Atf1 MAP kinase pathway dominates the response. Pap1 also
  participates in the response to electrophiles such as diethylmaleate,
  methylglyoxal, and to diamide/cadmium-induced disulfide stress through a
  cooperative pathway with the HMG protein Oxs1.
