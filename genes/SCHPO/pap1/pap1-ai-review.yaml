  - statement: Pap1 is required for caffeine tolerance via expression of the efflux pump Hba2; the Pap1
      pathway is needed for normal caffeine tolerance but is not itself activated by caffeine.
    supported_by:
    - reference_id: PMID:19672306
      supporting_text: Cells lacking Pap1 are sensitive to caffeine due to the decreased expression of the
        efflux pump Hba2.
      reference_section_type: ABSTRACT
- id: PMID:22245228
  title: Inactivation of a peroxiredoxin by hydrogen peroxide is critical for thioredoxin-mediated
    repair of oxidized proteins and cell survival.
  findings: []
- id: PMID:22344694
  title: The transcription factors Pap1 and Prr1 collaborate to activate antioxidant,
    but not drug tolerance, genes in response to H2O2.
  findings:
  - statement: H2O2 induces Pap1 oxidation and nuclear accumulation and expression of >50 Pap1-dependent
      genes; antioxidant genes require oxidized Pap1 to heterodimerize with Prr1, while drug-tolerance
      genes require only nuclear Pap1.
    supported_by:
    - reference_id: PMID:22344694
      supporting_text: those coding for the antioxidants catalase, sulfiredoxin or thioredoxin reductase,
        do need oxidized Pap1 to form a heterodimer with the constitutively nuclear transcription factor
        Prr1
      reference_section_type: ABSTRACT
- id: PMID:22840777
  title: Analyzing fission yeast multidrug resistance mechanisms to develop a genetically
    tractable model system for chemical biology.
  findings:
  - statement: Pap1 controls the basal expression of the MDR ABC-transporter genes bfr1 and pmd1, whereas
      drug-induced expression depends on the zinc-finger factor Prt1.
    supported_by:
    - reference_id: PMID:22840777
      supporting_text: Pap1 controls the basal, but not the drug-induced expression, of the bfr1+ and pmd1+
        genes
      reference_section_type: RESULTS
- id: PMID:27664222
  title: A Pap1-Oxs1 signaling pathway for disulfide stress in Schizosaccharomyces
    pombe.
  findings:
  - statement: Pap1 cooperates with the HMG protein Oxs1 in the response to diamide/cadmium-induced
      disulfide stress; the two form a complex and co-bind target promoters.
    supported_by:
    - reference_id: PMID:27664222
      supporting_text: Oxs1 and Pap1 form a complex when cells are exposed to diamide or Cd that causes disulfide
        stress
      reference_section_type: ABSTRACT
