- id: PMID:9585505
  title: 'Regulation of the fission yeast transcription factor Pap1 by oxidative stress:
    requirement for the nuclear export factor Crm1 (Exportin) and the stress-activated
    MAP kinase Sty1/Spc1.'
  findings:
  - statement: The oxidative-stress response depends on Sty1 regulation of Pap1; Pap1 relocalizes from
      cytoplasm to nucleus on oxidative stress via regulated Crm1-dependent export, and is required for
      oxidative-stress and MDR gene expression.
    supported_by:
    - reference_id: PMID:9585505
      supporting_text: On imposition of oxidative stress, the Pap1 protein relocalizes from the cytoplasm
        to the nucleus in a process that is dependent on the Sty1 kinase
      reference_section_type: ABSTRACT
