core_functions:
- description: |-
    Sequence-specific DNA-binding transcriptional activator (RNA Pol II) that binds AP-1/TRE-like sites
    (consensus TTACGTAA) as a bZIP homodimer and induces target-gene expression.
  supported_by:
  - reference_id: PMID:11017199
    supporting_text: PAP1, a fission yeast AP-1-like transcription factor that binds DNA containing the
      novel consensus sequence TTACGTAA
    reference_section_type: ABSTRACT
  - reference_id: PMID:1448080
    supporting_text: the pap1 protein binds to the AP-1 site as well as to a 14-bp palindrome sequence
    reference_section_type: ABSTRACT
- description: |-
    Principal redox-regulated activator of the oxidative-stress transcriptional response: peroxide
    sensed via Tpx1 oxidizes Pap1, masking its Crm1-dependent NES, driving nuclear accumulation and
    induction of antioxidant genes (catalase ctt1, thioredoxin reductase trr1, sulfiredoxin srx1),
    in part via heterodimerization with Prr1.
  supported_by:
  - reference_id: PMID:22344694
    supporting_text: H(2)O(2) induces oxidation of Pap1, its nuclear accumulation and expression of more
      than fifty Pap1-dependent genes
    reference_section_type: ABSTRACT
  - reference_id: PMID:15824112
    supporting_text: the reduced thioredoxin peroxidase-active form of Tpx1 is required for the peroxide-induced
      oxidation and nuclear accumulation of Pap1
    reference_section_type: ABSTRACT
- description: |-
    Activator of drug-efflux/multidrug-resistance genes (the ABC transporters bfr1/hba2 and pmd1, the
    efflux pump caf5), conferring resistance to staurosporine, caffeine and other xenobiotics; controls
    basal expression of these MDR transporters.
  supported_by:
  - reference_id: PMID:9585505
    supporting_text: for the expression of two genes, hba2+/bfr1+ and pmd1+, which encode energy-dependent
      transport proteins involved in multidrug resistance
    reference_section_type: ABSTRACT
  - reference_id: PMID:22840777
    supporting_text: Pap1 controls the basal, but not the drug-induced expression, of the bfr1+ and pmd1+
      genes
    reference_section_type: RESULTS
proposed_new_terms: []
suggested_questions:
- question: |-
    What is the complete genome-wide direct target gene set of oxidized versus reduced nuclear Pap1, and
    how is target selection partitioned between Prr1-dependent (antioxidant) and Prr1-independent (drug
    tolerance) promoters?
- question: |-
    How is the redox relay quantitatively gated - what determines the dose- and time-dependent switch
    between the Pap1 (low H2O2) and Sty1/Atf1 (high H2O2) responses at the level of Tpx1 oxidation state?
suggested_experiments:
- description: |-
    ChIP-seq of endogenously tagged Pap1 (and Prr1) under a graded H2O2 dose series and in tpx1, trr1,
    and prr1 backgrounds, integrated with RNA-seq, to define the direct redox-dependent target set and
    quantify the Prr1 contribution to antioxidant-gene selection.
- description: |-
    Time-resolved redox proteomics (e.g. differential thiol labeling/mass spectrometry) of Pap1 cysteines
    across H2O2 doses to map the kinetics of intramolecular disulfide formation (Cys278-Cys501) relative
    to nuclear accumulation and target-gene induction.
