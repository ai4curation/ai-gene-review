- source_method: BioReason-Pro-SFT
  source_version: wanglab/protein_catalogue
  source_reference_id: doi:10.64898/2026.03.19.712954
  predicted_term:
    id: GO:0004568
    label: chitinase activity
  predicted_term_type: GO_MF
  review:
    assessment: NPI
    confidence_score: 0
    error_type: PSEUDOENZYME_OVERANNOTATION
    summary: >-
      Refuted despite its presence in GOA. The current AIGR review recommends REMOVE because cts2 lacks
      the conserved catalytic glutamate required for GH18 chitinase activity (E166 is replaced by Asn).
      The SFT call therefore recapitulates invalid phylogenetic propagation to a pseudo-chitinase and is
      NPI, not CNN.

- source_method: BioReason-Pro-SFT
  source_version: wanglab/protein_catalogue
  source_reference_id: doi:10.64898/2026.03.19.712954
  predicted_term:
    id: GO:0031506
    label: fungal-type cell wall disassembly
  predicted_term_type: GO_BP
  review:
    assessment: NPI
    confidence_score: 0
    error_type: PSEUDOENZYME_OVERANNOTATION
    summary: >-
      An independent OpenScientist investigation (see file reference) refutes this prediction. cts2 lacks
      the catalytic glutamate essential for the GH18 substrate-assisted catalysis mechanism -- it is replaced
      by asparagine (E->N at position 166), a non-ionizable residue that cannot act as the proton donor,
      and the DxDxE catalytic triad is disrupted. The loss is lineage-specific: the S. japonicus ortholog
      retains the intact catalytic motif, whereas S. pombe cts2 is a well-folded (AlphaFold pLDDT ~92.7)
      but catalytically dead chitinase-like protein. Because S. pombe cell separation is mediated by glucanases
      (Eng1p, Agn1p) rather than chitinases and its wall contains minimal chitin, chitinase-driven cell
      wall disassembly does not apply to cts2. This aligns with the AIGR review, which flags the sole GOA
      chitinase annotation -- GO:0004568 (IBA, GO_REF:0000033), a positive 'enables' propagation, not a
      NOT -- as a bad phylogenetic propagation that should not be retained for the catalytically deficient
      cts2 lineage. Upgraded from UNC to NPI. Caveat: no direct enzymatic assay of cts2 has been published.
      [ONTOLOGY_LABEL_AUDIT] Raw model pair mismatch: GO:0031506 resolves to 'cell wall glycoprotein biosynthetic
      process', not 'fungal-type cell wall disassembly'. The raw ID and label are retained for provenance;
      the assessment applies to the GO ID and explicitly flags the label error.
    supported_by:
    - reference_id: file:SCHPO/cts2/cts2-hypotheses/prediction-gh18-chitinase-cell-wall-disassembly/openscientist.md
      supporting_text: lacks the catalytic glutamate essential for the GH18 substrate-assisted catalysis
        mechanism
    - reference_id: file:SCHPO/cts2/cts2-hypotheses/prediction-gh18-chitinase-cell-wall-disassembly/openscientist.md
      supporting_text: the S. japonicus ortholog retains it

