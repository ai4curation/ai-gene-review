- term:
    id: GO:0032465
    label: regulation of cytokinesis
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: involved_in
  review:
    summary: >-
      Aurora B-type kinases regulate cytokinesis, and overexpression of kinase-dead Ark1 (or
      its Pic1-binding fragments) blocks cytokinesis in S. pombe, giving an elongated
      multiseptate phenotype. Note that loss-of-function depletion did not perturb cytokinesis
      in another study, so the cytokinetic role is real but condition/dose dependent.
    action: KEEP_AS_NON_CORE
    reason: >-
      Supported by dominant-negative phenotypes but with conflicting loss-of-function data;
      better captured by the more specific experimental term regulation of mitotic cytokinesis.
    supported_by:
