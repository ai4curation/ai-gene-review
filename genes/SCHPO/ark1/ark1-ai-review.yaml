id: O59790
gene_symbol: ark1
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:284812
  label: Schizosaccharomyces pombe (strain 972 / ATCC 24843)
description: >-
  Ark1 is the sole Aurora kinase of the fission yeast Schizosaccharomyces pombe and the
  ortholog of Aurora B/Ipl1. It is an ATP-dependent serine/threonine protein kinase
  (EC 2.7.11.1) that serves as the catalytic subunit of the Chromosomal Passenger Complex
  (CPC), together with the INCENP ortholog Pic1, the Survivin ortholog Bir1 (Cut17/Pbh1)
  and the Borealin-like protein Nbl1. The CPC displays classic passenger dynamics: Ark1 is
  concentrated in nuclear foci during G2, associates with chromatin and especially
  centromeres/kinetochores in early mitosis, and relocates to the anaphase spindle midzone
  and contractile-ring region. Through phosphorylation of kinetochore and chromatin
  substrates (including histone H3 Ser10, the condensin subunit Cnd2, and the CENP-C
  ortholog Cnp3), Ark1 corrects erroneous (syntelic/merotelic) kinetochore-microtubule
  attachments to promote sister-chromatid biorientation, contributes to spindle-assembly-
  checkpoint signaling, drives mitotic chromosome condensation and condensin loading, and
  participates in chromosome segregation and cytokinesis. Ark1 also functions in meiosis,
  where its repositioning supports sister-kinetochore mono-orientation at meiosis I, and it
  phosphorylates additional mitotic regulators such as Plo1.
existing_annotations:
- term:
    id: GO:0000922
    label: spindle pole
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: is_active_in
  review:
    summary: >-
      Phylogenetic propagation of an Aurora "spindle pole" localization. In S. pombe Ark1 is
      a CPC subunit localizing to centromeres/kinetochores and then the spindle midzone, not
      principally to the spindle pole body; spindle-pole functions in fungi are largely the
      province of dedicated factors. While Ark1 acts at the SPB indirectly (e.g., driving
      Plo1 onto spindle poles), direct stable Ark1 residence at the spindle pole is not the
      core localization.
    action: KEEP_AS_NON_CORE
    reason: >-
      IBA term reflecting the pan-Aurora family (Aurora A acts at poles); for the single
      fission-yeast Aurora B-type kinase the kinetochore/midzone localization is primary. A
      functional SPB connection exists via Plo1 recruitment but Ark1 is not a core spindle-pole
      component.
    supported_by:
    - reference_id: PMID:21965528
      supporting_text: >-
        Ark1 phosphorylation of polo kinase Plo1 within the linker region between the kinase
        domain and polo boxes drives Plo1 onto the spindle poles where it promotes mitosis.
      reference_section_type: ABSTRACT
