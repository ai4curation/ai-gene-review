      reference_section_type: ABSTRACT
core_functions:
- description: >-
    ATP-dependent serine/threonine protein kinase (Aurora B/Ipl1 type) that phosphorylates
    histone H3 Ser10 and multiple mitotic substrates.
  supported_by:
  - reference_id: PMID:11792803
    supporting_text: >-
      Ark1 immuno-precipitates phosphorylated serine 10 of histone H3 in vitro. This activity
      was highest in mitotic extracts.
    reference_section_type: ABSTRACT
  molecular_function:
    id: GO:0004674
    label: protein serine/threonine kinase activity
- description: >-
    Catalytic (Aurora) subunit of the chromosomal passenger complex (with Pic1/INCENP,
    Bir1/Survivin, Nbl1/Borealin) that relocates from inner centromeres/kinetochores to the
    anaphase spindle midzone.
  supported_by:
  - reference_id: PMID:11554922
    supporting_text: >-
      Bir1/Cut17 and Ark1 act as "passengers"
    reference_section_type: ABSTRACT
  cellular_component:
    id: GO:0032133
    label: chromosome passenger complex
- description: >-
    Corrects erroneous (syntelic/merotelic) kinetochore-microtubule attachments to establish
    sister-chromatid biorientation, partly by phosphorylating inner kinetochore CENP-C/Cnp3.
  supported_by:
  - reference_id: PMID:29180432
    supporting_text: >-
      a previously uncharacterized regulatory mechanism involved in CENP-C-Mis12-facilitated
      kinetochore attachment error correction to ensure accurate chromosome segregation during mitosis.
    reference_section_type: ABSTRACT
  biological_process:
    id: GO:0140273
    label: repair of mitotic kinetochore microtubule attachment defect
- description: >-
    Required for spindle assembly checkpoint signaling (attachment response); sits atop the SAC
    recruitment hierarchy and its kinase activity maintains checkpoint arrest.
  supported_by:
  - reference_id: PMID:12676091
    supporting_text: >-
      the single aurora kinase of fission yeast, Ark1, is required for the attachment response
    reference_section_type: ABSTRACT
  biological_process:
    id: GO:0007094
    label: mitotic spindle assembly checkpoint signaling
- description: >-
    Drives mitotic chromosome condensation by phosphorylating histone H3 Ser10 and the
    condensin subunit Cnd2, promoting condensin loading onto chromatin.
  supported_by:
  - reference_id: PMID:21540296
    supporting_text: >-
      the Cnd2 subunit of condensin (also known as Barren) is the target subunit of Aurora-B-like
      kinase Ark1 and that Ark1-mediated phosphorylation of Cnd2 occurred throughout mitosis.
    reference_section_type: ABSTRACT
  biological_process:
    id: GO:1903380
    label: positive regulation of mitotic chromosome condensation
- description: >-
    Essential for mitotic sister-chromatid segregation; ark1 loss causes the cut phenotype and
    DNA fragmentation.
  supported_by:
  - reference_id: PMID:11950927
    supporting_text: >-
      it is an essential gene required for sister chromatid segregation. Cells lacking Ark1p
      exhibit the cut phenotype, DNA fragmentation, and other defects in chromosome segregation.
    reference_section_type: ABSTRACT
  biological_process:
    id: GO:0000070
    label: mitotic sister chromatid segregation
