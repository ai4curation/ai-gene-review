- id: PMID:11554922
  title: Bir1/Cut17 moving from chromosome to spindle upon the loss of cohesion is
    required for condensation, spindle elongation and repair.
  findings:
  - statement: >-
      Ark1 is a chromosomal passenger whose mitotic distribution (kinetochore in metaphase,
      spindle midzone in anaphase) is identical to and controlled by Bir1/Cut17 (Survivin).
    supporting_text: >-
      Ark1, is an aurora kinase homologue whose mitotic distribution is identical to, and under
      the control of Bir1/Cut17.
    reference_section_type: ABSTRACT
- id: PMID:11792803
  title: The S. pombe aurora-related kinase Ark1 associates with mitotic structures
    in a stage dependent manner and is required for chromosome segregation.
  findings:
  - statement: >-
      Ark1 is the single fission-yeast Aurora kinase; it localizes to nuclear foci in G2,
      kinetochores/centromeres in early mitosis, then the spindle midzone, phosphorylates H3
      Ser10, and is required for chromosome segregation.
    supporting_text: >-
      Following commitment to mitosis Ark1 associated with chromatin and was particularly
      concentrated at several sites including kinetochores/centromeres.
    reference_section_type: ABSTRACT
- id: PMID:11861551
  title: Schizosaccharomyces pombe Bir1p, a nuclear protein that localizes to kinetochores
    and the spindle midzone, is essential for chromosome condensation and spindle
    elongation during mitosis.
  findings:
  - statement: >-
      Ark1 (Aim1p) colocalizes with Bir1 at kinetochores and the spindle midzone during
      mitosis and meiosis; Bir1 is required for Ark1 localization there.
    supporting_text: >-
      Bir1p colocalizes with the S. pombe Aurora kinase homolog Aim1p, a protein essential for
      mitosis, at the kinetochores as well as the spindle midzone during mitosis
    reference_section_type: ABSTRACT
- id: PMID:11950927
  title: The Schizosaccharomyces pombe aurora-related kinase Ark1 interacts with the
    inner centromere protein Pic1 and mediates chromosome segregation and cytokinesis.
  findings:
  - statement: >-
      ark1 is an essential gene required for sister-chromatid segregation; Ark1 binds the
      INCENP ortholog Pic1 (residues 925-972) through its kinase domain and phosphorylates the
      Survivin ortholog Bir1; kinase-dead Ark1 blocks cytokinesis.
    supporting_text: >-
      Pic1p residues 925–972 are necessary and sufficient for Ark1p binding, which occurs
      through the kinase domain.
    reference_section_type: ABSTRACT
- id: PMID:12676091
  title: S. pombe aurora kinase/survivin is required for chromosome condensation and
    the spindle checkpoint attachment response.
  findings:
  - statement: >-
      Ark1 is required for the spindle-checkpoint attachment response and for H3 phosphorylation
      and condensin recruitment that accompany chromosome condensation; it is needed for full
      Mad2 kinetochore association and Mad2-Mad3 complex formation.
    supporting_text: >-
      the single aurora kinase of fission yeast, Ark1, is required for the attachment response
    reference_section_type: ABSTRACT
- id: PMID:15525536
  title: The S. pombe Cdc14-like phosphatase Clp1p regulates chromosome biorientation
    and interacts with Aurora kinase.
  findings:
  - statement: >-
      The Cdc14-like phosphatase Clp1/Flp1 functions together with Ark1 at kinetochores to
      repair mono-orientation of sister kinetochores (biorientation).
    supporting_text: >-
      Clp1p/Flp1p functions together with Aurora kinase at kinetochores.
    reference_section_type: ABSTRACT
- id: PMID:19570910
  title: A link between aurora kinase and Clp1/Cdc14 regulation uncovered by the identification
    of a fission yeast borealin-like protein.
  findings:
  - statement: >-
      Nbl1 (Borealin-like) is a CPC subunit that affects Ark1 kinase activity and stability and
      colocalizes with CPC subunits during mitosis, linking the CPC to cytokinesis via Clp1.
    supporting_text: >-
      Nbl1 (novel Borealin-like 1) physically associates with known CPC components, affects the
      kinase activity and stability of the S. pombe Aurora B homologue, Ark1
    reference_section_type: ABSTRACT
- id: PMID:19592249
  title: A novel protein phosphatase 1-dependent spindle checkpoint silencing mechanism.
  findings:
  - statement: >-
      Ark1 kinase activity is directly required to maintain spindle-checkpoint arrest; its
      inhibition disassembles checkpoint complexes, and silencing requires PP1(Dis2).
    supporting_text: >-
      Aurora (Ark1) kinase activity is directly required to maintain spindle checkpoint arrest,
      even in the presence of many unattached kinetochores.
    reference_section_type: ABSTRACT
- id: PMID:19965387
  title: Phosphorylation of H2A by Bub1 prevents chromosomal instability through localizing
    shugoshin.
  findings:
  - statement: >-
      Study of Bub1-H2A-Sgo signaling in fission yeast meiosis/mitosis; provides context for
      Ark1 meiotic spindle/centromere localization (curator IDA from full text).
    supporting_text: >-
      Bub1 phosphorylates the conserved serine 121 of histone H2A in fission yeast Schizosaccharomyces pombe.
    reference_section_type: ABSTRACT
- id: PMID:20739936
  title: Phosphorylation of the CPC by Cdk1 promotes chromosome bi-orientation.
  findings:
  - statement: >-
      The CPC (catalytic Aurora B/Ark1) must be targeted to centromeres via Cdk1-phosphorylated
      Survivin binding to shugoshin to phosphorylate kinetochore substrates and establish
      biorientation.
    supporting_text: >-
      the chromosomal passenger complex (CPC), composed of catalytic kinase Aurora B and
      regulatory components (INCENP, Survivin and Borealin), must be localized to centromeres to
      phosphorylate kinetochore substrates.
    reference_section_type: ABSTRACT
- id: PMID:21540296
  title: Condensin phosphorylated by the Aurora-B-like kinase Ark1 is continuously
    required until telophase in a mode distinct from Top2.
  findings:
  - statement: >-
      Ark1 phosphorylates the condensin subunit Cnd2 (Barren) throughout mitosis; phosphosite
      mutants reveal this is required for condensin function in condensation/segregation until
      telophase.
    supporting_text: >-
      the Cnd2 subunit of condensin (also known as Barren) is the target subunit of Aurora-B-like
      kinase Ark1 and that Ark1-mediated phosphorylation of Cnd2 occurred throughout mitosis.
    reference_section_type: ABSTRACT
- id: PMID:21633354
  title: Condensin association with histone H2A shapes mitotic chromosomes.
  findings:
  - statement: >-
      Aurora B (Ark1)-dependent phosphorylation of condensin promotes its association with
      histone H2A/H2A.Z; condensin deposition peaks in anaphase as Aurora B relocates to the
      midzone.
    supporting_text: >-
      Aurora-B-dependent phosphorylation of condensin promotes its association with histone H2A
      and H2A.Z
    reference_section_type: ABSTRACT
- id: PMID:21712547
  title: Mitotic substrates of the kinase aurora with roles in chromatin regulation
    identified through quantitative phosphoproteomics of fission yeast.
  findings:
  - statement: >-
      Phosphoproteomics with Aurora inhibition identified ~70 Ark1 phosphosites on 42 proteins
      involved in diverse chromatin dynamics, refining the Aurora consensus motif.
    supporting_text: >-
      we classified 70 sites (on 42 proteins) as probable targets of Aurora
    reference_section_type: ABSTRACT
- id: PMID:21920317
  title: Repositioning of aurora B promoted by chiasmata ensures sister chromatid
    mono-orientation in meiosis I.
  findings:
  - statement: >-
      In meiosis I, chiasma-promoted repositioning of Aurora B (Ark1) relative to kinetochores
      converts erroneous biorientation of fused sister kinetochores into stable monopolar
      attachment, ensuring sister mono-orientation.
    supporting_text: >-
      this erroneous attachment is converted to monopolar attachment and stabilized.
    reference_section_type: ABSTRACT
- id: PMID:21965528
  title: Aurora promotes cell division during recovery from TOR-mediated cell cycle
    arrest by driving spindle pole body recruitment of Polo.
  findings:
  - statement: >-
      Ark1 phosphorylates Polo kinase Plo1 in its linker region to drive Plo1 onto spindle poles
      and promote mitotic entry during recovery from TOR/MAPK-mediated delay.
    supporting_text: >-
      Ark1 phosphorylation of polo kinase Plo1 within the linker region between the kinase domain
      and polo boxes drives Plo1 onto the spindle poles where it promotes mitosis.
    reference_section_type: ABSTRACT
- id: PMID:22264609
  title: A role for metaphase spindle elongation forces in correction of merotelic
    kinetochore attachments.
  findings:
  - statement: >-
      Metaphase spindle-elongation forces cooperate with Aurora B-based error correction to
      resolve merotelic kinetochore attachments and reduce lagging chromosomes.
    supporting_text: >-
      a proper force balance between kinesin motors on interpolar spindle microtubules is critical
      for correcting merotelic attachments.
    reference_section_type: ABSTRACT
- id: PMID:22825872
  title: Mph1 kinetochore localization is crucial and upstream in the hierarchy of
    spindle assembly checkpoint protein recruitment to kinetochores.
  findings:
  - statement: >-
      Ark1 and Mph1 sit at the top of the SAC recruitment hierarchy at kinetochores; the SAC can
      function with only Ark1 and Mph1 enriched.
    supporting_text: >-
      a three-layered hierarchy with Ark1 and Mph1 on top, Bub1 and Bub3 in the middle
    reference_section_type: ABSTRACT
- id: PMID:25778919
  title: Aurora B prevents chromosome arm separation defects by promoting telomere
    dispersion and disjunction.
  findings:
  - statement: >-
      Aurora B (Ark1) promotes telomere dispersion (metaphase) and disjunction (anaphase, via
      Cnd2 phosphorylation), preventing chromosome-arm separation defects.
    supporting_text: >-
      we describe a new role for Aurora B in telomere dispersion and disjunction during fission
      yeast mitosis.
    reference_section_type: ABSTRACT
- id: PMID:25963819
  title: Nucleocytoplasmic transport in the midzone membrane domain controls yeast
    mitotic spindle disassembly.
  findings:
  - statement: >-
      Ark1 localizes to the anaphase spindle midzone (used as a midzone marker) in a study of
      spindle disassembly via the midzone membrane domain.
    supporting_text: >-
      nucleocytoplasmic transport at the membrane domain surrounding the mitotic spindle midzone,
      here named the midzone membrane domain (MMD)
    reference_section_type: ABSTRACT
- id: PMID:26696398
  title: Autophagy is required for efficient meiosis progression and proper meiotic
    chromosome segregation in fission yeast.
  findings:
  - statement: >-
      In autophagy-defective meiotic cells, Aurora kinase (Ark1) is abnormally increased at the
      centromere and spindle, and its down-regulation rescues segregation/spindle defects.
    supporting_text: >-
      Aurora kinase, which regulates chromosome segregation and spindle elongation, is
      significantly increased at the centromere and spindle in the mutant cells.
    reference_section_type: ABSTRACT
- id: PMID:28178520
  title: Identification of a Sgo2-Dependent but Mad2-Independent Pathway Controlling
    Anaphase Onset in Fission Yeast.
  findings:
  - statement: >-
      Clp1 phosphatase-dependent interaction of the CPC (Ark1) with Klp9/MKLP2 (kinesin-6)
      relocates the CPC from centromeres to the spindle midzone and terminates a Sgo2-dependent
      anaphase-inhibitory pathway.
    supporting_text: >-
      relocalization of Aurora B kinase and other components of the chromosome passenger complex
      (CPC) from centromeres to the spindle midzone.
    reference_section_type: ABSTRACT
- id: PMID:29180432
  title: Phosphorylation of CENP-C by Aurora B facilitates kinetochore attachment
    error correction in mitosis.
  findings:
  - statement: >-
      Ark1 phosphorylates Thr28 of the CENP-C ortholog Cnp3, impairing the Cnp3-Mis12 interaction
      and thereby facilitating kinetochore attachment error correction and proper kinetochore
      assembly.
    supporting_text: >-
      Thr28 of Cnp3 is a substrate of Ark1 (the Aurora B homolog of S. pombe), and phosphorylation
      impairs the interaction between the Cnp3 and Mis12 complex.
    reference_section_type: ABSTRACT
- id: PMID:33176152
  title: Acute Heat Stress Leads to Reversible Aggregation of Nuclear Proteins into
    Nucleolar Rings in Fission Yeast.
  findings:
  - statement: >-
      Upon acute heat stress, nuclear/nucleolar proteins including Ark1 reversibly aggregate into
      nucleolar rings at the nucleolar periphery, a stress-induced sequestration.
    supporting_text: >-
      acute HS results in the segregation and aggregation of multiple nuclear and nucleolar
      proteins into ring-like structures located at the nucleolar periphery (nucleolar rings [NuRs]).
    reference_section_type: ABSTRACT
suggested_questions:
- question: >-
    Why do dominant-negative kinase-dead Ark1 (and Pic1-fragment overexpression) block
    cytokinesis while Ark1 depletion does not, and what is the true direct contribution of
    Ark1 to contractile-ring/cytokinesis control versus indirect effects through chromosome
    segregation failure?
- question: >-
    What is the complete in vivo substrate repertoire of Ark1 beyond H3S10, Cnd2, Cnp3 and
    Plo1, and how is substrate selection spatially partitioned between inner centromere and
    spindle midzone?
- question: >-
    How is Ark1 activity regulated by the gradient of phosphatase activity (PP1(Dis2), Clp1)
    to switch between error-correction (destabilizing attachments) and checkpoint silencing?
suggested_experiments:
- description: >-
    Analog-sensitive ark1-as kinase shut-off combined with live imaging of biorientation,
    H3S10ph and condensin loading to dissect the temporal order and dose-dependence of Ark1's
    condensation, error-correction and checkpoint functions.
- description: >-
    Quantitative phosphoproteomics of synchronized mitotic versus meiotic cells with acute
    Ark1 inhibition to define stage-specific substrate sets and resolve mitotic versus meiosis-I
    functions (sister mono-orientation).
- description: >-
    Separation-of-function alleles that uncouple kinetochore versus midzone CPC localization
    (e.g., Klp9- or Clp1-targeting mutants) to test which Ark1 functions require each localization
    pool.
