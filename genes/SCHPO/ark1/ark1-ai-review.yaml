- term:
    id: GO:0007094
    label: mitotic spindle assembly checkpoint signaling
  evidence_type: IMP
  original_reference_id: PMID:12676091
  qualifier: involved_in
  review:
    summary: >-
      Core process. Ark1 is required for the spindle-checkpoint attachment response: loss of
      Ark1 from kinetochores overrides the checkpoint response to microtubule depolymerization,
      and Ark1 is needed for full Mad2 kinetochore association and Mad2-Mad3 complex formation.
    action: ACCEPT
