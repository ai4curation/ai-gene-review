  evidence_type: IPI
  original_reference_id: PMID:15525536
  qualifier: enables
  review:
    summary: >-
      This IPI captures the genetic/physical interaction between Ark1 and the Cdc14-like
      phosphatase Clp1/Flp1 at kinetochores, which cooperate to repair sister-kinetochore
      mono-orientation. "protein binding" is uninformative; the functional relevance is the
      Clp1-CPC partnership in biorientation/error correction.
    action: MODIFY
    reason: >-
      Replace bare "protein binding" with a more informative process the interaction serves;
      the Ark1-Clp1 partnership underlies sister-chromatid biorientation.
    proposed_replacement_terms:
    - GO:1990758
    supported_by:
    - reference_id: PMID:15525536
      supporting_text: >-
        Clp1p/Flp1p functions together with Aurora kinase at kinetochores.
      reference_section_type: ABSTRACT
