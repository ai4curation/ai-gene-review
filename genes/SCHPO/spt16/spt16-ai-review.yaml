core_functions:
  - description: Histone chaperone within the FACT complex that transiently
      removes an H2A-H2B dimer from nucleosomes ahead of elongating RNA
      Pol II, then restores the nucleosome in its wake, thereby
      facilitating transcription elongation through chromatin.
    molecular_function:
      id: GO:0000511
      label: H2A-H2B histone complex chaperone activity
    directly_involved_in:
      - id: GO:0140673
        label: transcription elongation-coupled chromatin remodeling
      - id: GO:0034728
        label: nucleosome organization
    locations:
      - id: GO:0000791
        label: euchromatin
    in_complex:
      id: GO:0035101
      label: FACT complex
    supported_by:
      - reference_id: PMID:28218250
        supporting_text: >-
          Fun30Fft3 associates with RNAPII and collaborates with the
          histone chaperone, FACT, which facilitates RNAPII elongation
          through chromatin, to induce nucleosome disassembly at
          transcribing regions during RNAPII transcription.
      - reference_id: PMID:31837996
        supporting_text: >-
          ...FACT and H2Bub globally repress antisense transcripts near the
          5' end of genes and inside gene bodies, respectively...
  - description: Maintains chromatin integrity at heterochromatin domains by
      suppressing histone turnover, enabling the H3K9me2-to-me3
      transition required for heterochromatin spreading from nucleation
      sites along chromosome arms.
    molecular_function:
      id: GO:0140713
      label: histone chaperone activity
    directly_involved_in:
      - id: GO:0140719
        label: constitutive heterochromatin formation
    locations:
      - id: GO:0005634
        label: nucleus
    in_complex:
      id: GO:0035101
      label: FACT complex
    supported_by:
      - reference_id: PMID:34731638
        supporting_text: >-
          ...FACT promotes spreading by repressing heterochromatic histone
          turnover, which is crucial for the H3K9me2 to me3 transition
          that enables spreading...
      - reference_id: PMID:17614284
        supporting_text: >-
          ...the chromatin remodeling complex FACT is required for
          centromeric-heterochromatin integrity and accurate chromosome
          segregation...
  - description: Chaperones parental histones H3-H4 during DNA replication,
      transferring them to both daughter strands in coordination with
      Mcm2 and Dpb3/4 to maintain histone density and enable epigenetic
      inheritance of chromatin states.
    molecular_function:
      id: GO:0140713
      label: histone chaperone activity
    directly_involved_in:
      - id: GO:0006335
        label: DNA replication-dependent chromatin assembly
    locations:
      - id: GO:0005694
        label: chromosome
    in_complex:
      id: GO:0035101
      label: FACT complex
    supported_by:
