  title: The chromatin-remodeling factor FACT contributes to centromeric
    heterochromatin independently of RNAi.
  findings:
    - statement: Identifies and characterizes the S. pombe FACT complex
        (Spt16+Pob3), demonstrates nuclear localization, and shows spt16
        is essential
      supporting_text: >-
        ...Pob3 and Spt16 associate in vivo...Pob3-GFP and Spt16-GFP are
        nuclear factors...the S. pombe ortholog for the large FACT subunit,
        spt16+, is essential...
    - statement: FACT is required for centromeric heterochromatin integrity
        and accurate chromosome segregation, independently of RNAi
      supporting_text: >-
        ...the histone chaperone and remodeling complex FACT is required for
        centromeric-heterochromatin integrity and accurate chromosome
        segregation...pob3+ deletion does not affect H3K9me2 levels, but
        leads to decreases in Swi6 association at otr repeats...
