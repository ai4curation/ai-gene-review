suggested_questions:
  - question: Does Spt16 have functions independent of Pob3 in S. pombe
      beyond controlling 3' gene ends, given that spt16 is essential but
      pob3 is not?
    experts:
      - Ladurner AG
      - Braun S
  - question: What is the precise mechanism by which FACT suppresses histone
      turnover at heterochromatic regions -- does it involve direct
      competition with Epe1 for nucleosome access?
    experts:
      - Murawska M
      - Al-Sady B
  - question: How does FACT coordinate with the Mcm2 and Dpb3/4 histone
      chaperones during DNA replication fork passage to achieve balanced
      parental histone distribution?
    experts:
      - Jia S
      - Zhang Z
suggested_experiments:
  - description: ChIP-seq of Spt16 in spt16 temperature-sensitive mutants
      at permissive and restrictive temperatures to map genome-wide FACT
      occupancy changes, particularly at heterochromatin boundaries and
      subtelomeres.
    hypothesis: FACT occupancy at heterochromatin boundaries correlates with
      H3K9me3 spreading capacity.
  - description: eSPAN (enrichment and sequencing of protein-associated
      nascent DNA) analysis in spt16 conditional mutants to directly
      measure parental histone distribution asymmetry at replication forks.
    hypothesis: FACT impairment causes asymmetric parental histone
      distribution favoring the leading strand.
  - description: Proximity ligation assay or cross-linking mass spectrometry
      to identify direct Spt16 interaction partners at heterochromatin
      versus euchromatin, testing whether Spt16 engages distinct
      co-factors in different chromatin contexts.
    hypothesis: Spt16 interacts with Clr4/Swi6 at heterochromatin but
      with elongation factors (Spt4/5/6) at euchromatin.
