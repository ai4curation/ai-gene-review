    supporting_text: relief from repression requires the Sty1, Atf1, and Prr1
    reference_section_type: ABSTRACT
- id: PMID:15164362
  title: Transcriptional and post-translational regulation of neutral trehalase in
    Schizosaccharomyces pombe during thermal stress.
  findings:
  - statement: Atf1 binds a CRE-like element in the ntp1+ promoter to drive heat-shock induction of neutral trehalase.
    supporting_text: heat-induced Atf1p binding to the CRE-like element favours the subsequent interaction of the heat shock factor (HSF) with HSE elements in the ntp1(+) promoter
    reference_section_type: ABSTRACT
- id: PMID:15218150
  title: RNAi-independent heterochromatin nucleation by the stress-activated ATF/CREB
    family proteins.
  findings:
  - statement: Atf1 and Pcr1 act in a pathway parallel to RNAi to nucleate heterochromatin, binding the mat region and targeting H3K9 methylation and Swi6.
    supporting_text: Atf1 and Pcr1 bind to the mating-type region and target histone H3 lysine-9 methylation and the Swi6 protein essential for heterochromatin assembly.
    reference_section_type: ABSTRACT
- id: PMID:15292231
  title: Regulation of Swi6/HP1-dependent heterochromatin assembly by cooperation
    of components of the mitogen-activated protein kinase pathway and a histone deacetylase
    Clr6.
  findings:
  - statement: Atf1 and Pcr1 are required for H3/H4 deacetylation prerequisite for H3K9 methylation and Swi6-dependent heterochromatin assembly at the mat region, forming complexes with Clr6 and Swi6.
    supporting_text: Atf1 and Pcr1 participate in an early step essential for heterochromatin assembly at the mat locus and silencing of transcriptional targets of Atf1.
    reference_section_type: ABSTRACT
- id: PMID:15448137
  title: Atf1-Pcr1-M26 complex links stress-activated MAPK and cAMP-dependent protein
    kinase pathways via chromatin remodeling of cgs2+.
  findings:
  - statement: The Atf1-Pcr1-M26 complex remodels chromatin at cgs2+ and can act as either a transcriptional activator, a repressor, or an inducer of meiotic recombination.
    supporting_text: Atf1-Pcr1 heterodimer can function differentially as either a transcriptional activator, or as a transcriptional repressor, or as an inducer of meiotic recombination.
    reference_section_type: ABSTRACT
- id: PMID:16246721
  title: The nucleation and maintenance of heterochromatin by a histone deacetylase
    in fission yeast.
  findings:
  - statement: The Clr3 HDAC is recruited to a specific mat-locus site through a mechanism involving ATF/CREB family proteins (Atf1/Pcr1).
    supporting_text: Clr3 is recruited at a specific site through a mechanism involving ATF/CREB family proteins
    reference_section_type: ABSTRACT
- id: PMID:16823372
  title: ORFeome cloning and global analysis of protein localization in the fission
    yeast Schizosaccharomyces pombe.
  findings:
  - statement: Global localization study assigns Atf1 to the nucleus.
    supporting_text: ORFeome cloning and global analysis of protein localization in the fission yeast Schizosaccharomyces pombe
    reference_section_type: TITLE
- id: PMID:18375981
  title: Distinct regions of ATF/CREB proteins Atf1 and Pcr1 control recombination
    hotspot ade6-M26 and the osmotic stress response.
  findings:
  - statement: Atf1 has a modular organization with distinct regions (OSA, HRA, HRR, bZIP); the HRA and HRR regions activate and repress recombination, respectively.
    supporting_text: The HRA and HRR regions are necessary and sufficient to activate and repress recombination, respectively.
    reference_section_type: ABSTRACT
  - statement: The Atf1-Pcr1 heterodimer binds the M26 site with high affinity.
    supporting_text: The Atf1-Pcr1 heterodimer binds avidly (Kd ∼1 nM) to a DNA site called M26 (5′-ATGACGT-3′)
    reference_section_type: ABSTRACT
- id: PMID:18410345
  title: Characterization of Sro1, a novel stress responsive protein in Schizosaccharomyces
    pombe.
  findings:
  - statement: Expression of the stress-responsive sro1+ gene is regulated mainly through the SAPK Sty1 and its downstream transcription factor Atf1.
    supporting_text: the expression of the gene is regulated mainly through the stress activated protein kinase (SAPK) Sty1 and its downstream transcription factor Atf1
    reference_section_type: ABSTRACT
- id: PMID:19436749
  title: Phosphorylation-independent regulation of Atf1-promoted meiotic recombination
    by stress-activated, p38 kinase Spc1 of fission yeast.
  findings:
  - statement: Spc1 positions Atf1-promoted recombination at hotspots; a phospho-null Atf1 (Atf1-11M) is fully proficient for hotspot recombination, and tethering Atf1 to ade6 bypasses the Spc1 requirement.
    supporting_text: tethering of Atf1 to ade6 in the chromosome by a heterologous DNA binding domain bypassed the requirement for Spc1 in promoting recombination
    reference_section_type: ABSTRACT
- id: PMID:20032302
  title: The cell surface protein gene ecm33+ is a target of the two transcription
    factors Atf1 and Mbx1 and negatively regulates Pmk1 MAPK cell integrity signaling
    in fission yeast.
  findings:
  - statement: ecm33+ is a transcriptional target of the Pmk1 MAPK pathway acting through Atf1 (and Mbx1).
    supporting_text: We identified and characterized ecm33(+), which encodes a glycosyl-phosphatidylinositol (GPI)-anchored cell surface protein as a transcriptional target of Pmk1 and Atf1.
    reference_section_type: ABSTRACT
- id: PMID:23695164
  title: Cross-species protein interactome mapping reveals species-specific wiring
    of stress response pathways.
  findings:
  - statement: Source of an IPI protein-binding annotation recording the Atf1-Sty1 (Q09892) interaction.
    supporting_text: Cross-species protein interactome mapping reveals species-specific wiring of stress response pathways
    reference_section_type: TITLE
- id: PMID:24224056
  title: The transcription factors Atf1 and Pcr1 are essential for transcriptional
    induction of the extracellular maltase Agl1 in fission yeast.
  findings:
  - statement: Atf1 and Pcr1 are required for carbon-source-dependent induction of agl1+, binding target genes and recruiting Mediator.
    supporting_text: Transcription of agl1 was induced when the carbon source was changed from glucose to maltose. This was dependent on Atf1 and Pcr1
    reference_section_type: ABSTRACT
- id: PMID:24696293
  title: Ecl1 is activated by the transcription factor Atf1 in response to H2O2 stress
    in Schizosaccharomyces pombe.
  findings:
  - statement: Atf1 is a direct activator of ecl1+ induction by H2O2 stress and binds the upstream DNA region of ecl1+ by ChIP.
    supporting_text: Based on ChIP analysis, we identified that Atf1 binds to the upstream DNA region of ecl1(+).
    reference_section_type: ABSTRACT
- id: PMID:24728197
  title: The basic leucine zipper domain transcription factor Atf1 directly controls
    Cdc13 expression and regulates mitotic entry independently of Wee1 and Cdc25 in
    Schizosaccharomyces pombe.
  findings:
  - statement: Atf1 binds the cdc13+ (mitotic cyclin) promoter to activate its expression and promote the G2/M transition independently of Wee1 and Cdc25.
    supporting_text: We have shown that Atf1 binds to the Cdc13 promoter, leading to activation of Cdc13 expression.
    reference_section_type: ABSTRACT
- id: PMID:25122751
  title: Binding of the transcription factor Atf1 to promoters serves as a barrier
    to phase nucleosome arrays and avoid cryptic transcription.
  findings:
  - statement: Atf1 promoter binding establishes nucleosome-depleted regions, phases nucleosome arrays, and suppresses cryptic/antisense transcription.
    supporting_text: deletion of atf1 results in nucleosome disorganization specifically at stress coding regions and derepresses antisense transcription
    reference_section_type: ABSTRACT
- id: PMID:28652406
  title: Deciphering the role of the signal- and Sty1 kinase-dependent phosphorylation
    of the stress-responsive transcription factor Atf1 on gene activation.
  findings:
  - statement: Sty1-mediated phosphorylation of Atf1 does not stimulate DNA binding but establishes a platform with the basal transcription machinery to facilitate initiation.
    supporting_text: Sty1-mediated Atf1 phosphorylation does not stimulate binding of Atf1 to DNA but, rather, establishes a platform of interactions with the basal transcriptional machinery to facilitate transcription initiation.
    reference_section_type: ABSTRACT
- id: PMID:28934464
  title: Recruitment and delivery of the fission yeast Rst2 transcription factor via
    a local genome structure counteracts repression by Tup1-family corepressors.
  findings:
  - statement: Study of TF recruitment at the silent mat region; Atf1 localizes to heterochromatin/the mat region.
    supporting_text: Atf1 and Pcr1 that localize to the previously described CAS (Clr3-attracting sequence) element
    reference_section_type: RESULTS
- id: PMID:39747188
  title: PhpC(NF-Y) transcription factor infiltrates heterochromatin to generate cryptic
    intron-containing transcripts crucial for small RNA production.
  findings:
  - statement: Atf1 and Pcr1 are known to bind specific CRE sites at the silent mat region (CAS element) and were used as ChIP-seq controls.
    supporting_text: Atf1 and Pcr1, ATF-CREB family proteins previously known to bind specific sites at the silent mat region, were included as controls
    reference_section_type: RESULTS
- id: PMID:40015273
  title: A comprehensive Schizosaccharomyces pombe atlas of physical transcription
    factor interactions with proteins and chromatin.
  findings:
  - statement: Genome-wide IP-MS and ChIP-seq atlas of S. pombe TFs, including Atf1, mapping protein and chromatin interactions and DNA-binding sites.
    supporting_text: We discovered DNA-binding sites for most TFs across 2,027 unique genomic regions, revealing motifs for 38 TFs
    reference_section_type: ABSTRACT
- id: PMID:7518718
  title: 'RNA associated with a heterodimeric protein that activates a meiotic homologous
    recombination hot spot: RL/RT/PCR strategy for cloning any unknown RNA or DNA.'
  findings:
  - statement: RNAs co-purifying with the Mts1/Mts2 (Atf1/Pcr1) heterodimer were heterogeneous and bound nonspecifically, not indicating a sequence-specific RNA-binding function.
    supporting_text: it seems likely that the RNAs copurified as a result of tight but nonspecific interactions with the heterodimeric protein
    reference_section_type: ABSTRACT
- id: PMID:7958849
  title: 'A heteromeric protein that binds to a meiotic homologous recombination hot
    spot: correlation of binding and hot spot activity.'
  findings:
  - statement: The purified Mts1/Mts2 (Atf1/Pcr1) heterodimer binds the M26 site; in vitro binding strictly correlates with hotspot activity in vivo.
    supporting_text: Binding in vitro strictly correlates with hot spot activity in vivo for numerous single base pair substitutions in the vicinity of the M26 site, indicating that Mts1/Mts2 activates the M26 site and promotes a rate-limiting step of meiotic recombination.
    reference_section_type: ABSTRACT
- id: PMID:8557039
  title: Schizosaccharomyces pombe atf1+ encodes a transcription factor required for
    sexual development and entry into stationary phase.
  findings:
  - statement: Atf1 is an ATF/CREB-family bZIP factor that binds ATF/CRE sites; ATF-like binding activity in fission yeast extracts is entirely lost in atf1Δ. Atf1 is required for stationary-phase entry and sexual development.
    supporting_text: the ATF-like binding activity detected in extracts from fission yeast cells is entirely lost upon deletion of the atf1+ gene
    reference_section_type: ABSTRACT
- id: PMID:8824587
  title: Conjugation, meiosis, and the osmotic stress response are regulated by Spc1
    kinase through Atf1 transcription factor in fission yeast.
  findings:
  - statement: Atf1 is required for induction of meiotic and stress-response genes downstream of Spc1, which mediates stress-induced phosphorylation of Atf1.
    supporting_text: Spc1 is required for stress-induced phosphorylation of Atf1. Atf1 is required for induction of meiotic genes and stress-response genes, such as gpd1+ and pyp2+
    reference_section_type: ABSTRACT
- id: PMID:8824588
  title: The Atf1 transcription factor is a target for the Sty1 stress-activated MAP
    kinase pathway in fission yeast.
  findings:
  - statement: Atf1 is a Sty1 substrate; it directly and rapidly induces stress target genes (gpd1+, ctt1+/catalase, pyp2+), with Pyp2 induction independent of de novo protein synthesis.
    supporting_text: Induction of Pyp2 by Atf1 is direct in that it does not require de novo protein synthesis
    reference_section_type: ABSTRACT
- id: PMID:9135083
  title: Schizosaccharomyces pombe gad7+ encodes a phosphoprotein with a bZIP domain,
    which is required for proper G1 arrest and gene expression under nitrogen starvation.
  findings:
  - statement: Gad7 (Atf1) is a 566-aa bZIP phosphoprotein that binds CRE in vitro and heterodimerizes with Pcr1; required for G1 arrest and gene expression under nitrogen starvation.
    supporting_text: The deduced gad7 gene product was a bZIP protein of 566 amino acids, which could bind to the CRE (cAMP response element) sequence in vitro.
    reference_section_type: ABSTRACT
- id: PMID:9391101
  title: Transcription factor Mts1/Mts2 (Atf1/Pcr1, Gad7/Pcr1) activates the M26 meiotic
    recombination hotspot in Schizosaccharomyces pombe.
  findings:
  - statement: The Mts1/Mts2 (Atf1/Pcr1) heterodimer is essential for ade6-M26 meiotic recombination hotspot activity.
    supporting_text: Cloning, disruption, and genetic analyses of the mts genes demonstrate that the Mts1/Mts2 heterodimer is essential for hotspot activity.
    reference_section_type: ABSTRACT
- id: PMID:9585505
  title: 'Regulation of the fission yeast transcription factor Pap1 by oxidative stress:
    requirement for the nuclear export factor Crm1 (Exportin) and the stress-activated
    MAP kinase Sty1/Spc1.'
  findings:
  - statement: Atf1, regulated by Sty1, controls meiosis-specific and osmotic stress-responsive genes (oxidative stress is handled largely by Pap1).
    supporting_text: Some of these phenotypes are caused by Sty1-dependent regulation of the Atf1 transcription factor, which controls both meiosis-specific and osmotic stress-responsive genes.
    reference_section_type: ABSTRACT
- id: PMID:9585506
  title: Phosphorylation and association with the transcription factor Atf1 regulate
    localization of Spc1/Sty1 stress-activated kinase in fission yeast.
  findings:
  - statement: Atf1 is the key nuclear substrate of Spc1; nuclear retention of Spc1 requires Atf1, and nuclear localization of Atf1 requires Pcr1.
    supporting_text: Nuclear retention of Spc1 requires Atf1, a transcription factor that is the key nuclear substrate of Spc1. Nuclear localization of Atf1 requires Pcr1
    reference_section_type: ABSTRACT
