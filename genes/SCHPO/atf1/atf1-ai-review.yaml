core_functions:
- description: >-
    Sequence-specific RNA polymerase II transcription factor that binds CRE/ATF
    (M26, TGACGT) cis-regulatory elements, predominantly as an Atf1-Pcr1
    heterodimer, to activate (and in some contexts repress) transcription of the
    core environmental stress response regulon downstream of the Sty1/Spc1 SAPK.
  supported_by:
  - reference_id: PMID:8824588
    supporting_text: target genes that are induced rapidly in a manner dependent upon both the Sty1 kinase and the Atf1 transcription factor
    reference_section_type: ABSTRACT
  - reference_id: PMID:18375981
    supporting_text: The Atf1-Pcr1 heterodimer binds avidly (Kd ∼1 nM) to a DNA site called M26 (5′-ATGACGT-3′)
    reference_section_type: ABSTRACT
- description: >-
    Required, with Pcr1, for entry into stationary phase and for sexual
    differentiation/meiosis, including nitrogen-starvation-induced G1 arrest and
    induction of ste11+.
  supported_by:
  - reference_id: PMID:8557039
    supporting_text: Thus Atf1 is a transcription factor that plays an important role in the response of cells to adverse environmental conditions, which is to exit the mitotic cell cycle and either sexually differentiate or enter a resting state.
    reference_section_type: ABSTRACT
- description: >-
    Binds and activates the ade6-M26 meiotic recombination hotspot as the
    Atf1-Pcr1 (Mts1-Mts2) heterodimer; the recombination-activation function
    resides in Atf1 and is essential for hotspot activity.
  supported_by:
  - reference_id: PMID:9391101
    supporting_text: Cloning, disruption, and genetic analyses of the mts genes demonstrate that the Mts1/Mts2 heterodimer is essential for hotspot activity.
    reference_section_type: ABSTRACT
- description: >-
    Nucleates and maintains RNAi-independent heterochromatin and transcriptional
    silencing at the silent mating-type region by binding mat-region sites and
    recruiting histone deacetylase complexes (Clr3, Clr6) and Swi6/HP1 to target
    H3K9 methylation.
  supported_by:
  - reference_id: PMID:15218150
    supporting_text: Atf1 and Pcr1 bind to the mating-type region and target histone H3 lysine-9 methylation and the Swi6 protein essential for heterochromatin assembly
    reference_section_type: ABSTRACT
  - reference_id: PMID:16246721
    supporting_text: Clr3 is recruited at a specific site through a mechanism involving ATF/CREB family proteins
    reference_section_type: ABSTRACT
- description: >-
    Shapes promoter nucleosome architecture: constitutive Atf1 binding creates
    broad nucleosome-depleted regions, phases downstream nucleosome arrays, and
    suppresses cryptic antisense transcription at stress genes.
  supported_by:
  - reference_id: PMID:25122751
    supporting_text: the transcription factor binding to promoters acts as an effective barrier to fix the +1 nucleosome and phase downstream nucleosome arrays to prevent cryptic transcription
    reference_section_type: ABSTRACT
proposed_new_terms: []
suggested_questions:
- question: >-
    How does Atf1 switch between activator and repressor modes at different
    target promoters, and what determines whether bound Atf1-Pcr1 nucleates
    heterochromatin versus activating Pol II transcription?
- question: >-
    Given that Sty1 phosphorylation does not enhance Atf1 DNA binding but builds
    a platform for the basal machinery, which coactivator/Mediator contacts are
    phospho-dependent and which target genes require them?
- question: >-
    What are the distinct DNA-binding specificities and biological roles of Atf1
    homodimers versus Atf1-Pcr1 and other potential heterodimers (Atf21, Atf31,
    Pap1)?
suggested_experiments:
- description: >-
    Genome-wide ChIP-seq/CUT&RUN of Atf1 and Pcr1 across stress, meiotic, and
    silencing conditions combined with nascent transcript profiling (e.g.,
    NET-seq/PRO-seq) to map direct activated vs. repressed targets and antisense
    suppression in atf1 phospho-mutant backgrounds.
- description: >-
    Separation-of-function mutant analysis (OSA, HRA, HRR, bZIP, and
    phospho-site variants) to dissect the contributions of distinct Atf1 regions
    to stress transcription, M26 recombination, and mat-locus heterochromatin
    nucleation, with quantitative silencing and recombination assays.
- description: >-
    Targeted proteomics (IP-MS) of Atf1 under basal and stress conditions to
    define the composition and dynamics of Atf1-associated complexes (Pcr1, Clr3,
    Clr6, Swi6, Mediator) and how recruitment changes between activating and
    silencing chromatin states.
