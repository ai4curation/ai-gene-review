- id: PMID:14730319
  title: The conserved kinetochore protein shugoshin protects centromeric cohesion
    during meiosis.
  findings:
  - statement: >-
      Identifies Sgo1 as the protector of the centromeric cohesin Rec8 in fission yeast
      meiosis; centromeric localization of Sgo1 (and Sgo2) requires Bub1 kinase, and
      Sgo1 is degraded at the onset of anaphase I.
    supporting_text: >-
      Here we identify Sgo1 (shugoshin), a protector of the centromeric cohesin Rec8 in
      fission yeast.
    reference_section_type: ABSTRACT
- id: PMID:14972679
  title: Two fission yeast homologs of Drosophila Mei-S332 are required for chromosome
    segregation during meiosis I and II.
  findings:
  - statement: >-
      sgo1 is required for retention of sister centromere cohesion between meiotic
      divisions (Rec8 retained at centromeres is reduced in Delta-sgo1), while sgo2 is
      required for meiosis-I kinetochore orientation; Sgo1 regulates Rec8 cleavage by
      separase.
    supporting_text: >-
      The amount of meiotic cohesin's Rec8 subunit retained at centromeres after meiosis
      I is reduced in Deltasgo1, but not in Deltasgo2, cells, and Sgo1 appears to
      regulate cleavage of Rec8 by separase.
    reference_section_type: ABSTRACT
- id: PMID:16541024
  title: Protein phosphatase 2A protects centromeric sister chromatid cohesion during
    meiosis I.
  findings:
  - statement: >-
      Sgo1 recruits a specific form of PP2A to centromeres; inactivating it causes loss
      of centromeric cohesin at anaphase I and random sister-centromere segregation at
      meiosis II.
    supporting_text: >-
      Here we show in both fission and budding yeast that Sgo1 recruits to centromeres a
      specific form of protein phosphatase 2A (PP2A). Its inactivation causes loss of
      centromeric cohesin at anaphase I and random segregation of sister centromeres at
      the second meiotic division.
    reference_section_type: ABSTRACT
- id: PMID:16541025
  title: Shugoshin collaborates with protein phosphatase 2A to protect cohesin.
  findings:
  - statement: >-
      Meiotic fission-yeast shugoshin (Sgo1) associates with PP2A, and the two
      collaboratively protect Rec8-containing cohesin at centromeres; the mechanism is
      dephosphorylation of cohesin.
    supporting_text: >-
      Meiotic shugoshin of fission yeast also associates with PP2A, with both proteins
      collaboratively protecting Rec8-containing cohesin at centromeres.
    reference_section_type: ABSTRACT
- id: PMID:16823372
  title: ORFeome cloning and global analysis of protein localization in the fission
    yeast Schizosaccharomyces pombe.
  findings:
  - statement: >-
      Genome-wide YFP localization study; provides high-throughput nuclear (and
      nuclear-envelope) localization data for Sgo1.
    supporting_text: >-
      we determined the localization of 4,431 proteins, corresponding to approximately
      90% of the fission yeast proteome, by tagging each ORF with the yellow fluorescent
      protein.
    reference_section_type: ABSTRACT
- id: PMID:17035632
  title: Reconstruction of the kinetochore during meiosis in fission yeast Schizosaccharomyces
    pombe.
  findings:
  - statement: >-
      Live-cell imaging shows Sgo1 is a meiosis-specific centromere protein loaded onto
      the kinetochore at times similar to the NMS group; Sgo1 protects Rec8 at the
      centromere to maintain cohesion between sister centromeres until meiosis II.
    supporting_text: >-
      another meiosis-specific protein, Sgo1, is loaded at times similar to the NMS
      group.
    reference_section_type: RESULTS
- id: PMID:18716626
  title: Heterochromatin links to centromeric protection by recruiting shugoshin.
  findings:
  - statement: >-
      The heterochromatin protein Swi6 (HP1) binds directly to Sgo1 and recruits it to
      centromeres; an Sgo1 mutation (V242E) abolishing Swi6 binding impairs Sgo1
      centromeric localization and function.
    supporting_text: >-
      A point mutation of Sgo1 (V242E), which abolishes the interaction with Swi6,
      impairs the centromeric localization and function of Sgo1.
    reference_section_type: ABSTRACT
- id: PMID:19965387
  title: Phosphorylation of H2A by Bub1 prevents chromosomal instability through localizing
    shugoshin.
  findings:
  - statement: >-
      Bub1 phosphorylates histone H2A at Ser121, creating the mark that localizes
      shugoshin to centromeres; loss of this mark mislocalizes shugoshin and causes
      chromosomal instability.
    supporting_text: >-
      The h2a-SA mutant, in which all cellular H2A-S121 is replaced by alanine,
      phenocopies the bub1 kinase-dead mutant (bub1-KD) in losing the centromeric
      localization of shugoshin proteins.
    reference_section_type: ABSTRACT
- id: PMID:20739936
  title: Phosphorylation of the CPC by Cdk1 promotes chromosome bi-orientation.
  findings:
  - statement: >-
      Defines shugoshin as a conserved centromeric adaptor of the chromosomal passenger
      complex (CPC); Cdk1-dependent Survivin phosphorylation promotes its binding to
      shugoshin, promoting mitotic biorientation (a function predominantly attributed to
      Sgo2 in S. pombe).
    supporting_text: >-
      Survivin phosphorylation promotes direct binding with shugoshin, which we now
      define as a conserved centromeric adaptor of the CPC.
    reference_section_type: ABSTRACT
- id: PMID:28497540
  title: Meikin-associated polo-like kinase specifies Bub1 distribution in meiosis
    I.
  findings:
  - statement: >-
      A meiotic Bub1 pool (established via Moa1/meikin-Plo1) cooperates with Swi6 to
      ensure robust Sgo1 localization and cohesion protection at centromeres; Swi6 binds
      and stabilizes Sgo1.
    supporting_text: >-
      The meiotic Bub1 pool ensures robust Sgo1 (shugoshin) localization and cohesion
      protection at centromeres by cooperating with heterochromatin protein Swi6, which
      binds and stabilizes Sgo1.
    reference_section_type: ABSTRACT
suggested_questions:
- Does S. pombe Sgo1 contribute at all to mitotic chromosome biorientation/tension
  sensing, or is the mitotic CPC-adaptor role (PMID:20739936) carried out essentially
  entirely by the paralog Sgo2?
- What is the precise stoichiometry and structural basis of the Sgo1-PP2A(B56)-Swi6
  module at the meiotic centromere?
- How is Sgo1 abundance/degradation timed relative to anaphase I, and which APC/C
  substrate-recognition pathway controls it?
suggested_experiments:
- Quantitative ChIP-seq/live imaging of Sgo1, PP2A-B56 (Par1/Par2) and Rec8 across
  meiosis I/II in wild-type versus sgo1 separation-of-function mutants (PP2A-binding vs
  Swi6-binding) to dissect recruitment hierarchy.
- Targeted phospho-proteomics of Rec8 at meiotic centromeres in sgo1-delta versus wild
  type to confirm that Sgo1-recruited PP2A maintains Rec8 dephosphorylation in vivo.
- Genetic separation of Sgo1 vs Sgo2 contributions to mitotic biorientation using
  allele-specific degrons, to clarify whether the IMP mitotic-biorientation annotation
  reflects a genuine Sgo1 role.
