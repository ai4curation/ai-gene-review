gene_symbol: sgo1
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:284812
  label: Schizosaccharomyces pombe (strain 972 / ATCC 24843)
description: >-
  Shugoshin-1 (Sgo1) is the meiosis-specific shugoshin of fission yeast that protects
  centromeric sister-chromatid cohesion during the first meiotic division. It localizes
  to the centromere/pericentromeric heterochromatin and the inner kinetochore, where it
  recruits and retains a specific form of protein phosphatase 2A (PP2A-B56, Par1/Par2).
  PP2A bound by Sgo1 keeps the meiotic cohesin subunit Rec8 dephosphorylated, thereby
  protecting it from cleavage by separase at anaphase I, so that cohesion between sister
  centromeres persists until meiosis II and homologous chromosomes (rather than sisters)
  segregate at meiosis I. Centromeric recruitment of Sgo1 depends on Bub1 kinase (via
  phosphorylation of histone H2A at Ser121) and on direct binding to the heterochromatin
  protein Swi6 (HP1). Sgo1 is degraded after meiosis I in an anaphase-promoting-complex
  (ubiquitin)-dependent manner. It belongs to the conserved shugoshin/MEI-S332 family;
  the paralog Sgo2 acts predominantly in mitotic chromosome biorientation and tension
  sensing.
