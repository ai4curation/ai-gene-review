- id: PMID:37590302
  title: The AAA-ATPase Yta4/ATAD1 interacts with the mitochondrial divisome to inhibit
    mitochondrial fission.
  findings:
  - statement: >-
      Yta4 is the fission yeast homolog of budding yeast Msp1 and mammalian
      ATAD1, functioning as a membrane protein dislocase that clears
      mistargeted tail-anchored proteins from the mitochondrial outer membrane.
    supporting_text: >-
      the fission yeast AAA-ATPase Yta4, which is the homolog of budding
      yeast Msp1 responsible for clearing mistargeted tail-anchored (TA)
      proteins on mitochondria
  - statement: >-
      Deletion of yta4 causes mitochondrial fragmentation in a
      Dnm1-dependent manner, with enhanced fragmentation upon mitochondrial
      depolarization.
    supporting_text: >-
      The absence of Yta4 leads to mild mitochondrial fragmentation in a
      Dnm1-dependent manner but severe mitochondrial fragmentation upon
      induction of mitochondrial depolarization.
  - statement: >-
      Overexpression of Yta4 delocalizes the mitochondrial fission machinery
      components Fis1 and Mdv1 from mitochondria in an ATPase/translocase
      dependent manner.
    supporting_text: >-
      Overexpression of Yta4 delocalizes the receptor proteins of Dnm1,
      i.e., Fis1 (a TA protein) and Mdv1 (the bridging protein between
      Fis1 and Dnm1), from mitochondria
  - statement: >-
      Yta4 physically interacts with Fis1, Mdv1, and Dnm1, the three
      components of the mitochondrial divisome.
    supporting_text: >-
      Yta4 physically interacts with Fis1, Mdv1, and Dnm1, the 3 components
      of the mitochondrial divisome.
  - statement: >-
      Yta4 is a competitive inhibitor of the GTPase Dnm1, increasing its
      Km for GTP without affecting Vmax.
    supporting_text: >-
      Collectively, we concluded that Yta4 is a competitive inhibitor of
      Dnm1.
  - statement: >-
      Yta4 inhibits Dnm1 assembly into ring and spiral-like structures
      in vitro.
    supporting_text: >-
      the presence of His-Yta4(∆TM) significantly reduced the number of
      Dnm1 rings and spiral-like structures induced by GMP-PCP
core_functions:
- description: >-
    AAA-ATPase that functions as a membrane protein dislocase, extracting
    mislocalized tail-anchored proteins from the mitochondrial outer membrane.
    This is the conserved function of the ATAD1/Msp1 protein family. In
    S. pombe, overexpression of Yta4 removes the TA protein Fis1 from
    mitochondria in an ATPase- and translocase-dependent manner.
  supported_by:
  - reference_id: PMID:37590302
    supporting_text: >-
      Yta4 likely functions as a canonical dislocase to maintain the
      homeostasis of the TA protein Fis1 on the mitochondrial outer membrane
  molecular_function:
    id: GO:0140567
    label: membrane protein dislocase activity
- description: >-
    Inhibitor of excessive mitochondrial fission through direct interaction
    with the mitochondrial divisome. Yta4 competitively inhibits the GTPase
    activity of Dnm1 by reducing its affinity for GTP, competes with Dnm1
    for binding the adaptor Mdv1, and inhibits Dnm1 assembly. This prevents
    excessive mitochondrial fragmentation under both normal and stress
    conditions.
  supported_by:
  - reference_id: PMID:37590302
    supporting_text: >-
      Collectively, we concluded that Yta4 is a competitive inhibitor of
      Dnm1.
  - reference_id: PMID:37590302
    supporting_text: >-
      this study reveals an uncharacterized role of the conserved
      AAA-ATPase Yta4/ATAD1 in inhibiting excessive mitochondrial fission,
      which may be essential to maintain the fission-fusion balance of
      mitochondria under both normal and pathological conditions.
  molecular_function:
    id: GO:0005095
    label: GTPase inhibitor activity
