- term:
    id: GO:0140567
    label: membrane protein dislocase activity
  evidence_type: IMP
  original_reference_id: PMID:37590302
  review:
    summary: >-
      IMP annotation from He et al. 2023, who demonstrated that overexpression
      of wild-type Yta4 delocalizes the tail-anchored protein Fis1 from
      mitochondria, while ATP hydrolysis-deficient (EQ) and
      translocation-deficient (AA) mutants fail to do so. This confirms the
      translocase/dislocase activity is dependent on ATPase and translocation
      functions of Yta4.
    action: ACCEPT
    reason: >-
      Directly supported by mutant phenotype analysis in He et al. 2023.
      The dependence of Fis1 delocalization on ATPase and translocation
      activities confirms bona fide membrane protein dislocase function.
    supported_by:
    - reference_id: PMID:37590302
      supporting_text: >-
