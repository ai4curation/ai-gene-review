        translocation-deficient mutant Yta4(AA) failed to delocalize Fis1
        from mitochondria
- term:
    id: GO:0005095
    label: GTPase inhibitor activity
  evidence_type: EXP
  original_reference_id: PMID:37590302
  review:
    summary: >-
      EXP annotation from He et al. 2023. In vitro GTPase kinetics assays
      showed that purified Yta4 increases the Km of Dnm1 for GTP
      approximately 3-fold (at 5 uM) and 6-fold (at 10 uM) without affecting
      Vmax, demonstrating competitive inhibition. The authors concluded that
      Yta4 is a competitive inhibitor of Dnm1.
    action: ACCEPT
    reason: >-
      Directly demonstrated by in vitro biochemical assays with purified
      recombinant proteins. Yta4 acts as a competitive inhibitor of the GTPase
      Dnm1, reducing its affinity for GTP.
    supported_by:
    - reference_id: PMID:37590302
      supporting_text: >-
        In the presence of 5 μM and 10 μM His-Yta4(∆TM), the Km value of
        Dnm1 was increased approximately 3 and approximately 6-fold (3
        independent experiments), respectively, indicating that His-Yta4(∆TM)
        reduced the affinity of Dnm1 for GTP
    - reference_id: PMID:37590302
      supporting_text: >-
        Collectively, we concluded that Yta4 is a competitive inhibitor of
        Dnm1.
- term:
    id: GO:0090258
    label: negative regulation of mitochondrial fission
  evidence_type: EXP
  original_reference_id: PMID:37590302
  review:
    summary: >-
      EXP annotation from He et al. 2023. Deletion of yta4 leads to
      mitochondrial fragmentation in a Dnm1-dependent manner and enhances
      FCCP-induced fragmentation. Overexpression of Yta4 delocalizes
      mitochondrial fission machinery components. Yta4 inhibits Dnm1 GTPase
      activity and assembly in vitro. The authors conclude Yta4 constitutively
      prevents excessive mitochondrial fission.
    action: ACCEPT
    reason: >-
      This is a central finding of He et al. 2023, supported by multiple
      complementary approaches including genetic deletion, overexpression,
      and in vitro biochemical assays.
    supported_by:
    - reference_id: PMID:37590302
      supporting_text: >-
        The absence of Yta4 leads to mild mitochondrial fragmentation in a
        Dnm1-dependent manner but severe mitochondrial fragmentation upon
        induction of mitochondrial depolarization.
    - reference_id: PMID:37590302
      supporting_text: >-
        this study reveals an uncharacterized role of the conserved
        AAA-ATPase Yta4/ATAD1 in inhibiting excessive mitochondrial fission,
        which may be essential to maintain the fission-fusion balance of
        mitochondria under both normal and pathological conditions.
