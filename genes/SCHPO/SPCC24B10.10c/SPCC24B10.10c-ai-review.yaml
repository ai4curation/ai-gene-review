taxon:
  id: NCBITaxon:284812
  label: Schizosaccharomyces pombe (strain 972 / ATCC 24843)
description: >-
  SPCC24B10.10c encodes Yta4, a mitochondrial outer membrane AAA-ATPase and
  homolog of budding yeast Msp1 and mammalian ATAD1. Yta4 has dual roles: it
  functions as a membrane protein dislocase that extracts mislocalized
  tail-anchored proteins from the mitochondrial outer membrane, and it inhibits
  excessive mitochondrial fission by interacting with the mitochondrial divisome
  components Fis1, Mdv1, and Dnm1. Yta4 acts as a competitive inhibitor of the
  GTPase Dnm1, decreasing its affinity for GTP and blocking its assembly, thereby
  preventing excessive mitochondrial fragmentation.
existing_annotations:
- term:
    id: GO:0140570
    label: extraction of mislocalized protein from mitochondrial outer membrane
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      IBA annotation based on phylogenetic inference from orthologs including
      budding yeast Msp1 (SGD:S000003260) and human ATAD1 (UniProtKB:Q8NBU5).
      Yta4 is the fission yeast homolog of Msp1/ATAD1, which are established
      dislocases that clear mistargeted tail-anchored proteins from the
      mitochondrial outer membrane. He et al. (PMID:37590302) confirm that
      overexpression of Yta4 removes Fis1 (a TA protein) from mitochondria in
      an ATPase/translocase-dependent manner.
    action: ACCEPT
    reason: >-
      This is a well-supported conserved function of the ATAD1/Msp1 protein
      family. The IBA annotation is phylogenetically sound and experimentally
      supported in S. pombe by He et al. 2023.
    supported_by:
    - reference_id: PMID:37590302
      supporting_text: >-
        the fission yeast AAA-ATPase Yta4, which is the homolog of budding
        yeast Msp1 responsible for clearing mistargeted tail-anchored (TA)
        proteins on mitochondria
- term:
    id: GO:0005741
    label: mitochondrial outer membrane
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      IBA annotation for mitochondrial outer membrane localization, based on
      phylogenetic inference from orthologs Msp1 and ATAD1. Yta4 is an integral
      mitochondrial outer membrane protein containing a transmembrane domain.
      He et al. (PMID:37590302) describe Yta4 as acting at the mitochondrial
      outer membrane where it interacts with divisome components.
    action: ACCEPT
    reason: >-
      Yta4 is a transmembrane protein that functions at the mitochondrial outer
      membrane, consistent with the conserved localization of its orthologs
      Msp1 and ATAD1.
    supported_by:
    - reference_id: PMID:37590302
      supporting_text: >-
        Yta4 likely functions as a canonical dislocase to maintain the
        homeostasis of the TA protein Fis1 on the mitochondrial outer membrane
- term:
    id: GO:0005524
    label: ATP binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: >-
      IEA annotation from InterPro domain mapping (IPR003959, IPR003960 AAA
      ATPase domains). The protein contains a P-loop NTPase domain with a
      predicted ATP binding site at residues 132-139 (UniProt feature). He et al.
      (PMID:37590302) generated an ATP hydrolysis-deficient mutant Yta4(EQ)
      confirming the functional relevance of ATP binding.
    action: ACCEPT
    reason: >-
      ATP binding is an inherent property of this AAA-ATPase. The domain
      architecture and experimental mutant analysis both support this annotation.
    supported_by:
    - reference_id: PMID:37590302
      supporting_text: >-
        the ATP hydrolysis-deficient mutant Yta4(EQ) or the
        translocation-deficient mutant Yta4(AA) failed to delocalize Fis1
        from mitochondria
- term:
    id: GO:0005739
    label: mitochondrion
  evidence_type: IEA
  original_reference_id: GO_REF:0000044
  review:
    summary: >-
      IEA annotation based on UniProtKB subcellular location vocabulary mapping.
      UniProt records mitochondrial localization supported by PMID:16823372
