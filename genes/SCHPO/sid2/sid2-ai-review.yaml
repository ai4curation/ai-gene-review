id: Q09898
gene_symbol: sid2
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:284812
  label: Schizosaccharomyces pombe (strain 972 / ATCC 24843)
description: >-
  Sid2 is the NDR/LATS-family serine/threonine protein kinase (EC 2.7.11.1) that
  serves as the most downstream effector of the Septation Initiation Network (SIN),
  a Spg1-GTPase-regulated kinase cascade that controls the execution of cytokinesis
  in fission yeast. Sid2 functions as an obligate complex with its regulatory
  subunit Mob1, which is required for both its spindle pole body (SPB) localization
  and its kinase activity. Sid2-Mob1 resides at the SPB throughout the cell cycle
  and, at the end of anaphase, translocates to the cell-division site / actomyosin
  contractile ring, where Sid2 kinase activity peaks. There it triggers contractile
  ring constriction and septum formation by phosphorylating multiple substrates:
  the Cdc14-family phosphatase Clp1/Flp1 (creating 14-3-3/Rad24 binding sites that
  retain Clp1 in the cytoplasm), the cytokinetic formin Cdc12 (inhibiting its
  multimerization), the anillin-like protein Mid1 (driving it from the membrane at
  constriction onset), the SIN scaffold Cdc11 (a positive-feedback loop establishing
  SIN asymmetry), and the MOR-pathway kinase Nak1 (coordinating cytokinesis with
  cell separation). Independently of the rest of the SIN, Sid2-Mob1 also acts in G2
  to activate the NIMA-related kinase Fin1, modulating mitotic commitment through
  the Pom1/Cdr1/Cdr2-Wee1 axis. The SIN, including Sid2, is additionally required
  for forespore membrane and spore formation during meiosis.
