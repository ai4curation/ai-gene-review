proposed_new_terms: []
suggested_questions:
- question: |-
    What is the complete in vivo Sid2 substrate set across the cell cycle, and how
    is substrate selection spatially restricted between the SPB pool and the
    division-site pool of Sid2-Mob1?
- question: |-
    How is the G2-specific, SIN-independent Sid2-Mob1 activity that activates Fin1
    regulated, given that canonical SIN activation is restricted to anaphase?
suggested_experiments:
- experiment: |-
    Analog-sensitive (as) Sid2 kinase combined with quantitative phosphoproteomics
    and rapid kinase inhibition at defined cell-cycle stages to define the
    stage-specific Sid2 substrate repertoire and distinguish SPB vs division-site
    outputs.
- experiment: |-
    Optogenetic or anchor-away relocalization of Sid2-Mob1 to ectopic sites to test
    whether forced division-site targeting is sufficient to trigger ring constriction
    and septation independently of upstream SIN activation.
