- term:
    id: GO:0007096
    label: regulation of exit from mitosis
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: involved_in
  review:
    summary: |-
      This term is inferred phylogenetically from the budding yeast MEN orthologue
      Dbf2, which controls mitotic exit. In fission yeast the SIN (including Sid2)
      controls cytokinesis execution but NOT mitotic exit per se; Mob1/Sid2 are
      required for initiation of cytokinesis, not for mitotic exit. This is a
      classic over-propagation from the MEN to the functionally divergent SIN.
    action: MARK_AS_OVER_ANNOTATED
    reason: The fission yeast SIN controls cytokinesis, not exit from mitosis; this is an over-propagation from the budding yeast MEN orthologue.
    supported_by:
    - reference_id: PMID:10837231
      supporting_text: Mob1p associates with the Sid2p kinase and like Sid2p, Mob1p is required for the initiation of cytokinesis, but not for mitotic exit.
      reference_section_type: ABSTRACT
    - reference_id: PMID:22684255
      supporting_text: whereas the fission yeast equivalent, the septum initiation network (SIN), controls only the execution of cytokinesis.
      reference_section_type: ABSTRACT
