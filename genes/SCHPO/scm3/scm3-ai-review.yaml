- id: PMID:19217403
  title: Fission yeast Scm3 mediates stable assembly of Cnp1/CENP-A into centromeric
    chromatin.
  findings:
    - statement: Scm3 directly interacts with the CENP-A histone variant Cnp1 via
        its conserved N-terminal domain (first 194 amino acids), demonstrated by yeast
        two-hybrid and co-immunoprecipitation.
      supporting_text: We first investigated whether S. pombe Scm3 interacts with Cnp1
        using a yeast two-hybrid (Y2H) assay...Interactions in both bait and prey
        orientations were observed, while no interaction was detected between Scm3 and
        histone H4...Truncation analysis revealed that the first 194 amino acids of
        Scm3 (including the homology domain) are required for the interaction with
        Cnp1...Immunoblotting showed that only GST-Scm3 complexes contained Cnp1-GFP
      reference_section_type: RESULTS
      full_text_unavailable: false
    - statement: Scm3 self-associates in vivo, forming homodimers.
      supporting_text: The Y2H analysis also detected a robust Scm3-Scm3 interaction
        (Figure 1B), indicating that Scm3 self-associates in vivo.
      reference_section_type: RESULTS
      full_text_unavailable: false
    - statement: Scm3 localizes specifically to the central core domain (cnt/imr) of
        centromeres, colocalizing with Cnp1 and Mis12, as shown by microscopy and ChIP.
      supporting_text: A single nuclear Scm3-CFP focus was observed in the majority
        of live cells...The Scm3-CFP and Cnp1-GFP foci colocalized...The Scm3-FLAG and
        Mis18-FLAG immunoprecipitates were enriched at cnt1/imr1 but not at the dg
        motifs or the euchromatic lys1 probe
      reference_section_type: RESULTS
      full_text_unavailable: false
    - statement: Scm3 is essential for viability; scm3-null spores arrest after 1-2
        divisions.
      supporting_text: scm3Δ spores germinated and underwent 1 or 2 divisions before
        arresting growth
      reference_section_type: RESULTS
      full_text_unavailable: false
    - statement: Scm3 is required for centromeric localization of Cnp1/CENP-A; loss
        of Scm3 function abolishes Cnp1 centromeric foci without affecting Cnp1 protein
        levels.
      supporting_text: Cnp1 foci formation was reduced in the scm3-6 and scm3-19
        mutants at 20°C and abolished at 36°C...The abundance of Cnp1-GFP was unaffected
        in the scm3-ts mutants
      reference_section_type: RESULTS
      full_text_unavailable: false
    - statement: Scm3 localizes to centromeres independently of Cnp1, indicating it
        is not an integral nucleosome component but rather acts upstream of Cnp1
        deposition.
      supporting_text: Scm3-GFP foci were readily detected in cnp1-1 cells incubated
        at 36°C, although the frequency was somewhat reduced compared to wild type...These
        data indicate that Scm3 localization at centromeres is largely independent of
        Cnp1
      reference_section_type: RESULTS
      full_text_unavailable: false
    - statement: Scm3 centromere localization requires Mis6, Mis16, and Mis18, but
        not Mis12, placing it downstream of the Mis16-Mis18 complex in the CENP-A
        loading pathway.
      supporting_text: formation of Scm3-GFP foci was nearly abolished in the mis6,
        mis16 and mis18-ts mutants at 36°C...In contrast, Scm3-GFP foci were unaffected
        by the mis12-ts mutation
      reference_section_type: RESULTS
      full_text_unavailable: false
    - statement: Scm3 interacts with Mis16 via its C-terminal 141 amino acids, shown
        by yeast two-hybrid analysis.
      supporting_text: Scm3 and Mis16 showed a robust Y2H interaction using either
        orientation of plasmids on high-stringency selective medium...The C-terminal 141
        amino acids of Scm3 are required for interaction with Mis16
      reference_section_type: RESULTS
      full_text_unavailable: false
    - statement: Scm3 does not show a positive yeast two-hybrid interaction with
        Mis18 in this study; Mis18 supports Scm3 localization rather than a direct
        physical interaction in this assay.
      supporting_text: We did not observe a positive Y2H interaction between Scm3
        and Mis18 (Figure 5B), although we did find that Mis18 self-associates
      reference_section_type: RESULTS
      full_text_unavailable: false
    - statement: Scm3 dynamically dissociates from centromeres during mitosis (metaphase
        to early/mid-anaphase), similar to Mis16 and Mis18, while Cnp1 remains
        constitutively associated.
      supporting_text: Scm3 formed nuclear foci that colocalized with Mis12 in
        interphase cells. However, like Mis16 and Mis18, Scm3 foci were not detectable
        in cells during metaphase or early to mid-anaphase...the Scm3 signal is nearly
        abolished in the nda3-KM311 mutant at the restrictive temperature, whereas Cnp1
        enrichment is largely unchanged
      reference_section_type: RESULTS
      full_text_unavailable: false
    - statement: Loss of Scm3 or Mis18 function leads to replacement of Cnp1 by
        canonical histones H3 and H2A/H2B at the central centromere region, and
        increased histone H4 acetylation.
      supporting_text: The loss of Cnp1 at cnt1/imr1 in the scm3-ts and mis18-ts
        mutants was accompanied by a large increase in the H3 signal in these regions
      reference_section_type: RESULTS
      full_text_unavailable: false
    - statement: Scm3 is required for proper chromosome segregation; scm3 temperature-sensitive
        mutants show chromosome missegregation and minichromosome loss.
      supporting_text: chromosome segregation defects were observed in the scm3-ts
        mutants...The scm3-ts cells often failed to segregate their chromosomes equally
        following mitosis...there was an enhanced loss rate of minichromosome 16 in the
        scm3-ts mutants
      reference_section_type: RESULTS
      full_text_unavailable: false
- id: PMID:19217404
  title: 'Fission yeast Scm3: A CENP-A receptor required for integrity of subkinetochore
    chromatin.'
  findings:
    - statement: Scm3 co-affinity purifies with CENP-A/Cnp1 and associates with Cnp1
        in vitro, confirming direct physical interaction.
      supporting_text: Scm3(Sp) coaffinity purifies with CENP-A(Cnp1) and associates
        with CENP-A(Cnp1) in vitro
      reference_section_type: ABSTRACT
      full_text_unavailable: false
    - statement: Scm3 localizes to centromeres independently of intact CENP-A chromatin,
        supporting its role as a receptor rather than nucleosome component.
      supporting_text: Importantly, Scm3(Sp) coaffinity purifies with CENP-A(Cnp1) and
        associates with CENP-A(Cnp1) in vitro, yet localizes independently of intact
        CENP-A(Cnp1) chromatin and is differentially released from chromatin
      reference_section_type: ABSTRACT
      full_text_unavailable: false
    - statement: Scm3 depends on Mis16/Mis18 for centromere localization and is recruited
        to centromeres in late anaphase.
      supporting_text: Scm3(Sp) depends on Mis16/18 for its centromere localization
        and like them is recruited to centromeres in late anaphase
      reference_section_type: ABSTRACT
      full_text_unavailable: false
    - statement: Scm3 is proposed to act as a CENP-A receptor/assembly factor cooperating
        with Mis16 and Mis18 to receive CENP-A from the Sim3 escort and mediate chromatin
        assembly.
      supporting_text: we favor a model in which Scm3(Sp) acts as a CENP-A(Cnp1) receptor/assembly
        factor, cooperating with Mis16 and Mis18 to receive CENP-A(Cnp1) from the Sim3
        escort and mediate assembly of CENP-A(Cnp1) into subkinetochore chromatin
      reference_section_type: ABSTRACT
      full_text_unavailable: false
    - statement: Scm3 interacts with Mis16 (IPI with PomBase:SPCC970.12) and Cnp1
        (IPI with PomBase:SPBC1105.17) shown by co-immunoprecipitation.
      supporting_text: >-
        Scm3(Sp) coaffinity purifies with CENP-A(Cnp1) and associates with
        CENP-A(Cnp1) in vitro...Scm3(Sp) depends on Mis16/18 for its
        centromere localization
      reference_section_type: RESULTS
      full_text_unavailable: false
- id: PMID:26275423
  title: Inner Kinetochore Protein Interactions with Regional Centromeres of Fission
    Yeast.
  findings:
    - statement: Scm3 is highly enriched throughout the centromeric central domain by
        ChIP-seq, similar to CENP-A, CENP-C, CENP-T, and CENP-I, except at tRNA genes.
      supporting_text: Inner kinetochore proteins CENP-A, CENP-C, CENP-T, CENP-I, and
        Scm3 are highly enriched throughout the central domain except at tRNA genes, with
        no evidence for preferred kinetochore assembly sites
      reference_section_type: ABSTRACT
      full_text_unavailable: false
    - statement: Scm3 is weakly enriched and less stably incorporated in H3-rich
        heterochromatin outer repeats compared to the central domain.
      supporting_text: These proteins are weakly enriched and less stably incorporated
        in H3-rich heterochromatin
      reference_section_type: ABSTRACT
      full_text_unavailable: false
- id: PMID:38084929
  title: The cysteine-rich domain in CENP-A chaperone Scm3HJURP ensures centromere
    targeting and kinetochore integrity.
  findings:
    - statement: The C-terminal cysteine-rich domain (CYS) of Scm3 binds zinc in vitro
        and is essential for centromere localization and function.
      supporting_text: we find that CYS binds zinc in vitro and is essential for the
        localization and function of fission yeast Scm3
      reference_section_type: ABSTRACT
      full_text_unavailable: false
    - statement: Disrupting CYS by deletion or point mutations in the zinc-binding motif
        prevents Scm3 centromere localization and compromises kinetochore integrity.
      supporting_text: Disrupting CYS by deletion or introduction of point mutations
        within its zinc-binding motif prevents Scm3 centromere localization and compromises
        kinetochore integrity
      reference_section_type: ABSTRACT
      full_text_unavailable: false
    - statement: CYS alone can localize to the centromere weakly, and its targeting is
        greatly enhanced when combined with the Mis16-binding domain (Mis16-BD).
      supporting_text: CYS alone can localize to the centromere, albeit weakly, but its
        targeting is greatly enhanced when combined with Mis16-BD
      reference_section_type: ABSTRACT
      full_text_unavailable: false
    - statement: CYS binds centromeric DNA, providing additional anchoring of Scm3 to
        centromeres independent of Mis16-BD.
      supporting_text: we provide evidence that CYS binds centromeric DNA and can itself
        localize to the centromere
      reference_section_type: DISCUSSION
      full_text_unavailable: false
    - statement: Overexpression of truncated Scm3 containing Mis16-BD and CYS but lacking
        the CENP-A binding domain causes toxicity, chromosome missegregation, and
        kinetochore loss.
      supporting_text: Expressing a truncated protein containing both Mis16-BD and CYS,
        but lacking the CENP-A binding domain, causes toxicity and is accompanied by
        considerable chromosome missegregation and kinetochore loss
      reference_section_type: ABSTRACT
      full_text_unavailable: false
