id: Q9HDY7
gene_symbol: scm3
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:284812
  label: Schizosaccharomyces pombe (strain 972 / ATCC 24843)
description: >-
  Scm3 is the dedicated CENP-A/Cnp1 histone chaperone in S. pombe, orthologous
  to human HJURP. It mediates the stable deposition of the centromere-specific
  histone H3 variant Cnp1/CENP-A into centromeric chromatin, which is essential
  for kinetochore assembly and chromosome segregation. Scm3 contains an
  N-terminal CENP-A binding domain, a Mis16-binding domain, and a C-terminal
  cysteine-rich zinc-binding domain required for centromere targeting. It acts
  downstream of the Mis16-Mis18 complex and dynamically dissociates from
  centromeres during mitosis.
existing_annotations:
- term:
    id: GO:0005634
    label: nucleus
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  review:
    summary: >-
      Correct but non-specific. Scm3 localizes to the nucleus, confirmed by
      HDA evidence (PMID:16823372) and fluorescence microscopy showing nuclear
      foci (PMID:19217403). However, the more informative localization is to
      centromeric chromatin (GO:0034506).
    action: KEEP_AS_NON_CORE
- term:
    id: GO:0005737
    label: cytoplasm
  evidence_type: IEA
  original_reference_id: GO_REF:0000044
  review:
    summary: >-
      Scm3 was detected in the cytoplasm/cytosol in the large-scale
      localization study (PMID:16823372). However, the primary functional
      localization is nuclear/centromeric. Cytoplasmic localization may
      reflect the pool of Scm3 before nuclear import or during mitotic
      dissociation from centromeres.
    action: KEEP_AS_NON_CORE
- term:
    id: GO:0042393
    label: histone binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: >-
      Scm3 specifically binds the CENP-A histone variant Cnp1 via its
      N-terminal domain (PMID:19217403). It does not bind canonical histone
      H3 or H4 (no interaction detected in Y2H). The term histone binding
      is technically correct but too general; the histone chaperone activity
      annotation (GO:0140713) better captures the functional specificity.
    action: KEEP_AS_NON_CORE
- term:
    id: GO:0046982
    label: protein heterodimerization activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: >-
      Likely derived from the InterPro histone-fold domain annotation. While
      Scm3 does interact with Cnp1/CENP-A and self-associates (PMID:19217403),
      its mechanism of action is as a histone chaperone, not as a classical
      histone-fold heterodimerization partner. The S. pombe Scm3 is not an
      integral nucleosome component. This annotation is misleading.
    action: MARK_AS_OVER_ANNOTATED
- term:
    id: GO:0000785
    label: chromatin
  evidence_type: IDA
  original_reference_id: PMID:19217404
  review:
    summary: >-
      Scm3 associates with centromeric chromatin as shown by ChIP and
      biochemical fractionation (PMID:19217404). While not incorrect, this
      is less informative than the more specific annotation to centromeric
      core domain (GO:0034506), which is also annotated with IDA evidence
      from the same paper. Keeping as non-core since the specific term
      is preferred.
    action: KEEP_AS_NON_CORE
- term:
    id: GO:0008270
    label: zinc ion binding
  evidence_type: IDA
  original_reference_id: PMID:38084929
  review:
    summary: >-
      The C-terminal cysteine-rich domain (CYS) of Scm3 binds zinc in vitro,
      demonstrated by direct biochemical assays (PMID:38084929). Point mutations
      in the zinc-binding motif abolish centromere localization and compromise
      kinetochore integrity, indicating functional significance. Well-supported.
    action: ACCEPT
    supported_by:
      - reference_id: PMID:38084929
        supporting_text: >-
          we find that CYS binds zinc in vitro and is essential for the
          localization and function of fission yeast Scm3
- term:
    id: GO:0140713
    label: histone chaperone activity
  evidence_type: NAS
  original_reference_id: GO_REF:0000051
  review:
    summary: >-
      Histone chaperone activity is the core molecular function of Scm3. This
      NAS annotation from PomBase keyword mapping is correct and consistent
      with the EXP annotation from PMID:19217404. Both support the core
      function.
    action: ACCEPT
- term:
    id: GO:0034080
    label: CENP-A containing chromatin assembly
  evidence_type: IMP
  original_reference_id: PMID:19217403
  review:
    summary: >-
      Core biological process annotation. scm3 temperature-sensitive mutants
      lose Cnp1/CENP-A from centromeres without affecting Cnp1 protein levels,
      and canonical histones H3/H2A/H2B invade centromeric chromatin
      (PMID:19217403). This directly demonstrates Scm3 is required for
      CENP-A chromatin assembly.
    action: ACCEPT
    supported_by:
      - reference_id: PMID:19217403
        supporting_text: >-
          Cnp1 foci formation was reduced in the scm3-6 and scm3-19 mutants at
          20°C and abolished at 36°C...The abundance of Cnp1-GFP was unaffected
          in the scm3-ts mutants
- term:
    id: GO:0034080
    label: CENP-A containing chromatin assembly
  evidence_type: IMP
