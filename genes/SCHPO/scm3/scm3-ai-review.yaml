- term:
    id: GO:0034506
    label: chromosome, centromeric core domain
  evidence_type: IDA
  original_reference_id: PMID:19217404
  review:
    summary: >-
      Core localization annotation. Pidoux et al. show Scm3 localizes to the
      centromeric central domain by ChIP, colocalizing with CENP-A/Cnp1
      (PMID:19217404). Scm3 is differentially released from chromatin
