core_functions:
- description: >-
    CENP-A/Cnp1-specific histone chaperone that mediates the deposition of
    the centromere-specific histone H3 variant Cnp1 into centromeric chromatin.
    Scm3 binds Cnp1 via its N-terminal domain, is recruited to centromeres
    by the Mis16-Mis18 complex, and uses its zinc-binding CYS domain for
    centromere targeting. Essential for kinetochore integrity and chromosome
    segregation.
  molecular_function:
    id: GO:0140713
    label: histone chaperone activity
  directly_involved_in:
    - id: GO:0034080
      label: CENP-A containing chromatin assembly
  locations:
    - id: GO:0034506
      label: chromosome, centromeric core domain
  supported_by:
    - reference_id: file:SCHPO/scm3/scm3-deep-research-falcon.md
      supporting_text: >-
        Scm3 is the dedicated CENP-A/Cnp1 assembly factor required for stable
        enrichment/deposition of Cnp1 at the centromeric central domain.
