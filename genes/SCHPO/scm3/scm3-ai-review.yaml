    action: ACCEPT
    supported_by:
      - reference_id: PMID:19217404
        supporting_text: >-
          Scm3(Sp) coaffinity purifies with CENP-A(Cnp1) and associates with
          CENP-A(Cnp1) in vitro
- term:
    id: GO:0005515
    label: protein binding
  evidence_type: IPI
  original_reference_id: PMID:19217404
  review:
    summary: >-
      Too vague per curation guidelines. PMID:19217404 shows Scm3 interacts
      with Cnp1/CENP-A (co-affinity purification) and Mis16 (co-IP). These
      are specific functional interactions better captured by histone chaperone
      activity (GO:0140713) which is already annotated with EXP evidence from
      the same paper. Protein binding adds no informational value.
    action: MODIFY
    proposed_replacement_terms:
