    label: histone chaperone activity
  evidence_type: EXP
  original_reference_id: PMID:19217404
  review:
    summary: >-
      Core molecular function annotation with strong experimental evidence.
      Scm3 directly binds CENP-A/Cnp1 and mediates its deposition into
