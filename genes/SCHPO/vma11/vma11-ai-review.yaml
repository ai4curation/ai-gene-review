id: Q9URZ8
gene_symbol: vma11
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:284812
  label: Schizosaccharomyces pombe (strain 972 / ATCC 24843)
description: >-
  V-type proton ATPase subunit c' (proteolipid subunit 2), a core component of the
  membrane-integral V0 domain of the vacuolar H+-ATPase (V-ATPase). Vma11 is one of
  three related but non-redundant proteolipid subunits (c, c', c'') that assemble into
  the decameric c-ring forming the proton-conducting pore of the V0 sector. The c-ring
  is composed of eight copies of subunit c (Vma3), one copy of c' (Vma11), and one copy
  of c'' (Vma16). The protein contains four transmembrane helices and a conserved
  glutamic acid residue (Glu140) essential for proton translocation. V-ATPase couples
  ATP hydrolysis in the peripheral V1 domain to proton transport across the vacuolar
  membrane, acidifying the vacuolar lumen. This function is critical for vacuolar
  acidification, protein sorting, and ion homeostasis. All functional annotations for
  S. pombe vma11 are inferred from the well-characterized S. cerevisiae ortholog VMA11
  (UniProtKB:P32842, SGD:S000006155).
existing_annotations:
- term:
    id: GO:0016020
    label: membrane
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      IBA annotation placing vma11 in 'membrane'. Vma11 is a multi-pass integral
      membrane protein with four predicted transmembrane helices (UniProt feature
      annotations). The term is correct but very general; a more specific localization
      to vacuolar membrane is supported by ortholog data. However, IBA annotations
      are phylogenetically informed and the broader term is acceptable at this level.
    action: ACCEPT
    reason: >-
      Vma11 is unambiguously an integral membrane protein. While vacuolar membrane
      would be more specific, the IBA annotation at the 'membrane' level is correct
      and phylogenetically supported across the diverse orthologs used for inference.

- term:
    id: GO:0000324
    label: fungal-type vacuole
  evidence_type: IEA
  original_reference_id: GO_REF:0000117
  review:
    summary: >-
      IEA annotation from ARBA machine learning placing vma11 in the fungal-type
      vacuole. This is consistent with V-ATPase localization to the vacuolar membrane
      in fungi (UniProt subcellular location annotation by similarity to P32842).
    action: ACCEPT
    reason: >-
      V-ATPase subunits localize to the vacuolar membrane in yeast, and by extension
      to the fungal-type vacuole compartment. This is consistent with UniProt
      subcellular location annotation.

- term:
    id: GO:0005774
    label: vacuolar membrane
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  review:
    summary: >-
      IEA annotation placing vma11 at the vacuolar membrane. UniProt annotates
      subcellular location as 'Vacuole membrane' by similarity to P32842. This is
      the expected localization for a V0 proteolipid subunit.
    action: ACCEPT
    reason: >-
      Vacuolar membrane localization is well established for V-ATPase V0 proteolipid
      subunits and is consistent with UniProt subcellular location annotation.

- term:
    id: GO:0015078
    label: proton transmembrane transporter activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: >-
      IEA annotation from InterPro (IPR002379, ATPase proteolipid c-like domain)
      assigning proton transmembrane transporter activity. Vma11 is part of the
      proton-conducting c-ring and contains the essential glutamic acid residue
      (Glu140) for proton translocation. However, individual proteolipid subunits
      do not independently enable proton transport; they contribute to it as part
      of the assembled V0 complex. The qualifier should ideally be 'contributes_to'
      rather than 'enables'.
    action: ACCEPT
    reason: >-
      The proton transmembrane transporter activity annotation is essentially correct
      for the c-ring proteolipid. The subunit contains the critical proton-binding
      glutamic acid residue and directly participates in proton translocation.
      While technically it contributes to this activity as part of the V0 complex,
      the annotation at this level is standard practice for V-ATPase proteolipid subunits.
    supported_by:
      - reference_id: PMID:9030535
        supporting_text: >-
          these results suggest that the three proteolipid subunits have similar but not
          redundant functions, each of which is most likely involved in proton transport
          activity of the enzyme complex

- term:
    id: GO:0033177
    label: proton-transporting two-sector ATPase complex, proton-transporting domain
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: >-
      IEA annotation from InterPro placing vma11 in the proton-transporting domain
      of a two-sector ATPase. This is correct: vma11 is a component of the V0
      (proton-transporting) domain. However, a more specific term exists
      (GO:0033179 'proton-transporting V-type ATPase, V0 domain') that is also
      annotated.
    action: ACCEPT
    reason: >-
      The annotation is correct. Vma11 is a proteolipid subunit of the V0
      (proton-transporting) domain. This is the parent of the more specific
      GO:0033179 term also annotated, and both are acceptable.

- term:
    id: GO:0033179
    label: proton-transporting V-type ATPase, V0 domain
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: >-
      IEA annotation from InterPro (IPR000245, IPR011555) placing vma11 in the
      V-type ATPase V0 domain. This is the correct specific complex component for
      a proteolipid subunit of the V0 sector.
    action: ACCEPT
    reason: >-
      Vma11 is a core structural component of the V0 domain c-ring. This is
      well-established from studies in S. cerevisiae where the ortholog P32842
      is experimentally verified as a V0 component.

- term:
    id: GO:0046961
    label: proton-transporting ATPase activity, rotational mechanism
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: >-
      IEA annotation from InterPro assigning rotational mechanism ATPase activity.
      The V-ATPase operates by a rotational mechanism, and the c-ring proteolipid
      subunits are essential components of the rotor. However, individual
      proteolipid subunits do not have ATPase activity on their own; ATPase
      activity resides in the V1 domain catalytic subunits. The proteolipids
      contribute to the overall rotational ATPase activity of the holoenzyme.
    action: ACCEPT
    reason: >-
      While ATP hydrolysis occurs in the V1 domain, the proteolipid c-ring is
      an essential functional component of the rotational ATPase mechanism.
      This annotation is standard for V-ATPase subunits and is duplicated
      by the ISO annotation below.

- term:
    id: GO:1902600
    label: proton transmembrane transport
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  review:
    summary: >-
      IEA annotation for involvement in proton transmembrane transport. This is
      the core biological process of the V-ATPase, and Vma11 as a proton-conducting
      c-ring subunit is directly involved.
    action: ACCEPT
    reason: >-
      Proton transmembrane transport is the fundamental biological process
      carried out by the V-ATPase complex, and Vma11 is a direct participant
      via the proton-conducting c-ring.

- term:
    id: GO:0016887
    label: ATP hydrolysis activity
  evidence_type: IC
  original_reference_id: GO_REF:0000111
  review:
    summary: >-
      IC annotation from PomBase inferring ATP hydrolysis activity. The V-ATPase
      complex as a whole hydrolyzes ATP, but this catalytic activity resides in
      the V1 A and B subunits, not in the V0 proteolipid subunits. Vma11 is part
      of the proton-transporting rotor, not the catalytic sector. This is an
      over-annotation for a V0 proteolipid subunit.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      ATP hydrolysis is catalyzed by the A and B subunits of the V1 domain.
      The V0 proteolipid subunit c' does not independently hydrolyze ATP;
      it forms part of the proton-translocating c-ring. While the V-ATPase
      complex couples ATP hydrolysis to proton transport, attributing ATP
      hydrolysis activity directly to a proteolipid subunit is misleading.
      The qualifier 'contributes_to' might be more appropriate if retained.

- term:
    id: GO:0000329
    label: fungal-type vacuole membrane
  evidence_type: IC
  original_reference_id: GO_REF:0000111
  review:
    summary: >-
      IC annotation from PomBase for localization to fungal-type vacuole membrane.
      This is the most specific and accurate cellular component annotation for
      this protein in S. pombe. UniProt annotates subcellular location as
      'Vacuole membrane' by similarity.
    action: ACCEPT
    reason: >-
      Fungal-type vacuole membrane is the precise localization for S. pombe
      V-ATPase V0 subunits and is the most specific CC term in the annotation set.

- term:
    id: GO:0046961
    label: proton-transporting ATPase activity, rotational mechanism
  evidence_type: ISO
  original_reference_id: GO_REF:0000024
  review:
    summary: >-
      ISO annotation transferred from S. cerevisiae ortholog VMA11 (SGD:S000006155)
      for proton-transporting ATPase activity via rotational mechanism. The
      S. cerevisiae VMA11 gene product has been experimentally demonstrated to be
      essential for V-ATPase activity (PMID:1837023, PMID:9030535). Same
      considerations as the IEA annotation above regarding the qualifier.
    action: ACCEPT
    reason: >-
      This annotation is well supported by experimental evidence from the
      S. cerevisiae ortholog. The proteolipid c' subunit is an essential
      functional component of the rotational ATPase mechanism.

- term:
    id: GO:0000220
    label: vacuolar proton-transporting V-type ATPase, V0 domain
  evidence_type: ISO
  original_reference_id: GO_REF:0000024
  review:
    summary: >-
      ISO annotation transferred from S. cerevisiae ortholog VMA11 (SGD:S000006155)
      placing vma11 in the vacuolar V-type ATPase V0 domain. This is more specific
      than GO:0033179 as it specifies vacuolar localization. Well supported by
      experimental data from S. cerevisiae.
    action: ACCEPT
    reason: >-
      The vacuolar V-ATPase V0 domain is the correct and most specific complex
      component annotation. S. cerevisiae VMA11 has been experimentally verified
      as a component of the vacuolar V-ATPase V0 sector.

- term:
    id: GO:1902600
    label: proton transmembrane transport
  evidence_type: IC
  original_reference_id: GO_REF:0000111
  review:
    summary: >-
      IC annotation from PomBase for involvement in proton transmembrane transport,
      inferred from V0 domain membership (GO:0000220). This is the core biological
      process of V-ATPase and vma11 directly participates via the c-ring.
    action: ACCEPT
    reason: >-
      Proton transmembrane transport is the central biological process for
      the V-ATPase complex. The c' proteolipid subunit directly participates
      in proton translocation through the c-ring, making this a core annotation.

references:
- id: GO_REF:0000002
  title: Gene Ontology annotation through association of InterPro records with GO terms
  findings:
  - statement: >-
      InterPro domains IPR002379, IPR000245, and IPR011555 map to V-ATPase
      proteolipid function and V0 domain membership, providing the basis for
      IEA annotations of proton transport activity and V0 complex membership.
- id: GO_REF:0000024
  title: Manual transfer of experimentally-verified manual GO annotation data to
    orthologs by curator judgment of sequence similarity
  findings:
  - statement: >-
      Annotations transferred from S. cerevisiae VMA11 (SGD:S000006155, UniProtKB:P32842),
      which has been experimentally characterized as a V0 proteolipid subunit essential
      for V-ATPase activity. VMA11 encodes a proteolipid with four transmembrane
      segments and a critical glutamic acid residue required for proton translocation.
- id: GO_REF:0000033
  title: Annotation inferences using phylogenetic trees
  findings:
  - statement: >-
      Phylogenetic analysis places S. pombe vma11 within the V-ATPase proteolipid
      family, supporting membrane localization annotation via IBA.
- id: GO_REF:0000111
  title: Gene Ontology annotations Inferred by Curator (IC) using at least one
    Inferred by Sequence Similarity (ISS) annotation to support the inference
  findings:
  - statement: >-
      PomBase curators inferred fungal-type vacuole membrane localization, ATP
      hydrolysis activity, and proton transmembrane transport based on ISO
      annotations to V0 domain complex membership.
- id: GO_REF:0000117
  title: Electronic Gene Ontology annotations created by ARBA machine learning models
  findings:
  - statement: >-
      ARBA model ARBA00033928 predicts fungal-type vacuole localization for
      V-ATPase proteolipid subunits.
- id: GO_REF:0000120
  title: Combined Automated Annotation using Multiple IEA Methods
  findings:
  - statement: >-
      Combined evidence from ARBA and InterPro mappings supports vacuolar membrane
      localization and proton transmembrane transport annotations.
- id: PMID:9030535
  title: VMA11 and VMA16 encode second and third proteolipid subunits of the
    Saccharomyces cerevisiae vacuolar membrane H+-ATPase
  findings:
  - statement: >-
      Established that VMA11 and VMA16 encode distinct proteolipid subunits (c' and
      c'') of the V-ATPase V0 domain, each containing a functionally important
      glutamic acid residue required for proton transport. The three proteolipid
      subunits have similar but non-redundant functions.
    supporting_text: >-
      these results suggest that the three proteolipid subunits have similar but not
      redundant functions, each of which is most likely involved in proton transport
      activity of the enzyme complex
  - statement: >-
      Vma11p and Vma16p were demonstrated to be essential subunits of V-ATPase,
      localized to the vacuolar membrane and copurifying with the V-ATPase complex.
    supporting_text: >-
      Epitope-tagged Vma11p and Vma16p were detected on the vacuolar membrane by
      immunofluorescence microscopy. Density gradient fractionation of the
      solubilized vacuolar proteins demonstrated that the tagged proteins copurified
      with the V-ATPase complex. We conclude that Vma11p and Vma16p are essential
      subunits of the V-ATPase
  - statement: >-
      Mutational analysis revealed that Vma11p Glu145 is functionally essential for
      proton transport, analogous to Vma3p Glu137.
    supporting_text: >-
      Mutational analysis of Vma11p and Vma16p revealed that both proteins contain a
      glutamic acid residue (Vma11p Glu145 and Vma16p Glu108) functionally similar
      to Vma3p Glu137. These residues could only be functionally substituted by an
      aspartic acid residue, because other mutations we examined inactivated the
      enzyme activity
- id: PMID:1837023
  title: VMA11, a novel gene that encodes a putative proteolipid, is indispensable
    for expression of yeast vacuolar membrane H(+)-ATPase activity
  findings:
  - statement: >-
      Original identification and characterization of VMA11 in S. cerevisiae,
      demonstrating it is indispensable for V-ATPase activity and vacuolar
      acidification.
    supporting_text: >-
      A gene, VMA11, is indispensable for expression of the vacuolar membrane
      H(+)-ATPase activity in the yeast Saccharomyces cerevisiae
  - statement: >-
      VMA11 encodes a hydrophobic proteolipid homologous to VMA3 (subunit c),
      but the two gene products are functionally independent.
    supporting_text: >-
      The nucleotide sequence of the gene predicts a hydrophobic proteolipid of
      164 amino acids with a calculated molecular mass of 17,037 daltons. The
      deduced amino acid sequence shows 56.7% identity, and significant coincidence
      in amino acid composition with the 16-kDa subunit c (a VMA3 gene product) of
      the yeast vacuolar membrane H(+)-ATPase. VMA11 and VMA3 on a multicopy
      plasmid did not suppress the vma3 and vma11 mutation, respectively,
      suggesting functional independence of the two gene products

core_functions:
- description: >-
    Proton-conducting pore component of the vacuolar V-ATPase V0 domain. Vma11
    (subunit c') is one of three non-redundant proteolipid subunits that assemble
    into the decameric c-ring, which rotates to translocate protons across the
    vacuolar membrane. The c-ring consists of eight copies of Vma3 (subunit c),
    one copy of Vma11 (subunit c'), and one copy of Vma16 (subunit c''). Vma11
    contains a conserved glutamic acid (Glu140) essential for proton binding and
    translocation. The V-ATPase couples ATP hydrolysis in the V1 sector to proton
    transport, acidifying the vacuolar lumen for protein sorting, ion homeostasis,
    and degradative functions.
  molecular_function:
    id: GO:0015078
    label: proton transmembrane transporter activity
  contributes_to_molecular_function:
    id: GO:0046961
    label: proton-transporting ATPase activity, rotational mechanism
  directly_involved_in:
    - id: GO:1902600
      label: proton transmembrane transport
  locations:
    - id: GO:0000329
      label: fungal-type vacuole membrane
  in_complex:
    id: GO:0000220
    label: vacuolar proton-transporting V-type ATPase, V0 domain
