id: Q9HDX8
gene_symbol: alo1
taxon:
  id: uniprot:SCHPO
  label: SCHPO
status: COMPLETE
description: SFT model incorrectly predicts L-gulonolactone oxidase and L-ascorbic acid
  biosynthesis for alo1, which is a D-arabinono-1,4-lactone oxidase (GO:0003885) at the
  mitochondrial outer membrane; mitochondrion prediction is CNN and correct.
references:
- id: doi:10.64898/2026.03.19.712954
  title: BioReason-Pro (Fallahpour et al. 2026)
predictions:
- source_method: BioReason-Pro-SFT
  source_version: wanglab/protein_catalogue
  source_reference_id: doi:10.64898/2026.03.19.712954
  predicted_term:
    id: GO:0050105
    label: L-gulonolactone oxidase activity
  predicted_term_type: GO_MF
  review:
    assessment: NPI
    confidence_score: 0
    error_type: PARALOG_OVERANNOTATION
    summary: Incorrect. alo1 encodes D-arabinono-1,4-lactone oxidase (GO:0003885), which
      catalyzes the final step of D-erythroascorbic acid biosynthesis in S. pombe using
      D-arabinono-1,4-lactone as substrate. L-gulonolactone oxidase catalyzes the analogous
      reaction in vertebrate L-ascorbic acid synthesis using a different substrate (L-gulonolactone).
      GOA contains GO:0003885 (D-arabinono-1,4-lactone oxidase activity, IBA and IEA, ACCEPT in
      AIGR) as the core MF. The prediction confuses the L-ascorbic acid pathway enzyme with the
      evolutionary parallel D-erythroascorbic acid pathway enzyme in fungi.

- source_method: BioReason-Pro-SFT
  source_version: wanglab/protein_catalogue
  source_reference_id: doi:10.64898/2026.03.19.712954
  predicted_term:
    id: GO:0019853
    label: L-ascorbic acid biosynthetic process
  predicted_term_type: GO_BP
  review:
    assessment: NPI
    confidence_score: 0
    error_type: PARALOG_OVERANNOTATION
    summary: Incorrect. S. pombe produces D-erythroascorbic acid (via D-arabinono-1,4-lactone),
      not L-ascorbic acid. GOA contains GO:0070485 (dehydro-D-arabinono-1,4-lactone biosynthetic
      process, ISO, ACCEPT in AIGR) as the relevant biosynthetic process. The model confuses the
      fungal D-erythroascorbic acid pathway with the metazoan L-ascorbic acid pathway, which use
      similar enzyme folds but different substrates and products.

- source_method: BioReason-Pro-SFT
  source_version: wanglab/protein_catalogue
