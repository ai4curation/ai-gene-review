  predicted_term:
    id: GO:0005739
    label: mitochondrion
  predicted_term_type: GO_CC
  review:
    assessment: CNN
    confidence_score: 2
    summary: In GOA with two independent lines of evidence (IBA from GO_REF:0000033, and HDA
      from PMID:16823372, both is_active_in). The AIGR review accepts mitochondrial localization,
      and more specifically identifies the mitochondrial outer membrane (GO:0005741) as the active
      compartment. Mitochondrion is LSP relative to mitochondrial outer membrane in GOA, but the
      prediction is correct and not novel at the broad level.
