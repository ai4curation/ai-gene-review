      label: glycolytic process
    evidence_type: IBA
    original_reference_id: GO_REF:0000033
    review:
      summary: |-
        Glycolytic process is the core biological process for this GAPDH.
        Gpd3 is the minor isoform but provides backup glycolytic capacity:
        tdh1-null cells are viable because gpd3 is present and supplies GAPDH
        activity (PMID:18406331). gpd3 is strongly induced under phosphate
        starvation (~75-fold mRNA), supporting an adaptive role in maintaining
        glycolytic flux. (As a freely reversible enzyme, GAPDH also acts in
        gluconeogenesis - UniProt/Reactome R-SPO-70263 - though the GO BP
        annotation here is for the glycolytic direction.)
      action: ACCEPT
      supported_by:
        - reference_id: PMID:18406331
          supporting_text: |-
            Haploid Δ tdh1 cells were viable in the glucose growth media, because S. pombe has gpd3 + , a second GAPDH gene expressed at a much lower level than tdh1 +
        - reference_id: file:SCHPO/gpd3/gpd3-deep-research-falcon.md
          supporting_text: |-
            including **gpd3 mRNA ~75-fold** and **tdh1 mRNA ~10-fold**, alongside a **~12-fold increase** in intracellular **Gpd3 protein** abundance in proteomics
