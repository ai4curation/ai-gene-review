id: O43026
gene_symbol: gpd3
taxon:
  id: NCBITaxon:4896
  label: Schizosaccharomyces pombe
description: |-
  Gpd3 is the minor isoform of glyceraldehyde-3-phosphate dehydrogenase
  (GAPDH 2; EC 1.2.1.12) in S. pombe, catalyzing the NAD+-dependent oxidative
  phosphorylation of glyceraldehyde-3-phosphate to 1,3-bisphosphoglycerate, the
  sixth step of glycolysis. Its paralog Tdh1 (~93% identical) handles bulk
  glycolytic flux: Tdh1 is >200-fold more abundant than Gpd3 and provides >90%
  of total cellular GAPDH activity. gpd3 is strongly induced by phosphate
  starvation (mRNA ~75-fold; protein ~12-fold), consistent with a compensatory
  role in sustaining glycolytic flux under nutrient stress rather than purely
  constitutive housekeeping. The moonlighting functions described for fission
  yeast GAPDH - peroxide-stress signaling through the Mcs4/Sty1 MAPK phosphorelay
  (PMID:18406331) and association with RNA polymerase II via Rpb7 (PMID:15620689)
  - were demonstrated for the dominant Tdh1 isoform or for "GAPDH" generically;
  Gpd3 only complements the Tdh1 signaling defect when artificially overexpressed.
  These non-glycolytic roles are therefore NOT attributed to endogenous Gpd3 here.
  Gpd3 is extensively phosphorylated and is widely used as an RT-qPCR reference gene.
existing_annotations:
  - term:
      id: GO:0004365
      label: glyceraldehyde-3-phosphate dehydrogenase (NAD+) (phosphorylating) 
        activity
    evidence_type: IBA
    original_reference_id: GO_REF:0000033
    review:
      summary: |-
        Core enzymatic function, well-supported. Catalyzes the sixth reaction of
        glycolysis (EC 1.2.1.12), the NAD+-dependent oxidative phosphorylation of
        G3P to 1,3-bisphosphoglycerate. UniProt documents the catalytic Rhea
        reaction (RHEA:10300), active-site Cys-152 (nucleophile), and NAD+-binding
        residues. Gpd3 is ~93% identical to its paralog Tdh1 (whose catalytic
        Cys-152 is well characterized). This GAPDH activity is the core molecular
        function of the gene.
      action: ACCEPT
      supported_by:
        - reference_id: file:SCHPO/gpd3/gpd3-deep-research-falcon.md
          supporting_text: |-
            **glyceraldehyde-3-phosphate dehydrogenase (GAPDH)** with **EC 1.2.1.12**, a core glycolytic enzyme that catalyzes the oxidative phosphorylation step converting **glyceraldehyde-3-phosphate (G3P)** to **1,3-bisphosphoglycerate**
        - reference_id: file:SCHPO/gpd3/gpd3-deep-research-falcon.md
          supporting_text: |-
            **Tdh1** and **Gpd3**, which are reported to be **~93% identical** and to share conserved cysteines important for redox sensitivity
  - term:
      id: GO:0005829
      label: cytosol
    evidence_type: IBA
    original_reference_id: GO_REF:0000033
    review:
      summary: |-
        Primary localization. Cytosol is consistent with the canonical glycolytic
        function and with HDA evidence (PMID:16823372). UniProt records the
        subcellular location as cytoplasm. The falcon report notes that
        Gpd3-specific localization data are limited and that proposed conditional
        nuclear/moonlighting localization (via RNA Pol II) could not be assigned
        to Gpd3 vs the dominant Tdh1 isoform; cytosol is therefore retained as the
        well-supported core localization.
      action: ACCEPT
      supported_by:
        - reference_id: file:SCHPO/gpd3/gpd3-deep-research-falcon.md
          supporting_text: |-
            we could not retrieve the original *S. pombe* primary paper(s) to assign this unambiguously to Gpd3 vs Tdh1
  - term:
