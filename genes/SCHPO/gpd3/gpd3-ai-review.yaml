    findings: []
  - id: file:SCHPO/gpd3/gpd3-deep-research-falcon.md
    title: Falcon (Edison) deep research report on S. pombe gpd3 (GAPDH 2, O43026)
    findings:
      - statement: |-
          Identity confirmed: gpd3 (O43026, SPBC354.12) is a GAPDH-family enzyme
          (GAPDH 2, EC 1.2.1.12) of S. pombe, paralogous to Tdh1; the two
          isoforms are ~93% identical. Gpd3 is the MINOR isoform: Tdh1 is
          >200-fold more abundant and provides >90% of total GAPDH activity.
        supporting_text: |-
          **Tdh1** and **Gpd3**, which are reported to be **~93% identical** and to share conserved cysteines important for redox sensitivity
        reference_section_type: OTHER
      - statement: |-
          Tdh1 is the dominant GAPDH isoform; Gpd3 is the minor isoform under
          tested conditions but remains responsive to oxidative and nutrient
          stress.
        supporting_text: |-
          with **Tdh1 >200-fold more abundant than Gpd3** and providing **>90% of total GAPDH activity**
        reference_section_type: OTHER
      - statement: |-
          Core biochemical function: NAD+-linked oxidative phosphorylation of
          glyceraldehyde-3-phosphate to 1,3-bisphosphoglycerate in glycolysis
          (EC 1.2.1.12).
        supporting_text: |-
          **glyceraldehyde-3-phosphate dehydrogenase (GAPDH)** with **EC 1.2.1.12**, a core glycolytic enzyme that catalyzes the oxidative phosphorylation step converting **glyceraldehyde-3-phosphate (G3P)** to **1,3-bisphosphoglycerate**
        reference_section_type: OTHER
      - statement: |-
          gpd3 is strongly induced by phosphate starvation (mRNA ~75-fold; Gpd3
          protein ~12-fold), interpreted as a compensatory response to sustain
          glycolytic flux rather than constitutive housekeeping.
        supporting_text: |-
          including **gpd3 mRNA ~75-fold** and **tdh1 mRNA ~10-fold**, alongside a **~12-fold increase** in intracellular **Gpd3 protein** abundance in proteomics
        reference_section_type: OTHER
      - statement: |-
          Both Tdh1 and Gpd3 undergo H2O2-dependent oxidation, but Gpd3 is
          relatively resistant to hyperoxidation compared with Tdh1, suggesting
          isoform-specific redox behavior.
        supporting_text: |-
          both Tdh1 and Gpd3 become oxidized, but **Gpd3 appears relatively resistant to hyperoxidation** compared with Tdh1
        reference_section_type: OTHER
      - statement: |-
          The RNA polymerase II / Rpb7 moonlighting role and the Sty1 MAPK
          signaling role are documented for GAPDH/Tdh1; the falcon report
          explicitly states it could not assign the RNA Pol II association
          unambiguously to Gpd3 vs Tdh1, and that direct Gpd3-specific
          localization requires additional primary-source confirmation.
        supporting_text: |-
          we could not retrieve the original *S. pombe* primary paper(s) to assign this unambiguously to Gpd3 vs Tdh1
        reference_section_type: OTHER
      - statement: |-
          gpd3 is widely used as an RT-qPCR reference (housekeeping) gene in
          S. pombe stress-physiology studies.
        supporting_text: |-
          relative expression (Pfaffl method) was **normalized relative to gpd3 gene** in both control and oxidative-stress conditions
        reference_section_type: OTHER
core_functions:
  - description: |-
      Catalyzes the NAD+-dependent oxidative phosphorylation of
      glyceraldehyde-3-phosphate to 1,3-bisphosphoglycerate (EC 1.2.1.12), the
      sixth step of glycolysis. This is the core molecular function of the gene.
    molecular_function:
      id: GO:0004365
      label: glyceraldehyde-3-phosphate dehydrogenase (NAD+) (phosphorylating)
        activity
    supported_by:
      - reference_id: file:SCHPO/gpd3/gpd3-deep-research-falcon.md
        supporting_text: |-
          **glyceraldehyde-3-phosphate dehydrogenase (GAPDH)** with **EC 1.2.1.12**, a core glycolytic enzyme that catalyzes the oxidative phosphorylation step converting **glyceraldehyde-3-phosphate (G3P)** to **1,3-bisphosphoglycerate**
  - description: |-
      Provides backup/inducible glycolytic GAPDH capacity as the minor isoform:
      tdh1-null cells remain viable because Gpd3 supplies GAPDH activity, and
      gpd3 is strongly upregulated under phosphate starvation to help sustain
      glycolytic flux. (The peroxide-stress MAPK-phosphorelay and RNA Pol II
      moonlighting roles described for fission yeast GAPDH are attributed to the
      dominant Tdh1 isoform, not endogenous Gpd3, and are therefore excluded
      here as core functions.)
    molecular_function:
      id: GO:0004365
      label: glyceraldehyde-3-phosphate dehydrogenase (NAD+) (phosphorylating)
        activity
    supported_by:
      - reference_id: PMID:18406331
        supporting_text: |-
          Haploid Δ tdh1 cells were viable in the glucose growth media, because S. pombe has gpd3 + , a second GAPDH gene expressed at a much lower level than tdh1 +
      - reference_id: file:SCHPO/gpd3/gpd3-deep-research-falcon.md
        supporting_text: |-
          including **gpd3 mRNA ~75-fold** and **tdh1 mRNA ~10-fold**, alongside a **~12-fold increase** in intracellular **Gpd3 protein** abundance in proteomics
