        reference_section_type: TITLE
  - id: PMID:18406331
    title: Glycolytic enzyme GAPDH promotes peroxide stress signaling through
      multistep phosphorelay to a MAPK cascade
    findings:
      - statement: |-
          gpd3 is the second, minor GAPDH gene of S. pombe, expressed at a much
          lower level than tdh1; tdh1-null cells are viable because gpd3 is
          present. This is the basis for treating Gpd3 as the minor isoform and
          metabolic backup.
        supporting_text: |-
          Haploid Δ tdh1 cells were viable in the glucose growth media, because S. pombe has gpd3 + , a second GAPDH gene expressed at a much lower level than tdh1 +
        reference_section_type: RESULTS
      - statement: |-
          The H2O2-stress phosphorelay/MAPK signaling role demonstrated in this
          paper is for the Tdh1 isoform (Cys-152 oxidation enhances Tdh1-Mcs4
          association), NOT for Gpd3. Gpd3 only complements the signaling defect
          when ARTIFICIALLY OVEREXPRESSED (data not shown). Thus the stress
          signaling role should not be attributed to Gpd3 at endogenous levels.
        supporting_text: |-
          Artificial overexpression of a minor GAPDH isozyme, Gpd3, complements the Δ tdh1 defect in H 2 O 2 -induced Spc1 activation (data not shown), suggesting that Gpd3 is also capable of promoting the phosphorelay signaling
        reference_section_type: DISCUSSION
  - id: PMID:15620689
    title: Glyceraldehyde-3-phosphate dehydrogenase and actin associate with RNA
      polymerase II and interact with its Rpb7 subunit
    findings:
      - statement: |-
          S. pombe GAPDH associates with RNA polymerase II and interacts with
          its Rpb7 subunit (two-hybrid and Rpb4/Rpb7 affinity column). The study
          refers generically to "GAPDH" and does not resolve whether the
          interacting isoform is Tdh1 (dominant, >90% of activity) or Gpd3;
          attributing this moonlighting role specifically to Gpd3 is not
          supported by the data.
        supporting_text: |-
          identified GAPDH as an Rpb7-binding protein...GAPDH was...affinity-purified from S. pombe extract by using an Rpb4/Rpb7-coupled column
        reference_section_type: ABSTRACT
  - id: file:SCHPO/gpd3/gpd3-deep-research-manual.md
