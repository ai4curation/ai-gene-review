id: P41411
gene_symbol: cdc18
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:284812
  label: Schizosaccharomyces pombe (strain 972 / ATCC 24843)
description: >-
  Cdc18 is the fission-yeast ortholog of Cdc6, an AAA+ ATPase and essential pre-replicative
  complex (pre-RC) component required for DNA replication licensing. Recruited to ORC-bound
  replication origins in late G1/early S, it cooperates with Cdt1 to load the MCM2-7 replicative
  helicase onto origins, forming the pre-RC and licensing each origin for a single round of
  firing. Cdc18 is the rate-limiting initiator of S phase: its abundance is tightly cell-cycle
  controlled through MBF (Cdc10/Res1/Res2)-dependent transcription at START and through CDK
  (Cdc2)-mediated phosphorylation that targets it for SCF(Pop1/Pop2)-dependent ubiquitination
  and 26S proteasomal degradation. This regulation restricts replication to once per cycle, and
  Cdc18 overexpression or stabilization drives genome re-replication. Cdc18 additionally
  contributes to the S-phase (DNA replication) checkpoint: when replication forks stall it
  persists on chromatin and anchors the Rad3-Rad26 (ATR-ATRIP) checkpoint kinase complex, helping
  couple completion of S phase to the onset of mitosis. It localizes to the nucleus and is found
  at origins/chromatin as part of the pre-RC.
