- term:
    id: GO:0006270
    label: DNA replication initiation
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: involved_in
  review:
    summary: >-
      Cdc18 is a core initiator of DNA replication: it is required for replication and its
      regulated expression controls the onset of S phase. This is a primary, well-supported
      function and the phylogenetic call matches the conserved role of Cdc6/Cdc18 family members.
    action: ACCEPT
    reason: >-
      Central, experimentally established function in fission yeast, conserved across the family,
      and the basis for the more specific mitotic DNA replication initiation annotation.
    supported_by:
    - reference_id: PMID:8521469
      supporting_text: >-
        We propose that p65cdc18 acts at the initiation of DNA replication and plays a major role
        in controlling the onset of S phase.
