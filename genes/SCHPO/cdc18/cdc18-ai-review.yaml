suggested_questions:
- question: >-
    Does Cdc18 ATP binding/hydrolysis directly power MCM2-7 loading in fission yeast, and what are
    the in vitro biochemical requirements for Cdc18-Cdt1-mediated helicase loading onto S. pombe
    origins?
  experts:
  - Thomas J. Kelly
  - Stephen Kearsey
- question: >-
    How is the checkpoint-anchoring (Rad3-Rad26 adaptor) activity of Cdc18 mechanistically
    separated from its replication-licensing activity, and which Cdc18 domains/residues are
    required for each?
  experts:
  - Damien Hermand
  - Paul Nurse
suggested_experiments:
- description: >-
    Reconstitute MCM2-7 loading in vitro with purified S. pombe ORC, Cdc18, Cdt1 and MCM2-7 on
    origin DNA, comparing wild-type Cdc18 with Walker A/B (ATP-binding/hydrolysis) mutants to test
    whether Cdc18 ATPase activity is required for productive helicase loading.
  experiment_type: in vitro biochemical reconstitution
  hypothesis: >-
    Cdc18 ATP binding and hydrolysis are mechanistically required to load and/or activate the
    MCM2-7 helicase at origins.
- description: >-
    Generate separation-of-function cdc18 alleles and test in vivo whether mutations that abolish
    Rad26/Rad3 chromatin anchoring (checkpoint maintenance) leave MCM loading and origin licensing
    intact, using chromatin-binding assays for MCM and Rad3 plus checkpoint and re-replication
    readouts.
  experiment_type: genetic separation-of-function analysis
  hypothesis: >-
    The checkpoint-anchoring function of Cdc18 is genetically and structurally separable from its
    pre-RC/MCM-loading function.
