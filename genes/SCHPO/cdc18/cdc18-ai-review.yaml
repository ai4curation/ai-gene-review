- term:
    id: GO:0006325
    label: chromatin organization
  evidence_type: IEA
  original_reference_id: GO_REF:0000108
  qualifier: involved_in
  review:
    summary: >-
      This term is an automated inter-ontology inference from the chromatin-protein adaptor
      activity (GO:0140463) annotation. Cdc18's documented chromatin-related role is anchoring the
      Rad3-Rad26 checkpoint complex to chromatin, not remodeling or organizing chromatin
      structure. "Chromatin organization" overstates and mischaracterizes this activity.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      Logically inferred from the adaptor MF but not reflecting a genuine chromatin-organization
      role; the real function is checkpoint-complex anchoring, captured better by the adaptor and
      checkpoint terms.
    supported_by:
    - reference_id: PMID:17531813
      supporting_text: >-
        Rad26 directly binds Cdc18 and is required for Rad3 recruitment to chromatin.
      reference_section_type: ABSTRACT
- term:
