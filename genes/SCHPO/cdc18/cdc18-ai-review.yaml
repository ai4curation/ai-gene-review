  review:
    summary: >-
      Cdc18 is a nuclear replication-licensing factor that acts at chromatin-bound origins.
      Nuclear localization is well established experimentally in S. pombe and by orthology, so
      this phylogenetic annotation is correct.
    action: ACCEPT
