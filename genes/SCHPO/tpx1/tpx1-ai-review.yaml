      interactions (homodimer, transient mixed disulfides with thioredoxins, Pap1, Pka1, Csn5,
      and Srx1), but these are captured by more specific MF terms such as
      thioredoxin-dependent peroxiredoxin activity and protein-disulfide reductase activity.
      The bare protein binding term adds no information.
    action: MARK_AS_OVER_ANNOTATED
    reason: Generic protein binding is uninformative; specific MF terms (peroxiredoxin/disulfide-relay activities) capture the actual interactions.
