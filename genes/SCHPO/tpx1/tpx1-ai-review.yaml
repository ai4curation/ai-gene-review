    supporting_text: >-
      The peroxiredoxin Tpx1 is essential as a H2O2 scavenger during aerobic
      growth in fission yeast.
  - reference_id: PMID:20356456
    supporting_text: >-
      TPx (thioredoxin peroxidase) exhibited a capacity for peroxide reduction
      with the thioredoxin system.
