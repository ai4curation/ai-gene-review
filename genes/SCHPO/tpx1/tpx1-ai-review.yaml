- description: >-
    H2O2 sensor and redox relay: by forming transient mixed disulfides with partner
    proteins, Tpx1 transduces peroxide signals to the Pap1 (AP-1-like) transcription
    factor and the Sty1/Atf1 (p38/SAPK) MAPK pathway, controlling the oxidative stress
    transcriptional response. This signaling role is genetically separable from the
    peroxidase activity (e.g., via the tpx1C169S allele).
