id: O74887
gene_symbol: tpx1
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:284812
  label: Schizosaccharomyces pombe (strain 972 / ATCC 24843)
description: >-
  Tpx1 is the single typical 2-Cys peroxiredoxin (thioredoxin peroxidase, EC
  1.11.1.24) of Schizosaccharomyces pombe. Using a peroxidatic Cys48 and resolving
  Cys169 and the thioredoxin system (Trx1 main donor, Trr1/NADPH recycling) as
  reductant, it reduces hydrogen peroxide and organic peroxides to maintain low
  intracellular H2O2. Beyond bulk detoxification, Tpx1 is a central H2O2 sensor and
  redox relay: it transduces peroxide signals to the AP-1-like transcription factor
  Pap1 and to the Sty1/Atf1 (p38/SAPK) MAPK pathway via transient mixed disulfides.
  At high peroxide flux Tpx1 is hyperoxidized (Cys-sulfinic acid) and inactivated,
  and is repaired by sulfiredoxin (Srx1) in an ATP-dependent reaction, gating the
  dose- and time-dependent stress response. Tpx1 is predominantly cytosolic with a
  minor mitochondrial intermembrane-space pool under oxidative conditions.
