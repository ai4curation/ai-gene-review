references:
  - id: GO_REF:0000002
    title: >-
      Gene Ontology annotation through association of InterPro records with GO
      terms
    findings:
      - statement: >-
          InterPro domain IPR004023 (Mago_nashi) maps to RNA splicing
          (GO:0008380) and exon-exon junction complex (GO:0035145).
        supporting_text: >-
          Mnh1 contains the mago nashi domain (IPR004023, Pfam PF02792) which
          is the defining feature of the MAGO protein family.
  - id: GO_REF:0000015
    title: Use of the ND evidence code for Gene Ontology (GO) terms
    findings: []
  - id: GO_REF:0000033
    title: Annotation inferences using phylogenetic trees
    findings:
      - statement: >-
          PANTHER family PTHR12638 (PROTEIN MAGO NASHI HOMOLOG) correctly assigns
          mnh1 to the mago nashi family, supporting IBA annotations for EJC
          membership and RNA splicing.
        supporting_text: >-
          IBA annotations are derived from phylogenetic trees with multiple
          supporting species including FB:FBgn0002736 (Drosophila mago nashi),
          UniProtKB:P61326, and UniProtKB:Q96A72 (human MAGOH).
  - id: GO_REF:0000044
    title: >-
      Gene Ontology annotation based on UniProtKB/Swiss-Prot Subcellular
      Location vocabulary mapping, accompanied by conservative changes to GO
      terms applied by UniProt
    findings: []
  - id: GO_REF:0000120
    title: Combined Automated Annotation using Multiple IEA Methods
    findings: []
  - id: PMID:16823372
    title: >-
      ORFeome cloning and global analysis of protein localization in the fission
      yeast Schizosaccharomyces pombe.
    findings:
      - statement: >-
          Mnh1 localizes to both nucleus and cytosol based on high-throughput
          YFP-tagging study of the S. pombe proteome.
        supporting_text: >-
          we determined the localization of 4,431 proteins, corresponding to
          approximately 90% of the fission yeast proteome, by tagging each ORF
          with the yellow fluorescent protein
  - id: PMID:27365210
    title: >-
      The fission yeast MTREC and EJC orthologs ensure the maturation of meiotic
      transcripts during meiosis.
    findings:
      - statement: >-
          Mnh1 is a core component of the S. pombe EJC ortholog, interacting
          with pFal1 (eIF4AIII) independently of Y14 and Rnps1.
        supporting_text: >-
          the interaction between pFal1 and Mnh1 remains even in the absence
          of Y14 or Rnps1
      - statement: >-
          Mnh1 deletion causes severe sporulation defects, comparable to pFal1
          deletion but more severe than Y14 or Rnps1 deletion.
        supporting_text: >-
          loss of mnh1 causes severe sporulation defects
      - statement: >-
          Mnh1 is required for splicing of meiotic transcripts (rec8) during
          meiosis; its deletion significantly decreases the splicing index.
        supporting_text: >-
          The splicing index of rec8+ significantly decreased in pfal1Δ−/−
          and mnh1Δ−/− homozygous diploid cells
      - statement: >-
          Mnh1 ensures proper levels of meiotic transcripts during meiosis,
          indicating a role in nuclear mRNA surveillance.
        supporting_text: >-
          the total meiotic RNA level of rec8+ was significantly lower without
          either functional pFal1, Mnh1
  - id: PMID:36095128
    title: >-
      Splicing of branchpoint-distant exons is promoted by Cactin, Tls1 and the
      ubiquitin-fold-activated Sde2.
    findings:
      - statement: >-
          This study screened 48 deletion mutants of putative splicing factors
          for defects in spliceosomal splicing using reporter assays. Mnh1 was
          likely among the mutants screened from the Bioneer deletion library.
          The main finding was that Sde2, Cay1, and Tls1 promote splicing of
          introns with branchpoint-distant 3-prime splice sites.
        supporting_text: >-
          Splicing of rap1-i1 and rap1-i2 reporters was tested in a collection
          of 48 viable deletion mutants of putative splicing factors and 10
          conditional mutants of splicing factors essential for viability
