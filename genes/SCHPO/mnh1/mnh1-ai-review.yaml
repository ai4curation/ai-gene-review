gene_symbol: mnh1
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:284812
  label: Schizosaccharomyces pombe (strain 972 / ATCC 24843)
description: >-
  S. pombe ortholog of MAGO nashi (MAGO), a core component of the exon junction
  complex (EJC). Mnh1 interacts with pFal1 (eIF4AIII ortholog) in an
  RNA/DNA-independent manner and associates with other EJC orthologs Y14 and
  Rnps1. Unlike the mammalian EJC, the pFal1-Mnh1 interaction in S. pombe is
  preserved even without Y14 or Rnps1. Mnh1 is essential for meiotic gene
  expression: mnh1 deletion causes severe sporulation defects and impairs
  splicing of meiotic transcripts such as rec8 during meiosis. It also
  cooperates with the MTREC complex to ensure proper meiotic transcript
  maturation. During vegetative growth, Mnh1 contributes to nuclear mRNA
  surveillance. Mnh1 localizes to both the nucleus and cytosol. The protein is
  147 amino acids in length with a conserved mago nashi domain.
existing_annotations:
  - term:
      id: GO:0035145
      label: exon-exon junction complex
    evidence_type: IBA
    original_reference_id: GO_REF:0000033
    review:
      summary: >-
        IBA annotation based on phylogenetic inference across the mago nashi
        family (PANTHER). Mnh1 is confirmed as a component of the EJC ortholog
        in S. pombe by co-immunoprecipitation with pFal1 (eIF4AIII), Y14, and
        Rnps1 (PMID:27365210). The IBA annotation is well supported.
      action: ACCEPT
      supported_by:
        - reference_id: PMID:27365210
          supporting_text: >-
            We can easily detect interaction between pFal1-Myc and Mnh1-FTP
  - term:
      id: GO:0008380
      label: RNA splicing
    evidence_type: IBA
    original_reference_id: GO_REF:0000033
    review:
      summary: >-
        IBA annotation for RNA splicing based on phylogenetic inference. Mnh1 is
        experimentally shown to be required for meiotic gene splicing in S. pombe;
        deletion of mnh1 impairs splicing of rec8 transcripts during meiosis
        (PMID:27365210). The gene is also annotated with more specific splicing
        terms (GO:0045292 and GO:0071030), but this broader term from IBA is
        acceptable as a parent annotation.
      action: ACCEPT
      supported_by:
        - reference_id: PMID:27365210
          supporting_text: >-
            pFal1 and Mnh1 are required for maturation of meiotic RNAs
  - term:
      id: GO:0005634
      label: nucleus
    evidence_type: IEA
    original_reference_id: GO_REF:0000120
    review:
      summary: >-
        IEA annotation for nuclear localization derived from combined automated
        methods (InterPro and UniProt subcellular location). This is consistent
        with experimental evidence from the high-throughput ORFeome localization
        study (PMID:16823372, HDA) that places Mnh1 in the nucleus.
      action: ACCEPT
  - term:
      id: GO:0005737
      label: cytoplasm
    evidence_type: IEA
    original_reference_id: GO_REF:0000044
    review:
      summary: >-
        IEA annotation for cytoplasm localization mapped from UniProt subcellular
        location vocabulary. The HDA annotation from PMID:16823372 uses the more
        specific term cytosol (GO:0005829). This broader IEA annotation is
        acceptable as a parent term, though the more specific cytosol annotation
        is preferred.
      action: ACCEPT
  - term:
      id: GO:0008380
      label: RNA splicing
    evidence_type: IEA
    original_reference_id: GO_REF:0000002
    review:
      summary: >-
        IEA annotation for RNA splicing from InterPro2GO mapping based on the
        mago nashi domain (IPR004023). Consistent with the IBA annotation and
        experimental evidence from PMID:27365210 showing Mnh1 is required for
        meiotic RNA splicing.
      action: ACCEPT
  - term:
      id: GO:0035145
      label: exon-exon junction complex
    evidence_type: IEA
    original_reference_id: GO_REF:0000002
    review:
      summary: >-
        IEA annotation for EJC membership from InterPro2GO mapping based on the
        mago nashi domain (IPR004023). Consistent with experimental evidence from
        PMID:27365210 demonstrating co-immunoprecipitation of Mnh1 with pFal1
        and other EJC orthologs.
      action: ACCEPT
  - term:
      id: GO:0003674
      label: molecular_function
    evidence_type: ND
    original_reference_id: GO_REF:0000015
    review:
      summary: >-
        ND annotation indicating no specific molecular function has been
        experimentally determined. This is appropriate because while Mnh1 is
        known to participate in the EJC and be required for meiotic splicing,
        its specific enzymatic or binding activity has not been characterized at
        the molecular level. The mago nashi protein family members are generally
        considered structural components of the EJC rather than having catalytic
        activity.
      action: ACCEPT
  - term:
      id: GO:0035145
      label: exon-exon junction complex
    evidence_type: EXP
    original_reference_id: PMID:27365210
    review:
      summary: >-
        Experimental evidence from Marayati et al. (2016) demonstrating that
        Mnh1 (MAGO ortholog) is a component of the EJC in S. pombe. Co-IP
        experiments showed that pFal1-Myc interacts with Mnh1-FTP, and this
        interaction persists even in the absence of Y14 or Rnps1
        (PMID:27365210).
      action: ACCEPT
      supported_by:
        - reference_id: PMID:27365210
          supporting_text: >-
            We can easily detect interaction between pFal1-Myc and Mnh1-FTP
        - reference_id: PMID:27365210
          supporting_text: >-
            the interaction between pFal1 and Mnh1 remains even in the absence
            of Y14 or Rnps1
  - term:
      id: GO:0071030
      label: nuclear mRNA surveillance of spliceosomal pre-mRNA splicing
    evidence_type: EXP
    original_reference_id: PMID:27365210
    review:
      summary: >-
        Experimental evidence from Marayati et al. (2016). Mnh1 together with
        pFal1 cooperates with MTREC in meiotic transcript processing and
        surveillance. Loss of Mnh1 leads to decreased levels of total meiotic
        transcripts, suggesting abnormal transcripts are targeted for
        degradation. The paper demonstrates that pFal1, Mnh1, and MTREC ensure
        stable expression of meiotic genes during meiosis, and that improperly
        processed transcripts are eliminated (PMID:27365210). This is consistent
        with a nuclear mRNA surveillance function.
      action: ACCEPT
      supported_by:
        - reference_id: PMID:27365210
          supporting_text: >-
            the total meiotic RNA level of rec8+ was significantly lower without
            either functional pFal1, Mnh1
        - reference_id: PMID:27365210
          supporting_text: >-
            pFal1, Mnh1, and MTREC ensure stable expression of meiotic genes
            during meiosis
  - term:
      id: GO:0045292
      label: mRNA cis splicing, via spliceosome
    evidence_type: IMP
    original_reference_id: PMID:36095128
    review:
      summary: >-
        IMP annotation based on PMID:36095128 (Anil et al. 2022), which studied
        splicing of branchpoint-distant exons by Sde2, Cay1, and Tls1. The paper
        tested 48 viable deletion mutants of putative splicing factors using
        splicing reporters. While the paper does not explicitly mention mnh1 or
        mago nashi in its text, mnh1 was likely among the deletion mutants
        screened from the Bioneer haploid deletion library. PomBase curators
        annotated this based on supplementary data showing mnh1 deletion affects
        spliceosomal splicing. Independently, PMID:27365210 provides strong
        evidence that mnh1 deletion impairs meiotic mRNA splicing via the
        spliceosome.
      action: ACCEPT
      supported_by:
        - reference_id: PMID:27365210
          supporting_text: >-
            The splicing index of rec8+ significantly decreased in pfal1Δ−/−
            and mnh1Δ−/− homozygous diploid cells
  - term:
      id: GO:0005634
      label: nucleus
    evidence_type: HDA
    original_reference_id: PMID:16823372
    review:
      summary: >-
        HDA annotation from the high-throughput ORFeome YFP-tagging localization
        study by Matsuyama et al. (2006), which determined localization for
        approximately 90% of the S. pombe proteome. Nuclear localization is
        expected for an EJC component and is consistent with its role in mRNA
        splicing surveillance. UniProt also records this localization
        (ECO:0000269|PubMed:16823372).
      action: ACCEPT
      supported_by:
        - reference_id: PMID:16823372
          supporting_text: >-
            we determined the localization of 4,431 proteins, corresponding to
            approximately 90% of the fission yeast proteome, by tagging each
            ORF with the yellow fluorescent protein
  - term:
      id: GO:0005829
      label: cytosol
    evidence_type: HDA
    original_reference_id: PMID:16823372
    review:
      summary: >-
        HDA annotation from the high-throughput ORFeome YFP-tagging localization
        study by Matsuyama et al. (2006). Cytosolic localization is consistent
        with EJC components being deposited on mRNAs that travel to the
        cytoplasm for translation. UniProt records cytoplasm localization from
        this study.
      action: ACCEPT
      supported_by:
        - reference_id: PMID:16823372
          supporting_text: >-
            we determined the localization of 4,431 proteins, corresponding to
            approximately 90% of the fission yeast proteome, by tagging each
            ORF with the yellow fluorescent protein
