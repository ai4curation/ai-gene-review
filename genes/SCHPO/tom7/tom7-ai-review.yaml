id: O42999
gene_symbol: tom7
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:284812
  label: Schizosaccharomyces pombe (strain 972 / ATCC 24843)
description: >-
  Tom7 is a small (52 amino acid) single-pass transmembrane protein of the mitochondrial outer
  membrane that functions as a regulatory subunit of the preprotein translocase of the outer
  mitochondrial membrane (TOM complex). The TOM complex in S. pombe consists of at least eight
  subunits: import receptors Tom20, Tom22, and Tom70; the import channel Tom40; the auxiliary
  receptor Tom37; and the small regulatory Tom proteins Tom5, Tom6, and Tom7. Tom7 contributes
  to the structural integrity and assembly dynamics of the TOM complex. In human cells,
  knockdown of Tom7 strongly compromises TOM complex stability, indicating a critical
  structural role [PMID:18331822]. Tom7 is a single-pass membrane protein with its N-terminus
  in the cytoplasm and C-terminus in the mitochondrial intermembrane space. Tom7 belongs to the
  conserved Tom7 family (Pfam PF08038, InterPro IPR012621) found across eukaryotes. Function
  is inferred primarily from orthologs in S. cerevisiae and human, with no S. pombe-specific
  experimental studies identified.

existing_annotations:
- term:
    id: GO:0005741
    label: mitochondrial outer membrane
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      Tom7 is annotated as active in the mitochondrial outer membrane based on phylogenetic
      inference (IBA). This is well-supported by UniProt subcellular localization annotation
      and by the known topology of Tom7 as a single-pass transmembrane protein of the outer
      mitochondrial membrane. The protein has a cytoplasmic N-terminal domain (residues 1-19),
      a transmembrane helix (residues 20-36), and an intermembrane space C-terminal domain
      (residues 37-52). This is a core localization for Tom7.
    action: ACCEPT
    reason: >-
      Tom7 is an integral membrane protein of the mitochondrial outer membrane, well-established
      across eukaryotes. UniProt annotation confirms mitochondrion outer membrane localization
      (ECO:0000250). IBA inference is phylogenetically sound and consistent with all available
      evidence.
    supported_by:
      - reference_id: PMID:18331822
        supporting_text: >-
          The fungal preprotein translocase of the mitochondrial outer membrane (TOM
          complex) comprises import receptors Tom70, Tom20, and Tom22, import channel
          Tom40, and small Tom proteins Tom5, Tom6, and Tom7, which regulate TOM complex
          assembly.

- term:
    id: GO:0030150
    label: protein import into mitochondrial matrix
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      Tom7 is annotated as involved in protein import into mitochondrial matrix via IBA
      phylogenetic inference. As a subunit of the TOM complex, Tom7 plays a regulatory and
      structural role in the translocase that mediates translocation of preproteins across the
      outer mitochondrial membrane. While the TOM complex is involved in import of many classes
      of mitochondrial proteins (including matrix-targeted precursors), Tom7 does not directly
      participate in the translocation mechanism but rather modulates TOM complex assembly and
      stability. The annotation is acceptable as Tom7 contributes to the overall protein import
      process [PMID:18331822].
    action: ACCEPT
    reason: >-
      Tom7 is part of the TOM complex which is required for import of preproteins destined for
      the mitochondrial matrix. Double knockdown of small Tom proteins affects matrix import
      of preproteins. IBA annotation is phylogenetically sound.
    supported_by:
      - reference_id: PMID:18331822
        supporting_text: >-
          Matrix import of preprotein was affected by
          double knockdown of any combination of small Tom proteins.

- term:
    id: GO:0045040
    label: protein insertion into mitochondrial outer membrane
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      Tom7 is annotated as involved in protein insertion into the mitochondrial outer membrane
      via IBA phylogenetic inference. The TOM complex mediates not only matrix import but also
      insertion of outer membrane proteins such as beta-barrel proteins. Tom7 as a structural
      regulatory subunit of the TOM complex contributes to this process. This annotation is
      appropriate as a secondary biological process for Tom7.
    action: ACCEPT
    reason: >-
      The TOM complex is involved in insertion of proteins into the mitochondrial outer membrane,
      and Tom7 as a regulatory subunit contributes to this function. IBA annotation is consistent
      with the known role of the TOM complex.
    supported_by:
      - reference_id: PMID:18331822
        supporting_text: >-
          The fungal preprotein translocase of the mitochondrial outer membrane (TOM
          complex) comprises import receptors Tom70, Tom20, and Tom22, import channel
          Tom40, and small Tom proteins Tom5, Tom6, and Tom7, which regulate TOM complex
          assembly.

- term:
    id: GO:0005741
    label: mitochondrial outer membrane
  evidence_type: IEA
  original_reference_id: GO_REF:0000044
  review:
    summary: >-
      Duplicate of the IBA annotation for mitochondrial outer membrane, this time inferred
      electronically from UniProt subcellular location mapping. Consistent with the IBA
      annotation and well-supported by the known biology of Tom7.
    action: ACCEPT
    reason: >-
      Redundant with the IBA annotation but independently derived from UniProt subcellular
      location. Both lines of evidence support the same conclusion. IEA annotations that are
      broader or consistent with IBA are acceptable.

- term:
    id: GO:0005742
    label: mitochondrial outer membrane translocase complex
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: >-
      Tom7 is annotated as part of the mitochondrial outer membrane translocase complex
      (GO:0005742), inferred electronically from InterPro domain IPR012621. Note that the
      current preferred term for this complex is GO:0140596 (TOM complex), though GO:0005742
      may still be valid. The annotation is correct: Tom7 is an established subunit of the
      TOM complex, as confirmed by UniProt SUBUNIT annotation and extensive literature.
    action: MODIFY
    reason: >-
      GO:0005742 (mitochondrial outer membrane translocase complex) is a valid term, but the
      newer GO:0140596 (TOM complex) is the current preferred term for this complex. The
      annotation correctly identifies Tom7 as a TOM complex subunit.
    proposed_replacement_terms:
      - id: GO:0140596
        label: TOM complex
    supported_by:
      - reference_id: PMID:18331822
        supporting_text: >-
          The fungal preprotein translocase of the mitochondrial outer membrane (TOM
          complex) comprises import receptors Tom70, Tom20, and Tom22, import channel
          Tom40, and small Tom proteins Tom5, Tom6, and Tom7, which regulate TOM complex
          assembly.

- term:
    id: GO:0030150
    label: protein import into mitochondrial matrix
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: >-
      Duplicate of the IBA annotation for protein import into mitochondrial matrix, this time
      inferred electronically from InterPro domain IPR012621 (Tom7 family). Consistent with
      the IBA annotation.
    action: ACCEPT
    reason: >-
      Redundant with the IBA annotation but independently derived from InterPro domain mapping.
      Both lines of evidence support the same conclusion.

- term:
    id: GO:0005198
    label: structural molecule activity
  evidence_type: ISS
  original_reference_id: GO_REF:0000024
  review:
    summary: >-
      Tom7 is annotated with structural molecule activity via ISS (inferred from sequence
      similarity to S. cerevisiae Tom7, UniProtKB:P53507). This is well-supported by the known
      role of small Tom proteins in maintaining the structural integrity of the TOM complex.
      In human cells, knockdown of Tom7 strongly compromised stability of the TOM complex,
      more so than knockdown of Tom5 or Tom6 [PMID:18331822]. This indicates Tom7 plays a
      critical structural role in maintaining TOM complex architecture.
    action: ACCEPT
    reason: >-
      Tom7 functions as a structural subunit of the TOM complex, maintaining complex integrity
      and stability. This is the most appropriate molecular function term for Tom7, which does
      not have catalytic activity but rather serves a structural role within the translocase
      complex.
    supported_by:
      - reference_id: PMID:18331822
        supporting_text: >-
          Knockdown of Tom7, but not Tom5 and Tom6, strongly compromised
          stability of the TOM complex.
      - reference_id: PMID:18331822
        supporting_text: >-
          These results
          indicate that human small Tom proteins maintain the structural integrity of the
          TOM complex.

- term:
    id: GO:0030150
    label: protein import into mitochondrial matrix
  evidence_type: ISS
  original_reference_id: GO_REF:0000024
  review:
    summary: >-
      Tom7 is annotated as involved in protein import into mitochondrial matrix via ISS,
      inferred from sequence similarity to S. cerevisiae Tom7 (UniProtKB:P53507). This is
      consistent with the IBA and IEA annotations for the same term and is well-supported
      by the known role of the TOM complex in mitochondrial protein import.
    action: ACCEPT
    reason: >-
      Redundant with IBA and IEA annotations but independently derived via manual sequence
      similarity transfer. All evidence converges on the same conclusion.
    supported_by:
      - reference_id: PMID:18331822
        supporting_text: >-
          Matrix import of preprotein was affected by
          double knockdown of any combination of small Tom proteins.

