core_functions:
- description: >-
    Tom7 is a small structural regulatory subunit of the TOM (translocase of outer membrane)
    complex. It contributes to the structural integrity and stability of the TOM complex,
    which mediates import of nuclear-encoded preproteins into mitochondria. Knockdown of Tom7
    strongly compromises TOM complex stability [PMID:18331822]. Tom7 is a single-pass
    transmembrane protein embedded in the mitochondrial outer membrane, with its N-terminus
    in the cytoplasm and C-terminus in the intermembrane space.
  molecular_function:
    id: GO:0005198
    label: structural molecule activity
  directly_involved_in:
    - id: GO:0030150
      label: protein import into mitochondrial matrix
    - id: GO:0045040
      label: protein insertion into mitochondrial outer membrane
  locations:
    - id: GO:0005741
      label: mitochondrial outer membrane
  in_complex:
    id: GO:0140596
    label: TOM complex
  supported_by:
    - reference_id: PMID:18331822
      supporting_text: >-
        Knockdown of Tom7, but not Tom5 and Tom6, strongly compromised
        stability of the TOM complex.
    - reference_id: PMID:18331822
      supporting_text: >-
        These results
        indicate that human small Tom proteins maintain the structural integrity of the
        TOM complex.

proposed_new_terms: []

suggested_questions:
- question: >-
    Is there direct experimental evidence for Tom7 function in S. pombe, or is all functional
    annotation based on inference from S. cerevisiae and human orthologs? No S. pombe-specific
    experimental studies on Tom7 were identified in this review. All functional understanding
    is inferred from conserved TOM complex biology in other organisms.

- question: >-
    Does S. pombe Tom7 have the same dominant role in TOM complex stability as observed for
    human Tom7? In human cells, Tom7 knockdown had a stronger effect on TOM complex stability
    than Tom5 or Tom6 knockdown [PMID:18331822]. It would be valuable to test whether this
    hierarchy is conserved in fission yeast.

suggested_experiments:
- description: >-
    Generate a tom7 deletion mutant in S. pombe and assess TOM complex integrity by
    blue native PAGE. This would establish whether Tom7 is essential for TOM complex
    stability in fission yeast as it is in human cells.
- description: >-
    Perform co-immunoprecipitation or affinity purification of tagged Tom7 to confirm
    its physical association with Tom40 and other TOM complex subunits in S. pombe.
