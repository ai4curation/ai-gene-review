- id: PMID:11230130
  title: Fission yeast Pom1p kinase activity is cell cycle regulated and essential
    for cellular symmetry during growth and division.
  findings:
  - statement: >-
      Pom1 kinase activity is cell-cycle regulated and required for cellular
      symmetry; Pom1 needs its non-catalytic domain for cell-periphery
      localization and its kinase activity for cell-end localization.
    supporting_text: >-
      Pom1p is present in a large protein complex and requires its non-catalytic
      domain to localize to the cell periphery and its kinase activity to
      localize to cell ends.
- id: PMID:11950884
  title: Different mechanisms of cell polarisation in vegetative and shmooing growth
    in fission yeast.
  findings: []
- id: PMID:12206652
  title: Mac1, a fission yeast transmembrane protein localizing to the poles and septum,
    is required for correct cell separation at high temperatures.
  findings: []
- id: PMID:14663827
  title: Role of Tea1p, Tea3p and Pom1p in the determination of cell ends in Schizosaccharomyces
    pombe.
  findings:
  - statement: >-
      Pom1 contributes to cell-end determination; pom1 deletion (with tea1 or
      tea3) gives the most defective growth pattern and difficulty relocalizing
      actin to cell ends.
    supporting_text: >-
      has the greatest difficulty in relocalizing actin to the cell ends
      following actin depolymerization and generates the most defective growth
      pattern.
- id: PMID:18328707
  title: Pom1 DYRK regulates localization of the Rga4 GAP to ensure bipolar activation
    of Cdc42 in fission yeast.
  findings:
  - statement: >-
      Pom1 physically interacts with and regulates the Cdc42 GAP Rga4 to ensure
      bipolar activation of Cdc42 and bipolar growth.
    supporting_text: >-
      Pom1 kinase physically interacts with Rga4, which has a GAP (GTPase-
      activating protein) domain for Rho-family GTPase.
- id: PMID:19474789
  title: A spatial gradient coordinates cell size and mitotic entry in fission yeast.
  findings:
  - statement: >-
      Pom1 forms a polar gradient acting as a dose-dependent inhibitor of mitotic
      entry through the Cdr2 pathway.
    supporting_text: >-
      Pom1 forms a polar gradient extending from the cell ends towards the cell
      middle and acts as a dose-dependent inhibitor of mitotic entry, working
      through the Cdr2 pathway.
- id: PMID:19474792
  title: Polar gradients of the DYRK-family kinase Pom1 couple cell length with the
    cell cycle.
  findings:
  - statement: >-
      A polar Pom1 gradient measures cell length and controls mitotic entry; Pom1
      is a dose-dependent G2-M inhibitor that negatively regulates Cdr1/Cdr2.
    supporting_text: >-
      emanates from the ends of rod-shaped Schizosaccharomyces pombe cells,
      serves to measure cell length and control mitotic entry.
- id: PMID:20164182
  title: Rga4 modulates the activity of the fission yeast cell integrity MAPK pathway
    by acting as a Rho2 GTPase-activating protein.
  findings:
  - statement: >-
      Pom1 is a negative regulator of the Pmk1 cell-integrity MAPK pathway,
      acting through Rga4 localization/phosphorylation (independent of Rga4's
      Rho2-GAP role).
    supporting_text: >-
      is also a negative regulator of the Pmk1 pathway, but this control is not
      dependent upon the Rga4 role as a Rho2-GAP.
- id: PMID:20870879
  title: Reorganization of the growth pattern of Schizosaccharomyces pombe in invasive
    filament formation.
  findings: []
- id: PMID:21703453
  title: A phosphorylation cycle shapes gradients of the DYRK family kinase Pom1 at
    the plasma membrane.
  findings:
  - statement: >-
      Tea4 recruits Pom1 to the cortex; Pom1 binds plasma-membrane lipids via a
      basic region and autophosphorylates to lower lipid affinity and release
      from the membrane, shaping the gradient.
    supporting_text: >-
      Pom1 autophosphorylates in this region to lower lipid affinity and promote
      membrane release.
- id: PMID:22174761
  title: Roles of the DYRK kinase Pom2 in cytokinesis, mitochondrial morphology, and
    sporulation in fission yeast.
  findings:
  - statement: >-
      DYRK kinases including Pom1 autophosphorylate on tyrosine and phosphorylate
      exogenous substrates on serine/threonine (dual specificity).
    supporting_text: >-
      autophosphorylation on tyrosine and exogenous phosphorylation on
      serine/threonine residues.
- id: PMID:24047646
  title: Pom1 and cell size homeostasis in fission yeast.
  findings:
  - statement: >-
      pom1-deleted cells still show wild-type size homeostasis, indicating Pom1
      is not the unique/direct cell-size sensor even though it regulates the
      timing of mitotic entry.
    supporting_text: >-
      show wild-type size homeostasis both in size variability analyses and size
      homeostasis experiments.
- id: PMID:24316795
  title: Distinct levels in Pom1 gradients limit Cdr2 activity and localization to
    time and position division.
  findings:
  - statement: >-
      Distinct Pom1 gradient thresholds limit Cdr2 activity/localization; Pom1
      inhibits Cdr2 for mitotic commitment independently of regulating its
      localization.
    supporting_text: >-
      Pom1 inhibits Cdr2 for mitotic commitment independently of regulating its
      localization or cortical levels.
- id: PMID:24508166
  title: Dueling kinases regulate cell size at division through the SAD kinase Cdr2.
  findings:
  - statement: >-
      Pom1 phosphorylates the Cdr2 C-terminal domain to prevent Cdr2 activation
      by the CaMKK Ssp1, opposing the Cdr2-Wee1 pathway.
    supporting_text: >-
      prevent activation of Cdr2 kinase activity by the CaMKK Ssp1.
- id: PMID:25720772
  title: Quantitative phosphoproteomics reveals pathways for coordination of cell
    growth and division by the conserved fission yeast kinase pom1.
  findings:
  - statement: >-
      Purified Pom1 directly phosphorylates multiple cell-polarity substrates in
      vitro, confirming them as direct Pom1 targets.
    supporting_text: >-
      Purified Pom1 phosphorylated these cell polarity targets in vitro,
      confirming that they are direct substrates of Pom1 kinase activity and
      likely contribute to regulation of polarized growth by Pom1.
- id: PMID:26150232
  title: Pom1 gradient buffering through intermolecular auto-phosphorylation.
  findings:
  - statement: >-
      Pom1 autophosphorylates intermolecularly, conferring robustness to its
      gradient.
    supporting_text: >-
      auto-phosphorylates intermolecularly.
- id: PMID:26443240
  title: PKA antagonizes CLASP-dependent microtubule stabilization to re-localize
    Pom1 and buffer cell size upon glucose limitation.
  findings:
  - statement: >-
      Under glucose limitation Pom1 re-localizes to the cell sides (lateral
      cortex), where it strongly delays mitosis.
    supporting_text: >-
      cell sides upon environmental glucose limitation, where it strongly delays
      mitosis.
- id: PMID:28914606
  title: Nanoscale architecture of the Schizosaccharomyces pombe contractile ring.
  findings:
  - statement: >-
      Super-resolution mapping places Pom1 among signaling components of the
      contractile-ring intermediate layer.
    supporting_text: >-
      intermediate layer (80-160 nm) consists of a network of cytokinesis
      accessory proteins as well as multiple signaling components which influence
      cell division.
- id: PMID:29249658
  title: Mechanisms Connecting the Conserved Protein Kinases Ssp1, Kin1, and Pom1
    in Fission Yeast Cell Polarity and Division.
  findings: []
- id: PMID:29514920
  title: Cell size-dependent regulation of Wee1 localization by Cdr2 cortical nodes.
  findings:
  - statement: >-
      Pom1 contributes to size-dependent signaling by suppressing Wee1 node
      bursts in small cells (as a Cdr2 inhibitor).
    supporting_text: >-
      Size-dependent signaling was caused in part by the Cdr2 inhibitor Pom1,
      which suppressed Wee1 node bursts in small cells.
- id: PMID:29930085
  title: Local and global Cdc42 guanine nucleotide exchange factors for fission yeast
    cell polarity are coordinated by microtubules and the Tea1-Tea4-Pom1 axis.
  findings:
  - statement: >-
      The microtubule / Tea1-Tea4-Pom1 axis counteracts inappropriate Gef1
      activity by regulating Rga4 localization, coordinating Cdc42 regulators for
      bipolar polarity.
    supporting_text: >-
      Tea1-Tea4-Pom1 axis counteract inappropriate Gef1 activity by regulating
      the localization of the Cdc42 GTPase-activating protein Rga4.
- id: PMID:32101481
  title: DYRK kinase Pom1 drives F-BAR protein Cdc15 from the membrane to promote
    medial division.
  findings:
  - statement: >-
      Pom1 kinase activity phosphorylates Cdc15 to drive it from the membrane and
      prevent septation at cell tips, ensuring medial division even without Mid1.
    supporting_text: >-
      kinase activity prevents septation at cell tips even if Mid1 is absent or
      mislocalized.
- id: PMID:36749320
  title: Multiple polarity kinases inhibit phase separation of F-BAR protein Cdc15
    and antagonize cytokinetic ring assembly in fission yeast.
  findings:
  - statement: >-
      Phosphorylation of Cdc15 by assorted polarity kinases (including Pom1)
      prevents Cdc15 condensation on the plasma membrane and antagonizes
      contractile-ring assembly.
    supporting_text: >-
      phosphorylation by assorted kinases prevents Cdc15 condensation on the PM
      and antagonizes CR assembly.
- id: PMID:37746062
  title: Polarity kinases that phosphorylate F-BAR protein Cdc15 have unique localization
    patterns during cytokinesis and contributions to preventing tip septation in Schizosaccharomyces
    pombe.
  findings:
  - statement: >-
      Pom1 localizes to the cortex of the cell tip during cytokinesis and
      contributes to preventing tip septation.
    supporting_text: >-
      preventing tip septation in Schizosaccharomyces pombe.
- id: PMID:9573052
  title: Pom1p, a fission yeast protein kinase that provides positional information
    for both polarized growth and cytokinesis.
  findings:
  - statement: >-
      Pom1 provides positional information for both polarized growth and
      cytokinesis; mutants mostly fail to switch to bipolar growth and misplace
      septa.
    supporting_text: >-
      provides positional information for both polarized growth and cytokinesis.
- id: PMID:9852154
  title: Role of polo kinase and Mid1p in determining the site of cell division in
    fission yeast.
  findings:
  - statement: >-
      Pom1 is required for proper placement of the Mid1p ring at the division
      site.
    supporting_text: >-
      Pom1p is required for proper placement of the Mid1p ring.
suggested_questions:
- question: >-
    Given that pom1-deleted cells retain near-normal cell-size homeostasis, what
    is the precise contribution of the Pom1 gradient versus Cdr2-intrinsic and
    other size-sensing mechanisms to the timing of mitotic entry?
- question: >-
    What is the full physiological substrate repertoire of Pom1 beyond Cdr2,
    Cdc15, Rga4, Tea4, Mod5, Pal1, Rga7 and Syt22, and which substrates mediate
    each distinct output (size control vs division-plane positioning vs bipolar
    growth)?
- question: >-
    How is the tyrosine-autophosphorylation activity of Pom1 mechanistically
    coupled to its serine/threonine activity toward substrates, and does Tyr
    autophosphorylation regulate substrate selection or gradient dynamics?
suggested_experiments:
- experiment: >-
    Use analog-sensitive (as) Pom1 alleles combined with rapid chemical
    inhibition and time-resolved phosphoproteomics to define direct Pom1
    substrates and the temporal order of phosphorylation events during the cell
    cycle.
- experiment: >-
    Reconstitute the Pom1 membrane-binding/autophosphorylation cycle in vitro on
    supported lipid bilayers with defined phosphoinositide composition to
    dissect how lipid binding, intermolecular autophosphorylation, and Dis2
    dephosphorylation jointly shape the gradient.
- experiment: >-
    Generate separation-of-function Pom1 mutants (e.g. selectively impairing
    Cdr2 phosphorylation, Cdc15 phosphorylation, or Rga4 regulation) to test
    whether the size-control, division-positioning, and bipolar-growth outputs
    can be genetically uncoupled.
