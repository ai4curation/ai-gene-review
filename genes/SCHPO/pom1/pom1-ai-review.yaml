id: Q09690
gene_symbol: pom1
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:284812
  label: Schizosaccharomyces pombe (strain 972 / ATCC 24843)
description: >-
  Pom1 is a DYRK-family dual-specificity protein kinase that acts as a spatial
  cell-end marker in fission yeast. It forms a concentration gradient on the
  plasma membrane that is highest at the cell tips and lowest at mid-cell. Pom1
  is recruited to the cortex at cell tips by the Tea1-Tea4/Mod5 microtubule-based
  landmark system; Tea4-promoted dephosphorylation (via protein phosphatase 1
  Dis2) drives membrane association, while intermolecular autophosphorylation in
  a membrane-binding basic region lowers lipid affinity and releases Pom1,
  shaping and buffering the gradient. Pom1 autophosphorylates on tyrosine and
  phosphorylates substrates on serine/threonine. Through this gradient Pom1
  couples cell geometry to two main outputs: it times mitotic entry as part of
  cell-size control by inhibiting the medial SAD-family kinase Cdr2 (and Cdr1),
  which otherwise inhibit Wee1; and it positions the cytokinetic division plane
  at mid-cell by restricting Mid1 distribution and by phosphorylating the F-BAR
  protein Cdc15 to prevent septum assembly at cell ends. Pom1 also promotes the
  activation of bipolar growth (NETO) and cell polarity, in part by controlling
  the localization and phosphorylation of the Cdc42 GAP Rga4 to ensure bipolar
  activation of Cdc42.
