  qualifier: is_active_in
  review:
    summary: >-
      Phylogenetic (IBA) annotation to the broad cytoplasm term. Pom1 is a
      peripheral plasma-membrane/cell-cortex protein that forms gradients
      emanating from cell tips, so this term is not wrong but is uninformative
      and far less specific than the experimentally supported cortical/membrane
      locations. Keep as non-core.
    action: KEEP_AS_NON_CORE
    reason: >-
      Too general; the informative, experimentally supported localizations are
      cell cortex of cell tip, plasma membrane, and site of polarized growth.
- term:
    id: GO:0005856
    label: cytoskeleton
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: is_active_in
  review:
    summary: >-
      Phylogenetic (IBA) annotation. There is no experimental evidence that Pom1
      is a structural component of the cytoskeleton; it is a cortical/plasma
      membrane kinase whose localization depends on microtubules and the
      Tea1-Tea4 landmark system but that does not make it a cytoskeletal
      component. This appears to be an over-annotation propagated from the
      PANTHER family.
    action: REMOVE
    reason: >-
      Pom1 localizes to the cell cortex and plasma membrane, not the
      cytoskeleton; microtubule dependence of its delivery does not justify a
      cytoskeleton location annotation.
