    action: ACCEPT
- term:
    id: GO:0005737
    label: cytoplasm
  evidence_type: IEA
  original_reference_id: GO_REF:0000044
  qualifier: located_in
  review:
    summary: >-
      Cytoplasmic localization is documented; TRA-1 partitions between nucleus and
