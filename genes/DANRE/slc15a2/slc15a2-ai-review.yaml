- id: file:DANRE/slc15a2/slc15a2-deep-research-falcon.md
  title: Falcon/Edison deep research report on Danio rerio slc15a2 (PEPT2)
  findings:
  - statement: Falcon synthesis confirms slc15a2 encodes PEPT2, a secondary active proton-coupled symporter of the POT/SLC15
      family that concentratively imports di- and tripeptides using the inwardly directed electrochemical proton gradient.
    supporting_text: |-
      PEPT2 (SLC15A2) is a **secondary active symporter** that uses the inwardly directed **electrochemical proton gradient (ΔμH⁺)** to drive **concentrative uptake** of **di- and tripeptides**
    reference_section_type: OTHER
  - statement: Falcon notes zebrafish PEPT2 transport is electrogenic, proton-coupled, and high-affinity/low-capacity, with
      a model dipeptide Gly-L-Gln K0.5 of ~18 uM at -120 mV and pH 7.5.
    supporting_text: |-
      Zebrafish PEPT2 (Slc15a2) transports dipeptides via **H⁺-coupled electrogenic symport**, demonstrated by heterologous expression and electrophysiological recording in *Xenopus laevis* oocytes using the model dipeptide **Gly-L-Gln**.
    reference_section_type: OTHER
  - statement: Falcon confirms zebrafish adult expression is principally in gut, kidney, and brain, consistent with epithelial
      peptide handling and renal peptide salvage.
    supporting_text: |-
      Adult zebrafish *pept2/slc15a2* mRNA was detected primarily in **gut, kidney, and brain**
    reference_section_type: OTHER
  - statement: Falcon highlights the developmental otic vesicle / semicircular canal expression as the first experimental link
      between pept2 and vertebrate inner ear structures.
    supporting_text: |-
      first experimental link between *pept2* expression and vertebrate inner ear structures
    reference_section_type: OTHER
  - statement: Falcon flags that apical-vs-basolateral polarity in zebrafish was not resolved experimentally and should be
      treated as ortholog-based inference rather than zebrafish-demonstrated fact.
    supporting_text: |-
      polarity assignments should be treated as **ortholog-based inference** rather than zebrafish-demonstrated fact
    reference_section_type: OTHER
