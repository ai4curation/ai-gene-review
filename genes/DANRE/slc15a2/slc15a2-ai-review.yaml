- id: PMID:16317081
  title: 'High-affinity peptide transporter PEPT2 (SLC15A2) of the zebrafish Danio rerio: functional properties, genomic organization,
    and expression analysis.'
  findings:
  - statement: Heterologous expression and electrophysiology in Xenopus oocytes show zebrafish PEPT2 is a high-affinity/low-capacity
      peptide transporter (K0.5 for Gly-L-Gln ~18 uM at -120 mV, pH 7.5).
    supporting_text: |-
      Electrophysiological analysis after cRNA injection in Xenopus laevis oocytes suggested that zebrafish PEPT2 is a high-affinity/low-capacity transporter (K(0.5) for glycyl-L-glutamine approximately 18 microM at -120 mV and pH 7.5).
    reference_section_type: ABSTRACT
  - statement: Zebrafish pept2 mRNA is mainly detected in brain, kidney, gut, and the otic vesicle (the embryonic structure that
      develops into the inner ear).
    supporting_text: |-
      Zebrafish pept2 mRNA was mainly detected in brain, kidney, gut, and, interestingly, otic vesicle, the embryonic structure that develops into the auditory/vestibular organ, homolog to the higher vertebrate inner ear, of the adult fish.
    reference_section_type: ABSTRACT
