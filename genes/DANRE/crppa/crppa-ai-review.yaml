- id: file:DANRE/crppa/crppa-deep-research-falcon.md
  title: Falcon deep research report for Danio rerio crppa (UniProt A0JPF9)
  findings:
  - statement: |
      Falcon synthesis confirms zebrafish crppa (synonym ispd, UniProt A0JPF9) is the vertebrate ISPD/CRPPA ortholog,
      a D-ribitol-5-phosphate cytidylyltransferase / CDP-L-ribitol pyrophosphorylase, not a microbial isoprenoid enzyme.
    supporting_text: |
      a **D-ribitol-5-phosphate cytidylyltransferase / CDP-L-ribitol pyrophosphorylase A (CRPPA)**
    reference_section_type: RESULTS
  - statement: |
      The catalyzed reaction is CTP plus D-ribitol-5-phosphate yielding CDP-L-ribitol, the activated donor used downstream;
      recombinant vertebrate ISPD can also accept ribose-5-phosphate or ribulose-5-phosphate in vitro.
    supporting_text: |
      produces the activated sugar alcohol nucleotide **CDP-L-ribitol (often written CDP-ribitol; CDP-Rbo)** from **CTP** and **(D-)ribitol-5-phosphate**
    reference_section_type: RESULTS
  - statement: |
      In vitro substrate promiscuity is noted but CDP-ribitol is the key in vivo-relevant product for dystroglycan glycosylation.
    supporting_text: |
      recombinant vertebrate ISPD can also use related pentose-phosphate substrates (ribose-5-phosphate or ribulose-5-phosphate)
    reference_section_type: RESULTS
  - statement: |
      CRPPA/ISPD supplies CDP-ribitol as the donor for FKTN and FKRP, which install ribitol-phosphate on the core M3
      O-mannosyl glycan of alpha-dystroglycan, enabling matriglycan synthesis required for laminin/ECM binding.
    supporting_text: |
      supply **CDP-ribitol** as the donor substrate used by the **ribitol-phosphate transferases FKTN (fukutin) and FKRP**
    reference_section_type: RESULTS
  - statement: |
      The CDP-ribitol donor is added by FKTN/FKRP onto the core M3 O-mannosyl glycan of alpha-dystroglycan.
    supporting_text: |
      install **ribitol-phosphate (RboP)** modifications onto the **core M3** O-mannosyl glycan of **α-dystroglycan (α-DG)**
    reference_section_type: RESULTS
  - statement: |
      Vertebrate CRPPA/ISPD function is CDP-ribitol synthesis for glycosylation, explicitly NOT the microbial MEP isoprenoid pathway,
      despite IspD/TarI family membership.
    supporting_text: |
      vertebrate CRPPA/ISPD function is in **CDP-ribitol synthesis for glycosylation**, not the microbial **MEP isoprenoid pathway**
    reference_section_type: DISCUSSION
  - statement: |
      Review table evidence lists vertebrate CRPPA/ISPD as cytosolic, consistent with cytosolic CDP-ribitol synthesis prior to
      Golgi/ER glycosylation; the zebrafish A0JPF9 localization was not directly tested in the gathered evidence.
    supporting_text: |
      Review table evidence lists **CRPPA/ISPD as cytosolic**
    reference_section_type: RESULTS
  - statement: |
      Zebrafish ispd loss-of-function (morpholino) produces highly penetrant dystroglycanopathy phenotypes including hydrocephalus
      and reduced eye size by 48 hpf.
    supporting_text: |
      **Hydrocephalus** and **reduced eye size** by **48 hpf**
    reference_section_type: RESULTS
  - statement: |
      Zebrafish ispd knockdown causes early muscle membrane integrity defects (Evans Blue dye uptake at the myotendinous junction by 48 hpf),
      consistent with compromised sarcolemma in dystroglycanopathy.
    supporting_text: |
      early **muscle membrane integrity defects**
    reference_section_type: RESULTS
  - statement: |
      Sub-effective ispd morpholino doses synergize with fktn and fkrp morpholinos to worsen hydrocephalus, placing crppa/ispd in the
      same functional alpha-dystroglycan glycosylation pathway.
    supporting_text: |
      synergized with **fktn** and **fkrp** morpholinos to worsen hydrocephalus, supporting membership in the same functional glycosylation pathway
    reference_section_type: RESULTS
  - statement: |
      Zebrafish ispd has two splice isoforms with different N-termini but a shared conserved ISPD domain.
    supporting_text: |
      two splice isoforms with different N-termini but a shared conserved ISPD domain
    reference_section_type: RESULTS
