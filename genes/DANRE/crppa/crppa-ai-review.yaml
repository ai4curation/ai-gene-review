description: crppa (formerly ispd) encodes a cytosolic ribitol-phosphate cytidylyltransferase required for CDP-ribitol production
  and functional alpha-dystroglycan O-mannosyl glycosylation. The core function is D-ribitol-5-phosphate cytidylyltransferase
  activity supporting protein O-linked glycosylation via mannose, not vertebrate isoprenoid biosynthesis.
