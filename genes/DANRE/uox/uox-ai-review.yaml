references:
- id: GO_REF:0000024
  title: Manual transfer of experimentally-verified manual GO annotation data to orthologs by curator judgment of sequence
    similarity
  findings:
  - statement: Peroxisome localization (GO:0005777) was transferred to zebrafish Uox
      by curator-judged sequence similarity to UniProtKB:P09118 (rat uricase).
- id: GO_REF:0000033
  title: Annotation inferences using phylogenetic trees
  findings:
  - statement: Phylogenetic inference within PANTHER family PTN000044668 supports
      involvement of Uox in urate catabolic process (GO:0019628) and purine nucleobase
      catabolic process (GO:0006145) and activity in the peroxisome (GO:0005777).
- id: GO_REF:0000041
  title: Gene Ontology annotation based on UniPathway vocabulary mapping.
  findings:
  - statement: UniPathway UPA00394 (urate degradation to (S)-allantoin) maps Uox to
      urate catabolic process (GO:0019628); UniProt assigns Uox step 1/3 (UER00650).
- id: GO_REF:0000044
  title: Gene Ontology annotation based on UniProtKB/Swiss-Prot Subcellular Location vocabulary mapping, accompanied by conservative
    changes to GO terms applied by UniProt
  findings:
  - statement: The UniProt Swiss-Prot subcellular location keyword SL-0204 (Peroxisome)
      maps Uox to peroxisome (GO:0005777).
- id: GO_REF:0000117
  title: Electronic Gene Ontology annotations created by ARBA machine learning models
  findings:
  - statement: The ARBA machine-learning model ARBA00034937 predicts purine-containing
      compound catabolic process (GO:0072523) for Uox.
- id: GO_REF:0000120
  title: Combined Automated Annotation using Multiple IEA Methods
  findings:
  - statement: Combined IEA evidence (ARBA00087801, RHEA:21368, EC 1.7.3.3) assigns
      Uox urate oxidase activity (GO:0004846).
- id: PMID:26349049
  title: The identification of an integral membrane, cytochrome c urate oxidase completes the catalytic repertoire of a therapeutic
    enzyme.
  findings:
  - statement: The bacterial urate-catabolism paper used zebrafish Uox as a soluble urate oxidase comparator.
    supporting_text: zfUox protein used in our experiments
- id: PMID:27922051
  title: Catalysis and Structure of Zebrafish Urate Oxidase Provide Insights into the Origin of Hyperuricemia in Hominoids.
  findings:
  - statement: Zebrafish Uox was cloned and biochemically/structurally characterized as urate oxidase.
    supporting_text: A cDNA encoding the complete sequence of zebrafish urate oxidase
  - statement: Zebrafish Uox catalyzes hydroxylation of urate to 5-hydroxyisourate, the
      first and rate-limiting step of the three-step uricolysis pathway converting urate to
      (S)-allantoin.
    supporting_text: |-
      Urate oxidase (uricase, Uox) catalyses hydroxylation of urate to give 5-hydroxyisourate (HIU)
    reference_section_type: INTRODUCTION
  - statement: Uricolysis is a conserved three-step pathway yielding the more soluble
      (S)-allantoin, with Uox catalyzing the first and rate-limiting step.
    supporting_text: |-
      This is the first and rate-limiting step of uricolysis, a three-step enzymatic pathway present in both prokaryotes and eukaryotes that converts urate into the more soluble (S)-allantoin
    reference_section_type: INTRODUCTION
- id: PMID:28508122
  title: A Trivalent Enzymatic System for Uricolytic Therapy of HPRT Deficiency and Lesch-Nyhan Disease.
  findings:
  - statement: DrUox retains urate-degrading activity in a therapeutic enzyme triad context.
    supporting_text: DrUox brings to significant accumulation of HIU and OHCU
- id: PMID:36553446
  title: Uricase-Deficient Larval Zebrafish with Elevated Urate Levels Demonstrate Suppressed Acute Inflammatory Response
    to Monosodium Urate Crystals and Prolonged Crystal Persistence.
  findings:
  - statement: uox-deficient zebrafish larvae show elevated urate, supporting the in vivo urate-metabolism role.
    supporting_text: elevated urate levels at early larval stages
  - statement: A zebrafish uox null mutant has elevated urate, a suppressed acute
      inflammatory response to MSU crystals, and prolonged in vivo crystal persistence,
      directly linking Uox function to urate handling and crystal-driven inflammation.
    supporting_text: |-
      describe a zebrafish uox null mutant that possesses elevated urate levels at
    reference_section_type: ABSTRACT
  - statement: uox is expressed primarily in the developing liver at 2 dpf by whole-mount
      in situ hybridization, consistent with the liver as the principal site of larval
      uricolysis.
    supporting_text: |-
      in situ hybridization (WMISH) showed expression at 2 dpf in the developing liver, with weaker diffuse expression in the head and along the horizontal myoseptum (Figure 2A)
    reference_section_type: RESULTS
- id: file:DANRE/uox/uox-uniprot.txt
  title: UniProtKB entry Q6DG85 for Danio rerio uox
  findings:
  - statement: UniProt describes Uox as peroxisomal urate oxidase catalyzing urate oxidation.
    supporting_text: Catalyzes the oxidation of uric acid to 5-hydroxyisourate
- id: file:DANRE/uox/uox-deep-research-falcon.md
  title: Falcon (Edison Scientific Literature) deep research report for Danio rerio uox (Q6DG85)
  findings:
  - statement: Falcon synthesizes that zebrafish Uox is a classical cofactorless urate
      oxidase catalyzing oxidation/hydroxylation of urate to 5-hydroxyisourate (HIU).
    supporting_text: |-
      Zebrafish Uox catalyzes **oxidation/hydroxylation of urate to HIU**, and is described as the **classical cofactorless Uox** (i.e., it does not require a tightly bound organic cofactor).
    reference_section_type: OTHER
  - statement: Falcon places Uox among peroxisomal oxidases that use molecular oxygen
      as electron acceptor and generate hydrogen peroxide as a byproduct.
    supporting_text: |-
      Uox is grouped among peroxisomal oxidases that use **molecular oxygen (O₂)** as electron acceptor and generate **hydrogen peroxide (H₂O₂)** as a byproduct of oxidation chemistry
    reference_section_type: OTHER
  - statement: Falcon assigns Uox the first, rate-limiting step of the three-step
      uricolysis pathway, followed by Urah (HIU hydrolase) and Urad (OHCU decarboxylase)
      to (S)-allantoin.
    supporting_text: |-
      the canonical uricolysis pathway is a **three-enzyme** sequence in which Uox generates **5-hydroxyisourate (HIU)**, followed by HIU hydrolase (Urah) and OHCU decarboxylase (Urad) to yield **(S)-allantoin**.
    reference_section_type: OTHER
  - statement: Falcon supports peroxisomal matrix localization of Uox via a C-terminal
      PTS1 (ARM) targeting signal and a zebrafish peroxisomal proteome inventory.
    supporting_text: |-
      DrUox encodes a C-terminal **ARM** tripeptide corresponding to a **PTS1** motif, indicating peroxisomal matrix import.
    reference_section_type: OTHER
  - statement: Falcon reports the kinetic parameters of recombinant wild-type DrUox
      (Km ~11 uM, kcat ~4 per s) consistent with the UniProt KM value.
    supporting_text: |-
      **Wild-type DrUox:** **Km = 11 ± 1 μM**, **kcat ≈ 4 s⁻¹**.
    reference_section_type: OTHER
  - statement: Falcon notes the homotetrameric T-fold architecture of zebrafish Uox
      with active sites at subunit interfaces.
    supporting_text: |-
      Zebrafish Uox forms a **tetramer** with the **T-fold** architecture typical of classical uricases; the functional active sites occur at subunit interfaces.
    reference_section_type: OTHER
