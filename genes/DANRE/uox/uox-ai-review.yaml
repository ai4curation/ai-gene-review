suggested_questions:
- question: Why does zebrafish retain a fully functional uricase when hominoids (including
    humans) have lost urate oxidase activity through pseudogenization?
- question: Is Uox the sole route of urate degradation in zebrafish, or do redundant
    enzymes contribute to urate homeostasis in larvae and adults?
suggested_experiments:
- hypothesis: Catalytically inactive Uox cannot rescue the elevated-urate phenotype
    of uox-deficient zebrafish, confirming that urate oxidase activity is the relevant
    function.
  description: Inject wild-type versus active-site-mutant uox mRNA into uox-/- zebrafish
    embryos and measure whether urate levels and monosodium urate crystal persistence
    are normalized.
- hypothesis: Uox is targeted to the peroxisome via a C-terminal or internal peroxisomal
    targeting signal.
  description: Express GFP-tagged Uox with and without candidate targeting-signal mutations
    in zebrafish cells and assess colocalization with a peroxisomal marker.
- hypothesis: Loss of Uox alters the downstream allantoin pathway and the inflammatory
    response to urate crystals.
  description: Quantify HIU, OHCU, and allantoin levels and characterize the acute
    inflammatory response to injected monosodium urate crystals in uox-/- versus wild-type
    larvae.
