id: Q5W7F1
gene_symbol: asah2
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:7955
  label: Danio rerio
description: asah2 encodes neutral ceramidase, a membrane-associated zinc-dependent N-acylsphingosine amidohydrolase that
  hydrolyzes ceramides to sphingosine and fatty acids at neutral pH. The core function is ceramide catabolism/sphingosine
  production at plasma/apical and related membrane compartments.
existing_annotations:
- term:
    id: GO:0042759
    label: long-chain fatty acid biosynthetic process
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: |-
      long-chain fatty acid biosynthetic process (GO:0042759) likely overstates or misdirects the
      direct function of asah2. Falcon deep research describes the core reaction as hydrolysis of
      ceramide to sphingosine and a free fatty acid; the released fatty acid is a hydrolysis product
      of ceramide catabolism rather than evidence of a fatty acid biosynthetic pathway role.
    action: MARK_AS_OVER_ANNOTATED
    reason: The evidence is better explained by the gene core function or downstream phenotype; this term should not be treated
      as a direct/core annotation.
    supported_by:
    - reference_id: file:DANRE/asah2/asah2-uniprot.txt
      supporting_text: hydrolyzes sphingolipid ceramides into sphingosine and free fatty acids at neutral pH
    - reference_id: PMID:15271994
      supporting_text: The enzyme activity at neutral pH increased markedly after transformation of Chinese hamster CHOP and
        zebrafish BRF41 cells with the cDNA
    - reference_id: file:DANRE/asah2/asah2-deep-research-falcon.md
      supporting_text: |-
        hydrolyzes ceramide to sphingosine and a free fatty acid
      reference_section_type: RESULTS
