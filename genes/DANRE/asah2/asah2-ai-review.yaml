- term:
    id: GO:0017040
    label: N-acylsphingosine amidohydrolase activity
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: |-
      N-acylsphingosine amidohydrolase activity (GO:0017040) is supported for asah2. Falcon deep
      research confirms this is the defining molecular function of the neutral ceramidase family:
      hydrolysis of ceramide to sphingosine plus a free fatty acid, with substrate preference for
      ceramides and dihydroceramides. Falcon also confirms Danio rerio is an established ASAH2
      ortholog, supporting transfer of this core function to the zebrafish protein.
    action: ACCEPT
    reason: This annotation matches the synthesized core function or a directly supported core location/process for this gene.
    supported_by:
