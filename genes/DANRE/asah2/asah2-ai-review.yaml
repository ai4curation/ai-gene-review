- id: file:DANRE/asah2/asah2-uniprot.txt
  title: UniProtKB entry Q5W7F1 for Danio rerio asah2
  findings:
  - statement: UniProt summarizes Asah2 as a neutral ceramidase that hydrolyzes ceramides.
    supporting_text: hydrolyzes sphingolipid ceramides into sphingosine and free fatty acids at neutral pH
- id: file:DANRE/asah2/asah2-deep-research-falcon.md
  title: Falcon (Edison) deep research report on Danio rerio asah2 (Q5W7F1) neutral ceramidase
  findings:
  - statement: |-
      Falcon confirms asah2/Q5W7F1 is a neutral ceramidase ortholog: a comparative ceramidase
      review explicitly includes Danio rerio as an ASAH2 ortholog in its alignments, supporting
      that the zebrafish symbol refers to neutral ceramidase rather than acid (ASAH1) or
      alkaline (ACER) ceramidases.
    supporting_text: |-
      A comparative ceramidase review explicitly includes **Danio rerio** as an ASAH2 ortholog in its alignments
    reference_section_type: RESULTS
  - statement: |-
      The core reaction is hydrolysis of ceramide to sphingosine plus a free fatty acid, linking
      ceramide pools to the downstream sphingosine to sphingosine-1-phosphate (S1P) signaling axis.
    supporting_text: |-
      hydrolyzes ceramide to sphingosine and a free fatty acid
    reference_section_type: RESULTS
  - statement: |-
      The most current synthesis (2024 Nature Reviews MCB) tabulates ASAH2 as a plasma-membrane
      ceramidase with optimal activity near neutral pH (~7.4).
    supporting_text: |-
      a recent authoritative review tabulates ASAH2 as a **plasma-membrane** ceramidase with optimal pH around **7.4**
    reference_section_type: RESULTS
  - statement: |-
      ASAH2 preferentially hydrolyzes ceramides and dihydroceramides, consistent with a role in
      non-lysosomal ceramide catabolism.
    supporting_text: |-
      preferentially hydrolyzing **ceramides and dihydroceramides**, consistent with its role in ceramide catabolism outside the lysosome
    reference_section_type: RESULTS
  - statement: |-
      ASAH2 sits at a key branch point controlling ceramide catabolism and the supply of sphingosine,
      which can be phosphorylated to S1P, placing it in the ceramide-S1P rheostat.
    supporting_text: |-
      controlling ceramide catabolism and the supply of **sphingosine**, which can be phosphorylated to **S1P**
    reference_section_type: RESULTS
  - statement: |-
      The strongest supported default localization is the cell surface/plasma membrane (apical in
      epithelia), retained as a type II integral membrane protein influenced by O-glycosylation of a
      mucin-like region, with intestinal brush-border expression linked to dietary sphingolipid digestion.
    supporting_text: |-
      the strongest supported “default” localization is **cell surface/plasma membrane (apical in epithelia)**
    reference_section_type: DISCUSSION
  - statement: |-
      Golgi and mitochondrial localizations have been reported only in specific contexts, including
      overexpression studies that can confound steady-state localization.
    supporting_text: |-
      reports of **mitochondrial** localization in overexpression studies (noting that overexpression can confound steady-state localization)
    reference_section_type: RESULTS
  - statement: |-
      Direct zebrafish evidence is limited to gene-expression measurement: in a kdsr hepatic injury
      model the authors quantified asah2 mRNA in adult liver as part of salvage-pathway analysis,
      supporting that hepatic asah2 expression is detectable and biologically engaged in zebrafish.
    supporting_text: |-
      the presence of **asah2 mRNA quantification in adult zebrafish liver** in a sphingolipid-metabolism perturbation model supports that **hepatic asah2 expression** is detectable and biologically engaged in zebrafish
    reference_section_type: RESULTS
