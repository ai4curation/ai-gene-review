suggested_questions:
- question: |-
    Does zebrafish Asah2 (Q5W7F1) display the substrate chain-length preference and neutral-pH
    kinetics characteristic of mammalian neutral ceramidases, or are there zebrafish-specific
    differences in ceramide vs dihydroceramide selectivity?
- question: |-
    What is the definitive subcellular localization of endogenous zebrafish Asah2 (plasma
    membrane/apical vs Golgi vs mitochondrion), given that mammalian mitochondrial localization
    derives largely from overexpression studies?
suggested_experiments:
- description: |-
    Generate a CRISPR loss-of-function asah2 zebrafish line and perform lipidomics to test whether
    ceramide accumulates and sphingosine/S1P decrease, directly probing dietary sphingolipid
    digestion and the ceramide/S1P rheostat in vivo.
- description: |-
    Determine zebrafish Asah2 subcellular localization using a tagged knock-in, membrane
    fractionation, and immunolocalization to resolve plasma-membrane/apical versus Golgi and
    mitochondrial signals.
