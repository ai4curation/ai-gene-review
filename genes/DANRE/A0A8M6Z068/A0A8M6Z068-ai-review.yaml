core_functions:
- molecular_function:
    id: GO:0003700
    label: DNA-binding transcription factor activity
  description: >-
    Pax3a is a paired-box and homeodomain-containing transcription factor that binds specific
    DNA sequences to regulate transcription of target genes involved in neural crest
    specification and muscle development. The paired domain (residues 34-161) and homeodomain
    (residues 220-278) mediate sequence-specific DNA binding. This is the core evolved
    molecular activity of the protein.
  directly_involved_in:
  - id: GO:0014032
    label: neural crest cell development
  - id: GO:0050936
    label: xanthophore differentiation
  - id: GO:0048484
    label: enteric nervous system development
  - id: GO:0006357
    label: regulation of transcription by RNA polymerase II
  locations:
  - id: GO:0005634
    label: nucleus
  supported_by:
  - reference_id: PMID:18417109
    supporting_text: >-
      Therefore, Pax3 in zebrafish is required for specification of two specific lineages of neural crest, xanthophores and enteric neurons.
  - reference_id: PMID:9510024
    supporting_text: >-
      The proteins encoded by both zebrafish genes are highly conserved (>83%) relative to the known mammalian sequences.
  - reference_id: PMID:34435397
    supporting_text: >-
      Pax3 and Pax7 are redundantly required during appendicular myogenesis in zebrafish, where Pax7 is able to activate the same developmental programs as Pax3 in the premigratory progenitor cells.

- molecular_function:
    id: GO:0043565
    label: sequence-specific DNA binding
  description: >-
    Pax3a contains two DNA-binding domains -- a paired domain and a homeodomain -- that
    cooperatively bind specific DNA sequences. The paired domain recognizes composite
    palindromic sites, while the homeodomain binds TAAT-containing motifs. This dual
    DNA-binding capability is characteristic of the Pax3/7 family and is essential for
    transcriptional regulation of neural crest and myogenic target genes.
  directly_involved_in:
  - id: GO:0007519
    label: skeletal muscle tissue development
  - id: GO:0001755
    label: neural crest cell migration
  locations:
  - id: GO:0005634
    label: nucleus
  supported_by:
  - reference_id: PMID:18417109
    supporting_text: >-
      Here we show that pax3 is expressed before other pax3/7 members, including duplicated pax3b, pax7 and pax7b genes, early in zebrafish neural crest development.
  - reference_id: PMID:34435397
    supporting_text: >-
      pax3a/3b/7a/7b quadruple mutant developed muscle-less pectoral fins.

proposed_new_terms: []

suggested_questions:
- question: >-
    Does pax3a have any functional annotations in GOA under an alternative UniProt accession?
    The A0A8M6Z068 entry has been deleted from UniProt (removed from RefSeq source). The
    canonical pax3a protein may be represented by a different accession in the current
    zebrafish proteome.
- question: >-
    What are the specific transcriptional targets of pax3a in zebrafish neural crest cells
    versus muscle precursors? Understanding the target gene repertoire would clarify whether
    pax3a has distinct regulatory programs in different cell types or acts through a common
    set of targets.
- question: >-
    To what extent do pax3a and pax3b have overlapping versus distinct functions in zebrafish?
    Genetic compensation between pax3 and pax7 family members has been documented, but the
    division of labor between the two pax3 paralogs is less clear.

suggested_experiments:
- description: >-
    ChIP-seq or CUT&RUN for Pax3a in zebrafish neural crest cells and muscle progenitors to
    identify direct transcriptional targets and distinguish cell-type-specific regulatory
    programs.
  hypothesis: >-
    Pax3a binds distinct sets of enhancers in neural crest cells versus muscle progenitors,
    reflecting its dual role in these lineages.
- description: >-
    CRISPR-generated pax3a knockout zebrafish combined with single-cell RNA-seq of neural
    crest populations to determine which neural crest sublineages are most dependent on
    pax3a function and to characterize compensatory responses from pax3b or pax7.
  hypothesis: >-
    Loss of pax3a preferentially affects xanthophore and enteric neuron specification, with
    partial compensation by pax3b or pax7 in other neural crest lineages.
