  label: Danio rerio
description: >-
  A0A8M6Z068 corresponds to an isoform (X1) of zebrafish Pax3a (Paired box protein Pax-3a),
  a transcription factor containing both a paired domain and a homeodomain. The UniProt entry
  has been deleted (removed from RefSeq source), but the sequence is archived in UniParc
  (UPI0003838262). Pax3a is orthologous to human PAX3 and is a key regulator of neural crest
  cell development, driving specification of xanthophore and enteric neuron lineages. It is
  also involved in skeletal muscle development, with genetic compensation between pax3a and
  pax7 in appendicular muscle formation. Pax3a is expressed in neural crest, neural tube,
  paraxial mesoderm, and muscle. Human PAX3 mutations cause Waardenburg syndrome and are
  associated with alveolar rhabdomyosarcoma.

references:
