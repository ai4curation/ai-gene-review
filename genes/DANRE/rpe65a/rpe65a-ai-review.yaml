id: Q6PBW5
gene_symbol: rpe65a
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:7955
  label: Danio rerio
description: |-
  rpe65a encodes the ocular (retinal pigment epithelium) zebrafish RPE65 paralog, a retinoid isomerohydrolase of the
  canonical RPE visual cycle that converts all-trans-retinyl esters to 11-cis-retinol plus a fatty acid, enabling regeneration
  of the 11-cis-retinal chromophore for opsins. (rpe65b is the extra-ocular paralog.) The core function is the iron-dependent
  retinyl-ester hydrolase/retinol isomerase ("isomerohydrolase") activity in retinal/retinoid metabolism; the iron cofactor
  acts as a Lewis acid for coupled O-alkyl ester cleavage and trans-cis isomerization rather than as an oxygenase, so broad
  oxidoreductase and beta-carotene 15,15'-dioxygenase annotations are treated cautiously. In zebrafish, rods depend on this
  canonical RPE cycle while larval cones can also use parallel intra-retinal pathways, so rpe65a perturbation reduces but does
  not abolish 11-cis-retinal synthesis.
