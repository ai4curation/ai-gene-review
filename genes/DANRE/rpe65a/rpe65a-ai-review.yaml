gene_symbol: rpe65a
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:7955
  label: Danio rerio
description: rpe65a encodes a retinal pigment epithelium retinoid isomerohydrolase involved in 11-cis-retinol/retinal production
  and visual-pigment regeneration. The core function is retinyl-ester hydrolase/isomerase activity in retinal/retinoid metabolism;
  broad oxidoreductase and beta-carotene dioxygenase annotations are treated cautiously because the UniProt-supported role
  is the visual-cycle retinoid isomerohydrolase/lutein isomerase activity.
