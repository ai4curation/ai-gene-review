- term:
    id: GO:0003834
    label: beta-carotene 15,15'-dioxygenase activity
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: |-
      beta-carotene 15,15'-dioxygenase activity (GO:0003834) is an over-specific IBA family-transfer annotation for Rpe65a.
      RPE65/rpe65a is an isomerohydrolase, not an oxygenase: its iron functions as a Lewis acid for ester cleavage and
      isomerization rather than activating dioxygen for carotenoid cleavage.
    action: MARK_AS_OVER_ANNOTATED
    reason: |-
      The supported Rpe65a activity is retinyl-ester hydrolase/retinol isomerase activity for 11-cis-retinoid production,
      not beta-carotene cleavage. Falcon explicitly contrasts RPE65 with oxygenase carotenoid cleavage dioxygenases:
      RPE65's iron acts as a Lewis acid for O-alkyl cleavage and isomerization, not for dioxygen activation.
    supported_by:
    - reference_id: file:DANRE/rpe65a/rpe65a-uniprot.txt
      supporting_text: Reaction=an all-trans-retinyl ester + H2O = 11-cis-retinol
    - reference_id: file:DANRE/rpe65a/rpe65a-deep-research-falcon.md
      supporting_text: |-
        Mechanistically, RPE65 differs from oxygenase CCDs: in oxygenase reactions (e.g., NinaB), iron activates dioxygen, whereas in RPE65 the iron is understood as functioning as a **Lewis acid** supporting O-alkyl cleavage and isomerization.
