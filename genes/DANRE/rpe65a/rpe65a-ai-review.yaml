      RPE-expressed visual-cycle isomerohydrolase (Q6PBW5), whereas rpe65b is extra-ocular.
    reference_section_type: OTHER
    supporting_text: |-
      only one paralog, RPE65a, is expressed in the zebrafish eye (in the RPE)
  - statement: |-
      Falcon establishes the core molecular function: Rpe65a is the retinoid isomerohydrolase of the
      canonical RPE visual cycle, converting all-trans-retinyl esters to 11-cis-retinol plus a fatty acid,
      enabling regeneration of 11-cis-retinal chromophore for opsins.
    reference_section_type: OTHER
    supporting_text: |-
      Rpe65a is the **retinoid isomerohydrolase** of the canonical RPE visual cycle that converts **all-trans-retinyl esters → 11-cis-retinol + fatty acid**, enabling regeneration of **11-cis-retinal** chromophore for opsins.
  - statement: |-
      Falcon supports that the direct substrate is membrane-associated all-trans-retinyl ester (not free
      retinol) and that the iron cofactor functions as a Lewis acid for O-alkyl cleavage and isomerization,
      so RPE65 differs from oxygenase carotenoid cleavage dioxygenases (relevant to the dioxygenase/oxidoreductase
      over-annotations).
    reference_section_type: OTHER
    supporting_text: |-
      Mechanistically, RPE65 differs from oxygenase CCDs: in oxygenase reactions (e.g., NinaB), iron activates dioxygen, whereas in RPE65 the iron is understood as functioning as a **Lewis acid** supporting O-alkyl cleavage and isomerization.
  - statement: |-
      Falcon localizes Rpe65a to the retinal pigment epithelium; in zebrafish, rods depend strongly on this
      canonical RPE visual cycle while larval cones can use parallel intra-retinal pathways, explaining the
      incomplete loss of vision on rpe65a knockdown.
    reference_section_type: OTHER
    supporting_text: |-
      rpe65a** is the ocular paralog and localizes to the **retinal pigment epithelium (RPE)**.
core_functions:
- description: |-
    rpe65a is the iron-dependent retinoid isomerohydrolase of the canonical retinal pigment epithelium visual cycle: it
    couples hydrolysis of all-trans-retinyl esters with trans-cis isomerization to produce 11-cis-retinol plus a fatty acid,
    regenerating the 11-cis-retinal chromophore for opsins.
