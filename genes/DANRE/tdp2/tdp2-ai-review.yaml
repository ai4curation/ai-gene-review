- id: PMID:39228401
  title: Tyrosyl-DNA phosphodiesterase 2 (Tdp2) repairs DNA-protein crosslinks and protects against double strand breaks in
    vivo.
  findings:
  - statement: |-
      Zebrafish has two tdp2 orthologs (tdp2a and tdp2b); tdp2b is the dominant ortholog during embryonic development and is
      phylogenetically closer to human TDP2. This UniProt entry Q5XJA0 maps to the tdp2b paralog (ZFIN ZDB-GENE-050816-1).
    supporting_text: |-
      tdp2b is the main ortholog
    reference_section_type: ABSTRACT
  - statement: |-
      In-vivo morpholino silencing of tdp2b (but not tdp2a) causes loss of Tdp2 activity and accumulation of DNA-protein
      crosslinks and double-strand breaks in zebrafish embryos.
    supporting_text: |-
      Silencing of tdp2b, but not tdp2a, resulted in the loss of Tdp2 activity
    reference_section_type: ABSTRACT
  - statement: |-
      Tdp2b silencing reduced total Tdp2 5'-tyrosyl-DNA phosphodiesterase activity by ~50%, demonstrating its role in resolving
      TOP2-DPCs in vivo.
    supporting_text: |-
      Tdp2b silencing resulted in a significant 50% decrease in Tdp2 activity, underscoring its crucial role in resolving
      TOP2-DPCs in zebrafish embryos
    reference_section_type: RESULTS
  - statement: |-
      Rescue of the phenotype depends on catalytic activity: a catalytically inactive D285A active-site mutant of Tdp2b does
      not rescue Tdp2 activity, showing the phosphodiesterase activity is the protective function.
    supporting_text: |-
      Specificity was further confirmed by overexpression of the catalytically inactive Tdp2b variant (D285A)
    reference_section_type: RESULTS
  - statement: |-
      Tdp2 processes 5'-TOP2 overhangs to generate 4-base sticky ends, promoting error-free repair of TOP2-induced
      double-strand breaks by non-homologous end joining (NHEJ).
    supporting_text: |-
      TDP2 promotes error-free NHEJ by processing 5′-TOP2 overhangs to generate 4-base-long sticky ends suitable for rejoining
    reference_section_type: INTRODUCTION
- id: file:DANRE/tdp2/tdp2-deep-research-falcon.md
  title: Falcon (Edison) deep research report for Danio rerio tdp2 (Q5XJA0)
  findings:
  - statement: |-
      Falcon synthesis: Tdp2/TTRAP is a metal-dependent phosphodiesterase that hydrolyzes the 5'-phosphotyrosyl bond linking
      a topoisomerase-derived peptide (classically TOP2) to the 5' end of DNA.
    supporting_text: |-
      Tdp2/TTRAP is a metal‑dependent phosphodiesterase
    reference_section_type: OTHER
  - statement: |-
      Falcon synthesis: the strongest and most consistent vertebrate evidence supports Tdp2 as the enzyme that directly
      resolves 5'-phosphotyrosyl DNA adducts, particularly TOP2-derived DPCs, promoting accurate DSB repair by NHEJ.
    supporting_text: |-
      the strongest and most consistent evidence supports Tdp2 as the enzyme that directly resolves **5′‑phosphotyrosyl DNA adducts**, particularly TOP2‑derived DPCs, thereby promoting accurate DSB repair by NHEJ
    reference_section_type: OTHER
  - statement: |-
      Falcon synthesis: conserved zebrafish Tdp2 active-site residues reported from the crystal structure include Asn129,
      Glu161, Asp271 and His360, consistent with a divalent metal-dependent catalytic mechanism.
    supporting_text: |-
      Key active‑site residues in zebrafish Tdp2 reported in the structure include **Asn129, Glu161, Asp271, and His360**
    reference_section_type: OTHER
  - statement: |-
      Falcon synthesis: an intact ubiquitin-associated (UBA) domain is required for efficient repair of TOP2-mediated DNA
      damage, but disrupting UBA-ubiquitin binding does not affect nuclear import, indicating nuclear localization is
      separable from ubiquitin-mediated recruitment.
    supporting_text: |-
      Disrupting the UBA–ubiquitin binding interface strongly compromises repair of TOP2‑mediated DNA damage while **not affecting nuclear import**
    reference_section_type: OTHER
