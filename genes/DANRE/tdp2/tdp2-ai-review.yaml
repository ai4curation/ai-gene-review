    label: 5'-tyrosyl-DNA phosphodiesterase activity
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: |-
      5'-tyrosyl-DNA phosphodiesterase activity (GO:0070260) is the core molecular function of Tdp2. Falcon deep research
      reinforces this with conserved-mechanism and in-vivo zebrafish evidence: Tdp2 hydrolyzes the 5'-phosphotyrosyl bond
      linking a topoisomerase-derived peptide (classically TOP2) to the 5' end of DNA, and in-vivo silencing of the embryonic
      tdp2b paralog (this Q5XJA0 entry) causes a ~50% loss of total Tdp2 activity.
    action: ACCEPT
    reason: Tdp2 is a nuclear/PML-body tyrosyl-DNA phosphodiesterase involved in DNA double-strand break repair.
