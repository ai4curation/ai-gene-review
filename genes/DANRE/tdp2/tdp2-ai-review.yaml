  review:
    summary: |-
      double-strand break repair (GO:0006302) is supported for Tdp2. Falcon deep research and the underlying in-vivo zebrafish
      study show that silencing the embryonic tdp2b paralog (this Q5XJA0 entry) leads to accumulation of DNA-protein crosslinks
      and double-strand breaks, and that Tdp2 resolves TOP2-DPCs to channel the repaired ends toward error-free non-homologous
      end joining (NHEJ).
