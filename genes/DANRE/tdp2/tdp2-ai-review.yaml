suggested_questions:
- question: Are the developmental gastrulation/left-right phenotypes of Tdp2/Ttrap loss in zebrafish a direct consequence of
    impaired Smad3/Nodal modulation, or do they arise indirectly from accumulation of unrepaired topoisomerase II-linked DNA
    breaks?
- question: Does the catalytic 5'-tyrosyl-DNA phosphodiesterase activity of Tdp2 contribute to its role in Nodal signaling,
    or is signaling modulation a phosphodiesterase-independent protein-protein interaction function (e.g. via Alk4/Smad3 binding)?
- question: Is the dual role of zebrafish Tdp2 in DNA repair versus TGF-beta/Nodal signaling conserved across vertebrates,
    and which tissue or developmental contexts favor one function over the other?
suggested_experiments:
- hypothesis: Tdp2 phosphodiesterase catalytic activity is dispensable for its modulation of Smad3/Nodal signaling during
    gastrulation.
  description: Rescue tdp2 morphant or CRISPR-knockout zebrafish embryos with either wild-type tdp2 mRNA or a catalytically
    dead active-site mutant, then score gastrulation movements, snail1a/e-cadherin expression, and left-right asymmetry markers
    to determine whether catalysis is required for the developmental phenotype.
  experiment_type: CRISPR knockout with mRNA rescue
- hypothesis: Loss of Tdp2 sensitizes zebrafish cells to topoisomerase II poisons due to defective repair of 5'-tyrosyl-DNA
    adducts.
  description: Treat wild-type and tdp2-knockout zebrafish embryos or cell lines with etoposide and quantify DNA double-strand
    break accumulation (gamma-H2AX) and survival relative to controls.
  experiment_type: etoposide sensitivity assay
- hypothesis: Recombinant zebrafish Tdp2 hydrolyzes 5'-phosphotyrosyl-DNA substrates in a divalent metal-dependent manner.
  description: Purify recombinant zebrafish Tdp2 and assay cleavage of a defined 5'-phosphotyrosine oligonucleotide substrate
    in the presence and absence of Mg2+/Mn2+ and EDTA, comparing wild-type and active-site mutant enzymes.
  experiment_type: in vitro phosphodiesterase assay
