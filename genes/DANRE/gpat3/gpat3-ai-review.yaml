- id: file:DANRE/gpat3/gpat3-deep-research-falcon.md
  title: Falcon deep research report on zebrafish gpat3 (Q6DG38)
  findings:
  - statement: |
      The best-supported molecular function for zebrafish gpat3 is an acyl-CoA-dependent
      lysophosphatidic acid acyltransferase (AGPAT/LPAAT) activity, inferred from the human
      ortholog AGPAT10/GPAT3, which directly catalyzes LPA + acyl-CoA to phosphatidic acid (PA).
    supporting_text: |-
      zebrafish **gpat3 (Q6DG38)** encodes an ER/microsome-associated acyltransferase in the GPAT/AGPAT superfamily that likely participates in **PA production** for glycerolipid synthesis. The strongest direct enzymology in the retrieved corpus comes from the human ortholog labeled **AGPAT10/GPAT3**, which catalyzes **LPA + acyl-CoA → PA + CoA**
  - statement: |
      Substrate specificity (ortholog-based): activity is strongest with 1-oleoyl-LPA as the
      acyl acceptor and oleoyl-CoA (C18:1) as the acyl donor, with strong selectivity for the
      LPA headgroup over other lysophospholipids (LPS, LPC, LPE, LPG, LPI).
    supporting_text: |-
      activity was strongest with **1-oleoyl-LPA** as acyl acceptor and **oleoyl-CoA (C18:1)** as acyl donor. Several alternative LPA acceptors (e.g., C16:0, C18:3, C20:4) produced ~50% lower activity than 1-oleoyl-LPA in the reported assays
  - statement: |
      Subcellular localization is the endoplasmic reticulum: the human AGPAT10/GPAT3-GFP fusion
      shows an ER-like pattern and colocalizes with the ER marker Sec61-beta; zebrafish ER
      localization is inferred from ortholog/family evidence.
    supporting_text: |-
      an AGPAT10/GPAT3-GFP fusion displayed an ER-like pattern and colocalized with an ER marker (Sec61-β), and AGPAT9-family GFP fusions colocalized with multiple ER markers and with AGPAT1 in CHO cells
  - statement: |
      Nomenclature caveat: some isoforms historically labeled GPAT3 behave primarily as AGPAT
      (LPA acyltransferase) in vitro, producing PA from LPA rather than LPA from G3P, with no
      detectable GPAT activity in the assay system tested. This underlies the dual EC
      (2.3.1.15 / 2.3.1.51) and GPAT3-vs-AGPAT10 naming for Q6DG38.
    supporting_text: |-
      some isoforms historically labeled “GPAT3” have been experimentally observed to behave primarily as **AGPAT (LPA acyltransferase)** under certain assay systems, producing PA from LPA rather than producing LPA from G3P; this is the basis of the AGPAT10/GPAT3 dual naming
  - statement: |
      The GPAT/AGPAT family shares conserved acyltransferase motifs, including the catalytic
      HXXXXD motif, supporting domain-level functional inference for zebrafish gpat3 (UniProt
      lists Plipid/glycerol_acylTrfase / PF01553 and LPCAT1-like features).
    supporting_text: |-
      GPAT/AGPAT-family enzymes share conserved acyltransferase sequence motifs, including the catalytic **HXXXXD** motif, and additional motifs involved in acceptor/donor recognition
  - statement: |
      Phosphatidic acid produced by this pathway is a central intermediate for triacylglycerol
      (TAG) and glycerophospholipid synthesis, consistent with the triglyceride and
      CDP-diacylglycerol biosynthetic process annotations.
    supporting_text: |-
      PA is a central intermediate for synthesis of **triacylglycerol (TAG)** and glycerophospholipids
  - statement: |
      Direct zebrafish evidence is limited to pathway-level/transcriptomic data: in a
      tango2-deficient zebrafish model of rhabdomyolysis susceptibility, gpat3 expression is
      normal at baseline but decreases under extrinsic stressors (caffeine or mechanical
      loading), linking gpat3 to membrane/glycerolipid homeostasis under stress.
    supporting_text: |-
      **gpat3 expression is reported as normal at baseline** but shows **decreased expression under extrinsic stressors** (caffeine or mechanical loading)
  - statement: |
      Ortholog-based kinetic parameters provide quantitative support: human AGPAT10/GPAT3
      activity was about ~2 nmol/min/mg in lysates, with Km(acyl-CoA) 2.7 mM, Vmax 60 nmol/min/mg
      and Km(LPA) 9.2 mM, Vmax 14.19 nmol/min/mg.
    supporting_text: |-
      **Km(acyl-CoA) = 2.7 mM; Vmax = 60 nmol/min/mg** and **Km(LPA) = 9.2 mM; Vmax = 14.19 nmol/min/mg**
