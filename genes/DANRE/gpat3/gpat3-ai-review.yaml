description: gpat3 encodes an endoplasmic-reticulum membrane acyltransferase that initiates glycerolipid synthesis by acylating glycerol-3-phosphate and can also acylate lysophosphatidic acid. Its core role is ER glycerolipid/phospholipid and triacylglycerol biosynthesis through glycerol-3-phosphate and 1-acylglycerol-3-phosphate acyltransferase reactions.
existing_annotations:
- term:
    id: GO:0003841
    label: 1-acylglycerol-3-phosphate O-acyltransferase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  review:
    summary: |-
      1-acylglycerol-3-phosphate O-acyltransferase activity (GO:0003841) is reviewed for zebrafish gpat3. This lysophosphatidic acid acyltransferase activity is part of the supported ER glycerolipid biosynthesis role of GPAT3. Falcon deep research identifies this AGPAT/LPAAT activity as the best-supported, ortholog-validated molecular function: the human ortholog AGPAT10/GPAT3 directly catalyzes LPA + acyl-CoA to PA, with strongest activity using 1-oleoyl-LPA acceptor and oleoyl-CoA (C18:1) donor.
    action: ACCEPT
    reason: GPAT3 is annotated by UniProt/Rhea and orthology transfer to acylate 1-acylglycerol-3-phosphate to phosphatidate; this is a specific supported catalytic activity rather than a generic parent term. Ortholog biochemistry supports this as the primary catalytic activity.
    supported_by:
    - reference_id: file:DANRE/gpat3/gpat3-uniprot.txt
      supporting_text: 'FUNCTION: Converts glycerol-3-phosphate to 1-acyl-sn-glycerol-3-phosphate.'
    - reference_id: file:DANRE/gpat3/gpat3-deep-research-falcon.md
      supporting_text: |-
        The strongest direct enzymology in the retrieved corpus comes from the human ortholog labeled **AGPAT10/GPAT3**, which catalyzes **LPA + acyl-CoA → PA + CoA**
    - reference_id: file:DANRE/gpat3/gpat3-deep-research-falcon.md
      supporting_text: |-
        activity was strongest with **1-oleoyl-LPA** as acyl acceptor and **oleoyl-CoA (C18:1)** as acyl donor
- term:
    id: GO:0004366
    label: glycerol-3-phosphate O-acyltransferase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  review:
    summary: |-
      glycerol-3-phosphate O-acyltransferase activity (GO:0004366) is reviewed for zebrafish gpat3. The annotation is consistent with the curated UniProt/GOA record and the synthesized function of glycerol-3-phosphate acyltransferase 3. Falcon deep research highlights a nomenclature caveat: the human ortholog AGPAT10/GPAT3 behaved primarily as an AGPAT (LPA acyltransferase) with no detectable GPAT activity in the assay system tested. The GPAT3 name and EC 2.3.1.15 are retained by UniProt, and no zebrafish-specific enzymology refutes G3P acyltransferase activity, so the annotation is kept but flagged for the dual GPAT/AGPAT ambiguity.
    action: ACCEPT
    reason: This term directly reflects the supported glycerol-3-phosphate acyltransferase 3 role; UniProt retains EC 2.3.1.15 for Q6DG38. The AGPAT-vs-GPAT ambiguity is a caveat (ortholog assays showed AGPAT activity and no detectable GPAT activity) but no zebrafish data contradicts the GPAT assignment, so the annotation is retained.
    supported_by:
    - reference_id: file:DANRE/gpat3/gpat3-uniprot.txt
      supporting_text: 'FUNCTION: Converts glycerol-3-phosphate to 1-acyl-sn-glycerol-3-phosphate.'
    - reference_id: file:DANRE/gpat3/gpat3-deep-research-falcon.md
      supporting_text: |-
        some isoforms historically labeled “GPAT3” have been experimentally observed to behave primarily as **AGPAT (LPA acyltransferase)** under certain assay systems, producing PA from LPA rather than producing LPA from G3P
    - reference_id: file:DANRE/gpat3/gpat3-deep-research-falcon.md
      supporting_text: |-
        noted lack of detectable GPAT activity in that assay system
