  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  review:
    summary: 1-acylglycerol-3-phosphate O-acyltransferase activity (GO:0003841) is reviewed for zebrafish gpat3. This lysophosphatidic acid acyltransferase activity is part of the supported ER glycerolipid biosynthesis role of GPAT3.
    action: ACCEPT
    reason: GPAT3 is annotated by UniProt/Rhea and orthology transfer to acylate 1-acylglycerol-3-phosphate to phosphatidate; this is a specific supported catalytic activity rather than a generic parent term.
    supported_by:
    - reference_id: file:DANRE/gpat3/gpat3-uniprot.txt
      supporting_text: 'FUNCTION: Converts glycerol-3-phosphate to 1-acyl-sn-glycerol-3-phosphate.'
