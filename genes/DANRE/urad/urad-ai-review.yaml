id: A1L259
gene_symbol: urad
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:7955
  label: Danio rerio
description: |-
  urad encodes peroxisomal OHCU decarboxylase (EC 4.1.1.97), the enzyme that stereoselectively decarboxylates 2-oxo-4-hydroxy-4-carboxy-5-ureidoimidazoline (OHCU) to (S)-allantoin (releasing CO2). It is the third and final enzyme of the three-step uricolysis pathway (urate oxidase -> HIU hydrolase -> OHCU decarboxylase), acting downstream of urate oxidase to convert poorly soluble urate into more soluble allantoin. The zebrafish enzyme is a homodimer with a novel all-alpha fold and a cofactorless mechanism in which His67 (proton donor controlling stereoselective (S)-allantoin formation), Glu87 (carboxylate destabilization promoting CO2 release) and Arg161 are essential for catalysis. The core role is peroxisomal urate catabolism/allantoin metabolism; in zebrafish the protein carries a weak-but-functional C-terminal PTS1 (TKL) and shows partial peroxisomal plus cytoplasmic localization.
