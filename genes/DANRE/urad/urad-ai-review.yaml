- id: PMID:17428786
  title: |-
    The structure of 2-oxo-4-hydroxy-4-carboxy-5-ureidoimidazoline decarboxylase provides insights into the mechanism of uric acid degradation.
  findings:
  - statement: |-
      The zebrafish OHCU decarboxylase catalyzes the last step of urate degradation, producing (S)-allantoin; this is the primary reference cited by UniProt for the enzyme function.
    supporting_text: |-
      the homodimeric
      2-oxo-4-hydroxy-4-carboxy-5-ureidoimidazoline decarboxylase, which catalyzes the
      last step in the urate degradation pathway
    reference_section_type: ABSTRACT
  - statement: |-
      The enzyme is a homodimer in which each monomer has ten alpha-helices in a novel fold.
    supporting_text: |-
      Each
      monomer comprises ten alpha-helices, grouped into two domains and assembled in a
      novel fold.
    reference_section_type: ABSTRACT
  - statement: |-
      Mutational analysis identifies His-67 and Glu-87 as residues essential for catalysis, with Glu-87 promoting decarboxylation and His-67 controlling stereoselective (S)-allantoin formation.
    supporting_text: |-
      His-67 and Glu-87 appear to play a particularly significant role. Glu-87
      may facilitate the exit of the carboxylate group because of electrostatic
      repulsion that destabilizes the ground state of the substrate, whereas His-67 is
      likely to be involved in a protonation step leading to the stereoselective
      formation of the (S)-allantoin enantiomer as reaction product.
    reference_section_type: ABSTRACT
