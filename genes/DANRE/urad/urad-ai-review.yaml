description: urad encodes peroxisomal OHCU decarboxylase, the enzyme that stereoselectively decarboxylates 2-oxo-4-hydroxy-4-carboxy-5-ureidoimidazoline during urate degradation to allantoin. The core role is peroxisomal urate catabolism/allantoin metabolism.
