description: pex2 encodes a peroxisomal membrane peroxin and RING-family E3 ubiquitin ligase. As part of the peroxisomal import/receptor recycling machinery, it ubiquitinates peroxisomal import receptors and supports peroxisome organization, matrix protein import, and pexophagy-related quality control.
