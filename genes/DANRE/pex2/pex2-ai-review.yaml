- id: file:DANRE/pex2/pex2-deep-research-falcon.md
  title: Falcon deep research on Danio rerio pex2 (Edison Scientific Literature)
  findings:
  - statement: |-
      Zebrafish Pex2 is a peroxisomal membrane peroxin and RING-finger E3 ubiquitin ligase that assembles with PEX10 and PEX12 into the membrane-embedded PEX2-PEX10-PEX12 ubiquitin ligase complex.
    supporting_text: |-
      **PEX2** is a **peroxisomal membrane peroxin** that is part of a membrane-embedded **RING-finger E3 ubiquitin ligase complex** with **PEX10 and PEX12** (often written **PEX2–PEX10–PEX12**)
    reference_section_type: OTHER
  - statement: |-
      The principal substrate of the PEX2 E3 ligase activity in the import cycle is the PEX5 import receptor, which is monoubiquitinated on a conserved N-terminal cysteine to enable receptor recycling.
    supporting_text: |-
      The principal, best-supported substrate in the import cycle is the **PEX5 import receptor**, which is **monoubiquitinated** on the conserved N-terminal cysteine to enable recycling
    reference_section_type: OTHER
  - statement: |-
      Ubiquitin topology dictates receptor fate: PEX2-mediated monoubiquitination supports PEX5 recycling, whereas polyubiquitination targets stalled receptors for quality-control degradation.
    supporting_text: |-
      monoubiquitination supports recycling, while polyubiquitination is associated with quality control and degradation of stalled receptors
    reference_section_type: OTHER
  - statement: |-
      The PEX2-PEX10-PEX12 complex forms a retrotranslocon: each subunit contributes five transmembrane segments forming an ~10 Angstrom pore, with the three RING fingers forming a cytosolic tower above the pore.
    supporting_text: |-
      each subunit contributes five transmembrane segments**, forming a pore with an **open diameter of ~10 Å**, and the three RING fingers form a **cytosolic tower**
    reference_section_type: OTHER
  - statement: |-
      Ubiquitin marks deposited on peroxisomal proteins by the PEX2/10/12 machinery can act as a pexophagy signal, linking matrix protein import quality control to selective autophagy of peroxisomes.
    supporting_text: |-
      Ubiquitin marks on peroxisomal proteins can signal **pexophagy** (selective autophagy of peroxisomes)
    reference_section_type: OTHER
  - statement: |-
      Zebrafish pex2 loss-of-function (TALEN-generated) produces ghost peroxisomes lacking normal matrix content, recapitulating a Zellweger spectrum disorder model; zebrafish Pex2 is ~57% identical to human PEX2.
    supporting_text: |-
      **Peroxisomal matrix protein import disruption** and “**ghost peroxisomes**” (peroxisomal membrane remnants lacking normal matrix content and activity)
    reference_section_type: OTHER
