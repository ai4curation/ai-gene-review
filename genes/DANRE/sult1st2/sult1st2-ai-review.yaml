- id: file:DANRE/sult1st2/sult1st2-deep-research-falcon.md
  title: Falcon deep research report on zebrafish sult1st2 (SULT1 ST2, Q7ZUS4)
  findings:
  - statement: |-
      Falcon confirms zebrafish SULT1 ST2 (sult1st2/Q7ZUS4) is a cytosolic, PAPS-dependent
      SULT1-family sulfotransferase that catalyzes O-sulfation of diverse phenolic substrates,
      and explicitly disambiguates it from the distinct SULT2 ST2 family member.
    reference_section_type: OTHER
    supporting_text: |-
      sult1st2 encodes a **cytosolic, PAPS-dependent SULT1-family sulfotransferase** capable of sulfating diverse phenolic substrates, with particularly strong activity toward **estrone** and measurable activity/kinetics toward **thyroid hormones (T3/T4)** and **environmental phenolic xenobiotics** such as hydroxychlorobiphenyls.
  - statement: |-
      The enzyme transfers a sulfonyl group from the universal donor PAPS to small molecules
      with hydroxyl/amino groups, typically increasing water solubility and promoting excretion.
    reference_section_type: OTHER
    supporting_text: |-
      transfer of a sulfonyl group from the universal sulfate donor **PAPS (3′-phosphoadenosine-5′-phosphosulfate)** to small molecules containing hydroxyl or amino groups
  - statement: |-
      Conserved 5'-phosphosulfate-binding and 3'-phosphate-binding motifs provide mechanistic
      evidence that sult1st2 is a functional PAPS-dependent cytosolic SULT enzyme.
    reference_section_type: OTHER
    supporting_text: |-
      These motifs provide mechanistic evidence that sult1st2 encodes a functional PAPS-dependent cytosolic SULT enzyme.
  - statement: |-
      In vitro recombinant SULT1 ST2 shows high specific activity toward estrone and measurable
      activity toward thyroid hormones T3/T4, plus flavonoids, 2-naphthol, and hydroxychlorobiphenyls,
      supporting roles in endocrine hormone metabolism and xenobiotic detoxification.
    reference_section_type: OTHER
    supporting_text: |-
      these data support a central role for sult1st2 in **phenolic xenobiotic sulfation** and in modulating endocrine molecules including **estrogens and thyroid hormones**.
  - statement: |-
      SULT1 ST2 sulfates hydroxychlorobiphenyls with low-micromolar Km, and zebrafish liver cells
      form and release sulfated conjugates of these xenobiotics, supporting a detoxification/elimination role.
    reference_section_type: OTHER
    supporting_text: |-
      supporting a role in **detoxification/inactivation and elimination** of environmental phenolic pollutants.
  - statement: |-
      The best-supported localization is intracellular cytosol, consistent with cloning/biochemistry
      describing the enzyme as a cytosolic SULT1, with soluble ~35 kDa recombinant expression.
    reference_section_type: OTHER
    supporting_text: |-
      the current best-supported localization is **intracellular cytosol**, plausibly in metabolically active tissues such as liver.
  - statement: |-
      RT-PCR detected SULT1 ST2 mRNA in cultured zebrafish liver cells and whole zebrafish,
      consistent with a hepatic/organismal metabolic role.
    reference_section_type: OTHER
    supporting_text: |-
      RT-PCR detected **SULT1 ST2 mRNA** in both **cultured zebrafish liver cells** and **whole zebrafish** samples.
  - statement: |-
      The only in vivo perturbation phenotype in the corpus is a morpholino knockdown of SULT2 ST2,
      a different family member whose phenotype must not be transferred to sult1st2.
    reference_section_type: OTHER
    supporting_text: |-
      A morpholino knockdown phenotype was found for **SULT2 ST2**, but this is a **different gene family member** and cannot be transferred to sult1st2.
