- id: file:DANRE/grk7b/grk7b-deep-research-falcon.md
  title: Falcon deep research report on zebrafish grk7b (Q1XHL7)
  findings:
  - statement: |
      grk7b is one of two zebrafish GRK7 paralogs (grk7a and grk7b), a cone/opsin
      kinase of the retinal GRK family. An anti-GRK7 antibody detects recombinant
      Grk7a and Grk7b but not Grk1, confirming grk7b is a bona fide GRK7-family
      opsin kinase rather than an unrelated protein with a similar symbol.
    supporting_text: |-
      Multiple zebrafish studies explicitly document that zebrafish possess **two GRK7 paralogs, grk7a and grk7b**, consistent with UniProt’s naming and with teleost genome duplication.
  - statement: |
      GRK7 proteins are retinal opsin kinases that phosphorylate activated visual
      pigments (opsins) in photoreceptors to promote termination and recovery of
      phototransduction, with grk7b assigned a serine/threonine opsin-kinase
      molecular function acting on photoactivated cone opsins.
    supporting_text: |-
      GRK7 proteins are **retinal G protein–coupled receptor kinases** (“opsin kinases”) that act in photoreceptors by **phosphorylating activated visual pigments (opsins)** to promote termination/recovery of phototransduction.
  - statement: |
      GRK7-family activity sits in the phototransduction recovery/termination
      module, upstream of return to baseline electrical state and completion of
      response recovery.
    supporting_text: |-
      GRK7-family activity sits in the **phototransduction recovery/termination module**, upstream of return to baseline electrical state and completion of response recovery.
  - statement: |
      The strongest direct retinal evidence for grk7b is transcriptomic: in an
      adult zebrafish photoreceptor scRNA-seq atlas, grk7b is enriched in UV cones,
      supporting a UV-cone phototransduction role.
    supporting_text: |-
      A high-confidence, gene-specific finding is that **grk7b is enriched in adult UV cones**.
  - statement: |
      Larval retinal GRK7 signal is dominated by grk7a, not grk7b; most direct
      loss-of-function cone-recovery phenotypes in larvae are attributed to grk7a,
      so strong larval phenotypes should not be assigned to grk7b without direct
      evidence.
    supporting_text: |-
      In larval zebrafish, multiple lines of evidence indicate **grk7a is the predominant cone-expressed GRK7 paralog during early development**, while grk7b expression is comparatively low in photoreceptors at these stages.
  - statement: |
      grk7b transcripts are detected in zebrafish pineal tissue by in situ
      hybridization, but grk7b knockdown does not have a remarkable effect on
      parapinopsin photoproduct inactivation, suggesting grk7b is not the primary
      kinase in that pineal context.
    supporting_text: |-
      Functionally, however, for pineal parapinopsin photoproduct inactivation, **GRK7a** knockdown slows recovery while **GRK7b** knockdown does **not** show a remarkable effect, suggesting grk7b is not the primary kinase for that pineal assay context.
  - statement: |
      GRK7-family kinase activity is modulated by cAMP/PKA-dependent
      phosphorylation; PKA phosphorylation inhibits rhodopsin kinase activity,
      proposed to downregulate GRKs in darkness when cAMP is elevated.
    supporting_text: |-
      GRK1 and GRK7 are **PKA-phosphorylated** and that phosphorylation **inhibits rhodopsin kinase activity**, proposed as a mechanism to downregulate GRKs in darkness when cAMP is elevated; it further notes paralog/cell-type specificity (e.g., zebrafish cones show cAMP downregulates GRK7 but not cone GRK1b).
  - statement: |
      A key annotation caveat: many GRK7 biochemical and phosphorylation assays use
      antibodies that recognize both GRK7 paralogs, so they are largely
      paralog-nonresolving for grk7b specifically.
    supporting_text: |-
      Many biochemical and phosphorylation assays use antibodies that recognize **both GRK7 paralogs**, limiting paralog-resolved conclusions for phosphorylation state and abundance.
