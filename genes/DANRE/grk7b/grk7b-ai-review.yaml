  label: Danio rerio
description: grk7b encodes a cone/retina-enriched G protein-coupled receptor kinase that phosphorylates light-activated rhodopsin/opsin receptors to promote shutoff of phototransduction signaling. Its core activity is ATP-dependent rhodopsin kinase activity associated with membranes/cytoplasm in retinal photoreceptor signaling.
