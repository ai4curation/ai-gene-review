    reason: |-
      grk7b is a rhodopsin kinase that acts on light-activated opsins residing in the photoreceptor outer-segment membrane. Membrane (GO:0016020, already ACCEPTed) is the more appropriate and specific cellular component for this membrane-associated kinase, so the generic cytoplasm annotation is retained as non-core context rather than the core localization.
