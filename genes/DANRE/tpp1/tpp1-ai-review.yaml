  title: A model of tripeptidyl-peptidase I (CLN2), a ubiquitous and highly conserved member of the sedolisin family of serine-carboxyl
    peptidases.
  findings:
  - statement: TPP-I/CLN2 is a member of the sedolisin family of serine-carboxyl peptidases, and its loss causes a fatal neurodegenerative
      disease (late-infantile neuronal ceroid lipofuscinosis).
    supporting_text: defects in expression of this enzyme lead to a fatal neurodegenerative disease
  - statement: CLN2 orthologs are highly conserved and widely distributed across eukaryotes, including closely related but distinct
      enzymes present in fish such as zebrafish.
    supporting_text: Closely related, although clearly distinct, enzymes are present in fish
