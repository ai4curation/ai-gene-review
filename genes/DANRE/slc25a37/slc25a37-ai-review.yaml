- id: file:DANRE/slc25a37/slc25a37-deep-research-falcon.md
  title: Falcon deep research report on Danio rerio slc25a37 / mitoferrin-1
  findings:
  - statement: |-
      Mitoferrin-1 (Slc25a37/Mfrn1) is an SLC25/mitochondrial carrier family transporter of the inner mitochondrial membrane
      that imports iron into mitochondria, especially in erythroid cells, to supply heme biosynthesis and Fe-S cluster
      biogenesis.
    reference_section_type: OTHER
    supporting_text: |-
      imports iron into mitochondria, especially in erythroid cells where mitochondrial iron demand is high for **heme biosynthesis** and **iron–sulfur (Fe–S) cluster biogenesis**
  - statement: |-
      The primary molecular function is iron import across the mitochondrial inner membrane to supply iron for heme and
      Fe-S cluster synthesis, including the ferrochelatase (FECH) step that inserts ferrous iron into protoporphyrin IX.
    reference_section_type: OTHER
    supporting_text: |-
      The primary molecular function is **iron transport into mitochondria** (import across the mitochondrial inner membrane into the matrix-facing compartment) to supply iron for heme and Fe–S cluster synthesis.
  - statement: |-
      Mitoferrin-1 belongs to the mitochondrial carrier family and operates via the canonical alternating-access carrier
      mechanism characteristic of SLC25 carriers.
    reference_section_type: OTHER
    supporting_text: |-
      Mitoferrin-1 belongs to the **mitochondrial carrier family** and is described as operating via a canonical **alternating-access carrier mechanism**
  - statement: |-
      Slc25a37/Mfrn1 product localizes to the mitochondrial inner membrane and functions in erythroid mitochondria.
    reference_section_type: OTHER
    supporting_text: |-
      Mitoferrin-1 is consistently described as a **mitochondrial inner membrane** protein in erythroid mitochondria.
  - statement: |-
      Zebrafish frascati (frs) mutants, caused by mutation in mfrn1/slc25a37, exhibit hypochromic anemia and erythroid
      maturation arrest; mouse Mfrn1 can complement the zebrafish frascati phenotype, indicating deep functional
      conservation.
    reference_section_type: OTHER
    supporting_text: |-
      exhibit **hypochromic anemia** and **erythroid maturation arrest**
