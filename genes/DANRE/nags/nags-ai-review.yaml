- term:
    id: GO:0034618
    label: arginine binding
  evidence_type: IDA
  original_reference_id: PMID:24465614
  review:
    summary: arginine binding (GO:0034618) is reviewed for zebrafish nags. This annotation is biologically plausible, but it is not the most informative core function for nags. Falcon deep research clarifies that arginine binding occurs via the AAK-related region and acts allosterically (partially inhibiting zebrafish NAGS, in contrast to activation of mammalian NAGS), confirming this is a regulatory rather than catalytic property.
    action: KEEP_AS_NON_CORE
    reason: 'Arginine binding is a regulatory property of NAGS rather than the catalytic core function. Direct publication support: L-arginine is a regulatory ligand for zebrafish NAGS.'
