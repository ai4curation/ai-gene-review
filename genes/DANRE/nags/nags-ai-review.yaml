    label: L-arginine biosynthetic process
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: L-arginine biosynthetic process (GO:0006526) is reviewed for zebrafish nags. This annotation is biologically plausible, but it is not the most informative core function for nags. Falcon deep research notes that the early zebrafish expression of nags with other urea-cycle genes supports a contribution to citrulline/arginine biosynthesis during development, consistent with keeping this as a non-core, developmentally relevant process.
    action: KEEP_AS_NON_CORE
    reason: L-arginine biosynthetic process is phylogenetically plausible for some NAGS homologs, but in vertebrates NAGS primarily supports ureagenesis through N-acetylglutamate production; retain as non-core rather than making it the main process.
