id: E7FCP8
gene_symbol: nags
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:7955
  label: Danio rerio
description: nags encodes mitochondrial N-acetylglutamate synthase, which produces N-acetylglutamate from L-glutamate and acetyl-CoA. In vertebrates, N-acetylglutamate is the essential allosteric activator of carbamoyl phosphate synthetase I, linking NAGS activity to urea-cycle/ureagenesis regulation; the enzyme is allosterically regulated by L-arginine.
