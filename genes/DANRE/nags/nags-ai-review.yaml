    summary: mitochondrial matrix (GO:0005759) is reviewed for zebrafish nags. The annotation is consistent with the curated UniProt/GOA record and the synthesized function of N-acetylglutamate synthase. Falcon deep research confirms vertebrate NAGS, including zebrafish, is mitochondrial, consistent with N-acetylglutamate activating the mitochondrial CPS enzymes of nitrogen metabolism.
