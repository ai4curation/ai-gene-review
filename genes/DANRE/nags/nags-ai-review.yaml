    label: urea cycle
  evidence_type: IC
  original_reference_id: PMID:24465614
  review:
    summary: New annotation for the urea cycle based on the reviewed UniProt function of zebrafish N-acetylglutamate synthase. Falcon deep research corroborates that the NAGS product N-acetylglutamate is an obligatory allosteric activator of the regulatory carbamoyl phosphate synthetase of the urea-cycle system, directly linking NAGS activity to ureagenesis.
    action: NEW
    reason: In vertebrates, NAGS produces N-acetylglutamate, the required allosteric activator of mitochondrial carbamoyl phosphate synthetase I, so its catalytic activity directly supports ureagenesis/urea-cycle function. Use IC because this proposed annotation is curator-inferred from the zebrafish publication together with the UniProt functional summary and GO cross-reference, not copied as an automated IEA assertion.
    supported_by:
