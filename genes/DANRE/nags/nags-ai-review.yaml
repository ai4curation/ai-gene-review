- id: file:DANRE/nags/nags-deep-research-falcon.md
  title: Falcon deep research on zebrafish nags / NAGS (Edison Scientific Literature)
  findings:
  - statement: |-
      Zebrafish NAGS catalyzes formation of N-acetyl-L-glutamate from L-glutamate and acetyl-CoA (EC 2.3.1.1), the canonical N-acetylglutamate synthase reaction.
    supporting_text: |-
      catalyzes formation of **N-acetyl-L-glutamate (NAG)** from **L-glutamate** and **acetyl-CoA**
    reference_section_type: OTHER
  - statement: |-
      The NAGS product N-acetylglutamate is an obligatory allosteric activator of the regulatory carbamoyl phosphate synthetase in the urea-cycle system, so NAGS function is best understood as controlling NAG supply to enable CPS activity.
    supporting_text: |-
      NAG is an **obligatory allosteric activator** of the first, regulatory carbamoyl phosphate synthetase in the urea-cycle system
    reference_section_type: OTHER
  - statement: |-
      Vertebrate NAGS, including zebrafish, is localized to mitochondria, where N-acetylglutamate activates the mitochondrial CPS enzymes of nitrogen metabolism.
    supporting_text: |-
      Vertebrate NAGS is localized to **mitochondria**, consistent with NAG activating mitochondrial CPS enzymes
    reference_section_type: OTHER
  - statement: |-
      In zebrafish, L-arginine partially inhibits NAGS via the AAK-related regulatory region, an evolutionary intermediate state contrasting with arginine activation of mammalian NAGS.
    supporting_text: |-
      L-arginine partially inhibits zebrafish NAGS**—contrasting with **activation in mammals
    reference_section_type: OTHER
  - statement: |-
      Zebrafish nags mRNA is maternally contributed and detectable by the 32-cell stage, with high expression across the first ~4 days of development alongside other urea-cycle genes, supporting an early developmental nitrogen-metabolic role.
    supporting_text: |-
      nags mRNA** is detected very early (maternal contribution; present by the **32-cell stage**) and is **highly expressed through the first ~4 days of development
    reference_section_type: OTHER
  - statement: |-
      In vertebrate NAGS, the GNAT/NAT domain mediates substrate binding and catalysis while the AAK domain mediates arginine-dependent allosteric regulation.
    supporting_text: |-
      the **AAK domain** mediates arginine activation, whereas the **GNAT/NAT domain** mediates catalysis/substrate binding
    reference_section_type: OTHER
