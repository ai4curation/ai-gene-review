- id: file:DANRE/hs6st2/hs6st2-deep-research-falcon.md
  title: Falcon deep research report on Danio rerio hs6st2
  findings:
  - statement: |-
      hs6st2 is a heparan-sulfate D-glucosaminyl 6-O-sulfotransferase that transfers sulfate
      from PAPS to the 6-O position of glucosamine residues in heparan sulfate, with a
      preference for N-sulfoglucosamine (GlcNS)-containing acceptor structures.
    reference_section_type: OTHER
    supporting_text: |-
      that catalyzes **transfer of sulfate from PAPS** to the **6-O position of glucosamine residues** in heparan sulfate (HS), with experimentally demonstrated preferences for **N-sulfoglucosamine (GlcNS)–containing** acceptor structures
  - statement: |-
      The enzyme is a type II transmembrane Golgi protein, acting in the secretory pathway
      where heparan sulfate chains are synthesized and modified.
    reference_section_type: OTHER
    supporting_text: |-
      This enzyme is a **type II transmembrane Golgi protein**, positioning it in the secretory pathway where HS chains are synthesized and modified
  - statement: |-
      In vitro the recombinant zebrafish enzyme strongly prefers the highly N-sulfated
      heparin derivative CDSNS-heparin and has negligible activity on chondroitin,
      defining its acceptor specificity.
    reference_section_type: OTHER
    supporting_text: |-
      Strong preference for CDSNS-heparin; lower activity on NS-heparosan and native HS; negligible activity on CDSNAc-heparin, 6ODS-heparin, and chondroitin
  - statement: |-
      Heterologous overexpression of zebrafish hs6st increases HS 6-O-sulfotransferase
      activity, confirming the catalytic assignment.
    reference_section_type: OTHER
    supporting_text: |-
      In COS-7 cells, transfection with zebrafish hs6st increased HS6ST activity from **1.3 ± 0.1** to **4.2 ± 0.1 pmol/min/mg protein**
  - statement: |-
      In zebrafish embryos hs6st2 is required for caudal-vein plexus remodeling and
      vascular branching, with reduced tie-1/tie-2 expression during remodeling; these
      are developmental consequences of altered heparan sulfate 6-O-sulfation.
    reference_section_type: OTHER
    supporting_text: |-
      hs6st2 morphants show reduced branching and abnormal remodeling, including large loops or even a lack of branching with disorganized, overlumenized vessels; tie-1 and tie-2 expression in caudal vein is reduced during remodeling
  - statement: |-
      hs6st2 morphants display abnormal hyaloid/retinal vasculature patterning.
    reference_section_type: OTHER
    supporting_text: |-
      hyaloid vasculature with scarce and oversized branches that display an aberrant patterning
