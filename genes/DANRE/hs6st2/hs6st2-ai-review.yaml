  title: Heparan sulfate 6-o-sulfotransferase is essential for muscle development in zebrafish.
  findings:
  - statement: Zebrafish hs6st encodes a heparan sulfate 6-O-sulfotransferase with specific enzymatic activity.
    supporting_text: the protein shows specific 6-O-sulfotransferase activity
  - statement: Morpholino loss reduces heparan sulfate 6-O-sulfation.
    supporting_text: Morpholino injections significantly inhibited 6-O- but not 2-O-sulfation
- id: PMID:16009360
  title: A unique role for 6-O sulfation modification in zebrafish vascular development.
  findings:
  - statement: Hs6st2 is required for caudal-vein branching morphogenesis in zebrafish embryos.
    supporting_text: HS6ST-2 is required for the branching morphogenesis
- id: PMID:17937808
  title: Genetic determinants of hyaloid and retinal vasculature in zebrafish.
  findings:
  - statement: Hs6st2 morphants have abnormal hyaloid vascular branching.
    supporting_text: Hyaloid vasculature with scarce andoversized branches
