      Zebrafish rcbtb1 knockdown results in anomalies in intersegmental and intraocular
      vessels, supporting a role in angiogenesis through the Norrin-dependent Wnt pathway.
    supporting_text: >-
      transgenic fli1:EGFP zebrafish with rcbtb1 knockdown exhibited anomalies in intersegmental and intraocular vessels

core_functions:
- molecular_function:
    id: GO:0005109
    label: frizzled binding
  description: >-
    Norrin is a secreted cystine-knot protein that functions as a high-affinity ligand for the
    Frizzled-4 receptor (FZD4). Through FZD4 binding, Norrin activates the canonical Wnt/beta-catenin
    signaling pathway in concert with LRP5/6 coreceptors and TSPAN12. This signaling promotes
    retinal vascular development, and loss of Norrin function causes familial exudative
    vitreoretinopathy and Norrie disease. In zebrafish, ndp morpholino knockdown confirms
    a conserved role in retinal vasculature development.
