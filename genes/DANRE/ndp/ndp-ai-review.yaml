gene_symbol: ndp
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:7955
  label: Danio rerio
description: >-
  Norrin (ndp) is a secreted cystine-knot protein that functions as a non-Wnt ligand for the
  Frizzled-4 (FZD4) receptor. It activates the canonical Wnt/beta-catenin signaling pathway
  through FZD4 and LRP5/6 coreceptors, in concert with TSPAN12. Norrin plays a central role
  in retinal vascular development, and mutations in the human ortholog NDP cause Norrie disease,
  familial exudative vitreoretinopathy (FEVR), and related retinal vasculopathies. In zebrafish,
  morpholino knockdown of ndp results in defects in retinal vasculature development, confirming
  a conserved role in eye vascular biology. Norrin is structurally related to cystine-knot
  cytokines but is functionally distinct as a Wnt pathway agonist rather than a classical cytokine.

existing_annotations:
- term:
    id: GO:0045893
    label: positive regulation of DNA-templated transcription
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      Norrin activates canonical Wnt/beta-catenin signaling, leading to stabilization of
      beta-catenin and activation of LEF/TCF-mediated transcriptional programs. This annotation
      is inferred by phylogenetic analysis from the human NDP ortholog. The positive regulation
      of transcription is a downstream consequence of Norrin signaling through FZD4/LRP5.
    action: ACCEPT
    reason: >-
      Activation of LEF/TCF-dependent transcription via beta-catenin stabilization is a
      well-established downstream effect of Norrin/FZD4 signaling. This is consistent with
      the known function of Norrin as a canonical Wnt pathway activator.

- term:
    id: GO:0005109
    label: frizzled binding
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      Norrin binds FZD4 with high affinity as its cognate receptor. This molecular function
      is central to Norrin's biological role and is well established from studies of the
      human ortholog. Phylogenetic inference from human NDP is appropriate given the high
      sequence conservation.
    action: ACCEPT
    reason: >-
      Frizzled binding is the core molecular function of Norrin. It acts as a ligand for
      FZD4 to activate canonical Wnt signaling. This is the most informative molecular
      function annotation for this gene.

- term:
    id: GO:0005125
    label: cytokine activity
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      While Norrin is structurally classified as a cystine-knot cytokine based on its
      protein fold, it does not function as a classical cytokine. Norrin acts as a
      Wnt pathway agonist through FZD4 binding, not through cytokine receptors. The
      structural classification does not reflect its actual molecular function.
    action: MODIFY
    reason: >-
      Norrin has a cystine-knot cytokine fold but does not signal through cytokine
      receptors. Its actual signaling mechanism is through FZD4/LRP5 as a Wnt pathway
      agonist. The term 'cytokine activity' is misleading for Norrin's true function.
      Frizzled binding (GO:0005109) is a more accurate molecular function annotation.
    proposed_replacement_terms:
    - id: GO:0005109
      label: frizzled binding

- term:
    id: GO:0110135
    label: Norrin signaling pathway
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      Norrin is the defining ligand of the Norrin signaling pathway. This annotation is
      directly appropriate as ndp encodes the Norrin protein itself. Phylogenetic inference
      from the human NDP ortholog is well supported.
    action: ACCEPT
    reason: >-
      This is the most specific biological process annotation for Norrin, as it is the
      eponymous ligand that initiates this signaling pathway.

- term:
    id: GO:0005109
    label: frizzled binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000117
  review:
    summary: >-
      Duplicate of the IBA annotation for frizzled binding, inferred by ARBA machine
      learning. Consistent with the IBA annotation and the known molecular function
      of Norrin as a FZD4 ligand.
    action: ACCEPT
    reason: >-
      Consistent with the IBA annotation and well-established molecular function of Norrin.

- term:
    id: GO:0005125
    label: cytokine activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000117
  review:
    summary: >-
      Duplicate of the IBA annotation for cytokine activity, inferred by ARBA.
      Same concern applies: Norrin has a cytokine fold but does not function as a
      classical cytokine.
    action: MODIFY
    reason: >-
      Same reasoning as the IBA annotation. Norrin signals through FZD4/LRP5 as a
      Wnt pathway agonist, not through cytokine receptors. Frizzled binding is the
      more accurate molecular function term.
    proposed_replacement_terms:
    - id: GO:0005109
      label: frizzled binding

- term:
    id: GO:0005576
    label: extracellular region
  evidence_type: IEA
  original_reference_id: GO_REF:0000044
  review:
    summary: >-
      Norrin is a secreted protein with a signal peptide (residues 1-30) and is expected
      to localize to the extracellular region where it acts as a ligand for FZD4. This
      is consistent with UniProt annotation of secreted localization.
    action: ACCEPT
    reason: >-
      Norrin is a secreted signaling ligand. Extracellular localization is essential
      for its function as a receptor ligand for FZD4 on target cells.

- term:
    id: GO:0005615
    label: extracellular space
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  review:
    summary: >-
      This term has been marked as obsolete. While Norrin is indeed a secreted protein
      that would be found in the extracellular space, the term itself is obsolete and
      should be replaced.
    action: MODIFY
    reason: >-
      GO:0005615 is obsolete. The annotation should use the current term GO:0005576
      (extracellular region) which is already annotated.
    proposed_replacement_terms:
    - id: GO:0005576
      label: extracellular region

- term:
    id: GO:0007399
    label: nervous system development
  evidence_type: IEA
  original_reference_id: GO_REF:0000117
  review:
    summary: >-
      Norrin may be involved in neural cell differentiation and proliferation based on
      UniProt functional annotation. However, the primary well-characterized role of
      Norrin is in retinal vascular development rather than nervous system development
      per se. The nervous system involvement may reflect Norrie disease phenotypes
      (intellectual disability, hearing loss) but these are secondary to vascular defects.
    action: KEEP_AS_NON_CORE
    reason: >-
      While mutations in human NDP cause neurological symptoms in Norrie disease, the
      primary molecular function of Norrin is in Wnt signaling for vascular development.
      Nervous system effects may be secondary to vascular defects. This annotation is
      not wrong but represents a non-core, possibly secondary function.

- term:
    id: GO:0016055
    label: Wnt signaling pathway
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: >-
      Norrin activates the canonical Wnt/beta-catenin signaling pathway through FZD4
      and LRP5 coreceptors. This is a core function of Norrin, though it is a non-Wnt
      ligand that co-opts the Wnt signaling machinery. The more specific Norrin signaling
      pathway term (GO:0110135) is also annotated.
    action: ACCEPT
    reason: >-
      Wnt signaling pathway involvement is accurate as Norrin signals through Wnt pathway
      components (FZD4, LRP5, beta-catenin). The more specific term GO:0110135 (Norrin
      signaling pathway) provides additional specificity.

- term:
    id: GO:0045944
    label: positive regulation of transcription by RNA polymerase II
  evidence_type: IEA
  original_reference_id: GO_REF:0000117
  review:
    summary: >-
      This annotation is more specific than GO:0045893 (positive regulation of
      DNA-templated transcription) and specifies RNA polymerase II. Norrin signaling
      through beta-catenin/LEF/TCF activates RNA Pol II-dependent transcription.
      However, this is a very downstream consequence of Norrin signaling.
    action: KEEP_AS_NON_CORE
    reason: >-
      While accurate that Norrin signaling ultimately leads to Pol II-dependent
      transcription activation, this is a downstream consequence rather than a core
      function. The Norrin signaling pathway annotation better captures the specificity.

- term:
    id: GO:0110135
    label: Norrin signaling pathway
  evidence_type: IEA
  original_reference_id: GO_REF:0000117
  review:
    summary: >-
      Duplicate of the IBA annotation for Norrin signaling pathway, inferred by ARBA.
      Fully consistent with the core function of Norrin as the pathway-defining ligand.
    action: ACCEPT
    reason: >-
      Consistent with the IBA annotation. Norrin is the defining ligand of this pathway.

- term:
    id: GO:0061298
    label: retina vasculature development in camera-type eye
  evidence_type: IMP
  original_reference_id: PMID:26908610
  review:
    summary: >-
      This annotation is based on morpholino knockdown experiments in zebrafish. The
      study by Wu et al. (2016) demonstrated that knockdown of ndp and other FEVR-related
      genes results in retinal vascular defects in zebrafish. This is direct experimental
      evidence in zebrafish supporting the conserved role of Norrin in retinal vascular
      development.
    action: ACCEPT
    reason: >-
      This is the strongest annotation for zebrafish ndp, based on direct experimental
      evidence (IMP) in the organism itself. Retinal vascular development is the core
      biological process for Norrin function.
    supported_by:
    - reference_id: PMID:26908610
      supporting_text: >-
        pathogenic mutations have been detected in FZD4, LRP5, TSPAN12, NDP and ZNF408
    - reference_id: PMID:26908610
      supporting_text: >-
        transgenic fli1:EGFP zebrafish with rcbtb1 knockdown exhibited anomalies in intersegmental and intraocular vessels

- term:
    id: GO:0061298
    label: retina vasculature development in camera-type eye
  evidence_type: IGI
  original_reference_id: PMID:26908610
  review:
    summary: >-
      This IGI (Inferred from Genetic Interaction) annotation reflects genetic interaction
      data from zebrafish morpholino experiments. The study demonstrated that combined
      knockdown of ndp with rcbtb1 showed genetic interaction in retinal vascular
      development.
    action: ACCEPT
    reason: >-
      The IGI evidence complements the IMP annotation, providing additional genetic
      interaction evidence for Norrin's role in retinal vascular development in zebrafish.
    supported_by:
    - reference_id: PMID:26908610
      supporting_text: >-
        transgenic fli1:EGFP zebrafish with rcbtb1 knockdown exhibited anomalies in intersegmental and intraocular vessels

