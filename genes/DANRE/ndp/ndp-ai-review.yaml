suggested_questions:
- question: >-
    Does zebrafish ndp have a role in inner ear vascular development or hearing, as seen
    in human Norrie disease patients who exhibit sensorineural hearing loss?
- question: >-
    Is zebrafish ndp expressed in the developing retinal vasculature or in surrounding
    neural tissue that signals to endothelial cells? Understanding the expression pattern
    would clarify whether Norrin acts in an autocrine or paracrine manner.
- question: >-
    Does zebrafish have a functional TSPAN12 ortholog that cooperates with ndp in
    FZD4 activation, as described in mammalian systems?

suggested_experiments:
- description: >-
    Generate ndp CRISPR knockout zebrafish lines and characterize retinal vascular
    phenotypes using confocal imaging of fli1:EGFP transgenic backgrounds. This would
    provide genetic loss-of-function evidence complementing the existing morpholino
    knockdown data.
  hypothesis: >-
    Stable ndp knockout zebrafish will show persistent retinal vascular defects similar
    to those seen with morpholino knockdown, confirming the gene's role in retinal
    vascular development.
- description: >-
    Perform in situ hybridization or single-cell RNA-seq to determine the spatial and
    temporal expression pattern of ndp during zebrafish eye development, to distinguish
    between paracrine signaling from neural tissue and autocrine signaling within
    vascular endothelium.
  hypothesis: >-
    ndp is expressed in Muller glia or other retinal neurons adjacent to developing
    vasculature, consistent with a paracrine signaling mechanism.
