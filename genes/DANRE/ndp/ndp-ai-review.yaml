  findings:
  - statement: >-
      FEVR is a genetically heterogeneous disorder of retinal vascular development, with
      pathogenic mutations in FZD4, LRP5, TSPAN12, NDP, and ZNF408.
    supporting_text: >-
      pathogenic mutations have been detected in FZD4, LRP5, TSPAN12, NDP and ZNF408
  - statement: >-
      RCBTB1 participates in the Norrin/FZD4 signaling pathway, and its knockdown reduces
      nuclear accumulation of beta-catenin.
    supporting_text: >-
      RCBTB1 participates in the Norrin/FZD4 signaling pathway and that knockdown of RCBTB1 by shRNA significantly reduced nuclear accumulation of β-catenin under Norrin and Wnt3a treatments
