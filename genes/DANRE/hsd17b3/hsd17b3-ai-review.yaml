description: hsd17b3 encodes an endoplasmic-reticulum-associated short-chain dehydrogenase/reductase that catalyzes NADPH-dependent reduction of 17-oxosteroids to 17beta-hydroxysteroids, including the conversion of androstenedione to testosterone. Its core role is testosterone/androgen biosynthesis in the ER.
