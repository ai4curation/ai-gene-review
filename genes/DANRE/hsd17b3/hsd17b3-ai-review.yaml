- id: file:DANRE/hsd17b3/hsd17b3-deep-research-falcon.md
  title: Falcon (Edison) deep research report for Danio rerio hsd17b3 (Q6QA32)
  findings:
  - statement: |-
      Zebrafish Hsd17b3 is an SDR-family oxidoreductase whose preferred reaction is the 17beta-reduction of androstenedione to testosterone (EC 1.1.1.64).
    supporting_text: |-
      Zebrafish Hsd17b3 is reported to catalyze the **17β-reduction of androstenedione to testosterone** (preferred reaction: **androstenedione → testosterone**), aligning with canonical HSD17B3 activity in vertebrate androgen biosynthesis.
    reference_section_type: OTHER
  - statement: |-
      Substrate scope extends beyond androstenedione to several androstanes and 11-keto/11-hydroxy androstenedione, indicating broader androgen-metabolic capacity relevant to teleost 11-oxygenated androgen pathways.
    supporting_text: |-
      Beyond androstenedione, zebrafish Hsd17b3 is reported to have activity toward **several androstanes** and toward **11-keto and 11-hydroxy androstenedione**, suggesting broader androgen-metabolic capacity
    reference_section_type: OTHER
  - statement: |-
      Hsd17b3 is positioned as a terminal enzyme in a testosterone-producing branch of steroidogenesis.
    supporting_text: |-
      Given the reported activity **androstenedione → testosterone**, zebrafish Hsd17b3 is positioned as a terminal enzyme in a testosterone-producing branch of steroidogenesis.
    reference_section_type: OTHER
  - statement: |-
      Subcellular localization is supported by a predicted N-terminal signal peptide or transmembrane helix, consistent with endoplasmic reticulum (membrane-associated) localization.
    supporting_text: |-
      A zebrafish characterization excerpt predicts that the **N-terminus** of zebrafish Hsd17b3 contains a **signal peptide or transmembrane helix**, and uses this as inference supporting **endoplasmic reticulum (ER) localization** (i.e., membrane-associated localization).
    reference_section_type: OTHER
  - statement: |-
      Hsd17b3 belongs to the short-chain dehydrogenase/reductase (SDR) family, consistent with the UniProt SDR domain architecture.
    supporting_text: |-
      Zebrafish Hsd17b3 belongs to the **short-chain dehydrogenase/reductase (SDR)** family, consistent with the UniProt-provided SDR domain architecture.
    reference_section_type: OTHER
  - statement: |-
      Unlike testis/Leydig-restricted mammalian HSD17B3, zebrafish hsd17b3 is broadly expressed across adult tissues (dominant in testis, liver, ovary), suggesting a more somatic expression pattern.
    supporting_text: |-
      Zebrafish hsd17b3 expression is reported across **multiple adult tissues**, with summarized dominant sites including **testis, liver, and ovary**, and additional detection reported in **skin, muscle, spleen, intestine, and eyes**.
    reference_section_type: OTHER
  - statement: |-
      In vivo developmental contribution may be stage-dependent: hsd17b3 expression is low or undetected in juvenile zebrafish gonads (19/30 dpf), implying another Hsd17b enzyme may supply 17beta-HSD activity at early stages.
    supporting_text: |-
      They report that **hsd17b3 expression is low** at both 19 and 30 dpf and that they **did not detect hsd17b3** in ZZ NA gonads at 30 dpf.
    reference_section_type: OTHER
  - statement: |-
      Zebrafish lacks an HSD17B5 ortholog, raising the possibility that zebrafish Hsd17b3 covers roles distributed among multiple paralogs in mammals.
    supporting_text: |-
      notes that zebrafish lacks an HSD17B5 ortholog, raising the possibility that zebrafish Hsd17b3 may cover functional roles that in mammals are distributed differently among paralogs.
    reference_section_type: OTHER
