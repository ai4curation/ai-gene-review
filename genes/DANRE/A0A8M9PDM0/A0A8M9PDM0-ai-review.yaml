id: A0A8M9PDM0
gene_symbol: crebbpa
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:7955
  label: Danio rerio
description: >-
  This UniProt entry (A0A8M9PDM0) has been deleted from UniProt because its
  source RefSeq record (XP_021329192) was removed. The protein corresponds to
  an isoform of crebbpa (CREB-binding protein a), a 2,346 amino acid histone
  acetyltransferase (EC 2.3.1.48) in zebrafish. Based on the UniParc archive
  record UPI000B4397F3 and active paralogs (A0A8M2B8L6, A0A0R4IPF2,
  A0A2R8Q4T2), crebbpa encodes a transcription coactivator containing multiple
  conserved domains including a bromodomain, KIX domain, TAZ-type and ZZ-type
  zinc fingers, a PHD finger, and a CBP/p300-type histone acetyltransferase
  catalytic domain. The protein functions as a transcriptional coactivator by
  acetylating histones and other proteins, bridging DNA-binding transcription
  factors to the basal transcription machinery, and remodeling chromatin
  structure. It localizes to the nucleus and cytoplasm.
existing_annotations:
  - term:
      id: GO:0004402
      label: histone acetyltransferase activity
    evidence_type: ISS
    original_reference_id: GO_REF:0000024
    review:
      summary: Proposed new annotation based on domain analysis from UniParc
        record UPI000B4397F3. The protein contains a CBP/p300-type histone
        acetyltransferase catalytic domain (IPR013178) spanning positions
        768-1768, and active crebbpa entries in zebrafish are annotated with
        EC 2.3.1.48 (histone acetyltransferase).
      action: NEW
      reason: Core molecular function of the CBP/p300 family, supported by
        conserved domain architecture and annotation of active paralogs.
  - term:
      id: GO:0003713
      label: transcription coactivator activity
    evidence_type: ISS
    original_reference_id: GO_REF:0000024
    review:
      summary: Proposed new annotation. CBP/p300 proteins are canonical
        transcription coactivators that bridge DNA-binding transcription factors
        to the basal transcription machinery. The KIX domain (IPR003101) and
        multiple zinc finger domains mediate protein-protein interactions with
        transcription factors.
      action: NEW
      reason: Core molecular function of the CBP/p300 family, well-established
        through extensive study of mammalian orthologs.
  - term:
      id: GO:0008140
      label: cAMP response element binding protein binding
    evidence_type: ISS
    original_reference_id: GO_REF:0000024
    review:
      summary: Proposed new annotation. The protein contains a KIX domain
        (IPR003101, positions 549-628), which is the canonical CREB-binding
        domain of the CBP/p300 family. CREB binding is a defining feature
        of this protein family.
      action: NEW
      reason: The KIX domain is the hallmark CREB-interaction domain of the
        CBP/p300 family and is conserved in this protein.
  - term:
      id: GO:0005634
      label: nucleus
    evidence_type: ISS
    original_reference_id: GO_REF:0000024
    review:
      summary: Proposed new annotation. Active crebbpa entries in zebrafish
        (A0A8M2B8L6) are annotated as localizing to the nucleus. As a
        transcription coactivator that modifies histones, nuclear localization
        is expected.
      action: NEW
      reason: Nuclear localization is consistent with the transcription
        coactivator function and is annotated for active paralogs.
  - term:
      id: GO:0006473
      label: protein acetylation
    evidence_type: ISS
    original_reference_id: GO_REF:0000024
    review:
      summary: Proposed new annotation. As a histone acetyltransferase, the
        protein catalyzes acetylation of histone lysine residues. CBP/p300
        proteins also acetylate non-histone substrates.
      action: NEW
      reason: Direct consequence of the histone acetyltransferase activity,
        representing the biological process in which this enzyme participates.
  - term:
      id: GO:0006338
      label: chromatin remodeling
    evidence_type: ISS
    original_reference_id: GO_REF:0000024
    review:
      summary: Proposed new annotation. Histone acetylation by CBP/p300 leads
        to chromatin remodeling by neutralizing positive charges on histone
        tails, promoting an open chromatin state permissive for transcription.
      action: NEW
      reason: Chromatin remodeling via histone acetylation is a well-established
        downstream consequence of CBP/p300 acetyltransferase activity.
  - term:
      id: GO:0006357
      label: regulation of transcription by RNA polymerase II
    evidence_type: ISS
    original_reference_id: GO_REF:0000024
    review:
      summary: Proposed new annotation. CBP/p300 coactivators regulate RNA
        polymerase II-dependent transcription through multiple mechanisms
        including histone acetylation, bridging transcription factors to the
        basal machinery, and direct acetylation of transcription factors.
      action: NEW
      reason: Core biological process function of the CBP/p300 family.
references:
