suggested_questions:
  - question: Is this deleted RefSeq isoform (XP_021329192) functionally distinct
      from the remaining crebbpa isoforms, or was the sequence record removed due
      to assembly or prediction errors?
  - question: What is the functional relationship between crebbpa and its paralog
      crebbpb in zebrafish, and do they have redundant or distinct roles?
  - question: Which developmental processes in zebrafish specifically require
      crebbpa histone acetyltransferase activity?
suggested_experiments:
  - description: CRISPR/Cas9 knockout of crebbpa in zebrafish to determine
      developmental phenotypes and assess functional redundancy with crebbpb
  - description: ChIP-seq analysis using anti-acetyl-histone antibodies in
      crebbpa mutant versus wild-type zebrafish embryos to identify target loci
  - description: Co-immunoprecipitation experiments to identify transcription
      factor binding partners of zebrafish Crebbpa via the KIX domain
