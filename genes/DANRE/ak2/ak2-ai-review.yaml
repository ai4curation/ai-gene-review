taxon:
  id: NCBITaxon:7955
  label: Danio rerio
description: ak2 encodes mitochondrial adenylate kinase 2, an intermembrane-space enzyme that reversibly transfers the terminal
  phosphate between ATP and AMP to generate ADP and maintain adenine nucleotide homeostasis. Hematopoietic and leukocyte differentiation
  annotations are well-supported developmental consequences of AK2 deficiency, but the core function is mitochondrial adenylate
  kinase activity in ADP/AMP/ATP metabolism.
