id: Q9DEX7
gene_symbol: fads2
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:7955
  label: Danio rerio
description: fads2 encodes zebrafish fatty acid desaturase 2, an endoplasmic-reticulum membrane desaturase with delta-5/delta-6
  and acyl-CoA (8-3)-desaturase activities in polyunsaturated fatty-acid biosynthesis. The core function is ER membrane acyl-CoA
  desaturation for unsaturated fatty-acid biosynthesis; liver-development evidence is retained as a non-core phenotype from
  a GWAS candidate knockdown screen.
