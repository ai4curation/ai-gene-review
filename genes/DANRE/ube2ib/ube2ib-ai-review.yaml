- id: file:DANRE/ube2ib/ube2ib-uniprot.txt
  title: UniProtKB entry Q9DDJ0 for Danio rerio ube2ib
  findings:
  - statement: UniProt describes Ube2ib/UBC9-B as the SUMO E2 conjugating enzyme in protein sumoylation.
    supporting_text: Accepts the ubiquitin-like proteins sumo1, sumo2 and sumo3
- id: file:DANRE/ube2ib/ube2ib-deep-research-falcon.md
  title: Falcon deep research report on Danio rerio ube2ib (SUMO-conjugating enzyme UBC9-B)
  findings:
  - statement: |-
      The core molecular function of ube2ib/UBC9-B is the SUMO E2 conjugating enzyme step:
      transfer of SUMO (SUMO1/2/3) from the E2 thioester intermediate to substrate lysines,
      catalyzing protein SUMOylation.
    reference_section_type: OTHER
    supporting_text: |-
      the primary biochemical function is **transfer of SUMO** (SUMO1/2/3 in vertebrates) from the **E2 thioester intermediate** to substrate lysines, thereby catalyzing **protein SUMOylation**
  - statement: |-
      UBC9 forms a UBC9~SUMO thioester intermediate and catalyzes formation of an isopeptide
      bond between the SUMO C-terminus and a substrate lysine.
    reference_section_type: OTHER
    supporting_text: |-
      UBC9 catalyzes formation of an isopeptide bond between the SUMO C-terminus and a substrate lysine
  - statement: |-
      The active-site cysteine is essential: overexpression of wild-type zebrafish Ubc9.1
      increases global SUMOylation, whereas the catalytic-site mutant C93A reduces global
      SUMOylation and causes widespread apoptosis.
    reference_section_type: OTHER
    supporting_text: |-
      a **catalytic-site mutant C93A** reduced global sumoylation and caused widespread apoptosis
  - statement: |-
      SUMOylation activity is predominantly nuclear/subnuclear, so ube2ib is expected to
      function mainly in nuclear SUMOylation reactions.
    reference_section_type: OTHER
    supporting_text: |-
      ube2ib is expected to function mainly in nuclear SUMOylation reactions
  - statement: |-
      UBC9-family enzymes are central SUMO-pathway hubs (single vertebrate SUMO E2) rather
      than pathway-specific components, so developmental phenotypes are downstream of broad
      SUMOylation activity.
    reference_section_type: OTHER
    supporting_text: |-
      UBC9 family enzymes are central hubs rather than pathway-specific components
  - statement: |-
      Zebrafish UBC9-family paralogs are implicated in cell survival and mitotic progression
      of proliferative tissues (brain/eye) and craniofacial cartilage; the paralogs are
      enzymatically redundant (ubc9.2 rescues ubc9.1 knockdown).
    reference_section_type: OTHER
    supporting_text: |-
      Zebrafish Ubc9 paralogs are implicated in **cell survival**, **mitotic progression**
  - statement: |-
      Identity caveat: zebrafish functional studies use the older ubc9.1/ubc9.2 naming and
      no retrieved source explicitly maps these onto ube2ib/ubc9b (Q9DDJ0), so paralog-level
      developmental evidence is family-level rather than uniquely proven for this accession.
    reference_section_type: OTHER
    supporting_text: |-
      no retrieved source explicitly maps** those older names onto the current gene symbol **ube2ib/ubc9b** or the UniProt accession **Q9DDJ0**
