description: ube2ib encodes zebrafish SUMO-conjugating enzyme UBC9-B, a nuclear E2 enzyme that transfers SUMO proteins to
  substrates during protein sumoylation. Heart looping, heart tube elongation, and definitive hematopoiesis annotations are
  supported developmental outputs of SUMOylation but are not the core molecular function of the enzyme.
