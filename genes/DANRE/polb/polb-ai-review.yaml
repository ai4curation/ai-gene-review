id: Q6DRD3
gene_symbol: polb
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:7955
  label: Danio rerio
description: polb encodes DNA polymerase beta, a base-excision repair polymerase with DNA-directed DNA polymerase and 5-deoxyribose-phosphate
  lyase/AP lyase activities. The core function is nuclear/cytoplasmic repair gap-filling and 5-dRP removal during base-excision
  repair; broad DNA metabolism and DNA biosynthesis terms are narrowed to base-excision repair.
