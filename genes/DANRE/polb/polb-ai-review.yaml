- term:
    id: GO:0006284
    label: base-excision repair
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: base-excision repair (GO:0006284) is supported for Polb.
    action: ACCEPT
    reason: Polb is a base-excision repair polymerase with DNA-directed DNA polymerase and 5-dRP lyase activities.
      Falcon deep research places zebrafish polb in the conserved BER module (Apex1 -> Pol beta -> XRCC1/LIG3alpha).
    supported_by:
    - reference_id: file:DANRE/polb/polb-uniprot.txt
      supporting_text: Repair polymerase that plays a key role in base-excision
    - reference_id: file:DANRE/polb/polb-uniprot.txt
      supporting_text: 5'-deoxyribose-phosphate lyase
    - reference_id: file:DANRE/polb/polb-uniprot.txt
      supporting_text: through its DNA polymerase activity
    - reference_id: PMID:22018137
      supporting_text: "pol \u03B2 is thought be involved in DNA repair synthesis"
    - reference_id: file:DANRE/polb/polb-deep-research-falcon.md
      supporting_text: |-
        In canonical **short-patch BER**, a damaged base is removed by a glycosylase, **APE1/Apex1** cleaves the AP site, **Pol \u03B2 fills the gap**, and the nick is sealed by **XRCC1-LIG3\u03B1**
