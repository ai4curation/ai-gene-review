- id: file:DANRE/polb/polb-deep-research-falcon.md
  title: Falcon deep research report on Danio rerio polb (Edison Scientific Literature)
  findings:
  - statement: |-
      Falcon synthesis confirms the UniProt identity: zebrafish polb (Q6DRD3) is DNA polymerase
      beta, the principal base-excision repair gap-filling polymerase that fills short DNA gaps
      and removes the 5'-dRP blocking group via its intrinsic lyase activity to enable ligation.
    reference_section_type: OTHER
    supporting_text: |-
      the principal BER gap-filling polymerase that (i) fills short DNA gaps created during BER and (ii) removes the 5′-dRP blocking group via intrinsic lyase activity to enable ligation
  - statement: |-
      Pol beta has two coupled catalytic activities: template-directed single-nucleotide gap
      filling (DNA-directed DNA polymerase) and removal of the 5'-deoxyribose phosphate blocking
      group (dRP lyase/AP lyase) before ligation.
    reference_section_type: OTHER
    supporting_text: |-
      Pol β (1) performs **template-directed single-nucleotide gap filling** and (2) removes the **5'-deoxyribose phosphate (5'-dRP)** blocking group via its **dRP lyase/AP lyase** activity before ligation
  - statement: |-
      Pol beta has highest catalytic activity on 5'-phosphorylated 1-nt gapped DNA and typically
      inserts the first nucleotide in repair intermediates, consistent with short-patch BER.
    reference_section_type: OTHER
    supporting_text: |-
      Pol β has highest catalytic activity on **5'-phosphorylated 1-nt gapped DNA** and typically inserts the **first nucleotide** in repair intermediates
  - statement: |-
      Domain architecture: an N-terminal 5'-deoxyribose-phosphate (5'-dRP) lyase domain and a
      C-terminal DNA polymerase/nucleotidyltransferase domain, classifying it in the DNA
      polymerase type-X family.
    reference_section_type: OTHER
    supporting_text: |-
      an N-terminal **5′-deoxyribose-phosphate (5′-dRP) lyase** domain and a C-terminal **DNA polymerase/nucleotidyltransferase** domain
  - statement: |-
      Pathway placement in zebrafish: BER proceeds glycosylase excision, AP-site incision by
      APE1/Apex1, gap filling by Pol beta, then nick sealing by XRCC1-LIG3alpha.
    reference_section_type: OTHER
    supporting_text: |-
      In canonical **short-patch BER**, a damaged base is removed by a glycosylase, **APE1/Apex1** cleaves the AP site, **Pol β fills the gap**, and the nick is sealed by **XRCC1-LIG3α**
  - statement: |-
      Subcellular localization is predominantly nuclear during BER; mitochondrial BER
      participation is supported in vertebrate literature but only inferred for zebrafish by
      orthology, as no direct zebrafish localization experiments were captured.
    reference_section_type: OTHER
    supporting_text: |-
      Nuclear function** is strongly supported by the canonical BER role described for Pol β
  - statement: |-
      Developmental regulation in zebrafish: polb mRNA is present at all embryonic stages, but
      Pol beta protein is reportedly absent in eggs and early embryos until gastrulation,
      implying stage-specific reliance on alternative polymerases early in embryogenesis.
    reference_section_type: OTHER
    supporting_text: |-
      Pol β protein is reportedly absent in eggs and early embryos until gastrulation
  - statement: |-
      In zebrafish embryos exposed to 100 nm polystyrene nanoplastics, polb is among the
      altered BER-pathway genes, consistent with BER engagement during oxidative stress.
    reference_section_type: OTHER
    supporting_text: |-
      altered expression of BER-pathway genes including **polb**, consistent with BER pathway engagement during oxidative stress
