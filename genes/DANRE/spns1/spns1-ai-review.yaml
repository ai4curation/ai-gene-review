id: Q7ZU13
gene_symbol: spns1
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:7955
  label: Danio rerio
description: |-
  spns1 (nrs/spinl) encodes a lysosomal-membrane major facilitator superfamily (spinster-family) transporter,
  experimentally deorphanized as a proton-dependent lysophospholipid efflux transporter with substrate specificity
  for the zwitterionic lysophospholipids lysophosphatidylcholine (LPC) and lysophosphatidylethanolamine (LPE)
  (He et al. 2022 PNAS, PMID:36161949). It exports these lysolipids from the lysosomal lumen to the cytosolic side,
  enabling lysosomal phospholipid salvage and maintaining lysosomal homeostasis. Transport is pH-dependent (acidic
  optimum ~5-6), consistent with proton coupling for an MFS transporter at the lysosome. A mammalian genetics study
  additionally proposes a role in lysosomal sphingosine release, but the highest-confidence substrate assignment
  remains LPC/LPE. Autophagy, autophagosome maturation, cardiac valve morphogenesis (via notch1 signaling), and
  cellular/developmental senescence are downstream consequences of impaired lysosomal lipid efflux rather than the
  molecular core, which is lysosomal lysophospholipid transmembrane transport.
