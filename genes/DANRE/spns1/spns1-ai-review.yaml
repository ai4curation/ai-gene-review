description: spns1 encodes a lysosomal membrane major-facilitator transporter now described as a proton-dependent lysophospholipid
  efflux transporter. Autophagy, autophagosome maturation, and cellular senescence annotations are supported consequences
  of Spns1 loss, but the core function is lysosomal transmembrane transport.
