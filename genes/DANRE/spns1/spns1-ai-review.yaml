core_functions:
- description: |-
    spns1 enables lysosomal-membrane transmembrane transporter activity, mediating proton-dependent lysosomal efflux
    of the zwitterionic lysophospholipids LPC and LPE from the lysosomal lumen to the cytosol, thereby driving
    lysosomal phospholipid salvage and supporting lysosomal homeostasis.
