proposed_new_terms:
- proposed_name: proton-dependent lysosomal lysophospholipid efflux transporter activity
  proposed_definition: Catalysis of the proton-dependent transfer of lysophospholipids (e.g. lysophosphatidylcholine and
    lysophosphatidylethanolamine) from the lysosomal lumen across the lysosomal membrane to the cytosolic side.
  justification: |-
    Spns1 is experimentally demonstrated to be a proton-dependent lysosomal efflux transporter selective for the
    zwitterionic lysophospholipids LPC and LPE (falcon deep research; He et al. 2022 PNAS). No existing GO
    molecular-function term captures this activity: GO:0022857 (transmembrane transporter activity) is far too broad,
    and GO:0051978 (the only lysophospholipid transporter MF term) is specifically a lysophospholipid:SODIUM symporter,
    whereas Spns1 is proton-coupled and operates in the efflux direction.
  proposed_parent:
    id: GO:0015562
    label: efflux transmembrane transporter activity
