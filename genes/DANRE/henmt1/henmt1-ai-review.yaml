  title: UniProtKB entry Q568P9 for Danio rerio henmt1
  findings:
  - statement: UniProt describes Henmt1 as a small RNA 2-O-methyltransferase that stabilizes piRNAs.
    supporting_text: Methyltransferase that adds a 2'-O-methyl group
