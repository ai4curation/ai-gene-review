    supporting_text: Hen1 is required for oocyte development and piRNA stability
- id: file:DANRE/henmt1/henmt1-deep-research-falcon.md
  title: Falcon deep research report on Danio rerio henmt1 (Hen1)
  findings:
  - statement: |-
      Falcon synthesis: zebrafish henmt1/Hen1 is a HEN1-family SAM-dependent small RNA 2'-O-methyltransferase that methylates the 2'-OH of the 3'-terminal ribose of piRNAs.
    supporting_text: |-
      methylate the **2′-hydroxyl of the ribose on the 3′-terminal nucleotide** of specific small RNAs, primarily **piRNAs in animals**
    reference_section_type: OTHER
  - statement: |-
      Falcon synthesis: the methyl group is transferred from SAM to the 2'-OH of the 3'-terminal ribose; the HEN1 family carries a conserved SAM/AdoMet-binding motif.
    supporting_text: |-
      transferring a methyl group to the **2′-OH** of the **3′-terminal ribose**
    reference_section_type: OTHER
  - statement: |-
      Falcon synthesis: 3' 2'-O-methylation stabilizes piRNAs by preventing 3' uridylation/adenylation (tailing) and subsequent trimming/degradation.
    supporting_text: |-
      3′ 2′-O-methylation stabilizes small RNAs**, in part by preventing **3′ uridylation/adenylation (“tailing”)** and subsequent trimming/degradation
    reference_section_type: OTHER
  - statement: |-
      Falcon synthesis: within the piRNA pathway, Hen1/HENMT1 provides the terminal 2'-O-methylation protection step after 3'-end trimming.
    supporting_text: |-
      Within the **piRNA pathway**, 3′ end maturation includes trimming and then terminal 2′-O-methylation, with Hen1/HENMT1 providing this terminal protection step
    reference_section_type: OTHER
  - statement: |-
      Falcon synthesis: maintaining piRNA stability allows PIWI/piRNA complexes to repress transposable elements in germ cells.
    supporting_text: |-
      the pathway-level role is to maintain piRNA stability so that PIWI/piRNA complexes can continue to repress transposable elements in germ cells
    reference_section_type: OTHER
  - statement: |-
      Falcon synthesis: the zebrafish Hen1 protein localizes to nuage, a germline granule associated with piRNA biogenesis.
    supporting_text: |-
      The zebrafish Hen1 protein is localized to nuage
    reference_section_type: OTHER
  - statement: |-
      Falcon synthesis: zebrafish Hen1 is expressed in both germ lines but is essential only for oocyte development and dispensable for testis development.
    supporting_text: |-
      essential only for oocyte development and dispensable for testis development
    reference_section_type: OTHER
