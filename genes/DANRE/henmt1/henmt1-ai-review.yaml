id: Q568P9
gene_symbol: henmt1
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:7955
  label: Danio rerio
description: henmt1 encodes HEN1 small RNA 2-O-methyltransferase, which methylates the 3-prime ends of piRNAs to stabilize
  them. The core function is small RNA 2-O-ribose methyltransferase activity in primary piRNA processing/RNA methylation,
  with oocyte development retained as a biologically important non-core consequence.
