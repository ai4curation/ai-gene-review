suggested_questions:
- question: Has ufsp2 function been directly tested in zebrafish using morpholino
    knockdown or CRISPR knockout? Are there any zebrafish-specific phenotypes?
  experts: []
- question: Does zebrafish ufsp2 play a role in erythropoiesis or hematopoietic development,
    as suggested by the UFMylation pathway's role in erythroid differentiation in
    mammals?
  experts: []
suggested_experiments:
- description: Generate ufsp2 CRISPR knockout zebrafish and characterize phenotypes
    including skeletal development, neurological function, and ER stress markers to
    determine if the mammalian disease phenotypes are conserved.
  hypothesis: Loss of ufsp2 in zebrafish will cause ER stress-related phenotypes and
    potentially skeletal or neurological defects analogous to human UFSP2 mutations.
- description: Perform immunofluorescence microscopy in zebrafish embryos to confirm
    subcellular localization of ufsp2 at the ER, cytoplasm, and nucleus.
  hypothesis: Zebrafish ufsp2 will show predominantly ER and cytoplasmic localization,
    consistent with mammalian orthologs.
