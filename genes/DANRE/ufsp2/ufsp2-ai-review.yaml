core_functions:
- description: UFSP2 functions as a thiol-dependent isopeptidase that cleaves UFM1
    from conjugated substrates (deUFMylation) and processes UFM1 precursors to their
    mature form. Its principal substrate is UFMylated RPL26 on ER-bound 60S ribosomal
    subunits, where deUFMylation is required for ribosome recycling during ER-associated
    quality control.
