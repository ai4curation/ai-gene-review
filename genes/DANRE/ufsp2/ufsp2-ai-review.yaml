      - **UFSP2**: a major **de-UFMylase** for ER-associated substrates, particularly efficiently removing UFM1 from the ribosomal protein **RPL26 (uL24)**; UFSP2 knockout causes a **drastic accumulation of UFMylated proteins** in cell systems summarized in reviews.
proposed_new_terms:
- proposed_name: protein deUFMylation
  proposed_definition: The process in which the ubiquitin-fold modifier UFM1 is
    cleaved from its target protein, removing one or more covalently attached UFM1
    groups from a substrate. This is the deconjugation arm of the UFMylation cycle,
    catalyzed by UFM1-specific proteases (e.g. UFSP2).
  justification: GO provides a molecular function term for deUFMylase activity
    (GO:0071567) and a biological process term for the forward reaction, protein
    ufmylation (GO:0071569), but lacks a corresponding biological process term for
    the reverse (deconjugation) reaction. Analogous deconjugation processes exist
    for other ubiquitin-like modifiers as children of GO:0070646 protein
    modification by small protein removal, namely protein deubiquitination
    (GO:0016579), protein desumoylation (GO:0016926), and protein deneddylation
    (GO:0000338). A protein deUFMylation term would complete this set and allow
    UFSP2 deconjugation activity to be annotated to an appropriately specific BP.
  proposed_parent:
    id: GO:0070646
    label: protein modification by small protein removal
  supported_by:
  - reference_id: file:DANRE/ufsp2/ufsp2-deep-research-falcon.md
    supporting_text: |-
      Cross-species evidence supports that UFSP2 catalyzes:
      - **Proteolytic maturation of pro-UFM1** to mature UFM1 required for UFMylation, and
      - **Hydrolysis of isopeptide bonds** linking UFM1 to substrate proteins (de-UFMylation).
