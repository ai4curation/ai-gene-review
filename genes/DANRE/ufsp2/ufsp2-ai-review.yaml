- term:
    id: GO:0032790
    label: ribosome disassembly
  evidence_type: ISS
  original_reference_id: GO_REF:0000024
  review:
    summary: Correct. UFSP2-mediated deUFMylation of RPL26 is a required step in the
      recycling of 60S ribosomal subunits from the ER. UFMylation marks stalled ribosomes
      for quality control, and UFSP2 removes UFM1 to enable ribosome recycling.
    action: ACCEPT
    reason: Supported by studies showing that RPL26 UFMylation at the ER triggers
      ribosome quality control and that UFSP2-mediated deUFMylation is needed for
      60S subunit recycling.
    supported_by:
