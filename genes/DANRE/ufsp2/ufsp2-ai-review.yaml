- id: PMID:15071506
  title: A novel protein-conjugating system for Ufm1, a ubiquitin-fold modifier
  findings:
  - statement: UFM1 was identified as a novel ubiquitin-fold modifier with a dedicated
      conjugation system involving E1 (UBA5) and E2 (UFC1) enzymes, conserved in metazoa
      and plants but not yeast.
    supporting_text: Ufm1, Uba5, and Ufc1 are all conserved in metazoa and plants
      but not in yeast
- id: PMID:17182609
  title: Two novel ubiquitin-fold modifier 1 (Ufm1)-specific proteases, UfSP1 and
    UfSP2
  findings:
  - statement: UfSP1 and UfSP2 were identified as cysteine proteases specific for
      UFM1, with UfSP2 conserved across multicellular organisms.
    supporting_text: UfSP2 is present in most, if not all, of multicellular organisms
  - statement: UfSP1/2 are strictly specific for UFM1 and do not cleave ubiquitin,
      SUMO-1, or ISG15.
    supporting_text: cleaved the C-terminal extension of Ufm1 but not that of ubiquitin
  - statement: The catalytic cysteine is essential for protease activity.
    supporting_text: replacement of the conserved Cys residue by Ser resulted in a
      complete loss of the UfSP1 and UfSP2 activities
- id: PMID:21228277
  title: Structure of ubiquitin-fold modifier 1-specific protease UfSP2
  findings:
  - statement: Crystal structure of mouse UfSP2 reveals a two-domain architecture
      with an unconventional catalytic triad (Cys294, Asp418, His420).
    supporting_text: The C-terminal catalytic domain is similar to UfSP1 with Cys(294),
      Asp(418), His(420), Tyr(282), and a regulatory loop participating in catalysis
  - statement: The N-terminal domain of UfSP2 mediates substrate recognition and ER
      recruitment via interaction with DDRGK1 (C20orf116).
    supporting_text: The novel N-terminal domain shows a unique structure and plays a
      role in the recognition of its cellular substrate C20orf116 and thus in the
      recruitment of UfSP2 to the endoplasmic reticulum
- id: PMID:30626644
  title: Ribosomal protein RPL26 is the principal target of UFMylation
  findings:
  - statement: RPL26 is the primary cellular UFMylation target, modified at K132/K134
      on ER-bound 60S subunits. UFSP2 reverses this modification.
    supporting_text: a largely uncharacterized ribosomal protein, RPL26, is the principal
      target of UFM1 conjugation
  - statement: RPL26 UFMylation and deUFMylation occur at the ER surface via
      tethered enzyme complexes.
    supporting_text: RPL26 UFMylation and de-UFMylation is catalyzed by enzyme complexes
      tethered to the cytoplasmic surface of the ER
  - statement: UFMylated RPL26 is enriched on ER-associated ribosomes.
    supporting_text: UFMylated RPL26 is highly enriched on ER membrane-bound ribosomes
      and polysomes
- id: PMID:37036982
  title: RPL26/uL24 UFMylation is essential for ribosome-associated quality control
    at the endoplasmic reticulum
  findings:
  - statement: RPL26 UFMylation is required for degradation of stalled nascent chains
      at the ER via RQC and the ubiquitin-proteasome system.
    supporting_text: UFMylation of translocon-bound 60S subunits modulates the RTJ
      to promote access of proteasomes and RQC machinery to ER-APs
- id: PMID:26428751
  title: Identification of a mutation in the ubiquitin-fold modifier 1-specific peptidase
    2 gene, UFSP2, in an extended South African family with Beukes hip dysplasia
  findings:
  - statement: A Y290H mutation in UFSP2 abolishes deUFMylase activity and causes
      autosomal dominant Beukes hip dysplasia.
    supporting_text: the BHD mutation abolishes UFSP2-mediated C-terminal cleavage
      of its substrate, Ufm1
- id: PMID:33473208
  title: A pathogenic UFSP2 variant in an autosomal recessive form of pediatric neurodevelopmental
    anomalies and epilepsy
  findings:
  - statement: A homozygous V115E variant in the N-terminal domain of UFSP2 causes
      neurodevelopmental delay and epilepsy by impairing deUFMylation.
    supporting_text: the variant more prominently affects de-UFMylation rather than
      UFMylation
- id: file:DANRE/ufsp2/ufsp2-deep-research-bioreason.md
  title: BioReason SFT functional summary for ufsp2 (Danio rerio)
  findings:
  - statement: BioReason SFT correctly identifies ufsp2 as a cytoplasmic cysteine
      protease specializing in UFM1 processing and deconjugation, with a two-domain
      architecture supporting ER-proximal protein quality control.
existing_annotations:
- term:
    id: GO:0005783
    label: endoplasmic reticulum
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: Correct. UFSP2 is recruited to the ER via its N-terminal domain interaction
      with DDRGK1, and acts on UFMylated RPL26 on ER-bound ribosomes. This is a functionally
      important localization site.
    action: ACCEPT
    reason: The ER localization is well supported by structural studies showing the
      N-terminal domain recruits UFSP2 to the ER via DDRGK1, and functional studies
      demonstrating its role in deUFMylation of ER-associated ribosomal subunits.
    supported_by:
    - reference_id: PMID:21228277
      supporting_text: plays a role in the recognition of its cellular substrate C20orf116
        and thus in the recruitment of UfSP2 to the endoplasmic reticulum
    - reference_id: PMID:30626644
      supporting_text: RPL26 UFMylation and de-UFMylation is catalyzed by enzyme complexes
        tethered to the cytoplasmic surface of the ER
- term:
    id: GO:0071567
    label: deUFMylase activity
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: Correct. deUFMylase activity is the core molecular function of UFSP2.
      The enzyme cleaves UFM1 from conjugated substrates with strict specificity,
      using a catalytic cysteine-dependent mechanism.
    action: ACCEPT
    reason: This is the defining molecular function of UFSP2, supported by direct
      biochemical evidence from the mammalian orthologs showing specific cleavage
      of UFM1 conjugates, loss of activity upon Cys-to-Ser mutation, and accumulation
      of UFMylated RPL26 when UFSP2 is disrupted.
    supported_by:
    - reference_id: PMID:17182609
      supporting_text: cleaved the C-terminal extension of Ufm1 but not that of ubiquitin
    - reference_id: PMID:17182609
      supporting_text: replacement of the conserved Cys residue by Ser resulted in
        a complete loss of the UfSP1 and UfSP2 activities
    - reference_id: PMID:30626644
      supporting_text: RPL26, is the principal target of UFM1 conjugation...UFMylated
        RPL26 is highly enriched on ER membrane-bound ribosomes and polysomes
    - reference_id: file:DANRE/ufsp2/ufsp2-deep-research-bioreason.md
      supporting_text: A cytoplasmic cysteine protease that specializes in processing
        the ubiquitin-like modifier UFM1
- term:
    id: GO:0005634
    label: nucleus
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: Likely correct but non-core. Nuclear localization of UFSP2 has been reported
      for the mammalian ortholog, and UFSP2 has been observed to be recruited to DNA
      double-strand breaks. However, the primary functional site is the ER.
    action: KEEP_AS_NON_CORE
    reason: Nuclear localization is reported for the mammalian ortholog and there
      is evidence for UFSP2 function at DNA damage sites, but the core function of
      UFSP2 is at the ER where it deUFMylates RPL26 on ribosomal subunits.
- term:
    id: GO:0006508
    label: proteolysis
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: Correct but too general. UFSP2 performs a highly specific form of proteolysis
      -- it cleaves the isopeptide bond between UFM1 and its conjugated substrates.
      The term proteolysis does not capture this specificity.
    action: MODIFY
    reason: While proteolysis is technically accurate, it is overly broad for this
      specialized isopeptidase. The more specific biological process is protein deUFMylation,
      which is part of the UFM1 conjugation pathway.
    proposed_replacement_terms:
    - id: GO:0016579
      label: protein deubiquitination
      description: The closest available BP term for Ubl deconjugation; protein deUFMylation
        would be the ideal term but may not exist as a separate GO term. Note that
        GO:0006508 proteolysis is a valid ancestor.
- term:
    id: GO:0005634
    label: nucleus
  evidence_type: IEA
  original_reference_id: GO_REF:0000044
  review:
    summary: Redundant with the IBA annotation for nucleus. Consistent with subcellular
      localization data from the mammalian ortholog.
    action: KEEP_AS_NON_CORE
    reason: Redundant with the IBA-supported nucleus annotation. Retained as non-core
      since the primary functional site is the ER.
- term:
    id: GO:0005737
    label: cytoplasm
  evidence_type: IEA
  original_reference_id: GO_REF:0000044
  review:
    summary: Correct. UFSP2 is a soluble enzyme that resides in the cytoplasm and
      is recruited to the ER membrane surface where it acts on UFMylated substrates.
    action: KEEP_AS_NON_CORE
    reason: Cytoplasmic localization is consistent with UFSP2 being a soluble protease.
      While it is recruited to the ER for its primary function, the cytoplasm represents
      its default residence before recruitment.
