- term:
    id: GO:0005634
    label: nucleus
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: Likely correct but non-core. Nuclear localization of UFSP2 has been reported
      for the mammalian ortholog, and UFSP2 has been observed to be recruited to DNA
      double-strand breaks. However, the primary functional site is the ER.
    action: KEEP_AS_NON_CORE
    reason: Nuclear localization is reported for the mammalian ortholog and there
      is evidence for UFSP2 function at DNA damage sites, but the core function of
      UFSP2 is at the ER where it deUFMylates RPL26 on ribosomal subunits. Falcon
      deep research notes that reviews list nucleus/cytoplasm/ER localization, but
      ER tethering is the strongest mechanistic conclusion, consistent with retaining
      nucleus as non-core.
    supported_by:
    - reference_id: file:DANRE/ufsp2/ufsp2-deep-research-falcon.md
      supporting_text: |-
        Some reviews also list nucleus/cytoplasm/ER localization, but ER tethering is the strongest mechanistic conclusion.
- term:
    id: GO:0006508
    label: proteolysis
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: Correct but too general. UFSP2 performs a highly specific form of proteolysis
      -- it cleaves the isopeptide bond between UFM1 and its conjugated substrates.
      The term proteolysis does not capture this specificity.
    action: MODIFY
    reason: While proteolysis is technically accurate, it is overly broad for this
      specialized isopeptidase. The specific process is removal of the ubiquitin-like
      modifier UFM1 from substrate proteins (deUFMylation). No dedicated GO term for
      protein deUFMylation exists, so the closest correct existing BP term is
      GO:0070646 protein modification by small protein removal, whose definition
      explicitly covers removal of ubiquitin-like proteins (a sibling of protein
      deneddylation and protein desumoylation). A dedicated protein deUFMylation term
      is requested in proposed_new_terms.
    proposed_replacement_terms:
    - id: GO:0070646
      label: protein modification by small protein removal
      description: Closest correct existing BP term for UFM1 deconjugation; its
        definition explicitly includes removal of ubiquitin-like proteins. Unlike
        GO:0016579 (protein deubiquitination), it is not ubiquitin-specific and is
        the direct parent of the analogous protein desumoylation (GO:0016926) and
        protein deneddylation (GO:0000338) terms.
    supported_by:
    - reference_id: file:DANRE/ufsp2/ufsp2-deep-research-falcon.md
      supporting_text: |-
        Cross-species evidence supports that UFSP2 catalyzes:
        - **Proteolytic maturation of pro-UFM1** to mature UFM1 required for UFMylation, and
        - **Hydrolysis of isopeptide bonds** linking UFM1 to substrate proteins (de-UFMylation).
