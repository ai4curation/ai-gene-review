id: Q7T347
gene_symbol: ufsp2
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:7955
  label: Danio rerio
description: ufsp2 encodes a UFM1-specific cysteine protease (peptidase C78 family)
  that functions as the primary deUFMylase in the UFM1 conjugation pathway. The enzyme
  cleaves UFM1 from conjugated substrates (deconjugation) and processes UFM1 precursors
  to expose the C-terminal glycine required for conjugation (maturation). Its principal
  substrate is UFMylated RPL26 on ER-bound 60S ribosomal subunits, where deUFMylation
  by ufsp2 is required for ribosome recycling during ER-associated ribosome quality
  control. All annotations for zebrafish ufsp2 are inferred from mammalian orthologs
  (human UFSP2 and mouse Ufsp2) by sequence similarity.
