description: hs6st3b encodes a type II membrane heparan-sulfate 6-O-sulfotransferase. It transfers sulfate from PAPS to the 6-O position of glucosamine residues in heparan sulfate, shaping heparan sulfate proteoglycan biosynthesis and ligand-binding properties.
