suggested_questions:
- question: |-
    Does zebrafish hs6st3b have a distinct HS acceptor-context preference (e.g., 2-O-sulfated or
    IdoA-GlcNS contexts) relative to the other zebrafish 6-OST paralogs, and does this differ from
    hs6st3a?
- question: |-
    What is the loss-of-function phenotype of a zebrafish hs6st3b-specific mutant (as opposed to
    pan-hs6st morpholino knockdown), and which morphogen pathways (Wnt, Shh, FGF) are affected?
suggested_experiments:
- description: |-
    Generate a zebrafish hs6st3b-specific loss-of-function allele (CRISPR) and quantify HS
    6-O-sulfation by disaccharide mapping (heparinase digestion + HPLC) to determine the
    paralog-specific contribution of hs6st3b to the 6-O-sulfation pattern in vivo.
- description: |-
    Determine the subcellular localization of tagged hs6st3b in zebrafish (or a cell system) by
    co-staining with Golgi markers to directly test the family-based inference of Golgi membrane
    localization.
