core_functions:
- description: |-
    hs6st3b performs heparan sulfate 6-sulfotransferase activity as heparan-sulfate 6-O-sulfotransferase
    3-B, transferring sulfate from PAPS to the 6-O position of N-sulfoglucosamine in heparan sulfate
    within the Golgi, thereby contributing to heparan sulfate proteoglycan biosynthesis.
