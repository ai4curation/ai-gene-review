    summary: |-
      Golgi membrane (GO:0000139) is proposed as a NEW, more informative localization than the
      generic membrane (GO:0016020) currently annotated. HS chain modification (epimerization and
      sulfation) occurs in the Golgi, and family-based analysis of zebrafish Hs6st enzymes infers a
      type II transmembrane topology with Golgi apparatus localization. This is currently a
      family-based inference rather than a direct hs6st3b localization experiment.
    action: NEW
