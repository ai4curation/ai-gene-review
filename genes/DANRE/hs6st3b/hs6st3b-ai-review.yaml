taxon:
  id: NCBITaxon:7955
  label: Danio rerio
description: |-
  hs6st3b encodes a type II transmembrane heparan-sulfate 6-O-sulfotransferase (an HS6ST3
  paralog) that acts in the Golgi during heparan sulfate proteoglycan biosynthesis. It transfers
  sulfate from the universal donor PAPS (3'-phosphoadenosine 5'-phosphosulfate) to position 6 of
  the N-sulfoglucosamine (GlcNS) residue of heparan sulfate, generating 6-O-sulfated HS motifs that
  shape the binding of extracellular ligands (growth factors, morphogens, chemokines). The catalytic
  domain has been crystallized (zebrafish 6-OST; PDB 5T03/5T05/5T0A) showing in-line sulfo transfer
  to the acceptor 6-hydroxyl, with His158 as the catalytic base and Trp210 orienting the acceptor.
  hs6st3b is one of several zebrafish 6-OST paralogs (hs6st1a, hs6st1b, hs6st2, hs6st3a, hs6st3b)
  with distinct spatiotemporal expression; paralog-specific biochemical parameters for hs6st3b
  remain incompletely defined, so substrate-preference and pathway claims are partly family-based
  inference.
