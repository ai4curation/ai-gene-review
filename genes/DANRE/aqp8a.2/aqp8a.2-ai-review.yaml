id: A1L2B1
gene_symbol: aqp8a.2
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:7955
  label: Danio rerio
description: >-
  Zebrafish aquaporin-8a.2 (aqp8a.2, also known as aqp8ab or DrAqp8ab) is a member of the
  aquaporin superfamily (MIP/aquaporin family TC 1.A.8). It is an integral membrane protein
  with six predicted transmembrane helices and two NPA motifs characteristic of functional
  water channels. Aqp8a.2 arose as a tandem intrachromosomal duplicate of aqp8aa on
  chromosome 12, while a third paralog (aqp8b) resides on chromosome 3 as a product of whole
  genome duplication (PMID:20149227). Functional characterization in Xenopus laevis oocytes
  demonstrated that aqp8a.2 transports both water and urea, but not glycerol, distinguishing
  it from both classical aquaporins (water-only) and aquaglyceroporins (water, glycerol, and
  urea) (PMID:20149227). In adult zebrafish, aqp8a.2 is expressed in gut, kidney, ovary,
  testis, eye, gills, and liver (PMID:20149227). During embryonic development, aqp8a.2 mRNA
  is detected in the intestine starting at 72 hpf, with expression increasing through later
  stages and localizing to the epithelial cells lining the intestinal cavity
  (PMID:35880566). CRISPR/Cas9 knockout of aqp8a.2 causes intestinal bifida, impaired
  intestinal lumen formation, pericardial edema, and shortened body axis, phenotypes that
  are rescued by aqp8a.2 mRNA injection, demonstrating a specific requirement for this
  aquaporin in zebrafish embryonic intestine development (PMID:35880566).
existing_annotations:
- term:
    id: GO:0006833
    label: water transport
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      IBA annotation inferred by phylogenetic analysis from multiple aquaporin orthologs.
      Consistent with the demonstrated water permeability of aqp8a.2 when expressed in
      Xenopus oocytes (PMID:20149227). Water transport is a core biological process for
      this aquaporin.
    action: ACCEPT
    reason: >-
      The phylogenetic inference is well-supported by direct experimental evidence showing
      that aqp8a.2 significantly increases water permeability when expressed in Xenopus
      oocytes (PMID:20149227).
- term:
    id: GO:0005886
    label: plasma membrane
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      IBA annotation for plasma membrane localization inferred by phylogenetic analysis.
      Aquaporins are integral membrane proteins that function at the plasma membrane to
      facilitate water transport. UniProt also annotates this protein as a multi-pass
      membrane protein. Consistent with aqp8a.2 functioning as a water channel at the cell
      surface of intestinal epithelial cells (PMID:35880566).
    action: ACCEPT
    reason: >-
      Plasma membrane localization is consistent with the known biology of aquaporins as
      integral membrane water channels. The phylogenetic inference is sound and supported
      by the functional assay in Xenopus oocytes where the protein must traffic to the
      plasma membrane to confer water permeability.
- term:
    id: GO:0015250
    label: water channel activity
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      IBA annotation for water channel activity inferred from aquaporin orthologs.
      Directly supported by oocyte swelling assays showing that aqp8a.2 expression induces
      significant increase in osmotic water permeability in Xenopus oocytes
      (PMID:20149227).
    action: ACCEPT
    reason: >-
      The phylogenetic inference is directly supported by experimental evidence from
      Xenopus oocyte swelling assays demonstrating water channel function. This is a core
      molecular function of the protein.
- term:
    id: GO:0015267
    label: channel activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: >-
      IEA annotation based on InterPro domain IPR000425 (MIP family). This is a correct
      but overly general annotation. The more specific water channel activity (GO:0015250)
      and urea transmembrane transporter activity (GO:0015204) already capture this
      function.
    action: MODIFY
    reason: >-
      Channel activity is too general. The protein has been experimentally shown to have
      water channel activity (GO:0015250) and urea transmembrane transporter activity
      (GO:0015204), which are more informative.
    proposed_replacement_terms:
      - id: GO:0015250
        label: water channel activity
- term:
    id: GO:0016020
    label: membrane
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  review:
    summary: >-
      IEA annotation for membrane localization. Correct but overly general. The more
      specific plasma membrane (GO:0005886) annotation already exists via IBA evidence.
    action: MODIFY
    reason: >-
      Membrane is too general. The protein is specifically localized to the plasma membrane
      as an integral multi-pass membrane protein, and a more specific annotation
      (GO:0005886) already exists.
    proposed_replacement_terms:
      - id: GO:0005886
        label: plasma membrane
- term:
    id: GO:0055085
    label: transmembrane transport
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: >-
      IEA annotation based on InterPro domain IPR000425. This is correct but overly
      general. The more specific water transport (GO:0006833) and urea transmembrane
      transport (GO:0071918) already capture the relevant biological processes.
    action: MODIFY
    reason: >-
      Transmembrane transport is too general. The specific substrates transported by this
      aquaporin (water and urea) are already annotated via more specific GO terms.
    proposed_replacement_terms:
      - id: GO:0006833
        label: water transport
- term:
    id: GO:0071918
    label: urea transmembrane transport
  evidence_type: IEA
  original_reference_id: GO_REF:0000108
  review:
    summary: >-
      IEA annotation inferred from the urea transmembrane transporter activity
      (GO:0015204) annotation via logical inference. Consistent with the experimental
      demonstration that aqp8a.2 transports urea in Xenopus oocyte assays
      (PMID:20149227).
    action: ACCEPT
    reason: >-
      The logical inference from the experimentally supported urea transporter activity
      annotation is valid. Urea transmembrane transport is a legitimate biological process
      for this protein.
- term:
    id: GO:0048565
    label: digestive tract development
  evidence_type: IMP
  original_reference_id: PMID:35880566
  review:
    summary: >-
      IMP annotation based on CRISPR/Cas9 knockout of aqp8ab (aqp8a.2) in zebrafish.
      Knockout mutants display intestinal bifida, impaired intestinal lumen formation,
      pericardial edema, and shortened body axis from 3-6 dpf. The intestine defects
      are rescued by aqp8ab mRNA injection, confirming specificity.
    action: KEEP_AS_NON_CORE
    reason: >-
      The digestive tract development phenotype is well-supported by CRISPR/Cas9 knockout
      and rescue experiments. However, this represents a downstream developmental
      consequence of the core water/urea transport function rather than a direct molecular
      function. The annotation correctly uses the acts_upstream_of_or_within qualifier.
    supported_by:
      - reference_id: PMID:35880566
        supporting_text: >-
          Knockout of aqp8ab using the CRISPR/Cas9 system induces intestine development
          defects and abnormal formation of intestinal lumen. In addition, aqp8ab mRNA
          significantly rescues the intestine defects in the aqp8ab mutant. These results
          indicate that aqp8ab is required in the intestine development of zebrafish.
- term:
    id: GO:0005372
    label: water transmembrane transporter activity
  evidence_type: IDA
  original_reference_id: PMID:20149227
  review:
    summary: >-
      IDA annotation based on Xenopus laevis oocyte swelling assays. Expression of
      aqp8a.2 (DrAqp8ab) in oocytes induced a significant increase in osmotic water
      permeability. Water transport was blocked by HgCl2, consistent with the presence
      of a mercury-sensitive cysteine upstream of the second NPA motif.
    action: ACCEPT
    reason: >-
      The annotation is directly supported by functional characterization in Xenopus
      oocytes showing water permeability. This is a core molecular function of the protein.
    supported_by:
      - reference_id: PMID:20149227
        supporting_text: >-
          Expression of all of the aquaporin isoforms, except draqp11b and -12, induced
          a three- to twenty-fold increase in oocyte water permeability
- term:
    id: GO:0015204
    label: urea transmembrane transporter activity
  evidence_type: IDA
  original_reference_id: PMID:20149227
  review:
    summary: >-
      IDA annotation based on isotope-labeled solute uptake assays in Xenopus laevis
      oocytes. Oocytes expressing aqp8a.2 (DrAqp8ab) were permeable to urea but not
      glycerol, distinguishing this protein from aquaglyceroporins.
    action: ACCEPT
    reason: >-
      The urea transport activity is directly demonstrated by radiolabeled solute uptake
      assays in Xenopus oocytes. This is a core molecular function distinguishing the
      AQP8 subfamily from both classical aquaporins and aquaglyceroporins.
    supported_by:
      - reference_id: PMID:20149227
        supporting_text: >-
          Oocytes expressing draqp8aa or -8ab were permeable to water and urea, but not
          glycerol.
