- id: PMID:20149227
  title: The zebrafish genome encodes the largest vertebrate repertoire of functional
    aquaporins with dual paralogy and substrate specificities similar to mammals.
  findings:
    - statement: >-
        Zebrafish has three AQP8 paralogs (draqp8aa, draqp8ab/aqp8a.2, and draqp8b),
        with draqp8aa and draqp8ab arising from tandem intrachromosomal duplication on
        chromosome 12 and draqp8b from whole genome duplication on chromosome 3.
      supporting_text: >-
        DrAqp8 was found in triplicate across two chromosomes
    - statement: >-
        Aqp8a.2 (DrAqp8ab) transports both water and urea when expressed in Xenopus
        oocytes, but does not transport glycerol.
      supporting_text: >-
        Oocytes expressing draqp8aa or -8ab were permeable to water and urea, but not
        glycerol.
    - statement: >-
        The intrachromosomal duplicates (draqp8aa and draqp8ab) transport both water and
        urea, while the genomic duplicate (draqp8b) transports only water.
      supporting_text: >-
        intrachromosomal duplicates of zebrafish AQP8 were water and urea permeable,
        while the genomic duplicate only transported water.
    - statement: >-
        Aqp8a.2 (draqp8ab) is expressed in gut, kidney, ovary, testis, eye, gills, and
        liver in adult zebrafish, with broader tissue distribution than draqp8aa (gut and
        kidney only) or draqp8b (brain only).
      supporting_text: >-
        draqp8ab mRNA being also present in the ovary, testis, eye, gills and liver.
        The diffuse expression of draqp8aa and -8ab resembles that found for mammalian
        AQP8, which is present in the testis, ovary, kidney, liver, pancreas, small
        intestine and colon
- id: PMID:35880566
  title: Aquaporin 8ab is required in zebrafish embryonic intestine development.
  findings:
    - statement: >-
        Aqp8ab (aqp8a.2) mRNA is specifically expressed in the developing zebrafish
        intestine, first detected at 72 hpf with increasing expression through 6 dpf.
      supporting_text: >-
        In the 72 hpf stage embryo, weak expression of aqp8ab was observed in zebrafish
        intestine
    - statement: >-
        Aqp8ab mRNA expression is localized to the epithelial cells lining the
        intestinal cavity.
      supporting_text: >-
        aqp8ab mRNA expression was presumably confined to the epithelial cells lining
        the intestinal cavity
    - statement: >-
        CRISPR/Cas9 knockout of aqp8ab causes intestinal bifida, impaired lumen
        formation, pericardial edema, and shortened body axis.
      supporting_text: >-
        the deletion of aqp8ab induced zebrafish embryo intestinal bifida, and the
        intestines were deformed
    - statement: >-
        Aqp8ab mRNA injection rescues the intestinal defects in aqp8ab mutants,
        confirming specificity.
      supporting_text: >-
        the embryos co-injected with aqp8ab mRNA can rescue the intestine development
        defects
    - statement: >-
        Loss of aqp8ab results in formation of double independent intestinal tracts with
        no lumen or a small lumen instead of a single intestinal tract with proper lumen.
      supporting_text: >-
        Cross-sections revealed double independent intestinal tracts with no lumen or a
        small lumen at 4 and 5 dpf, compared with the control group
core_functions:
  - molecular_function:
      id: GO:0005372
      label: water transmembrane transporter activity
    directly_involved_in:
      - id: GO:0006833
        label: water transport
    locations:
      - id: GO:0005886
        label: plasma membrane
    description: >-
      Aqp8a.2 functions as a water channel, facilitating passive transport of water across
      cell membranes. This was directly demonstrated by Xenopus oocyte swelling assays showing
      a significant increase in osmotic water permeability upon expression of the protein
      (PMID:20149227). Water transport through aqp8a.2 is mercury-sensitive, consistent with
      a cysteine residue upstream of the second NPA motif.
    supported_by:
      - reference_id: PMID:20149227
        supporting_text: >-
          Expression of all of the aquaporin isoforms, except draqp11b and -12, induced
          a three- to twenty-fold increase in oocyte water permeability
  - molecular_function:
      id: GO:0015204
      label: urea transmembrane transporter activity
    directly_involved_in:
      - id: GO:0071918
        label: urea transmembrane transport
    locations:
      - id: GO:0005886
        label: plasma membrane
    description: >-
      Aqp8a.2 transports urea in addition to water, as demonstrated by radiolabeled solute
      uptake assays in Xenopus oocytes (PMID:20149227). This urea permeability distinguishes
      the intrachromosomal AQP8 duplicates (aqp8aa and aqp8a.2) from the genomic duplicate
      (aqp8b), which transports only water. The urea permeability also distinguishes AQP8
      from classical water-selective aquaporins (AQP0, AQP1, AQP4).
    supported_by:
      - reference_id: PMID:20149227
        supporting_text: >-
          Oocytes expressing draqp8aa or -8ab were permeable to water and urea, but not
          glycerol.
proposed_new_terms: []
suggested_questions:
  - question: >-
      What is the relative contribution of aqp8a.2 versus aqp8aa to water and urea
      transport in the adult zebrafish intestine, given their overlapping expression
      in the gut?
  - question: >-
      Does the intestinal lumen formation defect in aqp8a.2 mutants result from impaired
      water transport, urea transport, or both?
  - question: >-
      Is there functional redundancy between the three zebrafish AQP8 paralogs (aqp8aa,
      aqp8a.2, aqp8b) in other tissues where their expression overlaps?
suggested_experiments:
  - description: >-
      Generate aqp8aa single and aqp8aa/aqp8a.2 double CRISPR/Cas9 knockouts to determine
      whether aqp8aa shares a role in intestine development and to assess functional
      redundancy between the tandem duplicates.
  - description: >-
      Perform immunofluorescence localization of aqp8a.2 protein in the developing
      zebrafish intestine to determine apical versus basolateral membrane targeting in
      intestinal epithelial cells.
  - description: >-
      Measure luminal fluid composition (osmolarity, urea concentration) in aqp8a.2
      knockout versus wild-type embryos to determine whether the intestinal lumen
      formation defect is driven by impaired water or urea transport.
