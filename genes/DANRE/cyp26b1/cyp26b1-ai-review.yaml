- id: file:DANRE/cyp26b1/cyp26b1-deep-research-falcon.md
  title: Falcon (Edison) deep research report for Danio rerio cyp26b1 (UniProt Q6EIG3)
  findings:
  - statement: |-
      Cyp26b1 is a CYP26-subfamily cytochrome P450 that restricts retinoic-acid signaling by enzymatically converting RA to more polar metabolites, reducing receptor-available RA and helping generate RA-negative domains and gradients.
    supporting_text: restrict RA signaling by enzymatically converting RA to more polar metabolites
    reference_section_type: RESULTS
  - statement: |-
      Contemporary zebrafish work frames Cyp26b1 explicitly as inactivating all-trans retinoic acid through hydroxylation.
    supporting_text: ATRA is inactivated through hydroxylation by Cytochrome P450 26B1 (Cyp26b1)
    reference_section_type: RESULTS
  - statement: |-
      CYP26 enzymes hydroxylate/oxidize RA to a defined set of polar metabolites, supporting a retinoic-acid catabolic (rather than merely metabolic) role.
    supporting_text: 4-hydroxy-RA, 4-oxo-RA, 18-hydroxy-RA, and 5,8-epoxy all-trans-RA
    reference_section_type: RESULTS
  - statement: |-
      CYP26 enzymes are microsomal, membrane-anchored class II P450s localized to the endoplasmic reticulum, consistent with the ER-membrane localization annotations.
    supporting_text: microsomal/membrane-anchored class II cytochrome P450s localized to the endoplasmic reticulum (ER)
    reference_section_type: RESULTS
  - statement: |-
      Catalysis requires the redox partner cytochrome P450 oxidoreductase (POR) and NADPH, consistent with the heme/iron cofactor-binding annotations.
    supporting_text: requiring **cytochrome P450 oxidoreductase (POR)** and **NADPH** for catalysis
    reference_section_type: RESULTS
  - statement: |-
      The zebrafish Cyp26 enzymes act redundantly to shape RA-dependent gene-expression domains in the hindbrain, supporting the hindbrain-development and rhombomere-morphogenesis annotations as downstream developmental consequences.
    supporting_text: Cyp26 enzymes function redundantly to shape RA-dependent gene-expression domains in the hindbrain
    reference_section_type: RESULTS
  - statement: |-
      Loss of cyp26b1 function causes hyperossification and vertebral fusion, supporting the ossification, bone-morphogenesis and skeletal-development annotations as consequences of excess RA signaling.
    supporting_text: Loss of cyp26b1 function results in **hyperossification** and **vertebral fusion**
    reference_section_type: RESULTS
  - statement: |-
      During fin regeneration, proximal cyp26b1 expression establishes a proximal-low/distal-high RA environment that coordinates preosteoblast proliferation and redifferentiation, illustrating cyp26b1 acting as a local RA sink.
    supporting_text: helping establish a **proximal-low / distal-high RA** environment that coordinates **preosteoblast proliferation** and **redifferentiation**
    reference_section_type: RESULTS
  - statement: |-
      In cartilage regeneration, cyp26b1 is enriched in col2a1a+ newly forming chondrocytes and is strongly upregulated at 3-4 days post ablation, indicating dynamic compartmentalized RA degradation during regenerative chondrogenesis.
    supporting_text: while **cyp26b1** is enriched in **col2a1a+ newly forming chondrocytes**
    reference_section_type: RESULTS
  - statement: |-
      ENU-derived zebrafish cyp26b1 mutant allele t24295 fails to form select cranial sutures, paralleling the cranial-suture morphogenesis annotations and human craniosynostosis.
    supporting_text: ENU-derived zebrafish **cyp26b1 mutants (allele t24295)** have been used as models and are reported to show **failure to form select cranial sutures**
    reference_section_type: RESULTS
  - statement: |-
      Authoritative synthesis interprets cyp26b1 loss-of-function phenotypes as consequences of excess/ectopic RA rather than loss of active downstream metabolites, reinforcing retinoic-acid catabolism as the core function and the morphogenesis terms as non-core.
    supporting_text: loss-of-function phenotypes are generally attributable to **excess/ectopic RA**
    reference_section_type: DISCUSSION
