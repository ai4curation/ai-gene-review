- id: PMID:15661642
  title: Expression of cyp26b1 during zebrafish early development.
  findings:
  - statement: cDNA transfection assays show that, like its human ortholog, zebrafish cyp26b1 limits retinoic-acid activity; zygotic expression initiates in hindbrain rhombomeres and later in pharyngeal arch primordia.
    supporting_text: zebrafish cyp26b1 is involved in limiting the activity of retinoic acid
- id: PMID:17164423
  title: Cyp26 enzymes generate the retinoic acid response pattern necessary for hindbrain development.
  findings:
  - statement: The three zebrafish Cyp26 enzymes (including cyp26b1) act redundantly to degrade RA and shape RA-responsive gene-expression domains, generating the RA response pattern required for hindbrain rhombomere patterning.
    supporting_text: Cyp26 enzymes generate the retinoic acid response pattern necessary for
- id: PMID:18927155
  title: Retinoic acid and Cyp26b1 are critical regulators of osteogenesis in the axial skeleton.
  findings:
  - statement: The zebrafish stocksteif mutant, which exhibits severe over-ossification of the vertebral column, encodes cyp26b1, identifying a role for RA degradation in axial osteogenesis.
    supporting_text: stocksteif encodes cyp26b1, a cytochrome P450 member that metabolizes RA
  - statement: cyp26b1 is expressed within osteoblasts, where it must tightly control local RA levels; loss of catabolism causes RA-driven increased osteoblast activity and defective skeletogenesis.
    supporting_text: Cyp26b1 is expressed within osteoblast cells, demonstrating that RA levels
- id: PMID:18927157
  title: Restriction of retinoic acid activity by Cyp26b1 is required for proper timing and patterning of osteogenesis during
    zebrafish development.
  findings:
  - statement: cyp26b1 (the dolphin mutation) is expressed in condensing chondrocytes and osteoblasts; mutants and RA-treated fish show reduced midline cartilage and hyperossification of facial and axial bones.
    supporting_text: cyp26b1 is expressed in condensing chondrocytes as well as in osteoblasts
  - statement: Temporal and spatial restriction of RA signaling by Cyp26 enzymes is required to attenuate osteoblast maturation and activity in vivo, controlling the timing and patterning of osteogenesis.
    supporting_text: is required to attenuate osteoblast maturation and/or activity in vivo
- id: PMID:22019272
  title: Craniosynostosis and multiple skeletal anomalies in humans and zebrafish result from a defect in the localized degradation
    of retinoic acid.
  findings:
  - statement: Human null and hypomorphic CYP26B1 mutations cause craniosynostosis, long-bone fusions and calvarial hypoplasia; zebrafish cyp26b1 mutants and Cyp26-inhibited mice phenocopy this, showing localized RA degradation is required for normal suture and skeletal development.
    supporting_text: Craniosynostosis and multiple skeletal anomalies
- id: PMID:25652838
  title: Altered retinoic acid signalling underpins dentition evolution.
  findings:
  - statement: Adult zebrafish heterozygous for the cyp26b1 mutant possess an extra ventral-row tooth, linking reduced RA degradation by cyp26b1 to increased tooth number in cyprinids.
    supporting_text: heterozygous for the cyp26b1 mutant that encodes an enzyme able to degrade RA possess an extra tooth in the ventral row
  - statement: RA availability, modulated by rate-limiting enzymes such as cyp26b1, influences pharyngeal mesenchyme marker expression (dlx2a, lhx6) and is an active driver of tooth-number diversification.
    supporting_text: changes in RA signalling play an important role in the diversification of teeth in Cyprinids
- id: PMID:29227993
  title: In vivo zebrafish morphogenesis shows Cyp26b1 promotes tendon condensation and musculoskeletal patterning in the
    embryonic jaw.
  findings:
  - statement: In cyp26b1 mutants, neural-crest-derived tenoblasts are generated normally but fail to condense into nascent tendons in the ventral pharyngeal arches, causing ectopic muscle attachments and disrupted craniofacial musculoskeletal integration.
    supporting_text: fail to condense into nascent tendons
- id: PMID:9007254
  title: 'Jaw and branchial arch mutants in zebrafish II: anterior arches and cartilage differentiation.'
  findings:
  - statement: A large-scale screen recovered zebrafish mutants with specific defects in pharyngeal-arch cartilage differentiation and growth, establishing the mutant class and craniofacial cartilage phenotypes against which cyp26b1 jaw/arch defects are interpreted.
    supporting_text: the differentiation of cartilage and growth is affected
  - statement: Mutations in single genes can selectively reduce ventral mandibular and hyoid arch cartilages while sparing or enlarging dorsal structures, illustrating dorsoventral and arch-specific patterning of craniofacial cartilage.
    supporting_text: ventral components of the mandibular and hyoid arches are reduced
