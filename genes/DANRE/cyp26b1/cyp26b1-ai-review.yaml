id: Q6EIG3
gene_symbol: cyp26b1
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:7955
  label: Danio rerio
description: cyp26b1 encodes cytochrome P450 26B1, an endoplasmic-reticulum retinoic-acid hydroxylase that catabolizes all-trans
  retinoic acid and limits retinoic-acid receptor signaling during embryonic patterning. The core function is retinoic-acid
  hydroxylation/catabolism; skeletal, tendon, craniofacial, and hindbrain phenotypes are retained as non-core developmental
  consequences of altered retinoic-acid homeostasis.
existing_annotations:
- term:
    id: GO:0034653
    label: retinoic acid catabolic process
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: |-
      retinoic acid catabolic process (GO:0034653) is directly supported for Cyp26b1. Falcon deep research confirms Cyp26b1 restricts RA signaling by enzymatically converting RA to more polar metabolites (4-hydroxy-RA, 4-oxo-RA, 18-hydroxy-RA, 5,8-epoxy all-trans-RA), and contemporary zebrafish work frames it as inactivating ATRA through hydroxylation.
    action: ACCEPT
    reason: Cyp26b1 is an ER cytochrome P450 that hydroxylates/catabolizes retinoic acid.
    supported_by:
