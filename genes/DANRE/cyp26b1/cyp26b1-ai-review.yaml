suggested_questions:
- question: How are the relative contributions of C-4 versus C-18 hydroxylation by Cyp26b1 to all-trans retinoic acid
    catabolism distributed in vivo, and do different oxidized products have distinct downstream signaling consequences?
- question: How much functional redundancy exists between cyp26b1 and its paralogs cyp26a1 and cyp26c1 in different tissues
    (hindbrain, skeleton, teeth, craniofacial cartilage), and what determines tissue-specific non-redundancy?
- question: Through which target genes does excess retinoic acid in cyp26b1 mutants increase osteoblast activity and disrupt
    tenoblast condensation, and are these RAR-dependent transcriptional responses?
suggested_experiments:
- hypothesis: Cyp26b1 controls a local retinoic-acid sink whose loss raises atRA concentration specifically in osteoblasts,
    chondrocytes and pharyngeal-arch tenoblasts.
  description: Quantify all-trans retinoic acid and its 4-OH and 18-OH oxidized metabolites in dissected wild-type versus
    cyp26b1 mutant skeletal, craniofacial and tooth-forming tissues to map where RA accumulates.
  experiment_type: LC-MS retinoid quantification
- hypothesis: cyp26b1 acts non-cell-autonomously, with neural-crest-derived cells degrading RA to permit condensation of
    adjacent scxa-expressing tenoblasts and proper craniofacial cartilage patterning.
  description: Generate tissue-specific CRISPR knockouts or genetic mosaics of cyp26b1 in neural crest versus tenoblast
    lineages and assess tendon condensation, cartilage morphogenesis and muscle attachment by time-lapse imaging.
  experiment_type: CRISPR
- hypothesis: cyp26b1, cyp26a1 and cyp26c1 are partially redundant such that compound loss expands RA-responsive domains
    and skeletal/dental phenotypes beyond single mutants.
  description: Compare expression of RA-responsive markers (e.g. hox genes, dlx2a, lhx6) and skeletal/tooth phenotypes
    across single, double and triple cyp26 mutant or morphant combinations using in situ hybridization.
  experiment_type: in situ hybridization
