    - reference_id: file:DANRE/cyp26b1/cyp26b1-uniprot.txt
      supporting_text: 'SUBCELLULAR LOCATION: Endoplasmic reticulum membrane'
    - reference_id: PMID:15661642
      supporting_text: zebrafish cyp26b1 is involved in limiting the activity of retinoic acid
    - reference_id: file:DANRE/cyp26b1/cyp26b1-deep-research-falcon.md
      supporting_text: restrict RA signaling by enzymatically converting RA to more polar metabolites
