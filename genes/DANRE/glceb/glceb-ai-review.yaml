id: F1QR43
gene_symbol: glceb
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:7955
  label: Danio rerio
description: glceb encodes zebrafish D-glucuronyl C5-epimerase B, a Golgi membrane enzyme that converts D-glucuronic acid
  residues adjacent to N-sulfated sugars into L-iduronic acid during heparan sulfate and heparin chain biosynthesis. The core
  function is heparosan-N-sulfate-glucuronate 5-epimerase activity in heparan sulfate proteoglycan biosynthesis; homodimerization/protein-binding
  evidence is retained as non-core structural information.
