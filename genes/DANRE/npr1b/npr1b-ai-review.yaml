- term:
    id: GO:0009190
    label: cyclic nucleotide biosynthetic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: >-
      InterPro-based annotation of cyclic nucleotide biosynthetic process. This is a
      parent term of cGMP biosynthetic process and is correct but less specific than
      the existing IBA annotation to GO:0006182 (cGMP biosynthetic process).
    action: MODIFY
    reason: >-
      While technically correct, this term is overly general. The protein specifically
      produces cGMP (not cAMP), so the more specific term GO:0006182 (cGMP biosynthetic
      process) is more appropriate and already annotated via IBA.
    proposed_replacement_terms:
    - id: GO:0006182
      label: cGMP biosynthetic process

