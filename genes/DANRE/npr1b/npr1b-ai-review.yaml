- term:
    id: GO:0071678
    label: olfactory bulb axon guidance
  evidence_type: IMP
  original_reference_id: PMID:26732841
  review:
    summary: >-
      This IMP annotation from ZFIN is based on mutant phenotype analysis. The
      referenced publication (Taku et al. 2016) describes how attractant and repellent
      cues cooperate to guide olfactory sensory axons to protoglomerular targets in
      zebrafish. The ZFIN genotype reference suggests an npr1b mutant was analyzed,
      though the publication abstract primarily discusses Nrp1a, Nrp2b, Dcc, and
      Sema3D signaling. The qualifier is acts_upstream_of_or_within, reflecting that
      the gene's role may be indirect.
    action: UNDECIDED
    reason: >-
      The publication abstract does not explicitly mention npr1b (natriuretic peptide
      receptor 1b). The paper focuses on neuropilin (nrp1a, nrp2b), Dcc, and Sema3D
      signaling in olfactory axon guidance. While ZFIN curators annotated npr1b based
      on genotype data that may include full-text evidence, the available abstract text
      does not allow independent verification of this annotation. The gene names
      nrp1a (neuropilin) and npr1b (natriuretic peptide receptor) are distinct genes.
      Full-text review would be needed to confirm whether npr1b mutant data is
      presented in this paper.
    supported_by:
    - reference_id: PMID:26732841
      supporting_text: >-
        Olfactory sensory axons target well-defined intermediate targets in the
        zebrafish olfactory bulb called protoglomeruli well before they form odorant
        receptor-specific glomeruli.

