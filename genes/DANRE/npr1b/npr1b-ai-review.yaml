- id: PMID:26732841
  title: >-
    Attractant and repellent cues cooperate in guiding a subset of olfactory sensory
    axons to a well-defined protoglomerular target.
  findings:
  - statement: >-
      Olfactory sensory axons target protoglomeruli in the zebrafish olfactory bulb,
      guided by cooperating attractant and repellent cues.
    supporting_text: >-
      Olfactory sensory axons target well-defined intermediate targets in the
      zebrafish olfactory bulb called protoglomeruli well before they form odorant
      receptor-specific glomeruli.
  - statement: >-
      Semaphorin 3D acts as a repellent in the anterior bulb to push olfactory sensory
      axons toward the central zone protoglomerulus.
    supporting_text: >-
      Semaphorin 3D (Sema3D) is expressed in the anterior bulb and acts as a repellent
      that pushes them towards the CZ.
  - statement: >-
      Nrp1a and Dcc act cell-autonomously in sensory neurons as independent parallel
      signaling systems for protoglomerular targeting.
    supporting_text: >-
      dcc and nrp1a double mutants have significantly more DZ misprojections than
      either single mutant, suggesting that the two signaling systems act
      independently and in parallel to direct a specific subset of sensory axons to
      their initial protoglomerular target.

core_functions:
- molecular_function:
    id: GO:0004383
    label: guanylate cyclase activity
  description: >-
    Npr1b is a receptor guanylate cyclase that catalyzes the conversion of GTP to
    cGMP (EC 4.6.1.2) upon binding of natriuretic peptide ligands. The protein
    contains an extracellular ligand-binding domain for natriuretic peptides, a
    single transmembrane helix, a regulatory pseudokinase domain that binds ATP,
    and a C-terminal guanylate cyclase catalytic domain. This is the canonical
    function of NPR1-family receptor guanylyl cyclases, mediating cGMP-dependent
    signaling pathways involved in cardiovascular homeostasis, skeletal growth,
    and other physiological processes.
  directly_involved_in:
  - id: GO:0006182
    label: cGMP biosynthetic process
  - id: GO:0007168
    label: receptor guanylyl cyclase signaling pathway
  locations:
  - id: GO:0005886
    label: plasma membrane

- molecular_function:
    id: GO:0001653
    label: peptide receptor activity
  description: >-
    Npr1b functions as a receptor for natriuretic peptides. By homology to mammalian
    NPR1/GC-A, it is predicted to bind atrial natriuretic peptide (ANP) and brain
    natriuretic peptide (BNP), and potentially C-type natriuretic peptide (CNP).
    Ligand binding to the extracellular domain activates the intracellular guanylate
    cyclase domain, triggering cGMP production and downstream signaling.
  directly_involved_in:
  - id: GO:0007168
    label: receptor guanylyl cyclase signaling pathway
  locations:
  - id: GO:0005886
    label: plasma membrane

proposed_new_terms: []

suggested_questions:
- question: >-
    Does the PMID:26732841 annotation of npr1b to olfactory bulb axon guidance reflect
    a genuine role for natriuretic peptide/cGMP signaling in axon guidance, or could this
    be an annotation error confusing npr1b with nrp1a/nrp2b (neuropilins)?
- question: >-
    What are the specific natriuretic peptide ligands for zebrafish npr1b? Is it more
    similar in ligand specificity to mammalian NPR1/GC-A (binding ANP/BNP) or NPR2/GC-B
    (binding CNP)?
- question: >-
    Does npr1b play a role in zebrafish cardiovascular development and homeostasis, as
    would be predicted by homology to mammalian NPR1?

suggested_experiments:
- description: >-
    Generate npr1b-specific CRISPR knockout zebrafish and assess cardiovascular phenotypes
    (blood pressure, cardiac function, edema) to determine whether the conserved
    natriuretic peptide signaling role is maintained in zebrafish.
  hypothesis: >-
    npr1b loss-of-function zebrafish will show cardiovascular defects consistent with
    disrupted natriuretic peptide signaling, similar to Npr1 knockout mice.
- description: >-
    Perform in situ hybridization for npr1b in zebrafish embryos to determine expression
    pattern, particularly in the olfactory system, to evaluate whether the olfactory bulb
    axon guidance annotation is plausible.
  hypothesis: >-
    If npr1b is expressed in olfactory sensory neurons or the olfactory bulb, this would
    support a role in olfactory axon guidance; absence of expression would suggest
    the annotation may be erroneous.
- description: >-
    Conduct ligand binding assays with recombinant npr1b extracellular domain against
    zebrafish natriuretic peptides (nppa, nppb, nppc) to determine ligand specificity.
  hypothesis: >-
    Zebrafish npr1b will show preferential binding to specific natriuretic peptide
    ligands, clarifying its receptor subtype classification.
