description: >-
  Zebrafish npr1b encodes a natriuretic peptide receptor with intrinsic guanylate cyclase
  activity (EC 4.6.1.2). The protein is a single-pass type I membrane receptor belonging to
  the adenylyl cyclase class-4/guanylyl cyclase family. It contains an extracellular
  ligand-binding domain, a transmembrane domain, an intracellular protein kinase-like domain,
  and a C-terminal guanylate cyclase catalytic domain. Upon binding natriuretic peptides,
  it catalyzes the conversion of GTP to cGMP, mediating downstream signaling through the
  receptor guanylyl cyclase signaling pathway. In zebrafish, npr1b has been implicated in
  olfactory bulb axon guidance based on mutant phenotype analysis.

existing_annotations:
- term:
    id: GO:0005886
    label: plasma membrane
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      Phylogenetic inference of plasma membrane localization is well-supported. Natriuretic
      peptide receptors are single-pass type I transmembrane proteins that function at the
      cell surface. The UniProt entry confirms a signal peptide, transmembrane helix, and
      cell membrane localization.
    action: ACCEPT
    reason: >-
      Plasma membrane localization is a core feature of natriuretic peptide receptors.
      This is supported by domain architecture (signal peptide, transmembrane domain)
      and phylogenetic inference from well-characterized orthologs.

- term:
    id: GO:0006182
    label: cGMP biosynthetic process
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      Phylogenetic inference of involvement in cGMP biosynthesis is strongly supported.
      Natriuretic peptide receptors are receptor guanylate cyclases that produce cGMP
      upon ligand binding. The protein contains a guanylate cyclase catalytic domain
      (EC 4.6.1.2).
    action: ACCEPT
    reason: >-
      cGMP biosynthesis is a direct consequence of the guanylate cyclase enzymatic
      activity of this receptor. The catalytic domain and EC number assignment are
      consistent with this annotation.

- term:
    id: GO:0007168
    label: receptor guanylyl cyclase signaling pathway
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      Phylogenetic inference of involvement in the receptor guanylyl cyclase signaling
      pathway is strongly supported. This is the canonical signaling pathway for
      natriuretic peptide receptors that have intrinsic guanylate cyclase activity.
    action: ACCEPT
    reason: >-
      This is the core signaling pathway for membrane-bound guanylyl cyclase receptors.
      The protein has the expected domain architecture and phylogenetic relationship to
      well-characterized receptor guanylyl cyclases.

- term:
    id: GO:0004383
    label: guanylate cyclase activity
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      Phylogenetic inference of guanylate cyclase activity is strongly supported by the
      presence of the guanylate cyclase catalytic domain and EC 4.6.1.2 assignment.
    action: ACCEPT
    reason: >-
      Guanylate cyclase activity is the core enzymatic function of this receptor.
      Supported by domain architecture, EC number, and phylogenetic inference from
      orthologs with experimentally verified guanylate cyclase activity.

- term:
    id: GO:0001653
    label: peptide receptor activity
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      Phylogenetic inference of peptide receptor activity is supported. Natriuretic
      peptide receptors bind natriuretic peptide ligands (ANP, BNP, CNP) to activate
      their guanylate cyclase domain.
    action: ACCEPT
    reason: >-
      Peptide receptor activity is a core molecular function of this protein, which
      binds natriuretic peptides to activate downstream cGMP signaling. Well-supported
      by phylogenetic inference from characterized orthologs.

- term:
    id: GO:0004383
    label: guanylate cyclase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  review:
    summary: >-
      Automated annotation of guanylate cyclase activity based on EC number and
      domain analysis. Consistent with the IBA annotation and domain architecture.
    action: ACCEPT
    reason: >-
      This IEA annotation is redundant with the IBA annotation but correctly
      captures the core enzymatic function. The EC 4.6.1.2 assignment and ARBA
      rule support are appropriate.

- term:
    id: GO:0004672
    label: protein kinase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: >-
      InterPro-based annotation of protein kinase activity. The protein contains a
      protein kinase-like domain, but in natriuretic peptide receptors this domain is
      a pseudokinase that functions as a regulatory domain rather than having catalytic
      kinase activity. It lacks key catalytic residues for phosphotransfer.
    action: MODIFY
    reason: >-
      The protein kinase-like domain in receptor guanylyl cyclases is a pseudokinase
      domain that regulates guanylate cyclase activity through ATP binding rather than
      catalyzing phosphorylation. Annotating protein kinase activity is misleading.
    proposed_replacement_terms:
    - id: GO:0005524
      label: ATP binding

- term:
    id: GO:0005524
    label: ATP binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: >-
      InterPro-based annotation of ATP binding. The protein kinase-like domain in
      natriuretic peptide receptors binds ATP, which serves a regulatory role in
      modulating guanylate cyclase activity. ATP binding is required for full
      activation of the cyclase domain.
    action: ACCEPT
    reason: >-
      ATP binding by the pseudokinase domain is a genuine functional property of
      receptor guanylyl cyclases that is important for enzyme regulation.

- term:
    id: GO:0005886
    label: plasma membrane
  evidence_type: IEA
  original_reference_id: GO_REF:0000044
  review:
