- term:
    id: GO:0006338
    label: chromatin remodeling
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  review:
    summary: chromatin remodeling (GO:0006338) likely overstates or misdirects the direct function of prmt6.
    action: MARK_AS_OVER_ANNOTATED
    reason: |-
      This IBA term is an over-annotation. Prmt6 is a histone arginine methyltransferase that deposits a
      chromatin mark (H3R2me2a) rather than an ATP-dependent nucleosome remodeler. Falcon characterizes
      PRMT6 as acting through deposition of the repressive H3R2me2a mark that antagonizes H3K4me3, i.e.
      epigenetic transcriptional regulation, not chromatin remodeling per se.
    supported_by:
    - reference_id: file:DANRE/prmt6/prmt6-uniprot.txt
      supporting_text: protein-arginine omega-N asymmetric methyltransferase activity
    - reference_id: file:DANRE/prmt6/prmt6-deep-research-falcon.md
      supporting_text: |-
        A central concept in PRMT6 biology is its deposition of **histone H3 Arg2 asymmetric dimethylation (H3R2me2a)**, which is widely treated as a **repressive chromatin mark** that antagonizes the activating lysine mark **H3K4me3**
