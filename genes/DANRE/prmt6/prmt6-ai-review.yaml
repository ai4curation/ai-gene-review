  label: Danio rerio
description: prmt6 encodes a nuclear protein arginine methyltransferase that catalyzes asymmetric dimethylation of protein
  and histone arginine residues, including H3R2, H2AR3, and H4R3. The core function is nuclear/chromatin-associated protein
  arginine methyltransferase activity; developmental retina/glial annotations are downstream phenotypic contexts.
