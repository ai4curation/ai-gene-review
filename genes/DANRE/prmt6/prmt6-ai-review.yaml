- id: PMID:15475159
  title: Identification and phylogenetic analyses of the protein arginine methyltransferase gene family in fish and ascidians.
  findings:
  - statement: Zebrafish contains conserved PRMT orthologs including PRMT6, supporting transfer of PRMT molecular activity
      by homology.
    supporting_text: orthologues of eight human PRMT genes (PRMT1-7 and HRMT1L3) were identified in both puffer fish Fugu
      rubripes and zebrafish Danio rerio
- id: PMID:26487724
  title: Protein Arginine Methyltransferase 6 (Prmt6) Is Essential for Early Zebrafish Development through the Direct Suppression
    of gadd45αa Stress Sensor Gene.
  findings:
  - statement: Prmt6 generates H3R2me2a and represses gadd45alpha during early zebrafish development.
    reference_section_type: ABSTRACT
    supporting_text: H3R2me2a, generated by protein arginine methyltransferase 6 (Prmt6), is a repressive mark
  - statement: |-
      Knockdown of zebrafish prmt6 by morpholino significantly reduced the level of H3R2me2a marks,
      and prmt6 mRNA rescued both the epiboly defect and the H3R2me2a reduction, providing direct
      in-vivo evidence that zebrafish Prmt6 deposits H3R2me2a.
    reference_section_type: ABSTRACT
    supporting_text: |-
      two prmt6-specific morpholino-oligos (MOs) to study its importance in early
      development, application of which led to early epiboly defects and significantly
      reduced the level of H3R2me2a marks
  - statement: |-
      gadd45 alpha a is a direct repressive transcriptional target of zebrafish Prmt6, confirmed by
      ChIP-qPCR and luciferase reporter assay; maternal Prmt6 is essential to early development.
    reference_section_type: ABSTRACT
    supporting_text: |-
      the results of ChIP quantitative real time PCR and
      luciferase reporter assay indicated that gadd45αa is a repressive target of
      Prmt6
- id: PMID:30924555
  title: Genetic control of cellular morphogenesis in Müller glia.
  findings:
  - statement: CRISPR screening identified prmt6 among genes affecting Muller glia morphology.
    reference_section_type: RESULTS
    supporting_text: prmt6 mutants have defects in cell body position and ILM
- id: file:DANRE/prmt6/prmt6-uniprot.txt
  title: UniProtKB entry Q6NWG4 for Danio rerio prmt6
  findings:
  - statement: UniProt summarizes Prmt6 as a protein arginine methyltransferase with asymmetric methyltransferase activity.
    supporting_text: protein-arginine omega-N asymmetric methyltransferase activity
  - statement: |-
      Prmt6 specifically mediates asymmetric dimethylation of histone H3 Arg-2 (H3R2me2a), a tag for
      epigenetic transcriptional repression that is mutually exclusive with H3K4 methylation, and also
      methylates histone H2A and H4 Arg-3 (H2AR3me and H4R3me).
    supporting_text: H3R2me2a represents a specific tag
  - statement: |-
      Prmt6 also methylates histone H2A and H4 'Arg-3' (H2AR3me and H4R3me).
    supporting_text: histone H2A and H4 'Arg-3' (H2AR3me and H4R3me, respectively)
  - statement: |-
      Prmt6 regulates DNA base excision repair by methylating DNA polymerase beta (POLB), enhancing its
      polymerase activity, DNA binding and processivity.
    supporting_text: methylation of DNA polymerase beta (POLB), leading to the stimulation
- id: file:DANRE/prmt6/prmt6-deep-research-falcon.md
  title: Falcon deep research report on Danio rerio prmt6 (Q6NWG4)
  findings:
  - statement: |-
      Zebrafish Prmt6 is a SAM-dependent, type I protein arginine methyltransferase that catalyzes
      asymmetric dimethylarginine (ADMA) formation, matching the UniProt description for Q6NWG4
      (PRMT6; EC 2.1.1.319) by enzymatic class, conserved PRMT domain architecture, and a strongly
      nuclear/chromatin-centric functional profile.
    reference_section_type: OTHER
    supporting_text: |-
      **Target gene/protein:** zebrafish *prmt6* encoding **Protein arginine N-methyltransferase 6 (PRMT6)**, a **SAM-dependent, type I protein arginine methyltransferase** that catalyzes **asymmetric dimethylarginine (ADMA)** formation on protein substrates. This matches the UniProt description for Q6NWG4 (PRMT6; EC 2.1.1.319)
  - statement: |-
      Type I PRMTs, including PRMT6, transfer methyl groups from S-adenosyl-L-methionine (SAM) to
      arginine guanidino nitrogens, generating monomethylarginine (MMA) and then asymmetric
      dimethylarginine (ADMA); PRMT6 preferentially produces ADMA.
    reference_section_type: OTHER
    supporting_text: |-
