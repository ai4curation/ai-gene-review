  title: Electronic Gene Ontology annotations created by ARBA machine learning models
  findings: []
- id: GO_REF:0000120
  title: Combined Automated Annotation using Multiple IEA Methods
  findings: []
- id: PMID:15475159
  title: Identification and phylogenetic analyses of the protein arginine methyltransferase gene family in fish and ascidians.
  findings:
  - statement: Zebrafish contains conserved PRMT orthologs including PRMT6, supporting transfer of PRMT molecular activity
      by homology.
    supporting_text: orthologues of eight human PRMT genes (PRMT1-7 and HRMT1L3) were identified in both puffer fish Fugu
      rubripes and zebrafish Danio rerio
- id: PMID:26487724
  title: Protein Arginine Methyltransferase 6 (Prmt6) Is Essential for Early Zebrafish Development through the Direct Suppression
    of gadd45αa Stress Sensor Gene.
  findings:
  - statement: Prmt6 generates H3R2me2a and represses gadd45alpha during early zebrafish development.
    supporting_text: H3R2me2a, generated by protein arginine methyltransferase 6 (Prmt6), is a repressive mark
- id: PMID:30924555
  title: Genetic control of cellular morphogenesis in Müller glia.
  findings:
  - statement: CRISPR screening identified prmt6 among genes affecting Muller glia morphology.
    supporting_text: prmt6 mutants have defects in cell body position and ILM
