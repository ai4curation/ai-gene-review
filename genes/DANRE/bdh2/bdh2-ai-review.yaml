taxon:
  id: NCBITaxon:7955
  label: Danio rerio
description: bdh2 encodes a cytosolic short-chain dehydrogenase/reductase implicated in mammalian/eukaryotic siderophore biogenesis,
  mitochondrial iron delivery, heme synthesis, and erythroid maturation in zebrafish. The core review emphasizes 4-oxoproline
  reductase/siderophore-linked dehydrogenase chemistry and siderophore/heme metabolism, while 3-hydroxybutyrate dehydrogenase
  activity is treated as a possible secondary/by-similarity activity rather than the main zebrafish functional theme.
