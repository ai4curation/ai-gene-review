    review:
      assessment: NPI
      confidence_score: 0
      summary: >-
        Auxilin/DNAJC6 contains a PTEN-like phosphatase domain (residues 109-276),
        which ProtNLM2 likely used to predict involvement in dephosphorylation.
        However, the phosphatase domain of auxilin has only "probable" phosphatase
        activity per UniProt characterization. Its experimentally established role
        is phosphoinositide binding for membrane targeting during clathrin-mediated
        endocytosis, not catalytic dephosphorylation of substrates. The curated
        ai-review independently marked the related GOA annotation for
        phosphoprotein phosphatase activity (GO:0004721) as MARK_AS_OVER_ANNOTATED
        and hydrolase activity (GO:0016787) as REMOVE, noting that these sequence-
        feature-based annotations overstate the functional evidence. The core
        molecular function of auxilin is as a J-domain co-chaperone that recruits
        and stimulates HSC70 ATPase activity to disassemble clathrin coats from
        newly formed vesicles. Loss-of-function phenotypes in human (PARK19
        Parkinson's disease) and zebrafish (impaired Notch signaling) are
        attributable to defective clathrin uncoating, not loss of phosphatase
        activity. This prediction reflects the model's reliance on the PTEN-like
        domain fold without accounting for the divergent functional role of this
        domain in the auxilin protein context.
      error_type: FREQUENCY_BIAS
      supported_by:
        - reference_id: PMID:20082716
          supporting_text: >-
            ...auxilin is known to cooperate with Hsc70 in mediating the
            disassembly of clathrin triskelia and coat proteins from newly
            formed CCVs...
        - reference_id: file:DANRE/A0A8M9QG43/A0A8M9QG43-deep-research-falcon.md
          supporting_text: >-
            The primary molecular function is not enzymatic in itself, but
            rather regulatory and targeting: auxilin recruits HSC70 to
            clathrin-coated structures and stimulates HSC70's ATPase activity
            through its conserved J-domain containing the essential His-Pro-Asp
            (HPD) motif.
        - reference_id: file:DANRE/A0A8M9QG43/A0A8M9QG43-deep-research-falcon.md
          supporting_text: >-
            The PTEN-like domain binds phosphoinositides to target auxilin to
            endocytic membranes; the domain has only probable phosphatase
            activity and its primary role is membrane targeting.
