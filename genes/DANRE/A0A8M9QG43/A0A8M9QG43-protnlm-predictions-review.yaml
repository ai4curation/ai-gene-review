description: >-
  ProtNLM2 predicted 1 GO term for auxilin/DNAJC6 (A0A8M9QG43). The prediction
  of dephosphorylation (GO:0016311) is assessed as NPI (nonparalog incorrect).
  Auxilin contains a PTEN-like phosphatase domain, but this domain has only
  probable phosphatase activity; its primary and experimentally established role
  is phosphoinositide-dependent membrane targeting during clathrin-mediated
  endocytosis. The existing GOA annotation for phosphoprotein phosphatase
  activity (GO:0004721) was independently assessed as over-annotated in the
  curated review, and the parent hydrolase activity term (GO:0016787) was
  recommended for removal. The core function of auxilin is as a J-domain
  co-chaperone that recruits HSC70 to catalyze ATP-dependent clathrin coat
  disassembly, not enzymatic dephosphorylation. The ProtNLM2 prediction
  likely reflects sequence-feature bias from the PTEN-like fold rather than
  genuine biological function.
