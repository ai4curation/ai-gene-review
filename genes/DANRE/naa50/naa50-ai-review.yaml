id: Q6DBY2
gene_symbol: naa50
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:7955
  label: Danio rerio
description: naa50 encodes N-alpha-acetyltransferase 50/NAT13, an N-terminal methionine/protein amino-acid acetyltransferase
  associated with embryonic growth and cell proliferation. The core function is protein N-terminal acetylation; sister-chromatid
  cohesion annotations are retained as non-core transferred roles and the zebrafish somitogenesis annotation is left undecided
  because the accessible abstract supports embryonic growth/vascular defects rather than a specific somitogenesis mechanism.
