references:
- id: GO_REF:0000002
  title: Gene Ontology annotation through association of InterPro records with GO terms
  findings:
  - statement: Naa50 matches InterPro signature IPR000182 (GNAT acetyltransferase domain); the InterPro2GO mapping assigns acyltransferase activity, transferring groups other than amino-acyl groups (GO:0016747).
- id: GO_REF:0000024
  title: Manual transfer of experimentally-verified manual GO annotation data to orthologs by curator judgment of sequence similarity
  findings:
  - statement: Localization (GO:0005634 nucleus, GO:0005737 cytoplasm, GO:0005829 cytosol), N-terminal protein amino acid acetylation (GO:0006474), protein-N-terminal amino-acid acetyltransferase activity (GO:0004596), histone H4 acetyltransferase activity (GO:0010485), protein-lysine-acetyltransferase activity (GO:0061733), and mitotic sister chromatid cohesion roles (GO:0034087, GO:0071962) were transferred to zebrafish Naa50 by curator-judged sequence similarity to human NAA50 (UniProtKB:Q9GZZ1).
- id: GO_REF:0000033
  title: Annotation inferences using phylogenetic trees
  findings:
  - statement: Phylogenetic inference within PANTHER family PTN000558165 supports Naa50 membership in the NatA complex (GO:0031415) and a role in mitotic sister chromatid cohesion (GO:0007064).
- id: GO_REF:0000044
  title: Gene Ontology annotation based on UniProtKB/Swiss-Prot Subcellular Location vocabulary mapping, accompanied by conservative changes to GO terms applied by UniProt
  findings:
  - statement: The UniProt Swiss-Prot subcellular location keywords SL-0191 (Nucleus) and SL-0086 (Cytoplasm) map Naa50 to nucleus (GO:0005634) and cytoplasm (GO:0005737).
- id: GO_REF:0000108
  title: Automatic assignment of GO terms using logical inference, based on inter-ontology links
  findings:
  - statement: Logical inference over inter-ontology links derives chromatin remodeling (GO:0006338) from the histone H4 acetyltransferase activity (GO:0010485) annotation.
- id: GO_REF:0000120
  title: Combined Automated Annotation using Multiple IEA Methods
  findings:
  - statement: Combined IEA evidence (RHEA reactions 50520-50580 and EC 2.3.1.258) assigns Naa50 protein N-terminal-methionine acetyltransferase activity (GO:0120518).
- id: PMID:16484612
  title: Embryonic growth-associated protein is one subunit of a novel N-terminal acetyltransferase complex essential for embryonic vascular development.
  findings:
  - statement: The zebrafish embryonic growth-associated protein corresponds to Naa50, a subunit of a novel N-terminal acetyltransferase complex; depleted embryos fail to develop, in part because of decreased cell proliferation, indicating an essential role in embryonic growth and vascular development.
    supporting_text: N-terminal protein acetylation, catalyzed by N-terminal acetyltransferases
- id: file:DANRE/naa50/naa50-uniprot.txt
  title: UniProtKB entry Q6DBY2 for Danio rerio naa50
  findings:
  - statement: UniProt describes Naa50 as an N-alpha-acetyltransferase acting on protein N-termini.
    supporting_text: N-alpha-acetyltransferase that acetylates the N-terminus
- id: file:DANRE/naa50/naa50-deep-research-falcon.md
  title: Falcon deep research report on Danio rerio naa50 (NAA50 / NatE catalytic subunit)
  findings:
  - statement: |-
      Falcon synthesis: NAA50 is the catalytic subunit of the NatE N-terminal acetyltransferase, functioning in association with the NatA core (NAA10/NAA15) as a NatA/E assembly.
    supporting_text: |-
      NAA50 is consistently defined as the catalytic subunit of the NatE N‑terminal acetyltransferase activity
    reference_section_type: OTHER
  - statement: |-
      Falcon synthesis: the core reaction is acetyl-CoA-dependent transfer of an acetyl group to protein N-termini (N-alpha acetylation), occurring largely co-translationally.
    supporting_text: |-
      acetyl‑CoA–dependent transfer of an acetyl moiety to protein N‑termini
    reference_section_type: OTHER
  - statement: |-
      Falcon synthesis: unlike NatA, NAA50/NatE acetylates N-termini that retain the initiator methionine, competing with early nascent-chain processing at the ribosome.
    supporting_text: |-
      NAA50 is notable for acetylating N‑termini that **retain the initiator methionine (iMet)** and therefore can compete with early nascent-chain processing events at the ribosome
    reference_section_type: OTHER
  - statement: |-
      Falcon synthesis: human NAA50 has a hydrophobic P1 pocket favouring Met1 and a more permissive P2 pocket, giving broad position-2 tolerance for Met-X (especially Met-hydrophobic) N-termini.
    supporting_text: |-
      specificity is dominated by a **hydrophobic P1 pocket** with a more permissive **amphipathic/solvent-exposed P2 pocket**, supporting broad position‑2 tolerance
    reference_section_type: OTHER
  - statement: |-
      Falcon synthesis: human NAA50 binds NatA with nanomolar affinity, docking onto NAA15, and can interact with Naa15 to form the NatA/E multienzyme complex.
    supporting_text: |-
      Naa50 can interact with Naa15 to form a multienzyme complex known as NatA/E
    reference_section_type: OTHER
  - statement: |-
      Falcon synthesis: NatA-NAA50/NatE is cytoplasmic and ribosome-associated, consistent with co-translational acetylation at the ribosomal peptide tunnel exit.
    supporting_text: |-
      NatA-NAA50/NatE is described as cytoplasmic and ribosome-associated within the general NAT machinery, consistent with co-translational acetylation at the ribosomal peptide tunnel exit
    reference_section_type: OTHER
  - statement: |-
      Falcon synthesis: loss/depletion of NAA50 causes sister chromatid cohesion defects and mitotic arrest (rescued by NatA co-depletion), attributed to lack of Nt-acetylation of the proposed substrate Scc1/Vtd.
    supporting_text: |-
      loss of NAA50** is associated with **sister chromatid cohesion defects
    reference_section_type: OTHER
  - statement: |-
      Falcon synthesis: HYPK and NAA50 can associate with NatA as competing complexes, indicating dynamic regulation of NatA-NAA50 access.
    supporting_text: |-
      **HYPK and NAA50 can associate with NatA**, describing formation of **competing complexes**
    reference_section_type: OTHER
  - statement: |-
      Falcon synthesis: an older biochemical report claims human NAA50 has both N-alpha and N-epsilon (lysine) acetyltransferase activity, but the dominant structural/mechanistic evidence favours N-terminal acetylation over lysine acetylation.
    supporting_text: |-
