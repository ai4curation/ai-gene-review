references:
- id: GO_REF:0000002
  title: Gene Ontology annotation through association of InterPro records with GO terms
  findings:
  - statement: Naa50 matches InterPro signature IPR000182 (GNAT acetyltransferase
      domain); the InterPro2GO mapping assigns acyltransferase activity, transferring
      groups other than amino-acyl groups (GO:0016747).
- id: GO_REF:0000024
  title: Manual transfer of experimentally-verified manual GO annotation data to orthologs by curator judgment of sequence
    similarity
  findings:
  - statement: Localization (GO:0005634 nucleus, GO:0005737 cytoplasm, GO:0005829
      cytosol), N-terminal protein amino acid acetylation (GO:0006474), protein-N-terminal
      amino-acid acetyltransferase activity (GO:0004596), histone H4 acetyltransferase
      activity (GO:0010485), protein-lysine-acetyltransferase activity (GO:0061733),
      and mitotic sister chromatid cohesion roles (GO:0034087, GO:0071962) were transferred
      to zebrafish Naa50 by curator-judged sequence similarity to human NAA50 (UniProtKB:Q9GZZ1).
- id: GO_REF:0000033
  title: Annotation inferences using phylogenetic trees
  findings:
  - statement: Phylogenetic inference within PANTHER family PTN000558165 supports
      Naa50 membership in the NatA complex (GO:0031415) and a role in mitotic sister
      chromatid cohesion (GO:0007064).
- id: GO_REF:0000044
  title: Gene Ontology annotation based on UniProtKB/Swiss-Prot Subcellular Location vocabulary mapping, accompanied by conservative
    changes to GO terms applied by UniProt
  findings:
  - statement: The UniProt Swiss-Prot subcellular location keywords SL-0191 (Nucleus)
      and SL-0086 (Cytoplasm) map Naa50 to nucleus (GO:0005634) and cytoplasm (GO:0005737).
- id: GO_REF:0000108
  title: Automatic assignment of GO terms using logical inference, based on inter-ontology links
  findings:
  - statement: Logical inference over inter-ontology links derives chromatin remodeling
      (GO:0006338) from the histone H4 acetyltransferase activity (GO:0010485) annotation.
- id: GO_REF:0000120
  title: Combined Automated Annotation using Multiple IEA Methods
  findings:
  - statement: Combined IEA evidence (RHEA reactions 50520-50580 and EC 2.3.1.258)
      assigns Naa50 protein N-terminal-methionine acetyltransferase activity (GO:0120518).
- id: PMID:16484612
  title: Embryonic growth-associated protein is one subunit of a novel N-terminal acetyltransferase complex essential for
    embryonic vascular development.
  findings:
  - statement: The zebrafish embryonic growth-associated protein corresponds to Naa50,
      a subunit of a novel N-terminal acetyltransferase complex; depleted embryos
      fail to develop, in part because of decreased cell proliferation, indicating
      an essential role in embryonic growth and vascular development.
    supporting_text: N-terminal protein acetylation, catalyzed by N-terminal acetyltransferases
- id: file:DANRE/naa50/naa50-uniprot.txt
  title: UniProtKB entry Q6DBY2 for Danio rerio naa50
  findings:
  - statement: UniProt describes Naa50 as an N-alpha-acetyltransferase acting on protein N-termini.
    supporting_text: N-alpha-acetyltransferase that acetylates the N-terminus
