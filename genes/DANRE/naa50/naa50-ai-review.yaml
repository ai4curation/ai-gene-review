- hypothesis: The somitogenesis and vascular defects of naa50-deficient embryos require Naa50 catalytic activity.
  description: Rescue naa50 morphant or mutant zebrafish with wild-type versus catalytically dead naa50 mRNA and score somite formation, vascular development, and proliferation.
- hypothesis: Naa50 supports mitotic sister chromatid cohesion in zebrafish, as inferred from its orthologs.
  description: Deplete naa50 in zebrafish embryos and assess premature sister chromatid separation and mitotic progression by chromosome spreads and live imaging.
