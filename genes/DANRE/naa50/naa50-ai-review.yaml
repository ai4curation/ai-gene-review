suggested_questions:
- question: Does zebrafish Naa50 act predominantly as the catalytic NatE subunit on
    methionine-retaining N-termini, or does it also contribute substantial N-epsilon
    (lysine) acetyltransferase activity in vivo?
- question: Is the somitogenesis phenotype of naa50-deficient zebrafish a direct consequence
    of impaired N-terminal acetylation, or a secondary effect of the general embryonic
    growth and proliferation defect?
suggested_experiments:
- hypothesis: Recombinant zebrafish Naa50 acetylates protein N-termini bearing a retained
    initiator methionine (NatE-type substrates) with little or no lysine epsilon-acetylation.
  description: Assay purified Naa50 against synthetic N-terminal peptides (Met-Leu-,
    Met-Ala-, Met-Lys-, etc.) and internal-lysine substrates and quantify acetyl transfer
    to define substrate specificity.
- hypothesis: The somitogenesis and vascular defects of naa50-deficient embryos require
    Naa50 catalytic activity.
  description: Rescue naa50 morphant or mutant zebrafish with wild-type versus catalytically
    dead naa50 mRNA and score somite formation, vascular development, and proliferation.
- hypothesis: Naa50 supports mitotic sister chromatid cohesion in zebrafish, as inferred
    from its orthologs.
  description: Deplete naa50 in zebrafish embryos and assess premature sister chromatid
    separation and mitotic progression by chromosome spreads and live imaging.
