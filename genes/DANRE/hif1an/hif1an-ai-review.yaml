id: P59723
gene_symbol: hif1an
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:7955
  label: Danio rerio
description: hif1an encodes factor inhibiting HIF, a 2-oxoglutarate/Fe(II)-dependent protein hydroxylase that hydroxylates
  HIF-alpha and ankyrin-repeat proteins in nucleus/cytoplasm. The core function is protein asparagine/histidine/aspartate
  dioxygenase activity; vascular and Notch/HIF pathway annotations are regulatory consequences of that catalytic role.
