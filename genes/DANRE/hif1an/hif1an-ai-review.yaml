- term:
    id: GO:0045746
    label: negative regulation of Notch signaling pathway
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: negative regulation of Notch signaling pathway (GO:0045746) is retained as a non-core, indirect/context-specific role for hif1an. The annotation derives from phylogenetic inference (IBA) of the human FIH ability to hydroxylate Notch ankyrin-repeat residues; however, direct zebrafish experimental evidence shows canonical Notch targets are unaffected by fih-1 knockdown, so this is not an established core function in Danio rerio.
    action: KEEP_AS_NON_CORE
    reason: In zebrafish, the primary experimental paper (PMID:25347788) found that canonical Notch target genes (grl, dll4) are unaltered in fih-1 morphants and that FIH-1 is unlikely to influence the expression of canonical Notch targets. FIH-1 physically interacts with Mib (a Notch regulator) and can hydroxylate ankyrin-repeat proteins, but its in vivo role is anti-angiogenesis via HIF/VEGF-A rather than direct negative regulation of Notch signaling; this term is therefore at most a non-core, indirect/context-specific role rather than a core function.
    supported_by:
    - reference_id: file:DANRE/hif1an/hif1an-uniprot.txt
      supporting_text: Hydroxylates a specific Asn residue in the C-terminal transactivation domain
    - reference_id: file:DANRE/hif1an/hif1an-uniprot.txt
      supporting_text: Also hydroxylates specific Asn, Asp and His residues within ankyrin repeat domain-containing proteins
    - reference_id: file:DANRE/hif1an/hif1an-deep-research-falcon.md
      supporting_text: |-
        A major class of non-HIF substrates are **ankyrin repeat domain (ARD)** proteins; a proposed degenerate recognition motif has been summarized as **LXXXXX[D/E]VN**, but structural context and accessibility strongly condition hydroxylation efficiency.
    - reference_id: PMID:25347788
      supporting_text: in fih-1 MO-injected embryos, expression of grl and dll4, known targets of Notch signaling, appears to be unaltered (Figure S7), suggesting that FIH-1 may regulate HIF-1α to regulate the Vegf-Aa expression, but is unlikely to influence the expression of canonical Notch targets
