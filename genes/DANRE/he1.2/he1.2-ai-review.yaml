- id: file:DANRE/he1.2/he1.2-deep-research-falcon.md
  title: Falcon deep research report for zebrafish he1.2 (Q1LW01) - hatching enzyme/choriolysin functional annotation
  findings:
  - statement: |-
      he1.2/Q1LW01 corresponds to a zebrafish high-choriolytic-enzyme (HCE)-like hatching enzyme: an astacin-family zinc metalloprotease secreted by hatching gland cells to digest the chorion/egg coat, matching choriolysin H (EC 3.4.24.67).
    reference_section_type: OTHER
    supporting_text: |-
      astacin-like zinc metalloprotease secreted by hatching gland cells to digest chorion/egg-coat proteins
  - statement: |-
      The zebrafish hatching enzyme is a secreted, astacin-like, zinc-dependent metalloprotease whose activity depends on a catalytic Zn and is abolished by chelation of divalent metals (EDTA), consistent with the metalloendopeptidase and zinc ion binding annotations.
    reference_section_type: OTHER
    supporting_text: |-
      its activity can be inhibited by chelation of divalent metals (EDTA), consistent with dependence on a catalytic Zn
  - statement: |-
      Recombinant activated zebrafish zHE1 cleaves chorion zona pellucida (ZP) proteins in vitro at specific sites, supporting direct substrate specificity for egg-envelope ZP proteins and a role in chorion softening/degradation.
    reference_section_type: OTHER
    supporting_text: |-
      recombinant activated zebrafish zHE1** can cleave **zona pellucida proteins from chorions in vitro at specific sites**, supporting direct substrate specificity for egg-envelope ZP proteins and a role in chorion softening/degradation
  - statement: |-
      The hatching enzyme is produced by hatching gland cells, stored in secretory granules as both zymogen and active forms, and secreted into the perichorionic space/hatching fluid where it acts extracellularly during chorion degradation and embryo release.
    reference_section_type: OTHER
    supporting_text: |-
      The hatching enzyme acts extracellularly in the perichorionic space/hatching fluid, where proteolysis accompanies chorion degradation and embryo release
  - statement: |-
      Teleost hatching enzymes (choriolysins) are secreted proteases responsible for chorion (egg envelope) digestion to allow embryo escape at hatching, belonging to the astacin family of zinc-dependent metalloproteases.
    reference_section_type: OTHER
    supporting_text: |-
      secreted proteases responsible for **chorion (egg envelope) digestion** to allow embryo escape at hatching
  - statement: |-
      Comparative biochemistry of teleost hatching liquid shows strong EDTA inhibition (20 mM EDTA reduces activity to 23+/-23% of control) with a neutral-to-alkaline pH optimum, consistent with a metal-dependent (Zn) extracellular protease.
    reference_section_type: OTHER
    supporting_text: |-
      EDTA (20 mM)** reducing activity to **23±23%** of control
