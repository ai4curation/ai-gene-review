taxon:
  id: NCBITaxon:7955
  label: Danio rerio
description: Zebrafish ortholog of human BCL10, a CARD domain-containing protein that functions as a
  critical signaling adapter in the CBM (CARMA-BCL10-MALT1) complex. zBcl10 is a 241 amino acid protein
  (46% identity to human BCL10, 62% in the CARD domain) that self-oligomerizes, binds CARMA and MALT1
  proteins via CARD-CARD interactions, forms cytoplasmic filamentous structures, and activates NF-kappaB
  transcription. Notably, zBcl10 lacks the inhibitory serine residues (S136, S141, S144) present in human
  BCL10, rendering it constitutively more active and not subject to phosphorylation-based attenuation.
  Expressed in bladder, spleen, and brain. The NF-kappaB signaling pathway regulated by BCL10 is
  conserved across vertebrates.
