- id: PMID:25849213
  title: Functional characterization of zebrafish (Danio rerio) Bcl10.
  findings:
  - statement: zBcl10 is a 241 amino acid CARD domain-containing protein orthologous to human BCL10
      with 46% overall identity and 62% identity in the CARD domain
    supporting_text: The overall amino acidic identity of zBcl10 to human BCL10 (hBCL10) is 46%
  - statement: zBcl10 self-oligomerizes and binds components of the CBM complex including MALT1 and
      CARMA proteins
    supporting_text: zBcl10 is able to oligomerize both with itself and with hBCL10
  - statement: zBcl10 activates NF-kappaB more potently than human BCL10, possibly due to absence
      of inhibitory serine residues
    supporting_text: zBcl10 is significantly more effective than hBCL10 in activating NF-κB in
      mammalian cells
  - statement: zBcl10 is not phosphorylated, unlike human BCL10, consistent with absence of
      inhibitory serine residues S136, S141, S144
    supporting_text: On the other hand, residues S136, S141 and S144, which are implicated in
      attenuation of hBCL10 signaling [34], are not conserved in zBcl10
  - statement: zBcl10 forms cytoplasmic filamentous structures that are an intrinsic property
      independent of human BCL10
    supporting_text: zBcl10 forms filamentous structures even in the absence of hBCL10, thus
      confirming that the ability to form filaments is an intrinsic property of zBcl10
  - statement: zBcl10 can functionally replace human BCL10 in NF-kappaB activation
    supporting_text: introduction of zBcl10 in these hBCL10-depleted cells promptly activates NF-κB
  - statement: zBcl10-induced NF-kappaB activation requires ubiquitination events
    supporting_text: zBcl10-induced NF-κB activation requires ubiquitination(s) events, since NF-κB
      activation is completely abrogated following co-expression of A20 de-ubiquitinase
  - statement: zBcl10 is endogenously expressed in bladder, spleen and brain but not in testis and
      liver
    supporting_text: zBcl10 is endogenously expressed in bladder, spleen and brain, but not in testis
      and liver
  - statement: NF-kappaB signaling pathways regulated by BCL10 are conserved among vertebrates
    supporting_text: the present study has clearly demonstrated that the NF-κB signalling pathways
      regulated by BCL10 are conserved among vertebrates
