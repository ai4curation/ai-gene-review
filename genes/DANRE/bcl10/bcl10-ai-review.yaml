suggested_experiments:
- experiment_type: Loss-of-function analysis
  description: CRISPR/Cas9 knockout of bcl10 in zebrafish to assess effects on NF-kappaB activation,
    immune cell development, and innate/adaptive immune responses in vivo, which would provide direct
    genetic evidence for bcl10 function in zebrafish.
- experiment_type: Tissue expression analysis
  description: In situ hybridization or single-cell RNA-seq to characterize the spatial and temporal
    expression pattern of bcl10 during zebrafish development, particularly in immune cell populations,
    to understand when and where bcl10 is functionally relevant.
- experiment_type: Protein interaction analysis
  description: Co-immunoprecipitation or proximity ligation assays with endogenous zebrafish CARMA and
    MALT1 proteins in zebrafish cells to confirm CBM complex formation with native zebrafish components
    rather than human proteins.
suggested_questions:
- question: Does zebrafish bcl10 play a role in adaptive immunity in vivo, given that mammalian BCL10
    knockout causes severe immunodeficiency?
  experts:
  - Zebrafish immunologists
  - Developmental biologists
- question: What compensatory mechanisms exist in zebrafish for the absence of phosphorylation-based
    negative regulation of Bcl10 signaling?
  experts:
  - Signal transduction researchers
  - Evolutionary biologists
- question: Does zebrafish Bcl10 interact with zebrafish-specific CARD domain proteins or innate immune
    receptors not found in mammals?
  experts:
  - Comparative immunologists
  - Fish immunologists
