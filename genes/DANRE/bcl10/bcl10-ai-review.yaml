    id: GO:0019209
    label: kinase activator activity
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: contributes_to
  review:
    summary: BCL10 contributes to activation of the IKK complex through CBM-mediated signaling and
      ubiquitination events. The contributes_to qualifier appropriately reflects BCL10's indirect role.
    action: ACCEPT
- term:
    id: GO:0043422
    label: protein kinase B binding
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: Phylogenetically inferred from human BCL10. The binding to protein kinase B (Akt) has been
      reported for mammalian BCL10, but direct evidence in zebrafish is lacking.
    action: KEEP_AS_NON_CORE
- term:
    id: GO:0051059
    label: NF-kappaB binding
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: BCL10 activates NF-kappaB signaling through the CBM complex and ubiquitination events rather
