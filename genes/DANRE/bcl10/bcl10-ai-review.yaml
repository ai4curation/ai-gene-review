- term:
    id: GO:0002250
    label: adaptive immune response
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: Phylogenetically inferred role in adaptive immunity is plausible given that mammalian BCL10
      knockout results in immunodeficiency with defects in humoral and cellular immune responses. However
      direct evidence in zebrafish is lacking.
    action: ACCEPT
- term:
    id: GO:0003713
    label: transcription coactivator activity
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: BCL10 activates NF-kappaB-dependent transcription but acts as an upstream signaling adapter
      in the CBM complex rather than a direct transcriptional coactivator. This is an over-annotation of
      the indirect mechanism by which BCL10 promotes NF-kappaB transcriptional activity.
    action: MARK_AS_OVER_ANNOTATED
    reason: BCL10 is a signaling adapter that leads to NF-kappaB activation, not a direct transcription
      coactivator. The coactivator annotation conflates upstream signal transduction with direct
      transcriptional regulation.
