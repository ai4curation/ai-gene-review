references:
- id: GO_REF:0000002
  title: Gene Ontology annotation through association of InterPro records with GO terms
  findings:
  - statement: Cmpk matches InterPro signatures IPR000850 (adenylate kinase / UMP-CMP
      kinase) and IPR006266 (UMP-CMP kinase); the InterPro2GO mapping assigns ATP
      binding (GO:0005524), nucleobase-containing compound kinase activity (GO:0019205),
      phosphotransferase activity, phosphate group as acceptor (GO:0016776), and 'de
      novo' pyrimidine nucleobase biosynthetic process (GO:0006207).
- id: GO_REF:0000003
  title: Gene Ontology annotation based on Enzyme Commission mapping
  findings:
  - statement: EC 2.7.4.6 (nucleoside-diphosphate kinase), one of the EC numbers assigned
      to Cmpk via HAMAP-Rule MF_03172, maps to nucleoside diphosphate kinase activity
      (GO:0004550).
- id: GO_REF:0000024
  title: Manual transfer of experimentally-verified manual GO annotation data to orthologs by curator judgment of sequence
    similarity
  findings:
  - statement: Nucleoside diphosphate kinase activity (GO:0004550) was transferred
      to Cmpk by curator-judged sequence similarity to human UMP-CMP kinase CMPK1
      (UniProtKB:P30085).
- id: GO_REF:0000033
  title: Annotation inferences using phylogenetic trees
  findings:
  - statement: Phylogenetic inference within PANTHER family PTN000599579 supports
      involvement of Cmpk in CDP biosynthetic process (GO:0046705) and UDP biosynthetic
      process (GO:0006225) and localization to the nucleus (GO:0005634).
- id: GO_REF:0000117
  title: Electronic Gene Ontology annotations created by ARBA machine learning models
  findings:
  - statement: The ARBA machine-learning model ARBA00033496 predicts nucleoside monophosphate
      kinase activity (GO:0050145) for Cmpk.
- id: GO_REF:0000120
  title: Combined Automated Annotation using Multiple IEA Methods
  findings:
  - statement: UniRule rule UR000111469 assigns Cmpk UMP kinase (GO:0033862), CMP
      kinase (GO:0036430), and dCMP kinase (GO:0036431) activities, pyrimidine nucleotide
      biosynthetic process (GO:0006221), and nucleus (GO:0005634) and cytoplasm (GO:0005737)
      localization.
- id: file:DANRE/cmpk/cmpk-uniprot.txt
  title: UniProtKB entry Q7ZWE9 for Danio rerio cmpk
  findings:
  - statement: UniProt describes Cmpk as a UMP-CMP kinase preferring UMP and CMP as phosphate acceptors.
    supporting_text: Has preference for UMP and CMP
- id: file:DANRE/cmpk/cmpk-deep-research-falcon.md
  title: Deep research report on cmpk from Falcon (Edison Scientific Literature)
  findings:
  - statement: |-
      UMP-CMP kinases are nucleoside monophosphate kinases that catalyze ATP-dependent
      phosphorylation of pyrimidine monophosphates (CMP, UMP, and in some contexts dCMP)
      to the corresponding diphosphates.
    supporting_text: |-
      UMP-CMP kinases are nucleoside monophosphate kinases that catalyze
    reference_section_type: RESULTS
  - statement: |-
      Standard UMP/CMP kinase enzyme assays test CMP, UMP, and dCMP as substrates,
      supporting the canonical pyrimidine nucleoside monophosphate kinase activity of
      the CMPK1 family to which zebrafish Q7ZWE9 belongs.
    supporting_text: |-
      where relevant NMP substrates include **CMP** and **UMP**, and in some contexts **dCMP** can be evaluated as a substrate in UMP/CMP kinase assays
    reference_section_type: RESULTS
  - statement: |-
      Zebrafish Q7ZWE9 is annotated as an adenylate-kinase-family UMP-CMP kinase
      (EC 2.7.4.14), placing it in the cytosolic CMPK1-like clade rather than the
      mitochondrial CMPK2 paralog.
    supporting_text: |-
      UniProt Q7ZWE9 is annotated as an adenylate-kinase-family **UMP-CMP kinase** (EC 2.7.4.14)
    reference_section_type: RESULTS
  - statement: |-
      The most defensible functional statement is that zebrafish CMPK (Q7ZWE9) catalyzes
      ATP-dependent phosphorylation of pyrimidine monophosphates (classically CMP and UMP,
      and potentially dCMP) to the corresponding diphosphates.
    supporting_text: |-
      Zebrafish CMPK (Q7ZWE9) is expected to catalyze ATP-dependent phosphorylation of pyrimidine monophosphates (classically CMP and UMP, and potentially dCMP depending on enzyme and conditions) to the corresponding diphosphates.
    reference_section_type: RESULTS
  - statement: |-
      The cytosolic UMP-CMP kinase (CMPK1) preferentially phosphorylates ribonucleotides,
      whereas the mitochondrial CMPK2 paralog has higher efficacy for deoxyribonucleotides;
      this distinguishes the CMPK1-like cmpk substrate preference (UMP/CMP) from CMPK2.
    supporting_text: |-
      cytosolic UMP-CMPK is described as preferentially phosphorylating **ribonucleotides**, while CMPK2 has higher efficacy for **deoxyribonucleotides**
    reference_section_type: RESULTS
  - statement: |-
      UMP/CMP kinases occupy a core position in pyrimidine nucleotide interconversion,
