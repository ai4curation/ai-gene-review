description: cmpk encodes UMP-CMP kinase, a cytoplasmic/nuclear pyrimidine nucleoside monophosphate kinase that phosphorylates
  UMP, CMP, and dCMP and also has broad nucleoside diphosphate kinase activity. The core function is pyrimidine nucleotide
  kinase activity supporting UDP and CDP biosynthesis.
