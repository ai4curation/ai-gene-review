suggested_questions:
- question: Does zebrafish cmpk exhibit measurable nucleoside diphosphate kinase activity
    (EC 2.7.4.6) in vivo, or is the broad NDP kinase annotation an in vitro promiscuous
    activity inherited from the HAMAP rule and EC mapping?
- question: Is cmpk rate-limiting for the pyrimidine (deoxy)nucleotide pool that supports
    rapid DNA replication during early zebrafish embryogenesis?
suggested_experiments:
- hypothesis: Recombinant zebrafish Cmpk phosphorylates UMP, CMP, and dCMP with a
    preference for UMP and CMP, consistent with the UMP-CMP kinase subfamily.
  description: Express and purify recombinant Cmpk and assay phosphate-transfer activity
    against UMP, CMP, dCMP, and a panel of nucleoside diphosphates, determining kcat/Km
    for each substrate to define in vitro substrate preference.
- hypothesis: Loss of cmpk depletes pyrimidine (deoxy)nucleotide pools and impairs
    cell proliferation in the developing embryo.
  description: Generate a cmpk loss-of-function zebrafish line (CRISPR/Cas9) and quantify
    nucleotide pools and proliferation/apoptosis markers in early embryos relative
    to wild type.
- hypothesis: Cmpk localizes to both the nucleus and cytoplasm, as predicted by UniRule
    and phylogenetic annotation.
  description: Express a fluorescently tagged Cmpk fusion in zebrafish cells or embryos
    and image subcellular distribution to confirm nuclear and cytoplasmic localization.
