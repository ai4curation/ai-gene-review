- term:
    id: GO:0031514
    label: motile cilium
  evidence_type: IEA
  original_reference_id: GO_REF:0000044
  review:
    summary: This IEA annotation is based on UniProt subcellular location mapping from
      the flagellum keyword. ODF2 (outer dense fiber protein 2) was originally characterized
      as a structural component of the outer dense fibers of sperm tail flagella in
      mammals. While this localization is well-established for mammalian ODF2, direct
      experimental evidence for motile cilium/flagellum localization of odf2a specifically
      in zebrafish is limited.
    action: KEEP_AS_NON_CORE
    reason: While ODF2 family proteins are known components of motile cilia/flagella
      in mammals, direct experimental evidence for motile cilium localization in
      zebrafish odf2a is not yet available. The annotation is plausible but not a core
      function based on current evidence.
- term:
    id: GO:1905793
    label: protein localization to pericentriolar material
  evidence_type: IMP
  original_reference_id: PMID:35609215
  review:
    summary: This IMP annotation is based on morpholino knockdown experiments in
      zebrafish embryos. Depletion of cenexin causes dispersal of PCM components
      including gamma-tubulin and phosphorylated substrates, demonstrating that cenexin
      is required for proper protein localization to the PCM. Rescue with wild-type
      human cenexin restores PCM organization, but the PLK1-binding-deficient mutant
      (S796A) fails to rescue, indicating this function depends on PLK1 interaction.
    action: ACCEPT
    reason: Strong experimental evidence from morpholino knockdown and rescue experiments
      in zebrafish embryos directly demonstrates odf2a function in PCM protein
      localization.
    supported_by:
    - reference_id: PMID:35609215
      supporting_text: When depleting endogenous zebrafish cenexin, γ-tubulin became
        more fragmented and occupied a significantly larger area (5.32 μm2 in Figure
        4, D and G) compared with control conditions
- term:
    id: GO:0019904
    label: protein domain specific binding
  evidence_type: ISS
  original_reference_id: PMID:35609215
  review:
    summary: Odf2a/cenexin binds PLK1 via its conserved C-terminal domain. In zebrafish,
      the PLK1 binding site at S829 corresponds to human S796. Rescue experiments
      show that the PLK1 binding function is required for cenexin's role in PCM
      maintenance. This molecular function is not yet annotated in GOA but is well
      supported by the conservation of the PLK1 binding motif and functional rescue
      experiments.
    action: NEW
    reason: Cenexin's PLK1 binding function via its C-terminal domain is the key
      molecular activity underlying its role in PCM organization. This is directly
      supported by rescue experiments in zebrafish.
    supported_by:
    - reference_id: PMID:35609215
      supporting_text: cenexin's C terminus acts in a conserved manner in eukaryotes,
        excluding nematodes and arthropods, to sequester PLK1 that limits PCM substrate
        phosphorylation events required for PCM cohesion
- term:
    id: GO:0005198
    label: structural molecule activity
  evidence_type: ISS
  original_reference_id: PMID:35609215
  review:
    summary: ODF2/cenexin functions as a structural component of centriole appendages
      and is required for proper centrosome architecture. In zebrafish, cenexin
      displays compact ring-like organization at centrioles, consistent with a
      structural role. This molecular function is inferred from the conserved
      structural role of ODF2 family members.
    action: NEW
    reason: The structural role of ODF2/cenexin at centrioles and centrosomes is
      well-established across vertebrates and consistent with zebrafish imaging data.
    supported_by:
    - reference_id: PMID:35609215
      supporting_text: mCherry-cenexin displayed a compact ring-like centriole organization
        at zebrafish 512-cell stage centrioles comparable to immunostaining for endogenous
        cenexin using ExM in human cells
core_functions:
- description: Odf2a/cenexin functions as a centrosomal scaffold protein that sequesters
    PLK1 at the centrosome via its conserved C-terminal binding site (S829 in zebrafish,
    corresponding to S796 in human). By sequestering PLK1, cenexin limits PLK1-dependent
    phosphorylation of PCM substrates, maintaining PCM cohesion and proper microtubule
    nucleation. This scaffolding function is essential for centrosome organization
    during cell division.
