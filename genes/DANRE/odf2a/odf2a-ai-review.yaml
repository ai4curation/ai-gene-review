- id: PMID:35609215
  title: Pericentriolar matrix (PCM) integrity relies on cenexin and polo-like kinase
    (PLK)1.
  findings:
  - statement: Cenexin is required for PCM cohesion and tempering microtubule nucleation
      in a PLK1-dependent manner
    supporting_text: cenexin is required for tempering microtubule nucleation by maintaining
      PCM cohesion in a PLK1-dependent manner
  - statement: Cenexin depletion in zebrafish embryos causes PCM fragmentation that
      is rescued by wild-type human cenexin but not by PLK1-binding-deficient cenexin
      S796A
    supporting_text: PCM architecture in cenexin-depleted zebrafish embryos was rescued
      with wild-type human cenexin, but not with a C-terminal cenexin mutant (S796A)
      deficient in PLK1 binding
  - statement: The C-terminal PLK1 binding site is conserved between human cenexin
      (S796) and zebrafish cenexin (S829)
    supporting_text: Human cenexin amino acids spanning the S796 site (781–798) were
      aligned to zebrafish cenexin where S829 corresponded with human S796
  - statement: Cenexin depletion causes gamma-tubulin fragmentation and increased
      area at mitotic centrosomes in zebrafish
    supporting_text: When depleting endogenous zebrafish cenexin, γ-tubulin became
      more fragmented and occupied a significantly larger area (5.32 μm2 in Figure
      4, D and G) compared with control conditions
  - statement: Cenexin sequesters PLK1 to prevent overphosphorylation of PCM proteins,
      maintaining PCM integrity
    supporting_text: cenexin's C terminus acts in a conserved manner in eukaryotes,
      excluding nematodes and arthropods, to sequester PLK1 that limits PCM substrate
      phosphorylation events required for PCM cohesion
existing_annotations:
- term:
    id: GO:1902017
    label: regulation of cilium assembly
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: This annotation is inferred by phylogenetic analysis (IBA) from orthologs
      in mouse and human ODF2/cenexin. Mammalian ODF2/cenexin is a known centriole
      appendage protein required for ciliogenesis. The role of cenexin at the mother
      centriole, which serves as the basal body for cilia, supports involvement in
      cilium assembly regulation. This is consistent with the known biology of ODF2
      family members.
    action: ACCEPT
    reason: Phylogenetically well-supported annotation consistent with the conserved
      role of ODF2/cenexin in centriole appendage formation and ciliogenesis.
- term:
    id: GO:0005813
    label: centrosome
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: This annotation is inferred by phylogenetic analysis from orthologs. The
      zebrafish odf2a protein localizes to the centrosome, as directly demonstrated
      by immunofluorescence in zebrafish embryos in PMID:35609215. mCherry-tagged
      cenexin displayed concentrated organization toward the centrosome center in
      zebrafish 512-cell stage embryos.
    action: ACCEPT
    reason: Centrosome localization is directly supported by experimental imaging in
      zebrafish embryos (PMID:35609215) and by phylogenetic inference from conserved
      orthologs.
    supported_by:
    - reference_id: PMID:35609215
      supporting_text: mCherry-cenexin displayed a compact ring-like centriole organization
        at zebrafish 512-cell stage centrioles comparable to immunostaining for endogenous
        cenexin using ExM in human cells
- term:
    id: GO:0000922
    label: spindle pole
  evidence_type: IEA
  original_reference_id: GO_REF:0000044
  review:
    summary: This IEA annotation is based on UniProt subcellular location mapping.
      In PMID:35609215, cenexin is shown to localize at mitotic centrosomes/spindle
      poles in both human cells and zebrafish embryos, where it recruits PLK1 for
      PCM organization during cell division. The annotation is consistent with the
      demonstrated role of cenexin at mitotic spindle poles.
    action: ACCEPT
    reason: Consistent with experimental evidence showing cenexin functions at mitotic
      centrosomes/spindle poles in zebrafish and human cells.
    supported_by:
    - reference_id: PMID:35609215
      supporting_text: PLK1 is a major regulator of bipolar spindle formation through
        PLK1-scaffold interactions at mitotic centrosomes/spindle poles
