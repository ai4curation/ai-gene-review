gene_symbol: odf2a
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:7955
  label: Danio rerio
description: Odf2a (outer dense fiber protein 2a) is the zebrafish ortholog of mammalian
  ODF2/cenexin, a structural protein of the centrosome and centriole appendages. It
  functions as a scaffold for polo-like kinase 1 (PLK1) at the centrosome, where it
  sequesters PLK1 to maintain pericentriolar matrix (PCM) cohesion and temper microtubule
  nucleation. The protein localizes to centrioles and the centrosome, and is involved
  in regulation of cilium assembly. Its C-terminal PLK1 binding site (S829, corresponding
  to human S796) is conserved across vertebrates. Loss of cenexin in zebrafish embryos
  leads to PCM fragmentation, dispersed gamma-tubulin distribution, and increased
  PCM substrate phosphorylation, phenotypes that can be rescued by wild-type human
  cenexin but not by a PLK1-binding-deficient mutant (S796A).
