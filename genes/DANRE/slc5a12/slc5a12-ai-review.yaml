description: slc5a12 encodes the zebrafish electroneutral sodium-coupled monocarboxylate transporter SMCTn/SLC5A12. The core
  function is apical plasma-membrane sodium-dependent monocarboxylate symport for substrates such as lactate, pyruvate, nicotinate,
  propionate, butyrate, and beta-hydroxybutyrate; generic transporter and sodium-transport terms are modified to this more
  specific activity and transport process.
