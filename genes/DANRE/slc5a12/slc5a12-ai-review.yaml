suggested_questions:
- question: How does the substrate-affinity and selectivity profile of zebrafish Slc5a12
    (SMCTn) for short-chain fatty acids and ketone bodies compare with that of the
    electrogenic paralog Slc5a8 (SMCTe)?
- question: In which zebrafish tissues (e.g. pronephric tubule, intestine) is slc5a12
    expressed apically, and what physiological monocarboxylate reabsorption does it
    mediate?
suggested_experiments:
- hypothesis: Zebrafish Slc5a12 mediates electroneutral, sodium-dependent uptake of
    lactate and other monocarboxylates.
  description: Express Slc5a12 in Xenopus oocytes or a cultured cell line and measure
    radiolabeled lactate, pyruvate, and butyrate uptake as a function of extracellular
    sodium, with and without membrane-potential clamping, to confirm electroneutral
    cotransport.
- hypothesis: Slc5a12 localizes specifically to the apical membrane of polarized zebrafish
    epithelial cells.
  description: Image a fluorescently tagged Slc5a12 fusion in polarized epithelia
    such as the pronephric tubule and assess apical versus basolateral distribution.
- hypothesis: Loss of slc5a12 impairs renal and intestinal monocarboxylate reabsorption.
  description: Generate a slc5a12 zebrafish mutant and measure lactate handling and
    short-chain fatty acid uptake relative to wild type.
