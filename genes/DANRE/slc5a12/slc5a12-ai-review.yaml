references:
- id: GO_REF:0000002
  title: Gene Ontology annotation through association of InterPro records with GO terms
  findings:
  - statement: Slc5a12 matches InterPro signature IPR001734 (sodium/solute symporter);
      the InterPro2GO mapping assigns membrane (GO:0016020) and transmembrane transport
      (GO:0055085).
- id: GO_REF:0000024
  title: Manual transfer of experimentally-verified manual GO annotation data to orthologs by curator judgment of sequence
    similarity
  findings:
  - statement: Apical plasma membrane localization (GO:0016324) was transferred to
      zebrafish Slc5a12 by curator-judged sequence similarity to UniProtKB:Q1EHB4.
- id: GO_REF:0000033
  title: Annotation inferences using phylogenetic trees
  findings:
  - statement: Phylogenetic inference within PANTHER families PTN008448647 and PTN000213468
      supports organic acid:sodium symporter activity (GO:0005343), localization to
      the plasma membrane (GO:0005886), and sodium ion transport (GO:0006814).
- id: GO_REF:0000044
  title: Gene Ontology annotation based on UniProtKB/Swiss-Prot Subcellular Location vocabulary mapping, accompanied by conservative
    changes to GO terms applied by UniProt
  findings:
  - statement: The UniProt Swiss-Prot subcellular location keyword SL-0015 (Apical
      cell membrane) maps Slc5a12 to apical plasma membrane (GO:0016324).
- id: GO_REF:0000108
  title: Automatic assignment of GO terms using logical inference, based on inter-ontology links
  findings:
  - statement: Logical inference over inter-ontology links derives sodium ion transmembrane
      transport (GO:0035725) from organic acid:sodium symporter activity (GO:0005343)
      and carboxylic acid transmembrane transport (GO:1905039) from secondary active
      monocarboxylate transmembrane transporter activity (GO:0015355).
- id: GO_REF:0000120
  title: Combined Automated Annotation using Multiple IEA Methods
  findings:
  - statement: Combined IEA evidence (ARBA model ARBA00028127 and InterPro IPR001734)
      assigns Slc5a12 transmembrane transporter activity (GO:0022857).
- id: PMID:17255103
  title: Zebrafish Slc5a12 encodes an electroneutral sodium monocarboxylate transporter (SMCTn). A comparison with the electrogenic
    SMCT (SMCTe/Slc5a8).
  findings:
  - statement: The zebrafish Slc5a12 paper characterizes SMCTn as an electroneutral sodium monocarboxylate transporter.
    supporting_text: Zebrafish Slc5a12 encodes an electroneutral sodium monocarboxylate transporter
  - statement: Monocarboxylates stimulate sodium uptake in the transporter assay.
    supporting_text: increased [Na(+)](i) with addition of monocarboxylates
- id: file:DANRE/slc5a12/slc5a12-uniprot.txt
  title: UniProtKB entry Q7T384 for Danio rerio slc5a12
  findings:
  - statement: UniProt describes Slc5a12 as an apical sodium-coupled monocarboxylate transporter.
    supporting_text: Acts as an electroneutral and low-affinity sodium (Na(+))-dependent sodium-coupled solute transporter
- id: file:DANRE/slc5a12/slc5a12-deep-research-falcon.md
  title: Falcon (Edison) deep research report on Danio rerio slc5a12 (Q7T384)
  findings:
  - statement: |-
      The falcon report confirms the identity of zebrafish slc5a12 as the electroneutral sodium-coupled
      monocarboxylate transporter SMCTn, distinct from the electrogenic paralog Slc5a8/SMCTe.
    reference_section_type: OTHER
    supporting_text: |-
      zebrafish protein is cited as an **electroneutral** sodium-monocarboxylate cotransporter (**SMCTn**) that is distinct from **Slc5a8/SMCTe** (electrogenic) in zebrafish
  - statement: |-
      SMCT2/SLC5A12 is a sodium-coupled, low-affinity transporter for monocarboxylates including lactate,
      pyruvate, nicotinate, and short-chain fatty acids, defining the substrate class for the molecular function.
    reference_section_type: OTHER
    supporting_text: |-
      SMCTs are **Na+-coupled uptake transporters** for **monocarboxylates** such as lactate, pyruvate, nicotinate, and short-chain fatty acids
  - statement: |-
      SLC5A12/SMCT2 is the low-affinity member of the sodium-coupled monocarboxylate transporter pair, in
      contrast to the higher-affinity SLC5A8/SMCT1, consistent with the zebrafish KM values (lactate KM=1.81 mM).
    reference_section_type: OTHER
    supporting_text: |-
      SMCT2 = SLC5A12** is generally described as a **low-affinity** Na+-coupled monocarboxylate transporter compared with **SMCT1 = SLC5A8**
  - statement: |-
      Sodium dependence of SMCT2 transport is obligate; removal or substitution of sodium abolishes
      monocarboxylate uptake, supporting the sodium ion transmembrane transport process.
    reference_section_type: OTHER
    supporting_text: |-
      Human SMCT2 exhibits **obligate Na+ dependence** (replacement of Na+ with K+ or Li+ abolished transport in the cited assays)
  - statement: |-
      Vertebrate SMCT2 transporters localize to the apical membrane of renal proximal tubule epithelium,
      supporting an apical plasma membrane location and a reabsorptive transport role.
    reference_section_type: OTHER
    supporting_text: |-
      SMCTs are described as localized to the **apical membrane of renal proximal tubules**, consistent with a role in **reabsorption** of filtered monocarboxylates from tubular lumen
  - statement: |-
      Comparative genomics confirms retention of a slc5a12 ortholog in zebrafish among non-percomorph teleosts,
      supporting the orthology-based functional annotation.
    reference_section_type: OTHER
    supporting_text: |-
      a slc5a12 ortholog persists in zebrafish and other non-percomorph teleosts
