- id: file:DANRE/cyp51/cyp51-deep-research-falcon.md
  title: Falcon deep research report on zebrafish cyp51 (Q1JPY5)
  findings:
  - statement: |
      Zebrafish cyp51 encodes lanosterol 14alpha-demethylase, a cytochrome P450 that
      catalyzes the obligatory C14alpha-demethylation step of sterol biosynthesis via
      three sequential monooxygenation reactions followed by elimination of formic acid
      and formation of a Delta14,15 double bond.
    supporting_text: |-
      CYP51 catalyzes the **obligatory C14α-demethylation** step of eukaryotic sterol biosynthesis. Mechanistically, CYP51 carries out **three sequential monooxygenation reactions** at the C14α-methyl group (methyl → hydroxymethyl → carboxyaldehyde), followed by **elimination of formic acid** and formation of a **Δ14,15 double bond** in the sterol nucleus.
    reference_section_type: RESULTS
  - statement: |
      In zebrafish recombinant assays the enzyme uses lanosterol as substrate and produces
      the 14alpha-demethylated sterol FF-MAS (4,4-dimethyl-5alpha-cholesta-8,14,24-triene-3beta-ol),
      confirmed by GC-MS.
    supporting_text: |-
      In zebrafish recombinant assays, CYP51 uses **lanosterol** as substrate and produces the 14α-demethylated sterol **FF‑MAS (follicular fluid meiosis-activating sterol)**, chemically identified as **4,4-dimethyl-5α-cholesta-8,14,24-triene-3β-ol**, by GC–MS.
    reference_section_type: RESULTS
  - statement: |
      Direct zebrafish biochemical evidence: Morrison et al. expressed zebrafish CYP51 in
      E. coli, reconstituted NADPH-dependent activity, and verified the FF-MAS product by
      GC-MS, supporting annotation of zebrafish cyp51 as lanosterol 14alpha-demethylase.
    supporting_text: |-
      Morrison et al. expressed zebrafish CYP51 in *E. coli* (including an N-terminally truncated construct to improve expression and activity) and reconstituted activity with NADPH-dependent electron transfer components. In this system, zebrafish CYP51 catalyzed lanosterol demethylation with GC–MS verification of the FF‑MAS product.
    reference_section_type: RESULTS
  - statement: |
      CYP51 functions in the sterol/cholesterol biosynthetic pathway downstream of lanosterol
      formation; in vertebrates this pathway contributes to cholesterol synthesis and also
      generates meiosis-activating sterols such as FF-MAS.
    supporting_text: |-
      CYP51 functions in the sterol/cholesterol biosynthetic pathway downstream of lanosterol formation; in vertebrates this pathway contributes to cholesterol synthesis and also generates meiosis-activating sterols such as FF-MAS.
    reference_section_type: RESULTS
  - statement: |
      Direct zebrafish subcellular localization was not retrieved, but CYP51 is a membrane-bound
      P450 and the most consistent functional localization for zebrafish CYP51 is inferred to be
      the endoplasmic reticulum membrane.
    supporting_text: |-
      the most consistent functional localization for zebrafish CYP51 is the **endoplasmic reticulum (ER) membrane** (inference from conserved CYP51 membrane association and sterol pathway organization, rather than a zebrafish-localization experiment in the retrieved corpus)
    reference_section_type: DISCUSSION
  - statement: |
      CYP51 is a membrane-bound heme-thiolate P450; azoles inhibit it by coordinating an azole
      nitrogen to the heme iron (Type II response), blocking oxygen activation needed for
      oxidative demethylation.
    supporting_text: |-
      azoles inhibit CYP51 by **direct coordination of an azole nitrogen to the heme iron** (as the sixth ligand), producing a **Type II spectral response** and blocking oxygen activation needed for oxidative demethylation.
    reference_section_type: RESULTS
