        annotated.
      action: MODIFY
      reason: The more specific child term GO:0008574 (plus-end-directed microtubule
        motor activity) is already annotated and is more informative for this kinesin-3
        family member.
      proposed_replacement_terms:
        - id: GO:0008574
          label: plus-end-directed microtubule motor activity
      supported_by: []
  - term:
      id: GO:0005524
      label: ATP binding
    evidence_type: IEA
    original_reference_id: GO_REF:0000120
    review:
      summary: IEA annotation from combined automated methods. Kif1b contains a
        kinesin motor domain with a well-characterized ATP-binding P-loop motif
        (PROSITE PS50067). ATP binding is essential for its motor activity.
      action: ACCEPT
      reason: ATP binding is a fundamental molecular function of kinesin motors,
        well supported by domain architecture.
      supported_by: []
  - term:
      id: GO:0005856
      label: cytoskeleton
    evidence_type: IEA
    original_reference_id: GO_REF:0000044
    review:
      summary: IEA annotation from UniProt subcellular location mapping. Kif1b
        localizes to the cytoskeleton as it associates with microtubules. However,
        microtubule (GO:0005874) would be more specific and informative.
      action: MODIFY
      reason: The term is too general. Kif1b specifically associates with
        microtubules as a microtubule-based motor protein.
      proposed_replacement_terms:
        - id: GO:0005874
          label: microtubule
      supported_by: []
  - term:
      id: GO:0007018
      label: microtubule-based movement
    evidence_type: IEA
    original_reference_id: GO_REF:0000002
    review:
      summary: IEA annotation from InterPro. Kif1b is a kinesin motor that drives
        microtubule-based movement. This is consistent with its role in axonal
        transport and mRNA localization. The more specific term transport along
        microtubule (GO:0010970) is also annotated.
      action: ACCEPT
      reason: Microtubule-based movement is a core biological process for this
        kinesin motor protein, supported by multiple experimental studies.
      supported_by: []
  - term:
      id: GO:0008017
      label: microtubule binding
    evidence_type: IEA
    original_reference_id: GO_REF:0000002
    review:
      summary: IEA annotation from InterPro domain match to kinesin motor domain.
        Kif1b binds microtubules through its motor domain; the st43 mutation disrupts
        a conserved alpha helix in the putative microtubule interaction site.
      action: ACCEPT
      reason: Microtubule binding is a core molecular function of kinesin motors,
        well supported by domain architecture and mutant analysis.
      supported_by:
        - reference_id: PMID:19503091
          supporting_text: "converting a conserved threonine to a proline, which is\
            \ predicted to break a highly conserved alpha helix in the putative microtubule\
            \ interaction site of the kinesin motor"
  - term:
      id: GO:0008574
      label: plus-end-directed microtubule motor activity
    evidence_type: IEA
    original_reference_id: GO_REF:0000003
    review:
      summary: IEA annotation based on EC number mapping (EC 5.6.1.3). Kif1b is
        classified as a plus-end-directed kinesin ATPase. This is the most specific
        and appropriate molecular function term for this kinesin-3 family member.
      action: ACCEPT
      reason: Plus-end-directed microtubule motor activity is the core molecular
        function of Kif1b, supported by its EC classification and kinesin-3 family
        membership.
      supported_by: []
  - term:
      id: GO:0010970
      label: transport along microtubule
    evidence_type: IEA
    original_reference_id: GO_REF:0000117
    review:
      summary: IEA annotation from ARBA machine learning. Kif1b transports cargo
        along microtubules, including mRNA molecules, synaptic vesicles, and other
        cargo in axons and oligodendrocytes. Well supported by experimental data.
      action: ACCEPT
      reason: Transport along microtubules is a core biological process for Kif1b,
        strongly supported by experimental evidence in zebrafish.
      supported_by:
        - reference_id: PMID:19503091
          supporting_text: "Kif1b is required for the localization of mbp (myelin\
            \ basic protein) mRNA to processes of myelinating oligodendrocytes in\
            \ zebrafish"
        - reference_id: PMID:31541015
          supporting_text: "Kif1bβ depletion increased Rab3 axonal transport velocities\
