      summary: IEA annotation based on UniRule transfer. Kif1b contains a kinesin
        motor domain with a P-loop NTPase fold that binds ATP. However, nucleotide
        binding is too general; ATP binding (GO:0005524) is already annotated and
        is more informative.
      action: MODIFY
      reason: The term is too general. ATP binding (GO:0005524) is already annotated
        and provides the appropriate specificity for a kinesin motor.
      proposed_replacement_terms:
