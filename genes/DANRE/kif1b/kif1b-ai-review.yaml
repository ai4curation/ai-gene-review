      supported_by: []
  - term:
      id: GO:0008045
      label: motor neuron axon guidance
    evidence_type: IMP
    original_reference_id: PMID:31541015
    review:
      summary: IMP annotation from ZFIN. kif1bst43 mutants show secondary motor
        neuron (sMN) axon pathfinding defects, with rostrally projecting-like sMN
        axons appearing defasciculated, split, or absent. Kif1bβ-specific morpholino
        knockdown recapitulates these defects, while Kif1bα knockdown does not.
      action: ACCEPT
      reason: Motor neuron axon guidance is a well-supported function of Kif1bβ in
        zebrafish, with convergent evidence from mutant and morpholino analyses.
      supported_by:
        - reference_id: PMID:31541015
          supporting_text: "However, kif1bst43 mutants showed sMN axon pathfinding\
            \ defects, which were restricted to rostrally projecting-like sMN (RoP-like\
            \ sMN"
        - reference_id: PMID:31541015
          supporting_text: "MO Kif1bβ-injected larvae exhibited defasciculated/split\
            \ rostral nerves as kif1bst43 mutants and Fignl1-depleted larvae"
  - term:
      id: GO:0098930
      label: axonal transport
    evidence_type: IMP
    original_reference_id: PMID:31541015
    review:
      summary: IMP annotation from ZFIN. Kif1bβ loss of function increases axonal
        transport velocities of Rab3-positive vesicles in both anterograde and
        retrograde directions, demonstrating its role in regulating bidirectional
        axonal transport. Kif1bβ forms a complex with Fignl1 that restricts
        dynein-based transport velocity.
      action: ACCEPT
      reason: Axonal transport regulation is a core function of Kif1bβ, directly
        demonstrated by live imaging of Rab3 vesicle transport in zebrafish motor
        neuron axons.
      supported_by:
        - reference_id: PMID:31541015
          supporting_text: "Kif1bβ depletion increased Rab3 axonal transport velocities\
            \ in both anterograde and retrograde directions in SMN axons"
        - reference_id: PMID:31541015
          supporting_text: "our results identify Fignl1 as a key dynein regulator\
            \ required for motor circuit wiring"
  - term:
      id: GO:1990535
      label: neuron projection maintenance
    evidence_type: IMP
    original_reference_id: PMID:25355224
    review:
      summary: IMP annotation from ZFIN. In the context of kif5Aa mutants, concurrent
        loss of kif1b exacerbates axonal degeneration via a nonmitochondrial cargo
        common to Kif5Aa. This indicates kif1b plays a role in maintaining neuron
        projections, acting redundantly with kif5Aa for some cargo.
      action: ACCEPT
      reason: Kif1b contributes to neuron projection maintenance, as demonstrated
        by enhanced axonal degeneration when kif1b is lost concurrently with kif5Aa.
      supported_by:
        - reference_id: PMID:25355224
          supporting_text: "concurrent loss of the kinesin-3, kif1b, or its adaptor\
            \ kbp, exacerbates axonal degeneration via a nonmitochondrial cargo common\
            \ to Kif5Aa"
  - term:
      id: GO:1990535
      label: neuron projection maintenance
    evidence_type: IGI
    original_reference_id: PMID:25355224
    review:
      summary: IGI annotation from ZFIN. Genetic interaction between kif1b and
        kif5Aa demonstrates that loss of kif1b in the kif5Aa mutant background
        exacerbates axonal degeneration, indicating functional overlap in neuron
        projection maintenance through a shared nonmitochondrial cargo.
      action: ACCEPT
      reason: The genetic interaction between kif1b and kif5Aa provides strong
        evidence for kif1b involvement in neuron projection maintenance.
      supported_by:
        - reference_id: PMID:25355224
          supporting_text: "concurrent loss of the kinesin-3, kif1b, or its adaptor\
            \ kbp, exacerbates axonal degeneration via a nonmitochondrial cargo common\
            \ to Kif5Aa"
  - term:
      id: GO:0030099
      label: myeloid cell differentiation
    evidence_type: IMP
    original_reference_id: PMID:25010335
    review:
      summary: IMP annotation from ZFIN. In a GWAS-based morpholino knockdown screen,
        kif1b depletion resulted in effects on macrophage numbers. kif1b was placed
        in the thrombocyte-erythroid progenitor cluster on the hematopoietic
        differentiation tree. This is a large-scale screen result and kif1b is not
        primarily a hematopoietic gene.
      action: KEEP_AS_NON_CORE
      reason: The annotation derives from a large-scale morpholino screen. While
        the result is valid, myeloid cell differentiation is not a core function
        of kif1b, which is primarily a neuronal motor protein.
      supported_by:
        - reference_id: PMID:25010335
          supporting_text: "depletion of nine resulted in reduced numbers of Sudan\
            \ Black positive cells and two (kif1b, waspla) had an effect on the number\
            \ of macrophages"
  - term:
      id: GO:0030225
      label: macrophage differentiation
    evidence_type: IMP
    original_reference_id: PMID:25010335
    review:
      summary: IMP annotation from ZFIN. In the GWAS-based knockdown screen, kif1b
        depletion specifically affected macrophage numbers. This is likely a
        secondary, non-core phenotype.
      action: KEEP_AS_NON_CORE
      reason: Macrophage differentiation is not a core function of kif1b. This
        phenotype was identified in a large-scale screen and may reflect a general
        requirement for kinesin-based transport in differentiating hematopoietic
        cells rather than a specific kif1b function.
      supported_by:
        - reference_id: PMID:25010335
          supporting_text: "depletion of nine resulted in reduced numbers of Sudan\
            \ Black positive cells and two (kif1b, waspla) had an effect on the number\
            \ of macrophages"
  - term:
      id: GO:0008298
      label: intracellular mRNA localization
    evidence_type: IMP
    original_reference_id: PMID:19503091
    review:
      summary: IMP annotation from ZFIN. kif1bst43 mutants show mislocalization of
        mbp and 36k mRNAs, which are normally transported to oligodendrocyte
        myelinating processes. Chimera experiments demonstrate that kif1b functions
        cell-autonomously in oligodendrocytes for mRNA localization. This is a key
        function of the Kif1bβ isoform.
      action: ACCEPT
      reason: Intracellular mRNA localization is a core function of Kif1bβ, with
        strong experimental evidence from mutant analysis and cell transplantation
        in zebrafish.
      supported_by:
        - reference_id: PMID:19503091
          supporting_text: "Kif1b is required for the localization of mbp (myelin\
            \ basic protein) mRNA to processes of myelinating oligodendrocytes in\
            \ zebrafish"
        - reference_id: PMID:19503091
          supporting_text: "kif1b is required autonomously in oligodendrocytes to\
            \ localize mbp mRNA"
  - term:
      id: GO:0048675
      label: axon extension
    evidence_type: IMP
    original_reference_id: PMID:19503091
    review:
      summary: IMP annotation from ZFIN. kif1bst43 mutants and kif1b morphants show
        disrupted outgrowth of some of the longest axons in both PNS and CNS.
        Chimera analyses demonstrate that kif1b functions cell-autonomously in
        neurons for axon outgrowth.
      action: ACCEPT
      reason: Axon extension is a well-supported core function of kif1b in zebrafish
        neurons, demonstrated by mutant and chimera analyses.
      supported_by:
        - reference_id: PMID:19503091
          supporting_text: "Kif1b is required for outgrowth of some of the longest\
            \ axons in the peripheral and central nervous systems"
        - reference_id: PMID:19503091
          supporting_text: "kif1b is required autonomously in neurons to mediate\
            \ normal PLLn development"
  - term:
      id: GO:0048917
      label: posterior lateral line ganglion development
    evidence_type: IMP
    original_reference_id: PMID:19503091
    review:
      summary: IMP annotation from ZFIN. kif1bst43 mutants show reduced neuron
        numbers in the posterior lateral line ganglion (PLLg), with an average of
        20 neurons versus 27 in wildtype at 28 hpf, and 25 versus 38 at 36 hpf.
      action: ACCEPT
      reason: PLLg development defects are directly observed in kif1b mutants with
        quantitative data on neuron number reduction.
      supported_by:
        - reference_id: PMID:19503091
          supporting_text: "The posterior lateral line ganglion (PLLg) contained an\
            \ average of 27 neurons (s.d.+/− 2) in wildtype siblings at 28 hpf (n=15)\
            \ compared to 20 (s.d.+/− 5) in kif1bst43 mutants (n=12)"
  - term:
      id: GO:0048918
      label: posterior lateral line nerve development
    evidence_type: IMP
    original_reference_id: PMID:19503091
    review:
      summary: IMP annotation from ZFIN. kif1bst43 mutants show disrupted outgrowth
        of the posterior lateral line nerve (PLLn). Chimera experiments demonstrate
        that wildtype axons can grow to the tip of the tail while kif1b morphant
        axons never grow past somite ten.
      action: ACCEPT
      reason: PLLn development defects are directly demonstrated in kif1b mutants
        with compelling chimera data showing cell-autonomous requirements.
      supported_by:
        - reference_id: PMID:19503091
          supporting_text: "kif1b morphant axons never grew past somite ten, wildtype\
            \ axons could grow to the tip of the tail in the same nerves"
