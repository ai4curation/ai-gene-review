    evidence_type: IEA
    original_reference_id: GO_REF:0000108
    review:
      summary: IEA annotation from logical inference based on axonal transport
        annotation. Kif1b functions within axons to transport cargo and regulate
        transport velocity. Well supported by experimental data.
      action: ACCEPT
      reason: Kif1b localizes to and functions within axons, as demonstrated by
