  - term:
      id: GO:0030658
      label: transport vesicle membrane
    evidence_type: IEA
    original_reference_id: GO_REF:0000044
    review:
      summary: IEA annotation from UniProt subcellular location. Kif1b has been
        implicated in transport of synaptic vesicles and associates with transport
        vesicle membranes as a motor protein.
      action: ACCEPT
      reason: Kif1b is known to transport vesicular cargo along microtubules,
        including Rab3-positive synaptic vesicles, consistent with association with
        transport vesicle membranes.
      supported_by:
        - reference_id: PMID:31541015
          supporting_text: "Kif1bβ depletion increased Rab3 axonal transport velocities\
            \ in both anterograde and retrograde directions in SMN axons"
  - term:
      id: GO:0045202
      label: synapse
    evidence_type: IEA
    original_reference_id: GO_REF:0000044
    review:
      summary: IEA annotation from UniProt subcellular location. Kif1b has been
        implicated in synaptic vesicle transport and is expected to localize to
        synapses, though direct experimental evidence in zebrafish for synaptic
        localization is limited.
      action: KEEP_AS_NON_CORE
      reason: While Kif1b transports synaptic vesicle cargo (Rab3 vesicles), its
        primary localization is along axonal microtubules rather than specifically
        at the synapse.
      supported_by: []
  - term:
      id: GO:0048731
      label: system development
    evidence_type: IEA
    original_reference_id: GO_REF:0000117
    review:
      summary: IEA annotation from ARBA. Kif1b mutants show defects in nervous
        system and peripheral nerve development, consistent with a role in system
        development. However, this term is very broad and non-specific.
      action: KEEP_AS_NON_CORE
      reason: While Kif1b is involved in nervous system development, the term is
