id: A0A8M3AMU7
gene_symbol: kif1b
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:7955
  label: Danio rerio
description: Kif1b is a plus-end-directed kinesin motor protein (kinesin-3 family)
  that uses ATP hydrolysis to transport cargo along microtubules toward their plus
  ends. In zebrafish, Kif1b has two prominent isoforms (Kif1bα and Kif1bβ) that share
  a common motor domain but differ in tail domains conferring cargo specificity. The
  Kif1bβ isoform is required for localization of myelin basic protein (mbp) mRNA to
  oligodendrocyte processes, for axon extension in peripheral and central nervous
  systems, for motor neuron axon guidance through regulation of bidirectional axonal
  transport velocity, and for proper posterior lateral line nerve and ganglion
  development. Kif1b also acts upstream of myeloid cell and macrophage differentiation
  in a GWAS-validated hematopoietic screen. Kif1bβ forms a molecular complex with
  Fignl1 and the dynein/dynactin adaptor Bicd1 to restrict dynein transport velocity
  during axon navigation.
