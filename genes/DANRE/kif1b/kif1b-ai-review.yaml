  - id: PMID:19503091
    title: Kif1b is essential for mRNA localization in oligodendrocytes and
      development of myelinated axons.
    findings:
      - statement: Kif1b is required for localization of mbp mRNA to oligodendrocyte
          processes and functions cell-autonomously in oligodendrocytes.
        supporting_text: "Kif1b is required for the localization of mbp (myelin basic\
          \ protein) mRNA to processes of myelinating oligodendrocytes in zebrafish"
      - statement: The st43 mutation disrupts the kinesin motor domain by converting
          a conserved threonine to proline in the microtubule interaction site.
        supporting_text: "converting a conserved threonine to a proline, which is\
          \ predicted to break a highly conserved alpha helix in the putative microtubule\
          \ interaction site of the kinesin motor"
      - statement: Kif1b is required cell-autonomously in neurons for peripheral and
          central nervous system axon outgrowth.
        supporting_text: "kif1b is required autonomously in neurons to mediate normal\
          \ PLLn development"
      - statement: Kif1b mutants show reduced posterior lateral line ganglion neuron
          numbers and disrupted PLLn outgrowth.
        supporting_text: "The posterior lateral line ganglion (PLLg) contained an average\
          \ of 27 neurons (s.d.+/− 2) in wildtype siblings at 28 hpf (n=15) compared\
          \ to 20 (s.d.+/− 5) in kif1bst43 mutants (n=12)"
      - statement: Kif1b is required for correct myelination and prevents ectopic
          production of myelin-like membrane.
        supporting_text: "kif1b is required to localize myelin mRNA to oligodendrocyte\
          \ processes, to elaborate the correct amount of myelin around axons, and\
          \ to prevent the ectopic production of myelin-like membrane"
  - id: PMID:25010335
    title: A loss of function screen of identified genome-wide association study Loci
      reveals new genes controlling hematopoiesis.
    findings:
      - statement: kif1b knockdown in a GWAS-based screen affects macrophage numbers
          and places kif1b in the thrombocyte-erythroid progenitor cluster.
        supporting_text: "depletion of nine resulted in reduced numbers of Sudan Black\
          \ positive cells and two (kif1b, waspla) had an effect on the number of\
          \ macrophages"
  - id: PMID:25355224
    title: Unique function of Kinesin Kif5A in localization of mitochondria in axons.
    findings:
      - statement: Loss of kif1b exacerbates axonal degeneration in kif5Aa mutants
          through a shared nonmitochondrial cargo.
        supporting_text: "concurrent loss of the kinesin-3, kif1b, or its adaptor\
          \ kbp, exacerbates axonal degeneration via a nonmitochondrial cargo common\
          \ to Kif5Aa"
  - id: PMID:31541015
    title: FIGNL1 associates with KIF1Bβ and BICD1 to restrict dynein transport
      velocity during axon navigation.
    findings:
      - statement: Kif1bβ forms a molecular complex with Fignl1 and the
          dynein/dynactin adaptor Bicd1 to regulate bidirectional axonal transport.
        supporting_text: "Fignl1 binds the kinesin Kif1bβ and the dynein/dynactin\
          \ adaptor Bicaudal D-1 (Bicd1) in a molecular complex including the dynactin\
          \ subunit dynactin 1"
      - statement: Kif1bβ loss of function causes motor neuron axon pathfinding
          defects restricted to RoP-like secondary motor neurons.
        supporting_text: "However, kif1bst43 mutants showed sMN axon pathfinding defects,\
          \ which were restricted to rostrally projecting-like sMN (RoP-like sMN"
      - statement: Kif1bβ depletion increases Rab3 vesicle transport velocity in
          both directions, identifying it as a transport velocity regulator.
        supporting_text: "Kif1bβ depletion increased Rab3 axonal transport velocities\
          \ in both anterograde and retrograde directions in SMN axons"
      - statement: Kif1bβ and Fignl1 act as a dynein speed limiter complex during
          axon navigation.
        supporting_text: "Fignl1/Kif1bβ as a dynein speed limiter complex"
