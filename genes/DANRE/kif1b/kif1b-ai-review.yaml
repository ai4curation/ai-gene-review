      label: cytoskeletal motor activity
    evidence_type: IEA
    original_reference_id: GO_REF:0000104
    review:
      summary: IEA annotation based on UniRule transfer. Kif1b is a kinesin motor
        protein, so cytoskeletal motor activity is correct but too general. The more
        specific term plus-end-directed microtubule motor activity (GO:0008574) is
        already annotated.
      action: MODIFY
      reason: The term is too general. Plus-end-directed microtubule motor activity
