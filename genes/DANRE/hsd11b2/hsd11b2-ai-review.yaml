id: F1QLP1
gene_symbol: hsd11b2
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:7955
  label: Danio rerio
description: hsd11b2 encodes zebrafish 11-beta-hydroxysteroid dehydrogenase type 2, a membrane short-chain dehydrogenase/reductase
  that oxidizes cortisol and related active 11-beta-hydroxy steroids to inactive 11-keto forms. Its core role is NAD(+)-dependent
  glucocorticoid/cortisol catabolism, with stress-axis effects downstream of this steroid-inactivating activity.
