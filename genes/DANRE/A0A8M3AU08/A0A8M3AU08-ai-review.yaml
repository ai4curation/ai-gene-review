core_functions:
- molecular_function:
    id: GO:0004438
    label: phosphatidylinositol-3-phosphate phosphatase activity
  description: >-
    Myotubularin 1 is a lipid phosphatase that catalyzes the dephosphorylation of
    phosphatidylinositol 3-phosphate (PI3P) and phosphatidylinositol 3,5-bisphosphate (PI(3,5)P2)
    at the D3 position (EC 3.1.3.95). This phosphatase activity is critical for regulating
    phosphoinositide signaling on endosomal membranes, which controls membrane trafficking,
    autophagy, and T-tubule biogenesis in skeletal muscle. The protein contains a myotubularin-like
    phosphatase domain with a catalytic Cys-X5-Arg motif characteristic of the PTP superfamily,
    and a GRAM domain involved in membrane association. In zebrafish, loss of mtm1 causes
    T-tubule disorganization, myofiber hypotrophy, and impaired motor function, recapitulating
    human X-linked myotubular myopathy.
  directly_involved_in:
