  label: Danio rerio
description: >-
  Myotubularin 1 (mtm1) is a phosphatidylinositol phosphatase in zebrafish (Danio rerio) that
  dephosphorylates phosphatidylinositol 3-phosphate (PI3P) and phosphatidylinositol 3,5-bisphosphate
  (PI(3,5)P2). The protein contains a myotubularin-like phosphatase domain and a GRAM domain, and
  belongs to the protein-tyrosine phosphatase family, myotubularin subfamily. It localizes to the
  cell membrane, late endosomes, filopodia, ruffles, and sarcomeres. Myotubularin is essential for
  skeletal muscle development, T-tubule organization, and neuromuscular junction formation. Loss of
  function in zebrafish results in impaired motor function, myofiber hypotrophy, and abnormally
  positioned nuclei, recapitulating X-linked myotubular myopathy seen in humans. The original
  UniProt accession A0A8M3AU08 has been deleted and replaced by A0AB13A9G0; the gene corresponds
  to NCBI Gene ID 560881.

existing_annotations:
- term:
    id: GO:0004438
    label: phosphatidylinositol-3-phosphate phosphatase activity
  evidence_type: ISS
  original_reference_id: GO_REF:0000024
  review:
    summary: >-
      Myotubularin 1 contains a conserved myotubularin-like phosphatase domain (IPR010569) with a
      catalytic Cys-X5-Arg motif. Based on sequence similarity to human MTM1, which is a well-characterized
      PI3P and PI(3,5)P2 phosphatase (EC 3.1.3.95), this molecular function annotation is strongly supported.
    action: NEW
    reason: >-
      The phosphatidylinositol-3-phosphate phosphatase activity is the core enzymatic function of
      myotubularin. The zebrafish protein has conserved domain architecture including the myotubularin
      phosphatase domain and GRAM domain, and is orthologous to human MTM1.
    supported_by:
    - reference_id: PMID:19197364
      supporting_text: >-
        Loss of myotubularin function results in T-tubule disorganization in zebrafish and human
        myotubular myopathy
