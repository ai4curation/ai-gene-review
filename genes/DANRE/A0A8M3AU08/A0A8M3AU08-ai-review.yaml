suggested_questions:
- question: >-
    Does zebrafish mtm1 have the same substrate specificity as human MTM1, dephosphorylating
    both PI3P and PI(3,5)P2, and is the catalytic mechanism conserved?
- question: >-
    What is the functional relationship between mtm1 and mtmr12 in zebrafish skeletal muscle,
    and does MTMR12 serve as a stabilizing partner as seen in mammalian systems?
- question: >-
    Is mtm1 involved in autophagy regulation in zebrafish skeletal muscle, and does its loss
    lead to autophagosome accumulation as reported in mammalian myotubular myopathy models?

suggested_experiments:
- description: >-
    Generate mtm1 CRISPR knockout zebrafish and characterize the muscle phenotype using
    transmission electron microscopy to assess T-tubule organization, myofiber size, and
    nuclear positioning at multiple developmental stages.
  experiment_type: reverse genetics / electron microscopy
- description: >-
    Perform phosphoinositide lipid analysis (e.g., HPLC or mass spectrometry) on wild-type
    versus mtm1 knockout zebrafish muscle to determine whether PI3P and PI(3,5)P2 levels
    are elevated upon loss of mtm1, confirming its phosphatase activity in vivo.
  experiment_type: lipidomics
- description: >-
    Use co-immunoprecipitation or proximity ligation assays in zebrafish muscle to identify
    binding partners of mtm1, particularly testing interaction with mtmr12 and other
    myotubularin family members.
  experiment_type: proteomics / protein-protein interaction
