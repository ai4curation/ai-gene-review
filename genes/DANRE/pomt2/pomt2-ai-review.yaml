- id: file:DANRE/pomt2/pomt2-deep-research-falcon.md
  title: 'Falcon (Edison) deep research report: functional annotation of zebrafish pomt2 (F1Q8R9)'
  findings:
  - statement: |-
      Pomt2 is a glycosyltransferase family 39 (GT39), GT-C-type ER membrane enzyme that, together with Pomt1, catalyzes the initiating step of protein O-mannosylation using dolichol-phosphate-mannose as the activated donor.
    supporting_text: |-
      the canonical initiating enzymes are **POMT1 and POMT2**, which function in the **endoplasmic reticulum (ER)** and use **dolichol-phosphate-mannose (Dol-P-Man)** as the activated donor
    reference_section_type: OTHER
  - statement: |-
      Protein O-mannosylation transfers a mannose residue to Ser/Thr hydroxyl groups on protein substrates.
    supporting_text: |-
      a **mannose** residue is transferred to the hydroxyl group of **Ser/Thr** residues in protein substrates
    reference_section_type: OTHER
  - statement: |-
      In the zebrafish microsomal assay, mannose was transferred onto alpha-dystroglycan and the product was confirmed as alpha-linked mannose.
    supporting_text: |-
      mannose was transferred onto **α-dystroglycan** and shown to be **α-linked**
    reference_section_type: OTHER
  - statement: |-
      Metazoan POMT activity requires an obligate POMT1-POMT2 complex; in zebrafish, high O-mannosyltransferase activity was observed only when zPOMT1 and zPOMT2 were co-expressed, with zPOMT2 alone giving only low activity and zPOMT1 alone none.
    supporting_text: |-
      high O-mannosyltransferase activity** in HEK293T microsomes was observed only when **zPOMT1 and zPOMT2 were co-expressed**; zPOMT2 alone gave only low activity and zPOMT1 alone none
    reference_section_type: OTHER
  - statement: |-
      POMT1/2-class enzymes are ER-localized, multi-pass integral membrane proteins; zebrafish Pomt2 is modeled as an ER membrane-embedded GT-C enzyme with multiple transmembrane helices and luminal catalytic elements.
    supporting_text: |-
      POMT1/2-class enzymes are described as **ER-localized, multi-pass integral membrane proteins**
    reference_section_type: OTHER
  - statement: |-
      Pomt2 (with Pomt1) catalyzes the entry step generating O-mannose on alpha-dystroglycan, upstream of the core M1/M2/M3 branches and matriglycan assembly.
    supporting_text: |-
      Pomt2 (with Pomt1) catalyzes the **entry step** that produces **O-mannose** on proteins such as **α-dystroglycan (α-DG)**
    reference_section_type: OTHER
  - statement: |-
      Prior zebrafish pomt2 CRISPR knockout studies reported photoreceptor degeneration by 6 months and one mutant with mild hydrocephalus and muscular dystrophy by 2 months, consistent with dystroglycanopathy-like phenotypes.
    supporting_text: |-
      prior zebrafish **pomt2 CRISPR KO** outcomes (photoreceptor degeneration by **6 months**
    reference_section_type: OTHER
