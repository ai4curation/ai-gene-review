gene_symbol: pomt2
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:7955
  label: Danio rerio
description: pomt2 encodes protein O-mannosyltransferase 2, an endoplasmic-reticulum membrane glycosyltransferase that transfers mannose from dolichyl-phosphate-D-mannose to serine/threonine residues on protein substrates. In zebrafish, the enzyme supports protein O-linked mannosylation and photoreceptor cell maintenance; the core biochemical role is ER protein O-mannosylation rather than the downstream retinal phenotype.
