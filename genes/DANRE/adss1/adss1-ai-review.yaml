- id: file:DANRE/adss1/adss1-uniprot.txt
  title: UniProtKB entry Q6NSN5 for Danio rerio adss1
  findings:
  - statement: UniProt describes ADSS1 as the first committed enzyme in AMP biosynthesis from IMP.
    supporting_text: Catalyzes the first committed step in the biosynthesis of AMP from IMP.
- id: file:DANRE/adss1/adss1-deep-research-falcon.md
  title: Falcon (Edison Scientific Literature) deep research report for Danio rerio adss1 (Q6NSN5)
  findings:
  - statement: |
      ADSS1 catalyzes the conserved IMP -> adenylosuccinate (S-AMP) step, the first step of AMP formation from IMP, using IMP, aspartate and GTP as substrates with Mg2+ in assay conditions; the core reaction chemistry is conserved across the adenylosuccinate synthetase family.
    supporting_text: |
      ADSS/ADSS1 catalyzes the IMP → adenylosuccinate (S-AMP) step, the first step of AMP formation from IMP; retrieved biochemical evidence also supports use of IMP, aspartate, and GTP as substrates, with adenylosuccinate measured as product and Mg2+ included in assay conditions.
    reference_section_type: RESULTS
  - statement: |
      ADSS1 functions in the IMP -> AMP branch of de novo purine biosynthesis and in the purine nucleotide cycle (with ADSL and AMPD), supporting muscle energy homeostasis.
    supporting_text: |
      ADSS and ADSL, together with AMP deaminase (AMPD; converts AMP back to IMP), are described as key enzymes of the **purine nucleotide cycle**, which supports **energy homeostasis in muscle**
    reference_section_type: RESULTS
  - statement: |
      ADSS1 is the predominantly skeletal/striated muscle-expressed isoform (also cardiac), distinct from the broadly expressed, potentially compensatory non-muscle isoform ADSS2.
    supporting_text: |
      ADSS1 is described as a predominantly skeletal/striated muscle-expressed isoform, with expression also noted in cardiac muscle, whereas ADSS2 is described as a non-muscle isoform expressed more broadly at low levels and potentially compensatory.
    reference_section_type: RESULTS
  - statement: |
      No zebrafish-specific subcellular localization or purinosome incorporation was directly demonstrated; the cytoplasmic placement rests on conserved enzyme biology.
    supporting_text: |
      None of the retrieved full texts directly demonstrated that **zebrafish ADSS1 (Q6NSN5)** localizes to a specific compartment or is physically incorporated into purinosomes in zebrafish tissues/cells.
    reference_section_type: RESULTS
  - statement: |
      The most defensible annotation from the retrieved evidence is a conserved enzymatic role in IMP -> adenylosuccinate within purine metabolism, with cross-species evidence linking the muscle isoform to muscle energetics and disease.
    supporting_text: |
      The most defensible annotation from retrieved evidence is a **conserved enzymatic role in IMP→adenylosuccinate** within purine metabolism, with strong cross-species evidence linking the muscle isoform to muscle energetics and disease when disrupted.
    reference_section_type: CONCLUSIONS
