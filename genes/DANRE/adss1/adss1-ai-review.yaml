description: adss1 encodes the muscle adenylosuccinate synthase isozyme, a cytoplasmic enzyme of the purine nucleotide cycle
  that catalyzes the first committed step in de novo AMP biosynthesis from IMP. Muscle-fiber and myopathy annotations are
  supported phenotypes of impaired ADSS1 activity, but the core function is adenylosuccinate synthase activity in AMP biosynthesis/IMP
  metabolism.
