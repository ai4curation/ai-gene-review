- id: PMID:23768512
  title: Mutations in GDP-mannose pyrophosphorylase B cause congenital and limb-girdle muscular dystrophies associated with
    hypoglycosylation of α-dystroglycan.
  findings:
  - statement: GMPPB catalyzes GDP-mannose formation and zebrafish knockdown causes muscle/glycosylation defects.
    supporting_text: GMPPB catalyzes the formation of GDP-mannose from GTP and mannose-1-phosphate
  - statement: Zebrafish gmppb knockdown caused structural muscle defects and reduced alpha-dystroglycan glycosylation.
    supporting_text: knockdown of the GMPPB ortholog in zebrafish caused structural muscle defects
- id: PMID:33986552
  title: Cryo-EM structures of human GMPPA-GMPPB complex reveal how cells maintain GDP-mannose homeostasis.
  findings:
  - statement: GDP-mannose is essential for protein glycosylation and GMPPA-GMPPB homeostasis affects zebrafish brain and
      muscle development.
    supporting_text: GDP-mannose (GDP-Man) is a key metabolite essential for protein glycosylation
- id: PMID:35006422
  title: GMPPB-congenital disorders of glycosylation associate with decreased enzymatic activity of GMPPB.
  findings:
  - statement: GMPPB enzymatic activity correlates with muscular and neuronal phenotypes in zebrafish disease modeling.
    supporting_text: enzymatic activity of GMPPB mutants correlates with muscular and neuronal phenotypes in zebrafish
