    supporting_text: enzymatic activity of GMPPB mutants correlates with muscular and neuronal phenotypes in zebrafish
- id: file:DANRE/gmppb/gmppb-uniprot.txt
  title: UniProtKB entry Q6DBU5 for Danio rerio gmppb
  findings:
  - statement: UniProt describes Gmppb as the catalytic subunit producing GDP-mannose for glycoprotein glycans.
    supporting_text: Catalytic subunit of the GMPPA-GMPPB mannose-1-phosphate
- id: file:DANRE/gmppb/gmppb-deep-research-falcon.md
  title: Falcon deep research report on zebrafish gmppb (GDP-mannose pyrophosphorylase B)
  findings:
  - statement: >-
      gmppb encodes a cytosolic nucleotidyltransferase that produces GDP-mannose from
      mannose-1-phosphate and GTP (the canonical mannose-1-phosphate guanylyltransferase
      reaction, EC 2.7.7.13), releasing pyrophosphate.
    reference_section_type: RESULTS
    supporting_text: |-
      Gmppb encodes a cytosolic nucleotidyltransferase that catalyzes formation of **GDP-mannose** from **mannose-1-phosphate** and **GTP** (mannose-1-P + GTP → GDP-mannose + PPi), i.e., the canonical activity of GDP-mannose pyrophosphorylase / mannose-1-phosphate guanylyltransferase (EC 2.7.7.13 as per UniProt context).
  - statement: >-
      Biochemical assays show the catalytic activity requires Mg2+ and mannose-1-phosphate;
      omitting either abolishes detectable GDP-mannose formation, establishing substrate
      and cofactor requirements.
    reference_section_type: RESULTS
    supporting_text: |-
      activity requires **Mg²⁺** and the sugar-phosphate substrate **mannose-1-phosphate**; omitting Mg²⁺ or mannose-1-P yields **no detectable GDP-mannose formation** under the assay conditions.
  - statement: >-
      GMPPB has an N-terminal nucleotidyltransferase/catalytic domain and a C-terminal
      bacterial transferase hexapeptide-repeat domain forming a left-handed beta-helix,
      an architecture consistent with its nucleotidyltransferase chemistry.
    reference_section_type: RESULTS
    supporting_text: |-
      GMPPB is described as comprising an **N-terminal nucleotidyltransferase/catalytic domain** and a **C-terminal bacterial transferase hexapeptide-repeat domain** that forms a **left-handed β-helix**; this architecture is reiterated in a 2023 review and aligns with the enzyme’s nucleotidyltransferase chemistry.
  - statement: >-
      GDP-mannose produced by GMPPB is the activated mannose donor used by cytosolic
      mannosyltransferases and required for dolichol-phosphate-mannose (Dol-P-Man)
      synthesis, feeding O-mannosylation, N-glycosylation, C-mannosylation, and
      GPI-anchor formation.
    reference_section_type: RESULTS
    supporting_text: |-
      GDP-mannose is used by cytosolic mannosyltransferases and supports synthesis of **dolichol-phosphate-mannose (Dol-P-Man)**, a required mannose donor for ER mannosylation reactions including **O-mannosylation**, **N-glycosylation**, **C-mannosylation**, and **GPI-anchor formation**.
  - statement: >-
      Impaired GDP-mannose supply reduces O-mannosylation of alpha-dystroglycan,
      weakening alpha-DG-mediated extracellular matrix interactions and linking GMPPB to
      dystroglycanopathy.
    reference_section_type: RESULTS
    supporting_text: |-
      impaired GDP-mannose supply reduces α-DG O-mannosylation and thereby weakens α-DG-mediated extracellular matrix interactions.
  - statement: >-
      Wild-type GMPPB is a soluble cytosolic/cytoplasmic enzyme consistent with cytosolic
      nucleotide-sugar synthesis; several disease-associated missense variants form
      cytoplasmic aggregates or show altered intracellular distribution.
    reference_section_type: RESULTS
    supporting_text: |-
      Wild-type GMPPB is described as a **soluble cytosolic/cytoplasmic enzyme**, consistent with cytosolic nucleotide-sugar synthesis.
  - statement: >-
      Zebrafish gmppb is broadly/ubiquitously expressed during early embryogenesis
      (throughout early development by RT-PCR; ubiquitous from 50%-epiboly to 24 hpf),
      consistent with a housekeeping metabolic role in glycan-precursor supply.
    reference_section_type: RESULTS
    supporting_text: |-
      Whole-mount in situ hybridization indicates **ubiquitous expression** from **50%-epiboly to 24 hpf**, consistent with a housekeeping-like metabolic role in glycan precursor supply during early development.
  - statement: >-
      Zebrafish gmppb morpholino knockdown causes shortened/abnormal CaP motor neuron
      axons at 24 and 48 hpf, decreased HuC neuronal-marker signal, and reduced larval
      motor behavior at 2 dpf, supporting a requirement for neuronal differentiation and
      motor circuit output.
    reference_section_type: RESULTS
    supporting_text: |-
      gmppb knockdown produces abnormal morphology/shortening of motor neuron (CaP) axons observed at **24 and 48 hpf**, decreased neuronal marker signals (e.g., HuC reporter signal), and reduced larval motor behavior measured at **2 dpf**, supporting a requirement for normal neuronal differentiation and motor circuit output.
  - statement: >-
      gmppb morphants show sparse/disordered muscle fibers, increased Evans Blue Dye
      infiltration (p < 0.001) indicating compromised sarcolemmal integrity, and reduced
      glycosylated alpha-DG (IIH6 ~71% of wild-type at 48 hpf), placing gmppb upstream of
      alpha-DG glycosylation rather than as dystroglycan itself.
    reference_section_type: RESULTS
    supporting_text: |-
      an immunoblot readout for the glycosylated α-DG epitope (IIH6 reactivity) in zebrafish shows a reduction to **~71% of wild-type** in gmppb morphants at **48 hpf**, whereas a dystroglycan (dag1) knockdown control shows a stronger reduction (**~15% of wild-type**), supporting a role of gmppb upstream of α-DG glycosylation rather than encoding dystroglycan itself.
  - statement: >-
      In zebrafish knockdown/rescue assays, developmental rescue tracks with catalytic
      competence: higher-activity human GMPPB variants (e.g., R261C ~50% WT) partially
      rescue while low-activity variants (e.g., P32L ~10% WT) fail to rescue axon-length
      phenotypes, supporting an enzyme-activity-driven mechanism.
    reference_section_type: RESULTS
    supporting_text: |-
      variants with higher enzymatic activity rescue neuronal and muscle phenotypes better than low-activity variants: for example, **R261C (~50% of WT activity) partially rescues**, whereas **P32L (~10% of WT activity) fails to rescue** axon-length phenotypes.
  - statement: >-
      A 2024 study reports that ubiquitination regulates GMPPB enzymatic activity: GMPPB
      interacts with the E3 ligase TRIM67, and reduced GMPPB ubiquitination lowers
      enzymatic activity without changing GMPPB turnover or its interaction with GMPPA,
      implying activity (not abundance) is modulated.
    reference_section_type: RESULTS
    supporting_text: |-
      The authors report interaction between GMPPB and the E3 ligase **TRIM67**, and show that reducing GMPPB ubiquitination decreases enzymatic activity without changing GMPPB turnover or its interaction with GMPPA, implying ubiquitination modulates activity rather than abundance.
