id: F1QXM5
gene_symbol: ldhd
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:7955
  label: Danio rerio
description: ldhd encodes mitochondrial D-lactate dehydrogenase, an FAD-dependent oxidoreductase that acts on D-lactate and
  related (2R)-2-hydroxycarboxylates to prevent toxic D-lactate accumulation. The core function is mitochondrial D-lactate
  dehydrogenase/(2R)-2-hydroxycarboxylate dehydrogenase activity in lactate catabolism; generic catalytic activity and cofactor-binding
  terms are treated as less informative.
existing_annotations:
- term:
    id: GO:1903457
    label: lactate catabolic process
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: |-
      lactate catabolic process (GO:1903457) is supported for Ldhd. Falcon deep
      research confirms that in zebrafish, ldhd loss-of-function selectively elevates
      D-lactate while L-lactate is unchanged, and that LDHD clears D-lactate (and
      potentially other D-2-hydroxyacids) as part of metabolite repair downstream of
      the methylglyoxal/glyoxalase pathway.
    action: ACCEPT
    reason: Zebrafish ldhd loss increases D-lactate, supporting the lactate catabolic role.
    supported_by:
    - reference_id: file:DANRE/ldhd/ldhd-uniprot.txt
      supporting_text: prevents the toxic accumulation of D-lactate in the organism
    - reference_id: PMID:30931947
      supporting_text: establish the role of LDHD in D-lactate metabolism
    - reference_id: file:DANRE/ldhd/ldhd-deep-research-falcon.md
      supporting_text: |-
        mitochondrial LDHD clears D-lactate and potentially other D-2-hydroxyacids
