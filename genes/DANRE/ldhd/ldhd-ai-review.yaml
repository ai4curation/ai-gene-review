- id: file:DANRE/ldhd/ldhd-deep-research-falcon.md
  title: Falcon deep research report on Danio rerio ldhd (F1QXM5)
  findings:
  - statement: |
      The conserved vertebrate function of LDHD is oxidation of D-lactate to pyruvate,
      with high stereoselectivity for D- over L-lactate; in zebrafish, ldhd
      loss-of-function selectively elevates D-lactate while L-lactate is unchanged.
    reference_section_type: OTHER
    supporting_text: |-
      The conserved vertebrate function of LDHD is **oxidation of D-lactate to pyruvate**. In zebrafish, the essential in vivo readout is that **ldhd loss-of-function increases D-lactate levels while L-lactate remains unchanged**, demonstrating stereospecificity for D-lactate metabolism.
  - statement: |
      Beyond D-lactate, vertebrate LDHD acts more broadly as a general FAD-dependent
      dehydrogenase for hydrophobic D-2-hydroxyacids, with no activity on the
      corresponding L-isomers.
    reference_section_type: OTHER
    supporting_text: |-
      Beyond D-lactate, vertebrate LDHD acts more broadly on **D-2-hydroxyacids**.
  - statement: |
      Mammalian LDHD is an FAD-containing flavoprotein and is Mn2+-dependent, with
      activity highest in the presence of Mn2+ divalent metal ions.
    reference_section_type: OTHER
    supporting_text: |-
      * **FAD-containing (flavoprotein):** purified enzyme has the yellow color and absorbance features expected for FAD; a reported FAD:protein molar ratio is **0.73 ± 0.04**. (jin2023lactatedehydrogenased pages 1-2)
  - statement: |
      Vertebrate LDHD is consistently described as mitochondrial and associated with
      the mitochondrial inner membrane.
    reference_section_type: OTHER
    supporting_text: |-
      Vertebrate LDHD is consistently described as **mitochondrial** and associated with the **mitochondrial inner membrane**.
  - statement: |
      The zebrafish ldhd knockout allele sa15623 yields an adult-viable, fertile line
      whose embryos accumulate D-lactate; the phenotype is rescued by wild-type human
      LDHD mRNA but not patient-variant mRNAs, establishing LDHD enzymatic loss of
      function as causal.
    reference_section_type: OTHER
    supporting_text: |-
      The central zebrafish functional evidence comes from a zebrafish **ldhd** knockout allele (**sa15623**) that disrupts an essential splice site and yields an **ldhd−/− line that is adult viable and fertile**.
  - statement: |
      A 2024 study provided direct evidence that human LDHD transfers electrons from
      D-lactate to cytochrome c, supporting mitochondrial membrane polarization and
      linking LDHD to mitochondrial redox physiology.
    reference_section_type: OTHER
    supporting_text: |-
      A 2024 study provided direct evidence that **human LDHD transfers electrons from D-lactate to cytochrome c**, thereby supporting mitochondrial membrane polarization.
  - statement: |
      LDHD functions as part of metabolite repair, clearing D-lactate generated
      endogenously downstream of the methylglyoxal/glyoxalase pathway and potentially
      other D-2-hydroxyacids.
    reference_section_type: OTHER
    supporting_text: |-
      LDHD is discussed as part of the broader concept of **metabolite repair**, in which enzymes prevent accumulation of side-products and damaged metabolites; in this view, mitochondrial LDHD clears D-lactate and potentially other D-2-hydroxyacids.
