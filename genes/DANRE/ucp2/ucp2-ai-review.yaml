- id: file:DANRE/ucp2/ucp2-deep-research-falcon.md
  title: Falcon deep research report on zebrafish ucp2 (Q9W720 / slc25a8)
  findings:
  - statement: |-
      Zebrafish ucp2 (Q9W720 / slc25a8) belongs to the mitochondrial carrier (SLC25) family, which adopts a pseudo-threefold symmetric six-transmembrane fold with a central substrate-binding site, consistent with its MCP/Pfam PF00153 domain assignment.
    supporting_text: |-
      UCP2 is part of the broader **mitochondrial carrier family (MC/SLC25)** ... Mitochondrial carriers have triplicated sequence repeats and a six-transmembrane α-helix bundle with a central substrate-binding site
    reference_section_type: OTHER
  - statement: |-
      UCP2 is consistently described as an inner mitochondrial membrane protein of the SLC25 carrier family; zebrafish localization is inferred by strong family-level conservation rather than a direct zebrafish experiment.
    supporting_text: |-
      UCP2 is consistently described in authoritative reviews as a **mitochondrial inner membrane protein** of the SLC25 carrier family
    reference_section_type: OTHER
  - statement: |-
      Contemporary reviews favour a model in which UCP2 acts as a metabolite carrier that exports four-carbon (C4) dicarboxylates from the matrix, rewiring cellular fuel selection, alongside (or instead of) classical mild proton-leak uncoupling.
    supporting_text: |-
      UCP2 can function as a **metabolite carrier**, with a proposed role in transport of **four‑carbon (C4) metabolites** out of mitochondria, thereby rewiring cellular fuel selection
    reference_section_type: OTHER
  - statement: |-
      The proton-leak ('mild uncoupling') model describes a modest proton conductance that lowers membrane potential and can limit ROS, regulated by activation by fatty acids and inhibition by purine nucleotides.
    supporting_text: |-
      UCP2 is discussed as mediating a modest proton leak ... regulatory concepts include activation by fatty acids and inhibition by purine nucleotides
    reference_section_type: OTHER
  - statement: |-
      UCP2 is functionally distinct from the thermogenic uncoupler UCP1 and is non-thermogenic; this argues against a UCP1-like adaptive-thermogenesis role for zebrafish ucp2.
    supporting_text: |-
      UCP2 differs from UCP1 (non-thermogenic role)
    reference_section_type: OTHER
  - statement: |-
      In zebrafish, UCP2-5 (but not UCP1) transcript levels increase during cold acclimatization, supporting a context-dependent cold-response expression role for ucp2.
    supporting_text: |-
      UCP 2–5 levels in zebrafish significantly increase during cold acclimatization; while zebrafish UCP1 is not involved in cold acclimatization
    reference_section_type: OTHER
  - statement: |-
      Zebrafish ucp2 is best annotated as a conserved mitochondrial carrier acting in IMM bioenergetic and redox regulation via membrane-potential modulation and/or metabolite exchange; the dominant biochemical mode (proton leak vs C4 export) remains unresolved.
    supporting_text: |-
      regulator of mitochondrial bioenergetics and redox state via ΔΨm modulation and/or metabolite exchange
    reference_section_type: OTHER
