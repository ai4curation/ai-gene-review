    label: proton transmembrane transporter activity
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: proton transmembrane transporter activity (GO:0015078) captures the right UCP2 proton-leak area, but oxidative phosphorylation uncoupler activity (GO:0017077) is the more specific molecular-function term for this mitochondrial carrier.
    action: MODIFY
    reason: The broad proton transporter term is true but under-informative. UCP2 proton leak uncouples oxidative phosphorylation from ATP synthesis, so oxidative phosphorylation uncoupler activity is the better core MF term.
