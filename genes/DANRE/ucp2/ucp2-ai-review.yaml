id: Q9W720
gene_symbol: ucp2
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:7955
  label: Danio rerio
description: ucp2 encodes a mitochondrial inner-membrane carrier related to uncoupling proteins. The zebrafish protein is
  best reviewed as a mitochondrial transmembrane transporter/proton leak protein, with cold response, thermogenesis, and fatty-acid
  transport annotations treated as supported but peripheral or overly broad relative to the core mitochondrial carrier role.
existing_annotations:
- term:
    id: GO:0015078
    label: proton transmembrane transporter activity
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: proton transmembrane transporter activity (GO:0015078) captures the right UCP2 proton-leak area, but oxidative
      phosphorylation uncoupler activity (GO:0017077) is the more specific molecular-function term for this mitochondrial
      carrier.
    action: MODIFY
    reason: The broad proton transporter term is true but under-informative. UCP2 proton leak uncouples oxidative phosphorylation
      from ATP synthesis, so oxidative phosphorylation uncoupler activity is the better core MF term.
    proposed_replacement_terms:
    - id: GO:0017077
      label: oxidative phosphorylation uncoupler activity
    supported_by:
    - reference_id: file:DANRE/ucp2/ucp2-uniprot.txt
      supporting_text: UCP are mitochondrial transporter proteins that create proton
    - reference_id: file:DANRE/ucp2/ucp2-uniprot.txt
      supporting_text: oxidative phosphorylation from ATP synthesis
