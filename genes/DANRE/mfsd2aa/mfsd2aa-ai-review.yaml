id: Q5U3U7
gene_symbol: mfsd2aa
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:7955
  label: Danio rerio
description: mfsd2aa encodes a sodium-dependent lysophospholipid/lysophosphatidylcholine symporter at endothelial plasma membrane
  and ER membrane, supporting lipid transport across the blood-brain barrier. Free fatty-acid and carbohydrate transport annotations
  are treated cautiously because the supported substrate is lysophospholipid/LPC, not free fatty acid or carbohydrate.
