- id: PMID:26005868
  title: Inactivating mutations in MFSD2A, required for omega-3 fatty acid transport in brain, cause a lethal microcephaly
    syndrome.
  findings:
  - statement: MFSD2A transports LPC-linked fatty acids and zebrafish mfsd2aa is required for BBB integrity and survival.
    supporting_text: MFSD2A transports DHA as well as other fatty acids in the form of lysophosphatidylcholine (LPC)
    reference_section_type: ABSTRACT
- id: PMID:31429822
  title: Suppression of transcytosis regulates zebrafish blood-brain barrier function.
  findings:
  - statement: Mfsd2aa suppresses transcytosis and is required for zebrafish BBB function.
    supporting_text: mfsd2aa mutants display increased BBB permeability due to increased transcytosis
    reference_section_type: ABSTRACT
  - statement: |-
      Mfsd2a, which inhibits transcytosis, plays a conserved role in establishing the zebrafish blood-brain
      barrier, paralleling its function in the mammalian BBB.
    supporting_text: a key mammalian BBB regulator Mfsd2a, which inhibits transcytosis, plays a conserved role
      in zebrafish
    reference_section_type: ABSTRACT
- id: file:DANRE/mfsd2aa/mfsd2aa-uniprot.txt
  title: UniProtKB entry Q5U3U7 for Danio rerio mfsd2aa
  findings:
  - statement: UniProt summarizes Mfsd2aa as a sodium-dependent lysophospholipid symporter.
    supporting_text: Sodium-dependent lysophospholipid symporter
- id: file:DANRE/mfsd2aa/mfsd2aa-deep-research-falcon.md
  title: Falcon deep research report for Danio rerio mfsd2aa (UniProt Q5U3U7)
  findings:
  - statement: |-
      Falcon synthesis: mfsd2aa is the zebrafish paralog (not mfsd2ab) required to suppress brain
      endothelial transcytosis and maintain a tight blood-brain barrier, with vascular upregulation
      coinciding with BBB maturation around 5 dpf.
    supporting_text: |-
      direct genetic evidence shows **mfsd2aa (not mfsd2ab)** is required to suppress brain endothelial transcytosis and maintain a tight BBB, with developmental upregulation in cerebral vessels coinciding with BBB maturation at ~5 days post fertilization (dpf)
    reference_section_type: OTHER
