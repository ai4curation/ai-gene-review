    - reference_id: file:DANRE/mfsd2aa/mfsd2aa-deep-research-falcon.md
      supporting_text: |-
        Vertebrate MFSD2A/Mfsd2a is a **Na+-coupled transporter/flippase for LPC-linked fatty acids** (including LPC-DHA and LPC-ALA), with a trap-and-flip/lateral entry mechanism supported by biochemical and structural work.
