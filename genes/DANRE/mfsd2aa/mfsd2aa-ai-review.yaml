  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: |-
      lysophospholipid:sodium symporter activity (GO:0051978) is supported for mfsd2aa and represents its core
      molecular function. Falcon deep research confirms vertebrate MFSD2A/Mfsd2a is a Na+-coupled
      transporter/flippase for LPC-linked fatty acids (including LPC-DHA and LPC-ALA), with reconstituted
      lysolipid flipping shown to be sodium-dependent.
