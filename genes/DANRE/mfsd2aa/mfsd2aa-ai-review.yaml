id: Q5U3U7
gene_symbol: mfsd2aa
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:7955
  label: Danio rerio
description: mfsd2aa encodes a sodium-dependent lysophospholipid/lysophosphatidylcholine symporter at endothelial plasma membrane
  and ER membrane, supporting lipid transport across the blood-brain barrier. Free fatty-acid and carbohydrate transport annotations
  are treated cautiously because the supported substrate is lysophospholipid/LPC, not free fatty acid or carbohydrate.
existing_annotations:
- term:
    id: GO:0015245
    label: fatty acid transmembrane transporter activity
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: |-
      fatty acid transmembrane transporter activity (GO:0015245) likely overstates or misdirects the direct
      function of mfsd2aa. Falcon deep research confirms the transported substrate is an LPC-linked fatty acid
      (lysophospholipid carrying a long-chain unsaturated fatty acid such as DHA), not a free fatty acid, so the
      lysophospholipid:sodium symporter terms better capture the molecular function.
    action: MARK_AS_OVER_ANNOTATED
    reason: The evidence is better explained by the gene core function or downstream phenotype; this term should not be treated
      as a direct/core annotation.
    supported_by:
    - reference_id: file:DANRE/mfsd2aa/mfsd2aa-uniprot.txt
      supporting_text: Sodium-dependent lysophospholipid symporter
    - reference_id: PMID:26005868
      supporting_text: MFSD2A transports DHA as well as other fatty acids in the form of lysophosphatidylcholine (LPC)
    - reference_id: file:DANRE/mfsd2aa/mfsd2aa-deep-research-falcon.md
      supporting_text: |-
        the physiologically central substrates are **LPC species carrying long-chain unsaturated fatty acids** such as **DHA (22:6)** and **α-linolenic acid (ALA, 18:3)** (and also oleate, 18:1) attached to the LPC headgroup
