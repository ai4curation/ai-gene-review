    muscle fiber disorganization, central nuclei, and motor deficits. This is
    consistent with human DNM2 mutations causing centronuclear myopathy. The
    dnm2a-v2 isoform, which includes the proline-rich domain, provides better rescue
    of muscle phenotypes than dnm2a-v1.
