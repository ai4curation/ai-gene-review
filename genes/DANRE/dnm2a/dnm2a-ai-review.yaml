id: A0A0R4IIR1
gene_symbol: dnm2a
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:7955
  label: Danio rerio
description: >-
  Zebrafish dynamin-2a (dnm2a) is a large GTPase orthologous to human DNM2, located on chromosome 3.
  It is a classical dynamin involved in membrane fission events including clathrin-mediated endocytosis.
  The protein contains all five canonical dynamin domains (GTPase, middle, PH, GED, and PRD). Two
  splice isoforms exist (dnm2a-v1 and dnm2a-v2), with dnm2a-v2 showing greater similarity to human
  DNM2. dnm2a is ubiquitously expressed in adult tissues and throughout early development, with
  enrichment in somitic mesoderm and adaxial cells during somitogenesis. Morpholino knockdown causes
  somite disruption, muscle fiber disorganization, central nuclei in muscle fibers, and impaired
  motor behavior, establishing it as a model for human DNM2-related diseases (centronuclear myopathy,
  Charcot-Marie-Tooth neuropathy). dnm2a also participates in dynamin-dependent endocytosis of EphB
  receptors during convergent extension of the notochord.

existing_annotations:
- term:
    id: GO:0003924
    label: GTPase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: >-
      dnm2a belongs to the classical dynamin family of large GTPases. The protein contains
      a well-characterized N-terminal GTPase domain (Dynamin-type G domain, aa 28-294) and
      has the EC assignment 3.6.5.5. GTPase activity is a core enzymatic function of all
      classical dynamins required for membrane fission.
    action: ACCEPT
    reason: >-
      GTPase activity is the core enzymatic function of dynamin proteins, required for
      membrane scission during endocytosis. The protein has clear domain architecture
      supporting this function (InterPro IPR001401, IPR003130).
    supported_by:
    - reference_id: PMID:23418470
      supporting_text: >-
        Dynamins are large GTPases involved in a wide range of cell and organelle fission events.
    - reference_id: PMID:26842864
      supporting_text: >-
        DNM2 belongs to a large family of cytosolic GTPases that act mechanically and enzymatically to mediate membrane fission.

- term:
    id: GO:0005525
    label: GTP binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: >-
      GTP binding is required for GTPase activity. dnm2a has a well-defined GTPase domain
      that binds GTP. This is redundant with the GTPase activity annotation but accurate.
    action: ACCEPT
    reason: >-
      GTP binding is inherent to the GTPase domain of dynamin proteins and is well
      supported by domain architecture (InterPro IPR001401, IPR003130, IPR030381).
    supported_by:
    - reference_id: PMID:26842864
      supporting_text: >-
        Dynamins 1, 2 and 3 have a 5-domain structure: an N-terminal GTPase domain, a middle domain (MD), a pleckstrin-homology (PH) domain that binds phosphoinositides, a GTPase effector domain (GED) that (together with the MD) is involved in oligomerization and regulation of GTPase activity, and a C-terminal proline-rich domain (PRD) that interacts with SH3 domains6.

- term:
    id: GO:0006897
    label: endocytosis
  evidence_type: IEA
  original_reference_id: GO_REF:0000117
  review:
    summary: >-
      Endocytosis is a well-established core function of classical dynamins. dnm2a participates
      in dynamin-dependent endocytosis of EphB receptors during convergent extension, and is
      orthologous to human DNM2 which is critical for clathrin-mediated endocytosis.
    action: ACCEPT
    reason: >-
      Classical dynamins are critical components of clathrin-mediated endocytosis. This is
      the best-characterized function of the dynamin family and is directly supported by
      experimental evidence in zebrafish showing dynamin-dependent endocytosis of EphB.
    supported_by:
    - reference_id: PMID:17412835
      supporting_text: >-
        This complex is incorporated into endocytic vesicles in a dynamin-dependent manner, thereby resulting in the removal of EphB from the cell surface with subsequent switching of cell adhesiveness.
    - reference_id: PMID:23418470
      supporting_text: >-
        Classical dynamins are critical components of clathrin-mediated endocytosis, where they contribute to the release of newly formed endosomes

- term:
    id: GO:0005905
    label: clathrin-coated pit
  evidence_type: IEA
  original_reference_id: GO_REF:0000044
  review:
    summary: >-
      Localization to clathrin-coated pits is consistent with the role of dynamins in
      clathrin-mediated endocytosis. This is transferred from mammalian dynamin-2 data
      and is reasonable given the high conservation of dnm2a.
    action: KEEP_AS_NON_CORE
    reason: >-
      While plausible based on orthology to mammalian DNM2, this subcellular localization
      has not been directly demonstrated for zebrafish dnm2a. It is a secondary annotation
      based on UniProt subcellular location mapping.
    supported_by:
    - reference_id: PMID:23418470
      supporting_text: >-
        Classical dynamins are critical components of clathrin-mediated endocytosis, where they contribute to the release of newly formed endosomes

