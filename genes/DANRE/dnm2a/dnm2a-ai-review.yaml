- id: PMID:17412835
  title: >-
    Daam1 regulates the endocytosis of EphB during the convergent extension of
    the zebrafish notochord.
  findings:
  - statement: >-
      Dynamin-dependent endocytosis of EphB receptors mediates convergent extension
      of the zebrafish notochord by switching cell adhesiveness.
    supporting_text: >-
      This complex is incorporated into endocytic vesicles in a dynamin-dependent manner, thereby resulting in the removal of EphB from the cell surface with subsequent switching of cell adhesiveness.
  - statement: >-
      Daam1 acts as a dynamic coordinator linking endocytosis and cytoskeletal remodeling
      during convergent extension movement of notochord cells.
    supporting_text: >-
      We elucidate the molecular mechanism underlying the CE movement of notochord cells with Daam1 as a dynamic coordinator of endocytosis and cytoskeletal remodeling.
- id: PMID:23418470
  title: Two dynamin-2 genes are required for normal zebrafish development.
  findings:
  - statement: >-
      Zebrafish has two DNM2 orthologs (dnm2 and dnm2-like, now called dnm2a and dnm2b)
      that are structurally similar to human DNM2 and ubiquitously expressed.
    supporting_text: >-
      both dnm2 and dnm2-like share highest sequence homology with human DNM2
  - statement: >-
      Morpholino knockdown of dnm2 causes extensive morphological abnormalities and motor
      deficits rescued by human DNM2 RNA.
    supporting_text: >-
      Knockdown of Dnm2 caused a shorted body axis, small eyes, yolk and cardiac edema, shortened somites, and an upward tail curvature.
  - statement: >-
      dnm2 morphants show severe muscle fiber disorganization with irregular membrane
      accumulations in muscle ultrastructure.
    supporting_text: >-
      sections from dnm2 morphant muscle revealed striking fiber disorganization, as well as small somites and indistinct striations as compared with control muscle
  - statement: >-
      dnm2 morphants have severe motor deficits including reduced spontaneous coiling and
      impaired touch-evoked escape response.
    supporting_text: >-
      87.2% of dnm2 morphants failed to respond to a tail tap stimulus
- id: PMID:26842864
  title: Zebrafish as a Model to Investigate Dynamin 2-Related Diseases.
  findings:
  - statement: >-
      A second dnm2a isoform (dnm2a-v2) was identified with greater similarity to human
      DNM2 than the originally deposited sequence.
    supporting_text: >-
      dnm2a-v1 (755 amino acids) was 88% identical, and dnm2a-v2 (856 amino acids) was 87% identical.
  - statement: >-
      dnm2a is expressed in somitic mesoderm and adaxial cells during somitogenesis.
    supporting_text: >-
      During somitogenesis dnm2a expression was observed in paraxial somitic mesoderm and in the adaxial cells, delineating comb-like structures
  - statement: >-
      Morpholino knockdown of dnm2a causes dose-dependent somite disruption, muscle fiber
      disorganization, central nuclei in muscle fibers, and impaired touch-evoked response.
    supporting_text: >-
      Toluidine blue-stained transverse and longitudinal sections showed evident muscle fibre disorganization in MOs-injected embryos compared to STD-MO controls
  - statement: >-
      Expression of human DNM2 with disease-causing mutations (R522H for CNM, G537C for CMT)
      causes motor neuron and muscle defects in zebrafish, modeling human DNM2-related diseases.
    supporting_text: >-
      Defects arose especially in secondary motor neuron formation, with incorrect branching in embryos injected with CNM-mutated mRNA, and total absence of branching in those injected with CMT-mutated mRNA.

core_functions:
- description: >-
    dnm2a is a classical dynamin GTPase whose primary molecular function is to hydrolyze
    GTP to drive membrane fission during clathrin-mediated endocytosis. This is the
    best-characterized function of the dynamin family, and is directly demonstrated
    in zebrafish by the dynamin-dependent endocytosis of EphB receptors during convergent
    extension (PMID:17412835).
