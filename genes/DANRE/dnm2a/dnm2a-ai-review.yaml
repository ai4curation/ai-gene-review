- term:
    id: GO:0012505
    label: endomembrane system
  evidence_type: IEA
  original_reference_id: GO_REF:0000117
  review:
    summary: >-
      This is a very broad cellular component term. Dynamins do associate with
      endomembranes during vesicle fission, but the annotation is too general
      to be informative.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      Endomembrane system is overly broad. More specific CC terms like clathrin-coated
      pit or clathrin-coated vesicle are already present and more informative.

