suggested_questions:
- question: >-
    What is the relative contribution of dnm2a versus dnm2b to endocytic trafficking
    in different zebrafish tissues?
- question: >-
    Does dnm2a have specific roles in motor neuron development or is the motor neuron
    phenotype secondary to muscle defects?
- question: >-
    What are the functional differences between the dnm2a-v1 and dnm2a-v2 splice
    isoforms beyond the better rescue seen with dnm2a-v2?

suggested_experiments:
- description: >-
    Generate dnm2a CRISPR knockout zebrafish to validate the morpholino phenotypes
    and study long-term consequences of dnm2a loss.
- description: >-
    Perform live imaging of fluorescently tagged dnm2a to determine subcellular
    localization during somitogenesis and muscle development.
- description: >-
    Conduct tissue-specific rescue experiments to determine whether the muscle and
    motor neuron phenotypes are cell-autonomous.
