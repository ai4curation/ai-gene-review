- term:
    id: GO:0061053
    label: somite development
  evidence_type: IMP
  original_reference_id: PMID:26842864
  review:
    summary: >-
      Morpholino knockdown of dnm2a causes dose-dependent somite disruption in zebrafish
      embryos, with classes ranging from normal somites to totally disrupted somites.
      dnm2a is expressed in paraxial somitic mesoderm and adaxial cells during somitogenesis.
    action: ACCEPT
    reason: >-
      Strong experimental evidence from morpholino knockdown showing dose-dependent somite
      disruption. Expression pattern in somitic mesoderm and adaxial cells supports a direct
      role in somite development.
    supported_by:
    - reference_id: PMID:26842864
      supporting_text: >-
        During somitogenesis dnm2a expression was observed in paraxial somitic mesoderm and in the adaxial cells, delineating comb-like structures
    - reference_id: PMID:26842864
      supporting_text: >-
        361 embryos injected with ATGdnm2a-MO (49% of total) had normal-appearing morphology with completely formed somites (pertaining therefore to the C1 class, Fig. 3A, particular), 243 (33% of total) had partially disrupted somites (C2 class, Fig. 3A, particular) and 132 (18%) had unformed or totally disrupted somites (C3 class, Fig. 3A, particular)

- term:
    id: GO:0043009
    label: chordate embryonic development
  evidence_type: IMP
  original_reference_id: PMID:23418470
  review:
    summary: >-
      Morpholino knockdown of dnm2 (dnm2a) causes extensive morphological abnormalities
      during zebrafish development including shortened body axis, small eyes, yolk and
      cardiac edema, and upward tail curvature. Human DNM2 RNA rescues the phenotype.
    action: ACCEPT
    reason: >-
      Strong evidence from morpholino knockdown showing requirement for normal embryonic
      development. The phenotype is specific (rescued by human DNM2) and both dnm2
      orthologs are required for normal development.
    supported_by:
    - reference_id: PMID:23418470
      supporting_text: >-
        Knockdown of Dnm2 caused a shorted body axis, small eyes, yolk and cardiac edema, shortened somites, and an upward tail curvature.
    - reference_id: PMID:23418470
      supporting_text: >-
        In dnm2 morphants, the percent of normal embryos increased from 8.2% to 67.1% (p<0.0001, Fisher's exact test).

- term:
    id: GO:0061061
    label: muscle structure development
  evidence_type: IMP
  original_reference_id: PMID:23418470
  review:
    summary: >-
      dnm2 morphants show striking muscle fiber disorganization, small somites,
      indistinct striations, reduced myofiber size, and motor deficits. Electron
      microscopy reveals irregular membrane accumulations in muscle. dnm2a is
      also enriched in developing somitic mesoderm.
    action: ACCEPT
    reason: >-
      Strong experimental evidence from multiple studies showing muscle defects upon
      dnm2a knockdown. Consistent with human DNM2 mutations causing centronuclear
      myopathy.
    supported_by:
    - reference_id: PMID:23418470
      supporting_text: >-
        sections from dnm2 morphant muscle revealed striking fiber disorganization, as well as small somites and indistinct striations as compared with control muscle
    - reference_id: PMID:26842864
      supporting_text: >-
        Toluidine blue-stained transverse and longitudinal sections showed evident muscle fibre disorganization in MOs-injected embryos compared to STD-MO controls

- term:
    id: GO:0060026
    label: convergent extension
  evidence_type: IDA
  original_reference_id: PMID:17412835
  review:
    summary: >-
      Daam1 complexes with EphB receptors and Dishevelled 2. This complex is incorporated
      into endocytic vesicles in a dynamin-dependent manner during convergent extension
      of the notochord, resulting in removal of EphB from the cell surface and switching
      of cell adhesiveness.
    action: ACCEPT
    reason: >-
      Direct experimental evidence that dynamin-dependent endocytosis of EphB receptors
      is required for convergent extension of the zebrafish notochord. This links the
      core endocytic function of dynamin to a specific developmental process.
    supported_by:
    - reference_id: PMID:17412835
      supporting_text: >-
        This complex is incorporated into endocytic vesicles in a dynamin-dependent manner, thereby resulting in the removal of EphB from the cell surface with subsequent switching of cell adhesiveness.

- term:
    id: GO:0060026
    label: convergent extension
  evidence_type: IMP
  original_reference_id: PMID:17412835
  review:
    summary: >-
      Morpholino knockdown evidence supporting the role of dynamin in convergent
      extension of the zebrafish notochord, complementing the direct IDA evidence.
    action: ACCEPT
    reason: >-
      IMP evidence consistent with the IDA annotation from the same publication.
      Dynamin-dependent endocytosis of EphB is required for CE movement.
    supported_by:
    - reference_id: PMID:17412835
      supporting_text: >-
        We elucidate the molecular mechanism underlying the CE movement of notochord cells with Daam1 as a dynamic coordinator of endocytosis and cytoskeletal remodeling.

