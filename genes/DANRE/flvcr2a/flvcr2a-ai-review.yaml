      supporting_text: |-
        Earlier literature proposed **heme import** by FLVCR2 based on hemin-binding and heme-analog uptake assays
    - reference_id: file:DANRE/flvcr2a/flvcr2a-deep-research-falcon.md
      supporting_text: |-
