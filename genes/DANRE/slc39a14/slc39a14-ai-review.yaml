id: A0A0G2KQY6
gene_symbol: slc39a14
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:7955
  label: Danio rerio
description: slc39a14 encodes ZIP14, a broad-scope divalent metal cation transporter that imports zinc, manganese, and non-transferrin-bound
  iron, likely as a metal:bicarbonate symporter, at plasma and endomembrane locations. Cadmium and signaling-response annotations
  are retained as non-core context relative to the core metal-cation uptake function.
