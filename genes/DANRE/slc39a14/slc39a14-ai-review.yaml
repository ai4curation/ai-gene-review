suggested_questions:
- question: Are hepatic and renal manganese clearance differentially affected in zebrafish slc39a14 mutants, given the pronephric duct expression observed at 4 dpf?
- question: Do zebrafish Slc39a14 isoforms 1 and 2 differ in manganese versus zinc transport kinetics, or in subcellular localization?
- question: Are the insulin, glucose, and GPCR signaling annotations transferred from the mammalian ortholog functionally conserved in zebrafish, or are they mammal-specific?
suggested_experiments:
- description: Tissue-specific (hepatic vs. renal) conditional knockdown or rescue of slc39a14 in zebrafish, with ICP-MS quantification of Mn in each tissue, to dissect the relative contributions of liver and pronephros to systemic Mn clearance.
- description: Heterologous expression of each zebrafish Slc39a14 isoform followed by radiotracer uptake assays for Mn, Zn, Fe, and Cd to compare substrate selectivity and kinetics between isoforms.
- description: Transcriptomic and metabolic profiling of slc39a14 mutant zebrafish under insulin/glucose challenge to test whether the mammalian signaling-response annotations are conserved.
