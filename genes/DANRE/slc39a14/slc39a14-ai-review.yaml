    supporting_text: tissue-distribution and mRNA expression response to zinc for most zinc transporter genes was tested in zebrafish
- id: PMID:27231142
  title: Mutations in SLC39A14 disrupt manganese homeostasis and cause childhood-onset parkinsonism-dystonia.
  findings:
  - statement: SLC39A14/slc39a14 is required for manganese transport and manganese homeostasis in vertebrates.
    supporting_text: mutations in SLC39A14 impair manganese transport in vitro and lead to manganese dyshomeostasis
  - statement: |-
      Zebrafish slc39a14U801 null mutants accumulate manganese (~35% higher at 5 dpf, ~72% at 14 dpf) and show ~8-fold higher brain Mn in adults, while Fe, Zn and Cd are unaffected, establishing Mn as the physiologically relevant substrate.
    supporting_text: |-
      Homozygous slc39a14U801 mutants showed a 35% increase in Mn levels at 5 dpf and 72% increase at 14 dpf, confirming a crucial role for Slc39a14 in Mn clearance
    reference_section_type: RESULTS
  - statement: |-
      Adult slc39a14U801 zebrafish brains accumulate ~8-fold more manganese than wild-type, identifying the brain as the principal site of Mn deposition.
    supporting_text: |-
      Mn levels were eight times higher in brains from homozygous slc39a14U801 fish compared with wild-type
    reference_section_type: RESULTS
  - statement: |-
      Zebrafish slc39a14 is expressed in the proximal pronephric ducts at 4 dpf, consistent with a renal/epithelial contribution to manganese handling.
    supporting_text: |-
      Whole-mount in situ hybridization demonstrated slc39a14 expression in the proximal pronephric ducts at 4 dpf
    reference_section_type: RESULTS
  - statement: |-
      SLC39A14 localizes to the cell membrane and cytoplasm; both human isoforms localize to the cell membrane where they facilitate Mn uptake.
    supporting_text: Both isoforms 1 and 2 localize to the cell membrane and the cytoplasm
    reference_section_type: RESULTS
  - statement: |-
      Na2CaEDTA chelation lowers Mn to wild-type levels in mutant larvae, supporting Mn as the relevant toxic species and providing a chelator efficacy assay.
    supporting_text: |-
      Na2CaEDTA lowered Mn levels similar to those of wild-type fish, confirming the Mn chelating property of Na2CaEDTA
    reference_section_type: RESULTS
  - statement: |-
      SLC39A14 functions as a pivotal manganese transporter in vertebrates; other reported substrates (Fe, Zn, Cd) were unaffected in zebrafish mutants.
    supporting_text: |-
      Other previously reported substrates of the transporter, including Fe, Zn and Cd37, were unaffected
    reference_section_type: RESULTS
