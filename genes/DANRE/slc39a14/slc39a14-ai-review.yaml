    supported_by:
    - reference_id: file:DANRE/slc39a14/slc39a14-uniprot.txt
      supporting_text: mediating the cellular uptake of the divalent metal cations zinc, manganese and iron
    - reference_id: PMID:27231142
      supporting_text: mutations in SLC39A14 impair manganese transport in vitro and lead to manganese dyshomeostasis
