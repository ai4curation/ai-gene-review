    supporting_text: mediating the cellular uptake of the divalent metal cations zinc, manganese and iron
- id: file:DANRE/slc39a14/slc39a14-deep-research-falcon.md
  title: Deep research report on slc39a14 from Falcon (Edison Scientific Literature)
  findings:
  - statement: |-
      Zebrafish slc39a14 encodes ZIP14, a multi-pass ZIP-family divalent metal transporter whose strongest in vivo role across vertebrates is manganese transport supporting systemic Mn homeostasis and preventing neurotoxic accumulation.
    supporting_text: |-
      The most strongly supported primary function of ZIP14 in vertebrates is **manganese transport** that is required for maintaining appropriate systemic Mn distribution and preventing neurotoxic accumulation.
    reference_section_type: OTHER
  - statement: |-
      ZIP14/SLC39A14 is repeatedly implicated as a key manganese homeostasis factor in vertebrates.
    supporting_text: |-
      ZIP14/SLC39A14** is repeatedly implicated as a **key Mn homeostasis factor** in vertebrates
    reference_section_type: OTHER
  - statement: |-
      ZIP14 is also discussed as a broader divalent metal transporter capable of handling zinc and non-transferrin-bound iron, although zebrafish mutant studies found Mn changes most prominently while Fe/Zn/Cd were not significantly altered.
    supporting_text: |-
      ZIP14 is also discussed as a broader divalent metal transporter capable of handling **Zn** and **non-transferrin-bound Fe**
    reference_section_type: OTHER
  - statement: |-
      ZIP14 (and the related ZIP8) is consistent with a metal/bicarbonate symport paradigm, mediating cellular import into the cytosol from extracellular space and/or organellar lumens.
    supporting_text: |-
      Recent expert synthesis describes ZIP14 (and the closely related ZIP8) as consistent with a **metal/bicarbonate symport** paradigm, implying that transport may depend on bicarbonate and related electrochemical conditions rather than being simple diffusion.
    reference_section_type: OTHER
  - statement: |-
      ZIP14 localizes to the plasma membrane and intracellular compartments (including endosome-like pools); at the blood-brain barrier it is reported on apical and basolateral endothelial membranes.
    supporting_text: |-
      ZIP14 is described as localized to the **plasma membrane** and also **intracellular compartments** (including endosome-like pools), supporting a role in metal influx into the cytosol from multiple sources.
    reference_section_type: OTHER
  - statement: |-
      Zebrafish slc39a14 is expressed during embryonic/early larval stages and localizes to the proximal pronephric ducts at 4 dpf, implicating renal/epithelial contributions to manganese handling.
    supporting_text: |-
      localizes by in situ hybridization to the **proximal pronephric ducts at 4 dpf**, implicating epithelial/renal contributions to manganese handling
    reference_section_type: OTHER
