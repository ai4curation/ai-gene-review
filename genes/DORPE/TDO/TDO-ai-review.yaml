gene_symbol: TDO
product_type: PROTEIN
status: IN_PROGRESS
taxon:
  id: NCBITaxon:1051067
  label: Doryteuthis pealeii
description: >-
  Tryptophan 2,3-dioxygenase (TDO) is a heme-dependent oxidoreductase that catalyzes
  the first committed step in ommochrome pigment biosynthesis in D. pealeii, converting
  L-tryptophan to N-formylkynurenine via oxidative cleavage of the indole ring. TDO
  is expressed in the retina and chromatophore layer of the skin, the two principal
  ommochrome-pigmented tissues. Crawford et al. (2020) demonstrated that CRISPR-Cas9
  knockout of TDO in D. pealeii embryos efficiently eliminated pigmentation in both
  eyes and chromatophores with >90% disruption efficiency, while ink sac melanin
  pigmentation was unaffected. This was the first gene knockout achieved in any
  cephalopod. TDO inhibition with 680C91 also completely blocked pigmentation,
  confirming the enzyme is required for ommochrome synthesis. Notably, D. pealeii
  lacks an IDO (indoleamine 2,3-dioxygenase) ortholog, unlike Euprymna berryi where
  IDO can compensate for TDO loss. TDO belongs to the PANTHER family PTHR10138
  (Tryptophan 2,3-dioxygenase), is predicted to function as a homotetramer (dimer
  of dimers), and contains a single heme cofactor per subunit. The gene spans 13
  exons over 120 kb of genomic DNA.
existing_annotations:
- term:
    id: GO:0004833
    label: L-tryptophan 2,3-dioxygenase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  review:
    summary: >-
      L-tryptophan 2,3-dioxygenase activity (EC 1.13.11.11) is the defining enzymatic
      function of TDO. This IEA annotation is based on combined automated methods
      (InterPro, ARBA, PANTHER, UniRule). In D. pealeii, Crawford et al. (2020)
      demonstrated that CRISPR-Cas9 knockout of TDO eliminated ommochrome pigmentation,
      and pharmacological inhibition with 680C91 (a TDO-selective inhibitor) blocked
      pigmentation in both eyes and chromatophores [PMID:32735817]. The UniProt entry
      confirms TDO catalyzes L-tryptophan + O2 = N-formylkynurenine (Rhea:RHEA:24536).
      Phylogenetic analysis confirmed this gene as a bona fide TDO (distinct from IDO)
      [PMID:32735817].
    action: ACCEPT
    reason: >-
      This is the core enzymatic function of TDO, supported by sequence homology,
      PANTHER family assignment (PTHR10138), HAMAP rule MF_03020, and functional
      knockout data in this species showing loss of ommochrome pigmentation.
    supported_by:
      - reference_id: PMID:32735817
        supporting_text: >-
          In invertebrates, Tryptophan, 2,3 Dioxygenase (TDO) catalyzes the first
          committed step in ommochrome biosynthesis, converting Tryptophan to
          N-Formylkyneurenine.
      - reference_id: PMID:32735817
        supporting_text: >-
          A phylogenetic comparison of this sequence with diverse TDOs, and
          indolamine-2,3-dioxygenases (a different enzyme that catalyzes the same
          reaction), supported its identity as TDO.
- term:
    id: GO:0006569
    label: L-tryptophan catabolic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000117
  review:
    summary: >-
      L-tryptophan catabolic process is annotated via ARBA machine learning. TDO
      catalyzes the oxidative cleavage of L-tryptophan as the first step in the
      kynurenine pathway. Crawford et al. (2020) showed that TDO knockout eliminates
      ommochrome biosynthesis from tryptophan in D. pealeii [PMID:32735817]. This
      term is correct but could be more specific. The UniProt record lists both
      GO:0019441 (L-tryptophan catabolic process to kynurenine) and GO:0019442
      (L-tryptophan catabolic process to acetyl-CoA), and GO:0019441 more precisely
      captures TDO function as it catalyzes the first step to kynurenine specifically.
    action: ACCEPT
    reason: >-
      L-tryptophan catabolic process correctly describes the biological process TDO
      participates in. While a more specific term like L-tryptophan catabolic process
      to kynurenine (GO:0019441) would be ideal, that term is now obsolete in GO.
      GO:0006569 is the most appropriate active term for this function. Crawford et al.
      (2020) showed TDO knockout eliminates the tryptophan-to-ommochrome pathway in
      D. pealeii [PMID:32735817].
    supported_by:
      - reference_id: PMID:32735817
        supporting_text: >-
          TDO catalyzes the first committed step in ommochrome biosynthesis, converting
          Tryptophan to N-Formylkyneurenine.
- term:
    id: GO:0020037
    label: heme binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  review:
    summary: >-
      Heme binding is annotated by combined IEA methods (InterPro, ARBA, PANTHER,
      UniRule). The UniProt record explicitly states: "Binds 1 heme group per subunit"
      (HAMAP-Rule:MF_03020), and lists heme as a cofactor (ChEBI:30413). TDO is a
      heme-dependent dioxygenase, and heme is essential for its catalytic mechanism.
      This is well-established for TDO family members across all species.
    action: ACCEPT
    reason: >-
      Heme binding is integral to TDO catalytic function. The enzyme requires bound
      heme to catalyze oxidative cleavage of the tryptophan indole ring. This is
      confirmed by UniProt cofactor annotation and is a defining feature of the
      TDO family (HAMAP MF_03020, Pfam PF03301 Trp_dioxygenase).
    supported_by:
      - reference_id: PMID:32735817
        supporting_text: >-
          we determined whether a TDO-selective inhibitor
          (680C91) impeded pigmentation in developing embryos.
- term:
    id: GO:0046872
    label: metal ion binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: >-
      Metal ion binding is annotated via InterPro2GO mapping (IPR037217). This is
      correct as TDO binds iron through its heme prosthetic group. However, this
      term is very generic and redundant with the more informative heme binding
      (GO:0020037) annotation already present, which more precisely captures the
      nature of the metal cofactor interaction.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      While technically correct (TDO binds iron via heme), GO:0046872 (metal ion
      binding) is too generic to be informative. The heme binding annotation
      (GO:0020037) already captures this function at a more appropriate level of
      specificity. The metal ion binding term does not add useful functional
      information beyond what heme binding conveys.
