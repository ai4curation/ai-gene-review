- id: PMID:32735817
  title: Highly Efficient Knockout of a Squid Pigmentation Gene
  findings:
    - statement: >-
        TDO was selected as a knockout target because ommochromes pigment cephalopod
        eyes and chromatophores, and TDO catalyzes the first committed step in their
        biosynthesis.
    - statement: >-
        A single TDO gene was identified in the D. pealeii genome, spanning 13 exons
        over 120 kb. Phylogenetic analysis confirmed the gene as a bona fide TDO
        distinct from IDO.
    - statement: >-
        In situ hybridization showed TDO expression in chromatophore precursors on
        arms and mantle, and in eyes; RNAseq confirmed highest expression in retina
        and chromatophore layer of skin.
    - statement: >-
        TDO-selective inhibitor 680C91 completely blocked pigmentation in both eyes
        and chromatophores, with animals developing normally otherwise.
    - statement: >-
        CRISPR-Cas9 knockout with two sgRNAs targeting exons 1 and 2 eliminated
        pigmentation with >90% disruption efficiency. Ink sac melanin was unaffected,
        confirming specificity for the ommochrome pathway.
    - statement: >-
        This was the first gene knockout achieved in any cephalopod.
- id: PMID:29989284
  title: "Ommochromes in invertebrates: biochemistry and cell biology"
  findings:
    - statement: >-
        Ommochromes are widely occurring coloured molecules of invertebrates, arising
        from tryptophan catabolism through the Tryptophan → Ommochrome pathway. They
        are mainly known to mediate compound eye vision, as well as reversible and
        irreversible colour patterning.
      supporting_text: >-
        Ommochromes are widely occurring coloured molecules of invertebrates, arising
        from tryptophan catabolism through the so-called Tryptophan to Ommochrome
        pathway.
    - statement: >-
        Ommochromasomes are the organelles where ommochromes are synthesised and stored,
        playing an important role in mediating ommochrome functions. They are part of
        the lysosome-related organelles (LROs) family, which includes vertebrate
        melanosomes.
      supporting_text: >-
        Ommochromasomes are the organelles where ommochromes are synthesised and stored.
        Hence, they play an important role in mediating ommochrome functions.
    - statement: >-
        Ommochromes may also be involved in cell homeostasis by detoxifying free
        tryptophan and buffering oxidative stress, in addition to their roles in
        pigmentation and vision.
      supporting_text: >-
        Ommochromes might also be involved in cell homeostasis by detoxifying free
        tryptophan and buffering oxidative stress.
- id: PMID:37343558
  title: Creation of an albino squid line by CRISPR-Cas9 and its application for
    in vivo functional imaging of neural activity
  findings:
    - statement: >-
        In E. berryi, TDO knockout alone did not eliminate pigmentation despite >90%
        disruption efficiency, due to compensation by IDO. D. pealeii genome lacks
        IDO orthologs, explaining why TDO knockout alone is sufficient in that species.
    - statement: >-
        E. berryi homozygous TDO knockout showed slightly delayed pigmentation during
        development. TDO+IDO double knockout produced complete albinism.
    - statement: >-
        TDO expression in E. berryi is approximately 20-fold higher than IDO in
        stage 24 embryos. TDO is expressed in eyes and chromatophores, similar to
        D. pealeii.
    - statement: >-
        Albino E. berryi enabled the first in vivo calcium imaging of neural activity
        in a cephalopod using two-photon microscopy.
suggested_questions:
  - question: >-
      Does D. pealeii TDO have any role in tryptophan catabolism beyond ommochrome
      biosynthesis (e.g. kynurenine pathway metabolites for immune or neural signaling)?
    experts:
      - Rosenthal JJC
      - Albertin CB
  - question: >-
      What are the consequences of partial TDO loss on chromatophore function and
      dynamic color change in adult squid?
    experts:
      - Crawford K
  - question: >-
      Is there any post-translational regulation of TDO activity in cephalopods, as
      seen with substrate activation in mammalian TDO?
    experts: []
suggested_experiments:
  - description: >-
      Characterize the enzymatic kinetics of recombinant D. pealeii TDO, including
      heme stoichiometry and substrate specificity, to confirm in vitro activity.
    experiment_type: biochemistry
    hypothesis: >-
      D. pealeii TDO has similar catalytic properties to mammalian TDO, with
      strict specificity for L-tryptophan over other indoleamine substrates.
  - description: >-
      Use single-cell RNA-seq to map TDO expression across chromatophore subtypes
      and developmental stages in D. pealeii embryos.
    experiment_type: transcriptomics
    hypothesis: >-
      TDO expression is restricted to ommochrome-producing cell types (chromatophores
      and retinal pigment cells) and onset correlates with pigmentation timing.
  - description: >-
      Measure kynurenine pathway metabolite levels (N-formylkynurenine, kynurenine,
      3-hydroxykynurenine, xanthurenic acid) in TDO knockout vs wildtype D. pealeii
      embryos by LC-MS/MS.
    experiment_type: metabolomics
    hypothesis: >-
      TDO knockout eliminates kynurenine pathway flux entirely in D. pealeii due to
      the absence of IDO, unlike in E. berryi where IDO provides compensation.
  - description: >-
      Test whether partial TDO knockout in adult squid affects chromatophore
      expansion dynamics and camouflage behavior using video analysis.
    experiment_type: behavioral/physiological
    hypothesis: >-
      Reduced ommochrome content from partial TDO loss impairs chromatophore
      opacity and dynamic range of color change.
