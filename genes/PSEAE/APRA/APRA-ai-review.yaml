id: Q03023
gene_symbol: APRA
aliases: [aprA, PA1249, AP, aeruginolysin, "alkaline metalloproteinase"]
product_type: PROTEIN
taxon:
  id: NCBITaxon:208964
  label: Pseudomonas aeruginosa (strain ATCC 15692 / DSM 22644 / CIP 104116 / JCM
    14847 / LMG 12228 / 1C / PRS 101 / PAO1)
description: Secreted zinc-dependent alkaline metalloendopeptidase (serralysin / aeruginolysin)
  of the peptidase M10B (RTX-metalloprotease) family. The mature enzyme is a two-domain
  protein comprising an N-terminal catalytic metallopeptidase domain bearing a single
  catalytic zinc ion (coordinated by an HEXXH-type motif) and a C-terminal parallel
  beta-roll domain built from hemolysin-type (RTX) calcium-binding repeats; calcium
  binding drives folding and activation and stabilises the fold. It lacks a cleavable
  Sec signal peptide and is exported across both membranes by a dedicated type I secretion
  system (the AprDEF transporter), acting in the extracellular environment. Catalytically
  it preferentially cleaves peptide bonds N-terminal to hydrophobic residues and degrades
  a broad, immune-biased set of substrates. In the host it cleaves monomeric flagellin,
  complement components (notably C2, plus C1q, C1s, C3, C5a), cytokines, and the epithelial
  sodium channel, contributing to innate-immune evasion and modulation of host epithelial
  physiology.
existing_annotations:
- term:
    id: GO:0004222
    label: metalloendopeptidase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: Core molecular function. AprA is a zinc-dependent metalloendopeptidase
      (serralysin, EC 3.4.24.40) of the peptidase M10B family, with a catalytic zinc
      ion coordinated by an HEXXH-type motif (His185, His189, His195; active-site
      Glu186) and an endopeptidase mechanism cleaving internal peptide bonds.
    action: ACCEPT
    reason: Strongly supported by the solved crystal structures, the assigned EC number,
      MEROPS family classification (M10.056), and the catalytic zinc-binding active
      site. This is the central, defining molecular function of the protein.
    supported_by:
    - reference_id: UniProtKB:Q03023
      supporting_text: 'RecName: Full=Serralysin; EC=3.4.24.40. Active site His185/His189/His195
        coordinate catalytic Zn(2+); Belongs to the peptidase M10B family.'
- term:
    id: GO:0005509
    label: calcium ion binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: Structural calcium binding. The C-terminal beta-roll is formed by hemolysin-type
      (RTX) calcium-binding repeats and the protein binds 8 Ca(2+) ions per subunit;
      the calcium-loaded beta-roll is required for folding, activation, and type I
      secretion.
    action: ACCEPT
    reason: Directly demonstrated by X-ray crystallography (calcium-binding parallel
      beta-roll motif) and recorded as a UniProt cofactor (binds 8 Ca(2+) per subunit).
      This is a genuine, structurally essential function that contributes to rather
      than constitutes the core catalytic function.
    supported_by:
    - reference_id: UniProtKB:Q03023
      supporting_text: 'COFACTOR Name=Ca(2+); Note=Binds 8 Ca(2+) ions per subunit.
        Hemolysin-type calcium-binding repeats form a parallel beta-roll.'
