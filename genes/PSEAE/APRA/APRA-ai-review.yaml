- term:
    id: GO:0031012
    label: extracellular matrix
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: located_in
  review:
    summary: Likely over-annotation of localization. This InterPro-to-GO mapping (from
      the peptidase M10 / matrixin signature) places AprA in the extracellular matrix,
      but AprA is a freely secreted bacterial protease, not a structural component
      of or resident in a host extracellular matrix.
    action: MARK_AS_OVER_ANNOTATED
    reason: The peptidase M10 InterPro signature is shared with eukaryotic matrix
      metalloproteinases (matrixins) that reside in/act on the ECM, driving this electronic
      mapping. AprA's secreted, diffusible localization is already and more accurately
      captured by GO:0005576 (extracellular region). There is no evidence AprA is
      an extracellular-matrix-localized protein; its characterised action is on soluble
      host immune proteins.
    supported_by:
    - reference_id: UniProtKB:Q03023
      supporting_text: 'SUBCELLULAR LOCATION: Secreted.'
