- id: file:PSEAE/APRA/APRA-deep-research-falcon.md
  title: Deep research report (falcon/Edison) for APRA
  findings:
  - statement: >-
      AprA is a calcium-activated, zinc-dependent serralysin (M10B) secreted by the
      AprDEF type I secretion system, with an immune-biased substrate range (complement
      C2/C1q/C1s/C3/C5a, cytokines IFN-gamma/TNF-alpha, monomeric flagellin, ENaC,
      fibrin); aprA deletion attenuates virulence in a murine infection model.
