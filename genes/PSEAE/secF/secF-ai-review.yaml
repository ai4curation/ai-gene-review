id: Q9HXI2
gene_symbol: secF
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:208964
  label: Pseudomonas aeruginosa (strain ATCC 15692 / DSM 22644 / CIP 104116 / JCM
    14847 / LMG 12228 / 1C / PRS 101 / PAO1)
description: SecF is a multi-pass inner membrane protein that forms the SecDF accessory
  complex together with SecD. As part of the Sec protein translocase, SecDF uses the
  proton motive force (PMF) to enhance protein translocation across the cytoplasmic
  membrane after the ATP-dependent function of SecA. SecDF undergoes PMF-driven conformational
  cycles that pull preproteins through the SecYEG channel into the periplasm, functioning
  as a membrane-integrated chaperone that works independently of ATP. In P. aeruginosa,
  the SecD-SecF complex has been directly demonstrated by in vivo cross-linking mass
  spectrometry.
existing_annotations:
- term:
    id: GO:0005886
    label: plasma membrane
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: IBA annotation for plasma membrane localization inferred from phylogenetic
      analysis (PANTHER). SecF is well established as an integral inner membrane protein
      in bacteria. In P. aeruginosa, the inner membrane corresponds to the plasma membrane.
      UniProt confirms cell inner membrane localization via HAMAP rule MF_01464.
    action: ACCEPT
    reason: SecF is an integral inner membrane protein with six predicted transmembrane
      helices. Plasma membrane localization is consistent with all structural and functional
      evidence for SecDF family members across bacteria.
    supported_by:
    - reference_id: PMID:21562494
      supporting_text: Here, we determined the crystal structure of Thermus thermophilus
        SecDF at 3.3 Å resolution, revealing a pseudo-symmetrical, 12-helix transmembrane
        domain belonging to the RND superfamily and two major periplasmic domains, P1
        and P4
    - reference_id: PMID:7507921
      supporting_text: TnphoA fusions have been used to analyze the topology of SecD
        in the inner membrane; the protein contains six transmembrane stretches and a
        large periplasmic domain
- term:
    id: GO:0015031
    label: protein transport
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: IBA annotation for involvement in protein transport, inferred from phylogeny.
      SecF is part of the Sec translocase that mediates protein export across the
      bacterial inner membrane. This is correct but very general.
    action: KEEP_AS_NON_CORE
    reason: Protein transport is accurate but too broad. The more specific term GO:0043952
      (protein transport by the Sec complex) is also annotated and better captures the
      biological context. This annotation is redundant with the more specific terms.
    supported_by:
    - reference_id: PMID:29718185
      supporting_text: The bacterial membrane protein SecDF enhances protein translocation
        across the membrane driven by the complex of SecA ATPase and SecYEG
- term:
    id: GO:0005886
    label: plasma membrane
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  review:
    summary: IEA annotation for plasma membrane from combined automated methods (UniProt
      subcellular location mapping). Correct and consistent with the IBA annotation above.
    action: ACCEPT
    reason: Redundant with the IBA annotation but independently correct. SecF is an
      integral inner membrane protein confirmed by topology studies and crystal structures.
    supported_by:
    - reference_id: PMID:21562494
      supporting_text: Here, we determined the crystal structure of Thermus thermophilus
        SecDF at 3.3 Å resolution, revealing a pseudo-symmetrical, 12-helix transmembrane
        domain belonging to the RND superfamily and two major periplasmic domains, P1
        and P4
- term:
    id: GO:0006605
    label: protein targeting
  evidence_type: IEA
  original_reference_id: GO_REF:0000104
  review:
    summary: IEA annotation from UniRule for involvement in protein targeting. SecDF
      enhances the translocation of preproteins across the membrane, which is part of
      the protein targeting process. However, SecDF functions specifically in the
      translocation step rather than in the targeting/recognition step per se.
    action: KEEP_AS_NON_CORE
    reason: Protein targeting is a broader process that includes signal recognition and
      membrane targeting. SecDF specifically functions in the translocation step, after
      the preprotein has already been targeted to the membrane. This annotation is not
      incorrect but is less precise than the Sec-complex-specific terms.
    supported_by:
    - reference_id: PMID:29718185
      supporting_text: SecDF is proposed to undergo repeated conformational transitions
        to pull out the precursor protein from the SecYEG channel into the periplasm
- term:
    id: GO:0006886
    label: intracellular protein transport
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: IEA annotation from InterPro2GO mapping (IPR005665 SecF bacterial family).
      SecF is involved in transporting preproteins from the cytoplasm across the inner
      membrane to the periplasm, which is intracellular protein transport in the context
      of Gram-negative bacteria.
    action: KEEP_AS_NON_CORE
    reason: Correct but general. The term captures the overall transport function but
      does not specify the Sec pathway or the PMF-dependent mechanism. More specific
      terms are available and already annotated.
    supported_by:
    - reference_id: PMID:21562494
      supporting_text: Protein translocation across the bacterial membrane, mediated
        by the secretory translocon SecYEG and the SecA ATPase, is enhanced by proton
        motive force and membrane-integrated SecDF
- term:
    id: GO:0015450
    label: protein-transporting ATPase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: IEA annotation from InterPro2GO mapping (IPR005665). This is an incorrect
      annotation for SecF. SecF does not have ATPase activity. The ATPase function in
      the Sec translocase belongs to SecA. SecDF instead uses the proton motive force
      to drive conformational changes that enhance translocation.
    action: MODIFY
    reason: SecF/SecDF is explicitly not an ATPase. Multiple structural and biochemical
      studies demonstrate that SecDF uses the proton motive force, not ATP hydrolysis,
      to enhance translocation. Tsukazaki et al. (2011) identified an ATP-independent
      translocation step requiring SecDF and PMF. The appropriate MF term is GO:0009977
      (proton motive force dependent protein transmembrane transporter activity), as
      SecDF conducts protons coupled to polypeptide movement. SecF contributes to the
      translocase complex activity but does not independently enable ATPase activity.
    proposed_replacement_terms:
    - id: GO:0009977
      label: proton motive force dependent protein transmembrane transporter activity
    supported_by:
    - reference_id: PMID:21562494
      supporting_text: we propose that SecDF functions as a membrane-integrated chaperone,
        powered by proton motive force, to achieve ATP-independent protein translocation
    - reference_id: PMID:29718185
      supporting_text: Once SecDF captures the precursor protein on the periplasmic
        surface, SecDF can complete protein translocation even if SecA function is
        inactivated by ATP depletion, implying that SecDF is a protein-translocation
        motor that works independent of SecA
    - reference_id: PMID:28467902
      supporting_text: SecDF in I form can generate a tunnel that penetrates the
        transmembrane region and functions as a proton pathway regulated by a conserved
        Asp residue
- term:
    id: GO:0043952
    label: protein transport by the Sec complex
  evidence_type: IEA
  original_reference_id: GO_REF:0000104
  review:
    summary: IEA annotation from UniRule for involvement in protein transport by the
      Sec complex. This is the most specific and appropriate BP term for SecF function.
      SecDF is an integral component of the Sec translocase that enhances protein export.
    action: ACCEPT
    reason: This is the most specific and accurate BP annotation for SecF. SecDF is a
      well-characterized component of the Sec protein translocation machinery. Multiple
      structural and biochemical studies confirm this role across bacterial species.
    supported_by:
    - reference_id: PMID:21562494
      supporting_text: Protein translocation across the bacterial membrane, mediated
        by the secretory translocon SecYEG and the SecA ATPase, is enhanced by proton
        motive force and membrane-integrated SecDF, which associates with SecYEG
    - reference_id: PMID:24550475
      supporting_text: The SecY/61 complex forms the protein-channel component of the
        ubiquitous protein secretion and membrane protein insertion apparatus. The
        bacterial version SecYEG interacts with the highly conserved YidC and
        SecDF-YajC subcomplex, which facilitates translocation into and across the
        membrane
- term:
    id: GO:0065002
    label: intracellular protein transmembrane transport
  evidence_type: IEA
  original_reference_id: GO_REF:0000104
  review:
    summary: IEA annotation from UniRule for intracellular protein transmembrane
      transport. SecF facilitates the transport of preproteins across the inner
      membrane, which is intracellular protein transmembrane transport.
    action: KEEP_AS_NON_CORE
    reason: Correct and somewhat more specific than GO:0006886 (intracellular protein
      transport) in that it specifies transmembrane transport. However, GO:0043952
      (protein transport by the Sec complex) is the most informative annotation. This
      is a valid parent-level annotation that is kept but not core.
    supported_by:
    - reference_id: PMID:29718185
      supporting_text: Many newly synthesized proteins in the cytoplasm are programmed
        to be translocated to the periplasm via the narrow channel that is formed in
        the center of SecYEG
- term:
    id: GO:0031522
    label: cell envelope Sec protein transport complex
  evidence_type: ISS
  original_reference_id: PMID:25800553
  review:
    summary: SecF is a component of the cell envelope Sec protein transport complex.
      In P. aeruginosa, the SecD-SecF physical interaction has been directly demonstrated
      by in vivo chemical cross-linking mass spectrometry. The SecDF subcomplex associates
      with SecYEG to form the Sec translocon, and with YidC to form the holo-translocon.
      This annotation is supported by deep research findings in secF-deep-research-bioreason.md
      which correctly identifies SecF as part of the Sec protein secretion complex.
    action: NEW
    reason: GO:0031522 (cell envelope Sec protein transport complex) is the most
      specific CC term for SecF and captures its role as a subunit of the Sec
      translocase complex. This is supported by direct cross-linking evidence in P.
      aeruginosa (PMID:25800553) and extensive structural evidence from E. coli and T.
      thermophilus.
    supported_by:
    - reference_id: PMID:25800553
      supporting_text: Structures of three membrane proteins, namely, SecD-SecF, OprF,
        and OprI are predicted using in vivo cross-linked sites
    - reference_id: PMID:24550475
      supporting_text: The bacterial version SecYEG interacts with the highly conserved
        YidC and SecDF-YajC subcomplex, which facilitates translocation into and across
        the membrane
    - reference_id: file:PSEAE/secF/secF-deep-research-bioreason.md
      supporting_text: "[BioReason SFT] A multi-pass inner-membrane component of the\
        \ bacterial Sec pathway"
references:
- id: file:PSEAE/secF/secF-deep-research-bioreason.md
  title: BioReason SFT deep research for secF
  findings:
  - statement: BioReason SFT trace correctly identifies SecF as a PMF-driven inner
      membrane component of the Sec pathway that uses protonation-driven conformational
      changes to pull polypeptides through the translocon.
- id: GO_REF:0000002
  title: Gene Ontology annotation through association of InterPro records with GO terms
  findings:
  - statement: InterPro2GO mapping from IPR005665 (SecF bacterial family) assigns
      GO:0006886 (intracellular protein transport) and GO:0015450 (protein-transporting
      ATPase activity). The BP annotation is appropriate but the MF annotation is
      incorrect -- SecF is not an ATPase.
- id: GO_REF:0000033
  title: Annotation inferences using phylogenetic trees
  findings:
  - statement: PANTHER phylogenetic inference provides IBA annotations for plasma
      membrane localization and protein transport, both well supported.
- id: GO_REF:0000104
  title: Electronic Gene Ontology annotations created by transferring manual GO
    annotations between related proteins based on shared sequence features
  findings:
  - statement: UniRule transfers provide annotations for protein targeting, protein
      transport by the Sec complex, and intracellular protein transmembrane transport,
      all appropriate for SecF.
- id: GO_REF:0000120
  title: Combined Automated Annotation using Multiple IEA Methods
  findings:
  - statement: Combined IEA methods confirm plasma membrane localization, consistent
      with known SecF inner membrane topology.
- id: PMID:10984043
  title: Complete genome sequence of Pseudomonas aeruginosa PAO1, an opportunistic
    pathogen
  findings:
  - statement: Reports the complete genome sequence of P. aeruginosa PAO1, which
      includes the secF gene at ordered locus PA3820.
    supporting_text: Here we report the complete sequence of P. aeruginosa strain PAO1
- id: PMID:21562494
  title: Structure and function of a membrane component SecDF that enhances protein
    export
  findings:
  - statement: Landmark study determining the crystal structure of T. thermophilus
      SecDF at 3.3 A, revealing a 12-helix TM domain (RND superfamily) and two
      periplasmic domains. Demonstrates SecDF is a PMF-driven membrane-integrated
      chaperone for ATP-independent translocation.
    supporting_text: we propose that SecDF functions as a membrane-integrated chaperone,
      powered by proton motive force, to achieve ATP-independent protein translocation
  - statement: Conserved Asp and Arg residues at the SecD/SecF TM interface are
      essential for proton conduction and preprotein movement.
    supporting_text: Electrophysiological analyses revealed that SecDF conducts protons
      in a manner dependent on pH and the presence of an unfolded protein, with
      conserved Asp and Arg residues at the transmembrane interface between SecD and
      SecF playing essential roles in the movements of protons and preproteins
- id: PMID:29718185
  title: Structure-based working model of SecDF, a proton-driven bacterial protein
    translocation factor
  findings:
  - statement: Review of SecDF structural studies. SecDF is a protein-translocation
      motor working independently of SecA, powered by the proton gradient.
    supporting_text: Once SecDF captures the precursor protein on the periplasmic
      surface, SecDF can complete protein translocation even if SecA function is
      inactivated by ATP depletion, implying that SecDF is a protein-translocation
      motor that works independent of SecA
- id: PMID:28467902
  title: Tunnel Formation Inferred from the I-Form Structures of the Proton-Driven
    Protein Secretion Motor SecDF
  findings:
  - statement: I-form crystal structures at 2.6-2.8 A reveal a proton-conducting
      tunnel in the SecDF transmembrane region regulated by a conserved Asp residue.
    supporting_text: SecDF in I form can generate a tunnel that penetrates the
      transmembrane region and functions as a proton pathway regulated by a conserved
      Asp residue
- id: PMID:24550475
  title: Membrane protein insertion and proton-motive-force-dependent secretion
    through the bacterial holo-translocon SecYEG-SecDF-YajC-YidC
  findings:
  - statement: The holo-translocon (HTL) comprising SecYEG-SecDF-YajC-YidC is more
      effective in co-translational membrane protein insertion and makes post-translational
      secretion more PMF-dependent.
    supporting_text: It is more effective in cotranslational insertion of membrane
      proteins and the posttranslational secretion of a beta-barreled outer-membrane
      protein driven by SecA and ATP becomes much more dependent on the proton-motive
      force
- id: PMID:33146611
  title: Inter-membrane association of the Sec and BAM translocons for bacterial
    outer-membrane biogenesis
  findings:
  - statement: SecDF periplasmic domains connect the inner membrane Sec machinery to
      the outer membrane BAM complex, enabling inter-membrane communication driven by PMF.
    supporting_text: "the proton-motive force (PMF) across the inner-membrane acts at\
      \ distinct stages of protein secretion: (1) SecA-driven translocation through SecYEG\
      \ and (2) communication of conformational changes via SecDF across the periplasm\
      \ to BAM"
- id: PMID:25800553
  title: Probing the protein interaction network of Pseudomonas aeruginosa cells by
    chemical cross-linking mass spectrometry
  findings:
  - statement: In vivo cross-linking in P. aeruginosa directly demonstrates the
      SecD-SecF physical interaction and provides structural constraints for the
      complex.
    supporting_text: Structures of three membrane proteins, namely, SecD-SecF, OprF,
      and OprI are predicted using in vivo cross-linked sites
- id: PMID:7507921
  title: Genetic and molecular characterization of the Escherichia coli secD operon
    and its products
  findings:
  - statement: Characterization of the secD operon in E. coli, establishing that it
      contains yajC, secD, and secF. SecD and SecF are present at fewer than 30
      molecules per cell.
    supporting_text: in addition to secD and secF, it contains the upstream gene yajC
      ...there are fewer than 30 SecD and SecF molecules per cell
- id: PMID:28636909
  title: Electric-Field-Induced Protein Translocation via a Conformational Transition
    in SecDF
  findings:
  - statement: Molecular dynamics simulations show that the transmembrane electrical
      potential lowers the free-energy barrier for the F-form to I-form conformational
      transition in SecDF, providing a mechanistic link between PMF and SecDF function.
    supporting_text: the interaction of the P1 domain dipole moment with the TM electrical
      field considerably lowers the free-energy barrier in the direction of F-form to
      I-form transition
core_functions:
- description: SecF, as part of the SecDF complex, functions as a PMF-driven accessory
    component of the Sec protein translocase. It uses the proton motive force to power
    conformational cycles in its periplasmic domain that pull preproteins through the
    SecYEG channel, enhancing protein translocation across the inner membrane independently
    of ATP.
