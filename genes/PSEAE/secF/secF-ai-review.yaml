  - reference_id: PMID:25800553
    supporting_text: Structures of three membrane proteins, namely, SecD-SecF, OprF,
      and OprI are predicted using in vivo cross-linked sites
suggested_questions:
- question: Has SecF or SecDF been directly studied for essentiality or translocation
    activity in P. aeruginosa, or is all functional evidence transferred from E. coli
    and T. thermophilus?
  experts:
  - James E Bruce
- question: Does the SecDF complex in P. aeruginosa interact with YidC and participate
    in membrane protein insertion as part of a holo-translocon, similar to E. coli?
  experts: []
suggested_experiments:
- hypothesis: SecF in P. aeruginosa forms a functional SecDF complex that enhances
    PMF-dependent protein translocation, analogous to E. coli and T. thermophilus.
  description: Construct a secF deletion mutant in P. aeruginosa PAO1 and measure
    protein export efficiency (e.g., secretion of alkaline phosphatase or beta-lactamase)
    in the presence and absence of PMF (using CCCP). Compare translocation rates to
    wild type and to secD mutants.
- hypothesis: The conserved Asp and Arg residues in the SecF transmembrane region are
    essential for proton-coupled translocation in P. aeruginosa.
  description: Generate point mutations in the conserved Asp and Arg residues of P.
    aeruginosa SecF (identified by alignment with T. thermophilus SecDF). Assay protein
    export and proton conductance in reconstituted proteoliposomes.
