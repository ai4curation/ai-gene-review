description: >-
  NaODC_candidate_ODC is the stronger current NICAT ornithine decarboxylase
  mapping for the polyamine branch that feeds nicotine biosynthesis. It clearly
  catalyzes putrescine formation from ornithine and is the leading project
  candidate for the ODC step in the upstream N-methylpyrrolinium module.
