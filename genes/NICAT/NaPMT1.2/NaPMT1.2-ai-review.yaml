- term:
    id: GO:0004766
    label: spermidine synthase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000118
  review:
    summary: >-
      This TreeGrafter assignment is a family-level miscall and should not be kept
      as the catalytic function of PMT2.
    action: REMOVE
    reason: >-
      PMT2 belongs to a lineage derived from spermidine synthase but now performs
      specialized methyltransferase chemistry in nicotine biosynthesis.
    supported_by:
    - reference_id: file:NICAT/NaPMT1.2/NaPMT1.2-notes.md
      supporting_text: TreeGrafter assignment to spermidine synthase reflects PMT's evolutionary origin from spermidine synthase rather than its present catalytic activity.
