taxon:
  id: NCBITaxon:49451
  label: Nicotiana attenuata
description: >-
  PMT2 is a root-expressed putrescine N-methyltransferase paralog from Nicotiana
  attenuata that converts putrescine to N-methylputrescine for the pyrrolidine
  branch of nicotine biosynthesis. Like PMT1, it is embedded in the inducible
  nicotine defense program and shows jasmonate-, wound-, and herbivory-responsive
  transcript accumulation.
existing_annotations:
