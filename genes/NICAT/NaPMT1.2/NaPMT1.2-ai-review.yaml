suggested_questions:
- question: Are PMT1 and PMT2 dosage balanced in roots, or does one paralog dominate inducible nicotine flux under natural herbivory?
- question: How should PMT3 be classified relative to PMT1 and PMT2 once the core duplicated pathway members are fully reviewed?
suggested_experiments:
- description: Measure nicotine-pathway metabolites and transcript compensation in PMT2 single-loss and PMT1 PMT2 double-loss lines before and after methyl jasmonate or Manduca sexta challenge.
  experiment_type: genetic perturbation plus metabolite profiling
  hypothesis: PMT2 contributes nonredundant but overlapping catalytic flux within the inducible root nicotine pathway.
- description: Reconstitute PMT2 biochemistry in vitro and compare catalytic efficiency and substrate preference directly against PMT1 using the same assay conditions.
  experiment_type: biochemical enzyme assay
  hypothesis: PMT2 retains core PMT chemistry but may differ quantitatively from PMT1 in kinetics or stability.
