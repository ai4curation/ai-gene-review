proposed_new_terms: []
suggested_questions:
- question: Does PMT3 contribute measurable flux to nicotine biosynthesis, or is it a lower-priority duplicate relative to PMT1.1 and PMT1.2?
- question: Is PMT3 induced under the same defense conditions as the better characterized PMT paralogs?
suggested_experiments:
- description: Compare PMT3, PMT1.1, and PMT1.2 catalytic activity and induction profiles after topping, jasmonate treatment, and herbivory.
  experiment_type: comparative biochemistry and expression profiling
  hypothesis: PMT3 is catalytically competent but contributes less flux than the canonical PMT pair.
- description: Measure N-methylputrescine and nicotine levels after selective PMT3 disruption in roots.
  experiment_type: genetic perturbation plus metabolite profiling
  hypothesis: PMT3 has a modest but detectable contribution to pyrrolidine-branch flux.
