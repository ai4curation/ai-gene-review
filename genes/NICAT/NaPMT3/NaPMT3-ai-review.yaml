taxon:
  id: NCBITaxon:49451
  label: Nicotiana attenuata
description: >-
  NaPMT3 is a root-expressed putrescine N-methyltransferase paralog in Nicotiana
  attenuata. It clearly carries PMT-family methyltransferase chemistry and
  nicotine-pathway association, but current project framing still treats PMT3 as
  a follow-up paralog behind the better established PMT1.1 and PMT1.2 pair.
