      biosynthesis.
    supported_by:
    - reference_id: file:NICAT/NaPMT3/NaPMT3-notes.md
      supporting_text: UniProt curates A0A314LG79 as Putrescine N-methyltransferase 3, assigns the reaction from putrescine to N-methylputrescine, places the protein in nicotine biosynthesis, and reports predominant root expression.
      reference_section_type: LITERATURE_REVIEW
