- id: file:NICAT/NaPMT3/NaPMT3-uniprot.txt
  title: UniProt entry A0A314LG79 for Nicotiana attenuata PMT3
  findings:
  - statement: PMT3 is a putrescine N-methyltransferase with root expression
    supporting_text: 'DE   RecName: Full=Putrescine N-methyltransferase 3'
    reference_section_type: DATABASE_ENTRY
  - statement: UniProt places PMT3 in nicotine biosynthesis
    supporting_text: 'CC   -!- PATHWAY: Alkaloid biosynthesis; nicotine biosynthesis.'
    reference_section_type: DATABASE_ENTRY
- id: file:NICAT/NaPMT3/NaPMT3-notes.md
  title: NaPMT3 literature review notes
  findings:
  - statement: PMT3 is a real nicotine-module paralog rather than an arbitrary duplicate
    supporting_text: The same preprint places PMT3 among the stronger tobacco genes correlated with A622 and UGT1, which supports keeping PMT3 as a serious nicotine-module paralog rather than dismissing it as an irrelevant duplicate.
    reference_section_type: LITERATURE_REVIEW
  - statement: PMT3 still sits behind PMT1 and PMT2 in pathway confidence
    supporting_text: The paper does not distinguish whether a PMT3-like paralog in NICAT is part of the core flux-carrying pair or a secondary duplicate, so PMT3 remains follow-up rather than an automatically accepted seed-core anchor.
    reference_section_type: LITERATURE_REVIEW
existing_annotations:
- term:
    id: GO:0003824
    label: catalytic activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: This generic parent term is too broad to be useful.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      GO:0030750 already captures the specific methyltransferase chemistry of
      PMT3.
- term:
    id: GO:0004766
    label: spermidine synthase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000118
  review:
    summary: This is a family-origin overcall and should be removed.
    action: REMOVE
    reason: >-
      PMT proteins evolved from spermidine synthase but now catalyze putrescine
      N-methylation in alkaloid biosynthesis.
    supported_by:
    - reference_id: file:NICAT/NaPMT3/NaPMT3-notes.md
      supporting_text: UniProt curates A0A314LG79 as Putrescine N-methyltransferase 3, assigns the reaction from putrescine to N-methylputrescine, places the protein in nicotine biosynthesis, and reports predominant root expression.
      reference_section_type: LITERATURE_REVIEW
- term:
    id: GO:0005829
    label: cytosol
  evidence_type: IEA
  original_reference_id: GO_REF:0000118
  review:
    summary: Cytosolic localization is plausible but not a main curation conclusion.
    action: KEEP_AS_NON_CORE
    reason: >-
      Retain the location as reasonable context while prioritizing catalytic and
      pathway interpretation.
