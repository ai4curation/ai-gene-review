- id: file:NICAT/NaPMT1.1/NaPMT1.1-notes.md
  title: NaPMT1.1 literature review notes
  findings:
  - statement: PMT1 is the reviewed Nicotiana attenuata PMT1 pathway enzyme
    supporting_text: UniProt curates Q93XQ5 as Putrescine N-methyltransferase 1 and places it in nicotine biosynthesis with predominant root expression.
    reference_section_type: LITERATURE_REVIEW
  - statement: PMT catalyzes the first dedicated pyrrolidine-branch step toward nicotine
    supporting_text: PMT catalyzes S-adenosylmethionine-dependent methylation of putrescine to N-methylputrescine, the first specific metabolite on the route to nicotine.
    reference_section_type: LITERATURE_REVIEW
  - statement: Spermidine synthase annotations on PMT1 are evolutionary-family overcalls
    supporting_text: TreeGrafter assignment to spermidine synthase reflects PMT's evolutionary origin from spermidine synthase rather than its present catalytic activity.
    reference_section_type: LITERATURE_REVIEW
  - statement: PMT1 is part of jasmonate-, wound-, and herbivory-inducible nicotine defense
    supporting_text: In N. attenuata, Winz and Baldwin cloned PMT1 and PMT2 and found that both root PMT transcripts rose after MeJA, wounding, and Manduca sexta herbivory, while ethylene suppressed this induction.
    reference_section_type: LITERATURE_REVIEW
  - statement: PMT1 fits the duplicated root nicotine pathway described in the Nicotiana genome study
    supporting_text: The 2017 Nicotiana genome paper places root nicotine biosynthesis in N. attenuata as a duplicated specialization of polyamine and NAD metabolism, consistent with PMT as a root defense-pathway enzyme.
    reference_section_type: LITERATURE_REVIEW
- id: PMID:11299398
  title: Molecular interactions between the specialist herbivore Manduca sexta (Lepidoptera, Sphingidae) and its natural host Nicotiana attenuata. IV. Insect-Induced ethylene reduces jasmonate-induced nicotine accumulation by regulating putrescine N-methyltransferase transcripts.
  findings:
  - statement: PMT1 and PMT2 were cloned from Nicotiana attenuata as likely rate-limiting nicotine-pathway genes
    supporting_text: we cloned the putrescine methyltransferase genes (NaPMT1 and NaPMT2) of N. attenuata, which are thought to represent the rate limiting step in nicotine biosynthesis
    reference_section_type: ABSTRACT
  - statement: Root PMT transcripts increase after methyl jasmonate treatment
    supporting_text: Transcripts of both root putrescine N-methyltransferase (PMT) genes and nicotine accumulation increased dramatically within 10 h of shoot MeJA treatment
    reference_section_type: ABSTRACT
  - statement: Wounding and Manduca sexta herbivory elevate PMT transcript accumulation
    supporting_text: 1-MCP pretreatment dramatically amplified the transcript accumulation resulting from both wounding and M. sexta herbivory
    reference_section_type: ABSTRACT
- id: PMID:19651420
  title: Putrescine N-methyltransferase--the start for alkaloids.
  findings:
  - statement: PMT catalyzes S-adenosylmethionine-dependent methylation of putrescine
    supporting_text: Putrescine N-methyltransferase (PMT) catalyses S-adenosylmethionine (SAM) dependent methylation of the diamine putrescine.
    reference_section_type: ABSTRACT
  - statement: N-methylputrescine is the first specific metabolite on the route to nicotine
    supporting_text: The product N-methylputrescine is the first specific metabolite on the route to nicotine, tropane, and nortropane alkaloids.
    reference_section_type: ABSTRACT
  - statement: PMT evolved from plant spermidine synthase
    supporting_text: PMT is likely to have evolved from the ubiquitous enzyme spermidine synthase.
    reference_section_type: ABSTRACT
- id: PMID:28536194
  title: Wild tobacco genomes reveal the evolution of nicotine biosynthesis.
  findings:
  - statement: Root nicotine biosynthesis in Nicotiana evolved from duplicated polyamine and NAD pathways
    supporting_text: 'The biosynthetic machinery that allows for nicotine synthesis in the roots evolved from the stepwise duplications of two ancient primary metabolic pathways: the polyamine and nicotinamide adenine dinucleotide (NAD) pathways.'
    reference_section_type: ABSTRACT
