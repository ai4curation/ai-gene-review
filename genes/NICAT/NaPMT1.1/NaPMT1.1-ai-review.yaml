proposed_new_terms: []
suggested_questions:
- question: Are PMT1 and PMT2 biochemically interchangeable in vivo, or do they make distinct quantitative contributions to nicotine production under herbivory?
- question: Does the more weakly characterized PMT3 paralog contribute measurable catalytic flux to the nicotine pathway, or is it a noncore duplicate?
suggested_experiments:
- description: Generate clean PMT1, PMT2, and double-loss lines in Nicotiana attenuata and quantify N-methylputrescine and nicotine after methyl jasmonate treatment and Manduca sexta feeding.
  experiment_type: genetic perturbation plus metabolite profiling
  hypothesis: PMT1 and PMT2 jointly provide the dominant committed methyltransferase activity for inducible nicotine biosynthesis.
- description: Compare recombinant PMT1 and PMT2 kinetic parameters with putrescine and related diamines to test whether the paralogs are catalytically redundant or subtly specialized.
  experiment_type: biochemical enzyme assay
  hypothesis: The two root PMT paralogs retain the same core activity but may differ in catalytic efficiency or inducible pathway contribution.
