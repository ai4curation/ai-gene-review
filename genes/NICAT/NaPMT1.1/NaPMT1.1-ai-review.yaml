taxon:
  id: NCBITaxon:49451
  label: Nicotiana attenuata
description: >-
  PMT1 is a root-expressed putrescine N-methyltransferase from Nicotiana
  attenuata that commits polyamine flux into the pyrrolidine branch of nicotine
  biosynthesis by converting putrescine to N-methylputrescine. It is part of an
  inducible anti-herbivore defense pathway whose transcript abundance rises after
  jasmonate treatment, wounding, and Manduca sexta feeding, while ethylene
  suppresses that induction.
