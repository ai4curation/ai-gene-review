  original_reference_id: GO_REF:0000002
  review:
    summary: >-
      This annotation is true but uninformative for PMT1. A specific catalytic
      term is already present for this enzyme.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      GO:0030750 putrescine N-methyltransferase activity captures the actual
      chemistry; the generic catalytic parent term adds no useful biological
      resolution.
    supported_by:
    - reference_id: file:NICAT/NaPMT1.1/NaPMT1.1-notes.md
