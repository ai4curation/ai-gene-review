      reference_section_type: LITERATURE_REVIEW
- term:
    id: GO:0004766
    label: spermidine synthase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000118
  review:
    summary: >-
      This TreeGrafter annotation is not the current catalytic activity of PMT1.
      It reflects homology to the ancestral spermidine synthase family rather than
      the specialized methyltransferase activity of this nicotine-pathway enzyme.
    action: REMOVE
    reason: >-
      PMT proteins evolved from spermidine synthase but catalyze
      S-adenosylmethionine-dependent methylation of putrescine, not spermidine
      synthesis.
    supported_by:
    - reference_id: file:NICAT/NaPMT1.1/NaPMT1.1-notes.md
      supporting_text: TreeGrafter assignment to spermidine synthase reflects PMT's evolutionary origin from spermidine synthase rather than its present catalytic activity.
      reference_section_type: LITERATURE_REVIEW
- term:
    id: GO:0005829
    label: cytosol
  evidence_type: IEA
  original_reference_id: GO_REF:0000118
  review:
    summary: >-
      Cytosolic localization is plausible for this soluble pathway enzyme, but it
      is peripheral to the main curated claims for PMT1.
    action: KEEP_AS_NON_CORE
    reason: >-
      The available evidence reviewed here strongly supports catalytic role,
      pathway placement, and root induction. The cytosol term is reasonable but
      not central enough to elevate as a core conclusion in this pass.
