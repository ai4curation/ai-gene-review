core_functions:
  - description: >-
      Serves as the membrane-spanning and periplasmic structural anchor of the septal
      junction: five FraD transmembrane helices embed in the cytoplasmic membrane while the
      C-terminal periplasmic domain forms the SJ periplasmic anchor, providing the assembly
      platform for the SepN plug and the cap module and enabling gated cell-cell
      communication between cells of the filament.
