  label: Nostoc sp. (strain PCC 7120 / SAG 25.82 / UTEX 2576)
description: >-
  FraD (locus alr2393; third gene of the fraC-fraD-fraE operon) is a polytopic
  cytoplasmic-membrane protein of the filamentous, heterocyst-forming cyanobacterium
  Nostoc/Anabaena sp. PCC 7120. It is a core structural component of the septal junction
  (SJ), the gap-junction-like intercellular channel that traverses the septal
  peptidoglycan and connects adjacent cells in a filament to allow gated cell-cell
  molecular exchange. FraD has five N-terminal transmembrane helices (approximately
  residues 30-172) that span the cytoplasmic membrane and a large C-terminal periplasmic
  domain (residues 173-343) that forms the SJ periplasmic anchoring module. FraD thus acts
  as the membrane-spanning and periplasmic anchor of the SJ and as an essential assembly
  platform for the plug (formed by its partner SepN) and cap modules; it is also required
  for septal nanopore formation. Loss of FraD causes filament fragmentation, loss of SJ
  plug and cap, uncontrolled intercellular diffusion, and failure of diazotrophic growth
  under nitrogen limitation despite heterocyst formation.
