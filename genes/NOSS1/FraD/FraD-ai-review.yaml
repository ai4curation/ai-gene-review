- term:
    id: GO:0005198
    label: structural molecule activity
  evidence_type: IDA
  original_reference_id: PMID:42424141
  review:
    summary: >-
      NEW (proposed). Cryo-electron tomography with subtomogram averaging, combined with
      AlphaFold 3 modeling and MD, shows that five FraD molecules form the transmembrane
      and periplasmic anchor of the septal junction, providing the structural assembly
      platform for the SepN plug and the cap module. This is a structural (non-catalytic)
      role, best captured by structural molecule activity.
    action: NEW
    supported_by:
      - reference_id: PMID:42424141
        supporting_text: >-
          Structural modeling positions SepN as the plug-forming component and FraD as a
          membrane-spanning anchor with a periplasmic domain.
      - reference_id: PMID:42424141
        supporting_text: >-
          we combine cryo-electron tomography, AlphaFold 3 structure prediction, and
          molecular dynamics simulation
- term:
    id: GO:0005886
    label: plasma membrane
  evidence_type: IDA
  original_reference_id: PMID:20487302
  review:
    summary: >-
      NEW (proposed). FraD is an integral cytoplasmic (inner) membrane protein with five
      transmembrane helices; GFP fusions localize FraD to the intercellular septa, and
      cryoET places its transmembrane densities in the cytoplasmic membrane.
    action: NEW
    supported_by:
      - reference_id: PMID:20487302
        supporting_text: >-
          As shown with GFP fusions, FraC and FraD are also located at the intercellular
          septa.
- term:
    id: GO:0042597
    label: periplasmic space
  evidence_type: IDA
  original_reference_id: PMID:42424141
  review:
    summary: >-
      NEW (proposed). FraD's C-terminal domain (residues 173-343) forms the septal-junction
      periplasmic anchor; the corresponding periplasmic-anchor density is present in the WT
      cryoET subtomogram average but absent in the fraD-deltaPP (periplasmic-domain
