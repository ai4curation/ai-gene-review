proposed_new_terms:
  - proposed_name: septal junction
    proposed_definition: >-
      A proteinaceous cell-cell junction of filamentous cyanobacteria that traverses the
      septal peptidoglycan through a nanopore and directly connects the cytoplasms of
      adjacent cells in a filament, mediating and gating the intercellular diffusion of
      small molecules. It comprises a cytoplasmic cap, a membrane-embedded plug (SepN), a
      septum-spanning tube, and a transmembrane/periplasmic anchor (FraD).
    justification: >-
      There is no dedicated GO cellular-component term for the bacterial septal junction.
      GO:0005918 "septate junction" denotes the arthropod epithelial junction and is not
      appropriate. FraD (anchor) and SepN (plug) are components of this structure and would
      be annotated to it.
    proposed_parent:
      id: GO:0030054
      label: cell junction
suggested_questions:
  - question: >-
      Does the FraD periplasmic domain interact directly with septal peptidoglycan or with
      cell-wall amidases (e.g. AmiC homologs) during nanopore formation?
  - question: >-
      What is the molecular basis of septal-junction gating (open/closed) transitions, and
      how does the FraD periplasmic anchor contribute to reopening after stress is removed?
suggested_experiments:
  - hypothesis: >-
      FraD and SepN assemble as a 5+5 hetero-oligomer with a defined SepN-C-terminus /
      FraD-TM4-5 loop interface.
    description: >-
      Determine a high-resolution cryo-EM structure of the isolated, detergent- or
      nanodisc-reconstituted SepN-FraD complex to experimentally validate the predicted
      pentameric architecture and interaction interface.
  - hypothesis: >-
      Specific FraD-SepN interface residues are required for plug assembly and gating.
    description: >-
      Perform site-directed mutagenesis of predicted interface residues (e.g. FraD Ser227)
      and assay SJ assembly by cryoET and gating by calcein FRAP in complemented strains.
