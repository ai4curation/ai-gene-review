  label: Nostoc sp. (strain PCC 7120 / SAG 25.82 / UTEX 2576)
description: >-
  AmiC2 (locus alr0093) is a secreted cell-wall N-acetylmuramoyl-L-alanine amidase
  (EC 3.5.1.28) of the filamentous, heterocyst-forming cyanobacterium Nostoc/Anabaena
  sp. PCC 7120. The 627-residue protein has an N-terminal AMIN septal-targeting domain
  (Pfam PF11741) and a C-terminal Zn-dependent Amidase_3 catalytic domain
  (Pfam PF01520, MurNAc-LAA), and it hydrolyses the bond between N-acetylmuramoyl
  residues and L-alanine in peptidoglycan. Unlike the housekeeping amidases of
  unicellular bacteria that split the septum for daughter-cell separation, AmiC2
  drills a regular array of nanopores into the septal cross-wall (murein). This
  nanopore array forms the framework through which septal junctions connect the
  cytoplasms of adjacent cells in the filament, and is required for intercellular
  exchange of metabolites and signalling molecules, filament integrity and
  differentiation of nitrogen-fixing heterocysts. AmiC2 localises to the newly formed
  septum/cross-wall (periplasmic cell-wall compartment) and acts partly redundantly
  with its adjacent paralog AmiC1 (alr0092).
references:
- id: PMID:28929086
  title: Role of Two Cell Wall Amidases in Septal Junction and Nanopore Formation in
    the Multicellular Cyanobacterium Anabaena sp. PCC 7120.
  findings:
  - statement: Inactivation of either amidase (AmiC1 or AmiC2) reduces septal nanopore
      number and the rate of intercellular tracer exchange; the amiC1 amiC2 double
      mutant loses filament morphology and heterocyst differentiation.
    supporting_text: Inactivation of either amidase resulted in significant reduction
      in nanopore count and in the rate of fluorescent tracer exchange between neighboring
      cells measured by FRAP analysis. In an amiC1 amiC2 double mutant, filament morphology
      was affected and heterocyst differentiation was abolished.
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: PubMed-verified primary paper directly characterizing Anabaena PCC
      7120 amiC2 (alr0093) and amiC1 (alr0092) mutants; full text cached. Directly
      supports the amidase/nanopore/cell-cell-communication core function.
- id: PMID:21244533
  title: The morphogene AmiC2 is pivotal for multicellular development in the cyanobacterium
    Nostoc punctiforme.
  findings:
  - statement: Mutation of the single amiC2 gene in N. punctiforme abolishes cell
      differentiation and intercellular communication; AmiC2-GFP localizes to the
      cross-walls of dividing cells.
    supporting_text: mutation of a single gene, encoding cell wall amidase AmiC2, completely
      changes the morphology and abrogates cell differentiation and intercellular communication
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: PubMed-verified. Characterizes the N. punctiforme ortholog (Npun_F1846)
      of alr0093; establishes AmiC2 as a morphogene required for multicellularity.
      Abstract cached.
- id: PMID:23444428
  title: 'Prokaryotic multicellularity: a nanopore array for bacterial cell communication.'
  findings:
  - statement: AmiC2 drills an array of ~155 nanopores (~20 nm diameter) into the
      septal cross-walls and shows bona fide amidase activity in vivo and in vitro.
    supporting_text: The AmiC2 protein localizes to the young septum between cells
      and shows bona fide amidase activity in vivo and in vitro.
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: PubMed-verified. Demonstrates the nanopore-drilling function and
      in vivo/in vitro amidase activity of the N. punctiforme AmiC2 ortholog. Abstract
      cached.
- id: PMID:26833702
  title: 'Enabling cell-cell communication via nanopore formation: structure, function
    and localization of the unique cell wall amidase AmiC2 of Nostoc punctiforme.'
  findings:
  - statement: The AmiC2 catalytic domain is a Zn-dependent N-acetylmuramoyl-L-alanine
      amidase (EC 3.5.1.28) with a high-resolution crystal structure (PDB 5EMI); it
      generates nanopores in septal PGN, unlike daughter-cell-separation amidases.
    supporting_text: The N-acetylmuramoyl-l-alanine amidase AmiC2 (Npun_F1846; EC 3.5.1.28)
      in N. punctiforme generates arrays of such nanopores in the septal PGN, in contrast
      to homologous amidases that mediate daughter cell separation after cell division
      in unicellular bacteria.
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: PubMed-verified. Structural/biochemical characterization of the AmiC2
      catalytic domain (essential active-site zinc, strong in vitro hydrolytic activity).
      Abstract cached.
