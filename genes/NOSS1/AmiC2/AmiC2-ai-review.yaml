- term:
    id: GO:0009253
    label: peptidoglycan catabolic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: involved_in
  review:
    summary: >-
      Core biological process. As an N-acetylmuramoyl-L-alanine amidase, AmiC2
      hydrolyses (breaks down) peptidoglycan. In Anabaena, inactivation of amiC2
      (alr0093) reduces the septal nanopore array (DR1992 mutant retains only 31% of
      wild-type nanopores), consistent with AmiC2-mediated septal PG cleavage. The
      biologically salient activity is a specialized, localized septal PG remodelling
      (nanopore drilling) rather than bulk PG turnover.
    action: ACCEPT
    reason: >-
      Amidase cleavage of peptidoglycan is peptidoglycan catabolism; directly supported
      by genetics (reduced septal nanopores in the amiC2 mutant) and by the enzyme's
      characterized PG-hydrolysing activity.
    supported_by:
    - reference_id: PMID:28929086
      supporting_text: This enzyme perforates the septal peptidoglycan creating an array
        of nanopores, which may be the framework for septal junction complexes
    - reference_id: PMID:28929086
      supporting_text: in the amiC2 mutant DR1992, the quantity of nanopores was 31%
        of the wild type
- term:
    id: GO:0030288
    label: outer membrane-bounded periplasmic space
  evidence_type: IEA
  original_reference_id: GO_REF:0000118
  qualifier: located_in
  review:
    summary: >-
      Localization annotation. AmiC2 is a secreted amidase (hydrophobic signal-peptide-
      like N-terminus) that acts on the septal peptidoglycan, which in this
      outer-membrane-bearing (diderm) cyanobacterium lies within the periplasmic
      space between the cytoplasmic and outer membranes. The TreeGrafter periplasmic-
      space assignment is therefore a defensible compartment call. However, the
      experimentally supported and more informative location is the cell septum /
      cross-wall (see the added GO:0030428 annotation).
    action: ACCEPT
    reason: >-
      Consistent with a secreted amidase acting on periplasmic septal PG; not wrong,
      though less specific than the septal localization observed experimentally.
    supported_by:
    - reference_id: PMID:28929086
      supporting_text: both amidases, AmiC1 and AmiC2, localized to the septa of young
        vegetative cells and to the septal and polar neck areas connecting heterocysts
        with vegetative cells
    - reference_id: file:NOSS1/AmiC2/AmiC2-uniprot.txt
      supporting_text: 'SubName: Full=N-acetylmuramoyl-L-alanine amidase'
