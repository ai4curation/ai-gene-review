proposed_new_terms:
  - proposed_name: septal junction
    proposed_definition: >-
      A proteinaceous cell-cell junction of filamentous cyanobacteria that traverses the
      septal peptidoglycan through a nanopore and directly connects the cytoplasms of
      adjacent cells in a filament, mediating and gating the intercellular diffusion of
      small molecules. It comprises a cytoplasmic cap, a membrane-embedded plug (SepN), a
      septum-spanning tube, and a transmembrane/periplasmic anchor (FraD); FraC is a
      septal integral-membrane protein required for its normal architecture and function.
    justification: >-
      There is no dedicated GO cellular-component term for the bacterial/cyanobacterial
      septal junction. GO:0005918 "septate junction" denotes the arthropod epithelial
      junction and is not appropriate. FraC, FraD, SepN and SepJ would all be annotated to
      this structure.
    proposed_parent:
      id: GO:0030054
      label: cell junction
suggested_questions:
  - question: >-
      Is FraC a stoichiometric subunit of the cryoET-resolved FraD-SepN septal-junction
      core, or an accessory/architectural factor that assembles at the septum
      independently of that core?
  - question: >-
      What is the molecular basis of the phenylalanine-rich four-TM FraC protein's
      contribution to septal-junction architecture and SepJ recruitment?
suggested_experiments:
  - hypothesis: >-
      FraC physically associates with FraD (its operon partner) at the intercellular
      septum.
    description: >-
      Test FraC-FraD interaction by co-immunoprecipitation / split-GFP (BiFC) at the
      septa and by cryo-electron tomography of tagged strains to localize FraC density
      within the septal-junction complex.
  - hypothesis: >-
      FraC is required for correct nanopore number and septal-junction assembly.
    description: >-
      Quantify septal peptidoglycan nanopore arrays (nanopore counts by microscopy of
      isolated septal PG) and septal-junction density by cryoET in a fraC mutant versus
      wild type and a complemented strain.
