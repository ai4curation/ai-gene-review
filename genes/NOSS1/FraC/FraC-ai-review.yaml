description: >-
  FraC (locus alr2392; first gene of the fraC-fraD-fraE operon) is a small polytopic
  integral cytoplasmic-(inner)-membrane protein of the filamentous, heterocyst-forming
  cyanobacterium Nostoc/Anabaena sp. PCC 7120. It has four predicted transmembrane helices
  and belongs to the filamentous cyanobacterial septal-pore (TCDB 1.V.1.1.1) family, the
  same family as its operon partner FraD. FraC localizes to the intercellular septa, where
  it acts as a structural component of the septal-junction machinery that joins adjacent
  cells in a filament and mediates gated intercellular exchange of small molecules across
  the septal peptidoglycan. FraC is required for filament integrity and for diazotrophic
  growth: loss of FraC causes filament fragmentation under nitrogen deprivation,
  mislocalization of the septal protein SepJ, and impaired intercellular transfer of the
  fluorescent tracer calcein, without blocking heterocyst differentiation itself.
