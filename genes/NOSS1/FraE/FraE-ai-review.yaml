  label: Nostoc sp. (strain PCC 7120 / SAG 25.82 / UTEX 2576)
description: >-
  FraE (locus alr2394; third and least-characterized gene of the fraC-fraD-fraE operon)
  is a predicted polytopic integral-membrane protein of the filamentous, heterocyst-forming
  cyanobacterium Nostoc/Anabaena sp. PCC 7120. By domain architecture it belongs to the
  ABC-2-type transporter permease family (NosY-like; InterPro IPR032688, Pfam PF12679,
  PANTHER PTHR43471), i.e. it is a membrane permease component that provides a transmembrane
  translocation pathway rather than the ATP-hydrolyzing (nucleotide-binding) subunit of an
  ABC transporter. The fraC-fraD-fraE operon is constitutively expressed, and single mutants
  of its genes fragment under nitrogen deprivation and fail to grow diazotrophically despite
  forming heterocysts; its operon partners FraC and FraD localize to the intercellular septa
  and act as structural components of the septal junction that connects adjacent cells in the
  filament. FraE itself has little direct functional characterization: its transporter/permease
  classification is domain-based, and no specific transported substrate has been established.
