proposed_new_terms: []
suggested_questions:
  - question: >-
      Does FraE function as a substrate-transporting ABC-2 permease, or (like its operon
      partners FraC and FraD) primarily as a structural component of the septal junction?
  - question: >-
      With which nucleotide-binding (ATPase) partner, if any, does the FraE permease associate
      to form a functional ABC transporter, and what is the transported substrate?
suggested_experiments:
  - hypothesis: >-
      FraE is an integral cytoplasmic-membrane protein that localizes to the intercellular
      septa, like FraC and FraD.
    description: >-
      Construct a functional FraE-GFP fusion and image its subcellular localization under
      nitrogen-replete and nitrogen-deprived conditions to test septal vs dispersed
      membrane localization.
  - hypothesis: >-
      FraE provides a transmembrane translocation pathway for a specific substrate required
      for filament integrity / diazotrophic growth.
    description: >-
      Combine affinity purification of tagged FraE (to identify a nucleotide-binding partner
      and complex) with metabolite/transport assays in the fraE mutant to identify a candidate
      transported substrate; interpret cautiously given the possibility of a structural role.
