proposed_new_terms:
  - proposed_name: septal junction
    proposed_definition: >-
      A proteinaceous cell-cell junction of filamentous cyanobacteria that traverses the
      septal peptidoglycan through a nanopore and directly connects the cytoplasms of
      adjacent cells in a filament, mediating and gating the intercellular diffusion of
      small molecules. It comprises a cytoplasmic cap, a membrane-embedded plug (SepN), a
      septum-spanning tube, and a transmembrane/periplasmic anchor (FraD).
    justification: >-
      There is no dedicated GO cellular-component term for the bacterial septal junction.
      GO:0005918 "septate junction" denotes the arthropod epithelial junction and is not
      appropriate. SepN (plug) and FraD (anchor) are components of this structure and would
      be annotated to it.
    proposed_parent:
      id: GO:0030054
      label: cell junction
suggested_questions:
  - question: >-
      What conformational change in the SepN pentamer underlies plug opening/closing, and
      how is it triggered by loss of membrane potential (CCCP-induced closure)?
  - question: >-
      Since the N-terminal transmembrane helix is dispensable for gating, what holds the
      cytoplasmic-domain plug in place and mediates its interaction with FraD?
suggested_experiments:
  - hypothesis: >-
      The isolated SepN cytoplasmic domain oligomerizes as a pentamer that forms the plug.
    description: >-
      Purify the SepN cytoplasmic domain (residues 29-235) and determine its oligomeric
      state and structure (SEC-MALS and cryo-EM) to test the predicted pentameric plug.
  - hypothesis: >-
      SepN gating requires its C-terminal cytoplasmic region.
    description: >-
      Generate C-terminal SepN truncations/mutants, complement the sepN- mutant, and assay
      SJ closure by calcein FRAP with and without CCCP to map residues required for gating.
