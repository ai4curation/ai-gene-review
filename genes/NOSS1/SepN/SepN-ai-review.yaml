  label: Nostoc sp. (strain PCC 7120 / SAG 25.82 / UTEX 2576)
description: >-
  SepN (locus all4109) is a bitopic cytoplasmic-membrane protein of the filamentous,
  heterocyst-forming cyanobacterium Nostoc/Anabaena sp. PCC 7120. It is the plug-forming
  structural component of the septal junction (SJ), the gap-junction-like intercellular
  channel that traverses the septal peptidoglycan and connects adjacent cells in a
  filament to allow gated cell-cell molecular exchange. SepN has an N-terminal
  transmembrane helix (approximately residues 8-28) that anchors it in the cytoplasmic
  membrane and a large cytoplasmic domain (residues 29-235) with its C-terminus exposed to
  the cytoplasm; five SepN copies assemble into a central pentameric plug surrounded by
  five FraD anchors. SepN interacts with FraD, is indispensable for plug formation, and is
  required to close and gate SJs in response to stress. Unlike loss of FraD, a
  SepN-deficient mutant still grows diazotrophically and forms wild-type-like heterocyst
  septa, indicating the plug plays only a minor role in heterocyst function; the
  N-terminal transmembrane helix is dispensable for gating under tested conditions.
