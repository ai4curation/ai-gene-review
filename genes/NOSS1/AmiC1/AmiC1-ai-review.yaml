  label: Nostoc sp. (strain PCC 7120 / SAG 25.82 / UTEX 2576)
description: >-
  AmiC1 (locus alr0092) is a secreted, cell-wall-lytic N-acetylmuramoyl-L-alanine amidase
  (murein hydrolase / autolysin) of the filamentous, heterocyst-forming cyanobacterium
  Anabaena (Nostoc) sp. PCC 7120. Its architecture combines an N-terminal AMIN domain
  (IPR021731/PF11741) that targets the enzyme to the division septum with a Zn-dependent
  Amidase_3 catalytic domain (IPR002508/PF01520; PANTHER PTHR30404). The enzyme cleaves the
  amide bond linking the stem peptide (N-terminal L-alanine) to the N-acetylmuramic acid of
  the peptidoglycan backbone. Beyond ordinary peptidoglycan turnover, AmiC1 (together with its
  adjacent paralog AmiC2, alr0093) remodels and perforates the septal peptidoglycan to
  generate/pattern the array of nanopores through which septal junctions connect the cytoplasms
  of neighboring cells in the filament. This activity is required for intercellular
  communication (metabolite and signal exchange), for heterocyst differentiation, and for
  diazotrophic growth; AmiC1 is the dominant of the two Anabaena amidases, with amiC1 mutants
  losing cell-cell communication and failing to make functional heterocysts.
references:
  - id: PMID:22821973
    title: >-
      Cell wall amidase AmiC1 is required for cellular communication and heterocyst
      development in the cyanobacterium Anabaena PCC 7120 but not for filament integrity.
    findings:
      - statement: >-
          The amiC1 (alr0092) mutant fails to differentiate heterocysts and to grow
          diazotrophically, and FRAP shows a specific loss of cell-cell communication; the
          amidase is an autolysin that localizes to the septum of newly dividing cells and the
          polar neck of differentiating heterocysts.
        supporting_text: >-
          The amiC1 (alr0092) mutant was not able to differentiate heterocysts or to
          grow diazotrophically
    reference_review:
      relevance: HIGH
      correctness: VERIFIED
      review_notes: >-
        PubMed-verified (J Bacteriol 2012;194:5218-27; DOI 10.1128/JB.00912-12). Primary,
        AmiC1-specific functional characterization in Anabaena PCC 7120: knockout, GFP
        localization, complementation and FRAP.
  - id: PMID:28929086
    title: >-
      Role of Two Cell Wall Amidases in Septal Junction and Nanopore Formation in the
      Multicellular Cyanobacterium Anabaena sp. PCC 7120.
    findings:
      - statement: >-
          Inactivation of amiC1 reduces the septal peptidoglycan nanopore count to about half
          of wild type with impaired intercellular tracer exchange; AmiC1 (but not AmiC2) is
          additionally required for proper SepJ localization at the septum.
        supporting_text: >-
          the amiC1 mutants SR477 and FQ1633 showed 47 and 52% of the count of nanopores,
          respectively
    reference_review:
      relevance: HIGH
      correctness: VERIFIED
      review_notes: >-
        PubMed-verified (Front Cell Infect Microbiol 2017;7:386). Compares AmiC1 and AmiC2 in
        Anabaena; establishes both drill the septal nanopore array and shows AmiC1 is the more
        important amidase.
