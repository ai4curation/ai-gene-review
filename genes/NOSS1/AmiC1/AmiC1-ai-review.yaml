core_functions:
  - description: >-
      Septum-localized cell-wall N-acetylmuramoyl-L-alanine amidase that hydrolyzes the amide
      bond between the stem-peptide L-alanine and the N-acetylmuramic acid of peptidoglycan.
      Beyond peptidoglycan turnover, it remodels and perforates the septal peptidoglycan to
      generate/pattern the nanopore array through which septal junctions connect neighboring
      cells, and is thereby required for intercellular communication, heterocyst development
      and diazotrophic growth. AmiC1 is the dominant of the two adjacent Anabaena amidases
      (with AmiC2/alr0093).
