proposed_new_terms: []
suggested_questions:
  - question: >-
      Does AmiC1 have distinct substrate/cleavage-site preferences from AmiC2 that explain its
      dominant role and its specific effect on SepJ localization?
  - question: >-
      Is the AMIN domain necessary and sufficient for septal targeting of AmiC1, and how is its
      site-specific/temporal activity regulated to avoid autolysis?
suggested_experiments:
  - description: >-
      In vitro amidase assay on purified peptidoglycan (release of the stem peptide from
      MurNAc) to confirm N-acetylmuramoyl-L-alanine amidase activity biochemically and to
      measure Zn dependence.
    experiment_type: enzyme assay
  - description: >-
      Point mutation of the predicted Amidase_3 catalytic residues (FIDPGHGG motif / Zn ligands)
      with a GFP fusion, to test whether catalysis (not just septal localization) is required
      for nanopore formation and cell-cell communication.
    hypothesis: >-
      Catalytic activity of AmiC1, not merely its septal localization, is required for nanopore
      array formation and intercellular communication.
    experiment_type: site-directed mutagenesis
