      Family research supports urease activity and urea catabolism for
      conserved UreC catalytic subunits, but highlights rare iron-dependent
      ureases as a reason not to infer nickel binding without gene-specific
      metal evidence.
- id: file:9ARCH/ureC1/ureC1-deep-research-manual.md
  title: Manual deep research synthesis for ureC1
  findings:
  - statement: >-
      Falcon and OpenScientist did not complete for ureC1; manual synthesis
      supports urease activity and urea catabolism from EC 3.5.1.5, UniProt
      urea-degradation pathway mapping, and PTHR43440 UreC-family evidence.
core_functions:
- description: >-
    Catalyzes urea hydrolysis as a nickel-dependent urease alpha subunit,
    contributing to urea catabolism in Nitrososphaera viennensis.
  molecular_function:
    id: GO:0009039
    label: urease activity
  directly_involved_in:
  - id: GO:0043419
    label: urea catabolic process
  supported_by:
  - reference_id: file:9ARCH/ureC1/ureC1-uniprot.txt
    supporting_text: >-
      RecName: Full=Urease subunit alpha; EC=3.5.1.5.
  - reference_id: file:interpro/panther/PTHR43440/PTHR43440-deep-research-falcon.md
    supporting_text: >-
      Canonical urease large/alpha subunits house the dinuclear active site and
      catalyze urea hydrolysis; ureC1 has explicit EC and nickel-binding
      support.
  - reference_id: file:9ARCH/ureC1/ureC1-deep-research-manual.md
    supporting_text: >-
      Manual synthesis accepts urease activity, nickel binding, and urea
      catabolic process for ureC1, while noting that nickel binding is accepted
      from gene-specific metal evidence rather than family membership alone.
