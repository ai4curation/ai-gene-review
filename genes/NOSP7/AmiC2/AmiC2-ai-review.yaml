existing_annotations:
- term:
    id: GO:0008745
    label: N-acetylmuramoyl-L-alanine amidase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: >-
      Core molecular function. AmiC2 (Npun_F1846) is a cell-wall N-acetylmuramoyl-L-alanine
      amidase (EC 3.5.1.28) carrying an Amidase_3 / MurNAc-LAA catalytic domain (Pfam
      PF01520, InterPro IPR002508). Although the GOA assignment is IEA, this exact protein is
      directly characterized: the isolated catalytic domain shows strong hydrolytic activity
      in vitro, the enzyme shows bona fide amidase activity in vivo and in vitro, and its
      Zn-dependent active site was solved crystallographically (PDB 5EMI). The IEA term is
      therefore correct and could be upgraded to experimental (IDA).
    action: ACCEPT
    reason: >-
      Well supported by the catalytic domain and direct enzymatic/structural characterization
      of this protein; represents its primary evolved molecular function.
    supported_by:
    - reference_id: PMID:26833702
      supporting_text: AmiC2-cat exhibits strong hydrolytic activity in vitro.
    - reference_id: PMID:23444428
      supporting_text: The AmiC2 protein localizes to the young septum between cells and
        shows bona fide amidase activity in vivo and in vitro.
    - reference_id: file:NOSP7/AmiC2/AmiC2-uniprot.txt
      supporting_text: EC=3.5.1.28
- term:
    id: GO:0009253
    label: peptidoglycan catabolic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: involved_in
  review:
    summary: >-
      Core biological process. As an N-acetylmuramoyl-L-alanine amidase, AmiC2 hydrolyses
      (breaks down) peptidoglycan. In N. punctiforme the enzyme perforates the septal PG to
      form the nanopore array; the biologically salient activity is specialized, localized
      septal PG remodelling (nanopore drilling) rather than bulk PG turnover, but at the
      chemical level it is peptidoglycan catabolism.
    action: ACCEPT
    reason: >-
      Amidase cleavage of peptidoglycan is peptidoglycan catabolism; supported by the
      characterized PG-hydrolysing activity and septal PG perforation of this protein.
    supported_by:
    - reference_id: PMID:23444428
      supporting_text: AmiC2 drills holes into the cross-walls, forming an array of ~155
        nanopores with a diameter of ~20 nm each
    - reference_id: PMID:28929086
      supporting_text: This enzyme perforates the septal peptidoglycan creating an array of
        nanopores, which may be the framework for septal junction complexes.
- term:
    id: GO:0030288
    label: outer membrane-bounded periplasmic space
  evidence_type: IEA
  original_reference_id: GO_REF:0000118
  qualifier: located_in
  review:
    summary: >-
      Localization annotation. AmiC2 is a secreted amidase that acts on the septal
      peptidoglycan, which in this outer-membrane-bearing (diderm) cyanobacterium lies within
      the periplasmic space between the cytoplasmic and outer membranes. The TreeGrafter
      periplasmic-space assignment is therefore a defensible compartment call, but the
      experimentally supported and more informative location is the cell septum / cross-wall
      (see the added GO:0030428 annotation).
    action: ACCEPT
    reason: >-
      Consistent with a secreted amidase acting on periplasmic septal PG; not wrong, though
      less specific than the septal localization observed experimentally.
    supported_by:
    - reference_id: PMID:26833702
      supporting_text: Immunofluorescence shows that native AmiC2 localizes to the maturing septum.
    - reference_id: file:NOSP7/AmiC2/AmiC2-uniprot.txt
      supporting_text: EC=3.5.1.28
- term:
    id: GO:0008270
    label: zinc ion binding
  evidence_type: IDA
  original_reference_id: PMID:26833702
  qualifier: enables
  review:
    summary: >-
      The AmiC2 catalytic domain coordinates an essential zinc ion in its active site, as
      shown by the 1.12 A crystal structure solved in complex with Zn2+ (PDB 5EMI; Zn-binding
      residues 449/464/517). Zinc is required for catalysis: a conserved-glutamate active-site
      mutation abolishes activity and zinc removal destabilizes the domain. Not in the GOA
      set; added to capture the experimentally demonstrated zinc cofactor binding. (UniProt
      also carries GO:0046872 metal ion binding by keyword, of which this is the specific
      form.)
    action: NEW
    reason: >-
      Direct structural evidence (PDB 5EMI, in complex with Zn2+) plus mutagenesis establish
      an essential catalytic zinc; zinc ion binding is the specific molecular function.
    supported_by:
    - reference_id: PMID:26833702
      supporting_text: which harbors an essential zinc ion
    - reference_id: PMID:26833702
      supporting_text: A single point mutation of a conserved glutamate near the zinc ion
        results in total loss of activity, whereas zinc removal leads to instability of AmiC2-cat.
    - reference_id: file:NOSP7/AmiC2/AmiC2-uniprot.txt
      supporting_text: X-RAY CRYSTALLOGRAPHY (1.12 ANGSTROMS) OF 439-616 IN COMPLEX WITH ZN(2+).
- term:
    id: GO:0030428
    label: cell septum
  evidence_type: IDA
  original_reference_id: PMID:21244533
  qualifier: located_in
  review:
    summary: >-
      AmiC2 localizes to the newly formed division septum / cross-wall of dividing cells.
      This is the experimentally observed site of action, shown by AmiC2-GFP fusion focused
      in the cross walls and by immunofluorescence of native AmiC2 at the maturing septum.
      Not in the GOA set; added to capture the specific, more informative septal localization.
    action: NEW
    reason: >-
      Multiple localization studies place AmiC2 at the division septum / cross-wall, a more
      informative location than the generic periplasmic space.
    supported_by:
    - reference_id: PMID:21244533
      supporting_text: AmiC2-GFP localizes in the cell wall with a focus in the cross walls
        of dividing cells
    - reference_id: PMID:26833702
      supporting_text: Immunofluorescence shows that native AmiC2 localizes to the maturing septum.
- term:
    id: GO:0071555
    label: cell wall organization
  evidence_type: IMP
  original_reference_id: PMID:21244533
  qualifier: involved_in
  review:
    summary: >-
      AmiC2 remodels and patterns the septal cell wall by drilling the nanopore array, a
      specialized cell-wall organization process distinct from general PG turnover. Genetics
      show loss of amiC2 alters septal/cross-wall structure and abolishes normal filament
      morphology. Not in the GOA set; added to capture the septal PG remodelling function.
    action: NEW
    reason: >-
      The amidase does not merely degrade PG but organizes the septal cross-wall into a
      patterned nanopore array; mutant phenotype shows disrupted cross-wall architecture.
    supported_by:
    - reference_id: PMID:23444428
      supporting_text: AmiC2 drills holes into the cross-walls, forming an array of ~155
        nanopores with a diameter of ~20 nm each
    - reference_id: PMID:21244533
      supporting_text: mutation of a single gene, encoding cell wall amidase AmiC2, completely
        changes the morphology and abrogates cell differentiation and intercellular communication
- term:
    id: GO:0007267
    label: cell-cell signaling
  evidence_type: IMP
  original_reference_id: PMID:21244533
  qualifier: involved_in
  review:
    summary: >-
      By drilling the septal nanopore array through which septal junctions connect
      neighbouring cytoplasms, AmiC2 is genetically required for intercellular communication:
      in N. punctiforme, mutation of the single amiC2 gene abrogates intercellular
      communication (and, downstream, cell differentiation). Not in the GOA set; added to
      capture AmiC2's role in enabling cell-cell communication (an enabling/upstream role
      rather than direct signal transfer).
    action: NEW
    reason: >-
      Strong genetic evidence that AmiC2 is required for cell-cell communication - the
      nanopores it creates are the conduits for the septal junctions that connect cells.
    supported_by:
    - reference_id: PMID:21244533
      supporting_text: mutation of a single gene, encoding cell wall amidase AmiC2, completely
        changes the morphology and abrogates cell differentiation and intercellular communication
    - reference_id: PMID:21244533
      supporting_text: AmiC2 thus can be considered as a novel morphogene required for
        cell-cell communication, cellular development and multicellularity
