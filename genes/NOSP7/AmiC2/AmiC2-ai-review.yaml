  label: Nostoc punctiforme (strain ATCC 29133 / PCC 73102)
description: >-
  AmiC2 (locus Npun_F1846; UniProt B2J2S4) is a secreted, Zn-dependent cell-wall
  N-acetylmuramoyl-L-alanine amidase (EC 3.5.1.28) of the filamentous, heterocyst-forming
  cyanobacterium Nostoc punctiforme PCC 73102. The 616-residue protein has N-terminal AMIN
  septal-targeting domains (Pfam PF11741, InterPro IPR021731) and a C-terminal Zn-dependent
  Amidase_3 / MurNAc-LAA catalytic domain (Pfam PF01520, InterPro IPR002508/IPR050695) whose
  active site coordinates an essential zinc ion; it hydrolyses the bond between
  N-acetylmuramoyl residues and L-alanine in peptidoglycan. Unlike the housekeeping amidases
  of unicellular bacteria that split the septum for daughter-cell separation, AmiC2 drills a
  regular array of nanopores (~155 pores, ~20 nm) into the septal cross-wall. This nanopore
  array is the framework through which septal junctions connect the cytoplasms of adjacent
  cells in the filament, and is required for intercellular exchange of metabolites and
  signalling molecules, filament integrity and heterocyst differentiation; loss of AmiC2
  abolishes multicellular development. AmiC2 localises to the newly formed division septum /
  cross-wall. The catalytic domain has been solved to 1.12 Angstrom resolution in complex
  with Zn2+ (PDB 5EMI). AmiC2 acts partly redundantly with its adjacent tandem paralog AmiC1
  (Npun_F1845).
references:
- id: PMID:26833702
  title: 'Enabling cell-cell communication via nanopore formation: structure, function
    and localization of the unique cell wall amidase AmiC2 of Nostoc punctiforme.'
  findings:
  - statement: The AmiC2 catalytic domain of N. punctiforme is a Zn-dependent
      N-acetylmuramoyl-L-alanine amidase (EC 3.5.1.28) solved to 1.12 A (PDB 5EMI); it
      generates septal nanopores, unlike daughter-cell-separation amidases, and shows strong
      in vitro hydrolytic activity dependent on an essential active-site zinc.
    supporting_text: The N-acetylmuramoyl-l-alanine amidase AmiC2 (Npun_F1846; EC 3.5.1.28)
      in N. punctiforme generates arrays of such nanopores in the septal PGN, in contrast to
      homologous amidases that mediate daughter cell separation after cell division in
      unicellular bacteria.
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: PubMed-verified primary structural/biochemical paper on THIS protein
      (Npun_F1846). Directly supports amidase activity (IDA), zinc binding (IDA), septal
      localization and nanopore function. Abstract cached (full_text_available false); the
      curator-visible facts (PDB 5EMI, EC 3.5.1.28, essential zinc) are corroborated by the
      UniProt record.
