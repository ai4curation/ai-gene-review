- term:
    id: GO:0005198
    label: structural molecule activity
  evidence_type: ISS
  original_reference_id: PMID:42424141
  review:
    summary: >-
      NEW (proposed, by orthology). B2IXC8 is the FraD ortholog of PCC 7120 FraD (P46079;
      phmmer E = 7.4e-165, 70.3% identity; same FraD-specific family IPR020360; conserved
      fraC-fraD-fraE operon synteny). In PCC 7120, FraD provides the transmembrane and
      periplasmic anchor of the septal junction and serves as the structural assembly
      platform for the SepN plug and cap module - a structural (non-catalytic) role best
      captured by structural molecule activity. Inferred for B2IXC8 by sequence/structural
      similarity (ISS).
    action: NEW
    supported_by:
      - reference_id: PMID:42424141
        supporting_text: >-
          Structural modeling positions SepN as the plug-forming component and FraD as a
          membrane-spanning anchor with a periplasmic domain.
      - reference_id: file:NOSP7/FraD/FraD-notes.md
        supporting_text: >-
          Because GOA carries no annotations for B2IXC8, its function is inferred from this
          orthology to the experimentally characterized PCC 7120 FraD, and all proposed
          annotations use evidence_type
- term:
    id: GO:0005886
    label: plasma membrane
  evidence_type: ISS
  original_reference_id: PMID:20487302
  review:
    summary: >-
      NEW (proposed, by orthology). FraD is an integral cytoplasmic (inner) membrane protein;
      in PCC 7120, GFP fusions localize FraD to the intercellular septa and cryoET places its
      transmembrane densities in the cytoplasmic membrane. UniProt B2IXC8 is itself annotated
      Membrane/Transmembrane with a matching N-terminal transmembrane bundle (Phobius),
      supporting plasma (cytoplasmic) membrane localization by orthology.
    action: NEW
    supported_by:
