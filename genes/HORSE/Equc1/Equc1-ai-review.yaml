taxon:
  id: NCBITaxon:9796
  label: Equus caballus
description: >-
  Equ c 1, the major horse allergen: a secreted lipocalin (calycin superfamily,
  lipocalin family) that binds small hydrophobic odorant ligands in its beta-barrel
  calyx. Produced in salivary, sublingual and liver tissue and shed in dander, it is
  the dominant horse allergen and a member of the cross-reactive mammalian lipocalin
  group (with cat Fel d 4, dog Can f 6 and bovine Bos d 2).
