  review:
    summary: >-
      NEW (proposed). Equ c 2 is a secretory lipocalin in the same dander-allergen
      group as the odorant-binding lipocalins Equ c 1, Can f 1/2/6 and Bos d 2; by
      family analogy it binds small hydrophobic odorant ligands in its calyx. Added
      as the specific odorant-binding molecular function (not the uninformative
      generic small-molecule-binding parent); the precise ligand is still unknown.
    action: NEW
    reason: >-
      Consistent with the odorant-binding annotation carried by the other lipocalins
      in this cohort; a specific (family-level) MF rather than the generic parent term.
    supported_by:
    - reference_id: file:HORSE/Equc2/Equc2-uniprot.txt
      supporting_text: Belongs to the calycin superfamily. Lipocalin family.
