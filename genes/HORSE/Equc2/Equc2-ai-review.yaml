  label: Equus caballus
description: >-
  Equ c 2 (isoform 2.0101), a secreted horse dander lipocalin (calycin superfamily,
  lipocalin family) and allergen. As a secretory lipocalin it is expected to bind a
  small hydrophobic ligand in its beta-barrel calyx, but the specific endogenous
  ligand and physiological role are not established (the protein was characterized
  largely at the protein-sequence/allergen level).
