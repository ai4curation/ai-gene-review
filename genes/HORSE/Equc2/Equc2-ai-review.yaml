core_functions:
- description: >-
    Secreted dander lipocalin (calyx fold) of the horse, expected by family analogy
    to bind a small hydrophobic ligand in its beta-barrel calyx; the specific
    molecular function, endogenous ligand and physiological role are not established.
    Unlike its paralog Equ c 1, Equ c 2 carries no phylogenetic (IBA) odorant-binding
    annotation, so a specific molecular-function term is not asserted here.
