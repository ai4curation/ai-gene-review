taxon:
  id: NCBITaxon:9796
  label: Equus caballus
description: >-
  Serum albumin of the horse, the allergen Equ c 3. The most abundant plasma protein
  and the archetypal multi-ligand transport protein of the ALB/AFP/VDB family: it
  binds and carries fatty acids, metal ions, hormones, bilirubin and drugs, and its
  principal physiological role is regulation of the colloidal osmotic pressure of
  blood; it also sequesters the bacterial siderophore enterobactin (nutritional
  immunity). As an allergen, Equ c 3 is a minor, cross-reactive component
  (mammalian serum-albumin cross-reactivity).
