  label: Equus caballus
description: >-
  Equ c 4 / latherin, a secreted horse protein of the BPI/LBP/PLUNC superfamily
  (PLUNC family) and a horse allergen. It is the major protein of horse sweat (and
  saliva), a highly surface-active biosurfactant that lowers surface tension to make
  the water-repellent coat wettable, promoting sweat spreading and evaporative
  cooling (thermoregulation). It is the prototype of the latherin/PLUNC family that
  also includes cat Fel d 8.
