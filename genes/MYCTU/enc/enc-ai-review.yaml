product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:83332
  label: Mycobacterium tuberculosis (strain ATCC 25618 / H37Rv)
description: >-
  Type 1 encapsulin shell protein of Mycobacterium tuberculosis (Rv0798c). Sixty
  copies assemble into an intracellular T=1 icosahedral proteinaceous
  nanocompartment about 22 nm in diameter with ~2.5 nm walls, in the same operon
  as its principal cargo, the dye-decolorizing peroxidase DyP; additional
  antioxidant cargo proteins (BfrB ferritin, FolB) are targeted to the interior
  via C-terminal extensions. By packaging these antioxidant enzymes the
  nanocompartment is implicated in the oxidative/nitrosative-stress response and
  in survival against the host immune response, making it virulence-associated.
  The protein was originally described as "Culture Filtrate Protein 29" (CFP29), a
  29 kDa secreted mycobacterial T-cell antigen that elicits a strong IFN-gamma
  memory response; its high-molecular-mass polymeric nature and ~62% identity to
  Brevibacterium linens Linocin were noted at that time, before its recognition as
  an encapsulin. The hyperstable cage is detected at low levels in short-term
  culture filtrate and the membrane fraction, and in host-cell exosomes during
  infection; the culture-filtrate appearance is attributed to survival of the
  stable nanocompartment through cell lysis rather than to dedicated secretion.
references:
  - id: GO_REF:0000033
    title: Annotation inferences using phylogenetic trees
    findings: []
    reference_review:
      relevance: MEDIUM
      correctness: VERIFIED
      review_notes: >-
        GO_Central PAINT/IBA reference. This gene (I6WZG6) is one of the two
        experimental leaves in the with/from panel (PANTHER:PTN002201532 |
        UniProtKB:I6WZG6 | UniProtKB:Q9WZP2) that seeds the encapsulin-family IBA
        propagation to GO:0140737, so the localization is directly supported.
  - id: GO_REF:0000044
    title: Gene Ontology annotation based on UniProtKB/Swiss-Prot Subcellular Location
      vocabulary mapping, accompanied by conservative changes to GO terms applied by
      UniProt
    findings: []
    reference_review:
      relevance: LOW
      correctness: VERIFIED
      review_notes: >-
        Still-active UniProt SubCell-location -> GO CC mapping (distinct from the
        retired kw2go/GO_REF:0000043). It converts the "Secreted" and "Cell
        membrane" subcellular-location keywords into GO:0005576 and GO:0005886.
        Those keywords derive from the pre-encapsulin CFP29 culture-filtrate work,
        which UniProt itself now attributes to lysis of the hyperstable cage
        ("apparent secretion", ECO:0000305), so these keyword-derived CC terms
        over-state a dedicated extracellular/membrane localization.
  - id: GO_REF:0000120
    title: Combined Automated Annotation using Multiple IEA Methods
    findings: []
    reference_review:
      relevance: LOW
      correctness: VERIFIED
      review_notes: >-
        UniProt automated pipeline mapping to the encapsulin nanocompartment.
        Correct but redundant with the IDA/IBA evidence.
  - id: PMID:24855650
    title: Characterization of a Mycobacterium tuberculosis nanocompartment and its
      potential cargo proteins.
    findings:
      - statement: >-
          Demonstrates by co-purification and electron microscopy that M.
          tuberculosis encapsulin (CFP-29 / Mt-Enc, in an operon with Mt-DyP)
          encapsulates the antioxidant cargo proteins Mt-DyP, Mt-BfrB and Mt-FolB
          via their C-terminal extensions, implicating the nanocompartment in the
          oxidative-stress response.
        supporting_text: >-
          For the first time, we show by co-purification and electron microscopy
          that mycobacteria via Mt-Enc can encapsulate Mt-DyP, Mt-BfrB, and
          Mt-FolB.
        reference_section_type: ABSTRACT
    reference_review:
      relevance: HIGH
      correctness: VERIFIED
      review_notes: >-
        Structural/biochemical characterization (Contreras et al., JBC 2014) that
        establishes Rv0798c as the M. tuberculosis encapsulin and is the IDA
        anchor for GO:0140737. Full text in cache.
  - id: PMID:9596740
    title: Identification and characterization of a 29-kilodalton protein from Mycobacterium
      tuberculosis culture filtrate recognized by mouse memory effector cells.
    findings:
      - statement: >-
          Original identification of the protein as CFP29, a high-molecular-mass
          polymeric 29 kDa T-cell antigen purified from short-term culture filtrate
          and also present in the membrane fraction, with ~62% identity to the B.
          linens bacteriocin Linocin.
        supporting_text: >-
          CFP29 is present in both culture filtrate and the membrane fraction from
          M. tuberculosis, suggesting that this antigen is released from the
          envelope to culture filtrate during growth.
        reference_section_type: ABSTRACT
    reference_review:
      relevance: HIGH
      correctness: VERIFIED
      review_notes: >-
        The pre-encapsulin "secreted antigen" characterization (Rosenkrands et
        al., Infect Immun 1998) and the source of the extracellular/membrane EXP
        annotations. Correctly cited; the localization interpretation is
        superseded (see GO:0005576/GO:0005886 reviews). Abstract-only in cache.
existing_annotations:
  - term:
      id: GO:0140737
      label: encapsulin nanocompartment
    evidence_type: IDA
    original_reference_id: PMID:24855650
    qualifier: located_in
    review:
      summary: >-
        ACCEPT (core). Direct structural/biochemical demonstration that Rv0798c is
        the M. tuberculosis encapsulin shell.
      action: ACCEPT
      reason: >-
        Contreras et al. show by co-purification and EM that Mt-Enc forms the
        nanocompartment and encapsulates Mt-DyP, Mt-BfrB and Mt-FolB. This is the
        strongest evidence for the term and the true intracellular localization.
      supported_by:
        - reference_id: PMID:24855650
          supporting_text: >-
            For the first time, we show by co-purification and electron microscopy
            that mycobacteria via Mt-Enc can encapsulate Mt-DyP, Mt-BfrB, and
            Mt-FolB.
  - term:
      id: GO:0140737
      label: encapsulin nanocompartment
    evidence_type: IBA
    original_reference_id: GO_REF:0000033
    qualifier: is_active_in
    review:
      summary: >-
        ACCEPT. Phylogenetic annotation from the encapsulin PANTHER family; this
        gene is itself an experimental seed of the inference.
      action: ACCEPT
      reason: >-
        The IBA propagates from PANTHER node PTN002201532 with I6WZG6 and Q9WZP2
        as the experimental with/from leaves, so the localization is directly
        supported here. The is_active_in qualifier is acceptable for a structural
        shell protein that constitutes the compartment.
  - term:
      id: GO:0140737
      label: encapsulin nanocompartment
    evidence_type: IEA
    original_reference_id: GO_REF:0000120
    qualifier: located_in
    review:
      summary: >-
        ACCEPT. Automated UniProt annotation to the encapsulin nanocompartment;
        correct but redundant with the IDA and IBA evidence.
      action: ACCEPT
      reason: >-
        Combined multi-method IEA mapping to GO:0140737. Correct localization,
        redundant with the experimental annotations.
  - term:
      id: GO:0005576
      label: extracellular region
    evidence_type: EXP
    original_reference_id: PMID:9596740
    qualifier: located_in
    review:
      summary: >-
        KEEP_AS_NON_CORE. Real but secondary/context-dependent extracellular
        detection; the core localization is the intracellular encapsulin.
      action: KEEP_AS_NON_CORE
      reason: >-
        CFP29 was experimentally purified from short-term culture filtrate
        (PMID:9596740), and the protein is independently detected in host-cell
        exosomes during infection (PMID:20662102), so extracellular presence is
        genuine and I do not remove an experimental annotation. However, UniProt
        now attributes the culture-filtrate appearance to survival of the
        hyperstable nanocompartment through cell lysis ("apparent secretion",
        ECO:0000305), and GO:0140737 is by definition intracellular. The
        extracellular localization is therefore non-core relative to the
        encapsulin. Flagged for expert sign-off.
      supported_by:
        - reference_id: PMID:9596740
          supporting_text: >-
            CFP29 is present in both culture filtrate and the membrane fraction
            from M. tuberculosis, suggesting that this antigen is released from the
            envelope to culture filtrate during growth.
  - term:
      id: GO:0005576
      label: extracellular region
    evidence_type: IEA
    original_reference_id: GO_REF:0000044
    qualifier: located_in
    review:
      summary: >-
        KEEP_AS_NON_CORE. Keyword-derived duplicate of the extracellular EXP
        annotation; same non-core status as that term.
      action: KEEP_AS_NON_CORE
      reason: >-
        Generated by the UniProt SubCell-location mapping from the "Secreted"
        keyword, which traces to the pre-encapsulin CFP29 culture-filtrate work now
        regarded as apparent (lysis-driven) secretion. It adds no evidence beyond
        the EXP extracellular annotation and is kept at the same non-core status
        rather than as an independent localization; the core localization is the
        intracellular encapsulin.
  - term:
      id: GO:0005886
      label: plasma membrane
    evidence_type: EXP
    original_reference_id: PMID:9596740
    qualifier: located_in
    review:
      summary: >-
        KEEP_AS_NON_CORE. Experimentally detected in the membrane fraction, but
        secondary to the intracellular encapsulin.
      action: KEEP_AS_NON_CORE
      reason: >-
        CFP29 was detected in the M. tuberculosis membrane fraction
        (PMID:9596740) and UniProt annotates it as a peripheral membrane protein,
        so I retain the experimental annotation rather than removing it. This
        peripheral/membrane-fraction association is non-core relative to the
        cytoplasmic encapsulin nanocompartment and may reflect the same behaviour
        of a hyperstable cage during fractionation. Flagged for expert sign-off.
      supported_by:
        - reference_id: PMID:9596740
          supporting_text: >-
            CFP29 is present in both culture filtrate and the membrane fraction
            from M. tuberculosis, suggesting that this antigen is released from the
            envelope to culture filtrate during growth.
  - term:
      id: GO:0005886
      label: plasma membrane
    evidence_type: IEA
    original_reference_id: GO_REF:0000044
    qualifier: located_in
    review:
      summary: >-
        KEEP_AS_NON_CORE. Keyword-derived duplicate of the membrane EXP
        annotation; same non-core status as that term.
      action: KEEP_AS_NON_CORE
      reason: >-
        Generated by the UniProt SubCell-location mapping from the "Cell membrane"
        keyword; adds no evidence beyond the EXP membrane annotation and is kept at
        the same non-core status. The core localization is the cytoplasmic
        encapsulin nanocompartment.
  - term:
      id: GO:0005198
      label: structural molecule activity
    evidence_type: IDA
    original_reference_id: PMID:24855650
    review:
      summary: >-
        NEW (proposed). GOA annotates this protein only to cellular-component
        terms; its core molecular function is structural.
      action: NEW
      reason: >-
        Like all Type 1 encapsulins, the monomer's function is to oligomerize into
        the icosahedral proteinaceous shell that constitutes the nanocompartment
        (HK97-like capsid-derived fold), rather than to catalyze a reaction.
        GO:0005198 structural molecule activity captures this and fills the MF gap
        in the existing annotations.
      supported_by:
        - reference_id: PMID:24855650
          supporting_text: >-
            For the first time, we show by co-purification and electron microscopy
            that mycobacteria via Mt-Enc can encapsulate Mt-DyP, Mt-BfrB, and
            Mt-FolB.
core_functions:
  - description: >-
      Structural subunit that self-assembles into the intracellular T=1
      icosahedral encapsulin shell, forming the nanocompartment that packages
      antioxidant cargo enzymes (DyP, BfrB, FolB) for the oxidative-stress
      response.
    molecular_function:
      id: GO:0005198
      label: structural molecule activity
    locations:
      - id: GO:0140737
        label: encapsulin nanocompartment
    supported_by:
      - reference_id: PMID:24855650
        supporting_text: >-
          For the first time, we show by co-purification and electron microscopy
          that mycobacteria via Mt-Enc can encapsulate Mt-DyP, Mt-BfrB, and
          Mt-FolB.
      - reference_id: file:MYCTU/enc/enc-uniprot.txt
        supporting_text: >-
          Shell component of a type 1 encapsulin nanocompartment in situ; its cargo
          protects against oxidative stress at low pH.
suggested_questions:
  - question: >-
      Is the extracellular/membrane localization of Mt-Enc (CFP29) a dedicated,
      functionally meaningful export (e.g. via host exosomes during infection,
      PMID:20662102) or an artifact of the hyperstable nanocompartment surviving
      cell lysis? This determines whether GO:0005576/GO:0005886 should be retained
      as non-core, marked as over-annotations, or removed.
suggested_experiments:
  - description: >-
      Fractionate M. tuberculosis under conditions that control for autolysis
      (e.g. lysis-reporter normalization) and quantify Mt-Enc in cytoplasm vs
      membrane vs culture filtrate, to distinguish genuine peripheral-membrane
      association and export from lysis-driven redistribution of the stable cage.
    experiment_type: subcellular fractionation
