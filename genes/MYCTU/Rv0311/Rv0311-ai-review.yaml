id: O07238
gene_symbol: Rv0311
taxon:
  id: NCBITaxon:83332
  label: Mycobacterium tuberculosis H37Rv
description: 'A conserved hypothetical protein in Mycobacterium tuberculosis H37Rv
  that is essential for growth in minimal media and during infection. An automated
  PROSITE intein signature (PS00881) match prompted a predicted intein / autoproteolytic
  peptidase function, but structural and sequence analysis refutes this: the protein
  has no intein catalytic residues, no intein domain in any database, no intein-like
  fold, and is a standalone gene rather than an intervening sequence embedded in a host
  protein. Localizes to the cell envelope and is exported via a signal peptide. Required
  for bacterial virulence, particularly in central nervous system infections. Despite
  being well-conserved across mycobacteria, its precise molecular function remains
  unknown.

  '
references:
  - id: file:MYCTU/Rv0311/Rv0311-hypotheses/intein-catalytic-blocks/openscientist.md
    title: 'OpenScientist hypothesis run: Rv0311 intein / peptidase catalytic-block check'
    findings:
      - statement: Refutes the predicted intein-mediated protein splicing (GO:0016539)
          and autoproteolytic peptidase (GO:0008233) functions; Rv0311 lacks all intein
          catalytic residues, has no intein domain or fold, and is a standalone gene,
          so the PROSITE PS00881 match is a historical false positive.
        supporting_text: 'no structural similarity to any known intein fold (Foldseek: zero intein matches among 660 structural hits)'
  - id: PMID:9634230
    title: Deciphering the biology of Mycobacterium tuberculosis from the 
      complete genome sequence
    findings: []
  - id: PMID:21969609
    title: Proteogenomic analysis of Mycobacterium tuberculosis by high 
      resolution mass spectrometry
    findings:
      - statement: Rv0311 protein is detected in multiple cellular fractions 
          including membrane and culture filtrates
        supporting_text: we identified 3176 proteins from Mycobacterium 
          tuberculosis representing ∼80% of its total predicted gene count
  - id: file:MYCTU/Rv0311/Rv0311-deep-research.md
    title: Deep Research Report for Rv0311 gene function analysis
    findings:
      - statement: Rv0311 contains a protein splicing signature motif suggesting
          intein-like activity
        supporting_text: Rv0311's sequence contains a conserved protein splicing
          (intein) signature (PROSITE pattern PS00881) ... includes key residues
          typically required for protein splicing
      - statement: Rv0311 is essential for growth in minimal media but not in 
          rich media
        supporting_text: Sassetti et al. (2003) found Rv0311 as essential for 
          growth in vitro (on minimal medium 7H10 agar) ... DeJesus et al. 
          (2017) with enriched media reported Rv0311 as non-essential under rich
          laboratory conditions
      - statement: Rv0311 is required for virulence particularly in CNS 
          infections
        supporting_text: Be et al. (2008) found an insertion mutant in the 
          Rv0311 ortholog that was significantly attenuated in the brain of mice
          (a model of TB meningitis)
      - statement: Rv0311 is regulated by stress response factors SigH and WhiB5
        supporting_text: ChIP-Seq analyses have identified transcription factors
          that bind near the Rv0311 promoter ... SigH (Rv3223c) ... WhiB5 
          (Rv0022c)
