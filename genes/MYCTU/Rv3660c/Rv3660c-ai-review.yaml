- term:
    id: GO:0051782
    label: negative regulation of cell division
  evidence_type: IMP
  original_reference_id: PMID:21504606
  review:
    summary: Overexpression of Rv3660c/Ssd inhibits cell division in both
      M. smegmatis and M. tuberculosis, resulting in filamentous cells.
      This effect links septum regulation to cell cycle arrest and is
      associated with induction of the dormancy regulon. The protein
      functions as a negative regulator of cell division through inhibition
      of septum formation.
    action: NEW
    reason: The filamentation phenotype on Ssd overexpression directly
      demonstrates negative regulation of cell division. This is further
      supported by the connection to dormancy regulon induction, which is
      associated with cell cycle arrest in M. tuberculosis.
