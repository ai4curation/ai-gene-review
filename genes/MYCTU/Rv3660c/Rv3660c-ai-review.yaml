taxon:
  id: NCBITaxon:83332
  label: Mycobacterium tuberculosis (strain ATCC 25618 / H37Rv)
description: Rv3660c encodes the septum site determining protein Ssd, a member of
  the ParA/MinD-like WACA (Walker A Cytoskeletal ATPase) family. Ssd inhibits division
  septum formation in M. tuberculosis; overexpression leads to filamentous cells devoid
  of septa, while transposon disruption produces minicells. Ssd is functionally distinct
  from the true E. coli MinD homologue in M. tuberculosis (Rv1708). Increased Ssd
  expression induces the dormancy (Dos) regulon and alternative sigma factors (SigF,
  SigG, SigH, SigI, SigL, SigM), establishing the first reported link between a septum
  regulatory protein and the adaptive metabolic response associated with non-replicating
  persistence and virulence. The protein contains an N-terminal CheY-like domain (protein
  interaction module) and a C-terminal ParA/MinD ATPase domain with a deviant Walker
  A motif. Essential for growth.
