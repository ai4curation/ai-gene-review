existing_annotations:
- term:
    id: GO:0005524
    label: ATP binding
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: IBA annotation for ATP binding inferred from PANTHER phylogeny (PTN000344128,
      with E. coli MinD P0AEZ3 as reference). Rv3660c contains a conserved deviant
      Walker A motif within its P-loop NTPase domain (IPR027417, IPR050625). While
      direct ATP binding has not been demonstrated for Rv3660c itself, ATPase activity
      was confirmed for MSMEG_3743 (the M. smegmatis orthologue of Rv1708, a paralog
      in the same PANTHER family). The domain architecture strongly supports ATP binding
      capacity.
    action: ACCEPT
    reason: The P-loop NTPase domain with Walker A motif is well conserved in Rv3660c.
      Although direct biochemical evidence for Rv3660c ATP binding is lacking, the
      domain architecture and membership in the ParA/MinD ATPase family (IPR050625)
      strongly support this annotation.
    supported_by:
    - reference_id: PMID:37526955
      supporting_text: MSMEG_3743 displayed ATPase activity, consistent with its containing
        a conserved Walker A motif
    - reference_id: file:MYCTU/Rv3660c/Rv3660c-deep-research-bioreason-sft.md
      supporting_text: The P-loop core (IPR050625 with IPR027417) confers ATP binding
        and ATPase activity, enabling nucleotide-controlled assembly and disassembly
        cycles
- term:
    id: GO:0016887
    label: ATP hydrolysis activity
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: IBA annotation for ATP hydrolysis activity inferred from PANTHER phylogeny.
      Rv3660c has the conserved P-loop NTPase fold and Walker A/B motifs characteristic
      of ParA/MinD ATPases. ATPase activity was demonstrated for the M. smegmatis
      orthologue MSMEG_3743 (Rv1708 family). However, the Walker A motif in Rv3660c
      is classified as a deviant Walker A, and direct ATPase activity for Rv3660c
      has not been experimentally confirmed.
    action: ACCEPT
    reason: The deviant Walker A motif and ParA/MinD ATPase domain architecture support
      ATP hydrolysis capacity. The IBA transfer from the PANTHER family is appropriate
      given the conserved catalytic residues, though direct demonstration of Rv3660c
      ATPase activity would strengthen this annotation.
    supported_by:
    - reference_id: PMID:37526955
      supporting_text: MSMEG_3743 displayed ATPase activity, consistent with its containing
        a conserved Walker A motif
- term:
    id: GO:0005829
    label: cytosol
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: IBA annotation for cytosolic localization inferred from PANTHER phylogeny
      (reference protein E. coli MinD P0AEZ3). Rv3660c/Ssd is expected to be a soluble
      cytosolic protein based on the absence of transmembrane domains and its membership
      in the ParA/MinD family of soluble ATPases. The UniProt record also carries
      an HDA annotation from MTBBASE for cytosol. Functional data showing that Ssd
      expression modulates transcription of the dormancy regulon is consistent with
      cytoplasmic localization.
    action: ACCEPT
    reason: Cytosolic localization is consistent with Ssd being a soluble ParA/MinD-like
      ATPase that functions in septum site determination and regulation of gene expression.
      Both IBA and HDA evidence support this.
    supported_by:
    - reference_id: PMID:21504606
      supporting_text: Transcriptional mapping in M. tuberculosis showed that increased
        ssd expression elicited a unique response including the dormancy regulon and
        alternative sigma factors that are thought to play a role in adaptive metabolism
- term:
    id: GO:0009898
    label: cytoplasmic side of plasma membrane
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: IBA annotation for cytoplasmic side of plasma membrane, transferred from
      E. coli MinD (P0AEZ3) via PANTHER phylogeny. E. coli MinD oscillates between
      the cytosol and the cytoplasmic face of the inner membrane via its C-terminal
      membrane targeting sequence. However, Rv3660c is not the true MinD homologue
      in M. tuberculosis (that is Rv1708), and Kishore et al. 2023 showed structural
      divergence between Rv3660c and E. coli MinD, particularly the unique N-terminal
      domain. There is no experimental evidence for membrane association of Rv3660c/Ssd.
    action: MARK_AS_OVER_ANNOTATED
    reason: This annotation is transferred from E. coli MinD, which has a characterized
      membrane targeting sequence for inner membrane association. Rv3660c is a distinct
      Ssd-family protein, not the true MinD homologue (Rv1708 is). The structural
      analysis in Kishore et al. 2023 showed that the Rv3660c structure differs significantly
      from E. coli MinD, with an N-terminal extension absent in MinD. No experimental
      evidence supports membrane localization for Rv3660c. The IBA transfer may be
      inappropriate for this specific localization feature.
    supported_by:
    - reference_id: PMID:37526955
      supporting_text: Comparative structural analyses showed Rv1708 to be closer
        in similarity to Ec MinD than Rv3660c
