suggested_questions:
- question: Does Rv3660c/Ssd have direct ATPase activity, and if so, is it stimulated
    by a specific activating partner analogous to MinE?
  experts:
  - Tirumalai R Raghunand
  - Richard A Slayden
- question: What is the direct mechanism by which Ssd inhibits FtsZ polymerization
    - does it interact directly with FtsZ or act through an intermediary?
  experts:
  - Tirumalai R Raghunand
- question: Is the link between Ssd expression and dormancy regulon induction direct
    (Ssd acts as a transcriptional regulator) or indirect (downstream consequence
    of cell division arrest)?
  experts:
  - Richard A Slayden
  - Kathleen England
suggested_experiments:
- hypothesis: Rv3660c/Ssd possesses intrinsic ATPase activity mediated by its deviant
    Walker A motif
  description: Express and purify recombinant Rv3660c and measure ATPase activity
    in vitro using a malachite green phosphate release assay, with and without potential
    activating partners from the same genomic neighborhood.
  experiment_type: biochemical assay
- hypothesis: Ssd directly interacts with FtsZ to inhibit its polymerization
  description: Perform bacterial two-hybrid or co-immunoprecipitation experiments
    to test for direct Ssd-FtsZ interaction in M. tuberculosis. If positive, use light
    scattering assays to measure FtsZ polymerization kinetics in the presence and
    absence of purified Ssd.
  experiment_type: protein-protein interaction
- hypothesis: The dormancy regulon induction by Ssd is an indirect consequence of
    cell division arrest rather than direct transcriptional regulation
  description: Compare transcriptional profiles of Ssd overexpression with those of
    other cell division inhibitors (e.g., SulA) to determine whether the dormancy
    response is specific to Ssd or a general consequence of division arrest. Use a
    catalytically dead Ssd Walker A mutant to test whether ATPase activity is required
    for the transcriptional response.
  experiment_type: transcriptomics
