proposed_new_terms: []
suggested_questions:
- question: >-
    What are the specific in vivo substrates of ClpP1P2 beyond the anti-sigma
    factors RseA and RsdA? A comprehensive substrate identification study would
    illuminate the full scope of ClpP1P2 regulatory functions.
- question: >-
    What is the molecular basis for the toxicity of clpP2 overexpression but
    not clpP1 overexpression? Does excess ClpP2 form aberrant complexes or
    titrate away essential partners?
  experts:
  - Ollinger J
  - Parish T
- question: >-
    How does the functional asymmetry between ClpP1 and ClpP2 catalytic sites
    affect substrate processing in vivo? Are there substrates preferentially
    processed by one active site over the other?
  experts:
  - Nagpal J
suggested_experiments:
- description: >-
    Trap-and-release proteomics using catalytically inactive ClpP1P2 mutants
    to identify the full set of in vivo substrates in different growth conditions
    (exponential, stationary, stress).
  hypothesis: >-
    ClpP1P2 has a broader substrate repertoire than currently known, including
    regulators of virulence and persistence programs.
- description: >-
    Characterization of clpP2 overexpression toxicity mechanism using
    proteomics and genetic suppressor analysis.
  hypothesis: >-
    Excess ClpP2 may form aberrant homomeric complexes or deplete ClpP1
    from functional heterocomplexes, disrupting proteostasis.
