core_functions:
- description: >-
    Serine-type endopeptidase that forms the proteolytic core of the essential
    ClpP1P2 heterotetradecameric protease complex. ClpP2 provides one of the
    two heptameric rings (with ClpP1 providing the other) of the barrel-shaped
    proteolytic chamber. Uses a Ser-His-Asp catalytic triad (Ser110, His135)
    to cleave peptide bonds, with preference for leucine and methionine at the
    P1 position. The complex requires AAA+ ATPase partners (ClpC1 or ClpX) for
    substrate unfolding and delivery. ClpX binds specifically to the ClpP2 ring.
    Functions in protein quality control (degradation of misfolded proteins) and
    regulated proteolysis of anti-sigma factors (RseA, RsdA) to activate stress-
    responsive transcriptional programs. Essential for M. tuberculosis viability.
  supported_by:
  - reference_id: PMID:22286948
    supporting_text: "reconstitute an active, mixed ClpP1P2 complex after identifying N-blocked dipeptides that stimulate dramatically (>1000-fold) ClpP1P2 activity"
  - reference_id: PMID:25759383
    supporting_text: "we show that ClpP1P2 prefers Met ≫ Leu > Phe > Ala in the X1 position"
  - reference_id: PMID:25933022
    supporting_text: "both Mycobacterium tuberculosis Clp chaperones require the intact interaction face of ClpP2 to support degradation"
  - reference_id: PMID:22123255
    supporting_text: "clpP2 overexpression was toxic, suggesting different roles for the two homologs"
