id: P9WKP5
gene_symbol: Rv0898c
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:83332
  label: Mycobacterium tuberculosis (strain ATCC 25618 / H37Rv)
description: >-
  A small (87 aa) conserved hypothetical protein of unknown function in
  Mycobacterium tuberculosis H37Rv. Contains a single DUF2630 domain
  (Pfam PF10944, InterPro IPR020311) spanning nearly the entire protein.
  Detected at the protein level by mass spectrometry in whole cell lysates.
  Non-essential for in vitro growth. mRNA is upregulated after 96 hours
  of nutrient starvation, suggesting a possible role in stress adaptation,
  but no molecular function has been established for Rv0898c or any member
  of the DUF2630 family.
references:
  - id: PMID:9634230
    title: Deciphering the biology of Mycobacterium tuberculosis from the
      complete genome sequence
    findings:
      - statement: Rv0898c was identified in the complete genome sequence of
          M. tuberculosis H37Rv
        supporting_text: The genome comprises 4,411,529 base pairs, contains
          around 4,000 genes, and has a very high guanine + cytosine content
  - id: PMID:21969609
    title: Proteogenomic analysis of Mycobacterium tuberculosis by high
      resolution mass spectrometry
    findings:
      - statement: Rv0898c protein was detected by high-resolution mass
          spectrometry, confirming it is expressed at the protein level
        supporting_text: we identified 3176 proteins from Mycobacterium
          tuberculosis representing ~80% of its total predicted gene count
  - id: PMID:28096490
    title: Comprehensive Essentiality Analysis of the Mycobacterium
      tuberculosis Genome via Saturating Transposon Mutagenesis
    findings:
      - statement: Rv0898c is non-essential for in vitro growth of M.
          tuberculosis based on saturating transposon mutagenesis
        supporting_text: This work provides an authoritative catalog of
          essential regions of the M. tuberculosis genome
  - id: PMID:11929527
    title: Evaluation of a nutrient starvation model of Mycobacterium
      tuberculosis persistence by gene and protein expression profiling
    findings:
      - statement: Starvation induces a persistence-like state in M.
          tuberculosis with upregulation of specific gene sets
        supporting_text: we have generated a model with which we can search
          for agents active against persistent M. tuberculosis and revealed a
          number of potential targets expressed under these conditions
  - id: PMID:21905117
    title: Mycobacterium tuberculosis Rv0899 defines a family of membrane
      proteins widespread in nitrogen-fixing bacteria
    findings:
      - statement: The neighboring gene Rv0899 is part of the arf operon
          (Rv0899-Rv0901) required for ammonia secretion, but Rv0898c is on
          the opposite strand and is NOT part of this operon
        supporting_text: the rv0899 gene is part of an operon (rv0899-rv0901)
          that is required for fast ammonia secretion, pH neutralization, and
          growth of M
  - id: file:MYCTU/Rv0898c/Rv0898c-notes.md
    title: Research notes for Rv0898c
    findings:
      - statement: Rv0898c mRNA is upregulated after 96h of starvation
          per MycoBrowser annotation
      - statement: Rv0898c is detected in whole cell lysates but not in
          culture filtrate or membrane fractions
      - statement: No publications in PubMed specifically about Rv0898c
          function exist
