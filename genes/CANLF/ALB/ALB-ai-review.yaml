  label: Canis lupus familiaris
description: >-
  Serum albumin of the dog, the allergen Can f 3. The most abundant plasma protein
  and the archetypal multi-ligand transport protein of the ALB/AFP/VDB family: it
  binds and carries water, metal ions (zinc, calcium, magnesium, sodium, potassium),
  fatty acids, hormones, bilirubin and many drugs, and its principal physiological
  role is regulation of the colloidal osmotic pressure of blood. It is the major
  plasma zinc transporter and a major calcium/magnesium transporter, and it
  sequesters the bacterial siderophore enterobactin, contributing to nutritional
  immunity. As an allergen, Can f 3 is a minor, cross-reactive component responsible
  for cross-sensitization between mammalian serum albumins.
