core_functions:
- description: >-
    Major plasma multi-ligand transport protein: binds and carries fatty acids,
    metal ions (zinc, calcium, magnesium), hormones, bilirubin and drugs in blood,
    and through its high abundance regulates the colloidal osmotic pressure of blood.
    Fatty acid binding is the prototypical molecular activity.
