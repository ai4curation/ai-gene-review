  label: Canis lupus familiaris
description: >-
  CNNM4 (Cyclin and CBS Domain Divalent Metal Cation Transport Mediator 4) is a
  multi-pass transmembrane protein belonging to the ancient conserved domain protein
  (ACDP) family. The 796-amino-acid protein contains a signal peptide, an N-terminal
  immunoglobulin-like domain, a CNNM transmembrane domain with four transmembrane
  helices, a cystathionine-beta-synthase (CBS) domain pair that binds Mg2+-ATP, and
  a C-terminal cyclic nucleotide binding homology (CNBH) domain. CNNM4 functions
  as a magnesium efflux transporter at the basolateral membrane of epithelial cells,
  mediating Mg2+ extrusion from cells. In mammals, CNNM4 is expressed in intestinal
  epithelial cells where it is critical for magnesium homeostasis. The protein has
  also been reported to have sodium ion transmembrane transporter activity. Mutations
  in the human ortholog cause Jalili syndrome, characterized by cone-rod dystrophy
  and amelogenesis imperfecta. CNNM4 forms oligomeric complexes and its transport
  activity is regulated by intracellular Mg2+-ATP binding to the CBS domain pair.
existing_annotations:
- term:
    id: GO:0005886
    label: plasma membrane
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: is_active_in
  review:
    summary: >-
      Phylogenetic annotation placing CNNM4 as active in the plasma membrane, based
      on ortholog data from mouse and human CNNM family members as well as C. elegans
      and Drosophila orthologs. CNNM4 is a multi-pass transmembrane protein with four
      transmembrane helices in the CNNM domain (residues 178-358). The UniProt record
      confirms cell membrane localization. Human CNNM4 localizes to the basolateral
      plasma membrane of intestinal epithelial cells.
    action: ACCEPT
    reason: >-
      Plasma membrane localization is well established for CNNM4 orthologs. The protein
      has a signal peptide and four transmembrane helices, consistent with an integral
      plasma membrane protein. The IBA annotation is supported by multiple ortholog
      sources including mouse and human CNNM4.
- term:
    id: GO:0010960
    label: magnesium ion homeostasis
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: involved_in
  review:
    summary: >-
      Phylogenetic annotation for involvement in magnesium ion homeostasis, based on
      orthologs including mouse Cnnm4 and human CNNM4. CNNM4 is a magnesium efflux
      transporter, and its role in Mg2+ homeostasis is well established. Loss-of-function
      mutations in human CNNM4 cause Jalili syndrome with hypomagnesemia as a feature,
      demonstrating the protein's critical role in systemic magnesium homeostasis.
    action: ACCEPT
    reason: >-
      Magnesium ion homeostasis is a core biological process for CNNM4. The protein
      directly mediates Mg2+ efflux, and its dysfunction leads to magnesium imbalance.
      This annotation is well supported by ortholog data.
- term:
    id: GO:0015081
    label: sodium ion transmembrane transporter activity
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: enables
  review:
    summary: >-
      Phylogenetic annotation for sodium ion transmembrane transporter activity based
      on mouse Cnnm4 ortholog data. Some studies have suggested that CNNM family members
      can mediate Na+ transport or that Mg2+ extrusion by CNNM proteins is coupled to
      Na+ influx. However, the primary and best-characterized transport activity of CNNM4
      is magnesium transport. The sodium transport activity may reflect a coupled or
      secondary activity rather than an independent transport function.
    action: UNDECIDED
    reason: >-
      The sodium ion transport activity of CNNM4 is less well established than its
      magnesium transport function. While some evidence supports Na+-coupled Mg2+ transport
      by CNNM family members, the mechanistic details remain debated and the sodium
      transport may be secondary to the primary Mg2+ efflux function. Without access
      to the primary experimental literature on this specific activity, marking as
      UNDECIDED is appropriate.
- term:
    id: GO:0015095
    label: magnesium ion transmembrane transporter activity
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: enables
  review:
    summary: >-
      Phylogenetic annotation for magnesium ion transmembrane transporter activity based
      on mouse Cnnm4 ortholog data. This is the primary characterized molecular function
      of CNNM4. The protein mediates Mg2+ efflux across the plasma membrane, and this
      activity is essential for intestinal magnesium absorption in mammals.
    action: ACCEPT
    reason: >-
      Magnesium ion transmembrane transporter activity is the core molecular function
      of CNNM4. This is well supported by experimental evidence in orthologs showing
      that CNNM4 mediates cellular Mg2+ extrusion. The IBA annotation correctly captures
      the primary function of this protein.
- term:
    id: GO:0015693
    label: magnesium ion transport
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: involved_in
  review:
    summary: >-
      Phylogenetic annotation for involvement in magnesium ion transport, based on mouse
      Cnnm4 ortholog data. CNNM4 directly mediates Mg2+ efflux, so involvement in
      magnesium ion transport is a direct consequence of its transporter activity.
    action: ACCEPT
    reason: >-
      Magnesium ion transport is a core biological process for CNNM4, directly reflecting
      its molecular function as a Mg2+ transporter. Well supported by ortholog evidence.
