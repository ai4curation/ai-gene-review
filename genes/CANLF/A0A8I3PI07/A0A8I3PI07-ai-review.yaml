- term:
    id: GO:0016020
    label: membrane
  evidence_type: IEA
  original_reference_id: GO_REF:0000104
  qualifier: located_in
  review:
    summary: >-
      UniRule-based annotation for membrane localization. This is an extremely broad
      cellular component term. CNNM4 is indeed an integral membrane protein with four
      transmembrane helices, but more specific CC terms (plasma membrane, basolateral
      plasma membrane) are already annotated.
    action: ACCEPT
    reason: >-
      While very broad, this annotation is not incorrect. CNNM4 is an integral membrane
      protein. More specific CC terms are already present (GO:0005886 plasma membrane,
      GO:0016323 basolateral plasma membrane).
- term:
    id: GO:0022857
    label: transmembrane transporter activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: >-
      Combined IEA annotation for transmembrane transporter activity based on PANTHER
      and UniRule. This is a broad parent term of the more specific magnesium and sodium
      ion transmembrane transporter activities. CNNM4 is a transmembrane transporter,
      so this is accurate but uninformative given the more specific MF annotations.
    action: KEEP_AS_NON_CORE
    reason: >-
      This is a valid but very general molecular function term. The more specific
      GO:0015095 (magnesium ion transmembrane transporter activity) better captures
      the core function. This broad term adds no information beyond what the specific
      terms already provide.
- term:
    id: GO:0035725
    label: sodium ion transmembrane transport
  evidence_type: IEA
  original_reference_id: GO_REF:0000108
  qualifier: involved_in
  review:
    summary: >-
      Logical inference (IC) annotation for sodium ion transmembrane transport, derived
      from the sodium ion transmembrane transporter activity annotation (GO:0015081).
      This is a downstream inference -- if the protein enables sodium ion transmembrane
      transporter activity, it is logically involved in sodium ion transmembrane transport.
    action: UNDECIDED
    reason: >-
      This annotation is logically derived from GO:0015081 (sodium ion transmembrane
      transporter activity). Since the sodium transporter activity annotation itself
      is UNDECIDED due to limited evidence for CNNM4 sodium transport, this derived
      annotation inherits the same uncertainty.
