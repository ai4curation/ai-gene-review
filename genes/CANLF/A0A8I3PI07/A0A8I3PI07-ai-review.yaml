- term:
    id: GO:0016323
    label: basolateral plasma membrane
  evidence_type: IEA
  original_reference_id: GO_REF:0000107
  qualifier: located_in
  review:
    summary: >-
      Ensembl Compara ortholog transfer annotation for basolateral plasma membrane
      localization, based on mouse ortholog Q69ZF7 (Cnnm4). Human and mouse CNNM4
      localizes specifically to the basolateral plasma membrane of intestinal epithelial
      cells, where it mediates Mg2+ efflux into the interstitial space. This is the
      most specific and informative CC annotation for CNNM4.
    action: ACCEPT
    reason: >-
      Basolateral plasma membrane localization is well established for mammalian CNNM4.
      The protein mediates vectorial Mg2+ transport from the apical to basolateral side
      of intestinal epithelial cells, and its basolateral localization is essential for
      this function. This is the most informative cellular component annotation and
      represents the primary site of CNNM4 activity.
- term:
    id: GO:0030003
    label: intracellular monoatomic cation homeostasis
  evidence_type: IEA
  original_reference_id: GO_REF:0000107
  qualifier: involved_in
  review:
    summary: >-
      Ensembl Compara annotation for intracellular monoatomic cation homeostasis, based
      on human ortholog Q6P4Q7. CNNM4 mediates Mg2+ efflux and thereby contributes to
      intracellular cation homeostasis. This is a broader parent term of magnesium ion
      homeostasis.
    action: KEEP_AS_NON_CORE
    reason: >-
      This is a valid but broad biological process annotation. CNNM4 contributes to
      intracellular cation homeostasis primarily through its Mg2+ efflux activity. The
      more specific GO:0010960 (magnesium ion homeostasis) better captures the core
      function.
- term:
    id: GO:0032991
    label: protein-containing complex
  evidence_type: IEA
  original_reference_id: GO_REF:0000107
  qualifier: part_of
  review:
    summary: >-
      Ensembl Compara annotation indicating CNNM4 is part of a protein-containing
      complex, based on human ortholog Q6P4Q7. CNNM family members are known to form
      oligomeric complexes (likely dimers or trimers) and to interact with phosphatases
      of regenerating liver (PRL/PTP4A) family members. However, the term
      protein-containing complex is extremely broad and uninformative.
    action: KEEP_AS_NON_CORE
    reason: >-
      While CNNM4 does form oligomeric complexes and interacts with PRL phosphatases,
      the term protein-containing complex is too broad to be informative. A more specific
      complex term would be needed to capture the meaningful biology. Keeping as non-core
      rather than removing since the protein does indeed participate in complexes.
