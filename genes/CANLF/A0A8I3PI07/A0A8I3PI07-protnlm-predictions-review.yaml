id: A0A8I3PI07
gene_symbol: CNNM4
taxon:
  id: NCBITaxon:9615
  label: Canis lupus familiaris
status: COMPLETE
description: >-
  ProtNLM2 predicted 3 GO terms for dog CNNM4 (Cyclin and CBS Domain Divalent Metal
  Cation Transport Mediator 4), a magnesium efflux transporter belonging to the ACDP
  family. All three predictions are correct at a superficial level but less precise than
  existing curated annotations, earning LSP assessments. GO:0005886 (plasma membrane)
  captures that CNNM4 is a plasma membrane protein but misses the biologically
  informative basolateral plasma membrane (GO:0016323) localization that is essential for
  its vectorial Mg2+ transport function in intestinal epithelium. GO:0022857
  (transmembrane transporter activity) is a broad parent of the protein's core molecular
  function, magnesium ion transmembrane transporter activity (GO:0015095), and fails to
  distinguish CNNM4 from any other transporter. GO:0006811 (monoatomic ion transport) is
  a generic biological process term that subsumes the specific magnesium ion transport
  (GO:0015693) and magnesium ion transmembrane transport (GO:1903830) processes that
  define CNNM4's physiology. None of the predictions capture the distinctive biology of
  CNNM4 -- its role as a Mg2+-ATP-regulated magnesium efflux transporter, its basolateral
  polarization, its association with Jalili syndrome, or its interaction with PRL/PTP4A
  phosphatases. Assessment: 0 correct novel, 0 incorrect, 3 less precise (LSP). Total
  CS = 6/6.
source_documents:
  - genes/CANLF/A0A8I3PI07/A0A8I3PI07-uniprot.txt
  - genes/CANLF/A0A8I3PI07/A0A8I3PI07-goa.tsv
  - genes/CANLF/A0A8I3PI07/A0A8I3PI07-ai-review.yaml
predictions:
  - source_method: ProtNLM2
    source_version: UniProt 2024_06 pilot
    predicted_term:
      id: GO:0005886
      label: plasma membrane
    predicted_term_type: GO_CC
    review:
      assessment: LSP
      confidence_score: 2
      summary: >-
        GO:0005886 (plasma membrane) is already present as an existing GOA annotation
        for CNNM4 (both IBA via GO_Central and IEA via Ensembl/PANTHER). The prediction
        is correct -- CNNM4 is an integral plasma membrane protein with a signal peptide
        and four transmembrane helices in the CNNM domain (residues 178-358). However,
        this term is less precise than the most informative cellular component annotation
        already in GOA: basolateral plasma membrane (GO:0016323), which was transferred
        from the mouse ortholog Q69ZF7 via Ensembl Compara. The basolateral localization
        is biologically critical because CNNM4 mediates vectorial Mg2+ efflux from the
        cytoplasm into the interstitial space at the basolateral surface of intestinal
        epithelial cells. This polarized localization is essential for transcellular
        magnesium absorption -- apical entry via TRPM6/TRPM7 channels followed by
        basolateral exit via CNNM4. The generic plasma membrane term fails to capture
        this functionally important membrane domain specificity. The prediction also
        qualifies as CNN (correct but not novel) since GO:0005886 is already annotated
        in GOA, but LSP is the more informative assessment given the availability of the
        more specific GO:0016323 annotation.
  - source_method: ProtNLM2
    source_version: UniProt 2024_06 pilot
    predicted_term:
      id: GO:0022857
      label: transmembrane transporter activity
    predicted_term_type: GO_MF
    review:
      assessment: LSP
      confidence_score: 2
      summary: >-
        GO:0022857 (transmembrane transporter activity) is already present as an existing
        GOA annotation for CNNM4 (IEA via PANTHER/UniRule combined annotation,
        GO_REF:0000120), and was marked KEEP_AS_NON_CORE in the curated review precisely
        because more specific molecular function annotations exist. The protein's core
        molecular function is magnesium ion transmembrane transporter activity
        (GO:0015095), established by IBA and IEA annotations and confirmed by the
        curated review as the primary function. CNNM4 mediates Mg2+ efflux regulated by
        intracellular Mg2+-ATP binding to its CBS domain pair. GO:0022857 is an ancestor
        of GO:0015095 in the GO hierarchy, so while technically correct, it adds no
        functional information beyond what a sequence-based prediction of "this is some
        kind of transporter" would provide. The prediction fails to distinguish CNNM4
        from any of the hundreds of other transmembrane transporters encoded in
        mammalian genomes, and does not capture the magnesium specificity, efflux
        directionality, or ATP-sensing regulatory mechanism that define this protein.
      error_type: FREQUENCY_BIAS
  - source_method: ProtNLM2
    source_version: UniProt 2024_06 pilot
    predicted_term:
      id: GO:0006811
      label: monoatomic ion transport
    predicted_term_type: GO_BP
    review:
      assessment: LSP
      confidence_score: 2
      summary: >-
        GO:0006811 (monoatomic ion transport) is a broad biological process term that
        encompasses many specific ion transport processes. CNNM4 has multiple more
        specific BP annotations already in GOA: magnesium ion transport (GO:0015693,
        IBA and IEA), magnesium ion transmembrane transport (GO:1903830, IEA via logical
        inference), and magnesium ion homeostasis (GO:0010960, IBA and IEA). The task
        description notes this as an EXACT match to GO:0035725 (sodium ion transmembrane
        transport), but the curated review marks the sodium transport annotations as
        UNDECIDED because the Na+ transport activity of CNNM4 is less well established
        than its primary Mg2+ efflux function -- the sodium transport may reflect a
        coupled or secondary mechanism rather than an independent transport activity.
        Regardless, GO:0006811 is a parent term of all these more specific processes
        and fails to capture the defining biology of CNNM4: its role as a magnesium
        efflux transporter critical for systemic Mg2+ homeostasis, whose loss of
        function causes Jalili syndrome (cone-rod dystrophy with amelogenesis imperfecta)
        in humans. The prediction is uninformatively generic.
      error_type: FREQUENCY_BIAS
