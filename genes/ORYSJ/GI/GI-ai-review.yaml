id: Q9AWL7
gene_symbol: GI
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:39947
  label: Oryza sativa subsp. japonica
description: >
  OsGI (GIGANTEA; UniProt Q9AWL7; Os01g0182600 / LOC_Os01g08700) is the rice ortholog of
  the plant-specific GIGANTEA-family protein, a large (1160 aa) circadian-clock-associated
  regulator. Review literature describes GIGANTEA proteins as lacking well-defined conserved
  catalytic domains, so OsGI's role is regulatory rather than enzymatic: it couples clock and
  light/photoperiod signaling to developmental and physiological outputs, most prominently the
  timing of the floral transition (heading date). The experimental basis is direct: transgenic
  overexpression of OsGI caused late flowering under both short-day (SD) and long-day (LD)
  conditions, increased expression of the rice CONSTANS orthologue (Hd1), and suppressed the
  rice FLOWERING LOCUS T orthologue (Hd3a), establishing OsGI as an upstream regulator of the
  conserved rice photoperiod module OsGI-Hd1-Hd3a (Hayama et al. 2003, PMID:12700762). Review
  syntheses place OsGI upstream of Hd1 and the florigens Hd3a/RFT1, with photoperiod-dependent
  behaviour (under SD OsGI activates Hd1/Ehd1 to promote Hd3a and flowering; under LD Hd1
  represses Hd3a), and note photoreceptor input (OsPhyA regulating OsGI under SD)
  (file:ORYSJ/GI/GI-deep-research-falcon.md). At the systems level OsGI is a large-effect
  coordinator of the rice diurnal transcriptome: in a field time-course transcriptome study a
  null osgi mutant showed that Os-GI controlled 75% (FDR = 0.05; 57% at FDR 0.01) of 27,201
  genes tested and was required for strong amplitudes and fine-tuning of diurnal rhythm phases
  (Izawa et al. 2011, PMID:21571948), with osgi mutants collapsing into a simpler day-vs-night
  two-state transcriptome. OsGI is consistent with UniProt's FUNCTION statement ("Involved in
  regulation of circadian rhythm, and in the control of the photoperiodic flowering ...
  Activates Hd1/CONSTANS gene"). Its UniProt SwissProt keywords (Biological rhythms;
  Developmental protein; Differentiation; Flowering) generated three keyword-derived (SPKW,
  GO_REF:0000043) GO annotations - cell differentiation, flower development, and rhythmic
  process - that are reviewed retrospectively below as developmental/clock over-annotations of
  the "expression/regulation is not the bare process" type.
