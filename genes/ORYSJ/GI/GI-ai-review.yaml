# --- Current GOA annotations (2026 release) ---
- term:
    id: GO:0005634
    label: nucleus
  evidence_type: IEA
  original_reference_id: GO_REF:0000044
  qualifier: located_in
  review:
    summary: >
      IEA annotation from the UniProt SwissProt subcellular-location vocabulary mapping
      (GO_REF:0000044). GIGANTEA proteins are described in the literature as predominantly
      nuclear, consistent with a role in nuclear transcriptional/regulatory complexes; OsGI
      also carries this term as IBA from GO_Central.
    action: ACCEPT
    reason: >
      Consistent with UniProt (SUBCELLULAR LOCATION: Nucleus {ECO:0000250}, an inferred-by-
      similarity assignment) and with cross-species review literature, which describes GI as
      a nuclear protein and as predominantly nuclear with dynamic nucleo-cytoplasmic
      partitioning reported in Arabidopsis [file:ORYSJ/GI/GI-deep-research-falcon.md]. The
      deep-research report explicitly cautions that no direct rice OsGI localization
      experiment (e.g. OsGI-GFP imaging or fractionation) was found in the retrieved sources
      [file:ORYSJ/GI/GI-deep-research-falcon.md], so the rice-specific assignment rests on
      review-level/by-similarity evidence; it is also independently supported as an IBA
      (GO_Central) annotation in the UniProt GO cross-references (GO:0005634; IBA). Nucleus is
      an appropriate and conservative cellular-component annotation, so this term is ACCEPTed.
    supported_by:
    - reference_id: file:ORYSJ/GI/GI-deep-research-falcon.md
      supporting_text: "Cross-species reviews describe GI as **predominantly nuclear**, with
        dynamic nucleo-cytoplasmic partitioning reported in Arabidopsis"
    - reference_id: file:ORYSJ/GI/GI-deep-research-falcon.md
      supporting_text: "there is **no direct rice OsGI localization experiment** (e.g., OsGI–GFP
        imaging, fractionation) in the available excerpts"
- term:
    id: GO:2000028
    label: regulation of photoperiodism, flowering
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: involved_in
  review:
    summary: >
      IEA annotation from InterPro (IPR026211, GIGANTEA) mapping the GIGANTEA family to
      regulation of photoperiodic flowering. This is the single most accurate and core
      biological-process term for OsGI and is strongly supported by rice experimental and
      review literature.
    action: ACCEPT
    reason: >
      This is the core function of OsGI and is well supported by direct experimental evidence.
      Transgenic overexpression of OsGI caused late flowering under both SD and LD, increased
      expression of the rice CONSTANS orthologue (Hd1) and suppressed the rice FT orthologue
      (Hd3a), demonstrating that OsGI regulates the photoperiodic flowering pathway upstream of
      Hd1 (PMID:12700762). Review syntheses place OsGI upstream of Hd1 in the OsGI-Hd1-Hd3a
      module [file:ORYSJ/GI/GI-deep-research-falcon.md]. The InterPro2GO mapping gives the
      correct "regulation of" framing - OsGI regulates the photoperiodic flowering process
      rather than being a structural component of flowers - and is at an appropriate level of
      specificity. It directly captures the function UniProt describes ("control of the
      photoperiodic flowering ... Activates Hd1/CONSTANS gene"). This annotation is the correct
      replacement sense for the retired keyword-derived "flower development" SPKW term reviewed
      below.
    supported_by:
    - reference_id: PMID:12700762
      supporting_text: "Overexpression of OsGI, an orthologue of the Arabidopsis GIGANTEA (GI)
        gene in transgenic rice, caused late flowering under both SD and LD conditions.
        Expression of the rice orthologue of the Arabidopsis CONSTANS (CO) gene was increased
        in the transgenic rice, whereas expression of the rice orthologue of FLOWERING LOCUS T
        (FT) was suppressed."
    - reference_id: file:ORYSJ/GI/GI-deep-research-falcon.md
      supporting_text: "**OsGI (LOC_Os01g08700)** sits upstream of **Hd1** and contributes to
        the **OsGI–Hd1–Hd3a** pathway"
# --- SPKW keyword-mapping annotations (GO_REF:0000043) ---
# Present in the Sept 2025 goa_uniprot_gcrp snapshot (go-db plant.ddb); REMOVED from the
# current (2026) GOA release when GOA retired the keyword2GO pipeline for cellular organisms.
# Reviewed retrospectively to assess whether removal was justified. These three derive from
# the UniProt keywords "Differentiation"/"Developmental protein"/"Flowering"/"Biological
# rhythms" and are classic developmental/clock over-annotations of the "expression or
# regulation of a process is not the bare process itself" type.
- term:
    id: GO:0030154
    label: cell differentiation
  evidence_type: IEA
  original_reference_id: GO_REF:0000043
  retired: true
  review:
    summary: >
      SPKW (GO_REF:0000043) annotation derived from the UniProt keywords
      "Differentiation"/"Developmental protein"; snapshot-only, removed in the current GOA
      release. OsGI is a circadian-clock/photoperiodic-flowering regulator, not a cell-fate
      or differentiation factor.
    action: REMOVE
    reason: >
      GOA's removal of this annotation was JUSTIFIED. "Cell differentiation" is a generic
      catch-all process term assigned purely from the UniProt "Differentiation"/"Developmental
      protein" keywords (which themselves are loosely applied to flowering-time regulators
      because the floral transition is a developmental event). There is no evidence that OsGI
      controls the differentiation of any specific cell type. Its demonstrated roles are
      regulatory: it is a high-level coordinator of diurnal/circadian transcript rhythms and
      controls the TIMING of the floral transition via the OsGI-Hd1-Hd3a module
      [file:ORYSJ/GI/GI-deep-research-falcon.md] and is required for robust diurnal
      transcriptome rhythms (PMID:21571948). These are correctly captured by the
      circadian-regulation and photoperiodic-flowering terms (GO:0042752, GO:2000028) and do
      not entail a cell-differentiation function. The keyword-derived term adds no information
      and is an over-annotation; removal was correct.
    supported_by:
    - reference_id: file:ORYSJ/GI/GI-deep-research-falcon.md
      supporting_text: "OsGI is not an enzyme or transporter**; it is a regulatory protein
        whose primary functional annotation in rice is best described as"
    - reference_id: file:ORYSJ/GI/GI-deep-research-falcon.md
      supporting_text: "An upstream **photoperiod-pathway regulator** that impacts heading date
        through the **OsGI–Hd1–Hd3a** module and related pathways affecting the florigens
        **Hd3a** and **RFT1**"
- term:
    id: GO:0009908
    label: flower development
  evidence_type: IEA
  original_reference_id: GO_REF:0000043
  retired: true
  review:
    summary: >
      SPKW (GO_REF:0000043) annotation derived from the UniProt keyword "Flowering";
      snapshot-only, removed in the current GOA release. OsGI controls flowering TIME (the
      photoperiodic floral transition), not flower-organ development/morphogenesis, so the
      essence is sound but the term is mis-leveled.
    action: MODIFY
    reason: >
      GOA's removal of this annotation removed a term that was pointing at the right biology
      but at the wrong level/sense. OsGI does not participate in flower organ development or
      floral morphogenesis (it does not specify floral organ identity, build floral organs,
      etc.); rather, it REGULATES the decision/timing of flowering in response to photoperiod.
      "Flower development" (GO:0009908) is the bare developmental process and is therefore an
      over-broad mis-annotation of the ELF4 type (regulation of a process is not the process
      itself). The correct sense is "regulation of flower development" (GO:0009909) - or, more
      specifically, the photoperiodic-flowering-regulation term GO:2000028 that OsGI already
      carries in current GOA. OsGI acts upstream of Hd1 and the florigens Hd3a/RFT1, tuning
      flowering time rather than constructing the flower: overexpression delays flowering and
      changes Hd1/Hd3a (FT) expression (PMID:12700762), and review literature places it as an
      upstream component of the OsGI-Hd1-Hd3a photoperiod module
      [file:ORYSJ/GI/GI-deep-research-falcon.md]. Replace with the "regulation of"
      developmental term.
    proposed_replacement_terms:
    - id: GO:0009909
      label: regulation of flower development
    supported_by:
    - reference_id: PMID:12700762
      supporting_text: "Overexpression of OsGI, an orthologue of the Arabidopsis GIGANTEA (GI)
        gene in transgenic rice, caused late flowering under both SD and LD conditions."
    - reference_id: file:ORYSJ/GI/GI-deep-research-falcon.md
      supporting_text: "An upstream **photoperiod-pathway regulator** that impacts heading date
        through the **OsGI–Hd1–Hd3a** module and related pathways affecting the florigens
        **Hd3a** and **RFT1**"
- term:
    id: GO:0048511
    label: rhythmic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000043
  retired: true
  review:
    summary: >
      SPKW (GO_REF:0000043) annotation derived from the UniProt keyword "Biological rhythms";
      snapshot-only, removed in the current GOA release. OsGI is genuinely a clock-associated
      protein, but "rhythmic process" is an uninformative top-level grouping term that is
      redundant with the specific circadian-regulation terms OsGI should carry.
    action: MARK_AS_OVER_ANNOTATED
    reason: >
      GOA's removal of this annotation was JUSTIFIED. OsGI IS clock-associated - its own
      transcript oscillates with a circadian rhythm (UniProt INDUCTION: highest level 8 hours
      into the light, lowest at dawn; ECO PubMed:12040096) and a null osgi mutant disrupts
      diurnal rhythms across most of the rice transcriptome (PMID:21571948) - so the term is
      not factually wrong. However, "rhythmic process" (GO:0048511) is a broad parent that
      conveys no information about WHAT OsGI does: this same keyword-derived term was found to
      be 100% over-annotated in the human SPKW subproject. The informative, specific biology is
      captured by "regulation of circadian rhythm" (GO:0042752, an IBA term OsGI already
      carries per UniProt) and, for the transcriptome-wide effect, "circadian regulation of
      gene expression" (GO:0032922, proposed below). Once those specific regulation terms are
      present, the bare "rhythmic process" grouping is redundant and uninformative; marking it
      over-annotated/removing it loses no biology.
    supported_by:
    - reference_id: PMID:21571948
      supporting_text: "Os-GI controlled 75% (false discovery rate = 0.05) of genes among
        27,201 genes tested and was required for strong amplitudes and fine-tuning of the
        diurnal rhythm phases of global gene expression in the field."
    - reference_id: file:ORYSJ/GI/GI-deep-research-falcon.md
      supporting_text: "OsGI affected expression of **75% of 27,201 genes** at FDR 0.05 (and
        57% at FDR 0.01) in field conditions, and was required for strong rhythm amplitudes and
        fine-tuning of phases"
# --- NEW annotations proposed from the literature ---
- term:
    id: GO:0042752
    label: regulation of circadian rhythm
  evidence_type: IBA
  original_reference_id: GO_REF:0000043
  review:
    summary: >
      OsGI regulates the circadian clock: it is required for robust diurnal rhythms of the
      rice transcriptome and modulates core clock genes. This specific regulation term (also
      assigned IBA across the GIGANTEA group in UniProt) is the informative replacement for
      the retired generic "rhythmic process" SPKW term and is proposed as a current annotation.
    action: NEW
    reason: >
      OsGI is a circadian-clock-associated regulator. UniProt's FUNCTION statement is
      "Involved in regulation of circadian rhythm", and the rice field-transcriptome study used
      a null osgi mutant to show that Os-GI controlled 75% of 27,201 genes and was required for
      strong amplitudes and fine-tuning of the diurnal rhythm phases of global gene expression,
      demonstrating that OsGI is required for normal circadian rhythmicity (PMID:21571948).
      "Regulation of circadian rhythm" (GO:0042752) is the correct specific process term and
      precisely captures the biology that the over-broad "rhythmic process" keyword term only
      gestured at. (This term is present as IBA in the UniProt GO cross-references but is not
      in the GOA tsv supplied for review.)
    supported_by:
    - reference_id: PMID:21571948
      supporting_text: "using a newly isolated rice circadian clock-related mutant carrying a
        null mutation in Os-GIGANTEA (Os-GI), we show here that Os-GI controlled 75% (false
        discovery rate = 0.05) of genes among 27,201 genes tested and was required for strong
        amplitudes and fine-tuning of the diurnal rhythm phases of global gene expression in
        the field."
    - reference_id: file:ORYSJ/GI/GI-deep-research-falcon.md
      supporting_text: "A **core regulator of diurnal/circadian control of gene expression**
        under natural field conditions, influencing the amplitude and phase coordination of
        large-scale transcript rhythms"
- term:
    id: GO:0032922
    label: circadian regulation of gene expression
  evidence_type: IMP
  original_reference_id: GO_REF:0000043
  review:
    summary: >
      OsGI confers robust circadian/diurnal control on global gene expression in rice. Loss
      of OsGI changes the rhythmic expression of a majority of the transcriptome, supporting
      this specific process term.
    action: NEW
    reason: >
      The landmark field study showed that a null osgi mutant revealed Os-GI controlled 75%
      (FDR = 0.05; 57% at FDR 0.01) of 27,201 genes tested and that OsGI was required for
      strong amplitudes and fine-tuning of the diurnal rhythm phases of global gene expression
      (PMID:21571948); a follow-up reported Os-GI affects gene expression of more than half of
      genes on the rice 44k microarray (PMID:22101345). This large-effect, genome-wide control
      of rhythmic transcription is precisely "circadian regulation of gene expression"
      (GO:0032922) and is the most specific process capturing the transcriptome-wide diurnal
      role that the retired "rhythmic process" keyword term failed to convey. IMP is justified
      by the osgi loss-of-function transcriptome phenotype.
    supported_by:
    - reference_id: PMID:21571948
      supporting_text: "Os-GI controlled 75% (false discovery rate = 0.05) of genes among
        27,201 genes tested and was required for strong amplitudes and fine-tuning of the
        diurnal rhythm phases of global gene expression in the field."
    - reference_id: PMID:22101345
      supporting_text: "Time-course global transcriptome analyses of leaves from wild-type and
        osgi mutant grown in the field have revealed that Os-GI affects gene expression of more
        than half of genes on rice 44k microarray."
references:
- id: GO_REF:0000002
  title: Gene Ontology annotation through association of InterPro records with GO terms
  findings:
  - statement: The InterPro2GO mapping for IPR026211 (GIGANTEA) assigns "regulation of
      photoperiodism, flowering" (GO:2000028), the single most accurate core process term
      for OsGI.
- id: GO_REF:0000043
  title: Gene Ontology annotation based on UniProtKB/Swiss-Prot keyword mapping
  findings:
  - statement: SwissProt keyword-derived (SPKW) annotations present in the Sept 2025
      goa_uniprot_gcrp snapshot but removed from the current GOA release after GOA retired
      the keyword2GO pipeline for cellular organisms.
  - statement: For OsGI, the keywords "Differentiation"/"Developmental protein", "Flowering"
      and "Biological rhythms" produced generic/mis-leveled process terms (cell
      differentiation, flower development, rhythmic process) that are over-annotations of a
      flowering-time/circadian regulator.
- id: GO_REF:0000044
  title: Gene Ontology annotation based on UniProtKB/Swiss-Prot Subcellular Location vocabulary
    mapping, accompanied by conservative changes to GO terms applied by UniProt
  findings:
  - statement: Maps the UniProt "Nucleus" subcellular location (an ECO:0000250 by-similarity
      assignment) to GO:0005634; consistent with review-level description of GI as a
      predominantly nuclear protein. OsGI also carries GO:0005634 as IBA from GO_Central.
- id: PMID:12700762
  title: Adaptation of photoperiodic control pathways produces short-day flowering in rice.
  findings:
  - statement: Transgenic overexpression of OsGI caused late flowering under both SD and LD
      conditions; the rice CONSTANS orthologue (Hd1) was increased and the rice FLOWERING
      LOCUS T orthologue (Hd3a) was suppressed, establishing OsGI as an upstream regulator of
      the photoperiodic flowering pathway. This is the experimental basis for the UniProt
      FUNCTION statement.
- id: PMID:12040096
  title: Isolation of rice genes possibly involved in the photoperiodic control of flowering
    by a fluorescent differential display method.
  findings:
  - statement: The rice GIGANTEA homolog OsGI is under circadian-clock control, and its
      expression patterns are similar to those of Arabidopsis GI, indicating conservation of
      photoperiodic-flowering mechanisms between the two species.
- id: PMID:21571948
  title: Os-GIGANTEA confers robust diurnal rhythms on the global transcriptome of rice in
    the field.
  findings:
  - statement: Using a null osgi mutant in field time-course transcriptomics, Os-GI controlled
      75% (FDR = 0.05) of 27,201 genes tested and was required for strong amplitudes and
      fine-tuning of diurnal rhythm phases of global gene expression. Primary metabolism, net
      photosynthesis and grain yield were not greatly affected, but phenylpropanoid-pathway
      transcripts/metabolites were consistently affected.
- id: PMID:22101345
  title: A study of phytohormone biosynthetic gene expression using a circadian clock-related
    mutant in rice.
  findings:
  - statement: A null osgi mutant (the solo ortholog of Arabidopsis GI) affects expression of
      more than half of genes on the rice 44k microarray; GA2-oxidase (gibberellin-inactivating)
      genes were markedly increased in osgi-1, and osgi-1 plants showed a semi-dwarf phenotype,
      indicating OsGI maintains bioactive GA levels via regulation of GA-deactivating genes.
- id: file:ORYSJ/GI/GI-deep-research-falcon.md
  title: Deep-research report (falcon / Edison Scientific Literature) - functional annotation
    of rice GI / GIGANTEA (Q9AWL7).
  findings:
  - statement: OsGI (Os01g0182600 / LOC_Os01g08700; UniProt Q9AWL7) is a circadian-regulated
      GIGANTEA-family protein whose primary function is regulatory - coordinating diurnal/
      circadian transcript rhythms and controlling photoperiodic flowering (heading date) -
      rather than enzymatic; the report notes GI lacks well-defined conserved catalytic
      domains.
  - statement: Review syntheses place OsGI upstream of Hd1 in the OsGI-Hd1-Hd3a photoperiod
      module affecting the florigens Hd3a and RFT1, with photoperiod-dependent behaviour (under
      SD OsGI activates Hd1/Ehd1 to promote Hd3a and flowering; under LD Hd1 represses Hd3a),
      and note OsPhyA regulating OsGI under SD. (The report does NOT contain rice Ghd7-binding,
      26S-proteasome degradation, or OsPHO2/phosphate content; such claims were removed from
      this review as unsupported by the cited sources.)
  - statement: In Izawa et al. (2011), OsGI affected expression of 75% of 27,201 genes at FDR
      0.05 (57% at FDR 0.01) in field conditions and was required for strong rhythm amplitudes
      and fine-tuning of phases, with osgi mutants collapsing into a simpler day-vs-night
      two-state transcriptome.
  - statement: Cross-species reviews describe GI as predominantly nuclear with dynamic
      nucleo-cytoplasmic partitioning reported in Arabidopsis; the report explicitly notes that
      NO direct rice OsGI localization experiment (e.g. OsGI-GFP imaging, fractionation) was
      found in the retrieved sources, so rice localization rests on review/by-similarity
      evidence.
core_functions:
- description: >
    OsGI controls the timing of the floral transition (heading date) in response to
    photoperiod. As an upstream component of the conserved rice photoperiod module
    OsGI-Hd1-Hd3a, it regulates flowering time: transgenic overexpression delays flowering
    under both short and long days, increases the rice CONSTANS orthologue (Hd1) and suppresses
    the rice FT orthologue (Hd3a). This is a regulatory (flowering-time) role, not flower-organ
    morphogenesis. GIGANTEA proteins lack well-defined conserved catalytic domains; OsGI acts
    as a clock-associated regulatory protein, so no specific molecular function term is
    asserted (the uninformative "protein binding" is deliberately avoided).
  directly_involved_in:
  - id: GO:2000028
    label: regulation of photoperiodism, flowering
  locations:
  - id: GO:0005634
    label: nucleus
  supported_by:
  - reference_id: PMID:12700762
    supporting_text: "Overexpression of OsGI, an orthologue of the Arabidopsis GIGANTEA (GI)
      gene in transgenic rice, caused late flowering under both SD and LD conditions.
      Expression of the rice orthologue of the Arabidopsis CONSTANS (CO) gene was increased in
      the transgenic rice, whereas expression of the rice orthologue of FLOWERING LOCUS T (FT)
      was suppressed."
  - reference_id: file:ORYSJ/GI/GI-deep-research-falcon.md
    supporting_text: "**OsGI (LOC_Os01g08700)** sits upstream of **Hd1** and contributes to
      the **OsGI–Hd1–Hd3a** pathway"
- description: >
    OsGI is a circadian-clock-associated regulator that confers robust diurnal/circadian
    rhythms on the rice transcriptome: a null osgi mutant controlled 75% of 27,201 genes
    tested and was required for strong amplitudes and fine-tuning of diurnal rhythm phases of
    global gene expression. It functions as a high-level coordinator of timed gene expression
    rather than as a single enzymatic clock component. As above, OsGI lacks a recognized
    catalytic domain and no specific molecular function term is asserted.
  directly_involved_in:
  - id: GO:0042752
    label: regulation of circadian rhythm
  - id: GO:0032922
    label: circadian regulation of gene expression
  locations:
  - id: GO:0005634
    label: nucleus
  supported_by:
  - reference_id: PMID:21571948
    supporting_text: "Os-GI controlled 75% (false discovery rate = 0.05) of genes among 27,201
      genes tested and was required for strong amplitudes and fine-tuning of the diurnal rhythm
      phases of global gene expression in the field."
  - reference_id: file:ORYSJ/GI/GI-deep-research-falcon.md
    supporting_text: "A **core regulator of diurnal/circadian control of gene expression**
      under natural field conditions, influencing the amplitude and phase coordination of
      large-scale transcript rhythms"
proposed_new_terms: []
suggested_questions:
- question: Is rice OsGI a direct transcriptional regulator of Hd1, or does it act primarily
    through post-translational control of partners such as Ghd7 and via FKF1-type complexes,
    given that GI lacks recognized DNA-binding/catalytic domains?
  experts:
  - Takeshi Izawa
- question: How is the dual, photoperiod-dependent behavior of OsGI (promoting flowering under
    short days but inhibiting it under long days) encoded mechanistically at the level of the
    OsGI-Hd1-Hd3a/RFT1 and OsGI-Ghd7 branches?
  experts:
  - Haiyang Wang
- question: Is the OsGI-OsPHO2 interaction a genuine in vivo coupling of flowering time to
    phosphate homeostasis, and does it operate through OsGI's nuclear or cytoplasmic pool?
  experts:
  - Huixia Shou
suggested_experiments:
- description: Perform time-course ChIP-seq and proximity-labeling (TurboID) on OsGI under
    short-day and long-day conditions to define its direct chromatin associations and protein
    interactome at the clock/photoperiod interface, distinguishing direct transcriptional
    targets from post-translational partners.
  hypothesis: OsGI controls flowering time and clock outputs predominantly through protein
    complexes (e.g. with Hd1, Ghd7, FKF1-type factors) rather than through direct sequence-
    specific DNA binding.
  experiment_type: ChIP-seq + proximity-labeling interactome
- description: Generate osgi loss-of-function and OsGI-overexpression lines and quantify
    flowering time, Hd1/Ehd1/Hd3a/RFT1/Ghd7 expression, and Ghd7 protein levels under
    controlled short-day vs long-day photoperiods, with and without phytochrome mutations.
  hypothesis: OsGI promotes flowering under short days and represses it under long days by
    photoperiod-dependent destabilization of Ghd7 that is antagonized by OsPHYA/OsPHYB.
  experiment_type: genetic / photoperiod physiology with protein-stability assay
- description: Assay the circadian period, amplitude and phase of core clock reporters and
    genome-wide diurnal transcription in osgi versus wild type under constant conditions and
    field-like cycles.
  hypothesis: OsGI is required for robust amplitude and fine-tuning of circadian gene
    expression genome-wide, and its loss broadly dampens/desynchronizes diurnal rhythms.
  experiment_type: circadian luciferase reporter + diurnal RNA-seq
