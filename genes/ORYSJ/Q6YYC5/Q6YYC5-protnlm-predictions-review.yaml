  label: Oryza sativa subsp. japonica
status: COMPLETE
description: >-
  ProtNLM2 predicted 2 GO term(s) for E3 ubiquitin-protein ligase Os08g0135400 (RGLG family).
  Both predictions are more specific refinements of existing GOA annotations. The E3 ligase
  activity prediction (GO:0061630) is a well-supported refinement of GO:0004842, as the RING
  finger domain is diagnostic of E3 ligases rather than E2 conjugating enzymes; assessed as
  CNN since the distinction is already apparent from domain architecture and was independently
  identified in the main ai-review. The K63-linked ubiquitination prediction (GO:0070534)
  is plausible based on Arabidopsis RGLG2 ortholog data but uncertain, because ubiquitin
  chain-type linkage specificity is determined by the E2 conjugating enzyme partner, not the
  E3 ligase alone, and no experimental data exist for Q6YYC5 itself.
  Assessment: 1 correct (CNN), 1 uncertain (UNC), 0 incorrect (NPI/PLI).
