    label: cortical endoplasmic reticulum
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: is_active_in
  review:
    summary: >
      IBA annotation: XA21 is present in the cortical ER, reflecting ER biogenesis/quality
