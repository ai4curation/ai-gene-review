  label: Oryza sativa subsp. japonica
description: CASP-like protein 1B1 (OsCASPL1B1) is a small tetraspan plasma-membrane protein of the CASP-like
  (CASPL) subfamily (CASPL1B/1D clade) of the MARVEL-related Casparian strip membrane domain protein family.
  Arabidopsis members of this clade (AtCASPL1B1/1B2/1D1/1D2) are expressed in suberized endodermal cells
  and interact with the aquaporin PIP2;1, implicating the clade in endodermal suberization and aquaporin-mediated
  water-transport modulation. OsCASPL1B1 itself is uncharacterized.
