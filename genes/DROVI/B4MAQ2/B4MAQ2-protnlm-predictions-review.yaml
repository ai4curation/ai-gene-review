      summary: >-
        Upgraded from UNC to COR. An independent OpenScientist investigation (see file
        reference) identifies B4MAQ2 as Exportin-5, an importin-beta-family
        nucleocytoplasmic transport receptor (85.5% identity to the experimentally
        characterized D. melanogaster ortholog). Cytoplasmic localization is correct --
        Exportin-5 has an obligatory cytoplasmic phase in its transport cycle, so
        GO:0005737 is factually valid and novel relative to GOA -- but under-informative:
        it collapses a Ran-GTP-binding shuttle (carrying pre-miRNAs, tRNAs and certain
        proteins) to a single generic CC term. Curation lead: a fuller annotation would add
        the nucleus/nuclear envelope, nucleocytoplasmic transport, and exportin /
        Ran-GTPase-binding molecular function. Caveat: no direct experimental data exist for
        B4MAQ2 itself; the attribution rests on strong orthology, and exportin-5 cargo
        preferences diverge across species, so specifics should be annotated conservatively.
