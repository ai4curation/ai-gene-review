  qualifier: enables
  review:
    summary: WormBase curated an experimental (IDA) mRNA 3'-UTR-binding activity for MEX-6
      citing PMID:17264081. That paper's abstract characterizes the biochemistry of the
      near-identical paralog MEX-5 (poly-U tracts abundant in C. elegans 3'-UTRs); the mex-6
      IDA reflects the curator's reading of the full text. MEX-6 has the same tandem CCCH
      zinc-finger RNA-binding module, so 3'-UTR binding is biologically expected.
    action: ACCEPT
    reason: mRNA 3'-UTR binding is a genuine, core molecular function of this TZF protein and
      is curated as experimental for mex-6. Per project guidelines I defer to the curator
      rather than REMOVE an experimental annotation because the cached abstract foregrounds
      the paralog MEX-5.
    supported_by:
    - reference_id: PMID:17264081
      supporting_text: This sequence is remarkably abundant in the 3'-untranslated region
        of C. elegans transcripts
