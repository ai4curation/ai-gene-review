id: Q09545
gene_symbol: sdhb-1
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:6239
  label: Caenorhabditis elegans
description: >-
  SDHB-1 is the iron-sulfur protein (Ip) subunit of mitochondrial succinate dehydrogenase
  (Complex II, EC 1.3.5.1) in C. elegans. As part of Complex II, it functions at the
  intersection of the tricarboxylic acid (TCA) cycle and the mitochondrial electron transport
  chain, catalyzing the oxidation of succinate to fumarate with concomitant reduction of
  ubiquinone to ubiquinol. SDHB-1 contains three iron-sulfur clusters (2Fe-2S, 3Fe-4S, and
  4Fe-4S) that mediate electron transfer from the FAD cofactor of the flavoprotein subunit
  (SDHA) to the ubiquinone reduction site at the membrane-anchoring subunits (SDHC/SDHD).
  The protein localizes to the mitochondrial inner membrane on the matrix side as a peripheral
  membrane protein. Mutations near the ubiquinone-binding site (Pro211) cause hypersensitivity
  to oxidative stress, superoxide overproduction, impaired respiration, and premature aging
  (PMID:19233206). The C. elegans sdhb-1 is orthologous to human SDHB, where mutations cause
  paraganglioma and pheochromocytoma.

existing_annotations:
- term:
    id: GO:0009060
    label: aerobic respiration
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      SDHB-1 is a core subunit of Complex II, which links the TCA cycle to the mitochondrial
      electron transport chain. Aerobic respiration is a direct and central biological process
      for this gene. The IBA annotation is well-supported by phylogenetic inference across
      multiple model organisms.
    action: ACCEPT
    reason: >-
      Complex II (succinate dehydrogenase) is an essential component of aerobic respiration,
      functioning in both the TCA cycle and the electron transport chain. Mutations in sdhb-1
      cause impaired respiration (PMID:19233206). This is a core function annotation at an
      appropriate level of specificity.
    supported_by:
    - reference_id: PMID:19233206
      supporting_text: >-
        Mutant phenotypes ranged from relatively benign to lethal and were characterized by
        hypersensitivity to oxidative stress, a shortened life span, impaired respiration and
        overproduction of superoxide.

- term:
    id: GO:0022904
    label: respiratory electron transport chain
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      SDHB-1 transfers electrons from succinate (via the flavoprotein subunit) through its
      iron-sulfur clusters to ubiquinone at the inner mitochondrial membrane. This is the
      electron transport chain function of Complex II.
    action: ACCEPT
    reason: >-
      The iron-sulfur subunit is directly responsible for electron transfer within Complex II,
      from the FAD-containing flavoprotein subunit to the ubiquinone reduction site. This is
      a core molecular role of SDHB-1. UniProt describes the protein as "responsible for
      transferring electrons from succinate to ubiquinone (coenzyme Q)."
    supported_by:
    - reference_id: PMID:19233206
      supporting_text: >-
        The mitochondrial succinate dehydrogenase (SDH) is an iron-sulfur flavoenzyme linking
        the Krebs cycle and the mitochondrial respiratory chain.

- term:
    id: GO:0031966
    label: mitochondrial membrane
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      SDHB-1 is a peripheral membrane protein of the mitochondrial inner membrane (matrix side).
      The IBA annotation to 'mitochondrial membrane' is correct but less specific than the
      ISS annotation to 'mitochondrial inner membrane' (GO:0005743).
    action: ACCEPT
    reason: >-
      While a more specific term (mitochondrial inner membrane) exists and is annotated
      separately, this IBA annotation is not incorrect. Complex II is anchored to the
      mitochondrial inner membrane, and the IBA reflects phylogenetic evidence at an
      appropriate level. The more specific ISS annotation complements this.
    supported_by:
    - reference_id: PMID:19233206
      supporting_text: >-
        The mitochondrial succinate dehydrogenase (SDH) is an iron-sulfur flavoenzyme linking
        the Krebs cycle and the mitochondrial respiratory chain.

- term:
    id: GO:0005739
    label: mitochondrion
  evidence_type: IEA
  original_reference_id: GO_REF:0000117
  review:
    summary: >-
      Mitochondrial localization is well established for SDHB-1 by multiple evidence lines
      including IDA (PMID:19233206) and HDA (PMID:20188671). This IEA annotation is
      consistent with the experimentally determined localization.
    action: ACCEPT
    reason: >-
      Correct but redundant with the IDA and HDA annotations for the same term. The IEA
      is consistent with experimental evidence and can be retained.

- term:
    id: GO:0005743
    label: mitochondrial inner membrane
  evidence_type: IEA
  original_reference_id: GO_REF:0000044
  review:
    summary: >-
      SDHB-1 localizes to the mitochondrial inner membrane as a peripheral membrane protein
      on the matrix side, consistent with its role in Complex II. UniProt annotates this
      subcellular location based on sequence similarity (ECO:0000250).
    action: ACCEPT
    reason: >-
      Complex II is embedded in the mitochondrial inner membrane, and the iron-sulfur subunit
      is a peripheral membrane protein on the matrix side. This is well supported by UniProt
      annotation and by the ISS annotation for the same term. This is a core localization
      for SDHB-1.

- term:
    id: GO:0006099
    label: tricarboxylic acid cycle
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  review:
    summary: >-
      Complex II catalyzes the oxidation of succinate to fumarate, which is step 6 of the
      TCA cycle. SDHB-1, as the iron-sulfur subunit, is essential for this reaction by
      mediating electron transfer from succinate to ubiquinone.
    action: ACCEPT
    reason: >-
      The TCA cycle is one of the two core biological processes of Complex II (the other
      being the respiratory electron transport chain). UniProt explicitly states the pathway:
      "Carbohydrate metabolism; tricarboxylic acid cycle; fumarate from succinate (eukaryal
      route): step 1/1." This is a core function annotation.
    supported_by:
    - reference_id: PMID:19233206
      supporting_text: >-
        The mitochondrial succinate dehydrogenase (SDH) is an iron-sulfur flavoenzyme linking
        the Krebs cycle and the mitochondrial respiratory chain.

- term:
    id: GO:0008177
    label: succinate dehydrogenase (quinone) activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  review:
    summary: >-
      This is the primary enzymatic activity of Complex II (EC 1.3.5.1), catalyzing the
      reaction: succinate + quinone -> fumarate + quinol. SDHB-1 contributes to this activity
      as a subunit of the complex. This IEA is consistent with the IDA annotation
      (PMID:15767563) for the same term with the contributes_to qualifier.
    action: ACCEPT
    reason: >-
      This is the defining molecular function of Complex II and a core annotation for SDHB-1.
      The IEA lacks the contributes_to qualifier that the IDA annotation appropriately uses,
      but both annotations for this term are acceptable.

- term:
    id: GO:0009055
    label: electron transfer activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: >-
      SDHB-1 contains three iron-sulfur clusters (2Fe-2S, 3Fe-4S, 4Fe-4S) that form an
      electron relay chain transferring electrons from FAD in the flavoprotein subunit to the
      ubiquinone reduction site. Electron transfer activity is a core molecular function.
    action: ACCEPT
    reason: >-
      The iron-sulfur subunit is the primary electron transfer component within Complex II.
      The InterPro domain IPR025192 (succinate dehydrogenase/fumarate reductase N-terminal)
      correctly maps to this function. This is one of the most specific and informative
      molecular function terms for SDHB-1.
    supported_by:
    - reference_id: PMID:19233206
      supporting_text: >-
        The mitochondrial succinate dehydrogenase (SDH) is an iron-sulfur flavoenzyme linking
        the Krebs cycle and the mitochondrial respiratory chain.

- term:
    id: GO:0016491
    label: oxidoreductase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: >-
      Oxidoreductase activity is a parent term of succinate dehydrogenase (quinone) activity.
      While correct, it is very broad. However, as an IEA mapping from InterPro, it is
      acceptable as a general classification.
    action: ACCEPT
    reason: >-
      This is a broad but correct classification. Complex II (EC 1.3.5.1) is indeed an
      oxidoreductase. The more specific term GO:0008177 (succinate dehydrogenase (quinone)
      activity) is also annotated, so this general term provides appropriate hierarchical
      coverage from the InterPro mapping.

- term:
    id: GO:0051536
    label: iron-sulfur cluster binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: >-
      SDHB-1 binds three distinct iron-sulfur clusters (2Fe-2S, 3Fe-4S, 4Fe-4S). This
      general term is a parent of the more specific cluster binding terms that are also
      annotated (GO:0051537, GO:0051538, GO:0051539).
    action: ACCEPT
    reason: >-
      Correct general term. Multiple InterPro domains support this annotation. The more
      specific child terms are annotated separately by ISS and IEA. This IEA provides
      appropriate hierarchical coverage.

- term:
    id: GO:0051537
    label: 2 iron, 2 sulfur cluster binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: >-
      SDHB-1 binds one 2Fe-2S cluster via the 2Fe-2S ferredoxin-type domain (residues 59-147).
      UniProt annotates four binding residues for this cluster (Cys107, Cys112, Cys115, Cys127).
    action: ACCEPT
    reason: >-
      Well supported by domain architecture (InterPro IPR006058, Pfam Fer2_3) and UniProt
      cofactor annotation. This is a core structural/functional property of the iron-sulfur
      subunit. Consistent with the ISS annotation for the same term.

- term:
    id: GO:0045273
    label: respiratory chain complex II (succinate dehydrogenase)
  evidence_type: ISS
  original_reference_id: GO_REF:0000024
  review:
    summary: >-
      SDHB-1 is one of the four subunits of Complex II. UniProt states it is "component of
      complex II composed of four subunits: a flavoprotein (FP), an iron-sulfur protein (IP),
      and a cytochrome b composed of a large and a small subunit."
    action: ACCEPT
    reason: >-
      This is the defining complex membership for SDHB-1 and one of the most important
      annotations. The ISS is based on transfer from ortholog Q007T0 (bovine SDHB), which
      is well characterized. This is a core annotation.
    supported_by:
    - reference_id: PMID:19233206
      supporting_text: >-
        The mitochondrial succinate dehydrogenase (SDH) is an iron-sulfur flavoenzyme linking
        the Krebs cycle and the mitochondrial respiratory chain.

- term:
    id: GO:0008177
    label: succinate dehydrogenase (quinone) activity
  evidence_type: IDA
  original_reference_id: PMID:15767563
  qualifier: contributes_to
  review:
    summary: >-
      This IDA annotation with the contributes_to qualifier correctly indicates that SDHB-1,
      as a subunit of the SDH complex, contributes to but does not independently carry out
      the succinate dehydrogenase (quinone) activity. PMID:15767563 (Rao et al. 2005)
      measured SDH activity in C. elegans mitochondrial extracts as a mitochondrial marker
      enzyme in the context of studying heme synthesis pathways.
    action: ACCEPT
    reason: >-
      The contributes_to qualifier is appropriate since SDH activity requires the full
      four-subunit complex. The IDA evidence from PMID:15767563 demonstrates measurable
      SDH activity in C. elegans, consistent with SDHB-1 contributing to this activity
      as the iron-sulfur subunit.
    supported_by:
    - reference_id: PMID:15767563
      supporting_text: >-
        Iron-deprived worms were unable to grow in the presence of adequate heme unless
        rescued by increasing heme levels in the growth medium.

- term:
    id: GO:0005739
    label: mitochondrion
  evidence_type: HDA
  original_reference_id: PMID:20188671
  review:
    summary: >-
      PMID:20188671 (Haynes et al. 2010) is a study on mitochondrial UPR signaling via
      HAF-1. SDHB-1 mitochondrial localization was likely identified through high-throughput
      proteomics or expression data associated with this study. The HDA evidence code
      indicates high-throughput direct assay.
    action: ACCEPT
    reason: >-
      Mitochondrial localization is well established for SDHB-1 and is consistent with the
      IDA annotation from PMID:19233206. The HDA from a mitochondrial biology study provides
      additional supporting evidence.
    supported_by:
    - reference_id: PMID:20188671
      supporting_text: >-
        Genetic analyses previously implicated the matrix-localized protease ClpP in signaling
        the stress of protein misfolding in the mitochondrial matrix to activate nuclear-encoded
        mitochondrial chaperone genes in C. elegans (UPR(mt)).

- term:
    id: GO:0005743
    label: mitochondrial inner membrane
  evidence_type: ISS
  original_reference_id: GO_REF:0000024
  review:
    summary: >-
      SDHB-1 is a peripheral membrane protein of the mitochondrial inner membrane, on the
      matrix side. The ISS is based on orthology to bovine SDHB (Q007T0), which has been
      experimentally localized to the inner membrane.
    action: ACCEPT
    reason: >-
      UniProt annotates the subcellular location as "Mitochondrion inner membrane; Peripheral
      membrane protein; Matrix side" (ECO:0000250). This is the most specific correct
      localization term for SDHB-1 and represents a core annotation. Consistent with the
      IEA annotation for the same term.

- term:
    id: GO:0048039
    label: ubiquinone binding
  evidence_type: ISS
  original_reference_id: GO_REF:0000024
  review:
    summary: >-
      SDHB-1 participates in ubiquinone binding at the interface with the membrane-anchoring
      subunits (SDHC/SDHD). UniProt annotates a ubiquinone binding residue at position 215,
      noted as "ligand shared with DHSD." The Pro211 residue near the ubiquinone reduction
      site is the site of mutations studied in PMID:19233206.
    action: ACCEPT
    reason: >-
      Ubiquinone binding is a core molecular function of SDHB-1. The UniProt feature table
      shows a ubiquinone binding site at residue 215, and PMID:19233206 demonstrates that
      mutations near this site (Pro211) have severe functional consequences including
      superoxide overproduction. The ISS from bovine ortholog Q007T0 is well supported.
    supported_by:
    - reference_id: PMID:19233206
      supporting_text: >-
        We created mutations in Pro211; this residue is located near the site of ubiquinone
        reduction and is conserved in human SDHB (Pro197), where it is associated with
        tumorigenesis.

- term:
    id: GO:0051537
    label: 2 iron, 2 sulfur cluster binding
  evidence_type: ISS
  original_reference_id: GO_REF:0000024
  review:
    summary: >-
      Duplicate of the IEA annotation for the same term. SDHB-1 binds one 2Fe-2S cluster
      via the ferredoxin-type domain. The ISS is based on orthology to bovine SDHB (Q007T0).
    action: ACCEPT
    reason: >-
      Well supported by domain architecture and UniProt cofactor annotation. The ISS evidence
      from the bovine ortholog provides stronger evidence than the IEA. Core structural
      property of the iron-sulfur subunit.

- term:
    id: GO:0051538
    label: 3 iron, 4 sulfur cluster binding
  evidence_type: ISS
  original_reference_id: GO_REF:0000024
  review:
    summary: >-
      SDHB-1 binds one 3Fe-4S cluster. UniProt annotates binding residues at positions 210,
      257, and 263 for this cluster. The 3Fe-4S cluster is part of the electron relay chain
      within the iron-sulfur subunit.
    action: ACCEPT
    reason: >-
      UniProt cofactor annotation states "Binds 1 [3Fe-4S] cluster" (ECO:0000250). This is
      a core structural and functional property. The ISS from bovine ortholog Q007T0 is
      appropriate given the high conservation of iron-sulfur cluster binding residues.

- term:
    id: GO:0051539
    label: 4 iron, 4 sulfur cluster binding
  evidence_type: ISS
  original_reference_id: GO_REF:0000024
  review:
    summary: >-
      SDHB-1 binds one 4Fe-4S cluster. UniProt annotates binding residues at positions 200,
      203, 206, and 267 for this cluster. The 4Fe-4S cluster is part of the electron relay
      chain within the iron-sulfur subunit.
    action: ACCEPT
    reason: >-
      UniProt cofactor annotation states "Binds 1 [4Fe-4S] cluster" (ECO:0000250). This is
      a core structural and functional property. The ISS from bovine ortholog Q007T0 is
      well supported by the conserved cysteine ligands in the 4Fe-4S ferredoxin-type domain
      (residues 190-220).

- term:
    id: GO:0005739
    label: mitochondrion
  evidence_type: IDA
  original_reference_id: PMID:19233206
  review:
    summary: >-
      PMID:19233206 (Huang and Lemire 2009) directly demonstrated mitochondrial localization
      of SDHB-1 in C. elegans. The study created mutations in sdhb-1 and characterized
      mutant phenotypes including impaired respiration, superoxide overproduction, and
      premature aging, all consistent with mitochondrial function.
    action: ACCEPT
    reason: >-
      This is the strongest evidence for mitochondrial localization, based on direct
      experimental assay (IDA) in C. elegans. This is a core localization annotation.
    supported_by:
    - reference_id: PMID:19233206
      supporting_text: >-
        Mutant phenotypes ranged from relatively benign to lethal and were characterized by
        hypersensitivity to oxidative stress, a shortened life span, impaired respiration and
        overproduction of superoxide.

references:
- id: GO_REF:0000002
  title: Gene Ontology annotation through association of InterPro records with GO terms
  findings: []
- id: GO_REF:0000024
  title: Manual transfer of experimentally-verified manual GO annotation data to orthologs
    by curator judgment of sequence similarity
  findings:
  - statement: >-
      ISS annotations transferred from bovine SDHB ortholog (Q007T0) for iron-sulfur cluster
      binding, ubiquinone binding, Complex II membership, and mitochondrial inner membrane
      localization.
- id: GO_REF:0000033
  title: Annotation inferences using phylogenetic trees
  findings:
  - statement: >-
      IBA annotations for aerobic respiration, respiratory electron transport chain, and
      mitochondrial membrane are based on phylogenetic inference across multiple model
      organisms including yeast, fly, mouse, and zebrafish orthologs.
- id: GO_REF:0000044
  title: Gene Ontology annotation based on UniProtKB/Swiss-Prot Subcellular Location
    vocabulary mapping, accompanied by conservative changes to GO terms applied by UniProt
  findings: []
- id: GO_REF:0000117
  title: Electronic Gene Ontology annotations created by ARBA machine learning models
  findings: []
- id: GO_REF:0000120
  title: Combined Automated Annotation using Multiple IEA Methods
  findings: []
- id: PMID:10743611
  title: Stage-specific isoforms of Ascaris suum complex II.
  findings:
  - statement: >-
      Amino et al. 2000 reported the cDNA sequence of C. elegans sdhb-1 (tag-55/F42A8.2)
      and showed that the iron-sulfur subunit is shared between the fumarate reductase of
      parasitic adults and the succinate dehydrogenase of free-living larvae in Ascaris suum.
    supporting_text: >-
      Stage-specific isoforms of Ascaris suum complex. II: The fumarate reductase of the
      parasitic adult and the succinate dehydrogenase of free-living larvae share a common
      iron-sulfur subunit.
- id: PMID:15767563
  title: Lack of heme synthesis in a free-living eukaryote.
  findings:
  - statement: >-
      Rao et al. 2005 demonstrated that C. elegans lacks de novo heme synthesis and must
      acquire heme from dietary sources. SDH activity was assayed as a mitochondrial marker
      enzyme, providing IDA evidence for SDHB-1 contributing to succinate dehydrogenase
      (quinone) activity.
    supporting_text: >-
      Iron-deprived worms were unable to grow in the presence of adequate heme unless
      rescued by increasing heme levels in the growth medium.
- id: PMID:19233206
  title: Mutations in the C. elegans succinate dehydrogenase iron-sulfur subunit promote
    superoxide generation and premature aging.
  findings:
  - statement: >-
      Huang and Lemire 2009 characterized mutations in the C. elegans sdhb-1 gene at
      Pro211, near the ubiquinone-binding site. Mutations caused impaired respiration,
      superoxide overproduction, oxidative stress hypersensitivity, shortened lifespan,
      and premature aging. The study demonstrated that the SDH ubiquinone-binding site can
      become a source of superoxide.
    supporting_text: >-
      Mutant phenotypes ranged from relatively benign to lethal and were characterized by
      hypersensitivity to oxidative stress, a shortened life span, impaired respiration and
      overproduction of superoxide.
- id: PMID:20188671
  title: The matrix peptide exporter HAF-1 signals a mitochondrial UPR by activating
    the transcription factor ZC376.7 in C. elegans.
  findings:
  - statement: >-
      Haynes et al. 2010 studied the mitochondrial unfolded protein response (UPRmt). SDHB-1
      was identified as mitochondrial-localized through high-throughput direct assay (HDA)
      in this study.
    supporting_text: >-
      Genetic analyses previously implicated the matrix-localized protease ClpP in signaling
      the stress of protein misfolding in the mitochondrial matrix to activate nuclear-encoded
      mitochondrial chaperone genes in C. elegans (UPR(mt)).

core_functions:
- description: >-
    SDHB-1 is the iron-sulfur subunit of mitochondrial Complex II (succinate dehydrogenase).
    It enables electron transfer activity through its three iron-sulfur clusters (2Fe-2S, 3Fe-4S,
    4Fe-4S), relaying electrons from the flavoprotein subunit to ubiquinone. As part of Complex II,
    it contributes to succinate dehydrogenase (quinone) activity (EC 1.3.5.1), linking the TCA
    cycle to the respiratory electron transport chain at the mitochondrial inner membrane.
  molecular_function:
    id: GO:0009055
    label: electron transfer activity
  contributes_to_molecular_function:
    id: GO:0008177
    label: succinate dehydrogenase (quinone) activity
  directly_involved_in:
  - id: GO:0006099
    label: tricarboxylic acid cycle
  - id: GO:0022904
    label: respiratory electron transport chain
  locations:
  - id: GO:0005743
    label: mitochondrial inner membrane
  in_complex:
    id: GO:0045273
    label: respiratory chain complex II (succinate dehydrogenase)
  supported_by:
  - reference_id: PMID:19233206
    supporting_text: >-
      The mitochondrial succinate dehydrogenase (SDH) is an iron-sulfur flavoenzyme linking
      the Krebs cycle and the mitochondrial respiratory chain.

suggested_questions:
- question: >-
    Has the specific SDH enzymatic activity been measured directly for purified C. elegans
    Complex II, as opposed to using it as a marker enzyme in whole-cell or mitochondrial
    extracts?

suggested_experiments:
- description: >-
    Purification and kinetic characterization of C. elegans Complex II, including measurement
    of succinate oxidation and ubiquinone reduction rates, and determination of iron-sulfur
    cluster EPR signatures. This would provide direct experimental evidence for the specific
    molecular functions currently annotated by ISS and IEA (electron transfer activity,
    iron-sulfur cluster binding, ubiquinone binding).
