  - id: PMID:31233739
    title: Fndc-1 contributes to paternal mitochondria elimination in C.
      elegans.
    reference_review:
      relevance: HIGH
      correctness: VERIFIED
      review_notes: >
        Abstract-only in cache but PubMed-verified (Lim et al., Dev Biol 2019). The
        defining primary paper for worm fndc-1: names it the C. elegans FUNDC1 ortholog,
        localizes it to the mitochondrial outer membrane, and shows loss of fndc-1 delays
        paternal-mitochondria degradation with paternal mtDNA persisting in cross-progeny.
        Supports the OMM (GO:0005741), mitophagy (GO:0000423) and proposed adaptor-activity
        (GO:0140580) annotations. Note the receptor/adaptor claim is genetic/phenotypic;
        the direct ATG8 interaction is not assayed here.
    findings:
      - statement: FNDC-1 is expressed in sperm but not oocytes
        supporting_text: >
          FNDC-1 is strongly expressed in sperm but not oocytes and contributes to
          paternal
          mitochondria elimination.
      - statement: FNDC-1 contributes to paternal mitochondria elimination
        supporting_text: >
          loss of fndc-1 retards the rate of paternal mitochondria degradation, but
          not that of
          membranous organelles, a nematode specific membrane compartment whose fusion
          is required
          for sperm motility.
      - statement: Loss of fndc-1 retards paternal mitochondria degradation
        supporting_text: >
          loss of fndc-1 retards the rate of paternal mitochondria degradation
      - statement: Paternal mtDNA detectable in fndc-1 mutant cross-progeny
        supporting_text: >
          Paternal mitochondrial DNA is normally undetectable in wildtype larva, but
          can be detected
          in the cross-progeny of fndc-1 mutant males.
      - statement: First ubiquitin-independent mitophagy receptor identified for
          sperm mitochondria degradation
        supporting_text: >
          This is the first example of a ubiquitin-independent mitophagy receptor
          playing a role
          in the selective degradation of sperm mitochondria.
  - id: PMID:33416042
    title: FNDC-1-mediated mitophagy and ATFS-1 coordinate to protect against
      hypoxia-reoxygenation.
    reference_review:
      relevance: HIGH
      correctness: VERIFIED
      review_notes: >
        Abstract-only in cache but PubMed-verified (Lim et al., Autophagy 2021).
        Independently confirms FNDC-1 as the C. elegans FUNDC1 ortholog and shows it
        mediates hypoxia-reoxygenation-induced mitophagy in body-wall muscle, with loss
        engaging an ATFS-1/UPRmt program that is protective. Supports the proposed
        cellular-response-to-hypoxia (GO:0071456) annotation and the mitophagy-receptor
        role. Mechanistic detail (mito-mKeima quantification, proteinase-K OMM topology) is
        in the full text, not the cached abstract.
    findings:
      - statement: FNDC-1 is the C. elegans ortholog of FUNDC1 and mediates 
          mitophagy under hypoxia-reoxygenation stress
        supporting_text: >
          FUNDC1 (FUN14 domain containing 1) is a mammalian mitophagy receptor that
          responds to
          hypoxia-reoxygenation (HR) stress. Here, we provide evidence that FNDC-1
          is the C. elegans
          ortholog of FUNDC1, and that its loss protects against injury in a worm
          model of HR.
      - statement: Loss of fndc-1 provides protection that depends on ATFS-1 and
          UPRmt
        supporting_text: >
          This protection depends upon ATFS-1, a transcription factor that is central
          to the
          mitochondrial unfolded protein response (UPRmt).
      - statement: FNDC-1 has a role in non-hypoxic mitochondrial quality 
          control
        supporting_text: >
          These data support a role for FNDC-1 in non-hypoxic MQC, and further suggest
          that these
          changes are prophylactic in relation to subsequent HR.

