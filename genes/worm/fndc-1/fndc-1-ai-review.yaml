id: Q22252
gene_symbol: fndc-1
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:6239
  label: Caenorhabditis elegans
description: >
  FNDC-1 is the Caenorhabditis elegans ortholog of mammalian FUNDC1 and a member of the
  conserved FUN14 family. It is a small (138-residue) multi-pass protein of the
  mitochondrial outer membrane. FNDC-1 acts as a receptor/adaptor for selective autophagy
  of mitochondria (mitophagy): loss of fndc-1 impairs mitochondrial clearance in two
  characterized contexts. First, in the early embryo it contributes to the elimination of
  sperm-derived (paternal) mitochondria after fertilization, providing a second,
  ubiquitin-independent route that acts redundantly with, and later than, an initial
  ubiquitination-dependent mechanism; loss of fndc-1 delays paternal-mitochondria
  degradation and allows paternal mitochondrial DNA to persist in cross-progeny. Second,
  in body-wall muscle it mediates mitophagy triggered by hypoxia-reoxygenation, and its
  loss engages an ATFS-1/UPRmt stress program that is protective against reoxygenation
  injury. By analogy to mammalian FUNDC1, FNDC-1 is expected to recruit autophagosomal
  ATG8/LC3 proteins (LGG-1/LGG-2 in the worm) through an LC3-interacting region (LIR)
  motif, but the LIR and a direct ATG8 interaction have not yet been demonstrated in
  C. elegans. FNDC-1 thus represents a receptor-mediated, ubiquitin-independent branch of
  mitochondrial quality control, distinct from the PINK-1/PDR-1 (PINK1/Parkin) pathway.
existing_annotations:
  - term:
      id: GO:0000422
      label: autophagy of mitochondrion
    evidence_type: IBA
    original_reference_id: GO_REF:0000033
    review:
      summary: >
        The IBA annotation for autophagy of mitochondrion is phylogenetically inferred
        and well-supported
        by experimental data in C. elegans. FNDC-1 mediates mitophagy under hypoxia-reoxygenation
        stress
        (PMID:33416042) and contributes to paternal mitochondria elimination (PMID:31233739,
        PMID:31153831).
        The term accurately captures FNDC-1's role in targeting mitochondria for autophagic
        degradation.
        As noted in fndc-1-deep-research-falcon.md, FNDC-1 is the C. elegans ortholog
        of mammalian FUNDC1.
      action: ACCEPT
      reason: >
        This annotation is strongly supported by multiple lines of evidence. The Lim
        et al. 2021 study
        (PMID:33416042) demonstrated that FNDC-1 mediates mitophagy under hypoxia-reoxygenation
        conditions,
        with fndc-1 loss-of-function significantly reducing the percentage of mitochondria
        undergoing
        mitophagy as measured by mito-mKeima reporter. The term GO:0000422 is appropriate
        as it encompasses
        the broader autophagic process for mitochondria without specifying the pathway
        (receptor vs. ubiquitin).
      additional_reference_ids:
        - PMID:33416042
        - PMID:31233739
        - file:worm/fndc-1/fndc-1-deep-research-falcon.md
      supported_by:
        - reference_id: PMID:31233739
          supporting_text: >
            Like FUNDC1, the C. elegans ortholog FNDC-1 is widely expressed in somatic
            tissues and
            mediates hypoxic mitophagy.
        - reference_id: PMID:31153831
          supporting_text: >
            If paternal mitochondria are not eliminated via this early process, they
            are eventually
            removed from the embryo in a process that depends on the mitophagy adaptor
            protein, fndc-1.
  - term:
      id: GO:0005741
      label: mitochondrial outer membrane
    evidence_type: IBA
    original_reference_id: GO_REF:0000033
    review:
      summary: >
        The IBA annotation for mitochondrial outer membrane localization is phylogenetically
        inferred
        and strongly supported by experimental evidence in C. elegans. Biochemical
        fractionation and
        proteinase K accessibility assays confirm FNDC-1 localizes to the OMM (PMID:31233739,
        PMID:33416042).
      action: ACCEPT
      reason: >
        This annotation is well-supported by direct experimental evidence. The Lim
        et al. 2019 study
        (PMID:31233739) describes FNDC-1 as "expressed on the mitochondrial outer
        membrane" consistent
        with its role as a mitophagy receptor. Subsequent studies confirmed this localization
        through
        biochemical fractionation and proteinase K sensitivity assays. The FUN14 family
        proteins are
        characteristically OMM-localized, and FNDC-1 follows this conserved pattern.
      additional_reference_ids:
        - PMID:31233739
        - PMID:33416042
      supported_by:
        - reference_id: PMID:31233739
          supporting_text: >
            FUNDC1 (FUN14 domain containing 1) is a mammalian mitophagy receptor expressed
            on the
            mitochondrial outer membrane that contributes to mitochondrial quality
            control following
            hypoxic stress. Like FUNDC1, the C. elegans ortholog FNDC-1 is widely
            expressed in somatic
            tissues and mediates hypoxic mitophagy.

  - term:
      id: GO:0005741
      label: mitochondrial outer membrane
    evidence_type: IEA
    original_reference_id: GO_REF:0000044
    review:
      summary: >
        The IEA annotation based on UniProt subcellular location mapping is redundant
        with the IBA
        annotation but remains valid. Both annotations correctly capture OMM localization.
      action: ACCEPT
      reason: >
        This electronic annotation based on UniProt subcellular location is accurate.
        UniProt curates
        the subcellular location based on the primary literature (PMID:31233739),
        which describes FNDC-1
        as a mitochondrial outer membrane protein. The IEA is broader in evidence
        but still correct.
        Duplicate annotations with different evidence codes are acceptable in GO.
      supported_by:
        - reference_id: PMID:31233739
          supporting_text: >
            FUNDC1 (FUN14 domain containing 1) is a mammalian mitophagy receptor expressed
            on the
            mitochondrial outer membrane...Like FUNDC1, the C. elegans ortholog FNDC-1
            is widely
            expressed in somatic tissues and mediates hypoxic mitophagy.

  - term:
      id: GO:0006914
      label: autophagy
    evidence_type: IEA
    original_reference_id: GO_REF:0000043
    review:
      summary: >
        The IEA annotation for general autophagy is derived from UniProt keyword mapping.
        While not
        incorrect, this term is less specific than the existing annotations for mitophagy
        (GO:0000423)
        and autophagy of mitochondrion (GO:0000422).
      action: ACCEPT
      reason: >
        This electronic annotation is technically correct as FNDC-1 is indeed involved
        in autophagy
        (specifically mitophagy). However, it is less informative than the more specific
        annotations
        already present. IEA annotations of this type are common and acceptable for
        broad pathway
        categorization, even when more specific experimental annotations exist. The
        term is a parent
        of the more specific mitophagy terms.
      supported_by:
        - reference_id: PMID:31153831
          supporting_text: >
            Elimination of paternal mitochondria after fertilization occurs in many
            species using
            the process of selective autophagy.

  - term:
      id: GO:0000423
      label: mitophagy
    evidence_type: IMP
    original_reference_id: PMID:31153831
    review:
      summary: >
        The IMP annotation for mitophagy based on PMID:31153831 (Molina et al. 2019)
        is well-supported.
        This study demonstrated that fndc-1 functions as a mitophagy adaptor for paternal
        mitochondria
        elimination, providing a second, ubiquitin-independent mechanism after the
        initial
        ubiquitination-dependent pathway.
      action: ACCEPT
      reason: >
        This annotation is directly supported by the cited publication. Molina et
        al. 2019 demonstrated
        that loss of fndc-1 delays paternal mitochondria elimination after fertilization,
        establishing
        fndc-1 as a mitophagy adaptor protein. The study shows that fndc-1 provides
        a temporally distinct
        mechanism from the ubiquitin-dependent pathway for targeting paternal mitochondria
        to autophagosomes.
      supported_by:
        - reference_id: PMID:31153831
          supporting_text: >
            If paternal mitochondria are not eliminated via this early process, they
            are eventually
            removed from the embryo in a process that depends on the mitophagy adaptor
            protein, fndc-1.
            Thus, there are two redundant, but temporally distinct mechanisms that
            target paternal
            mitochondria for elimination in C. elegans.

  - term:
      id: GO:0000423
      label: mitophagy
    evidence_type: IMP
    original_reference_id: PMID:31233739
    review:
      summary: >
        The IMP annotation for mitophagy based on PMID:31233739 (Lim et al. 2019)
        provides independent
        experimental support. This study specifically characterized FNDC-1's role
        in paternal mitochondria
        elimination and hypoxic mitophagy, demonstrating that loss of fndc-1 retards
        paternal mitochondria
        degradation.
      action: ACCEPT
      reason: >
        This annotation is directly supported by the cited publication. Lim et al.
        2019 showed that
        loss of fndc-1 retards the rate of paternal mitochondria degradation and that
        FNDC-1 functions
        as a ubiquitin-independent mitophagy receptor. The study also showed that
        paternal mitochondrial
        DNA can be detected in cross-progeny of fndc-1 mutant males, providing functional
        evidence for
        its role in mitophagy.
      supported_by:
        - reference_id: PMID:31233739
          supporting_text: >
            Paternal mitochondria are eliminated following fertilization by selective
            autophagy...
            loss of fndc-1 retards the rate of paternal mitochondria degradation,
            but not that of
            membranous organelles, a nematode specific membrane compartment whose
            fusion is required
            for sperm motility. This is the first example of a ubiquitin-independent
            mitophagy receptor
            playing a role in the selective degradation of sperm mitochondria.
        - reference_id: PMID:31233739
          supporting_text: >
            Paternal mitochondrial DNA is normally undetectable in wildtype larva,
            but can be detected
            in the cross-progeny of fndc-1 mutant males.

  - term:
      id: GO:0140580
      label: mitochondrion autophagosome adaptor activity
    evidence_type: ISS
    original_reference_id: PMID:31233739
    review:
      summary: >
        NEW annotation proposed for the molecular function of FNDC-1 as a mitophagy
        receptor/adaptor. GO:0140580 describes the binding activity that brings together a
        mitochondrial membrane and an autophagosome during mitophagy, which fits FNDC-1's
        genetically defined role. It is coded ISS rather than IDA because the adaptor
        activity is inferred from orthology to mammalian FUNDC1 together with the worm
        loss-of-function mitophagy phenotype; a direct FNDC-1-ATG8 (LGG-1/LGG-2) binding
        assay has not been reported in C. elegans.
      action: NEW
      reason: >
        The existing annotations lack a molecular function (MF) term. FNDC-1 is required
        for mitophagy in two worm contexts (paternal-mitochondria elimination and
        hypoxia-reoxygenation) and sits on the mitochondrial outer membrane, consistent
        with a mitophagy receptor/adaptor that bridges mitochondria to autophagosomes.
        GO:0140580 (mitochondrion autophagosome adaptor activity) is defined as "The
        binding activity of a molecule that brings together a mitochondrial membrane and
        an autophagosome during mitophagy," which precisely names this role. The molecular
        mechanism itself - an LC3-interacting region (LIR) binding ATG8/LC3 - is
        established for mammalian FUNDC1 but not yet demonstrated for worm FNDC-1, so ISS
        (from the FUNDC1 ortholog) is the appropriate evidence basis rather than a direct
        assay code. The worm ATG8-binding partner (LGG-1/LGG-2) and LIR motif remain to be
        identified (see knowledge_gaps).
      proposed_replacement_terms:
        - id: GO:0140580
          label: mitochondrion autophagosome adaptor activity
      additional_reference_ids:
        - PMID:33416042
      supported_by:
        - reference_id: PMID:31233739
          supporting_text: >
            This is the first example of a ubiquitin-independent
            mitophagy receptor playing a role in the selective degradation of sperm
            mitochondria.
        - reference_id: PMID:31153831
          supporting_text: >
            If paternal mitochondria are not eliminated via this early process, they
            are eventually
            removed from the embryo in a process that depends on the mitophagy adaptor
            protein, fndc-1.
        - reference_id: file:worm/fndc-1/fndc-1-deep-research-falcon.md
          supporting_text: >-
            encodes the C. elegans ortholog of mammalian FUNDC1, a conserved FUN14-domain
            protein functioning as a mitophagy receptor

  - term:
      id: GO:0071456
      label: cellular response to hypoxia
    evidence_type: IMP
    original_reference_id: PMID:33416042
    review:
      summary: >
        NEW annotation proposed based on FNDC-1's characterized role in hypoxia-reoxygenation
        response.
        The Lim et al. 2021 Autophagy study (PMID:33416042) demonstrated that FNDC-1
        mediates mitophagy
        specifically in response to hypoxia-reoxygenation stress in body wall muscle.
      action: NEW
      reason: >
        In the worm, loss of fndc-1 changes the outcome of hypoxia-reoxygenation (HR):
        Lim et al. 2021 show FNDC-1 mediates HR-induced mitophagy in body-wall muscle and
        that its loss protects against HR injury via an ATFS-1/UPRmt program, establishing
        FNDC-1 as a component of the cellular response to changing oxygen availability
        (GO:0071456). Note the stimulus studied is hypoxia-reoxygenation specifically; no
        reoxygenation-specific GO term exists, so GO:0071456 (cellular response to hypoxia)
        is used as the appropriate parent. IMP is justified by the fndc-1 loss-of-function
        HR phenotype.
      proposed_replacement_terms:
        - id: GO:0071456
          label: cellular response to hypoxia
      additional_reference_ids:
        - PMID:31233739
      supported_by:
        - reference_id: PMID:33416042
          supporting_text: >
            Here, we provide evidence that FNDC-1
            is the C. elegans
            ortholog of FUNDC1, and that its loss protects against injury in a worm
            model of HR.
        - reference_id: PMID:33416042
          supporting_text: >
            FUNDC1 (FUN14 domain containing 1) is a mammalian mitophagy receptor that
            responds to
            hypoxia-reoxygenation (HR) stress
        - reference_id: PMID:31233739
          supporting_text: >
            FUNDC1 (FUN14 domain containing 1) is a mammalian mitophagy receptor expressed
            on the
            mitochondrial outer membrane that contributes to mitochondrial quality
            control following
            hypoxic stress. Like FUNDC1, the C. elegans ortholog FNDC-1 is widely
            expressed in somatic
            tissues and mediates hypoxic mitophagy.

