      - statement: If early ubiquitin-dependent elimination fails, 
          fndc-1-dependent mitophagy removes paternal mitochondria
        supporting_text: >
          If paternal mitochondria are not eliminated via this early process, they
          are eventually
          removed from the embryo in a process that depends on the mitophagy adaptor
