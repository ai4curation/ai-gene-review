    label: mitochondrial matrix
  predicted_term_type: GO_CC
  review:
    assessment: COR
    confidence_score: 2
    summary: Correct and captures a key aspect of ATFS-1 biology. Under normal (unstressed)
      conditions, ATFS-1 is efficiently imported into the mitochondrial matrix where
      it is degraded by the Lon protease LONP-1. The dual localization (mitochondrial
      matrix under normal conditions, nucleus under stress) is the mechanistic basis
      of UPRmt sensing. This is a correct prediction capturing the worm-specific import-efficiency
      mechanism.
