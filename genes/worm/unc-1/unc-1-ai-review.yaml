  - id: file:worm/unc-1/unc-1-deep-research-falcon.md
    title: Falcon deep research report on unc-1 (Q21190)
    findings:
      - statement: |-
          UNC-1 is the C. elegans stomatin-like/band-7 (SPFH) family protein
          (UniProt Q21190) that regulates innexin gap junctions, especially UNC-9,
          and affects locomotion and other circuit-level phenotypes.
        supporting_text: |-
          consistent with primary literature describing UNC-1 as a **stomatin-like membrane protein** that regulates **innexin gap junctions** (especially UNC-9) and affects locomotion and other circuit-level phenotypes.
        reference_section_type: OTHER
      - statement: |-
          UNC-1 is a regulator of UNC-9-formed gap junctions; unc-1(lf) and
          unc-9(lf) locomotion phenotypes overlap, supporting a shared functional
          pathway rather than UNC-1 acting as an inhibitor.
        supporting_text: |-
          A foundational mechanistic study concluded that UNC-1 is a **regulator of gap junctions formed by UNC-9** and that unc-1 loss-of-function (lf) phenotypes overlap with unc-9(lf) phenotypes in locomotion, supporting a shared functional pathway.
        reference_section_type: OTHER
      - statement: |-
          Physical proximity of UNC-1 and UNC-9 at intercellular junctions was
          shown by BiFC; junctional puncta require the UNC-1 C-terminus (deletion
          of aa 171-289 abolishes puncta).
        supporting_text: |-
          importantly, the BiFC puncta required the UNC-1 **C-terminus** (deletion of aa 171–289 abolished puncta).
        reference_section_type: OTHER
      - statement: |-
          UNC-1 is not strictly required for UNC-9 steady-state localization;
          UNC-9 immunostaining was unaltered in unc-1(e719), so UNC-1 modulates
          channel function rather than serving as a universal assembly factor.
        supporting_text: |-
          UNC-9 immunostaining patterns were reported as **unaltered in unc-1(e719)** mutants, suggesting UNC-1 is not strictly required for UNC-9 steady-state localization/trafficking in that assay context.
        reference_section_type: OTHER
      - statement: |-
          UNC-1's behavioral (locomotory) role is predominantly neuronal: neuronal
          but not muscle expression of wild-type unc-1 or unc-9 largely rescued
          locomotion defects.
        supporting_text: |-
          neuronal (but not muscle) expression of wild-type **unc-1** or **unc-9** largely rescued the corresponding locomotion defects
        reference_section_type: OTHER
      - statement: |-
          UNC-1 also acts at the neuron-glia interface: it is required in both GLR
          glia and RME neurons for gap-junction-dependent calcium signaling that
          influences neuronal polarity/axon specification (via Ca2+, calpain clp-4,
          CDK-5).
        supporting_text: |-
          identified unc-1 as a conserved stomatin-family gene required in both **GLR glia** and **RME neurons**, placing UNC-1 functionally at the neuron–glia interface where gap junctions mediate calcium-dependent signaling to influence neuronal polarity/axon specification.
        reference_section_type: OTHER
      - statement: |-
          A 2023 study links UNC-1 to organism-wide proteostasis via neurohormonal
          signaling: neuronal UNC-1 activates SSU-1 (sulfotransferase) in ASJ
          neurons, producing a sulfated hormone acting on muscle NHR-1, with DAF-12
          antagonistic, remodeling lipid metabolism to modulate polyQ aggregation.
        supporting_text: |-
          UNC-1 activates signaling from **SSU-1** (a sulfotransferase) in **ASJ sensory/endocrine neurons**, producing a putative sulfated hormone that targets the nuclear receptor **NHR-1** in muscle to modulate aggregation, while **DAF-12** functions antagonistically.
        reference_section_type: OTHER
