id: Q21190
gene_symbol: unc-1
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:6239
  label: Caenorhabditis elegans
description: UNC-1 is a stomatin-like protein belonging to the band 7/SPFH
  domain family that functions as a critical positive regulator of gap junction
  channels. It physically associates with UNC-9 innexin hemichannels at
  intercellular junctions (close proximity demonstrated by BiFC, requiring the
  UNC-1 C-terminus), modulating their functional properties to enable electrical
  coupling between neurons and muscle cells. Tissue-specific rescue indicates its
  behavioral role is predominantly neuronal even though UNC-1/UNC-9 colocalize at
  muscle junctions. This regulation is essential for coordinated locomotion in
  C. elegans, and UNC-1 also acts at the neuron-glia interface (RME neurons and
  GLR glia) to support gap-junction-dependent signaling controlling axon
  specification.
existing_annotations:
  - term:
      id: GO:0008200
      label: ion channel inhibitor activity
    evidence_type: IBA
    original_reference_id: GO_REF:0000033
    review:
      summary: This annotation is incorrect. UNC-1 functions as a positive 
        regulator of gap junction channels, maintaining them in an open state, 
        not as an inhibitor.
      action: REMOVE
      reason: UNC-1 positively regulates UNC-9 gap junction channels by 
        stabilizing them in an open conformation, enabling electrical coupling. 
        The experimental evidence demonstrates that loss of UNC-1 reduces 
        electrical coupling, indicating it promotes rather than inhibits channel
        activity. This IBA annotation appears to be a mis-inference.
      supported_by:
        - reference_id: PMID:17658257
          supporting_text: "Analyses of junctional currents between body-wall muscle
            cells showed that electrical coupling was inhibited to a similar degree
            in unc-1(lf), unc-9(lf), and unc-1(lf);unc-9(lf) double mutants, suggesting
            that UNC-1 and UNC-9 function together."
        - reference_id: file:worm/unc-1/unc-1-deep-research-falcon.md
          supporting_text: |-
            A foundational mechanistic study concluded that UNC-1 is a **regulator of gap junctions formed by UNC-9**
        - reference_id: file:worm/unc-1/unc-1-deep-research-falcon.md
          supporting_text: |-
            UNC-1 positively regulates gap junctions important to locomotion
  - term:
      id: GO:0005886
      label: plasma membrane
    evidence_type: IBA
    original_reference_id: GO_REF:0000033
    review:
      summary: UNC-1 does localize to the plasma membrane as a multi-pass 
        membrane protein, but this is too broad given that the more specific 
        localization is to gap junctions.
      action: KEEP_AS_NON_CORE
      reason: While accurate, this annotation is overly general. UNC-1
        specifically localizes to gap junctions at intercellular junctions,
        which is a more informative and specific subcellular location. The
        plasma membrane annotation should be retained as non-core context.
      supported_by:
        - reference_id: PMID:17658257
          supporting_text: "Immunohistochemistry showed that UNC-1 and UNC-9 colocalized
            at intercellular junctions"
        - reference_id: file:worm/unc-1/unc-1-deep-research-falcon.md
          supporting_text: |-
            UNC-1 is part of the stomatin-like/SPFH (band-7) superfamily, a group of membrane-associated proteins often implicated in organizing membrane microdomains and modulating membrane proteins rather than acting as enzymes.
  - term:
      id: GO:0005886
      label: plasma membrane
    evidence_type: IEA
    original_reference_id: GO_REF:0000120
    review:
      summary: Computationally inferred plasma membrane localization. Valid but 
        overly general compared to gap junction localization.
      action: KEEP_AS_NON_CORE
      reason: This IEA annotation correctly identifies membrane localization but
        lacks the specificity of experimental annotations showing gap junction
        localization. Keep as non-core since gap junction is the functionally
        relevant location.
      supported_by:
        - reference_id: PMID:17658257
          supporting_text: "Immunohistochemistry showed that UNC-1 and UNC-9 colocalized
            at intercellular junctions"
        - reference_id: file:worm/unc-1/unc-1-deep-research-falcon.md
          supporting_text: |-
            UNC-1 is part of the stomatin-like/SPFH (band-7) superfamily, a group of membrane-associated proteins often implicated in organizing membrane microdomains and modulating membrane proteins rather than acting as enzymes.
  - term:
      id: GO:0005921
      label: gap junction
    evidence_type: IEA
    original_reference_id: GO_REF:0000044
    review:
      summary: This is a core localization for UNC-1, supported by direct 
        experimental evidence showing colocalization with UNC-9 at gap 
        junctions.
      action: ACCEPT
      reason: Gap junction is the functionally relevant subcellular location
        where UNC-1 carries out its primary role as a regulator of UNC-9 innexin
        channels. This annotation accurately reflects the core function and
        localization of UNC-1.
      supported_by:
        - reference_id: PMID:17658257
          supporting_text: "Immunohistochemistry showed that UNC-1 and UNC-9 colocalized
            at intercellular junctions"
        - reference_id: file:worm/unc-1/unc-1-deep-research-falcon.md
          supporting_text: |-
            used **bimolecular fluorescence complementation (BiFC)** to show punctate fluorescence at muscle intercellular junctions when UNC-1 and UNC-9 were fused to complementary YFP fragments, indicating close proximity consistent with being in the same junctional complex
  - term:
      id: GO:0016020
      label: membrane
    evidence_type: IEA
    original_reference_id: GO_REF:0000002
    review:
      summary: Very broad annotation from InterPro domain mapping. UNC-1 is 
        indeed a membrane protein but more specific annotations exist.
      action: KEEP_AS_NON_CORE
      reason: This IEA annotation based on InterPro domain prediction is
        accurate but extremely general. UNC-1 is a multi-pass membrane protein,
        but the more informative localizations are plasma membrane and gap
        junction. Keep as non-core background annotation.
      supported_by:
        - reference_id: PMID:17658257
          supporting_text: "Immunohistochemistry showed that UNC-1 and UNC-9 colocalized
            at intercellular junctions"
        - reference_id: file:worm/unc-1/unc-1-deep-research-falcon.md
          supporting_text: |-
            UNC-1 is part of the stomatin-like/SPFH (band-7) superfamily, a group of membrane-associated proteins often implicated in organizing membrane microdomains and modulating membrane proteins rather than acting as enzymes.
  - term:
      id: GO:0043005
      label: neuron projection
    evidence_type: IEA
    original_reference_id: GO_REF:0000117
    review:
      summary: Computationally inferred annotation that UNC-1 localizes to 
        neuron projections. This is likely correct given UNC-1 functions 
        predominantly in neurons.
      action: ACCEPT
      reason: UNC-1 is expressed in neurons and localizes to intercellular
        junctions including at neuron projections where gap junctions form. This
        IEA annotation from ARBA machine learning is consistent with
        experimental evidence showing neuronal expression.
      supported_by:
        - reference_id: PMID:17658257
          supporting_text: "unc-1 and unc-9 are coexpressed in neurons and body-wall
            muscle cells"
        - reference_id: file:worm/unc-1/unc-1-deep-research-falcon.md
          supporting_text: |-
            supporting that UNC-1’s key behavioral role is **predominantly neuronal**, even though UNC-1 and UNC-9 can be visualized at muscle junctions in imaging assays.
  - term:
      id: GO:0099106
      label: ion channel regulator activity
    evidence_type: IMP
    original_reference_id: PMID:17658257
    review:
      summary: This is the core molecular function of UNC-1 - regulating gap 
        junction channels formed by UNC-9 innexin.
      action: ACCEPT
      reason: This annotation accurately captures UNC-1's primary molecular
        function as a positive regulator of UNC-9 gap junction channels. The IMP
        evidence directly demonstrates that UNC-1 regulates electrical coupling
        through its effect on channel activity.
      supported_by:
        - reference_id: PMID:17658257
          supporting_text: "Analyses of junctional currents between body-wall muscle
            cells showed that electrical coupling was inhibited to a similar degree
            in unc-1(lf), unc-9(lf), and unc-1(lf);unc-9(lf) double mutants, suggesting
            that UNC-1 and UNC-9 function together."
        - reference_id: file:worm/unc-1/unc-1-deep-research-falcon.md
          supporting_text: |-
            supporting a model in which UNC-1 modulates **functional properties** (e.g., gating/efficiency/complex behavior) rather than being a universal assembly factor.
  - term:
