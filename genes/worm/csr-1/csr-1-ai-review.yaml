taxon:
  id: NCBITaxon:6239
  label: Caenorhabditis elegans
description: 'CSR-1 (Chromosome Segregation and RNAi deficient-1) is the only singly essential Argonaute protein in C. elegans out of the 24 Argonaute family members encoded in the genome. CSR-1 binds 22G-RNAs that are antisense to thousands of germline-expressed protein-coding genes (approximately 25% of all protein-coding genes) and plays essential roles in chromosome segregation, germline gene protection from piRNA-mediated silencing, and transgenerational epigenetic memory. The gene encodes two isoforms: CSR-1A (spermatogenesis-specific, with an additional 163 amino acids at the N-terminus) and CSR-1B (ubiquitously expressed in the germline). CSR-1 localizes to P granules and chromosomes, where it functions with RNA-dependent RNA polymerase EGO-1, Dicer-related helicase DRH-3, and Tudor-domain protein EKL-1 to organize holocentric chromosomes for proper mitotic and meiotic division. Loss of CSR-1 causes metaphase alignment failure, kinetochore orientation defects, and embryonic lethality.


  Note on UniProt mapping: The reviewed Swiss-Prot entry Q21992 is now deleted from UniProt. The current TrEMBL accession for the CSR-1 Argonaute (WormBase F20D12.1a, 1030 AA, Piwi domain) is H2KZD5, which this review now uses. The original GOA/UniProt files (regenerated here) are now for the correct gene; previously they incorrectly resolved to nhr-47 (Q17370), in which csr-1 appears as a deprecated synonym.'
