    label: RISC complex
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: part_of
  review:
    summary: CSR-1 does not function in the canonical RISC complex. In C. elegans CSR-1 operates in a dedicated 22G-RNA complex with the RNA-dependent RNA polymerase EGO-1, the Dicer-related helicase DRH-3, and the Tudor-domain protein EKL-1 (PMID:19804758, PMID:28182654). This is structurally and compositionally distinct from canonical RISC, which is centred on a Dicer-cleaved miRNA/siRNA duplex loaded onto an Argonaute together with TRBP/R2D2.
    action: MARK_AS_OVER_ANNOTATED
    reason: IBA propagation from miRNA-loading Argonautes is misleading here. CSR-1's complex (CSR-1/EGO-1/DRH-3/EKL-1) is mechanistically distinct from canonical RISC, so the generic 'RISC complex' part_of annotation over-generalises CSR-1's actual macromolecular context.
    supported_by:
