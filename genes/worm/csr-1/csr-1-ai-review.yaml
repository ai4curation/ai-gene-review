- id: PMID:19804758
  title: The Argonaute CSR-1 and its 22G-RNA cofactors are required for holocentric chromosome segregation.
  findings:
  - statement: Key paper establishing CSR-1 function in chromosome segregation
    supporting_text: the Argonaute CSR-1, the RNA-dependent RNA polymerase EGO-1, the Dicer-related helicase DRH-3, and the Tudor-domain protein EKL-1 localize to chromosomes and are required for proper chromosome segregation
  - statement: 22G-RNAs target thousands of germline-expressed genes
    supporting_text: the CSR-1-interacting small RNAs (22G-RNAs) are antisense to thousands of germline-expressed protein-coding genes
  - statement: Loss of CSR-1 causes metaphase alignment failure and kinetochore orientation defects
    supporting_text: In the absence of these factors chromosomes fail to align at the metaphase plate and kinetochores do not orient to opposing spindle poles
  - statement: CSR-1 interacts with chromatin at target loci
    supporting_text: CSR-1 interacts with chromatin at target loci but does not downregulate target mRNA or protein levels
- id: PMID:24360782
  title: The C. elegans CSR-1 argonaute pathway counteracts epigenetic silencing to promote germline gene expression.
  findings:
  - statement: CSR-1 pathway provides RNA-induced epigenetic gene activation (RNAa)
    supporting_text: We refer to this mechanism, which can prevent or reverse RNAe, as RNA-induced epigenetic gene activation (RNAa)
  - statement: CSR-1 is required for RNAa and protects germline self-mRNAs from piRNA-mediated silencing
    supporting_text: CSR-1, which engages RdRP-amplified small RNAs complementary to germline-expressed mRNAs, is required for RNAa
  - statement: Transgenerational CSR-1 memory maintains expression of self genes
    supporting_text: C. elegans adaptively acquires and maintains a transgenerational CSR-1 memory that recognizes and protects self-mRNAs
- id: PMID:17110334
  title: Analysis of the C. elegans Argonaute family reveals that distinct Argonautes act sequentially during RNAi.
  findings:
  - statement: CSR-1 and other downstream-acting Argonautes interact with amplified secondary siRNAs to mediate RNAi gene silencing
    supporting_text: several other AGO proteins interact with amplified siRNAs to mediate downstream silencing
  - statement: csr-1 and related AGO mutants exhibit chromosome segregation defects
    supporting_text: Analysis of single- and multiple-AGO mutant strains reveals functions in several pathways, including (1) chromosome segregation, (2) fertility, and (3) at least two separate steps in the RNAi pathway
- id: PMID:18007599
  title: In vitro analyses of the production and activity of secondary small interfering RNAs in C. elegans.
  findings:
  - statement: CSR-1 is the Argonaute Slicer for secondary 22G-RNAs in C. elegans
    supporting_text: An Argonaute protein, CSR-1, is responsible for the Slicer activity induced by secondary-type siRNAs.
  - statement: Secondary siRNAs (22G-RNAs) drive most target mRNA cleavage during RNAi in C. elegans
    supporting_text: secondary-type siRNAs induce a prominent Slicer activity to cleave target mRNAs far more effectively than primary-type siRNAs
- id: PMID:22231398
  title: A conserved PUF-Ago-eEF1A complex attenuates translation elongation.
  findings:
  - statement: CSR-1 acts with FBF (PUF) and EFT-3 (eEF1A) to attenuate translation elongation on FBF target mRNAs
    supporting_text: Nematode CSR-1 (Ago) promoted repression of FBF (PUF) target mRNAs in in vivo assays, and the FBF-1-CSR-1 heterodimer inhibited EFT-3 (eEF1A) GTPase activity in vitro
- id: PMID:22863779
  title: CSR-1 RNAi pathway positively regulates histone expression in C. elegans.
  findings:
  - statement: CSR-1 depletion produces sterility and chromosome segregation defects in early embryos
    supporting_text: depletion of germline-enriched endo-siRNAs found in complex with the CSR-1 Argonaute protein causes sterility and defects in chromosome segregation in early embryos
  - statement: CSR-1 (with EGO-1 and DRH-3) is required for histone mRNA processing; loss causes severe core histone protein depletion
    supporting_text: knockdown of either csr-1, the RNA-dependent RNA polymerase (RdRP) ego-1, or the dicer-related helicase drh-3, leads to defects in histone mRNA processing, resulting in severe depletion of core histone proteins
  - statement: Increasing histone gene dosage rescues CSR-1 / EGO-1 lethality
    supporting_text: increasing the dosage of histone genes rescues the lethality associated with depletion of CSR-1 and EGO-1
- id: PMID:28182654
  title: ELLI-1, a novel germline protein, modulates RNAi activity and P-granule accumulation in Caenorhabditis elegans.
  findings:
  - statement: CSR-1 is recruited to P granules with DRH-3, EGO-1, and EKL-1 as the CSR-1 22G RNA complex
