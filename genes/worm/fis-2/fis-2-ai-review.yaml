- term:
    id: GO:0000423
    label: mitophagy
  evidence_type: IGI
  original_reference_id: PMID:24196833
  qualifier: involved_in
  review:
    summary: >-
      Proposed new annotation (not currently in GOA). Genetic loss of both FIS1
      paralogs (the fis-1;fis-2 double mutant) disrupts the orderly disposal of
