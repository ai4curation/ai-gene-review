existing_annotations:
- term:
    id: GO:0005634
    label: nucleus
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      Nuclear localization is expected for a histone acetyltransferase that modifies chromatin.
      IBA annotation is supported by phylogenetic inference from multiple orthologs across
      species (PMID:20923973 describes LSY-12 function on chromatin in the nucleus).
    action: ACCEPT
    reason: >-
      As a histone acetyltransferase that acts on chromatin to regulate gene expression,
      nuclear localization is a fundamental expectation. The IBA annotation is well-supported
      by the conserved function of MYST-family HATs across eukaryotes. PMID:20923973 describes
      its role in maintaining lateralized gene expression, which requires nuclear activity.

- term:
    id: GO:0000785
    label: chromatin
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      Chromatin localization is consistent with the core function of LSY-12 as a histone
      acetyltransferase. IBA annotation supported by multiple orthologs. The protein's
      MYST-type HAT domain and zinc finger are expected to interact with chromatin substrates.
    action: ACCEPT
    reason: >-
      LSY-12 is a histone acetyltransferase that acetylates histones to regulate gene
      expression at chromatin. The MYST-type HAT domain (UniProt residues 544-830) and
      C2HC zinc finger (residues 577-602) are chromatin-interacting domains. This is a
      core localization for the protein.

- term:
    id: GO:0006357
    label: regulation of transcription by RNA polymerase II
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      IBA annotation inferred from orthologs including MOZ/MORF family members across
      species. LSY-12 regulates gene expression through histone acetylation, which
      facilitates RNA Pol II transcription. PMID:20923973 demonstrates its role in
      maintaining lateralized gene expression.
    action: ACCEPT
    reason: >-
      MYST-family HATs regulate transcription by acetylating histones, which opens
      chromatin and facilitates RNA Pol II-mediated transcription. PMID:20923973 shows
      LSY-12 is required for expression of genes like lim-6, which are transcribed by
      RNA Pol II. The IBA annotation is at an appropriate level of specificity.
    supported_by:
    - reference_id: PMID:20923973
      supporting_text: >-
        a histone modifying complex, composed of the LSY-12 MYST-type histone
        acetyltransferase, the ING-family PHD domain protein LSY-13, and PHD/bromodomain
        protein LIN-49, is required to first initiate and then actively maintain
        lateralized gene expression

- term:
    id: GO:0003682
    label: chromatin binding
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      Chromatin binding is expected for a histone acetyltransferase with a MYST-type HAT
      domain and C2HC zinc finger. IBA annotation based on orthology to characterized
      chromatin-binding proteins.
    action: ACCEPT
    reason: >-
      The MYST-type HAT domain (residues 544-830) includes a C2HC zinc finger (residues
      577-602) that mediates chromatin interaction. This is a core molecular function
      required for LSY-12's catalytic activity on histone substrates.

- term:
    id: GO:0010484
    label: histone H3 acetyltransferase activity
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      IBA annotation indicating H3-specific acetyltransferase activity, inferred from
      orthologs including KAT6A/KAT6B (MOZ/MORF), which are known H3 acetyltransferases.
      This is a more specific child of the general HAT activity and represents the
      characterized substrate specificity of the MOZ/MORF family.
    action: ACCEPT
    reason: >-
      MOZ/MORF family HATs are well-characterized as H3 acetyltransferases. The IBA
      annotation is based on orthologs including experimentally characterized H3
      acetyltransferases (KAT6A, KAT6B). This represents the appropriate level of
      substrate specificity for this enzyme family and is more informative than the
      generic HAT activity term.

- term:
    id: GO:0003712
    label: transcription coregulator activity
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      IBA annotation reflecting the role of LSY-12 as a transcriptional coregulator
      through its histone acetyltransferase activity. MOZ/MORF family members function
      as transcriptional coactivators.
    action: ACCEPT
    reason: >-
      LSY-12 functions as part of a histone-modifying complex that activates gene
      expression, consistent with transcription coregulator activity. PMID:20923973
      demonstrates it works together with transcription factors (die-1, che-1) to
      maintain gene expression. The term captures the coregulator role that is
      complementary to the more specific HAT activity annotations.
    supported_by:
    - reference_id: PMID:20923973
      supporting_text: >-
        a combination of transcription factors, which recognize DNA in a
        sequence-specific manner, and a histone modifying enzyme complex are
        responsible for inducing and maintaining neuronal laterality

- term:
    id: GO:0070776
    label: MOZ/MORF histone acetyltransferase complex
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      IBA annotation placing LSY-12 in the MOZ/MORF HAT complex. PMID:20923973
      directly demonstrates that LSY-12 functions in a complex with LSY-13 (ING-family)
      and LIN-49 (PHD/bromodomain), which are homologous to subunits of the mammalian
      MOZ/MORF complex.
    action: ACCEPT
    reason: >-
      PMID:20923973 provides direct experimental evidence that LSY-12 functions in a
      complex with LSY-13 and LIN-49, which are orthologs of MOZ/MORF complex subunits.
      This is a core annotation representing the native complex context of LSY-12.
    supported_by:
    - reference_id: PMID:20923973
      supporting_text: >-
        a histone modifying complex, composed of the LSY-12 MYST-type histone
        acetyltransferase, the ING-family PHD domain protein LSY-13, and
        PHD/bromodomain protein LIN-49

- term:
    id: GO:0004402
    label: histone acetyltransferase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: >-
      IEA annotation from InterPro (IPR002717, HAT_MYST-type) mapping to this GO term.
      This is a broader parent term of the more specific GO:0010484 (histone H3
      acetyltransferase activity) already annotated via IBA.
    action: ACCEPT
    reason: >-
      While this is a broader term than the IBA-supported GO:0010484 (histone H3
      acetyltransferase activity), it is not incorrect. The InterPro domain match
      (IPR002717) correctly identifies the MYST-type HAT domain. Having both the
      general and specific annotations is acceptable.

- term:
    id: GO:0006338
    label: chromatin remodeling
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  review:
    summary: >-
      IEA annotation inferred from HAT activity terms (GO:0004402 and GO:0010484) via
      UniProt combined annotation method. Histone acetylation contributes to chromatin
      state changes but is technically distinct from ATP-dependent chromatin remodeling.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      The term "chromatin remodeling" (GO:0006338) in GO typically refers to
      ATP-dependent chromatin remodeling by SWI/SNF-type complexes, which is distinct
      from histone modification. While histone acetylation alters chromatin state, it
      is more accurately described as "histone modification" or "chromatin organization."
      LSY-12 is a histone acetyltransferase, not a chromatin remodeler in the strict
      GO sense. The existing annotations for regulation of transcription and histone
      acetylation already capture the functional role appropriately.

- term:
    id: GO:0006355
    label: regulation of DNA-templated transcription
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: >-
      IEA annotation from InterPro (IPR002717). This is a parent term of the IBA-annotated
      GO:0006357 (regulation of transcription by RNA polymerase II). Both are appropriate.
    action: ACCEPT
    reason: >-
      This broader term is consistent with and subsumed by the more specific IBA annotation
      GO:0006357 (regulation of transcription by RNA polymerase II). As an IEA from
      InterPro domain mapping, it correctly reflects the function of the MYST-type HAT
      domain. It is acceptable to retain alongside the more specific term.

- term:
    id: GO:0061733
    label: protein-lysine-acetyltransferase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  review:
    summary: >-
      IEA annotation inferred from Rhea reaction RHEA:45948 and EC:2.3.1.48
      (histone acetyltransferase). This reflects the catalytic mechanism of lysine
      acetylation. UniProt assigns EC:2.3.1.48 based on PROSITE-ProRule:PRU01063.
    action: ACCEPT
    reason: >-
      This term describes the chemical reaction catalyzed by LSY-12 at the mechanistic
      level (transfer of acetyl group to protein lysine residues). It is complementary
      to the more specific histone-focused terms and correctly derived from the
      enzyme commission number EC:2.3.1.48 assigned to the MYST-type HAT domain.

- term:
    id: GO:0001708
    label: cell fate specification
  evidence_type: IMP
  original_reference_id: PMID:20923973
  review:
    summary: >-
      IMP annotation based on mutant phenotype data from PMID:20923973. Loss of lsy-12
      function causes defects in ASE neuron cell fate, specifically the ASEL vs. ASER
      identity. The ot154 allele (C-terminal truncation) reduces expression of the
      ASEL marker lim-6.
    action: ACCEPT
    reason: >-
      PMID:20923973 demonstrates that lsy-12 mutants have defects in specifying ASE
      neuron identity. The UniProt mutagenesis data confirms that the ot154 allele
      (deletion of residues 1539-1585) reduces lim-6 expression in ASEL. Cell fate
      specification is an appropriate term for this phenotype, as the ASE neurons
      fail to properly adopt the ASEL identity.
    supported_by:
    - reference_id: PMID:20923973
      supporting_text: >-
        a histone modifying complex, composed of the LSY-12 MYST-type histone
        acetyltransferase, the ING-family PHD domain protein LSY-13, and
        PHD/bromodomain protein LIN-49, is required to first initiate and then
        actively maintain lateralized gene expression in the gustatory system

- term:
    id: GO:0010628
    label: positive regulation of gene expression
  evidence_type: IMP
  original_reference_id: PMID:20923973
  review:
    summary: >-
      IMP annotation based on PMID:20923973 showing that lsy-12 mutants lose expression
      of ASEL-specific genes. The histone acetyltransferase complex activates transcription,
      consistent with positive regulation of gene expression.
    action: ACCEPT
    reason: >-
      PMID:20923973 demonstrates that LSY-12 is required to initiate and maintain
      expression of lateralized genes (e.g., lim-6 in ASEL). Histone acetylation by
      MYST-family HATs is an activating mark, consistent with positive regulation. The
      ot154 mutation reduces lim-6 expression, directly supporting this annotation.
    supported_by:
    - reference_id: PMID:20923973
      supporting_text: >-
        a histone modifying complex, composed of the LSY-12 MYST-type histone
        acetyltransferase, the ING-family PHD domain protein LSY-13, and
        PHD/bromodomain protein LIN-49, is required to first initiate and then
        actively maintain lateralized gene expression

- term:
    id: GO:0061968
    label: maintenance of left/right asymmetry
  evidence_type: IMP
  original_reference_id: PMID:20923973
  review:
    summary: >-
      IMP annotation based on PMID:20923973, which is the defining paper for lsy-12
      function. The paper demonstrates that LSY-12 is required to maintain lateralized
      gene expression in ASE gustatory neurons throughout the life of the animal.
    action: ACCEPT
    reason: >-
      This is the most specific and characteristic biological process annotation for
      lsy-12. PMID:20923973 directly shows that the LSY-12/LSY-13/LIN-49 complex is
      required to actively maintain left/right asymmetric gene expression in ASE neurons.
      The paper demonstrates both initiation and maintenance roles, with postembryonic
      removal of the complex causing loss of laterality.
    supported_by:
    - reference_id: PMID:20923973
      supporting_text: >-
        is required to first initiate and then actively maintain lateralized gene
        expression in the gustatory system of the nematode Caenorhabditis elegans

