core_functions:
- molecular_function:
    id: GO:0010484
    label: histone H3 acetyltransferase activity
  description: >-
    LSY-12 is the catalytic subunit of a MOZ/MORF-type histone acetyltransferase complex
    that acetylates histone H3. It contains a MYST-type HAT domain (residues 544-830)
    with a C2HC zinc finger and acetyl-CoA binding sites (EC:2.3.1.48). The complex
    includes LSY-13 (ING-family) and LIN-49 (PHD/bromodomain), and is required to
    initiate and actively maintain left/right asymmetric gene expression in ASE gustatory
    neurons, specifying ASEL neuron identity through histone acetylation-mediated
    transcriptional activation.
  directly_involved_in:
