  id: NCBITaxon:6239
  label: Caenorhabditis elegans
description: >-
  LSY-12 (also known as MYS-3) is a MYST-family histone acetyltransferase in C. elegans that functions
  as the catalytic subunit of a MOZ/MORF-type HAT complex together with the ING-family PHD domain
  protein LSY-13 and the PHD/bromodomain protein LIN-49. LSY-12 contains a MYST-type HAT domain
  (residues 544-830) with a C2HC zinc finger and acetyl-CoA binding sites. The complex is required
  to both initiate and actively maintain left/right asymmetric gene expression in the ASE gustatory
  neurons, where it promotes ASEL-specific gene expression (e.g., lim-6). Mutants show loss of
  lateralized gene expression and cell fate specification defects in ASE neurons. The gene has 10
  known splice isoforms. LSY-12 is the ortholog of human KAT6A/KAT6B (MOZ/MORF).
