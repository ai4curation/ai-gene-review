      The curated review marks mRNA binding as MODIFY (too specific in wrong direction)
      and the relevant function is RNA binding (GO:0003723). GO:0005515 is too
      generic for a P granule scaffold protein with specific RNA and protein binding
      activities.

- source_method: BioReason-Pro-SFT
  source_version: wanglab/protein_catalogue
  source_reference_id: doi:10.64898/2026.03.19.712954
  predicted_term:
    id: GO:0007291
    label: sperm individualization
  predicted_term_type: GO_BP
  review:
    assessment: NPI
    confidence_score: 1
    summary: >-
      Not supported for PGL-1. Sperm individualization is a Drosophila-specific
      process (apoptosis-like program for removing cytoplasm from sperm). C. elegans
      has no equivalent process and PGL-1 has no documented role in sperm
      individualization. While PGL-1 is expressed in the germline, its loss-of-function
      phenotype involves germ cell proliferation and gamete generation defects, not
      sperm individualization. This is a false positive from Drosophila biology
      contaminating the training data.

