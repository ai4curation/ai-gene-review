      UniProt
    findings: []
  - id: PMID:34824371
    title: >-
      C. elegans TFIIH subunit GTF-2H5/TTDA is a non-essential transcription factor
      indispensable for DNA repair.
    findings:
      - statement: >-
          GTF-2H5 is the C. elegans ortholog of human TTDA/GTF2H5 (45% sequence identity),
          a 71 aa subunit of the TFIIH core complex.
        supporting_text: >-
          This gene only consists of two exons and is predicted to encode a 71 amino acid
          protein with an estimated molecular weight of 8.2 kD, which is similar to its
          human TTDA ortholog with which it shares 45% sequence identity.
      - statement: >-
          GTF-2H5 promotes TFIIH stability in multiple tissues in vivo; loss of GTF-2H5
          reduces TFIIH levels by more than 50%.
        supporting_text: >-
          loss of GTF-2H5 led to reduced levels of AG::GTF2H1 in all tested tissues by
          more than 50%
      - statement: >-
          Unlike other TFIIH subunits, GTF-2H5 is not essential for viability in C. elegans.
        supporting_text: >-
          we conclude that unlike other TFIIH subunits, GTF-2H5 is not essential for
          embryogenesis and viability in C. elegans
      - statement: >-
          GTF-2H5 is indispensable for nucleotide excision repair; gtf-2H5 mutants are
          as UV-sensitive as NER-deficient xpa-1 mutants.
        supporting_text: >-
          We observed that gtf-2H5 mutants are as sensitive to UV-induced DNA damage as
          NER-deficient xpa-1 mutants, showing severe embryonic lethality upon UV irradiation
      - statement: >-
          GTF-2H5 facilitates recruitment of TFIIH to UV-damaged DNA in oocytes.
        supporting_text: >-
          GTF-2H5 is needed for efficient binding of TFIIH to damaged DNA and that in
          absence of GTF-2H5 repair cannot be completed
      - statement: >-
          GTF-2H5 becomes essential for transcription when transcription is challenged,
          such as by partial knockdown of TFIIE.
        supporting_text: >-
          the combined loss of gtf-2H5 and gtf-2E1 strongly reduced transcription of
          both housekeeping genes
      - statement: >-
          gtf-2H5 mutants show shortened postmitotic and replicative lifespan.
        supporting_text: >-
          gtf-2H5 mutants show both a shortened postmitotic (Fig. 4e) and replicative
          (Fig. 4f) lifespan, which appear both more reduced than of xpa-1 mutants

