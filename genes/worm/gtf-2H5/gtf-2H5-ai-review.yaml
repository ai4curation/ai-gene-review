id: Q9N390
gene_symbol: gtf-2H5
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:6239
  label: Caenorhabditis elegans
description: >-
  GTF-2H5 is the C. elegans ortholog of human TTDA/GTF2H5, the smallest subunit (71 aa, ~8 kDa)
  of the general transcription factor IIH (TFIIH) core complex. TFIIH is a 10-subunit complex
  with dual roles in transcription initiation by RNA polymerase II and nucleotide excision repair
  (NER) of damaged DNA. GTF-2H5 promotes the stability of the TFIIH complex and maintains
  normal steady-state TFIIH protein levels in multiple tissues in vivo (PMID:34824371). It is
  indispensable for NER, where it facilitates recruitment of TFIIH to sites of DNA damage.
  Uniquely among TFIIH subunits, GTF-2H5 is not essential for viability in C. elegans under
  normal conditions; however, it becomes essential for transcription when transcriptional
  capacity is challenged, such as when TFIIE levels are reduced (PMID:34824371). Loss of
  GTF-2H5 causes severe UV hypersensitivity, diminished growth, and shortened lifespan.
  The protein shares 45% sequence identity with human TTDA.
existing_annotations:
- term:
    id: GO:0005675
    label: transcription factor TFIIH holo complex
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      GTF-2H5 is a component of the TFIIH complex. IBA annotation based on phylogenetic
      inference from orthologs in Drosophila (hay), yeast (TFB5), and human (GTF2H5).
      The TFIIH holo complex includes the core complex plus the CAK kinase module. Mass
      spectrometry of immunoprecipitated TFIIH from C. elegans confirmed that all 10
      subunits co-purify together, including the CAK subunits CDK-7, CYH-1, and MNAT-1
      (PMID:34824371).
    action: ACCEPT
    reason: >-
      GTF-2H5 is a bona fide subunit of TFIIH. Co-immunoprecipitation of AG::GTF-2H1
      recovered the entire TFIIH complex including GTF-2H5 (PMID:34824371). The holo
      complex annotation is appropriate since all 10 subunits including CAK were identified.
    supported_by:
      - reference_id: PMID:34824371
        supporting_text: >-
          In wild type animals, the entire TFIIH complex co-immunoprecipitated with
          AG::GTF-2H1, including the small GTF-2H5 subunit of which three peptides
          were identified

- term:
    id: GO:0006366
    label: transcription by RNA polymerase II
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      IBA annotation for involvement in transcription by RNA polymerase II, based on
      phylogenetic inference from orthologs across eukaryotes. This is well supported
      by the known role of TFIIH in transcription initiation, and by direct experimental
      evidence in C. elegans showing that GTF-2H5 promotes transcription when this is
      challenged (PMID:34824371).
    action: ACCEPT
    reason: >-
      Core function of the TFIIH complex. Although GTF-2H5 is dispensable for transcription
      under normal conditions in C. elegans, it becomes essential when transcription is
      challenged, confirming a genuine role in Pol II transcription (PMID:34824371).
    supported_by:
      - reference_id: PMID:34824371
        supporting_text: >-
          in C. elegans GTF-2H5 (and thus high steady-state TFIIH levels) is dispensable
          for transcription throughout most of C. elegans lifespan in unperturbed laboratory
          culturing conditions, but becomes essential for transcription if this process is
          somehow compromised or challenged

- term:
    id: GO:0000439
    label: transcription factor TFIIH core complex
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      IBA annotation placing GTF-2H5 as part of the TFIIH core complex, based on
      phylogenetic inference. The core complex is the 7-subunit module distinct from
      the CAK kinase module.
    action: ACCEPT
    reason: >-
      GTF-2H5/TTDA is specifically a subunit of the TFIIH core complex. UniProt states
      it is a component of the 7-subunit TFIIH core complex. Mass spectrometry confirmed
      its presence in the immunoprecipitated complex (PMID:34824371). This is the most
      specific cellular component annotation for this protein.
    supported_by:
      - reference_id: PMID:34824371
        supporting_text: >-
          In wild type animals, the entire TFIIH complex co-immunoprecipitated with
          AG::GTF-2H1, including the small GTF-2H5 subunit of which three peptides
          were identified

- term:
    id: GO:0006294
    label: nucleotide-excision repair, preincision complex assembly
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      IBA annotation for involvement in NER preincision complex assembly, inferred
      from mouse (Gtf2h5) and human orthologs. GTF-2H5 facilitates recruitment of
      TFIIH to DNA damage sites, which is a key step in preincision complex formation
      (PMID:34824371).
    action: ACCEPT
    reason: >-
      GTF-2H5 is required for efficient recruitment of TFIIH to UV-damaged DNA. In
      gtf-2H5 mutants, AG::GTF-2H1 recruitment to damaged chromosomes was strongly
      reduced (PMID:34824371). TFIIH recruitment to damage is a critical step in
      preincision complex assembly, making this a well-supported and appropriately
      specific annotation.
    supported_by:
      - reference_id: PMID:34824371
        supporting_text: >-
          Next, we tested re-localization of AG::GTF-2H1 in gtf-2H5 mutants and
          strikingly observed that its UV-induced recruitment to damaged chromosomes
          was strongly reduced after 10 min and persisted after 35 min

- term:
    id: GO:0000439
    label: transcription factor TFIIH core complex
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: >-
      IEA annotation from InterPro domain mapping (IPR009400 TFIIH_TTDA/Tfb5 domain).
      Consistent with the IBA annotation and experimental evidence.
    action: ACCEPT
    reason: >-
      Correct inference from InterPro domain. The Tfb5/TTDA domain is diagnostic for
      TFIIH core complex membership. Supported by direct experimental evidence from
      co-immunoprecipitation (PMID:34824371).

- term:
    id: GO:0005634
    label: nucleus
  evidence_type: IEA
  original_reference_id: GO_REF:0000044
  review:
    summary: >-
      IEA annotation for nuclear localization, mapped from UniProt subcellular location.
      Confirmed experimentally by fluorescence microscopy of GTF-2H5::AG knockin animals
      showing exclusive nuclear expression in all tissues (PMID:34824371).
    action: ACCEPT
    reason: >-
      Nuclear localization is well established. GTF-2H5::AG showed exclusive nuclear
      expression in various tissues including oocytes, hypodermal, intestinal, and
      muscle cells (PMID:34824371).
    supported_by:
      - reference_id: PMID:34824371
        supporting_text: >-
          Both GTF-2H5 as well as GTF-2H1 showed exclusive nuclear expression in
          various tissues of C. elegans

- term:
    id: GO:0005694
    label: chromosome
  evidence_type: IEA
  original_reference_id: GO_REF:0000044
  review:
    summary: >-
      IEA annotation for chromosome localization, mapped from UniProt subcellular location.
      GTF-2H5 re-localizes to paired homologous chromosomes (bivalents) in oocytes after
      UV irradiation, reflecting TFIIH binding to UV-damaged DNA (PMID:34824371).
    action: ACCEPT
    reason: >-
      Chromosome localization is experimentally confirmed. GTF-2H5::AG was observed to
      re-localize to oocyte bivalents after UV irradiation (PMID:34824371). This is
      a conditional localization associated with NER activity, but the annotation to
      chromosome is still valid.
    supported_by:
      - reference_id: PMID:34824371
        supporting_text: >-
          we observed clear re-localization of both GTF-2H5::AG and AG::GTF-2H1 to
          oocyte bivalents 10 min after UV irradiation

- term:
    id: GO:0006289
    label: nucleotide-excision repair
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: >-
      IEA annotation from InterPro domain mapping for NER involvement. Consistent
      with the IMP annotation and extensive experimental evidence showing gtf-2H5
      mutants are as UV sensitive as NER-deficient xpa-1 mutants (PMID:34824371).
    action: ACCEPT
    reason: >-
      Correct and well-supported. NER is a core function of GTF-2H5, confirmed
      experimentally. This broader NER term complements the more specific preincision
      complex assembly IBA annotation.

- term:
    id: GO:0006367
    label: transcription initiation at RNA polymerase II promoter
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: >-
      IEA annotation from InterPro domain mapping. TFIIH has an essential role in
      transcription initiation, promoter opening, and promoter escape. GTF-2H5
      contributes to transcription initiation by stabilizing TFIIH levels
      (PMID:34824371).
    action: ACCEPT
    reason: >-
      Appropriate annotation. TFIIH is required for promoter opening during
      transcription initiation. GTF-2H5 stabilizes TFIIH and becomes essential for
      transcription when it is challenged, consistent with a role in initiation.
      This is more specific than the IBA GO:0006366 annotation and provides useful
      detail about the stage of transcription affected.
    supported_by:
      - reference_id: PMID:34824371
        supporting_text: >-
          TTDA appears mostly dispensable for TFIIH function in facilitating transcription
          initiation by RNA polymerase II. However, in conditions of transcription stress,
          when there is demand for high TFIIH concentrations due to e.g high transcriptional
          output or reduced availability of other transcription initiation factors, the
          TFIIH-stabilizing ability of TTDA becomes essential to ensure sufficiently high
          TFIIH levels for transcription to initiate

- term:
    id: GO:0000439
    label: transcription factor TFIIH core complex
  evidence_type: TAS
  original_reference_id: PMID:34824371
  review:
    summary: >-
      TAS annotation for TFIIH core complex membership based on Thijssen et al. 2021.
      The paper confirms GTF-2H5 as a subunit of the TFIIH core complex via mass
      spectrometry and functional studies.
    action: ACCEPT
    reason: >-
      Well-supported by the primary publication. Co-immunoprecipitation followed by
      mass spectrometry confirmed that GTF-2H5 is part of the TFIIH complex
      (PMID:34824371). Consistent with IBA and IEA annotations.
    supported_by:
      - reference_id: PMID:34824371
        supporting_text: >-
          In wild type animals, the entire TFIIH complex co-immunoprecipitated with
          AG::GTF-2H1, including the small GTF-2H5 subunit of which three peptides
          were identified

- term:
    id: GO:0003684
    label: damaged DNA binding
  evidence_type: IMP
  original_reference_id: PMID:34824371
  qualifier: contributes_to
  review:
    summary: >-
      IMP annotation with contributes_to qualifier for damaged DNA binding. GTF-2H5
      facilitates TFIIH recruitment to UV-damaged chromosomes. In gtf-2H5 mutants,
      TFIIH recruitment to damaged DNA was strongly reduced (PMID:34824371). The
      contributes_to qualifier is appropriate because GTF-2H5 does not directly bind
      damaged DNA itself but enables TFIIH complex recruitment to damage sites.
    action: ACCEPT
    reason: >-
      Well-supported by direct experimental evidence. The contributes_to qualifier
      is correctly used since GTF-2H5 facilitates TFIIH binding to damaged DNA rather
      than binding directly. Live imaging showed strongly reduced TFIIH recruitment to
      UV-damaged chromosomes in gtf-2H5 mutants (PMID:34824371).
    supported_by:
      - reference_id: PMID:34824371
        supporting_text: >-
          we tested re-localization of AG::GTF-2H1 in gtf-2H5 mutants and strikingly
          observed that its UV-induced recruitment to damaged chromosomes was strongly
          reduced after 10 min and persisted after 35 min

- term:
    id: GO:0006289
    label: nucleotide-excision repair
  evidence_type: IMP
  original_reference_id: PMID:34824371
  review:
    summary: >-
      IMP annotation for NER involvement based on mutant phenotype. gtf-2H5 mutants
      are as UV sensitive as NER-deficient xpa-1 mutants, showing severe embryonic
      lethality upon UV irradiation. Additionally, TFIIH recruitment to damaged DNA
      is impaired and repair cannot be completed (PMID:34824371).
    action: ACCEPT
    reason: >-
      Strong experimental evidence from multiple assays: UV survival assays showing
      gtf-2H5 mutants are as sensitive as xpa-1, impaired TFIIH recruitment to
      damaged DNA, and persistent damage foci indicating incomplete repair
      (PMID:34824371). NER is a core function of this gene.
    supported_by:
      - reference_id: PMID:34824371
        supporting_text: >-
          We observed that gtf-2H5 mutants are as sensitive to UV-induced DNA damage
          as NER-deficient xpa-1 mutants, showing severe embryonic lethality upon UV
          irradiation
      - reference_id: PMID:34824371
        supporting_text: >-
          GTF-2H5 is needed for efficient binding of TFIIH to damaged DNA and that in
          absence of GTF-2H5 repair cannot be completed

- term:
    id: GO:0006366
    label: transcription by RNA polymerase II
  evidence_type: IMP
  original_reference_id: PMID:34824371
  review:
    summary: >-
      IMP annotation for involvement in Pol II transcription. When transcription was
      challenged by partial knockdown of TFIIE (gtf-2E1 RNAi), gtf-2H5 mutants
      showed severe embryonic lethality and reduced expression of housekeeping genes
      and a muscle-specific GFP transgene (PMID:34824371).
    action: ACCEPT
    reason: >-
      Supported by multiple lines of evidence. Combined loss of gtf-2H5 and gtf-2E1
      strongly reduced transcription of housekeeping genes cdc-42 and pmp-3, and
      reduced GFP reporter expression in muscle cells (PMID:34824371). Although
      GTF-2H5 is dispensable for transcription under normal conditions, it has a
      genuine role in maintaining transcriptional capacity.
    supported_by:
      - reference_id: PMID:34824371
        supporting_text: >-
          the combined loss of gtf-2H5 and gtf-2E1 strongly reduced transcription
          of both housekeeping genes
      - reference_id: PMID:34824371
        supporting_text: >-
          in conditions of limited availability of the TFIIE transcription factor and
          lowered gene expression, GTF-2H5 becomes essential for transcription efficiency
          and viability

- term:
    id: GO:0005198
    label: structural molecule activity
  evidence_type: IMP
  original_reference_id: PMID:34824371
  review:
    summary: >-
      Novel annotation. GTF-2H5 functions as a structural stabilizer of the TFIIH complex.
      Loss of GTF-2H5 reduces TFIIH protein levels by more than 50% in all tested tissues,
      while the complex composition itself remains intact minus GTF-2H5 (PMID:34824371).
      GTF-2H5 does not have catalytic activity; its primary molecular function is to
      stabilize the TFIIH complex, consistent with structural molecule activity.
    action: NEW
    reason: >-
      No molecular function annotation currently exists for GTF-2H5 in GOA other than
      the contributes_to damaged DNA binding. The primary independent molecular function
      of GTF-2H5 is stabilizing the TFIIH complex, which is best captured by structural
      molecule activity (GO:0005198). This is supported by the finding that loss of
      GTF-2H5 leads to reduced TFIIH levels by more than 50% while the complex itself
      remains assembled, indicating GTF-2H5 acts as a structural stabilizer
      (PMID:34824371).
    supported_by:
      - reference_id: PMID:34824371
        supporting_text: >-
          loss of GTF-2H5 led to reduced levels of AG::GTF2H1 in all tested tissues by
          more than 50%
      - reference_id: PMID:34824371
        supporting_text: >-
          GTF-2H5 has an evolutionary conserved function in maintaining steady-state
          levels of TFIIH, not only in vitro but also in various tissues in vivo

