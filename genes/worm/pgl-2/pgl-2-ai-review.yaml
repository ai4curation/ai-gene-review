- id: file:worm/pgl-2/pgl-2-deep-research-falcon.md
  title: Falcon (Edison) Deep Research Report on pgl-2 (C. elegans)
  findings:
  - statement: |-
      PGL-2 is best annotated as a P-granule-localized, PGL-family scaffold/assembly
      component rather than a catalytic enzyme; no enzymatic activity has been
      experimentally established for it.
    supporting_text: |-
      no enzymatic activity is experimentally established for PGL-2
    reference_section_type: OTHER
  - statement: |-
      PGL-2 lacks the RGG box present in PGL-1/PGL-3, so its RNA-binding modality
      or strength may differ from its paralogs; RNA binding for PGL-2 is inferred
      from family membership rather than directly demonstrated.
    supporting_text: |-
      PGL-2 lacks an RGG box
    reference_section_type: OTHER
  - statement: |-
      PGL-2 localizes to germline P granules in postembryonic germ cells and was
      undetectable in embryos under the staining conditions used by Kawasaki et al.,
      contrasting with the embryonic prominence of PGL-1/PGL-3.
    supporting_text: |-
      undetectable in embryos
    reference_section_type: OTHER
  - statement: |-
      A 2024 CRISPR-tagging germ-granule atlas confirms PGL-2 colocalizes with PGL-1
      in the P granule, reinforcing its use as a P-granule component.
    supporting_text: |-
      PGL-2 and PGL-3 colocalize with PGL-1 in the P granule
    reference_section_type: OTHER
  - statement: |-
      Each PGL protein can localize to P granules independently of the others, but
      efficient recruitment/retention of PGL proteins including PGL-2 requires the
      Vasa-like DEAD-box helicase GLH-1, placing PGL-2 within the GLH-1-dependent
      P-granule assembly network.
    supporting_text: |-
      each PGL protein can localize to P granules independently of the other PGLs
    reference_section_type: OTHER
  - statement: |-
      pgl-2 single mutants show no significant sterility or obvious germline defects,
      and pgl-2; pgl-1 double mutants do not enhance pgl-1 sterility, indicating
      PGL-2 is dispensable under standard laboratory conditions and is not the
      principal redundant partner of PGL-1 (that role belongs to PGL-3).
    supporting_text: |-
      pgl-2; pgl-1 double mutants do not enhance
    reference_section_type: OTHER
core_functions:
- description: |-
    Acts as a postembryonic-specific scaffold/assembly component of P granules,
    germline ribonucleoprotein condensates. PGL-2 physically associates with the
    other PGL-family proteins (PGL-1 and PGL-3) and contributes to P-granule
    composition and organization. Falcon deep research concludes the most defensible
    primary function is a P-granule scaffold/assembly component rather than a
    catalytic enzyme (no enzymatic activity is experimentally established for PGL-2).
    Efficient recruitment/retention of PGL proteins, including PGL-2, into P granules
    depends on the Vasa-like DEAD-box helicase GLH-1.
