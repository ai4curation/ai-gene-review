id: P34266
gene_symbol: pgl-2
taxon:
  id: NCBITaxon:6239
  label: Caenorhabditis elegans
description: |-
  P granule abnormality protein 2 (PGL-2) is a PGL-family component of P granules,
  germline ribonucleoprotein condensates, in C. elegans. It associates with P
  granules predominantly during postembryonic development and was reported as
  undetectable in embryos by Kawasaki et al., contrasting with PGL-1/PGL-3.
  PGL-2 physically associates with PGL-1 and PGL-3 and contributes to P-granule
  composition/organization; falcon deep research concludes its most defensible
  primary function is a P-granule scaffold/assembly component rather than a
  catalytic enzyme, as no enzymatic activity has been experimentally established
  for it. Unlike PGL-1/PGL-3, PGL-2 lacks an RGG box, so any RNA-binding role is
  inferred rather than directly demonstrated. PGL-2 is dispensable under standard
  laboratory conditions (pgl-2 single mutants are fertile and pgl-2; pgl-1 doubles
  do not enhance pgl-1 sterility); the principal redundant partner of PGL-1 for
  fertility is PGL-3, not PGL-2.
existing_annotations:
- term:
    id: GO:0030154
    label: cell differentiation
  evidence_type: IEA
  original_reference_id: GO_REF:0000043
  review:
    summary: IEA annotation based on UniProtKB keyword mapping for differentiation.
      PGL-2 is involved in germline-specific processes and P granule assembly, which
      supports germ cell identity and prevents inappropriate somatic differentiation.
      However, this broad term does not capture PGL-2's specific role in postembryonic
      germline development.
    action: MODIFY
    reason: While PGL-2 does contribute to maintaining germ cell identity and preventing
      inappropriate somatic differentiation through P granule function, the broad
      term 'cell differentiation' is too general. PGL-2 specifically functions in
      germline development and germ cell fate maintenance during postembryonic stages.
    proposed_replacement_terms:
    - id: GO:0007281
      label: germ cell development
    additional_reference_ids: []
    supported_by:
    - reference_id: PMID:15238518
      supporting_text: PGL-2 is associated with P granules only during postembryonic
        development... pgl-2 or pgl-3 single-mutant worms do not show obvious defects
        in germline development. However, pgl-1; pgl-3 (but not pgl-2; pgl-1) double-mutant
        hermaphrodites and males show significantly enhanced sterility at all temperatures
    - reference_id: file:worm/pgl-2/pgl-2-falcon-research.md
      supporting_text: These granules are essential for ensuring the totipotency and
        proper differentiation of germ cells by sequestering or modulating the translation
        of specific mRNAs, thereby preventing premature somatic differentiation
    - reference_id: file:worm/pgl-2/pgl-2-deep-research-falcon.md
      supporting_text: |-
        PGL-2 contributes to P-granule composition/organization and germline RNP regulation
- term:
    id: GO:0048477
    label: oogenesis
  evidence_type: IEA
  original_reference_id: GO_REF:0000043
  review:
    summary: IEA annotation based on UniProtKB keyword mapping for oogenesis. While
      PGL-2 is involved in germline development and fertility, its specific role is
      broader than just oogenesis - it functions in both male and female germline
      development and is essential for overall germ cell proliferation and maturation.
    action: KEEP_AS_NON_CORE
    reason: This annotation captures one aspect of PGL-2 function but is too narrow.
      PGL-2 functions in both male and female germline development. While oogenesis
      is one process PGL-2 supports, its core function is broader P granule assembly
      and post-transcriptional regulation that affects gametogenesis in both sexes.
      Keep as non-core since it represents only part of PGL-2's reproductive function.
    additional_reference_ids: []
    supported_by:
    - reference_id: PMID:15238518
      supporting_text: pgl-1; pgl-3 (but not pgl-2; pgl-1) double-mutant hermaphrodites
        and males show significantly enhanced sterility at all temperatures... Mutant
        hermaphrodites show defects in germline proliferation and in production of
        healthy gametes and viable embryos
    - reference_id: file:worm/pgl-2/pgl-2-falcon-research.md
      supporting_text: genetic studies have linked losses of P granule components
        to defects in gametogenesis and to sterility under stress conditions
    - reference_id: file:worm/pgl-2/pgl-2-deep-research-falcon.md
      supporting_text: |-
        pgl-2; pgl-1 double mutants do not enhance
- term:
    id: GO:0043186
    label: P granule
  evidence_type: IDA
  original_reference_id: PMID:15238518
  review:
    summary: Well-supported experimental annotation based on direct immunofluorescence
      and localization studies. PGL-2 is definitively localized to P granules during
      postembryonic development, as demonstrated by multiple experimental approaches
      including fluorescently tagged proteins.
    action: ACCEPT
    reason: This annotation is strongly supported by experimental evidence. The original
      reference (PMID:15238518) provides direct experimental demonstration of PGL-2
      localization to P granules, and this has been confirmed by subsequent studies.
      P granule localization is a core characteristic of PGL-2.
    additional_reference_ids: []
    supported_by:
    - reference_id: PMID:15238518
      supporting_text: PGL-3 is associated with P granules at all stages of development,
        while PGL-2 is associated with P granules only during postembryonic development
    - reference_id: file:worm/pgl-2/pgl-2-falcon-research.md
      supporting_text: PGL-2 is localized specifically to cytoplasmic ribonucleoprotein
        granules known as P granules, which are deposited in the germline of C. elegans
    - reference_id: file:worm/pgl-2/pgl-2-deep-research-falcon.md
      supporting_text: |-
        PGL-2 and PGL-3 colocalize with PGL-1 in the P granule
    - reference_id: file:worm/pgl-2/pgl-2-deep-research-falcon.md
      supporting_text: |-
        each PGL protein can localize to P granules independently of the other PGLs
- term:
    id: GO:0003723
    label: RNA binding
  evidence_type: TAS
  original_reference_id: file:worm/pgl-2/pgl-2-falcon-research.md
  review:
    summary: |-
      PGL-2 is a component of P granules (germline RNP condensates) and is inferred
      to contribute to post-transcriptional regulation of germline mRNAs. RNA binding
      for PGL-2 specifically is inferred from family membership rather than directly
      demonstrated: falcon deep research notes that, unlike PGL-1/PGL-3, PGL-2 lacks
      the RGG box associated with RNA binding, so its RNA-binding modality or strength
      may differ from its paralogs. Retained as a non-core, inferential annotation
      rather than asserting it as a well-established core molecular function.
    action: NEW
    reason: |-
      RNA binding is plausible for PGL-2 as a P-granule RNP component, but the direct
      evidence is for PGL-1/PGL-3; PGL-2 lacks the RGG box and no PGL-2-specific
      RNA-binding assay is reported. Retained as an inferred (TAS) annotation grounded
      in deep research synthesis, not promoted to the primary/core molecular function,
      which is better captured by condensate scaffold activity (GO:0140693).
    additional_reference_ids:
    - PMID:15238518
    supported_by:
    - reference_id: file:worm/pgl-2/pgl-2-falcon-research.md
      supporting_text: PGL-2 functions as an integral RNA-binding component within
        the P granules and is involved in post-transcriptional regulation of germline
        mRNAs
    - reference_id: file:worm/pgl-2/pgl-2-deep-research-falcon.md
      supporting_text: |-
        PGL-2 lacks an RGG box
- term:
    id: GO:0010608
    label: post-transcriptional regulation of gene expression
  evidence_type: TAS
  original_reference_id: file:worm/pgl-2/pgl-2-falcon-research.md
  review:
    summary: PGL-2 participates in post-transcriptional regulation of gene expression
      through its role in P granule-mediated mRNA regulation. P granules serve as
      hubs for translational control and RNA surveillance in germ cells.
    action: NEW
    reason: This is a key biological process that PGL-2 participates in through its
      P granule function. Post-transcriptional regulation is central to PGL-2's role
      in germline development and is well-documented in the literature.
    additional_reference_ids:
    - PMID:15238518
    supported_by:
    - reference_id: file:worm/pgl-2/pgl-2-falcon-research.md
      supporting_text: Mechanistically, PGL-2 contributes to the regulation of mRNA
        stability and translation in the germline, likely through interactions with
        specific mRNAs and other RNA-binding proteins, thereby influencing germline-specific
        RNA processing pathways
    - reference_id: file:worm/pgl-2/pgl-2-falcon-research.md
      supporting_text: The protein contributes to the assembly and maintenance of
        P granules, which serve as critical hubs for post-transcriptional regulation,
        translational control, and RNA surveillance in germ cells
    - reference_id: file:worm/pgl-2/pgl-2-deep-research-falcon.md
      supporting_text: |-
        PGL-2 contributes to P-granule composition/organization and germline RNP regulation
- term:
    id: GO:0140693
    label: molecular condensate scaffold activity
  evidence_type: IC
  original_reference_id: PMID:15238518
  review:
    summary: |-
      PGL-2 is a PGL-family P-granule component that physically associates with PGL-1
      and PGL-3 and contributes to the composition/organization of P granules, which
      are germline RNP condensates. Falcon deep research concludes the most defensible
      primary function for PGL-2 is a P-granule scaffold/assembly component rather
      than a catalytic enzyme. Molecular condensate scaffold activity captures this
      role more informatively than the uninformative GO:0005515 protein binding term.
    action: NEW
    reason: |-
      Replaces the uninformative GO:0005515 (protein binding) molecular function.
      PGL-2 brings together PGL-family proteins within P granules (germline
      condensates) and contributes to their assembly/organization, consistent with
      molecular condensate scaffold activity. This is inferred (IC) from documented
      PGL-PGL physical interactions and P-granule localization combined with the
      condensate biology of germ granules; no PGL-2-specific catalytic activity is
      reported.
    additional_reference_ids: []
    supported_by:
    - reference_id: PMID:15238518
      supporting_text: All three PGL proteins interact with each other in vitro. Furthermore,
        PGL-1 and PGL-3 are co-immunoprecipitated from embryo extracts, indicating
        that they are indeed in the same protein complex in vivo
    - reference_id: file:worm/pgl-2/pgl-2-deep-research-falcon.md
      supporting_text: |-
        P-granule-localized, PGL-family scaffold/assembly component
