id: O01739
gene_symbol: ddo-3
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:6239
  label: Caenorhabditis elegans
description: >-
  DDO-3 is a secreted D-aspartate oxidase (EC 1.4.3.1) in C. elegans that catalyzes the oxidative
  deamination of acidic D-amino acids, primarily D-aspartate and D-glutamate, using FAD as a
  cofactor. Unlike typical eukaryotic DDOs which localize to peroxisomes via a PTS1 signal, DDO-3
  contains an N-terminal signal peptide and is secreted extracellularly. In hermaphrodites, DDO-3
  is secreted from proximal gonadal sheath cells and transferred to the oocyte surface; in males,
  it is secreted from the seminal vesicle into seminal fluid. DDO-3 is required for normal
  self-fertility, hatching, lifespan regulation, and nose-touch response. It is the primary enzyme
  responsible for in vivo metabolism of D-glutamate in C. elegans.
existing_annotations:
- term:
    id: GO:0003884
    label: D-amino-acid oxidase activity
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      DDO-3 belongs to the DAMOX/DASOX family and catalyzes oxidative deamination of acidic
      D-amino acids (PMID:20564561). The IBA annotation for D-amino-acid oxidase activity is
      well supported by the phylogenetic placement of DDO-3 within the DAO family. However,
      DDO-3 is more precisely a D-aspartate oxidase rather than a general D-amino acid oxidase;
      it is stereospecific for acidic D-amino acids and does not act on neutral D-amino acids
      the way classical DAO enzymes do (PMID:20564561). The IBA term GO:0003884 is a reasonable
      parent-level annotation given the family-wide inference.
    action: ACCEPT
    reason: >-
      GO:0003884 is the parent term for the DAO family and is consistent with the phylogenetic
      inference. DDO-3 does possess D-amino acid oxidase activity, albeit restricted to acidic
      substrates. The more specific activities (D-aspartate oxidase, D-glutamate oxidase) are
      captured by separate annotations.
    supported_by:
      - reference_id: PMID:20564561
        supporting_text: "Comparative characterization of three D-aspartate oxidases and one D-amino acid oxidase from Caenorhabditis elegans"
- term:
    id: GO:0019478
    label: D-amino acid catabolic process
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      DDO-3 functions in the catabolism of D-amino acids, specifically D-aspartate and D-glutamate.
      The IBA annotation for involvement in D-amino acid catabolic process is well supported.
      DDO-3 is the primary enzyme for in vivo D-glutamate metabolism in C. elegans
      (PMID:30387556), and ddo-3 mutants accumulate high D-Glu content (PMID:22393259).
    action: ACCEPT
    reason: >-
      Core biological process annotation. DDO-3 catabolizes acidic D-amino acids. The IBA
      phylogenetic inference is consistent with experimental evidence showing elevated D-Glu
      in ddo-3 mutants.
    supported_by:
      - reference_id: PMID:30387556
        supporting_text: "In Caenorhabditis elegans, the enzyme responsible for in vivo metabolism of d-glutamate is DDO-3, one of the three DDO isoforms, which is also required for normal self-fertility, hatching, and lifespan."
- term:
    id: GO:0003884
    label: D-amino-acid oxidase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: >-
      IEA annotation based on InterPro domain matches (IPR006181, IPR023209). DDO-3 contains the
      D-amino acid oxidase domain and the conserved active site motif. This is consistent with
      the experimentally characterized enzymatic activity (PMID:20564561).
    action: ACCEPT
    reason: >-
      Consistent with the IBA annotation and direct experimental evidence. The InterPro-based
      inference correctly identifies the DAO domain family membership.
- term:
    id: GO:0005576
    label: extracellular region
  evidence_type: IEA
  original_reference_id: GO_REF:0000044
  review:
    summary: >-
      IEA annotation derived from UniProt subcellular location mapping. DDO-3 is annotated as
      Secreted in UniProt based on experimental evidence from PMID:30387556. This IEA
      annotation is consistent with the IDA annotation for the same term.
    action: ACCEPT
    reason: >-
      Correctly reflects the secreted nature of DDO-3. The protein contains an N-terminal signal
      peptide and is secreted extracellularly in a SP-dependent manner (PMID:30387556).
    supported_by:
      - reference_id: PMID:30387556
        supporting_text: "In this study, we found that DDO-3 is a secreted DDO, the first such enzyme to be described in eukaryotes."
- term:
    id: GO:0008445
    label: D-aspartate oxidase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  review:
    summary: >-
      IEA annotation based on Rhea reaction mapping (RHEA:12512) and EC number 1.4.3.1. DDO-3
      catalyzes the reaction D-aspartate + O2 + H2O = oxaloacetate + H2O2 + NH4(+), which is
      the defining reaction for D-aspartate oxidase (PMID:20564561).
    action: ACCEPT
    reason: >-
      Core molecular function. The Rhea/EC-based annotation correctly identifies the primary
      catalytic activity of DDO-3 as experimentally demonstrated.
    supported_by:
      - reference_id: PMID:20564561
        supporting_text: "Comparative characterization of three D-aspartate oxidases and one D-amino acid oxidase from Caenorhabditis elegans"
- term:
    id: GO:0046416
    label: D-amino acid metabolic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: >-
      IEA annotation from InterPro domain mapping. GO:0046416 (D-amino acid metabolic process)
      is a parent of GO:0019478 (D-amino acid catabolic process), which is already annotated
      via IBA. This is a broader, less informative term.
    action: ACCEPT
    reason: >-
      While this is less specific than the catabolic process term (GO:0019478), it is not
      incorrect. The IEA mapping from InterPro is valid. It is acceptable for IEA annotations
      to be broader than more specific IBA or experimental annotations.
- term:
    id: GO:0047821
    label: D-glutamate oxidase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000116
  review:
    summary: >-
      IEA annotation based on Rhea reaction mapping (RHEA:10028). DDO-3 catalyzes the oxidation
      of D-glutamate to 2-oxoglutarate with release of H2O2 and NH4(+). UniProt records this
      catalytic activity with experimental evidence from PMID:20564561, showing a KM of 0.68 mM
      for D-glutamate. DDO-3 is the primary enzyme for in vivo D-glutamate metabolism in
      C. elegans (PMID:30387556).
    action: ACCEPT
    reason: >-
      Core molecular function. D-glutamate oxidase activity is experimentally demonstrated for
      DDO-3 with a lower KM for D-glutamate (0.68 mM) than for D-aspartate (3.81 mM),
      suggesting D-glutamate may be a preferred substrate.
    supported_by:
      - reference_id: PMID:30387556
        supporting_text: "In Caenorhabditis elegans, the enzyme responsible for in vivo metabolism of d-glutamate is DDO-3"
- term:
    id: GO:0071949
    label: FAD binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: >-
      IEA annotation from InterPro domain mapping (IPR023209, FAD-dependent oxidoreductase).
      DDO-3 uses FAD as a cofactor, with binding residues at positions 56, 63, and 339
      (by similarity to human DDO, Q99489). The cofactor requirement is experimentally
      confirmed (PMID:20564561).
    action: ACCEPT
    reason: >-
      Core cofactor binding property. FAD is essential for the oxidoreductase activity of DDO-3.
      The InterPro-based inference is fully consistent with experimental evidence.
- term:
    id: GO:0008445
    label: D-aspartate oxidase activity
  evidence_type: ISS
  original_reference_id: GO_REF:0000024
  review:
    summary: >-
      ISS annotation transferred from human DDO (UniProtKB:Q99489). DDO-3 shares sufficient
      sequence similarity with human DDO to support this functional transfer. The activity
      is also directly demonstrated for DDO-3 itself (PMID:20564561).
    action: ACCEPT
    reason: >-
      Core molecular function supported by both sequence similarity to human DDO and direct
      experimental characterization. The ISS annotation is valid.
- term:
    id: GO:0008445
    label: D-aspartate oxidase activity
  evidence_type: ISS
  original_reference_id: GO_REF:0000024
  review:
    summary: >-
      Second ISS annotation for D-aspartate oxidase activity, transferred from mouse Ddo
      (UniProtKB:Q922Z0). This is a duplicate of the previous ISS annotation for the same
      GO term but based on a different ortholog reference. The activity is experimentally
      confirmed for DDO-3 (PMID:20564561).
    action: ACCEPT
    reason: >-
      Duplicate annotation from a different ortholog source (mouse Ddo vs human DDO). Both
      are valid ISS transfers and the function is experimentally confirmed.
- term:
    id: GO:0019478
    label: D-amino acid catabolic process
  evidence_type: ISS
  original_reference_id: GO_REF:0000024
  review:
    summary: >-
      ISS annotation for D-amino acid catabolic process transferred from mouse Ddo
      (UniProtKB:Q922Z0). Consistent with the IBA annotation for the same term and with
      experimental evidence that ddo-3 mutants accumulate D-Glu (PMID:22393259).
    action: ACCEPT
    reason: >-
      Core biological process. The ISS transfer is consistent with both IBA inference and
      experimental evidence for DDO-3 function in D-amino acid catabolism.
- term:
    id: GO:0071949
    label: FAD binding
  evidence_type: ISS
  original_reference_id: GO_REF:0000024
  review:
    summary: >-
      ISS annotation for FAD binding transferred from mouse Ddo (UniProtKB:Q922Z0). DDO-3
      contains conserved FAD binding residues and uses FAD as cofactor (PMID:20564561).
    action: ACCEPT
    reason: >-
      Core cofactor binding. The ISS transfer is consistent with the IEA annotation and
      experimentally confirmed FAD requirement.
- term:
    id: GO:0005576
    label: extracellular region
  evidence_type: IDA
  original_reference_id: PMID:30387556
  review:
    summary: >-
      IDA annotation based on direct experimental evidence from Saitoh et al. 2019.
      DDO-3 was shown to be secreted from proximal gonadal sheath cells in hermaphrodites
      and from the seminal vesicle in males. It is the first secreted DDO described in
      eukaryotes. Importantly, DDO-3 lacks a PTS1 peroxisomal targeting signal but instead
      has an N-terminal signal peptide. Deletion of the signal peptide abolished secretion
      and all physiological functions.
    action: ACCEPT
    reason: >-
      Core localization annotation with strong experimental evidence. DDO-3 is uniquely
      a secreted enzyme in the DDO family, and secretion is essential for its physiological
      function. This is a defining characteristic of DDO-3.
    supported_by:
      - reference_id: PMID:30387556
        supporting_text: "In this study, we found that DDO-3 is a secreted DDO, the first such enzyme to be described in eukaryotes."
      - reference_id: PMID:30387556
        supporting_text: "Full-length DDO-3 transgene rescued all phenotypes elicited by the deletion of ddo-3, whereas a DDO-3 transgene lacking the putative SP did not."
