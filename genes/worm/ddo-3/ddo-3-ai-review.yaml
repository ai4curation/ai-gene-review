core_functions:
- molecular_function:
    id: GO:0008445
    label: D-aspartate oxidase activity
  description: >-
    DDO-3 is a D-aspartate oxidase (EC 1.4.3.1) that catalyzes the oxidative deamination
    of D-aspartate to oxaloacetate with release of H2O2 and NH4(+), and of D-glutamate
    to 2-oxoglutarate. It uses FAD as cofactor. KM values are 3.81 mM for D-aspartate
    and 0.68 mM for D-glutamate (PMID:20564561). DDO-3 is the primary enzyme responsible
    for in vivo D-glutamate catabolism in C. elegans (PMID:30387556).
