proposed_new_terms: []

suggested_questions:
- question: >-
    Does DDO-3 have any enzymatic activity on substrates beyond D-aspartate, D-glutamate,
    and NMDA? Understanding the full substrate range would help determine whether the
    broader GO:0003884 (D-amino-acid oxidase activity) annotation is truly appropriate
    or if this should be restricted to acidic D-amino acid substrates only.
- question: >-
    What is the physiological significance of DDO-3 secretion into seminal fluid during
    mating? While secretion from gonadal sheath cells clearly relates to reproduction,
    the male-specific transfer to the hermaphrodite uterus suggests additional functional
    roles that are not yet fully understood.

suggested_experiments:
- description: >-
    Substrate specificity profiling using purified recombinant DDO-3 against a panel of
    D-amino acids beyond the acidic ones tested, to determine if the enzyme has any
    activity on neutral or basic D-amino acids at physiological concentrations.
- description: >-
    Tissue-specific rescue experiments using the ddo-3 mutant to determine which expression
    domains (gonadal sheath, seminal vesicle, coelomocytes, hypodermal cells) are
    necessary and sufficient for rescue of specific phenotypes (fertility, hatching,
    lifespan, nose-touch response).
