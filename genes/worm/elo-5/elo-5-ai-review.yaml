id: Q20300
gene_symbol: elo-5
aliases:
  - F41H10.7
  - CEELO5
taxon:
  id: NCBITaxon:6239
  label: Caenorhabditis elegans
description: >-
  ELO-5 is a long-chain fatty acid elongase in C. elegans that catalyzes the
  first and rate-limiting condensation reaction of the fatty acid elongation
  cycle. Its primary biological role is the de novo synthesis of monomethyl
  branched-chain fatty acids (mmBCFAs), specifically elongating C13ISO
  (11-methyldodecanoic acid) to C15ISO (isopentadecanoic acid) and contributing
  to the production of C17ISO (isoheptadecanoic acid). These mmBCFAs are
  essential for C. elegans growth and development; loss of elo-5 function causes
  L1 larval arrest that is rescued specifically by dietary C17ISO supplementation
  (PMID:15340492). ELO-5 is a multi-pass transmembrane protein of the ELO family,
  expressed in the gut and head cells. It belongs to the PANTHER subfamily
  PTHR11157:SF29 (ELOVL5-like), and IBA annotations propagate functions from
  mammalian ELOVL family orthologs. However, the core in vivo specificity of
  ELO-5 is for mmBCFA elongation, which is distinct from the PUFA and
  sphingolipid-related elongation functions of some mammalian orthologs.
references:
  - id: PMID:15340492
    title: Monomethyl branched-chain fatty acids play an essential role in
      Caenorhabditis elegans development.
    findings:
      - statement: ELO-5 and ELO-6 are long-chain fatty acid elongation enzymes
          that produce C15ISO and C17ISO mmBCFAs de novo in C. elegans
        supporting_text: >-
          We show that C. elegans synthesizes mmBCFAs de novo and utilizes the
          long-chain fatty acid elongation enzymes ELO-5 and ELO-6 to produce
          two mmBCFAs, C15ISO and C17ISO.
        reference_section_type: ABSTRACT
      - statement: mmBCFAs are essential for C. elegans growth and development
        supporting_text: >-
          These mmBCFAs are essential for C. elegans growth and development, as
          suppression of their biosynthesis results in a growth arrest at the
          first larval stage.
        reference_section_type: ABSTRACT
      - statement: ELO-5 is specifically required for C13ISO to C15ISO elongation
          and contributes to C17ISO production
        supporting_text: >-
          Combined data presented in this figure and in the text suggest that
          ELO-6 acts at the elongation step from C15 to C17, whereas ELO-5 may
          be involved in the production of both C15ISO and C17ISO.
        reference_section_type: RESULTS
      - statement: elo-5 is expressed in gut and head cells
        supporting_text: >-
          Transcriptional reporter constructs (elo-5Prom::GFP and
          elo-6Prom::GFP) indicated that both genes are expressed in the gut
          (Figure 2). In addition, elo-5 was expressed in unidentified head
          cells
        reference_section_type: RESULTS
      - statement: elo-5 RNAi reduces C15ISO and C17ISO levels, and only
          dietary C17ISO rescues the phenotype
        supporting_text: >-
          C17ISO is decreased in both RNAi strains, while C15ISO is only
          decreased in elo-5(RNAi).
        reference_section_type: RESULTS
      - statement: elo-5(gk208) null mutant phenocopies L1 arrest
        supporting_text: >-
          This allele phenocopies the L1 arrest phenotype of the elo-5(RNAi)
          animals.
        reference_section_type: RESULTS
      - statement: elo-5 and elo-6 are likely transcriptional targets of LPD-1
          (SREBP homolog)
        supporting_text: >-
          The fact that lpd-1, elo-5, and elo-6 are expressed in the same cells
          concurrently and that the GFP reporter analysis indicated that elo-5
          and elo-6 transcription is downregulated in the absence of lpd-1
          suggests that elo-5 and elo-6 are likely to be the targets of lpd-1.
        reference_section_type: RESULTS
  - id: GO_REF:0000033
    title: Annotation inferences using phylogenetic trees
    findings:
      - statement: IBA annotations propagated from PANTHER family PTHR11157
          (FATTY ACID ACYL TRANSFERASE-RELATED), subfamily SF29 (ELOVL5-like)
        supporting_text: >-
          Phylogenetic annotation inference from characterized family members
          including mammalian ELOVLs, yeast ELO proteins, and Drosophila
          orthologs
  - id: GO_REF:0000002
    title: Gene Ontology annotation through association of InterPro records with
      GO terms
    findings:
      - statement: InterPro ELO family domain (IPR002076) mapped to fatty acid
          elongase activity
        supporting_text: Automated mapping from InterPro domain to GO term
  - id: GO_REF:0000041
    title: Gene Ontology annotation based on UniPathway vocabulary mapping
    findings:
      - statement: UniPathway UPA00094 (fatty acid biosynthesis) mapped to GO
          fatty acid biosynthetic process
        supporting_text: Automated mapping from UniPathway pathway to GO term
  - id: GO_REF:0000120
    title: Combined Automated Annotation using Multiple IEA Methods
    findings:
      - statement: Membrane localization inferred from InterPro domain and
          UniProt subcellular location
        supporting_text: Combined automated annotation from InterPro and UniProt-SubCell
existing_annotations:
  - term:
      id: GO:0005789
      label: endoplasmic reticulum membrane
    evidence_type: IBA
    original_reference_id: GO_REF:0000033
    review:
      summary: >-
        IBA annotation from PANTHER phylogenetic inference. Mammalian ELOVL
        family members (e.g., ELOVL5, ELOVL1) are well-established ER membrane
        proteins that catalyze fatty acid elongation in the ER. ELO-5 is a
        multi-pass transmembrane protein (7 predicted transmembrane helices per
        UniProt) belonging to the ELO family (Pfam PF01151). While there is no
        direct experimental evidence for ER localization in C. elegans, ER
        membrane localization is strongly supported by the conserved topology
        and function of the ELO family across eukaryotes.
      action: ACCEPT
      reason: >-
        Fatty acid elongation is an ER-localized process in eukaryotes, and
        ELO-5 is a multi-pass transmembrane protein of the ELO family. The IBA
        annotation from well-characterized mammalian orthologs is consistent
        with the known biology. UniProt annotates ELO-5 as a membrane
        multi-pass protein.
      supported_by:
        - reference_id: GO_REF:0000033
          supporting_text: >-
            IBA from MGI:MGI:1916051 (Elovl1), MGI:MGI:2156528 (Elovl4),
            PomBase:SPAC1639.01c, UniProtKB:Q9GZR5 (ELOVL4), UniProtKB:Q9H5J4
            (ELOVL1) [all known ER membrane proteins]
  - term:
      id: GO:0009922
      label: fatty acid elongase activity
    evidence_type: IBA
    original_reference_id: GO_REF:0000033
    review:
      summary: >-
        IBA annotation from PANTHER phylogenetic inference. ELO-5 is a member
        of the ELO family (Pfam PF01151, PANTHER PTHR11157:SF29) that catalyzes
        the condensation reaction in fatty acid elongation. PMID:15340492
        directly demonstrates that ELO-5 functions as a fatty acid elongase,
        specifically elongating mmBCFAs. UniProt records catalytic activities
        for two specific reactions: condensation of 11-methyldodecanoyl-CoA
        with malonyl-CoA (C13ISO to C15ISO) and isopentadecanoyl-CoA with
        malonyl-CoA (C15ISO to C17ISO).
      action: ACCEPT
      reason: >-
        This is the core molecular function of ELO-5. Experimentally validated
        by PMID:15340492 showing that elo-5(RNAi) specifically reduces C15ISO
        and C17ISO levels, consistent with fatty acid elongase (3-keto acyl-CoA
        synthase) activity. Also supported by IBA from numerous characterized
        orthologs across eukaryotes.
      supported_by:
        - reference_id: PMID:15340492
          supporting_text: >-
            Combined data presented in this figure and in the text suggest that
            ELO-6 acts at the elongation step from C15 to C17, whereas ELO-5
            may be involved in the production of both C15ISO and C17ISO.
        - reference_id: GO_REF:0000033
          supporting_text: >-
            IBA from multiple characterized ELO/ELOVL family members across
            yeast, Drosophila, mouse, rat, and human
  - term:
      id: GO:0030148
      label: sphingolipid biosynthetic process
    evidence_type: IBA
    original_reference_id: GO_REF:0000033
    review:
      summary: >-
        IBA annotation propagated from PANTHER family. Some ELO/ELOVL family
        members in yeast (ELO2/ELO3 in S. cerevisiae) and mammals produce very
        long-chain fatty acids that serve as precursors for sphingolipid
        (ceramide) biosynthesis. However, the primary experimentally validated
        function of ELO-5 in C. elegans is mmBCFA elongation, not sphingolipid
        precursor production. PMID:15340492 makes no mention of sphingolipids
        or ceramides in the context of ELO-5 function. The L1 arrest phenotype
        is rescued specifically by mmBCFA supplementation, not by sphingolipid
        pathway intermediates.
      action: MARK_AS_OVER_ANNOTATED
      reason: >-
        While some ELO family orthologs (particularly yeast ELO2, ELO3 and
        mammalian ELOVL1) contribute to sphingolipid biosynthesis by producing
        VLCFA precursors for ceramide synthesis, the direct experimental
        evidence for ELO-5 in C. elegans (PMID:15340492) shows its primary
        role is mmBCFA elongation. There is no published evidence linking ELO-5
        specifically to sphingolipid biosynthesis. This annotation likely
        reflects over-propagation of a function from yeast/mammalian paralogs
        that is not the core function of ELO-5. The IBA sources include yeast
        ELO proteins (SGD:S000000630/ELO2, SGD:S000004364/ELO3) whose
        sphingolipid roles are well-established but may not apply to this
        particular C. elegans ortholog.
      supported_by:
        - reference_id: PMID:15340492
          supporting_text: >-
            We show that C. elegans synthesizes mmBCFAs de novo and utilizes the
            long-chain fatty acid elongation enzymes ELO-5 and ELO-6 to produce
            two mmBCFAs, C15ISO and C17ISO. These mmBCFAs are essential for C.
            elegans growth and development [no mention of sphingolipids]
  - term:
      id: GO:0034626
      label: fatty acid elongation, polyunsaturated fatty acid
    evidence_type: IBA
    original_reference_id: GO_REF:0000033
    review:
      summary: >-
        IBA annotation propagated from mammalian ELOVL family members. Several
        mammalian ELOVLs (ELOVL2, ELOVL5) are known to elongate PUFAs. However,
        the direct experimental evidence for ELO-5 in C. elegans (PMID:15340492)
        demonstrates specificity for mmBCFA elongation. The study explicitly
        showed that supplementation with polyunsaturated fatty acids (e.g.,
        C18:3 n6) could NOT rescue the elo-5 loss-of-function phenotype,
        indicating that PUFA elongation is not the core function.
      action: MARK_AS_OVER_ANNOTATED
      reason: >-
        While the ELO family ancestrally includes PUFA elongation activity, the
        specific experimental evidence for ELO-5 (PMID:15340492) shows its
        primary substrate specificity is for mmBCFAs, not PUFAs. The rescue
        experiments in PMID:15340492 explicitly demonstrated that polyunsaturated
        FAs could not compensate for loss of ELO-5: "neither saturated or mono-
        or polyunsaturated FA molecules (C16:0, C16:1 n7, C17:0, C18:3 n6)...
        were able to rescue or reduce defects." This IBA propagation from
        mammalian ELOVL5 orthologs likely does not reflect the in vivo substrate
        specificity of C. elegans ELO-5.
      supported_by:
        - reference_id: PMID:15340492
          supporting_text: >-
            In sharp contrast, neither saturated or mono- or polyunsaturated FA
            molecules (C16:0, C16:1 n7, C17:0, C18:3 n6), mmBCFAs with shorter
            or longer backbones (C13ISO, C18ISO, C19ISO), nor polymethyl branched
            phytanic acid were able to rescue or reduce defects (0 of 30 plates
            in each experiment).
  - term:
      id: GO:0042761
      label: very long-chain fatty acid biosynthetic process
    evidence_type: IBA
    original_reference_id: GO_REF:0000033
    review:
      summary: >-
        IBA annotation from PANTHER family. Many ELO/ELOVL family members
        produce VLCFAs (fatty acids with chain length >20 carbons). However,
        ELO-5 specifically elongates C13 mmBCFA to C15 and C17 mmBCFAs
        (PMID:15340492). These are long-chain (not very long-chain) fatty acids.
        The GO definition of "very long-chain fatty acid" typically refers to
        FAs with more than 22 carbons. C15 and C17 are medium/long-chain.
      action: MARK_AS_OVER_ANNOTATED
      reason: >-
        The products of ELO-5 activity are C15ISO and C17ISO mmBCFAs
        (PMID:15340492), which are long-chain fatty acids, not very long-chain
        fatty acids (typically defined as >C20-C22). This annotation is
        propagated from mammalian and yeast orthologs (e.g., ELOVL1, ELOVL4,
        yeast ELO2/3) that do produce VLCFAs, but the substrate specificity
        of ELO-5 is for shorter mmBCFA chains. The annotation over-extends
        the chain-length specificity relative to what has been experimentally
        demonstrated for this particular enzyme.
      supported_by:
        - reference_id: PMID:15340492
          supporting_text: >-
            C17ISO is decreased in both RNAi strains, while C15ISO is only
            decreased in elo-5(RNAi).
  - term:
      id: GO:0019367
      label: fatty acid elongation, saturated fatty acid
    evidence_type: IBA
    original_reference_id: GO_REF:0000033
    review:
      summary: >-
        IBA annotation propagated from PANTHER family. Some ELO/ELOVL orthologs
        elongate saturated fatty acids. ELO-5 does elongate mmBCFAs which are
        technically saturated (no double bonds), but the annotation
        GO:0019367 is intended for straight-chain saturated fatty acid
        elongation. The experimental evidence (PMID:15340492) shows that
        straight-chain saturated FAs like C16:0 and C17:0 do not rescue
        elo-5 loss-of-function, and the enzyme is specific for branched-chain
        substrates.
      action: MARK_AS_OVER_ANNOTATED
      reason: >-
        While mmBCFAs are technically saturated fatty acids, this GO term
        (fatty acid elongation, saturated fatty acid) is intended for
        straight-chain saturated FA elongation. The experimental evidence
        from PMID:15340492 shows ELO-5 specificity is for branched-chain
        substrates, and straight-chain saturated FAs could not rescue the
        mutant phenotype. This annotation likely reflects family-level
        propagation from orthologs with different substrate specificities.
      supported_by:
        - reference_id: PMID:15340492
          supporting_text: >-
            In sharp contrast, neither saturated or mono- or polyunsaturated FA
            molecules (C16:0, C16:1 n7, C17:0, C18:3 n6), mmBCFAs with shorter
            or longer backbones (C13ISO, C18ISO, C19ISO), nor polymethyl branched
            phytanic acid were able to rescue or reduce defects (0 of 30 plates
            in each experiment).
  - term:
      id: GO:0034625
      label: fatty acid elongation, monounsaturated fatty acid
    evidence_type: IBA
    original_reference_id: GO_REF:0000033
    review:
      summary: >-
        IBA annotation propagated from PANTHER family. Some ELOVL family members
        elongate monounsaturated fatty acids. However, PMID:15340492
        demonstrates that ELO-5 is specific for mmBCFA elongation and that
        monounsaturated FA (C16:1 n7) could not rescue elo-5 loss-of-function.
      action: MARK_AS_OVER_ANNOTATED
      reason: >-
        The experimental evidence from PMID:15340492 explicitly shows that
        monounsaturated FAs cannot compensate for loss of ELO-5 function.
        The enzyme is specific for mmBCFA substrates. This IBA propagation
        from mammalian ELOVL orthologs does not reflect the in vivo substrate
        specificity of ELO-5 in C. elegans.
      supported_by:
        - reference_id: PMID:15340492
          supporting_text: >-
            In sharp contrast, neither saturated or mono- or polyunsaturated FA
            molecules (C16:0, C16:1 n7, C17:0, C18:3 n6), mmBCFAs with shorter
            or longer backbones (C13ISO, C18ISO, C19ISO), nor polymethyl branched
            phytanic acid were able to rescue or reduce defects (0 of 30 plates
            in each experiment).
  - term:
      id: GO:0009922
      label: fatty acid elongase activity
    evidence_type: IEA
    original_reference_id: GO_REF:0000002
    review:
      summary: >-
        IEA annotation from InterPro domain IPR002076 (ELO family) mapped to
        fatty acid elongase activity. This is consistent with the experimentally
        validated function of ELO-5 as a fatty acid elongase (PMID:15340492)
        and the IBA annotation for the same term.
      action: ACCEPT
      reason: >-
        Correct automated annotation. ELO-5 contains the ELO domain
        (IPR002076, Pfam PF01151) and has experimentally validated fatty acid
        elongase activity. This IEA annotation is concordant with the IBA
        annotation and the experimental evidence from PMID:15340492. It is
        acceptable to have both IEA and IBA evidence for the same term.
      supported_by:
        - reference_id: PMID:15340492
          supporting_text: >-
            We show that C. elegans synthesizes mmBCFAs de novo and utilizes the
            long-chain fatty acid elongation enzymes ELO-5 and ELO-6 to produce
            two mmBCFAs, C15ISO and C17ISO.
  - term:
      id: GO:0016020
      label: membrane
    evidence_type: IEA
    original_reference_id: GO_REF:0000120
    review:
      summary: >-
        IEA annotation from combined automated methods (InterPro ELO domain +
        UniProt subcellular location). ELO-5 has 7 predicted transmembrane
        helices (UniProt) and is annotated as a multi-pass membrane protein.
        This is a broader term than the IBA annotation to GO:0005789
        (endoplasmic reticulum membrane), but is not incorrect.
      action: ACCEPT
      reason: >-
        ELO-5 is clearly a membrane protein with 7 predicted transmembrane
        helices. While GO:0016020 (membrane) is less specific than GO:0005789
        (ER membrane) from the IBA annotation, it is not wrong and reflects
        the automated annotation pipeline output. It is acceptable for IEA
        annotations to be broader than IBA annotations.
      supported_by:
        - reference_id: GO_REF:0000120
          supporting_text: >-
            Combined automated annotation from InterPro:IPR002076 and
            UniProtKB-SubCell:SL-0162
  - term:
      id: GO:0006633
      label: fatty acid biosynthetic process
    evidence_type: IEA
    original_reference_id: GO_REF:0000041
    review:
      summary: >-
        IEA annotation from UniPathway (UPA00094, fatty acid biosynthesis).
        ELO-5 catalyzes the condensation step in fatty acid elongation, which
        is part of the broader fatty acid biosynthetic process. This is a
        general term that encompasses the more specific mmBCFA biosynthesis
        function of ELO-5.
      action: ACCEPT
      reason: >-
        This is a correct but general annotation. ELO-5 participates in fatty
        acid biosynthesis by catalyzing the rate-limiting condensation step of
        fatty acid elongation (PMID:15340492). While the more specific function
        is mmBCFA biosynthesis (GO:1902321), the general term is not incorrect
        for an IEA annotation.
      supported_by:
        - reference_id: PMID:15340492
          supporting_text: >-
            We show that C. elegans synthesizes mmBCFAs de novo and utilizes the
            long-chain fatty acid elongation enzymes ELO-5 and ELO-6 to produce
            two mmBCFAs, C15ISO and C17ISO.
  - term:
      id: GO:1902321
      label: methyl-branched fatty acid biosynthetic process
    evidence_type: IMP
    original_reference_id: PMID:15340492
    review:
      summary: >-
        IMP annotation based on the key publication PMID:15340492. elo-5(RNAi)
        and the elo-5(gk208) null mutant show dramatically reduced levels of
        C15ISO and C17ISO mmBCFAs, with the null mutant phenocopying L1 larval
        arrest. The phenotype is specifically rescued by dietary C17ISO
        supplementation, demonstrating that the biosynthetic defect in mmBCFAs
        is solely responsible for the developmental arrest. This is the most
        specific and accurate annotation for ELO-5 function.
      action: ACCEPT
      reason: >-
        This is the best-supported and most specific annotation for ELO-5.
        PMID:15340492 provides direct experimental evidence (IMP) that loss of
        elo-5 function reduces mmBCFA levels, causing developmental arrest that
        is specifically rescued by mmBCFA supplementation. The term precisely
        captures the core biological function of ELO-5.
      supported_by:
        - reference_id: PMID:15340492
          supporting_text: >-
            C17ISO is decreased in both RNAi strains, while C15ISO is only
            decreased in elo-5(RNAi).
        - reference_id: PMID:15340492
          supporting_text: >-
            This allele phenocopies the L1 arrest phenotype of the elo-5(RNAi)
            animals.
        - reference_id: PMID:15340492
          supporting_text: >-
            Therefore, we have determined that only dietary 17-carbon mmBCFAs
            are competent to bypass the biochemical defect caused by loss of
            ELO-5 function.
core_functions:
  - description: >-
      ELO-5 is a 3-keto acyl-CoA synthase (fatty acid elongase) that catalyzes
      the first and rate-limiting condensation reaction of the mmBCFA elongation
      cycle, specifically elongating C13ISO to C15ISO and contributing to C17ISO
      production. These mmBCFAs are essential for C. elegans development
      (PMID:15340492).
    molecular_function:
      id: GO:0009922
      label: fatty acid elongase activity
    directly_involved_in:
      - id: GO:1902321
        label: methyl-branched fatty acid biosynthetic process
    locations:
      - id: GO:0005789
        label: endoplasmic reticulum membrane
    supported_by:
      - reference_id: PMID:15340492
        supporting_text: >-
          We show that C. elegans synthesizes mmBCFAs de novo and utilizes the
          long-chain fatty acid elongation enzymes ELO-5 and ELO-6 to produce
          two mmBCFAs, C15ISO and C17ISO.
proposed_new_terms: []
suggested_questions:
  - question: >-
      Does ELO-5 have any in vitro or in vivo activity toward straight-chain
      or polyunsaturated fatty acid substrates, or is its specificity entirely
      restricted to mmBCFA substrates? The IBA annotations propagate PUFA, MUFA,
      and saturated FA elongation activities from mammalian orthologs, but the
      rescue experiments in PMID:15340492 show that only mmBCFAs rescue the
      phenotype.
  - question: >-
      Is ELO-5 localized to the ER membrane in C. elegans, as predicted by
      orthology to mammalian ELOVLs? The IBA annotation places ELO-5 at the ER
      membrane based on orthology, but direct subcellular localization
      experiments (e.g., ELO-5::GFP fusion) have not been reported.
suggested_experiments:
  - description: >-
      Express and localize an ELO-5::GFP translational fusion to confirm ER
      membrane localization in vivo. This would provide direct experimental
      evidence for the CC annotation GO:0005789, currently only supported by
      IBA from orthologs.
  - description: >-
      Perform in vitro fatty acid elongation assays with recombinant ELO-5
      using different acyl-CoA substrates (straight-chain saturated, MUFA,
      PUFA, mmBCFA) to determine substrate specificity. This would clarify
      whether the IBA annotations for PUFA/MUFA/saturated FA elongation have
      any biochemical basis for ELO-5, or whether the enzyme is truly specific
      for mmBCFA substrates.
