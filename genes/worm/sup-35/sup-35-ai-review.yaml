- term:
    id: GO:0006355
    label: regulation of DNA-templated transcription
  evidence_type: IDA
  original_reference_id: PMID:19521497
  review:
    summary: >-
      SUP-35 functions as a transcriptional repressor of pha-1, demonstrated by genetic
      and molecular evidence in PMID:19521497. SUP-35 overexpression leads to decreased
      pha-1 mRNA levels, while loss of sup-35 leads to increased pha-1 mRNA and protein
      levels. The C2H2 zinc finger domains are consistent with direct DNA binding and
      transcriptional regulation. This annotation is not currently in the GOA file but
      represents a well-characterized core function.
    action: NEW
    reason: >-
      Transcriptional repression of pha-1 is one of the best-characterized molecular
      functions of SUP-35, supported by qRT-PCR and GFP reporter evidence in
      PMID:19521497. The presence of C2H2-type zinc finger domains provides a structural
      basis for DNA binding and transcriptional regulation. This is a major gap in the
      current annotation set.
    supported_by:
      - reference_id: PMID:19521497
        supporting_text: >-
          SUP-35, acting genetically upstream of SUP-36 and SUP-37, negatively regulates
          pha-1 transcription.
      - reference_id: PMID:19521497
        supporting_text: >-
          sup-35 overexpression in a wild-type background phenocopied pha-1 loss of function (Figure 5). Consistent with the genetic data, qRT-PCR and GFP reporters indicate that sup-35 mRNA and protein levels were upregulated in embryos where lin-35 activity had been compromised, whereas ubc-18 and ari-1 specifically affected SUP-35 protein levels (Figure 6). Additionally, endogenous pha-1 mRNA levels were decreased in lin-35 and ubc-18 mutants, whereas pha-1 mRNA and protein levels were increased in sup-35 mutants (Figure 6, Figure 7).
- term:
    id: GO:0060465
    label: pharynx development
  evidence_type: IMP
  original_reference_id: PMID:19521497
  review:
    summary: >-
      SUP-35 functions within a regulatory network controlling pharyngeal morphogenesis.
      Loss-of-function mutations in sup-35 suppress pharyngeal development defects caused
      by pha-1 hypomorphic alleles and synthetic-lethal combinations (lin-35; ubc-18,
      lin-35; pha-1, ubc-18 pha-1). SUP-35 overexpression phenocopies pha-1 loss of
      function, which causes pharyngeal morphogenesis defects. This is not currently in
      the GOA annotation set but represents a well-established biological process role.
    action: NEW
    reason: >-
      Pharyngeal development is the primary biological context in which SUP-35 function
      has been characterized. The genetic evidence from suppressor analysis and
      overexpression studies in PMID:19521497 and PMID:24214340 strongly supports a role
      in pharyngeal morphogenesis. This should be annotated as a core biological process
      function.
    supported_by:
      - reference_id: PMID:19521497
        supporting_text: >-
          We provide evidence that loss of sup-35 activity specifically suppresses the embryonic- and larval-lethal phenotypes of pha-1 hypomorphic alleles. Additionally, loss of sup-35 activity efficiently suppressed the synthetic lethal phenotypes of lin-35; pha-1 and lin-35; ubc-18 double mutants
      - reference_id: PMID:24214340
        supporting_text: >-
          Development of the Caenorhabditis elegans foregut (pharynx) is regulated by a
          network of proteins that includes the Retinoblastoma protein (pRb) ortholog
          LIN-35; the ubiquitin pathway components UBC-18 and ARI-1; and PHA-1, a
          cytoplasmic protein.
