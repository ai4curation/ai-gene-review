- term:
    id: GO:0008017
    label: microtubule binding
  evidence_type: IDA
  original_reference_id: PMID:24214340
  review:
    summary: >-
      IDA annotation for microtubule binding based on direct assay in PMID:24214340
      (Polley et al. 2014). The paper demonstrates that SUP-35 can bind microtubules,
      which is consistent with its RMD-like domain homology to other microtubule-binding
      RMD family members (RMD-1, RMD-2, RMD-3) as described in PMID:19521497.
    action: ACCEPT
    reason: >-
      Microtubule binding is directly demonstrated experimentally. The abstract of
      PMID:24214340 states that SUP-35 could bind microtubules. This is consistent with
      the conserved RMD-like domain and phylogenetic relationship to other microtubule-binding
      proteins. This represents a core molecular function of SUP-35.
    supported_by:
      - reference_id: PMID:24214340
        supporting_text: >-
          SUP-35 and SUP-37 physically associated and that SUP-35 could bind microtubules.
      - reference_id: PMID:19521497
        supporting_text: >-
          Interestingly, RMD-2, along with RMD-1 and RMD-3, can physically associate with microtubles in vitro
- term:
    id: GO:0005634
    label: nucleus
  evidence_type: IDA
  original_reference_id: PMID:19521497
  review:
    summary: >-
      IDA annotation for nuclear localization based on SUP-35::GFP reporter studies in
      PMID:19521497 (Mani and Fay 2009). The paper shows that at the onset of
      morphogenesis, SUP-35::GFP localization becomes pronounced in nuclei, most notably
      in cells of the pharyngeal primordium. Nuclear localization persists through larval
      stages and into adulthood in pharyngeal cells. This is consistent with the proposed
      role of SUP-35 as a transcriptional repressor of pha-1.
    action: ACCEPT
    reason: >-
      Nuclear localization is directly demonstrated by SUP-35::GFP reporter studies and
      is functionally consistent with the role of SUP-35 as a transcriptional repressor
      of pha-1. This is a core localization pattern, especially relevant during
      morphogenesis when SUP-35 transitions from cytoplasmic to nuclear enrichment.
    supported_by:
      - reference_id: PMID:19521497
        supporting_text: >-
          SUP-35::GFP localization became pronounced in nuclei, most notably in cells comprising the pharyngeal primordium
- term:
