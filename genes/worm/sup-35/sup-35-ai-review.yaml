suggested_questions:
  - question: >-
      Does SUP-35 directly bind DNA through its C2H2 zinc finger domains, or does it act
      as a transcriptional co-repressor? Determining whether SUP-35 has direct DNA binding
      activity would clarify whether to annotate it with DNA binding MF or a regulatory role.
  - question: >-
      Does SUP-35 localize to spindle microtubules or spindle poles during cell division, as
      predicted by IBA annotations from mammalian RMDN orthologs? The current GFP imaging
      data does not address this specific question.
  - question: >-
      What is the functional significance of the microtubule binding activity - is it related
      to subcellular localization regulation by SUP-36, or does it have a separate role in
      cytoskeletal organization?
  - question: >-
      Does SUP-35 localize to mitochondria as predicted by homology to RMDN3/PTPIP51? The
      existing SUP-35::GFP imaging does not specifically address mitochondrial localization.

suggested_experiments:
  - description: >-
      High-resolution live imaging of SUP-35::GFP during mitotic divisions to assess spindle
      pole and spindle microtubule localization, which would resolve the UNDECIDED status of
      the IBA spindle-related annotations.
  - description: >-
      Co-localization of SUP-35 with mitochondrial markers (e.g., MitoTracker or tomm-20::mCherry)
      to test whether the IBA mitochondrial annotation from RMDN3 homology is valid in C. elegans.
  - description: >-
      ChIP-seq or CUT&RUN of SUP-35 to determine direct DNA binding targets and confirm
      direct transcriptional repression of pha-1 versus indirect regulation.
  - description: >-
      In vitro microtubule co-sedimentation assay with purified recombinant SUP-35 protein
      to quantify microtubule binding affinity and map the binding domain.
