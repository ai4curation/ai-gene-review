id: Q9XWK6
gene_symbol: sup-35
product_type: PROTEIN
status: IN_PROGRESS
taxon:
  id: NCBITaxon:6239
  label: Caenorhabditis elegans
description: >-
  SUP-35 (Y48A6C.3) is a C. elegans protein containing two N-terminal C2H2-type zinc finger
  domains and a C-terminal RMD (regulator of microtubule dynamics)-like domain with TPR repeats.
  It functions as a transcriptional repressor of pha-1, a gene required for pharyngeal
  morphogenesis and body morphogenesis during embryogenesis. SUP-35 was originally identified
  as a recessive suppressor of pha-1 loss-of-function lethality. LIN-35/Rb and UBC-18-ARI-1
  (an E2-E3 ubiquitin ligase complex) redundantly negatively regulate SUP-35 levels through
  transcriptional and post-translational mechanisms, respectively. SUP-35::GFP shows dynamic
  subcellular localization during embryogenesis: predominantly cytoplasmic during early
  proliferative stages, then enriched in nuclei (especially pharyngeal cells) at the onset of
  morphogenesis. SUP-35 can bind microtubules, likely through its RMD-like domain, and
  physically associates with SUP-37. The protein is a member of the RMD/RMDN family but is
  distinguished from other family members by its unique N-terminal zinc finger domains.
existing_annotations:
- term:
    id: GO:0005737
    label: cytoplasm
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      IBA annotation for cytoplasmic localization based on phylogenetic inference from
      PANTHER. This is well supported by direct experimental evidence from SUP-35::GFP
      studies in PMID:19521497, which show that SUP-35::GFP is strongly enriched in the
      cytoplasm during the proliferative phase of embryogenesis.
    action: ACCEPT
    reason: >-
      Cytoplasmic localization is directly demonstrated by SUP-35::GFP reporter studies
      (PMID:19521497). The IBA annotation is consistent with the IDA annotation for the
      same term. This is a core localization for SUP-35 during early embryogenesis.
    supported_by:
      - reference_id: PMID:19521497
        supporting_text: >-
          Expression of SUP-35::GFP was ubiquitous throughout the proliferative phase
          of embryogenesis and was strongly enriched in the cytoplasm
- term:
    id: GO:0005739
    label: mitochondrion
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      IBA annotation for mitochondrial localization based on phylogenetic inference from
      PANTHER, supported by human RMDN3/PTPIP51 (Q96TC7) which is known to localize to
      mitochondria and function at ER-mitochondria contact sites. However, there is no
      direct evidence that C. elegans SUP-35 localizes to mitochondria. The published
      SUP-35::GFP studies in PMID:19521497 describe cytoplasmic and nuclear localization
      but do not mention mitochondrial localization. SUP-35 has diverged from typical
      RMDN family members by acquiring unique N-terminal zinc finger domains and a
      distinct transcriptional repressor function.
    action: UNDECIDED
    reason: >-
      While the PANTHER phylogenetic inference from human RMDN3 is methodologically
      sound, SUP-35 has substantially diverged from mammalian RMDN family members in
      function (acting as a transcriptional repressor rather than primarily as a
      microtubule dynamics regulator). The SUP-35::GFP expression studies in
      PMID:19521497 do not report mitochondrial localization. Without direct evidence
      in C. elegans, this annotation remains uncertain.
    supported_by:
      - reference_id: PMID:19521497
        supporting_text: >-
          a functional SUP-35::GFP protein was expressed predominantly in the cytoplasm of most or all cells
- term:
    id: GO:0008017
    label: microtubule binding
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      IBA annotation for microtubule binding based on phylogenetic inference from PANTHER,
      supported by multiple human RMDN family members (Q96DB5, Q96LZ7, Q96TC7) and the
      worm gene itself. This is independently supported by direct experimental evidence
      in PMID:24214340, which demonstrated that SUP-35 can bind microtubules. The RMD-like
      domain of SUP-35 is homologous to domains in other RMD family members (RMD-1, RMD-2,
      RMD-3) that physically associate with microtubules in vitro (PMID:19521497).
    action: ACCEPT
    reason: >-
      Microtubule binding is a core molecular function for SUP-35, supported by both
      phylogenetic inference (IBA) and direct experimental evidence (IDA, PMID:24214340).
      The RMD-like domain shared with other family members that bind microtubules provides
      a structural basis for this function.
    supported_by:
      - reference_id: PMID:24214340
        supporting_text: >-
          SUP-35 and SUP-37 physically associated and that SUP-35 could bind microtubules.
          Thus, SUP-35, SUP-36, and SUP-37 may function within a pathway or complex that
          includes cytoskeletal components.
      - reference_id: PMID:19521497
        supporting_text: >-
          Interestingly, RMD-2, along with RMD-1 and RMD-3, can physically associate with microtubles in vitro
- term:
    id: GO:0005876
    label: spindle microtubule
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      IBA annotation for spindle microtubule localization based on phylogenetic inference
      from PANTHER, propagated from mammalian RMDN family members (Q96DB5, Q96LZ7, Q96TC7).
      While SUP-35 can bind microtubules, there is no direct evidence in C. elegans that
      SUP-35 specifically localizes to spindle microtubules. The published SUP-35::GFP
      data (PMID:19521497) shows cytoplasmic and nuclear localization but does not describe
      spindle-specific localization.
    action: UNDECIDED
    reason: >-
      The phylogenetic inference from mammalian RMDN proteins to spindle microtubule
      localization is plausible given the conserved RMD domain, but SUP-35 has diverged
      significantly in function from typical RMDN family members. No C. elegans-specific
      data supports spindle microtubule localization. The SUP-35::GFP reporter studies
      in PMID:19521497 describe only cytoplasmic and nuclear localization patterns,
      without mention of spindle-associated signal.
    supported_by:
      - reference_id: PMID:19521497
        supporting_text: >-
          Expression of SUP-35::GFP was ubiquitous throughout the proliferative phase
          of embryogenesis and was strongly enriched in the cytoplasm
- term:
    id: GO:0097431
    label: mitotic spindle pole
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      IBA annotation for mitotic spindle pole localization based on phylogenetic inference
      from PANTHER, propagated from mammalian RMDN family members. Similar to the spindle
      microtubule annotation, there is no direct evidence in C. elegans for SUP-35
      localization at mitotic spindle poles. The UniProt subcellular location annotation
      for spindle pole (which generates the IEA annotation) appears to derive from ARBA
      computational prediction based on family membership.
    action: UNDECIDED
    reason: >-
      While mammalian RMDN family members localize to spindle poles, SUP-35 has functional
      divergence from typical RMDN proteins, and no experimental data in C. elegans
      supports this specific localization. The SUP-35::GFP studies (PMID:19521497) do not
      report spindle pole localization.
    supported_by:
      - reference_id: PMID:19521497
        supporting_text: >-
          How this dynamic pattern of expression, as well as a potential association with
          microtubules, may contribute to the functions and regulation of SUP-35 is currently unclear.
- term:
