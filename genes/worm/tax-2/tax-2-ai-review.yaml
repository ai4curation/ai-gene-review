      annotations. Cached abstract-only.
- id: PMID:25303524
  title: Chemosensation of bacterial secondary metabolites modulates neuroendocrine
    signaling and behavior of C. elegans.
  findings: []
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
