    title: Mitochondrial complex I function modulates volatile anesthetic sensitivity
      in C. elegans.
    findings: []
    reference_review:
      relevance: MEDIUM
      correctness: VERIFIED
      review_notes: >-
        Primarily a complex I / volatile anesthetic study, but includes direct
