proposed_new_terms: []
suggested_questions:
- question: Which direct CMD-1 target proteins at spindle poles are most important
    for the meiotic spindle orientation phenotype in embryos?
- question: Which apoptosis and cell-migration phenotypes after cmd-1 depletion are
    direct CMD-1-dependent processes versus secondary consequences of broad calcium
    signaling collapse?
- question: Should calmodulin-family curation in nematodes explicitly add
    calcium-dependent protein binding where older annotations still use generic
    protein binding?
suggested_experiments:
- description: Endogenous tagged CMD-1 affinity purification or proximity labeling
    under Ca2+-bound and Ca2+-free conditions to define direct embryo and neuronal
    target proteins.
- description: Rescue cmd-1 loss with EF-hand calcium-binding mutants to separate
    calcium sensing from possible scaffolding/localization roles at spindle poles.
- description: Tissue-specific depletion or rescue in embryos versus neurons to
    distinguish direct spindle and chemotaxis functions from pleiotropic systemic
    effects.
