id: O16305
gene_symbol: cmd-1
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:6239
  label: Caenorhabditis elegans
description: >-
  cmd-1 encodes the single Caenorhabditis elegans calmodulin, a small EF-hand
  calcium sensor with four functional calcium-binding sites. The conserved core
  function is calcium-dependent binding and regulation of target proteins,
  including enzymes and spindle-associated factors. Experimental work in worms
  additionally places CMD-1 at spindle poles, centrosomes, the interphase
  nuclear membrane, and cell-cell boundaries in early embryos, and supports
  context-specific roles in meiotic spindle orientation, embryonic morphogenesis,
  apoptosis-related phenotypes, and neuronal chemotaxis. Current GOA for cmd-1
  contains no ISO annotations; the transfer-style annotations are IBA/IEA rather
  than ISO, so this ISO-focused pass mainly evaluates whether those orthology-
  derived calls are appropriately conservative.
existing_annotations:
- term:
    id: GO:0005509
    label: calcium ion binding
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      This phylogenetically inferred annotation matches the defining biochemical
      property of calmodulin family proteins. cmd-1 is the sole worm calmodulin,
      UniProt records four functional calcium-binding sites, and no conflicting
      evidence exists.
    action: ACCEPT
    reason: >-
      Calcium ion binding is a conserved and central calmodulin activity, so the
      orthology-based transfer is well supported and represents core function.
    supported_by:
    - reference_id: file:worm/cmd-1/cmd-1-uniprot.txt
      supporting_text: This protein has four functional calcium-binding sites.
- term:
    id: GO:0005737
    label: cytoplasm
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      Cytoplasmic localization is consistent with cmd-1 being a broadly acting
      soluble calcium sensor. Experimental work in embryos also places CMD-1 on
      spindle/centrosomal structures and other non-nuclear sites, which is
      compatible with a general cytoplasmic annotation.
    action: ACCEPT
    reason: >-
      Cytoplasm is a correct high-level cellular location for calmodulin and is
      sufficiently general to retain as a core localization term.
    supported_by:
    - reference_id: file:worm/cmd-1/cmd-1-uniprot.txt
      supporting_text: 'DR   GO; GO:0005737; C:cytoplasm; IBA:GO_Central.'
- term:
    id: GO:0030234
    label: enzyme regulator activity
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      Calmodulin-Ca2+ complexes regulate multiple enzyme classes, including
      kinases and phosphatases, and UniProt explicitly describes cmd-1 as a
      mediator of enzyme control. The term is broad, but it captures a genuine
      conserved molecular role.
    action: ACCEPT
    reason: >-
      Although general, enzyme regulator activity is an appropriate conserved
      summary term for calmodulin and reflects core function rather than a
      lineage-specific phenotype.
    supported_by:
    - reference_id: file:worm/cmd-1/cmd-1-uniprot.txt
      supporting_text: >-
        Calmodulin mediates the control of a large number of enzymes, ion
        channels and other proteins by Ca(2+).
- term:
    id: GO:0000226
    label: microtubule cytoskeleton organization
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      The transfer is plausible because worm experiments support CMD-1 roles in
      spindle organization and spindle orientation. However, the specific
      evidence is tied to cell-division contexts rather than to a universally
      defining calmodulin function.
    action: KEEP_AS_NON_CORE
    reason: >-
      Retain the annotation as valid but non-core because it reflects a real,
      experimentally supported spindle phenotype without being the central
      conserved biochemical identity of the gene.
    supported_by:
    - reference_id: PMID:19219036
      supporting_text: >-
        ASPM-1, together with calmodulin (CMD-1), promotes meiotic spindle
        organization
- term:
    id: GO:0005509
    label: calcium ion binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: >-
      InterPro-derived calcium ion binding agrees with the IBA call and with the
      well-established EF-hand architecture of calmodulin.
    action: ACCEPT
    reason: >-
      This is a correct electronic annotation for a canonical EF-hand calcium-
      binding protein and matches core function.
    supported_by:
    - reference_id: file:worm/cmd-1/cmd-1-uniprot.txt
      supporting_text: This protein has four functional calcium-binding sites.
- term:
    id: GO:0072686
    label: mitotic spindle
  evidence_type: IEA
  original_reference_id: GO_REF:0000117
  review:
    summary: >-
      The ARBA localization is consistent with direct experimental embryo data
      showing CMD-1 accumulation on spindle structures. It is a correct but
      context-specific localization.
    action: KEEP_AS_NON_CORE
    reason: >-
      Mitotic spindle localization is supported, but it is not a universal core
      localization for calmodulin across all contexts.
- term:
    id: GO:0010629
    label: negative regulation of gene expression
  evidence_type: IMP
  original_reference_id: PMID:34499028
  review:
    summary: >-
      PMID:34499028 supports a specific autoregulatory loop in which high CMD-1
      levels repress expression from the cmd-1 promoter through CAMT-1. That is
      more limited than generic negative regulation of gene expression.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      The paper supports context-specific feedback on cmd-1 transcription, not a
      broad generic role in repressing gene expression across targets.
    supported_by:
    - reference_id: PMID:34499028
      supporting_text: high levels of CMD-1 can repress expression from the cmd-1 promoter
- term:
    id: GO:0050918
    label: positive chemotaxis
  evidence_type: IMP
  original_reference_id: PMID:34499028
  review:
    summary: >-
      Neuronal reduction of cmd-1 contributes to chemotaxis defects, and
      supplementing neuronal CMD-1 rescues attraction to several cues in the
      CAMT-1 regulatory context examined in the paper.
    action: KEEP_AS_NON_CORE
    reason: >-
      The phenotype is real but represents a specialized neuronal/behavioral
      context rather than the core conserved role of calmodulin.
    supported_by:
    - reference_id: PMID:34499028
      supporting_text: restored normal chemotaxis toward salt, benzaldehyde, and diacetyl
- term:
    id: GO:0009792
    label: embryo development ending in birth or egg hatching
  evidence_type: IMP
  original_reference_id: PMID:14703012
  review:
    summary: >-
      cmd-1 RNAi causes severe embryonic lethality with disturbed morphogenesis,
      so the gene clearly contributes to successful embryogenesis.
    action: KEEP_AS_NON_CORE
    reason: >-
      This broad developmental phenotype is supported experimentally, but it is a
      pleiotropic consequence of depleting a global calcium sensor and should not
      be treated as core function.
    supported_by:
    - reference_id: PMID:14703012
      supporting_text: RNAi microinjection approach results in a severe embryonic lethal phenotype
- term:
    id: GO:0005813
    label: centrosome
  evidence_type: IDA
  original_reference_id: PMID:17716666
  review:
    summary: >-
      Full-text evidence from PMID:17716666 shows GFP-tagged CMD-1 accumulation
      at centrosomes in early embryos.
    action: KEEP_AS_NON_CORE
    reason: >-
      The localization is directly observed and valid, but it is a cell-division
      context rather than a core pan-context localization.
- term:
    id: GO:0031965
    label: nuclear membrane
  evidence_type: IDA
  original_reference_id: PMID:17716666
  review:
    summary: >-
      The same embryo localization study reports CMD-1 at the interphase nuclear
      membrane.
    action: KEEP_AS_NON_CORE
    reason: >-
      The annotation is experimentally supported but context-specific and not a
      primary summary of calmodulin function.
- term:
    id: GO:0071944
    label: cell periphery
  evidence_type: IDA
  original_reference_id: PMID:17716666
  review:
    summary: >-
      PMID:17716666 reports CMD-1 at the borders of abutting cells in embryos,
      which justifies a general cell periphery term.
    action: KEEP_AS_NON_CORE
    reason: >-
      Direct localization supports the term, but this is again a non-core,
      context-dependent localization.
- term:
    id: GO:0072686
    label: mitotic spindle
  evidence_type: IDA
  original_reference_id: PMID:17716666
  review:
    summary: >-
      Direct imaging shows CMD-1 on spindle structures and not at the cleavage
      furrow in early embryos.
    action: KEEP_AS_NON_CORE
    reason: >-
      Correct experimental localization, but specialized to embryonic cell
      division rather than a core location.
- term:
    id: GO:0005515
    label: protein binding
  evidence_type: IPI
  original_reference_id: PMID:19219036
  review:
    summary: >-
      PMID:19219036 places CMD-1 in an ASPM-1/LIN-5 spindle-pole complex, so a
      physical interaction claim is credible. However, protein binding is too
      generic for calmodulin and loses the informative calcium-dependent nature
      of its target interactions.
    action: MODIFY
    reason: >-
      The interaction evidence should be retained, but the annotation should use
      a more informative calmodulin-appropriate term rather than generic protein
      binding.
    proposed_replacement_terms:
    - id: GO:0048306
      label: calcium-dependent protein binding
- term:
    id: GO:0032880
    label: regulation of protein localization
  evidence_type: IMP
  original_reference_id: PMID:19219036
  review:
    summary: >-
      The meiosis study shows CMD-1 promotes accumulation of LIN-5 at meiotic and
      mitotic spindle poles, which is an experimentally grounded protein
      localization phenotype.
    action: KEEP_AS_NON_CORE
    reason: >-
      This process annotation is valid but reflects a specific spindle-pole
      context, not cmd-1's central conserved biochemical identity.
    supported_by:
    - reference_id: PMID:19219036
      supporting_text: >-
        promotes meiotic spindle organization and the accumulation of LIN-5 at
        meiotic and mitotic spindle poles
- term:
    id: GO:0051296
    label: establishment of meiotic spindle orientation
  evidence_type: IMP
  original_reference_id: PMID:19219036
  review:
    summary: >-
      The paper directly concludes that LIN-5, ASPM-1, CMD-1 and dynein are
      required for spindle rotation during maternal meiosis.
    action: KEEP_AS_NON_CORE
    reason: >-
      Strong experimental support exists, but the process is specialized rather
      than core to calmodulin across contexts.
    supported_by:
    - reference_id: PMID:19219036
      supporting_text: >-
        Spindle rotation during maternal meiosis is independent of GPR-1/2 and
        Galpha, yet requires LIN-5, ASPM-1, CMD-1 and dynein
- term:
    id: GO:0051296
    label: establishment of meiotic spindle orientation
  evidence_type: IGI
  original_reference_id: PMID:19219036
  review:
    summary: >-
      The genetic interaction-based version of the same process annotation is
      consistent with the paper's functional dissection of the spindle-pole
      complex.
    action: KEEP_AS_NON_CORE
    reason: >-
      Retain as non-core for the same reason as the IMP entry: direct support,
      but specialized biology.
    supported_by:
    - reference_id: PMID:19219036
      supporting_text: >-
        Spindle rotation during maternal meiosis is independent of GPR-1/2 and
        Galpha, yet requires LIN-5, ASPM-1, CMD-1 and dynein
- term:
    id: GO:0016477
    label: cell migration
  evidence_type: IMP
  original_reference_id: PMID:14703012
  review:
    summary: >-
      cmd-1 RNAi embryos show aberrant cell migration patterns according to the
      abstract, supporting a migration-related phenotype.
    action: KEEP_AS_NON_CORE
    reason: >-
      This is a pleiotropic developmental phenotype observed after strong loss of
      a global calcium sensor, so it should be retained only as non-core.
    supported_by:
    - reference_id: PMID:14703012
      supporting_text: Embryos show disturbed morphogenesis, aberrant cell migration patterns
- term:
    id: GO:0042981
    label: regulation of apoptotic process
  evidence_type: IMP
  original_reference_id: PMID:14703012
  review:
    summary: >-
      The abstract reports multiple defects in apoptosis after cmd-1 depletion,
      which supports involvement in apoptosis-related regulation.
    action: KEEP_AS_NON_CORE
    reason: >-
      The phenotype is supported, but it is broad and likely pleiotropic rather
      than a core defining function of calmodulin.
    supported_by:
    - reference_id: PMID:14703012
      supporting_text: multiple defects in apoptosis
- term:
    id: GO:0043277
    label: apoptotic cell clearance
  evidence_type: IMP
  original_reference_id: PMID:14703012
  review:
    summary: >-
      The accessible abstract supports apoptosis defects, but it does not clearly
      distinguish cell corpse clearance/engulfment from upstream apoptosis
      defects.
    action: UNDECIDED
    reason: >-
      This specific term may be correct, but the currently accessible evidence is
      insufficiently specific to review it confidently.
- term:
    id: GO:0051726
    label: regulation of cell cycle
  evidence_type: IMP
  original_reference_id: PMID:14703012
  review:
    summary: >-
      Hyperproliferation in cmd-1 RNAi embryos is consistent with cell-cycle
      dysregulation after depletion of calmodulin.
    action: KEEP_AS_NON_CORE
    reason: >-
      The phenotype is experimentally supported, but it is a broad developmental
      consequence rather than a core molecular role.
    supported_by:
    - reference_id: PMID:14703012
      supporting_text: a striking hyperproliferation of cells
references:
- id: GO_REF:0000002
  title: Gene Ontology annotation through association of InterPro records with GO terms
  findings:
  - statement: InterPro family mapping supports the calcium ion binding annotation
      for EF-hand calmodulin proteins.
- id: GO_REF:0000033
  title: Annotation inferences using phylogenetic trees
  findings:
  - statement: cmd-1 has no current ISO annotations in GOA; the orthology-style
      transfer set for this gene is IBA rather than ISO.
  - statement: The IBA annotations capture conserved calmodulin properties such as
      calcium ion binding, cytoplasmic localization, and broad enzyme-regulatory
      function.
- id: GO_REF:0000117
  title: Electronic Gene Ontology annotations created by ARBA machine learning models
  findings:
  - statement: ARBA assigns mitotic spindle localization, which is consistent with
      direct embryo localization data.
- id: PMID:14703012
  title: Functional analysis of the single calmodulin gene in the nematode Caenorhabditis
    elegans by RNA interference and 4-D microscopy.
  findings:
  - statement: cmd-1 RNAi causes severe embryonic lethality with disturbed morphogenesis.
    supporting_text: >-
      RNAi microinjection approach results in a severe embryonic lethal phenotype.
      Embryos show disturbed morphogenesis
  - statement: cmd-1 RNAi embryos show aberrant cell migration patterns,
      hyperproliferation, and multiple defects in apoptosis.
    supporting_text: >-
      Embryos show disturbed morphogenesis, aberrant cell migration patterns, a
      striking hyperproliferation of cells and multiple defects in apoptosis.
- id: PMID:17716666
  title: Cytokinesis is not controlled by calmodulin or myosin light chain kinase
    in the Caenorhabditis elegans early embryo.
  findings:
  - statement: cmd-1 depletion does not block cytokinesis in early embryos.
    supporting_text: >-
      RNA mediated interference against C. elegans calmodulin and candidate MLCKs
      had no effect on cytokinesis in wild-type or RhoK mutant embryos
- id: PMID:19219036
  title: NuMA-related LIN-5, ASPM-1, calmodulin and dynein promote meiotic spindle
    rotation independently of cortical LIN-5/GPR/Galpha.
  findings:
  - statement: CMD-1 works with ASPM-1 and LIN-5 in a spindle-pole complex.
    supporting_text: >-
      ASPM-1, together with calmodulin (CMD-1), promotes meiotic spindle
      organization and the accumulation of LIN-5 at meiotic and mitotic spindle
      poles.
  - statement: CMD-1 promotes meiotic spindle organization and spindle rotation
      during maternal meiosis.
    supporting_text: >-
      Spindle rotation during maternal meiosis is independent of GPR-1/2 and
      Galpha, yet requires LIN-5, ASPM-1, CMD-1 and dynein.
  - statement: CMD-1 promotes accumulation of LIN-5 at meiotic and mitotic spindle
      poles.
    supporting_text: >-
      ASPM-1, together with calmodulin (CMD-1), promotes meiotic spindle
      organization and the accumulation of LIN-5 at meiotic and mitotic spindle
      poles.
- id: PMID:34499028
  title: Neuronal calmodulin levels are controlled by CAMTA transcription factors.
  findings:
  - statement: cmd-1 expression is reduced across multiple neuronal cell types in
      camt-1 mutants.
    supporting_text: >-
      cmd-1 was one of only two genes whose expression was reduced in all four
      neural profiles relative to WT controls.
  - statement: High CMD-1 levels can repress expression from the cmd-1 promoter,
      indicating autoregulatory feedback.
    supporting_text: high levels of CMD-1 can repress expression from the cmd-1 promoter
  - statement: Supplementing neuronal CMD-1 rescues chemotaxis and neuronal
      calcium-signaling defects in the CAMT-1 regulatory context.
    supporting_text: restored normal chemotaxis toward salt, benzaldehyde, and diacetyl
- id: PMID:17854888
  title: Ca(2+)/Calmodulin-binding proteins from the C. elegans proteome.
  findings:
  - statement: Calmodulin is described as the primary calcium sensor that regulates
      a wide variety of cellular processes in eukaryotes.
    supporting_text: >-
      Calmodulin (CaM) is the primary Ca(2+)-sensor that regulates a wide variety
      of cellular processes in eukaryotes.
  - statement: The study identified multiple Ca2+/calmodulin-binding proteins from
      the C. elegans proteome, reinforcing CMD-1's role as a broad calcium-
      dependent target binder.
    supporting_text: >-
      The method allowed the identification of 9 known and 47 previously
      uncharacterized Ca(2+)-dependent CaM-binding proteins from the adult worm
      proteome.
- id: file:worm/cmd-1/cmd-1-uniprot.txt
  title: UniProt record for C. elegans cmd-1
  findings:
  - statement: UniProt records four functional calcium-binding sites in CMD-1.
  - statement: UniProt states that calmodulin mediates control of many enzymes, ion
      channels, and other proteins by Ca2+.
