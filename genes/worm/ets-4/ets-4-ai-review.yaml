- term:
    id: GO:0000978
    label: RNA polymerase II cis-regulatory region sequence-specific DNA binding
  evidence_type: IMP
  original_reference_id: PMID:26484536
  review:
    summary: >-
      Li et al. (2015) showed that ETS-4 is required for transcriptional
      induction of svh-2 in response to axon injury, and that the Ets
      binding motif (GGAA) in the svh-2 promoter is essential for both
      promoter activity and axon regeneration. Mutation of the Ets consensus
      sequence in the svh-2 promoter abolished injury-induced gene
