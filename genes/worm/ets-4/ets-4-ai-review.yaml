    action: ACCEPT
    reason: >-
      Well-supported annotation. Promoter analysis with binding site
      mutations (GGAA to TTAA) in the svh-2 promoter abolished
      transcriptional induction, and in vitro EMSA data confirms
      sequence-specific binding to ETS consensus sites (PMID:26484536,
      PMID:20862312).
    supported_by:
    - reference_id: PMID:26484536
      supporting_text: >-
        Furthermore, we found that axon injury-induced Psvh-2::nls::venus
        expression in D-type neurons was abolished by alteration of either
        of the Ets or C/EBP binding motif (Fig 4C).
    - reference_id: PMID:20862312
      supporting_text: >-
        These results indicated that ETS-4 bound to consensus ETS sites in a
        sequence-specific manner.
- term:
    id: GO:0000981
    label: DNA-binding transcription factor activity, RNA polymerase II-specific
  evidence_type: IMP
  original_reference_id: PMID:26484536
  review:
    summary: >-
      Li et al. (2015) demonstrated that ETS-4 functions as a transcription
