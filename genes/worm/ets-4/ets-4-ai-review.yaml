- term:
    id: GO:0010628
    label: positive regulation of gene expression
  evidence_type: IMP
  original_reference_id: PMID:20862312
  review:
    summary: >-
      Thyagarajan et al. (2010) demonstrated through gene expression
      profiling that ETS-4 both positively and negatively regulates target
      genes. Specific targets like vit-5 are positively regulated, as shown
      by reduced Pvit-5::gfp expression in ets-4(ok165) intestinal cells.
      ETS-4 also activates genes involved in lipid transport and metabolism
      (PMID:20862312). This annotation captures the positive regulatory
      role at the level of gene expression.
    action: NEW
    reason: >-
      ETS-4 positively regulates expression of multiple target genes
      including vit-5, as directly demonstrated by reporter assays in
      PMID:20862312. This is a core function not currently annotated
      separately from the Pol II-specific positive regulation annotation
      derived from PMID:26484536.
    supported_by:
    - reference_id: PMID:20862312
      supporting_text: >-
        Pvit-5::gfp expression was significantly reduced in the intestinal
        cells of ets-4(ok165) compared to wild-type worms suggesting that
        ETS-4 is necessary for inducing vit-5 expression (Figure S7).
- term:
    id: GO:0040010
    label: positive regulation of growth rate
  evidence_type: IMP
  original_reference_id: PMID:20862312
  review:
    summary: >-
      ets-4 null mutants show a 10-13% delay in larval developmental time
      compared to wild-type, suggesting ETS-4 positively regulates growth
      rate (PMID:20862312). This is a consistent phenotype across both
      ets-4 alleles (ok165 and uz1).
    action: NEW
    reason: >-
      The delayed larval development phenotype of ets-4 mutants is
      consistently observed and represents a non-core but genuine biological
      role worth annotating (PMID:20862312).
    supported_by:
    - reference_id: PMID:20862312
      supporting_text: >-
        The larval developmental time, measured as the time taken for L1
        larvae to reach the young adult stage at 20°C, was 6–8 hr longer
        in ets-4(ok165) than wild-type worms (Figure 2A).
- term:
    id: GO:0008340
    label: determination of adult lifespan
  evidence_type: IMP
  original_reference_id: PMID:20862312
  review:
    summary: >-
      ETS-4 functions post-developmentally in the intestine to regulate
      adult lifespan. Loss of ets-4 extends lifespan significantly, and
      this role is post-developmental as demonstrated by L4-stage RNAi
      recapitulating the longevity phenotype (PMID:20862312). ETS-4
      functions in parallel to insulin/IGF-1 signaling but requires
      daf-16 to modulate aging.
    action: NEW
    reason: >-
      Lifespan regulation is one of the best-characterized roles of ETS-4
      in C. elegans. This is strongly supported by multiple alleles,
      tissue-specific rescue, and epistasis analysis (PMID:20862312).
    supported_by:
    - reference_id: PMID:20862312
      supporting_text: >-
        These data suggest that ets-4 functions post-developmentally in
        regulation of adult life span.
