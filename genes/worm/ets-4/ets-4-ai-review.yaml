- id: PMID:20862312
  title: >-
    ETS-4 is a transcriptional regulator of life span in Caenorhabditis
    elegans.
  findings:
  - statement: ETS-4 is an ortholog of vertebrate SPDEF with ETS DNA-binding domain and PNT domain
    supporting_text: >-
      C. elegans ets-4 is the apparent ortholog of vertebrate SPDEF/SAM
      pointed domain containing ETS transcription factor
  - statement: Binds 5'-GGAA/T-3' consensus sequences with high affinity
    supporting_text: >-
      ETS-4, purified from a bacterial expression system, bound to ETS
      binding sites displaying either a GGAA or GGAT core motif with
      similar high affinity (KD∼10-9 M) (Figure 5A and Figure 5B).
  - statement: Loss of ets-4 extends adult lifespan significantly at both 20C and 25C
    supporting_text: >-
      At 25°C, the mean adult life span of ets-4(ok165) worms (18.0±0.4
      days) was significantly longer than that of isogenic ets-4(+)
      wild-type worms (13.3±0.6 days)
  - statement: ETS-4 functions in the intestine to regulate lifespan
    supporting_text: >-
      Analysis of at least two independent transgenic lines showed that
      YFP::ETS-4 expressed in intestinal cells restored the life span of
      ets-4(ok165) worms to wild-type
  - statement: 70 ETS-4-regulated genes enriched for lipid transport, metabolism, and innate immunity
    supporting_text: >-
      Seventy ETS-4-regulated genes, identified by gene expression profiling
      of two distinct ets-4 alleles and analyzed by bioinformatics, were
      enriched for known longevity effectors that function in lipid
      transport, lipid metabolism, and innate immunity.
  - statement: ets-4 functions in parallel to insulin/IGF-1 signaling but requires daf-16
    supporting_text: >-
      ETS-4 is a new life span determinant that functions in parallel to the
      insulin/IGF-1 signaling pathway, but requires the FOXO transcription
      factor, daf-16, to modulate life span.
  - statement: ETS-4 activates and represses transcription depending on context
    supporting_text: >-
      Thus, our data identify two regions of ETS-4 that activate
      transcription (amino acids 1–125 and 200–345) and suggest the ability
      of the PNT domain to modulate this activity towards a repressive
      function.
  - statement: Expressed in intestinal cells, pharynx, seam cells, and some neurons
    supporting_text: >-
      Robust GFP expression for both constructs was observed in the
      intestinal cells of transgenic worms starting at the 3-fold embryonic
      stage and was maintained through larval development and in the adult
      (Figure 4A and 4B). GFP expression was also seen in several cells of
      the anterior and posterior bulbs of the pharynx and in seam cells
      (Figure 4B, 4C and 4D).
- id: PMID:26484536
  title: >-
    Axon Regeneration Is Regulated by Ets-C/EBP Transcription Complexes
    Generated by Activation of the cAMP/Ca2+ Signaling Pathways.
  findings:
  - statement: ETS-4 is required for axon regeneration of D-type motor neurons
    supporting_text: >-
      We found that in contrast to ets-1, the frequency of axon regeneration
      in ets-4(ok165) deletion mutants (Fig 1B) was reduced significantly
      (Fig 2A and 2B and S1 Table).
  - statement: ETS-4 activates svh-2 transcription in response to axon injury
    supporting_text: >-
      These results suggest that ETS-4 is a transcription factor required
      for axon injury-induced up-regulation of svh-2 expression.
  - statement: ETS-4 forms a complex with CEBP-1 on the svh-2 promoter
    supporting_text: >-
      In a yeast two-hybrid assay we found that ETS-4 and CEBP-1 could
      indeed interact (Fig 5A and 5B), suggesting that ETS-4 may cooperate
      with CEBP-1 on the svh-2 promoter to activate transcription.
  - statement: PKA phosphorylates ETS-4 at Ser-73, promoting CEBP-1 interaction
    supporting_text: >-
      These results suggest that PKA-mediated phosphorylation of ETS-4
      Ser-73 promotes the formation of an ETS-4–CEBP-1 complex.
  - statement: Mutation of Ets binding site (GGAA to TTAA) in svh-2 promoter abolishes transcription
    supporting_text: >-
      Furthermore, we found that axon injury-induced Psvh-2::nls::venus
      expression in D-type neurons was abolished by alteration of either
      of the Ets or C/EBP binding motif (Fig 4C).
  - statement: ETS-4 functions cell-autonomously in D-type motor neurons
    supporting_text: >-
      These results demonstrate that ETS-4 functions cell autonomously in
      D-type motor neurons.
  - statement: cAMP/PKA and Ca2+/p38 MAPK pathways converge on ETS-4-CEBP-1 complex
    supporting_text: >-
      ETS-4 is required for the induction of svh-2 transcription in response
      to axonal injury, and this occurs downstream of cAMP signaling through
      PKA-mediated phosphorylation.
