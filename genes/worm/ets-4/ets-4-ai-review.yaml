core_functions:
- description: >-
    ETS-4 is a bona fide ETS family transcription factor that binds to
    5'-GGAA/T-3' consensus sequences with high affinity and regulates
    transcription of target genes. Demonstrated by in vitro EMSA binding
    assays, transcription reporter assays in yeast and mammalian cells, and
    mutant analysis showing altered expression of 70+ target genes.
