suggested_questions:
- question: >-
    What are the direct transcriptional targets of ETS-4 in the intestine
    that mediate its lifespan regulatory function?
- question: >-
    Does ETS-4 have a role in innate immune gene regulation independent of
    its lifespan effects?
- question: >-
    Is ETS-4's role in lipid metabolism gene regulation a direct
    transcriptional effect on individual gene promoters?
suggested_experiments:
- description: >-
    ChIP-seq or ChIP-qPCR to identify direct ETS-4 binding sites genome-wide
    and distinguish direct from indirect targets among the 70 regulated genes
- description: >-
    Tissue-specific rescue experiments to determine if axon regeneration and
    lifespan roles are fully separable
- description: >-
    Analysis of ETS-4 phosphorylation dynamics in intestinal cells in response
    to aging and pathogen signals
