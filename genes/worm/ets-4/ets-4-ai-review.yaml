- term:
    id: GO:0045944
    label: positive regulation of transcription by RNA polymerase II
  evidence_type: IMP
  original_reference_id: PMID:26484536
  review:
    summary: >-
      ETS-4 positively regulates transcription of svh-2 in response to axon
      injury. Loss of ets-4 abolished svh-2 promoter induction, and the
      ETS-4-CEBP-1 complex activates svh-2 transcription (PMID:26484536).
      ETS-4 also activates transcription in reporter assays in yeast and
      mammalian cells (PMID:20862312). Note that ETS-4 also negatively
      regulates some targets via the PNT domain, but positive regulation
      is well documented.
    action: ACCEPT
    reason: >-
      Well-supported by direct evidence showing ETS-4 is required for
      injury-induced svh-2 transcriptional activation (PMID:26484536) and
      activates reporter gene transcription (PMID:20862312). This
      represents a core transcriptional activator function of ETS-4.
    supported_by:
    - reference_id: PMID:26484536
      supporting_text: >-
        In contrast, we found that the ets-4(ok165) mutation abolished
        Psvh-2::nls::venus induction in response to laser surgery in D-type
        neurons (Fig 3A and 3B).
    - reference_id: PMID:20862312
      supporting_text: >-
        In S. cerevisiae, LexA::ETS-4(1-345) activated transcription of a
        reporter gene via a promoter with LexA binding sites (Figure S6).
- term:
    id: GO:0048691
    label: positive regulation of axon extension involved in regeneration
  evidence_type: IMP
  original_reference_id: PMID:26484536
  review:
    summary: >-
      Li et al. (2015) demonstrated that ets-4(ok165) deletion mutants show
      significantly reduced axon regeneration of D-type motor neurons after
      laser axotomy. ETS-4 functions cell-autonomously in D-type motor
      neurons, as rescue was achieved with the unc-25 promoter but not the
      mec-7 promoter. ETS-4 promotes axon regeneration by activating svh-2
      expression downstream of cAMP/PKA signaling (PMID:26484536).
    action: KEEP_AS_NON_CORE
    reason: >-
      While experimentally well-supported (PMID:26484536), axon regeneration
      is a specific biological context in which ETS-4's transcription factor
      activity is deployed, rather than a core intrinsic function. ETS-4's
      primary characterized roles are as a transcriptional regulator of
      lifespan and metabolism in the intestine (PMID:20862312). The axon
      regeneration role, while genuine, represents a context-dependent
      downstream effect of its transcription factor activity.
    supported_by:
    - reference_id: PMID:26484536
      supporting_text: >-
        We found that in contrast to ets-1, the frequency of axon
        regeneration in ets-4(ok165) deletion mutants (Fig 1B) was reduced
        significantly (Fig 2A and 2B and S1 Table).
    - reference_id: PMID:26484536
      supporting_text: >-
        These results demonstrate that ETS-4 functions cell autonomously in
        D-type motor neurons.
- term:
    id: GO:0090575
    label: RNA polymerase II transcription regulator complex
  evidence_type: IDA
  original_reference_id: PMID:26484536
  review:
    summary: >-
      Li et al. (2015) demonstrated that ETS-4 forms a complex with CEBP-1
      in yeast two-hybrid assays. PKA-mediated phosphorylation at Ser-73
      promotes this ETS-4-CEBP-1 complex formation, and together they
      activate svh-2 transcription. The annotation to an RNA Pol II
      transcription regulator complex is supported by this interaction
      (PMID:26484536).
    action: ACCEPT
    reason: >-
      The ETS-4-CEBP-1 complex constitutes a transcription regulatory
      complex that activates RNA Pol II-dependent transcription of svh-2.
      The physical interaction was demonstrated by yeast two-hybrid assays
      (PMID:26484536), and both factors bind adjacent sites in the svh-2
      promoter. This represents a legitimate complex annotation.
    supported_by:
    - reference_id: PMID:26484536
      supporting_text: >-
        In a yeast two-hybrid assay we found that ETS-4 and CEBP-1 could
        indeed interact (Fig 5A and 5B), suggesting that ETS-4 may cooperate
        with CEBP-1 on the svh-2 promoter to activate transcription.
    - reference_id: PMID:26484536
      supporting_text: >-
        These results suggest that PKA-mediated phosphorylation of ETS-4
        Ser-73 promotes the formation of an ETS-4–CEBP-1 complex.
- term:
    id: GO:0140297
    label: DNA-binding transcription factor binding
  evidence_type: IPI
  original_reference_id: PMID:26484536
  review:
    summary: >-
      ETS-4 physically interacts with CEBP-1 (UniProtKB:Q18909), a C/EBP
      family transcription factor. This interaction was demonstrated by
      yeast two-hybrid assays and is regulated by PKA phosphorylation at
      Ser-73 of ETS-4 (PMID:26484536). The phospho-mimetic ETS-4(S73E)
      showed stronger interaction with CEBP-1 than wild-type, while the
      non-phosphorylatable S73A mutant lost the ability to associate with
      CEBP-1.
    action: ACCEPT
    reason: >-
      The IPI annotation is well-supported by yeast two-hybrid data showing
      direct interaction between ETS-4 and the transcription factor CEBP-1
      (PMID:26484536). The term 'DNA-binding transcription factor binding'
      accurately captures the interaction between two DNA-binding
      transcription factors.
    supported_by:
    - reference_id: PMID:26484536
      supporting_text: >-
        In a yeast two-hybrid assay we found that ETS-4 and CEBP-1 could
        indeed interact (Fig 5A and 5B), suggesting that ETS-4 may cooperate
        with CEBP-1 on the svh-2 promoter to activate transcription.
    - reference_id: PMID:26484536
      supporting_text: >-
        We found that a non-phosphorylatable ETS-4(S73A) mutant form lost
        the ability to associate with CEBP-1, whereas a phosphorylation
        mimicking mutant ETS-4(S73E) was able to interact with CEBP-1
        (Fig 5A and 5B).
- term:
    id: GO:0005634
    label: nucleus
  evidence_type: IDA
  original_reference_id: PMID:20862312
  review:
    summary: >-
      Thyagarajan et al. (2010) generated GFP reporter constructs and
      observed expression in intestinal cells, pharyngeal cells, seam cells,
      and other tissues. The GFP localization is consistent with nuclear
