- term:
    id: GO:0005634
    label: nucleus
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      ETS-4 is a transcription factor that localizes to the nucleus. This is
      well supported by phylogenetic inference from ETS family members and
      confirmed experimentally by GFP reporter studies showing nuclear
      expression in intestinal and other cells (PMID:20862312).
    action: ACCEPT
    reason: >-
      Nuclear localization is a core property of ETS-4 as a transcription
      factor. The IBA annotation is consistent with direct experimental
      evidence from PMID:20862312 showing GFP reporter expression in nuclei,
      and the UniProt subcellular location annotation.
    supported_by:
    - reference_id: PMID:20862312
      supporting_text: >-
        Robust GFP expression for both constructs was observed in the
        intestinal cells of transgenic worms starting at the 3-fold embryonic
        stage and was maintained through larval development and in the adult
        (Figure 4A and 4B).
- term:
    id: GO:0000981
    label: DNA-binding transcription factor activity, RNA polymerase II-specific
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      ETS-4 is an ETS family transcription factor with both DNA-binding and
      transcriptional activation/repression activity. The IBA annotation is
      strongly supported by phylogenetic inference across ETS family members
      and confirmed by experimental data showing ETS-4 binds ETS consensus
      sequences and activates transcription in yeast and mammalian cell
      reporter assays (PMID:20862312), as well as by its role in activating
      svh-2 promoter transcription (PMID:26484536).
    action: ACCEPT
    reason: >-
      This is a core molecular function of ETS-4. Phylogenetic inference from
      the ETS family is well supported, and multiple experimental studies
      confirm ETS-4 functions as a DNA-binding transcription factor
      (PMID:20862312, PMID:26484536).
    supported_by:
    - reference_id: PMID:20862312
      supporting_text: >-
        ETS-4, purified from a bacterial expression system, bound to ETS
        binding sites displaying either a GGAA or GGAT core motif with
        similar high affinity (KD∼10-9 M) (Figure 5A and Figure 5B).
    - reference_id: PMID:20862312
      supporting_text: >-
        In S. cerevisiae, LexA::ETS-4(1-345) activated transcription of a
        reporter gene via a promoter with LexA binding sites (Figure S6).
    - reference_id: PMID:26484536
      supporting_text: >-
        These results suggest that ETS-4 is a transcription factor required
        for axon injury-induced up-regulation of svh-2 expression.
- term:
    id: GO:0006357
    label: regulation of transcription by RNA polymerase II
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      ETS-4 regulates transcription as demonstrated by gene expression
      profiling identifying 70 ETS-4-regulated genes in ets-4 mutants
      (PMID:20862312) and by direct regulation of svh-2 promoter activity
      (PMID:26484536). The IBA annotation from phylogenetic inference is
      well supported.
    action: ACCEPT
    reason: >-
      This is a core biological process for ETS-4. Extensive experimental
      evidence supports its role in transcriptional regulation, including
      microarray profiling showing 70 genes with altered expression in ets-4
      mutants (PMID:20862312) and direct promoter regulation of svh-2
      (PMID:26484536).
    supported_by:
    - reference_id: PMID:20862312
      supporting_text: >-
        Seventy ETS-4-regulated genes, identified by gene expression profiling
        of two distinct ets-4 alleles and analyzed by bioinformatics, were
        enriched for known longevity effectors that function in lipid
        transport, lipid metabolism, and innate immunity.
    - reference_id: PMID:26484536
      supporting_text: >-
        These results support the idea that ETS-4 acts as a transcription
        factor regulating svh-2 expression in response to axon injury.
- term:
    id: GO:0030154
    label: cell differentiation
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      This IBA annotation is inferred from phylogenetic analysis of the ETS
      family. The vertebrate ortholog SPDEF has a role in specialized
      intestinal epithelial cell differentiation. However, direct evidence
      for ETS-4 in cell differentiation in C. elegans is limited. The
      ets-4(ok165) null mutants have apparently wild-type development and
      morphology (PMID:20862312), suggesting cell differentiation is not a
      primary role.
    action: KEEP_AS_NON_CORE
    reason: >-
      While the IBA inference from ETS family orthologs is phylogenetically
      reasonable, there is no direct evidence that ETS-4 plays a major role
      in cell differentiation in C. elegans. The null mutant has normal
      morphology and development (PMID:20862312), and the primary
      characterized roles are in lifespan regulation and axon regeneration.
      The vertebrate ortholog SPDEF does function in intestinal cell
      differentiation, so this is retained as a non-core annotation.
    supported_by:
    - reference_id: PMID:20862312
      supporting_text: >-
        Despite this 10–13% delay, ets-4(ok165) larvae exhibited apparently
        wild-type development and morphology. Neither arrests at particular
        larval stages nor molting defects were observed.
