id: A8WFJ9
gene_symbol: ets-4
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:6239
  label: Caenorhabditis elegans
description: >-
  ETS-4 is an ETS family transcription factor in C. elegans, orthologous to
  vertebrate SPDEF. It contains both a PNT (pointed) protein-protein
  interaction domain and an ETS DNA-binding domain, and binds to 5'-GGAA/T-3'
  consensus sequences with high affinity (PMID:20862312). ETS-4 functions as
  both a transcriptional activator and repressor depending on context, with the
  N-terminal region (aa 1-345) activating transcription and the PNT domain
  modulating this toward repression (PMID:20862312). ETS-4 is expressed
  predominantly in intestinal cells from the 3-fold embryonic stage through
  adulthood, as well as in pharyngeal cells, seam cells, and some neurons
  (PMID:20862312). Its primary biological roles include: (1) regulation of
  adult lifespan, functioning in the intestine in parallel to the insulin/IGF-1
  signaling pathway but requiring the FOXO factor DAF-16 (PMID:20862312);
  (2) transcriptional activation of svh-2 expression in response to axon
  injury, forming a complex with CEBP-1 downstream of cAMP/PKA signaling to
  promote axon regeneration (PMID:26484536); and (3) regulation of lipid
  metabolism gene expression (PMID:27746047). ETS-4 is phosphorylated at
  Ser-73 by PKA, which promotes complex formation with CEBP-1, and is
  negatively regulated by SUMOylation at Lys-32 and Lys-83 (PMID:26484536,
  PMID:31393064).
