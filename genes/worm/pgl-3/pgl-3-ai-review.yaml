- id: PMID:19167332
  title: SEPA-1 mediates the specific recognition and degradation of P granule components by autophagy in C. elegans.
  findings:
  - statement: SEPA-1 is an autophagy adapter that directly binds PGL-3 for selective degradation
    supporting_text: SEPA-1 directly binds to the P granule component PGL-3 and also to the autophagy protein LGG-1/Atg8.
    reference_section_type: ABSTRACT
    full_text_unavailable: true
  - statement: P granule components including PGL-3 are regulated by autophagy during development
    supporting_text: several maternally derived germ P granule components are selectively eliminated by autophagy in somatic cells during C. elegans embryogenesis.
    reference_section_type: ABSTRACT
    full_text_unavailable: true
  - statement: Demonstrates connection between P granule homeostasis and cellular quality control pathways
    supporting_text: SEPA-1 functions as a bridging molecule in mediating the specific recognition and degradation of P granule components by autophagy.
    reference_section_type: ABSTRACT
    full_text_unavailable: true
- id: PMID:21402787
  title: PGL proteins self associate and bind RNPs to mediate germ granule assembly in C. elegans.
  findings:
  - statement: PGL-3 autonomously forms granules through self-association and RNA-binding capabilities
    supporting_text: PGL proteins autonomously form RNP granules that contain endogenous RNA, PABP, and certain coexpressed C. elegans P-granule components.
    reference_section_type: RESULTS
    full_text_unavailable: false
  - statement: PGL proteins serve as scaffolds for P granule assembly with distinct domains for self-interaction and RNA recruitment
    supporting_text: 'we found that two functional domains of PGL proteins contribute to germ granule assembly: an RGG box for recruiting RNA and RNA-binding proteins and a self-association domain for formation of globular granules.'
    reference_section_type: ABSTRACT
    full_text_unavailable: false
  - statement: Two-step assembly model where PGL proteins first bind RNPs, then self-aggregate to form organized granules
    supporting_text: 'These properties of PGL proteins raises a two-step model for P-granule formation: in the first step, PGL proteins bind to various mRNPs through interaction with RGG boxes; in the second step, globular granules are formed by the self-interaction domain of PGL proteins'
    reference_section_type: RESULTS
    full_text_unavailable: false
- id: PMID:26598553
  title: Loss of PGL-1 and PGL-3, members of a family of constitutive germ-granule components, promotes germline apoptosis in C. elegans.
  findings:
  - statement: Combined loss of PGL-1 and PGL-3 leads to increased germline apoptosis and CED-4 levels
    supporting_text: protein levels of CED-4, the Apaf-1 homolog, and cytoplasmic translocation of SIR-2.1, a Sirtuin homolog, significantly increased in pgl mutants and increased even more following UV irradiation.
    reference_section_type: ABSTRACT
    full_text_unavailable: true
  - statement: PGL proteins protect germ cells from excessive cell death during normal development
    supporting_text: mutants of pgl-1 and pgl-3, encoding members of a family of constitutive protein components of germline-specific P granules, showed increased germline apoptosis under both physiological and DNA-damaged conditions.
    reference_section_type: ABSTRACT
    full_text_unavailable: true
  - statement: PGL-3 and PGL-1 function redundantly in apoptosis protection with synthetic lethality when both lost
    supporting_text: We conclude that PGL proteins suppress excessive germline apoptosis by repressing both the protein levels of CED-4 and the cytoplasmic translocation of SIR-2.1.
    reference_section_type: ABSTRACT
    full_text_unavailable: true
- id: PMID:26787882
  title: PGL germ granule assembly protein is a base-specific, single-stranded RNase.
  findings:
  - statement: PGL-3 (like PGL-1) has guanosine-specific single-stranded endonuclease activity
    supporting_text: We investigate its capacity to bind RNA and discover unexpectedly that PGL-1 DD is a guanosine-specific, single-stranded endonuclease.
    reference_section_type: ABSTRACT
    full_text_unavailable: false
  - statement: "PGL dimerization domain creates novel 13 α-helix fold forming positively charged channel as homodimer"
    supporting_text: "PGL-1 DD has a novel 13 α-helix fold that creates a positively charged channel as a homodimer."
    reference_section_type: ABSTRACT
    full_text_unavailable: false
  - statement: Discovery reveals dual function as structural scaffold for P granule assembly plus enzymatic RNA processing
    supporting_text: Discovery of the PGL RNase activity expands the role of RNP granule assembly proteins to include enzymatic activity in addition to their job as structural scaffolds.
    reference_section_type: ABSTRACT
    full_text_unavailable: false
- id: PMID:27594427
  title: Polar positioning of phase-separated liquid compartments in cells regulated by an mRNA competition mechanism.
  findings:
  - statement: PGL-3 binds mRNA in vitro and this interaction drives formation of liquid-like droplets resembling P granules
    supporting_text: We reconstitute P granule-like droplets in vitro using a single protein PGL-3.
    reference_section_type: ABSTRACT
    full_text_unavailable: false
  - statement: P granules undergo liquid-liquid phase separation with polar positioning controlled by mRNA competition
    supporting_text: By combining in vitro reconstitution with measurements of intracellular concentrations, we show that competition between PGL-3 and MEX-5 for mRNA can regulate the formation of PGL-3 droplets.
    reference_section_type: ABSTRACT
    full_text_unavailable: false
  - statement: PGL-3 RNA-binding through C-terminal RGG box is required for proper phase separation behavior
    supporting_text: Long messenger RNA molecules bind to PGL-3 protein with low sequence specificity and promote phase separation of PGL-3 drops.
    reference_section_type: ABSTRACT
    full_text_unavailable: false
