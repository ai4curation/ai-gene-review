  findings:
  - statement: |-
      PGL-3 is a 693-aa PGL-family P-granule protein closely related to PGL-1, with a
      C-terminal RGG box (RNA-binding motif) bearing multiple RGG repeats.
    supporting_text: |-
      Kawasaki et al. (2004) describe PGL-3 as a **693-aa** protein, **closely related to PGL-1** (reported **62% identity, 77% similarity**) and containing a C-terminal **RGG box** (an RNA-binding motif) with multiple RGG repeats.
    reference_section_type: OTHER
  - statement: |-
      PGL-family RNase activity is guanosine-specific and requires ssRNA and the 2'-OH;
      Ce-PGL-3 itself was shown to have RNA cleavage activity, indicating conserved RNase
      function across PGL paralogs.
    supporting_text: |-
      PGL-family RNase activity shows **guanosine specificity** and requires RNA (not DNA) and the **2′-OH**, consistent with an ssRNA endonuclease mechanism.
    reference_section_type: OTHER
  - statement: |-
      Cleavage activity was directly observed for Ce-PGL-3, supporting conserved RNase
      activity across the PGL family.
    supporting_text: |-
      cleavage activity was also observed for **Ce-PGL-3**, supporting conserved RNase activity across PGL paralogs.
    reference_section_type: OTHER
  - statement: |-
      PGL-3 is a constitutive P-granule component associated with P granules throughout
      development, with P granules typically perinuclear and associated with nuclear pores.
    supporting_text: |-
      PGL-3 is a constitutive P-granule component “associated with P granules throughout development.”
    reference_section_type: OTHER
  - statement: |-
      PGL-3 acts redundantly with PGL-1 in germline development; pgl-3 single mutants are
      largely normal but pgl-1; pgl-3 double mutants show markedly enhanced sterility.
    supporting_text: |-
      PGL-3 functions redundantly with PGL-1 to support germline development. pgl-3 single mutants show little overt germline defect in the cited work, but **pgl-1; pgl-3** double mutants show markedly enhanced sterility and germline defects
    reference_section_type: OTHER
  - statement: |-
      PGL-1 and PGL-3 self-associate and nucleate granule formation, acting as the
      structural scaffold of the P-granule (P) compartment.
    supporting_text: |-
      Core P-granule components PGL-1 and PGL-3 “self-associate and nucleate granule formation,” positioning PGL-3 as part of the structural scaffold of the P compartment.
    reference_section_type: OTHER
  - statement: |-
      The PGL dimerization domain forms a 13-helix homodimer with a central positively
      charged channel (~15 A) consistent with RNA binding and/or catalysis.
    supporting_text: |-
      a **13-helix fold** forming a homodimer with a central channel (~15 Å diameter) and basic electrostatic surface, consistent with RNA binding and/or catalysis
    reference_section_type: OTHER
  - statement: |-
      Severe P-granule compromise (pgl-1, pgl-3, glh-1, glh-4) lets germ cells express
      neuronal/muscle markers, implicating PGL-3 in maintaining germline identity by
      antagonizing somatic programs.
    supporting_text: |-
      supporting a role for P-granule components (including PGL-3) in maintaining germline identity/totipotency by antagonizing somatic programs
    reference_section_type: OTHER
  - statement: |-
      In vivo, an RNase-defective PGL-1 mutant (Q342A) remained fertile, so the RNase
      activity may not be strictly required for fertility under tested conditions; this
      tempers the organismal necessity of PGL-3's RNase annotation.
    supporting_text: |-
      an RNase-defective mutation in PGL-1 (Q342A) remained fertile, suggesting that RNase activity—while biochemically demonstrable—may not be strictly required for fertility under tested conditions.
    reference_section_type: OTHER
