- term:
    id: GO:0003723
    label: RNA binding
  evidence_type: ISS
  original_reference_id: PMID:15238518
  review:
    summary: |-
      RNA binding is a core molecular function of PGL-3, mediated by its C-terminal
      RGG box, and is experimentally supported (it both recruits mRNA into P granules
      and drives RNA-dependent phase separation). RNA binding is a distinct molecular
      function from the guanyl-specific ribonuclease activity (the latter is captured by
      separate GO:0046589/GO:0004521 annotations), so the previously proposed
      replacement of this term with ribonuclease T1 activity was removed.
    action: ACCEPT
    reason: |-
      RNA binding via the RGG box is well supported and central to PGL-3's role as an
      RNA-dependent condensate scaffold and to recruitment of mRNPs into P granules.
      It should be retained as its own MF rather than collapsed into the RNase term.
    additional_reference_ids:
    - PMID:27594427
    - PMID:21402787
    supported_by:
    - reference_id: PMID:27594427
      supporting_text: Long messenger RNA molecules bind to PGL-3 protein with low sequence specificity and promote phase separation of PGL-3 drops.
    - reference_id: file:worm/pgl-3/pgl-3-deep-research-falcon.md
      supporting_text: |-
        containing a C-terminal **RGG box** (an RNA-binding motif) with multiple RGG repeats
- term:
    id: GO:0005515
    label: protein binding
  evidence_type: IPI
  original_reference_id: PMID:15238518
  review:
    summary: |-
      This IPI annotation captures PGL-3 self-association and heterotypic association with
      PGL-1/PGL-2. The bare 'protein binding' term is uninformative; the biologically
      meaningful function is that these self-/cross-associations nucleate the P-granule
      condensate. Falcon and the primary literature establish that PGL-1 and PGL-3
      self-associate and nucleate granule formation, so the most informative MF is
      molecular condensate scaffold activity (GO:0140693) rather than generic protein
      binding or simple dimerization. Homodimerization per se is already captured by the
      separate GO:0042802 identical protein binding annotation.
    action: MODIFY
    reason: |-
      'protein binding' is on the curation deny-list as uninformative. PGL-3's
      relevant molecular function here is acting as a scaffold that brings PGL proteins
      and mRNPs together to organize the P-granule condensate, which is precisely
      GO:0140693 molecular condensate scaffold activity.
    proposed_replacement_terms:
    - id: GO:0140693
      label: molecular condensate scaffold activity
    additional_reference_ids:
    - PMID:15238518
    - PMID:21402787
    supported_by:
    - reference_id: PMID:15238518
      supporting_text: All three PGL proteins interact with each other in vitro
    - reference_id: PMID:15238518
      supporting_text: PGL-1 and PGL-3 are co-immunoprecipitated from embryo extracts, indicating that they are indeed in the same protein complex in vivo
    - reference_id: file:worm/pgl-3/pgl-3-deep-research-falcon.md
      supporting_text: |-
        Core P-granule components PGL-1 and PGL-3 “self-associate and nucleate granule formation,” positioning PGL-3 as part of the structural scaffold of the P compartment.
