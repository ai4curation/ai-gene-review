- term:
    id: GO:0005515
    label: protein binding
  evidence_type: IPI
  original_reference_id: PMID:19167332
  review:
    summary: |-
      Protein binding term based on the SEPA-1 interaction, which targets P-granule
      components for selective autophagic degradation in somatic cells. SEPA-1 is a
      distinct protein (autophagy adapter), so the prior proposed replacement of
      GO:0042802 identical protein binding was incorrect (that term applies only to
      PGL-3 homodimerization, captured separately). This heterotypic adapter-recognition
      interaction is a regulatory, non-core aspect of PGL-3 biology rather than its
      core scaffolding/enzymatic function.
    action: KEEP_AS_NON_CORE
    reason: |-
      The PGL-3/SEPA-1 interaction is real and functionally relevant to regulated
      P-granule turnover, but it is a downstream regulatory event (autophagic clearance
      of maternal P granules from the soma), not a core function. The generic
      'protein binding' term is uninformative for an adapter-recognition partner, and
      no more specific MF term is well supported here, so it is retained as non-core
      rather than modified.
    additional_reference_ids:
    - PMID:19167332
    supported_by:
    - reference_id: PMID:19167332
      supporting_text: SEPA-1 directly binds to the P granule component PGL-3
