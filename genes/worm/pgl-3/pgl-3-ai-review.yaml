id: G5EBV6
gene_symbol: pgl-3
taxon:
  id: NCBITaxon:6239
  label: Caenorhabditis elegans
description: PGL-3 (C18G1.4, UniProt G5EBV6) is a constitutive PGL-family P-granule scaffold protein and paralog of PGL-1, present in germline P granules throughout development. Its core molecular activity is acting as a molecular condensate scaffold - PGL-1 and PGL-3 self-associate via a structured dimerization domain (DD, ~aa 205-447; a 13-helix homodimer forming a positively charged channel) and recruit mRNPs through a C-terminal RGG box, nucleating and maintaining the P-granule condensate in an RNA-dependent manner (it drives liquid-liquid phase separation in vitro). The same DD also confers a modest, conserved, guanosine-specific single-stranded RNase activity (RNase T1-like; EC 4.6.1.24) demonstrated for the PGL family including Ce-PGL-3, though this enzymatic activity may not be strictly required for fertility (an RNase-defective PGL-1 Q342A mutant remained fertile). PGL-3 functions redundantly with PGL-1 in germline development - pgl-3 single mutants are largely normal but pgl-1; pgl-3 double mutants are markedly sterile. By maintaining P-granule integrity, PGL-3 helps preserve germline identity/totipotency (antagonizing somatic differentiation programs) and protects germ cells from excessive apoptosis. It is selectively recognized by the autophagy adapter SEPA-1 for degradation of P granules in the soma, ensuring germline-restricted localization.
