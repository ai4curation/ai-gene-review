    Functional Proteomics Identifies a PICS Complex Required for piRNA Maturation
    and Chromosome Segregation.
  findings:
  - statement: TOFU-2 localizes to the cytoplasm in C. elegans germline
    supporting_text: "In C. elegans, piRNA precursors are transcribed in the nucleus and are subjected to a number of processing and maturation steps."
  - statement: >-
      The PICS complex (TOFU-6/PID-1/PICS-1/TOST-1/ERH-2) is required for piRNA
      maturation, operating upstream of PUCH in the biogenesis pathway.
    supporting_text: "We use functional proteomics in C.\u00a0elegans and identify a piRNA biogenesis and chromosome segregation (PICS) complex."
- id: PMID:37758951
  title: piRNA processing by a trimeric Schlafen-domain nuclease.
  findings:
  - statement: >-
      TOFU-2 is the catalytic subunit of the trimeric PUCH complex, which processes
      the 5'-end of piRNA precursors.
    supporting_text: >-
      we identify an endoribonuclease, precursor of 21U RNA 5'-end cleavage holoenzyme
      (PUCH), that initiates piRNA processing in the nematode Caenorhabditis elegans.
  - statement: >-
      TOFU-2 E216A mutation abolishes catalytic activity and mature piRNA production.
    supporting_text: "tofu-2(E216A) mutants lost almost all mature piRNAs and accumulated precursors"
  - statement: >-
      The PUCH complex requires all three subunits (TOFU-1, TOFU-2, SLFL-3/4) for
      activity and requires divalent cations (Mg2+).
    supporting_text: "only when both TOFU-1 and TOFU-2, as well as either SLFL-3 or SLFL-4, were present (Fig. 3b)."
  - statement: >-
      PUCH-mediated processing strictly requires m7G-cap and U at position 3 of the
      piRNA precursor.
    supporting_text: "PUCH-mediated processing strictly requires a 7-methyl-G cap (m7G-cap) and a uracil at position three."
  - statement: >-
      The PUCH complex localizes to mitochondria via the transmembrane helix of SLFL-3.
    supporting_text: "the TM helix mediates localization to mitochondria (Fig. 2d). Notably, TOFU-2 mirrored SLFL-3 localization, suggesting that they form a complex."
  - statement: >-
      TOFU-2 interacts with TOFU-1 and SLFL-3/4 to form the trimeric PUCH complex.
    supporting_text: "We name this complex PUCH."

core_functions:
- molecular_function:
    id: GO:0004521
    label: RNA endonuclease activity
  description: >-
    TOFU-2 is the catalytic subunit of the PUCH endoribonuclease complex, which
    cleaves the 5'-end of piRNA precursors. The endonuclease activity resides in the
    SLFN-like fold domain of TOFU-2 and requires the catalytic residue E216. The enzyme
    requires divalent cations (preferably Mg2+) and produces a 5'-monophosphate on
    the cleavage product. Activity requires the trimeric complex (TOFU-1/TOFU-2/SLFL-3
    or SLFL-4) and is specific for m7G-capped substrates with U at position 3.
  directly_involved_in:
  - id: GO:0140990
    label: primary piRNA processing
  locations:
  - id: GO:0005737
    label: cytoplasm
  - id: GO:0005739
    label: mitochondrion
  - id: GO:1902555
    label: endoribonuclease complex
  supported_by:
  - reference_id: PMID:37758951
    supporting_text: >-
      we identify an endoribonuclease, precursor of 21U RNA 5'-end cleavage holoenzyme
      (PUCH), that initiates piRNA processing in the nematode Caenorhabditis elegans.

proposed_new_terms: []

suggested_questions:
- question: >-
    How does the PUCH complex distinguish between type 1 and type 2 piRNA precursors?
    Both types carry m7G-caps, but type 2 piRNAs are derived from non-trans-spliced
    capped transcripts and are much less abundant. Understanding substrate discrimination
    could reveal additional specificity determinants beyond the m7G-cap and U3 requirements.
- question: >-
    What is the structural basis for the requirement of all three PUCH subunits for
    catalytic activity? TOFU-2 contains the catalytic residues, but activity requires
    TOFU-1 and SLFL-3/4. Structural determination of the complete PUCH complex would
    clarify whether TOFU-1 contributes to substrate binding or allosteric activation.

suggested_experiments:
- description: >-
    Cryo-EM or X-ray crystallography of the reconstituted PUCH complex bound to a
    piRNA precursor substrate analog. This would reveal the structural basis for
    substrate specificity (m7G-cap and U3 recognition), the arrangement of the three
    SLFN-like folds, and the catalytic mechanism.
  hypothesis: >-
    The three SLFN-like folds form a composite active site where TOFU-2 provides the
    catalytic residues while TOFU-1 and SLFL-3/4 contribute to substrate binding
    and m7G-cap recognition.
- description: >-
    In vivo proximity labeling (e.g., TurboID) of TOFU-2 in C. elegans germline to
    identify additional transient interaction partners beyond the core PUCH complex,
    particularly components that may link PUCH to the upstream PETISCO complex.
  hypothesis: >-
    TOFU-2/PUCH has regulated interactions with PETISCO components (PID-3, ERH-2,
    TOFU-6, IFE-3) that facilitate substrate handoff during piRNA processing.

status: COMPLETE
