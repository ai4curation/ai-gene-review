id: Q19614
gene_symbol: tofu-2
product_type: PROTEIN
taxon:
  id: NCBITaxon:6239
  label: Caenorhabditis elegans
description: >-
  TOFU-2 (also known as SLFL-2) is a Schlafen-like protein that functions as the catalytic
  subunit of the trimeric PUCH (precursor of 21U RNA 5'-end cleavage holoenzyme) complex in
  C. elegans. The PUCH complex consists of TOFU-1 (SLFL-1), TOFU-2 (SLFL-2), and either
  SLFL-3 or SLFL-4, and acts as an endoribonuclease that processes the 5'-end of piRNA
  (21U RNA) precursors by removing the m7G-cap and the first two nucleotides. TOFU-2
  harbors the catalytic residues (including E216) within its SLFN-like fold domain, and its
  endonuclease activity requires divalent cations (Mg2+, Mn2+, or Ca2+). The protein
  contains a B30.2/SPRY domain (aa 1-168) and an SLFN-like fold (aa 199-400). TOFU-2 is
  stabilized by interaction with TOFU-1, and the PUCH complex localizes to mitochondria
  via the transmembrane helix of SLFL-3. TOFU-2 is expressed in the germline and is
  essential for piRNA biogenesis and germline genome surveillance.

existing_annotations:
- term:
    id: GO:0003723
    label: RNA binding
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      IBA annotation transferred from mammalian Schlafen family members (HNRNPU family,
      PANTHER:PTN000272556). TOFU-2 processes piRNA precursors via endoribonuclease activity,
      which inherently involves RNA binding. The PUCH complex shows strict substrate
      specificity for m7G-capped piRNA precursors with a uracil at position 3
      (PMID:37758951). RNA binding is a prerequisite for the catalytic function.
    action: ACCEPT
    reason: >-
      As an RNA endonuclease that processes piRNA precursors, TOFU-2 must bind RNA substrates.
      The IBA transfer from Schlafen family members is phylogenetically sound, and the
      experimental evidence from PMID:37758951 confirms that TOFU-2 acts directly on RNA
      substrates. RNA binding is a reasonable parent term for its endonuclease activity.
    supported_by:
    - reference_id: PMID:37758951
      supporting_text: "As a substrate, we used a synthetic piRNA precursor oligonucleotide carrying an m7G-cap, which was radioactively labelled at its 3\u2032-end with 32P for detection (Fig. 3a)."

- term:
    id: GO:0005634
    label: nucleus
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      IBA annotation transferred from mammalian Schlafen family members (including MGI:1858195
      Slfn1, UniProtKB:Q00839 HNRNPU, UniProtKB:Q9BUJ2 SLFN5). While several mammalian
      Schlafens localize to the nucleus, there is no experimental evidence that C. elegans
      TOFU-2 localizes to the nucleus. Experimental data from PMID:31216475 shows cytoplasmic
      localization, and PMID:37758951 demonstrates mitochondrial localization via SLFL-3.
    action: REMOVE
    reason: >-
      Nuclear localization has not been demonstrated for TOFU-2. The experimental evidence
      from C. elegans shows cytoplasmic (PMID:31216475) and mitochondrial (PMID:37758951)
      localization. The IBA transfer is based on mammalian Schlafen family members that have
      diverged in function and localization from the nematode SLFL proteins. TOFU-2 functions
      in piRNA precursor processing in the cytoplasm/mitochondria, not in the nucleus.
    supported_by:
    - reference_id: PMID:37758951
      supporting_text: "Notably, TOFU-2 mirrored SLFL-3 localization, suggesting that they form a complex."

- term:
    id: GO:0000380
    label: alternative mRNA splicing, via spliceosome
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      IBA annotation transferred from PANTHER:PTN000272556 and zebrafish Schlafen family
      members. There is no experimental evidence that TOFU-2 has any role in mRNA splicing.
      All experimental data point to a dedicated role in piRNA precursor 5'-end processing.
      The Reactome cross-references to mRNA splicing pathways (R-CEL-72163, R-CEL-72203)
      in UniProt appear to be erroneous computational predictions based on the broader
      Schlafen family grouping.
    action: REMOVE
    reason: >-
      TOFU-2 is a dedicated piRNA processing nuclease with no evidence of splicing involvement.
      The IBA transfer from mammalian/zebrafish Schlafen family members does not reflect the
      specialized function of the nematode SLFL proteins. The PUCH complex specifically
      cleaves m7G-capped piRNA precursors (PMID:37758951) and has no reported connection
      to the spliceosome or mRNA splicing. This is a clear case of incorrect phylogenetic
      transfer due to functional divergence between nematode and vertebrate Schlafen proteins.
    supported_by:
    - reference_id: PMID:37758951
      supporting_text: >-
        we identify an endoribonuclease, precursor of 21U RNA 5'-end cleavage holoenzyme
        (PUCH), that initiates piRNA processing in the nematode Caenorhabditis elegans.

- term:
    id: GO:0005737
    label: cytoplasm
  evidence_type: IEA
  original_reference_id: GO_REF:0000044
  review:
    summary: >-
      IEA annotation based on UniProtKB/Swiss-Prot Subcellular Location vocabulary mapping.
      Cytoplasmic localization is supported by experimental evidence from PMID:31216475
      and UniProt annotation. This is consistent with the known biology of piRNA precursor
      processing occurring in the cytoplasm.
    action: ACCEPT
    reason: >-
      Cytoplasmic localization is experimentally validated by IDA evidence from PMID:31216475
      (also present as a separate annotation). The IEA mapping is correct and concordant
      with the experimental data.

- term:
    id: GO:0005739
    label: mitochondrion
  evidence_type: IEA
  original_reference_id: GO_REF:0000044
  review:
    summary: >-
      IEA annotation based on UniProtKB/Swiss-Prot Subcellular Location vocabulary mapping.
      Mitochondrial localization of TOFU-2 is mediated through its interaction with SLFL-3,
      which contains a transmembrane helix that anchors the PUCH complex to mitochondria
      (PMID:37758951). This is functionally analogous to Drosophila Zucchini/mammalian PLD6,
      which are also mitochondria-associated piRNA processing factors.
    action: ACCEPT
    reason: >-
      Mitochondrial localization is experimentally supported by fluorescence microscopy
      in BmN4 cells showing TOFU-2 colocalizing with SLFL-3 at mitochondria (PMID:37758951).
      UniProt also annotates this with experimental evidence. Mitochondrial proximity is
      functionally important for piRNA production, as deletion of the SLFL-3 transmembrane
      helix reduces mature piRNA levels.
    supported_by:
    - reference_id: PMID:37758951
      supporting_text: "the TM helix mediates localization to mitochondria (Fig. 2d). Notably, TOFU-2 mirrored SLFL-3 localization, suggesting that they form a complex."

- term:
    id: GO:0140990
    label: primary piRNA processing
  evidence_type: IDA
  original_reference_id: PMID:37758951
  review:
    summary: >-
      IDA annotation from ComplexPortal. TOFU-2 is the catalytic subunit of the PUCH complex,
      which executes 5'-end piRNA precursor cleavage. The tofu-2(E216A) catalytic mutant
      loses almost all mature piRNAs and accumulates precursors (PMID:37758951). This is
      a core function of the protein.
    action: ACCEPT
    reason: >-
      Primary piRNA processing is the central biological function of TOFU-2. Direct
      experimental evidence demonstrates that TOFU-2 is required for processing piRNA
      precursors into mature piRNAs, and that its catalytic activity (E216) is essential
      for this process. The PUCH complex strictly requires m7G-capped substrates with U
      at position 3 and shows preference for A or G at position 1.
    supported_by:
    - reference_id: PMID:37758951
      supporting_text: "tofu-2(E216A) mutants lost almost all mature piRNAs and accumulated precursors"

- term:
    id: GO:0004521
    label: RNA endonuclease activity
  evidence_type: IDA
  original_reference_id: PMID:37758951
  review:
    summary: >-
      IDA annotation from UniProt. TOFU-2 contains the catalytic residues for the
      endonuclease activity of the PUCH complex, as demonstrated by in vitro cleavage
      assays with recombinant protein and by the loss of cleavage in the E216A mutant
      (PMID:37758951). The cleavage product carries a 5'-monophosphate, consistent with
      metal-dependent endonuclease activity.
    action: ACCEPT
    reason: >-
      RNA endonuclease activity is directly demonstrated for TOFU-2 both in vivo
      (piRNA sensor desilencing, loss of mature piRNAs in E216A mutant) and in vitro
      (recombinant minimal PUCH complex cleaves synthetic piRNA precursors). The
      activity requires divalent cations (Mg2+, Mn2+, Ca2+) and is inhibited by EDTA.
      This is a core molecular function of the protein.
    supported_by:
    - reference_id: PMID:37758951
      supporting_text: "This yielded processing activity, but only when both TOFU-1 and TOFU-2, as well as either SLFL-3 or SLFL-4, were present (Fig. 3b)."
    - reference_id: PMID:37758951
      supporting_text: "Successful ligation of the cleavage product to a synthetic RNA oligonucleotide with hydroxyl groups at both 5\u2032 and 3\u2032-ends confirmed the presence of a 5\u2032-phosphate\u00a0(P) on the reaction product of the TOFU-1\u2013TOFU-2\u2013SLFL-3 nuclease (Fig. 3d)."

- term:
    id: GO:0005515
    label: protein binding
  evidence_type: IPI
  original_reference_id: PMID:37758951
  review:
    summary: >-
      IPI annotation from UniProt, based on interaction with TOFU-1 (UniProtKB:O17608)
      detected by co-immunoprecipitation and mass spectrometry (PMID:37758951). TOFU-2
      interacts with TOFU-1 (via N-terminal SLFN-like folds) and with SLFL-3/SLFL-4
      (in the presence of TOFU-1) to form the trimeric PUCH complex. While the interaction
      is experimentally validated, 'protein binding' is uninformative.
    action: REMOVE
    reason: >-
      The term 'protein binding' (GO:0005515) is too vague to be informative. The actual
      function is participation in the PUCH trimeric complex, which is already captured
      by the endoribonuclease complex annotation (GO:1902555). The specific interactions
      with TOFU-1 and SLFL-3/4 are better represented by the complex membership annotation.
      Per GO curation guidelines, generic protein binding should be avoided when more
      specific terms are available.
    supported_by:
    - reference_id: PMID:37758951
      supporting_text: "Indeed, TOFU-1 was found to interact with TOFU-2 (Fig. 1d and Supplementary Table 1)."

- term:
    id: GO:1902555
    label: endoribonuclease complex
  evidence_type: IDA
  original_reference_id: PMID:37758951
  review:
    summary: >-
      IDA annotation from UniProt. TOFU-2 is a component of the trimeric PUCH complex
      (TOFU-1/TOFU-2/SLFL-3 or TOFU-1/TOFU-2/SLFL-4), which functions as an
      endoribonuclease. Complex formation is demonstrated by co-immunoprecipitation,
      mass spectrometry, and recombinant co-expression experiments (PMID:37758951).
      The complex is also registered in the Complex Portal (CPX-8565, CPX-8569).
    action: ACCEPT
    reason: >-
      Membership in the PUCH endoribonuclease complex is a core aspect of TOFU-2 function.
      The trimeric complex is the functional unit for piRNA precursor cleavage, and TOFU-2
      is the catalytic subunit. This is well supported by multiple experimental approaches
      including co-IP/MS from C. elegans extracts, heterologous co-expression in BmN4
      cells, and recombinant expression in E. coli.
    supported_by:
    - reference_id: PMID:37758951
      supporting_text: "We name this complex PUCH."

- term:
    id: GO:0005737
    label: cytoplasm
  evidence_type: IDA
  original_reference_id: PMID:31216475
  review:
    summary: >-
      IDA annotation from UniProt based on functional proteomics study identifying piRNA
      biogenesis factors in C. elegans germline (PMID:31216475). Cytoplasmic localization
      is consistent with the role of TOFU-2 in processing piRNA precursors after their
      export from the nucleus.
    action: ACCEPT
    reason: >-
      Cytoplasmic localization is experimentally validated by the proteomics study in
      PMID:31216475 and is consistent with the known biology. piRNA precursors are
      transcribed in the nucleus, exported, and then processed by the PUCH complex in
      the cytoplasm (at mitochondria). This IDA annotation provides direct experimental
      support for the IEA annotation of the same term.
    supported_by:
    - reference_id: PMID:31216475
      supporting_text: "In C. elegans, piRNA precursors are transcribed in the nucleus and are subjected to a number of processing and maturation steps."

# Duplicate GO:0140990 from UniProt (vs ComplexPortal above)
- term:
    id: GO:0140990
    label: primary piRNA processing
  evidence_type: IDA
  original_reference_id: PMID:37758951
  review:
    summary: >-
      Duplicate IDA annotation from UniProt (the other is from ComplexPortal). Both are
      based on the same publication (PMID:37758951) demonstrating that TOFU-2 is the
      catalytic subunit of the PUCH complex for piRNA precursor 5'-end cleavage.
    action: ACCEPT
    reason: >-
      Duplicate annotations from different sources (ComplexPortal and UniProt) are
      acceptable. Both correctly annotate the core biological process function of TOFU-2.
    supported_by:
    - reference_id: PMID:37758951
      supporting_text: "tofu-2(E216A) mutants lost almost all mature piRNAs and accumulated precursors"

# New annotation: magnesium ion binding, supported by PMID:37758951
- term:
    id: GO:0000287
    label: magnesium ion binding
  evidence_type: IDA
  original_reference_id: PMID:37758951
  review:
    summary: >-
      TOFU-2 endonuclease activity requires divalent cations. Mg2+ is the preferred
      cofactor, as demonstrated by in vitro cleavage assays (PMID:37758951). Activity is
      inhibited by EDTA and can also use Mn2+ or Ca2+ but not Zn2+.
    action: NEW
    reason: >-
      The requirement for Mg2+ as a cofactor for TOFU-2 endonuclease activity is directly
      demonstrated in PMID:37758951. UniProt annotates Mg2+ as a cofactor with experimental
      evidence. This annotation is not currently in GOA but would accurately capture a
      core molecular function property of TOFU-2.
    supported_by:
    - reference_id: PMID:37758951
      supporting_text: "precursor processing was inhibited by EDTA, and was supported by divalent cations such as Mg2+, Mn2+ or Ca2+"

