  review:
    assessment: UNC
    confidence_score: 1
    summary: 'Uncertain. The curated review explicitly notes that no molecular function
      has been experimentally demonstrated for LON-8 and that the ND (no data) annotation
      is appropriate. While LON-8 is secreted and functionally linked to the cuticle
      (ECM) through genetic interactions with dpy-11 and dpy-18, the prediction of
      extracellular matrix structural constituent function based on the BPTI-like
      domain is undemonstrated. The related nematode Kunitz-domain protein BLI-5 was
      shown to activate rather than inhibit serine proteases, making domain-based
      function prediction unreliable for this nematode-specific protein family. Assessment:
      UNC rather than COR because the specific biochemical activity remains experimentally
      undetermined.'
