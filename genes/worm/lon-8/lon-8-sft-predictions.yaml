    summary: Correct but already annotated. LON-8 is required for normal male tail
      morphology; lon-8 mutant males display grossly abnormal ray morphology resembling
      Ram mutants, with rays 5 and 6 most severely affected (PMID:17374156). Nematode
      male tail tip morphogenesis is already in GOA (IMP ACCEPT in curated review).
      Not novel.
