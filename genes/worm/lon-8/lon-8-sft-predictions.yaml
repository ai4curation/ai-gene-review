  source_reference_id: doi:10.64898/2026.03.19.712954
  predicted_term:
    id: GO:0040015
    label: negative regulation of multicellular organism growth
  predicted_term_type: GO_BP
  review:
    assessment: COR
    confidence_score: 2
    summary: Correct and captures the defining worm-specific biology. LON-8 loss-of-function
      causes a Long (Lon) phenotype - increased body size during larval development
      and early adulthood, with the increase due to cell size rather than cell number
      (PMID:17374156). Two deletion alleles (hu187, hu188) and RNAi all cause Lon
      phenotype. LON-8 normally restrains body growth, making negative regulation
      of multicellular organism growth the core biological process. This is an accurate
      and specific prediction.
