      body size and male ray morphology...lon-8 genetically interacts with
      enzymes that affect the composition of the cuticle...
suggested_questions:
- question: Does LON-8 have serine protease inhibitor activity, or does it
    activate proteases like the related Kunitz-domain protein BLI-5?
  experts:
  - Soete G
  - Korswagen HC
- question: Is LON-8 physically associated with cuticle collagens or collagen
    modifying enzymes, or does it act indirectly?
  experts:
  - Soete G
  - Korswagen HC
- question: What is the relationship between lon-8 and the Ram pathway genes
    that produce similar male tail phenotypes?
  experts:
  - Soete G
  - Korswagen HC
suggested_experiments:
- hypothesis: LON-8 has serine protease inhibitor or modulator activity via
    its BPTI-like domain.
  description: Express and purify recombinant LON-8 and test for inhibition
    or activation of serine proteases in vitro, as was done for BLI-5.
    Include cuticle-relevant proteases such as BLI-4.
- hypothesis: LON-8 physically interacts with cuticle collagen processing
    enzymes DPY-11 and DPY-18.
  description: Perform co-immunoprecipitation or yeast two-hybrid experiments
    between LON-8 and DPY-11/DPY-18 to determine whether the genetic
    interaction reflects a physical interaction.
- hypothesis: LON-8 localizes specifically to the cuticle rather than
    diffusing broadly in the extracellular space.
  description: Generate a functional LON-8 fusion protein with a small
    epitope tag (rather than GFP which diffuses) and perform
    immunoelectron microscopy to determine precise subcellular
    localization within the cuticle layers.
