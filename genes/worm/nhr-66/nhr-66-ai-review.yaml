id: H2KYJ8
gene_symbol: nhr-66
product_type: PROTEIN
status: IN_PROGRESS
taxon:
  id: NCBITaxon:6239
  label: Caenorhabditis elegans
description: >-
  NHR-66 is a nuclear hormone receptor of the HNF4-type subfamily that functions
  primarily as a transcriptional repressor in C. elegans. It belongs to the
  massively expanded nematode nuclear receptor family. NHR-66 has two
  well-characterized functional roles: (1) As a heterodimeric partner of NHR-49,
  it represses genes involved in sphingolipid processing and lipid remodeling
  (PMID:22511885). NHR-49 and NHR-66 physically interact in GST pull-down assays
  and yeast two-hybrid screens, and the NHR-49/NHR-66 dimer is proposed to
  repress sphingolipid and lipid remodeling target genes. Loss of nhr-66 also
  leads to altered mitochondrial fractional area in intestinal cells. (2) NHR-66
  acts as an age-dependent transcriptional repressor of the potassium channel
  accessory subunit mps-2 (PMID:33259792). NHR-66 binds to a regulatory element
  in the mps-2 promoter, and during aging it represses mps-2 transcription,
  contributing to age-dependent memory decline. Deletion of nhr-66 or its binding
  element in the mps-2 promoter prevents age-dependent transcriptional repression
  and suppresses memory decline. NHR-66 is widely expressed, including in
  hypodermis, gut, muscle, and neuronal cells of the ventral nerve cord, head,
  and tail ganglia. The protein contains a C4-type zinc finger DNA-binding domain
  (residues 266-343) and a nuclear receptor ligand-binding domain (residues
  444-687). It has 10 known splice isoforms.
