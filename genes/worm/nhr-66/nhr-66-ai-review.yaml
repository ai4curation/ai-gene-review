core_functions:
- description: >-
    NHR-66 functions as a DNA-binding transcriptional repressor at RNA polymerase
    II-transcribed genes. In partnership with NHR-49, it represses sphingolipid
    processing and lipid remodeling genes. Independently, it represses mps-2
    transcription in an age-dependent manner by binding to a specific promoter
    element.
