existing_annotations:
- term:
    id: GO:0000978
    label: RNA polymerase II cis-regulatory region sequence-specific DNA binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: >-
      IEA annotation from InterPro mapping based on the HNF4-like DNA-binding
      domain (IPR049636). NHR-66 contains a conserved C4-type zinc finger
      DNA-binding domain (UniProt residues 266-343) characteristic of nuclear
      hormone receptors. The PMID:33259792 study demonstrates that NHR-66 binds
      to a regulatory element in the mps-2 promoter, supporting sequence-specific
      DNA binding to Pol II-transcribed gene regulatory regions.
    action: ACCEPT
    reason: >-
      This IEA annotation is well-supported by experimental evidence. NHR-66 has
      an HNF4-like DNA-binding domain (InterPro IPR049636, CDD NR_DBD_HNF4A)
      and experimental data from PMID:33259792 show it binds the mps-2 promoter.
      The term appropriately captures its cis-regulatory region binding activity.
    supported_by:
    - reference_id: PMID:33259792
      supporting_text: >-
        Deletion of nhr-66 or its binding element in the mps-2 promoter prevents
        age-dependent transcriptional repression of mps-2 and memory decline.

- term:
    id: GO:0003700
    label: DNA-binding transcription factor activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: >-
      IEA annotation from InterPro mapping based on the zinc finger hormone
      receptor domain (IPR001628). NHR-66 is a nuclear hormone receptor that
      functions as a transcription factor. UniProt describes it as a
      transcription factor (PMID:33259792). However, this term is a parent of
      the more specific GO:0001227 (DNA-binding transcription repressor activity,
      RNA polymerase II-specific) which is already annotated with IMP evidence.
    action: ACCEPT
    reason: >-
      While the more specific repressor activity term GO:0001227 is also
      annotated, this broader IEA term is not wrong; it correctly captures that
      NHR-66 is a DNA-binding transcription factor. The IEA annotation from
      InterPro is consistent with the overall function of NHR-66. Retaining
      broader IEA terms alongside more specific experimental annotations is
      acceptable practice.
    supported_by:
    - reference_id: PMID:33259792
      supporting_text: >-
        Deletion of nhr-66 or its binding element in the mps-2 promoter prevents
        age-dependent transcriptional repression of mps-2 and memory decline.
    - reference_id: PMID:22511885
      supporting_text: >-
        Gene expression profiles suggest that NHR-49 partners with NHR-66 to regulate
        sphingolipid and lipid remodeling genes and with NHR-80 to regulate genes
        involved in fatty acid desaturation.

- term:
    id: GO:0005634
    label: nucleus
  evidence_type: IEA
  original_reference_id: GO_REF:0000044
  review:
    summary: >-
      IEA annotation based on UniProtKB-SubCell vocabulary mapping. NHR-66 is
      predicted to localize to the nucleus based on its nuclear hormone receptor
      domain structure (RuleBase:RU004334). As a nuclear hormone receptor with a
      DNA-binding domain and ligand-binding domain, nuclear localization is
      expected and consistent with its role as a transcription factor binding
      promoter regulatory elements (PMID:33259792).
    action: ACCEPT
    reason: >-
      Nuclear localization is a core feature of NHR-66 as a nuclear hormone
      receptor transcription factor. The protein contains a nuclear receptor
      DNA-binding domain (residues 266-343) and ligand-binding domain (residues
      444-687). Its demonstrated function as a transcriptional repressor binding
      directly to gene promoters (PMID:33259792) requires nuclear localization.
      UniProt similarity annotation (RuleBase:RU004334) confirms nuclear receptor
      family membership.
    supported_by:
    - reference_id: PMID:33259792
      supporting_text: >-
        Deletion of nhr-66 or its binding element in the mps-2 promoter prevents
        age-dependent transcriptional repression of mps-2 and memory decline.

- term:
    id: GO:0006355
    label: regulation of DNA-templated transcription
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: >-
      IEA annotation from InterPro mapping based on the zinc finger hormone
      receptor domain (IPR001628) and the zinc finger NHR/GATA domain
      (IPR013088). NHR-66 is experimentally demonstrated to regulate
      transcription. It represses mps-2 transcription in an age-dependent manner
      (PMID:33259792) and represses sphingolipid processing and lipid remodeling
      genes in partnership with NHR-49 (PMID:22511885). A more specific annotation
      (GO:0000122, negative regulation of transcription by RNA polymerase II) is
      already present with IMP evidence.
    action: ACCEPT
    reason: >-
      This is a broadly correct IEA annotation. NHR-66 regulates transcription of
      multiple gene sets. The term is more general than the IMP-supported
      GO:0000122, but it is appropriate as an IEA annotation that captures the
      overall regulatory function. Both repression of mps-2 (PMID:33259792) and
      repression of sphingolipid/lipid remodeling genes with NHR-49
      (PMID:22511885) support this annotation.
    supported_by:
    - reference_id: PMID:33259792
      supporting_text: >-
        nhr-66, which acts as an age-dependent repressor.
    - reference_id: PMID:22511885
      supporting_text: >-
        Gene expression profiles suggest that NHR-49 partners with NHR-66 to
        regulate sphingolipid and lipid remodeling genes and with NHR-80 to
        regulate genes involved in fatty acid desaturation.

- term:
    id: GO:0008270
    label: zinc ion binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: >-
      IEA annotation from InterPro mapping based on the zinc finger hormone
      receptor domain (IPR001628) and zinc finger NHR/GATA domain (IPR013088).
      NHR-66 contains two NR C4-type zinc fingers (residues 269-289 and 305-326)
      as annotated in UniProt (PROSITE-ProRule:PRU00407). These C4-type zinc
      fingers coordinate zinc ions as part of the DNA-binding domain structure.
    action: ACCEPT
    reason: >-
      Zinc ion binding is structurally integral to the C4-type zinc finger
      DNA-binding domain of NHR-66. UniProt annotates two NR C4-type zinc fingers
      (residues 269-289 and 305-326). This is a well-established structural
      feature of all nuclear hormone receptors and is required for DNA binding.
      The annotation is accurate though it describes a structural rather than
      catalytic property.

- term:
    id: GO:0043565
    label: sequence-specific DNA binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: >-
      IEA annotation from InterPro mapping based on the zinc finger hormone
      receptor domain (IPR001628). NHR-66 contains an HNF4-like DNA-binding
      domain (InterPro IPR049636, CDD NR_DBD_HNF4A) and binds sequence-specific
      regulatory elements. Experimental evidence from PMID:33259792 shows NHR-66
      binds a specific element in the mps-2 promoter. This term is a parent of
      the more specific GO:0000978 (RNA polymerase II cis-regulatory region
      sequence-specific DNA binding) also annotated here.
    action: ACCEPT
    reason: >-
      This term is accurate for NHR-66. It is a parent of the more specific
      GO:0000978 also present, but as an IEA it appropriately captures the
      sequence-specific DNA binding function. Experimental support from
      PMID:33259792 confirms binding to a specific element in the mps-2 promoter.
    supported_by:
    - reference_id: PMID:33259792
      supporting_text: >-
        Deletion of nhr-66 or its binding element in the mps-2 promoter prevents
        age-dependent transcriptional repression of mps-2 and memory decline.

- term:
    id: GO:0005515
    label: protein binding
  evidence_type: IPI
  original_reference_id: PMID:22511885
  review:
    summary: >-
      IPI annotation based on the physical interaction between NHR-66 and NHR-49
      (UniProtKB:O45666) demonstrated by yeast two-hybrid screening and confirmed
      by in vitro GST pull-down assays (PMID:22511885). The interaction is direct:
      GST-tagged NHR-49 was incubated with in vitro translated 35S-labeled NHR-66
      and direct binding was confirmed. This interaction is functionally
      significant, as the NHR-49/NHR-66 heterodimer represses sphingolipid and
      lipid remodeling genes.
    action: MODIFY
    reason: >-
      The term 'protein binding' (GO:0005515) is uninformative per GO curation
      guidelines. The interaction between NHR-66 and NHR-49 is a specific
      nuclear receptor heterodimerization. A more informative term would be
      'nuclear receptor binding' or 'protein heterodimerization activity' to
      capture the functional nature of this interaction. NHR-66 physically
      interacts with NHR-49 to form a heterodimer that represses specific gene
      sets (PMID:22511885).
    proposed_replacement_terms:
    - id: GO:0046982
      label: protein heterodimerization activity
    supported_by:
    - reference_id: PMID:22511885
      supporting_text: >-
        As expected, GST-NHR-49 successfully formed a homodimer with
        radiolabeled NHR-49 (Figure 3B). In addition, it was also able to
        interact directly with NHR-66 and NHR-80.
    - reference_id: PMID:22511885
      supporting_text: >-
        We therefore propose that NHR-49 and NHR-66 heterodimerize to regulate
        genes that mediate the breakdown of glycolipids and remodeling of lipid
        membranes

- term:
    id: GO:0000122
    label: negative regulation of transcription by RNA polymerase II
  evidence_type: IMP
  original_reference_id: PMID:33259792
  review:
    summary: >-
      IMP annotation based on experimental evidence from PMID:33259792. NHR-66
      acts as a transcriptional repressor of mps-2. During aging, nhr-66 represses
      mps-2 baseline expression; deletion of nhr-66 increases mps-2 expression
      and suppresses age-dependent memory decline. NHR-66 also represses
      sphingolipid processing and lipid remodeling genes in partnership with
      NHR-49 (PMID:22511885), where knockout of nhr-66 results in de-repression
      of these target genes.
    action: ACCEPT
    reason: >-
      This is a core function of NHR-66. Two independent studies support its role
      as a transcriptional repressor: (1) age-dependent repression of mps-2
      (PMID:33259792), and (2) repression of sphingolipid/lipid remodeling genes
      with NHR-49 (PMID:22511885). The IMP evidence from mutant phenotype analysis
      directly demonstrates negative regulation of Pol II-dependent transcription.
    supported_by:
    - reference_id: PMID:33259792
      supporting_text: >-
        the mps-2 baseline expression is CREB independent and instead, during
        aging, relies on nhr-66, which acts as an age-dependent repressor.
        Deletion of nhr-66 or its binding element in the mps-2 promoter prevents
        age-dependent transcriptional repression of mps-2 and memory decline.
    - reference_id: PMID:22511885
      supporting_text: >-
        NHR-49 collaborates with NHR-66 to regulate sphingolipid and lipid
        remodeling genes and with NHR-80 and NHR-13 to regulate fatty acid
        desaturase genes.

- term:
    id: GO:0000977
    label: RNA polymerase II transcription regulatory region sequence-specific DNA
      binding
  evidence_type: IMP
  original_reference_id: PMID:33259792
  review:
    summary: >-
      IMP annotation based on the finding that NHR-66 binds a specific regulatory
      element in the mps-2 promoter (PMID:33259792). Deletion of this binding
      element phenocopies deletion of nhr-66, preventing age-dependent repression
      of mps-2. This demonstrates that NHR-66 binds sequence-specifically to
      regulatory regions of Pol II-transcribed genes. The evidence is from mutant
      phenotype analysis of the binding element rather than direct biochemical
      binding assays, which is consistent with IMP evidence code usage.
    action: ACCEPT
    reason: >-
      This annotation captures a core molecular function of NHR-66. The evidence
      from PMID:33259792 shows that a specific NHR-66 binding element in the mps-2
      promoter is required for age-dependent transcriptional repression, directly
      implicating NHR-66 in sequence-specific DNA binding at Pol II regulatory
      regions. This is consistent with its HNF4-like DNA-binding domain structure.
    supported_by:
    - reference_id: PMID:33259792
      supporting_text: >-
        Deletion of nhr-66 or its binding element in the mps-2 promoter prevents
        age-dependent transcriptional repression of mps-2 and memory decline.

- term:
    id: GO:0001227
    label: DNA-binding transcription repressor activity, RNA polymerase II-specific
  evidence_type: IMP
  original_reference_id: PMID:33259792
  review:
    summary: >-
      IMP annotation based on the demonstration that NHR-66 functions as a
      transcriptional repressor at Pol II-transcribed genes (PMID:33259792).
      NHR-66 represses mps-2 transcription through direct binding to a promoter
      element, and loss of NHR-66 leads to increased mps-2 expression. This is
      further supported by PMID:22511885 showing NHR-66 represses sphingolipid
      and lipid remodeling genes in partnership with NHR-49.
    action: ACCEPT
    reason: >-
      This is arguably the most specific and accurate molecular function term for
      NHR-66. It captures both the DNA-binding aspect and the repressor activity,
      which is the best-characterized molecular function. Two independent studies
      support transcriptional repressor activity: repression of mps-2
      (PMID:33259792) and repression of sphingolipid/lipid remodeling genes
      (PMID:22511885). This is a core molecular function annotation.
    supported_by:
    - reference_id: PMID:33259792
      supporting_text: >-
        the mps-2 baseline expression is CREB independent and instead, during
        aging, relies on nhr-66, which acts as an age-dependent repressor.
    - reference_id: PMID:22511885
      supporting_text: >-
        NHR-49 collaborates with NHR-66 to regulate sphingolipid and lipid
        remodeling genes and with NHR-80 and NHR-13 to regulate fatty acid
        desaturase genes.

# New annotations not covered by existing GOA
- term:
    id: GO:0019216
    label: regulation of lipid metabolic process
  evidence_type: IMP
  original_reference_id: PMID:22511885
  review:
    summary: >-
      NHR-66 partners with NHR-49 to repress genes involved in sphingolipid
      processing and lipid remodeling (PMID:22511885). Microarray analysis of
      nhr-66 mutants identified differentially expressed genes enriched for lipid
      metabolism functions. The NHR-49/NHR-66 heterodimer specifically represses
      sphingolipid and lipid remodeling target genes, and nhr-66 mutants show
      altered mitochondrial fractional area, likely secondary to lipid membrane
      composition changes. This biological process annotation is not currently
      present in GOA despite strong experimental support.
    action: NEW
    reason: >-
      The existing annotations lack any biological process terms related to lipid
      metabolism despite this being one of the two major characterized functions
      of NHR-66. PMID:22511885 provides clear evidence that NHR-66 regulates
      sphingolipid and lipid remodeling genes, and that nhr-66 mutants have
      altered lipid-related phenotypes including abnormal mitochondrial fractional
      area. This is a core biological process for NHR-66.
    supported_by:
    - reference_id: PMID:22511885
      supporting_text: >-
        NHR-49 collaborates with NHR-66 to regulate sphingolipid and lipid
        remodeling genes and with NHR-80 and NHR-13 to regulate fatty acid
        desaturase genes.
    - reference_id: PMID:22511885
      supporting_text: >-
        Notably, knockout of nhr-66 affected only a subset of NHR-49 targets,
        sphingolipid and lipid remodeling target genes, whereas knockout of
        nhr-80 and nhr-13 affected the expression of NHR-49-regulated fatty
        acid desaturases.

references:
- id: GO_REF:0000002
  title: >-
    Gene Ontology annotation through association of InterPro records with GO
    terms
  findings: []
- id: GO_REF:0000044
  title: >-
    Gene Ontology annotation based on UniProtKB/Swiss-Prot Subcellular Location
    vocabulary mapping, accompanied by conservative changes to GO terms applied by
    UniProt
  findings: []
- id: PMID:22511885
  title: >-
    Coordinate regulation of lipid metabolism by novel nuclear receptor
    partnerships.
  findings:
  - statement: >-
      NHR-66 was identified as a direct physical interactor of NHR-49 via yeast
      two-hybrid screening and confirmed by in vitro GST pull-down assays.
    supporting_text: >-
      Purified glutathione-S-transferase (GST)-tagged NHR-49 was incubated with
      in vitro translated 35S-methionine-labeled NHR-49, NHR-66, NHR-80 and NHR-13.
  - statement: >-
      NHR-49/NHR-66 heterodimer represses genes involved in sphingolipid
      processing and lipid remodeling.
    supporting_text: >-
      We propose that NHR-49 (blue) interacts with NHR-66 (pink) to repress
      genes involved in sphingolipid processing and lipid remodeling, whereas
      NHR-49 (blue) binds to NHR-80 (green) to activate the fatty acid
      desaturase genes.
  - statement: >-
      Microarray analysis of nhr-66 mutants revealed differentially expressed
      genes enriched for lipid metabolism GO terms.
    supporting_text: >-
      We also uncovered new targets that are repressed by NHR-49 that include
      genes involved in sphingolipid breakdown, lipid remodeling and xenobiotic
      detoxification.
  - statement: >-
      nhr-66 mutant animals had normal lifespan (17.16 +/- 0.41 days vs.
      17.35 +/- 0.34 for wild-type), suggesting sphingolipid/lipid remodeling
      regulation does not affect lifespan.
    supporting_text: "The nhr-66 mutant animals had a lifespan of 17.16+/\u22120.41\
      \ days compared to wild-type lifespan of 17.35+/\u22120.34 days, suggesting\
      \ that sphingolipid and lipid remodeling genes do not play a role in the reduced\
      \ lifespan phenotype of nhr-49 mutants (Figure 4)"
  - statement: >-
      nhr-66 mutants showed significantly higher mitochondrial fractional area
      (p=0.0440) in intestinal cells compared to wild-type.
    supporting_text: >-
      the average fractional area occupied by the mitochondria in the intestine
      was significantly higher in nhr-66 animals and significantly lower in
      nhr-80 animals (compared to wild-type worms; Figure 7B).
  - statement: >-
      NHR-66 and NHR-80 also regulate additional genes independently of NHR-49.
    supporting_text: >-
      our gene expression data suggest that, in addition to the genes jointly
      regulated by NHR-49/NHR-66 and NHR-49/NHR-80, NHR-66 and NHR-80
      regulate additional genes independently of NHR-49.
