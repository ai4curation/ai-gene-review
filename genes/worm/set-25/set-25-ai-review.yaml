id: G5EEU2
gene_symbol: set-25
product_type: PROTEIN
status: IN_PROGRESS
taxon:
  id: NCBITaxon:6239
  label: Caenorhabditis elegans
description: >-
  SET-25 is a histone-lysine N-methyltransferase in C. elegans that specifically catalyzes
  trimethylation of histone H3 at lysine 9 (H3K9me3), using mono- and dimethylated H3K9
  as substrate. It works in a stepwise pathway with MET-2 (a SETDB1 homolog that mediates
  mono- and dimethylation of H3K9); together they are responsible for all detectable H3K9
  methylation in C. elegans. SET-25 localizes to perinuclear heterochromatin foci in a
  manner dependent on H3K9me3 but independent of its own catalytic SET domain, suggesting
  an autonomous self-reinforcing mechanism for heterochromatin propagation. SET-25 and MET-2
  act redundantly to position chromosome arms at the nuclear lamina. SET-25 is required for
  small-RNA-directed H3K9 methylation via the Nrde pathway, and together with MET-2 it
  protects repeat-rich genomic regions by suppressing transcription-induced replication
  stress. SET-25-mediated H3K9me3 is implicated in transgenerational epigenetic inheritance,
  where temperature-induced loss of H3K9me3 can persist for at least 14 generations.

existing_annotations:
- term:
    id: GO:0042054
    label: histone methyltransferase activity
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      SET-25 is a well-characterized histone methyltransferase. The IBA annotation at this
      general level is phylogenetically supported and consistent with experimental evidence
      from Towbin et al. (2012) (PMID:22939621) demonstrating H3K9 trimethylation activity.
      While more specific terms exist (GO:0046974, GO:0140947), this general parent term is
      also annotated via IBA and is acceptable as a broader classification.
    action: ACCEPT
    reason: >-
      This is a well-supported IBA annotation. SET-25 is definitively a histone methyltransferase
      based on direct biochemical evidence. The more specific child terms (H3K9 methyltransferase
      activity) are also annotated separately, so this broader IBA annotation is appropriately
      retained as a phylogenetically inferred annotation at the family level.
    supported_by:
    - reference_id: PMID:22939621
      supporting_text: >-
        SET-25, a previously uncharacterized HMT, deposits H3K9me3.
    - reference_id: PMID:28428426
      supporting_text: >-
        temperature-induced change in expression from a Caenorhabditis elegans heterochromatic
        gene array can endure for at least 14 generations... associated with altered trimethylation
        of histone H3 lysine 9 (H3K9me3)

- term:
    id: GO:0003690
    label: double-stranded DNA binding
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      This IBA annotation infers double-stranded DNA binding from phylogenetic analysis. SET-25
      localizes to chromatin and heterochromatic foci (PMID:22939621), which is consistent with
      DNA association. The UniProt record notes that SET-25 colocalizes with H3K9me3 in perinuclear
      foci, though this could be mediated by histone/chromatin binding rather than direct dsDNA
      binding. However, the IBA inference from characterized orthologs in the PANTHER family is
      reasonable for this class of histone methyltransferases.
    action: ACCEPT
    reason: >-
      IBA annotations are phylogenetically well-reviewed. SET domain-containing histone
      methyltransferases in this family commonly interact with chromatin, and direct DNA
      binding has been demonstrated for orthologs. The association with chromatin in perinuclear
      foci (PMID:22939621) is consistent with this annotation.
    supported_by:
    - reference_id: PMID:22939621
      supporting_text: >-
        SET-25 colocalizes with its own product in perinuclear foci, in a manner dependent on
        H3K9me3, but not on its catalytic domain.

- term:
    id: GO:0005634
    label: nucleus
  evidence_type: IEA
  original_reference_id: GO_REF:0000044
  review:
    summary: >-
      Nuclear localization of SET-25 is well established. Towbin et al. (2012) (PMID:22939621)
      directly demonstrated nuclear localization, showing SET-25 in perinuclear heterochromatin
      foci. UniProt annotates this subcellular location with experimental evidence.
    action: ACCEPT
    reason: >-
      Although this is an IEA annotation derived from UniProtKB subcellular location mapping,
      nuclear localization is directly supported by experimental evidence in PMID:22939621.
      SET-25 functions as a nuclear histone methyltransferase and localizes to heterochromatin
      foci at the nuclear periphery.
    supported_by:
    - reference_id: PMID:22939621
      supporting_text: >-
        SET-25 colocalizes with its own product in perinuclear foci, in a manner dependent on
        H3K9me3, but not on its catalytic domain.

- term:
    id: GO:0005652
    label: nuclear lamina
  evidence_type: IEA
  original_reference_id: GO_REF:0000044
  review:
    summary: >-
      SET-25 localizes to the nuclear periphery and acts redundantly with MET-2 to position
      chromosome arms at the nuclear lamina (PMID:22939621). The UniProt record notes
      subcellular location at the nucleus lamina with experimental evidence. This IEA
      annotation is well supported.
    action: ACCEPT
    reason: >-
      Nuclear lamina localization is directly supported by experimental data in PMID:22939621.
      SET-25 and MET-2 together position heterochromatin at the nuclear periphery, and SET-25
      colocalizes with H3K9me3 in perinuclear foci. The nuclear lamina association is a core
      aspect of SET-25 function in heterochromatin organization.
    supported_by:
    - reference_id: PMID:22939621
      supporting_text: >-
        elimination of two HMTs, MET-2 and SET-25, mimics the loss of SAM synthetase,
        abrogating the perinuclear attachment of heterochromatic transgenes and of native
        chromosomal arms rich in histone H3 lysine 9 methylation.

- term:
    id: GO:0005694
    label: chromosome
  evidence_type: IEA
  original_reference_id: GO_REF:0000044
  review:
    summary: >-
      SET-25 associates with chromosomes, specifically with heterochromatic regions enriched
      in H3K9 methylation (PMID:22939621). UniProt annotates chromosome as a subcellular
      location with experimental evidence. This is consistent with SET-25's function as a
      histone methyltransferase that must associate with chromatin to modify histones.
    action: ACCEPT
    reason: >-
      Chromosomal localization is well supported by the experimental data in PMID:22939621
      showing SET-25 colocalizes with H3K9me3 at heterochromatic regions. As a histone
      methyltransferase, chromosomal association is a core functional requirement.
    supported_by:
    - reference_id: PMID:22939621
      supporting_text: >-
        SET-25 colocalizes with its own product in perinuclear foci, in a manner dependent on
        H3K9me3, but not on its catalytic domain.

- term:
    id: GO:0140947
    label: histone H3K9me2 methyltransferase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  review:
    summary: >-
      This IEA annotation is derived from EC:2.1.1.366 mapping. SET-25 specifically converts
      H3K9me2 to H3K9me3, so it uses dimethylated H3K9 as substrate. Towbin et al. (2012)
      (PMID:22939621) showed that MET-2 mediates mono- and dimethylation while SET-25
      deposits H3K9me3. The UniProt catalytic activity entry explicitly describes the reaction
      converting dimethyl-L-lysyl(9)-[histone H3] to trimethyl-L-lysyl(9)-[histone H3] with
      EC 2.1.1.366.
    action: ACCEPT
    reason: >-
      This annotation correctly captures SET-25's catalytic activity of methylating H3K9me2
      to produce H3K9me3. The EC number mapping is accurate and well supported by direct
      biochemical evidence from PMID:22939621. This is a core molecular function of SET-25.
    supported_by:
    - reference_id: PMID:22939621
      supporting_text: >-
        MET-2, a SETDB1 homolog, mediates mono- and dimethylation, and SET-25, a previously
        uncharacterized HMT, deposits H3K9me3.

- term:
    id: GO:0045814
    label: negative regulation of gene expression, epigenetic
  evidence_type: IDA
  original_reference_id: PMID:28428426
  review:
    summary: >-
      Klosin et al. (2017) (PMID:28428426) demonstrated that SET-25-mediated H3K9me3 is
      required for epigenetic silencing of heterochromatic gene arrays and endogenous
      repetitive elements. Temperature-induced reduction of SET-25-mediated methylation leads
      to de-repression of transcription that persists for multiple generations. This
      demonstrates a clear role in negative regulation of gene expression through epigenetic
      mechanisms.
    action: ACCEPT
    reason: >-
      This IDA annotation is well supported by the findings of PMID:28428426 showing
      SET-25 is required for epigenetic repression of heterochromatic loci. The role is
      further corroborated by Zeller et al. (2016) (PMID:27668659) showing derepression of
      transposons and repeats in met-2 set-25 double mutants, and Mao et al. (2015)
      (PMID:26365259) showing SET-25 is required for small-RNA-directed H3K9 methylation.
      Epigenetic gene silencing is a core function of SET-25.
    additional_reference_ids:
    - PMID:27668659
    - PMID:26365259
    supported_by:
    - reference_id: PMID:28428426
      supporting_text: >-
        temperature-induced change in expression from a Caenorhabditis elegans heterochromatic
        gene array can endure for at least 14 generations... associated with altered trimethylation
        of histone H3 lysine 9 (H3K9me3)
    - reference_id: PMID:27668659
      supporting_text: >-
        Transposons and simple repeats are derepressed in both germline and somatic tissues.
    - reference_id: PMID:26365259
      supporting_text: >-
        set-25 and met-2 are required for K9 methylation

- term:
    id: GO:0046974
    label: histone H3K9 methyltransferase activity
  evidence_type: IDA
  original_reference_id: PMID:28428426
  review:
    summary: >-
      SET-25 is a bona fide H3K9 methyltransferase. Towbin et al. (2012) (PMID:22939621)
      first characterized SET-25 as the enzyme responsible for H3K9 trimethylation in
      C. elegans. Klosin et al. (2017) (PMID:28428426) confirmed the role in H3K9me3
      deposition. This is the core molecular function of SET-25.
    action: ACCEPT
    reason: >-
      This IDA annotation captures the primary catalytic function of SET-25. Multiple
      independent studies confirm H3K9 methyltransferase activity (PMID:22939621,
      PMID:28428426, PMID:26365259, PMID:27668659). This is the defining molecular
      function of the enzyme.
    additional_reference_ids:
    - PMID:22939621
    supported_by:
    - reference_id: PMID:22939621
      supporting_text: >-
        SET-25, a previously uncharacterized HMT, deposits H3K9me3.
    - reference_id: PMID:28428426
      supporting_text: >-
        associated with altered trimethylation of histone H3 lysine 9 (H3K9me3)

- term:
    id: GO:0000792
    label: heterochromatin
  evidence_type: IDA
  original_reference_id: PMID:22939621
  review:
    summary: >-
      Towbin et al. (2012) (PMID:22939621) directly demonstrated that SET-25 localizes to
      heterochromatin. SET-25 colocalizes with H3K9me3 in perinuclear foci, and this
      colocalization is dependent on H3K9me3 but independent of the SET catalytic domain.
      The protein is found at heterochromatic regions enriched in repetitive elements.
    action: ACCEPT
    reason: >-
      This IDA annotation is directly supported by microscopy data in PMID:22939621.
      Heterochromatin localization is a core aspect of SET-25 function, as it both generates
      and is recruited by H3K9me3 marks at heterochromatic loci. The self-reinforcing
      localization mechanism (H3K9me3-dependent recruitment independent of catalytic activity)
      is a key feature of SET-25 biology.
    supported_by:
    - reference_id: PMID:22939621
      supporting_text: >-
        SET-25 colocalizes with its own product in perinuclear foci, in a manner dependent on
        H3K9me3, but not on its catalytic domain. This colocalization suggests an autonomous,
        self-reinforcing mechanism for the establishment and propagation of repeat-rich
        heterochromatin.

- term:
    id: GO:0018023
    label: peptidyl-lysine trimethylation
  evidence_type: IDA
  original_reference_id: PMID:22939621
  review:
    summary: >-
      SET-25 catalyzes trimethylation of H3K9, which is a specific instance of
      peptidyl-lysine trimethylation. While the existing annotations capture the molecular
      function (H3K9 methyltransferase activity) and a downstream biological process
      (negative regulation of gene expression, epigenetic), there is no explicit biological
      process annotation for the peptidyl-lysine trimethylation process itself.
    action: NEW
    reason: >-
      The existing annotations include molecular function terms for H3K9 methyltransferase
      activity and a biological process term for epigenetic gene silencing, but the
      biological process of peptidyl-lysine trimethylation is not explicitly annotated.
      This term is directly supported by multiple publications (PMID:22939621, PMID:28428426)
      and represents a core biological process carried out by SET-25.
    supported_by:
    - reference_id: PMID:22939621
      supporting_text: >-
        SET-25, a previously uncharacterized HMT, deposits H3K9me3.

