- id: PMID:22939621
  title: >-
    Step-wise methylation of histone H3K9 positions heterochromatin at the nuclear
    periphery.
  findings:
  - statement: >-
      Towbin et al. (2012) identified SET-25 as the H3K9 trimethylase in C. elegans,
      working in a stepwise pathway with MET-2 (mono/dimethylase). SET-25 localizes to
      heterochromatic perinuclear foci in an H3K9me3-dependent but catalytic domain-independent
      manner. Loss of both MET-2 and SET-25 abrogates perinuclear attachment of heterochromatin.
    supporting_text: >-
      MET-2, a SETDB1 homolog, mediates mono- and dimethylation, and SET-25, a previously
      uncharacterized HMT, deposits H3K9me3. SET-25 colocalizes with its own product in
      perinuclear foci, in a manner dependent on H3K9me3, but not on its catalytic domain.
- id: PMID:26365259
  title: >-
    The Nrde Pathway Mediates Small-RNA-Directed Histone H3 Lysine 27 Trimethylation
    in Caenorhabditis elegans.
  findings:
  - statement: >-
      Mao et al. (2015) showed that SET-25 and MET-2 are required for small-RNA-directed
      H3K9 methylation via the Nrde pathway, establishing a link between the RNAi
      machinery and H3K9 methylation.
    supporting_text: >-
      set-25 and met-2 are required for K9 methylation
- id: PMID:27668659
  title: >-
    Histone H3K9 methylation is dispensable for Caenorhabditis elegans development
    but suppresses RNA:DNA hybrid-associated repeat instability.
  findings:
  - statement: >-
      Zeller et al. (2016) showed that met-2 set-25 double mutants lack all H3K9 methylation,
      develop normally but are sterile with germline DNA damage. Transposons and repeats are
      derepressed, with increased repeat instability and R-loop formation. H3K9 methylation
      protects repeat-rich genomes from transcription-induced replication stress.
    supporting_text: >-
      In met-2 set-25 double mutants, which lack all H3K9 methylation (H3K9me), embryos
      differentiate normally, although mutant adults are sterile owing to extensive
      DNA-damage-driven apoptosis in the germ line. Transposons and simple repeats are
      derepressed in both germline and somatic tissues.
- id: PMID:28428426
  title: >-
    Transgenerational transmission of environmental information in C. elegans.
  findings:
  - statement: >-
      Klosin et al. (2017) demonstrated that temperature-induced loss of SET-25-mediated
      H3K9me3 leads to derepression of heterochromatic gene arrays and endogenous repetitive
      elements that persists for at least 14 generations, establishing SET-25 as a key player
      in transgenerational epigenetic inheritance.
    supporting_text: >-
      a temperature-induced change in expression from a Caenorhabditis elegans heterochromatic
      gene array can endure for at least 14 generations. Inheritance is primarily in cis with
      the locus, occurs through both oocytes and sperm, and is associated with altered
      trimethylation of histone H3 lysine 9 (H3K9me3)

core_functions:
- molecular_function:
    id: GO:0046974
    label: histone H3K9 methyltransferase activity
  description: >-
    SET-25 is the sole H3K9 trimethylase in C. elegans, catalyzing trimethylation of
    histone H3 at lysine 9 (H3K9me3) using mono- and dimethylated H3K9 (produced by
    MET-2) as substrate. This is the defining enzymatic activity of the protein. SET-25
    mediates epigenetic gene silencing by depositing H3K9me3 at heterochromatic loci,
    repressing transcription from repetitive elements, transposons, and heterochromatic
    gene arrays. This silencing function protects genome integrity by suppressing
    transcription-induced replication stress at repeat-rich regions. SET-25-dependent
    H3K9me3 marks can be transmitted across generations, and environmental perturbation
    (e.g., by temperature) leads to heritable changes in gene expression lasting at
    least 14 generations.
  directly_involved_in:
  - id: GO:0045814
    label: negative regulation of gene expression, epigenetic
  - id: GO:0018023
    label: peptidyl-lysine trimethylation
