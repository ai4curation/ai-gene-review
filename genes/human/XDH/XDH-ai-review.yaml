id: P47989
gene_symbol: XDH
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  XDH encodes xanthine dehydrogenase/oxidase (xanthine oxidoreductase, XOR), the
  molybdo-flavoenzyme that catalyses the last two steps of purine catabolism:
  the oxidation of hypoxanthine to xanthine and of xanthine to urate (uric
  acid). It is a large (~146 kDa subunit) cytosolic homodimer in which each
  subunit carries a molybdopterin (Mo-co) active-site center, one FAD, and two
  [2Fe-2S] clusters that shuttle electrons from the molybdenum center to the
  flavin. The enzyme exists as an NAD+-dependent dehydrogenase (XDH) form that
  reduces NAD+ to NADH, and can be converted to an O2-dependent oxidase (XO)
  form — reversibly through oxidation of sulfhydryl groups or irreversibly by
  proteolysis. The XO form reduces molecular oxygen to superoxide and hydrogen
  peroxide, making XDH a physiological source of reactive oxygen species. XDH is
  predominantly cytosolic and is highly expressed in liver and intestine; it is
  also secreted and detectable in milk/colostrum. Loss-of-function mutations
  cause xanthinuria type I, characterized by xanthine stones and hypouricemia,
  and XDH is the pharmacological target of the anti-gout drugs allopurinol,
  febuxostat and topiroxostat.
