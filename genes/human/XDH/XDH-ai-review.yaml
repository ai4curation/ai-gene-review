proposed_new_terms: []
suggested_questions:
- question: >-
    What determines the physiological balance between the NAD+-dependent
    dehydrogenase (XDH) form and the ROS-generating oxidase (XO) form in different
    human tissues, and how is this regulated in ischemia-reperfusion injury?
- question: >-
    What is the functional significance, if any, of the secreted/milk pool of XDH
    relative to its cytosolic purine-catabolic role?
suggested_experiments:
- description: >-
    Quantitative subcellular fractionation and immuno-EM of human tissues (liver,
    intestine) to resolve the contested peroxisomal and sarcoplasmic-reticulum
    localizations against the established cytosolic pool.
- description: >-
    Steady-state kinetic profiling of recombinant human XDH against hypoxanthine
    and xanthine in both dehydrogenase and oxidase modes to quantify the relative
    contribution of each step and ROS output.
