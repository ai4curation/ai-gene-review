- term:
    id: GO:0005515
    label: protein binding
  evidence_type: IPI
  original_reference_id: PMID:22529745
  qualifier: enables
  review:
    summary: >-
      IntAct-derived protein binding annotation from the AGT-Pex5p structural
      study. The interaction (AGT with the peroxisomal import receptor PEX5) is
      biologically meaningful (peroxisomal targeting), but the bare protein
      binding term does not convey a molecular function.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      Per curation guidance, bare protein binding (GO:0005515) is uninformative.
      The PEX5 interaction underlies peroxisomal import and would be better
      represented as targeting/cargo-receptor biology rather than a generic MF;
      the informative catalytic and localization terms already capture AGT
      function. Kept (not removed) as it records a real IPI interaction.
    supported_by:
    - reference_id: PMID:22529745
      supporting_text: >-
        we have determined the crystal structure of the respective
        cargo-receptor complex
