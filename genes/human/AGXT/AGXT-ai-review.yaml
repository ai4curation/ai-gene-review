id: P21549
gene_symbol: AGXT
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  AGXT encodes alanine--glyoxylate aminotransferase (AGT), a liver-specific,
  peroxisomal, pyridoxal-5'-phosphate (PLP)-dependent aminotransferase of the
  class-V PLP family. Its principal role is glyoxylate detoxification: it
  transaminates glyoxylate to glycine using L-alanine as the amino donor
  (glyoxylate + L-alanine -> glycine + pyruvate; EC 2.6.1.44), thereby
  preventing glyoxylate from being oxidised to oxalate. The same enzyme also
  catalyses the serine:pyruvate transamination (L-serine + pyruvate =
  3-hydroxypyruvate + L-alanine; EC 2.6.1.51), contributing to serine
  metabolism. AGT is an obligate homodimer whose N-terminal extension wraps over
  the neighbouring subunit, with PLP covalently bound to Lys209. In human
  hepatocytes AGT resides in the peroxisomal matrix, imported by the Pex5p
  receptor via an atypical C-terminal Lys-Lys-Leu (KKL) PTS1 together with
  ancillary targeting information. Loss of AGT activity causes primary
  hyperoxaluria type 1 (PH1), a severe autosomal-recessive calcium-oxalate stone
  disease with nephrolithiasis, nephrocalcinosis, systemic oxalosis and
  end-stage renal disease. A common minor-allele polymorphism (P11L) creates a
  cryptic N-terminal mitochondrial targeting sequence that, in combination with
  certain disease mutations (e.g. G170R), reroutes AGT from peroxisomes to
  mitochondria, where it can no longer detoxify peroxisomally generated
  glyoxylate.
