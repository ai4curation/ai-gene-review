- term:
    id: GO:0004760
    label: L-serine:pyruvate transaminase activity
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: enables
  review:
    summary: >-
      Phylogenetic (IBA) assignment of serine:pyruvate transaminase activity
      (EC 2.6.1.51). This is a genuine, experimentally documented activity of
      human AGT, which catalyses L-serine + pyruvate = 3-hydroxypyruvate +
      L-alanine.
    action: ACCEPT
    reason: >-
      Serine:pyruvate transaminase activity is experimentally demonstrated for
      human AGT and encoded as EC 2.6.1.51 (SPT). It is a real, though secondary,
      catalytic activity relative to the core glyoxylate-detoxifying reaction.
    supported_by:
    - reference_id: PMID:10347152
      supporting_text: >-
        these results suggest that SPT/AGT in this organelle plays dual roles in
        the metabolism of glyoxylate and serine.
- term:
    id: GO:0006545
    label: glycine biosynthetic process
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: involved_in
  review:
    summary: >-
      Phylogenetic (IBA) assignment of glycine biosynthetic process. AGT forms
      glycine as the product of glyoxylate transamination, so it contributes to
      glycine biosynthesis by transamination of glyoxylate.
    action: ACCEPT
    reason: >-
      The physiological reaction produces glycine from glyoxylate, making glycine
      biosynthesis a direct consequence of AGT catalysis (this is the core
      detoxification reaction viewed from the product side).
    supported_by:
    - reference_id: PMID:17696873
      supporting_text: >-
        the enzyme is highly specific for catalysing glyoxylate to glycine
        processing, thereby playing a key role in glyoxylate detoxification
