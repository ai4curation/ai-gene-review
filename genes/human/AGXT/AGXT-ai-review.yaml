core_functions:
- description: >-
    Peroxisomal PLP-dependent alanine:glyoxylate transaminase that detoxifies
    glyoxylate by transaminating it to glycine using L-alanine as amino donor
    (glyoxylate + L-alanine -> glycine + pyruvate), preventing oxalate formation.
  molecular_function:
    id: GO:0008453
    label: L-alanine:glyoxylate transaminase activity
  directly_involved_in:
  - id: GO:0009436
    label: glyoxylate catabolic process
  locations:
  - id: GO:0005777
    label: peroxisome
  supported_by:
  - reference_id: PMID:17696873
    supporting_text: >-
      the enzyme is highly specific for catalysing glyoxylate to glycine
      processing, thereby playing a key role in glyoxylate detoxification
  - reference_id: PMID:23229545
    supporting_text: >-
      Failure to transaminate glyoxylate to glycine within the peroxisomes,
      allows glyoxylate to diffuse into the cytosol where it is oxidized to the
      metabolic end product oxalate
- description: >-
    Formation of glycine as the product of peroxisomal glyoxylate transamination,
    i.e. glycine biosynthesis by transamination of glyoxylate.
  molecular_function:
    id: GO:0008453
    label: L-alanine:glyoxylate transaminase activity
  directly_involved_in:
  - id: GO:0006545
    label: glycine biosynthetic process
  locations:
  - id: GO:0005777
    label: peroxisome
  supported_by:
  - reference_id: PMID:22198249
    supporting_text: >-
      the active dimeric structure of liver peroxisomal alanine:glyoxylate
      aminotransferase
  - reference_id: PMID:17696873
    supporting_text: >-
      the enzyme is highly specific for catalysing glyoxylate to glycine
      processing
- description: >-
    Binding of the essential cofactor pyridoxal 5'-phosphate (covalently bound to
    Lys209 as a Schiff base), required for AGT transaminase catalysis.
  molecular_function:
    id: GO:0030170
    label: pyridoxal phosphate binding
  locations:
  - id: GO:0005777
    label: peroxisome
  supported_by:
  - reference_id: PMID:17696873
    supporting_text: >-
      the G82E variant is able to bind 2 mol PLP/dimer
  - reference_id: PMID:20133649
    supporting_text: >-
      reduced coenzyme binding affinity
proposed_new_terms: []
suggested_questions:
- question: >-
    Beyond glyoxylate detoxification, how quantitatively important is the
    serine:pyruvate transaminase (SPT) activity of AGT to hepatic serine
    metabolism and gluconeogenesis in humans under physiological conditions?
- question: >-
    What is the identity of the proposed mammal-specific adaptor that enables the
    atypical KKL PTS1 of human AGT to be recognised by Pex5p?
suggested_experiments:
- description: >-
    Quantify in vivo flux through the glyoxylate->glycine (AGT) vs
    glyoxylate->oxalate (LDH) branches in human hepatocyte or liver-organoid
    models with wild-type vs PH1 mutant AGT, using stable-isotope-labelled
    glyoxylate.
- description: >-
    Systematically map AGT subcellular partitioning (peroxisome vs mitochondrion)
    across the panel of minor-allele PH1 mutations using quantitative
    immunofluorescence/fractionation, to test whether all minor-allele mutations
    unmask the cryptic mitochondrial targeting sequence.
