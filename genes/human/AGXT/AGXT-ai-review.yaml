- term:
    id: GO:0005737
    label: cytoplasm
  evidence_type: IEA
  original_reference_id: GO_REF:0000117
  qualifier: located_in
  review:
    summary: >-
      Electronic (ARBA) assignment to cytoplasm. Human AGT is a peroxisomal
      matrix enzyme; a generic cytoplasm assignment reflects a default
      localization rather than the specific compartment.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      Human AGT is imported into peroxisomes and acts in the peroxisomal matrix;
      only newly synthesised, not-yet-imported protein is transiently cytosolic.
      A bare cytoplasm term is uninformative and over-general given the strong
      experimental peroxisome localization; the peroxisome/peroxisomal matrix
      terms are the informative ones.
    supported_by:
    - reference_id: file:human/AGXT/AGXT-uniprot.txt
      supporting_text: >-
        SUBCELLULAR LOCATION: Peroxisome
