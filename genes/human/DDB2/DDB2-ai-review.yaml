id: Q92466
gene_symbol: DDB2
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  DDB2 (DNA damage-binding protein 2, the p48 subunit of UV-DDB; XPE factor) is a
  nuclear WD40 beta-propeller protein that serves as the UV-lesion sensor of
  global-genome nucleotide excision repair (GG-NER). With DDB1 it forms the
  UV-damaged DNA-binding (UV-DDB) heterodimer, which directly recognizes
  UV-induced photolesions, preferentially cyclobutane pyrimidine dimers (CPDs) and
  6-4 photoproducts (6-4PPs), as well as apurinic sites and short mismatches, and
  flips the damaged bases into a binding pocket of the propeller. By binding CPDs
  that are otherwise poorly recognized, DDB2 recruits and hands off the lesion to
  the XPC-RAD23B complex to initiate downstream NER. DDB2 also acts as the
  substrate-recognition receptor (a DCAF) of a CUL4-RING E3 ubiquitin ligase,
  CRL4(DDB2) (DDB1-CUL4A/CUL4B-RBX1), assembling on chromatin at sites of UV
  damage. This ligase ubiquitinates chromatin histones (notably H2A, and H3/H4),
  ubiquitinates XPC to modulate its DNA binding, and autoubiquitinates DDB2 itself
  to trigger its turnover; these ubiquitination events help remodel and open
  damaged nucleosomes and hand the lesion to XPC. The ligase is regulated by
  NEDD8 conjugation and by the COP9 signalosome, and DDB2 protein levels are
  controlled by ubiquitination/deubiquitination (e.g., USP24, USP44) and by p53,
  which induces DDB2 expression. Loss-of-function mutations in DDB2 cause xeroderma
  pigmentosum complementation group E (XP-E), with UV sensitivity and skin-cancer
  predisposition.
