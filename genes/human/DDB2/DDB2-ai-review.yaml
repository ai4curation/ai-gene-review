core_functions:
- description: Damage-sensing subunit of the UV-DDB (DDB1-DDB2) complex that directly binds UV-induced photolesions (CPDs and 6-4PPs) in chromatinized DNA and recruits/hands off the lesion to XPC to initiate global-genome nucleotide excision repair.
  molecular_function:
    id: GO:0003684
    label: damaged DNA binding
  locations:
  - id: GO:0090734
    label: site of DNA damage
  - id: GO:0000785
    label: chromatin
  supported_by:
  - reference_id: PMID:12944386
    supporting_text: p48 activates the recruitment of XPC to CPDs and may be the initial recognition factor in the NER pathway
  - reference_id: file:human/DDB2/DDB2-uniprot.txt
    supporting_text: The UV-DDB complex preferentially binds to cyclobutane pyrimidine dimers (CPD), 6-4 photoproducts (6-4 PP), apurinic sites and short mismatches
  directly_involved_in:
  - id: GO:0006289
    label: nucleotide-excision repair
- description: Substrate-recognition receptor (DCAF) of the CRL4(DDB2) (DDB1-CUL4A/CUL4B-RBX1) E3 ubiquitin ligase that assembles on UV-damaged chromatin and directs ubiquitination of histones (H2A, H3, H4), of XPC, and of DDB2 itself, helping remodel damaged nucleosomes and couple lesion recognition to repair.
  molecular_function:
    id: GO:0004842
    label: ubiquitin-protein transferase activity
  locations:
  - id: GO:0000785
    label: chromatin
  supported_by:
  - reference_id: PMID:16473935
    supporting_text: DDB2, as the substrate receptor of the DDB1-CUL4A-based ligase, specifically targets histone H2A for monoubiquitination in a photolesion-binding-dependent manner
  - reference_id: PMID:12732143
    supporting_text: Both complexes contain cullin 4A and Roc1 and display ubiquitin ligase activity
  in_complex:
    id: GO:0080008
    label: Cul4-RING E3 ubiquitin ligase complex
  directly_involved_in:
  - id: GO:0000209
    label: protein polyubiquitination
proposed_new_terms: []
suggested_questions:
- question: How is DDB2's dual role balanced between productive lesion handoff to XPC and its own CRL4-mediated autoubiquitination/degradation, and what determines the timing of DDB2 turnover at a lesion?
- question: To what extent does CRL4(DDB2)-mediated histone (H2A/H3/H4) ubiquitination versus PARylation and chromatin remodeling contribute independently to nucleosome destabilization at damage sites?
suggested_experiments:
- description: Reconstitute CRL4(DDB2) on defined nucleosomes containing a single CPD or 6-4PP and measure, by quantitative mass spectrometry, the kinetics and lysine-site specificity of histone, XPC and DDB2 ubiquitination, dissecting the contributions of CUL4A vs CUL4B.
- description: Use live-cell imaging with separation-of-function DDB2 mutants (DNA-binding-competent but ligase-dead, or autoubiquitination-resistant) to quantify lesion residence time, XPC recruitment kinetics and GG-NER efficiency for CPDs vs 6-4PPs.
