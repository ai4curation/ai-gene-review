id: P60891
gene_symbol: PRPS1
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  PRPS1 encodes phosphoribosyl pyrophosphate synthetase 1 (ribose-phosphate
  pyrophosphokinase 1; PRS-I; EC 2.7.6.1), a cytosolic Mg2+-dependent enzyme that
  transfers the beta,gamma-diphosphoryl group of ATP to D-ribose 5-phosphate,
  producing 5-phospho-alpha-D-ribose 1-diphosphate (PRPP) plus AMP. PRPP is the
  essential activated precursor for de novo and salvage biosynthesis of purine,
  pyrimidine, and pyridine (NAD) nucleotides, so PRPS1 forms the metabolic bridge
  connecting the pentose phosphate pathway (ribose 5-phosphate) to nucleotide
  metabolism. The enzyme assembles into homodimers that further oligomerize
  (probably a hexamer of three dimers) and is regulated allosterically, being
  activated by inorganic phosphate and Mg2+ and feedback-inhibited by ADP and GDP.
  PRPS1 is X-linked and shows strong dosage sensitivity: loss-of-function variants
  cause Arts syndrome, X-linked Charcot-Marie-Tooth disease type 5
  (CMTX5/Rosenberg-Chutorian), and X-linked nonsyndromic sensorineural deafness
  (DFN2/DFNX1), whereas feedback-resistant gain-of-function variants cause PRPP
  synthetase superactivity with purine overproduction, hyperuricemia, and gout.
