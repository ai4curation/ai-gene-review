- id: PMID:26514574
  title: Complex stability and dynamic subunit interchange modulates the disparate
    activities of the yeast moonlighting proteins Hal3 and Vhs3.
  findings:
  - statement: >-
      In S. cerevisiae the PPCDC enzyme is a heterotrimer built from the moonlighting
      proteins Hal3, Vhs3 and Cab3; establishes the family-level oligomerization behavior
      of PPCDC-domain proteins.
  reference_review:
    relevance: LOW
    correctness: MISCITED
    review_notes: >-
      PubMed-verified, but this is a yeast (S. cerevisiae) study of the heterotrimeric
      Hal3/Vhs3/Cab3 PPCDC, not a direct assay of human PPCDC self-interaction. It informs
      the family-level oligomerization concept only; the human homotrimer (PMID:14501115)
      is the appropriate support for GO:0042802.
