id: Q96CD2
gene_symbol: PPCDC
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  PPCDC (phosphopantothenoylcysteine decarboxylase; EC 4.1.1.36) catalyzes the third
  of the five steps of coenzyme A (CoA) biosynthesis from pantothenate. It is an
  FMN-dependent decarboxylase that removes the carboxyl group from the cysteine moiety
  of N-[(R)-4-phosphopantothenoyl]-L-cysteine to yield (R)-4'-phosphopantetheine and
  CO2. The bound flavin mononucleotide (FMN) acts as a catalytic cofactor, transiently
  oxidizing the substrate thiol to a thioaldehyde to delocalize the developing charge
  during decarboxylation, after which the enethiol intermediate is re-reduced. The
  enzyme is a cytosolic homotrimer that binds one FMN per subunit, and belongs to the
  HFCD (homooligomeric flavin-containing Cys decarboxylase) superfamily. Cys-173 serves
  as the active-site proton donor. In humans PPCDC is a monofunctional homotrimer,
  whereas in Saccharomyces the corresponding decarboxylase is a heterotrimer built from
  the moonlighting proteins Cab3, Hal3 and Vhs3.
