  title: UniProt entry Q96CD2 (COAC_HUMAN), phosphopantothenoylcysteine decarboxylase
  findings:
  - statement: >-
      Catalyzes the decarboxylation of the cysteine moiety of
      4-phosphopantothenoylcysteine to form 4'-phosphopantotheine, part of the
      biosynthesis of coenzyme A (EC 4.1.1.36); binds 1 FMN per subunit; homotrimer;
      CoA pathway step 3/5; HFCD superfamily.
- id: PMID:11923312
  title: Complete reconstitution of the human coenzyme A biosynthetic pathway via
    comparative genomics.
  findings:
  - statement: >-
      Identified human phosphopantothenoylcysteine decarboxylase (among the last four
      CoA-pathway enzymes), verified its activity by E. coli complementation and
      overexpression/purification, and reconstituted the whole pathway in vitro.
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified primary identification/characterization of human PPCDC; abstract
      explicitly names phosphopantothenoylcysteine decarboxylase. Abstract-only in cache.
- id: PMID:14501115
  title: Unusual space-group pseudosymmetry in crystals of human phosphopantothenoylcysteine
    decarboxylase.
  findings:
  - statement: >-
      Crystal structure of human PPC-DC (PDB 1QZU) in complex with FMN; establishes the
      enzyme as an essential CoA-biosynthesis enzyme and characterizes the oligomeric
      quaternary structure.
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified structural paper; supports FMN binding, the decarboxylase complex,
      and homotrimeric self-association. Abstract-only in cache.
- id: PMID:15581364
  title: 'Mechanistic studies on phosphopantothenoylcysteine decarboxylase: trapping
    of an enethiolate intermediate with a mechanism-based inactivating agent.'
  findings:
  - statement: >-
      Human PPC-DC decarboxylates the cysteine moiety of 4'-phosphopantothenoylcysteine
      to 4'-phosphopantetheine using a tightly bound flavin cofactor; Cys-173 is the
      active-site acid (trapped enethiolate intermediate; C173S loses activity).
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified mechanistic study of the human enzyme; supports catalytic activity
      and the FMN-dependent mechanism. Abstract-only in cache.
