  label: Homo sapiens
description: >-
  PET100 is a small (73 aa) single-pass mitochondrial inner-membrane protein that
  functions as a Complex IV (cytochrome c oxidase, COX)-specific assembly chaperone.
  It is the human ortholog of yeast Pet100p and belongs to the PET100 family. PET100
  is non-catalytic; it promotes incorporation of the early nuclear-encoded COX
  subunits (the COX7/COX8 group, exemplified by its conserved interaction with COX
  subunit VIIa, COX7A2) into an early COX assembly intermediate, forming a ~300 kDa
  subcomplex with Complex IV subunits in the mitochondrial inner membrane. Loss of
  PET100 function causes isolated mitochondrial complex IV deficiency (mitochondrial
  complex IV deficiency nuclear type 12; Leigh syndrome), with reduced COX levels and
  activity.
