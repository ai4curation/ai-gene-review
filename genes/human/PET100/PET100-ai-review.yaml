core_functions:
- description: >-
    Non-catalytic Complex IV (cytochrome c oxidase)-specific assembly chaperone in the
    mitochondrial inner membrane. As the human ortholog of yeast Pet100p, PET100 binds
    early nuclear-encoded COX subunits (exemplified by the conserved interaction with
    COX subunit VIIa, COX7A2) and promotes their incorporation into an early COX
    assembly intermediate, forming a ~300 kDa subcomplex with Complex IV subunits.
    PET100 is essential for Complex IV maturation and assembly; its loss causes isolated
    Complex IV deficiency. No molecular-function term is asserted because PET100 has no
    catalytic activity and only binding/scaffolding-type molecular functions (the
    GOA "protein folding chaperone" term over-interprets this assembly role).
