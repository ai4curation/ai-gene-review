- term:
    id: GO:0044183
    label: protein folding chaperone
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: enables
  review:
    summary: >-
      IBA molecular-function annotation as a "protein folding chaperone". PET100 is a
      COX-specific assembly/scaffolding chaperone that promotes incorporation of early
      COX subunits, but there is no evidence that it catalyzes or assists protein
      folding per se. This over-interprets its assembly role as a folding activity.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      PET100 has no demonstrated protein-folding-catalysis function; its documented
      role is binding COX subunits (e.g. COX7A2) and promoting their incorporation into
      the assembling complex. Notably the UniProt-listed PAN-GO molecular function is
      the binding term GO:0051082 (unfolded protein binding), not folding activity. The
      IBA is not overtly wrong (PET100 is chaperone-like) so it is retained as an
      over-annotation rather than removed, per curation policy for phylogenetically
      reviewed annotations.
    propagation_review:
      root_cause: TERM_SCOPING_PROBLEM
      failure_modes:
      - ROLE_CONFLATION
      source_entities:
      - source_id: SGD:S000002486
        source_label: PET100 (S. cerevisiae Pet100p)
        comment: >-
          Yeast Pet100p is a COX-specific assembly chaperone; the phylogenetic MF
          transfer over-labels this assembly/scaffolding role as protein-folding
          activity.
    supported_by:
    - reference_id: PMID:22356826
      supporting_text: >-
        The subunit VIIa of COX (encoded by the COX7A2 gene) was specifically
        co-purified with PET100
