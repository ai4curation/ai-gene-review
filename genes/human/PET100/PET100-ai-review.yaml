proposed_new_terms: []
suggested_questions:
- question: >-
    Which specific early COX subunits (COX7A2/COX7B/COX8A and orthologs) does human
    PET100 directly engage, and does it act sequentially or as a scaffold that couples
    their incorporation into the assembling Complex IV?
- question: >-
    Does PET100 have any binding-type molecular function that could be captured by a
    more informative GO term than "protein folding chaperone", and if so what is its
    structural basis given the single transmembrane helix?
suggested_experiments:
- description: >-
    Perform complexome profiling / BN-PAGE with quantitative mass spectrometry in
    PET100-null versus wild-type cells to define which COX assembly intermediate stalls
    in the absence of PET100 and which subunits fail to be incorporated.
- description: >-
    Use crosslinking mass spectrometry or co-immunoprecipitation of tagged PET100 to map
    its direct interaction partners among COX subunits and other assembly factors, and
    to test the proposed role in incorporating the early COX7/COX8 subunit group.
