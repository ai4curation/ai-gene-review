suggested_questions:
- question: Does ADSS1 have non-catalytic or muscle-specific regulatory roles beyond the
    purine nucleotide cycle that explain the tissue-restricted, distal-predominant myopathy
    phenotype, given the ubiquitously expressed paralog ADSS2?
- question: Is the observed expression of AdSSL1 in stimulated leukemia/hematopoietic cells
    associated with any genuine immune function, or purely a metabolic response?
suggested_experiments:
- description: Steady-state kinetic characterization of purified recombinant human ADSS1
    (Km for IMP, L-aspartate, GTP; Mg2+ dependence) compared with ADSS2, to quantify the
    muscle isozyme's catalytic properties.
  hypothesis: The muscle isozyme ADSS1 has kinetic properties distinct from ADSS2 that suit
    the high purine-nucleotide-cycle flux of skeletal muscle.
- description: Muscle-specific Adss1 knockout or knock-in of the MPD5 D304N variant in mouse
    to test whether purine nucleotide cycle disruption drives the distal myopathy phenotype.
  hypothesis: Loss of ADSS1 catalytic activity impairs the muscle purine nucleotide cycle,
    causing the distal myopathy seen in MPD5 patients.
