description: Muscle (basic/M-type) isozyme of adenylosuccinate synthetase (AMPSase 1;
  synonym ADSSL1; EC 6.3.4.4), a cytosolic homodimeric enzyme predominantly expressed
  in skeletal muscle and heart. It catalyzes the first, committed step of the IMP-to-AMP
  branch of purine metabolism, the Mg2+-dependent, GTP-driven condensation of IMP with
  L-aspartate to form N6-(1,2-dicarboxyethyl)-AMP (adenylosuccinate/S-AMP), GDP and phosphate;
  adenylosuccinate lyase (ADSL) then cleaves S-AMP to AMP and fumarate. Together with ADSL,
  ADSS1 also runs the AMP-regenerating limb of the muscle purine nucleotide cycle, which
  interconverts IMP and AMP and contributes to muscle energetics (glycolysis) and
  ammoniagenesis. The paralog ADSS2 is the liver/ubiquitous (acidic) isozyme. Biallelic
  loss-of-function variants in ADSS1 cause adenylosuccinate synthetase 1 (ADSSL1)-related
  distal myopathy (MPD5), an autosomal recessive adolescent/adult-onset distal myopathy.
