gene_symbol: QDPR
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  QDPR encodes dihydropteridine reductase (DHPR; EC 1.5.1.34), a cytosolic,
  homodimeric NAD(P)H-dependent oxidoreductase of the short-chain
  dehydrogenase/reductase (SDR) family. DHPR regenerates the essential cofactor
  tetrahydrobiopterin (BH4) by reducing the quinonoid form of dihydrobiopterin
  (q-BH2) back to BH4, completing the pterin cofactor cycle. BH4 is the obligate
  cofactor of the aromatic amino acid hydroxylases (phenylalanine, tyrosine and
  tryptophan hydroxylases) and of nitric oxide synthases, so DHPR-mediated BH4
  salvage is required for phenylalanine catabolism and for biosynthesis of the
  monoamine neurotransmitters dopamine and serotonin. The enzyme adopts a
  Rossmann NAD(P)-binding fold with a catalytic tyrosine (Tyr150), and its
  structure has been solved by X-ray crystallography. In humans, biallelic
  loss-of-function variants in QDPR abolish BH4 regeneration and cause
  autosomal recessive dihydropteridine reductase deficiency, a BH4-deficient
  ("malignant"/atypical) hyperphenylalaninemia with progressive neurological
  disease driven by combined hyperphenylalaninemia and monoamine
  neurotransmitter deficiency.
