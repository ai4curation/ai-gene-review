- term:
    id: GO:0009055
    label: electron transfer activity
  evidence_type: TAS
  original_reference_id: PMID:3033643
  qualifier: enables
  review:
    summary: >-
      Generic electron-transfer function assigned by TAS. GO:0009055 denotes the
      directed movement of electrons between molecular entities typically
      mediated by electron carriers (as in electron transport chains). DHPR does
      not act as an electron carrier; it is an NAD(P)H-dependent oxidoreductase
      that transfers a hydride to a quinonoid pteridine (EC 1.5.1.34).
    action: MODIFY
    reason: >-
      The essence (a redox activity) is sound but the specific term is the wrong
      molecular function: DHPR's characterized activity is the 6,7-dihydropteridine
      reductase reaction, not electron-carrier transfer. The cited reference
      (PMID:3033643) describes NADH-mediated reduction of quinonoid
      dihydrobiopterin, i.e. the reductase activity. Replace with the specific
      reductase term (already annotated) so this generic term is not retained as
      a distinct function.
    proposed_replacement_terms:
      - id: GO:0004155
        label: 6,7-dihydropteridine reductase activity
    supported_by:
      - reference_id: PMID:3033643
        supporting_text: "catalyzes the NADH-mediated \nreduction of quinonoid dihydrobiopterin"
