    summary: >-
      A single high-throughput mitochondrial-proteome mapping study lists QDPR
      among detected proteins. DHPR is an established soluble cytosolic SDR-family
      enzyme with no mitochondrial targeting features (initiator Met removed,
      N-acetylated Ala2, no transit peptide); it functions in the cytosolic BH4
