suggested_questions:
  - question: >-
      Does the single high-throughput mitochondrial-proteome detection of QDPR
      reflect a genuine, functionally relevant mitochondrial pool, or
      co-purification of the abundant cytosolic enzyme?
  - question: >-
      Which reduced nicotinamide cofactor (NADH vs NADPH) predominates in vivo
      for human DHPR-mediated BH4 regeneration, and does the preference differ
      between tissues (e.g. brain vs liver)?
suggested_experiments:
  - hypothesis: >-
      Human DHPR regenerates BH4 using NADH as the primary physiological hydride
      donor, with NADPH as an alternative cofactor.
    description: >-
      Steady-state and pre-steady-state kinetics of purified human DHPR
      comparing NADH vs NADPH as hydride donors with quinonoid dihydrobiopterin
      as substrate.
    experiment_type: enzyme kinetics
  - hypothesis: >-
      QDPR is exclusively cytosolic and the mitochondrial-proteome detection is a
      co-purification artifact rather than a functional mitochondrial pool.
    description: >-
      Subcellular fractionation with DHPR activity assay, plus endogenous
      immunofluorescence/immuno-EM, to test for bona fide mitochondrial DHPR
      activity versus exclusively cytosolic localization.
    experiment_type: subcellular fractionation and imaging
