id: P19623
gene_symbol: SRM
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  SRM encodes spermidine synthase (putrescine aminopropyltransferase; EC 2.5.1.16),
  a cytosolic enzyme of the polyamine-biosynthesis pathway. It catalyzes the committed
  aminopropyl-transfer step that produces spermidine: it transfers an aminopropyl group
  from decarboxylated S-adenosylmethionine (dcSAM, the product of AMD1/S-adenosylmethionine
  decarboxylase) onto putrescine, yielding spermidine plus 5'-methylthioadenosine (MTA).
  The enzyme is highly specific for putrescine as the amine acceptor and has only very low
  activity toward 1,3-diaminopropane or spermidine; its flux is thought to be governed
  mainly by dcSAM availability. Structurally it is a member of the spermidine/spermine
  synthase (aminopropyltransferase) family, built on a SAM-dependent methyltransferase-like
  (Rossmann) fold with an N-terminal tetramerization domain and a PABS domain, and it
  functions as a homodimer or homotetramer. Spermidine is an essential polyamine required
  for cell proliferation and, uniquely, provides the aminobutyl moiety for hypusine
  modification of eIF5A. The 302-residue human enzyme has been crystallized with substrates
  and products, defining its catalytic mechanism and the structural basis of putrescine
  specificity.
