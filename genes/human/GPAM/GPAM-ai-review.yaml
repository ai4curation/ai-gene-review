core_functions:
- description: >-
    Glycerol-3-phosphate O-acyltransferase (GPAT1) activity: acylation of the sn-1
    position of sn-glycerol-3-phosphate with a long-chain acyl-CoA (preferentially
    saturated/palmitoyl-CoA) to yield 1-acyl-sn-glycerol-3-phosphate (lysophosphatidic
    acid) and CoA - the committed, rate-limiting first step of glycerolipid biosynthesis.
  molecular_function:
    id: GO:0004366
    label: glycerol-3-phosphate O-acyltransferase activity
  supported_by:
