id: Q9HCL2
gene_symbol: GPAM
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  GPAM (glycerol-3-phosphate acyltransferase 1, mitochondrial; GPAT1; EC 2.3.1.15)
  catalyzes the essential, committed and rate-limiting first step of glycerolipid
  biosynthesis. It esterifies a long-chain acyl group from acyl-CoA onto the sn-1
  position of sn-glycerol-3-phosphate, producing 1-acyl-sn-glycerol-3-phosphate
  (lysophosphatidic acid, LPA) and CoA. The LPA product is the common precursor that
  feeds both storage lipid (triacylglycerol) and membrane glycerophospholipid
  synthesis, including phosphatidic acid and, downstream, CDP-diacylglycerol. GPAT1
  is a peripheral protein of the mitochondrial outer membrane with a cytosol-facing
  catalytic domain, anchored via an intramembrane segment and a patch of basic
  residues; its HXXXXD acyltransferase motif is required for catalysis. The enzyme
  prefers saturated long-chain acyl-CoAs (notably 16-carbon palmitoyl-CoA) and is
  highly expressed in liver and adipose tissue, where it is a major determinant of
  triacylglycerol synthesis and, when overexpressed, contributes to hepatic steatosis.
