- term:
    id: GO:0048731
    label: system development
  evidence_type: IEA
  original_reference_id: GO_REF:0000117
  qualifier: involved_in
  review:
    summary: >-
      ARBA machine-learning (IEA) biological-process annotation to the very general term
      system development.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      This general developmental term reflects the disease phenotype (multi-system,
      predominantly neurological deterioration in MPS IIIB) rather than a direct developmental
      role of the enzyme. The observed developmental defects are downstream consequences of
      impaired heparan sulfate catabolism and lysosomal storage, not a molecular developmental
      function of NAGLU. Uninformative at this level and over-annotated.
    supported_by:
    - reference_id: file:human/NAGLU/NAGLU-uniprot.txt
      supporting_text: >-
        MPS3 is characterized by severe central nervous system degeneration, but only
        mild somatic disease.
- term:
    id: GO:1901135
    label: carbohydrate derivative metabolic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000117
  qualifier: involved_in
  review:
    summary: >-
      ARBA machine-learning (IEA) biological-process annotation to the general term
      carbohydrate derivative metabolic process.
    action: MODIFY
    reason: >-
      NAGLU does act in the metabolism of a carbohydrate derivative (heparan sulfate, an
      N-acetylglucosamine-containing glycosaminoglycan), so the term is not incorrect, but it
      is far too general to be informative. Modify to the specific heparan sulfate proteoglycan
      catabolic process that captures the actual biology.
    proposed_replacement_terms:
    - id: GO:0030200
      label: heparan sulfate proteoglycan catabolic process
    supported_by:
    - reference_id: file:human/NAGLU/NAGLU-uniprot.txt
      supporting_text: 'FUNCTION: Involved in the degradation of heparan sulfate.'
- term:
    id: GO:0030200
    label: heparan sulfate proteoglycan catabolic process
  evidence_type: TAS
  original_reference_id: Reactome:R-HSA-2024096
  qualifier: involved_in
  review:
    summary: >-
      Reactome (TAS) annotation placing NAGLU in the lysosomal degradation of heparan sulfate
      glycosaminoglycan (HS-GAG degradation pathway).
    action: ACCEPT
    reason: >-
      This is the core biological process for NAGLU. The enzyme performs one exolytic step in
      the ordered lysosomal breakdown of heparan sulfate, removing terminal
      alpha-N-acetylglucosamine residues; its deficiency blocks this catabolic pathway and
      causes MPS IIIB. Accepted as a core function and used as the preferred replacement for
      the more general/heparin-specific process annotations.
    supported_by:
    - reference_id: Reactome:R-HSA-2024096
      supporting_text: >-
        The steps outlined below describe the cleavage of heparan sulfate/heparin from
        heparan sulfate proteoglycans (HSPGs) and its degradation.
    - reference_id: file:human/NAGLU/NAGLU-uniprot.txt
      supporting_text: 'FUNCTION: Involved in the degradation of heparan sulfate.'
