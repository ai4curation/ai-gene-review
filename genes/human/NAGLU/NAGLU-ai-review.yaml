- term:
    id: GO:0007399
    label: nervous system development
  evidence_type: TAS
  original_reference_id: PMID:8650226
  qualifier: involved_in
  review:
    summary: >-
      Author-statement (TAS) annotation to nervous system development, reflecting the profound
      neurological phenotype of NAGLU deficiency (Sanfilippo B).
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      The neurological phenotype of MPS IIIB (profound mental deterioration, CNS degeneration)
      is a downstream pathological consequence of failed lysosomal heparan sulfate catabolism
      and progressive storage, not a direct developmental function of the enzyme. NAGLU is a
      housekeeping lysosomal glycosidase; annotating it to nervous system development conflates
      disease phenotype with molecular role and over-annotates. The core biology is captured by
      the catabolic-process and lysosome annotations.
    supported_by:
    - reference_id: PMID:8650226
      supporting_text: >-
        it is characterized by profound mental deterioration in childhood and death in the
        second decade
