id: P54802
gene_symbol: NAGLU
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  NAGLU encodes alpha-N-acetylglucosaminidase, a lysosomal exoglycosidase of glycoside
  hydrolase family 89 (CAZy GH89) that catalyses the hydrolysis of terminal non-reducing
  alpha-N-acetyl-D-glucosamine residues in N-acetyl-alpha-D-glucosaminides (EC 3.2.1.50).
  It carries out one step in the ordered, stepwise exolytic degradation of heparan sulfate
  in the lysosome: NAGLU removes the terminal alpha-N-acetylglucosamine residue that is
  exposed after upstream enzymes (SGSH liberates a glucosamine, which HGSNAT then
  N-acetylates). The protein is synthesised as a signal-peptide-bearing precursor,
  N-glycosylated, and processed to mature 82 kDa and 77 kDa lysosomal forms; it functions
  as a monomer or homodimer. Loss of NAGLU activity blocks heparan sulfate catabolism and
  causes mucopolysaccharidosis type IIIB (MPS IIIB, Sanfilippo syndrome B), an autosomal
  recessive lysosomal storage disease dominated by progressive central nervous system
  degeneration. A dominant NAGLU missense variant additionally causes axonal
  Charcot-Marie-Tooth disease type 2V.
existing_annotations:
- term:
    id: GO:0004561
    label: alpha-N-acetylglucosaminidase activity
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: enables
  review:
    summary: >-
      Phylogenetic (IBA) assignment of the core catalytic molecular function of NAGLU,
      alpha-N-acetylglucosaminidase activity, propagated across the GH89 family from
      experimentally characterized orthologs.
    action: ACCEPT
    reason: >-
      This is the defining, experimentally established activity of NAGLU: hydrolysis of
      terminal non-reducing N-acetyl-D-glucosamine residues in N-acetyl-alpha-D-glucosaminides
      (EC 3.2.1.50), consistent with the GO term definition and UniProt. The IBA assignment
      is correct and at the right level of specificity; retained as a core function.
    supported_by:
    - reference_id: file:human/NAGLU/NAGLU-uniprot.txt
      supporting_text: >-
        Reaction=Hydrolysis of terminal non-reducing N-acetyl-D-glucosamine
        residues in N-acetyl-alpha-D-glucosaminides.; EC=3.2.1.50
    - reference_id: PMID:8650226
      supporting_text: >-
        The Sanfilippo syndrome type B is a lysosomal storage disorder caused by
        deficiency of alpha-N-acetylglucosaminidase
- term:
    id: GO:0005773
    label: vacuole
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: is_active_in
  review:
    summary: >-
      Phylogenetic (IBA) location annotation to vacuole, the lineage-general parent of the
      lysosome used by GO_Central for this family.
    action: ACCEPT
    reason: >-
      Vacuole (GO:0005773) is the broad, taxon-general term encompassing the lysosome, where
      NAGLU actually acts in animals. It is correct but less specific than the lysosome/lysosomal
      lumen annotations also present; accepted as a valid (if general) location. The specific
      human location is captured by the lysosome and lysosomal lumen annotations.
    supported_by:
    - reference_id: file:human/NAGLU/NAGLU-uniprot.txt
      supporting_text: 'SUBCELLULAR LOCATION: Lysosome.'
- term:
    id: GO:0030202
    label: heparin proteoglycan metabolic process
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: involved_in
  review:
    summary: >-
      Phylogenetic (IBA) biological-process annotation placing NAGLU in heparin proteoglycan
      metabolism.
    action: MODIFY
    reason: >-
      Heparin is a highly sulfated variant of heparan sulfate and NAGLU acts on the shared
      alpha-N-acetylglucosamine linkage, so the annotation is not wrong; however the primary,
      disease-relevant process for NAGLU is the lysosomal catabolism of heparan sulfate.
      Modify to the more accurate and specific heparan sulfate proteoglycan catabolic process,
      which is what the enzyme's deficiency (MPS IIIB) directly impairs.
    proposed_replacement_terms:
    - id: GO:0030200
      label: heparan sulfate proteoglycan catabolic process
    supported_by:
    - reference_id: file:human/NAGLU/NAGLU-uniprot.txt
      supporting_text: 'FUNCTION: Involved in the degradation of heparan sulfate.'
    - reference_id: Reactome:R-HSA-1678742
      supporting_text: >-
        Alpha-N-acetylglucosaminidase (NAGLU) hydrolyses the non-reducing, terminal
        N-acetyl-D-glucosamine residue from heparan sulfate.
