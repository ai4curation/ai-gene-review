  review:
    summary: >-
      High-throughput mass-spectrometry (HDA) detection of NAGLU in exosomes isolated from
      expressed prostatic secretions in urine.
    action: KEEP_AS_NON_CORE
    reason: >-
      NAGLU was identified in a bulk shotgun-proteomics survey of urinary/prostatic exosomes.
      Presence of lysosomal enzymes in secreted extracellular vesicles is a real but peripheral
      observation and does not reflect the core lysosomal catabolic function of the enzyme.
      Retained as a non-core localization.
