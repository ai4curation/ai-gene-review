      In cells overexpressing the recombinant protein, sphingomyelin and ceramide
      metabolism were not apparently affected, whereas 1-O-alkyl-sn-glycerol
      accumulated; both lyso-PC and lyso-PAF are good in vitro substrates, and the
      protein acts as a lyso-PAF-PLC rather than a cellular N-SMase.
