id: O60906
gene_symbol: SMPD2
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  SMPD2 encodes neutral sphingomyelinase 1 (nSMase1 / N-SMase), a Mg2+-dependent,
  integral-membrane phosphoric diester hydrolase (EC 3.1.4.12) of the neutral
  sphingomyelinase family with an endonuclease/exonuclease/phosphatase
  (DNase-I-like) catalytic fold and two C-terminal transmembrane helices. It was
  originally cloned as a putative neutral sphingomyelinase that hydrolyzes
  sphingomyelin to ceramide and phosphocholine in vitro. Subsequent functional
  characterization showed that, in cells, its dominant activity is that of a
  lyso-platelet-activating-factor phospholipase C (lyso-PAF-PLC): it efficiently
  hydrolyzes lyso-PAF (1-O-alkyl-2-lyso-sn-glycero-3-phosphocholine),
  lysophosphatidylcholine, and sphingosylphosphocholine, releasing phosphocholine
  and the corresponding alkyl/acyl-glycerol or sphingoid product. Substrate
  recognition requires a hydrogen-bond donor at the C-2/sn-2 position, so the
  enzyme acts on sphingomyelin, sphingosylphosphocholine, and monoradyl
  glycerophosphocholine but not on diradyl species. It participates in
  sphingolipid and sphingomyelin/ceramide metabolism. In contrast to the
  paralog SMPD3 (nSMase2), which is the major stress-responsive cellular neutral
  sphingomyelinase, the physiological contribution of SMPD2 to bulk cellular
  sphingomyelin hydrolysis is limited and debated.
