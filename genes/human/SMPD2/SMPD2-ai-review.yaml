    correctness: VERIFIED
    review_notes: >-
      Key functional paper. PMID/EC (3.1.4.12) match the UniProt record. Abstract
      only in cache; establishes lyso-PAF-PLC as the dominant cellular activity.
- id: PMID:14741383
  title: Hydrolysis of sphingosylphosphocholine by neutral sphingomyelinases.
  findings:
  - statement: >-
      Human nSMase1 and nSMase2 hydrolyze sphingosylphosphocholine efficiently under
      detergent-free conditions; substrate specificity for sphingomyelin,
      sphingosylphosphocholine, and monoradyl glycerophosphocholine (but not diradyl
      species) indicates a required hydrogen-bond donor at the C-2/sn-2 position.
    reference_section_type: ABSTRACT
    supporting_text: "efficiently under detergent-free conditions"
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      PMID/DOI match the UniProt catalytic-activity references. Abstract only in
