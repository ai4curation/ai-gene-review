- term:
    id: GO:0046513
    label: ceramide biosynthetic process
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: involved_in
  review:
    summary: >-
      Sphingomyelin hydrolysis generates ceramide, so this process is mechanistically
      linked to the SMase reaction. However, the cellular role of SMPD2 in bulk
      ceramide generation is limited and debated: in overexpressing cells the
      metabolism of ceramide and sphingomyelin was not apparently affected
      (PMID:10608884), with the enzyme acting predominantly as a lyso-PAF-PLC. The
      major stress-responsive cellular neutral SMase is SMPD3 (nSMase2). Framing
      SMPD2's core role as ceramide biosynthesis over-annotates its physiological
      contribution.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      Ceramide production is a consequence of the in vitro SMase reaction, but
      SMPD2's cellular contribution to ceramide biosynthesis is limited; SMPD3 is
      the principal cellular neutral SMase.
    supported_by:
