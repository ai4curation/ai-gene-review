existing_annotations:
- term:
    id: GO:0005634
    label: nucleus
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      IBA annotation inferred from phylogenetic analysis using orthologs FB:FBgn0034451
      (Drosophila CLIP-190) and MGI:MGI:1928401 (mouse Clip3). Nuclear localization is not
      a well-established feature of the CLIP family. CLIP1 and CLIP3 are primarily cytoplasmic
      and microtubule-associated proteins. The nuclear localization annotation for the CLIP family
      members used as evidence may reflect secondary or condition-dependent localization rather
      than a core function.
    action: KEEP_AS_NON_CORE
    reason: >-
      While the IBA inference is phylogenetically grounded, nuclear localization is not a
      well-characterized feature of CLIP family proteins. The primary localization of CLIP
      proteins is at microtubule plus-ends and the cytoplasm. This annotation may reflect
      a secondary or minor localization pattern rather than a core aspect of CLIP4 function.
      Keeping as non-core is appropriate since CLIP4 itself has not been experimentally studied.

- term:
    id: GO:0035371
    label: microtubule plus-end
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      IBA annotation inferred from phylogenetic analysis using orthologs including
      MGI:MGI:1313136 (mouse Clip1/CLIP-170), MGI:MGI:1928401 (mouse Clip3), and
      RGD:67404 (rat Clip1). CLIP family proteins are classic microtubule plus-end
      tracking proteins (+TIPs) that localize to microtubule plus-ends via their
      CAP-Gly domains. CLIP4 contains three CAP-Gly domains, the hallmark structural
      feature of this protein family.
    action: ACCEPT
    reason: >-
      Microtubule plus-end localization is the defining characteristic of CLIP family proteins.
      CLIP4 contains three CAP-Gly domains, which are the structural modules responsible for
      microtubule plus-end binding in CLIP1/CLIP-170 and dynactin p150Glued. The IBA inference
      from well-characterized paralogs CLIP1 and CLIP3 is strongly supported by domain architecture.
    supported_by:
    - reference_id: GO_REF:0000033
      supporting_text: >-
        IBA annotation based on phylogenetic inference from CLIP family members including
        CLIP1 (CLIP-170) and CLIP3, which are established microtubule plus-end tracking proteins.

- term:
    id: GO:0005938
    label: cell cortex
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      IBA annotation inferred from phylogenetic analysis using FB:FBgn0034451 (Drosophila
      CLIP-190). Cell cortex localization has been observed for some CLIP family members,
      particularly in Drosophila where CLIP-190 localizes to the cell cortex in the context
      of asymmetric cell division and microtubule-cortex interactions.
    action: KEEP_AS_NON_CORE
    reason: >-
      Cell cortex localization is a plausible but secondary localization for CLIP family
      proteins, reflecting their role in linking microtubule plus-ends to cortical structures.
      This is less well-established as a core localization compared to microtubule plus-ends.
      The evidence is primarily from the Drosophila ortholog CLIP-190. Keeping as non-core
      is appropriate given the limited evidence base for this specific localization in mammals.

- term:
    id: GO:0031122
    label: cytoplasmic microtubule organization
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      IBA annotation inferred from phylogenetic analysis using FB:FBgn0034451 (Drosophila
      CLIP-190) and PomBase:SPAC13D6.05 (S. pombe Tip1). CLIP family proteins are well
      established as regulators of cytoplasmic microtubule dynamics and organization,
      particularly through their role as +TIPs that modulate microtubule rescue and dynamics
      at microtubule plus-ends.
    action: ACCEPT
    reason: >-
      Cytoplasmic microtubule organization is a core biological process for CLIP family
      proteins. The CAP-Gly domains of CLIPs bind to EEY/F motifs at microtubule plus-ends
      (on alpha-tubulin and EB1) and regulate microtubule dynamics. This is strongly supported
      by the domain architecture of CLIP4 (three CAP-Gly domains) and the conserved function
      across the CLIP family from yeast (Tip1) to mammals (CLIP1/CLIP-170).
    supported_by:
    - reference_id: GO_REF:0000033
      supporting_text: >-
        IBA annotation based on phylogenetic inference from CLIP family members including
        Drosophila CLIP-190 and S. pombe Tip1, which are established regulators of
        cytoplasmic microtubule organization.

- term:
    id: GO:0051010
    label: microtubule plus-end binding
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      IBA annotation inferred from phylogenetic analysis using orthologs including
      MGI:MGI:1313136 (mouse Clip1), MGI:MGI:1928401 (mouse Clip3), RGD:62019 (rat Clip3),
      RGD:67404 (rat Clip1), and UniProtKB:P30622 (CLIP1_HUMAN). Microtubule plus-end
      binding is the canonical molecular function of CLIP family proteins, mediated by
      CAP-Gly domains that recognize the EEY/F acidic tail of alpha-tubulin and EB proteins
      at microtubule growing ends.
    action: ACCEPT
    reason: >-
      Microtubule plus-end binding is the core molecular function of CLIP family proteins.
      CLIP4 contains three CAP-Gly domains, the structural modules that directly mediate
      binding to microtubule plus-ends. This is the most informative molecular function
      annotation for CLIP4 and is strongly supported by the domain architecture and well-characterized
      function of paralogs CLIP1 and CLIP3.
    supported_by:
    - reference_id: GO_REF:0000033
      supporting_text: >-
        IBA annotation based on phylogenetic inference from multiple well-characterized CLIP
        family members (CLIP1, CLIP3) that have experimentally demonstrated microtubule
        plus-end binding activity via CAP-Gly domains.

- term:
    id: GO:0005515
    label: protein binding
  evidence_type: IPI
  original_reference_id: PMID:25416956
  review:
    summary: >-
      This annotation is based on high-throughput yeast two-hybrid screening from the
      HuRI (Human Reference Interactome) project (PMID:25416956). CLIP4 was found to
      interact with multiple partners including MAGEA12 (P43365), TRIM32 (Q13049),
      ZNF114 (Q8NC26), JAKMIP2 (Q96AA8), LZTS2 (Q9BRK4), and KIFC3 (Q9BVG8) in this
      large-scale systematic binary interactome mapping study.
    action: REMOVE
    reason: >-
      The term 'protein binding' (GO:0005515) is too generic to be informative about
      CLIP4 function. While these interactions from the high-throughput interactome
      study are real data, this generic term does not convey what CLIP4 actually does.
      The interactions with KIFC3 (kinesin) and MAP7 (microtubule-associated protein)
      are biologically interesting and consistent with microtubule-related functions,
      but are better captured by the existing microtubule-related annotations.
    supported_by:
    - reference_id: PMID:25416956
      supporting_text: >-
        we describe a systematic map of ?14,000 high-quality human binary protein-protein interactions

- term:
    id: GO:0005515
    label: protein binding
  evidence_type: IPI
  original_reference_id: PMID:31515488
  review:
    summary: >-
      This annotation is based on high-throughput interaction studies testing the
      impact of genetic variants on protein interactions (PMID:31515488). CLIP4 was
      found to interact with ZNF114 (Q8NC26). The study focused on how missense
      SNVs disrupt protein-protein interactions rather than characterizing CLIP4
      function specifically.
    action: REMOVE
    reason: >-
      The term 'protein binding' (GO:0005515) is uninformative. This study was designed
      to assess the impact of genetic variants on protein interactions across the
      allele frequency spectrum, not to characterize CLIP4 function. The generic
      binding term does not add useful functional information beyond what is already
      captured by the microtubule-related annotations.
    supported_by:
    - reference_id: PMID:31515488
      supporting_text: >-
        we leverage the ExAC database of 60,706 human exomes to investigate experimentally the impact of 2009 missense single nucleotide variants (SNVs) across 2185 protein-protein interactions

- term:
    id: GO:0005515
    label: protein binding
  evidence_type: IPI
  original_reference_id: PMID:32296183
  review:
    summary: >-
      This annotation is based on the HuRI (Human Reference Interactome) reference
      binary interactome mapping study (PMID:32296183). CLIP4 interactions detected include
      HSF2BP (O75031), MAGEA12 (P43365), TRIM32 (Q13049), MAP7 (Q14244), TRIP13 (Q15645),
      MEOX2 (Q6FHY5), ZNF114 (Q8NC26), JAKMIP2 (Q96AA8), KIFC3 isoform 5 (Q9BVG8-5),
      and SIX2 (Q9NPC8). This is the most comprehensive interactome study for CLIP4.
    action: REMOVE
    reason: >-
      The term 'protein binding' (GO:0005515) is too generic. While the interaction partners
      identified (especially KIFC3, MAP7) are biologically consistent with microtubule-related
      function, the generic binding term does not convey this. The microtubule plus-end
      binding annotation (GO:0051010) already captures the core molecular function.
    supported_by:
    - reference_id: PMID:32296183
      supporting_text: >-
        Here we present a human 'all-by-all' reference interactome map of human binary protein interactions, or 'HuRI'.

- term:
    id: GO:0005515
    label: protein binding
  evidence_type: IPI
  original_reference_id: PMID:32353859
  review:
    summary: >-
      This annotation is based on a SARS-CoV-2-human protein interaction mapping study
      (PMID:32353859). CLIP4 was identified as interacting with the SARS-CoV-2 Nsp15
      endoribonuclease (P0DTD1-PRO_0000449630) via affinity-purification mass spectrometry.
      The study expressed tagged viral proteins in human cells and identified host
      protein interaction partners.
    action: REMOVE
    reason: >-
      The term 'protein binding' is uninformative. The interaction with SARS-CoV-2 Nsp15
      represents a viral host-factor interaction that is not reflective of CLIP4's normal
      biological function. This is a pathological interaction identified in the context
      of viral infection studies and should not be treated as a core annotation.
    supported_by:
    - reference_id: PMID:32353859
      supporting_text: >-
        we cloned, tagged and expressed 26 of the 29 SARS-CoV-2 proteins in human cells
        and identified the human proteins that physically associated with each of the
        SARS-CoV-2 proteins using affinity-purification mass spectrometry, identifying
        332 high-confidence protein-protein interactions between SARS-CoV-2 and human
        proteins

- term:
    id: GO:0005515
    label: protein binding
  evidence_type: IPI
  original_reference_id: PMID:33060197
  review:
    summary: >-
      This annotation is based on comparative coronavirus-host protein interaction
      mapping (PMID:33060197). CLIP4 was identified as interacting with the SARS-CoV-2
      Nsp15 protein (P0DTD1-PRO_0000449630), similar to PMID:32353859. This study
      compared interactions across SARS-CoV-2, SARS-CoV-1, and MERS-CoV.
    action: REMOVE
    reason: >-
      The term 'protein binding' is uninformative. This is a duplicate detection of
      the same viral protein interaction (Nsp15) as PMID:32353859, from related
      studies by the same group. The interaction with a viral protein does not
      inform about CLIP4's normal cellular function.
    supported_by:
    - reference_id: PMID:33060197
      supporting_text: >-
        we have carried out comparative viral-human protein-protein interaction and
        viral protein localization analyses for all three viruses

- term:
    id: GO:0005515
    label: protein binding
  evidence_type: IPI
  original_reference_id: PMID:36217030
  review:
    summary: >-
      This annotation is based on a comprehensive SARS-CoV-2-human protein interaction
      study using yeast two-hybrid and mass spectrometry (PMID:36217030). CLIP4 was
      identified as interacting with the SARS-CoV-2 Nsp15 protein (P0DTD1-PRO_0000449630).
      This is the third independent detection of this same viral interaction.
    action: REMOVE
    reason: >-
      The term 'protein binding' is uninformative. This represents yet another detection
      of the SARS-CoV-2 Nsp15 interaction from a high-throughput study. The generic
      binding term and the viral interaction context do not inform about CLIP4's
      normal biological function.
    supported_by:
    - reference_id: PMID:36217030
      supporting_text: >-
        We use high-throughput yeast two-hybrid experiments and mass spectrometry to
        generate a comprehensive SARS-CoV-2-human protein-protein interactome network
        consisting of 739 high-confidence binary and co-complex interactions

references:
- id: GO_REF:0000033
  title: Annotation inferences using phylogenetic trees
  findings:
  - statement: >-
      CLIP4 IBA annotations are based on phylogenetic inference from well-characterized
      CLIP family members including CLIP1 (CLIP-170), CLIP3, Drosophila CLIP-190, and
      S. pombe Tip1. These annotations cover microtubule plus-end localization, microtubule
      plus-end binding, cell cortex localization, nucleus localization, and cytoplasmic
      microtubule organization.
    supporting_text: >-
      IBA annotations inferred from MGI:MGI:1313136 (Clip1), MGI:MGI:1928401 (Clip3),
      FB:FBgn0034451 (CLIP-190), PomBase:SPAC13D6.05 (Tip1), RGD:67404, RGD:62019,
      UniProtKB:P30622 (CLIP1_HUMAN)
- id: PMID:25416956
  title: A proteome-scale map of the human interactome network.
  findings:
  - statement: >-
      Large-scale systematic binary interactome mapping study that identified approximately
      14,000 high-quality human protein-protein interactions using yeast two-hybrid screening.
      CLIP4 was among the proteins tested and found to interact with multiple partners.
    supporting_text: >-
      Here, we describe a systematic map of ?14,000 high-quality human binary protein-protein interactions
- id: PMID:31515488
  title: Extensive disruption of protein interactions by genetic variants across the
    allele frequency spectrum in human populations.
  findings:
  - statement: >-
      Study examining the functional impact of missense SNVs on protein-protein interactions
      using Y2H. CLIP4 interaction with ZNF114 was tested in the context of variant effects
      on interactions.
    supporting_text: >-
      we leverage the ExAC database of 60,706 human exomes to investigate experimentally the impact of 2009 missense single nucleotide variants (SNVs) across 2185 protein-protein interactions
- id: PMID:32296183
  title: A reference map of the human binary protein interactome.
  findings:
  - statement: >-
      The HuRI (Human Reference Interactome) project providing a comprehensive binary
      interactome map. CLIP4 interactions were detected with multiple partners including
      KIFC3, MAP7, TRIM32, JAKMIP2, and others, several of which are microtubule-related.
    supporting_text: >-
      Here we present a human 'all-by-all' reference interactome map of human binary protein interactions, or 'HuRI'.
- id: PMID:32353859
  title: A SARS-CoV-2 protein interaction map reveals targets for drug repurposing.
  findings:
  - statement: >-
      CLIP4 was identified as a host protein interacting with SARS-CoV-2 Nsp15 endoribonuclease
      by affinity-purification mass spectrometry. This represents a viral-host interaction
      rather than a normal cellular function.
    supporting_text: >-
      we cloned, tagged and expressed 26 of the 29 SARS-CoV-2 proteins in human cells
      and identified the human proteins that physically associated with each of the
      SARS-CoV-2 proteins using affinity-purification mass spectrometry, identifying
      332 high-confidence protein-protein interactions between SARS-CoV-2 and human
      proteins
- id: PMID:33060197
  title: Comparative host-coronavirus protein interaction networks reveal pan-viral
    disease mechanisms.
  findings:
  - statement: >-
      CLIP4 was identified as interacting with SARS-CoV-2 Nsp15 in comparative
      coronavirus-host interactome study spanning SARS-CoV-2, SARS-CoV-1, and MERS-CoV.
    supporting_text: >-
      we have carried out comparative viral-human protein-protein interaction and
      viral protein localization analyses for all three viruses
- id: PMID:36217030
  title: A comprehensive SARS-CoV-2-human protein-protein interactome reveals COVID-19
    pathobiology and potential host therapeutic targets.
  findings:
  - statement: >-
      CLIP4 interaction with SARS-CoV-2 Nsp15 was independently confirmed by yeast
      two-hybrid and mass spectrometry in this comprehensive interactome study.
    supporting_text: >-
      We use high-throughput yeast two-hybrid experiments and mass spectrometry to
      generate a comprehensive SARS-CoV-2-human protein-protein interactome network
      consisting of 739 high-confidence binary and co-complex interactions

core_functions:
- molecular_function:
    id: GO:0051010
    label: microtubule plus-end binding
  directly_involved_in:
  - id: GO:0031122
    label: cytoplasmic microtubule organization
  locations:
  - id: GO:0035371
    label: microtubule plus-end
  description: >-
    CLIP4 is predicted to function as a microtubule plus-end tracking protein (+TIP)
    that binds microtubule plus-ends via its three CAP-Gly domains and contributes to
    cytoplasmic microtubule organization. This function is inferred from phylogenetic
    analysis with well-characterized CLIP family members (CLIP1/CLIP-170, CLIP3) and
    is supported by the conserved CAP-Gly domain architecture (PDB:2Z0W).

suggested_questions:
- question: Does CLIP4 have distinct functional roles compared to CLIP1 and CLIP3, or is it functionally redundant?
- question: What is the biological significance of CLIP4 interaction with KIFC3 (a minus-end directed kinesin) and MAP7?
- question: Does CLIP4 play a specific role in skeletal muscle, given its enhanced expression in that tissue?
- question: What is the functional significance of CLIP4 interaction with SARS-CoV-2 Nsp15, and does this affect microtubule dynamics during viral infection?

suggested_experiments:
- description: Immunofluorescence microscopy to determine subcellular localization of endogenous CLIP4, particularly at microtubule plus-ends
  hypothesis: CLIP4 localizes to microtubule plus-ends consistent with its CAP-Gly domain architecture
- description: Live-cell imaging with GFP-tagged CLIP4 to confirm plus-end tracking behavior
  hypothesis: CLIP4 exhibits comet-like plus-end tracking dynamics similar to CLIP1
- description: Co-immunoprecipitation to validate interactions with KIFC3 and MAP7 in a microtubule-relevant context
  hypothesis: CLIP4 physically associates with microtubule-associated motors and MAPs
- description: CRISPR knockout in cell lines to assess impact on microtubule dynamics and organization
  hypothesis: Loss of CLIP4 perturbs microtubule dynamics or organization
- description: In vitro microtubule binding assays using purified CLIP4 CAP-Gly domains
  hypothesis: CLIP4 CAP-Gly domains directly bind microtubule plus-ends and tubulin C-terminal tails
