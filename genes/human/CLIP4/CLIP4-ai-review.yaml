id: Q8N3C7
gene_symbol: CLIP4
product_type: PROTEIN
status: IN_PROGRESS
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  CLIP4 (CAP-Gly domain-containing linker protein 4, also known as restin-like protein 2/RSNL2)
  is a member of the CLIP family of microtubule plus-end tracking proteins (+TIPs). The protein
  contains three CAP-Gly domains (residues 303-345, 505-547, 644-686) and three ankyrin repeats
  (residues 65-101, 149-180, 186-215). CAP-Gly domains are well-characterized microtubule
  plus-end binding modules found in dynactin p150Glued and CLIP-170/CLIP1 family members.
  The crystal structure of the second CAP-Gly domain (PDB:2Z0W, 2.5 Angstroms) has been solved.
  CLIP4 is classified as a Tdark (understudied) protein in Pharos, and no gene-specific
  functional studies have been published. Its function is inferred by homology to better-characterized
  CLIP family members (CLIP1/CLIP-170, CLIP3) which are known microtubule plus-end tracking proteins
  involved in cytoplasmic microtubule organization. CLIP4 has four alternatively spliced isoforms
  and shows enhanced expression in skeletal muscle. Multiple high-throughput interactome studies
  have identified protein interaction partners including KIFC3 (a kinesin family member), MAP7
  (a microtubule-associated protein), TRIM32, JAKMIP2, and LZTS2, as well as SARS-CoV-2 Nsp15
  (ORF1ab replicase polyprotein).
