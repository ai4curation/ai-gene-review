core_functions:
  - description: >-
      ATP6V0A1 is the a1 subunit of the V0 membrane sector of V-ATPase and contributes to rotary ATP-driven
      proton transport by the assembled complex.
    contributes_to_molecular_function:
      id: GO:0046961
      label: proton-transporting ATPase activity, rotational mechanism
    directly_involved_in:
      - id: GO:1902600
        label: proton transmembrane transport
    in_complex:
      id: GO:0033179
      label: proton-transporting V-type ATPase, V0 domain
    supported_by:
      - reference_id: file:human/ATP6V0A1/ATP6V0A1-uniprot.txt
        supporting_text: proton transport subunit a, a ring of proteolipid subunits
      - reference_id: PMID:33065002
        supporting_text: ATP hydrolysis-driven proton pumps that acidify intracellular vesicles
      - reference_id: PMID:34909687
        supporting_text: responsible for proton translocation
  - description: >-
      As part of V-ATPase complexes on endolysosomal and synaptic vesicle membranes, ATP6V0A1 supports
      acidification of lysosomes, endosomes, and synaptic vesicles, with downstream effects on protein
      degradation, autophagic flux, mTORC1/Notch signaling contexts, and neurotransmitter loading.
    contributes_to_molecular_function:
      id: GO:0046961
      label: proton-transporting ATPase activity, rotational mechanism
    directly_involved_in:
      - id: GO:0007042
        label: lysosomal lumen acidification
      - id: GO:0048388
        label: endosomal lumen acidification
      - id: GO:0097401
        label: synaptic vesicle lumen acidification
      - id: GO:0007035
        label: vacuolar acidification
    locations:
      - id: GO:0005765
        label: lysosomal membrane
      - id: GO:0010008
        label: endosome membrane
      - id: GO:0030672
        label: synaptic vesicle membrane
    in_complex:
      id: GO:0033176
      label: proton-transporting V-type ATPase complex
    supported_by:
      - reference_id: file:human/ATP6V0A1/ATP6V0A1-uniprot.txt
        supporting_text: acidification of various organelles, such as lysosomes, endosomes
      - reference_id: PMID:33065002
        supporting_text: pH homeostasis of endosomes and lysosomes
      - reference_id: PMID:33833240
        supporting_text: These data suggested that all ATP6V0A1 missense variants impaired lysosomal
          acidification in cell lines.
      - reference_id: PMID:33833240
        supporting_text: the neurotransmitter content of synaptic vesicles was indeed lowered in 
          Atp6v0a1A512P/A512P mice, presumably due to the reduced proton pump activity.
proposed_new_terms: []
suggested_questions:
  - question: For human ATP6V0A1, which cell types have direct evidence for a1-containing V-ATPase 
      at the plasma membrane rather than endolysosomal or secretory vesicle membranes?
  - question: Do the annotated UniProt isoforms differ in compartment targeting or V0 assembly 
      efficiency in neurons or other tissues?
suggested_experiments:
  - hypothesis: ATP6V0A1 isoforms differ in endolysosomal versus synaptic vesicle targeting in 
      neuronal cells.
    description: Express tagged ATP6V0A1 isoforms at near-endogenous levels in neurons and quantify 
      colocalization with lysosomal, endosomal, and synaptic vesicle markers together with 
      compartment pH reporters.
    experiment_type: isoform-resolved localization and organelle pH assay
