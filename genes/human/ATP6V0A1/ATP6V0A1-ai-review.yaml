id: Q93050
gene_symbol: ATP6V0A1
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  ATP6V0A1 encodes the a1 isoform of the V0 membrane sector of the vacuolar H+-ATPase. It is a multi-pass
  membrane subunit that helps assemble the proton-translocation sector of V-ATPase complexes on endolysosomal,
  synaptic vesicle, secretory vesicle, melanosomal, and specialized plasma membranes. By contributing
  to ATP-driven proton transport, ATP6V0A1 supports acidification of lysosomes, endosomes, synaptic vesicles,
  and related organelles; pathogenic variants impair endolysosomal acidification and cause severe neurodevelopmental
  disease with synaptic and autophagy defects.
