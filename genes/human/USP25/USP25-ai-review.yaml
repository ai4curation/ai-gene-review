id: Q9UHP3
gene_symbol: USP25
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: USP25 (ubiquitin carboxyl-terminal hydrolase 25; historically called "USP
  on chromosome 21" / USP21) is a cytoplasmic cysteine (papain-like, peptidase C19
  family) deubiquitinating enzyme. It has an N-terminal UBA-like domain and tandem
  ubiquitin-interacting motifs (UIM) that recognize ubiquitin, a catalytic USP domain
  (active-site Cys-178), and a C-terminal region that mediates oligomerization, with
  an inhibited homotetramer and an active homodimer state controlling catalytic output.
  USP25 hydrolyzes ubiquitin from substrates and can cleave both K48- and K63-linked
  polyubiquitin chains, thereby protecting specific substrates from proteasomal degradation
  and modulating signaling. Characterized substrates and pathways include stabilization
  of the tankyrases TNKS1/TNKS2 to modulate Wnt/beta-catenin signaling, deubiquitination
  and stabilization of KEAP1 within the KEAP1-NRF2 oxidative-stress axis, removal of
  K63-linked ubiquitin from TRAF5/TRAF6 to restrain interleukin-17 signaling and inflammation,
  stabilization of TRAF3 and ERLIN1/2 in innate antiviral responses, and rescue of
  ERAD substrates by counteracting the HRD1 ubiquitin ligase. Its activity is regulated
  by sumoylation at Lys-99 (which impairs ubiquitin binding), by SMURF1-mediated K48
  ubiquitination targeting it for degradation, by SYK phosphorylation, and by its oligomeric
  state. A muscle-specific isoform (USP25m) is induced during myocyte differentiation
  and interacts with sarcomeric proteins (ACTA1, FLNC, MYBPC1). Heterozygous USP25
  variants cause idiopathic generalized epilepsy (EIG19).
