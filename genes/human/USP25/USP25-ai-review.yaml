core_functions:
- description: Cysteine-type deubiquitinase (peptidase C19 family; active-site Cys-178,
    EC 3.4.19.12) that hydrolyzes K48- and K63-linked polyubiquitin from substrate
    proteins, recognizing ubiquitin through N-terminal UBA-like and tandem UIM domains.
  molecular_function:
    id: GO:0004843
    label: cysteine-type deubiquitinase activity
  locations:
  - id: GO:0005737
    label: cytoplasm
  supported_by:
  - reference_id: file:human/USP25/USP25-uniprot.txt
    supporting_text: Deubiquitinating enzyme that hydrolyzes ubiquitin moieties conjugated
      to substrates
  - reference_id: PMID:37339955
    supporting_text: Here we report that USP25 deubiquitinates KEAP1 and prevents it
      from excessive ubiquitination and degradation.
- description: Substrate stabilization through deubiquitination, rescuing specific
    targets from proteasomal degradation to modulate signaling pathways including Wnt/beta-catenin
    (tankyrases TNKS1/2), the KEAP1-NRF2 oxidative-stress axis, IL-17/innate-immune
    signaling (TRAF5/TRAF6/TRAF3), and ERAD (counteracting HRD1).
  molecular_function:
    id: GO:0004843
    label: cysteine-type deubiquitinase activity
  locations:
  - id: GO:0005737
    label: cytoplasm
  supported_by:
  - reference_id: PMID:23042150
    supporting_text: USP25 interacted with TRAF5 and TRAF6, but not with TRAF3 in HBECs
      or MEFs after IL-17 stimulation
  - reference_id: PMID:22590560
    supporting_text: USP25 counteracts the ubiquitin ligase function of HRD1 by binding
      ubiquitinated species and cleaving them.
proposed_new_terms: []
suggested_questions:
- question: Is USP25's deubiquitinase activity directed to substrates by a shared recognition
    feature, or is substrate selection determined principally by context-specific scaffolds/adaptors
    in each pathway (Wnt, KEAP1-NRF2, IL-17, ERAD)?
- question: How does the homotetramer-to-homodimer transition (and its disruption by
    epilepsy-associated C-terminal truncations) couple oligomeric state to substrate-specific
    deubiquitination in neurons?
- question: Does the muscle-specific isoform USP25m have a distinct substrate repertoire
    (e.g. sarcomeric proteins MYBPC1/FLNC) compared with the ubiquitously expressed
    USP25a/b isoforms?
suggested_experiments:
- description: Proteome-wide ubiquitinome (diGly) profiling comparing wild-type, catalytic-dead
    (C178S) and epilepsy-variant USP25 to define the global substrate landscape and
    test substrate-specificity hypotheses.
- description: Reconstitute the oligomerization switch in vitro with defined homodimer
    versus homotetramer assemblies and measure deubiquitination kinetics on K48- versus
    K63-linked chains and on physiological substrates (KEAP1, TNKS2, TRAF6).
- description: Neuronal models (iPSC-derived neurons) carrying EIG19 gain-of-function
    variants to test whether increased deubiquitination raises neuronal excitability
    and to identify the responsible neuronal substrates.
