    summary: ComplexPortal-defined membership in the CUL4B-variant CRL4-DCAF10 complex (CPX-2819). CRL4 ligases assemble with either CUL4A or CUL4B, so a CUL4B-variant complex is plausible for DCAF10 as a DDB1-docking DCAF. Notably the cited paper (PMID:33898171) describes a CUL4A (not CUL4B) DCAF10 complex; the CUL4B assignment here rests on the general interchangeability of CUL4A/CUL4B rather than direct data for the B variant.
    action: KEEP_AS_NON_CORE
    reason: Plausible by analogy with CUL4A/CUL4B interchangeability and supported by ComplexPortal CPX-2819, but the cited study specifically demonstrates a CUL4A complex; retain as non-core given the absence of direct CUL4B-specific evidence.
