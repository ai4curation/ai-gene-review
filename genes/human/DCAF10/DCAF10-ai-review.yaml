  review:
    summary: Process annotation transferred by UniPathway mapping (UPA00143). DCAF10 is a non-catalytic substrate-recognition subunit; the ubiquitin-transfer chemistry is performed by the CRL4 complex. Although this specific annotation is inferred via pathway mapping (IEA), the underlying process (DCAF10 participation in substrate ubiquitination as a CRL4 substrate receptor) is now directly supported by primary biochemistry reported in the falcon deep-research synthesis (Kremer et al. 2026, Nat Commun PMID:41484149), in which reconstituted CUL4A-DDB1-DCAF10 directly ubiquitinated immunoprecipitated substrate proteins. This upgrades the involvement of DCAF10 in protein ubiquitination from a purely homology/pathway inference to a function with direct experimental backing, even though no single endogenous substrate has been broadly replicated.
    action: ACCEPT
    reason: DCAF10 is a CRL4 substrate-recognition subunit and its involvement in protein ubiquitination is now supported by direct in vitro evidence that a reconstituted CUL4A-DDB1-DCAF10 complex ubiquitinates substrate proteins (PMID:41484149, via falcon synthesis), in addition to the pathway-vocabulary (IEA) mapping; this is a core process for the gene.
