proposed_new_terms: []
suggested_questions:
- What endogenous substrate(s) does DCAF10 present to the CRL4 ligase, and is the proposed MCL1 substrate (from the OTUD1/ESCC study) reproducible in other cell types and under physiological conditions?
- Does DCAF10 assemble with both CUL4A and CUL4B in cells, or does it preferentially use one paralog?
- Are the N-terminal phosphorylation (S53/S63/S89/S92/S349) and R134 methylation sites functionally relevant to DCAF10 stability, DDB1 docking, or substrate selection?
suggested_experiments:
- Affinity purification-mass spectrometry of endogenous (or epitope-tagged) DCAF10 followed by ubiquitin-remnant (diGly) proteomics in DCAF10-knockout vs wild-type cells to identify bona fide substrates.
- Structural or mutational mapping of the DCAF10 WD40 surface and its WDxR/DWD motif to confirm and characterize DDB1 docking.
- Quantitative proteomics of MCL1 and AIF-pathway components in DCAF10-knockout cells across multiple lineages to test the proposed apoptosis-regulatory role independently of the original ESCC context.
