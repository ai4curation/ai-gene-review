taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: DCAF10 (DDB1- and CUL4-associated factor 10; also known as WD repeat-containing protein 32, WDR32) is a WD40-repeat protein predicted to fold into a beta-propeller. It is a member of the DCAF family of substrate-recognition receptors that dock onto the DDB1 adaptor of CRL4 (DDB1-CUL4-RBX1) cullin-RING E3 ubiquitin ligase complexes via a conserved WD40 surface. By analogy to other DCAFs, DCAF10 is thought to present specific substrates to the CRL4 ligase for ubiquitination, but it remains poorly characterized experimentally and no broadly validated endogenous substrate is established. Direct biochemical evidence supports its association with DDB1/CUL4, and it is defined as a component of CRL4-DCAF10 complexes (CUL4A and CUL4B variants). A single study in esophageal squamous cell carcinoma proposes that a CUL4A-DDB1-DCAF10 complex, stabilized by the deubiquitinase OTUD1, promotes degradation of the anti-apoptotic protein MCL1, but this substrate link has not been independently
  replicated. The N-terminal region is disordered and carries several phosphoserine and methylarginine sites identified in large-scale proteomics, with no functional characterization.
