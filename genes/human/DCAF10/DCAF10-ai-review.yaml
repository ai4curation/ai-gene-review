- id: file:human/DCAF10/DCAF10-deep-research-falcon.md
  title: Falcon deep research report for DCAF10
  findings:
  - statement: Synthesizes recent primary literature indicating DCAF10 acts as a substrate
      receptor of CRL4 (CUL4A/B-DDB1-RBX1) and, per Kremer et al. 2026, functions as
      an N-recognin recognizing N-terminally acetylated glycine (Ac-Gly) degrons,
      with reconstituted CUL4A-DDB1-DCAF10 directly ubiquitinating Src-family kinases
      (Lyn, Fyn, Src) in vitro.
    supporting_text: As a substrate receptor, DCAF10 recruits specific target proteins
      to the E3 ligase complex, facilitating their ubiquitination and subsequent proteasomal
      degradation
  reference_review:
    relevance: HIGH
    correctness: UNVERIFIED
    review_notes: LLM-synthesized deep-research report. The safe, well-supported framing
      it conveys is that DCAF10 is a WD40 beta-propeller substrate-recognition receptor
      of CRL4 (DDB1-CUL4) that docks DDB1 via WDxR motifs and contributes to substrate
      ubiquitination; this is consistent with the founding DCAF biochemistry (PMID:16949367)
      and is now reinforced by a primary paper defining DCAF10 as an N-recognin for
      N-terminally acetylated glycine (Ac-Gly) degrons (Kremer et al. 2026, Nat Commun,
      PMID:41484149, in vitro reconstitution + AlphaFold3). The specific substrate
      and pathway claims (Src-family kinases via the Ac-Gly/MO N-degron pathway;
      RUVBL1/2 in adenovirus E1A hijacking, Zemke et al. 2023, PMID:37962355; ALOX15B
      in KRAS-mutant PDAC, Li et al. 2025, PMID:40569151; high testis expression,
      Mistry et al. 2020, PMID:32867693) are each supported by single primary studies
      not yet independently replicated, and the underlying full texts are NOT in the
      local publications cache, so they have not been verified against source here and
      are treated as promising-but-provisional rather than established core functions.
      No specific substrate or pathway is attributed to DCAF10 in this review beyond
      what a primary paper directly demonstrates.
