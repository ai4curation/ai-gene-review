gene_symbol: DCAF10
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: DCAF10 (DDB1- and CUL4-associated factor 10; also known as WD repeat-containing protein 32, WDR32) is a WD40-repeat protein predicted to fold into a beta-propeller. It is a member of the DCAF family of substrate-recognition receptors that dock onto the DDB1 adaptor of CRL4 (DDB1-CUL4-RBX1) cullin-RING E3 ubiquitin ligase complexes via a conserved WD40 surface. By analogy to other DCAFs, DCAF10 presents substrates to the CRL4 ligase for ubiquitination. Direct biochemical evidence supports its association with DDB1/CUL4, and it is defined as a component of CRL4-DCAF10 complexes (CUL4A and CUL4B variants). A reconstituted CUL4A-DDB1-DCAF10 complex has been shown to directly ubiquitinate substrate proteins, and one study reports DCAF10 acting as an N-recognin that recognizes an N-terminally acetylated glycine (Ac-Gly) degron through a pocket in its WD40 beta-propeller, targeting Src-family kinases (Lyn, Fyn, Src) whose N-myristoylation is omitted; this proposed Ac-Gly N-degron activity awaits independent replication. Other single studies have proposed additional substrates and contexts, including a CUL4A-DDB1-DCAF10 complex stabilized by the deubiquitinase OTUD1 promoting degradation of the anti-apoptotic protein MCL1 in esophageal squamous cell carcinoma, degradation of RUVBL1/2 AAA+ ATPases when the complex is co-opted by adenovirus E1A, and degradation of the lipoxygenase ALOX15B in KRAS-mutant pancreatic cancer. Each of these substrate and pathway links rests on a single report and has not been independently
  replicated. DCAF10 is also notably enriched in testis at the transcript level, suggesting a possible specialized role in spermatogenesis that remains uncharacterized. The N-terminal region is disordered and carries several phosphoserine and methylarginine sites identified in large-scale proteomics, with no functional characterization.
