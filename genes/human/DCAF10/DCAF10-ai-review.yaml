    summary: Phylogenetic (IBA) inference of CRL4 complex membership from the PANTHER DCAF family tree. Consistent with the well-supported assignment of DCAF10 as a DDB1/CUL4-associated WD40 substrate receptor and with direct biochemical evidence (PMID:16949367). This represents the core cellular-component role of the gene.
