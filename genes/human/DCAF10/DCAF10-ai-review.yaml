core_functions:
- description: Substrate-recognition receptor subunit of CRL4 (DDB1-CUL4-RBX1) cullin-RING E3 ubiquitin ligase complexes; a WD40 beta-propeller protein that docks onto the DDB1 adaptor (via WDxR motifs) to present substrates for ubiquitination. Beyond the original homology-based assignment, a reconstituted CUL4A-DDB1-DCAF10 complex has now been shown to directly ubiquitinate substrate proteins, establishing DCAF10 as a functional substrate receptor rather than only a putative one.
  supported_by:
  - reference_id: PMID:16949367
    supporting_text: Here, we identify 18 Ddb1- and Cul4-associated factors (DCAFs), including 14 containing WD40 repeats. DCAFs interact with multiple surfaces on Ddb1, and the interaction of WD40-containing DCAFs with Ddb1 requires a conserved "WDXR" motif.
  - reference_id: file:human/DCAF10/DCAF10-uniprot.txt
    supporting_text: 'FUNCTION: May function as a substrate receptor for CUL4-DDB1 E3 ubiquitin-protein ligase complex.'
  - reference_id: file:human/DCAF10/DCAF10-deep-research-falcon.md
    supporting_text: As a substrate receptor, DCAF10 recruits specific target proteins
      to the E3 ligase complex, facilitating their ubiquitination and subsequent proteasomal
      degradation
proposed_new_terms:
- proposed_name: N-terminally-acetylated-glycine-degron-binding substrate-receptor activity
  proposed_definition: Binding to an N-terminal alpha-amino-acetylated glycine (Ac-Gly)
    residue of a substrate protein, recognizing it as a degradation signal (N-degron),
    so as to recruit the substrate to a cullin-RING E3 ubiquitin ligase (CRL4) for
    ubiquitination and subsequent proteasomal degradation; an N-recognin activity.
  justification: A primary study (Kremer et al. 2026, Nat Commun, PMID:41484149),
    synthesized in the falcon deep-research report, reports that DCAF10 recognizes
    an N-terminally acetylated glycine degron through a pocket in its WD40 beta-propeller
    and thereby directs substrate ubiquitination by reconstituted CUL4A-DDB1-DCAF10.
    No existing GO molecular-function term captures this specific Ac-Gly N-recognin
    activity. Proposed cautiously pending independent replication and verification
    against the primary full text (not in the local publications cache).
  supported_by:
  - reference_id: file:human/DCAF10/DCAF10-deep-research-falcon.md
    supporting_text: Recent breakthrough research by Kremer et al. (2026) identified
      DCAF10 as an N-recognin for proteins bearing N-terminally acetylated glycine
      (Ac-Gly) residues, particularly those that normally undergo N-myristoylation
suggested_questions:
- question: What endogenous substrate(s) does DCAF10 present to the CRL4 ligase, and is the proposed MCL1 substrate (from the OTUD1/ESCC study) reproducible in other cell types and under physiological conditions?
- question: Does DCAF10 assemble with both CUL4A and CUL4B in cells, or does it preferentially use one paralog?
- question: Are the N-terminal phosphorylation (S53/S63/S89/S92/S349) and R134 methylation sites functionally relevant to DCAF10 stability, DDB1 docking, or substrate selection?
- question: Is the proposed Ac-Gly/MO N-degron activity of DCAF10 (recognition of N-terminally acetylated glycine on myristoylation-omitted Src-family kinases; Kremer et al. 2026, PMID:41484149) reproducible by independent groups and physiologically operative in tissues with high DCAF10 expression such as testis, and does it warrant a dedicated GO molecular-function term?
suggested_experiments:
- description: Affinity purification-mass spectrometry of endogenous (or epitope-tagged) DCAF10 followed by ubiquitin-remnant (diGly) proteomics in DCAF10-knockout vs wild-type cells to identify bona fide substrates.
- description: Structural or mutational mapping of the DCAF10 WD40 surface and its WDxR/DWD motif to confirm and characterize DDB1 docking.
- description: Quantitative proteomics of MCL1 and AIF-pathway components in DCAF10-knockout cells across multiple lineages to test the proposed apoptosis-regulatory role independently of the original ESCC context.
