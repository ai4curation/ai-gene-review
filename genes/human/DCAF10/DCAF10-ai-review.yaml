- term:
    id: GO:0042981
    label: regulation of apoptotic process
  evidence_type: NAS
  original_reference_id: PMID:33898171
  qualifier: involved_in
  review:
    summary: Derived from a single study reporting that OTUD1 stabilizes DCAF10 and recruits a CUL4A-DDB1-DCAF10 complex to promote MCL1 degradation, thereby activating caspase-dependent apoptosis in esophageal squamous cell carcinoma. This is the only report proposing an apoptosis-related role and a specific substrate (MCL1), placing DCAF10 as a downstream/secondary player; it is not independently replicated.
    action: KEEP_AS_NON_CORE
    reason: A single, non-replicated cancer-context study links a DCAF10-containing CRL4 to MCL1 degradation and apoptosis; the role is plausible but context-specific and indirect, so it is retained as non-core rather than core or removed.
    supported_by:
    - reference_id: PMID:33898171
      supporting_text: OTUD1 stabilizes DDB1 and CUL4 associated factor 10 (DCAF10) and recruits the cullin 4A (CUL4A)-damage specific DNA binding protein 1 (DDB1) complex to promote myeloid cell leukemia sequence 1 (MCL1) degradation, thereby activating caspase-dependent apoptotic signaling.
