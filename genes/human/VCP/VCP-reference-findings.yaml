# VCP (P55072) Reference Findings for Gene Function Review
# Extracted from cached publications in publications/ directory

- id: PMID:26471729
  title: "A non-canonical role of the p97 complex in RIG-I antiviral signaling."
  findings:
    - statement: VCP/p97 with Npl4-Ufd1 cofactor negatively regulates RIG-I antiviral signaling by facilitating proteasomal degradation of RIG-I
      supporting_text: "we report a new role for p97 with Npl4-Ufd1 as its cofactor in reducing antiviral innate immune responses by facilitating proteasomal degradation of RIG-I"
      reference_section_type: ABSTRACT
      full_text_unavailable: false
    - statement: VCP/p97 directly binds non-ubiquitinated RIG-I and the E3 ligase RNF125, promoting K48-linked ubiquitination of RIG-I at K181
      supporting_text: "The p97 complex is able to directly bind both non-ubiquitinated RIG-I and the E3 ligase RNF125, promoting K48-linked ubiquitination of RIG-I at residue K181"
      reference_section_type: ABSTRACT
      full_text_unavailable: false
    - statement: VCP acts as an adaptor bridging substrate proteins with E3 ligase to facilitate ubiquitination, a non-canonical function beyond its classical segregase activity
      supporting_text: "our results suggest that the p97 complex may also act as an adaptor to bridge substrate proteins with E3 ligase and thus facilitate the ubiquitination process"
      reference_section_type: DISCUSSION
      full_text_unavailable: false
    - statement: Functional ATPase activity of VCP is required for regulation of RIG-I antiviral signaling
      supporting_text: "A structure-directed mutational study, as well as analyses using p97 inhibitors, revealed that an intact state of the p97 complex, with its ATPase activity being functional, is required for the regulation of RIG-I antiviral signaling"
      reference_section_type: DISCUSSION
      full_text_unavailable: false

- id: PMID:22120668
  title: "The AAA-ATPase VCP/p97 promotes 53BP1 recruitment by removing L3MBTL1 from DNA double-strand breaks."
  findings:
    - statement: VCP/p97 is recruited to DNA double-strand break sites via RNF8-mediated ubiquitylation, together with cofactor NPL4
      supporting_text: "RNF8-mediated ubiquitylation facilitates the recruitment of the AAA-ATPase valosin-containing protein (VCP, also known as p97) and its cofactor NPL4 to sites of double-strand breaks"
      reference_section_type: ABSTRACT
      full_text_unavailable: true
    - statement: VCP ATPase activity extracts L3MBTL1 from chromatin at DSB sites, unmasking H4K20me2 marks to enable 53BP1 recruitment
      supporting_text: "The ATPase activity of VCP promotes the release of the Polycomb protein L3MBTL1 from chromatin, which also binds the H4K20me2 histone mark, thereby facilitating 53BP1 recruitment"
      reference_section_type: ABSTRACT
      full_text_unavailable: true
    - statement: VCP orthologs and cofactors are essential for DNA damage resistance in C. elegans, demonstrating evolutionary conservation of VCP role in DNA repair
      supporting_text: "nematodes lacking the VCP orthologs CDC-48.1 or CDC-48.2, or cofactors UFD-1 or NPL-4, are highly sensitive to ionizing radiation"
      reference_section_type: ABSTRACT
      full_text_unavailable: true

- id: PMID:16186510
  title: "Recruitment of the p97 ATPase and ubiquitin ligases to the site of retrotranslocation at the endoplasmic reticulum membrane."
  findings:
    - statement: VCP/p97 is bound to the ER membrane through a complex containing Derlin-1 and VIMP, forming the core retrotranslocation machinery for ERAD
      supporting_text: "In higher eukaryotes, p97 is bound to the ER membrane by a membrane protein complex containing Derlin-1 and VCP-interacting membrane protein (VIMP)"
      reference_section_type: ABSTRACT
      full_text_unavailable: true
    - statement: VCP/p97 directly interacts with multiple ubiquitin ligases and facilitates their recruitment to Derlin-1 at the retrotranslocation site
      supporting_text: "p97 interacts directly with several ubiquitin ligases and facilitates their recruitment to Derlin-1"
      reference_section_type: ABSTRACT
      full_text_unavailable: true
    - statement: ERAD substrates first interact with Derlin-1 before VCP/p97 joins the retrotranslocation complex, establishing the sequential order of assembly
      supporting_text: "During retrotranslocation, a substrate first interacts with Derlin-1 before p97 and other factors join the complex"
      reference_section_type: ABSTRACT
      full_text_unavailable: true

- id: PMID:21822278
  title: "Endolysosomal sorting of ubiquitylated caveolin-1 is regulated by VCP and UBXD1 and impaired by VCP disease mutations."
  findings:
    - statement: VCP with cofactor UBXD1 forms a complex that targets mono-ubiquitylated caveolin-1 on endosomes for endolysosomal degradation
      supporting_text: "VCP-UBXD1 targets mono-ubiquitylated CAV1 in SDS-resistant high-molecular-weight complexes on endosomes, which are en route to degradation in endolysosomes"
      reference_section_type: ABSTRACT
      full_text_unavailable: false
    - statement: VCP extends its function beyond proteasomal degradation to mediate ubiquitin-dependent membrane sorting at endosomes and lysosomal degradation
      supporting_text: "VCP has well-established roles in facilitating proteasome-dependent degradation of polyubiquitinated proteins. Our results now link VCP and UBXD1 to ubiquitin-dependent membrane sorting at endosomes and degradation in lysosomes"
      reference_section_type: RESULTS
      full_text_unavailable: false
    - statement: VCP targets SDS-resistant caveolin-1 oligomers, using its segregase activity to disassemble stable protein assemblies for endolysosomal transport
      supporting_text: "VCP targets SDS-resistant Cav1 oligomers... one possible scenario is that VCP helps to segregate stable, SDS-resistant Cav1 assemblies to facilitate their transport to the lumen of endolysosomes"
      reference_section_type: RESULTS
      full_text_unavailable: false
    - statement: VCP disease mutations (IBMPFD) specifically disrupt interaction with UBXD1 and caveolin-1, while major cofactors p47 and Ufd1-Npl4 are unaffected
      supporting_text: "Cav1 bound VCP and this interaction was specifically compromised by the RH mutation... The interaction of the VCP mutant proteins with the major cofactors p47 and Ufd1-Npl4 was slightly increased"
      reference_section_type: RESULTS
      full_text_unavailable: false
    - statement: Chemical inhibition of VCP delays EGFR degradation after endocytosis, indicating a general role in endocytic cargo sorting
      supporting_text: "EGFR was endocytosed normally in control and DBeQ-treated cells... but then persisted longer in intracellular pools in DBeQ-treated compared to control-treated cells. The delayed degradation of EGFR was also confirmed by Western blot analysis"
      reference_section_type: RESULTS
      full_text_unavailable: false

- id: PMID:26565908
  title: "Pre-emptive Quality Control Protects the ER from Protein Overload via the Proximity of ERAD Components and SRP."
  findings:
    - statement: VCP/p97 contributes to degradation of pre-emptive ER quality control substrates that are rerouted from translocon to cytosol during ER stress
      supporting_text: "the cytosolic chaperone Bag6 and the AAA-ATPase p97 contribute to the degradation of ER pQC substrates"
      reference_section_type: ABSTRACT
      full_text_unavailable: true
    - statement: VCP participates in ER homeostasis maintenance through Derlin-mediated substrate-specific rerouting and effective degradation without need for ER translocation
      supporting_text: "Derlins-mediated substrate-specific rerouting and Bag6- and p97-mediated effective degradation contribute to the maintenance of ER homeostasis without the need for translocation"
      reference_section_type: ABSTRACT
      full_text_unavailable: true

- id: PMID:35013556
  title: "The ubiquitin-dependent ATPase p97 removes cytotoxic trapped PARP1 from chromatin."
  findings:
    - statement: VCP/p97 acts as a segregase to remove trapped PARP1 from chromatin following SUMOylation by PIAS4 and ubiquitylation by RNF4
      supporting_text: "PARP1 is SUMOylated by PIAS4 and subsequently ubiquitylated by the SUMO-targeted E3 ubiquitin ligase RNF4, events that promote recruitment of p97 and removal of trapped PARP1 from chromatin"
      reference_section_type: ABSTRACT
      full_text_unavailable: false
    - statement: VCP/p97 plays a key role in processing trapped PARP1, and its inhibition enhances PARP inhibitor cytotoxicity in HR-defective tumor cells
      supporting_text: "Small-molecule p97-complex inhibitors, including a metabolite of the clinically used drug disulfiram (CuET), prolonged PARP1 trapping and enhanced PARP inhibitor-induced cytotoxicity in homologous recombination-defective tumour cells"
      reference_section_type: ABSTRACT
      full_text_unavailable: false

- id: PMID:9452483
  title: "Involvement of valosin-containing protein, an ATPase Co-purified with IkappaBalpha and 26 S proteasome, in ubiquitin-proteasome-mediated degradation of IkappaBalpha."
  findings:
    - statement: VCP co-precipitates with IkappaBalpha and associates preferentially with ubiquitinated IkappaBalpha conjugates
      supporting_text: "The ubiquitinated IkappaBalpha conjugates readily associate with VCP both in vivo and in vitro, and this complex appears dissociated from NF-kappaB"
      reference_section_type: ABSTRACT
      full_text_unavailable: true
    - statement: VCP co-purifies with the 26S proteasome, providing a physical and functional link between ubiquitinated substrates and proteasomal degradation
      supporting_text: "VCP co-purifies with the 26 S proteasome on two-dimensional gels and co-immunoprecipitates with subunits of the 26 S proteasome. Our results suggest that VCP may provide a physical and functional link between IkappaBalpha and the 26 S proteasome"
      reference_section_type: ABSTRACT
      full_text_unavailable: true
    - statement: Phosphorylation and ubiquitination of IkappaBalpha are critical for VCP binding, which is necessary but not sufficient for IkappaBalpha degradation
      supporting_text: "Phosphorylation and ubiquitination of IkappaBalpha are critical for VCP binding, which in turn is necessary but not sufficient for IkappaBalpha degradation"
      reference_section_type: ABSTRACT
      full_text_unavailable: true

- id: PMID:25088257
  title: "Ubiquitin-specific protease 19 regulates the stability of the E3 ubiquitin ligase MARCH6."
  findings:
    - statement: VCP/p97 mediates proteasomal degradation of the ERAD-associated E3 ubiquitin ligase MARCH6, which can be opposed by USP19 deubiquitination
      supporting_text: "USP19 was found to protect MARCH6 by deubiquitination from the p97-dependent proteasomal degradation"
      reference_section_type: ABSTRACT
      full_text_unavailable: true

- id: PMID:26822609
  title: "2.3 A resolution cryo-EM structure of human p97 and mechanism of allosteric inhibition."
  findings:
    - statement: VCP/p97 is a hexameric AAA+ ATPase with N-terminal domain, two tandem ATPase domains (D1 and D2), and a short C-terminal domain
      supporting_text: "each p97 protomer has a predicted molecular weight of ~90 kDa and comprises an N-terminal domain (henceforth N domain), two tandem ATPase domains (designated D1 and D2) that pack as hexameric rings, and a short C-terminal domain"
      reference_section_type: RESULTS
      full_text_unavailable: false
    - statement: ATP binding to VCP/p97 causes a sequential two-step conformational change with D2 rotation relative to D1 followed by large upward displacement of the N-terminal domain
      supporting_text: "A large corkscrew-like change in molecular architecture, coupled with upward displacement of the N-terminal domain, is observed only when ATPgammaS is bound to both the D1 and D2 domains of the protomer"
      reference_section_type: ABSTRACT
      full_text_unavailable: false
    - statement: Allosteric inhibitors bind at the D1-D2 interface of VCP/p97, preventing nucleotide-driven conformational changes necessary for function
      supporting_text: "inhibitor binding at the interface between the D1 and D2 domains prevents propagation of the conformational changes necessary for p97 function"
      reference_section_type: ABSTRACT
      full_text_unavailable: false
    - statement: Most VCP/p97 effector proteins bind at the N domain, which undergoes a large ~75 degree rotation and ~14 angstrom displacement upon ATP binding
      supporting_text: "p97 mediates its function in the cell by interacting with a large array of effector proteins, most of which bind at the N domain, which undergoes a large movement with ATP binding"
      reference_section_type: RESULTS
      full_text_unavailable: false

- id: PMID:28689657
  title: "Wnt-Dependent Inactivation of the Groucho/TLE Co-repressor by the HECT E3 Ubiquitin Ligase Hyd/UBR5."
  findings:
    - statement: VCP/p97 is involved in the inactivation of ubiquitylated Groucho/TLE co-repressor downstream of Wnt signaling, acting on ubiquitylated chromatin proteins
      supporting_text: "Inactivation of TLE by UBR5-dependent ubiquitylation also involves VCP/p97, an AAA ATPase regulating the folding of various cellular substrates including ubiquitylated chromatin proteins"
      reference_section_type: ABSTRACT
      full_text_unavailable: true

- id: PMID:30120381
  title: "UBXD1 is a mitochondrial recruitment factor for p97/VCP and promotes mitophagy."
  findings:
    - statement: VCP/p97 is recruited to damaged mitochondria by the cofactor UBXD1 during Parkin-dependent mitophagy, accelerating autophagic degradation
      supporting_text: "Once translocated, UBXD1 recruits p97 to mitochondria via a bipartite binding motif consisting of its N-terminal VIM and PUB domains... formation of LC3-positive autolysosomes is strongly enhanced and autophagic degradation of mitochondria is significantly accelerated"
      reference_section_type: ABSTRACT
      full_text_unavailable: false
    - statement: UBXD1 translocates to depolarized mitochondria in a Parkin-dependent manner via its UBX domain, but not during Parkin-independent mitophagy
      supporting_text: "Recognizing depolarized mitochondria via its C-terminal UBX domain, UBXD1 translocates to mitochondria in a Parkin-dependent manner. During Parkin-independent mitophagy, UBXD1 shows no mitochondrial translocation"
      reference_section_type: ABSTRACT
      full_text_unavailable: false
    - statement: Mitochondria-localized UBXD1 is sufficient for p97 recruitment without additional mitochondrial signals
      supporting_text: "Recruitment of p97 by UBXD1 only depends on the presence of UBXD1 on mitochondria without the need for further mitochondrial signals"
      reference_section_type: ABSTRACT
      full_text_unavailable: false
    - statement: Diminished UBXD1 levels blunt mitophagic flux by at least 50% in Parkin-expressing cells after CCCP treatment
      supporting_text: "Diminished levels of UBXD1 negatively impact mitophagic flux in Parkin-expressing cells after CCCP treatment"
      reference_section_type: ABSTRACT
      full_text_unavailable: false

- id: PMID:33712450
  title: "The p97-UBXN1 complex regulates aggresome formation."
  findings:
    - statement: VCP/p97 mediates both aggresome formation and clearance of ubiquitylated proteins upon proteasome inhibition
      supporting_text: "We demonstrate that p97 mediates aggresome formation and clearance, and identify a novel role for the adaptor UBXN1 in the process of aggresome formation"
      reference_section_type: ABSTRACT
      full_text_unavailable: false
    - statement: The VCP/p97 adaptor UBXN1 is specifically required for aggresome formation; UBXN1-knockout cells cannot form aggresomes
      supporting_text: "UBXN1 is recruited to aggresomes, and UBXN1-knockout cells are unable to form aggresomes"
      reference_section_type: ABSTRACT
      full_text_unavailable: false
    - statement: Loss of VCP/p97-UBXN1 increases Huntingtin polyQ inclusion bodies in mammalian cells and C. elegans, demonstrating conserved roles in protein aggregate disposal
      supporting_text: "Loss of p97-UBXN1 results in increased Huntingtin polyQ inclusion bodies both in mammalian cells and in a C. elegans model of Huntington's disease"
      reference_section_type: ABSTRACT
      full_text_unavailable: false
    - statement: VCP/p97 is a ubiquitin-selective unfoldase that processes proteins for proteasomal or autophagic degradation, with specificity conferred by its 13-member UBX domain adaptor family
      supporting_text: "p97 is a ubiquitin-selective unfoldase that processes proteins for degradation by the 26S proteasome... The largest family of adaptors contains 13 members with conserved ubiquitin-X domains (UBXDs) that bind to the N-terminus of p97"
      reference_section_type: INTRODUCTION
      full_text_unavailable: false

- id: PMID:35273242
  title: "Valosin-containing protein-regulated endoplasmic reticulum stress causes NOD2-dependent inflammatory responses."
  findings:
    - statement: VCP is a novel interaction partner of NOD2, and this interaction is disrupted by disease-associated NOD2 mutations
      supporting_text: "Immunoprecipitation-coupled mass spectrometry unveiled the ATPase valosin-containing protein (VCP) as novel interaction partner of wildtype NOD2, while the binding to the NOD2 variant p.E54K was abrogated"
      reference_section_type: ABSTRACT
      full_text_unavailable: false
    - statement: VCP knockdown increases proinflammatory cytokine production during ER stress in a NOD2-dependent manner, linking VCP-regulated ERAD to inflammatory signaling
      supporting_text: "tunicamycin-induced ER stress resulted in increased IL8, CXCL1, and CXCL2 production in cells with knockdown of VCP, while enhanced expression of these proinflammatory molecules was abolished upon knockout of NOD2"
      reference_section_type: ABSTRACT
      full_text_unavailable: false

- id: PMID:38710747
  title: "The AAA-ATPase Ter94 regulates wing size in Drosophila by suppressing the Hippo pathway."
  findings:
    - statement: Human VCP can functionally substitute for Drosophila Ter94 in regulating wing size, demonstrating deep evolutionary conservation of VCP function
      supporting_text: "hVCP, the human homolog of Ter94, is able to substitute for Ter94 in modulating Drosophila wing size, underscoring their functional conservation"
      reference_section_type: ABSTRACT
      full_text_unavailable: false
    - statement: VCP/Ter94 binds Merlin (NF2 ortholog) and disrupts the Ex-Mer-Kib complex to suppress Hippo pathway signaling in an ATPase-dependent manner
      supporting_text: "Ter94 reciprocally binds to Mer, a critical upstream component of the Hippo pathway, and disrupts its interaction with Ex and Kib. This disruption prevents the formation of the Ex-Mer-Kib complex, ultimately leading to the inactivation of the Hippo pathway"
      reference_section_type: ABSTRACT
      full_text_unavailable: false
    - statement: Cytoplasmic VCP, not nuclear VCP, is important for regulating the Hippo pathway
      supporting_text: "NES-hVCP successfully restored the small wings caused by ter94 knockdown, whereas NLS-hVCP did not, indicating that cytoplasmic Ter94 is important for regulating wing size"
      reference_section_type: RESULTS
      full_text_unavailable: false

