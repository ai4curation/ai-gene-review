- term:
    id: GO:1990381
    label: ubiquitin-specific protease binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000107
  review:
    summary: >-
      VCP interacts with deubiquitinating enzymes including YOD1 and ATXN3 (both are
