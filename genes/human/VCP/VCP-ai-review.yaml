    summary: Direct evidence supports VCP in ER-to-cytosol retrotranslocation.
    action: ACCEPT
    reason: This is the mechanistic step of ERAD in which VCP/p97 is most directly
      implicated and is a core PN-supported role for the gene.
    supported_by:
    - reference_id: PMID:15215856
      supporting_text: This process requires recognition of a substrate in the ER
        lumen and its subsequent movement through the membrane by the cytosolic
        p97 ATPase.
    - reference_id: PMID:25660456
      supporting_text: RNAi revealed that 12 out of 21 ERAD components examined
        are required for efficient dislocation of NHK among which Hrd1, Sel1L, GRP94
        and p97/VCP are critically required.
