core_functions:
- description: ATP-driven segregase function that unfolds or remodels client proteins
    during ER-associated degradation, especially in the NPLOC4-UFD1-VCP complex.
  molecular_function:
    id: GO:0016887
    label: ATP hydrolysis activity
  directly_involved_in:
  - id: GO:0043335
    label: protein unfolding
  - id: GO:0036503
    label: ERAD pathway
  - id: GO:0030970
    label: retrograde protein transport, ER to cytosol
  locations:
  - id: GO:0005829
    label: cytosol
  - id: GO:0005789
    label: endoplasmic reticulum membrane
  in_complex:
    id: GO:0034098
    label: VCP-NPL4-UFD1 AAA ATPase complex
  supported_by:
  - reference_id: file:human/VCP/VCP-uniprot.txt
    supporting_text: The ternary complex containing UFD1, VCP and NPLOC4 binds
      ubiquitinated proteins and is necessary for the export of misfolded proteins
      from the ER to the cytoplasm, where they are degraded by the proteasome.
  - reference_id: PMID:15215856
    supporting_text: This process requires recognition of a substrate in the ER
      lumen and its subsequent movement through the membrane by the cytosolic p97
      ATPase.
  - reference_id: PMID:33058883
    supporting_text: binds and engages the direct target I3 in the central pore
      of p97 for unfolding
