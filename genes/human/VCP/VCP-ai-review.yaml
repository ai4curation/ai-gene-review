id: P55072
gene_symbol: VCP
product_type: PROTEIN
status: IN_PROGRESS
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: VCP encodes a hexameric AAA ATPase that uses ATP hydrolysis to extract
  or remodel ubiquitylated client proteins from membranes and protein assemblies.
  The strongest PN-supported core role is ATP-dependent substrate extraction in ER-associated
  degradation and related ubiquitin-dependent protein quality-control pathways. Autophagosome
  maturation and early autophagy initiation are literature-supported contextual roles,
  but they are better treated as branch-specific deployments than as the core conserved
  function of the gene, and the reviewed evidence here does not support treating VCP
  as an autophagy cargo adaptor.
