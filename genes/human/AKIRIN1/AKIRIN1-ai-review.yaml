  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: involved_in
  review:
    summary: This is a family/orthology-derived motility call that is not supported for human AKIRIN1.
    action: MARK_AS_OVER_ANNOTATED
    reason: The conserved human AKIRIN1 literature supports a nuclear transcriptional
      cofactor role, not direct actin-remodeling or lamellipodium biology. In the same
      paper, Akirin1 knockout mice were viable and showed no gross developmental
      abnormalities, which argues against promoting a specific cell-motility process
      for the human paralog on the basis of family-level transfer alone.
    supported_by:
