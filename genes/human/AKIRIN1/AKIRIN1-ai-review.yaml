id: Q9H9L7
gene_symbol: AKIRIN1
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >
  AKIRIN1 encodes a conserved nuclear Akirin-family protein that functions as a
  transcriptional cofactor in inducible gene-expression programs and as a
  promyogenic regulator supporting myoblast and satellite-cell proliferation and
  differentiation. The protein localizes to the nucleus and nucleoplasm and is not
  an enzyme; its core role is to help regulate transcription in chromatin-associated
  nuclear contexts rather than to catalyze a biochemical reaction.
