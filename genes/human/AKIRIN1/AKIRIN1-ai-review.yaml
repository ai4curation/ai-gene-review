  qualifier: involved_in
  review:
    summary: This captures the best-supported conserved biological process for AKIRIN1.
    action: ACCEPT
    reason: AKIRIN1 is best understood as a nuclear cofactor that supports inducible
      transcriptional output. The canonical Akirin paper places the protein downstream
      of NF-kappaB-dependent gene expression and describes Akirins as nuclear cofactors
      regulating transcriptional activities of main transactivators, which fits this
      GO term well.
    supported_by:
