  review:
    summary: Chromatin association is plausible and consistent with the nuclear cofactor role.
    action: ACCEPT
    reason: The 2008 paper argues that Akirins likely act by associating with chromatin
      or the transcriptional engine, and the conserved nuclear localization supports a
      chromatin-associated transcriptional role. This is not over-specific for the
      available evidence.
