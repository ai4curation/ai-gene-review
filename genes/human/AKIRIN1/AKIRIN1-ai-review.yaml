suggested_questions:
- question: Is there any direct human evidence that AKIRIN1 binds the proteasome or a proteasome-adaptor complex, given that PMID:34711951 supports AKIRIN2 proteasome import and UniProt explicitly contrasts AKIRIN1 with that activity?
- question: Do the muscle and motility annotations belong to AKIRIN1 specifically, or are they better treated as family/paralog transfer that should remain out of the human review?
suggested_experiments:
- description: Test AKIRIN1 proximity to proteasome subunits and adaptor/shuttle proteins in human cells by co-IP or proximity labeling under basal and stimulated conditions.
- description: Deplete or edit AKIRIN1 in a human cell model and measure NF-kappaB-dependent transcription plus chromatin association at inducible target loci.
