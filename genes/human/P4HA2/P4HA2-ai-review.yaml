suggested_questions:
- question: Do the type I (P4HA1) and type II (P4HA2) collagen prolyl 4-hydroxylases have distinct procollagen substrate or tissue preferences that explain why P4HA2 deficiency manifests primarily as scleral/ocular (high myopia) rather than systemic connective-tissue disease?
- question: Does the high-throughput KIF7 interaction reflect a genuine extra-catalytic role for P4HA2, or is it an incidental interactome capture?
suggested_experiments:
- description: Reconstitute the recombinant (alpha-II)2-beta2 tetramer and measure steady-state kinetics on defined procollagen peptide substrates, comparing P4HA2 with P4HA1 to define isoenzyme-specific substrate preferences.
- description: Knock out or knock down P4HA2 in scleral fibroblasts and quantify collagen 4-hydroxyproline content, triple-helix thermal stability and ECM deposition to test the mechanistic link to high myopia.
- description: Express the MYP25 variants (e.g. E291K) and assay protein abundance, tetramer assembly with P4HB, and residual dioxygenase activity to clarify the loss-of-function mechanism.
