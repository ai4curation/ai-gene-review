- id: PMID:38654109
  title: P4HA2 activates mTOR via hydroxylation and targeting P4HA2-mTOR inhibits lung adenocarcinoma cell growth.
  findings: []
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: 'PubMed-verified (Jin et al., Oncogene 2024). Reports a non-canonical, non-collagen substrate for P4HA2: it binds mTOR directly and hydroxylates the conserved Pro2341 in the mTOR kinase domain, activating mTOR kinase, increasing mTOR stability/substrate recognition and downstream S6K/AKT signaling; a non-hydroxylatable mTOR P2341A mutant reduces lung adenocarcinoma growth. Suggests a cytoplasmic/extra-ER signaling role distinct from the canonical ER-lumenal collagen-hydroxylase function. Notable new mechanism not in the prior review; not elevated to a core annotation here pending independent confirmation.'
- id: PMID:38909089
  title: P4HA2 hydroxylates SUFU to regulate the paracrine Hedgehog signaling and promote B-cell lymphoma progression.
  findings: []
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: 'PubMed-verified (Li et al., Leukemia 2024). Reports a second non-canonical P4HA2 substrate: upon Hedgehog activation P4HA2 forms a complex with KIF7, relocalizes to the primary cilium tip, and hydroxylates SUFU, inhibiting SUFU and amplifying Hedgehog signaling; P4HA2 loss impedes B-cell lymphoma progression. Provides a biological rationale for the otherwise-uninformative high-throughput P4HA2-KIF7 interactome captures (PMID:33961781, PMID:35271311, PMID:40205054). New mechanism not in the prior review; non-core pending independent confirmation.'
- id: PMID:32969070
  title: Prolyl and lysyl hydroxylases in collagen synthesis.
  findings: []
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: 'PubMed-verified authoritative review (Salo & Myllyharju, Exp Dermatol 2021). Comprehensive review of collagen prolyl 4-hydroxylases (including P4HA1/2/3), 3-hydroxylases and lysyl hydroxylases, covering enzymology, the alpha2-beta2/PDI tetramer, ER localization, biological function and disease. Supports the core enzymatic/complex/localization framing of P4HA2; also notes no collagen-hydroxylase inhibitor is yet in clinical use (in contrast to HIF-PHD inhibitors).'
- id: PMID:9211872
  title: Cloning of the human prolyl 4-hydroxylase alpha subunit isoform alpha(II) and characterization of the type II enzyme tetramer. The alpha(I) and alpha(II) subunits do not form a mixed alpha(I)alpha(II)beta2 tetramer.
