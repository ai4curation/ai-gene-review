gene_symbol: P4HA2
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  P4HA2 (prolyl 4-hydroxylase subunit alpha-2) is one of three catalytic
  alpha-subunit isoforms of collagen prolyl 4-hydroxylase (C-P4H), an
  endoplasmic reticulum-lumenal enzyme. The active enzyme is an alpha2-beta2
  heterotetramer in which the beta subunit is P4HB (protein disulfide
  isomerase, PDI) acting as a structural and ER-retention subunit; the two
  alpha-2 chains carry the catalytic sites. As a 2-oxoglutarate- and
  Fe(II)-dependent dioxygenase, P4HA2 catalyzes the post-translational
  formation of trans-4-hydroxy-L-proline in -Xaa-Pro-Gly- sequences of
  procollagen (and other proteins), consuming 2-oxoglutarate and O2 and
  producing succinate and CO2. 4-Hydroxyproline is essential for the folding
  and thermal stability of the collagen triple helix. The active-site iron is
  coordinated by a 2-His-1-carboxylate facial triad, and L-ascorbate (vitamin
  C) is required as a cofactor to maintain the iron in the reduced Fe(II)
  state. The type II tetramer contributes a substantial fraction of total
  prolyl 4-hydroxylase activity in human cells, is expressed in heart,
  placenta, lung and pancreas, and does not co-assemble with the type I
  (P4HA1) alpha subunit into mixed tetramers. Variants in P4HA2 cause autosomal
  dominant nonsyndromic high myopia (MYP25), consistent with a role in scleral
  collagen and extracellular matrix.
