proposed_new_terms:
- proposed_name: peptidyl-proline 4-hydroxylation to 4-hydroxy-L-proline
  reason: No biological-process annotation is currently present in GOA. The core activity of P4HA2 directly accomplishes peptidyl-proline 4-hydroxylation as part of collagen biosynthesis; existing terms GO:0019471 (peptidyl-proline hydroxylation), GO:0018401 (peptidyl-proline hydroxylation to 4-hydroxy-L-proline) and GO:0032964 (collagen biosynthetic process) would appropriately capture the biological process and should be added rather than newly coined.
  supported_by:
  - reference_id: file:human/P4HA2/P4HA2-uniprot.txt
    supporting_text: Catalyzes the post-translational formation of 4-hydroxyproline in -Xaa-Pro-Gly- sequences in collagens and other proteins.
