    label: electron transfer activity
  evidence_type: TAS
  original_reference_id: PMID:8758134
  qualifier: enables
  review:
    summary: >-
      Incorrect molecular function. GO:0009055 electron transfer activity is for
      electron-carrier proteins of electron transport systems; PHGDH is a
      hydride-transferring NAD+-dependent dehydrogenase, not an electron carrier.
      The cited paper (Jaeken 1996) is a clinical description of 3-PGDH
      deficiency and does not support an electron transfer function. This is a
      legacy mis-mapping; over-annotation.
    action: MARK_AS_OVER_ANNOTATED
