    summary: >-
      Direct experimental support for the core molecular function in human
      PHGDH. Eade et al. assayed enzymatic activity of PHGDH variants using
      3-phosphoglycerate as substrate and NAD+ reduction as readout, showing
      that pathogenic missense variants reduce phosphoglycerate dehydrogenase
      activity (IMP by loss-of-function). Accept as a core-function annotation.
    action: ACCEPT
