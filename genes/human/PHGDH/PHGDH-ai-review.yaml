- term:
    id: GO:0007420
    label: brain development
  evidence_type: TAS
  original_reference_id: PMID:8758134
  qualifier: involved_in
  review:
    summary: >-
      Downstream phenotypic consequence rather than a direct molecular role.
      Serine deficiency from 3-PGDH loss causes microcephaly and dysmyelination,
      reflecting serine's importance in the developing brain, but PHGDH's causal
      contribution is via serine biosynthesis, not a dedicated developmental
      function. Retain as non-core (pleiotropic/developmental).
    action: KEEP_AS_NON_CORE
    supported_by:
