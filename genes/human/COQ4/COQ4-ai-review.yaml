  - reference_id: PMID:38295803
    supporting_text: "COQ4 displays oxidative decarboxylation activity in the non-CoQ producer"
  - reference_id: file:human/COQ4/COQ4-uniprot.txt
    supporting_text: "Lyase that catalyzes the C1-decarboxylation of 4-hydroxy-3-"
- description: >-
    Binds a catalytic Zn2+ ion, coordinated by a conserved His/Asp/His/Glu motif
    (residues 163, 164, 167, 179), that is essential for COQ4's decarboxylase
    activity and for its ability to promote ubiquinone formation.
  molecular_function:
    id: GO:0008270
