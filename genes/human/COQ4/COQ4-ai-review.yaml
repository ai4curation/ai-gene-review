core_functions:
- description: >-
    Zinc-dependent C1 decarboxylase of the coenzyme Q head-group modification
    pathway. As a subunit of the mitochondrial CoQ biosynthetic complex (COQ
    synthome / metabolon), COQ4 catalyzes the decarboxylation of a 4-hydroxy-3-
    methoxy-5-(polyprenyl)benzoate intermediate to the corresponding
    2-methoxy-6-(polyprenyl)phenol with release of CO2, a step required for CoQ10
    biosynthesis. The activity requires a bound Zn2+ ion.
  molecular_function:
