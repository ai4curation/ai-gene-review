id: Q9Y3A0
gene_symbol: COQ4
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  COQ4 is a mitochondrial protein that functions in the biosynthesis of coenzyme Q
  (ubiquinone, CoQ10 in humans), a lipid-soluble redox cofactor of the respiratory
  chain. It is a subunit of the multi-protein CoQ biosynthetic complex (the COQ
  "synthome" or metabolon), assembled with COQ3, COQ5, COQ6, COQ7 and COQ9 on the
  matrix face of the inner mitochondrial membrane. COQ4 has a dual character: it is
  required for the integrity and assembly of the complex (a long-recognized
  structural/organizing role), and it is itself a zinc-dependent enzyme that
  catalyzes the C1 decarboxylation step of the CoQ head-group modification pathway
  (4-hydroxy-3-methoxy-5-polyprenylbenzoate decarboxylase; EC 4.1.1.130), converting
  a polyprenyl-benzoate precursor to a polyprenyl-phenol with release of CO2. A
  bound Zn2+ ion, coordinated by a conserved His/Asp/Glu motif, is essential for this
  activity. Loss of COQ4 function reduces CoQ10 synthesis and causes autosomal
  recessive primary coenzyme Q10 deficiency-7 (encephalopathy, cardiomyopathy,
  Leigh syndrome) and a spastic-ataxia/hereditary spastic paraplegia spectrum
  disorder.
