suggested_questions:
- question: >-
    Does human COQ4 catalyze only C1 decarboxylation, or also a coupled C1
    hydroxylation? PMID:38295803 proposes a single oxidative decarboxylation
    (decarboxylation + hydroxylation), whereas PMID:38425362 assigns C1 hydroxylation
    to COQ6; resolving this would refine the molecular-function annotation.
suggested_experiments:
- description: >-
    Determine a structure of the human COQ4 (or COQ synthome subcomplex) with bound
    Zn2+ and a polyprenyl-benzoate substrate analog to define the decarboxylase
    active site and the basis of substrate presentation within the metabolon.
- description: >-
    Reconstitute COQ4 metal-site point mutants (e.g. the His/Asp motif) in COQ4-null
    human cells and quantify CoQ10 and pathway intermediates to separate the
    catalytic contribution from the structural/assembly contribution of COQ4.
