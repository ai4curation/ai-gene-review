- term:
    id: GO:0006707
    label: cholesterol catabolic process
  evidence_type: IDA
  original_reference_id: PMID:7508385
  qualifier: involved_in
  review:
    summary: >-
      Bile acid biosynthesis is the major route of cholesterol catabolism, so
      AKR1D1 is generically associated with cholesterol catabolism. However AKR1D1
      does not act on cholesterol itself; it reduces 3-oxo-Delta4 ring
      intermediates several steps downstream.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      Indirect/downstream framing. AKR1D1's direct substrates are 3-oxo-Delta4
      steroid intermediates, not cholesterol. Bile acid biosynthetic process
      (GO:0006699) is the precise term for its role.
    supported_by:
    - reference_id: PMID:7508385
      supporting_text: >-
        more important for bile acid biosynthesis than for metabolism
- term:
    id: GO:0007586
    label: digestion
  evidence_type: IDA
  original_reference_id: PMID:7508385
  qualifier: involved_in
  review:
    summary: >-
      Bile acids produced downstream of AKR1D1 aid dietary lipid digestion, so the
      enzyme is indirectly linked to digestion. This is a distal physiological
      consequence, not a direct function of AKR1D1.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      Too indirect. AKR1D1 acts in hepatic bile acid biosynthesis; digestion is a
      downstream consequence of bile acids, not an activity of the enzyme.
    supported_by:
    - reference_id: PMID:7508385
      supporting_text: >-
        more important for bile acid biosynthesis than for metabolism
