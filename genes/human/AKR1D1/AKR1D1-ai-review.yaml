  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: enables
  review:
    summary: >-
      Family-level phylogenetic (IBA) molecular-function call inherited from the
      aldo-keto reductase (AKR1) family. AKR1D1 is a steroid 5-beta-reductase,
      not an aldose reductase; it shares only ~50% sequence identity with human
      aldose reductase and does not have aldose reductase as its physiological
      function.
    action: MODIFY
    reason: >-
      This is an over-general family term. The informative, experimentally
      supported molecular function of AKR1D1 is Delta4-3-oxosteroid
      5beta-reductase activity (GO:0047787, EC 1.3.1.3). The IBA correctly places
      the protein in the AKR family but the specific activity should be used.
