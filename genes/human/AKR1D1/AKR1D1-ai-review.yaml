core_functions:
- description: >-
    NADPH-dependent Delta4-3-oxosteroid 5beta-reductase (EC 1.3.1.3) that reduces
    the C4-C5 double bond of 3-oxo-Delta4 steroids to the 5-beta configuration,
    forming the cis-fused A/B ring junction. In bile acid biosynthesis it reduces
    7alpha-hydroxy- and 7alpha,12alpha-dihydroxy-4-cholesten-3-one to their
    5beta-cholestan-3-one products.
