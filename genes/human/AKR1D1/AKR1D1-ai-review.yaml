- term:
    id: GO:0006699
    label: bile acid biosynthetic process
  evidence_type: IDA
  original_reference_id: PMID:7508385
  qualifier: involved_in
  review:
    summary: >-
      Direct experimental demonstration that the expressed human enzyme has high
      5-beta-reductase activity toward the bile acid intermediates
      7alpha-hydroxy- and 7alpha,12alpha-dihydroxy-4-cholesten-3-one, and is more
      important for bile acid biosynthesis than for steroid hormone metabolism.
      This is the core process.
    action: ACCEPT
    reason: >-
      Directly demonstrated core biological process; the expressed enzyme reduces
      the key bile acid biosynthetic intermediates.
    supported_by:
    - reference_id: PMID:7508385
      supporting_text: >-
