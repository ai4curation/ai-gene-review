id: P51857
gene_symbol: AKR1D1
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  AKR1D1 (steroid 5-beta-reductase; 3-oxo-5-beta-steroid 4-dehydrogenase;
  Delta(4)-3-oxosteroid 5-beta-reductase; gene synonym SRD5B1) is a cytosolic
  aldo-keto reductase (EC 1.3.1.3) that catalyzes the NADPH-dependent
  stereospecific reduction of the C4-C5 (Delta4) double bond of 3-oxo-Delta4
  steroids to the 5-beta configuration. This reduction creates the cis-fused
  (5-beta) A/B ring junction that is characteristic of bile acids. In bile-acid
  biosynthesis AKR1D1 reduces the CYP7A1/CYP8B1 pathway intermediates
  7-alpha-hydroxy-4-cholesten-3-one and 7-alpha,12-alpha-dihydroxy-4-cholesten-3-one
  to their 5-beta-cholestan-3-one products, an obligatory step in the conversion
  of cholesterol into the primary bile acids cholic acid and chenodeoxycholic
  acid. The enzyme also 5-beta-reduces a broad range of C18-C27 3-oxo-Delta4
  steroid hormones (including testosterone, progesterone, androstenedione,
  cortisol, cortisone, corticosterone and aldosterone), contributing to steroid
  hormone catabolism. AKR1D1 is highly expressed in liver. Loss-of-function
  variants cause congenital bile acid synthesis defect type 2 (CBAS2; AKR1D1
  deficiency), a neonatal cholestatic liver disease with jaundice and hepatic
  failure.
