description: 'TPH1 (tryptophan 5-hydroxylase 1, also called tryptophan 5-monooxygenase 1; EC 1.14.16.4)
  is a tetrahydrobiopterin (BH4)- and non-heme Fe(II)-dependent aromatic amino acid monooxygenase that
  catalyzes the first and rate-limiting step of serotonin (5-hydroxytryptamine) biosynthesis: the hydroxylation
  of L-tryptophan to 5-hydroxy-L-tryptophan (5-HTP) using molecular oxygen, with BH4 as the reducing cosubstrate.
  It is a soluble, cytosolic homotetramer built from an N-terminal regulatory ACT domain and a C-terminal
  catalytic domain that binds ferrous iron and pterin, and belongs to the biopterin-dependent aromatic
  amino acid hydroxylase family together with phenylalanine hydroxylase (PAH) and tyrosine hydroxylase
  (TH). TPH1 is the peripheral, non-neuronal paralog of the two vertebrate tryptophan hydroxylases (the
  other being neuronal TPH2): it is expressed predominantly in gut enterochromaffin cells, the pineal
  gland, skin, and mast cells, where it produces the serotonin that acts outside the central nervous system
  and supplies the substrate for pineal melatonin synthesis. Peripheral, gut-derived serotonin made by
  TPH1 is taken up and stored by platelets and released on platelet activation, linking TPH1 to hemostasis
  and a range of peripheral serotonergic physiology. Its activity is regulated by phosphorylation and
  by ubiquitin-dependent proteasomal degradation.'
