- term:
    id: GO:0008047
    label: enzyme activator activity
  evidence_type: IMP
  original_reference_id: PMID:22467853
  qualifier: enables
  review:
    summary: >-
      IMP-based molecular function asserting that DAD1 activates the OST enzyme. DAD1 is
      a non-catalytic structural subunit that is required for OST assembly/stability and
      hence for maximal enzyme activity; it does not act as a classical enzyme activator
      (allosteric or covalent stimulator) that binds and switches on a separate enzyme.
      The better model is a non-catalytic subunit contributing to the OST catalytic
      activity via complex integrity. This experimental annotation is not removed, but
      its MF is an over-interpretation; mark as over-annotated (the core MF contribution
      is modeled in core_functions via contributes_to_molecular_function).
    action: MARK_AS_OVER_ANNOTATED
    supported_by:
