gene_symbol: DAD1
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  DAD1 (defender against cell death 1) is a small (113 aa), hydrophobic, multi-pass
  endoplasmic reticulum (ER) membrane protein that is a non-catalytic core subunit of
  the oligosaccharyltransferase (OST) complex. OST catalyzes the first committed step of
  protein N-linked glycosylation: the en-bloc transfer of the pre-assembled
  Glc3Man9GlcNAc2 oligosaccharide from the dolichyl-pyrophosphate lipid carrier onto
  asparagine residues within Asn-X-Ser/Thr sequons of nascent polypeptides. DAD1 is a
  common core subunit shared by both mammalian OST forms — the cotranslational STT3A
  complex (OST-A) and the post-translocational STT3B complex (OST-B) — and is required
  for the assembly and stability of both. It has no independent catalytic activity;
  rather, it contributes structurally to the integrity of the holo-enzyme, and its loss
  destabilizes OST and abolishes N-glycosylation. Because N-glycosylation is essential
  for the folding, quality control, and surface delivery of secretory and membrane
  proteins, depletion of DAD1 produces global hypoglycosylation and, historically, was
  first identified through the apoptotic phenotype that follows loss of the protein,
  which is the origin of its "defender against cell death" name.
