- id: PMID:10085068
  title: Cloning and characterization of a mammalian prenyl protein-specific protease.
  findings:
  - statement: Cloned human RCE1 (hRCE1); recombinant enzyme is a prenyl-protein-specific protease
      that removes the C-terminal -AAX tripeptide from farnesylated and geranylgeranylated CAAX
      proteins (K-Ras, N-Ras, H-Ras, Ggamma1, geranylgeranyl-Rap1b) and is expressed in all tissues
      examined.
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Foundational RCE1 characterization paper; PubMed-verified. Establishes the CAAX-processing
      protease function, prenyl-substrate specificity, and substrate range. Abstract-only in the
      cache (full_text_available: false); experimental IDA annotations derive from the full text read
      by the curator.
- id: PMID:19188362
  title: USP17 regulates Ras activation and cell proliferation by blocking RCE1 activity.
  findings:
  - statement: RCE1 cleaves the Ras CAAX motif; its catalytic activity is required for Ras membrane
      localization/activation and downstream MEK/ERK signaling. RCE1 and USP17 co-localize at the ER,
      and USP17-mediated deubiquitination abolishes RCE1 catalytic activity.
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified. Supports RCE1 endopeptidase activity, ER-membrane localization, the
      CAAX/Ras-processing role, and ubiquitination-dependent activity regulation. Abstract-only in the
      cache; IDA/IMP annotations derive from the full text.
- id: PMID:19946888
  title: Defining the membrane proteome of NK cells.
  findings:
  - statement: Large-scale mass-spectrometry membrane-proteome survey of the NK-like YTS cell line;
      RCE1 was among the 1843 identified proteins, supporting a generic membrane localization.
  reference_review:
    relevance: LOW
    correctness: VERIFIED
    review_notes: >-
      High-throughput proteomics dataset (HDA). Provides only a generic membrane-localization
      datapoint, uninformative relative to the specific ER-membrane annotations.
