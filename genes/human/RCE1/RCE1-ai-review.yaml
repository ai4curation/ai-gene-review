suggested_questions:
- question: Should GO provide a specific, non-obsolete molecular-function term for prenyl-dependent
    CAAX endopeptidase / glutamate-type intramembrane protease activity? The historically used
    specific terms (GO:0008319 prenyl protein specific endopeptidase activity; GO:0008487
    prenyl-dependent CAAX protease activity; GO:0070007 glutamic-type endopeptidase activity) are all
    obsolete, leaving only the family-level GO:0070002 glutamic-type peptidase activity.
  experts:
  - GO molecular-function / protease ontology editors
  - MEROPS curators
- question: Should the metalloendopeptidase (GO:0004222) and cysteine-type endopeptidase (GO:0004197)
    annotations on RCE1 be corrected across GOA/InterPro/Reactome to reflect its glutamate-type
    mechanism?
  experts:
  - GOA/InterPro curators
  - Reactome curators
suggested_experiments:
- description: Reconstitute purified recombinant human RCE1 in defined membranes/liposomes and
    measure -AAX-tripeptide cleavage of a panel of farnesylated vs geranylgeranylated CAAX peptides to
    quantify substrate preference and confirm endoproteolytic (not exopeptidase) cleavage by mapping
    the exact scissile bond via mass spectrometry.
- description: Perform structure-guided alanine mutagenesis of the predicted catalytic glutamate and
    histidine residues (human equivalents of the U48 active-site residues) to confirm the
    glutamate-type mechanism and rule out metal or cysteine catalysis (e.g. metal-chelation and
    cysteine-alkylation sensitivity assays).
