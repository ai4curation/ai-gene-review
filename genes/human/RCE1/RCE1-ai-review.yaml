gene_symbol: RCE1
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  RCE1 (Ras-converting CAAX endopeptidase 1; CAAX prenyl protease 2 / FACE-2; prenyl
  protein-specific endoprotease) is a polytopic endoplasmic-reticulum membrane protease that
  catalyzes the second of the three sequential CAAX post-translational processing steps. After a
  CAAX-motif protein is prenylated on its C-terminal cysteine (farnesylation or geranylgeranylation
  by FTase/GGTase-I), RCE1 proteolytically removes the C-terminal -AAX tripeptide, leaving the
  prenylated cysteine as the new C-terminus, which is then carboxymethylated by ICMT. It processes a
  broad range of prenylated CAAX substrates, including the Ras GTPases (K-Ras, N-Ras, H-Ras), RAP1B
  and the heterotrimeric G-protein gamma-1 subunit, and its activity is specific for prenylated
  substrates. Mechanistically RCE1 is a glutamate-type intramembrane protease (EC 3.4.26.1, MEROPS
  peptidase family U48), using general acid/base catalysis rather than a metal or a nucleophilic
  cysteine. Because CAAX proteolysis is required for correct membrane targeting and activity of Ras
  and related GTPases, RCE1 is important for proper subcellular localization and signaling of these
  proteins.
