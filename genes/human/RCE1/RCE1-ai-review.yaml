      metalloprotease call predates the structural/mechanistic work. Rather than remove the annotation,
      replace it with the mechanistically correct glutamic-type peptidase activity term (consistent
      with the IBA and Reactome-TAS peptidase annotations, which are handled the same way). Note the
      catalytic mechanism has been debated (MEROPS U48 is nominally 'unknown' catalytic type), so this
      is presented as the best-supported classification rather than a settled fact.
