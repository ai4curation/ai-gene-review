proposed_new_terms:
- proposed_name: autophagic lysosome reformation
  proposed_definition: A lysosome organization process in which autolysosomal membranes 
    tubulate and give rise to new functional lysosomes after autophagic degradation.
  justification: SPG11/spatacsin and SPG15/spastizin are described as pivotal for ALR 
    and essential for initiation of lysosomal tubulation, but the review currently must 
    use broader lysosome organization and lysosomal membrane organization terms.
  proposed_parent: *id011
  supported_by:
  - *id033
  - *id034
  - reference_id: PMID:29949766
    supporting_text: tubulation occurs in autolysosomes to promote the reformation of 
      new functional lysosomes, a process called autophagic lysosome reformation (ALR)
- proposed_name: lysosome membrane recycling
  proposed_definition: A lysosome organization process that recycles lysosomal membrane 
    components from autolysosomes or lysosome-derived carriers to regenerate functional 
    lysosomes.
  justification: SPG11/spatacsin is required for lysosome membrane recycling and 
    recruits dynamin for this process, but existing GO terms are broader than the 
    specific recycling step.
  proposed_parent: *id012
  supported_by: *id036
suggested_questions:
- question: Should GO add an autophagic lysosome reformation term under lysosome 
    organization so SPG11, SPG15, KIF5B, PIP5K1B, and related ALR factors can be 
    annotated without overusing broad lysosome organization?
  experts:
  - Li Yu
  - Craig Blackstone
  - GO biological process editors
- question: Should SPG11 be annotated to a complex/scaffold molecular function, or 
    should AP5-SPG11-SPG15 activity be represented only through biological process terms
    such as lysosomal membrane organization and membrane bending?
  experts:
  - Margaret Robinson
  - Yong Ma
  - GO molecular function editors
- question: What is the best GO representation for SPG11-dependent AP5Z1 degradation and
    control of lysosome trafficking directionality in neurons?
  experts:
  - Frederic Darios
  - Giovanni Stevanin
  - GO biological process editors
suggested_experiments:
- description: Rescue SPG11-null cells with SPG11 mutants defective in AP-5/SPG15 
    binding and quantify ALR after starvation-refeeding, including autolysosome 
    tubulation, free lysosome regeneration, and lysosome membrane recycling.
  experiment_type: genetic rescue/live-cell lysosome imaging
  hypothesis: AP5-SPG11-SPG15 complex assembly is required for SPG11-dependent 
    autophagic lysosome reformation and lysosomal membrane organization.
- description: Measure membrane curvature sensing and remodeling by purified 
    AP5-SPG11-SPG15 complexes with SPG11 interface mutants on PI3P-containing liposomes.
  experiment_type: in vitro membrane remodeling/structural biochemistry
  hypothesis: SPG11 contributes directly to PI3P-dependent membrane remodeling as part 
    of the AP5-SPG11-SPG15 complex.
- description: Track lysosome movement in polarized neurons after perturbing SPG11, 
    AP5Z1 degradation, KIF13A, and dynein/dynactin interactions while separately scoring
    axonal synaptic vesicle transport.
  experiment_type: neuronal live imaging/rescue epistasis
  hypothesis: SPG11-dependent ER/lysosome membrane remodeling controls lysosome 
    trafficking directionality independently from broader synaptic vesicle transport 
    phenotypes.
