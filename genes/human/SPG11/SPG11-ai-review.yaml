id: Q96JI7
gene_symbol: SPG11
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  SPG11 encodes spatacsin, a large cytoplasmic/peripheral membrane-associated protein that functions
  with SPG15/spastizin and AP-5 in endolysosomal membrane remodeling. The strongest
  protein-homeostasis evidence supports a core role in autophagic lysosome reformation, lysosomal
  tubulation, lysosome membrane recycling, and ER-linked lysosome trafficking/organization. SPG11 also
  has supported neuronal axonal/synaptic transport contexts, but its principal described cellular role
  is endolysosomal membrane remodeling.
