    summary: 'IDA from PMID:10868478 (Meng et al. 2000): Indole-3-carbinol (I3C, a dietary phytochemical from cruciferous vegetables) causes dose-dependent upregulation of E-cadherin and catenin expression in breast cancer cells, suppressing invasion and migration. GO:0071681 (cellular response to indole-3-methanol) captures E-cadherin''s transcriptional upregulation in response to this specific dietary compound.'
    reason: 'E-cadherin expression response to indole-3-carbinol is a real but highly context-specific, non-core biological response. E-cadherin''s primary function is Ca2+-dependent homophilic cell-cell adhesion. Batch 5 of #348.'
- term:
    id: GO:0045295
    label: gamma-catenin binding
  evidence_type: IPI
  original_reference_id: PMID:1639850
  review:
    action: ACCEPT
    summary: 'IPI from PMID:1639850 (Knudsen and Wheelock 1992): Plakoglobin (gamma-catenin, JUP) co-immunoprecipitates with E-cadherin and N-cadherin. E-cadherin cytoplasmic tail interacts with plakoglobin/gamma-catenin (an 83-kD Drosophila armadillo/plakoglobin-like protein), linking E-cadherin to the cytoskeleton. Gamma-catenin binding is a core MF — plakoglobin is a functional component of the E-cadherin-catenin complex at adherens junctions and desmosomes.'
- term:
    id: GO:0043296
    label: apical junction complex
  evidence_type: IDA
  original_reference_id: PMID:10460003
  review:
    action: ACCEPT
    summary: 'IDA from PMID:10460003 (Smythe et al. 1999): E-cadherin and catenins detected at apical junction complexes in normal human bronchial epithelium by immunohistochemistry. The apical junction complex (AJC), comprising tight junctions and adherens junctions, is a core cellular structure for E-cadherin in epithelial cells.'
- term:
    id: GO:0071285
    label: cellular response to lithium ion
  evidence_type: IDA
  original_reference_id: PMID:12937339
  review:
    action: KEEP_AS_NON_CORE
    summary: 'IDA from PMID:12937339 (Ohira et al. 2003): WNT7a induces E-cadherin expression in lung cancer cells. Lithium ion (a GSK-3β inhibitor that mimics Wnt/β-catenin signaling) is used in this study to probe WNT pathway effects on CDH1 expression. GO:0071285 (cellular response to lithium ion) captures E-cadherin''s transcriptional induction in response to lithium-mediated Wnt pathway activation.'
    reason: 'CDH1 induction by lithium ion reflects a specific pharmacological activation of WNT signaling, not a core CDH1 function. Lithium response is context-specific and non-core. Batch 5 of #348.'
