- term:
    id: GO:0016342
    label: catenin complex
  evidence_type: IDA
  original_reference_id: PMID:18593713
  review:
    action: ACCEPT
    summary: 'IDA from PMID:18593713 (Tang et al. 2008): Smad7 stabilizes the beta-catenin-E-cadherin complex at the plasma membrane. The catenin complex (GO:0016342) — comprising E-cadherin, beta-catenin, alpha-catenin, and p120-catenin — is the core protein complex mediating E-cadherin adhesion and cytoskeletal linkage. E-cadherin is the transmembrane scaffold of this complex.'
- term:
    id: GO:0005912
    label: adherens junction
  evidence_type: IDA
  original_reference_id: PMID:16338932
  review:
    action: ACCEPT
    summary: 'IDA from PMID:16338932 (Peignon et al. 2006): E-cadherin-dependent cell-cell adhesion via adherens junctions studied using chimeric E-cadherin-Fc homophilic surfaces and Caco-2 enterocytes. Adherens junction is the core CC for E-cadherin in intestinal epithelial cells.'
- term:
    id: GO:0007156
    label: homophilic cell-cell adhesion
  evidence_type: NAS
  original_reference_id: PMID:16338932
  review:
    action: ACCEPT
    summary: 'NAS from PMID:16338932 (Peignon et al. 2006): Homophilic cell-cell adhesion is the foundation for the experimental design (chimeric E-cadherin-Fc surfaces, Caco-2 cell-cell contacts) and is cited as established background knowledge. Homophilic cell-cell adhesion is the definitively core BP for E-cadherin — the basis for all adherens junction-mediated tissue cohesion.'
- term:
    id: GO:0015629
    label: actin cytoskeleton
  evidence_type: IDA
  original_reference_id: PMID:16338932
  review:
    action: KEEP_AS_NON_CORE
    summary: 'IDA from PMID:16338932 (Peignon et al. 2006): E-cadherin forms complexes with actin (''formation of E-cadherin-actin complexes inducing polarization of Caco-2 enterocytes''). E-cadherin associates with the actin cytoskeleton through alpha-catenin, which links the cadherin-catenin complex to F-actin.'
    reason: 'Actin cytoskeleton localization is real but reflects E-cadherin''s indirect connection to actin via alpha-catenin rather than a core CC of E-cadherin itself. Core CC is plasma membrane/adherens junction. Batch 5 of #348.'
- term:
    id: GO:0016020
    label: membrane
  evidence_type: IDA
  original_reference_id: PMID:16338932
  review:
    action: MARK_AS_OVER_ANNOTATED
    summary: 'IDA from PMID:16338932 (Peignon et al. 2006): GO:0016020 (membrane) is a non-specific parent term for E-cadherin. E-cadherin is a transmembrane protein, but the relevant and informative CC annotation is plasma membrane (GO:0005886) or adherens junction (GO:0005912), both of which are also annotated from this study. The general ''membrane'' term adds no biological information beyond what the specific subterm annotations already convey.'
    reason: 'GO:0016020 membrane is over-annotated — an uninformative parent term when more specific descendant CC terms (plasma membrane, adherens junction, lateral plasma membrane) are already annotated from the same paper and evidence. Batch 5 of #348.'
- term:
    id: GO:0016328
    label: lateral plasma membrane
  evidence_type: IDA
  original_reference_id: PMID:16338932
  review:
    action: ACCEPT
    summary: 'IDA from PMID:16338932 (Peignon et al. 2006): E-cadherin complex formation studied in polarized Caco-2 intestinal epithelial cells where E-cadherin localizes to the lateral plasma membrane forming adherens junctions. Lateral plasma membrane is the canonical CC for E-cadherin in polarized epithelial cells — consistent with PMID:17620337 which describes E-cadherin as ''a ubiquitous component of lateral membranes in epithelial tissues.'''
- term:
    id: GO:0045893
    label: positive regulation of DNA-templated transcription
  evidence_type: IDA
  original_reference_id: PMID:16338932
  review:
    action: KEEP_AS_NON_CORE
    summary: 'IDA from PMID:16338932 (Peignon et al. 2006): E-cadherin-dependent cell-cell adhesion promotes transcriptional activation of the apoA-IV gene via increased nuclear abundance of HNF4alpha. Positive regulation of transcription is an indirect downstream consequence of E-cadherin-mediated adhesion signaling.'
    reason: 'Transcriptional activation of apoA-IV via HNF4alpha is an indirect downstream effect of E-cadherin signaling in intestinal enterocytes — a context-specific non-core function. E-cadherin''s core function is homophilic cell-cell adhesion. Batch 5 of #348.'
- term:
    id: GO:0048471
    label: perinuclear region of cytoplasm
  evidence_type: IDA
  original_reference_id: PMID:16338932
  review:
    action: UNDECIDED
    summary: 'IDA from PMID:16338932 (Peignon et al. 2006): Perinuclear region of cytoplasm annotation for CDH1. The paper focuses on E-cadherin''s role in HNF4alpha nuclear redistribution, not E-cadherin itself in the perinuclear region. While E-cadherin C-terminal fragments (CTF2/CTF3) can undergo regulated intramembrane proteolysis with some nuclear-associated signaling reported, the abstract does not describe E-cadherin perinuclear localization. Unable to confirm without full text.'
- term:
    id: GO:0050839
    label: cell adhesion molecule binding
  evidence_type: NAS
  original_reference_id: PMID:16338932
  review:
    action: MARK_AS_OVER_ANNOTATED
    summary: 'NAS from PMID:16338932 (Peignon et al. 2006): Cell adhesion molecule binding as NAS (Not Ascribed to Source) from a background knowledge statement about E-cadherin adhesion. GO:0050839 (cell adhesion molecule binding) is non-informative for E-cadherin — its specific binding partners (other E-cadherins in trans, beta-catenin, gamma-catenin, ankyrin) are better captured by dedicated terms (GO:0045296 cadherin binding, GO:0008013 beta-catenin binding, GO:0045295 gamma-catenin binding, GO:0030506 ankyrin binding) already annotated in this file.'
    reason: 'GO:0050839 is over-annotated: uninformative parent term when more specific molecular function binding terms for E-cadherin''s known partners are separately annotated. Per CLAUDE.md, prefer informative specific terms. Batch 5 of #348.'
- term:
    id: GO:0098609
    label: cell-cell adhesion
  evidence_type: IDA
  original_reference_id: PMID:16338932
  review:
    action: ACCEPT
    summary: 'IDA from PMID:16338932 (Peignon et al. 2006): Cell-cell adhesion confirmed directly — E-cadherin mediates Caco-2 enterocyte cell-cell adhesion; impairing or enhancing E-cadherin-dependent adhesion modulates apoA-IV transcription. Cell-cell adhesion (GO:0098609) is core BP for E-cadherin.'
- term:
    id: GO:0007156
    label: homophilic cell-cell adhesion
  evidence_type: NAS
  original_reference_id: PMID:8033105
  review:
    action: ACCEPT
    summary: 'NAS from PMID:8033105: Homophilic cell-cell adhesion is the foundational and defining function of E-cadherin — a classical cadherin mediating Ca2+-dependent homophilic trans-adhesion between cells via strand-swap dimerization of the EC1 domain. This is the core BP and mechanism for E-cadherin''s role in epithelial tissue integrity and morphogenesis.'
