    label: identical protein binding
  evidence_type: IPI
  original_reference_id: PMID:19114658
  review:
    summary: CDH1 homodimerization documented by single-molecule force spectroscopy
      (Zhang et al. 2009, PNAS). This study directly measured E-cadherin trans-dimerization
      at the single-molecule level, confirming homophilic binding between CDH1 ectodomains
      and characterizing binding cooperativity. CDH1 identical protein binding is
      the molecular basis of homophilic cadherin-mediated cell adhesion.
    action: ACCEPT
    reason: CDH1 homodimerization (identical protein binding) is the molecular basis
      of homophilic cadherin adhesion. This is a well-established, specific, and biologically
      meaningful annotation — unlike the generic GO:0005515 protein binding rows removed
      in batch 1. UniProt documents CDH1 as a disulfide-linked homodimer (PubMed:11856755).
      ACCEPT.
