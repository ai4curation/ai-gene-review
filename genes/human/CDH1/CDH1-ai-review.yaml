- term:
    id: GO:0042802
    label: identical protein binding
  evidence_type: IPI
  original_reference_id: PMID:24725409
  review:
    summary: This GO:0042802 identical-protein-binding annotation derives from an IntAct-curated
      interaction in Crawley et al. 2014 (PMID:24725409, Cell), a study primarily about
      PCDH24/MLPCDH protocadherin-based intermicrovillar adhesion driving intestinal
      brush border assembly. CDH1/E-cadherin is not a subject of that paper — it appears
      only as a positive control in a bead aggregation assay (Fig. 4B,C), where E-cadherin
      ectodomain-coated beads formed large aggregates, demonstrating robust homophilic
      adhesion. The paper explicitly excludes CDH1 from further study because E-cadherin
      localizes to the basolateral compartment rather than the brush border. The
      bead-aggregation control nonetheless confirms CDH1 homophilic (identical protein)
      binding, consistent with the well-established homophilic trans-dimerization
      mechanism underlying cadherin-mediated cell-cell adhesion.
    action: ACCEPT
    reason: CDH1 homodimerization (identical protein binding) is the molecular basis
      of homophilic cadherin adhesion — a well-established, specific, and biologically
      meaningful annotation, unlike the generic GO:0005515 protein binding rows removed
      in batch 1. PMID:24725409 is not a dedicated CDH1 study (E-cadherin serves only
      as a bead-aggregation positive control there), but that control is genuine
      supporting data, and CDH1 homophilic binding is independently established by the
      other GO:0042802 IPI entries — notably the single-molecule force spectroscopy of
      PMID:19114658 — and by UniProt, which documents CDH1 as a disulfide-linked homodimer
      (PubMed:11856755). ACCEPT.
