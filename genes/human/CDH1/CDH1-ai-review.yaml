    reason: Accurate but broader-than-precise CC grouping; the precise core localization is GO:0005912 adherens junction. E-cadherin resides specifically in the zonula adherens sub-compartment of the apical junction complex. Mechanical IBA-PANTHER batch (batch 2 of #348).
- term:
    id: GO:0005509
    label: calcium ion binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    action: ACCEPT
    summary: 'IEA from InterPro2GO (GO_REF:0000002): E-cadherin has five extracellular cadherin (EC) domains, each pair bridged by three Ca2+ ions at the domain linker regions. Ca2+ binding rigidifies the extracellular domain into a rod-like conformation required for homophilic trans-dimerisation and cell-cell adhesion. Calcium ion binding is therefore a core molecular activity of CDH1, corroborated by the IBA GO:0016339 (calcium-dependent cell-cell adhesion) ACCEPT in this file.'
    reason: 'Core CDH1 molecular function — Ca2+ binding via the EC-domain linkers is an obligate step in homophilic cadherin adhesion. IEA batch (batch 3 of #348).'
