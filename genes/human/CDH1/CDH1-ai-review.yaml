    id: GO:0005515
    label: protein binding
  evidence_type: IPI
  original_reference_id: PMID:19822757
  review:
    summary: Generic 'protein binding' (GO:0005515) IPI evidence from PMID:19822757 — non-informative per CLAUDE.md curation guidance. CDH1's beta-catenin and cadherin partner interactions are already captured in this file by dedicated MF terms (GO:0008013 beta-catenin binding, GO:0045296 cadherin binding, GO:0042802 identical protein binding for the E-cadherin homodimer). Specific alpha-catenin binding (GO:0045294, for CTNNA1) and delta-catenin binding (GO:0070097, for CTNND1/p120-catenin) terms are not yet seeded in this file and should be added in a subsequent batch. Regardless, this generic GO:0005515 IntAct-derived row adds no biological information beyond what partner-specific MF terms (existing or to be added) capture.
