- term:
    id: GO:0005802
    label: trans-Golgi network
  evidence_type: IMP
  original_reference_id: PMID:17620337
  review:
    action: KEEP_AS_NON_CORE
    summary: 'IMP from PMID:17620337 (Kizhatil et al. 2007): Ankyrin-G and beta-2-spectrin are required for exit of E-cadherin from the trans-Golgi network in a microtubule-dependent pathway. TGN is the staging point for post-Golgi trafficking of newly synthesized E-cadherin to the lateral plasma membrane.'
    reason: 'Trans-Golgi network localization is non-core — reflects biosynthetic trafficking transit of E-cadherin before its delivery to the lateral plasma membrane. Core CC is plasma membrane/adherens junction. Batch 5 of #348.'
- term:
    id: GO:0008013
    label: beta-catenin binding
  evidence_type: IDA
  original_reference_id: PMID:17620337
  review:
    action: ACCEPT
    summary: 'IDA from PMID:17620337 (Kizhatil et al. 2007): Ankyrin-G binds to the cytoplasmic domain of E-cadherin at a conserved site distinct from beta-catenin; ankyrin-G recruits beta-2-spectrin to E-cadherin-beta-catenin complexes. This study provides independent experimental confirmation that E-cadherin directly binds beta-catenin (IDA from the ankyrin study, co-IP evidence). Beta-catenin binding is core MF for E-cadherin.'
- term:
    id: GO:0016328
    label: lateral plasma membrane
  evidence_type: IDA
  original_reference_id: PMID:17620337
  review:
    action: ACCEPT
    summary: 'IDA from PMID:17620337 (Kizhatil et al. 2007): ''E-cadherin is a ubiquitous component of lateral membranes in epithelial tissues.'' Ankyrin-G and beta-2-spectrin are required for accumulation of E-cadherin at the lateral membrane. Lateral plasma membrane is the core CC of E-cadherin in epithelial cells.'
- term:
    id: GO:0030506
    label: ankyrin binding
  evidence_type: IPI
  original_reference_id: PMID:17620337
  review:
    action: ACCEPT
    summary: 'IPI from PMID:17620337 (Kizhatil et al. 2007): Ankyrin-G (ANK3) binds to the cytoplasmic domain of E-cadherin at a conserved site distinct from beta-catenin; this ankyrin-G interaction is required for lateral membrane accumulation and exit from the TGN. Ankyrin binding (GO:0030506) is a specific and informative MF — distinct from generic protein binding, ankyrin links E-cadherin to the spectrin/actin cytoskeleton.'
- term:
    id: GO:0072659
    label: protein localization to plasma membrane
  evidence_type: IDA
  original_reference_id: PMID:17620337
  review:
    action: KEEP_AS_NON_CORE
    summary: 'IDA from PMID:17620337 (Kizhatil et al. 2007): Ankyrin-G and beta-2-spectrin regulate E-cadherin''s localization to the lateral plasma membrane; their loss causes mistargeting. E-cadherin localization to plasma membrane is real but this BP annotation captures the trafficking/targeting aspect rather than the core adhesion function.'
    reason: 'Protein localization to plasma membrane is a mechanistic support function for E-cadherin trafficking, not its core BP. Core BP is cell-cell adhesion and adherens junction organization. Non-core context: ankyrin/spectrin-dependent lateral membrane targeting. Batch 5 of #348.'
- term:
    id: GO:0032794
    label: GTPase activating protein binding
  evidence_type: IPI
  original_reference_id: PMID:20116244
  review:
    action: KEEP_AS_NON_CORE
    summary: 'IPI from PMID:20116244 (Frasa et al. 2010): Armus is a TBC/RabGAP protein that integrates Arf6, Rac1, and Rab7 signaling during E-cadherin junction disassembly. E-cadherin co-immunoprecipitates with Armus (a GTPase activating protein for Rab7), suggesting physical association. E-cadherin''s association with Armus/RabGAP is part of the junction disassembly/degradation pathway.'
    reason: 'GTPase activating protein binding by E-cadherin reflects its participation in junction disassembly/endocytic degradation pathways, not a core MF. Core function is homophilic adhesion at adherens junctions. Batch 5 of #348.'
- term:
    id: GO:0009898
    label: cytoplasmic side of plasma membrane
  evidence_type: IDA
  original_reference_id: PMID:20189993
  review:
    action: ACCEPT
    summary: 'IDA from PMID:20189993: E-cadherin''s cytoplasmic domain localizes to the cytoplasmic side of the plasma membrane where it interacts with beta-catenin, alpha-catenin, and p120-catenin. As a type-I transmembrane protein, E-cadherin''s cytoplasmic tail is definitively on the cytoplasmic side of the plasma membrane, making this a correct CC annotation.'
- term:
    id: GO:0030054
    label: cell junction
  evidence_type: TAS
  original_reference_id: PMID:17047063
  review:
    action: KEEP_AS_NON_CORE
    summary: 'TAS from PMID:17047063: CDH1/E-cadherin localizes to cell junctions. GO:0030054 cell junction is a broad parent term; the precise and informative CC annotation is GO:0005912 adherens junction (ACCEPTed in this file), the specific junction type where E-cadherin resides and functions. Consistent with KEEP_AS_NON_CORE on the IEA cell junction annotation in this file.'
    reason: 'Real but non-core CC -- CDH1 localizes to cell junctions but the precise junction type is the adherens junction (GO:0005912, accepted elsewhere); consistent with KEEP_AS_NON_CORE on the IEA cell junction row. Reactome TAS localization batch (batch 4 of #348).'
- term:
    id: GO:0022408
    label: negative regulation of cell-cell adhesion
  evidence_type: IMP
  original_reference_id: PMID:19653274
  review:
    action: REMOVE
    summary: 'IMP from PMID:19653274 (Jesse et al. 2010): This paper studies Lef-1 isoforms that inhibit E-cadherin expression, reducing cellular aggregation. The IMP annotation of GO:0022408 (negative regulation of cell-cell adhesion) to CDH1 is not supported — E-cadherin is a canonical POSITIVE mediator/regulator of cell-cell adhesion. The paper''s phenotype reflects Lef-1-mediated repression of CDH1 transcription leading to reduced adhesion; E-cadherin itself does not negatively regulate cell-cell adhesion in this context.'
    reason: 'Annotation inconsistent with CDH1 biology: E-cadherin is a positive mediator of cell-cell adhesion, not a negative regulator. The Lef-1 paper shows that reducing CDH1 expression reduces adhesion — this is the opposite of CDH1 negatively regulating cell-cell adhesion. This annotation appears to be a misinterpretation of the IMP evidence. Batch 5 of #348.'
