existing_annotations:
- term:
    id: GO:0000902
    label: cell morphogenesis
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: CDH1 promotes epithelial cell morphogenesis through calcium-dependent
      homophilic adhesion and adherens junction assembly. PANTHER IBA inferred from
      conserved function across cadherin family members with experimental support
      in mouse (MGI:MGI:88354, MGI:MGI:88355) and zebrafish orthologs. CDH1-mediated
      cell-cell adhesion is required for the polarization and morphogenesis of epithelial
      sheets.
    action: ACCEPT
    reason: Cell morphogenesis is a direct consequence of CDH1-mediated adherens junction
      formation. The annotation is supported by the IBA inference from PANTHER and
      experimental evidence in orthologs. ACCEPT as a core epithelial function of
      CDH1.
- term:
    id: GO:0016477
    label: cell migration
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: CDH1 regulates cell migration, primarily as an invasion suppressor —
      loss of CDH1 expression in epithelial-mesenchymal transition (EMT) promotes
      cell motility. The IBA infers cell migration involvement from conserved cadherin
      family function (multiple zebrafish and mouse orthologs). CDH1 does modulate
      migration indirectly through its role in epithelial integrity, but this is not
      CDH1's primary molecular function.
    action: KEEP_AS_NON_CORE
    reason: CDH1 involvement in cell migration is real (there is also an IMP annotation
      for GO:0030336 negative regulation of cell migration via PMID:16882694) but
      represents a secondary/pleiotropic effect. The primary function is calcium-dependent
      cell-cell adhesion. KEEP_AS_NON_CORE.
- term:
    id: GO:0007043
    label: cell-cell junction assembly
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: CDH1 is the key mediator of adherens junction assembly in epithelial
      cells. IBA inferred from conserved cadherin function (mouse CDH1/CDH2, zebrafish
      cdh1/cdh2). CDH1 nucleates the assembly of the E-cadherin/catenin complex at
      the plasma membrane to form cell-cell junctions. Directly supported by IMP and
      IDA annotations in this review.
    action: ACCEPT
    reason: Cell-cell junction assembly is a core CDH1 function. ACCEPT.
- term:
    id: GO:0005737
    label: cytoplasm
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: CDH1 has a cytoplasmic domain that anchors the E-cadherin/catenin complex
      in the cytoplasm; this tail binds beta-catenin (CTNNB1), p120-catenin (CTNND1),
      and gamma-catenin (JUP). IBA from PANTHER, supported by mouse orthologs. IDA
      annotations in this review (e.g. PMID:22294297, PMID:16338932) confirm cytoplasmic
      localization. The cytoplasmic tail is essential for linking the cadherin complex
      to the actin cytoskeleton.
    action: ACCEPT
    reason: CDH1 cytoplasmic localization is well-established. ACCEPT.
- term:
    id: GO:0008013
    label: beta-catenin binding
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: CDH1 directly binds beta-catenin (CTNNB1) through its cytoplasmic domain.
      This interaction is among the most well-characterized protein-protein interactions
      in cell biology, forming the core of the E-cadherin/catenin complex at adherens
      junctions. UniProt documents this interaction with extensive experimental evidence.
      IBA is inferred from PANTHER; confirmed by multiple IPI and IDA annotations
      in this review.
    action: ACCEPT
    reason: Beta-catenin binding is a defining biochemical activity of CDH1. ACCEPT.
- term:
    id: GO:0044331
    label: cell-cell adhesion mediated by cadherin
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: 'CDH1 is the canonical mediator of cadherin-dependent cell-cell adhesion
      in epithelial tissues. IBA inferred from PANTHER conserved function in vertebrate
      cadherins (mouse, zebrafish). The term directly describes CDH1''s primary biological
      role: homophilic trans-binding of cadherin ectodomains between adjacent cells
      to maintain epithelial integrity. Directly confirmed by multiple IDA and IMP
      annotations in this review.'
    action: ACCEPT
    reason: Cell-cell adhesion mediated by cadherin is the primary function of CDH1.
      ACCEPT.
- term:
    id: GO:0016342
    label: catenin complex
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: CDH1 is the transmembrane component of the E-cadherin/catenin complex
      at adherens junctions, which contains CDH1, beta-catenin (CTNNB1) or gamma-catenin
      (JUP), and alpha-catenin (CTNNA1). IBA from PANTHER, confirmed by IDA annotation
      (PMID:18593713) in this review and documented in UniProt. The catenin complex
      is essential for linking CDH1 to the actin cytoskeleton.
    action: ACCEPT
    reason: CDH1 is the defining component of the catenin complex. ACCEPT.
- term:
    id: GO:0045296
    label: cadherin binding
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: CDH1 mediates homophilic cadherin-cadherin binding in trans between adjacent
      cell surfaces. The extracellular domain engages in strand-swap dimerization
      with CDH1 ectodomains on opposing cells. IBA from PANTHER (multiple vertebrate
      orthologs including mouse cdh1/cdh2, zebrafish cdh1). Also confirmed by HDA
      annotation (PMID:25468996) in this review.
    action: ACCEPT
    reason: Cadherin binding (homophilic trans-binding) is the core biochemical mechanism
      of CDH1 adhesion. ACCEPT.
- term:
    id: GO:0034332
    label: adherens junction organization
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: CDH1 is essential for adherens junction assembly and organization in
      epithelial cells. IBA from PANTHER (multiple cadherins across vertebrates).
      CDH1 nucleates junction formation, recruits catenins to the complex, and maintains
      junction organization through continuous endocytosis/recycling. Also confirmed
      by IMP annotation (PMID:21724833) in this review.
    action: ACCEPT
    reason: Adherens junction organization is a core CDH1 function. ACCEPT.
- term:
    id: GO:0005912
    label: adherens junction
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: CDH1 is the defining component of adherens junctions in epithelial cells.
      IBA from PANTHER, confirmed by multiple IDA annotations in this review (PMID:22294297,
      PMID:18343367, PMID:27760340, PMID:28169360) and UniProt subcellular location
      evidence. The adherens junction is CDH1's primary subcellular compartment.
    action: ACCEPT
    reason: Adherens junction is the primary subcellular localization of CDH1. ACCEPT.
- term:
    id: GO:0007416
    label: synapse assembly
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: IBA for synapse assembly inferred from PANTHER node PTN000616414 based
      on a single rat CDH1 ortholog (RGD:69279). CDH1/E-cadherin is primarily an epithelial
      protein; synapse assembly is a function predominantly associated with neural
      cadherins (N-cadherin/CDH2, CDH11, CDH13). No strong experimental literature
      supports CDH1 as a direct driver of synapse assembly. The PANTHER inference
      appears to conflate the neural cadherin branch with CDH1 based on limited ortholog
      evidence.
    action: MARK_AS_OVER_ANNOTATED
    reason: Synapse assembly is not a validated CDH1 function. The IBA is based on
      a single rat ortholog and likely reflects the neural cadherin subfamily rather
      than CDH1 specifically. MARK_AS_OVER_ANNOTATED.
- term:
    id: GO:0016339
    label: calcium-dependent cell-cell adhesion
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: Calcium-dependent cell-cell adhesion is the defining molecular mechanism
      of CDH1. CDH1 requires calcium ions for the structural integrity of its extracellular
      cadherin repeats and for adopting the conformation necessary for trans-dimerization
      and cell-cell adhesion. IBA from PANTHER (multiple orthologs in mouse, rat,
      zebrafish). Directly documented in the UniProt function annotation and supported
      by IEA annotation in this review.
    action: ACCEPT
    reason: Calcium-dependent cell-cell adhesion is the most fundamental description
      of CDH1's adhesive mechanism. ACCEPT.
- term:
    id: GO:0016600
    label: flotillin complex
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: CDH1 associates with flotillin-rich lipid raft microdomains at the plasma
      membrane. IBA from PANTHER (PTN000616414), supported by an IDA annotation in
      this review (PMID:24046456, which also documents flotillin complex localization).
      This represents a membrane microdomain association rather than a core CDH1 function;
      flotillin complexes may regulate CDH1 signaling or endocytosis.
    action: KEEP_AS_NON_CORE
    reason: CDH1 association with flotillin complex is documented (IDA PMID:24046456)
      but represents a secondary/regulatory interaction rather than CDH1's primary
      function. KEEP_AS_NON_CORE.
- term:
    id: GO:0043296
    label: apical junction complex
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: CDH1 is active in the apical junction complex (AJC) of epithelial cells,
      which encompasses the tight junction, adherens junction, and desmosomes at the
      apical pole. IBA from PANTHER (PTN000616414), supported by an IDA annotation
      in this review (PMID:10460003) confirming CDH1 localization to the apical junction
      complex. CDH1 is central to AJC assembly and maintenance of epithelial polarity.
    action: ACCEPT
    reason: CDH1 is a defining component of the apical junction complex in epithelial
      cells. ACCEPT.
