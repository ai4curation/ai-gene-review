    id: GO:0008270
    label: zinc ion binding
  evidence_type: IDA
  original_reference_id: PMID:29976570
  qualifier: enables
  negated: true
  review:
    summary: >-
      NOT annotation correctly asserting that human UPB1 does not bind zinc, refuting
      an earlier sequence-based prediction.
    action: ACCEPT
    reason: >-
      Although early work reported ~0.5 zinc atoms/subunit and predicted a zinc site,
