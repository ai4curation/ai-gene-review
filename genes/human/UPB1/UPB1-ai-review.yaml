- description: >-
    Beta-ureidopropionase catalytic activity: hydrolyses N-carbamoyl-beta-alanine to
    beta-alanine, ammonia and CO2 (and N-carbamoyl-beta-aminoisobutyrate to
    beta-aminoisobutyrate), the third and final step of reductive pyrimidine
    catabolism.
  molecular_function:
    id: GO:0003837
    label: beta-ureidopropionase activity
  directly_involved_in:
  - id: GO:0006212
    label: uracil catabolic process
  locations:
  - id: GO:0005829
    label: cytosol
  supported_by:
  - reference_id: PMID:24526388
    supporting_text: >-
      The third step, catalyzed by β-ureidopropionase (βUP) (EC 3.5.1.6), results
      in conversion of N-carbamyl-β-alanine and N-carbamyl-β-aminoisobutyric acid
      into β-alanine and β-aminoisobutyric acid, respectively, with concomitant
      production of ammonia and carbon dioxide.
- description: >-
    Production of beta-alanine (and beta-aminoisobutyrate) as the terminal metabolic
    output of the pyrimidine degradation pathway, in the cytosol.
  molecular_function:
    id: GO:0003837
    label: beta-ureidopropionase activity
  directly_involved_in:
  - id: GO:0019483
    label: beta-alanine biosynthetic process
  locations:
  - id: GO:0005829
    label: cytosol
  supported_by:
  - reference_id: PMID:22525402
    supporting_text: >-
      ß-ureidopropionase is the third enzyme of the pyrimidine degradation pathway
      and
      catalyzes the conversion of N-carbamyl-ß-alanine and
      N-carbamyl-ß-aminoisobutyric acid to ß-alanine and ß-aminoisobutyric acid,
      ammonia and CO(2).
proposed_new_terms: []
suggested_questions:
- question: >-
    Does the substrate/pH-dependent oligomerization of human UPB1 regulate flux
    through pyrimidine catabolism in vivo, or is it primarily an in vitro phenomenon?
- question: >-
    To what extent does reduced UPB1 activity modulate systemic fluoropyrimidine
    (e.g. 5-fluorouracil) catabolism and toxicity, given that its substrates derive
    from these antimetabolites?
suggested_experiments:
- description: >-
    Determine a substrate- or product-bound crystal/cryo-EM structure of human UPB1
    to define the catalytic mechanism and the basis of allosteric activation by
    oligomer assembly.
- description: >-
    Metabolomic profiling of UPB1-deficient patient cells or knockout models to
    quantify accumulation of N-carbamyl-beta-alanine / N-carbamyl-beta-aminoisobutyrate
    and depletion of beta-alanine and downstream carnosine.
