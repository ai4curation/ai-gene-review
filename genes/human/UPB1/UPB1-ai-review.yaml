- term:
    id: GO:0046135
    label: pyrimidine nucleoside catabolic process
  evidence_type: IMP
  original_reference_id: PMID:22525402
  qualifier: involved_in
  review:
    summary: >-
      Annotation to pyrimidine catabolism based on disease-mutation analysis, but the
      chosen term (nucleoside catabolism) is inaccurate: UPB1 acts on
      N-carbamoyl-beta-alanine, a nucleobase-degradation intermediate, not a
      nucleoside.
    action: MODIFY
    reason: >-
      The gene is genuinely involved in pyrimidine catabolism (loss of function
      causes accumulation of N-carbamyl-beta-amino acids), so the essence is correct,
      but nucleoside catabolism is the wrong branch. UPB1 acts downstream of base
      ring-opening on the ureido acid, so the appropriate terms are uracil catabolic
      process (GO:0006212) and, more generally, pyrimidine nucleobase catabolic
      process (GO:0006208).
    proposed_replacement_terms:
    - id: GO:0006212
      label: uracil catabolic process
    - id: GO:0006208
      label: pyrimidine nucleobase catabolic process
    supported_by:
    - reference_id: PMID:22525402
      supporting_text: >-
        markedly elevated levels
