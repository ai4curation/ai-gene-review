id: Q9UBR1
gene_symbol: UPB1
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  UPB1 encodes beta-ureidopropionase (N-carbamoyl-beta-alanine amidohydrolase;
  beta-alanine synthase; EC 3.5.1.6), the third and final enzyme of the reductive
  pyrimidine catabolic pathway. It hydrolyses N-carbamoyl-beta-alanine
  (3-ureidopropanoate) to beta-alanine, ammonia and carbon dioxide, and likewise
  converts N-carbamoyl-beta-aminoisobutyrate (from thymine degradation) to
  beta-aminoisobutyrate, ammonia and CO2. It acts downstream of dihydropyrimidine
  dehydrogenase (DPYD) and dihydropyrimidinase (DPYS), and its product beta-alanine
  is a precursor for carnosine and other metabolites. The enzyme is a member of the
  nitrilase (carbon-nitrogen hydrolase) superfamily, using an active-site cysteine
  nucleophile (Cys233), and is cytosolic, highly expressed in liver. It assembles
  into homodimers, homotetramers, homooctamers and larger homooligomers, with
  substrate- and pH-dependent allosteric regulation of activity through oligomer
  state. Loss-of-function variants in UPB1 cause beta-ureidopropionase deficiency
  (UPB1D), an inborn error of pyrimidine degradation characterised by
  N-carbamyl-beta-amino aciduria and a highly variable phenotype ranging from
  neurological involvement (intellectual disability, seizures, hypotonia,
  microcephaly) to asymptomatic; the enzyme is also relevant to catabolism of
  fluoropyrimidine anticancer drugs.
