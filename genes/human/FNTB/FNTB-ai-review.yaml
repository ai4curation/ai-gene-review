  label: Homo sapiens
description: >-
  FNTB is the beta (catalytic) subunit of protein farnesyltransferase (FTase; EC 2.5.1.58),
  a zinc-dependent CaaX prenyltransferase. FTase is a heterodimer of a shared alpha subunit
  (FNTA) and the beta subunit (FNTB). The enzyme transfers a farnesyl group from farnesyl
  diphosphate (FPP) to the cysteine of C-terminal CaaX motifs (Cys-aliphatic-aliphatic-X) of
  substrate proteins, thereby targeting them to cellular membranes. Substrates include the
  Ras-superfamily GTPases (H-, N-, K-Ras), nuclear lamins, and centromeric proteins such as
  CENP-E/F, among more than 60 signal-transduction proteins. The beta subunit forms the bulk
  of the active site: it binds FPP and coordinates the catalytic Zn2+ ion, and residues such
  as Trp102 in the beta subunit determine selectivity for FPP over geranylgeranyl diphosphate.
  FTase is a soluble cytosolic enzyme and is a validated anticancer and Hutchinson-Gilford
  progeria drug target through farnesyltransferase inhibitors (e.g. lonafarnib, tipifarnib).
