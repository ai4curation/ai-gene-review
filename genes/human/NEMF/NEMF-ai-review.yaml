id: O60524
gene_symbol: NEMF
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: NEMF (Nuclear Export Mediator Factor; also called RQC2, the mammalian ortholog of
  yeast Rqc2/Tae2 and bacterial RqcH) is a core subunit of the ribosome-associated quality
  control (RQC) complex that acts on stalled 60S large ribosomal subunits. After an aberrant
  ribosome stalls and is split, NEMF recognizes the exposed nascent-chain-conjugated (peptidyl)
  tRNA in the 60S subunit, which allows it to discriminate occupied from empty 60S, and it
  recruits and stabilizes the E3 ubiquitin ligase LTN1/Listerin. NEMF additionally catalyzes
  CAT tailing, in which (in an mRNA- and 40S-independent manner) it delivers mainly
  alanine-charged tRNA (and other aminoacyl-tRNAs) to the ribosomal A site and directs
  non-templated C-terminal elongation of the stalled nascent chain, generating C-terminal
  alanine/threonine (CAT) tails. These tails promote degradation of the stalled chain by two
  routes. In the canonical RQC-L pathway they expose buried lysines for LTN1-dependent
  ubiquitination, and in the alternative RQC-C pathway they form a C-terminal alanine degron
  recognized by C-end-rule E3 ligases (CRL2-KLHDC10 and RCHY1/PIRH2). NEMF acts in the cytosol
  on cytosolic ribosomes; loss of NEMF function causes accumulation of toxic, aggregation-prone
  nascent chains, and biallelic NEMF variants cause an autosomal-recessive neurodevelopmental
  disorder with peripheral neuropathy.
