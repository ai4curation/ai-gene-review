  review:
    summary: NEMF binds tRNA - both the nascent-chain-conjugated peptidyl-tRNA it uses to sense
      stalled 60S and the aminoacyl-tRNA it delivers for CAT tailing. tRNA binding is conserved
      across the NEMF/Rqc2 family.
