- id: file:human/NEMF/NEMF-uniprot.txt
  title: UniProt entry O60524 (NEMF_HUMAN), Ribosome quality control complex subunit NEMF
  findings:
  - statement: RQC complex subunit that senses stalled 60S via the nascent-chain-conjugated
      tRNA, recruits LTN1, and mediates CAT tailing (alanine tailing) of stalled nascent chains
      to promote their ubiquitin-dependent degradation via LTN1 (RQC-L) and C-end-rule E3
      ligases (RQC-C); cytosolic.
    reference_section_type: OTHER
core_functions:
- description: Adds non-templated C-terminal alanine (CAT/Ala) tails to stalled nascent
    polypeptides by binding aminoacyl(Ala)-tRNA and directing its delivery to the ribosomal A
    site in an mRNA- and 40S-independent manner.
  molecular_function:
    id: GO:1904678
    label: alpha-aminoacyl-tRNA binding
  locations:
  - id: GO:0022626
    label: cytosolic ribosome
  supported_by:
  - reference_id: PMID:33909987
    supporting_text: mediated by tRNA-Ala binding and Ala tailing
  - reference_id: file:human/NEMF/NEMF-uniprot.txt
    supporting_text: NEMF mediates CAT tailing by recruiting alanine-charged tRNA to the A-
      site
- description: Binds the stalled 60S large ribosomal subunit by recognizing the exposed nascent-
    chain-conjugated P-site tRNA, sensing nascent-chain occupancy and recruiting/stabilizing the
    LTN1 ligase to assemble a functional RQC complex.
  molecular_function:
    id: GO:0043023
    label: ribosomal large subunit binding
  locations:
  - id: GO:1990112
    label: RQC complex
  supported_by:
  - reference_id: file:human/NEMF/NEMF-uniprot.txt
    supporting_text: NEMF specifically binds stalled 60S ribosomal subunits by recognizing an
      exposed, nascent chain-conjugated tRNA moiety
  - reference_id: file:human/NEMF/NEMF-uniprot.txt
    supporting_text: promotes the recruitment of LTN1 to stalled 60S subunits
- description: Through CAT tailing, drives ribosome-associated ubiquitin-dependent degradation
    of incompletely synthesized nascent chains, both by exposing lysines for LTN1-dependent
    ubiquitination and by generating a C-terminal alanine degron for C-end-rule E3 ligases.
  molecular_function:
    id: GO:0140708
    label: CAT tailing
  locations:
  - id: GO:0022626
    label: cytosolic ribosome
  supported_by:
  - reference_id: PMID:33406423
    supporting_text: NEMF, a mammalian RQC2 homolog, modifies translation products of nonstop
      mRNAs, major erroneous mRNAs in mammals, with a C-terminal tail mainly composed of alanine
      with several other amino acids
  - reference_id: file:human/NEMF/NEMF-uniprot.txt
    supporting_text: as well as their ubiquitin-mediated proteasomal degradation
proposed_new_terms: []
suggested_questions:
- question: What determines the choice between the LTN1-dependent (RQC-L) and C-end-rule (RQC-C)
    degradation routes downstream of NEMF Ala tailing in mammalian cells?
- question: How do the disease-causing NEMF variants (IDDSAPN) mechanistically impair 60S
    sensing, LTN1 recruitment, or CAT tailing, and which deficit drives the neuropathy?
suggested_experiments:
- description: Reconstitute CAT tailing in vitro with purified human NEMF, 60S-nascent chain
    complexes, and charged tRNAs to quantify amino-acid selectivity (Ala vs Thr vs others) and
    its dependence on 40S/mRNA.
- description: Introduce patient-derived NEMF missense variants into cells and assay 60S binding,
    LTN1 recruitment, CAT-tail length/composition, and nascent-chain degradation to map genotype
    to molecular defect.
