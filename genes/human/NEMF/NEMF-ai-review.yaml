- id: PMID:25578875
  title: Structure and assembly pathway of the ribosome quality control complex.
  findings:
  - statement: NEMF senses nascent-chain occupancy of 60S via the exposed P-site tRNA and
      recruits/stabilizes Listerin, defining the RQC complex assembly pathway.
    reference_section_type: ABSTRACT
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: Definitive structural study establishing NEMF's 60S sensing and LTN1
      recruitment.
- id: PMID:33406423
  title: Failure to Degrade CAT-Tailed Proteins Disrupts Neuronal Morphogenesis and Cell
    Survival.
  findings:
  - statement: Mammalian NEMF (RQC2 homolog) adds non-templated C-terminal alanine-rich (CAT)
      tails to nonstop translation products; CAT tailing promotes ubiquitination for proteasomal
      degradation, and failure causes nascent-chain aggregation and apoptosis.
    reference_section_type: ABSTRACT
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: Direct demonstration of NEMF CAT-tailing in mammalian cells and its
      physiological/neuronal significance.
- id: PMID:33909987
  title: Convergence of mammalian RQC and C-end rule proteolytic pathways via alanine tailing.
  findings:
  - statement: NEMF performs tRNA-Ala-dependent alanine tailing of stalled nascent chains; in
      addition to assisting Listerin, the Ala tail acts as a C-degron recognized by CRL2-KLHDC10
      and RCHY1/PIRH2 C-end-rule E3 ligases.
    reference_section_type: ABSTRACT
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: Establishes the Listerin-independent RQC-C pathway downstream of NEMF Ala
      tailing.
- id: PMID:35452614
  title: Ribosome-associated quality-control mechanisms from bacteria to humans.
  findings:
