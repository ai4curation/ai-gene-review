id: P60174
gene_symbol: TPI1
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: Triosephosphate isomerase (TIM) is a cytosolic homodimeric enzyme (EC 5.3.1.1)
  that catalyzes the reversible interconversion of the two triose phosphates, dihydroxyacetone
  phosphate (DHAP) and D-glyceraldehyde-3-phosphate (G3P). By converting the DHAP produced
  by aldolase into G3P, it funnels both triose units into the payoff phase of glycolysis,
  effectively doubling the energetic yield of the pathway, and catalyzes the reverse
  reaction in gluconeogenesis. TIM is a textbook near-perfect, diffusion-limited catalyst
  built on the canonical (beta/alpha)8 TIM-barrel fold and is active only as a homodimer.
  It also suppresses the accumulation of the toxic side-product methylglyoxal, and displays
  a documented minor methylglyoxal-synthase-like activity that generates methylglyoxal from
  DHAP. Loss-of-function of TPI1 causes triosephosphate isomerase deficiency, a severe
  autosomal-recessive disorder featuring chronic hemolytic anemia and progressive
  neurodegeneration/neuromuscular dysfunction that is usually fatal in childhood; the most
  common allele (Glu104Asp) destabilizes the active dimer rather than abolishing catalysis.
