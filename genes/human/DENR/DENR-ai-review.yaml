- description: As an essential subunit of the MCTS1-DENR heterodimer (an eIF2D-like
    non-canonical factor), provides the SUI1 module that delivers aminoacylated tRNA
    into the 40S ribosomal P-site in an eIF2-independent manner to drive translation
    reinitiation after short uORFs.
