      for translation reinitiation
- description: Within the MCTS1-DENR complex, promotes recycling/recovery of post-termination
    40S subunits by promoting dissociation of deacylated tRNA and mRNA after ABCE1-mediated
    ribosome splitting.
  molecular_function:
    id: GO:0003743
    label: translation initiation factor activity
