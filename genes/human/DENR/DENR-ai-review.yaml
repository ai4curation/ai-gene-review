suggested_questions:
- question: What determines the subset of >150 mRNAs whose reinitiation depends on
    MCTS1-DENR, and do uORF features (length, Kozak context, terminator distance) predict
    dependence?
- question: Does phosphorylation of DENR (Ser-73 and other mitotic sites) regulate
    MCTS1-DENR complex assembly or reinitiation activity?
suggested_experiments:
- description: Ribosome profiling in DENR-knockout versus wild-type cells to map reinitiation-dependent
    mORFs genome-wide and define uORF determinants of MCTS1-DENR dependence.
- description: Reconstituted 40S recycling assays with purified DENR/MCTS1, ABCE1 and
    post-termination complexes to quantify the kinetics of deacylated tRNA/mRNA release
    contributed by DENR.
