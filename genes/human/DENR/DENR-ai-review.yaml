id: O43583
gene_symbol: DENR
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: DENR (Density-regulated protein, DRP) is a small cytoplasmic protein
  containing a C-terminal SUI1 (eIF1-like) domain. Together with its obligate partner
  MCTS1 it forms the MCTS1-DENR heterodimer, a non-canonical translation factor that
  is the functional equivalent of eIF2D (Ligatin) split into two polypeptides (MCTS1
  corresponds to the N-terminal half, DENR to the C-terminal SUI1 half of Ligatin).
  The complex acts at the post-termination 40S ribosome to promote translation reinitiation,
  particularly after translation of short upstream ORFs (uORFs), enabling the small
  subunit to resume scanning and initiate at a downstream main ORF. Mechanistically
  the complex (i) promotes dissociation of deacylated tRNA and mRNA from recycled 40S
  subunits following ABCE1-mediated splitting of post-termination complexes, and (ii)
  recruits aminoacylated initiator tRNA into the ribosomal P-site in an eIF2-independent
  manner when the start codon is already positioned in the P-site (as on certain HCV-like
  IRESs and reinitiation events). This activity governs the translation of a defined
  set of mRNAs (including JAK2), and MCTS1-DENR-dependent reinitiation is required for
  IFN-gamma immunity.
