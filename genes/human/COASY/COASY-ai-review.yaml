suggested_questions:
- question: >-
    What is the definitive subcellular distribution and submitochondrial topology of COASY
    (cytosol vs mitochondrial matrix vs inner/outer membrane), and does the mitochondrial
    pool perform local de novo CoA synthesis or serve another role?
- question: >-
    How does EDC4 binding regulate COASY dephospho-CoA kinase activity in vivo, and what is
    the physiological role of processing-body-associated CoA synthesis regulation?
suggested_experiments:
- description: >-
    Compartment-resolved metabolic flux analysis (e.g. isotope-labeled pantothenate) combined
    with organelle fractionation and split-reporter/APEX proximity labeling to quantify the
    relative contribution of cytosolic vs mitochondrial COASY to the CoA pool.
- description: >-
    Structure-function analysis of disease variants (e.g. R499C, A214V) measuring PPAT and
    DPCK activities separately and protein stability, to dissect how NBIA6/PCH12 mutations
    impair CoA biosynthesis.
