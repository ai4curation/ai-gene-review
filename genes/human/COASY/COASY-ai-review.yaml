id: Q13057
gene_symbol: COASY
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  COASY is the human bifunctional coenzyme A synthase, a single polypeptide that
  carries out the last two of the five steps of de novo coenzyme A (CoA) biosynthesis
  from pantothenate (vitamin B5). Its N-terminal/central phosphopantetheine
  adenylyltransferase (PPAT) domain adenylylates (R)-4'-phosphopantetheine using ATP
  to form 3'-dephospho-CoA, and its C-terminal dephospho-CoA kinase (DPCK) domain then
  phosphorylates 3'-dephospho-CoA using ATP to generate CoA. CoA and its acyl-CoA
  thioesters are ubiquitous acyl-group carriers essential for fatty acid metabolism,
  the TCA cycle, and many other pathways. The enzyme functions predominantly in the
  cytosol, where the bulk of de novo CoA synthesis occurs, with a minor pool associated
  with mitochondria. It is expressed in essentially all tissues, with a brain-enriched
  splice isoform. Loss-of-function mutations in COASY cause neurodegeneration with brain
  iron accumulation (COASY protein-associated neurodegeneration, CoPAN/NBIA6) and
  pontocerebellar hypoplasia type 12.
