description: N-acetyl-D-glucosamine kinase (NAGK; GlcNAc kinase, EC 2.7.1.59) is a
  cytosolic sugar kinase of the amino-sugar salvage pathway. It catalyzes the ATP-dependent
  phosphorylation of free N-acetyl-D-glucosamine (GlcNAc) to N-acetyl-D-glucosamine
  6-phosphate (plus ADP and H+), recycling GlcNAc released from the turnover of glycoconjugates
  (lysosomal degradation, O-GlcNAc removal) or obtained from the diet back into the
  hexosamine/UDP-GlcNAc pool at the GlcNAc-6-phosphate node. The enzyme is a homodimer
  of the sugar-kinase/Hsp70/actin (ASKHA) superfamily and is broadly expressed. It
  additionally phosphorylates N-acetyl-D-mannosamine (ManNAc; EC 2.7.1.60) and acts
  in the degradation of the dietary non-human sialic acid N-glycolylneuraminic acid
  (Neu5Gc). In innate immunity, NAGK phosphorylates the C6 hydroxyl of the N-acetylmuramic
  acid moiety of bacterial muramyl dipeptide (MDP) to generate 6-O-phospho-MDP, the
  species that activates the cytosolic pattern-recognition receptor NOD2. NAGK has
  also been reported to have a kinase-independent, structural moonlighting role in
  neurons, promoting dynein-mediated microtubule transport and axodendritic branching
  through interactions with SNRPN and the dynein light chain DYNLRB1.
