core_functions:
- description: Substrate-recognition subunit of an SCF (SKP1-CUL1-F-box) E3 ubiquitin ligase that recognizes an FQ motif in the F-box protein FBXL7 and targets it for K48-linked polyubiquitination (on Lys109) and proteasomal degradation, thereby controlling FBXL7 abundance and limiting FBXL7-driven apoptosis.
