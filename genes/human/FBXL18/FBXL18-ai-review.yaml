suggested_questions:
- question: Beyond FBXL7, what is the broader FBXL18 substrate repertoire, and how is FBXL18-FBXL7 cross-regulation balanced given both are SCF F-box receptors?
- question: How is FBXL18 activity and substrate selection regulated across tissues (notably brain), and do its multiple isoforms have distinct substrate specificities?
suggested_experiments:
- description: Reconstitute SCF-FBXL18 in vitro with FBXL7 to confirm direct K48-linked ubiquitination at Lys109 and the FQ-motif dependence, comparing wild-type FBXL18 to an F-box-deletion mutant.
- description: Identify endogenous FBXL18 substrates by AP-MS and by quantitative proteomics of FBXL18 knockout versus wild-type cells, and test the apoptosis phenotype upon co-modulation of FBXL18 and FBXL7.
