description: >-
  FBXL18 (F-box/LRR-repeat protein 18, FBL18) is a member of the FBXL subfamily
  of F-box proteins, with an N-terminal F-box domain followed by an extensive
  C-terminal leucine-rich repeat (LRR) array. It serves as the
  substrate-recognition subunit of a Cullin-RING (SCF; SKP1-CUL1-F-box) E3
  ubiquitin ligase, docking onto SKP1/CUL1 via its F-box domain and recruiting
  substrates through its LRRs. FBXL18 deploys two distinct ubiquitination modes.
  In a degradative (K48-linked) mode it targets another F-box protein, FBXL7, for
  polyubiquitination and proteasomal degradation, recognizing an N-terminal FQ
  motif in FBXL7 and conjugating ubiquitin onto FBXL7 Lys109; because FBXL7 is
  pro-apoptotic, this turnover limits apoptosis. SCF^FBXL18 (reconstituted with
  SKP1-CUL1-RBX1) also mediates K48-linked degradation of the TFIIH subunit
  XPB/ERCC3 in a drug-triggered, CDK7- and XPB-Ser90-dependent manner
  (spironolactone-induced), thereby impairing nucleotide-excision repair and
  transcription and sensitizing cells to platinum agents. In a second,
  non-degradative (K63-linked) mode FBXL18 ubiquitinates signaling proteins to
  modulate their activity rather than degrade them: it promotes K63-linked
  ubiquitination of AKT (driving AKT-FOXO3a-Bim survival signaling in glioma and
  ovarian cancer) and of PTEN (inhibiting PTEN and activating PI3K/AKT in
  non-small-cell lung cancer), and is frequently upregulated and pro-oncogenic in
  these tumors. Consistent with these roles, FBXL18 has been annotated in both the
  cytoplasm (AKT/PTEN signaling) and the nucleus (XPB/TFIIH). It is broadly
  expressed with enhancement in brain.
