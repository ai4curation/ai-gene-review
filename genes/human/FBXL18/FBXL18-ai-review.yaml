core_functions:
- description: Substrate-recognition subunit of an SCF (SKP1-CUL1-F-box) E3 ubiquitin ligase that targets substrates for K48-linked polyubiquitination and proteasomal degradation. It recognizes an FQ motif in the F-box protein FBXL7 and conjugates ubiquitin onto FBXL7 Lys109, controlling FBXL7 abundance and limiting FBXL7-driven apoptosis; reconstituted SCF^FBXL18 also degrades the TFIIH subunit XPB/ERCC3 (drug-triggered, CDK7/Ser90-dependent), affecting nucleotide-excision repair and transcription.
