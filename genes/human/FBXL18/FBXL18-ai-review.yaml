suggested_questions:
- question: What determines whether FBXL18 attaches degradative K48 chains (FBXL7, XPB) versus non-degradative K63 chains (AKT, PTEN) to a given substrate, and is this substrate-intrinsic or context-dependent?
- question: Beyond FBXL7, XPB, AKT and PTEN, what is the broader FBXL18 substrate repertoire, and how is FBXL18-FBXL7 cross-regulation balanced given both are SCF F-box receptors?
- question: How is FBXL18 activity and substrate selection regulated across tissues (notably brain), and do its multiple isoforms have distinct substrate specificities?
suggested_experiments:
- description: Reconstitute SCF-FBXL18 in vitro with FBXL7 and XPB to confirm direct K48-linked ubiquitination (FBXL7 Lys109, FQ-motif dependence) and contrast with K63-linked ubiquitination of AKT/PTEN, comparing wild-type FBXL18 to an F-box-deletion mutant.
- description: Identify endogenous FBXL18 substrates by AP-MS and by quantitative proteomics of FBXL18 knockout versus wild-type cells, classifying each by ubiquitin-chain linkage type, and test the apoptosis and PI3K/AKT-signaling phenotypes upon co-modulation of FBXL18 with FBXL7, AKT or PTEN.
