description: >-
  FBXL18 (F-box/LRR-repeat protein 18, FBL18) is a member of the FBXL subfamily
  of F-box proteins, with an N-terminal F-box domain followed by an extensive
  C-terminal leucine-rich repeat (LRR) array. It serves as the
  substrate-recognition subunit of a Cullin-RING (SCF; SKP1-CUL1-F-box) E3
  ubiquitin ligase, docking onto SKP1/CUL1 via its F-box domain and recruiting
  substrates through its LRRs for ubiquitination and proteasomal degradation.
  FBXL18 targets another F-box protein, FBXL7, for K48-linked polyubiquitination
  and proteasomal degradation: it recognizes an FQ motif in FBXL7 and conjugates
  ubiquitin onto FBXL7 Lys109. Because FBXL7 is pro-apoptotic, FBXL18-mediated
  turnover of FBXL7 limits apoptosis. FBXL18 is broadly expressed with enhancement
  in brain. Its wider substrate repertoire and physiological roles remain to be
  fully characterized.
