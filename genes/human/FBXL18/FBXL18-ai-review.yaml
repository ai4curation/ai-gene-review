- id: PMID:25654763
  title: F-box protein Fbxl18 mediates polyubiquitylation and proteasomal degradation
    of the pro-apoptotic SCF subunit Fbxl7.
  findings:
  - statement: FBXL18 targets FBXL7 for polyubiquitylation and proteasomal degradation, conjugating ubiquitin onto FBXL7 Lys109 and recognizing an FQ motif in FBXL7; this limits FBXL7-induced apoptosis (FBXL18 depletion accentuates, overexpression attenuates, FBXL7-driven apoptosis).
    reference_section_type: ABSTRACT
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: Full text available; establishes the core FBXL18 substrate (FBXL7), the ubiquitin acceptor site (Lys109), the recognition motif (FQ), and the apoptosis-regulatory consequence.
- id: PMID:33234069
  title: 'The FBXL family of F-box proteins: variations on a theme.'
  findings:
  - statement: FBXL-family F-box proteins serve as substrate-recognition subunits of SCF E3 ubiquitin ligases, using their LRR domains for substrate binding and the F-box for SKP1/CUL1 recruitment.
    reference_section_type: LITERATURE_REVIEW
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: Family-level review (full text available) supporting the general FBXL SCF substrate-receptor model.
- id: file:human/FBXL18/FBXL18-deep-research-falcon.md
  title: Falcon deep research report for human FBXL18
  findings:
  - statement: FBXL18 is an SCF substrate receptor that deploys two modes - degradative K48 polyubiquitination and non-degradative K63 ubiquitination.
    supporting_text: "FBXL18 (Q96ME1) is best annotated as an **SCF-family E3 ubiquitin ligase substrate receptor** that regulates cellular phenotypes by deploying **two mechanistic modes of ubiquitination**"
  - statement: FBXL18 recognizes an N-terminal FQ motif in FBXL7 and uses Lys109 as the ubiquitin acceptor, degrading short-lived FBXL7 to restrain its pro-apoptotic activity.
    supporting_text: "Substrate recognition depends on an N-terminal **FQ docking motif** in FBXL7; mutation of that motif disrupts binding. **Lys109** in FBXL7 was identified as an essential ubiquitin acceptor for FBXL18-mediated ubiquitin conjugation."
  - statement: SCF^FBXL18 mediates K48-linked degradation of the TFIIH subunit XPB/ERCC3 in a drug-triggered, CDK7- and XPB-Ser90-dependent manner, impairing NER.
    supporting_text: "Ueda et al. (Genes to Cells, 2019) established that spironolactone triggers proteasomal degradation of XPB (ERCC3) via **SCF^FBXL18**."
  - statement: FBXL18 promotes non-degradative K63-linked ubiquitination of AKT, enhancing AKT-FOXO3a phosphorylation and suppressing apoptosis via Bim in glioma.
    supporting_text: "FBXL18 physically interacts with AKT and promotes **K63-linked ubiquitination** of AKT (with minimal effect on K48-linked ubiquitination), including reduced EGF-induced K63 ubiquitination upon FBXL18 knockdown."
  - statement: FBXL18 promotes K63-linked ubiquitination of PTEN (non-proteolytic), inhibiting PTEN and activating PI3K/AKT signaling in NSCLC.
    supporting_text: "FBXL18 binds PTEN (mapping interaction to PTEN's **C-terminal region/C-tail and PDZ-binding domain**) and promotes **K63-linked ubiquitination** of PTEN in HEK293T and NSCLC models."
  reference_review:
    relevance: HIGH
    correctness: UNVERIFIED
    review_notes: Falcon (Edison Scientific) deep research synthesis. Substantially expands FBXL18 from the FBXL7/apoptosis story (PMID:25654763) to a dual-mode SCF receptor - K48 degradation of FBXL7 and XPB/ERCC3 (Ueda et al. 2019, reconstituted SCF^FBXL18) and non-degradative K63 ubiquitination of AKT (Zhang et al. 2017; Zhuang et al. 2024) and PTEN (Liu et al. 2024 preprint), with cytoplasmic/nuclear localization. Primary leads cite DOIs not PMIDs and are not all in the local cache (the PTEN paper is a 2024 preprint); treated as leads informing the description and core functions, not overriding the experimental FBXL7 curation.
