  title: F-box protein Fbxl18 mediates polyubiquitylation and proteasomal degradation
    of the pro-apoptotic SCF subunit Fbxl7.
  findings:
  - statement: FBXL18 targets FBXL7 for polyubiquitylation and proteasomal degradation, conjugating ubiquitin onto FBXL7 Lys109 and recognizing an FQ motif in FBXL7; this limits FBXL7-induced apoptosis (FBXL18 depletion accentuates, overexpression attenuates, FBXL7-driven apoptosis).
