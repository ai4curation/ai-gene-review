      SC4MOL/MSMO1 encodes a sterol-C4-methyl oxidase that catalyzes demethylation
      of C4-methylsterols in the cholesterol synthesis pathway; loss-of-function
      mutations cause an autosomal recessive syndrome with psoriasiform
      dermatitis, microcephaly, and developmental delay, with methylsterol
      accumulation.
