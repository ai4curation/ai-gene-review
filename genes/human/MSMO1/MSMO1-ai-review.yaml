id: Q15800
gene_symbol: MSMO1
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  Methylsterol monooxygenase 1 (also called C-4 methylsterol oxidase, SC4MOL, or
  ERG25) is a non-heme di-iron oxygenase of the endoplasmic reticulum membrane
  that catalyzes the sequential three-step oxidation of the C4-methyl group(s) of
  4,4-dimethyl and 4-alpha-methylsterols (methyl to alcohol, aldehyde, then
  carboxylate). This is the oxidative part of the C4-demethylation of sterols in
  cholesterol biosynthesis, and it works together with the C4-decarboxylase/
  3-dehydrogenase NSDHL. It is a multi-pass membrane protein belonging to the
  sterol desaturase / fatty acid hydroxylase family, with three histidine-box
  motifs that coordinate the di-iron center; it uses cytochrome b5 as the electron
  donor. Loss of function causes MSMO1 (SC4MOL) deficiency, an autosomal recessive
  disorder (microcephaly, congenital cataract, and psoriasiform dermatitis)
  characterized by accumulation of methylsterols.
