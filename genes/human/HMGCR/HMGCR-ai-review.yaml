id: P04035
gene_symbol: HMGCR
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  HMGCR encodes 3-hydroxy-3-methylglutaryl-coenzyme A reductase (HMG-CoA reductase;
  EC 1.1.1.34), the rate-limiting and committed enzyme of the mevalonate pathway.
  It catalyzes the NADPH-dependent reduction of (3S)-3-hydroxy-3-methylglutaryl-CoA
  (HMG-CoA) to (R)-mevalonate and CoA, a two-step, four-electron reaction consuming
  two molecules of NADPH. Mevalonate is the precursor for cholesterol, dolichol,
  ubiquinone and the prenyl groups (farnesyl/geranylgeranyl) used in protein
  prenylation, so HMGCR sits at the head of sterol and non-sterol isoprenoid
  biosynthesis. HMGCR is a polytopic (multi-pass) endoplasmic reticulum membrane
  protein of 888 residues: its N-terminal membrane-anchored region contains a
  sterol-sensing domain that, together with INSIG proteins and SREBP/SCAP, mediates
  sterol-accelerated ubiquitination and ER-associated degradation and feedback
  regulation of the enzyme, while the C-terminal cytosolic domain is catalytic and
  assembles into homodimers/homotetramers. HMGCR is the molecular target of the
  statin class of cholesterol-lowering drugs, which act as competitive inhibitors
  at the HMG-CoA/cofactor site. Bi-allelic loss-of-function HMGCR variants cause an
  autosomal-recessive limb-girdle muscular dystrophy (LGMDR28).
