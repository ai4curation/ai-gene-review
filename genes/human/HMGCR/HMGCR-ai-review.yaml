      the committed step in the biosynthesis of sterols and isoprenoids
proposed_new_terms: []
suggested_questions:
- question: >-
    Is the reported peroxisomal pool of HMGCR functionally significant, or is HMGCR
    activity essentially entirely ER-membrane-based in human cells?
- question: >-
    To what extent do the orthology-transferred regulatory roles (negative regulation
    of protein secretion/catabolism, amyloid-beta clearance) reflect direct HMGCR
    effects versus indirect consequences of altered cholesterol/isoprenoid levels?
suggested_experiments:
- description: >-
    Quantify the relative contribution of ER versus peroxisomal HMGCR to cellular
    mevalonate/cholesterol synthesis using compartment-targeted assays or organelle
    fractionation combined with isotopic flux analysis.
- description: >-
    Structurally and enzymatically characterize LGMDR28 disease variants to relate
    catalytic/thermal-stability defects to muscle phenotype and mevalonolactone rescue.
