    Production of mevalonate as the precursor for non-sterol isoprenoids (dolichol,
    ubiquinone, and farnesyl/geranylgeranyl prenyl groups), placing HMGCR at the head
    of isoprenoid biosynthesis in addition to cholesterol/sterol synthesis.
  molecular_function:
