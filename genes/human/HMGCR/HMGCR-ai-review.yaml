core_functions:
- description: >-
    NADPH-dependent reduction of (3S)-3-hydroxy-3-methylglutaryl-CoA to (R)-mevalonate
    and CoA, the rate-limiting and committed step of the mevalonate pathway, performed
    by the cytosolic catalytic domain of HMGCR (assembled as homodimers/homotetramers)
    at the endoplasmic reticulum membrane.
