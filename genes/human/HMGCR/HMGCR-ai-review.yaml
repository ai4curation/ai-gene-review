- term:
    id: GO:0005778
    label: peroxisomal membrane
  evidence_type: IDA
  original_reference_id: PMID:17180682
  qualifier: located_in
  review:
    summary: >-
      Experimental (immunofluorescence/isotopic) evidence localizing the pre-squalene
      isoprenoid segment, including HMGCR, to peroxisomes in human cells.
    action: KEEP_AS_NON_CORE
    reason: >-
      This is an experimental annotation and is retained. However, peroxisomal
      localization of the pre-squalene cholesterol-biosynthetic enzymes is contested
      in the literature and is secondary to the dominant ER membrane pool that mediates
      HMGCR's regulated activity. Marked non-core rather than accepted as a primary site.
    supported_by:
    - reference_id: PMID:17180682
      supporting_text: >-
        isoprenoid/cholesterol biosynthetic pathway occur in peroxisomes
