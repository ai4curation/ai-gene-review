  review:
    summary: >-
      Phylogenetic assignment of HMGCR to the peroxisomal membrane. A peroxisomal
      pool of pre-squalene mevalonate-pathway enzymes has been reported, but this
      localization is contested and secondary to the dominant ER membrane pool.
    action: KEEP_AS_NON_CORE
    reason: >-
      Retained because there is experimental support for a peroxisomal pool of
      pre-squalene isoprenoid enzymes, but peroxisomal localization of these enzymes
