- id: PMID:15220348
  title: Mammalian wax biosynthesis. I. Identification of two fatty acyl-Coenzyme
    A reductases with different substrate specificities and tissue distributions.
  findings:
  - statement: >-
      FAR2 was identified as a fatty acyl-CoA reductase that reduces fatty acids to
      fatty alcohols, preferring saturated C16/C18 fatty acids, and localizes to the
      peroxisome.
    reference_section_type: ABSTRACT
    supporting_text: >-
      FAR1 and FAR2 cDNAs encoded isozymes that reduced fatty acids to fatty
      alcohols. Fatty acyl-CoA esters were the substrate of FAR1, and the enzyme
      required NADPH as a cofactor.
  - statement: >-
      FAR2 mRNA is restricted, most abundant in the eyelid (wax-laden Meibomian
      glands), and is present in brain.
    reference_section_type: ABSTRACT
    supporting_text: >-
      The FAR2 mRNA was more restricted in distribution and most abundant in the
      eyelid, which contains wax-laden meibomian glands.
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified primary paper that first identified FAR2, established its
      alcohol-forming reductase activity, saturated C16/C18 substrate preference,
      peroxisomal localization, and Meibomian/brain tissue distribution. Cache is
      abstract-only but the abstract directly supports the FAR2 annotations.
- id: PMID:24108123
  title: Topogenesis and homeostasis of fatty acyl-CoA reductase 1.
  findings:
  - statement: >-
      FAR1 and FAR2 are peroxisomal proteins; the study characterizes FAR1 as a
      tail-anchored peroxisomal membrane protein and uses FAR2 as a comparator,
      supporting FAR2 peroxisomal membrane localization.
    reference_section_type: ABSTRACT
    supporting_text: >-
      Far1, but not Far2, was preferentially degraded in response to the cellular
      level of plasmalogens.
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: >-
      Full text available. Primarily a FAR1 topogenesis/homeostasis study; FAR2
      appears as a comparator (e.g. not preferentially degraded with plasmalogen
      level). Supports peroxisomal membrane localization of FAR2 but is not a
      FAR2-centric functional characterization.
- id: Reactome:R-HSA-390438
  title: FAR2 reduces PalmCoA to HXOL
  findings:
  - statement: >-
      FAR2 catalyzes reduction of palmitoyl-CoA plus NADPH to hexadecanol, CoASH,
      and NADP+ in the peroxisome.
    reference_section_type: OTHER
    supporting_text: >-
      Peroxisomal fatty acyl-CoA reductase 2 (FAR2) catalyzes the reaction of
      palmitoyl-CoA (PalmCoA) and 2 NADPH + 2 H+ to form hexadecanol (HXOL), CoASH,
      and 2 NADP+.
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Reactome reaction capturing FAR2's specific C16 (palmitoyl-CoA to hexadecanol)
      alcohol-forming reductase activity in the peroxisome.
- id: Reactome:R-HSA-9640463
  title: Wax biosynthesis
  findings:
  - statement: >-
      FAR1 and FAR2 reduce fatty acids to fatty alcohols in the peroxisome upstream
      of AWAT-catalyzed wax ester formation in the cytosol.
    reference_section_type: OTHER
    supporting_text: >-
      FAR1 and FAR2 catalyze the reduction of fatty acids to fatty alcohols in the
      peroxisome and AWAT1 and AWAT2 catalyze the reaction of fatty alcohols and
      acyl-CoA in the cytosol to form wax esters.
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Reactome pathway placing FAR2 at the fatty-alcohol-generating step of wax
      biosynthesis.
