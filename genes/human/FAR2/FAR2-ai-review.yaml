description: >-
  FAR2 (fatty acyl-CoA reductase 2) is a peroxisomal, NADPH-dependent,
  alcohol-forming fatty acyl-CoA reductase (EC 1.2.1.84) and a paralog of FAR1.
  It reduces a fatty acyl-CoA to the corresponding primary fatty alcohol with
  release of CoA. FAR2 has a more saturation-restricted substrate preference
  than FAR1, favoring saturated C16/C18 acyl-CoA (with lower activity on shorter
  chains), and can also generate very-long-chain and ultra-long-chain fatty
  alcohols, including branched-chain species. The fatty alcohols it produces are
  substrates for wax monoester synthesis and for ether lipid (plasmalogen)
  biosynthesis. FAR2 is a single-pass, tail-anchored peroxisomal membrane protein
  with a large cytoplasmic N-terminal catalytic region and a short C-terminal tail
  in the peroxisomal lumen. Its mRNA has a restricted tissue distribution, being
  most abundant in the eyelid, where wax-laden Meibomian glands produce meibum
  lipids, and is also present in brain, a tissue rich in ether lipids.
