proposed_new_terms:
- proposed_name: fatty alcohol biosynthetic process
  proposed_definition: >-
    The chemical reactions and pathways resulting in the formation of fatty
    alcohol. (Existing term GO:1903175; proposed here as a more direct
    product-level process annotation for FAR2, which is not currently in GOA.)
  justification: >-
    FAR2 directly produces primary fatty alcohols from fatty acyl-CoA. GOA currently
    annotates the substrate side (GO:0035336 long-chain fatty-acyl-CoA metabolic
    process) and downstream products (GO:0010025 wax biosynthetic process) but not
    the fatty alcohol biosynthetic process itself (GO:1903175), which is the most
    direct product-level process term for this enzyme.
  supported_by:
  - reference_id: PMID:15220348
    supporting_text: >-
      FAR1 and FAR2 cDNAs encoded isozymes that reduced fatty acids to fatty
      alcohols
- proposed_name: ether lipid biosynthetic process
  proposed_definition: >-
    The chemical reactions and pathways resulting in the formation of ether lipids.
    (Existing term GO:0008611; proposed here to capture FAR2's documented role in
    supplying fatty alcohols for ether lipid/plasmalogen synthesis, not currently
    in GOA.)
  justification: >-
    UniProt states FAR2 is involved in the production of ether lipids/plasmalogens,
    whose synthesis requires fatty alcohols as substrates. An ether lipid
    biosynthetic process annotation (GO:0008611) would capture this documented role,
    which is not currently represented in GOA.
  supported_by:
  - reference_id: file:human/FAR2/FAR2-uniprot.txt
    supporting_text: >-
      Involved in the production of ether
suggested_questions:
- question: >-
    What is the relative in vivo contribution of FAR2 versus FAR1 to Meibomian
    gland (meibum) fatty alcohol pools, and does FAR2 loss produce a distinct
    Meibomian/ocular-surface phenotype?
- question: >-
    Does human FAR2 physiologically produce very-long-chain and ultra-long-chain
    fatty alcohols in tissues, or is this activity mainly observed under
    overexpression conditions?
suggested_experiments:
- description: >-
    Quantify chain-length and saturation preferences of purified human FAR2 across
    a panel of acyl-CoA substrates (C16-C30, saturated/unsaturated, branched) with
    NADPH, to firmly establish the in vitro substrate spectrum underlying the
    long-chain vs very-long-chain reductase annotations.
- description: >-
    Tissue-specific FAR2 knockout (e.g. Meibomian gland) with lipidomic profiling
    of fatty alcohols, wax monoesters, and ether lipids/plasmalogens to define the
    non-redundant biological role of FAR2 relative to FAR1.
