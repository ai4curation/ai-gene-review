core_functions:
- description: Direct inhibition of the lysosomal TMEM175 cation/proton channel 
    to limit proton leak and support acidic lysosomal lumen pH.
  molecular_function:
    id: GO:0008200
    label: ion channel inhibitor activity
  directly_involved_in:
  - id: GO:0007042
    label: lysosomal lumen acidification
  locations:
  - id: GO:0005765
    label: lysosomal membrane
  supported_by:
  - reference_id: PMID:37390818
    supporting_text: directly interact with and inhibit the activity of the 
      lysosomal cation channel TMEM175
  - reference_id: PMID:37390818
    supporting_text: facilitates lysosomal acidification to a lower pH 
      environment
  - reference_id: file:human/LAMP1/LAMP1-uniprot.txt
    supporting_text: Acts as a direct inhibitor of the proton channel TMEM175
proposed_new_terms:
- proposed_name: lysosomal proton channel inhibitor activity
  proposed_definition: An ion channel inhibitor activity that decreases the 
    activity of a proton-conducting channel in the lysosomal membrane.
  justification: LAMP1 inhibits TMEM175 proton leak channel activity, but the 
    current available GO term is only broad ion channel inhibitor activity.
  proposed_parent:
    id: GO:0008200
    label: ion channel inhibitor activity
  supported_by:
  - reference_id: PMID:37390818
    supporting_text: directly interact with and inhibit the activity of the 
      lysosomal cation channel TMEM175
  - reference_id: PMID:37390818
    supporting_text: facilitates lysosomal acidification to a lower pH 
      environment
  - reference_id: file:human/LAMP1/LAMP1-uniprot.txt
    supporting_text: Acts as a direct inhibitor of the proton channel TMEM175
suggested_questions:
- question: Does the LAMP1-specific clathrin recruitment evidence in ALR warrant
    a direct lysosome organization or future autophagic lysosome reformation 
    annotation?
  experts:
  - Li Yu
  - Yongliang Rong
- question: Should GO add a proton-channel-specific child term under ion channel
    inhibitor activity for LAMP1-TMEM175 regulation?
  experts:
  - Youxing Jiang
  - GO molecular function editors
- question: How much of the lysosomal pH phenotype is LAMP1-specific versus 
    redundant with LAMP2 in different human cell types?
  experts:
  - Youxing Jiang
  - Paul Saftig
suggested_experiments:
- description: Rescue LAMP1/LAMP2-deficient cells with LAMP1 mutants that 
    disrupt TMEM175 binding while measuring lysosomal pH, TMEM175 currents, and 
    hydrolase activity.
  experiment_type: genetic rescue/electrophysiology/lysosomal pH imaging
  hypothesis: The LAMP1-TMEM175 interaction is required for LAMP1-dependent 
    lysosomal acidification.
- description: Test LAMP1 cytosolic-tail or glycan mutants during 
    starvation-refeeding ALR and quantify clathrin recruitment, autolysosome 
    tubulation, and proto-lysosome budding.
  experiment_type: live-cell imaging/rescue mutagenesis
  hypothesis: A LAMP1-dependent membrane cue recruits or stabilizes clathrin 
    machinery during ALR morphology remodeling.
- description: Separate perforin trafficking from lytic granule exocytosis in 
    LAMP1-depleted NK cells using perforin localization, granule motility, 
    degranulation, and target-cell killing assays.
  experiment_type: NK-cell RNAi/rescue microscopy/cytotoxicity assay
  hypothesis: LAMP1 supports NK cytotoxicity primarily through perforin delivery
    and lytic granule movement rather than a general degranulation mechanism.
