id: P11279
gene_symbol: LAMP1
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: 'LAMP1 encodes lysosome-associated membrane glycoprotein 1, an abundant
  heavily glycosylated single-pass membrane protein of lysosomes, late endosomes,
  and lysosome-related secretory granules. Its most informative current molecular
  function is direct inhibition of the lysosomal TMEM175 cation/proton channel, supporting
  lysosomal lumen acidification and hydrolase activity. Existing GOA correctly captures
  lysosomal membrane, late endosome membrane, lysosomal lumen acidification, and broad
  ion channel inhibitor activity. Broad lysosome, endosome, membrane, and generic
  binding annotations should be narrowed, while NK-cell cytotoxicity, TAPL/ABCB9 stabilization,
  Lassa virus receptor activity, plasma membrane exposure, and lysosome-related granule
  locations are secondary contexts. The Proteostasis Network ALR morphology row is
  useful search context but does not by itself justify a new ALR annotation for LAMP1.'
