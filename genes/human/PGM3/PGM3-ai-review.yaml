    label: hemopoiesis
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: involved_in
  review:
    summary: >-
      Phylogenetic (IBA) annotation to hemopoiesis, propagated from the mouse ortholog
      (MGI:97566). PGM3 is a ubiquitous housekeeping metabolic enzyme; its requirement
      in hematopoiesis is an indirect, tissue-level consequence of UDP-GlcNAc supply
      rather than a distinct molecular activity of the protein. In mice, Pgm3-mediated
      UDP-GlcNAc synthesis is essential for hematopoiesis, and human patients show
      lymphopenia and bone-marrow failure.
    action: KEEP_AS_NON_CORE
    reason: >-
      This is a downstream/pleiotropic developmental process reflecting the general
      requirement for glycosylation precursor supply, not the core biochemical function
      of PGM3. Retain as non-core context.
    supported_by:
    - reference_id: PMID:24698316
      supporting_text: >-
