id: O95394
gene_symbol: PGM3
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  PGM3 (also called AGM1 or phosphoacetylglucosamine mutase, PAGM) is a cytosolic,
  Mg2+-dependent enzyme of the alpha-D-phosphohexomutase superfamily that catalyzes
  the reversible interconversion of N-acetyl-D-glucosamine 6-phosphate (GlcNAc-6-P)
  and N-acetyl-alpha-D-glucosamine 1-phosphate (GlcNAc-1-P) (EC 5.4.2.3). This is
  the third step of the hexosamine biosynthetic pathway; the GlcNAc-1-P product is
  the substrate of UDP-N-acetylglucosamine pyrophosphorylase (UAP1), which generates
  UDP-GlcNAc, the activated sugar-nucleotide donor used across N-linked and O-linked
  protein glycosylation, proteoglycan and glycolipid synthesis, GPI-anchor assembly,
  and nucleocytoplasmic O-GlcNAcylation. Like other phosphohexomutases, PGM3 uses an
  intramolecular phosphoryl-transfer mechanism proceeding through a phospho-serine
  enzyme intermediate (active-site Ser64) and a glucose-1,6-bisphosphate /
  GlcNAc-1,6-bisphosphate cofactor, with a bound Mg2+ ion required for catalysis.
  It is broadly expressed across human tissues. Biallelic hypomorphic PGM3 variants
  cause a congenital disorder of glycosylation (PGM3-CDG; immunodeficiency-23,
  MIM:615816) presenting with severe atopy and elevated serum IgE, recurrent
  bacterial and viral infections, T- and B-cell lymphopenia, autoimmunity, skeletal
  dysplasia, and neurocognitive impairment with hypomyelination.
