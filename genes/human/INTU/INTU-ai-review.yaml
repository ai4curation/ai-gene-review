proposed_new_terms:
  - proposed_name: INTU-FUZ GEF activity toward Rab23 — candidate
      GO:0005085 (guanyl-nucleotide exchange factor activity) annotation
    proposed_definition: |
      Per PR #760 review feedback: falcon deep research and PMID:35427153
      (Langousis 2022) discussion surface a candidate INTU-FUZ GEF activity
      toward Rab23. Direct biochemical confirmation in human INTU is
      pending, but the literature signal warrants flagging this molecular
      function as a candidate NEW annotation (GO:0005085 guanyl-nucleotide
      exchange factor activity, or a more specific GTPase-family-specific
      child) once direct evidence is available. Captured here in
      proposed_new_terms because no GO annotation currently captures this
      potential molecular function for INTU.
    supported_by:
      - reference_id: PMID:35427153
        supporting_text: |
          CPLANE proteins are thought to govern ciliogenesis via multiple
          mechanisms including actin regulation (23, 24, 26, 27), septin
          modulation (25), IFT-A complex assembly (19), and Rab23
          activation (28).
suggested_questions:
  - question: How does INTU regulate intraflagellar transport and what specific 
      cargo does it help transport within cilia?
  - question: What are the molecular mechanisms by which INTU coordinates 
      ciliary assembly with cell cycle progression?
  - question: How do mutations in INTU lead to left-right asymmetry defects and 
      what role does it play in nodal cilia function?
  - question: What determines the specificity of INTU interactions with 
      different intraflagellar transport complexes?
suggested_experiments:
  - description: Super-resolution microscopy to track INTU and IFT particle 
      movements along the ciliary axoneme with nanometer precision
  - description: Biochemical reconstitution of IFT complexes containing INTU to 
      study cargo loading and transport mechanisms in vitro
  - description: Developmental analysis of left-right patterning in INTU mutant 
      embryos using whole-mount in situ hybridization
