  - term:
      id: GO:0035091
      label: phosphatidylinositol binding
    evidence_type: IEA
    original_reference_id: GO_REF:0000107
    review:
      summary: Bioinformatically predicted phosphatidylinositol binding
        capacity. Now experimentally validated by Langousis et al. 2022
        (PMID:35427153), which showed direct PIP-strip binding by recombinant
        human/mouse CPLANE complexes and by individual MmIntu, with a clear
        preference for PI(3)P. A more specific replacement term
        (phosphatidylinositol-3-phosphate binding, GO:0032266) better captures
        this biochemical specificity.
      action: MODIFY
      reason: PMID:35427153 demonstrates that CPLANE proteins, including INTU,
        bind PI(3)P preferentially over other phosphoinositides, with INTU
        binding mediated by the N-terminal ~300 residues. The more specific
        GO:0032266 term captures this validated specificity.
      proposed_replacement_terms:
        - id: GO:0032266
          label: phosphatidylinositol-3-phosphate binding
      supported_by:
        - reference_id: PMID:35427153
          supporting_text: the crescent-shaped CPLANE complex binds
            phospholipids such as phosphatidylinositol 3-phosphate via
            multiple modules and a CPLANE ciliopathy mutant exhibits aberrant
            lipid binding.
          reference_section_type: ABSTRACT
        - reference_id: PMID:35427153
          supporting_text: MmIntu uses the N-terminal ~300 amino acids to bind
            PIPs, with a 47– to 267–amino acid construct being competent for
            binding
          reference_section_type: RESULTS
