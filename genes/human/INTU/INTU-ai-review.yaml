  - id: file:human/INTU/INTU-deep-research-falcon.md
    title: Falcon (Edison) deep research on INTU function
    findings:
      - statement: INTU is a core CPLANE subunit that is best supported as a
          basal-body localized scaffold/effector recruiting and organizing IFT
          machinery (notably IFT-A subset) to enable ciliogenesis; structural
          work places an Intu-Fuz heterodimer within a crescent-like CPLANE
          complex, and CPLANE proteins show phosphoinositide binding with a
          preference for PI(3)P, consistent with operating on PI(3)P-rich
          vesicles near the nascent ciliary vesicle/base of cilia.
        supporting_text: INTU is best supported as a basal-body localized
          CPLANE scaffold/effector that recruits/organizes IFT machinery
          (notably IFT-A subset effects) and thereby enables ciliogenesis.
  - id: PMID:35427153
    title: Structure of the ciliogenesis-associated CPLANE complex.
    findings:
      - statement: The mammalian CPLANE complex is a biochemically stable
          Wdpcp-Inturned-Fuzzy assembly resolved by cryo-EM at ~3.35 Å, with
          INTU contributing PDZ and three longin-like domains (LD1-LD3) that
          form extensive interfaces with Wdpcp and Fuz; the complex adopts a
          crescent-like architecture in which the Intu-Fuz heterodimer is a
          major architectural element.
        supporting_text: mammalian CPLANE proteins comprise a bona fide complex
          and report the near-atomic resolution structures of the human
          Wdpcp-Inturned-Fuzzy complex and of the mouse Wdpcp-Inturned-Fuzzy
          complex bound to the small guanosine triphosphatase Rsg1.
        reference_section_type: ABSTRACT
      - statement: CPLANE proteins, including INTU, directly bind
          phosphoinositides with a clear preference for PI(3)P; the N-terminal
          ~300 residues of INTU (encompassing the PDZ region) mediate the
          strongest PIP binding, providing experimental support for INTU's
          phosphatidylinositol binding annotation and refining it to PI(3)P
          binding linked to membrane association at the ciliary base.
        supporting_text: the crescent-shaped CPLANE complex binds phospholipids
          such as phosphatidylinositol 3-phosphate via multiple modules and a
          CPLANE ciliopathy mutant exhibits aberrant lipid binding.
        reference_section_type: ABSTRACT
      - statement: CPLANE proteins act at late stages of ciliogenesis — CPLANE,
          Rsg1, and Rab23 mutants initiate cilium assembly but arrest at the
          ciliary vesicle (CV) stage — supporting a role for INTU in vesicle-
          stage ciliogenesis rather than in mature axonemal transport.
        supporting_text: CPLANE proteins likely operate at late phases of
          ciliogenesis since CPLANE, Rsg1, and Rab23 mutants initiate cilium
          assembly yet arrest at the CV stage
        reference_section_type: INTRODUCTION
