  - term:
      id: GO:0001736
      label: establishment of planar polarity
    evidence_type: IEA
    original_reference_id: GO_REF:0000002
    review:
      summary: INTU is a planar cell polarity effector protein that controls 
        ciliary orientation through its effects on basal body positioning and 
        the subapical actin network. This is well-supported by experimental 
        evidence showing INTU controls rotational polarity of cilia in 
        multiciliated cells (PMID:26644512).
      action: ACCEPT
      reason: PMID:26644512 demonstrated that INTU is essential for establishing
        planar cell polarity by linking NPHP4 to DAAM1 to control the subapical 
        actin network required for proper ciliary orientation in multiciliated 
        cells.
      supported_by:
        - reference_id: PMID:26644512
          supporting_text: The polarity protein Inturned links NPHP4 to Daam1 to
            control the subapical actin network in multiciliated cells
          reference_section_type: TITLE
