id: Q9ULD6
gene_symbol: INTU
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: INTU (Inturned) is a scaffold protein that functions as a core 
  component of the CPLANE (ciliogenesis and planar polarity effector) complex at
  basal bodies, where it recruits intraflagellar transport machinery, 
  specifically IFT-A proteins. INTU also serves as an adaptor linking ciliary 
  proteins (NPHP4) to actin-modifying proteins (DAAM1) to control the subapical 
  actin network required for basal body docking and ciliary orientation. 
  Essential for primary cilia assembly and Hedgehog signaling, INTU is mutated 
  in ciliopathies including Oral-Facial-Digital syndrome XVII and Short-Rib 
  Thoracic Dysplasia 20.
existing_annotations:
  - term:
      id: GO:0005737
      label: cytoplasm
    evidence_type: IBA
    original_reference_id: GO_REF:0000033
    review:
      summary: IBA annotation for cytoplasmic localization is supported by 
        experimental evidence. INTU has cytosolic fractions when not assembled 
        at cilia and likely shuttles between cytosol and ciliary base. The deep 
        research confirms cytosolic localization (GO_REF:0000052).
      action: ACCEPT
      reason: GO_REF:0000052 provides direct immunofluorescence evidence for 
        cytoplasmic localization, and PMID:27158779 shows INTU can exist in 
        cytosolic pools when not assembled at ciliary structures.
      supported_by:
        - reference_id: PMID:27158779
          supporting_text: The ciliopathy-associated CPLANE proteins direct 
            basal body recruitment of intraflagellar transport machinery
          reference_section_type: ABSTRACT
        - reference_id: file:human/INTU/INTU-deep-research.md
          supporting_text: See deep research file for comprehensive analysis
  - term:
      id: GO:0060271
      label: cilium assembly
    evidence_type: IBA
    original_reference_id: GO_REF:0000033
    review:
      summary: Core function strongly supported by multiple experimental
        studies. INTU is essential for ciliogenesis through its role in the
        CPLANE complex recruiting IFT-A machinery to basal bodies
        (PMID:27158779). Structural and biochemical work confirms INTU as a
        bona fide CPLANE complex subunit acting at late ciliogenesis stages
        (PMID:35427153). Mouse knockouts lack primary cilia, and human
        mutations cause ciliopathies.
      action: ACCEPT
      reason: PMID:27158779 demonstrated INTU is a core component of the CPLANE
        complex that recruits IFT-A proteins to basal bodies, with knockout mice
        showing complete absence of primary cilia and human mutations causing
        OFD syndrome XVII. PMID:35427153 confirms biochemical CPLANE complex
        assembly and acts at the ciliary vesicle stage of ciliogenesis.
      supported_by:
        - reference_id: PMID:27158779
          supporting_text: The ciliopathy-associated CPLANE proteins direct
            basal body recruitment of intraflagellar transport machinery
          reference_section_type: TITLE
        - reference_id: PMID:35427153
          supporting_text: Dysfunctional cilia cause pleiotropic human diseases
            termed ciliopathies. These hereditary maladies are often caused by
            defects in cilia assembly, a complex event that is regulated by the
            ciliogenesis and planar polarity effector (CPLANE) proteins Wdpcp,
            Inturned, and Fuzzy.
          reference_section_type: ABSTRACT
  - term:
      id: GO:0005929
      label: cilium
    evidence_type: IBA
    original_reference_id: GO_REF:0000033
    review:
      summary: While INTU localizes primarily at the basal body/ciliary base 
        rather than within the cilium proper, this broader cellular component 
        term is acceptable as INTU is functionally associated with ciliary 
        structures. More specific localization would be ciliary basal body 
        (GO:0036064).
      action: MODIFY
      reason: PMID:26644512 and PMID:27158779 demonstrate that INTU specifically
        localizes to ciliary basal bodies rather than within the cilium itself. 
        GO:0036064 more accurately captures this specific localization.
      proposed_replacement_terms:
        - id: GO:0036064
          label: ciliary basal body
      supported_by:
        - reference_id: PMID:26644512
          supporting_text: The polarity protein Inturned links NPHP4 to Daam1 to
            control the subapical actin network in multiciliated cells
          reference_section_type: TITLE
  - term:
