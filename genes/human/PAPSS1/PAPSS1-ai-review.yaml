proposed_new_terms: []
suggested_questions:
- question: >-
    Are the cytosolic and nuclear pools of PAPSS1 functionally distinct, and does
    nuclear PAPS synthesis supply a compartment-specific set of sulfotransferase
    reactions?
- question: >-
    What is the physiological non-redundancy between PAPSS1 and PAPSS2 in humans,
    given that PAPSS2 loss causes skeletal dysplasia while PAPSS1 is broadly
    expressed?
suggested_experiments:
- description: >-
    Tissue- and compartment-resolved metabolomic quantification of APS and PAPS
    following selective PAPSS1 vs PAPSS2 knockdown, to define the relative
    contributions of the two paralogs to the cellular PAPS pool.
- description: >-
    Structure-guided mutagenesis of the interdomain interface to test the proposed
    communication mechanism whereby the ATP sulfurylase domain modulates APS-kinase
    substrate inhibition.
