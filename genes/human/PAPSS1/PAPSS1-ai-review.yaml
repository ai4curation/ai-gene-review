      This TAS annotation is mis-attributed. The cited paper (PMID:9771708) is
      about the paralog PAPSS2 / ATPSK2, the gene mutated in human
      spondyloepimetaphyseal dysplasia and in the brachymorphic mouse; the
      cartilage/skeletal phenotype is a PAPSS2-specific function. PAPSS1 is broadly
      expressed and this reference does not concern PAPSS1. Skeletal system
      development is not a core PAPSS1 function. Non-experimental (TAS) and the
      cited source is about a different gene; marked as over-annotated.
    action: MARK_AS_OVER_ANNOTATED
    supported_by:
    - reference_id: PMID:9771708
      supporting_text: >-
        We identified two orthologous genes, ATPSK2 and Atpsk2, encoding novel ATP
        sulfurylase/APS kinase orthologues in the respective regions of the human
        and mouse genomes.
