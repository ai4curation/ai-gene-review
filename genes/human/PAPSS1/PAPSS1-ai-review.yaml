- id: PMID:10657990
  title: 'Nuclear localization of PAPS synthetase 1: a sulfate activation pathway
    in the nucleus of eukaryotic cells.'
  findings:
  - statement: >-
      PAPSS1 accumulates in the nucleus of mammalian cells; nuclear targeting is
      mediated by the APS kinase domain and a catalytically dispensable N-terminal
      21-amino-acid sequence, indicating a nuclear sulfate-activation pathway.
    reference_section_type: ABSTRACT
    supporting_text: >-
      Nuclear targeting of the enzyme is mediated by its APS kinase domain and
      requires a catalytically dispensable 21 amino acid sequence at the amino
      terminus.
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified; establishes nuclear localization of PAPSS1. Abstract-only
      cache.
- id: PMID:14747722
  title: Expression, purification and crystallization of human 3'-phosphoadenosine-5'-phosphosulfate
    synthetase 1.
  findings:
  - statement: >-
      Purified full-length human PAPSS1 is a homodimer and is catalytically active,
      forming 25 nmol PAPS per minute per milligram, confirming both catalytic
      steps of PAPS synthesis.
    reference_section_type: ABSTRACT
    supporting_text: >-
      The pure protein migrates as a dimer in gel-filtration chromatography. It is
      moderately active, forming 25 nmol PAPS per minute per milligram.
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified; supports homodimer, PAPS synthesis, and both catalytic MFs.
- id: PMID:17276460
  title: Elucidation of the active conformation of the APS-kinase domain of human
    PAPS synthetase 1.
  findings:
  - statement: >-
      Crystal structure of the PAPSS1 APS-kinase domain in the Michaelis complex
      with ADP-Mg and PAPS defines the active conformation and catalytic residues
      of the second (APS kinase) step.
    reference_section_type: ABSTRACT
    supporting_text: >-
      The former reaction is catalyzed by the ATP-sulfurylase domain and the latter
      by the APS-kinase domain.
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified; structural support for APS kinase activity.
- id: PMID:17540769
  title: Structural mechanism for substrate inhibition of the adenosine 5'-phosphosulfate
    kinase domain of human 3'-phosphoadenosine 5'-phosphosulfate synthetase 1 and
    its ramifications for enzyme regulation.
  findings:
  - statement: >-
      The APS kinase domain catalyzes the second step of PAPS synthesis and is
      uncompetitively inhibited by its substrate APS; the ATP sulfurylase domain
      influences this regulation, suggesting interdomain communication.
    reference_section_type: ABSTRACT
    supporting_text: >-
      The APS kinase domain of PAPS synthetase catalyzes the second step in which
      APS, the product of the ATP-sulfurylase domain, is phosphorylated on its
      3'-hydroxyl group to yield PAPS.
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified; supports APS kinase activity and its regulation.
- id: PMID:22242175
  title: Human PAPS synthase isoforms are dynamically regulated enzymes with access
    to nucleus and cytoplasm.
  findings:
  - statement: >-
      Human PAPS synthases (including PAPSS1) are dynamically regulated enzymes with
      access to both the nucleus and the cytoplasm.
    reference_section_type: TITLE
    supporting_text: >-
      Human PAPS synthase isoforms are dynamically regulated enzymes with access to
      nucleus and cytoplasm
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified; supports both nuclear and cytosolic localization (IDA
      source for the localization annotations).
- id: PMID:23207770
  title: 'Ethanol sulfation by the human cytosolic sulfotransferases: a systematic
    analysis.'
  findings:
  - statement: >-
      Systematic analysis of ethanol sulfation by human cytosolic sulfotransferases
      (SULTs), using [35S]sulfate metabolic labeling; characterizes SULT enzymes
      rather than directly assaying PAPSS1 enzymology.
    reference_section_type: ABSTRACT
    supporting_text: >-
      A systematic analysis revealed four ethanol-sulfating SULTs, SULT1A1,
      SULT1A2, SULT1A3, and SULT1C4, among the eleven human SULT enzymes previously
      prepared and purified.
  reference_review:
    relevance: LOW
    correctness: MISCITED
    review_notes: >-
      PubMed-verified paper, but it studies SULT sulfotransferases and 35S-sulfate
      labeling; it is a weak/indirect source for the PAPSS1 APS-kinase and
      PAPS-biosynthesis IDA annotations attributed to it (CAFA-assigned).
- id: PMID:33961781
  title: Dual proteome-scale networks reveal cell-specific remodeling of the human
    interactome.
  findings:
  - statement: >-
      Proteome-scale AP-MS interactome (BioPlex 3.0) reporting a PAPSS1 interaction
      (with/from PAPSS2); source of a bare "protein binding" annotation.
    reference_section_type: ABSTRACT
    supporting_text: >-
      Through affinity-purification mass spectrometry, we have created two
      proteome-scale, cell-line-specific interaction networks.
  reference_review:
    relevance: LOW
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified high-throughput interactome; supports only an uninformative
      protein-binding annotation (partner is the paralog PAPSS2).
- id: PMID:9576487
  title: 'Sulfation in high endothelial venules: cloning and expression of the human
    PAPS synthetase.'
  findings:
  - statement: >-
      Cloned human PAPS synthetase is a multifunctional enzyme with both ATP
      sulfurylase and APS kinase domains; functional expression produces PAPS,
      required for sulfation of many molecules.
    reference_section_type: ABSTRACT
    supporting_text: >-
      a multifunctional enzyme containing domains for both ATP sulfurylase and
      adenosine-5'-phosphosulfate kinase
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified; original cloning and functional characterization of human
      PAPSS1 (both activities).
- id: PMID:9648242
  title: cDNA cloning, expression, and characterization of the human bifunctional
    ATP sulfurylase/adenosine 5'-phosphosulfate kinase enzyme.
  findings:
  - statement: >-
      The human bifunctional enzyme carries an N-terminal APS kinase domain and a
      C-terminal ATP sulfurylase domain; recombinant full-length and each isolated
      domain show their respective enzymatic activities.
    reference_section_type: ABSTRACT
    supporting_text: >-
      Recombinant full-length enzyme and its constituent APS kinase and ATP
      sulfurylase domains were individually expressed, purified, and shown to have
      their respective enzymatic activities.
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified; supports both catalytic MFs and domain architecture.
- id: PMID:9668121
  title: Molecular cloning, expression, and characterization of human bifunctional
    3'-phosphoadenosine 5'-phosphosulfate synthase and its functional domains.
  findings:
  - statement: >-
      The 1-268 fragment expresses APS kinase activity and the 220-623 fragment ATP
      sulfurylase activity; the C-terminal domain exerts a regulatory role over the
      N-terminal APS kinase.
    reference_section_type: ABSTRACT
    supporting_text: >-
      A 1-268-amino acid fragment expressed APS kinase activity, whereas a 220-623
      fragment evinced ATP sulfurylase activity.
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified; maps both catalytic activities to defined domains.
- id: PMID:9771708
  title: Mutations in orthologous genes in human spondyloepimetaphyseal dysplasia
    and the brachymorphic mouse.
  findings:
  - statement: >-
      Identifies ATPSK2/Atpsk2 (PAPSS2 orthologs) as the genes mutated in human
      spondyloepimetaphyseal dysplasia and the brachymorphic mouse; the
      cartilage/skeletal phenotype reflects PAPSS2, not PAPSS1.
    reference_section_type: ABSTRACT
    supporting_text: >-
      We identified two orthologous genes, ATPSK2 and Atpsk2, encoding novel ATP
      sulfurylase/APS kinase orthologues in the respective regions of the human and
      mouse genomes.
  reference_review:
    relevance: LOW
    correctness: MISCITED
    review_notes: >-
      PubMed-verified, but the paper is about PAPSS2/ATPSK2, not PAPSS1; it does
      not support a skeletal-development role specific to PAPSS1.
