id: O43252
gene_symbol: PAPSS1
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  PAPSS1 is a cytosolic and nuclear bifunctional enzyme that synthesizes PAPS
  (3'-phosphoadenosine 5'-phosphosulfate), the universal activated sulfate donor
  used by all cytosolic and Golgi sulfotransferases. It carries two catalytic
  activities fused into a single polypeptide: a C-terminal ATP sulfurylase
  (sulfate adenylyltransferase, EC 2.7.7.4) domain that produces adenosine
  5'-phosphosulfate (APS) from ATP and inorganic sulfate, and an N-terminal APS
  kinase (adenylyl-sulfate kinase, EC 2.7.1.25) domain that phosphorylates APS on
  its 3'-hydroxyl to yield PAPS. The enzyme is a homodimer and consumes ATP in
  both reactions. In mammals PAPS is the sole physiological sulfonate donor, and
  APS is only an intermediate; PAPSS1-generated PAPS feeds sulfation of
  glycosaminoglycans and proteoglycans, sulfomucins (including selectin ligands),
  steroids, tyrosine residues, neurotransmitters, hormones, drugs and
  xenobiotics. PAPSS1 is broadly expressed and can shuttle between cytoplasm and
  nucleus, indicating that sulfate activation can occur in either compartment.
