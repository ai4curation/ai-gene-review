suggested_questions:
- question: To what extent does the nuclear pool of IMPDH2 and its CBS-subdomain
    single-stranded nucleic-acid binding contribute to RNA/DNA metabolism in vivo, as opposed
    to being an in vitro/adventitious activity?
- question: What is the physiological role of reversible IMPDH2 filament assembly (rods and
    rings / cytoophidia) in tuning de novo GTP flux, and how do disease variants alter it?
suggested_experiments:
- description: Structure-guided separation-of-function mutants that abolish CBS-subdomain
    nucleic-acid binding while preserving catalysis, to test the moonlighting nuclear role.
- description: Live-cell imaging of endogenously tagged IMPDH2 under guanine-nucleotide
    depletion and with disease-associated variants to quantify filament assembly kinetics and
    correlate with cellular GTP levels.
