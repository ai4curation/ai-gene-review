id: P12268
gene_symbol: IMPDH2
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: Inosine-5'-monophosphate dehydrogenase 2 (IMPDH2; EC 1.1.1.205) is the
  ubiquitous, proliferation-associated isozyme of IMP dehydrogenase. It catalyzes the
  NAD+-dependent oxidation of inosine-5'-monophosphate (IMP) to xanthosine-5'-monophosphate
  (XMP) (IMP + NAD+ + H2O -> XMP + NADH + H+), the first committed and rate-limiting step
  in de novo guanine-nucleotide biosynthesis; GMP synthase then aminates XMP to GMP. The
  enzyme is a homotetramer whose regulatory Bateman/CBS-domain subdomain (two CBS domains)
  binds single-stranded nucleic acids and mediates reversible polymerization into
  micron-scale filaments ("rods and rings"/cytoophidia) under guanine-nucleotide depletion.
  IMPDH2 is predominantly cytosolic. As the constitutively inducible isoform enriched in
  proliferating and neoplastic cells, it is the principal target of the immunosuppressant
  mycophenolic acid (mycophenolate mofetil) and of the antiviral ribavirin. Loss-of-function
  and gain-of-function variants cause a neurodevelopmental disorder with dystonia
  (IMPDH2-related dystonia).
