    id: GO:0044877
    label: protein-containing complex binding
  evidence_type: IDA
  original_reference_id: PMID:23209302
  review:
    summary: The protein-containing complex binding annotation is broad and the cited paper is not 
      KRAS-centered; it does not clarify KRAS molecular function.
    action: REMOVE
    reason: This generic binding term is not useful for KRAS and appears to come from a broad 
      complex-binding assertion rather than evidence for a specific KRAS activity.
- term:
    id: GO:0005737
    label: cytoplasm
  evidence_type: IDA
  original_reference_id: PMID:23698361
  review:
    summary: KRAS has a cytoplasmic/cytosolic pool during its membrane-trafficking cycle, including 
      PDEdelta-mediated solubilization of farnesylated KRAS.
    action: ACCEPT
    reason: Although signaling-competent KRAS is membrane-associated, cytosolic localization is 
      supported as part of its trafficking and recycling cycle.
    supported_by: *id007
- term:
    id: GO:0005925
    label: focal adhesion
  evidence_type: HDA
  original_reference_id: PMID:21423176
  review:
    summary: The focal adhesion annotation comes from high-throughput proteomic detection rather 
      than targeted KRAS localization evidence.
    action: MARK_AS_OVER_ANNOTATED
    reason: Focal adhesion is not a supported core or well-established localization for KRAS in the 
      reviewed evidence.
- term:
    id: GO:0016020
    label: membrane
  evidence_type: HDA
  original_reference_id: PMID:19946888
  review:
    summary: The generic membrane annotation is directionally correct for lipid-anchored KRAS but 
      lacks the useful subcellular specificity available from curated evidence.
    action: MARK_AS_OVER_ANNOTATED
    reason: KRAS has more specific and better-supported plasma membrane, 
      cytoplasmic-side-of-plasma-membrane, endomembrane, and cytosolic localization annotations. 
      Generic membrane should not be used as an informative KRAS localization.
