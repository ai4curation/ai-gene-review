  title: UniProt record for human KRAS (P01116)
  findings:
  - statement: KRAS binds GDP/GTP and has intrinsic GTPase activity.
    supporting_text: Ras proteins bind GDP/GTP and possess intrinsic GTPase activity
  - statement: KRAS cycles between GDP-bound inactive and GTP-bound active forms.
    supporting_text: Alternates between an inactive form bound to GDP and an active form bound to 
      GTP
  - statement: KRAS localizes to the cell membrane, endomembrane system, and cytosol.
    supporting_text: Cell membrane {ECO:0000269|PubMed:22431598, ECO:0000269|PubMed:23698361, 
      ECO:0000269|PubMed:29239724}; Lipid-anchor
core_functions:
- molecular_function:
    id: GO:0003924
    label: GTPase activity
  description: KRAS is a Ras-family small GTPase with intrinsic GTP hydrolysis activity. Its active 
    GTP-bound state is turned off by intrinsic and GAP-stimulated hydrolysis to GDP, making 
    nucleotide cycling the central molecular switch for KRAS function.
  supported_by: *id003
  locations:
  - id: GO:0009898
    label: cytoplasmic side of plasma membrane
  - id: GO:0012505
    label: endomembrane system
  directly_involved_in:
  - id: GO:0007265
    label: Ras protein signal transduction
- molecular_function:
    id: GO:0003925
    label: G protein activity
  description: KRAS acts as a small monomeric G protein. GEFs such as SOS1 promote GDP-to-GTP 
    exchange, while GAPs accelerate GTP hydrolysis; the active GTP-bound conformation engages 
    downstream effectors.
  supported_by:
  - reference_id: file:human/KRAS/KRAS-uniprot.txt
    supporting_text: Alternates between an inactive form bound to GDP and an active form bound to 
      GTP
  - *id006
  locations:
  - id: GO:0005886
    label: plasma membrane
  directly_involved_in:
  - id: GO:0007265
    label: Ras protein signal transduction
- molecular_function:
    id: GO:0005525
    label: GTP binding
  description: GTP-bound KRAS recruits RAF-family kinases and other effectors to propagate 
    downstream signaling, most prominently the RAF-MEK-ERK MAPK cascade and PI3K-AKT-mTOR branch.
  supported_by:
  - *id001
  - *id002
  - *id008
  locations:
  - id: GO:0005886
    label: plasma membrane
  directly_involved_in:
  - id: GO:0000165
    label: MAPK cascade
proposed_new_terms: []
suggested_questions:
- question: Which KRAS4A and KRAS4B functions should be represented as isoform-specific GO 
    annotations rather than gene-level annotations?
- question: Should SHOC2-PP1C complex annotations be restricted to MRAS, or should weak H/K/NRAS 
    interactions support non-core annotations?
- question: Can KRAS mitochondrial outer membrane localization be curated as a modification- or 
    isoform-specific function rather than a general localization?
- question: Should pathway-level proliferation, senescence, and programmed cell death annotations be
    retained for KRAS or replaced by more direct Ras/MAPK and PI3K pathway terms?
suggested_experiments:
- description: Endogenous isoform-specific tagging or proteomics to quantify KRAS4A and KRAS4B 
    localization across plasma membrane, Golgi, ER, endomembrane, cytosol, and mitochondria.
  hypothesis: Gene-level KRAS localization annotations conflate distinct KRAS4A and KRAS4B 
    trafficking mechanisms.
- description: Compare endogenous KRAS, NRAS, HRAS, and MRAS binding to SHOC2-PP1C under matched 
    nucleotide-loading and membrane conditions.
  hypothesis: Canonical RAS isoforms bind SHOC2-PP1C weakly relative to MRAS and should not receive 
    core phosphatase-complex component annotations.
- description: Use pathway-resolved KRAS perturbation with rescue by GTPase, effector-binding, and 
    localization mutants to separate direct MAPK/PI3K signaling from downstream proliferation and 
    gene-expression outcomes.
  hypothesis: Most broad biological-process annotations for KRAS are downstream consequences of Ras 
    effector signaling rather than direct gene-level functions.
