id: P01116
gene_symbol: KRAS
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: 'KRAS encodes a membrane-associated Ras-family small GTPase that functions as a GDP/GTP molecular
  switch in receptor-driven signal transduction. In the GTP-bound state KRAS recruits effectors including
  RAF-family kinases and PI3Kalpha to activate downstream MAPK and PI3K-AKT-mTOR signaling; intrinsic
  and GAP-stimulated GTP hydrolysis return KRAS to the GDP-bound inactive state. KRAS4A and KRAS4B differ
  in their C-terminal hypervariable regions and membrane-targeting mechanisms, but both depend on lipid
  modification and membrane localization for signaling. Oncogenic and rasopathy variants alter nucleotide
  cycling, GAP responsiveness, effector interactions, or localization, producing context-dependent effects
  on proliferation, survival, senescence, and gene expression.'
alternative_products:
- name: 2A (K-Ras4A {ECO:0000303|PubMed:29239724})
  id: P01116-1
  description: KRAS4A isoform with a distinct C-terminal hypervariable region. It uses 
    farnesylation, Cys180 palmitoylation, and lysine fatty acylation to control plasma membrane and 
    endomembrane localization; SIRT2-dependent lysine defatty-acylation promotes endomembrane 
    localization and ARAF interaction.
- name: 2B (K-Ras4B)
  id: P01116-2, P01118-1
  sequence_note: VSP_011140, VSP_011141
  description: KRAS4B isoform with a polybasic C-terminal hypervariable region. Farnesylation and 
    the polybasic region support plasma membrane association, while PDEdelta-mediated solubilization
    and recycling help maintain KRAS4B spatial organization.
