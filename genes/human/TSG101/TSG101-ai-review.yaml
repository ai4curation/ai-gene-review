suggested_questions:
- question: Should the TSG101 autophagy annotation be changed from broad macroautophagy/autophagosome 
    maturation to GO:0000045 autophagosome assembly for phagophore closure?
  experts:
  - GO autophagy editors
  - GO ESCRT curators
- question: Should generic TSG101 protein-binding annotations be retired in favor of ubiquitin binding, 
    ESCRT-I complex membership, and specific pathway contexts?
  experts:
  - GO molecular function editors
  - UniProt curators
- question: Should viral budding, cytokinesis, and exosome annotations remain non-core branches in 
    proteostasis-focused TSG101 curation?
  experts:
  - GO viral process editors
  - GO cell-cycle editors
  - GO extracellular vesicle editors
suggested_experiments:
- experiment_type: TSG101 separation-of-function phagophore closure rescue
  hypothesis: TSG101 UEV-domain ubiquitin/PTAP-motif binding and ESCRT-I assembly surfaces make separable 
    contributions to phagophore closure and MVB cargo sorting.
  description: Use acute TSG101 depletion/rescue with UEV-domain and VPS28/VPS37-binding mutants, then measure
    HT-LC3 closure, EGFR MVB sorting, and ESCRT-III/VPS4 recruitment side by side.
- experiment_type: endogenous ESCRT-I autophagy recruitment imaging
  hypothesis: Core ESCRT-I components including TSG101 transiently localize to closing LC3-positive 
    phagophores before ESCRT-III/VPS4 recruitment.
  description: Endogenously tag TSG101, VPS28, VPS37A, CHMP2A, and LC3 reporters and quantify recruitment 
    order during starvation-induced phagophore closure.
