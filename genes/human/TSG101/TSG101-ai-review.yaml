id: Q99816
gene_symbol: TSG101
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  TSG101 encodes the UEV-domain ESCRT-I subunit that binds ubiquitin/PTAP-type motifs and scaffolds
  ESCRT-I with VPS28, VPS37-family subunits, and MVB12/UBAP-family subunits. Its conserved core role
  is ESCRT-I-mediated sorting of ubiquitinated endocytic cargo into multivesicular bodies and
  reverse-topology membrane fission. TSG101 also participates in ESCRT-I-dependent
  phagophore/autophagosome closure, best represented biologically as autophagosome assembly rather
  than generic macroautophagy. Viral budding, cytokinesis, exosome release, and
  transcription/cell-growth annotations are supported non-core or over-broad branches.
