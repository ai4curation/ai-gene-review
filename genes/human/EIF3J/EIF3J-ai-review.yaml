  title: UniProt entry O75822 (EIF3J_HUMAN), Eukaryotic translation initiation factor 3 subunit J.
  findings:
  - statement: EIF3J is a labile/loosely-associated subunit of the eIF-3 complex that binds via EIF3B; eIF-3 associates with the 40S subunit, drives 43S/48S pre-initiation complex formation, mRNA recruitment and scanning, and post-termination ribosome recycling; cytoplasmic; phosphorylated upon serum stimulation.
    reference_section_type: OTHER
core_functions:
- description: Accessory (labile) subunit of the eIF-3 complex that contributes translation initiation factor activity, helping eIF-3 assemble the 43S/48S pre-initiation complexes on the 40S ribosomal subunit and recruit/scan mRNA during cap-dependent translation initiation.
