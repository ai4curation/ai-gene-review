suggested_questions:
- question: Does human EIF3J have a distinct, separable role in 40S ribosome recycling/availability (post-termination) versus initiation, as suggested by yeast Hcr1?
- question: How does the sub-stoichiometric/labile association of EIF3J with eIF-3 regulate switching between mRNA-entry-channel occupancy and mRNA loading?
- question: What is the functional consequence of serum-stimulated phosphorylation of EIF3J for its association with eIF-3 and selective mRNA translation?
suggested_experiments:
- description: Selective EIF3J depletion/rescue with ribosome profiling and 40S/80S subunit-availability assays to dissect its contribution to initiation versus post-termination recycling.
- description: Cryo-EM of 40S-eIF-3 complexes with and without EIF3J to define its occupancy of the mRNA entry channel and effect on mRNA accommodation.
- description: Phosphomutant (phospho-null/phospho-mimetic) EIF3J variants to test how serum-stimulated phosphorylation modulates eIF-3 binding and translational output.
