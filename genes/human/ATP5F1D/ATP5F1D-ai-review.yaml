id: P30049
gene_symbol: ATP5F1D
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  ATP5F1D encodes the delta (δ) subunit of the F1 catalytic head of mitochondrial
  ATP synthase (Complex V; F1Fo-ATP synthase). Together with the gamma (ATP5F1C)
  and epsilon (ATP5F1E) subunits it forms the central stalk that rotates within
  the alpha3/beta3 catalytic core, mechanically coupling proton flow through the
  membrane-embedded Fo sector to ATP synthesis in the F1 sector. It is a structural
  (non-catalytic) subunit: the nucleotide-binding catalytic sites reside on the
  alpha (ATP5F1A) and beta (ATP5F1B) subunits. The metazoan mitochondrial delta
  subunit is homologous to the bacterial epsilon subunit and belongs to the ATPase
  epsilon chain family. It localises to the mitochondrial inner membrane, with the
  F1 head projecting into the matrix, and its major biological role is proton
  motive force-driven mitochondrial ATP synthesis; along with the gamma subunit it
  is also required for biogenesis/assembly of the F1 sector. Biallelic loss-of-function
  variants cause mitochondrial complex V (ATP synthase) deficiency.
