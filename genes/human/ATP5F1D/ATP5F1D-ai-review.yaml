- term:
    id: GO:0009060
    label: aerobic respiration
  evidence_type: IMP
  original_reference_id: PMID:29478781
  qualifier: involved_in
  review:
    summary: >-
      IMP annotation to aerobic respiration based on the disease study: biallelic ATP5F1D
      variants impaired ATP synthase assembly and reduced complex V activity, and Drosophila
      ATPsynδ knockdown caused lethality rescued by wild-type human ATP5F1D. Patient
      iPSC-cardiomyocytes showed impaired maximal respiration.
    action: KEEP_AS_NON_CORE
    reason: >-
      ATP synthase is the terminal step of oxidative phosphorylation, so loss of ATP5F1D
      impairs aerobic ATP production; the annotation is supported. It is kept as non-core
      because the more precise core process is proton motive force-driven mitochondrial ATP
      synthesis, and aerobic respiration is a broader downstream/parent process.
