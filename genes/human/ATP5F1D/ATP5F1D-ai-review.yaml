  original_reference_id: PMID:12539966
  qualifier: involved_in
  review:
    summary: >-
      NAS annotation to response to copper ion from a copper-deficiency review, which reports
      that the delta-subunit protein decreases under copper deficiency. This is a downstream
      effect on the protein, not a molecular/physiological function of ATP5F1D in copper
      response.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      The cited review describes altered ATP synthase subunit levels as a secondary consequence
      of dietary copper deficiency, not a role for ATP5F1D in sensing or responding to copper.
      This is an over-annotation. Kept (not removed) as it derives from an experimental NAS
      attribution.
