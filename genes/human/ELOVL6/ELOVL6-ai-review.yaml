- id: PMID:19575253
  title: Development of a high-density assay for long-chain fatty acyl-CoA elongases.
  findings:
  - statement: >-
      A Unifilter-96 GF/C plate assay was used to profile recombinant human ELOVLs;
      ELOVL1, -3 and -6 preferentially elongate saturated fatty acyl-CoAs, whereas
      ELOVL2 and ELOVL5 prefer polyunsaturated acyl-CoAs.
    supporting_text: >-
      ELOVL1, -3 and -6
      preferably elongated the saturated fatty acyl-CoAs while ELOVL2 and ELOVL5
      preferentially elongated the polyunsaturated fatty acyl-CoAs
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified. Directly characterizes human ELOVL6 elongase activity and its
      saturated-substrate preference; supports the EXP GO:0009922 annotation. Abstract
      only (full_text_available: false).
- id: PMID:20937905
  title: ELOVL1 production of C24 acyl-CoAs is linked to C24 sphingolipid synthesis.
  findings:
  - statement: >-
      Systematic in vitro determination of the substrate specificities of all seven
      mammalian ELOVLs, including ELOVL6; also reports ELOVL6 ER-membrane localization,
      glycosylation and ubiquitous tissue expression.
    supporting_text: mammals have seven elongases (ELOVL1-7)
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified. Although the title foregrounds ELOVL1, the study assays all
      seven ELOVLs and is the experimental (EXP/IDA) source for ELOVL6 elongase activity,
      ER localization and saturated-FA elongation. Abstract-only in cache
      (full_text_available: false); underlying curation used full text.
- id: PMID:25003994
  title: Two modes of regulation of the fatty acid elongase ELOVL6 by the 3-ketoacyl-CoA
    reductase KAR in the fatty acid elongation cycle.
  findings:
  - statement: >-
      Purified ELOVL6 reconstituted into proteoliposomes catalyzes the rate-limiting
      condensation step (C16:0-CoA + malonyl-CoA), with KM 1.22 uM for hexadecanoyl-CoA;
      its activity is stimulated ~3-fold by the 3-ketoacyl-CoA reductase KAR (HSD17B12)
      both independently of and dependent on KAR catalysis, indicating coordinated
      function within the elongation machinery.
    supporting_text: The FA elongase ELOVL6 is responsible for the conversion of C16-CoAs to C18-CoAs
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified; full text available. Primary source for the IMP elongase-activity
      and IDA elongase-complex annotations; also documents C16->C18 specificity and
      KAR/HSD17B12 regulation.
- id: PMID:26214738
  title: Regulation of mitochondrial morphology and function by stearoylation of TFR1.
  findings:
  - statement: >-
      Drosophila dElovl6 (noa) loss abolishes C16:0->C18:0 elongase activity and is
      larval-lethal; both the C18:0 deficit and lethality are rescued by expressing
      human ELOVL6, establishing ELOVL6 as the C16->C18 elongase (basis of the IGI
      annotations, WITH/FROM Drosophila Q9VV87).
    supporting_text: their lethality is rescued by human Elovl6
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified; full text available. The human-ELOVL6 rescue of the fly dElovl6
      mutant supports the IGI GO:0009922 and GO:0019367 annotations; also links ELOVL6's
      C18:0 product to mitochondrial regulation via TFR1 stearoylation.
- id: PMID:26628376
  title: Brown Adipose Tissue Thermogenic Capacity Is Regulated by Elovl6.
  findings:
  - statement: >-
      Elovl6 converts C16 saturated and monounsaturated fatty acids to C18 and is
      necessary for brown-adipose-tissue thermogenic capacity in mice; the human ISS/IEA
      cold-induced-thermogenesis annotations derive from this mouse work.
