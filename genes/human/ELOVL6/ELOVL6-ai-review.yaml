id: Q9H5J4
gene_symbol: ELOVL6
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  ELOVL6 (ELOVL fatty acid elongase 6; EC 2.3.1.199) is a multipass endoplasmic
  reticulum membrane protein of the ELO family that catalyzes the first and
  rate-limiting condensation step of the microsomal fatty-acid elongation cycle,
  condensing an acyl-CoA with malonyl-CoA to yield a 3-oxoacyl-CoA (two carbons
  longer), CO2 and CoA. The remaining three steps of each elongation cycle are
  carried out by separate ER enzymes: the 3-ketoacyl-CoA reductase KAR/HSD17B12,
  the 3-hydroxyacyl-CoA dehydratases HACD1-4, and the trans-2,3-enoyl-CoA
  reductase TECR. ELOVL6 preferentially elongates saturated and monounsaturated
  C12-C16 acyl-CoAs, with highest activity toward palmitoyl-CoA (C16:0), which it
  converts to stearoyl-CoA (C18:0); it likewise elongates palmitoleoyl-CoA
  (C16:1) to vaccenoyl-CoA (C18:1). By determining the balance between C16 and
  C18 fatty acids, ELOVL6 governs the cellular saturated/monounsaturated
  long-chain fatty-acid pool that feeds membrane phospholipid, triglyceride and
  lipid-mediator synthesis. It is a lipogenic, SREBP-regulated enzyme whose
  activity strongly influences whole-body lipid metabolism; loss of Elovl6 in
  mice alters the C16/C18 ratio, affecting insulin sensitivity, hepatic lipid
  accumulation, mitochondrial function (via C18:0-dependent signalling) and brown
  adipose tissue thermogenesis.
