- id: file:human/POMT1/POMT1-deep-research-falcon.md
  title: Deep research on POMT1 (falcon, Edison Scientific Literature, 2026-05-29)
  findings:
  - statement: POMT1 is a multi-pass ER membrane glycosyltransferase that functions
      with POMT2 as the canonical protein O-mannosyltransferase initiating O-mannosylation
      on selected substrates, most notably alpha-dystroglycan; POMT/Pmt enzymes are
      classified as GT-C fold enzymes in CAZy GT39 and contain a conserved luminal
      DD/DE acidic motif essential for activity.
    supporting_text: human POMT1 (Q9Y6A1) is a multi-pass ER membrane glycosyltransferase
      that functions with **POMT2** as the canonical **protein O-mannosyltransferase**
      initiating O-mannosylation on selected substrates, most notably **α-dystroglycan
      (α-DG)**
  - statement: The donor is Dol-P-Man (GDP-mannose is not used) and mannose transferred
      is sensitive to alpha-mannosidase consistent with Man-alpha-Ser/Thr linkages.
    supporting_text: 'The donor was **Dol-P-Man**; **GDP-mannose was not used** as
      a donor (manya2004demonstrationofmammalian pages 3-4, manya2004demonstrationofmammalian
      pages 4-5).'
  - statement: Mammalian POMT1/2 have narrow substrate specificity; substrates include
      alpha-DG, KIAA1549 and SUCO, distinct from cadherins/plexins which are served
      by TMTC1-4 and TMEM260 pathways.
    supporting_text: The study supports that mammalian POMT1/2 have a relatively **narrow
      substrate specificity**, with examples including α-DG and additional targets
      such as **KIAA1549** and **SUCO**
- id: PMID:38851451
  title: Global View of Domain-Specific O-Linked Mannose Glycosylation in Glycoengineered
    Cells.
  findings:
  - statement: POMT1/POMT2 is one of three nonredundant enzyme families (with TMTC1-4
      and TMEM260) that selectively initiate O-Man glycosylation; POMT1/POMT2 are
      distinguished by narrow substrate specificity targeting KIAA1549, SUCO and alpha-dystroglycan.
    supporting_text: The mammalian orthologs POMT1 and POMT2, which are absent in
      plants, are distinguished from yeast PMTs by their narrow substrate specificities
      and dedicated functions for O-Man initiation on only a few human proteins, including
      KIAA1549, SUCO, and α-dystroglycan (α-DG)
  - statement: O-Man biosynthesis is initiated in the ER lumen by integral transmembrane
      GT-CA enzymes that use dolichol phosphate mannose as donor substrate.
    supporting_text: Biosynthesis of O-Man is initiated in the endoplasmic reticulum
      (ER) lumen by integral transmembrane GT-CA enzymes (5, 6, 7) that utilize lipid-linked
      dolichol phosphate mannose as donor substrate
  - statement: Functional O-Man glycosylation of alpha-DG (matriglycan) is required
      for interactions with ECM components laminin, agrin and perlecan within the
      dystrophin-associated glycoprotein complex.
    supporting_text: Functional O-Man glycosylation of α-DG is required for interactions
      with extracellular matrix (ECM) components, including laminin, agrin, and perlecan,
      which are anchored to the dystrophin-associated glycoprotein complex and the
      actin cytoskeleton through a complex O-Man polysaccharide known as matriglycan
- id: PMID:38272461
  title: Removal of pomt1 in zebrafish leads to loss of alpha-dystroglycan glycosylation
    and dystroglycanopathy phenotypes.
  findings:
  - statement: POMT1 catalyzes the addition of an O-linked mannose to alpha-DG, starting
      the assembly of the functional glycan as the protein is translated in the ER;
      loss of pomt1 in zebrafish abolishes alpha-DG glycosylation and recapitulates
      dystroglycanopathy phenotypes affecting muscle, eye and brain.
    supporting_text: Protein O-mannosyltransferase 1 (POMT1, OMIM:607423) catalyzes
      the addition of an O-linked mannose to α-DG starting the assembly of the functional
      glycan as the protein is translated in the ER
  - statement: Global Pomt1 knockout in mouse causes early embryonic lethality due
      to the role of dystroglycan in Reichert's membrane formation, requiring conditional
      approaches in mammals.
    supporting_text: Global knock-out (KO) of Pomt1 in the mouse leads to early embryonic
      lethality similarly to Dag1 mutants. This is due to the critical role of dystroglycan
      in Reichert's membrane, a specialized basement membrane in rodent embryos
- id: PMID:37565810
  title: 'Protein O-mannosylation: one sugar, several pathways, many functions.'
  findings:
  - statement: Protein O-mannosylation plays a crucial role in the nervous system
      in animals, and POMT defects cause severe neurological abnormalities and congenital
      muscular dystrophies.
    supporting_text: In animals, protein O-mannosylation plays a crucial role in the
      nervous system, whereas protein O-mannosylation defects cause severe neurological
      abnormalities and congenital muscular dystrophies.
- id: PMID:22549409
  title: Cardiomyopathy in patients with POMT1-related congenital and limb-girdle
    muscular dystrophy.
  findings:
  - statement: POMT1 is a glycosyltransferase involved in alpha-dystroglycan glycosylation;
      POMT1 mutations cause a clinical spectrum from CMD with brain abnormalities
      to LGMD, and can include cardiomyopathy with reduced alpha-DG immunolabeling
      in muscle biopsies.
    supporting_text: Protein-o-mannosyl transferase 1 (POMT1) is a glycosyltransferase
      involved in α-dystroglycan (α-DG) glycosylation. Clinical phenotype in POMT1-mutated
      patients ranges from congenital muscular dystrophy (CMD) with structural brain
      abnormalities, to limb-girdle muscular dystrophy (LGMD) with microcephaly and
      mental retardation, to mild LGMD.
