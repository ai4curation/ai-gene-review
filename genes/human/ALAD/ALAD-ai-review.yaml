id: P13716
gene_symbol: ALAD
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  ALAD encodes delta-aminolevulinic acid dehydratase (ALADH), also known as porphobilinogen
  synthase (PBGS; EC 4.2.1.24). It catalyzes the second step of heme biosynthesis: the
  asymmetric condensation of two molecules of 5-aminolevulinate (ALA) to form the monopyrrole
  porphobilinogen (PBG), releasing two water molecules. This is the first pyrrole-forming
  reaction and commits the pathway toward all tetrapyrroles (heme, and in other organisms
  chlorophyll and cobalamin). The enzyme is a cytosolic, zinc-dependent metalloenzyme that
  assembles as a homo-octamer (the high-activity form), binding up to eight Zn2+ per octamer
  with four required for catalysis; it exists in a morpheein-type equilibrium between the
  active octamer and a low-activity hexamer, with a magnesium ion promoting octamer assembly.
  ALAD activity is potently inhibited by divalent lead, which partially displaces the catalytic
  zinc, making the enzyme the classic biochemical biomarker and principal molecular target of
  lead poisoning. Loss-of-function variants that shift the quaternary equilibrium toward the
  hexamer cause the rare autosomal-recessive ALAD-deficiency porphyria (Doss porphyria / acute
  hepatic porphyria). Independently of its catalytic role, the protein has been characterized
  as an endogenous proteasome inhibitor (CF-2), an ATP-stabilized component associated with the
  26S proteasome, an example of gene sharing/moonlighting.
