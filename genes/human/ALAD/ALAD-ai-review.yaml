- id: PMID:11032836
  title: The molecular mechanism of lead inhibition of human porphobilinogen synthase.
  findings: []
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: "PubMed-verified; on human PBGS. Establishes 8 Zn(II)/homo-octamer, 4 required
      for activity, catalytic role of the cysteine-rich ZnB site, and the mechanism of lead
      inhibition (Pb interacts with ZnA and ZnB ligands). Source of the IDA porphobilinogen
      synthase activity, zinc ion binding, heme B/heme biosynthesis, and EXP lead ion binding
      annotations. Abstract-only in cache; full text was read by the curators."
- id: PMID:12897770
  title: Control of tetrapyrrole biosynthesis by alternate quaternary forms of porphobilinogen
    synthase.
  findings: []
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: "PubMed-verified; human PBGS crystal structures. Establishes the octamer
      (predominant) vs hexamer (F12L allele) quaternary equilibrium and allosteric Mg2+ site.
      Supports the EXP porphobilinogen synthase activity annotation."
- id: PMID:19812033
  title: Allosteric inhibition of human porphobilinogen synthase.
  findings: []
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: "PubMed-verified; full text available. Confirms human PBGS catalyzes the first
      common step in tetrapyrrole biosynthesis, the octamer/hexamer/dimer equilibrium, ALAD
      porphyria and lead poisoning as low-activity disease states. Supports EXP porphobilinogen
      synthase activity."
- id: PMID:2063868
