core_functions:
- description: >-
    Porphobilinogen synthase (5-aminolevulinate dehydratase, EC 4.2.1.24): catalyzes the second
    step of heme biosynthesis, the zinc-dependent asymmetric condensation of two molecules of
    5-aminolevulinate into the monopyrrole porphobilinogen, acting as a cytosolic homo-octamer.
  molecular_function:
    id: GO:0004655
    label: porphobilinogen synthase activity
  directly_involved_in:
  - id: GO:0006783
    label: heme biosynthetic process
  locations:
  - id: GO:0005829
    label: cytosol
  supported_by:
  - reference_id: file:human/ALAD/ALAD-uniprot.txt
    supporting_text: "Binds two molecules of 5-aminolevulinate per subunit, each at a"
  - reference_id: Reactome:R-HSA-189439
    supporting_text: "catalyzes the asymmetric condensation of two molecules of ALA to form porphobilinogen"
- description: >-
    Zinc-dependent metallo-catalysis: ALAD binds zinc ions (up to eight per octamer, four required
    for activity) at its catalytic site; this metal-ion binding is essential for the porphobilinogen
    synthase reaction and is the site displaced by inhibitory lead.
  molecular_function:
    id: GO:0008270
    label: zinc ion binding
  supported_by:
  - reference_id: PMID:11032836
    supporting_text: "eight Zn(II) per homo-octamer"
  - reference_id: PMID:11032836
    supporting_text: "are required for activity"
proposed_new_terms: []
suggested_questions:
- question: >-
    Beyond the well-characterized CF-2/proteasome-inhibitor moonlighting activity, is there a
    physiological context (e.g. specific tissues or stress states) in which ALAD's proteasome
    regulation is functionally significant in vivo?
- question: >-
    Do the ALAD*1/ALAD*2 (K59N) allele differences alter any function beyond susceptibility to
    lead accumulation?
suggested_experiments:
- description: >-
    Quantitative structure-function analysis of the octamer/hexamer equilibrium for each
    ALAD-deficiency porphyria variant, correlating hexamer propensity with residual PBGS activity
    and clinical severity.
  experiment_type: biophysical/enzyme kinetics
- description: >-
    Interactome and proximity-labeling studies in erythroid and hepatic cells to test whether the
    CF-2/proteasome-inhibitory role is physiologically engaged or is an in vitro property of an
    abundant enzyme.
  experiment_type: proximity labeling / interactome
