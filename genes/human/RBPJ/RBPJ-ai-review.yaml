    - reference_id: PMID:9874765
      supporting_text: "CBF1 is a member of the CSL family of DNA binding factors, which mediate either transcriptional repression or transcriptional activation"
- description: >-
    RBPJ binds the oxygen responsive element (ORE) of COX4I2 and activates its transcription
    under hypoxia (4% oxygen), acting with CHCHD2 and CXXC5 in a Notch-independent
    manner to regulate mitochondrial energy metabolism.
  molecular_function:
