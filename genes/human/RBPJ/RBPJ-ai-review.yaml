- id: PMID:9874765
  title: CIR, a corepressor linking the DNA binding factor CBF1 to the histone deacetylase
    complex.
  findings:
    - statement: >-
        CBF1/RBPJ binds the corepressor CIR, which links CBF1 to histone deacetylase
        complexes containing SAP30. Two CBF1 mutants unable to bind CIR did not function
        as repressors.
      supporting_text: "CBF1 binds to a unique corepressor, CBF1 interacting corepressor (CIR)"
    - statement: >-
        CIR serves as a bridge between CBF1 and the histone deacetylase complex,
        mediating transcriptional repression.
      supporting_text: "CIR binds to histone deacetylase and to SAP30 and serves as a linker between CBF1 and the histone deacetylase complex"
- id: PMID:10713164
  title: SKIP, a CBF1-associated protein, interacts with the ankyrin repeat domain
    of NotchIC To facilitate NotchIC function.
  findings:
    - statement: >-
        SKIP/SNW1 interacts with CBF1/RBPJ and NotchIC. SMRT and NotchIC interactions
        with SKIP are mutually exclusive, suggesting a model for the repression-to-activation
        switch.
      supporting_text: "We identified SKIP (Ski-interacting protein) as a CBF1 binding protein in a yeast two-hybrid screen"
    - statement: >-
        CBF1 mediates transcriptional repression through SMRT-HDAC corepressor complex
        recruitment, and NotchIC activates by competing with this complex.
      supporting_text: "CBF1 mediates transcriptional repression through the recruitment of an SMRT-histone deacetylase-containing corepressor complex"
- id: PMID:16287852
  title: RBP-Jkappa/SHARP recruits CtIP/CtBP corepressors to silence Notch target
    genes.
  findings:
    - statement: >-
        SHARP/SPEN repression domain is necessary and sufficient to repress transcription.
        CtIP and CtBP are novel components of the RBP-Jkappa/SHARP corepressor complex.
      supporting_text: "We identify the CtIP and CtBP corepressors as novel components of the human RBP-Jkappa/SHARP-corepressor complex"
- id: PMID:16510869
  title: The Notch coactivator, MAML1, functions as a novel coactivator for MEF2C-mediated
    transcription and is required for normal myogenesis.
  findings:
    - statement: >-
        MAML1 is recruited away from MEF2C to the Notch transcriptional complex upon
        Notch activation, demonstrating competition between Notch signaling and myogenic
        differentiation.
      supporting_text: "MAML1's promyogenic effects were completely blocked upon activation of Notch signaling, which was associated with recruitment of MAML1 away from MEF2C to the Notch transcriptional complex"
- id: PMID:16530044
  title: Structural basis for cooperativity in recruitment of MAML coactivators to
    Notch transcription complexes.
  findings:
    - statement: >-
        Crystal structure of the RBPJ-NOTCH1-MAML1 ternary complex on DNA at 3.25
        angstroms. CSL and ANK create a composite binding surface for MAML-1 recruitment.
      supporting_text: "the crystal structure of a Notch transcriptional activation complex containing the ankyrin domain of human Notch1 (ANK), the transcription factor CSL on cognate DNA, and a polypeptide from the coactivator Mastermind-like-1 (MAML-1)"
- id: PMID:16691198
  title: A metabolic enzyme of the short-chain dehydrogenase/reductase superfamily
    may moonlight in the nucleus as a repressor of promoter activity.
  findings:
    - statement: >-
        Study used FLAG-CSL/RBPJ as a tool to demonstrate ChIP binding at gene
        promoters, providing evidence for RBPJ binding at Pol II-regulated promoters.
      supporting_text: "Transcriptional repression often depends on the action of recruited co-repressor complexes with intrinsic enzymatic activities"
- id: PMID:17284587
  title: Cooperative assembly of higher-order Notch complexes functions as a switch
    to induce transcription.
  findings:
    - statement: >-
        Cooperative formation of dimeric Notch transcription complexes on paired CSL
        binding sites is required to activate transcription of target genes like HES
        family members.
      supporting_text: "cooperative formation of dimeric Notch transcription complexes on promoters with paired sites is required to activate transcription"
- id: PMID:18663143
  title: Slug is a direct Notch target required for initiation of cardiac cushion
    cellularization.
  findings:
    - statement: >-
        Slug is a direct Notch/CSL target gene. CSL binds the Slug promoter at two
        CSL binding sites. Slug is required for Notch-mediated endothelial-mesenchymal
        transition in cardiac cushion development.
      supporting_text: "Slug, but not Snail, is directly up-regulated by Notch in endothelial cells and that Slug expression is required for Notch-mediated repression of the vascular endothelial cadherin promoter"
- id: PMID:20890042
  title: Integration of a Notch-dependent mesenchymal gene program and Bmp2-driven
    cell invasiveness regulates murine cardiac valve formation.
  findings:
    - statement: >-
        Notch1 and BMP2 signal integration establishes the valve-forming field. Notch
        activates Hey1 and Heyl expression and drives EMT program in valve territories.
      supporting_text: "Mice with constitutive endocardial Notch1 activity ectopically express Hey1 and Heyl"
- id: PMID:21102556
  title: RITA, a novel modulator of Notch signalling, acts via nuclear export of RBP-J.
  findings:
    - statement: >-
        RITA (C12ORF52) is a novel RBPJ-interacting protein that exports RBPJ from
        the nucleus, thereby down-regulating Notch signaling. RITA can reverse Notch-induced
        loss of primary neurogenesis.
      supporting_text: "This shuttling RITA exports RBP-J/CBF-1 from the nucleus"
- id: PMID:21311046
  title: Differential Notch signaling in the epicardium is required for cardiac inflow
    development and coronary vessel morphogenesis.
  findings:
    - statement: >-
        RBPJ-targeted embryos show ectopic procardiogenic signaling, premature
        muscularization of sinus venosus horns, and disrupted coronary vessel development.
      supporting_text: "Analysis of RBPJk-targeted embryos indicates that Notch ablation causes ectopic procardiogenic signaling in the proepicardium"
- id: PMID:21475249
  title: Ataxin-1 and Brother of ataxin-1 are components of the Notch signalling pathway.
  findings:
    - statement: >-
        ATXN1 and BOAT1/ATXN1L interact with CBF1/RBPJ and repress Notch target gene
        transcription by binding the HEY1 promoter.
      supporting_text: "both ATXN1 and BOAT1 bind to the promoter region of Hey1 and inhibit the transcriptional output of Notch through direct interactions with CBF1"
- id: PMID:22810586
  title: Interpreting cancer genomes using systematic host network perturbations by
    tumour virus proteins.
  findings: []
- id: PMID:23022380
  title: NOTCH1 nuclear interactome reveals key regulators of its transcriptional
    activity and oncogenic function.
  findings:
    - statement: >-
        NOTCH1 assembles a multifunctional complex beyond the core ICN1-CSL-MAML1,
        containing AF4p12, PBAF complex, LSD1, and PHF8. LSD1 functions as both a
        corepressor (with CSL) and coactivator (with NICD).
      supporting_text: "beyond the well-characterized core activation complex (ICN1-CSL-MAML1), NOTCH1 assembles a multifunctional complex"
- id: PMID:23303788
  title: Oxygen-dependent expression of cytochrome c oxidase subunit 4-2 gene expression
    is mediated by transcription factors RBPJ, CXXC5 and CHCHD2.
  findings:
    - statement: >-
        RBPJ binds the oxygen responsive element (ORE) of the COX4I2 promoter and
        activates its transcription under hypoxia (4% oxygen). RBPJ interacts with
        CHCHD2 and CXXC5 in this context.
      supporting_text: "We demonstrate that RBPJ and CHCHD2 function towards activating the ORE at 4% oxygen, whereas CXXC5 functions as an inhibitor"
- id: PMID:25038826
  title: Inhibition of Notch signaling promotes browning of white adipose tissue and
    ameliorates obesity.
  findings:
    - statement: >-
        Adipose-specific inactivation of Notch1 or RBPJ promotes browning of white
        adipose tissue and increases energy expenditure.
      supporting_text: "adipose-specific inactivation of Notch1 or"
- id: PMID:25609649
  title: Proteomic analyses reveal distinct chromatin-associated and soluble transcription
    factor complexes.
  findings: []
- id: PMID:26302407
  title: Combined CSL and p53 downregulation promotes cancer-associated fibroblast
    activation.
  findings: []
- id: PMID:26496610
  title: A human interactome in three quantitative dimensions organized by stoichiometries
    and abundances.
  findings: []
- id: PMID:29030483
  title: RBPJ/CBF1 interacts with L3MBTL3/MBT1 to promote repression of Notch signaling
    via histone demethylase KDM1A/LSD1.
  findings:
    - statement: >-
        RBPJ interacts with L3MBTL3, which bridges RBPJ to the histone demethylase
        KDM1A/LSD1 for transcriptional repression. NICD competes with L3MBTL3 for
        RBPJ binding.
      supporting_text: "RBPJ/CBF1 interacts with L3MBTL3/MBT1 to promote repression of Notch signaling via histone demethylase KDM1A/LSD1"
- id: PMID:32601208
  title: Pharmacological disruption of the Notch transcription factor complex.
  findings:
    - statement: >-
        CB-103 is a small-molecule inhibitor that disrupts the RBPJ-NICD-MAML
        transcription activation complex, inhibiting Notch signaling and tumor growth.
      supporting_text: "we report the discovery of an orally active small-molecule inhibitor (termed CB-103) of the Notch transcription activation complex"
- id: PMID:33961781
  title: Dual proteome-scale networks reveal cell-specific remodeling of the human
    interactome.
  findings: []
- id: PMID:41086914
  title: Pathogenic variants in KCTD1 disrupt cAMP signaling and cellular communication
    associated with developmental pathways.
  findings:
    - statement: >-
        KCTD1 interacts with RBPJ and inhibits Notch pathway activity.
      supporting_text: "we further identified that KCTD1 interacts with the Notch transcriptional repressor RBPJ"
- id: PMID:8627785
  title: The amino-terminal domains of Epstein-Barr virus nuclear proteins 3A, 3B,
    and 3C interact with RBPJ(kappa).
  findings:
    - statement: >-
        EBV EBNA3A, EBNA3B, and EBNA3C all interact with RBPJkappa via their amino-terminal
        domains. EBNA3 proteins can inhibit RBPJkappa-DNA binding and compete with EBNA2
        for RBPJkappa interaction.
      supporting_text: "EBNA3A and EBNA3B expressed in non-EBV-infected Burkitt tumor lymphoblasts are similar to EBNA3C in binding to glutathione S-transferase-RBPJkappa in vitro and in coimmunoprecipitating from cell lysates with antibody to RBPJkappa"
