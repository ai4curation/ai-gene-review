- term:
    id: GO:0001228
    label: DNA-binding transcription activator activity, RNA polymerase II-specific
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  review:
    summary: >-
      RBPJ functions as a transcriptional activator when complexed with NICD and MAML
      coactivators. However, RBPJ alone acts as a repressor; it is only an activator in
      the context of Notch signaling. This term is acceptable as RBPJ does have transcription
      activator activity when in the appropriate complex.
    action: ACCEPT
    reason: >-
      RBPJ has dual function as both repressor and activator. Activator activity is documented
      experimentally (PMID:18663143, PMID:23303788).
