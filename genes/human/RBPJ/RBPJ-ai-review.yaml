existing_annotations:
# ===== IBA ANNOTATIONS (phylogenetic) =====
- term:
    id: GO:0005634
    label: nucleus
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      RBPJ is predominantly a nuclear protein. UniProt states "Mainly nuclear" (PMID:9874765).
      Multiple experimental studies confirm nuclear localization by immunofluorescence
      and biochemical fractionation (PMID:21102556, PMID:9874765). IBA annotation is
      consistent with deep phylogenetic conservation of nuclear localization for CSL family.
    action: ACCEPT
    reason: >-
      Core localization for RBPJ confirmed by multiple IDA studies and conserved across
      the CSL family. RBPJ functions as a DNA-binding transcription factor in the nucleus.
    supported_by:
      - reference_id: PMID:9874765
        supporting_text: "CBF1 is a member of the CSL family of DNA binding factors, which mediate either transcriptional repression or transcriptional activation"
      - reference_id: PMID:21102556
        supporting_text: "RITA exports RBP-J/CBF-1 from the nucleus"
- term:
    id: GO:0007219
    label: Notch signaling pathway
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      RBPJ is the central transcriptional effector of the Notch signaling pathway.
      This is its most fundamental biological process annotation and is conserved
      across all metazoans with Notch signaling (PMID:9874765, PMID:16530044, PMID:32601208).
    action: ACCEPT
    reason: >-
      Defining function of RBPJ/CSL proteins. RBPJ mediates both transcriptional repression
      and activation downstream of Notch receptor activation.
    supported_by:
      - reference_id: PMID:9874765
        supporting_text: "CSL proteins play a central role in Notch signaling and in Epstein-Barr virus-induced immortalization"
      - reference_id: PMID:32601208
        supporting_text: "we report the discovery of an orally active small-molecule inhibitor (termed CB-103) of the Notch transcription activation complex"
- term:
    id: GO:0000981
    label: DNA-binding transcription factor activity, RNA polymerase II-specific
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      RBPJ is a well-established DNA-binding transcription factor that can both
      repress and activate transcription via RNA polymerase II. It binds DNA directly
      and recruits either corepressor or coactivator complexes (PMID:9874765, PMID:16530044, PMID:18663143).
    action: ACCEPT
    reason: >-
      Core molecular function. RBPJ binds specific DNA sequences and regulates Pol II-mediated
      transcription. Crystal structure confirms direct DNA binding in the context of transcription
      complexes (PMID:16530044).
    supported_by:
      - reference_id: PMID:16530044
        supporting_text: "Together, CSL and ANK create a groove to bind the MAML-1 polypeptide as a kinked, 70 A helix"
      - reference_id: PMID:9874765
        supporting_text: "CBF1 is a member of the CSL family of DNA binding factors, which mediate either transcriptional repression or transcriptional activation"
- term:
    id: GO:0000978
    label: RNA polymerase II cis-regulatory region sequence-specific DNA binding
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      RBPJ specifically recognizes and binds the TGGGAA consensus sequence in promoters
      of Notch target genes, including HES1 and HEY1. Crystal structure of the
      RBPJ-NICD-MAML complex on DNA confirms direct sequence-specific DNA binding (PMID:16530044).
    action: ACCEPT
    reason: >-
      Core molecular function confirmed by structural biology and functional assays.
    supported_by:
      - reference_id: PMID:16530044
        supporting_text: "the crystal structure of a Notch transcriptional activation complex containing the ankyrin domain of human Notch1 (ANK), the transcription factor CSL on cognate DNA"
- term:
    id: GO:0002193
    label: MAML1-RBP-Jkappa- ICN1 complex
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      RBPJ is a defining component of the MAML1-RBP-Jkappa-ICN1 ternary transcription
      activation complex. The crystal structure of this complex has been solved at 3.25
      angstroms (PMID:16530044). This complex is conserved across metazoans.
    action: ACCEPT
    reason: >-
      Core cellular component. The ternary complex is the fundamental active signaling
      output of Notch pathway activation.
    supported_by:
      - reference_id: PMID:16530044
        supporting_text: "the crystal structure of a Notch transcriptional activation complex containing the ankyrin domain of human Notch1 (ANK), the transcription factor CSL on cognate DNA, and a polypeptide from the coactivator Mastermind-like-1 (MAML-1)"
