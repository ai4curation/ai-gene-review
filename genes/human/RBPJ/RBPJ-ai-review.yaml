id: Q06330
gene_symbol: RBPJ
product_type: PROTEIN
status: IN_PROGRESS
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  RBPJ (also known as CBF1, RBP-Jkappa, or CSL) is the central transcriptional regulator
  of the conserved Notch signaling pathway. It is a sequence-specific DNA-binding protein
  that recognizes the consensus motif TGGGAA (PMID:9874765, PMID:23303788). In the absence
  of Notch signaling, RBPJ recruits corepressor complexes containing CIR, SHARP/SPEN,
  NCOR2/SMRT, CtIP/CtBP, and histone deacetylases (HDAC1/2) to repress transcription
  of Notch target genes such as HES1 and HEY1 (PMID:9874765, PMID:16287852). Upon
  Notch receptor activation, the Notch intracellular domain (NICD) translocates to
  the nucleus, displaces corepressors from RBPJ, and together with MAML coactivators
  forms a ternary transcription activation complex (RBPJ-NICD-MAML) that drives
  expression of Notch target genes (PMID:16530044, PMID:32601208). RBPJ also has
  Notch-independent functions, including binding methylated DNA (PMID:21991380) and
  regulating expression of COX4I2 under hypoxic conditions via the oxygen responsive
  element (PMID:23303788). Mutations in RBPJ cause Adams-Oliver syndrome 3 (AOS3),
  a disorder featuring aplasia cutis congenita and transverse limb defects. RBPJ is
  also exploited by Epstein-Barr virus, whose EBNA2 and EBNA3 proteins target RBPJ
  to manipulate host gene expression during viral transformation (PMID:8627785).
