# ===== CORE FUNCTIONS =====
core_functions:
- description: >-
    RBPJ acts as a dual-function DNA-binding transcription factor, repressing Notch target
    genes (HES1, HEY1, Slug) when NICD is absent by recruiting corepressor complexes
    (CIR, SHARP, NCOR, CtIP/CtBP, L3MBTL3, KDM1A, HDACs), and activating them when
    NICD and MAML coactivators are recruited to form the ternary activation complex.
  molecular_function:
    id: GO:0000981
    label: DNA-binding transcription factor activity, RNA polymerase II-specific
  directly_involved_in:
    - id: GO:0007219
      label: Notch signaling pathway
    - id: GO:0045944
      label: positive regulation of transcription by RNA polymerase II
    - id: GO:0045892
      label: negative regulation of DNA-templated transcription
  locations:
    - id: GO:0005654
      label: nucleoplasm
  supported_by:
