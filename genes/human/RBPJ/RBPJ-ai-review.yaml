# ===== PROTEIN BINDING IPI ANNOTATIONS =====
- term:
    id: GO:0005515
    label: protein binding
  evidence_type: IPI
  original_reference_id: PMID:10713164
  review:
    summary: >-
      This study identified SKIP (SNW1) as a CBF1-interacting protein by yeast two-hybrid
      screen. SKIP interacts with both CBF1 and NotchIC, mediating the switch between
      repression and activation (PMID:10713164). Protein binding is too vague for this
      specific interaction.
    action: MODIFY
    reason: >-
      The interaction with SNW1/SKIP is real but 'protein binding' is uninformative.
      A more specific term should be used.
    proposed_replacement_terms:
      - id: GO:0140297
        label: DNA-binding transcription factor binding
    supported_by:
      - reference_id: PMID:10713164
        supporting_text: "We identified SKIP (Ski-interacting protein) as a CBF1 binding protein in a yeast two-hybrid screen"
- term:
    id: GO:0005515
    label: protein binding
  evidence_type: IPI
  original_reference_id: PMID:17284587
  review:
    summary: >-
