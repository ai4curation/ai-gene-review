    label: cytoplasm
  evidence_type: IEA
  original_reference_id: GO_REF:0000044
  review:
    summary: >-
      RBPJ can be found in the cytoplasm, particularly upon interaction with RITA1/C12orf52
      which promotes nuclear export. UniProt states "Mainly nuclear, upon interaction with
