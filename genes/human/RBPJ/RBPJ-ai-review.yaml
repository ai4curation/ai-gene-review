# ===== IDA/IMP ANNOTATIONS =====
- term:
    id: GO:0005654
    label: nucleoplasm
  evidence_type: IDA
  original_reference_id: GO_REF:0000052
  review:
    summary: >-
      Nucleoplasm localization based on immunofluorescence data curation. RBPJ is a
      nuclear protein found in the nucleoplasm where it functions as a transcription factor.
    action: ACCEPT
    reason: >-
      Consistent with RBPJ function as a nuclear transcription factor.
- term:
    id: GO:0005634
    label: nucleus
  evidence_type: IDA
  original_reference_id: PMID:32601208
  review:
    summary: >-
      Study of pharmacological disruption of the Notch transcription factor complex.
      RBPJ nuclear localization demonstrated as part of the NICD-RBPJ-MAML complex
      (PMID:32601208).
    action: ACCEPT
    reason: >-
      Core localization consistent with transcription factor function.
    supported_by:
      - reference_id: PMID:32601208
        supporting_text: "CB-103 inhibits Notch signaling in primary human T cell acute lymphoblastic leukemia and other Notch-dependent human tumor cell lines"
- term:
    id: GO:0007219
    label: Notch signaling pathway
  evidence_type: IDA
  original_reference_id: PMID:32601208
  review:
    summary: >-
      Study demonstrates that pharmacological disruption of the RBPJ-NICD-MAML complex
      by CB-103 inhibits Notch signaling, confirming RBPJ is integral to the Notch
      transcription complex (PMID:32601208).
    action: ACCEPT
    reason: >-
      Core function, confirmed by pharmacological disruption experiments.
    supported_by:
      - reference_id: PMID:32601208
        supporting_text: "we report the discovery of an orally active small-molecule inhibitor (termed CB-103) of the Notch transcription activation complex"
- term:
    id: GO:0045893
    label: positive regulation of DNA-templated transcription
  evidence_type: IDA
  original_reference_id: PMID:32601208
  review:
    summary: >-
      RBPJ in complex with NICD and MAML activates transcription. CB-103 disrupts
      this complex and inhibits transcription activation (PMID:32601208).
    action: ACCEPT
    reason: >-
      Core function. RBPJ drives transcription activation when in the Notch activation complex.
- term:
    id: GO:0043467
    label: regulation of generation of precursor metabolites and energy
  evidence_type: IDA
  original_reference_id: PMID:23303788
  review:
    summary: >-
      RBPJ regulates COX4I2 expression, which affects cytochrome c oxidase activity and
      thus energy metabolism. However, this is a downstream consequence of RBPJ
      transcriptional regulation of COX4I2, not a direct metabolic function (PMID:23303788).
    action: KEEP_AS_NON_CORE
    reason: >-
      While RBPJ does regulate COX4I2 transcription, the effect on energy metabolism
      is indirect via transcriptional regulation. This is a non-core downstream effect.
    supported_by:
      - reference_id: PMID:23303788
        supporting_text: "We demonstrate that RBPJ and CHCHD2 function towards activating the ORE at 4% oxygen, whereas CXXC5 functions as an inhibitor"
- term:
    id: GO:0045944
    label: positive regulation of transcription by RNA polymerase II
  evidence_type: IDA
  original_reference_id: PMID:23303788
  review:
    summary: >-
      RBPJ binds the oxygen responsive element of COX4I2 and activates its transcription
      under hypoxia conditions (PMID:23303788). Demonstrates Notch-independent
      transcriptional activation by RBPJ.
    action: ACCEPT
    reason: >-
      Core molecular function. This study shows RBPJ can activate Pol II transcription
      in a Notch-independent context at the COX4I2 promoter.
    supported_by:
      - reference_id: PMID:23303788
        supporting_text: "We demonstrate that RBPJ and CHCHD2 function towards activating the ORE at 4% oxygen"
- term:
    id: GO:0007219
    label: Notch signaling pathway
  evidence_type: IMP
  original_reference_id: PMID:21311046
  review:
    summary: >-
      Analysis of RBPJk-targeted embryos shows Notch ablation causes ectopic
      procardiogenic signaling in the proepicardium (PMID:21311046). Demonstrates
      RBPJ function in Notch signaling in mouse cardiac development.
    action: ACCEPT
    reason: >-
      Core function. RBPJk-targeted (knockout) embryos demonstrate loss of Notch
      signaling in the cardiac context.
    supported_by:
      - reference_id: PMID:21311046
        supporting_text: "Analysis of RBPJk-targeted embryos indicates that Notch ablation causes ectopic procardiogenic signaling in the proepicardium"
- term:
    id: GO:0007507
    label: heart development
  evidence_type: IMP
  original_reference_id: PMID:21311046
  review:
    summary: >-
      RBPJk-targeted embryos show cardiac inflow development defects and abnormal
      coronary vessel morphogenesis (PMID:21311046).
    action: KEEP_AS_NON_CORE
    reason: >-
      Pleiotropic developmental process. Heart development is one of many contexts
      where RBPJ/Notch signaling functions.
    supported_by:
      - reference_id: PMID:21311046
        supporting_text: "Notch ablation causes ectopic procardiogenic signaling in the proepicardium that in turn promotes myocardial differentiation in adjacent mesodermal progenitors"
