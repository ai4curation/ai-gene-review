gene_symbol: FBXL15
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  FBXL15 (F-box/LRR-repeat protein 15; F-box only protein 37, FBXO37) is a
  substrate-recognition subunit of an SCF (SKP1-CUL1-RBX1) E3 ubiquitin ligase
  complex. Its F-box motif binds SKP1 to dock it onto the CUL1-RBX1 catalytic
  scaffold, while its leucine-rich repeat domain provides substrate selectivity.
  SCF(FBXL15) targets the HECT-type E3 ubiquitin ligase SMURF1 for
  ubiquitination and proteasomal degradation; by lowering SMURF1 levels it acts
  as a positive regulator of bone morphogenetic protein (BMP) signaling.
  FBXL15 recognizes the large subdomain within the N-lobe of the SMURF1 HECT
  domain and promotes SMURF1 ubiquitination on lysines in the WW-HECT linker,
  and it can also ubiquitinate the related HECT ligases SMURF2 and WWP2. Through
  this control of SMURF1 stability, FBXL15 contributes to dorsal/ventral pattern
  formation during embryonic development and to bone mass maintenance. It acts
  in the cytoplasm.
