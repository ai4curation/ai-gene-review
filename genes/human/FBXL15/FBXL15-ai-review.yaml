suggested_questions:
- question: Beyond SMURF1/SMURF2/WWP2, does SCF(FBXL15) have additional substrates, and what degron does its LRR recognize on the HECT N-lobe?
- question: Is the reported G2/M transition role (GO:0000086) a genuine SCF(FBXL15) function, and if so which substrate mediates it?
suggested_experiments:
- description: Reconstitute SCF(FBXL15)-mediated ubiquitination of SMURF1 in vitro with purified SKP1-CUL1-RBX1-FBXL15 and an E2 to confirm direct ubiquitination and map the WW-HECT linker lysines (e.g. K355/K357).
- description: Generate FBXL15-knockout cells/animals and measure SMURF1 levels, BMP/SMAD signaling output, bone mineralization, and any cell-cycle (G2/M) phenotypes to test the breadth of FBXL15 function.
