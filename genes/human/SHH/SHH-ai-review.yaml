id: Q15465
gene_symbol: SHH
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: 'SHH encodes Sonic hedgehog, a secreted morphogen synthesized as a 462-amino-acid precursor.
  In the endoplasmic reticulum, its C-terminal HINT domain catalyzes autocleavage coupled to covalent
  transfer of cholesterol onto the C terminus of the N-terminal signaling product; HHAT subsequently palmitoylates
  the new N terminus. The mature, dually lipidated SHH-N product is retained at and released from producing-cell
  membranes and acts locally or over a distance. SHH-N binds PTCH1 or PTCH2, relieving Patched-mediated
  inhibition of SMO and changing GLI activator/repressor output in target cells. Spatial concentration
  and duration of this signal control cell-fate specification, proliferation, and tissue patterning across
  the developing nervous system, limb, somites, and multiple epithelial-mesenchymal organs. Heterozygous
  loss-of-function variants in human SHH are a cause of holoprosencephaly and related midline developmental
  defects.'
