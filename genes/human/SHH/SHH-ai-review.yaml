core_functions:
  - description: The mature dually lipidated SHH-N morphogen binds Patched receptors on responding 
      cells. This removes PTCH-mediated repression of Smoothened and changes GLI-dependent 
      transcription, converting spatial SHH availability into concentration- and duration-dependent 
      cell-fate and proliferative responses.
    molecular_function:
      id: GO:0005113
      label: patched binding
    directly_involved_in:
      - id: GO:0045880
        label: positive regulation of smoothened signaling pathway
    locations:
      - id: GO:0005576
        label: extracellular region
    supported_by:
      - reference_id: PMID:30139912
        supporting_text: Activation occurs when the lipid-modified HH-N binds to its receptor, 
          Patched-1 (PTCH1) protein (15).
      - reference_id: PMID:30139912
        supporting_text: In the absence of HH-N binding, PTCH1 represses the HH pathway presumably 
          by regulating the transport of a ligand of its downstream protein, Smoothened (SMO) (2, 
          17, 18).
  - description: 'The C-terminal HINT domain of the SHH precursor catalyzes an intramolecular cholesterolysis
      reaction: precursor cleavage is coupled to transfer of cholesterol onto the newly generated C terminus
      of SHH-N. This self-processing reaction produces the cholesterylated signaling product required
      for its normal trafficking and range.'
    molecular_function:
      id: GO:0140853
      label: cholesterol-protein transferase activity
    directly_involved_in:
      - id: GO:0016540
        label: protein autoprocessing
    locations:
      - id: GO:0005783
        label: endoplasmic reticulum
    supported_by:
      - reference_id: PMID:24342078
        supporting_text: This preproprotein is composed of a 23aa signal peptide ER targeting 
          sequence, a 174 amino acid N-terminal signaling domain, and a 265aa C-terminal 
          autoprocessing domain endowed with autoproteolysis and cholesterol transferase activity.
proposed_new_terms: []
suggested_questions:
  - question: How do the two PTCH-binding interfaces, SHH calcium/zinc coordination, and dual 
      lipidation quantitatively determine signaling potency and tissue range in human developmental 
      contexts?
  - question: Which human tissues use predominantly paracrine versus 
      producing-cell-surface/juxtacrine SHH signaling, and how do DISP1, SCUBE2, glypicans, CDON, 
      BOC, and GAS1 partition those modes?
  - question: How closely does Purkinje-cell SHH output and granule-cell-precursor response in human
      fetal cerebellum or organoids recapitulate the causal circuit established in mouse?
  - question: Which developmental phenotypes of human SHH variants arise primarily from defective 
      precursor cholesterolysis, impaired secretion/range, or altered PTCH/co-receptor engagement?
suggested_experiments:
  - description: Engineer isogenic human cells with SHH variants that separately disrupt the HINT 
      catalytic residues, cholesterol acceptor site, palmitoylation site, calcium/zinc interface, or
      PTCH-binding surfaces; quantify precursor processing, lipidation, secretion, PTCH binding, 
      ciliary SMO accumulation, and GLI reporter output.
  - description: Use spatially resolved human neural-tube, forebrain, limb-bud, and cerebellar 
      organoids with inducible SHH source cells and live GLI reporters to measure how SHH 
      concentration, exposure duration, lipidation, and carrier proteins determine cell-fate 
      thresholds.
  - description: In human cerebellar organoids, selectively delete or restore SHH in 
      Purkinje-lineage cells and quantify granule-cell-precursor EdU incorporation, cell-cycle 
      state, differentiation, and foliation-like tissue architecture, with SMO inhibition as an 
      epistasis control.
