id: P31213
gene_symbol: SRD5A2
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: Steroid 5-alpha-reductase type 2 (3-oxo-5-alpha-steroid 4-dehydrogenase
  2; EC 1.3.1.22), an endoplasmic-reticulum-membrane, NADPH-dependent oxidoreductase
  that catalyzes the irreversible, stereospecific reduction of the C4-C5 double bond
  of 3-oxo-Delta4 steroids to their 5alpha-dihydro products. Its most important reaction
  is the conversion of testosterone to 5alpha-dihydrotestosterone (DHT), the most potent
  androgen and the preferred ligand for androgen receptor transactivation; it also reduces
  progesterone and other 3-oxo-Delta4 steroids. The enzyme is a multi-pass membrane protein
  highly expressed in androgen-target tissues (prostate, genital skin, hair follicle) and
  is the principal isozyme responsible for DHT production in genital tissue. Loss-of-function
  variants cause 5alpha-reductase-2 deficiency (pseudovaginal perineoscrotal hypospadias),
  a form of 46,XY difference of sex development in which affected individuals have normal
  testosterone but low DHT and undervirilized external genitalia. SRD5A2 is the molecular
  target of the therapeutic inhibitors finasteride and dutasteride, used to treat benign
  prostatic hyperplasia and androgenetic alopecia.
