id: Q53GQ0
gene_symbol: HSD17B12
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  HSD17B12 (SDR12C1), also known biochemically as 3-ketoacyl-CoA reductase (KAR)
  and named "very-long-chain 3-oxoacyl-CoA reductase", is an NADPH-dependent,
  endoplasmic-reticulum membrane enzyme of the short-chain dehydrogenase/reductase
  (SDR) superfamily. It catalyzes the second of the four reactions of the microsomal
  fatty-acid elongation cycle: the NADPH-dependent reduction of the 3-ketoacyl-CoA
  (3-oxoacyl-CoA) generated by the ELOVL condensing enzymes to (3R)-3-hydroxyacyl-CoA.
  As the main 3-ketoacyl-CoA reductase of the long- and very-long-chain fatty-acid
  (VLCFA) elongation machinery, it contributes to the supply of VLCFAs and
  polyunsaturated acyl chains that serve as precursors of membrane lipids, sphingolipids
  and lipid mediators. It is a multi-pass ER membrane protein anchored by transmembrane
  helices and a C-terminal di-lysine ER-retention motif, and it physically associates
  with elongase-cycle components such as ELOVL1 and CERS2/LASS2. Historically cloned
  as "type 12 17-beta-hydroxysteroid dehydrogenase" and shown in heterologous
  overexpression to reduce estrone to 17-beta-estradiol, its established physiological
  substrate is fatty-acyl-CoA rather than steroids.
