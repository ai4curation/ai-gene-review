proposed_new_terms: []
suggested_questions:
- question: >-
    What is FOXRED1's actual enzymatic reaction and physiological substrate, and does its
    FAD-dependent redox chemistry contribute to complex I assembly, or does the fold act as a
    non-catalytic FAD-stabilized scaffold/chaperone?
- question: >-
    At the mid-late (~815 kDa to mature) transition, which specific complex I subunit(s) or
    assembly intermediate does FOXRED1 act on, and how do the MC1DN19 hypomorphic variants
    (R352W, N430S) perturb this step?
suggested_experiments:
- description: >-
    In vitro reconstitution with purified recombinant FOXRED1 and FAD, screening candidate
    substrates (e.g. complex I subunits or intermediates) by mass spectrometry / redox assays
    to define the catalyzed reaction and EC subclass, and testing whether catalytically dead
    (FAD-binding-pocket) mutants still support complex I assembly in FOXRED1-null cells.
- description: >-
    Complexome profiling / cross-linking MS in FOXRED1-null versus rescued cells to map which
    assembly intermediate accumulates or is destabilized and to identify FOXRED1's direct
    binding partner within the mid-late complex I assembly pathway.
