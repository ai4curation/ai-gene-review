id: Q96CU9
gene_symbol: FOXRED1
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  FOXRED1 (FAD-dependent oxidoreductase domain-containing protein 1) is a nuclear-encoded
  flavoprotein of the mitochondrial inner membrane that functions as a complex I-specific
  assembly factor (molecular chaperone) required for biogenesis of the respiratory chain
  NADH:ubiquinone oxidoreductase (complex I). It belongs to the FAD-dependent oxidoreductase
  (DAO/FAD-NAD(P)-binding) structural family, carries an FAD cofactor, and is annotated as an
  oxidoreductase (EC 1.-.-.-), but no in-vivo catalytic substrate or reaction has been defined
  and it is not a structural subunit of the mature 44-subunit holoenzyme. FOXRED1 acts at the
  mid-late stages of complex I assembly, transiently associating with assembly intermediates
  and complex I subunits; in its absence, a late (~815 kDa) intermediate fails to mature and
  instead degrades to a smaller (~475 kDa) subcomplex, and cells accumulate only residual
  complex I. Biallelic loss-of-function variants cause mitochondrial complex I deficiency,
  nuclear type 19 (MC1DN19), an autosomal-recessive infantile-onset encephalomyopathy.
