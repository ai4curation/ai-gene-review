core_functions:
- description: >-
    FAD-dependent oxidoreductase activity of an FAD-binding flavoprotein. FOXRED1 belongs to
    the DAO / FAD-NAD(P)-binding oxidoreductase structural family and carries an FAD cofactor,
    and is classified by UniProt as an oxidoreductase (EC 1.-.-.-). No physiological substrate
    or specific reaction has been demonstrated, so the activity is captured at the generic
    oxidoreductase level; FOXRED1 is not a catalytic subunit of the complex I holoenzyme, so
    NADH dehydrogenase activity is deliberately NOT assigned.
