  qualifier: is_active_in
  review:
    summary: >-
      Phylogenetic (IBA) assignment of an ER-membrane location. SLC35B3 was
      experimentally localized to the Golgi apparatus, not the ER; ER
      localization is a feature of some other SLC35B-family members
      (e.g. SLC35B1) and this IBA likely reflects the broader family tree rather
      than SLC35B3 itself. Not a demonstrated location for this gene.
    action: KEEP_AS_NON_CORE
    reason: >-
      IBA-only, contradicted by the experimental subcellular localization of
      SLC35B3 to the Golgi. Kept (not removed) because a minor ER pool cannot be
      formally excluded and the annotation derives from a conservative family
      phylogeny, but it is not part of the core biology of this gene.
