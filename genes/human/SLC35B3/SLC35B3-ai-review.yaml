  label: Homo sapiens
description: >-
  SLC35B3 (PAPS transporter 2, PAPST2) is a multi-pass Golgi-membrane protein of
  the nucleotide-sugar transporter family (SLC35B subfamily) and a paralog of
  SLC35B2 (PAPST1). It transports the universal sulfonate donor
  3'-phosphoadenosine 5'-phosphosulfate (PAPS) from the cytosol into the Golgi
  lumen, operating as a PAPS/adenosine 3',5'-bisphosphate (PAP) antiporter that
  exchanges cytosolic PAPS for lumenal PAP. By supplying PAPS to lumenal
  sulfotransferases, it provides the activated sulfate used for post-translational
  sulfation of glycoproteins, proteoglycans, and other glycoconjugates in the
  Golgi. The protein was first characterized biochemically from colon, where it
  contributes to synthesis of sulfated glycoconjugates such as the sialyl
  6-sulfo N-acetyllactosamine epitope; broader expression databases indicate it
  is expressed across many tissues.
