    label: nucleotide-excision repair involved in interstrand cross-link repair
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: involved_in
  review:
    summary: >-
      Role in the incision (unhooking) step of interstrand crosslink repair,
      phylogenetically inferred and experimentally confirmed.
    action: ACCEPT
    reason: >-
      ERCC1-XPF makes the unhooking incisions that release ICLs; this is a core
      function of the endonuclease alongside canonical NER. Biallelic ERCC4
      mutations that selectively disrupt ICL repair (sparing NER) cause Fanconi
      anemia complementation group Q, providing human genetic evidence for this
      dedicated ICL-repair function.
    supported_by:
      - reference_id: PMID:32034146
        supporting_text: >-
          The XPF-ERCC1 heterodimer is a structure-specific endonuclease that is
          essential for nucleotide excision repair (NER) and interstrand crosslink
          (ICL) repair in mammalian cells.
      - reference_id: PMID:23623386
        supporting_text: >-
          the identified FA-causing ERCC4 mutations strongly disrupt the function
          of XPF in DNA ICL repair without severely compromising nucleotide
          excision repair.
