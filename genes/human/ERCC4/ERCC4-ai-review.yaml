- description: >-
    The same ERCC1-XPF structure-specific endonuclease cleaves non-homologous 3' flaps
    and 3' single-stranded overhangs, processing recombination intermediates during
    homology-directed double-strand break repair, most notably single-strand annealing
    where the activity is stimulated by RAD52. The identical 3'-overhang endonuclease
    activity also removes the 3' overhang from uncapped telomeres.
