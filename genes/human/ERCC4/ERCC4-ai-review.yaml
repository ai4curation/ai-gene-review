id: Q92889
gene_symbol: ERCC4
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  ERCC4/XPF is the catalytic subunit of the ERCC1-XPF structure-specific DNA
  endonuclease, a Mg2+-dependent nuclease that cleaves DNA at single-stranded/
  double-stranded junctions and makes the incision 5' to a lesion on the damaged
  strand. XPF houses the nuclease active site (N-terminal helicase-like/nuclease
  region), while its obligate partner ERCC1 (bound through the C-terminal double
  helix-hairpin-helix domain) contributes additional DNA binding but is
  catalytically inert. As the enzyme that makes the 5' incision, ERCC1-XPF is
  essential for nucleotide excision repair (NER), where it is recruited to lesions
  via XPA and, together with the 3'-incising ERCC5/XPG nuclease, excises the
  damage-containing oligonucleotide. The same structure-specific endonuclease
  performs the unhooking incisions that release DNA interstrand crosslinks (ICLs),
  where it is coordinated by SLX4/FANCP, and it processes recombination
  intermediates in homology-directed pathways including single-strand annealing
  (acting on 3' non-homologous flaps, stimulated by RAD52). ERCC1-XPF also acts at
  telomeres, removing the 3' single-stranded overhang from uncapped telomeres and
  negatively regulating telomere length. The enzyme localizes to the nucleus and to
  chromatin sites of DNA damage. Loss of XPF function underlies a spectrum of human
  disease that all reflects the same endonuclease deficiency - xeroderma pigmentosum
  group F, XPF-Cockayne syndrome, XFE progeroid syndrome, and Fanconi anemia
  complementation group Q.
