- term:
    id: GO:0000014
    label: single-stranded DNA endodeoxyribonuclease activity
  evidence_type: IDA
  original_reference_id: PMID:22483113
  qualifier: enables
  review:
    summary: >-
      XPF is a single-stranded DNA endodeoxyribonuclease that, within the ERCC1-XPF
      heterodimer, nicks the damaged strand at the 5' end of a lesion at ss/ds
      junctions. This is the precise molecular function underlying the more general
      "DNA endonuclease activity" annotations.
    action: NEW
    reason: >-
      Added as a more specific molecular-function term than GO:0004520 (DNA
      endonuclease activity), which is already annotated. UniProt annotates this term
      (IDA), and the structure-specific 5'-incising, ssDNA/junction-cleaving activity
      is directly supported. Used as the core molecular function of XPF as the
      catalytic subunit.
    supported_by:
      - reference_id: PMID:22483113
        supporting_text: >-
          Human XPF/ERCC1 is a structure-specific DNA endonuclease that nicks the
          damaged DNA strand at the 5' end during nucleotide excision repair.
      - reference_id: PMID:10413517
        supporting_text: >-
          determined that it is an endonuclease and can bind DNA in the absence of the
          ERCC1 subunit.
core_functions:
- description: >-
    Catalytic subunit of the ERCC1-XPF structure-specific endonuclease that makes the
    5' incision on the damaged strand at single-stranded/double-stranded DNA junctions,
    the incision step required for nucleotide excision repair and for the unhooking of
    DNA interstrand crosslinks. XPF provides the Mg2+-dependent nuclease active site and
    the ssDNA-junction recognition, while its obligate partner ERCC1 provides additional
    DNA binding.
  molecular_function:
    id: GO:0000014
    label: single-stranded DNA endodeoxyribonuclease activity
  directly_involved_in:
    - id: GO:0006289
      label: nucleotide-excision repair
    - id: GO:1901255
      label: nucleotide-excision repair involved in interstrand cross-link repair
  locations:
    - id: GO:0005654
      label: nucleoplasm
  in_complex:
