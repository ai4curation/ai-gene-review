- term:
    id: GO:0006312
    label: mitotic recombination
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: involved_in
  review:
    summary: >-
      Phylogenetically inferred role in mitotic recombination, consistent with the
      conserved function of XPF-family nucleases (yeast Rad1/Rad16, fly Mei-9) in
      processing recombination intermediates.
    action: KEEP_AS_NON_CORE
    reason: >-
      ERCC1-XPF genuinely participates in homology-directed recombination (notably
      single-strand annealing, cleaving 3' non-homologous flaps), so the term is
      correct, but recombination is a specialized application of the core
      structure-specific endonuclease activity rather than the gene's primary
      (NER/ICL) function.
    supported_by:
      - reference_id: PMID:22547097
        supporting_text: >-
          ERCC1-XPF is a heterodimeric, structure-specific endonuclease that cleaves
          single-stranded/double-stranded DNA junctions and has roles in nucleotide
          excision repair (NER), interstrand crosslink (ICL) repair, homologous
          recombination, and possibly other pathways.
