id: Q8IUR0
gene_symbol: TRAPPC5
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: 'TRAPPC5 is the human Trs31 ortholog and a small TRAPP core subunit.
  It supports TRAPP complex architecture, complex-level RAB1 guanine-nucleotide exchange,
  and ER-to-Golgi vesicle-mediated transport. In the PN TRAPP-component context, TRAPPC5
  is best curated through TRAPP/TRAPPII/TRAPPIII complex membership and ER-Golgi trafficking
  rather than a broad autophagy process annotation.'
