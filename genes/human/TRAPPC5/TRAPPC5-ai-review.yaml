  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: part_of
  review:
    summary: TRAPPI protein complex is problematic as a human TRAPPC5 
      annotation.
    action: MARK_AS_OVER_ANNOTATED
    reason: Mark as over-annotated. TRAPPC5 is a yeast TRAPP I core ortholog, 
      but the mammalian literature questions the existence of a discrete TRAPP I
      complex in vivo.
