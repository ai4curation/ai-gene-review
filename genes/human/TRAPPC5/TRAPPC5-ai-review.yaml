suggested_questions:
- question: Should TRAPPC5 receive a contributes_to RAB1 guanine-nucleotide 
    exchange factor activity annotation based on Trs31-dependent yeast GEF 
    evidence plus mammalian TRAPP complex models?
  experts:
  - GO transport editors
  - Reactome TRAPP curators
- question: Should human TRAPPI protein complex annotations be removed or 
    replaced when the literature questions a discrete mammalian TRAPP I complex?
  experts:
  - GO cellular-component editors
  - ComplexPortal curators
- question: Should PN TRAPP-component autophagy context be represented only by 
    TRAPPIII membership for TRAPPC5 unless TRAPPC5-specific autophagy 
    experiments are available?
  experts:
  - GO autophagy editors
  - TRAPP biology experts
suggested_experiments:
- description: Reconstitute TRAPPC5-containing human TRAPP complexes and measure
    RAB1 GDP-GTP exchange after TRAPPC5 depletion or interface mutation.
  experiment_type: complex reconstitution and RAB1 GEF assay
  hypothesis: TRAPPC5 is required as a core TRAPP subunit for complex-level RAB1
    GEF activity.
- description: Use TRAPPC5 knockout/rescue cells to assay ER-to-Golgi cargo 
    transport, TRAPP complex stability, and Golgi/ER localization of TRAPP 
    subunits.
  experiment_type: cellular trafficking rescue assay
  hypothesis: TRAPPC5 loss disrupts TRAPP-dependent ER-to-Golgi vesicle-mediated
    transport by destabilizing or mislocalizing the TRAPP core.
- description: Biochemically separate human TRAPPII and TRAPPIII pools 
    containing TRAPPC5 and test whether any discrete TRAPPI-like pool exists in 
    vivo.
  experiment_type: complex purification and native fractionation
  hypothesis: TRAPPC5 is present in human TRAPPII/TRAPPIII assemblies, while a 
    discrete mammalian TRAPPI complex is absent or not stable in vivo.
