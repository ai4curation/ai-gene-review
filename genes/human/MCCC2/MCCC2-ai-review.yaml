    summary: Phylogenetic (IBA) inference of the core molecular function of MCCC2,
      the carboxyltransferase subunit of 3-methylcrotonyl-CoA carboxylase. The `contributes_to`
      qualifier is appropriate because catalysis is a property of the assembled alpha6-beta6
