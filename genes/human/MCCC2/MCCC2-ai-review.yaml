id: Q9HCC0
gene_symbol: MCCC2
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: MCCC2 encodes the beta (carboxyltransferase) subunit of mitochondrial
  3-methylcrotonyl-CoA carboxylase (MCC; EC 6.4.1.4), a biotin-dependent carboxylase
  of the leucine catabolic pathway. MCC catalyzes the ATP- and bicarbonate-dependent
  carboxylation of 3-methylcrotonyl-CoA to 3-methylglutaconyl-CoA. The holoenzyme
  is an alpha6-beta6 dodecamer in which the biotin-containing alpha subunit (MCCC1)
  carries out biotin carboxylation and shuttles the carboxyl group as carboxybiotin,
  while the non-biotin-containing beta subunit encoded by MCCC2 binds the acyl-CoA
  substrate and provides the carboxyltransferase activity that transfers the carboxyl
  group to 3-methylcrotonyl-CoA. The mature protein is imported into the mitochondrial
  matrix via a cleavable N-terminal presequence and belongs to the AccD/PCCB carboxyltransferase
  family, with N- and C-terminal CoA carboxyltransferase domains. Biallelic loss-of-function
  variants in MCCC2 (or in MCCC1) cause 3-methylcrotonyl-CoA carboxylase deficiency
  (3-methylcrotonylglycinuria), an autosomal recessive organic aciduria of leucine
  catabolism with a highly variable phenotype ranging from asymptomatic to severe
  neonatal metabolic decompensation.
