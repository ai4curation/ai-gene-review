id: Q9H8P0
gene_symbol: SRD5A3
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: SRD5A3 is an endoplasmic reticulum membrane, NADPH-dependent polyprenal
  reductase that acts in the terminal steps of de novo dolichol biosynthesis. In the
  currently accepted pathway it catalyzes the reduction of the alpha-isoprene unit
  of a di-trans,poly-cis-polyprenal to the corresponding dolichal, an intermediate
  in converting polyprenol to dolichol; the resulting dolichol is phosphorylated to
  dolichol-phosphate, the essential lipid carrier used to assemble the lipid-linked
  oligosaccharide precursor for protein N-linked glycosylation. It is a multi-pass
  member of the steroid 5-alpha-reductase family (polyprenal reductase subfamily;
  yeast ortholog DFG10). Loss-of-function mutations cause SRD5A3-congenital disorder
  of glycosylation (SRD5A3-CDG, CDG type Iq) and Kahrizi syndrome, characterized by
  ocular coloboma, cerebellar vermis hypoplasia, and intellectual disability. Despite
  its name, SRD5A3 is not a physiological steroid 5-alpha-reductase; a weak in-vitro
  testosterone-to-dihydrotestosterone activity was reported at its discovery in prostate
  cancer, but its established physiological role is in dolichol synthesis and glycosylation,
  not steroid metabolism.
