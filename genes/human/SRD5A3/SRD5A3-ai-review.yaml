proposed_new_terms: []
suggested_questions:
- question: Given the revised pathway (Wilson et al. 2024), is the physiological substrate
    of SRD5A3 strictly polyprenal, and does it have any residual direct polyprenol-reducing
    activity in vivo?
- question: Is the in-vitro testosterone-to-dihydrotestosterone activity of SRD5A3
    physiologically relevant in any tissue (e.g. prostate cancer), or purely an artifact
    of overexpression?
suggested_experiments:
- description: Structural/biochemical characterization of SRD5A3 with polyprenal versus
    steroid substrates to quantify catalytic efficiency and confirm the physiological
    substrate.
- description: Tissue-specific conditional knockouts to test whether any androgen/steroid
    phenotype arises independently of the glycosylation defect.
