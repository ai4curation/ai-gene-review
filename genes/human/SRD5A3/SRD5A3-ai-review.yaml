- term:
    id: GO:0047751
    label: 3-oxo-5-alpha-steroid 4-dehydrogenase (NADP+) activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: Electronic annotation derived from the EC 1.3.1.22 (steroid) mapping via
      RHEA/EC (GO_REF:0000120). SRD5A3 is not a physiological steroid 5-alpha-reductase;
      its established function is polyprenal reduction in dolichol synthesis. The steroid
      EC was assigned on the basis of the gene name and weak in-vitro activity, and
      this purely electronic EC-mapping is a wrong inference of the enzyme's biological
      function.
    action: REMOVE
    reason: Demonstrably wrong electronic EC/RHEA-to-GO inference. Physiological substrate
      is polyprenal, not a steroid; null patients have a congenital disorder of glycosylation,
      not a steroid/androgen phenotype, and phylogeny argues the ancestral substrate
      was not a steroid. Per policy, wrong IEA EC-mappings are appropriate REMOVE targets.
    supported_by:
    - reference_id: PMID:20637498
      supporting_text: suggesting that the substrate of the enzyme encoded by the common
        ancestral gene was potentially not a steroid
