suggested_questions:
- question: What is the functional significance of the nuclear/nucleolar SRP19 pool and its active import, given that mature SRP acts in the cytoplasm?
- question: Do the alternative SRP19 isoforms differ in RNA-binding or SRP54-recruitment activity?
suggested_experiments:
- description: Reconstitute SRP assembly with wild-type versus RNA-clamp-deficient SRP19 mutants to quantify the requirement for SRP19 in SRP54 incorporation and signal-sequence-dependent targeting.
- description: Track SRP19 nucleocytoplasmic shuttling and SRP assembly state in cells with impaired importin-8/transportin import to test whether nuclear assembly contributes to functional SRP biogenesis.
