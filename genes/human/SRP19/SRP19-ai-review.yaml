  title: Identification of deletion mutations and three new genes at the familial polyposis locus.
  findings:
  - statement: Positional cloning at the APC/polyposis locus identified a gene identical to SRP19, the 19 kDa component of the ribosomal signal recognition particle.
    reference_section_type: ABSTRACT
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: Original mapping of SRP19; correctly identifies it as the SRP 19 kDa component despite the paper's APC focus.
- id: PMID:17434535
  title: A threefold RNA-protein interface in the signal recognition particle gates native complex assembly.
  findings:
  - statement: SRP19 is unstructured when free and folds into a compact core plus two extended RNA-binding loops upon binding SRP RNA; SRP54 subsequently binds the assembled SRP19-RNA complex.
    reference_section_type: ABSTRACT
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: Establishes SRP19's disorder-to-order RNA-binding transition gating SRP54 incorporation.
