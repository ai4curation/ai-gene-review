  findings: []
- id: PMID:12086622
  title: Crystal structure of SRP19 in complex with the S domain of SRP RNA and its implication for the assembly of the signal recognition particle.
  findings:
  - statement: Crystal structure of SRP19 bound to the S-domain of SRP RNA shows SRP19 clamps the tetraloops of helices 6 and 8 (helix 6 acting as a splint), pre-organizing the SRP54-binding site on helix 8; unlike bacterial systems, human SRP54 cannot bind SRP RNA before SRP19, establishing SRP19 as an upstream eukaryotic assembly factor.
    reference_section_type: ABSTRACT
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: PubMed-verified (Oubridge et al., Mol Cell 2002). Foundational structural basis for SRP19's helix-6/8 RNA clamp and SRP54-late ordered assembly.
- id: PMID:38858088
  title: The nucleolar phase of signal recognition particle assembly.
  findings:
  - statement: GFP-SRP19 accumulates in nucleoli and co-localizes with nucleolar markers; nucleolar disruption (low-dose actinomycin D, uL18/RPL5 depletion) relocalizes SRP19, and SRP proteins associate with many nucleolar/ribosome-biogenesis factors, supporting a bona fide nucleolar phase of SRP assembly.
    reference_section_type: ABSTRACT
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: PubMed-verified (Issa et al., Life Sci Alliance 2024). Strengthens the nucleolar SRP-assembly compartment for SRP19 (a non-core, assembly-stage localization).
- id: PMID:35754847
  title: Signal Recognition Particle in Human Diseases.
  findings:
  - statement: Reviews SRP-related human disease; SRP19 is among the SRP autoantigens (anti-SRP19, anti-SRP54, anti-SRP72, anti-7SL) recognized in immune-mediated necrotizing myopathy (IMNM)/anti-SRP myositis.
    reference_section_type: OTHER
  reference_review:
    relevance: LOW
    correctness: VERIFIED
    review_notes: PubMed-verified (Kellogg et al., Front Genet 2022). Disease/autoantigen context for SRP19; not a core molecular-function source.
