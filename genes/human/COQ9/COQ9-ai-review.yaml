proposed_new_terms: []
suggested_questions:
- question: What is the precise molecular mechanism by which COQ9 extracts membrane-embedded
    5-demethoxyubiquinone and hands it to the COQ7 active site within the COQ7:COQ9 octamer?
- question: Does COQ9 present intermediates only to COQ7, or does it also chaperone other
    lipophilic CoQ intermediates to additional COQ synthome enzymes?
suggested_experiments:
- description: Time-resolved / single-molecule structural studies (cryo-EM or FRET) of the
    COQ7:COQ9 octamer during substrate handoff to visualize the lipid-presentation step.
- description: Reconstitute COQ9 substrate presentation with defined CoQ intermediates and
    membranes of varying cardiolipin content to quantify how membrane composition gates
    substrate access.
