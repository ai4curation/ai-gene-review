id: O75208
gene_symbol: COQ9
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: COQ9 is a mitochondrial lipid-binding protein essential for the biosynthesis
  of coenzyme Q10 (ubiquinone), the lipid-soluble electron carrier of the respiratory
  chain. It has no catalytic activity of its own. Adopting a bacterial TetR/FadR-like
  all-alpha fold with a hydrophobic pocket, COQ9 binds membrane phospholipids (notably
  in cardiolipin-rich membranes) and lipophilic aromatic-isoprene CoQ-pathway intermediates,
  and presents the substrate 5-demethoxyubiquinone directly to the di-iron hydroxylase
  COQ7. Through this substrate-presentation role it activates the penultimate
  C6-hydroxylation step of CoQ biosynthesis. COQ9 forms homodimers and, together with
  COQ7, assembles into higher-order tetrameric and octameric COQ7:COQ9 modules that
  warp the membrane surface to access lipid cargo; this module is part of the larger
  CoQ biosynthetic complex ("complex Q" / COQ synthome, comprising COQ3-COQ9) on the
  matrix face of the mitochondrial inner membrane. The protein carries an N-terminal
  mitochondrial transit peptide and, under mitochondrial stress, its precursor is
  ubiquitinated by the SIFI complex before import. Loss-of-function variants in COQ9
  cause primary coenzyme Q10 deficiency type 5 (COQ10D5), an autosomal recessive
  neonatal-onset multisystem mitochondrial disease with encephalomyopathy.
