suggested_questions:
- question: Beyond YBX1, ATXN3/polyQ, MYC and p53, what is the full endogenous substrate repertoire of SCF(FBXO33), and what determines substrate selection given that FBXO33 lacks canonical LRR/WD40 substrate-binding domains and engages substrates via its N-terminal/non-F-box region rather than a classical phosphodegron?
- question: What governs the apparently opposing tumor-suppressive (MYC) versus oncogenic (p53) outcomes of FBXO33 activity in different tissues, and is this driven by tissue-specific substrate availability, FBXO33 expression level, or post-translational regulation (e.g. lactylation-driven transcription reported in gallbladder cancer)?
- question: Does FBXO33-mediated reduction of polyglutamine aggregation operate primarily through proteasomal degradation of expanded ATXN3, and could enhancing FBXO33 activity be protective in polyglutamine diseases?
suggested_experiments:
- description: Reconstitute SCF(FBXO33) in vitro with purified SKP1, CUL1, RBX1, an E2 and ubiquitin, and assay FBXO33-dependent poly-ubiquitination of recombinant YBX1, p53, MYC and expanded-polyQ ATXN3 (with substrate domain/site variants) to confirm direct substrate-adaptor activity and define the determinants of substrate selection.
- description: Perform quantitative ubiquitinome/proteome profiling in FBXO33-knockout versus wild-type cells across tissue contexts (e.g. bone-marrow stromal, lung, gallbladder, neuronal polyQ models), with and without proteasome inhibition, to define the endogenous SCF(FBXO33) substrate set and validate stabilization of YBX1/MYC/p53/ATXN3 upon FBXO33 loss.
- description: Test whether FBXO33 nucleocytoplasmic distribution and the lactylation-driven transcriptional regulation reported in cancer determine which substrates are engaged, by perturbing FBXO33 localization and expression and measuring substrate-specific stability changes.
