description: >-
  FBXO33 (F-box only protein 33, FBX33) is the substrate-recognition subunit of
  a SCF (SKP1-CUL1-F-box protein) / CRL1-type E3 ubiquitin-protein ligase
  complex. As an F-box "other" (FBXO) protein it lacks the C-terminal leucine-rich
  repeat or WD40 substrate-binding domains found in typical F-box proteins; instead
  it uses its N-terminal region to engage substrate, while its F-box motif (residues
  65-111) docks the adaptor SKP1, which in turn links it to the CUL1 scaffold and
  the catalytic RING subunit RBX1. Within this complex FBXO33 acts as the
  substrate receptor that selects target proteins for poly-ubiquitination and
  subsequent proteasomal degradation; it is the F-box adaptor and not the
  catalytic RING core, and it has been observed in both the nucleus and the
  cytoplasm. The best-documented substrate is the multifunctional cold-shock-domain
  transcription/translation/splicing regulator YBX1 (Y-box binding protein 1,
  YB-1/dbpB/p50): FBXO33 associates with the YBX1 cold-shock domain through its
  N-terminus and targets YBX1 for ubiquitin-dependent proteasomal degradation,
  a function with relevance to bone-marrow stromal cell fate during aging.
  Additional substrate-like targets and context-dependent roles have been
  reported: FBXO33 promotes ubiquitination and clearance of expanded-polyglutamine
  ataxin-3 (ATXN3), reducing toxic aggregation in models of polyglutamine disease
  (a proteostasis/protein-quality-control role); it can promote ubiquitination and
  degradation of MYC (suppressing stemness/metastasis in non-small-cell lung
  cancer) and of wild-type p53 (promoting metastasis in gallbladder cancer),
  illustrating that as a substrate adaptor it can be tumor-suppressive or
  oncogenic depending on the dominant substrate in a given context. FBXO33 was
  originally identified as a gene induced during programmed cell death and has
  also been implicated as a negative modulator of cardiomyocyte hypertrophy. It is
  widely expressed (with enhanced expression in bone) and has been recovered in
  SCF-network and chromatin/Polycomb-related interaction studies.
