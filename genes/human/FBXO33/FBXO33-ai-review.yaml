- id: file:human/FBXO33/FBXO33-deep-research-falcon.md
  title: Falcon deep research report for human FBXO33
  findings:
  - statement: FBXO33 is an F-box substrate adaptor of a CUL1-based CRL/SCF-like ubiquitin ligase that selects specific protein substrates for ubiquitination and proteasomal degradation, with documented substrates including YBX1, expanded-polyQ ATXN3, p53 and MYC.
    supporting_text: it is an **F-box substrate adaptor of a CUL1-based CRL/SCF-like ubiquitin ligase**, functioning primarily to **select specific protein substrates (or substrate-like targets)** for ubiquitination and downstream consequences including proteasomal degradation or altered solubility/aggregation.
  - statement: FBXO33 modulates ubiquitination and solubility of expanded-polyglutamine ataxin-3, reducing toxic aggregation in a proteasome-dependent manner, supporting a protein-quality-control/proteostasis role; it localizes to both nucleus and cytoplasm.
    supporting_text: FBXO33's role in a **CUL1-based ubiquitination pathway** contributing to proteostasis by promoting ubiquitination and reducing toxic aggregation/insolubility of expanded polyQ proteins.
  - statement: FBXO33 interacts with YBX1 and contributes to its ubiquitin-dependent degradation, an axis relevant to bone-marrow stromal cell fate during aging.
    supporting_text: FBXO33 interacts with YBX1 and is implicated in **ubiquitin-dependent degradation of YBX1**, with downstream relevance to bone marrow stromal cell (BMSC) aging
  - statement: As a substrate adaptor FBXO33 can be tumor-suppressive (MYC degradation in NSCLC) or oncogenic (p53 destabilization in gallbladder cancer) depending on the dominant substrate context.
    supporting_text: FBXO33 may be context-dependent—potentially **tumor suppressive** via MYC degradation in NSCLC (2024) but **oncogenic** via p53 destabilization in gallbladder cancer (2025).
  reference_review:
    relevance: HIGH
    correctness: UNVERIFIED
    review_notes: >-
      Falcon synthesis anchored on real primary studies: Chen et al. 2019
      (J Neurochem, doi:10.1111/jnc.14669; ATXN3/polyQ, nucleus+cytoplasm), Xiao
      et al. 2023 (EMBO J, doi:10.15252/embj.2022111762; YBX1/BMSC aging), Wei et
      al. 2024 (Front Biosci, doi:10.31083/j.fbl2908296; MYC/NSCLC), Wu et al. 2025
      (Cell Death Dis, doi:10.1038/s41419-025-07372-y; p53/gallbladder cancer), and
      Fischer et al. 2023 (Front Physiol, doi:10.3389/fphys.2023.1134339;
      cardiomyocyte hypertrophy). These corroborate and substantially extend the
      YBX1-centric annotation already supported by PMID:16797541; Falcon cites
      author-year/DOIs not PMIDs and the papers are not in the local cache, so the
      additional substrates are treated as strong leads (UNVERIFIED) pending
      curator confirmation.
core_functions:
- description: Substrate-recognition (F-box) subunit of an SCF/CRL1 E3 ubiquitin ligase complex (SCF(FBXO33), with SKP1, CUL1 and the RING subunit RBX1) that selects target proteins, notably the cold-shock-domain regulator YBX1/YB-1 bound via the FBXO33 N-terminus, for poly-ubiquitination and proteasomal degradation. FBXO33 is the substrate adaptor, not the catalytic RING.
