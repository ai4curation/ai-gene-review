        et al. 2004, Binne et al. 2007). RB1 is able to simultanously interact with SKP2 and with
        FZR1 (Cdh1). FZR1 is a substrate-specific adapter for the anaphase promoting complex/cyclosome
        (APC/C). The interaction with FZR1 involves a different subregion of the pocket domain
        than the interaction with SKP2, and is partially dependent on the LxCxE binding cleft
        (Binne et al. 2007).
