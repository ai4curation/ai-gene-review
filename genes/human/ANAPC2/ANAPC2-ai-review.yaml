    supported_by:
    - reference_id: PMID:16364912
      supporting_text: >-
        bound substrates are ubiquitinated by E2 enzymes that interact with a hetero-dimer of
        the RING subunit Apc11 and the cullin Apc2
    - reference_id: PMID:26083744
      supporting_text: >-
        the catalytic module comprising the RING subunit Apc11 and the C-terminal domain of Apc2
        (Apc2CTD)
    - reference_id: file:human/ANAPC2/ANAPC2-uniprot.txt
      supporting_text: >-
        Belongs to the cullin family.
    - reference_id: file:human/ANAPC2/ANAPC2-notes.md
      supporting_text: >-
        Conservative decision: ANAPC2 is not a canonical cullin like CUL1-CUL5, but the cached
        literature supports a cullin-like APC/C scaffold role.
