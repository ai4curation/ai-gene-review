  qualifier: involved_in
  review:
    summary: >-
      APC/C ubiquitination of cell-cycle substrates leads to proteasome-mediated degradation.
    action: ACCEPT
    reason: >-
      The term is broad but appropriate for ANAPC2 as an APC/C catalytic-module scaffold because
