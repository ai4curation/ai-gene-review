- term:
    id: GO:0160072
    label: ubiquitin ligase complex scaffold activity
  evidence_type: IC
  original_reference_id: PMID:26083744
  qualifier: enables
  review:
    summary: >-
      PN projects ubiquitin ligase complex scaffold activity for ANAPC2. Gene-level review supports
      this as a conservative NEW annotation because ANAPC2 is the cullin-like APC/C scaffold subunit
      that forms the Apc2-Apc11 catalytic module.
    action: NEW
    reason: >-
      The PN candidate is not accepted solely from taxonomy. It is supported by UniProt cullin-family
      annotation and structural literature describing Apc2 with Apc11 as the APC/C catalytic module.
      This is more specific than generic protein binding and complements existing APC/C component
      annotations.
    additional_reference_ids:
