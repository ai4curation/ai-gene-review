id: Q9UJX6
gene_symbol: ANAPC2
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  ANAPC2 encodes anaphase-promoting complex subunit 2, the cullin-like scaffold of the APC/C catalytic
  module. In the APC/C E3 ubiquitin ligase, ANAPC2 works with the RING subunit ANAPC11 and ubiquitin-conjugating
  enzymes to ubiquitinate cell-cycle substrates, promoting ordered proteasomal degradation during
  mitotic progression and mitotic exit. Structural and biochemical studies place ANAPC2 in the
  APC/C catalytic platform, and APC/C activity is regulated by coactivators, phosphorylation,
  checkpoint inhibitors, and substrate adaptors in nuclear and cytosolic cell-cycle contexts.
alternative_products:
- name: '1'
  id: Q9UJX6-1
- name: '2'
  id: Q9UJX6-2
  sequence_note: VSP_008463
existing_annotations:
- term:
    id: GO:0007091
    label: metaphase/anaphase transition of mitotic cell cycle
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: involved_in
  review:
    summary: >-
      ANAPC2 is part of the APC/C module that controls mitotic chromosome segregation and mitotic
      exit, so the metaphase/anaphase transition annotation is supported.
    action: ACCEPT
    reason: >-
      This captures a central APC/C cell-cycle role rather than a distant phenotype. The IBA transfer
      is consistent with structural and biochemical evidence that APC/C is a ubiquitin ligase
      essential for mitotic progression.
    supported_by:
    - reference_id: PMID:16364912
      supporting_text: >-
        The anaphase-promoting complex/cyclosome (APC/C) is a ubiquitin ligase with essential
        functions in mitosis, meiosis, and G1 phase of the cell cycle.
    - reference_id: PMID:26083744
      supporting_text: >-
        These structures define the architecture of all APC/C subunits, the position of the catalytic
        module
- term:
    id: GO:0070979
    label: protein K11-linked ubiquitination
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: involved_in
  review:
    summary: >-
      APC/C-dependent K11-linked ubiquitin-chain assembly is a well-supported output of the ANAPC2-containing
      APC/C catalytic module.
    action: ACCEPT
    reason: >-
      K11-linked ubiquitination is a core APC/C activity, and ANAPC2 is part of the catalytic
      Apc2-Apc11 module that positions the E2 machinery for substrate ubiquitination.
    supported_by:
