suggested_questions:
- question: >-
    Should GO model ANAPC2/APC2 as a cullin-like scaffold activity for APC/C separately from canonical
    cullin-RING ligase scaffolds, or is GO:0160072 sufficiently broad for degenerate APC/C cullin
    subunits?
- question: >-
    Which human contexts justify retaining neuronal CDC20-APC/C process annotations on ANAPC2
    versus restricting them to experimentally studied mammalian orthologs or pathway-level APC/C
    annotations?
suggested_experiments:
- hypothesis: >-
    ANAPC2 scaffold surfaces that contact ANAPC11 and APC/C E2 enzymes are required for APC/C
    ubiquitin-chain initiation and elongation in human cells.
  description: >-
    Use rescue of ANAPC2-depleted human cells with interface mutants in the Apc2CTD/Apc11 region,
    then measure APC/C substrate ubiquitination, K11/K48 chain formation, and mitotic exit timing.
  experiment_type: mutational rescue and ubiquitination assay
