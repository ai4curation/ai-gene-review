      supporting_text: >-
        We find that the APC/C triggers substrate degradation by assembling K11-linked ubiquitin
        chains
    - reference_id: PMID:29033132
      supporting_text: >-
        engineered a bispecific antibody to detect K11/K48-linked chains and identified mitotic
        regulators, misfolded nascent polypeptides, and pathological Huntingtin variants as their
        endogenous substrates.
    - reference_id: PMID:16364912
      supporting_text: >-
        bound substrates are ubiquitinated by E2 enzymes that interact with a hetero-dimer of
        the RING subunit Apc11 and the cullin Apc2
