proposed_new_terms: []
suggested_questions:
- question: Which CHMP4 paralog is the dominant Snf7-family subunit during human phagophore closure and autophagosome maturation in endogenous cells?
- question: Should GO annotations distinguish CHMP4B direct membrane-bending/polymer function from broader ESCRT output processes such as viral budding, plasma membrane repair, nuclear envelope sealing, and cytokinetic abscission?
- question: How do CHMP4B-CHMP2B-enriched ESCRT-III assemblies differ from CHMP4A-CHMP2A assemblies in neuronal endosomal cargo turnover and proteostasis?
suggested_experiments:
- description: Use endogenous CHMP4B tagging plus acute depletion/rescue during starvation-induced autophagy and selective cargo turnover assays to image recruitment to phagophores, autophagosomes, amphisomes, and endosomes.
  hypothesis: If CHMP4B directly participates in autophagosome maturation or closure, it should be transiently recruited to autophagy membranes and rescue should require its polymerization/membrane-binding region.
- description: Compare wild-type CHMP4B with ALIX-binding, CHMP2B-interaction, and C-terminal autoinhibition mutants in MVB cargo sorting, HIV budding, cytokinetic abscission, and neuronal receptor turnover assays.
  hypothesis: CHMP4B uses the same Snf7-family filament core across ESCRT outputs, but partner and recruitment requirements differ by membrane context.
- description: Biochemically reconstitute CHMP4B-containing human ESCRT-III polymers with CHMP2B, CHMP3, CHMP6, and VPS4 and test membrane bending/scission on defined liposomes.
  hypothesis: CHMP4B contributes Snf7-family filament curvature that can drive membrane bending and support reverse-topology scission in a minimal human ESCRT-III module.
