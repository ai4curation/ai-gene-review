proposed_new_terms: []
suggested_questions:
- question: Does human GTPBP6 have any role on cytoplasmic ribosomes, or is its function
    exclusively mitochondrial (the IBA cytoplasm transfer derives from bacterial orthologs)?
- question: What is the precise GTPase cycle (activating factors, GAP) that couples
    GTPBP6 nucleotide state to the molecular switch driving PTC maturation?
suggested_experiments:
- description: Subcellular fractionation and high-resolution imaging of endogenous GTPBP6
    to definitively establish mitochondrial localization and exclude a cytoplasmic
    ribosome-associated pool.
- description: GTPase-dead (G-domain mutant) GTPBP6 rescue experiments in GTPBP6-knockout
    cells to test whether GTP hydrolysis is required for mtLSU maturation versus ribosome
    recycling.
