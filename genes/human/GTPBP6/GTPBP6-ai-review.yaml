id: O43824
gene_symbol: GTPBP6
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: GTPBP6 (Putative GTP-binding protein 6, PGPL) is a TRAFAC-class OBG-HflX-like
  GTPase encoded by a pseudoautosomal gene near the Xp/Yp telomere. It functions in
  mitochondria as one of several conserved GTPases (alongside GTPBP5, GTPBP7 and GTPBP10)
  that drive late maturation of the mitochondrial large ribosomal subunit (mtLSU). GTPBP6
  acts at a final step of mtLSU biogenesis, triggering a molecular switch that drives
  progression to a near-mature peptidyl transferase centre (PTC), and additionally has
  a role in recycling/dissociation of mature mitochondrial ribosomes, giving it a dual
  role in mitoribosome biogenesis and recycling. Its activity is GTP-dependent, consistent
  with the conserved G-domain motifs of the OBG-HflX-like family.
