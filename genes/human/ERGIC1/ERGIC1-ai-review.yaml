# --- Other annotations ---
- term:
    id: GO:0005654
    label: nucleoplasm
  evidence_type: IDA
  original_reference_id: GO_REF:0000052
  review:
    summary: >-
      Nucleoplasm localization based on curation of immunofluorescence data from the Human Protein
      Atlas (HPA). ERGIC1 is a multi-pass transmembrane protein that cycles between the ER, ERGIC,
      and Golgi. Nucleoplasm localization is inconsistent with its established biology as an
      ER-Golgi cycling membrane protein. This likely represents antibody cross-reactivity or
      mislocalization artifact in HPA immunofluorescence data.
    action: REMOVE
    reason: >-
      Nucleoplasm localization is biologically implausible for a multi-pass transmembrane protein
      that functions in ER-Golgi vesicular trafficking. All other evidence (proteomics, colocalization,
      functional studies) places ERGIC1 in the endomembrane system. HPA immunofluorescence data
      can produce artifacts for membrane proteins, and this annotation contradicts the well-established
      subcellular localization of ERGIC1.

- term:
    id: GO:0016020
    label: membrane
  evidence_type: HDA
  original_reference_id: PMID:19946888
  review:
    summary: >-
      Membrane localization from a high-throughput proteomics study defining the membrane proteome
      of NK cells (PMID:19946888). ERGIC1 was identified among 1843 proteins in membrane fractions.
      While correct that ERGIC1 is a membrane protein, this is an extremely broad term.
    action: ACCEPT
    reason: >-
      ERGIC1 is indeed a multi-pass transmembrane protein, so this annotation is correct. While
      very broad, it is appropriately general for a high-throughput study. More specific membrane
      annotations (ER membrane, Golgi membrane, ERGIC membrane) are captured by other annotations.
    supported_by:
    - reference_id: PMID:19946888
      supporting_text: >-
        approximately 40% of the identified proteins were predicted as plausible membrane proteins

