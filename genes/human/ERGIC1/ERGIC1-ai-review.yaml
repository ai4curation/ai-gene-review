- term:
    id: GO:0005515
    label: protein binding
  evidence_type: IPI
  original_reference_id: PMID:15308636
  review:
    summary: >-
      Interaction between ERGIC1 and ERGIC3 (Q9Y282/hErv46) demonstrated by covalent cross-linking
      and mistargeting experiments in PMID:15308636. While the interaction is real and biologically
      important, 'protein binding' is uninformative per curation guidelines.
    action: REMOVE
    reason: >-
      The term 'protein binding' (GO:0005515) provides no specific information about ERGIC1's
      function. The interaction with ERGIC3 is better captured by process annotations (ER-to-Golgi
      transport) and localization annotations. Per curation guidelines, generic 'protein binding'
      should be avoided.
