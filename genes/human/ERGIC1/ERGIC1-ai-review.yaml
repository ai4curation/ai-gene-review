- id: PMID:15308636
  title: >-
    Proteomics of endoplasmic reticulum-Golgi intermediate compartment (ERGIC) membranes from
    brefeldin A-treated HepG2 cells identifies ERGIC-32, a new cycling protein that interacts
    with human Erv46.
  findings:
  - statement: >-
      ERGIC1 (ERGIC-32) was identified as a 32 kDa cycling membrane protein by proteomics
      of purified ERGIC membranes from brefeldin A-treated HepG2 cells.
    supporting_text: >-
      a 32-kDa protein termed ERGIC-32 is a novel cycling membrane protein with sequence
      homology to Erv41p and Erv46p, two proteins enriched in COPII vesicles of yeast
  - statement: >-
      ERGIC1 localizes to the ERGIC and partially colocalizes with hErv41/hErv46 at the cis-Golgi.
    supporting_text: >-
      ERGIC-32 localizes to the ERGIC and partially colocalizes with the human homologs of
      Erv41p and Erv46p, which mainly localize to the cis-Golgi
  - statement: >-
      ERGIC1 interacts with hErv46 (ERGIC3) by cross-linking and mistargeting experiments,
      and silencing ERGIC1 increases ERGIC3 turnover, suggesting a stabilizing role.
    supporting_text: >-
      ERGIC-32 interacts with human Erv46 (hErv46) as revealed by covalent cross-linking and
      mistargeting experiments, and silencing of ERGIC-32 by small interfering RNAs increases
      the turnover of hErv46
  - statement: >-
      ERGIC1 is proposed to function as a modulator of the hErv41-hErv46 complex by stabilizing
      hErv46.
    supporting_text: >-
      We propose that ERGIC-32 functions as a modulator of the hErv41-hErv46 complex by
      stabilizing hErv46

- id: PMID:19946888
  title: Defining the membrane proteome of NK cells.
  findings:
  - statement: >-
      ERGIC1 was identified as a membrane protein in the NK cell membrane proteome by
      mass spectrometry.
    supporting_text: >-
      approximately 40% of the identified proteins were predicted as plausible membrane proteins

- id: PMID:31142615
  title: >-
    The E3 ubiquitin ligase MARCH2 regulates ERGIC3-dependent trafficking of secretory proteins.
  findings:
  - statement: >-
      ERGIC1 forms a heteromeric complex with ERGIC2 and ERGIC3. Within the complex, ERGIC1
      directly interacts with ERGIC3.
    supporting_text: >-
      ERGIC3 binds to itself or to ERGIC2, whereas ERGIC2 is unable to interact with itself
  - statement: >-
      ERGIC2 and ERGIC3 are orthologs of yeast Erv41 and Erv46, which function as cargo
      receptors in both anterograde and retrograde protein trafficking.
    supporting_text: >-
      Human ER-Golgi intermediate compartment protein 2 (ERGIC2) and ERGIC3 are orthologs of
      Erv41 and Erv46 in yeast, proteins that form a heteromeric complex, cycle between the ER
      and Golgi, and function as cargo receptors in both anterograde and retrograde protein
      trafficking

- id: PMID:32296183
  title: A reference map of the human binary protein interactome.
  findings:
  - statement: >-
      Large-scale yeast two-hybrid interactome mapping (HuRI) identified an interaction between
      ERGIC1 and EHHADH. This interaction lacks clear biological context for ERGIC1 function.
    supporting_text: >-
      approximately 53,000 protein-protein interactions, HuRI has approximately four
      times as many such interactions as there are high-quality curated interactions
      from small-scale studies

- id: PMID:32814053
  title: >-
    Interactome Mapping Provides a Network of Neurodegenerative Disease Proteins and Uncovers
    Widespread Protein Aggregation in Affected Brains.
  findings:
  - statement: >-
      Large-scale yeast two-hybrid interactome mapping for neurodegenerative disease proteins
      identified interactions of ERGIC1 with KLF11 and NUP58. These interactions lack clear
      biological context for ERGIC1 function.
    supporting_text: >-
      Here, we report on an interactome map that focuses on neurodegenerative disease (ND), connects
      ∼5,000 human proteins via ∼30,000 candidate interactions and is generated by systematic yeast
      two-hybrid interaction screening of ∼500 ND-related proteins and integration of literature
      interactions

- id: PMID:28317099
  title: >-
    Mutations in ERGIC1 cause Arthrogryposis multiplex congenita, neuropathic type.
  findings:
  - statement: >-
      Loss-of-function mutations in ERGIC1 cause arthrogryposis multiplex congenita type 2
      (AMC2), a neurogenic disorder characterized by congenital joint contractures and muscle
      wasting.
    supporting_text: >-
      we have now identified homozygous pathogenic variant in the ERGIC1 gene within the
      previously defined linked region. ERGIC1 encodes a cycling membrane protein which has
      a possible role in transport between endoplasmic reticulum and Golgi

core_functions:
- description: >-
    ERGIC1 functions as a modulator/stabilizer of the ERGIC2-ERGIC3 (hErv41-hErv46) cargo
    receptor complex in the early secretory pathway. It cycles between the ER, ERGIC, and
    cis-Golgi as a multi-pass transmembrane glycoprotein, participating in both anterograde
    (ER-to-Golgi) and retrograde (Golgi-to-ER) vesicle-mediated transport. ERGIC1 stabilizes
    ERGIC3/hErv46, and its depletion leads to increased ERGIC3 turnover. The protein is
    found in COPII-coated transport vesicles and is most concentrated at the ERGIC.
    No specific enzymatic activity has been assigned; its precise molecular function
    remains uncharacterized beyond its role as a complex modulator/stabilizer.
