id: Q969X5
gene_symbol: ERGIC1
product_type: PROTEIN
status: IN_PROGRESS
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  ERGIC1 (also known as ERGIC-32) is a multi-pass transmembrane glycoprotein that cycles between the
  endoplasmic reticulum (ER), the ER-Golgi intermediate compartment (ERGIC), and the cis-Golgi apparatus.
  It belongs to the Erv41/Erv46 family and interacts directly with ERGIC3 (human Erv46), functioning as
  a modulator of the ERGIC2-ERGIC3 complex involved in anterograde and retrograde vesicle-mediated
  transport in the early secretory pathway. ERGIC1 was identified by proteomics of ERGIC membranes from
  brefeldin A-treated HepG2 cells and is N-glycosylated. Silencing of ERGIC1 increases the turnover of
  ERGIC3/hErv46, suggesting it stabilizes this cargo receptor complex. Loss-of-function mutations in
  ERGIC1 cause arthrogryposis multiplex congenita type 2, a neurogenic disorder characterized by
  congenital joint contractures and muscle wasting (PMID:28317099). The protein is broadly expressed
  across tissues with low tissue specificity.
