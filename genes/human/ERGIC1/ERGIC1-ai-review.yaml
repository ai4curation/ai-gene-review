# --- IBA annotations (phylogenetic) ---
- term:
    id: GO:0005783
    label: endoplasmic reticulum
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      ERGIC1 is a cycling membrane protein that localizes to the ER as part of its trafficking
      itinerary in the early secretory pathway. UniProt annotates ER membrane localization based
      on experimental evidence from PMID:15308636. IBA annotation is phylogenetically consistent
      with yeast orthologs Erv41p/Erv46p which are enriched in COPII vesicles budding from the ER.
    action: ACCEPT
    reason: >-
      ER localization is experimentally supported and phylogenetically consistent. ERGIC1 cycles
      between the ER, ERGIC, and Golgi, and is expected to reside transiently in the ER.
    supported_by:
    - reference_id: PMID:15308636
      supporting_text: >-
        a 32-kDa protein termed ERGIC-32 is a novel cycling membrane protein with sequence
        homology to Erv41p and Erv46p, two proteins enriched in COPII vesicles of yeast

- term:
    id: GO:0006890
    label: retrograde vesicle-mediated transport, Golgi to endoplasmic reticulum
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      ERGIC1 is a cycling protein that moves between the ER and Golgi in both anterograde and
      retrograde directions. The yeast orthologs Erv41p/Erv46p function as cargo receptors in
      both anterograde and retrograde trafficking (PMID:31142615). IBA annotation is well supported
      by phylogenetic evidence and consistent with ERGIC1's cycling behavior.
    action: ACCEPT
    reason: >-
      Retrograde transport is a core function of the ERGIC family. ERGIC1 cycles between the ER
      and Golgi, and its yeast orthologs are established participants in retrograde trafficking.
    supported_by:
    - reference_id: PMID:31142615
      supporting_text: >-
        Human ER-Golgi intermediate compartment protein 2 (ERGIC2) and ERGIC3 are orthologs of
        Erv41 and Erv46 in yeast, proteins that form a heteromeric complex, cycle between the ER
        and Golgi, and function as cargo receptors in both anterograde and retrograde protein
        trafficking
    - reference_id: PMID:15308636
      supporting_text: >-
        Cycling proteins play important roles in the organization and function of the early
        secretory pathway by participating in membrane traffic and selective transport of cargo
        between the endoplasmic reticulum (ER), the intermediate compartment (ERGIC), and the Golgi

