id: Q8TB37
gene_symbol: NUBPL
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  NUBPL (nucleotide-binding protein-like; also called IND1 homolog / huInd1) is a
  mitochondrial iron-sulfur cluster transfer protein of the Mrp/NBP35 family of P-loop
  NTPase Fe-S carrier proteins. Synthesized with an N-terminal mitochondrial transit
  peptide and imported into the mitochondrial matrix, it binds a single [4Fe-4S] cluster
  in a labile fashion via a conserved CXXC motif and acts as a dedicated assembly factor
  that delivers Fe-S cofactor(s) to subunits of respiratory chain Complex I
  (NADH:ubiquinone oxidoreductase). NUBPL is not a structural subunit of the Complex I
  holoenzyme; rather it is required for maturation of the peripheral (matrix) arm, and its
  loss leads to failure to accumulate Fe-S-containing subunits such as NDUFS1 and NDUFV1,
  reduced Complex I activity, remodeling of respiratory supercomplexes, and altered
  mitochondrial morphology. The protein also carries a Walker-A/P-loop ATP-binding motif
  characteristic of the family. In humans, biallelic loss-of-function variants in NUBPL
  cause mitochondrial complex I deficiency, nuclear type 21 (MC1DN21), a
  leukoencephalopathy with a distinctive MRI pattern.
