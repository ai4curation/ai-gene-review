    label: ATP binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: >-
      InterPro/keyword-based ATP binding. NUBPL is a Mrp/NBP35 P-loop NTPase with a
      Walker-A/P-loop motif and an annotated ATP-binding site (residues 75-82).
    action: KEEP_AS_NON_CORE
    reason: >-
      The ATP-binding P-loop is a real, conserved feature of the family, but nucleotide
