core_functions:
- description: >-
    5-aminolevulinate synthase activity: ALAS2 catalyzes the PLP-dependent condensation of glycine and
    succinyl-CoA to form 5-aminolevulinate, CoA and CO2 in the mitochondrion, performing the first and
    rate-limiting step of heme biosynthesis in erythroid cells.
  molecular_function:
    id: GO:0003870
    label: 5-aminolevulinate synthase activity
  directly_involved_in:
