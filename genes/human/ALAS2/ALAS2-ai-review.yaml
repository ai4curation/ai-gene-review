      proteasome inhibition, and interacts with the vHL protein under normoxia, consistent with an
      oxygen/hypoxia-responsive regulatory behavior of the protein.
    action: KEEP_AS_NON_CORE
    reason: >-
      Experimentally observed oxygen-dependent stabilization is a genuine regulatory response, but it is
      peripheral to ALAS2's core catalytic role in heme synthesis; retain as non-core.
    supported_by:
    - reference_id: PMID:16234850
      supporting_text: >-
        Hypoxia (1% O2) and inhibition of the proteasome increased both the stability and the specific
        activity of ALAS2
