  supported_by:
  - reference_id: PMID:32499479
    supporting_text: >-
      ALAS catalyses the pyridoxal 5′-phosphate (PLP)-dependent condensation of succinyl-CoA and glycine
      to form aminolevulinic acid (ALA), with CoA and CO2 as by-products
  - reference_id: PMID:34492704
    supporting_text: >-
      itaconyl-CoA is a competitive inhibitor of the erythroid-specific 5-aminolevulinate synthase
      (ALAS2), the first and rate-limiting step in heme synthesis
- description: >-
    Pyridoxal phosphate binding: as a class-II PLP-dependent enzyme, ALAS2 binds pyridoxal 5'-phosphate,
    which is covalently attached to active-site Lys391 as an internal aldimine and is essential for
    catalysis. This is a secondary molecular function supporting the primary synthase activity.
  molecular_function:
    id: GO:0030170
    label: pyridoxal phosphate binding
  directly_involved_in:
  - id: GO:0006783
    label: heme biosynthetic process
  locations:
  - id: GO:0005759
    label: mitochondrial matrix
  supported_by:
  - reference_id: PMID:32499479
    supporting_text: >-
      PLP is covalently attached to the active site lysine (Lys391 in human ALAS2 (hsALAS2)) as an internal
      aldimine adduct
