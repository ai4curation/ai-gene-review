id: P22557
gene_symbol: ALAS2
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  ALAS2 is the erythroid-specific 5-aminolevulinate synthase (ALAS-E; EC 2.3.1.37),
  the first and rate-limiting enzyme of the heme biosynthetic pathway in developing
  erythroid cells. It is a pyridoxal 5'-phosphate (PLP)-dependent enzyme that catalyzes
  the condensation of glycine with succinyl-CoA to form 5-aminolevulinate (ALA), with
  CoA and CO2 released as by-products. ALAS2 acts as an obligate homodimer in which the
  active site is shared between subunits, with PLP covalently bound to an active-site
  lysine (Lys391) as an internal aldimine. The enzyme carries an N-terminal transit
  peptide that targets it to mitochondria, where it localizes to the matrix side of the
  mitochondrial inner membrane. ALAS2 is one of two ALAS isozymes: the ubiquitous
  housekeeping ALAS1 supplies basal heme for cytochromes and other hemoproteins, whereas
  ALAS2 is expressed in erythroid progenitors and provides the high heme flux required
  for hemoglobin production during erythropoiesis. Its output governs downstream porphyrin
  and heme synthesis and, ultimately, erythrocyte maturation. ALAS2 activity is regulated
  at multiple levels, including an iron-responsive element in the 5' UTR that couples
  translation to cellular iron, oxygen-dependent protein stability, and a eukaryote-specific
  C-terminal autoinhibitory loop that gates substrate access. Loss-of-function mutations
  cause X-linked sideroblastic anemia, whereas C-terminal gain-of-function mutations cause
  X-linked (dominant) protoporphyria.
