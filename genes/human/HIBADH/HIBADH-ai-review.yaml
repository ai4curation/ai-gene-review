id: P31937
gene_symbol: HIBADH
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  HIBADH is the mitochondrial-matrix enzyme 3-hydroxyisobutyrate dehydrogenase
  (EC 1.1.1.31), a homodimeric NAD(+)-dependent oxidoreductase of the
  HIBADH-related (6-phosphogluconate/3-hydroxyisobutyrate dehydrogenase) family
  with a Rossmann-fold NAD-binding domain. It catalyzes the reversible oxidation
  of 3-hydroxyisobutyrate (3-hydroxy-2-methylpropanoate) to methylmalonate
  semialdehyde (2-methyl-3-oxopropanoate) with reduction of NAD(+) to NADH, a
  step in the mitochondrial catabolism of the branched-chain amino acid L-valine.
  The methylmalonate-semialdehyde product is subsequently metabolized by
  methylmalonate-semialdehyde dehydrogenase (ALDH6A1). The protein is synthesized
  as a precursor with an N-terminal transit peptide that is cleaved on import into
  the mitochondrial matrix. It is broadly expressed, with notable activity in
  liver and fibroblasts.
