- id: PMID:16466957
  title: Clinical, biochemical, and molecular findings in three patients with 3-hydroxyisobutyric
    aciduria.
  findings:
  - statement: >-
      Heterologous expression of the human HIBADH gene product in E. coli
      confirmed that it has 3-hydroxyisobutyrate dehydrogenase activity,
      identifying HIBADH as the human enzyme of this step of valine catabolism.
    reference_section_type: ABSTRACT
    supporting_text: >-
      the product of the HIBADH gene indeed displays 3-hydroxyisobutyrate
      dehydrogenase activity
  - statement: >-
      HIBADH was excluded as the causative gene of 3-hydroxyisobutyric aciduria:
      no mutations were found and enzyme activity in patient fibroblasts was
      normal.
    reference_section_type: ABSTRACT
    supporting_text: >-
      We conclude that HIBADH is not the causative gene in 3-hydroxyisobutyric
      aciduria.
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Abstract-only in cache (full_text_available: false). Primary functional
      identification of the human enzyme; UniProt cites this PMID for both
      CATALYTIC ACTIVITY and the L-valine degradation PATHWAY, so it directly
      supports the GO:0008442 and GO:0006574 IDA annotations. Note the paper's
      negative disease finding (HIBADH not causative for 3-hydroxyisobutyric
      aciduria); this does not affect the enzymatic annotations.
