- term:
    id: GO:0050661
    label: NADP binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: >-
      InterPro2GO assignment (IPR006115, a 6-phosphogluconate-dehydrogenase-like
      NADP-binding signature) generically maps to NADP binding. HIBADH's
      physiological cofactor is NAD(+), not NADP; the catalytic reaction and the
      structurally resolved cofactor (PDB 2GF2, NADH complex) use NAD.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      Over-propagated from the shared Rossmann/6PGD-like fold. The demonstrated
      reaction uses NAD(+) (Rhea:17681; UniProt catalytic activity), and there is
      no evidence for NADP as a physiological cofactor. Retained (electronic, not
      experimental) but flagged as an over-annotation; NAD binding (GO:0051287)
      is the appropriate cofactor-binding term.
    supported_by:
    - reference_id: file:human/HIBADH/HIBADH-uniprot.txt
      supporting_text: "Reaction=3-hydroxy-2-methylpropanoate + NAD(+) = 2-methyl-3-"
