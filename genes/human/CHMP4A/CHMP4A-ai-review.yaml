suggested_questions:
- question: Which CHMP4 paralog, CHMP4A, CHMP4B, or CHMP4C, is the dominant Snf7-family subunit during human phagophore closure and autophagosome maturation?
- question: Should GO annotations distinguish direct CHMP4A membrane-bending/polymer function from broader ESCRT output processes such as viral budding, plasma membrane repair, and nuclear envelope sealing?
- question: Does CHMP4A preferentially pair with CHMP2A in autophagy and endosomal cargo sorting, as suggested by human-neuron cargo turnover assays?
suggested_experiments:
- description: Use endogenous CHMP4A tagging and acute CHMP4A depletion/rescue during starvation-induced autophagy to image recruitment to phagophores, autophagosomes, and amphisomes.
  hypothesis: If CHMP4A directly participates in autophagosome maturation or closure, it should be transiently recruited to autophagy membranes and rescue should require its polymerization/membrane-binding region.
- description: Compare wild-type CHMP4A with ALIX-binding and C-terminal autoinhibition mutants in MVB cargo sorting, ESCRT spiral formation, plasma membrane repair, and viral budding assays.
  hypothesis: CHMP4A polymerization and partner recruitment requirements differ across endogenous ESCRT outputs and virus-hijacked budding.
- description: Biochemically reconstitute CHMP4A-containing human ESCRT-III polymers with CHMP2A/CHMP3/VPS4 and test membrane bending/scission on defined liposomes.
  hypothesis: CHMP4A contributes Snf7-family filament curvature that can drive membrane bending and support reverse-topology scission in a minimal human ESCRT-III module.
