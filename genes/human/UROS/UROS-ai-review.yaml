description: Uroporphyrinogen-III synthase (URO-synthase, EC 4.2.1.75), the fourth
  enzyme of the heme biosynthetic pathway. It catalyzes the cyclization of the linear
  tetrapyrrole hydroxymethylbilane into the macrocyclic uroporphyrinogen III, with
  concurrent inversion (flipping) of ring D, thereby generating the physiological
  III isomer; in its absence hydroxymethylbilane spontaneously and non-enzymatically
  cyclizes to the useless uroporphyrinogen I isomer. Uroporphyrinogen III is the
  branch point precursor for all biological porphyrins (heme, chlorophyll, corrins
  including vitamin B12, siroheme, and F430). The enzyme is a monomer acting in the
  cytosol, as one of the four cytosolic steps of heme biosynthesis. In humans, loss
  of UROS activity causes the autosomal recessive disorder congenital erythropoietic
  porphyria (CEP, Gunther disease), characterized by accumulation of the uroporphyrin
  I isomer and severe cutaneous photosensitivity.
