- description: >-
    Cytosolic creatine kinase activity: CKM (as CK-MM homodimer or CK-MB
    heterodimer with CKB) reversibly transfers a phosphoryl group between ATP and
    creatine, regenerating ATP from phosphocreatine at sites of high ATP turnover
    in striated muscle.
