id: P06732
gene_symbol: CKM
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  CKM encodes the muscle-type (M-type) cytosolic creatine kinase (EC 2.7.3.2), a
  member of the ATP:guanido phosphotransferase (phosphagen kinase) family. It
  reversibly catalyzes the transfer of a phosphoryl group between ATP and
  creatine (creatine + ATP <-> N-phosphocreatine + ADP + H+). The enzyme is a
  dimer: CK-MM homodimers are the dominant form in skeletal muscle and
  myocardium, and CK-MB heterodimers with the brain-type subunit CKB occur in
  myocardium. Together with mitochondrial creatine kinase, cytosolic CKM forms
  the cytosolic limb of the phosphocreatine (PCr) energy-shuttle and ATP-buffering
  system, regenerating ATP from phosphocreatine at sites of high ATP turnover such
  as the myofibrillar myosin ATPase and membrane ion pumps. A functionally
  important pool of CK-MM is bound at the sarcomeric M-band through M-specific
  N-terminal lysine residues that interact with the central domains of the
  M-band proteins myomesin and M-protein, positioning it as an intramyofibrillar
  ATP regenerator. CKM is highly and selectively expressed in skeletal and
  cardiac muscle; its serum activity (CK-MM, CK-MB) is a clinical marker of
  skeletal-muscle and myocardial injury.
