- description: >-
    M-band-localized creatine kinase: a functionally important pool of CK-MM binds
    the sarcomeric M-band (via central domains of myomesin and M-protein), where it
    acts as an intramyofibrillar ATP regenerator coupled to the actin-activated
    myosin ATPase - the receiving end of the phosphocreatine shuttle.
