existing_annotations:
- term:
    id: GO:0005576
    label: extracellular region
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: is_active_in
  review:
    summary: CKM is a cytosolic enzyme; this IBA "is_active_in extracellular region" is
      an over-propagation through the phylogenetic tree.
    action: REMOVE
    reason: >-
      CKM/CK-MM is a cytosolic creatine kinase (UniProt SUBCELLULAR LOCATION:
      Cytoplasm) that functions intracellularly in the phosphocreatine shuttle and at
      the myofibrillar M-band. Serum/extracellular CK is enzyme leakage from damaged
      muscle, not a secreted, extracellularly-active form. An "is_active_in
      extracellular region" assertion is biologically incorrect for the cytosolic CK
      reaction and is an electronic (IBA) over-propagation, so it is removed.
- term:
    id: GO:0004111
    label: creatine kinase activity
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: enables
  review:
    summary: Creatine kinase activity is the defining molecular function of CKM;
      strongly supported across evidence types.
    action: ACCEPT
    reason: >-
      CKM catalyzes the reversible creatine + ATP <-> phosphocreatine + ADP reaction
      (EC 2.7.3.2). This phylogenetic (IBA) annotation is concordant with the
      experimental/structural and sequence evidence and represents the core molecular
      function.
    supported_by:
    - reference_id: PMID:3778496
      supporting_text: A full length cDNA for human M creatine kinase has been isolated and
        sequenced.
- term:
    id: GO:0046314
    label: phosphocreatine biosynthetic process
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: involved_in
  review:
    summary: CKM catalyzes the reaction that produces phosphocreatine; this is the
      direct biological-process correlate of its molecular function.
    action: ACCEPT
    reason: >-
      The creatine kinase reaction is reversible; in the phosphocreatine-synthesizing
      direction CKM produces N-phosphocreatine from creatine and ATP, justifying
      involvement in phosphocreatine biosynthetic process. The physiologically dominant
      cytosolic role is the reverse (ATP regeneration), but this BP term is the
      established correlate of creatine kinase activity and is accepted as core.
