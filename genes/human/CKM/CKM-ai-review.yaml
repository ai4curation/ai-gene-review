suggested_questions:
- question: Beyond the sarcomeric M-band, how much of cellular CK-MM function depends on
    its association with sarcoplasmic reticulum and sarcolemmal/T-tubule membranes for
    local ATP/ADP regulation of ion pumps?
suggested_experiments:
- hypothesis: M-band binding of CK-MM, mediated by the four M-specific N-terminal lysines
    (K8, K24, K104, K115), is required for efficient ATP regeneration at the myofibril
    rather than for catalysis per se.
  description: >-
    Express wild-type CKM and an M-band-binding-deficient lysine mutant (K8/K24/K104/K115)
    in muscle cells or Ckm-null myofibers, confirm equal intrinsic creatine kinase
    activity in vitro, then compare M-band localization (immuno-EM), contractile
    ATP/ADP buffering, and fatigue resistance during burst activity.
  experiment_type: structure-function / localization
