- id: PMID:32083188
  title: Uridine Cytidine Kinase Like-1 Enhances Tumor Cell Proliferation and Mediates Protection from Natural Killer-Mediated Killing.
  findings:
  - statement: UCKL1 overexpression increases proliferation and protects tumor cells from NK- and drug-induced apoptosis.
    supporting_text: We show that UCKL-1 over-expression protects tumor cells from NK-mediated and drug-induced apoptosis, enhances tumor survival in vitro and in vivo and increases the rate of tumor cell proliferation.
    reference_section_type: INTRODUCTION
  - statement: UCKL1 abundance correlates with NF-kappaB activity in K562 cells.
    supporting_text: UCKL-1 transfected K562 cells had significantly higher NF-κB activity than control transfected cells; siUCKL-1 treated K562 cells had less NF-κB activity (Figure 7a).
    reference_section_type: RESULTS
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: >-
      PMID, title, and full text were checked. The tumor-cell phenotypes are
      direct but rely substantially on overexpression and do not establish
      whether kinase activity is required.
- id: PMID:39592843
  title: Glucose limitation protects cancer cells from apoptosis induced by pyrimidine restriction and replication inhibition.
  findings:
  - statement: Deleting UCKL1 in UCK1/UCK2-deficient Jurkat cells eliminated residual uridine rescue, genetically supporting a contribution to uridine salvage.
    supporting_text: >-
      We therefore generated a cell line also lacking the predicted UCK, UCKL1
      (UCK tKO), and observed that uridine was unable to rescue the effects of
      de novo pyrimidine synthesis inhibition on proliferation and Chk1
      phosphorylation, confirming the absence of UCK activity (Fig. 3c and
      Extended Data Fig. 4d).
    reference_section_type: RESULTS
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: >-
      PMID, title, and full text were checked. The result is strong independent
      genetic corroboration of residual UCKL1-dependent salvage, but the
      triple-knockout design does not quantify UCKL1 alone.
- id: PMID:41457201
  title: Uridine-Cytidine Kinase 2 (UCK2)/Uridine-Cytidine Kinase Like 1 (UCKL1) complex exacerbates the differentiation of myocardial fibroblasts via TRIM21/Smurf2/Smad3 pathway after myocardial infarction.
  findings:
  - statement: Endogenous UCK2 and UCKL1 associate in human cardiac fibroblasts and mouse myocardium.
    supporting_text: To experimentally validate this putative interaction, we conducted co-immunoprecipitation (Co-IP) assays, confirming that endogenous UCK2 physically associates with UCKL1 in both HCFs and myocardial tissues (Fig. 2b, c).
    reference_section_type: RESULTS
  - statement: UCK2 and UCKL1 cooperatively promote TGF-beta-mediated cardiac fibroblast differentiation.
    supporting_text: Collectively, these results establish UCK2 and UCKL1 as critical, potentially cooperative drivers of TGF-β-mediated HCF differentiation.
    reference_section_type: RESULTS
  - statement: Kinase-dead UCK2/UCKL1 proteins retained the reported profibrotic activity.
    supporting_text: Strikingly, the loss of kinase activity did not abolish their pro-fibrotic potential, as indicated by the sustained upregulation of fibrogenic markers and HCFs proliferation (Fig. S3).
    reference_section_type: RESULTS
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      PMID, title, and full text were checked. This is a recent, direct,
      multi-level study of a context-specific kinase-independent scaffold role,
      but it is currently a single report and is not elevated to a core evolved
      function pending independent replication.
- id: Reactome:R-HSA-73614
  title: Pyrimidine salvage
  findings:
  - statement: Reactome defines the human pyrimidine-salvage pathway that contains the UCKL1 event.
    supporting_text: >-
      In pyrimidine salvage reactions, nucleosides and free bases generated by
      DNA and RNA breakdown are converted back to nucleotide monophosphates,
      allowing them to re-enter the pathways of pyrimidine biosynthesis and
      interconversion.
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: >-
      The cached Reactome record and stable identifier were checked. It provides
      pathway context rather than UCKL1-specific experimental evidence.
- id: Reactome:R-HSA-8954327
  title: UCKL1 phosphorylates urindine, cytidine
  findings:
  - statement: Reactome places UCKL1 in the cytosol and models uridine/cytidine phosphorylation.
    supporting_text: >-
      Based on sequence similarity, cytosolic uridine-cytidine kinase-like 1
      (UCKL1 aka F538) is thought to function as a novel human uridine
      kinase/uracil phosphoribosyltransferase (Kashuba et al. 2002).
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      The cached Reactome record and stable identifier were checked. The event
      correctly records the historical sequence-based inference and cytosolic
      placement; direct 2022 evidence now confirms kinase activity, while UPRT
      activity remains untested.
