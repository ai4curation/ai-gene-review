- id: PMID:12199906
  title: Epstein-Barr virus encoded nuclear protein EBNA-3 binds a novel human uridine kinase/uracil phosphoribosyltransferase.
  findings:
  - statement: UCKL1/F538 specifically binds EBV EBNA3.
    supporting_text: We have shown that F538 interacts specifically with EBNA-3 in the yeast two-hybrid system and in GST pull down assays.
    reference_section_type: DISCUSSION
  - statement: Full-length UCKL1 is predominantly cytoplasmic and relocalizes to the nucleus with EBNA3.
    supporting_text: The predominantly cytoplasmic GFP-F538 translocates to the nucleus when EBNA-3 is expressed.
    reference_section_type: DISCUSSION
  - statement: The C-terminally truncated isoform does not undergo EBNA3-dependent nuclear targeting.
    supporting_text: GFP-F538ΔC is not targeted to the nucleus by EBNA-3.
    reference_section_type: DISCUSSION
  - statement: UPRT activity was proposed from sequence and structural modeling rather than measured.
    supporting_text: >-
      On the basis of the high homology to UK and UK/UPRT and the similar 3D
      structure of the C-terminal part of F538 to the T. gondii UPRT, we propose
      that F538 is a novel uridine kinas/uracil phosphoribosyltransferase
      (UK/UPRT) – an enzyme with double catalytic activity.
    reference_section_type: DISCUSSION
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      PMID, title, and full text were checked. The interaction and localization
      experiments directly support their uses. The dual UK/UPRT conclusion is
      explicitly a modeling-based proposal; later direct work confirms kinase
      activity but leaves UPRT activity untested.
- id: PMID:16709802
  title: NK lytic-associated molecule, involved in NK cytotoxic function, is an E3 ligase.
  full_text_unavailable: true
  findings:
  - statement: RNF19B/NKLAM and UCKL1 interact in mammalian cells.
    supporting_text: We confirmed that NKLAM and URKL-1 interact in mammalian cells by using both immunoprecipitation and confocal microscopy.
    reference_section_type: ABSTRACT
    full_text_unavailable: true
  - statement: RNF19B/NKLAM promotes UCKL1 ubiquitination and lowers its abundance.
    supporting_text: We demonstrated decreased protein expression and enhanced ubiquitination of URKL-1 in the presence of NKLAM.
    reference_section_type: ABSTRACT
    full_text_unavailable: true
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      PMID and title were checked. Only the abstract is cached, but it explicitly
      states the mammalian-cell interaction, ubiquitination, and reduced UCKL1
      abundance used in this review.
- id: PMID:35583288
  title: Characterization of uridine-cytidine kinase like-1 nucleoside kinase activity and its role in tumor growth.
  findings:
  - statement: Purified UCKL1 phosphorylates uridine and cytidine.
    supporting_text: Both enzymes efficiently phosphorylated uridine and cytidine (Figure 3).
    reference_section_type: RESULTS
  - statement: ATP was used as the phosphate donor for both UCKL1 reactions.
    supporting_text: We analyzed the phosphorylation of both uridine and cytidine with ATP as the phosphate donor.
    reference_section_type: DISCUSSION
  - statement: UPRT activity remained under investigation and was not established.
    supporting_text: We are also examining whether UCKL-1 has UPRT activity.
    reference_section_type: DISCUSSION
  - statement: UCKL1 depletion in K562 tumor xenografts increased apoptosis and reduced tumor growth and dissemination.
    supporting_text: These results indicate that decreasing UCKL-1 expression in tumor cells induces apoptosis and inhibits tumor growth, dissemination, and metastasis.
    reference_section_type: RESULTS
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      PMID, title, and full text were checked. This is the decisive direct
      biochemical characterization of both core kinase activities; the
      tumor-model experiments are also directly reported.
