id: Q9NWZ5
gene_symbol: UCKL1
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  UCKL1 is a 548-amino-acid uridine-kinase-family enzyme that phosphorylates
  uridine and cytidine with ATP to generate UMP and CMP, respectively, thereby
  supporting pyrimidine nucleoside salvage. The protein is predominantly
  cytoplasmic under basal conditions, while the full-length form can accumulate
  in the nucleus after binding Epstein-Barr virus EBNA3. RNF19B/NKLAM binds,
  ubiquitinates, and promotes degradation of UCKL1. UCKL1 abundance influences
  proliferation, apoptosis, and susceptibility to natural-killer-cell-mediated
  killing in tumor models. A recent study also reports a kinase-independent,
  nuclear UCK2-UCKL1 scaffold that promotes TGF-beta/SMAD3-dependent cardiac
  fibroblast activation after myocardial infarction. The C-terminal half is
  structurally UPRT-like, but uracil phosphoribosyltransferase activity has not
  been demonstrated.
alternative_products:
- name: '1'
  id: Q9NWZ5-1
  description: Full-length canonical isoform used for the direct kinase assays
    and capable of EBNA3-dependent nuclear relocalization.
- name: '2'
