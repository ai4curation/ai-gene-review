suggested_questions:
- question: >-
    Does the C-terminal phosphoribosyltransferase-like domain of human UCKL1
    catalyze PRPP-dependent uracil phosphoribosyltransferase activity under any
    physiological condition?
  experts:
  - Elise C. Matchett
  - Elise C. Ambrose
  - Jacki Kornbluth
  - Elena Kashuba
- question: >-
    Are the tumor-cell survival, NF-kappaB, and nucleoside-analogue phenotypes
    caused by UCKL1 kinase activity, by a kinase-independent scaffold function,
    or by both?
  experts:
  - Elise C. Ambrose
  - Jacki Kornbluth
  - Richard G. Hoover
- question: >-
    Is the reported kinase-independent nuclear UCK2-UCKL1-TRIM21 scaffold a
    reproducible endogenous mechanism in human post-infarction cardiac
    fibroblasts, and which UCKL1 interface is required?
  experts:
  - Xiao Zhou
  - Yu Zhang
  - Yongyi Wang
- question: >-
    Which UCKL1 splice isoforms retain nucleoside kinase activity, and how do
    their C-terminal differences control EBNA3-, RNF19B-, or TGF-beta-dependent
    localization and turnover?
  experts:
  - Elena Kashuba
  - Jacki Kornbluth
suggested_experiments:
- experiment_type: Purified-enzyme biochemistry
  description: >-
    Assay full-length UCKL1 and isolated or active-site-mutated C-terminal
    domains for conversion of uracil plus PRPP to UMP using orthogonal
    LC-MS-based product detection and appropriate active UPRT controls.
  hypothesis: >-
    The UPRT-like C-terminal domain is either catalytically active only under
    specific cofactor or oligomerization conditions, or is a catalytically
    inactive structural domain.
- experiment_type: Catalytic-dead endogenous rescue and isotope tracing
  description: >-
    Create UCKL1-null human cells and rescue them at endogenous abundance with
    wild-type or kinase-dead UCKL1, then quantify labeled uridine and cytidine
    flux into UMP/CMP/UTP/CTP together with proliferation, apoptosis, NF-kappaB
    activity, and NK-cell killing.
  hypothesis: >-
    Pyrimidine-salvage flux requires UCKL1 kinase activity, whereas some
    survival or signaling phenotypes persist with catalytically inactive UCKL1.
- experiment_type: Isoform-resolved endogenous localization
  description: >-
    Tag individual endogenous UCKL1 isoforms and follow their localization,
    interaction, ubiquitination, and half-life after EBNA3 expression, RNF19B
    induction, or TGF-beta activation without overexpression.
  hypothesis: >-
    The C-terminal region controls partner-specific nuclear trafficking and
    degradation independently of the shared N-terminal nucleoside-kinase domain.
- experiment_type: Independent cardiac-fibroblast mechanism replication
  description: >-
    Reproduce the UCK2-UCKL1-TRIM21-Smurf2/SMAD3 mechanism with orthogonal
    endogenous proximity labeling, separation-of-function interface mutants,
    kinase-dead knock-in rescue, and fibroblast-specific loss and rescue in a
    second myocardial-infarction model.
  hypothesis: >-
    UCKL1 has a genuine kinase-independent scaffold activity in activated
    cardiac fibroblasts that is separable from pyrimidine salvage.
