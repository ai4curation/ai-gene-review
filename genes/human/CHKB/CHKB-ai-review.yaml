suggested_questions:
- question: >-
    Should CHKB be curated directly to phosphatidylcholine biosynthetic process (GO:0006656) /
    CDP-choline pathway (GO:0006657) as its core disease-relevant process, given that current
    experimental GOA rows emphasize phosphatidylethanolamine biosynthesis (GO:0006646)?
  experts:
  - GO lipid metabolism editors
  - UniProt curators
- question: >-
    Is the tissue-specific balance of CHKB homodimer versus CHKA:CHKB heterodimer functionally
    important (e.g., in muscle), and should complex/dimer composition be captured in a GO-CAM model?
  experts:
  - phospholipid metabolism experts
suggested_experiments:
- description: >-
    Quantify choline kinase versus ethanolamine kinase activity of purified recombinant CHKB
    homodimer and CHKA:CHKB heterodimer, and measure phosphatidylcholine and phosphatidylethanolamine
    flux, to resolve the physiological substrate preference of CHKB in muscle.
  hypothesis: >-
    CHKB contributes primarily to phosphatidylcholine synthesis via choline kinase activity in muscle,
    with the ethanolamine kinase activity being secondary in vivo.
- description: >-
    Rescue CHKB-null muscle cells with wild-type versus MDCMC variant CHKB and measure choline kinase
    activity, phosphatidylcholine content, and mitochondrial morphology (megaconia).
  hypothesis: >-
    Restoring CHKB choline kinase activity normalizes phosphatidylcholine levels and mitochondrial
    morphology, confirming the causal chain from CHKB catalytic loss to the megaconial phenotype.
