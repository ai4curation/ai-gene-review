references:
- id: GO_REF:0000033
  title: Annotation inferences using phylogenetic trees
  findings: []
- id: GO_REF:0000120
  title: Combined Automated Annotation using Multiple IEA Methods
  findings: []
- id: PMID:19915674
  title: 'Differential role of human choline kinase alpha and beta enzymes in lipid
    metabolism: implications in cancer onset and treatment.'
  findings:
  - statement: >-
      Recombinant/overexpressed human ChoKbeta (CHKB) displays both choline kinase and ethanolamine
      kinase activities in vitro; when overexpressed in whole cells it behaves preferentially as an
      ethanolamine kinase, whereas ChoKalpha1 is a dual choline/ethanolamine kinase. Choline kinase
      family enzymes act as dimers.
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Full text available and cached. Directly supports CHKB choline kinase and ethanolamine kinase
      activities (IDA) and dimeric behaviour. Quotes verified verbatim against the cached publication.
- id: PMID:21665002
  title: A congenital muscular dystrophy with mitochondrial structural abnormalities
    caused by defective de novo phosphatidylcholine biosynthesis.
  findings:
  - statement: >-
      Biallelic loss-of-function mutations in CHKB cause megaconial congenital muscular dystrophy;
      choline kinase activity is undetectable and phosphatidylcholine reduced in patient muscle,
      establishing CHKB choline kinase activity as the first step of phosphatidylcholine biosynthesis
      in vivo.
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Abstract-only in cache (full_text_available: false), but the abstract itself provides strong
      direct evidence (undetectable choline kinase activity and decreased phosphatidylcholine in
      CHKB-mutant patient muscle). This is the GOA EXP source for choline kinase activity. Quotes
      verified verbatim against the cached abstract.
- id: Reactome:R-HSA-1483004
  title: Cho is phosphorylated to PCho by CHK dimer
  findings:
  - statement: >-
      In the cytosol, the CHKB homodimer (or CHKA homodimer or CHKA:CHKB heterodimer) phosphorylates
      choline to phosphocholine.
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Reactome reaction placing the CHKB choline kinase reaction in the cytosol and describing the
      CHKB homodimer / CHKA:CHKB heterodimer. GOA TAS source for cytosol.
- id: Reactome:R-HSA-1483222
  title: ETA is phosphorylated to PETA by CHK/ETNK
  findings:
  - statement: >-
      In the cytosol, ethanolamine is phosphorylated to phosphoethanolamine by the choline kinase
      (CHK) dimer, which can be a CHKB homodimer or CHKA:CHKB heterodimer.
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: >-
      Reactome reaction placing the CHKB ethanolamine kinase reaction in the cytosol. GOA TAS source
      for cytosol; also notes ETNK1/2 as the primary ethanolamine kinases.
- id: file:human/CHKB/CHKB-uniprot.txt
  title: UniProtKB record for human CHKB (Q9Y259)
  findings:
  - statement: >-
      CHKB (Choline/ethanolamine kinase; choline kinase beta) catalyzes choline + ATP -> phosphocholine
      (EC 2.7.1.32) and ethanolamine + ATP -> phosphoethanolamine (EC 2.7.1.82); catalyzes the first
      step of phosphatidylcholine and phosphatidylethanolamine biosynthesis; forms a homodimer and a
      heterodimer with CHKA; is cytosolic; and, when mutated biallelically, causes megaconial
      congenital muscular dystrophy (MDCMC, MIM:602541).
