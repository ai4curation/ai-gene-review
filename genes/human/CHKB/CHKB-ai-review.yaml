  label: Homo sapiens
description: >-
  CHKB (choline kinase beta) is a cytosolic enzyme of the CDP-choline (Kennedy) pathway.
  Using ATP, it phosphorylates choline to phosphocholine, catalyzing the first, committed
  step of de novo phosphatidylcholine biosynthesis. It is a dual-substrate choline/ethanolamine
  kinase that also phosphorylates ethanolamine to phosphoethanolamine, the first step of
  phosphatidylethanolamine biosynthesis. The enzyme belongs to the choline/ethanolamine kinase
  family and acts as a homodimer or as a heterodimer with its paralog choline kinase alpha (CHKA).
  CHKB is broadly expressed and is particularly important for phosphatidylcholine homeostasis in
  skeletal and cardiac muscle and in brain; biallelic loss-of-function variants cause megaconial
  congenital muscular dystrophy, a recessive muscular dystrophy featuring enlarged mitochondria
  clustered at the periphery of muscle fibers, intellectual disability, and, in about half of
  patients, dilated cardiomyopathy.
