proposed_new_terms: []
suggested_questions:
- question: How do CAVIPMR-causing variants in the EMC1 lumenal beta-propeller (e.g. T82M, G868R) impair EMC assembly or client insertion, and why is the nervous system particularly vulnerable?
- question: Does the EMC1 lumenal scaffold confer client selectivity, or does it act purely structurally to position the EMC3/EMC6 catalytic core?
suggested_experiments:
- description: Reconstitute the human EMC lacking EMC1 (or carrying CAVIPMR variants) in proteoliposomes and measure insertion of tail-anchored and multipass substrates to define EMC1's structural contribution to insertase activity.
- description: Perform quantitative membrane proteomics in EMC1-knockout versus rescued neuronal cells to identify the EMC1-dependent client repertoire underlying CAVIPMR neurodegeneration.
