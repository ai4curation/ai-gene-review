- id: PMID:37196677
  title: "EMC chaperone-Ca(V) structure reveals an ion channel assembly intermediate."
  findings:
  - statement: Cryo-EM structures of human EMC bound to a CaV1.2-CaVbeta3 assembly intermediate define EMC client-binding sites (transmembrane and cytoplasmic docks), with EMC1 contributing to the TM dock that engages the channel; EMC acts as a holdase/chaperone whose binding is mutually exclusive with CaValpha2delta, indicating an ordered hand-off during channel assembly.
    reference_section_type: ABSTRACT
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: PubMed-verified (Nature 2023, 619:410-419). First mammalian EMC-client structure; directly implicates the EMC1 lumenal/TM region in client docking and establishes the EMC holdase/chaperone mode beyond simple insertion. Supports EMC1's client-engagement scaffold role.
- id: PMID:37199759
  title: A selectivity filter in the ER membrane protein complex limits protein misinsertion
    at the ER.
  findings:
  - statement: Mapping of a tail-anchored substrate's path through the EMC reveals cytosolic capture by methionine-rich loops and insertion through a hydrophilic vestibule whose positively charged entrance acts as a charge-repulsion selectivity filter that rejects mitochondrial TA proteins and enforces the positive-inside topology rule.
    reference_section_type: ABSTRACT
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: PubMed-verified (J Cell Biol 2023, 222:e202212007). Refines the EMC insertion/topogenesis mechanism (selectivity filter) underlying the EMC1-containing complex; complex-level rather than EMC1-specific.
- id: PMID:38517390
  title: Structural insights into human EMC and its interaction with VDAC.
  findings:
  - statement: Cryo-EM structures of human EMC in apo and VDAC-bound states (3.47 A and 3.32 A) identify a gating plug within the hydrophilic vestibule and a conserved EMC-VDAC interaction at mitochondria-ER contact sites; the VDAC-bound state appears not to be insertion-competent, supporting EMC multifunctionality.
    reference_section_type: ABSTRACT
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: PubMed-verified (Aging (Albany NY) 2024, 16:5501-5525). Human EMC structures (EMC1 is the large lumenal subunit) and a new ER-mitochondria contact-site interaction with VDAC; complex-level structural context for EMC1.
- id: PMID:38784058
  title: Tribal Founder EMC1 Variant in 5 Kuwaiti Families Expands Phenotypic Spectrum
    of EMC1-Related Disorder.
  findings:
  - statement: Eight individuals from 5 Kuwaiti families homozygous for the EMC1 c.245C>T (p.Thr82Met) variant present with CAVIPMR (OMIM #616875); shared features include global developmental delay (8/8), microcephaly (8/8), truncal hypotonia (8/8), visual impairment (7/7), and failure to thrive (7/7), with chorea newly added to the phenotypic spectrum.
    reference_section_type: ABSTRACT
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: PubMed-verified (Neurol Genet 2024, 10:e200156). EMC1-specific human genetics; expands the CAVIPMR phenotype and confirms p.Thr82Met pathogenicity, directly supporting EMC1's essential neurodevelopmental role.
- id: PMID:40753078
  title: The EMC acts as a chaperone for membrane proteins.
  findings:
  - statement: Interactomics and model-protein studies define an EMC chaperone function distinct from its insertase activity; the EMC engages client transmembrane domains via its EMC1 subunit and modulates their orientation in the lipid bilayer, with productive assembly reducing binding to the EMC chaperone site.
    reference_section_type: ABSTRACT
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: PubMed-verified (Nat Commun 2025, 16:7097). Directly implicates EMC1 as the subunit engaging client TMDs in the EMC chaperone mode, strengthening EMC1's specific client-engagement role beyond a purely structural lumenal scaffold.
