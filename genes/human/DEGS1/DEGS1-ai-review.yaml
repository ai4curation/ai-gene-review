id: O15121
gene_symbol: DEGS1
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  DEGS1 (dihydroceramide desaturase 1 / sphingolipid delta(4)-desaturase DES1) is the
  endoplasmic reticulum enzyme that catalyzes the final step of de novo ceramide
  biosynthesis. It introduces a 4,5-trans double bond into dihydroceramide
  (an N-acylsphinganine) to convert it into ceramide (an N-acylsphing-4-enine), thereby
  turning the saturated dihydroceramide produced by the ceramide synthases into bioactive
  ceramide, the central hub of sphingolipid metabolism. The reaction (EC 1.14.19.17) is
  oxygen-dependent and iron-dependent. DEGS1 is a member of the fatty acid desaturase type 1
  (DEGS) family with three conserved histidine-box motifs coordinating a di-iron center, and
  it receives reducing equivalents from cytochrome b5 / NAD(P)H via a free-radical mechanism.
  It is a multi-pass membrane protein acting on the cytoplasmic (cytosolic) face of the ER
  membrane; a myristoylation-dependent pool can also localize to mitochondria. DEGS1 also
  displays a distinct retinol (vitamin A) isomerase activity in retinal Muller glial cells.
  Loss-of-function variants cause hypomyelinating leukodystrophy 18 (HLD18), a severe
  autosomal recessive neurological disorder with accumulation of dihydroceramides and
  dihydro-sphingolipids and demyelination of the central and peripheral nervous systems.
