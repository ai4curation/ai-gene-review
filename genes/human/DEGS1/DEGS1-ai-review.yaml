- term:
    id: GO:0009055
    label: electron transfer activity
  evidence_type: TAS
  original_reference_id: PMID:9188692
  qualifier: enables
  review:
    summary: >-
      Electron transfer activity assigned from the desaturase family context. DEGS1 receives
      electrons from cytochrome b5 to drive desaturation, but it is the terminal desaturase
      acceptor, not an electron-carrier; this activity is better captured by the desaturase MF
      and its di-iron/cytochrome-b5 coupling.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      Mechanistically peripheral; DEGS1 is the desaturase, not an electron-transfer protein.
      The core MF (GO:0042284) captures the redox chemistry.
    supported_by:
