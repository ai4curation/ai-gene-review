- id: PMID:11937514
  title: Identification and characterization of a sphingolipid delta 4-desaturase family.
  findings:
  - statement: >-
      Identified and biochemically characterized the human sphingolipid Delta4-desaturase
      (dihydroceramide desaturase), the enzyme underlying the core DEGS1 catalytic activity;
      basis for UniProt EC 1.14.19.17.
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified; primary characterization of the human dihydroceramide desaturase core
      function.
- id: PMID:1317856
  title: Subcellular localization and membrane topology of serine palmitoyltransferase, 3-dehydrosphinganine
    reductase, and sphinganine N-acyltransferase in mouse liver.
  findings:
  - statement: >-
      Established that the de novo sphingolipid-synthesis enzymes reside in the ER and face
      its cytosolic side, providing the pathway and topology context used for DEGS1 ceramide
      biosynthesis and cytosolic-ER-face annotations.
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: >-
      Abstract-only in cache; about upstream ceramide-synthesis enzymes but establishes the
      cytosolic-ER-face topology of the pathway. Used by the experimental curator (UOS_MCB)
      for DEGS1 process and topology annotations; do not overrule.
- id: PMID:16120614
  title: Serinc, an activity-regulated protein family, incorporates serine into membrane lipid
    synthesis.
  findings:
  - statement: >-
      Places DEGS1 among the ER sphingolipid-biosynthetic enzymes acting on the cytosolic face;
      basis for experimental ceramide-biosynthesis and cytosolic-ER-face annotations.
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: Abstract-only in cache; experimental curator read full text for the DEGS1 annotations.
- id: PMID:19647031
  title: 'N-Myristoylation targets dihydroceramide Delta4-desaturase 1 to mitochondria: partial
    involvement in the apoptotic effect of myristic acid.'
  findings:
  - statement: >-
      N-myristoylation of DES1 (Gly-2) targets a fraction of the enzyme to mitochondria and
      increases ceramide production and apoptosis; native desaturase activity occurs in both
      ER and mitochondria. Explains the secondary mitochondrial localization.
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: PubMed-verified; explains the non-core mitochondrial pool of DEGS1.
- id: PMID:23143414
  title: Identification of DES1 as a vitamin A isomerase in Müller glial cells of the retina.
  findings:
  - statement: >-
      DES1 is a retinol (vitamin A) isomerase (isomerase-2) in retinal Muller cells, a
      distinct moonlighting activity; purified DES1 has robust activity and coimmunoprecipitates
      with CRALBP. Basis for the retinol isomerase activity annotation.
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: Full text available; establishes the secondary retinol isomerase activity.
- id: PMID:24209621
  title: A four-step cycle driven by PI(4)P hydrolysis directs sterol/PI(4)P exchange by the
    ER-Golgi tether OSBP.
  findings:
  - statement: >-
      ER-Golgi lipid-exchange context (OSBP cycle) relevant to downstream sphingolipid and
      sphingomyelin trafficking; cited for the DEGS1 sphingomyelin-biosynthesis annotation.
  reference_review:
    relevance: LOW
    correctness: VERIFIED
    review_notes: >-
      Abstract-only; about OSBP-mediated ER-Golgi lipid exchange, tangential to DEGS1; the
      sphingomyelin-biosynthesis annotation is downstream and non-core.
- id: PMID:30620337
  title: Loss of the sphingolipid desaturase DEGS1 causes hypomyelinating leukodystrophy.
  findings:
  - statement: >-
      Biallelic DEGS1 loss-of-function causes hypomyelinating leukodystrophy (HLD18); DEGS1
      inserts the Δ4,5-trans double bond into dihydroceramide as the final step of de novo
      ceramide synthesis; critical for myelin development and maintenance.
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: Full text available; primary disease-gene and mechanism paper.
- id: PMID:30620338
  title: DEGS1-associated aberrant sphingolipid metabolism impairs nervous system function
    in humans.
  findings:
  - statement: >-
      Homozygous DEGS1 p.Ala280Val causes a multisystem neurological disorder; the variant
      reduces enzyme activity by about 80% with accumulation of dihydro-sphingolipids; DEGS1
      catalyzes the last step of ceramide synthesis. IMP basis for the core MF and myelin
      annotations.
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Abstract-only in cache but rich; independent HLD18 disease-gene paper confirming core
      function via loss-of-function.
- id: PMID:32296183
  title: A reference map of the human binary protein interactome.
  findings:
  - statement: >-
      High-throughput binary interactome (HuRI) reporting DEGS1 interactions (ARLN, SEMA4G);
      source of the uninformative bare protein-binding IPIs.
  reference_review:
    relevance: LOW
    correctness: VERIFIED
    review_notes: >-
      Systematic two-hybrid screen; interactions are not functionally interpreted for DEGS1
      (over-annotation of protein binding).
- id: PMID:34080016
  title: Glucosylceramide and galactosylceramide, small glycosphingolipids with significant
    impact on health and disease.
  findings:
  - statement: >-
      Review of glucosyl- and galactosyl-ceramide biology; glucosylceramide is the founder of
      hundreds of glycosphingolipids, all built from ceramide (the DEGS1 product). Context for
      the downstream glycosphingolipid-biosynthesis annotation.
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: Review; supports the downstream (non-core) glycosphingolipid-biosynthesis role.
- id: PMID:9188692
  title: 'The product of the MLD gene is a member of the membrane fatty acid desaturase family:
    overexpression of MLD inhibits EGF receptor biosynthesis.'
  findings:
  - statement: >-
      Original cloning of the human MLD gene (DEGS1) as a membrane fatty acid desaturase family
      member localized to the ER and predicted to be multi-pass. Basis for early ER, membrane,
      and fatty-acid annotations.
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: >-
      Abstract-only; foundational cloning and localization paper. Its plasma-membrane and
      unsaturated-fatty-acid annotations are over-annotations superseded by later specific data.
- id: Reactome:R-HSA-1660661
  title: Sphingolipid de novo biosynthesis
  findings: []
- id: Reactome:R-HSA-428259
  title: DEGS1 dehydrogenates dihydroceramide
  findings:
  - statement: >-
      Reactome curated reaction in which DEGS1, at the cytosolic face of the ER, desaturates
      dihydroceramide to ceramide as part of an enzyme complex with cytochrome b5 (Fe2+)
      refreshed by NADH.
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: Reactome curated reaction for the core DEGS1 activity and cytosolic ER localization.
