core_functions:
- description: >-
    Catalyzes the final step of de novo ceramide biosynthesis: introduces a 4,5-trans double
    bond into dihydroceramide (an N-acylsphinganine) to form ceramide (an N-acylsphing-4-enine),
    an O2- and iron/cytochrome b5-dependent reaction (EC 1.14.19.17) at the cytosolic face of
    the ER membrane.
  molecular_function:
    id: GO:0042284
    label: sphingolipid delta-4 desaturase activity
  directly_involved_in:
  - id: GO:0046513
    label: ceramide biosynthetic process
  locations:
  - id: GO:0005789
    label: endoplasmic reticulum membrane
  supported_by:
  - reference_id: PMID:11937514
    supporting_text: >-
      identification of the enzyme sphingolipid Delta4-desaturase (dihydroceramide desaturase)
      from Homo sapiens
  - reference_id: PMID:30620337
    supporting_text: >-
      This enzyme catalyzes the insertion of a Δ4,5- trans double bond into dihydroceramide
      (DhCer) to convert it to ceramide (Cer), in the final step of the de novo Cer
      biosynthesis pathway
  - reference_id: PMID:30620338
    supporting_text: DEGS1, which catalyzes the last step in the ceramide synthesis pathway
- description: >-
    Feeds ceramide into the broader de novo sphingolipid biosynthetic network, generating the
    ceramide precursor from which sphingomyelin, glucosyl/galactosyl-ceramides and downstream
    complex sphingolipids are built at the ER.
  molecular_function:
    id: GO:0042284
