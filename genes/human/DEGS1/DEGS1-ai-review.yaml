    supporting_text: catalyzes the desaturation of dihydroceramide to form ceramide
  - reference_id: PMID:30620337
    supporting_text: >-
      This enzyme catalyzes the insertion of a Δ4,5- trans double bond into dihydroceramide
      (DhCer) to convert it to ceramide (Cer), in the final step of the de novo Cer
      biosynthesis pathway
proposed_new_terms: []
suggested_questions:
- question: >-
    Is the retinol (vitamin A) isomerase activity of DES1 a physiologically significant second
    function outside the retina, and does it share the di-iron active site with the
    dihydroceramide desaturase reaction?
- question: >-
    What determines the partitioning of DEGS1 between the ER and mitochondria, and does the
    mitochondrial (myristoylated) pool have a distinct pro-apoptotic ceramide-signaling role in
    vivo?
suggested_experiments:
- description: >-
    Structure-function analysis of the three histidine boxes and di-iron center to define the
    catalytic residues required for dihydroceramide desaturation versus retinol isomerization.
- description: >-
    Lipidomic and myelination phenotyping of DEGS1 HLD18 patient variants in oligodendrocyte
    models to quantify the dihydroceramide/ceramide imbalance and test substrate-reduction
    (e.g. CerS-inhibitor) rescue.
