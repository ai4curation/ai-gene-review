id: A6NCL1
gene_symbol: GMNC
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: GMNC (also known as GEMC1) is a nuclear, geminin-family coiled-coil
  protein that acts as an early master transcriptional coactivator initiating the
  multiciliated cell (MCC) differentiation program. Lacking its own DNA-binding
  domain, it functions by forming complexes with E2F4/E2F5-DP1 (and engaging
  chromatin-remodeling machinery such as the BAF/SWI-SNF complex) to activate the
  earliest MCC regulators, including MCIDAS (Multicilin), and downstream
  transcription factors and effectors such as FOXJ1, MYB, TP73, CCNO and CDC20B.
  Through this activity it specifies multiciliated cell precursors and drives
  massive centriole/basal-body amplification required to build hundreds of motile
  cilia. GMNC is essential for the development of multiciliated epithelia in the
  airway, the ependyma lining the brain ventricles, and the reproductive tracts,
  where motile cilia drive mucociliary clearance, cerebrospinal fluid flow, and
  gamete transport. The protein was originally characterized as a geminin-related
  regulator of DNA replication initiation, promoting recruitment of CDC45 onto
  replication origins in a TOPBP1- and CDK2-dependent manner.
