  - id: file:human/GMNC/GMNC-deep-research-falcon.md
    title: Deep research report on GMNC
    findings:
      - statement: GEMC1 (GMNC) is a nuclear, E2F-DP1-dependent transcriptional
          co-activator that initiates the multiciliated cell transcriptional
          program, inducing MCIDAS, FOXJ1, MYB, TP73, CCNO and CDC20B.
        supporting_text: "GEMC1 is a nuclear, E2F–DP1-dependent
          transcriptional co-activator that initiates the multiciliated cell
          (MCC) transcriptional program. It lacks a DNA-binding domain and
          functions by forming complexes with E2F4/5–DP1 and engaging
          transcriptional/chromatin machinery to activate MCC regulators and
          effectors."
      - statement: GEMC1 acts predominantly in the nucleus, operating with
          E2F-DP1 complexes and chromatin remodelers.
        supporting_text: "Functional evidence places GEMC1 in the nucleus as a
          transcriptional co-activator, operating with E2F–DP1 complexes and
          chromatin remodelers (Mediator, SWI/SNF)."
      - statement: GEMC1 loss-of-function in mouse causes loss of multiciliated
          cells with hydrocephalus, infertility and airway mucociliary defects.
        supporting_text: gmnc loss causes loss/defect of MCCs with resultant
          hydrocephalus, infertility and airway mucociliary defects in mouse
          models.
      - statement: Two independent 2016 studies (Terré et al., EMBO J,
          PMID:27006276; Arbi et al., EMBO Rep, PMID:26882546) established GEMC1
          as an early-acting master activator of the multiciliated cell program
          in airway and other epithelia.
        supporting_text: Two independent 2016 studies established GEMC1 as an
          early-acting master activator of the MCC program in airway and other
          epithelia, operating with E2F-DP1 and inducing MCIDAS, FOXJ1, and core
          MCC effectors.
existing_annotations:
  - term:
      id: GO:0003712
      label: transcription coregulator activity
    evidence_type: IBA
    original_reference_id: GO_REF:0000033
    review:
      summary: Phylogenetically-inferred transcription coregulator activity.
        GEMC1/GMNC has no DNA-binding domain and acts by forming complexes with
        E2F4/E2F5-DP1 and chromatin remodelers to activate the multiciliated
        cell transcriptional program, so a coregulator molecular function is
        well supported.
      action: ACCEPT
      reason: This IBA term captures the experimentally and phylogenetically
        supported molecular function of GMNC as a DNA-binding-independent
        transcriptional coregulator. It is at an appropriate level of generality
        and is consistent with the activator role demonstrated in the
        multiciliogenesis literature.
      supported_by:
        - reference_id: file:human/GMNC/GMNC-deep-research-falcon.md
          supporting_text: "GEMC1 is a nuclear, E2F–DP1-dependent
            transcriptional co-activator that initiates the multiciliated cell
            (MCC) transcriptional program. It lacks a DNA-binding domain and
            functions by forming complexes with E2F4/5–DP1 and engaging
            transcriptional/chromatin machinery to activate MCC regulators and
            effectors."
  - term:
      id: GO:0005634
      label: nucleus
    evidence_type: IBA
    original_reference_id: GO_REF:0000033
    review:
      summary: Nuclear localization inferred phylogenetically and consistent with
        GMNC's role as a transcriptional coactivator acting on E2F-DP1 complexes
        and chromatin.
      action: ACCEPT
      reason: GMNC functions in the nucleus as a transcriptional coactivator and
        the UniProt record lists nuclear localization with chromatin
        association; the IBA annotation is well supported and is_active_in is
        appropriate.
      supported_by:
        - reference_id: file:human/GMNC/GMNC-deep-research-falcon.md
          supporting_text: "Functional evidence places GEMC1 in the nucleus as a
            transcriptional co-activator, operating with E2F–DP1 complexes
            and chromatin remodelers (Mediator, SWI/SNF)."
  - term:
      id: GO:0030174
      label: regulation of DNA-templated DNA replication initiation
    evidence_type: IBA
    original_reference_id: GO_REF:0000033
    review:
      summary: Phylogenetically-inferred role in regulating initiation of DNA
        replication, reflecting GMNC's original characterization as a
        geminin-family protein that promotes recruitment of CDC45 onto
        replication origins via TOPBP1 and CDK2. This activity is supported only
        by similarity in the UniProt record and is overshadowed in the focused
        literature by the multiciliogenesis transcriptional role.
      action: KEEP_AS_NON_CORE
      reason: The replication-initiation function derives from the geminin family
        relationship and the original GEMC1 description (recruitment of CDC45 in
        a TOPBP1/CDK2-dependent manner) and is captured here by IBA. It is
        retained because it is plausible and phylogenetically inferred, but the
        dominant, experimentally validated core function of human GMNC is its
        role as a transcriptional activator of multiciliated cell
        differentiation, so this is best marked non-core rather than the gene's
        defining activity.
      supported_by:
        - reference_id: file:human/GMNC/GMNC-uniprot.txt
          supporting_text: "Regulator of DNA replication. Promotes initiation of
            chromosomal DNA replication by mediating TOPBP1- and CDK2-dependent
            recruitment of CDC45L onto replication origins (By similarity)."
  - term:
      id: GO:0005634
      label: nucleus
    evidence_type: IEA
    original_reference_id: GO_REF:0000044
    review:
      summary: Nucleus localization mapped automatically from the UniProt
        Subcellular Location annotation. Consistent with the IBA/ISS nuclear
        annotations and the transcriptional coactivator role.
      action: ACCEPT
      reason: Redundant with the IBA and ISS nucleus annotations but correctly
        derived from the curated UniProt subcellular location; no change needed.
      supported_by:
        - reference_id: file:human/GMNC/GMNC-uniprot.txt
          supporting_text: "SUBCELLULAR LOCATION: Nucleus {ECO:0000250}.
            Note=Associates with chromatin during pre-replication complex
            (pre-RC) formation."
  - term:
      id: GO:0006260
      label: DNA replication
    evidence_type: IEA
    original_reference_id: GO_REF:0000120
    review:
      summary: Broad DNA replication process term assigned automatically (in part
        from the DNA replication keyword and mouse ortholog), reflecting the
        original geminin-family characterization of GEMC1 as a replication
        initiation regulator.
      action: KEEP_AS_NON_CORE
      reason: This is a more general parent of the IBA term GO:0030174
        (regulation of DNA-templated DNA replication initiation). It is plausible
        based on similarity but is not the experimentally validated core role of
        human GMNC; it is kept as a non-core process annotation consistent with
        the UniProt-described replication initiation activity.
      supported_by:
        - reference_id: file:human/GMNC/GMNC-uniprot.txt
          supporting_text: "Regulator of DNA replication. Promotes initiation of
            chromosomal DNA replication by mediating TOPBP1- and CDK2-dependent
            recruitment of CDC45L onto replication origins (By similarity)."
  - term:
      id: GO:0005515
      label: protein binding
    evidence_type: IPI
    original_reference_id: PMID:32296183
    review:
      summary: Generic protein binding from a single high-throughput yeast
        two-hybrid binary interaction (GMNC-CCNE1/cyclin E1) reported in the HuRI
        reference interactome map. This is consistent with the UniProt
        IntAct-curated GMNC-CCNE1 interaction but does not convey a specific
        molecular function.
      action: MARK_AS_OVER_ANNOTATED
      reason: Per curation guidelines, bare 'protein binding' (GO:0005515) is
        uninformative and should not be promoted as a core function. The
        underlying evidence is a single binary Y2H hit with cyclin E1 from a
        systematic interactome screen; while plausible (GMNC is CDK2/cyclin-E
        regulated), it does not by itself define a molecular function, so it is
        marked as over-annotated rather than accepted as a core term.
      supported_by:
        - reference_id: PMID:32296183
          supporting_text: "reference interactome map of human binary protein
            interactions, or 'HuRI'."
        - reference_id: file:human/GMNC/GMNC-uniprot.txt
          supporting_text: "A6NCL1; P24864: CCNE1; NbExp=3; IntAct=EBI-18587381,
            EBI-519526;"
  - term:
      id: GO:0003713
      label: transcription coactivator activity
    evidence_type: IEA
    original_reference_id: GO_REF:0000107
    review:
      summary: Transcription coactivator activity transferred from the mouse
        ortholog by Ensembl Compara. This is strongly supported by the focused
        literature, which establishes GEMC1/GMNC as a transcriptional
        co-activator that activates the multiciliated cell program together with
        E2F-DP1.
      action: ACCEPT
      reason: This is a more specific and informative molecular function term than
        the IBA coregulator activity, and it accurately reflects the activating
        (rather than repressing) role of GMNC demonstrated in transcriptional
        assays and mouse genetics. It is retained as a core molecular function.
      supported_by:
        - reference_id: file:human/GMNC/GMNC-deep-research-falcon.md
          supporting_text: "Functions as an E2F-DP1–dependent
            transcriptional activator upstream of MCIDAS, inducing ciliary TFs
            (FOXJ1, TP73, MYB) and ciliogenesis effectors (CCNO, CDC20B)."
  - term:
      id: GO:0045944
      label: positive regulation of transcription by RNA polymerase II
    evidence_type: IEA
    original_reference_id: GO_REF:0000107
    review:
      summary: Positive regulation of RNA polymerase II transcription transferred
        from the mouse ortholog. GMNC activates transcription of MCC program
        genes (MCIDAS, FOXJ1, MYB, TP73, CCNO, CDC20B), so this process term is
        well supported.
      action: ACCEPT
      reason: This biological-process term accurately captures GMNC's role as a
        positive transcriptional regulator of the multiciliated cell program and
        is consistent with the coactivator molecular function. Retained as core.
      supported_by:
        - reference_id: file:human/GMNC/GMNC-deep-research-falcon.md
          supporting_text: "Overexpression of GEMC1 or MCIDAS in cell systems
            activates overlapping MCC programs, including canonical transcription
            factors (FOXJ1, TP73, MYB) and effectors (CCNO, CDC20B)"
  - term:
      id: GO:0003682
      label: chromatin binding
    evidence_type: ISS
    original_reference_id: GO_REF:0000024
    review:
      summary: Chromatin binding inferred by sequence similarity from a mouse
        ortholog. GMNC associates with chromatin (UniProt notes chromatin
        association during pre-RC formation) and engages chromatin-remodeling
        SWI/SNF complexes as part of its transcriptional activator function, so
        chromatin binding is plausible.
      action: ACCEPT
      reason: Chromatin binding is consistent with both the replication-associated
        chromatin association noted in UniProt and the engagement of SWI/SNF
        chromatin remodelers during transcriptional activation of MCC genes. The
        ISS annotation is retained.
      supported_by:
        - reference_id: file:human/GMNC/GMNC-uniprot.txt
          supporting_text: "Note=Associates with chromatin during
            pre-replication complex (pre-RC) formation."
        - reference_id: file:human/GMNC/GMNC-deep-research-falcon.md
          supporting_text: "GEMC1 and MCIDAS show differential engagement of
            SWI/SNF subcomplexes (BAF vs ncBAF), providing pathway specificity
            for transcriptional activation of MCC genes."
  - term:
      id: GO:0005634
      label: nucleus
    evidence_type: ISS
    original_reference_id: GO_REF:0000024
    review:
      summary: Nuclear localization inferred by sequence similarity from a mouse
        ortholog, consistent with all other localization evidence and the
        transcriptional coactivator function.
      action: ACCEPT
      reason: Redundant with the IBA and IEA nucleus annotations but correctly
        supported; GMNC acts in the nucleus. No change needed.
      supported_by:
        - reference_id: file:human/GMNC/GMNC-deep-research-falcon.md
          supporting_text: "Predominantly nuclear acting transcriptional
            co-activator (no intrinsic DNA-binding domain; functions via cofactor
            recruitment)."
  - term:
      id: GO:1903251
      label: multi-ciliated epithelial cell differentiation
    evidence_type: IDA
    original_reference_id: file:human/GMNC/GMNC-deep-research-falcon.md
    review:
      summary: GMNC/GEMC1 is an early master activator of multiciliated epithelial
        cell differentiation. Mouse loss-of-function abolishes multiciliated cell
        formation in airway, ependyma and reproductive tracts, and GMNC induces
        MCIDAS and downstream MCC transcription factors and effectors. This
        process is the experimentally validated core biological role of GMNC and
        is not otherwise represented in the existing annotation set.
      action: NEW
      reason: The existing annotations capture transcriptional coactivator
        activity and positive regulation of transcription but omit the specific,
        well-supported biological process that GMNC drives, namely multiciliated
        epithelial cell differentiation. This term (also assigned by UniProt as
        an Ensembl IEA) reflects the central, defining function of the gene and
        is added as a NEW core process annotation.
      supported_by:
        - reference_id: file:human/GMNC/GMNC-deep-research-falcon.md
          supporting_text: "Two independent 2016 studies established GEMC1 as an
            early-acting master activator of the MCC program in airway and other
            epithelia, operating with E2F-DP1 and inducing MCIDAS, FOXJ1, and
            core MCC effectors."
        - reference_id: file:human/GMNC/GMNC-uniprot.txt
          supporting_text: "GO; GO:1903251; P:multi-ciliated epithelial cell
            differentiation; IEA:Ensembl."
core_functions:
  - description: GMNC/GEMC1 acts as a DNA-binding-independent transcriptional
      coactivator that, together with E2F4/E2F5-DP1 complexes and BAF/SWI-SNF
      chromatin remodelers, activates the earliest genes of the multiciliated
      cell transcriptional program (notably MCIDAS, FOXJ1, MYB, TP73, CCNO and
      CDC20B).
    molecular_function:
      id: GO:0003713
      label: transcription coactivator activity
    directly_involved_in:
      - id: GO:0045944
        label: positive regulation of transcription by RNA polymerase II
      - id: GO:1903251
        label: multi-ciliated epithelial cell differentiation
    locations:
      - id: GO:0005634
        label: nucleus
    supported_by:
      - reference_id: file:human/GMNC/GMNC-deep-research-falcon.md
        supporting_text: "GEMC1 is a nuclear, E2F–DP1-dependent
          transcriptional co-activator that initiates the multiciliated cell
          (MCC) transcriptional program."
      - reference_id: file:human/GMNC/GMNC-deep-research-falcon.md
        supporting_text: "Functions as an E2F-DP1–dependent transcriptional
          activator upstream of MCIDAS, inducing ciliary TFs (FOXJ1, TP73, MYB)
          and ciliogenesis effectors (CCNO, CDC20B)."
  - description: As a geminin-family protein, GMNC also has an inferred role in
      regulating the initiation of chromosomal DNA replication, promoting
      TOPBP1- and CDK2-dependent recruitment of CDC45 onto replication origins;
      this activity is supported by similarity and is non-core relative to the
      validated transcriptional role.
    molecular_function:
      id: GO:0003712
      label: transcription coregulator activity
    directly_involved_in:
      - id: GO:0030174
        label: regulation of DNA-templated DNA replication initiation
    locations:
      - id: GO:0005634
        label: nucleus
    supported_by:
      - reference_id: file:human/GMNC/GMNC-uniprot.txt
        supporting_text: "Regulator of DNA replication. Promotes initiation of
          chromosomal DNA replication by mediating TOPBP1- and CDK2-dependent
          recruitment of CDC45L onto replication origins (By similarity)."
proposed_new_terms: []
suggested_questions:
  - question: Are loss-of-function variants in human GMNC a cause of reduced
      generation of multiple motile cilia (RGMC) and associated phenotypes
      (hydrocephalus, infertility, mucociliary clearance defects), as predicted
      by mouse models and its upstream position in the MCC program?
    experts:
      - Stracker TH
      - Roy S
  - question: Is the inferred DNA replication initiation function of human GMNC
      (CDC45 recruitment via TOPBP1/CDK2) experimentally active in human cells,
      or is it a vestigial geminin-family feature distinct from the dominant
      transcriptional role?
    experts:
      - Costanzo V
suggested_experiments:
  - hypothesis: GMNC drives the multiciliated cell transcriptional program by
      recruiting BAF/SWI-SNF chromatin remodelers and E2F-DP1 to MCC gene
      promoters in human airway epithelium.
    description: Perform GMNC ChIP-seq and proximity-labeling proteomics in
      differentiating human airway (ALI) cultures, combined with GMNC
      knockout/rescue, to map direct target promoters and required cofactors.
    experiment_type: chromatin and interactome profiling
  - hypothesis: Human GMNC retains a TOPBP1/CDK2-dependent role in DNA
      replication initiation separable from its transcriptional function.
    description: Test CDC45 origin loading and replication initiation in
      GMNC-depleted human cells with separation-of-function mutants that
      disrupt either E2F-DP1 binding or putative replication-factor interactions.
    experiment_type: DNA replication initiation assay
