  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: involved_in
  review:
    summary: >-
      AHCY operates within the L-methionine/SAM cycle: by hydrolysing SAH it regenerates
      homocysteine (which can be remethylated to methionine) and relieves methyltransferase
      product inhibition, making it a core participant of this cycle.
