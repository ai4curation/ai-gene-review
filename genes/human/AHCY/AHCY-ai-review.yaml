gene_symbol: AHCY
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  AHCY (adenosylhomocysteinase; S-adenosyl-L-homocysteine hydrolase, SAHH / AdoHcyase;
  EC 3.13.2.1) is an NAD+-dependent enzyme that catalyzes the reversible hydrolysis of
  S-adenosyl-L-homocysteine (SAH/AdoHcy) to L-homocysteine and adenosine. Each subunit
  binds one tightly associated NAD+ cofactor, and the active enzyme is a homotetramer.
  Because SAH is a potent product inhibitor of virtually all S-adenosyl-L-methionine
  (SAM)-dependent methyltransferases, AHCY continuously clears the SAH generated during
  cellular transmethylation reactions and thereby relieves this feedback inhibition,
  sustaining methylation capacity. In doing so it links the SAM/L-methionine cycle to
  homocysteine metabolism and one-carbon metabolism. The protein is predominantly
  cytosolic, with reported minor nuclear and endoplasmic-reticulum pools. In humans,
  loss of AHCY activity causes hypermethioninemia with S-adenosylhomocysteine hydrolase
  deficiency (SAHH deficiency; HMAHCHD), a metabolic disorder with elevated SAH, SAM and
  methionine and clinical features including failure to thrive, developmental/psychomotor
  delay, myopathy/myocardiopathy and hepatopathy.
