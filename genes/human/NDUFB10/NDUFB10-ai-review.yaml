    Non-catalytic structural subunit that contributes to the structural
    integrity, assembly and stability of the Complex I holoenzyme, and thereby
    to the complex-level NADH:ubiquinone oxidoreductase activity; NDUFB10 sits
    in the membrane arm (distal P_D domain) as a twin-CX9C protein oxidatively
    folded on the IMS face.
