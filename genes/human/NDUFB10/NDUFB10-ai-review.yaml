  label: Homo sapiens
description: >-
  NDUFB10 (also known as PDSW / Complex I-PDSW) is a nuclear-encoded accessory
  (supernumerary) subunit of mitochondrial respiratory chain Complex I
  (NADH:ubiquinone oxidoreductase), the first enzyme of the electron transport
  chain. It is a small (~172 aa, ~20.8 kDa) twin-CX9C-type protein that resides
  in the membrane arm of Complex I, in the distal P_D domain, lying parallel to
  the inner-membrane surface on the intermembrane-space face and spanning the
  ND4 and ND5 subunits; unlike most other P_D accessory subunits it lacks a
  transmembrane helix. NDUFB10 is imported into the intermembrane space and
  oxidatively folded by the CHCHD4/MIA40 disulfide-relay system, acquiring
  intramolecular disulfide bonds that are required for its stable incorporation
  into the holoenzyme. As a non-catalytic structural subunit it contributes to
  the structural integrity, assembly and stability of the mature Complex I
  holoenzyme rather than performing an independent enzymatic reaction; the
  NADH-dehydrogenase and proton-pumping activities are properties of the
  assembled complex. Biallelic loss-of-function mutations in NDUFB10 cause
  isolated mitochondrial complex I deficiency (nuclear type 35, MC1DN35),
  presenting with fatal infantile lactic acidosis and cardiomyopathy. The gene
  is expressed most highly in oxidative tissues such as heart and skeletal
  muscle.
