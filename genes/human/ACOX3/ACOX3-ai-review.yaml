    label: acyl-CoA oxidase activity
  supported_by:
  - reference_id: file:human/ACOX3/ACOX3-uniprot.txt
    supporting_text: "Reaction=a 2,3-saturated acyl-CoA + O2 = a (2E)-enoyl-CoA + H2O2"
  - reference_id: file:human/ACOX3/ACOX3-uniprot.txt
    supporting_text: "Involved in peroxisomal beta-oxidation of branched-chain"
