- id: PMID:9271077
  title: Evidence for the existence of a pristanoyl-CoA oxidase gene in man.
  findings:
  - statement: >-
      Cloned the human ACOX3 cDNA (700 aa) from liver, showing 75% identity with rat
      pristanoyl-CoA oxidase and a C-terminal PTS1 (SKL) peroxisomal targeting
      signal; the gene maps to 4p15.3 and is expressed at very low level in liver.
    reference_section_type: ABSTRACT
    supporting_text: "harbouring a peroxisomal C-terminal-targeting"
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified original characterization of the human ACOX3 (pristanoyl-CoA
      oxidase) gene; establishes identity, PTS1 signal, and low baseline expression.
      Abstract-only in cache.
- id: PMID:29287774
  title: A novel case of ACOX2 deficiency leads to recognition of a third human peroxisomal
    acyl-CoA oxidase.
  findings:
  - statement: >-
      Substrate-specificity studies of human ACOX1/2/3 showed ACOX1 oxidizes
      straight-chain fatty acids, ACOX2 handles bile-acid intermediates, and both
      ACOX2 and ACOX3 degrade branched-chain fatty acids; ACOX3 is expressed in
      normal human tissues at mRNA and protein level.
    reference_section_type: ABSTRACT
    supporting_text: "both ACOX2 and ACOX3 are involved in the degradation"
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified; the primary FUNCTION/CATALYTIC ACTIVITY/TISSUE reference in
      the UniProt record (EC 1.3.3.6 evidence). Establishes ACOX3's branched-chain
      role and normal-tissue expression. Abstract-only in cache; detailed catalytic
      claims anchored to the UniProt record.
