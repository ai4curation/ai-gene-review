  review:
    summary: >-
      Phylogenetically-propagated generic MF. ACOX3 binds and oxidizes fatty
      acyl-CoA thioesters, not free fatty acids, so "fatty acid binding" does not
      capture its actual ligand or function; it is at best incidental to the
      catalytic activity captured by GO:0016402/GO:0003997.
