gene_symbol: ACOX3
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  ACOX3 is a peroxisomal, FAD-dependent acyl-CoA oxidase (EC 1.3.3.6) of the
  acyl-CoA oxidase family that catalyzes the first and rate-limiting
  dehydrogenation step of peroxisomal fatty-acid beta-oxidation, converting a
  2,3-saturated acyl-CoA to the corresponding (2E)-enoyl-CoA while reducing O2 to
  H2O2. Its preferred physiological substrates are 2-methyl-branched (multi-methyl
  branched) fatty acyl-CoA esters, in particular (2S)-pristanoyl-CoA, which is
  derived from alpha-oxidation of dietary phytanic acid; ACOX3 thus functions as a
  pristanoyl-CoA / branched-chain acyl-CoA oxidase. It can also oxidize
  straight-chain and dicarboxylyl acyl-CoAs with lower efficiency. The mature
  protein is a soluble matrix enzyme imported into the peroxisome via a C-terminal
  PTS1 (SKL) targeting signal. In humans, branched-chain acyl-CoA oxidase activity
  is shared with the paralog ACOX2; ACOX3 was long thought to be nearly silent but
  is expressed at mRNA and protein level in several normal tissues including liver,
  kidney, lung, brain and heart.
