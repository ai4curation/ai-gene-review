    General acyl-CoA oxidase activity (EC 1.3.3.6): dehydrogenation of a
    2,3-saturated acyl-CoA to a (2E)-enoyl-CoA coupled to reduction of O2 to H2O2,
    the parent catalytic activity that also encompasses lower-efficiency
    straight-chain acyl-CoA turnover.
  molecular_function:
