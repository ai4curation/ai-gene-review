gene_symbol: NMRK1
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  NMRK1 (nicotinamide riboside kinase 1) is a small cytosolic enzyme of the NAD+
  salvage pathway. It catalyzes the ATP-dependent phosphorylation of the NAD+
  precursor nicotinamide riboside (NR) to nicotinamide mononucleotide (NMN), and
  of nicotinic acid riboside (NaR) to nicotinic acid mononucleotide (NaMN); these
  mononucleotides are subsequently adenylylated by NMN adenylyltransferases (NMNATs)
  to complete NAD+/NaAD synthesis. This activity defines a Preiss-Handler-independent
  route to NAD+ that is conserved from yeast to humans. NMRK1 is a monomeric member
  of the uridine kinase family (NRK subfamily) with a P-loop-containing nucleotide
  triphosphate hydrolase fold; magnesium is required for catalysis. Beyond endogenous
  ribosides, NMRK1 phosphorylates and thereby activates several nucleoside prodrugs,
  including the antitumor agents tiazofurin and 3-deazaguanosine. Because it converts
  dietary NR into NAD+, NMRK1 is a key determinant of the cellular response to NR
  supplementation.
