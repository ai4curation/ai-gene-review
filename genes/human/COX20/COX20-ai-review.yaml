      secretory/plasma-membrane proteins with no relationship to complex IV
      assembly; these are high-throughput screen hits, not functional partners.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      Uninformative "protein binding" from a proteome-wide Y2H screen; the
      interactors are biologically unrelated to COX20's function and the term adds
      no functional information. Retained as over-annotated rather than removed,
      as it derives from experimental IPI evidence.
    supported_by:
      - reference_id: PMID:32296183
        supporting_text: >-
          Here we present a human 'all-by-all' reference interactome map of human
          binary protein interactions, or 'HuRI'.
      - reference_id: PMID:32296183
        supporting_text: >-
          With approximately 53,000 protein-protein interactions, HuRI has
          approximately four times as many such interactions as there are
          high-quality curated interactions from small-scale studies.
