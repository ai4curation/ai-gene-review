core_functions:
- description: >-
    Non-catalytic inner-membrane assembly chaperone/scaffold that mediates
    incorporation of the core catalytic subunit MT-CO2 (COX2) into cytochrome c
    oxidase (respiratory chain complex IV). COX20 binds and stabilises newly
    synthesised MT-CO2 during membrane insertion and presents it to the
    SCO1/SCO2 metallochaperones for CuA copper delivery, driving cytochrome c
    oxidase assembly.
  directly_involved_in:
    - id: GO:0033617
      label: mitochondrial respiratory chain complex IV assembly
  locations:
    - id: GO:0005743
      label: mitochondrial inner membrane
  supported_by:
    - reference_id: PMID:24403053
      supporting_text: >-
        We propose that COX20 acts as a chaperone in the early steps of COX2
        maturation, stabilizing the newly synthesized protein and presenting COX2
        to its metallochaperone module, which in turn facilitates the
        incorporation of mature COX2 into the CIV assembly line.
    - reference_id: PMID:23125284
      supporting_text: >-
        These results establish the function of the human gene FAM36A/COX20 in
        complex IV assembly and support a causal role of the gene in complex IV
        deficiency.
    - reference_id: PMID:29154948
      supporting_text: >-
        Upon synthesis, COX2 engages with COX20 in the inner mitochondrial
        membrane, a scaffold protein that recruits metallochaperones for copper
        delivery to the CuA-Site of COX2.
