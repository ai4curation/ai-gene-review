id: Q5RI15
gene_symbol: COX20
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  COX20 (also known as FAM36A) is a small (118 aa) multi-pass protein of the
  mitochondrial inner membrane that acts as a non-catalytic assembly chaperone
  for cytochrome c oxidase (respiratory chain complex IV, CIV), specific to the
  core catalytic subunit MT-CO2 (COX2). Following its mitochondrial synthesis,
  MT-CO2 engages COX20, which binds and stabilises the newly synthesised protein
  during insertion of its N-proximal transmembrane domain and chaperones it
  through membrane insertion and maturation of its binuclear copper CuA centre by
  the metallochaperones SCO1 and SCO2 (together with COA6, COX18 and TMEM177),
  delivering mature MT-CO2 into the assembling CIV holoenzyme. COX20 has no known
  catalytic activity; its role is to hold and present MT-CO2 to the copper
  metallation machinery. Loss of COX20 causes a severe, isolated CIV deficiency
  in which cells accumulate CIV subassemblies containing COX1/COX4 but lacking
  COX2. Biallelic loss-of-function variants cause mitochondrial complex IV
  deficiency, nuclear type 11 (MC4DN11), an autosomal recessive disorder with
  childhood/adolescent onset presenting with cerebellar ataxia, dystonia,
  choreoathetotic movements, dysarthria and muscle hypotonia.
