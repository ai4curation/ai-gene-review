- term:
    id: GO:0005515
    label: protein binding
  evidence_type: IPI
  original_reference_id: PMID:32296183
  qualifier: enables
  review:
    summary: >-
      Bare "protein binding" from the HuRI large-scale binary (yeast two-hybrid)
      interactome map. The listed partners (AQP6, CHIA, CREB3L1, DYNC1H1, ERGIC3,
      FUNDC2, GET1, GJA8, GOLT1A, JAGN1, MAOB, MENT, NCBP2AS2, PGRMC2, SLC10A1,
