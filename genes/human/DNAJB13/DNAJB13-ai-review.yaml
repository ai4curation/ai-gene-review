suggested_questions:
- question: Does DNAJB13 retain any HSP70-stimulating co-chaperone activity within
    the radial spoke (e.g. chaperoning radial-spoke assembly), or is its J domain repurposed
    purely as a structural/dimerization module?
- question: Which radial-spoke partner interactions are direct, and does the Met278Arg
    instability act by disrupting incorporation into the assembled spoke?
suggested_experiments:
- description: Cryo-EM of the mammalian radial spoke with and without DNAJB13 to define
    its structural position in the RS1 stalk and the effect of CILD34 variants on spoke
    architecture.
- description: In vitro J-domain functional assay (HSP70 ATPase stimulation) using
    recombinant DNAJB13 to test whether it has retained or lost canonical co-chaperone
    activity.
- description: Conditional Dnajb13 knockout in mouse multiciliated airway cells and
    spermatids with high-speed video microscopy to quantify the specific ciliary/flagellar
    beat defects.
