  title: Differential requirements of IQUB for the assembly of radial spoke 1 and
    the motility of mouse cilia and flagella.
  findings:
  - statement: The radial spoke modulates beat frequency, amplitude and waveform of
      flagella and cilia; RS1 components (including DNAJB13) were identified in mammalian
      sperm flagella, and loss of RS1 (via Iqub deletion) causes male infertility
      from sperm motility defects.
    reference_section_type: ABSTRACT
