id: P59910
gene_symbol: DNAJB13
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: DNAJB13 (DnaJ homolog subfamily B member 13; also TSARG3/TSARG6) is an
  HSP40/J-domain protein that, despite belonging to the co-chaperone family, acts
  principally as a structural component of the axonemal radial spoke complex. It is
  a homodimer found in the radial spoke stalk together with RSPH14, DYDC1, ROPN1L
  and NME5, and is required for the proper formation and function of the ciliary and
  flagellar axoneme. It localizes to epithelial motile (respiratory) cilia and to
  the sperm flagellum, where in spermatids it is enriched at the head-tail coupling
  apparatus and in mature sperm is distributed along the flagellum. Expression is
  largely restricted to testis and trachea. DNAJB13 supports the motility of sperm
  and cilia; biallelic loss-of-function variants cause autosomal-recessive primary
  ciliary dyskinesia (CILD34) with central-complex defects and male infertility.
