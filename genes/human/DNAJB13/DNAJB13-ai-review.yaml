- id: PMID:27486783
  title: Mutations in DNAJB13, Encoding an HSP40 Family Member, Cause Primary Ciliary
    Dyskinesia and Male Infertility.
  findings:
  - statement: Biallelic DNAJB13 mutations cause primary ciliary dyskinesia (CILD34)
      with central-complex defects but normal dynein arms, and male infertility from
      sperm flagellar dysfunction; DNAJB13 is required for proper formation and function
      of ciliary and flagellar axonemes.
    reference_section_type: ABSTRACT
  - statement: The Chlamydomonas ortholog of DNAJB13 localizes to the radial spokes;
      the p.Met278Arg variant causes protein instability and proteasomal degradation,
      with loss of endogenous DNAJB13 from cilia and sperm.
    reference_section_type: ABSTRACT
