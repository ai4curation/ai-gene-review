      supporting_text: >-
        Human ECHS1 catalyses the hydration of five substrates via different metabolic
        pathways, with the highest specificity for crotonyl-CoA and the lowest specificity
        for tiglyl-CoA.
      full_text_unavailable: true
    - reference_id: PMID:9073515
      supporting_text: >-
        The second step in mitochondrial fatty acid beta-oxidation is catalyzed by short
      full_text_unavailable: true
