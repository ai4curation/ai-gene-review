suggested_questions:
- question: >-
    Is ECHS1's reported negative regulation of STAT3 signaling (PMID:23416296) a genuine
    moonlighting function distinct from its hydratase activity, and does it occur outside the
    mitochondrial matrix?
- question: >-
    Should the L-lysine catabolic process annotation (GO:0019477) be retained, given that
    ECHS1's connection to lysine catabolism is via consumption of the shared crotonyl-CoA
    pool rather than a dedicated lysine-degradation reaction?
- question: >-
    To what extent is ECHS1 deficiency neurotoxicity driven by accumulation of reactive
    valine-pathway intermediates (methacrylyl-CoA/acryloyl-CoA) and ectopic protein lysine
    methacrylation versus the loss of beta-oxidation flux?
suggested_experiments:
- description: >-
    Measure in vitro hydratase kinetics of purified recombinant human ECHS1 against the full
    panel of branched-chain enoyl-CoA substrates (methacrylyl-CoA, 3-methylcrotonyl-CoA,
    tiglyl-CoA, acryloyl-CoA) alongside crotonyl-CoA to quantify its relative contribution to
    each amino acid catabolic pathway.
  hypothesis: >-
    ECHS1 is the principal short-chain enoyl-CoA hydratase for valine-pathway intermediates,
    explaining why its deficiency presents primarily as an inborn error of valine metabolism.
- description: >-
    In ECHS1-null cells and patient fibroblasts, perform metabolomic tracing of valine and
    fatty-acid carbon to determine which accumulating thioester (methacrylyl-CoA vs
    acryloyl-CoA) most strongly correlates with mitochondrial dysfunction and protein
    methacrylation.
  hypothesis: >-
    Accumulation of methacrylyl-CoA and consequent ectopic lysine methacrylation, rather than
    the beta-oxidation block, is the principal driver of the ECHS1-deficiency phenotype.
- description: >-
    Test whether the slower delta(3)-delta(2)-enoyl-CoA isomerase activity inferred by
    similarity is detectable for purified human ECHS1 using 3-enoyl-CoA substrates.
  hypothesis: >-
    Human ECHS1 retains a low-level enoyl-CoA isomerase activity analogous to its rodent
    ortholog, supporting the EC 5.3.3.8 annotation.
