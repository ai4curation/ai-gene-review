- description: >-
    Hydrates branched-chain amino acid catabolic intermediates, most importantly the
    valine-pathway intermediate methacrylyl-CoA (to (S)-3-hydroxyisobutyryl-CoA) and
    acryloyl-CoA; this detoxifying step links ECHS1 to valine catabolism, and its failure in
    ECHS1 deficiency causes accumulation of reactive valine-pathway thioesters.
  supported_by:
