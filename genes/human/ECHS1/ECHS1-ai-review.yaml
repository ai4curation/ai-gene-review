# --- 31: L-lysine catabolic process (IMP, PMID:37198486) ---
- term:
    id: GO:0019477
    label: L-lysine catabolic process
  evidence_type: IMP
  original_reference_id: PMID:37198486
  qualifier: involved_in
  review:
    summary: >-
      IMP annotation derived from a glioma study showing that ECHS1 is the crotonyl-CoA
      hydratase whose downregulation accumulates crotonyl-CoA (a lysine-catabolism intermediate
      produced via GCDH) and drives histone H4 lysine crotonylation. ECHS1 consumes crotonyl-CoA
      rather than performing a dedicated lysine-degradation step, so this placement reflects its
      action on a shared crotonyl-CoA pool.
    action: KEEP_AS_NON_CORE
    reason: >-
      Curator-assigned from experimental (full-text) evidence; deferred to per guidelines.
      Retained as non-core because ECHS1's connection to lysine catabolism is via the shared
      crotonyl-CoA metabolite, not a canonical lysine-degradation reaction.
    supported_by:
      - reference_id: PMID:37198486
        supporting_text: "downregulation of the crotonyl-CoA hydratase enoyl-CoA hydratase short chain 1 \n(ECHS1), leading to accumulation of intracellular crotonyl-CoA and histone H4 \nlysine crotonylation"
