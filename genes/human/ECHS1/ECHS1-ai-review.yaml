id: P30084
gene_symbol: ECHS1
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  ECHS1 (short-chain enoyl-CoA hydratase 1; mitochondrial enoyl-CoA hydratase, the classic
  "crotonase"; EC 4.2.1.17) is a soluble homohexameric (dimer of trimers) enzyme of the
  mitochondrial matrix that catalyzes the second step of the fatty acid beta-oxidation
  spiral: the reversible addition of water across the double bond of a 2-trans-enoyl-CoA to
  yield the corresponding (3S)-3-hydroxyacyl-CoA. It hydrates short- and medium-chain enoyl-CoA
  thioesters (C4 up to C16) with highest catalytic efficiency toward crotonyl-CoA. Beyond
  fatty acid oxidation, ECHS1 has a broad substrate range that places it at a central node of
  branched-chain amino acid catabolism: it hydrates valine-pathway intermediates (methacrylyl-CoA
  to 3-hydroxyisobutyryl-CoA, and acryloyl-CoA), 3-methylcrotonyl-CoA (leucine pathway) and
  tiglyl-CoA (isoleucine pathway). A slower delta(3)-delta(2)-enoyl-CoA isomerase activity has
  been inferred by similarity to orthologs. ECHS1 is synthesized with a cleaved N-terminal
  mitochondrial targeting presequence and is most abundant in liver, muscle and fibroblasts.
  Biallelic loss-of-function variants cause mitochondrial short-chain enoyl-CoA hydratase 1
  deficiency (ECHS1D), a Leigh-like encephalopathy in which neurotoxicity is attributed chiefly
  to accumulation of reactive valine-pathway intermediates (methacrylyl-CoA/acryloyl-CoA) rather
  than to the block in fatty acid oxidation per se.
