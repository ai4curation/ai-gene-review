core_functions:
- description: >-
    Catalyzes the second step of the mitochondrial fatty acid beta-oxidation spiral: the
    reversible hydration of short- and medium-chain 2-trans-enoyl-CoA thioesters (C4-C16) to
    the corresponding (3S)-3-hydroxyacyl-CoA, with highest catalytic efficiency toward
    crotonyl-CoA.
  supported_by:
