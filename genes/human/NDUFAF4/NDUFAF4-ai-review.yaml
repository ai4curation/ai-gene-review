suggested_questions:
- question: Does NDUFAF4 have any specific molecular activity beyond scaffolding/adapter
    binding of NDUFAF3 and nascent complex I subunits (e.g. a defined chaperone or
    membrane-anchoring function)?
- question: Is the antiviral effect against VSV a genuine physiological moonlighting
    function of NDUFAF4, or an indirect consequence of altered mitochondrial/metabolic
    state?
suggested_experiments:
- description: Structural or crosslinking-MS characterization of the NDUFAF3-NDUFAF4(-TIMMDC1)
    assembly intermediate to define NDUFAF4's molecular role and interaction surfaces.
  hypothesis: NDUFAF4 acts as a scaffold/anchor that positions NDUFAF3 and nascent
    subunits on the membrane arm during complex I assembly.
- description: Domain-mapping and mutagenesis (including the N-myristoylation site
    and disease variants A3P and L65P) to determine how membrane anchoring and specific
    residues contribute to complex I assembly.
  hypothesis: N-myristoylation and the conserved disease-associated residues are required
    for NDUFAF4's membrane association and assembly-factor function.
