- id: PMID:18179882
  title: C6ORF66 is an assembly factor of mitochondrial complex I.
  findings:
  - statement: A conserved-residue missense mutation in C6ORF66/NDUFAF4 causes isolated
      complex I deficiency; patient muscle shows reduced C6ORF66 protein and reduced
      fully assembled complex I, and wild-type cDNA restores complex I activity, establishing
      NDUFAF4 as a mitochondrial complex I assembly factor.
    supporting_text: Transfection of the patients' fibroblasts with wild-type C6ORF66
      cDNA restored complex I activity. These data suggest that C6ORF66 is an assembly
      factor of complex I.
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: Foundational paper establishing NDUFAF4 (C6ORF66) as a complex I
      assembly factor; abstract cached, PMID/title verified.
- id: PMID:19463981
  title: Mutations in NDUFAF3 (C3ORF60), encoding an NDUFAF4 (C6ORF66)-interacting
    complex I assembly protein, cause fatal neonatal mitochondrial disease.
  findings:
  - statement: NDUFAF3 is a genuine complex I assembly protein that interacts with
      complex I subunits and tightly interacts with NDUFAF4, linking the two proteins
      in the complex I assembly process.
    supporting_text: NDUFAF3 tightly interacts with NDUFAF4 (C6ORF66), a protein previously
      implicated in complex I deficiency
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: Establishes the NDUFAF3-NDUFAF4 partnership central to complex I
      assembly.
