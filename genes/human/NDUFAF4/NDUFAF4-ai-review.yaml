gene_symbol: NDUFAF4
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: NDUFAF4 (formerly C6orf66/HRPAP20) is a nuclear-encoded mitochondrial
  assembly factor for NADH:ubiquinone oxidoreductase (respiratory chain complex I).
  It is not a structural subunit of the holoenzyme and has no catalytic activity;
  instead it acts transiently during complex I biogenesis, working together with its
  tight interaction partner NDUFAF3 (and, in the same early membrane-arm intermediate,
  TIMMDC1) to build and anchor an early membrane-arm intermediate of the complex.
  The protein is N-myristoylated at the N-terminal glycine and is peripherally associated
  with the mitochondrial inner membrane. Loss-of-function variants cause autosomal
  recessive isolated mitochondrial complex I deficiency (nuclear type 15), with clinical
  presentations including Leigh syndrome, leukodystrophy, encephalopathy, and cardiomyopathy.
