id: A8MW95
gene_symbol: BECN2
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  BECN2/Beclin 2 is a mammalian Beclin-family autophagy and endolysosomal trafficking regulator. It
  interacts with class III PI3K complex components including PIK3C3/VPS34 and ATG14/UVRAG-associated
  partners to support autophagy/autophagosome assembly, and it also mediates GASP1/GPRASP1-dependent
  lysosomal degradation of GPCRs. Beclin-family PI3KC3/autophagy-complex participation is a shared
  core role, while GPCR catabolism is a BECN2-specific functional branch.
