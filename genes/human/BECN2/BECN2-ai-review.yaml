suggested_questions:
- question: Should BECN2 be curated to PI3KC3-C1 and PI3KC3-C2 complex membership as direct human
    complex membership or retained primarily as Beclin-family/evolutionary inference?
  experts:
  - GO autophagy editors
  - Reactome autophagy curators
  - PAINT curators
- question: Should BECN2 mitophagy be removed or generalized to autophagosome assembly/autophagy unless
    direct cargo-specific mitophagy evidence is found?
  experts:
  - GO autophagy editors
  - mitophagy domain experts
- question: 'What is the most specific GO molecular function for the BECN2-GASP1 GPCR degradation
    role: adaptor activity, protein-containing complex binding, or a future GPCR-degradation adaptor
    term?'
  experts:
  - GO molecular function editors
  - GPCR trafficking curators
- question: Should BECN2 acquire process annotations for its ATG9A-dependent (LC3/ATG16L1-independent)
    non-canonical autophagic degradation of inflammasome sensors and of MAP3K7/MAP3K3, and for negative
    regulation of NF-kB/innate immune signaling (PMID:34152938, PMID:32865519), given these are not
    represented in the current GOA-seeded annotations?
  experts:
  - GO autophagy editors
  - GO immunology curators
suggested_experiments:
- description: Use BECN2 knockout/rescue with ATG14-binding coiled-coil mutants to measure PI3KC3
    complex association, WIPI/LC3 recruitment, autophagosome assembly, and autophagic flux.
  experiment_type: autophagy complex rescue assay
  hypothesis: BECN2 supports autophagosome assembly through ATG14/PI3KC3 complex recruitment rather
    than by a generic Beclin-family label alone.
- description: Use BECN2 I80S/GASP1-binding mutants and GPCR ligand stimulation to separate GPCR lysosomal
    degradation from autophagy phenotypes in the same cellular background.
  experiment_type: separation-of-function GPCR degradation assay
  hypothesis: BECN2 has separable autophagy and GPCR endolysosomal degradation functions, with GASP1
    binding specifically required for GPCR turnover.
- description: In BECN2-deficient macrophages, test whether ATG9A or ULK1 ablation (versus ATG16L1/LC3
    loss) is required for accumulation of inflammasome sensors (NLRP3/AIM2/NLRP1/NLRC4) and of MAP3K7/MAP3K3,
    measuring sensor/kinase half-life and downstream IL1B, NF-kB, and ERK1/2 activation.
  experiment_type: non-canonical autophagic degradation assay
  hypothesis: BECN2 restrains innate immune signaling by routing inflammasome sensors and MAP3K kinases
