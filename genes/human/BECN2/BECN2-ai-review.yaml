    label: mitophagy
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: involved_in
  review:
    summary: Mitophagy is too cargo-specific for accessible BECN2 evidence; the supported Beclin-family
      role is autophagosome assembly/autophagy.
    action: MODIFY
    reason: Modify to autophagosome assembly. BECN2 is directly supported in autophagy and ATG14/PI3KC3
      complex context, but neither the cached human paper nor UniProt establishes a BECN2-specific
      mitophagy role. Quiles et al. 2023 (PMID:36719945) directly show that selective mitophagy is
      impaired by BECN1 loss but not BECN2 loss, while BECN2 still contributes to general autophagosome
      formation, independently corroborating this reassignment.
    proposed_replacement_terms:
    - &id015
      id: GO:0000045
      label: autophagosome assembly
