- id: PMID:25092655
  title: EDEM2 initiates mammalian glycoprotein ERAD by catalyzing the first mannose trimming step.
  findings:
  - statement: Endogenous EDEM3 (mainly) and EDEM1 (to a lesser extent) catalyze the second trimming step Man8B to Man7, and EDEM1/EDEM3 trim M8B to Man7-5GlcNAc2 recognized by OS-9; SEL1L binds EDEM1 and EDEM3 but not EDEM2.
    reference_section_type: RESULTS
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: Definitive endogenous-knockout study; establishes EDEM3 as the main second-step mannosidase of mammalian gpERAD and its SEL1L association.
- id: PMID:16431915
  title: EDEM3, a soluble EDEM homolog, enhances glycoprotein endoplasmic reticulum-associated degradation and mannose trimming.
  findings:
  - statement: EDEM3 is a 931-aa soluble Class I GH47 alpha-mannosidase homolog with a C-terminal protease-associated motif; overexpression accelerates gpERAD of misfolded alpha-1-antitrypsin NHK and TCRalpha and stimulates mannose trimming from misfolded and total glycoproteins, while the catalytic-site E147Q mutant abolishes trimming and greatly decreases ERAD enhancement, showing EDEM3 has alpha-1,2-mannosidase activity in vivo.
    reference_section_type: ABSTRACT
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: PubMed-verified (PMID:16431915, doi:10.1074/jbc.M512191200). Original EDEM3 characterization establishing its in vivo alpha-1,2-mannosidase activity, the E147Q catalytic requirement, the PA motif, and ERAD acceleration. Not cached; reference added without verbatim supporting_text.
- id: PMID:29784879
  title: ER-resident protein 46 (ERp46) triggers the mannose-trimming activity of ER degradation-enhancing alpha-mannosidase-like protein 3 (EDEM3).
  findings:
  - statement: EDEM3 stably associates with the ER oxidoreductase ERp46 (TXNDC5) via a disulfide bond between ERp46 redox-active cysteines and the EDEM3 alpha-mannosidase domain; this redox-dependent covalent interaction is required to reconstitute EDEM3 mannose-trimming activity toward the misfolded substrate TCRalpha in vitro, coupling demannosylation to ER redox state.
    reference_section_type: ABSTRACT
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: PubMed-verified (PMID:29784879, doi:10.1074/jbc.RA118.003129). Establishes ERp46/TXNDC5 as the disulfide-linked oxidoreductase partner gating EDEM3 activity, paralleling the EDEM2-TXNDC11 redox pair. Not cached; reference added without verbatim supporting_text.
- id: PMID:33671632
  title: EDEM3 Domains Cooperate to Perform Its Overall Cell Functioning.
  findings:
  - statement: EDEM3 comprises four modules - GH47 mannosidase-like, intermediate (IMD), protease-associated (PA), and intrinsically disordered (IDD) domains; the GH47 domain provides substrate binding even without mannose trimming and requires the IMD for folding, while PA and IDD domains do not affect trimming per se but modulate the ERAD turnover timing of specific misfolded clients (NHK, soluble tyrosinase mutant). EDEM3 has few stable ER interactors, consistent with transient substrate engagement.
    reference_section_type: ABSTRACT
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: PubMed-verified (PMID:33671632, doi:10.3390/ijms22042172). Domain-dissection study defining the GH47/IMD/PA/IDD architecture and the PA/IDD roles in tuning ERAD timing and client selectivity. Not cached; reference added without verbatim supporting_text.
- id: PMID:39838427
  title: The endoplasmic reticulum degradation-enhancing alpha-mannosidase-like protein 3 attenuates the unfolded protein response and has pro-survival and pro-viral roles in hepatoma cells and hepatocellular carcinoma patients.
  findings:
  - statement: EDEM3 is significantly upregulated in hepatocellular carcinoma tissues, with the highest levels in HBV-infected patients, and its expression associates with tumor progression and poor prognosis; EDEM3 overexpression attenuates the UPR and activates secretory autophagy to promote HBV production, whereas EDEM3 depletion induces ER stress and pro-apoptotic cell death.
    reference_section_type: ABSTRACT
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: PubMed-verified (PMID:39838427, doi:10.1186/s12929-024-01103-9). Disease-context study showing pro-survival/pro-viral roles of EDEM3 in HCC/HBV via UPR attenuation and secretory autophagy. Not cached; reference added without verbatim supporting_text.
