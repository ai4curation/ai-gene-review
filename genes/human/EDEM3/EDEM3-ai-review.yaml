suggested_questions:
- question: What is the function of the EDEM3-specific protease-associated (PA) domain in substrate recognition or regulation of its mannosidase activity?
- question: To what extent does EDEM3 trim N-glycans on correctly folded/general glycoproteins versus only misfolded ERAD substrates, and how does this relate to the EDEM3-CDG glycosylation phenotype?
suggested_experiments:
- description: Reconstitute purified EDEM3 (wild-type, catalytic-dead, and PA-domain-deleted) on defined Man8GlcNAc2 glycoprotein substrates to quantify the second-step trimming activity and the PA domain's contribution to substrate selection.
- description: Glycomic and substrate-degradation profiling of EDEM3-CDG patient-variant knock-in cells to determine how loss of EDEM3 mannosidase activity alters N-glycan trimming on general versus misfolded glycoproteins.
