knowledge_gaps:
- gap_statement: Direct endogenous human evidence for SERINC1 adaptor and enzyme-activator activity is lacking.
  boundary: The core biochemical experiments used rat Serinc1, yeast Tms1 complementation, and heterologous expression; reviewed human function is assigned by orthology.
  gap_kind:
  - BIOLOGY
  dark_aspect: MF_DARK
  status: OPEN
  significance: Direct human validation is needed to distinguish a conserved SERINC1 mechanism from family-level redundancy or context-specific activity.
  resolution: Delete endogenous SERINC1 in human cells, rescue with Q9NRX5 at matched abundance, and measure isotope-resolved serine incorporation, phosphatidylserine-synthase and serine-palmitoyltransferase activities, and endogenous complex assembly.
  provenance:
  - reference_id: file:human/SERINC1/SERINC1-notes.md
    supporting_text: The core assignment is orthology-supported ER membrane adaptor/enzyme activator
- gap_statement: The extent of functional redundancy among human SERINC paralogs is unresolved.
  boundary: A mouse Serinc1 single-gene knockout showed no immune-cell lipid or functional phenotype despite the overexpression biochemistry.
  gap_kind:
  - BIOLOGY
  dark_aspect: BP_DARK
  status: OPEN
  significance: Compensation could mask an essential shared role in serine-derived lipid synthesis and explains why single-gene loss is silent in some cell types.
  resolution: Compare single and combinatorial SERINC knockouts across human cell types using quantitative lipidomics, isotope tracing, and paralog-specific rescue.
  provenance:
  - reference_id: PMID:28006656
    supporting_text: did not significantly alter serine-derived lipid composition
    reference_section_type: ABSTRACT
    full_text_unavailable: true
- gap_statement: Whether endogenous human SERINC1 has a functional plasma-membrane pool is uncertain.
  boundary: The source rat GO record contains a plasma-membrane IDA annotation, while the accessible paper abstract and reviewed human UniProt emphasize the ER membrane.
  gap_kind:
  - BIOLOGY
  dark_aspect: CC_DARK
  status: OPEN
  significance: Resolving location is necessary to determine where SERINC1 acts and whether it has functions distinct from ER lipid synthesis.
  resolution: Use endogenous epitope tagging, selective surface labeling, quantitative imaging, and organelle fractionation with topology controls in several human cell types.
  provenance:
  - reference_id: file:human/SERINC1/SERINC1-notes.md
    supporting_text: ER-versus-plasma-membrane localization should be
suggested_questions:
- question: Does endogenous human SERINC1 directly organize serine-synthetic enzymes with phosphatidylserine synthase and serine palmitoyltransferase at the ER membrane?
- question: Which other SERINC paralogs compensate for SERINC1 loss, and is compensation cell-type or metabolic-state dependent?
- question: Does human SERINC1 have a bona fide plasma-membrane pool, and if so, what molecular activity occurs there?
suggested_experiments:
- hypothesis: Human SERINC1 promotes serine-derived lipid synthesis through an ER-localized adaptor/enzyme-activator mechanism.
  description: Generate SERINC1-null human cells, restore untagged SERINC1 at endogenous abundance, and combine stable-isotope serine tracing with quantitative phosphatidylserine and sphingolipid lipidomics, direct enzyme assays, and endogenous co-complex measurements.
  experiment_type: Endogenous knockout-rescue with isotope-resolved lipid biochemistry
- hypothesis: Other SERINC-family proteins compensate for SERINC1 loss in a cell-type-dependent manner.
  description: Construct single and combinatorial SERINC knockouts in immune and neuronal human cell models, quantify paralog expression and serine-derived lipids, and perform paralog-specific rescue under basal and lipid-demanding conditions.
  experiment_type: Combinatorial genetic epistasis and lipidomics
- hypothesis: SERINC1 is predominantly ER-resident, while any plasma-membrane pool is regulated and functionally distinct.
  description: Endogenously tag SERINC1 and compare surface labeling, live-cell imaging, glycan maturation, and ER/plasma-membrane fractionation with lipid-synthesis readouts and localization-defective mutants.
  experiment_type: Endogenous localization and separation-of-function analysis
