  label: Homo sapiens
description: >-
  SERINC1 is a 453-residue, N-myristoylated multipass membrane protein of the
  conserved SERINC family. At the endoplasmic-reticulum membrane it is implicated
  in organizing and stimulating enzymes that incorporate serine into
  phosphatidylserine and sphingolipids, thereby supporting membrane-lipid
  biogenesis. This activity is established directly for rat Serinc1 and transferred
  to the human ortholog; endogenous human biochemical activity has not yet been
  demonstrated. Serinc1 loss in mouse macrophages and lymphocytes does not alter
  serine-derived lipid composition or the tested immune-cell functions, indicating
  substantial context dependence or compensation by other SERINC proteins.
