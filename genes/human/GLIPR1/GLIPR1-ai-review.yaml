core_functions:
- description: >-
    In prostate cancer-cell contexts, membrane-bound or released GLIPR1 promotes
    ROS-JNK-dependent apoptosis and suppresses cell population proliferation by
    altering CK1alpha/c-Myc and Hsc70-SP1/c-Myb-AURKA/TPX2 regulatory pathways.
    These are experimentally demonstrated context-specific outputs; the direct
    molecular activity that initiates them remains unknown.
  directly_involved_in:
  - id: GO:0043065
    label: positive regulation of apoptotic process
  - id: GO:0008285
    label: negative regulation of cell population proliferation
  locations:
  - id: GO:0009897
    label: external side of plasma membrane
  - id: GO:0005576
    label: extracellular region
  supported_by:
  - reference_id: PMID:18199537
    supporting_text: >-
      GLIPR1 up-regulation increases the production of reactive oxygen species
      (ROS) leading to apoptosis through activation of the c-Jun-NH(2) kinase
      (JNK) signaling cascade.
    reference_section_type: ABSTRACT
    full_text_unavailable: true
  - reference_id: PMID:22025562
    supporting_text: >-
      Restoration of GLIPR1 expression in prostate cancer cells downregulated
      c-myc levels, inhibiting cell-cycle progression.
    reference_section_type: ABSTRACT
- description: >-
    In glioma cells and glioma stem cells, GLIPR1 associates with N-WASP and
    hnRNPK, weakens the inhibitory N-WASP-hnRNPK interaction, and thereby
    promotes cell spreading, migration, invasion, and extracellular-matrix
    degradation. This activity is context-specific and does not establish
    molecular adaptor activity in the GO sense.
  directly_involved_in:
  - id: GO:0030335
    label: positive regulation of cell migration
  supported_by:
  - reference_id: PMID:26305187
    supporting_text: >-
      We found that RTVP-1 increased cell spreading, migration and invasion and
      these effects were at least partly mediated by N-WASP.
    reference_section_type: ABSTRACT
proposed_new_terms: []
suggested_questions:
- question: >-
    What physiological extracellular ligand, receptor, lipid, or substrate
    engages the GLIPR1 CAP-domain cavity, and is zinc coordination required?
  experts:
  - CAP-superfamily structural biologists
  - extracellular signaling biochemists
- question: >-
    Which normal human cell types use the prostate-like pro-apoptotic output,
    the glioma-like pro-migratory output, or a distinct GLIPR1 function?
  experts:
  - human tissue and single-cell biologists
  - cancer signaling specialists
- question: >-
    How does an extracellular-facing protein with a very short cytoplasmic tail
    control or contact cytosolic N-WASP, hnRNPK, Hsc70, and CK1alpha?
  experts:
  - membrane-trafficking and proteolysis specialists
  - cytoskeletal signaling biologists
suggested_experiments:
- description: >-
    Purify full-length nanodisc-embedded GLIPR1 and its soluble CAP ectodomain,
    then perform quantitative ligand, lipid, protease, and metal-binding screens
    with CAP-cavity and zinc-coordinating residue mutants.
  experiment_type: biochemical activity and ligand-discovery profiling
  hypothesis: >-
    GLIPR1 binds a restricted extracellular ligand or lipid through its CAP
    cavity, and this binding supplies the missing initiating molecular activity.
- description: >-
    Endogenously tag GLIPR1 in primary prostate epithelial cells, macrophages,
    and patient-derived glioma cells; map topology, shedding, internalization,
    and proximity partners before and after defined stimuli.
  experiment_type: endogenous topology, trafficking, and proximity proteomics
  hypothesis: >-
    Cell-type-specific cleavage or internalization determines whether GLIPR1
    engages extracellular, membrane, or cytosolic regulatory partners.
- description: >-
    Create GLIPR1-null human prostate epithelial and glioma organoid models and
    rescue them with full-length, cleavage-resistant, transmembrane-deleted,
    cytoplasmic-tail-deleted, and CAP-cavity mutant proteins while measuring
    ROS-JNK apoptosis, proliferation, N-WASP activity, migration, and invasion.
  experiment_type: CRISPR genetics and separation-of-function rescue
  hypothesis: >-
    Distinct GLIPR1 structural modules and trafficking states drive the
    pro-apoptotic prostate and pro-migratory glioma outputs.
knowledge_gaps:
- gap_statement: >-
    The direct physiological molecular activity, ligand, receptor, lipid, or
    substrate of human GLIPR1 is unknown.
  boundary: >-
    The extracellular CAP-domain structure, zinc-coordinating cavity,
    single-pass topology, soluble ectodomain activity, and several downstream
    signaling consequences are established, but none identifies the initiating
    biochemical action.
  gap_kind:
  - BIOLOGY
  dark_aspect: MF_DARK
  status: OPEN
  significance: >-
    Resolving this is necessary for a defensible molecular-function annotation
    and for distinguishing receptor, ligand, competitor, and catalytic models.
  resolution: >-
    Direct binding and activity screens with purified full-length and ectodomain
    protein, followed by cellular rescue with cavity mutants, should identify
    the initiating activity.
  provenance:
  - reference_id: file:human/GLIPR1/GLIPR1-deep-research-manual.md
    supporting_text: >-
      GLIPR1 is an extracellular-facing membrane CAP protein whose direct ligand
      and biochemical activity are unknown.
- gap_statement: >-
    The normal physiological context and direction of GLIPR1 action are not
    established beyond disease-cell models.
  boundary: >-
    Direct experiments show pro-apoptotic and antiproliferative effects in
    prostate cancer cells but pro-migratory and pro-invasive effects in glioma
    cells, while normal-tissue expression studies also disagree.
  gap_kind:
  - BIOLOGY
  dark_aspect: BP_DARK
  status: OPEN
  significance: >-
    Without a normal-cell context, disease phenotypes cannot be safely treated
    as a single universal evolved core process.
  resolution: >-
    Conditional loss-of-function and endogenous rescue across primary human
    epithelial, immune, and neural-lineage systems should reveal which outputs
    are physiological and which are tumor-state adaptations.
  provenance:
  - reference_id: PMID:22025562
    supporting_text: >-
      In contrast to GLIPR1's tumor suppressor activities in PCa, in
      glioblastomas, GLIPR1 was upregulated and promoted cell growth, survival,
      and invasion, suggesting a context-specific role for GLIPR1 in malignant growth
    reference_section_type: INTRODUCTION
- gap_statement: >-
    The topology and trafficking step that permit GLIPR1 to regulate cytosolic
    N-WASP, hnRNPK, Hsc70, and CK1alpha are unknown.
  boundary: >-
    Canonical GLIPR1 has a large extracellular CAP domain, a C-terminal
    transmembrane helix, and a very short cytoplasmic tail, while soluble
    ectodomain can be internalized and full-length constructs yield cytosolic
    interaction phenotypes.
  gap_kind:
  - BIOLOGY
  dark_aspect: RESIDUAL_SUBGAP
  status: OPEN
  significance: >-
    This mechanistic gap determines whether the reported partners are contacted
    at the cell surface, after cleavage/internalization, or indirectly.
  resolution: >-
    Endogenous topology mapping, pulse-chase shedding/internalization assays,
    compartment-resolved proximity labeling, and tail/cleavage mutants should
    establish the causal trafficking route.
  provenance:
  - reference_id: PMID:26305187
    supporting_text: >-
      RTVP-1 and N-WASP showed FRET efficiency of 33.43 + 2.72%, suggesting a
      direct interaction of these two proteins in glioma cells.
    reference_section_type: RESULTS
