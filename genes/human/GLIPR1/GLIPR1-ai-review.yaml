id: P48060
gene_symbol: GLIPR1
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  GLIPR1 is a type-I single-pass membrane member of the CAP/CRISP superfamily,
  produced with an N-terminal signal peptide and a large extracellular CAP
  domain; soluble or released ectodomain forms can also act on cells. Its direct
  physiological ligand and biochemical activity are unresolved. In prostate
  cancer cells, GLIPR1 restoration promotes ROS-JNK-dependent apoptosis and
  suppresses proliferation through CK1alpha/c-Myc and Hsc70-AURKA/TPX2-linked
  pathways. In glioma cells and glioma stem cells it has the opposite,
  context-specific effect of promoting N-WASP-dependent spreading, migration,
  invasion, and matrix degradation while weakening the inhibitory association
  between N-WASP and hnRNPK. GLIPR1 is therefore a context-dependent membrane
  and extracellular regulatory protein rather than a demonstrated enzyme or a
  universally acting tumor suppressor.
alternative_products:
- name: '1'
  id: P48060-1
  description: >-
    Canonical 266-amino-acid precursor with an N-terminal signal peptide,
    extracellular CAP domain, C-terminal transmembrane helix, and short
    cytoplasmic tail.
- name: 2 (RTVP-1b)
  id: P48060-2
  sequence_note: VSP_043902
  description: >-
    Diverges from the canonical protein after residue 141. It is expressed in
    glioma and promoted proliferation, but not migration, when overexpressed in
    glioma cells; no normal isoform-specific function has been established.
