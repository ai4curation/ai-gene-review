  qualifier: enables
  review:
    summary: >-
      PAINT propagated molecular adaptor activity from mouse Glipr1l1 across a
      broad CAP-family ancestral node to GLIPR1.
    action: REMOVE
    reason: >-
      Mouse Glipr1l1 is a specialized sperm/acrosomal paralog, and the CAP family
      has strongly diversified functions. Human GLIPR1 interacts with N-WASP,
      hnRNPK, and Hsc70, but no study shows it bringing molecules together as
      required by the GO definition. In the best-defined glioma mechanism,
      GLIPR1 instead decreases the N-WASP-hnRNPK association. The sole
      Glipr1l1-derived seed therefore does not support adaptor activity in
      GLIPR1.
