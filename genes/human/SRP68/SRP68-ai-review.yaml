- id: file:human/SRP68/SRP68-uniprot.txt
  title: UniProt entry Q9UHB9 (SRP68_HUMAN), Signal recognition particle subunit SRP68
  findings:
  - statement: SRP68 is an S-domain SRP subunit that binds the 7SL RNA via its N-terminal RNA-binding domain (52-252) and forms a heterodimer with SRP72; SRP mediates cotranslational targeting of secretory/membrane proteins to the ER. Cytoplasm, nucleolus and ER localizations. Biallelic variants cause SCN10.
    reference_section_type: OTHER
- id: PMID:30649417
  title: Reconstitution of the human SRP system and quantitative and systematic analysis
    of its ribosome interactions.
  findings:
  - statement: Reconstitution of recombinant human SRP shows the SRP68/72 heterodimer binds the 80S ribosome with ultrasensitive (avidity-driven, multi-site) nanomolar affinity dominated by the SRP72 C-terminus, quantifying the SRP68/72 contribution to SRP-ribosome engagement.
    reference_section_type: ABSTRACT
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: PubMed-verified (PMID:30649417; NAR 2019). Reconstituted human SRP system; provides the quantitative biophysical basis (avidity, two-step SRP54 mechanism, SRP68/72 ultrasensitive ribosome binding) for SRP68's contribution to ribosome binding. Not cached; no verbatim supporting_text added.
- id: PMID:38858088
  title: The nucleolar phase of signal recognition particle assembly.
  findings:
  - statement: Quantitative proteomics shows SRP proteins (including SRP68) associate with scores of nucleolar/ribosome-biogenesis factors; an intact nucleolus is required for proper SRP protein localization, and some SRP proteins are detected in Cajal bodies, defining a nucleolar phase of SRP assembly.
    reference_section_type: ABSTRACT
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: PubMed-verified (PMID:38858088; Life Sci Alliance 2024). Modern evidence for the nucleolar phase of SRP biogenesis; supports the non-core nucleolus localization (GO:0005730). Not cached; no verbatim supporting_text added.
- id: PMID:32273475
  title: Identification of biallelic germline variants of SRP68 in a sporadic case with
    severe congenital neutropenia.
  findings:
  - statement: Biallelic germline SRP68 loss-of-function variants cause severe congenital neutropenia; patient granulocytic cells show reduced SRP68 protein, impaired granulopoiesis, ER-stress (spliced XBP1) and p53-pathway activation.
    reference_section_type: OTHER
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: PubMed-verified (PMID:32273475; Haematologica 2021). Primary clinical/functional evidence for the SRP68 SCN disease association cited in the description. Abstract not available in PubMed; not cached, so no verbatim supporting_text added.
