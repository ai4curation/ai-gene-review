  - statement: GFP fusions of SRP19, SRP68 and SRP72 localize to the nucleolus and cytoplasm; SRP68 also accumulates in the ER, consistent with partial SRP assembly in the nucleolus.
    reference_section_type: ABSTRACT
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: Source of the nucleolar/cytoplasmic/ER localization annotations; establishes SRP68 as an S-domain SRP protein trafficking through the nucleolus.
- id: PMID:16672232
  title: 'Protein SRP68 of human signal recognition particle: identification of the
    RNA and SRP72 binding domains.'
  findings:
  - statement: Human SRP68 binds recombinant SRP72 and in vitro-transcribed SRP RNA; the RNA-binding domain spans residues 52-252 and ~94 C-terminal residues mediate SRP72 binding.
    reference_section_type: ABSTRACT
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
