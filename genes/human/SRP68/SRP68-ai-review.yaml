suggested_questions:
- question: Beyond cotranslational targeting, does the SRP68/72 module contribute to the recently described mRNA-protection function of SRP, and is SRP68 RNA remodeling required for it?
- question: How do the SCN10-causing biallelic SRP68 variants impair SRP assembly or targeting, and why is the neutrophil lineage particularly sensitive?
suggested_experiments:
- description: Reconstitute SRP with wild-type versus RNA-binding-deficient SRP68 and measure SRP RNA 5f-loop remodeling and cotranslational targeting efficiency to a model secretory substrate in vitro.
- description: Introduce patient SCN10 SRP68 variants into a human myeloid differentiation model and quantify SRP assembly, ER targeting, and granulopoiesis to define the disease mechanism.
