id: O75251
gene_symbol: NDUFS7
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: NDUFS7 (PSST subunit; Complex I-20kD) is a nuclear-encoded core catalytic
  subunit of mitochondrial respiratory Complex I (NADH:ubiquinone oxidoreductase,
  EC 7.1.1.2). It is one of the fourteen conserved core subunits and belongs to the
  iron-sulfur (IP) fragment in the Q-module, adjacent to the ubiquinone-reduction
  site at the junction between the peripheral and membrane arms. NDUFS7 coordinates
  a [4Fe-4S] cluster corresponding to cluster N2, the terminal iron-sulfur cluster
  of the electron-transfer chain that donates electrons to ubiquinone, placing it
  directly in the redox-active electron-transfer pathway of the enzyme. Complex I
  oxidizes NADH, reduces ubiquinone, and couples this
  electron transfer to proton pumping across the inner membrane, generating the proton
  motive force used for ATP synthesis. NDUFS7 is a peripheral membrane protein of
  the mitochondrial inner membrane, exposed on the matrix side. It is hydroxylated
  at an arginine by NDUFAF5 early in Complex I assembly. Loss-of-function variants
  cause mitochondrial complex I deficiency (MC1DN3) and Leigh syndrome.
