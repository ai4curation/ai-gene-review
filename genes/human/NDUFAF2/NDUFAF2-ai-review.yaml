core_functions:
- description: >-
    Molecular chaperone / assembly factor for mitochondrial respiratory chain
    complex I. NDUFAF2 binds a large late-stage complex I assembly intermediate
    (containing subunits of both the matrix and membrane arms) at the
    mitochondrial inner membrane, stabilizing it and promoting efficient assembly
    of the holoenzyme, from which NDUFAF2 is then released. It is not a stable
    structural subunit and has no catalytic activity of its own.
  molecular_function:
    id: GO:0044877
    label: protein-containing complex binding
