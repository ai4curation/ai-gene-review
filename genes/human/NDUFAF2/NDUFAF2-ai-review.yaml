gene_symbol: NDUFAF2
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  NDUFAF2 (also known as NDUFA12L, B17.2L, and Mimitin) is a nuclear-encoded,
  mitochondrially targeted assembly factor for respiratory chain complex I
  (NADH:ubiquinone oxidoreductase). It is a paralog of the structural complex I
  subunit NDUFA12 (B17.2) but, unlike its paralog, it is not a stable component
  of the mature holoenzyme. Instead it acts as a molecular chaperone that binds
  transiently to a large (~830 kDa) late-stage complex I assembly intermediate
  containing subunits of both the matrix (peripheral) and membrane arms, and is
  released once assembly is complete. By stabilizing this subassembly it increases
  the efficiency of complex I biogenesis, although residual assembly can occur in
  its absence. The protein carries an N-terminal mitochondrial transit peptide and
  a C-terminal disordered region. Loss-of-function variants cause autosomal
  recessive mitochondrial complex I deficiency nuclear type 10 (MC1DN10),
  presenting as progressive encephalopathy/leukoencephalopathy and Leigh syndrome.
  A more recently reported pleiotropic role links NDUFAF2 to primary cilium
  formation through interaction with the basal-body protein ARMC9.
