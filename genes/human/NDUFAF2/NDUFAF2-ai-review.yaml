- term:
    id: GO:0060271
    label: cilium assembly
  evidence_type: IMP
  original_reference_id: PMID:38949024
  qualifier: involved_in
  review:
    summary: >-
      Experimentally supported (IMP) moonlighting role. NDUFAF2 knockout in RPE
      cells and knockdown in zebrafish impair primary cilium formation, and the
      protein participates in early ciliogenesis steps (CP110 removal, ciliary
      vesicle docking, transition-zone establishment) via interaction with ARMC9.
      This is a genuine but non-core, recently discovered pleiotropic function
      distinct from the protein's primary complex I assembly role, and part of the
      effect appears indirect (rescued by NAD+ supplementation). Keep as non-core.
    action: KEEP_AS_NON_CORE
    supported_by:
    - reference_id: PMID:38949024
      supporting_text: >-
        NDUFAF2 is involved in the initial steps of cilia formation, including the
        docking of membrane vesicles, removal of CP110, and establishment of the
        transition zone
