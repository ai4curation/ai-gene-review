    supporting_text: >-
      These results demonstrate that B17.2L is a bona fide molecular chaperone
      that is essential for the assembly of complex I
  - reference_id: PMID:16200211
    supporting_text: >-
      coimmunoprecipitated a subset of complex I structural subunits from normal
      human heart mitochondria
