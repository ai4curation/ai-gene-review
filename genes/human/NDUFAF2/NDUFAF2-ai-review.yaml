  review:
    summary: >-
      Over-general InterPro-based electronic annotation. "Membrane" is
      uninformative for this protein; NDUFAF2 is a soluble/peripheral chaperone
      that associates transiently with membrane-embedded complex I assembly
      intermediates but is not itself an integral membrane protein. The more
      specific mitochondrial inner membrane localization (from Reactome) already
      captures its site of action. Recommend removing this uninformative IEA.
    action: REMOVE
- term:
    id: GO:0045271
    label: respiratory chain complex I
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: part_of
  review:
    summary: >-
      Incorrect. This InterPro-based IEA annotation asserts that NDUFAF2 is
      part_of the respiratory chain complex I (the mature holoenzyme), but NDUFAF2
      is an assembly factor that is explicitly NOT a component of the mature
      complex. The primary experimental study showed the anti-NDUFAF2 antibody
      does not associate with the holoenzyme, and Reactome models the factor
      dissociating before the mature complex forms. The InterPro rule over-applies
      the structural-subunit annotation of its NDUFA12 paralog. Remove.
    action: REMOVE
    supported_by:
    - reference_id: PMID:16200211
      supporting_text: >-
        An anti-B17.2L antibody did not associate with the holoenzyme complex but
        specifically recognized an 830-kDa subassembly
