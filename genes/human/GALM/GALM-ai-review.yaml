  title: Large-scale proteomics and phosphoproteomics of urinary exosomes.
  findings:
  - statement: >-
      Large-scale LC-MS/MS proteomics of human urinary exosomes; GALM is among the many proteins
      detected in this exosome fraction.
    supporting_text: "we used LC-MS/MS to profile the proteome of human urinary exosomes. Overall, the analysis identified 1132 proteins unambiguously"
  reference_review:
    relevance: LOW
    correctness: VERIFIED
    review_notes: >-
      High-throughput proteomics survey supporting only the extracellular-exosome detection
      (non-core); does not inform GALM's catalytic function.
- id: PMID:30451973
  title: Biallelic GALM pathogenic variants cause a novel type of galactosemia.
  findings:
  - statement: >-
      Biallelic loss-of-function GALM variants impair aldose 1-epimerase activity and the Leloir
      pathway, causing a novel (type IV) galactosemia (galactose mutarotase deficiency, GALAC4).
    supporting_text: "Biallelic GALM pathogenic variants cause a novel type of galactosemia."
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Abstract-only in cache; establishes the disease relevance (galactosemia type IV) and, via
      variant characterization, supports GALM's role in the Leloir galactose catabolic pathway.
