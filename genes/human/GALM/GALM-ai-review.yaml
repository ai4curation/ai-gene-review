    label: glucose metabolic process
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: involved_in
  review:
    summary: >-
      Phylogenetic inference that GALM participates in glucose metabolism, reflecting the
      family's ability to mutarotate glucose in addition to galactose.
    action: KEEP_AS_NON_CORE
    reason: >-
      GALM does mutarotate D-glucose in vitro, but with lower affinity/turnover than galactose
      (KM 54 mM vs 37 mM; kcat 4900 vs 12000 s-1), and the enzyme "exhibits a preference for
      galactose over glucose" (PMID:12753898). Glucose mutarotation is a genuine but secondary
      activity, not the core physiological role.
    supported_by:
