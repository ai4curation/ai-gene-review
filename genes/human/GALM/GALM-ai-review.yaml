- description: >-
    Aldose 1-epimerase (galactose mutarotase) activity: GALM interconverts the beta- and
    alpha-anomers of D-galactose in the cytosol, catalyzing the first step of the Leloir pathway
    and supplying the alpha-D-galactose required by galactokinase (GALK1).
