- id: PMID:12753898
  title: Identification and characterisation of human aldose 1-epimerase.
  findings:
  - statement: >-
      Recombinant human GALM has aldose 1-epimerase (mutarotase) activity (EC 5.1.3.3) and
      interconverts the alpha- and beta-anomers of hexose sugars, with a preference for galactose
      over glucose; site-directed mutagenesis confirmed catalytic/substrate-binding residues.
    supporting_text: "Enzyme assays show that the protein has aldose 1-epimerase activity and exhibits a preference for galactose over glucose. Site-directed mutagenesis confirmed the involvement of three residues involved in catalysis and substrate binding."
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Abstract-only in cache (full_text_available: false), but the abstract directly establishes
      GALM's core aldose 1-epimerase activity and galactose preference; PMID matches title.
