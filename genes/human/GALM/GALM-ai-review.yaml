id: Q96C23
gene_symbol: GALM
product_type: PROTEIN
status: IN_PROGRESS
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  GALM is the cytosolic aldose 1-epimerase (galactose mutarotase; EC 5.1.3.3) that
  catalyzes the first step of the Leloir pathway of galactose metabolism. It interconverts
  the beta- and alpha-anomers of D-galactose (beta-D-galactose <=> alpha-D-galactose),
  maintaining the anomeric equilibrium and ensuring a sufficient supply of the alpha-anomer,
  which galactokinase (GALK1) requires as its substrate; the downstream Leloir enzymes GALK1,
  GALT, and GALE then convert galactose into glucose 1-phosphate. GALM also mutarotates
  D-glucose (alpha-D-glucose <=> beta-D-glucose), though it prefers galactose over glucose.
  The enzyme is a monomer with a single-domain beta-sandwich fold typical of the aldose
  epimerase family; catalysis uses His-176 as the proton donor and Glu-307 as the proton
  acceptor, with His-107 also contributing. Biallelic loss-of-function GALM variants cause
  galactose mutarotase deficiency (galactosemia type IV, GALAC4), an autosomal recessive
  inborn error of galactose metabolism.
