  title: ANKFY1 bridges ATG2A-mediated lipid transfer from endosomes to phagophores.
  full_text_unavailable: true
  findings:
  - statement: >-
      ANKFY1 is an endosome-localized, FYVE-domain ATG2A-binding protein that binds PI3P and enhances
      ATG2A-mediated lipid transfer between PI3P-containing liposomes, supporting endosome-to-phagophore
      lipid donation; ANKFY1 depletion phenocopies ATG2A/B loss.
- id: PMID:37938170
  title: ATG9B is a tissue-specific homotrimeric lipid scramblase that can compensate for ATG9A.
  full_text_unavailable: true
  findings:
  - statement: >-
      ATG9B is a tissue-specific homotrimeric lipid scramblase that can compensate for ATG9A and can form
      a heteromeric complex with ATG2A, consistent with ATG2A lipid transfer being coupled to ATG9-family
      scramblase activity.
- id: PMID:37796195
  title: Lysosome damage triggers direct ATG8 conjugation and ATG2 engagement via non-canonical autophagy.
  full_text_unavailable: true
  findings:
  - statement: >-
      Lysosome damage induces non-canonical autophagy (CASM) and promotes ATG2/ATG8 engagement via an
      ATG2 LIR-dependent mode; the robustly demonstrated interaction was ATG2B-LC3A, with a proposed
      role in lysosome repair (ATG2A-specific contribution inferred rather than directly established).
- id: PMID:38294121
  title: Exploring the ATG9A interactome uncovers interaction with VPS13A.
  full_text_unavailable: true
  findings:
  - statement: >-
      ATG9A acts as a lipid scramblase whose function is thought to require interaction with the lipid
      transfer protein ATG2A; ATG9A and ATG2A are proposed to function together to expand the growing
      autophagosome, and ATG9A forms a distinct complex with VPS13A separate from the ATG9A-ATG2A complex.
