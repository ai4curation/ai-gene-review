- term:
    id: GO:0005515
    label: protein binding
  evidence_type: IPI
  original_reference_id: PMID:28561066
  qualifier: enables
  review:
    summary: WIPI4 interaction should be represented as ATG2-WIPI/Atg18 complex context, not generic binding.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      The biologically meaningful claim is ATG2A association with WIPI4/WDR45 in the autophagy machinery.
      Generic protein binding is over-annotated for this evidence, and the GO:0062079 cellular-component
      complex context is captured separately as a NEW annotation rather than as a replacement for this MF row.
