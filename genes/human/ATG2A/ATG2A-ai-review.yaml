id: Q2TAZ0
gene_symbol: ATG2A
product_type: PROTEIN
status: COMPLETE
tags:
- proteostasis
- pn
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  ATG2A is a large autophagy-related lipid transfer protein that acts at ER-phagophore
  contact sites during autophagosome biogenesis. It forms functional assemblies with WIPI/Atg18-family
  PI3P effectors and ATG9A-containing membranes, tethers membrane compartments, and transfers
  glycerophospholipids to support phagophore expansion. ATG2A also associates with lipid droplets and
  ER-mitochondria contact sites, but its principal characterized role is membrane supply for
  autophagosome formation.
