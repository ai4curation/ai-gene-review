      supporting_text: WIPI4 forms a complex with ATG2A/B
    - reference_id: file:projects/PROTEOSTASIS/mappings/autophagy_lysosome_pathway.yaml
      supporting_text: The GO ATG2-ATG18 complex term is the closest component-level target.
