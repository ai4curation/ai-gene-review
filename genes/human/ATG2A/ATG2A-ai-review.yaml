suggested_questions:
- question: >-
    Should human ATG2A be annotated to phosphatidylinositol-3-phosphate binding only as part of
    a WIPI/Atg18-containing complex, rather than as an independent ATG2A molecular function?
  experts:
  - GO autophagy editors
  - autophagy lipid-transfer experts
- question: >-
    Which selective autophagy cargo pathways have ATG2A-specific evidence beyond the general requirement
    for ATG2A-mediated phagophore expansion?
  experts:
  - GO autophagy editors
  - Proteostasis Consortium ALP curators
- question: >-
    Should GO:0062079 be updated to explicitly mention mammalian ATG2-WIPI complexes, since the current
    definition names the Saccharomyces cerevisiae ATG2-ATG18 composition?
  experts:
  - GO cellular-component editors
  - ComplexPortal curators
- question: >-
    Given the ANKFY1 finding that ATG2A can accept lipids from PI3P-positive endosomes, should ATG2A
    localization/process annotations extend beyond ER-phagophore contact sites to endosome-phagophore
    interfaces, or is this best captured by an ANKFY1-dependent recruitment annotation rather than a
    new ATG2A site?
  experts:
  - GO autophagy editors
  - autophagy membrane-contact-site experts
- question: >-
    Does human ATG2A (as opposed to ATG2B) have a direct, LIR/ATG8-dependent role in non-canonical
    autophagy (CASM) and lysosome repair upon lysosomal damage, distinct from its WIPI4-dependent
    canonical phagophore-expansion function?
  experts:
  - GO autophagy editors
  - lysosome biology experts
suggested_experiments:
- experiment_type: Selective-autophagy separation-of-function rescue
  description: >-
    Rescue ATG2A/ATG2B double-knockout human cells with ATG2A variants that selectively disrupt
    WIPI binding, TOM40/MAM targeting, or ATG9A association, then quantify mitophagy, pexophagy,
    ER-phagy, and glycophagy reporters alongside bulk autophagic flux.
  hypothesis: >-
    ATG2A is required for selective-autophagy reporter completion primarily through its general
    phagophore-expansion function, not through cargo-specific recognition.
- experiment_type: Endogenous ATG2-WIPI complex composition assay
  description: >-
    Use starvation time courses with endogenous tagging or proximity labeling of ATG2A, WIPI1/2/3/4,
    and ATG9A, followed by quantitative proteomics and imaging at ER-phagophore contact sites.
  hypothesis: >-
    Human ATG2A participates in condition- and stage-specific ATG2-WIPI/Atg18 complexes whose
    component composition explains the PN-projected ATG2-ATG18 complex annotation.
