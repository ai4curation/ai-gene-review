- term:
    id: GO:0062079
    label: ATG2-ATG18 complex
  evidence_type: IDA
  original_reference_id: PMID:31271352
  qualifier: part_of
  review:
    summary: The PN-projected ATG2-ATG18 complex term is a conservative, supported component annotation.
    action: NEW
    reason: >-
      The Proteostasis PN projection proposes GO:0062079 for the ATG2-WIPI complex component bucket. This
      is more precise than the existing phagophore assembly site locations and is supported by human ATG2A
      evidence showing ATG2-WIPI complexes at the ER-phagophore edge. The GO term uses the yeast Atg18 name,
      but mammalian WIPI proteins are Atg18-family PROPPINs, so this is a reasonable component-level
      propagation; it should not be expanded into cargo-specific selective-autophagy process annotations.
    additional_reference_ids:
