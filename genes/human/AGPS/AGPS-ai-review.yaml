id: O00116
gene_symbol: AGPS
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  AGPS is alkyldihydroxyacetonephosphate synthase (alkyl-DHAP synthase, also called
  alkylglycerone-phosphate synthase; EC 2.5.1.26), a FAD-dependent peroxisomal enzyme
  that catalyzes the committed, ether-bond-forming step of ether-lipid (plasmalogen)
  biosynthesis. It exchanges the acyl group of acyl-dihydroxyacetone phosphate
  (acyl-DHAP) for a long-chain fatty alcohol, producing alkyl-dihydroxyacetone
  phosphate (alkyl-DHAP) - the first intermediate carrying the characteristic O-alkyl
  ether bond - plus the released long-chain fatty acid. The enzyme is a homodimer that
  uses FAD as an obligate cofactor and belongs to the FAD-binding
  oxidoreductase/transferase type 4 family. It acts on the luminal face of the
  peroxisomal membrane together with GNPAT (glyceronephosphate O-acyltransferase, which
  produces the acyl-DHAP substrate), and is imported into the peroxisome via a
  cleavable N-terminal type-2 peroxisomal targeting signal (PTS2) presequence in a
  PEX7-dependent manner, after which the presequence is proteolytically removed to give
  the mature enzyme. Ether lipids and plasmalogens produced through this pathway are
  major membrane phospholipids, particularly abundant in myelin, heart and other
  tissues. Biallelic loss-of-function mutations in AGPS cause rhizomelic
  chondrodysplasia punctata type 3 (RCDP3), characterized by rhizomelic limb shortening,
  chondrodysplasia punctata, cataract and severe neurodevelopmental impairment.
