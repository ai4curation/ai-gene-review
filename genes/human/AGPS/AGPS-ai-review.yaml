    and identification of the point mutation underlying a single enzyme deficiency.
  findings:
  - statement: >-
      Human AGPS is a peroxisomal enzyme with a cleavable N-terminal PTS2 presequence; it
      is destabilized when peroxisomal import fails, and the RCDP3 R419H mutation abolishes
      catalytic activity, establishing AGPS as the enzyme deficient in this disorder.
    reference_section_type: ABSTRACT
    supporting_text: >-
      responsible for the inactivity of the enzyme and the phenotype
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified. Key human AGPS paper: peroxisomal/PTS2 localization, ether
      phospholipid biosynthesis role, and the R419H RCDP3 loss-of-activity mutation.
      Second ECO:0000269 source UniProt cites for EC 2.5.1.26/FUNCTION. Abstract-only in
      cache.
