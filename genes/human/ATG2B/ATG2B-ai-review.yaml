suggested_questions:
- question: >-
    Does ATG2B directly associate with lipid droplets at endogenous expression
    levels, or is the lipid-droplet phenotype secondary to altered ER/phagophore
    lipid handling?
  experts:
  - Noboru Mizushima
  - Noriyuki Noda
  - Li Yu
suggested_experiments:
- hypothesis: >-
    ATG2B-WDR45 complex formation is required for efficient ATG2B recruitment to
    PI3P-positive phagophore membranes and for autophagosome membrane expansion.
  description: >-
    Use endogenous ATG2B knockout/rescue cells expressing wild-type ATG2B or
    WDR45-binding motif mutants, then measure ATG2B-WDR45 colocalization,
    autophagic flux, and phagophore closure under starvation.
  experiment_type: genome editing, rescue, live-cell imaging, and autophagy flux assay
