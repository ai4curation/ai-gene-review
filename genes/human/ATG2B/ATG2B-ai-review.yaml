    id: GO:0000407
    label: phagophore assembly site
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: is_active_in
  review:
    summary: >-
      ATG2B is active at autophagy initiation/elongation sites. Mammalian ATG2
      proteins are required at a late step of autophagosome formation, and the
      PN-relevant mechanism is lipid transfer at the ER-phagophore interface.
    action: ACCEPT
    reason: >-
      This cellular-component annotation matches the conserved ATG2/WIPI role at
      phagophore assembly sites and is supported by mammalian cell evidence for
      ATG2-dependent autophagosome formation.
    additional_reference_ids:
    - PMID:22219374
    - PMID:31721365
    supported_by:
