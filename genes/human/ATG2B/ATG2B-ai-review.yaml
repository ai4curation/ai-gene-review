id: Q96BY7
gene_symbol: ATG2B
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  ATG2B encodes a large conserved autophagy-related lipid-transfer protein that
  acts at endoplasmic reticulum-phagophore membrane contact sites during
  autophagosome biogenesis. ATG2B binds membranes and forms an ATG2-WIPI/ATG18
  complex with WDR45/WIPI4, which promotes ATG2B recruitment to PI3P-containing
  autophagic membranes and stimulates lipid-transfer activity. Mammalian ATG2
  proteins are also associated with lipid droplets and affect lipid droplet
  morphology and dispersion, but the best-supported core role of ATG2B is
  membrane tethering and lipid transfer for phagophore expansion.
existing_annotations:
