      supporting_text: both Atg2A and Atg2B are required for autophagy and that they have redundant and overlapping functions
    - reference_id: PMID:31721365
      supporting_text: direct lipid transfer (LT) from ER to IM for IM expansion
- term:
    id: GO:0000422
    label: autophagy of mitochondrion
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: involved_in
  review:
    summary: >-
      ATG2B is part of the core macroautophagy machinery required to build
      autophagosomal membranes, so it can participate in mitophagy when the
      macroautophagy machinery is recruited to mitochondria.
    action: KEEP_AS_NON_CORE
    reason: >-
      The annotation is biologically plausible as a phylogenetic inference for a
      core autophagy factor, but it should not be interpreted as a mitochondria-
      selective recognition role for ATG2B. The core function remains
      phagophore lipid transfer.
    additional_reference_ids:
