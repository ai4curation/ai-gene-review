id: Q9Y223
gene_symbol: GNE
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  GNE is the bifunctional UDP-N-acetylglucosamine 2-epimerase / N-acetylmannosamine
  kinase, a cytosolic enzyme that catalyzes the first two committed and rate-limiting
  steps of de novo sialic acid (N-acetylneuraminic acid, Neu5Ac) biosynthesis. Its
  N-terminal epimerase domain converts UDP-N-acetyl-alpha-D-glucosamine (UDP-GlcNAc)
  and water to N-acetyl-D-mannosamine (ManNAc), UDP and a proton (a hydrolyzing
  2-epimerase, EC 3.2.1.183); its C-terminal ROK-family kinase domain then
  phosphorylates ManNAc with ATP to ManNAc-6-phosphate (EC 2.7.1.60). ManNAc-6-P feeds
  the downstream enzymes (NANS, NANP, CMAS) that produce CMP-Neu5Ac, the activated
  sialic-acid donor used by sialyltransferases, so GNE governs overall cell-surface
  sialylation. The epimerase activity is allosterically feedback-inhibited by the
  end product CMP-Neu5Ac, making GNE the rate-controlling step of the pathway. The
  active enzyme is oligomeric (dimer/tetramer/hexamer), requires a divalent cation for
  the kinase reaction, and is expressed most highly in liver and placenta. Loss-of-function
  variants cause the recessive muscle disorder GNE myopathy (Nonaka myopathy / hereditary
  inclusion body myopathy / distal myopathy with rimmed vacuoles) and recessive
  thrombocytopenia, both from muscle or platelet hyposialylation; dominant variants in the
  allosteric site abolish CMP-Neu5Ac feedback and cause sialuria, an overproduction disorder.
