description: DNAJC16 (ERdj8, "ER-resident protein ERdj8") is a large, single-pass type IV
  endoplasmic reticulum membrane protein of the DnaJ/HSP40 subfamily C. It has an N-terminal
  cleaved signal peptide, a cytoplasmically oriented N-terminal J domain and an adjacent
  thioredoxin (TRX) domain in its large cytoplasmic region, followed by a C-terminal transmembrane
  anchor. ERdj8 localizes to a meshwork-like ER subdomain together with phosphatidylinositol
  synthase and autophagy-related (Atg) proteins, and functions in autophagosome biogenesis where it
  regulates the size of forming autophagosomes, enabling engulfment of large targets; both its
  J domain and TRX domain are required for this activity. It is otherwise poorly characterized, and
  its direct molecular activity (presumed J-domain co-chaperone and/or redox function) has not been
  biochemically defined. An alternative splice isoform lacks the J and thioredoxin domains.
