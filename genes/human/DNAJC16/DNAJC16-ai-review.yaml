proposed_new_terms: []
suggested_questions:
- question: What is the direct molecular activity of ERdj8 - does its J domain recruit and stimulate
    an ER-luminal/cytosolic HSP70 (e.g. BiP/HSPA5), and is its thioredoxin domain redox-active?
- question: How does ERdj8 mechanistically couple the ER subdomain (with phosphatidylinositol
    synthase) to the control of autophagosome membrane size?
suggested_experiments:
- description: Reconstitute and assay ERdj8 J-domain-stimulated HSP70 ATPase activity and test the
    redox activity of its thioredoxin domain in vitro, using the H57Q and C171A/C174A mutants as
    controls, to define the molecular function underlying autophagosome-size regulation.
- description: Proximity labeling (BioID/APEX) from ERdj8 at the ER-phagophore subdomain to identify
    its HSP70 partner(s) and Atg/lipid-synthesis machinery it engages during autophagosome formation.
