id: Q96K17
gene_symbol: BTF3L4
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  BTF3L4 is a 158-residue NAC-beta-family protein with a conserved NAC-A/B
  domain. It reproducibly associates with NACA in targeted affinity purification
  and independent proteome-scale AP-MS, co-fractionation, and XL-MS datasets,
  consistent with an alternative beta-chain partner in the nascent
  polypeptide-associated complex. Unlike canonical BTF3, direct BTF3L4-specific
  ribosome binding, nascent-chain targeting, prevention of endoplasmic-reticulum
  mistargeting, and DNA-binding or transcription-factor activity have not been
  demonstrated. Mouse mesenchymal-stem-cell studies place Btf3l4 in BMP-2-induced
  chondrogenic differentiation, while human glioma and gastric-cancer models and
  mouse acetaminophen-hepatotoxicity models reveal context-dependent proliferation,
  invasion, apoptosis, oxidative-stress, and inflammatory phenotypes.
alternative_products:
- name: '1'
  id: Q96K17-1
  description: >-
    Canonical 158-residue isoform containing the complete annotated NAC-A/B domain
    and the disordered acidic carboxyl terminus.
- name: '2'
  id: Q96K17-2
  sequence_note: VSP_044248; residues 1-58 are absent
  description: >-
    Amino-terminally truncated isoform that lacks residues 1-58, including the
    amino-terminal portion of the annotated NAC-A/B domain. Its ability to bind
    NACA has not been tested.
- name: '3'
  id: Q96K17-3
  sequence_note: VSP_045972, VSP_045973; residues 57-78 are replaced and residues 79-158 are absent
  description: >-
    Strongly truncated isoform that disrupts the NAC-A/B domain and removes the
    disordered acidic carboxyl terminus. Its function and NACA association have
    not been tested.
