core_functions:
- description: >-
    BTF3L4 acts as an alternative NAC-beta-family partner of NACA in a human nascent
    polypeptide-associated complex. Targeted NACA affinity purification and
    independent AP-MS, co-fractionation, and XL-MS datasets reproduce the
    association. Complex membership is well supported, but whether a
    BTF3L4-containing NAC directly binds ribosomes or controls cotranslational
    folding or endoplasmic-reticulum targeting like canonical BTF3 remains unresolved.
  in_complex:
    id: GO:0005854
    label: nascent polypeptide-associated complex
  supported_by:
  - reference_id: PMID:30948508
    supporting_text: >-
      NACA dephosphorylation was associated with specific recruitment of novel NACA
      interactants, such as basic transcription factor 3 (BTF3) and its homolog BTF3L4.
  - reference_id: file:human/BTF3L4/BTF3L4-deep-research-manual.md
    supporting_text: >-
      BTF3L4 is an alternative beta-chain partner of NACA in a human nascent
      polypeptide-associated complex.
proposed_new_terms: []
suggested_questions:
- question: >-
    Does endogenous BTF3L4 substitute for BTF3 as the NACA beta-chain partner on
    translating ribosomes, or does it form a regulated non-ribosomal NACA complex?
- question: >-
    Which BTF3L4 isoforms bind NACA, given that isoforms 2 and 3 remove or disrupt
    substantial portions of the NAC-A/B domain?
- question: >-
    Do the chondrogenesis, cancer-cell, and acetaminophen-injury phenotypes arise
    from altered cotranslational proteostasis or from a separate NACA-dependent
    nuclear or signaling mechanism?
suggested_experiments:
- hypothesis: BTF3L4 forms an endogenous, isoform-dependent complex with NACA that can associate with translating ribosomes.
  description: >-
    Perform reciprocal endogenous NACA-BTF3L4 co-immunoprecipitation and targeted
    XL-MS, followed by sucrose-gradient polysome profiling. Quantify BTF3 in the
    same fractions and rescue BTF3L4-null cells with each of the three isoforms to
    test whether the intact NAC-A/B domain is required for NACA and ribosome association.
- hypothesis: BTF3 and BTF3L4 have partially redundant but distinguishable cotranslational targeting functions.
  description: >-
    Compare BTF3 and BTF3L4 single and combined acute-depletion cells using
    ribosome-proximal proteomics, nascent-chain folding reporters, and an
    endoplasmic-reticulum mistargeting reporter. Rescue with wild-type and
    NACA-binding-defective BTF3L4 variants to separate complex assembly from function.
- hypothesis: The contextual developmental and disease phenotypes depend on the same NACA-associated mechanism.
  description: >-
    In chondrogenic differentiation and glioma-cell models, combine BTF3L4
    perturbation with quantitative translation profiling and NACA-interaction
    mutants, then contrast these results with chromatin occupancy and transcriptome
    measurements to distinguish cotranslational from nuclear regulatory mechanisms.
