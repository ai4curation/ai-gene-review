  label: Homo sapiens
description: COA5 (C2orf64; also called PET191) is a small (74-residue) nuclear-encoded
  mitochondrial assembly factor for cytochrome c oxidase (respiratory chain complex
  IV). It belongs to the PET191 family and is a twin CX9C-motif protein with a CHCH
  domain, features typical of intermembrane-space proteins imported and oxidatively
  folded via the MIA pathway. COA5 acts at an early step of complex IV assembly and
  participates in the copper/heme metallochaperone machinery that matures the MT-CO1
  (CuB) and MT-CO2 (CuA) catalytic metal centers, and it can transiently bind copper.
  It is a non-catalytic factor rather than an enzyme. COA5 localizes to the mitochondrial
  intermembrane space, closely associated with the inner membrane where the metallochaperone
  reactions of complex IV biogenesis take place. Loss-of-function variants cause mitochondrial
  complex IV deficiency, nuclear type 9 (MC4DN9), a fatal infantile disorder with hypertrophic
  cardiomyopathy (fatal infantile cardioencephalomyopathy phenotype).
