gene_symbol: AMPD1
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  AMPD1 is the skeletal-muscle ("M") isoform of AMP deaminase, a cytosolic
  zinc metalloenzyme that catalyses the hydrolytic deamination of AMP to IMP
  and ammonia (AMP + H2O -> IMP + NH4+; EC 3.5.4.6). It is a homotetramer of
  the metallo-dependent hydrolase superfamily (adenosine and AMP deaminase
  family). In skeletal muscle AMPD1 performs the committed step of the purine
  nucleotide cycle (AMP -> IMP by AMP deaminase; IMP -> adenylosuccinate by
  adenylosuccinate synthase; adenylosuccinate -> AMP + fumarate by
  adenylosuccinate lyase). By deaminating AMP, the enzyme pulls the adenylate
  kinase equilibrium toward ATP regeneration and thereby buffers the cellular
  energy charge during intense exercise, while the cycle also releases
  fumarate for TCA-cycle anaplerosis and ammonia. It is the most highly
  expressed AMP deaminase isoform in skeletal muscle (also expressed in
  tongue). Loss-of-function of AMPD1 causes myoadenylate deaminase deficiency
  (AMP deaminase deficiency; MMDD, MIM:615511), one of the most common
  inherited metabolic muscle defects, which is frequently benign or
  asymptomatic but can present with exercise-induced myalgia, cramps and
  early fatigue.
