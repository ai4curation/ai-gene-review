      The MMDD missense variants R388W and R425H produced comparable amounts of
      AMPD1 protein on recombinant expression but had undetectable AMP deaminase
      activity, establishing AMPD1's core catalytic function and its role in
      muscle metabolism.
    supporting_text: "undetectable AMPD activity in the"
