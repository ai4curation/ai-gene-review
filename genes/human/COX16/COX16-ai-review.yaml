id: Q9P0S2
gene_symbol: COX16
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  COX16 (cytochrome c oxidase assembly protein COX16 homolog, mitochondrial)
  is a small (106 aa) single-pass mitochondrial inner-membrane protein that acts as
  a non-catalytic assembly factor for respiratory chain complex IV (cytochrome c oxidase,
  COX). It is anchored in the inner membrane with its N-terminus in the matrix and
  its C-terminus in the intermembrane space. COX16 is required for cytochrome c oxidase
  biogenesis and is implicated in maturation of the mitochondrially encoded core subunit
  MT-CO2 (COX2), specifically in formation of its CuA copper center, interacting with
  newly synthesized MT-CO2 and with the copper-delivery metallochaperones SCO1, SCO2
  and COA6, and being required for recruitment of SCO1 (but not SCO2) to the COX2 module.
  COX16 also escorts the COX2 assembly module onto the COX1-containing MITRAC intermediate,
  thereby helping merge the COX1 and COX2 assembly lines, but does not act on assembled
  respiratory supercomplexes. It lacks a canonical copper-binding motif and has no
  known catalytic activity. Loss-of-function variants cause autosomal-recessive mitochondrial
  complex IV deficiency (nuclear type 22; MC4DN22), presenting with hypertrophic cardiomyopathy,
  encephalopathy, fatal lactic acidosis and liver dysfunction.
