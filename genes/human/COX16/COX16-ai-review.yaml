core_functions:
- description: >-
    Non-catalytic mitochondrial inner-membrane assembly factor required
    for biogenesis of respiratory chain complex IV (cytochrome c oxidase); acts in
    MT-CO2 maturation / CuA copper-center formation together with the SCO1/SCO2/COA6
    copper-delivery machinery and escorts the COX2 module onto the COX1-containing
    MITRAC intermediate.
