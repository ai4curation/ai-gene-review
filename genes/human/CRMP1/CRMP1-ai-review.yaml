- id: file:human/CRMP1/CRMP1-hypotheses/function-hypothesis-go-0016812/openscientist.md
  title: OpenScientist hypothesis investigation - CRMP1 cyclic-amide hydrolase activity
  publication_type: DEEP_RESEARCH
  findings:
  - statement: OpenScientist judged the CRMP1 GO:0016812 IBA annotation to be an
      over-annotation and recommended removing it.
    supporting_text: No experimental evidence — direct assay, mutant phenotype, or
      otherwise — has ever demonstrated hydrolase activity for any CRMP family member.
  - statement: The report found no experimental hydrolase evidence for CRMP family
      members and traced the annotation to computational propagation from true
      dihydropyrimidinases.
    supporting_text: A systematic search of GO annotations for all five human CRMP
      paralogs (CRMP1-5/DPYSL1-5) found zero experimental evidence codes (IDA,
      IMP, IGI, IEP) supporting hydrolase activity for any CRMP family member.
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: OpenScientist autonomous-compute report directly evaluates the contested
      IBA GO:0016812 hydrolase activity assignment. The report snippets cited here
      were checked as verbatim support, and this curation use is anchored to the
      existing UniProt active-site caution and NOT dihydropyrimidinase annotation
      rather than relying only on the report's self-cited literature summary.
