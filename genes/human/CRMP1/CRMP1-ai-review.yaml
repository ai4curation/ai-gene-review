- term:
    id: GO:0016812
    label: hydrolase activity, acting on carbon-nitrogen (but not peptide) bonds, in cyclic amides
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: enables
  review:
    summary: Positive 'hydrolase activity, acting on carbon-nitrogen (but not peptide) bonds, in cyclic
      amides' propagated from the metallo-hydrolase fold signature (IBA). CRMP1 lacks the catalytic metal
      site, and the curated dihydropyrimidinase activity is itself NOT-ed.
    action: REMOVE
    reason: 'Domain/phylogenetic over-propagation refutable on biological grounds: the metal-cofactor-binding
      residues are absent (UniProt CAUTION), so no metallo-hydrolase activity is supported; the real function
      is a non-catalytic cytoskeletal regulator. OpenScientist independently confirmed this as
      a PAINT/IBA over-annotation from true dihydropyrimidinases onto a CRMP pseudoenzyme.'
    propagation_review:
      root_cause: PROPAGATION_BAD
      failure_modes:
      - PSEUDO_OR_SUBACTIVITY_LOSS
      - FUNCTIONAL_DIVERGENCE
      source_entities:
      - source_id: GO_REF:0000033
        source_label: PAINT phylogenetic IBA inference
        source_status: SUPPORTS_SOURCE_BUT_NOT_TARGET
        comment: PANTHER/PAINT correctly recognizes the dihydropyrimidinase-related
          fold, but propagates hydrolase activity from true enzymes onto a CRMP
          pseudoenzyme lacking the metal-binding/catalytic site.
      - source_id: UniProtKB:Q14117
        source_label: human DPYS
        source_status: SUPPORTS_SOURCE_BUT_NOT_TARGET
        comment: DPYS supports true dihydropyrimidinase hydrolase activity; CRMP1
          is a catalytically inactive CRMP/DPYSL paralog.
    supported_by:
