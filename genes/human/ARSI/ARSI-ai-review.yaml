suggested_questions:
- question: >-
    Which native human chondroitin- or dermatan-sulfate proteoglycans are the
    principal ARSI substrates, and is cleavage restricted to nonreducing terminal GalNAc4S?
  experts:
  - glycosaminoglycan and lysosomal-enzyme biochemists
  - cartilage extracellular-matrix biologists
- question: >-
    Is endogenous ARSI predominantly lysosomal in human chondrocytes and retinal
    pigment epithelium, or is a regulated extracellular pool physiologically important?
  experts:
  - lysosomal trafficking specialists
  - retinal pigment epithelium and cartilage cell biologists
- question: >-
    Does ARSI deficiency cause a reproducible human skeletal or corticospinal
    phenotype, and is the proposed SPG66 relationship valid?
  experts:
  - rare-disease clinical geneticists
  - hereditary spastic paraplegia researchers
- question: >-
    Is the N-terminally truncated isoform Q5FYB1-2 translated, and can it have a
    noncatalytic role despite lacking the signal peptide and catalytic Cys93?
  experts:
  - proteogenomics and sulfatase specialists
suggested_experiments:
- description: >-
    Edit ARSI in primary human chondrocytes and rescue at endogenous abundance
    with wild-type, C93S, trafficking-defective, and isoform-2 constructs; quantify
    lysosomal localization, GalNAc4S-containing oligosaccharides, lysosome size,
    and chondrocyte-maturation markers during a differentiation time course.
  experiment_type: CRISPR knockout and separation-of-function rescue
  hypothesis: >-
    Lysosomal GalNAc4S hydrolysis by catalytically active full-length ARSI is
    required to restrain chondrocyte maturation, whereas isoform 2 cannot rescue.
- description: >-
    Incubate purified SUMF1-activated human ARSI with structurally defined
    chondroitin- and dermatan-sulfate oligosaccharides and intact candidate
    cartilage proteoglycans, then map products by LC-MS and exoglycosidase sequencing.
  experiment_type: substrate-specificity and product-mapping biochemistry
  hypothesis: >-
    ARSI preferentially removes nonreducing-terminal GalNAc4S from a restricted
    subset of native CS/DS sequence contexts rather than acting as a broad endosulfatase.
- description: >-
    Tag endogenous ARSI in human chondrocytes and ARPE-19 cells, combine pulse-chase
    imaging with lysosomal immunoisolation and secretion assays, and perturb
    mannose-6-phosphate trafficking and lysosomal exocytosis.
  experiment_type: endogenous trafficking and compartment-specific activity analysis
  hypothesis: >-
    Most mature ARSI is delivered to lysosomes, while extracellular recovery
    reflects a regulated minor pool or lysosomal exocytosis rather than its primary site.
- description: >-
    Perform replicated genetic burden and segregation analyses in unsolved HSP
    and skeletal-dysplasia cohorts, followed by biochemical testing of rare ARSI
    variants for maturation, lysosomal delivery, and GalNAc4S activity.
  experiment_type: human genetics with functional variant validation
  hypothesis: >-
    Truly pathogenic ARSI alleles will segregate recessively and reduce lysosomal
    GalNAc4S sulfatase activity, distinguishing causal variants from incidental candidates.
knowledge_gaps:
- gap_statement: >-
    The principal native proteoglycan substrates and exact chain-position
    specificity of human ARSI are unknown.
  boundary: >-
    Purified human ARSI directly desulfates GalNAc4S but not GalNAc6S, and cellular
    gain/loss experiments alter chondroitin-4-sulfation.
  gap_kind:
  - BIOLOGY
  dark_aspect: RESIDUAL_SUBGAP
  status: NARROWING
  significance: >-
    Native substrate identity is required to connect the defined enzyme chemistry
    to lysosome homeostasis and cartilage maturation.
  resolution: >-
    Product-resolved assays on native proteoglycans, followed by substrate
    accumulation profiling in ARSI-null human cells, would close the gap.
  provenance:
  - reference_id: file:human/ARSI/ARSI-deep-research-manual.md
    supporting_text: >-
      The physiological human proteoglycan substrates and the significance of a possible extracellular pool remain unresolved.
- gap_statement: >-
    The relative physiological importance of lysosomal and extracellular ARSI pools is unresolved.
  boundary: >-
    Tagged human ARSI colocalizes with lysosomal markers in the newer study,
    whereas an older transient-overexpression study detected ARSI in ER and medium.
  gap_kind:
  - BIOLOGY
  dark_aspect: CC_DARK
  status: NARROWING
  significance: >-
    Compartment determines whether ARSI remodels material within lysosomes,
    extracellular matrix, or both.
  resolution: >-
    Endogenous tagging, compartment-specific activity assays, and trafficking
    perturbations in primary human cells would distinguish the functional pools.
  provenance:
  - reference_id: file:human/ARSI/ARSI-deep-research-manual.md
    supporting_text: >-
      Lysosome is thus the core functional location, while ER lumen is a biosynthetic/formylglycine-maturation location and extracellular region remains non-core overexpression evidence.
- gap_statement: >-
    The human developmental and disease consequences of ARSI loss remain uncertain.
  boundary: >-
    Cross-species cartilage models support inhibition of chondrocyte maturation,
    while ARSI was only one candidate emerging from an HSP exome study.
  gap_kind:
  - BIOLOGY
  dark_aspect: BP_DARK
  status: OPEN
  significance: >-
    Resolving this gap would determine whether ARSI is a skeletal-development
    enzyme, an HSP gene, both, or neither in humans.
  resolution: >-
    Replicated human genetics, patient-cell glycomics, and in vivo allelic models
    with skeletal and corticospinal phenotyping are needed.
  provenance:
  - reference_id: PMID:24482476
    supporting_text: >-
      identified 18 previously unknown putative HSP genes
    reference_section_type: ABSTRACT
