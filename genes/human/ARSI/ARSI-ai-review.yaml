- id: PMID:16174644
  title: 'Sulfatases and sulfatase modifying factors: an exclusive and promiscuous relationship.'
  findings:
  - statement: The human sulfatase catalog includes ARSI among four newly identified members.
    supporting_text: >-
      First, we determined the complete catalog of human sulfatases, which comprises
      17 members (versus 14 in rodents) including four novel ones (ARSH, ARSI, ARSJ and ARSK).
    reference_section_type: ABSTRACT
  - statement: Class I sulfatase activity requires conversion of the active-site cysteine to formylglycine.
    supporting_text: >-
      This unique modification mechanism, which is required for catalytic activity,
      has been highly conserved during evolution.
    reference_section_type: ABSTRACT
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: >-
      PubMed identity and abstract were checked. This is the foundational family
      survey and supports ARSI's conserved catalytic architecture, but it does not
      establish the natural substrate.
