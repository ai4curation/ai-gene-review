id: Q5FYB1
gene_symbol: ARSI
product_type: PROTEIN
aliases:
- ASI
- SPG66
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  ARSI is a SUMF1-activated class I sulfatase that is synthesized through the
  secretory pathway and functions principally in lysosomes. Purified human ARSI
  selectively removes the 4-sulfate from terminal N-acetylgalactosamine-4-sulfate
  in chondroitin/dermatan sulfate chains at acidic pH, identifying it as a
  lysosomal chondroitin sulfatase rather than an enzyme defined only by activity
  on artificial aryl substrates. Human-cell imaging places tagged ARSI in
  lysosomal and endosomal compartments, while older overexpression experiments
  also detected ER retention and secretion. Across chick, mouse, and rat
  cartilage models, ARSI abundance rises during chondrocyte maturation and Arsi
  loss accelerates expression of maturation markers, consistent with a role in
  proteoglycan remodeling that restrains chondrocyte differentiation. The
  physiological human proteoglycan substrates and the significance of a possible
  extracellular pool remain unresolved. ARSI has also been proposed as a
  hereditary spastic paraplegia candidate, but the gene-disease relationship is
  supported only by preliminary evidence.
alternative_products:
- name: '1'
  id: Q5FYB1-1
  description: >-
    Canonical 569-residue precursor containing the signal peptide, catalytic
    Cys93/formylglycine site, and complete sulfatase domain.
- name: '2'
  id: Q5FYB1-2
  sequence_note: Missing residues 1-143 (VSP_036022)
  description: >-
    N-terminally truncated isoform lacking the signal peptide, catalytic Cys93,
    and part of the sulfatase core. Its expression, localization, and activity
    have not been experimentally established.
