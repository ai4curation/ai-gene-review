      cloning and a negative artificial-activity result to this paper, but the
      cached abstract does not expose gene-specific assay details.
- id: PMID:19262745
  title: Characterization of the arylsulfatase I (ARSI) gene preferentially expressed in the human retinal pigment epithelium cell line ARPE-19.
  findings:
  - statement: Tagged human ARSI was observed in the ER, cellular fraction, and medium.
    supporting_text: >-
      Transiently produced ARSI-FLAG was localized to the endoplasmic reticulum
      and was detected in the cellular fraction and the medium.
    reference_section_type: ABSTRACT
  - statement: SUMF1 coexpression enabled neutral-pH activity against an artificial arylsulfate substrate.
    supporting_text: >-
      When ARSI-FLAG and SUMF1-FLAG were coexpressed, the conditioned medium of
      the transfected cells showed arylsulfatase activity at a range of neutral pH.
    reference_section_type: ABSTRACT
  - statement: Cys93 is the SUMF1-dependent catalytic nucleophile.
    supporting_text: >-
      This result confirms that the active site of ARSI is Cys93 and that it is
      activated by SUMF1 as well as other ARSs.
    reference_section_type: DISCUSSION
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      PubMed/PMC identity and full text were checked. The paper directly supports
      artificial-substrate activity and ER/secretion observations, but all protein
      localization and activity experiments used transiently overexpressed tagged ARSI.
