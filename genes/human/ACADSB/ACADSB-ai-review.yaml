gene_symbol: ACADSB
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  ACADSB encodes the mitochondrial short/branched-chain specific acyl-CoA dehydrogenase
  (SBCAD; also called 2-methylbutyryl-CoA dehydrogenase or 2-methyl branched-chain
  acyl-CoA dehydrogenase), an FAD-dependent flavoenzyme of the acyl-CoA dehydrogenase
  family. It is synthesized as a precursor with an N-terminal mitochondrial targeting
  peptide that is cleaved on import, and the mature enzyme assembles into a homotetramer
  in the mitochondrial matrix. SBCAD catalyzes the FAD-dependent, stereospecific
  alpha,beta-dehydrogenation of short and branched-chain acyl-CoA thioesters, passing
  electrons to the electron-transfer flavoprotein (ETF). Its principal physiological role
  is in L-isoleucine catabolism, where it dehydrogenates (S)-2-methylbutyryl-CoA to
  tiglyl-CoA. The enzyme is catalytically promiscuous within its class, also acting on
  short straight-chain acyl-CoAs (butyryl-CoA, hexanoyl-CoA) and on the xenobiotic
  valproyl-CoA. It is expressed ubiquitously, with highest levels in heart, muscle and
  liver. Loss-of-function variants cause short/branched-chain acyl-CoA dehydrogenase
  deficiency (2-methylbutyryl-CoA dehydrogenase deficiency), an autosomal recessive
  inborn error of isoleucine metabolism characterized by elevated 2-methylbutyrylglycine
  and 2-methylbutyrylcarnitine (C5-acylcarnitine on newborn screening).
