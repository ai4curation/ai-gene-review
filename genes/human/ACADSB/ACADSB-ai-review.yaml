    stereospecific alpha,beta-dehydrogenation of (S)-2-methylbutyryl-CoA to tiglyl-CoA,
    the committed dehydrogenation step of L-isoleucine catabolism, transferring electrons
    to the electron-transfer flavoprotein (ETF).
