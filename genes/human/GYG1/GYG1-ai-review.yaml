id: P46976
gene_symbol: GYG1
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: Glycogenin-1 is the self-glucosylating protein primer that initiates glycogen
  biosynthesis. Using UDP-alpha-D-glucose as donor and a divalent metal cofactor (Mn2+
  is most effective), it autoglucosylates a specific internal tyrosine (Tyr195), forming
  a covalent glucose-1-O-tyrosyl linkage and building a short alpha-1,4-glucan chain of
  roughly 8-12 glucose residues. This maltosaccharide primer serves as the substrate onto
  which glycogen synthase (GYS1 in muscle and most tissues, GYS2 in liver) elongates the
  glycogen molecule, with glycogen branching enzyme introducing alpha-1,6 branches;
  glycogenin remains covalently attached at the core of the mature glycogen granule. It
  is a glycosyltransferase family 8 (GT8) enzyme (EC 2.4.1.186), acts in the cytosol at
  glycogen granules, and forms a heterooctameric complex with glycogen synthase (a GYS1
  tetramer with two GYG1 dimers). Loss-of-function variants cause glycogen storage disease
  type XV / polyglucosan body myopathy 2, characterized by glycogen depletion and
  accumulation of poorly branched polyglucosan bodies in skeletal and/or cardiac muscle.
