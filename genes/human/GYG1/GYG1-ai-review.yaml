core_functions:
- description: Self-glucosylating primer that initiates glycogen biosynthesis, transferring
    glucose from UDP-alpha-D-glucose onto its own Tyr195 (Mn2+-dependent) to build a short
    alpha-1,4-glucan primer for glycogen synthase.
  molecular_function:
    id: GO:0008466
    label: glycogenin glucosyltransferase activity
  directly_involved_in:
  - id: GO:0005978
    label: glycogen biosynthetic process
  locations:
  - id: GO:0005829
    label: cytosol
  supported_by:
  - reference_id: PMID:22160680
    supporting_text: |-
      Glycogenin initiates the synthesis of a maltosaccharide chain covalently
      attached to itself on Tyr195 via a stepwise glucosylation reaction, priming
      glycogen synthesis.
  - reference_id: PMID:30356213
    supporting_text: |-
      GYG acts as a 'seed core' for
      the formation of the glycogen particle by catalysing its own stepwise
      autoglucosylation to form a covalently bound gluco-oligosaccharide chain at
      initiation site Tyr 195.
- description: Requires a divalent metal cofactor for catalysis; binds manganese ion, which
    is coordinated in the active site and is the most effective cofactor for
    self-glucosylation.
  molecular_function:
    id: GO:0030145
    label: manganese ion binding
  directly_involved_in:
  - id: GO:0005978
    label: glycogen biosynthetic process
  locations:
  - id: GO:0005829
    label: cytosol
  supported_by:
  - reference_id: file:human/GYG1/GYG1-uniprot.txt
    supporting_text: Required for self-glucosylation. Manganese is
- description: Forms homodimers and assembles with glycogen synthase into the glycogen
    synthase-glycogenin biosynthetic complex, presenting the glucan primer to glycogen
    synthase for elongation.
  molecular_function:
    id: GO:0042803
    label: protein homodimerization activity
  directly_involved_in:
  - id: GO:0005978
    label: glycogen biosynthetic process
  locations:
  - id: GO:0005829
    label: cytosol
  in_complex:
    id: GO:1902494
    label: catalytic complex
  supported_by:
  - reference_id: PMID:35835870
    supporting_text: Cryo-EM map and model of the tetrameric GYS1–GYG1ΔCD complex at 3.0
      Å resolution.
  - reference_id: PMID:17055998
    supporting_text: The interaction with glycogenin was found to be mediated by the
      region of glycogenin which contains the 33 COOH-terminal amino acid residues.
proposed_new_terms: []
suggested_questions:
- question: What determines the final length (~8-12 residues) of the self-glucosylated
    primer before handoff to glycogen synthase, and how is the transition between glycogenin
    priming and glycogen synthase elongation regulated?
- question: Does GYG1 have any physiologically relevant function outside the cytosolic
    glycogen granule (e.g. the reported nuclear localization by similarity)?
suggested_experiments:
- description: Quantitative reconstitution of primer chain-length distribution and
    GYG1-to-GYS1 handoff kinetics using the homogeneously glucosylated GYG1 intermediates.
- description: Structural and functional characterization of additional disease variants
    (beyond Thr83Met, Ala16Pro, Asp102His) to map genotype-phenotype relationships for
    GSD XV versus PGBM2.
