id: P12271
gene_symbol: RLBP1
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  RLBP1 encodes cellular retinaldehyde-binding protein (CRALBP), a 317-residue
  soluble retinoid-binding protein of the CRAL-TRIO (Sec14-like) family with no
  catalytic activity. It carries the hydrophobic 11-cis retinoids 11-cis-retinol
  and 11-cis-retinaldehyde (and also all-trans-retinol) within its CRAL-TRIO
  ligand pocket. CRALBP is expressed abundantly in the retinal pigment epithelium
  (RPE) and in Mueller glial cells of the neuroretina, but not in photoreceptors,
  where it acts as a substrate carrier and chaperone in the visual (retinoid)
  cycle: it sequesters and protects the labile 11-cis retinoids generated during
  chromophore regeneration, presents 11-cis-retinol to 11-cis-retinol
  dehydrogenases for oxidation to 11-cis-retinal, and enhances flux through the
  cycle that regenerates the visual chromophore for rod and cone opsins. The
  protein is cytosolic. Loss-of-function mutations that abolish 11-cis-retinoid
  binding cause autosomal-recessive retinal dystrophies including retinitis
  punctata albescens, Bothnia retinal dystrophy, Newfoundland rod-cone dystrophy
  and retinitis pigmentosa, typically presenting with night blindness and delayed
  dark adaptation.
existing_annotations:
- term:
    id: GO:1902936
    label: phosphatidylinositol bisphosphate binding
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: enables
  review:
    summary: >-
      Phylogenetically inferred (IBA) from the PANTHER CRAL-TRIO/Sec14-like family
      (PTN000019344), some members of which bind phosphoinositides. RLBP1's
      documented physiological ligands are retinoids (11-cis-retinal, 11-cis-retinol,
      all-trans-retinol), and its CRAL-TRIO pocket is a retinoid-binding pocket;
      no experimental evidence supports phosphatidylinositol bisphosphate binding
      by CRALBP. This is over-propagation of a family-level lipid-binding capacity
      to RLBP1. Not removed (family-based inference, not clearly-wrong IEA) but
      marked as an over-annotation and not a core function.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      Family-level (IBA) lipid-binding inference not supported for RLBP1. The
      PANTHER family (PTHR10174 / PTN000019344) groups CRAL-TRIO/Sec14-like proteins
      with heterogeneous lipid-ligand specificities; a phosphoinositide-binding
      capacity of some members was propagated to the retinoid-specific subfamily
      member RLBP1, whose characterized ligands are 11-cis and all-trans retinoids,
      not PIP2.
    propagation_review:
      root_cause: PROPAGATION_BAD
      failure_modes:
      - FUNCTIONAL_DIVERGENCE
    supported_by:
    - reference_id: file:human/RLBP1/RLBP1-uniprot.txt
      supporting_text: "Soluble retinoid carrier essential the proper function of"
