core_functions:
- description: >-
    Binds and carries 11-cis-retinaldehyde within its CRAL-TRIO pocket, acting as
    a soluble retinoid carrier/chaperone in the visual (retinoid) cycle of the RPE
    and Mueller glia, thereby supporting regeneration of the visual chromophore.
    This is a non-catalytic ligand-binding/transport role, expressed as the
    11-cis retinal-binding molecular function directly involved in retinoid
    (vitamin A) metabolism and visual perception.
