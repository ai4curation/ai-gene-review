core_functions:
  - description: >-
      BRINP2 is a secreted MACPF-domain glycoprotein that functions as a negative regulator
      of the cell cycle in neural progenitors, restraining G1-to-S transition and promoting
      cell-cycle exit. This is the best-supported function of BRINP2, demonstrated by
      overexpression studies showing dramatic reduction in S-phase fraction in neural stem
      cells (PMID:20025061). The mechanism by which an extracellular/secreted protein
      mediates intracellular cell-cycle arrest remains unknown, and no receptor or signaling
      pathway has been identified. BRINP2 is associated with neuronal differentiation
      programs, being induced during neuronal (but not astrocytic) differentiation, and
      Brinp2-knockout mice show neurodevelopmental behavioral phenotypes including
      hyperactivity (PMID:27826231).
    molecular_function:
      id: GO:0003674
      label: molecular_function
    directly_involved_in:
      - id: GO:0045930
        label: negative regulation of mitotic cell cycle
      - id: GO:0021953
        label: central nervous system neuron differentiation
    locations:
      - id: GO:0005576
        label: extracellular region
    supported_by:
      - reference_id: PMID:20025061
        supporting_text: >-
          over-expression of any one of the three BRINP genes completely abolished cells
          in the G2 phase and significantly reduced the cells in S phase to 11.8-13.8%
      - reference_id: file:human/BRINP2/BRINP2-uniprot.txt
        supporting_text: >-
          FUNCTION: Inhibits neuronal cell proliferation by negative regulation of
          the cell cycle transition
