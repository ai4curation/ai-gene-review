existing_annotations:
  # === IBA annotations (phylogenetic) ===
  - term:
      id: GO:0021953
      label: central nervous system neuron differentiation
    evidence_type: IBA
    original_reference_id: GO_REF:0000033
    review:
      summary: >-
        BRINP2 is a neuronal MACPF-family protein whose expression is enriched in CNS neurons
        during development and in adult brain. BRINP2 mRNA is induced during neuronal
        differentiation of ES-derived neural stem cells and suppressed during astrocytic
        differentiation (PMID:20025061). Brinp2-knockout mice show behavioral phenotypes
        consistent with neurodevelopmental disorders (PMID:27826231). The IBA annotation is
        propagated from mouse orthologs and is phylogenetically sound.
      action: ACCEPT
      reason: >-
        BRINP2 expression is strongly associated with CNS neuron differentiation programs.
        It is induced with neuronal differentiation and lost with astrocytic differentiation
        (PMID:20025061), and knockout mice show neurodevelopmental behavioral phenotypes
        (PMID:27826231). The IBA inference from mouse orthologs is well supported.
      supported_by:
        - reference_id: PMID:20025061
          supporting_text: >-
            Upon differentiation into neuronal cells in the presence of retinoic acid and
            BDNF, all three types of BRINP-mRNA were induced with a similar time course
            peaking at day three of treatment
        - reference_id: PMID:27826231
          supporting_text: >-
            Brinp2 and Brinp3 are expressed in differentiated neurons of the neocortex,
            amygdala, hippocampus, and cerebellum during mammalian brain development,
            peaking at postnatal day 14

  - term:
      id: GO:0045930
      label: negative regulation of mitotic cell cycle
    evidence_type: IBA
    original_reference_id: GO_REF:0000033
    review:
      summary: >-
        The best-supported functional evidence for BRINP2 is cell-cycle restraint.
        Overexpression of BRINP family members including BRINP2 in ES-cell-derived neural
        stem cells completely abolished cells in the G2 phase and significantly reduced
        S-phase cells (PMID:20025061). UniProt annotates BRINP2 function as inhibiting
        neuronal cell proliferation by negative regulation of cell cycle transition
        (ECO:0000250, by similarity). The IBA annotation is strongly supported.
      action: ACCEPT
      reason: >-
        Cell-cycle restraint is the most directly demonstrated function of BRINP2.
        Overexpression data from PMID:20025061 directly shows suppression of G1-to-S
        transition and loss of G2 cells in neural stem cells. This is also consistent
        with UniProt keyword annotations (Cell cycle, Growth arrest).
      supported_by:
        - reference_id: PMID:20025061
          supporting_text: >-
            over-expression of any one of the three BRINP genes completely abolished cells
            in the G2 phase and significantly reduced the cells in S phase to 11.8-13.8%

  - term:
      id: GO:0005737
      label: cytoplasm
    evidence_type: IBA
    original_reference_id: GO_REF:0000033
    review:
      summary: >-
        The cytoplasm annotation is uncertain for BRINP2. The protein has a signal peptide
        and is predicted secreted (UniProt: Secreted). Overexpression studies with C-terminal
        EGFP-tagged constructs showed cytoplasmic localization in PC12 cells but nuclear/ER
        localization in NIH3T3 cells. Endogenous localization has not been established. The
        IBA inference is from BRINP3 (UniProtKB:O60477) which is also predicted secreted.
      action: UNDECIDED
      reason: >-
        The evidence for cytoplasmic localization is from overexpression of tagged constructs
        in one cell line (PC12) while a different cell line (NIH3T3) showed nuclear/ER
        localization. UniProt annotates BRINP2 as Secreted. The conflicting localization
        data and lack of endogenous protein studies make this annotation uncertain. The IBA
        source (BRINP3) is similarly predicted secreted, making the phylogenetic basis weak.
      supported_by:
        - reference_id: file:human/BRINP2/BRINP2-deep-research-falcon.md
          supporting_text: >-
            endogenous BRINP2 protein localization has not been established; reported
            localization patterns for BRINP2 are based on C-terminal EGFP-tagged
            overexpression constructs, with cytoplasmic localization in PC12 cells but
            intra-nuclear/ER localization in NIH3T3 cells

  - term:
      id: GO:0030425
      label: dendrite
    evidence_type: IBA
    original_reference_id: GO_REF:0000033
    review:
      summary: >-
        The dendrite annotation is propagated from rat orthologs (RGD:708419, RGD:708421,
        corresponding to Brinp1 and Brinp3). BRINP2 is expressed in neurons that have
        dendrites (cortical layers, hippocampus, Purkinje cells) but there is no direct
        evidence that BRINP2 protein localizes to dendrites. Given that BRINP2 is predicted
        secreted, the protein may transit through dendritic compartments but this is
        speculative.
      action: KEEP_AS_NON_CORE
      reason: >-
        The IBA propagation from rat orthologs is phylogenetically reasonable, and BRINP2
        is expressed in neurons with prominent dendritic arbors. However, for a predicted
        secreted protein, dendritic localization may reflect transient trafficking rather
        than a functional site. Without direct evidence for endogenous BRINP2 in dendrites,
        this is retained as non-core.
      supported_by:
        - reference_id: PMID:27826231
          supporting_text: >-
            Brinp2 and Brinp3 are expressed in differentiated neurons of the neocortex,
            amygdala, hippocampus, and cerebellum during mammalian brain development

  - term:
      id: GO:0043025
      label: neuronal cell body
    evidence_type: IBA
    original_reference_id: GO_REF:0000033
    review:
      summary: >-
        The neuronal cell body annotation is propagated from rat orthologs (Brinp1, Brinp3).
        BRINP2 is expressed in neurons and would be expected to be present in neuronal cell
        bodies as a secretory pathway protein. Similar caveats apply as for dendrite - no
        direct evidence for endogenous BRINP2 protein in neuronal cell bodies.
      action: KEEP_AS_NON_CORE
      reason: >-
        Phylogenetically reasonable IBA from rat orthologs. BRINP2 expression in neurons
        makes neuronal cell body localization plausible as a site of synthesis/secretion.
        However, as a secreted protein, the cell body may be a transit site rather than
        a functional compartment. Retained as non-core.
      supported_by:
        - reference_id: PMID:27826231
          supporting_text: >-
            Brinps 1-3, and Astrotactins (Astn) 1 and 2, are members of the Membrane
            Attack Complex/Perforin (MACPF) superfamily that are predominantly expressed
            in the mammalian brain during development

  - term:
      id: GO:0071300
      label: cellular response to retinoic acid
    evidence_type: IBA
    original_reference_id: GO_REF:0000033
    review:
      summary: >-
        BRINP2 (and the BRINP family) was originally named for BMP/retinoic acid inducibility.
        In mouse ES-derived neural stem cells, all three BRINP mRNAs are induced during
        differentiation with RA and BDNF, peaking at day 3 (PMID:20025061). However, in
        superior cervical ganglion neurons, Brinp2 was NOT induced by BMP/RA and instead
        decreased during differentiation. This context-dependent regulation complicates
        the annotation.
      action: KEEP_AS_NON_CORE
      reason: >-
        BRINP2 is induced by RA in some neural contexts (ES-derived NSCs) but not others
        (SCG neurons). The IBA annotation from mouse orthologs reflects real experimental
        evidence in at least one context, but the response is not universal. The annotation
        captures a real aspect of BRINP2 regulation but is context-dependent rather than
        a core function. Retained as non-core.
      supported_by:
        - reference_id: PMID:20025061
          supporting_text: >-
            Upon differentiation into neuronal cells in the presence of retinoic acid and
            BDNF, all three types of BRINP-mRNA were induced with a similar time course
            peaking at day three of treatment
        - reference_id: file:human/BRINP2/BRINP2-deep-research-falcon.md
          supporting_text: >-
            In superior cervical ganglion (SCG) neurons, Brinp2 was reported not to be
            induced by BMP/RA and instead decreased during differentiation

