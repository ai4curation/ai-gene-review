id: Q9C0B6
gene_symbol: BRINP2
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  BRINP2 (BMP/retinoic acid-inducible neural-specific protein 2, also known as FAM5B/DBCCR1L2)
  is a secreted MACPF-domain-containing glycoprotein of the BRINP family (BRINP1-3). The protein
  contains an N-terminal cleavable signal peptide, a MACPF domain, a putative IGF-like domain,
  and a cysteine-rich C-terminus, and is predicted to lack transmembrane domains, indicating it
  is a soluble secreted protein (PMID:28506896). BRINP2 is predominantly expressed in the nervous
  system, with expression detectable from embryonic E11 in rodents, peaking postnatally around
  P14, and enriched in adult cortex, hippocampus, cerebellar Purkinje cells, and olfactory bulb
  (PMID:27826231). Functionally, BRINP2 overexpression suppresses cell-cycle progression in
  neural stem cells, reducing the S-phase fraction from 26.1% to 11.8-13.8% (PMID:20025061).
  Brinp2-knockout mice exhibit hyperactivity and sex-specific growth phenotypes consistent with
  neurodevelopmental roles (PMID:27826231). No enzymatic, transporter, or receptor activity has
  been identified for BRINP2. Endogenous subcellular localization remains uncertain, as
  overexpression studies showed conflicting results across cell types. The molecular mechanism
  by which BRINP2 exerts its cell-cycle restraint and neurodevelopmental functions remains
  unresolved.
