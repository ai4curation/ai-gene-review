  - term:
      id: GO:0005576
      label: extracellular region
    evidence_type: IEA
    original_reference_id: GO_REF:0000044
    review:
      summary: >-
        This IEA annotation is derived from UniProt subcellular location vocabulary mapping.
        UniProt annotates BRINP2 as Secreted (ECO:0000305). BRINP2 has a signal peptide
        (residues 1-33) and lacks transmembrane domains, consistent with secretion to the
        extracellular region. This is the best-supported localization for BRINP2.
      action: ACCEPT
      reason: >-
        The extracellular region annotation is consistent with BRINP2 domain architecture
        (signal peptide, no transmembrane domains), UniProt Secreted annotation, and the
        broader BRINP family characterization as soluble secreted glycoproteins
        (PMID:28506896). This is the most reliable localization annotation for BRINP2.
      supported_by:
        - reference_id: file:human/BRINP2/BRINP2-uniprot.txt
          supporting_text: >-
            SUBCELLULAR LOCATION: Secreted {ECO:0000305}
        - reference_id: file:human/BRINP2/BRINP2-deep-research-falcon.md
          supporting_text: >-
            BRINPs are predicted to lack transmembrane domains, implying they are soluble
            secreted glycoproteins rather than membrane-embedded receptors/transporters

  - term:
      id: GO:0045666
      label: positive regulation of neuron differentiation
    evidence_type: IEA
    original_reference_id: GO_REF:0000002
    review:
      summary: >-
        This IEA annotation is from InterPro mapping (IPR033237 BRINP family to GO:0045666).
        The evidence for BRINP2 more directly supports cell-cycle restraint in neural
        progenitors rather than positive regulation of neuron differentiation per se.
        Overexpression suppresses S-phase entry (PMID:20025061), which could indirectly
        promote differentiation by forcing cell-cycle exit, but the causal link to positive
        regulation of differentiation is indirect.
      action: MARK_AS_OVER_ANNOTATED
      reason: >-
        The InterPro2GO mapping assigns this term to all BRINP family members, but the
        experimental evidence (PMID:20025061) shows cell-cycle arrest rather than direct
        positive regulation of neuron differentiation. Cell-cycle exit is a prerequisite
        for terminal differentiation, but BRINP2 has not been shown to directly promote
        differentiation programs. The term negative regulation of cell cycle (GO:0045930)
        already captures the demonstrated function more accurately. This annotation
        represents an inferential leap from cell-cycle restraint to differentiation
        promotion.
      supported_by:
        - reference_id: PMID:20025061
          supporting_text: >-
            over-expression of any one of the three BRINP genes completely abolished cells
            in the G2 phase and significantly reduced the cells in S phase to 11.8-13.8%

