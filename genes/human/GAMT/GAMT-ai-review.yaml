suggested_questions:
- question: >-
    By what mechanism does guanidinoacetate (GAA) accumulation in GAMT deficiency drive
    neurotoxicity and epilepsy - direct GABA-A/glycine receptor effects, competition at the
    creatine transporter, or secondary metabolic disturbance - and how does it relate to the
    separate creatine-depletion component of the phenotype?
- question: >-
    What is GAMT's quantitative contribution to whole-body S-adenosyl-L-methionine (SAM)
    consumption and methyl-group demand, and how is hepatic GAMT flux coordinated with the
    methionine/one-carbon cycle?
- question: >-
    Is local CNS GAMT expression (vs. peripheral synthesis plus SLC6A8-mediated import)
    regulated, and does it matter for the brain creatine pool in health and disease?
- question: >-
    Does GAMT have any non-catalytic or moonlighting function beyond guanidinoacetate
    methylation?
suggested_experiments:
- description: >-
    Quantify SAM/SAH ratios and methylation flux in hepatocyte models with graded GAMT
    knockdown to measure GAMT's share of cellular methyl-group consumption.
- description: >-
    Dissect the GAA-toxicity vs. creatine-depletion contributions to the GAMT-deficiency
    phenotype using GAA-lowering (e.g. ornithine/arginine restriction) versus creatine
    supplementation in a GAMT-deficient model, with neurophysiological readouts.
- description: >-
    Map regulation of CNS GAMT expression across cell types and developmental stages, and test
    whether local synthesis or SLC6A8-mediated import dominates the brain creatine pool.
