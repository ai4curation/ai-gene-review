id: Q14353
gene_symbol: GAMT
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  GAMT encodes guanidinoacetate N-methyltransferase (EC 2.1.1.2), the second and terminal
  enzyme of endogenous creatine biosynthesis. It is a soluble cytosolic, S-adenosyl-L-methionine
  (SAM)-dependent methyltransferase of the class I-like SAM-binding superfamily (RMT2 family)
  that transfers a methyl group from SAM to guanidinoacetate, producing creatine and
  S-adenosyl-L-homocysteine. Guanidinoacetate is generated upstream by AGAT/GATM (largely in
  kidney); GAMT then methylates it, predominantly in liver, making creatine biosynthesis one of
  the body's largest single consumers of SAM-derived methyl groups and linking it to methionine
  and one-carbon metabolism. GAMT is most highly expressed in liver, with additional expression
  in skeletal muscle and brain (astrocytes and oligodendrocytes for local CNS creatine synthesis).
  Biallelic loss-of-function in GAMT causes cerebral creatine deficiency syndrome 2 (GAMT
  deficiency), an autosomal recessive disorder with brain creatine/phosphocreatine depletion,
  accumulation of neurotoxic guanidinoacetate, developmental delay, intellectual disability,
  intractable seizures and movement disturbance.
