knowledge_gaps:
- gap_statement: The normal non-viral physiological consequences and regulation of SERINC3 phospholipid
    scrambling in human plasma and Golgi membranes are unclear.
  boundary: Purified-protein and virion assays establish lipid flipping, but the evidence set does not
    identify the endogenous activating conditions, lipid-asymmetry outputs, or cellular pathway outside
    infection.
  gap_kind:
  - BIOLOGY
  dark_aspect: BP_DARK
  status: OPEN
  significance: This is necessary to understand why a constitutively expressed scramblase does not simply
    erase membrane asymmetry in uninfected cells.
  resolution: Measure leaflet-resolved lipid distributions after endogenous SERINC3 knockout/rescue under
    candidate regulatory conditions, with matched surface abundance and catalysis-defective mutants.
  provenance:
  - reference_id: file:human/SERINC3/SERINC3-notes.md
    supporting_text: Identify the physiological non-viral consequences of constitutive SERINC3
- gap_statement: The functional differences between Q13530-1 and the N-terminally truncated Q13530-2 isoform
    are unknown.
  boundary: UniProt defines both sequences, but the structural, scrambling, and antiviral studies do not
    resolve which endogenous isoforms are present or active.
  gap_kind:
  - BIOLOGY
  dark_aspect: MF_DARK
  status: OPEN
  significance: Isoform-specific topology or trafficking could alter lipid access, plasma-membrane abundance,
    and restriction potency.
  resolution: Express each isoform at matched levels after endogenous SERINC3 deletion and compare topology,
    glycosylation, surface trafficking, proteoliposome flipping, virion incorporation, and antiviral activity.
  provenance:
  - reference_id: file:human/SERINC3/SERINC3-notes.md
    supporting_text: isoform 2 lacks residues 1-55.
suggested_questions:
- question: How is SERINC3 scramblase activity regulated in uninfected human cells without constitutively
    collapsing plasma-membrane lipid asymmetry?
- question: Do the two human SERINC3 isoforms differ in surface localization, phospholipid specificity,
    or retroviral restriction?
- question: Which human SERINC3 residues form the physiological lipid-translocation path, and can scrambling
    be separated from virion incorporation?
suggested_experiments:
- hypothesis: SERINC3 scramblase activity is regulated by membrane context or a host cofactor absent from
    simple proteoliposomes.
  description: Compare endogenous SERINC3-dependent leaflet lipidomics in plasma and Golgi membranes across
    signaling states, using knockout/rescue, matched surface-expression controls, and purified-protein
    reconstitution with candidate lipids and cofactors.
  experiment_type: Leaflet-resolved lipidomics and regulated scramblase reconstitution
- hypothesis: Isoform 2 has altered topology or trafficking that reduces scrambling and antiviral activity.
  description: Perform isoform-specific rescue in SERINC3-null human T cells, quantify topology and surface
    abundance, and measure lipid flipping, HIV-1 virion incorporation, phosphatidylserine exposure, and
    infectivity.
  experiment_type: Isoform-resolved trafficking and antiviral complementation
- hypothesis: A central hydrophilic pathway mediates scrambling independently of Nef-sensitive trafficking
    determinants.
  description: Introduce structure- and simulation-guided central-cavity mutations, require normal folding
    and surface expression, then compare purified lipid flipping, Nef binding/downregulation, virion incorporation,
    and restriction.
  experiment_type: Structure-guided separation-of-function mutagenesis

