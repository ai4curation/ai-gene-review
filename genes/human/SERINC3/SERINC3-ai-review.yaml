core_functions:
- description: SERINC3 is a non-ATP-dependent, nonspecific phospholipid scramblase. Its multipass helical
    architecture supports bidirectional movement of phosphatidylserine, phosphatidylethanolamine, and
    phosphatidylcholine across membranes.
