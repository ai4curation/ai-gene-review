id: Q13530
gene_symbol: SERINC3
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: SERINC3 is a ubiquitously expressed multipass membrane protein and non-ATP-dependent phospholipid
  scramblase. Its two helical bundles mediate bidirectional transbilayer movement of phosphatidylserine,
  phosphatidylethanolamine, and phosphatidylcholine. At the plasma membrane, SERINC3 can be incorporated
  into budding retroviral particles; scrambling then exposes phosphatidylserine, disrupts viral-envelope
  lipid asymmetry, changes Env conformation, and reduces infectivity. HIV-1 Nef counteracts this intrinsic
  antiviral activity by removing SERINC3 from the cell surface and excluding it from virions.
