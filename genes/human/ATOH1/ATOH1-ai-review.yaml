core_functions:
  - description: >-
      ATOH1 heterodimerizes with an E protein, binds E-box cis-regulatory
      sequences, and activates RNA polymerase II-dependent transcription. This
      single biochemical activity is deployed in multiple lineage contexts:
      commitment and differentiation of selected neurons, including
      rhombic-lip-derived cerebellar granule neurons; differentiation of
      inner-ear receptor hair cells; and differentiation of intestinal
      secretory epithelial cells. Tissue-specific partners and chromatin
      landscapes determine which target program is activated.
    molecular_function:
      id: GO:0001228
      label: DNA-binding transcription activator activity, RNA polymerase II-specific
    directly_involved_in:
      - id: GO:0045944
        label: positive regulation of transcription by RNA polymerase II
      - id: GO:0048663
        label: neuron fate commitment
      - id: GO:0021707
        label: cerebellar granule cell differentiation
      - id: GO:2000982
        label: positive regulation of inner ear receptor cell differentiation
      - id: GO:0060575
        label: intestinal epithelial cell differentiation
    locations:
      - id: GO:0005634
        label: nucleus
    supported_by:
      - reference_id: PMID:21300888
        supporting_text: "We found that Atoh1 binds to a 10 nucleotide motif (AtEAM) to directly regulate genes involved in migration, cell adhesion, metabolism, and other previously unsuspected functions."
      - reference_id: PMID:24695699
        supporting_text: "ectopically Atoh1-expressing VZ cells produced glutamatergic neurons, including granule cells and deep cerebellar nuclei neurons"
      - reference_id: PMID:34842137
        supporting_text: "We report a rapid protocol for the derivation of the human ATOH1 lineage, the precursor of excitatory cerebellar neurons, from human pluripotent stem cells (hPSCs)."
      - reference_id: PMID:20621629
        supporting_text: "ATOH1 was required for secretory cell gene expression in cell lines and in mice."
