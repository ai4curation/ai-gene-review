id: Q92858
gene_symbol: ATOH1
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  ATOH1 is a nuclear basic helix-loop-helix transcriptional activator that
  heterodimerizes with E proteins such as TCF3/E47, binds E-box cis-regulatory
  motifs, and activates RNA polymerase II-dependent gene expression. Its
  transient, tightly regulated activity establishes or differentiates selected
  neural, mechanosensory, and epithelial lineages. Conserved mammalian roles
  include production of rhombic-lip-derived excitatory cerebellar and brainstem
  neurons, differentiation and maturation of inner-ear hair cells and other
  mechanoreceptors, and specification of intestinal secretory epithelial cells.
  HES-family repressors downstream of Notch signaling antagonize ATOH1 activity,
  allowing progenitors to choose between ATOH1-positive and alternative fates.
  The molecular activity is conserved, while its target genes and consequences
  depend strongly on developmental and tissue context.
