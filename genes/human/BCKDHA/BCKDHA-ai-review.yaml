      and two E1-beta subunits; type IA MSUD E1-alpha mutations impair assembly and
      abolish E1/BCKAD catalytic activity.
    reference_section_type: ABSTRACT
    supporting_text: The E1 decarboxylase component of the human branched-chain ketoacid
      dehydrogenase complex comprises two E1alpha (45.5 kDa) and two E1beta (37.5
      kDa) subunits forming an alpha2 beta2 tetramer.
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: PubMed-verified; defines the alpha2-beta2 E1 architecture and the
      catalytic consequence of E1-alpha loss in type IA MSUD.
