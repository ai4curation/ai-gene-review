suggested_questions:
- question: Beyond the canonical alpha2-beta2 E1 heterotetramer, are there physiologically
    distinct assemblies or partners of E1-alpha (e.g. the BCAT2-BCKDH metabolon) that
    alter substrate channeling or flux in specific tissues?
- question: Does phosphorylation of E1-alpha at Ser337 by BCKDK versus dephosphorylation
    by PPM1K act purely as an on/off switch, or does it also modulate substrate specificity
    among the three branched-chain 2-oxo acids?
suggested_experiments:
- description: Cryo-EM of the intact human BCKDH complex (E1/E2/E3 on the DBT core)
    in phosphorylated versus dephosphorylated states to resolve how E1-alpha phosphorylation-loop
    conformation gates the reductive acylation step.
- description: Reconstitution assays comparing kcat/Km of wild-type versus MSUD1A
    E1-alpha variants for KIC, KMV and KIV to test whether specific mutations differentially
    affect the three physiological substrates.
