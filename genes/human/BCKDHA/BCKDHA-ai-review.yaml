id: P12694
gene_symbol: BCKDHA
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: |-
  BCKDHA encodes the E1 alpha (E1a) subunit of the mitochondrial branched-chain
  alpha-ketoacid dehydrogenase (BCKDH/BCKD/BCKDC) complex. Together with the E1 beta
  subunit (BCKDHB) it assembles into an alpha2-beta2 heterotetrameric E1 component,
  the branched-chain 2-oxo acid decarboxylase. This E1 component associates with the
  dihydrolipoyl transacylase E2 core (DBT), which forms a 24-meric cubic scaffold,
  and with the dihydrolipoamide dehydrogenase E3 (DLD) to build the complete BCKDH
  multienzyme complex in the mitochondrial matrix. The complex catalyzes the first,
  committed, rate-limiting and irreversible step of branched-chain amino acid (BCAA;
  leucine, isoleucine, valine) catabolism, namely the oxidative decarboxylation of the
  branched-chain 2-oxo (alpha-keto) acids (4-methyl-2-oxopentanoate/KIC from leucine,
  (S)-3-methyl-2-oxopentanoate/KMV from isoleucine, and 3-methyl-2-oxobutanoate/KIV
  from valine) to their branched-chain acyl-CoA derivatives, releasing CO2 and generating
  NADH through the coupled E1/E2/E3 reaction sequence. E1a specifically carries out
  the thiamine-diphosphate (TPP)-dependent decarboxylation of the 2-oxo acid and then
  the reductive acylation that transfers the acyl group to the lipoyl-lysine of the
  E2 component (EC 1.2.4.4). Catalysis requires thiamine diphosphate and Mg2+ as cofactors,
  with structural K+ ions; the TPP/Mg2+ binding residues reside on the E1a subunit.
  BCKDH activity is controlled by reversible phosphorylation of E1a (Ser337 in mature
  human numbering) by the kinase BCKDK (inactivating) and dephosphorylation by the
  phosphatase PPM1K/PP2Cm (activating). Biallelic loss-of-function variants in BCKDHA
  cause maple syrup urine disease type IA (MSUD1A), an autosomal recessive inborn error
  of metabolism.
