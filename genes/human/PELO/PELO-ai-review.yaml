suggested_questions:
- question: How is the choice between productive translation termination (eRF1) and
    rescue (PELO) made at ribosomes with short or empty mRNA in the channel?
- question: What is the in vivo contribution of the PINK1-regulated PELO recruitment
    to mitochondrial ribosomes relative to its canonical cytosolic rescue role?
suggested_experiments:
- description: Ribosome profiling and 5'P degradome sequencing in PELO-knockout versus
    wild-type human cells to quantify accumulation of stalled/truncated mRNAs and define
    the endogenous no-go/non-stop substrate repertoire.
- description: Reconstituted single-molecule or cryo-EM time-resolved analysis of PELO-HBS1L-ABCE1
    splitting kinetics on defined stalled substrates to dissect the mRNA-channel sensing
    step.
