id: Q9BRX2
gene_symbol: PELO
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: PELO (Protein pelota homolog, the human ortholog of yeast Dom34) is a
  cytoplasmic ribosome-rescue factor of the eukaryotic release factor 1 (eRF1) family,
  Pelota subfamily. Structurally it mimics eRF1 and occupies the ribosomal A site,
  but it lacks the catalytic GGQ motif and therefore has no peptidyl-tRNA hydrolase
  (peptide-release) activity. PELO forms the Pelota-HBS1L complex (also called the
  Dom34-Hbs1 complex) with the translational GTPase HBS1L. This complex recognizes
  ribosomes that are stalled at the 3' end of an mRNA (truncated, non-stop, or no-go
  messages), engages the empty mRNA channel, and, after mRNA extraction by the SKI
  complex, recruits the recycling ATPase ABCE1 to split the stalled 80S ribosome into
  subunits. PELO thereby initiates the no-go decay (NGD) and non-stop decay (NSD)
  mRNA surveillance pathways and rescues stalled ribosomes. It is ubiquitously expressed
  and is also recruited, in a PINK1-regulated manner, to mitochondrially associated
  ribosomes during mitophagy.
