core_functions:
- description: Stalled-ribosome sensor / eRF1-like factor that recognizes ribosomes
    stalled at the 3' end of an mRNA by probing the empty mRNA channel and A site,
    the molecular recognition event that initiates ribosome rescue. Unlike eRF1, PELO
    lacks peptidyl-tRNA hydrolase activity.
  molecular_function:
    id: GO:0170011
    label: stalled ribosome sensor activity
  locations:
  - id: GO:0022626
    label: cytosolic ribosome
  supported_by:
  - reference_id: file:human/PELO/PELO-uniprot.txt
    supporting_text: PELO recognizes ribosomes stalled at the 3' end of an mRNA and
      engages stalled ribosomes by destabilizing mRNA in the mRNA channel
- description: As the eRF1-like subunit of the Pelota-HBS1L (Dom34-Hbs1) complex, with
    the GTPase HBS1L and recycling ATPase ABCE1, PELO rescues stalled ribosomes by
    driving their dissociation into subunits, initiating no-go and non-stop mRNA decay.
  molecular_function:
    id: GO:0043022
    label: ribosome binding
  locations:
  - id: GO:1990533
    label: Dom34-Hbs1 complex
  supported_by:
  - reference_id: PMID:21448132
    supporting_text: Dissociation by Pelota, Hbs1 and ABCE1 of mammalian vacant 80S
      ribosomes and stalled elongation complexes
  - reference_id: file:human/PELO/PELO-uniprot.txt
    supporting_text: Component of the Pelota-HBS1L complex, also named Dom34-Hbs1 complex,
      composed of PELO and HBS1L
