- term:
    id: GO:0004842
    label: ubiquitin-protein transferase activity
  evidence_type: TAS
  original_reference_id: PMID:10531037
  qualifier: enables
  review:
    summary: Legacy F-box-family TAS annotation of ubiquitin-protein transferase activity. As an F-box substrate receptor, FBXO22 is the substrate-specific adaptor of the SCF; the catalytic transferase activity resides in the RBX1-RING/E2 module, not in the F-box protein itself.
    action: MODIFY
    reason: FBXO22 is the substrate-recognition subunit of the SCF, not the catalytic transferase. The essence (participation in ubiquitin transfer) is sound, but the more accurate molecular function is the ubiquitin-like ligase-substrate adaptor activity; replace the catalytic transferase term with GO:1990756.
    proposed_replacement_terms:
    - id: GO:1990756
      label: ubiquitin-like ligase-substrate adaptor activity
    supported_by:
