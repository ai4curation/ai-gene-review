- id: file:human/FBXO22/FBXO22-deep-research-falcon.md
  title: Falcon deep research report for human FBXO22
  findings:
  - statement: FBXO22 is the substrate-recognition subunit of an SCF (SKP1-CUL1-RBX1/CRL1) E3 ligase; its N-terminal F-box binds SKP1 and its C-terminal FIST-C region binds substrates such as KDM4A.
    supporting_text: FBXO22 contains an N-terminal **F-box domain** mediating SCF assembly via SKP1, and a C-terminal **FIST/FIST-C** substrate-binding region (e.g., KDM4A binding mapped to the FBXO22 FIST-C domain).
  - statement: In ER-positive breast cancer, SCF(FBXO22) ubiquitylates and degrades KDM4B when KDM4B is complexed with tamoxifen-bound estrogen receptor, releasing steroid receptor coactivator and shaping SERM pharmacology.
    supporting_text: In ER-positive breast cancer models, **SCF^FBXO22^ ubiquitylates and degrades KDM4B** when KDM4B is **complexed with tamoxifen-bound ER**, which in turn **releases steroid receptor coactivator (SRC)** from ER and shapes SERM pharmacology.
  - statement: FBXO22 ubiquitinates nuclear, but not cytoplasmic, PTEN at Lys221 for proteasomal degradation.
    supporting_text: FBXO22 **ubiquitylates nuclear (but not cytoplasmic) PTEN** at **lysine 221**, leading to proteasome-mediated degradation and nuclear PTEN depletion.
  - statement: FBXO22 recognizes a phosphodegron motif XXPpSPXPXX and degrades BAG3 in an ERK-S377-phosphorylation-dependent manner, defining an ERK-FBXO22-BAG3 axis.
    supporting_text: A 2022 systems/biochemical study defined a **FBXO22-recognized phosphodegron motif** **XXPpSPXPXX** and validated **BAG3** as a bona fide FBXO22 substrate. BAG3 degradation requires **ERK-dependent phosphorylation at S377**, establishing an ERK→FBXO22→BAG3 axis linked to tumorigenesis phenotypes.
  - statement: FBXO22 is a recruitable E3 ligase for targeted protein degradation; an aldehyde metabolite of alkylamine-tethered degraders covalently adducts Cys326 in its C-terminal domain to drive ternary-complex formation and degradation.
    supporting_text: Alkylamine-tethered degraders can be metabolized to an **active aldehyde** that **covalently adduces Cys326** in the FBXO22 C-terminal domain.
  reference_review:
    relevance: HIGH
    correctness: UNVERIFIED
    review_notes: Falcon (Edison Scientific) deep-research synthesis. Cross-checked against the UniProt FUNCTION block (KDM4A, methylated TP53, BACH1, MTOR, NSP5) and used as leads for substrates not yet in UniProt (KDM4B/SERM, nuclear PTEN K221, PD-L1, BAG3 phosphodegron, pS2448-mTOR, Cys326 TPD handle); cites author-year/DOIs rather than PMIDs, so individual primary claims remain UNVERIFIED here.
