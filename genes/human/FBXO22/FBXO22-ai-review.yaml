  review:
    summary: Phylogenetic assignment of a role in skeletal muscle fiber development. FBXO22 is enriched in cardiac muscle and is reported to regulate sarcomeric protein turnover, but a specific role in skeletal muscle fiber development is thinly supported and likely propagated from family/ortholog context.
    action: MARK_AS_OVER_ANNOTATED
    reason: FBXO22's documented muscle link is regulation of sarcomeric protein turnover (cardiac-enriched); a specific "skeletal muscle fiber development" process is not directly demonstrated for FBXO22 and appears to be an over-propagated IBA inference. Not a core function.
