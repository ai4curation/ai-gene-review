suggested_questions:
- question: What structural determinants in the FBXO22 C-terminal FIST-C domain dictate its broad substrate repertoire (KDM4A, methylated TP53, BACH1, MTOR, KLF4, NSP5), and how are degrons such as the oxidation-exposed BACH1 bZIP region recognized?
- question: How is FBXO22's choice of ubiquitin-chain linkage controlled (K48-linked degradative chains on NSP5/most substrates vs K27-linked chains on MTOR), given that chain topology is normally set by the E2/RBX1 module rather than the F-box adaptor?
- question: To what extent do the diverse FBXO22 substrate-degradation activities each contribute to the Tayoun-Maawali syndrome phenotype caused by biallelic FBXO22 loss of function?
suggested_experiments:
- description: Reconstitute SCF(FBXO22) ubiquitination in vitro with purified SKP1-CUL1-RBX1, an E2, and candidate substrates to confirm direct, adaptor-dependent substrate selection and to map lysine sites and chain linkages for each substrate.
- description: Perform quantitative ubiquitinome and proteome profiling in FBXO22-knockout versus wild-type cells under basal, amino-acid-starved, and oxidative-stress conditions to define the endogenous, context-dependent FBXO22 substrate repertoire.
- description: Dissect the regulated nuclear/cytoplasmic partitioning of FBXO22 by mutating the EIF2AK4/GCN2 phosphosite (Thr-127) and quantifying the effect on substrate-specific degradation (e.g. nuclear KDM4A vs cytoplasmic MTOR).
