- id: PMID:10531035
  title: Identification of a family of human F-box proteins.
  findings:
  - statement: FBXO22 (FBX22) was identified among a family of 26 human F-box proteins; F-box proteins are the substrate-recognition subunits of SCF ubiquitin protein ligases (together with Skp1, a cullin, and Roc1/Rbx1).
    reference_section_type: ABSTRACT
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: Original identification paper establishing FBXO22 as an F-box protein/SCF substrate receptor; source of the legacy TAS catabolism and protein-modification annotations.
- id: PMID:10531037
  title: A family of mammalian F-box proteins.
  findings:
  - statement: F-box proteins contain a C-terminal substrate-binding domain and an F-box motif that binds Skp1, linking the F-box protein to a core ubiquitin ligase composed of Cul1, Rbx1 and an E2; the catalytic core is the cullin-RING module, not the F-box protein.
    reference_section_type: ABSTRACT
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: Establishes the F-box/SCF architecture; supports MODIFY of the catalytic transferase annotation to the substrate-adaptor function.
- id: PMID:21145461
  title: Dynamics of cullin-RING ubiquitin ligase network revealed by systematic quantitative
    proteomics.
  findings:
  - statement: Quantitative proteomics of the cullin-RING ligase (CRL) network; a large fraction of cullins are assembled with substrate-adaptor modules. Recorded FBXO22 interaction partner is CUL1.
    reference_section_type: ABSTRACT
  reference_review:
    relevance: LOW
    correctness: VERIFIED
    review_notes: High-throughput CRL-network proteomics; source of a bare protein binding (CUL1) annotation.
