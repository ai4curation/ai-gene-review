- id: PMID:34445249
  title: The SCF Complex Is Essential to Maintain Genome and Chromosome Stability.
  findings:
  - statement: The SCF (SKP1-CUL1-F-box) complex comprises ~69 E3 ubiquitin ligases distinguished by variable F-box proteins that determine substrate specificity and modify substrates with poly-ubiquitin chains for proteasomal degradation.
    reference_section_type: ABSTRACT
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: Review/NAS source for SCF complex membership and SCF-dependent catabolism annotations; abstract supports the F-box-as-substrate-receptor framing.
- id: PMID:37979583
  title: The tRNA-GCN2-FBXO22-axis-mediated mTOR ubiquitination senses amino acid
    insufficiency.
  findings:
  - statement: Upon amino-acid depletion, uncharged tRNAs stimulate GCN2 to phosphorylate FBXO22, which accumulates in the cytoplasm and ubiquitinates mTOR at Lys2066 in a K27-linked manner, inhibiting mTORC1 by preventing substrate recruitment.
    reference_section_type: ABSTRACT
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: Establishes FBXO22 as an MTOR-ubiquitinating SCF receptor and its regulated cytoplasmic localization; source of the EXP nucleus/cytoplasm annotations. Abstract-only in cache (full_text_available false).
- id: PMID:39223933
  title: E3 ubiquitin ligase FBXO22 inhibits SARS-CoV-2 replication via promoting
    proteasome-dependent degradation of NSP5.
  findings:
  - statement: FBXO22 ubiquitinates SARS-CoV-2 NSP5 with K48-linked polyubiquitin chains at Lys5 and Lys90, promoting its proteasome-dependent degradation and restricting viral replication.
    reference_section_type: ABSTRACT
