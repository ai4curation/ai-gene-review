core_functions:
- description: >-
    EN2 enables sequence-specific DNA-binding transcription-factor activity at RNA
    polymerase II cis-regulatory regions. Its homeodomain recognizes regulatory DNA and,
    together with conserved partner-interaction regions, modulates target transcription
    in the nucleus and on chromatin. Activation or repression depends on promoter, dose,
    and interacting-factor context; developmental phenotypes such as neuronal survival
    and cerebellar foliation are downstream deployments of this activity rather than
    separate intrinsic functions.
