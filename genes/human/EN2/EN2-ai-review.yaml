- term:
    id: GO:0030182
    label: neuron differentiation
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: involved_in
  review:
    summary: >-
      Conserved Engrailed-family genetics supports roles in neuronal differentiation,
      maturation, and maintenance. Mouse En2 is expressed in multiple developing
      cerebellar neuronal populations, although expression does not by itself define a
      direct molecular mechanism.
    action: KEEP_AS_NON_CORE
    reason: >-
      The phylogenetic annotation is plausible and consistent with vertebrate studies,
      but neuron differentiation is a developmental outcome of EN2 transcriptional
      regulation rather than the protein's intrinsic core activity.
