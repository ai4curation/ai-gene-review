suggested_experiments:
- description: >-
    Perform cell-type-resolved EN2 CUT&RUN/CUT&Tag with matched nascent RNA profiling
    after acute EN2 degradation in human cerebellar organoids, separating granule-cell
    precursors, Purkinje-lineage cells, and interneurons.
  hypothesis: >-
    EN2 occupies distinct cis-regulatory programs in different cerebellar lineages, and
    the direct targets that control regional tissue growth are separable from generic
    neuronal differentiation targets.
  experiment_type: cell-type-resolved chromatin occupancy and acute perturbation transcriptomics
- description: >-
    Rescue conditional mouse En1/En2 foliation mutants with human EN2 and with matched
    DNA-binding-deficient or FOXA2/PBX-interaction-deficient EN2 variants, measuring
    fissure initiation, granule-cell-precursor proliferation, and regional gene expression.
  hypothesis: >-
    Human EN2 conserves the late regional-foliation activity, and this output requires
    both homeodomain DNA binding and partner-specific transcriptional regulation.
  experiment_type: structure-function ortholog rescue in a developmental model
