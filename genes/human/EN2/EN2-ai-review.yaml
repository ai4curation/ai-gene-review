  qualifier: is_active_in
  review:
    summary: >-
      EN2 is active in the nucleus, where its homeodomain binds cis-regulatory DNA and
      regulates transcription. This phylogenetic inference agrees with reviewed UniProt
      localization and the nuclear-extract/promoter assays in PMID:12642491.
    action: ACCEPT
    reason: >-
      Nuclear activity is integral to EN2's conserved DNA-binding transcription-factor
      function. The IBA is biologically coherent and independently supported by human
      localization annotations.
