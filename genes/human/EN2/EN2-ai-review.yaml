- id: PMID:11331364
  title: The neuronal microtubule-associated protein 1B is under homeoprotein transcriptional control.
  full_text_unavailable: true
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      PubMed and PMC identifiers verified. The abstract supports direct Engrailed promoter
      binding/regulation; the accessible PMC record supplies the activation/repression details.
  findings:
  - statement: Engrailed binds and directly regulates conserved homeoprotein sites in the MAP1B promoter.
    supporting_text: >-
      These experiments demonstrate that MAP1B promoter is regulated by Engrailed in vivo.
      Moreover, they show that one promoter domain that contains all ATTA homeoprotein cognate
      binding sites common to the rat and human genes is an essential element of this regulation.
- id: PMID:12642491
  title: Joint regulation of the MAP1B promoter by HNF3beta/Foxa2 and Engrailed is the result of a highly conserved mechanism for direct interaction of homeoproteins and Fox transcription factors.
  full_text_unavailable: true
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      PubMed identity and source chicken EN2 protein verified. The paper supports promoter
      binding/regulation and direct FOXA2 interaction; detailed directionality was checked in
      the accessible article text because the local cache contains the abstract only.
  findings:
  - statement: EN2 and FOXA2 directly interact and reciprocally modulate MAP1B promoter regulation.
    supporting_text: >-
      Transfection experiments further demonstrate that Engrailed and Foxa2 interact
      physiologically in a dose-dependent manner: Foxa2 antagonizes the Engrailed-driven
      regulation of the MAP1B promoter, and vice versa.
  - statement: Two conserved EN2 regions mediate FOXA2 binding.
    supporting_text: >-
      In Engrailed, two independent interacting domains exist: the homeodomain and a region
      that includes the Pbx-binding domain.
- id: PMID:15175251
  title: Engrailed genes are cell-autonomously required to prevent apoptosis in mesencephalic dopaminergic neurons.
  full_text_unavailable: true
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified mouse genetic/RNAi study supporting the source ortholog annotation for
      neuronal survival; it tests combined En1/En2 function rather than human EN2 alone.
  findings:
  - statement: Engrailed loss causes cell-autonomous apoptotic death of mouse mesencephalic dopaminergic neurons.
    supporting_text: >-
      Gene silencing in the postmitotic neurons by RNA interference activates caspase 3 and
      induces apoptosis in less than 24 hours.
- id: PMID:20081196
  title: The Engrailed homeobox genes determine the different foliation patterns in the vermis and hemispheres of the mammalian cerebellum.
  full_text_unavailable: true
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      PubMed/PMC-verified primary mouse conditional-genetics study. It directly supports the
      regional cerebellar-foliation placement in the module, not a direct human experiment.
  findings:
  - statement: En1 and En2 act late to establish region-specific mammalian cerebellar foliation.
    supporting_text: >-
      both En genes are required to ensure that folia exclusive to the vermis or hemispheres
      form in the appropriate mediolateral position
  - statement: Engrailed loss alters granule-cell-precursor layer growth and fissure formation.
    supporting_text: >-
      foliation is altered from the onset and is accompanied by changes in the thickness of
      the layer of proliferating granule cell precursors. In addition, the positioning and
      timing of fissure formation are altered.
- id: PMID:21431469
  title: Spatially restricted and developmentally dynamic expression of engrailed genes in multiple cerebellar cell types.
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: >-
      PubMed/PMC-verified mouse expression study; useful for developmental cell-type context,
      but expression is not interpreted as proof of function in every positive cell type.
  findings:
  - statement: Mouse En2 is expressed broadly across multiple developing cerebellar neuronal lineages.
    supporting_text: >-
      En2 is broadly expressed throughout the cerebellar cortex at E17.5 and is present in
      all of the main neuronal cell types (excluding DCN neurons), including Purkinje cells
      (identified by LHX1/5 and/or RORα immunoreactivity), GCPs (identified by PAX6),
      GABAergic interneurons (PAX2-positive, which include Golgi, basket and stellate cell
      precursors), and unipolar brush cell precursors (TBR2 double labeling).
- id: PMID:28473536
  title: Impact of cytosine methylation on DNA binding specificities of human transcription factors.
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      PubMed/PMC-verified human TF SELEX study underlying the direct EN2 DNA-binding
      annotation. The cached narrative does not reproduce the EN2 supplemental motif row,
      so the review does not infer an EN2-specific methyl-CpG preference.
  findings:
  - statement: A large-scale methylation-sensitive SELEX study measured DNA-binding specificity across human TFs, including the curated EN2 result.
    supporting_text: >-
