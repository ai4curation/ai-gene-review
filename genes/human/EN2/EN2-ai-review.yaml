id: P19622
gene_symbol: EN2
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  EN2 is an Engrailed-family homeobox transcription factor that functions in the
  nucleus and on chromatin. Its conserved homeodomain binds sequence-specific
  cis-regulatory DNA, while other Engrailed regions mediate interactions with
  transcription factors and coregulators, enabling context-dependent activation or
  repression of RNA polymerase II transcription. In vertebrate neural development,
  EN2 and its partially redundant paralog EN1 regulate midbrain-hindbrain patterning,
  neuronal differentiation and survival, and cerebellar organization. Mouse conditional
  genetics shows a late En1/En2 requirement for positioning vermal and hemispheric
  folia, associated with changes in granule-cell-precursor layer growth and fissure
  formation. EN2 therefore couples an intrinsic sequence-specific transcriptional
  regulatory activity to spatially and temporally restricted neural-developmental
  programs.
