suggested_questions:
- question: >-
    Does NDUFB9 have any regulatory role (e.g. in Complex I turnover, oxidative
    stress response, or supercomplex/respirasome formation) beyond its structural
    scaffolding contribution to the membrane arm?
- question: >-
    Is the LYR motif of NDUFB9 involved in Fe-S/acyl-carrier (LYRM-family) type
    interactions during assembly, or is it purely structural in the mature
    complex?
suggested_experiments:
- description: >-
    Quantitative complexome profiling (BN-PAGE / mass spectrometry) of NDUFB9
    knockout versus wild-type cells to define which Complex I subassembly
    intermediates accumulate and which neighbouring membrane-arm subunits are
    destabilized.
- description: >-
    Structure-guided functional analysis of the MC1DN24 variant (p.Leu64Pro) by
    cryo-EM and complex-stability assays to determine whether it perturbs
    assembly of the membrane arm or destabilizes the fully assembled holoenzyme.
