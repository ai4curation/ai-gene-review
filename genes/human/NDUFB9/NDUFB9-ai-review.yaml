core_functions:
- description: >-
    NDUFB9 (Complex I-B22, LYRM3) is a non-catalytic accessory/supernumerary
    structural subunit of the membrane arm of mitochondrial respiratory Complex I
    (NADH:ubiquinone oxidoreductase). It is a peripheral protein of the inner
    mitochondrial membrane, with its bulk on the matrix side, and is one of the
    ~45 subunits required for correct assembly and stability of the mature
    holoenzyme. Its molecular role is structural: it does not itself carry out
    electron transfer or proton translocation, but through its incorporation into
    the complex it contributes to the complex-level NADH:ubiquinone
    oxidoreductase activity and participates in mitochondrial electron transport
    from NADH to ubiquinone. Loss of NDUFB9 destabilizes Complex I and causes
    isolated Complex I deficiency (MC1DN24).
  molecular_function:
    id: GO:0005198
    label: structural molecule activity
  contributes_to_molecular_function:
    id: GO:0008137
    label: NADH dehydrogenase (ubiquinone) activity
