gene_symbol: NDUFB9
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  NDUFB9 (also called Complex I-B22, CI-B22, or LYR motif-containing protein 3)
  is a nuclear-encoded accessory ("supernumerary") subunit of mitochondrial
  respiratory chain Complex I (NADH:ubiquinone oxidoreductase), the first and
  largest enzyme of the oxidative phosphorylation electron transport chain.
  Complex I couples electron transfer from NADH to ubiquinone with translocation
  of protons across the inner mitochondrial membrane. NDUFB9 is one of ~45
  subunits of the mammalian holoenzyme and belongs to the LYR protein family. It
  is a component of the membrane arm of the complex, a peripheral inner-membrane
  protein whose bulk faces the matrix side, and it is non-catalytic: it does not
  itself carry out electron transfer or proton pumping. Its role is structural,
  contributing to the assembly and stability of the mature complex; loss of the
  subunit destabilizes the complex and causes isolated Complex I deficiency
  (mitochondrial complex I deficiency, nuclear type 24; MC1DN24). NDUFB9 is
  incorporated into higher-order respiratory supercomplexes (respirasomes)
  together with Complexes III and IV.
