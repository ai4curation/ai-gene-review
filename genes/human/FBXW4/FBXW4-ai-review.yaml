suggested_questions:
- question: What are the direct, phosphorylation-dependent ubiquitination substrates recognized by the FBXW4 WD40 propeller, and which signaling pathways (e.g. Wnt) do they belong to?
- question: Given that SHFM3 is associated with a tandem duplication at 10q24 rather than FBXW4 coding mutations, is the limb phenotype due to altered FBXW4 dosage, a neighboring gene, or a regulatory element, and what is FBXW4's direct molecular contribution?
suggested_experiments:
- description: Affinity purification of tagged FBXW4 with SKP1/CUL1/RBX1 followed by mass spectrometry of co-purifying and ubiquitinated proteins, in limb-bud-derived or epithelial cells, to identify physiological SCF(FBXW4) substrates.
- description: Reconstitute SCF(FBXW4) in vitro with SKP1, CUL1, RBX1 and an E2 and test ubiquitination of candidate developmental-signaling substrates, comparing wild-type to F-box-deletion FBXW4 to confirm substrate-adaptor activity.
