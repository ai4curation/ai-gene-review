proposed_new_terms:
- proposed_name: ubiquitin-like ligase-substrate adaptor activity
  proposed_definition: Bridging a substrate to a ubiquitin-like protein ligase, as performed by an SCF F-box substrate-recognition subunit that binds both SKP1/the ligase scaffold and the substrate to facilitate the substrate's ubiquitination. This corresponds to the existing GO term GO:1990756, which is not currently in FBXW4's annotation set.
  justification: FBXW4 assembles with the SCF core (SKP1/CUL1/RBX1) and the COP9 signalosome in an F-box-dependent manner and associates with ubiquitinated proteins in a proteasome-inhibitor-dependent way, consistent with a substrate-adaptor molecular function rather than catalysis (which is RBX1's). Adding GO:1990756 would give FBXW4 an informative molecular-function term in place of the uninformative bare protein binding annotations.
