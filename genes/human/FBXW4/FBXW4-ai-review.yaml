- id: PMID:10405324
  title: A novel human gene encoding an F-box/WD40 containing protein maps in the
    SHFM3 critical region on 10q24.
  findings:
  - statement: Cloning of human Dactylin/FBXW4, an F-box/WD40 protein at 10q24.3 within the SHFM3 critical region; expressed in brain, kidney, lung and liver; proposed as a candidate gene for split hand/foot malformation acting via ubiquitination of signaling-pathway proteins in limb development.
    reference_section_type: ABSTRACT
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: PubMed-verified original cloning; source of the SHFM3-locus and embryonic limb morphogenesis annotations. Limb role is positional/candidate-gene based, not a demonstrated molecular mechanism.
- id: PMID:10471509
  title: A novel member of the F-box/WD40 gene family, encoding dactylin, is disrupted
    in the mouse dactylaplasia mutant.
  findings:
  - statement: Positional cloning of the mouse dactylaplasia (Dac) gene identifies dactylin (Fbxw4 ortholog); Dac disrupts maintenance of the apical ectodermal ridge and truncates the autopod, resembling human SHFM, demonstrating the importance of the F-box/WD40 family in vertebrate limb development.
    reference_section_type: ABSTRACT
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: PubMed-verified; genetic basis for the limb development annotation via the dactylaplasia mouse.
- id: PMID:10945468
  title: cDNA cloning and expression analysis of new members of the mammalian F-box
    protein family.
  findings:
  - statement: Cloning of 10 mammalian F-box proteins including FBWD4 (FBXW4) which contains WD40-repeat domains; F-box proteins are substrate-recognition components of SCF ubiquitin-protein ligase complexes with distinct roles in ubiquitin-dependent degradation.
    reference_section_type: ABSTRACT
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: PubMed-verified family cloning paper; source of generic ubiquitin ligase complex and ubiquitin-dependent catabolic process annotations.
