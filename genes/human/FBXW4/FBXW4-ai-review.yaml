- id: file:human/FBXW4/FBXW4-deep-research-falcon.md
  title: Falcon deep research report for human FBXW4
  findings:
  - statement: FBXW4 assembles with the canonical SCF core (SKP1, CUL1, RBX1) and with COP9 signalosome subunits in an F-box-dependent manner, providing direct biochemical evidence (beyond family inference) that it is an SCF substrate-recognition subunit rather than an enzyme or transporter.
    supporting_text: FBXW4 co-purifies/interacts with **SKP1, CUL1, RBX1** and multiple **COP9 signalosome (COPS)** subunits, and these interactions are **F-box dependent**
  - statement: FBXW4 associates with ubiquitinated cellular proteins, and this association increases upon proteasome inhibition in an F-box-dependent way, consistent with substrate engagement in ubiquitin-dependent turnover.
    supporting_text: FBXW4 interacts with **ubiquitinated cellular proteins**, and the interaction increases with **proteasome inhibition (MG132)** in an **F-box-dependent** manner, consistent with substrate engagement in ubiquitin-dependent turnover pathways
  - statement: The endogenous substrate(s) of SCF(FBXW4) remain undefined; the primary biochemical study frames substrate identification as a future direction.
    supporting_text: 'The specific endogenous **substrate(s)** targeted by SCF^FBXW4 remain insufficiently defined in the retrieved evidence; the 2013 study frames substrate identification as a future direction'
  - statement: FBXW4 is recurrently mutated, lost, and under-expressed across human cancers, consistent with a possible tumor-suppressor role, though causal substrates/pathways are unclear.
    supporting_text: FBXW4 is mutated, lost, and under-expressed in human cancers, and argue this pattern is consistent with a potential **tumor suppressor** role, though definitive causal substrates/pathways remain unclear
  - statement: SHFM3 at 10q24 is best explained as a cis-regulatory / multi-gene misexpression disorder; recurrent duplications include FBXW4 with neighboring genes, and enhancer perturbation in mouse alters Fbxw4 expression rather than acting through an FBXW4 coding mutation.
    supporting_text: SVs likely perturb **cis-regulatory elements**, **3D chromatin architecture**, and/or coordinated expression of multiple genes in the region
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: Falcon synthesis grounded chiefly in Lockwood et al. 2013 (PLoS ONE, doi:10.1371/journal.pone.0063610), which provides the first direct biochemical evidence that FBXW4 is an SCF substrate receptor (F-box-dependent assembly with SKP1/CUL1/RBX1 and the COP9 signalosome; MG132-dependent association with ubiquitinated proteins). Cross-checked against UniProt P57775 SUBUNIT/FUNCTION statements and ComplexPortal CPX-7761. SHFM3 cis-regulatory-neighborhood model is consistent with the UniProt SHFM3 disease note and the prior SHFM3 cloning/mapping literature already cited in this review.
core_functions:
- description: Substrate-recognition (substrate-adaptor) subunit of an SCF (SKP1-CUL1-F-box) cullin-RING E3 ubiquitin ligase complex, docking via its F-box motif onto SKP1/CUL1 and using its WD40 propeller to recruit substrates and bridge them to the ligase for SCF-dependent proteasomal degradation. FBXW4 itself is not catalytic; the ubiquitin-transfer/RING activity resides on the RBX1 subunit of the assembled SCF complex. Direct physiological substrates of SCF(FBXW4) remain undefined.
