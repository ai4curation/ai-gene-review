proposed_new_terms:
- proposed_name: protoporphyrinogen IX biosynthetic process
  proposed_definition: >-
    The chemical reactions and pathways resulting in the formation of protoporphyrinogen
    IX from coproporphyrinogen III, the immediate product of the coproporphyrinogen oxidase
    reaction in the heme biosynthetic pathway.
  justification: >-
    The most direct biological-process term for CPOX's step is the biosynthesis of
    protoporphyrinogen IX, the immediate product of the coproporphyrinogen oxidase reaction.
    This is more specific than the broadly-annotated heme biosynthetic process. The term
    already exists as GO:0006782 (it is listed in the UniProt DR GO section as
    IDA:UniProt) but is absent from the seeded GOA; adding it would capture the enzyme's
    direct product-level role.
  supported_by:
  - reference_id: PMID:8159699
    supporting_text: >-
      the oxidation of coproporphyrinogen III to protoporphyrinogen IX
  - reference_id: file:human/CPOX/CPOX-uniprot.txt
    supporting_text: >-
      protoporphyrinogen-IX from coproporphyrinogen-III (O2
suggested_questions:
- question: >-
    What is the physiological basis for the mitochondrial intermembrane-space localization,
    and how is coproporphyrinogen III delivered from the cytosol and protoporphyrinogen IX
    handed off to the inner-membrane protoporphyrinogen oxidase (PPOX)?
- question: >-
    Why do a small subset of CPOX mutations (e.g. K404E, H327R) produce the erythropoietic
    harderoporphyria phenotype rather than classic hereditary coproporphyria?
suggested_experiments:
- description: >-
    Steady-state and single-turnover kinetics of purified recombinant human CPOX homodimer
    to define the two sequential decarboxylation steps and the role of O2 as electron
    acceptor.
- description: >-
    Structure-guided mutagenesis of the exon-6-encoded dimer interface (residues 392-418)
    and active-site residues (Ser-244, His-258, Asn-260, Arg-262, Asp-282, Arg-332) to
    correlate dimerization/catalysis with HCP vs HARPO disease phenotypes.
