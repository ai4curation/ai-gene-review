core_functions:
- description: >-
    Oxygen-dependent coproporphyrinogen-III oxidase catalyzing the sixth step of heme
    biosynthesis: the O2-dependent oxidative decarboxylation of the propionate side chains
    on rings A and B of coproporphyrinogen III to vinyl groups, forming protoporphyrinogen
    IX. Acts as a homodimer in the mitochondrial intermembrane space.
