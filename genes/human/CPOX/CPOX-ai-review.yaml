id: P36551
gene_symbol: CPOX
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  CPOX encodes oxygen-dependent coproporphyrinogen-III oxidase (EC 1.3.3.3), the
  enzyme that catalyzes the sixth step of heme biosynthesis. It carries out the
  aerobic (O2-dependent) oxidative decarboxylation of the propionate side chains on
  rings A and B of coproporphyrinogen III to yield the vinyl groups of
  protoporphyrinogen IX, releasing 2 CO2 and 2 H2O. The enzyme is unusual in being
  metal- and cofactor-independent and functions as a homodimer. It is a nuclear-encoded
  mitochondrial protein that, after cleavage of an N-terminal transit peptide, localizes
  to the mitochondrial intermembrane space in association with the inner membrane.
  Loss-of-function mutations cause the acute hepatic porphyria hereditary coproporphyria
  (HCP); a specific set of variants (e.g. K404E, H327R) instead produce the rare
  erythropoietic variant harderoporphyria (HARPO).
