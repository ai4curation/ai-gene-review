core_functions:
- description: Substrate-recognition (F-box) adaptor of the SCF(FBXO7) E3 ubiquitin
    ligase complex (CUL1-SKP1-RBX1-FBXO7) that recruits substrates (e.g. DLGAP5/HURP,
    BIRC2/cIAP1, TRAF2, UXT-V2, SIRT7) via its proline-rich region and Ubl/FP regions
    and bridges them to the catalytic cullin-RING core for K48-linked polyubiquitination
    and proteasomal degradation.
  molecular_function:
    id: GO:1990756
    label: ubiquitin-like ligase-substrate adaptor activity
  locations:
  - id: GO:0005829
    label: cytosol
  - id: GO:0019005
    label: SCF ubiquitin ligase complex
  supported_by:
  - reference_id: PMID:36646384
    supporting_text: FBXO7 is an adaptor protein in the SKP1-Cullin-1-F-box (SCF) E3 ligase complex that facilitates the ubiquitination of substrates.
  - reference_id: PMID:15145941
    supporting_text: Thus, Fbx7 is a functional adaptor of the SCF complex with a proline-rich region as the substrate-binding module.
  directly_involved_in:
  - id: GO:0031146
    label: SCF-dependent proteasomal ubiquitin-dependent protein catabolic process
- description: SCF-independent regulator of mitophagy that relocates from the cytosol
    to depolarized mitochondria downstream of PINK1, interacts with PINK1 and PRKN/Parkin
    via its N-terminal Ubl region, and promotes Parkin recruitment to mitochondria
    and mitofusin ubiquitination to drive selective autophagic clearance of damaged
    mitochondria.
  molecular_function:
    id: GO:1990756
    label: ubiquitin-like ligase-substrate adaptor activity
  locations:
  - id: GO:0005739
    label: mitochondrion
  - id: GO:0005829
    label: cytosol
  supported_by:
  - reference_id: PMID:23933751
    supporting_text: Here we show that Fbxo7 participates in mitochondrial maintenance through direct interaction with PINK1 and Parkin and acts in Parkin-mediated mitophagy.
  directly_involved_in:
  - id: GO:1901526
    label: positive regulation of mitophagy
- description: Negative regulator of canonical NF-kappa-B signaling, achieved by SCF(FBXO7)-mediated
    K48/K63 polyubiquitination and proteasomal degradation of the NF-kappa-B cofactor
    UXT isoform 2 (and ubiquitination of TRAF2 and cIAP1/BIRC2).
  molecular_function:
    id: GO:1990756
    label: ubiquitin-like ligase-substrate adaptor activity
  locations:
  - id: GO:0005634
    label: nucleus
  - id: GO:0005829
    label: cytosol
  supported_by:
  - reference_id: PMID:33010352
    supporting_text: 'Together, our study reveals that SCF(Fbxo7) mediates the proteasomal degradation of UXT-V2 causing the inhibition of the NF-κB signaling pathway.'
  directly_involved_in:
  - id: GO:0043124
    label: negative regulation of canonical NF-kappaB signal transduction
proposed_new_terms: []
suggested_questions:
- question: To what extent are FBXO7's SCF-dependent substrate-degradation roles (HURP, cIAP1, TRAF2, UXT-V2, SIRT7) and its SCF-independent roles (PINK1/Parkin mitophagy, PSMF1/PI31 proteasome regulation, cyclin D/CDK6 activation) separable, and which are most relevant to PARK15 neurodegeneration?
- question: How do the FP domain-mediated FBXO7 homodimerization and FBXO7-PSMF1/PI31 heterodimerization regulate proteasome assembly/activity in neurons, and is this disrupted by PARK15 mutations?
- question: Does FBXO7 directly target PRKN/PINK1 for ubiquitination, or does it act mainly as a non-catalytic scaffold promoting Parkin recruitment to depolarized mitochondria?
suggested_experiments:
- description: Reconstitute SCF(FBXO7) in vitro with purified CUL1, SKP1, RBX1, an E2, and candidate substrates (HURP/DLGAP5, SIRT7, UXT-V2) to confirm that FBXO7 functions as a substrate-presenting adaptor (not the catalytic transferase) and to map substrate lysines and chain linkages.
- description: Perform quantitative ubiquitinome and proteome profiling in FBXO7-knockout versus wild-type neuronal cells under basal and mitochondrial-depolarization (CCCP) conditions to define the endogenous SCF(FBXO7) substrate repertoire and its contribution to mitophagy.
- description: Use live-cell imaging with PARK15 patient-derived neurons (T22M, R378G, R498X) to quantify FBXO7 relocation to depolarized mitochondria and Parkin recruitment kinetics, dissecting how each mutation impairs mitophagy.
