id: Q9Y3I1
gene_symbol: FBXO7
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  FBXO7 (also called FBX7; PARK15) is the substrate-recognition (F-box)
  component of an SCF (SKP1-CUL1-RBX1-F-box) E3 ubiquitin-protein ligase complex,
  SCF(FBXO7). As an F-box protein it acts as a ligase-substrate adaptor: it
  recruits substrates and bridges them, via its F-box domain binding to SKP1, to
  the catalytic cullin-RING core (RBX1), and is not itself the catalytic
  ubiquitin transferase. The protein has a modular architecture comprising an
  N-terminal ubiquitin-like (Ubl) region that mediates binding to the E3 ligase
  PRKN/Parkin, a CDK6-interaction region, an FP (Fbxo7/PI31) dimerization domain
  that mediates homodimerization and interaction with the proteasome inhibitor
  PSMF1/PI31, the F-box domain, and a C-terminal proline-rich region that serves
  as a substrate-binding module. Documented SCF(FBXO7) substrates include the
  cell-cycle regulator DLGAP5/HURP, the inhibitor-of-apoptosis protein
  BIRC2/cIAP1, TRAF2 and the NF-kappa-B cofactor UXT isoform 2 (whose degradation
  inhibits NF-kappa-B signaling), and the NAD+-dependent deacetylase SIRT7 (K48-
  linked polyubiquitination promoting H2O2-induced cell death). Beyond canonical
  SCF activity, FBXO7 has SCF-independent roles: it relocates from the cytosol to
  depolarized mitochondria downstream of PINK1 and promotes PRKN/Parkin
  recruitment and mitofusin ubiquitination to drive selective autophagy of
  damaged mitochondria (mitophagy); it regulates proteasome assembly through
  PSMF1/PI31; and it activates cyclin D/CDK6 complexes to promote cell-cycle
  progression, with proto-oncogenic transforming activity. FBXO7 is predominantly
  cytoplasmic/cytosolic with a minor nuclear pool. Recessive loss-of-function and
  missense mutations (e.g. T22M, R378G, R498X) cause early-onset autosomal
  recessive parkinsonian-pyramidal syndrome (Parkinson disease 15, PARK15).
