id: Q00325
gene_symbol: SLC25A3
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  SLC25A3 is the mitochondrial phosphate carrier (PiC; also PHC, PTP), a member
  of the SLC25 mitochondrial carrier family (TC 2.A.29). It is a nuclear-encoded,
  multi-pass integral protein of the mitochondrial inner membrane built from the
  characteristic tripartite (three-repeat) Solcar fold with six transmembrane
  helices, and is synthesized with an N-terminal transit peptide that is cleaved
  on mitochondrial import. Its principal function is to import inorganic phosphate
  (Pi) from the intermembrane space into the mitochondrial matrix by proton-
  coupled symport (phosphate/H+ symport, equivalently described as Pi/OH-
  exchange). The imported phosphate is the substrate used by F1Fo-ATP synthase
  (Complex V) to phosphorylate ADP to ATP, making PiC an essential component of
  oxidative phosphorylation. It functions as a transporter, not an enzyme. A
  secondary, more recently characterized activity is import of copper ions (as
  anionic Cu(I) complexes) to supply the matrix copper pool required for
  cytochrome c oxidase (Complex IV) biogenesis. Two tissue-differentially
  expressed alternative-splicing isoforms (A and B) differ in part of the first
  transmembrane region. Loss-of-function variants cause mitochondrial phosphate
  carrier deficiency, an autosomal-recessive disorder of oxidative
  phosphorylation with lactic acidosis, hypertrophic cardiomyopathy and hypotonia.
