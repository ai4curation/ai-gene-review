gene_symbol: SLC19A2
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: SLC19A2 encodes thiamine transporter 1 (THTR-1), a polytopic (12-transmembrane)
  plasma-membrane solute carrier of the SLC19 / reduced-folate-carrier (RFC) family that
  mediates high-affinity cellular uptake of thiamine (vitamin B1). It was the first mammalian
  thiamine transporter identified, cloned as the gene mutated in thiamine-responsive
  megaloblastic anemia syndrome (TRMA / Rogers syndrome). Thiamine uptake is Na+-independent
  and driven by an oppositely directed proton gradient (H+/thiamine countertransport). In
  addition to thiamine, THTR-1 transports the vitamin B6 form pyridoxine in a pH-dependent
  (acidic-optimum) manner, though with lower affinity. Unlike its paralog SLC19A1, which is
  the reduced folate carrier, SLC19A2 does not transport folate despite the family name. The
  transporter is broadly expressed with highest levels in skeletal and cardiac muscle, and is
  stabilized at the cell surface through interaction with the tetraspanin TSPAN1. Loss-of-function
  variants cause TRMA, an autosomal recessive disorder of megaloblastic anemia, diabetes
  mellitus, and sensorineural deafness that is partially thiamine-responsive.
