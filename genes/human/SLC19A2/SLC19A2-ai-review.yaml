proposed_new_terms:
- proposed_name: pyridoxine transmembrane transporter activity annotation for SLC19A2
  proposed_definition: Molecular function annotation capturing that SLC19A2 (THTR-1) enables
    the transfer of pyridoxine (vitamin B6) across the plasma membrane. The Gene Ontology
    already contains a suitable class, GO:0031928 (pyridoxine transmembrane transporter
    activity); this is a request to add the MF annotation to SLC19A2, which currently carries
    only the biological-process term GO:0031923 (pyridoxine transport) despite direct
    transporter-activity evidence.
  justification: SLC19A2 has direct experimental evidence (IDA, PMID:33008889) and mutagenesis
    evidence (PMID:35724964) that it transports pyridoxine, but the molecular-function
    counterpart (GO:0031928 pyridoxine transmembrane transporter activity) is not annotated;
    only the BP GO:0031923 is present.
  proposed_parent:
    id: GO:0031928
    label: pyridoxine transmembrane transporter activity
