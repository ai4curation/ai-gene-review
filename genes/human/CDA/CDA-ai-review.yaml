  original_reference_id: GO_REF:0000033
  qualifier: involved_in
  review:
    summary: >-
      CDA hydrolytically deaminates 2'-deoxycytidine to 2'-deoxyuridine, so its
      involvement in deoxycytidine catabolism is well supported and phylogenetically
      conserved. This is a genuine part of CDA's core biological role in pyrimidine
      salvage/catabolism.
    action: ACCEPT
    reason: >-
      The 2'-deoxycytidine deamination reaction is a directly characterized CDA activity
      (UniProt catalytic activity; RHEA:13433). Deoxycytidine catabolism is a correct,
      appropriately specific BP for this enzyme.
