  qualifier: involved_in
  review:
    summary: >-
      This ARBA electronic term concerns pyrimidine ribonucleoside MONOPHOSPHATE
      metabolism. CDA acts on the nucleosides cytidine/deoxycytidine, not on the
      monophosphates (CMP/dCMP are not CDA substrates), so the substrate class is wrong.
