id: P32320
gene_symbol: CDA
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  CDA is human cytidine deaminase (EC 3.5.4.5), a cytosolic, zinc-dependent hydrolase
  that catalyzes the hydrolytic deamination of cytidine and 2'-deoxycytidine to uridine
  and 2'-deoxyuridine, releasing ammonia. The active enzyme is a homotetramer with one
  catalytic Zn2+ per subunit, coordinated within a CMP/dCMP-type deaminase fold. By
  recycling exogenous and endogenous (deoxy)cytidine, CDA participates in pyrimidine
  salvage and catabolism, feeding the uridine/UMP pool. Because it deaminates and thereby
  inactivates cytidine-analog nucleoside drugs (e.g. cytarabine, gemcitabine, decitabine,
  azacitidine), CDA is a major determinant of the pharmacology and toxicity of these
  chemotherapeutics, and functional polymorphisms in CDA modulate drug response. CDA is
  highly expressed in granulocytes and, through neutrophil degranulation, its protein can
  be released from cytosolic stores.
