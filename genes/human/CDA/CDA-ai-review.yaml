- id: PMID:9596658
  title: Growth inhibition of granulocyte-macrophage colony-forming cells by human
    cytidine deaminase requires the catalytic function of the protein.
  findings:
  - statement: >-
      Recombinant human CDA is a potent inhibitor of GM-CFC growth; effect requires
      catalytic deaminase activity and depletes the cytidine/deoxycytidine pool. dCMP is
      explicitly not a CDA substrate, confirming CDA acts on nucleosides not monophosphates.
    supporting_text: "protein is essential for the growth suppressive effect of CDD."
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Abstract-only cache; cited by UniProt for FUNCTION and deoxycytidine catalytic
      activity. Establishes catalysis-dependent growth regulation and nucleoside (not
      nucleotide/CMP) substrate specificity.
