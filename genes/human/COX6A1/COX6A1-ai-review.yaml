  - id: file:human/COX6A1/COX6A1-deep-research-falcon.md
    title: Deep research report on COX6A1 (Falcon/Edison Scientific Literature)
    findings:
      - statement: COX6A1 is the ubiquitously expressed subunit VIa1 of mitochondrial
          Complex IV (paralog of the heart/muscle-restricted COX6A2), a nuclear-encoded
          structural subunit positioned at the periphery of the holoenzyme; it
          stabilizes the COX1/COX2/COX3 catalytic core and contributes to dimer
          formation.
      - statement: Pathogenic COX6A1 variants are associated with peripheral neuropathy
          (CMT2/HMSN-like phenotypes) and mitochondrial encephalopathy, reflecting
          tissue-specific consequences of Complex IV deficiency despite COX6A1
          ubiquitous expression.
