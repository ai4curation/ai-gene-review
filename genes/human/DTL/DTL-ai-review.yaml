id: Q9NZJ0
gene_symbol: DTL
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  DTL (also known as CDT2, DCAF2, L2DTL, RAMP) is the substrate-recognition
  subunit (DCAF/substrate receptor) of the CRL4(CDT2) E3 ubiquitin ligase, a
  DDB1-CUL4 (CUL4A or CUL4B)-RBX1 cullin-RING ligase. DTL is a nuclear WD40-repeat
  beta-propeller protein that docks onto the DDB1 adaptor of the CUL4 scaffold via
  its WDXR/DDB1-binding motifs and confers substrate specificity to the complex.
  CRL4(CDT2) couples substrate ubiquitination to DNA-bound (chromatin-loaded) PCNA:
  substrates are recruited through a specialized PIP-degron (a PIP box bearing a
  basic "K+4" residue) that simultaneously engages PCNA on chromatin and the DTL
  propeller, so that ubiquitination occurs specifically at sites of DNA replication
  and repair. Through this PCNA-coupled mechanism CRL4(CDT2) drives the
  polyubiquitination and proteasomal degradation of the replication-licensing factor
  CDT1, the CDK inhibitor CDKN1A/p21, the histone H4K20 methyltransferase SET8/KMT5A,
  the helicase FBH1, and SDE2, and also targets CRY1 to influence the circadian
  clock. This activity prevents DNA re-replication, enforces the radiation-induced
  early G2/M checkpoint, and maintains genome stability. In undamaged proliferating
  cells CRL4(CDT2) additionally monoubiquitinates PCNA at Lys164 to promote
  translesion DNA synthesis. DTL itself is cell-cycle regulated: it peaks in G1/S,
  is degraded in mitosis by APC/C-Cdh1, and is controlled by SCF(FBXO11). DTL
  localizes to the nucleus/nucleoplasm and nuclear matrix, associates with chromatin,
  and is found at the centrosome during mitosis. DTL is frequently overexpressed in
  cancers such as hepatocellular carcinoma.
