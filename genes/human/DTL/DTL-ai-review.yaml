- id: PMID:16861906
  title: L2DTL/CDT2 interacts with the CUL4/DDB1 complex and PCNA and regulates CDT1
    proteolysis in response to DNA damage.
  findings:
  - statement: L2DTL/CDT2 is a conserved WD40 protein that associates with CUL4/DDB1 and PCNA and is required for CDT1 proteolysis after DNA damage.
    reference_section_type: ABSTRACT
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: Foundational study identifying DTL/CDT2 as a CUL4-DDB1- and PCNA-associated factor controlling CDT1 degradation; source of the complex-membership and replication-initiation annotations.
- id: PMID:16949367
  title: A family of diverse Cul4-Ddb1-interacting proteins includes Cdt2, which is
    required for S phase destruction of the replication factor Cdt1.
  findings:
  - statement: Cdt2 is a DCAF (DDB1-CUL4-associated factor) substrate receptor required to destroy Cdt1 in S phase and after DNA damage; depletion causes rereplication and checkpoint activation.
    reference_section_type: ABSTRACT
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: Establishes DTL/Cdt2 as a DCAF/substrate receptor of CUL4-DDB1; source of DDB1/CUL4 interaction, complex membership and DNA-damage-response annotations. R246A DDB1-binding mutant in UniProt.
- id: PMID:17041588
  title: CUL4-DDB1 ubiquitin ligase interacts with multiple WD40-repeat proteins and
    regulates histone methylation.
  findings:
  - statement: CUL4-DDB1 interacts with multiple WD40-repeat proteins including L2DTL/CDT2, which regulates CDT1 proteolysis through CUL4-DDB1.
    reference_section_type: ABSTRACT
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: Source of the DTL-DDB1 IntAct interaction; confirms DTL as a WD40 substrate receptor of CUL4-DDB1.
- id: PMID:17085480
  title: DTL/CDT2 is essential for both CDT1 regulation and the early G2/M checkpoint.
  findings:
  - statement: DTL promotes genomic stability by two mechanisms - as a CUL4-DDB1 component controlling CDT1 levels (preventing rereplication) and as an essential component of the early radiation-induced G2/M checkpoint (CDT1-independent).
    reference_section_type: ABSTRACT
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: Establishes both the CDT1-degradation and the G2/M checkpoint roles in zebrafish and human DTL; source of checkpoint and cell-cycle annotations.
- id: PMID:17106265
  title: Role of L2DTL, cell cycle-regulated nuclear and centrosome protein, in aggressive
    hepatocellular carcinoma.
  findings:
  - statement: L2DTL localizes to the nucleus in interphase and to centrosomes through the cell cycle, is degraded in mitosis by APC/C-Cdh1, and is overexpressed in aggressive HCC.
    reference_section_type: ABSTRACT
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: Source of the IDA nucleus and centrosome localizations and the APC/C-Cdh1 mitotic degradation; also documents an oncogenic overexpression phenotype (non-core).
- id: PMID:18794347
  title: PCNA-dependent regulation of p21 ubiquitylation and degradation via the CRL4Cdt2
    ubiquitin ligase complex.
  findings:
  - statement: PCNA promotes CRL4(Cdt2)-mediated ubiquitylation and UV-induced degradation of p21; Cdt2 is the substrate-recruiting factor and the complex ubiquitylates p21 in vivo and in vitro.
    reference_section_type: ABSTRACT
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: Key mechanistic study of CRL4(CDT2) targeting p21 in a PCNA-dependent manner; source of polyubiquitination, transferase-activity (contributes_to), catabolism and response-to-UV annotations.
- id: PMID:20129063
  title: CRL4(Cdt2) E3 ubiquitin ligase monoubiquitinates PCNA to promote translesion
    DNA synthesis.
  findings:
  - statement: CRL4(Cdt2) monoubiquitinates PCNA at Lys164 in proliferating cells independent of Rad18 and is required for translesion DNA synthesis; antagonized by USP1.
    reference_section_type: ABSTRACT
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: Full text available; establishes the non-degradative PCNA monoubiquitination/TLS activity of CRL4(CDT2); source of monoubiquitination and translesion-synthesis annotations.
- id: PMID:21628527
  title: Selective ubiquitylation of p21 and Cdt1 by UBCH8 and UBE2G ubiquitin-conjugating
    enzymes via the CRL4Cdt2 ubiquitin ligase complex.
  findings:
  - statement: CRL4(Cdt2) uses UBCH8 to degrade p21 and Set8 and monoubiquitinate PCNA, and UBE2G to polyubiquitinate Cdt1, demonstrating substrate-selective E2 usage.
    reference_section_type: ABSTRACT
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: Source of the IDA CRL4A(CDT2) complex membership; defines the E2 enzymes used by the complex for different substrates.
- id: PMID:23213251
  title: TRIM39 regulates cell cycle progression and DNA damage responses via stabilizing
    p21.
  findings:
  - statement: TRIM39 stabilizes p21 and modulates G1/S and G2 checkpoints; DTL interacts with CDKN1A/p21.
    reference_section_type: ABSTRACT
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: Full text available; primarily about TRIM39 but documents the DTL-CDKN1A interaction (p21 is a CRL4(CDT2) substrate).
- id: PMID:26431207
  title: CUL4-DDB1-CDT2 E3 Ligase Regulates the Molecular Clock Activity by Promoting
    Ubiquitination-Dependent Degradation of the Mammalian CRY1.
  findings:
  - statement: CUL4-DDB1-CDT2 ubiquitinates and degrades CRY1 (at Lys585); depletion of Cdt2/Ddb1/Pcna stabilizes CRY1 and alters circadian amplitude.
    reference_section_type: ABSTRACT
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: Establishes CRY1 as a CRL4(CDT2) substrate (circadian role) and provides IDA nuclear localization and IMP ubiquitin-dependent catabolism evidence.
- id: PMID:27906959
  title: PCNA-Dependent Cleavage and Degradation of SDE2 Regulates Response to Replication
    Stress.
  findings:
  - statement: Cleaved SDE2 is degraded by CRL4(CDT2) in a cell-cycle- and DNA-damage-dependent manner; failure to degrade SDE2 impairs S-phase progression and survival.
    reference_section_type: ABSTRACT
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: Full text available; identifies SDE2 as a CRL4(CDT2) substrate in the replication-stress response; source of the DTL-SDE2 interaction.
