suggested_questions:
- question: What structural features of the DTL WD40 propeller distinguish degradative
    polyubiquitination of PIP-degron substrates (CDT1, p21, SET8) from the non-degradative
    Lys164 monoubiquitination of PCNA, and how is the chain-type/processivity outcome selected?
- question: To what extent are DTL's centrosomal and nuclear-membrane localizations functionally
    distinct from its core chromatin-coupled CRL4(CDT2) activity, and do they reflect
    moonlighting roles or storage/relocalization pools?
suggested_experiments:
- description: Reconstitute CRL4(CDT2) ubiquitination in vitro with purified DDB1, CUL4A/B,
    RBX1 and DTL on PIP-degron substrates (CDT1, p21, SET8) loaded onto PCNA-DNA, and on
    PCNA itself, to dissect how DTL determines mono- versus poly-ubiquitination outcomes.
- description: Perform degron-tagged DTL depletion combined with quantitative proteomics
    and ubiquitinome profiling across the cell cycle and after UV/IR to define the complete
    endogenous CRL4(CDT2) substrate repertoire and its dependence on PCNA loading.
