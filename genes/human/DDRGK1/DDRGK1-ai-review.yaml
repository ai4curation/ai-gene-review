id: Q96HY6
gene_symbol: DDRGK1
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: DDRGK1 (DDRGK domain-containing protein 1; also called UFBP1, Dashurin)
  is a single-pass endoplasmic-reticulum membrane protein that is an obligate component
  of the UFM1 ribosome E3 ligase (UREL) complex, together with the E3 ligase UFL1 and
  CDK5RAP3. DDRGK1 tethers the complex to the ER membrane through its N-terminal transmembrane
  helix, thereby restricting ufmylation activity to ER-docked ribosomes, and stabilizes
  UFL1. Following mono-ufmylation of the 60S ribosomal protein RPL26/uL24, DDRGK1 acts
  as a UFM1 reader, in that its UFM1-interacting motif (UFIM) binds ufmylated RPL26,
  producing stable association of the 60S subunit with the UREL complex and promoting
  release and recycling of the large subunit from SEC61 translocons. DDRGK1 is itself
  a substrate of ufmylation (at Lys-267). Through ER-resident ufmylation it participates
  in ribosome recycling, reticulophagy (ER-phagy), the response to ER stress and the
  unfolded protein response (regulating IRE1-alpha/ERN1 stability). Biallelic loss-of-function
  variants cause Shohat-type spondyloepimetaphyseal dysplasia, reflecting a role in
  cartilage development via SOX9 stabilization.
