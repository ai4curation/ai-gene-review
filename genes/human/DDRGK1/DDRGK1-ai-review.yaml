suggested_questions:
- question: Is ufmylation of DDRGK1 at Lys-267 functionally required for UREL activity
    or is it a collateral consequence of the reaction it scaffolds?
- question: How are the ER-stress/UPR (IRE1-alpha), NF-kappaB and SOX9/cartilage roles
    of DDRGK1 related to its UREL ribosome-recycling function - are they separable
    activities or downstream consequences of ER ufmylation?
suggested_experiments:
- description: Separation-of-function mutants (UFIM-dead vs UFL1-binding-dead vs Lys-267
    ufmylation-dead) tested in 60S-recycling, IRE1-alpha-stability and SOX9-stability
    assays to dissect which DDRGK1 activities drive each phenotype.
- description: Reconstitute the UREL-60S complex with purified components to quantify
    the contribution of DDRGK1 membrane-tethering and UFIM reading to RPL26 ufmylation
    kinetics and 60S release from SEC61.
