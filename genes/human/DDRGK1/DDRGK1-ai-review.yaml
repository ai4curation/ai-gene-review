core_functions:
- description: Obligate ER-membrane-anchored cofactor/substrate-adaptor of the UFM1
    E3 ligase that binds the E3 ligase UFL1 (and CDK5RAP3) to form the UREL complex,
    tethering ufmylation activity to ER-docked ribosomes and stabilizing UFL1.
  molecular_function:
    id: GO:0044389
    label: ubiquitin-like protein ligase binding
  locations:
  - id: GO:0005789
    label: endoplasmic reticulum membrane
  supported_by:
  - reference_id: file:human/DDRGK1/DDRGK1-uniprot.txt
    supporting_text: Mediates interaction with UFL1
  - reference_id: file:human/DDRGK1/DDRGK1-uniprot.txt
    supporting_text: DDRGK1 tethers the complex to the endoplasmic reticulum membrane
- description: UFM1-modified protein reader that, via its UFM1-interacting motif (UFIM),
    specifically binds ufmylated RPL26/uL24 on the 60S ribosome, producing stable association
    of the 60S subunit with the UREL complex and promoting release/recycling of the
    large subunit from the ER translocon.
  molecular_function:
    id: GO:0141185
    label: UFM1-modified protein reader activity
  locations:
  - id: GO:0005789
