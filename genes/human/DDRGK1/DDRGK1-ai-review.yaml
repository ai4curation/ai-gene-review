- id: PMID:20018847
  title: A novel type of E3 ligase for the Ufm1 conjugation system.
  findings:
  - statement: DDRGK1 interacts with the UFM1 E3 ligase UFL1 and is ufmylated at Lys-267;
      it localizes to the ER.
    reference_section_type: ABSTRACT
- id: PMID:20228063
  title: A novel C53/LZAP-interacting protein regulates stability of C53/LZAP and
    DDRGK domain-containing Protein 1 (DDRGK1) and modulates NF-kappaB signaling.
  findings:
  - statement: DDRGK1 interacts with CDK5RAP3/C53 and its stability is co-regulated;
      it modulates NF-kappaB signaling.
    reference_section_type: ABSTRACT
- id: PMID:23675531
  title: DDRGK1 regulates NF-kappaB activity by modulating IkappaBalpha stability.
  findings:
  - statement: DDRGK1 modulates NF-kappaB activity by regulating NFKBIA/IkappaB-alpha
      stability.
    reference_section_type: ABSTRACT
- id: PMID:25219498
  title: Modification of ASC1 by UFM1 is crucial for ERalpha transactivation and breast
    cancer development.
  findings:
  - statement: DDRGK1 interacts with UFL1 and is required for TRIP4/ASC1 ufmylation,
      affecting ERalpha transactivation.
    reference_section_type: ABSTRACT
- id: PMID:28128204
  title: A critical role of DDRGK1 in endoplasmic reticulum homoeostasis via regulation
    of IRE1alpha stability.
  findings:
  - statement: DDRGK1 interacts with ERN1/IRE1-alpha in a UFM1-dependent manner and
      regulates its stability, inhibiting the IRE1 arm of the UPR.
    reference_section_type: ABSTRACT
  reference_review:
