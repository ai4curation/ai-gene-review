description: B3GALNT1 (UDP-GalNAc:beta-1,3-N-acetylgalactosaminyltransferase 1; also
  known as beta-1,3-galactosyltransferase 3/beta3Gal-T3/B3GALT3, or globoside synthase)
  is a Golgi-resident, single-pass type II membrane glycosyltransferase of the GT31
  (glycosyltransferase 31) family. It catalyzes the beta-1,3 transfer of N-acetylgalactosamine
  from UDP-GalNAc onto globotriaosylceramide (Gb3Cer/CD77), producing globoside (Gb4Cer/globotetraosylceramide)
  in the globo-series branch of glycosphingolipid biosynthesis; the reaction requires
  Mg2+ (EC 2.4.1.79). Globoside (Gb4) is the P blood-group antigen and the most abundant
  neutral glycosphingolipid of the human erythrocyte membrane. B3GALNT1 is expressed
  most highly in heart and brain. Genetic variation in B3GALNT1 determines the P1PK
  and GLOB blood-group systems, and loss-of-function variants cause the rare P antigen-deficient
  (P-null/Pk) phenotypes.
