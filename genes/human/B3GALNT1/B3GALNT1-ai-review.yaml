- term:
    id: GO:0008499
    label: N-acetyl-beta-D-glucosaminide beta-(1,3)-galactosyltransferase activity
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: enables
  review:
    summary: This is the family-level GT31 activity (transfer of galactose onto a beta-GlcNAc
      acceptor) catalyzed by paralogs such as B3GALT1/2/4/5. B3GALNT1 does not catalyze
      this reaction; it transfers GalNAc onto a galactose acceptor (Gb3Cer). The primary
      paper explicitly notes that members of this family do not necessarily use the
      same acceptor or sugar donor.
    action: MODIFY
    reason: IBA propagated the ancestral family activity, but the demonstrated activity
      of this member is Gb4 (globoside) synthase, so the specific MF should replace
      it.
    proposed_replacement_terms:
    - id: GO:0047273
      label: galactosylgalactosylglucosylceramide beta-D-acetylgalactosaminyltransferase
        activity
    propagation_review:
      root_cause: PROPAGATION_BAD
      failure_modes:
      - WRONG_ORTHOLOG_OR_PARALOG
      - FUNCTIONAL_DIVERGENCE
      source_entities:
      - source_id: UniProtKB:Q9Y5Z6
        source_status: SUPPORTS_SOURCE_BUT_NOT_TARGET
        comment: B3GALT5 and other GT31 paralogs genuinely transfer galactose onto
          beta-GlcNAc acceptors; B3GALNT1 diverged to transfer GalNAc onto a galactose
          (Gb3) acceptor, so the family MF should not propagate to it.
      - source_id: PANTHER:PTN007495810
        source_status: SUPPORTS_SOURCE_BUT_NOT_TARGET
        comment: Ancestral GT31 galactosyltransferase activity; the specific member
          catalyzes the distinct Gb4 synthase reaction (GO:0047273).
