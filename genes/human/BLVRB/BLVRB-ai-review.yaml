- id: PMID:27207795
  title: >-
    BLVRB redox mutation defines heme degradation in a metabolic pathway of enhanced thrombopoiesis
    in humans.
  findings:
  - statement: >-
      A loss-of-function redox mutation BLVRB(S111L), a defective flavin/BV IXbeta redox coupler,
