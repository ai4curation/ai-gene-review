id: Q15078
gene_symbol: CDK5R1
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: CDK5R1 encodes the neuronal CDK5 activator p35 and its calpain-cleaved
  p25 fragment. Its core function is to bind and activate CDK5 as a regulatory subunit
  of the protein kinase 5 complex, thereby supporting neuronal development, neurite
  and axon growth, cortical lamination, dendritic-spine and cytoskeletal regulation,
  and p25-linked neurodegenerative stress signaling. p35 is myristoylated and membrane/neuron-projection
  associated, while p25 is more stable and relocalizes CDK5 activity to cytoplasmic,
  nuclear, and perinuclear compartments. In the proteostasis-network context, CDK5R1
  is relevant mainly as the CDK5 activator in CDK5-mediated induced autophagy evidence,
  but the direct human autophagy experiment is CDK5-SH3GLB1/endophilin B1 centered
  rather than CDK5R1-specific.
