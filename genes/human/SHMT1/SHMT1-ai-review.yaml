  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: is_active_in
  review:
    summary: >-
      SHMT1 is the CYTOSOLIC isozyme; the mitochondrial activity in the SHMT family is
      carried out by the separate paralog SHMT2 (P34897). This IBA is a mis-propagation
      from mitochondrial orthologs across the family tree (the with/from list mixes
      cytosolic and mitochondrial SHMTs and plant/fungal mitochondrial orthologs).
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      SHMT1 is not a mitochondrial protein; UniProt localizes it to cytoplasm and nucleus
      only. The mitochondrion call is a phylogenetic branch artifact from SHMT2-type
      orthologs and should not be treated as a real localization.
