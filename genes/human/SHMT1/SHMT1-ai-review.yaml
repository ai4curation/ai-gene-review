id: P34896
gene_symbol: SHMT1
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  SHMT1 is the cytosolic isozyme of serine hydroxymethyltransferase, a
  pyridoxal-5'-phosphate (PLP)-dependent enzyme (EC 2.1.2.1) that catalyzes the
  reversible transfer of a one-carbon unit from L-serine to tetrahydrofolate,
  producing glycine and (6R)-5,10-methylenetetrahydrofolate. This is the principal
  source of activated one-carbon units in the cytosol, feeding folate-dependent de
  novo thymidylate and purine synthesis and the methionine/methylation cycle, and
  interconverting the serine and glycine pools. The enzyme is a homotetramer
  ("dimer of dimers") that binds PLP through a Schiff base to a conserved active-site
  lysine (Lys-257). Beyond its canonical activity it also cleaves other 3-hydroxy
  amino acids (L-allo-threonine, L-threonine, 3-phenylserine) and
  3-hydroxy-N6,N6,N6-trimethyl-L-lysine (HTML) by retro-aldol chemistry, the last of
  these providing a low-efficiency backup for the second step of carnitine
  biosynthesis. SHMT1 also acts as an RNA-binding protein: it binds its own mRNA
  5'-UTR and undergoes RNA-mediated allosteric riboregulation that biases the enzyme
  toward glycine-to-serine conversion and coordinates cytosolic and mitochondrial
  one-carbon flux. A pool of SHMT1 translocates to the nucleus in a SUMO- and
  RAN-dependent manner during S/G2-M phase, where it scaffolds the de novo
  thymidylate synthesis complex (with DHFR and thymidylate synthase) at the nuclear
  lamina and at DNA replication sites.
