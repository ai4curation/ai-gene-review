core_functions:
- description: >-
    Cytosolic serine hydroxymethyltransferase: a PLP-dependent enzyme that catalyzes the
    reversible transfer of a one-carbon unit from L-serine to (6S)-tetrahydrofolate, producing
    glycine and (6R)-5,10-methylenetetrahydrofolate (EC 2.1.2.1). This is the major cytosolic
    source of activated one-carbon units for folate-dependent thymidylate/purine synthesis and
    the methylation cycle, and it interconverts the serine and glycine pools. The active enzyme
    is a homotetramer that binds pyridoxal 5'-phosphate at the active site.
  molecular_function:
    id: GO:0004372
    label: glycine hydroxymethyltransferase activity
  directly_involved_in:
  - id: GO:0006730
    label: one-carbon metabolic process
  - id: GO:0035999
    label: tetrahydrofolate interconversion
  - id: GO:0006563
    label: L-serine metabolic process
  - id: GO:0006545
    label: glycine biosynthetic process
  locations:
  - id: GO:0005829
    label: cytosol
  supported_by:
  - reference_id: file:human/SHMT1/SHMT1-uniprot.txt
    supporting_text: >-
      reversible conversion of serine and tetrahydrofolate (THF) to glycine
  - reference_id: PMID:24698160
    supporting_text: >-
      catalyzes the transfer of a hydroxymethyl
  - reference_id: PMID:9753690
    supporting_text: >-
      SHMT catalyses the retro-aldol cleavage of serine to glycine, with the resulting
      hydroxymethyl group being transferred to tetrahydrofolate to form 5,
