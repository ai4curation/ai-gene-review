core_functions:
- description: >-
    Pyridoxal kinase activity: PDXK phosphorylates the 5' hydroxyl of the vitamin B6
    vitamers pyridoxal (and also pyridoxine and pyridoxamine) using ATP, producing
    pyridoxal 5'-phosphate (PLP) — the committed step of vitamin B6 (PLP) salvage in
    the cytosol. Catalysis requires ATP (with Mg2+/Zn2+ as the divalent metal
    cofactor) and the active-site proton acceptor Asp235.
