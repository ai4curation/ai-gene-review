  title: Human pyridoxal kinase. cDNA cloning, expression, and modulation by ligands
    of the benzodiazepine receptor.
  findings:
  - statement: >-
      cDNA cloning and expression confirm the protein is human pyridoxal kinase;
      ubiquitously expressed, abundant in testis, and inhibited by benzodiazepine
      receptor ligands.
    reference_section_type: ABSTRACT
    supporting_text: >-
      Transient expression of the cDNA in human embryonic kidney cells confirmed that
      it encodes human pyridoxal kinase.
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Original cloning/characterization of human PDXK; establishes identity,
      kinetics, tissue distribution, and cytosolic location.
- id: PMID:9252787
  title: Kinetic studies of the effects of K+, Na+ and Li+ on the catalytic activity
    of human erythrocyte pyridoxal kinase.
  findings:
  - statement: >-
      Monovalent cations activate human erythrocyte pyridoxal kinase; K+ is the most
      effective, Na+ increases Vmax and ATP affinity, and Li+ is a poor activator.
    reference_section_type: ABSTRACT
    supporting_text: >-
      Among them, K+ is the most effective, improving both PK affinity for the
      substrates and maximal velocity.
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: >-
      Kinetic study of the monovalent-cation activation (K+/Na+/Li+); supports the
      regulatory cation-binding annotations (Li+ only a poor activator).
