    supporting_text: >-
      Pyridoxal kinase catalyzes the phosphorylation of pyridoxal (PL) to pyridoxal
      5'-phosphate (PLP).
  - reference_id: PMID:31187503
    supporting_text: >-
      Low PDXK ATP binding resulted in decreased erythrocyte PDXK activity and low
      pyridoxal 5'-phosphate (PLP) concentrations.
- description: >-
    ATP binding: PDXK binds ATP as the phosphate donor for the kinase reaction; the
    MgATP complex is coordinated at the active site by Mg2+ and a monovalent cation.
