- id: PMID:31187503
  title: PDXK mutations cause polyneuropathy responsive to pyridoxal 5'-phosphate
    supplementation.
  findings:
  - statement: >-
      Biallelic PDXK mutations reduce enzyme activity and cellular PLP, causing an
      autosomal recessive axonal polyneuropathy with optic atrophy that responds to
      PLP supplementation.
    reference_section_type: ABSTRACT
    supporting_text: >-
      Low PDXK ATP binding resulted in decreased erythrocyte PDXK activity and low
      pyridoxal 5'-phosphate (PLP) concentrations.
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Disease-gene discovery with functional validation; IMP support for the kinase
      activity and PLP salvage process, and clinical proof of physiological role.
