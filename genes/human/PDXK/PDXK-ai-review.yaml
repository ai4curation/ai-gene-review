id: O00764
gene_symbol: PDXK
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  PDXK is human pyridoxal kinase (EC 2.7.1.35), the cytosolic salvage enzyme of
  vitamin B6 metabolism. Using ATP and a divalent metal cofactor, it phosphorylates
  the three dietary B6 vitamers — pyridoxal, pyridoxine and pyridoxamine — at their
  5' hydroxyl to yield pyridoxal 5'-phosphate (PLP), pyridoxine 5'-phosphate and
  pyridoxamine 5'-phosphate. This is the committed step that regenerates PLP, the
  catalytically active form of vitamin B6 and the obligate cofactor for roughly 140
  PLP-dependent enzymes including aminotransferases and decarboxylases. The enzyme
  is a member of the ribokinase-like (pyridoxine kinase) family, functions as a
  homodimer, and requires a divalent cation (Zn2+ is most effective in vitro,
  followed by Co2+, Mn2+ and Mg2+, with Mg2+ coordinating ATP physiologically);
  activity is further enhanced by the monovalent cations K+ and Na+. PDXK is
  ubiquitously expressed, with especially high expression in testis and enhanced
  expression in brain. Biallelic loss-of-function mutations in PDXK cause an
  autosomal recessive axonal sensorimotor polyneuropathy with optic atrophy that is
  responsive to PLP supplementation.
