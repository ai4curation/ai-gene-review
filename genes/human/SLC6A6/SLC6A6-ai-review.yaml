core_functions:
- description: >-
    Sodium- and chloride-coupled secondary active symport of taurine across the
    plasma membrane (2 Na+ : 1 Cl− : 1 taurine), providing high-affinity
    (low-micromolar KM) cellular uptake of taurine. This is the defining activity
    of TauT, demonstrated by cloning/oocyte assays, patient loss-of-function
    variants, and multiple substrate-bound cryo-EM structures.
