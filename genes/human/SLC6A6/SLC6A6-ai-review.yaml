id: P31641
gene_symbol: SLC6A6
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  SLC6A6 (TauT) is the sodium- and chloride-dependent taurine transporter, a
  12-transmembrane member of the SLC6 (sodium:neurotransmitter symporter, SNF)
  family. It catalyses secondary active, Na+- and Cl−-coupled symport of taurine
  (stoichiometry 2 Na+ : 1 Cl− : 1 taurine) across the plasma membrane, providing
  high-affinity (low-micromolar KM) cellular uptake that maintains the high
  intracellular taurine concentrations required for osmoregulation and
  cytoprotection. It also transports, with lower affinity, other beta-amino acids
  and related compounds including beta-alanine, hypotaurine and gamma-aminobutyric
  acid (GABA). The transporter is broadly expressed, most abundantly in placenta
  and skeletal muscle and prominently in retina, heart and kidney, where it is
  essential; in polarized epithelia it can reside on apical (e.g. placental
  microvillous) and/or basolateral membranes. Beyond the plasma membrane, SLC6A6
  can also localize to the mitochondrial inner membrane and import taurine to
  support mitochondrial tRNA modification and mitochondrial translation, with PKA
  phosphorylation of its N-terminal region governing plasma-membrane versus
  mitochondrial targeting. Loss-of-function mutations cause hypotaurinemic retinal
  degeneration and cardiomyopathy (HTRDC), reflecting the transporter's central
  role in taurine homeostasis.
