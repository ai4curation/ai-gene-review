    label: cytosol
  supported_by:
  - reference_id: PMID:19536131
    supporting_text: both p53 and p21 through ubiquitination and proteasome-dependent degradation.
- description: >-
    As an RNA-binding ubiquitin ligase, MKRN1 binds poly(A)/PABPC1 on polysomes, promotes
    ribosome stalling on prematurely polyadenylated mRNAs, and ubiquitinates the 40S protein
    RPS10 and PABPC1 to trigger ribosome-associated quality control of poly(A) translation.
  molecular_function:
    id: GO:0061630
    label: ubiquitin protein ligase activity
  locations:
  - id: GO:0005829
    label: cytosol
  supported_by:
  - reference_id: PMID:31640799
    supporting_text: MKRN1 depletion abrogates ribosome stalling at A-rich sequences and results in reduced ubiquitylation of RPS10 and PABPC1.
