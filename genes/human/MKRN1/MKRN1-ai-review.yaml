proposed_new_terms: []
suggested_questions:
- How is MKRN1 substrate choice partitioned between its nucleocytoplasmic targets (p53, p21, TERT) and its ribosome-associated RQC substrates (RPS10, PABPC1)?
- Is MKRN1's poly(A)-RQC role redundant with or distinct from that of its paralogs MKRN2/3, and how does it interface with ZNF598 and LTN1?
suggested_experiments:
- Ribosome profiling and ubiquitin-remnant proteomics in MKRN1-knockout versus rescue (RING-dead and RNA-binding-dead mutants) to separate catalytic from RNA-binding contributions to poly(A) stalling.
- Reconstituted in vitro RQC assays with poly(A)-stalled ribosomes to test the order of MKRN1, ZNF598 and LTN1 ubiquitylation events.
