core_functions:
- description: >-
    MKRN1 is a RING-type E3 ubiquitin-protein ligase that catalyzes ubiquitin transfer onto
    substrate lysines, targeting substrates (p53, CDKN1A/p21, TERT, FILIP1, and ribosome-
    associated RPS10/PABPC1) for regulation or proteasomal degradation.
  molecular_function:
    id: GO:0061630
    label: ubiquitin protein ligase activity
