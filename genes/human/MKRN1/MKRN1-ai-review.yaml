gene_symbol: MKRN1
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  MKRN1 (makorin RING finger protein 1; RNF61) is a cytoplasmic RNA-binding RING-type
  E3 ubiquitin ligase of the makorin family. It combines a C3HC4 RING domain, which
  confers ubiquitin-protein ligase activity, with multiple CCCH/C3H zinc-finger motifs
  that mediate RNA binding. MKRN1 ubiquitinates several substrate proteins - including
  p53/TP53 (which it suppresses under normal conditions to keep cells alive), the CDK
  inhibitor CDKN1A/p21 (which it degrades under stress to promote apoptosis), the
  telomerase catalytic subunit TERT (acting as a negative regulator of telomerase), and
  FILIP1 - thereby influencing cell-cycle arrest, apoptosis and telomere maintenance.
  In addition, MKRN1 acts in ribosome-associated quality control of poly(A) translation:
  by binding the poly(A)-binding protein PABPC1 and associating with polysomes just
  upstream of poly(A) tails, it promotes ribosome stalling on prematurely polyadenylated
  (A-rich) messages and ubiquitinates the 40S ribosomal protein RPS10 and PABPC1,
  positioning it upstream of ZNF598/LTN1 in clearing aberrant nascent chains and
  preventing production of erroneous proteins.
