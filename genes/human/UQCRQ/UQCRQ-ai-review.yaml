core_functions:
- description: >-
    Non-catalytic structural subunit of mitochondrial respiratory Complex III
    (ubiquinol-cytochrome c oxidoreductase / cytochrome b-c1 complex) in the
    mitochondrial inner membrane. UQCRQ contributes to the structural integrity of
    the complex and to its ubiquinone-binding environment (historically the QP-C
    ubiquinone-binding protein); it does not itself carry a catalytic redox centre.
    Through the complex, it participates in electron transfer from ubiquinol to
    cytochrome c during oxidative phosphorylation.
