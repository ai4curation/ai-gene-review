id: O14949
gene_symbol: UQCRQ
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  UQCRQ (cytochrome b-c1 complex subunit 8, also called complex III subunit VIII,
  ubiquinol-cytochrome c reductase complex ubiquinone-binding protein QP-C, or QCR8)
  is a small (82 aa) non-catalytic structural subunit of mitochondrial respiratory
  Complex III (ubiquinol-cytochrome c oxidoreductase / cytochrome b-c1 complex),
  one of the six low-molecular-weight subunits of the 11-subunit enzyme. Complex III
  is an obligate dimer embedded in the mitochondrial inner membrane that catalyzes
  electron transfer from ubiquinol to cytochrome c, coupling this redox reaction to
  proton translocation across the inner membrane (the protonmotive Q cycle) as part
  of the oxidative-phosphorylation electron transport chain. The catalytic redox
  centres reside in cytochrome b, the Rieske iron-sulfur protein (UQCRFS1) and
  cytochrome c1; UQCRQ itself is non-catalytic and was historically identified as the
  ubiquinone-binding protein QP-C, contributing to the ubiquinone-binding environment
  and to complex integrity/assembly. It is a single-pass inner-membrane protein
  (matrix N-terminus, one transmembrane helix, intermembrane-space C-terminus). A
  homozygous Ser45->Phe missense variant causes mitochondrial complex III deficiency,
  nuclear type 4 (MC3DN4), a severe neurological disorder with mitochondrial
  encephalopathy, psychomotor retardation, ataxia and failure to thrive.
