id: Q9Y2L5
gene_symbol: TRAPPC8
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  TRAPPC8 is the mammalian Trs85 ortholog and a TRAPPIII-associated TRAPP subunit. It contributes to
  TRAPPIII/RAB1 trafficking, ER-to-Golgi transport, ATG9 cycling required for autophagy initiation,
  and collagen-cargo secretion through TMEM131/TRAPP III context. Autophagophore recruitment is
  directly supported for TRAPPC8 by mammalian TBC1D14/TRAPPIII/ATG9 evidence.
