suggested_questions:
- question: Should TRAPPC8 receive a direct autophagy or ATG9 trafficking 
    annotation in GOA based on PMID:26711178?
  experts:
  - GO autophagy editors
  - Sharon A. Tooze
- question: Should the collagen biosynthetic process annotation for TRAPPC8 be 
    replaced by ER-to-Golgi vesicle-mediated transport with collagen-cargo 
    context?
  experts:
  - GO extracellular matrix editors
  - GO transport editors
- question: Should TRAPPC8 be curated primarily as a TRAPPIII-specific subunit 
    rather than a generic TRAPP-complex component in human?
  experts:
  - ComplexPortal curators
  - Reactome TRAPP curators
suggested_experiments:
- description: Deplete or rescue TRAPPC8 in mammalian cells and quantify ATG9 
    cycling, omegasome formation, LC3/WIPI2 puncta, and RAB1 activation.
  experiment_type: autophagy trafficking rescue assay
  hypothesis: TRAPPC8-containing TRAPPIII promotes autophagy initiation by 
    maintaining ATG9 cycling through RAB1-dependent trafficking.
- description: Reconstitute TRAPPC8-containing TRAPPIII with and without TBC1D14
    or TMEM131 fragments and measure RAB1 exchange plus cargo membrane 
    recruitment.
  experiment_type: complex reconstitution and RAB1 GEF assay
  hypothesis: TRAPPC8 enables adaptor/cargo-specific recruitment of TRAPPIII 
    while contributing to complex-level RAB1 GEF activity.
- description: Compare collagen secretion, VSVG ER-Golgi transport, and 
    autophagy initiation in TRAPPC8 mutant/rescue cells to separate 
    cargo-specific and general trafficking roles.
  experiment_type: parallel cargo-trafficking assay
  hypothesis: TRAPPC8 supports both general TRAPPIII ER-Golgi traffic and 
    specialized collagen/ATG9 cargo routes.
