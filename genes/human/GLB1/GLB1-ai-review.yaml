id: P16278
gene_symbol: GLB1
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: GLB1 encodes lysosomal acid beta-galactosidase (beta-Gal), a glycosyl
  hydrolase family 35 exoglycosidase (EC 3.2.1.23) that catalyzes the hydrolysis of
  terminal non-reducing beta-D-galactose residues from beta-D-galactosides. Acting
  within the acidic lysosomal lumen, it degrades the ganglioside GM1 (and its asialo
  derivative GA1) by removing the terminal galactose, and degrades the glycosaminoglycan
  keratan sulfate as well as galactose-terminated glycoproteins and oligosaccharides.
  The mature enzyme is a homodimer/high-molecular-weight multimer that functions in
  a lysosomal multienzyme complex with protective protein/cathepsin A (CTSA/PPCA),
  neuraminidase-1 (NEU1), and N-acetylgalactosamine-6-sulfate sulfatase (GALNS); CTSA
  is required to stabilize the active multimer. It is synthesized as a precursor that
  is processed through the endoplasmic reticulum and Golgi before reaching the lysosome.
  Loss of enzyme activity causes the autosomal recessive lysosomal storage diseases
  GM1-gangliosidosis (types 1, 2, and 3) and mucopolysaccharidosis type IVB (Morquio
  B syndrome), which are allelic. A catalytically inactive, alternatively spliced isoform
  (isoform 2; the elastin-binding protein, EBP) instead localizes to the perinuclear
  cytoplasm/cell surface and participates in elastic-fiber assembly (elastogenesis).
