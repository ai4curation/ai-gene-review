gene_symbol: NDUFAF3
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  NDUFAF3 (also known as C3orf60) is a nucleus-encoded, mitochondrially imported
  assembly factor for mitochondrial respiratory chain complex I (NADH:ubiquinone
  oxidoreductase). It is not a structural subunit of the mature holoenzyme and has
  no catalytic activity. NDUFAF3 associates with the mitochondrial inner membrane
  and acts early in complex I biogenesis, tightly interacting with its partner
  factor NDUFAF4 and with the iron-sulfur (IP) core subunits NDUFS2 and NDUFS3 to
  help nucleate and stabilize an early membrane-arm assembly intermediate. Like
  other complex I assembly factors, it associates transiently with assembly
  intermediates and dissociates from the fully assembled complex. Biallelic
  loss-of-function variants in NDUFAF3 cause isolated mitochondrial complex I
  deficiency (nuclear type 18), with phenotypes ranging from fatal neonatal
  mitochondrial disease to Leigh syndrome.
