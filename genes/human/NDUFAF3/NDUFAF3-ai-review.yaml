core_functions:
- description: >-
    NDUFAF3 is an assembly factor required for biogenesis of mitochondrial
    respiratory chain complex I. Acting at the mitochondrial inner membrane, it
    tightly associates with its partner factor NDUFAF4 and with the iron-sulfur
    core subunits NDUFS2 and NDUFS3 to nucleate and stabilize an early membrane-arm
    assembly intermediate. It associates transiently with assembly intermediates
    and is not a subunit of the mature holoenzyme; loss of function causes isolated
    complex I deficiency.
  directly_involved_in:
  - id: GO:0032981
    label: mitochondrial respiratory chain complex I assembly
  locations:
  - id: GO:0005743
    label: mitochondrial inner membrane
  supported_by:
  - reference_id: PMID:19463981
    supporting_text: >-
      We found that NDUFAF3 is a genuine mitochondrial complex I assembly protein
      that interacts with complex I subunits.
    reference_section_type: ABSTRACT
  - reference_id: PMID:19463981
    supporting_text: >-
      Furthermore, we show that NDUFAF3 tightly interacts with NDUFAF4 (C6ORF66),
      a protein previously implicated in complex I deficiency.
    reference_section_type: ABSTRACT
  - reference_id: file:human/NDUFAF3/NDUFAF3-uniprot.txt
    supporting_text: >-
      Essential factor for the assembly of mitochondrial
      NADH:ubiquinone oxidoreductase complex (complex I).
proposed_new_terms: []
suggested_questions:
- question: >-
    What is the precise molecular activity of NDUFAF3 during complex I assembly
    (e.g. scaffolding/bridging of NDUFS2-NDUFS3 with NDUFAF4, membrane insertion
    chaperoning), and could a specific molecular function term beyond generic
    protein binding be defined for it?
  experts:
  - Nijtmans LG
  - Saada A
suggested_experiments:
- hypothesis: >-
    NDUFAF3 bridges the NDUFAF4 partner factor to the NDUFS2/NDUFS3 iron-sulfur
    core subunits to nucleate the early membrane-arm assembly intermediate.
  description: >-
    Structural and biochemical characterization (e.g. cryo-EM of stalled assembly
    intermediates, crosslinking-MS) of the NDUFAF3-NDUFAF4-NDUFS2-NDUFS3 module,
    combined with structure-guided separation-of-function mutants tested for
    complex I assembly rescue in NDUFAF3-null cells.
  experiment_type: structural and functional interaction analysis
