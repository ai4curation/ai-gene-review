core_functions:
- molecular_function:
    id: "GO:0004722"
    label: protein serine/threonine phosphatase activity
  description: "PPP2CA is the catalytic subunit of PP2A, the major cellular Ser/Thr phosphatase. It dephosphorylates\
    \ phosphoserine and phosphothreonine residues on a wide range of protein substrates. EC 3.1.3.16.\
    \ PP2A holoenzymes account for ~50-70% of total cellular Ser/Thr phosphatase activity."
  supported_by:
  - reference_id: "PMID:33243860"
    supporting_text: "the INTAC complex dephosphorylates the carboxy-terminal repeat domain of RNA polymerase\
      \ II at serine-2, -5, and -7"
- molecular_function:
    id: "GO:0180006"
    label: RNA polymerase II CTD heptapeptide repeat S2 phosphatase activity
  description: "As part of the INTAC complex (Integrator + PP2A-AC), PPP2CA dephosphorylates Pol II CTD\
    \ at Ser2 (and also Ser5 and Ser7), driving premature transcription termination of unfavorably configured\
    \ transcripts. This represents a transcription quality checkpoint function."
  supported_by:
  - reference_id: "PMID:33243860"
    supporting_text: "the INTAC complex dephosphorylates the carboxy-terminal repeat domain of RNA polymerase\
      \ II at serine-2, -5, and -7"
