    summary: PPP2CA is present in the cytoplasm.
    action: ACCEPT
    reason: "Well-established cytoplasmic localization supported by UniProt (PMID:16541025, PMID:39032490)\
      \ and consistent with PP2A function in cytoplasmic signaling pathways."
- term:
    id: "GO:0006357"
    label: regulation of transcription by RNA polymerase II
  evidence_type: IEA
  original_reference_id: "GO_REF:0000108"
  review:
    summary: "PPP2CA regulates transcription by RNA Polymerase II through the INTAC complex, which dephosphorylates\
      \ the Pol II CTD."
    action: ACCEPT
    reason: "Well-supported by INTAC complex studies. PPP2CA dephosphorylates Pol II CTD at Ser2, Ser5,\
      \ and Ser7 (PMID:33243860, PMID:34004147), thereby regulating transcription elongation. This IEA\
      \ annotation based on logical inference is correct."
- term:
    id: "GO:0016787"
    label: hydrolase activity
  evidence_type: IEA
  original_reference_id: "GO_REF:0000002"
  review:
    summary: "PPP2CA has hydrolase activity as a phosphoprotein phosphatase that hydrolyzes phospho-ester\
      \ bonds on serine/threonine residues."
    action: ACCEPT
    reason: "This is a correct but very broad parent term. PPP2CA is a hydrolase (phosphoester hydrolysis).\
      \ More specific terms (GO:0004722) are also annotated, but this IEA annotation from InterPro is\
      \ not wrong."
- term:
    id: "GO:0090443"
    label: FAR/SIN/STRIPAK complex
  evidence_type: IEA
  original_reference_id: "GO_REF:0000117"
  review:
    summary: PPP2CA is a component of the STRIPAK complex as the catalytic subunit.
    action: ACCEPT
    reason: "Cryo-EM structure of human STRIPAK at 3.2 A confirms PPP2CA (PP2AC) is a core component,\
      \ directly interacting with PP2AA, STRN3, and STRIP1 (PMID:33633399). STRIPAK regulates Hippo signaling\
      \ by dephosphorylating MST1/2."
    supported_by:
    - reference_id: "PMID:33633399"
      supporting_text: "STRIPAK is established as a noncanonical PP2A complex with four copies of regulatory\
        \ STRN3 for enhanced signal integration"
