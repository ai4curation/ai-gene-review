id: P67775
gene_symbol: PPP2CA
product_type: PROTEIN
status: IN_PROGRESS
taxon:
  id: "NCBITaxon:9606"
  label: Homo sapiens
description: "PPP2CA encodes the catalytic subunit alpha isoform (PP2Acalpha) of protein phosphatase 2A\
  \ (PP2A), a major serine/threonine phosphatase (EC 3.1.3.16) that functions as a heterotrimer with a\
  \ scaffold A subunit and a variable regulatory B subunit. Over 80 distinct PP2A holoenzymes exist, together\
  \ accounting for approximately 50-70% of total cellular Ser/Thr phosphatase activity. Substrate specificity\
  \ is primarily determined by the regulatory B subunit. PPP2CA also functions in two non-canonical complexes:\
  \ the Integrator-PP2A (INTAC) complex, which dephosphorylates Pol II CTD at Ser2/5/7 to regulate transcription;\
  \ and the STRIPAK complex, which regulates Hippo signaling by dephosphorylating MST1/2. Activity is\
  \ regulated by C-terminal Leu309 methylation (by LCMT-1), tail phosphorylation (Tyr307/Thr304), and\
  \ endogenous inhibitors (PABIR1/FAM122A, ARPP19, CIP2A, SET). De novo mutations cause Houge-Janssens\
  \ syndrome 3 (syndromic intellectual disability)."
alternative_products:
- name: 1 (PP2Acalpha1)
  id: P67775-1
- name: 2 (PP2Acalpha2)
  id: P67775-2
  sequence_note: VSP_044320
existing_annotations:
- term:
    id: "GO:0004722"
    label: protein serine/threonine phosphatase activity
  evidence_type: IBA
  original_reference_id: "GO_REF:0000033"
  review:
    summary: "PPP2CA is the catalytic subunit of PP2A, a well-established serine/threonine phosphatase\
      \ (EC 3.1.3.16). This is the core molecular function, supported by extensive biochemical, structural,\
      \ and genetic evidence."
    action: ACCEPT
    reason: "This is the primary molecular function of PPP2CA. PP2A dephosphorylates protein serine/threonine\
      \ residues. Confirmed by crystal structures (PMID:17055435), enzymatic assays (PMID:1848668, PMID:30595372,\
      \ PMID:30611118), and INTAC complex activity (PMID:33243860, PMID:34004147). The deep research confirms\
      \ PP2A accounts for ~50-70% of total Ser/Thr phosphatase activity."
    supported_by:
    - reference_id: "PMID:33243860"
      supporting_text: "the INTAC complex dephosphorylates the carboxy-terminal repeat domain of RNA polymerase\
        \ II at serine-2, -5, and -7"
- term:
    id: "GO:0000278"
    label: mitotic cell cycle
  evidence_type: IBA
  original_reference_id: "GO_REF:0000033"
  review:
    summary: "PP2A is involved in mitotic cell cycle regulation. IBA annotation from phylogenetic analysis."
    action: ACCEPT
    reason: "PP2A has well-established roles in mitotic cell cycle including centromeric cohesin protection\
      \ via SGO1/SGO2 (PMID:16541025, PMID:16580887), spindle checkpoint regulation, and G2/M checkpoint\
      \ (PMID:33108758). The 2024 substrate mapping study showed PPP2CA degradation causes G2/M arrest.\
      \ This IBA annotation is well-supported."
    supported_by:
    - reference_id: "PMID:16541025"
      supporting_text: Shugoshin collaborates with protein phosphatase 2A to protect cohesin
- term:
    id: "GO:0005829"
    label: cytosol
  evidence_type: IBA
  original_reference_id: "GO_REF:0000033"
  review:
    summary: "PPP2CA localizes to the cytosol, which is a well-established localization for PP2A."
    action: ACCEPT
    reason: "PP2A is present in the cytosol as supported by UniProt subcellular location (PMID:16541025,\
      \ PMID:39032490), immunofluorescence, and fractionation studies. The deep research confirms PP2A\
      \ localization includes cytoplasm."
- term:
    id: "GO:0000775"
    label: chromosome, centromeric region
  evidence_type: IEA
  original_reference_id: "GO_REF:0000120"
  review:
    summary: "PPP2CA localizes to centromeric regions during prometaphase, where it protects centromeric\
      \ cohesin via shugoshin."
    action: ACCEPT
    reason: "UniProt explicitly states: 'In prometaphase cells, but not in anaphase cells, localizes at\
      \ centromeres' (PMID:16541025). This is supported by the SGO1/SGO2 interaction and centromeric cohesin\
      \ protection function."
    supported_by:
    - reference_id: "PMID:16541025"
      supporting_text: Shugoshin collaborates with protein phosphatase 2A to protect cohesin
- term:
    id: "GO:0000922"
    label: spindle pole
  evidence_type: IEA
  original_reference_id: "GO_REF:0000044"
  review:
    summary: PPP2CA localizes to spindle poles during mitosis.
    action: ACCEPT
    reason: "UniProt subcellular location states: 'During mitosis, also found at spindle poles' (PMID:16541025).\
      \ This is consistent with PP2A roles in mitotic regulation."
