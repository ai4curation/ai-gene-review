- term:
    id: "GO:0005694"
    label: chromosome
  evidence_type: IEA
  original_reference_id: "GO_REF:0000044"
  review:
    summary: "PPP2CA associates with chromosomes, consistent with its centromeric localization and INTAC\
      \ complex function on chromatin."
    action: ACCEPT
    reason: "UniProt lists Chromosome as a subcellular location (PMID:33243860, PMID:34004147). PP2A is\
      \ recruited to chromatin via the Integrator complex and localizes to centromeres during mitosis\
      \ (PMID:16541025)."
- term:
    id: "GO:0005737"
    label: cytoplasm
  evidence_type: IEA
  original_reference_id: "GO_REF:0000120"
