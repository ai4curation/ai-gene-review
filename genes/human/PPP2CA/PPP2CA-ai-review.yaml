- term:
    id: "GO:0006470"
    label: protein dephosphorylation
  evidence_type: TAS
  original_reference_id: "PMID:2849764"
  review:
    summary: PPP2CA catalyzes protein dephosphorylation as its core biological process.
    action: ACCEPT
    reason: "Protein dephosphorylation is the central biological process catalyzed by PPP2CA/PP2A. Supported\
      \ by extensive evidence including substrate mapping (deep research: 6,280 phosphopeptides increased\
      \ upon PPP2CA degradation), individual substrate studies (PMID:33108758 for WEE1, PMID:25438055\
      \ for MYC, PMID:30513302 for FOXO3), and the EC number 3.1.3.16."
- term:
    id: "GO:0015630"
    label: microtubule cytoskeleton
  evidence_type: NAS
  original_reference_id: "PMID:11007961"
  review:
    summary: "PP2A associates with the microtubule cytoskeleton, consistent with its role as the major\
      \ MAP phosphatase."
    action: KEEP_AS_NON_CORE
    reason: "PP2A is the major phosphatase for microtubule-associated proteins (PMID:22613722). The MID1-alpha4-PP2Ac\
      \ complex is described as microtubule-localized. However, this is one of many localizations. NAS\
      \ evidence from review (PMID:11007961)."
- term:
    id: "GO:0016020"
    label: membrane
  evidence_type: NAS
  original_reference_id: "PMID:11007961"
  review:
    summary: "NAS annotation from PMID:11007961 suggests membrane localization."
    action: KEEP_AS_NON_CORE
    reason: "Very broad localization term. PP2A can associate with membranes through B-subunit targeting,\
      \ but this is not a primary localization. NAS evidence from a review article."
- term:
    id: "GO:0040008"
    label: regulation of growth
  evidence_type: NAS
  original_reference_id: "PMID:11360189"
  review:
    summary: "PP2A regulates cell growth through its phosphatase activity on multiple substrates."
    action: KEEP_AS_NON_CORE
    reason: "PP2A regulates cell growth through dephosphorylation of numerous signaling proteins. This\
      \ is a very broad term. The NAS annotation from PMID:11360189 (a study about PPP2R1A mutations in\
      \ Wilms tumor) provides indirect support."
- term:
    id: "GO:0045595"
    label: regulation of cell differentiation
  evidence_type: NAS
  original_reference_id: "PMID:11360189"
  review:
    summary: PP2A has been implicated in regulation of cell differentiation.
    action: KEEP_AS_NON_CORE
    reason: "PP2A affects cell differentiation through its broad phosphatase activity. This NAS annotation\
      \ from PMID:11360189 is very general and represents a pleiotropic effect rather than a core function."
