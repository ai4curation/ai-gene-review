- term:
    id: "GO:0005515"
    label: protein binding
  evidence_type: IPI
  original_reference_id: "PMID:20080667"
  review:
    summary: "Generic protein binding annotation for PPP2CA based on experimental protein-protein interaction\
      \ data."
    action: MARK_AS_OVER_ANNOTATED
    reason: "Per curation guidelines, protein binding (GO:0005515) is uninformative and does not describe\
      \ the actual function of PPP2CA. PPP2CA interacts with numerous proteins as part of its role as\
      \ a phosphatase catalytic subunit (A subunits, B subunits, substrates, regulators, viral oncoproteins).\
      \ More specific molecular function terms should be used. The interactions themselves are well-documented\
      \ but this GO term adds no functional insight."
- term:
