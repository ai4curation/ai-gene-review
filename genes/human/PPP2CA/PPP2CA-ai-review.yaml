  review:
    summary: PPP2CA localizes to the nucleus, including via its role in the INTAC complex.
    action: ACCEPT
    reason: "Nuclear localization is well-established by multiple studies. UniProt cites PMID:16541025,\
      \ PMID:33243860, PMID:34004147, PMID:39032490. Nuclear function includes transcription regulation\
      \ via INTAC complex."
- term:
    id: "GO:0005739"
    label: mitochondrion
  evidence_type: NAS
  original_reference_id: "PMID:11007961"
  review:
    summary: "NAS annotation from PMID:11007961 suggests mitochondrial localization of PP2A."
    action: KEEP_AS_NON_CORE
    reason: "Some PP2A holoenzymes have been reported to associate with mitochondria, consistent with\
      \ PP2A roles in apoptosis regulation. However, this is not a primary localization and the NAS evidence\
      \ code indicates non-traceable author statement."
