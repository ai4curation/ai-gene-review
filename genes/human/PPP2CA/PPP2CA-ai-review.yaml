- term:
    id: "GO:0000159"
    label: protein phosphatase type 2A complex
  evidence_type: IEA
  original_reference_id: "GO_REF:0000107"
  review:
    summary: PPP2CA is a component of the protein phosphatase type 2A complex.
    action: ACCEPT
    reason: "PPP2CA is the catalytic subunit of PP2A. This is the defining complex for this protein. Supported\
      \ by crystal structure (PMID:17055435), holoenzyme structure (PMID:17174897), and extensive biochemical\
      \ characterization."
    supported_by:
    - reference_id: "PMID:17055435"
      supporting_text: Structure of protein phosphatase 2A core enzyme bound to tumor-inducing toxins
- term:
    id: "GO:0005829"
    label: cytosol
  evidence_type: IEA
  original_reference_id: "GO_REF:0000107"
  review:
    summary: "PPP2CA localizes to the cytosol, which is a well-established localization for PP2A."
    action: ACCEPT
    reason: "PP2A is present in the cytosol as supported by UniProt subcellular location (PMID:16541025,\
      \ PMID:39032490), immunofluorescence, and fractionation studies. The deep research confirms PP2A\
      \ localization includes cytoplasm."
- term:
    id: "GO:0005886"
    label: plasma membrane
  evidence_type: IEA
  original_reference_id: "GO_REF:0000107"
  review:
    summary: IEA annotation suggesting PPP2CA localizes to plasma membrane.
    action: KEEP_AS_NON_CORE
    reason: "PP2A has been reported at cell membranes in some contexts. The deep research notes localization\
      \ to 'cell membrane'. However, this is not a primary localization and likely reflects B-subunit-dependent\
      \ targeting to specific membrane-associated complexes."
- term:
    id: "GO:0043029"
    label: T cell homeostasis
  evidence_type: IEA
  original_reference_id: "GO_REF:0000107"
  review:
    summary: "PP2Acalpha is required for CD8+ T-cell homeostasis, supported by mouse conditional deletion\
      \ studies."
    action: KEEP_AS_NON_CORE
    reason: "A 2024 study (Zhou et al., Eur J Immunol) showed conditional PP2Acalpha deletion in T cells\
      \ causes defective CD8+ T-cell homeostasis. While biologically significant, this is a tissue-specific\
      \ phenotype rather than a core molecular function. The ISS annotation is based on mouse ortholog\
      \ data."
- term:
    id: "GO:0045202"
    label: synapse
  evidence_type: IEA
  original_reference_id: "GO_REF:0000107"
  review:
    summary: "IEA annotation suggesting PPP2CA localizes to synapses. PP2A is abundant in neurons and\
      \ regulates synaptic proteins."
    action: KEEP_AS_NON_CORE
    reason: "PP2A is the major phosphatase in neurons (>70% of neuronal phosphatase activity) and regulates\
      \ tau phosphorylation and other synaptic proteins. Synaptic localization is plausible but represents\
      \ tissue-specific function rather than core function."
- term:
    id: "GO:0050811"
    label: GABA receptor binding
  evidence_type: IEA
  original_reference_id: "GO_REF:0000107"
  review:
    summary: "IEA annotation suggesting PPP2CA binds GABA receptors. PP2A has been implicated in regulation\
      \ of GABA receptor phosphorylation in neurons."
    action: KEEP_AS_NON_CORE
    reason: "PP2A is known to regulate GABA receptor phosphorylation state in neurons, which is consistent\
      \ with the very high abundance of PP2A in neuronal tissue (>70% of neuronal phosphatases). However,\
      \ this is one of many substrate interactions and not a core defining function of PPP2CA."
- term:
    id: "GO:0051898"
    label: "negative regulation of phosphatidylinositol 3-kinase/protein kinase B signal transduction"
  evidence_type: IEA
  original_reference_id: "GO_REF:0000107"
  review:
    summary: "PP2A negatively regulates PI3K/AKT signaling by dephosphorylating AKT1 at Ser-473."
    action: KEEP_AS_NON_CORE
    reason: "PP2A dephosphorylation of AKT1 is supported by UniProt ('Together with RACK1 adapter, mediates\
      \ dephosphorylation of AKT1 at Ser-473') and by PMID:21806946 (IMP). The 2024 T-cell study also\
      \ implicates mTORC1 and AKT as PP2A downstream nodes. However, AKT regulation is one of many signaling\
      \ roles of PP2A."
- term:
    id: "GO:1900227"
    label: positive regulation of NLRP3 inflammasome complex assembly
  evidence_type: IEA
  original_reference_id: "GO_REF:0000107"
  review:
    summary: "PP2A catalyzes dephosphorylation of the pyrin domain of NLRP3, promoting NLRP3 inflammasome\
      \ assembly (by similarity from mouse)."
    action: KEEP_AS_NON_CORE
    reason: "UniProt states 'Catalyzes dephosphorylation of the pyrin domain of NLRP3, promoting assembly\
      \ of the NLRP3 inflammasome (By similarity)'. This is based on mouse ortholog data and represents\
      \ one of many substrate-specific effects. Not a core function."
- term:
    id: "GO:1904539"
    label: negative regulation of glycolytic process through fructose-6-phosphate
  evidence_type: IEA
  original_reference_id: "GO_REF:0000107"
  review:
    summary: "IEA annotation suggesting PPP2CA negatively regulates glycolysis through fructose-6-phosphate."
    action: KEEP_AS_NON_CORE
    reason: "This is a very specific metabolic process annotation from Ensembl Compara (IEA). While PP2A\
      \ may regulate glycolytic enzymes via dephosphorylation, this is a downstream pleiotropic effect\
      \ rather than a core function."
- term:
    id: "GO:0004721"
    label: phosphoprotein phosphatase activity
  evidence_type: IDA
  original_reference_id: "PMID:30595372"
  qualifier: contributes_to
  review:
    summary: "PPP2CA contributes phosphoprotein phosphatase activity as part of the PP2A holoenzyme complex."
    action: ACCEPT
    reason: "PPP2CA provides the catalytic phosphatase activity within the PP2A complex. The contributes_to\
      \ qualifier is appropriate since the holoenzyme is required for full substrate-directed activity.\
      \ The more specific GO:0004722 is also annotated."
    supported_by:
    - reference_id: "PMID:30595372"
      supporting_text: PP2A, PPP2CA, Cause Syndromic Intellectual Disability
- term:
    id: "GO:0008287"
    label: protein serine/threonine phosphatase complex
  evidence_type: IDA
  original_reference_id: "PMID:28167675"
  review:
    summary: PPP2CA is part of a protein serine/threonine phosphatase complex.
    action: ACCEPT
    reason: "PPP2CA functions in the PP2A complex, which is a serine/threonine phosphatase complex. This\
      \ is a general cellular component term that is correct. PMID:28167675 identifies ARPP-16 as a PP2A\
      \ inhibitor in the context of a serine/threonine phosphatase complex."
- term:
    id: "GO:0005634"
    label: nucleus
  evidence_type: NAS
  original_reference_id: "PMID:32647223"
  review:
    summary: PPP2CA localizes to the nucleus, including via its role in the INTAC complex.
    action: ACCEPT
    reason: "Nuclear localization is well-established by multiple studies. UniProt cites PMID:16541025,\
      \ PMID:33243860, PMID:34004147, PMID:39032490. Nuclear function includes transcription regulation\
      \ via INTAC complex."
- term:
    id: "GO:0016180"
    label: snRNA processing
  evidence_type: NAS
  original_reference_id: "PMID:16239144"
  review:
    summary: "PPP2CA is linked to snRNA processing through the Integrator complex, which is involved in\
      \ snRNA 3' end processing."
    action: KEEP_AS_NON_CORE
    reason: "The Integrator complex mediates snRNA 3' end processing (PMID:16239144). PPP2CA is part of\
      \ the INTAC complex (Integrator + PP2A), but the endonuclease rather than the phosphatase module\
      \ is primarily responsible for snRNA cleavage. PPP2CA's role in snRNA processing is indirect via\
