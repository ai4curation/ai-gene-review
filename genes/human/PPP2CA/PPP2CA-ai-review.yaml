    label: negative regulation of epithelial to mesenchymal transition
  evidence_type: IMP
  original_reference_id: "PMID:20080667"
  review:
    summary: "PMID:20080667 implicates PP2A in negative regulation of epithelial-to-mesenchymal transition\
      \ via DAB2IP-mediated modulation."
    action: KEEP_AS_NON_CORE
    reason: "This is a downstream consequence of PP2A-mediated signaling rather than a core function.\
      \ The study (PMID:20080667) shows DAB2IP modulates PP2A activity affecting EMT, but this is a pleiotropic\
      \ effect rather than a primary function."
