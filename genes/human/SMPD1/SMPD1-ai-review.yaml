id: P17405
gene_symbol: SMPD1
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  SMPD1 encodes lysosomal acid sphingomyelinase (ASM/aSMase), a Zn2+-dependent
  sphingomyelin phosphodiesterase (EC 3.1.4.12) that hydrolyzes sphingomyelin
  and water to ceramide and phosphocholine. It is the principal enzyme of
  lysosomal sphingomyelin catabolism, acting in the acidic lumen of the
  lysosome/endolysosome. A single protein precursor gives rise, by differential
  trafficking rather than alternative splicing, to two enzymatic forms: a
  lysosomal form (L-SMase) targeted to lysosomes via mannose-6-phosphate
  receptor and sortilin, and a Zn2+-activated secreted form (S-SMase) released
  to the extracellular space, whose secretion is induced by inflammatory
  cytokines and by bacterial and viral infection. The ceramide generated by ASM
  serves as a bioactive lipid second messenger, and ASM contributes to
  stress-induced apoptosis, ceramide-rich membrane platform formation, plasma
  membrane repair, cholesterol export from endolysosomes, and host-pathogen
  interactions. Loss-of-function mutations cause acid sphingomyelinase
  deficiency, the lysosomal storage disorder Niemann-Pick disease types A and B.
