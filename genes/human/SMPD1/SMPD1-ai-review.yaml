  qualifier: is_active_in
  review:
    summary: Secreted (S-SMase) form of ASM acts in the extracellular space. Consistent
      with experimental localization of a Zn2+-activated secreted form of the ASM gene
      product and with the phylogenetically conserved secreted role of this family.
    action: KEEP_AS_NON_CORE
    reason: A secreted, Zn2+-stimulated form of ASM is well documented experimentally
      (e.g. PMID:8702487, PMID:9660788); the IBA is consistent with the human evidence
      and with the family. Non-core relative to the lysosomal catalytic role but valid.
    supported_by:
