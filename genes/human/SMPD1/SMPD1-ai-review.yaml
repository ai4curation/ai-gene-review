core_functions:
  - description: >-
      Zn2+-dependent lysosomal acid sphingomyelinase that hydrolyzes sphingomyelin
      to ceramide and phosphocholine (EC 3.1.4.12) in the acidic lumen of the
      lysosome/endolysosome, catalyzing the committed step of lysosomal
      sphingomyelin catabolism.
    molecular_function:
      id: GO:0004767
      label: sphingomyelin phosphodiesterase activity
    directly_involved_in:
      - id: GO:0006685
        label: sphingomyelin catabolic process
    locations:
      - id: GO:0043202
        label: lysosomal lumen
    supported_by:
      - reference_id: PMID:22573858
        supporting_text: >-
          Acid sphingomyelinase (ASMase) converts the lipid sphingomyelin (SM) to
          phosphocholine and ceramide and has optimum activity at acidic pH.
      - reference_id: PMID:16787399
        supporting_text: >-
          Acid sphingomyelinase (ASM), a member of the saposin-like protein
          (SAPLIP) family, is a lysosomal hydrolase that converts sphingomyelin to
          ceramide.
      - reference_id: file:human/SMPD1/SMPD1-uniprot.txt
        supporting_text: "Binds 2 Zn(2+) ions per subunit"
suggested_questions:
  - question: >-
      Beyond its constitutive lysosomal sphingomyelin catabolism, to what extent
      are ASM's diverse signaling roles (apoptosis, plasma-membrane repair,
      host-pathogen interactions) mediated specifically by the secreted S-SMase
      form versus the lysosomal L-SMase form?
  - question: >-
      Are the GBA1-based IMP annotations for termination of signal transduction
      (GO:0023021) and negative regulation of MAPK cascade (GO:0043409)
      genuinely supported by SMPD1 loss-of-function evidence, or were they
      transferred from GBA1-focused studies (PMID:19279008, PMID:19279011)?
suggested_experiments:
  - description: >-
      Quantitative lipidomics of sphingomyelin and ceramide species in isogenic
      SMPD1-null versus reconstituted human cells to define the substrate spectrum
      and physiological product profile of ASM under basal and stress conditions.
  - description: >-
      Compartment-resolved activity assays (lysosomal L-SMase vs secreted
      Zn2+-dependent S-SMase) combined with Ser508-phosphomutant and
      C-terminal-processing mutants to dissect which form drives each of the
      reported non-core signaling and membrane-repair functions.
