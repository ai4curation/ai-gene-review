        supporting_text: "We now show that Zn-SMase activity is secreted by human and murine macrophages, human skin fibroblasts, microglial cells, and several other cells in culture"
- term:
    id: GO:0005764
    label: lysosome
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: is_active_in
  review:
    summary: ASM is a lysosomal hydrolase that acts within the lysosome, the core
      site of its sphingomyelin-degrading activity. Strongly supported by human
      experimental evidence and phylogenetically conserved.
    action: ACCEPT
    reason: The lysosomal site of action is the core cellular component for ASM and is
      independently supported by multiple human IDA localizations and by UniProt
      SUBCELLULAR LOCATION (Lysosome).
    supported_by:
      - reference_id: PMID:16787399
        supporting_text: "Acid sphingomyelinase (ASM), a member of the saposin-like protein (SAPLIP) family, is a lysosomal hydrolase that converts sphingomyelin to ceramide."
- term:
    id: GO:0046513
    label: ceramide biosynthetic process
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: involved_in
  review:
    summary: ASM hydrolyzes sphingomyelin to ceramide, so it contributes to cellular
      ceramide production. In GO this reaction is captured both as ceramide biosynthesis
      (GO:0046513) and as sphingomyelin catabolism (GO:0006685); they describe the two
      aspects of the same hydrolysis.
    action: ACCEPT
    reason: The conversion of sphingomyelin to ceramide is the defining physiological
      reaction of ASM and is extensively documented; ceramide generation is genuinely a
      biosynthetic outcome of this catabolic step. Retained, though the sphingomyelin
      catabolic process term is the more precise primary BP.
    supported_by:
      - reference_id: PMID:16787399
        supporting_text: "Acid sphingomyelinase (ASM), a member of the saposin-like protein (SAPLIP) family, is a lysosomal hydrolase that converts sphingomyelin to ceramide."
