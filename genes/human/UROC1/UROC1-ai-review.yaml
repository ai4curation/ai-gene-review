  title: Mutations in the urocanase gene UROC1 are associated with urocanic aciduria.
  findings:
  - statement: >-
      Reports the first UROC1 mutations (p.L70P, p.R450C) in a patient with urocanic
      aciduria; enzyme activity assays and protein expression studies show neither
      variant yields a fully functional urocanase, confirming UROC1 function in
      L-histidine catabolism.
    reference_section_type: ABSTRACT
    supporting_text: >-
      Computed (in silico) predictions, protein expression studies and enzyme
      activity assays suggest that none of the mutations can produce a fully
      functional enzyme.
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified case report establishing UROC1 = urocanase and linking
      loss-of-function variants to urocanic aciduria; directly supports the IDA
      (activity), IMP (histidine catabolism), and IDA (cytosol) annotations. Cached
      entry is abstract-only (full_text_available: false); the curator's IDA/IMP
      reflect full-text assays.
