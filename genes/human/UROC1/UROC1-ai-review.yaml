id: Q96N76
gene_symbol: UROC1
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  UROC1 encodes urocanate hydratase (urocanase; EC 4.2.1.49), the enzyme that
  catalyzes the second step of L-histidine catabolism. It hydrates
  trans-urocanate to 4-imidazolone-5-propanoate, using a tightly bound NAD+ as an
  electrophilic cofactor that adds to the substrate to activate it for hydration
  and is regenerated each catalytic cycle (rather than acting as a redox
  coenzyme). The reaction follows histidase (HAL)-catalyzed deamination of
  L-histidine to urocanate and precedes imidazolonepropionase (AMDHD1) and
  formiminotransferase (FTCD) steps, so that histidine is ultimately degraded to
  L-glutamate. The protein is a cytosolic enzyme of the conserved urocanase family
  with a Rossmann-like NAD-binding fold, and is highly expressed in liver, the
  principal site of histidine catabolism. Loss of urocanase activity causes
  urocanase deficiency (urocanic aciduria), an inborn error of histidine
  metabolism associated with neurological features including intellectual
  disability and ataxia.
