- term:
    id: GO:0060090
    label: molecular adaptor activity
  evidence_type: EXP
  original_reference_id: PMID:21916849
  review:
    summary: >-
      The cited structural study supports PRDX4 peroxidase catalysis, oligomerization, and overoxidation
      sensitivity, but it does not establish molecular adaptor activity as a distinct molecular function.
    action: MODIFY
    supported_by:
    - reference_id: PMID:21916849
      supporting_text: >-
        Prx4 exhibits a toroid-shaped decamer constructed of five catalytic dimers.
    reason: >-
      The biological evidence should be captured with a catalytic peroxiredoxin term rather than adaptor
      or sequestering activity. The best replacement is the specific thioredoxin-dependent peroxiredoxin
      activity term already supported by the same catalytic mechanism.
    proposed_replacement_terms:
    - id: GO:0140824
      label: thioredoxin-dependent peroxiredoxin activity
