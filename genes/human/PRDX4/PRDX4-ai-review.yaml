- term:
    id: GO:0005576
    label: extracellular region
  evidence_type: TAS
  original_reference_id: Reactome:R-HSA-6798748
  review:
    summary: >-
      extracellular region reflects secretory or extracellular detection/pathway context for PRDX4 rather
      than the main site of its curated peroxidase function.
    action: KEEP_AS_NON_CORE
    reason: >-
      PRDX4 is an ER/secretory-pathway peroxiredoxin, so extracellular or granule-lumen pathway placements
      can be retained as non-core context while ER remains the primary location.
    supported_by:
    - reference_id: file:human/PRDX4/PRDX4-uniprot.txt
      supporting_text: >-
        PRDX4 is cotranslationally translocated to and retained within the endoplasmic reticulum.
    - reference_id: file:human/PRDX4/PRDX4-deep-research-falcon.md
      supporting_text: >-
        Falcon report notes PRDX4 can be secreted/extracellular and has been detected in extracellular
        vesicle datasets, supporting non-core secretory/extracellular context.
