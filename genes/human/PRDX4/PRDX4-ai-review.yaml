id: Q13162
gene_symbol: PRDX4
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  PRDX4 encodes peroxiredoxin-4, a typical 2-Cys thioredoxin-dependent peroxidase that reduces hydrogen
  peroxide and organic hydroperoxides. It is cotranslationally translocated to and retained mainly in
  the endoplasmic reticulum, with a smaller cytoplasmic fraction that has been linked to redox modulation
  of NF-kappaB signaling. Its core annotation is thioredoxin-dependent peroxiredoxin/peroxidase activity
  in peroxide detoxification and redox homeostasis, not generic protein binding.
existing_annotations:
- term:
    id: GO:0005829
    label: cytosol
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      cytosol localization is supported for a smaller PRDX4 pool, including the cytoplasmic fraction implicated
      in NF-kappaB redox modulation.
    action: ACCEPT
    reason: >-
      Although the endoplasmic reticulum is the dominant core location, UniProt and experimental literature
      support a cytoplasmic fraction. The term is therefore valid, with ER retained as the primary localization.
    supported_by:
    - reference_id: file:human/PRDX4/PRDX4-uniprot.txt
      supporting_text: >-
        SUBCELLULAR LOCATION: Cytoplasm. Endoplasmic reticulum. Note=A small fraction of the protein is
        cytoplasmic.
    - reference_id: file:human/PRDX4/PRDX4-deep-research-falcon.md
      supporting_text: >-
        Falcon report emphasizes ER localization as primary while noting additional cytosolic or secreted/extracellular
        PRDX4 contexts.
- term:
    id: GO:0006979
    label: response to oxidative stress
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      response to oxidative stress is supported by PRDX4 peroxide-reducing activity and its role in cellular
      redox protection.
    action: ACCEPT
    reason: >-
      PRDX4 directly detoxifies hydroperoxides through the thioredoxin system, so these redox and peroxide
      catabolic process annotations are appropriate biological-process summaries.
    supported_by:
    - reference_id: file:human/PRDX4/PRDX4-uniprot.txt
      supporting_text: >-
        Plays a role in cell protection against oxidative stress by detoxifying peroxides and as sensor
        of hydrogen peroxide-mediated signaling events.
    - reference_id: file:human/PRDX4/PRDX4-deep-research-falcon.md
      supporting_text: >-
        Falcon report summarizes PRDX4 as a typical 2-Cys peroxiredoxin that reduces H2O2 and other hydroperoxides
        and supports ER redox/proteostasis biology.
