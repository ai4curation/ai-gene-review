- term:
    id: GO:0042802
    label: identical protein binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000107
  review:
    summary: >-
      Identical protein binding is supported by PRDX4 homodimerization and decamer formation, which are
      part of its 2-Cys peroxiredoxin catalytic assembly.
    action: ACCEPT
    reason: >-
      Unlike generic protein binding, identical protein binding is mechanistically informative for PRDX4
      because catalysis uses a dimeric interface and oxidized PRDX4 forms disulfide-linked homodimers/decamers.
    supported_by:
    - reference_id: file:human/PRDX4/PRDX4-uniprot.txt
      supporting_text: >-
        SUBUNIT: Homodimer; disulfide-linked, upon oxidation. 5 homodimers assemble to form a ring-like
        decamer.
