suggested_experiments:
- experiment_type: Compartment-specific redox assay
  description: Measure ER and cytosolic peroxide handling after PRDX4 knockout and
    compartment-targeted rescue.
  hypothesis: ER-localized PRDX4 is the dominant contributor to ER peroxide detoxification while a
    smaller cytosolic pool affects NF-kappaB redox signaling.
- experiment_type: Oligomerization mutant analysis
  description: Test PRDX4 dimer/decamer interface mutants for peroxidase activity and overoxidation
    sensitivity in cells.
  hypothesis: PRDX4 oligomeric assembly is required for efficient thioredoxin-dependent peroxidase
    activity and controls susceptibility to overoxidation.
