      supporting_text: >-
        code for cytosolic and mitochondrial branched-chain amino acid aminotransferases
- term:
    id: GO:0030170
    label: pyridoxal phosphate binding
  evidence_type: IDA
  original_reference_id: PMID:8702755
  qualifier: enables
  review:
    summary: >-
      Proposed annotation (not in current GOA): BCAT2 binds pyridoxal 5'-phosphate (PLP) as its
      essential catalytic cofactor. UniProt records PLP as the cofactor (COFACTOR, from crystallographic
      studies) and a Schiff-base MOD_RES at Lys-229; PLP binding is required for the demonstrated
      aminotransferase activity.
    action: NEW
    reason: >-
      PLP-binding is a well-established, structurally and biochemically documented molecular function of
      this class-IV PLP-dependent aminotransferase (many BCATm crystal structures resolve the PLP
      cofactor; the Schiff-base lysine is annotated in UniProt) and directly underlies its catalytic
      activity. It is currently missing from GOA and is added here as a core function.
    supported_by:
    - reference_id: PMID:8702755
      supporting_text: >-
        code for cytosolic and mitochondrial branched-chain amino acid aminotransferases
core_functions:
- description: >-
    BCAT2 is the mitochondrial branched-chain-amino-acid aminotransferase (EC 2.6.1.42) that
    catalyzes the first, reversible step of branched-chain amino acid catabolism: PLP-dependent
    transamination of L-leucine, L-isoleucine and L-valine with 2-oxoglutarate to give the
    corresponding branched-chain 2-oxo acids (KIC, KMV, KIV) plus L-glutamate, feeding the products
    to the mitochondrial BCKDH complex. It acts as a homodimer in the mitochondrial matrix.
  molecular_function:
    id: GO:0004084
    label: branched-chain-amino-acid:2-oxoglutarate transaminase activity
  directly_involved_in:
  - id: GO:0009083
    label: branched-chain amino acid catabolic process
  locations:
