id: O15382
gene_symbol: BCAT2
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  BCAT2 (BCAT(m)) is the mitochondrial branched-chain-amino-acid aminotransferase, a
  class-IV pyridoxal 5'-phosphate (PLP)-dependent enzyme (EC 2.6.1.42) that catalyzes the
  first, reversible step of branched-chain amino acid (BCAA) catabolism. It transaminates
  L-leucine, L-isoleucine and L-valine with 2-oxoglutarate (alpha-ketoglutarate) to yield
  the corresponding branched-chain 2-oxo (keto) acids (4-methyl-2-oxopentanoate/KIC,
  (S)-3-methyl-2-oxopentanoate/KMV and 3-methyl-2-oxobutanoate/KIV) plus L-glutamate. The
  branched-chain keto acids are then passed to the mitochondrial branched-chain ketoacid
  dehydrogenase (BCKDH) complex for irreversible oxidative decarboxylation. The enzyme
  functions as a PLP-bound homodimer in the mitochondrial matrix, with the PLP cofactor
  forming a Schiff base (internal aldimine) to an active-site lysine (Lys-229), and carries
  a redox-active CXXC center (Cys-342/Cys-345) near the active site that couples catalysis
  to thiol redox state. BCAT2 is broadly expressed with highest activity in extrahepatic
  tissues such as skeletal muscle; the paralog BCAT1 is the cytosolic isozyme. Because
  BCAAs are essential amino acids in humans, the physiological direction of the reaction is
  catabolic (nitrogen removal), and loss of BCAT2 function causes an autosomal-recessive
  inborn error of metabolism (hypervalinemia and hyperleucine-isoleucinemia) with elevated
  plasma BCAAs.
