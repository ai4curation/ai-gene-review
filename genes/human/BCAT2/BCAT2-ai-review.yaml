  qualifier: involved_in
  review:
    summary: >-
      Older TAS annotating branched-chain amino acid BIOSYNTHETIC process, presumably reflecting the
      chemically reversible transamination. In humans BCAAs are essential and not synthesized de novo,
      so the physiological direction is catabolic.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      The reversible reaction can re-aminate branched-chain keto acids, but net BCAA biosynthesis is a
      microbial/plant role of BCAT-family enzymes, not the human function; humans require dietary BCAAs.
      The biosynthetic-process annotation over-states the in vivo role. Retained as an over-annotation
      (the reversible chemistry is real) rather than removed.
    supported_by:
