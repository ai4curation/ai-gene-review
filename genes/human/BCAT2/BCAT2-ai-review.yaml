- term:
    id: GO:0009082
    label: branched-chain amino acid biosynthetic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000117
  qualifier: involved_in
  review:
    summary: >-
      ARBA machine-learning IEA (and an older TAS) annotating branched-chain amino acid BIOSYNTHETIC
      process. The BCAT reaction is chemically reversible, but in humans BCAAs are essential and are
      not synthesized de novo; the physiological direction is catabolic.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      The reversible transamination can in principle re-aminate branched-chain keto acids, but net
      de novo BCAA biosynthesis is a bacterial/plant/fungal role of BCAT-family enzymes (e.g. IlvE),
      not the human physiological function. The biosynthetic-process annotation is transferred from
      the family/EC and over-states the in vivo role; the catabolic annotations are correct and core.
      (Retained as an over-annotation rather than removed, since the underlying reversible chemistry
      is real.)
    supported_by:
    - reference_id: PMID:8702755
      supporting_text: >-
        Activity of branched-chain amino acid aminotransferase was measured in the wild-type
        and mutants with either leucine, isoleucine, or valine as substrates
