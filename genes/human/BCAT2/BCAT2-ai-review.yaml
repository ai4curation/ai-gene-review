    label: L-leucine
  - id: CHEBI:17191
    label: L-isoleucine
  - id: CHEBI:16414
    label: L-valine
  - id: CHEBI:16810
    label: 2-oxoglutarate
  supported_by:
  - reference_id: PMID:8702755
    supporting_text: >-
      Activity of branched-chain amino acid aminotransferase was measured in the wild-type
      and mutants with either leucine, isoleucine, or valine as substrates
  - reference_id: PMID:9165094
    supporting_text: >-
      the protein exhibits BCAT activity and correct processing of the mitochondrial targeting
      sequence
- description: >-
    Catalysis requires the cofactor pyridoxal 5'-phosphate (PLP), which is bound at the active site
    via a Schiff-base (internal aldimine) linkage to Lys-229 and cycles between the aldimine (PLP)
    and pyridoxamine (PMP) forms during the ping-pong transamination mechanism. PLP binding is
    essential for BCAT2 aminotransferase activity, and the disease-relevant loss of activity can be
    partially rescued by vitamin B6 (PLP precursor) supplementation.
  molecular_function:
    id: GO:0030170
    label: pyridoxal phosphate binding
  directly_involved_in:
  - id: GO:0009083
    label: branched-chain amino acid catabolic process
  locations:
  - id: GO:0005759
    label: mitochondrial matrix
  supported_by:
  - reference_id: PMID:8702755
    supporting_text: >-
      code for cytosolic and mitochondrial branched-chain amino acid aminotransferases
proposed_new_terms: []
suggested_questions:
- question: >-
    In human tissues, does BCAT2 carry any physiologically relevant biosynthetic (re-amination)
    flux toward BCAAs, or is the net direction exclusively catabolic given the essentiality of
    dietary BCAAs?
- question: >-
    To what extent do the reported BCAT2 protein-protein interactions (e.g. with HSPD1/HSP60) and
    the CXXC-dependent metabolon with the BCKDH E1 subunit represent discrete functional partnerships
    versus co-purification within the mitochondrial matrix?
suggested_experiments:
- description: >-
    Quantify BCAA-to-BCKA flux directionality in situ (e.g. stable-isotope 15N/13C tracing) in
    BCAT2-expressing human muscle vs liver models to determine whether any net biosynthetic
    re-amination occurs physiologically.
- description: >-
    Reconstitute the BCAT2-BCKDH E1 metabolon in vitro with reduced vs oxidized CXXC-center BCAT2
    (and C342A/C345A mutants) to test how the redox state of the CXXC center gates substrate
    channeling and overall BCAA oxidation rate.
