references:
  - id: GO_REF:0000033
    title: Annotation inferences using phylogenetic trees
    findings:
      - statement: Phylogenetic inference supporting EPYC annotations based on 
          ortholog analysis
  - id: GO_REF:0000107
    title: Automatic transfer of experimentally verified manual GO annotation 
      data to orthologs using Ensembl Compara.
    findings:
      - statement: Automated transfer of EPYC annotations from orthologous 
          proteins
  - id: PMID:8975717
    title: Characterization of human DSPG3, a small dermatan sulfate 
      proteoglycan.
    findings:
      - statement: Original characterization of human EPYC (DSPG3) showing it is
          a small dermatan sulfate proteoglycan expressed in cartilage, 
          ligament, and placental tissues. Contains 322 amino acids with 
          leucine-rich repeats, glycosaminoglycan attachment sites, and is 
          localized to chromosome 12q21.
        supporting_text: "DSPG3 is expressed in cartilage, as well as ligament and
          placental tissues...composed of 1515 nucleotides of cDNA that code for a
          322-amino-acid protein"
  - id: file:human/EPYC/EPYC-deep-research-perplexity.md
    title: Deep research summary on EPYC gene function
    findings:
      - statement: EPYC is a Class III SLRP containing 6 LRRs that regulates
          collagen fibrillogenesis by binding collagen fibrils and controlling
          lateral fibril growth through steric hindrance
      - statement: Functions in organizing three-dimensional ECM architecture
          through interactions with collagen, hyaluronan, and other
          proteoglycans
      - statement: Modulates growth factor signaling by binding and sequestering
          TGF-β and BMPs, reducing their bioavailability
      - statement: Essential for maintaining articular cartilage integrity -
          EPYC-deficient mice develop progressive osteoarthritis with cartilage
          erosions
      - statement: Participates in endochondral ossification and influences bone
          development, though with subtle early skeletal abnormalities
      - statement: In cancer contexts, promotes tumor progression through
          PI3K/AKT and focal adhesion pathway activation
      - statement: Post-translationally modified with dermatan sulfate GAG
          chains that are critical for growth factor binding and collagen
          interactions
  - id: file:human/EPYC/EPYC-deep-research-falcon.md
    title: Falcon (Edison) deep research synthesis on EPYC gene function
    findings:
      - statement: EPYC is a secreted ECM small leucine-rich proteoglycan
          (DS/CS SLRP) localized to cartilage (including epiphyseal/growth plate
          cartilage) and implicated in collagen fibrillogenesis and cartilage
          matrix maturation
        supporting_text: "EPYC/epiphycan is a **secreted ECM SLRP** that
          contributes to **collagen fibrillogenesis and cartilage ECM assembly**"
      - statement: Falcon synthesis reports the Class III SLRP architecture with
          7 LRRs (fewer than the 10-12 LRRs of other SLRP classes), discrepant
          with the 6-LRR figure in the perplexity summary
        supporting_text: "epiphycan contains **7 LRRs** (fewer than the 10–11
          LRRs typical of many other SLRPs)"
      - statement: 2024 disease-context studies extend EPYC biology into cancer
          microenvironment signaling - PI3K-AKT in pancreatic cancer (Yang et
          al. 2024) and Wnt/Axin/β-catenin plus VEGFR1/VEGF angiogenesis in
          laryngeal cancer (Zhou et al. 2024 preprint)
        supporting_text: "EPYC's known biology into **cancer microenvironment
          signaling**, including regulation of **PI3K–AKT** (pancreatic cancer)
          and **Wnt/Axin/β-catenin** plus **VEGFR1/VEGF**-linked angiogenesis
          (laryngeal cancer)"
      - statement: 2024 scRNAseq mouse work identifies Epyc as a growth plate
          chondrocyte marker absent from articular chondrocytes and
          perichondrial cells, supporting strong association with
          epiphyseal/growth plate cartilage
  - id: PMID:38184732
    title: EPYC functions as a novel prognostic biomarker for pancreatic cancer
    findings:
      - statement: EPYC regulates fibril formation by interacting with collagen
          fibrils and other extracellular matrix proteins; EPYC is highly
          expressed in pancreatic cancer cell lines and promotes proliferation
          via PI3K-AKT signaling in vivo and in vitro
        supporting_text: "it can regulate the fibril formation by interacting
          with collagen fibrils and other extracellular matrix proteins"
  - id: PMID:34638928
    title: Roles of two small leucine-rich proteoglycans decorin and biglycan in
      pregnancy and pregnancy-associated diseases (SLRP family review)
    findings:
      - statement: Epiphycan is Class III SLRP, the only dermatan sulfate
          proteoglycan of this class, containing seven LRRs (vs 10-12 in other
          SLRP classes)
        supporting_text: "Class III—This class contains three members: epiphycan,
          opticin, and osteoglycin. In contrast to 10–12 LRRs present in other
          SLRP classes, the members of this class consist of a low number of LRRs
          (seven LRRs) and seven exons. Epiphycan is the only dermatan sulfate
          proteoglycan of this class."
      - statement: SLRPs are extracellular matrix structural constituents that
          maintain tissue architecture and participate in collagen
          fibrillogenesis
        supporting_text: "SLRPs are ubiquitously expressed in the ECM of most
          tissues where they act as structural constituents to maintain tissue
          architecture, and they are involved in range of fundamental biological
          and pathophysiological functions, including collagen fibrillogenesis"
  - id: PMID:29439148
    title: Biodiversity of CS-proteoglycan sulphation motifs (Hayes et al. 2018)
    findings:
      - statement: Epiphycan is a dermatan sulfate SLRP found in epiphyseal
          cartilage (reviewed in this SLRP/CS-proteoglycan context).
  - id: PMID:29194731
    title: Human mesenchymal stem cells induced to differentiate as chondrocytes
      follow a biphasic pattern of extracellular matrix production
    findings:
      - statement: Epiphycan appears as a novel proteoglycan during the
          maturation phase of in vitro chondrogenesis and is characteristic of
          articular cartilage
        supporting_text: "Maturation results in the appearance of novel PGs such
          as epiphycan which is characteristic of articular cartilage"
  - id: PMID:33023972
    title: Imbalanced cellular metabolism compromises cartilage homeostasis and
      joint function in a mouse model of mucolipidosis type III gamma
    findings:
      - statement: Epyc is among the most strongly downregulated transcripts
          (Log2 ratio approx -4) in hip joint articular cartilage of Gnptgko
          mice, and is identified as an essential component of the cartilage
          collagen fibrillar network
        supporting_text: "matrilin-3 (Matn3) and epiphycan (Epyc), which are
          essential components of collagen fibrillar network in cartilage
          (Klatt et al., 2011; Brachvogel et al., 2013), were the most
          downregulated in Gnptgko mice, with a Log2 ratio of −4 compared to
          wild-type animals"
  - id: PMID:38291367
    title: Unveiling promising breast cancer biomarkers - integrative
      bioinformatics analysis and experimental verification (Golestan et al.
      2024)
    findings:
      - statement: EPYC mRNA is significantly upregulated in breast cancer
          tumors versus paired adjacent tissue (qRT-PCR, n=55, P<0.0001), but
          the overall survival association is weak (HR 1.04, log-rank P=0.72)
