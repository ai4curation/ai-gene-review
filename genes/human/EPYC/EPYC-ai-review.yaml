id: Q99645
gene_symbol: EPYC
product_type: PROTEIN
status: COMPLETE
tags:
  - ECM
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: |
  Epiphycan (EPYC) is a Class III small leucine-rich proteoglycan (SLRP) that functions
  as a secreted extracellular matrix component primarily regulating collagen fibrillogenesis
  and matrix organization in cartilage and other connective tissues. The protein contains
  leucine-rich repeat (LRR) domains (reported as six in the perplexity research summary and
  as seven by SLRP-focused reviews [Halari et al. 2021, PMID:34638928; Hayes et al. 2018,
  PMID:29439148], fewer than the 10-12 LRRs typical of other SLRP classes) and is
  post-translationally modified with dermatan sulfate glycosaminoglycan chains; within the
  SLRP family it is the sole dermatan sulfate proteoglycan of Class III (epiphycan, opticin,
  osteoglycin). EPYC's core functions include: (1) regulating collagen
  type II fibril assembly in cartilage by binding collagen fibrils and controlling lateral
  growth; (2) organizing three-dimensional extracellular matrix architecture through interactions
  with collagen, hyaluronan, and other proteoglycans; and (3) modulating growth factor signaling
  by binding and sequestering TGF-β and BMPs. The protein is essential for maintaining articular
  cartilage integrity and preventing osteoarthritis, as demonstrated by progressive joint
  degeneration in EPYC-deficient mice. EPYC is expressed primarily in skeletal tissues including
  growth plate cartilage, articular cartilage, and intervertebral discs, as well as in ligaments
  and placenta
existing_annotations:
  - term:
      id: GO:0031012
      label: extracellular matrix
    evidence_type: IBA
    original_reference_id: GO_REF:0000033
    review:
      summary: |
        This annotation is correct and represents the core localization of EPYC. Epiphycan is a
        secreted proteoglycan with an N-terminal signal peptide (aa 1-19) that directs it to the
        extracellular matrix where it functions exclusively. The protein is integrated into the
        organized three-dimensional scaffold of the ECM through interactions with collagen fibrils,
        hyaluronan, and other matrix components [file:human/EPYC/EPYC-deep-research-perplexity.md
        "functions exclusively in extracellular contexts...becomes integrated into the organized
        three-dimensional scaffold of the extracellular matrix"]. This is a fundamental and essential
        annotation for EPYC function.
      action: ACCEPT
      supported_by:
        - reference_id: file:human/EPYC/EPYC-deep-research-perplexity.md
          supporting_text: 'provider: perplexity'
        - reference_id: file:human/EPYC/EPYC-deep-research-falcon.md
          supporting_text: "EPYC is described as a **structural ECM proteoglycan**
            rather than a catalytic enzyme/transport protein"
        - reference_id: PMID:34638928
          supporting_text: "SLRPs are ubiquitously expressed in the ECM of most tissues
            where they act as structural constituents to maintain tissue architecture"
  - term:
      id: GO:0060348
      label: bone development
    evidence_type: IBA
    original_reference_id: GO_REF:0000033
    review:
      summary: |
        This annotation is supported but represents a non-core function. EPYC does influence bone
        development through mechanisms involving matrix organization and growth factor sequestration
        during endochondral ossification [file:human/EPYC/EPYC-deep-research-perplexity.md
        "protein influences bone development...during endochondral ossification"]. However, EPYC's
        primary role is in cartilage matrix organization, with bone development being a secondary
        consequence. EPYC-deficient mice show relatively subtle skeletal abnormalities early in
        development with age-dependent changes, indicating it's not essential for initial bone
        formation but contributes to skeletal homeostasis.
      action: KEEP_AS_NON_CORE
  - term:
      id: GO:0061975
      label: articular cartilage development
    evidence_type: IBA
    original_reference_id: GO_REF:0000033
    review:
      summary: |
        This annotation is correct and represents a core biological process for EPYC. Epiphycan is
        essential for articular cartilage development and maintenance. EPYC is highly expressed in
        articular cartilage and is critical for maintaining joint integrity. EPYC-deficient mice
        develop progressive osteoarthritis with articular cartilage erosions and proteoglycan loss,
        demonstrating its essential role [file:human/EPYC/EPYC-deep-research-perplexity.md
        "essential for maintaining articular cartilage integrity...EPYC-deficient mice develop
        osteoarthritis spontaneously with age...articular cartilage erosions"]. This is a fundamental
        function of EPYC.
      action: ACCEPT
      supported_by:
        - reference_id: file:human/EPYC/EPYC-deep-research-falcon.md
          supporting_text: "epiphycan (EPYC) is explicitly reported as a DS SLRP **found
            in epiphyseal cartilage**"
        - reference_id: PMID:29194731
          supporting_text: "Maturation results in the appearance of novel PGs such as
            epiphycan which is characteristic of articular cartilage"
        - reference_id: PMID:33023972
          supporting_text: "matrilin-3 (Matn3) and epiphycan (Epyc), which are essential
            components of collagen fibrillar network in cartilage"
  - term:
      id: GO:0031012
      label: extracellular matrix
    evidence_type: IEA
    original_reference_id: GO_REF:0000107
    review:
      summary: Extracellular matrix localization is correct for EPYC. While this
        duplicates the IBA annotation, both provide support for this cellular 
        component.
      action: ACCEPT
      reason: EPYC is a component of the extracellular matrix, particularly in 
        cartilage. Multiple evidence codes supporting the same correct 
        annotation provide additional confidence.
  - term:
      id: GO:0005539
      label: glycosaminoglycan binding
    evidence_type: TAS
    original_reference_id: PMID:8975717
    review:
      summary: |
        This annotation is problematic. EPYC itself IS a dermatan sulfate proteoglycan - it carries
        GAG chains as post-translational modifications [PMID:8975717 "small dermatan sulfate
        proteoglycan"]. The term "glycosaminoglycan binding" suggests EPYC binds to GAGs as ligands,
        which is not its primary characterized function. EPYC's GAG chains mediate interactions with
        other molecules (collagen, growth factors), but "glycosaminoglycan binding" is not an accurate
        description of EPYC's molecular function. This should be removed or replaced with a more
        accurate term like "extracellular matrix structural constituent" or "collagen binding".
      action: REMOVE
      supported_by:
        - reference_id: PMID:8975717
          supporting_text: Characterization of human DSPG3, a small dermatan 
            sulfate proteoglycan.
  - term:
      id: GO:0007565
      label: female pregnancy
    evidence_type: TAS
    original_reference_id: PMID:8975717
    review:
      summary: |
        This annotation is based solely on expression evidence - EPYC is expressed in placental
        tissue [PMID:8975717 "expressed in cartilage, as well as ligament and placental tissues"].
        However, mere expression in placenta does not establish a specific role in pregnancy. The
        term "female pregnancy" is too broad and doesn't describe EPYC's actual molecular or cellular
        function. EPYC likely plays a structural role in placental ECM organization, but this hasn't
        been experimentally demonstrated. This is an over-annotation based on tissue expression alone.
      action: MARK_AS_OVER_ANNOTATED
      supported_by:
        - reference_id: PMID:8975717
          supporting_text: Characterization of human DSPG3, a small dermatan 
            sulfate proteoglycan.
  - term:
      id: GO:0005518
      label: collagen binding
    evidence_type: TAS
    original_reference_id: file:human/EPYC/EPYC-deep-research-perplexity.md
    review:
      summary: |
        This is a core molecular function of EPYC. The protein binds to collagen type II fibrils
        via its leucine-rich repeat domains and regulates collagen fibril organization in cartilage.
        This is well-supported by structural and functional studies showing EPYC's role in controlling
        collagen fibrillogenesis through direct binding interactions.
      action: NEW
      supported_by:
        - reference_id: file:human/EPYC/EPYC-deep-research-falcon.md
          supporting_text: "EPYC \"can regulate the fibril formation by interacting with
            collagen fibrils and other extracellular matrix proteins.\""
        - reference_id: PMID:38184732
          supporting_text: "it can regulate the fibril formation by interacting with collagen
            fibrils and other extracellular matrix proteins"
        - reference_id: PMID:33023972
          supporting_text: "epiphycan (Epyc), which are essential components of collagen
            fibrillar network in cartilage"
  - term:
      id: GO:0030199
      label: collagen fibril organization
    evidence_type: TAS
    original_reference_id: file:human/EPYC/EPYC-deep-research-perplexity.md
    review:
      summary: |
        This is a core biological process for EPYC. The protein regulates collagen fibril assembly
        by controlling lateral fibril growth through steric hindrance, maintaining optimal
        intermolecular spacing. This is essential for maintaining proper cartilage matrix properties.
      action: NEW
      supported_by:
        - reference_id: file:human/EPYC/EPYC-deep-research-falcon.md
          supporting_text: "EPYC/epiphycan is a **secreted ECM SLRP** that contributes
            to **collagen fibrillogenesis and cartilage ECM assembly**"
        - reference_id: PMID:34638928
          supporting_text: "fundamental biological and pathophysiological functions,
            including collagen fibrillogenesis"
        - reference_id: PMID:38184732
          supporting_text: "it can regulate the fibril formation by interacting with collagen
            fibrils and other extracellular matrix proteins"
  - term:
      id: GO:0005201
      label: extracellular matrix structural constituent
    evidence_type: TAS
    original_reference_id: file:human/EPYC/EPYC-deep-research-perplexity.md
    review:
      summary: |
        This accurately describes EPYC's role as a structural component of the ECM. EPYC serves
        as an organizational node that facilitates interactions between collagen fibrils, hyaluronan,
        and other proteoglycans. This is more accurate than "glycosaminoglycan binding" for describing
        EPYC's structural function.
      action: NEW
      supported_by:
        - reference_id: file:human/EPYC/EPYC-deep-research-falcon.md
          supporting_text: "GO/KEGG enrichment in that laryngeal-cancer study associated
            EPYC-containing signatures with **\"extracellular matrix organization,\"
            \"extracellular region,\"** and **\"ECM-receptor interaction.\"**"
        - reference_id: PMID:34638928
          supporting_text: "SLRPs are ubiquitously expressed in the ECM of most tissues
            where they act as structural constituents to maintain tissue architecture"
  - term:
      id: GO:0030198
      label: extracellular matrix organization
    evidence_type: TAS
    original_reference_id: file:human/EPYC/EPYC-deep-research-perplexity.md
    review:
      summary: |
        This is a core biological process for EPYC. The protein organizes the three-dimensional
