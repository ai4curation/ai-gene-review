id: Q15125
gene_symbol: EBP
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  EBP (3-beta-hydroxysteroid-Delta(8),Delta(7)-isomerase; sterol Delta8-Delta7 isomerase;
  EC 5.3.3.5), historically identified as the emopamil-binding protein, is a multi-pass
  integral membrane enzyme of the endoplasmic reticulum that catalyses a post-lanosterol
  step of cholesterol biosynthesis. It isomerises the Delta(8) double bond of sterol
  intermediates to the Delta(7) position, converting zymostenol to lathosterol (in the
  modified Kandutsch-Russell pathway) and zymosterol to cholesta-7,24-dien-3beta-ol (in the
  Bloch pathway). The protein localises predominantly to the endoplasmic reticulum membrane
  and the nuclear envelope, and it possesses four transmembrane helices and an EXPERA domain
  characteristic of the EBP family. Beyond its enzymatic role, EBP is a high-affinity binding
  protein for emopamil and related sigma-receptor/antiischemic ligands, and it is a component
  of the microsomal antiestrogen binding site (AEBS), a complex with DHCR7 that carries
  cholesterol-5,6-epoxide hydrolase (ChEH) activity and is a target of tamoxifen. Loss of
  isomerase activity causes X-linked dominant chondrodysplasia punctata 2 (CDPX2 /
  Conradi-Hunermann-Happle syndrome), characterised by accumulation of 8-dehydrocholesterol
  and 8(9)-cholestenol, chondrodysplasia punctata, ichthyosis, cataracts and short stature;
  hypomorphic hemizygous variants in males cause MEND syndrome.
