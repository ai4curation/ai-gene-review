proposed_new_terms: []
suggested_questions:
- question: >-
    Within the AEBS (EBP-DHCR7) complex, does EBP itself contribute the catalytic
    cholesterol-5,6-epoxide hydrolase activity, or is it a scaffolding/regulatory partner of
    DHCR7?
suggested_experiments:
- description: >-
    Reconstitute purified EBP and DHCR7 separately and together in defined liposomes and
    assay ChEH activity to resolve which subunit carries the epoxide-hydrolase catalysis.
- description: >-
    Use the available cryo-EM/X-ray structures (PDB 6OHT, 8W0R) to model catalytic-residue
    (H77, E81, E123, T126, N194, W197) positioning relative to bound sterol and validate by
    structure-guided mutagenesis of the Delta8-Delta7 isomerization.
