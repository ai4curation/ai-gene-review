suggested_questions:
- question: What is the molecular basis by which dominant mutations in ATP6V1B2 cause
    DDOD versus ZLS2 — are these gain-of-function, dominant-negative, or haploinsufficiency
    effects?
- question: How does ATP6V1B2 (B2) compensate for ATP6V1B1 (B1) in renal intercalated
    cells, and why is this compensation insufficient under acid load?
- question: Does the interaction between ATP6V1B2 and huntingtin (HTT) have functional
    consequences for V-ATPase function or lysosomal biology in neurons?
- question: What is the relative contribution of ATP6V1B2 versus ATP6V1B1 to V-ATPase
    function in different cell types, and are there cell types where only B2 is expressed?

suggested_experiments:
- description: Structural analysis by cryo-EM of V-ATPase containing DDOD/ZLS2 mutant
    B2 subunits to determine the structural basis of dominant disease mutations.
  hypothesis: Dominant mutations in ATP6V1B2 alter V1 complex assembly or rotation
    dynamics in a gain-of-function or dominant-negative manner.
- description: Knock-in of the Arg485Pro ZLS2 mutation in mouse to establish the
    disease mechanism and test whether the phenotype can be rescued by gene therapy
    approaches.
  hypothesis: The Arg485Pro mutation causes ZLS2 through a dominant mechanism that
    can be distinguished from the DDOD-causing mutations.
- description: Comparative lysosomal pH measurements in primary cells from DDOD and
    ZLS2 patients to determine if the two diseases have different lysosomal acidification
    phenotypes.
  hypothesis: Different dominant ATP6V1B2 mutations cause distinct lysosomal pH alterations
    that correspond to the different clinical presentations.
- description: Single-cell RNA-seq in human kidney to determine the precise cell-type
    distribution of ATP6V1B2 vs ATP6V1B1 expression.
  hypothesis: ATP6V1B2 is more broadly expressed than ATP6V1B1 throughout the nephron,
    explaining why B2 can partially compensate for B1 loss only at baseline conditions.

