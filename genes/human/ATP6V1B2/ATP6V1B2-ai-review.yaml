        is one of the two major subunits comprising the hydrophilic catalytic complex
        of the enzyme.
      reference_section_type: ABSTRACT

core_functions:
- description: ATP6V1B2 is the non-catalytic B subunit of the V1 domain of V-ATPase.
    Three B2 subunits alternate with three catalytic A subunits to form the AB heterohexameric
    ring of V1. B2 is required for V1 complex assembly and enables proton translocation
    by the holoenzyme.
  contributes_to_molecular_function:
