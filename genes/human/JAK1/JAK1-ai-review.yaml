- term:
    id: GO:0005524
    label: ATP binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  review:
    summary: Essential cofactor binding for kinase activity
    action: ACCEPT
    reason: ATP binding is required for JAK1's tyrosine kinase activity. This is a
      core molecular function.
    supported_by:
    - reference_id: file:human/JAK1/JAK1-deep-research-falcon.md
      supporting_text: |-
        JAK1's **JH1** domain is the active tyrosine kinase module. The same kinase-family analysis reports canonical active-site motif residues in JAK1's catalytic domain, including **K908** (N-lobe), **D1003** within the **HRD** motif, and **D1022** within the **DFG** motif—hallmarks of protein kinase catalysis and ATP-dependent phosphotransfer.
  qualifier: enables
