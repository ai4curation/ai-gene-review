id: O43765
gene_symbol: SGTA
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: SGTA (small glutamine-rich tetratricopeptide repeat-containing protein
  alpha, also called SGT or alpha-SGT) is a cytosolic TPR-domain co-chaperone that operates
  in the biogenesis and quality control of tail-anchored (TA) and other hydrophobic
  membrane proteins. Through its central TPR domain it binds the chaperones HSC70/HSPA8,
  HSP70 and HSP90 and regulates their ATPase activity, while its glutamine-rich and N-terminal
  dimerization regions mediate homodimerization and client capture. SGTA binds the transmembrane/hydrophobic
  segments of newly synthesized clients rapidly and, acting upstream of and together
  with the BAG6 complex and the ASNA1/TRC40 (GET) targeting pathway, delivers TA proteins
  to the endoplasmic reticulum membrane. It also functions as a quality-control rheostat;
  by competing with the E3 ligase RNF126 for BAG6 and promoting deubiquitination of mislocalized
  substrates, SGTA antagonizes BAG6-mediated ubiquitination and proteasomal triage, biasing
  hydrophobic clients toward maturation rather than degradation. SGTA is predominantly
  cytoplasmic but accumulates in the nucleus during apoptosis.
