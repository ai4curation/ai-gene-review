- id: file:human/SGTA/SGTA-uniprot.txt
  title: UniProt entry O43765 (SGTA_HUMAN), small glutamine-rich TPR-containing protein
    alpha
  findings:
  - statement: SGTA is a cytosolic homodimeric TPR co-chaperone that binds HSC70/HSP70/HSP90
      and hydrophobic clients, mediates tail-anchored protein targeting to the ER via
      the BAG6/ASNA1 (GET) pathway, and antagonizes BAG6-mediated ubiquitination to bias
      clients toward maturation over degradation. Cytoplasmic and nuclear.
    reference_section_type: OTHER
core_functions:
- description: Cytosolic TPR co-chaperone and molecular adaptor that binds hydrophobic/tail-anchored
    client proteins and the HSC70/HSP70/HSP90 chaperones, delivering clients to the ER
    membrane via the BAG6 complex and the ASNA1/TRC40 (GET) targeting pathway.
  molecular_function:
    id: GO:0060090
    label: molecular adaptor activity
  locations:
  - id: GO:0005829
    label: cytosol
  supported_by:
  - reference_id: file:human/SGTA/SGTA-uniprot.txt
    supporting_text: Co-chaperone that binds misfolded and hydrophobic patches-containing
      client proteins in the cytosol.
  - reference_id: file:human/SGTA/SGTA-uniprot.txt
    supporting_text: Functions upstream of the BAG6 complex and ASNA1, binding more rapidly
      the transmembrane domain of newly synthesized proteins
- description: Post-translational targeting and insertion of tail-anchored membrane proteins
    into the ER membrane, acting upstream of and together with the BAG6/TRC40 targeting
    module.
