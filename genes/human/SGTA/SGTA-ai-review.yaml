proposed_new_terms: []
suggested_questions:
- question: What determines whether SGTA biases a given hydrophobic client toward ER targeting/maturation
    versus proteasomal degradation, and how is this rheostat set by BAG6/RNF126 stoichiometry?
- question: How does SGTA regulation of HSC70/HSP70 ATPase activity contribute to client
    capture and handoff to the TRC40/GET pathway?
- question: Does the nuclear accumulation of SGTA during apoptosis reflect a distinct,
    chaperone-independent function?
suggested_experiments:
- description: In vitro reconstitution of tail-anchored protein delivery using purified
    SGTA, BAG6 complex and TRC40/ASNA1 to measure SGTA's contribution to client capture
    and handoff kinetics, with TPR-domain and dimerization mutants.
- description: Quantitative ubiquitination/deubiquitination assays of a model mislocalized
    substrate under varying SGTA, BAG6 and RNF126 levels to map the maturation-versus-degradation
    equilibrium.
- description: Define the SGTA client repertoire by proximity labeling in cells, distinguishing
    bona fide TA/hydrophobic clients from high-throughput interactome noise.
