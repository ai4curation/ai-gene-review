id: Q99570
gene_symbol: PIK3R4
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: PIK3R4/VPS15/p150 is the regulatory/scaffolding subunit of human class III PI3K complexes.
  In PI3KC3-C1 with PIK3C3/VPS34, BECN1, and ATG14, it organizes the autophagy-initiation complex
  and contributes to complex-level PI3P production required for autophagosome assembly and macroautophagy.
  In PI3KC3-C2/UVRAG-associated contexts it supports endosomal trafficking, receptor catabolism, and
  autophagosome maturation. Protein kinase/autophosphorylation annotations are retained as non-core
  because the central PN function is PI3KC3 complex regulation rather than independent catalytic signaling.
