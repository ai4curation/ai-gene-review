suggested_questions:
- question: Should PIK3R4/VPS15 protein kinase annotations be retained, narrowed, or removed in light
    of current UniProt catalytic annotation but recent structural descriptions of VPS15 as a pseudokinase?
  experts:
  - GO molecular function editors
  - PI3KC3 structural biology experts
  - UniProt curators
- question: Should vacuole-specific IBA annotations for human PIK3R4 be systematically translated
    to lysosomal/endosomal terms for metazoan reviews?
  experts:
  - GO autophagy editors
  - GO endomembrane transport editors
  - PAINT curators
- question: Should PIK3R4 be annotated directly to autophagosome assembly based on PI3KC3-C1 membership
    and ULK1C:PI3KC3-C1 supercomplex evidence, or should this remain modeled only through complex
    contribution?
  experts:
  - GO autophagy editors
  - Reactome autophagy curators
suggested_experiments:
- description: Use PIK3R4 depletion and rescue mutants that disrupt VPS34 binding, ATG14/BECN1 bridging,
    or membrane anchoring to measure PI3P production, WIPI2/DFCP1 recruitment, LC3 lipidation, and
    starvation-induced autophagic flux.
  experiment_type: PI3KC3-C1 autophagy initiation rescue assay
  hypothesis: PIK3R4 supports autophagosome assembly primarily by organizing PI3KC3-C1 and enabling
    local VPS34-dependent PI3P production.
- description: Separate ATG14-containing and UVRAG-containing PIK3R4 complexes by affinity purification
    or endogenous tagging, then compare lipid kinase activity, endosomal localization, receptor degradation,
    and autophagosome maturation readouts.
  experiment_type: subcomplex-specific functional profiling
  hypothesis: PIK3R4 has separable C1 and C2 roles, with C1 biased toward autophagy initiation and
    C2 biased toward endosomal trafficking and maturation.
- description: Mutate predicted catalytic/ATP-binding residues in the PIK3R4 kinase-like domain while
    preserving PI3KC3 complex assembly, then assay autophosphorylation, PI3P production, and autophagy/endosomal
    phenotypes.
  experiment_type: kinase-domain separation-of-function assay
  hypothesis: PIK3R4 kinase-domain chemistry, if present in cells, is secondary to its structural/scaffolding
    role in PI3KC3 complexes.
