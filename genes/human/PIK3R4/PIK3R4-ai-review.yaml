- term:
    id: GO:0004674
    label: protein serine/threonine kinase activity
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: enables
  review:
    summary: protein serine/threonine kinase activity is retained as a non-core PIK3R4 molecular function
      because curated sources support kinase-domain/autophosphorylation biology but recent structures
      call VPS15 a pseudokinase.
    action: KEEP_AS_NON_CORE
    reason: Keep as non-core rather than making it the main functional claim. The dominant biological
      role of PIK3R4 is regulatory/scaffolding contribution to PI3KC3 complex lipid kinase activity;
      the protein-kinase annotation remains secondary and mechanistically debated.
    additional_reference_ids:
