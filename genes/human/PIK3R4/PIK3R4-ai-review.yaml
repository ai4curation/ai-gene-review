    label: pexophagy
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: involved_in
  review:
    summary: Pexophagy is too cargo-specific for human PIK3R4; the supported process is PI3KC3-C1-dependent
      autophagosome assembly/macroautophagy.
    action: MODIFY
    reason: Modify to autophagosome assembly. The human evidence supports PIK3R4/VPS15 as a PI3KC3-C1
      component for canonical bulk and selective autophagy initiation, but does not establish a PIK3R4-specific
      pexophagy role.
    proposed_replacement_terms:
    - &id032
      id: GO:0000045
      label: autophagosome assembly
    additional_reference_ids:
    - PMID:25490155
    - PMID:40442316
    - PMID:10625637
    supported_by:
    - &id002
      reference_id: PMID:40442316
      supporting_text: All forms of canonical autophagy, bulk and selective, are initiated upon the
        recruitment and activation ... PI3KC3-C1
    - &id001
