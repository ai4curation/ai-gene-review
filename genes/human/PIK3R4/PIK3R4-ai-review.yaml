      supporting_text: PI3KC3-C1 ... consists of the lipid kinase VPS34, the scaffolding protein VPS15,
        the tumor suppressor BECN1, and the autophagy-specific subunit ATG14
    - &id014
      reference_id: PMID:10625637
      supporting_text: overexpressing the p150 adaptor, stimulates macroautophagy
