suggested_questions:
- question: >-
    What is the physiological significance of the transient His-phosphorylation cycle and of
    the dual ATP stimulation/inhibition, and how do they regulate NAPRT flux across tissues?
- question: >-
    Do any of the reported protein-protein interactions (e.g. the HIT-family partner
    underlying the FHIP name) confer a regulatory or moonlighting function beyond catalysis?
suggested_experiments:
- description: >-
    Tissue- and tumor-specific measurement of NAPRT-dependent NaMN/NAD flux using isotope
    tracing with labeled nicotinic acid, to quantify the Preiss-Handler contribution relative
    to NAMPT-dependent salvage and inform NAPRT status as a biomarker for NAMPT-inhibitor
    sensitivity.
  experiment_type: metabolic flux / stable-isotope tracing
