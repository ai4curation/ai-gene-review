  label: Homo sapiens
description: >-
  NAPRT (nicotinate phosphoribosyltransferase, NAPRTase; also known as FHIP and NAPRT1) is a
  cytosolic enzyme that catalyzes the first, committed step of the Preiss-Handler pathway of
  NAD+ biosynthesis from dietary nicotinic acid (niacin). It condenses nicotinate with
  5-phospho-alpha-D-ribose 1-diphosphate (PRPP) to form nicotinate mononucleotide (NaMN, also
  called nicotinate beta-D-ribonucleotide) plus pyrophosphate; in the physiological reaction
  this phosphoribosyltransfer is coupled to ATP hydrolysis, which increases the enzyme's
  affinity for substrates and its catalytic efficiency (reflected in the assigned EC 6.3.4.21
  ligase classification). The NaMN produced is the same intermediate generated de novo by
  quinolinate phosphoribosyltransferase and by nicotinamide salvage, and it feeds into the
  shared completion steps catalyzed by NMNAT and NAD synthetase. NAPRT requires a divalent
  metal cofactor (Mg2+ or Mn2+) and acts as a homodimer with the active site at the subunit
  interface. It is highly expressed in liver, kidney and intestine, tissues in which
  nicotinic acid is a preferred NAD precursor, and by sustaining cellular NAD levels it
  contributes to protection against oxidative stress.
