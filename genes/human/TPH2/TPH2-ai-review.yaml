  label: Homo sapiens
description: >-
  TPH2 (tryptophan 5-hydroxylase 2; neuronal tryptophan hydroxylase; EC 1.14.16.4) is a
  soluble, tetrameric, biopterin-dependent aromatic amino acid hydroxylase and the neuronal
  paralog of TPH1. It catalyzes the rate-limiting step of serotonin (5-hydroxytryptamine)
  biosynthesis: the tetrahydrobiopterin (BH4)-, ferrous-iron- and O2-dependent hydroxylation
  of L-tryptophan to 5-hydroxy-L-tryptophan (5-HTP), which is subsequently decarboxylated by
  aromatic L-amino acid decarboxylase to yield serotonin (step 1 of 2). The enzyme comprises
  an N-terminal ACT regulatory domain, a central iron-containing catalytic domain, and a
  C-terminal leucine-zipper tetramerization domain. TPH2 is brain-specific and is expressed
  in serotonergic neurons of the brainstem raphe nuclei, where it produces the central-nervous-system
  serotonin pool throughout life; it is also present in enteric neurons of the gut. Because it
  is rate-limiting for CNS serotonin, loss-of-function variants of TPH2 are studied in the
  context of susceptibility to mood and psychiatric disorders including major depressive
  disorder, bipolar disorder and attention-deficit/hyperactivity disorder.
