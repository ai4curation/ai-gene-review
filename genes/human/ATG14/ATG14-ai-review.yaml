id: Q6ZNE5
gene_symbol: ATG14
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: 'ATG14/Barkor/ATG14L is the autophagy-specific regulatory and membrane-adaptor subunit of the human
  class III PI3K complex I (PI3KC3-C1). It targets the PIK3C3/VPS34-PIK3R4/VPS15-BECN1 complex to ER-associated
  omegasome/phagophore membranes for local PI3P production and autophagosome assembly, and it also promotes later
  STX17-SNAP29/VAMP8-dependent autophagosome-endolysosome fusion. In the proteostasis network, its core role is
  autophagy initiation and autophagosome maturation rather than generic protein binding or class I PI3K/AKT signaling.'
