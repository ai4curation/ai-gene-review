gene_symbol: OTUD3
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  OTUD3 (OTU domain-containing protein 3) is a cysteine-protease deubiquitinase
  (DUB, EC 3.4.19.12) of the ovarian tumor (OTU) family. Its catalytic OTU
  domain (active-site nucleophile Cys76, with His182) hydrolyzes isopeptide
  bonds of ubiquitin chains with a preference for atypical Lys-6 (K6)- and
  Lys-11 (K11)-linked polyubiquitin, and it also processes heterotypic
  (mixed/branched) and other homotypic chains; a C-terminal UBA-like domain does
  not affect catalysis. OTUD3 acts on specific substrates: it deubiquitinates
  and stabilizes the tumor suppressor PTEN (suppressing PI3K-AKT signaling and
  tumorigenesis), stabilizes the nuclear receptor PPARD to regulate glucose and
  lipid metabolism and oxidative phosphorylation in response to nutritional
  stress (with glucose/fatty-acid-triggered, CBP/CREBBP-dependent acetylation
  driving its nuclear translocation), and deubiquitinates KPTN to suppress mTORC1
  signaling. In ribosome-associated quality control, OTUD3 acts as a negative
  regulator by deubiquitinating 40S ribosomal proteins RPS10/eS10 and RPS20/uS10,
  antagonizing ZNF598-mediated 40S ubiquitination. OTUD3 shuttles between the
  cytoplasm and the nucleus.
