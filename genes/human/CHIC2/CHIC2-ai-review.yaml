gene_symbol: CHIC2
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: CHIC2 (Cysteine-rich hydrophobic domain-containing protein 2; also known
  as BTL) is a small (165 aa, ~19 kDa) palmitoylated, membrane-associated protein and
  the defining member of the CHIC family. It contains a single cysteine-rich hydrophobic
  (CHIC) motif (residues 88-106); palmitoylation within this motif is required for
  membrane association, and mutation of the cysteine cluster abolishes both palmitoylation
  and membrane binding. The protein localizes to the plasma membrane and to cytoplasmic
  vesicles, including a Golgi-like vesicular compartment and scattered vesicles, consistent
  with a role in membrane-associated vesicle trafficking and secretion. Its N-terminus
  is an acidic predicted coiled-coil region. The specific molecular function of CHIC2
  is not experimentally established. The CHIC2 locus lies at chromosome 4q12 and is
  recurrently deleted by the cryptic interstitial deletion that fuses FIP1L1 to PDGFRA
  in hypereosinophilic syndrome/chronic eosinophilic leukemia, where CHIC2 deletion
  serves as a diagnostic FISH marker; a separate t(4;12)(q12;p13) translocation fuses
  CHIC2 (BTL) to ETV6 in a form of acute myeloid leukemia.
