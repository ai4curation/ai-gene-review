core_functions:
- description: Palmitoylated, membrane-associated small protein that localizes to the
    plasma membrane and to cytoplasmic/Golgi-associated vesicles, where it is implicated
    in membrane-associated vesicle trafficking and secretion. Palmitoylation within
    the cysteine-rich hydrophobic (CHIC) motif is required for its membrane association.
  supported_by:
  - reference_id: file:human/CHIC2/CHIC2-uniprot.txt
    supporting_text: Cell membrane {ECO:0000269|PubMed:11257495}. Cytoplasmic vesicle
      {ECO:0000269|PubMed:11257495}.
  - reference_id: file:human/CHIC2/CHIC2-uniprot.txt
    supporting_text: Palmitoylation in the CHIC motif is required for membrane association.
proposed_new_terms: []
suggested_questions:
- What is the direct molecular function of CHIC2 at the membrane and on vesicles? Does
  it act as a scaffold/adapter, a regulator of palmitoylation, or a cargo/trafficking
  factor?
- Is CHIC2 functionally related to the Erf4/Golgin-A7 family (which participates in
  RAB GTPase palmitoylation), and does it have any role in protein palmitoylation or
  membrane targeting of partner proteins?
- Does loss of CHIC2 (as occurs in the 4q12 FIP1L1-PDGFRA deletion) contribute to disease
  phenotype, or is CHIC2 deletion purely a positional marker?
suggested_experiments:
- Acyl-biotin exchange or click-chemistry palmitoylproteomics to confirm CHIC2 palmitoylation
  sites and identify the responsible palmitoyltransferase(s).
- Affinity purification-mass spectrometry (AP-MS) under native membrane conditions
  to identify specific, reproducible CHIC2 interactors and distinguish them from the
  promiscuous Y2H preys currently annotated.
- CHIC2 knockout/knockdown in secretory cell models with secretion and vesicle-trafficking
  assays (e.g. cytokine secretion, surface marker recycling) to test its proposed role
  in vesicle trafficking.
