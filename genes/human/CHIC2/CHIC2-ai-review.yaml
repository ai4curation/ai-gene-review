    label: Golgi-associated vesicle
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: is_active_in
  review:
    summary: Phylogenetic (IBA) inference of localization to Golgi-associated vesicle.
      This is consistent with the experimentally documented Golgi-like vesicular compartment
      and scattered vesicles described for CHIC2, so the localization is plausible,
      but the protein is small and membrane-associated rather than functionally "active
      in" a vesicle lumen, and the IBA transfer is from a broad family model. Keep as
      a non-core localization annotation.
    action: KEEP_AS_NON_CORE
    reason: Plausible vesicular localization consistent with the UniProt note of a Golgi-like
      vesicular compartment, but inferred phylogenetically rather than directly demonstrated
      for human CHIC2, and not the core function.
    supported_by:
    - reference_id: file:human/CHIC2/CHIC2-uniprot.txt
      supporting_text: Note=Also present at a Golgi-like vesicular compartment and at
        scattered vesicles.
