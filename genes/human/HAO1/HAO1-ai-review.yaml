gene_symbol: HAO1
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: HAO1 (hydroxyacid oxidase 1; also called glycolate oxidase, GO/GOX, or
  glyoxylate oxidase; HAOX1) is a peroxisomal FMN-dependent (S)-2-hydroxy-acid oxidase
  of the FMN-dependent alpha-hydroxy acid dehydrogenase family. It is a homotetramer
  localized to the peroxisomal matrix and is highly expressed in liver. HAO1 has broad
  substrate specificity but preferentially oxidizes glycolate to glyoxylate, using
  molecular O2 as the physiological electron acceptor and generating hydrogen peroxide
  (H2O2); it also oxidizes long-chain 2-hydroxy fatty acids (e.g. 2-hydroxyhexadecanoate,
  2-hydroxyoctanoate) with lower efficiency, contributing to fatty-acid alpha-oxidation.
  Because it produces glyoxylate, the immediate precursor of oxalate, HAO1 is central
  to hepatic oxalate production, and in primary hyperoxaluria glyoxylate that is not
  detoxified to glycine is converted to oxalate, causing kidney stones and systemic
  oxalosis. HAO1 is therefore a validated therapeutic target, and the siRNA drug lumasiran
  silences hepatic HAO1 to lower oxalate in primary hyperoxaluria.
