proposed_new_terms: []
suggested_questions:
- question: Under physiological hepatic conditions, what fraction of glyoxylate that
    is ultimately converted to oxalate originates from HAO1-generated glyoxylate versus
    other sources (e.g. hydroxyproline metabolism)?
- question: Does HAO1-generated peroxisomal H2O2 have any regulated signaling or redox
    role, or is it purely a metabolic by-product handled by peroxisomal catalase?
suggested_experiments:
- description: Quantitative flux analysis in primary human hepatocytes with graded
    HAO1 knockdown (mimicking lumasiran) to measure the contribution of HAO1 to glyoxylate
    and oxalate pools.
- description: Structure-guided kinetic profiling of HAO1 against the full spectrum
    of L-2-hydroxy acid and 2-hydroxy fatty acid substrates to define its in vivo substrate
    hierarchy beyond glycolate.
