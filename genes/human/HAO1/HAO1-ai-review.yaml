  title: Identification and characterization of HAOX1, HAOX2, and HAOX3, three human
    peroxisomal 2-hydroxy acid oxidases.
  findings:
  - statement: HAOX1 (HAO1) is a peroxisomal 2-hydroxy acid oxidase most active on
      glycolate, also active on 2-hydroxy fatty acids, and able to oxidize glyoxylate
      to oxalate, implicating it in primary hyperoxaluria type 1 pathophysiology.
      Expressed primarily in liver and pancreas.
    supporting_text: substrate, glycolate, but is also active on 2-hydroxy fatty acids
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: PubMed-verified; primary identification/characterization of human
      HAO1 (HAOX1) establishing peroxisomal localization, glycolate preference, and
      the PH1 connection. Abstract-only cache.
- id: PMID:17669354
  title: Purification and characterization of recombinant human liver glycolate oxidase.
  findings:
  - statement: Recombinant human liver glycolate oxidase is an FMN-dependent peroxisomal
      oxidase belonging to the L-2-hydroxy-acid-oxidizing flavoenzyme family; it contributes
      to oxalate production and is inhibited by its product oxalate.
    supporting_text: an FMN-dependent peroxisomal oxidase
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: PubMed-verified; biochemical characterization of recombinant human
      HAO1, confirming FMN dependence, homotetramer, and substrate specificity. Abstract-only
      cache.
- id: PMID:18215067
  title: 'Active site and loop 4 movements within human glycolate oxidase: implications
    for substrate specificity and drug design.'
  findings:
  - statement: Crystal structures and kinetics of human glycolate oxidase (HAO1) show
      that oxidation of glycolate to glyoxylate is the primary reaction, that glyoxylate-to-oxalate
      oxidation is likely not physiologically relevant, and that the enzyme is a drug
      target for primary hyperoxaluria type 1.
    supporting_text: oxidation of glycolate to glyoxylate is the primary reaction catalyzed
      by GO, while the oxidation of glyoxylate to oxalate is most likely not relevant
      under normal conditions
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: PubMed-verified; structural/kinetic study establishing glycolate
      oxidation as the primary reaction and framing HAO1 as a hyperoxaluria drug target.
