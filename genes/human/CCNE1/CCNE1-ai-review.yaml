      action: MARK_AS_OVER_ANNOTATED
      reason: >-
        Generic protein binding is uninformative. The actual interaction is between
        cyclin E1 and INCA1, a CDK inhibitor. UniProt confirms this interaction.
      supported_by:
        - reference_id: PMID:21540187
