id: Q9NP73
gene_symbol: ALG13
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: Catalytic (glycosyltransferase) subunit of the bipartite ALG13-ALG14
  UDP-N-acetylglucosamine transferase (GnTase). Together with the membrane-anchoring
  subunit ALG14, ALG13 catalyses the second step of dolichol-linked oligosaccharide
  (lipid-linked oligosaccharide, LLO) assembly on the cytoplasmic face of the endoplasmic
  reticulum membrane, transferring a beta-1,4-linked N-acetylglucosamine from UDP-GlcNAc
  onto GlcNAc-PP-dolichol to form the chitobiose core GlcNAc2-PP-dolichol (N,N'-diacetylchitobiosyl
  diphosphodolichol; EC 2.4.1.141). ALG13 provides the UDP-GlcNAc-binding/catalytic
  glycosyltransferase-28 (GT28) domain but lacks a membrane-spanning region and is
  recruited to the ER membrane by, and is catalytically active only in complex with,
  ALG14. The resulting chitobiosyl-PP-dolichol is the substrate for the next pathway
  enzyme (ALG1), feeding protein N-linked glycosylation. In humans, loss-of-function
  variants cause X-linked developmental and epileptic encephalopathy 36 (ALG13-CDG),
  an infantile-onset epileptic encephalopathy / infantile spasms phenotype with
  neurodevelopmental impairment.
