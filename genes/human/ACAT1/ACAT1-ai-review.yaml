- term:
    id: GO:0015936
    label: coenzyme A metabolic process
  evidence_type: IDA
  original_reference_id: PMID:17371050
  qualifier: involved_in
  review:
    summary: >-
      BHF-UCL IDA annotation reflecting that CoA is consumed/released in the thiolase reaction.
      Reaction-level rather than a distinct physiological process.
    action: KEEP_AS_NON_CORE
    reason: >-
      CoA is intrinsic to the catalytic mechanism; not an independent core process.
- term:
    id: GO:0015937
    label: coenzyme A biosynthetic process
  evidence_type: IDA
  original_reference_id: PMID:17371050
  qualifier: involved_in
  review:
    summary: >-
      BHF-UCL IDA annotation reflecting CoA release during thiolytic cleavage. This is not genuine CoA
      biosynthesis (the de novo CoA biosynthetic pathway is unrelated); it is a reaction-level artifact.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      ACAT1 does not participate in coenzyme A biosynthesis; releasing free CoA as a thiolase product is
      not the biosynthetic pathway. Over-annotation.
- term:
    id: GO:1902860
    label: propionyl-CoA biosynthetic process
  evidence_type: IDA
  original_reference_id: PMID:17371050
  qualifier: involved_in
  review:
    summary: >-
      BHF-UCL IDA annotation reflecting that thiolysis of 2-methylacetoacetyl-CoA in the isoleucine
      pathway yields propionyl-CoA (plus acetyl-CoA). This is a product of the isoleucine-catabolism
      step rather than a separate core process.
    action: KEEP_AS_NON_CORE
    reason: >-
      Defensible as a product of the isoleucine-catabolism reaction; the physiological BP is better
      captured by L-isoleucine catabolic process.
