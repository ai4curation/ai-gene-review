core_functions:
- description: >-
    Potassium-activated mitochondrial-matrix acetoacetyl-CoA thiolase (EC 2.3.1.9) that catalyzes the
    reversible thiolytic cleavage/condensation at the acetoacetyl-CoA node (acetoacetyl-CoA + CoA <-> 2
    acetyl-CoA), central to ketone body metabolism (ketogenesis and ketolysis).
  supported_by:
  - reference_id: PMID:17371050
    supporting_text: >-
      important in the pathways for the synthesis and degradation of ketone bodies
    full_text_unavailable: true
  - reference_id: PMID:9744475
    supporting_text: >-
      Mitochondrial acetoacetyl-CoA thiolase (T2) deficiency is an inborn error of ketone body and
      isoleucine catabolisms.
    full_text_unavailable: true
  molecular_function:
    id: GO:0003985
    label: acetyl-CoA C-acetyltransferase activity
  directly_involved_in:
  - id: GO:0046952
    label: ketone body catabolic process
  locations:
  - id: GO:0005759
    label: mitochondrial matrix
- description: >-
    Catalyzes the final thiolytic step of L-isoleucine catabolism, cleaving the 2-methyl-branched
    intermediate 2-methylacetoacetyl-CoA into propionyl-CoA and acetyl-CoA - a substrate specificity
    unique among the structurally characterized thiolases. Loss of this activity causes beta-ketothiolase
    (3-ketothiolase) deficiency.
  supported_by:
  - reference_id: PMID:17371050
    supporting_text: >-
      A unique property of T2 is its ability to use 2-methyl-branched acetoacetyl-CoA as a substrate
    full_text_unavailable: true
  - reference_id: PMID:9744475
    supporting_text: >-
      Mitochondrial acetoacetyl-CoA thiolase (T2) deficiency is an inborn error of ketone body and
      isoleucine catabolisms.
    full_text_unavailable: true
  molecular_function:
    id: GO:0003985
    label: acetyl-CoA C-acetyltransferase activity
  directly_involved_in:
  - id: GO:0006550
    label: L-isoleucine catabolic process
  locations:
  - id: GO:0005759
    label: mitochondrial matrix
proposed_new_terms:
- proposed_name: ACAT1 tetramer protein-lysine-N-acetyltransferase activity
  proposed_definition: >-
    A protein-lysine N6-acetyltransferase activity exerted by the tetrameric form of mitochondrial
    acetyl-CoA acetyltransferase 1 (ACAT1/T2), distinct from its acetoacetyl-CoA thiolase activity,
    that transfers an acetyl group from acetyl-CoA to specific lysine residues of mitochondrial enzymes
    (e.g. IDH2 K413 and pyruvate dehydrogenase components), thereby regulating their activity.
  justification: >-
    Tetrameric ACAT1 reportedly moonlights as a protein-lysine acetyltransferase that acetylates and
    inhibits IDH2 and PDH components (Fan et al., PMID:27867011; Reactome:R-HSA-9854415). This activity is
    distinct from the canonical thiolase MF and is not captured by any existing GOA molecular-function
    annotation for P24752. An existing term such as GO:0061733 (peptide-lysine-N-acetyltransferase
    activity) may already suffice; a dedicated term is proposed only if expert review of the full-text
    evidence concludes a more specific concept is warranted.
suggested_questions:
- question: >-
    Should the moonlighting protein-acetyltransferase activity of the ACAT1 homotetramer (acetylation of
    IDH2/PDH; PMID:27867011) be added as a separate molecular function annotation, distinct from the core
    thiolase activity?
- question: >-
    The cholesterol O-acyltransferase (GO:0034736) and endoplasmic reticulum (GO:0005783) annotations on
    P24752 derive from a study of the ER enzyme SOAT1/SOAT2. Can UniProt/GOA add a guard against the
    ACAT1/SOAT1 name-collision so such wrong-gene annotations are not propagated to the mitochondrial
    thiolase?
- question: >-
    Is the "fatty acid beta-oxidation" pathway annotation appropriate for ACAT1, given that unbranched
    long-chain 3-oxoacyl-CoA thiolysis is principally performed by ACAA2 and the MTP (HADHA/HADHB)?
suggested_experiments:
- description: >-
    Express recombinant human ACAT1/T2 and directly assay for cholesterol O-acyltransferase (sterol
    esterification, EC 2.3.1.26) activity alongside SOAT1 as a positive control.
  hypothesis: >-
    Recombinant mitochondrial ACAT1/T2 will show no cholesterol-esterifying activity, confirming that
    GO:0034736 is a wrong-gene mis-annotation belonging to SOAT1/SOAT2.
- description: >-
    Quantify ketone body and isoleucine-pathway flux (acetoacetyl-CoA turnover, 2-methylacetoacetyl-CoA
    cleavage, urinary 2-methyl-3-hydroxybutyrate/tiglylglycine) in ACAT1-knockout versus wild-type cells
    or patient fibroblasts.
  hypothesis: >-
    ACAT1 loss will impair both ketolysis and the final thiolytic step of isoleucine catabolism, producing
    the characteristic 2-methyl-branched metabolite accumulation of beta-ketothiolase deficiency.
- description: >-
    Reconstitute the ACAT1-tetramer-mediated acetylation of IDH2 in vitro and in cells, and test whether
    K+ activation and tetramer formation are required for the acetyltransferase (versus thiolase) activity.
  hypothesis: >-
    The protein-acetyltransferase moonlighting activity depends on the tetrameric assembly of ACAT1 and is
    mechanistically separable from its acetoacetyl-CoA thiolase activity.
