id: P24752
gene_symbol: ACAT1
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  ACAT1 encodes the mitochondrial enzyme acetyl-CoA acetyltransferase / acetoacetyl-CoA
  thiolase (also called "T2"; EC 2.3.1.9), a soluble homotetramer of the mitochondrial
  matrix. It is a CoA-dependent, potassium-activated thiolase that catalyzes the reversible
  Claisen condensation/thiolysis at the acetoacetyl-CoA node (2 acetyl-CoA <-> acetoacetyl-CoA
  + CoA), giving it a central role in ketone body metabolism (both ketogenesis and
  ketolysis). It also degrades the 2-methyl-branched intermediate 2-methylacetoacetyl-CoA,
  catalyzing the final thiolytic step of L-isoleucine catabolism. Loss-of-function variants
  cause beta-ketothiolase deficiency (3-ketothiolase deficiency, 3KTD), an autosomal recessive
  inborn error of isoleucine and ketone body catabolism marked by ketoacidotic episodes and
  urinary excretion of 2-methyl-3-hydroxybutyrate, 2-methylacetoacetate and tiglylglycine.
  Despite sharing the historical nickname "ACAT1", this mitochondrial thiolase is distinct from
  the endoplasmic-reticulum cholesterol-esterifying enzyme sterol O-acyltransferase 1 (SOAT1,
  EC 2.3.1.26, also formerly nicknamed ACAT1); ACAT1/T2 has no cholesterol O-acyltransferase
  activity.
