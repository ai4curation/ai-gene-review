- id: PMID:1715688
  title: Evidence for a structural mutation (347Ala to Thr) in a German family with 3-ketothiolase
    deficiency.
  findings:
  - statement: >-
      Characterized a 3KTD missense allele (A380T / "347Ala to Thr" in the mature subunit) shown by
      expression analysis to destabilize the T2 protein, linking EC 2.3.1.9 thiolase activity to ACAT1.
    reference_section_type: ABSTRACT
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified disease-variant study of mitochondrial acetoacetyl-CoA thiolase (T2). Abstract-only
      in cache; supports the thiolase MF and disease association.
- id: PMID:17371050
  title: 'Crystallographic and kinetic studies of human mitochondrial acetoacetyl-CoA thiolase: the
    importance of potassium and chloride ions for its structure and function.'
  findings:
  - statement: >-
      High-resolution crystal structures of human T2 (apo and CoA complex, with/without K+). Defines the
      homotetramer, the CoA- and K+-binding sites near the catalytic site, and K+ activation.
    reference_section_type: ABSTRACT
  - statement: >-
      T2 is important for synthesis and degradation of ketone bodies and for degradation of
      2-methylacetoacetyl-CoA; it uniquely accepts 2-methyl-branched acetoacetyl-CoA and degrades
      acetoacetyl-CoA and 2-methylacetoacetyl-CoA with similar catalytic efficiencies.
    reference_section_type: ABSTRACT
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified primary structural/kinetic study of human ACAT1/T2. Abstract-only in cache
      (full_text_available: false); the abstract directly supports MF, K+ binding, ketone body and
      isoleucine roles.
- id: PMID:19056867
  title: Large-scale proteomics and phosphoproteomics of urinary exosomes.
  findings:
  - statement: >-
      Proteomic profiling of human urinary exosomes; basis for the extracellular-exosome localization
      annotation. Not a functional localization for the mitochondrial thiolase.
    reference_section_type: ABSTRACT
  reference_review:
    relevance: LOW
    correctness: VERIFIED
    review_notes: >-
      High-throughput vesicle proteomics; supports only an incidental exosome detection.
- id: PMID:1979337
  title: Molecular cloning and sequence of the complementary DNA encoding human mitochondrial
    acetoacetyl-coenzyme A thiolase and study of the variant enzymes in cultured fibroblasts from
    patients with 3-ketothiolase deficiency.
  findings:
  - statement: >-
      Cloned/sequenced the 427-aa human T2 precursor (33-residue leader + mature subunit) and showed by
      subcellular fractionation that T2 protein localizes to mitochondria in patient fibroblasts.
    reference_section_type: ABSTRACT
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified original cloning + localization study; supports mitochondrial localization and the
      thiolase function via 3KTD patient analysis.
- id: PMID:23533145
  title: In-depth proteomic analyses of exosomes isolated from expressed prostatic secretions in urine.
  findings:
  - statement: >-
      Proteomic analysis of prostatic-secretion urinary exosomes; basis for an extracellular-exosome
      localization annotation. Incidental, not functional.
    reference_section_type: ABSTRACT
  reference_review:
    relevance: LOW
    correctness: VERIFIED
    review_notes: >-
      High-throughput vesicle proteomics; supports only incidental exosome detection.
- id: PMID:32944968
  title: Cholesterol 25-Hydroxylase inhibits SARS-CoV-2 and other coronaviruses by depleting membrane
    cholesterol.
  findings:
  - statement: >-
      Studies CH25H/25HC activating the ER acyl-CoA:cholesterol acyltransferase ("ACAT", EC 2.3.1.26) -
      i.e. sterol O-acyltransferase SOAT1/SOAT2 - to deplete plasma-membrane cholesterol and block
      coronavirus fusion. Functional perturbation used shRNAs targeting "ACAT1 and ACAT2" (SOAT1/SOAT2).
    reference_section_type: ABSTRACT
  reference_review:
    relevance: NONE
    correctness: MISCITED
    review_notes: >-
      The "ACAT" in this paper is the ER cholesterol-esterifying enzyme SOAT1/SOAT2 (EC 2.3.1.26), not the
      mitochondrial acetoacetyl-CoA thiolase P24752 (EC 2.3.1.9). The cholesterol O-acyltransferase
      (GO:0034736) and endoplasmic reticulum (GO:0005783) annotations placed on P24752 from this paper are
      wrong-gene mis-attributions caused by the ACAT1/SOAT1 name collision; both are recommended for REMOVE.
