    label: fatty acid beta-oxidation
  evidence_type: IEA
  original_reference_id: GO_REF:0000041
  qualifier: involved_in
  review:
    summary: >-
      UniPathway-derived electronic annotation to fatty acid beta-oxidation. UniProt lists T2 under
      this pathway as a thiolase, but the unbranched long-/medium-chain 3-oxoacyl-CoA thiolysis of
      classic beta-oxidation is principally performed by ACAA2 and the MTP (HADHA/HADHB); ACAT1/T2's
      dominant roles are the acetoacetyl-CoA (ketone body) node and the 2-methyl-branched isoleucine
      intermediate.
    action: KEEP_AS_NON_CORE
    reason: >-
      Defensible at the pathway-parent level but not the core physiological role of this thiolase.
