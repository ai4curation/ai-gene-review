- term:
    id: GO:0034736
    label: cholesterol O-acyltransferase activity
  evidence_type: IDA
  original_reference_id: PMID:32944968
  qualifier: enables
  review:
    summary: >-
      This annotation mis-attributes a cholesterol-esterifying activity to the mitochondrial thiolase
      P24752. PMID:32944968 studies the ER acyl-CoA:cholesterol acyltransferase ("ACAT", EC 2.3.1.26),
      which is sterol O-acyltransferase SOAT1/SOAT2 - distinct genes that merely share the historical
      nickname "ACAT1/ACAT2". The paper's functional perturbation used "shRNAs targeting ACAT1 and
      ACAT2" (i.e., SOAT1/SOAT2), and describes the enzyme as ER-localized. The mitochondrial T2
      (EC 2.3.1.9) has no cholesterol O-acyltransferase activity.
    action: REMOVE
    reason: >-
      Wrong-gene mis-annotation arising from the ACAT1/SOAT1 name collision. Cholesterol esterification
      is an EC 2.3.1.26 activity of the ER enzyme SOAT1/SOAT2, not of the mitochondrial acetoacetyl-CoA
      thiolase P24752. This contradicts the established mitochondrial-matrix thiolase function and
      should not be propagated.
    supported_by:
    - reference_id: PMID:32944968
      supporting_text: >-
        25HC inhibits viral membrane fusion by activating the ER-localized acyl-CoA:cholesterol
        acyltransferase (ACAT) which leads to the depletion of accessible cholesterol from the plasma
        membrane.
    proposed_replacement_terms:
    - id: GO:0003985
      label: acetyl-CoA C-acetyltransferase activity
