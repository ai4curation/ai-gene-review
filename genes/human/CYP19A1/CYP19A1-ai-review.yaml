id: P11511
gene_symbol: CYP19A1
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  CYP19A1 (aromatase; cytochrome P450 19A1; P-450AROM; estrogen synthase; EC 1.14.14.14) is a
  microsomal, endoplasmic-reticulum-membrane heme-thiolate cytochrome P450 monooxygenase that
  catalyzes the rate-limiting, committed step of estrogen biosynthesis: the aromatization of C19
  androgens to C18 estrogens. In three sequential oxidations, each consuming one molecule of O2 and
  one of NADPH supplied via cytochrome P450 reductase (POR), it removes the C19 angular methyl group
  and aromatizes the steroid A-ring, converting androst-4-ene-3,17-dione (androstenedione) to estrone
  and testosterone to 17beta-estradiol; the first two steps are C19-methyl hydroxylations (19-hydroxy
  then 19-oxo/aldehyde) and the third, unique step is A-ring aromatization with C1-beta hydrogen
  abstraction, C10-C19 bond cleavage, and release of formic acid. The heme iron is axially
  coordinated by a conserved cysteine thiolate, and membrane anchoring via the hydrophobic
  N-terminal segment is required to give lipophilic steroid substrates access to the active site.
  Aromatase is the only vertebrate enzyme that makes estrogens from androgens. It is expressed via
  tissue-specific alternative promoters in the gonads (ovarian granulosa cells, testis), placenta,
  adipose tissue, brain, skin fibroblasts, and bone. Loss of function causes aromatase deficiency
  (virilization, tall stature from unfused epiphyses, and osteoporosis), whereas gain/overexpression
  causes aromatase excess syndrome (gynecomastia and precocity); aromatase is the pharmacological
  target of aromatase-inhibitor therapy (letrozole, anastrozole, exemestane) for estrogen-dependent
  breast cancer. Minor secondary activities include 2-hydroxylation of estrone and oxidation of
  dihydrotestosterone to 19-nor products.
