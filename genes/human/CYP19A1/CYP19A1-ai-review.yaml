  title: UniProtKB P11511 CYP19A1 (CP19A_HUMAN) record
  findings:
  - statement: >-
      UniProt describes aromatase as a cytochrome P450 monooxygenase that converts C19 androgens
      (androstenedione, testosterone) to C18 estrogens (estrone, 17beta-estradiol) via three
      successive oxidations using O2 and NADPH through cytochrome P450 reductase; it binds heme,
      localizes to the endoplasmic reticulum/microsome membrane as a multi-pass membrane protein, is
      widely expressed (brain, placenta, adipose, gonads), and its loss/gain causes aromatase
      deficiency / aromatase excess syndrome.
    reference_section_type: OTHER
suggested_questions:
- question: >-
    Beyond the well-characterized estrogen-biosynthetic role, do the minor activities (estrone
    2-hydroxylation; dihydrotestosterone oxidation to 19-nor products) have a demonstrable in vivo
    physiological function, e.g. in local androgen homeostasis?
- question: >-
    How does PKA/PKG phosphorylation of aromatase modulate its activity in vivo across the different
    tissue-specific expression contexts (placenta, adipose, brain, gonad)?
suggested_experiments:
- description: >-
    Tissue-specific conditional knockout / promoter-specific expression studies to quantify the
    contribution of each alternative promoter (placental, adipose, brain, gonadal) to circulating
    versus local estrogen pools.
- description: >-
    Reconstituted-membrane kinetic assays with defined POR (and cytochrome b5) stoichiometry to
    dissect how redox-partner availability governs the three sequential oxidation steps and the
    minor 2-hydroxylase activity.
