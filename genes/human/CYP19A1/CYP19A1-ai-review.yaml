core_functions:
- description: >-
    Aromatase activity (EC 1.14.14.14): as a microsomal heme-thiolate cytochrome P450 monooxygenase,
    CYP19A1 catalyzes the committed, rate-limiting step of estrogen biosynthesis, aromatizing C19
    androgens to C18 estrogens (androstenedione -> estrone; testosterone -> 17beta-estradiol) via
    three sequential O2/NADPH-dependent oxidations (two C19-methyl hydroxylations followed by A-ring
    aromatization with C10-C19 cleavage and formate release), receiving electrons from cytochrome
    P450 reductase (POR).
