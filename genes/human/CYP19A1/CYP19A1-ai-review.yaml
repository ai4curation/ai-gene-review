    label: female gonad development
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: involved_in
  review:
    summary: >-
      Estrogen produced by ovarian aromatase is required for normal ovarian follicle development and
      female reproductive function; aromatase deficiency causes multicystic ovaries and delayed
      puberty. This IBA developmental annotation is biologically supported but reflects a downstream
      physiological consequence of estrogen synthesis rather than the enzyme's core molecular role.
    action: KEEP_AS_NON_CORE
    reason: >-
      Accurate but non-core: it captures the developmental/physiological outcome of estrogen
      biosynthesis in the ovary rather than aromatase's catalytic function; retained as non-core.
