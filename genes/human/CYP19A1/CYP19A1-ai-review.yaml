- term:
    id: GO:0009055
    label: electron transfer activity
  evidence_type: TAS
  original_reference_id: PMID:2848247
  qualifier: enables
  review:
    summary: >-
      Electron transfer activity (GO:0009055) is the function of electron-carrier/shuttle proteins.
      Aromatase is the terminal cytochrome P450 oxygenase: it RECEIVES two electrons from NADPH via
      cytochrome P450 reductase (POR) to activate O2, but it is not itself an electron carrier. The
      P450 monooxygenase reaction is captured by aromatase/monooxygenase MF terms, and the cited
      1988 cloning paper does not establish an electron-transfer-carrier function for the enzyme.
    action: REMOVE
    reason: >-
      Mischaracterizes aromatase as an electron carrier; it is a heme-thiolate monooxygenase that
      accepts electrons from POR rather than transferring electrons as a shuttle. Demonstrably wrong
      MF for a terminal P450 oxygenase.
    supported_by:
    - reference_id: PMID:19129847
      supporting_text: >-
        coupling with its redox partner cytochrome P450 reductase
    - reference_id: PMID:1371509
      supporting_text: >-
        Of the enzymes participating in the electron transport system of placental microsomes
- term:
    id: GO:0019825
    label: oxygen binding
  evidence_type: TAS
  original_reference_id: PMID:2848247
  qualifier: enables
  review:
    summary: >-
      Molecular oxygen is a co-substrate activated at the heme iron during each aromatase oxidation
      step. However, oxygen binding (GO:0019825) is typically reserved for O2-carrier/storage
      proteins (e.g. hemoglobin); for a monooxygenase, O2 activation is subsumed by the
      monooxygenase/aromatase MF terms, making this an over-annotation.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      O2 is a reaction co-substrate rather than a carried ligand; the catalytic use of O2 is captured
      by the monooxygenase/aromatase MF terms.
    supported_by:
    - reference_id: PMID:19129847
      supporting_text: >-
        each step requiring 1 mol of O(2), 1 mol of NADPH, and coupling with its redox partner cytochrome P450 reductase
