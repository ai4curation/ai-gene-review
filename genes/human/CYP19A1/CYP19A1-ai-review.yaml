- term:
    id: GO:0032355
    label: response to estradiol
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: involved_in
  review:
    summary: >-
      Aromatase synthesizes 17beta-estradiol; it is the enzyme that produces estradiol rather than a
      protein whose activity is a cellular response to estradiol. This IBA "response to estradiol"
      term appears to be an over-propagation from the phylogenetic family and does not describe
      aromatase's own function.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      "Response to estradiol" mischaracterizes the direction of the relationship: CYP19A1 is the
      biosynthetic source of estradiol, not a downstream responder. Over-annotated via IBA
      propagation across the aromatase/P450 group.
    propagation_review:
      root_cause: TERM_SCOPING_PROBLEM
    supported_by:
