id: O00178
gene_symbol: GTPBP1
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: GTPBP1 (GTP-binding protein 1, also called GP-1) is a cytoplasmic translational
  GTPase of the TRAFAC-class translation-factor superfamily, most closely related to
  eEF1A, eRF3 and Hbs1. It possesses eEF1A-like elongation activity, forming ternary
  complexes with GTP and aminoacyl-tRNA and delivering cognate aa-tRNA to the ribosomal
  A site in a GTP-dependent manner, and can also deliver deacylated tRNA. aa-tRNA binding
  stabilizes its GTP binding and stimulates GTP hydrolysis. Unlike canonical eEF1A,
  GTP hydrolysis by GTPBP1 is not promptly followed by peptide-bond formation; it retains
  aa-tRNA in the A site, which delays accommodation and can stall the ribosome, coupling
  GTPBP1 to mRNA surveillance and ribosome-associated quality control, notably by promoting
  exosome-mediated degradation of faulty mRNAs engaged in elongation complexes. GTPBP1
  associates with cytoplasmic exosome subunits and has been implicated in the regulation
  of circadian mRNA stability. Loss-of-function variants cause an autosomal-recessive
  neurodevelopmental disorder (NEDFET1).
