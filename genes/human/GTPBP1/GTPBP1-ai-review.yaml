core_functions:
- description: eEF1A-like translational GTPase that forms a GTP/aminoacyl-tRNA ternary
    complex and delivers aa-tRNA to the ribosomal A site; its non-canonical kinetics
    (delayed peptide-bond formation) couple it to ribosome stalling and quality control.
  molecular_function:
    id: GO:0003746
    label: translation elongation factor activity
  locations:
  - id: GO:0005737
    label: cytoplasm
  supported_by:
  - reference_id: PMID:30108131
    supporting_text: GTPBP1 possesses eEF1A-like
  - reference_id: file:human/GTPBP1/GTPBP1-uniprot.txt
    supporting_text: delivering aa-tRNAs to the ribosomal A site in a GTP-dependent
      manner
- description: Promotes mRNA surveillance / ribosome-associated quality control by
    stalling on faulty elongation complexes and stimulating exosome-mediated degradation
    of the engaged mRNA.
  molecular_function:
    id: GO:0003924
    label: GTPase activity
  locations:
  - id: GO:0005737
    label: cytoplasm
  supported_by:
  - reference_id: file:human/GTPBP1/GTPBP1-uniprot.txt
    supporting_text: promotes exosomal degradation of faulty mRNAs engaged in 80S elongation
      complexes
proposed_new_terms: []
suggested_questions:
- question: What endogenous mRNAs or stress conditions trigger GTPBP1-dependent exosomal
    degradation, and how is the choice between productive elongation (eEF1A) and GTPBP1-mediated
    stalling made?
- question: Does the neurodevelopmental disorder NEDFET1 arise from loss of GTPBP1's
    elongation activity, its surveillance/exosome-recruitment role, or both?
suggested_experiments:
- description: Ribosome profiling and exosome-substrate (RNA degradome) sequencing
    in GTPBP1-knockout versus wild-type cells to identify endogenous mRNAs whose turnover
    depends on GTPBP1.
- description: Reconstituted A-site accommodation and peptidyl-transfer kinetics comparing
    GTPBP1 with eEF1A on defined ribosomal complexes to quantify the stalling propensity
    that drives surveillance.
