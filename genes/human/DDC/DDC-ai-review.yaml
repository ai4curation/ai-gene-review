id: P20711
gene_symbol: DDC
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  DDC encodes aromatic-L-amino-acid decarboxylase (AADC; also known as DOPA
  decarboxylase, DDC), a cytosolic, pyridoxal 5'-phosphate (PLP)-dependent
  homodimeric decarboxylase (EC 4.1.1.28) of the group II decarboxylase family.
  It acts at the branch point of monoamine neurotransmitter biosynthesis,
  catalyzing the decarboxylation of L-3,4-dihydroxyphenylalanine (L-DOPA) to
  dopamine in the catecholamine branch and of 5-hydroxy-L-tryptophan (5-HTP) to
  serotonin in the indoleamine branch, and it can also decarboxylate other
  aromatic amino acids. Because dopamine is the precursor of noradrenaline and
  adrenaline and serotonin is the precursor of melatonin, DDC activity is shared
  across the catecholamine and serotonin/melatonin pathways. The enzyme is a
  homodimer that binds PLP through a Schiff base to an active-site lysine. Loss
  of DDC function causes aromatic L-amino-acid decarboxylase deficiency (AADCD),
  a severe autosomal-recessive inborn error of neurotransmitter metabolism with
  combined serotonin and catecholamine deficiency.
