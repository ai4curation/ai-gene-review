- id: PMID:19703902
  title: Oxidative status of DJ-1-dependent activation of dopamine synthesis through
    interaction of tyrosine hydroxylase and 4-dihydroxy-L-phenylalanine (L-DOPA) decarboxylase
    with DJ-1.
  findings:
  - statement: >-
      DJ-1 (PARK7) directly binds DDC and tyrosine hydroxylase and positively
      regulates their activities in human dopaminergic cells; a ternary DJ-1/TH/
      DDC complex was detected. Grounds the direct L-DOPA decarboxylase activity
      (IDA), dopamine biosynthesis (IDA), and enzyme-binding (TH) annotations.
    supporting_text: >-
      we found that DJ-1 directly bound to TH and DDC and positively regulated
      their activities in human dopaminergic cells
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Full text available. Directly measures DDC/L-DOPA decarboxylase activity
      and dopamine synthesis and documents the DJ-1 and TH interactions.
