- id: PMID:12864730
  title: Isolation and identification of L-dopa decarboxylase as a protein that binds
    to and enhances transcriptional activity of the androgen receptor using the repressed
    transactivator yeast two-hybrid system.
  findings:
  - statement: >-
      DDC (L-DOPA decarboxylase) was identified as a novel androgen receptor
      (AR)-interacting protein that enhances ligand-dependent AR transcriptional
      activity in prostate cancer cells, suggesting a moonlighting coactivator
      role distinct from its enzymatic function.
    supporting_text: >-
      DDC (L-dopa decarboxylase) was detected multiple times as a novel
      AR-interacting
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified. Supports the AR-interaction (protein binding IPI) as a
      real but non-core, moonlighting activity of DDC in prostate cells.
