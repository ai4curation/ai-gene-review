id: Q9UI32
gene_symbol: GLS2
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  GLS2 encodes the liver-type (L-type) phosphate-activated glutaminase (glutaminase 2;
  also called LGA/GAB), a mitochondrial amidohydrolase (EC 3.5.1.2) that catalyzes the
  hydrolysis of L-glutamine to L-glutamate and ammonia. It is one of the two human
  glutaminase genes (the other being the kidney-type GLS) and assembles as a homotetramer
  (dimer of dimers) with a catalytic glutaminase domain and a C-terminal pair of ankyrin
  repeats. The glutamate produced feeds alpha-ketoglutarate into the TCA cycle, supporting
  mitochondrial respiration and ATP generation, and serves as a precursor for glutathione
  synthesis, so GLS2 contributes to cellular antioxidant defense by lowering reactive
  oxygen species. In liver it also supplies ammonia to the urea cycle. GLS2 is highly
  expressed in liver and additionally in brain and pancreas, with a distinct kinetic and
  regulatory profile from GLS. Its expression is directly induced by the tumor suppressor
  p53, and GLS2 is frequently down-regulated in hepatocellular carcinoma and some other
  tumors, consistent with a tumor-suppressive role.
