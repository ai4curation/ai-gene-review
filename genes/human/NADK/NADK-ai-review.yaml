core_functions:
- description: >-
    NAD+ kinase activity: transfers the gamma-phosphate of ATP to NAD(+) to form NADP(+)
    (NAD+ + ATP -> NADP+ + ADP + H+; EC 2.7.1.23). The active enzyme is a homotetramer
    highly selective for NAD and ATP and requires a divalent metal cation; it does not
    phosphorylate NAAD (does not make NAADP). This is the de novo, committed source of the
    cellular NADP(H) pool.
  molecular_function:
    id: GO:0003951
    label: NAD+ kinase activity
  supported_by:
