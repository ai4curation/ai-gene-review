    supporting_text: >-
      The catalytically active homotetramer is highly selective for its substrates, NAD and
      ATP.
  - reference_id: file:human/NADK/NADK-uniprot.txt
    supporting_text: "Reaction=NAD(+) + ATP = ADP + NADP(+) + H(+)"
