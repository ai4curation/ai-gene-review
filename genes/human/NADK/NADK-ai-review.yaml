id: O95544
gene_symbol: NADK
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  NADK is the human cytosolic NAD kinase (EC 2.7.1.23), the enzyme that phosphorylates
  NAD(+) using ATP to produce NADP(+) (NAD+ + ATP -> NADP+ + ADP + H+). It is the de novo,
  committed source of the cellular NADP(H) pool that supplies reducing equivalents for
  reductive biosynthesis (e.g. fatty acid and nucleotide synthesis) and for antioxidant
  defense through regeneration of reduced glutathione and thioredoxin. The active enzyme is
  a homotetramer and requires a divalent metal cation per subunit; it is highly selective
  for NAD and ATP and does not phosphorylate the nicotinic acid analog NAAD, so it does not
  generate NAADP. NADK is widely expressed across human tissues (not detected in skeletal
  muscle) and acts in the cytosol. A separate gene product, NADK2 (mitochondrial NAD
  kinase), supplies the mitochondrial NADP(H) pool. NADK carries an N-terminal serine
  phosphocluster and its activity is subject to signaling and redox regulation.
