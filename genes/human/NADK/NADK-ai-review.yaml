  findings:
  - statement: >-
      Human NAD kinase was cloned and functionally overexpressed; the catalytically active
      homotetramer is highly selective for NAD and ATP and synthesizes NADP.
    reference_section_type: ABSTRACT
    supporting_text: >-
      The catalytically active homotetramer is highly selective for its substrates, NAD and
      ATP.
  - statement: >-
      The enzyme does not phosphorylate the nicotinic acid analog NAAD, indicating NAADP is
      made by an alternative route.
    reference_section_type: ABSTRACT
    supporting_text: >-
      It did not phosphorylate the nicotinic acid derivative of NAD (NAAD) suggesting that
      the potent calcium-mobilizing pyridine nucleotide NAADP is synthesized by an
      alternative route.
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified primary characterization of human NADK; cache is abstract-only
      (full_text_available false). Directly establishes the core NAD+ kinase activity (IDA),
      substrate selectivity, tetrameric assembly, and tissue distribution.
