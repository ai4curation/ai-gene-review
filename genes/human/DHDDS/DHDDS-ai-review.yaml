id: Q86SQ9
gene_symbol: DHDDS
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  DHDDS is the catalytic subunit of the human cis-prenyltransferase (cis-PT /
  dehydrodolichyl diphosphate synthase) complex. Together with the non-catalytic
  subunit NUS1 (Nogo-B receptor, NgBR), it catalyzes the committed step of
  dolichol biosynthesis: the Mg2+-dependent, sequential cis (Z)-condensation of
  many isopentenyl diphosphate (IPP) units onto the allylic primer
  (2E,6E)-farnesyl diphosphate (FPP) to form long-chain
  ditrans,polycis-polyprenyl (dehydrodolichyl) diphosphate (predominantly C95-C100).
  This product is the precursor of dolichyl phosphate (Dol-P), the obligate glycan
  carrier lipid used in N-linked protein glycosylation, O-mannosylation, and GPI-anchor
  biosynthesis. The active enzyme is a heterotetramer (a dimer of DHDDS-NUS1
  heterodimers); the single active site lies entirely within DHDDS, while NUS1 is a
  pseudo-cis-prenyltransferase that contributes a C-terminal RXG motif to the DHDDS
  active site and allosterically enhances activity. DHDDS is a peripheral membrane
  protein of the endoplasmic reticulum. In humans, DHDDS variants cause autosomal
  recessive retinitis pigmentosa 59 and a dominant developmental and epileptic
  encephalopathy, and severe loss of activity can present as a congenital disorder
  of glycosylation.
