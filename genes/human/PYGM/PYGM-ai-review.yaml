id: P11217
gene_symbol: PYGM
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: Muscle isoform of glycogen phosphorylase (myophosphorylase; EC 2.4.1.1),
  the rate-limiting enzyme of muscle glycogenolysis. As a pyridoxal-5'-phosphate-dependent
  homodimer it catalyzes the phosphorolytic cleavage of alpha-1,4-glycosidic bonds at
  the non-reducing ends of glycogen, releasing alpha-D-glucose-1-phosphate, and stops
  approximately four residues short of alpha-1,6 branch points. This provides the
  glucose-1-phosphate (feeding glycolysis via glucose-6-phosphate) that supports rapid
  ATP generation in skeletal muscle during exercise. Activity is allosterically activated
  by AMP and inhibited by ATP, ADP and glucose-6-phosphate, and is controlled covalently
  through reversible phosphorylation of Ser-15 by phosphorylase kinase, interconverting
  the less-active phosphorylase b and the active phosphorylase a. The enzyme is cytosolic
  and highly enriched in skeletal muscle. Loss-of-function variants cause glycogen storage
  disease type V (McArdle disease), a myopathy of exercise intolerance, cramps, muscle
  weakness and recurrent myoglobinuria, characteristically with a "second-wind" phenomenon.
