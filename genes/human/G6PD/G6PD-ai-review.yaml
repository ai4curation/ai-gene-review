id: P11413
gene_symbol: G6PD
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: Glucose-6-phosphate dehydrogenase (G6PD, EC 1.1.1.49) is the committed,
  rate-limiting first enzyme of the oxidative branch of the pentose phosphate pathway
  (hexose monophosphate shunt). It oxidises D-glucose-6-phosphate to
  6-phospho-D-glucono-1,5-lactone while reducing NADP+ to NADPH. G6PD is the principal
  cytosolic source of NADPH for reductive biosynthesis (fatty acids, cholesterol,
  nucleotides) and, most critically in erythrocytes, for regenerating reduced glutathione
  and defending cells against oxidative stress. The enzyme is active as a
  homodimer/homotetramer (dimer of dimers) and requires a tightly bound structural
  NADP+ in addition to the catalytic (cosubstrate) NADP+. G6PD deficiency is the most
  common human enzyme defect, affecting several hundred million people, and is X-linked;
  it causes acute oxidant-induced hemolytic anemia (favism from fava beans, certain
  drugs, and infection), neonatal jaundice, and, in severe variants, chronic
  nonspherocytic hemolytic anemia.
