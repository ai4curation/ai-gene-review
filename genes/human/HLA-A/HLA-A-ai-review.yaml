id: P04439
gene_symbol: HLA-A
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  HLA-A encodes the alpha (heavy) chain of MHC class I histocompatibility antigen A,
  a highly polymorphic cell-surface glycoprotein expressed on virtually all nucleated cells.
  The alpha chain forms a heterotrimeric complex with beta-2-microglobulin (B2M) and a
  short peptide (8-11 amino acids) in the peptide-binding groove formed by the alpha-1
  and alpha-2 domains. The primary function of HLA-A is to present intracellularly derived
  peptides (viral, tumor, or self) at the plasma membrane for recognition by alpha-beta
  T cell receptors (TCR) on CD8-positive cytotoxic T lymphocytes, thereby enabling
  antigen-specific adaptive immune responses against infected or transformed cells. The
  alpha-3 domain is Ig-like and interacts with CD8 on T cells. HLA-A is synthesized and
  assembled in the endoplasmic reticulum, where it undergoes peptide loading via the
  peptide-loading complex (TAP1/TAP2, tapasin, calreticulin, ERp57), then traffics through
  the Golgi to the cell surface. Certain HLA-A alleles (A*23:01, A*24:02, A*32:01) bearing
  the Bw4 epitope also interact with KIR3DL1 on NK cells, contributing to NK cell
  regulation via the missing-self mechanism.
