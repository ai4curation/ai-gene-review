# === IDA from PMID:10843695 ===
- term:
    id: GO:0002477
    label: antigen processing and presentation of exogenous peptide antigen via MHC
      class Ib
  evidence_type: IDA
  original_reference_id: PMID:10843695
  review:
    summary: >-
      PMID:10843695 describes the crystal structure of HLA-A*0201 with an octameric
      Tax peptide. HLA-A is a classical MHC class Ia molecule, not class Ib. This
      annotation uses the wrong term for HLA-A.
    action: MODIFY
    reason: >-
      HLA-A is a classical MHC class Ia molecule. The term should reference MHC class I,
      not class Ib. The study demonstrates peptide binding and presentation by HLA-A*0201,
      which is a class Ia function.
    proposed_replacement_terms:
