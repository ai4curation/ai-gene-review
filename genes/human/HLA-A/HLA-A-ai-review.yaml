core_functions:
- description: >-
    Binds short peptide antigens (8-11 amino acids) with allele-specific anchor residue
    preferences in the alpha-1/alpha-2 peptide-binding groove, associates with beta-2-
    microglobulin to form the MHC class I heterotrimer, and presents endogenous peptide
    antigens at the plasma membrane for recognition by alpha-beta T cell receptors on
    CD8-positive cytotoxic T lymphocytes, enabling adaptive immune surveillance against
    infected or transformed cells
  molecular_function:
    id: GO:0042605
    label: peptide antigen binding
  directly_involved_in:
  - id: GO:0019885
    label: antigen processing and presentation of endogenous peptide antigen via MHC class I
  - id: GO:0001916
    label: positive regulation of T cell mediated cytotoxicity
  locations:
  - id: GO:0009897
    label: external side of plasma membrane
  in_complex:
    id: GO:0042612
    label: MHC class I protein complex
- description: >-
    Binds T cell receptors on CD8-positive T lymphocytes as a peptide-MHC class I complex,
    serving as the ligand recognized by the alpha-beta TCR to initiate antigen-specific
    cytotoxic T cell responses
  molecular_function:
    id: GO:0042608
    label: T cell receptor binding
  directly_involved_in:
  - id: GO:0001916
    label: positive regulation of T cell mediated cytotoxicity
  locations:
  - id: GO:0009897
    label: external side of plasma membrane
  in_complex:
    id: GO:0042612
    label: MHC class I protein complex
- description: >-
    Binds CD8 coreceptor via the membrane-proximal alpha-3 Ig-like domain, stabilizing
    the TCR-peptide-MHC class I interaction and enhancing T cell activation
  molecular_function:
    id: GO:0042610
    label: CD8 receptor binding
  directly_involved_in:
  - id: GO:0001916
    label: positive regulation of T cell mediated cytotoxicity
  locations:
  - id: GO:0009897
    label: external side of plasma membrane
  supported_by:
  - reference_id: PMID:9177355
    supporting_text: >-
      Crystal structure of the complex between human CD8alpha(alpha) and HLA-A2
      demonstrates direct binding of CD8 to the alpha-3 domain.
  - reference_id: PMID:2784196
    supporting_text: >-
      Polymorphism in the alpha 3 domain of HLA-A molecules affects binding to CD8.
- description: >-
    Forms an obligate heterodimer with beta-2-microglobulin (B2M) in the endoplasmic
    reticulum, which is required for proper folding, peptide loading via the peptide
    loading complex (TAP1/TAP2, tapasin, calreticulin, ERp57), and surface expression
  molecular_function:
    id: GO:0030881
    label: beta-2-microglobulin binding
  directly_involved_in:
  - id: GO:0002502
    label: peptide antigen assembly with MHC class I protein complex
  locations:
  - id: GO:0005783
    label: endoplasmic reticulum
  in_complex:
    id: GO:0042612
    label: MHC class I protein complex
  supported_by:
  - reference_id: PMID:3309677
    supporting_text: >-
      Structure of the human class I histocompatibility antigen, HLA-A2, showing
      B2M non-covalently associated with the heavy chain.
  - reference_id: PMID:8805302
    supporting_text: >-
      The T134K mutant seemed to bind peptide antigens and assemble with beta 2m
      as efficiently as wild-type HLA-A2.1.
