# === IBA annotations (PANTHER phylogenetic inference) ===
- term:
    id: GO:0001916
    label: positive regulation of T cell mediated cytotoxicity
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      HLA-A presents peptide antigens to CD8+ T cells via TCR, directly enabling
      cytotoxic T cell responses. This is a core downstream consequence of MHC class I
      antigen presentation, well-supported by extensive experimental evidence across
      multiple alleles (PMID:22031944, PMID:2420472, PMID:8805302).
    action: ACCEPT
    reason: >-
      Positive regulation of T cell mediated cytotoxicity is a direct functional
      consequence of MHC class I peptide presentation. IBA annotation is phylogenetically
      sound for the MHC class I family.
    supported_by:
      - reference_id: PMID:8805302
        supporting_text: >-
          Glycoproteins encoded by the major histocompatibility complex class I region
          (MHC class I) present peptide antigens to cytotoxic T cells (CTLs).
- term:
    id: GO:0005102
    label: signaling receptor binding
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      HLA-A binds to TCR on CD8+ T cells and to KIR3DL1 on NK cells, both of which
      are signaling receptors. This IBA annotation captures the receptor-binding
      aspect of HLA-A function.
    action: ACCEPT
    reason: >-
      HLA-A functions as a ligand for signaling receptors including TCR (PMID:8906788,
      PMID:10435578) and KIR3DL1 (PMID:18502829). The IBA annotation is appropriate
      for this MF term.
    supported_by:
      - reference_id: PMID:8906788
        supporting_text: >-
          Structure of the complex between human T-cell receptor, viral peptide and HLA-A2.
      - reference_id: PMID:18502829
        supporting_text: >-
          KIR3DL1 binds to the Bw4 epitope on HLA-B antigens
- term:
    id: GO:0005615
    label: extracellular space
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      This GO term is marked as obsolete. HLA-A is a type I transmembrane protein
      displayed on the cell surface, not a secreted extracellular protein. While
      soluble forms of MHC class I exist, the primary localization is cell membrane.
    action: REMOVE
    reason: >-
      GO:0005615 is obsolete and should not be used. HLA-A is primarily a membrane-bound
      protein. Any soluble forms would be better captured by more specific terms.
- term:
    id: GO:0006955
    label: immune response
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      HLA-A plays a central role in adaptive immune response by presenting antigens to
      CD8+ T cells. While correct, this term is quite broad. More specific annotations
      such as antigen processing and presentation via MHC class I are more informative.
    action: ACCEPT
    reason: >-
      While broad, immune response is a valid high-level annotation for HLA-A. The IBA
      annotation is phylogenetically appropriate for the MHC class I family. More specific
      BP terms are also present in the annotation set.
    supported_by:
      - reference_id: PMID:8805302
        supporting_text: >-
          Glycoproteins encoded by the major histocompatibility complex class I region
          (MHC class I) present peptide antigens to cytotoxic T cells (CTLs).
- term:
    id: GO:0030881
    label: beta-2-microglobulin binding
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      HLA-A heavy chain forms a stable heterodimer with B2M, which is essential for
      proper folding, peptide loading, and cell surface expression of the MHC class I
      complex. This is a core molecular function.
    action: ACCEPT
    reason: >-
      B2M binding is a fundamental and well-characterized molecular function of all MHC
      class I heavy chains. Confirmed by crystal structures (PMID:3309677, PMID:7694806)
      and functional studies (PMID:8805302, PMID:23566939).
    supported_by:
      - reference_id: PMID:3309677
        supporting_text: >-
          Structure of the human class I histocompatibility antigen, HLA-A2.
      - reference_id: PMID:7694806
        supporting_text: >-
          The antigenic identity of peptide-MHC complexes: a comparison of the
          conformations of five viral peptides presented by HLA-A2.
- term:
    id: GO:0009897
    label: external side of plasma membrane
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      The peptide-binding domains (alpha-1/alpha-2) and the Ig-like alpha-3 domain of
      HLA-A are exposed on the external side of the plasma membrane, where they interact
      with TCR and CD8 on T cells, and KIR on NK cells.
    action: ACCEPT
    reason: >-
      HLA-A is a type I transmembrane protein with its functional domains on the
      external side of the plasma membrane. This is the site where antigen presentation
      to T cells occurs. Well-established by structural and functional studies.
    supported_by:
      - reference_id: PMID:9177355
        supporting_text: >-
          Crystal structure of the complex between human CD8alpha(alpha) and HLA-A2.
- term:
    id: GO:0002476
    label: antigen processing and presentation of endogenous peptide antigen via MHC
      class Ib
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      HLA-A is a classical MHC class Ia molecule, not a class Ib molecule. Class Ib
      refers to non-classical MHC molecules such as HLA-E, HLA-F, and HLA-G. This
      annotation appears to be incorrectly assigned for HLA-A.
    action: MODIFY
    reason: >-
      HLA-A is a classical MHC class Ia molecule. The correct term should reference
      MHC class I (not class Ib). The IBA assignment may reflect a broad phylogenetic
      grouping that does not distinguish class Ia from Ib properly.
    proposed_replacement_terms:
      - id: GO:0019885
        label: antigen processing and presentation of endogenous peptide antigen via MHC class I
- term:
    id: GO:0042605
    label: peptide antigen binding
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      Peptide antigen binding is the central molecular function of HLA-A. The alpha-1
      and alpha-2 domains form the peptide-binding groove that accommodates peptides
      of 8-11 amino acids with allele-specific anchor residues.
    action: ACCEPT
    reason: >-
      This is the core molecular function of HLA-A. Extensively demonstrated by crystal
      structures of peptide-HLA-A complexes across many alleles (PMID:7694806, PMID:8906788)
      and by peptide binding assays (PMID:8805302, PMID:23566939).
    supported_by:
      - reference_id: PMID:7694806
        supporting_text: >-
          The antigenic identity of peptide-MHC complexes: a comparison of the
          conformations of five viral peptides presented by HLA-A2.
- term:
    id: GO:0002486
    label: antigen processing and presentation of endogenous peptide antigen via MHC
      class I via ER pathway, TAP-independent
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      While the primary pathway for HLA-A peptide loading is TAP-dependent, TAP-independent
      presentation has been demonstrated for HLA-A in TAP-deficient cells. This was shown
      experimentally in PMID:22031944 where vaccinia virus peptides were presented by
      HLA-A2 and other class I molecules in TAP-deficient cells.
    action: KEEP_AS_NON_CORE
    reason: >-
      TAP-independent antigen presentation by HLA-A has been documented but represents a
      non-canonical minor pathway. The primary pathway is TAP-dependent. This annotation
      is valid but non-core.
    supported_by:
      - reference_id: PMID:22031944
        supporting_text: >-
          Several viral epitopes have been identified in TAP-deficient models. Using mass
          spectrometry to analyze complex human leukocyte antigen (HLA)-bound peptide pools
          isolated from large numbers of TAP-deficient vaccinia virus-infected cells, we
          identified 11 ligands naturally presented by four different HLA-A, HLA-B, and
          HLA-C class I molecules.
