        supporting_text: >-
          The crystal structure of the human class I MHC molecule HLA-A2 complexed with
          of an octameric peptide, Tax8 (LFGYPVYV), from human T cell lymphotrophic virus-1
          (HTLV-1) has been determined.
# === NAS from PMID:10843695 ===
- term:
    id: GO:0002715
    label: regulation of natural killer cell mediated immunity
  evidence_type: NAS
  original_reference_id: PMID:10843695
  review:
    summary: >-
      PMID:10843695 is primarily about the structural analysis of HLA-A2/Tax peptide
      complex and does not directly address NK cell regulation. However, MHC class I
      molecules do regulate NK cells through inhibitory receptors (KIR). The evidence
      code NAS (non-traceable author statement) suggests indirect support.
    action: KEEP_AS_NON_CORE
    reason: >-
      NK cell regulation by MHC class I is well-established biology (missing-self
      recognition), but this particular reference does not directly demonstrate it
      for HLA-A. The function is allele-dependent (Bw4+ alleles interact with KIR3DL1,
      PMID:18502829). Valid as non-core.
    supported_by:
      - reference_id: PMID:18502829
        supporting_text: >-
          KIR3DL1 binds to the Bw4 epitope on HLA-B antigens. Although the same epitope
          is also found on 4 HLA-A antigens (HLA-A23/24/25/32), these are not currently
          regarded as KIR3DL1 ligands.
