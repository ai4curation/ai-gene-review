- id: PMID:25578875
  title: Structure and assembly pathway of the ribosome quality control complex.
  findings:
  - statement: Listerin is the E3 ligase that poly-ubiquitinates 60S-housed nascent polypeptides
      during RQC, and its specificity for nascent chain-60S complexes depends on NEMF.
    reference_section_type: ABSTRACT
  - statement: NEMF recruits and stabilizes Listerin's N-terminal domain on the 60S while
      Listerin's C-terminal RWD domain contacts the ribosome to position the RING ligase domain
      near the nascent polypeptide exit tunnel.
    reference_section_type: ABSTRACT
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: Definitive structural/mechanistic study of the human RQC complex; establishes
      LTN1 as the RQC ligase and the NEMF dependence.
- id: PMID:28757607
  title: Ubiquitination of stalled ribosome triggers ribosome-associated quality control.
  findings:
  - statement: Establishes the upstream RQC trigger in which Hel2/RQT1 ubiquitinates the 40S
      protein uS10; provides the cytosolic RQC context in which LTN1 acts on the 60S branch.
    reference_section_type: ABSTRACT
  reference_review:
    relevance: LOW
    correctness: VERIFIED
    review_notes: Primarily about the 40S/Hel2(ZNF598-ortholog) branch; cited in LTN1 GOA only
      for cytosol localization.
