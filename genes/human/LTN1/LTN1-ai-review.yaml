id: O94822
gene_symbol: LTN1
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: LTN1 (Listerin, also RNF160/ZNF294) is a large (1766 aa) cytosolic RING-type
  E3 ubiquitin-protein ligase (EC 2.3.2.27) that is the catalytic core of the ribosome-associated
  quality control (RQC) complex. Its N-terminal HEAT/ARM-repeat solenoid wraps around the
  60S large ribosomal subunit while its C-terminal RING-CH (RING-type zinc finger) domain
  catalyzes ubiquitin transfer. When an elongating 80S ribosome stalls and is split into
  subunits by the rescue factors PELO/HBS1L/ABCE1, the incomplete nascent polypeptide remains
  attached to a peptidyl-tRNA housed in the 60S subunit; LTN1 is recruited to these 60S-nascent
  chain complexes by NEMF, which senses the exposed P-site tRNA, and poly-ubiquitinates the
  trapped nascent chain. This commits aberrant translation products to extraction by the
  VCP/p97 AAA-ATPase and degradation by the proteasome, preventing accumulation of potentially
  toxic incomplete proteins. LTN1 thus functions in nascent-chain surveillance and rescue of
  stalled ribosomes; it is broadly expressed and acts in the cytosol in association with the
  60S subunit.
