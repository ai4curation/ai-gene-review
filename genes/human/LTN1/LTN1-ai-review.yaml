suggested_questions:
- question: How is LTN1 RING ligase activity spatially coordinated with NEMF-mediated CAT-tailing
    on the same 60S-nascent chain complex, and what determines the order of these events?
- question: Do the innate-immunity interactions (IRF7/STING1/TIRAP) reflect a genuine moonlighting
    role for LTN1 or are they incidental high-throughput captures?
suggested_experiments:
- description: Reconstitute ubiquitination of defined 60S-nascent chain complexes with purified
    LTN1, NEMF and an E2 to map the lysine sites and ubiquitin chain topology Listerin builds on
    stalled nascent chains.
