id: P27544
gene_symbol: CERS1
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  Ceramide synthase 1 (CERS1; also LASS1, UOG1), a multi-pass endoplasmic reticulum
  membrane enzyme that catalyzes the N-acylation step of de novo ceramide biosynthesis.
  It transfers an acyl group from acyl-CoA onto the amino group of a sphingoid base
  (sphinganine in the de novo pathway, sphingosine in the salvage pathway) to form
  dihydroceramide/ceramide. Among the six mammalian ceramide synthases, CERS1 is highly
  selective for stearoyl-CoA (C18:0-CoA) and therefore produces predominantly
  C18-(dihydro)ceramide; the resulting dihydroceramide is desaturated by DEGS1 to ceramide.
  CERS1 is enriched in brain (neurons, cerebellar Purkinje cells) and skeletal muscle,
  where its C18-ceramide output contributes to neuronal function and, in muscle, to
  glucose metabolism and insulin sensitivity. Loss-of-function variants cause autosomal
  recessive progressive myoclonic epilepsy type 8 (EPM8), reflecting the requirement of
  C18-ceramide for neuronal survival.
