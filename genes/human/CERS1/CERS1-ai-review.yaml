    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Establishes CERS1(Lass1) C18-ceramide specificity and family membrane topology
      (N-terminus luminal, C-terminus cytosolic). Supports MF/BP and cytosolic-side CC.
