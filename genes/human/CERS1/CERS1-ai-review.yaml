core_functions:
- description: >-
    Sphingoid-base N-acyltransferase (ceramide synthase) that N-acylates sphinganine (and
    sphingosine in the salvage pathway) using acyl-CoA, with high selectivity for
    stearoyl-CoA (C18:0-CoA), to produce C18-(dihydro)ceramide in de novo sphingolipid
    biosynthesis.
  molecular_function:
    id: GO:0050291
    label: sphingosine N-acyltransferase activity
  directly_involved_in:
  - id: GO:0046513
    label: ceramide biosynthetic process
  locations:
  - id: GO:0005789
    label: endoplasmic reticulum membrane
  supported_by:
  - reference_id: PMID:17977534
    supporting_text: >-
      ceramide is synthesized by N-acylation of a sphingoid long-chain base by a family of
      ceramide synthases (CerS), each of which displays a high specificity towards acyl
      CoAs of different chain lengths
  - reference_id: PMID:15823095
    supporting_text: 'increased C18:0-ceramide levels preferentially'
  - reference_id: PMID:24782409
    supporting_text: >-
      CerS1, a transmembrane protein of the endoplasmic reticulum (ER), catalyzes the
      biosynthesis of C18-ceramides.
proposed_new_terms: []
suggested_questions:
- question: >-
    Beyond de novo biosynthesis, how is the balance between CERS1's biosynthetic (ER) role
    and its stress-induced ER-to-Golgi translocation regulated in neurons, and does the
    cleaved C-terminal fragment retain any function?
- question: >-
    Is the mitochondrial pool of CERS1-derived C18-ceramide produced at ER-mitochondria
    contact sites, and does CERS1 relocalize, or is only the lipid product trafficked?
suggested_experiments:
- description: >-
    Acyl-CoA chain-length profiling of purified human CERS1 across the full C14-C26 acyl-CoA
    panel with sphinganine and sphingosine acceptors to quantify the degree of C18 selectivity
    and any minor activities.
- description: >-
    Neuron-specific Cers1 knockout / EPM8-variant knock-in models with spatial lipidomics to
    map where C18-ceramide is required for Purkinje/neuronal survival.
