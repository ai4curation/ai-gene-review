- id: PMID:12105227
  title: Upstream of growth and differentiation factor 1 (uog1), a mammalian homolog
    of the yeast longevity assurance gene 1 (LAG1), regulates N-stearoyl-sphinganine
    (C18-(dihydro)ceramide) synthesis in a fumonisin B1-independent manner in mammalian
    cells.
  findings: []
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      First demonstration of C18 fatty-acid specificity of the human enzyme; shows ER
      localization and stearoyl-CoA (not palmitoyl-CoA) preference. Supports core MF/BP/CC.
- id: PMID:12869556
  title: Human homologues of LAG1 reconstitute Acyl-CoA-dependent ceramide synthesis
    in yeast.
  findings: []
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Functional complementation of yeast lag1/lac1 by human LAG1 homologues restores
      acyl-CoA-dependent ceramide/sphingolipid synthesis. Supports core MF/BP.
- id: PMID:15823095
