suggested_questions:
- question: Is the PTEN-like phosphatase domain of auxilin catalytically active, or does it function purely as a phosphoinositide-binding membrane-targeting module that times auxilin recruitment to coated vesicles?
- question: How does LRRK2-mediated phosphorylation of auxilin's clathrin-binding domain mechanistically convert into the synaptic vesicle endocytosis defects seen in Parkinson disease dopaminergic neurons?
- question: To what extent can the ubiquitous homolog GAK compensate for neuronal auxilin loss, and does incomplete compensation explain the dopaminergic-neuron vulnerability in PARK19?
suggested_experiments:
- description: Reconstituted clathrin-cage disassembly assays with purified auxilin (wild-type, J-domain HPD mutant, and PARK19 disease variants) plus HSPA8 and ATP to quantify uncoating activity and HSPA8 ATPase stimulation.
- description: Phosphatase activity assays on the auxilin PTEN-like domain against phosphoprotein and phosphoinositide substrates, with active-site (Cys164) mutants, to resolve whether it is a bona fide phosphatase or a degenerate lipid-binding domain.
- description: Live-cell imaging of clathrin and HSC70 dynamics in DNAJC6-knockout versus rescued neurons (wild-type vs PARK19 variants) to map the uncoating defect and test GAK compensation.
