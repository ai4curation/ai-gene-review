  title: AMBRA1:DYNLL1,DYNLL2 binds BECN1 complex
  findings:
  - statement: Reactome represents AMBRA1:DYNLL1,DYNLL2 binding to the BECN1 complex.
- id: Reactome:R-HSA-5678315
  title: BECN1 complex, p-AMBRA1 dissociate from DYNLL1,DYNLL2
  findings:
  - statement: Reactome represents dissociation of the BECN1 complex and phosphorylated AMBRA1 from dynein light chains.
