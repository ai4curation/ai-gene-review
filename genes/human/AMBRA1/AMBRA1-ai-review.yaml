- id: PMID:17589504
  title: Ambra1 regulates autophagy and development of the nervous system.
  findings:
  - statement: AMBRA1 was identified as a WD40-domain positive regulator of BECN1-dependent autophagy and neural development.
- id: PMID:20562859
  title: Network organization of the human autophagy system.
  findings:
  - statement: A human autophagy interaction-network study placed AMBRA1/DCAF3 with DDB1-CUL4-DDA1 and the PIK3C3-BECN1 complex.
- id: PMID:20921139
  title: The dynamic interaction of AMBRA1 with the dynein motor complex regulates mammalian autophagy.
  findings:
  - statement: AMBRA1 links the dynein-tethered BECN1-VPS34 complex to ULK1-dependent release and ER-associated autophagosome nucleation.
- id: PMID:21358617
  title: Mitochondrial BCL-2 inhibits AMBRA1-induced autophagy.
  findings:
  - statement: AMBRA1 interacts with mitochondrial BCL2 and supports BECN1-dependent autophagy regulation.
- id: PMID:21753002
  title: Parkin interacts with Ambra1 to induce mitophagy.
  findings:
  - statement: AMBRA1 interacts with Parkin and is required for efficient mitochondrial clearance after depolarization.
- id: PMID:22190034
  title: Global landscape of HIV-human protein complexes.
  findings: []
- id: PMID:23524951
  title: mTOR inhibits autophagy by controlling ULK1 ubiquitylation, self-association and function through AMBRA1 and TRAF6.
  findings:
  - statement: AMBRA1 and TRAF6 support K63-linked ULK1 ubiquitylation during autophagy induction.
- id: PMID:23954414
  title: Beclin 2 functions in autophagy, degradation of G protein-coupled receptors, and metabolism.
  findings: []
- id: PMID:23974797
  title: WASH inhibits autophagy through suppression of Beclin 1 ubiquitination.
  findings: []
- id: PMID:25127057
  title: TRIM proteins regulate autophagy and can target autophagic substrates by direct recognition.
  findings: []
- id: PMID:25215947
  title: AMBRA1 is able to induce mitophagy via LC3 binding, regardless of PARKIN and p62/SQSTM1.
  findings:
  - statement: AMBRA1 promotes LC3-dependent mitophagy through a LIR motif in Parkin-dependent and Parkin-independent settings.
- id: PMID:25438055
  title: AMBRA1 links autophagy to cell proliferation and tumorigenesis by promoting c-Myc dephosphorylation and degradation.
  findings:
  - statement: AMBRA1 interacts with PP2A and promotes PP2A-dependent MYC dephosphorylation and degradation.
- id: PMID:25499913
  title: AMBRA1 interplay with cullin E3 ubiquitin ligases regulates autophagy dynamics.
  findings:
  - statement: Cullin-4 and Cullin-5 dynamically interact with AMBRA1 to regulate onset and termination of autophagy.
- id: PMID:25891078
  title: IRGM governs the core autophagy machinery to conduct antimicrobial defense.
  findings:
  - statement: The cached IRGM paper supports IRGM organization of autophagy regulators but does not establish AMBRA1 GTPase-binding activity.
- id: PMID:30166453
  title: CRL4(AMBRA1) targets Elongin C for ubiquitination and degradation to modulate CRL5 signaling.
  findings:
  - statement: CRL4AMBRA1 targets ELOC for ubiquitination and degradation, modulating CRL5 signaling.
- id: PMID:30217973
  title: "HUWE1 E3 ligase promotes PINK1/PARKIN-independent mitophagy by regulating AMBRA1 activation via IKK\u03B1."
  findings:
  - statement: HUWE1 and IKKa regulate AMBRA1-mediated mitophagy and MFN2 degradation.
- id: PMID:30513302
  title: AMBRA1 Controls Regulatory T-Cell Differentiation and Homeostasis Upstream of the FOXO3-FOXP3 Axis.
  findings:
  - statement: AMBRA1 supports regulatory T-cell differentiation through PP2A- and FOXO3-associated mechanisms.
- id: PMID:31123703
  title: Autophagy induction in atrophic muscle cells requires ULK1 activation by TRIM32 through unanchored K63-linked polyubiquitin chains.
  findings:
  - statement: TRIM32 binds AMBRA1 and ULK1 and stimulates ULK1 activity through unanchored K63-linked polyubiquitin in atrophic muscle cells.
- id: PMID:32333458
  title: Rare mutations in the autophagy-regulating gene AMBRA1 contribute to human neural tube defects.
  findings:
  - statement: Human AMBRA1 variants impair autophagy initiation and may contribute to neural tube defects.
- id: PMID:32616651
  title: The autophagy protein Ambra1 regulates gene expression by supporting novel transcriptional complexes.
  findings:
  - statement: AMBRA1 has nuclear scaffolding roles at chromatin-associated transcriptional complexes.
- id: PMID:33854232
  title: AMBRA1 regulates cyclin D to guard S-phase entry and genomic integrity.
  findings:
  - statement: AMBRA1 regulates cyclin D abundance to guard S-phase entry and genomic integrity.
- id: PMID:33854235
  title: CRL4(AMBRA1) is a master regulator of D-type cyclins.
  findings:
  - statement: CRL4AMBRA1 targets all three D-type cyclins for degradation.
- id: PMID:33854239
  title: "The AMBRA1 E3 ligase adaptor regulates the stability of cyclin\_D."
  findings:
  - statement: AMBRA1 mediates ubiquitylation and proteasomal degradation of cyclin D as a CRL4 substrate receptor.
- id: PMID:34362797
  title: "AMBRA1 Promotes TGFβ Signaling via Nonproteolytic Polyubiquitylation of Smad4."
  full_text_unavailable: true
  findings:
  - statement: AMBRA1 acts as the CRL4 (CRL4-AMBRA1/DCAF3) substrate receptor for Smad4 and mediates nonproteolytic polyubiquitylation of Smad4 that enhances its transcriptional functions and potentiates TGFbeta signaling.
- id: PMID:37993427
  title: Structure of the DDB1-AMBRA1 E3 ligase receptor complex linked to cell cycle regulation.
  full_text_unavailable: true
  findings:
  - statement: A 3.08 Angstrom cryo-EM structure shows AMBRA1 N- and C-terminal regions fold together into a split WD40 domain that binds DDB1, and DDB1 binding-defective AMBRA1 mutants prevent Cyclin D1 ubiquitination and increase cell cycle progression.
