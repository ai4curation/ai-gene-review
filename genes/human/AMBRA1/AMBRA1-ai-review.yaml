suggested_questions:
- question: Should AMBRA1 be excluded from automated propagation to GO:1904716 positive regulation of chaperone-mediated autophagy until direct LAMP2A/HSPA8-dependent CMA substrate-uptake evidence is available?
  experts:
  - GO autophagy editors
  - Proteostasis PN curators
- question: Should AMBRA1 autophagy-scaffold activity have a more specific molecular-function representation than generic protein binding while avoiding overstatement of direct catalytic activity?
  experts:
  - GO molecular-function editors
  - Autophagy domain experts
- question: Does AMBRA1 CRL4 substrate-adaptor activity warrant separate process annotations for nonproteolytic (activity-enhancing) substrate polyubiquitylation, given the CRL4-AMBRA1-mediated nonproteolytic polyubiquitylation of Smad4 that potentiates TGFbeta signaling, distinct from the degradative cyclin-D/ELOC branch?
  experts:
  - GO molecular-function editors
  - Ubiquitin-proteasome system curators
suggested_experiments:
- description: Test AMBRA1 knockdown and rescue with wild-type, CRL4-binding-deficient, and LC3-LIR-mutant constructs in LAMP2A/HSPA8-dependent CMA substrate-uptake reporter assays.
  hypothesis: Direct CMA evidence would be required before assigning AMBRA1 to positive regulation of chaperone-mediated autophagy.
  experiment_type: CMA reporter and rescue assay
- description: Compare AMBRA1 wild-type, LIR-mutant, DDB1-binding-deficient, and PP2A-interaction-deficient rescue in autophagosome nucleation, mitophagy, cyclin D/ELOC degradation, and MYC/FOXO3 stability assays.
  hypothesis: AMBRA1 separable interaction surfaces underlie distinct autophagy-initiation, mitophagy, CRL4-adaptor, and PP2A regulatory functions.
  experiment_type: structure-function rescue assay
- description: Use the DDB1-binding-deficient AMBRA1 interface mutants (e.g., V10/L13) defined by the cryo-EM structure to test whether DDB1 engagement is required for both degradative substrate ubiquitylation (cyclin D1) and nonproteolytic Smad4 polyubiquitylation in parallel ubiquitylation and TGFbeta reporter assays.
  hypothesis: A single DDB1-binding interface on AMBRA1 underlies both proteolytic and nonproteolytic CRL4-AMBRA1 substrate-ubiquitylation outcomes, with substrate identity rather than the adaptor interface determining the ubiquitin-chain fate.
  experiment_type: structure-guided ubiquitylation and reporter assay
