id: Q8N8Y2
gene_symbol: ATP6V0D2
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  ATP6V0D2 encodes the d2 isoform of the V0 d subunit of the vacuolar H+-ATPase (V-ATPase).
  The V-ATPase is a multisubunit enzyme consisting of a peripheral V1 domain that
  hydrolyzes
  ATP and a membrane-integral V0 domain responsible for proton translocation. The
  d subunit
  is part of the V0 domain and plays a central role in coupling ATP hydrolysis to
  proton
  transport by directly interacting with the D and F subunits of the V1 central stalk.
  ATP6V0D2 shows tissue-restricted expression, predominantly in kidney intercalated
  cells
  and osteoclasts, where V-ATPases function at the plasma membrane for urinary acidification
  and bone resorption, respectively. In clear-cell renal carcinoma models,
  ATP6V0D2 has also been reported to promote late autophagy by increasing
  lysosomal acidification and by facilitating autophagosome-lysosome fusion through
  RAB7/HOPS/SNARE machinery, suggesting a context-dependent role in lysosomal
  degradative flux in addition to its established V-ATPase subunit function.
existing_annotations:
- term:
    id: GO:0016471
    label: vacuolar proton-transporting V-type ATPase complex
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      ATP6V0D2 is definitively a component of the V-ATPase complex. The d2 subunit
      is part of the membrane-integral V0 domain of the vacuolar H+-ATPase. This
      has
      been confirmed through multiple lines of evidence including immunoprecipitation
      studies showing that d2 directly interacts with V1 subunits D and F
      [PMID:18752060 "d1-GST and d2-GST, but not GST alone, are each able to pull
      down
      the H+-ATPase D and F subunits from solubilized human kidney membrane preparations"].
    action: ACCEPT
    reason: >-
      This is a core annotation supported by extensive experimental evidence. The
      d2
      subunit is an integral component of the V-ATPase complex, confirmed by pull-down
      experiments in human kidney membrane showing direct interaction with V1 subunits.
    supported_by:
    - reference_id: PMID:18752060
      supporting_text: d1-GST and d2-GST, but not GST alone, are each able to 
        pull down the H+-ATPase D and F subunits from solubilized human kidney 
        membrane preparations
- term:
    id: GO:0046961
    label: proton-transporting ATPase activity, rotational mechanism
  qualifier: contributes_to
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      ATP6V0D2 is part of the V-ATPase which functions via a rotational mechanism.
      The d subunit forms part of the pump's central stalk and is important in the
      rotary mechanism, as demonstrated by its direct interaction with the central
      stalk D and F subunits [PMID:18752060]. However, the d2 subunit itself does
      not
      have ATPase catalytic activity - it is a structural component that couples
      ATP
      hydrolysis (occurring in V1) to proton translocation (in V0).
    action: ACCEPT
    reason: >-
      While the d2 subunit is not itself the catalytic subunit, it is an integral
      component of the V-ATPase that contributes to the rotational mechanism by
      linking the V1 central stalk to the V0 proteolipid ring. The IBA annotation
      correctly captures the function of the assembled complex.
    supported_by:
    - reference_id: PMID:18752060
      supporting_text: the d subunit in man forms part of the pump's central 
        stalk and is thus likely to be important in its rotary mechanism
- term:
    id: GO:0005769
    label: early endosome
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      V-ATPases are known to be present in early endosomes where they function in
      endosomal acidification. However, ATP6V0D2 shows tissue-restricted expression
      predominantly in kidney and osteoclasts [PMID:15800125 "in human, kidney and
      bone are two of the main sites of d2 mRNA expression"], and the primary literature
      on ATP6V0D2 emphasizes its localization to lysosomes, plasma membrane of
      specialized cells (intercalated cells, osteoclasts), and phagocytic vesicles
      rather than early endosomes specifically.
    action: KEEP_AS_NON_CORE
    reason: >-
      While V-ATPases containing d2 may be present in early endosomes in certain
      cell types, this is not a primary or well-characterized localization for
      ATP6V0D2 specifically. The dominant literature focuses on lysosomal and
      plasma membrane localization in kidney and osteoclasts.
    supported_by:
    - reference_id: PMID:15800125
      supporting_text: in human, kidney and bone are two of the main sites of d2
        mRNA expression
- term:
    id: GO:0007034
    label: vacuolar transport
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      ATP6V0D2 participates in vacuolar/lysosomal function through its role in the
      V-ATPase, but "vacuolar transport" is a broad process term for this subunit.
      The clearest established process is compartment acidification. A more recent
      ccRCC study also supports a context-specific role in autophagosome-lysosome
      fusion through RAB7/HOPS machinery [PMID:39477683].
    action: KEEP_AS_NON_CORE
    reason: >-
      Retain this broad IBA term as non-core. It is consistent with V-ATPase-dependent
      acidification and with newer late-autophagy evidence, but the core ATP6V0D2
      functions are better represented by V-ATPase complex membership, V0-domain
      contribution to rotary proton pumping, and vacuolar/lysosomal acidification.
    additional_reference_ids:
    - file:human/ATP6V0D2/ATP6V0D2-deep-research-falcon.md
    supported_by:
    - reference_id: PMID:39477683
      supporting_text: Mechanistically, ATP6V0D2 directly bound to RAB7 and VPS41
        and promoted the RAB7-HOPS interaction, facilitating SNARE complex assembly
        and autophagosome-lysosome fusion.
- term:
    id: GO:0007035
    label: vacuolar acidification
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      ATP6V0D2 is a core component of the V-ATPase responsible for acidification
      of
      vacuolar compartments and, in specialized cells, the extracellular environment.
      In human kidney intercalated cells, d2 co-localizes with the a4 subunit at
      the plasma membrane for urinary acidification [PMID:15800125]. Recent
      ccRCC work also reports that ATP6V0D2 promotes lysosomal acidification and
      activity during late autophagy [PMID:39477683]. The evidence also supports
      the more specific GO:0007042 lysosomal lumen acidification term for this
      gene.
    action: ACCEPT
    reason: >-
      This is a core function of ATP6V0D2 as part of the V-ATPase proton pump.
      Both the phylogenetic inference (IBA) and direct experimental evidence
      support this annotation.
    supported_by:
    - reference_id: PMID:15800125
      supporting_text: high-intensity d2 staining was observed only in 
        intercalated cells of the collecting duct in fresh-frozen human kidney, 
        where it co-localized with the a4 subunit in the characteristic plasma 
        membrane-enhanced pattern
    - reference_id: PMID:39477683
      supporting_text: ATP6V0D2 promoted autolysosome degradation by increasing
        the acidification and activity of lysosomes during the later stages of
        macroautophagy/autophagy.
- term:
    id: GO:0033181
    label: plasma membrane proton-transporting V-type ATPase complex
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      ATP6V0D2 is specifically expressed in cells where V-ATPases localize to the
      plasma membrane, including kidney intercalated cells and osteoclasts.
      Immunohistochemistry in human kidney shows d2 at the apical plasma membrane
      of
      intercalated cells [PMID:15800125 "d2 staining was observed only in intercalated
      cells of the collecting duct... where it co-localized with the a4 subunit
      in
      the characteristic plasma membrane-enhanced pattern"].
    action: ACCEPT
    reason: >-
      This is a well-supported core localization for ATP6V0D2. Unlike the ubiquitous
      d1 isoform, d2 is predominantly expressed in cells with plasma membrane
      V-ATPases for specialized proton secretion functions.
    supported_by:
    - reference_id: PMID:15800125
      supporting_text: high-intensity d2 staining was observed only in 
        intercalated cells of the collecting duct in fresh-frozen human kidney, 
        where it co-localized with the a4 subunit in the characteristic plasma 
        membrane-enhanced pattern
- term:
