    label: regulation of transcription by RNA polymerase II
  - id: GO:0001666
    label: response to hypoxia
  - id: GO:0006805
    label: xenobiotic metabolic process
  locations:
  - id: GO:0005634
    label: nucleus
  in_complex:
    id: GO:0090575
    label: RNA polymerase II transcription regulator complex
  supported_by:
