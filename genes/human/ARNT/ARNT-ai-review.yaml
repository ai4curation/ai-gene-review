      Proteasome System|E3 ubiquitin and UBL ligases|Cul4A/Cul4B substrate adaptor|AHR / ARNT / TBL3 complex|PAS
  - reference_id: file:projects/PROTEOSTASIS/mappings/ubiquitin_proteasome_system.yaml
