- id: PMID:10092873
  title: ATP and phosphate reciprocally affect subunit association of human recombinant
    High Km 5'-nucleotidase. Role for the C-terminal polyglutamic acid tract in subunit
    association and catalytic activity.
  findings:
  - statement: >-
      Human recombinant High Km (IMP-specific) 5'-nucleotidase (EC 3.1.3.5) is activated
      by ATP and inhibited by inorganic phosphate; native enzyme is oligomeric and the
      C-terminal polyglutamic/aspartic tail is required for subunit association.
    reference_section_type: ABSTRACT
    supporting_text: >-
      IMP-specific, High Km 5'-nucleotidase (EC 3.1.3.5) is an ubiquitous enzyme, the
      activity of which is highly regulated by substrate, ATP, and inorganic
      phosphate.
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Abstract-only cache; establishes catalytic activity, ATP/phosphate regulation and
      the role of the C-terminal acidic tail in tetramer assembly. Consistent with the
      IDA annotations attributed to it.
- id: PMID:12907246
  title: 'Cytosolic and mitochondrial deoxyribonucleotidases: activity with substrate
    analogs, inhibitors and implications for therapy.'
  findings:
  - statement: >-
      cN-II dephosphorylates the monophosphates of purine nucleoside analogs, and its
      overproduction can lead to resistance against purine analog drugs.
    reference_section_type: ABSTRACT
    supporting_text: >-
      overproduction of cN-II could
      lead to resistance against purine analogs
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Abstract-only. Supports 5'-nucleotidase activity on (deoxy)purine analog
      substrates and the drug-inactivation role.
