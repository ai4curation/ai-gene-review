  title: Nucleoside phosphotransferase activity of human colon carcinoma cytosolic
    5'-nucleotidase.
  findings:
  - statement: >-
      A human cytosolic 5'-nucleotidase acting preferentially on IMP and GMP also
      transfers the phosphate of 5'-NMPs to nucleosides (phosphotransferase activity),
      and is activated by ATP and 2,3-diphosphoglycerate.
    reference_section_type: ABSTRACT
    supporting_text: >-
      A cytosolic 5'-nucleotidase, acting preferentially on IMP and
      GMP, has been
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Abstract-only. Foundational characterization of both the 5'-nucleotidase and
      phosphotransferase activities and their allosteric activation.
- id: PMID:17405878
  title: 'Crystal structure of human cytosolic 5''-nucleotidase II: insights into
    allosteric regulation and substrate recognition.'
  findings:
  - statement: >-
      cN-II dephosphorylates 6-hydroxypurine nucleoside 5'-monophosphates, regulates
      IMP and GMP pools, is a homotetramer with two allosteric effector sites, and is
      activated by adenine-based nucleotides and 2,3-bisphosphoglycerate.
    reference_section_type: ABSTRACT
    supporting_text: >-
      Cytosolic 5'-nucleotidase II catalyzes the dephosphorylation of 6-hydroxypurine
      nucleoside 5'-monophosphates and regulates the IMP and GMP pools within the
      cell.
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Abstract-only cache; structural basis of catalysis and allosteric regulation.
