id: P49902
gene_symbol: NT5C2
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  NT5C2 (cytosolic purine 5'-nucleotidase, cN-II) is a cytosolic, Mg2+-dependent
  enzyme of the HAD (haloacid dehalogenase) superfamily that dephosphorylates
  6-hydroxypurine nucleoside 5'-monophosphates. It acts preferentially on IMP and
  GMP, and also on their deoxy counterparts (dIMP, dGMP) and XMP, releasing the
  corresponding nucleoside (inosine, guanosine, xanthosine) and inorganic phosphate.
  In addition to this 5'-nucleotidase (phosphohydrolase) activity it possesses a
  nucleoside phosphotransferase activity, transferring a phosphate from a donor
  nucleoside monophosphate to an acceptor nucleoside (preferentially inosine,
  deoxyinosine, guanosine), so it is not a purely catabolic enzyme. The enzyme is an
  allosterically regulated homotetramer: it is activated by ATP, diadenosine
  polyphosphates and 2,3-bisphosphoglycerate and inhibited by inorganic phosphate,
  coupling its activity to the metabolic state of the cell. Through these activities
  cN-II controls intracellular purine (deoxy)nucleotide and nucleoside pools. It also
  dephosphorylates the active monophosphates of purine nucleoside-analog drugs,
  reversing their kinase-mediated activation; this contributes to resistance against
  purine-analog and thiopurine chemotherapy. Germline loss-of-function variants cause
  autosomal-recessive hereditary spastic paraplegia (SPG45/SPG65).
