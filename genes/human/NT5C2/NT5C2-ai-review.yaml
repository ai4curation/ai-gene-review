- id: PMID:36159777
  title: TRIM22 orchestrates the proliferation of GBMs and the benefits of TMZ by
    coordinating the modification and degradation of RIG-I.
  findings:
  - statement: >-
      In glioblastoma cells NT5C2 forms a complex with TRIM22 and is reported to be
      responsible for K48-linked ubiquitination of RIG-I, negatively regulating
      RIG-I/NF-kB antiviral signaling; the NT5C2-RIG-I interaction is indirect.
    reference_section_type: ABSTRACT
    supporting_text: >-
      NT5C2 is responsible for K48-linked ubiquitination
  reference_review:
    relevance: MEDIUM
    correctness: DISPUTED
    review_notes: >-
      Full text available. Sole source of the ubiquitin-ligase (GO:0061630),
      K48-linked ubiquitination (GO:0070936) and antiviral (GO:0050689) annotations.
      This is a moonlighting claim well outside the enzyme's HAD-fold metabolic role
      (no recognizable E3 domain; interaction with RIG-I is indirect via TRIM22) and is
      not independently corroborated; treated as a likely over-annotation.
