- id: PMID:21396942
  title: Structural basis for the allosteric regulation and substrate recognition
    of human cytosolic 5'-nucleotidase II.
  findings:
  - statement: >-
      Seven high-resolution structures reveal that ATP, diadenosine polyphosphates and
      2,3-bisphosphoglycerate act as allosteric activators binding effector sites, with
      an effector-induced disorder-to-order transition coordinating catalytic Mg2+.
    reference_section_type: ABSTRACT
    supporting_text: >-
      It is allosterically activated by a
      number of phosphate-containing cellular metabolites such as ATP, diadenosine
      polyphosphates, and 2,3-bisphosphoglycerate
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Abstract-only cache; supports ATP binding (allosteric activator site), the
      homotetramer (identical protein binding), and Mg2+ dependence.
- id: PMID:21873433
  title: Suppression of 5'-nucleotidase enzymes promotes AMP-activated protein kinase
    (AMPK) phosphorylation and metabolism in human and mouse skeletal muscle.
  findings:
  - statement: >-
      siRNA silencing of NT5C2 in human myotubes reduced cytoplasmic 5'-nucleotidase
      activity and raised the AMP/ATP ratio, activating AMPK; NT5C2 is an IMP-preferring
      cytosolic 5'-nucleotidase.
    reference_section_type: RESULTS
    supporting_text: >-
      Using siRNA to silence NT5C2 expression in cultured human myotubes, we observed
      a 2-fold increase in the AMP/ATP ratio
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Full text available. Direct genetic (IMP) evidence for cytosolic 5'-nucleotidase
      activity and IMP catabolism; source of the MGI-curated BP/CC annotations.
