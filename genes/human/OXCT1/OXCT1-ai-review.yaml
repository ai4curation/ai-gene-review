gene_symbol: OXCT1
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: Succinyl-CoA:3-oxoacid CoA-transferase 1 (SCOT) is a mitochondrial-matrix
  enzyme (EC 2.8.3.5) that catalyzes the first, rate-limiting and committed step of
  ketone-body utilization (ketolysis) in extrahepatic tissues. It reversibly transfers
  coenzyme A from succinyl-CoA to the ketone body acetoacetate, forming acetoacetyl-CoA
  and succinate; the acetoacetyl-CoA is subsequently cleaved by acetoacetyl-CoA thiolase
  (ACAT1) into two acetyl-CoA molecules that enter the tricarboxylic acid cycle for
  energy production. SCOT thus activates circulating acetoacetate for oxidation and
  is the main determinant of the ketolytic capacity of a tissue. It functions as a
  homodimer in which only one subunit at a time is competent to transfer the CoA moiety,
  proceeding through a glutamyl-CoA thioester intermediate at the active-site glutamate.
  The enzyme is expressed in essentially all extrahepatic tissues, most abundantly
  in heart, followed by brain, kidney, skeletal muscle and lung, and is characteristically
  absent from liver, the ketone-body-producing organ that cannot itself consume ketones.
  Loss-of-function mutations cause the autosomal-recessive inborn error succinyl-CoA:3-oxoacid
  CoA transferase deficiency (SCOTD), characterized by episodes of severe ketoacidosis.
