suggested_questions:
- question: >-
    Which endogenous human protease or processing event exposes the cryptic
    N-terminal HC3 hyaluronan-binding site, and in which tissues does this occur?
- question: >-
    What molecular feature of HC2 enables TSG-6-mediated transfer of HC3 from
    pre-alpha-inhibitor, and does HC2 remain associated with the machinery in vivo?
- question: >-
    Does HC3 produce HA matrices with mechanical or cell-binding properties
    distinct from matrices containing HC1 or HC2?
- question: >-
    Is ITIH3 genuinely stored within platelet dense granules, or does its Reactome
    assignment reflect adsorption or co-isolation of an abundant plasma protein?
suggested_experiments:
- hypothesis: >-
    Endogenous proteolysis exposes the cryptic N-terminal HC3 HA-binding site in
    a regulated extracellular context.
  description: >-
