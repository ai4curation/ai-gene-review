id: Q06033
gene_symbol: ITIH3
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  ITIH3 is a secreted plasma glycoprotein processed to inter-alpha-trypsin
  inhibitor heavy chain H3 (HC3). HC3 is ester-linked through the
  chondroitin-sulfate chain of bikunin to form pre-alpha-inhibitor; bikunin,
  rather than HC3, supplies the complex's protease-inhibitor activity. HC2- and
  TSG-6-dependent transesterification can transfer HC3 from bikunin chondroitin
  sulfate to hyaluronan, incorporating HC3 into HA-rich extracellular matrices.
  HC3 also contains a cryptic N-terminal hyaluronan-binding site whose
  noncovalent activity was exposed by proteolytic fragmentation in vitro.
