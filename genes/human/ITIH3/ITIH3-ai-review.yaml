core_functions:
- description: >-
    Provides the noninhibitory HC3 component of plasma pre-alpha-inhibitor and,
    after HC2- and TSG-6-dependent transesterification, becomes an HA-associated
    heavy chain incorporated into HA-rich extracellular matrices. An N-terminal
    noncovalent HA-binding site can be exposed by proteolytic processing, whereas
    intact mature HC3 did not bind in the direct fragment study.
