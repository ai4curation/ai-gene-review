# ============================================================
# IBA annotations (phylogenetically inferred)
# ============================================================
- term:
    id: GO:0005886
    label: plasma membrane
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: ANK3 localizes to the plasma membrane in multiple cell types including
      neurons (AIS, nodes of Ranvier), epithelial cells (lateral membrane), and cardiomyocytes
      (intercalated disc). This is a core localization well-supported by extensive
      experimental evidence (PMID:14757759, PMID:17620337, PMID:18180363).
    action: ACCEPT
    reason: Plasma membrane localization is one of the best-established features of
      ankyrin-G across multiple tissues and cell types. The IBA annotation is accurate
      and represents core localization.
    supported_by:
      - reference_id: PMID:14757759
        supporting_text: depletion of 190-kDa ankyrin-G in human bronchial epithelial
          cells by small interfering RNA results in nearly complete loss of lateral
          plasma membrane in interphase cells
      - reference_id: PMID:18180363
        supporting_text: ankyrin-G is expressed at the intercalated disc and transverse
          tubules
- term:
    id: GO:0043005
    label: neuron projection
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: ANK3 localizes to neuron projections, specifically the axon initial segment
      and nodes of Ranvier, where it organizes the submembrane cytoskeleton. This is
      a defining localization for the neural isoforms of ankyrin-G (PMID:27356871).
    action: ACCEPT
    reason: Neuron projection localization is a core feature of ANK3, well-established
      through immunostaining and functional studies. The IBA annotation is appropriate.
    supported_by:
      - reference_id: PMID:27356871
        supporting_text: the AIS cytoskeleton forms a barrier between the axon and
          the somatodendritic membrane
- term:
    id: GO:0072659
    label: protein localization to plasma membrane
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: ANK3 is essential for localizing multiple membrane proteins to the plasma
      membrane, including voltage-gated sodium channels, E-cadherin, and RhBG transporter.
      This is a core biological process for ankyrin-G (PMID:17620337, PMID:18180363,
      PMID:15611082).
    action: ACCEPT
    reason: Protein localization to the plasma membrane is one of the best-characterized
      functions of ANK3, supported by multiple independent experimental studies. The
      IBA annotation accurately reflects this conserved function.
    supported_by:
      - reference_id: PMID:17620337
        supporting_text: ankyrin-G and beta-2-spectrin are required for accumulation
          of E-cadherin at the lateral membrane in both epithelial cells and early
          embryos
      - reference_id: PMID:18180363
        supporting_text: we demonstrate that ankyrin-G is required for Na(v)1.5 targeting
          in the heart
- term:
    id: GO:0008093
    label: cytoskeletal anchor activity
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: ANK3 functions as a cytoskeletal anchor, linking integral membrane proteins
      to the spectrin-actin cytoskeleton. This is the defining molecular function of
      all ankyrins and is well-supported for ANK3 (PMID:14757759, PMID:17620337).
    action: ACCEPT
    reason: Cytoskeletal anchor activity is the primary molecular function of ankyrin-G.
      The IBA annotation is accurate and represents the core function.
    supported_by:
      - reference_id: PMID:14757759
        supporting_text: Ankyrin-G polypeptides are required for restriction of voltage-gated
          sodium channels, L1 cell adhesion molecules, and beta IV spectrin to axon
          initial segments and are believed to couple the Na/K-ATPase to the spectrin-actin
          network at the lateral membrane in epithelial cells
- term:
    id: GO:0030507
    label: spectrin binding
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: ANK3 directly binds spectrin through its ZU5 domain. This interaction
      is essential for the spectrin-based membrane skeleton. Isoform 5 (AnkG119) binds
      beta-I-sigma spectrin with high affinity (PMID:8666667), and the larger isoforms
      bind beta-2-spectrin (PMID:17620337).
    action: ACCEPT
    reason: Spectrin binding is a core molecular function conserved across all ankyrin
      family members. The IBA annotation is well-supported.
    supported_by:
      - reference_id: PMID:8666667
        supporting_text: A fusion peptide containing residues 669-860 of AnkG119 interacts
          with beta I sigma 1 spectrin in vitro with a Kd = 4.2 +/- 4.0 ( +/- 2 SD)
          nM, and avidly binds the beta spectrin in MDCK cell lysates
      - reference_id: PMID:17620337
        supporting_text: Ankyrin-G also recruits beta-2-spectrin to E-cadherin-beta-catenin
          complexes, thus providing a direct connection between E-cadherin and the
          spectrin/actin skeleton
- term:
    id: GO:0044325
    label: transmembrane transporter binding
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: ANK3 binds several transmembrane transporters and channels, including
      voltage-gated sodium channels (Nav1.5/SCN5A), potassium channels (KCNA1), and
      the ammonium transporter RhBG. This is a core function of ankyrin-G in its role
      as a membrane-cytoskeleton adaptor (PMID:18180363, PMID:15611082).
    action: ACCEPT
    reason: Binding transmembrane transporters/channels is one of the defining functions
      of ANK3, well-supported by co-immunoprecipitation and in vitro binding studies.
    supported_by:
      - reference_id: PMID:18180363
        supporting_text: we demonstrate that ankyrin-G is required for Na(v)1.5 targeting
          in the heart
      - reference_id: PMID:15611082
        supporting_text: we reveal by yeast two-hybrid analysis a direct interaction
          between an FLD determinant in the cytoplasmic C-terminal tail of RhBG and
          the third and fourth repeat domains of ankyrin-G
