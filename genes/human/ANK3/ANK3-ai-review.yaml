id: Q12955
gene_symbol: ANK3
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: 'ANK3 (Ankyrin-G) is a membrane-cytoskeleton adaptor protein that links integral
  membrane proteins to the spectrin-actin cytoskeleton. ANK3 is the master organizer of the
  axon initial segment (AIS) and nodes of Ranvier, where it recruits and clusters voltage-gated
  sodium channels (Nav1.2, Nav1.5, Nav1.6), L1 family cell adhesion molecules, and betaIV-spectrin
  to establish the molecular architecture required for action potential initiation and propagation.
  In epithelial cells, 190-kDa ankyrin-G is essential for lateral membrane biogenesis and
  E-cadherin localization, and is required for Golgi-to-plasma membrane transport of E-cadherin
  via a microtubule-dependent pathway. In cardiomyocytes, ankyrin-G targets Nav1.5 to the
  intercalated disc and is required for normal cardiac depolarization. In skeletal muscle,
  ankyrin-G localizes to costameres and interacts with plectin and filamin C via a muscle-specific
  OTBD domain. A smaller isoform (AnkG119/isoform 5) associates with the Golgi apparatus
  and beta-I-sigma spectrin. ANK3 contains 23 ankyrin repeats that mediate membrane protein
  binding, a ZU5 tandem and UPA supramodule for spectrin binding, and a death domain.
  Loss-of-function mutations cause intellectual disability (MRT37) and are associated with
  bipolar disorder and autism susceptibility.

  '
