- id: PMID:14757759
  title: Lateral membrane biogenesis in human bronchial epithelial cells requires
    190-kDa ankyrin-G.
  findings:
    - statement: Depletion of 190-kDa ankyrin-G by siRNA causes nearly complete loss
        of lateral plasma membrane in human bronchial epithelial cells
      supporting_text: depletion of 190-kDa ankyrin-G in human bronchial epithelial
        cells by small interfering RNA results in nearly complete loss of lateral plasma
        membrane in interphase cells, and also blocks de novo lateral membrane biogenesis
        following mitosis
    - statement: Ankyrin-G is required for lateral membrane assembly and plays a pleiotropic
        role in epithelial cell organization
      supporting_text: 190-kDa ankyrin-G plays a pleiotropic role in assembly of lateral
        membranes of bronchial epithelial cells
- id: PMID:15231748
  title: Functional proteomics mapping of a human signaling pathway.
  findings:
    - statement: High-throughput yeast two-hybrid screen mapping Smad signaling interactions
        identified ANK3 as an interactor
      supporting_text: We used two-hybrid screening to map Smad signaling protein-protein
        interactions and to establish a network of 755 interactions, involving 591 proteins
- id: PMID:15611082
  title: 'The ammonium transporter RhBG: requirement of a tyrosine-based signal and
    ankyrin-G for basolateral targeting and membrane anchorage in polarized kidney
    epithelial cells.'
  findings:
    - statement: ANK3 directly interacts with RhBG ammonium transporter via the third
        and fourth ankyrin repeat domains
      supporting_text: we reveal by yeast two-hybrid analysis a direct interaction
        between an FLD determinant in the cytoplasmic C-terminal tail of RhBG and the
        third and fourth repeat domains of ankyrin-G
    - statement: ANK3 is required for RhBG membrane anchorage at the basolateral domain
      supporting_text: The disruption of the FLD-binding motif impaired the membrane
        expression of RhBG leading to retention on cytoplasmic structures in transfected
        Madin-Darby canine kidney cells
- id: PMID:17620337
  title: Ankyrin-G is a molecular partner of E-cadherin in epithelial cells and early
    embryos.
  findings:
    - statement: Ankyrin-G binds E-cadherin cytoplasmic domain at a site distinct from
        beta-catenin
      supporting_text: Ankyrin-G binds to the cytoplasmic domain of E-cadherin at a
        conserved site distinct from that of beta-catenin
    - statement: Ankyrin-G and beta-2-spectrin are required for E-cadherin lateral
        membrane localization and Golgi exit
      supporting_text: ankyrin-G and beta-2-spectrin also are required for exit of
        E-cadherin from the trans-Golgi network in a microtubule-dependent pathway
    - statement: Ankyrin-G knockdown in embryos blocks E-cadherin accumulation at cell-cell
        contacts
      supporting_text: knockdown of either ankyrin-G or beta-2-spectrin in one cell
        of a two-cell embryo blocks accumulation of E-cadherin at sites of cell-cell
        contact
- id: PMID:18180363
  title: Voltage-gated Nav channel targeting in the heart requires an ankyrin-G dependent
    cellular pathway.
  findings:
    - statement: Ankyrin-G is required for Nav1.5 membrane targeting in cardiomyocytes
      supporting_text: In this paper, we demonstrate that ankyrin-G is required for
        Na(v)1.5 targeting in the heart
    - statement: Reduced ankyrin-G expression decreases Nav1.5 expression, membrane
        localization, and Na+ current density
      supporting_text: Cardiomyocytes with reduced ankyrin-G display reduced Na(v)1.5
        expression, abnormal Na(v)1.5 membrane targeting, and reduced Na(+) channel
        current density
    - statement: Direct ankyrin-G-Nav1.5 interaction is required for channel membrane
        localization
      supporting_text: direct intermolecular interaction between these two molecules
        is required for efficient channel membrane localization
- id: PMID:19934039
  title: Inositol pyrophosphate mediated pyrophosphorylation of AP3B1 regulates HIV-1
    Gag release.
  findings:
    - statement: ANK3 identified as AP3B1 interactor in the context of HIV-1 Gag release
        study; peripheral to ANK3 function
      supporting_text: We have identified Kif3A, a motor protein of the kinesin superfamily,
        as an AP3B1-binding partner
- id: PMID:20195357
  title: A comprehensive resource of interacting protein regions for refining human
    transcription factor networks.
  findings:
    - statement: Large-scale mRNA display screen for transcription factor interacting
        regions; ANK3 detected as interactor
      supporting_text: Here we present the first large-scale IR data set obtained using
        mRNA display for 50 human transcription factors (TFs), including 12 transcription-related
        proteins
- id: PMID:21223964
  title: 'Novel interactions of ankyrins-G at the costameres: the muscle-specific
    Obscurin/Titin-Binding-related Domain (OTBD) binds plectin and filamin C.'
  findings:
    - statement: Muscle ankyrin-G OTBD domain binds plectin and filamin C
      supporting_text: we searched for muscle proteins binding to ankyrin-G OTBD by
        yeast two hybrid assay, and we found plectin and filamin C
    - statement: Ankyrin-G, plectin, and filamin C colocalize at costameres in adult
        muscle
      supporting_text: The three proteins coimmunoprecipitate from skeletal muscle
        extracts and colocalize at costameres in adult muscle fibers
    - statement: Muscle ankyrins-G are upregulated during myogenesis
      supporting_text: muscle ankyrins-G are first expressed in postmitotic myocytes
        undergoing fusion to myotubes
- id: PMID:27356871
  title: Acetylated tau destabilizes the cytoskeleton in the axon initial segment
    and is mislocalized to the somatodendritic compartment.
  findings:
    - statement: Ankyrin-G is a core component of the AIS cytoskeletal barrier
      supporting_text: Consisting of microtubule (MT) bundles coated with a dense submembrane
        protein network containing ankyrin G (AnkG), betaIV-spectrin, and actin filaments
    - statement: AIS proteins including ankyrin-G are downregulated in Alzheimer disease
        brains
      supporting_text: AIS cytoskeletal proteins, including ankyrin G and betaIV-spectrin,
        were downregulated in AD brains and negatively correlated with an increase in
        tau acetylated at K274 and K281
- id: PMID:33961781
  title: Dual proteome-scale networks reveal cell-specific remodeling of the human
    interactome.
  findings:
    - statement: BioPlex 3.0 proteome-scale AP-MS interactome study; ANK3 interactions
        detected as part of global mapping
      supporting_text: Through affinity-purification mass spectrometry, we have created
        two proteome-scale, cell-line-specific interaction networks
- id: PMID:8666667
  title: Identification of a small cytoplasmic ankyrin (AnkG119) in the kidney and
    muscle that binds beta I sigma spectrin and associates with the Golgi apparatus.
  findings:
    - statement: AnkG119 (isoform 5) is a small ankyrin that binds beta-I-sigma spectrin
        and localizes to the Golgi apparatus
      supporting_text: these data identify AnkG119 as a novel small ankyrin that binds
        and colocalizes with beta I sigma spectrin in the ER and Golgi apparatus
    - statement: AnkG119 binds beta-I-sigma-1 spectrin with high affinity
      supporting_text: A fusion peptide containing residues 669-860 of AnkG119 interacts
        with beta I sigma 1 spectrin in vitro with a Kd = 4.2 +/- 4.0 ( +/- 2 SD)
        nM
