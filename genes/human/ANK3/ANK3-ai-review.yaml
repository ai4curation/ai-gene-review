core_functions:
  - molecular_function:
      id: GO:0008093
      label: cytoskeletal anchor activity
    description: ANK3 links integral membrane proteins (sodium channels, E-cadherin,
      RhBG, L1-CAMs) to the spectrin-actin cytoskeleton via its ankyrin repeat domain,
      anchoring them at specialized membrane domains.
  - molecular_function:
      id: GO:0030674
      label: protein-macromolecule adaptor activity
    description: ANK3 functions as a molecular adaptor bridging transmembrane proteins
      to the spectrin-based membrane skeleton, enabling membrane domain organization.
  - molecular_function:
      id: GO:0030507
      label: spectrin binding
    description: ANK3 binds beta-spectrin isoforms through its ZU5 domain with high
      affinity, recruiting spectrin to membrane protein complexes.
  - molecular_function:
      id: GO:0044325
      label: transmembrane transporter binding
    description: ANK3 binds voltage-gated sodium channels (Nav1.5, Nav1.2, Nav1.6),
      potassium channels (KCNA1), and ammonium transporter RhBG through its ankyrin
      repeat domain.
  - molecular_function:
      id: GO:0045296
      label: cadherin binding
    description: ANK3 binds E-cadherin cytoplasmic domain at a conserved site distinct
      from beta-catenin, required for E-cadherin lateral membrane localization.
