description: >-
  FBXL16 (F-box/LRR-repeat protein 16, C16orf22) is a member of the FBXL
  subfamily of F-box proteins, with an N-terminal region (including a disordered
  segment), an F-box domain, and a C-terminal leucine-rich repeat (LRR) array.
  Like other FBXL proteins it can serve as the substrate-recognition subunit of a
  Cullin-RING (SCF) E3 ubiquitin ligase, docking onto SKP1/CUL1 through its F-box
  domain and recruiting substrates via its LRRs. FBXL16 is expressed most highly
  in brain. It binds the transcription factor HIF1alpha and has been reported to
  promote its ubiquitination and degradation in an oxygen-independent manner,
  acting as a tumor suppressor in triple-negative breast cancer by limiting
  HIF1alpha-driven epithelial-mesenchymal transition and angiogenesis. Beyond
  HIF1alpha, its substrate repertoire and broader physiological roles are not yet
  well characterized.
