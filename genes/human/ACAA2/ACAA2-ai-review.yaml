- term:
    id: GO:0006695
    label: cholesterol biosynthetic process
  evidence_type: NAS
  original_reference_id: PMID:8241273
  qualifier: involved_in
  review:
    summary: >-
      NAS annotation linking ACAA2 to cholesterol biosynthesis. The cited cloning
      paper (PMID:8241273) describes only cDNA sequencing, rat homology, and Northern
      expression; its abstract makes no claim about cholesterol biosynthesis. The
      assertion is also biologically implausible: ACAA2 is a mitochondrial-matrix
      beta-oxidation (catabolic) thiolase, whereas cholesterol synthesis proceeds via
      the cytosolic acetoacetyl-CoA thiolase/HMG-CoA pathway. This is most likely a
      confusion with the cytosolic/peroxisomal thiolases. Remove.
    action: REMOVE
    reason: >-
      Unsupported by the cited reference and contradicted by the established
      catabolic, mitochondrial role of ACAA2; cholesterol biosynthesis uses cytosolic
      thiolase/HMG-CoA enzymes, not mitochondrial ACAA2.
core_functions:
- description: >-
    Catalyzes the final thiolytic (CoA-dependent) cleavage step of each cycle of
    mitochondrial fatty acid beta-oxidation, converting a 3-ketoacyl-CoA into
    acetyl-CoA and a fatty acyl-CoA shortened by two carbons, with a preference for
    medium- to long-chain unbranched substrates. Acts as a homotetramer in the
    mitochondrial matrix.
  supported_by:
  - reference_id: PMID:25478839
    supporting_text: >-
      The structures confirm the tetrameric quaternary structure of this degradative
      thiolase.
    full_text_unavailable: true
  - reference_id: PMID:8241273
    supporting_text: >-
      The cDNA sequence of human mitochondrial 3-oxoacyl-CoA thiolase was determined
    full_text_unavailable: true
  molecular_function:
    id: GO:0003988
    label: acetyl-CoA C-acyltransferase activity
  directly_involved_in:
  - id: GO:0006635
    label: fatty acid beta-oxidation
  locations:
  - id: GO:0005759
