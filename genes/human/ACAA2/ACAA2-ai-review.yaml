- id: PMID:18371312
  title: Acetyl-Coenzyme A acyltransferase 2 attenuates the apoptotic effects of BNIP3
    in two human cell lines.
  findings:
  - statement: >-
      Identifies ACAA2 as a BNIP3 binding partner (membrane yeast two-hybrid,
      pull-down, co-IP) that co-localizes with BNIP3 in mitochondria and abolishes
      BNIP3/hypoxia-induced apoptosis in HepG2 and U-2 OS cells, linking fatty acid
      metabolism to apoptosis.
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: >-
      Abstract verified; supports the BNIP3 interaction (GO:0005515) and the
      apoptosis/hypoxia process annotations. Single-lab overexpression study, so the
      apoptosis-regulation role is contextual/non-core.
- id: PMID:22658674
  title: Insights into RNA biology from an atlas of mammalian mRNA-binding proteins.
  findings:
  - statement: >-
      Proteome-wide mRNA-interactome capture in HeLa cells identifying 860 RBPs
      including many intermediary-metabolism enzymes; basis for the HDA RNA-binding
      annotation, with no ACAA2-specific functional validation.
  reference_review:
    relevance: LOW
    correctness: VERIFIED
    review_notes: >-
      Abstract verified; a high-throughput screen only. Supports the RNA-binding
      annotation as a moonlighting candidate, not a characterized ACAA2 function.
- id: PMID:25478839
  title: 'The crystal structure of human mitochondrial 3-ketoacyl-CoA thiolase (T1):
    insight into the reaction mechanism of its thiolase and thioesterase activities.'
  findings:
  - statement: >-
      Crystal structures (apo and CoA-bound, 2.0 A) confirm ACAA2/T1 is a tetrameric
      degradative thiolase; demonstrates significant biosynthetic (acetoacetyl-CoA)
      thiolase activity and low intrinsic acyl-CoA thioesterase (hydrolase) activity,
      fastest for butyryl-CoA. Provides the EXP/IDA basis for the thiolase and
      hydrolase molecular-function annotations.
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Abstract verified against UniProt (PDB 4C2J/4C2K, Cys92/Cys382 active site,
      kinetics). Primary structural/biochemical reference establishing ACAA2's core
      and side activities.
- id: PMID:34800366
  title: Quantitative high-confidence human mitochondrial proteome and its dynamics
    in cellular context.
  findings:
  - statement: >-
      High-confidence human mitochondrial proteome study supporting mitochondrial
      localization of ACAA2 (HTP evidence).
  reference_review:
    relevance: LOW
    correctness: VERIFIED
    review_notes: >-
      Supports mitochondrial localization; corroborative high-throughput evidence
      only.
- id: PMID:8241273
  title: Cloning and sequence analysis of a full length cDNA encoding human mitochondrial
    3-oxoacyl-CoA thiolase.
  findings:
  - statement: >-
      Original cDNA cloning of human mitochondrial 3-oxoacyl-CoA thiolase (397 aa,
      86.6% identity to rat), expressed in liver, fibroblasts and muscle. Establishes
      gene identity and mitochondrial assignment; makes no claim about cholesterol
      biosynthesis.
