proposed_new_terms: []
suggested_questions:
- question: >-
    Is ACAA2's biosynthetic acetoacetyl-CoA-forming (acetyl-CoA C-acetyltransferase)
    activity physiologically relevant in vivo, or is it primarily a reflection of the
    reversibility of the thiolase reaction measured in vitro?
- question: >-
    Is the anti-apoptotic, BNIP3-attenuating role of ACAA2 a genuine endogenous
    function or an artifact of overexpression, and does it depend on the catalytic
    activity of the enzyme?
- question: >-
    Does ACAA2 have any bona fide RNA-binding function, or is its appearance in
    mRNA-interactome capture a non-functional consequence of CoA/nucleotide-binding
    surfaces?
suggested_experiments:
- description: >-
    Determine the chain-length substrate specificity of recombinant human ACAA2 with
    a panel of straight-chain 3-ketoacyl-CoA substrates (C4-C16) to define its
    physiological substrate range relative to HADHB and ACAT1.
- description: >-
    Use ACAA2 knockout/knockdown in human hepatocytes followed by acylcarnitine and
    organic-acid profiling to test the in-vivo contribution of ACAA2 to
    beta-oxidation flux and the proposed acetate side-production.
- description: >-
    Test whether catalytically dead ACAA2 (C92A/C382A) still attenuates BNIP3-induced
    apoptosis, to determine whether the apoptosis-modulating role is independent of
    thiolase catalysis.
