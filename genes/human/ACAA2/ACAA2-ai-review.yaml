gene_symbol: ACAA2
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  ACAA2 (3-ketoacyl-CoA thiolase, mitochondrial; also called acetyl-CoA
  acyltransferase 2 or T1; EC 2.3.1.16) is a soluble enzyme of the mitochondrial
  matrix that catalyzes the fourth and final step of each cycle of the fatty acid
  beta-oxidation spiral. Using free coenzyme A, it performs the thiolytic cleavage
  of a 3-ketoacyl-CoA (3-oxoacyl-CoA) into acetyl-CoA and a fatty acyl-CoA shortened
  by two carbon atoms, preferring medium- to long-chain unbranched (straight-chain)
  substrates. The enzyme assembles as a homotetramer and belongs to the thiolase
  family of the thiolase-like superfamily, using an active-site cysteine (Cys92) to
  form an acyl-enzyme thioester intermediate and a second cysteine (Cys382) as the
  catalytic proton donor/acceptor. In the reverse direction it can condense two
  acetyl-CoA molecules into acetoacetyl-CoA (EC 2.3.1.9), and it also displays a slow
  intrinsic acyl-CoA thioesterase (hydrolase) side activity on various fatty
  acyl-CoAs. ACAA2 is a distinct gene product from HADHB (the long-chain thiolase of
  the membrane-bound mitochondrial trifunctional protein) and from ACAT1 (the
  mitochondrial acetoacetyl-CoA/ketone-body thiolase). It has additionally been
  reported to bind the pro-apoptotic protein BNIP3 and attenuate BNIP3-driven
  apoptosis, providing a possible link between mitochondrial fatty acid metabolism
  and apoptotic signaling.
