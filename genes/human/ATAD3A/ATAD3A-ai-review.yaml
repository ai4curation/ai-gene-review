      IM sensed by the cell fission machinery.
- id: PMID:20332122
  title: ATPase family AAA domain-containing 3A is a novel anti-apoptotic factor in lung
    adenocarcinoma cells.
  findings:
  - statement: ATAD3A is experimentally detected in lung adenocarcinoma and supports
      survival/drug-response phenotypes.
    supporting_text: Expression of ATAD3A was detected by reverse transcription-polymerase
      chain reaction, immunoblotting, immunohistochemistry and confocal immunofluorescent
      microscopy.
  - statement: ATAD3A silencing increases mitochondrial fragmentation and cisplatin
      sensitivity in lung adenocarcinoma cells.
    supporting_text: Silencing of ATAD3A expression increased mitochondrial fragmentation
      and cisplatin sensitivity.
- id: PMID:20349121
  title: Topological analysis of ATAD3A insertion in purified human mitochondria.
  findings:
  - statement: ATAD3A is a mitochondrial inner membrane-associated protein with N- and
      C-terminal topology across the inner membrane.
    supporting_text: ATAD3 is a mitochondrial inner membrane-associated protein
- id: PMID:22664726
  title: ATAD3B is a human embryonic stem cell specific mitochondrial protein, re-expressed
    in cancer cells, that functions as dominant negative for the ubiquitous ATAD3A.
  findings:
  - statement: ATAD3B associates with ATAD3A and negatively regulates ATAD3A interaction
      with matrix nucleoid complexes.
    supporting_text: ATAD3B associates with the ubiquitous ATAD3A species
- id: PMID:30914652
  title: ATAD3A oligomerization causes neurodegeneration by coupling mitochondrial
    fragmentation and bioenergetics defects.
  findings:
  - statement: ATAD3A interacts with Drp1 and links mitochondrial fragmentation to mtDNA
      damage and bioenergetic defects in neurodegeneration models.
    supporting_text: ATAD3A plays a key role in neurodegeneration by linking Drp1-induced
      mitochondrial fragmentation to defective mtDNA maintenance
- id: PMID:31522117
  title: 'Structural Basis of Mitochondrial Scaffolds by Prohibitin Complexes: Insight into a
    Role of the Coiled-Coil Region.'
  findings:
  - statement: ATAD3A participates in a mitochondrial CLPB/PHB/MAVS scaffold required for
      antiviral innate immune signaling.
    supporting_text: CLPB bridges PHB complexes (IMM) and MAVS (OMM) with the assistance of
      AKAP1 and ATAD3A at the IMS and invokes an immune response from the mitochondrial
      signalosome
- id: PMID:34800366
  title: Quantitative high-confidence human mitochondrial proteome and its dynamics in
    cellular context.
  findings: []
- id: PMID:37832546
  title: Mitochondrial DNA breaks activate an integrated stress response to reestablish
    homeostasis.
  findings:
  - statement: ATAD3A participates in mitochondrial DNA break-triggered ISR signaling from
      damaged genomes to the inner membrane.
    supporting_text: we identified ATAD3A-a membrane-bound protein interacting with
      nucleoids-as potentially pivotal in relaying signals from impaired genomes to the
      inner mitochondrial membrane.
  - statement: Mitochondrial DNA breaks activate integrated stress response signaling.
    supporting_text: mtDSBs triggered the integrated stress response (ISR)
- id: PMID:39116259
  title: PERK-ATAD3A interaction provides a subcellular safe haven for protein synthesis
    during ER stress.
  findings:
  - statement: ATAD3A binds PERK during ER stress and forms mitochondria-ER contact sites.
    supporting_text: PERK-ATAD3A interactions increased during ER stress, forming
      mitochondria-ER contact sites.
  - statement: ATAD3A attenuates local PERK signaling and helps preserve mitochondrial
      protein synthesis during ER stress.
    supporting_text: ATAD3A binding attenuated local PERK signaling and rescued the
      expression of some mitochondrial proteins.
- id: PMID:17210950
  title: The AAA+ protein ATAD3 has displacement loop binding properties and is involved in
    mitochondrial nucleoid organization.
  findings:
  - statement: ATAD3 is a mitochondrial nucleoid-associated AAA+ protein with D-loop binding
      properties.
    supporting_text: human ATAD3 is a component of many, but not all, mitochondrial
      nucleoids
  - statement: ATAD3 depletion alters mitochondrial nucleoid structure and affects
      protein-bound D-loop-containing mtDNA fragments.
    supporting_text: altered the structure of mitochondrial nucleoids and led to the
      dissociation of mitochondrial DNA fragments held together by protein, specifically,
      ones containing the D-loop region
  - statement: ATAD3 has functional ATPase activity.
    supporting_text: The ATPase of ATAD3 is functional
- id: PMID:22453275
  title: Mitochondrial nucleoid interacting proteins support mitochondrial protein
    synthesis.
  findings:
  - statement: ATAD3 supports mitochondrial protein synthesis and binds mitochondrial
      ribosomes.
    supporting_text: Both proteins are demonstrated to be required for mitochondrial protein
      synthesis in human cultured cells, and the major binding partner of ATAD3 is the
      mitochondrial ribosome.
  - statement: Altered ATAD3 expression perturbs mtDNA maintenance and replication.
    supporting_text: Altered ATAD3 expression also perturbs mtDNA maintenance and
      replication.
- id: file:human/ATAD3A/ATAD3A-deep-research-manual.md
  title: Manual deep research synthesis for ATAD3A
  findings:
  - statement: Provider-backed deep research was unavailable, so this review used a manual
      synthesis.
    supporting_text: Falcon deep research was requested but timed out after 600 seconds, and
      the configured Perplexity fallback failed with an insufficient-quota 401 error.
  - statement: The PN mitophagy projection was not propagated for ATAD3A.
    supporting_text: 'Manual synthesis decision: ATAD3A is not currently supported as a direct
      mitophagy cargo-marking or PINK/PRKN pathway factor.'
- id: file:human/ATAD3A/ATAD3A-notes.md
  title: Curator notes for ATAD3A PN review
  findings:
  - statement: The Proteostasis PN mitophagy projection was evaluated conservatively and not
      added.
    supporting_text: I did not add GO:0000423 mitophagy.
  - statement: Generic protein binding annotations were marked as over-annotations.
    supporting_text: Marked generic protein binding annotations as over-annotated.
core_functions:
- description: >-
    ATAD3A functions as a mitochondrial inner-membrane AAA+ ATPase/scaffold at contact-site and
    nucleoid-adjacent regions, supporting mitochondrial network organization, mtDNA/nucleoid organization,
    and mitochondrial protein synthesis.
  molecular_function:
    id: GO:0016887
    label: ATP hydrolysis activity
  directly_involved_in:
  - id: GO:0007005
    label: mitochondrion organization
  - id: GO:0032042
    label: mitochondrial DNA metabolic process
  - id: GO:0032543
    label: mitochondrial translation
  locations:
  - id: GO:0005743
    label: mitochondrial inner membrane
  - id: GO:0042645
    label: mitochondrial nucleoid
  supported_by:
  - reference_id: PMID:20154147
    supporting_text: ATAD3A regulates dynamic interactions between the mitochondrial OM and
      IM sensed by the cell fission machinery.
  - reference_id: PMID:17210950
    supporting_text: human ATAD3 is a component of many, but not all, mitochondrial
      nucleoids
  - reference_id: PMID:22453275
    supporting_text: Both proteins are demonstrated to be required for mitochondrial protein
      synthesis in human cultured cells, and the major binding partner of ATAD3 is the
      mitochondrial ribosome.
proposed_new_terms: []
suggested_questions:
- question: >-
    Does endogenous ATAD3A have a direct PINK1/PRKN-dependent cargo-marking, receptor-regulatory,
    or mitophagic-flux role that is separable from secondary consequences of mitochondrial fragmentation
    and mtDNA damage?
- question: >-
    Should ATAD3A receive an explicit mitochondrial translation or mitochondrial genome maintenance
    annotation based on PMID:22453275 and PMID:17210950, and if so what evidence code and term
    granularity best reflect a scaffold/support role?
suggested_experiments:
- description: >-
    Test ATAD3A loss, rescue, ATPase mutants, and oligomerization/contact-site mutants in PINK1
    stabilization, PRKN recruitment, mitochondrial ubiquitination, LC3 recruitment, and mitophagic
    flux assays after mitochondrial depolarization or damage.
- description: >-
    Separate ATAD3A PERK-binding and ATPase/nucleoid functions using domain mutants, measuring
    mitochondrial-localized translation during ER stress alongside mitochondrial morphology and
    mtDNA/nucleoid organization.
