id: Q9NVI7
gene_symbol: ATAD3A
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  ATAD3A encodes a mitochondrial AAA+ ATPase that is anchored in the mitochondrial inner membrane,
  enriched at inner/outer membrane and mitochondria-ER contact regions, and associated with mitochondrial
  nucleoids. It supports mitochondrial network organization, mtDNA/nucleoid organization, and
  mitochondrial protein synthesis, and it can participate in stress-response signaling from mitochondria,
  including PERK modulation at mitochondria-ER contact sites and HRI-mediated integrated stress
  response signaling after mitochondrial DNA breaks.
