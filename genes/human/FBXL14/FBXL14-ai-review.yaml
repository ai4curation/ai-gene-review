id: Q8N1E6
gene_symbol: FBXL14
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  FBXL14 (F-box/LRR-repeat protein 14; FBL14) is a substrate-recognition subunit
  of an SCF (SKP1-CUL1-RBX1) E3 ubiquitin ligase complex. Its F-box motif binds
  SKP1, linking it to the CUL1-RBX1 catalytic core, while its leucine-rich
  repeat domain provides substrate selectivity, directing substrate-specific
  polyubiquitination and proteasomal degradation. The best-characterized
  substrate is the EMT master transcription factor SNAI1/SNAIL1: SCF(FBXL14)
  binds (through a SNAI1 region around aa 120-151) and polyubiquitinates SNAI1
  on lysines including K98, K137 and K146, promoting its proteasomal degradation
  in a manner independent of GSK-3beta phosphorylation, thereby controlling SNAI1
  abundance during epithelial-to-mesenchymal transition. FBXL14 expression is
  down-regulated by hypoxia in a TWIST1-dependent manner, which stabilizes SNAI1
  and supports EMT. FBXL14 also targets additional transcriptional regulators
  for degradation: it recognizes the conserved C-terminal WRPW motif of the
  Notch effector HES1 to promote its ubiquitination and turnover (affecting Notch
  signaling dynamics and neuronal differentiation), and it has been reported to
  ubiquitinate Thr58-phosphorylated c-MYC, promoting differentiation and
  suppressing glioma stem-cell tumorigenicity. FBXL14 is mainly cytoplasmic and
  acts in the cytoplasm/cytosol.
