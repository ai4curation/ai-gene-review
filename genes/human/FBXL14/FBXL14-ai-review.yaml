- id: file:human/FBXL14/FBXL14-deep-research-falcon.md
  title: Falcon deep research report for human FBXL14
  findings:
  - statement: FBXL14 is an SCF (CRL1) substrate receptor that promotes ubiquitin-dependent proteasomal degradation of select transcriptional regulators, with validated direct substrates HES1 and SNAIL1.
    supporting_text: >-
      FBXL14 is best supported as an **SCF (CRL1) E3 ubiquitin ligase substrate
      receptor** that promotes **ubiquitin-dependent proteasomal degradation** of
      select transcriptional regulators, with validated direct substrates including
      **HES1** (Notch signaling effector) and **SNAIL1** (EMT transcription factor).
  - statement: SCF(FBXL14) recognizes the conserved C-terminal WRPW motif of the Notch effector HES1, which is required for HES1 binding, ubiquitination, and degradation.
    supporting_text: >-
      the conserved **C-terminal WRPW motif** in HES1 is required for FBXL14 binding
      and for SCF^FBXL14-mediated ubiquitination and degradation; deleting WRPW reduces
      co-IP with FBXL14, increases HES1 stability in CHX chase, and decreases polyubiquitination.
  - statement: SCF(FBXL14) ubiquitinates SNAIL1 on acceptor lysines K98, K137 and K146, with a triple K-to-R mutant strongly stabilized, and depletion of FBXL14 extends SNAIL1 half-life from about 1 h to about 3 h.
    supporting_text: >-
      Major SNAIL1 ubiquitination acceptor lysines include **K98, K137, K146**: a triple
      mutant shows reduced ubiquitination and is highly stable (e.g., ~80% remaining after
      4 h CHX in cited experiments).
  - statement: Hypoxia down-regulates FBXL14 mRNA in a TWIST1-dependent manner, stabilizing SNAIL1 protein without increasing SNAI1 mRNA and thereby supporting EMT.
    supporting_text: >-
      TWIST1 is required for this hypoxia response: Twist1 knockdown prevents
      hypoxia-induced FBXL14 down-modulation and prevents SNAIL1 stabilization.
  - statement: FBXL14 is reported to ubiquitinate Thr58-phosphorylated c-MYC, promoting differentiation and suppressing glioma stem-cell tumorigenicity (review-summarized primary evidence).
    supporting_text: >-
      FBXL14 is reported to ubiquitylate **Thr58-phosphorylated c-Myc**; FBXL14 is low
      in glioma stem cells but higher in non-stem-like glioma cells/neural progenitors.
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Falcon adds two substrate axes beyond SNAI1 - HES1 (Chen et al. 2017, via the
      HES1 WRPW motif) and Thr58-phospho-c-MYC (review-summarized, Yumimoto/Nakayama)
      - and refines SNAI1 degron/acceptor-lysine mapping (aa 120-151; K98/K137/K146)
      and TWIST1-dependent hypoxic repression. SNAI1 axis cross-checks the cached
      PMID:19955572; HES1/c-MYC axes are reported via author-year DOIs not in the PMID
      cache and are treated as well-supported leads, not added as new GOA terms.
