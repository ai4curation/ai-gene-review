suggested_questions:
- question: Beyond SNAI1, what is the full physiological substrate repertoire of SCF(FBXL14), and what degron features does its LRR recognize in a phosphorylation-independent manner?
- question: How does hypoxic down-regulation of FBXL14 integrate with other SNAI1-targeting ligases (e.g. beta-TrCP, FBXO11) to control EMT in development and cancer?
suggested_experiments:
- description: Reconstitute SCF(FBXL14)-mediated ubiquitination of SNAI1 in vitro with purified SKP1-CUL1-RBX1-FBXL14 and an E2 to confirm direct ubiquitination, map sites, and test phosphorylation dependence of the degron.
- description: Perform quantitative ubiquitinome/proteome profiling in FBXL14-knockout versus wild-type cells under normoxia and hypoxia to define the endogenous substrate landscape and EMT consequences.
