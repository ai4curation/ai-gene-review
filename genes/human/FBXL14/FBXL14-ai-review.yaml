- term:
    id: GO:0004842
    label: ubiquitin-protein transferase activity
  evidence_type: IDA
  original_reference_id: PMID:19955572
  qualifier: enables
  review:
    summary: Direct evidence that FBXL14 promotes SNAI1 polyubiquitination within the SCF complex. As an F-box protein, FBXL14 is the substrate receptor; the transferase activity resides in the RBX1-recruited E2, so the more precise term is the substrate-adaptor activity.
    action: MODIFY
    reason: FBXL14 is the substrate-recognition subunit, not the catalytic transferase (catalysis is contributed by RBX1/E2 in the SCF). The ubiquitin-like ligase-substrate adaptor activity term more accurately captures its molecular function while preserving the experimentally supported role in substrate ubiquitination.
    proposed_replacement_terms:
    - id: GO:1990756
      label: ubiquitin-like ligase-substrate adaptor activity
