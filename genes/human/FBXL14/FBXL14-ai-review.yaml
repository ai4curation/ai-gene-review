  qualifier: enables
  review:
    summary: Proposed core molecular function. As the LRR substrate-recognition subunit of SCF(FBXL14), FBXL14 selects SNAI1/SNAIL1 (via its D-S-G phosphodegron motif) for SCF-dependent ubiquitination. This is the precise replacement for the broader ubiquitin-protein transferase annotation.
