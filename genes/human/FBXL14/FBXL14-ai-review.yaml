    label: SCF-dependent proteasomal ubiquitin-dependent protein catabolic process
proposed_new_terms: []
suggested_questions:
- question: How does FBXL14 discriminate among its degron types - the phosphorylation-independent SNAI1 region (aa 120-151), the linear WRPW motif of HES1, and Thr58-phosphorylated c-MYC - using its single LRR concave surface?
- question: How does hypoxic, TWIST1-dependent down-regulation of FBXL14 integrate with other SNAI1-targeting ligases (e.g. beta-TrCP, FBXO11) to control EMT in development and cancer, and is HES1/Notch turnover similarly hypoxia-regulated?
suggested_experiments:
- description: Reconstitute SCF(FBXL14)-mediated ubiquitination of SNAI1, HES1 (WRPW-dependent), and Thr58-phospho-c-MYC in vitro with purified SKP1-CUL1-RBX1-FBXL14 and an E2 to confirm direct ubiquitination, map sites, and define degron requirements.
- description: Perform quantitative ubiquitinome/proteome profiling in FBXL14-knockout versus wild-type cells under normoxia and hypoxia (and in neural/glioma models) to define the endogenous substrate landscape and the EMT, Notch, and differentiation consequences.
