gene_symbol: ALDH5A1
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: Succinate-semialdehyde dehydrogenase, mitochondrial (SSADH; ALDH5A1)
  is a mitochondrial NAD+-dependent oxidoreductase (EC 1.2.1.24) that catalyzes the
  final step of gamma-aminobutyric acid (GABA) degradation, the GABA shunt. It
  irreversibly oxidizes succinate semialdehyde to succinate (using NAD+ and water,
  producing NADH), thereby routing the carbon skeleton of the inhibitory
  neurotransmitter GABA into the tricarboxylic acid (TCA) cycle and central energy
  metabolism. The protein is synthesized as a precursor with an N-terminal transit
  peptide, imported into the mitochondrion, and assembles into a homotetramer that
  resides in the mitochondrial matrix; its activity is redox-regulated through a
  reversible disulfide bond on a dynamic catalytic loop. It is a member of the
  aldehyde dehydrogenase superfamily and is expressed broadly, including in brain,
  liver, kidney and skeletal muscle. Loss-of-function variants cause succinic
  semialdehyde dehydrogenase deficiency (SSADH deficiency; 4-hydroxybutyric /
  gamma-hydroxybutyric aciduria), an autosomal recessive disorder in which GABA and
  4-hydroxybutyrate (GHB) accumulate, producing developmental delay, hypotonia,
  intellectual disability, ataxia, seizures and behavioural disturbances.
