      IRAK and receptor TIR domains in review synthesis)'
  - reference_id: file:human/TOLLIP/TOLLIP-deep-research-falcon.md
    supporting_text: '**TLR/IL‑1R → Myddosome/IRAK1 → NF‑κB**: TOLLIP restrains IRAK1 in resting cells;
