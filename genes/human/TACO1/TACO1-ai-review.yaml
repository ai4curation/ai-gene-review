core_functions:
- description: >-
    TACO1 binds the mitochondrial ribosome and acts as a translational activator
    of the mitochondrially-encoded MT-CO1 (COX1) mRNA, promoting mitochondrial
    translation of COX1 (and the other polyproline-rich subunit COX3) and thereby
    enabling assembly of respiratory chain complex IV (cytochrome c oxidase). It
    functions in the mitochondrial matrix as the mitochondrial counterpart of
    EF-P/eIF5A, alleviating mitoribosome stalling at polyproline stretches.
  molecular_function:
    id: GO:0097177
    label: mitochondrial ribosome binding
