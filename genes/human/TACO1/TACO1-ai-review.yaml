- term:
    id: GO:0033617
    label: mitochondrial respiratory chain complex IV assembly
  evidence_type: IMP
  original_reference_id: PMID:39036954
  qualifier: involved_in
  review:
    summary: >-
      Proposed annotation to complex IV (cytochrome c oxidase) assembly. By
      driving synthesis of the MT-CO1 catalytic core subunit, TACO1 is required
      for assembly of respiratory chain complex IV; loss of TACO1 reduces fully
      assembled complex IV and supercomplexes.
    action: NEW
    reason: >-
      TACO1 knockout reduces levels of fully assembled complex IV, establishing a
      requirement for TACO1 in complex IV assembly downstream of its role in
      MT-CO1 translation. Consistent with the MC4DN8 (complex IV deficiency)
      disease phenotype and Reactome R-HSA-9864848 Complex IV assembly.
    supported_by:
