id: Q9BSH4
gene_symbol: TACO1
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  TACO1 (Translational Activator of Cytochrome c Oxidase 1; also CCDC44) is a
  nuclear-encoded, mitochondrial-matrix RNA-binding translational activator of
  the conserved YebC/TACO1 family. It associates with the mitochondrial ribosome
  and the MT-CO1 (COX1) mitochondrial mRNA and promotes translation of MT-CO1,
  the catalytic core subunit of cytochrome c oxidase (respiratory chain complex
  IV). Mechanistically it acts as the mitochondrial functional counterpart of
  bacterial elongation factor EF-P / eukaryotic-archaeal eIF5A, binding the
  mitoribosome large subunit and alleviating ribosome stalling at polyproline
  stretches, thereby enabling rapid synthesis of the polyproline-rich COX1 and
  COX3 subunits and, in turn, complex IV assembly. Loss of TACO1 function reduces
  COX1 synthesis and complex IV levels/activity. Biallelic TACO1 variants cause
  mitochondrial complex IV deficiency with a late-onset (juvenile) Leigh
  syndrome-like neurodegeneration.
