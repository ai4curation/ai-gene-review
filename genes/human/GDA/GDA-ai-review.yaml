  label: Homo sapiens
description: >-
  GDA (guanine deaminase; guanase; guanine aminohydrolase; also known as cypin
  and p51-nedasin) is a cytosolic, zinc-dependent amidohydrolase of the
  metallo-dependent hydrolase (ATZ/TRZ) superfamily. Its conserved enzymatic
  function is the hydrolytic deamination of the purine base guanine to xanthine
  plus ammonia (EC 3.5.4.3), the committed step of purine base catabolism that
  feeds xanthine into oxidation to urate by xanthine oxidoreductase; the
  majority of xanthine produced in mammals arises via this guanine-deamination
  reaction. The active enzyme is a homodimer with one catalytic Zn2+ per subunit
  and a KM for guanine in the low-micromolar range. GDA is highly expressed in
  liver, brain, kidney and intestine. Beyond catabolism, the neuronal protein
  cypin/nedasin is the same gene product: through a C-terminal PDZ-binding motif
  it binds PSD-95/DLG-family and other PDZ scaffolds and regulates dendrite
  branching and microtubule dynamics, and it can modulate synaptic scaffolding
  by interfering with the association between the MAGUK NE-dlg/SAP102 (DLG3) and
  the NMDA receptor.
