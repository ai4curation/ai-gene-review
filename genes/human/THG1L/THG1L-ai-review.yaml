gene_symbol: THG1L
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  THG1L is the human tRNA(His) guanylyltransferase homolog (EC 2.7.7.79), a member of
  the Thg1 family that catalyzes an unusual 3'-5' nucleotidyl transfer: the post-transcriptional
  addition of a single guanylate (G-1) to the 5' end of tRNA(His), a residue required for
  tRNA(His) identity and correct aminoacylation. The enzyme is a homotetramer that uses a
  two-metal-ion (Mg2+) mechanism, binds GTP (the guanylyl donor) and ATP (used to activate the
  monophosphorylated tRNA 5' end), and shares active-site architecture with 5'-3' DNA
  polymerases and adenylyl/guanylyl cyclases despite lacking sequence similarity. Beyond its
  RNA-processing activity, THG1L (also called IHG-1, Induced in High Glucose-1) has a
  characterized moonlighting role at the mitochondrial outer membrane, where it binds the
  mitofusins MFN1 and MFN2 and acts as a guanine-nucleotide exchange factor, enhancing MFN2
  GTP loading to promote mitochondrial fusion and to protect cells from oxidative-stress-induced
  apoptosis. The protein is found in both the cytosol and mitochondria. Biallelic loss-of-function
  variants cause an autosomal recessive spinocerebellar ataxia (SCAR28), and a disease variant
  (p.Val55Ala) impairs mitochondrial fusion.
