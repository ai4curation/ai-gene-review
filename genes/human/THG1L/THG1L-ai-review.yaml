- id: PMID:25008184
  title: IHG-1 increases mitochondrial fusion and bioenergetic function.
  findings:
  - statement: >-
      IHG-1 (THG1L) acts as a guanine-nucleotide exchange factor for MFN2 (and probably MFN1),
      promoting mitochondrial fusion and protecting cells from ROS-induced apoptosis; mitochondrial
      localization is required for the MFN interaction.
    reference_section_type: ABSTRACT
    supporting_text: >-
