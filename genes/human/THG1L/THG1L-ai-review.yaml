- id: PMID:21059936
  title: tRNA(His) guanylyltransferase (THG1), a unique 3'-5' nucleotidyl transferase,
    shares unexpected structural homology with canonical 5'-3' DNA polymerases.
  findings:
  - statement: >-
      Crystal structure and biochemical characterization of the human enzyme establish the core
      3'-5' guanylyl-transfer activity, a two-metal-ion (Mg2+) mechanism, GTP/ATP usage, and
      homotetrameric assembly.
    reference_section_type: RESULTS
    supporting_text: >-
      The 2.3-Å crystal structure of human THG1 (hTHG1) reported here shows that, despite the lack
      of sequence similarity, hTHG1 shares unexpected structural homology with canonical 5′-3′ DNA
      polymerases and adenylyl/guanylyl cyclases, two enzyme families known to use a two-metal-ion
      mechanism for catalysis.
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Primary structural/biochemical source for THG1L's core molecular function and cofactor/
      quaternary-structure annotations.
