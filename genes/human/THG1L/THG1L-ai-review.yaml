core_functions:
- description: >-
    tRNA(His) guanylyltransferase: catalyzes the post-transcriptional 3'-5' addition of a single
    guanylate (G-1) to the 5' end of tRNA(His) after RNase P cleavage, using GTP as the guanylyl
    donor, ATP to activate the monophosphorylated tRNA 5' end, and two catalytic Mg2+ ions. The
    active enzyme is a homotetramer. This ancestral activity is required for tRNA(His) identity
    and translational fidelity.
  molecular_function:
    id: GO:0008193
    label: tRNA guanylyltransferase activity
  directly_involved_in:
  - id: GO:0099116
    label: tRNA 5'-end processing
  locations:
  - id: GO:0005829
    label: cytosol
  - id: GO:0005739
    label: mitochondrion
  supported_by:
  - reference_id: PMID:21059936
    supporting_text: >-
      The tRNA His guanylyltransferase (Thg1) is a member of a unique enzyme family whose members
      catalyze an unprecedented reaction in biology: 3′-5′ addition of nucleotides to nucleic acid
      substrates.
  - reference_id: PMID:21059936
    supporting_text: >-
      The 3′-5′ addition reaction catalyzed by Thg1 requires consumption of an additional ATP to
      activate a monophosphorylated 5′-end for addition of the first nucleotide.
- description: >-
    Mitofusin guanine-nucleotide exchange factor: at the mitochondrial outer membrane, THG1L/IHG-1
    binds MFN1 and MFN2 and enhances MFN2 GTP loading, acting as a GEF that promotes mitochondrial
    fusion and protects cells from oxidative-stress-induced apoptosis. This moonlighting function is
    disease-relevant (the SCAR28 p.Val55Ala variant impairs mitochondrial fusion).
  molecular_function:
    id: GO:0005085
    label: guanyl-nucleotide exchange factor activity
  directly_involved_in:
  - id: GO:0008053
    label: mitochondrial fusion
  - id: GO:1990046
    label: stress-induced mitochondrial fusion
  locations:
  - id: GO:0005741
    label: mitochondrial outer membrane
  supported_by:
  - reference_id: PMID:25008184
    supporting_text: >-
      IHG-1 forms complexes with known mediators of mitochondrial fusion-mitofusins (Mfns) 1 and
      2-and enhances the GTP-binding capacity of Mfn2, suggesting that IHG-1 acts as a guanine
      nucleotide exchange factor.
  - reference_id: PMID:25008184
    supporting_text: >-
      IHG-1 must be localized to mitochondria to interact with Mfn1 and Mfn2, and this interaction
      is necessary for increased IHG-1-mediated mitochondrial fusion.
