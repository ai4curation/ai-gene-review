- id: PMID:18554506
  title: Characterization of four mammalian 3-hydroxyacyl-CoA dehydratases involved
    in very long-chain fatty acid synthesis.
  findings:
  - statement: >-
      All four human HACD proteins (HACD1-4) are 3-hydroxyacyl-CoA dehydratases
      catalyzing the third step of the very-long-chain fatty acid elongation
      cycle, shown by PHS1-shutoff yeast complementation and in-vitro
      3-hydroxypalmitoyl-CoA dehydratase assays; HACD proteins interact with the
      ELOVL1-7 condensation enzymes.
    reference_section_type: ABSTRACT
    supporting_text: "all four of these human proteins are indeed 3-hydroxyacyl-CoA dehydratases"
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Cache is abstract-only (full_text_available: false); UniProt cites this
      paper (ECO:0000269) for FUNCTION, CATALYTIC ACTIVITY, SUBCELLULAR LOCATION,
      PATHWAY, BIOPHYSICOCHEMICAL PROPERTIES and SUBUNIT, so the full text
      contains the HACD1-specific assays not shown in the abstract.
- id: PMID:23933735
  title: Congenital myopathy is caused by mutation of HACD1.
  findings:
  - statement: >-
      A homozygous nonsense HACD1 variant (p.Tyr248Stop) causes autosomal
      recessive congenital myopathy and completely abrogates the dehydratase
      activity, confirming HACD1's role in the third step of VLCFA elongation.
    reference_section_type: ABSTRACT
    supporting_text: "the enzymatic activity of dehydration of 3-hydroxyacyl-CoA, the third step in the elongation of very long-chain fatty acids (VLCFAs)"
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Full text available (PMC3842179); directly assays the HACD1 Y248Stop mutant
      and shows complete loss of 3-hydroxyacyl-CoA dehydratase activity.
