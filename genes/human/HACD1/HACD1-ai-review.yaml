gene_symbol: HACD1
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  HACD1 (PTPLA) is one of the two principal human very-long-chain
  (3R)-3-hydroxyacyl-CoA dehydratases (HACD1 and HACD2), a multi-pass
  endoplasmic reticulum membrane enzyme (EC 4.2.1.134). It catalyzes the third of
  the four reactions of the microsomal fatty-acid elongation cycle: dehydration
  of a (3R)-3-hydroxyacyl-CoA (produced by the 3-ketoacyl-CoA reductase step) to
  a (2E)-enoyl-CoA plus water, which the trans-2-enoyl-CoA reductase TECR then
  reduces to complete each two-carbon extension. Through this reaction HACD1
  contributes to the biosynthesis of long- and very-long-chain fatty acids that
  serve as precursors of membrane lipids, sphingolipids and lipid mediators.
  HACD1 physically associates with the elongase machinery, interacting with ELOVL
  condensation enzymes and with TECR. It is highly expressed in cardiac and
  skeletal muscle; biallelic loss-of-function variants cause an autosomal
  recessive congenital myopathy with type-1 fiber-type disproportion. An
  alternatively spliced isoform (isoform 2, cementum-attachment protein/CAP)
  lacks the catalytic region and is enzymatically inactive.
