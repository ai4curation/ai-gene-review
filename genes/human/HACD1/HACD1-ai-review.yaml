- id: PMID:38422897
  title: The 3-hydroxyacyl-CoA dehydratase 1/2 form complex with trans-2-enoyl-CoA
    reductase involved in substrates transfer in very long chain fatty acid elongation.
  findings:
  - statement: >-
      HACD1/2 form a complex with the trans-2-enoyl-CoA reductase TECR, coupling
      the dehydration (step 3) and reduction (step 4) reactions of the VLCFA
      elongation cycle.
    reference_section_type: ABSTRACT
    supporting_text: "we confirmed the critical interactions between TECR and HACD1/2"
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: >-
      Cache is abstract-only. Supports a functionally meaningful HACD1-TECR
      interaction (basis of the GO:0005515 IPI), consistent with UniProt SUBUNIT
      "Interacts with TECR".
