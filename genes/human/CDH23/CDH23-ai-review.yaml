id: Q9H251
gene_symbol: CDH23
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: CDH23 encodes cadherin-23, a large calcium-dependent cadherin family cell-adhesion
  protein. In sensory hair cells, CDH23 contributes to the upper part of the stereocilia tip-link
  apparatus and interacts with harmonin and related Usher syndrome proteins to maintain hair-bundle
  cohesion and mechanotransduction. CDH23 is also expressed in retina, and pathogenic variants
  cause Usher syndrome and nonsyndromic hearing loss; germline variants have additionally been
  associated with pituitary adenoma predisposition, but the best-supported normal molecular role
  remains cadherin-mediated stereocilium adhesion and organization.
