suggested_questions:
- question: Which CDH23 domains or isoforms, if any, are mechanistically relevant to pituitary
    adenoma predisposition rather than hearing/retinal biology?
- question: Can PITA5-associated CDH23 variants be shown to perturb cadherin adhesion, mechanotransduction-related
    assemblies, or a pituitary-specific interaction network?
suggested_experiments:
- description: Test PITA5-associated CDH23 variants in cadherin adhesion and harmonin/PCDH15 interaction
    assays alongside known hearing-loss variants.
  hypothesis: PITA5-associated variants may perturb CDH23 adhesion or scaffold interactions differently
    from classic hearing-loss variants.
- description: Assess CDH23 isoform expression and subcellular localization in normal pituitary
    and pituitary adenoma samples.
  hypothesis: Pituitary-relevant isoform expression or localization would explain how CDH23 variation
    contributes to adenoma predisposition.
