      / Wnt receptor function.
    supporting_text: identify ROR1 as an oncofetal antigen and receptor for Wnt5a
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: Primary evidence for ROR1 as a Wnt5a receptor.
