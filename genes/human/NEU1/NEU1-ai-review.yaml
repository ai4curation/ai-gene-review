      Lysosomal exo-alpha-sialidase that hydrolyses terminal alpha-2,3/2,6/2,8-linked sialic
      acid (N-acetylneuraminate) residues from oligosaccharides, glycopeptides and
      glycoproteins, performing the committed desialylation step of lysosomal glycan
      catabolism; activity strictly requires association with CTSA in the lysosomal
      multienzyme complex.
