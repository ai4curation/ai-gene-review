id: Q99519
gene_symbol: NEU1
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  NEU1 (sialidase-1, lysosomal neuraminidase, alpha-neuraminidase; EC 3.2.1.18) is a
  lysosomal exo-alpha-sialidase of the glycosyl hydrolase 33 (GH33) family that adopts a
  six-bladed beta-propeller fold. It catalyzes the removal of terminal sialic acid
  (N-acetylneuraminic acid) residues from oligosaccharides, glycopeptides, glycoproteins
  and glycolipids, cleaving alpha-2,3-, alpha-2,6- and alpha-2,8-linked residues, and thus
  performs the first, committed step of lysosomal desialylation in glycan catabolism.
  Uniquely among mammalian sialidases, NEU1 is catalytically inactive on its own and
  requires the protective protein cathepsin A (CTSA/PPCA) for stability, correct lysosomal
  trafficking and activation; NEU1, CTSA and beta-galactosidase (GLB1) assemble into a
  high-molecular-weight lysosomal multienzyme complex. NEU1 resides in the lysosomal lumen
  and on the lysosomal membrane, and a fraction is present at the plasma membrane, where
  desialylation of cell-surface receptors and adhesion molecules modulates signaling,
  elastogenesis and immune responses. Loss-of-function mutations in NEU1 cause sialidosis
  (mucolipidosis I), a lysosomal storage disorder with cherry-red-spot/myoclonus (type 1)
  and dysmorphic (type 2) forms, and secondary NEU1 deficiency (from CTSA mutation)
  underlies galactosialidosis.
