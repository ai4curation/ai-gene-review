description: >-
  FBXL13 (F-box and leucine-rich repeat protein 13; also Dynein regulatory
  complex subunit 6, DRC6) is a multi-domain protein with an N-terminal region,
  an F-box domain, and an extensive C-terminal leucine-rich repeat (LRR) array.
  It has two distinct, tissue-dependent roles. As an SCF (SKP1-CUL1-F-box) E3
  ubiquitin ligase substrate-recognition subunit, FBXL13 docks onto SKP1/CUL1
  through its F-box domain and uses its LRRs to recruit substrates; it localizes
  to the centrosome, where it binds centrosomal proteins (Centrin-2, Centrin-3,
  CEP152, CEP192) and specifically targets CEP192 for proteasomal degradation,
  thereby downregulating gamma-tubulin recruitment, modulating microtubule
  nucleation, and promoting cell migration. Independently, in motile cilia and
  flagella FBXL13/DRC6 is a structural component of the nexin-dynein regulatory
  complex (N-DRC), a regulator of axonemal dynein activity and ciliary/flagellar
  beating; within the N-DRC its lysine-rich C-terminus contributes to the
  electrostatic distal link between neighbouring doublet microtubules. It is
  expressed broadly with enrichment in testis and stomach and in ciliated tissues.
