suggested_questions:
- question: How are the two FBXL13 functions (centrosomal SCF-mediated CEP192 degradation versus structural N-DRC subunit in the axoneme) partitioned between tissues and isoforms?
- question: Does FBXL13 have ubiquitin-ligase substrates beyond CEP192 at the centrosome, and is its catalytic SCF activity required for any aspect of its ciliary role?
suggested_experiments:
- description: Reconstitute SCF-FBXL13 (SKP1-CUL1-RBX1-FBXL13) in vitro and assay ubiquitination of CEP192 (and candidate centrosomal substrates) by an LRR-binding-deficient mutant to map substrate determinants.
- description: Generate FBXL13/DRC6 knockout in ciliated cells and motile-cilia models to test effects on N-DRC assembly, axonemal beat waveform and sperm/ciliary motility, separating the structural role from the SCF role.
