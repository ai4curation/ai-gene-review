suggested_questions:
  - question: >-
      What is the relative contribution of PTPRN vs PTPRN2/phogrin to dense-core vesicle
      homeostasis in different neuroendocrine cell types?
  - question: >-
      Does the RESP18HD-mediated condensation with proinsulin observed in vitro occur in
      vivo during early granule biogenesis?
  - question: >-
      Is the ROS-mediated ectodomain cleavage observed in vitro physiologically relevant,
      for example in oxidative stress conditions in diabetes?

suggested_experiments:
  - description: >-
      Live-cell imaging of PTPRN-tagged constructs to track the complete lifecycle from
      ER exit through granule targeting, exocytosis, CCF generation, and nuclear
      translocation
  - description: >-
      Reconstitution of RESP18HD-proinsulin condensation under physiological conditions
      to validate the phase separation model for granule biogenesis
  - description: >-
      Isoform-specific knockout or knockdown studies to determine whether different PTPRN
      isoforms have distinct functions in granule biology
