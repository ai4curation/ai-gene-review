core_functions:
  - description: >-
      PTPRN functions as a molecular adaptor on dense-core secretory granule membranes,
      coupling secretory vesicle homeostasis to transcriptional regulation. On the granule
      membrane, the TMF fragment tethers granules to the cortical actin cytoskeleton via
      SNTB2/beta-2-syntrophin, restraining granule motility. Upon glucose-stimulated
      exocytosis, the protein is transiently inserted into the plasma membrane where
      mu-calpain cleaves the cytoplasmic domain, generating the CCF fragment. CCF
      translocates to the nucleus, binds phosphorylated STAT5B (preventing its
      dephosphorylation), and promotes transcription of insulin and secretory granule genes.
      This constitutes a retrograde signaling pathway coupling secretory demand to
      transcriptional replenishment of granule components.
    molecular_function:
      id: GO:0060090
      label: molecular adaptor activity
    locations:
      - id: GO:0030141
        label: secretory granule
      - id: GO:0005634
        label: nucleus
    directly_involved_in:
      - id: GO:0035773
        label: insulin secretion involved in cellular response to glucose stimulus
      - id: GO:0045944
        label: positive regulation of transcription by RNA polymerase II
      - id: GO:1990502
        label: dense core granule maturation
    supported_by:
      - reference_id: PMID:15596545
        supporting_text: "exocytosis of SGs and insertion of ICA512 in the plasma membrane promotes the Ca(2+)-dependent cleavage of ICA512 cytoplasmic domain by mu-calpain"
      - reference_id: PMID:16622421
        supporting_text: "Here, we show that the cleaved cytosolic fragment of ICA512 enhances the transcription of secretory granule genes (including its own gene) by binding to tyrosine phosphorylated signal transducers and activators of transcription (STAT) 5 and preventing its dephosphorylation"
      - reference_id: PMID:24843546
        supporting_text: "Insulinoma-associated protein 2 (IA-2) regulates insulin secretion and the number of dense core vesicles (DCV)"

