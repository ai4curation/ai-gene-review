existing_annotations:
# --- IBA annotations (phylogenetic inference) ---
- term:
    id: GO:0030141
    label: secretory granule
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      PTPRN/ICA512 is an intrinsic membrane protein of dense-core secretory granules
      in neuroendocrine cells. This is one of the best-established localizations for
      the protein, supported by extensive experimental data from multiple groups
      (PMID:8641276, PMID:25561468). The deep research report confirms PTPRN is
      concentrated on membranes of dense-core secretory granules in beta cells and
      other neuroendocrine tissues (file:human/PTPRN/PTPRN-deep-research-falcon.md).
    action: ACCEPT
    reason: >-
      Secretory granule localization is the primary and defining localization for PTPRN.
      PMID:8641276 established ICA512 as an intrinsic membrane protein of neurosecretory
      granules. PMID:25561468 showed it is a receptor protein tyrosine phosphatase of
      the insulin secretory granules. The IBA annotation is well supported.
    supported_by:
      - reference_id: PMID:25561468
        supporting_text: "The type 1 diabetes autoantigen ICA512/IA-2/RPTPN is a receptor protein tyrosine phosphatase of the insulin secretory granules (SGs) which regulates the size of granule stores"
      - reference_id: PMID:8641276
        supporting_text: "We show that ICA 512 is an intrinsic membrane protein of secretory granules expressed in insulin-producing pancreatic beta-cells as well as in virtually all other peptide-secreting endocrine cells and neurons containing neurosecretory granules"
      - reference_id: file:human/PTPRN/PTPRN-deep-research-falcon.md
        supporting_text: "PTPRN/IA-2 is concentrated on membranes of dense-core secretory granules (including insulin secretory granules in beta cells) in neuroendocrine tissues"

- term:
    id: GO:0045202
    label: synapse
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      PTPRN is expressed in neuroendocrine cells including neurons, where it localizes
      to synapses as part of its association with dense-core secretory granules in
      neuronal terminals. This is supported by similarity to the well-characterized
      rat ortholog (file:human/PTPRN/PTPRN-deep-research-falcon.md).
    action: ACCEPT
    reason: >-
      UniProt records synapse localization by similarity (ECO:0000250|UniProtKB:Q63259,
      rat ortholog). PTPRN is expressed in brain and is present in neuroendocrine secretory
      vesicles at synaptic sites. PMID:8641276 showed expression in neurons containing
      neurosecretory granules. The IBA annotation via phylogenetic inference is consistent.
    supported_by:
      - reference_id: PMID:8641276
        supporting_text: "We show that ICA 512 is an intrinsic membrane protein of secretory granules expressed in insulin-producing pancreatic beta-cells as well as in virtually all other peptide-secreting endocrine cells and neurons containing neurosecretory granules"

- term:
    id: GO:0035773
    label: insulin secretion involved in cellular response to glucose stimulus
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      PTPRN plays a well-established role in insulin secretion in response to glucose
      stimulation. This is supported by knockout studies showing impaired glucose-stimulated
      insulin secretion in IA-2 null mice, and by studies of SNX19 interaction with IA-2
      in the regulation of dense core vesicle number and insulin content (PMID:24843546,
      PMID:15596545).
    action: ACCEPT
    reason: >-
      Multiple lines of evidence support this annotation. PMID:24843546 shows IA-2
      regulates insulin secretion and the number of dense core vesicles. PMID:15596545
      notes deletion of ICA512 in mice impairs insulin secretion. The IBA annotation
      correctly captures a core function of PTPRN.
    supported_by:
      - reference_id: PMID:24843546
        supporting_text: "Insulinoma-associated protein 2 (IA-2) regulates insulin secretion and the number of dense core vesicles (DCV)"
      - reference_id: PMID:15596545
        supporting_text: "Deletion of ICA512 in mice impairs insulin secretion"

- term:
    id: GO:0051046
    label: regulation of secretion
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      PTPRN regulates vesicle-mediated secretory processes in neuroendocrine cells. This
      is a core function supported by extensive evidence including knockout studies showing
      impaired secretion of multiple hormones and neurotransmitters
      (file:human/PTPRN/PTPRN-deep-research-falcon.md).
    action: ACCEPT
    reason: >-
      PMID:24843546 shows IA-2 regulates insulin secretion and DCV number. Loss of
      IA-2/IA-2beta reduces secretion of insulin, as well as neurotransmitters like
      norepinephrine, dopamine, and serotonin. The IBA annotation at this level of
      specificity is appropriate given the broad secretory regulatory role.
    supported_by:
      - reference_id: PMID:24843546
        supporting_text: "Insulinoma-associated protein 2 (IA-2) regulates insulin secretion and the number of dense core vesicles (DCV)"

# --- IEA annotations (electronic annotation) ---
- term:
    id: GO:0005634
    label: nucleus
  evidence_type: IEA
  original_reference_id: GO_REF:0000044
  review:
    summary: >-
      The ICA512-CCF (cleaved cytosolic fragment) translocates to the nucleus after
      calpain cleavage at the plasma membrane. This is experimentally demonstrated
      (PMID:15596545), though it is specific to the CCF fragment rather than the
      full-length protein.
    action: ACCEPT
    reason: >-
      Nuclear localization of the CCF fragment is experimentally validated by IDA in
      PMID:15596545. The IEA annotation is broader but correct, as the GO annotation
      model captures where the gene product (including processed fragments) is found.
    supported_by:
      - reference_id: PMID:15596545
        supporting_text: "This cleavage occurs at the plasma membrane and generates an ICA512 cytosolic fragment that is targeted to the nucleus"

- term:
    id: GO:0005768
    label: endosome
  evidence_type: IEA
  original_reference_id: GO_REF:0000044
  review:
    summary: >-
      UniProt records endosome localization by similarity to the rat ortholog. After
      exocytosis, PTPRN is endocytosed from the plasma membrane and recycled to
      secretory vesicles via Golgi. Endosomal transit is part of this recycling pathway.
    action: ACCEPT
    reason: >-
      UniProt notes that after exocytosis, PTPRN is endocytosed and recycled to
      secretory vesicles via the Golgi apparatus (by similarity to rat ortholog Q63259).
      PMID:8641276 showed ICA 512 recycles to the Golgi complex region. The endosome
      annotation reflects a transient compartment in the recycling pathway.
    supported_by:
      - reference_id: PMID:8641276
        supporting_text: "ICA 512 is cleaved at its luminal domain and, following exposure at the cell surface, recycles to the Golgi complex region and is sorted into newly formed secretory granules"

- term:
    id: GO:0005886
    label: plasma membrane
  evidence_type: IEA
  original_reference_id: GO_REF:0000044
  review:
    summary: >-
      PTPRN is transiently present at the plasma membrane when secretory vesicles fuse
      with the cell membrane during exocytosis. This transient localization is functionally
      important as it triggers calpain cleavage of the cytoplasmic domain.
    action: ACCEPT
    reason: >-
      PMID:8641276 showed ICA 512 is exposed at the cell surface following exocytosis.
      PMID:15596545 demonstrated that exocytosis and insertion in the plasma membrane
      promotes calpain cleavage. This is a genuine localization, though transient.
    supported_by:
      - reference_id: PMID:8641276
        supporting_text: "ICA 512 is cleaved at its luminal domain and, following exposure at the cell surface, recycles to the Golgi complex region and is sorted into newly formed secretory granules"

- term:
