id: Q16849
gene_symbol: PTPRN
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  PTPRN (also known as IA-2 or ICA512) is a receptor-type tyrosine-protein phosphatase-like
  protein that is catalytically inactive (pseudophosphatase). It is a single-pass type I
  transmembrane protein concentrated on dense-core secretory granule membranes in
  neuroendocrine cells, including pancreatic beta cells, brain, and pituitary. PTPRN plays
  essential roles in secretory vesicle homeostasis, insulin secretory granule accumulation
  and stabilization, and glucose-stimulated insulin secretion. The protein is proteolytically
  processed into NTF, TMF, and CCF fragments. The TMF fragment regulates granule dynamics
  via SNTB2/beta-2-syntrophin/actin cytoskeleton tethering. Upon exocytosis, calpain
  cleavage generates the CCF fragment which translocates to the nucleus and promotes
  STAT5-dependent transcription of insulin and granule biogenesis genes, coupling secretory
  activity to gene expression. The luminal RESP18 homology domain contributes to granule
  targeting and cargo condensation with proinsulin/insulin. PTPRN is also a major autoantigen
  (ICA512/IA-2) in type 1 diabetes.
