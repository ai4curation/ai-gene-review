  review:
    summary: >-
      ISS annotation based on ortholog transfer from rat PTPRN. Endosomal localization is
      part of the PTPRN recycling pathway after exocytosis. Consistent with IEA annotation
      for the same term.
    action: ACCEPT
    reason: >-
      UniProt records that after exocytosis, PTPRN is endocytosed and recycled to
      secretory vesicles via the Golgi apparatus (by similarity). The ISS annotation
      is appropriate for this transient localization during recycling.

- term:
    id: GO:0005794
    label: Golgi apparatus
  evidence_type: ISS
  original_reference_id: GO_REF:0000024
  review:
    summary: >-
      PTPRN transits through the Golgi during its biosynthetic pathway to secretory
      granules, and also passes through the Golgi during its recycling pathway after
      endocytosis. This localization is based on similarity to the rat ortholog.
    action: ACCEPT
    reason: >-
      PMID:8641276 showed ICA 512 recycles to the Golgi complex region and is sorted
      into newly formed secretory granules. The Golgi is part of both the biosynthetic
      and recycling pathways for PTPRN. The ISS annotation is reasonable.
    supported_by:
      - reference_id: PMID:8641276
        supporting_text: "ICA 512 is cleaved at its luminal domain and, following exposure at the cell surface, recycles to the Golgi complex region and is sorted into newly formed secretory granules"

- term:
    id: GO:0005886
    label: plasma membrane
  evidence_type: ISS
  original_reference_id: GO_REF:0000024
  review:
    summary: >-
      ISS annotation for plasma membrane localization, consistent with the IEA annotation.
      PTPRN is transiently found at the plasma membrane when secretory vesicles fuse with
      the cell membrane during exocytosis.
    action: ACCEPT
    reason: >-
      Plasma membrane localization is experimentally supported in the human protein
      (PMID:8641276) and by similarity to the rat ortholog. The transient plasma membrane
      insertion during exocytosis is a key step enabling calpain cleavage.
    supported_by:
      - reference_id: PMID:8641276
        supporting_text: "ICA 512 is cleaved at its luminal domain and, following exposure at the cell surface, recycles to the Golgi complex region and is sorted into newly formed secretory granules"

- term:
    id: GO:0008021
    label: synaptic vesicle
  evidence_type: ISS
  original_reference_id: GO_REF:0000024
  negated: true
  review:
    summary: >-
      This is a NOT annotation indicating that PTPRN is NOT found on synaptic vesicles.
      UniProt explicitly states PTPRN is detected on neuronal secretory vesicles but
      not on synaptic vesicles, which is an important distinction.
    action: ACCEPT
    reason: >-
      UniProt clearly states the protein is detected on neuronal secretory vesicles
      (dense-core vesicles) but NOT on synaptic vesicles (small clear vesicles). This
      negative annotation is important for distinguishing PTPRN localization from
      synaptic vesicle proteins. The distinction between dense-core and synaptic vesicles
      is biologically meaningful.

# --- IDA annotations (direct assay) ---
- term:
    id: GO:0005634
    label: nucleus
  evidence_type: IDA
  original_reference_id: PMID:15596545
  review:
    summary: >-
      PMID:15596545 demonstrated that the ICA512-CCF (cleaved cytosolic fragment)
      translocates to the nucleus after calpain cleavage. The CCF binds PIASy (E3-SUMO
      ligase) in the nucleus and upregulates insulin expression. Nuclear localization
      was directly demonstrated by immunofluorescence.
    action: ACCEPT
    reason: >-
      The nuclear localization of the CCF fragment is directly demonstrated in
      PMID:15596545. This is a core aspect of PTPRN biology, coupling exocytosis to
      transcriptional regulation. The IDA evidence is strong.
    supported_by:
      - reference_id: PMID:15596545
        supporting_text: "This cleavage occurs at the plasma membrane and generates an ICA512 cytosolic fragment that is targeted to the nucleus, where it binds the E3-SUMO ligase protein inhibitor of activated signal transducer and activator of transcription-y (PIASy) and up-regulates insulin expression"

- term:
    id: GO:0008134
    label: transcription factor binding
  evidence_type: IDA
  original_reference_id: PMID:16622421
  review:
    summary: >-
      PMID:16622421 demonstrated that the ICA512-CCF fragment binds to tyrosine-
      phosphorylated STAT5 and prevents its dephosphorylation, thereby enhancing
      transcription of secretory granule genes. The interaction with STAT5 (a
      transcription factor) was directly shown.
    action: ACCEPT
    reason: >-
      The CCF fragment directly binds phosphorylated STAT5B, which is a transcription
      factor. This interaction is central to the exocytosis-to-transcription coupling
      pathway. The binding was confirmed by direct assay (PMID:16622421) and further
      supported by PMID:15596545.
    supported_by:
      - reference_id: PMID:16622421
        supporting_text: "Here, we show that the cleaved cytosolic fragment of ICA512 enhances the transcription of secretory granule genes (including its own gene) by binding to tyrosine phosphorylated signal transducers and activators of transcription (STAT) 5 and preventing its dephosphorylation"

- term:
    id: GO:0044389
    label: ubiquitin-like protein ligase binding
  evidence_type: IDA
  original_reference_id: PMID:15596545
  review:
    summary: >-
      PMID:15596545 showed that ICA512-CCF binds the E3-SUMO ligase PIASy in the
      nucleus. PIASy is a ubiquitin-like protein ligase (SUMO E3 ligase). The
      interaction was directly demonstrated and is functionally relevant for
      modulating STAT5 activity via sumoylation.
    action: ACCEPT
    reason: >-
      The CCF fragment directly binds PIASy, an E3 SUMO ligase, in the nucleus
      (PMID:15596545). SUMO ligases are a type of ubiquitin-like protein ligase,
      making this annotation accurate. The interaction has functional consequences
      for ICA512-CCF sumoylation and STAT5 regulation (PMID:16622421).
    supported_by:
      - reference_id: PMID:15596545
        supporting_text: "generates an ICA512 cytosolic fragment that is targeted to the nucleus, where it binds the E3-SUMO ligase protein inhibitor of activated signal transducer and activator of transcription-y (PIASy)"

- term:
    id: GO:0045944
    label: positive regulation of transcription by RNA polymerase II
  evidence_type: IDA
  original_reference_id: PMID:15596545
  review:
    summary: >-
      PMID:15596545 demonstrated that nuclear ICA512-CCF upregulates insulin gene
      expression. This was further detailed in PMID:16622421 showing the mechanism
      involves STAT5 binding and prevention of its dephosphorylation.
    action: ACCEPT
    reason: >-
      The CCF fragment promotes transcription of insulin and other secretory granule
      genes via STAT5 pathway. This is experimentally demonstrated (PMID:15596545,
      PMID:16622421, PMID:18178618). While PTPRN itself is not a transcription factor,
      the CCF fragment acts as a transcriptional co-activator, making the positive
      regulation annotation appropriate.
    supported_by:
      - reference_id: PMID:15596545
        supporting_text: "generates an ICA512 cytosolic fragment that is targeted to the nucleus, where it binds the E3-SUMO ligase protein inhibitor of activated signal transducer and activator of transcription-y (PIASy) and up-regulates insulin expression"
      - reference_id: PMID:16622421
        supporting_text: "Here, we show that the cleaved cytosolic fragment of ICA512 enhances the transcription of secretory granule genes (including its own gene) by binding to tyrosine phosphorylated signal transducers and activators of transcription (STAT) 5 and preventing its dephosphorylation"

- term:
    id: GO:1904692
    label: positive regulation of type B pancreatic cell proliferation
  evidence_type: IDA
  original_reference_id: PMID:18178618
  review:
    summary: >-
      PMID:18178618 showed that ICA512 signaling enhances pancreatic beta-cell
      proliferation by regulating cyclins D through STATs. ICA512-CCF overexpression
      increased cyclin D1/D2 levels and INS-1 cell proliferation, while ICA512
      knockdown decreased proliferation.
    action: KEEP_AS_NON_CORE
    reason: >-
      While experimentally demonstrated, beta-cell proliferation regulation is a
      downstream consequence of the core STAT5 signaling pathway rather than a primary
      molecular function of PTPRN. The core function is secretory granule homeostasis
      and the exocytosis-to-transcription coupling. Beta-cell proliferation is a
      secondary/pleiotropic effect.
    supported_by:
      - reference_id: PMID:18178618
        supporting_text: "knockdown of ICA512 decreases cyclin D1 levels and proliferation of insulinoma INS-1 cells, whereas beta-cell regeneration is reduced in partially pancreatectomized ICA512-/- mice"

# --- More ISS annotations ---
- term:
    id: GO:0001553
    label: luteinization
  evidence_type: ISS
  original_reference_id: GO_REF:0000024
  review:
    summary: >-
      UniProt states that in females, PTPRN is required for normal accumulation and
      secretion of pituitary hormones including LH and FSH (by similarity). Luteinization
      is a downstream process involving these hormones. This is a pleiotropic effect
      of PTPRN's broader role in regulated neuroendocrine secretion.
    action: KEEP_AS_NON_CORE
    reason: >-
      While supported by similarity data from knockout mice, luteinization is a very
      distant downstream consequence of PTPRN's role in pituitary hormone secretion.
      It is not a direct molecular function but rather reflects the pleiotropic
      consequences of impaired secretory vesicle regulation in the pituitary. This is
      sex-specific (females only) and a secondary phenotype.

