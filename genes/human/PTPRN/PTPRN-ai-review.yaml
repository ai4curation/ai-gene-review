    reason: >-
      Dense-core secretory vesicles carrying PTPRN travel to axon terminals for
      regulated exocytosis. This is consistent with PTPRN's role in neuronal
      regulated secretion and with the axon localization annotation.

- term:
    id: GO:0045202
    label: synapse
  evidence_type: ISS
  original_reference_id: GO_REF:0000024
  review:
    summary: >-
      ISS annotation for synapse localization, consistent with IBA and IEA annotations.
      Based on ortholog transfer.
    action: ACCEPT
    reason: >-
      Duplicates IBA and IEA annotations from a different evidence source. Synapse
      localization is supported by similarity to the rat ortholog and is consistent
      with PTPRN's role in neuronal dense-core vesicle biology.

# --- IGI annotations ---
- term:
    id: GO:0030073
    label: insulin secretion
  evidence_type: IGI
  original_reference_id: PMID:24843546
  review:
    summary: >-
      PMID:24843546 studied SNX19, an IA-2 interacting protein, and showed that SNX19
      knockdown decreased insulin secretion and content. The connection to PTPRN is
      through the SNX19-IA-2 interaction that regulates dense core vesicle stability.
      The IGI evidence code reflects that the genetic interaction between SNX19 and
      IA-2 was used to infer this role.
    action: ACCEPT
    reason: >-
      PTPRN's role in insulin secretion is one of its best-established functions.
      PMID:24843546 provides genetic interaction data showing that the SNX19-IA-2
      axis regulates DCV number and insulin content.
    supported_by:
      - reference_id: PMID:24843546
        supporting_text: "Insulin secretion and content were decreased in stable SNX19KD MIN6 cells compared with those in control MIN6 cells"

- term:
    id: GO:1990502
    label: dense core granule maturation
  evidence_type: IGI
  original_reference_id: PMID:24843546
  review:
    summary: >-
      PMID:24843546 showed that the SNX19-IA-2 interaction is required for normal
      accumulation of dense core vesicles. SNX19 knockdown decreased DCV number by
      approximately 75% and DCV size by approximately 40%, and decreased DCV half-life.
      PTPRN is required for preventing DCV degradation.
    action: ACCEPT
    reason: >-
      Dense core granule maturation and stabilization is a core function of PTPRN.
      PMID:24843546 shows that disruption of the SNX19-IA-2 axis drastically reduces
      DCV number and increases lysosomal degradation.
    supported_by:
      - reference_id: PMID:24843546
        supporting_text: "We show here that SNX19 regulates the DCV number and insulin content by modulating the half‐life of DCV in pancreatic β‐cells"
      - reference_id: PMID:24843546
        supporting_text: "DCV number in SNX19KD cells was decreased by approximately 75% and that DCV size was decreased by approximately 40%"

# --- IPI spectrin binding ---
- term:
    id: GO:0030507
    label: spectrin binding
  evidence_type: IPI
  original_reference_id: PMID:11086001
  review:
    summary: >-
      PMID:11086001 identified betaIV spectrin (SPTBN4) as an interactor of ICA512/PTPRN
      using yeast two-hybrid screening. betaIV spectrin is a novel spectrin expressed in
      brain and pancreatic islets, localized at axon initial segments and nodes of Ranvier.
      The interaction was confirmed and provides a link between PTPRN and the cytoskeletal
      network.
    action: ACCEPT
    reason: >-
      The interaction with betaIV spectrin was directly demonstrated by yeast two-hybrid
      and confirmed. UniProt lists SPTBN4 (Q9H254) as an interactor with 2 experiments
      in IntAct. This is a specific and informative molecular function annotation that
      is preferred over generic protein binding.
    supported_by:
      - reference_id: PMID:11086001
        supporting_text: "We report the identification of betaIV spectrin, a novel spectrin isolated as an interactor of the receptor tyrosine phosphatase-like protein ICA512"

# --- IDA response to ROS ---
- term:
    id: GO:0000302
    label: response to reactive oxygen species
  evidence_type: IDA
  original_reference_id: PMID:18048354
  review:
    summary: >-
      PMID:18048354 solved the crystal structure of the mature ectodomain of IA-2 and
      discovered that the ectodomain is self-proteolyzed in vitro by reactive oxygen
      species. The authors suggest this could represent a shedding mechanism. However,
      this is an in vitro observation and the physiological relevance is uncertain.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      The observation that meIA-2 is cleaved by ROS in vitro (PMID:18048354) is
      interesting but represents an in vitro structural observation rather than a
      demonstrated biological response. The authors themselves only suggest the
      possibility of physiological relevance. There is no evidence that PTPRN
      mediates a cellular response to ROS in vivo. This appears to be an
      over-annotation extrapolating from an in vitro structural observation.
    supported_by:
      - reference_id: PMID:18048354
        supporting_text: "we discovered that meIA-2 is self-proteolyzed in vitro by reactive oxygen species, suggesting the possibility of a new shedding mechanism that might be significant in normal function or pathological processes"

# --- NEW annotations ---
- term:
    id: GO:0060090
    label: molecular adaptor activity
  evidence_type: IDA
  original_reference_id: PMID:16622421
  review:
    summary: >-
      PTPRN functions as a molecular adaptor, bringing together multiple signaling
      components. The CCF fragment bridges phospho-STAT5B and PIASy in the nucleus.
      The TMF fragment connects secretory granules to the cortical actin cytoskeleton
      via SNTB2/beta-2-syntrophin. These adaptor activities are central to PTPRN function
      (file:human/PTPRN/PTPRN-deep-research-falcon.md).
    action: NEW
    reason: >-
      PTPRN is a catalytically inactive pseudophosphatase whose primary molecular
      function is as a molecular adaptor. The CCF fragment bridges phospho-STAT5B and
      PIASy, while the TMF fragment links granules to cytoskeleton via SNTB2. This
      adaptor activity is the most informative MF annotation for a pseudophosphatase
      that functions through protein-protein interactions.
    supported_by:
      - reference_id: PMID:16622421
        supporting_text: "Here, we show that the cleaved cytosolic fragment of ICA512 enhances the transcription of secretory granule genes (including its own gene) by binding to tyrosine phosphorylated signal transducers and activators of transcription (STAT) 5 and preventing its dephosphorylation"
      - reference_id: PMID:11483505
        supporting_text: "Binding of its cytoplasmic tail to beta2-syntrophin suggests that ICA512 connects secretory granules to the utrophin complex and the actin cytoskeleton"

- term:
    id: GO:0033366
    label: protein localization to secretory granule
  evidence_type: IDA
  original_reference_id: PMID:25561468
  review:
    summary: >-
      The RESP18 homology domain of PTPRN is sufficient for targeting proICA512 to
      secretory granules. Ectodomain dimerization and beta4-sheet integrity are
      required for ER exit and granule targeting (PMID:25561468).
    action: NEW
    reason: >-
      PTPRN actively participates in its own targeting to secretory granules via the
      RESP18 homology domain. This is a core biological process not captured by existing
      annotations which only note localization TO granules, not the targeting mechanism.
    supported_by:
      - reference_id: PMID:25561468
        supporting_text: "The signal for SG sorting is located within the NTF RESP18 homology domain (RESP18-HD), whereas soluble NTF is retained in the endoplasmic reticulum"

