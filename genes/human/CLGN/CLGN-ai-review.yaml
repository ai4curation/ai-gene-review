gene_symbol: CLGN
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: Calmegin (CLGN) is a testis-specific, type I single-pass integral membrane
  lectin-type molecular chaperone of the endoplasmic reticulum that is homologous to
  calnexin and belongs to the calreticulin/calnexin family. Its luminal domain contains
  a globular concanavalin A-like lectin fold and the extended proline-rich P domain
  characteristic of calnexin/calreticulin, and it binds calcium ions. Expressed during
  spermatogenesis in male germ cells, calmegin binds nascent polypeptides and assists
  the folding and assembly of a range of client proteins required for sperm function,
  most notably the ADAM-family sperm surface proteins fertilin (ADAM1/ADAM2) and ADAM3,
  whose maturation and heterodimerization depend on it. It forms a germ-cell ER chaperone
  complex with the testis-specific protein disulfide isomerase-like protein PDILT and
  also interacts with the peptidyl-prolyl isomerase cyclophilin B (PPIB), paralleling
  the calnexin/ERp57 system. Through chaperoning these clients, calmegin is essential
  for sperm adhesion to and penetration of the egg zona pellucida and for sperm migration
  from the uterus into the oviduct; loss of function causes male infertility in mice.
