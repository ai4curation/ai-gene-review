proposed_new_terms: []
suggested_questions:
- Does human calmegin chaperone the same ADAM-family clients (ADAM1/ADAM2/ADAM3) as
  mouse calmegin, given that human ADAM3 is a pseudogene?
- What is the full client repertoire of calmegin beyond the ADAM proteins, and how
  does it partition clients with ubiquitous calnexin in germ cells?
suggested_experiments:
- Affinity capture / proximity labeling (e.g. BioID) of calmegin in human or mouse
  spermatogenic cells to define its in vivo client interactome.
- Reconstitution assays testing whether calmegin, in complex with PDILT, supports
  oxidative folding of ADAM substrates analogous to the calnexin/ERp57 system.
- Lectin-binding assays to confirm whether calmegin retains the monoglucosylated N-glycan
  binding activity characteristic of calnexin/calreticulin lectin chaperones.
