core_functions:
- description: >-
    Central scaffold and dimerization subunit of the FANCB-FANCL-FAAP100 (BL100) catalytic
    module of the Fanconi anemia core complex. FANCB bridges and dimerizes two BL100
    heterotrimers, templating assembly of the symmetric core complex and stimulating the
    FANCL RING E3 ligase to monoubiquitinate the FANCD2-FANCI complex during replication-coupled
    interstrand crosslink repair.
  supported_by:
  - reference_id: PMID:27986592
    supporting_text: leaving the FANCB subunit as the sole candidate for the dimerization element of the BL100 complex
  - reference_id: PMID:27986592
    supporting_text: its mono-ubiquitination function is stimulated by 6-fold in the presence of FANCB and FAAP100
  - reference_id: PMID:31666700
    supporting_text: deletion of FANCB, FANCL or FAAP100, that comprise the catalytic module and the structural scaffold for the complex
  molecular_function:
    id: GO:0030674
    label: protein-macromolecule adaptor activity
  directly_involved_in:
  - id: GO:0036297
    label: interstrand cross-link repair
  locations:
  - id: GO:0005654
    label: nucleoplasm
  in_complex:
    id: GO:0043240
    label: Fanconi anaemia nuclear complex
proposed_new_terms: []
suggested_questions:
- question: >-
    Does FANCB self-associate to form the dimerization interface directly, or is the
    "dimer of trimers" bridged through FANCB-FAAP100 contacts (isolated FANCB self-association
    has not been demonstrated)?
- question: >-
    How does hemizygous/X-inactivation dosage of the single active FANCB allele set the
    threshold for FA core complex assembly and FANCD2 monoubiquitination?
suggested_experiments:
- description: >-
    Structure-guided mutagenesis of the FANCB dimerization interface to test whether disrupting
    BL100 dimerization abolishes FANCD2-FANCI monoubiquitination while preserving individual
    subunit stability.
- description: >-
    Quantitative reconstitution of FANCL ubiquitin-ligase activity with and without FANCB to
    dissect its architectural (adaptor) versus allosteric stimulation of catalysis.
