- term:
    id: GO:0043240
    label: Fanconi anaemia nuclear complex
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: part_of
  review:
    summary: FANCB is a core structural subunit of the Fanconi anemia nuclear (core) complex.
    action: ACCEPT
    reason: >-
      This is the defining, best-supported complex-membership annotation for FANCB and is
      corroborated experimentally (IDA, NAS below) and structurally. FANCB is one of the eight
      stably associated subunits of the FA core complex and, with FANCL and FAAP100, forms its
      central catalytic module.
    supported_by:
    - reference_id: PMID:15502827
      supporting_text: essential component of the nuclear protein
    - reference_id: PMID:31666700
      supporting_text: A dimer of FANCB-FAAP100 heterodimers is located in the middle region of the structure
- term:
    id: GO:1905168
    label: positive regulation of double-strand break repair via homologous recombination
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: involved_in
  review:
    summary: >-
      Phylogenetic (IBA) inference that the FA pathway promotes homologous-recombination
      repair of double-strand breaks.
    action: KEEP_AS_NON_CORE
    reason: >-
      Promotion of HR is a genuine but downstream, pathway-level consequence of FA-core-complex
      activity rather than FANCB's direct molecular function. FANCB's core role is architectural
      scaffolding of the BL100 module that enables FANCD2-FANCI monoubiquitination; effects on
      HR are indirect and shared across FA proteins. Retained as non-core.
- term:
    id: GO:1990414
    label: replication-born double-strand break repair via sister chromatid exchange
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: involved_in
  review:
    summary: >-
      Phylogenetic (IBA) inference linking FANCB to repair of replication-associated
      double-strand breaks via sister-chromatid exchange.
    action: KEEP_AS_NON_CORE
    reason: >-
      The FA core complex modulates sister-chromatid-exchange outcomes at stalled/blocked
      replication forks, but this is a downstream pathway-level role rather than FANCB's
      direct scaffolding activity. Retained as non-core.
    supported_by:
    - reference_id: PMID:20347428
      supporting_text: FANCM-MHF associates with the Fanconi anemia (FA) core complex
- term:
    id: GO:2000042
    label: negative regulation of double-strand break repair via homologous recombination
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: involved_in
  review:
    summary: >-
      Phylogenetic (IBA) inference that the FA pathway also restrains homologous recombination.
    action: KEEP_AS_NON_CORE
    reason: >-
      The FA pathway both promotes and limits HR/crossover outcomes (fork protection, suppression
      of aberrant recombination and sister-chromatid exchange). This regulatory role is downstream
      and pathway-level, not FANCB's direct molecular function. Retained as non-core.
