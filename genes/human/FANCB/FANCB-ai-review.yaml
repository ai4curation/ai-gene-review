id: Q8NB91
gene_symbol: FANCB
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  Fanconi anemia group B protein (FANCB, also FAAP95) is a non-catalytic subunit of the
  Fanconi anemia (FA) core complex, a nuclear multisubunit ubiquitin ligase that, in
  response to DNA replication stress and interstrand crosslinks (ICLs), monoubiquitinates
  the FANCD2-FANCI (ID2) heterodimer to activate the FA/BRCA DNA repair pathway. FANCB
  assembles with the RING E3 ligase FANCL and with FAAP100 into the FANCB-FANCL-FAAP100
  (BL100) catalytic module, where it serves as the central scaffold and dimerization
  factor: two BL100 heterotrimers associate through FANCB to form the symmetric
  "dimer of trimers" that gives the core complex its architecture and positions the two
  FANCL RING domains to ubiquitinate FANCD2 and FANCI. FANCB is required for the
  stability and coordinated nuclear import of the module (chaperoned by FANCA and FANCM)
  and for chromatin loading of the complex at sites of damage; in its absence FANCD2
  monoubiquitination fails. The gene is X-linked (Xp22.31) and subject to X-inactivation,
  so a single active copy is functional, making FANCB a dosage-sensitive node whose loss
  causes Fanconi anemia complementation group B, frequently a severe VACTERL-with-hydrocephalus
  phenotype, with cellular hypersensitivity to crosslinking agents and chromosomal
  instability.
