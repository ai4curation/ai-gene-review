- term:
    id: GO:0005515
    label: protein binding
  evidence_type: IPI
  original_reference_id: PMID:17396147
  qualifier: enables
  review:
    summary: >-
      Binary interaction evidence (with FAAP100, Q0VG06). "Protein binding" is uninformative;
      the underlying, well-supported molecular function is a protein-macromolecule adaptor /
      scaffold activity.
    action: MODIFY
    reason: >-
      The IPI captures the direct FANCB-FAAP100 interaction, but GO:0005515 conveys no specific
      function. Structural and biochemical work shows FANCB is the dimerization/scaffold factor
      that bridges FANCL and FAAP100 into the BL100 module and templates core-complex assembly,
      stimulating FANCL ligase activity. This is best represented as protein-macromolecule
      adaptor activity (GO:0030674).
    proposed_replacement_terms:
    - id: GO:0030674
      label: protein-macromolecule adaptor activity
    supported_by:
    - reference_id: PMID:17396147
      supporting_text: directly interacts with FANCB and FANCL to form a stable subcomplex
    - reference_id: PMID:27986592
      supporting_text: FANCB plays a key structural function, being the dimerization factor
