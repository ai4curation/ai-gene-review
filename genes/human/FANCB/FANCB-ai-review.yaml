- term:
    id: GO:0005829
    label: cytosol
  evidence_type: TAS
  original_reference_id: Reactome:R-HSA-9835411
  qualifier: located_in
  review:
    summary: >-
      A cytosolic pool of FANCB exists as the assembled BL100 module prior to chaperoned
      nuclear import (and in the FA-core-complex:HSP70 assembly implicated in PKR signaling).
    action: ACCEPT
    reason: >-
      The BL100 (L-B-P100) module is the major cytosolic form of FANCL/FANCB/FAAP100 and moves
