- term:
    id: GO:0043169
    label: cation binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: InterPro-based electronic annotation (alpha-amylase/branching_C domain,
      IPR006048) to cation binding. This is a generic prediction inherited from the
      broader alpha-amylase family, many members of which bind Ca2+/Cl-. There is
      no evidence that human GBE1 requires or binds a catalytic cation; the crystal
      structures and UniProt record describe no bound metal or cation-binding site,
      and the catalytic mechanism uses the conserved Asp357-Glu412-Asp481 triad without
      a metal cofactor.
    action: REMOVE
    reason: The cation binding term is an over-propagated electronic inference from
      the alpha-amylase family signature. Human GBE1 has three high-resolution structures
      (PDB 4BZY, 5CLT, 5CLW) and detailed mechanistic analysis with no cation-binding
      site or metal-dependent activity reported, and UniProt annotates no cofactor;
      the term is therefore likely incorrect for this protein.
    supported_by:
    - reference_id: PMID:26199317
      supporting_text: this constellation of three acidic residues functions as the
        nucleophile (Asp357, hGBE1 numbering hereinafter), proton donor (Glu412) and
        transition state stabilizer (Asp481) in the active site
