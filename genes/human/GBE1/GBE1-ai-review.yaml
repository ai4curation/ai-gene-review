- term:
    id: GO:0070062
    label: extracellular exosome
  evidence_type: HDA
  original_reference_id: PMID:23533145
  qualifier: located_in
  review:
    summary: High-throughput mass-spectrometry (HDA) detection of GBE1 in exosomes
      isolated from expressed prostatic secretions in urine. GBE1 is a soluble cytosolic
      glycogen-metabolizing enzyme; its detection in a large proteomic catalog of
      exosomes reflects the well-known tendency of abundant cytosolic proteins to
      appear in exosome/EV proteomes and does not indicate a functional extracellular
      localization.
    action: MARK_AS_OVER_ANNOTATED
    reason: This is a bulk-proteomics localization that conflicts with the strong,
      consistent cytosolic assignment of GBE1 from structure, Reactome, and orthology.
      It is retained as an over-annotation (common contaminant signal in exosome proteomes)
      rather than a core or functional cellular component.
    supported_by:
    - reference_id: PMID:23533145
      supporting_text: In-depth proteomic analyses of exosomes isolated from expressed
        prostatic secretions in urine.
