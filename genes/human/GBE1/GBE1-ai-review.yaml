- term:
    id: GO:0004553
    label: hydrolase activity, hydrolyzing O-glycosyl compounds
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: InterPro-based electronic annotation (Glyco_hydro_13_N domain, IPR004193)
      to O-glycosyl hydrolase activity. GBE1 belongs to the GH13 glycosyl hydrolase
      family and its reaction begins with an amylase-type hydrolytic cleavage of an
      alpha-1,4 glucan chain, but the biologically meaningful function is the coupled
      branching (transglucosylation) reaction, captured by GO:0003844. Standalone
      hydrolase annotation over-represents a partial mechanistic step.
    action: MARK_AS_OVER_ANNOTATED
    reason: The GH13 domain match legitimately confers a hydrolase-family signature,
      and GBE1 does perform an amylase-type hydrolytic cleavage as the first half-reaction;
      however, GBE1 is not a hydrolase in its physiological role (it transfers, rather
      than releases, the cleaved segment), so this domain-derived term over-annotates
      a mechanistic detail rather than the true molecular function.
    supported_by:
    - reference_id: PMID:26199317
      supporting_text: In the first reaction (amylase-type hydrolysis), GBE cleaves
        every 8–14 glucose residues of a glucan chain, an α-1,4-linked segment of
        more than six glucose units from the non-reducing end. In the second reaction
        (transglucosylation), it transfers the cleaved oligosaccharide (‘donor’),
        via an α-1,6-glucosidic linkage, to the C6 hydroxyl group of a glucose unit
