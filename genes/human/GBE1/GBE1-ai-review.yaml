id: Q04446
gene_symbol: GBE1
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: GBE1 is the human glycogen (1,4-alpha-glucan) branching enzyme (EC 2.4.1.18),
  a monomeric, cytosolic glycosyl hydrolase family 13 (GH13, GlgB subfamily) enzyme
  that acts in glycogen synthesis together with glycogenin and glycogen synthase.
  During glycogen biosynthesis it cleaves a segment of roughly six to seven glucose
  residues from the non-reducing end of a growing alpha-1,4-linked glucan chain and
  re-attaches it through an alpha-1,6-glucosidic linkage to an internal glucose, thereby
  introducing the branch points that define the compact, globular architecture of
  glycogen. Branching increases the solubility of the glycogen polymer and multiplies
  the number of non-reducing ends available to glycogen synthase and glycogen phosphorylase,
  regulating both the rate of synthesis and the accessibility of stored glucose. Loss
  of GBE1 activity causes the accumulation of a poorly branched, amylopectin-like polyglucosan.
  Recessive GBE1 deficiency causes glycogen storage disease type IV (GSD IV, Andersen
  disease), whose classic infantile hepatic form progresses to lethal cirrhosis, with
  additional neuromuscular subtypes; the milder late-onset adult polyglucosan body
  disease (APBD) presents after the fourth decade with neurogenic bladder, spastic
  paraparesis, and peripheral neuropathy.
