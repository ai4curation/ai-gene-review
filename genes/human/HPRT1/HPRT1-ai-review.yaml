id: P00492
gene_symbol: HPRT1
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: Cytosolic hypoxanthine-guanine phosphoribosyltransferase (HGPRT; EC 2.4.2.8),
  the central enzyme of the purine salvage pathway. It transfers the 5-phosphoribosyl
  group from 5-phospho-alpha-D-ribose 1-diphosphate (PRPP) onto a 6-oxopurine base,
  converting hypoxanthine to inosine monophosphate (IMP) and guanine to guanosine
  monophosphate (GMP), thereby recycling free purine bases into nucleotides and sparing
  the energetically costly de novo purine biosynthesis pathway. The catalytic reaction
  requires magnesium (two Mg2+ ions per subunit, bound largely via the substrate) and the
  active enzyme is a homotetramer. HPRT1 is expressed broadly with highest relative
  activity in the basal ganglia. Complete loss of HPRT activity causes Lesch-Nyhan
  syndrome (hyperuricemia with severe neurological dysfunction including dystonia,
  choreoathetosis, intellectual disability and compulsive self-injurious behavior);
  partial deficiency causes HPRT-related hyperuricemia/gout (Kelley-Seegmiller syndrome).
