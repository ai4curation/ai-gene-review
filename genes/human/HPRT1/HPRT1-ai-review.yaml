- term:
    id: GO:0045964
    label: positive regulation of dopamine metabolic process
  evidence_type: IMP
  original_reference_id: PMID:8643611
  qualifier: involved_in
  review:
    summary: The cited study reports markedly reduced striatal dopamine transporters in
      Lesch-Nyhan disease patients. This reflects a downstream neurochemical consequence
      of complete HPRT deficiency, not a direct molecular role of HPRT1 in regulating
      dopamine metabolism.
    action: MARK_AS_OVER_ANNOTATED
    reason: HPRT1 is a purine salvage enzyme with no known direct activity on dopamine
      metabolism. The dopaminergic deficit observed in LND is a distal, poorly understood
      consequence of the metabolic/developmental derangement caused by HPRT loss; inferring
      positive regulation of dopamine metabolic process as an HPRT1 function over-interprets
      a disease-phenotype association. Retained (experimental IMP) but flagged as
      over-annotated rather than a core function.
    supported_by:
    - reference_id: PMID:8643611
      supporting_text: a 50-63% reduction of the binding to DA transporters in the caudate,
        and a 64-75% reduction in the putamen of the LND patients was observed compared to
        the normal control group
