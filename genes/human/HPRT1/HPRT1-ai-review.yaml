- term:
    id: GO:0044209
    label: AMP salvage
  evidence_type: IEA
  original_reference_id: GO_REF:0000107
  qualifier: involved_in
  review:
    summary: Electronic assertion of AMP salvage transferred from the mouse ortholog. HPRT
      does not act on adenine/AMP; adenine salvage is performed by APRT, not HPRT1.
    action: REMOVE
    reason: This is an incorrect over-propagated electronic inference. HPRT1 salvages the
      6-oxopurines hypoxanthine and guanine (forming IMP and GMP); it has no activity on
      adenine and does not directly participate in AMP salvage, which is catalyzed by
      adenine phosphoribosyltransferase (APRT). The UniProt catalytic activities and
      substrate specificity (Lys165 confers specificity for guanine and hypoxanthine over
      adenine) contradict an AMP salvage role.
    supported_by:
    - reference_id: PMID:8044844
      supporting_text: Lys-165, which forms a hydrogen bond to O6 of GMP, appears to be
        critical for determining the specificity for guanine and hypoxanthine over adenine.
    - reference_id: PMID:9521733
      supporting_text: catalyzes the reversible formation of IMP and GMP from their respective
        bases hypoxanthine (Hx) and guanine (Gua)
