- term:
    id: GO:0005980
    label: glycogen catabolic process
  evidence_type: IDA
  original_reference_id: PMID:38548794
  qualifier: involved_in
  review:
    summary: ComplexPortal IDA annotation to glycogen catabolic process. As a subunit
      of phosphorylase kinase, PHKB participates in the activation of glycogen
      phosphorylase and thereby in glycogen breakdown. The cryo-EM study shows the
      beta subunit both scaffolds the complex and, via its ADP-binding pocket,
      allosterically enhances PhK activity. This is the core biological process for
      the gene.
    action: ACCEPT
    reason: PHKB is a regulatory subunit of the kinase that triggers glycogenolysis;
      glycogen catabolic process accurately and specifically captures its core
      biological role. The beta subunit contributes to the process not only
      structurally but through an allosteric ADP-binding pocket that enhances activity.
    supported_by:
      - reference_id: PMID:38548794
        supporting_text: "We also reveal an ADP-binding pocket in the β-subunit, which plays a"
      - reference_id: PMID:25051373
        supporting_text: "Glycogen phosphorylase kinase (PHK) is a serine/threonine-specific protein kinase that phosphorylates a serine residue in glycogen phosphorylase (PYG)"
