id: Q93100
gene_symbol: PHKB
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  PHKB encodes the beta regulatory subunit of phosphorylase kinase (PhK), a large
  ~1.3 MDa (alpha-beta-gamma-delta)4 hexadecameric enzyme complex that controls
  glycogenolysis. Within the holoenzyme the gamma subunit (PHKG1 in muscle, PHKG2
  in liver) is the catalytic Ser/Thr protein kinase, the alpha (PHKA1/PHKA2) and
  beta (PHKB) subunits are large non-catalytic regulatory subunits, and the delta
  subunit is calmodulin. PHKB is a shared component of both the muscle and liver
  holoenzymes. It forms a central beta4 scaffold that connects the four
  alpha-beta-gamma-delta modules and possesses a glucoamylase-like fold that lacks
  detectable enzyme activity. PHKB is a target of cAMP-dependent protein kinase
  (PKA); phosphorylation of the alpha and beta subunits, together with Ca2+ sensing
  by the delta (calmodulin) subunit, relieves autoinhibition of the catalytic gamma
  subunit, allowing PhK to phosphorylate glycogen phosphorylase (converting it from
  the b to the a form) and thereby trigger glycogen breakdown. PhK is a cytosolic
  enzyme. Loss-of-function mutations in PHKB cause glycogen storage disease type IXb
  (combined liver and muscle phosphorylase kinase deficiency, autosomal recessive,
  generally mild).
