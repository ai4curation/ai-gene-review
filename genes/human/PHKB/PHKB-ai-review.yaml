- term:
    id: GO:0005977
    label: glycogen metabolic process
  evidence_type: TAS
  original_reference_id: PMID:9402963
  qualifier: involved_in
  review:
    summary: TAS annotation to glycogen metabolic process, from a study identifying a
      PHKB missense mutation (plus a splice-site mutation) causing phosphorylase
      kinase-deficient liver glycogenosis. Loss of PHKB function impairs glycogen
      breakdown, confirming PHKB's role in glycogen metabolism.
    action: ACCEPT
    reason: Human genetic evidence (PHKB mutations causing phosphorylase kinase
      deficiency / liver glycogenosis) directly supports involvement in glycogen
      metabolism. Consistent with the IEA annotation to the same term.
    supported_by:
      - reference_id: PMID:9402963
        supporting_text: "liver glycogenosis caused by Phk deficiency"
- term:
    id: GO:0006091
    label: generation of precursor metabolites and energy
  evidence_type: TAS
  original_reference_id: PMID:9402963
  qualifier: involved_in
  review:
    summary: TAS annotation to generation of precursor metabolites and energy. This
      is a broad parent process; glycogenolysis driven by phosphorylase kinase does
      mobilize glucose (glucose-1-phosphate) for energy, but the term is much less
      specific than the glycogen catabolic / glycogen metabolic annotations and does
      not describe the distinctive function of PHKB.
    action: KEEP_AS_NON_CORE
    reason: The term is not wrong - glycogen breakdown ultimately supplies glucose for
      energy production - but it is high-level and generic. The specific glycogen
      catabolic/metabolic annotations better capture PHKB's role, so this broad energy
      term is retained as non-core.
    supported_by:
      - reference_id: PMID:9402963
        supporting_text: "liver glycogenosis caused by Phk deficiency"
