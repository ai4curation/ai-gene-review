  review:
    summary: PHKB is the beta subunit of phosphorylase kinase, so it is a constituent
      of the phosphorylase kinase complex. This phylogenetic (IBA) assignment is
      accurate and represents a core cellular-component annotation.
    action: ACCEPT
    reason: PHKB is definitionally a subunit of the (alpha-beta-gamma-delta)4 phosphorylase
      kinase holoenzyme. The IBA propagation is consistent with UniProt SUBUNIT and
      with cryo-EM of the human muscle complex.
    supported_by:
      - reference_id: file:human/PHKB/PHKB-uniprot.txt
        supporting_text: "are regulatory subunits, gamma (PHKG1 or PHKG2) is the catalytic"
      - reference_id: PMID:38548794
        supporting_text: "wherein four αβγδ modules are connected by the central β4 scaffold"
- term:
    id: GO:0005516
    label: calmodulin binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: InterPro-based (IEA) calmodulin-binding annotation. UniProt annotates
      three predicted calmodulin-binding regions in PHKB (aa 7-29, 768-795, 920-951;
      ECO:0000255) and carries the Calmodulin-binding keyword. This is plausible but
      is a secondary/inferred activity - the primary calmodulin (delta) subunit of
      PhK binds the catalytic gamma subunit, not PHKB.
    action: KEEP_AS_NON_CORE
    reason: The calmodulin-binding regions of PHKB are computationally predicted
      (ECO:0000255) rather than experimentally demonstrated, and calmodulin sensing
      in PhK is chiefly mediated by the integral delta (calmodulin) subunit acting on
      the gamma subunit. Retain as a plausible non-core molecular function of the
      regulatory beta subunit rather than as its defining function.
    supported_by:
      - reference_id: file:human/PHKB/PHKB-uniprot.txt
        supporting_text: 'note="Calmodulin-binding"'
- term:
    id: GO:0005886
    label: plasma membrane
  evidence_type: IEA
  original_reference_id: GO_REF:0000044
  qualifier: located_in
  review:
    summary: UniProtKB-SubCell IEA mapping to plasma membrane, derived from the
      UniProt "Cell membrane; Lipid-anchor; Cytoplasmic side" location. That location
      is itself an ECO:0000305 inference based on predicted C-terminal farnesylation
      (by similarity to rabbit PHKB), not on direct human evidence. Phosphorylase
      kinase is otherwise well established as a cytosolic enzyme.
    action: KEEP_AS_NON_CORE
    reason: The plasma-membrane assignment rests on an inferred lipid anchor
      (farnesylation of the C-terminal cysteine, by similarity), and UniProt itself
      notes uncertainty about the C-terminal processing. The functionally dominant
      localization of the PhK holoenzyme is cytosolic (see the Reactome-based cytosol
      annotations). Keep as a weak, non-core membrane-association annotation.
    supported_by:
      - reference_id: file:human/PHKB/PHKB-uniprot.txt
        supporting_text: "Cell membrane {ECO:0000305}; Lipid-anchor"
- term:
    id: GO:0005975
    label: carbohydrate metabolic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: involved_in
  review:
    summary: InterPro-based (IEA) annotation to the broad parent term carbohydrate
      metabolic process. PHKB is a regulatory subunit of phosphorylase kinase, whose
      specific role is the control of glycogen breakdown; a more precise glycogen
      catabolic / glycogen metabolic term better captures its biology.
    action: MODIFY
    reason: The term is correct but too general. PHKB acts specifically in glycogen
      catabolism via the phosphorylase kinase complex; the more specific glycogen
      metabolic / glycogen catabolic process terms (already present as other
      annotations) are preferable.
    proposed_replacement_terms:
      - id: GO:0005980
        label: glycogen catabolic process
      - id: GO:0005977
        label: glycogen metabolic process
    supported_by:
      - reference_id: file:human/PHKB/PHKB-uniprot.txt
        supporting_text: "Glycan biosynthesis; glycogen metabolism."
- term:
    id: GO:0005977
    label: glycogen metabolic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: involved_in
  review:
    summary: IEA annotation (InterPro + UniPathway) to glycogen metabolic process.
      This accurately reflects PHKB's biological role as a regulatory subunit of the
      phosphorylase kinase complex that controls glycogen breakdown, and matches the
