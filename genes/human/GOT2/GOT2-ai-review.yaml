suggested_questions:
- question: >-
    How is GOT2 partitioned between its mitochondrial-matrix transaminase pool and the
    plasma-membrane FABPpm pool, and what signals (beyond ethanol) control the translocation?
- question: >-
    What is the quantitative contribution of GOT2's kynurenine aminotransferase (KAT4) activity
    to kynurenic acid production relative to the other human KATs in different tissues?
suggested_experiments:
- description: >-
    Isoform-/pool-resolved metabolic-flux analysis (13C tracing) in GOT2-knockout versus
    wild-type human cells to quantify its contribution to the malate-aspartate shuttle, NAD(H)
    redox balance and de novo serine biosynthesis.
- description: >-
    Structure-guided separation-of-function mutants that disrupt the long-chain-fatty-acid
    binding site without affecting transaminase activity, to test whether the FABPpm
    fatty-acid-uptake role is genuinely independent of catalysis.
