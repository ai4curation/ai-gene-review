id: P00505
gene_symbol: GOT2
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  GOT2 encodes the mitochondrial aspartate aminotransferase (mAspAT / mAST / GOT), a
  homodimeric, pyridoxal-5'-phosphate (PLP)-dependent class-I aminotransferase located in
  the mitochondrial matrix. Its principal reaction is the reversible transfer of the amino
  group between L-aspartate and 2-oxoglutarate to form oxaloacetate and L-glutamate
  (EC 2.6.1.1). PLP is bound covalently as a Schiff base to the active-site lysine (Lys-279
  in the precursor numbering). GOT2 is the mitochondrial transaminase arm of the
  malate-aspartate shuttle, which transfers reducing equivalents (NADH) from the cytosol
  into mitochondria and maintains the intracellular NAD(H) redox balance; through the
  interconversion of aspartate, glutamate, oxaloacetate and 2-oxoglutarate it links amino-acid
  metabolism to the tricarboxylic acid cycle and to metabolite exchange between mitochondria
  and cytosol. Loss of GOT2 function causes an autosomal-recessive, treatable
  malate-aspartate-shuttle-related developmental and epileptic encephalopathy (DEE82), with
  impaired de novo serine biosynthesis. Beyond its core transaminase role, GOT2 is a
  moonlighting protein: as a plasma-membrane-associated fatty-acid-binding protein (FABPpm) it
  mediates cellular uptake of long-chain free fatty acids, and it possesses kynurenine
  aminotransferase activity (KAT4/KYAT4, EC 2.6.1.7), transaminating L-kynurenine to
  kynurenic acid. The cytosolic paralog is encoded by the separate gene GOT1. Serum
  mitochondrial-AST activity is used clinically as a marker of tissue (liver, heart) injury.
