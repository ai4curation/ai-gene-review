core_functions:
- description: >-
    Mitochondrial aspartate aminotransferase activity: reversible, PLP-dependent transfer of
    the amino group between L-aspartate and 2-oxoglutarate to form oxaloacetate and L-glutamate
    (EC 2.6.1.1), the defining reaction of GOT2. In the mitochondrial matrix this provides the
    mitochondrial transaminase step of the malate-aspartate shuttle and interconverts key amino
