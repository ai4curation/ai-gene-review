core_functions:
- description: ARF1 functions as a guanine-nucleotide-regulated membrane-trafficking switch at Golgi and TGN membranes. In its GTP-bound state it recruits coat/adaptor and lipid-metabolism effectors, including machinery for COPI-dependent Golgi-to-ER and intra-Golgi trafficking; GTP hydrolysis stimulated by ARFGAPs and coatomer promotes coat disassembly and recycling of the trafficking machinery. ARF1 is therefore best represented as a regulatory small GTPase in vesicle-mediated intracellular transport, not as a structural COPI coat subunit.
  molecular_function:
    id: GO:0003924
    label: GTPase activity
  directly_involved_in:
  - id: GO:0006886
    label: intracellular protein transport
  - id: GO:0006890
    label: retrograde vesicle-mediated transport, Golgi to endoplasmic reticulum
  - id: GO:1903292
    label: protein localization to Golgi membrane
  locations:
  - id: GO:0000139
    label: Golgi membrane
  - id: GO:0160281
    label: cytoplasmic side of trans-Golgi network membrane
  - id: GO:0005829
    label: cytosol
  supported_by:
  - reference_id: PMID:8253837
    supporting_text: Coat assembly is triggered when ARF binds GTP, initiating transport vesicle budding.
  - reference_id: PMID:10102276
    supporting_text: a tripartite complex controls the GTP hydrolysis reaction triggering disassembly of COPI vesicle coats.
  - reference_id: Reactome:R-HSA-6811434
    supporting_text: Retrograde traffic from the cis-Golgi to the ERGIC or the ER is mediated in part by COPI-coated vesicles.
  - reference_id: PMID:15107860
    supporting_text: FAPPs are essential components of a PtdIns(4)P- and ARF-regulated machinery.
proposed_new_terms: []
suggested_questions:
- question: Should PN-to-GO propagation for `COPI coating and uncoating` distinguish structural coatomer subunits from regulatory GTPases such as ARF1 so that `GO:0030126 COPI vesicle coat` is not projected to ARF1?
- question: Would a process term for ARF-dependent COPI coat assembly/disassembly better capture ARF1 than the cellular-component term `COPI vesicle coat`?
suggested_experiments:
- description: Use acute endogenous ARF1 depletion or rapid ARF1 inactivation together with rescue by GTPase-cycle mutants, then quantify KDEL receptor/chaperone retrieval from Golgi to ER and COPI coat recruitment/uncoating kinetics.
  hypothesis: ARF1 GTPase cycling is required for efficient Golgi-to-ER retrieval of escaped ER proteins, supporting the retrograde-transport annotation without implying ARF1 is a structural COPI coat component.
  experiment_type: cell biology
- description: Perform proximity labeling of endogenous ARF1 during synchronized COPI budding/uncoating and compare enrichment of coatomer subunits, ARFGAPs, KDEL receptors, and cargo proteins across GTP-locked and GDP-locked ARF1 states.
  hypothesis: ARF1 associates transiently with COPI coat-cycle machinery as a regulatory GTPase rather than as a stable COPI coat constituent.
  experiment_type: proteomics
