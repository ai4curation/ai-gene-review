- id: PMID:34445249
  title: The SCF Complex Is Essential to Maintain Genome and Chromosome Stability.
  findings:
  - statement: The SKP1-CUL1-F-box (SCF) E3 ubiquitin ligase complexes modify substrates
      with poly-ubiquitin chains to target them for proteasomal degradation, with
      variable F-box proteins determining substrate specificity.
    reference_section_type: ABSTRACT
  reference_review:
    relevance: LOW
    correctness: VERIFIED
    review_notes: 'PubMed-verified (Int J Mol Sci 2021, PMC8395177); a general review
      of SCF complex biology. Abstract-only in cache (full_text_available: false).
      It establishes the general F-box/SCF substrate-receptor framework but does NOT
      present FBXO41-specific substrate or process data, so it supports the SCF-context
      annotations only at the family level.'
- id: file:human/FBXO41/FBXO41-deep-research-falcon.md
  title: Falcon deep research report for human FBXO41
  findings:
  - statement: FBXO41 assembles into SCF/CRL1 complexes via SKP1/CUL1 in an F-box-dependent manner (deletion or W577A mutation of the F-box abolishes SKP1/CUL1 binding) and targets neuronal centrosomes/centrioles.
    supporting_text: 'In neuronal/cell models, FBXO41 associates with **SKP1** and **CUL1** (SCF complex components). Removing the F-box (Fbxo41ΔF-box) or introducing an F-box point mutation (W577A) abolishes SKP1/CUL1 interactions, indicating the F-box is required for SCF recruitment.'
  - statement: FBXO41 is cytoplasmic, excluded from the nucleus, and has a prominent centrosomal/pericentriolar pool (pericentrin-positive, recoverable in centrosome-enriched fractions).
    supporting_text: Mouse studies report FBXO41 is cytoplasmic and excluded from nucleus, and localizes prominently near the nucleus at the **centrosome** (pericentrin-positive). FBXO41 can be recovered with centrosome-enriched fractions, supporting authentic centrosomal association.
  - statement: Increased centrosomal FBXO41 promotes disassembly/shortening of neuronal primary cilia and perturbs Sonic hedgehog signaling, dependent on actin remodeling and (in mitotic cells) Aurora A kinase.
    supporting_text: increased centriolar accumulation of Fbxo41 **promotes primary cilia disassembly/shortening** and affects **Sonic hedgehog (Shh)** signaling, a canonical ciliary pathway. Levels of centrosomal Fbxo41 inversely correlate with cilia length, and disrupting SCF assembly or centrosome targeting disrupts function.
  - statement: Loss of Fbxo41 in mice produces cerebellar granule neuron migration defects, an ataxia-like phenotype and cerebellar neurodegeneration; FBXO41 is neuron-enriched and developmentally regulated.
    supporting_text: Loss of Fbxo41 produces an ataxia-like phenotype with neuronal migration defects and cerebellar degeneration. FBXO41 is detected early in embryogenesis (E10) and is abundant postnatally in cerebellum; it is not detected in astrocytes or oligodendrocytes in those studies, supporting neuron-enriched expression.
  - statement: A definitive, broadly validated human ubiquitination substrate repertoire for FBXO41 is not established; the strongest mechanistic readouts concern centrosomal targeting and cilia phenotypes rather than identified substrates.
    supporting_text: a definitive, broadly validated human substrate repertoire for FBXO41 is not established in the retrieved literature; the most robust mechanistic readouts relate to centrosomal targeting and cilia phenotypes rather than identified ubiquitination substrates.
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: 'Falcon (Edison Scientific) deep-research synthesis. Core mechanistic claims are anchored to peer-reviewed primary literature (King et al., Sci Rep 2019, DOI 10.1038/s41598-019-44589-2: SCF/CUL1 assembly, centrosomal targeting, cilia disassembly, Shh; Mukherjee et al., J Neurosci 2015, DOI 10.1523/jneurosci.2133-14.2015: centrosomal localization, cerebellar migration/ataxia). The FBXO41-CUL7/NFM K63-ubiquitination and DISC1/NDEL1 partner claims are thesis-level (Mukherjee 2015 dissertation) and treated as preliminary. Primary papers are not in the PMID cache, so no PMID supporting_text is asserted; treated as leads.'
