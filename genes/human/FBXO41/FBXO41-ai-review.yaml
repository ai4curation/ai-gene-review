core_functions:
- description: Substrate-recognition (F-box) subunit of an SCF (SKP1-CUL1-RBX1-F-box)
    Cullin-RING E3 ubiquitin ligase complex; FBXO41 contributes a substrate-binding
    receptor function and assembles onto the SKP1-CUL1 scaffold via its F-box domain
    (F-box deletion or the W577A mutation abolishes SKP1/CUL1 binding). The catalytic
    ubiquitin-transfer activity of the complex resides in RBX1, not in FBXO41. FBXO41's
    specific physiological ubiquitination substrate(s) remain unidentified, so this is
    an adaptor/complex-membership function rather than a defined substrate-degradation role.
  molecular_function:
