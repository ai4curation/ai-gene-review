      supporting_text: 'Directly interacts with SKP1 and CUL1.'
- term:
    id: GO:0031146
    label: SCF-dependent proteasomal ubiquitin-dependent protein catabolic process
  evidence_type: NAS
  original_reference_id: PMID:34445249
  qualifier: involved_in
  review:
    summary: As an F-box substrate receptor of an SCF complex, FBXO41 is expected to
      participate in SCF-dependent proteasomal degradation of its (currently unidentified)
      substrates. This is a family-level inference; the cited reference (PMID:34445249)
      is a general SCF review and does not present FBXO41-specific substrate or degradation
      data, and no direct experimental evidence for a human FBXO41 substrate is available.
    action: KEEP_AS_NON_CORE
    reason: Reasonable family-level expectation for an SCF F-box protein, but rests on
      NAS/general-review and similarity inference rather than direct experimental
      evidence for FBXO41; retained as non-core pending identification of bona fide
      substrates.
    supported_by:
