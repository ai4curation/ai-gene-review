  review:
    summary: FBXO41 is the substrate-recognition F-box subunit of an SCF (SKP1-CUL1-F-box)
      E3 ligase complex. ComplexPortal curates a dedicated SCF FBXO41-variant complex
      (CPX-7982), and UniProt states FBXO41 directly interacts with SKP1 and CUL1.
