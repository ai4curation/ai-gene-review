    label: centrosome
  evidence_type: IEA
  original_reference_id: GO_REF:0000107
  qualifier: is_active_in
  review:
    summary: Electronic ortholog-transfer (from mouse Q6NS60) of centrosome localization,
      now corroborated by primary full text of the two mouse/rat studies. King et al. 2019
      (PMID:31160656) show by immunostaining and super-resolution dSTORM that Fbxo41
      co-localizes with Pericentrin and resides adjacent to the centriole protein Cep135
      in primary hippocampal neurons, and Mukherjee et al. 2015 (PMID:26063905) report
      FBXO41 localizes to the centrosome and cytoplasm of neurons. The centriolar pool is
      mechanistically central (its accumulation there drives cilia disassembly), though
      the human UniProt record itself does not mention a centrosomal location.
    action: KEEP_AS_NON_CORE
    reason: The annotation rests on Ensembl Compara ortholog transfer (GO_REF:0000107),
      and the underlying mouse/rat evidence has now been verified from primary full text
      (King et al. 2019, PMID:31160656; Mukherjee et al. 2015, PMID:26063905), which
      directly demonstrate centriolar/centrosomal localization of the ortholog. Retained
      as a well-supported location, but marked non-core relative to the SCF-adaptor
      molecular function that defines the gene.
    additional_reference_ids:
    - PMID:31160656
    - PMID:26063905
    supported_by:
