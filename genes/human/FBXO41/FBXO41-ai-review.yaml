core_functions:
- description: Substrate-recognition (F-box) subunit of an SCF (SKP1-CUL1-RBX1-F-box)
    Cullin-RING E3 ubiquitin ligase complex; FBXO41 contributes a substrate-binding
    receptor function and assembles onto the SKP1-CUL1 scaffold via its F-box domain.
    The catalytic ubiquitin-transfer activity of the complex resides in RBX1, not in
    FBXO41. FBXO41's specific physiological substrate(s) remain unidentified, so this
    is an adaptor/complex-membership function rather than a defined process role.
  molecular_function:
    id: GO:1990756
    label: ubiquitin-like ligase-substrate adaptor activity
  locations:
  - id: GO:0005829
    label: cytosol
  supported_by:
