    reason: Consistent with the F-box/SCF architecture (F-box domain at 496-540) and
      with UniProt's statement of direct SKP1/CUL1 interaction; ComplexPortal curates
      the SCF FBXO41-variant complex (CPX-7982). Core cellular-component context for
      an F-box protein.
