    supporting_text: 'Substrate-recognition component of the SCF (SKP1-CUL1-F-box
      protein)-type E3 ubiquitin ligase complex.'
  - reference_id: file:human/FBXO41/FBXO41-deep-research-falcon.md
    supporting_text: 'In neuronal/cell models, FBXO41 associates with **SKP1** and **CUL1** (SCF complex components). Removing the F-box (Fbxo41ΔF-box) or introducing an F-box point mutation (W577A) abolishes SKP1/CUL1 interactions, indicating the F-box is required for SCF recruitment.'
- description: Neuron-specific regulator of primary cilium structure that, from its
    centrosomal/centriolar pool, promotes disassembly/shortening of neuronal primary
    cilia (centrosomal FBXO41 levels inversely correlate with cilium length) and thereby
    modulates cilium-dependent Sonic hedgehog signaling; this activity requires actin
    remodeling and, in mitotic contexts, Aurora A kinase, and is coupled to SCF/CRL
    assembly (an F-box mutant that still localizes to the centrosome fails to shorten cilia).
  molecular_function:
    id: GO:1990756
    label: ubiquitin-like ligase-substrate adaptor activity
  locations:
  - id: GO:0005813
    label: centrosome
  supported_by:
  - reference_id: file:human/FBXO41/FBXO41-deep-research-falcon.md
    supporting_text: increased centriolar accumulation of Fbxo41 **promotes primary cilia disassembly/shortening** and affects **Sonic hedgehog (Shh)** signaling, a canonical ciliary pathway. Levels of centrosomal Fbxo41 inversely correlate with cilia length, and disrupting SCF assembly or centrosome targeting disrupts function.
  directly_involved_in:
