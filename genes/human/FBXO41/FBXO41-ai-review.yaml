- term:
    id: GO:0061523
    label: cilium disassembly
  evidence_type: ISO
  original_reference_id: PMID:31160656
  qualifier: involved_in
  review:
    summary: King et al. 2019 (PMID:31160656; full text read) demonstrate in primary rat
      hippocampal neurons and hTERT-RPE1 cells that increased centriolar accumulation of
      Fbxo41 promotes disassembly/shortening of primary cilia. Centrosomal Fbxo41 levels
      inversely correlate with cilia length, the effect requires a functional F-box domain
      (SCF-assembly competence) and centriolar targeting, requires actin-cytoskeleton
      rearrangement, and disturbs Sonic hedgehog signaling. Annotated for human FBXO41 by
      orthology inference (ISO) from this mouse/rat ortholog evidence.
    action: NEW
    reason: Not currently in GOA; proposed for the human protein by orthology inference
      (ISO) from the mouse/rat ortholog. The primary study (King et al., Sci Rep 2019,
      PMID:31160656) has now been read in full and verified to assay Fbxo41
      cilia-disassembly activity directly, so it is cited as the supporting reference.
      Remains a proposal pending human-specific confirmation.
    supported_by:
    - reference_id: PMID:31160656
      supporting_text: We identify Fbxo41 as a novel Skp1/Cullin1/F-box (SCF) E3-ligase
        complex subunit that targets to neuronal centrioles where its accumulation promotes
        disassembly of primary cilia, and affects sonic hedgehog signaling, a canonical
        ciliary pathway.
- term:
    id: GO:0001764
    label: neuron migration
  evidence_type: ISO
  original_reference_id: PMID:26063905
  qualifier: involved_in
  review:
    summary: Mukherjee et al. 2015 (PMID:26063905; full text read) show by in vivo
      electroporation that cytoplasmic FBXO41 promotes neuronal migration, and that
      Fbxo41-knockout mice display a severely ataxic gait with delayed migration of
      cerebellar granule neurons in the developing cerebellum plus degeneration of the
      mature cerebellum. Annotated for human FBXO41 by orthology inference (ISO) from this
      in vivo mouse loss-of-function evidence.
    action: NEW
    reason: Not currently in GOA; proposed for the human protein by orthology inference
      (ISO) from in vivo mouse loss-of-function evidence. The primary study (Mukherjee et
      al., J Neurosci 2015, PMID:26063905) has now been read in full and verified to assay
      Fbxo41's role in granule-neuron migration directly, so it is cited as the supporting
      reference. A developmental process distinct from the core SCF-adaptor molecular
      function; remains a proposal pending human-specific confirmation.
    supported_by:
    - reference_id: PMID:26063905
      supporting_text: we identify FBXO41 as a novel CNS-specific F-box protein that
        localizes to the centrosome and the cytoplasm of neurons and demonstrate that
        cytoplasmic FBXO41 promotes neuronal migration. Interestingly, deletion of the
        FBXO41 gene results in a severely ataxic gait in mice, which show delayed neuronal
