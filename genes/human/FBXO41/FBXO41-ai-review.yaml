taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  FBXO41 (F-box only protein 41; KIAA1940) is a brain/neuron-enriched member of
  the FBXO family of F-box proteins. F-box proteins serve as the
  substrate-recognition (receptor/adaptor) subunits of SCF (SKP1-CUL1-RBX1-F-box)
  Cullin-RING E3 ubiquitin ligase complexes: the F-box motif docks the protein
  onto the SKP1-CUL1 scaffold, while a separate substrate-binding region recruits
  target proteins for poly-ubiquitination, committing them to proteasomal
  degradation. FBXO41 carries a C-terminal F-box domain together with an
  N-terminal C2H2 zinc-finger-like region, a long predicted coiled-coil, and
  extensive intrinsically disordered/low-complexity regions, and by sequence
  similarity is predicted to assemble into an SCF complex through direct
  interaction with SKP1 and CUL1. FBXO41 is a neuron-specific/CNS-enriched protein
  (expressed from early embryogenesis, abundant postnatally in cerebellum and
  hippocampus; not detected in astrocytes or oligodendrocytes). It is cytoplasmic and
  excluded from the nucleus, with a prominent centrosomal/pericentriolar pool: in
  neurons FBXO41 localizes adjacent to centriole markers and co-fractionates with
  centrosomes, and this targeting requires both its coiled-coil and F-box domains.
  Functionally, increased centrosomal/centriolar accumulation of FBXO41 promotes
  disassembly/shortening of neuronal primary cilia and thereby modulates the
  cilium-dependent Sonic hedgehog (Shh) pathway; this cilia disassembly activity
  depends on actin-cytoskeleton remodeling and, in mitotic contexts, on Aurora A
  kinase. F-box deletion or an F-box point mutation (W577A) abolishes SKP1/CUL1
  binding, and a centrosome-localized F-box mutant fails to drive cilia shortening,
  indicating that FBXO41's biological activity is coupled to SCF/CRL assembly. In vivo,
  loss of Fbxo41 in mice causes cerebellar granule neuron migration defects, an
  ataxia-like phenotype and cerebellar neurodegeneration. Its direct, broadly validated
  ubiquitination substrate repertoire remains unestablished; a less-replicated
  (thesis-level) model proposes an FBXO41-CUL7 complex mediating non-proteolytic
  K63-linked ubiquitination of neurofilament medium (NFM) to promote axon growth,
  alongside proposed interactions with DISC1 and NDEL1. A rare homozygous human variant
  (p.Arg317Gln) has been reported segregating with a neurologic phenotype, and FBXO41
  shows altered DNA methylation in 22q11.2 deletion syndrome.
