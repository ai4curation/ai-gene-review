  - reference_id: file:human/FBXO41/FBXO41-uniprot.txt
    supporting_text: 'Directly interacts with SKP1 and CUL1.'
proposed_new_terms: []
suggested_questions:
- question: What are the physiological substrate(s) of the SCF-FBXO41 complex, and
    are they neuron- or brain-specific given FBXO41's strong brain/hippocampal
    enrichment?
- question: Does FBXO41 function as a canonical degradative SCF substrate receptor,
    or does it (like some FBXO proteins) have non-degradative or SCF-independent
    roles in neurons?
- question: What is the role of FBXO41's N-terminal C2H2 zinc-finger-like region and
    long coiled-coil in substrate recognition or complex assembly, distinct from the
    C-terminal F-box domain?
suggested_experiments:
- description: Affinity-purify FBXO41 (e.g. tagged or endogenous) from neuronal cells
    or brain tissue followed by mass spectrometry to define its SCF-complex partners
    (confirming SKP1/CUL1/RBX1) and to identify candidate ubiquitination substrates.
- description: Perform comparative ubiquitinome/proteome profiling in FBXO41-knockout
    versus wild-type neurons (with and without proteasome inhibition) to identify
    proteins that accumulate upon loss of FBXO41 and are therefore candidate substrates.
- description: Reconstitute the SCF-FBXO41 complex in vitro with purified SKP1, CUL1,
    RBX1, an E1, an E2 and candidate substrates to test for direct, F-box-dependent
    substrate ubiquitination and to determine ubiquitin-chain linkage type.
