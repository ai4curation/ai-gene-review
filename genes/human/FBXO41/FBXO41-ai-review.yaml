references:
- id: PMID:31160656
  title: FBXO41 in primary cilia disassembly and Sonic hedgehog signaling (King et al., Sci Rep 2019)
  findings:
  - statement: Fbxo41 assembles into an SCF (Skp1/Cullin1/F-box) E3-ligase complex, and
      this requires an intact F-box domain; deletion or W577A point mutation of the F-box
      abolishes Skp1/Cullin1 binding.
    supporting_text: Fbxo41 associated with Skp1 and Cullin1, albeit less efficiently than
      Fbxo21 which was included as a positive control. Deleting (Fbxo41ΔF-box) or mutating
      (Fbxo41W577A) the F-box domain abolished these interactions
    reference_section_type: RESULTS
  - statement: Fbxo41 is a neuron-specific protein (expressed in cultured neurons but not
      astrocytes) that targets to neuronal centrioles, residing adjacent to the centriole
      proximal-end protein Cep135 by super-resolution dSTORM.
    supporting_text: Super-resolution stochastic optical reconstruction microscopy (STORM)
      revealed that Fbxo41-EGFP resides adjacent to centrosomal protein 135 (Cep135), a
      centriole proximal-end protein
    reference_section_type: RESULTS
  - statement: Centrosomal targeting of Fbxo41 requires both its coiled-coil and F-box
      domains.
    supporting_text: this suggests that both the Coiled-coil and the F-box domains are
      required for centrosome targeting
    reference_section_type: RESULTS
  - statement: Increased Fbxo41 expression promotes disassembly of primary cilia (rather
      than inhibiting ciliogenesis), demonstrated in primary neurons and hTERT-RPE1 cells
      with multiple cilia markers; Fbxo41 silencing has no effect, so Fbxo41 is not
      required for ciliogenesis.
    supporting_text: using two independent model systems and three different cilia markers,
      we demonstrate that increased Fbxo41 expression robustly disassembles primary cilia
    reference_section_type: RESULTS
  - statement: Centrosomal Fbxo41 levels inversely correlate with neuronal cilia length,
      and a functional F-box domain is required for centriole targeting and cilia
      disassembly (the centriole-targeted but SCF-incompetent Fbxo41ΔCΔF does not shorten
      cilia).
    supporting_text: these results demonstrate that Fbxo41 requires a functional F-box
      domain for centriole targeting and cilia disassembly
    reference_section_type: RESULTS
  - statement: Fbxo41-mediated cilia disassembly requires actin-cytoskeleton rearrangement
      and proceeds by different mechanisms in mitotic cells versus neurons (Aurora A kinase
      inhibition rescues disassembly only in mitotic cells, not neurons).
    supporting_text: rearrangements of the actin-cytoskeleton are required for Fbxo41
      mediated cilia disassembly, and that ciliary disassembly occurs via different
      mechanisms in mitotic cells and neurons
    reference_section_type: RESULTS
  - statement: Fbxo41-induced cilia shortening impairs the ciliary Sonic hedgehog pathway,
      blunting Shh-induced Gli1/Ptch1 transcriptional responses.
    supporting_text: these data indicate that Fbxo41-indcued cilia disassembly affects
      their signaling capacity in mitotic cells and, albeit to a lesser extent, in neurons
    reference_section_type: RESULTS
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: Full text read from PMC (PMC6546786). Primary Fbxo41 study in rat/mouse primary hippocampal neurons and hTERT-RPE1 cells. Verified to directly demonstrate that Fbxo41 assembles into an SCF complex, targets neuronal centrioles (Pericentrin co-localization; dSTORM adjacency to Cep135), and that its centriolar accumulation promotes primary-cilia disassembly (inverse correlation of centrosomal Fbxo41 with cilia length, F-box-domain-dependent) while perturbing Sonic hedgehog signaling. Citation is correct and supports the centrosome localization and cilium-disassembly (ISO) annotations.
- id: PMID:26063905
  title: FBXO41 in cerebellar granule neuron migration (Mukherjee et al., J Neurosci 2015)
  findings:
  - statement: FBXO41 is a novel CNS/neuron-specific F-box protein that localizes to the
      centrosome and cytoplasm of neurons, and cytoplasmic FBXO41 promotes neuronal
      migration.
    supporting_text: we identify FBXO41 as a novel CNS-specific F-box protein that localizes
      to the centrosome and the cytoplasm of neurons and demonstrate that cytoplasmic
      FBXO41 promotes neuronal migration
    reference_section_type: ABSTRACT
  - statement: FBXO41 protein is restricted to CNS tissues (cortex, hippocampus, cerebellum,
      spinal cord), absent from peripheral nerve and non-neural tissues, detectable from
      embryonic day 10, and expressed in cultured granule neurons but not astrocytes or
      oligodendrocytes.
    supporting_text: We found FBXO41 to be expressed in CNS tissues including cortex,
      hippocampus, cerebellum, and spinal cord, but absent from the peripheral nervous
      system tissue such as sciatic nerve and from non-neural tissues
    reference_section_type: RESULTS
  - statement: Endogenous FBXO41 is cytoplasmic and excluded from the nucleus, with a
      centrosomal pool confirmed by GFP-FBXO41 colocalization with pericentrin 2 and
      cosegregation of endogenous FBXO41 with gamma-tubulin in centrosome purifications.
    supporting_text: we discovered a conspicuous dot-like accumulation of FBXO41 near the
      nucleus, which we later confirmed to be the centrosome because GFP-FBXO41 colocalized
      with the centrosomal marker pericentrin 2
    reference_section_type: RESULTS
  - statement: A centrosomal targeting region (CTR, aa 179-354) directs FBXO41 to the
      centrosome; FBXO41 lacking the CTR fails to localize to the centrosome and disperses
      in the cytoplasm, establishing dual centrosomal/cytoplasmic localization.
    supporting_text: we refer to it as centrosomal targeting region (CTR, aa 179–354)
      hereafter
    reference_section_type: RESULTS
  - statement: In vivo electroporation knockdown of FBXO41 in P4 rat cerebellum stalls
      granule neurons in the EGL/molecular layer with fewer reaching the inner IGL,
      indicating slower migration; FBXO41 promotes neuronal migration.
    supporting_text: we found that significantly more FBXO41 knock-down neurons were stalled
      in the EGL/ML
    reference_section_type: RESULTS
  - statement: Rescue with the cytoplasm-only FBXO41 (lacking the CTR), but not
      centrosome-targeted forms, restores migration, and FBXO41 gain-of-function
      accelerates migration into the inner IGL, showing the cytoplasmic pool is the crucial
      one for migration.
    supporting_text: Collectively, these data indicate that the FBXO41 RNAi-induced
      phenotype is specific to FBXO41 and suggest that cytoplasmic FBXO41 is crucial to
      stimulate the migration of cerebellar granule neurons
    reference_section_type: RESULTS
  - statement: FBXO41-knockout mice have high perinatal lethality and at P16 display a
      severely ataxic gait with hind-limb dragging, impaired balance, tremors, and hindlimb
      clasping.
    supporting_text: mice displayed an abnormal gait characterized by dragging of the hind
      limbs, impaired balance, and tremors
    reference_section_type: RESULTS
  - statement: The FBXO41-knockout cerebellum shows delayed granule-neuron migration
      (residual EGL and excess molecular-layer cells across P12-P30); migrating cells
      eventually reach the IGL, so FBXO41 sets migration speed rather than being strictly
      essential.
    supporting_text: although the migrating cells eventually catch up and reach the IGL,
      FBXO41 is required to maintain a normal migration speed in the cerebellum
    reference_section_type: RESULTS
  - statement: Neurodegeneration in the knockout is age-dependent, absent at P16 but by P30
      showing a significant increase in apoptotic (TUNEL+) cells in hippocampus and
      cerebellum, alongside a distorted, smaller cerebellum.
    supporting_text: found little or no increase of apoptotic cells in the cortex but a
      significant increase in the hippocampus and the cerebellum
    reference_section_type: RESULTS
  - statement: FBXO41 has a cell-autonomous prosurvival role in neurons; functional RNAi
      knockdown increases cleaved-caspase-3+ granule neurons, rescued by RNAi-resistant
      FBXO41.
    supporting_text: These results support a prosurvival role for FBXO41 in neurons.
    reference_section_type: RESULTS
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: 'Full text read from PMC (PMC6605212), including the Results section
      retrieved from the PMC HTML and appended to the cached publication (the eutils HTML
      fallback had captured only Abstract/Introduction/Discussion). Primary in vivo study
      of the neuron-specific F-box protein FBXO41 in mouse/rat cerebellum. Verified to
      directly demonstrate CNS-restricted neuron-specific expression; cytoplasmic plus
      centrosomal localization (pericentrin 2 / gamma-tubulin) via a CTR (aa 179-354); that
      cytoplasmic FBXO41 promotes granule-neuron migration (RNAi knockdown, CTR rescue, and
      gain-of-function in vivo electroporation); a severely ataxic FBXO41-knockout
      phenotype with delayed cerebellar migration; and age-dependent (P30) cerebellar/
      hippocampal neurodegeneration plus a cell-autonomous prosurvival role. Citation is
      correct and supports the neuron-migration (ISO) and centrosome annotations.'
