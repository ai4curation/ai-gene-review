suggested_questions:
- question: Beyond binding, does MBL contribute any conformational/allosteric signal that activates the
    bound MASP zymogens, or is its role purely to cluster and co-localize MASPs on the target surface?
  experts: []
- question: How quantitatively important is the antibody-independent MBL lectin pathway in healthy human
    adults (most MBL-deficient adults are healthy), versus in specific windows such as infancy, neutropenia,
    or immunosuppression?
  experts: []
suggested_experiments:
- hypothesis: The calcium-dependent carbohydrate-recognition activity of the CRD is strictly required
    for all MBL effector functions (complement activation, opsonization, antiviral inhibition).
  description: Compare wild-type recombinant MBL with CRD point mutants that abolish Ca2+/sugar binding
    (mutations of the Ca2+/glycosyl-coordinating residues around 212-233) for binding to mannan, S. aureus,
    influenza A and SARS-CoV-2 spike, and for MASP-dependent C4/C2 cleavage and opsonophagocytosis, using
    EDTA and competing mannose/GlcNAc as controls.
  experiment_type: structure-function / CRD mutagenesis with binding and complement-activation assays
- hypothesis: MBL oligomerization state (trimer vs tetramer-and-higher) sets the threshold for microbial
    discrimination and complement activation in a physiologically meaningful way.
  description: Produce defined recombinant MBL oligomers, quantify avidity for panels of microbial vs
    host glycans (SPR / glycan arrays) and MASP recruitment, correlate with C4 deposition and bacterial
    opsonophagocytosis, and relate to oligomer distributions produced by common MBL2 structural variants.
  experiment_type: biophysical oligomer fractionation with glycan-array and complement assays
