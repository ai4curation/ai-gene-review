proposed_new_terms:
- proposed_name: collectin oligomer carbohydrate-pattern recognition
  proposed_definition: Recognition of a spatially repetitive, geometrically defined array of terminal
    monosaccharides (e.g. mannose, N-acetylglucosamine, fucose) on a microbial or altered-self surface
    by a multivalent oligomeric collectin, in which avidity arises from the simultaneous engagement of
    multiple low-affinity C-type lectin carbohydrate-recognition domains presented by the oligomer, thereby
    discriminating microbial macropatterns from host glycoproteins.
  justification: MBL specificity for non-self arises from the geometric spacing of multiple CRDs across
    a higher-order oligomer (the macropattern concept). Existing MF terms (carbohydrate binding, calcium-dependent
    carbohydrate binding, pattern recognition receptor activity) capture facets but none captures the
    multivalent, oligomer-dependent macropattern discrimination that distinguishes collectins/ficolins
    and that experimentally governs microbial binding and complement activation.
