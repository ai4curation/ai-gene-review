- term:
    id: GO:0048306
    label: calcium-dependent protein binding
  evidence_type: IPI
  original_reference_id: PMID:35102342
  qualifier: enables
  review:
    summary: The Ca2+-dependent binding of MBL to SARS-CoV-2 spike is glycan-dependent, i.e. it is calcium-dependent
      carbohydrate binding of a viral glycoprotein rather than protein-protein binding; better captured
      by calcium-dependent carbohydrate binding (GO:0120153). The curator's original choice of calcium-dependent
      protein binding was reasonable - the assay measured Ca2+-dependent binding of MBL to a specific
      protein (the SARS-CoV-2 spike glycoprotein), so at the level of the observed partner it is a protein.
      This MODIFY refines the mechanism (the binding is glycan-mediated via the C-type lectin CRD) rather
      than correcting a curator error.
    action: MODIFY
    reason: The interaction is mediated by the spike glycan via the C-type lectin CRD in a calcium-dependent
      manner; calcium-dependent carbohydrate binding is the accurate, informative MF. The original calcium-dependent
      protein binding was a defensible choice (the measured partner is the spike protein); the MODIFY
      refines mechanism, not a curator mistake.
    proposed_replacement_terms:
    - id: GO:0120153
      label: calcium-dependent carbohydrate binding
