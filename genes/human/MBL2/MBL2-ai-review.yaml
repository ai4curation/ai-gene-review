id: P11226
gene_symbol: MBL2
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: MBL2 encodes mannose-binding lectin (MBL; also mannan-binding lectin/protein, MBP-C, collectin-1),
  a secreted, liver-derived serum collectin of the innate immune system. It is a C-type lectin built from
  a structural subunit that combines an N-terminal cysteine-rich region, a collagen-like Gly-X-Y domain
  (with hydroxyproline modifications), an alpha-helical coiled-coil neck that drives trimerization, and
  a C-terminal C-type carbohydrate-recognition domain (CRD). Three subunits assemble into a homotrimer,
  and several homotrimers further oligomerize into higher-order bouquet-like structures. Through the CRD
  it binds, in a calcium-dependent manner, terminal mannose, N-acetylglucosamine and fucose residues arranged
  in the repetitive geometric patterns characteristic of microbial (bacterial, fungal, viral, protozoan)
  surfaces, while largely sparing the differently arranged sugars of host glycoproteins. MBL therefore
  acts as a soluble pattern-recognition molecule; upon binding a microbial surface it triggers the associated
  MBL-associated serine proteases (chiefly MASP-1, which activates MASP-2) to cleave complement C4 and
  C2, initiating the lectin pathway of complement and leading to opsonization, phagocytosis and membrane
  attack. MBL also binds altered-self and certain viral glycoproteins (e.g. influenza A haemagglutinin
  and SARS-CoV-2 spike) and can modulate inflammatory signaling. Common structural and promoter MBL2 variants
  lower circulating MBL and cause a common, usually subclinical, immunodeficiency that increases infection
  risk in the immunologically immature or compromised.
