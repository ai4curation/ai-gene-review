- term:
    id: GO:0006508
    label: proteolysis
  evidence_type: IDA
  original_reference_id: PMID:22691502
  qualifier: involved_in
  review:
    summary: The proteolysis (C4/C2 cleavage) is carried out by the MASP serine proteases, not by MBL
      itself - MBL has no protease activity. Annotating MBL with proteolysis attributes an activity of
      its associated MASP serine proteases to MBL; this is closer to a wrong-gene attribution than an
      over-annotation. MBL membership in the proteolytic complex is already captured by GO:1905370 (serine-type
      endopeptidase complex) and its role by the lectin-pathway process annotations.
    action: REMOVE
    reason: MBL is not a protease; proteolysis is the activity of the associated MASP serine proteases.
      Attributing it to MBL is effectively a wrong-gene attribution, so the annotation is removed; MBL
      involvement is correctly represented by complex membership (GO:1905370) and the lectin-pathway process.
