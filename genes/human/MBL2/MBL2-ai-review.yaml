    summary: MBL binding to oxidative-stress-induced endothelial cytokeratin-1 activates the lectin pathway
      (altered-self recognition). Supports the lectin-pathway process. Core process role.
    action: ACCEPT
- term:
    id: GO:0005102
    label: signaling receptor binding
  evidence_type: IPI
  original_reference_id: PMID:11549596
  qualifier: enables
  review:
    summary: This annotation derives from MBL binding endothelial cytokeratin-1 (CK1) after oxidative
      stress. CK1 is not a canonical signaling receptor, and the interaction is recognition of an altered-self
      surface ligand by the lectin. Signaling receptor binding misclassifies this; the informative MF
      remains carbohydrate/altered-self ligand binding via the CRD.
    action: MARK_AS_OVER_ANNOTATED
    reason: The CK1 interaction is altered-self ligand recognition by the lectin, not binding of a bona
      fide signaling receptor; the term is a poor fit.
- term:
    id: GO:0005537
    label: D-mannose binding
  evidence_type: NAS
  original_reference_id: PMID:11549596
  qualifier: enables
  review:
    summary: D-mannose binding is the core MF of MBL and is correct; supported far more directly by the
      IDA annotations (PMID:6643429). This NAS entry is redundant but accurate.
    action: ACCEPT
- term:
    id: GO:0006979
    label: response to oxidative stress
  evidence_type: NAS
  original_reference_id: PMID:11549596
  qualifier: involved_in
  review:
    summary: MBL does not respond to oxidative stress; rather, oxidative stress on endothelium exposes
      a ligand (cytokeratin-1) that MBL then binds. Annotating MBL with response to oxidative stress misattributes
      the host cell stress response to MBL.
    action: REMOVE
    reason: The oxidative stress is experienced by the endothelial cell (inducing CK1); MBL merely recognizes
      the resulting altered-self ligand. MBL itself has no role in the oxidative-stress response.
