  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: is_active_in
  review:
    summary: An IBA-propagated localization that does not fit a secreted serum collectin. MBL acts extracellularly/at
      the cell surface, not in multivesicular bodies; likely over-propagation from surfactant-protein
      relatives (which traffic through lamellar/multivesicular bodies in pneumocytes).
