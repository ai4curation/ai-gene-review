taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: ATP6AP2 encodes a single-pass membrane accessory protein of the vacuolar H+-ATPase system,
  also known as the renin/prorenin receptor. The protein localizes to endoplasmic reticulum, endosomal,
  lysosomal, Golgi, and plasma-membrane contexts, where it is cleaved into N- and C-terminal fragments.
  Its best-supported cell-biological role is to support V-ATPase assembly and endolysosomal acidification,
  which are required for lysosomal protein degradation, autophagy, glycosylation homeostasis, and neuronal
  viability. ATP6AP2 also has context-dependent receptor and adaptor roles in renin/prorenin signaling
  and Wnt/V-ATPase signaling.
