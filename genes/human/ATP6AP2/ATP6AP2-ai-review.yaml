- id: PMID:29127204
  title: Mutations in the X-linked ATP6AP2 cause a glycosylation disorder with autophagic defects.
  findings:
  - statement: ATP6AP2 is an accessory V-ATPase subunit needed for V-ATPase assembly, organelle acidification,
      glycosylation, and autophagic degradation.
    supporting_text: Our results suggest that ATP6AP2 has a crucial role in V-ATPase assembly, both in
      invertebrates and vertebrates.
    reference_section_type: ABSTRACT
  - statement: ATP6AP2 interacts with V0 assembly factors including ATP6AP1 and VMA21.
    supporting_text: Together, these results suggest that ATP6AP2 forms a complex with other V-ATPase
      assembly factors
    reference_section_type: RESULTS
  - statement: ATP6AP2 loss-of-function reduces lysosomal acidity and impairs autophagic degradation.
    supporting_text: ATP6AP2L98S mutant clones showed a reduction in Lysotracker-positive organelles compared
      with the WT surrounding tissue, indicating reduced acidity
    reference_section_type: RESULTS
- id: PMID:30985297
  title: ATP6AP2 variant impairs CNS development and neuronal survival to cause fulminant neurodegeneration.
  findings:
  - statement: ATP6AP2 deficiency impairs lysosomal acidification, protein degradation, and V-ATPase membrane
      assembly in neuronal disease models.
    supporting_text: severe deficiency in lysosomal acidification and protein degradation leading to neuronal
      cell death
    reference_section_type: ABSTRACT
    full_text_unavailable: true
  - statement: The authors conclude ATP6AP2 mediates V-ATPase-dependent signaling and protein degradation
      in the developing CNS.
    supporting_text: ATP6AP2 is a key mediator of V-ATPase-dependent signaling and protein degradation
      in the developing human central nervous system.
    reference_section_type: ABSTRACT
    full_text_unavailable: true
- id: PMID:32276428
  title: Interaction between PHB2 and Enterovirus A71 VP1 Induces Autophagy and Affects EV-A71 Infection.
  findings:
  - statement: ATP6AP2 knockdown increases lysosomal pH and inhibits autolysosomal degradation in a viral
      autophagy model.
    supporting_text: To evaluate the effect of ATP6AP2 knockdown on lysosomal pH, we employed an acidophilic
      fluorescent probe to measure the lysosomal pH, which increased significantly
    reference_section_type: RESULTS
  - statement: The paper explicitly treats ATP6AP2 as an auxiliary V-ATPase component coordinating correct
      assembly.
    supporting_text: ATP6AP2 is an important auxiliary component of the V-ATPase complex and coordinates
      correct V-ATPase assembly
    reference_section_type: RESULTS
- id: PMID:33065002
  title: Structures of a Complete Human V-ATPase Reveal Mechanisms of Its Assembly.
  findings:
  - statement: Human V-ATPases are ATP-driven proton pumps responsible for organelle and vesicle acidification.
    supporting_text: V-ATPases are ATP-driven proton pumps comprised of a cytoplasmic V1 complex for ATP
      hydrolysis and a membrane-embedded Vo complex for proton transfer.
    reference_section_type: ABSTRACT
- id: PMID:20093472
  title: Requirement of prorenin receptor and vacuolar H+-ATPase-mediated acidification for Wnt signaling.
  findings:
  - statement: PRR/ATP6AP2 acts as an adaptor between Wnt receptors and the V-ATPase complex.
    supporting_text: PRR functions in a renin-independent manner as an adaptor between Wnt receptors and
      the vacuolar H+-adenosine triphosphatase (V-ATPase) complex.
    reference_section_type: ABSTRACT
  - statement: The Wnt developmental phenotypes are supported but secondary to the V-ATPase-linked receptor/adaptor
      role.
    supporting_text: PRR and V-ATPase were required to mediate Wnt signaling during antero-posterior patterning
      of Xenopus early central nervous system
    reference_section_type: ABSTRACT
- id: PMID:30374053
  title: "TMEM9 promotes intestinal tumorigenesis through vacuolar-ATPase-activated Wnt/\u03B2-catenin\
    \ signalling."
  findings:
