suggested_questions:
- question: >-
    What are the distinct physiological, tissue-specific, and metabolic roles of PANK3
    versus the other active human isoforms (PANK1alpha, PANK1beta, PANK2), given their
    shared catalytic core but different regulatory properties and subcellular
    localizations?
- question: >-
    Does PANK3 have any non-catalytic or moonlighting role, or is its biological
    function fully accounted for by pantothenate kinase activity and CoA-level
    regulation?
suggested_experiments:
- description: >-
    Isoform-specific knockout/knockdown of PANK3 in liver and other tissues with
    metabolomic profiling of CoA and acyl-CoA pools to define its non-redundant
    contribution to CoA homeostasis.
- description: >-
    Structure-guided mutagenesis distinguishing acetyl-CoA feedback inhibition from
    catalysis (e.g. S195V, R207W) in a cellular context to test how PANK3 allosteric
    regulation sets intracellular CoA set-points.
