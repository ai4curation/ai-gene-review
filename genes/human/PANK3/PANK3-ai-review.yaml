- term:
    id: GO:0005634
    label: nucleus
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: is_active_in
  review:
    summary: >-
      Phylogenetic (PAN-GO/IBA) propagation of a nuclear location. This is contradicted
      by direct experimental evidence: live-cell imaging shows human PanK3 is cytosolic,
      not nuclear. Nuclear localization in the PanK family is a property of the
      PanK1alpha isoform (which carries an N-terminal NLS), not of PanK3, which consists
      essentially of the catalytic core with a short N-terminal extension. This is an
      over-annotation for PANK3.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      Directly contradicted by experimental subcellular localization (PMID:23152917:
      human PanK3 is cytosolic/soluble). Nuclear location applies to PanK1alpha, not
      PanK3; the IBA propagates a family-level location that is isoform-inappropriate.
    supported_by:
    - reference_id: PMID:23152917
      supporting_text: >-
        Mouse PanK2 and both human and mouse PanK3 were cytosolic with a diffuse
        pattern, indicating that these proteins were soluble and not associated with
        structural components of the cell
