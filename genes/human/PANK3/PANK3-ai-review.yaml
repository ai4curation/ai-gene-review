- id: PMID:17631502
  title: Crystal structures of human pantothenate kinases. Insights into allosteric
    regulation and mutations linked to a neurodegeneration disorder.
  findings:
    - statement: >-
        Reports the homodimeric crystal structures of the catalytic cores of PanK1alpha
        and PanK3 in complex with acetyl-CoA, a feedback inhibitor; each monomer adopts
        an actin kinase superfamily fold and the inhibitor-bound structures explain the
        basis for allosteric regulation by CoA thioesters.
      reference_section_type: ABSTRACT
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified structural/biochemical paper on human PanK3 (and PanK1alpha).
      Establishes homodimer, acetyl-CoA feedback inhibition, and catalytic core.
      Cited by UniProt for FUNCTION, CATALYTIC ACTIVITY, SUBUNIT, and ACTIVITY
      REGULATION. Only the abstract is cached (full_text_available: false).
- id: PMID:20797618
  title: Modulation of pantothenate kinase 3 activity by small molecules that interact
    with the substrate/allosteric regulatory domain.
  findings:
    - statement: >-
        PanKs function as homodimers with two equivalent active sites formed by a
        head-to-tail juxtaposition of the monomers; PanK3 phosphorylates pantothenate
        and its analog hopantenate, and its activity is modulated by small molecules
        (sulfonylureas, thiazolidinediones, acyl-carnitines) acting at the
        substrate/allosteric regulatory domain.
      reference_section_type: RESULTS
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified; crystallography plus enzymology of hPanK3, including
      pantothenate/ATP kinetics (KM=14 uM pantothenate, KM=311 uM ATP) and
      S195V/R207A/A267F/A269F mutagenesis abolishing or altering catalysis. Full text
      cached.
- id: PMID:23152917
  title: Compartmentalization of mammalian pantothenate kinases.
  findings:
    - statement: >-
        Human and mouse PanK3 were cytosolic with a diffuse pattern, indicating that
        these proteins were soluble and not associated with structural components of
        the cell; PanK1alpha isoforms were nuclear and hPanK2 localized to
        mitochondria/nucleus.
      reference_section_type: RESULTS
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified; live-cell imaging of ZsGreen1-tagged isoforms. Directly
      establishes PanK3 as cytosolic (not nuclear). Full text cached.
- id: PMID:27555321
  title: Allosteric Regulation of Mammalian Pantothenate Kinase.
  findings:
    - statement: >-
        Structures of human PANK3 in five catalytically relevant states (acetyl-CoA;
        AMPPNP.Mg2+; AMPPNP.Mg2+.pantothenate; ADP.Mg2+.phosphopantothenate; AMPPN.Mg2+)
        reveal a large conformational change; the enzyme switches cooperatively between
        an inactive open (acyl-CoA-bound) and active closed (ATP-bound) conformation,
        with the two protomer active sites functionally coupled (PANK3(G19V) cannot bind
        ATP).
      reference_section_type: ABSTRACT
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified; defines the catalytic cycle and allosteric mechanism of hPanK3,
      identifies active site (Glu138), and demonstrates pantothenate (vitamin B5)
      binding via co-crystal structure. Only the abstract is cached
      (full_text_available: false).
- id: PMID:30927326
  title: Human pantothenate kinase 4 is a pseudo-pantothenate kinase.
  findings:
    - statement: >-
        Pantothenate kinase generates 4'-phosphopantothenate in the first and
        rate-determining step of coenzyme A (CoA) biosynthesis; introducing the
        Glu138Val substitution to the catalytically active HsPANK3 abolished its robust
        pantothenate kinase activity, confirming Glu138 as an essential catalytic
        residue in PANK3.
      reference_section_type: ABSTRACT
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified; primarily characterizes PANK4 as a pseudoenzyme, but uses
      catalytically active HsPANK3 as the reference kinase and directly assays PANK3
      pantothenate kinase, ATP-binding, acetyl-CoA-binding, and CoA-biosynthesis
      activities (E138V abolishes PANK3 activity). Full text cached. Basis for the
      UniProt EC 2.7.1.33 assignment.
