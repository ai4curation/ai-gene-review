core_functions:
- description: >-
    Golgi ganglioside GD3/GT3 synthase: transfers a second sialic acid in alpha-2,8
    linkage from CMP-N-acetylneuraminate onto the terminal sialic acid of ganglioside
    GM3 to form GD3 (and can add a further alpha-2,8 sialic acid to GD3 to make GT3),
    initiating the b- and c-series branches of ganglioside biosynthesis in the Golgi
    membrane.
  molecular_function:
