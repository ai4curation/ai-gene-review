id: Q92185
gene_symbol: ST8SIA1
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  ST8SIA1 (GD3 synthase; ST8Sia I; alpha-2,8-sialyltransferase 8A; SAT-II) is a
  Golgi-membrane sialyltransferase of the glycosyltransferase 29 (GT29/CAZy) family
  that initiates the b-series branch of ganglioside biosynthesis. It is a type II
  single-pass membrane protein that transfers a second sialic acid, in alpha-2,8
  linkage, from CMP-N-acetylneuraminate onto the terminal sialic acid of ganglioside
  GM3 to form ganglioside GD3 (releasing CMP), and can add a further alpha-2,8 sialic
  acid to GD3 to make GT3 (the c-series precursor); it therefore acts as a b/c-series
  ganglioside (poly)sialyltransferase. In vitro it also sialylates other terminal
  Sia-alpha-2,3-Gal acceptors (GM1b, GD1a, GT1b) to GD1c, GT1a and GQ1b, and in cancer
  cells can behave as an oligosialyltransferase generating unusual GQ3/GP3 species.
  GD3 and downstream b-series gangliosides (GD2, GD1b, GT1b) are important in
  neurodevelopment and apoptosis regulation, and GD3/GD2 are tumor-associated antigens
  strongly expressed in melanoma and other neuroectodermal tumors. Expression is high
  in melanoma cell lines and in adult and fetal brain.
