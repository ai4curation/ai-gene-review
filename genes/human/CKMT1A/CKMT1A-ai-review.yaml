core_functions:
- description: >-
    Reversibly phosphorylates creatine using OXPHOS-derived ATP to produce N-phosphocreatine, the
    phosphate-loading reaction of the mitochondrial creatine kinase octamer in the intermembrane space.
    This activity constitutes the mitochondrial limb of the phosphocreatine shuttle.
