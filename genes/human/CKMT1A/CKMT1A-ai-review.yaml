  label: Homo sapiens
description: >-
  CKMT1A encodes the ubiquitous mitochondrial creatine kinase (U-MtCK / Mia-CK), a member of
  the ATP:guanido phosphotransferase (phosphagen kinase) family that reversibly catalyzes
  phosphoryl transfer between ATP and creatine (creatine + ATP = N-phosphocreatine + ADP + H+;
  EC 2.7.3.2). The protein is synthesized with an N-terminal mitochondrial transit peptide and,
  after import, assembles into homo-octamers (four homodimers) that reside in the mitochondrial
  intermembrane space as peripheral membrane proteins on the intermembrane (outer) face of the
  inner membrane. Octamers bind the inner-membrane phospholipid cardiolipin via an N-terminal
  region, can bridge the inner and outer membranes at contact sites, and are functionally coupled
  to the adenine nucleotide translocator and to porin/VDAC. Using ATP exported from oxidative
  phosphorylation, the enzyme loads high-energy phosphate onto creatine to make phosphocreatine,
  constituting the mitochondrial (phosphate-loading) limb of the phosphocreatine shuttle that
  buffers cytosolic ATP at sites of high, fluctuating energy demand such as heart, skeletal muscle
  and brain. Mitochondrial creatine kinase octamers also contribute to mitochondrial structure and
  to regulation of the mitochondrial permeability transition. In humans the protein is encoded by
  two near-identical duplicated genes, CKMT1A and CKMT1B, both represented by UniProt entry P12532;
  it is distinct from the muscle-restricted sarcomeric mitochondrial creatine kinase (CKMT2) and
  from the cytosolic isoenzymes (CKM, CKB).
