suggested_questions:
- question: >-
    Is the regulation of the mitochondrial permeability transition by CKMT1 a direct structural/gating
    role of the octamer at contact sites, or an indirect consequence of altered local ATP/ADP and
    cardiolipin organization?
- question: >-
    Do CKMT1A and CKMT1B (the duplicated genes encoding identical protein) show any tissue- or
    context-specific differences in expression or regulation despite producing the same enzyme?
suggested_experiments:
- hypothesis: >-
    Octamer formation and cardiolipin binding are required for functional coupling of CKMT1 to the
    adenine nucleotide translocator and for efficient phosphocreatine export.
  description: >-
    Reconstitute purified CKMT1 octamers vs. dimer-stabilized mutants with cardiolipin-containing
    proteoliposomes containing ANT/VDAC and measure ATP/ADP channeling and phosphocreatine production
    relative to bulk substrate.
  experiment_type: biochemical reconstitution
