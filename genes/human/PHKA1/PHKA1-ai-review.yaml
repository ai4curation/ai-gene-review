- term:
    id: GO:0005886
    label: plasma membrane
  evidence_type: IEA
  original_reference_id: GO_REF:0000044
  qualifier: located_in
  review:
    summary: >-
      Subcellular-location keyword mapping to plasma membrane, derived from a possible
      C-terminal farnesylation (lipid anchor) of the final cysteine. UniProt itself flags
      the cell-membrane assignment as inferred (ECO:0000305) and notes the terminal
      tripeptide is probably not removed and the C-terminus is not methylated, casting doubt
      on a canonical prenylation-driven membrane anchoring. PhK is functionally and
      structurally characterized as a cytosolic complex.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      Plasma membrane localization rests on a weakly supported lipid-anchor inference and is
      inconsistent with the well-established cytosolic localization of the phosphorylase
      kinase complex. It is not wrong enough to firmly contradict, but it over-states the
      evidence and is better treated as a peripheral/uncertain localization rather than a
      core one.
    supported_by:
    - reference_id: file:human/PHKA1/PHKA1-uniprot.txt
      supporting_text: >-
        Although the final Cys may be farnesylated, the terminal
        CC       tripeptide is probably not removed, and the C-terminus is not
        CC       methylated.
    - reference_id: Reactome:R-HSA-71541
      supporting_text: >-
        The cytosolic phosphorylase kinase complex catalyzes the phosphorylation of the
        subunits of the glycogen phosphorylase (PYGM) dimer.
