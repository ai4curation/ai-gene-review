  evidence_type: TAS
  original_reference_id: PMID:8226841
  qualifier: enables
  review:
    summary: >-
      Traceable author statement (ProtInc) annotating PHKA1 with phosphorylase kinase
      activity, citing the cDNA cloning/mRNA-processing study of the alpha M subunit. That
      paper describes the alpha subunit's multiphosphorylation domain and PKA phosphorylation
