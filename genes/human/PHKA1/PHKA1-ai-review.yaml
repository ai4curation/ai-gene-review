core_functions:
- description: >-
    PHKA1 is the muscle alpha regulatory subunit of phosphorylase kinase. It is non-catalytic
    (a glucoamylase-like fold with no detectable enzyme activity) and contributes to the
    complex-level phosphorylase kinase activity by bridging the beta subunit to the
    gamma-delta catalytic subcomplex and holding the catalytic gamma subunit in an
    autoinhibited state until activation by PKA phosphorylation and Ca2+/calmodulin.
  molecular_function:
    id: GO:0005516
    label: calmodulin binding
  contributes_to_molecular_function:
    id: GO:0004689
    label: phosphorylase kinase activity
