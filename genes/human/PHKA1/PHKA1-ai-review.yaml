- term:
    id: GO:0004689
    label: phosphorylase kinase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000117
  qualifier: enables
  review:
    summary: >-
      ARBA electronic annotation asserting that PHKA1 "enables" phosphorylase kinase
      activity. Phosphorylase kinase activity is a property of the intact PhK holoenzyme,
      and the catalytic protein kinase is the gamma subunit (PHKG1/PHKG2). PHKA1 is a
      non-catalytic regulatory subunit; the cryo-EM structure shows the alpha subunit has a
      glucoamylase-like fold but no detectable enzyme activity.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      Annotating PHKA1 with "enables phosphorylase kinase activity" at the protein level
      over-attributes the holoenzyme's catalytic activity to a regulatory subunit that is
      itself not a kinase. The activity is better captured as a contribution to the complex
      (see core_functions contributes_to_molecular_function), not as an activity PHKA1
      independently enables.
    supported_by:
    - reference_id: PMID:38548794
      supporting_text: >-
        The α- and β-subunits possess glucoamylase-like domains, but exhibit no detectable
        enzyme activities.
    - reference_id: file:human/PHKA1/PHKA1-uniprot.txt
      supporting_text: >-
        Alpha (PHKA1 or PHKA2) and beta (PHKB)
        CC       are regulatory subunits, gamma (PHKG1 or PHKG2) is the catalytic
        CC       subunit, and delta is calmodulin.
- term:
    id: GO:0005516
    label: calmodulin binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: >-
      InterPro2GO electronic annotation of calmodulin binding. The alpha subunit is
      described as able to bind calmodulin, and UniProt annotates two predicted
      calmodulin-binding regions (residues 810-840 and 1046-1086). Calmodulin is also the
      delta subunit of the holoenzyme, and Ca2+/calmodulin is central to PhK regulation.
    action: ACCEPT
    reason: >-
      Calmodulin binding is a plausible and biologically meaningful molecular function of
      the alpha regulatory subunit, consistent with UniProt annotation and the Ca2+/calmodulin
      regulation of the complex.
    supported_by:
    - reference_id: file:human/PHKA1/PHKA1-uniprot.txt
      supporting_text: >-
        Phosphorylase b kinase catalyzes the phosphorylation of
        CC       serine in certain substrates, including troponin I. The alpha chain may
        CC       bind calmodulin.
