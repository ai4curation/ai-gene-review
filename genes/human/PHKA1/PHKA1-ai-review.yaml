id: P46020
gene_symbol: PHKA1
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  PHKA1 is the skeletal-muscle isoform of the alpha regulatory subunit ("alpha M") of
  phosphorylase kinase (PhK), a large (alpha-beta-gamma-delta)4 hexadecameric holoenzyme
  of glycogen metabolism. Within PhK the gamma subunit (PHKG1/PHKG2) is the catalytic
  protein kinase, while the alpha (PHKA1/PHKA2) and beta (PHKB) subunits are large,
  non-catalytic regulatory subunits and the delta subunit is calmodulin. The alpha subunit
  possesses a glucoamylase-like fold but has no detectable catalytic activity; it bridges
  the beta subunit to the gamma-delta catalytic subcomplex and holds the gamma subunit in
  an autoinhibited state. PhK is switched on by cAMP-dependent protein kinase (PKA)
  phosphorylation of serine residues in the alpha and beta subunits together with
  Ca2+/calmodulin, which relieves autoinhibition and activates the catalytic gamma
  subunit. Activated PhK phosphorylates glycogen phosphorylase (converting the inactive b
  form to the active a form), triggering glycogenolysis; in muscle this supplies
  glucose-1-phosphate for glycolytic ATP production during contraction. PHKA1 can also bind
  calmodulin directly. The protein is cytosolic. Loss-of-function variants in PHKA1 cause
  X-linked glycogen storage disease type IXd (GSD9D, muscle phosphorylase kinase
  deficiency), presenting with exercise intolerance, myalgia, cramps and occasional
  myoglobinuria.
