    supporting_text: >-
      counteracts the negative effect of ODC antizymes (AZs) OAZ1, OAZ2 and OAZ3 on ODC activity by
      competing with ODC for antizyme-binding
  - reference_id: PMID:17900240
    supporting_text: >-
      ODCp inhibits AZ1 function as efficiently as AZI both in vitro and in vivo
  directly_involved_in:
  - id: GO:0010967
    label: regulation of polyamine biosynthetic process
  - id: GO:0010509
    label: intracellular polyamine homeostasis
