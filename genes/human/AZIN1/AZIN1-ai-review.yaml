core_functions:
- description: >-
    Ornithine decarboxylase activator activity: AZIN1 binds ODC antizymes (OAZ1, OAZ2, OAZ3) with
    higher affinity than ODC does, sequestering the antizyme and releasing/stabilizing active ODC1.
    It thereby increases ODC activity indirectly, without any catalytic activity of its own (it is
    a catalytically inactive ODC paralog). GO:0042978 is defined as "Binds to and increases
    ornithine decarboxylase activity", which captures this antizyme-sequestration mechanism.
  molecular_function:
    id: GO:0042978
    label: ornithine decarboxylase activator activity
  supported_by:
