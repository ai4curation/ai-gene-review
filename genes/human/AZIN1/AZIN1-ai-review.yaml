- id: PMID:17900240
  title: Human ornithine decarboxylase paralogue (ODCp) is an antizyme inhibitor but
    not an arginine decarboxylase.
  findings:
  - statement: >-
      Establishes that the ODC-like protein is an enzymatically inactive antizyme inhibitor (not a
      decarboxylase) that binds antizymes AZ1-3 and rescues ODC activity and ODC degradation - the
      mechanism underlying AZIN1's ODC-activator function.
    reference_section_type: ABSTRACT
    supporting_text: >-
      ODCp inhibits AZ1 function as efficiently as AZI both in vitro and in vivo
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified; abstract-only in cache. The primary experimental subject is the paralog
      ODCp/AZIN2, but the paper defines the antizyme-inhibitor mechanism and UniProt cites it for
      AZIN1's FUNCTION and ubiquitination. Supports the ODC-activator and ODC-stabilization roles.
      The two IDA annotations sourced here (GO:0042978, GO:0042177) are biologically correct for
      AZIN1 even though the cached abstract foregrounds AZIN2.
- id: PMID:18508777
  title: Antizyme inhibitor 2 (AZIN2/ODCp) stimulates polyamine uptake in mammalian
    cells.
  findings:
  - statement: >-
      Shows that AZIN2 (the AZIN1 paralog), not AZIN1, stimulates polyamine uptake and counteracts
      antizymes; the polyamine-transport annotation transferred to AZIN1 is derived from this
      AZIN2 phenotype.
    reference_section_type: ABSTRACT
    supporting_text: >-
      Transfection of COS7 cells with mouse or human AZIN2, a novel member of the antizyme
      inhibitor family, recently characterized by our group, markedly stimulated polyamine uptake
  reference_review:
    relevance: MEDIUM
    correctness: MISCITED
    review_notes: >-
      PubMed-verified; abstract-only. The paper characterizes the paralog AZIN2/ODCp, not AZIN1.
      The IDA GO:1902269 (positive regulation of polyamine transmembrane transport) annotation on
      AZIN1 is sourced from an AZIN2 study, so for AZIN1 it is at best an orthology-inferred,
      non-core role rather than a directly demonstrated AZIN1 function.
