  label: Homo sapiens
description: >-
  Antizyme inhibitor 1 (AZIN1) is a positive regulator of polyamine biosynthesis. It is a
  catalytically inactive paralog of ornithine decarboxylase (ODC1): it retains the ODC
  (Orn/Lys/Arg decarboxylase class-II) fold but has lost ornithine decarboxylase catalytic
  activity and does not decarboxylate ornithine. Its function is to bind ornithine
  decarboxylase antizymes (OAZ1, OAZ2, OAZ3) with higher affinity than ODC does, thereby
  sequestering the antizymes and releasing/stabilizing active ODC1. By competing with ODC for
  antizyme binding, AZIN1 counteracts antizyme-mediated inhibition and antizyme-dependent
  proteasomal degradation of ODC, promoting formation of the catalytically active ODC homodimer
  and restoring polyamine production. AZIN1 is itself degraded by the ubiquitin-proteasome
  system, a process reduced in the presence of antizyme. It acts mainly in the cytoplasm, with
  reported nuclear localization by similarity, and functions as a monomer.
