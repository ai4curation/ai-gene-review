    label: cytoplasm
- description: >-
    Negative regulation of protein catabolic process: by sequestering antizymes, AZIN1 inhibits
    antizyme-dependent proteasomal degradation of ODC1, releasing ODC monomers from the inactive
    antizyme:ODC complex so they can re-form the catalytically active ODC homodimer. This
    stabilization of ODC is the mechanistic counterpart of AZIN1's ODC-activator role.
  molecular_function:
    id: GO:0042978
