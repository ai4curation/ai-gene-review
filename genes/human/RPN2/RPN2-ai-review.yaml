id: P04844
gene_symbol: RPN2
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  RPN2 (ribophorin II) is a non-catalytic subunit of the oligosaccharyltransferase
  (OST) complex, the endoplasmic-reticulum (ER) membrane enzyme that catalyzes the
  central, committed step of N-linked protein glycosylation. OST transfers a
  pre-assembled Glc3Man9GlcNAc2 oligosaccharide en bloc from the dolichol-pyrophosphate
  lipid carrier onto asparagine residues within Asn-X-Ser/Thr sequons of nascent
  secretory and membrane proteins. RPN2 is a multi-pass ER-membrane glycoprotein with
  a large lumenal domain and a C-terminal three-helix transmembrane region. It is one of
  the common non-catalytic core subunits (with RPN1/ribophorin I, DDOST/OST48, OST4,
  DAD1 and TMEM258) shared by the two human OST complexes: the co-translational,
  SEC61-associated OST-A complex (built around the catalytic subunit STT3A) and the
  post-translocational OST-B complex (built around STT3B). Within OST, RPN2 acts as a
  structural/accessory subunit that contributes to complex assembly and to full catalytic
  activity rather than performing catalysis itself. RPN2 is broadly expressed and, together
  with the other OST subunits, is essential for maturation of the many glycoproteins that
  transit the secretory pathway; loss-of-function is linked to a congenital disorder of
  glycosylation.
