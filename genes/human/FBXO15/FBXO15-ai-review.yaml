suggested_questions:
- question: What are the physiological substrate(s) recognized by FBXO15, and through which degron/recognition motif does its F-box-adjacent region engage them?
- question: Is the testis/fallopian-tube-enhanced expression of FBXO15 reflective of a tissue-specific substrate or biological process (e.g. in germ-cell or reproductive-tract biology)?
suggested_experiments:
- description: Affinity-purification mass spectrometry of tagged FBXO15 (full-length and the isoform-2 form lacking residues 1-76) from cells, validating SKP1/CUL1/RBX1 association and identifying candidate substrates enriched upon proteasome inhibition or by neddylation/CRL trapping.
- description: Define the FBXO15 substrate repertoire by quantitative ubiquitinome/proteome profiling comparing FBXO15-knockout versus wild-type cells (and rescue), to detect proteins stabilized in the absence of FBXO15 as candidate SCF-FBXO15 targets.
