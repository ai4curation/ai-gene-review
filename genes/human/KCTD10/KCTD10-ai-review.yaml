core_functions:
- description: >-
    Substrate-recognition (BTB/POZ) adapter subunit of a Cullin-3-RBX1 (CRL3/BCR)
    RING E3 ubiquitin ligase that selects diverse substrates - including CEP97,
    RHOB and SLC7A11 - for poly-ubiquitination and subsequent proteasomal or
    lysosomal degradation. This single adapter activity underlies KCTD10's
    pleiotropic roles in ciliogenesis, Rho signaling, ferroptosis and immunity.
  supported_by:
  - reference_id: PMID:30404837
    supporting_text: Cullin-3-KCTD10-mediated CEP97 degradation promotes primary cilium formation.
  - reference_id: PMID:38959043
    supporting_text: KCTD10 destabilizes SLC7A11 by promoting its polyubiquitylation for subsequent proteasome degradation, leading to shortened protein half-life.
  - reference_id: PMID:29358211
    supporting_text: RhoB is primarily K63 polyubiquitinated and subsequently degraded in lysosomes.
  molecular_function:
    id: GO:1990756
    label: ubiquitin-like ligase-substrate adaptor activity
  in_complex:
    id: GO:0031463
    label: Cul3-RING ubiquitin ligase complex
  directly_involved_in:
  - id: GO:0016567
    label: protein ubiquitination
  - id: GO:0043161
    label: proteasome-mediated ubiquitin-dependent protein catabolic process
  locations:
  - id: GO:0005737
    label: cytoplasm
  - id: GO:0005634
    label: nucleus
