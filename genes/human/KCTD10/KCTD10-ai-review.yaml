id: Q9H3F6
gene_symbol: KCTD10
product_type: PROTEIN
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  KCTD10 (potassium channel tetramerization domain-containing 10; also known as
  BACURD3) is, despite its name, not an ion channel but the substrate-recognition
  subunit of a Cullin-3-RBX1 (CRL3 / BCR) RING E3 ubiquitin ligase. Through its
  N-terminal BTB/POZ domain it binds Cullin-3 directly and oligomerizes (forming
  a homopentamer and a 5:5 assembly with CUL3), while its C-terminal region
  selects substrates for ubiquitination. KCTD10 directs both degradative and
  non-degradative ubiquitination of multiple, functionally unrelated substrates:
  K63-linked polyubiquitination and lysosomal degradation of the small GTPase
  RHOB (maintaining endothelial barrier integrity), proteasomal degradation of
  CEP97 (removing the CEP97-CP110 cap from the mother centriole to license
  primary cilium formation), destabilization of the cystine/glutamate antiporter
  SLC7A11 (lowering cystine uptake and glutathione synthesis and thereby
  promoting ferroptosis), and K27-linked ubiquitination of TICAM1/TRIF (promoting
  TLR3/4 innate immune signaling). It localizes to both the cytoplasm and the
  nucleus and belongs to the BACURD family of CUL3 adapters. Its single core
  molecular activity - CRL3 substrate-recognition adapter - thus links the
  ubiquitin-proteasome system to Rho/cytoskeletal signaling, ciliogenesis,
  redox/ferroptosis control, and innate immunity.
