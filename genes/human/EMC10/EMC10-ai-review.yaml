- id: PMID:32439656
  title: Structural basis for membrane insertion by the human ER membrane protein complex.
  findings:
  - statement: Cryo-EM structure of the human EMC, with EMC10's lumenal domain resolved; defines the signal peptide and Asn-182 glycosylation.
    reference_section_type: ABSTRACT
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: Structural basis for the EMC and EMC10 topology; abstract-only in cache.
- id: PMID:37196677
  title: EMC chaperone-CaV structure reveals an ion channel assembly intermediate.
  findings:
  - statement: Cryo-EM structures of the EMC bound to a CaV1.2 channel assembly intermediate reveal EMC transmembrane and cytoplasmic client-docking sites and a holdase/chaperone mode; the lumenal module (EMC1/EMC4/EMC7/EMC10) shifts during client engagement.
    reference_section_type: ABSTRACT
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: PubMed-verified (Nature 2023, 619:410-419). First EMC-client structure; supports an EMC holdase/chaperone function and places EMC10 in the lumenal module that moves on client binding. EMC-level (not EMC10-specific) mechanism.
- id: PMID:37199759
  title: A selectivity filter in the ER membrane protein complex limits protein misinsertion at the ER.
  findings:
  - statement: Using an improved human EMC structural model, positively charged residues at the entrance of the hydrophilic vestibule act as a charge-based selectivity filter that rejects mitochondrial TA proteins and enforces the positive-inside rule; the model includes EMC7/EMC10 single-pass topology.
    reference_section_type: ABSTRACT
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: PubMed-verified (J Cell Biol 2023, 222:8). EMC selectivity-filter mechanism; uses an improved EMC model that depicts EMC10 single-TMD topology. EMC-level mechanism, not EMC10 catalytic.
- id: PMID:38517390
  title: Structural insights into human EMC and its interaction with VDAC.
  findings:
  - statement: Cryo-EM apo- and VDAC-bound human EMC structures identify a gating plug within the hydrophilic vestibule and a conserved EMC-VDAC interaction at mitochondria-ER contact sites; in the VDAC1-bound state the EMC is unlikely to act as an insertase, indicating state-dependent functional switching.
    reference_section_type: ABSTRACT
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: PubMed-verified (Aging (Albany NY) 2024, 16:5501-5525). Adds EMC conformational/functional states and an EMC-VDAC contact-site role; EMC-complex-level, not EMC10-specific.
suggested_questions:
- question: Is the secreted/angiogenic activity of EMC10 mechanistically independent of its EMC insertase role, and does the NEDDFAS neurodevelopmental phenotype arise from loss of EMC-mediated membrane protein biogenesis, loss of the secreted factor, or both?
- question: What is the structural contribution of EMC10's lumenal domain to EMC stability and substrate handling?
suggested_experiments:
- description: Separate the membrane (EMC) and secreted (HSS1) functions using isoform-specific or domain-targeted knock-ins, and assess effects on EMC client biogenesis versus angiogenesis/endothelial signaling.
- description: Define the EMC10-dependent client repertoire by quantitative membrane proteomics in EMC10-deficient versus rescued neurons to connect the molecular EMC defect to the NEDDFAS phenotype.
