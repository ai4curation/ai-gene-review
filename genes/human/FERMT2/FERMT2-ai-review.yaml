suggested_questions:
- question: Which FERMT2 pathway outputs should be treated as general kindlin-2 
    biology versus cell-type-specific consequences of integrin/focal-adhesion 
    scaffolding?
- question: Does Alzheimer-associated FERMT2 biology act through brain vascular 
    barrier, microglial adhesion/migration, synaptic extracellular-matrix 
    responses, or a different cell type?
- question: Can partner-specific annotations replace remaining generic or 
    context-dependent interaction terms after full-text review of the source 
    papers?
suggested_experiments:
- hypothesis: FERMT2 Alzheimer relevance depends on integrin/focal-adhesion 
    regulation in vascular or glial cell adhesion states.
  description: Perturb FERMT2 in human iPSC-derived endothelial cells, 
    pericytes, astrocytes, and microglia, then quantify integrin activation, 
    focal-adhesion dynamics, barrier integrity, migration, and 
    extracellular-matrix responses under amyloid or inflammatory stress.
  experiment_type: cell-type-specific adhesion and barrier assay
- hypothesis: FERMT2 phosphoinositide binding controls integrin activation by 
    recruiting kindlin-2 to PIP3-rich adhesion membranes.
  description: Compare wild-type FERMT2 with PH-domain phosphoinositide-binding 
    mutants in endogenous rescue assays measuring PIP3-dependent membrane 
    recruitment, talin cooperation, integrin activation, focal-adhesion 
    assembly, and cell spreading.
  experiment_type: structure-function rescue assay
