id: Q96AC1
gene_symbol: FERMT2
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: 'FERMT2 encodes kindlin-2, a broadly expressed FERM/PH domain-containing
  adaptor that localizes to focal adhesions, the cytoplasmic side of membranes, cytoskeleton,
  cell cortex, and related adhesion structures. Kindlin-2 binds integrin cytoplasmic
  tails and phosphoinositide-rich membranes, cooperates with talin to promote integrin
  activation, and links cell-extracellular matrix adhesions to focal adhesion assembly,
  actin organization, cell spreading, and cell-shape control. It also participates
  in context-specific signaling branches including Wnt/beta-catenin, TGF-beta/Smad,
  adherens-junction vascular barrier regulation, and mesenchymal stem-cell fate control.'
