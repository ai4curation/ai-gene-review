      inhibitors, GIGYF2 and 4EHP.
proposed_new_terms: []
suggested_questions:
- Which endogenous mRNAs depend on GIGYF2 (versus GIGYF1) for RQC-coupled repression,
  and how is target selection partitioned between ZNF598-, TTP- and miRNA-directed
  recruitment?
- How do GIGYF2 loss-of-function variants produce neurodevelopmental/neuropsychiatric
  phenotypes - via failure of RQC-coupled repression, dysregulated dendritic translation,
  or altered IGF signaling?
suggested_experiments:
- Ribosome profiling plus mRNA stability measurements in GIGYF2 knockout cells (and
  4EHP-binding-motif or GYF-domain separation-of-function mutants) to define target mRNAs
  and the contribution of each interaction.
- Reconstitution of the 4EHP-GIGYF2-ZNF598 module on stalled-ribosome substrates to test
  whether GIGYF2 directly couples collision sensing to initiation shutdown.
