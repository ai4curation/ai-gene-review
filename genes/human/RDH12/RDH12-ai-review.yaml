- id: PMID:12226107
  title: Dual-substrate specificity short chain retinol dehydrogenases from the vertebrate
    retina.
  findings:
  - statement: >-
      RDH12 is one of four novel SDR retinol dehydrogenases (RDH11-14) with
      dual-substrate specificity, metabolizing all-trans- and cis-retinols with
      C15 pro-R specificity; source of the IDA molecular-function annotations.
    reference_section_type: ABSTRACT
    supporting_text: >-
      four retinol dehydrogenases (RDH11-14) that display dual-substrate
      specificity, uniquely metabolizing all-trans- and cis-retinols
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified original identification and enzymatic characterization of
      RDH12; abstract-only cache but the substrate-specificity claims are
      explicit in the abstract.
- id: PMID:15865448
  title: 'Biochemical properties of purified human retinol dehydrogenase 12 (RDH12):
    catalytic efficiency toward retinoids and C9 aldehydes and effects of cellular
    retinol-binding protein type I (CRBPI) and cellular retinaldehyde-binding protein
    (CRALBP) on the oxidation and reduction of retinoids.'
  findings:
  - statement: >-
      Purified human RDH12 strongly prefers NADP(H) over NAD(H) (~2000-fold
      lower Km), is most efficient for all-trans-retinal, and in most tissues
      primarily reduces all-trans-retinaldehyde; localizes to the ER membrane.
    reference_section_type: ABSTRACT
    supporting_text: >-
      RDH12 exhibits approximately 2000-fold lower K(m) values for NADP(+) and
      NADPH than for NAD(+) and NADH
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified biochemical characterization of purified human RDH12;
      basis for cofactor preference and ER-membrane localization.
- id: PMID:19686838
  title: Retinol dehydrogenase 12 detoxifies 4-hydroxynonenal in photoreceptor cells.
  findings:
  - statement: >-
      In mouse retina RDH12 reduces the lipid-peroxidation aldehyde 4-HNE to a
      nontoxic alcohol in photoreceptor inner segments, protecting against
      light-induced apoptosis; its visual-cycle contribution is indirect.
    reference_section_type: ABSTRACT
    supporting_text: >-
      in mouse retina RDH12 reduces 4-HNE to a nontoxic alcohol, protecting
      cellular macromolecules against oxidative modification and protecting
      photoreceptors from light-induced apoptosis
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified; full text available in cache. Establishes the in-vivo
      aldehyde-detoxification (GO:0110095) role and inner-segment localization.
