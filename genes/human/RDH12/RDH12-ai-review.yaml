gene_symbol: RDH12
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  RDH12 (retinol dehydrogenase 12; SDR family 7C member 2) is a NADPH-dependent
  retinaldehyde reductase / retinol dehydrogenase of the short-chain
  dehydrogenase/reductase (SDR) superfamily. It is an endoplasmic reticulum
  (microsomal) membrane enzyme, expressed most notably in the retina where it
  localizes to photoreceptor inner segments. With a strong preference for
  NADP(H) over NAD(H), it reduces all-trans-, 9-cis- and 11-cis-retinaldehyde to
  the corresponding retinols (EC 1.1.1.300), and, with lower affinity, reduces
  medium-chain lipid-peroxidation aldehydes such as 4-hydroxynonenal and
  trans-2-nonenal. In photoreceptors its principal physiological role is to
  reduce all-trans-retinaldehyde (contributing an auxiliary, inner-segment step
  complementary to outer-segment retinol dehydrogenases in the visual cycle) and
  to detoxify reactive lipid-peroxidation aldehydes generated during
  light-induced oxidative stress, thereby protecting photoreceptors from
  apoptosis. Biallelic loss-of-function variants in RDH12 cause Leber congenital
  amaurosis type 13 (LCA13) and autosomal-recessive retinitis pigmentosa
  (RP53).
