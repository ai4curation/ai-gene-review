proposed_new_terms: []
suggested_questions:
- question: >-
    Is SC5D's role in modulating ferroptosis (via 7-DHC) physiologically
    relevant in normal tissues, or primarily a cancer-context phenomenon?
- question: >-
    To what extent does SC5D contribute to the Bloch versus Kandutsch-Russell
    arms of cholesterol biosynthesis in different human tissues?
suggested_experiments:
- description: >-
    Reconstitute purified human SC5D with cytochrome b5 / cytochrome b5 reductase
    to measure the di-iron-dependent desaturation kinetics on lathosterol versus
    5alpha-cholesta-7,24-dien-3beta-ol and confirm cofactor stoichiometry.
  hypothesis: >-
    SC5D is a non-heme di-iron desaturase that uses electrons from cytochrome b5
    to desaturate multiple Delta(7)-sterol substrates.
- description: >-
    Site-directed mutagenesis of the three histidine-box motifs to test their
    requirement for iron binding and catalysis, complementing the disease-variant
    (R29Q, Y46S, G211D) structure-function analysis.
  hypothesis: >-
    The conserved histidine-box motifs coordinate the catalytic di-iron center
    and are essential for C5-sterol desaturase activity.
