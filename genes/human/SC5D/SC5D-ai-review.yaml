- term:
    id: GO:0110076
    label: negative regulation of ferroptosis
  evidence_type: IMP
  original_reference_id: PMID:38297129
  qualifier: involved_in
  review:
    summary: >-
      Loss-of-function (IMP) evidence that SC5D negatively regulates ferroptosis.
      As a distal-cholesterol-biosynthesis enzyme, SC5D produces 7-DHC, a potent
      radical-trapping sterol that shields (phospho)lipids from autoxidation;
      loss of SC5D lowers 7-DHC and sensitizes cells to ferroptosis. This is a
      real but indirect, non-core role mediated by the 7-DHC product.
    action: KEEP_AS_NON_CORE
    reason: >-
      Supported experimentally, but the effect is a downstream/indirect
      consequence of SC5D's catalytic product (7-DHC) rather than a distinct
      molecular activity of SC5D itself; the core function is C5-sterol
      desaturation in cholesterol biosynthesis. Keep as a non-core process.
    supported_by:
    - reference_id: PMID:38297129
      supporting_text: "we now show that 7-DHC accumulation"
