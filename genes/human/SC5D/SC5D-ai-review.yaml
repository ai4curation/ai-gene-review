  qualifier: involved_in
  review:
    summary: >-
      Loss-of-function (IMP) evidence from a genome-wide CRISPR screen: SC5D is
      an anti-ferroptotic distal-cholesterol-biosynthesis gene. SC5D knockout
      increased ferroptosis susceptibility and lowered 7-DHC, and re-expression
      rescued the phenotype. Indirect, non-core role via the 7-DHC product.
