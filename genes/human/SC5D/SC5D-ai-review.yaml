id: O75845
gene_symbol: SC5D
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  SC5D encodes lathosterol oxidase (sterol-C5-desaturase / delta7-sterol
  5(6)-desaturase; EC 1.14.19.20), a non-heme di-iron oxidoreductase of the
  sterol desaturase family that is anchored as a multi-pass protein in the
  endoplasmic reticulum membrane. It introduces the C5-6 double bond into
  lathosterol, converting it to 7-dehydrocholesterol (7-DHC) using molecular
  oxygen and electrons delivered from cytochrome b5. This is the penultimate
  step of cholesterol biosynthesis (the Kandutsch-Russell arm), immediately
  upstream of DHCR7, which reduces 7-DHC to cholesterol; the enzyme can act on
  additional Delta(7)-sterols such as 5alpha-cholesta-7,24-dien-3beta-ol in the
  Bloch arm. The three conserved histidine-box motifs coordinate the di-iron
  center that constitutes the active site. Loss-of-function variants cause
  lathosterolosis, an autosomal recessive disorder with elevated lathosterol and
  a Smith-Lemli-Opitz-like multiple-malformation / dysmorphism phenotype with
  liver disease and lysosomal storage; the mouse knockout is perinatal-lethal
  with craniofacial and limb patterning defects consistent with impaired
  hedgehog signalling from cholesterol deficiency. Because its product 7-DHC is
  a highly reactive radical-trapping sterol, SC5D also indirectly modulates
  ferroptosis sensitivity.
