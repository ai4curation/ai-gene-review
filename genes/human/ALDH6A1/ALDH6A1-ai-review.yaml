  title: Insights into RNA biology from an atlas of mammalian mRNA-binding proteins.
  findings:
  - statement: >-
      Proteome-wide mRNA-interactome capture in HeLa cells recovered ~860 candidate
      RNA-binding proteins, explicitly including many intermediary-metabolism enzymes;
      ALDH6A1 is one such enzyme with no established RNA-regulatory role.
    reference_section_type: ABSTRACT
    supporting_text: >-
      shedding light on RBPs in disease, RNA-binding enzymes of intermediary
      metabolism
  reference_review:
    relevance: LOW
    correctness: VERIFIED
    review_notes: >-
      Correctly cited high-throughput interactome-capture screen (abstract-only in
      cache), source of the HDA RNA binding annotation. The screen enriched for
      metabolic enzymes; there is no independent evidence that MMSDH has a
      physiological RNA-binding function, so the resulting GO:0003723 annotation is an
      over-annotation.
- id: PMID:23835272
  title: Mutations in ALDH6A1 encoding methylmalonate semialdehyde dehydrogenase are
    associated with dysmyelination and transient methylmalonic aciduria.
  findings:
  - statement: >-
      A patient with biallelic ALDH6A1 mutations (p.Tyr172His/p.Arg535Cys) had
      directly measured, markedly reduced MMSDH enzyme activity in fibroblasts,
      confirming the enzyme's methylmalonate-semialdehyde dehydrogenase activity and
      its role in valine and thymine catabolism.
    reference_section_type: RESULTS
    supporting_text: >-
      Subsequent MMSDH enzyme assay demonstrated reduced activity
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Full text available and read. This is the key human functional paper and the
      source of all three BHF-UCL IMP annotations (GO:0004491, GO:0006210, GO:0006574).
      Directly links ALDH6A1 genotype to reduced MMSDH catalytic activity and describes
      the valine/thymine catabolic pathway placement.
