      Cloned rat and human MMSDH cDNA and characterized the N-terminal mitochondrial
      targeting peptide; established MMSDH as a CoA-dependent member of the ALDH
      superfamily.
    reference_section_type: RESULTS
    supporting_text: >-
      superfamily of aldehyde dehydrogenases and is closely related to betaine
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Original cDNA-cloning paper for MMSDH; abstract-only in cache. Establishes the
      enzyme's identity, CoA dependence, ALDH-superfamily membership, mitochondrial
      targeting peptide, and kidney/liver-predominant tissue distribution. Correctly
      cited for the NAS mitochondrion annotation.
