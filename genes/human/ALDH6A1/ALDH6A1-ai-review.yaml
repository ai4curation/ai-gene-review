  label: Homo sapiens
description: >-
  ALDH6A1 encodes methylmalonate-semialdehyde/malonate-semialdehyde dehydrogenase
  [acylating] (MMSDH, EC 1.2.1.27), a mitochondrial-matrix, NAD+- and CoA-dependent
  member of the aldehyde dehydrogenase (ALDH) superfamily. Unlike most ALDHs, MMSDH
  is acylating: it couples NAD+-dependent oxidative decarboxylation of its
  semialdehyde substrate to formation of a CoA thioester. The enzyme catalyzes the
  shared distal step of valine catabolism and of the beta-alanine/thymine catabolic
  route. It oxidatively decarboxylates methylmalonate semialdehyde (both (R)- and
  (S)-enantiomers, derived from valine via 3-hydroxyisobutyrate and from thymine via
  3-aminoisobutyrate) to propionyl-CoA, and malonate semialdehyde (from the
  beta-alanine branch of uracil/cytidine catabolism) to acetyl-CoA, releasing
  bicarbonate and NADH. It is synthesized with an N-terminal mitochondrial transit
  peptide (residues 1-33) and assembles as a homotetramer; the catalytic nucleophile
  is Cys317 and it binds NAD+ through a canonical Rossmann-like site. ALDH6A1 is most
  highly expressed in kidney and liver. Loss-of-function variants cause the rare
  autosomal-recessive methylmalonate semialdehyde dehydrogenase deficiency (MMSDHD),
  presenting with variable methylmalonic/3-hydroxyisobutyric aciduria, elevated
  beta-alanine and aminoisobutyric acid, developmental delay, and dysmyelination.
