suggested_questions:
- question: >-
    Do specific ALG1 missense variants that retain partial mannosyltransferase
    activity or impair complex formation with ALG2/ALG11 correlate with milder
    ALG1-CDG phenotypes?
suggested_experiments:
- description: >-
    Reconstitute human ALG1 with ALG2 and ALG11 and measure the kinetics of
    sequential mannose transfer onto GlcNAc2-PP-dolichol to test whether ALG1
    activity is rate-limiting for early LLO assembly on the cytoplasmic face of
    the ER.
  hypothesis: >-
    ALG1 catalytic output is rate-limiting for early cytoplasmic-face LLO
    assembly, so partial-activity variants set the ceiling on downstream
    mannosylation and correlate with residual N-glycosylation.
