id: Q9BT22
gene_symbol: ALG1
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  ALG1 is the endoplasmic reticulum beta-1,4-mannosyltransferase
  (chitobiosyldiphosphodolichol beta-mannosyltransferase; EC 2.4.1.142) that
  catalyzes the first mannose-addition step of dolichol-linked oligosaccharide
  (lipid-linked oligosaccharide, LLO) assembly. Using GDP-mannose as donor, it
  transfers the first mannose onto the chitobiose core (GlcNAc2-PP-dolichol) to
  form Man1GlcNAc2-PP-dolichol, acting on the cytoplasmic face of the ER
  membrane; the product is the substrate for the next enzyme, ALG2. ALG1 is an
  ER membrane protein and contributes to the biosynthesis of the N-glycan
  precursor used in protein asparagine (N)-linked glycosylation. Loss of ALG1
  function causes ALG1-CDG (congenital disorder of glycosylation type Ik), a
  severe autosomal-recessive multisystem disorder with prominent neurological
  involvement, dysmorphism, hematologic and immune features, and high early
  mortality, characterized by hypoglycosylated serum glycoproteins.
