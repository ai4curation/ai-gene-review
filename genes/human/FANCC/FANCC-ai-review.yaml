- term:
    id: GO:0060090
    label: molecular adaptor activity
  evidence_type: IPI
  original_reference_id: PMID:12649160
  qualifier: enables
  review:
    summary: 'Proposed informative molecular function replacing the uninformative ''protein binding''
      IPI annotations. FANCC acts as a non-catalytic molecular adaptor within the FA core complex substrate-recognition
      module: it binds FANCE directly and, with FANCF, bridges the catalytic FANCL/UBE2T module to the
      FANCD2-FANCI substrate. Cryo-EM shows FANCC-FANCE-FANCF constitute the single-copy substrate-recognition
      module of the complex.'
    action: NEW
    reason: FANCC has no catalytic activity; its function is to bind and bridge partners (FANCE, and via
      assembly FANCA) so the complex can recognize and monoubiquitinate FANCD2-FANCI. Molecular adaptor
      activity is a more informative MF than 'protein binding' and underpins the ubiquitin-ligase core
      function.
    supported_by:
    - reference_id: PMID:12649160
      supporting_text: A central region of FANCE was sufficient for FANCC binding. A Leu554Pro mutant
        of FANCC failed to interact with FANCE.
    - reference_id: PMID:9398857
      supporting_text: we demonstrate the FAA and FAC bind each other and form a complex. Protein binding
        correlates with the functional activity of FAA and FAC, as patient-derived mutant FAC (L554P)
        fails to bind FAA.
core_functions:
- description: Non-catalytic substrate-recognition subunit of the Fanconi anemia (FA) core complex E3
    ubiquitin ligase; FANCC binds FANCE (and, via complex assembly, FANCA) to form, with FANCF, the module
    that recruits and positions the FANCD2-FANCI substrate for monoubiquitination, thereby contributing
    to the ubiquitin-ligase activity of the complex.
