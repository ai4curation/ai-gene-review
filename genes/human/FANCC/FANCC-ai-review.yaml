suggested_questions:
- question: Is FANCC's molecular role best captured as a molecular adaptor within the substrate-recognition
    module, and should GO provide a subunit-level term for FA core complex substrate recognition?
  experts:
  - D'Andrea AD
  - Wang W
- question: Are the cytokine-signaling (STAT1/PKR) and oxidative-stress roles of FANCC mechanistically
    independent of the FA core complex, and do they warrant separate curation as non-core functions?
  experts:
  - Bagby GC
  - Pang Q
suggested_experiments:
- hypothesis: FANCC's contribution to FANCD2-FANCI monoubiquitination is mediated by its adaptor/substrate-recognition
    role rather than by supporting overall complex integrity.
  description: Design structure-guided separation-of-function mutants of FANCC that disrupt FANCE/substrate
    binding without affecting overall complex assembly, and assay FANCD2-FANCI monoubiquitination and
    ICL sensitivity.
  experiment_type: structure-function mutagenesis
- hypothesis: FANCC is required for efficient E3-ligase activity of the reconstituted FA core complex.
  description: Quantitatively reconstitute FANCD2-FANCI monoubiquitination in vitro with and without FANCC
    to measure its contribution to the complex's ubiquitin-ligase activity.
  experiment_type: in vitro reconstitution / biochemistry
