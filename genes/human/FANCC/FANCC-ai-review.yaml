id: Q00597
gene_symbol: FANCC
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: Fanconi anemia group C protein (FANCC) is a non-catalytic subunit of the multiprotein Fanconi
  anemia (FA) core complex, an E3 ubiquitin ligase that monoubiquitinates the FANCD2-FANCI heterodimer
  in response to DNA damage. Within the FA core complex FANCC together with FANCE and FANCF forms the
  substrate-recognition module that positions the FANCD2-FANCI substrate for monoubiquitination by the
  catalytic FANCL/UBE2T module. FANCC binds directly to FANCE, and its assembly with FANCA is required
  for integrity and function of the complex; the patient mutation L554P abolishes both interactions and
  complementing activity. Activated (monoubiquitinated) FANCD2-FANCI then coordinates replication-coupled
  DNA interstrand cross-link repair, homologous recombination and REV1-dependent translesion synthesis,
  protecting cells from cross-linking agents and maintaining chromosome stability; loss of FANCC causes
  Fanconi anemia (bone marrow failure, congenital malformations and cancer predisposition). FANCC exists
  as a predominantly nuclear form that acts on chromatin and a minor cytoplasmic form; the cytoplasmic
  pool associates with chaperones (e.g. GRP94/HSP90B1) and has additional, structurally separable roles
  in cytokine signaling (IFN-gamma/STAT1) and suppression of apoptosis via modulation of the protein kinase
  PKR (EIF2AK2), together with a proposed role in the cellular response to oxidative stress.
existing_annotations:
- term:
    id: GO:0034599
    label: cellular response to oxidative stress
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: involved_in
  review:
    summary: Phylogenetically inferred oxidative-stress response, driven largely by mouse Fancc knockout
      data. FANCC/FA-deficient cells show hypersensitivity to oxidative stress and FANCC has proposed
      redox-regulatory/detoxification roles, but this is peripheral to and separable from its core ICL-repair
      function.
    action: KEEP_AS_NON_CORE
    reason: A genuine but context-specific/secondary role. FANCC's core molecular role is as a structural
      subunit of the FA core E3 ligase; oxidative-stress protection is a downstream/indirect consequence
      and is structurally separable from the cross-linker-resistance function (mutations that disrupt
      cytokine/stress signaling still complement MMC sensitivity and FANCD2 activation).
    supported_by:
    - reference_id: PMID:11520787
      supporting_text: All mutants complemented mitomycin C (MMC) hypersensitive phenotype of FA-C cells
        and corrected aberrant posttranslational activation of FANCD2 in FA-C mutant cells. However, 2
        of the mutants, S249A and E251A, failed to correct defective STAT1 activation.
    propagation_review:
      root_cause: NO_FAILURE_NON_CORE
      failure_modes:
      - ROLE_CONFLATION
      source_entities:
      - source_id: PANTHER:PTN000423656
        source_label: FANCC family node
        source_status: SUPPORTS_TRANSFER
        comment: Redox/oxidative-stress phenotype supported mainly by mouse Fancc (MGI:95480) knockouts;
          a real but non-core, downstream role.
- term:
    id: GO:0006289
    label: nucleotide-excision repair
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: involved_in
  review:
    summary: FANCC is not a canonical nucleotide-excision repair (NER) factor. The FA pathway coordinates
      incision, homologous recombination and translesion synthesis during interstrand cross-link repair,
      and can intersect with NER machinery, but FANCC itself has no NER enzymatic role.
    action: MARK_AS_OVER_ANNOTATED
    reason: Likely an over-propagated phylogenetic inference. The correct, well-supported process for
      FANCC is interstrand cross-link repair (GO:0036297), which is separately annotated; annotating classical
      NER over-states FANCC's role.
    supported_by:
    - reference_id: PMID:19965384
      supporting_text: FANCI-FANCD2 is required for replication-coupled ICL repair in S phase.
    propagation_review:
      root_cause: TERM_SCOPING_PROBLEM
      failure_modes:
      - ROLE_CONFLATION
      - GRANULARITY_MISMATCH
      source_entities:
      - source_id: PANTHER:PTN000423656
        source_label: FANCC family node
        source_status: SUPPORTS_SOURCE_BUT_NOT_TARGET
        comment: The FA pathway can intersect NER machinery during ICL processing, but FANCC is not a
          nucleotide-excision-repair factor; ICL repair (GO:0036297) is the correct process.
