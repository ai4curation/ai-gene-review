- term:
    id: GO:0001669
    label: acrosomal vesicle
  evidence_type: IEA
  original_reference_id: GO_REF:0000107
  qualifier: located_in
  review:
    summary: Ensembl-orthology electronic annotation transferred from mouse Atp6v1e2
      (Q9D593) placing the protein in the acrosomal vesicle. The acrosome is a
      lysosome-related organelle in sperm, and V-ATPase-mediated acidification there
      is biologically plausible for this testis/sperm-enriched isoform, but the
      localization has not been directly demonstrated for the human protein.
    action: KEEP_AS_NON_CORE
    reason: Plausible and consistent with the testis/sperm-enriched expression of
      ATP6V1E2, but supported only by orthology-based IEA without direct human
      experimental evidence; retained as a non-core localization.
- term:
    id: GO:0016241
    label: regulation of macroautophagy
  evidence_type: NAS
  original_reference_id: PMID:22982048
  qualifier: involved_in
  review:
    summary: NAS (non-traceable author statement) annotation derived from a study of
      lipofuscin formation in stress-induced senescent fibroblasts. The paper
      concerns macroautophagy and lysosomal activity in fibroblasts and does not
      study the testis-specific ATP6V1E2 isoform. Any V-ATPase role in autophagy is
      an indirect downstream consequence of lysosomal acidification.
    action: MARK_AS_OVER_ANNOTATED
    reason: The annotation is NAS without a traceable experimental link to this
      isoform; macroautophagy regulation is not a core function of this
      testis-restricted V1 stalk subunit and is at best an indirect consequence of
      organelle acidification.
