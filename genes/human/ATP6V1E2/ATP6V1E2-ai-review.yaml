core_functions:
- description: Structural component of the V1 peripheral (stator) stalk of the
    vacuolar H(+)-ATPase, forming an EG heterodimer that anchors the (AB)3 catalytic
    head and enables ATP hydrolysis-driven rotary proton transport
  supported_by:
  - reference_id: file:human/ATP6V1E2/ATP6V1E2-uniprot.txt
    support_type: SUPPORTED_BY_DATABASE_ENTRY
    supporting_text: The V1 complex consists of three catalytic AB heterodimers that
      form a heterohexamer, three peripheral stalks each consisting of EG
      heterodimers, one central rotor including subunits D and F, and the regulatory
      subunits C and H.
  molecular_function:
    id: GO:0046961
    label: proton-transporting ATPase activity, rotational mechanism
  directly_involved_in:
    id: GO:1902600
    label: proton transmembrane transport
  locations:
  - id: GO:0033178
    label: proton-transporting two-sector ATPase complex, catalytic domain
proposed_new_terms: []
suggested_questions:
- Is the V-ATPase complex containing ATP6V1E2 specifically localized to the sperm
  acrosome, and does it acidify the acrosomal lumen during spermatogenesis or the
  acrosome reaction?
- Does ATP6V1E2 functionally substitute for ATP6V1E1 within the same V-ATPase
  holoenzyme in testis, or do the two paralogs assemble into distinct, tissue-specific
  V-ATPase populations?
- Does loss of ATP6V1E2 cause a male-fertility or sperm-function phenotype distinct
  from that of the ubiquitous ATP6V1E1?
suggested_experiments:
- Immunolocalization (and immuno-EM) of ATP6V1E2 in human/mouse testis and
  spermatozoa to confirm acrosomal-vesicle localization and distinguish it from
  ATP6V1E1.
- Reconstitution or co-immunoprecipitation assays to test EG heterodimer formation
  of ATP6V1E2 with ATP6V1G1/G2 and incorporation into an assembled, ATP-hydrolyzing
  V-ATPase complex.
- Generation and phenotyping of an Atp6v1e2 knockout (sperm count, motility,
  acrosome reaction, acrosomal pH, fertility) to define its in vivo role.
