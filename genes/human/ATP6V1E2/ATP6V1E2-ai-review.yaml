    label: cytosol
  evidence_type: TAS
  original_reference_id: Reactome:R-HSA-1222516
  qualifier: located_in
  review:
    summary: Reactome reaction-level TAS annotation to cytosol. The V1 sector is
      cytoplasmic/peripheral, so 'cytosol' is defensible, but it is a coarse location
      that fails to capture the V-ATPase-complex / organelle-membrane functional
      context.
    action: KEEP_AS_NON_CORE
    reason: Defensible but coarse; the V1 subunit is peripheral/cytoplasmic, yet the
      functionally informative location is the V-ATPase complex on intracellular
      membranes. Retained as non-core.
