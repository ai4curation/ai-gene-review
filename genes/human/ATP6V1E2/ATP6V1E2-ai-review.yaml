id: Q96A05
gene_symbol: ATP6V1E2
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: ATP6V1E2 encodes the testis/sperm-enriched isoform of subunit E of the
  peripheral V1 sector of the vacuolar-type H(+)-ATPase (V-ATPase), a rotary proton
  pump. The V-ATPase comprises a cytoplasmic V1 complex that hydrolyzes ATP and a
  membrane-integral V0 complex that translocates protons across the membrane. Within
  V1, subunit E pairs with subunit G to form the EG heterodimers that constitute the
  three peripheral (stator) stalks. These stalks hold the (AB)3 catalytic head
  stationary against the torque generated when the central D/F rotor turns, coupling
  ATP hydrolysis in V1 to proton translocation through V0. ATP6V1E2 is the
  tissue-restricted paralog of the ubiquitously expressed ATP6V1E1; it is enriched
  in testis and sperm, where a V-ATPase containing this subunit is plausibly
  associated with the acrosome (a lysosome-related organelle). Its core molecular
  role is as a structural V1 peripheral-stalk component that enables ATP
  hydrolysis-driven, rotary proton transport, contributing to acidification of
  intracellular compartments.
existing_annotations:
- term:
    id: GO:1902600
    label: proton transmembrane transport
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: involved_in
  review:
    summary: Phylogenetic (IBA) annotation that subunit E of V-ATPase participates
      in proton transmembrane transport. This is the central biological process for
      the V-ATPase complex and is the core function of this subunit, which forms part
      of the EG peripheral stalk required for the rotary pumping mechanism.
    action: ACCEPT
    reason: The V-ATPase, of which subunit E is an obligate structural component,
      hydrolyzes ATP to drive proton translocation across membranes. This IBA
      annotation correctly captures the core biological role of the gene product.
- term:
    id: GO:0046961
    label: proton-transporting ATPase activity, rotational mechanism
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: enables
  review:
    summary: Phylogenetic (IBA) annotation to the rotary proton-transporting ATPase
      molecular function. Subunit E does not itself hydrolyze ATP, but as part of
      the EG stator stalks it is an essential structural component of the holoenzyme
      that enables this activity; GO annotates subunits of the complex to the
      complex activity.
    action: ACCEPT
    reason: Subunit E is required for the rotary mechanism by anchoring the catalytic
      head; annotating the subunit with the complex molecular function follows GO
      convention for obligate complex members and represents the core function.
- term:
    id: GO:0033178
    label: proton-transporting two-sector ATPase complex, catalytic domain
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: part_of
  review:
    summary: InterPro-based (IPR002842, V-ATPase V1 E subunit) annotation placing
      ATP6V1E2 in the catalytic (V1) domain of the two-sector ATPase complex. The
      V1 sector is the ATP-hydrolyzing catalytic domain of the V-ATPase, and subunit
      E is a component of it.
    action: ACCEPT
    reason: Subunit E is part of the V1 (catalytic) sector of the V-ATPase, so this
      complex-membership annotation correctly captures the cellular-component context
      and is consistent with the curated complex membership documented in UniProt.
    supported_by:
    - reference_id: file:human/ATP6V1E2/ATP6V1E2-uniprot.txt
