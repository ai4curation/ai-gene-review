  - reference_id: file:human/SGMS2/SGMS2-uniprot.txt
    supporting_text: >-
      phosphocholine head group of phosphatidylcholine (PC) on to ceramide
- description: >-
    Contributes to sphingomyelin biosynthesis at the plasma membrane, supplying
    plasma-membrane sphingomyelin (a structural component of lipid rafts) and, through
    the co-produced diacylglycerol and consumed ceramide, modulating membrane lipid
    signaling; loss of this activity underlies SGMS2-related skeletal disease with
    defective bone mineralization.
  molecular_function:
    id: GO:0033188
