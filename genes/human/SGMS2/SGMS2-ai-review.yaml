- term:
    id: GO:0046513
    label: ceramide biosynthetic process
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: involved_in
  review:
    summary: >-
      Phylogenetically inferred involvement in ceramide biosynthesis. The physiological
      forward reaction of SGMS2 consumes ceramide (ceramide + PC -> SM + DAG); ceramide
      is regenerated only by the thermodynamically reversible back-reaction. Annotating
      SGMS2 to ceramide biosynthesis over-states a minor/reverse-direction contribution.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      SGMS2's defining direction removes ceramide; net ceramide biosynthesis is not the
      characteristic role. This is an over-broad phylogenetic inference.
