core_functions:
- description: >-
    Sphingomyelin synthase: transfers the phosphocholine head group from
    phosphatidylcholine to ceramide, producing sphingomyelin and diacylglycerol; the
    terminal, PC-dependent step of de novo sphingomyelin biosynthesis, occurring
    primarily at the plasma membrane.
  molecular_function:
