id: Q8NHU3
gene_symbol: SGMS2
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  SGMS2 (sphingomyelin synthase 2, SMS2) is one of the two mammalian sphingomyelin
  synthases (EC 2.7.8.27) and the paralog of SGMS1. It is a multi-pass integral
  membrane protein that catalyzes the transfer of the phosphocholine head group from
  phosphatidylcholine (PC) onto ceramide, producing sphingomyelin (SM) and
  diacylglycerol (DAG); the reaction is reversible and its direction depends on the
  local ceramide and DAG levels. This is the terminal step of de novo sphingomyelin
  biosynthesis. Unlike SGMS1, which acts mainly in the Golgi, SGMS2 resides primarily
  at the plasma membrane (with a smaller Golgi-membrane pool), where its localization
  depends on C-terminal palmitoylation. By supplying plasma-membrane sphingomyelin, a
  structural constituent of lipid rafts, and by modulating the balance of pro-apoptotic
  ceramide and mitogenic diacylglycerol, SGMS2 influences membrane raft biology, signal
  transduction, and apoptosis. In vitro the purified enzyme additionally displays
  ceramide phosphoethanolamine synthase activity (using phosphatidylethanolamine as
  donor) and phosphatidylcholine/phosphatidylethanolamine phospholipase C activity, all
  dependent on a His-His-Asp catalytic triad. Heterozygous pathogenic variants in SGMS2
  cause autosomal dominant skeletal disease (calvarial doughnut lesions with bone
  fragility, and spondylometaphyseal dysplasia), reflecting a role for plasma
  membrane-bound sphingomyelin metabolism in bone mineralization.
