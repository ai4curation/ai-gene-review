gene_symbol: IDI1
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  IDI1 (isopentenyl-diphosphate delta-isomerase 1) is a small (227 aa) metalloenzyme
  of the type-1 IPP isomerase family (Nudix hydrolase fold) that catalyzes the
  reversible 1,3-allylic rearrangement interconverting the two five-carbon isoprene
  units of the mevalonate/isoprenoid pathway: isopentenyl diphosphate (IPP) and
  dimethylallyl diphosphate (DMAPP) (EC 5.3.3.2). By generating DMAPP, it provides the
  allylic primer that farnesyl diphosphate synthase and other prenyltransferases use to
  initiate and elongate prenyl chains, and it balances the cellular IPP/DMAPP pools that
  feed sterol (cholesterol), dolichol, ubiquinone, and protein-prenylation branches of
  isoprenoid metabolism. Catalysis requires a divalent metal cofactor (Mg2+, with Mn2+
  also bound); the enzyme is a monomer with active-site residues His86 and Glu148. Human
  IDI1 is broadly (housekeeping) expressed and localizes to both the cytosol and the
  peroxisome, carrying a C-terminal PTS1-type microbody targeting signal. A paralogous
  isozyme, IDI2, is expressed only in skeletal muscle.
