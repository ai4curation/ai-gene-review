core_functions:
- description: Core nonsense-mediated mRNA decay (NMD) factor that acts as a molecular adaptor bridging the exon-junction complex to the UPF surveillance machinery - UPF3B associates with the EJC core and recruits UPF2, which links to the RNA helicase/ATPase UPF1 at the terminating ribosome, and together UPF2/UPF3B stimulate UPF1 to activate NMD.
  molecular_function:
    id: GO:0003729
    label: mRNA binding
  in_complex:
    id: GO:0035145
    label: exon-exon junction complex
  supported_by:
  - reference_id: file:human/UPF3B/UPF3B-uniprot.txt
    supporting_text: serving as link between the EJC core and NMD machinery
  - reference_id: PMID:18066079
    supporting_text: UPF2 and UPF3 bridge UPF1 to the exon junction complex and stimulate its RNA helicase activity
- description: Peripheral component of the exon-junction complex that binds spliced mRNA upstream of exon-exon junctions, positioning the NMD machinery on premature-termination-codon-containing transcripts.
  molecular_function:
    id: GO:0003729
    label: mRNA binding
  in_complex:
    id: GO:0035145
    label: exon-exon junction complex
  supported_by:
  - reference_id: file:human/UPF3B/UPF3B-uniprot.txt
    supporting_text: Binds spliced mRNA upstream of exon-exon junctions
proposed_new_terms: []
suggested_questions:
- question: How do UPF3B and its paralog UPF3A differ functionally - is UPF3A an antagonist/buffer of UPF3B-dependent NMD, and how does this balance affect neurodevelopment?
- question: Which neuronal transcripts are the key physiological NMD substrates whose dysregulation underlies UPF3B-associated intellectual disability?
suggested_experiments:
- description: Reconstitute the EJC-UPF3B-UPF2-UPF1 assembly in vitro with purified components to quantify how UPF3B (and disease mutants such as Y160D) contribute to UPF1 ATPase/helicase stimulation.
- description: Transcriptome-wide NMD-substrate profiling (e.g. RNA-seq with UPF3B knockdown/rescue) in neuronal models to define the UPF3B-dependent NMD regulon and its disease relevance.
