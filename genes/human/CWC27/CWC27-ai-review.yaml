proposed_new_terms: []
suggested_questions:
- >-
    Does the catalytically dead cyclophilin domain of CWC27 retain a substrate-binding
    or proline-recognition function within the spliceosome that contributes to splice
    site fidelity, even in the absence of isomerase catalysis?
- >-
    How does the CWC27-CWC22 module mechanistically couple spliceosome activation to
    positioning of eIF4A3/the exon junction complex, and which step of EJC deposition
    requires CWC27?
- >-
    Why do CWC27 loss-of-function variants produce a retina-predominant phenotype
    (RPSKA) despite ubiquitous expression and an essential splicing role?
suggested_experiments:
- >-
    Structure-guided mutagenesis of the degenerate active-site residue(s) (e.g.,
    the Glu at the position equivalent to PPIA Trp121) combined with rescue assays in
    CWC27-null cells to test whether restoring a canonical cyclophilin active site
    confers PPIase activity and/or alters splicing.
- >-
    Transcriptome-wide splicing analysis (RNA-seq/junction analysis) in CWC27-depleted
    cells, with emphasis on U12-type minor introns and retina-expressed transcripts,
    to define the set of introns dependent on CWC27.
- >-
    Cross-linking/proteomics and cryo-EM of the CWC27-CWC22 sub-complex bound to
    eIF4A3 to map the interface and test the model that CWC27 positions the EJC core
    for deposition during splicing.
