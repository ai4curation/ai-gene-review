id: P16930
gene_symbol: FAH
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  FAH encodes fumarylacetoacetase (fumarylacetoacetate hydrolase, EC 3.7.1.2), the enzyme
  that catalyzes the fifth and final step of the cytosolic L-tyrosine and L-phenylalanine
  catabolic pathway: the hydrolysis of 4-fumarylacetoacetate to fumarate plus acetoacetate.
  It is a homodimer, with each subunit using a bound Ca(2+) and Mg(2+) ion as catalytic
  cofactors, and is expressed mainly in liver and kidney with lower levels in other tissues.
  By clearing 4-fumarylacetoacetate, FAH prevents accumulation of this reactive intermediate
  and the upstream metabolite maleylacetoacetate, feeding fumarate into the citric acid cycle
  and acetoacetate into ketone-body/lipid metabolism. Loss-of-function variants cause
  hepatorenal tyrosinemia type I (TYRSN1), the most severe tyrosinemia, in which accumulated
  fumarylacetoacetate, maleylacetoacetate, and the derived toxin succinylacetone drive
  hepatocyte apoptosis, cirrhosis, hepatocellular carcinoma risk, and renal tubular
  dysfunction.
