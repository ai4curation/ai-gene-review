existing_annotations:
- term:
    id: GO:0006572
    label: L-tyrosine catabolic process
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: involved_in
  review:
    summary: >-
      Phylogenetically inferred involvement of FAH in L-tyrosine catabolism. FAH is the
      terminal (fifth) enzyme of the tyrosine degradation pathway, and this is a core
      biological-process annotation.
    action: ACCEPT
    reason: >-
      FAH catalyzes the last step of tyrosine catabolism, hydrolyzing 4-fumarylacetoacetate
      to fumarate and acetoacetate; this is well supported experimentally and is the defining
      role of the gene. The IBA is consistent with the whole FAH family and with the direct
      human evidence.
    supported_by:
    - reference_id: PMID:9305902
      supporting_text: >-
        HT1 is due to mutations in the fumarylacetoacetate hydrolase gene Fah, encoding the
        last enzyme in the tyrosine catabolic pathway.
- term:
    id: GO:0004334
    label: fumarylacetoacetase activity
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: enables
  review:
    summary: >-
      Phylogenetically inferred fumarylacetoacetase (EC 3.7.1.2) activity. This is the
      core molecular function of FAH.
    action: ACCEPT
    reason: >-
      Direct enzymatic activity is documented for human FAH and the term matches the
      catalyzed reaction exactly (4-fumarylacetoacetate + H2O = acetoacetate + fumarate + H+).
      The IBA is at the correct level of specificity.
    supported_by:
    - reference_id: PMID:1998338
      supporting_text: >-
        having enzymatic activity as shown by the hydrolysis of the natural substrate
        fumarylacetoacetate
- term:
    id: GO:0006559
    label: L-phenylalanine catabolic process
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: involved_in
  review:
    summary: >-
      Phylogenetically inferred involvement in L-phenylalanine catabolism. Phenylalanine is
      catabolized via conversion to tyrosine, so FAH is the terminal step of both pathways.
    action: ACCEPT
    reason: >-
      UniProt places FAH as the final step (step 6/6) of L-phenylalanine degradation to
      acetoacetate and fumarate (UniPathway UPA00139). The annotation is correct, though the
      phenylalanine framing is one metabolic conversion removed from FAH's direct substrate;
      the more direct role is captured by L-tyrosine catabolic process.
    supported_by:
    - reference_id: PMID:1998338
      supporting_text: >-
        having enzymatic activity as shown by the hydrolysis of the natural substrate
        fumarylacetoacetate
- term:
    id: GO:1902000
    label: homogentisate catabolic process
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: involved_in
  review:
    summary: >-
      Phylogenetically inferred involvement in homogentisate catabolism. Homogentisate is a
      tyrosine-pathway intermediate several steps upstream of FAH's substrate.
    action: KEEP_AS_NON_CORE
    reason: >-
      FAH acts on 4-fumarylacetoacetate, three enzymatic steps downstream of homogentisate
      (which is ring-cleaved by HGD to maleylacetoacetate). This IBA reflects a pathway-level
      grouping propagated across the FAH family rather than a direct role of FAH in
      homogentisate breakdown. It is not wrong at the whole-pathway level but is broader than
      FAH's actual biochemical step, so it is retained as non-core.
