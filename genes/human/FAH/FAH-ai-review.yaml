    label: aromatic amino acid metabolic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: involved_in
  review:
    summary: >-
      InterPro2GO electronic annotation to the broad aromatic amino acid metabolic process
