id: P15104
gene_symbol: GLUL
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  GLUL encodes glutamine synthetase (glutamate--ammonia ligase, GS; EC 6.3.1.2),
  a cytosolic ATP-dependent ligase that condenses L-glutamate with ammonium and
  ATP to form L-glutamine, ADP and inorganic phosphate (via a gamma-glutamyl
  phosphate intermediate) using a divalent metal cofactor (Mg2+ or Mn2+). The
  active enzyme is a decamer built from two stacked pentamers. It is the
  principal enzyme of ammonia detoxification and nitrogen assimilation, producing
  glutamine as the main circulating nitrogen carrier and as a precursor for
  nucleotide, amino-acid and neurotransmitter biosynthesis. Its physiological
  role is tissue-dependent: in brain it lowers toxic ammonia and clears
  excitotoxic glutamate as part of the astrocytic glutamate-glutamine cycle; in
  perivenous hepatocytes it scavenges ammonia that escapes the periportal urea
  cycle; and in muscle it supports interorgan nitrogen flux. GS is mainly
  cytosolic, with a palmitoylation-anchored fraction at the plasma membrane.
  Beyond canonical glutamine synthesis, GLUL has non-canonical activities:
  autopalmitoylation and palmitoyl transfer to the GTPase RHOJ to control
  endothelial cell migration and sprouting angiogenesis, support of ribosomal
  40S subunit biogenesis, and complex formation with bestrophin-2 (BEST2) to
  gate glutamate release. Loss-of-function variants cause autosomal recessive
  congenital glutamine deficiency (severe neonatal encephalopathy), while start-
  loss variants that escape glutamine feedback degradation cause a dominant
  developmental and epileptic encephalopathy.
