  findings:
  - statement: >-
      AUH was identified by affinity purification on an AUUUA matrix as a protein
      that binds specifically to AU-rich 3'UTR transcripts of lymphokines and
      proto-oncogenes (IL-3, GM-CSF, c-fos, c-myc).
    supporting_text: >-
      In vitro, the recombinant protein bound specifically to AU-rich transcripts,
      including those for interleukin 3, granulocyte/macrophage colony-stimulating
      factor, c-fos, and c-myc.
  - statement: >-
      AUH has intrinsic (low) enoyl-CoA hydratase activity, and the hydratase and
      AU-binding functions reside on distinct domains within a single polypeptide.
    supporting_text: >-
      suggesting that hydratase and AU-binding functions are located on distinct
      domains within a single polypeptide.
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified; abstract-only cache. Foundational paper establishing the
      moonlighting ARE-RNA-binding function of AUH alongside its crotonase-family
      enzymatic activity.
