- id: PMID:29056341
  title: The Human Knockout Gene CLYBL Connects Itaconate to Vitamin B(12).
  findings:
  - statement: >-
      Itaconate can be converted to itaconyl-CoA and citramalyl-CoA via a
      reversible hydration reaction catalyzed by methylglutaconyl-CoA hydratase
      (AUH), placing AUH in the C5-dicarboxylate / itaconate detoxification pathway.
    supporting_text: >-
      reaction catalyzed by methylglutaconyl-CoA hydratase (AUH)
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: >-
      Full text available and grep-verified. The paper is primarily about CLYBL
      (citramalyl-CoA lyase) but explicitly attributes the itaconyl-CoA to
      citramalyl-CoA hydration to AUH; supports the secondary (non-core)
      itaconyl-CoA hydratase and toxic-metabolite-repair annotations.
