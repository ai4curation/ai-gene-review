- term:
    id: GO:0006635
    label: fatty acid beta-oxidation
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: involved_in
  review:
    summary: >-
      Phylogenetic assignment of a fatty-acid beta-oxidation role, propagated at
      the crotonase-superfamily level. AUH's physiological role is leucine
      catabolism, not fatty-acid beta-oxidation.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      AUH belongs to the enoyl-CoA hydratase/isomerase superfamily, many members
      of which act in fatty-acid beta-oxidation, so the IBA is propagated from
      FAO-acting relatives (the with/from includes P30084 ECHS1-type orthologs).
      The characterized physiological role of AUH is the leucine-degradation step
      3-methylglutaconyl-CoA -> HMG-CoA, and there is no evidence AUH performs the
      enoyl-CoA hydratase step of mitochondrial fatty-acid beta-oxidation in vivo.
      This is a family-level over-propagation rather than a demonstrably wrong
      inference, so it is flagged rather than removed.
    propagation_review:
      root_cause: PROPAGATION_BAD
      failure_modes:
      - FUNCTIONAL_DIVERGENCE
    supported_by:
