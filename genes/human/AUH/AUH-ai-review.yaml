  findings:
  - statement: >-
      Purified recombinant AUH is the major human 3-methylglutaconyl-CoA hydratase,
      with (E)-3-methylglutaconyl-CoA and (E)-glutaconyl-CoA as its best substrates,
      acting in the leucine degradation pathway.
    supporting_text: >-
