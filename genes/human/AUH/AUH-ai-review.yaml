id: Q13825
gene_symbol: AUH
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  AUH is a mitochondrial-matrix enzyme of the enoyl-CoA hydratase/isomerase
  (crotonase) superfamily that assembles as a homohexamer. Its principal
  catalytic role is 3-methylglutaconyl-CoA hydratase activity (EC 4.2.1.18):
  it catalyzes the fifth step of the L-leucine degradation pathway, the
  reversible hydration of (E)-3-methylglutaconyl-CoA to (S)-3-hydroxy-3-
  methylglutaryl-CoA (HMG-CoA), with the hydration direction favored
  physiologically; the product HMG-CoA is then cleaved to acetyl-CoA and
  acetoacetate. AUH is the major human 3-methylglutaconyl-CoA hydratase, and
  loss of its activity causes the autosomal-recessive inborn error of leucine
  metabolism 3-methylglutaconic aciduria type I (MGCA1). The protein is
  synthesized as a precursor with an N-terminal mitochondrial transit peptide
  that is cleaved on import. AUH is also a genuinely bifunctional (moonlighting)
  protein: it was originally identified as an AU-rich element (ARE) RNA-binding
  protein that binds specifically to AU-rich sequences in the 3' untranslated
  regions of short-lived mRNAs (e.g. cytokine and proto-oncogene transcripts
  such as IL-3, GM-CSF, c-fos and c-myc), a function localized to a distinct
  region of the polypeptide separate from the catalytic site. In addition to its
  leucine-pathway role, the crotonase fold gives AUH broad in vitro activity on
  related short acyl-CoA substrates and an inferred itaconyl-CoA hydratase
  activity that may contribute to detoxification of macrophage-derived itaconate
  via the C5-dicarboxylate catabolism pathway.
