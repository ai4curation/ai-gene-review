  title: beta-methylglutaconyl-CoA + H2O <=> beta-hydroxy-beta-methylglutaryl-CoA
  findings: []
- id: Reactome:R-HSA-9914271
  title: AUH mutants don't synthesize 3-hydroxy-methylglutaryl-CoA
  findings: []
proposed_new_terms: []
suggested_questions:
- question: >-
    Is the AU-rich element (ARE) RNA-binding activity of AUH functional in the
    mitochondrial matrix, or does a cytosolic/precursor pool of AUH mediate mRNA
    regulation? How is the moonlighting RNA-binding role coordinated with the
    matrix-localized enzymatic role?
- question: >-
    Does AUH contribute physiologically to itaconate detoxification (itaconyl-CoA
    hydratase activity) in human macrophages in vivo, and is this activity relevant
    to the clinical phenotype of MGCA1 patients?
suggested_experiments:
- description: >-
    Quantify AUH-dependent ARE-mediated mRNA turnover in cells depleted of AUH
    versus rescued with hydratase-dead or RNA-binding-dead (K105/K109/K113) mutants,
    to dissect the moonlighting RNA-binding function from catalysis.
- description: >-
    Assay itaconyl-CoA hydratase activity of purified human AUH and measure
    citramalyl-CoA flux in AUH-knockout macrophages challenged with itaconate to
    test the proposed role in C5-dicarboxylate / itaconate detoxification.
