id: P54803
gene_symbol: GALC
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: GALC (galactocerebrosidase / galactosylceramidase; EC 3.2.1.46) is a lysosomal
  glycoside hydrolase of the GH59 family that catabolizes galactolipids. It hydrolyzes the
  terminal galactose from galactosylceramide (galactocerebroside) to yield ceramide plus
  D-galactose, and also hydrolyzes galactosylsphingosine (psychosine) and related
  galactolipids. Acting at acidic pH in the lysosome/lysosomal lumen, the soluble enzyme
  depends on the lipid-transfer protein saposin A (derived from prosaposin, PSAP), which
  presents the membrane-embedded glycosphingolipid substrate to the GALC active site.
  Galactosylceramide is a major lipid of the myelin sheath, so GALC is central to myelin
  glycosphingolipid turnover. Loss of GALC activity causes Krabbe disease (globoid cell
  leukodystrophy), an autosomal recessive lysosomal storage disorder in which accumulation
  of the cytotoxic substrate psychosine drives demyelination and neurodegeneration.
