core_functions:
- description: >-
    Lysosomal galactosylceramidase (galactocerebrosidase, EC 3.2.1.46): a soluble GH59
    acid hydrolase that removes the terminal galactose from galactosylceramide
    (galactocerebroside) to yield ceramide and D-galactose, and also hydrolyzes
    galactosylsphingosine (psychosine) and related galactolipids. It thereby carries out the
    lysosomal galactosylceramide catabolic step of glycosphingolipid degradation, acting on
    membrane-embedded substrate presented by saposin A (from PSAP). Galactosylceramide is a
    major myelin lipid, and loss of this activity causes Krabbe disease (globoid cell
    leukodystrophy).
