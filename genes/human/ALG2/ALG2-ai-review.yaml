id: Q9H553
gene_symbol: ALG2
product_type: PROTEIN
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  ALG2 is a bifunctional alpha-1,3/alpha-1,6-mannosyltransferase that acts in the
  early, cytoplasmic phase of dolichol-linked oligosaccharide (LLO) assembly, the
  glycan-precursor pathway for protein N-glycosylation. Using GDP-mannose as donor,
  it catalyses the addition of the second and third mannose residues onto
  Man1GlcNAc2-PP-dolichol to form the branched Man3GlcNAc2-PP-dolichol core, adding
  one mannose in an alpha-1,3 linkage (EC 2.4.1.132) and one in an alpha-1,6 linkage
  (EC 2.4.1.257); the Man3GlcNAc2-PP-dolichol product is subsequently elongated by
  ALG11. It is a member of the GT4 glycosyltransferase family and is anchored to the
  endoplasmic reticulum membrane with its catalytic domain and active site on the
  cytoplasmic face. In humans it associates with the ER via a single membrane-binding
  domain (a topology divergent from the multi-domain yeast ortholog). Loss-of-function
  variants cause the multisystem congenital disorder of glycosylation type Ii
  (ALG2-CDG) and an autosomal-recessive congenital myasthenic syndrome (CMS14).
