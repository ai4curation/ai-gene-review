- id: PMID:35136180
  title: Topological and enzymatic analysis of human Alg2 mannosyltransferase reveals
    its role in lipid-linked oligosaccharide biosynthetic pathway.
  findings:
  - statement: >-
      Human ALG2 is a bifunctional alpha-1,3/alpha-1,6-mannosyltransferase that adds the
      second and third mannoses to Man1GlcNAc2-PP-dolichol to form branched
      Man3GlcNAc2-PP-dolichol.
    supporting_text: Alg2 catalyzes addition of both the second and third mannose to M1Gn2-PDol to form a branched
  - statement: >-
      ALG2 localizes to the ER membrane (co-localizes with Calnexin) and both its termini
      and catalytic domain face the cytoplasm; in human it uses a single membrane-binding
      domain.
    supporting_text: both the N- and C-termini of hAlg2 are oriented toward cytoplasmic side of the ER
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Full text available (PMC8827073). Definitive source for the bifunctional MF terms,
      ER membrane localization, and cytoplasmic-side topology of human ALG2.
