    mannose from GDP-mannose onto Man1GlcNAc2-PP-dolichol to form
    Man(alpha1,3)Man1GlcNAc2-PP-dolichol (EC 2.4.1.132), on the cytoplasmic face of the
    ER membrane during dolichol-linked oligosaccharide biosynthesis.
