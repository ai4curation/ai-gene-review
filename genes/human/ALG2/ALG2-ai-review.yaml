suggested_questions:
- question: >-
    Under physiological GDP-mannose and substrate concentrations in human cells, what is
    the in vivo balance between the alpha-1,3-first and alpha-1,6-first routes to
    Man3GlcNAc2-PP-dolichol, and does the M2Gn2(alpha-1,6) intermediate serve any
    regulatory function?
- question: >-
    Does ALG2 function as part of a stable ALG1-ALG2-ALG11 mannosyltransferase complex
    in human cells, and how does complex assembly affect its bifunctional activity?
suggested_experiments:
- description: >-
    Reconstitute the human ALG1-ALG2-ALG11 pathway with purified enzymes and defined
    dolichol-linked substrates to measure channeling and the order of mannose additions
    in a membrane-mimetic system.
  experiment_type: in vitro reconstitution / LC-MS kinetics
- description: >-
    Structure determination (cryo-EM or crystallography) of human ALG2 in complex with
    GDP-mannose and a Man1/Man2GlcNAc2-PP-dolichol analog to define the basis of its dual
    alpha-1,3/alpha-1,6 regioselectivity.
  experiment_type: structural biology
