core_functions:
- description: >-
    Aminomethyltransferase (T-protein) activity of the glycine cleavage system: a
    tetrahydrofolate-dependent reaction that degrades the aminomethyl-dihydrolipoyl moiety
    carried on H-protein (GCSH), releasing ammonia and transferring the one-carbon
    (methylene) unit to tetrahydrofolate to form 5,10-methylenetetrahydrofolate.
