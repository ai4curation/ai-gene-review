id: P48728
gene_symbol: AMT
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  AMT is the T-protein (aminomethyltransferase, EC 2.1.2.10) of the mitochondrial
  glycine cleavage system (GCS), a four-protein multienzyme complex (P-protein GLDC,
  T-protein AMT, L-protein DLD, H-protein GCSH) that catalyses the reversible oxidative
  degradation of glycine. AMT is a tetrahydrofolate (THF)-dependent enzyme that carries
  out the third step of glycine cleavage: it acts on the aminomethyl moiety of glycine
  that, following decarboxylation, is carried on the reduced lipoate arm of H-protein
  (the aminomethyl-dihydrolipoyl-GCSH intermediate), releases ammonia (NH3), and
  transfers the remaining one-carbon (methylene) unit to tetrahydrofolate to form
  (6R)-5,10-methylenetetrahydrofolate, leaving H-protein in its dihydrolipoyl (reduced
  lipoate) form for reoxidation by the L-protein (DLD). This reaction couples glycine
  catabolism to one-carbon/folate metabolism. The protein is nuclear-encoded, synthesised
  as a precursor with an N-terminal mitochondrial transit peptide and localises to the
  mitochondrial matrix. It adopts a three-domain cloverleaf fold with a central
  folate-binding cavity and belongs to the GcvT family. Deficiency of AMT causes
  nonketotic hyperglycinemia (glycine encephalopathy), a severe neonatal-onset metabolic
  disorder with high glycine in body fluids; AMT (T-protein) defects are the second most
  common cause of the disease after GLDC (P-protein).
