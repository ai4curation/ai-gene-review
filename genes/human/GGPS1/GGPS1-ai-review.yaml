id: O95749
gene_symbol: GGPS1
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  GGPS1 encodes geranylgeranyl pyrophosphate synthase (GGPP synthase / GGPPSase), a
  cytosolic trans-prenyltransferase of the FPP/GGPP synthase family. It catalyzes the
  Mg2+-dependent head-to-tail condensation of isopentenyl diphosphate (IPP) with an allylic
  primer to build the C20 isoprenoid geranylgeranyl diphosphate (GGPP); the physiologically
  defining reaction condenses IPP with farnesyl diphosphate (FPP) to give GGPP, and the same
  active site can also perform the upstream chain-elongation steps (dimethylallyl diphosphate
  to geranyl diphosphate, and geranyl diphosphate to FPP). The enzyme binds three Mg2+ ions
  and is subject to product inhibition by GGPP. GGPP is the lipid donor used by protein
  geranylgeranyltransferases (GGTase-I and Rab geranylgeranyltransferase/GGTase-II) to
  geranylgeranylate C-terminal cysteines of small GTPases of the Rho/Rac and Rab families,
  anchoring them to membranes; GGPP also serves as a precursor for other isoprenoids. The
  human protein assembles into a homohexamer (a trimer of homodimers). It is broadly
  expressed (highest in testis) and localizes mainly to the cytosol, with additional
  perinuclear and, in skeletal muscle, prominent Z-disc/sarcomeric signal. Biallelic
  missense variants in GGPS1 cause an autosomal recessive muscular dystrophy with congenital
  sensorineural hearing loss and primary ovarian insufficiency.
