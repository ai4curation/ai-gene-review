- description: >-
    Initiates side-chain shortening of C27 bile-acid intermediates by oxidizing
    (25S)-3alpha,7alpha,12alpha-trihydroxy-5beta-cholestanoyl-CoA (THCA-CoA) and DHCA-CoA,
    contributing to peroxisomal synthesis of the mature C24 bile acids; loss of this activity
    causes ACOX2 deficiency (CBAS6) with C27 intermediate accumulation.
