id: Q99424
gene_symbol: ACOX2
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  ACOX2 is the human peroxisomal branched-chain acyl-CoA oxidase (EC 1.3.3.6), a
  FAD-dependent flavoenzyme of the acyl-CoA oxidase family. It catalyzes the first,
  oxygen-dependent and rate-limiting dehydrogenation step of peroxisomal beta-oxidation,
  removing two hydrogens and introducing a trans-2,3 double bond into the acyl-CoA
  substrate while generating hydrogen peroxide as a byproduct. Its principal physiological
  substrates are the C27 bile-acid intermediates (25S)-3alpha,7alpha,12alpha-trihydroxy-
  cholestanoyl-CoA (THCA-CoA) and dihydroxycholestanoyl-CoA (DHCA-CoA); ACOX2 initiates the
  side-chain shortening that converts these C27 cholestanoic acids into the mature C24 bile
  acids (cholic and chenodeoxycholic acid). It also oxidizes 2-methyl-branched-chain fatty
  acyl-CoA esters such as (2S)-pristanoyl-CoA (with redundancy to ACOX3) and monomethyl
  branched-chain fatty acids, acting stereospecifically on (2S)-methyl isomers, and can
  oxidize straight-chain acyl-CoAs with low efficiency. ACOX2 is a homodimer that resides in
  the peroxisomal matrix, imported via its C-terminal SKL (PTS1) targeting signal. It is
  expressed in many tissues, most abundantly in liver, kidney and heart. Loss-of-function
  causes ACOX2 deficiency (congenital bile acid synthesis defect 6, CBAS6), an autosomal
  recessive disorder marked by accumulation of toxic C27 bile-acid intermediates, persistent
  hypertransaminasemia and liver fibrosis, with variable neurological features.
