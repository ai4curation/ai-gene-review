suggested_questions:
- question: >-
    What is the relative in vivo contribution of ACOX2 vs ACOX3 to pristanoyl-CoA /
    branched-chain fatty acid beta-oxidation in human tissues, given the reported redundancy?
- question: >-
    Do the STRN3 and DYNLT1 interactions reported in high-throughput screens have any
    physiological relevance to ACOX2 peroxisomal function or regulation?
suggested_experiments:
- description: >-
    Quantitative enzyme kinetics of purified human ACOX2 on THCA-CoA, DHCA-CoA,
    (2S)-pristanoyl-CoA, and straight-chain acyl-CoAs (C10, C16) to define physiological
    substrate preference and confirm the low-efficiency straight-chain activity.
- description: >-
    Tissue-specific metabolic profiling (bile-acid intermediates, branched-chain fatty acids)
    in ACOX2-knockout vs ACOX3-knockout models to disentangle the overlapping branched-chain
    fatty acid roles.
