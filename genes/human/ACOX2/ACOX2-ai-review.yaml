    label: fatty acid binding
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: enables
  review:
    summary: >-
      Fatty acid binding propagated by phylogenetic inference. Substrate binding is implicit
      in the acyl-CoA oxidase catalytic mechanism, but a bare "fatty acid binding" molecular
      function term is uninformative for this enzyme, whose informative MF is its acyl-CoA
      oxidase (dehydrogenase) activity. Retained but flagged as an over-annotation.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      ACOX2 acts on acyl-CoA thioesters (branched-chain and C27 bile-acid CoA esters), not
      on free fatty acids, and its informative molecular function is captured by the acyl-CoA
      oxidase activity terms. A generic "fatty acid binding" adds little functional
      information and is more precisely represented by the catalytic MF terms.
