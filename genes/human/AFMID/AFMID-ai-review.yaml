id: Q63HM1
gene_symbol: AFMID
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  AFMID (arylformamidase; also kynurenine formamidase, KFA/KFase; EC 3.5.1.9) is
  a cytosolic serine-hydrolase-fold enzyme that catalyzes the second step of the
  kynurenine pathway of tryptophan degradation, hydrolyzing N-formyl-L-kynurenine
  to L-kynurenine and formate. It acts immediately downstream of the tryptophan
  2,3-dioxygenases (TDO2/IDO1) and upstream of kynureninase (KYNU) and kynurenine
  3-monooxygenase (KMO). By producing L-kynurenine it commits carbon and nitrogen
  from tryptophan toward the neuroactive kynurenine metabolites and toward de novo
  NAD+ biosynthesis, and it contributes to elimination of the toxic intermediate
  N-formyl-L-kynurenine. The protein has the alpha/beta-hydrolase fold with a
  Ser-His-Asp catalytic triad (catalytic Ser164) and an oxyanion hole formed by
  the conserved HGGXW motif, and functions as a homodimer. It is predominantly
  cytosolic with a minor nuclear fraction, and is most highly expressed in liver.
