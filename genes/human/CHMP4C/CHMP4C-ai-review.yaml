    label: mitotic cytokinesis checkpoint signaling
  - id: GO:0032466
    label: negative regulation of cytokinesis
  - id: GO:0061952
    label: midbody abscission
  locations:
  - id: GO:0090543
    label: Flemming body
  - id: GO:0030496
    label: midbody
  supported_by:
