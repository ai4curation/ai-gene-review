  findings:
  - statement: Local synthesis identifies Aurora B/NoCut abscission checkpoint regulation as the CHMP4C core function and treats autophagy/MVB annotations as non-core ESCRT-family context.
core_functions:
- description: CHMP4C is a specialized ESCRT-III regulatory subunit for the Aurora B/NoCut abscission checkpoint. Aurora B-phosphorylated CHMP4C localizes to the midbody/Flemming body, engages CPC/Borealin and ANCHR/ZFYVE19, and retains VPS4 at the midbody ring to delay abscission until checkpoint signaling is relieved.
