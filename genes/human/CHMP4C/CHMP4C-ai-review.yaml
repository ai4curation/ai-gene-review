suggested_questions:
- question: Which ESCRT-III/autophagophore closure assays directly implicate CHMP4C, rather than CHMP4C being included by CHMP4-family or ESCRT-III component membership?
- question: Should GO annotations for CHMP4C distinguish checkpoint-regulatory abscission roles from CHMP4B-like execution roles in MVB cargo degradation and HIV release?
- question: Does CHMP4C phosphorylation state alter its ESCRT-III polymerization or partner recruitment in endosomal and autophagy contexts, or only at the cytokinetic midbody?
suggested_experiments:
- description: Use endogenous CHMP4C tagging and acute CHMP4C depletion/rescue in starvation-induced autophagy and mitophagy assays that monitor phagophore closure directly.
  hypothesis: If CHMP4C is a direct autophagophore sealing subunit, it should be recruited to unsealed autophagosomes and rescue should require its ESCRT-III core and regulatory tail.
- description: Compare CHMP4A, CHMP4B, and CHMP4C depletion/rescue in MVB cargo degradation, HIV budding, abscission execution, and NoCut checkpoint activation using matched endogenous expression systems.
  hypothesis: CHMP4C will preferentially rescue checkpoint timing rather than CHMP4B-like MVB/HIV/cytokinesis execution phenotypes.
- description: Test Aurora B phospho-site mutants and ANCHR-binding perturbations for effects on CHMP4C polymerization, VPS4 retention, and midbody-to-abscission-zone relocalization.
  hypothesis: CHMP4C phosphorylation controls checkpoint-mediated VPS4 retention and delayed abscission rather than simply controlling midbody recruitment.
