    label: viral budding via host ESCRT complex
  evidence_type: IEA
  original_reference_id: GO_REF:0000117
  qualifier: involved_in
  review:
    summary: 'Likely paralog over-annotation for CHMP4C viral budding context: viral budding via host ESCRT complex.'
    action: MARK_AS_OVER_ANNOTATED
    reason: CHMP4C can bind ESCRT/ALIX machinery, but a direct CHMP4 paralog comparison found that CHMP4A or CHMP4C depletion did not inhibit HIV-1 release whereas CHMP4B depletion did; viral budding should not be treated as a CHMP4C core role.
