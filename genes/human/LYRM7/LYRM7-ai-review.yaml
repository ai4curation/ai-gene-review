suggested_questions:
- question: >-
    Does LYRM7 act purely as a holdase that stabilises apo-UQCRFS1, or does it also
    actively template/position UQCRFS1 for [2Fe-2S] cluster receipt and membrane insertion?
suggested_experiments:
- description: >-
    Reconstitute the UQCRFS1-LYRM7 intermediate with the HSC20-HSPA9-ISCU Fe-S transfer complex
    in vitro to determine the minimal components and the order of cluster insertion versus
    membrane insertion of UQCRFS1.
