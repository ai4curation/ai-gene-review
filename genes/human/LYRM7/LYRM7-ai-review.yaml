  label: Homo sapiens
description: >-
  LYRM7 (LYR motif-containing protein 7; also MZM1L/C5orf31) is a small mitochondrial-matrix
  LYR-family assembly chaperone for respiratory Complex III (cytochrome bc1 / ubiquinol-cytochrome
  c reductase). It acts as a dedicated chaperone for the Rieske iron-sulfur protein UQCRFS1,
  binding and stabilising UQCRFS1 in the mitochondrial matrix prior to insertion of its
  [2Fe-2S] cluster and the subunit's translocation and incorporation into the late Complex III
  dimeric intermediate in the inner membrane. Its LYR motif recruits the Fe-S transfer cochaperone
  HSC20 (HSCB), coupling the UQCRFS1-LYRM7 intermediate to the ISCU-HSPA9-HSC20 cluster-delivery
  machinery. LYRM7 is non-catalytic and is the human ortholog of yeast Mzm1. Loss-of-function
  variants cause mitochondrial complex III deficiency, nuclear type 8 (a leukoencephalopathy).
