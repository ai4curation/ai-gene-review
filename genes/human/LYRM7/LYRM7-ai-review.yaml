core_functions:
- description: >-
    Non-catalytic protein-folding chaperone that binds and stabilises the Rieske iron-sulfur
    protein UQCRFS1 in the mitochondrial matrix, holding it prior to [2Fe-2S] cluster insertion
    and its incorporation into respiratory Complex III (cytochrome bc1). LYRM7's LYR motif also
    recruits the Fe-S transfer cochaperone HSC20, coupling the UQCRFS1-LYRM7 intermediate to the
    cluster-delivery machinery.
