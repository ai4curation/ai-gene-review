      and subcellular fractionation), distinct from CEPT1 which is ER/nuclear-membrane.
    reference_section_type: ABSTRACT
    supporting_text: >-
      confirmed that CPT1 was found in the Golgi and CEPT1 was found in both the
      endoplasmic reticulum and nuclear
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Source of the experimental Golgi-membrane localization (IDA); abstract-only in cache
      (full_text_available: false). Supports Golgi apparatus / Golgi membrane annotations
