  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  CHPT1 (cholinephosphotransferase 1, EC 2.7.8.2) is a multipass integral membrane
  enzyme of the Golgi (and endomembrane) system that catalyzes the final, committed step
  of the CDP-choline (Kennedy) branch of de novo phosphatidylcholine (PC) biosynthesis.
  It transfers a phosphocholine group from CDP-choline onto the free 3-hydroxyl of
  1,2-diacyl-sn-glycerol (DAG), producing phosphatidylcholine and CMP; the reaction
  requires Mg2+ or Mn2+. CHPT1 belongs to the CDP-alcohol phosphatidyltransferase
  class-I family and is choline-specific: unlike its paralog CEPT1, which is a dual
  choline/ethanolamine phosphotransferase, CHPT1 makes PC but not phosphatidylethanolamine.
  In addition to bulk PC synthesis it can generate platelet-activating factor and its
  precursor from the corresponding diradylglycerols. Because PC is the most abundant
  membrane phospholipid, CHPT1 has a central role in the formation and maintenance of
  cellular and vesicular membranes. It is broadly expressed with strongly tissue-variable
  levels, being highest in testis, colon, small intestine, heart, prostate and spleen.
