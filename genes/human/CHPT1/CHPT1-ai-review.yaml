- id: PMID:10893425
  title: Cloning, genomic organization, and characterization of a human cholinephosphotransferase.
  findings:
  - statement: >-
      Identifies and clones human cholinephosphotransferase (hCPT1) and shows by in vitro
      enzyme assay and yeast reconstitution that it is a cholinephosphotransferase-specific
      enzyme making PC (not PE), unlike the dual-specificity paralog hCEPT1.
    reference_section_type: ABSTRACT
    supporting_text: codes for a cholinephosphotransferase-specific enzyme
  - statement: >-
      hCPT1 and hCEPT1 differ in diradylglycerol specificity, including their capacity to
      synthesize platelet-activating factor and its precursor.
    reference_section_type: ABSTRACT
    supporting_text: >-
      capacity to synthesize platelet-activating factor and platelet-activating factor
      precursor
  - statement: >-
      The cell-growth effect (yeast CPT1/SEC14 complementation) was a property of hCEPT1,
      not hCPT1.
    reference_section_type: ABSTRACT
    supporting_text: >-
      only hCEPT1-derived activity was able to complement the yeast CPT1 gene in its
      interaction with SEC14 and affect cell growth
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Defining primary paper for human CHPT1; abstract-only in cache
      (full_text_available: false). Establishes the choline-specific transferase activity,
      PAF-synthesizing capacity, cofactor requirement and tissue expression. Note the
      growth phenotype belongs to the paralog CEPT1, so NAS regulation of cell growth is
      not well supported for CHPT1.
