  review:
    summary: >-
      Mutant-phenotype (IMP) evidence: deleterious MAT1A variants cause abnormal accumulation
      of methionine (hypermethioninemia), because the SAM-synthesis reaction is the principal
      route of methionine consumption in the liver. In this sense MAT1A contributes to
      L-methionine catabolism/disposal via SAM formation.
