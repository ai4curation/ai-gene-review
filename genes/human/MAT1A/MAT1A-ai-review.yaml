    reason: >-
      Defensible: the MAT reaction consumes L-methionine, and its loss causes methionine to
      accumulate, so MAT1A participates in methionine catabolism. However, the gene's core
      framing is SAM biosynthesis (methionine is the substrate), so methionine catabolism is
