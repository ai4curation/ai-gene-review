id: Q00266
gene_symbol: MAT1A
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  MAT1A encodes the alpha-1 catalytic subunit of the liver-specific methionine
  adenosyltransferase (S-adenosylmethionine synthase isoform type-1; EC 2.5.1.6),
  which assembles into the MAT I homotetramer and the MAT III homodimer. The enzyme
  catalyses S-adenosyl-L-methionine (SAM/AdoMet) synthesis from L-methionine and ATP
  (L-methionine + ATP + H2O -> S-adenosyl-L-methionine + phosphate + diphosphate) in an
  unusual two-step reaction that cleaves both ends of the ATP triphosphate chain, requiring
  Mg2+ and K+. SAM is the universal methyl donor for most cellular transmethylation
  reactions and the committed entry point of the methionine/SAM cycle. MAT1A is a cytosolic
  enzyme expressed predominantly in adult liver, where the bulk of SAM is produced.
  Loss-of-function variants cause methionine adenosyltransferase I/III deficiency (MATD;
  isolated persistent hypermethioninemia): usually clinically benign, but severe biallelic
  forms produce hepatic SAM deficiency and central-nervous-system demyelination.
