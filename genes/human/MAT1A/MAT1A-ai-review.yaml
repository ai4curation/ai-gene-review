proposed_new_terms: []
suggested_questions:
- question: >-
    Beyond forming the catalytic MAT I/III oligomers, does MAT1A have any physiologically
    relevant heteromeric partners in adult hepatocytes, or are its reported protein-binding
    interactions (e.g. with MAT2A, APP, HTT) artefacts of proteome-scale screens?
- question: >-
    How does isoform-specific regulation of the MAT1A Cys120 gating-loop residue
    (S-nitrosylation and formaldehyde adduction) modulate hepatic SAM levels in vivo?
suggested_experiments:
- description: >-
    Quantitative in vitro kinetics (Km, Vmax) of recombinant human MAT I vs MAT III on
    L-methionine and ATP, with Mg2+/K+ dependence, to define the catalytic parameters distinct
    from the ubiquitous MAT2A isoform.
- description: >-
    Targeted metabolomics of hepatic SAM, SAH, and methionine in MAT1A-variant hepatocytes to
    correlate residual enzyme activity with methylation-potential (SAM/SAH ratio) and the
    clinical spectrum of MATD.
