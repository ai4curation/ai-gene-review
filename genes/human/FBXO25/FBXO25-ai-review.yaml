suggested_questions:
- question: Which endogenous substrates does FBXO25 recognize in vivo, and what degron/post-translational features (e.g. phosphodegrons) determine its substrate selectivity?
- question: What is the functional significance of FBXO25 localization to discrete SKP1-colocalized subnuclear domains (FANDs) that co-localize with the proteasome and ubiquitinated proteins, and how does the N-terminal beta-actin interaction (and actin-polymerization/RNA Pol I dependence of FAND integrity) relate to its SCF substrate-targeting function?
- question: Is the reported FBXO25-dependent increase in histone H2B K120 monoubiquitination a direct activity of an FBXO25-containing ligase or an indirect effect on the H2B ubiquitination machinery, and how is it reconciled with FBXO25's canonical role as a degradative SCF substrate adaptor?
suggested_experiments:
- description: Perform quantitative ubiquitinome/proteome profiling (e.g. diGly enrichment and TMT proteomics) in FBXO25-knockout versus wild-type cells to define the endogenous substrate repertoire and confirm reported substrates (HAX1, NRF1/NFE2L1, ELK1, polyQ-HTT).
- description: Reconstitute the FBXO25-SKP1-CUL1-RBX1 SCF complex in vitro with an E1, E2 and ubiquitin to test substrate-dependent ubiquitination of candidate substrates, including the Ser244Leu F-box mutant to confirm dependence on SKP1 binding for substrate turnover.
