- id: PMID:10531035
  title: Identification of a family of human F-box proteins.
  findings:
  - statement: FBXO25/FBX25 was identified as one of a family of 26 human F-box proteins; F-box proteins are the substrate-recruiting subunit of SCF (SKP1-CUL1-F-box-RBX1) ubiquitin ligases.
    reference_section_type: ABSTRACT
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: Abstract-only in cache. Founding F-box family paper that first described FBXO25 (FBX25) and the general SCF architecture in which F-box proteins specify substrates. Supports the SCF-complex and substrate-adaptor framing; the catalytic activity it attributes generically to SCFs resides in the RING/E2 module, motivating the MODIFY of GO:0004842 to a substrate-adaptor term.
- id: PMID:16278047
  title: Characterization of FBX25, encoding a novel brain-expressed F-box protein.
  findings:
  - statement: hFBX25 was established as an F-box protein by verifying its interaction with SKP1 and CUL1; an atypical F-box serine (Ser244) is crucial for SKP1 binding; subcellular localization was determined (nuclear, non-nucleolar, SKP1-colocalized subnuclear domains) and strong brain expression was observed.
    reference_section_type: ABSTRACT
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: Abstract-only in cache. Primary experimental characterization of human FBXO25 - source of the SKP1/CUL1 interaction, Ser244 F-box mutagenesis, nuclear localization (IDA) and the NOT-nucleolus annotation.
- id: PMID:34445249
  title: The SCF Complex Is Essential to Maintain Genome and Chromosome Stability.
  findings:
  - statement: The SCF complex comprises ~69 E3 ubiquitin ligase complexes distinguished by variable F-box proteins that determine substrate specificity and target substrates with poly-ubiquitin chains for proteasomal degradation; functions of most individual SCF complexes remain largely unknown.
    reference_section_type: ABSTRACT
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: Abstract-only review (ComplexPortal NAS source). Supports the general SCF complex membership and SCF-dependent proteasomal degradation role; explicitly notes that most individual SCF (including FBXO25) functions are uncharacterized, supporting cautious non-core framing of substrate/process claims.
- id: file:human/FBXO25/FBXO25-deep-research-falcon.md
  title: Falcon deep research report for human FBXO25
  findings:
  - statement: FBXO25 assembles an active SCF1(FBXO25) complex with SKP1, CUL1, and Roc1/RBX1, and its best-validated endogenous substrate is the transcription factor ELK-1, which it ubiquitinates for proteasome-dependent degradation.
    supporting_text: >-
      Validated substrate: The transcription factor **ELK-1** is the clearest
      experimentally validated endogenous substrate. FBXO25 physically
      associates with ELK-1 and promotes ELK-1 ubiquitination and
      proteasome-dependent degradation in human cells.
  - statement: By degrading ELK-1, FBXO25 suppresses mitogen-induced ELK-1 target genes c-fos and egr-1, linking it to regulation of mitogen-responsive transcription.
    supporting_text: >-
      FBXO25 overexpression suppresses induction of ELK-1 target genes **c-fos**
      and **egr-1** following mitogen stimulation (PMA), consistent with reduced
      ELK-1 activity due to decreased ELK-1 protein levels.
  - statement: FBXO25 localizes to discrete nuclear puncta (FBXO25-associated nuclear domains, FANDs) that co-localize with the proteasome and ubiquitinated proteins, and whose integrity depends on actin polymerization and RNA polymerase I activity, suggesting a nuclear proteostasis compartment.
    supporting_text: >-
      FBXO25 is not merely diffuse in the nucleus; it localizes to discrete
      nuclear puncta termed **FBXO25-associated nuclear domains (FANDs)**. These
      FANDs are reported to co-localize with the **proteasome** and
      **ubiquitinated proteins**, suggesting FBXO25 participates in a nuclear
      proteostasis/ubiquitin signaling compartment.
  - statement: In human umbilical-cord MSCs, FBXO25 promotes histone H2B K120 monoubiquitination (with downstream H3K4me3 and OSX/SP7 activation) during osteogenic differentiation, indicating a chromatin-linked role beyond classical substrate degradation.
    supporting_text: >-
      In human umbilical cord-derived MSCs (hUC-MSCs), He et al. report that
      FBXO25 promotes **H2B K120 monoubiquitination (H2BK120ub)**, which is
      associated with increased **H3K4 trimethylation (H3K4me3)** and
      transcriptional activation of the osteogenic transcription factor **OSX
      (osterix/SP7)**.
  reference_review:
    relevance: HIGH
    correctness: UNVERIFIED
    review_notes: >-
      Falcon (Edison Scientific) deep-research synthesis. Cross-checked against
      the UniProt FUNCTION block and the primary FBXO25 characterization paper
      (PMID:16278047) already in this review; used as leads for the ELK-1
      substrate and FAND nuclear compartment (Teixeira 2010 Proteomics, Teixeira
      2013 JBC) and the H2BK120ub/osteogenesis axis (He 2019). Notably the
      Falcon corpus foregrounds ELK-1 as the best-validated substrate and does
      not corroborate the HAX1/NRF1 associations carried in older summaries.
      Cites author-year/DOIs rather than PMIDs, so individual primary claims
      remain UNVERIFIED here.
