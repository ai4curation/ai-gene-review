  label: Homo sapiens
description: >-
  FBXO25 (F-box only protein 25, FBX25) is a member of the FBXO ("F-box only")
  class of F-box proteins. It serves as a substrate-recognition (adaptor)
  subunit of a SKP1-CUL1-F-box (SCF)-type E3 ubiquitin-protein ligase complex,
  in which it assembles with SKP1, CUL1 and the catalytic RING subunit RBX1.
  The C-terminal F-box motif mediates binding to SKP1 (an atypical serine in
  the F-box, Ser244, is required for this interaction), thereby linking
  specific substrates to the cullin-RING catalytic core for ubiquitination and
  proteasomal degradation; FBXO25 itself does not possess the catalytic
  ubiquitin-transfer activity, which resides in the RING/E2 module. FBXO25 is
  broadly expressed with notable expression in brain and testis, and a region
  in its N-terminus binds beta-actin. The protein localizes to the nucleus
  where it concentrates in discrete SKP1-colocalized subnuclear (dot-like)
  domains termed FBXO25-associated nuclear domains (FANDs) that co-localize with
  the proteasome and ubiquitinated proteins (their integrity depends on actin
  polymerization and RNA polymerase I activity), and is excluded from the
  nucleolus. Its best-validated endogenous substrate is the ETS transcription
  factor ELK-1: SCF(FBXO25) binds ELK-1 and promotes its ubiquitination and
  proteasome-dependent degradation, dampening mitogen-induced ELK-1 target genes
  such as c-fos and egr-1. FBXO25 has also been reported to promote histone H2B
  K120 monoubiquitination (with downstream H3K4me3 and activation of the
  osteogenic factor OSX/SP7) during osteogenic differentiation, and other
  reported substrate/process associations (HAX1, NRF1/NFE2L1, and handling of
  expanded-polyglutamine huntingtin) point to roles in SCF-dependent protein
  turnover, but most of these remain thinly characterized. A chromosomal
  translocation disrupting FBXO25 has been linked to X-linked intellectual
  disability, and the gene has been associated with ADHD-related phenotypes and
  cardiomyocyte hypertrophy in model systems.
