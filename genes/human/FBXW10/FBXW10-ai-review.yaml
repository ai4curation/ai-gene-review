    summary: Assignment of involvement in SCF-dependent proteasomal degradation; ectopic FBXW10 depletes HP1-alpha/beta via the proteasome in cells expressing lamin A mutants, and proteasome inhibitors (MG132/lactacystin) rescue HP1 levels.
