    label: SCF ubiquitin ligase complex
  evidence_type: NAS
  original_reference_id: PMID:20498703
  qualifier: part_of
  review:
    summary: ComplexPortal/family-based assignment of SCF complex membership (CPX-7786, SCF complex FBXW10 variant), consistent with the F-box motif and with curated interactome classification of FBXW10 as an E3 CRL adaptor; the cited study links FBXW10 to SCF-mediated proteasomal degradation of HP1 isoforms.
    action: ACCEPT
    reason: Core assembly annotation for an F-box protein; supported by the F-box domain, the UniProt function statement describing FBXW10 as a probable SCF substrate-recognition component, and interactome-level annotation as an E3 CRL adaptor. Direct biochemical reconstitution of an SCF(FBXW10) complex has not been shown.
