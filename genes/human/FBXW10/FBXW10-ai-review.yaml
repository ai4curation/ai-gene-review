core_functions:
- description: Probable substrate-recognition subunit of an SCF (SKP1-CUL1-F-box) cullin-RING E3 ubiquitin ligase complex that, when induced, promotes SCF-dependent proteasomal degradation of substrates including the heterochromatin proteins HP1-alpha (CBX5) and HP1-beta (CBX1) under conditions of nuclear/lamin stress.
  supported_by:
  - reference_id: file:human/FBXW10/FBXW10-uniprot.txt
    supporting_text: Probable substrate-recognition component of a SCF (SKP1-CUL1-F-box protein)-type E3 ubiquitin ligase complex which mediates the ubiquitination and subsequent proteasomal degradation of target proteins
  - reference_id: PMID:20498703
    supporting_text: ectopic expression of FBXW10 in HeLa cells led to depletion of HP1alpha and beta without alteration of HP1gamma levels
