- id: file:human/FBXW10/FBXW10-deep-research-falcon.md
  title: Falcon deep research report for human FBXW10
  findings:
  - statement: Curated interactome/UPS resources classify FBXW10 (Q5XX13, 1052 aa) as an E3 cullin-RING-ligase adaptor with F-box plus WD40 repeats, consistent with an SCF-type substrate-receptor architecture rather than an enzyme.
    supporting_text: FBXW10 is explicitly categorized as an **E3 CRL adaptor** with **F-box + WD repeats**
  - statement: The strongest functional evidence is that lamin A rod-domain mutants induce FBXW10 and ectopic FBXW10 is sufficient to deplete HP1-alpha/HP1-beta but not HP1-gamma in a proteasome-dependent manner, though direct in vitro ubiquitination of HP1 by purified SCF(FBXW10) was not shown.
    supporting_text: ectopic FBXW10 is sufficient to deplete HP1α and HP1β, but not HP1γ, supporting a role in selective ubiquitin-proteasome-mediated turnover of HP1 isoforms
  - statement: FBXW10 has been reported mutated (missense, nonsense, frameshift) in T-cell prolymphocytic leukemia, and the function/substrates remain largely unknown.
    supporting_text: FBXW10 harbors **missense, nonsense, and frameshift mutations** in **T-cell prolymphocytic leukemia (T-PLL)**
  - statement: A candidate familial non-medullary thyroid cancer variant (p.Ile440del) maps to a beta-hairpin within a WD-propeller blade, implicating the WD40 substrate-binding region, though FBXW10 was ranked a second-priority candidate.
    supporting_text: Ile440 is evolutionarily conserved down to placental mammals and lies in a **β-hairpin of a WD-propeller blade**
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: Falcon synthesis grounded chiefly in Chaturvedi & Parnaik 2010 (PLoS ONE, doi:10.1371/journal.pone.0010620; the sole functional study, already cited here as PMID:20498703) plus Poirson et al. 2017 (FEBS J, doi:10.1111/febs.14193; interactome classification as E3 CRL adaptor), Sahasrabuddhe & Elenitoba-Johnson 2015 (Immunol Rev, doi:10.1111/imr.12236; T-PLL mutations), and Majdalani et al. 2023 (IJMS, doi:10.3390/ijms24098233; FNMTC candidate variant p.Ile440del). Cross-checked against UniProt Q5XX13 FUNCTION/INDUCTION statements and ComplexPortal CPX-7786. The disease/genetics findings are hypothesis-generating and do not alter the existing annotation calls; the HP1 link is supported but not biochemically reconstituted.
core_functions:
- description: Probable substrate-recognition (substrate-adaptor) subunit of an SCF (SKP1-CUL1-F-box) cullin-RING E3 ubiquitin ligase complex that, when induced, promotes proteasome-dependent depletion of the heterochromatin proteins HP1-alpha (CBX5) and HP1-beta (CBX1) under conditions of nuclear/lamin stress. FBXW10 is non-catalytic (ubiquitin transfer is RBX1's), and direct reconstituted ubiquitination of HP1 has not been shown, so HP1 isoforms remain candidate/affected substrates.
  supported_by:
  - reference_id: file:human/FBXW10/FBXW10-uniprot.txt
    supporting_text: Probable substrate-recognition component of a SCF (SKP1-CUL1-F-box protein)-type E3 ubiquitin ligase complex which mediates the ubiquitination and subsequent proteasomal degradation of target proteins
  - reference_id: PMID:20498703
    supporting_text: ectopic expression of FBXW10 in HeLa cells led to depletion of HP1alpha and beta without alteration of HP1gamma levels
  locations:
  - id: GO:0005829
    label: cytosol
  directly_involved_in:
