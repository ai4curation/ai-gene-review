id: Q5XX13
gene_symbol: FBXW10
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  FBXW10 (ubiquitin ligase-specificity factor) is a large (1052 aa) member of the
  F-box/WD40 (FBXW) family, containing an F-box motif and WD40 repeats together
  with coiled-coil regions. F-box proteins act as the interchangeable
  substrate-recognition subunits of SCF (SKP1-CUL1-F-box)-type cullin-RING E3
  ubiquitin ligase complexes, in which the F-box motif docks onto SKP1/CUL1 and
  the WD40 propeller recruits substrates for ubiquitination by the RBX1-bound E2,
  committing them to proteasomal degradation; the F-box protein itself is the
  substrate adaptor and is not catalytic. Curated interactome resources classify
  FBXW10 as an E3 cullin-RING-ligase (CRL) adaptor with F-box plus WD40 repeats.
  FBXW10 is testis-enriched in expression. Functional data are limited: in a study
  of laminopathy-associated lamin A rod-domain mutants, FBXW10 transcript was
  induced several-fold in cells expressing these mutants, and ectopic FBXW10
  expression depleted heterochromatin protein 1 isoforms HP1-alpha (CBX5) and
  HP1-beta (CBX1) but not HP1-gamma in a proteasome-dependent manner, implicating
  FBXW10 in turnover of these chromatin proteins under conditions of nuclear
  stress. FBXW10 has been reported mutated (missense, nonsense and frameshift) in
  T-cell prolymphocytic leukemia and was nominated as a candidate susceptibility
  gene (an in-frame WD-propeller deletion, p.Ile440del) in familial non-medullary
  thyroid cancer, and it shows tumor-type-specific expression changes in
  pan-cancer analyses. Its direct, physiological ubiquitination substrates and its
  assembly into a defined SCF complex have not been biochemically demonstrated;
  the HP1 isoforms are best regarded as candidate/affected substrates rather than
  validated direct targets.
