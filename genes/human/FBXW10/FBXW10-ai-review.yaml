    reason: Core biological process for an SCF substrate receptor; supported by the experimental observation that FBXW10 expression drives proteasome-dependent depletion of HP1 isoforms. Direct in vitro ubiquitination of HP1 by reconstituted SCF(FBXW10) was not demonstrated, so HP1-alpha/beta are best treated as candidate/affected substrates.
