- id: PMID:20498703
  title: Lamin A rod domain mutants target heterochromatin protein 1alpha and beta
    for proteasomal degradation by activation of F-box protein, FBXW10.
  findings:
  - statement: In HeLa cells, lamin A rod-domain mutants induced FBXW10 transcript several-fold and triggered proteasomal degradation of HP1-alpha (CBX5) and HP1-beta (CBX1) but not HP1-gamma; ectopic FBXW10 expression alone depleted HP1-alpha/beta, implicating FBXW10 (an F-box protein involved in E3 ubiquitin ligase activity) in this turnover.
    reference_section_type: ABSTRACT
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: PubMed-verified; sole functional study of FBXW10. Supports SCF-dependent proteasomal degradation involvement and the CBX5/CBX1 substrate link, though direct in vitro ubiquitination by FBXW10 was not demonstrated.
