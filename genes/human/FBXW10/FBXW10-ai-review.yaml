    label: SCF-dependent proteasomal ubiquitin-dependent protein catabolic process
proposed_new_terms:
- proposed_name: ubiquitin-like ligase-substrate adaptor activity
  proposed_definition: Bridging a substrate to a ubiquitin-like protein ligase, as performed by an SCF F-box substrate-recognition subunit that binds both SKP1/the ligase scaffold and the substrate to facilitate the substrate's ubiquitination. This corresponds to the existing GO term GO:1990756, which is not currently in FBXW10's annotation set.
  justification: FBXW10 is classified as an E3 CRL adaptor with an F-box and WD40 propeller and, when induced, promotes proteasome-dependent depletion of HP1-alpha/beta, consistent with a substrate-adaptor molecular function rather than catalysis (which is RBX1's). Adding GO:1990756 would give FBXW10 an informative molecular-function term, currently absent from its annotation set.
  proposed_parent:
    id: GO:1990756
    label: ubiquitin-like ligase-substrate adaptor activity
  supported_by:
  - reference_id: file:human/FBXW10/FBXW10-uniprot.txt
    supporting_text: Probable substrate-recognition component of a SCF (SKP1-CUL1-F-box protein)-type E3 ubiquitin ligase complex which mediates the ubiquitination and subsequent proteasomal degradation of target proteins
  - reference_id: file:human/FBXW10/FBXW10-deep-research-falcon.md
    supporting_text: FBXW10 is explicitly categorized as an **E3 CRL adaptor** with **F-box + WD repeats**
suggested_questions:
- question: Does FBXW10 directly ubiquitinate HP1-alpha (CBX5) and HP1-beta (CBX1) within a reconstituted SCF complex, or is the observed depletion indirect?
- question: Given testis-enriched expression, what is FBXW10's physiological role and substrate repertoire in spermatogenesis, distinct from the lamin-stress-induced HP1 turnover?
- question: Are the T-PLL mutations and the familial thyroid-cancer WD-propeller variant (p.Ile440del) loss-of-function for substrate recognition, and what substrate do they affect?
suggested_experiments:
- description: Reconstitute SCF(FBXW10) with SKP1, CUL1, RBX1 and an E2 in vitro and test direct ubiquitination of CBX5/CBX1, with F-box-deletion FBXW10 as a negative control.
- description: Co-immunoprecipitation of endogenous FBXW10 with SKP1/CUL1 and with CBX5/CBX1 in testis-derived cells, plus FBXW10 knockdown to assess effects on endogenous HP1 isoform stability.
- description: Express the WD-propeller variant p.Ile440del and T-PLL truncating alleles and assay SCF assembly (SKP1/CUL1 binding) and HP1-alpha/beta turnover relative to wild-type FBXW10.
