  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  FBXW10 (ubiquitin ligase-specificity factor) is a large (1052 aa) member of the
  F-box/WD40 (FBXW) family, containing an F-box motif and WD40 repeats together
  with coiled-coil regions. F-box proteins act as the interchangeable
  substrate-recognition subunits of SCF (SKP1-CUL1-F-box)-type cullin-RING E3
  ubiquitin ligase complexes, in which the F-box motif docks onto SKP1/CUL1 and
  the WD40 propeller recruits substrates for ubiquitination by the RBX1-bound E2,
  committing them to proteasomal degradation. FBXW10 is testis-enriched in
  expression. Functional data are limited: in a study of laminopathy-associated
  lamin A rod-domain mutants, FBXW10 transcript was induced several-fold in cells
  expressing these mutants, and ectopic FBXW10 expression depleted heterochromatin
  protein 1 isoforms HP1-alpha (CBX5) and HP1-beta (CBX1) without affecting
  HP1-gamma, implicating FBXW10 in proteasomal turnover of these chromatin
  proteins under conditions of nuclear stress. Its direct, physiological
  ubiquitination substrates and its assembly into a defined SCF complex have not
  been biochemically demonstrated.
