existing_annotations:
- term:
    id: GO:0099536
    label: synaptic signaling
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      IBA annotation based on phylogenetic inference from C. elegans orthologs (dyb-1/WBGene00001115
      and dys-1/WBGene00001131). DTNA is a component of the DGC at the neuromuscular junction and
      synapses. The original cloning paper identified DTNA as homologous to the Torpedo 87 kDa
      post-synaptic phosphoprotein (PMID:8845841), and dystrobrevin coprecipitates with the
      acetylcholine receptor complex (PMID:9356463). DTNA participates in signaling at synapses
      via the DAPC/syntrophin scaffold.
    action: ACCEPT
    reason: >-
      Synaptic signaling is well supported for DTNA. The protein was originally identified as a
      post-synaptic component, and its role in the DGC at neuromuscular junctions and brain synapses
      is well established. The IBA annotation is phylogenetically sound and consistent with
      experimental literature. This represents a core function of DTNA.
    supported_by:
    - reference_id: PMID:8845841
      supporting_text: >-
        This EST is also highly homologous (90%) to the Torpedo californica post-synaptic 87 kDa
        phosphoprotein.
    - reference_id: PMID:9356463
      supporting_text: >-
        Dystrobrevin coprecipitates with both the acetylcholine receptor complex as well as the
        dystrophin glycoprotein complex.

- term:
    id: GO:0045202
    label: synapse
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      IBA annotation for synapse localization. DTNA localizes to synapses as part of the DGC.
      UniProt annotates subcellular location as "Synapse" based on combined evidence. The protein
      was originally identified as a post-synaptic membrane component in Torpedo electric organ
      (PMID:8845841), and the mouse ortholog is found at the neuromuscular junction.
    action: ACCEPT
    reason: >-
      Synapse localization is a core aspect of DTNA function. The IBA annotation is well supported
      by phylogenetic evidence and extensive literature demonstrating DTNA at post-synaptic sites.
    supported_by:
    - reference_id: PMID:8845841
      supporting_text: >-
        Cloning and characterization of the human homologue of a dystrophin related
        phosphoprotein found at the Torpedo electric organ post-synaptic membrane.
    - reference_id: PMID:9119373
      supporting_text: >-
        Torpedo dystrobrevin copurifies with the acetylcholine receptors and is thought to form a
        complex with dystrophin and syntrophin.

- term:
    id: GO:0005886
    label: plasma membrane
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      IBA annotation for plasma membrane localization, supported by phylogenetic evidence from
      multiple species including mouse dystrophin, utrophin, and worm orthologs. DTNA is a
      cytoplasmic-face component of the plasma membrane-associated DGC. UniProt annotates "Cell
      membrane" based on similarity evidence. Reactome models DTNA as part of the DGC at the
      plasma membrane (R-HSA-9913339).
    action: ACCEPT
    reason: >-
      Plasma membrane localization is a core feature of DTNA as a component of the membrane-
      associated DGC. Strongly supported by multiple lines of evidence.
    supported_by:
    - reference_id: PMID:9356463
      supporting_text: >-
        Dystrobrevin coprecipitates with both the acetylcholine receptor complex as well as the
        dystrophin glycoprotein complex.
    - reference_id: Reactome:R-HSA-9913339
      supporting_text: >-
        These include dystrophin (DMD) or related proteins utrophin (UTRN) or dystrophin-related
        protein 2 (DRP2), the dystrobrevin proteins (DTNA and/or DTNB) and member(s) of the
        syntrophin family (SNTA1, SNTB1, SNTB2, SNTG1 or SNTG2).

- term:
    id: GO:0005737
    label: cytoplasm
  evidence_type: IEA
  original_reference_id: GO_REF:0000044
  review:
    summary: >-
      IEA annotation based on UniProt subcellular location mapping. UniProt annotates DTNA as
      localizing to the cytoplasm. This is consistent with the protein being a peripheral
      cytoplasmic-face component of the DGC and not a transmembrane protein.
    action: ACCEPT
    reason: >-
      Cytoplasm localization is accurate for DTNA. The protein is a cytoplasmic scaffolding
      component that is recruited to the plasma membrane as part of the DGC but also exists
      in the cytoplasm.

- term:
    id: GO:0005886
    label: plasma membrane
  evidence_type: IEA
  original_reference_id: GO_REF:0000044
  review:
    summary: >-
      IEA annotation based on UniProt subcellular location vocabulary mapping. Consistent with
      the IBA annotation for the same term and supported by extensive literature on DTNA as a
      DGC component at the plasma membrane.
    action: ACCEPT
    reason: >-
      Duplicate of the IBA plasma membrane annotation with different evidence. Both are valid;
      this broader IEA annotation is consistent with experimental evidence.

- term:
    id: GO:0008270
    label: zinc ion binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: >-
      IEA annotation based on InterPro domain IPR000433 (ZZ-type zinc finger). DTNA contains a
      well-characterized ZZ-type zinc finger domain (residues 238-294) with conserved cysteine
      residues that coordinate two zinc ions. An NMR structure of this domain has been determined
      (PDB: 2E5R). The ZZ domain is shared with dystrophin and related proteins.
    action: ACCEPT
    reason: >-
      The ZZ-type zinc finger domain is a well-defined structural feature of DTNA with a solved
      NMR structure. Zinc ion binding is an inherent property of this domain. The annotation is
      appropriate and accurate.

- term:
    id: GO:0045202
    label: synapse
  evidence_type: IEA
  original_reference_id: GO_REF:0000044
  review:
    summary: >-
      IEA annotation based on UniProt subcellular location mapping. Consistent with the IBA
      annotation for the same term.
    action: ACCEPT
    reason: >-
      This duplicates the IBA synapse annotation with different evidence. Both are valid and
      consistent with established knowledge of DTNA localization.

- term:
    id: GO:0005515
    label: protein binding
  evidence_type: IPI
  original_reference_id: PMID:10767429
  review:
    summary: >-
      IPI annotation based on interaction with utrophin (P11532) and dystrophin (P46939) from
      PMID:10767429. This study used phage display and in vitro binding assays to characterize
      the utrophin carboxy-terminal region. The H1-H2 motifs of utrophin mediate formation of
      utrophin-dystrobrevin hybrids (PMID:10767429).
    action: REMOVE
    reason: >-
      While the interaction between DTNA and utrophin is biologically valid and important,
      the generic term 'protein binding' is uninformative. The interaction represents the
      formation of heterodimers within the DGC via coiled-coil domains and is better captured
      by the structural role annotation (protein-containing complex) rather than generic
      binding.
    supported_by:
    - reference_id: PMID:10767429
      supporting_text: >-
        The remaining two motifs found in the carboxy-terminus (H1-H2) mediate the formation
        of utrophin-dystrobrevin hybrids but do not select ligands in a repertoire of random
        nonapeptides.

- term:
    id: GO:0005515
    label: protein binding
  evidence_type: IPI
  original_reference_id: PMID:21115837
  review:
    summary: >-
      IPI annotation based on interaction with alpha-catulin (CTNNAL1, Q9UBT7). The study
      showed that alpha-catulin is directly recruited to the alpha1D-AR signalosome by the
      C-terminal domain of alpha-dystrobrevin-1 (PMID:21115837). This is an isoform-specific
      interaction, as alpha-dystrobrevin-2 does not bind alpha-catulin.
    action: REMOVE
    reason: >-
      The interaction with CTNNAL1 is real and biologically significant for GPCR signaling via
      the DAPC. However, 'protein binding' is uninformative. The functional consequence is
      captured by signal transduction and protein-containing complex annotations.
    supported_by:
    - reference_id: PMID:21115837
      supporting_text: >-
        Coimmunoprecipitation and blot overlay assays indicate that alpha-catulin is directly
        recruited to the alpha(1D)-AR signalosome by the C-terminal domain of
        alpha-dystrobrevin-1 and not the closely related splice variant alpha-dystrobrevin-2.

- term:
    id: GO:0005515
    label: protein binding
  evidence_type: IPI
  original_reference_id: PMID:33961781
  review:
    summary: >-
      IPI annotation from BioPlex 3.0 high-throughput AP-MS study showing interaction with
      dystrophin (P11532) in 293T cells (PMID:33961781). This large-scale proteomics study
      confirmed the well-known DTNA-dystrophin interaction.
    action: REMOVE
    reason: >-
      The DTNA-dystrophin interaction is well established but 'protein binding' is uninformative.
      This interaction is the core of DTNA function and is better represented by the
      protein-containing complex annotation and structural role within the DGC.
    supported_by:
    - reference_id: PMID:33961781
      supporting_text: >-
        Thousands of interactions assemble proteins into modules that impart spatial and
        functional organization to the cellular proteome.

- term:
    id: GO:0005515
    label: protein binding
  evidence_type: IPI
  original_reference_id: PMID:35271311
  review:
    summary: >-
      IPI annotation from OpenCell endogenous tagging study showing interaction with utrophin
      (P46939) in HEK293T cells (PMID:35271311). Confirms the known DTNA-utrophin interaction.
    action: REMOVE
    reason: >-
      Generic 'protein binding' annotation from high-throughput study. The DTNA-utrophin
      interaction is well established and better captured by more specific annotations.

- term:
    id: GO:0005515
    label: protein binding
  evidence_type: IPI
  original_reference_id: PMID:40205054
  review:
    summary: >-
      IPI annotation from a multimodal cell mapping study showing interaction with dystrophin
      (P11532) (PMID:40205054). Another confirmation of the known DTNA-dystrophin interaction.
    action: REMOVE
    reason: >-
      Generic 'protein binding' annotation. The underlying interaction is real but the GO term
      is uninformative. Better captured by more specific annotations.

- term:
    id: GO:0005515
    label: protein binding
  evidence_type: IPI
  original_reference_id: PMID:9356463
  review:
    summary: >-
      IPI annotation based on the key study demonstrating direct heterodimerization of
      dystrobrevin with dystrophin via their coiled-coil motifs (PMID:9356463). This was
      demonstrated using the yeast two-hybrid system and defined the interaction to the
      C-terminal coiled-coil domains.
    action: REMOVE
    reason: >-
      This is a foundational interaction for DTNA function, but 'protein binding' is
      uninformative. The dystrophin-dystrobrevin coiled-coil interaction is the basis for
      DGC assembly and is better represented by the protein-containing complex annotation.
    supported_by:
    - reference_id: PMID:9356463
      supporting_text: >-
        Using the yeast two-hybrid system to identify protein-protein interactions, we present
        evidence for the heterodimerization of dystrobrevin directly with dystrophin. The C
        terminus of dystrobrevin binds specifically to the C terminus of dystrophin. We further
        refined this site of interaction to these proteins' homologous coiled-coil motifs that
        flank their respective syntrophin-binding sites.

- term:
    id: GO:0030165
    label: PDZ domain binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000107
  review:
    summary: >-
      IEA annotation transferred from rat ortholog via Ensembl Compara. DTNA interacts with
      syntrophins, which contain PDZ domains. The syntrophin-binding region of DTNA (residues
      400-450) mediates interaction with the PDZ domains of syntrophin family members.
    action: ACCEPT
    reason: >-
      PDZ domain binding is a well-supported molecular function for DTNA. Syntrophins bind to
      DTNA through their PDZ domains, and this interaction is critical for DGC assembly and
      signaling. This is more informative than generic 'protein binding' and represents a
      core molecular function.

- term:
    id: GO:0030424
    label: axon
  evidence_type: IEA
  original_reference_id: GO_REF:0000107
  review:
    summary: >-
      IEA annotation transferred from rat ortholog. DTNA is expressed in brain and localized
      to neurons. UniProt notes expression in brain with diverse isoforms. Given the role of
      the DGC at synapses including neuromuscular junctions, axonal localization is plausible.
    action: KEEP_AS_NON_CORE
    reason: >-
      Axon localization is plausible given DTNA expression in brain and neuronal tissues, but
      this is not a core localization. The primary sites are the sarcolemma in muscle and
      post-synaptic membrane at synapses.

- term:
    id: GO:0031234
    label: extrinsic component of cytoplasmic side of plasma membrane
  evidence_type: IEA
  original_reference_id: GO_REF:0000107
  review:
    summary: >-
      IEA annotation transferred from rat ortholog. This is a very accurate description of
      DTNA localization - it is a peripheral membrane protein that associates with the
      cytoplasmic face of the plasma membrane through the DGC. DTNA is not a transmembrane
      protein but is recruited to the membrane through protein-protein interactions with
      dystrophin and other DGC components.
    action: ACCEPT
    reason: >-
      This is the most precise CC term for DTNA localization. DTNA is recruited to the
      cytoplasmic face of the plasma membrane as part of the DGC (Reactome:R-HSA-9913339).
      It is not an integral membrane protein but an extrinsic component.
    supported_by:
    - reference_id: Reactome:R-HSA-9913339
      supporting_text: >-
        Two genes code for dystrobrevin proteins, DTNA (dystrobrevin alpha, primarily expressed
        in skeletal and cardiac muscle) and DTNB (dystrobrevin beta, primarily expressed in brain,
        kidney and pancreas).

- term:
    id: GO:0042383
    label: sarcolemma
  evidence_type: IEA
  original_reference_id: GO_REF:0000107
  review:
    summary: >-
      IEA annotation transferred from rat ortholog. DTNA localizes to the sarcolemma as part
      of the DGC in skeletal and cardiac muscle. The DGC spans the sarcolemma with the
      dystroglycan complex, and DTNA is recruited to the cytoplasmic face. UniProt
      notes high expression in skeletal and cardiac muscles.
    action: ACCEPT
    reason: >-
      Sarcolemma localization is a core feature of DTNA function in muscle tissue, where it
      functions as part of the DGC to link the cytoskeleton to the extracellular matrix.
      This is supported by the association with sarcoglycan-sarcospan complex (PMID:10767327).
    supported_by:
    - reference_id: PMID:10767327
      supporting_text: >-
        Further analysis of this complex revealed that the N-terminal half of dystrobrevin
        participates in this association.

- term:
    id: GO:0030054
    label: cell junction
  evidence_type: IDA
  original_reference_id: GO_REF:0000052
  review:
    summary: >-
      IDA annotation from Human Protein Atlas immunofluorescence data. Cell junction
      localization is consistent with DTNA function at neuromuscular junctions and other
      specialized cell contacts where the DGC operates.
    action: ACCEPT
    reason: >-
      Cell junction localization is supported by HPA immunofluorescence data and is consistent
      with DTNA function at the neuromuscular junction, which is a specialized type of cell
      junction.

- term:
    id: GO:0005886
    label: plasma membrane
  evidence_type: TAS
  original_reference_id: Reactome:R-HSA-9913333
  review:
    summary: >-
      TAS annotation from Reactome pathway "DGC complex binds laminins." DTNA is part of the
      DGC at the plasma membrane where the complex bridges the cytoskeleton to extracellular
      matrix laminins via the dystroglycan complex.
    action: ACCEPT
    reason: >-
      Consistent with other plasma membrane annotations. Reactome correctly models DTNA as a
      component of the DGC at the plasma membrane.

- term:
    id: GO:0005886
    label: plasma membrane
  evidence_type: TAS
  original_reference_id: Reactome:R-HSA-9913339
  review:
    summary: >-
      TAS annotation from Reactome pathway "Recruitment of dystrophin, dystrobrevin and
      syntrophin proteins to the DGC." This directly describes the process of DTNA recruitment
      to the plasma membrane-associated DGC.
    action: ACCEPT
    reason: >-
      This is the most directly relevant Reactome annotation, as it describes the specific
      step where DTNA is recruited to the DGC at the plasma membrane.
    supported_by:
    - reference_id: Reactome:R-HSA-9913339
      supporting_text: >-
        the dystrobrevin proteins (DTNA and/or DTNB) and member(s) of the syntrophin family
        (SNTA1, SNTB1, SNTB2, SNTG1 or SNTG2).

- term:
    id: GO:0005886
    label: plasma membrane
  evidence_type: TAS
  original_reference_id: Reactome:R-HSA-9914537
  review:
    summary: >-
      TAS annotation from Reactome pathway "DGC complex binds AGRN and HSPG2." DTNA is part
      of the DGC that binds agrin and perlecan in the extracellular matrix.
    action: ACCEPT
    reason: >-
      Consistent with other plasma membrane annotations. The DGC including DTNA is at the
      plasma membrane where it interacts with ECM components.

- term:
    id: GO:0032991
    label: protein-containing complex
  evidence_type: IDA
  original_reference_id: PMID:18468998
  review:
    summary: >-
      IDA annotation from the study demonstrating the alpha1D-adrenergic receptor/dystrophin
      signalosome complex (PMID:18468998). The study identified dystrophin proteins including
      syntrophin, dystrobrevin, and utrophin as essential GPCR-interacting proteins for
      alpha1D-ARs, forming a functional signalosome complex.
    action: MODIFY
    reason: >-
      The annotation is correct in that DTNA is part of protein-containing complexes, but the
      term is too generic. DTNA is specifically a component of the dystrophin-glycoprotein
      complex (DGC). A more specific term should be used.
    proposed_replacement_terms:
    - id: GO:0016010
      label: dystrophin-associated glycoprotein complex
    supported_by:
    - reference_id: PMID:18468998
      supporting_text: >-
        we identified the dystrophin proteins, syntrophin, dystrobrevin, and utrophin as
        essential GPCR-interacting proteins for alpha(1D)-ARs. We found that dystrophins
        complex with alpha(1D)-AR both in vitro and in vivo to ensure proper functional
        expression.

- term:
    id: GO:0005515
    label: protein binding
  evidence_type: IPI
  original_reference_id: PMID:19931615
  review:
    summary: >-
      IPI annotation based on interaction with MLC1 (Q15049) in astrocytes (PMID:19931615).
      MLC1 intracellular domains pull-down DGC proteins including syntrophin, dystrobrevin,
      Kir4.1, and caveolin-1.
    action: REMOVE
    reason: >-
      Generic 'protein binding' annotation. The interaction with MLC1 is interesting and
      suggests a role for the DGC in astrocyte function, but 'protein binding' is uninformative.
      This interaction occurs in the context of the DGC.
    supported_by:
    - reference_id: PMID:19931615
      supporting_text: >-
        we show here that MLC1 intracellular domains pull-down the DGC proteins syntrophin,
        dystrobrevin, Kir4.1 and caveolin-1, the structural protein of caveolae, thereby
        supporting a role for DGC and caveolar structures in MLC1 function.

- term:
    id: GO:0005515
    label: protein binding
  evidence_type: IPI
  original_reference_id: PMID:11353857
  review:
    summary: >-
      IPI annotation based on interaction with desmuslin/synemin (O15061, SYNM) (PMID:11353857).
      The study used yeast two-hybrid and coimmunoprecipitation to demonstrate a direct
      interaction between alpha-dystrobrevin and desmuslin, an intermediate filament protein.
    action: REMOVE
    reason: >-
      The interaction with desmuslin is real and links the DGC to the intermediate filament
      cytoskeleton, but 'protein binding' is uninformative. This represents an important
      structural connection but the generic term adds no value.
    supported_by:
    - reference_id: PMID:11353857
      supporting_text: >-
        A positive interaction between DMN and alpha-dystrobrevin was confirmed with an in vitro
        coimmunoprecipitation assay.

- term:
    id: GO:0006941
    label: striated muscle contraction
  evidence_type: TAS
  original_reference_id: PMID:10767327
  review:
    summary: >-
      TAS annotation based on PMID:10767327 which demonstrated that dystrobrevin associates
      with the sarcoglycan-sarcospan complex, providing a basis for understanding
      sarcoglycanopathy. The study showed that the N-terminal half of dystrobrevin participates
      in this association, linking the sarcoglycan complex to signaling molecules via
      syntrophin-associated nNOS.
    action: KEEP_AS_NON_CORE
    reason: >-
      DTNA participates in the DGC at the sarcolemma which is essential for muscle integrity
      during contraction, but DTNA is not directly involved in the contractile machinery.
      Rather, it is a structural scaffolding protein. The role in striated muscle contraction
      is indirect -- mutations cause muscular dystrophy through loss of membrane stability
      during contraction, not through defects in contraction itself.
    supported_by:
    - reference_id: PMID:10767327
      supporting_text: >-
        The sarcoglycan complex is composed of four membrane-spanning dystrophin-associated
        proteins (DAPs) and is essential for skeletal muscle survival, since the absence or
        markedly reduced expression of this complex due to mutation of any one of the
        sarcoglycan genes causes a group of muscular dystrophies, collectively termed
        sarcoglycanopathy.

- term:
    id: GO:0007165
    label: signal transduction
  evidence_type: TAS
  original_reference_id: PMID:10767327
  review:
    summary: >-
      TAS annotation based on PMID:10767327 which proposed that dystrobrevin links the
      sarcoglycan-sarcospan complex to intracellular signaling molecules. The study suggested
      that the sarcoglycan-sarcospan complex is linked to nNOS via alpha-syntrophin associated
      with dystrobrevin. This was further confirmed by PMID:21115837 showing alpha-dystrobrevin-1
      recruits alpha-catulin to the alpha1D-AR/DAPC signalosome.
    action: KEEP_AS_NON_CORE
    reason: >-
      Signal transduction is too generic but captures a real aspect of DTNA function. DTNA
      acts as a scaffolding protein that facilitates signaling through the DGC, including
      nNOS signaling and alpha1D-adrenergic receptor signaling. However, DTNA is not itself
      a signaling enzyme -- it acts as a structural scaffold.
    supported_by:
    - reference_id: PMID:10767327
      supporting_text: >-
        the sarcoglycan-sarcospan complex is linked to the signaling protein neuronal nitric
        oxide synthase via alpha-syntrophin associated with dystrobrevin.
    - reference_id: PMID:21115837
      supporting_text: >-
        alpha-catulin supersensitizes alpha(1D)-AR functional responses by recruiting effector
        molecules to the signalosome.

- term:
    id: GO:0007268
    label: chemical synaptic transmission
  evidence_type: TAS
  original_reference_id: PMID:8845841
  review:
    summary: >-
      TAS annotation based on the original cloning paper of human dystrobrevin (PMID:8845841).
      DTNA was identified as the human homolog of the Torpedo post-synaptic 87 kDa
      phosphoprotein, implying a role in synaptic transmission. Multiple splice forms are
      expressed in brain and muscle tissues.
    action: ACCEPT
    reason: >-
      Chemical synaptic transmission is a valid biological process for DTNA. As a component
      of the DGC at synapses, DTNA participates in organizing the post-synaptic membrane
      architecture required for synaptic transmission. This is consistent with the IBA
      annotation for synaptic signaling (GO:0099536) and represents a core function.
    supported_by:
    - reference_id: PMID:8845841
      supporting_text: >-
        This EST is also highly homologous (90%) to the Torpedo californica post-synaptic 87 kDa
        phosphoprotein.
    - reference_id: PMID:9356463
      supporting_text: >-
        Dystrobrevin, a dystrophin-related and -associated protein, has been proposed to be
        important in the formation and maintenance of the neuromuscular junction.

- term:
    id: GO:0007274
    label: neuromuscular synaptic transmission
  evidence_type: TAS
  original_reference_id: PMID:9119373
  review:
    summary: >-
      TAS annotation based on the mouse dystrobrevin genomic organization study (PMID:9119373).
      Dystrobrevin forms a complex with dystrophin and syntrophin at the neuromuscular
      junction. The Torpedo ortholog copurifies with acetylcholine receptors at the NMJ.
    action: ACCEPT
    reason: >-
      Neuromuscular synaptic transmission is a core biological process for DTNA. The protein
      is part of the DGC at the NMJ and was originally identified as a post-synaptic membrane
      component at cholinergic synapses. UniProt states DTNA may be involved in clustering of
      nicotinic acetylcholine receptors.
    supported_by:
    - reference_id: PMID:9119373
      supporting_text: >-
        Torpedo dystrobrevin copurifies with the acetylcholine receptors and is thought to form
        a complex with dystrophin and syntrophin.

# Annotations for the dystrophin-associated glycoprotein complex membership
- term:
    id: GO:0016010
    label: dystrophin-associated glycoprotein complex
  evidence_type: TAS
  original_reference_id: PMID:10767327
  review:
    summary: >-
      DTNA is a well-established component of the dystrophin-associated glycoprotein complex (DGC).
      Multiple studies demonstrate direct interaction with dystrophin via coiled-coil domains
      (PMID:9356463), association with the sarcoglycan-sarcospan subcomplex (PMID:10767327), and
      binding to syntrophins. DTNA is listed as a component of the DGC in ComplexPortal (CPX-2424,
      CPX-2443, CPX-2455) and Reactome (R-HSA-9913339).
    action: NEW
    reason: >-
      The existing GO:0032991 (protein-containing complex) annotation from PMID:18468998 is too
      generic. DTNA is specifically a component of the dystrophin-associated glycoprotein complex,
      which has a dedicated GO term (GO:0016010). This is the most informative CC term for DTNA
      complex membership and represents a core function.
    supported_by:
    - reference_id: PMID:9356463
      supporting_text: >-
        Using the yeast two-hybrid system to identify protein-protein interactions, we present
        evidence for the heterodimerization of dystrobrevin directly with dystrophin. The C
        terminus of dystrobrevin binds specifically to the C terminus of dystrophin.
    - reference_id: PMID:10767327
      supporting_text: >-
        Further analysis of this complex revealed that the N-terminal half of dystrobrevin
        participates in this association.

