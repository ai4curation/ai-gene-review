core_functions:
- molecular_function:
    id: GO:0030165
    label: PDZ domain binding
  description: >-
    DTNA binds syntrophin PDZ domains through its syntrophin-binding region (residues 400-450),
    mediating assembly of the DGC signaling scaffold at the neuromuscular junction and sarcolemma.
    DTNA is a core component of the dystrophin-associated glycoprotein complex (DGC), where it
    directly heterodimerizes with dystrophin via coiled-coil domains and independently binds
    syntrophins. This scaffolding function is essential for neuromuscular synaptic transmission
    and muscle membrane integrity.
  supported_by:
  - reference_id: PMID:9356463
    supporting_text: >-
      Dystrobrevin coprecipitates with both the acetylcholine receptor complex as well as
      the dystrophin glycoprotein complex.

- molecular_function:
    id: GO:0008270
    label: zinc ion binding
  description: >-
    The ZZ-type zinc finger domain (residues 238-294) coordinates two zinc ions and has a
    solved NMR structure (PDB: 2E5R). This domain is shared with dystrophin family members
    and may participate in protein-protein interactions within the DGC.
  supported_by:
  - reference_id: GO_REF:0000002
    supporting_text: InterPro domain IPR000433 ZZ-type zinc finger

proposed_new_terms: []

suggested_questions:
- question: >-
    Does DTNA have distinct functions in brain versus muscle tissue mediated by different
    splice isoforms?
- question: >-
    What is the precise role of the ZZ-type zinc finger domain in DTNA function?

suggested_experiments:
- description: >-
    Systematic comparison of DGC composition and signaling output across DTNA isoforms
    using isoform-specific knockdown and rescue in muscle and neuronal cell types. Different
    DTNA isoforms have distinct binding properties (e.g., isoform 7/8 do not bind dystrophin;
    isoform 1 but not 2 recruits alpha-catulin). Understanding isoform-specific DGC
    composition would clarify tissue-specific DTNA functions.
