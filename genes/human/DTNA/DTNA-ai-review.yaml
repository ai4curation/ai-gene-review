- id: PMID:8845841
  title: >-
    Cloning and characterization of the human homologue of a dystrophin related phosphoprotein found
    at the Torpedo electric organ post-synaptic membrane.
  findings:
  - statement: >-
      DTNA was identified as the human homolog of the Torpedo 87 kDa post-synaptic phosphoprotein
      with 90% homology and 50% homology to dystrophin C-terminal domain
    supporting_text: >-
      This EST is also highly homologous (90%) to the Torpedo californica post-synaptic 87 kDa
      phosphoprotein.
  - statement: Multiple splice forms are expressed in a tissue-specific manner
    supporting_text: >-
      The tissue distribution of dystrobrevin mRNA shows five distinct transcripts which are
      preferentially expressed between different tissues.

- id: PMID:9119373
  title: >-
    Genomic organization of the mouse dystrobrevin gene: comparative analysis with the dystrophin gene.
  findings:
  - statement: >-
      Dystrobrevin copurifies with acetylcholine receptors and forms a complex with dystrophin
      and syntrophin at the neuromuscular junction
    supporting_text: >-
      Torpedo dystrobrevin copurifies with the acetylcholine receptors and is thought to form a
      complex with dystrophin and syntrophin.

- id: PMID:9356463
  title: 'Dystrobrevin and dystrophin: an interaction through coiled-coil motifs.'
  findings:
  - statement: >-
      DTNA directly heterodimerizes with dystrophin through their C-terminal coiled-coil motifs
    supporting_text: >-
      Using the yeast two-hybrid system to identify protein-protein interactions, we present
      evidence for the heterodimerization of dystrobrevin directly with dystrophin. The C terminus
      of dystrobrevin binds specifically to the C terminus of dystrophin. We further refined this
      site of interaction to these proteins' homologous coiled-coil motifs that flank their
      respective syntrophin-binding sites.
  - statement: >-
      Dystrobrevin has been proposed to be important for the formation and maintenance of the
      neuromuscular junction
    supporting_text: >-
      Dystrobrevin, a dystrophin-related and -associated protein, has been proposed to be
      important in the formation and maintenance of the neuromuscular junction. Dystrobrevin
      coprecipitates with both the acetylcholine receptor complex as well as the dystrophin
      glycoprotein complex.

- id: PMID:10767327
  title: >-
    Biochemical evidence for association of dystrobrevin with the sarcoglycan-sarcospan complex as a
    basis for understanding sarcoglycanopathy.
  findings:
  - statement: >-
      The N-terminal half of dystrobrevin associates with the sarcoglycan-sarcospan complex,
      linking it to nNOS signaling via alpha-syntrophin
    supporting_text: >-
      Further analysis of this complex revealed that the N-terminal half of dystrobrevin
      participates in this association. It is thus considered that the sarcoglycan-sarcospan
      complex is linked to the signaling protein neuronal nitric oxide synthase via
      alpha-syntrophin associated with dystrobrevin.
  - statement: >-
      Alpha-dystrobrevin knockout mice exhibit a dystrophic phenotype possibly due to defects
      in muscle cell signaling
    supporting_text: >-
      it was shown that gene knockout mice for a DAP, alpha-dystrobrevin, exhibit a dystrophic
      phenotype, possibly due to defects in muscle cell signaling.

- id: PMID:10767429
  title: >-
    Contribution of the different modules in the utrophin carboxy-terminal region to the formation
    and regulation of the DAP complex.
  findings:
  - statement: >-
      The H1-H2 motifs of utrophin mediate formation of utrophin-dystrobrevin hybrids
    supporting_text: >-
      The remaining two motifs found in the carboxy-terminus (H1-H2) mediate the formation
      of utrophin-dystrobrevin hybrids but do not select ligands in a repertoire of random
      nonapeptides.

- id: PMID:11353857
  title: >-
    Desmuslin, an intermediate filament protein that interacts with alpha-dystrobrevin and desmin.
  findings:
  - statement: >-
      Alpha-dystrobrevin interacts with desmuslin (DMN/synemin), an intermediate filament protein,
      linking the DGC to the cytoskeleton at Z-discs
    supporting_text: >-
      A positive interaction between DMN and alpha-dystrobrevin was confirmed with an in vitro
      coimmunoprecipitation assay.
  - statement: >-
      This interaction may link the extracellular matrix to Z-discs through the DGC and
      intermediate filament network
    supporting_text: >-
      Our findings suggest that DMN may serve as a direct linkage between the extracellular
      matrix and the Z-discs (through plectin) and may play an important role in maintaining
      muscle cell integrity.

- id: PMID:18468998
  title: >-
    Blood pressure is regulated by an alpha1D-adrenergic receptor/dystrophin signalosome.
  findings:
  - statement: >-
      Dystrophin proteins including syntrophin, dystrobrevin, and utrophin are essential
      GPCR-interacting proteins for alpha1D-adrenergic receptors
    supporting_text: >-
      we identified the dystrophin proteins, syntrophin, dystrobrevin, and utrophin as
      essential GPCR-interacting proteins for alpha(1D)-ARs. We found that dystrophins
      complex with alpha(1D)-AR both in vitro and in vivo to ensure proper functional
      expression.

- id: PMID:19931615
  title: >-
    MLC1 trafficking and membrane expression in astrocytes: role of caveolin-1 and phosphorylation.
  findings:
  - statement: >-
      MLC1 pulls down DGC proteins including dystrobrevin in astrocytes, supporting DGC role
      in astrocyte function
    supporting_text: >-
      MLC1 intracellular domains pull-down the DGC proteins syntrophin, dystrobrevin,
      Kir4.1 and caveolin-1, the structural protein of caveolae, thereby supporting
      a role for DGC and caveolar structures in MLC1 function

- id: PMID:21115837
  title: >-
    Alpha-dystrobrevin-1 recruits alpha-catulin to the alpha1D-adrenergic receptor/dystrophin-associated
    protein complex signalosome.
  findings:
  - statement: >-
      Alpha-catulin is directly recruited to the alpha1D-AR signalosome by the C-terminal domain
      of alpha-dystrobrevin-1 but not alpha-dystrobrevin-2
    supporting_text: >-
      Coimmunoprecipitation and blot overlay assays indicate that alpha-catulin is directly
      recruited to the alpha(1D)-AR signalosome by the C-terminal domain of
      alpha-dystrobrevin-1 and not the closely related splice variant alpha-dystrobrevin-2.

