gene_symbol: DTNA
product_type: PROTEIN
status: IN_PROGRESS
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  Dystrobrevin alpha (DTNA) is a cytoplasmic component of the dystrophin-associated protein complex
  (DAPC/DGC), which links the intracellular cytoskeleton to the extracellular matrix at the plasma
  membrane in skeletal muscle, cardiac muscle, and brain. DTNA directly binds dystrophin and utrophin
  through its C-terminal coiled-coil domain (PMID:9356463, PMID:10767429), and independently binds
  syntrophins (SNTA1, SNTB1, SNTB2, SNTG1, SNTG2) through a dedicated syntrophin-binding region.
  DTNA also interacts with alpha-catulin (CTNNAL1) via its coiled-coil domain (PMID:22577143,
  PMID:21115837), desmuslin (synemin, SYNM/DMN) an intermediate filament protein (PMID:11353857),
  and the MLC1 protein in astrocytes (PMID:19931615). The protein contains EF-hand domains and a
  ZZ-type zinc finger domain. DTNA exists as at least 17 alternatively spliced isoforms with
  tissue-specific expression; longer isoforms are expressed in muscle while shorter isoforms
  predominate in brain. DTNA is involved in the formation and stability of synapses, clustering of
  nicotinic acetylcholine receptors at the neuromuscular junction, and participates in signaling
  pathways including the alpha1D-adrenergic receptor signalosome that regulates blood pressure
  (PMID:18468998, PMID:21115837). Mutations in DTNA cause left ventricular non-compaction
  cardiomyopathy (LVNC1) and a mild dominantly inherited muscular dystrophy (MMCKR2).
