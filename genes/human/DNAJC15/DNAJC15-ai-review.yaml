proposed_new_terms: []
suggested_questions:
- question: How is the balance between MCJ's two roles (TIM23 import co-chaperone versus complex I
    repressor) regulated, and do they occur in the same or distinct inner-membrane pools?
- question: Does MCJ promoter hypermethylation and silencing causally drive chemoresistance through
    altered mitochondrial metabolism, or through reduced protein import capacity?
suggested_experiments:
- description: Structure-function analysis of the MCJ J domain (HPD-motif mutants) testing separately
    its mortalin/HSPA9 ATPase-stimulating import activity and its complex I/supercomplex regulatory
    activity, to determine whether the two functions are separable.
- description: Blue-native PAGE and respirometry in MCJ-knockout versus reconstituted cells to
    quantify supercomplex assembly, complex I activity and ATP output, paired with import assays for
    TIM23 substrates.
