gene_symbol: DNAJC15
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: DNAJC15 (MCJ, "methylation-controlled J protein") is a small (150 aa) single-pass
  mitochondrial inner-membrane protein of the DnaJ/HSP40 subfamily C, anchored by a single
  transmembrane helix with its C-terminal J domain facing the matrix. It has two intertwined
  activities. As a J co-chaperone of the TIM23 presequence translocase import motor, it stimulates
  the ATPase activity of the matrix HSP70 chaperone mortalin (HSPA9) to drive presequence-protein
  import into the matrix; it forms a stable subcomplex with PAM16/MAGMAS, which counteracts this
  ATPase stimulation. Independently, MCJ associates with respiratory-chain complex I, impairs
  supercomplex assembly and acts as an endogenous negative regulator of the respiratory chain,
  restricting mitochondrial membrane potential and ATP production. DNAJC15 is highly expressed in
  heart, liver and kidney; its promoter is hypermethylated and silenced in many cancers, where loss
  of expression is associated with chemoresistance.
