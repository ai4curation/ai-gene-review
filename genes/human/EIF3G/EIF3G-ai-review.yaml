id: O75821
gene_symbol: EIF3G
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: EIF3G is a 320-amino-acid RNA-binding subunit of the cytosolic eukaryotic translation initiation factor 3 (eIF3) complex. Its C-terminal RNA-recognition motif directly contacts mRNAs, and EIF3G occupies the eIF3(a:b:i:g) module near the mRNA-entry and decoding region of the 40S ribosomal subunit. As part of eIF3, it participates in cytoplasmic 43S/48S preinitiation-complex assembly and translation initiation, including direct engagement of selected 5-prime-UTR RNA elements. EIF3G is dispensable for the minimal basal mammalian eIF3 activity measured on beta-globin mRNA, supporting a principal role in transcript- or condition-selective translation rather than an independently catalytic initiation activity. It is predominantly cytoplasmic/cytosolic, with context-dependent perinuclear or nuclear observations during AIFM1-associated apoptotic signaling.
