suggested_questions:
- question: Which EIF3G-crosslinked transcripts require EIF3G itself, rather than another RNA-binding eIF3 subunit, for translational activation or repression?
- question: Does the EIF3G RRM recognize a shared RNA sequence or structure, and how are its targets partitioned from EIF3A, EIF3B, and EIF3D?
- question: Is the reported in-vitro 18S-rRNA binding used by assembled human eIF3, or is mRNA binding the physiologically dominant RRM activity?
- question: How do phosphorylation, nutrient signaling, and the EIF3G-EIF3I partnership alter selective translation during stress?
suggested_experiments:
- description: Acute endogenous EIF3G degradation followed by matched ribosome profiling, RNA-seq, and EIF3-subunit-resolved CLIP, with rescue by wild-type and RRM-mutant EIF3G.
  experiment_type: acute perturbation, ribosome profiling, and CLIP
  hypothesis: EIF3G directly supports translation of a selective subset of its bound mRNAs through its RRM without broadly reducing basal translation.
- description: Reconstitute eIF3 with or without EIF3G/EIF3I and measure 43S/48S assembly on validated EIF3G-target 5-prime UTRs versus beta-globin controls.
  experiment_type: purified-complex translation initiation biochemistry
  hypothesis: EIF3G is dispensable on basal beta-globin mRNA but promotes or restrains initiation on specific structured 5-prime UTRs.
- description: Map EIF3G RRM-RNA contacts by crosslink-guided mutagenesis and structural analysis, then test separation-of-function mutants in cells.
  experiment_type: RNA-protein structural biology and functional rescue
  hypothesis: A defined RRM surface recognizes target RNA features independently of EIF3G interactions with EIF3B/EIF3I.
