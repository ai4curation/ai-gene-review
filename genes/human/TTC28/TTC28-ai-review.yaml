core_functions:
  - description: >-
      Scaffolds protein-protein interactions via TPR repeats to organize and
      support high-fidelity mitosis and cytokinesis (at centrosomes, spindle
      poles, and the midbody), thereby maintaining chromosomal stability. TTC28
      colocalizes with beta-tubulin and partially overlaps Aurora B at mitotic
      structures; loss increases micronuclei and DNA damage.
