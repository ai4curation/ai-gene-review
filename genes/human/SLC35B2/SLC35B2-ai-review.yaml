- term:
    id: GO:1902558
    label: 5'-adenylyl sulfate transmembrane transport
  evidence_type: TAS
  original_reference_id: Reactome:R-HSA-741449
  qualifier: involved_in
  review:
    summary: >-
      This term is the wrong metabolite. GO:1902558 is transport of 5'-adenylyl sulfate
      (adenosine 5'-phosphosulfate, APS), which is the biosynthetic PRECURSOR of PAPS
      (APS + ATP -> PAPS), not the substrate of this Golgi antiporter. SLC35B2 transports
      PAPS, and the cited Reactome reaction itself describes PAPS:PAP exchange. The
      annotation should use the PAPS transmembrane transport term.
    action: MODIFY
    reason: >-
      APS (5'-adenylyl sulfate) is not the SLC35B2 substrate; PAPS is. Replace with the
      PAPS transmembrane transport term, which is what the Reactome reaction actually
      describes.
    proposed_replacement_terms:
    - id: GO:1902559
      label: 3'-phospho-5'-adenylyl sulfate transmembrane transport
    supported_by:
    - reference_id: Reactome:R-HSA-741449
      supporting_text: "Both proteins can transport PAPS from the cytosol to the Golgi lumen, simultaneously antiporting PAP back to cytosol"
