  - statement: >-
      Cloned human PAPST1 (SLC35B2), identified it as the Golgi PAPS transporter, and
      showed expression increases PAPS transport into the Golgi membrane fraction; the
      Drosophila ortholog slalom is essential for viability.
    supporting_text: "significantly increased the transport of PAPS "
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Original functional characterization of SLC35B2/PAPST1 as the Golgi PAPS
      transporter; abstract-only cache but the assay results are stated directly. Basis
      for the IDA MF/BP/CC annotations.
