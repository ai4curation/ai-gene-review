core_functions:
- description: >-
    Golgi-membrane PAPS:PAP antiporter that imports cytosolic 3'-phosphoadenosine
    5'-phosphosulfate (PAPS) into the Golgi lumen in exchange for the product adenosine
    3',5'-bisphosphate (PAP), supplying the sulfonate donor for Golgi sulfation.
  molecular_function:
    id: GO:0046964
    label: 3'-phosphoadenosine 5'-phosphosulfate transmembrane transporter activity
  locations:
  - id: GO:0000139
    label: Golgi membrane
  supported_by:
  - reference_id: PMID:12716889
    supporting_text: "significantly increased the transport of PAPS "
  - reference_id: file:human/SLC35B2/SLC35B2-uniprot.txt
    supporting_text: "3'-phosphoadenylyl sulfate:adenosine"
