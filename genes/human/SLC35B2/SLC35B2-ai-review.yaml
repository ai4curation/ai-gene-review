id: Q8TB61
gene_symbol: SLC35B2
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  SLC35B2 (PAPS transporter 1, PAPST1) is a multi-pass Golgi-membrane protein of the
  nucleotide-sugar-transporter (SLC35B) family that imports the universal sulfonate
  donor 3'-phosphoadenosine 5'-phosphosulfate (PAPS) from the cytosol into the Golgi
  lumen. It operates as an antiporter, exchanging cytosolic PAPS for the lumenal
  reaction product adenosine 3',5'-bisphosphate (PAP). By supplying PAPS to Golgi
  sulfotransferases, it enables sulfation of glycosaminoglycans/proteoglycans and of
  secreted-protein tyrosine residues. Loss of SLC35B2 function reduces proteoglycan
  sulfation and, in humans, causes an autosomal-recessive hypomyelinating leukodystrophy
  with chondrodysplasia (HLD26). Its Drosophila ortholog slalom is essential for
  viability.
