id: Q5VW00
gene_symbol: DCAF12L2
taxon:
  id: uniprot:human
  label: human
status: COMPLETE
description: >-
  BioReason-Pro SFT predictions for DCAF12L2 (human). 6 GO terms extracted from
  HF protein_catalogue. DCAF12L2 is a Tdark protein (intronless retrocopy of DCAF12
  on X chromosome) with no direct experimental characterization. The sole curated
  GOA annotation is GO:0080008 (Cul4-RING E3 ubiquitin ligase complex, IBA). The
  SFT model produces mixed results: the complex (GO:0080008) and cytoplasm (GO:0005737)
  CC predictions are correct, matching or extending the IBA inference. The MF prediction
  (GO:0005515, protein binding) is uninformative per GO curation guidelines. The BP
  predictions for autophagy regulation (GO:0010506) and proteasome-mediated degradation
  (GO:0043161) appear to be model confabulations: no evidence links DCAF12L2 to
  autophagy regulation, and these appear derived from fabricated substrate assignments
  (ATG8-family proteins, WIPI2) documented in the SFT review. The centrosome (GO:0005813)
  prediction is an unsupported transfer from the parent gene DCAF12.
references:
- id: doi:10.64898/2026.03.19.712954
  title: BioReason-Pro (Fallahpour et al. 2026)
predictions:
- source_method: BioReason-Pro-SFT
  source_version: wanglab/protein_catalogue
  source_reference_id: doi:10.64898/2026.03.19.712954
  predicted_term:
    id: GO:0005515
    label: protein binding
  predicted_term_type: GO_MF
  review:
    assessment: REP
    confidence_score: 1
    summary: >-
      Generic protein binding is an uninformative annotation per GO curation
      guidelines and is discouraged (see CLAUDE.md). While DCAF12L2 presumably
      binds proteins given its WD40 beta-propeller domain, this prediction
      adds no functional specificity. A more informative MF would be
      GO:1990756 (ubiquitin-like ligase-substrate adaptor activity), as
      proposed in the curated review. This prediction likely reflects frequency
      bias -- protein binding is the most common GO MF annotation. REP.
    error_type: FREQUENCY_BIAS

- source_method: BioReason-Pro-SFT
  source_version: wanglab/protein_catalogue
  source_reference_id: doi:10.64898/2026.03.19.712954
  predicted_term:
    id: GO:0010506
    label: regulation of autophagy
  predicted_term_type: GO_BP
  review:
    assessment: NPI
    confidence_score: 0
    summary: >-
      Incorrect. The SFT review documents that BioReason fabricated autophagy
      substrate assignments (ATG8-family proteins MAP1LC3B, GABARAPL1, and WIPI2)
      for DCAF12L2 and its parent gene DCAF12. The actual confirmed substrates of
      DCAF12 are MAGEA3, MAGEA6, CCT5, and MOV10 via C-terminal diglutamate
      degrons -- none are autophagy regulators. There is no published evidence
      linking DCAF12 or DCAF12L2 to autophagy regulation. This prediction is a
      confabulation arising from combining (a) correct DCAF-CRL4 complex
      membership with (b) general knowledge that some CRL4 complexes regulate
      autophagy, without evidence for specificity. NPI.
    error_type: PATHWAY_CONTEXT_IGNORED

- source_method: BioReason-Pro-SFT
  source_version: wanglab/protein_catalogue
  source_reference_id: doi:10.64898/2026.03.19.712954
  predicted_term:
    id: GO:0043161
    label: proteasome-mediated ubiquitin-dependent protein catabolic process
  predicted_term_type: GO_BP
  review:
    assessment: UNC
    confidence_score: 1
    summary: >-
      Uncertain, kept as a lead pending experimental confirmation. An independent
      OpenScientist structural investigation (see file reference) found selective
      subfunctionalization in this testis retrogene: the WD40 beta-propeller fold and the
      C-terminal degron-binding pocket are intact (substrate-contacting residues
      conserved), so substrate recognition is plausible. However, the DDB1-binding H-box
      helix -- the obligate interface for CRL4 E3 ligase assembly -- is degenerate (~58%
      conservation, with candidate helix-breaking substitutions), and DDB1 has never been
      detected among DCAF12L2's 43 experimental interaction partners despite CUL4A/CUL4B,
      TRiC/CCT and prefoldin being recovered. Its partners overlap DCAF12's non-degradative
      (chaperonin-ubiquitination) arm rather than the degradative one. Assigning GO:0043161
      on prediction alone is therefore premature: substrate recognition is conserved but the
      CRL4-assembly step prerequisite for proteasomal targeting is unconfirmed. Remains UNC
      (lead only; the OpenScientist report relies partly on recent primary literature not yet
      cached here).
    supported_by:
      - reference_id: file:human/DCAF12L2/DCAF12L2-hypotheses/prediction-crl4-dcaf-substrate-receptor/openscientist.md
        supporting_text: >-
          DDB1 has never been detected among DCAF12L2's 43 experimentally identified
          interaction partners

