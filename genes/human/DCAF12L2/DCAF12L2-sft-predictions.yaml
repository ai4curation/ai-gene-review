  predicted_term:
    id: GO:0005737
    label: cytoplasm
  predicted_term_type: GO_CC
  review:
    assessment: CNN
    confidence_score: 2
    summary: >-
      Correct and already in the curated review as a proposed new annotation
      (NEW action in DCAF12L2-ai-review.yaml). Cytoplasmic localization is
      consistent with CRL4 complex biology. The curated review adds this as NEW
      based on phylogenetic inference from the parent gene and general DCAF
      biology. CNN (matching the curated prediction, though not yet in GOA from
      an experimental source).

- source_method: BioReason-Pro-SFT
  source_version: wanglab/protein_catalogue
  source_reference_id: doi:10.64898/2026.03.19.712954
  predicted_term:
    id: GO:0005813
    label: centrosome
  predicted_term_type: GO_CC
  review:
    assessment: NPI
    confidence_score: 0
    summary: >-
      Incorrect. The SFT review documents that centrosome localization was
      transferred from the parent gene DCAF12 (which shows centrosomal
      localization in some cancer cell lines per HPA) without evidence for
      DCAF12L2 at centrosomes. There is no evidence supporting centrosome
      localization for DCAF12L2. This is a paralog/parent gene annotation
      transfer error. NPI.
    error_type: PARALOG_OVERANNOTATION

- source_method: BioReason-Pro-SFT
  source_version: wanglab/protein_catalogue
  source_reference_id: doi:10.64898/2026.03.19.712954
  predicted_term:
    id: GO:0080008
    label: Cul4-RING E3 ubiquitin ligase complex
  predicted_term_type: GO_CC
  review:
    assessment: CNN
    confidence_score: 2
    summary: >-
      Correct and already in GOA (IBA, GO_REF:0000033). This is the only
      GOA annotation for DCAF12L2, inferred by phylogenetic analysis from
      DCAF12 paralogs/orthologs. The WD40 beta-propeller architecture strongly
      supports CRL4 complex membership. Curated review gives ACCEPT. CNN.
