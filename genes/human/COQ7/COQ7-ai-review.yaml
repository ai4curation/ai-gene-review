core_functions:
- description: >-
    COQ7 is the carboxylate-bridged di-iron hydroxylase that catalyzes the
    penultimate step of coenzyme Q biosynthesis, hydroxylating 5-demethoxyubiquinol
    (DMQ) at the C6 position using NADH and molecular oxygen. Substrate binding
    mediates NADH reduction of its diiron center, which then activates O2 for
    hydroxylation.
