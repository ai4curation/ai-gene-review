id: Q99807
gene_symbol: COQ7
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  COQ7 (also called CLK-1, the clock-1 homolog) is the mitochondrial di-iron
  hydroxylase that catalyzes the penultimate step of coenzyme Q (ubiquinone,
  CoQ10) biosynthesis. It hydroxylates 5-demethoxyubiquinol / 5-methoxy-2-methyl-
  3-(all-trans-polyprenyl)benzoquinone (DMQ) at the C6 position to give a
  3-demethyl-ubiquinol, the substrate for the final COQ3-catalyzed O-methylation
  that produces CoQ. It has a ferritin-like fold with a carboxylate-bridged
  di-iron center (it binds two iron ions per subunit and is NOT a flavin- or
  heme-dependent enzyme); substrate binding mediates reduction of the diiron
  center by NADH and initiates molecular oxygen activation for hydroxylation. COQ7
  is a peripheral inner-mitochondrial-membrane protein on the matrix face and is a
  component of the eukaryotic CoQ biosynthetic complex (COQ metabolon / synthome)
  together with COQ3, COQ4, COQ5, COQ6 and COQ9; the lipid-binding protein COQ9
  binds COQ7 and presents the hydrophobic DMQ substrate to it. A distinct pool of
  uncleaved COQ7 localizes to the nucleus and chromatin, where it participates in
  a mitochondria-to-nucleus retrograde signaling program that modulates reactive
  oxygen species metabolism and the mitochondrial unfolded protein response
  independently of ubiquinone biosynthesis. In humans, loss-of-function variants
  cause autosomal recessive primary coenzyme Q10 deficiency (COQ10D8) and distal
  hereditary motor neuronopathy (HMNR9); the clk-1/COQ7 ortholog influences
  lifespan in invertebrate and mouse models.
