proposed_new_terms: []
suggested_questions:
- question: >-
    What controls the partitioning of COQ7 between the mitochondrial (biosynthetic)
    and nuclear (retrograde-signaling) pools, and is the nuclear moonlighting
    function relevant to human COQ7 disease phenotypes?
- question: >-
    How is COQ7 hydroxylase activity regulated post-translationally (e.g. by
    phosphorylation and by COQ8-dependent kinase activity within the synthome)?
suggested_experiments:
- description: >-
    Reconstitute the human COQ7:COQ9 complex with defined DMQ substrates and measure
    how disease variants (e.g. V141E, L111P, R54Q) affect diiron-center assembly,
    NADH-coupled O2 activation, and hydroxylation kinetics.
- description: >-
    Use compartment-restricted COQ7 alleles (mitochondria-only vs nucleus-only) to
    dissect which human phenotypes depend on the biosynthetic activity versus the
    nuclear ROS/UPRmt signaling role.
