- id: PMID:28409910
  title: Pathogenicity of two COQ7 mutations and responses to 2,4-dihydroxybenzoate
    bypass treatment.
  findings:
  - statement: >-
      Pathogenic COQ7 variants (V141E, L111P) reduce protein stability and ubiquinone
      levels; 2,4-dihydroxybenzoate can restore ubiquinone synthesis in cells lacking
      COQ7 activity, confirming COQ7's requirement in ubiquinone biosynthesis.
    reference_section_type: ABSTRACT
    supporting_text: >-
      mutations in the ubiquinone biosynthetic gene COQ7
