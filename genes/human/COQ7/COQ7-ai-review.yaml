- id: PMID:23445365
  title: 'Aging-associated enzyme human clock-1: substrate-mediated reduction of the
    diiron center for 5-demethoxyubiquinone hydroxylation.'
  findings:
  - statement: >-
      Purified human CLK-1/COQ7 is a 5-demethoxyubiquinone hydroxylase that uses a
      carboxylate-bridged diiron center; substrate (DMQ) binding mediates NADH
      reduction of the diiron center and initiates O2 activation for hydroxylation.
    reference_section_type: ABSTRACT
    supporting_text: >-
      GB1-hCLK-1 functions as a 5-demethoxyubiquinone-hydroxylase, utilizing its
      carboxylate-bridged diiron center.
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      PMID verified against cached record; primary biochemical demonstration of the
      core di-iron hydroxylase activity of human COQ7/CLK-1.
- id: PMID:25339443
  title: Mitochondrial COQ9 is a lipid-binding protein that associates with COQ7 to
    enable coenzyme Q biosynthesis.
  findings:
  - statement: >-
      COQ9 is a lipid-binding protein that specifically interacts with COQ7 through
      conserved residues around its lipid-binding site, and is proposed to present
      its bound lipid (DMQ) substrate to COQ7 to enable CoQ biosynthesis.
    reference_section_type: ABSTRACT
    supporting_text: >-
      COQ9 specifically interacts with COQ7 through a series of conserved residues.
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Abstract-only in cache (full_text_available: false); abstract directly supports
      the COQ9->COQ7 substrate-presentation interaction.
- id: PMID:25961505
  title: A nuclear role for the respiratory enzyme CLK-1 in regulating mitochondrial
    stress responses and longevity.
  findings:
  - statement: >-
      A distinct uncleaved pool of COQ7/CLK-1 localizes to the nucleus and chromatin
      and regulates ROS metabolism, the UPRmt, and longevity independently of its
      mitochondrial ubiquinone-biosynthetic function.
    reference_section_type: RESULTS
    supporting_text: >-
      COQ7 has a biologically relevant nuclear role that is independent of its
      characterised mitochondrial function in ubiquinone biosynthesis.
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Full text cached; establishes the moonlighting nuclear/chromatin localization
      and ROS/lifespan signaling role (basis for the non-core nucleus/chromosome and
      ROS-regulation annotations).
