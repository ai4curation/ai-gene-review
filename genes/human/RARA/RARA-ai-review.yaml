id: P10276
gene_symbol: RARA
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: 'RARA encodes retinoic acid receptor alpha, a ligand-activated nuclear receptor
  and sequence-specific RNA polymerase II transcription factor. In RXR heterodimers, RARA
  binds retinoic acid response elements in nuclear chromatin and switches between unliganded
  NCoR/SMRT/HDAC-mediated repression and retinoid-induced coactivator recruitment. The core
  function is retinoic acid receptor signaling through direct regulation of retinoid-responsive
  transcription; developmental, immune, proliferation, and disease/fusion phenotypes are downstream
  or context-specific outputs.'
existing_annotations:
- term:
    id: GO:0000122
    label: negative regulation of transcription by RNA polymerase II
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: Supported core repressive mode of RARA-mediated RNA polymerase II
      transcription regulation.
    action: ACCEPT
    reason: RARA-RXR can repress RNA polymerase II transcription through DNA-bound
      corepressor complexes in the absence of ligand.
    supported_by:
    - reference_id: file:human/RARA/RARA-deep-research-falcon.md
      supporting_text: RARα/RXR complexes bound to RAREs recruit **NCoR/SMRT**
        corepressors linked to HDAC activity, supporting a mechanistic basis for
        **ligand-modulated transcriptional repression**.
    - reference_id: file:human/RARA/RARA-deep-research-falcon.md
      supporting_text: 'RARα supports a canonical nuclear-receptor **cofactor “switch” mechanism**:
        in the **absence of ligand**, RARα/RXR bound on DNA recruits **corepressors** such
        as **NCoR/SMRT** that are associated with histone deacetylase (HDAC) activity and
        transcriptional repression; upon **retinoid agonist binding**, ligand-induced conformational
        changes (notably involving AF-2/helix 12 in the ligand-binding domain) destabilize
        corepressor binding and favor recruitment of **coactivators** (e.g., p160/SRC family,
        CBP/p300, Mediator/DRIP/TRAP components), enabling transcriptional activation of retinoid-responsive
        genes.'
- term:
    id: GO:0004879
    label: nuclear receptor activity
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: 'Core molecular function: RARA is a retinoic-acid-binding nuclear receptor transcription
      factor.'
    action: ACCEPT
    reason: Nuclear receptor activity is the central molecular function of RARA,
      integrating retinoid ligand binding, RXR heterodimerization, RARE binding, and
      transcriptional regulation.
    supported_by:
    - reference_id: file:human/RARA/RARA-deep-research-falcon.md
      supporting_text: '**RARA encodes RARα**, a ligand-activated nuclear receptor that functions
        as a **sequence-specific DNA-binding transcription factor**. RARα typically acts as
        a heterodimer with retinoid X receptor (RXR) on **retinoic acid response elements
        (RAREs)**, classically composed of **direct repeats of the hexamer PuG(G/T)TCA** spaced
        by 1–5 bp (e.g., DR5, DR2, DR1).'
    - reference_id: file:human/RARA/RARA-deep-research-falcon.md
      supporting_text: 'RARα supports a canonical nuclear-receptor **cofactor “switch” mechanism**:
        in the **absence of ligand**, RARα/RXR bound on DNA recruits **corepressors** such
        as **NCoR/SMRT** that are associated with histone deacetylase (HDAC) activity and
        transcriptional repression; upon **retinoid agonist binding**, ligand-induced conformational
        changes (notably involving AF-2/helix 12 in the ligand-binding domain) destabilize
        corepressor binding and favor recruitment of **coactivators** (e.g., p160/SRC family,
        CBP/p300, Mediator/DRIP/TRAP components), enabling transcriptional activation of retinoid-responsive
        genes.'
