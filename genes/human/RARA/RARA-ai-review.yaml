  description: RARA/RARalpha is a retinoic-acid-binding nuclear receptor transcription
    factor that heterodimerizes with RXR, binds RAREs in chromatin, and regulates RNA
    polymerase II transcription by ligand-dependent exchange of corepressor and
    coactivator complexes.
