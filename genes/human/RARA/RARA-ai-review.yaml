  supported_by:
  - reference_id: file:human/RARA/RARA-deep-research-falcon.md
    supporting_text: '**RARA encodes RARα**, a ligand-activated nuclear receptor that functions
      as a **sequence-specific DNA-binding transcription factor**. RARα typically acts as
      a heterodimer with retinoid X receptor (RXR) on **retinoic acid response elements (RAREs)**,
      classically composed of **direct repeats of the hexamer PuG(G/T)TCA** spaced by 1–5
      bp (e.g., DR5, DR2, DR1).'
  - reference_id: file:human/RARA/RARA-deep-research-falcon.md
    supporting_text: 'RARα supports a canonical nuclear-receptor **cofactor “switch” mechanism**:
      in the **absence of ligand**, RARα/RXR bound on DNA recruits **corepressors** such as
      **NCoR/SMRT** that are associated with histone deacetylase (HDAC) activity and transcriptional
      repression; upon **retinoid agonist binding**, ligand-induced conformational changes
      (notably involving AF-2/helix 12 in the ligand-binding domain) destabilize corepressor
      binding and favor recruitment of **coactivators** (e.g., p160/SRC family, CBP/p300,
      Mediator/DRIP/TRAP components), enabling transcriptional activation of retinoid-responsive
      genes.'
  - reference_id: file:human/RARA/RARA-deep-research-falcon.md
    supporting_text: RARα binds RAREs primarily as an RXR heterodimer. Structural and
      biochemical evidence includes a **1.7 Å** crystal structure of RXR and RAR
      DNA-binding domains (DBDs) assembled on a **DR1** element that shows **RAR bound
      to the upstream (5′) half-site and RXR bound downstream (3′)**, i.e., **reverse
      polarity** compared with other RXR heterodimers.
  - reference_id: file:human/RARA/RARA-deep-research-falcon.md
    supporting_text: RARα is primarily described as **nuclear** and
      **chromatin-associated** through binding to promoter/enhancer RAREs; nucleosomes
      do not necessarily preclude binding.
  - reference_id: file:human/RARA/RARA-uniprot.txt
    supporting_text: ComplexPortal; CPX-508; RXRalpha-RARalpha retinoic acid receptor
      complex.
