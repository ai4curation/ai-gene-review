- term:
    id: GO:0030154
    label: cell differentiation
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: Supported developmental or differentiation role, but downstream and
      context-dependent relative to core RARA transcriptional regulation.
    action: KEEP_AS_NON_CORE
    reason: RARA-dependent retinoid signaling influences differentiation and
      development, but these are downstream programs and should not be treated as the
      core molecular function.
    supported_by:
    - reference_id: file:human/RARA/RARA-deep-research-falcon.md
      supporting_text: many transcriptomic or phenotypic outcomes in RA-treated cells
        reflect indirect downstream programs (e.g., differentiation cascades) rather
        than direct RARα DNA binding; IDA evidence for MF/CC (structure, EMSA, cofactor
        recruitment assays) is stronger than broad BP assertions unless direct targets
        are shown.
    - reference_id: PMID:19917671
      supporting_text: These studies demonstrate, for the first time, that RA couples
        G(1) arrest to transcriptional control of cancer cell differentiation by
        suppressing CAK phosphorylation of RARalpha to release transcriptional
        repression.
