- term:
    id: GO:0000976
    label: transcription cis-regulatory region binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000107
  review:
    summary: Core sequence-specific DNA/RARE binding function of the RARA-RXR
      transcription factor complex.
    action: ACCEPT
    reason: RARA binds retinoic acid response elements, primarily as an RXR heterodimer,
      and this DNA binding is central to its transcriptional regulatory function.
    supported_by:
    - reference_id: file:human/RARA/RARA-deep-research-falcon.md
      supporting_text: '**RARA encodes RARα**, a ligand-activated nuclear receptor that functions
        as a **sequence-specific DNA-binding transcription factor**. RARα typically acts as
        a heterodimer with retinoid X receptor (RXR) on **retinoic acid response elements
        (RAREs)**, classically composed of **direct repeats of the hexamer PuG(G/T)TCA** spaced
        by 1–5 bp (e.g., DR5, DR2, DR1).'
    - reference_id: file:human/RARA/RARA-deep-research-falcon.md
      supporting_text: RARα binds RAREs primarily as an RXR heterodimer. Structural and
        biochemical evidence includes a **1.7 Å** crystal structure of RXR and RAR
        DNA-binding domains (DBDs) assembled on a **DR1** element that shows **RAR bound
        to the upstream (5′) half-site and RXR bound downstream (3′)**, i.e., **reverse
        polarity** compared with other RXR heterodimers.
