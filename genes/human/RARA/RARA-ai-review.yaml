suggested_questions:
- question: Which RARA developmental and immune-response GO annotations are supported by
    direct RARalpha target-gene evidence rather than indirect retinoic-acid
    differentiation cascades?
- question: Should fusion-specific PML::RARA chromatin and differentiation-block
    phenotypes be represented separately from wild-type RARA annotations to prevent
    over-transfer to the normal receptor?
suggested_experiments:
- description: Perform RARA perturbation with rescue by DNA-binding- or
    ligand-binding-defective mutants in primary human retinoid-responsive cells,
    followed by RARA ChIP-seq and nascent RNA profiling to distinguish direct
    transcriptional targets from downstream differentiation effects.
  experiment_type: genetic rescue plus ChIP-seq/nascent transcriptomics
- description: Compare wild-type RARA and major RARA fusion proteins at matched RARE
    loci for corepressor/coactivator occupancy, ligand responsiveness, and
    transcriptional output to separate normal receptor biology from fusion-specific GO
    claims.
  experiment_type: chromatin occupancy and transcriptional reporter assay
