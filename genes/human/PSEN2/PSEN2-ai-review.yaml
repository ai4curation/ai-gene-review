    label: gamma-secretase complex
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: part_of
  review:
    summary: PSEN2 is a presenilin subunit of mature gamma-secretase complexes with nicastrin, APH1,
