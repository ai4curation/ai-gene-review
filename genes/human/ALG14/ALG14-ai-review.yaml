  label: Homo sapiens
description: >-
  ALG14 is the membrane-anchoring, non-catalytic subunit of the bipartite
  ALG14-ALG13 UDP-N-acetylglucosamine (UDP-GlcNAc) transferase. ALG14 is a
  single-pass endoplasmic reticulum membrane protein that recruits and anchors
  the otherwise-soluble catalytic subunit ALG13 to the cytoplasmic face of the ER
  membrane; the resulting heterodimer catalyses the second step of dolichol-linked
  oligosaccharide (LLO) assembly, transferring a second, beta-1,4-linked GlcNAc
  from UDP-GlcNAc onto GlcNAc-PP-dolichol to form the chitobiose core
  GlcNAc2-PP-dolichol. This activity is essential for the biosynthesis of the
  lipid-linked oligosaccharide precursor used in protein N-linked glycosylation.
  Neither ALG14 nor ALG13 is active alone: ALG13 provides catalysis but lacks a
  membrane domain, whereas ALG14 provides the membrane anchor but lacks catalytic
  residues. In humans, biallelic loss-of-function variants cause ALG14-CDG, a
  spectrum encompassing congenital myasthenic syndrome (CMS15), a
  myasthenic/myopathic neurodegeneration with progressive cerebral atrophy
  (MEPCA), and an intellectual developmental disorder with epilepsy and coarse
  facies (IDDEBF).
