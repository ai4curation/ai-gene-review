proposed_new_terms: []
suggested_questions:
- question: >-
    Why do most ALG14-CDG patients show normal serum transferrin glycosylation
    despite reduced ALG13/14 GnTase activity in vitro, and does ALG14 have a
    tissue- or substrate-specific requirement (e.g. at the neuromuscular junction)
    that explains the myasthenic phenotype?
- question: >-
    Does ALG14 scaffold or influence the first LLO step (DPAGT1) in addition to
    anchoring ALG13, and if so how is the cytosolic-face LLO machinery organized?
suggested_experiments:
- description: >-
    Structure of the human ALG14-ALG13 heterodimer in the ER membrane (e.g. by
    cryo-EM) to define the ALG14 residues that mediate ALG13 recruitment and how
    CDG variants (P65L, D74N, R109Q, V141G) destabilize the complex.
- description: >-
    Tissue-specific / neuromuscular-junction glycoproteomics in ALG14-deficient
    models to explain why a general LLO-assembly defect manifests predominantly as
    a myasthenic/neurodegenerative phenotype.
