core_functions:
- description: >-
    Serves as the membrane-anchoring, non-catalytic subunit of the ALG14-ALG13
    UDP-N-acetylglucosamine transferase, recruiting the soluble catalytic subunit
    ALG13 to the cytoplasmic face of the ER membrane so the heterodimer can add
    the second (beta-1,4-linked) GlcNAc to GlcNAc-PP-dolichol during dolichol-linked
    oligosaccharide assembly for protein N-glycosylation.
