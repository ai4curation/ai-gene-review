  title: Alg14 recruits Alg13 to the cytoplasmic face of the endoplasmic reticulum
    to form a novel bipartite UDP-N-acetylglucosamine transferase required for the
    second step of N-linked glycosylation.
  findings: []
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Foundational paper establishing the bipartite ALG13/14 GnTase and ALG14's
      role as the ER membrane anchor that recruits ALG13. Abstract-only in cache
      (full_text_available: false); human ALG13/ALG14 shown to complement the
      yeast genes. Supports the adaptor-activity MF, ER-membrane CC, and complex CC.
- id: PMID:36200043
  title: An in vitro assay for enzymatic studies on human ALG13/14 heterodimeric UDP-N-acetylglucosamine
    transferase.
  findings: []
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Full-text primary paper. Reconstitutes purified human ALG13/14, confirms
      beta-1,4-GlcNAc transfer to Gn-PDol -> Gn2-PDol (LLO second step), shows only
      ALG13 isoform 2 (Q9NP73-2) forms the active complex with ALG14, and shows
      ALG14-CDG variants (P65L, D74N, R109Q, V141G) reduce GnTase activity.
      Supports the LLO-biosynthesis BP, N-glycosylation upstream BP, complex CC,
      and the ALG13-binding IPI.
