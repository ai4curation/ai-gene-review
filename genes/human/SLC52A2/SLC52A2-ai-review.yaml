id: Q9HAB3
gene_symbol: SLC52A2
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  SLC52A2 encodes riboflavin transporter 2 (RFVT2; formerly RFT3/hRFT3), a
  ~445-residue multi-pass plasma-membrane protein of the SLC52 (e-RFT, TCDB
  2.A.125) solute carrier family. It mediates Na+-independent, moderately
  pH-sensitive cellular uptake of the water-soluble vitamin B2/riboflavin, with
  a submicromolar affinity (KM ~0.33 uM) and selectivity for riboflavin over
  FMN and FAD. Because mammals cannot synthesize riboflavin, RFVT2-mediated
  uptake is required to supply cells with the precursor of the flavin cofactors
  FAD and FMN that drive numerous oxidation-reduction reactions of energy,
  lipid, carbohydrate and amino-acid metabolism. RFVT2 is most highly expressed
  in brain, fetal brain and salivary gland and, in polarized epithelia, is one
  of several riboflavin transporters contributing to vitamin handling. Biallelic
  loss-of-function mutations in SLC52A2 cause Brown-Vialetto-Van Laere syndrome
  type 2, a childhood-onset axonal sensorimotor neuronopathy with sensorineural
  deafness, optic atrophy, bulbar palsy and respiratory insufficiency that is
  responsive to high-dose oral riboflavin.
