core_functions:
- description: >-
    Na+-independent riboflavin (vitamin B2) transmembrane transporter activity:
    SLC52A2/RFVT2 is a multi-pass plasma-membrane protein that imports free
    riboflavin into cells with submicromolar affinity (KM ~0.33 uM), selective
    over FMN/FAD. Through this activity it drives cellular riboflavin transport,
    supplying the precursor of the flavin cofactors FAD/FMN and maintaining
    systemic and brain riboflavin homeostasis; loss of this transport causes
    riboflavin transporter deficiency (BVVLS2).
