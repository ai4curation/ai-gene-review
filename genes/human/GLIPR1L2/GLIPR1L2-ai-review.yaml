- gap_statement: >-
    GLIPR1L2's direct molecular activity, native interaction complex, and
    physiological biological process are unknown.
  boundary: >-
    Sequence architecture, p53-responsive transcription, tissue expression, and
    several high-throughput interactions are known, but none defines what endogenous
    GLIPR1L2 does.
  gap_kind:
  - BIOLOGY
  - CURATION
  dark_aspect: WHOLLY_DARK
  status: OPEN
  significance: >-
    Resolving this gap is necessary to determine whether GLIPR1L2 is a receptor,
    ligand, organizer, or another kind of CAP-family membrane protein and to replace
    the unsupported adaptor transfer with a specific activity if one exists.
  resolution: >-
    Endogenous interaction mapping, loss-of-function/rescue phenotyping, and
    biochemical reconstitution in a verified GLIPR1L2-expressing human cell context.
  provenance:
  - reference_id: file:human/GLIPR1L2/GLIPR1L2-notes.md
    supporting_text: No specific molecular activity or biological process is currently established strongly enough for a positive core GO assertion.
- gap_statement: >-
    The membrane topology, compartment, and isoform-specific localization of
    GLIPR1L2 have not been established experimentally.
  boundary: >-
    A transmembrane helix is predicted for the canonical protein, but the extracellular
    IBA, N-terminal CAP-domain orientation, and localization of the six splice forms
    remain unverified.
  gap_kind:
  - BIOLOGY
  - CURATION
  dark_aspect: CC_DARK
  status: OPEN
  significance: >-
    Topology determines whether the CAP domain could act extracellularly or in an
    organelle lumen and is required to adjudicate the extracellular-region IBA.
  resolution: >-
    Perform isoform-resolved protease-protection, surface-labeling, glycosylation,
    and microscopy experiments using endogenous tags and knockout controls.
  provenance:
  - reference_id: file:human/GLIPR1L2/GLIPR1L2-uniprot.txt
    supporting_text: FT   TRANSMEM        254..274
suggested_questions:
- question: >-
    Which GLIPR1L2 isoforms are translated in human germ cells and somatic tissues,
    and which are stable membrane proteins?
- question: >-
    Is the CAP domain extracellular, organelle-luminal, or cytosolic in each major
    isoform, and does any isoform undergo secretion or proteolytic release?
- question: >-
    Does GLIPR1L2 form a reproducible endogenous complex with PECAM1, UBE2K, VIM,
    or reproductive proteins, and what activity follows from that complex?
suggested_experiments:
- hypothesis: >-
    Major GLIPR1L2 splice isoforms occupy different membranes or topologies.
  description: >-
    Use long-read RNA sequencing and targeted proteomics to identify translated
    isoforms, then create isoform-specific endogenous tags. Combine surface
    biotinylation, selective permeabilization, protease protection, glycosidase
    sensitivity, and knockout-controlled microscopy to resolve compartment and topology.
  experiment_type: Isoform-resolved expression and membrane-topology mapping
- hypothesis: >-
    GLIPR1L2 participates in a specific native complex that is not captured by the
    paralog-derived molecular-adaptor annotation.
  description: >-
    Endogenously tag GLIPR1L2 in a validated human testis/germ-cell model and a
    GLIPR1L2-positive somatic model, perform affinity purification-mass spectrometry
    and proximity labeling, and validate candidates reciprocally. Compare all major
    isoforms and explicitly test PECAM1, UBE2K, VIM, and IZUMO-family proteins.
  experiment_type: Endogenous interactome mapping and orthogonal validation
- hypothesis: >-
    GLIPR1L2 has a subtle or redundant germ-cell function not detected by the mouse
    three-gene cluster fertility screen.
  description: >-
    Generate GLIPR1L2-null human germ-cell differentiation models with isoform-specific
    rescue and quantify differentiation, acrosomal markers, membrane remodeling,
    cell viability, and interaction phenotypes. In mouse, compare a Glipr1l2-only
    knockout with the published cluster deletion under sensitized reproductive assays.
  experiment_type: Gene-specific loss-of-function, rescue, and sensitized phenotyping
