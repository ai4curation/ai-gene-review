id: Q4G1C9
gene_symbol: GLIPR1L2
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  GLIPR1L2 is an isoform-rich, testis-enriched member of the mammalian
  GLIPR1/CAP protein family. The 344-amino-acid canonical protein contains an
  SCP/CAP domain, a predicted single transmembrane helix, and a long acidic,
  disordered C-terminal region; alternative splicing produces six named
  UniProt isoforms with substantially different termini. GLIPR1L2 transcription
  is p53 responsive and is detected in several tissues, with highest expression
  in testis. A deletion spanning the three neighboring mouse Glipr1-like genes
  did not impair natural fecundity, reproductive-tract histology, sperm morphology,
  or sperm motility. GLIPR1L2's direct molecular activity, native physiological
  complex, membrane topology, and biological role remain unknown.
