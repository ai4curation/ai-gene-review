      supporting_text: At least two of these complexes contain IZUMO1 in partnership with GLI pathogenesis-related 1 like 1 (GLIPR1L1).
      reference_section_type: RESULTS
    - reference_id: file:human/GLIPR1L2/GLIPR1L2-notes.md
      supporting_text: The only PAINT experimental seed is mouse Glipr1l1, whose adaptor-like activity is tied to an IZUMO1-containing sperm complex.
    - reference_id: file:human/GLIPR1L2/GLIPR1L2-deep-research-manual.md
