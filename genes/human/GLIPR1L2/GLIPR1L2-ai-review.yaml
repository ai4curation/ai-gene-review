- term:
    id: GO:0060090
    label: molecular adaptor activity
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: enables
  review:
    summary: >-
      The PAINT annotation is seeded only by mouse Glipr1l1, whose nonenzymatic
      sperm role is supported by an IZUMO1-containing complex and effects on
      IZUMO1 redistribution during the acrosome reaction.
    action: REMOVE
    reason: >-
      GLIPR1L2 is a distinct, divergent CAP-family paralog. No GLIPR1L2 experiment
      establishes an IZUMO1 complex, acrosomal localization, partner-bridging
      activity, or any other native adaptor mechanism. Family membership, testis
      enrichment, and high-throughput binary interactions are insufficient to
      transfer the specialized Glipr1l1 role.
    propagation_review:
      root_cause: PROPAGATION_BAD
      failure_modes:
      - WRONG_ORTHOLOG_OR_PARALOG
      - CONTEXT_OR_TISSUE_MISMATCH
      - ROLE_CONFLATION
      source_entities:
      - source_id: MGI:MGI:1916536
        source_label: mouse Glipr1l1
        source_status: SUPPORTS_SOURCE_BUT_NOT_TARGET
        comment: >-
          Mouse Glipr1l1 participates in an IZUMO1-containing sperm complex, but
          that paralog-specific mechanism has not been demonstrated for GLIPR1L2.
      - source_id: PANTHER:PTN000036124
        source_label: broad PTHR10334 ancestral node
        source_status: UNRESOLVED
        comment: >-
          This node spans functionally divergent CAP-family proteins and is too
          broad for transfer of the Glipr1l1-specific adaptor role.
    additional_reference_ids:
