existing_annotations:
- term:
    id: GO:0005576
    label: extracellular region
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: is_active_in
  review:
    summary: >-
      PAINT transfers active extracellular-region localization from a broad set
      of CAP-family sources. GLIPR1L2 has a CAP domain and predicted single-pass
      membrane architecture, but its topology and extracellular activity have not
      been measured directly.
    action: UNDECIDED
    reason: >-
      An extracellular or luminal N-terminal CAP domain is structurally plausible,
      but the reviewed record does not specify membrane orientation or a cleaved
      signal peptide, and the abstract-only human discovery paper does not report
      protein localization. The qualifier is_active_in additionally presupposes an
      activity that remains unknown. The annotation should not be rejected solely
      because direct evidence is missing, but it cannot yet be confidently accepted.
    propagation_review:
      root_cause: UNRESOLVED
      source_entities:
      - source_id: PANTHER:PTN000036124
        source_label: broad PTHR10334 ancestral node
        source_status: UNRESOLVED
        comment: >-
          Multiple secreted and membrane CAP-family sources support an ancestral
          extracellular context, but target isoform topology and activity are unresolved.
    additional_reference_ids:
