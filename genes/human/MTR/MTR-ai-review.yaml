id: Q99707
gene_symbol: MTR
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  MTR encodes methionine synthase (5-methyltetrahydrofolate-homocysteine
  methyltransferase; EC 2.1.1.13), the cytosolic, methylcobalamin (vitamin
  B12)-dependent enzyme that catalyses the remethylation of homocysteine to
  methionine: (6S)-5-methyltetrahydrofolate + L-homocysteine -> (6S)-tetrahydrofolate
  + L-methionine. This single reaction links the folate cycle (regenerating
  tetrahydrofolate from 5-methyltetrahydrofolate) with the methionine cycle
  (regenerating methionine, and hence S-adenosylmethionine for cellular
  methylation). It is one of only two cobalamin-dependent enzymes in humans.
  The enzyme is modular, with a homocysteine-binding domain carrying a catalytic
  zinc ion that activates the homocysteine thiol, a pterin-binding domain that
  binds 5-methyltetrahydrofolate, two cobalamin-binding domains that hold the
  methylcobalamin cofactor, and a C-terminal S-adenosylmethionine-binding
  activation domain. Catalysis proceeds by shuttling the methyl group through the
  enzyme-bound cobalamin, which cycles between methylcob(III)alamin and
  cob(I)alamin. The reactive cob(I)alamin is periodically oxidised to inactive
  cob(II)alamin and must be reductively reactivated; methionine synthase reductase
  (MTRR) provides this reactivation and also acts as a chaperone promoting
  cobalamin loading of the apoenzyme. In the cytosol, cobalamin is handed to
  methionine synthase within a multiprotein complex that also includes MTRR,
  MMACHC and MMADHC. Loss-of-function mutations cause cblG homocystinuria with
  megaloblastic anemia, hyperhomocysteinemia and hypomethioninemia.
