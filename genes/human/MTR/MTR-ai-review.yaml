- term:
    id: GO:0071267
    label: L-methionine salvage
  evidence_type: IEA
  original_reference_id: GO_REF:0000108
  qualifier: involved_in
  review:
    summary: >-
      This IEA is an inter-ontology logical inference from methionine synthase
      activity (GO:0008705). L-methionine salvage refers to the methionine salvage
      (Yang) cycle that regenerates methionine from 5'-methylthioadenosine; MTR
      instead performs de novo remethylation of homocysteine, which is a distinct
      route. The inference is over-broad for MTR's biology.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      The logically inferred salvage annotation conflates two different routes to
      methionine. MTR is the de novo homocysteine-remethylation (MetH) step, not a
      component of the methylthioadenosine-based methionine salvage pathway; better
      captured by L-methionine biosynthetic process.
    supported_by:
    - reference_id: file:human/MTR/MTR-uniprot.txt
      supporting_text: "L-methionine biosynthesis via de novo"
