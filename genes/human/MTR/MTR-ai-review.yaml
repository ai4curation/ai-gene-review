- term:
    id: GO:0007399
    label: nervous system development
  evidence_type: TAS
  original_reference_id: PMID:8968737
  qualifier: involved_in
  review:
    summary: >-
      Legacy TAS to nervous system development citing the MTR cloning/cblG-mutation
      paper. That paper reports cloning and disease mutations and the neurological
      phenotype of deficiency, but does not establish a direct developmental role for
      MTR; the neurological consequences arise from impaired methionine/SAM and
      folate metabolism.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      Over-broad process attribution. The cited paper does not demonstrate MTR acting
      directly in nervous system development; developmental delay in cblG is a
      downstream consequence of the metabolic defect rather than a direct
      developmental function.
    supported_by:
    - reference_id: PMID:8968737
      supporting_text: >-
        Methionine synthase catalyzes the remethylation of homocysteine to methionine in
        a methylcobalamin-dependent reaction
- term:
    id: GO:0050667
    label: homocysteine metabolic process
  evidence_type: IMP
  original_reference_id: PMID:23825108
  qualifier: involved_in
  review:
    summary: >-
      MTR directly consumes L-homocysteine, remethylating it to L-methionine, so it
      is a central participant in homocysteine metabolism. This term is not present in
      the current GOA set but is well supported and captures a core biological process
      of the gene (loss of MTR function causes homocystinuria).
    action: NEW
    reason: >-
      Proposed new annotation. Homocysteine metabolic process is a specific,
      informative process term directly reflecting MTR's substrate; its clinical
      hallmark on loss of function is homocystinuria/hyperhomocysteinemia. Added to
      reflect the core_functions homocysteine-metabolism role.
    supported_by:
    - reference_id: PMID:8968737
      supporting_text: >-
        Methionine synthase catalyzes the remethylation of homocysteine to methionine in
        a methylcobalamin-dependent reaction
    - reference_id: PMID:23825108
      supporting_text: >-
        In cblG, mutations in methionine synthase (MTR)
        decrease conversion of hydroxocobalamin
core_functions:
- description: >-
    Cobalamin (methylcobalamin)-dependent methionine synthase catalysing the
    folate-dependent remethylation of L-homocysteine to L-methionine
    (5-methyltetrahydrofolate + L-homocysteine -> tetrahydrofolate + L-methionine),
    the committed step linking the folate and methionine cycles.
  molecular_function:
    id: GO:0008705
    label: methionine synthase activity
  directly_involved_in:
  - id: GO:0071265
    label: L-methionine biosynthetic process
  supported_by:
  - reference_id: PMID:16769880
    supporting_text: "Sustained activity of mammalian methionine synthase (MS) requires MS reductase"
  - reference_id: PMID:8968737
    supporting_text: >-
      Methionine synthase catalyzes the remethylation of homocysteine to methionine in
      a methylcobalamin-dependent reaction
- description: >-
    Methyl transfer during catalysis is mediated by an essential enzyme-bound
    cobalamin cofactor (methylcob(III)alamin), cycling between methylcobalamin and
    cob(I)alamin; MTR binds cobalamin via its dedicated B12-binding domains.
  molecular_function:
    id: GO:0031419
    label: cobalamin binding
  directly_involved_in:
  - id: GO:0009235
    label: cobalamin metabolic process
  supported_by:
  - reference_id: file:human/MTR/MTR-uniprot.txt
    supporting_text: "Name=methylcob(III)alamin; Xref=ChEBI:CHEBI:28115;"
  - reference_id: PMID:16769880
    supporting_text: "we believe that MS itself is the only source of MeCbl in mammalian cells"
- description: >-
    The homocysteine remethylation reaction consumes 5-methyltetrahydrofolate and
    regenerates tetrahydrofolate, so MTR functions in homocysteine metabolism at the
    junction of the methionine and folate cycles, in the cytosol.
  molecular_function:
    id: GO:0008705
    label: methionine synthase activity
  directly_involved_in:
  - id: GO:0050667
    label: homocysteine metabolic process
  locations:
  - id: GO:0005829
    label: cytosol
  supported_by:
  - reference_id: PMID:8968737
    supporting_text: >-
      Methionine synthase catalyzes the remethylation of homocysteine to methionine in
      a methylcobalamin-dependent reaction
  - reference_id: PMID:27771510
    supporting_text: >-
      the processing of Cbl in cytoplasm occurs in a multiprotein complex composed of
      at least MS, MSR, MMACHC and MMADHC
