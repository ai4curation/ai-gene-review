core_functions:
- description: >-
    Early assembly factor for mitochondrial respiratory chain Complex IV
    (cytochrome c oxidase). As a core component of the inner-membrane MITRAC
    complex, COX14 associates with newly synthesised MT-CO1 (COX1) and, with
    COA3 and other MITRAC/assembly components, couples MT-CO1 synthesis with its
    incorporation into the nascent enzyme, regulating and stabilising the early
    COX1-containing assembly intermediate. COX14 is non-catalytic and acts as a
    scaffolding/regulatory factor; no informative molecular-function term is
    assigned (GOA carries only bare protein binding and an over-interpreted
    'protein folding chaperone' term).
