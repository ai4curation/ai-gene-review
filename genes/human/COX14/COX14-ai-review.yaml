    label: mitochondrial respiratory chain complex IV assembly
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: involved_in
  review:
    summary: >-
      Phylogenetic (IBA) annotation for the core biological process of COX14:
      assembly of mitochondrial respiratory chain complex IV. This is the
      well-supported, conserved function of COX14/Cox14 orthologs.
    action: ACCEPT
    reason: >-
      Directly matches the experimentally established role of COX14 as an early
      COX (Complex IV) assembly factor and MITRAC component. This is the core
      function of the gene and is supported by multiple experimental studies in
      addition to the phylogenetic inference.
    supported_by:
