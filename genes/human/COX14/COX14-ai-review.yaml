  review:
    summary: >-
      Phylogenetic (IBA) annotation placing COX14 in the mitochondrion. Correct
      but non-specific; the protein is more precisely localised to the
      mitochondrial inner membrane, where COX assembly occurs.
    action: ACCEPT
    reason: >-
      COX14 is unambiguously a mitochondrial protein (its yeast ortholog COX14
      and human C12orf62 both localise to mitochondria and function in COX
      assembly). This general location is correct; the inner-membrane
      sub-localisation is captured by other annotations and by core_functions.
    supported_by:
    - reference_id: PMID:22356826
      supporting_text: "Four of the proteins (AURKAIP1-, C7orf44-, C12orf62- and PET117-GFP) co-localize with the mitochondrial marker"
- term:
