id: Q96I36
gene_symbol: COX14
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  COX14 (formerly C12orf62) is a small (57 aa, ~6.6 kDa) single-pass
  transmembrane protein of the mitochondrial inner membrane that acts as an
  early assembly factor for respiratory chain Complex IV (cytochrome c oxidase,
  COX). It is a core component of the MITRAC complex (mitochondrial translation
  regulation assembly intermediate of cytochrome c oxidase), where, together
  with COA3 and other MITRAC/assembly components, it associates with the
  newly-synthesised mtDNA-encoded core subunit MT-CO1 (COX1) and couples MT-CO1
  synthesis with its incorporation into the nascent enzyme, thereby regulating
  the early steps of COX assembly. COX14 is non-catalytic and has no known
  enzymatic activity; it functions as a scaffolding/regulatory assembly factor.
  Loss of COX14 destabilises newly synthesised COX1 and impairs COX assembly.
  In humans, biallelic COX14 variants cause mitochondrial complex IV deficiency,
  nuclear type 10 (MC4DN10), a fatal neonatal, Leigh-syndrome-like disorder with
  severe lactic acidosis.
