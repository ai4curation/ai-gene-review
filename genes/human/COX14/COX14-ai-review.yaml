- term:
    id: GO:0005741
    label: mitochondrial outer membrane
  evidence_type: IEA
  original_reference_id: GO_REF:0000044
  qualifier: located_in
  review:
    summary: >-
      Electronic annotation to mitochondrial outer membrane, derived from the
      UniProt Subcellular Location keyword (SL-0172). This conflicts with the
      protein's function as a MITRAC/Complex IV assembly factor acting on
      MT-CO1, which occurs in the inner membrane, and with Reactome's placement
      of COX14 in the mitochondrial inner membrane.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      COX14 engages the mtDNA-encoded core subunit MT-CO1 within the MITRAC
      assembly intermediate, a process that takes place in the mitochondrial
      inner membrane (where COX resides). Reactome consistently annotates COX14
      to the inner membrane (GO:0005743). The single-pass topology (N-terminus
      intermembrane, C-terminus in the matrix) is consistent with an
      inner-membrane protein. The outer-membrane assignment propagated from the
      SubCell keyword is therefore likely an over-annotation rather than the
      site of function; it is retained as non-core rather than removed because
      it derives from a curated UniProt subcellular-location statement.
    supported_by:
    - reference_id: file:human/COX14/COX14-uniprot.txt
      supporting_text: "TOPO_DOM        1..14"
- term:
    id: GO:0006457
    label: protein folding
  evidence_type: IEA
  original_reference_id: GO_REF:0000108
  qualifier: involved_in
  review:
    summary: >-
      Electronic annotation to protein folding, logically inferred from the
      protein folding chaperone MF annotation (GO:0044183). COX14 is a
      scaffolding assembly factor, not a demonstrated protein-folding chaperone.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      This IEA is derived by inter-ontology inference from the GO:0044183
      protein folding chaperone annotation, which itself over-interprets COX14's
      role. COX14 stabilises newly synthesised COX1 within an early assembly
      intermediate but has not been shown to catalyse polypeptide folding. The
      process is better described as Complex IV assembly (GO:0033617) than
      generic protein folding, so this annotation is marked as over-annotated.
    supported_by:
    - reference_id: PMID:28082314
      supporting_text: "CMC1 stabilizes a COX1-COA3-COX14 complex before the incorporation of COX4 and"
- term:
    id: GO:0005515
    label: protein binding
  evidence_type: IPI
  original_reference_id: PMID:32296183
  qualifier: enables
  review:
    summary: >-
      Bare protein binding from a high-throughput binary interactome screen
      (HuRI), recording a COX14 interaction with MESD (Q14696). This is an
      uninformative molecular-function term.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      Per curation guidelines, bare 'protein binding' does not convey COX14's
      actual molecular function and is uninformative. The interaction (with
      MESD) comes from a proteome-wide binary two-hybrid map, not a
      function-establishing study, and its biological relevance to COX assembly
      is unclear. It is retained (not removed) as an experimental IPI but marked
      as over-annotated; no specific MF is proposed because COX14 acts as a
      non-catalytic scaffolding/assembly factor.
    supported_by:
    - reference_id: PMID:32296183
      supporting_text: "reference interactome map of human binary protein interactions, or 'HuRI'"
