- term:
    id: GO:0044183
    label: protein folding chaperone
  evidence_type: IDA
  original_reference_id: PMID:28082314
  qualifier: enables
  review:
    summary: >-
      Direct-assay MF annotation as a protein folding chaperone. The cited paper
      shows COX14 is part of an early COX1-COA3-COX14 assembly intermediate that
      stabilises newly synthesised COX1, but does not demonstrate a classical
      protein-folding chaperone catalytic activity for COX14 itself.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      COX14 functions as a scaffolding/regulatory assembly factor within MITRAC
      rather than as a canonical folding chaperone; the stabilisation of nascent
      COX1 is a complex-assembly effect. Assigning a 'protein folding chaperone'
      molecular function over-interprets this scaffolding role. This experimental
      IDA is retained but flagged as over-annotated rather than removed, since we
      cannot fully verify the curator's full-text rationale; the core role is
      better represented as Complex IV assembly (GO:0033617).
    supported_by:
    - reference_id: PMID:28082314
      supporting_text: "CMC1 stabilizes a COX1-COA3-COX14 complex before the incorporation of COX4 and"
