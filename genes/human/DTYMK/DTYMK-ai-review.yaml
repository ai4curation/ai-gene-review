  label: Homo sapiens
description: >-
  DTYMK is thymidylate kinase (dTMP kinase; EC 2.7.4.9), a small cytosolic P-loop
  nucleotide kinase that catalyses the ATP- and Mg2+-dependent phosphorylation of
  thymidine monophosphate (dTMP) to thymidine diphosphate (dTDP) (dTMP + ATP -> dTDP +
  ADP). This is the common penultimate step in the synthesis of the DNA building block
  dTTP: the de novo route (dUMP -> dTMP via thymidylate synthase) and the salvage route
  (thymidine -> dTMP via thymidine kinase) both converge on dTMP kinase, making it the
  bottleneck for dTTP biosynthesis; dTDP is subsequently phosphorylated to dTTP by
  nucleoside diphosphate kinase. Because dTTP cannot be generated by any bypass, the
  enzyme is essential for DNA replication and genome integrity; its expression and
  activity peak in S phase. The active enzyme is a homodimer and has been crystallised
  extensively in complex with dTMP/ATP analogues. It also activates thymidine-analogue
  prodrugs (e.g. zidovudine/AZT monophosphate). Biallelic loss-of-function variants cause
  a severe childhood-onset neurodegenerative disorder with progressive microcephaly.
