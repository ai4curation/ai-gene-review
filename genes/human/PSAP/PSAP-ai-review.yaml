- term:
    id: GO:0030290
    label: sphingolipid activator protein activity
  evidence_type: IDA
  original_reference_id: file:human/PSAP/PSAP-uniprot.txt
  qualifier: enables
  review:
    summary: Proposed core molecular function. The four saposins derived from prosaposin are the
      canonical non-enzymatic sphingolipid-activator proteins that stimulate lysosomal
      sphingolipid-degrading hydrolases (glucosylceramidase, galactosylceramidase, cerebroside-sulfatase,
      alpha- and beta-galactosidase, sphingomyelin phosphodiesterase). This term (GO:0030290) is the
      specific, informative MF for PSAP but is not currently present in the GOA TSV; it is added here as a
      NEW annotation to reflect the core function.
    action: NEW
    reason: The most informative molecular-function term for prosaposin/saposins is not in the current
      GOA (which spreads the MF across lipid/ganglioside/phospholipid binding). GO:0030290 directly
      captures the non-catalytic sphingolipid-activator cofactor activity that defines this gene; added as
      a NEW core annotation. Supported by decades of biochemistry (UniProt FUNCTION) and the term's own
      definition.
    supported_by:
    - reference_id: file:human/PSAP/PSAP-uniprot.txt
      supporting_text: act as activator proteins for lysosomal
        sphingolipid-degrading enzymes, facilitating the hydrolysis of
        sphingolipids
