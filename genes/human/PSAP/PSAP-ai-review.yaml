core_functions:
- description: As the precursor of saposins A-D, prosaposin provides non-enzymatic sphingolipid-activator
    protein cofactors that stimulate lysosomal sphingolipid-degrading hydrolases (galactosylceramidase,
    arylsulfatase A, beta-galactosidase, alpha-galactosidase A, acid beta-glucosylceramidase, acid
    ceramidase and sphingomyelinase), driving glycosphingolipid catabolism in the lysosome.
  molecular_function:
    id: GO:0030290
    label: sphingolipid activator protein activity
  directly_involved_in:
  - id: GO:0046479
    label: glycosphingolipid catabolic process
  locations:
  - id: GO:0005764
    label: lysosome
  - id: GO:0043202
    label: lysosomal lumen
  supported_by:
  - reference_id: file:human/PSAP/PSAP-uniprot.txt
    supporting_text: Saposins are specific low-molecular mass non-enzymatic
      glycoproteins that act as activator proteins for lysosomal
      sphingolipid-degrading enzymes
- description: The saposins act as lipid-binding/lipid-transfer proteins that extract or solubilise
    membrane glycosphingolipids (including gangliosides and sulfatide) and phospholipids and present them
    to their cognate acid hydrolases, enabling sphingolipid catabolism in the lysosome.
  molecular_function:
    id: GO:0008289
    label: lipid binding
