id: P07602
gene_symbol: PSAP
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  PSAP encodes prosaposin, a 524-residue lysosomal glycoprotein that is the common precursor
  of the four saposins (saposin A, B, C and D). In the lysosome, prosaposin is proteolytically
  processed into these four small (~80-residue), heat-stable, non-enzymatic saposin domains,
  each of which functions as a sphingolipid-activator / lipid-transfer protein. The saposins
  extract or solubilise membrane glycosphingolipids and present them to their cognate acid
  hydrolases: saposin A activates galactosylceramidase (GALC); saposin B activates arylsulfatase A
  (ARSA, sulfatide degradation), beta-galactosidase and alpha-galactosidase A; saposin C activates
  acid beta-glucosylceramidase (GBA1) and protects it from proteolysis; and saposin D activates acid
  ceramidase (ASAH1) and acid sphingomyelinase. Through these cofactor activities PSAP is essential
  for lysosomal sphingolipid/glycosphingolipid catabolism. Intact, secreted prosaposin additionally
  acts as a neurotrophic and myelinotrophic factor, signalling through the G-protein-coupled receptors
  GPR37 and GPR37L1, and serves as a trafficking chaperone that facilitates lysosomal delivery of
  progranulin. Prosaposin localises to the lysosome and is also secreted as a fully glycosylated
  ~70 kDa protein; its lysosomal targeting is mediated by sortilin (SORT1). Complete loss of
  prosaposin causes combined saposin deficiency, a fatal infantile sphingolipid storage disorder,
  whereas deficiencies of individual saposins phenocopy the corresponding enzyme diseases
  (saposin A ~ Krabbe disease, saposin B ~ metachromatic leukodystrophy, saposin C ~ atypical
  Gaucher disease); variants in the saposin D domain are also linked to Parkinson disease (PARK24).
