  original_reference_id: GO_REF:0000033
  qualifier: enables
  review:
    summary: Saposins (notably saposin C/D and the related GM2 activator family) bind and load
      lipid antigens onto CD1 molecules for antigen presentation, and structural work explicitly
      notes a role in lipid antigen presentation. This is a genuine but peripheral activity relative
      to the core sphingolipid-catabolic cofactor function.
    action: KEEP_AS_NON_CORE
    reason: Lipid antigen binding/presentation is an established but non-core saposin function;
      keep as an accurate phylogenetic annotation, not a core function.
