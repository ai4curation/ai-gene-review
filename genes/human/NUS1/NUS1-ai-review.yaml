core_functions:
- description: >-
    Non-catalytic subunit of the ER-membrane cis-prenyltransferase (dehydrodolichyl diphosphate
    synthase) complex; with the catalytic subunit DHDDS it condenses isopentenyl diphosphate units
    onto farnesyl diphosphate to produce dehydrodolichyl diphosphate, the committed step of dolichol
    biosynthesis that provides the dolichol-phosphate glycan carrier for N-linked protein
    glycosylation in the ER. NUS1 has no activity alone but is required for and contributes to the
    complex activity via its C-terminal RXG motif (substrate binding) and stabilizes DHDDS.
  contributes_to_molecular_function:
    id: GO:0045547
    label: ditrans,polycis-polyprenyl diphosphate synthase [(2E,6E)-farnesyl diphosphate
      specific] activity
  directly_involved_in:
  - id: GO:0006489
    label: dolichyl diphosphate biosynthetic process
  - id: GO:0043048
    label: dolichyl monophosphate biosynthetic process
  in_complex:
    id: GO:1904423
    label: dehydrodolichyl diphosphate synthase complex
  locations:
  - id: GO:0005789
    label: endoplasmic reticulum membrane
  supported_by:
  - supporting_text: >-
      Both subunits
    reference_id: file:human/NUS1/NUS1-uniprot.txt
  - supporting_text: >-
      a critical RXG sequence in the C-terminal tail of NgBR that is conserved and essential for
      enzyme activity
    reference_id: PMID:28842490
  - supporting_text: >-
