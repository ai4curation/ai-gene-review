id: Q96E22
gene_symbol: NUS1
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  NUS1 (NgBR; Nogo-B receptor) is the non-catalytic subunit of the human cis-prenyltransferase
  (cis-PT / cis-isoprenyltransferase) complex, the obligate partner of the catalytic subunit
  DHDDS. Together DHDDS and NUS1 form the dehydrodolichyl diphosphate synthase complex, which
  catalyzes the committed step of dolichol biosynthesis: the sequential cis-condensation of
  multiple isopentenyl diphosphate (IPP) units onto (2E,6E)-farnesyl diphosphate (FPP) to produce
  dehydrodolichyl diphosphate (Dedol-PP), the precursor of dolichol phosphate. Dolichol phosphate
  is the obligate lipid glycosyl carrier for N-linked protein glycosylation in the endoplasmic
  reticulum. NUS1 has no cis-prenyltransferase activity on its own; DHDDS carries the classical
  catalytic residues, but NUS1 is strictly required for activity, stabilizes DHDDS through
  dimerization, and contributes to the shared active site via its conserved C-terminal RXG motif,
  which participates in substrate (IPP) binding. The active enzyme is a heterotetramer (dimer of
  DHDDS-NUS1 heterodimers). NUS1 is a multi-pass endoplasmic reticulum membrane protein. It was
  originally identified as the receptor for the N-terminus of Nogo-B (reticulon-4B) in the
  vascular endothelium, and additionally binds and stabilizes NPC2, influencing intracellular
  cholesterol trafficking. Biallelic loss-of-function variants cause a congenital disorder of
  glycosylation (CDG1AA), and de novo variants cause autosomal dominant intellectual disability
  with seizures (MRD55).
