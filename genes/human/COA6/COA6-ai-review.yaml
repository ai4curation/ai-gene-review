id: Q5JTJ3
gene_symbol: COA6
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: COA6 (cytochrome c oxidase assembly factor 6 homolog; formerly C1orf31)
  is a small (~14 kDa) mitochondrial intermembrane-space/inner-membrane assembly factor
  for respiratory chain complex IV (cytochrome c oxidase). It has a twin CX9C motif
  and adopts a CHCH (coiled-coil-helix-coiled-coil-helix) fold typical of IMS redox
  proteins, and is imported via the MIA disulfide-relay pathway. COA6 acts as a
  thiol-disulfide oxidoreductase/copper-relay factor that, together with SCO1, SCO2
  and COX20, mediates copper delivery to and CuA-site metallation of the newly
  synthesized mtDNA-encoded subunit MT-CO2/COX2. It transiently binds the copper
  center of nascent COX2 and reduces the copper-coordinating disulfides of its client
  proteins SCO1 and COX2 to permit copper loading; it is not itself a physiological
  copper-binding protein. Loss of COA6 destabilizes newly synthesized COX2 and blocks
  complex IV assembly. Biallelic loss-of-function variants cause mitochondrial complex
  IV deficiency nuclear type 13 (fatal infantile hypertrophic cardioencephalomyopathy
  with lactic acidosis).
