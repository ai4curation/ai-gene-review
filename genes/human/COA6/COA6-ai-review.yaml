core_functions:
- description: Thiol-disulfide oxidoreductase that reduces the copper-coordinating
    disulfides of its client proteins (the copper chaperone SCO1 and the cytochrome
    c oxidase subunit MT-CO2/COX2), enabling copper loading during CuA-site metallation.
  molecular_function:
    id: GO:0015035
    label: protein-disulfide reductase activity
  supported_by:
  - reference_id: PMID:31851937
    supporting_text: COA6 adopts a coiled-coil-helix-coiled-coil-helix (CHCH) domain,
      preferentially interacts with SCO1, and exhibits thiol-disulfide oxidoreductase
      activity both in vitro and in vivo, with SCO1 and COX2 being its client proteins.
- description: Acts as a copper-relay/assembly factor in the mitochondrial intermembrane
    space that mediates copper delivery to and maturation of the mtDNA-encoded subunit
    MT-CO2/COX2, together with SCO1, SCO2 and COX20, and is thereby required for
    biogenesis of respiratory chain complex IV (cytochrome c oxidase).
  directly_involved_in:
