    supporting_text: define COA6 as a constituent of the
      mitochondrial copper relay system, linking defects in COX2 metallation to
      cardiac cytochrome c oxidase deficiency
  - reference_id: PMID:26160915
    supporting_text: caused by impaired biogenesis of the copper-bound mitochondrial
      DNA-encoded subunit COX2 and subsequent accumulation of complex IV assembly
      intermediates
proposed_new_terms: []
suggested_questions:
- question: Does COA6 have a distinct client specificity (SCO1 vs SCO2 vs COX2) in
    vivo, and how is its disulfide-reductase activity re-oxidized within the MIA/IMS
    redox network?
- question: Is the reported in vitro copper-binding capacity of COA6 ever physiologically
    relevant (e.g. transiently during copper hand-off), or is it purely an artifact
    of the reduced apo-protein?
suggested_experiments:
- description: Structure-guided mutagenesis of the CX9C cysteines to separate COA6's
    import (MIA-dependent) requirement from its catalytic disulfide-reductase activity,
    tested by COX2 metallation and complex IV assembly rescue in COA6-knockout cells.
- description: Quantitative redox-state measurement of SCO1/SCO2/COX2 cysteines in
    the presence and absence of COA6 to establish the directionality and kinetics of
    the copper relay.
