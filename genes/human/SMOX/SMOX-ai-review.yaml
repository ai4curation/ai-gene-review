      favors spermine over N1-acetylspermine and does not act on
      N1-acetylspermidine, spermidine or N1,N12-diacetylspermine, defining the
      direct (non-acetylation-dependent) spermine oxidase activity.
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Directly establishes SMOX substrate specificity distinguishing it from
      PAOX. Verbatim substrate-preference text quoted in core_functions.
