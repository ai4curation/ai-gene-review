id: Q9NWM0
gene_symbol: SMOX
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  SMOX (spermine oxidase, also known as PAOh1/SMO) is a soluble, FAD-dependent
  amine oxidase of the flavin monoamine oxidase / polyamine-oxidase family
  (EC 1.5.3.16). It catalyzes the direct oxidation of the free polyamine
  spermine to spermidine, releasing 3-aminopropanal and hydrogen peroxide
  (spermine + O2 + H2O -> spermidine + 3-aminopropanal + H2O2). This reaction
  constitutes the direct back-conversion arm of polyamine catabolism and,
  together with spermidine/spermine N1-acetyltransferase (SSAT) and
  N1-acetylpolyamine oxidase (PAOX/PAO), controls the interconversion and
  intracellular concentrations of the polyamines spermine, spermidine and
  putrescine. Unlike PAOX, which acts on N1-acetylated polyamines, SMOX acts
  preferentially on non-acetylated spermine and does not require prior
  acetylation. SMOX is a monomeric flavoprotein that binds one FAD per subunit.
  The enzyme is expressed from at least six alternatively spliced isoforms with
  differing substrate affinities and is found in both the cytoplasm and the
  nucleus. Its products link SMOX to oxidative stress: the H2O2 and reactive
  aldehyde generated by spermine oxidation, particularly when produced in the
  nucleus, can cause reactive-oxygen-species-mediated DNA damage and apoptosis,
  and elevated SMOX activity is implicated in inflammation-associated
  carcinogenesis.
