  findings:
  - statement: >-
      Cloning of human PAOh1/SMOX; the cDNA product has FAD-dependent polyamine
      oxidase activity inhibited by the specific mammalian PAO inhibitor
      MDL 72,527 but not by monoamine- or diamine-oxidase inhibitors, and is
      inducible by antitumor polyamine analogues.
