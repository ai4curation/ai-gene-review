- term:
    id: GO:0006596
    label: polyamine biosynthetic process
  evidence_type: TAS
  original_reference_id: Reactome:R-HSA-351200
  qualifier: involved_in
  review:
    summary: >-
      TAS annotation propagated from the Reactome Interconversion of polyamines
      pathway, which groups both biosynthetic aminopropyltransferase steps and
      catabolic oxidase steps. SMOX is a catabolic enzyme that degrades spermine
      to spermidine; it does not biosynthesize polyamines. Its role in the
      interconversion pathway recycles spermine to spermidine (a catabolic /
      back-conversion event), so polyamine biosynthetic process mis-frames the
      enzyme's direction and is an over-annotation arising from the mixed-content
      Reactome pathway.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      SMOX is catabolic (spermine to spermidine + H2O2); biosynthesis is the
      wrong process direction. The correct catabolic processes are separately
      annotated.
