  label: Homo sapiens
description: >-
  ATP5MD (also ATP5MK; synonyms DAPIT, USMG5, HCVFTP2) is a small 58-residue,
  single-pass transmembrane protein that is subunit k of the membrane-embedded
  F(o) sector of the mitochondrial F1Fo ATP synthase (Complex V). It is a
  non-catalytic, structural/accessory subunit: the catalytic and proton-conducting
  activities belong to the assembled complex rather than to this subunit. ATP5MD
  is required for the stability and assembly of Complex V and, in particular, for
  its dimerization (oligomerization); the ATP synthase dimer helps shape
  mitochondrial cristae and thereby optimizes proton flow and ATP production. Loss
  of ATP5MD reduces the population and dimeric form of ATP synthase in mitochondria
  and lowers the rate of proton motive force-driven ATP synthesis. The protein is
  anchored in the mitochondrial inner membrane. In humans, biallelic loss-of-function
  variants cause mitochondrial complex V deficiency, nuclear type 6 (a Leigh-syndrome
  presentation).
