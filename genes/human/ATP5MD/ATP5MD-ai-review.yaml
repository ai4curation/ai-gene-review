- id: PMID:21345788
  title: Knockdown of DAPIT (diabetes-associated protein in insulin-sensitive tissue)
    results in loss of ATP synthase in mitochondria.
  findings:
  - statement: >-
      DAPIT knockdown in HeLa cells reduces the population of ATP synthase in
      mitochondria and lowers mitochondrial ATP synthesis activity, indicating that
      DAPIT is required to maintain the ATP synthase complex.
    supporting_text: DAPIT-knockdown cells show smaller mitochondrial ATP synthesis activity
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified primary study establishing DAPIT's requirement for the ATP synthase
      population and mitochondrial ATP synthesis. Cache is abstract-only; supporting quotes
      taken verbatim from the abstract.
- id: PMID:26297831
  title: Assembly of human mitochondrial ATP synthase through two separate intermediates,
    F1-c-ring and b-e-g complex.
  findings:
  - statement: >-
      Human mitochondrial ATP synthase assembles from separately formed rotor and stator
      modules; the abstract foregrounds d-subunit knockdown, but ComplexPortal uses this
      study as the reference for ATP5MD complex membership, PMF-driven ATP synthesis, and
      inner-membrane localization.
    supporting_text: human cells could not form ATP synthase holocomplex
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: >-
      Correctly cited assembly study; used by ComplexPortal as the NAS reference for several
      ATP5MD annotations. Abstract-only cache; ATP5MD is not foregrounded in the abstract but
      the complex context is appropriate.
- id: PMID:29917077
  title: USMG5 Ashkenazi Jewish founder mutation impairs mitochondrial complex V dimerization
    and ATP synthesis.
  findings:
  - statement: >-
      A homozygous USMG5 (ATP5MD/ATP5MK) splice mutation abolishes the protein and selectively
      reduces Complex V dimer expression and ATP synthesis without affecting monomeric CV;
      wild-type cDNA rescue restores dimerization and ATP production, defining USMG5 as a
      Complex V subunit required for dimerization.
    supporting_text: reduced both CV dimer expression and ATP synthesis rate
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified disease study directly demonstrating that ATP5MD/USMG5 is a Complex V
      subunit required for dimeric assembly and ATP synthesis (mutation plus rescue). Cache is
      abstract-only; quotes are verbatim from the abstract.
