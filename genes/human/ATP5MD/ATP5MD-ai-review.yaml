core_functions:
- description: >-
    Structural/accessory subunit k of the membrane F(o) sector of mitochondrial F1Fo ATP
    synthase (Complex V); contributes to the complex-level rotary ATP synthase activity that
    couples proton translocation across the inner membrane to ATP synthesis. As a subunit it
    is a structural constituent (does not independently catalyze ATP synthesis).
