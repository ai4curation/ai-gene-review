proposed_new_terms: []
suggested_questions:
- question: >-
    Does NDUFC2 have any moonlighting role outside Complex I, or is the reported
    "Human lung cancer oncogene 1 (HLC-1)" activity entirely attributable to its
    Complex I / mitochondrial function?
- question: >-
    What is the functional significance, if any, of the NDUFC2-KCTD14
    read-through fusion isoform relative to canonical NDUFC2?
suggested_experiments:
- description: >-
    Structural or crosslinking analysis to map the precise interfaces by which
    NDUFC2/B14.5b stabilizes the ND2 module of the Complex I membrane arm.
- description: >-
    Rescue of NDUFC2-null cells with catalytically neutral point mutants to
    define which residues are required for Complex I assembly versus stability.
