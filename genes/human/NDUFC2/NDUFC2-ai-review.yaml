id: O95298
gene_symbol: NDUFC2
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  NDUFC2 (B14.5b; CI-B14.5b) is a small (119 aa), nuclear-encoded, single-pass
  membrane protein that is an accessory (supernumerary) subunit of the membrane
  arm of mitochondrial respiratory Complex I (NADH:ubiquinone oxidoreductase).
  It is a stable structural component of the mature holoenzyme rather than a
  catalytic subunit: it is not itself involved in electron transfer but is
  required for correct assembly and stability of the complex, particularly the
  ND2 module of the membrane arm. NDUFC2 localizes to the mitochondrial inner
  membrane with its N- and C-terminal regions on the matrix side, and interacts
  with the assembly-associated membrane protein TMEM242. Loss of Complex I
  function through defective assembly reduces mitochondrial NADH-driven electron
  transport and proton pumping; bi-allelic pathogenic NDUFC2 variants cause an
  autosomal-recessive mitochondrial Complex I deficiency (nuclear type 36,
  MC1DN36) presenting as early-onset Leigh syndrome.
