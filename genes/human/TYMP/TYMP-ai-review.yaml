id: P19971
gene_symbol: TYMP
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: Thymidine phosphorylase (TYMP; EC 2.4.2.4), also known as platelet-derived
  endothelial cell growth factor (PD-ECGF) and gliostatin, is a cytosolic homodimeric
  enzyme that catalyzes the reversible phosphorolysis of thymidine (and 2'-deoxyuridine),
  converting thymidine + phosphate into thymine + 2-deoxy-alpha-D-ribose 1-phosphate
  (and 2'-deoxyuridine into uracil + 2-deoxy-alpha-D-ribose 1-phosphate). Through this
  activity it feeds pyrimidine catabolism and the thymine-to-dTMP salvage pathway,
  and by controlling systemic levels of thymidine and 2'-deoxyuridine it protects the
  mitochondrial deoxyribonucleotide (dNTP) pool from imbalance. TYMP additionally has
  an extracellular moonlighting role as an angiogenic growth factor, promoting
  endothelial cell growth and chemotaxis. Loss-of-function mutations in TYMP cause
  mitochondrial neurogastrointestinal encephalomyopathy (MNGIE; mitochondrial DNA
  depletion syndrome 1, MTDPS1), in which accumulation of thymidine and deoxyuridine
  drives mitochondrial DNA instability and depletion, producing gastrointestinal
  dysmotility, cachexia, peripheral neuropathy, and leukoencephalopathy.
