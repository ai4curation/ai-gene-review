- term:
    id: GO:0004645
    label: 1,4-alpha-oligoglucan phosphorylase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: Electronic InterPro2GO mapping (IPR000053) assigning glycogen/starch
      phosphorylase activity. This is incorrect for TYMP.
    action: REMOVE
    reason: GO:0004645 (1,4-alpha-oligoglucan phosphorylase activity, i.e. glycogen/starch
      phosphorylase) is a distinct enzyme acting on alpha-1,4-glucan polysaccharides,
      not on nucleosides. TYMP is a pyrimidine-nucleoside phosphorylase (EC 2.4.2.4)
      that phosphorolyses thymidine/deoxyuridine; it has no activity on oligoglucans.
      This is a demonstrably wrong IEA arising from the InterPro entry being over-broad
      relative to the actual catalytic specificity; the correct MF is GO:0009032.
    supported_by:
    - reference_id: file:human/TYMP/TYMP-uniprot.txt
      supporting_text: Catalyzes the reversible phosphorolysis of thymidine
- term:
    id: GO:0006206
    label: pyrimidine nucleobase metabolic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: involved_in
  review:
    summary: TYMP produces the pyrimidine nucleobase thymine (and uracil from
      deoxyuridine) and, in the reverse direction, consumes them, so it participates
      in pyrimidine nucleobase metabolism.
    action: ACCEPT
    reason: The phosphorolysis reaction produces thymine/uracil from thymidine/deoxyuridine
      (and the reverse builds nucleosides from nucleobases), placing TYMP directly
      in pyrimidine nucleobase metabolism. This is an accurate InterPro2GO mapping.
    supported_by:
