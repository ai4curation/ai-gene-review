- term:
    id: GO:0005525
    label: GTP binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: |
      InterPro-based GTP binding prediction. The original review marked this
      REMOVE based on Koller-Eichhorn 2007. However, falcon deep research surfaces
      that OLA1 is an atypical NTPase that can bind and hydrolyze both ATP and
      GTP, with Chen et al. 2015 (PMID:26283179) actually reporting stronger
      GTPase than ATPase activity (Kcat 0.677/min vs 0.065/min) and Sidlowski
      2023 (PMID:36481055) describing a phosphorylation-controlled switch where
      T325 phosphorylation increases GTPase activity. Action revised
      REMOVE -> KEEP_AS_NON_CORE.
    action: KEEP_AS_NON_CORE
    reason: |
      OLA1 does bind GTP in a regulated, phospho-state-dependent manner. ATP is
      the preferred substrate based on structural determinants (G4 motif NxxE,
      Koller-Eichhorn 2007), but GTP binding/hydrolysis is biologically relevant
      under phosphorylation control. Marked as non-core because ATPase activity
      is the predominant baseline function.
    supported_by:
    - reference_id: PMID:17430889
      supporting_text: altered nucleotide specificity of YchF homologues and identify
        the Ola1/YchF subfamily of the Obg-related NTPases as an exceptional example
        of a single protein subfamily, which has evolved altered nucleotide specificity
    - reference_id: file:human/OLA1/OLA1-deep-research-falcon.md
      supporting_text: |
        Dual ATP/GTP binding/hydrolysis: Reviews and primary work indicate OLA1/YchF can bind and hydrolyze both ATP and GTP, although multiple structural determinants bias human OLA1 toward ATP.
      reference_section_type: DISCUSSION
    - reference_id: file:human/OLA1/OLA1-deep-research-falcon.md
      supporting_text: |
        ERK2 phosphorylation at Thr325 alters OLA1 biochemical behavior and DNA binding, with evidence that T325 phosphorylation increases GTPase activity and suppresses ATPase activity and potentiates DNA binding.
      reference_section_type: RESULTS
- term:
    id: GO:0005634
    label: nucleus
  evidence_type: IEA
  original_reference_id: GO_REF:0000044
  review:
    summary: |
      Subcellular location-based nuclear annotation. Baseline OLA1 is predominantly
      cytoplasmic, but Sidlowski et al. 2023 (PMID:36481055) demonstrated stress-induced
      nuclear translocation of OLA1 in pulmonary vascular cells. Phosphorylation
      at S232/Y236 by ERK1 triggers nuclear import via importin-alpha1 (KPNA2), and
      phospho-T325 OLA1 binds DNA and activates transcription of nuclear-encoded
      mitochondrial bioenergetic genes. Action revised REMOVE -> KEEP_AS_NON_CORE
      based on falcon deep research.
    action: KEEP_AS_NON_CORE
    reason: |
      Nuclear localization is now experimentally supported as a stress-induced,
      regulated state rather than baseline. It is not the predominant or core
      localization (which is cytosolic/mitochondrial), but Sidlowski 2023 establishes
      a real, regulated nuclear pool with a functional role in mitonuclear retrograde
      signaling. Marked as non-core rather than removed.
    supported_by:
    - reference_id: GO_REF:0000054
      supporting_text: Gene Ontology annotation based on curation of intracellular
        localizations of expressed fusion proteins in living cells [shows cytoplasmic,
        not nuclear]
    - reference_id: file:human/OLA1/OLA1-deep-research-falcon.md
      supporting_text: |
        ERK1 phosphorylation at Ser232/Tyr236 triggers OLA1 translocation from cytoplasm/mitochondria to nucleus.
      reference_section_type: RESULTS
    - reference_id: file:human/OLA1/OLA1-deep-research-falcon.md
      supporting_text: |
        Stress-induced nuclear translocation: Cellular stresses (hypoxia, H2O2, mitochondrial uncoupling) induce nuclear accumulation of OLA1, with mechanistic dependence on ERK phosphorylation and nuclear import machinery (importin-alpha1) and the cytoskeletal intermediate filament vimentin.
      reference_section_type: RESULTS
