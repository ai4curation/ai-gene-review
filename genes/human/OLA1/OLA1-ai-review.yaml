- id: PMID:36481055
  title: OLA1 Phosphorylation Governs the Mitochondrial Bioenergetic Function of
    Pulmonary Vascular Cells.
  findings:
  - statement: |
      OLA1 couples redox signals to the metabolic response pathway by activating
      metabolic gene transcription in the nucleus.
    supporting_text: |
      Here we show that human OLA1 (Obg-like ATPase-1) couples redox signals to the metabolic response pathway by activating metabolic gene transcription in the nucleus.
    reference_section_type: ABSTRACT
  - statement: |
      Sequential phosphorylation at S232/Y236 drives nuclear translocation and
      at T325 switches OLA1 biochemistry from ATPase to GTPase.
    supporting_text: |
      OLA1 phosphorylation at Ser232/Tyr236 triggers its translocation from the cytoplasm and mitochondria into the nucleus. Subsequent phosphorylation of OLA1 at Thr325 effectively changes its biochemical function from ATPase to GTPase, promoting the expression of genes involved in the mitochondrial bioenergetic function.
    reference_section_type: ABSTRACT
  - statement: |
      ERK1/2 and PP1A are the upstream kinase/phosphatase regulators of OLA1's
      phospho-driven activity switch.
    supporting_text: |
      This process is regulated by ERK1/2 (extracellular-regulated kinases 1 and 2), which were restrained by PP1A (protein phosphatase 1A) when stress abated.
    reference_section_type: ABSTRACT
  - statement: |
      ERK1 knockdown or OLA1-T325A blocks nuclear translocation, impairs
      mitochondrial gene expression, and depletes cellular energy.
    supporting_text: |
      Knockdown of ERK1 or OLA1 mutated to a phosphoresistant T325A mutant blocked its nuclear translocation, compromised the expression of nuclear-encoded mitochondrial genes, and consequently led to cellular energy depletion.
    reference_section_type: ABSTRACT
  - statement: |
      OLA1 knockout lungs have fewer mitochondria, lower ATP, and higher lactate,
      with abnormal vascular cell behavior and vascular remodeling.
    supporting_text: |
      Moreover, the lungs of OLA1 knockout mice have fewer mitochondria, lower cellular ATP concentrations, and higher lactate concentrations. The ensuing mitochondrial metabolic dysfunction resulted in abnormal behaviors of pulmonary vascular cells and significant vascular remodeling.
    reference_section_type: ABSTRACT
  - statement: |
      OLA1 functions as a component of mitochondrial retrograde communication
      coupling stress to nuclear metabolic gene expression.
    supporting_text: |
      Our findings demonstrate that OLA1 is an important component of the mitochondrial retrograde communication pathways that couple stress signals with metabolic genes in the nucleus. Thus, phosphorylation-dependent nuclear OLA1 localization that governs cellular energy metabolism is critical to cardiovascular function.
    reference_section_type: ABSTRACT
- id: PMID:26283179
  title: OLA1 regulates protein synthesis and integrated stress response by inhibiting
    eIF2 ternary complex formation.
  findings:
  - statement: |
      OLA1 is an eIF2-regulatory protein that inhibits protein synthesis and
      promotes the integrated stress response by binding eIF2, hydrolyzing GTP,
      and interfering with ternary complex formation.
    supporting_text: |
      OLA1, a member of the ancient Obg family of GTPases, is an eIF2-regulatory protein that inhibits protein synthesis and promotes ISR by binding eIF2, hydrolyzing GTP, and interfering with TC formation.
    reference_section_type: ABSTRACT
  - statement: |
      OLA1 acts via a novel translational control mechanism that blocks de novo
      ternary complex formation, distinct from the canonical eIF2alpha-P pathway.
    supporting_text: |
      OLA1 thus represents a novel mechanism of translational control affecting de novo TC formation, different from the traditional model in which phosphorylation of eIF2alpha blocks the regeneration of TC.
    reference_section_type: ABSTRACT
  - statement: |
      Depletion of OLA1 yields a hypoactive ISR and increased survival of
      stressed cells.
    supporting_text: |
      Depletion of OLA1 caused a hypoactive ISR and greater survival in stressed cells.
    reference_section_type: ABSTRACT
  - statement: |
      In contrast to the YchF/Obg-like ATPase nomenclature, human OLA1 protein
      has a much stronger GTPase activity than ATPase activity in this study.
    supporting_text: |
      It is worth mentioning that in some earlier reports the YchF-sub family of GTPases was found to bind and hydrolyze ATP more effectively than GTP, and hence OLA1 was renamed as Obg-like ATPase. However, our measurements indicate human OLA1 protein has a much stronger GTPase activity (Kcat: 0.677 +/- 0.038 min-1) than ATPase activity (Kcat: 0.065 +/- 0.012 min-1)
    reference_section_type: RESULTS
  - statement: |
      OLA1 co-sediments with 40S, 60S, 80S, and polysomal ribosomal fractions
      consistent with direct ribosome association.
    supporting_text: |
      Polysome profiling of A549 and HEK293T cells revealed that OLA1 co-sedimented with ribosomal fractions (40S, 60S, 80S, and polysomes)
    reference_section_type: RESULTS
