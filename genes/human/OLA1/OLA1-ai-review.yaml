- id: file:human/OLA1/OLA1-deep-research-falcon.md
  title: Falcon deep research on OLA1 (Edison Scientific Literature)
  findings:
  - statement: |
      OLA1 is a stress-responsive NTPase hub at the interface of translation
      initiation control, proteostasis, and mitonuclear communication.
    supporting_text: |
      Obg-like ATPase 1 (OLA1; also called GTPBP9/DOC45) is the human eukaryotic homolog of the universally conserved YchF/Ola1 family of TRAFAC/Obg-like P-loop NTPases. It is an atypical NTPase that can bind/hydrolyze ATP and GTP but shows structural features favoring ATP, and it integrates stress signaling with translation initiation control, proteostasis, and mitochondria-nucleus (retrograde) communication.
    reference_section_type: INTRODUCTION
  - statement: |
      ERK-driven phosphorylation switches OLA1 localization (cytoplasm/mitochondria
      to nucleus) and enzymatic activity (ATPase to GTPase), enabling
      stress-coupled regulation of nuclear-encoded mitochondrial bioenergetic
      programs.
    supporting_text: |
      Recent 2023 work provides a mechanistic framework in which ERK1/2-dependent phosphorylation controls OLA1's subcellular localization and switches its biochemical activity, thereby enabling OLA1 to act as a stress-responsive regulator of nuclear-encoded mitochondrial bioenergetic programs.
    reference_section_type: INTRODUCTION
  - statement: |
      Domain architecture is conserved across the YchF/OLA1 family with an
      N-terminal G/NTPase domain, helical/coiled-coil domain, and C-terminal
      TGS domain (RNA-binding).
    supporting_text: |
      The YchF/Ola1 proteins are described as conserved three-domain proteins comprising an N-terminal G (NTPase) domain, a helical/coiled-coil domain, and a C-terminal TGS domain (often associated with RNA-binding functions).
    reference_section_type: DISCUSSION
  - statement: |
      The atypical G4 motif (NxxE instead of canonical NKxD) underlies altered
      nucleotide specificity and bias toward ATP.
    supporting_text: |
      A defining feature is a non-canonical G4 motif (often NxxE rather than the canonical NKxD), which is proposed to underlie altered nucleotide specificity and ATP preference relative to typical GTPases.
    reference_section_type: DISCUSSION
  - statement: |
      OLA1 has a strong mitochondrial pool localizing to the outer mitochondrial
      membrane in pulmonary vascular cells.
    supporting_text: |
      In pulmonary vascular cells, OLA1 shows a strong mitochondrial pool and is reported to localize to the outer mitochondrial membrane (supported by biochemical fractionation/protease protection and marker co-staining).
    reference_section_type: RESULTS
  - statement: |
      Stress-induced nuclear translocation of OLA1 depends on ERK phosphorylation,
      importin-alpha1 (KPNA2), and vimentin.
    supporting_text: |
      Cellular stresses (hypoxia, H2O2, mitochondrial uncoupling) induce nuclear accumulation of OLA1, with mechanistic dependence on ERK phosphorylation and nuclear import machinery (importin-alpha1) and the cytoskeletal intermediate filament vimentin.
    reference_section_type: RESULTS
  - statement: |
      Phospho-T325 OLA1 has increased GTPase activity, reduced ATPase activity,
      and potentiated DNA binding.
    supporting_text: |
      ERK2 phosphorylation at Thr325 alters OLA1 biochemical behavior and DNA binding, with evidence that T325 phosphorylation increases GTPase activity and suppresses ATPase activity and potentiates DNA binding.
    reference_section_type: RESULTS
  - statement: |
      OLA1 binds eIF2 and inhibits ternary-complex formation, modulating the
      integrated stress response.
    supporting_text: |
      OLA1 is reported to bind eIF2 and to inhibit translation initiation by preventing formation of the eIF2.GTP.Met-tRNAi ternary complex, thereby modulating pathways central to the integrated stress response (ISR).
    reference_section_type: RESULTS
  - statement: |
      OLA1 supports proteostasis via HSP70 stabilization and influences the
      CHIP/HSP70/SOD2 axis for oxidative stress control.
    supporting_text: |
      OLA1 has been linked to heat-shock resilience via HSP70 stabilization and to oxidative stress control through effects on the CHIP/HSP70/SOD2 axis.
    reference_section_type: DISCUSSION
  - statement: |
      OLA1 depletion downregulates nuclear genes for oxidative phosphorylation
      and mitochondrial assembly; T325D rescues but T325A does not.
    supporting_text: |
      OLA1 depletion downregulates nuclear genes involved in oxidative phosphorylation and mitochondrial assembly/structure; phosphomimetic nuclear OLA1 (T325D) rescues mitochondrial gene expression better than phosphoresistant T325A.
    reference_section_type: RESULTS
  - statement: |
      OLA1 deficiency in endothelial cells lowers ATP, raises lactate, and
      increases the ADP:ATP ratio.
    supporting_text: |
      Functional metabolic outcomes include lower cellular ATP, higher lactate, and increased ADP:ATP ratio in OLA1-deficient endothelial cells.
    reference_section_type: RESULTS
  - statement: |
      OLA1 is a translational regulator of p21 with links to P21/CDK2-related
      tumor progression in clinical/translational studies.
    supporting_text: |
      OLA1 is described as a translational regulator of p21, and clinical/translational studies link OLA1 to P21/CDK2-related tumor progression models.
    reference_section_type: DISCUSSION
  - statement: |
      OLA1 is implicated in BRCA1/BARD1-dependent centrosome regulation, bridging
      stress response and genome stability.
    supporting_text: |
      OLA1 is described as DNA-damage regulated (DOC45) and a BRCA1/BARD1-interacting factor implicated in centrosome regulation, providing a mechanistic bridge between stress responses and genome stability phenotypes.
    reference_section_type: DISCUSSION
