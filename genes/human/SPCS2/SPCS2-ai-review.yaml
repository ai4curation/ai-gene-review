  title: Interactomes of SARS-CoV-2 and human coronaviruses reveal host factors potentially affecting pathogenesis.
  findings:
  - statement: High-throughput affinity-purification interactome of SARS-CoV-2 and human coronavirus proteins; source of the IntAct SPCS2-spike (S) interaction.
    reference_section_type: ABSTRACT
  reference_review:
    relevance: LOW
    correctness: VERIFIED
    review_notes: High-throughput coronavirus interactome; the SPCS2-spike interaction is the source of the bare protein binding annotation and is not relevant to SPCS2's core function.
- id: PMID:34388369
  title: Structure of the human signal peptidase complex reveals the determinants for signal peptide cleavage.
  findings:
  - statement: Cryo-EM structures of the two human SPC paralogs identify SPCS2 as an accessory subunit; the complex forms a transmembrane window that locally thins the ER bilayer, generating specificity for signal-peptide hydrophobic-segment length.
    reference_section_type: ABSTRACT
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: Definitive structural study establishing SPCS2 as an accessory SPC subunit; basis for ComplexPortal annotations.
- id: PMID:39565596
  title: Spc2 modulates substrate- and cleavage site-selection in the yeast signal peptidase complex.
  findings:
  - statement: In yeast, depletion or mutation of Spc2 (ortholog of human SPCS2) compromises the SPC's ability to discriminate between substrates and to identify the correct cleavage site; molecular dynamics simulations show that membrane thinning at the center of the SPC is reduced without Spc2, providing a molecular explanation for the altered substrate-recognition properties.
    reference_section_type: ABSTRACT
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: PubMed-verified (PMID:39565596, doi:10.1083/jcb.202211035). Direct mechanistic evidence (in yeast Spc2, explicitly cross-referenced to human SPCS2) that the SPCS2 accessory subunit contributes to substrate and cleavage-site selection via membrane thinning, beyond the generic "enhances enzymatic activity" UniProt statement. Not in publications cache, so no verbatim supporting_text added.
- id: PMID:36789796
  title: Cleavage of the Jaw1 C-terminal region enhances its augmentative effect on the Ca2+ release via IP3 receptors.
  findings:
  - statement: The C-terminal region of the tail-anchored ER protein Jaw1 (IRAG2/LRMP) is cleaved after insertion specifically by the SEC11A-containing (but not SEC11C-containing) signal peptidase complex; this noncanonical post-insertional cleavage enhances Jaw1's augmentative effect on IP3 receptor-mediated Ca2+ release, linking SPC (of which SPCS2 is an accessory subunit) to ER Ca2+ signaling.
    reference_section_type: ABSTRACT
  reference_review:
    relevance: LOW
    correctness: VERIFIED
    review_notes: PubMed-verified (PMID:36789796, doi:10.1242/jcs.260439). Demonstrates a noncanonical SPC substrate (Jaw1) with SEC11A-paralog selectivity; SPCS2 is an accessory subunit of the executing complex but no SPCS2-specific role is assigned. Contextual for the expanded SPC substrate range. Not in publications cache, so no verbatim supporting_text added.
- id: PMID:38230952
  title: Landscape of protein-protein interactions during hepatitis C virus assembly and release.
  findings:
  - statement: An affinity-purification mass-spectrometry interactome of HCV-infected cells found that cell-derived SPCS2 interacts with both HCV p7 and E2, implicating the SPCS2-containing SPC in HCV glycoprotein/viroporin processing at the assembly stage.
    reference_section_type: ABSTRACT
  reference_review:
    relevance: LOW
    correctness: VERIFIED
    review_notes: PubMed-verified (PMID:38230952, doi:10.1128/spectrum.02562-22). High-throughput AP-MS interactome; SPCS2 among host factors binding HCV p7 and E2. Secondary host-pathogen context, not core function. Not in publications cache, so no verbatim supporting_text added.
