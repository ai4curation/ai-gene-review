suggested_questions:
- question: How does SPCS2 enhance the enzymatic activity of the signal peptidase complex - through stabilization of the catalytic SEC11 subunit, substrate gating, or coupling to the Sec61 translocon?
- question: Is SPCS2 strictly required for SPC assembly and signal-peptide cleavage in human cells, or is it conditionally dispensable like SPCS1?
suggested_experiments:
- description: Compare cleavage kinetics of reconstituted SPC with and without SPCS2 to quantify its proposed activity-enhancing role and substrate-length dependence.
- description: Acute SPCS2 depletion followed by quantitative N-terminomics and translocon proximity proteomics to test whether SPCS2 organizes translocation-site interactions in cells.
