id: Q9UF56
gene_symbol: FBXL17
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  FBXL17 (F-box/LRR-repeat protein 17; also F-box only protein 13) is a
  substrate-recognition subunit of a SKP1-CUL1-F-box (SCF/CRL1) E3 ubiquitin
  ligase complex. Through its N-terminal F-box motif it binds SKP1, docking it
  onto the CUL1-RBX1 catalytic scaffold, while its C-terminal leucine-rich
  repeat (LRR) domain provides substrate selectivity. FBXL17 performs a
  distinctive dimerization quality-control (DQC) function: its LRR recognizes a
  conserved, non-consecutive degron exposed at the interface of aberrantly
  paired BTB-domain dimers, so that the SCF(FBXL17) ligase selectively
  ubiquitinates and clears mismatched or compromised BTB homo/heterodimers for
  proteasomal degradation. A well-characterized physiological substrate is the
  BTB transcriptional repressor BACH1, whose turnover by SCF(FBXL17) relieves
  repression of NRF2 target genes such as HMOX1 during the oxidative-stress
  response. Structural work shows that FBXL17 does not bind the intact BACH1 BTB
  homodimer; instead, when the dimer interface is destabilized (for example by
  oxidation or S-nitrosylation under oxidative/nitrosative stress), the FBXL17
  LRR engages the weakened dimer and remodels it into a stably bound BTB monomer
  that is then ubiquitinated, distinguishing FBXL17 from FBXO22, which reads an
  intact cross-protomer BTB degron. FBXL17 also targets the Hedgehog-pathway
  regulator SUFU for nuclear ubiquitination and degradation (at Lys257, favored
  by SUFU dephosphorylation), releasing GLI transcription factors for proper
  Hedgehog signal transduction, and additional clients include the
  arginine methyltransferase PRMT1 (via a p300-acetylated K228 "acetyl-degron"
  triggering K48-linked polyubiquitination) and the long spastin isoform
  SPAST-M1 (recognized through its N-terminal BTB-like domain), as well as
  reported BTB partners such as KLHL12 and KBTBD8. The DQC activity is important
  for the differentiation, function, and survival of neural crest and neuronal
  cells. FBXL17 is present in both cytoplasm and nucleus, with the nuclear pool
  acting on substrates such as SUFU, BACH1, and SPAST-M1.
