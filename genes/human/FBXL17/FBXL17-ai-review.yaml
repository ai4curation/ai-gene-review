suggested_questions:
- question: What is the structural basis by which the FBXL17 LRR distinguishes aberrant BTB dimer interfaces from correctly paired dimers, and how general is the non-consecutive degron across the BTB family?
- question: Beyond BACH1 and SUFU, what is the full physiological substrate repertoire of SCF(FBXL17), and is SPAST/spastin a bona fide degradation substrate relevant to hereditary spastic paraplegia?
suggested_experiments:
- description: Reconstitute SCF(FBXL17)-mediated ubiquitination in vitro with purified SKP1-CUL1-RBX1-FBXL17, an E2, and matched vs mismatched BTB dimers to quantify selectivity for aberrant-composition dimers and map ubiquitination sites.
- description: Perform quantitative ubiquitinome/proteome profiling in FBXL17-knockout versus wild-type cells (including neural crest/neuronal models) to define the endogenous DQC substrate landscape and the downstream developmental consequences.
