proposed_new_terms:
- proposed_name: dimerization quality control of BTB-domain protein assemblies
  proposed_definition: >-
    A protein quality control process in which an E3 ubiquitin ligase (for example
    SCF(FBXL17)) recognizes a non-consecutive, quaternary-structure degron exposed at
    the interface of aberrant-composition, mismatched, or conformationally compromised
    BTB-domain homodimers and heterodimers, and selectively ubiquitinates them for
    proteasomal degradation, thereby proofreading the dimerization state of BTB-domain
    transcription factors and adaptors. Unlike canonical recognition of linear or
    single-protomer degrons, this process surveils higher-order protein assembly and
    can involve remodeling of a destabilized dimer into a stably bound monomer prior
    to ubiquitination.
  justification: >-
    Existing GO:0006515 (protein quality control for misfolded or incompletely
    synthesized proteins) does not capture the surveillance of quaternary-structure
    and dimer-interface integrity that is the hallmark of SCF(FBXL17). FBXL17 reads a
    degron formed by aberrant BTB pairing rather than misfolding of a single chain,
    a mechanistically distinct quality-control activity established experimentally.
