- id: file:human/FBXL17/FBXL17-deep-research-falcon.md
  title: Falcon deep research report for human FBXL17
  findings:
  - statement: FBXL17 is the SCF (SKP1-CUL1-RBX1) substrate-recognition subunit, using an F-box to assemble the SCF and a C-terminal LRR to bind substrates for ubiquitination and proteasomal degradation.
    supporting_text: In this paradigm, **FBXL17 is the substrate receptor** that helps determine which proteins are ubiquitinated and often targeted for proteasomal degradation.
  - statement: FBXL17 does not engage the intact BACH1 BTB dimer; under oxidative/nitrosative stress it recognizes a compromised/destabilized BTB dimer and remodels it into ubiquitinated monomers, in contrast to FBXO22 which reads the intact cross-protomer degron.
    supporting_text: Under oxidative/nitrosative stress, **FBXL17 can recognize a compromised/destabilized BTB dimer and remodel it into monomers** that are ubiquitinated.
  - statement: SCF(FBXL17) targets the Hedgehog pathway tumor suppressor SUFU for nuclear proteolysis, enabling GLI activation and Hedgehog signal transduction.
    supporting_text: FBXL17 forms a functional SCF complex and targets the Hedgehog pathway tumor suppressor **SUFU (Suppressor of fused)** for **proteolysis in the nucleus**, enabling release/activation of GLI transcription factors and Hedgehog signal transduction.
  - statement: PRMT1 is a PTM-gated FBXL17 substrate; p300 acetylation at K228 creates an acetyl-degron that promotes FBXL17 binding and K48-linked polyubiquitination.
    supporting_text: PRMT1 is regulated by SCF(FBXL17) such that **p300-mediated acetylation at PRMT1 K228** promotes FBXL17 binding, **K48-linked polyubiquitination**, and proteasomal degradation.
  - statement: In neuronal models SCF(FBXL17) targets the long spastin isoform SPAST-M1 for proteasomal degradation via recognition of its N-terminal BTB domain.
    supporting_text: SCF(FBXL17) targets **SPAST-M1** (long spastin isoform) for **proteasome-dependent degradation in the nuclear fraction**, with substrate recognition mediated by the **SPAST N-terminal BTB domain**.
