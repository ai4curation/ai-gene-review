- term:
    id: GO:0007040
    label: lysosome organization
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: involved_in
  review:
    summary: >-
      Phylogenetically inferred role in lysosome organization. This reflects the
      downstream consequence of GAA activity (undegraded lysosomal glycogen
      distends and disrupts lysosomes when GAA is deficient) rather than a direct
      molecular role in organising the lysosome.
    action: KEEP_AS_NON_CORE
    reason: >-
      GAA does not build or organise the lysosome; the connection is that loss of
      its catalytic activity leads to lysosomal glycogen accumulation and
      secondary lysosomal/autophagic pathology. This is a valid but non-core,
      consequence-of-deficiency association, so it is retained as non-core.
    supported_by:
    - reference_id: PMID:16917947
      supporting_text: "glycogen degradation and its accumulation in the lysosomes"
