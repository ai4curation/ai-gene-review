- term:
    id: GO:0005984
    label: disaccharide metabolic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000117
  qualifier: involved_in
  review:
    summary: >-
      ARBA electronic assignment reflecting GAA's in-vitro ability to hydrolyse
      disaccharides such as maltose (hence "acid maltase").
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      GAA can cleave the disaccharide maltose in vitro, but its physiological
      substrate is lysosomal glycogen (a polymer), not free disaccharides;
      dietary disaccharide metabolism is the role of intestinal
      sucrase-isomaltase/maltase-glucoamylase. This is an over-annotation of the
      in-vitro substrate scope rather than the biological function.
    supported_by:
    - reference_id: file:human/GAA/GAA-uniprot.txt
      supporting_text: "Essential for the degradation of glycogen in lysosomes"
