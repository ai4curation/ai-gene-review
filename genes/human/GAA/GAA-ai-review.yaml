- term:
    id: GO:0043896
    label: glucan 1,6-alpha-glucosidase activity
  evidence_type: IDA
  original_reference_id: PMID:24417
  qualifier: enables
  review:
    summary: >-
      Direct evidence that purified human lysosomal alpha-glucosidase also
      hydrolyses alpha-1,6-linked glucans (branch points), a genuine secondary
      activity of GAA.
    action: KEEP_AS_NON_CORE
    reason: >-
      GAA can hydrolyse alpha-1,6-linkages, which is important in the lysosome
      because no debranching enzyme is present there; however this activity is
      secondary, with a ~32-fold lower specificity constant than for
      alpha-1,4-linkages (PMID:29061980). Retained as a valid non-core secondary
      function.
    supported_by:
