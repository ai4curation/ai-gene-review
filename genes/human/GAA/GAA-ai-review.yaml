id: P10253
gene_symbol: GAA
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  GAA encodes lysosomal acid alpha-glucosidase (acid maltase; EC 3.2.1.20), a
  glycoside-hydrolase-family-31 (GH31) enzyme that acts within the acidic
  lysosomal lumen to completely hydrolyse glycogen to glucose. It cleaves
  terminal, non-reducing alpha-1,4-glucosidic bonds with highest activity and,
  more slowly, alpha-1,6 branch linkages, degrading the glycogen delivered to
  lysosomes by autophagy (glycophagy). This lysosomal glycogenolysis is distinct
  from the cytosolic pathway carried out by glycogen phosphorylase and the
  debranching enzyme. The enzyme is synthesised as a ~110 kDa N-glycosylated
  precursor, tagged with mannose-6-phosphate for delivery to the lysosome via the
  mannose-6-phosphate receptor, and proteolytically matured into shorter (76 kDa
  and 70 kDa) forms. Catalysis proceeds by a retaining GH31 double-displacement
  mechanism using an aspartate nucleophile (Asp518) and an acid/base aspartate
  (Asp616). Loss of GAA activity causes Pompe disease (glycogen storage disease
  type II / acid maltase deficiency), an autosomal recessive lysosomal storage
  disorder in which glycogen accumulates in muscle, heart and other tissues;
  the infantile-onset form presents with hypertrophic cardiomyopathy and
  hypotonia, while late-onset disease manifests as a progressive limb-girdle and
  respiratory myopathy. Recombinant human GAA (alglucosidase alfa) is used for
  enzyme replacement therapy.
