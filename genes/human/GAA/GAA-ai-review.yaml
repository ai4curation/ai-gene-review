core_functions:
- description: >-
    Lysosomal acid alpha-glucosidase (acid maltase; GH31): at acidic lysosomal
    pH, hydrolyses terminal alpha-1,4-glucosidic bonds (and, more slowly,
    alpha-1,6 branch linkages) of glycogen, releasing glucose. This is the
    terminal step of lysosomal glycogen degradation (glycophagy), degrading
    glycogen delivered to the lysosome by autophagy; it is distinct from cytosolic
    glycogenolysis. Loss of this activity causes Pompe disease.
  molecular_function:
    id: GO:0004558
    label: alpha-1,4-glucosidase activity
  directly_involved_in:
  - id: GO:0005980
    label: glycogen catabolic process
  locations:
  - id: GO:0043202
    label: lysosomal lumen
  - id: GO:0005764
    label: lysosome
  supported_by:
  - reference_id: file:human/GAA/GAA-uniprot.txt
    supporting_text: "Essential for the degradation of glycogen in lysosomes"
  - reference_id: file:human/GAA/GAA-uniprot.txt
    supporting_text: "highest activity on alpha-1,4-linked glycosidic linkages, but can also"
  - reference_id: PMID:29061980
    supporting_text: "involved in the lysosomal breakdown of glycogen"
suggested_questions:
- question: >-
    Does GAA have any physiological substrate beyond lysosomal glycogen (e.g. a
    biological role for its in-vitro maltose/disaccharide-hydrolysing activity)?
- question: >-
    What is the functional significance of GAA's presence in neutrophil secretory
    granules and its detection at the plasma membrane upon degranulation?
suggested_experiments:
- description: >-
    Quantify the relative in-vivo contribution of GAA's alpha-1,6 (debranching)
    activity to complete lysosomal glycogen clearance, e.g. using structurally
    defined branched substrates or branch-specific mutants.
