  label: Homo sapiens
description: GNPAT (glyceronephosphate O-acyltransferase; dihydroxyacetone phosphate
  acyltransferase, DHAPAT; EC 2.3.1.42) is a peroxisomal enzyme that catalyzes the
  first committed step of ether-glycerolipid (plasmalogen) biosynthesis. It transfers
  a long-chain acyl group from an acyl-CoA to dihydroxyacetone phosphate (glycerone
  phosphate, DHAP) to form 1-acylglycerone 3-phosphate (acyl-DHAP) plus CoA. The acyl-DHAP
  product is subsequently used by alkyl-dihydroxyacetone phosphate synthase (AGPS)
  to form the characteristic ether bond of plasmalogens. GNPAT is a peripheral membrane
  protein anchored on the matrix (lumenal) side of the peroxisomal membrane and carries
  a C-terminal type-1 peroxisomal targeting signal (PTS1). The active enzyme is part
  of a heterotrimeric complex with AGPS. Loss of GNPAT activity causes a severe deficiency
  of plasmalogens and is the primary defect in rhizomelic chondrodysplasia punctata
  type 2 (RCDP2).
