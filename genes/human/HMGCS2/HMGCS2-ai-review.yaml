core_functions:
- description: >-
    Catalyzes the committed, rate-limiting step of ketogenesis in the mitochondrial matrix:
    the condensation of acetyl-CoA with acetoacetyl-CoA to form (3S)-3-hydroxy-3-methylglutaryl-CoA
    (HMG-CoA) plus CoA, via an active-site cysteine acyl-thioester intermediate.
