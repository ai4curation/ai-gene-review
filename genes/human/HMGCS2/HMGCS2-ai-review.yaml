suggested_questions:
- question: >-
    Do the acetylation/succinylation PTMs of HMGCS2 (e.g., at Lys-83/Lys-310) and their reversal
    by SIRT3/SIRT5 provide physiologically significant control of ketogenic flux in human liver,
    beyond transcriptional (PPAR-alpha/FGF21) regulation?
- question: >-
    What, if any, is the function of the muscle/heart-enriched isoform 3 (HMGCS2delta4), and does
    it retain HMG-CoA synthase activity?
suggested_experiments:
- description: >-
    Quantify ketogenic flux (labeled acetyl-CoA to beta-hydroxybutyrate) in primary human
    hepatocytes with HMGCS2 knockdown/knockout versus rescue with wild-type and PTM-site mutants
    to test the contribution of acetylation/succinylation to activity control.
- description: >-
    Express and assay HMGCS2 isoform 3 (HMGCS2delta4) in parallel with isoform 1 to determine
    whether the muscle/heart-enriched splice variant retains catalytic activity or has a distinct
    role.
