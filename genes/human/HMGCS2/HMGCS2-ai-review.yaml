id: P54868
gene_symbol: HMGCS2
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  HMGCS2 encodes the mitochondrial isoform of 3-hydroxy-3-methylglutaryl-CoA synthase
  (mitochondrial HMG-CoA synthase, mHS; EC 2.3.3.10), a homodimeric enzyme of the
  thiolase-like superfamily that catalyzes the first, committed and rate-limiting step of
  ketogenesis. Using an active-site cysteine (Cys166) to form an acyl-thioester
  intermediate, it condenses acetyl-CoA with acetoacetyl-CoA (and water) to yield
  (3S)-3-hydroxy-3-methylglutaryl-CoA (HMG-CoA), CoA and a proton; the HMG-CoA product is
  subsequently cleaved by mitochondrial HMG-CoA lyase (HMGCL) to acetoacetate, the first
  ketone body. The enzyme resides in the mitochondrial matrix and is expressed at very high
  levels in liver (roughly 200-fold above other tissues), with lower expression in colon,
  kidney, testis and pancreas. It is strongly induced during fasting/starvation, chiefly
  through PPAR-alpha/FGF21 signaling, and provides the ketone bodies that serve as an
  alternative fuel for the brain and peripheral tissues. Loss-of-function mutations cause
  mitochondrial HMG-CoA synthase deficiency (HMGCS2D; MIM 605911), an inborn error of
  metabolism presenting with fasting hypoketotic hypoglycemia, encephalopathy and
  hepatomegaly. HMGCS2 is distinct from the cytosolic paralog HMGCS1, which supplies HMG-CoA
  to the mevalonate/cholesterol biosynthetic pathway; unlike HMGCS1 and prokaryotic HMG-CoA
  synthases, mitochondrial HMGCS2 does not function in isoprenoid/sterol biosynthesis.
