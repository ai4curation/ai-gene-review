- term:
    id: GO:0042802
    label: identical protein binding
  evidence_type: IDA
  original_reference_id: PMID:20346956
  qualifier: enables
  review:
    summary: >-
      IDA annotation of identical protein binding based on the crystal structure of human
      HMGCS2 (PDB 2WYA), which shows the enzyme is a homodimer. The homodimeric assembly is a
      real structural property, but "identical protein binding" is an uninformative molecular
      function term relative to the enzyme's catalytic role.
    action: KEEP_AS_NON_CORE
    reason: >-
      The homodimer is structurally established (self-association is genuine), so per curation
      policy this experimental self-binding annotation is retained rather than removed, but it
      is uninformative about the enzyme's function and is therefore marked non-core.
    supported_by:
    - reference_id: PMID:29597274
      supporting_text: Previous studies have already pointed out that mHS is a homodimeric enzyme
    - reference_id: PMID:29597274
      supporting_text: which was subsequently confirmed by the crystallization of the enzyme
