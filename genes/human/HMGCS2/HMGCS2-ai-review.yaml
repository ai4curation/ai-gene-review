existing_annotations:
- term:
    id: GO:0004421
    label: hydroxymethylglutaryl-CoA synthase activity
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: enables
  review:
    summary: >-
      Phylogenetic (IBA) assignment of the defining molecular function of HMGCS2, HMG-CoA
      synthase activity (EC 2.3.3.10). This is the enzyme's core, experimentally established
      catalytic activity and the term is at the correct level of specificity.
    action: ACCEPT
    reason: >-
      HMG-CoA synthase activity is the primary molecular function of HMGCS2 and is
      independently supported by direct experimental evidence in human (EXP/IMP). The IBA
      call is consistent across the orthologous panel including the human, mouse and rat
      mitochondrial enzymes.
    supported_by:
    - reference_id: PMID:29597274
      supporting_text: catalyzes the condensation reaction between acetyl-CoA and acetoacetyl-CoA in ketone body synthesis
- term:
    id: GO:0006084
    label: acetyl-CoA metabolic process
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: involved_in
  review:
    summary: >-
      Phylogenetic (IBA) involvement in acetyl-CoA metabolism. Acetyl-CoA is a direct
      substrate of the HMG-CoA synthase reaction, so this broad metabolic-process term is
      biologically correct, though generic relative to the enzyme's specific role in
      ketone body biosynthesis.
    action: ACCEPT
    reason: >-
      The enzyme consumes acetyl-CoA (and acetoacetyl-CoA) in its condensation reaction, so
      involvement in acetyl-CoA metabolic process is accurate. It is a broad parent term and
      is non-core relative to ketone body biosynthetic process, but not incorrect.
    supported_by:
    - reference_id: PMID:29597274
      supporting_text: catalyzes the condensation reaction between acetyl-CoA and acetoacetyl-CoA in ketone body synthesis
