- term:
    id: GO:0008299
    label: isoprenoid biosynthetic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: involved_in
  review:
    summary: >-
      InterPro2GO electronic assignment of isoprenoid biosynthetic process, transferred from
      the pan-HMGCS InterPro families (IPR000590, IPR010122). This role belongs to the
      cytosolic/prokaryotic HMG-CoA synthases that feed the mevalonate/isoprenoid pathway,
      NOT to the mitochondrial ketogenic isoform HMGCS2.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      HMGCS2 is the mitochondrial isoform whose product HMG-CoA is committed to ketogenesis
      (cleaved by HMGCL to acetoacetate), not to mevalonate/isoprenoid synthesis. The
      isoprenoid role is a paralog function of HMGCS1 (cytosolic) and of prokaryotic HMGCS;
      the InterPro family term is over-propagated across all HMG-CoA synthases. PMID:20346956
      explicitly separates the mitochondrial isoform (ketone body formation) from the
      cytosolic isoform (mevalonate pathway, end product cholesterol).
    supported_by:
    - reference_id: PMID:20346956
      supporting_text: 'Mammals also contain a mitochondrial isoform; its'
    - reference_id: PMID:7851882
      supporting_text: whereas the cytoplasmic HS isozyme (cHS) mediates an early step
