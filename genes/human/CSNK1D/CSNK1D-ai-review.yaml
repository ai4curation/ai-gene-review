core_functions:
- description: Constitutively active protein serine/threonine kinase (ATP- and Mg2+-dependent)
    that phosphorylates a broad range of substrates, including via primed (phospho-directed)
    and unprimed mechanisms.
  supported_by:
  - reference_id: PMID:10606744
    supporting_text: Protein kinase CK1 is a p53-threonine 18 kinase which requires
      prior phosphorylation of serine 15.
  molecular_function:
    id: GO:0004674
    label: protein serine/threonine kinase activity
- description: Phosphorylates PER1 and PER2 to control their stability and nuclear
    transport, acting as a central component of the circadian clock that sets period
    length; loss-of-function variants cause familial advanced sleep phase syndrome
    and migraine.
  supported_by:
  - reference_id: PMID:23636092
    supporting_text: Casein kinase idelta mutations in familial migraine and advanced
      sleep phase.
  molecular_function:
    id: GO:0004674
    label: protein serine/threonine kinase activity
  biological_process_terms:
  - id: GO:0042752
    label: regulation of circadian rhythm
  - id: GO:0032922
    label: circadian regulation of gene expression
- description: Phosphorylates Dishevelled (DVL2/DVL3) and other components to regulate
    canonical Wnt/beta-catenin signaling and Wnt-3a-dependent neurite outgrowth.
  supported_by:
  - reference_id: PMID:21422228
    supporting_text: Casein kinase 1 delta functions at the centrosome to mediate Wnt-3a-dependent
      neurite outgrowth.
  molecular_function:
    id: GO:0004674
    label: protein serine/threonine kinase activity
  biological_process_terms:
  - id: GO:0090263
    label: positive regulation of canonical Wnt signaling pathway
- description: Acts at the centrosome and Golgi (anchored via AKAP9/AKAP450) to promote
    microtubule nucleation, Golgi organization and primary (non-motile) ciliogenesis.
  supported_by:
  - reference_id: PMID:24648492
    supporting_text: Casein kinase 1δ functions at the centrosome and Golgi to promote
      ciliogenesis.
  molecular_function:
    id: GO:0004674
    label: protein serine/threonine kinase activity
  biological_process_terms:
  - id: GO:1905515
    label: non-motile cilium assembly
  - id: GO:0007030
    label: Golgi organization
  - id: GO:0007020
    label: microtubule nucleation
proposed_new_terms: []
suggested_questions:
- Which CK1delta substrates and biological roles are truly delta-specific versus shared
  with the highly similar CK1epsilon, given their frequent co-redundancy?
- To what extent are the many in vitro substrate phosphorylations (e.g. DCK, eIF6,
  TOP2A) physiologically relevant in vivo, as opposed to reflecting CK1delta's broad
  acidic-substrate preference?
suggested_experiments:
- Acute, isoform-selective degradation (e.g. dTAG/AID) of CK1delta versus CK1epsilon
  followed by phosphoproteomics to define the delta-specific substrate repertoire
  and disentangle redundancy.
- Structure-guided separation-of-function CSNK1D alleles (catalytic-dead vs centrosomal-localization-deficient)
  in human cells and mice to dissect the kinase-dependent versus scaffolding contributions
  to ciliogenesis and circadian period.
