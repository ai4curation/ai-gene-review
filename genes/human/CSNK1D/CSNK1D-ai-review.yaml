gene_symbol: CSNK1D
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: Casein kinase I isoform delta (CK1delta) is a constitutively active,
  monomeric serine/threonine protein kinase of the casein kinase 1 (CK1) family. It
  uses ATP and is magnesium-dependent, and is operationally defined as a "casein kinase"
  by its preference for acidic substrates; it performs both primed (phospho-directed)
  and unprimed phosphorylation. Its activity is autoinhibited by C-terminal autophosphorylation
  and reactivated by phosphatase (PP1)-mediated dephosphorylation. CK1delta is a central
  component of the circadian clock, phosphorylating PERIOD proteins PER1 and PER2 to
  control their stability and nuclear entry and thereby set circadian period; missense
  variants (e.g. T44A, H46R) reduce kinase activity and cause familial advanced sleep
  phase syndrome and familial migraine. CK1delta also phosphorylates Dishevelled (DVL2/DVL3)
  and other components to modulate Wnt/beta-catenin signaling, acts at the centrosome
  and Golgi to promote microtubule nucleation, Golgi organization and primary (non-motile)
  ciliogenesis, and regulates the mitotic spindle. It phosphorylates a large and diverse
  set of additional substrates including p53/TP53, MDM2, YAP1, HIF1A, TOP2A, connexin-43/GJA1,
  PKD2, eIF6, DCK and tau/MAPT, linking it to DNA-damage responses, Hippo signaling,
  vesicle trafficking and (via tau hyperphosphorylation) neurodegeneration. It localizes
  to the cytoplasm/cytosol, nucleus, centrosome, perinuclear region, spindle and spindle
  microtubules, Golgi apparatus, ciliary basal body and plasma membrane, with correct
  localization dependent on kinase activity.
