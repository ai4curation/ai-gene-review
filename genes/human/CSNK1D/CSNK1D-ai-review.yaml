- term:
    id: GO:0032436
    label: positive regulation of proteasomal ubiquitin-dependent protein catabolic
      process
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: involved_in
  review:
    summary: IBA transfer of a role in promoting proteasomal degradation. CK1delta
      phosphorylates phosphodegrons that prime substrates (YAP1, MDM2) for SCF(beta-TRCP)-mediated
      ubiquitination and degradation, so the process is real but is a downstream,
      substrate-driven consequence of kinase activity rather than a core function.
    action: KEEP_AS_NON_CORE
