id: O94874
gene_symbol: UFL1
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: UFL1 (E3 UFM1-protein ligase 1; also called Maxer, NLBP, RCAD, KIAA0776)
  is the E3 ligase of the UFM1 (ufmylation) cascade, which catalyzes covalent attachment
  of the ubiquitin-like modifier UFM1 to substrate lysines. UFL1 is the catalytic component
  of the UFM1 ribosome E3 ligase (UREL) complex together with its obligate cofactor
  DDRGK1/UFBP1 and CDK5RAP3; DDRGK1 tethers the complex to the endoplasmic-reticulum
  membrane. Acting as a non-canonical scaffold-type E3, UFL1 activates the E2 enzyme
  UFC1 to transfer UFM1 onto substrates. Its principal physiological substrate is the
  60S ribosomal protein RPL26/uL24, where mono-ufmylation of RPL26 on ER-bound ribosomes
  weakens the junction between post-termination or stalled 60S subunits and SEC61 translocons,
  promoting release and recycling of the large subunit and supporting ribosome-associated
  protein quality control. UFL1 also drives reticulophagy (ER-phagy) and the response
  to ER stress through ufmylation of ER proteins such as CYB5R3 and RPN1, participates
  in the DNA-damage response (ufmylating histone H4 and MRE11 to promote ATM activation),
  and ufmylates additional substrates including TP53/p53, PD-L1 and PD-1, contributing
  to protein stabilization and immune regulation. UFL1 acts mainly at the ER membrane
  but is also recruited to sites of DNA damage in the nucleus.
