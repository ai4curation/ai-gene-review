core_functions:
- description: E3 UFM1-protein ligase, the catalytic component of the UFM1 ribosome
    E3 ligase (UREL) complex (with cofactor DDRGK1 and CDK5RAP3), that acts as a non-canonical
    scaffold-type E3 to activate the E2 UFC1 and catalyze transfer of UFM1 onto substrate
    lysines.
  molecular_function:
    id: GO:0061666
    label: UFM1 ligase activity
  locations:
  - id: GO:0005789
    label: endoplasmic reticulum membrane
  supported_by:
  - reference_id: file:human/UFL1/UFL1-uniprot.txt
    supporting_text: E3 protein ligase that mediates ufmylation
  - reference_id: PMID:30626644
    supporting_text: Ribosomal protein RPL26 is the principal target of UFMylation
- description: Mediates mono-ufmylation of the 60S ribosomal protein RPL26/uL24 on
    ER-bound ribosomes, weakening the 60S-SEC61 junction to promote release and recycling
    of post-termination/stalled large ribosomal subunits, thereby supporting ribosome-associated
    protein quality control at the ER.
  molecular_function:
    id: GO:0061666
    label: UFM1 ligase activity
  locations:
  - id: GO:0005789
    label: endoplasmic reticulum membrane
  supported_by:
  - reference_id: file:human/UFL1/UFL1-uniprot.txt
    supporting_text: plays a key role in ribosome recycling by catalyzing mono-ufmylation
      of RPL26/uL24 subunit of the 60S ribosome
  - reference_id: PMID:37036982
    supporting_text: UFMylation of translocon-bound 60S subunits modulates the RTJ
proposed_new_terms: []
suggested_questions:
- question: How is UFL1 substrate selectivity determined across its diverse substrates
    (RPL26, histone H4, MRE11, p53, PD-1/PD-L1, CYB5R3) - is it driven by DDRGK1/CDK5RAP3
    adaptors, localization, or post-translational regulation?
- question: Is the reported mitochondrial-outer-membrane localization of UFL1 a genuine
    functional pool or carryover from ER-mitochondria contact sites?
- question: How does ATM-mediated phosphorylation of UFL1 at Ser-462 mechanistically
    enhance its ligase activity in the DNA-damage response?
suggested_experiments:
- description: Substrate-trapping or proximity-labeling proteomics of catalytically
    active versus inactive UFL1 across ER-stress, DNA-damage and basal conditions
    to define context-dependent substrate repertoires.
- description: Reconstitute the UREL-60S complex with purified UFL1/DDRGK1/CDK5RAP3
    and UFC1 to measure how each subunit and the ATM-phosphorylation site contribute
    to RPL26 ufmylation and 60S release from SEC61.
- description: Separation-of-function UFL1 alleles tested in ER-RQC reporter, reticulophagy,
    and DNA-damage (ATM activation) assays to determine whether a single catalytic
    activity underlies all phenotypes.
