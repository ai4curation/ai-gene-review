- term:
    id: GO:0010468
    label: regulation of gene expression
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: involved_in
  review:
    summary: Phylogenetic (IBA) inference of a generic role in regulation of gene expression, propagated across the TRIM family. Pyrin acts post-translationally (inflammasome assembly, selective autophagy), not as a characterized regulator of gene expression.
    action: MARK_AS_OVER_ANNOTATED
    reason: This generic term is a TRIM-family phylogenetic over-propagation; there is no specific experimental evidence that pyrin regulates gene expression. Its characterized roles are post-translational (caspase-1 activation, autophagic degradation of inflammasome components).
- term:
    id: GO:0061630
    label: ubiquitin protein ligase activity
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: enables
  review:
    summary: Phylogenetic (IBA) inference of ubiquitin protein ligase activity propagated from the TRIM/RING family. Pyrin is classed as TRIM20 but lacks a canonical functional RING domain, and its characterized functions (inflammasome assembly, selective-autophagy receptor) do not depend on intrinsic E3 ligase activity.
    action: MARK_AS_OVER_ANNOTATED
    reason: Pyrin is an atypical TRIM that does not possess a functional RING; there is no direct experimental demonstration of intrinsic ubiquitin ligase activity for human pyrin. This is most likely an over-propagation from RING-containing TRIM paralogs. Flagged as over-annotated rather than removed because family-level E3 activity cannot be fully excluded without reviewing primary biochemistry.
    supported_by:
    - reference_id: file:human/MEFV/MEFV-uniprot.txt
      supporting_text: Organizes autophagic machinery by serving as a platform for the assembly of ULK1, Beclin 1/BECN1, ATG16L1, and ATG8 family members
