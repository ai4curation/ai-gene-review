suggested_questions:
- question: How is the balance between pyrin's pro-inflammatory inflammasome-sensor arm and its anti-inflammatory selective-autophagy receptor arm coordinated within the same cell, and is it stimulus- or compartment-dependent?
- question: Does human pyrin possess any intrinsic enzymatic (e.g. ubiquitin ligase) activity, or are all its functions scaffold/receptor-based given the lack of a canonical functional RING domain?
suggested_experiments:
- description: Reconstitute the pyrin inflammasome in vitro and in cells with phosphomimetic/phospho-dead Ser208/Ser242 variants and 14-3-3 depletion, measuring ASC speck formation and caspase-1 activation to map the RhoA-PKN-14-3-3 activation switch.
- description: Perform quantitative degradomics/ubiquitinomics in MEFV-knockout versus FMF-mutant macrophages under inflammasome-activating and autophagy-inducing conditions to define pyrin's autophagic substrate repertoire and test for any intrinsic E3 ligase activity.
