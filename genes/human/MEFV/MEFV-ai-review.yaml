- id: PMID:27030597
  title: Familial autoinflammation with neutrophilic dermatosis reveals a regulatory
    mechanism of pyrin activation.
  findings:
  - statement: Pyrin activation is gated by PKN1/PKN2 phosphorylation (Ser208/Ser242) and inhibitory 14-3-3 binding; dephosphorylation releases 14-3-3 and triggers pyrin inflammasome assembly. PAAND-causing mutations at the Ser242 site cause constitutive activation.
    reference_section_type: ABSTRACT
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: Defines the PKN/14-3-3 phosphoregulatory switch controlling pyrin inflammasome activation and the PAAND disease mechanism. Abstract-only in cache (full_text_available false).
