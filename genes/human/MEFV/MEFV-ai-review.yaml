core_functions:
- description: Acts as a cytosolic inflammasome sensor that detects pathogen-driven inactivation of RhoA (sensed via loss of PKN1/PKN2 phosphorylation and release of inhibitory 14-3-3), and nucleates assembly of the pyrin inflammasome by recruiting PYCARD/ASC into a pyroptosome/speck, thereby activating caspase-1 to drive IL-1beta/IL-18 maturation and pyroptosis.
  supported_by:
  - reference_id: PMID:16037825
    supporting_text: Cryopyrin and pyrin activate caspase-1, but not NF-kappaB, via ASC oligomerization
  - reference_id: PMID:27030597
    supporting_text: Familial autoinflammation with neutrophilic dermatosis reveals a regulatory mechanism of pyrin activation
  locations:
