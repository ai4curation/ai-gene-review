    label: cytosol
  directly_involved_in:
  - id: GO:0002221
    label: pattern recognition receptor signaling pathway
  - id: GO:0032731
    label: positive regulation of interleukin-1 beta production
  - id: GO:1904270
    label: pyroptosome complex assembly
  - id: GO:0070269
    label: pyroptotic inflammatory response
- description: Functions as a selective-autophagy (precision autophagy) receptor that serves as a platform assembling ULK1, Beclin-1/BECN1, ATG16L1 and ATG8/LC3-family proteins to target inflammasome components (NLRP3, NLRP1, pro-caspase-1) for autophagic degradation, restraining excessive IL-1beta/IL-18-driven inflammation.
  supported_by:
  - reference_id: PMID:26347139
    supporting_text: TRIM20 targets the inflammasome components, including NLRP3, NLRP1, and pro-caspase 1, for autophagic degradation
  locations:
  - id: GO:0005776
