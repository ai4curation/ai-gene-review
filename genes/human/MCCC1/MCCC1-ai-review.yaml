- id: PMID:11170888
  title: The molecular basis of 3-methylcrotonylglycinuria, a disorder of leucine
    catabolism.
  findings:
  - statement: MCC is a heteromeric biotin-dependent enzyme with a biotin-containing
      alpha subunit (MCCC1) and a beta subunit; a fungal mccA-null model established
      the in vivo involvement of MCC in leucine catabolism.
    reference_section_type: ABSTRACT
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: Primary molecular characterization of the human MCCA (MCCC1) gene;
      PubMed-verified. Establishes the alpha subunit as biotin-containing and the
      leucine-catabolic role of MCC.
- id: PMID:11181649
  title: The molecular basis of human 3-methylcrotonyl-CoA carboxylase deficiency.
  findings:
  - statement: MCC is a heteromeric mitochondrial enzyme composed of biotin-containing
      alpha subunits and smaller beta subunits; MCCA missense mutations cause loss
      of function.
    reference_section_type: ABSTRACT
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: Independent primary characterization of MCCA/MCCB and disease-causing
      mutations; PubMed-verified.
- id: PMID:11401427
  title: 'Human biotin-containing subunit of 3-methylcrotonyl-CoA carboxylase gene
    (MCCA): cDNA sequence, genomic organization, localization to chromosomal band
    3q27, and expression.'
  findings:
  - statement: The MCCA cDNA encodes a 725-residue protein with a mitochondrial signal
      peptide, biotin carboxylase, and biotin-carrier domains; MCCase is a mitochondrial
      biotin enzyme essential for leucine and isovalerate catabolism, abundantly expressed
      in mitochondria-rich organs.
    reference_section_type: ABSTRACT
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: Defines the domain architecture (biotin carboxylase + biotin-carrier)
      and mitochondrial localization of MCCC1; PubMed-verified.
- id: PMID:16023992
  title: Mitochondrial targeting signals and mature peptides of 3-methylcrotonyl-CoA
    carboxylase.
  findings:
  - statement: Both MCC subunits are imported into the mitochondrial matrix by the
      classical presequence pathway; the MCCalpha cleavage site is Tyr41/Thr42.
    reference_section_type: ABSTRACT
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: Direct experimental evidence for mitochondrial matrix localization
      and transit peptide cleavage; PubMed-verified.
- id: PMID:17360195
  title: Expression, purification, characterization of human 3-methylcrotonyl-CoA
    carboxylase (MCCC).
  findings:
  - statement: Recombinant human MCCC is a heteromultimeric alpha/beta complex (~500-800
      kDa) with a 1:1 alpha:beta stoichiometry and measurable carboxylase kinetics
      (kcat ~4 s-1; Km ATP 45 uM, 3-methylcrotonyl-CoA 74 uM).
    reference_section_type: ABSTRACT
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: Biochemical characterization of the assembled MCC holoenzyme; basis
      for the IDA carboxylase-activity, complex, and matrix-localization annotations.
      PubMed-verified.
- id: PMID:22869039
  title: Structure and function of biotin-dependent carboxylases.
  findings:
  - statement: Biotin-dependent carboxylases (including MCC) contain biotin carboxylase
      (BC), carboxyltransferase (CT), and biotin-carboxyl carrier protein components;
      MCC deficiency is linked to human disease.
    reference_section_type: ABSTRACT
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: Family-level structure/function review; supports the modular BC/CT/BCCP
      architecture but is not gene-specific experimental evidence for MCCC1.
