- term:
    id: GO:0005829
    label: cytosol
  evidence_type: TAS
  original_reference_id: Reactome:R-HSA-2993799
  qualifier: located_in
  review:
    summary: Reactome models newly translated carboxylase subunits transiently in
      the cytosol before mitochondrial import (HLCS biotinylation / translocation
      reactions). MCCC1 is not a steady-state cytosolic protein; its mature functional
      location is the mitochondrial matrix.
    action: MARK_AS_OVER_ANNOTATED
    reason: The cytosolic annotation reflects a transient pre-import biosynthetic
      intermediate in the Reactome pathway, not a functional cytosolic localization.
      MCCC1 carries a cleavable mitochondrial transit peptide and functions in the
      matrix.
    supported_by:
    - reference_id: PMID:16023992
      supporting_text: are imported into the mitochondrial matrix by the classical
        pathway involving cleavable amino-terminal targeting presequences
