id: Q96RQ3
gene_symbol: MCCC1
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  MCCC1 is the biotin-containing alpha subunit of mitochondrial 3-methylcrotonyl-CoA
  carboxylase (MCC), a biotin-dependent carboxylase (EC 6.4.1.4). MCC catalyses the
  ATP-dependent carboxylation of 3-methylcrotonyl-CoA to 3-methylglutaconyl-CoA, the
  committed carboxylation step of the leucine (and isovalerate) catabolic pathway,
  downstream of isovaleryl-CoA dehydrogenase. The holoenzyme is an alpha6-beta6 dodecamer
  assembled from six MCCC1 subunits and six MCCC2 subunits: MCCC1 carries the biotin
  carboxylase and biotinyl (biotin-carboxyl-carrier) domains, holds the covalently
  attached biotin cofactor (on a conserved lysine) and binds ATP, while MCCC2 provides
  the carboxyltransferase activity. The protein is synthesized with an N-terminal
  mitochondrial transit peptide and functions in the mitochondrial matrix. Loss of
  MCC activity due to biallelic variants in MCCC1 (or its partner MCCC2) causes
  3-methylcrotonyl-CoA carboxylase deficiency, an autosomal recessive organic aciduria
  that is one of the most common findings on newborn tandem mass spectrometry
  screening and is frequently benign or asymptomatic.
