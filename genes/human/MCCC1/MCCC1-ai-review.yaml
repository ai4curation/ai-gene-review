    label: biotin metabolic process
  evidence_type: NAS
  original_reference_id: PMID:22869039
  qualifier: involved_in
  review:
    summary: MCCC1 uses biotin as a covalently attached cofactor but does not participate
      in biotin biosynthesis or turnover. Annotating a biotin metabolic process conflates
      the requirement for the biotin cofactor with actual biotin metabolism.
    action: MARK_AS_OVER_ANNOTATED
    reason: MCCC1's biological process is leucine catabolism; its dependence on the
      biotin cofactor does not make it a participant in biotin metabolism. Sourced
      from a family-level review (NAS).
    supported_by:
    - reference_id: PMID:22869039
      supporting_text: Biotin-dependent carboxylases include acetyl-CoA carboxylase
        (ACC),
