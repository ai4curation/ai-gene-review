- term:
    id: GO:0009374
    label: biotin binding
  evidence_type: NAS
  original_reference_id: PMID:11401427
  qualifier: enables
  review:
    summary: MCCC1 carries a biotinyl (biotin-carrier) domain and holds the covalently
      attached biotin cofactor on a conserved lysine (Lys681), consistent with a biotin-binding
      molecular function.
    action: ACCEPT
    reason: MCCC1 is the biotin-containing subunit; biotin binding/carriage is a genuine,
      structurally supported molecular function of the biotinyl-binding domain.
    supported_by:
    - reference_id: PMID:11401427
      supporting_text: biotin carboxylase, and biotin-carrier domains
core_functions:
- description: MCC alpha subunit contributes the biotin carboxylase and biotin-carrier
    activities to the mitochondrial 3-methylcrotonyl-CoA carboxylase holoenzyme, which
    catalyses the ATP-dependent carboxylation of 3-methylcrotonyl-CoA to 3-methylglutaconyl-CoA.
  molecular_function:
    id: GO:0004485
    label: methylcrotonoyl-CoA carboxylase activity
  directly_involved_in:
  - id: GO:0006552
    label: L-leucine catabolic process
  locations:
  - id: GO:0005759
    label: mitochondrial matrix
  in_complex:
    id: GO:1905202
    label: methylcrotonoyl-CoA carboxylase complex
  supported_by:
  - reference_id: PMID:17360195
    supporting_text: a heteromultimeric complex that is composed of alpha and beta
      subunits which are encoded by distinct genes
  - reference_id: PMID:11401427
    supporting_text: plays an essential role in the catabolism of leucine and isovalerate
- description: Binds the biotin cofactor via the C-terminal biotinyl-binding domain,
    covalently attaching biotin on a conserved lysine to enable the carboxyl-transfer
    steps of the carboxylase reaction.
  molecular_function:
    id: GO:0009374
    label: biotin binding
  locations:
  - id: GO:0005759
    label: mitochondrial matrix
  supported_by:
  - reference_id: PMID:11401427
    supporting_text: biotin carboxylase, and biotin-carrier domains
- description: Binds ATP through its ATP-grasp biotin carboxylase domain, providing
    the energy for carboxylation of the biotin cofactor.
  molecular_function:
    id: GO:0005524
    label: ATP binding
  locations:
  - id: GO:0005759
    label: mitochondrial matrix
  supported_by:
  - reference_id: PMID:17360195
    supporting_text: 'possesses K(m) values (ATP: 45+/-11microM; 3-methylcrotonyl-CoA:
      74+/-7microM) similar to those reported for the native enzyme'
