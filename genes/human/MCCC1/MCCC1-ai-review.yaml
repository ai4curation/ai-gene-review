- term:
    id: GO:0006768
    label: biotin metabolic process
  evidence_type: NAS
  original_reference_id: PMID:11401427
  qualifier: involved_in
  review:
    summary: MCCC1 requires biotin as a covalently attached cofactor but does not
      participate in biotin biosynthesis or turnover; the biotin metabolic process
      annotation conflates cofactor usage with biotin metabolism.
    action: MARK_AS_OVER_ANNOTATED
    reason: MCCC1's biological process is leucine (and isovalerate) catabolism; being
      a biotin-dependent enzyme does not make it a participant in biotin metabolism.
    supported_by:
    - reference_id: PMID:11401427
