id: Q8TCJ2
gene_symbol: STT3B
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  STT3B is the catalytic subunit of the STT3B-containing oligosaccharyltransferase
  (OST) complex (OST-B), one of two human OST isoforms (the other carries STT3A).
  OST is a multi-subunit, multi-pass endoplasmic reticulum membrane enzyme that
  catalyzes the central reaction of N-linked glycosylation: the en bloc transfer of
  the preassembled high-mannose glycan Glc3Man9GlcNAc2 from the lipid donor
  dolichyl-diphosphate onto the asparagine of N-X-Ser/Thr (X not Pro) sequons in
  acceptor proteins in the ER lumen (EC 2.4.99.18). STT3B provides the active site
  and the acceptor-peptide and lipid-linked-oligosaccharide binding pockets, and
  catalysis requires a divalent metal ion cofactor (Mg2+/Mn2+). Whereas the STT3A
  complex is stably associated with the Sec61 translocon and performs the bulk of
  cotranslational glycosylation of nascent chains, the STT3B complex is not
  translocon-associated and acts as a proofreading second pass, glycosylating
  sequons that STT3A skipped, including C-terminal sequons, sequons close to the
  signal-sequence cleavage site, cysteine-proximal sequons, and sites in short loops
  of multi-spanning membrane proteins. This post-translational/post-translocational
  activity, which depends on the OST-B oxidoreductase subunits MAGT1 or TUSC3, also
  functions as a surveillance system that glycosylates cryptic sequons exposed in
  unfolded secretory proteins, marking them for N-glycan-dependent ER-associated
  degradation. Loss-of-function variants cause STT3B-CDG, a congenital disorder of
  glycosylation.
