      (STT3A/STT3B) assembled into OST complexes with distinct enzymatic
      properties; source of the ER subcellular-location annotation for STT3B.
- id: PMID:19167329
  title: Cotranslational and posttranslational N-glycosylation of polypeptides by
    distinct mammalian OST isoforms.
  findings: []
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Ruiz-Canada et al. 2009 (full text available). Isoform-specific siRNA
      knockdowns show STT3A is the primary cotranslational enzyme while STT3B
      mediates post-translational glycosylation of skipped sites in unfolded
      proteins (e.g. Factor VII N360). Primary support for STT3B catalytic
      activity, N-linked glycosylation and post-translational roles.
