      proteins targets them for N-glycan-dependent ERAD. STT3B contributes to this
      pathway indirectly (its glycan modification is the recognition signal), so
      retained as non-core; the core molecular activity remains N-glycosyl transfer.
    action: KEEP_AS_NON_CORE
    supported_by:
