core_functions:
- description: >-
    Catalytic subunit of the STT3B-containing oligosaccharyltransferase (OST-B)
    complex, catalyzing en bloc transfer of the dolichyl-diphosphate-linked
    high-mannose oligosaccharide (Glc3Man9GlcNAc2) onto asparagine residues of
    N-X-Ser/Thr sequons in the ER lumen (EC 2.4.99.18).
  molecular_function:
    id: GO:0004579
    label: dolichyl-diphosphooligosaccharide-protein glycotransferase activity
  directly_involved_in:
  - id: GO:0006487
    label: protein N-linked glycosylation
  locations:
  - id: GO:0005789
    label: endoplasmic reticulum membrane
  in_complex:
    id: GO:0160227
    label: oligosaccharyltransferase complex B
  supported_by:
  - reference_id: file:human/STT3B/STT3B-uniprot.txt
    supporting_text: >-
      Catalytic subunit of the oligosaccharyl transferase (OST) complex that
      catalyzes the initial transfer of a defined glycan
  - reference_id: PMID:31296534
    supporting_text: >-
      The STT3B complex is not associated with the translocon, yet glycosylates
      certain acceptor sites that have been skipped by the STT3A complex
- description: >-
    Post-translational (post-translocational) N-glycosylation: the STT3B complex
    acts as a proofreading second pass, transferring the dolichol-linked
    oligosaccharide onto sequons skipped by the cotranslational STT3A complex,
    including C-terminal sequons and cryptic sequons exposed in unfolded secretory
    proteins.
  molecular_function:
    id: GO:0004579
    label: dolichyl-diphosphooligosaccharide-protein glycotransferase activity
  directly_involved_in:
  - id: GO:0180057
    label: protein post-translational transfer of dolichol-linked oligosaccharide
  locations:
  - id: GO:0005789
    label: endoplasmic reticulum membrane
  in_complex:
    id: GO:0160227
    label: oligosaccharyltransferase complex B
  supported_by:
  - reference_id: PMID:19167329
    supporting_text: >-
      The STT3B isoform is responsible for posttranslational glycosylation of
      FVII on N360
  - reference_id: PMID:19167329
    supporting_text: >-
      has the capacity to mediate posttranslational modification of skipped
      glycosylation sites in unfolded proteins
