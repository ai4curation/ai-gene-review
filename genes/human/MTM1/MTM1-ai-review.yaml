- term:
    id: GO:0004721
    label: phosphoprotein phosphatase activity
  evidence_type: IDA
  original_reference_id: PMID:9537414
  review:
    summary: >-
      MTM1 (via its homolog) was shown to dephosphorylate phosphotyrosine- and
      phosphoserine-containing peptides in vitro (PMID:9537414). However, the
      physiological relevance of this protein phosphatase activity is uncertain;
      the primary in vivo substrates are phosphoinositide lipids rather than
      proteins.
    action: MARK_AS_OVER_ANNOTATED
