core_functions:
- molecular_function:
    id: GO:0004438
    label: phosphatidylinositol-3-phosphate phosphatase activity
  description: >-
    MTM1 dephosphorylates PI3P to PI, removing the D3 phosphate from the
    inositol ring. This is the primary enzymatic activity, demonstrated by
    multiple in vitro and in vivo studies. It is essential for phosphoinositide
    homeostasis and endosomal trafficking.
- molecular_function:
    id: GO:0052629
    label: phosphatidylinositol-3,5-bisphosphate 3-phosphatase activity
  description: >-
    MTM1 also dephosphorylates PI(3,5)P2 to PI5P. The product PI5P acts as an
    allosteric activator of MTM1, forming a positive feedback loop. This dual
    substrate specificity is shared among myotubularin family members.
- molecular_function:
    id: GO:0019215
    label: intermediate filament binding
  description: >-
    MTM1 directly binds desmin intermediate filaments and regulates their
    assembly and architecture specifically in skeletal muscle. This function is
    independent of lipid phosphatase activity and is disrupted by XLCNM-causing
    mutations.
- molecular_function:
    id: GO:0035091
    label: phosphatidylinositol binding
  description: >-
    The GRAM domain of MTM1 binds phosphoinositides, with highest affinity for
    PI(3,5)P2. This binding targets MTM1 to endosomal membranes and is
    essential for its function in vivo.
