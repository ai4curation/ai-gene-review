id: Q13496
gene_symbol: MTM1
product_type: PROTEIN
status: IN_PROGRESS
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  Myotubularin (MTM1) is a lipid phosphatase that specifically dephosphorylates
  phosphatidylinositol 3-phosphate (PI3P) and phosphatidylinositol
  3,5-bisphosphate (PI(3,5)P2), removing the D3 phosphate from the inositol
  ring. It belongs to the myotubularin family of dual-specificity phosphatases
  and contains a GRAM domain that mediates phosphoinositide binding and a
  catalytic phosphatase domain with a Cys375 active-site nucleophile. MTM1
  functions in endosomal trafficking, regulating EGFR degradation via late
  endosome-to-lysosome transport. It also binds desmin intermediate filaments
  and controls their assembly and architecture in skeletal muscle, and
  regulates mitochondrial positioning and dynamics. MTM1 forms a heterodimer
  with the catalytically inactive family member MTMR12 (3-PAP), which
  modulates its subcellular localization. It also interacts with BIN1/amphiphysin 2,
  enhancing membrane tubulation. Loss-of-function mutations in MTM1 cause
  X-linked centronuclear (myotubular) myopathy (XLCNM), a severe congenital
  muscle disorder. MTM1 is allosterically activated by PI5P, the product of
  PI(3,5)P2 hydrolysis, creating a positive feedback loop. Its phosphatase
  activity is essential for phosphoinositide conversion from PI3P to PI4P at
  endosomes, enabling exocytic cargo delivery to the plasma membrane.
