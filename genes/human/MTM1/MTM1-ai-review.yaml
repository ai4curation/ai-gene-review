# ============================================================
# IBA annotations (phylogenetic)
# ============================================================
- term:
    id: GO:0005737
    label: cytoplasm
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      Cytoplasmic localization of MTM1 is well established by multiple IDA studies.
      Immunofluorescence and subcellular fractionation show MTM1 localizes as a
      dense cytoplasmic network (PMID:10900271, PMID:12118066). IBA is consistent
      with experimental evidence.
    action: ACCEPT
    reason: >-
      Cytoplasm is a well-supported core localization for MTM1, confirmed by
      multiple independent IDA experiments (PMID:10900271, PMID:12118066,
      PMID:12217958) and consistent with phylogenetic inference.
    supported_by:
      - reference_id: PMID:10900271
        supporting_text: "Recombinant human myotubularin specifically dephosphorylates PI(3)P in vitro"
      - reference_id: PMID:12118066
        supporting_text: "Myotubularin is not detected in the nucleus, and localizes mostly as a dense cytoplasmic network"
- term:
    id: GO:0016020
    label: membrane
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      MTM1 associates with membranes as a peripheral membrane protein, localizing
      to plasma membrane, late endosome membranes, and Rac1-induced ruffles
      (PMID:12118066, PMID:14722070, PMID:12847286). IBA annotation to the
      general term 'membrane' is supported.
    action: ACCEPT
    reason: >-
      Membrane association is well supported by experimental evidence showing
      MTM1 at plasma membrane and endosomal membranes. The broad IBA term is
      appropriate given the multiple membrane compartments involved.
    supported_by:
      - reference_id: PMID:12118066
        supporting_text: "Both mutation of a key aspartate residue of myotubularin and dominant activation of Rac1 GTPase lead to the recruitment of myotubularin to specific plasma membrane domains"
      - reference_id: PMID:14722070
        supporting_text: "Stimulation of epidermal growth factor recruits myotubularin to the late endosomal compartment in a manner dependent on the phosphoinositide binding"
- term:
    id: GO:0046716
    label: muscle cell cellular homeostasis
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      MTM1 is required for skeletal muscle maintenance (PMID:21135508). Loss of
      MTM1 causes X-linked centronuclear myopathy characterized by persistence
      of immature muscle fibers. IBA annotation is well supported by the
      muscle-specific phenotype.
    action: ACCEPT
    reason: >-
      Muscle cell cellular homeostasis captures the essential role of MTM1 in
      maintaining skeletal muscle structure and function. Supported by the
      observation that MTM1 is required for skeletal muscle maintenance but not
      for myogenesis (PMID:21135508), and by the disease phenotype of XLCNM.
    supported_by:
      - reference_id: PMID:21135508
        supporting_text: "we demonstrate that myotubularin (MTM1), which is mutated in individuals with X-linked centronuclear myopathy (XLCNM; also known as myotubular myopathy), is a desmin-binding protein"
- term:
    id: GO:0004438
    label: phosphatidylinositol-3-phosphate phosphatase activity
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      PI3P phosphatase activity is the primary enzymatic function of MTM1,
      demonstrated by multiple in vitro and in vivo studies (PMID:10900271,
      PMID:12646134, PMID:12847286, PMID:14722070). This is the core molecular
      function of myotubularin.
    action: ACCEPT
    reason: >-
      This is the defining enzymatic activity of MTM1, confirmed by direct
      biochemical assays in multiple studies. IBA is fully consistent with
      extensive experimental evidence.
    supported_by:
      - reference_id: PMID:10900271
        supporting_text: "myotubularin, a protein tyrosine phosphatase required for muscle cell differentiation, is a potent PI(3)P phosphatase"
      - reference_id: PMID:12646134
        supporting_text: "MTM1 is a phosphatidylinositol phosphatase with reported specificity toward PtdIns3P"
- term:
    id: GO:0046856
    label: phosphatidylinositol dephosphorylation
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      MTM1 dephosphorylates PI3P and PI(3,5)P2, which are phosphatidylinositol
      species (PMID:10900271, PMID:12646134). This biological process annotation
      is a direct consequence of the enzymatic activity.
    action: ACCEPT
    reason: >-
      Phosphatidylinositol dephosphorylation is the direct biological process
      carried out by MTM1 as a lipid phosphatase. Strongly supported by
      experimental evidence.
    supported_by:
      - reference_id: PMID:10900271
        supporting_text: "Recombinant human myotubularin specifically dephosphorylates PI(3)P in vitro"
- term:
    id: GO:0052629
    label: phosphatidylinositol-3,5-bisphosphate 3-phosphatase activity
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      MTM1 dephosphorylates PI(3,5)P2 in addition to PI3P, as shown by
      Schaletzky et al. (PMID:12646134) and Tsujita et al. (PMID:14722070).
      The product PI5P acts as an allosteric activator of MTM1.
    action: ACCEPT
    reason: >-
      PI(3,5)P2 3-phosphatase activity is a well-established second substrate
      specificity of MTM1, confirmed by direct biochemical assays.
    supported_by:
      - reference_id: PMID:12646134
        supporting_text: "they use PtdIns(3,5)P2 in addition to PtdIns3P as a substrate in vitro"
      - reference_id: PMID:14722070
        supporting_text: "the GRAM domain of myotubularin binds to phosphoinositide with the highest affinity to phosphatidylinositol 3,5-bisphosphate"
- term:
    id: GO:0048311
    label: mitochondrion distribution
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      MTM1 regulates mitochondrial positioning in skeletal muscle. Decreased
      MTM1 expression induces abnormal mitochondrial positioning, shape,
      dynamics, and function (PMID:21135508).
    action: ACCEPT
    reason: >-
      Mitochondrion distribution is supported by IMP evidence from Hnia et al.
      showing that MTM1 loss causes abnormal mitochondrial positioning in
      skeletal muscle. IBA is consistent.
    supported_by:
      - reference_id: PMID:21135508
        supporting_text: "decreased MTM1 expression and XLCNM-causing mutations induced abnormal mitochondrial positioning, shape, dynamics, and function"
- term:
    id: GO:1902902
    label: negative regulation of autophagosome assembly
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      MTM1 negatively regulates autophagosome assembly, likely through its
      phosphatase activity on PI3P, which is a key signal for autophagy
      initiation. This IBA annotation is based on phylogenetic inference and
      is consistent with the known role of PI3P in autophagy.
    action: KEEP_AS_NON_CORE
    reason: >-
      While plausible given that PI3P is required for autophagosome formation
      and MTM1 degrades PI3P, negative regulation of autophagosome assembly
      is not a primary or core function of MTM1. It is a downstream consequence
      of its lipid phosphatase activity rather than a dedicated regulatory role.
