  title: Combined Automated Annotation using Multiple IEA Methods
  findings:
    - statement: Combined automated annotations for PI3P phosphatase activity and PI(3,5)P2 phosphatase activity are correct
- id: PMID:10900271
  title: >-
    Myotubularin, a protein tyrosine phosphatase mutated in myotubular myopathy,
    dephosphorylates the lipid second messenger, phosphatidylinositol 3-phosphate.
  findings:
    - statement: First demonstration that MTM1 is a potent PI3P phosphatase in vitro and in vivo
      supporting_text: "myotubularin, a protein tyrosine phosphatase required for muscle cell differentiation, is a potent PI(3)P phosphatase"
    - statement: The C375S substrate-trapping mutant increases PI3P levels in cells, demonstrating in vivo activity
      supporting_text: "Overexpression of a catalytically inactive substrate-trapping myotubularin mutant (C375S) in human 293 cells increases PI(3)P levels relative to that of cells overexpressing the wild-type enzyme"
    - statement: Disease-causing mutations dramatically reduce PI3P phosphatase activity
      supporting_text: "Mutations in the MTM1 gene that cause human myotubular myopathy dramatically reduce the ability of the phosphatase to dephosphorylate PI(3)P"
- id: PMID:12118066
  title: >-
    The PtdIns3P phosphatase myotubularin is a cytoplasmic protein that also
    localizes to Rac1-inducible plasma membrane ruffles.
  findings:
    - statement: MTM1 is predominantly cytoplasmic and not detected in the nucleus
      supporting_text: "Myotubularin is not detected in the nucleus, and localizes mostly as a dense cytoplasmic network"
    - statement: MTM1 localizes to Rac1-induced membrane ruffles via the RID domain
      supporting_text: "Localization to Rac1-induced ruffles is dependent on the presence of a domain highly conserved in the myotubularin family (that we named RID)"
    - statement: Mutation of D278 and Rac1 activation lead to plasma membrane recruitment
      supporting_text: "Both mutation of a key aspartate residue of myotubularin and dominant activation of Rac1 GTPase lead to the recruitment of myotubularin to specific plasma membrane domains"
- id: PMID:12217958
  title: >-
    Muscle-specific alternative splicing of myotubularin-related 1 gene is impaired
    in DM1 muscle cells.
  findings:
    - statement: This paper primarily concerns MTMR1 rather than MTM1 itself, but provides context for the myotubularin family in muscle
      supporting_text: "The myotubularin-related 1 (MTMR1) gene belongs to a highly conserved family of eucaryotic phosphatases, with at least 11 members in humans"
- id: PMID:12646134
  title: >-
    Phosphatidylinositol-5-phosphate activation and conserved substrate specificity
    of the myotubularin phosphatidylinositol 3-phosphatases.
  findings:
    - statement: MTM1 uses PI(3,5)P2 in addition to PI3P as a substrate
      supporting_text: "they use PtdIns(3,5)P2 in addition to PtdIns3P as a substrate in vitro"
    - statement: PI5P is a specific allosteric activator of MTM1 creating a positive feedback loop
      supporting_text: "The product of PtdIns(3,5)P2 hydrolysis, PtdIns5P, causes MTM1 to form a heptameric ring that is 12.5 nm in diameter, and it is a specific allosteric activator of MTM1, MTMR3, and MTMR6"
    - statement: R69 mutation in the GRAM/PH domain reduces PI5P response
      supporting_text: "A disease-causing mutation at arginine 69 of MTM1 falling within a putative pleckstrin homology domain reduces the ability of the enzyme to respond to PtdIns5P"
- id: PMID:12847286
  title: >-
    Identification of myotubularin as the lipid phosphatase catalytic subunit
    associated with the 3-phosphatase adapter protein, 3-PAP.
  findings:
    - statement: MTM1 is the catalytically active subunit that associates with the catalytically inactive MTMR12 (3-PAP)
      supporting_text: "We have now identified myotubularin as the catalytically active 3-phosphatase subunit interacting with 3-PAP"
    - statement: MTMR12 regulates MTM1 subcellular localization, causing relocalization to cytosol
      supporting_text: "coexpression of 3-PAP with myotubularin led to attenuation of the plasma membrane phenotype, associated with myotubularin relocalization to the cytosol"
    - statement: MTM1 overexpression alone induces filopodia at the plasma membrane
      supporting_text: "Recombinant myotubularin localized to the plasma membrane, causing extensive filopodia formation"
- id: PMID:14722070
  title: >-
    Myotubularin regulates the function of the late endosome through the gram
    domain-phosphatidylinositol 3,5-bisphosphate interaction.
  findings:
    - statement: The GRAM domain of MTM1 binds PI(3,5)P2 with highest affinity
      supporting_text: "the GRAM domain of myotubularin binds to phosphoinositide with the highest affinity to phosphatidylinositol 3,5-bisphosphate"
    - statement: MTM1 is recruited to late endosomes upon EGF stimulation
      supporting_text: "Stimulation of epidermal growth factor recruits myotubularin to the late endosomal compartment in a manner dependent on the phosphoinositide binding"
    - statement: MTM1 overexpression inhibits EGFR trafficking from late endosome to lysosome and induces vacuoles
      supporting_text: "Overexpression of myotubularin inhibits epidermal growth factor receptor trafficking from late endosome to lysosome and induces the large endosomal vacuoles"
    - statement: Disease-causing GRAM domain mutations eliminate phosphoinositide binding
      supporting_text: "In patients with myotubular myopathy, mutations in the myotubularin GRAM domain eliminate this binding, indicating that the PtdIns(3,5)P(2) binding ability of the GRAM (glucosyltransferases, Rablike GTPase activators and myotubularin) domain is crucial for the functions of myotubularin in vivo"
- id: PMID:21135508
  title: >-
    Myotubularin controls desmin intermediate filament architecture and mitochondrial
    dynamics in human and mouse skeletal muscle.
  findings:
    - statement: MTM1 is a desmin-binding protein that directly regulates desmin IF assembly
      supporting_text: "myotubularin (MTM1), which is mutated in individuals with X-linked centronuclear myopathy (XLCNM; also known as myotubular myopathy), is a desmin-binding protein and provide evidence for direct regulation of desmin by MTM1 in vitro and in vivo"
    - statement: XLCNM mutations disrupt the MTM1-desmin complex and cause abnormal IF architecture
      supporting_text: "XLCNM-causing mutations in MTM1 disrupted the MTM1-desmin complex, resulting in abnormal IF assembly and architecture in muscle cells and both mouse and human skeletal muscles"
    - statement: MTM1 loss causes abnormal mitochondrial positioning, shape, dynamics, and function
      supporting_text: "decreased MTM1 expression and XLCNM-causing mutations induced abnormal mitochondrial positioning, shape, dynamics, and function"
    - statement: MTM1 is required for skeletal muscle maintenance and is a major regulator of desmin cytoskeleton and mitochondria homeostasis
      supporting_text: "we therefore conclude that MTM1 is a major regulator of both the desmin cytoskeleton and mitochondria homeostasis, specifically in skeletal muscle"
- id: PMID:23917616
  title: >-
    The myotubularin-amphiphysin 2 complex in membrane tubulation and centronuclear
    myopathies.
  findings:
    - statement: MTM1 binds BIN1 (amphiphysin 2) and enhances membrane tubulation
      supporting_text: "we identified MTM1 as a novel binding partner of BIN1, both in vitro and endogenously in skeletal muscle"
    - statement: MTM1-BIN1 interaction links different forms of centronuclear myopathy
      supporting_text: "we identified the first molecular and functional link between MTM1 and BIN1, supporting a common pathological mechanism in different forms of centronuclear myopathy"
- id: PMID:26760201
  title: A phosphoinositide conversion mechanism for exit from endosomes.
  findings:
    - statement: MTM1 enables phosphoinositide conversion from PI3P to PI4P at endosomes for exocytic cargo delivery
      supporting_text: "surface delivery of endosomal cargo requires hydrolysis of PI(3)P by the phosphatidylinositol 3-phosphatase MTM1"
    - statement: MTM1-mediated PI3P removal enables PI4K2a-dependent PI4P generation and exocyst recruitment
      supporting_text: "Removal of endosomal PI(3)P by MTM1 is accompanied by phosphatidylinositol 4-kinase-2\u03B1 (PI4K2\u03B1)-dependent generation of PI(4)P and recruitment of the exocyst tethering complex to enable membrane fusion"
    - statement: Defective phosphoinositide conversion underlies XLCNM
      supporting_text: "defective phosphoinositide conversion at endosomes underlies X-linked centronuclear myopathy caused by mutation of MTM1 in humans"
- id: PMID:9537414
  title: >-
    Association of SET domain and myotubularin-related proteins modulates growth
    control.
  findings:
    - statement: MTM1 interacts with KMT2A/MLL1 via the SET domain
      supporting_text: "SET domains mediate highly conserved interactions with a specific family of proteins that display similarity with dual-specificity phosphatases (dsPTPases)"
    - statement: MTM1 can dephosphorylate phosphotyrosine and phosphoserine peptides in vitro
      supporting_text: "myotubularin, the gene of which is mutated in a subset of patients with X-linked myotubular myopathy, and Sbf1, a newly isolated homologue of myotubularin"
- id: Reactome:R-HSA-1660499
  title: Synthesis of PIPs at the plasma membrane
  findings:
    - statement: MTM1 participates in phosphoinositide interconversion at the plasma membrane
      supporting_text: "Many of the phosphatidylinositol phosphatases that act at the plasma membrane belong to the myotubularin family"
- id: Reactome:R-HSA-1660516
  title: Synthesis of PIPs at the early endosome membrane
  findings:
    - statement: MTM1 participates in phosphoinositide interconversion at the early endosome
      supporting_text: "At the early endosome membrane, phosphatidylinositol 3,5-bisphosphate (PI(3,5)P2) is generated in two steps from phosphatidylinositol 3,4-bisphosphate PI(3,4)P2 by the action of various kinases and phosphatases"
- id: Reactome:R-HSA-1660517
  title: Synthesis of PIPs at the late endosome membrane
  findings:
    - statement: MTM1 participates in phosphoinositide interconversion at the late endosome
      supporting_text: "At the late endosome membrane, the primary event is the dephosphorylation of the phosphoinositide phosphatidylinositol 3,5-bisphosphate (PI(3,5)P2) to phosphatidylinositol 3-phosphate (PI3P) and phosphatidylinositol 5-phosphate (PI5P)"
- id: Reactome:R-HSA-1675795
  title: PI3P is dephosphorylated to PI by MTM proteins at the late endosome membrane
