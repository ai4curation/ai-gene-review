- id: PMID:27257257
  title: ADP-ribose-derived nuclear ATP synthesis by NUDIX5 is required for chromatin
    remodeling.
  findings:
  - statement: Nuclear ATP is generated from hydrolysis of poly(ADP-ribose) to ADP-ribose,
      which NUDIX5 (with pyrophosphate) converts to ATP; this nuclear ATP source is
      essential for hormone-induced chromatin remodeling. NMNAT1 acts in this nuclear
      ATP-generating module together with PARP1, PARG and NUDT5.
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: Establishes the poly-ADP-ribose-derived nuclear ATP pathway; basis
      for GO:1990966 IDA annotation.
