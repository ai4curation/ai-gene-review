id: Q9HAN9
gene_symbol: NMNAT1
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  NMNAT1 is the nuclear isoform of nicotinamide/nicotinic acid mononucleotide
  adenylyltransferase, one of three human NMNAT isoenzymes (NMNAT1 nuclear,
  NMNAT2 Golgi, NMNAT3 mitochondrial). It catalyses the central, committed
  adenylyl-transfer step shared by all routes of NAD+ biosynthesis: transfer of
  an adenylyl group from ATP to nicotinamide mononucleotide (NMN) to form NAD+
  with release of pyrophosphate (EC 2.7.7.1), and, with comparable efficiency,
  to the deamidated substrate nicotinate mononucleotide (NaMN) to form nicotinate
  adenine dinucleotide (deamido-NAD+/NaAD; EC 2.7.7.18). NMNAT1 therefore sits at
  the convergence of the de novo (kynurenine), salvage and Preiss-Handler
  pathways. The enzyme requires a divalent metal cofactor (Zn2+ gives higher
  activity than Mg2+), assembles into a homohexamer, and is imported into the
  nucleus via a nuclear localization signal. In the nucleus it supplies NAD+
  locally to NAD+-consuming enzymes such as PARP1 and the sirtuin SIRT1, and
  participates in nuclear ATP generation from poly-ADP-ribose that supports
  chromatin remodeling. In humans, loss-of-function variants cause Leber
  congenital amaurosis 9 and the multisystem SHILCA syndrome.
