- id: PMID:11027696
  title: Molecular cloning, chromosomal localization, tissue mRNA levels, bacterial
    expression, and enzymatic properties of human NMN adenylyltransferase.
  findings:
  - statement: Cloned and bacterially expressed human NMN adenylyltransferase and
      characterized its molecular and kinetic properties, establishing NMN adenylyltransferase
      activity for the recombinant human enzyme.
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: Primary characterization of recombinant human NMNAT1; supports the
      NMN adenylyltransferase (EC 2.7.7.1) activity and cofactor requirement.
- id: PMID:11248244
  title: Characterization of recombinant human nicotinamide mononucleotide adenylyl
    transferase (NMNAT), a nuclear enzyme essential for NAD synthesis.
  findings:
  - statement: Established the primary structure of human NMNAT, confirmed a nuclear
      localization signal by immunofluorescence, and showed the enzyme strongly inhibits
      recombinant PARP1.
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: Supports nuclear localization and the physical/functional interaction
      with PARP1.
- id: PMID:16118205
  title: Subcellular compartmentation and differential catalytic properties of the
    three human nicotinamide mononucleotide adenylyltransferase isoforms.
  findings:
  - statement: Confirmed NMNAT1 as a nuclear protein (NMNAT2 Golgi, NMNAT3 mitochondrial)
      and compared kinetic properties; NMNAT1 preferentially synthesizes NAD+.
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: Establishes nuclear localization and adenylyltransferase activity
      for NMNAT1 specifically among the three isoforms.
- id: PMID:17402747
  title: 'Initial-rate kinetics of human NMN-adenylyltransferases: substrate and metal
    ion specificity, inhibition by products and multisubstrate analogues, and isozyme
    contributions to NAD+ biosynthesis.'
  findings:
  - statement: Detailed initial-rate kinetics of NMNAT1 defining substrate specificity
      (NMN and NaMN), ordered ATP-before-NMN mechanism, metal-ion preference and product
      inhibition; basis for both EC 2.7.7.1 and EC 2.7.7.18 assignments.
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: Primary experimental evidence (ECO:0000269) cited by UniProt for
      both catalytic activities.
- id: PMID:19478080
  title: Enzymes in the NAD+ salvage pathway regulate SIRT1 activity at target gene
    promoters.
  findings:
  - statement: NMNAT-1 interacts with and is recruited to target-gene promoters by
      SIRT1, where the nuclear NAD+ salvage pathway (NAMPT + NMNAT1) regulates SIRT1
      deacetylase activity and gene transcription.
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: Functionally informative NMNAT1-SIRT1 interaction; underlies the
      nuclear transcription-regulatory role.
