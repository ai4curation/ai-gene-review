id: Q92947
gene_symbol: GCDH
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: Glutaryl-CoA dehydrogenase (GCDH; EC 1.3.8.6) is a FAD-dependent enzyme
  of the acyl-CoA dehydrogenase family that resides in the mitochondrial matrix as
  a homotetramer. It catalyses the oxidative decarboxylation of glutaryl-CoA to crotonyl-CoA
  and CO2, transferring the abstracted electrons via its FAD cofactor to the electron-transfer
  flavoprotein (ETF), which relays them to ETF-ubiquinone oxidoreductase and the respiratory
  chain. GCDH acts in the degradative pathways of L-lysine, L-hydroxylysine and L-tryptophan.
  It is synthesised as a precursor with an N-terminal mitochondrial transit peptide
  that is cleaved on import. Loss of GCDH activity causes the autosomal recessive
  disorder glutaric aciduria type 1 (GA1), characterised by accumulation of glutaric
  and 3-hydroxyglutaric acids, striatal (basal ganglia) degeneration, macrocephaly,
  dystonia and encephalopathic crises.
