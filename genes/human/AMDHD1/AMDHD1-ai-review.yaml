id: Q96NU7
gene_symbol: AMDHD1
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  AMDHD1 (amidohydrolase domain-containing protein 1) is the human
  imidazolonepropionase (EC 3.5.2.7), a cytosolic metal-dependent amidohydrolase
  that catalyses the third step of the universal L-histidine degradation pathway.
  It hydrolyses the carbon-nitrogen bond of 4-imidazolone-5-propanoate to yield
  N-formimidoyl-L-glutamate (N-formimino-L-glutamate), positioned between
  urocanate hydratase (UROC1) and glutamate formimidoyltransferase (FTCD) in the
  His-to-glutamate route. The protein belongs to the metallo-dependent hydrolase
  superfamily (HutI family; Amidohydro_1 fold) and binds one catalytic zinc or
  iron ion per subunit coordinated by conserved active-site residues. The human
  enzyme is expressed most highly in liver and skeletal muscle. Beyond its
  metabolic role, one report describes AMDHD1 acting as a tumor suppressor in
  cholangiocarcinoma by stabilizing SMAD4 and promoting TGF-beta/SMAD signaling,
  a secondary activity that is not yet independently established.
