id: Q03426
gene_symbol: MVK
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  MVK encodes mevalonate kinase (MK; EC 2.7.1.36), a GHMP-kinase-family enzyme
  that catalyses the ATP-dependent, Mg2+-requiring phosphorylation of
  (R)-mevalonate to (R)-5-phosphomevalonate. This is the committed step
  immediately downstream of HMG-CoA reductase in the cytosolic
  mevalonate/isoprenoid pathway, feeding synthesis of isopentenyl diphosphate,
  farnesyl and geranylgeranyl diphosphate, dolichol, ubiquinone and cholesterol.
  The enzyme is a homodimer, requires Mg2+, and is subject to competitive
  feedback inhibition at its ATP-binding site by farnesyl and geranylgeranyl
  diphosphate, making it a key regulatory node of the pathway. Human MK is a
  cytosolic enzyme (with a minor/disputed peroxisomal pool inferred by
  similarity). Loss-of-function variants cause mevalonate kinase deficiency, a
  clinical spectrum ranging from the milder hyperimmunoglobulinaemia D and
  periodic fever syndrome (HIDS) to severe mevalonic aciduria (developmental
  delay, dysmorphic features, and recurrent febrile crises); MVK variants are
  also associated with porokeratosis.
