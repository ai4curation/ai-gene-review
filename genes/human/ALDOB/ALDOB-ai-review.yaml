id: P05062
gene_symbol: ALDOB
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  Fructose-bisphosphate aldolase B (liver-type aldolase; EC 4.1.2.13) is the
  liver/kidney/intestine isozyme of the vertebrate class I (Schiff-base)
  fructose-1,6-bisphosphate aldolases. It is a cytosolic homotetramer that
  catalyzes reversible aldol cleavage using an active-site lysine (Lys230) that
  forms a Schiff-base intermediate with dihydroxyacetone phosphate and an
  aspartate proton acceptor (Asp188). Aldolase B has two physiologically
  important activities in the same active site: it cleaves fructose
  1,6-bisphosphate into dihydroxyacetone phosphate and D-glyceraldehyde
  3-phosphate (a step shared with glycolysis and, in reverse, gluconeogenesis),
  and it cleaves dietary-derived fructose 1-phosphate into dihydroxyacetone
  phosphate and D-glyceraldehyde in fructolysis. Relative to the muscle (ALDOA)
  and brain (ALDOC) isozymes, aldolase B shows comparatively high activity
  toward fructose 1-phosphate, making it the principal enzyme of hepatic
  fructose metabolism. Loss-of-function variants cause hereditary fructose
  intolerance (HFI), an autosomal recessive disease in which fructose ingestion
  leads to accumulation of fructose 1-phosphate, ATP/phosphate depletion,
  hypoglycemia, and hepatic and renal toxicity. Beyond catalysis, aldolase B
  has reported non-catalytic (moonlighting) roles, including acting as a
  scaffold in a ternary complex with glucose-6-phosphate dehydrogenase (G6PD)
  and TP53 that restrains oxidative pentose phosphate pathway flux, physical
  association with the vacuolar H+-ATPase, and binding to the actin
  cytoskeleton and Bardet-Biedl syndrome proteins.
