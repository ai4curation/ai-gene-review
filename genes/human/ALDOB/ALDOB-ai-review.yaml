core_functions:
- description: >-
    Cytosolic fructose-1,6-bisphosphate aldolase (class I Schiff-base aldolase)
    that reversibly cleaves fructose 1,6-bisphosphate into dihydroxyacetone
    phosphate and D-glyceraldehyde 3-phosphate, functioning in glycolysis and,
    in reverse, gluconeogenesis in liver, kidney, and intestine.
  molecular_function:
    id: GO:0004332
    label: fructose-bisphosphate aldolase activity
  directly_involved_in:
  - id: GO:0006096
    label: glycolytic process
  locations:
  - id: GO:0005829
    label: cytosol
  supported_by:
  - reference_id: PMID:10625657
    supporting_text: "reversible cleavage of phosphofructose esters into cognate triose"
- description: >-
    Cytosolic fructose-1-phosphate aldolase activity that cleaves dietary
    fructose-derived fructose 1-phosphate into dihydroxyacetone phosphate and
    D-glyceraldehyde, the committed step of hepatic fructolysis; loss of this
    activity causes hereditary fructose intolerance.
  molecular_function:
    id: GO:0061609
    label: fructose-1-phosphate aldolase activity
  directly_involved_in:
  - id: GO:0006001
    label: fructose catabolic process
  locations:
  - id: GO:0005829
    label: cytosol
  supported_by:
  - reference_id: PMID:10970798
    supporting_text: "catalytic efficiency of protein Gln(303) is approx. 1/100 that of the"
- description: >-
    Contributes to gluconeogenesis via the reverse (aldol condensation)
    direction of the fructose-bisphosphate aldolase reaction, forming fructose
    1,6-bisphosphate from dihydroxyacetone phosphate and glyceraldehyde
    3-phosphate.
  molecular_function:
    id: GO:0004332
    label: fructose-bisphosphate aldolase activity
  directly_involved_in:
  - id: GO:0006094
    label: gluconeogenesis
  locations:
  - id: GO:0005829
    label: cytosol
  supported_by:
  - reference_id: PMID:10625657
    supporting_text: "reversible cleavage of phosphofructose esters into cognate triose"
