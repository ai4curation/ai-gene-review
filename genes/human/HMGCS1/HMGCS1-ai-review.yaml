id: Q01581
gene_symbol: HMGCS1
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  HMGCS1 is the cytoplasmic (cytosolic) isoform of hydroxymethylglutaryl-CoA
  synthase (HMG-CoA synthase; EC 2.3.3.10). It catalyzes the condensation of
  acetyl-CoA with acetoacetyl-CoA (with water) to form (3S)-3-hydroxy-3-
  methylglutaryl-CoA (HMG-CoA) plus CoA, the first committed step of the
  cytosolic mevalonate pathway. The HMG-CoA it produces is reduced by HMG-CoA
  reductase (HMGCR) to mevalonate, the precursor of isoprenoids and cholesterol;
  HMGCS1 thus feeds isoprenoid and cholesterol biosynthesis. The enzyme is a
  homodimer with a thiolase-like fold and uses an active-site cysteine (Cys129)
  that forms an acetyl-thioester intermediate during catalysis. It is a soluble
  cytosolic protein and is distinct from the mitochondrial isoform HMGCS2, which
  produces HMG-CoA for ketone-body synthesis (ketogenesis). HMGCS1 is a
  sterol-regulatory-element-binding-protein (SREBP)-regulated cholesterogenic
  gene, and biallelic loss-of-function variants cause a congenital rigid-spine
  myopathy.
