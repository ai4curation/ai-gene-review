suggested_questions:
- question: >-
    Which non-catalytic protein interactions of HMGCS1 (e.g. with SLC22A5) are
    functionally meaningful, and does HMGCS1 have any moonlighting role beyond the
    mevalonate pathway?
- question: >-
    How do HMGCS1 loss-of-function variants cause a rigid-spine congenital myopathy
    despite the ubiquitous, essential nature of the mevalonate pathway, and why is
    the phenotype rescued by mevalonic acid?
suggested_experiments:
- description: >-
    Isoform-resolved subcellular fractionation plus validated-antibody
    immunofluorescence to test whether the HPA-reported nucleoplasm and plasma-
    membrane signals reflect genuine HMGCS1 pools or antibody artifacts.
- description: >-
    Metabolic flux analysis in HMGCS1-deficient patient muscle/cells to quantify the
    mevalonate/cholesterol-pathway defect and its rescue by exogenous mevalonate.
