taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: DNAJC1 (MTJ1/ERdj1, human homolog HTJ1) is a single-pass type I endoplasmic
  reticulum (and nuclear/microsomal) membrane protein of the DNAJC subfamily of J-domain
  co-chaperones. Its N-terminal J domain faces the ER lumen and stimulates the ATPase
  activity of the ER HSP70 chaperone BiP (HSPA5), while its large cytosolic C-terminal
  region associates with ribosomes and modulates protein synthesis, and contains two
  SANT (Myb-like) domains. Through its second SANT domain it binds the serpin SERPINA3/alpha-1-antichymotrypsin
  and the inter-alpha-trypsin inhibitor heavy chain ITIH4, modulating their protease-inhibitory/processing
  behavior. DNAJC1 thereby couples the ER-membrane BiP chaperone system to translation
  and to regulation of secreted protease/protease-inhibitor activity.
