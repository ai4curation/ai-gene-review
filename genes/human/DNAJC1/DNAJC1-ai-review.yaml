suggested_questions:
- question: How does DNAJC1 ribosome association at the ER membrane mechanistically
    regulate translation, and is this coupled to BiP-assisted co-translational folding?
- question: What is the physiological significance of the SANT2-mediated regulation
    of secreted serpins/protease inhibitors (SERPINA3, ITIH4) by an ER-membrane chaperone?
suggested_experiments:
- description: Ribosome profiling and polysome analysis in DNAJC1-depleted versus control
    cells to test its proposed role in translation/protein-synthesis modulation at
    the ER.
- description: Reconstituted BiP ATPase assays with the DNAJC1 lumenal J domain (wild-type
    versus HPD-motif mutant) to quantify its co-chaperone activity, and co-IP/structural
    mapping of the cytosolic ribosome-binding region.
