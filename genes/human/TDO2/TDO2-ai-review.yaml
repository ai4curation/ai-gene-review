gene_symbol: TDO2
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: "TDO2 encodes tryptophan 2,3-dioxygenase (TDO; EC 1.13.11.11), a cytosolic, heme-dependent, homotetrameric dioxygenase that catalyzes the oxidative cleavage of the pyrrole ring of L-tryptophan, converting L-tryptophan and molecular oxygen to N-formyl-L-kynurenine. This is the first, committed and rate-limiting step of the kynurenine pathway of tryptophan catabolism, which degrades the majority of dietary tryptophan and ultimately supplies de novo NAD+ biosynthesis. TDO is the principal hepatic tryptophan-degrading enzyme; it has high substrate specificity for L-tryptophan, and its expression and activity are induced by its substrate and by glucocorticoids, distinguishing it from the more broadly distributed, inflammation-inducible immune enzyme indoleamine 2,3-dioxygenase (IDO1). Each subunit binds one heme group whose iron is coordinated by a proximal histidine (His328). A non-catalytic exo L-tryptophan binding site regulates the enzyme's cellular stability by protecting it from ubiquitin-dependent proteasomal degradation. Loss-of-function variants cause autosomal recessive hypertryptophanemia."
