id: Q969Q0
gene_symbol: RPL36AL
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  RPL36AL encodes a 106-residue, highly basic eL42-family protein that is an
  integral component of the cytosolic 60S large ribosomal subunit. The gene is
  an intronless autosomal retrocopy of the X-linked RPL36A gene and is
  ubiquitously expressed. RPL36AL and RPL36A encode nearly identical proteins,
  differing only at residue 38 (arginine in RPL36AL and lysine in RPL36A).
  Within the human 80S ribosome, RPL36AL occupies the large-subunit E-site
  region and contacts the CCA end of deacylated tRNA in the P/E hybrid state;
  recombinant RPL36AL also binds tRNA with nanomolar affinity. These contacts
  couple its structural role in the large subunit to tRNA positioning during
  cytoplasmic translation. A specialized translational program unique to
  RPL36AL rather than RPL36A has not been established.
