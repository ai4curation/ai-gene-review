suggested_questions:
- question: >-
    What fraction of human cytosolic ribosomes contains RPL36AL rather than
    RPL36A in each tissue and cell state, and are mixed populations functionally
    distinguishable?
- question: >-
    Does the sole K38R difference between RPL36A and RPL36AL alter assembly,
    post-translational modification, tRNA dynamics, or translational selectivity?
- question: >-
    Does endogenous RPL36AL accumulate in the nucleus as a reproducible ribosome
    biogenesis intermediate, or was the published nuclear call specific to the
    GFP-tagged localization assay?
suggested_experiments:
- hypothesis: >-
    RPL36AL and RPL36A are both incorporated into human 60S subunits, but their
    relative occupancy varies by tissue without creating major ribosome specialization.
  description: >-
    Develop paralog-specific targeted mass spectrometry around the residue-38
    peptide and endogenous epitope-tagged cell lines, then quantify RPL36AL and
    RPL36A in purified 60S, 80S, and polysome fractions across representative
    tissues and stress conditions.
- hypothesis: >-
    The K38R difference is dispensable for basal translation but may tune local
    eL42 interactions or post-translational regulation.
  description: >-
    Create RPL36AL and RPL36A single and double acute-depletion backgrounds and
    perform reciprocal rescue with wild-type proteins and K38R/R38K swap variants.
    Measure ribosome assembly, polysome profiles, global translation, fidelity,
    E-site tRNA release, and ribosome profiling in matched expression conditions.
- hypothesis: >-
    Nuclear RPL36AL represents transient import and 60S assembly rather than a
    separate nuclear function.
  description: >-
    Use paralog-specific endogenous tagging, live-cell imaging, nucleolar markers,
    and pulse-chase ribosome-assembly assays. Compare untagged antibody staining
    and C-terminal GFP fusions to detect tag-dependent localization artifacts.
