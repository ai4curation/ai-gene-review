- id: PMID:19465911
  title: SDHAF1, encoding a LYR complex-II specific assembly factor, is mutated in
    SDH-defective infantile leukoencephalopathy.
  findings:
  - statement: >-
      Founding paper identifying SDHAF1 as the first bona fide SDH (Complex II) assembly
      factor; biallelic mutations cause SDH-defective infantile leukoencephalopathy, and
      wild-type re-expression restores SDH activity and amount.
    reference_section_type: ABSTRACT
    supporting_text: >-
      SDH activity and amount were restored in mutant fibroblasts proportionally with
      re-expression of the wild-type gene.
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified founding paper; source of the experimental IMP for GO:0034553 and the
      IDA mitochondrial localization. Abstract-only in cache.
- id: PMID:24606901
  title: Cochaperone binding to LYR motifs confers specificity of iron sulfur cluster
    delivery.
  findings:
  - statement: >-
      SDHAF1 (LYRM8) is an HSC20 binding partner; LYR-motif proteins engage the
      ISCU-HSC20-HSPA9 Fe-S transfer complex, and SDHAF1 associates with SDHB via a non-LYR
      site while positioning the Fe-S transfer complex through its own LYR motif.
    reference_section_type: DISCUSSION
    supporting_text: >-
      members of the LYR motif family which assist assembly of complexes II or III, SDHAF1
      and LYRM7, respectively, are HSC20 binding partners.
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Full text available and read; directly supports the protein-folding chaperone binding
      MF (SDHAF1-HSC20) and the SDHB-recruitment adaptor role.
- id: PMID:26749241
  title: Disease-Causing SDHAF1 Mutations Impair Transfer of Fe-S Clusters to SDHB.
  findings:
  - statement: >-
      SDHAF1 contributes to Fe-S cluster incorporation into SDHB by binding SDHB (C-terminal
      arginine-rich region) and engaging the HSC20-HSPA9 co-chaperone/chaperone pair with
      the ISCU scaffold via its N-terminal LYR motif; disease mutations abrogate SDHB
      binding, leading to LONP1-mediated SDHB degradation, and riboflavin ameliorates the
      phenotype.
    reference_section_type: ABSTRACT
    supporting_text: >-
      SDHAF1 transiently binds to aromatic peptides of SDHB through an arginine-rich region
      in its C terminus and specifically engages a Fe-S donor complex, consisting of the
      scaffold, holo-ISCU, and the co-chaperone-chaperone pair, HSC20-HSPA9, through an LYR
      motif near its N-terminal domain.
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified; central mechanism/disease paper. Abstract-only in cache but abstract
      fully supports the mechanism cited.
- id: PMID:28380382
  title: A Single Adaptable Cochaperone-Scaffold Complex Delivers Nascent Iron-Sulfur
    Clusters to Mammalian Respiratory Chain Complexes I-III.
  findings:
  - statement: >-
      The HSC20-HSPA9-ISCU Fe-S transfer complex delivers clusters to LYR-motif-associated
      respiratory chain assembly intermediates (complexes I-III), the general framework in
      which SDHAF1 acts for Complex II.
    reference_section_type: ABSTRACT
    supporting_text: >-
      Binding of HSC20 to the LYR motif of LYRM7 in a pre-assembled UQCRFS1-LYRM7 intermediate
      in the mitochondrial matrix facilitates Fe-S cluster transfer to UQCRFS1.
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: >-
      Contextual (LYRM7/Complex III focus) but corroborates the HSC20-LYR Fe-S delivery
      mechanism shared by SDHAF1; source of an IntAct HSCB interaction annotation.
