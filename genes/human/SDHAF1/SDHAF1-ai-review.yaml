core_functions:
- description: >-
    Assembly factor mediating maturation and iron-sulfur cluster acquisition of the SDHB
    subunit during assembly of mitochondrial respiratory Complex II (succinate
    dehydrogenase). SDHAF1 binds the DnaJ/Hsp40-type co-chaperone HSC20 (HSCB) via its
    N-terminal LYR motif to recruit the HSC20-HSPA9 chaperone system and the ISCU scaffold,
    and binds SDHB via its C-terminal arginine-rich region, positioning the Fe-S transfer
    machinery to deliver clusters to SDHB. Loss of function causes SDH deficiency that is
    rescued by wild-type re-expression.
  molecular_function:
    id: GO:0051087
    label: protein-folding chaperone binding
  directly_involved_in:
  - id: GO:0034553
    label: mitochondrial respiratory chain complex II assembly
  locations:
  - id: GO:0005759
    label: mitochondrial matrix
  supported_by:
  - reference_id: PMID:24606901
    supporting_text: >-
      members of the LYR motif family which assist assembly of complexes II or III, SDHAF1
      and LYRM7, respectively, are HSC20 binding partners.
  - reference_id: PMID:26749241
    supporting_text: >-
      SDHAF1 transiently binds to aromatic peptides of SDHB through an arginine-rich region
      in its C terminus and specifically engages a Fe-S donor complex, consisting of the
      scaffold, holo-ISCU, and the co-chaperone-chaperone pair, HSC20-HSPA9, through an LYR
      motif near its N-terminal domain.
  - reference_id: PMID:19465911
    supporting_text: >-
      SDHAF1 is the first bona fide SDH assembly factor reported in any organism.
