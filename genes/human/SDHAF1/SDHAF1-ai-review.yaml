taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  SDHAF1 (succinate dehydrogenase assembly factor 1) is a small (115 aa) LYR-motif protein
  of the mitochondrial matrix that acts as an assembly factor for succinate dehydrogenase
  (SDH, respiratory Complex II), the enzyme that couples oxidation of succinate to fumarate
  with reduction of ubiquinone and links the TCA cycle to the electron transport chain.
  SDHAF1 is not a structural subunit of the mature complex and is not itself catalytic.
  It promotes maturation of the iron-sulfur (Fe-S) subunit SDHB: through an N-terminal LYR
  motif it binds the DnaJ/Hsp40-type co-chaperone HSC20 (HSCB), recruiting the HSC20-HSPA9
  chaperone system and the ISCU scaffold, while an arginine-rich C-terminal region binds
  SDHB, thereby positioning the Fe-S transfer machinery to insert iron-sulfur clusters into
  SDHB and protecting SDHB from oxidative damage. It is a member of the complex I LYR family,
  SDHAF1 subfamily. Biallelic loss-of-function variants cause an autosomal-recessive,
  riboflavin-responsive mitochondrial complex II deficiency presenting as infantile
  leukoencephalopathy with succinate accumulation.
