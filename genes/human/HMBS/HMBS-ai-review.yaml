id: P08397
gene_symbol: HMBS
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  Hydroxymethylbilane synthase (HMBS), also known as porphobilinogen deaminase
  (PBGD) or pre-uroporphyrinogen synthase, is the enzyme that catalyzes the third
  step of heme biosynthesis (EC 2.5.1.61). Acting in the cytosol, it carries out the
  head-to-tail (sequential) polymerization of four molecules of porphobilinogen (PBG)
  into the linear tetrapyrrole hydroxymethylbilane (also called preuroporphyrinogen),
  releasing four molecules of ammonia. The enzyme is a monomer that uses a unique
  self-derived dipyrromethane cofactor, covalently bound at Cys261, which serves as a
  primer onto which the four PBG units are added one at a time; the cofactor is not
  consumed and remains bound as the holoenzyme releases the product. The product
  hydroxymethylbilane is subsequently cyclized by uroporphyrinogen III synthase.
  Alternative transcription/splicing produces a ubiquitously expressed housekeeping
  isoform and an erythroid-specific isoform. Loss-of-function mutations in HMBS cause
  acute intermittent porphyria (AIP), the most common acute hepatic porphyria, and
  biallelic mutations underlie porphyria-related (leuko)encephalopathy.
