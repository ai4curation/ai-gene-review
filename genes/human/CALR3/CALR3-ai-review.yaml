gene_symbol: CALR3
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: Calreticulin-3 (also known as calreticulin-2, calsperin, or CRT2) is a
  testis-specific member of the calreticulin/calnexin family of endoplasmic reticulum
  (ER) lumen chaperones and a paralog of calreticulin-1 (CALR). It has the canonical
  calreticulin architecture - an N-terminal globular lectin domain, a proline-rich
  P-domain, and a C-terminal acidic domain - together with an N-terminal signal peptide
  and a C-terminal ER-retention motif. During spermatogenesis it acts as a molecular
  chaperone that assists the folding and maturation of specific client proteins such
  as ADAM3 and is required for normal sperm fertility. Unlike calreticulin-1, which
  is a major ER calcium-buffering protein, calreticulin-3 does not bind calcium (or
  binds it with much lower capacity), indicating that its chaperone role rather than
  calcium handling is its principal function. It is localized to the lumen of the
  endoplasmic reticulum.
