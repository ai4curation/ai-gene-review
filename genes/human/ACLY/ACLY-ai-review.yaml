- id: PMID:23932781
  title: Acetylation stabilizes ATP-citrate lyase to promote lipid biosynthesis and
    tumor growth.
  findings:
  - statement: >-
      ACLY is acetylated at Lys-540/546/554 by PCAF under high glucose, which blocks its
      ubiquitylation and degradation, stabilizes the protein, and promotes de novo lipid synthesis,
      proliferation and tumor growth; SIRT2 deacetylates and destabilizes ACLY.
    supporting_text: >-
      Substitution of 3K abolishes ACLY
      ubiquitylation and promotes de novo lipid synthesis, cell proliferation, and
      tumor growth
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Abstract-only cache; PubMed-verified. Establishes acetylation/ubiquitination regulation of
      ACLY stability and its link to lipid biosynthesis.
- id: PMID:31873304
  title: Molecular basis for acetyl-CoA production by ATP-citrate lyase.
  findings:
  - statement: >-
      Cryo-EM of human ACLY shows it is the predominant source of nucleocytosolic acetyl-CoA and
      forms a homotetramer (a rigid citrate synthase homology module flanked by four flexible
      acetyl-CoA synthetase homology domains) that uses citrate, Mg-ATP and CoA to produce
      acetyl-CoA and oxaloacetate.
    supporting_text: >-
      ATP-citrate lyase (ACLY) is the predominant source of nucleocytosolic acetyl-CoA
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Full text available; PubMed-verified structural/mechanistic study. Basis for the
      ATP-dependent citrate lyase complex (homotetramer) annotation.
- id: PMID:39881208
  title: SLC25A1 and ACLY maintain cytosolic acetyl-CoA and regulate ferroptosis susceptibility
    via FSP1 acetylation.
  findings:
  - statement: >-
      In the cytosol ACLY converts citrate into oxaloacetate and acetyl-CoA; this acetyl-CoA supply
      sustains FSP1 acetylation and stability, so ACLY knockdown/inhibition sensitizes cancer cells
      to RSL3- and erastin-induced ferroptosis.
    supporting_text: >-
      ACLY knockdown heightened cell susceptibility to RSL3- and erastin-induced ferroptosis
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Full text available; PubMed-verified. Source of the acetyl-CoA IMP and the (non-core)
      negative regulation of ferroptosis annotations.
