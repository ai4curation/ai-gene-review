id: P53396
gene_symbol: ACLY
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  ACLY encodes ATP-citrate synthase (also called ATP-citrate lyase; EC 2.3.3.8), the
  cytosolic homotetrameric enzyme that produces the acetyl-CoA used throughout the cell for
  de novo lipogenesis, cholesterol/isoprenoid synthesis and protein acetylation. Citrate
  exported from the mitochondria to the cytosol is cleaved by ACLY in an ATP- and
  CoA-dependent reaction, citrate + ATP + CoA -> acetyl-CoA + oxaloacetate + ADP + Pi, with
  Mg(2+) as a required cofactor. Each protomer combines an N-terminal acyl-CoA synthetase
  homology (ASH) superdomain (containing an ATP-grasp module and the catalytic His-760 that
  forms a tele-phosphohistidine intermediate) and a C-terminal citrate synthase homology
  (CSH) domain; four protomers assemble into the active homotetramer. ACLY is the
  predominant source of nucleocytosolic acetyl-CoA and thereby links carbohydrate-derived
  carbon (via mitochondrial citrate) to lipid biosynthesis and to acetyl-CoA-dependent
  processes including histone acetylation. Its activity is regulated by phosphorylation
  (by PKA, GSK3, AKT and BCKDK), by acetylation/ubiquitination competition at Lys-540/546/554,
  and allosterically by phosphorylated sugars such as fructose 6-phosphate. ACLY is a
  validated drug target; the prodrug bempedoic acid lowers LDL cholesterol by inhibiting it.
