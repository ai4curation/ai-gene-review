- id: PMID:10653665
  title: Phosphorylation of recombinant human ATP:citrate lyase by cAMP-dependent
    protein kinase abolishes homotropic allosteric regulation of the enzyme by citrate
    and increases the enzyme activity. Allosteric activation of ATP:citrate lyase
    by phosphorylated sugars.
  findings:
  - statement: >-
      Recombinant human ATP:citrate lyase was purified and its kinetics characterized; PKA
      phosphorylation increases Vmax 6-fold and abolishes homotropic allosteric regulation by
      citrate, and phosphorylated sugars (e.g. fructose 6-phosphate) allosterically activate it.
    supporting_text: >-
      Recombinantly expressed human ATP:citrate lyase was purified from E. coli, and
      its kinetic behavior was characterized before and after phosphorylation
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Abstract-only cache; PubMed-verified as the human ACLY biochemical characterization paper.
      Supports the core catalytic activity and its covalent/allosteric regulation.
- id: PMID:1371749
  title: Cloning and expression of a human ATP-citrate lyase cDNA.
  findings:
  - statement: >-
      Cloning and expression of the human ACLY cDNA yielded an enzymatically active protein;
      His->Ala mutagenesis of the catalytic histidine (His765 in the paper's numbering; UniProt
      His-760) diminished activity, consistent with a phosphohistidine catalytic intermediate.
    supporting_text: >-
      Site-specific
      mutagenesis of His765----Ala diminishes the catalytic activity of the expressed
      ATP-citrate lyase protein
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Abstract-only cache; PubMed-verified human ACLY cloning/characterization paper and the
      source of most BHF-UCL experimental annotations.
