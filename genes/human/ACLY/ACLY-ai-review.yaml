core_functions:
- description: >-
    ATP citrate synthase activity (EC 2.3.3.8): as a cytosolic homotetramer, ACLY cleaves
    citrate using ATP and CoA to generate acetyl-CoA and oxaloacetate (citrate + ATP + CoA ->
    acetyl-CoA + oxaloacetate + ADP + Pi, Mg2+-dependent). This produces the nucleocytosolic
    acetyl-CoA that supplies de novo fatty acid and cholesterol biosynthesis, consuming
    cytosolic citrate and CoA and releasing oxaloacetate.
