id: Q86Y82
gene_symbol: STX12
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: STX12 encodes syntaxin-12/syntaxin-13, a syntaxin-family SNARE on endosomal, early endosomal, recycling endosomal, and Golgi membranes. Its core function is SNAP receptor/SNARE-mediated vesicle docking and membrane fusion in endosomal recycling and intracellular membrane traffic. Direct evidence also supports a PN-relevant role at LC3-positive phagophores/autophagosome assembly or maturation, likely as an autophagy-specific output of its SNARE trafficking activity. STX12 should not be annotated as an ESCRT-III complex component.
