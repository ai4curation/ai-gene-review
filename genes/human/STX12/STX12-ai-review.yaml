suggested_questions:
- question: Is the STX12 autophagy role best represented as autophagosome assembly/phagophore closure, or should a more specific autophagosome maturation term be used when GO definitions allow it?
- question: 'Which SNARE partners define the STX12 complex during phagophore maturation: VTI1A, STX6, SNAP29, SNAP47, or a distinct autophagy-specific SNARE set?'
- question: Does STX12 act upstream of ESCRT-III dysfunction only through membrane traffic, or does it physically coordinate with ESCRT-associated machinery during phagophore closure?
suggested_experiments:
- description: Rescue STX12 knockdown in autophagy assays with wild-type STX12 and SNARE-domain or membrane-anchor mutants, measuring LC3 turnover, Atg5 puncta, and closed autophagosome formation.
  hypothesis: The autophagy phenotype depends on STX12 SNARE activity and membrane targeting rather than a scaffolding-only interaction.
- description: Define endogenous STX12-containing SNARE complexes during basal and induced autophagy using proximity labeling or immunoprecipitation under crosslinking conditions.
  hypothesis: STX12 uses a context-specific SNARE-partner set at phagophores that differs from its endosomal recycling complexes.
- description: Test whether STX12 perturbation changes ESCRT-III recruitment, persistence, or turnover at autophagy-related membranes after CHMP2B perturbation.
  hypothesis: STX12 modifies ESCRT-III-linked autophagy phenotypes indirectly through phagophore membrane traffic rather than by being an ESCRT-III complex component.
