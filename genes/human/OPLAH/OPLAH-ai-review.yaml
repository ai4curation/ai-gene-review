id: O14841
gene_symbol: OPLAH
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  OPLAH encodes 5-oxoprolinase (ATP-hydrolysing; EC 3.5.2.9; also called
  5-oxo-L-prolinase, 5-OPase or pyroglutamase), a large (1288 aa, ~137 kDa) cytosolic
  enzyme of the oxoprolinase family. It catalyzes the ATP-dependent ring-opening cleavage
  of 5-oxo-L-proline (pyroglutamate) to L-glutamate, coupled to hydrolysis of ATP to ADP
  and inorganic phosphate. This reaction is the step that closes the gamma-glutamyl cycle
  of glutathione turnover: 5-oxo-L-proline, generated from the gamma-glutamyl moiety of
  glutathione by gamma-glutamylcyclotransferase and CHAC enzymes, is reconverted to
  L-glutamate, regenerating substrate for glutathione resynthesis. OPLAH is a homodimer
  built from tandem hydantoinase-A/B domains. It is broadly expressed, with enhanced
  expression in testis and appreciable levels in heart. Loss of OPLAH function causes
  5-oxoprolinase deficiency (5-oxoprolinuria), typically a benign biochemical trait with
  excessive urinary 5-oxo-L-proline and, in some patients, urolithiasis; this is distinct
  from the more severe glutathione-synthetase deficiency form of pyroglutamic aciduria. By
  clearing 5-oxo-L-proline, OPLAH also limits oxidative stress in tissues such as the
  heart.
existing_annotations:
- term:
    id: GO:0006751
    label: glutathione catabolic process
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: involved_in
  review:
    summary: >-
      Phylogenetic (IBA) assignment of OPLAH to glutathione catabolism. OPLAH performs the
      5-oxoprolinase step of the gamma-glutamyl cycle, converting 5-oxo-L-proline (a
      glutathione breakdown product) to L-glutamate, so participation in glutathione
      turnover is correct. This is a core biological process for the gene.
    action: ACCEPT
    reason: >-
      The 5-oxoprolinase reaction regenerates glutamate from the pyroglutamate produced
      during glutathione breakdown, placing OPLAH in the glutathione catabolic/gamma-glutamyl
      cycle. Consistent with the UniProt FUNCTION statement and the enzyme's role in the cycle.
    supported_by:
    - reference_id: file:human/OPLAH/OPLAH-uniprot.txt
      supporting_text: Catalyzes the cleavage of 5-oxo-L-proline to form L-glutamate
