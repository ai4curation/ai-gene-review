core_functions:
- description: >-
    5-oxoprolinase (ATP-hydrolysing) activity: OPLAH catalyzes the ATP-dependent ring-opening
    cleavage of 5-oxo-L-proline (pyroglutamate) to L-glutamate, coupled to hydrolysis of ATP to
    ADP and inorganic phosphate. This step closes the cytosolic gamma-glutamyl cycle by
    regenerating glutamate for glutathione resynthesis.
