proposed_new_terms: []
suggested_questions:
- question: >-
    Do the HuRI-reported OPLAH interactions with POU6F2 (transcription factor) and TPK1
    (thiamine pyrophosphokinase) reflect any physiological relationship, or are they
    high-throughput Y2H artifacts unrelated to 5-oxoprolinase function?
- question: >-
    Is the cardioprotective, anti-oxidative-stress role of OPLAH (via clearance of 5-oxoproline)
    mechanistically distinct from its housekeeping role in the gamma-glutamyl cycle, and should it
    be captured with a regulation-of-oxidative-stress process term?
suggested_experiments:
- description: >-
    Quantify 5-oxo-L-proline and L-glutamate flux in OPLAH-null vs wild-type human cells under
    glutathione-cycling load to confirm the gamma-glutamyl cycle role and measure the contribution
    to glutathione resynthesis.
- description: >-
    Structurally and biochemically test ATP/ADP occupancy and the ATPase-coupled ring-opening
    mechanism of human OPLAH to define the ATP-binding site and catalytic residues.
