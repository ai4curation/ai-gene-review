id: Q8NEZ2
gene_symbol: VPS37A
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: VPS37A is a VPS37-family ESCRT-I subunit that complexes with TSG101, VPS28, and MVB12/UBAP-family
  subunits. It supports ubiquitin-dependent endosomal cargo sorting into multivesicular bodies and has a 
  directly tested PN-relevant role in phagophore closure, where its PUEV-containing N terminus recruits ESCRT 
  machinery for autophagosome completion.
alternative_products:
