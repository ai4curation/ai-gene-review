    family) that translocates the C-terminal tail of the newly synthesised core subunit
    MT-CO2 (COX2) across the inner membrane from the matrix side, acting after COX20-
    mediated stabilisation and before SCO1/SCO2/COA6 copper metallation, and is thereby
    required for cytochrome c oxidase (respiratory chain complex IV) assembly.
