id: Q8N8Q8
gene_symbol: COX18
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: COX18 (cytochrome c oxidase assembly protein 18, mitochondrial; also known
  as OXA1L2) is a mitochondrial inner-membrane protein insertase of the OXA1/ALB3/YidC
  family. It mediates translocation of the C-terminal tail (containing the apo-CuA site)
  of the newly synthesised, mitochondrially encoded cytochrome c oxidase core subunit
  MT-CO2 (COX2) across the mitochondrial inner membrane. COX18 acts within the MT-CO2
  maturation module, working together with COX20 (which first stabilises nascent MT-CO2)
  and preceding the SCO1/SCO2/COA6 copper-metallation step, and is required for assembly
  and stability of respiratory chain complex IV (cytochrome c oxidase). It is a multi-pass
  inner-membrane protein with three transmembrane helices. Loss of function reduces complex
  IV assembly and activity and causes autosomal recessive mitochondrial complex IV
  deficiency, with disease presentations ranging from neonatal encephalo-cardio-myopathy
  to an axonal peripheral neuropathy (Charcot-Marie-Tooth type 2MM).
