existing_annotations:
- term:
    id: GO:0005515
    label: protein binding
  evidence_type: IPI
  original_reference_id: PMID:25416956
  qualifier: enables
  review:
    summary: >-
      The three source GOA rows report CLHC1 binary interactions with LMO2, SGF29,
      and CEP170P1 from the proteome-scale human interactome map. These partner-level
      observations are useful interaction context, but the consolidated generic
      protein-binding term does not describe a specific CLHC1 molecular activity.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      GO:0005515 is too broad to represent a core molecular function. The three
      high-throughput partners do not define a coherent native complex or a more
      specific binding class, and no focused biochemical or physiological study
      establishes what CLHC1 does. The interaction observations should remain
      available at partner level, but no replacement GO molecular-function term is
      justified and no clathrin-coat or vesicle-trafficking activity should be
      inferred from the protein name/domain alone.
