proposed_new_terms: []
knowledge_gaps:
- gap_statement: >-
    CLHC1's direct molecular activity, physiological interaction partners or native
    complex, and the biological process in which it acts are undetermined.
  boundary: >-
    CLHC1 is an expressed 586-aa protein with defined domain architecture and three
    proteome-scale binary interaction calls, but these observations do not establish
    a specific activity or pathway.
  gap_kind:
  - BIOLOGY
  - CURATION
  dark_aspect: WHOLLY_DARK
  status: OPEN
  significance: >-
    Resolving this gap is necessary to replace the uninformative protein-binding
    annotation with a specific molecular function and to determine whether the
    ciliated-cell/testis expression pattern reflects a ciliary or reproductive role.
  resolution: >-
    Endogenous interaction mapping and loss-of-function/rescue studies in relevant
    human cell contexts, coupled to biochemical reconstitution of validated partners,
    would establish activity, complex membership, and process.
  provenance:
  - reference_id: file:human/CLHC1/CLHC1-notes.md
    supporting_text: >-
      No direct biochemical activity, physiological process, stable native complex,
      or functionally relevant cellular location has been established for CLHC1.
suggested_questions:
- question: >-
    Which of the LMO2, SGF29, and CEP170P1 binary interactions occur with endogenous
    CLHC1 in a physiological cell type, and do they define a stable complex?
- question: >-
    Does the ciliated-cell and early-spermatid expression pattern reflect a direct role
    in cilium or sperm-flagellum assembly/function, or only correlated expression?
- question: >-
    Does loss of the N-terminal 122 residues in isoform 2 alter CLHC1 localization,
    partner selection, stability, or biological activity?
suggested_experiments:
- hypothesis: >-
    CLHC1 forms a reproducible endogenous complex distinct from generic high-throughput
    binary-interaction noise.
  description: >-
    Endogenously tag CLHC1 in differentiated human airway epithelial cells and a
    testis-derived model, perform affinity purification-mass spectrometry and proximity
    labeling, and validate candidate interactions by reciprocal co-immunoprecipitation.
    Explicitly test LMO2, SGF29, and CEP170P1 and compare both CLHC1 isoforms.
  experiment_type: Endogenous interactome mapping and orthogonal interaction validation
- hypothesis: >-
    CLHC1 contributes to cilium or flagellum biogenesis/function in cell types where
    its transcript is enriched.
  description: >-
    Generate CLHC1 knockout and isoform-specific rescue lines in an air-liquid-interface
    multiciliated airway model and, where feasible, a human spermatid differentiation
    model. Quantify ciliogenesis, axoneme ultrastructure, ciliary beat, and relevant
    cell-differentiation phenotypes while controlling for general fitness effects.
  experiment_type: CRISPR loss-of-function and rescue phenotyping
- hypothesis: >-
    The reported centrosomal and nucleolar fibrillar-center localizations represent
    endogenous CLHC1 rather than antibody or overexpression artifacts.
  description: >-
    Compare endogenous knock-in fluorescent tagging, knockout-controlled antibody
    staining, and biochemical fractionation across ciliated and non-ciliated cells;
    follow CLHC1 through the cell cycle and ciliated-cell differentiation.
  experiment_type: Endogenous localization and reagent validation
