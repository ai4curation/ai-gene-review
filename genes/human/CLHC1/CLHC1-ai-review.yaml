description: >-
  CLHC1 is a 586-amino-acid, clathrin-heavy-chain-related protein containing
  TSNAXIP1_N, ARM-type-fold, and clathrin-heavy-chain-linker domain assignments
  plus a predicted coiled-coil. It is substantially shorter than canonical
  clathrin heavy chains and has not been shown to assemble clathrin coats or
  mediate vesicle trafficking. Two splice isoforms are documented, with isoform
  2 lacking the N-terminal 122 residues. Cell-atlas expression is enriched in
  early spermatids and clusters with ciliated-cell genes, while antibody imaging
  reports centrosomal and nucleolar fibrillar-center localization; these leads
  have not yet been tied to a physiological role. Proteome-scale binary-interaction
  mapping detected interactions with LMO2, SGF29, and CEP170P1, but CLHC1's
  molecular activity, native complex, and core biological process remain unknown.
