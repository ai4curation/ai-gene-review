    stereospecific alpha,beta-dehydrogenation of very-long-chain and long-chain acyl-CoA thioesters
    (C12-C24, e.g. palmitoyl-CoA), the first and committed step of each cycle of mitochondrial fatty
    acid beta-oxidation, transferring electrons to the electron-transfer flavoprotein (ETF).
  molecular_function:
    id: GO:0017099
    label: very-long-chain fatty acyl-CoA dehydrogenase activity
  directly_involved_in:
  - id: GO:0006635
    label: fatty acid beta-oxidation
