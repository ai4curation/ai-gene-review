id: P49748
gene_symbol: ACADVL
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  ACADVL encodes very-long-chain specific acyl-CoA dehydrogenase (VLCAD), a FAD-dependent
  flavoenzyme of the acyl-CoA dehydrogenase (ACAD) family that catalyzes the first and
  committed step of each cycle of mitochondrial fatty acid beta-oxidation. VLCAD performs
  the stereospecific alpha,beta-dehydrogenation of saturated and unsaturated acyl-CoA
  thioesters with primary chains of roughly 12 to 24 carbons (with optimal activity in the
  very-long-chain/long-chain range, e.g. palmitoyl-CoA, C16), producing the corresponding
  trans-2-enoyl-CoA and transferring electrons to the electron-transfer flavoprotein (ETF).
  Unlike the soluble matrix dehydrogenases MCAD, SCAD and LCAD, VLCAD is a homodimer of
  ~70 kDa subunits that is bound as a peripheral protein to the matrix face of the
  mitochondrial inner membrane; membrane association is required for assembly of the mature
  dimer. VLCAD is most highly expressed in heart and skeletal muscle, the tissues that depend
  on long-chain fat as a primary fuel. Loss of VLCAD activity causes very-long-chain acyl-CoA
  dehydrogenase deficiency, an inborn error of fatty acid oxidation presenting as hypertrophic
  cardiomyopathy and sudden death, hypoketotic hypoglycemia with hepatic involvement, or an
  adult-onset myopathy with exercise-induced rhabdomyolysis.
