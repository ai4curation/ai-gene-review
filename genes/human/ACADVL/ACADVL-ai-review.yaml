- id: PMID:16020546
  title: Human acyl-CoA dehydrogenase-9 plays a novel role in the mitochondrial beta-oxidation
    of unsaturated fatty acids.
  findings:
  - statement: >-
      Primarily characterizes the paralog ACAD9 (membrane-associated mitochondrial ACAD with
      long-chain activity). Used in GOA to support a mitochondrial-membrane localization annotation
      on ACADVL; VLCAD inner-membrane localization is independently established by PMID:9599005.
  reference_review:
    relevance: LOW
    correctness: MISCITED
    review_notes: >-
      This is the ACAD9 (Ensenauer 2005) paper; its membrane-fractionation data concern ACAD-9, not
      VLCAD. The mitochondrial-membrane term it is cited for is nonetheless correct for VLCAD on
      independent grounds, so the annotation was kept as non-core rather than removed.
- id: PMID:18063578
  title: The layered structure of human mitochondrial DNA nucleoids.
  findings:
  - statement: >-
      Mitochondrial-nucleoid proteomics. Metabolic enzymes including VLCAD co-purified with native
      nucleoids but did not cross-link to mtDNA, indicating peripheral co-purification rather than
      genuine nucleoid localization.
    supporting_text: >-
      Several other metabolic proteins and chaperones identified in native nucleoids, including
      ATAD3, were not observed to cross-link to mtDNA.
  reference_review:
    relevance: LOW
    correctness: MISCITED
    review_notes: >-
      Supports co-purification with nucleoid preparations but the paper itself states these
      metabolic proteins do not cross-link mtDNA; cited for a nucleoid-localization annotation that
      is best treated as an over-annotation.
- id: PMID:21237683
  title: Identification and characterization of new long chain acyl-CoA dehydrogenases.
  findings:
  - statement: >-
      Characterizes ACAD9/ACAD10/ACAD11 and assigns EC 1.3.8.9 (very-long-chain) for VLCAD via
      substrate characterization. Shows that in human cerebellum the long-chain FAO spectrum is
      covered by ACAD9/ACAD11 rather than VLCAD, indicating tissue-specific division of labor.
    supporting_text: >-
      The combination of ACAD11 with the newly characterized ACAD9 accommodates the full spectrum
      of long chain fatty acid substrates presented to mitochondrial β-oxidation in human cerebellum.
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified. Primarily about ACAD9/10/11 but provides the substrate-based EC 1.3.8.9
      assignment context for VLCAD and the tissue-distribution contrast.
- id: PMID:21492153
  title: Analysis of proteomic changes induced upon cellular differentiation of the
    human intestinal cell line Caco-2.
  findings:
  - statement: >-
      Caco-2 differentiation proteomics showing up-regulation of lipid-metabolism proteins
      (including VLCAD) during enterocyte differentiation. Provides only correlative expression
      data, not a functional role in differentiation.
    supporting_text: >-
      proteins involved in xenobiotic and drug metabolism as well as in lipid metabolism were
      upregulated upon cellular differentiation
  reference_review:
    relevance: LOW
    correctness: MISCITED
    review_notes: >-
      PubMed-verified screen, but it supports only a correlative expression change; cited for an
      epithelial-cell-differentiation IEP that over-states VLCAD's role.
- id: PMID:32296183
  title: A reference map of the human binary protein interactome.
  findings:
  - statement: >-
      HuRI binary (Y2H) interactome. Source of a single ACADVL-TAF1B interaction underlying a
      generic protein-binding annotation; no established biological relevance for VLCAD.
    supporting_text: >-
      a human 'all-by-all' reference interactome map of human binary protein interactions
  reference_review:
    relevance: LOW
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified high-throughput interactome. The cited interaction (with the Pol I factor
      TAF1B) is most plausibly a screening artifact for a mitochondrial inner-membrane enzyme;
      the "protein binding" annotation is uninformative.
- id: PMID:34800366
  title: Quantitative high-confidence human mitochondrial proteome and its dynamics
    in cellular context.
  findings:
  - statement: >-
      Defines a high-confidence human mitochondrial proteome (MitoCoP) in which VLCAD is included,
      corroborating its mitochondrial localization.
    supporting_text: >-
      Quantitative high-confidence human mitochondrial proteome and its dynamics
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified proteomics resource confirming VLCAD mitochondrial localization.
- id: PMID:7479827
  title: Molecular basis of human mitochondrial very-long-chain acyl-CoA dehydrogenase
    deficiency causing cardiomyopathy and sudden death in childhood.
  findings:
  - statement: >-
      VLCAD catalyzes the first step of beta-oxidation of long-chain fatty acids, the major energy
      source in heart; VLCAD deficiency reduces myocardial beta-oxidation and energy production and
      causes cardiomyopathy and sudden death.
    supporting_text: >-
      VLCAD deficiency reduces myocardial fatty acid beta-oxidation and energy production and is
      associated with cardiomyopathy and sudden death in childhood
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified. Establishes the energy-derivation/cardiac role and disease mechanism of VLCAD.
- id: PMID:7668252
  title: Cloning of human very-long-chain acyl-coenzyme A dehydrogenase and molecular
    characterization of its deficiency in two patients.
  findings:
  - statement: >-
      Original cloning of human VLCAD (655 aa precursor; 40-aa leader peptide; 615-aa mature
      protein). Demonstrates that VLCAD deficiency impairs long-chain (palmitate) beta-oxidation and
      that restoring ~20% VLCAD activity restores palmitate beta-oxidation flux.
    supporting_text: >-
      raising VLCAD activity to approximately 20% of normal control fibroblast activity raised
      palmitic acid beta-oxidation flux to the level found in control fibroblasts
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified foundational VLCAD paper supporting its long-chain acyl-CoA dehydrogenase
      activity and FAO role.
- id: PMID:8466512
  title: A novel disease with deficiency of mitochondrial very-long-chain acyl-CoA
    dehydrogenase.
  findings:
  - statement: >-
      First identification of VLCAD deficiency as a distinct disease, based on very low
      palmitoyl-CoA (C16) dehydrogenase activity and loss of anti-VLCAD immunoreactivity in patients.
    supporting_text: >-
      found to have a novel disease, VLCAD deficiency, as judged from the results of very low
      palmitoyl-CoA dehydrogenase activity and the lack of immunoreactivity toward antibody raised
      to purified VLCAD
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified. Supports VLCAD long-chain acyl-CoA dehydrogenase activity via patient
      deficiency.
- id: PMID:9461620
  title: Catalytic and FAD-binding residues of mitochondrial very long chain acyl-coenzyme
    A dehydrogenase.
  findings:
  - statement: >-
      VLCAD is one of four flavoproteins catalyzing the initial step of mitochondrial beta-oxidation.
      Glu-422 is the catalytic base (E422Q abolishes activity by preventing the VLCAD-palmitoyl-CoA
      charge-transfer complex); Phe-418 is required for FAD binding/reduction and FAD loss
      destabilizes folding.
    supporting_text: >-
      Glu-422 of VLCAD has been presumed to be the catalytic residue that abstracts the alpha-proton
      in the alphabeta-dehydrogenation reaction. Replacing Glu-422 with glutamine (E422Q) caused a
      loss of enzyme activity
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified. Direct mechanistic evidence for VLCAD catalytic activity and FAD binding.
- id: PMID:9599005
  title: Very-long-chain acyl-CoA dehydrogenase subunit assembles to the dimer form
    on mitochondrial inner membrane.
  findings:
  - statement: >-
      Mature VLCAD is a homodimer of ~70 kDa subunits associated with the mitochondrial inner
      membrane; membrane association precedes and is required for dimer assembly. The monomeric
      mutant S583W fails to bind the membrane and remains soluble in the matrix.
    supporting_text: >-
      association of VLCAD protein with mitochondrial inner membrane is necessary for dimer assembly
      and formation of mature VLCAD
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified. Establishes VLCAD homodimerization and inner-membrane localization.
