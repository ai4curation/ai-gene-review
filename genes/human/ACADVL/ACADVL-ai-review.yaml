# --- Annotation 1: VLCAD activity (IBA) ---
- term:
    id: GO:0017099
    label: very-long-chain fatty acyl-CoA dehydrogenase activity
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: enables
  review:
    summary: >-
      Phylogenetically inferred very-long-chain acyl-CoA dehydrogenase activity. This is the
      defining catalytic activity of VLCAD (EC 1.3.8.9) and is directly demonstrated for the
      human protein, so the IBA annotation is appropriate and captures the core molecular function.
    action: ACCEPT
    reason: >-
      VLCAD acts specifically on fatty acyl-CoAs with 12-24 carbon chains, with the very-long-chain
      activity directly demonstrated (PMID:9461620, EC 1.3.8.9 assigned via PMID:21237683). The
      phylogenetic inference at this specific level is well supported.
    supported_by:
    - reference_id: PMID:9461620
      supporting_text: "Very long-chain acyl-CoA dehydrogenase (VLCAD) is one of four flavoproteins which catalyze the initial step of the mitochondrial beta-oxidation spiral"
# --- Annotation 2: fatty-acyl-CoA binding (IBA) ---
- term:
    id: GO:0000062
    label: fatty-acyl-CoA binding
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: enables
  review:
    summary: >-
      Phylogenetically inferred binding of the acyl-CoA substrate. VLCAD necessarily binds
      fatty-acyl-CoA substrates to perform dehydrogenation; the formation of a charge-transfer
      complex between VLCAD and palmitoyl-CoA has been observed (PMID:9461620). This is a correct
      but ancillary (substrate-binding) annotation.
    action: KEEP_AS_NON_CORE
    reason: >-
      Substrate binding is a prerequisite of the catalytic activity rather than a separate core
      function; the catalytic dehydrogenase terms better represent VLCAD's role. The binding itself
      is supported by the observed VLCAD-palmitoyl-CoA charge-transfer complex (PMID:9461620).
    supported_by:
    - reference_id: PMID:9461620
      supporting_text: "preventing the formation of a charge transfer complex between VLCAD and palmitoyl-CoA"
