proposed_new_terms: []
suggested_questions:
- question: >-
    Several whole-organism regulatory annotations on human ACADVL (temperature homeostasis,
    regulation of cholesterol metabolism, negative regulation of fatty acid biosynthesis/oxidation)
    were transferred by ortholog/sequence similarity from mouse P50544, which is LCAD (Acadl), not a
    VLCAD ortholog. Should these be reassigned to ACADL and removed from ACADVL?
- question: >-
    What is the precise topology and functional consequence of VLCAD's inner-membrane association?
    Does membrane binding contribute to substrate channeling from the carnitine shuttle/CPT system,
    beyond its established requirement for dimer assembly?
suggested_experiments:
- description: >-
    Determine the in-vivo substrate-chain-length profile of human VLCAD across heart, skeletal
    muscle, liver and brain using stable-isotope acylcarnitine flux assays in tissue-specific
    knockdown models, to define where VLCAD versus ACAD9/ACAD11/LCAD dominates long-chain FAO.
  hypothesis: >-
    VLCAD is the principal long-chain acyl-CoA dehydrogenase in heart and skeletal muscle, whereas
    ACAD9/ACAD11 dominate in brain, explaining the cardiac/muscle-restricted disease phenotype.
- description: >-
    Reconstitute VLCAD with ETF and test whether inner-membrane association modulates electron
    transfer efficiency to ETF/ETF-QO, comparing membrane-bound dimer to the soluble monomeric
    S583W mutant.
  hypothesis: >-
    Membrane-associated VLCAD dimers couple more efficiently to ETF-dependent electron transfer than
    the assembly-defective monomeric mutant, linking quaternary/membrane state to catalytic output.
