# --- Annotation 11: medium-chain acyl-CoA dehydrogenase activity (IEA, RHEA) ---
- term:
    id: GO:0070991
    label: medium-chain fatty acyl-CoA dehydrogenase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000116
  qualifier: enables
  review:
    summary: >-
      Electronic annotation from Rhea mapping, derived from in-vitro reactions on shorter
      (dodecanoyl/decadienoyl, C10-C12) acyl-CoA substrates listed in UniProt. VLCAD's physiological
      specificity is for long- and very-long-chain substrates; medium-chain activity is a minor
      in-vitro property and is the dedicated role of MCAD in vivo.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      Assigning a medium-chain ACAD activity to VLCAD over-states its specificity. VLCAD "acts
      specifically on fatty acyl-CoAs with saturated 12 to 24 carbons long primary chains" (UniProt
      FUNCTION); medium-chain oxidation is physiologically handled by MCAD. The Rhea-derived term
      reflects catalytic promiscuity at chain-length boundaries rather than a genuine medium-chain role.
    supported_by:
    - reference_id: PMID:21237683
      supporting_text: "Identification and characterization of new long chain acyl-CoA dehydrogenases"
