- id: PMID:25778398
  title: The Proapoptotic F-box Protein Fbxl7 Regulates Mitochondrial Function by Mediating the Ubiquitylation and Proteasomal Degradation of Survivin.
  findings:
  - statement: FBXL7, a component of the SCF (SKP1-CUL1-F-box) E3 ligase that regulates mitotic progression, mediates polyubiquitylation (at survivin Lys90/Lys91, via FBXL7 contact with survivin Glu126) and proteasomal degradation of survivin/BIRC5, regulating mitochondrial function.
