id: Q9UJT9
gene_symbol: FBXL7
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  FBXL7 (F-box/LRR-repeat protein 7) is the substrate-recognition (F-box)
  subunit of an SCF (SKP1-CUL1-RBX1-F-box) cullin-RING E3 ubiquitin ligase that
  controls mitotic progression and apoptosis by directing the ubiquitination and
  proteasomal degradation of mitotic regulators. Within the SCF(FBXL7) complex,
  FBXL7 binds SKP1 via its F-box domain and uses its leucine-rich repeats to
  recruit substrates, so that CUL1-RBX1 drives their polyubiquitination. Its
  best-characterized substrates are the mitotic kinase Aurora A (AURKA), which
  FBXL7 targets during mitosis to promote mitotic arrest, and the inhibitor-of-
  apoptosis protein survivin/BIRC5, whose FBXL7-mediated degradation regulates
  mitochondrial function and promotes apoptosis. FBXL7 localizes to the
  centrosome during spindle formation. FBXL7 is itself a proapoptotic factor
  whose cellular abundance is controlled by the related F-box protein FBXL18,
  which ubiquitinates FBXL7 (at Lys109) for proteasomal degradation. Through
  these activities FBXL7 contributes to the G2/M transition, spindle dynamics,
  and apoptotic signaling, and is implicated in cancer drug resistance.
