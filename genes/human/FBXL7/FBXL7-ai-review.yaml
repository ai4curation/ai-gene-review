suggested_questions:
- question: Are the two best-described FBXL7 substrates (AURKA and survivin/BIRC5) targeted by the same FBXL7 pool and cell-cycle window, or do distinct localizations (centrosomal versus cytosolic) and timing govern each substrate?
- question: How does the FBXL18-FBXL7 regulatory axis controlling FBXL7 abundance influence the balance between mitotic progression and apoptosis, and is it dysregulated in cancers with AURKA/survivin overexpression?
suggested_experiments:
- description: Reconstitute SCF(FBXL7)-mediated ubiquitination of AURKA and of survivin/BIRC5 in vitro with purified SKP1, CUL1, RBX1, an E2, and wild-type versus substrate-binding-mutant FBXL7 to map substrate lysine sites and confirm direct, SCF-dependent polyubiquitination.
- description: Perform synchronized cell-cycle proteomics and live-cell imaging in FBXL7-knockout versus wild-type cells to quantify AURKA and survivin turnover across mitosis, define FBXL7's centrosomal localization dynamics, and test the apoptotic consequences of substrate stabilization.
