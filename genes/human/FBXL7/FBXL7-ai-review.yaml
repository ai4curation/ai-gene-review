  title: F-box protein Fbxl18 mediates polyubiquitylation and proteasomal degradation of the pro-apoptotic SCF subunit Fbxl7.
  findings:
  - statement: FBXL7 is a proapoptotic SCF subunit that induces mitotic arrest; its abundance is controlled by FBXL18, which ubiquitinates FBXL7 (at Lys109, via an FQ recognition motif) for proteasomal degradation, thereby limiting FBXL7-driven apoptosis.
    reference_section_type: ABSTRACT
  reference_review:
