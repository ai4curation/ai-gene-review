- term:
    id: GO:0046872
    label: metal ion binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000043
  review:
    summary: >-
      PPP2CB requires two Mn2+ ions at its active site for catalytic
      activity. Metal ion binding is inherent to its phosphatase mechanism.
      This annotation is present in UniProt GO lines but was not in the
      GOA TSV extract; adding as it appears in UniProt.
    action: NEW
    reason: >-
      PPP2CB uses a bimetallic Mn2+ active site for catalysis. UniProt lists
      multiple Mn2+ binding sites (residues 57, 59, 85, 117, 167, 241) and
      includes metal ion binding as a GO annotation. This is a core aspect
      of the catalytic mechanism.
