- term:
    id: GO:0016787
    label: hydrolase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: >-
      IEA from InterPro domain mapping. Hydrolase activity is correct but too
      general for a protein whose specific phosphatase activity is well
      characterized. The more specific GO:0004722 annotations exist.
    action: ACCEPT
    reason: >-
      While very broad, hydrolase activity is technically correct as a parent
      of phosphatase activity. The more specific GO:0004722 annotations also
      exist. This IEA is acceptable as a domain-based annotation even though
      more informative terms are present.
- term:
