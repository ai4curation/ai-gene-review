- term:
    id: GO:0048156
    label: tau protein binding
  evidence_type: NAS
  original_reference_id: PMID:28386764
  review:
    summary: >-
      NAS annotation based on a comprehensive review of tau protein roles in
      health and disease. PP2A is well established as the major tau
      phosphatase, which implies physical binding to tau.
    action: KEEP_AS_NON_CORE
    reason: >-
      PP2A does bind and dephosphorylate tau protein, but this is primarily
      documented for PP2A holoenzymes in brain (likely predominantly
      PPP2CA-containing). The NAS evidence from a review article is weak.
      Tau binding is a substrate interaction for PP2A rather than a core
      binding function. Keeping as non-core given that PP2A-tau interaction
      is well established in the broader literature.
    supported_by:
      - reference_id: PMID:28386764
        supporting_text: "Tau is well established as a microtubule-associated protein in neurons"
      - reference_id: PMID:16262633
        supporting_text: "PP2A is the major tau phosphatase that regulates its phosphorylation at multiple sites in human brain"
