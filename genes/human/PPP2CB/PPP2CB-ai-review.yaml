- term:
    id: GO:0010629
    label: negative regulation of gene expression
  evidence_type: IMP
  original_reference_id: PMID:28159925
  review:
    summary: >-
      IMP annotation showing PPP2CB is involved in negative regulation of
      gene expression, based on the same miR-1246 study in MSCs.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      Same concern as the IGI annotation above. The term is too broad. The
      evidence shows PPP2CB normally suppresses inflammatory gene expression
      in MSCs, but this is a very general biological process annotation that
      does not capture specificity. The NF-kappaB annotation (GO:0043124)
      is more specific and informative.
    supported_by:
