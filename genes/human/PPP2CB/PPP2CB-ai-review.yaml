        supporting_text: "knock-down of PPP2CB significantly decreased releases of IL-6 and CCL2"
- term:
    id: GO:0010804
    label: negative regulation of tumor necrosis factor-mediated signaling pathway
  evidence_type: IGI
  original_reference_id: PMID:28159925
  review:
    summary: >-
      IGI annotation showing PPP2CB acts upstream of negative regulation of
      TNF-mediated signaling. Based on the miR-1246 study where PPP2CB
      knockdown combined with TNFalpha enhances inflammatory responses.
    action: KEEP_AS_NON_CORE
    reason: >-
      The evidence supports that PPP2CB negatively regulates TNF-mediated
      signaling in MSCs. PPP2CB knockdown released negative feedback on
      IL-6 transcription after TNFalpha stimulation. However, this is a
      context-dependent effect in MSCs and represents a non-core function.
    supported_by:
      - reference_id: PMID:28159925
        supporting_text: "knock-down of PPP2CB in combination with TNFalpha stimulation phenocopied the miR-1246-enhanced transcriptional response of IL-6 in combination with TNFalpha"
