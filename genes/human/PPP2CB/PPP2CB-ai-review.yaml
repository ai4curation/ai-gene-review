id: P62714
gene_symbol: PPP2CB
product_type: PROTEIN
status: IN_PROGRESS
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  PPP2CB encodes the beta isoform of the catalytic subunit of protein phosphatase
  2A (PP2A), a major serine/threonine phosphatase (EC 3.1.3.16). PP2Acbeta is the
  minor catalytic isoform (~97% identical to the alpha isoform PPP2CA, which is ~10x
  more abundant). The catalytic subunit uses a bimetallic Mn2+ active site to
  dephosphorylate phosphoserine and phosphothreonine residues on protein substrates.
  PP2A functions as a heterotrimeric holoenzyme consisting of a scaffold A subunit,
  catalytic C subunit, and one of many regulatory B subunits that confer substrate
  specificity and subcellular localization. Combinatorial assembly of subunit
  isoforms generates >70 distinct PP2A holoenzymes. PP2Acbeta is predominantly
  cytoplasmic and nuclear, and is also a component of the STRIPAK complex.
  C-terminal Leu-309 methylation by LCMT1 (reversed by PME-1) is a key regulatory
  mechanism controlling B subunit selection and holoenzyme assembly. PP2A opposes
  kinase signaling in numerous pathways including cell cycle, Wnt/beta-catenin,
  Ras/MAPK, NF-kappaB, and PI3K/Akt, and is a major regulator of tau
  phosphorylation in brain.
existing_annotations:
- term:
    id: GO:0004722
    label: protein serine/threonine phosphatase activity
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      PPP2CB is a well-established serine/threonine phosphoprotein phosphatase.
      This is the core molecular function of the protein, supported by extensive
      biochemical evidence and phylogenetic analysis across eukaryotes. The IBA
      annotation is well supported by broad phylogenetic conservation.
    action: ACCEPT
    reason: >-
      This is the defining molecular function of PPP2CB. The protein catalyzes
      dephosphorylation of phosphoserine and phosphothreonine residues using a
      bimetallic active site. Supported by UniProt EC 3.1.3.16 assignment, deep
      research review, and phylogenetic inference.
    supported_by:
      - reference_id: PMID:8206937
        supporting_text: "Methylation of PP2Ac subunit, in vitro, increases its activity toward both phosphorylase a and a phosphopeptide."
      - reference_id: PMID:2849765
        supporting_text: "The nucleotide sequence of the cDNA encoding the human lung protein phosphatase 2A beta catalytic subunit."
- term:
    id: GO:0000278
    label: mitotic cell cycle
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      PP2A holoenzymes (with B55 and B56 regulatory subunits) play essential
      roles in mitotic cell cycle regulation, opposing CDK-mediated
      phosphorylation during cell cycle transitions. The IBA annotation is
      phylogenetically well-supported.
    action: ACCEPT
    reason: >-
      PP2A is a central regulator of mitotic cell cycle progression. PP2A-B55
      and PP2A-B56 are required for mitotic exit, opposing CDK substrates.
      UniProt lists roles in kinetochore/centromere and spindle pole
      localization during mitosis. The phylogenetic inference is appropriate.
    supported_by:
      - reference_id: PMID:27880917
        supporting_text: "complementary affinity purification and proximity-based interaction proteomics approaches to generate a physical interactome for 140 human proteins harboring phosphatase catalytic domains"
- term:
    id: GO:0005829
    label: cytosol
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      PPP2CB is active in the cytosol, consistent with its role as a major
      cytoplasmic phosphatase. The IBA annotation is well supported by both
      phylogenetic evidence and experimental localization data.
    action: ACCEPT
    reason: >-
      Cytosolic localization of PP2A catalytic subunits is well established.
      UniProt lists cytoplasm as a subcellular location for PPP2CB. Reactome
      pathways also place PPP2CB in cytosol for various signaling events.
    supported_by:
      - reference_id: PMID:16541025
        supporting_text: "PP2A colocalizes with shugoshin at centromeres and is required for centromeric protection."
- term:
    id: GO:0000775
    label: chromosome, centromeric region
  evidence_type: IEA
  original_reference_id: GO_REF:0000044
  review:
    summary: >-
      IEA annotation derived from UniProt subcellular location vocabulary.
      UniProt cites PMID:16541025 (Kitajima et al. 2006) showing PP2A localizes
      to centromeres in prometaphase cells via interaction with SGO1.
    action: ACCEPT
    reason: >-
      The localization is experimentally supported. UniProt states:
      "In prometaphase cells, but not in anaphase cells, localizes at
      centromeres." This is based on PMID:16541025 which directly demonstrated
      PP2A-SGO1 interaction at centromeres.
    supported_by:
      - reference_id: PMID:16541025
        supporting_text: "a specific subtype of serine/threonine protein phosphatase 2A (PP2A) associating with human shugoshin. PP2A colocalizes with shugoshin at centromeres"
- term:
