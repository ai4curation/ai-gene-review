- term:
    id: GO:0004721
    label: phosphoprotein phosphatase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000107
  review:
    summary: >-
      IEA from Ensembl Compara. Phosphoprotein phosphatase activity is a
      parent term of protein serine/threonine phosphatase activity
      (GO:0004722). Correct but less specific than GO:0004722.
    action: ACCEPT
    reason: >-
      Technically correct as PPP2CB does have phosphoprotein phosphatase
      activity. More specific GO:0004722 annotations are also present. This
      broader IEA is acceptable.
- term:
    id: GO:0010288
    label: response to lead ion
  evidence_type: IEA
  original_reference_id: GO_REF:0000107
  review:
    summary: >-
      IEA transferred from rat PPP2CB (P62716) via Ensembl Compara. Based on
      rat studies showing PP2A activity is affected by lead exposure. Duplicate
      with ISS annotation below.
    action: KEEP_AS_NON_CORE
    reason: >-
      Response to lead ion is not a core function of PPP2CB. Lead ions can
      inhibit PP2A activity (as they affect many metalloenzymes), but this is
      a toxicological response rather than a primary biological function.
      Keeping as non-core given the supporting evidence from rat studies.
- term:
    id: GO:0031113
    label: regulation of microtubule polymerization
  evidence_type: IEA
  original_reference_id: GO_REF:0000107
  review:
    summary: >-
      IEA transferred from rat PPP2CB via Ensembl Compara. PP2A regulates
      microtubule dynamics through dephosphorylation of MAPs (MAP1b, MAP2, tau).
      This is consistent with PP2A's role in cytoskeletal regulation.
    action: KEEP_AS_NON_CORE
    reason: >-
      PP2A regulates microtubule polymerization indirectly by dephosphorylating
      microtubule-associated proteins. PMID:10640627 showed PP2A regulates
      MAP1b and MAP2 phosphorylation and their microtubule binding activity.
      This is a downstream consequence of PP2A phosphatase activity rather
      than a core function of PPP2CB specifically.
    supported_by:
      - reference_id: PMID:10640627
        supporting_text: "The inhibition of PP2A, and to a lesser extent of PP2B, was found to induce an increased phosphorylation of MAP1b and inhibit its microtubule binding activity"
- term:
    id: GO:0044325
    label: transmembrane transporter binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000107
  review:
    summary: >-
      IEA transferred from rat PPP2CB via Ensembl Compara. PP2A interacts
      with various membrane transporters and channels to regulate their
      phosphorylation state. Limited direct evidence for PPP2CB specifically.
    action: UNDECIDED
    reason: >-
      The evidence for transmembrane transporter binding is based on
      computational transfer from rat. While PP2A can regulate transporter
      phosphorylation, the specificity and directness of a binding interaction
      is not well documented for PPP2CB specifically. Unable to verify the
      original rat experimental evidence.
- term:
    id: GO:0046580
    label: negative regulation of Ras protein signal transduction
  evidence_type: IEA
  original_reference_id: GO_REF:0000107
  review:
    summary: >-
      IEA transferred from rat PPP2CB via Ensembl Compara. PP2A
      dephosphorylates components of the Ras/MAPK pathway, acting as a
      negative regulator. This is well established for PP2A holoenzymes
      generally.
    action: KEEP_AS_NON_CORE
    reason: >-
      PP2A is well established as a negative regulator of Ras/MAPK signaling,
      including dephosphorylation of RAF and ERK pathway components. However,
      this represents one of many PP2A-regulated pathways and is driven by
      specific B subunit combinations rather than PPP2CB specifically. Deep
      research review confirms PP2A antagonizes Ras/MAPK signaling.
- term:
    id: GO:0005654
    label: nucleoplasm
  evidence_type: IDA
  original_reference_id: GO_REF:0000052
  review:
    summary: >-
      IDA from HPA immunofluorescence data. PPP2CB was detected in
      nucleoplasm by immunofluorescence. Consistent with UniProt subcellular
      location annotation showing nuclear localization.
    action: ACCEPT
    reason: >-
      Nucleoplasm localization is experimentally supported by HPA
      immunofluorescence and consistent with UniProt subcellular location
      showing nuclear localization (PMID:16541025). Deep research also
      describes PPP2CB as predominantly cytoplasmic and nuclear.
- term:
    id: GO:1902996
    label: regulation of neurofibrillary tangle assembly
  evidence_type: TAS
  original_reference_id: PMID:16262633
  review:
    summary: >-
      TAS annotation based on a study showing PP2A is the major tau
      phosphatase in human brain (~71% of total tau phosphatase activity),
      and PP2A activity is decreased in AD brain, correlating with tau
      hyperphosphorylation and neurofibrillary tangle formation.
    action: KEEP_AS_NON_CORE
    reason: >-
      While PP2A is clearly the major tau phosphatase, this represents a
      downstream physiological consequence of PP2A phosphatase activity in
      brain rather than a core function of PPP2CB. Additionally, the study
      used PP2A generally (likely predominantly PPP2CA given its higher
      expression in brain). The annotation is not wrong but represents a
      non-core, tissue-specific function.
    supported_by:
      - reference_id: PMID:16262633
        supporting_text: "PP2A, PP1, PP5 and PP2B accounted for approximately 71%, approximately 11%, approximately 10% and approximately 7%, respectively, of the total tau phosphatase activity of human brain"
- term:
    id: GO:0043124
    label: negative regulation of canonical NF-kappaB signal transduction
  evidence_type: IGI
  original_reference_id: PMID:28159925
  review:
    summary: >-
      IGI annotation from a study showing miR-1246 directly targets PPP2CB,
      and PPP2CB knockdown increases p65/NF-kappaB levels in MSCs. The IGI
      evidence is based on interaction with RELA/p65 (Q04206).
    action: KEEP_AS_NON_CORE
    reason: >-
      The study provides evidence that PPP2CB negatively regulates NF-kappaB
      signaling, but in a specific cellular context (MSCs in tumor
      microenvironment). PPP2CB knockdown increased RELA expression and total
      p65 levels but did not directly increase phospho-p65. The effect on
      pro-inflammatory cytokines required additional TNFalpha stimulation.
      This represents a non-core, context-dependent function.
    supported_by:
      - reference_id: PMID:28159925
        supporting_text: "Knock-down of PPP2CB significantly increased RELA expression"
      - reference_id: PMID:28159925
        supporting_text: "knock-down of either PRKAR1A or PPP2CB led to a significant up-regulation of total p65 in MSCs whereas phosphorylation of p65 at Ser536 remained unaffected"
- term:
    id: GO:0090443
    label: FAR/SIN/STRIPAK complex
  evidence_type: IDA
  original_reference_id: PMID:18782753
  review:
    summary: >-
      IDA annotation showing PPP2CB is part of the STRIPAK complex, based
      on iterative affinity purification/mass spectrometry in human cells.
      The study defined the STRIPAK complex and identified PPP2CB as a core
      component.
    action: ACCEPT
    reason: >-
      Well-supported experimental evidence. The study used iterative AP-MS
      to identify PPP2CB in the STRIPAK complex, which contains PP2A
      catalytic and scaffolding subunits, striatins, MOB4, STRIP1/2, PDCD10,
      and STE20 kinases. This is a core complex for PPP2CB function.
    supported_by:
      - reference_id: PMID:18782753
        supporting_text: "STRIPAK contains the PP2A catalytic (PP2Ac) and scaffolding (PP2A A) subunits, the striatins (PP2A regulatory B''' subunits), the striatin-associated protein Mob3, the novel proteins STRIP1 and STRIP2"
- term:
    id: GO:0010629
    label: negative regulation of gene expression
  evidence_type: IGI
  original_reference_id: PMID:28159925
  review:
    summary: >-
      IGI annotation (with TNFalpha P01375) showing PPP2CB acts upstream of
      negative regulation of gene expression. Based on the miR-1246/PPP2CB
      study in MSCs where PPP2CB knockdown combined with TNFalpha enhanced
      expression of pro-inflammatory genes.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      This annotation is overly broad. The study showed PPP2CB knockdown
      combined with TNFalpha increases IL-6, CCL2, CCL5 transcription in
      MSCs. This means PPP2CB normally negatively regulates expression of
      these specific inflammatory genes, but the term "negative regulation
      of gene expression" is too generic. Additionally, the qualifier is
      acts_upstream_of rather than involved_in, indicating indirect effects.
    supported_by:
      - reference_id: PMID:28159925
