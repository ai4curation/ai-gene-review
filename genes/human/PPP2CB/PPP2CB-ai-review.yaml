- term:
    id: GO:0005515
    label: protein binding
  evidence_type: IPI
  original_reference_id: PMID:10698523
  review:
    summary: >-
      IPI based on interaction with AXIN2 (Q9Y2T1). The study showed PP2A
      complexed with Axin dephosphorylates APC in Wnt signaling. The
      interaction is functionally meaningful (Wnt pathway regulation) but
      annotated as generic protein binding.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      Protein binding is uninformative. The interaction with AXIN2 reflects
      PP2A recruitment to the beta-catenin destruction complex. A more
      informative annotation would capture the specific functional context
      (e.g., phosphatase activity in the Wnt pathway), but that is a BP
      annotation, not MF. The IPI evidence does not support a more specific
      MF term than protein binding.
    supported_by:
      - reference_id: PMID:10698523
        supporting_text: "the heterodimeric form of protein phosphatase 2A (PP2A) directly bound to Axin, and PP2A complexed with Axin dephosphorylated APC phosphorylated by GSK-3beta"
