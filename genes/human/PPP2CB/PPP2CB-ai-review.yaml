core_functions:
- molecular_function:
    id: GO:0004722
    label: protein serine/threonine phosphatase activity
  description: >-
    PPP2CB is the beta catalytic subunit of PP2A, a major cellular Ser/Thr phosphatase
    (EC 3.1.3.16). It dephosphorylates phosphoserine and phosphothreonine residues on
    protein substrates using a bimetallic Mn2+ active site. PPP2CB functions as the
    catalytic engine of heterotrimeric PP2A holoenzymes (A scaffold + C catalytic + B
    regulatory subunit). Substrate specificity is determined by the regulatory B subunit
    incorporated into the holoenzyme. PPP2CB is the minor catalytic isoform (~97%
    identical to PPP2CA but ~10x less abundant), and is predominantly cytoplasmic and
    nuclear. C-terminal Leu-309 methylation by LCMT1 (reversed by PME-1) regulates
    holoenzyme assembly and B subunit selection.
  directly_involved_in:
    - id: GO:0006470
      label: protein dephosphorylation
    - id: GO:0000278
      label: mitotic cell cycle
  locations:
    - id: GO:0005829
      label: cytosol
    - id: GO:0005654
      label: nucleoplasm
  in_complex:
    id: GO:0000159
    label: protein phosphatase type 2A complex
  supported_by:
    - reference_id: PMID:8206937
      supporting_text: >-
        Methylation of PP2Ac subunit, in vitro, increases its activity toward both
        phosphorylase a and a phosphopeptide.
    - reference_id: PMID:2849765
      supporting_text: >-
        The nucleotide sequence of the cDNA encoding the human lung protein phosphatase
        2A beta catalytic subunit.
    - reference_id: PMID:16262633
      supporting_text: >-
        PP2A accounted for approximately 71% of the total tau phosphatase activity of
        human brain.
- molecular_function:
    id: GO:0004722
    label: protein serine/threonine phosphatase activity
  description: >-
    PPP2CB functions as the catalytic subunit within the STRIPAK complex
    (FAR/SIN/STRIPAK complex), a large signaling assembly that includes PP2A catalytic
    and scaffolding subunits, striatins (B''' regulatory subunits), MOB4, STRIP1/2,
    PDCD10/CCM3, and germinal center kinase III family STE20 kinases. In this context,
    PPP2CB provides phosphatase activity that opposes the kinase activities within the
    complex, regulating cell migration, polarity, and cerebral cavernous malformation
    signaling.
  directly_involved_in:
    - id: GO:0006470
      label: protein dephosphorylation
  locations:
    - id: GO:0005829
      label: cytosol
  in_complex:
    id: GO:0090443
    label: FAR/SIN/STRIPAK complex
  supported_by:
    - reference_id: PMID:18782753
      supporting_text: >-
        STRIPAK contains the PP2A catalytic (PP2Ac) and scaffolding (PP2A A) subunits,
        the striatins (PP2A regulatory B''' subunits), the striatin-associated protein
        Mob3, the novel proteins STRIP1 and STRIP2, PDCD10, and members of the germinal
        center kinase III family of Ste20 kinases.
