id: Q14693
gene_symbol: LPIN1
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  LPIN1 encodes lipin-1, a Mg2+-dependent phosphatidate phosphatase (PAP1; EC 3.1.3.4) that
  catalyzes the penultimate step of glycerolipid synthesis, the dephosphorylation of phosphatidic
  acid (PA) to diacylglycerol (DAG) plus inorganic phosphate. DAG produced by lipin-1 is the
  shared precursor for triacylglycerol and for the glycerophospholipids phosphatidylcholine
  and phosphatidylethanolamine, so lipin-1 sits at a branch point controlling both neutral-lipid
  storage and membrane-phospholipid production. Lipin-1 belongs to the lipin family, has a
  haloacid dehalogenase (HAD)-like catalytic domain bearing the DxDxT motif, and is not an
  integral membrane protein; it is largely cytosolic and translocates onto the endoplasmic
  reticulum (and nuclear) membrane surface to act on its lipid substrate, with membrane association
  governed by its phosphorylation state (mTOR-dependent phosphorylation being inhibitory)
  and by KAT5/Tip60-mediated acetylation. Lipin-1 is bifunctional: beyond its enzymatic role
  it acts in the nucleus as a transcriptional coactivator/corepressor of lipid-metabolism
  genes, notably in the PGC-1alpha/PPARalpha regulatory pathway. It is most abundant in skeletal
  muscle and adipose tissue. Biallelic loss-of-function LPIN1 mutations cause recurrent acute
  myoglobinuria (severe childhood rhabdomyolysis), and in mouse the orthologous gene (fld)
  underlies lipodystrophy.
