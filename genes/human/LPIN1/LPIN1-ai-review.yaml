- id: PMID:11138012
  title: >-
    Lipodystrophy in the fld mouse results from mutation of a new gene encoding a nuclear
    protein, lipin.
  findings:
  - statement: >-
      Positional cloning identified Lpin1 (encoding lipin) as the fatty liver dystrophy (fld)
      gene; lipin is a nuclear protein required for normal adipose tissue development.
    reference_section_type: ABSTRACT
    supporting_text: The gene (Lpin1) encodes a novel nuclear protein which we have named
      lipin.
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: >-
      Founding discovery paper (mouse fld). Basis for the nucleus ISS annotation; about the
      mouse ortholog, so human annotations derived from it are by-similarity.
- id: PMID:18694939
  title: Temporal and spatial regulation of the phosphatidate phosphatases lipin 1 and 2.
  findings:
  - statement: >-
      Lipin 1 is the major cellular PAP1 enzyme (siRNA depletion removes ~86% of PAP1 activity);
      lipin 1 is predominantly cytosolic; PAP1 activity is inhibited by mitotic phosphorylation.
    reference_section_type: RESULTS
    supporting_text: >-
      lipin 1-depleted extracts show an 86% reduction in the total cellular PAP1 activity,
      indicating that lipin 1 is the major PAP1 enzyme in these cells
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Full text available. Directly supports PAP activity and cytosolic localization of human
      lipin 1.
- id: PMID:20231281
  title: Characterization of the human LPIN1-encoded phosphatidate phosphatase isoforms.
  findings:
  - statement: >-
      Purified human lipin 1 alpha/beta/gamma isoforms are Mg2+/Mn2+-dependent PA phosphatases
      with defined kinetic parameters.
    reference_section_type: ABSTRACT
    supporting_text: >-
      PA phosphatase activities of the alpha, beta, and gamma isoforms were dependent on Mg(2+)
      or Mn(2+) ions at pH 7.5 at 37 degrees C.
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Definitive biochemical characterization of the human protein's PAP activity; cited by
      UniProt for CATALYTIC ACTIVITY and COFACTOR.
- id: PMID:23028044
  title: >-
    Cell autonomous lipin 1 function is essential for development and maintenance of white
    and brown adipose tissue.
  findings:
  - statement: >-
      Cell-autonomous lipin 1 is required for WAT and BAT development/maintenance; loss alters
      PPARalpha/PGC-1alpha/UCP1 expression and cold sensitivity.
    reference_section_type: ABSTRACT
    supporting_text: >-
      Loss of lipin 1 also affected BAT development and function, as revealed by histological
      changes, defects in the expression of peroxisome proliferator-activated receptor alpha
      (PPARalpha), PGC-1alpha, and UCP1, and functionally by altered cold sensitivity.
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: >-
      Mouse study; basis for the ISS positive-regulation-of-cold-induced-thermogenesis annotation.
- id: PMID:23426360
  title: >-
    Phosphorylation of lipin 1 and charge on the phosphatidic acid head group control its
    phosphatidic acid phosphatase activity and membrane association.
  findings:
  - statement: >-
      Lipin 1 is a Mg2+-dependent PA phosphatase whose membrane association and activity are
      controlled by phosphorylation (mTOR) and PA head-group charge; lipins are soluble proteins
      that translocate to membranes to act.
    reference_section_type: ABSTRACT
    supporting_text: >-
      lipins are not integral membrane proteins, and they need to translocate from the cytosol
      to intracellular membranes to participate in glycerolipid synthesis
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Supports PAP activity (IDA) and PE-metabolic-process annotation; abstract-only but consistent
      with UniProt.
- id: PMID:29765047
  title: >-
    Tip60-mediated lipin 1 acetylation and ER translocation determine triacylglycerol synthesis
    rate.
  findings:
  - statement: >-
      Fatty acids drive KAT5/Tip60-dependent acetylation of lipin 1 and its cytosol-to-ER
      translocation to generate DAG for TAG synthesis; lipin 1 catalyzes the penultimate step
      of TAG synthesis.
    reference_section_type: RESULTS
    supporting_text: >-
      the dephosphorylation of phosphatidic acids (PAs) to form diacylglycerols (DAGs), the
      penultimate step in TAG synthesis
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Full text available. Directly supports ER/cytosol localization, PAP activity, and triglyceride
      biosynthetic process for the human protein.
- id: PMID:31695197
  title: Lipid signalling drives proteolytic rewiring of mitochondria by YME1L.
  findings:
  - statement: >-
      mTORC1-LIPIN1-YME1L axis: LIPIN1 PAP activity decreases mitochondrial phosphatidylethanolamine
      and promotes YME1L-mediated proteolysis.
    reference_section_type: ABSTRACT
    supporting_text: >-
      a lipid signalling cascade via the phosphatidic acid phosphatase LIPIN1, which decreases
      phosphatidylethanolamine levels in mitochondrial membranes
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: Supports PAP activity (IDA) and PE-metabolic-process annotation.
- id: PMID:32814053
  title: >-
    Interactome Mapping Provides a Network of Neurodegenerative Disease Proteins and Uncovers
    Widespread Protein Aggregation in Affected Brains.
  findings:
  - statement: >-
      Large-scale yeast two-hybrid interactome of ~500 neurodegenerative-disease proteins;
      LPIN1 appears among the mapped interactors. Source of a bare protein-binding IPI annotation,
      uninformative about lipin-1 function.
    reference_section_type: ABSTRACT
    supporting_text: >-
      an interactome map that focuses on neurodegenerative disease (ND), connects ~5,000 human
      proteins via ~30,000 candidate interactions
  reference_review:
    relevance: LOW
    correctness: VERIFIED
    review_notes: >-
      High-throughput Y2H screen; the resulting GO:0005515 protein binding is over-annotation
      (no specific functional complex established for lipin-1).
- id: PMID:39577771
  title: >-
    The antidepressant drug sertraline is a novel inhibitor of yeast Pah1 and human lipin
    1 phosphatidic acid phosphatases.
  findings:
  - statement: >-
      Sertraline is a novel noncompetitive inhibitor of PAP, inhibiting the PAP activity of
      human lipin 1 (alpha, beta, gamma).
    reference_section_type: ABSTRACT
    supporting_text: Sertraline also inhibited the PAP activity of human lipin 1
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Full text available. Confirms human lipin 1 PAP activity; cited by UniProt for CATALYTIC
      ACTIVITY of isoforms 1/3/4.
