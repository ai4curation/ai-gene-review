core_functions:
- description: >-
    Mg2+-dependent phosphatidate phosphatase (PAP1) that catalyzes the dephosphorylation of
    phosphatidic acid to diacylglycerol plus phosphate, the penultimate step of triacylglycerol
    and glycerophospholipid synthesis.
  molecular_function:
    id: GO:0008195
    label: phosphatidate phosphatase activity
  supported_by:
  - reference_id: PMID:20231281
    supporting_text: >-
      PA phosphatase activities of the alpha, beta, and gamma isoforms were dependent on Mg(2+)
      or Mn(2+) ions at pH 7.5 at 37 degrees C.
  - reference_id: file:human/LPIN1/LPIN1-uniprot.txt
    supporting_text: >-
      Acts as a magnesium-dependent phosphatidate phosphatase enzyme which catalyzes the conversion
      of phosphatidic acid to diacylglycerol
- description: >-
    Produces diacylglycerol at the ER/cytosol membrane surface as the direct precursor for
    triacylglycerol synthesis; lipin-1 is the rate-determining PAP step of the glycerol-3-phosphate
    pathway of TAG biosynthesis.
  molecular_function:
    id: GO:0008195
    label: phosphatidate phosphatase activity
  locations:
  - id: GO:0005789
    label: endoplasmic reticulum membrane
  directly_involved_in:
  - id: GO:0019432
    label: triglyceride biosynthetic process
  supported_by:
  - reference_id: PMID:29765047
    supporting_text: >-
      the dephosphorylation of phosphatidic acids (PAs) to form diacylglycerols (DAGs), the
      penultimate step in TAG synthesis
  - reference_id: PMID:29765047
    supporting_text: >-
      it needs to translocate from cytosol to endoplasmic reticulum (ER) membranes, whereby
      the hydrophobic phospholipids and neutral lipids are synthesized
- description: >-
    The diacylglycerol generated by lipin-1 PAP activity also feeds glycerophospholipid (phosphatidylethanolamine/phosphatidylcholine)
    metabolism; lipin-1 activity regulates cellular PA and PE levels.
  molecular_function:
    id: GO:0008195
    label: phosphatidate phosphatase activity
  directly_involved_in:
  - id: GO:0046337
    label: phosphatidylethanolamine metabolic process
  supported_by:
  - reference_id: PMID:31695197
    supporting_text: >-
      which decreases phosphatidylethanolamine levels in mitochondrial membranes and promotes
      proteolysis
  - reference_id: PMID:23426360
    supporting_text: >-
      Mg(2+)-dependent phosphatidic acid phosphatases involved in the de novo synthesis of
      phospholipids and triglycerides
proposed_new_terms:
- proposed_name: diacylglycerol biosynthetic process
  proposed_definition: >-
    Existing term GO:0006651 (diacylglycerol biosynthetic process) should be added as an involved_in
    annotation for LPIN1; lipin-1 directly generates diacylglycerol by dephosphorylating phosphatidic
    acid.
  justification: >-
    Lipin-1's immediate catalytic product is diacylglycerol; capturing the DAG biosynthetic
    process (in addition to the downstream triglyceride biosynthetic process) would more precisely
    represent the enzyme's direct metabolic output.
suggested_questions:
- question: >-
    Which lipin-1 splice isoforms and post-translational states (phosphorylation, acetylation,
    sumoylation) predominate in skeletal muscle, and how do they set the muscle rhabdomyolysis
    threshold in LPIN1 deficiency?
- question: >-
    How is the balance between lipin-1's cytosolic/ER PAP pool and its nuclear transcriptional-coregulator
    pool controlled in human cells, and is the nuclear transcriptional role independent of
    catalytic activity?
suggested_experiments:
- description: >-
    Catalytically dead (DxDxT-motif) versus transcription-defective (LXXIL-motif) separation-of-function
    LPIN1 alleles in human myotubes/adipocytes to partition the PAP enzymatic and transcriptional-coactivator
    contributions to lipid homeostasis.
- description: >-
    Quantitative lipidomics (PA, DAG, TAG, PE, PC) after LPIN1 knockout/rescue in human cells
    to map the flux consequences of loss of lipin-1 PAP activity across the neutral-lipid
    and phospholipid branches.
