id: Q16854
gene_symbol: DGUOK
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  DGUOK is the mitochondrial deoxyguanosine kinase, the purine arm of the
  mitochondrial deoxyribonucleoside salvage pathway. Acting in the mitochondrial
  matrix, it catalyses the initial, rate-limiting phosphorylation of the purine
  deoxyribonucleosides deoxyguanosine and deoxyadenosine (and deoxyinosine) to
  their monophosphates dGMP and dAMP, using ATP (or another nucleoside
  triphosphate) as phosphate donor. It is a nuclear-encoded protein imported into
  mitochondria via a cleaved N-terminal transit peptide, functions as a homodimer,
  and belongs to the DCK/DGK deoxyribonucleoside kinase family. Together with
  thymidine kinase 2 (TK2, the pyrimidine arm), DGUOK supplies the dNTP precursors
  required for mitochondrial DNA replication, a role that becomes essential in
  non-proliferating, post-mitotic tissues where cytosolic de-novo dNTP synthesis is
  down-regulated. Loss-of-function variants cause hepatocerebral mitochondrial DNA
  depletion syndrome (MTDPS3), and DGUOK mutations are also associated with
  non-cirrhotic portal hypertension and adult-onset progressive external
  ophthalmoplegia with multiple mtDNA deletions.
