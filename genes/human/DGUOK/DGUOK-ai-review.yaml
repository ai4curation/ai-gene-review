  review:
    summary: >-
      Phylogenetic (IBA) assignment of deoxycytidine kinase activity. DGUOK is a
      purine-specific deoxyribonucleoside kinase; deoxycytidine is the substrate of
      the paralog deoxycytidine kinase (DCK), not DGUOK. This IBA over-reaches from
      the shared DCK/DGK family tree onto DGUOK.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      Human DGUOK efficiently phosphorylates the purine deoxyribonucleosides
      deoxyguanosine and deoxyadenosine, whereas pyrimidine deoxyribonucleosides
      (deoxycytidine) are handled by other kinases; deoxycytidine kinase activity is
      not a demonstrated DGUOK function and is inappropriately transferred across the
      family tree. The related paralog DCK carries this activity. The seeding PANTHER
      family (PTN002236991) groups purine-specific DGUOK/DGK orthologs together with
      the broader-specificity deoxycytidine kinase (DCK) clade, so deoxycytidine
      (a DCK substrate) kinase activity leaks onto DGUOK.
