- term:
    id: GO:0000159
    label: protein phosphatase type 2A complex
  evidence_type: IDA
  original_reference_id: PMID:17055435
  review:
    summary: >-
      Crystal structure of PP2A core enzyme directly demonstrates PPP2R1A as
      scaffold subunit of the PP2A complex (PMID:17055435).
    action: ACCEPT
    reason: >-
      High-resolution structural evidence. PPP2R1A is definitionally part of PP2A.
    supported_by:
      - reference_id: PMID:17055435
        supporting_text: >-
          The core enzyme of PP2A comprises a 65 kDa scaffolding subunit and a
          36 kDa catalytic subunit.
- term:
    id: GO:0000159
    label: protein phosphatase type 2A complex
  evidence_type: IDA
  original_reference_id: PMID:17174897
  review:
    summary: >-
      Crystal structure of PP2A holoenzyme with B56 confirms PPP2R1A as scaffold
      subunit (PMID:17174897).
    action: ACCEPT
    reason: >-
      Definitive structural evidence for PPP2R1A in PP2A holoenzyme.
    supported_by:
      - reference_id: PMID:17174897
        supporting_text: >-
          The PP2A holoenzyme consists of a heterodimeric core enzyme, which
          comprises a scaffolding subunit and a catalytic subunit, and a variable
          regulatory subunit.
- term:
    id: GO:0000775
    label: chromosome, centromeric region
  evidence_type: IDA
  original_reference_id: PMID:16580887
  review:
    summary: >-
      PP2A localizes to centromeres in a Bub1-dependent manner for Sgo1
      localization and chromosome segregation (PMID:16580887).
    action: ACCEPT
    reason: >-
      Direct experimental evidence for centromeric localization of PP2A
      containing PPP2R1A.
    supported_by:
      - reference_id: PMID:16580887
        supporting_text: >-
          PP2A localizes to centromeres in a Bub1-dependent manner.
- term:
    id: GO:0005515
    label: protein binding
  evidence_type: IPI
  original_reference_id: PMID:16580887
  review:
    summary: >-
      PP2A interaction with Sgo1 at centromeres. PPP2R1A depletion causes chromosome missegregation.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      Protein binding is too vague. The centromeric function is better captured by chromosome segregation and centromeric region annotations.
- term:
    id: GO:0007059
    label: chromosome segregation
  evidence_type: IDA
  original_reference_id: PMID:16580887
  review:
    summary: >-
      PPP2R1A depletion causes chromosome missegregation. PP2A is required for
      centromeric Sgo1 localization and proper chromosome segregation (PMID:16580887).
    action: KEEP_AS_NON_CORE
    reason: >-
      While experimentally validated, chromosome segregation is a downstream
      consequence of PP2A centromeric activity with specific B subunits. It is
      not the core scaffolding function of PPP2R1A.
    supported_by:
      - reference_id: PMID:16580887
        supporting_text: >-
          Depletion of Plk1 by RNA interference (RNAi) restores centromeric
          localization of Sgo1 and prevents chromosome missegregation in cells
          depleted of PP2A_Aalpha.
- term:
    id: GO:0005515
    label: protein binding
  evidence_type: IPI
  original_reference_id: PMID:9847399
  review:
    summary: >-
      Binding specificity of PP2A core enzyme for regulatory B subunits and T antigens. Key study showing A subunit mutations affect B subunit binding differentially.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      Protein binding is too vague. The scaffolding function and B subunit binding specificity are better captured by PP2A complex and protein phosphatase regulator activity annotations.
- term:
    id: GO:0046982
    label: protein heterodimerization activity
  evidence_type: IPI
  original_reference_id: PMID:9847399
  review:
    summary: >-
      PPP2R1A heterodimerizes with the catalytic C subunit to form the PP2A core
      enzyme (PMID:9847399). This is a specific molecular function.
    action: ACCEPT
    reason: >-
      Heterodimerization with the catalytic C subunit is a core molecular function
      of PPP2R1A, more informative than generic protein binding. The A-C
      heterodimerization is the foundation of PP2A assembly.
    supported_by:
      - reference_id: PMID:9847399
        supporting_text: >-
          The core enzyme of protein phosphatase 2A is composed of a regulatory
          subunit A and a catalytic subunit C.
- term:
    id: GO:0000159
    label: protein phosphatase type 2A complex
  evidence_type: TAS
  original_reference_id: PMID:11007961
  review:
    summary: >-
      Review article confirming PPP2R1A as PP2A scaffold (PMID:11007961).
    action: ACCEPT
    reason: >-
      Well-established core function. Consistent with IBA and IDA annotations.
- term:
    id: GO:0005634
    label: nucleus
  evidence_type: NAS
  original_reference_id: PMID:11007961
  review:
    summary: >-
      Nuclear localization noted in PP2A review (PMID:11007961). Consistent with
      multiple experimental annotations.
    action: ACCEPT
    reason: >-
      Consistent with other nuclear localization annotations.
- term:
    id: GO:0005739
    label: mitochondrion
  evidence_type: NAS
  original_reference_id: PMID:11007961
  review:
    summary: >-
      Mitochondrial localization mentioned in PP2A review (PMID:11007961). PP2A
      has been reported at mitochondria in some contexts but this is not well-
      established as a primary localization for PPP2R1A.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      Mitochondrial localization is not well-supported as a primary site for
      PPP2R1A. NAS evidence from a general review is weak. No specific experimental
      data for PPP2R1A at mitochondria in the available literature.
- term:
    id: GO:0005829
    label: cytosol
  evidence_type: TAS
  original_reference_id: PMID:11007961
  review:
    summary: >-
      Cytosolic localization from PP2A review (PMID:11007961).
    action: ACCEPT
    reason: >-
      Consistent with well-established cytosolic PP2A function.
- term:
    id: GO:0015630
    label: microtubule cytoskeleton
  evidence_type: NAS
  original_reference_id: PMID:11007961
  review:
    summary: >-
      PP2A has roles at the microtubule cytoskeleton, particularly in mitosis
      (centrosome maturation, spindle assembly). NAS from review (PMID:11007961).
    action: KEEP_AS_NON_CORE
    reason: >-
      Microtubule cytoskeleton association is a downstream consequence of PP2A
      activity in mitotic contexts. Not a core function of the PPP2R1A scaffold.
- term:
    id: GO:0016020
    label: membrane
  evidence_type: NAS
  original_reference_id: PMID:11007961
  review:
    summary: >-
      Membrane localization from PP2A review (PMID:11007961). PP2A can associate
      with membranes through certain B subunits and interactors.
    action: KEEP_AS_NON_CORE
    reason: >-
      Membrane association is context-dependent and driven by specific B subunits
      or interactors. Not a primary localization for the scaffold subunit.
- term:
    id: GO:0040008
    label: regulation of growth
  evidence_type: NAS
  original_reference_id: PMID:11360189
  review:
    summary: >-
      PMID:11360189 examines PPP2R1A mutations in Wilms tumor context, noting
      PP2A importance in fetal kidney growth. No mutations found in PPP2R1A.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      Regulation of growth is too vague and represents a broad downstream
      consequence of PP2A activity. The cited paper found NO PPP2R1A mutations
      in Wilms tumor, weakening the annotation. Growth regulation is a pleiotropic
      effect, not a specific function of PPP2R1A.
- term:
    id: GO:0045595
    label: regulation of cell differentiation
  evidence_type: NAS
  original_reference_id: PMID:11360189
  review:
    summary: >-
      PMID:11360189 mentions PP2A role in kidney differentiation context.
      The paper found no PPP2R1A mutations in Wilms tumor.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      Regulation of cell differentiation is too broad and vague. The cited paper
      is a negative mutational study. Differentiation effects are pleiotropic
      downstream consequences of PP2A activity with specific B subunits.
- term:
    id: GO:0065003
    label: protein-containing complex assembly
  evidence_type: TAS
  original_reference_id: PMID:9989501
  review:
    summary: >-
      PPP2R1A is the scaffold that assembles PP2A holoenzyme complexes. The
      crystal structure at 2.3 A reveals how 15 HEAT repeats organize the
      assembly platform (PMID:9989501).
    action: ACCEPT
    reason: >-
      Protein-containing complex assembly is a core function of PPP2R1A as the
      scaffolding subunit that organizes PP2A holoenzyme formation.
    supported_by:
      - reference_id: PMID:9989501
        supporting_text: >-
          The PR65/A subunit of protein phosphatase 2A serves as a scaffolding
          molecule to coordinate the assembly of the catalytic subunit and a
          variable regulatory B subunit, generating functionally diverse
          heterotrimers.
