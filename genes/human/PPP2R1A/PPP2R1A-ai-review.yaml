id: P30153
gene_symbol: PPP2R1A
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  PPP2R1A encodes the alpha isoform of the scaffolding A subunit (PR65-alpha) of
  protein phosphatase 2A (PP2A), the major serine/threonine phosphatase in eukaryotic
  cells. The protein comprises 15 tandem HEAT repeats forming an elongated horseshoe-shaped
  structure that bridges the catalytic C subunit (via HEAT repeats 11-15) and variable
  regulatory B subunits (via HEAT repeats 1-10), thereby assembling functionally diverse
  PP2A holoenzyme heterotrimers. PPP2R1A is the predominant A subunit isoform, accounting
  for approximately 90% of cellular PP2A scaffold. In addition to canonical trimeric PP2A
  holoenzymes, PPP2R1A participates in noncanonical PP2A assemblies including the INTAC
  complex (Integrator-PP2A) which regulates RNA polymerase II transcription, and the
  STRIPAK complex which integrates Hippo pathway signaling. PPP2R1A is not itself catalytic;
  its function is purely structural/scaffolding. Mutations are associated with endometrial
  cancer and Houge-Janssens syndrome 2 (neurodevelopmental disorder).
existing_annotations:
- term:
    id: GO:0000159
    label: protein phosphatase type 2A complex
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      PPP2R1A is the core scaffolding subunit of the PP2A complex. Multiple crystal
      structures demonstrate it as an integral component of the PP2A heterotrimer
      (PMID:17055435, PMID:17174897). This is the defining function of this protein.
    action: ACCEPT
    reason: >-
      PPP2R1A is the major scaffolding A subunit of PP2A, forming the core dimer with
      the catalytic C subunit and recruiting regulatory B subunits. This annotation is
      directly supported by structural and biochemical evidence.
    supported_by:
      - reference_id: PMID:17055435
        supporting_text: >-
          The core enzyme of PP2A comprises a 65 kDa scaffolding subunit and a 36 kDa
          catalytic subunit.
      - reference_id: PMID:17174897
        supporting_text: >-
          The PP2A holoenzyme consists of a heterodimeric core enzyme, which comprises
          a scaffolding subunit and a catalytic subunit, and a variable regulatory subunit.
