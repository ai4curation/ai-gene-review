- term:
    id: GO:0019888
    label: protein phosphatase regulator activity
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      PPP2R1A serves as the scaffolding subunit that organizes the PP2A holoenzyme,
      thereby regulating phosphatase activity by determining which B subunit (and
      therefore which substrates) are engaged. This is its core molecular function.
    action: ACCEPT
    reason: >-
      As the scaffold that assembles the PP2A holoenzyme, PPP2R1A directly regulates
      phosphatase activity by controlling holoenzyme composition and substrate access.
      This is an appropriate MF term for a non-catalytic regulatory subunit.
    supported_by:
      - reference_id: PMID:17174897
        supporting_text: >-
          The PP2A holoenzyme consists of a heterodimeric core enzyme, which comprises
          a scaffolding subunit and a catalytic subunit, and a variable regulatory subunit.
- term:
    id: GO:0051225
    label: spindle assembly
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      PP2A is involved in mitotic processes including chromosome segregation and
      centromeric localization of Sgo1 (PMID:16580887). The role in spindle assembly
      is plausible through PP2A-mediated dephosphorylation of mitotic regulators,
      and is supported by Reactome annotations linking PP2A to centrosome maturation
      and mitotic spindle organization.
    action: KEEP_AS_NON_CORE
    reason: >-
      While PP2A has roles in mitosis, spindle assembly is a downstream consequence
      of PP2A holoenzyme activity with specific B subunits, not a core function of
      PPP2R1A itself. The IBA annotation is reasonable given conservation but represents
      a non-core biological process for this scaffold subunit.
- term:
    id: GO:0051754
    label: meiotic sister chromatid cohesion, centromeric
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      PP2A-B56 complexes play a conserved role in protecting centromeric cohesion
      during meiosis. PMID:16580887 demonstrates PP2A's role at centromeres for
      chromosome segregation, though this study focused on mitosis. The meiotic
      role is inferred phylogenetically from yeast/fly data.
    action: KEEP_AS_NON_CORE
    reason: >-
      Meiotic centromeric cohesion is a conserved function of PP2A across eukaryotes,
      and the IBA inference is phylogenetically sound. However, this is a specialized
      meiosis-specific process rather than a core function of the PPP2R1A scaffold.
    supported_by:
      - reference_id: PMID:16580887
        supporting_text: >-
          PP2A localizes to centromeres in a Bub1-dependent manner. The Sgo1-PP2A
          interaction is required for centromeric localization of Sgo1 and proper
          chromosome segregation in human cells.
