core_functions:
- molecular_function:
    id: GO:0019888
    label: protein phosphatase regulator activity
  contributes_to_molecular_function:
    id: GO:0004722
    label: protein serine/threonine phosphatase activity
  description: >-
    PPP2R1A is the scaffolding A subunit of PP2A that organizes the catalytic C subunit
    and diverse regulatory B subunits into functional holoenzymes, thereby regulating
    phosphatase activity and substrate specificity. The A subunit does not have
    catalytic activity itself but enables it by assembling the holoenzyme. As part
    of canonical PP2A trimers, it contributes to Ser/Thr phosphatase activity on
    diverse substrates including signaling kinases and transcription factors.
  directly_involved_in:
    - id: GO:0065003
      label: protein-containing complex assembly
  locations:
    - id: GO:0005829
      label: cytosol
    - id: GO:0005634
      label: nucleus
  in_complex:
    id: GO:0000159
    label: protein phosphatase type 2A complex
  supported_by:
    - reference_id: PMID:17055435
      supporting_text: >-
        The core enzyme of PP2A comprises a 65 kDa scaffolding subunit and a
        36 kDa catalytic subunit.
    - reference_id: PMID:17174897
      supporting_text: >-
        The PP2A holoenzyme consists of a heterodimeric core enzyme, which comprises
        a scaffolding subunit and a catalytic subunit, and a variable regulatory subunit.
    - reference_id: PMID:9989501
      supporting_text: >-
        The PR65/A subunit of protein phosphatase 2A serves as a scaffolding molecule
        to coordinate the assembly of the catalytic subunit and a variable regulatory
        B subunit, generating functionally diverse heterotrimers.
- molecular_function:
    id: GO:0019888
    label: protein phosphatase regulator activity
  contributes_to_molecular_function:
    id: GO:0004722
    label: protein serine/threonine phosphatase activity
  description: >-
    As part of the INTAC complex (Integrator-PP2A), PPP2R1A scaffolds PPP2CA which
    dephosphorylates the Pol II CTD at Ser2, Ser5, and Ser7, driving premature
    transcription termination. This represents a quality checkpoint function during
    transcription initiation, distinct from canonical PP2A holoenzyme activities.
  directly_involved_in:
    - id: GO:0160240
      label: RNA polymerase II transcription initiation surveillance
    - id: GO:0034243
      label: regulation of transcription elongation by RNA polymerase II
  locations:
    - id: GO:0000785
      label: chromatin
    - id: GO:0005634
      label: nucleus
  in_complex:
    id: GO:0160232
    label: INTAC complex
  supported_by:
    - reference_id: PMID:33243860
      supporting_text: >-
        we identified a complex containing Integrator and protein phosphatase 2A
        core enzyme (PP2A-AC), termed INTAC. The INTAC complex dephosphorylates the
        carboxy-terminal repeat domain of RNA polymerase II at serine-2, -5, and -7
        and thus regulates transcription.
    - reference_id: PMID:38570683
      supporting_text: >-
        we present three cryo-electron microscopy structures of the complete
        Integrator-PP2A complex in different functional states.
- molecular_function:
    id: GO:0019888
    label: protein phosphatase regulator activity
  contributes_to_molecular_function:
    id: GO:0004722
    label: protein serine/threonine phosphatase activity
  description: >-
    As part of the STRIPAK complex, PPP2R1A scaffolds PP2A phosphatase activity that
    dephosphorylates MST1/2 Hippo kinases, negatively regulating the Hippo signaling
    pathway. STRIPAK is a noncanonical PP2A assembly with striatin as the regulatory
    B subunit.
  directly_involved_in:
    - id: GO:0035331
      label: negative regulation of hippo signaling
  locations:
    - id: GO:0005829
      label: cytosol
  in_complex:
    id: GO:0090443
    label: FAR/SIN/STRIPAK complex
  supported_by:
    - reference_id: PMID:33633399
      supporting_text: >-
        The striatin-interacting phosphatase and kinase (STRIPAK) complex is a large,
        multisubunit protein phosphatase 2A (PP2A) assembly that integrates diverse
        cellular signals in the Hippo pathway to regulate cell proliferation and survival.
    - reference_id: PMID:18782753
      supporting_text: >-
        Here we define a novel large multiprotein assembly, referred to as the
        striatin-interacting phosphatase and kinase (STRIPAK) complex. STRIPAK contains
        the PP2A catalytic (PP2Ac) and scaffolding (PP2A A) subunits
