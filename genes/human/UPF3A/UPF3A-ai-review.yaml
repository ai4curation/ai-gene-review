core_functions:
- description: Nonsense-mediated mRNA decay (NMD) adaptor that associates with the exon-junction complex on spliced mRNA and bridges it to the core NMD machinery, binding UPF2 (and RBM8A/EJC) and helping assemble the UPF1-UPF2-UPF3 surveillance complex that targets premature-termination-codon-containing mRNAs.
  molecular_function:
    id: GO:0003729
    label: mRNA binding
  in_complex:
    id: GO:0170010
    label: nonsense-mediated decay complex
  supported_by:
  - reference_id: file:human/UPF3A/UPF3A-uniprot.txt
    supporting_text: serving as link between the EJC core and NMD
  - reference_id: file:human/UPF3A/UPF3A-uniprot.txt
    supporting_text: Binds spliced mRNA
- description: NMD modulator/antagonist; UPF3A is only marginally active in promoting decay and competes with UPF3B for UPF2, sequestering UPF2 to repress/buffer NMD, contributing to paralog-dependent control of NMD magnitude.
  molecular_function:
    id: GO:0140311
    label: protein sequestering activity
  locations:
  - id: GO:0005737
    label: cytoplasm
  supported_by:
  - reference_id: file:human/UPF3A/UPF3A-uniprot.txt
    supporting_text: only marginally active in NMD
  - reference_id: PMID:35640974
    supporting_text: protect itself from degradation by interaction with UPF2
proposed_new_terms: []
suggested_questions:
- question: Under what physiological/developmental conditions does UPF3A act as an NMD activator (bridging UPF2/EJC) versus an NMD repressor (sequestering UPF2), and what controls the switch?
- question: How does UPF3A protein stability (its clearance in many tissues and stabilization by UPF2 when UPF3B is absent) tune the magnitude of NMD in different cell types?
- question: Are UPF3A's reported telomeric-repeat/TERRA-binding and weak translation-stimulation activities physiologically significant, or incidental to its RRM-based RNA binding?
suggested_experiments:
- description: Degron-controlled UPF3A depletion/restoration (with and without UPF3B) combined with transcriptome-wide NMD-substrate profiling to quantify UPF3A's activator versus repressor contributions across substrate classes.
- description: Structure-guided UPF2-binding mutants of UPF3A that disrupt the competitive MIF4G-III interaction, tested for NMD repression, UPF3A stability, and UPF3B buffering.
- description: Comparative CLIP-seq of UPF3A and UPF3B to define their mRNA/EJC binding landscapes and whether UPF3A binding marks transcripts protected from decay.
