    SCF (SKP1-CUL1-RBX1-FBXO40) E3 ubiquitin ligase complex that recruits specific
    substrates and presents them for SCF-dependent poly-ubiquitination and
    proteasomal degradation. Catalytic ubiquitin transfer is provided by the RBX1
    RING subunit, not by FBXO40 itself.
