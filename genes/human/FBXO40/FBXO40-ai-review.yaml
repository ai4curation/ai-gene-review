gene_symbol: FBXO40
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  FBXO40 (F-box only protein 40; "muscle disease-related protein") is a 709-residue
  FBXO-class F-box protein that serves as the substrate-recognition subunit of a
  cullin-RING SCF (SKP1-CUL1-RBX1-F-box) E3 ubiquitin ligase complex. Like other
  F-box proteins, it docks onto the SCF scaffold through its C-terminal F-box domain
  (interacting with SKP1/CUL1) while presenting an N-terminal substrate-binding
  module; FBXO40 carries a TRAF-type zinc finger and is not itself the catalytic
  RING subunit (catalysis is provided by RBX1, which recruits the ubiquitin-charged
  E2). FBXO40 expression is restricted essentially to heart and skeletal muscle,
  appears postnatally during muscle development, and is upregulated in
  denervation-induced (but not starvation-induced) muscle atrophy and reduced in
  Limb-girdle muscular dystrophy muscle. Its best-supported direct substrate is
  insulin receptor substrate 1 (IRS1): the SCF(FBXO40) complex (with co-precipitating
  SKP1, CUL1 and RBX1) ubiquitinates recombinant IRS1 in vitro in a manner enhanced by
  IGF1R-dependent IRS1 tyrosine phosphorylation, targeting IRS1 for proteasomal
  degradation and thereby attenuating the IGF-1/insulin -> IRS1 -> PI3K/AKT anabolic
  signaling axis in skeletal muscle. Loss of Fbxo40 increases IRS1 protein abundance
  (without changing Irs1 mRNA), prolongs IRS1 half-life, and produces myotube and
  whole-muscle hypertrophy in mice (and increased muscle mass in knockout pigs), a
  phenotype that is IRS1-dependent. FBXO40 transcription is induced by inflammatory
  STAT3 signaling (e.g. downstream of IL-6), linking it to catabolic insulin-resistance
  states. The protein localizes to the cytoplasm/cytosol.
