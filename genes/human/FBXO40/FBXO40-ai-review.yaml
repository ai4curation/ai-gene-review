- term:
    id: GO:0046627
    label: negative regulation of insulin receptor signaling pathway
  evidence_type: ISO
  original_reference_id: PMID:22033112
  qualifier: involved_in
  review:
    summary: Proposed FBXO40-specific process inferred by orthology from mouse Fbxo40 (Shi et al. 2011, PMID:22033112; surfaced via the Falcon report) that SCF-FBXO40 ubiquitinates IRS1 to drive its proteasomal degradation, attenuating IGF-1/insulin -> IRS1 -> PI3K/AKT signaling in skeletal muscle.
    action: NEW
    reason: Not currently in GOA, but a well-supported FBXO40-specific biological process. SCF-FBXO40 degrades IRS1 (enhanced by IGF1R-dependent IRS1 tyrosine phosphorylation), and Fbxo40 loss stabilizes IRS1 and causes IRS1-dependent muscle hypertrophy, defining FBXO40 as a negative regulator of insulin/IGF-1 receptor signaling. Evidence is recorded as ISO (inferred from the mouse ortholog; Shi et al. 2011, Dev Cell, PMID:22033112, identified via the Falcon report). The PMID is confirmed to exist but its full text was not read here, so the falcon report is cited as the supporting lead rather than an asserted experimental human quote.
    supported_by:
    - reference_id: file:human/FBXO40/FBXO40-deep-research-falcon.md
      supporting_text: 'FBXO40 acts as the **substrate-recognition subunit** of an SCF E3 ligase complex (**SCF-FBXO40**) that **ubiquitinates IRS1**, promoting its **ubiquitin–proteasome-dependent degradation** in skeletal muscle, thereby **limiting IGF-1/insulin signaling** through the IRS1–PI3K–AKT axis'
