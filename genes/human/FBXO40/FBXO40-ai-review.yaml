  review:
    summary: ISS assignment of involvement in muscle cell differentiation, based on FBXO40's muscle-restricted, postnatal expression and its proposed role in postnatal myogenesis.
    action: KEEP_AS_NON_CORE
    reason: The cited study establishes muscle-specific expression and a postnatal-myogenesis association by expression/correlation, but does not directly demonstrate that FBXO40 drives muscle cell differentiation. The mechanistically best-defined muscle role of FBXO40 (Shi et al. 2011) is negative control of muscle growth/hypertrophy via SCF-dependent IRS1 degradation and attenuation of IGF-1/insulin-AKT signaling, rather than differentiation per se; retain this term as a plausible non-core process.
