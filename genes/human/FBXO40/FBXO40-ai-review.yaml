- id: PMID:17928169
  title: FBXO40, a gene encoding a novel muscle-specific F-box protein, is upregulated
    in denervation-related muscle atrophy.
  findings:
  - statement: FBXO40 is a novel muscle-specific F-box protein expressed only in heart and skeletal muscle, detectable postnatally (~2 weeks after birth), localizing to the cytoplasm in C2C12 cells, decreased in LGMD dystrophic muscle, and upregulated in denervation- but not starvation-related muscle atrophy; proposed to regulate postnatal myogenesis.
    reference_section_type: ABSTRACT
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: PubMed-verified (Gene 2007;404:53-60, DOI 10.1016/j.gene.2007.08.020); abstract-only in cache (full_text_available false). Directly establishes muscle-specific expression, cytoplasmic localization, and the postnatal-myogenesis association underlying the muscle cell differentiation annotations.
- id: PMID:34445249
  title: The SCF Complex Is Essential to Maintain Genome and Chromosome Stability.
  findings:
  - statement: Review describing the SCF (SKP1-CUL1-F-box) family of ~69 E3 ubiquitin ligase complexes in which variable F-box proteins determine substrate specificity and target substrates with poly-ubiquitin chains for proteasomal degradation.
    reference_section_type: ABSTRACT
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: PubMed-verified (Int J Mol Sci 2021;22:8544, DOI 10.3390/ijms22168544); abstract-only in cache. A family-level SCF review (not FBXO40-specific) used by ComplexPortal as the NAS basis for SCF-complex membership and SCF-dependent catabolic process; supports the generic SCF framing but not FBXO40-specific substrate claims.
- id: file:human/FBXO40/FBXO40-deep-research-falcon.md
  title: Falcon deep research report for human FBXO40
  findings:
  - statement: FBXO40 is the muscle-enriched substrate-recognition subunit of an SCF (SKP1-CUL1-RBX1) E3 ubiquitin ligase that ubiquitinates IRS1 to promote its proteasomal degradation, limiting IGF-1/insulin signaling through the IRS1-PI3K-AKT axis.
    supporting_text: 'FBXO40 acts as the **substrate-recognition subunit** of an SCF E3 ligase complex (**SCF-FBXO40**) that **ubiquitinates IRS1**, promoting its **ubiquitin–proteasome-dependent degradation** in skeletal muscle, thereby **limiting IGF-1/insulin signaling** through the IRS1–PI3K–AKT axis'
  - statement: FBXO40 co-immunoprecipitates with IRS1 and the canonical SCF components SKP1, CUL1 and RBX1, and immunoprecipitated SCF-FBXO40 ubiquitinates recombinant IRS1 in vitro.
    supporting_text: co-immunoprecipitation experiments show that **IRS1 and each SCF component (Skp1, Cullin1, Rbx1)** can be co-precipitated with Fbxo40, consistent with SCF assembly and adaptor function
  - statement: IRS1 tyrosine phosphorylation downstream of IGF1R activation markedly enhances IRS1 polyubiquitination by SCF-FBXO40, indicating phosphorylation-dependent substrate recognition.
    supporting_text: '**tyrosine phosphorylation** of IRS1 (in the context of **IGF1R activation**) markedly enhances IRS1 polyubiquitination by SCF-Fbxo40 in vitro, supporting phosphorylation-dependent substrate recognition/processing'
  - statement: Loss of Fbxo40 increases IRS1 abundance and produces muscle hypertrophy that is IRS1-dependent, including increased muscle mass in CRISPR knockout pigs.
    supporting_text: Loss of Fbxo40 increases IRS1 abundance and produces muscle hypertrophy in animal models, including mice and pigs
  - statement: FBXO40 transcription is induced by inflammatory STAT3 signaling (e.g. IL-6), linking it to catabolic insulin-resistance contexts.
    supporting_text: '**STAT3 activation** (e.g., via **IL-6**) increases Fbxo40 expression, reducing IRS1 and p-AKT; Fbxo40 knockdown preserves IRS1/p-AKT despite IL-6'
  reference_review:
    relevance: HIGH
    correctness: UNVERIFIED
    review_notes: 'Falcon (Edison Scientific) deep-research synthesis. Findings name primary literature (Shi et al., Dev Cell 2011, DOI 10.1016/j.devcel.2011.09.011, establishing IRS1 as the direct SCF-FBXO40 substrate and KO hypertrophy; Zhang et al., AJP Endocrinol Metab 2020, DOI 10.1152/ajpendo.00480.2019, STAT3/IL-6 induction). These are treated as leads supporting the IRS1/IGF-1 signaling core function; the primary full texts were not read here, so the synthesis is marked UNVERIFIED rather than VERIFIED.'
