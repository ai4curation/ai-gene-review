    label: negative regulation of insulin receptor signaling pathway
proposed_new_terms: []
suggested_questions:
- question: What is the direct, experimentally validated substrate repertoire of FBXO40
    in human skeletal muscle, and is IRS1 ubiquitination by the SCF-FBXO40 complex
    direct (e.g. reconstituted with purified components) rather than inferred from
    co-depletion phenotypes?
- question: Does FBXO40 substrate recruitment depend on the TRAF-type zinc finger,
    and does substrate engagement require phosphodegron recognition downstream of
    IGF1R/insulin-Akt signaling?
- question: Are the muscle cell differentiation and denervation-atrophy phenotypes
    a consequence of FBXO40-dependent substrate turnover, or do they reflect
    expression-correlated but indirect roles?
- question: How is FBXO40 transcription controlled by inflammatory STAT3/IL-6 signaling
    in skeletal muscle, and does pharmacologic STAT3 inhibition preserve IRS1/p-AKT and
    improve insulin sensitivity primarily through FBXO40 downregulation?
suggested_experiments:
- description: Reconstitute the SCF-FBXO40 complex (SKP1, CUL1, RBX1, FBXO40) with a
    ubiquitin-charged E2 in vitro and assay ubiquitination of candidate substrates
    (e.g. IRS1) to establish direct adaptor function and chain topology.
- description: Perform affinity purification-mass spectrometry of tagged FBXO40 from
    skeletal myotubes (with and without proteasome/neddylation inhibition) to
    define the endogenous substrate and complex interactome and confirm SKP1/CUL1/RBX1
    association.
- description: Generate FBXO40-knockout myoblasts/mice and quantify candidate-substrate
    levels and ubiquitination, myogenic differentiation, and the denervation-atrophy
    response to test whether phenotypes are substrate-turnover dependent.
