- term:
    id: GO:0005515
    label: protein binding
  evidence_type: IPI
  original_reference_id: PMID:17196169
  qualifier: enables
  review:
    summary: 'Generic protein binding is over-annotated for ALIX/PDCD6IP: protein binding.'
    action: MARK_AS_OVER_ANNOTATED
    reason: The interactions are real but GO:0005515 loses the biologically meaningful ALIX-CHMP4, ALIX-TSG101, ALIX-CEP55,
      ALIX-PAR1, ALIX-syntenin, ALIX-ATG12-ATG3, ALIX-PDCD6, and viral late-domain contexts.
    supported_by:
    - reference_id: file:human/PDCD6IP/PDCD6IP-notes.md
      supporting_text: The meaningful interactions are ALIX-CHMP4, ALIX-TSG101, ALIX-CEP55, ALIX-PAR1, ALIX-syntenin/syndecan,
        ALIX-ATG12-ATG3, ALIX-PDCD6, and viral late-domain binding, not generic protein binding.
