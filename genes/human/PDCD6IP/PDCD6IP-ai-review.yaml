id: Q8WUM4
gene_symbol: PDCD6IP
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  PDCD6IP encodes ALIX/AIP1, a Bro1-domain ESCRT accessory adaptor that links cargo/adaptors and
  membrane-remodeling sites to CHMP4/ESCRT-III. ALIX supports MVB/late-endosomal cargo sorting,
  exosome biogenesis with the syndecan-syntenin pathway, basal autophagic flux and endolysosomal
  trafficking through ATG12-ATG3-associated regulation, and CEP55-dependent midbody cytokinesis. Viral
  budding is a well-supported pathogen-exploitation context, while endogenous ALIX roles center on
  ESCRT adaptor activity in endolysosomal, exosome, and cytokinetic membrane-remodeling pathways.
alternative_products:
