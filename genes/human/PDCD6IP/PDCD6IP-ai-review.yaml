proposed_new_terms: []
suggested_questions:
- question: Can ALIX GO annotations separate endogenous MVB/exosome/cytokinesis/autophagy roles from pathogen-hijacked viral
    budding without losing the shared ESCRT membrane-remodeling mechanism?
- question: Should ALIX-PAR1 ubiquitin-independent sorting be represented by a current non-obsolete GO term more specific
    than generic MVB sorting?
- question: Which of the many ALIX interaction annotations should be recast as specific cargo/adaptor-binding activities rather
    than GO:0005515 protein binding?
suggested_experiments:
- description: Use endogenous ALIX depletion/rescue with Bro1, V-domain, PRD, CEP55-binding, CHMP4-binding, and PDCD6-binding
    mutants while measuring PAR1 degradation, exosome release, basal autophagy flux, and cytokinesis completion in parallel.
  hypothesis: Distinct ALIX domains will separate MVB/exosome/autophagy functions from midbody cytokinesis while preserving
    the common CHMP4/ESCRT-III adaptor mechanism.
- description: Re-annotate major ALIX interactors by testing whether specific interactions are required for a defined ESCRT
    output rather than only co-immunoprecipitation or interactome detection.
  hypothesis: Most GO:0005515 records will resolve into a smaller set of specific adaptor/cargo-binding functions or non-core
    physical interactions.
