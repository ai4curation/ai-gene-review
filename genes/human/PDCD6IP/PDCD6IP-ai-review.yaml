- term:
    id: GO:0000281
    label: mitotic cytokinesis
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: involved_in
  review:
    summary: 'Supported endogenous ALIX cytokinesis/midbody function: mitotic cytokinesis.'
    action: ACCEPT
    reason: ALIX is recruited to the midbody through CEP55 and is required for completion of cytokinesis/midbody abscission.
    supported_by:
    - reference_id: PMID:18641129
      supporting_text: Differential requirements for Alix and ESCRT-III in cytokinesis and HIV-1 release
    - reference_id: UniProt:Q8WUM4
      supporting_text: Required for completion of cytokinesis
    - reference_id: file:human/PDCD6IP/PDCD6IP-notes.md
      supporting_text: Morita et al. support the cytokinesis/midbody role.
- term:
