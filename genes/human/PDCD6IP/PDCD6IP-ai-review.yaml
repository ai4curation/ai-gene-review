- id: UniProt:Q8WUM4
  title: UniProtKB entry Q8WUM4 (PDCD6IP/ALIX)
  findings:
  - statement: ALIX is a multifunctional ESCRT adaptor involved in MVB cargo sorting, exosome biogenesis, cytokinesis, and
      viral budding contexts.
    supporting_text: Adapter for a subset of ESCRT-III proteins, such as CHMP4
- id: file:human/PDCD6IP/PDCD6IP-notes.md
  title: PDCD6IP review notes
  findings:
  - statement: PDCD6IP/ALIX core function is ESCRT adaptor activity, not undifferentiated protein binding.
    supporting_text: The core biological picture is not undifferentiated binding
core_functions:
- description: ALIX/PDCD6IP acts as a Bro1-domain ESCRT adaptor that binds cargo/adaptor motifs and recruits CHMP4/ESCRT-III,
    supporting MVB assembly/sorting, PAR1 MVB-lysosomal sorting, exosome biogenesis/assembly/secretion, and basal autophagy/endolysosomal
    trafficking.
