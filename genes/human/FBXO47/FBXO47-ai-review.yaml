core_functions:
- description: >-
    F-box-domain protein expressed in male germ cells that functions in meiotic
    prophase I, contributing to regulation of the synaptonemal complex and
    meiotic chromosome dynamics. FBXO47 carries the F-box motif characteristic of
    SCF substrate-recognition receptors and is recorded as part of a curated
    FBXO47-variant SCF E3 ubiquitin ligase complex, but its essential role in
    meiosis may be partly independent of canonical SCF-mediated substrate
    degradation, and a direct in vivo SCF substrate-receptor activity for FBXO47
    has not been firmly established.
