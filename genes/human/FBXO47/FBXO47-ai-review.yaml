proposed_new_terms: []
suggested_questions:
- question: Does FBXO47 assemble a canonical SCF (SKP1-CUL1-RBX1) E3 ligase complex in germ cells and ubiquitinate substrates for proteasomal degradation, or does its essential meiotic function (e.g. regulation of synaptonemal complex components) operate independently of canonical SCF-mediated degradation?
- question: What are the physiological substrates or interaction partners of FBXO47 in meiotic prophase, and is its F-box domain required for synaptonemal complex regulation?
suggested_experiments:
- description: Generate F-box-deletion or F-box point-mutant FBXO47 alleles (disrupting SKP1 binding) in a germ-cell or mouse model and assess whether SCF assembly is required for the meiotic prophase / synaptonemal complex phenotype, distinguishing canonical SCF-dependent from SCF-independent function.
- description: Perform affinity-purification mass spectrometry of FBXO47 from testis to define its complex composition (SKP1/CUL1/RBX1 versus meiosis-specific partners) and candidate ubiquitination substrates, followed by in vitro reconstitution to test ubiquitin-ligase substrate-adaptor activity.
