id: Q5MNV8
gene_symbol: FBXO47
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  FBXO47 (F-box only protein 47) is a 452-residue F-box-domain-containing
  protein (F-box at residues 41-91) belonging to the FBXO ("F-box only")
  subfamily of F-box proteins, which canonically act as substrate-recognition
  receptors that, together with SKP1, CUL1 and RBX1, assemble SCF
  (SKP1-cullin-F-box) E3 ubiquitin ligase complexes targeting phosphorylated
  substrates for proteasomal degradation. FBXO47 is expressed in testis (HPA
  testis-enriched; expressed in male germline cells) and was originally cloned
  from testis. Functional studies in mouse have established FBXO47 as a germ-cell
  protein required for meiotic prophase I, where it acts in the regulation of the
  synaptonemal complex and meiotic chromosome dynamics. Its biochemical role as a
  canonical SCF substrate receptor in vivo remains to be firmly established, and
  its essential meiotic function may be partly independent of classical
  SCF-mediated substrate degradation. A curated SCF E3 ligase complex variant
  containing FBXO47 has been recorded (ComplexPortal CPX-8006). FBXO47 maps to
  17q12; a missense variant has been reported as a candidate in autosomal
  recessive intellectual disability.
existing_annotations:
- term:
    id: GO:0019005
    label: SCF ubiquitin ligase complex
  evidence_type: NAS
  original_reference_id: PMID:34445249
  qualifier: part_of
  review:
    summary: ComplexPortal NAS assertion that FBXO47 is part of an SCF E3 ubiquitin ligase complex, consistent with its F-box domain and the curated FBXO47-variant SCF complex (CPX-8006). FBXO47's essential, experimentally established biology is in meiotic prophase, not canonical SCF catalysis, so this is retained as non-core.
    action: KEEP_AS_NON_CORE
    reason: FBXO47 has an F-box domain and a curated SCF-complex variant (CPX-8006), and UniProt states it is part of an SCF complex, but this is inferred by similarity (ECO:0000250) and asserted (NAS) from a general SCF review (PMID:34445249) rather than demonstrated for FBXO47 specifically. The literature indicates FBXO47's core function is in meiosis/synaptonemal complex regulation, possibly independent of canonical SCF-mediated degradation, so SCF-complex membership is kept as a non-core annotation rather than promoted to a core function.
    supported_by:
    - reference_id: file:human/FBXO47/FBXO47-uniprot.txt
      supporting_text: 'Part of a SCF (SKP1-cullin-F-box) protein ligase complex.'
- term:
    id: GO:0031146
    label: SCF-dependent proteasomal ubiquitin-dependent protein catabolic process
  evidence_type: NAS
  original_reference_id: PMID:34445249
  qualifier: involved_in
  review:
    summary: ComplexPortal NAS assertion that FBXO47 participates in SCF-dependent proteasomal protein degradation. This is inferred from F-box family membership and a general SCF review, and the UniProt FUNCTION itself is only a "Probably" statement by similarity; the experimentally documented FBXO47 function is in meiosis and may not proceed via canonical SCF-dependent degradation in vivo.
    action: UNDECIDED
    reason: The annotation rests on family-level inference (UniProt FUNCTION is "Probably recognizes... promotes their ubiquitination and degradation {ECO:0000250}") and an NAS citation to a general SCF review (PMID:34445249) that does not characterize FBXO47. The functionally validated role of FBXO47 (mouse knockouts) is in meiotic prophase / synaptonemal complex regulation, and it has been reported not to assemble a canonical SCF complex in the usual manner; whether FBXO47 actually drives SCF-dependent proteasomal degradation of substrates in vivo is not established. Marked UNDECIDED rather than ACCEPT/REMOVE because the underlying biochemical claim cannot be verified from the available evidence.
    supported_by:
    - reference_id: file:human/FBXO47/FBXO47-uniprot.txt
      supporting_text: Probably recognizes and binds to some phosphorylated proteins and promotes their ubiquitination and degradation.
