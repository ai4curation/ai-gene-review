id: O75380
gene_symbol: NDUFS6
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  NDUFS6 (NADH:ubiquinone oxidoreductase subunit S6; also called the "13 kDa-A"
  or CI-13kD-A subunit) is a small (124-residue precursor; ~13 kDa) nuclear-encoded
  accessory (supernumerary) subunit of mitochondrial respiratory Complex I
  (NADH:ubiquinone oxidoreductase). It carries an N-terminal mitochondrial transit
  peptide (residues 1-28) and a C-terminal CHCC-type zinc-binding motif (zf-CHCC).
  Within the L-shaped holoenzyme it is part of the peripheral (matrix) arm, near
  the flavoprotein/NADH-oxidising N-module, and it was historically grouped with
  the iron-sulfur protein (IP) fraction. Despite the "S" (iron-sulfur protein) name
  it is a non-catalytic subunit that does not carry an electron-transfer Fe-S cluster
  of the catalytic wire; instead it plays a structural role, stabilising the N-module
  during Complex I assembly. It is a peripheral inner-membrane protein on the matrix
  side of the mitochondrial inner membrane. Complex I couples electron transfer from
  NADH to ubiquinone with proton translocation across the inner membrane, feeding the
  respiratory chain and driving oxidative phosphorylation. Loss-of-function variants
  in NDUFS6 destabilise Complex I and cause mitochondrial complex I deficiency
  (nuclear type 9, MC1DN9), presenting as fatal neonatal lactic acidosis and Leigh-like
  encephalopathy.
