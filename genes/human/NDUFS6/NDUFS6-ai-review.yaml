core_functions:
- description: >-
    NDUFS6 is a non-catalytic accessory (supernumerary) subunit of mitochondrial respiratory
    Complex I, located in the peripheral (matrix) arm near the NADH-oxidising N-module. It has a
    structural role: through its CHCC zinc-binding motif it stabilises the N-module during Complex I
    assembly. It therefore contributes to, but does not independently enable, the complex-level
    NADH:ubiquinone oxidoreductase (NADH dehydrogenase) activity, and is required for assembly of a
    functional holoenzyme that performs mitochondrial electron transport from NADH to ubiquinone.
  molecular_function:
    id: GO:0005198
    label: structural molecule activity
  contributes_to_molecular_function:
    id: GO:0008137
    label: NADH dehydrogenase (ubiquinone) activity
  directly_involved_in:
  - id: GO:0032981
    label: mitochondrial respiratory chain complex I assembly
  - id: GO:0006120
    label: mitochondrial electron transport, NADH to ubiquinone
  locations:
  - id: GO:0005743
    label: mitochondrial inner membrane
  in_complex:
    id: GO:0045271
    label: respiratory chain complex I
  supported_by:
  - reference_id: PMID:27626371
    supporting_text: >-
      Accessory subunits are integral for assembly and function of human mitochondrial complex I
  - reference_id: file:human/NDUFS6/NDUFS6-uniprot.txt
    supporting_text: "Accessory subunit of the mitochondrial membrane respiratory"
proposed_new_terms: []
suggested_questions:
- question: >-
    Does the CHCC zinc-binding motif of NDUFS6 coordinate a structural zinc ion, and is this metal
    coordination required for N-module assembly/stability rather than for any redox chemistry?
suggested_experiments:
- description: >-
    Structure-guided mutagenesis of the NDUFS6 CHCC (zf-CHCC) cysteines/histidines followed by
    quantitative Complex I assembly and activity assays (BN-PAGE, complexome profiling) in NDUFS6
    knockout cells reconstituted with wild-type vs motif-mutant NDUFS6, to test whether zinc
    coordination is required for N-module stabilisation.
