- id: PMID:12611891
  title: The subunit composition of the human NADH dehydrogenase obtained by rapid
    one-step immunopurification.
  findings: []
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified. Immunopurification/MS identification of human Complex I subunits including
      NDUFS6 (IP fraction); supports complex membership and inner-membrane localisation.
- id: PMID:15372108
  title: NDUFS6 mutations are a novel cause of lethal neonatal mitochondrial complex
    I deficiency.
  findings: []
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified. Establishes NDUFS6 as a Complex I subunit whose loss causes assembly-defective
      complex I deficiency (fatal neonatal lactic acidosis); supports disease and assembly roles.
- id: PMID:27626371
  title: Accessory subunits are integral for assembly and function of human mitochondrial
    complex I.
  findings: []
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified. Systematic accessory-subunit knockouts + quantitative proteomics; basis for the
      UniProt FUNCTION statement (ECO:0000269|PubMed:27626371) that NDUFS6 is an accessory, non-catalytic
      subunit required for Complex I assembly/stability.
- id: PMID:28844695
  title: Architecture of Human Mitochondrial Respiratory Megacomplex I(2)III(2)IV(2).
  findings: []
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified. Cryo-EM megacomplex structure resolving individual Complex I subunits; supports
      NDUFS6 complex membership and inner-membrane localisation (ComplexPortal IDA/IPI source).
- id: PMID:30030361
  title: Assembly of mammalian oxidative phosphorylation complexes I-V and supercomplexes.
  findings: []
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified review of OXPHOS assembly; source for ComplexPortal NAS aerobic respiration and ATP
      synthesis annotations. Supports the 'supernumerary subunit / assembly-stability' framing; the ATP
      synthesis term is over-annotated at the subunit level.
- id: PMID:34800366
  title: Quantitative high-confidence human mitochondrial proteome and its dynamics
    in cellular context.
  findings: []
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified high-confidence mitochondrial proteome; source for the HTP mitochondrion
      localisation. Corroborates mitochondrial residence (broad term).
- id: PMID:9647766
  title: 'cDNA sequence and chromosomal localization of the remaining three human
    nuclear encoded iron sulphur protein (IP) subunits of complex I: the human IP
    fraction is completed.'
  findings: []
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified. Original cDNA cloning describing NDUFS6 as a 13 kDa IP-fraction subunit of Complex I;
      supports complex membership and the NADH->ubiquinone process. Its enables MF annotations reflect
      complex-level activity, not subunit catalysis.
- id: PMID:9878551
  title: 'cDNA of eight nuclear encoded subunits of NADH:ubiquinone oxidoreductase:
    human complex I cDNA characterization completed.'
  findings: []
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified. Foundational cDNA characterisation of human Complex I subunits; supports the core
      NADH->ubiquinone process and inner-membrane localisation. enables MF terms are complex-level.
