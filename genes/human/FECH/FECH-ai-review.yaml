id: P22830
gene_symbol: FECH
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  FECH is ferrochelatase (protoheme ferro-lyase; EC 4.98.1.1), the enzyme that
  catalyses the eighth and final, committed step of heme biosynthesis: the
  insertion of ferrous iron (Fe2+) into protoporphyrin IX to form protoheme
  (heme b). The mature protein is a homodimer bound to the matrix face of the
  mitochondrial inner membrane as a peripheral membrane protein, and each subunit
  carries a [2Fe-2S] cluster (coordinated by three C-terminal cysteines plus one
  additional ligand) that is required for enzyme activity and stability and may
  act as a nitric-oxide sensor. Iron for the reaction is delivered at the
  matrix-side active site, with frataxin implicated as an iron donor, and FECH
  associates with a mitochondrial heme-biosynthesis metabolon that includes the
  ABC transporters ABCB7 and ABCB10, mitoferrin-1 (SLC25A37) and the upstream
  enzyme protoporphyrinogen oxidase, coupling iron import to heme production.
  Loss-of-function variants cause erythropoietic protoporphyria (EPP1), in which
  protoporphyrin IX accumulates in erythrocytes, plasma and liver and produces
  painful cutaneous photosensitivity.
