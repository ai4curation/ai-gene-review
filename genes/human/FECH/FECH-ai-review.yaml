proposed_new_terms: []
suggested_questions:
- question: >-
    How is FECH activity dynamically regulated in vivo by partners such as PGRMC1
    and by the [2Fe-2S] cluster (proposed NO sensor), and how does this coordinate
    heme output with iron availability?
- question: >-
    What is the precise stoichiometry and architecture of the mitochondrial heme
    metabolon (FECH, ABCB7, ABCB10, mitoferrin-1, PPOX) and how does it channel iron
    and protoporphyrin IX to FECH?
suggested_experiments:
- description: >-
    Structure-guided reconstitution of the FECH-ABCB7-ABCB10 and FECH-mitoferrin-1
    complexes (cryo-EM) with functional iron-insertion assays to test metabolon
    channeling.
- description: >-
    Quantify how EPP1 variants that disrupt the [2Fe-2S] cluster ligands
    (C403/C406/C411) or substrate binding alter FECH activity, stability and
    protoporphyrin IX accumulation in erythroid cell models.
