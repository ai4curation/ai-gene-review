- description: >-
    Each FECH subunit coordinates a [2Fe-2S] cluster (via three C-terminal
    cysteines plus one additional ligand) that is required for enzyme activity and
    stability, and binds the ferrous iron substrate; these metal-binding activities
    support, but are secondary to, the catalytic ferrochelatase function.
