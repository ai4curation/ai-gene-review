core_functions:
- description: >-
    FECH is ferrochelatase, catalysing the terminal, committed step of heme
    biosynthesis: insertion of ferrous iron (Fe2+) into protoporphyrin IX to form
    protoheme (heme b). It acts as a homodimer on the matrix face of the
    mitochondrial inner membrane.
