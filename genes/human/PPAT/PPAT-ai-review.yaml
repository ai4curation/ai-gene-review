id: Q06203
gene_symbol: PPAT
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  PPAT is human amidophosphoribosyltransferase (ATase; glutamine
  phosphoribosylpyrophosphate amidotransferase, GPAT; EC 2.4.2.14), the enzyme
  that catalyses the first committed and rate-limiting step of de novo purine
  nucleotide biosynthesis. It transfers the amide nitrogen of L-glutamine to
  5-phospho-alpha-D-ribose 1-diphosphate (PRPP), producing 5-phospho-beta-D-
  ribosylamine (PRA) plus L-glutamate and diphosphate; PRA is the entry
  metabolite for the entire de novo purine branch leading to IMP and thence to
  AMP and GMP. The protein has an N-terminal type-2 glutamine amidotransferase
  domain (with an N-terminal-nucleophile cysteine exposed only after removal of
  an 11-residue propeptide) and a C-terminal phosphoribosyltransferase domain,
  binds Mg2+, and carries a [4Fe-4S] cluster required for activity. As the
  pathway's committed entry point it is allosterically feedback-inhibited by the
  purine mononucleotide end products AMP, GMP and IMP (which promote an inactive
  tetramer) and activated by its substrate PRPP (which favours the active
  dimer). It acts in the cytosol.
