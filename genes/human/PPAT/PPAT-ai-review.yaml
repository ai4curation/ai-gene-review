- term:
    id: GO:0009113
    label: purine nucleobase biosynthetic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: involved_in
  review:
    summary: >-
      InterPro2GO maps the PurF signature to "purine nucleobase biosynthetic
      process". PPAT actually produces the ribonucleotide precursor
      5-phospho-beta-D-ribosylamine, not a free purine nucleobase, so
      nucleobase biosynthesis is a slightly imprecise process; the accurate
      downstream process is de novo IMP biosynthesis.
    action: MODIFY
    reason: >-
      The essence (purine biosynthesis) is correct but the branch (nucleobase
      vs nucleotide) is imprecise for this enzyme, which makes the nucleotide
      precursor PRA. Replace with the accurate de novo IMP biosynthetic
      process.
    proposed_replacement_terms:
    - id: GO:0006189
      label: "'de novo' IMP biosynthetic process"
    supported_by:
    - reference_id: file:human/PPAT/PPAT-uniprot.txt
      supporting_text: "IMP biosynthesis via de novo pathway"
- term:
    id: GO:0005515
    label: protein binding
  evidence_type: IPI
  original_reference_id: PMID:28514442
  qualifier: enables
  review:
    summary: >-
      Bare "protein binding" from a high-throughput AP-MS interactome screen
      (BioPlex; IntAct-derived interaction with NUDT5, Q9UKK9). This term is
      uninformative about PPAT's molecular function and the interaction has no
      established functional consequence for the enzyme.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      Uninformative "protein binding" from a proteome-scale screen; retained (an
      experimental IPI) but flagged as over-annotation because it does not
      convey a meaningful molecular function.
