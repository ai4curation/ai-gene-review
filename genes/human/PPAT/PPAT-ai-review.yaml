- term:
    id: GO:0006177
    label: GMP biosynthetic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000107
  qualifier: involved_in
  review:
    summary: >-
      Ortholog-transfer (Ensembl Compara) annotation to the GMP-specific branch.
      PPAT catalyses only the single committed step producing PRA, upstream of
      IMP; the GMP-specific conversions are carried out by dedicated downstream
      enzymes (IMPDH, GMP synthase). Annotating PPAT directly to GMP
      biosynthesis over-states its involvement.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      Downstream branch-specific process; PPAT contributes only the shared
      upstream precursor. Over-propagated automated ortholog transfer rather
      than a directly supported role (kept, not removed).
- term:
    id: GO:0006189
    label: "'de novo' IMP biosynthetic process"
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: involved_in
  review:
    summary: >-
      PPAT's product 5-phospho-beta-D-ribosylamine is the first intermediate of
      the de novo IMP biosynthetic pathway (UniPathway UPA00074, step 1). This
      is the accurate de novo purine process for the enzyme.
    action: ACCEPT
    reason: >-
      Correct and precise process annotation; PPAT performs step 1/2 of the de
      novo IMP pathway per UniProt/UniPathway.
    supported_by:
    - reference_id: file:human/PPAT/PPAT-uniprot.txt
      supporting_text: "IMP biosynthesis via de novo pathway"
- term:
    id: GO:0044208
    label: "'de novo' AMP biosynthetic process"
  evidence_type: IEA
  original_reference_id: GO_REF:0000107
  qualifier: involved_in
  review:
    summary: >-
      Ortholog-transfer annotation to the AMP-specific de novo branch. As with
      the GMP branch, PPAT only provides the shared upstream precursor (PRA ->
      IMP); the AMP-specific steps use adenylosuccinate synthase/lyase.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      Downstream branch-specific process beyond PPAT's single committed step;
      over-propagated automated ortholog transfer (kept, not removed).
- term:
    id: GO:0097294
    label: "'de novo' XMP biosynthetic process"
  evidence_type: IEA
  original_reference_id: GO_REF:0000107
  qualifier: involved_in
  review:
    summary: >-
      Ortholog-transfer annotation to the XMP-specific de novo branch. XMP is
      produced from IMP by IMPDH, several steps downstream of PPAT's committed
      reaction; PPAT does not itself act in XMP-specific synthesis.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      Downstream branch-specific process; PPAT contributes only the shared
      precursor. Over-propagated automated ortholog transfer (kept, not
      removed).
