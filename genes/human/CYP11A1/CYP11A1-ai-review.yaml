    What is the physiological significance of CYP11A1 vitamin D3 /
    7-dehydrocholesterol metabolism (secosteroid production) relative to its canonical
    steroidogenic role?
- question: >-
    Is the CYP11A1-NLGN3 interaction reported in the yeast two-hybrid screen
    physiologically relevant, or an artifact of the screen?
