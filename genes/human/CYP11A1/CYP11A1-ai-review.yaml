core_functions:
- description: >-
    Cholesterol side-chain cleavage monooxygenase (P450scc): catalyzes the first and
    rate-limiting enzymatic step of steroidogenesis, converting cholesterol to
    pregnenolone through three sequential mono-oxygenations at the matrix face of the
    mitochondrial inner membrane, using electrons delivered by the ferredoxin (adrenodoxin)
    system.
  molecular_function:
    id: GO:0008386
    label: cholesterol monooxygenase (side-chain-cleaving) activity
  directly_involved_in:
  - id: GO:0006694
    label: steroid biosynthetic process
  locations:
  - id: GO:0005743
    label: mitochondrial inner membrane
  supported_by:
  - reference_id: PMID:21636783
    supporting_text: >-
      the precursor to all steroid hormones, pregnenolone, is synthesized from
      cholesterol by an enzyme complex comprising adrenodoxin reductase (AdR),
      adrenodoxin (Adx), and a cytochrome P450 (P450scc or CYP11A1)
- description: >-
    Heme binding: CYP11A1 binds a b-type heme via an axial cysteine thiolate (Cys462),
    the essential cofactor for its cytochrome P450 monooxygenase chemistry.
  molecular_function:
    id: GO:0020037
    label: heme binding
  locations:
  - id: GO:0005743
    label: mitochondrial inner membrane
  supported_by:
  - reference_id: PMID:21636783
    supporting_text: >-
      the [2Fe-2S] cluster of Adx is positioned 17.4 Å away from the heme iron of CYP11A1
