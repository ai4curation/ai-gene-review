    label: glucocorticoid biosynthetic process
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: involved_in
  review:
    summary: >-
      Phylogenetic (IBA) annotation to glucocorticoid biosynthesis. CYP11A1 is required
      upstream of glucocorticoid synthesis, but its own molecular activity is conversion
      of cholesterol to pregnenolone; the downstream glucocorticoid-specific steps
      (e.g. CYP11B1, CYP21A2) are carried out by other enzymes.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      CYP11A1 produces pregnenolone, the common precursor of ALL steroid classes, and is
      not committed to the glucocorticoid branch. Annotating it to glucocorticoid
      biosynthetic process attributes a downstream, branch-specific process to an enzyme
      that acts at the pathway entry point. The core biosynthetic role is better captured
      by C21-steroid hormone biosynthetic process (GO:0006700), steroid hormone
      biosynthetic process (GO:0120178) and cholesterol metabolic process (GO:0008203).
