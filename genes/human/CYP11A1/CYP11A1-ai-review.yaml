id: P05108
gene_symbol: CYP11A1
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  CYP11A1 (cytochrome P450 family 11 subfamily A member 1; also known as P450scc,
  cholesterol side-chain cleavage enzyme, or cholesterol desmolase; EC 1.14.15.6) is a
  mitochondrial inner-membrane, heme-thiolate cytochrome P450 monooxygenase. It catalyzes
  the first and rate-limiting enzymatic step of steroidogenesis: the conversion of
  cholesterol to pregnenolone, the common precursor of all steroid hormones. Catalysis
  proceeds through three sequential mono-oxygenation reactions on the cholesterol side
  chain (22-hydroxylation, 20-hydroxylation to give 20R,22R-dihydroxycholesterol, and
  scission of the C20-C22 bond) yielding pregnenolone and 4-methylpentanal. The enzyme
  receives electrons from NADPH through the mitochondrial ferredoxin electron-transfer
  system, comprising adrenodoxin reductase (FDXR) and adrenodoxin/ferredoxin (FDX1/FDX2),
  which docks onto CYP11A1 to deliver electrons to its heme iron. CYP11A1 is anchored to
  the matrix-facing side of the mitochondrial inner membrane and is highly expressed in
  steroidogenic tissues (adrenal cortex, gonads, placenta). Loss-of-function mutations
  cause congenital adrenal insufficiency with 46,XY sex reversal (AICSR), a lipoid
  congenital adrenal hyperplasia-like disorder in which impaired cleavage of cholesterol
  blocks synthesis of all adrenal and gonadal steroids.
