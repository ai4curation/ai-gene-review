id: Q16850
gene_symbol: CYP51A1
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: CYP51A1 encodes lanosterol 14-alpha-demethylase (sterol 14-alpha-demethylase;
  cytochrome P450 51A1; EC 1.14.14.154), a heme-thiolate cytochrome P450 monooxygenase
  anchored in the endoplasmic reticulum membrane. It catalyzes the first committed
  post-lanosterol step of cholesterol biosynthesis, the three-step oxidative removal
  of the 14-alpha-methyl group (C-32) of lanosterol and 24,25-dihydrolanosterol,
  which is released as formate to yield 4,4-dimethyl-cholesta-dienol intermediates
  (including follicular-fluid meiosis-activating sterol, FF-MAS). The reaction
  consumes three molecules of O2 and reducing equivalents delivered by
  NADPH-cytochrome P450 reductase, and requires a heme cofactor with an axial
  cysteine-coordinated iron. CYP51 is the most evolutionarily conserved cytochrome
  P450, present across animals, fungi, and plants; the fungal orthologs are the
  target of azole antifungal drugs, which also bind human CYP51A1.
