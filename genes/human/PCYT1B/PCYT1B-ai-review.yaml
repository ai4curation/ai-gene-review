- id: PMID:10480912
  title: Distribution of CTP:phosphocholine cytidylyltransferase (CCT) isoforms. Identification
    of a new CCTbeta splice variant.
  findings:
  - statement: CCTβ1 and CCTβ2 both localize to the endoplasmic reticulum, in
      contrast to CCTα which is also nuclear; CCTβ2 has in vitro enzymatic
      activity and complements the temperature-sensitive cytidylyltransferase
      defect in CHO58 cells.
    reference_section_type: ABSTRACT
    supporting_text: both CCTbeta1 and CCTbeta2 localized to the endoplasmic
      reticulum of cells, in contrast to CCTalpha which resided in the nucleus
      in addition to associating with the endoplasmic reticulum.
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: PubMed-verified abstract (full text not cached). Directly
      supports CCTβ enzymatic activity, ER localization, and isoform
      characterization for this gene.
- id: PMID:9593753
  title: Cloning and characterization of a second human CTP:phosphocholine cytidylyltransferase.
  findings:
  - statement: Cloning of CCTβ, a second human CCT distinct from CCTα; it
      requires lipid regulators for maximal activity, localizes to the
      cytoplasm, and its overexpression drives CCT activity, CDP-choline
      accumulation, and phosphatidylcholine synthesis.
    reference_section_type: ABSTRACT
    supporting_text: Transfection of COS-7 cells with a CCTbeta expression
      construct led to the overexpression of CCT activity, the accumulation of
      cellular CDP-choline, and enhanced radiolabeling of phosphatidylcholine.
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: PubMed-verified abstract (full text not cached). Original
      cloning/characterization paper for human CCTβ; establishes the enzyme,
      its lipid dependence, and cytoplasmic localization.
- id: Reactome:R-HSA-1483081
  title: PCho and CTP are condensed to CDP-Cho by PCYT1 dimer
  findings:
