description: >-
  PCYT1B (choline-phosphate cytidylyltransferase B, CCTβ) is the beta isoform of
  CTP:phosphocholine cytidylyltransferase (CCT), the enzyme that catalyzes the
  rate-limiting step of the CDP-choline (Kennedy) pathway of phosphatidylcholine
  biosynthesis. It converts phosphocholine and CTP into CDP-choline and
  diphosphate (EC 2.7.7.15). Like the CCTα paralog (PCYT1A), it is an
  amphitropic, membrane-activated enzyme whose activity depends on binding to
  lipid regulators; a catalytic cytidylyltransferase domain is followed by
  amphipathic helical repeats that sense and dock onto membranes, interconverting
  a soluble low-activity form and a membrane-bound active form. Unlike nuclear
  CCTα, CCTβ lacks the N-terminal nuclear localization signal and is localized to
  the cytoplasm and endoplasmic reticulum, where the active homodimer condenses
  phosphocholine and CTP. CCTβ has a more tissue-restricted expression pattern
  than the ubiquitous CCTα, with high transcript levels in gonad (testis,
  ovary), placenta, and brain, consistent with a role in supplying
  phosphatidylcholine in neural and reproductive tissues. Multiple alternatively
  spliced isoforms exist (β1 and β2 differ at the C-terminus and in their degree
  of phosphorylation).
