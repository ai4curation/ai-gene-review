id: P46977
gene_symbol: STT3A
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  STT3A is the catalytic subunit of the STT3A/OST-A oligosaccharyltransferase (OST) complex,
  a multi-subunit integral membrane enzyme of the endoplasmic reticulum that carries out the
  central step of protein N-linked glycosylation. The OST complex transfers a preassembled
  Glc3Man9GlcNAc2 oligosaccharide en bloc from the lipid carrier dolichyl-diphosphate onto
  asparagine residues within Asn-X-Ser/Thr sequons of nascent polypeptides (EC 2.4.99.18).
  STT3A is a multi-pass membrane protein that contains the enzyme active site together with the
  acceptor-peptide and donor lipid-linked oligosaccharide binding pockets, and uses a divalent
  metal ion (Mg2+/Mn2+) cofactor. Vertebrates encode two paralogous catalytic subunits, STT3A
  and STT3B, which assemble into two distinct complexes with complementary roles: the STT3A
  (OST-A) complex is physically associated with the SEC61 translocon and mediates co-translational
  glycosylation of most sequons as the nascent chain enters the ER lumen, whereas the STT3B (OST-B)
  complex acts post-translocationally on sites skipped by STT3A. STT3A-containing OST also
  contributes to glycosylation quality control by preventing hyperglycosylation of certain
  substrates before folding is complete. The OST-A complex shares core subunits (RPN1, RPN2,
  OST48/DDOST, OST4, DAD1, TMEM258) with OST-B and contains the accessory subunits DC2/OSTC and
  KRTCAP2/KCP2. Loss-of-function variants in STT3A cause congenital disorder of glycosylation
  type Iw (STT3A-CDG), in autosomal recessive and autosomal dominant forms.
