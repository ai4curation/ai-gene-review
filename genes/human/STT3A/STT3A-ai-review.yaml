    of the dolichyl-diphosphate-linked Glc3Man9GlcNAc2 oligosaccharide onto acceptor asparagines
    in N-X-S/T sequons (EC 2.4.99.18). STT3A contains the enzyme active site and the acceptor-peptide
    and donor lipid-linked-oligosaccharide binding pockets.
