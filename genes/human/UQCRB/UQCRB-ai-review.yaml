  label: Homo sapiens
description: >-
  UQCRB (ubiquinol-cytochrome c reductase binding protein; also QP-C / cytochrome b-c1
  complex subunit 7 / QCR7) is a small (~13.5 kDa, 111 aa) nuclear-encoded, non-catalytic
  structural subunit of mitochondrial respiratory Complex III (the cytochrome b-c1 complex /
  ubiquinol-cytochrome c oxidoreductase). It is one of the low-molecular-weight subunits of
  the 11-subunit complex; the redox catalysis of Complex III is carried out by the catalytic
  subunits cytochrome b, the Rieske iron-sulfur protein (UQCRFS1) and cytochrome c1, whereas
  UQCRB contributes to assembly and structural integrity of the complex rather than to
  catalysis. Complex III is an obligate dimer embedded as a peripheral protein on the matrix
  side of the mitochondrial inner membrane, and it associates with Complex I and Complex IV to
  form respiratory supercomplexes and megacomplexes. Within the electron transport chain,
  Complex III transfers electrons from ubiquinol to cytochrome c, coupling this redox reaction
  to proton translocation across the inner membrane (the Q cycle) and thereby contributing to
  oxidative phosphorylation and aerobic respiration. UQCRB was originally proposed to be the
  ubiquinone-binding protein, but this ubiquinone-binding role is no longer considered
  established. Loss-of-function variants in UQCRB cause mitochondrial complex III deficiency
  (nuclear type 3), a mitochondrial disorder that can present with hypoglycemia and lactic
  acidosis.
