    label: structural molecule activity
  evidence_type: ISS
  original_reference_id: file:human/UQCRB/UQCRB-uniprot.txt
  qualifier: enables
  review:
    summary: >-
      Proposed molecular function annotation. UQCRB has no informative molecular function in
      GOA (only the uninformative "protein binding" IPIs). As a non-catalytic subunit of
      Complex III, its molecular function is best captured as structural molecule activity,
      contributing to the structural integrity of the cytochrome b-c1 complex.
    action: NEW
    reason: >-
      The catalytic activity of Complex III (electron transfer from ubiquinol to cytochrome c)
      is carried by cytochrome b, the Rieske iron-sulfur protein and cytochrome c1; UQCRB is a
      low-molecular-weight, non-catalytic structural subunit. Structural molecule activity
      (GO:0005198) is the appropriate subunit-specific molecular function, and it is not
      currently represented in GOA. No catalytic activity is asserted for UQCRB.
    supported_by:
    - reference_id: file:human/UQCRB/UQCRB-uniprot.txt
      supporting_text: "Component of the ubiquinol-cytochrome c oxidoreductase, a"
