gene_symbol: NADSYN1
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: NADSYN1 (glutamine-dependent NAD(+) synthetase; EC 6.3.5.1) is a cytosolic
  homohexameric enzyme that catalyzes the final, committed step of nicotinamide adenine
  dinucleotide (NAD+) de novo biosynthesis. It performs the ATP-dependent amidation
  of deamido-NAD+ (nicotinate adenine dinucleotide, NaAD) to NAD+, using L-glutamine
  as the physiological nitrogen donor, which is hydrolyzed to L-glutamate. This same
  reaction is the last step of both the de novo (tryptophan/kynurenine) route and
  the Preiss-Handler route, which converge at deamido-NAD+. The protein is bifunctional,
  with an N-terminal carbon-nitrogen (CN) hydrolase / nitrilase-family glutaminase
  domain that hydrolyzes glutamine to supply ammonia in situ (catalytic nucleophile
  Cys-175) and a C-terminal NAD synthetase (ligase) domain that carries out the ATP-dependent
  amidation. NADSYN1 can also use free ammonia as an alternative amide donor, but
  its low KM for glutamine indicates glutamine is the physiological donor. Bi-allelic
  loss-of-function variants cause a congenital NAD deficiency disorder (Vertebral,
  cardiac, renal, and limb defects syndrome 3; VCRL3), an autosomal recessive, often
  lethal condition with cardiac, renal, vertebral, and limb malformations.
