      partial reaction of the enzyme, but it is an accessory/supporting activity subordinate
      to the core NAD+ synthase activity, not an independent metabolic role.
    action: KEEP_AS_NON_CORE
    reason: The glutaminase (CN-hydrolase) partial reaction is real and mechanistically
      essential (Cys-175 mutation abolishes glutamine-dependent NAD synthesis) but
      functions as the amide-donor-generating half-reaction of the glutamine-hydrolyzing
      NAD+ synthase; it is not a standalone glutaminase in physiology.
