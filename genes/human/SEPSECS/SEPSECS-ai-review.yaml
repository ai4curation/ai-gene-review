- id: PMID:10801173
  title: Identification of target antigen for SLA/LP autoantibodies in autoimmune
    hepatitis.
  findings:
  - statement: >-
      Identified SEPSECS (SLA/LP) as the sole target antigen of SLA/LP
      autoantibodies in autoimmune hepatitis and as the UGA-suppressor
      tRNA-associated protein component of the tRNP(Ser)Sec ribonucleoprotein.
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified. Establishes SEPSECS identity/antigenicity and its
      association with the tRNA(Sec)-containing particle; basis for the TAS
      tRNA-binding annotation. Abstract-only in cache.
- id: PMID:17142313
  title: RNA-dependent conversion of phosphoserine forms selenocysteine in eukaryotes
    and archaea.
  findings:
  - statement: >-
      SEPSECS (Sep-tRNA:Sec-tRNA synthase) is the terminal enzyme of the
      eukaryal/archaeal Sec pathway; purified recombinant SepSecS converts
      Sep-tRNA(Sec) to Sec-tRNA(Sec) in vitro and complements an E. coli SelA
      deletion in vivo.
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified; UniProt cites this for FUNCTION, CATALYTIC ACTIVITY,
      PATHWAY, COFACTOR and Lys284 mutagenesis. Basis for the core-function IDA
      annotations. Cache is abstract-only but the assertions are also anchored
      in UniProt.
- id: PMID:19608919
  title: The human SepSecS-tRNASec complex reveals the mechanism of selenocysteine
    formation.
  findings:
  - statement: >-
      Crystal structure of human SepSecS with tRNA(Sec), phosphoserine and
      thiophosphate defines a PLP-dependent mechanism; SepSecS is a homotetramer
      (catalytic + non-catalytic dimer) binding two tRNA(Sec) via their
      acceptor-TPsiC-variable arms, with PLP covalently linked to Lys284.
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified; full text available in cache. Supports tetramer, tRNA
      binding, PLP cofactor/Lys284 and the catalytic mechanism.
- id: PMID:22190034
  title: Global landscape of HIV-human protein complexes.
  findings:
  - statement: >-
      Large-scale HIV-host affinity-capture/MS screen; source of the IPI
      "protein binding" annotation reporting an interaction of SEPSECS with the
      HIV-1 Gag polyprotein (a xeno interaction).
  reference_review:
    relevance: LOW
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified. Correctly cited for a viral-host interactome hit; not a
      native functional partner, so the derived "protein binding" term is
      non-core.
- id: PMID:28414460
  title: Analysis of Novel Interactions between Components of the Selenocysteine Biosynthesis
    Pathway, SEPHS1, SEPHS2, SEPSECS, and SECp43.
  findings:
  - statement: >-
      SEPSECS, SECp43 (TRNAU1AP) and selenophosphate synthetases SEPHS1/SEPHS2
      form oligomers in eukaryotic cells; SEPHS2 interacts with SEPSECS. Basis
      for the experimentally determined cytoplasmic localization.
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified; UniProt cites this for SUBUNIT and SUBCELLULAR LOCATION
      (Cytoplasm). Abstract-only in cache.
- id: PMID:36929010
  title: Structural basis for the tRNA-dependent activation of the terminal complex
    of selenocysteine synthesis in humans.
  findings:
  - statement: >-
      High-resolution structures show tRNA(Sec) binding drives conformational
