id: Q9HD40
gene_symbol: SEPSECS
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  SEPSECS (O-phosphoseryl-tRNA(Sec) selenium transferase, also known as
  selenocysteine synthase / Sec synthase / SepSecS, and historically as the
  SLA/LP soluble liver antigen) is a pyridoxal 5'-phosphate (PLP)-dependent
  enzyme that catalyzes the terminal step of selenocysteine (Sec) biosynthesis.
  In archaea and eukaryotes, Sec is uniquely synthesized on its cognate
  tRNA(Sec): seryl-tRNA(Sec) is phosphorylated by PSTK to
  O-phospho-L-seryl-tRNA(Sec), which SEPSECS then converts, using selenophosphate
  (produced by SEPHS2) as the selenium donor, into L-selenocysteinyl-tRNA(Sec)
  (EC 2.9.1.2). The charged Sec-tRNA(Sec) is subsequently delivered by the
  specialized elongation factor EEFSEC to recode in-frame UGA codons during
  translation of selenoprotein mRNAs. SEPSECS assembles into a homotetramer
  comprising a catalytic dimer and a non-catalytic dimer that acts as a binding
  platform orienting two tRNA(Sec) molecules for catalysis; the PLP cofactor is
  covalently bound through a Schiff base to the active-site lysine (Lys284). The
  enzyme acts specifically on phosphoserine attached to tRNA(Sec), not on free
  phosphoserine. It localizes to the cytoplasm/cytosol and can associate with
  other components of the selenocysteine-synthesis machinery (SEPHS1, SEPHS2,
  TRNAU1AP/SECp43). Loss-of-function mutations in SEPSECS cause autosomal
  recessive pontocerebellar hypoplasia type 2D (progressive cerebello-cerebral
  atrophy), underscoring the requirement for selenoprotein biosynthesis in the
  developing nervous system.
