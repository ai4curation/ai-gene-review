core_functions:
- description: >-
    SEPSECS catalyzes the terminal, PLP-dependent step of selenocysteine
    biosynthesis, converting O-phospho-L-seryl-tRNA(Sec) plus selenophosphate to
    L-selenocysteinyl-tRNA(Sec) (EC 2.9.1.2). Acting as a homotetramer in the
    cytosol, it binds tRNA(Sec) and, with pyridoxal 5'-phosphate as an
    obligatory cofactor covalently bound to Lys284, performs the Sep-to-Sec
    conversion on the tRNA, producing the charged Sec-tRNA(Sec) used for
    selenoprotein synthesis.
  molecular_function:
    id: GO:0098621
    label: O-phosphoseryl-tRNA(Sec) selenium transferase activity
  directly_involved_in:
    - id: GO:0001717
      label: conversion of seryl-tRNAsec to selenocys-tRNAsec
    - id: GO:0016260
      label: L-selenocysteine biosynthetic process
  locations:
    - id: GO:0005829
      label: cytosol
  supported_by:
    - reference_id: PMID:17142313
      supporting_text: >-
        purified recombinant SepSecS converts Sep-tRNA(Sec) into Sec-tRNA(Sec)
        in vitro
    - reference_id: file:human/SEPSECS/SEPSECS-uniprot.txt
      supporting_text: >-
        Reaction=O-phospho-L-seryl-tRNA(Sec) + selenophosphate + H2O = L-
- description: >-
    SEPSECS binds pyridoxal 5'-phosphate (PLP) as its catalytic cofactor,
    covalently attached through a Schiff base to the active-site Lys284;
    removal or reduction of PLP abolishes activity, establishing PLP binding as
    integral to the enzyme's function.
  molecular_function:
    id: GO:0030170
    label: pyridoxal phosphate binding
  locations:
    - id: GO:0005829
      label: cytosol
  supported_by:
    - reference_id: file:human/SEPSECS/SEPSECS-uniprot.txt
      supporting_text: >-
        Name=pyridoxal 5'-phosphate
    - reference_id: PMID:19608919
      supporting_text: >-
        Each SepSecS monomer has a PLP cofactor covalently linked to the
        Nε-amino group of the conserved Lys284
- description: >-
    SEPSECS binds tRNA(Sec) as an essential part of its catalytic cycle: the
    homotetramer engages the acceptor-, TPsiC-, and variable arms of tRNA(Sec),
    and this tRNA binding orients the substrate and activates the catalytic
    active site.
  molecular_function:
    id: GO:0000049
    label: tRNA binding
  directly_involved_in:
    - id: GO:0001717
      label: conversion of seryl-tRNAsec to selenocys-tRNAsec
  locations:
    - id: GO:0005829
      label: cytosol
  supported_by:
    - reference_id: PMID:19608919
      supporting_text: >-
        SepSecS binds only to the acceptor-, TΨC-, and variable arms of tRNASec
    - reference_id: PMID:36929010
      supporting_text: >-
        organizes the active sites of the catalytic protomer
proposed_new_terms: []
suggested_questions:
- question: >-
    Is there any physiologically relevant regulation of SEPSECS activity (e.g.
    by phosphorylation at Ser14, or by selenium status), or is flux through the
    Sec pathway controlled entirely upstream (SEPHS2/PSTK)?
- question: >-
    Do the reported associations with SEPHS1, SEPHS2 and TRNAU1AP (SECp43)
    represent a stable channeling complex in vivo, or transient interactions?
suggested_experiments:
- description: >-
    Quantitative in vitro kinetic characterization of purified human SEPSECS
    with defined Sep-tRNA(Sec) and selenophosphate substrates, including PCH2D
    variants (A239T, T325S, Y334C), to relate residual catalytic activity to
    disease severity.
- description: >-
    Endogenous subcellular fractionation and proximity-labeling (e.g. BioID) in
    human neuronal cells to define the SEPSECS interactome and confirm the
    exclusively cytosolic localization.
