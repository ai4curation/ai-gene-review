    label: mitochondrial inner membrane
  - id: GO:0005739
    label: mitochondrion
  supported_by:
  - reference_id: PMID:24385928
    supporting_text: >-
      role of UQCC2 as a complex III assembly factor that cooperates with UQCC1
  - reference_id: file:human/UQCC2/UQCC2-uniprot.txt
    supporting_text: Predominantly expressed in the mitochondrial inner
      membrane.
proposed_new_terms: []
suggested_questions:
- question: >-
    Does UQCC2 have any role beyond MT-CYB translation/stabilisation, and is its nucleoid
    association functionally meaningful or merely a consequence of its inner-membrane/matrix
    localisation near mtDNA?
- question: >-
    Which residues of UQCC2 mediate the UQCC1 interaction and MT-CYB stabilisation, and could a
    more specific molecular function term (e.g. a translational-activator or chaperone activity)
    be justified beyond `protein binding`?
suggested_experiments:
- description: >-
    Structural/crosslinking analysis of the human UQCC1-UQCC2 (and COMA/COMB/COMC) complexes
    bound to nascent MT-CYB to define UQCC2's precise molecular role and any specific activity.
- description: >-
    Ribosome profiling / mitochondrial translation assays in UQCC2-null versus rescued cells to
    quantify the MT-CYB translational-activation defect independently of protein stability.
