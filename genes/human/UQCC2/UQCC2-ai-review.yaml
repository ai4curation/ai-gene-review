gene_symbol: UQCC2
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  UQCC2 (ubiquinol-cytochrome c reductase complex assembly factor 2; also known as MNF1,
  M19 and C6orf125) is a small (126 aa) nuclear-encoded mitochondrial assembly factor for
  respiratory chain Complex III (cytochrome bc1 / ubiquinol-cytochrome c oxidoreductase).
  It is imported into mitochondria via an N-terminal transit peptide and localises
  predominantly to the mitochondrial inner membrane, with additional pools reported in the
  matrix and mitochondrial nucleoid. UQCC2 is the human ortholog of Saccharomyces cerevisiae
  Cbp6p and partners with UQCC1 (the ortholog of Cbp3p); the two proteins are mutually
  required for each other's stability. The UQCC1-UQCC2 module activates translation of, and
  stabilises, the mitochondrially-encoded cytochrome b subunit (MT-CYB), delivering it to an
  early Complex III assembly intermediate. UQCC2 is non-catalytic. Loss-of-function causes
  mitochondrial complex III deficiency, nuclear type 7 (MC3DN7), presenting with severe
  intrauterine growth retardation, neonatal lactic acidosis and renal tubular dysfunction.
