core_functions:
- description: >-
    Mitochondrial Complex III (cytochrome bc1) assembly factor that, in a complex with UQCC1,
    activates translation of and stabilises the mtDNA-encoded cytochrome b subunit (MT-CYB) and
    delivers it into early Complex III assembly intermediates in the mitochondrial inner
    membrane. UQCC2 is non-catalytic, so no molecular_function term is assigned (only bare
    `protein binding` is available in GOA).
  directly_involved_in:
  - id: GO:0034551
    label: mitochondrial respiratory chain complex III assembly
  locations:
