- term:
    id: GO:0070131
    label: positive regulation of mitochondrial translation
  evidence_type: IDA
  original_reference_id: PMID:24385928
  qualifier: involved_in
  review:
    summary: >-
      UQCC2 (with UQCC1) activates translation of, and stabilises, mtDNA-encoded cytochrome b
      (MT-CYB). Patient cells show a specific defect in cytochrome b protein synthesis/stability
      despite normal MT-CYB mRNA levels, consistent with a positive role in mitochondrial
      translation of this transcript.
    action: ACCEPT
    reason: >-
      The UQCC1-UQCC2 module functions analogously to the yeast Cbp3p-Cbp6p translational
      activators of cytochrome b; the human data (specific loss of cytochrome b protein with
      unaffected mRNA) support a positive-regulation-of-mitochondrial-translation role for the
      MT-CYB transcript.
    supported_by:
    - reference_id: PMID:24385928
      supporting_text: >-
        activate translation of mtDNA-encoded cytochrome b, bind and stabilize the newly
        synthesized protein
    - reference_id: PMID:24385928
      supporting_text: MT-CYB mRNA levels were unaffected in patient cells
    - reference_id: PMID:24385928
      supporting_text: >-
        a striking and specific defect in cytochrome b protein levels was observed
