proposed_new_terms:
- proposed_name: alkylcobalamin:glutathione S-alkyltransferase activity
  proposed_definition: >-
    Catalysis of the reaction: an R-cob(III)alamin + glutathione = cob(I)alamin + an S-substituted
    glutathione + H(+). This is the EC 2.5.1.151 activity of MMACHC/CblC that dealkylates
    alkylcobalamins (methylcobalamin, adenosylcobalamin) using glutathione as the nucleophile.
  justification: >-
    GO currently has no molecular-function term specific to EC 2.5.1.151; MMACHC's dealkylase
    activity is mapped to the general parent GO:0016765 (transferase, transferring alkyl or aryl
    other than methyl) and, imprecisely, to demethylase activity. A dedicated term would allow
    accurate annotation of this well-characterized cobalamin-processing chemistry.
  proposed_parent:
    id: GO:0016765
    label: transferase activity, transferring alkyl or aryl (other than methyl) groups
suggested_questions:
- question: >-
    What are the physiological electron donor(s) and cytosolic flavoprotein oxidoreductase
    partner(s) that supply reducing equivalents to MMACHC for reductive decyanation in vivo?
- question: >-
    How is cobalamin handed off from MMACHC to MMADHC and the downstream MTR (methyl branch) versus
    the mitochondrial MMUT (adenosyl branch), and what governs the partitioning between the two arms?
suggested_experiments:
- description: >-
    Structure/cryo-EM of the cytosolic MMACHC-MMADHC-MTR(-MTRR) processing complex with bound
    cobalamin to define the cofactor hand-off pathway and the structural basis of partitioning.
- description: >-
    Cell-based flux assays in MMACHC-null cells complemented with decyanation- versus
    dealkylation-selective mutants (e.g. R161Q) to dissect the relative in vivo contributions of the
    two catalytic activities to MeCbl and AdoCbl pools.
