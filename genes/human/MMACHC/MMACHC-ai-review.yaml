  review:
    summary: >-
      Phylogenetic inference of demethylase activity, reflecting MMACHC's dealkylation of
      methylcobalamin. Mechanistically MMACHC removes the methyl group from cobalamin by
      glutathione-dependent nucleophilic S-alkyltransfer, not classic substrate demethylation;
