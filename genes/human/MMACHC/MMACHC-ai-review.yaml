- description: >-
    Glutathione-dependent dealkylation of alkylcobalamins: transfers the alkyl group (methyl from
    methylcobalamin, adenosyl from adenosylcobalamin) to the thiolate of glutathione by nucleophilic
    displacement, yielding cob(I)alamin and an S-alkylglutathione (EC 2.5.1.151), so incoming
    alkylcobalamins are converted to a common intermediate for both cofactor pools.
