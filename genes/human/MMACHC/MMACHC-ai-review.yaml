id: Q9Y4U1
gene_symbol: MMACHC
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  MMACHC (CblC; "cyanocobalamin reductase / alkylcobalamin dealkylase") is the cytosolic
  vitamin B12 (cobalamin) processing chaperone-enzyme that performs the first intracellular
  tailoring step on incoming dietary/circulating cobalamin. It removes the upper axial (beta)
  ligand of cob(III)alamin to generate a common cob(II)alamin/cob(I)alamin intermediate that
  is then partitioned to the two downstream B12-dependent enzymes: methylcobalamin for cytosolic
  methionine synthase (MTR) and 5'-deoxyadenosylcobalamin for mitochondrial methylmalonyl-CoA
  mutase (MMUT). Using a divergent NADPH-dependent flavin reductase (nitroreductase-like)
  scaffold with FAD or FMN as prosthetic group, it catalyzes reductive decyanation of
  cyanocobalamin (the inactive dietary form) to cob(II)alamin plus cyanide (EC 1.16.1.6), and,
  via an arginine-rich glutathione-binding pocket, glutathione-dependent dealkylation of
  alkylcobalamins (methyl- and adenosylcobalamin) by nucleophilic displacement of the alkyl
  group to yield cob(I)alamin and an S-alkylglutathione (EC 2.5.1.151); cysteine and
  homocysteine cannot substitute for glutathione. Cobalamin is bound in the base-off
  configuration. MMACHC binds cobalamin and interacts with the CblD protein MMADHC (which
  partitions cofactor between the methyl- and adenosylcobalamin routes) and with the lysosomal
  B12 exporters LMBD1/LMBRD1 and ABCD4 that deliver cobalamin to it, and it participates in a
  cytosolic multiprotein processing complex with MMADHC, MTR and MTRR. Loss of MMACHC function
  causes cblC disease (combined methylmalonic aciduria and homocystinuria), the most common
  inborn error of intracellular cobalamin metabolism, because both the adenosylcobalamin and
  methylcobalamin arms are simultaneously deprived of their cofactor.
