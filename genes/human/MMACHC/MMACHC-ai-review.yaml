core_functions:
- description: >-
    Reductive decyanation of cyanocobalamin: cleaves the Co-CN bond of dietary cyanocob(III)alamin
    using FAD/FMN and NADPH to produce cob(II)alamin plus cyanide, generating the common
    intermediate for downstream active-cofactor synthesis (EC 1.16.1.6).
  molecular_function:
    id: GO:0033787
