- id: PMID:12411443
  title: ERdj5, an endoplasmic reticulum (ER)-resident protein containing DnaJ and thioredoxin domains, is expressed in secretory cells or following ER stress.
  findings:
  - statement: ERdj5 is an ER-resident protein with DnaJ, PDI and thioredoxin domains; it interacts via its DnaJ domain with BiP in an ATP-dependent manner and is induced during ER stress.
    reference_section_type: ABSTRACT
- id: PMID:18400946
  title: ERdj4 and ERdj5 are required for endoplasmic reticulum-associated protein degradation of misfolded surfactant protein C.
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: Cached publication title matches PubMed; body confirms ERdj5/DNAJC10
      is required for ERAD of misfolded substrate and acts via stimulation of BiP
      ATPase. GOA anchors this PMID to GO:0036503 (ERAD pathway, IMP), GO:0034663
      and GO:0051787, supporting DNAJC10's ER-chaperone/ERAD role.
  findings:
  - statement: ERdj5 shows prolonged specific association with misfolded SP-C and is required for its ERAD; knockdown increases ER retention and inhibits degradation.
    reference_section_type: ABSTRACT
  - statement: ERdj5 promotes turnover of misfolded SP-C in a manner dependent on its ability to stimulate BiP ATPase activity.
    reference_section_type: ABSTRACT
- id: PMID:19122239
  title: ERdj5 sensitizes neuroblastoma cells to endoplasmic reticulum stress-induced apoptosis.
  findings:
  - statement: Overexpressed ERdj5 promotes ER-stress-induced apoptosis and down-regulates the UPR by inhibiting PERK-mediated eIF2alpha phosphorylation.
    reference_section_type: ABSTRACT
- id: PMID:19706418
  title: IntAct molecular interaction dataset (DNAJC10-FOXRED2).
  findings: []
- id: PMID:19815549
  title: IntAct molecular interaction dataset.
  findings: []
- id: PMID:19946888
  title: Large-scale proteomics analysis of a membrane fraction.
  findings: []
- id: PMID:23769672
  title: ERdj5 is the ER reductase that catalyzes the removal of non-native disulfides and correct folding of the LDL receptor.
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: Cached publication title matches PubMed; body confirms ERdj5/DNAJC10
      is the ER protein-disulfide reductase that removes non-native disulfides and
      folds LDLR in a BiP-dependent manner. GOA anchors this PMID to GO:0015035
      (protein-disulfide reductase activity, IDA) - the core MF.
  findings:
  - statement: ERdj5 is the ER reductase that removes non-native disulfides, both preparing misfolded proteins for degradation and catalyzing folding of proteins with obligatory non-native disulfides (e.g. LDLR).
    reference_section_type: ABSTRACT
  - statement: ERdj5's role in LDLR folding is dependent on its interaction with BiP; the J-domain HPD->QPD (H63Q) mutation prevents BiP binding.
    reference_section_type: RESULTS
- id: PMID:37739037
  title: Mechanistic characterization of disulfide bond reduction of an ERAD substrate mediated by cooperation between ERdj5 and BiP.
  findings:
  - statement: ERdj5 cooperates with BiP to reduce disulfide bonds in an ERAD substrate; thioredoxin domain 4 is the most efficient reductase domain.
    reference_section_type: ABSTRACT
- id: file:human/DNAJC10/DNAJC10-uniprot.txt
  title: UniProt entry Q8IXB1 (DJC10_HUMAN), Endoplasmic reticulum disulfide reductase DNAJC10 / ERdj5
  findings:
  - statement: ER disulfide reductase (EC 1.8.4.2) that collaborates with BiP/HSPA5 to reduce non-native disulfides for correct folding or ERAD degradation; J domain binds BiP, four thioredoxin domains are redox-active; ER-lumen localized.
    reference_section_type: OTHER
