    label: apolipoprotein A-I receptor activity
  description: ABCA1 binds apoA-I and other exchangeable apolipoproteins, including 
    APOE, to drive cellular cholesterol and phospholipid efflux, nascent HDL particle 
    assembly, and reverse cholesterol transport. This lipidation activity is the ABCA1 
    function most directly connected to APOE biology.
