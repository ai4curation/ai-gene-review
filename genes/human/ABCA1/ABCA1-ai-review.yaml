      ABCA-family lipid transporter that moves phospholipids, supports cholesterol 
      efflux, and enables apolipoprotein-dependent nascent HDL formation.
    action: ACCEPT
    reason: Accept as core. UniProt and cached primary studies support ABCA1 as an 
      ATP-binding cassette lipid transporter that couples ATP hydrolysis to phospholipid
      translocation/floppase activity, binds apoA-I and other exchangeable 
      apolipoproteins, and drives cholesterol/phospholipid efflux and nascent HDL 
