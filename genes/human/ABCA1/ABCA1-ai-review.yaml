id: O95477
gene_symbol: ABCA1
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: 'ABCA1 encodes a large ATP-binding cassette subfamily A multipass membrane transporter
  that uses ATP binding and hydrolysis to move phospholipids across membrane leaflets and
  to support cholesterol/phospholipid efflux to apolipoproteins. It localizes mainly to the
  plasma membrane and cell surface with endosomal/vesicular trafficking, binds apoA-I and
  other exchangeable apolipoproteins including apoE, and promotes nascent HDL particle formation,
  reverse cholesterol transport, and cellular lipid homeostasis. Loss of ABCA1 function causes
  Tangier disease and familial HDL deficiency, and in brain-relevant lipid biology ABCA1 is
  important for APOE lipidation and cholesterol handling.'
