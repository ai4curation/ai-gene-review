core_functions:
- molecular_function:
    id: GO:0140326
    label: ATPase-coupled intramembrane lipid transporter activity
  description: ABCA1 uses ATP binding and hydrolysis to translocate phospholipids across
    membrane leaflets, with direct support for phosphatidylcholine, phosphatidylserine, 
    and sphingomyelin movement and for extracellular phospholipid extraction at the 
    plasma membrane.
