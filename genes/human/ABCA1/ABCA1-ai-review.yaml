suggested_questions:
- question: Which Alzheimer-relevant ABCA1 variants primarily impair apoE lipidation 
    versus ATP-coupled phospholipid translocation, cell-surface localization, or 
    endosomal trafficking?
  experts:
  - ABC transporter experts
  - Alzheimer lipid biology experts
- question: Should ABCA1 apoA-I-triggered Cdc42/cAMP signaling be curated as a secondary
    signaling branch, or only retained when directly tied to lipid efflux assays?
  experts:
  - GO signaling curators
  - lipid transport curators
- question: How should brain-cell-type ABCA1 activity be represented for astrocytes, 
    microglia, neurons, and vascular cells when the strongest biochemical evidence comes
    from macrophage/fibroblast systems?
  experts:
  - neuroglia lipid metabolism experts
  - Alzheimer genetics experts
suggested_experiments:
- description: Measure apoE isoform lipidation, cholesterol efflux, and phospholipid 
    export in endogenous human astrocyte and microglial ABCA1 knockout/rescue systems.
  hypothesis: ABCA1 Alzheimer-relevant effects are driven by coupled apoE lipidation and
    phospholipid/cholesterol efflux rather than by generic signaling outputs.
  experiment_type: endogenous brain-cell lipidation and efflux assay
- description: Separate ABCA1 phosphatidylcholine/phosphatidylserine/sphingomyelin 
    translocation from cholesterol efflux using purified transporter reconstitution and 
    matched cell-surface localization mutants.
  hypothesis: Direct phospholipid translocation is the proximal transporter activity 
    that enables downstream cholesterol efflux and HDL particle assembly.
  experiment_type: reconstituted transporter and localization-mutant assay
