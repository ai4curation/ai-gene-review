core_functions:
- description: Cullin-RING ligase (CRL/SCF) substrate-receptor exchange factor that binds unneddylated cullin-RBX cores and promotes exchange of the F-box (substrate-recognition) subunit, regulating the dynamic assembly and cellular repertoire of SCF complexes. CAND2 is a regulator/assembly factor, not a ligase.
  molecular_function:
    id: GO:0097602
    label: cullin family protein binding
  supported_by:
  - reference_id: file:human/CAND2/CAND2-uniprot.txt
    supporting_text: Probable assembly factor of SCF (SKP1-CUL1-F-box protein) E3 ubiquitin ligase complexes that promotes the exchange of the substrate-recognition F-box subunit in SCF complexes
  directly_involved_in:
  - id: GO:0010265
    label: SCF complex assembly
