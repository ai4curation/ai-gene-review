id: O75155
gene_symbol: CAND2
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  CAND2 (Cullin-associated NEDD8-dissociated protein 2; also TIP120B,
  TBP-interacting protein of 120 kDa B) is a large (~1236 aa) HEAT-repeat
  (alpha-solenoid) protein and the paralog of CAND1. Like CAND1, it functions as
  a regulator of cullin-RING ubiquitin ligase (CRL/SCF) assembly rather than as
  a ligase itself: it binds unneddylated, substrate-receptor-free cullin-RBX
  cores and acts as a substrate-receptor exchange factor, sequestering cullins
  and accelerating the dissociation/exchange of F-box (and other
  substrate-recognition) modules to dynamically reshape the cellular repertoire
  of active CRL complexes. CAND2 has no catalytic ubiquitin-ligase activity of
  its own. It was originally identified as a TBP-interacting protein expressed
  preferentially in muscle and induced during myogenesis, with reported
  interactions with the transcription-related factors TBP and CNOT3/NOT3, and it
  is a specific in vitro substrate of the HECT E3 ligase UBE3C/KIAA10, which
  targets it for proteasomal degradation. CAND2 is enriched in skeletal muscle
  and is also found in epididymis; subcellular pools are reported in both the
  nucleus and the cytosol.
