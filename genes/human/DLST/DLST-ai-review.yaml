    label: generation of precursor metabolites and energy
  evidence_type: TAS
  original_reference_id: PMID:8009371
  qualifier: involved_in
  review:
    summary: Author-statement (TAS) annotation to the broad process generation of precursor
      metabolites and energy, from the cloning/mapping paper for the human E2k
      (dihydrolipoyl succinyltransferase) of the alpha-ketoglutarate dehydrogenase complex.
      This reflects the TCA-cycle role but at a very general level.
    action: MARK_AS_OVER_ANNOTATED
    reason: Not wrong but uninformatively broad; the specific processes (tricarboxylic acid
      cycle, 2-oxoglutarate metabolic process, 2-oxoglutarate decarboxylation to
      succinyl-CoA) are already annotated with better evidence.
