- term:
    id: GO:0016020
    label: membrane
  evidence_type: HDA
  original_reference_id: PMID:19946888
  qualifier: located_in
  review:
    summary: High-throughput proteomics (HDA) placing DLST in a membrane fraction from a
      study defining the NK-cell membrane proteome. DLST is a soluble mitochondrial-matrix
      enzyme with no transmembrane region.
    action: MARK_AS_OVER_ANNOTATED
    reason: DLST has no membrane domain and is a soluble matrix protein; a membrane-fraction
      co-purification does not reflect a genuine membrane localization. This is a
      proteomic-survey artifact and not a core (or accurate) localization.
    supported_by:
    - reference_id: PMID:19946888
      supporting_text: Defining the membrane proteome of NK cells.
    - reference_id: file:human/DLST/DLST-uniprot.txt
      supporting_text: Mitochondrion matrix
- term:
    id: GO:0005634
    label: nucleus
  evidence_type: HDA
  original_reference_id: PMID:21630459
  qualifier: located_in
  review:
    summary: High-throughput proteomics (HDA) detecting DLST in a human sperm nucleus
      proteome. A genuine nuclear pool of DLST/the OGDH complex exists (per focused KAT2A
      work), but this HDA is a proteomic-survey localization in a specialized cell type.
    action: KEEP_AS_NON_CORE
    reason: The nuclear pool of DLST is real but minor and moonlighting; retain as non-core
      rather than as a defining localization. Independently supported by KAT2A/histone-
      succinylation work.
    supported_by:
    - reference_id: PMID:29211711
      supporting_text: about 1–1.6% of total OGDH, DLST, and DLD was localized in the
        nucleus
