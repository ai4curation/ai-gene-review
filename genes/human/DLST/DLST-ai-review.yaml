        brain cDNA
- term:
    id: GO:0033512
    label: L-lysine catabolic process to acetyl-CoA via L-saccharopine
  evidence_type: IDA
  original_reference_id: PMID:29191460
  qualifier: involved_in
  review:
    summary: Proposed annotation capturing DLST's role in L-lysine catabolism. As the E2
      of the 2-oxoadipate dehydrogenase complex (with the DHTKD1 E1 and shared DLD E3),
      DLST carries out the final glutaryl-transfer step of the saccharopine pathway of
      L-lysine (and L-tryptophan) degradation, forming glutaryl-CoA. UniProt records this
      pathway (L-lysine degradation via saccharopine; glutaryl-CoA from L-lysine, step
      6/6) and the shared-E2 function was demonstrated experimentally.
    action: NEW
    reason: DLST participates in lysine catabolism via its shared role in the 2-oxoadipate
      dehydrogenase complex; this process is supported by UniProt PATHWAY and by
      experimental reconstitution of the OADHC, and is not otherwise represented in the
      existing annotations.
    supported_by:
    - reference_id: PMID:29191460
      supporting_text: specific to the 2-oxoadipate dehydrogenase complex
    - reference_id: file:human/DLST/DLST-uniprot.txt
      supporting_text: 'Amino-acid degradation; L-lysine degradation via saccharopine'
