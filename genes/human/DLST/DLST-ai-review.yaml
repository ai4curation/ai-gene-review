id: P36957
gene_symbol: DLST
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: DLST is the E2 (dihydrolipoyllysine-residue succinyltransferase, EC 2.3.1.61)
  core component of the mitochondrial 2-oxoglutarate (alpha-ketoglutarate) dehydrogenase
  complex (OGDHC), a megadalton enzyme of the tricarboxylic acid (TCA) cycle assembled
  from the E1 component OGDH, multiple copies of the DLST E2 core, and the shared E3
  component DLD. Within the complex DLST carries a covalently attached lipoyl cofactor
  on an N-terminal lipoyl-binding domain; the lipoyl arm is succinylated by E1 during
  oxidative decarboxylation of 2-oxoglutarate, and DLST then transfers the succinyl
  group to coenzyme A to generate succinyl-CoA. The same DLST E2 core, together with
  the shared DLD E3, also serves the 2-oxoadipate dehydrogenase complex (OADHC) in which
  the DHTKD1 E1 oxidatively decarboxylates 2-oxoadipate; here DLST acts as a
  dihydrolipoyllysine-residue glutaryltransferase forming glutaryl-CoA in the final step
  of L-lysine (and L-tryptophan) catabolism via the saccharopine pathway. DLST is
  predominantly localized to the mitochondrial matrix. A small nuclear fraction of the
  2-oxoglutarate dehydrogenase complex associates with the acetyltransferase KAT2A/GCN5
  on chromatin and provides locally generated succinyl-CoA for histone H3 lysine
  succinylation. Germline loss-of-function variants in DLST cause an autosomal dominant
  pheochromocytoma/paraganglioma predisposition syndrome (PPGL7).
