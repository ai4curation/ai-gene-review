- id: PMID:27346687
  title: DNAJC21 Mutations Link a Cancer-Prone Bone Marrow Failure Syndrome to Corruption in 60S Ribosome Subunit Maturation.
  findings:
  - statement: DNAJC21 associates with precursor 45S rRNA and plays a highly conserved role in the maturation of the 60S ribosomal subunit; it acts with HSPA8, PA2G4 and ZNF622, and biallelic mutations cause a cancer-prone bone marrow failure syndrome.
    reference_section_type: RESULTS
  - statement: Disease mutations impair DNAJC21 interactions with the cofactors PA2G4, HSPA8 and ZNF622 involved in 60S maturation; DNAJC21 deficiency causes cytoplasmic accumulation of the 60S subunit and aberrant ribosome profiles.
    reference_section_type: RESULTS
