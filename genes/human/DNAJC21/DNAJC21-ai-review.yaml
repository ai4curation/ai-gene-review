suggested_questions:
- question: Does DNAJC21 stimulate the ATPase activity of HSPA8 in the context of 60S maturation, and is its J-domain activity required for ribosome biogenesis?
- question: What is the precise step of 60S maturation (nucleolar processing vs. cytoplasmic recycling of PA2G4) that is most sensitive to DNAJC21 loss in BMFS3 patient cells?
suggested_experiments:
- description: Reconstitute DNAJC21-HSPA8 J-domain activity in vitro (ATPase stimulation assays) using wild-type and BMFS3 (P32A) variant proteins to test whether co-chaperone activity is required for 60S maturation.
- description: Polysome/ribosome profiling and pre-rRNA processing analysis (Northern blot of 45S/32S/28S intermediates) in DNAJC21-depleted versus rescued cells to map the maturation step affected.
- description: Proximity labeling (BioID/APEX) of DNAJC21 in nucleolus versus cytoplasm to define compartment-specific 60S-maturation interaction partners.
