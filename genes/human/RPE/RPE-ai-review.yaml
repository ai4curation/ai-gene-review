id: Q96AT9
gene_symbol: RPE
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  RPE is human ribulose-5-phosphate 3-epimerase (EC 5.1.3.1), an enzyme of the
  non-oxidative branch of the pentose phosphate pathway. It catalyses the
  reversible epimerisation of D-ribulose 5-phosphate to D-xylulose 5-phosphate.
  Acting alongside ribose-5-phosphate isomerase (RPIA), it converts the
  ribulose-5-phosphate generated by the oxidative branch into the
  xylulose-5-phosphate and ribose-5-phosphate substrates used by transketolase
  and transaldolase, thereby linking the pentose phosphate pathway back to
  glycolysis and supplying pentoses for nucleotide biosynthesis. The enzyme is a
  cytosolic, metal-dependent (divalent cation, physiologically Fe2+) TIM-barrel
  epimerase that functions as a homodimer, with two aspartate residues carrying
  out the acid-base proton transfers of the epimerisation.
