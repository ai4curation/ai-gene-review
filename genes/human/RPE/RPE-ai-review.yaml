suggested_questions:
- question: >-
    Does the RPE-PLEKHF2 (Q9H8W4) interaction reported in the binary interactome
    screens have any physiological relevance, or is it a screening artefact?
- question: >-
    Are any of the alternatively spliced isoforms (e.g. those missing the
    N-terminal region or catalytic residues) catalytically active or regulatory?
suggested_experiments:
- description: >-
    Metabolic flux analysis (e.g. 13C tracing through the non-oxidative PPP) in
    RPE-knockdown cells to quantify RPE's contribution to xylulose-5-phosphate
    and ribose-5-phosphate pools and to NADPH-dependent oxidative-stress
    resistance.
- description: >-
    Co-immunoprecipitation and orthogonal validation of the RPE-PLEKHF2
    interaction in relevant cell types to test its physiological significance.
