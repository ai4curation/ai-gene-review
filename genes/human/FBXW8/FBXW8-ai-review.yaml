- id: PMID:35982156
  title: Structure of CRL7(FBXW8) reveals coupling with CUL1-RBX1/ROC1 for multi-cullin-RING E3-catalyzed ubiquitin ligation.
  findings:
  - statement: Cryo-EM shows CUL7 binds FBXW8 in an F-box-independent mode; within CRL7(FBXW8) the RBX1 RING is held incompatible with E2~Ub/E2~NEDD8 binding, so the complex lacks intrinsic catalytic activity and instead acts as a substrate receptor coupled via SKP1-FBXW8 to a neddylated CUL1-RBX1 catalytic module.
    reference_section_type: ABSTRACT
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: Full text available; defines the mechanistic basis for FBXW8 as a substrate receptor coupled to CUL1-RBX1 catalysis - key for the SCF vs CUL7 complex annotations.
