suggested_questions:
- question: Given that CRL7(FBXW8) lacks intrinsic catalytic activity and couples to a separate CUL1-RBX1 module, how is this two-cullin assembly regulated, and which substrates require the coupled module versus other catalytic partners?
- question: How do the phosphorylation states of substrates (IRS1, HPK1, cyclin D1) and of FBXW8 itself (Ser85 by mTORC2) coordinate the timing and subcellular site (cytosol vs Golgi) of FBXW8-dependent degradation?
suggested_experiments:
- description: Reconstitute the full CRL7(FBXW8)-CUL1-RBX1 coupled ligase in vitro with neddylation machinery and phosphorylated substrates (IRS1, HPK1, cyclin D1, GORASP1) to confirm the requirement for the CUL1-RBX1 catalytic module and map ubiquitination sites/chain linkages.
- description: Perform FBXW8 degron-depletion combined with quantitative phosphoproteomics and ubiquitinomics in neuronal and cancer cell models to define the endogenous substrate repertoire and dissect the Golgi/dendrite versus insulin-signaling functions.
