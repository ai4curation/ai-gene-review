core_functions:
- description: Substrate-recognition subunit of the vertebrate-specific CUL7-RING(FBXW8) (CRL7(FBXW8)) E3 ubiquitin ligase; selects phosphorylation-marked substrates - IRS1 (after S6-kinase/mTOR phosphorylation), MAP4K1/HPK1 (autophosphorylated), and phospho-cyclin D1 - for polyubiquitination and proteasomal degradation, with ubiquitin transfer catalyzed via a coupled CUL1-RBX1 module.
