- id: PMID:18498745
  title: The CUL7 E3 ubiquitin ligase targets insulin receptor substrate 1 for ubiquitin-dependent degradation.
  findings:
  - statement: The CUL7(FBXW8) E3 ligase (CUL7, FBXW8, SKP1, ROC1/RBX1) targets IRS1 for ubiquitin-dependent degradation in an mTOR/p70-S6-kinase-dependent manner; Cul7-/- cells accumulate IRS1 with increased AKT and MEK/ERK signaling and undergo senescence-like phenotypes.
    reference_section_type: ABSTRACT
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: Full text available; establishes the IRS1 substrate and the negative regulation of insulin/IGF-1 signaling.
- id: PMID:21572988
  title: An OBSL1-Cul7Fbxw8 ubiquitin ligase signaling mechanism regulates Golgi morphology and dendrite patterning.
  findings:
  - statement: CUL7(FBXW8) localizes to the Golgi (via OBSL1) and is required for Golgi morphology, secretory trafficking, and dendrite (not axon) elaboration in neurons; the Golgi stacking protein GRASP65/GORASP1 is a physiological substrate.
    reference_section_type: ABSTRACT
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: Abstract only in cache (full_text_available false); IDA/IGI annotations rely on full text read by curators. Source of Golgi organization, dendrite morphogenesis, GORASP1 substrate and Golgi/perinuclear localization.
- id: PMID:24362026
  title: The CUL7/F-box and WD repeat domain containing 8 (CUL7/Fbxw8) ubiquitin ligase promotes degradation of hematopoietic progenitor kinase 1.
  findings:
  - statement: CUL7(FBXW8) recognizes autophosphorylated MAP4K1/HPK1 and targets it for 26S proteasomal degradation, a process antagonized by PP4 dephosphorylation of HPK1 Thr355; this promotes pancreatic cancer cell proliferation.
    reference_section_type: ABSTRACT
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: Full text available; establishes the HPK1 substrate and the proliferation link.
- id: PMID:24793695
  title: The 3M complex maintains microtubule and genome integrity.
  findings:
  - statement: CUL7, OBSL1 and CCDC8 form a 3M complex (with which FBXW8 associates via CUL7) that maintains microtubule and genome integrity; CUL7 depletion causes microtubule defects, prometaphase arrest, tetraploidy and mitotic death.
    reference_section_type: ABSTRACT
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: Full text available; supports the 3M complex association annotation. The microtubule/genome roles are primarily CUL7/OBSL1/CCDC8-centric.
