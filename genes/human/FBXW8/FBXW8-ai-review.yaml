- id: PMID:17205132
  title: A critical role for FBXW8 and MAPK in cyclin D1 degradation and cancer cell proliferation.
  findings:
  - statement: FBXW8 mediates cytoplasmic degradation of cyclin D1 phosphorylated at Thr286 via the Ras/Raf/MEK/ERK cascade; FBXW8 depletion accumulates cyclin D1 and impairs cancer cell proliferation.
    reference_section_type: ABSTRACT
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: Full text available; establishes FBXW8 as the substrate receptor for phospho-cyclin D1 and its cytoplasmic localization.
