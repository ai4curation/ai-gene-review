id: Q8N3Y1
gene_symbol: FBXW8
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  FBXW8 (FBW8, FBX29) is an F-box/WD40-repeat protein that serves as the
  substrate-recognition subunit of a distinctive vertebrate-specific
  cullin-RING ubiquitin ligase. Unlike most F-box proteins, which assemble into
  the canonical SCF (SKP1-CUL1) ligase, FBXW8 is the exclusive F-box partner of
  CUL7, forming the CUL7-RING(FBXW8) (CRL7(FBXW8)) complex composed of CUL7,
  SKP1, RBX1 and FBXW8. Structural and biochemical work shows that CUL7 binds
  FBXW8 through an unusual F-box-independent mode and that, within CRL7(FBXW8),
  the RBX1 RING domain is held in an orientation incompatible with charging
  E2~ubiquitin/E2~NEDD8; the complex therefore lacks intrinsic catalytic
  activity and instead acts as a substrate receptor that couples, via
  SKP1-FBXW8, to a separately neddylated CUL1-RBX1 catalytic module that
  performs ubiquitin transfer. As an adaptor, FBXW8 selects substrates for
  polyubiquitination and proteasomal degradation. Documented substrates include
  insulin receptor substrate 1 (IRS1), recognized after S6-kinase
  phosphorylation in an mTOR-dependent manner (linking FBXW8 to insulin/IGF-1
  signaling and cellular senescence); the Golgi stacking protein
  GORASP1/GRASP65, whose degradation, together with the scaffold OBSL1 that
  localizes CUL7(FBXW8) to the Golgi, controls Golgi morphology and dendrite
  patterning in neurons; the Ste20-family kinase MAP4K1/HPK1, recognized when
  autophosphorylated; and phosphorylated cyclin D1 (CCND1). FBXW8 is also an
  associated component of the CUL7-OBSL1-CCDC8 "3M complex" implicated in
  microtubule and genome integrity and growth (3M syndrome). FBXW8 is a
  cytoplasmic protein that also localizes to the perinuclear region and Golgi
  apparatus.
