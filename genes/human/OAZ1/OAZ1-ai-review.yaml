  title: Human ornithine decarboxylase paralogue (ODCp) is an antizyme inhibitor but
    not an arginine decarboxylase.
  findings:
  - statement: >-
      ODCp (AZIN2) binds antizymes AZ1-3 and inhibits AZ1 function as efficiently as the
      canonical antizyme inhibitor, using ODC activity and ODC degradation as readouts -
      confirming that AZ1 inhibits ODC and promotes its degradation.
    reference_section_type: ABSTRACT
    supporting_text: ODCp inhibits AZ1 function as efficiently as AZI
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Abstract-only cache. Directly assays AZ1 function via ODC activity/degradation; also
      the source of the OAZ1-AZIN2 physical-interaction annotation.
- id: PMID:26443277
  title: Structural basis of Ornithine Decarboxylase inactivation and accelerated
    degradation by polyamine sensor Antizyme1.
  findings:
  - statement: >-
      The crystal structure of human ODC bound to N-terminally truncated AZ1 shows AZ1
      occluding formation of the active ODC homodimer and disrupting the substrate-binding
      site, explaining ODC inhibition.
    reference_section_type: RESULTS
    supporting_text: >-
      the binding of AZ1 to ODC occludes the binding of a second molecule of ODC to form
      the active homodimer
  - statement: >-
      AZ1 is essential for and accelerates ubiquitin-independent 26S-proteasomal
      degradation of ODC by inducing a conformational change that exposes the ODC
      C-terminus.
    reference_section_type: DISCUSSION
    supporting_text: AZ1 is not only essential for the degradation of ODC
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
