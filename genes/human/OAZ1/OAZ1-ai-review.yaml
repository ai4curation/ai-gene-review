id: P54368
gene_symbol: OAZ1
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  OAZ1 encodes ornithine decarboxylase antizyme 1 (AZ1), a small non-catalytic
  regulatory protein that is the central negative-feedback controller of polyamine
  (putrescine, spermidine, spermine) homeostasis. It is not itself an enzyme; instead it
  binds a monomer of ornithine decarboxylase (ODC1) - the rate-limiting enzyme of
  polyamine biosynthesis - thereby sterically occluding assembly of the catalytically
  active ODC homodimer and disrupting its substrate-binding site, so that ODC activity is
  inhibited. Antizyme binding additionally induces a conformational change that exposes
  the ODC C-terminus and targets ODC for ubiquitin-independent degradation by the 26S
  proteasome, and it suppresses cellular polyamine uptake while promoting polyamine
  excretion. Its own synthesis is a polyamine sensor: antizyme mRNA is decoded via a
  programmed +1 ribosomal frameshift whose efficiency increases with intracellular
  polyamine concentration, closing an autoregulatory circuit. Antizyme activity is in turn
  antagonized by antizyme inhibitors (AZIN1 and the catalytically dead ODC paralogue
  AZIN2/ODCp), which bind antizyme and release active ODC. OAZ1 acts principally in the
  cytosol, with reported nuclear localization.
