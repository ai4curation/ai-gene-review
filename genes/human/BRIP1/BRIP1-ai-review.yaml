  - reference_id: PMID:36608669
    supporting_text: helicase-mediated protein unfolding enables multiple events in DPC repair
proposed_new_terms: []
suggested_questions:
- question: >-
    What is the relative in vivo contribution of BRIP1's BRCA1-dependent HR role
    versus its BRCA1-independent, MLH1-dependent ICL-response role to genome
    stability and tumor suppression?
- question: >-
    Does BRIP1 have a physiological role in meiotic recombination in humans,
    consistent with its testis-enriched expression and the meiotic phenotypes of
    orthologs?
suggested_experiments:
- description: >-
    Separation-of-function analysis in isogenic cells expressing BRIP1 variants that
    selectively disrupt BRCA1 binding, MLH1 binding, Fe-S cluster assembly, or
    catalytic activity, scored for ICL sensitivity, HR efficiency, G4 stability, and
    DPC repair.
  hypothesis: >-
    BRIP1's ICL-repair and HR roles are genetically separable and depend on distinct
    partner interactions rather than solely on helicase catalysis.
- description: >-
    Genome-wide mapping (e.g., CUT&RUN/ChIP) of BRIP1 occupancy at G-quadruplex-forming
    loci and replication-stress sites, correlated with fork progression and mutational
    signatures upon BRIP1 loss.
  hypothesis: >-
    BRIP1 is recruited to G4-forming and stalled-fork loci genome-wide, and its loss
    produces localized instability at these sites.
