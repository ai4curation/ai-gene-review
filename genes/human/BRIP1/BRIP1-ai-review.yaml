- term:
    id: GO:0005634
    label: nucleus
  evidence_type: IDA
  original_reference_id: PMID:14504288
  qualifier: located_in
  review:
    summary: >-
      Nuclear localization annotation sourced from a paper on the UNRELATED bZIP
      transcription factor BACH1 (BTB and CNC homology 1; UniProt O14867), which
      shares the historical "BACH1" alias with BRIP1. Nuclear localization is
      nevertheless correct for BRIP1 from independent evidence.
    action: ACCEPT
    reason: >-
      The term (nucleus) is correct for BRIP1 and abundantly supported by other
      references, so it is retained. However, this specific evidence line is
      mis-attributed: PMID:14504288 studies the transcription factor BACH1
      (heme oxygenase-1 repressor), not the FANCJ helicase; the localization here
      is only coincidentally correct. See reference_review for PMID:14504288.
    supported_by:
    - reference_id: PMID:17596542
      supporting_text: FANCJ colocalizes with RPA in nuclear foci after DNA damage
- term:
    id: GO:0005737
    label: cytoplasm
  evidence_type: IDA
  original_reference_id: PMID:14504288
  qualifier: located_in
  review:
    summary: >-
      Cytoplasmic localization annotation sourced from the UNRELATED transcription
      factor BACH1 paper (PMID:14504288, cadmium-induced nuclear export of the
      HO-1 repressor Bach1). A cytoplasmic pool is independently documented for
      BRIP1 (CIA/Fe-S maturation), so the term is retained as non-core.
    action: KEEP_AS_NON_CORE
    reason: >-
      The cytoplasm term is coincidentally correct for BRIP1 (documented CIA-related
      cytoplasmic pool, PMID:23585563), but the cited evidence (PMID:14504288)
      concerns the bZIP transcription factor BACH1, not FANCJ; the reference is
      mis-attributed via the shared alias. Kept as non-core with the correct
      supporting evidence.
    supported_by:
    - reference_id: PMID:23585563
      supporting_text: IOP1 functions in the MMS19-dependent CIA pathway
- term:
    id: GO:0006357
    label: regulation of transcription by RNA polymerase II
  evidence_type: IDA
  original_reference_id: PMID:14504288
  qualifier: acts_upstream_of_or_within
  review:
    summary: >-
      Annotation of transcriptional-regulation activity mis-mapped to BRIP1 from a
      paper on the UNRELATED bZIP transcription factor BACH1 (BTB and CNC homology
      1; UniProt O14867), a transcriptional repressor of the heme oxygenase-1
      (ho-1) gene. This function belongs to that other BACH1, not to the FANCJ
      helicase.
    action: REMOVE
    reason: >-
      PMID:14504288 ("Cadmium induces nuclear export of Bach1, a transcriptional
      repressor of heme oxygenase-1 gene") is entirely about the bZIP/BTB
      transcription factor BACH1 (Bach1/small Maf heterodimers repressing ho-1,
      competition with Nrf2, Crm1/Exportin-1-dependent nuclear export). It contains
      no data on the BRIP1/FANCJ DNA helicase. BRIP1 is a DNA repair helicase with
      no established sequence-specific transcriptional-regulation function; this
      annotation is a gene-symbol conflation (the "BACH1" alias) and should be
      removed. Verified against the actual publication.
    supported_by:
    - reference_id: PMID:14504288
      supporting_text: ho-1 is repressed by Bach1/small Maf heterodimers, it is activated by Nrf2/small Maf heterodimers
- term:
    id: GO:0000077
    label: DNA damage checkpoint signaling
  evidence_type: NAS
  original_reference_id: PMID:14576433
  qualifier: involved_in
  review:
    summary: >-
      Author-stated involvement in DNA damage checkpoint signaling. BRIP1
      phosphorylation (Ser990) drives its cell-cycle-regulated BRCA1 interaction,
      and FANCJ contributes to the ICL-induced checkpoint/DDR.
    action: KEEP_AS_NON_CORE
