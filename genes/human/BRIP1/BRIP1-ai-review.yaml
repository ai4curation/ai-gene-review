- term:
    id: GO:0036297
    label: interstrand cross-link repair
  evidence_type: IMP
  original_reference_id: PMID:17581638
  qualifier: involved_in
  review:
    summary: >-
      NEW annotation. BRIP1/FANCJ acts late in the Fanconi anemia interstrand
      crosslink (ICL) repair pathway; its helicase activity and MLH1 (MutLalpha)
      binding are required to correct the ICL-induced response of FA-J cells. This
      is arguably BRIP1's most disease-defining biological process yet is absent
      from the existing GOA set.
    action: NEW
    reason: >-
      Strongly supported: FANCJ-null (FA-J) cells accumulate 4N DNA and are
      hypersensitive to ICLs, corrected by wild-type FANCJ in a helicase- and
      MLH1-binding-dependent manner (PMID:17581638); FANCJ deficiency underlies
      Fanconi anemia group J and its cells are hypersensitive to crosslinking agents
      (UniProt DISEASE). Added to capture the ICL-repair process directly.
    supported_by:
    - reference_id: PMID:17581638
      supporting_text: FANCJ helicase activity and MLH1 binding, but not BRCA1 binding, are essential to correct the FA-J cells' ICL-induced 4N DNA accumulation and sensitivity to ICLs
    - reference_id: PMID:18426915
      supporting_text: the FA pathway has been classically described in terms of interstrand cross-link (ICL) repair
- term:
    id: GO:0051539
    label: 4 iron, 4 sulfur cluster binding
  evidence_type: IDA
  original_reference_id: PMID:20639400
  qualifier: enables
  review:
    summary: >-
      NEW annotation. BRIP1 binds a [4Fe-4S] iron-sulfur cluster that is required
      for its helicase activity (Rad3/XPD-family Fe-S helicase). The pathogenic
      A349P substitution adjacent to a conserved Fe-S cysteine reduces bound iron
      and uncouples ATP hydrolysis from DNA unwinding.
    action: NEW
    reason: >-
      Experimentally supported cofactor-binding molecular function (UniProt COFACTOR
      "[4Fe-4S] cluster" with binding residues Cys283/Cys298/Cys310/Cys350; DOMAIN
      "4Fe-4S iron-sulfur-binding is required for helicase activity"). Present in the
      UniProt GO cross-references (as UniProtKB-KW) but missing from the GOA set;
      added because the Fe-S cluster is mechanistically and clinically central.
    supported_by:
    - reference_id: PMID:20639400
      supporting_text: Purified recombinant FANCJ-A349P protein had reduced iron and was defective in coupling adenosine triphosphate (ATP) hydrolysis and translocase activity to unwinding forked duplex or G-quadruplex DNA substrates
core_functions:
- description: >-
    ATP-dependent 5'-to-3' DNA helicase (Fe-S cluster, Rad3/XPD family) that couples
    DNA-dependent ATP hydrolysis to translocation on ssDNA and unwinding of forked
    duplex DNA, acting in BRCA1-dependent homologous recombination repair of DNA
    double-strand breaks and in the Fanconi anemia interstrand-crosslink repair
    pathway.
