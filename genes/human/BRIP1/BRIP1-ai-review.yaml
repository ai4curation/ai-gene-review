id: Q9BX63
gene_symbol: BRIP1
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  BRIP1 (Fanconi anemia group J protein, FANCJ; formerly BACH1/BRCA1-associated
  C-terminal helicase 1) is an ATP-dependent 5'-to-3' DNA helicase of the
  Rad3/XPD (DinG) superfamily 2 subfamily. It is a DNA-dependent ATPase that
  couples ATP hydrolysis to translocation along ssDNA and unwinding of duplex
  DNA, and it requires a [4Fe-4S] iron-sulfur cluster for helicase activity. The
  enzyme preferentially engages forked duplex substrates with a 5' single-stranded
  tail and can resolve non-B DNA structures, most notably G-quadruplexes, thereby
  removing replication-fork roadblocks and safeguarding genome stability. BRIP1
  functions in homologous recombination repair of DNA double-strand breaks in
  concert with BRCA1, to whose C-terminal BRCT domains it binds in a
  phosphorylation-dependent manner (via phospho-Ser990), and it acts late in the
  Fanconi anemia interstrand crosslink (ICL) repair pathway, after FANCD2
  ubiquitination, where its direct interaction with the mismatch-repair
  MutLalpha component MLH1 is required to correct the crosslink response. At
  stalled or damaged replication forks it collaborates with RPA and BLM and
  promotes repair of DNA-protein crosslinks by using its ATPase to unfold the
  protein adduct, exposing the underlying DNA for cleavage by the SPRTN protease.
  BRIP1 localizes chiefly to the nucleoplasm and forms DNA-damage-inducible
  nuclear foci; its Fe-S cluster is matured by the cytosolic iron-sulfur assembly
  (CIA) machinery (CIAO1, CIAO2B, MMS19), consistent with a minor cytoplasmic
  pool. Biallelic loss-of-function causes Fanconi anemia complementation group J,
  and monoallelic pathogenic variants confer susceptibility to breast and ovarian
  cancer.
