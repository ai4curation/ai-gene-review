- description: >-
    Helicase/ATPase-driven unfolding of DNA-protein crosslinks (DPCs) at replication
    forks: FANCJ binds ssDNA downstream of the adduct and uses ATP hydrolysis to unfold
    the crosslinked protein, exposing the DNA for cleavage by the SPRTN protease and
    enabling translesion synthesis past non-degradable DPCs.
