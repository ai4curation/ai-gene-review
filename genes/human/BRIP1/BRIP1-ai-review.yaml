- term:
    id: GO:0006289
    label: nucleotide-excision repair
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: involved_in
  review:
    summary: >-
      IBA inference of involvement in nucleotide-excision repair, propagated from
      the Rad3/XPD family (which includes the NER helicase XPD). There is no
      FANCJ-specific evidence that BRIP1 participates in classical NER.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      BRIP1/FANCJ's characterized biological roles are interstrand-crosslink
      repair, homologous recombination, DNA-protein-crosslink repair, and
      G-quadruplex resolution — not the classical NER pathway performed by its
      paralog XPD. The term appears to be over-propagated across the helicase
      family tree rather than reflecting a demonstrated FANCJ function.
    propagation_review:
      root_cause: PROPAGATION_BAD
      failure_modes:
      - FUNCTIONAL_DIVERGENCE
      source_entities:
      - source_id: UniProtKB:P18074
        comment: >-
          XPD (ERCC2) is the Rad3/XPD-family paralog that performs nucleotide-excision
          repair; FANCJ diverged to ICL/HR/DPC/G4 functions and is not a NER factor.
- term:
    id: GO:1990918
    label: double-strand break repair involved in meiotic recombination
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: involved_in
  review:
    summary: >-
      IBA inference (from mouse/worm homologs) of a role in meiotic
      recombination-associated DSB repair. BRIP1 is highly expressed in testis,
      making a meiotic role plausible, but this is not an established core somatic
      function in human.
    action: KEEP_AS_NON_CORE
    reason: >-
      Plausible for the family and consistent with testis-enriched expression, but
      the human gene's characterized, disease-relevant functions are somatic
      genome-maintenance activities (ICL/HR/DPC repair). Retained as a non-core,
      context-specific process.
