  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: enables
  review:
    summary: >-
      Phylogenetic (IBA) inference that BRIP1 enables DNA helicase activity, from
      the Rad3/XPD helicase family tree. This is correct but generic; BRIP1 is
      specifically a 5'-3' DNA helicase (GO:0043139), annotated separately with
