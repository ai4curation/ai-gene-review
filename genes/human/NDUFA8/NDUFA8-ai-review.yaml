    id: GO:0008137
    label: NADH dehydrogenase (ubiquinone) activity
  evidence_type: NAS
  original_reference_id: PMID:9878551
  qualifier: enables
  review:
    summary: >-
      This annotates NDUFA8 as directly enabling NADH dehydrogenase (ubiquinone)
      activity. That catalytic activity is carried out by the conserved core subunits
      (FMN/Fe-S-bearing subunits) of Complex I. UniProt explicitly states NDUFA8 is an
      accessory subunit believed not to be involved in catalysis. Assigning the
      catalytic MF directly to a non-catalytic accessory subunit is an over-annotation;
      the honest relationship is captured in core_functions via
      contributes_to_molecular_function (GO:0008137), with the subunit's own MF being
      structural molecule activity (GO:0005198).
    action: MARK_AS_OVER_ANNOTATED
    supported_by:
    - reference_id: file:human/NDUFA8/NDUFA8-uniprot.txt
      supporting_text: "involved in catalysis"
