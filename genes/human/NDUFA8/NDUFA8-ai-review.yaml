- id: PMID:12611891
  title: The subunit composition of the human NADH dehydrogenase obtained by rapid
    one-step immunopurification.
  findings:
  - statement: >-
      Immunopurification of human Complex I followed by MS identified NDUFA8 among the
      resolved Complex I polypeptides, supporting its membership in the complex.
    supporting_text: >-
      we can resolve and identify the human homologues of 42 polypeptides detected so
      far in the more extensively studied beef heart complex I
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified; primary experimental basis for NDUFA8 part_of Complex I (IDA).
- id: PMID:21310150
  title: NDUFB7 and NDUFA8 are located at the intermembrane surface of complex I.
  findings:
  - statement: >-
      NDUFA8 (with NDUFB7) is localized at the intermembrane-space surface of Complex I;
      both are CX9C-containing subunits with probable intramolecular disulfide bonds that
      stabilize the membrane domain of the complex.
    supporting_text: >-
      We experimentally confirm the localization of the latter two, while our data are
      consistent with disulfide bridges in NDUFA8. We propose these subunits stabilize
      the membrane domain of complex I.
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified; establishes IMS-surface localization and disulfide-stabilized
      CHCH structure of NDUFA8.
- id: PMID:23209302
  title: KIF14 negatively regulates Rap1a-Radil signaling during breast cancer progression.
  findings: []
  reference_review:
    relevance: NONE
    correctness: WRONG_IDENTIFIER
    review_notes: >-
      Full text read; this paper concerns KIF14/Radil/Rap1a signaling in breast cancer
      and does not mention NDUFA8 or mitochondrial Complex I. It is the citation behind
      the GO:0044877 (protein-containing complex binding) IDA for NDUFA8 but does not
      support it and appears to be a wrong-paper citation. The annotation was marked as
      over-annotated (not removed, per policy on experimental annotations).
- id: PMID:23676665
  title: Protein import and oxidative folding in the mitochondrial intermembrane space
    of intact mammalian cells.
  findings:
  - statement: >-
      Characterizes the MIA40/ALR disulfide-relay pathway that imports and oxidatively
      folds CX9C proteins in the mammalian intermembrane space, the pathway relevant to
      NDUFA8 import and disulfide-bond formation.
    supporting_text: >-
      Oxidation of cysteine residues to disulfides drives import of many proteins into
      the intermembrane space of mitochondria.
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified; general MIA40-relay mechanism; UniProt attributes NDUFA8 disulfide
      bonds and mitochondrion localization to this study.
- id: PMID:27499296
  title: Mitochondrial Protein Interaction Mapping Identifies Regulators of Respiratory
    Chain Function.
  findings: []
  reference_review:
    relevance: LOW
    correctness: VERIFIED
    review_notes: >-
      Mitochondrial affinity-enrichment MS interactome; source of an NDUFA8-NDUFS3 IPI
      (via IntAct). Abstract does not name NDUFA8 (interaction in supplementary data);
      interaction real but uninformative as bare protein binding.
- id: PMID:27626371
  title: Accessory subunits are integral for assembly and function of human mitochondrial
    complex I.
  findings:
  - statement: >-
      Systematic CRISPR knockout of each Complex I accessory subunit shows most are
      required for assembly of a functional complex, and loss of a subunit destabilizes
      other subunits in the same structural module; establishes the structural/assembly
      role of accessory subunits including NDUFA8.
    supporting_text: >-
      We show that 25 subunits are strictly required for assembly of a functional complex
      and 1 subunit is essential for cell viability.
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified; primary functional evidence that Complex I accessory subunits are
      integral for assembly/function; UniProt FUNCTION cites it for NDUFA8.
- id: PMID:28844695
  title: Architecture of Human Mitochondrial Respiratory Megacomplex I(2)III(2)IV(2).
  findings:
  - statement: >-
      Cryo-EM of the human respiratory megacomplex resolves individual Complex I
      subunits, providing structural placement of NDUFA8 within Complex I at the inner
      membrane.
    supporting_text: >-
      The structure not only reveals the precise assignment of individual subunits of
      human CI and CIII
