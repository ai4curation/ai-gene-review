core_functions:
- description: >-
    NDUFA8 acts as a non-catalytic, twin-CX9C structural subunit of the membrane arm of
    mitochondrial respiratory chain Complex I. Located as a peripheral inner-membrane
    protein at the intermembrane-space surface of the complex (and imported/oxidatively
    folded via the MIA40 disulfide relay), it stabilizes the membrane domain and is
    required for assembly of a functional holoenzyme. It contributes to, but does not
    itself catalyze, the complex-level NADH:ubiquinone oxidoreductase activity.
