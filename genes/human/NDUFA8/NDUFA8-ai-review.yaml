gene_symbol: NDUFA8
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  NDUFA8 (also known as Complex I-19kD, CI-PGIV) is a nuclear-encoded accessory
  (supernumerary) subunit of mitochondrial respiratory chain Complex I
  (NADH:ubiquinone oxidoreductase), the first and largest enzyme of the oxidative
  phosphorylation system. It is a non-catalytic structural subunit: catalysis
  (electron transfer from NADH to ubiquinone, coupled to proton translocation) is
  performed by the 14 conserved core subunits, while NDUFA8 and the other accessory
  subunits contribute to assembly, stability, and structural integrity of the
  holoenzyme. NDUFA8 is a twin CX9C protein containing four C-X9-C motifs that fold
  into a helix-coil-helix (CHCH) domain stabilized by two pairs of intramolecular
  disulfide bonds; it is imported and oxidatively folded via the MIA40/CHCHD4
  disulfide-relay pathway of the mitochondrial intermembrane space. The mature protein
  is a peripheral inner-membrane protein located at the intermembrane-space surface of
  the membrane arm of Complex I, where it (together with NDUFB7) is thought to help
  stabilize the membrane domain. Biallelic loss-of-function variants in NDUFA8 cause
  autosomal-recessive mitochondrial complex I deficiency nuclear type 37, with reduced
  Complex I assembly and activity.
