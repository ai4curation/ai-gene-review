gene_symbol: TRAPPC1
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: 'TRAPPC1 is a small core subunit of the transport protein particle (TRAPP) complex.
  It contributes to TRAPP complex architecture and complex-level RAB1 guanine-nucleotide exchange/vesicle-trafficking
  functions, especially ER-to-Golgi vesicle-mediated transport. In the proteostasis network,
  the autophagy component recruitment context is best represented at gene level by TRAPP/TRAPPII/TRAPPIII
  complex membership rather than by a broad autophagy-process annotation.'
