suggested_questions:
- question: Should TRAPPC1 and other shared TRAPP subunits receive contributes_to 
    annotations for TRAPPC complex RAB1 guanine-nucleotide exchange activity?
  experts:
  - GO transport editors
  - Reactome TRAPP curators
- question: Should TRAPP subunit PN autophagy contexts be captured only as TRAPPIII 
    complex membership unless direct human autophagophore/PAS evidence is available?
  experts:
  - GO autophagy editors
  - GO cellular-component editors
- question: Should current TRAPPC1 vesicle coat assembly and obsolete vesicle tethering 
    annotations be replaced by ER-to-Golgi vesicle-mediated transport or more specific 
    TRAPP/RAB1 terms?
  experts:
  - ComplexPortal curators
  - GO transport editors
suggested_experiments:
- description: Reconstitute human TRAPPII/TRAPPIII complexes with and without TRAPPC1 
    and measure RAB1 GDP-GTP exchange activity.
  experiment_type: complex reconstitution and RAB1 GEF assay
  hypothesis: TRAPPC1 is required as a core scaffold subunit for TRAPPC complex-level 
    RAB1 GEF activity rather than acting as an independent catalytic subunit.
- description: Use TRAPPC1 knockout and rescue cells to assay ER-to-Golgi cargo 
    transport, COPII-vesicle association, and Golgi localization of TRAPP components.
  experiment_type: cellular trafficking rescue assay
  hypothesis: TRAPPC1 loss disrupts TRAPP-dependent ER-to-Golgi vesicle-mediated 
    transport by destabilizing or mislocalizing TRAPP complexes.
- description: Measure ATG9 localization and autophagophore initiation markers in 
    TRAPPC1 rescue cells while separately monitoring ER-to-Golgi trafficking defects.
  experiment_type: autophagy-context separation assay
  hypothesis: Any TRAPPC1 autophagy phenotype is mediated through TRAPPIII/RAB1 
    trafficking context and should not be generalized to a broad autophagy core function
    without direct evidence.
