id: P53602
gene_symbol: MVD
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  MVD is human diphosphomevalonate decarboxylase (mevalonate-5-diphosphate
  decarboxylase; EC 4.1.1.33), the enzyme that catalyses the final step of the
  mevalonate pathway. It performs the ATP-dependent decarboxylation of
  (R)-5-diphosphomevalonate (mevalonate-5-diphosphate) to isopentenyl
  diphosphate (IPP), releasing CO2, ADP and inorganic phosphate. IPP is the
  fundamental five-carbon (C5) isoprenoid building block from which all
  downstream isoprenoids are assembled, so MVD sits at the point where the
  mevalonate pathway delivers activated isoprene units for sterol (cholesterol)
  biosynthesis and for the non-sterol isoprenoid branches (dolichol, ubiquinone,
  and the prenyl groups used in protein prenylation). The protein is a member of
  the GHMP kinase superfamily, binds ATP, and functions as a homodimer of
  ~43-kDa subunits. It is a soluble cytosolic enzyme. In humans, loss-of-function
  and missense variants in MVD (together with MVK, the two principal
  porokeratosis genes) cause porokeratosis (POROK7), a disorder of faulty
  epidermal keratinization characterised by the cornoid lamella.
