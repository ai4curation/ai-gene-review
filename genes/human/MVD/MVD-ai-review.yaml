core_functions:
- description: >-
    ATP-dependent decarboxylation of (R)-5-diphosphomevalonate
    (mevalonate-5-diphosphate) to isopentenyl diphosphate (IPP), CO2, ADP and
    phosphate, the final step of the mevalonate pathway that generates the
    universal C5 isoprenoid unit.
  molecular_function:
    id: GO:0004163
    label: diphosphomevalonate decarboxylase activity
  directly_involved_in:
  - id: GO:0019287
    label: isopentenyl diphosphate biosynthetic process, mevalonate pathway
  supported_by:
  - reference_id: PMID:18823933
    supporting_text: "Mevalonate diphosphate decarboxyase (MDD1; EC 4.1.1.33) catalyzes the ATP dependent decarboxylation of mevalonate 5-diphosphate (MVAPP) to form isopentenyl 5-diphosphate"
  - reference_id: file:human/MVD/MVD-uniprot.txt
    supporting_text: "Catalyzes the ATP dependent decarboxylation of (R)-5-"
- description: >-
    As the terminal mevalonate-pathway enzyme, MVD supplies IPP for the broader
    isoprenoid biosynthetic program (sterols and non-sterol isoprenoids), acting
    as a soluble cytosolic enzyme.
  molecular_function:
    id: GO:0004163
    label: diphosphomevalonate decarboxylase activity
  directly_involved_in:
  - id: GO:0008299
    label: isoprenoid biosynthetic process
  locations:
  - id: GO:0005829
    label: cytosol
  supported_by:
  - reference_id: PMID:18823933
    supporting_text: "The reaction is required for production of polyisoprenoids and sterols from acetyl-CoA."
  - reference_id: PMID:14972328
    supporting_text: "We found a\ncytosolic localization for both endogenous human mevalonate pyrophosphate\ndecarboxylase"
proposed_new_terms: []
suggested_questions:
- question: >-
    Beyond its metabolic role, does the MVD-mortalin (HSP70) interaction have a
    regulatory function on MVD stability or activity, or is it primarily relevant
    to mortalin-controlled proliferation?
suggested_experiments:
- description: >-
    Structure-guided kinetic characterization of the full panel of POROK7 missense
    variants to quantify how each affects diphosphomevalonate decarboxylase
    activity and homodimer stability, correlating biochemical severity with
    clinical presentation.
