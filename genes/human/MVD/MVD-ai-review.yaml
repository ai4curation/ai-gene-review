- term:
    id: GO:0008284
    label: positive regulation of cell population proliferation
  evidence_type: IMP
  original_reference_id: PMID:9270019
  qualifier: involved_in
  review:
    summary: >-
      Inhibiting MVD with 6-fluoromevalonate (Fmev) blocks production of downstream
      mevalonate products, prevents Ras prenylation/membrane localization, and
      suppresses proliferation of transformed cells.
    action: KEEP_AS_NON_CORE
    reason: >-
      This is a pathway-level, indirect effect: MVD activity is required to make IPP
      and hence the prenyl groups that drive Ras-dependent proliferation. It reflects
      a physiological consequence of MVD's metabolic role rather than a distinct
      signalling function of the protein. Retain as a non-core process rather than a
      core molecular function. Per curation policy this experimental (IMP) annotation
      is not removed.
