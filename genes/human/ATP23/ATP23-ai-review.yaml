id: Q9Y6H3
gene_symbol: ATP23
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  ATP23 encodes a conserved M76-family metalloprotease homolog associated with mitochondria.
  The ATP23 family is best characterized as a mitochondrial inner-membrane/intermembrane-space
  factor for ATP synthase biogenesis: yeast Atp23 processes the mitochondrially encoded
  Atp6/subunit 6 precursor and also promotes Fo-sector assembly independently of proteolysis.
  Human ATP23 carries the conserved metalloprotease features and is detected in human
  mitochondrial proteome datasets, but its direct mammalian substrate and submitochondrial
  topology remain less fully characterized. Older KUB3/XRCC6BP1 literature describes Ku70
  binding, but the strongest functional model for UniProt Q9Y6H3 is mitochondrial ATP synthase
  assembly and mitochondrial protein processing rather than DNA repair.
existing_annotations:
- term:
    id: GO:0033615
    label: mitochondrial proton-transporting ATP synthase complex assembly
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: involved_in
  review:
    summary: Conserved ATP23-family biology supports a core role in mitochondrial ATP synthase
      Fo-sector assembly.
    action: ACCEPT
    reason: >-
      Accept as core. The strongest mechanistic evidence comes from yeast Atp23, where ATP23
      mutants impair Fo assembly and protease-inactive Atp23 still supports functional ATPase
      assembly, separating the assembly-factor role from proteolytic processing. Human ATP
      synthase assembly literature establishes the ATP6/ATP8 membrane-domain assembly context,
      while ATP23-specific human substrate data remain limited.
    additional_reference_ids:
    - PMID:17135290
    - PMID:17135288
    - PMID:29440398
    - file:human/ATP23/ATP23-deep-research-falcon.md
    supported_by:
    - &zeng_dual
      reference_id: PMID:17135290
      supporting_text: Atp23p, in addition to its processing activity, must provide another important
        function in F O assembly
    - &zeng_chaperone
      reference_id: PMID:17135290
      supporting_text: Atp23p may, therefore, also be a chaperone, which in conjunction with Atp10p
        mediates the association of subunit 6 with the subunit 9 ring.
    - &osman_dual
      reference_id: PMID:17135288
      supporting_text: Atp23 promotes the association of mature Atp6 with Atp9 oligomers
    - &he_context
      reference_id: PMID:29440398
      supporting_text: This intermediate provides the template for insertion of ATP6 and ATP8
- term:
    id: GO:0034982
    label: mitochondrial protein processing
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: involved_in
  review:
    summary: ATP23-family proteins process mitochondrial Atp6/subunit 6 in yeast; this supports
      mitochondrial protein processing while the direct human substrate remains unresolved.
    action: ACCEPT
    reason: >-
      Accept, with the caveat that the precise human cleavage substrate is not established. Yeast
      Atp23 removes the N-terminal prepeptide from the mitochondrial ATP synthase subunit 6 precursor,
      and human ATP23 retains the conserved M76/metalloprotease signature. Because mammalian ATP6
      lacks the same yeast presequence, this term should be interpreted as conserved ATP23-family
      mitochondrial protein-processing biology rather than a demonstrated human ATP6 cleavage event.
    additional_reference_ids:
    - PMID:17135290
    - PMID:17135288
    - file:human/ATP23/ATP23-uniprot.txt
    - file:human/ATP23/ATP23-deep-research-falcon.md
    supported_by:
    - &zeng_processing
      reference_id: PMID:17135290
      supporting_text: Atp23p is a mitochondrial protease that removes the 10-residue-long N-terminal
        prepeptide of the subunit 6 precursor
    - &osman_processing
      reference_id: PMID:17135288
      supporting_text: Atp23 serves as a processing peptidase and mediates the maturation of the
        mitochondrial-encoded F(O)-subunit Atp6 after its insertion into the inner membrane.
    - &uniprot_m76
      reference_id: file:human/ATP23/ATP23-uniprot.txt
      supporting_text: InterPro; IPR019165; Peptidase_M76_ATP23.
