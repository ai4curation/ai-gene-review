    id: GO:0004222
    label: metalloendopeptidase activity
  description: >-
    ATP23 is best represented as a conserved mitochondrial M76 metalloprotease and ATP synthase
    assembly factor. Yeast Atp23 cleaves the Atp6/subunit 6 precursor and also promotes Atp6
    association with the Atp9 ring independently of proteolysis; human ATP23 is inferred to share
    this mitochondrial ATP synthase biogenesis/protein-processing role, although the direct human
    substrate and cleavage event remain unresolved.
