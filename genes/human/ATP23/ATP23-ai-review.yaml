suggested_questions:
- question: >-
    What is the direct mammalian substrate, if any, for human ATP23 proteolytic activity, given
    that mammalian ATP6 does not have the same yeast Atp6 N-terminal presequence?
  experts: []
- question: >-
    Has endogenous human ATP23 been directly localized by submitochondrial fractionation or
    protease-protection assays to the intermembrane-space face of the inner membrane?
  experts: []
- question: >-
    Should the historical KUB3/XRCC6BP1 Ku70-binding literature remain linked to ATP23 functional
    annotation, or should DNA-repair GO annotations be retired as alias-driven over-interpretation?
  experts: []
suggested_experiments:
- hypothesis: Human ATP23 is an inner-membrane/intermembrane-space ATP synthase assembly factor.
  description: >-
    Endogenously tag ATP23 in human cells and test submitochondrial localization by mitochondrial
    fractionation, alkaline extraction, and protease-protection assays with outer- and inner-membrane
    permeabilization controls.
  experiment_type: subcellular localization/topology assay
- hypothesis: Human ATP23 supports ATP synthase membrane-domain assembly through conserved M76-family
    catalytic and non-catalytic functions.
  description: >-
    Generate ATP23 knockout or knockdown human cells and rescue with wild-type and catalytic-site
    mutant ATP23; assay ATP synthase assembly by BN-PAGE, complex V activity, ATP6/ATP8 stability,
    and oxidative phosphorylation phenotypes.
  experiment_type: loss-of-function and catalytic-mutant rescue
- hypothesis: The reported KUB3/Ku70 interaction does not define the main ATP23 gene-product function.
  description: >-
    Re-test Ku70 interaction and NHEJ phenotypes using sequence-verified ATP23 constructs, endogenous
    ATP23 perturbation, and rescue variants that distinguish mitochondrial targeting/topology from any
    nuclear pool.
  experiment_type: interaction and DNA-repair assay
