id: Q9NZ09
gene_symbol: UBAP1
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: UBAP1 is an endosome-specific ESCRT-I fourth-subunit variant in TSG101-VPS28-VPS37A-UBAP1 complexes. Its core
  functions are ubiquitin binding through UBA/SOUBA domains, recognition/sorting of ubiquitinated endosomal cargo into multivesicular
  bodies, and endosome-specific ESCRT-I complex membership. General ESCRT-I membrane-fission annotations from MVB12A/VPS37B
  structural work should not be treated as direct UBAP1 evidence.
