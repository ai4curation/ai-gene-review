suggested_questions:
- question: Should UBAP1 membrane-fission annotations be removed or kept non-core unless UBAP1-containing ESCRT-I is directly
    tested in membrane-scission/autophagosome-closure assays?
  experts:
  - GO ESCRT curators
  - GO autophagy editors
- question: Should generic UBAP1 protein-binding annotations be replaced by ubiquitin binding and ESCRT-I complex membership?
  experts:
  - GO molecular function editors
  - UniProt curators
suggested_experiments:
- experiment_type: UBAP1-containing ESCRT-I membrane remodeling assay
  hypothesis: UBAP1-containing ESCRT-I specializes in endosomal ubiquitinated cargo sorting and should not be assumed to provide
    the same membrane-fission function as MVB12A-containing ESCRT-I without direct evidence.
  description: Compare purified or reconstituted UBAP1-ESCRT-I and MVB12A-ESCRT-I complexes in membrane-remodeling assays
    and in cell-based autophagosome-closure assays.
- experiment_type: UBAP1 ubiquitin-binding rescue
  hypothesis: UBAP1 SOUBA/UBA-mediated ubiquitin binding is required for endosomal cargo sorting.
  description: Rescue UBAP1 knockout cells with wild-type and SOUBA/UBA mutants and measure EGFR/BST2 cargo degradation, endosomal
    ubiquitin homeostasis, and ESCRT-I recruitment.
