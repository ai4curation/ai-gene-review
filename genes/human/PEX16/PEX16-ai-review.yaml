- term:
    id: GO:0005783
    label: endoplasmic reticulum
  evidence_type: IDA
  original_reference_id: PMID:21768384
  review:
    summary: >-
      Yonekawa et al. (2011) demonstrated that PEX16 transits through the ER en route
