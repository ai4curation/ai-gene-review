id: P15538
gene_symbol: CYP11B1
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  Cytochrome P450 11B1 (P450c11beta, steroid 11-beta-hydroxylase; EC 1.14.15.4) is a
  mitochondrial inner-membrane, heme-thiolate cytochrome P450 monooxygenase expressed in
  the zona fasciculata/reticularis of the adrenal cortex. It catalyses the final step of
  cortisol (glucocorticoid) biosynthesis, hydroxylating 11-deoxycortisol to cortisol, and
  also converts 11-deoxycorticosterone (21-hydroxyprogesterone) to corticosterone. Electrons
  for catalysis are delivered from NADPH through the mitochondrial adrenodoxin system
  (ferredoxin reductase FDXR and the [2Fe-2S] ferredoxin FDX1/FDX2). CYP11B1 is the
  glucocorticoid-branch paralog of CYP11B2 (aldosterone synthase), with which it is more than
  93% identical; unlike CYP11B2 it lacks efficient 18-oxidase activity and cannot generate
  aldosterone. It additionally 11beta-hydroxylates adrenal androgens (e.g. androstenedione,
  testosterone). Loss-of-function mutations cause 11beta-hydroxylase-deficiency congenital
  adrenal hyperplasia (adrenal hyperplasia 4), the second most common form of CAH, presenting
  with a hypertensive phenotype (from 11-deoxycorticosterone excess) and androgen excess.
