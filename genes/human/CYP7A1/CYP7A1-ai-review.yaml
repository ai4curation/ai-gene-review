id: P22680
gene_symbol: CYP7A1
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  Cholesterol 7-alpha-hydroxylase (cytochrome P450 7A1), the rate-limiting,
  committed first enzyme of the classic (neutral) bile-acid biosynthesis pathway.
  It is a heme-thiolate cytochrome P450 monooxygenase of the endoplasmic reticulum
  membrane that hydroxylates cholesterol at the 7-alpha position to yield
  7-alpha-hydroxycholesterol, consuming molecular oxygen and reducing equivalents
  supplied by NADPH via cytochrome P450 reductase. This 7-alpha-hydroxylation is the
  rate-controlling step that commits hepatic cholesterol to catabolism and bile-acid
  synthesis; the enzyme also 7-alpha-hydroxylates several oxysterols (for example
  24-hydroxycholesterol and 4-beta-hydroxycholesterol) as a minor activity. CYP7A1 is
  expressed almost exclusively in liver, and its transcription is tightly, dynamically
  regulated: it is repressed by bile acids through FXR-dependent feedback and induced
  by conditions such as glucose and cholestyramine, allowing bile-acid output to be
  matched to physiological demand. Loss-of-function causes CYP7A1 deficiency, an
  autosomal disorder characterized by hepatic cholesterol accumulation,
  hypercholesterolemia and premature gallstones.
