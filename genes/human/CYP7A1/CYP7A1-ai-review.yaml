- id: PMID:11013305
  title: 24-hydroxycholesterol is a substrate for hepatic cholesterol 7alpha-hydroxylase
    (CYP7A).
  findings:
  - statement: >-
      Recombinant human CYP7A shows 7-alpha-hydroxylase activity toward both
      cholesterol and the two isomers of 24-hydroxycholesterol, with a preference for
      the (24S)-isomer, establishing CYP7A1 as a cholesterol/oxysterol
      7-alpha-hydroxylase and the rate-limiting enzyme of bile acid biosynthesis.
    supporting_text: >-
      Human CYP7A, recombinantly expressed in Escherichia coli and in simian COS cells,
      showed 7alpha-hydroxylase activity toward both cholesterol and the two isomers of
      24-hydroxycholesterol
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified abstract (J Lipid Res 2000). Directly supports both the core
      cholesterol 7-alpha-monooxygenase activity and the minor 24S-hydroxycholesterol
      7-alpha-hydroxylase activity (EC 1.14.14.26).
- id: PMID:12077124
  title: Metabolism of 4 beta -hydroxycholesterol in humans.
  findings:
  - statement: >-
      Recombinant human CYP7A1 7-alpha-hydroxylates 4-beta-hydroxycholesterol, albeit
      more slowly than cholesterol, confirming direct sterol 7-alpha-hydroxylase activity
      of the human enzyme.
    supporting_text: >-
      beta-hydroxycholesterol was 7 alpha-hydroxylated at a slower rate than cholesterol
      by recombinant human CYP7A1
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified abstract (J Biol Chem 2002). Basis for the IDA cholesterol
      7-alpha-monooxygenase activity annotation on recombinant human CYP7A1.
- id: PMID:19965590
  title: Glucose stimulates cholesterol 7alpha-hydroxylase gene transcription in human
    hepatocytes.
  findings:
  - statement: >-
      High glucose induces CYP7A1 mRNA and stimulates bile-acid synthesis in human
      hepatocytes; CYP7A1 is described as the key regulatory gene in bile acid synthesis,
      induced via an HNF4alpha-dependent, AMPK-modulated, epigenetic mechanism.
    supporting_text: >-
      High glucose stimulated bile acid synthesis and induced mRNA expression of
      cholesterol ... 7alpha-hydroxylase (CYP7A1), the key regulatory gene in bile acid
      synthesis
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified abstract (J Lipid Res 2010). This is a study of transcriptional
      regulation of the CYP7A1 gene; supports response-to-glucose and
      bile-acid-synthesis regulatory annotations, but the enzyme's own molecular action
      is the 7-alpha-hydroxylase activity.
- id: PMID:2384150
  title: Molecular cloning and sequence analysis of cDNA encoding human cholesterol
    7 alpha-hydroxylase.
  findings:
  - statement: >-
      The human CYP7A1 cDNA encodes a 504-residue cholesterol 7-alpha-hydroxylase with
      conserved heme- and steroid-binding domains characteristic of steroidogenic
      cytochrome P450s.
    supporting_text: >-
      A complete cDNA clone encoding human cholesterol 7 ... alpha-hydroxylase has been
      isolated ... Unique amino acid residues were observed in putative binding domains
      for heme and steroid which are highly conserved in most steroidogenic P-450s
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified abstract (FEBS Lett 1990), the human cloning/sequence paper.
      UniProt attaches CATALYTIC ACTIVITY / FUNCTION / PATHWAY / SUBCELLULAR LOCATION
      (EC 1.14.14.23) to this reference; the abstract is cloning-focused, so the
      enzymatic assay was in the full text.
- id: Reactome:R-HSA-192051
  title: CYP7A1 7-hydroxylates CHOL
  findings:
  - statement: >-
      CYP7A1 catalyses cholesterol + NADPH + H+ + O2 to 7alpha-cholesterol + NADP+ + H2O
      in the endoplasmic reticulum membrane; the enzyme is expressed only in liver and
      is transcriptionally regulated to set the overall rate of bile acid/bile salt
      production.
    supporting_text: >-
      reaction catalysed by CYP7A1 (cholesterol 7alpha-hydroylase) in the endoplasmic
      reticulum membrane
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Reactome reaction for the committed cholesterol 7-alpha-hydroxylation step,
      localized to the ER membrane. Title left as fetched.
- id: Reactome:R-HSA-193368
  title: Synthesis of bile acids and bile salts via 7alpha-hydroxycholesterol
  findings:
  - statement: >-
      The classic (neutral) hepatic bile-acid biosynthesis pathway is initiated by
      conversion of cholesterol to 7alpha-hydroxycholesterol (the CYP7A1 step).
    supporting_text: >-
      synthesis of bile acids and bile salts is initiated with the conversion of
      cholesterol to 7alpha-hydroxycholesterol
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Reactome pathway placing CYP7A1 at the entry point of classic bile acid synthesis.
      Title left as fetched.
- id: Reactome:R-HSA-1989746
  title: Expression of CYP7A1
  findings:
  - statement: >-
      Reactome event representing transcription/translation of the CYP7A1 gene; relevant
      to the transcriptional-regulation biology but not to the enzyme's molecular
      localization.
    supporting_text: >-
      The CYP7A1 gene is transcribed to yield mRNA and the mRNA is translated to yield
      protein
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: >-
      This is a gene-expression event; GOA nonetheless cites it (TAS) for an ER-membrane
      localization, which is better supported by R-HSA-192051 and by UniProt. Title left
      as fetched.
- id: Reactome:R-HSA-211976
  title: Endogenous sterols
  findings:
  - statement: >-
      A number of cytochrome P450s (including CYP7A1) participate in cholesterol
      elimination and homeostasis, degrading cholesterol to bile salts.
    supporting_text: >-
      A number of CYPs take part in cholesterol biosynthesis and elimination, thus
      playing an important role in maintaining cholesterol homeostasis
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: >-
      Reactome grouping of sterol-metabolizing CYPs; supports the sterol metabolic
      process / cholesterol homeostasis context. Title left as fetched.
- id: file:human/CYP7A1/CYP7A1-uniprot.txt
  title: UniProtKB P22680 (CP7A1_HUMAN) curated entry
  findings:
  - statement: >-
      CYP7A1 is a cytochrome P450 monooxygenase that catalyses 7-alpha hydroxylation of
      cholesterol, the rate-limiting step in cholesterol catabolism and bile acid
      biosynthesis, and is a critical regulatory enzyme of bile acid biosynthesis and
      cholesterol homeostasis.
    supporting_text: >-
      Functions as a critical regulatory enzyme of bile acid biosynthesis and cholesterol
      homeostasis. Catalyzes the hydroxylation of carbon hydrogen bond at 7-alpha position
      of cholesterol, a rate-limiting step in cholesterol catabolism and bile acid
      biosynthesis
  - statement: >-
      The enzyme is localized to the endoplasmic reticulum (microsome) membrane as a
      single-pass membrane protein and uses heme as cofactor.
    supporting_text: 'SUBCELLULAR LOCATION: Endoplasmic reticulum membrane'
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Local cached UniProt record; verbatim FUNCTION and SUBCELLULAR LOCATION lines
      quoted.
