proposed_new_terms: []
suggested_questions:
- question: >-
    Beyond transcriptional feedback (FXR/bile acids, HNF4alpha, glucose), is human CYP7A1
    activity subject to significant post-translational or allosteric regulation?
- question: >-
    What is the quantitative in vivo contribution of CYP7A1's oxysterol 7-alpha-hydroxylase
    activities (24S-hydroxycholesterol, 4-beta-hydroxycholesterol, 7-dehydrocholesterol
    oxidation) relative to its cholesterol 7-alpha-hydroxylation?
suggested_experiments:
- description: >-
    Reconstitute purified recombinant human CYP7A1 with cytochrome P450 reductase and
    measure steady-state kinetics across cholesterol and the physiological oxysterol
    substrates to rank in vivo relevance.
- description: >-
    Use isotope-labeled flux analysis in primary human hepatocytes (or CYP7A1-edited lines)
    to quantify the fraction of cholesterol catabolism proceeding through the
    CYP7A1-initiated classic pathway versus the acidic (CYP27A1/CYP7B1) pathway.
