suggested_questions:
- question: >-
    To what extent does the UDP-GalNAc/GlcNAc 4-epimerase activity of GALE, versus its
    UDP-Gal/Glc activity, account for the distinct clinical phenotypes (galactosemia versus
    syndromic macrothrombocytopenia) seen with different GALE variants?
suggested_experiments:
- description: >-
    Systematically measure both UDP-Gal/Glc (EC 5.1.3.2) and UDP-GalNAc/GlcNAc (EC 5.1.3.7)
    epimerase activities for a panel of galactosemia- and thrombocytopenia-associated GALE
    variants, and correlate the differential loss of each activity with glycosylation status
    and clinical presentation.
  experiment_type: enzyme kinetics and glycomics
