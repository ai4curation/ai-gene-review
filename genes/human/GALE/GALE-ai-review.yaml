- term:
    id: GO:0003974
    label: UDP-N-acetylglucosamine 4-epimerase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: >-
      The human enzyme is bifunctional and also catalyses the reversible epimerization
      of UDP-N-acetyl-D-glucosamine and UDP-N-acetyl-D-galactosamine (EC 5.1.3.7,
      RHEA:20517), supplying UDP-GalNAc for glycoconjugate synthesis. This second
      activity is experimentally established for human GALE (unlike the E. coli ortholog)
      and is central to the N-glycosylation defect seen in GALE-related thrombocytopenia.
    action: ACCEPT
    reason: >-
      The EC 5.1.3.7 / RHEA mapping is a correct, experimentally corroborated secondary
      catalytic activity of the human enzyme, not an over-broad IEA. UniProt documents
      both catalytic activities on the basis of direct assay, and structural studies show
      the enlarged active site accommodates the N-acetyl group.
    supported_by:
    - reference_id: Reactome:R-HSA-70369
      supporting_text: >-
        Cytosolic UDP-galactose 4-epimerase catalyzes the interconversion of
        UDP-D-galactose and UDP-D-glucose
