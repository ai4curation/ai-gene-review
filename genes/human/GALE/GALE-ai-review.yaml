id: Q14376
gene_symbol: GALE
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  GALE is the human cytosolic, NAD+-dependent UDP-galactose 4-epimerase
  (galactowaldenase; EC 5.1.3.2), which catalyses the fourth, recycling step of
  the Leloir pathway of galactose catabolism: the reversible interconversion of
  UDP-alpha-D-glucose and UDP-alpha-D-galactose. This activity regenerates the
  UDP-glucose consumed by galactose-1-phosphate uridylyltransferase (GALT) and
  supplies UDP-galactose for the biosynthesis of glycoproteins, glycolipids and
  other galactosylated glycoconjugates. The human enzyme is bifunctional and also
  interconverts UDP-N-acetyl-alpha-D-glucosamine and UDP-N-acetyl-alpha-D-
  galactosamine (EC 5.1.3.7), providing UDP-GalNAc for glycosylation; this second
  activity, absent in the bacterial ortholog, reflects an enlarged active-site
  sugar-binding pocket. The active enzyme is a homodimer with one tightly bound
  NAD+ per subunit; catalysis proceeds through transient oxidation of the sugar at
  C4, rotation, and stereospecific reduction, with Tyr157 acting as the active-site
  proton acceptor. Loss-of-function variants cause epimerase-deficiency galactosemia
  (galactosemia type III), which ranges from a benign peripheral form limited to
  circulating blood cells to a rare severe generalized form, and biallelic variants
  that predominantly impair the UDP-GalNAc/GlcNAc activity and N-glycosylation cause
  a syndromic macrothrombocytopenia.
