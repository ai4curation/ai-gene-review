  qualifier: enables
  review:
    summary: >-
      UDP-glucose 4-epimerase (UDP-Glc <-> UDP-Gal, EC 5.1.3.2) is the defining,
      phylogenetically conserved molecular function of GALE across the panther
      family. This is the core molecular function and is independently supported by
      direct biochemical assay of the human enzyme.
    action: ACCEPT
    reason: >-
      Core molecular function. The IBA is consistent with direct experimental
      characterization of purified human GALE catalysing UDP-glucose/UDP-galactose
      interconversion, and with the crystal structure of the enzyme in complex with
      NAD and UDP-glucose.
