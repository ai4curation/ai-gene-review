id: P15586
gene_symbol: GNS
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  GNS (N-acetylglucosamine-6-sulfatase; EC 3.1.6.14, also called glucosamine-6-sulfatase/G6S)
  is a lysosomal exo-sulfatase that hydrolytically removes the 6-O-sulfate group from terminal
  N-acetyl-D-glucosamine-6-sulfate residues during the stepwise exolytic degradation of the
  glycosaminoglycans heparan sulfate and keratan sulfate. Like other members of the sulfatase
  family, it depends on a catalytic C-alpha-formylglycine residue generated from an active-site
  cysteine by the formylglycine-generating enzyme SUMF1, and it binds a catalytic Ca2+ ion. The
  mature enzyme is synthesized as a glycosylated precursor with a cleavable signal peptide and
  acts in the lysosomal lumen at acidic pH. Loss of GNS activity causes mucopolysaccharidosis
  type IIID (Sanfilippo syndrome D), an autosomal-recessive lysosomal storage disorder marked by
  heparan sulfate accumulation and progressive central nervous system degeneration.
