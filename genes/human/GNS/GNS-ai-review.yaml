proposed_new_terms: []
suggested_questions:
- question: >-
    Does GNS have any non-lysosomal physiological role in extracellular glycosaminoglycan
    remodeling, given its presence and O-desulphation activity in neutrophil primary granules and
    its release upon degranulation?
suggested_experiments:
- description: >-
    Structure-guided characterization of the formylglycine-dependent active site (Cys91 -> FGly,
    Ca2+ coordination) to map how MPS IIID missense variants (e.g. S94I, K340R, G418E) disrupt
    catalysis or protein stability.
