- id: PMID:1463457
  title: A cDNA clone for human glucosamine-6-sulphatase reveals differences between
    arylsulphatases and non-arylsulphatases.
  findings:
  - statement: >-
      GNS (glucosamine-6-sulphatase) is a lysosomal exo-hydrolase required for degradation of
      heparan sulphate and keratan sulphate; its deficiency causes MPS IIID with lysosomal storage
      of heparan sulphate. The full 552-aa precursor with a 36-aa leader was cloned and its
      catalytic activity (EC 3.1.6.14) established.
    supporting_text: >-
      Glucosamine-6-sulphatase is an exo-hydrolase required for the lysosomal degradation of heparan
      sulphate and keratan sulphate.
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Primary cloning/characterization paper; directly establishes the core molecular function and
      biological role. Source of the UniProt EC 3.1.6.14 and FUNCTION evidence.
- id: PMID:15595925
  title: Purification of a 75 kDa protein from the organelle matrix of human neutrophils
    and identification as N-acetylglucosamine-6-sulphatase.
  findings:
  - statement: >-
      A 75 kDa neutrophil granule-matrix protein was purified and identified by MS as
      N-acetylglucosamine-6-sulphatase (EC 3.1.6.14), with confirmed activity toward
      N-acetylglucosamine-6-sulphate and O-desulphation of heparan-sulphate-derived saccharides;
      it localizes to primary (azurophil) granules and is released on PMA stimulation.
    supporting_text: >-
      identified the protein to be N-acetylglucosamine-6-sulphatase (EC 3.1.6.14). The identity of
      the protein was confirmed by demostrating enzymatic activity towards the substrate
      N-acetylglucosamine 6-sulphate.
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Provides direct (IDA) support for the molecular function, heparan sulfate catabolic process,
      and the neutrophil primary-granule / secreted locations.
- id: PMID:15962010
  title: Sulphatase activities are regulated by the interaction of sulphatase-modifying
    factor 1 with SUMF2.
  findings:
  - statement: >-
      GNS is a formylglycine-dependent sulphatase; it was among the sulphatases whose activity is
      enhanced by SUMF1 (formylglycine-generating enzyme) and modulated by SUMF2. Supports the
      broad sulfuric-ester-hydrolase annotation, which is best refined to the specific
      GlcNAc-6-sulfatase activity.
    supporting_text: >-
      we transfected Cos7 cells with several sulphatase cDNAs ( ARSA , ARSC , ARSF , IDS , SGSH ,
      GALNS , GNS )
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: >-
      GNS is one of seven sulphatases co-transfected/assayed; supports the FGly/SUMF1 dependence of
      GNS activity but the paper's main focus is SUMF1/SUMF2 regulation, not GNS specifically.
- id: PMID:17474147
  title: Systematic identification of SH3 domain-mediated human protein-protein interactions
    by peptide array target screening.
  findings:
  - statement: >-
      GNS appears as a peptide-array hit for SH3 domains (including NCK1) in a proteome-wide
      screen. This underlies the bare "protein binding" IPI, which is uninformative about GNS's
      molecular function.
    supporting_text: >-
      A group of 12 Src homology (SH) 3 domains from eight human proteins (Swiss-Prot ID: SRC,
      PLCG1, P85A, NCK1, GRB2, FYN, CRK) were used to screen a peptide target array
  reference_review:
    relevance: LOW
    correctness: VERIFIED
    review_notes: >-
      High-throughput SH3 peptide-array screen; citation is correct but supports only an
      uninformative "protein binding" annotation with no evidence of biological relevance to GNS.
- id: PMID:23533145
  title: In-depth proteomic analyses of exosomes isolated from expressed prostatic
    secretions in urine.
  findings:
  - statement: >-
      GNS was detected among ~900 proteins in a shotgun-proteomics survey of urinary prostatic-
      secretion exosomes, underlying the extracellular-exosome location annotation.
    supporting_text: >-
      In pooled EPS-urine exosome samples, ~900 proteins were detected.
  reference_review:
    relevance: LOW
    correctness: VERIFIED
    review_notes: >-
      Large-scale exosome proteomics; supports only a non-core secreted-vesicle location.
- id: PMID:3689315
  title: Human liver N-acetylglucosamine-6-sulphate sulphatase. Catalytic properties.
  findings:
  - statement: >-
      Human liver GNS is a highly specific exo-sulfatase for glucosamine-6-sulphate / glucose-6-
      sulphate residues, desulfating keratan-sulphate- and heparin-derived substrates; it shows no
      activity toward internal sulphate ester bonds, and sulphate/phosphate ions are potent
      inhibitors.
    supporting_text: >-
      Both forms A and B are exo-enzymes, since activity towards internal sulphate ester bonds was
      not observed.
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Detailed enzymology; supports the molecular function and the glycosaminoglycan catabolic
      process (exolytic mechanism).
