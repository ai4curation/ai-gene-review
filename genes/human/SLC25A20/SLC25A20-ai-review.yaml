suggested_questions:
- question: >-
    What is the physiological acyl-chain-length preference of human SLC25A20 in
    situ, and does it transport medium-chain acylcarnitines efficiently enough to
    explain the acylcarnitine profile seen in CACT deficiency?
- question: >-
    Does SLC25A20 have any physiologically relevant protein partners at the inner
    membrane (e.g., functional coupling to CPT2 or the beta-oxidation machinery),
    beyond the high-throughput LAMP2 interaction?
suggested_experiments:
- description: >-
    Reconstitute recombinant human SLC25A20 into proteoliposomes and measure
    antiport kinetics (Km, Vmax) for a panel of acyl-carnitines of varying chain
    length versus free carnitine to define substrate specificity quantitatively.
- description: >-
    Use proximity labeling (BioID/APEX) of SLC25A20 in intact mitochondria to test
    for functional coupling with CPT2 and other inner-membrane fatty-acid
    oxidation components.
