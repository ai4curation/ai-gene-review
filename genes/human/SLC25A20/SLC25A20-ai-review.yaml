- term:
    id: GO:0006635
    label: fatty acid beta-oxidation
  evidence_type: IC
  original_reference_id: PMID:9399886
  qualifier: involved_in
  review:
    summary: >-
      SLC25A20 is required for mitochondrial long-chain fatty acid beta-oxidation:
      by importing acylcarnitines into the matrix it delivers the substrate that
      CPT2 converts back to acyl-CoA for the beta-oxidation spiral.
    action: NEW
    reason: >-
      The carnitine shuttle exists to enable fatty acid beta-oxidation, and
      UniProt explicitly states SLC25A20 translocates fatty acids (as
      acylcarnitines) into the matrix "to undergo fatty acid beta-oxidation".
      Loss of SLC25A20 blocks long-chain FAO, causing CACT deficiency. This
      process is not captured elsewhere in the GOA set (which has the carnitine
      shuttle and transport processes but not the beta-oxidation process), so it
      is proposed as a NEW involved_in annotation. Inferred from the
      curator-established role (IC) with the cloning paper as anchor reference.
    supported_by:
    - reference_id: file:human/SLC25A20/SLC25A20-uniprot.txt
      supporting_text: >-
        it translocates the fatty acids in the form of
        acylcarnitines into the mitochondrial matrix, where the carnitine
        palmitoyltransferase 2 (CPT-2) activates them to undergo fatty acid
        beta-oxidation
