id: O43772
gene_symbol: SLC25A20
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  SLC25A20 is the mitochondrial carnitine/acylcarnitine carrier (also called
  carnitine-acylcarnitine translocase, CACT/CAC), an integral multi-pass protein
  of the mitochondrial inner membrane belonging to the mitochondrial carrier
  (SLC25) family. It catalyzes the electroneutral exchange (antiport) of
  long-chain O-acyl-L-carnitines for free L-carnitine across the inner membrane,
  and at lower rates the uniport of free carnitine. This activity is the central
  step of the mitochondrial carnitine shuttle: carnitine palmitoyltransferase 1
  (CPT1) on the outer membrane converts acyl-CoA to acylcarnitine, SLC25A20
  imports the acylcarnitine into the matrix while exporting free carnitine, and
  carnitine palmitoyltransferase 2 (CPT2) on the matrix face of the inner
  membrane regenerates acyl-CoA for fatty acid beta-oxidation. SLC25A20 is thus
  essential for delivering long-chain fatty acids into the matrix for energy
  production, especially during fasting and metabolic stress. Loss-of-function
  variants cause carnitine-acylcarnitine translocase deficiency, a severe
  autosomal-recessive long-chain fatty acid oxidation disorder presenting mostly
  in the neonatal period with hypoketotic hypoglycemia, hyperammonemia,
  cardiomyopathy, cardiac arrhythmia, and high mortality.
