id: P37268
gene_symbol: FDFT1
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  FDFT1 encodes squalene synthase (SQS; farnesyl-diphosphate farnesyltransferase 1;
  EC 2.5.1.21), the enzyme that catalyses the first committed step of sterol
  biosynthesis. It performs the reductive, head-to-head condensation of two molecules
  of farnesyl diphosphate (FPP) to form squalene, proceeding in two half-reactions via
  the stable presqualene diphosphate (PSQPP) intermediate followed by an NAD(P)H- and
  Mg2+-dependent reduction. Because FPP lies at the branch point of the isoprenoid
  pathway, squalene synthase commits the isoprenoid pool specifically to the sterol
  branch (squalene to lanosterol to cholesterol), diverting it away from the non-sterol
  branches (dolichol, ubiquinone, heme A, and protein prenylation). The protein is a
  C-terminally anchored, multi-pass endoplasmic reticulum membrane enzyme with its
  catalytic domain facing the cytoplasm. Squalene synthase is widely expressed, is a
  pharmacological target for cholesterol lowering, and biallelic loss-of-function causes
  squalene synthase deficiency (SQSD), a congenital disorder of cholesterol biosynthesis
  featuring developmental delay, facial dysmorphism, and low total/LDL cholesterol.
