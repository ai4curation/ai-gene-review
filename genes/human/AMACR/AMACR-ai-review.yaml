gene_symbol: AMACR
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: 'Alpha-methylacyl-CoA racemase (AMACR; EC 5.1.99.4) is an isomerase that
  interconverts the (R)- and (S)-epimers of 2-methyl-branched-chain fatty acyl-CoA
  esters. It acts only on coenzyme A thioesters (not free fatty acids) and accepts
  a wide range of alpha-methylacyl-CoA substrates including pristanoyl-CoA and the
  C27 bile-acid intermediates trihydroxycoprostanoyl-CoA (THCA-CoA) and DHCA-CoA,
  but not 3-methyl-branched or linear-chain acyl-CoAs. By converting (2R)-methyl-branched
  acyl-CoAs to their (S)-stereoisomers, AMACR generates the only stereoisomers that
  the peroxisomal beta-oxidation machinery can degrade, and is therefore essential
  for two catabolic routes; side-chain shortening of the C27 bile-acid intermediates
  (25R)-THCA-CoA and DHCA-CoA en route to the mature C24 bile acids, and degradation
  of the branched-chain fatty acid pristanic acid (the product of phytanic acid alpha-oxidation).
  The single AMACR transcript encodes a protein bearing two topogenic signals, a C-terminal
  PTS1 variant (KASL/ASL) and an internal mitochondrial targeting region, so the enzyme
  is dually localized to peroxisomes (bulk activity) and mitochondria, where a mitochondrial
  pool racemizes downstream pristanic-acid breakdown products. Loss-of-function variants
  cause AMACR deficiency, an adult-onset sensorimotor neuropathy and relapsing encephalopathy
  with elevated plasma pristanic acid and abnormal C27 bile-acid intermediates, and
  congenital bile acid synthesis defect type 4. AMACR is a member of the CoA-transferase
  III family and is a widely used immunohistochemical biomarker overexpressed in prostate
  and other carcinomas.'
