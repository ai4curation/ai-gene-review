core_functions:
- description: Interconverts the (R)- and (S)-epimers of 2-methyl-branched-chain acyl-CoA
    esters (alpha-methylacyl-CoA racemase, EC 5.1.99.4), converting (2R)-methyl-branched
    acyl-CoAs to the (S)-stereoisomers required by peroxisomal beta-oxidation. Essential
    for side-chain shortening of the C27 bile-acid intermediates (25R)-THCA-CoA/DHCA-CoA
    en route to C24 bile acids, and for degradation of the branched-chain fatty acid
    pristanic acid. Acts as a soluble matrix enzyme in the peroxisome (and a mitochondrial
    pool).
