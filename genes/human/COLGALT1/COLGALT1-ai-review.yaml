proposed_new_terms:
- term_label: manganese ion binding
  term_id: GO:0030145
  reason: COLGALT1 belongs to glycosyltransferase family 25 with a GT-A-like fold and
    essential catalytic aspartate residues (D166/D168, D461/D463 identified by mutagenesis),
    characteristic of divalent-metal (Mn2+)-dependent glycosyltransferases. Mn2+ dependence
    is expected on family and structural grounds, although no direct experimental metal-binding
    annotation currently exists in GOA.
  supported_by:
  - reference_id: PMID:22216269
    supporting_text: Mutagenesis identified aspartate residues D166/D168 and D461/D463
      as essential for collagen galactosyltransferase activity, consistent with a GT-A
      metal-dependent catalytic fold.
suggested_questions:
- question: Does COLGALT1 require Mn2+ (or another divalent cation) for catalysis,
    and which residues coordinate the metal in the recently solved GT25 structures?
- question: To what extent are the collagen folding/secretion phenotypes of COLGALT1
    loss tissue- and collagen-type-specific (e.g., type IV in cerebral vasculature
    vs. type I in bone), given paralogous compensation by COLGALT2?
suggested_experiments:
- experiment: Use the available cryo-EM and X-ray structures (e.g., PDB 8ZGE, 9EVJ)
    together with metal-substitution and site-directed mutagenesis to confirm the catalytic
    metal requirement and map the divalent-cation coordination site.
- experiment: Generate tissue-specific or vascular COLGALT1 knockouts/knock-ins of
    BSVD3 variants and quantify collagen type IV glycosylation, basement membrane integrity,
    and small-vessel pathology to causally link enzymatic loss to disease.
