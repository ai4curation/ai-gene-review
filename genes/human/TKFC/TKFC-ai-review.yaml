- id: PMID:16289032
  title: Identification of human and rat FAD-AMP lyase (cyclic FMN forming) as ATP-dependent
    dihydroxyacetone kinases.
  findings: []
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified. Establishes that a single human protein (LOC26007 cDNA, i.e. TKFC)
      possesses both FMN cyclase (FAD-AMP lyase) and ATP-dependent dihydroxyacetone kinase
      activities, each inhibited by the substrate(s) of the other. Supports the FAD-AMP lyase and
      glycerone kinase MF annotations.
- id: PMID:17600090
  title: Negative regulation of MDA5- but not RIG-I-mediated innate antiviral signaling
    by the dihydroxyacetone kinase.
  findings: []
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified. Identifies DAK/TKFC as a specific MDA5 (IFIH1)-interacting protein and a
      physiological suppressor of MDA5- but not RIG-I-mediated antiviral signaling. Supports
      GO:0039534 and the moonlighting immune core function.
- id: PMID:19056867
  title: Large-scale proteomics and phosphoproteomics of urinary exosomes.
  findings: []
  reference_review:
    relevance: LOW
    correctness: VERIFIED
    review_notes: >-
      Bulk urinary-exosome proteomics (1132 proteins); TKFC detection is incidental for a cytosolic
      enzyme. Supports only the (over-annotated) extracellular exosome localization.
- id: PMID:21630459
  title: Proteomic characterization of the human sperm nucleus.
  findings: []
  reference_review:
    relevance: LOW
    correctness: VERIFIED
    review_notes: >-
      Sperm-nucleus proteome (403 proteins). Detection of a cytosolic enzyme likely reflects
      contamination/non-functional presence; supports only the over-annotated nuclear localization.
- id: PMID:23533145
  title: In-depth proteomic analyses of exosomes isolated from expressed prostatic
    secretions in urine.
  findings: []
  reference_review:
    relevance: LOW
    correctness: VERIFIED
    review_notes: >-
      Prostatic/urinary exosome proteomics (~900 proteins). Incidental detection of a cytosolic
      enzyme; supports only the over-annotated extracellular exosome localization.
- id: PMID:25416956
  title: A proteome-scale map of the human interactome network.
  findings: []
  reference_review:
    relevance: LOW
    correctness: VERIFIED
    review_notes: >-
      Proteome-scale binary interactome map; source of the SDCBP (O00560) protein binding IPI. No
      established functional interpretation for TKFC; supports only the uninformative protein
      binding term.
- id: PMID:32004446
  title: Bi-allelic Variants in TKFC Encoding Triokinase/FMN Cyclase Are Associated
    with Cataracts and Multisystem Disease.
  findings: []
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified. Defines human TKFC deficiency (TKFCD); confirms the bifunctional enzyme
      (glyceraldehyde kinase in fructose metabolism plus FMN lyase generating cyclic FMN); FMN-lyase
      domain variants (G445S, R543I) severely reduce triokinase and glycerone kinase activities.
- id: PMID:4688871
  title: 'Dihydroxyacetone metabolism by human erythrocytes: demonstration of triokinase
    activity and its characterization.'
  findings: []
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified. Classic biochemical demonstration and kinetic characterization of human
      triokinase (dihydroxyacetone/glyceraldehyde kinase) activity in erythrocytes. Supports the
      triokinase and glycerone kinase MF annotations.
