id: Q3LXA3
gene_symbol: TKFC
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  TKFC (triokinase/FMN cyclase; also called DAK) is a cytosolic, homodimeric bifunctional
  enzyme of the dihydroxyacetone kinase (DAK) family, built from an N-terminal DhaK domain and a
  C-terminal DhaL domain. Its first activity is an ATP-dependent triokinase / dihydroxyacetone
  kinase that phosphorylates D-glyceraldehyde to D-glyceraldehyde 3-phosphate (EC 2.7.1.28) and
  dihydroxyacetone to dihydroxyacetone phosphate (EC 2.7.1.29). By phosphorylating the
  D-glyceraldehyde generated by aldolase B during hepatic fructolysis, it returns fructose-derived
  carbon to glycolysis, and it likewise salvages free dihydroxyacetone; both triose phosphate
  products feed central carbohydrate metabolism. Its second activity is an FAD-AMP lyase
  (cyclizing), or FMN cyclase (EC 4.6.1.15), which splits FAD into riboflavin 4',5'-cyclic phosphate
  (cyclic FMN) plus AMP and is the only known enzymatic source of this unusual flavin nucleotide;
  the FMN-cyclase activity requires Mn2+ or Co2+, and the kinase and cyclase activities are each
  inhibited by the substrate(s) of the other, consistent with shared/overlapping catalytic
  chemistry across the two domains. Beyond metabolism, TKFC has a moonlighting regulatory role in
  innate immunity: it binds the cytoplasmic viral RNA sensor MDA5 (IFIH1) via its CARD domains and
  negatively regulates MDA5- (but not RIG-I-) mediated type I interferon signaling, an interaction
  relieved upon viral infection. In humans, bi-allelic loss-of-function variants cause an autosomal
  recessive multisystem disorder (TKFC deficiency) characterized by cataracts and developmental
  delay, variably with cerebellar hypoplasia, liver dysfunction, microcytic anemia, and lactic
  acidosis with cardiomyopathy.
