suggested_questions:
- question: Beyond GM2 ganglioside, dermatan sulfate and keratan sulfate, which
    glycoconjugate substrates in vivo depend specifically on the HEXA alpha active site
    (as opposed to the beta active site of HEXB)?
- question: To what extent do secreted/exosomal and neutrophil azurophil-granule pools
    of hexosaminidase A have physiological (non-lysosomal) roles?
suggested_experiments:
- description: Substrate-resolved lysosomal glycomics in HEXA-null versus HEXB-null cells
    to define the alpha-subunit-specific substrate repertoire in vivo.
- description: Structure-guided mutagenesis of the alpha-specific loop and Arg424 to
    dissect GM2A-dependent GM2 recognition versus general hexosaminidase activity.
