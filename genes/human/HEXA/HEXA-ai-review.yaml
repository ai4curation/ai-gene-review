id: P06865
gene_symbol: HEXA
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: HEXA encodes the alpha subunit of lysosomal beta-hexosaminidase, a
  glycoside hydrolase family 20 (GH20) enzyme (EC 3.2.1.52). With the beta subunit
  (HEXB) it forms beta-hexosaminidase A, the alpha-beta heterodimer; the beta-beta
  homodimer is hexosaminidase B and the alpha-alpha homodimer is hexosaminidase S.
  The enzyme hydrolyses terminal non-reducing beta-linked N-acetyl-D-hexosamine
  (beta-GalNAc/GlcNAc, including sulfated hexosamine) residues from a range of
  glycoconjugates. The alpha-subunit active site is uniquely able, together with the
  GM2-activator protein (GM2A), to hydrolyse the GM2 ganglioside (removing the terminal
  GalNAc to give GM3); only hexosaminidase A performs this reaction in vivo. Because
  the alpha active site accepts negatively charged/sulfated substrates, hexosaminidase
  A/S also degrade sulfated glycosaminoglycan fragments (dermatan sulfate, keratan
  sulfate) and other glycoconjugates such as the sulfated glycosphingolipid SM2. The
  enzyme acts in the lysosome / lysosomal lumen. Loss of HEXA activity causes
  GM2-gangliosidosis type 1 (Tay-Sachs disease), an autosomal-recessive lysosomal
  storage disease characterised by neuronal accumulation of GM2 ganglioside.
