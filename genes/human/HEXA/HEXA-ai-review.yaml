- term:
    id: GO:0008375
    label: acetylglucosaminyltransferase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000117
  qualifier: enables
  review:
    summary: Electronic ARBA assignment of a glycosyltransferase (acetylglucosaminyltransferase)
      activity. This is biologically incorrect - HEXA is a GH20 glycoside hydrolase
      (EC 3.2.1.52) that removes terminal hexosamines by hydrolysis, not a transferase
      that adds GlcNAc. The transferase reading likely arises from misinterpreting
      N-glycan trimming reports as sugar transfer.
    action: REMOVE
    reason: Wrong enzyme class for an electronic inference; HEXA is a hydrolase, not a
      glycosyltransferase. This ARBA mapping contradicts the well-established catalytic
      activity and family assignment.
    supported_by:
