suggested_questions:
- question: Does AIRE have direct ubiquitin protein ligase activity in physiological assays, or is its PN UPS placement based only on PHD/RING-variant domain-family context?
  experts:
  - Peterson P
  - Abramson J
  - Benoist C
  - Mathis D
suggested_experiments:
- hypothesis: AIRE lacks intrinsic ubiquitin E3 ligase activity despite its PN UPS RING-variant/PHD placement.
  description: Test purified full-length AIRE and isolated PHD-containing fragments in reconstituted E1/E2/ubiquitin transfer assays alongside positive-control RING and PHD-RING E3 ligases, then validate candidate substrate ubiquitylation in AIRE-reconstituted medullary thymic epithelial cells by ubiquitin remnant proteomics.
  experiment_type: in vitro ubiquitination assay and cellular ubiquitinomics
