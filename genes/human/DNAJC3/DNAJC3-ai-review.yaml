core_functions:
- description: Inhibitor of the eIF2-alpha protein kinases PKR (EIF2AK2), PERK (EIF2AK3) and GCN2 (EIF2AK4); binds these kinases and blocks their autophosphorylation and their phosphorylation of eIF2-alpha, attenuating translational repression during ER, viral and other stresses.
