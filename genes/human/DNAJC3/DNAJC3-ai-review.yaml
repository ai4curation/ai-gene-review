- id: PMID:8576172
  title: The P58 cellular inhibitor complexes with the interferon-induced, double-stranded RNA-dependent protein kinase, PKR, to regulate its autophosphorylation and activity.
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: "Cached publication (publications/PMID_8576172.md) PubMed title matches the YAML title exactly and directly establishes that P58/DNAJC3 complexes with PKR and regulates its autophosphorylation/activity, supporting the core MF protein kinase inhibitor activity (GO:0004860). Full text not cached, but the title/abstract anchor the inhibitory-complex claim."
  findings:
  - statement: P58IPK/DNAJC3 is a TPR-family protein that complexes with PKR (EIF2AK2) and inhibits both PKR autophosphorylation and PKR-catalyzed phosphorylation of eIF-2-alpha.
    reference_section_type: RESULTS
- id: PMID:8666242
  title: Cloning, expression, and cellular localization of the oncogenic 58-kDa inhibitor of the RNA-activated human and mouse protein kinase.
  findings:
  - statement: p58IPK/DNAJC3 was cloned and localized to the cytoplasm; widely expressed with high levels in pancreas and testis.
    reference_section_type: RESULTS
- id: PMID:12601012
  title: P58IPK, a novel endoplasmic reticulum stress-inducible protein and potential negative regulator of eIF2alpha signaling.
  findings:
  - statement: P58IPK/DNAJC3 is induced by ER stress and acts as a negative regulator of eIF2-alpha signaling.
    reference_section_type: RESULTS
- id: PMID:22064321
  title: ERp29 induces breast cancer cell growth arrest and survival through modulation of activation of p38 and upregulation of ER stress protein p58IPK.
  findings:
  - statement: p58IPK/DNAJC3 is up-regulated downstream of ERp29-induced growth arrest; cited for negative regulation of translation and apoptosis but the link to DNAJC3 is correlative.
    reference_section_type: RESULTS
