suggested_questions:
- question: How does DNAJC3 partition between the ER lumen (BiP co-chaperone) and the cytosol (PKR inhibition), and is the same molecule responsible for both activities?
- question: Which activity loss (BiP co-chaperone versus eIF2-alpha kinase inhibition) drives the beta-cell failure and neurodegeneration in DNAJC3-deficient ACPHD?
suggested_experiments:
- description: In vitro kinase assays measuring DNAJC3 inhibition of PKR, PERK and GCN2 autophosphorylation and eIF2-alpha phosphorylation, with TPR-domain and J-domain variants to map the inhibitory determinants.
- description: Tissue-specific (beta-cell, neuron) DNAJC3 knockout with separation-of-function alleles (chaperone-dead versus kinase-inhibition-dead) to dissect which function underlies the diabetes/neurodegeneration phenotype.
