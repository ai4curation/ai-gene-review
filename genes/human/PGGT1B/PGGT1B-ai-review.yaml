taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: PGGT1B is the beta (catalytic) subunit of protein geranylgeranyltransferase
  type I (GGTase-I), a heterodimeric zinc metalloenzyme in which PGGT1B associates
  with the shared alpha subunit FNTA. GGTase-I catalyzes the transfer of a geranylgeranyl
  (C20 isoprenoid) group from geranylgeranyl diphosphate (GGPP) to the cysteine of
  C-terminal CAAX motifs (Cys-aliphatic-aliphatic-X, where X is typically leucine
  or phenylalanine), covalently modifying substrate proteins for membrane association.
  Substrates are largely Ras-superfamily small GTPases, including the Rho-family GTPases
  RAC1, RAC2 and the Rap GTPases RAP1A and RAP1B, as well as other CAAX proteins such
  as the guanylate-binding proteins GBP2 and GBP5. The PGGT1B subunit carries the catalytic
  Zn2+ ion and the binding sites for both the isoprenoid donor and the substrate peptide,
  while the enzyme also requires Mg2+. Geranylgeranylation by GGTase-I is a step in
  CAAX-box protein maturation that controls the subcellular localization and signaling
  of its substrate GTPases.
