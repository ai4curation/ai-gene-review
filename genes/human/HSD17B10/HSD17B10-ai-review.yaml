core_functions:
- description: >-
    NAD+-dependent (S)-2-methyl-3-hydroxybutyryl-CoA dehydrogenase (MHBD) acting in
    the mitochondrial matrix in L-isoleucine catabolism, oxidizing
    (2S,3S)-3-hydroxy-2-methylbutanoyl-CoA to 2-methyl-3-oxobutanoyl-CoA; the enzyme
    also has broad short/medium-chain (S)-3-hydroxyacyl-CoA dehydrogenase activity in
    fatty acid beta-oxidation. Deficiency of this activity causes the MHBD organic
    aciduria.
  molecular_function:
    id: GO:0047015
    label: 3-hydroxy-2-methylbutyryl-CoA dehydrogenase activity
  directly_involved_in:
  - id: GO:0006550
    label: L-isoleucine catabolic process
  - id: GO:0006635
    label: fatty acid beta-oxidation
  locations:
