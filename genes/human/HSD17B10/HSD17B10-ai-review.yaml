id: Q99714
gene_symbol: HSD17B10
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  HSD17B10 (also known as HADH2, SCHAD, SDR5C1, MRPP2, and historically ERAB/ABAD)
  is a mitochondrial-matrix protein of the short-chain dehydrogenase/reductase (SDR)
  family that acts as a functional homotetramer and is a genuinely moonlighting,
  multifunctional enzyme. In its catalytic role it is an NAD+-dependent
  dehydrogenase whose physiologically important activity is
  (S)-2-methyl-3-hydroxybutyryl-CoA dehydrogenase (MHBD) in L-isoleucine
  catabolism, oxidizing (2S,3S)-3-hydroxy-2-methylbutanoyl-CoA to
  2-methyl-3-oxobutanoyl-CoA. It has broad (S)-3-hydroxyacyl-CoA dehydrogenase
  activity on short/medium straight-chain acyl-CoAs and weaker intrinsic
  17-beta-/3-alpha-hydroxysteroid and alcohol dehydrogenase activities toward
  steroid hormones (including the neurosteroid allopregnanolone/brexanolone), bile
  acids and other substrates. Independently of its enzymatic activity, it moonlights
  as MRPP2, an essential non-catalytic subunit of mitochondrial RNase P (together
  with the methyltransferase TRMT10C/MRPP1 and the nuclease PRORP/MRPP3), which
  performs 5'-end processing of mitochondrial tRNAs; the TRMT10C-HSD17B10 subcomplex
  additionally catalyzes N1-methylation of purine-9 (m1A9/m1G9) of mt-tRNAs and acts
  as a tRNA-maturation platform that supports downstream 3'-processing by ELAC2 and
  3'-CCA addition by TRNT1. It localizes to the mitochondrial matrix and associates
  with the mitochondrial nucleoid. Loss-of-function mutations in the X-linked
  HSD17B10 gene cause HSD10 mitochondrial disease (a progressive infantile/childhood
  neurodegeneration with cardiomyopathy), and disease severity tracks with the
  RNase P/tRNA-processing and mitochondrial-integrity defect rather than with
  residual dehydrogenase activity.
