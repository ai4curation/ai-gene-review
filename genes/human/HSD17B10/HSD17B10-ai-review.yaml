      2-methyl-3-hydroxybutyryl-CoA
  - reference_id: PMID:20077426
    supporting_text: >-
      the mitochondrial enzyme 2-methyl-3-hydroxybutyryl-CoA dehydrogenase (MHBD)
      involved in isoleucine metabolism
  - reference_id: PMID:9553139
    supporting_text: >-
      This NAD+-dependent dehydrogenase catalyzes the reversible oxidation of
      L-3-hydroxyacyl-CoAs to form 3-ketoacyl-CoAs, but it does not act on the
      D-isomers.
- description: >-
    Broad-substrate NAD+-dependent (S)-3-hydroxyacyl-CoA dehydrogenase catalyzing the
    third step of mitochondrial fatty acid beta-oxidation, with NAD+ as the required
    cofactor bound in a Rossmann fold. This is the family-defining SDR catalytic
    activity underlying the MHBD and other hydroxyacyl-CoA/hydroxysteroid activities.
  molecular_function:
    id: GO:0003857
    label: (3S)-3-hydroxyacyl-CoA dehydrogenase (NAD+) activity
  directly_involved_in:
  - id: GO:0006635
    label: fatty acid beta-oxidation
  locations:
  - id: GO:0005759
    label: mitochondrial matrix
  supported_by:
  - reference_id: PMID:9553139
    supporting_text: >-
      This NAD+-dependent dehydrogenase catalyzes the reversible oxidation of
      L-3-hydroxyacyl-CoAs to form 3-ketoacyl-CoAs, but it does not act on the
      D-isomers.
  - reference_id: PMID:12917011
    supporting_text: >-
      In addition to the known hydroxyacyl-CoA dehydrogenase
- description: >-
    Essential non-catalytic (moonlighting) structural subunit MRPP2 of mitochondrial
    RNase P. As a homotetramer it binds mitochondrial pre-tRNA and, together with the
    methyltransferase TRMT10C/MRPP1 and the nuclease PRORP/MRPP3, carries out 5'-end
    processing of mitochondrial tRNAs; the TRMT10C-HSD17B10 subcomplex also acts as a
    tRNA-maturation platform and enables N1-methylation of purine-9 (m1A9/m1G9). This
    role is independent of the enzyme's dehydrogenase activity, and its loss underlies
    the severity of HSD10 mitochondrial disease.
  molecular_function:
    id: GO:0000049
    label: tRNA binding
  directly_involved_in:
  - id: GO:0097745
    label: mitochondrial tRNA 5'-end processing
  - id: GO:0070901
    label: mitochondrial tRNA methylation
  in_complex:
    id: GO:0030678
    label: mitochondrial ribonuclease P complex
  supported_by:
  - reference_id: PMID:18984158
    supporting_text: >-
      human mitochondrial RNase P is a protein enzyme that does not require a
      trans-acting RNA component for catalysis
  - reference_id: PMID:29040705
    supporting_text: >-
      it retains the tRNA product from the 5'-processing step
  - reference_id: PMID:23042678
    supporting_text: >-
      the human mitochondrial enzyme, moreover, requires a short-chain dehydrogenase
      as a partner protein
  - reference_id: PMID:20077426
    supporting_text: >-
      a property of HSD10 independent of its enzymatic activity is essential for
      structural and functional integrity of mitochondria
proposed_new_terms: []
suggested_questions:
- question: >-
    Which of HSD17B10's catalytic activities (isoleucine-pathway MHBD, general
    3-hydroxyacyl-CoA, neurosteroid/allopregnanolone, cardiolipin phospholipase) are
    physiologically significant in vivo versus in-vitro artifacts of a broad-specificity
    SDR active site?
- question: >-
    How does the non-catalytic RNase P/tRNA-processing role mechanistically account for
    HSD10 disease severity, and can it be uncoupled therapeutically from the metabolic
    (isoleucine) role?
- question: >-
    Does the neurosteroid (allopregnanolone/brexanolone) oxidation activity contribute
    to the neurological phenotype of HSD10 disease independently of tRNA processing?
suggested_experiments:
- description: >-
    Separation-of-function mutants that selectively abolish either dehydrogenase
    activity or RNase P/TRMT10C-binding, tested in patient-derived and knockout cells
    for mitochondrial tRNA processing, respiratory chain assembly, and viability.
- description: >-
    Quantitative in-vivo metabolic flux analysis of isoleucine catabolism and
    neurosteroid (allopregnanolone) levels in HSD10-deficient models to define which
    metabolic defects contribute to neuropathology.
- description: >-
    Structural and biochemical dissection of how the HSD17B10 homotetramer scaffolds
    TRMT10C and pre-tRNA across the sequential 5'-processing, methylation, 3'-processing
    and CCA-addition steps.
