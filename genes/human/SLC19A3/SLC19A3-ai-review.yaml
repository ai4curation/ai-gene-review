gene_symbol: SLC19A3
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  SLC19A3 (thiamine transporter 2, ThTr-2/THTR2) is a plasma-membrane solute
  carrier of the reduced-folate-carrier (RFC; TC 2.A.48) family with 12
  transmembrane helices. It mediates high-affinity cellular uptake of thiamine
  (vitamin B1), coupled to proton antiport, and has no folate transport
  activity, distinguishing it from its folate-carrier paralog SLC19A1 and
  functionally paralleling SLC19A2/THTR1. In addition to thiamine, the human
  transporter also carries pyridoxine (vitamin B6) in an H(+)-dependent,
  acidic-pH-favoring manner; this pyridoxine activity is species-restricted
  (present in human but absent in rat/mouse Slc19a3). SLC19A3 is widely
  expressed, with highest abundance in placenta, kidney and liver, and
  contributes to intestinal and renal thiamine uptake. Biallelic loss-of-function
  variants cause biotin-thiamine-responsive basal ganglia disease (BTBGD; thiamine
  metabolism dysfunction syndrome 2), an autosomal-recessive episodic
  encephalopathy that responds to high-dose thiamine with or without biotin.
