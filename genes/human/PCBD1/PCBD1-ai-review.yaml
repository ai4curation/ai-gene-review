- term:
    id: GO:0003713
    label: transcription coactivator activity
  evidence_type: TAS
  original_reference_id: PMID:1763325
  qualifier: enables
  review:
    summary: >-
      Traceable author statement capturing the DCoH function: PCBD1 is the
      dimerization cofactor of HNF1, stabilizing the HNF1 homodimer and enhancing
      its transcriptional activity without binding DNA itself. This is the second
      core function of the protein.
    action: ACCEPT
    reason: >-
      The DCoH/coactivator role is one of the two well-established functions of
      this bifunctional protein. DCoH selectively stabilizes HNF-1alpha dimers,
      forming a tetrameric complex that enhances transcription; DCoH does not
      confer activation to a heterologous GAL4 DNA-binding domain, consistent with
      a coactivator (not an autonomous activator) function. The HNF1B coactivator
      activity was later confirmed experimentally (PMID:24204001, FXYD2 promoter).
    supported_by:
    - reference_id: PMID:1763325
      supporting_text: >-
        A dimerization cofactor of HNF-1 alpha (DCoH) was identified that
