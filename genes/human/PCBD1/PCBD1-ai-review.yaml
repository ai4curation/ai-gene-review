core_functions:
- description: >-
    Pterin-4-alpha-carbinolamine dehydratase (PCD/PHS) activity in the
    tetrahydrobiopterin (BH4) regeneration cycle: PCBD1 dehydrates
    (4aS,6R)-4a-hydroxy-tetrahydrobiopterin (the carbinolamine intermediate
    formed when BH4 serves as cofactor for aromatic amino acid hydroxylases such
    as phenylalanine hydroxylase) to quinonoid-6,7-dihydrobiopterin plus water,
    accelerating cofactor turnover and suppressing formation of 7-substituted
    (primapterin) pterins. Loss of this activity causes HPABH4D/primapterinuria.
  molecular_function:
    id: GO:0008124
    label: 4-alpha-hydroxytetrahydrobiopterin dehydratase activity
  directly_involved_in:
  - id: GO:0006729
    label: tetrahydrobiopterin biosynthetic process
  locations:
  - id: GO:0005829
    label: cytosol
  supported_by:
  - reference_id: PMID:24204001
    supporting_text: >-
      So far, HPABH4D caused by PCBD1 mutations has been considered a transient,
      benign condition, primarily related to impaired BH 4 regeneration.
- description: >-
    Dimerization cofactor of HNF1 (DCoH) transcription coactivator activity:
    PCBD1 binds and stabilizes the homodimer of the homeodomain transcription
    factors HNF1A and HNF1B, forming a tetrameric complex that enhances
    HNF1-dependent transcription without binding DNA itself. Through HNF1B it
    costimulates target promoters such as FXYD2 (renal distal convoluted tubule),
    linking this moonlighting function to renal magnesium handling and to
    HNF1-associated MODY.
  molecular_function:
    id: GO:0003713
    label: transcription coactivator activity
  directly_involved_in:
  - id: GO:0045893
    label: positive regulation of DNA-templated transcription
  locations:
  - id: GO:0005634
    label: nucleus
  supported_by:
  - reference_id: PMID:1763325
    supporting_text: >-
      did not change the DNA binding characteristics of HNF-1 alpha, but enhanced
      its transcriptional activity
  - reference_id: PMID:24204001
    supporting_text: >-
      our findings establish PCBD1 as a coactivator of the HNF1B-mediated
      transcription necessary for fine tuning FXYD2 transcription in the DCT
