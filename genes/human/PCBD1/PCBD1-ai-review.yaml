- term:
    id: GO:0005654
    label: nucleoplasm
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: is_active_in
  review:
    summary: >-
      Phylogenetic (IBA) annotation placing PCBD1 in the nucleoplasm. This is
      consistent with the DCoH/coactivator role, where PCBD1 is recruited to the
      nucleus via HNF1 and acts on HNF1-dependent transcription.
    action: ACCEPT
    reason: >-
      Nuclear localization is experimentally supported for human PCBD1 and its
      DCoH function requires the nucleus. PCBD1 is recruited to the nucleus
      through interaction with HNF1B.
    supported_by:
    - reference_id: PMID:24204001
      supporting_text: >-
        Furthermore, cytosolic localization of PCBD1 increased when coexpressed
        with HNF1B mutants.
- term:
    id: GO:0005829
    label: cytosol
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: is_active_in
  review:
    summary: >-
      Phylogenetic (IBA) annotation to the cytosol, the compartment where the
      dehydratase reaction of the BH4 cycle takes place and where PCBD1
      homotetramers accumulate.
    action: ACCEPT
    reason: >-
      Cytosolic localization is experimentally confirmed for PCBD1 and is where
      its enzymatic (PCD) function operates as part of the BH4 regeneration
      cycle. PCBD1 was described as present in the cytosol of renal cells.
    supported_by:
    - reference_id: PMID:24204001
      supporting_text: >-
        Because Pcbd1 was present in the cytosol of renal cells, we hypothesized
        that the relative abundance of PCBD1 and HNF1B in the kidney may favor
        the cytosolic localization.
- term:
