- term:
    id: GO:0006571
    label: L-tyrosine biosynthetic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000108
  qualifier: involved_in
  review:
    summary: >-
      Electronic annotation created by inter-ontology logical inference
      (GO_REF:0000108) from the (erroneous) molecular function GO:0004505
      phenylalanine 4-monooxygenase activity. PCBD1 is not a tyrosine
      biosynthetic enzyme.
    action: REMOVE
    reason: >-
      This annotation is a downstream logical consequence of the incorrect
      phenylalanine 4-monooxygenase activity assignment (see GO:0004505). Tyrosine
      is produced by phenylalanine hydroxylase (PAH), which uses BH4 as cofactor;
      PCBD1 instead dehydrates the 4a-hydroxy-BH4 product of that hydroxylation
      as part of BH4 regeneration. It does not catalyze or participate in tyrosine
      biosynthesis. Since the source molecular function is wrong for PCBD1, the
      inferred process should be removed.
- term:
    id: GO:0006729
    label: tetrahydrobiopterin biosynthetic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: involved_in
  review:
    summary: >-
      InterPro-based electronic annotation to tetrahydrobiopterin biosynthetic
      process. PCBD1 participates in the BH4 cycle, regenerating BH4 from the
      4a-hydroxy-BH4 carbinolamine formed during aromatic amino acid
      hydroxylation.
    action: ACCEPT
    reason: >-
      Strictly, PCBD1 acts in BH4 regeneration/recycling rather than de novo
      synthesis, but GO groups the regeneration reactions under the
      tetrahydrobiopterin biosynthetic process node, and this is the accepted
      community annotation for the pterin-4-alpha-carbinolamine dehydratase
      family. UniProt annotates PCBD1 as involved in tetrahydrobiopterin
      biosynthesis. Retained as a core process (see core_functions), keeping in
      mind it reflects the recycling arm of the cycle.
    supported_by:
    - reference_id: PMID:24204001
      supporting_text: >-
        So far, HPABH4D caused by PCBD1 mutations has been considered a
        transient, benign condition, primarily related to impaired BH 4
        regeneration.
