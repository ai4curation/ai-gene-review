id: P61457
gene_symbol: PCBD1
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  PCBD1 is a small (104-residue) bifunctional, moonlighting protein that
  assembles as a homodimer/homotetramer and is distributed between the cytosol
  and the nucleus. It has two well-established, mechanistically unrelated
  activities. (1) As an enzyme, pterin-4-alpha-carbinolamine dehydratase (PCD;
  also called phenylalanine hydroxylase-stimulating protein, PHS; EC 4.2.1.96),
  it catalyzes the dehydration of (4aS,6R)-4a-hydroxy-tetrahydrobiopterin to
  quinonoid-6,7-dihydrobiopterin plus water. 4a-hydroxy-tetrahydrobiopterin is
  the carbinolamine intermediate formed when tetrahydrobiopterin (BH4) serves as
  cofactor for the aromatic amino acid hydroxylases, most prominently during the
  phenylalanine hydroxylase (PAH)-catalyzed conversion of phenylalanine to
  tyrosine. The quinonoid dihydrobiopterin product is subsequently reduced back
  to BH4 by dihydropteridine reductase (QDPR/DHPR); PCBD1 therefore operates in
  the BH4 regeneration/recycling arm of the cofactor cycle, accelerating
  quinonoid-BH2 formation and suppressing the non-enzymatic rearrangement that
  yields 7-substituted (primapterin) pterins. (2) As the dimerization cofactor of
  HNF1 (DCoH), the same protein binds and stabilizes the homodimer of the
  homeodomain transcription factors HNF1A and HNF1B; it does not bind DNA itself
  and does not alter HNF1 DNA-binding, but the resulting tetrameric DCoH-HNF1
  complex has enhanced transcriptional activity. Through this HNF1B coactivator
  role PCBD1 supports transcription of targets such as FXYD2 in the renal distal
  convoluted tubule, linking it to renal magnesium handling and to
  HNF1-dependent gene programs in kidney and pancreas. Loss-of-function variants
  cause an autosomal-recessive hyperphenylalaninemia (HPABH4D, primapterinuria),
  classically a mild/transient neonatal hyperphenylalaninemia, with later
  HNF1-associated complications including hypomagnesemia with renal magnesium
  wasting and MODY-type diabetes.
