    label: 4-alpha-hydroxytetrahydrobiopterin dehydratase activity
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: enables
  review:
    summary: >-
      Phylogenetic (IBA) annotation to the defining catalytic activity of the
      protein family, pterin-4-alpha-carbinolamine dehydratase (EC 4.2.1.96).
      This is one of the two core functions of PCBD1.
    action: ACCEPT
    reason: >-
      This is the core enzymatic function. UniProt records the catalytic
      activity (RHEA:11920; EC 4.2.1.96), disease variants reduce dehydratase
      activity, and the family (Pterin_4a, IPR001533) is defined by this
      reaction. Well supported across evidence types (IBA, IEA, ISS).
    supported_by:
    - reference_id: PMID:24204001
      supporting_text: >-
        Mutations in PCBD1 have been shown to cause a transient and benign form
