- term:
    id: GO:0045893
    label: positive regulation of DNA-templated transcription
  evidence_type: IEA
  original_reference_id: GO_REF:0000108
  qualifier: involved_in
  review:
    summary: >-
      Electronic annotation inferred by inter-ontology link from the
      transcription coactivator activity (GO:0003713). This captures the DCoH
