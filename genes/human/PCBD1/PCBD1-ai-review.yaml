- term:
    id: GO:0004505
    label: phenylalanine 4-monooxygenase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000107
  qualifier: enables
  review:
    summary: >-
      Electronic annotation transferred by Ensembl Compara (GO_REF:0000107) from
      the mouse ortholog Pcbd1 (with/from UniProtKB:P61458 /
      ENSMUSP00000020298). Phenylalanine 4-monooxygenase activity is the activity
      of phenylalanine hydroxylase (PAH), not PCBD1.
    action: REMOVE
    reason: >-
      This is a mis-annotation. GO:0004505 is defined as catalysis of
      L-phenylalanine + tetrahydrobiopterin + O2 = L-tyrosine +
      4-alpha-hydroxytetrahydrobiopterin, which is the reaction carried out by
      phenylalanine hydroxylase (PAH). PCBD1 does the opposite end of the cycle:
      it dehydrates the 4a-hydroxy-BH4 product of that hydroxylation
      (EC 4.2.1.96), regenerating BH4. PCBD1 has no phenylalanine hydroxylase
      catalytic machinery and is historically named phenylalanine
      hydroxylase-STIMULATING protein precisely because it accelerates cofactor
      turnover, not because it hydroxylates phenylalanine. This IEA is an
      over-propagated Compara transfer and should be removed; if not removed it
      is at minimum an over-annotation.
