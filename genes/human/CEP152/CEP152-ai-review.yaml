core_functions:
- description: >-
    CEP152 is a protein-macromolecule adaptor at the pericentriolar material. It
    co-assembles with CEP63 into a cylindrical scaffold around the parent
    centriole, recruits and positions PLK4 through its N-terminal region, and
    engages CPAP/CENPJ to support procentriole initiation and centriole
    replication.
  molecular_function:
    id: GO:0030674
    label: protein-macromolecule adaptor activity
  directly_involved_in:
  - id: GO:0007099
    label: centriole replication
  locations:
  - id: GO:0000242
    label: pericentriolar material
  in_complex:
    id: GO:0120099
    label: procentriole replication complex
  supported_by:
  - reference_id: PMID:20852615
    supporting_text: >-
      Here we show that the centriolar protein Asterless (Asl; human orthologue
      CEP152) provides a conserved molecular platform, the amino terminus of
      which interacts with the cryptic Polo box of Plk4 whereas the carboxy
      terminus interacts with the centriolar protein Sas-4 (CPAP in humans).
  - reference_id: PMID:21059844
    supporting_text: >-
      Our results suggest that Cep152 recruits Plk4 and CPAP to the centrosome
      to ensure a faithful centrosome duplication process.
  - reference_id: PMID:30858376
    supporting_text: >-
      Mutations disrupting the self-assembly abrogate Plk4-mediated centriole
      duplication.
  - reference_id: PMID:37433832
    supporting_text: >-
      Mutants defective in Cep63•Cep152 heterotetramer formation displayed
      crippled pericentriolar Cep152 organization, polo-like kinase 4 (Plk4)
      relocalization to the procentriole assembly site, and Plk4-mediated
      centriole duplication.
- description: >-
    During mitosis, centrosomal CEP152 organizes a temporally regulated complex
    with CEP63 and CEP57 and recruits APC/C. APC/C-dependent CEP152 ubiquitylation
    releases CEP57 so that it can bind pericentrin, promoting microtubule
    nucleation and proper mitotic spindle assembly.
  molecular_function:
    id: GO:0030674
    label: protein-macromolecule adaptor activity
  directly_involved_in:
  - id: GO:0090307
    label: mitotic spindle assembly
  locations:
  - id: GO:0005813
    label: centrosome
  supported_by:
  - reference_id: PMID:34878135
    supporting_text: >-
      Recruitment of the APC/C to spindle poles requires the centrosomal protein
      Cep152, and we identified Cep152 as both an APC/C interaction partner and
      an APC/C substrate.
  - reference_id: PMID:34878135
    supporting_text: >-
      The APC/C-mediated ubiquitylation of Cep152 at the centrosome releases
      Cep57 from this inhibitory complex and enables its interaction with
      pericentrin, a critical step in promoting microtubule nucleation.

proposed_new_terms: []

suggested_questions:
- question: >-
    How is the CEP63-CEP152 centriole-duplication scaffold remodeled at mitotic
    entry so that CEP57 is released to engage pericentrin without compromising
    centriole integrity?
- question: >-
    Is CEP152 directly required at deuterosomes in human multiciliated epithelia,
    and how much centriole amplification proceeds through deuterosomes versus
    parent-centriole-associated or deuterosome-independent routes?
- question: >-
    Do the four UniProt CEP152 isoforms differ in centrosomal targeting, partner
    selection, cell-cycle turnover, or tissue-specific centriole-amplification
    functions?

suggested_experiments:
- description: >-
    Engineer endogenous APC/C-resistant and separation-of-function CEP152 alleles
    in diploid human cells, then combine live-cell imaging of CEP57, pericentrin,
    microtubule nucleation, and chromosome segregation with rescue by wild-type
    CEP152 to resolve the mitotic handoff mechanism.
- description: >-
    Use CRISPR depletion and domain-specific rescue of CEP152 in differentiated
    human airway organoids, with quantitative imaging of DEUP1, PLK4, nascent
    centrioles, basal bodies, and cilia, to test the transferred deuterosome and
    multiciliated-cell annotations directly in human tissue.
- description: >-
    Compare endogenous isoform-specific tagging and rescue across proliferating
    cells and multiciliated-cell models, coupled to interaction proteomics, to
    determine whether CEP152 splice products have distinct localization or
    scaffold functions.
