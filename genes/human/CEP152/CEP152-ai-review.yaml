id: O94986
gene_symbol: CEP152
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  CEP152 is a large coiled-coil scaffold of the pericentriolar material that
  organizes centriole biogenesis. Together with CEP63 it forms a higher-order
  cylindrical assembly around the proximal region of a parent centriole. An
  N-terminal PLK4-binding region recruits and spatially organizes the master
  centriole-duplication kinase PLK4, while CEP152 also engages CPAP/CENPJ and
  other centrosomal factors to support procentriole initiation. In specialized
  multiciliated cells, CEP152 is recruited to DEUP1-positive deuterosomes and
  supports large-scale centriole amplification. During mitosis, APC/C-dependent
  turnover of CEP152 releases CEP57 from a CEP152-CEP63-CEP57 complex, enabling
  pericentrin recruitment and normal spindle assembly. Biallelic CEP152 variants
  cause primary microcephaly 9 and Seckel syndrome 5.
