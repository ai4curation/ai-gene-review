- id: PMID:33658185
  title: >-
    Biophysical and biochemical properties of Deup1 self-assemblies: a potential
    driver for deuterosome formation during multiciliogenesis.
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: Full text was checked; optogenetic and biochemical experiments show that DEUP1 assemblies compartmentalize Cep152 and Plk4 in a mouse model.
  findings:
  - statement: DEUP1 self-assemblies recruit CEP152 and PLK4 in multiciliated-cell models.
    supporting_text: >-
      Using an optogenetic approach, we demonstrated that self-assembly and the
      C-terminal half of Deup1 were sufficient to spatially compartmentalize
      centrosomal protein 152 (Cep152) and polo like kinase 4 (Plk4), master
      components for centriole biogenesis, in the cytoplasm.
- id: PMID:34878135
  title: The APC/C targets the Cep152-Cep63 complex at the centrosome to regulate mitotic spindle assembly.
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: Full text was checked; the paper directly establishes CEP152 as an APC/C-dependent regulator of CEP57 release, pericentrin recruitment, microtubule nucleation, and spindle assembly.
  findings:
  - statement: APC/C-dependent CEP152 turnover is required for proper mitotic spindle assembly.
    supporting_text: >-
      This negative feedback loop controlling APC/C localization is required for
      proper assembly of the mitotic spindle.
  - statement: Stabilizing APC/C-resistant CEP152 impairs microtubule nucleation and chromosome segregation.
    supporting_text: >-
      Stabilization of a Cep152 mutant that cannot be targeted by the APC/C
      results in reduced microtubule nucleation and increased chromosome
      mis-segregation.
- id: PMID:37433832
  title: Architectural basis for cylindrical self-assembly governing Plk4-mediated centriole duplication in human cells.
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: Full text was checked; the study extends the CEP63-CEP152 assembly mechanism with direct structural and cell-biological tests.
  findings:
  - statement: CEP63-CEP152 heterotetramer assembly organizes CEP152 and PLK4 for centriole duplication.
    supporting_text: >-
      Mutants defective in Cep63•Cep152 heterotetramer formation displayed
      crippled pericentriolar Cep152 organization, polo-like kinase 4 (Plk4)
      relocalization to the procentriole assembly site, and Plk4-mediated
      centriole duplication.
