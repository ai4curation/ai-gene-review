- id: PMID:20852615
  title: Asterless is a scaffold for the onset of centriole assembly.
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: PubMed record and cached abstract were checked; the study directly establishes the conserved CEP152 scaffold mechanism and duplication phenotype.
  findings:
  - statement: CEP152 is a molecular platform with separated PLK4- and CPAP-binding regions and is required for centrosome duplication.
    supporting_text: >-
      Here we show that the centriolar protein Asterless (Asl; human orthologue
