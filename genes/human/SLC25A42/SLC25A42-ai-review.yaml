- id: PMID:19429682
  title: A novel member of solute carrier family 25 (SLC25A42) is a transporter of
    coenzyme A and adenosine 3',5'-diphosphate in human mitochondria.
  findings:
  - statement: >-
      Purified, reconstituted SLC25A42 is a mitochondrial transporter for CoA and
      adenosine 3',5'-diphosphate (PAP) that operates only by strict counter-exchange,
      importing CoA in exchange for intramitochondrial (deoxy)adenine nucleotides.
    supporting_text: >-
      The main physiological role of SLC25A42 is to import CoA into mitochondria in exchange
      for intramitochondrial (deoxy)adenine nucleotides and adenosine 3',5'-diphosphate.
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Primary biochemical characterization (proteoliposome reconstitution); establishes
      the CoA/PAP counter-exchange transporter activity and inner-membrane localization.
      PubMed-verified.
- id: PMID:21630459
  title: Proteomic characterization of the human sperm nucleus.
  findings:
  - statement: >-
      Large-scale sperm-nucleus proteome catalogue (403 proteins) in which SLC25A42 was
      detected; a high-throughput co-purification, not evidence of a nuclear function.
    supporting_text: >-
      403 different proteins have been identified from the isolated sperm nuclei
  reference_review:
    relevance: LOW
    correctness: VERIFIED
    review_notes: >-
      Supports only a proteomic detection in sperm nuclei; underlies the GO:0005634 nucleus
      annotation, which is best treated as over-annotation/contamination for this
      mitochondrial inner-membrane carrier.
- id: PMID:32296183
  title: A reference map of the human binary protein interactome.
  findings:
  - statement: >-
      High-throughput binary (yeast two-hybrid) interactome reporting SLC25A42 interactions
      with keratins (KRT31, KRT34, KRTAP10-8) and MTUS2; underlies the bare protein-binding
      annotation.
    supporting_text: >-
      A reference map of the human binary protein interactome
  reference_review:
    relevance: LOW
    correctness: VERIFIED
    review_notes: >-
      Source of the uninformative GO:0005515 protein-binding annotation; keratin partners
      are typical sticky Y2H hits with no established relevance to CoA transport.
- id: PMID:34800366
  title: Quantitative high-confidence human mitochondrial proteome and its dynamics
    in cellular context.
  findings:
  - statement: >-
      SLC25A42 is detected in the high-confidence human mitochondrial proteome, consistent
      with its mitochondrial localization.
    supporting_text: >-
