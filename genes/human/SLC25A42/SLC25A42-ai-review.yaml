gene_symbol: SLC25A42
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  SLC25A42 is the mitochondrial coenzyme A (CoA) carrier of the SLC25 mitochondrial
  carrier family. It is a polytopic (multi-pass) protein of the mitochondrial inner
  membrane that imports CoA into the mitochondrial matrix by strict counter-exchange
  (antiport) with intramitochondrial (deoxy)adenine nucleotides such as ADP, dephospho-CoA,
  and adenosine 3',5'-diphosphate (PAP). By establishing and maintaining the large
  matrix CoA pool, it supplies the free CoA required for matrix acyl-CoA metabolism,
  including the TCA cycle and fatty-acid beta-oxidation. It functions redundantly with
  its paralog SLC25A16, and both are the human orthologs of yeast Leu5. Biallelic
  loss-of-function variants (recurrently the N291D substitution) cause an autosomal
  recessive disorder of recurrent metabolic crises with variable encephalomyopathic
  features and neurologic regression, presenting with lactic acidosis, muscle weakness,
  developmental delay, and epilepsy.
