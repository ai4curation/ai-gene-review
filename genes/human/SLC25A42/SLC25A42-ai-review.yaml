  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: >-
      Corroborates mitochondrial localization at proteome scale; less specific than the
      experimental inner-membrane evidence.
- id: PMID:40925986
  title: Cellular pan-chain acyl-CoA profiling reveals SLC25A42/SLC25A16 in mitochondrial
    CoA import and metabolism.
  findings:
  - statement: >-
      SLC25A42 and its paralog SLC25A16 are required in human cells for mitochondrial import
      of free CoASH, establishing the matrix CoA pool that supports CoA-dependent catabolism
      (TCA cycle, fatty-acid oxidation).
    supporting_text: >-
      SLC25A16 and SLC25A42 are critical for mitochondrial import of free CoASH
  - statement: >-
      The disease variant N291D is a loss-of-function mutant that cannot import CoA and cannot
      rescue the mitochondrial CoA pool.
    supporting_text: >-
      the human disease mutant A42N291D is a loss-of-function mutant that cannot import CoA
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Full-text primary study (Nat Metab 2025) providing in-cellulo (CRISPR KO, rescue,
      direct CoA-uptake) validation of CoA import and of the N291D loss-of-function
      disease mechanism. PubMed-verified.
