id: O43676
gene_symbol: NDUFB3
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  NDUFB3 (Complex I-B12; CI-B12) is a small (98-residue), single-pass membrane
  accessory ("supernumerary") subunit of mitochondrial respiratory chain Complex I
  (NADH:ubiquinone oxidoreductase). It is nuclear-encoded, imported into
  mitochondria, and is a stable subunit of the membrane arm of the mature
  holoenzyme, embedded in the inner mitochondrial membrane on the matrix side with
  a single transmembrane helix. It is not one of the 14 conserved catalytic core
  subunits and carries no redox cofactor, so it is non-catalytic; its role is
  structural, contributing to the assembly and stability of Complex I. Complex I as
  a whole transfers electrons from NADH to ubiquinone coupled to proton
  translocation across the inner membrane, feeding the respiratory chain and
  oxidative phosphorylation. The N-terminal histidine-rich motif of NDUFB3 is
  methylated by METTL9, which enhances Complex I-mediated mitochondrial
  respiration. In humans, biallelic loss-of-function variants in NDUFB3 cause
  mitochondrial complex I deficiency nuclear type 25 (MC1DN25).
