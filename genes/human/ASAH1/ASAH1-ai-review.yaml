id: Q13510
gene_symbol: ASAH1
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: ASAH1 encodes acid ceramidase (N-acylsphingosine amidohydrolase 1; EC
  3.5.1.23), a soluble lysosomal amidohydrolase that catalyzes the last common step
  of sphingolipid/glycosphingolipid degradation, hydrolyzing ceramide into sphingosine
  and a free fatty acid at acidic pH. It is synthesized as a single ~53-55 kDa precursor
  that is autoproteolytically cleaved into disulfide-linked alpha and beta subunits,
  with the N-terminal cysteine of the beta subunit (Cys143) serving as the catalytic
  nucleophile of an N-terminal nucleophile (Ntn) hydrolase; cleavage triggers a conformational
  change that activates the enzyme. It is trafficked to the lysosome via the mannose-6-phosphate
  receptor and requires the sphingolipid activator protein saposin D for activity against
  membrane-embedded ceramide. By controlling the balance of ceramide, sphingosine and
  sphingosine-1-phosphate, it influences downstream sphingolipid signaling (cell proliferation,
  apoptosis, differentiation). Loss-of-function mutations cause the lysosomal storage
  disorder Farber lipogranulomatosis, while hypomorphic alleles cause spinal muscular
  atrophy with progressive myoclonic epilepsy (SMA-PME).
