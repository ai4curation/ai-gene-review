core_functions:
- description: Acid ceramidase is a soluble lysosomal amidohydrolase that hydrolyzes
    ceramide (N-acylsphingosine) into sphingosine and a free fatty acid at acidic pH,
    catalyzing the terminal, common step of sphingolipid/glycosphingolipid degradation.
    It acts as a heterodimer of autoproteolytically generated, disulfide-linked alpha
    and beta subunits (catalytic Cys143 nucleophile) and requires saposin D for activity
    on membrane ceramide.
  molecular_function:
    id: GO:0017040
    label: N-acylsphingosine amidohydrolase activity
  directly_involved_in:
  - id: GO:0046514
    label: ceramide catabolic process
  locations:
  - id: GO:0043202
    label: lysosomal lumen
  supported_by:
  - reference_id: PMID:8955159
    supporting_text: hydrolyzes the sphingolipid ceramide into sphingosine and free
      fatty acid
  - reference_id: PMID:10610716
    supporting_text: 'Acid ceramidase (AC) is the lysosomal enzyme that degrades ceramide
      into '
  - reference_id: PMID:29692406
    supporting_text: 'Acid ceramidase (aCDase, ASAH1) hydrolyzes lysosomal membrane
      ceramide into '
proposed_new_terms: []
suggested_questions:
- question: What is the physiological (in vivo) significance of the reverse ceramide-synthase
    activity of ASAH1 relative to dedicated ceramide synthases (CerS1-6)?
- question: How much of the SMA-PME versus Farber disease phenotypic spectrum is explained
    by residual acid ceramidase activity versus tissue-specific substrate handling?
suggested_experiments:
- description: Tissue-specific conditional Asah1 knockouts (e.g. motor neuron vs skin)
    to dissect the SMA-PME versus Farber phenotypes.
- description: Quantify the in vivo contribution of ASAH1 reverse (ceramide synthase)
    activity using isotope-labeled sphingosine/fatty acid flux in cells with and without
    ASAH1.
