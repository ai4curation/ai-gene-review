- term:
    id: GO:0031405
    label: lipoic acid binding
  evidence_type: IDA
  original_reference_id: PMID:1671321
  qualifier: enables
  review:
    summary: >-
      GCSH binds one lipoic acid (lipoate) cofactor covalently on Lys107 (N6-lipoyllysine), via
      its lipoyl-binding domain. This covalently bound lipoyl group is the swinging arm that
      carries the reaction intermediate through the glycine cleavage cycle; lipoic acid binding
      is the informative molecular function of this otherwise non-catalytic carrier protein.
    action: NEW
    reason: >-
      GOA lists only bare protein binding as a molecular function. The lipoyl-carrier role is
      GCSH's defining molecular activity and is directly supported by the covalent (R)-lipoate
      cofactor (PMID:1671321), the N6-lipoyllysine modification at position 107, and the
      lipoyl-binding (biotinyl/lipoyl attachment) domain in UniProt. GO:0031405 lipoic acid
      binding is the appropriate, informative term. Proposed as a new molecular-function
      annotation.
