suggested_questions:
- question: >-
    Is there a dedicated GO molecular-function term for the lipoyl-swinging-arm/substrate-carrier
    role of GCSH-type H-proteins, distinct from the generic lipoic acid binding, that would
    better capture its aminomethyl-carrier activity within the glycine cleavage complex?
- question: >-
    How should GCSH's moonlighting role as a lipoyl donor for DLAT/DLST (protein lipoylation) be
    represented relative to its core carrier role in the GCS, e.g. via protein lipoylation
    (GO:0009249)?
