core_functions:
- description: >-
    Lipoyl-carrier (H-protein) function in the glycine cleavage system: GCSH bears a covalently
    attached lipoyl cofactor whose swinging arm shuttles the aminomethyl reaction intermediate
    between the P-, T- and L-proteins, making GCSH essential to glycine decarboxylation via the
    glycine cleavage complex in the mitochondrial matrix.
