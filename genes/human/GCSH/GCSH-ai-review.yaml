id: P23434
gene_symbol: GCSH
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  GCSH is the H-protein of the mitochondrial glycine cleavage system (GCS). It is a small,
  non-catalytic lipoyl-carrier protein: a lipoyl group is covalently attached to a specific
  lysine (N6-lipoyllysine, Lys107) and acts as a swinging arm that shuttles the reaction
  intermediate between the other GCS components. During glycine cleavage the H-protein accepts
  the aminomethyl moiety produced by the P-protein (glycine dehydrogenase/decarboxylating, GLDC),
  presents the aminomethyl-dihydrolipoyl intermediate to the T-protein (aminomethyltransferase,
  AMT) which releases ammonia and transfers the methylene group to tetrahydrofolate, and its
  resulting dihydrolipoyl form is reoxidised by the L-protein (dihydrolipoyl dehydrogenase, DLD).
  Because it is a substrate-carrier rather than an enzyme, its most informative functional
  attributes are its covalently bound lipoyl cofactor, its participation in glycine
  catabolism/decarboxylation, and its membership in the glycine cleavage complex. GCSH is
  localised to the mitochondrion/mitochondrial matrix and its lipoyl cofactor is generated in
  place by octanoyl transfer (LIPT2) and sulfur insertion (LIAS); it additionally serves as a
  lipoyl donor for other mitochondrial 2-oxo-acid dehydrogenase E2 subunits (DLAT, DLST) via
  LIPT1, a moonlighting role in cellular bioenergetics. Biallelic loss-of-function variants in
  GCSH are a rare cause of nonketotic hyperglycinemia (glycine encephalopathy), presenting as a
  combined disorder of glycine metabolism and protein lipoylation (multiple mitochondrial
  dysfunctions syndrome 7).
