core_functions:
- description: >-
    Sphingosine (sphingoid base) kinase: phosphorylates sphingosine and dihydrosphingosine
    (sphinganine) using ATP to produce sphingosine-1-phosphate and dihydro-sphingosine-1-
    phosphate, the key reaction of sphingosine kinase 2.
  molecular_function:
    id: GO:0008481
    label: sphingosine kinase activity
  supported_by:
  - reference_id: PMID:10751414
    supporting_text: >-
      Expression of SPHK2 in HEK 293 cells resulted in elevated SPP levels.
      d-erythro-dihydrosphingosine was a better substrate than d-erythro-sphingosine for
      SPHK2.
  - reference_id: PMID:19729656
    supporting_text: >-
      Sphingosine kinase 2 (SphK2), one of the isoenzymes that generates S1P, was associated
      with histone H3 and produced S1P that regulated histone acetylation.
- description: >-
    ATP binding: binds ATP as the phosphate donor for the sphingosine kinase reaction (DAGKc
    catalytic domain with conserved ATP-binding residues).
  molecular_function:
    id: GO:0005524
    label: ATP binding
  supported_by:
  - reference_id: file:human/SPHK2/SPHK2-uniprot.txt
    supporting_text: >-
      Reaction=a sphingoid base + ATP = a sphingoid 1-phosphate + ADP + H(+);
