- id: PMID:10751414
  title: Molecular cloning and functional characterization of a novel mammalian sphingosine
    kinase type 2 isoform.
  findings:
  - statement: >-
      Cloning and characterization of human/mouse SPHK2; SPHK2 expression raises SPP levels,
      with dihydrosphingosine a better substrate than sphingosine and a tissue distribution
      distinct from SPHK1.
    reference_section_type: ABSTRACT
    supporting_text: >-
      Expression of SPHK2 in HEK 293 cells resulted in elevated SPP levels.
      d-erythro-dihydrosphingosine was a better substrate than d-erythro-sphingosine for
      SPHK2.
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Founding SPHK2 characterization paper; directly establishes the core sphingosine kinase
      activity. PubMed-verified.
- id: PMID:11777919
  title: Sphingosine kinase interacts with TRAF2 and dissects tumor necrosis factor-alpha
    signaling.
  findings: []
  reference_review:
    relevance: LOW
    correctness: UNVERIFIED
    review_notes: >-
      Describes a SphK-TRAF2 interaction in a TNF/NF-kB context largely framed around SphK1;
      the specific attribution to SPHK2 is uncertain. Cited only for a bare protein-binding
      IPI, flagged as over-annotation.
- id: PMID:12391145
  title: Sphingosine kinase mediates vascular endothelial growth factor-induced activation
    of ras and mitogen-activated protein kinases.
  findings:
  - statement: >-
      VEGF-induced Ras-GTP/phospho-ERK accumulation is blocked by siRNA against SPK1 but not
      SPK2, indicating the effect is SPHK1-dependent.
    reference_section_type: ABSTRACT
    supporting_text: >-
      Small interfering RNA (siRNA) that targets SPK1, but not SPK2, blocks VEGF-induced
      accumulation of Ras-GTP and phospho-ERK in T24 cells.
  reference_review:
    relevance: LOW
    correctness: MISCITED
    review_notes: >-
      Basis of the NAS 'small GTPase binding' annotation to SPHK2, but the paper attributes
      the Ras/MAPK effect to SPHK1 (siRNA against SPK1, not SPK2, blocks it) and never assays
      SPHK2-GTPase binding. Does not support the SPHK2 annotation.
- id: PMID:12954646
  title: Sphingosine kinase 2 is a nuclear protein and inhibits DNA synthesis.
  findings:
  - statement: >-
      SPHK2 localizes to the nucleus (functional NLS) as well as the cytosol and inhibits DNA
      synthesis, arresting cells at G1/S.
    reference_section_type: ABSTRACT
    supporting_text: >-
      When SPHK2 was transiently expressed in various cell lines, it was localized in the
      nuclei as well as in the cytosol, whereas SPHK1 was distributed in the cytosol but not
      in the nucleus.
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Establishes nuclear localization (NLS) and the anti-proliferative/DNA-synthesis-
      inhibitory role of nuclear SPHK2. PubMed-verified.
- id: PMID:16103110
  title: Involvement of N-terminal-extended form of sphingosine kinase 2 in serum-dependent
    regulation of cell proliferation and apoptosis.
  findings:
  - statement: >-
      The human-specific N-terminal-extended SPHK2-L (isoform 1) translocates to the nucleus
      on serum deprivation; SPHK2 knockdown blocks serum-deprivation/drug-induced apoptosis.
    reference_section_type: ABSTRACT
    supporting_text: >-
      serum deprivation resulted in the translocation of SPHK2-L into the nuclei.
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Characterizes the SPHK2-L (SK2-L) isoform and its serum-dependent nuclear localization
      and apoptosis roles. PubMed-verified.
- id: PMID:16118219
  title: SphK1 and SphK2, sphingosine kinase isoenzymes with opposing functions in
    sphingolipid metabolism.
  findings:
  - statement: >-
      SPHK2 (putative BH3-only protein) inhibits cell growth, enhances apoptosis, and raises
      C16-ceramide, opposite to pro-survival SPHK1; ER-targeting converts SPHK1 to
      pro-apoptotic.
    reference_section_type: ABSTRACT
    supporting_text: >-
      In contrast to pro-survival SphK1, the putative BH3-only protein SphK2 inhibits cell
      growth and enhances apoptosis.
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Establishes the opposing pro-apoptotic/pro-ceramide role of SPHK2 vs SPHK1.
      PubMed-verified.
- id: PMID:17635916
  title: Protein kinase D-mediated phosphorylation and nuclear export of sphingosine
    kinase 2.
  findings:
  - statement: >-
      PKD phosphorylates a serine in a SPHK2 nuclear export signal, driving PMA-induced nuclear
      export; this regulates SPHK2 subcellular localization.
    reference_section_type: ABSTRACT
    supporting_text: >-
      phosphorylation of SPHK2 catalyzed by protein kinase D (PKD), which regulates its
      localization.
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Establishes PKD-mediated phosphorylation and nuclear export (NES) regulating SPHK2
      nucleocytoplasmic shuttling and the PMA response. PubMed-verified.
- id: PMID:17897319
  title: Integral and associated lysosomal membrane proteins.
  findings: []
  reference_review:
    relevance: LOW
    correctness: VERIFIED
    review_notes: >-
      Placental lysosomal-membrane proteomics survey; source of the isoform-2 lysosomal-
      membrane HDA localization. A minor co-purification, not a functional study of SPHK2.
- id: PMID:18263879
  title: Eukaryotic elongation factor 1A interacts with sphingosine kinase and directly
    enhances its catalytic activity.
  findings:
  - statement: >-
      eEF1A1 directly interacts with SPHK2 and increases its catalytic activity ~2.6-fold in
      vitro (also for SPHK1), a novel mechanism of sphingosine kinase regulation.
    reference_section_type: RESULTS
    supporting_text: >-
      As with SK1, GST-eEF1A1 was shown to
       increase SK2 activity by ∼2.6-fold
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: >-
      Full text confirms a direct SPHK2-eEF1A1 (P68104) interaction that enhances SPHK2
      catalytic activity. Basis of the P68104 protein-binding IPI. PubMed/PMC-verified.
- id: PMID:19729656
  title: Regulation of histone acetylation in the nucleus by sphingosine-1-phosphate.
  findings:
  - statement: >-
      Nuclear SPHK2 associates with histone H3 and produces S1P that binds and inhibits HDAC1/
      HDAC2, increasing histone acetylation and transcription of p21 and c-fos.
    reference_section_type: ABSTRACT
    supporting_text: >-
      S1P specifically bound to the histone deacetylases HDAC1 and HDAC2 and inhibited their
      enzymatic activity, preventing the removal of acetyl groups from lysine residues within
      histone tails.
  - statement: >-
      SPHK2 binds specifically to histone H3 (not H4/H2B/H2A), placing it in nucleosomes/
      chromatin.
    reference_section_type: RESULTS
    supporting_text: >-
      Only H3, but not histones H4, H2B, or H2A, bound to SphK2
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Landmark paper establishing the nuclear S1P-HDAC1/2 epigenetic mechanism, histone H3
      binding, and nucleosome association. Full text available and quotes verified.
- id: PMID:20197547
  title: Cleavage of sphingosine kinase 2 by caspase-1 provokes its release from apoptotic
    cells.
  findings:
  - statement: >-
      During apoptosis, SPHK2 is cleaved at its N-terminus by caspase-1 and a truncated but
      enzymatically active fragment is released from cells.
    reference_section_type: ABSTRACT
    supporting_text: >-
      During cell death, sphingosine kinase 2 (SphK2)
      is cleaved at its N-terminus in a caspase-1-dependent manner. Thereupon, a
      truncated but enzymatically active fragment of SphK2 is released from cells.
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: >-
      Establishes caspase-1 cleavage and extracellular release of active SPHK2 in apoptotic
      cells; source of nuclear/cytoplasmic EXP localization annotations. PubMed-verified.
- id: PMID:20959514
  title: Sphingosine-1-phosphate produced by sphingosine kinase 2 in mitochondria
    interacts with prohibitin 2 to regulate complex IV assembly and respiration.
  findings:
  - statement: >-
      Mitochondrial S1P made mainly by SPHK2 binds prohibitin 2 (PHB2); loss of SPHK2 or PHB2
      disrupts cytochrome-c oxidase (complex IV) assembly and mitochondrial respiration.
    reference_section_type: ABSTRACT
    supporting_text: >-
      S1P, produced in the
      mitochondria mainly by sphingosine kinase 2 (SphK2), binds with high affinity
      and specificity to prohibitin 2 (PHB2)
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
