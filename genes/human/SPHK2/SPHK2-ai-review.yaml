      SPHK2 annotations.
- id: PMID:29615132
  title: Neuronal sphingosine kinase 2 subcellular localization is altered in Alzheimer's
    disease brain.
  findings:
  - statement: >-
      In Alzheimer's disease brains, neuronal SPHK2 shifts from cytosol to nucleus and cleaved
      SPHK2 increases; cytosolic SPHK2 decreases with amyloid density.
    reference_section_type: ABSTRACT
    supporting_text: >-
      SphK2 is preferentially localized in the nucleus in AD brain extracts as compared to
      control extracts, with a marked increase of cleaved SphK2.
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: >-
      Human brain (immunohistochemistry/immunofluorescence) source of the neuronal
      nuclear/cytoplasmic IDA localization; ties SPHK2 subcellular distribution to AD.
      Full text available and quote verified.
