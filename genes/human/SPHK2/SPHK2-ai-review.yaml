id: Q9NRA0
gene_symbol: SPHK2
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  SPHK2 (sphingosine kinase 2) is a diacylglycerol-kinase-like lipid kinase (DAGKc
  domain) that phosphorylates sphingoid bases, principally sphingosine and
  dihydrosphingosine (sphinganine), using ATP to produce the bioactive lipid mediator
  sphingosine-1-phosphate (S1P) and dihydro-S1P (EC 2.7.1.91). It is one of two
  mammalian sphingosine kinases; unlike the largely cytosolic, pro-survival SPHK1,
  SPHK2 is a multi-compartment enzyme found in the nucleus, cytoplasm, endoplasmic
  reticulum and mitochondrial inner membrane, with a nuclear localization signal and a
  protein-kinase-D-regulated nuclear export signal that govern nucleocytoplasmic
  shuttling. Nuclear S1P generated by SPHK2 binds to and inhibits the histone
  deacetylases HDAC1 and HDAC2 within co-repressor complexes, raising histone
  acetylation (H3-K9, H4-K5, H2B-K12) and thereby coupling nuclear sphingolipid
  metabolism to epigenetic regulation of gene transcription. In mitochondria, S1P
  produced by SPHK2 binds prohibitin 2 to support cytochrome-c oxidase (complex IV)
  assembly and respiration. In contrast to SPHK1, SPHK2 tends to raise intracellular
  ceramide and can be pro-apoptotic (it contains a putative BH3 motif) and inhibits DNA
  synthesis when nuclear. SPHK2 activity is enhanced by ERK/MAPK phosphorylation and by
  interaction with elongation factor eEF1A1, and the enzyme also phosphorylates the
  immunomodulatory prodrug FTY720 (fingolimod).
