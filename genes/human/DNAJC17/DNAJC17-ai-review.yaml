description: DNAJC17 is a poorly characterized, predominantly nuclear protein of the DnaJ/HSP40
  subfamily C that combines an N-terminal J domain with a C-terminal RNA recognition motif (RRM),
  separated by a disordered acidic/basic region. The domain architecture marks it as a putative
  HSP70 co-chaperone with RNA-binding capacity. Convergent evidence (phylogenetic inference from the
  yeast ortholog Cwc23, an RRM domain with a solved RNA-binding-domain structure, nuclear-speckle
  localization, and interaction with the U5 snRNP component EFTUD2) implicates DNAJC17 in spliceosome
  function, most likely spliceosomal complex disassembly. By orthology it has also been suggested to
  negatively affect PAX8-induced thyroglobulin transcription. It is phosphorylated at Ser-112 and
  methylated at Lys-264, and its mouse ortholog is essential for viability. Its precise molecular and
  cellular function in human cells has not been directly established.
