proposed_new_terms: []
suggested_questions:
- question: Does human DNAJC17 function in spliceosome disassembly (as the ortholog of yeast Cwc23),
    and does its J domain recruit/stimulate an HSP70 to remodel the spliceosome together with DHX15/Prp43?
- question: What RNA targets does the DNAJC17 RRM bind, and is the nuclear-speckle localization
    dependent on RNA binding or on the EFTUD2/spliceosome interaction?
suggested_experiments:
- description: CLIP-seq or in vitro RNA-binding assays with recombinant DNAJC17 RRM to identify its
    RNA targets, paired with co-immunoprecipitation to map its spliceosomal interaction network.
- description: Test DNAJC17 function in spliceosome disassembly using in vitro splicing extracts
    (depletion/add-back) and J-domain HPD-motif mutants to determine whether its co-chaperone
    activity is required, given the essentiality of the mouse ortholog.
