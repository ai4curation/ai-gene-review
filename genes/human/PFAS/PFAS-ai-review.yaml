id: O15067
gene_symbol: PFAS
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  PFAS encodes phosphoribosylformylglycinamidine synthase (FGAM synthase; also called
  FGAR amidotransferase, FGARAT; EC 6.3.5.3), the enzyme that carries out the fourth step
  of de novo purine synthesis. It catalyses the ATP-dependent, glutamine-dependent
  amidotransfer that converts formylglycinamide ribonucleotide (FGAR) to formylglycinamidine
  ribonucleotide (FGAM), releasing L-glutamate, ADP and phosphate (FGAR + L-glutamine + ATP
  + H2O -> FGAM + L-glutamate + ADP + Pi). The multidomain protein combines an N-terminal
  ATP-/Mg2+-dependent synthetase (PurL) region with a C-terminal class-I glutamine
  amidotransferase (GATase-1) domain that hydrolyses glutamine to supply the transferred
  amide nitrogen. The enzyme is cytosolic and can associate with the purinosome, the
  reversible multi-enzyme assembly of de novo purine synthesis. As one of the six enzymes of
  this housekeeping pathway it supplies the inosine monophosphate (IMP) precursor from which
  AMP and GMP are subsequently made, and its activity is of interest in the elevated
  nucleotide demand of proliferating and cancer cells.
