    label: L-glutamine metabolic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000107
  qualifier: involved_in
  review:
    summary: >-
      Electronic annotation transferred from a rat ortholog (UniProtKB:D4AB17) capturing that
      PFAS consumes L-glutamine as the amide-nitrogen donor for the amidotransfer reaction.
    action: KEEP_AS_NON_CORE
    reason: >-
      Biologically reasonable - the C-terminal glutamine amidotransferase (GATase-1) domain
      hydrolyses glutamine to supply the transferred nitrogen, so PFAS participates in
      glutamine catabolism as a side/co-substrate process. However this is a consequence of
      the catalytic mechanism rather than the enzyme's core role, which is purine
      (IMP-precursor) biosynthesis; retain as non-core.
