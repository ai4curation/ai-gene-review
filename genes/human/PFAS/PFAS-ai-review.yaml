suggested_questions:
- question: >-
    Does PFAS have any moonlighting or regulatory function beyond de novo purine synthesis
    (e.g. in stress-granule/CD-CODE contexts or via its multiple phosphosites)?
- question: >-
    How does purinosome association modulate PFAS flux, and is the enzyme rate-limiting under
    conditions of high purine demand such as tumor proliferation?
suggested_experiments:
- description: >-
    Quantitative metabolic-flux analysis (LC-MS/MS of FGAR vs FGAM) in PFAS-null versus
    rescued cells to confirm the in vivo FGAR->FGAM step and measure control strength.
- description: >-
    Phospho-site mutagenesis (Ser215/Ser569/Thr619/Thr623) to test whether phosphorylation
    regulates PFAS activity or purinosome recruitment.
