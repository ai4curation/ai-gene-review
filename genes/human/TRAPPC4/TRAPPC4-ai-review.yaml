id: Q9Y296
gene_symbol: TRAPPC4
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: 'TRAPPC4/synbindin is a core TRAPP-complex subunit required for TRAPP
  assembly/stability, complex-level RAB1 guanine-nucleotide exchange, ER-to-Golgi
  trafficking, and autophagy. The PN TRAPP-component context is directly relevant
  for TRAPPC4 because human patient fibroblasts and yeast Trs23 models show both trafficking
  and autophagy defects when TRAPPC4/Trs23 levels are reduced.'
alternative_products:
