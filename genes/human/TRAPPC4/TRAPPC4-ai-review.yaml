suggested_questions:
- question: Should TRAPPC4 receive a contributes_to annotation for TRAPP complex
    RAB1 guanine-nucleotide exchange activity based on direct subunit-essential 
    evidence?
  experts:
  - GO transport editors
  - Reactome TRAPP curators
- question: Should TRAPPC4 autophagy be represented only by broad autophagy, or 
    can the field support a more specific TRAPP/TRAPPIII-dependent autophagosome
    maturation term?
  experts:
  - GO autophagy editors
  - TRAPP/autophagy domain experts
- question: Should neuronal synbindin annotations be kept as non-core human 
    TRAPPC4 annotations or limited to experimentally tested rodent orthologs?
  experts:
  - GO synapse editors
  - GO transport editors
suggested_experiments:
- description: Reconstitute TRAPPC4-containing TRAPP core and TRAPPII/TRAPPIII 
    complexes with TRAPPC4 depletion or interface mutants and measure RAB1 
    GDP-GTP exchange.
  experiment_type: complex reconstitution and RAB1 GEF assay
  hypothesis: TRAPPC4 is required as a core TRAPP subunit for complex-level RAB1
    GEF activity and stable TRAPP holocomplex assembly.
- description: Use TRAPPC4 patient fibroblast or knockout/rescue cells to assay 
    VSVG ER-Golgi trafficking, TRAPP complex stability, and Golgi localization 
    of TRAPP subunits in parallel.
  experiment_type: cellular trafficking rescue assay
  hypothesis: TRAPPC4 deficiency disrupts ER-to-Golgi vesicle-mediated transport
    by destabilizing TRAPP complexes.
- description: Separate ER-Golgi traffic defects from autophagy defects in 
    TRAPPC4 rescue cells by assaying ATG9 localization, autophagosome 
    closure/flux, and VSVG trafficking side by side.
  experiment_type: autophagy and trafficking separation assay
  hypothesis: TRAPPC4 autophagy phenotypes are mediated through TRAPP complex 
    assembly and TRAPPIII/RAB1 trafficking context.
