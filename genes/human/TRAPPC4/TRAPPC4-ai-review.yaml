- term:
    id: GO:0030008
    label: TRAPP complex
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: part_of
  review:
    summary: TRAPPC4/synbindin is a core TRAPP-complex subunit.
    action: ACCEPT
    reason: Accept as core cellular-component membership. Direct TRAPPC4 
      evidence shows reduced TRAPPC4 destabilizes TRAPP complex assembly, and 
      mammalian TRAPP sources identify TRAPPC4 among core subunits.
    additional_reference_ids:
    - PMID:31794024
    - PMID:21525244
    supported_by:
    - &id004
      reference_id: PMID:31794024
      supporting_text: TRAPPC4, like its yeast Trs23 orthologue, is a core 
        component of the TRAPP complexes
    - &id005
      reference_id: PMID:31794024
      supporting_text: defect in TRAPP complex assembly and/or stability
    - &id006
      reference_id: PMID:21525244
      supporting_text: the mammalian orthologues named TRAPPC1, TRAPPC2, 
        TRAPPC3, TRAPPC4, TRAPPC5, and TRAPPC6a/b
