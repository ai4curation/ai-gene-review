id: P19099
gene_symbol: CYP11B2
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  CYP11B2 (aldosterone synthase; cytochrome P450 11B2, also called P450c11AS /
  P450aldo / P450C18) is a mitochondrial inner-membrane, heme-thiolate cytochrome
  P450 monooxygenase expressed in the zona glomerulosa of the adrenal cortex. It
  catalyzes the final three sequential steps of mineralocorticoid biosynthesis on
  a single active site: 11-beta-hydroxylation of 11-deoxycorticosterone to
  corticosterone, 18-hydroxylation of corticosterone to 18-hydroxycorticosterone,
  and 18-oxidation to yield aldosterone, the principal mineralocorticoid governing
  sodium/potassium and water balance. Catalysis uses molecular oxygen and NADPH-
  derived electrons delivered by the mitochondrial adrenodoxin/adrenodoxin-reductase
  (ferredoxin FDX1/FDX2 and ferredoxin reductase FDXR) electron-transfer system.
  CYP11B2 is more than 93% identical to the glucocorticoid-forming 11-beta-
  hydroxylase CYP11B1, but unlike CYP11B1 it possesses the 18-oxidase activity
  required to convert 18-hydroxycorticosterone to aldosterone, which functionally
  distinguishes the two isozymes. Loss-of-function variants cause aldosterone
  synthase (corticosterone methyloxidase, CMO type I and type II) deficiency, a
  salt-wasting disorder, whereas a CYP11B1/CYP11B2 chimeric gene arising from
  unequal crossover causes glucocorticoid-remediable aldosteronism (familial
  hyperaldosteronism type I).
existing_annotations:
- term:
    id: GO:0006704
    label: glucocorticoid biosynthetic process
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: involved_in
  review:
    summary: >-
      IBA transfer of glucocorticoid biosynthesis across the CYP11B/CYP27 clade.
      In humans the physiological glucocorticoid (cortisol) producer is the
      paralog CYP11B1, not CYP11B2; CYP11B2 physiologically makes the
      mineralocorticoid aldosterone. CYP11B2 can produce cortisol from
      11-deoxycortisol in vitro, but this is not its physiological role.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      The 93%-identical paralogs CYP11B1 and CYP11B2 have distinct physiological
      roles; CYP11B2 participates in mineralocorticoid (aldosterone) synthesis
      while CYP11B1 makes glucocorticoids. The IBA over-broadens a clade-level
      glucocorticoid role onto the aldosterone synthase. Kept (not removed) as it
      reflects a low-level in-vitro activity, but flagged as over-annotation.
    propagation_review:
      root_cause: PROPAGATION_BAD
      failure_modes:
      - WRONG_ORTHOLOG_OR_PARALOG
      - FUNCTIONAL_DIVERGENCE
    supported_by:
    - reference_id: PMID:1741400
      supporting_text: >-
        the former participates in the synthesis of glucocorticoids whereas the
        latter participates in the synthesis of mineralocorticoids in humans.
- term:
    id: GO:0034650
    label: cortisol metabolic process
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: involved_in
  review:
    summary: >-
      IBA cortisol metabolic process, transferred across the CYP11B clade. As
      with glucocorticoid biosynthesis, physiological cortisol handling is the
      role of CYP11B1; CYP11B2's physiological product is aldosterone.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      Cortisol metabolism is not the physiological role of CYP11B2 (that is
      CYP11B1). CYP11B2 can act on cortisol in vitro (producing 18-hydroxycortisol
      and 18-oxocortisol, elevated in primary aldosteronism), so the term is not
      strictly wrong, but it over-broadens a clade-level role and is not core.
    propagation_review:
      root_cause: PROPAGATION_BAD
      failure_modes:
      - WRONG_ORTHOLOG_OR_PARALOG
      - FUNCTIONAL_DIVERGENCE
    supported_by:
    - reference_id: PMID:1741400
      supporting_text: >-
        the former participates in the synthesis of glucocorticoids whereas the
        latter participates in the synthesis of mineralocorticoids in humans.
