- id: PMID:34080016
  title: Glucosylceramide and galactosylceramide, small glycosphingolipids with significant
    impact on health and disease.
  findings:
  - statement: >-
      UGT8/CGT synthesizes GalCer by transferring galactose from UDP-galactose to the C-1
      hydroxyl of ceramide on the luminal side of the ER, where it is a type I membrane
      glycoprotein with its active site facing the ER lumen.
    supporting_text: "GalCer is synthesized on the luminal side of the ER, as UGT8 is a type I membrane glycoprotein with its active site directed into the lumen of this organelle"
  - statement: >-
      UGT8 and glucosylceramide synthase (GCS/UGCG) share no significant sequence homology,
      indicating the galactosyl- and glucosyl-ceramide routes are of different evolutionary
      origin.
    supporting_text: "the amino acid sequence of UGT8 shows no significant homology to GCS, which indicates different evolutionary origins of these enzymes"
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      PMC full text available; a review that accurately describes the UGT8/CGT reaction,
      luminal-ER topology, and the myelin role of GalCer. Supports the core function and the
      distinction from the UGCG glucosylceramide branch.
- id: PMID:8661025
  title: 'The human gene CGT encoding the UDP-galactose ceramide galactosyl transferase
    (cerebroside synthase): cloning, characterization, and assignment to human chromosome
    4, band q26.'
  findings:
  - statement: >-
      CGT (UGT8) is the key enzyme in the biosynthesis of cerebrosides and sulfatides,
      essential constituents of CNS and PNS myelin, and is important in oligodendrocyte
      lineage differentiation.
    supporting_text: "biosynthesis of the glycosphingolipids, cerebrosides and sulfatides, essential"
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Abstract only (full_text_available: false). Original cloning/characterization of the
      human CGT/UGT8 gene; establishes the myelin cerebroside/sulfatide role and chromosomal
      assignment. Supports the CNS/PNS developmental (non-core) annotations.
