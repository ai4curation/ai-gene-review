core_functions:
- description: >-
    UGT8 is 2-hydroxyacylsphingosine 1-beta-galactosyltransferase (UDP-galactose:ceramide
    galactosyltransferase, CGT; EC 2.4.1.47). At the luminal side of the ER membrane it
    transfers galactose from UDP-galactose to ceramide (both 2-hydroxy and non-hydroxy fatty
    acid species), producing galactosylceramide (GalCer) plus UDP. GalCer is the founding lipid
    of the galactosphingolipid/cerebroside branch of glycosphingolipid metabolism and a major
    myelin lipid.
  supported_by:
  - reference_id: file:human/UGT8/UGT8-uniprot.txt
    supporting_text: "Catalyzes the transfer of galactose to ceramide, a key"
  - reference_id: file:human/UGT8/UGT8-uniprot.txt
    supporting_text: "Sphingolipid metabolism; galactosylceramide biosynthesis."
  - reference_id: PMID:34080016
    supporting_text: "GalCer is synthesized on the luminal side of the ER, as UGT8 is a type I membrane glycoprotein with its active site directed into the lumen of this organelle"
  molecular_function:
    id: GO:0003851
    label: N-acylsphingosine galactosyltransferase activity
  directly_involved_in:
  - id: GO:0006682
    label: galactosylceramide biosynthetic process
  locations:
  - id: GO:0098553
    label: lumenal side of endoplasmic reticulum membrane
  - id: GO:0005789
    label: endoplasmic reticulum membrane
proposed_new_terms: []
suggested_questions:
- question: >-
    Beyond galactosylceramide, to what extent does human UGT8 galactosylate diacylglycerol
    (galactosyldiacylglycerol) or other lipid acceptors in vivo, and is this physiologically
    significant?
- question: >-
    What is the quantitative substrate preference of human UGT8 for 2-hydroxy versus
    non-hydroxy fatty-acid ceramides, and does this shape the very-long-chain hydroxy-fatty-acid
    enrichment of myelin GalCer?
suggested_experiments:
- description: >-
    Reconstitute purified human UGT8 in vitro with defined ceramide acceptors and
    UDP-galactose to measure kinetic parameters and substrate specificity across
    hydroxy/non-hydroxy and chain-length variants.
- description: >-
    Knock out UGT8 by CRISPR in a human oligodendrocyte model, then use lipidomics to confirm
    loss of GalCer/sulfatide and assess compensatory changes in the glucosylceramide branch.
