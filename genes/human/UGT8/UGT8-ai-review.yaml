id: Q16880
gene_symbol: UGT8
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  UGT8 (CGT; UDP-galactose:ceramide galactosyltransferase, also called
  2-hydroxyacylsphingosine 1-beta-galactosyltransferase or cerebroside synthase,
  EC 2.4.1.47) is a type I endoplasmic reticulum membrane glycoprotein whose
  catalytic domain faces the ER lumen. It transfers galactose from UDP-galactose
  onto ceramide, producing galactosylceramide (GalCer, a galactocerebroside) plus
  UDP. UGT8 galactosylates both 2-hydroxy and non-hydroxy fatty acid-containing
  ceramides. GalCer, and its downstream 3-O-sulfated derivative sulfatide (made by
  GAL3ST1), are the most abundant lipids of the myelin sheath, so UGT8 is critical
  for myelin formation and the differentiation of oligodendrocytes (CNS) and Schwann
  cells (PNS). This galactosylceramide route is a distinct, parallel branch of
  glycosphingolipid biosynthesis from the UGCG-dependent glucosylceramide route:
  UGT8 adds galactose directly to ceramide on the luminal side of the ER, whereas
  UGCG adds glucose to ceramide on the cytosolic face of the Golgi, and the two
  enzymes share no significant sequence homology.
