  label: Homo sapiens
description: >-
  CHAC1 (glutathione-specific gamma-glutamylcyclotransferase 1; EC 4.3.2.7) is a
  cytosolic enzyme of the ChaC subfamily of gamma-glutamylcyclotransferases that
  carries out the committed step of a dedicated intracellular glutathione
  degradation route, distinct from the extracellular gamma-glutamyl transferase
  (GGT1) pathway. It cleaves the gamma-glutamyl bond of reduced glutathione (GSH)
  to yield 5-oxo-L-proline (pyroglutamate) and the dipeptide L-cysteinylglycine,
  acting specifically on GSH and not on other gamma-glutamyl peptides or oxidized
  glutathione. CHAC1 expression is tightly controlled and is strongly induced as a
  downstream target of the ATF4-ATF3-CHOP arm of the integrated stress response
  and unfolded protein response under endoplasmic reticulum stress. By depleting
  intracellular GSH, CHAC1 acts as a pro-apoptotic effector and sensitizes cells
  to oxidative-stress-driven death, including ferroptosis. The protein
  (historically called Botch, Blocks Notch) has an additional reported role as a
  negative regulator of Notch signaling during embryonic neurogenesis, in which it
  binds the Notch extracellular region and blocks the furin-mediated S1 maturation
  cleavage of Notch, keeping the receptor in an immature inactive form; this
  activity has been characterized chiefly in the rodent ortholog and involves a
  trans-Golgi pool of the protein.
