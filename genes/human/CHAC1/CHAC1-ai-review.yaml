core_functions:
- description: >-
    Cytosolic glutathione-specific gamma-glutamylcyclotransferase that catalyzes
    the committed step of intracellular glutathione degradation, cleaving reduced
    glutathione into 5-oxo-L-proline and L-cysteinylglycine (EC 4.3.2.7). Acts
    specifically on GSH, not on other gamma-glutamyl peptides.
