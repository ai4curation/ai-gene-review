proposed_new_terms:
- proposed_name: autophagic lysosome reformation
  proposed_definition: A lysosome organization process in which autolysosomal membranes tubulate and
    regenerate functional lysosomes after autophagic degradation.
  justification: ZFYVE26/spastizin and SPG11/spatacsin are described as pivotal for ALR and 
    essential for initiation of lysosomal tubulation, but the review must currently use broader 
    lysosome organization and lysosomal membrane organization terms.
  proposed_parent:
    id: GO:0007040
    label: lysosome organization
  supported_by:
  - reference_id: PMID:25365221
    supporting_text: pivotal for autophagic lysosome reformation (ALR)
  - reference_id: PMID:25365221
    supporting_text: Lysosomal targeting of spastizin required an intact FYVE domain, which binds 
      phosphatidylinositol 3-phosphate
  - reference_id: PMID:25365221
    supporting_text: Loss of spastizin or spatacsin resulted in depletion of free lysosomes
  - reference_id: PMID:25365221
    supporting_text: spastizin and spatacsin were essential components for the initiation of 
      lysosomal tubulation
  - reference_id: PMID:40175557
    supporting_text: AP5-SPG11-SPG15 complex can bind PI3P molecules, sense membrane curvature and 
      drive membrane remodeling in vitro
  - reference_id: PMID:40175557
    supporting_text: essential for the initiation of autolysosome tubulation
- proposed_name: AP5-SPG11-SPG15 complex-mediated lysosomal membrane remodeling
  proposed_definition: A lysosomal membrane organization process in which the AP5-SPG11-SPG15 
    complex binds PI3P-positive membranes, senses curvature, and remodels membranes during 
    autolysosome tubulation.
  justification: The 2025 structural study supports PI3P binding, curvature sensing, and membrane 
    remodeling by the AP5-SPG11-SPG15 complex, but current GO terms separate membrane bending from 
    the specific lysosomal complex/process context.
  proposed_parent:
    id: GO:0097212
    label: lysosomal membrane organization
  supported_by:
  - reference_id: PMID:40175557
    supporting_text: AP5-SPG11-SPG15 complex can bind PI3P molecules, sense membrane curvature and 
      drive membrane remodeling in vitro
  - reference_id: PMID:40175557
