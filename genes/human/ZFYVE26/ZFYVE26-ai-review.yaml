suggested_questions:
- question: Should GO add an autophagic lysosome reformation term under lysosome organization so 
    ZFYVE26/SPG15, SPG11, PIP5K1B, KIF5B, and related ALR factors can be annotated without overusing
    broad lysosome organization?
  experts:
  - Li Yu
  - Craig Blackstone
  - GO biological process editors
- question: Should spastizin-mediated autophagosome maturation through Beclin 1-UVRAG-Rubicon be 
    curated separately from AP5-SPG11-SPG15-dependent ALR/lysosomal membrane remodeling?
  experts:
  - Maria Teresa Bassi
  - Li Yu
  - GO autophagy editors
- question: Should the HR-DSBR annotation for ZFYVE26/SPG15 remain as a non-core process, or is the 
    DR-GFP evidence too indirect relative to the stronger SPG48/KIAA0415 focus of PMID:20613862?
  experts:
  - Andreas Ladurner
  - Craig Blackstone
  - GO DNA repair editors
suggested_experiments:
- description: Rescue ZFYVE26/SPG15-deficient cells with FYVE-domain and AP5/SPG11-interface 
    mutants, then quantify starvation-refeeding ALR, free lysosome regeneration, lysosomal 
    tubulation, and autophagosome maturation.
  experiment_type: genetic rescue/live-cell lysosome and autophagy imaging
  hypothesis: PI3P binding and AP5-SPG11-SPG15 complex assembly are required for spastizin-dependent
    ALR and lysosomal membrane organization.
- description: Measure membrane curvature sensing and remodeling by purified AP5-SPG11-SPG15 
    complexes containing SPG15 FYVE-domain or complex-interface mutants on PI3P-containing 
    liposomes.
  experiment_type: in vitro membrane remodeling/structural biochemistry
  hypothesis: Spastizin contributes directly to PI3P-dependent membrane remodeling as part of the 
    AP5-SPG11-SPG15 complex.
- description: Separate cytokinesis, autophagosome maturation, and ALR outputs using domain-specific
    ZFYVE26 mutants in matched midbody, Beclin 1-UVRAG-Rubicon, and lysosomal tubulation assays.
  experiment_type: domain-function epistasis
  hypothesis: ZFYVE26 has separable PI3P-dependent cytokinesis and proteostasis functions that 
    should not be collapsed into one broad GO process.
