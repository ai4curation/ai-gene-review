id: Q68DK2
gene_symbol: ZFYVE26
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  ZFYVE26 encodes spastizin/SPG15, a FYVE-domain PI3P-binding protein that functions with
  SPG11/spatacsin and AP-5 in endolysosomal membrane remodeling. The strongest protein-homeostasis
  evidence supports a core role in autophagic lysosome reformation, lysosomal membrane organization,
  membrane bending, and autophagosome maturation through PI3P-dependent recruitment to
  lysosomal/late-endosomal membranes. ZFYVE26 also has experimentally supported cytokinesis and
  HR-DSBR roles, but its principal cellular role is endolysosomal membrane remodeling.
