- id: PMID:21998747
  title: 'Structural and biochemical studies of human 4-hydroxy-2-oxoglutarate aldolase:
    implications for hydroxyproline metabolism in primary hyperoxaluria.'
  findings:
  - statement: >-
      Places delta-1-pyrroline-5-carboxylate dehydrogenase (1P5CDH / ALDH4A1) as the
      second of four mitochondrial enzymes of the trans-4-hydroxy-L-proline degradation
      pathway. The paper's own focus is the terminal enzyme HOGA1, not ALDH4A1.
    reference_section_type: RESULTS
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: >-
      Full text confirms 1P5CDH/ALDH4A1 is the second enzyme of the 4-hydroxyproline
      pathway (Fig. 1), supporting the GO:0019470 TAS. The paper primarily characterizes
      HOGA1; it supports ALDH4A1's pathway membership but does not itself assay ALDH4A1.
- id: PMID:22516612
  title: The three-dimensional structural basis of type II hyperprolinemia.
  findings:
  - statement: >-
      First structure of human P5CDH (ALDH4A1); demonstrates NAD+-dependent oxidation
      of glutamate gamma-semialdehyde to glutamate, homodimeric assembly, and the dual
      proline/hydroxyproline substrate specificity.
    reference_section_type: RESULTS
  - statement: >-
      The type II hyperprolinemia mutation S352L abolishes catalytic activity and
      eliminates NAD+ binding by rearranging the catalytic loop.
    reference_section_type: RESULTS
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      PMC full text (PMC3372638) directly establishes the core catalytic activity,
      homodimer, dual substrate specificity, and disease-variant mechanism for human
      ALDH4A1.
