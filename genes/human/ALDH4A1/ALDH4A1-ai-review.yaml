  label: Homo sapiens
description: >-
  ALDH4A1 (delta-1-pyrroline-5-carboxylate dehydrogenase, P5CDH; EC 1.2.1.88) is a
  nuclear-encoded, mitochondrial matrix NAD+-dependent aldehyde dehydrogenase (ALDH
  superfamily, ALDH4 family) that catalyzes the second and final step of proline
  catabolism. It oxidizes L-glutamate-5-semialdehyde (glutamate gamma-semialdehyde),
  which is in spontaneous equilibrium with its cyclic tautomer
  delta-1-pyrroline-5-carboxylate (P5C), to L-glutamate, reducing NAD+ to NADH. The
  P5C/semialdehyde substrate is generated from proline by proline dehydrogenase and
  from ornithine by ornithine aminotransferase, placing ALDH4A1 at a node that links
  proline, ornithine/arginine (urea cycle) and glutamate/TCA-cycle metabolism. The
  enzyme is also the second enzyme of hydroxyproline (trans-4-hydroxy-L-proline)
  catabolism, oxidizing 4-hydroxyglutamate semialdehyde to 4-erythro-hydroxy-L-glutamate.
  It functions as a homodimer with the classic ALDH fold (an N-terminal Rossmann-like
  NAD+-binding domain, a C-terminal catalytic domain bearing the nucleophilic cysteine,
  and an oligomerization domain). Loss-of-function variants cause the autosomal
  recessive inborn error type II hyperprolinemia, characterized by accumulation of
  proline and P5C.
