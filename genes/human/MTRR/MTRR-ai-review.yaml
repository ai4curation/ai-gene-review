id: Q9UBK8
gene_symbol: MTRR
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  MTRR encodes methionine synthase reductase (MSR), a cytosolic, NADPH-dependent
  diflavin oxidoreductase of the ferredoxin-NADP(+)-reductase (FNR)/dual-flavin
  family, closely related to the reductase domains of NADPH-cytochrome P450
  reductase and nitric oxide synthase. Each polypeptide binds one FAD and one FMN
  and passes reducing equivalents from NADPH through its flavin centres. Its
  physiological role is to keep cobalamin-dependent methionine synthase (MTR/MS)
  catalytically active: during MTR turnover the enzyme-bound cob(I)alamin
  intermediate is occasionally oxidised to inactive cob(II)alamin, and MSR
  regenerates the active methylcob(III)alamin form by reductive methylation, using
  NADPH-derived electrons with S-adenosyl-L-methionine as the methyl donor. MSR
  also acts as an aquacobalamin reductase (reducing aquacob(III)alamin to
  cob(II)alamin) and as a molecular chaperone that stabilises apo-methionine
  synthase and promotes incorporation of cobalamin to form the holoenzyme. Cytosolic
  cobalamin processing occurs within a multiprotein complex that includes MTR,
  MTRR, MMACHC and MMADHC. Through the reactivation of methionine synthase, MTRR
  is essential for remethylation of homocysteine to methionine and for the linked
  folate and methylation (S-adenosylmethionine) cycles. Loss-of-function variants
  cause cblE-type homocystinuria with megaloblastic anaemia, and a common
  polymorphism (Ile22Met) is associated with neural tube defect susceptibility.
