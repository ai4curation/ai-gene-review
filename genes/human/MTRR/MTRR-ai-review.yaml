core_functions:
- description: >-
    Methionine synthase reductase catalytic activity: as an NADPH-dependent diflavin
    (FAD + FMN) oxidoreductase, MTRR passes electrons from NADPH through its flavin
    centres to reductively methylate the cob(II)alamin cofactor of methionine synthase
    (MTR), regenerating active methylcob(III)alamin (EC 1.16.1.8) and thereby restoring
    MTR's homocysteine-remethylating activity.
  molecular_function:
    id: GO:0030586
    label: '[methionine synthase] reductase (NADPH) activity'
