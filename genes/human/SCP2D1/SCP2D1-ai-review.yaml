description: |-
  SCP2 sterol-binding domain-containing protein 1 is a poorly characterized intracellular lipid
  carrier protein containing a sterol carrier protein 2 (SCP2) domain. The protein is predicted to function
  as a non-specific lipid transfer protein that binds lipids in a large hydrophobic cavity. Falcon deep
  research provides the strongest direct biochemical clue to date: a 2024 system-wide analysis of human
  lipid transfer proteins (Titeca et al.) mapped SCP2D1 ligand-class associations to fatty acids and
  several lysophospholipid/glycerophospholipid classes (LPC, LPE, LPG, PE, PG/BMP), suggesting a
  multi-class lipid-binding profile broader than sterol-only. A 2009 targeted siRNA screen (Bartz et al.)
  found that knockdown of C20orf79/SCP2D1 increased cellular cholesterol staining and LDL uptake,
  implicating it in cholesterol/LDL handling, though mechanism and effect sizes were not resolved.
  Unlike its paralog SCP2 which localizes to peroxisomes, SCP2D1 lacks a peroxisomal targeting sequence
  and is predicted (IBA/phylogenetic inference) to function in the cytosol; however, no SCP2D1-specific
  localization experiments exist, so localization is underdetermined by direct evidence. Expression is
  enriched in testis, but SCP2D1 also behaves as a cancer-testis gene, being aberrantly expressed in
  colon cancer (~35% of patients) and leukemia and inducible by epigenetic (DNMT/HDAC) inhibitors;
  these are non-core expression observations rather than evidence of molecular function. No direct
  experimental characterization of purified SCP2D1 (binding constants, transfer rates, enzymatic
  activity) exists, and no enzymatic or transporter activity has been demonstrated; functional
  annotations remain largely inferred from domain homology to the well-studied SCP2 protein and from
  a small number of high-throughput screens.
