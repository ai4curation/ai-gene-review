- term:
    id: GO:0008289
    label: lipid binding
  evidence_type: IEA
  review:
    summary: |-
      SCP2D1 contains an SCP2 sterol-binding domain predicted to bind lipids. Falcon deep research
      provides the strongest direct biochemical handle to date: a 2024 system-wide analysis of human
      lipid transfer proteins (Titeca et al., bioRxiv) included SCP2D1 among LTPs with no previously
      known ligands and assigned multiple lipid-class associations (fatty acids, lysophosphatidylcholine,
      lysophosphatidylethanolamine, lysophosphatidylglycerol, phosphatidylethanolamine, and
      phosphatidylglycerol/BMP). This broadens the likely binding profile beyond "sterol-only" to a
      multi-class lipid-binding protein, while the GO term lipid binding (GO:0008289) remains the
      appropriate general molecular function. Note this evidence is preprint-stage and figure-based, with
      no SCP2D1-specific binding constants or transfer rates extractable; the activity is best treated as
      lipid binding rather than a demonstrated lipid-transfer or enzymatic activity (falcon found no
      evidence for catalysis or transporter activity).
    action: NEW
    reason: |-
      Domain homology indicates lipid-binding activity, consistent with SCP2 family sterol carrier
      function, and falcon deep research adds experimental-screen support (a 2024 LTP ligand-mapping
      study) for SCP2D1 binding fatty acids and several glycerophospholipids/lysophospholipids. The
      general term lipid binding (GO:0008289) is retained as it accommodates the multi-class profile;
      a more specific sterol-only term is not warranted given the broader ligand set reported.
    supported_by:
    - reference_id: file:human/SCP2D1/SCP2D1-deep-research-openai.md
      supporting_text: the SCP2D1 protein consists largely of a **sterol carrier protein type 2 (SCP2) sterol-binding domain**, a conserved module known for binding lipids.
    - reference_id: file:human/SCP2D1/SCP2D1-deep-research-falcon.md
      supporting_text: |-
        it is treated as an LTP candidate in recent systematic LTP analyses
      reference_section_type: RESULTS
    - reference_id: file:human/SCP2D1/SCP2D1-deep-research-falcon.md
      supporting_text: |-
        SCP2D1 likely participates in **cellular lipid mobilization** involving lysophospholipids and glycerophospholipids and may also bind free fatty acids, suggesting a role broader than “sterol-only” binding
      reference_section_type: RESULTS
    - reference_id: file:human/SCP2D1/SCP2D1-deep-research-falcon.md
      supporting_text: |-
        SCP2D1 most plausibly functions as a **lipid-binding protein** with multi-class ligand specificity
      reference_section_type: DISCUSSION
    - reference_id: file:human/SCP2D1/SCP2D1-deep-research-falcon.md
      supporting_text: |-
        No retrieved source demonstrated SCP2D1 catalyzing a biochemical reaction (enzyme activity) or acting as a membrane transporter with defined substrate translocation kinetics.
      reference_section_type: RESULTS
