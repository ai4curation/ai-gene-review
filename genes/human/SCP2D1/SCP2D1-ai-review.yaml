  review:
    summary: |-
      Phylogenetic inference predicts SCP2D1 localizes to cytosol. Consistent with lack of peroxisomal
      targeting sequence and predictions from subcellular localization tools. Unlike paralog SCP2 which
      has peroxisomal localization, SCP2D1 is predicted to function exclusively in the cytoplasmic compartment.
      Falcon deep research adds an important caveat: there are NO SCP2D1-specific experiments (endogenous
      immunofluorescence, fractionation, or proximity labeling) that establish localization, so the
      compartment is "underdetermined" from direct evidence. The cytosol call rests on phylogenetic
      inference (IBA) and absence of targeting signals, not on direct SCP2D1 data. Falcon also stresses
      that peroxisomal targeting features of the paralog SCP2/SCPX cannot be transferred to SCP2D1, which
      is consistent with the IBA-based cytosolic (rather than peroxisomal) assignment here.
    action: ACCEPT
    reason: |-
      Appropriate cellular compartment annotation supported by phylogenetic inference, domain analysis,
      and absence of targeting sequences for other organelles. Retained as ACCEPT because falcon does not
      contradict cytosolic localization; it only notes the absence of direct SCP2D1 localization data,
      which is already reflected by the IBA evidence code.
