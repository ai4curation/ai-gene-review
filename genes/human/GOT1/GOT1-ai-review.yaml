suggested_questions:
- question: >-
    Beyond serum-AST level (ASTQTL1), does complete cytosolic AST loss cause any metabolic
    phenotype in humans, or is GOT2/other transaminase flux fully compensatory?
- question: >-
    How is flux partitioned between GOT1's core aspartate aminotransferase reaction and its
    promiscuous cysteine / cysteine-sulfinate / 2-aminobutanoate transaminase activities in
    different tissues?
suggested_experiments:
- description: >-
    Isoform-resolved kinetic characterization of recombinant human GOT1 against L-aspartate,
    L-cysteine, cysteine sulfinate and (2S)-2-aminobutanoate to quantify substrate
    promiscuity relative to the core aspartate reaction.
- description: >-
    Targeted metabolomics / 13C-flux analysis in GOT1-knockout versus wild-type human cells
    to test its quantitative contribution to the malate-aspartate shuttle, serine
    biosynthesis and glutamate homeostasis.
