core_functions:
- description: >-
    Cytosolic aspartate aminotransferase activity: reversible, PLP-dependent transfer of
    the amino group between L-aspartate and 2-oxoglutarate to form oxaloacetate and
    L-glutamate (EC 2.6.1.1), the defining reaction of GOT1. This interconverts key
    amino acids and TCA-cycle intermediates and provides the cytosolic transaminase step
    of the malate-aspartate shuttle.
  molecular_function:
    id: GO:0004069
    label: L-aspartate:2-oxoglutarate transaminase activity
  directly_involved_in:
  - id: GO:0006531
    label: aspartate metabolic process
  - id: GO:0006536
    label: glutamate metabolic process
  - id: GO:0043490
    label: malate-aspartate shuttle
  locations:
  - id: GO:0005829
    label: cytosol
  supported_by:
  - reference_id: PMID:21900944
    supporting_text: >-
      even after correcting for AST protein, mutant cAST had markedly decreased activity
      relative to wild-type cAST
  - reference_id: file:human/GOT1/GOT1-uniprot.txt
    supporting_text: >-
      Reaction=L-aspartate + 2-oxoglutarate = oxaloacetate + L-glutamate
- description: >-
    Pyridoxal 5'-phosphate binding: GOT1 is a PLP-dependent class-I aminotransferase in
    which PLP is covalently bound as a Schiff base to Lys-259 and is essential for the
    transamination mechanism. This cofactor-binding function underpins all of the
    enzyme's aminotransferase activities.
  molecular_function:
    id: GO:0030170
    label: pyridoxal phosphate binding
  locations:
  - id: GO:0005829
    label: cytosol
  supported_by:
  - reference_id: file:human/GOT1/GOT1-uniprot.txt
    supporting_text: >-
      Name=pyridoxal 5'-phosphate
