    label: fructokinase activity
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: enables
  review:
    summary: Phylogenetic assertion of fructokinase activity, propagated across the
      hexokinase family. GCK does phosphorylate D-fructose in vitro, but with very
      weak affinity (KM ~240 mM) that is far outside any physiological range, so this
      is a promiscuous side-activity rather than a physiological function.
    action: KEEP_AS_NON_CORE
    reason: A genuine in-vitro substrate promiscuity of the hexokinase family, but
      the extremely high KM for fructose means it is not a physiologically relevant
      function of GCK; keep as non-core.
