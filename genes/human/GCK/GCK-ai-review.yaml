    label: glycolytic process
  supported_by:
  - reference_id: file:human/GCK/GCK-uniprot.txt
    supporting_text: GCK acts as a glucose sensor in the pancreatic beta
- description: Glucokinase is a central determinant of whole-body glucose homeostasis;
    in the liver it drives glucose uptake and glycogen synthesis and restrains gluconeogenesis,
    and its loss (MODY2/PNDM) or gain (hyperinsulinism) of function shifts the glucose
    set-point.
  molecular_function:
