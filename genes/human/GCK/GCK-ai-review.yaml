id: P35557
gene_symbol: GCK
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  Glucokinase (hexokinase-4/HK4, hexokinase type IV) is an ATP-dependent
  hexose-phosphorylating enzyme (EC 2.7.1.1) expressed mainly in pancreatic beta cells
  and hepatocytes, where it catalyzes the first committed step of glucose utilization,
  the phosphorylation of D-glucose to D-glucose 6-phosphate. Unlike the other human
  hexokinases (HK1-3), glucokinase has a weak affinity for glucose (KM ~6 mM), exhibits
  sigmoidal/cooperative kinetics, and is not inhibited by its product glucose 6-phosphate.
  These properties make it the physiological glucose sensor whose activity varies steeply
  across the normal blood-glucose range; in the pancreatic beta cell it sets the threshold
  for glucose-stimulated insulin secretion, and in the liver it drives glucose uptake
  and glycogen synthesis. Hepatic glucokinase is allosterically regulated by the glucokinase
  regulatory protein (GCKR), which at low glucose binds glucokinase and sequesters the
  inactive complex in the nucleus, releasing it to the cytosol when glucose rises. Glucokinase
  can also phosphorylate D-mannose and D-fructose in vitro, but these activities are of
  minor physiological relevance. Mutations in GCK cause a spectrum of glycemic disorders;
  heterozygous inactivating mutations cause GCK-MODY (maturity-onset diabetes of the young
  type 2, mild fasting hyperglycemia), homozygous or biallelic loss causes permanent neonatal
  diabetes, and heterozygous activating (gain-of-function) mutations cause familial
  hyperinsulinemic hypoglycemia.
