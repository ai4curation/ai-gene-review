    supporting_text: Mediates the initial step of glycolysis by catalyzing
- description: In the pancreatic beta cell, glucokinase acts as the glucose sensor
    that sets the threshold for glucose-stimulated insulin secretion; the low glucose
    affinity ensures its activity tracks glucose across the physiological range, so
    it is the flux-controlling determinant coupling glycolytic glucose metabolism
    to insulin release.
  molecular_function:
    id: GO:0004340
    label: glucokinase activity
  directly_involved_in:
