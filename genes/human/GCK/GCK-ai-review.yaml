- term:
    id: GO:0032473
    label: cytoplasmic side of mitochondrial outer membrane
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: is_active_in
  review:
    summary: Phylogenetic assertion of localization to the cytoplasmic side of the
      mitochondrial outer membrane, inherited from the hexokinase family. HK1-3 bind
      the outer mitochondrial membrane through an N-terminal hydrophobic anchor, but
      GCK lacks this anchor and is a soluble cytosolic (and regulated nuclear) protein.
    action: MARK_AS_OVER_ANNOTATED
    reason: Family-level over-propagation. Mitochondrial outer-membrane association
      is a property of HK1-3 (which have an N-terminal membrane-binding domain absent
      from GCK); GCK is documented as cytoplasmic and nuclear, not membrane-anchored.
    propagation_review:
      root_cause: PROPAGATION_BAD
      failure_modes:
      - COMPARTMENT_OR_COMPLEX_MISMATCH
      source_entities:
      - source_id: UniProtKB:P52789
        comment: Rat hexokinase-1 type; binds outer mitochondrial membrane via an
          N-terminal hydrophobic anchor that single-domain GCK lacks, so the compartment
          does not transfer correctly.
      - source_id: UniProtKB:M4FD55
        comment: Hexokinase-family source for the mitochondrial-membrane IBA; anchor-bearing,
          unlike cytosolic/nuclear GCK.
