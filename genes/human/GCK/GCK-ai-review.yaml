core_functions:
- description: ATP-dependent phosphorylation of D-glucose to D-glucose 6-phosphate,
    the committed first step of glucose utilization, catalyzed by a low-affinity (high-KM),
    cooperative, product-inhibition-resistant enzyme that thereby functions as the
    cellular glucose sensor.
  molecular_function:
