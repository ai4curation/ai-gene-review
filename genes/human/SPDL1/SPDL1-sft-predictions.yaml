status: COMPLETE
description: >-
  BioReason-Pro SFT predictions for SPDL1/Spindly (human). 10 GO terms extracted from
  HF protein_catalogue. SPDL1 is a well-characterized kinetochore adaptor for cytoplasmic
  dynein. The SFT model correctly identifies the core GO terms for SPDL1, most of which
  are already in GOA (CNN). The SFT review confirms that BioReason correctly associates
  SPDL1 with mitotic chromosome alignment, spindle orientation, protein localization to
  kinetochore, outer kinetochore, spindle pole, cytosol, and nucleus -- all validated by
  GOA and experimental evidence. One prediction (GO:0098806, Spindly-BICDR complex) does
  not exist in the Gene Ontology and represents a model error. The cell migration prediction
  (GO:0016477) is in GOA and supported by published evidence (PMID:30258100). The enzyme
  binding (GO:0019899) prediction is in GOA. Overall the SFT model performs well for this
  well-characterized mitotic protein.
references:
- id: doi:10.64898/2026.03.19.712954
  title: BioReason-Pro (Fallahpour et al. 2026)
