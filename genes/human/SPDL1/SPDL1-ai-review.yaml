- term:
    id: GO:0005515
    label: protein binding
  evidence_type: IPI
  original_reference_id: PMID:19468067
  review:
    summary: >-
      Protein binding annotation from Chan et al. 2009. The IPI partners are
      KNTC1/Rod (O43264) and KNTC2/ZW10 (P50748), components of the RZZ
      complex. These interactions are biologically central to Spindly function,
      as Spindly is recruited to kinetochores via the RZZ complex. However,
      protein binding is too generic; kinetochore binding (GO:0043515) and
      dynein complex binding (GO:0070840) are more informative.
    action: REMOVE
    reason: >-
      Protein binding is uninformative. The specific RZZ complex interaction is
      functionally captured by kinetochore binding and the dynein recruitment
      function.
    supported_by:
    - reference_id: PMID:19468067
      supporting_text: >-
        RZZ members (ZW10 and Rod), but not dynein, could be
        coimmunoprecipitated with hSpindly
- term:
    id: GO:0016477
    label: cell migration
  evidence_type: IMP
  original_reference_id: PMID:30258100
  review:
    summary: >-
      IMP annotation for cell migration based on Conte et al. 2018, which
      showed that cells lacking Spindly migrate slower than wild-type cells.
      This was supported by an earlier report showing Spindly associates with
      the cell cortex and colocalizes with dynein/dynactin at the leading edge
      of migrating cells. This is a real but non-core function of Spindly;
      its primary evolved function is in mitotic kinetochore-dynein regulation.
    action: KEEP_AS_NON_CORE
    reason: >-
      Cell migration is a documented secondary function of Spindly, but it is
      not the core evolved function. The core function is dynein recruitment to
      kinetochores during mitosis.
    supported_by:
    - reference_id: PMID:30258100
      supporting_text: >-
        cells lacking Spindly migrate slower than wild type cells and that
        this effect is rescued by re-expression of wild-type Spindly
- term:
    id: GO:0019899
    label: enzyme binding
  evidence_type: IPI
  original_reference_id: PMID:23382074
  review:
    summary: >-
      Enzyme binding annotation from Armour et al. 2013 SIRT1 interactome
      study. The IPI partner is SIRT1 (Q96EB6). SPDL1 was identified as a
      SIRT1-interacting protein in a high-throughput screen. The biological
      significance of the SIRT1-Spindly interaction is unclear. This paper is
      primarily about USP22 and SAGA complex regulation; Spindly was a
      background hit. This is unlikely to represent a core function.
    action: KEEP_AS_NON_CORE
    reason: >-
      The SIRT1 interaction is from a large-scale screen and its functional
      significance for Spindly is not established. However, enzyme binding is
      more informative than protein binding and the interaction data are real.
    supported_by:
    - reference_id: PMID:23382074
      supporting_text: >-
        a comprehensive analysis of SIRT1 binding proteins yielding a
        high-confidence interaction map
