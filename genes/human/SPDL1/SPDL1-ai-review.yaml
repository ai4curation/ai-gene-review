  review:
    summary: >-
      Protein binding annotation based on large-scale interactome study (Rolland
      et al. 2014). This is a generic, uninformative term. Spindly interacts
      with CA8, DNAAF4, PPP1R18, RTP5, TRAF4, USP15 in this dataset. These are
