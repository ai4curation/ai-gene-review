id: Q96EA4
gene_symbol: SPDL1
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  SPDL1 (Spindly/CCDC99) encodes a coiled-coil protein that functions as a
  kinetochore-specific adaptor for cytoplasmic dynein during mitosis. It is
  recruited to the outer kinetochore via the RZZ complex (Rod/ZW10/Zwilch) in
  an Aurora B-regulated manner, and its C-terminal farnesylation is required
  for kinetochore targeting. At kinetochores, Spindly recruits the
  dynein-dynactin complex, which is essential for initial lateral
  kinetochore-microtubule interactions, chromosome congression, and correct
  spindle orientation. Spindly also drives kinetochore corona expansion by
  promoting oligomerization of RZZ-Spindly complexes, independent of dynein.
  Following microtubule attachment, dynein-mediated removal of Spindly from
  kinetochores is the critical event for spindle assembly checkpoint silencing,
  though in human cells (unlike Drosophila) Spindly is not absolutely required
  for checkpoint protein stripping. Spindly also functions as a dynein-dynactin
  cargo adaptor that converts dynein from a non-processive to a highly
  processive motor. Outside mitosis, Spindly interacts with the deubiquitinase
  USP45 and plays a role in cell migration. Spindly is monoubiquitinated and
  deubiquitinated by USP45.
