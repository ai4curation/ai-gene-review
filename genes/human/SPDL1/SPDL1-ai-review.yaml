- id: PMID:17576797
  title: >-
    Spindly, a novel protein essential for silencing the spindle assembly
    checkpoint, recruits dynein to the kinetochore.
  findings:
  - statement: >-
      Spindly was discovered as a kinetochore protein required for dynein
      recruitment and SAC silencing in Drosophila; a human homologue was
      identified with similar function.
    supporting_text: >-
      After the depletion of Spindly, dynein cannot target to kinetochores,
      and, as a result, cells arrest in metaphase with high levels of
      kinetochore-bound Mad2 and RZZ
- id: PMID:19468067
  title: >-
    Mitotic control of kinetochore-associated dynein and spindle orientation by
    human Spindly.
  findings:
  - statement: >-
      Human Spindly localizes to the outer kinetochore via the RZZ complex,
      recruits dynein-dynactin, and is required for chromosome alignment and
      spindle orientation. Unlike Drosophila, human Spindly is not required for
      checkpoint protein stripping from kinetochores.
    supporting_text: >-
      hSpindly depletion results in reduced inter-KT tension, unstable KT
      fibers, an extensive prometaphase delay, and severe chromosome
      misalignment...depletion of hSpindly induces a striking spindle
      rotation, which can be rescued by co-depletion of dynein...in contrast
      to Drosophila, hSpindly depletion does not abolish the removal of MAD2
      and ZW10 from KTs
