- id: PMID:20439434
  title: >-
    Removal of Spindly from microtubule-attached kinetochores controls spindle
    checkpoint silencing in human cells.
  full_text_unavailable: true
  findings:
  - statement: >-
      Dynein-mediated removal of Spindly from microtubule-attached
      kinetochores is the critical reaction in checkpoint silencing.
      A conserved Spindly motif is essential for dynein targeting to
      kinetochores.
    supporting_text: >-
      we identify a conserved motif in Spindly that is essential for
      kinetochore targeting of dynein
- id: PMID:29915359
  title: >-
    Dynamic kinetochore size regulation promotes microtubule capture and
    chromosome biorientation in mitosis.
  findings:
  - statement: >-
      Spindly and RZZ drive kinetochore corona expansion in a
      dynein-independent manner. C-terminal farnesylation and MPS1 kinase
      activity cause Spindly conformational changes promoting
      oligomerization of RZZ-Spindly complexes.
    supporting_text: >-
      the dynein adaptor Spindly and the RZZ (ROD-Zwilch-ZW10) complex drive
      kinetochore expansion in a dynein-independent manner
