suggested_questions:
- question: >-
    What is the precise structural basis for the Spindly-RZZ interaction, and
    how does farnesylation of the Spindly C-terminus promote this interaction?
  experts:
  - Geert Kops
  - Reto Gassmann
- question: >-
    Does Spindly have a direct role in kinetochore corona formation beyond its
    RZZ interaction, and what is the functional significance of RZZ-Spindly
    oligomerization for microtubule capture?
  experts:
  - Carlos Sacristan
  - Andrea Musacchio
- question: >-
    What is the biological significance of Spindly monoubiquitination by USP45
    for cell migration, and what is the relevant E3 ubiquitin ligase?
  experts:
  - Ana Belen Perez-Oliva
  - Eric Griffis
suggested_experiments:
- hypothesis: >-
    Spindly monoubiquitination regulates its localization or interaction
    partners during cell migration.
  description: >-
    Generate ubiquitination-site mutants of Spindly and test their effect on
    cell migration, cortical dynein recruitment, and USP45 interaction using
    wound-healing and transwell assays combined with live-cell imaging.
  experiment_type: cell biology
- hypothesis: >-
    The dynein-independent corona expansion function of Spindly is separable
    from its dynein recruitment function and has distinct contributions to
    chromosome segregation fidelity.
  description: >-
    Use separation-of-function mutants that retain corona expansion but lack
    dynein recruitment (Spindly motif mutants from Gassmann et al. 2010) to
    assess microtubule capture efficiency, attachment error rates, and
    chromosome segregation fidelity by live-cell imaging with kinetochore
    markers.
  experiment_type: cell biology
