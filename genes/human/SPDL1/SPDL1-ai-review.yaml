- term:
    id: GO:0000132
    label: establishment of mitotic spindle orientation
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      IBA annotation for establishment of mitotic spindle orientation inferred by
      phylogenetic analysis. This is strongly supported by experimental evidence
      in human cells from PMID:19468067, which showed that hSpindly depletion
      induces striking spindle rotation that is rescued by co-depletion of
      dynein, demonstrating a direct role for kinetochore dynein in spindle
      orientation.
    action: ACCEPT
    supported_by:
    - reference_id: PMID:19468067
      supporting_text: >-
        depletion of hSpindly induces a striking spindle rotation, which can
        be rescued by co-depletion of dynein
