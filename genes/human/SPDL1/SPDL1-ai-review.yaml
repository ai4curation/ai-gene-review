- term:
    id: GO:0007094
    label: mitotic spindle assembly checkpoint signaling
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: >-
      IEA annotation for SAC signaling based on InterPro domain mapping
      (IPR028593). The role of Spindly in SAC signaling is complex. In
      Drosophila, Spindly depletion prevents SAC silencing (PMID:17576797). In
      human cells, hSpindly depletion does NOT abolish removal of checkpoint
      proteins MAD2 and ZW10 from kinetochores (PMID:19468067), but Spindly
      mutants that cannot recruit dynein DO prevent checkpoint silencing
      (PMID:20439434). Thus Spindly is involved in SAC signaling primarily
      through its role in checkpoint silencing via dynein-mediated removal of
      checkpoint components.
    action: ACCEPT
    supported_by:
    - reference_id: PMID:19468067
      supporting_text: >-
        in contrast to Drosophila, hSpindly depletion does not abolish the
        removal of MAD2 and ZW10 from KTs
    - reference_id: PMID:17576797
      supporting_text: >-
        Spindly, a novel protein essential for silencing the spindle assembly
        checkpoint, recruits dynein to the kinetochore
