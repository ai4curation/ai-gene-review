suggested_questions:
- question: Does DNAJB5 stimulate HSP70 ATPase activity and refold/disaggregate clients autonomously, or is it functionally redundant with DNAJB1/DNAJB4 in the cytosol?
- question: Given its skeletal-muscle enrichment and titin interaction, does DNAJB5 have a sarcomeric/Z-disc proteostasis role analogous to DNAJB4 and DNAJB6?
suggested_experiments:
- description: In vitro reconstitution measuring DNAJB5-dependent stimulation of HSP70 ATPase and luciferase refolding/disaggregation, benchmarked against DNAJB1 and DNAJB4.
- description: Affinity purification-mass spectrometry of tagged DNAJB5 in muscle cells to define its physiological client/interaction network and test the titin/sarcomere association.
