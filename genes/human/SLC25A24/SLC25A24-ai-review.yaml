id: Q6NUK1
gene_symbol: SLC25A24
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  SLC25A24 (SCaMC-1 / APC1) is a calcium-regulated mitochondrial ATP-Mg/phosphate
  carrier of the SLC25 mitochondrial carrier family. It is a multi-pass protein of
  the mitochondrial inner membrane that catalyzes the electroneutral antiport of
  cytosolic adenine nucleotides (principally ATP-Mg, but also ADP and AMP) for
  matrix inorganic phosphate, thereby setting the size of the mitochondrial matrix
  adenine-nucleotide pool and adapting it to changing cellular energetic demand.
  The protein has a bipartite architecture: a C-terminal six-transmembrane
  mitochondrial-carrier (transporter) domain, and an N-terminal regulatory domain
  bearing four EF-hand calcium-binding motifs that faces the intermembrane space.
  Transport is switched on by a rise in cytosolic calcium: calcium binding to the
  EF-hand domain triggers a conformational change that uncaps the carrier domain,
  whereas in the calcium-free state the N-terminal domain caps and inhibits the
  transporter. By importing ATP/ADP into the matrix following a calcium signal,
  SLC25A24 contributes to matrix calcium buffering, desensitization of the
  mitochondrial permeability transition, and protection against oxidative-stress-
  induced cell death. Dominant de novo missense variants at Arg217 cause Fontaine
  progeroid syndrome (Gorlin-Chaudhry-Moss syndrome), a growth-retardation and
  progeroid disorder with craniosynostosis and mitochondrial dysfunction.
