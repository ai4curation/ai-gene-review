- id: PMID:22015608
  title: SCaMC-1 promotes cancer cell survival by desensitizing mitochondrial permeability
    transition via ATP/ADP-mediated matrix Ca(2+) buffering.
  findings:
  - statement: >-
      SCaMC-1/SLC25A24 mediates calcium-triggered ATP-Mg/ADP uptake into mitochondria;
      the imported ATP/ADP buffer matrix calcium, desensitizing the mitochondrial
      permeability transition, and knockdown sensitizes cells to oxidative-stress- and
      calcium-overload-induced necrotic death.
    supporting_text: >-
      the mitochondrial carrier SCaMC-1/SLC25A24 mediates ATP-Mg(2-)/Pi(2-) and/or
      HADP(2-)/Pi(2-) uptake into the mitochondria after an increase in cytosolic
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Abstract-only cache; cellular evidence for calcium-dependent ATP transport and
      the matrix-calcium-buffering / mPT-desensitization role. Source of IMP MF/BP and
      calcium-response annotations.
- id: PMID:24332718
  title: A self-sequestered calmodulin-like Ca²⁺ sensor of mitochondrial SCaMC carrier
    and its implication to Ca²⁺-dependent ATP-Mg/P(i) transport.
  findings:
  - statement: >-
      Crystal structure (PDB 4N5X) plus NMR/SPR show the N-terminal EF-hand domain binds
      calcium and undergoes a calcium-triggered conformational switch: apo NTD caps and
      binds the transporter domain (inhibiting transport), while the calcium-bound NTD is
      self-sequestered and releases it, providing a molecular basis for calcium-dependent
      ATP-Mg transport.
    supporting_text: >-
      Crystal structure of the Ca²⁺-bound NTD reveals a compact architecture in which
      the functional EF hands are sequestered by an endogenous helical segment
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Full text available; primary structural evidence for calcium ion binding
      (GO:0005509) and calcium regulation of transport.
- id: PMID:29100093
  title: De Novo Mutations in SLC25A24 Cause a Craniosynostosis Syndrome with Hypertrichosis,
    Progeroid Appearance, and Mitochondrial Dysfunction.
  findings:
  - statement: >-
      Recurrent de novo p.Arg217His/p.Arg217Cys variants in SLC25A24 cause Gorlin-
      Chaudhry-Moss (Fontaine progeroid) syndrome; patient fibroblasts show mitochondrial
      swelling exacerbated by H2O2, lower matrix ATP, and increased sensitivity to
      oxidative stress, indicating a gain of pathological function.
    supporting_text: >-
      mitochondrial dysfunction with increased sensitivity to oxidative stress is due
      to the SLC25A24 mutations
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Abstract-only cache; disease gene identification and source of oxidative-stress /
      mitochondrial-transport IMP annotations. Verified against PubMed record.
