id: Q9NZ01
gene_symbol: TECR
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  TECR (trans-2,3-enoyl-CoA reductase; also known as GPSN2/SC2 and TER) is an
  endoplasmic reticulum multi-pass membrane enzyme (EC 1.3.1.93) that catalyzes
  the fourth and final reaction of the microsomal fatty-acid elongation cycle:
  the NADPH-dependent reduction of the trans-2,3-enoyl-CoA (a (2E)-enoyl-CoA)
  intermediate to the fully saturated acyl-CoA, thereby completing one round of
  chain elongation and adding two carbons. Acting together with the ELOVL
  condensing enzymes, the 3-ketoacyl-CoA reductase and the HACD
  3-hydroxyacyl-CoA dehydratases, it is the sole mammalian trans-2-enoyl-CoA
  reductase and is required for the biosynthesis of long- and very-long-chain
  fatty acids (VLCFAs) used as precursors of membrane lipids, sphingolipids and
  lipid mediators. TECR has a second role in sphingolipid catabolism: it
  performs the saturation step of the sphingosine-1-phosphate degradation
  pathway, converting trans-2-hexadecenoyl-CoA to palmitoyl-CoA. The protein has
  a cytoplasmic N-terminal ubiquitin-like domain followed by several
  transmembrane helices and forms a substrate-channeling complex with HACD1/2.
  A homozygous P182L substitution reduces enzyme activity and stability and
  causes autosomal-recessive nonsyndromic intellectual disability (MRT14).
