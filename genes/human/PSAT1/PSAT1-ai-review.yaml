taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: PSAT1 is human phosphoserine aminotransferase (EC 2.6.1.52), a cytosolic,
  pyridoxal 5'-phosphate (PLP)-dependent transaminase that catalyzes the second step
  of the phosphorylated pathway of de novo L-serine biosynthesis. It transfers the
  amino group from L-glutamate to 3-phosphohydroxypyruvate, yielding O-phospho-L-serine
  and 2-oxoglutarate; this reaction is thermodynamically favorable and helps drive
  the overall pathway toward L-serine. The enzyme is a homodimer, with each of the
  two PLP cofactors bound (via a Schiff base to Lys200) at the monomer-monomer interface
  and shared between the subunits. PSAT1 belongs to the class-V PLP-dependent aminotransferase
  family (SerC subfamily). L-serine produced by this pathway is a precursor for glycine,
  cysteine, D-serine, phospholipids, and nucleotides, and is especially important in
  the central nervous system, where serine is poorly transported across the blood-brain
  barrier. Loss-of-function variants cause autosomal recessive serine deficiency disorders,
  ranging from phosphoserine aminotransferase deficiency (seizures, microcephaly, psychomotor
  retardation) to the lethal Neu-Laxova syndrome 2. Beyond its housekeeping metabolic
  role, PSAT1 has a described noncanonical activity in which, following CAMK2A-mediated
  phosphorylation, it interacts with and stabilizes GPX4 to suppress ferroptosis.
