suggested_questions:
- question: Under what physiological or pathological conditions (e.g. inflamed tumor
    microenvironment) is the noncanonical PSAT1-GPX4 ferroptosis-suppression activity
    engaged, and how does it partition against the housekeeping serine-biosynthesis
    role?
- question: Does isoform 2 (alpha; lacking residues 291-336) retain catalytic activity,
    and what is its physiological relevance given that isoform 1 is considered the
    primary transcript?
suggested_experiments:
- description: Structure-guided separation-of-function analysis using the K200A (catalysis-dead)
    and S337A (phosphorylation-dead) mutants to dissect the metabolic serine-biosynthesis
    role from the ferroptosis-regulatory role in cells and in serine-deficiency models.
  experiment_type: genetic manipulation/biochemistry
  hypothesis: PSAT1 catalytic activity and GPX4-stabilizing activity are genetically
    separable functions.
- description: Quantitative flux analysis of the reconstituted phosphorylated pathway
    with purified PHGDH, PSAT1, and PSPH to measure how patient-derived PSAT1 variants
    alter L-serine output, linking specific kinetic defects to disease severity.
  experiment_type: enzymology/metabolic flux
  hypothesis: Disease severity in PSATD/NLS2 tracks quantitatively with the reduction
    in pathway flux caused by each PSAT1 variant.
