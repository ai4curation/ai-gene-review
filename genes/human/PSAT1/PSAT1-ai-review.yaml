  evidence_type: NAS
  original_reference_id: PMID:10637769
  qualifier: involved_in
  review:
    summary: Over-annotation. PSAT1 uses pyridoxal 5'-phosphate (vitamin B6) as an
      essential cofactor for its transaminase reaction, but it does not synthesize
      pyridoxine/vitamin B6. Human PSAT1 has no role in pyridoxine biosynthesis, and
      the cited paper characterizes the serine-biosynthesis transaminase, not a B6-biosynthetic
      activity. This NAS annotation conflates cofactor usage with cofactor biosynthesis.
    action: MARK_AS_OVER_ANNOTATED
