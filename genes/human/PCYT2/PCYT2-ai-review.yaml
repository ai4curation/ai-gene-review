id: Q99447
gene_symbol: PCYT2
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  PCYT2 encodes ethanolamine-phosphate cytidylyltransferase (ET; also called
  CTP:phosphoethanolamine cytidylyltransferase, EC 2.7.7.14), the rate-controlling
  enzyme of the CDP-ethanolamine (Kennedy) pathway of phosphatidylethanolamine (PE)
  biosynthesis. It catalyzes the second of three steps of that pathway: the
  condensation of phosphoethanolamine with CTP to form the activated intermediate
  CDP-ethanolamine plus diphosphate. The resulting CDP-ethanolamine is subsequently
  transferred to diacylglycerol by an ethanolaminephosphotransferase to yield PE,
  the dominant inner-leaflet aminophospholipid of cell membranes and the most abundant
  phospholipid class in brain. The 389-residue protein is a soluble cytosolic enzyme
  (distinct from the membrane-associated choline counterpart PCYT1A) built from two
  tandem cytidylyltransferase catalytic domains. PE made through this route also feeds
  ether-phospholipid (plasmalogen) synthesis. Biallelic loss-of-function of PCYT2 causes
  an autosomal-recessive complex hereditary spastic paraplegia (SPG82) with developmental
  regression and progressive cerebral and cerebellar atrophy; complete loss of activity
  is embryonic-lethal in vertebrates.
