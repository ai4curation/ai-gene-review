  review:
    summary: >-
      Reactome models the reaction at the ER membrane with a membrane-bound PCY2 dimer,
      but mammalian ET/PCYT2 is characterized as a soluble cytosolic enzyme (unlike the
      membrane-associated choline counterpart PCYT1A), and GOA/PAN-GO localizes it to
