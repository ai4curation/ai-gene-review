id: Q96EN8
gene_symbol: MOCOS
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  MOCOS is molybdenum cofactor sulfurase (EC 2.8.1.9; also called molybdenum cofactor
  sulfurtransferase, MoCo sulfurase), a cytosolic, pyridoxal-5'-phosphate (PLP)-dependent
  enzyme of the class-V (NifS-like) cysteine-desulfurase family. It converts the molybdenum
  cofactor (MoCo) from its dioxo form into the terminal-sulfido (thio) form. The enzyme is a
  homodimer of two-domain subunits; the N-terminal NifS-like PLP domain abstracts sulfur
  from L-cysteine via L-cysteine desulfurase activity (yielding L-alanine and an enzyme-bound
  persulfide), and the C-terminal MOSC/Moco-binding domain receives the mobilized sulfur
  and transfers it to the bound Mo-molybdopterin. This sulfurated MoCo is specifically
  required to activate the molybdo-flavoenzymes xanthine dehydrogenase/oxidase (XDH/XO) and
  aldehyde oxidase (AOX1); the third human molybdoenzyme, sulfite oxidase, uses the
  non-sulfurated cofactor and does not depend on MOCOS. Loss-of-function variants in MOCOS
  cause classical xanthinuria type II, an autosomal-recessive disorder with combined XDH and
  aldehyde oxidase deficiency, marked by xanthine accumulation and urolithiasis, very low uric
  acid, and inability to convert allopurinol to oxypurinol.
