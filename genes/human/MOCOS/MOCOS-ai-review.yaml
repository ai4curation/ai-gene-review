- id: PMID:11302742
  title: Mutation of human molybdenum cofactor sulfurase gene is responsible for classical
    xanthinuria type II.
  findings:
  - statement: >-
      Cloned the human molybdenum cofactor sulfurase (HMCS/MOCOS) gene; a nonsense variant
      (Arg419Ter) in two classical xanthinuria type II patients demonstrated that a functional
      defect of HMCS causes type II xanthinuria (combined XDH and aldehyde oxidase deficiency).
    supporting_text: >-
      a functional defect of the HMCS gene is responsible for classical xanthinuria type II,
      and that HMCS protein functions to provide a sulfur atom for the molybdenum cofactor of
      XDH and AO.
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Establishes MOCOS as the type II xanthinuria gene and its sulfur-donor role for the MoCo
      of XDH and AO. Basis of the IMP annotations. Cached record is abstract-only; the IMP
      curator read the full text.
