core_functions:
- description: >-
    Molybdenum cofactor sulfurase: MOCOS catalyzes the PLP-dependent transfer of sulfur from
    L-cysteine to the molybdenum cofactor, converting Mo-molybdopterin to its terminal-sulfido
    (thio) form (EC 2.8.1.9). The N-terminal NifS-like domain performs L-cysteine desulfurase
    chemistry (L-cysteine to L-alanine plus an enzyme persulfide) and the C-terminal MOSC domain
    delivers the sulfur to the bound Moco. The sulfurated MoCo is specifically required to
    activate xanthine dehydrogenase/oxidase and aldehyde oxidase.
  molecular_function:
    id: GO:0008265
    label: molybdenum cofactor sulfurtransferase activity
  directly_involved_in:
