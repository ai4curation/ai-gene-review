- id: PMID:34356852
  title: 'Classical Xanthinuria in Nine Israeli Families and Two Isolated Cases from Germany:
    Molecular, Biochemical and Population Genetics Aspects.'
  findings:
  - statement: >-
      Defines the PLP-dependent L-cysteine desulfurase mechanism of the MOCOS NifS-like domain,
      with the liberated sulfur transferred to the C-terminally bound Moco.
    supporting_text: >-
      The NifS-like domain catalyzes the mobilization of sulfur from L-cysteine in a
      PLP-dependent manner via its so-called L-cysteine desulfurase activity, with the
      liberated sulfur serving as a substrate for sulfuration of the C-terminally bound Moco.
  - statement: >-
      Direct biochemical (IDA) characterization: the type II variant Thr349Ile in the NifS-like
      domain reduced PLP binding and abolished cysteine desulfurase activity of recombinant
      MOCOS-NifS.
    supporting_text: >-
      the type II-linked c.1046 C>T variant resulted in a reduced yield, reduced binding of the
      PLP cofactor and absence of cysteine desulfurase activity
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Full text available (PMC8301430). Provides the direct catalytic/IDA evidence and the
      PLP-dependent L-cysteine desulfurase mechanism; source of the UniProt catalytic-activity,
      PLP cofactor, pathway and EC 2.8.1.9 assignments.
- id: Reactome:R-HSA-947499
  title: Exchange of oxygen with sulfur in MoCo
  findings:
  - statement: >-
      Human xanthine oxidase and aldehyde oxidase require the MoCo in which an oxygen bound to
      molybdenum is replaced with sulfur; this exchange is catalyzed by MOCOS.
    supporting_text: >-
      The exchange is catalyzed by the MOCOS cysteine desulfurase (Ichida et al, 2001).
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: >-
      Reactome reaction for MoCo oxygen-to-sulfur exchange; supports the sulfurtransferase
      activity and cytosolic location TAS annotations.
- id: Reactome:R-HSA-947581
  title: Molybdenum cofactor biosynthesis
  findings:
  - statement: >-
      In humans, sulfurated (rather than desulfurated) molybdenum cofactor is found on xanthine
      and aldehyde oxidases, a refinement needed for their function.
    supporting_text: >-
      This means, in humans we find sulfurated instead of desulfurated molybdenum cofactor on
      these two enzymes
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: >-
      Reactome MoCo biosynthesis pathway; supports the molybdopterin cofactor biosynthetic
      process TAS annotation.
