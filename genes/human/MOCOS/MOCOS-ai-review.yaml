      The NifS-like domain catalyzes the mobilization of sulfur from L-cysteine in a
      PLP-dependent manner via its so-called L-cysteine desulfurase activity, with the
      liberated sulfur serving as a substrate for sulfuration of the C-terminally bound Moco.
  - reference_id: PMID:11302742
    supporting_text: >-
      a functional defect of the HMCS gene is responsible for classical xanthinuria type II,
      and that HMCS protein functions to provide a sulfur atom for the molybdenum cofactor of
      XDH and AO.
- description: >-
    Pyridoxal-5'-phosphate binding: MOCOS is a class-V PLP-dependent enzyme; PLP is covalently
    bound at Lys264 in the NifS-like domain and is the essential catalytic cofactor for the
    L-cysteine desulfurase step. Pathogenic variants that reduce PLP binding abolish the
    sulfur-mobilizing activity.
