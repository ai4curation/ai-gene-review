suggested_questions:
- question: Is the moonlighting RNA-binding/translational-repressor activity of TYMS
    physiologically significant in vivo, or primarily an in vitro/regulatory phenomenon?
- question: What is the quantitative contribution of the mitochondrial de novo dTMP
    pathway (TYMS/SHMT2/DHFRL1) versus the cytosolic/nuclear pathway to total cellular
    dTMP?
suggested_experiments:
- description: Compartment-specific rescue (cytosolic vs nuclear-targeted vs mitochondrial-targeted
    TYMS) in TYMS-null cells to dissect the relative importance of each localization
    for genome integrity.
- description: Structure-guided separation-of-function mutants that abolish mRNA binding
    while retaining catalysis, to test the biological role of translational autoregulation.
