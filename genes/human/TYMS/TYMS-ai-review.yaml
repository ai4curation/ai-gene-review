id: P04818
gene_symbol: TYMS
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: Thymidylate synthase (TYMS, EC 2.1.1.45) catalyses the reductive methylation
  of 2'-deoxyuridine-5'-monophosphate (dUMP) to 2'-deoxythymidine-5'-monophosphate
  (dTMP), using (6R)-5,10-methylenetetrahydrofolate as both the one-carbon donor and
  the reductant, which is oxidised in the reaction to 7,8-dihydrofolate (DHF; regenerated
  by dihydrofolate reductase). This is the sole de novo route to thymidylate and is
  essential for DNA replication and repair. The enzyme is a cytosolic homodimer with
  an active-site cysteine nucleophile; a de novo thymidylate synthesis multienzyme complex
  (with SHMT1/SHMT2 and DHFR/DHFRL1) also operates in the nucleus at replication forks
  during S phase and in mitochondria, supplying dTMP for nuclear and mitochondrial DNA.
  TYMS is a central chemotherapy target, inhibited by the 5-fluorouracil metabolite FdUMP
  and by antifolates such as raltitrexed and pemetrexed. Beyond catalysis, TYMS moonlights
  as an RNA-binding translational repressor, binding its own mRNA to autoregulate its
  translation.
