core_functions:
- description: Accessory subunit of the ribosome quality control (RQC) complex that, together
    with LTN1 and NEMF on the stalled 60S subunit, is required to promote formation of Lys48-
    linked polyubiquitin chains during ubiquitination of incompletely synthesized nascent chains,
    committing them to proteasomal degradation.
  contributes_to_molecular_function:
    id: GO:0061630
    label: ubiquitin protein ligase activity
  locations:
  - id: GO:1990112
    label: RQC complex
  supported_by:
  - reference_id: PMID:30244831
    supporting_text: TCF25, a poorly characterized RQC component, ensures preferential formation
      of the K48-ubiquitin linkage
  - reference_id: file:human/TCF25/TCF25-uniprot.txt
    supporting_text: required to promote formation of 'Lys-48'-linked polyubiquitin chains during
      ubiquitination of incompletely synthesized proteins by LTN1
proposed_new_terms: []
suggested_questions:
- question: How does TCF25 mechanistically enforce K48-linkage specificity of LTN1 during RQC -
    by positioning the E2, the substrate lysine, or the growing chain?
- question: Is the nuclear pool of TCF25/Nulp1 functionally distinct from its RQC role, and does
    it retain any genuine transcriptional or cell-death-regulatory activity in human cells?
suggested_experiments:
- description: Reconstitute LTN1-mediated nascent-chain ubiquitination with and without TCF25 and
    measure ubiquitin chain linkage composition (K48 vs other) by mass spectrometry to define
    TCF25's effect on chain specificity.
- description: Map the TCF25 region(s) required for RQC versus nuclear localization by domain
    deletion, and test whether RQC-defective TCF25 retains the legacy transcriptional/XIAP-
    binding activities.
