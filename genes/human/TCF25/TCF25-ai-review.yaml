id: Q9BQ70
gene_symbol: TCF25
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: TCF25 (Ribosome quality control complex subunit TCF25; also known as Nulp1/hnulp1,
  "nuclear localized protein 1") is the human ortholog of the yeast RQC factor Rqc1 and a
  component of the ribosome-associated quality control (RQC) complex together with the E3
  ubiquitin ligase LTN1/Listerin and NEMF on the stalled 60S ribosomal subunit. Within this
  complex TCF25 acts as an accessory factor required to promote formation of Lys48-linked
  polyubiquitin chains during LTN1-mediated ubiquitination of incompletely synthesized nascent
  chains, thereby ensuring efficient targeting of stalled translation products for proteasomal
  degradation. Despite the legacy "Transcription Factor 25" name, TCF25 has no demonstrated
  sequence-specific transcription-factor activity in this role; earlier work described it as a
  mainly nuclear basic-helix-loop-helix protein (Nulp1/hnulp1) with a transcriptional repressive
  domain and a role in cell-death control and XIAP binding. It is widely expressed with high
  levels in heart and, in the embryo, brain, and is found in both the nucleus and the cytosol.
