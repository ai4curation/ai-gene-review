    Imports FAD across the mitochondrial inner membrane into the matrix, supplying the redox
    cofactor required by mitochondrial flavoenzymes (fatty-acid beta-oxidation, amino-acid and
    choline metabolism, and the electron transport chain), including DLD of the glycine cleavage
    system.
