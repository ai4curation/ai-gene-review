  title: Retrovirally mediated complementation of the glyB phenotype. Cloning of a
    human gene encoding the carrier for entry of folates into mitochondria.
  findings: []
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Original cloning of SLC25A32/MFT as the human mitochondrial folate carrier via complementation
      of the glyB glycine-auxotroph phenotype; reinstated mitochondrial folate accumulation. Establishes
      the historical folate-transporter model and inner-membrane localization. Abstract-only cache.
