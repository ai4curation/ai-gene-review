      Shows SLC25A32 (MFT), but not N111, complements the yeast FLX1 FAD-carrier mutant, identifying it
      as the human mitochondrial FAD transporter. Primary support for the core FAD transporter activity
      and MADD relevance. Abstract-only cache.
