  title: A mutation inactivating the mitochondrial inner membrane folate transporter
    creates a glycine requirement for survival of chinese hamster cells.
  findings: []
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Maps the glyB defect to a Gly192Glu point mutation in the inner-membrane folate carrier that
      abolishes mitochondrial folate transport. Basis of the IGI inner-membrane annotation and of the
      UniProt CAUTION. Abstract-only cache.
- id: PMID:16165386
