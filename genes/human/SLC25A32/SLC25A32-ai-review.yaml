proposed_new_terms: []
suggested_questions:
- question: >-
    Does SLC25A32 transport mitochondrial folate directly at all, or is its influence on
    mitochondrial folate pools entirely secondary to FAD-dependent one-carbon flux (e.g. via the
    glycine cleavage system and formate)?
- question: >-
    What accounts for the phenotypic and biochemical variability across SLC25A32 patients and mouse
    models (riboflavin-responsive exercise intolerance versus lethal neural tube defects), and how do
    specific residues (e.g. K235, Y174) map onto FAD versus residual folate transport?
suggested_experiments:
- description: >-
    Reconstitute purified human SLC25A32 into proteoliposomes and directly measure transport kinetics
    for FAD versus tetrahydrofolate/5-methyl-THF (and FMN/riboflavin), to quantify the relative
    substrate specificity that distinguishes the FAD-carrier from folate-carrier models.
- description: >-
    Perform substrate-specific flux tracing (labeled FAD precursors and labeled folate/one-carbon
    units) in SLC25A32-null versus rescued human cells to dissect which mitochondrial folate changes
    are direct transport effects versus downstream metabolic consequences.
