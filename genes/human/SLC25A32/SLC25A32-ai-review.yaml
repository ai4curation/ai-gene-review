gene_symbol: SLC25A32
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  SLC25A32 (also known as MFT/MFTC, the mitochondrial folate transporter) is a member of the
  SLC25 mitochondrial carrier family: a ~35 kDa multi-pass protein of the mitochondrial inner
  membrane with three Solcar repeats and six transmembrane helices. It was originally cloned as
  the carrier that imports folates (tetrahydrofolate) into the mitochondrial matrix, where folate
  cofactors support mitochondrial one-carbon metabolism. Subsequent biochemical and mouse-genetic
  work established that its primary transported substrate is flavin adenine dinucleotide (FAD):
  it translocates FAD across the inner membrane into the matrix, supplying the redox cofactor to
  mitochondrial flavoenzymes involved in fatty-acid beta-oxidation, amino-acid and choline
  metabolism, and the electron transport chain. In particular it provides FAD to dihydrolipoamide
  dehydrogenase (DLD) of the glycine cleavage system, linking it to glycine/formate handling and,
  indirectly, to folate-mediated one-carbon metabolism. Its effect on mitochondrial folate levels
  is now understood to be largely an indirect consequence of this FAD-dependent metabolic role.
  Loss of function causes autosomal-recessive riboflavin-responsive exercise intolerance with
  combined respiratory-chain/flavoenzyme deficiency, and is associated with folate-resistant,
  formate-preventable neural tube defects.
