proposed_new_terms: []
suggested_questions:
- question: How does CHIP discriminate between chaperone clients destined for refolding versus
    ubiquitination/degradation, and which features of the chaperone-client complex bias this
    triage decision?
- question: How do the SCAR16 (recessive) and SCA48 (dominant) STUB1 variants differ mechanistically
    (loss of ligase activity, loss of dimerization, or dominant-negative effects on the chaperone-ligase
    axis)?
- question: To what extent are CHIP's many substrate-specific physiological roles (cardiac,
    immune, vascular) driven by tissue-specific chaperone/co-chaperone context versus intrinsic
    substrate selectivity?
suggested_experiments:
- description: Reconstitute CHIP-mediated ubiquitination in vitro with HSP70/HSP90-bound model
    clients and defined E2s to dissect how TPR-domain chaperone binding and U-box catalysis
    are coordinated, using TPR and U-box point mutants.
- description: Compare client/substrate profiles (ubiquitinome and stability proteomics) in
    CHIP-knockout versus SCAR16/SCA48 patient-variant knock-in cells to map disease-relevant
    substrate dysregulation.
- description: Quantify CHIP homodimerization and its requirement for E3 activity using engineered
    monomeric variants, correlating with chaperone binding and substrate turnover.
