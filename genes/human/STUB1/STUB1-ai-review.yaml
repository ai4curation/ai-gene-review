id: Q9UNE7
gene_symbol: STUB1
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: 'STUB1 (E3 ubiquitin-protein ligase CHIP, C-terminus of HSC70-interacting protein)
  is a cytoplasmic protein that couples the molecular-chaperone and ubiquitin-proteasome systems.
  It has a bipartite architecture: an N-terminal tetratricopeptide repeat (TPR) domain that
  binds the C-terminal EEVD/MEEVD motifs of HSP70/HSC70 and HSP90, and a C-terminal U-box
  domain that confers RING-type E3 ubiquitin-ligase activity. Acting as a chaperone-associated
  ''triage'' factor, CHIP ubiquitinates chaperone-bound misfolded or damaged client proteins
  (in cooperation with E2 enzymes such as UBE2D and UBE2N/UBE2V1) and targets them for proteasomal
  degradation, while also modulating the activity of the HSP70/HSC70/HSP90 chaperone cycle
  as a co-chaperone. CHIP functions as a homodimer and additionally participates in protein
  quality control, ERAD, chaperone-mediated autophagy and mitophagy, and the regulated turnover
  of numerous specific substrates (e.g. tau, FOXO1, NOS1, POLB, ESR1). Loss of CHIP ubiquitin-ligase
  activity causes autosomal-recessive (SCAR16) and autosomal-dominant (SCA48) spinocerebellar
  ataxia.'
