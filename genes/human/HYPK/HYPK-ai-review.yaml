    label: cytoplasm
  supported_by:
  - reference_id: file:human/HYPK/HYPK-uniprot.txt
    supporting_text: Has chaperone-like activity preventing polyglutamine (polyQ)
      aggregation of HTT in neuronal cells
- description: Non-catalytic regulatory subunit of the NatA/HYPK N-terminal
    acetyltransferase complex that binds NAA15 and reduces (inhibits) the
    N-terminal acetyltransferase activity of the NAA10-NAA15 (NatA) complex and
    modulates its interaction with NAA50.
  molecular_function:
    id: GO:0010699
    label: acetyltransferase inhibitor activity
  locations:
  - id: GO:0031415
    label: NatA complex
  supported_by:
  - reference_id: file:human/HYPK/HYPK-uniprot.txt
    supporting_text: Inhibits the N-terminal acetylation activity of the
      N-terminal acetyltransferase NAA10-NAA15 complex (also called the NatA
      complex)
proposed_new_terms: []
suggested_questions:
- question: Is HYPK's NatA-inhibitory activity a regulatory mechanism for global
    N-terminal acetylation, or primarily a means to couple NatA to nascent-chain
    chaperoning?
- question: Does HYPK's anti-polyQ-aggregation chaperone activity require its
    association with the NatA complex, or can free HYPK chaperone clients
    independently?
suggested_experiments:
- description: In vitro reconstitution measuring NatA N-terminal acetyltransferase
    activity with and without HYPK and NAA50 to quantify HYPK's inhibitory effect
    and its competition with NAA50.
- description: Aggregation assays (FRAP, filter-trap) of expanded-polyQ HTT in cells
    with HYPK knockout versus HYPK reconstituted in NatA-binding-deficient form to
    test whether chaperone activity requires NatA association.
- description: Selective ribosome profiling / N-terminal acetylome comparison upon
    HYPK depletion to define which nascent-chain substrates are co-regulated by
    HYPK and NatA.
