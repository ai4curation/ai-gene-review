core_functions:
- description: Intrinsically disordered, ribosome/NatA-associated chaperone that
    suppresses aggregation of aggregation-prone clients, notably preventing
    polyglutamine aggregation of N-terminal huntingtin, acting in association with
    the NatA complex.
  molecular_function:
    id: GO:0044183
    label: protein folding chaperone
  locations:
