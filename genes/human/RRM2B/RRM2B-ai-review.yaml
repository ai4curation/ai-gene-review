core_functions:
- description: Radical-generating small subunit of ribonucleotide reductase; with
    the large catalytic subunit RRM1 it catalyzes the de novo reduction of ribonucleoside
    diphosphates to 2'-deoxyribonucleoside diphosphates (EC 1.17.4.1) via a diiron-tyrosyl
    free radical center, using thioredoxin/glutaredoxin as reductant.
  molecular_function:
    id: GO:0004748
    label: ribonucleoside-diphosphate reductase activity, thioredoxin disulfide as
      acceptor
