    supporting_text: conversion of ribonucleoside diphosphates to deoxyribonucleoside
      diphosphates,
- description: p53/TP53-inducible provider of deoxyribonucleotide precursors for mitochondrial
    DNA synthesis. In quiescent and post-mitotic cells that lack RRM2, the RRM1/RRM2B
    complex supplies the dNTPs required for mtDNA replication; loss of RRM2B causes
    mitochondrial DNA depletion (MTDPS8).
  molecular_function:
    id: GO:0004748
