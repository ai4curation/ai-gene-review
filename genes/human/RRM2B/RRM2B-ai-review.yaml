id: Q7LG56
gene_symbol: RRM2B
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: RRM2B (p53R2) is the p53/TP53-inducible small subunit of ribonucleotide
  reductase. Together with the large catalytic subunit RRM1 it forms an active ribonucleotide
  reductase (RNR) that reduces ribonucleoside diphosphates (NDPs) to 2'-deoxyribonucleoside
  diphosphates (dNDPs) via a diiron-tyrosyl free radical center (EC 1.17.4.1), the
  rate-limiting de novo step supplying dNTPs for DNA synthesis and repair. Unlike the
  S-phase/cell-cycle-regulated small subunit RRM2, RRM2B is induced by p53 in response
  to DNA damage and is present in quiescent and post-mitotic cells, where an RRM1/RRM2B
  complex provides dNTPs for DNA repair and, critically, for mitochondrial DNA synthesis.
  Ribonucleotide reduction is a cytosolic process; the deoxyribonucleotides produced
  diffuse to the nucleus or are imported into mitochondria. Loss-of-function mutations
  cause mitochondrial DNA depletion syndrome 8 (MTDPS8, encephalomyopathic form, with
  or without renal tubulopathy) and autosomal-dominant progressive external ophthalmoplegia
  with multiple mtDNA deletions.
