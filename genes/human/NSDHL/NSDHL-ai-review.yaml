- term:
    id: GO:0003854
    label: 3-beta-hydroxy-Delta5-steroid dehydrogenase (NAD+) activity
  evidence_type: TAS
  original_reference_id: PMID:10710235
  qualifier: enables
  review:
    summary: >-
      Legacy (2003 PINC) TAS annotation using the classic steroidogenic
      3-beta-hydroxy-Delta5-steroid dehydrogenase activity (GO:0003854, the
      pregnenolone-to-progesterone-type reaction: a 3-beta-hydroxy-Delta(5)-steroid +
