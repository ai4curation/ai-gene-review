id: Q15738
gene_symbol: NSDHL
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  NSDHL (NAD(P)-dependent steroid dehydrogenase-like protein) is the
  sterol-4-alpha-carboxylate 3-dehydrogenase (decarboxylating) (EC 1.1.1.170) of
  the C4-demethylation machinery in post-squalene cholesterol/sterol biosynthesis.
  Acting after the sterol C4-methyl oxidase MSMO1 has oxidised a C4 methyl group to
  a carboxylate, NSDHL catalyses the NAD(P)+-dependent 3-beta-hydroxysteroid
  dehydrogenation and oxidative decarboxylation of the 4-alpha-carboxysterol,
  producing a 3-oxo (3-keto) sterol plus CO2; a 3-ketosteroid reductase (HSD17B7)
  then reduces the ketone back to the 3-beta-ol. Two iterations of this cycle remove
  both C4 methyl groups (e.g. converting 4,4-dimethyl sterol intermediates toward
  zymosterol/zymostenol). NSDHL is a single-pass endoplasmic reticulum membrane
  protein belonging to the 3-beta-hydroxysteroid dehydrogenase (short-chain
  dehydrogenase/reductase) family, uses an NAD(P)-binding Rossmann fold, functions
  as a homodimer, and is also found on lipid droplets. In humans, loss-of-function
  or hypomorphic mutations cause the X-linked cholesterol-biosynthesis disorders
  CHILD syndrome (Congenital Hemidysplasia with Ichthyosiform erythroderma and Limb
  Defects; X-linked dominant, male-lethal) and CK syndrome (X-linked recessive
  intellectual disability with cortical malformation).
