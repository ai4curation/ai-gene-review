core_functions:
  - description: >-
      SSR2/TRAP-beta is a component of the TRAP complex that associates with the
      Sec61 translocon during co-translational protein translocation. The complex
      assists in membrane targeting and insertion of nascent polypeptides with
      weak or suboptimal signal peptides [PMID:7789174; PMID:36697828].
    molecular_function:
      id: GO:0106138
      label: Sec61 translocon complex binding
    directly_involved_in:
      - id: GO:0006613
        label: cotranslational protein targeting to membrane
    locations:
      - id: GO:0005789
        label: endoplasmic reticulum membrane
    supported_by:
      - reference_id: PMID:7789174
        supporting_text: "which codes for an endoplasmic reticulum (ER) membrane protein associated with protein translocation across the ER membrane"
      - reference_id: PMID:36697828
        supporting_text: "The near-complete atomic model of the most abundant ER translocon variant comprising the protein-conducting channel SEC61, TRAP and the oligosaccharyltransferase complex A (OSTA) reveals specific interactions of TRAP with other translocon components."
proposed_new_terms:
  - proposed_name: TRAP complex
    proposed_definition: >-
      A heterotetrameric protein complex composed of TRAP-alpha (SSR1), TRAP-beta (SSR2),
      TRAP-gamma (SSR3), and TRAP-delta (SSR4) subunits that associates with the Sec61
      translocon at the endoplasmic reticulum membrane. The TRAP complex facilitates
      co-translational protein translocation, particularly for substrates with weak
      or suboptimal signal peptides.
    justification: >-
      There is currently no specific GO term for the translocon-associated protein
      (TRAP) complex. This heterotetrameric complex (SSR1-4/TRAP-alpha,beta,gamma,delta)
      is distinct from the Sec61 translocon core and functions as a co-factor for
      protein translocation. A dedicated cellular component term would improve
      annotation precision for all TRAP subunit genes. Note that ComplexPortal
      CPX-8024 ("Translocon-associated protein complex") already captures this
      complex and is cited in the UniProt record; the GO request should reference
      CPX-8024 as supporting evidence for the complex's existence and composition.
suggested_questions:
  - question: >-
      What is the precise mechanism by which the TRAP complex modulates Sec61 lateral
      gate dynamics to facilitate translocation of weak signal peptide substrates?
      Recent structural and MD studies suggest TRAP influences gate conformations
      but the detailed mechanism remains incompletely characterized.
  - question: >-
      What is the functional significance of the SSR2/TRAP-beta interaction with STING1?
      Is this interaction related to TRAP's role in protein translocation or does it
      represent a distinct function in innate immune signaling? The STING1 interaction
      was identified in a focused study on innate immunity, but whether this represents
      a core or peripheral function of SSR2 is unclear.
