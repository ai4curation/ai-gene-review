- id: PMID:12761501
  title: Large-scale identification and characterization of human genes that activate NF-kappaB and MAPK signaling pathways.
  findings:
  - statement: TRIM13/RFP2 was identified in a large-scale screen of human genes that activate NF-kappaB and MAPK signaling.
    reference_section_type: ABSTRACT
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: Large-scale overexpression screen; supports NF-kB activation but TRIM13's NF-kB role is context-dependent (also represses TNF-induced NF-kB via NEMO).
- id: PMID:17314412
  title: The RBCC gene RFP2 (Leu5) encodes a novel transmembrane E3 ubiquitin ligase involved in ERAD.
  findings:
  - statement: TRIM13/RFP2 is an ER membrane-anchored RING transmembrane E3 ubiquitin ligase that functions in ER-associated degradation (ERAD), undergoes RING-dependent autoubiquitination, and localizes to the perinuclear ER.
    reference_section_type: ABSTRACT
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: Full text available. Founding study establishing TRIM13 as a transmembrane ERAD E3 ligase; source of ERAD, ER membrane localization, autoubiquitination and VCP interaction.
- id: PMID:18248090
  title: TRIM E3 ligases interfere with early and late stages of the retroviral life cycle.
  findings:
  - statement: Screen of TRIM E3 ligases for antiretroviral activity; several TRIMs (including TRIM13) affect late stages (viral release) of the retroviral life cycle.
    reference_section_type: ABSTRACT
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: Full text available. Supports a secondary antiviral role for TRIM13 at late (release) stages.
- id: PMID:21333377
  title: Ret finger protein 2 enhances ionizing radiation-induced apoptosis via degradation of AKT and MDM2.
  findings:
  - statement: TRIM13/RFP2 ubiquitinates and degrades MDM2 and AKT1, enhancing ionizing-radiation-induced p53 stabilization and apoptosis.
    reference_section_type: ABSTRACT
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: Full text available. Source of substrate (AKT1, MDM2) ubiquitination/proteasomal degradation and ubiquitin-like ligase activity annotations.
- id: PMID:22178386
  title: TRIM13 regulates ER stress induced autophagy and clonogenic ability of the cells.
  findings:
  - statement: TRIM13 positively regulates ER-stress-induced autophagy (coiled-coil-dependent), colocalizes with SQSTM1/p62 and ZFYVE1 at the perinuclear ER, and influences clonogenic ability (tumor-suppressor-like).
    reference_section_type: ABSTRACT
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: Full text available. Source of positive regulation of macroautophagy, perinuclear ER localization, and SQSTM1 interaction.
- id: PMID:23077300
  title: TRIM protein-mediated regulation of inflammatory and innate immune signaling and its association with antiretroviral activity.
  findings:
