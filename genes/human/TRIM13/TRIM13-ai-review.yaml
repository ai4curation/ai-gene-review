id: O60858
gene_symbol: TRIM13
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  TRIM13 (RFP2/Leu5) is an endoplasmic reticulum (ER) membrane-anchored RING-type
  E3 ubiquitin ligase of the TRIM/RBCC family. Unlike cytosolic TRIMs it has an
  N-terminal RING-type zinc finger (conferring E3 ubiquitin ligase activity,
  EC 2.3.2.27, and required for its autopolyubiquitination), a B-box and a
  coiled-coil (the coiled-coil is required for induction of autophagy during ER
  stress), and a C-terminal transmembrane domain that anchors it as a single-pass
  protein in the ER membrane, concentrating at the perinuclear ER. Its best-defined
  role is in ER-associated degradation (ERAD): it participates in the
  retrotranslocation and turnover of misfolded membrane and secretory proteins
  (as well as regulated degradation of some correctly folded proteins) from the
  ER, working with the AAA-ATPase VCP/p97 (which it binds via its C-terminal
  domain) to deliver substrates for proteasomal degradation. TRIM13 also regulates
  ER-stress-induced autophagy/reticulophagy, colocalizing with SQSTM1/p62 and
  ZFYVE1/DFCP1 at the perinuclear ER and positively regulating macroautophagy, and
  has been proposed as a tumor suppressor (it lies in the minimal deletion region
  for B-cell chronic lymphocytic leukemia on chromosome 13). Additional reported
  activities include enhancing ionizing-radiation-induced p53 stabilization and
  apoptosis by ubiquitinating and degrading MDM2 and AKT1, and context-dependent
  modulation of NF-kappaB signaling: it can positively activate NF-kappaB through
  the TLR2 pathway (K29-linked ubiquitination of TRAF6) and in T-cell receptor
  signaling, but can also repress TNF-induced NF-kappaB by regulating
  ubiquitination and turnover of IKBKG/NEMO. It has further been implicated in
  antiviral responses affecting late stages of the retroviral life cycle.
