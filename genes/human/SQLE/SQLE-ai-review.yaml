id: Q14534
gene_symbol: SQLE
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  SQLE encodes squalene monooxygenase (squalene epoxidase; EC 1.14.14.17), an FAD-dependent
  flavoprotein monooxygenase that catalyzes the stereospecific oxidation of squalene to
  (S)-2,3-epoxysqualene (2,3-oxidosqualene), consuming molecular oxygen and using reducing
  equivalents supplied by NADPH via NADPH-cytochrome P450 reductase. This is the first
  oxygenation step of sterol biosynthesis and the second rate-limiting step of the cholesterol
  biosynthetic pathway, acting downstream of HMG-CoA reductase and between squalene synthase
  (FDFT1) and lanosterol synthase (LSS). The enzyme is an endoplasmic reticulum (microsome)
  membrane protein associated peripherally with the membrane through N-terminal and C-terminal
  hydrophobic regions rather than transmembrane helices. Its N-terminal regulatory domain
  senses cholesterol and mediates cholesterol-accelerated, MARCHF6-dependent ubiquitin-
  proteasome degradation, providing feedback control of flux through the pathway. SQLE is a
  validated antifungal and anticancer drug target.
