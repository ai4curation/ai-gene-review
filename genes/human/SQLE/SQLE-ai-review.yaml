proposed_new_terms: []
suggested_questions:
- question: >-
    Beyond MARCHF6-mediated cholesterol-dependent degradation, what other post-translational
    inputs (e.g. unsaturated fatty acids, ERAD partners) tune SQLE stability in vivo?
- question: >-
    Is the SQLE-CASIMO1 (SMIM22) interaction relevant to normal (non-cancer) lipid droplet
    biology, or is it specific to tumor cell contexts?
suggested_experiments:
- description: >-
    Reconstitute human SQLE with NADPH-cytochrome P450 reductase and measure epoxidation of
    squalene to (S)-2,3-epoxysqualene to formally confirm the physiological electron-donor
    coupling and stoichiometry.
  experiment_type: in vitro enzymatic reconstitution
- description: >-
    Structure-guided mutagenesis of the N-terminal cholesterol-sensing degron (residues 62-73)
    combined with degradation assays to map the cholesterol-responsive turnover mechanism.
  experiment_type: mutagenesis and protein degradation assay
