id: P26439
gene_symbol: HSD3B2
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  HSD3B2 is the type-2 (adrenal and gonadal) 3 beta-hydroxysteroid dehydrogenase /
  steroid Delta-5-->Delta-4 isomerase, a bifunctional NAD+-dependent membrane enzyme
  that catalyzes an obligatory early step common to the synthesis of all classes of
  steroid hormones. It performs two sequential reactions on the same active site:
  NAD+-dependent oxidation of the 3beta-hydroxyl group (dehydrogenase, EC 1.1.1.145)
  followed by isomerization of the Delta5 double bond to Delta4 (isomerase, EC 5.3.3.1),
  converting pregnenolone to progesterone, 17-hydroxypregnenolone to 17-hydroxyprogesterone,
  and dehydroepiandrosterone (DHEA) to androstenedione. Because these Delta5 precursors
  must be converted to their Delta4-3-ketosteroid counterparts before glucocorticoid,
  mineralocorticoid, progestin, and sex-steroid pathways can proceed, HSD3B2 sits at a
  common branch point upstream of gluco/mineralocorticoid and sex-steroid biosynthesis.
  The active enzyme is a homodimer localized primarily to the endoplasmic reticulum
  membrane (with reported mitochondrial-membrane localization) as a single-pass membrane
  protein, and it is expressed almost exclusively in the adrenal gland, testis and ovary
  (type 1, HSD3B1, is the placenta/skin isozyme). Loss-of-function mutations cause
  3beta-hydroxysteroid-dehydrogenase-deficiency congenital adrenal hyperplasia (adrenal
  hyperplasia 2, AH2), presenting with impaired cortisol synthesis, salt-wasting, and
  ambiguous genitalia.
