id: O60725
gene_symbol: ICMT
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  ICMT (protein-S-isoprenylcysteine O-methyltransferase; EC 2.1.1.100) is a polytopic,
  multi-pass integral membrane enzyme of the endoplasmic reticulum that carries out the
  third and final step of CAAX-box protein processing. After a CAAX-motif protein has been
  prenylated (by farnesyltransferase or geranylgeranyltransferase-I) and its terminal -AAX
  tripeptide removed proteolytically (by RCE1), ICMT uses S-adenosyl-L-methionine to
  carboxymethylate (methyl-esterify) the newly exposed alpha-carboxyl group of the
  C-terminal prenylcysteine, yielding the prenylcysteine methyl ester and
  S-adenosyl-L-homocysteine. This methylation neutralizes the negative charge of the
  prenylcysteine and increases the hydrophobicity and membrane affinity of the modified
  protein. Substrates include RAS and related small GTPases (e.g. Cdc42, RhoA) and certain
  RAB GTPases (RAB7, RAB8), as well as the gamma subunits of heterotrimeric G proteins.
  ICMT is a SAM-dependent methyltransferase of the class VI-like SAM-binding superfamily and
  requires divalent cations for activity. Because carboxymethylation is required for proper
  membrane localization and signaling of RAS proteins, ICMT is an anticancer drug target.
