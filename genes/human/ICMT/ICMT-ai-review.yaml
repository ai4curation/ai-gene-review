- id: PMID:10441503
  title: The carboxyl methyltransferase modifying G proteins is a metalloenzyme.
  findings:
  - statement: >-
      PPMT/ICMT catalyzes posttranslational methylation of isoprenylated C-terminal cysteine
      residues of small monomeric G proteins (Ras, Cdc42, RhoA, Rab1) and heterotrimeric
      G-protein gamma subunits, and is a metalloenzyme requiring divalent cations.
    reference_section_type: ABSTRACT
    supporting_text: posttranslational methylation of isoprenylated C-terminal cysteine residues
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Abstract-only cache; PubMed-verified. Supports the core methyltransferase activity
      (GO:0004671) and the metalloenzyme character used in Reactome (ICMT:Zn2+).
- id: PMID:19158273
  title: Topology of mammalian isoprenylcysteine carboxyl methyltransferase determined in
    live cells with a fluorescent probe.
  findings:
  - statement: >-
      Human ICMT is an integral ER membrane protein that traverses the ER membrane eight
      times with both termini cytosolic; methyl esterification neutralizes prenylcysteine
      charge and increases membrane affinity.
    reference_section_type: ABSTRACT
    supporting_text: integral membrane protein restricted to the endoplasmic reticulum
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Abstract-only cache; PubMed-verified. Supports core ER membrane localization
      (GO:0005789) and multi-pass topology.
- id: PMID:29051265
  title: Regulation of NOTCH signaling by RAB7 and RAB8 requires carboxyl methylation by
    ICMT.
  findings:
  - statement: >-
      ICMT methylesterifies C-terminal prenylcysteine residues of CaaX proteins and some RAB
      GTPases (RAB7, RAB8); methylation is required for their endomembrane localization, GTP
      loading, and downstream NOTCH signaling.
    reference_section_type: ABSTRACT
    supporting_text: Isoprenylcysteine carboxyl methyltransferase (ICMT) methylesterifies C-terminal
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Full text available; supports core methyltransferase activity (GO:0004671) and extends
      substrate range to RAB7/RAB8.
