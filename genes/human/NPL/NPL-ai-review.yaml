  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  NPL is the human N-acetylneuraminate lyase (N-acetylneuraminate pyruvate lyase;
  sialic acid aldolase; EC 4.1.3.3), a cytosolic class I (Schiff-base) aldolase of
  the TIM-barrel DapA/NanA family. It catalyzes the reversible cleavage of free
  N-acetylneuraminic acid (Neu5Ac, sialic acid) into pyruvate and
  N-acetyl-D-mannosamine (ManNAc) via a lysine Schiff-base intermediate, acting on
  the open (aldehydo) form of the substrate. NPL also degrades N-glycolylneuraminic
  acid (Neu5Gc); although humans lack functional CMAHP and cannot synthesize Neu5Gc,
  dietary Neu5Gc is catabolized by this route. As the entry point of intracellular
  sialic acid catabolism (amino-sugar/N-acetylneuraminate degradation pathway,
  UniPathway UPA00629), NPL controls the free intracellular sialic acid pool and
  prevents recycling of sialic acid back to the cell surface, thereby influencing the
  balance between sialic acid salvage and degradation. The active enzyme is a
  homotetramer. In vivo, NPL is essential for muscle sialoglycoprotein homeostasis and
  regeneration: loss-of-function variants cause a skeletal myopathy with elevated free
  sialic acid that is responsive to N-acetylmannosamine supplementation.
