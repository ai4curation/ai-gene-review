- id: PMID:33895133
  title: The metalloprotein YhcH is an anomerase providing N-acetylneuraminate aldolase
    with the open form of its substrate.
  findings:
  - statement: >-
      Purified recombinant human NPL cleaves Neu5Ac, and its activity is stimulated by
      the anomerases NanM and YhcH that supply the open (linear) form of the substrate;
      basis for the EC 4.1.3.3 catalytic-activity and IDA annotations.
    reference_section_type: RESULTS
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Full text cached. Although primarily about E. coli NanA/YhcH, it directly assays
      human NPL (~30% identity to NanA) and demonstrates its N-acetylneuraminate lyase
      activity; primary experimental support for NPL's core molecular function.
