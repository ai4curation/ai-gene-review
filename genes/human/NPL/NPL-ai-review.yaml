- id: PMID:37390204
  title: N-acetylneuraminate pyruvate lyase controls sialylation of muscle glycoproteins
    essential for muscle regeneration and function.
  findings:
  - statement: >-
      Deleterious NPL variants cause skeletal myopathy and cardiac edema (human and
      zebrafish); NPL loss raises free sialic acid and disrupts muscle glycoprotein
      sialylation, and oral N-acetylmannosamine rescues the myopathy in mouse models.
    reference_section_type: ABSTRACT
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: >-
