  label: Homo sapiens
description: >-
  ETNK2 (ethanolamine kinase 2, EC 2.7.1.82) is a cytosolic enzyme of the
  CDP-ethanolamine (Kennedy) branch of phosphatidylethanolamine (PE)
  biosynthesis. It catalyzes the first, committed step of this branch: the
  ATP-dependent phosphorylation of ethanolamine to phosphoethanolamine
  (ethanolamine + ATP = phosphoethanolamine + ADP + H+). ETNK2 is highly
  specific for ethanolamine and, unlike some family members, does not exhibit
  choline kinase activity. It belongs to the choline/ethanolamine kinase family.
  Compared with its paralog ETNK1, ETNK2 has a more restricted expression
  pattern, being enriched in kidney, liver, and reproductive tissues (ovary,
  testis, prostate). The phosphoethanolamine it produces is subsequently
  converted to CDP-ethanolamine and incorporated into phosphatidylethanolamine,
  a major membrane glycerophospholipid.
