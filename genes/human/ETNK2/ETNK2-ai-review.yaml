- term:
    id: GO:0005515
    label: protein binding
  evidence_type: IPI
  original_reference_id: PMID:32296183
  qualifier: enables
  review:
    summary: >-
      Bare "protein binding" from the HuRI systematic yeast two-hybrid binary
      interactome screen (Luck et al. 2020), assigned by IntAct. This single GOA
      row collapses six IPI interactions (with ATN1, CYSRT1, HNRNPK, KRTAP12-2,
      MID2, STX1A), all also listed in the UniProt INTERACTION block. These are
      high-throughput binary interactions with no established relationship to
      ETNK2's ethanolamine kinase function; several partners (e.g. the
      keratin-associated protein KRTAP12-2) are the kind of frequently recovered
      Y2H hits. GO:0005515 is uninformative for molecular function. Per policy for
      IPI protein-binding annotations, mark as over-annotated rather than remove.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      Uninformative bare protein-binding term from a high-throughput binary
      interactome screen; interactors have no known functional link to
      ethanolamine kinase activity.
