proposed_new_terms: []
suggested_questions:
- question: Do ALS-associated loss-of-function variants in DNAJC7 act primarily by
    impairing HSP70/HSP90 client recycling, and which neuronal client proteins (e.g.
    TDP-43) become destabilized as a result?
- question: Is the retrograde HSP90-to-HSP70 substrate transfer activity unique to
    DNAJC7 among human J proteins, or shared with other TPR-containing co-chaperones?
suggested_experiments:
- description: Reconstitute the HSP70/HSP90 chaperone cycle in vitro with wild-type
    versus ALS-mutant DNAJC7 and measure HSP70 ATPase stimulation, simultaneous HSP70/HSP90
    binding, and substrate handoff using a model client (GR or CHK1).
- description: CRISPR knockout of DNAJC7 in neurons followed by proteomics to identify
    destabilized clients and assess effects on TDP-43 solubility and HSF1-mediated
    stress responses.
