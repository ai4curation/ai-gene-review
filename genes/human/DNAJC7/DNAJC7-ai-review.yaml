id: Q99615
gene_symbol: DNAJC7
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: DNAJC7 (also called Tpr2 or TTC2) is a cytoplasmic co-chaperone of the
  DnaJ/Hsp40 (DNAJC) family that uniquely combines two tetratricopeptide-repeat (TPR)
  clusters with a C-terminal J domain. The TPR domains bind the molecular chaperones
  HSP70 and HSP90 simultaneously, while the J domain stimulates the ATPase activity
  and polypeptide binding of HSP70, allowing DNAJC7 to couple and regulate the HSP70
  and HSP90 chaperone machines. It acts as a "recycling" co-chaperone that mediates
  retrograde transfer of folding substrates from HSP90 back onto HSP70, optimizing
  the maturation of clients such as the glucocorticoid and progesterone steroid receptors
  and protein kinases (e.g. CHK1). It is predominantly cytoplasmic but also localizes
  to the nucleus and associates with the cytoskeleton/microtubules; it interacts with
  the 9-1-1 checkpoint clamp (RAD9A-HUS1-RAD1) and recruits the nuclear receptor NR1I3/CAR
  to the cytoplasm. Loss-of-function variants in DNAJC7 are a recognized cause of/risk
  factor for amyotrophic lateral sclerosis (ALS) with TDP-43 pathology.
