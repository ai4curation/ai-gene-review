id: P50747
gene_symbol: HLCS
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: Holocarboxylase synthetase (HLCS) is the human biotin--protein ligase
  that covalently attaches biotin to the biotin-dependent carboxylases, converting
  their inactive apo forms into active holoenzymes. It catalyses a two-step reaction,
  first activating biotin with ATP to form biotinyl-5'-AMP and then transferring biotin
  to a specific lysine within the biotin carboxyl carrier domain of each substrate.
  A single HLCS activates all of the human biotin-dependent carboxylases in both the
  cytosol and the mitochondria, including pyruvate carboxylase (PC), propionyl-CoA
  carboxylase (PCCA/PCCB), 3-methylcrotonyl-CoA carboxylase (MCCC1/MCCC2), and the
  acetyl-CoA carboxylases (ACACA and ACACB). Through these carboxylases it is essential
  for gluconeogenesis and anaplerosis, odd-chain fatty acid and propionate metabolism,
  leucine catabolism, and fatty acid synthesis. Loss-of-function variants cause holocarboxylase
  synthetase deficiency (neonatal/early-onset multiple carboxylase deficiency), an
  autosomal recessive, biotin-responsive disorder characterized by ketoacidosis, lactic
  acidosis, hyperammonemia, organic aciduria, and dermatological manifestations. HLCS
  has additionally been reported to enter the nucleus and biotinylate histones, a proposed
  chromatin/gene-regulatory role whose in vivo physiological significance remains debated.
