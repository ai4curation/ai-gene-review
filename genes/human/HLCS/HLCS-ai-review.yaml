core_functions:
- description: Biotin--protein ligase (holocarboxylase synthetase) that covalently
    attaches biotin to the biotin carboxyl carrier lysine of the biotin-dependent
    apocarboxylases (pyruvate carboxylase, propionyl-CoA carboxylase, 3-methylcrotonyl-CoA
    carboxylase, and the acetyl-CoA carboxylases ACACA/ACACB), activating them. A
    single HLCS acts in both the cytosol and the mitochondrion. Catalysis proceeds
    via ATP-dependent formation of biotinyl-5'-AMP followed by transfer of biotin
    to the acceptor lysine; biotin binding and ATP binding are integral to this activity.
  molecular_function:
    id: GO:0004077
    label: biotin--[biotin carboxyl-carrier protein] ligase activity
  supported_by:
  - reference_id: PMID:7753853
    supporting_text: Holocarboxylase synthetase (HCS) catalyzes the biotinylation
      of the four biotin-dependent carboxylases in human cells.
  - reference_id: PMID:7753853
    supporting_text: a single HCS is targeted to the mitochondria and cytoplasm
  directly_involved_in:
  - id: GO:0043687
    label: post-translational protein modification
  - id: GO:0006768
    label: biotin metabolic process
  locations:
  - id: GO:0005829
    label: cytosol
  - id: GO:0005739
    label: mitochondrion
