id: O43301
gene_symbol: HSPA12A
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: Atypical and still poorly characterized HSP70-family protein. The
  strongest direct mechanistic evidence supports ATP/ADP-sensitive binding to the
  cytosolic tail of SORL1/SorLA and modulation of SorLA trafficking, while later
  disease- and tissue-specific studies suggest context-dependent signaling or
  scaffold-like roles rather than a conserved GO-ready core activity. Despite PN
  placement in the HSP70 system based on family/domain context, current evidence
  supports only a narrow SorLA/SORL1-selective adaptor-like trafficking role and
  does not establish canonical ATP-dependent protein folding chaperone activity or
  another broad core proteostasis function for HSPA12A.
existing_annotations:
- term:
    id: GO:0005515
    label: protein binding
  evidence_type: IPI
  original_reference_id: PMID:30679749
  review:
    summary: MODIFY. PMID:30679749 demonstrates a specific, ATP/ADP-sensitive
      interaction between HSPA12A and the cytosolic tail of SORL1/SorLA together
      with delayed receptor internalization, so GO:0005515 should be replaced by
      more informative terms capturing receptor-tail binding and trafficking
      control.
    action: MODIFY
    reason: GO:0005515 is too generic for this evidence. The paper supports a
      selective SorLA cytoplasmic-domain interaction with a clear trafficking
      consequence, but it does not justify canonical HSP70 chaperone activity.
      I am using the conservative existing terms GO:0019904 and GO:0002091 here;
      the more specific missing function is captured below as a proposed new
      receptor-tail binding term rather than overcalling HSPA12A as a canonical
      cargo adaptor.
    proposed_replacement_terms:
    - id: GO:0019904
      label: protein domain specific binding
    - id: GO:0002091
      label: negative regulation of receptor internalization
    supported_by:
    - reference_id: PMID:30679749
      supporting_text: We have identified HSPA12A as a new adaptor protein that,
        among Vps10p-D receptors, selectively binds to SorLA in an ADP/ATP
        dependent manner.
    - reference_id: PMID:30679749
      supporting_text: We also observed that the endocytic capacity of SorLA was
        lowered by HSPA12A expression.
    - reference_id: file:human/HSPA12A/HSPA12A-uniprot.txt
      supporting_text: Adapter protein for SORL1, but not SORT1. Delays SORL1
        internalization and affects SORL1 subcellular localization.
