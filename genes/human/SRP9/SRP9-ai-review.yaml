suggested_questions:
- question: How strictly required is SRP9/SRP14-mediated elongation arrest for productive ER targeting in mammalian cells, given that some substrates may be targeted without efficient arrest?
- question: Do the Alu-RNA-binding activities of SRP9/SRP14 toward Alu-derived transcripts (scAlu/scB1) have any regulatory role distinct from canonical SRP function?
suggested_experiments:
- description: Reconstitute SRP with wild-type versus RNA-binding-deficient SRP9 to quantify the contribution of the SRP9/SRP14 Alu domain to elongation arrest and targeting efficiency on defined nascent-chain substrates.
- description: Use selective ribosome profiling in cells depleted of SRP9 to measure genome-wide effects on co-translational ER targeting and elongation pausing of signal-sequence-bearing mRNAs.
