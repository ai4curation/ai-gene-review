- id: PMID:26585389
  title: Retrotransposition and Crystal Structure of an Alu RNP in the Ribosome-Stalling Conformation.
  findings:
  - statement: 2.0 A crystal structure of the human Alu RNP (SRP9/14 bound to Alu RNA) in the ribosome-stalling conformation; SRP9/14 clamps the Alu RNA and docks at the ribosomal elongation-factor binding site, and mutations weakening the SRP9/14-RNA interface abolish Alu retrotransposition.
    reference_section_type: ABSTRACT
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: PubMed-verified (Ahl et al., Mol Cell 2015, PDB 5AOX). Structural basis of the SRP9/14 Alu-domain RNA clamp and its ribosome-stalling geometry; also links SRP9/14 to Alu retrotransposition.
- id: PMID:37156570
  title: Nuclear SRP9/SRP14 heterodimer transcriptionally regulates 7SL and BC200 RNA expression.
  findings:
  - statement: SRP9/14 localizes substantially in the nucleus; siRNA knockdown selectively reduces the Alu-like Pol III transcripts 7SL (RN7SL1) and BC200 (BCYRN1) by decreasing Pol III occupancy at these loci rather than altering RNA stability, defining a noncanonical nuclear transcriptional role for SRP9/14.
    reference_section_type: ABSTRACT
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: PubMed-verified (Gussakovsky et al., RNA 2023). Noncanonical nuclear role of the SRP9/14 heterodimer; not the core SRP/elongation-arrest function.
- id: PMID:37309897
  title: Alu RNA fold links splicing with signal recognition particle proteins.
  findings:
  - statement: SRP9/14 binds compact (closed) Alu RNA conformations and modulates inclusion of Alu-derived exons, with RNA structure (closed vs open Alu fold) predicting exon inclusion; demonstrates a noncanonical SRP9/14 role in pre-mRNA splicing regulation.
    reference_section_type: ABSTRACT
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: PubMed-verified (Borovska et al., Nucleic Acids Res 2023). Noncanonical Alu-exon splicing-regulation role of SRP9/14; distinct from the core SRP function.
- id: PMID:38858088
  title: The nucleolar phase of signal recognition particle assembly.
  findings:
  - statement: SRP proteins (including SRP9/14) associate with many nucleolar and ribosome-biogenesis factors; GFP-SRP9 appears mostly nuclear with faint cytoplasmic staining, and nucleolar integrity is required for proper SRP protein localization, supporting a nucleolar phase of SRP assembly.
    reference_section_type: ABSTRACT
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: PubMed-verified (Issa et al., Life Sci Alliance 2024). Supports a nucleolar SRP-assembly compartment and nuclear localization of SRP9 during biogenesis.
- id: PMID:39563162
  title: The role of SRP9/SRP14 in regulating Alu RNA.
  findings:
  - statement: Reviews SRP9/14 regulation of Alu-family RNAs (maturation, trafficking, splicing, retrotransposition, transcription); primate SRP9/14 is present at ~20-fold molar excess over assembled SRP and binds 7SL with sub-nanomolar affinity, enabling extensive extra-canonical Alu-RNA regulation.
    reference_section_type: OTHER
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: PubMed-verified (Gussakovsky et al., RNA Biol 2024). Synthesis of canonical and noncanonical SRP9/14 functions.
- id: PMID:38847231
  title: 'Significance of signal recognition particle 9 nuclear translocation: implications for pancreatic cancer prognosis and functionality.'
  findings:
  - statement: In resected pancreatic cancer, higher SRP9 nuclear staining is associated with improved recurrence-free survival; SRP9 nuclear translocation is modulated by amino-acid/nutrient status.
    reference_section_type: ABSTRACT
  reference_review:
    relevance: LOW
    correctness: VERIFIED
    review_notes: PubMed-verified (Sato et al., Int J Oncol 2024). Biomarker/association-level finding; not core SRP9 molecular function.
