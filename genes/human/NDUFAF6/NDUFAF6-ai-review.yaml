  title: Mutations in the gene encoding C8orf38 block complex I assembly by inhibiting
    production of the mitochondria-encoded subunit ND1.
  findings:
  - statement: >-
      A C8orf38/NDUFAF6 mutation causes near-absent steady-state complex I and
      defective biogenesis of the mtDNA-encoded ND1 subunit; wild-type C8orf38
      complementation restores both, establishing NDUFAF6 as an early-stage
      complex I assembly factor required for ND1 biogenesis.
    reference_section_type: ABSTRACT
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Abstract-only in cache (full_text_available: false). PubMed-verified; the
      abstract directly supports the IMP complex I assembly annotation and the
      ND1-specific mechanism. Basis of the IDA inner-membrane and IMP assembly
      GOA annotations.
