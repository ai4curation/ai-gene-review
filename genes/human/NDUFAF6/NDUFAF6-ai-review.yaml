      Identified C8orf38 (NDUFAF6) as a complex I assembly factor via a
      mitochondrial protein compendium and a complex-I-deficiency patient variant;
      one of the two references underlying the UniProt FUNCTION statement.
    reference_section_type: ABSTRACT
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Cited by the UniProt FUNCTION line together with PMID:22019594; establishes
      the assembly-factor role and disease link.
