- term:
    id: GO:0032981
    label: mitochondrial respiratory chain complex I assembly
  evidence_type: IMP
  original_reference_id: PMID:22019594
  qualifier: involved_in
  review:
    summary: >-
      Direct experimental (IMP) evidence for the core function. Patient
      fibroblasts carrying a C8orf38/NDUFAF6 mutation show almost undetectable
      steady-state complex I and defective biogenesis of the mtDNA-encoded ND1
      subunit; complementation with wild-type C8orf38 restores both ND1 and
      complex I. This establishes NDUFAF6 as an early-stage complex I assembly
      factor required for ND1 biogenesis, and is the primary, best-supported
      annotation for the gene.
    action: ACCEPT
    supported_by:
    - reference_id: PMID:22019594
      supporting_text: >-
        almost undetectable levels of steady-state complex I and defective
        biogenesis of the mtDNA-encoded subunit ND1
