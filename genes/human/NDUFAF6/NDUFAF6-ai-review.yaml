gene_symbol: NDUFAF6
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  NDUFAF6 (C8orf38) is a nuclear-encoded mitochondrial assembly factor for
  respiratory chain complex I (NADH:ubiquinone oxidoreductase). The functional
  isoform (isoform 1) carries an N-terminal mitochondrial transit peptide and is
  imported into mitochondria, where it localizes peripherally on the matrix face
  of the inner membrane. It acts at early stages of complex I assembly and is
  specifically required for biogenesis of the mitochondrially encoded ND1
  (MT-ND1) subunit, participating in formation/stabilization of the ND1-containing
  assembly intermediate; loss of NDUFAF6 blocks maturation of late-stage assembly
  intermediates and leads to a profound decrease in steady-state complex I.
  Structurally the protein retains an isoprenoid/squalene-phytoene-synthase-like
  (terpenoid synthase) fold, and although named a "putative phytoene synthase" no
  catalytic activity has been demonstrated; it is not a structural subunit of the
  holoenzyme. A shorter splice isoform (isoform 2) lacks the transit peptide and
  is cytoplasmic/nuclear. Biallelic NDUFAF6 variants cause mitochondrial complex I
  deficiency nuclear type 17 (including Leigh syndrome and bilateral striatal
  necrosis) and, via a non-coding intronic variant, the Acadian variant of Fanconi
  renotubular syndrome (FRTS5).
