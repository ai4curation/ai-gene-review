  - statement: >-
      First molecular case of hydroxykynureninuria: a homozygous KYNU T198A variant
      with reduced kynureninase activity and massive urinary kynurenine-pathway
      metabolites.
    reference_section_type: ABSTRACT
    supporting_text: >-
      Massive urinary excretion of xanthurenic acid, 3-hydroxykynurenine and
      kynurenine
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified; links KYNU deficiency to hydroxykynureninuria (HYXKY).
      Abstract-only in cache.
- id: PMID:1939450
  title: High-performance liquid chromatographic assay of human lymphocyte kynureninase
    activity levels.
  findings:
  - statement: >-
      Human lymphocyte kynureninase activity is depressed in vitamin-B6-deficient
      men relative to B6-replete men, reflecting PLP cofactor dependence.
    reference_section_type: ABSTRACT
    supporting_text: >-
      lymphocyte kynureninase activity is depressed during a vitamin B6
      deficiency
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified; supports the vitamin-B6 (PLP) dependence of kynureninase
      activity (basis for the response-to-vitamin-B6 annotation). Abstract-only.
- id: PMID:28792876
  title: NAD Deficiency, Congenital Malformations, and Niacin Supplementation.
  findings:
  - statement: >-
      Biallelic loss-of-function KYNU (and HAAO) variants disrupt de novo NAD
      synthesis, causing reduced circulating NAD and a congenital malformation
      syndrome (VCRL2); niacin supplementation prevents defects in mice.
    reference_section_type: ABSTRACT
    supporting_text: >-
      The patients had reduced levels of circulating NAD.
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified; establishes the NAD-deficiency/VCRL2 disease mechanism and
      in-vitro activity of mutant KYNU. Abstract-only in cache.
- id: PMID:6468727
  title: Intracellular localization and characterization of 3-hydroxykynureninase
    in human liver.
  findings:
  - statement: >-
      3-hydroxykynureninase in human liver was found in both cytosol and
      mitochondria with identical properties; active on 3-hydroxykynurenine and
      kynurenine (~15:1) and PLP-dependent.
    reference_section_type: ABSTRACT
    supporting_text: >-
      3-hydroxykynureninase in human liver was present in cytosol and
      mitochondria.
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified; early biochemical localization/characterization of the human
      liver enzyme. Basis for both cytosol and mitochondrion IDA annotations.
      Abstract-only.
- id: PMID:8706755
  title: Isolation and expression of a cDNA clone encoding human kynureninase.
  findings:
  - statement: >-
      Cloning and expression of human kynureninase, a PLP-dependent enzyme that
      cleaves L-kynurenine and L-3-hydroxykynurenine; Lys276 binds the cofactor.
    reference_section_type: ABSTRACT
    supporting_text: >-
      catalyses the cleavage of L-kynurenine and L-3-hydroxykynurenine into
      anthranilic and 3-hydroxyanthranilic acids
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified; primary cloning and functional expression of human
      kynureninase establishing the catalytic activity and PLP dependence.
      Abstract-only.
- id: PMID:9180257
  title: Cloning and recombinant expression of rat and human kynureninase.
  findings:
  - statement: >-
      Cloning and recombinant expression of human (and rat) kynureninase with
      measured Km values; kynureninase acts in NAD cofactor biosynthesis from
      tryptophan.
    reference_section_type: ABSTRACT
    supporting_text: >-
      A cDNA encoding human liver kynureninase was also isolated.
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified; independent cloning/kinetic characterization of human
      kynureninase. Abstract-only in cache.
- id: PMID:9291104
  title: Different kynurenine pathway enzymes limit quinolinic acid formation by various
    human cell types.
  findings:
  - statement: >-
      Kynureninase activity (with kynurenine 3-hydroxylase and 3-HAO) is a cell-type
      determinant of quinolinate production, and is high in interferon-gamma-stimulated
      cells.
    reference_section_type: ABSTRACT
    supporting_text: >-
      Kynurenine 3-hydroxylase and, in some cells, kynureninase and
      3-hydroxyanthranilate 3,4-dioxygenase are important determinants of whether a
      cell can make quinolinate.
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified; supports the quinolinate-biosynthesis and IFN-gamma-response
      annotations. Abstract-only in cache.
