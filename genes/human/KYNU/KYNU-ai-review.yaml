id: Q16719
gene_symbol: KYNU
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  KYNU is kynureninase (L-kynurenine hydrolase, EC 3.7.1.3), a cytosolic,
  pyridoxal-5'-phosphate (PLP)-dependent enzyme of the kynurenine pathway of
  L-tryptophan catabolism. It is a homodimer belonging to the aspartate
  aminotransferase (fold-type I / alpha) superfamily of PLP-dependent enzymes,
  with PLP bound as an internal Schiff base to an active-site lysine (Lys276).
  Kynureninase hydrolytically cleaves 3-hydroxy-L-kynurenine to
  3-hydroxyanthranilate and L-alanine, and L-kynurenine to anthranilate and
  L-alanine. The human (mammalian "constitutive") enzyme strongly prefers the
  3-hydroxy substrate over L-kynurenine, in contrast to the "inducible"
  prokaryotic kynureninases that prefer L-kynurenine. Its reaction commits
  tryptophan-derived carbon to quinolinate and thence to de novo biosynthesis of
  NAD(+); kynureninase is one of the cell-type-specific determinants of
  quinolinate production, and its expression is increased by interferon-gamma and
  in inflammatory states. Because the enzyme requires PLP, its activity depends on
  vitamin B6 status. Loss-of-function KYNU variants cause two recessive
  disorders: hydroxykynureninuria (urinary excretion of kynurenine,
  3-hydroxykynurenine and xanthurenic acid) and a congenital NAD-deficiency
  malformation syndrome with vertebral, cardiac, renal and limb defects.
