- id: PMID:14718166
  title: Histone H3.1 and H3.3 complexes mediate nucleosome assembly pathways dependent
    or independent of DNA synthesis.
  findings:
  - statement: >-
      The H3.1 deposition machinery is the CAF-1 histone chaperone, which mediates
      DNA-synthesis-dependent (replication-coupled) nucleosome assembly.
    supporting_text: >-
      The H3.1 and H3.3 complexes contain distinct histone chaperones, CAF-1 and
      HIRA, that we show are necessary to mediate DNA-synthesis-dependent and
      -independent nucleosome assembly, respectively.
    reference_section_type: ABSTRACT
    full_text_unavailable: true
- id: PMID:16780588
  title: Cell array-based intracellular localization screening reveals novel functional
    features of human chromosome 21 proteins.
  findings:
  - statement: >-
      CHAF1B is nuclear at interphase (chromatin assembly / DNA replication) and
      translocates to the cytoplasm during cell division.
    supporting_text: >-
      The chromatin assembly factor I p60 subunit (CHAF1B) protein translocated from
      the nucleus into the cytoplasm during cell division.
    reference_section_type: RESULTS
- id: PMID:16980972
  title: Structure of a human ASF1a-HIRA complex and insights into specificity of
    histone chaperone complex assembly.
  findings:
  - statement: >-
      CAF-1 p60 (CHAF1B) uses B-domain-like motifs to bind ASF1a, competing with
      HIRA for the same surface.
    supporting_text: >-
      CAF-1 p60 also uses B domain-like motifs for binding to ASF1a, thereby
      competing with HIRA.
    reference_section_type: ABSTRACT
