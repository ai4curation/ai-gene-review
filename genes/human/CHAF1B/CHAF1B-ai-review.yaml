id: Q13112
gene_symbol: CHAF1B
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  CHAF1B (p60, CAF-1 subunit B) is the WD40-repeat medium subunit of Chromatin
  Assembly Factor 1 (CAF-1), a heterotrimeric histone H3-H4 chaperone composed of
  CHAF1A (p150), CHAF1B (p60), and RBBP4 (p48). Within CAF-1, p60 bridges the large
  subunit CHAF1A and the histone-binding subunit RBBP4, and the direct p150-p60
  interaction is required for CAF-1-mediated nucleosome assembly. CAF-1 performs the
  first step of nucleosome assembly by depositing newly synthesized histones H3.1-H4
  onto DNA in a replication-coupled (DNA-synthesis-dependent) manner, and it is also
  recruited to chromatin undergoing DNA repair. CHAF1B is built from an N-terminal
  seven-bladed WD40 beta-propeller and a C-terminal disordered region that is heavily
  phosphorylated in a cell-cycle-dependent fashion. The active complex resides in the
  nucleus, where it concentrates at DNA replication foci during S phase; during mitosis
  the p60 subunit is hyperphosphorylated, CAF-1 is inactivated, and p60 is displaced
  into the cytoplasm. The gene maps to chromosome 21q22.
