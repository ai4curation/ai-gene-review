core_functions:
- description: >-
    CHAF1B is the WD40 medium subunit (p60) of the CAF-1 histone H3-H4 chaperone,
    binding newly synthesized histones H3.1-H4 and acting as a histone chaperone
    within the complex.
  molecular_function:
    id: GO:0140713
    label: histone chaperone activity
  supported_by:
  - reference_id: PMID:7600578
    supporting_text: >-
      p150 and p60 form complexes with newly synthesized histones H3 and acetylated
      H4 in human cell extracts.
    full_text_unavailable: true
    reference_section_type: ABSTRACT
- description: >-
    As a subunit of CAF-1, CHAF1B mediates the first step of nucleosome assembly,
    depositing newly synthesized H3.1-H4 onto DNA in a replication- and
    repair-coupled manner.
  directly_involved_in:
  - id: GO:0006335
    label: DNA replication-dependent chromatin assembly
  in_complex:
    id: GO:0033186
    label: CAF-1 complex
  locations:
  - id: GO:0005634
    label: nucleus
  - id: GO:0000785
    label: chromatin
  supported_by:
  - reference_id: PMID:8858152
    supporting_text: >-
      a chromatin assembly complex (CAC), which contains the three subunits of
      CAF-1 (p150, p60, p48) and H3 and H4, and promotes DNA replication-dependent
      chromatin assembly.
    full_text_unavailable: true
    reference_section_type: ABSTRACT
- description: >-
    CHAF1B bridges the large subunit CHAF1A (p150) and the histone-binding subunit
    RBBP4 (p48); the direct CHAF1A-CHAF1B interaction is required for CAF-1-mediated
    nucleosome assembly.
  molecular_function:
    id: GO:0042393
    label: histone binding
  supported_by:
  - reference_id: PMID:7600578
    supporting_text: >-
      p150 and p60 directly interact and are both required for DNA
      replication-dependent assembly of nucleosomes. Deletion of the p60-binding
      domain from the p150 protein prevents chromatin assembly.
    full_text_unavailable: true
    reference_section_type: ABSTRACT
proposed_new_terms:
- term_label: histone chaperone activity
  proposed_term_id: GO:0140713
  reason: >-
    CHAF1B is a subunit of the CAF-1 histone H3-H4 chaperone and directly binds
    newly synthesized histones H3-H4 (and H3.1/H3.2/H3.1t). The molecular function
    of the complex is histone chaperone activity, which is not currently captured
    in the CHAF1B GOA and would be more informative than the existing bare protein
    binding annotations.
  supported_by:
  - reference_id: file:human/CHAF1B/CHAF1B-uniprot.txt
    supporting_text: >-
      Acts as a component of the histone chaperone complex chromatin assembly
      factor 1 (CAF-1), which assembles histone octamers onto DNA during
      replication and repair.
suggested_questions:
- question: >-
    Is CHAF1B's histone-chaperone activity exerted only as part of the CAF-1
    complex, or does the isolated p60 subunit have an autonomous histone-binding /
    chaperone role that warrants a gene-level molecular-function annotation?
  experts:
  - Kaufman PD
  - Almouzni G
- question: >-
    Does cell-cycle-dependent phosphorylation of the C-terminal disordered region
    of CHAF1B directly regulate CAF-1 assembly activity and its nuclear-cytoplasmic
    partitioning?
  experts:
  - Marheineke K
  - Krude T
suggested_experiments:
- hypothesis: >-
    CHAF1B is required for replication-coupled H3.1-H4 deposition and its loss
    impairs nucleosome assembly genome-wide during S phase.
  description: >-
    Acute degradation (e.g., auxin-inducible degron) of CHAF1B in human cells
    followed by SCAR-seq / nascent-chromatin capture to measure replication-coupled
    new-histone deposition and parental-histone recycling.
  experiment_type: replication-coupled nucleosome assembly assay
- hypothesis: >-
    Mitotic hyperphosphorylation of the CHAF1B C-terminal tail inactivates CAF-1 and
    drives its cytoplasmic relocalization.
  description: >-
    Generate phospho-null and phospho-mimetic mutants of the mapped CHAF1B
    phosphosites and assay CAF-1 nucleosome assembly activity, complex integrity,
    and subcellular localization across the cell cycle.
  experiment_type: phosphomutant functional and localization assay
