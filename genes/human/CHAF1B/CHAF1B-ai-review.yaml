- id: PMID:7600578
  title: 'The p150 and p60 subunits of chromatin assembly factor I: a molecular link
    between newly synthesized histones and DNA replication.'
  findings:
  - statement: >-
      p150 and p60 directly interact and are both required for replication-dependent
      nucleosome assembly; they form complexes with newly synthesized H3 and
      acetylated H4.
    supporting_text: >-
      p150 and p60 directly interact and are both required for DNA
      replication-dependent assembly of nucleosomes.
    reference_section_type: ABSTRACT
    full_text_unavailable: true
- id: PMID:8858152
  title: Nucleosome assembly by a complex of CAF-1 and acetylated histones H3/H4.
  findings:
  - statement: >-
      The chromatin assembly complex contains the three CAF-1 subunits (p150, p60,
      p48) plus H3 and H4 and promotes DNA replication-dependent chromatin assembly.
    supporting_text: >-
      a chromatin assembly complex (CAC), which contains the three subunits of CAF-1
      (p150, p60, p48) and H3 and H4, and promotes DNA replication-dependent
      chromatin assembly.
    reference_section_type: ABSTRACT
    full_text_unavailable: true
- id: PMID:9614144
  title: Nucleosome assembly activity and intracellular localization of human CAF-1
    changes during the cell division cycle.
  findings:
  - statement: >-
      All three CAF-1 subunits (p150, p60, p48) are present through the cell cycle;
      p150/p60 are nuclear and concentrate at replication sites in S phase, and p60
      is hyperphosphorylated and inactive in mitosis.
    supporting_text: >-
      In interphase, p150 and p60 are bound to the nucleus, but they predominantly
      dissociate from chromatin during mitosis. During S phase, p150 and p60 are
      concentrated at sites of intranuclear DNA replication.
    reference_section_type: ABSTRACT
    full_text_unavailable: true
- id: file:human/CHAF1B/CHAF1B-uniprot.txt
  title: UniProt entry Q13112 (CAF1B_HUMAN)
  findings:
  - statement: >-
      CHAF1B is a component of the CAF-1 histone chaperone complex (RBBP4, CHAF1B,
      CHAF1A); CHAF1A binds directly to CHAF1B; interacts with histones H3.1, H3.2,
      H3.1t.
    supporting_text: >-
      Subunit of the CAF-1 complex that contains RBBP4, CHAF1B and CHAF1A. CHAF1A
      binds directly to CHAF1B.
    reference_section_type: OTHER
