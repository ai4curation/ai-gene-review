id: P51570
gene_symbol: GALK1
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  GALK1 is the human galactokinase, a cytosolic ATP-dependent enzyme (EC 2.7.1.6)
  that catalyzes the phosphorylation of alpha-D-galactose to alpha-D-galactose
  1-phosphate, consuming ATP and producing ADP. This is the first committed,
  phosphorylation step of galactose catabolism in the Leloir pathway, which
  ultimately converts dietary galactose into glucose 1-phosphate for entry into
  glycolysis. The enzyme uses an ordered ternary-complex kinetic mechanism in
  which ATP binds first, followed by galactose, and it displays strict specificity
  for the galactose configuration at carbons 4 and 6 of the sugar ring (D-galactose
  and 2-deoxy-D-galactose are substrates, whereas D-glucose, D-fucose, L-arabinose
  and N-acetyl-D-galactosamine are not). GALK1 is a member of the GHMP kinase
  superfamily (GalK subfamily) and functions as a homodimer. Loss-of-function
  variants cause autosomal recessive galactokinase deficiency (galactosemia type II,
  GALAC2), whose principal manifestation is early-onset cataracts resulting from
  accumulation of the galactose-derived polyol galactitol in the lens.
