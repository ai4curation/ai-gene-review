- term:
    id: GO:0005576
    label: extracellular region
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: is_active_in
  review:
    summary: >-
      IBA placing the enzyme in the extracellular region. HEXB is a lysosomal
      hydrolase that also traffics through secretory routes; a minor secreted pool
      exists (secreted precursor complexes, exosomes, neutrophil granule release),
      but the extracellular region is not where the enzyme predominantly acts.
    action: KEEP_AS_NON_CORE
    reason: >-
      A genuine minor secreted/extracellular pool is documented (secreted precursor
      alpha-beta complexes; exosome and neutrophil-granule proteomics), so this is
      not wrong, but it is peripheral to the core lysosomal catabolic function.
    supported_by:
    - reference_id: PMID:6230359
      supporting_text: >-
        Precursor alpha beta
        complexes were secreted, along with some precursor alpha monomers
