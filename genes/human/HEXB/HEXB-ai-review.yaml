- term:
    id: GO:0008375
    label: acetylglucosaminyltransferase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000117
  qualifier: enables
  review:
    summary: >-
      ARBA-predicted glycosyltransferase activity. HEXB is a GH20 exo-glycosidase
      (a hydrolase, EC 3.2.1.52), not a glycosyltransferase; the paucimannose
      generation described for the enzyme is N-glycan trimming (hydrolysis), not
      sugar transfer.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      Transferase activity is inconsistent with the well-established hydrolase
      mechanism and fold; this is a mis-typing of the glycosidase activity. Per
      curation policy the paired experimental IDA is retained but flagged rather
      than removed.
    supported_by:
    - reference_id: PMID:25645918
      supporting_text: >-
        azurophilic granule-resident
        β-hexosaminidase A displayed the capacity to generate paucimannosidic N-glycans
        by trimming hybrid/complex type N-glycan intermediates
