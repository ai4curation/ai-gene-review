- term:
    id: GO:0008375
    label: acetylglucosaminyltransferase activity
  evidence_type: IDA
  original_reference_id: PMID:25645918
  qualifier: enables
  review:
    summary: >-
      IDA from the neutrophil paucimannosidic-protein study. The described activity
      is N-glycan trimming (hydrolysis) generating paucimannose, i.e. glycosidase
      (hydrolase) activity, not a glycosyltransferase reaction. The transferase
      term mis-types the enzyme's exo-glycosidase mechanism.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      HEXB is a GH20 hydrolase (EC 3.2.1.52); transferase activity contradicts the
      established mechanism/fold. Per policy the experimental annotation is flagged
      as over-annotation rather than removed; the correct MF is GO:0004563.
    supported_by:
    - reference_id: PMID:25645918
      supporting_text: >-
        azurophilic granule-resident
        β-hexosaminidase A displayed the capacity to generate paucimannosidic N-glycans
        by trimming hybrid/complex type N-glycan intermediates
