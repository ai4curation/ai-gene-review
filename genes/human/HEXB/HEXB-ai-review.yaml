    label: beta-N-acetylhexosaminidase activity
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: enables
  review:
    summary: >-
      Core molecular function. beta-N-acetylhexosaminidase activity (EC 3.2.1.52)
      is the defining enzymatic activity of the beta subunit, directly supported
      by biochemical characterization of Hex B and Hex A and consistent across the
      GH20 phylogenetic clade.
    action: ACCEPT
    reason: >-
      The IBA at the exact right level of specificity matches multiple experimental
      annotations (IDA/EXP) on the same term. The catalytic activity is
      well-established biochemically and by active-site mutagenesis.
    supported_by:
    - reference_id: PMID:11707436
      supporting_text: >-
        Human lysosomal beta-hexosaminidases remove terminal beta-glycosidically bound
        N-acetylhexosamine residues from a number of glycoconjugates
    - reference_id: file:human/HEXB/HEXB-uniprot.txt
