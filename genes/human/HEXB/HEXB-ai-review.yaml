id: P07686
gene_symbol: HEXB
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  HEXB encodes the beta subunit of lysosomal beta-hexosaminidase, a glycoside
  hydrolase family 20 (GH20) exo-glycosidase. The beta subunit is shared by two
  isozymes: hexosaminidase A, an alpha-beta heterodimer of HEXA and HEXB, and
  hexosaminidase B, a beta-beta homodimer of HEXB alone (a third labile isozyme,
  hexosaminidase S, is the HEXA alpha-alpha homodimer). The enzyme hydrolyses
  terminal non-reducing N-acetyl-beta-D-hexosamine (beta-GalNAc/GlcNAc) residues
  (EC 3.2.1.52) from a range of glycoconjugates, including gangliosides (GM2 and
  GA2), glycosaminoglycans (dermatan sulfate, keratan sulfate and hyaluronan
  fragments), neutral oligosaccharides and glycoproteins. Each subunit contributes
  a distinct active site: the beta-active site (present in both Hex A and Hex B)
  hydrolyses neutral substrates efficiently, whereas the alpha-active site
  additionally cleaves sulfated/negatively charged substrates; only Hex A together
  with the GM2 activator protein degrades GM2 ganglioside at physiologically
  significant rates. The mature enzyme resides in the lysosome / lysosomal lumen.
  Loss of the beta subunit disables both Hex A and Hex B and causes Sandhoff
  disease (GM2 gangliosidosis type 2), an autosomal recessive lysosomal storage
  disorder marked by neuronal GM2 ganglioside accumulation and progressive
  neurodegeneration.
