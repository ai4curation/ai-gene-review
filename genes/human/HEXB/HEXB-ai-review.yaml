core_functions:
- description: >-
    Lysosomal beta-N-acetylhexosaminidase (EC 3.2.1.52): hydrolyses terminal
    non-reducing N-acetyl-beta-D-hexosamine residues from glycoconjugates. The
    beta subunit provides a catalytic active site (with beta-Glu355 as the general
    acid/base) in both Hex A (alpha-beta) and Hex B (beta-beta).
  molecular_function:
    id: GO:0004563
    label: beta-N-acetylhexosaminidase activity
  supported_by:
  - reference_id: PMID:11329289
    supporting_text: >-
      the general acid/base catalytic residue (Glu 314 in chitobiase and β Glu 355 in human β -hexosaminidase)
  - reference_id: file:human/HEXB/HEXB-uniprot.txt
    supporting_text: "Hydrolyzes the non-reducing end N-acetyl-D-hexosamine"
- description: >-
    As part of Hex A (with HEXA and the GM2 activator protein), the beta subunit
    is required for degradation of GM2 ganglioside; loss of the beta subunit
    causes ganglioside storage (Sandhoff disease).
  molecular_function:
    id: GO:0004563
    label: beta-N-acetylhexosaminidase activity
  directly_involved_in:
  - id: GO:0006689
    label: ganglioside catabolic process
  in_complex:
    id: GO:1905379
    label: beta-N-acetylhexosaminidase complex
  locations:
  - id: GO:0043202
    label: lysosomal lumen
  supported_by:
  - reference_id: PMID:8672428
    supporting_text: >-
      Heterodimeric hexosaminidase A (alpha beta) is the only isozyme
      that can hydrolyze GM2 ganglioside in vivo, requiring the presence of the GM2
      activator protein
  - reference_id: PMID:8123671
    supporting_text: >-
