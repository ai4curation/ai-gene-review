- term:
    id: GO:0016787
    label: hydrolase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: >-
      Fold-based InterPro inference; ACMSD is mechanistically a decarboxylase (lyase), not a
      hydrolase. Modify to the correct carboxy-lyase parent.
    action: MODIFY
    reason: >-
      This IEA derives from the amidohydrolase-related domain (InterPro IPR006680) that defines the
      metallo-dependent hydrolase superfamily fold, not from the catalyzed reaction. ACMSD catalyzes
      a decarboxylation (EC 4.1.1.45, a lyase reaction), releasing CO2, and does not hydrolyze a
      bond. The zinc ion serves the decarboxylation chemistry. The correct general activity term is
      carboxy-lyase activity.
    proposed_replacement_terms:
    - id: GO:0016831
      label: carboxy-lyase activity
    supported_by:
    - reference_id: file:human/ACMSD/ACMSD-uniprot.txt
      supporting_text: >-
        aminomuconate 6-semialdehyde + CO2
- term:
    id: GO:0016831
    label: carboxy-lyase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: >-
      Correct general activity class (parent of the specific decarboxylase MF); redundant with the
      specific term.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      Carboxy-lyase activity is a correct but general parent of the specific and better-supported
      aminocarboxymuconate-semialdehyde decarboxylase activity (GO:0001760). It is not wrong, but is
      subsumed by the specific term and adds no information, so it is flagged as over-annotated
      rather than retained as core.
