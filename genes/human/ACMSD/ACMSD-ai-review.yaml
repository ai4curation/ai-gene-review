    2-amino-3-carboxymuconate-6-semialdehyde (ACMS) to 2-aminomuconate-6-semialdehyde plus CO2 (EC
    4.1.1.45), the committed branch-point reaction of tryptophan catabolism. By consuming ACMS, ACMSD
    diverts flux away from the spontaneous cyclisation of ACMS to quinolinate, thereby negatively
    regulating quinolinate biosynthesis and de novo NAD+ synthesis and directing the carbon skeleton
    toward complete oxidation.
