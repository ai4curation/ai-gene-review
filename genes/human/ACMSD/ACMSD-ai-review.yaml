id: Q8TDX5
gene_symbol: ACMSD
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  ACMSD encodes 2-amino-3-carboxymuconate-6-semialdehyde decarboxylase (also known as
  alpha-amino-beta-carboxymuconate-epsilon-semialdehyde decarboxylase or picolinate carboxylase;
  EC 4.1.1.45), a zinc-dependent enzyme of the amidohydrolase (metallo-dependent hydrolase)
  superfamily that sits at the key branch point of the kynurenine pathway of tryptophan catabolism.
  It decarboxylates the unstable intermediate 2-amino-3-carboxymuconate-6-semialdehyde (ACMS) to
  2-aminomuconate-6-semialdehyde (AMS), releasing CO2. By consuming ACMS enzymatically, ACMSD
  diverts flux away from the spontaneous cyclisation of ACMS to quinolinate - and thus away from de
  novo NAD+ biosynthesis and from picolinate formation - and toward complete oxidation of the carbon
  skeleton via 2-aminomuconate to acetyl-CoA and the citric acid cycle. ACMSD activity therefore
  sets the balance between NAD+ synthesis, picolinic acid production, and full tryptophan oxidation,
  and limits accumulation of quinolinate, a potent endogenous NMDA-receptor excitotoxin. The enzyme
  acts in the cytosol and is most highly expressed in liver and kidney. Because inhibiting ACMSD
  raises cellular NAD+, it is an actively pursued small-molecule drug target.
