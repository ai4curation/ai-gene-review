existing_annotations:
- term:
    id: GO:0019748
    label: secondary metabolic process
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: involved_in
  review:
    summary: >-
      ACMSD acts in tryptophan/NAD central (primary) metabolism, not secondary metabolism; this
      phylogenetic inference is a misleading over-annotation.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      The kynurenine pathway of tryptophan catabolism and NAD/picolinate homeostasis is primary
      intermediary metabolism, not secondary metabolism. The specific and correct biological-process
      terms for ACMSD (L-tryptophan catabolic process, negative regulation of quinolinate
      biosynthesis, regulation of de novo NAD biosynthesis from L-tryptophan) already capture the
      biology, so this broad IBA term adds nothing and mischaracterizes the pathway. Retained (not
      removed) per policy for phylogenetic annotations, but flagged as an over-annotation.
