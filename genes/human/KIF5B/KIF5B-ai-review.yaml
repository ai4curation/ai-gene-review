core_functions:
- description: ATP-dependent plus-end-directed microtubule motor activity as the 
    kinesin-1 heavy chain, driving transport of vesicles and organelles along 
    microtubules. Cargo specificity is supplied by adaptor proteins and light-chain 
    interactions, so cargo-specific phenotypes should be interpreted as contexts of this
    core motor function.
  molecular_function:
    id: GO:0008574
    label: plus-end-directed microtubule motor activity
  directly_involved_in:
  - id: GO:0047496
    label: vesicle transport along microtubule
  locations:
  - id: GO:0005856
    label: cytoskeleton
  supported_by:
  - reference_id: PMID:8606779
    supporting_text: Kinesin is the founding member of a superfamily of microtubule 
      based motor proteins that perform force-generating tasks such as organelle 
      transport and chromosome segregation.
  - reference_id: file:human/KIF5B/KIF5B-uniprot.txt
    supporting_text: Microtubule-dependent motor required for normal distribution of 
      mitochondria and lysosomes.
  - reference_id: PMID:24088571
    supporting_text: Kinesin-1 regulates long-range anterograde intracellular transport 
      of vesicles, including lysosomes
proposed_new_terms: []
suggested_questions:
- question: Does direct starvation-recovery or autophagic lysosome reformation evidence 
    support annotating KIF5B to a lysosome-organization/ALR term, or should KIF5B remain
    annotated to lysosome localization only?
  experts:
  - Sean Munro
  - Cleo T. Schiefermeier
- question: Should GO curation distinguish kinesin-1 heavy-chain core motor activity 
    from cargo-specific downstream outcomes such as NK cytotoxicity, channel 
    trafficking, and neuronal synaptic phenotypes?
  experts:
  - GO curator
  - kinesin-1 domain expert
suggested_experiments:
- description: Measure KIF5B recruitment to autolysosomes and lysosomal tubules during 
    starvation and nutrient refeeding, using endogenous tagging plus KIF5B 
    depletion/rescue.
  experiment_type: live-cell imaging/genetic rescue
  hypothesis: KIF5B contributes to lysosome positioning during recovery but requires 
    additional evidence before annotation to autophagic lysosome reformation or lysosome
    organization.
- description: Compare wild-type KIF5B and motor-dead or cargo-adaptor-binding mutants 
    for lysosome localization, lytic granule polarization, and generic vesicle transport
    in matched cell systems.
  experiment_type: structure-function perturbation
  hypothesis: Cargo-specific KIF5B phenotypes depend on the same core plus-end-directed 
    motor activity but separable adaptor interactions.
