- term:
    id: GO:0008574
    label: plus-end-directed microtubule motor activity
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: enables
  review:
    summary: This is the most informative existing molecular-function annotation for 
      KIF5B. KIF5B is the kinesin-1 heavy chain and acts as a plus-end-directed 
      microtubule motor.
    action: ACCEPT
    reason: Retain as the core molecular function.
    supported_by:
    - reference_id: PMID:8606779
      supporting_text: Kinesin is the founding member of a superfamily of microtubule 
        based motor proteins that perform force-generating tasks such as organelle 
        transport and chromosome segregation.
    - reference_id: file:human/KIF5B/KIF5B-uniprot.txt
      supporting_text: Microtubule-dependent motor required for normal distribution of 
        mitochondria and lysosomes.
