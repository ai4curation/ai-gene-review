id: P33176
gene_symbol: KIF5B
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  KIF5B encodes the ubiquitous kinesin-1 heavy chain, an ATP-dependent, plus-end-directed microtubule
  motor. Its core molecular role is to form kinesin-1 motor complexes that bind microtubules and move
  vesicles and organelles toward microtubule plus ends. KIF5B is recruited to many cargos through
  adaptors, including Arl8/SKIP-dependent lysosome positioning, lytic granule polarization in natural
  killer cells, mitochondrial transport, neuronal cargo transport, centrosome/nuclear positioning, and
  channel trafficking. Its lysosomal role is kinesin-dependent lysosome localization/positioning
  through adaptor-mediated cargo recruitment.
existing_annotations:
- term:
    id: GO:0005871
    label: kinesin complex
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: part_of
  review:
    summary: KIF5B is a heavy-chain subunit of the kinesin-1 motor complex, which 
      contains two KIF5B heavy chains and kinesin light chains.
    action: ACCEPT
    reason: The cellular-component annotation reflects the canonical kinesin-1 complex 
      architecture.
    supported_by:
    - reference_id: file:human/KIF5B/KIF5B-uniprot.txt
      supporting_text: Oligomer composed of two heavy chains and two light chains.
- term:
    id: GO:0007411
    label: axon guidance
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: involved_in
  review:
    summary: This is a downstream neuronal phenotype or synaptic consequence inferred 
      for kinesin-family cargo transport rather than a direct molecular or cellular core
      role of KIF5B.
    action: MARK_AS_OVER_ANNOTATED
    reason: The direct KIF5B function is motor-driven cargo transport; annotating broad 
      neuronal outcomes as KIF5B functions overstates the evidence.
    proposed_replacement_terms:
    - id: GO:0047496
      label: vesicle transport along microtubule
- term:
    id: GO:0048489
    label: synaptic vesicle transport
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: involved_in
  review:
    summary: This is a plausible cargo- or cell-type-specific transport role for 
      kinesin-1, but it is not the defining KIF5B function.
    action: KEEP_AS_NON_CORE
    reason: Keep as non-core because KIF5B is a pleiotropic motor whose conserved core 
      role is plus-end-directed microtubule cargo transport.
    supported_by:
    - reference_id: PMID:28426968
      supporting_text: 'distinct kinesins differentially regulate cargo velocity: kinesin-3
        drives fast axonal cargo trafficking, while kinesin-1 slows down axonal cargo transport'
