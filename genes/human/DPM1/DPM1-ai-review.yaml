id: O60762
gene_symbol: DPM1
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: DPM1 is the catalytic subunit of the dolichol-phosphate mannose (Dol-P-Man)
  synthase complex (DPM1/DPM2/DPM3). It transfers mannose from GDP-mannose onto dolichyl
  phosphate to form dolichyl-phosphate-mannose (Dol-P-Man) at the endoplasmic reticulum
  membrane (EC 2.4.1.83). Dol-P-Man is the lipid-linked mannosyl donor used for the
  lumenal mannose additions to the N-glycan precursor, for glycosylphosphatidylinositol
  (GPI) anchor synthesis, and for protein O-mannosylation and C-mannosylation. Unlike
  the yeast enzyme, human DPM1 lacks its own membrane-spanning domain and is tethered
  to the ER membrane by DPM3 (via a DPM3 C-terminal coiled-coil) and stabilized by
  DPM2, which also enhances catalytic activity. DPM1 is a glycosyltransferase family
  2 enzyme that binds GDP-mannose and a divalent metal cation. Loss-of-function variants
  cause DPM1-congenital disorder of glycosylation (CDG type Ie), which can present
  with dystroglycanopathy-type congenital muscular dystrophy.
