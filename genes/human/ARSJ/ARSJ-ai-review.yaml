    label: actin cytoskeleton
  evidence_type: IDA
  original_reference_id: GO_REF:0000052
  qualifier: located_in
  review:
    summary: >-
      Human Protein Atlas immunofluorescence reports actin-filament staining in
      BJ fibroblasts with two antibodies and an enhanced reliability score.
    action: KEEP_AS_NON_CORE
    reason: >-
      The directly curated cell-imaging observation is retained rather than
      overruled. It is not treated as a core catalytic location because staining
