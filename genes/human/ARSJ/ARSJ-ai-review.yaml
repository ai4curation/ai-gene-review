id: Q5FYB0
gene_symbol: ARSJ
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  ARSJ is a 599-amino-acid class-I sulfatase-family glycoprotein precursor
  containing an N-terminal signal peptide and the conserved catalytic cysteine
  that is expected to be converted to formylglycine in the endoplasmic
  reticulum. Phylogenetic and domain evidence supports sulfuric ester hydrolase
  activity, and the mature protein is predicted to enter the extracellular
  secretory route. Its native sulfate-ester substrate, physiological process,
  and catalytic properties remain unknown: an early recombinant-cell study did
  not detect activity in a standard arylsulfatase assay. Human Protein Atlas
  immunofluorescence also reports actin-filament-associated staining in BJ
  fibroblasts, but how this cell-context observation relates to the
  signal-peptide-bearing protein is unresolved. Mouse embryonic expression in
  joints and human lung-enriched transcript abundance provide possible
  physiological contexts but do not yet establish ARSJ function.
