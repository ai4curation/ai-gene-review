suggested_questions:
- question: >-
    What native sulfate ester is hydrolyzed by ARSJ, and does the enzyme act on
    a glycosaminoglycan, sulfolipid, steroid sulfate, or another metabolite?
  experts:
  - sulfatase biochemists
  - glycomics and sulfomics specialists
- question: >-
    Is the mature endogenous protein secreted, retained in the ER, associated
    with a membrane, or partitioned among multiple cellular pools?
  experts:
  - secretory-pathway cell biologists
  - protein-localization specialists
- question: >-
    Does mouse joint expression or human lung-enriched transcript abundance
    mark a conserved physiological role?
  experts:
  - skeletal-development biologists
  - pulmonary extracellular-matrix biologists
suggested_experiments:
- description: >-
    Express and purify wild-type ARSJ together with SUMF1, verify conversion of
    Cys122 to formylglycine by mass spectrometry, and screen a chemically
    diverse panel of sulfate esters and sulfated glycans across pH conditions
    with a C122A catalytic control.
  experiment_type: quantitative enzyme and substrate profiling
  hypothesis: >-
    Properly formylglycine-modified ARSJ hydrolyzes a restricted physiological
    sulfate ester that is not represented by the original standard aryl
    substrate assay.
- description: >-
    Endogenously tag ARSJ in human fibroblasts and lung-derived cells, then
    combine pulse-chase analysis, secretion assays, selective
    permeabilization, and super-resolution imaging with actin and ER markers.
  experiment_type: endogenous protein trafficking and localization
  hypothesis: >-
    ARSJ traverses the ER and is secreted, while the reported actin-associated
    immunofluorescence reflects either a transient intracellular pool or
    antibody cross-reactivity.
- description: >-
    Generate ARSJ-null human chondrocyte and lung stromal-cell models, quantify
    sulfate-containing metabolites and extracellular-matrix sulfation, and
    rescue with wild-type versus C122A ARSJ.
  experiment_type: CRISPR metabolomics and catalytic rescue
  hypothesis: >-
    ARSJ catalytic activity controls a tissue-contextual sulfated metabolite or
    matrix substrate in joint or lung-associated cells.
