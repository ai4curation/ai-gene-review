core_functions:
- description: >-
    Acts as a probable formylglycine-dependent class-I sulfatase that hydrolyzes
    sulfuric ester bonds in an as-yet-unidentified substrate. The broad
    molecular activity is supported by phylogenetic and catalytic-core
    conservation, whereas cleavage of a standard aryl sulfate was not detected.
    ARSJ enters the secretory pathway and is predicted to act extracellularly,
    but the mature functional compartment still requires direct confirmation.
  molecular_function:
    id: GO:0008484
    label: sulfuric ester hydrolase activity
  locations:
  - id: GO:0005576
    label: extracellular region
  supported_by:
  - reference_id: PMID:16174644
    supporting_text: the active site, which is the target of the post-translational modification, is the most evolutionarily constrained region of sulfatases
    reference_section_type: ABSTRACT
    full_text_unavailable: true
  - reference_id: file:human/ARSJ/ARSJ-deep-research-manual.md
    supporting_text: The defensible core is a probable formylglycine-dependent sulfuric ester hydrolase with an unidentified substrate.
