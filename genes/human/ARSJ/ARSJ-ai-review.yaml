    action: ACCEPT
    reason: >-
      ARSJ retains the defining sulfatase catalytic core, including the
      formylglycine-generating cysteine and conserved catalytic residues. This
      supports the broad activity even though ARSJ's native substrate and
      kinetics have not been determined. Failure to cleave a standard
      artificial aryl substrate does not exclude hydrolysis of a distinct
