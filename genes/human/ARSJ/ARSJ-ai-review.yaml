    summary: >-
      Reactome places ARSJ in the ER lumen during SUMF1-mediated conversion of
      its catalytic cysteine to formylglycine.
    action: KEEP_AS_NON_CORE
    reason: >-
      Entry into the ER lumen is consistent with the signal peptide and with
      formylglycine maturation of eukaryotic sulfatases. This is a
      biosynthetic/transit location, however, not evidence that the mature
      enzyme acts in the ER; its final functional compartment remains
      incompletely resolved.
