    summary: >-
      UniProt subcellular-location mapping assigns ARSJ to the extracellular
      region from its reviewed secreted-protein annotation.
    action: ACCEPT
    reason: >-
      ARSJ has a strong N-terminal signal peptide, a predicted cleavage site at
      residue 49, multiple N-glycosylation sites, and no annotated
      transmembrane segment or lysosomal targeting signal. These features
      support the reviewed secretion assignment, although direct recovery of
      endogenous ARSJ from extracellular fluid is still needed.
