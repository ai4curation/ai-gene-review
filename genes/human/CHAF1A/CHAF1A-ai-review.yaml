suggested_questions:
- question: How is CHAF1A-mediated histone deposition coordinated with the upstream
    histone supply chaperones (ASF1A/ASF1B) and the downstream H2A/H2B deposition
    machinery during a single round of replication?
- question: To what extent is the heterochromatin-maintenance role of CHAF1A (via
    HP1/CBX5 delivery) separable from its bulk replication-coupled nucleosome assembly
    function?
suggested_experiments:
- experiment: Acute degron-mediated depletion of CHAF1A in synchronized cells followed
    by nascent-chromatin (NCC/iPOND) proteomics and MNase-seq to quantify the kinetics
    of replication-coupled H3.1-H4 deposition and nucleosome maturation genome-wide.
- experiment: Structure-guided separation-of-function mutants disrupting the PCNA-binding
    region (1-49), the PxVxL/HP1 motif (V240/L242), or the homodimerization region
    (642-678), assayed for in vitro nucleosome assembly and for heterochromatin
    re-establishment after replication.
