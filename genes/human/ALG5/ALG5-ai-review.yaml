suggested_questions:
- question: Is the reduced N-glycosylation phenotype in ALG5-CDG and PKD7 driven
    predominantly by loss of the terminal glucosylation steps (ALG6/ALG8/ALG10) that
    depend on Dol-P-Glc, or does Dol-P-Glc have additional roles?
suggested_experiments:
- description: Reconstitute purified recombinant human ALG5 with dolichyl phosphate and
    UDP-glucose to measure Dol-P-Glc synthase kinetics, and test the PKD7 missense
    variants (R208H, R212H) for loss of catalytic activity.
  hypothesis: PKD7-associated ALG5 missense variants reduce or abolish Dol-P-Glc synthase
    activity, explaining the downstream N-glycosylation defect.
