- id: PMID:10359825
  title: A mutation in the human ortholog of the Saccharomyces cerevisiae ALG6 gene
    causes carbohydrate-deficient glycoprotein syndrome type-Ic.
  findings:
  - statement: The human ALG5 ortholog was cloned and functionally characterized; its
      cDNA partially complements the S. cerevisiae alg5 deficiency, and ALG5 encodes the
      dolichyl phosphate glucosyltransferase acting in LLO biosynthesis. ALG5 itself was
      not mutated in the CDGS-Ic patients (the causal gene was ALG6).
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: Abstract-only in cache (full_text_available false). Titled/framed around
      ALG6 causing CDGS-Ic, but the study also cloned and functionally characterized human
      ALG5 (Dol-P-Glc synthase; yeast alg5 complementation), which underpins the ALG5
      experimental annotations. Deferring to curator on the experimental annotations whose
      full text is not cached.
