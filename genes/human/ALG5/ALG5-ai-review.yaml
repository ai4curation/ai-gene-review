  label: Homo sapiens
description: ALG5 is the endoplasmic reticulum dolichyl-phosphate beta-glucosyltransferase
  (Dol-P-Glc synthase; EC 2.4.1.117), a single-pass type II ER membrane protein of the
  glycosyltransferase family 2 (CAZy GT2). Acting on the cytosolic face of the ER
  membrane, it transfers glucose from UDP-alpha-D-glucose onto dolichyl phosphate to
  form dolichyl beta-D-glucosyl phosphate (Dol-P-Glc). Dol-P-Glc is the lipid-linked
  glucose donor subsequently used by ALG6, ALG8 and ALG10 to add the three terminal
  glucose residues onto the Man(9)GlcNAc(2)-PP-dolichol structure, completing the
  dolichol-linked oligosaccharide (Glc(3)Man(9)GlcNAc(2)-PP-Dol) that is transferred to
  nascent proteins during asparagine (N)-linked glycosylation. Loss of ALG5 function
  causes a congenital disorder of glycosylation (ALG5-CDG); a specific truncating ALG5
  variant and missense variants also cause an autosomal-dominant polycystic kidney/liver
  disease (PKD7) by impairing N-glycosylation and maturation of polycystin-1 (PKD1).
