id: P21953
gene_symbol: BCKDHB
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  BCKDHB encodes the beta subunit (E1-beta / BCKDE1B) of the E1 component of the
  mitochondrial branched-chain alpha-ketoacid dehydrogenase (BCKDH) complex. Together
  with the E1-alpha subunit (BCKDHA) it forms an alpha2-beta2 heterotetrameric,
  thiamine diphosphate (ThDP)-dependent decarboxylase (2-oxoisovalerate dehydrogenase,
  EC 1.2.4.4). This E1 decarboxylase catalyses the first, committed and rate-limiting
  step of branched-chain amino acid (BCAA) catabolism: the oxidative decarboxylation
  of the branched-chain 2-oxo (alpha-keto) acids derived from valine, leucine and
  isoleucine (2-oxoisovalerate/KIV, 4-methyl-2-oxopentanoate/KIC, and
  (S)-3-methyl-2-oxopentanoate/KMV), producing CO2 and a branched-chain acyl group
  that is reductively transferred to the lipoyl cofactor of the E2 transacylase. The
  active site lies at the alpha-beta' interface, and the beta subunit contributes
  residues for ThDP binding, structural K+ coordination, and heterotetramer/E2
  assembly. The full BCKDH multienzyme complex is organized around a 24-meric E2
  (DBT) cubic core, to which multiple E1 (BCKDHA/BCKDHB) tetramers and E3 (DLD)
  dimers associate; complex activity is regulated by reversible phosphorylation of
  E1-alpha (by BCKDK) and dephosphorylation (by PPM1K/PP2Cm). BCKDHB acts in the
  mitochondrial matrix. Biallelic loss-of-function variants in BCKDHB cause maple
  syrup urine disease type Ib (MSUD 1B), in which loss of the beta subunit also
  destabilizes the alpha subunit and abolishes complex activity.
