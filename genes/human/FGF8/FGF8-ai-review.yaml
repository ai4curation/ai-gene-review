- term:
    id: GO:0005104
    label: fibroblast growth factor receptor binding
  evidence_type: IDA
  original_reference_id: PMID:16384934
  qualifier: enables
  review:
    summary: Proposed new general molecular-function annotation. The FGF8b-FGFR2c crystal structure and
      biochemical evidence for physiological FGF8b-FGFR1c interaction directly establish fibroblast growth
      factor receptor binding; existing GOA child terms separately record FGFR1 and FGFR2 binding.
    action: NEW
    reason: GO:0005104 accurately unifies the directly demonstrated receptor-binding activity used in
      the core-function model without asserting that every receptor splice isoform binds with equal affinity.
    supported_by:
    - reference_id: PMID:16384934
      supporting_text: we solved the crystal structure of FGF8b in complex with the "c" splice isoform
        of FGF receptor 2 (FGFR2c).
    - reference_id: PMID:16384934
      supporting_text: provide the first biochemical evidence for a physiological FGF8b-FGFR1c interaction
        during mid-hindbrain development.
