- id: PMID:16384934
  title: Structural basis by which alternative splicing modulates the organizer activity of FGF8 in the
    brain.
  findings:
  - statement: FGF8b directly binds FGFR2c, and its isoform-specific N-terminal contact explains increased
      receptor affinity and organizer potency.
    supporting_text: we solved the crystal structure of FGF8b in complex with the "c" splice isoform of
      FGF receptor 2 (FGFR2c).
  full_text_unavailable: true
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: The cached abstract directly supports FGF8 isoform-specific receptor binding, structure,
      and brain-organizer activity.
- id: PMID:16597617
  title: Receptor specificity of the fibroblast growth factor family. The complete mammalian FGF family.
  findings:
  - statement: FGF activity depends on ligand-receptor specificity and heparan-sulfate cofactors.
    supporting_text: FGF signaling activity is regulated by the binding specificity of ligands and receptors
      and is modulated by extrinsic cofactors such as heparan sulfate proteoglycans.
  full_text_unavailable: true
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: The cached abstract verifies the complete mammalian FGF/FGFR receptor-specificity assay
      framework; FGF8-specific details derive chiefly from the earlier assays and PMID:16384934.
- id: PMID:19793884
  title: The duration of Fgf8 isthmic organizer expression is key to patterning different tectal-isthmo-cerebellum
    structures.
  findings:
  - statement: Sustained isthmic Fgf8 represses Otx2 in hindbrain and permits isthmus and cerebellum formation.
    supporting_text: One crucial role for sustained Fgf8 function is in repressing Otx2 in the hindbrain,
      thereby allowing the isthmus and cerebellum to form.
  full_text_unavailable: true
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: The cached abstract directly supports the temporally sustained isthmic-organizer role
      used as non-core developmental context for the cerebellum module.
