  title: UniProt text export for human FGF8 (P55075)
  findings:
  - statement: FGF8 is secreted and engages FGFR1-4 with heparan-sulfate-assisted affinity.
    supporting_text: 'SUBCELLULAR LOCATION: Secreted.'
- id: file:human/FGF8/FGF8-notes.md
  title: Manual evidence and curation notes for human FGF8
  findings: []
core_functions:
- description: Secreted FGF8 binds FGFR1-FGFR4 in receptor-splice-selective, heparan-sulfate-assisted
    complexes and activates receptor tyrosine kinase signaling. Isoform-dependent receptor affinity tunes
    the strength, range, and duration of mitogenic and morphogenetic outputs.
  molecular_function:
    id: GO:0005104
    label: fibroblast growth factor receptor binding
  directly_involved_in:
  - id: GO:0008543
    label: fibroblast growth factor receptor signaling pathway
  - id: GO:0043410
    label: positive regulation of MAPK cascade
  locations:
  - id: GO:0005576
    label: extracellular region
  supported_by:
  - reference_id: PMID:16384934
    supporting_text: we solved the crystal structure of FGF8b in complex with the "c" splice isoform of
      FGF receptor 2 (FGFR2c).
  - reference_id: PMID:16384934
    supporting_text: provide the first biochemical evidence for a physiological FGF8b-FGFR1c interaction
      during mid-hindbrain development.
  - reference_id: file:human/FGF8/FGF8-uniprot.txt
    supporting_text: Interacts with FGFR1, FGFR2, FGFR3 and FGFR4.
proposed_new_terms: []
suggested_questions:
- question: How do the four human FGF8 splice isoforms partition receptor-splice specificity, tissue range,
    and organizer potency in vivo?
- question: Which FGFR isoforms and heparan-sulfate structures receive FGF8 at the human midbrain-hindbrain
    boundary, and how faithfully do human cerebellar organoids reproduce that organizer circuit?
- question: Which skeletal findings in human FGF8 deficiency reflect direct local FGF8 signaling rather
    than secondary effects of GnRH and sex-steroid deficiency?
suggested_experiments:
- description: Introduce isoform-selective FGF8A or FGF8B expression into isogenic human midbrain-hindbrain
    organoids and quantify OTX2/GBX2 boundary position, WNT1 maintenance, FGFR phosphorylation, ERK dynamics,
    and cerebellar-territory markers.
  experiment_type: genetic manipulation/organoid imaging
  hypothesis: FGF8B produces stronger and longer-range FGFR-ERK signaling than FGF8A and more effectively
    stabilizes the human isthmic organizer.
- description: Measure binding kinetics and signaling potency of all four purified human FGF8 isoforms
    across FGFR1c, FGFR2c, FGFR3c, FGFR3b, and FGFR4 with defined heparan-sulfate oligosaccharides.
  experiment_type: biochemistry/quantitative signaling
  hypothesis: Isoform-specific N-terminal contacts and heparan-sulfate composition jointly determine receptor
    selectivity and signaling amplitude.
- description: Generate isogenic human neural and skeletal progenitors carrying disease-associated FGF8
    variants, then compare secretion, receptor binding, ERK activation, GnRH-neuron differentiation, and
    osteogenic/chondrogenic outcomes with hormone-independent rescue controls.
  experiment_type: genome editing/cell differentiation
  hypothesis: Different FGF8 variants separate primary ligand defects from secondary endocrine consequences
    and reveal tissue-specific signaling thresholds.
