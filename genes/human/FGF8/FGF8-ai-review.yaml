- term:
    id: GO:0005737
    label: cytoplasm
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: is_active_in
  review:
    summary: The active FGF8 ligand is secreted; a cytoplasmic location may reflect family-level inference
      or precursor biosynthesis rather than the compartment in which FGF8 signals. This row uses phylogenetic
      inference (IBA).
    action: MARK_AS_OVER_ANNOTATED
    reason: The signal peptide directs nascent FGF8 into the ER and secretory pathway, and the biologically
      active ligand functions extracellularly. A broad cytoplasmic location inherited from the FGF family
      is therefore not demonstrably an active FGF8 compartment.
    propagation_review:
      root_cause: PROPAGATION_BAD
      failure_modes:
      - COMPARTMENT_OR_COMPLEX_MISMATCH
      source_entities:
      - source_id: PANTHER:PTN000160075
        source_label: FGF-family PAINT node used for the cytoplasm IBA
        source_status: SUPPORTS_SOURCE_BUT_NOT_TARGET
        comment: The family-level node includes intracellular or nonclassically secreted FGF members,
          whereas human FGF8 has a signal peptide and a supported active extracellular location.
