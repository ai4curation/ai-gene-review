id: P55075
gene_symbol: FGF8
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: FGF8 encodes fibroblast growth factor 8, a secreted heparin-binding signaling ligand produced
  as a precursor and expressed as four alternative splice isoforms. FGF8 engages FGFR1, FGFR2, FGFR3,
  and FGFR4 in receptor- and splice-isoform-selective complexes whose affinity and signaling are promoted
  by heparan-sulfate glycosaminoglycans; receptor activation drives outputs including RAS-MAPK signaling.
  Differences near the N terminus give FGF8b greater receptor affinity and organizer potency than FGF8a.
  Spatially and temporally restricted FGF8 acts as an embryonic organizer and morphogen in gastrulation,
  midbrain-hindbrain regionalization, craniofacial and limb patterning, inner-ear and cardiac development,
  and development of the gonadotropin-releasing hormone neuronal system. Human loss-of-function variants
  cause hypogonadotropic hypogonadism with variable olfactory and craniofacial findings, while altered
  regulation of the FGF8 locus is associated with hypoplastic femurs and pelvis.
