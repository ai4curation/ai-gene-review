id: O95396
gene_symbol: MOCS3
product_type: PROTEIN
status: IN_PROGRESS
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  MOCS3 (also called UBA4) is a cytosolic, two-domain bifunctional enzyme that
  activates the C-terminal Gly-Gly motif of small β-grasp-fold sulfur-carrier
  proteins for two sulfur-relay pathways. Its N-terminal HesA/MoeB/ThiF (E1-like)
  adenylation domain forms an acyl-adenylate (-COAMP) at the C-terminus of its
  substrates, and its C-terminal rhodanese-like domain then transfers persulfide
  sulfur from a catalytic cysteine (Cys412) to convert this into a C-terminal
  thiocarboxylate (-COSH). Through these coupled adenylyltransferase (EC 2.7.7.80)
  and sulfurtransferase (EC 2.8.1.11) activities, MOCS3 thiocarboxylates MOCS2A,
  the small subunit of molybdopterin (MPT) synthase, driving molybdenum cofactor
  (Moco) biosynthesis, and it thiocarboxylates the ubiquitin-related modifier URM1,
  supplying the sulfur used for 2-thiolation of wobble uridine (mcm5s2U34) in
  cytosolic tRNA-Lys, tRNA-Glu and tRNA-Gln. The physiological sulfur donor to the
  MOCS3 rhodanese domain is the cytosolic L-cysteine desulfurase NFS1 rather than
  thiosulfate. MOCS3 binds one zinc ion per subunit and requires ATP. Loss-of-function
  variants cause molybdenum cofactor deficiency type B2.
