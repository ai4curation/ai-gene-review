core_functions:
- description: >-
    ATP-dependent adenylyltransferase that activates the C-terminal Gly-Gly of the
    molybdopterin-synthase small subunit MOCS2A (and of URM1) by forming an
    acyl-adenylate, the first step of sulfur-carrier activation.
  molecular_function:
    id: GO:0061605
    label: molybdopterin-synthase adenylyltransferase activity
  directly_involved_in:
  - id: GO:0006777
    label: Mo-molybdopterin cofactor biosynthetic process
  locations:
  - id: GO:0005829
    label: cytosol
  supported_by:
  - reference_id: PMID:22453920
    supporting_text: >-
      MOCS3 activates both MOCS2A and URM1 by
      adenylation and a subsequent sulfur transfer step for the formation of the
      thiocarboxylate group at the C terminus of each protein
  - reference_id: file:human/MOCS3/MOCS3-uniprot.txt
    supporting_text: "EC=2.7.7.80"
- description: >-
    Rhodanese-like-domain sulfurtransferase that transfers persulfide sulfur from its
    catalytic Cys412 onto the adenylylated C-terminus of MOCS2A to form a
    thiocarboxylate, using NFS1 as the physiological sulfur donor; drives molybdenum
    cofactor biosynthesis.
  molecular_function:
    id: GO:0061604
    label: molybdopterin-synthase sulfurtransferase activity
  directly_involved_in:
  - id: GO:0006777
    label: Mo-molybdopterin cofactor biosynthetic process
  locations:
  - id: GO:0005829
    label: cytosol
  supported_by:
  - reference_id: PMID:15073332
    supporting_text: >-
      the sulfurated form of MOCS3-RLD was able to
      provide the sulfur for the thiocarboxylation of MOCS2A
  - reference_id: PMID:15073332
    supporting_text: >-
      Mutation of the putative persulfide-forming active-site
      cysteine residue C412 abolished the sulfurtransferase activity of MOCS3-RLD
      completely
- description: >-
    Activates the ubiquitin-related modifier URM1 by adenylation and subsequent
    thiocarboxylation of its C-terminal glycine, generating the sulfur-carrier
    thiocarboxylate used for 2-thiolation of wobble uridine (mcm5s2U34) in cytosolic
    tRNA-Lys, tRNA-Glu and tRNA-Gln.
  molecular_function:
    id: GO:0042292
    label: URM1 activating enzyme activity
  directly_involved_in:
  - id: GO:0002143
    label: tRNA wobble position uridine thiolation
  - id: GO:0034227
    label: tRNA thio-modification
  locations:
  - id: GO:0005829
    label: cytosol
  supported_by:
  - reference_id: PMID:19017811
    supporting_text: >-
      Urm1 is activated by an unusual mechanism to yield a
      thiocarboxylate intermediate that serves as sulfur donor in tRNA thiolation
      reactions
  - reference_id: PMID:30817134
    supporting_text: mcm5s2U thio-modified tRNAs were not detectable
suggested_questions:
- question: >-
    What reductant regenerates oxidized MOCS3 (resolving the transient Cys316-Cys324
    disulfide) between catalytic cycles in vivo? Reactome notes this reducing agent is
    unknown.
- question: >-
    Are the Moco-biosynthesis and tRNA-thiolation branches of MOCS3 differentially regulated
    or competitively partitioned in cells, and does substrate (MOCS2A vs URM1) availability
    control flux?
suggested_experiments:
- description: >-
    Quantitatively partition MOCS3 activity between the MOCS2A (Moco) and URM1 (tRNA
    thiolation) branches in the MOCS3-knockout HEK293T background by add-back of catalytic
    (Cys412) and adenylation (Cys239/ACT_SITE) point mutants, measuring both sulfite oxidase
    activity and mcm5s2U tRNA levels.
- description: >-
    Test the physiological relevance and functional consequence of the MOCS3-ATXN1/TARDBP
    high-throughput interactions with orthogonal co-IP/proximity assays in relevant cell
    types, to determine whether they reflect genuine function or interactome noise.
