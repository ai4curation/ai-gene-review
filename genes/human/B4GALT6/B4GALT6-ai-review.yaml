core_functions:
- description: >-
    Lactosylceramide synthase (EC 2.4.1.274): transfers galactose from
    UDP-galactose to glucosylceramide (GlcCer) on the lumenal face of the Golgi
    to produce lactosylceramide (LacCer, Gal-beta-1,4-Glc-ceramide) + UDP. This
    is the committed step generating the central glycosphingolipid precursor;
    B4GALT6 shares this activity with B4GALT5 (the major LacCer synthase) and
    contributes to a lesser, brain-enriched extent.
  molecular_function:
