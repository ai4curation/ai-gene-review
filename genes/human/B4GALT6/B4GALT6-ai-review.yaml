gene_symbol: B4GALT6
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  B4GALT6 (beta-1,4-galactosyltransferase 6) is a Golgi-resident, single-pass
  type II membrane glycosyltransferase of the glycosyltransferase 7 (GT7) family
  that functions as a lactosylceramide synthase (EC 2.4.1.274). It transfers
  galactose from UDP-galactose to glucosylceramide (GlcCer) on the lumenal face
  of the Golgi to produce lactosylceramide (LacCer, Gal-beta-1,4-Glc-ceramide)
  plus UDP. LacCer is the branch-point precursor from which the ganglio-, globo-,
  and (neo)lacto-series glycosphingolipids and gangliosides are built, so
  B4GALT6 catalyzes a committed step of glycosphingolipid biosynthesis.
  B4GALT6 shares this reaction with its close paralog B4GALT5 (68% identity);
  B4GALT5 is the major LacCer synthase in cells while B4GALT6 contributes to a
  lesser extent, with comparatively restricted, brain-enriched expression. The
  gene was originally cloned from brain as human lactosylceramide synthase, and
  the enzyme was biochemically purified and characterized (Mn2+/Mg2+-dependent)
  from human kidney. Through the gangliosides that derive from LacCer, the
  enzyme has been linked to central nervous system processes including neuronal
  maturation and axon and myelin formation.
