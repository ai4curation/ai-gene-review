core_functions:
- description: BCL2L13/Bcl-rambo functions as a mitophagy receptor at the mitochondrial outer membrane. As the mammalian functional homolog of yeast Atg32, it binds Atg8-family proteins (LC3/GABARAP, including GABARAPL2) via an LC3-interacting region to recruit autophagy machinery to mitochondria, promoting mitochondrial fragmentation and selective autophagy of mitochondria. The defining mitophagy molecular-function and process terms are not present in the seeded GOA annotation set (they appear in UniProt GOA as IEA-level mitophagy and mitochondrion organization).
  directly_involved_in:
