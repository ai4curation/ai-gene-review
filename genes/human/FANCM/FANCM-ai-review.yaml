- term:
    id: GO:0000077
    label: DNA damage checkpoint signaling
  evidence_type: IMP
  original_reference_id: PMID:18995830
  qualifier: involved_in
  review:
    summary: >-
      FANCM (with FAAP24) is required for ATR/Chk1-mediated checkpoint signaling in response to
      replication stress, independently of the FA core complex: it interacts with the checkpoint
      protein HCLK2, and its DNA translocase activity (dispensable for FANCD2 monoubiquitination) is
      required for efficient Chk1 activation and downstream checkpoint responses. This checkpoint
      role is well documented (also via RPA and TopBP1 chromatin retention) but was not annotated in
      GOA.
    action: NEW
    reason: >-
      A genuine, well-evidenced function of FANCM that the existing GOA annotation set omits.
      Loss-of-function experiments show FANCM/FAAP24 depletion compromises ATR/Chk1 checkpoint
      signaling, and the translocase-dependence separates this activity from the scaffolding role in
      FANCD2 monoubiquitination. GO:0000077 (DNA damage checkpoint signaling) is a correctly-branched
      biological_process term for this role.
    supported_by:
    - reference_id: PMID:18995830
      supporting_text: the DNA translocase activity of FANCM, which is dispensable for FA pathway activation, is required for its role in ATR/Chk1 signaling
    - reference_id: PMID:18995830
      supporting_text: downregulation of FANCM or FAAP24 also compromises ATR/Chk1-mediated checkpoint signaling
