core_functions:
- description: >-
    ATP-dependent DNA translocase that binds branched DNA and catalyzes ATP-driven branch migration
    of stalled/regressed replication forks and Holliday junctions, remodeling branched
    replication/recombination intermediates; this activity is stimulated by the MHF1-MHF2
    (CENPS-CENPX) histone-fold dimer and is required for replication fork protection and ICL repair.
  molecular_function:
    id: GO:0015616
    label: DNA translocase activity
  directly_involved_in:
  - id: GO:0031297
    label: replication fork processing
  - id: GO:0036297
    label: interstrand cross-link repair
  locations:
  - id: GO:0000785
    label: chromatin
  in_complex:
    id: GO:0071821
    label: FANCM-MHF complex
  supported_by:
  - reference_id: PMID:20347429
    supporting_text: FANCM has a DNA branch migration activity that can process branched DNA structures such as a movable replication fork (MRF)
  - reference_id: PMID:20347428
    supporting_text: MHF stimulates DNA binding and replication fork remodeling by FANCM.
  - reference_id: PMID:18206976
    supporting_text: purified FANCM binds to Holliday junctions and replication forks with high specificity and promotes migration of their junction point in an ATPase-dependent manner
  - reference_id: PMID:24207054
    supporting_text: The traverse frequency was strongly reduced by inactivation of the translocase and DNA binding activities of the FANCM/MHF complex
- description: >-
    Chromatin-binding scaffold that, together with FAAP24 and the MHF dimer, anchors the Fanconi
    anemia core complex to chromatin at stalled replication forks and interstrand crosslinks,
    enabling efficient DNA damage-induced monoubiquitination of the FANCD2-FANCI complex and
    activation of the FA pathway.
  molecular_function:
    id: GO:0003682
    label: chromatin binding
  directly_involved_in:
  - id: GO:1902527
    label: positive regulation of protein monoubiquitination
  - id: GO:0036297
    label: interstrand cross-link repair
  locations:
  - id: GO:0000785
    label: chromatin
  in_complex:
    id: GO:0043240
    label: Fanconi anaemia nuclear complex
  supported_by:
  - reference_id: PMID:19423727
    supporting_text: FANCM is rather responsible for the recruitment of the FA core complex to the chromatin
  - reference_id: PMID:29231814
    supporting_text: improved their resistance to MMC re-establishing FANCD2 monoubiquitination
proposed_new_terms: []
suggested_questions:
- question: >-
    Is the ATP-dependent DNA translocase/branch-migration activity of human FANCM required for
    replication traverse of ICLs and fork reversal in vivo, as distinct from its
    (ATPase-independent) scaffolding role in FANCD2 monoubiquitination?
- question: >-
    What is the direct in vivo substrate spectrum of the FANCM-MHF-FAAP24 assembly at stalled forks
    (regressed forks, D-loops, Holliday junctions), and how is activity partitioned between fork
    remodeling and checkpoint signaling?
suggested_experiments:
- description: >-
    Separation-of-function analysis in FANCM-null human cells comparing wild-type, ATPase-dead
    (K117R), C-terminal (FAAP24-binding) deletion, and MHF-binding mutants for ICL traverse, fork
    reversal, FANCD2 monoubiquitination, ATR signaling, and SCE/crossover suppression.
- description: >-
    Single-molecule or reconstituted-fork biochemistry with purified FANCM +/- MHF1-MHF2 and FAAP24
    to quantify translocation processivity and branch-migration directionality on defined fork/HJ
    substrates.
