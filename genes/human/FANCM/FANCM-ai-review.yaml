- term:
    id: GO:0043138
    label: 3'-5' DNA helicase activity
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: enables
  review:
    summary: >-
      Human FANCM does not display canonical processive 3'-5' duplex-unwinding helicase activity; the
      characterized enzymatic activity is ATP-dependent DNA translocation and branch migration of
      branched substrates. The 3'-5' DNA helicase term (propagated from the SF2 family) is more
      accurately expressed as DNA translocase activity.
    action: MODIFY
    reason: >-
      Direct biochemistry states that for FANCM only translocase (not helicase) activity was observed;
      the branch-migration/fork-remodeling activity is best described as DNA translocase activity
      rather than a duplex-unwinding 3'-5' helicase.
    proposed_replacement_terms:
