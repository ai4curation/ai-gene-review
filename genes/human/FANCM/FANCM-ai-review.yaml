- term:
    id: GO:0000712
    label: resolution of meiotic recombination intermediates
  evidence_type: IMP
  original_reference_id: PMID:20347428
  qualifier: involved_in
  review:
    summary: >-
      FANCM regulates recombination outcomes by processing/branch-migrating recombination
      intermediates and suppressing crossovers; in germ cells it is expressed along pachytene
      chromosomes. Consistent with a meiotic recombination-intermediate resolution role, though for
      human FANCM this is a tissue-specific/secondary function relative to its replication-fork role.
    action: KEEP_AS_NON_CORE
    reason: >-
      Experimental (IMP) annotation by the curator; FANCM's anti-crossover/recombination-intermediate
      processing activity supports a meiotic role, but it is non-core relative to ICL repair and fork
      remodeling. Not removed, per deference to the experimental annotation.
    supported_by:
    - reference_id: PMID:29231814
      supporting_text: FANCM protein was preferentially expressed along the chromosomes in pachytene cells, which undergo meiotic recombination.
- term:
    id: GO:0031297
    label: replication fork processing
  evidence_type: IMP
  original_reference_id: PMID:20347428
  qualifier: involved_in
  review:
    summary: >-
      FANCM remodels branched DNA structures and protects/processes stalled replication forks; MHF
      stimulates FANCM's replication fork remodeling. A core FANCM biological process.
    action: ACCEPT
    reason: >-
      Directly supported experimental annotation; fork remodeling/processing is a central FANCM
      function driven by its translocase activity.
    supported_by:
    - reference_id: PMID:20347428
      supporting_text: MHF stimulates DNA binding and replication fork remodeling by FANCM.
