    label: interstrand cross-link repair
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: involved_in
  review:
    summary: >-
      FANCM functions in interstrand cross-link (ICL) repair; it is recruited to forks stalled by
      ICLs and is required for cellular resistance to cross-linking agents. This is a core biological
      process for FANCM, consistent across the phylogenetic tree (Hef/Mph1/Fml1).
    action: ACCEPT
    reason: >-
      Well supported by both the phylogenetic inference and direct human experiments; ICL repair is
      a defining FANCM function.
    supported_by:
    - reference_id: PMID:20347428
      supporting_text: FANCM and MHF are rapidly recruited to forks stalled by DNA interstrand crosslinks, and both are required for cellular resistance to such lesions.
