- id: PMID:16116422
  title: A human ortholog of archaeal DNA repair protein Hef is defective in Fanconi
    anemia complementation group M.
  findings: []
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Founding paper identifying FANCM (FAAP250) as mutated in FA complementation group M; establishes
      DNA-dependent ATPase/translocase activity, essential role in FANCD2 monoubiquitination, and
      hyperphosphorylation on DNA damage. Verified against cached abstract/full text.
- id: PMID:17289582
  title: Identification of FAAP24, a Fanconi anemia core complex protein that interacts
    with FANCM.
  findings: []
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Establishes the FANCM-FAAP24 heterodimer (C-terminal ERCC4-like region), DNA-structure binding,
      and recruitment of the FA core complex to damaged DNA. Supports complex-membership annotations.
- id: PMID:18206976
  title: The Fanconi anemia protein FANCM can promote branch migration of Holliday
    junctions and replication forks.
  findings: []
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Primary biochemistry (Gari et al. 2008): purified FANCM binds Holliday junctions and
      replication forks with high specificity and promotes ATP-dependent branch migration, dissociating
      recombination intermediates through 2.6 kb of DNA. Direct experimental support for the four-way
      junction binding/branch-migration (translocase) annotations. Abstract cached.
- id: PMID:18995830
  title: FANCM and FAAP24 function in ATR-mediated checkpoint signaling independently
    of the Fanconi anemia core complex.
  findings: []
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Collis et al. 2008: FANCM/FAAP24 interact with HCLK2 and are required for ATR/Chk1-mediated
      checkpoint signaling independently of the FA core complex; the FANCM translocase activity
      (dispensable for FA pathway activation) is required for this checkpoint role. Basis for the NEW
      DNA damage checkpoint signaling annotation. Abstract cached.
- id: PMID:24207054
  title: The DNA translocase FANCM/MHF promotes replication traverse of DNA interstrand
    crosslinks.
  findings: []
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Huang et al. 2013 (full text): single-molecule DNA-fiber assay shows FANCM/MHF translocase and
      DNA-binding activities promote replication traverse of ICLs, allowing DNA synthesis to continue
      past crosslinks without lesion repair. Corroborates the translocase core function and ICL-repair
      annotations.
- id: PMID:19423727
  title: Impaired FANCD2 monoubiquitination and hypersensitivity to camptothecin uniquely
    characterize Fanconi anemia complementation group M.
  findings: []
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Full text available. Key for separation of functions: ATPase required for cross-linker
      resistance but not FANCD2 monoubiquitination; FANCM recruits FA core complex to chromatin; only
      translocase (not helicase) activity observed; not essential for RAD51-dependent HR.
- id: PMID:20347428
  title: A histone-fold complex and FANCM form a conserved DNA-remodeling complex
    to maintain genome stability.
  findings: []
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Defines the FANCM-MHF DNA-remodeling complex; MHF stimulates FANCM DNA binding and fork
      remodeling; both recruited to ICL-stalled forks; FANCM-MHF part of FA core complex and BRAFT
      supercomplex; suppresses SCE. Abstract cached.
- id: PMID:20347429
  title: MHF1-MHF2, a histone-fold-containing protein complex, participates in the
    Fanconi anemia pathway via FANCM.
  findings: []
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Full text available. Identifies MHF1/MHF2 (CENPS/CENPX) as FA core complex components; MHF binds
      DNA and stimulates FANCM branch migration (ATP- and K117-dependent); FANCM restricted to
      chromatin fraction. Central to DNA-binding, chromatin, complex, and translocase annotations.
