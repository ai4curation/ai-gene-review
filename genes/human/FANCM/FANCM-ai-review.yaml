    label: double-strand break repair via synthesis-dependent strand annealing
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: involved_in
  review:
    summary: >-
      Yeast orthologs (Mph1/Fml1) promote synthesis-dependent strand annealing / gene conversion at
      blocked forks and channel recombination toward non-crossover outcomes. Human FANCM has a
