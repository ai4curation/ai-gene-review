- term:
    id: GO:0003724
    label: RNA helicase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000003
  qualifier: enables
  review:
    summary: >-
      This annotation derives from an EC:3.6.4.13 -> GO mapping and the legacy alternative name
      "ATP-dependent RNA helicase FANCM". Functionally FANCM is a DNA-dependent ATPase / DNA
      translocase; no RNA helicase activity has been demonstrated. Its measured catalytic reaction is
      simply ATP hydrolysis, and its substrates are DNA structures.
    action: REMOVE
    reason: >-
      Demonstrably incorrect EC-based electronic mapping: FANCM acts on DNA (translocase/branch
      migration), not RNA. The EC 3.6.4.13 assignment reflects ATP hydrolase activity, not genuine
      RNA helicase function.
    supported_by:
