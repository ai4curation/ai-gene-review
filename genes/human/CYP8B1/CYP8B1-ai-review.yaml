description: >-
  CYP8B1 (sterol 12-alpha-hydroxylase; 7-alpha-hydroxycholest-4-en-3-one 12-alpha-hydroxylase;
  cytochrome P450 8B1; EC 1.14.14.139) is a liver-enriched, endoplasmic-reticulum-membrane
  heme-thiolate cytochrome P450. It is the branch-point enzyme of the classic (neutral) bile-acid
  synthesis pathway: as a monooxygenase using O2 and electrons from NADPH--cytochrome P450 reductase,
  it 12-alpha-hydroxylates 7-alpha-hydroxycholest-4-en-3-one and related C27 sterol intermediates
  (including 3-alpha,7-alpha-dihydroxy-5-beta-cholestan-26-oate/DHCA and, in vitro, chenodeoxycholate).
  Because 12-alpha-hydroxylation commits intermediates toward cholic acid rather than
  chenodeoxycholic acid, CYP8B1 sets the cholic-acid:chenodeoxycholic-acid ratio and thereby the
  hydrophobicity and cholesterol-solubilizing properties of the bile-acid pool. It is a single-pass,
  N-terminally anchored microsomal protein that coordinates its catalytic heme iron through a
  conserved axial cysteine.
