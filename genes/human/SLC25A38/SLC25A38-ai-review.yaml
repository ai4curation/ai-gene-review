gene_symbol: SLC25A38
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  SLC25A38 is a mitochondrial glycine carrier of the SLC25 (mitochondrial carrier,
  TC 2.A.29) family. It is a multi-pass inner-membrane transport protein with the
  canonical mitochondrial-carrier architecture of three tandem Solcar repeats and six
  transmembrane helices. Its molecular function is to import glycine from the cytosol
  across the inner membrane into the mitochondrial matrix. The imported glycine supplies
  the substrate for the first, committed step of heme biosynthesis, in which
  5-aminolevulinate synthase condenses glycine with succinyl-CoA to form 5-aminolevulinate;
  it also feeds mitochondrial glycine/one-carbon metabolism. SLC25A38 is preferentially
  expressed in erythroid cells and is required during erythropoiesis, where heme production
  is high. The yeast orthologue is Hem25p. Loss-of-function variants cause autosomal
  recessive, pyridoxine-refractory congenital sideroblastic anemia (SIDBA2), reflecting
  impaired mitochondrial glycine supply for heme synthesis.
