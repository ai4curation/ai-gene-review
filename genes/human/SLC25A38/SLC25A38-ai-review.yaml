    Imports glycine across the mitochondrial inner membrane into the matrix, supplying
    the glycine substrate for the first committed step of heme biosynthesis (ALA synthase:
    glycine + succinyl-CoA -> 5-aminolevulinate), particularly in erythroid cells.
