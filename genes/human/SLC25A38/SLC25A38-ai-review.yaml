- id: PMID:19412178
  title: Mutations in mitochondrial carrier family gene SLC25A38 cause nonsyndromic
    autosomal recessive congenital sideroblastic anemia.
  findings:
  - statement: >-
      Positional cloning identified biallelic SLC25A38 mutations as the cause of a
      nonsyndromic autosomal recessive congenital sideroblastic anemia, establishing
      that the erythroid-specific mitochondrial carrier SLC25A38 is important for heme
      biosynthesis in eukaryotes.
    supporting_text: >-
      define a previously unknown form of autosomal recessive nonsyndromic congenital
      sideroblastic anemia, associated with mutations in the gene encoding the erythroid
      specific mitochondrial carrier family protein SLC25A38, and demonstrate that
      SLC25A38 is important for the biosynthesis of heme in eukaryotes.
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified primary paper defining SIDBA2. Abstract-only cache
      (full_text_available: false), but abstract directly supports the heme-biosynthesis
      and erythroid roles and the disease association; UniProt records the SIDBA2
      variants (Glu-130, His-134, Pro-187, His-209) from this paper.
- id: PMID:27476175
  title: Characterization of Human and Yeast Mitochondrial Glycine Carriers with Implications
    for Heme Biosynthesis and Anemia.
  findings:
  - statement: >-
      Biochemical characterization of reconstituted human SLC25A38 and yeast Hem25p
      identified them as mitochondrial glycine carriers; hem25Δ shows reduced ALA, heme
      and cytochromes, rescued by human SLC25A38, providing definitive evidence of the
      glycine transport function required for heme synthesis.
    supporting_text: >-
      Hem25p and its human orthologue SLC25A38 are the main mitochondrial glycine
      transporters required for heme synthesis, providing definitive evidence of their
      previously proposed glycine transport function.
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified. Direct experimental (IMP) basis for the glycine transporter
      activity and glycine-import annotations. Abstract-only cache but abstract is
      explicit about the transport reaction and heme link.
