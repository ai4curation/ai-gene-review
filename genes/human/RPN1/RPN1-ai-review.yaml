  - statement: >-
      Ribophorin I is present in all isolated mammalian OST subcomplexes, supporting its
      membership in the OST complex and contribution to its glycotransferase activity.
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Biochemical proteomics of mammalian OST; explicitly lists ribophorin I as an OST subunit.
      Basis of the contributes_to GO:0004579 TAS annotation.
- id: PMID:17081065
  title: Proteomic and bioinformatic characterization of the biogenesis and function
    of melanosomes.
  findings:
  - statement: >-
      Detects RPN1 in melanosome proteomes across developmental stages; consistent with ER-protein
      co-purification rather than a melanosome-specific role.
  reference_review:
    relevance: LOW
    correctness: VERIFIED
    review_notes: >-
      Correctly cited melanosome proteomics; supports the melanosome CC as a co-purified ER
      protein, not a core localization.
- id: PMID:17264154
  title: Ribophorin I acts as a substrate-specific facilitator of N-glycosylation.
  findings:
  - statement: >-
      RNAi depletion of ribophorin I dramatically reduces N-glycosylation of selected membrane
      proteins; RPN1 acts as a chaperone/escort presenting substrates to the catalytic STT3
      subunits, and is not essential for N-glycosylation per se.
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Directly about RPN1 function; establishes the substrate-specific facilitator model.
      Supports the IMP for protein N-linked glycosylation and the facilitator core function.
- id: PMID:19167329
  title: Cotranslational and posttranslational N-glycosylation of polypeptides by
    distinct mammalian OST isoforms.
  findings:
  - statement: >-
      Ribophorin I depletion co-reduces both STT3A and STT3B and lowers OST activity, placing RPN1
      in a shared complex with the two catalytic isoforms.
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Full text assays ribophorin I directly; supports OST membership and interaction with STT3A/
      STT3B. Basis of the STT3B IPI annotation.
- id: PMID:19946888
  title: Defining the membrane proteome of NK cells.
  findings:
  - statement: >-
      High-throughput MS membrane-proteome dataset in which RPN1 is detected; supports only a
      generic membrane localization.
  reference_review:
    relevance: LOW
    correctness: VERIFIED
- id: PMID:22658674
  title: Insights into RNA biology from an atlas of mammalian mRNA-binding proteins.
  findings:
  - statement: >-
      Global mRNA-interactome-capture screen assigning RPN1 as an RNA-binding protein; likely
      reflects its cytoplasmic contact with the translating ribosome rather than sequence-specific
      RNA binding.
  reference_review:
    relevance: LOW
    correctness: LOW_QUALITY
    review_notes: >-
      Correctly cited high-throughput RBP atlas, but the RNA-binding assignment is a screen-level
      call without a defined molecular function for RPN1; treated as an over-annotation.
- id: PMID:22988243
  title: Malectin forms a complex with ribophorin I for enhanced association with
    misfolded glycoproteins.
  findings:
  - statement: >-
      RPN1 forms a stable complex with the ER lectin malectin, enhancing association with misfolded
      glycoproteins; RPN1 may act as a chaperone recognizing misfolded proteins.
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: >-
      Directly about the RPN1-malectin complex; supports a glycoprotein quality-control adapter
      role. Basis of the MLEC IPI annotation.
- id: PMID:25416956
  title: A proteome-scale map of the human interactome network.
  findings:
  - statement: >-
      High-throughput Y2H interactome mapping RPN1 interactions (e.g. SGTA, UBQLN1).
  reference_review:
    relevance: LOW
    correctness: VERIFIED
- id: PMID:27974209
  title: TMEM258 Is a Component of the Oligosaccharyltransferase Complex Controlling
    ER Stress and Intestinal Inflammation.
  findings:
  - statement: >-
      TMEM258 is a required OST component essential for N-linked glycosylation; RPN1 and TMEM258
      form STT3A subcomplex 1, consistent with the recorded RPN1-TMEM258 interaction.
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
- id: PMID:30021884
  title: Histone Interaction Landscapes Visualized by Crosslinking Mass Spectrometry
    in Intact Cell Nuclei.
  findings:
  - statement: >-
      Crosslinking-MS dataset recording RPN1 interactions with OST partners including STT3A, STT3B
      and malectin.
  reference_review:
    relevance: LOW
    correctness: VERIFIED
- id: PMID:31515488
  title: Extensive disruption of protein interactions by genetic variants across the
    allele frequency spectrum in human populations.
  findings:
  - statement: >-
      Interactome-variant screen recording RPN1 interactions (SGTA, UBQLN1).
  reference_review:
    relevance: LOW
    correctness: VERIFIED
- id: PMID:31831667
  title: Cryo-electron microscopy structures of human oligosaccharyltransferase complexes
    OST-A and OST-B.
  findings:
  - statement: >-
      Cryo-EM structures assign RPN1 as a subunit of both OST-A and OST-B; in OST-A its
      cytoplasmic region forms a ribosome-binding four-helix bundle, disordered in OST-B.
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Structural basis for RPN1 membership in both OST complexes and its cotranslational
      substrate-presentation role. Supports GO:0160226/GO:0160227 IDAs.
- id: PMID:32296183
  title: A reference map of the human binary protein interactome.
  findings:
  - statement: >-
      Binary interactome (HuRI) recording RPN1 interactions (SGTA, CAMLG, KRTAP1-3).
  reference_review:
    relevance: LOW
    correctness: VERIFIED
- id: PMID:32707033
  title: Kinase Interaction Network Expands Functional and Disease Roles of Human
    Kinases.
  findings:
  - statement: >-
      Kinase-interaction network recording an RPN1-POMK interaction.
  reference_review:
    relevance: LOW
    correctness: VERIFIED
- id: PMID:35271311
  title: 'OpenCell: Endogenous tagging for the cartography of human cellular organization.'
  findings:
  - statement: >-
      Endogenous-tagging interactome recapitulating RPN1 associations with STT3A, STT3B and
      malectin, consistent with OST membership.
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
- id: PMID:36697828
  title: Visualization of translation and protein biogenesis at the ER membrane.
  findings:
  - statement: >-
      In situ cryo-ET visualization of the OST complex (including RPN1) as part of the OST-A
      assembly at the translating ER membrane.
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
- id: PMID:38670073
  title: Positive selection CRISPR screens reveal a druggable pocket in an oligosaccharyltransferase
    required for inflammatory signaling to NF-κB.
  findings:
  - statement: >-
      CRISPR/cryo-EM characterization of the OST-A (STT3A) complex, with RPN1 modeled as an OST-A
      subunit; OST-A is required for TLR4 N-glycosylation and NF-kB signaling.
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
- id: PMID:9642163
  title: 'Interleukin-2 induces N-glycosylation in T-cells: characterization of human
    lymphocyte oligosaccharyltransferase.'
  findings:
  - statement: >-
      Purification of human lymphocyte OST identified ribophorin I (with ribophorin II and a Wbp1
      homolog) as a predominant subunit of the N-glycosylation enzyme.
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Biochemical purification directly identifying ribophorin I in the human OST enzyme.
      Supports the IDA for OST complex membership and N-linked glycosylation.
