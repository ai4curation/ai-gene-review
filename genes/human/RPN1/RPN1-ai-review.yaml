id: P04843
gene_symbol: RPN1
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  RPN1 (ribophorin I) is a single-pass type I endoplasmic reticulum membrane glycoprotein
  and a non-catalytic core subunit of the oligosaccharyltransferase (OST) complex. OST
  catalyzes the first committed step of protein N-linked glycosylation, transferring a
  preassembled Glc3Man9GlcNAc2 glycan en bloc from the lipid carrier dolichol-pyrophosphate
  onto asparagine residues within Asn-X-Ser/Thr sequons of nascent secretory and membrane
  polypeptides, largely cotranslationally as substrates emerge from the Sec61 translocon.
  RPN1 is a shared subunit of both OST complexes, the cotranslationally acting STT3A complex
  (OST-A) and the post-translocationally acting STT3B complex (OST-B); the catalytic activity
  resides in the STT3A/STT3B subunits, while RPN1 contributes structurally and functions in
  recognition and presentation of nascent-chain substrates to the catalytic center. In the
  STT3A complex its cytoplasmic region forms a four-helix bundle that can engage the
  translating ribosome, and it enhances N-glycosylation of a subset of substrates, acting as a
  substrate-specific facilitator. RPN1 resides in the rough endoplasmic reticulum membrane, has
  a large lumenal domain, a single transmembrane helix, and a shorter cytoplasmic tail.
