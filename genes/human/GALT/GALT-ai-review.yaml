id: P07902
gene_symbol: GALT
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  GALT (galactose-1-phosphate uridylyltransferase; EC 2.7.7.12) is a cytosolic
  enzyme that catalyzes the third, central step of the Leloir pathway of
  galactose metabolism: it reversibly transfers a uridylyl (UMP) group from
  UDP-alpha-D-glucose to alpha-D-galactose 1-phosphate, producing
  alpha-D-glucose 1-phosphate and UDP-alpha-D-galactose. Catalysis proceeds by a
  double-displacement (ping-pong) mechanism in which the transferred UMP is held
  as a covalent phospho-histidine intermediate on active-site His186 (within the
  His-Pro-His motif) before it is passed to the incoming hexose-1-phosphate. The
  enzyme is an obligate homodimer, with each active site built from residues
  contributed by both subunits, and binds zinc at a site distinct from the
  active site that stabilizes the fold and suppresses aggregation. By
  regenerating UDP-glucose and interconverting UDP-hexoses, GALT couples dietary
  and endogenous galactose to glycolysis and to the pool of nucleotide sugars
  used for glycoconjugate synthesis. Loss of GALT activity causes classic
  (type I) galactosemia, the most severe galactosemia, an autosomal recessive
  disorder in which galactose-1-phosphate and galactitol accumulate on milk
  feeding, producing neonatal hepatic and renal failure, cataracts, bleeding
  diathesis and E. coli sepsis, and, despite dietary galactose restriction,
  long-term cognitive, speech, motor, and (in females) ovarian complications.
