proposed_new_terms: []
suggested_questions:
  - question: >-
      Beyond the canonical Leloir catabolic direction, how quantitatively
      important is GALT's contribution to interconverting UDP-hexoses that feed
      glycoconjugate/glycan synthesis, and does impaired glycosylation
      contribute independently to the long-term complications of classic
      galactosemia?
  - question: >-
      What is the physiological stoichiometry and role of zinc binding in human
      GALT in vivo, and does metal occupancy modulate the folding and
      aggregation of common misfolding variants such as Q188R?
suggested_experiments:
  - hypothesis: >-
      Small-molecule stabilizers can rescue the activity and reduce aggregation
      of common misfolding GALT variants.
    description: >-
      Structure-guided pharmacological-chaperone/stabilizer screening for common
      misfolding GALT variants (e.g. Q188R, K285N), measuring rescue of
      uridylyltransferase activity, thermal stability, and aggregation in
      cellular models.
    experiment_type: biochemical/cell-based screen
  - hypothesis: >-
      Toxicity in classic galactosemia arises from distinguishable contributions
      of galactose-1-phosphate accumulation, UDP-hexose depletion, and altered
      glycosylation.
    description: >-
      Quantitative flux and metabolomic profiling in GALT-deficient versus
      gene-corrected human cells and organoids to dissect the relative
      contributions of galactose-1-phosphate accumulation, UDP-hexose depletion,
      and altered glycosylation to cellular toxicity.
    experiment_type: metabolomics/isotope flux
