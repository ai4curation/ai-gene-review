id: O43502
gene_symbol: RAD51C
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  RAD51C (RAD51 paralog C; RAD51L2; DNA repair protein RAD51 homolog 3; FANCO) is one of
  five human RAD51 paralogs and the only one shared between the two paralog complexes:
  BCDX2 (RAD51B-RAD51C-RAD51D-XRCC2) and CX3 (RAD51C-XRCC3). It is a RecA/RAD51-family
  protein with Walker A/B nucleotide-binding motifs that binds single-stranded DNA and
  branched DNA structures such as replication forks and Holliday junctions. Within its
  complexes it acts as a mediator of homologous recombination: through coupled ATP binding
  and hydrolysis it promotes nucleation and extension of the RAD51 recombinase nucleoprotein
  filament on RPA-coated single-stranded DNA. BCDX2 acts early, downstream of BRCA2 and
  upstream of RAD51 loading, to assemble and stabilize RAD51 filaments and to protect and
  restart stalled replication forks; CX3 acts later, binding D-loop and Holliday-junction
  intermediates and promoting branch migration and resolution. RAD51C is required for
  repair of DNA double-strand breaks and interstrand crosslinks, for RAD51 focus formation,
  sister chromatid cohesion, and genome stability. It also accumulates at damage sites
  (dependent on ATM, NBS1 and RPA) and facilitates activation of the CHK2 checkpoint kinase,
  coupling damage sensing to cell-cycle arrest. Additional reported roles include maintenance
  of mitochondrial DNA copy number under oxidative stress and meiotic recombination.
  Biallelic loss of function causes a Fanconi anemia-like disorder (complementation group O,
  FANCO); monoallelic germline mutations predispose to hereditary breast and ovarian cancer
  (BROVCA3).
