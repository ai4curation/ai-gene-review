- id: PMID:11751635
  title: Identification and purification of two distinct complexes containing the
    five RAD51 paralogs.
  findings: []
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      PubMed/PMC-verified. Establishes the two RAD51C-containing complexes (BCDX2 and CX3) by
      purification and shows BCDX2 binds ssDNA, ss gaps and nicks. Foundational for the complex
      and DNA-binding annotations.
- id: PMID:11751636
  title: Mediator function of the human Rad51B-Rad51C complex in Rad51/RPA-catalyzed
    DNA strand exchange.
  findings: []
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Verified (PubMed abstract). Original biochemical demonstration that the RAD51B-RAD51C
      complex has ssDNA-binding and ssDNA-stimulated ATPase activity and acts as a recombination
      mediator by partially relieving RPA competition for ssDNA, promoting RAD51-ssDNA filament
      assembly. Primary support for the BCDX2 HR-mediator core function (previously supported only
      by the later cryo-EM and epistasis papers).
- id: PMID:11842113
  title: Involvement of Rad51C in two distinct protein complexes of Rad51 paralogs
    in human cells.
  findings: []
- id: PMID:12000837
  title: Mammalian Rad51C contributes to DNA cross-link resistance, sister chromatid
    cohesion and genomic stability.
  findings: []
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: >-
      Verified (PMC full text). RAD51C-mutant hamster CL-V4B cells show cross-link (MMC/cisplatin)
      hypersensitivity, impaired RAD51 focus formation, genomic instability, and a reduced level
      of sister chromatid cohesion (complemented by Rad51C cDNA). Direct experimental support for
      the sister-chromatid-cohesion (GO:0007062) and ICL-repair annotations.
- id: PMID:12966089
  title: Identification of functional domains in the RAD51L2 (RAD51C) protein and
    its requirement for gene conversion.
  findings: []
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Verified. Shows RAD51C ATP-binding domain (K131) is required for function, nuclear
      localization with a C-terminal NLS, and a requirement for gene conversion (HR).
- id: PMID:14716019
  title: RAD51C is required for Holliday junction processing in mammalian cells.
  findings: []
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Verified. RAD51C depletion reduces branch migration/HJ resolvase activity in extracts.
      Supports RAD51C's role in HJ processing, but the endonucleolytic catalysis was later
      attributed to GEN1; hence the crossover-junction endonuclease MF is marked over-annotated.
- id: PMID:16215984
  title: Cellular localization of human Rad51C and regulation of ubiquitin-mediated
    proteolysis of Rad51.
  findings: []
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: >-
      Verified. Detects endogenous RAD51C in nucleus, cytoplasm and perinuclear region and shows
      RAD51C regulates ubiquitin-mediated RAD51 proteolysis.
- id: PMID:16395335
  title: Interplay between human DNA repair proteins at a unique double-strand break
    in vivo.
  findings: []
- id: PMID:17114795
  title: Role of RAD51C and XRCC3 in genetic recombination and DNA repair.
  findings: []
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: >-
      Verified (PubMed abstract). Shows RAD51C localizes to mouse meiotic chromosomes at
      pachytene/diplotene and that Holliday-junction resolvase activity co-elutes with the CX3
      (RAD51C-XRCC3) complex, which associates with crossovers. Supports the non-core meiotic
      reciprocal-recombination annotation.
