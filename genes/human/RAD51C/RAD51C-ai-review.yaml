proposed_new_terms: []
suggested_questions:
- question: >-
    Does RAD51C possess intrinsic catalytic activity beyond ATP hydrolysis, or is its function
    entirely as a DNA-binding, RAD51-filament mediator within BCDX2 and CX3?
- question: >-
    What is the mechanistic basis by which RAD51C is required for CHK2 activation - a direct
    scaffolding role at damage sites or an indirect consequence of HR intermediate processing?
suggested_experiments:
- description: >-
    Structure-guided separation-of-function mutants that uncouple RAD51C ssDNA binding, ATP
    hydrolysis, and RAD51-filament stimulation, tested for HR, fork protection, and checkpoint
    signaling.
- description: >-
    Reconstituted assays with purified CX3 to define whether RAD51C/XRCC3 directly drive branch
    migration independently of GEN1-mediated junction cleavage.
