- term:
    id: GO:0000707
    label: meiotic DNA recombinase assembly
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: involved_in
  review:
    summary: >-
      RAD51 paralogs promote recombinase (RAD51/DMC1) filament assembly, including in meiosis;
      inferred phylogenetically from yeast Rad55/Rad57-type mediators and supported by the
      mammalian mediator role in RAD51 filament assembly.
    action: KEEP_AS_NON_CORE
    reason: >-
      Meiotic recombinase assembly is a plausible conserved role, but for human RAD51C the
      dominant, experimentally characterized function is mitotic/somatic HR mediation. Retained
      as a non-core, meiosis-specific function. Supported in the mouse ortholog: hypomorphic
      Rad51c spermatocytes arrest in early meiotic prophase I, evidencing a role in early
      RAD51-mediated (recombinase-assembly) meiotic recombination.
    supported_by:
    - reference_id: PMID:17312021
      supporting_text: providing evidence for the role of RAD51C in early stages of RAD51-mediated
        recombination
- term:
    id: GO:0007131
    label: reciprocal meiotic recombination
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: involved_in
  review:
    summary: >-
      Phylogenetically inferred meiotic crossover recombination role, consistent with the
      RAD51 paralog family's function in recombination.
    action: KEEP_AS_NON_CORE
    reason: >-
      Legitimate conserved meiotic role but not the core somatic HR-mediator function that
      defines human RAD51C. Kept as non-core. Corroborated by mouse data: RAD51C localizes to
      meiotic chromosomes and the RAD51C-XRCC3 resolvase complex associates with crossovers,
      resolving recombination intermediates before chromosome segregation.
    supported_by:
