- term:
    id: GO:0036297
    label: interstrand cross-link repair
  evidence_type: IMP
  original_reference_id: PMID:20400963
  qualifier: involved_in
  review:
    summary: >-
      RAD51C is the Fanconi anemia complementation group O (FANCO) gene; biallelic loss of
      function causes an FA-like disorder with hypersensitivity to DNA interstrand cross-linking
      agents (mitomycin C, cisplatin). RAD51C acts downstream in the ICL-repair pathway (via
      homologous recombination), not in ICL unhooking or FANCD2 monoubiquitination. This specific
      process is only captured broadly by DNA repair / DSB-repair-via-HR in the existing GOA set.
    action: NEW
    reason: >-
      Interstrand cross-link repair is a core, defining, well-evidenced function of RAD51C
      (FANCO): patient/mutant cells are hypersensitive to ICL agents and biallelic mutation
      causes a Fanconi anemia-like syndrome. GO:0036297 is the appropriate specific biological
      process term (active BP, verified via QuickGO), more precise than the existing GO:0006281
      DNA repair parent.
    supported_by:
    - reference_id: PMID:20400963
      supporting_text: increased cellular sensitivity to the DNA interstrand cross-linking agent
        mitomycin C and the topoisomerase-1 inhibitor camptothecin
    - reference_id: PMID:20400963
      supporting_text: biallelic germline mutations in a RAD51 paralog are associated with an
        FA-like syndrome
core_functions:
- description: >-
    As a subunit of the BCDX2 complex (RAD51B-RAD51C-RAD51D-XRCC2), RAD51C binds
    single-stranded and branched DNA and, through the coupled ATP-binding/hydrolysis activity
    of RAD51B and RAD51C, acts as a recombination mediator that promotes nucleation and
    extension of the RAD51 recombinase nucleoprotein filament on RPA-coated ssDNA. This
    early (downstream of BRCA2, upstream of RAD51 loading) step is required for homologous
    recombination repair of DNA double-strand breaks and interstrand crosslinks.
  supported_by:
  - reference_id: PMID:37344587
    supporting_text: BCDX2 stimulates the nucleation and extension of RAD51
  - reference_id: PMID:23149936
    supporting_text: the BCDX2 complex acts downstream of BRCA2 recruitment but
  - reference_id: PMID:11751636
    supporting_text: The competition by RPA for substrate binding can be partially
      alleviated by Rad51B-Rad51C
  molecular_function:
    id: GO:0140664
    label: ATP-dependent DNA damage sensor activity
  directly_involved_in:
  - id: GO:0000724
    label: double-strand break repair via homologous recombination
  - id: GO:0006281
    label: DNA repair
  locations:
  - id: GO:0005654
    label: nucleoplasm
  in_complex:
    id: GO:0033063
    label: Rad51B-Rad51C-Rad51D-XRCC2 complex
- description: >-
    RAD51C-containing paralog complexes bind replication-fork and Holliday-junction DNA with
    high specificity via four-way junction DNA binding, protecting nascent DNA at stalled
    forks and promoting ATP-hydrolysis-dependent replication restart, thereby preventing
    fork collapse and preserving genome stability.
  supported_by:
  - reference_id: PMID:20207730
    supporting_text: both complexes bind with exceptionally high specificity to the DNA junctions
  - reference_id: PMID:26354865
    supporting_text: RAD51C and XRCC3 promote the restart of stalled replication
