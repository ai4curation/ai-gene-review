      human extracts, but RAD51C is a RecA-fold ATPase mediator with no nuclease active site;
      the resolvase catalysis is contributed by GEN1, not RAD51C.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      The experimental result (PMID:14716019) shows RAD51C is required for HJ processing
      activity in extracts, which the annotation reasonably reflects with contributes_to.
      However, subsequent work assigned the actual endonucleolytic resolution to GEN1 (acting
      with XRCC3); RAD51C promotes branch migration/resolution without possessing endonuclease
      activity itself. Attributing this catalytic molecular function to RAD51C is an
      over-annotation. Not removed, since the paper's experimental support is genuine.
