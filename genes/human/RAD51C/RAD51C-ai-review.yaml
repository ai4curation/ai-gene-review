- term:
    id: GO:0008821
    label: crossover junction DNA endonuclease activity
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: contributes_to
  review:
    summary: >-
      RAD51C participates in Holliday-junction branch migration and resolution as part of
      CX3, but it is a RecA-fold ATPase mediator with no nuclease catalytic residues; the
      endonucleolytic cleavage activity itself is not a molecular function of RAD51C.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      Depletion of RAD51C reduces branch migration and HJ resolvase activity in extracts
      (PMID:14716019), but the actual endonuclease/resolvase catalysis was subsequently
      attributed to GEN1 acting with XRCC3; RAD51C contributes to processing without itself
      catalyzing junction cleavage. Assigning the endonuclease molecular function to RAD51C
      (even with contributes_to) over-annotates its biochemistry. Its role in HJ processing
      is better captured by DNA recombination / DSB-repair-via-HR terms.
    propagation_review:
