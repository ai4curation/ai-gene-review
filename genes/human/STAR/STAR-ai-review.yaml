suggested_questions:
- question: >-
    Which cholesterol-binding partners at the outer mitochondrial membrane (e.g.
    TSPO, VDAC1) form the functional StAR transfer complex in vivo, and are any
    of the high-throughput interactome hits functionally relevant?
- question: >-
    How is StAR's transient outer-membrane residence and rapid matrix import/
    degradation coupled to the minute-scale acute regulation of steroid output?
suggested_experiments:
- description: >-
    Reconstitute StAR-mediated cholesterol transfer with defined outer-membrane
    proteins to define the minimal functional transfer machinery.
- description: >-
    Systematically test whether any curated StAR protein-protein interactions
    (IntAct) modulate cholesterol transfer or steroidogenic output.
