id: P49675
gene_symbol: STAR
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  STAR (steroidogenic acute regulatory protein, StAR; also StARD1) is a
  START-domain (StAR-related lipid transfer) cholesterol-binding protein that
  mediates the rate-limiting, acute step of steroid hormone biosynthesis. It is
  not an enzyme; its molecular function is cholesterol binding and cholesterol
  transfer. StAR delivers cholesterol from the outer to the inner mitochondrial
  membrane, where the cytochrome P450 side-chain cleavage enzyme CYP11A1
  converts it to pregnenolone, the common precursor of all steroid hormones.
  Although the mature protein is imported into the mitochondrial matrix, its
  functional site of action is the mitochondrial outer membrane, which it
  occupies only transiently. STAR is expressed in steroidogenic tissues,
  principally the adrenal cortex and gonads (and kidney). Because cholesterol
  delivery across the mitochondrial membranes is rate-limiting for
  steroidogenesis, StAR is the acute (minutes-scale) regulator of steroid
  output. Loss-of-function mutations cause congenital lipoid adrenal hyperplasia
  (lipoid CAH; adrenal hyperplasia 1), a severe deficiency of all adrenal and
  gonadal steroids accompanied by lipid accumulation in steroidogenic cells.
