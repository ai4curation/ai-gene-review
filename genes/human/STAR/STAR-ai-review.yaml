  review:
    summary: >-
      Phylogenetic (IBA) annotation placing STAR in the steroid biosynthetic
      process. Correct at a broad level: StAR is essential for steroidogenesis
      by delivering cholesterol to CYP11A1 for conversion to pregnenolone, the
      committed precursor of all steroid hormones. StAR itself is not a
      biosynthetic enzyme but is indispensable to the pathway.
