- term:
    id: GO:0070859
    label: positive regulation of bile acid biosynthetic process
  evidence_type: IDA
  original_reference_id: PMID:18403318
  qualifier: involved_in
  review:
    summary: >-
      IDA annotation for positive regulation of bile acid biosynthesis. However,
      the cited study demonstrates this phenotype for the paralog StarD4 (StarD4
      overexpression in hepatocytes increased bile acid synthesis), not for
      STAR/StARD1. STAR is not an established regulator of hepatic bile acid
      biosynthesis and is expressed in steroidogenic tissues, not liver.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      The bile-acid biosynthesis phenotype in this paper is a StarD4 property;
      the abstract attributes the increased bile acid synthesis to StarD4
      overexpression in hepatocytes, not to STAR. Following the policy against
      REMOVE of experimental annotations whose full text is not verifiable, this
      is flagged as over-annotated rather than removed; it is not a core StAR
      function.
    supported_by:
    - reference_id: PMID:18403318
      supporting_text: the rates of bile acid synthesis.
