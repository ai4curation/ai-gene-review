- id: PMID:15308631
  title: Overexpression of human diacylglycerol acyltransferase 1, acyl-coa:cholesterol
    acyltransferase 1, or acyl-CoA:cholesterol acyltransferase 2 stimulates secretion
    of apolipoprotein B-containing lipoproteins in McA-RH7777 cells.
  findings: []
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified. Overexpression of human DGAT1 in rat hepatoma cells increases
      TG synthesis and VLDL/apoB secretion. Supports a contributory role in VLDL
      assembly / lipid transport, but the effect is via TG loading in an overexpression
      system, not a demonstrated physiological requirement.
- id: PMID:16214399
  title: 'Acyl coenzyme A dependent retinol esterification by acyl coenzyme A: diacylglycerol
    acyltransferase 1.'
  findings: []
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified. Biochemically demonstrates DGAT1 acyl-CoA:retinol
      acyltransferase (ARAT) activity (EC 2.3.1.76) with defined Km values; DGAT1 is
      the major ARAT in Caco-2 cells. Establishes the secondary retinol-esterifying
      activity.
