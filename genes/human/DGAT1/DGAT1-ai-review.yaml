- id: PMID:28420705
  title: Synthesis of neutral ether lipid monoalkyl-diacylglycerol by lipid acyltransferases.
  findings: []
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified, full text available. DGAT1 uses 1-monoalkylglycerol as an acyl
      acceptor to synthesize monoalkyl-mono/di-acylglycerol; DGAT1 is the predominant
      enzyme for intracellular MADAG synthesis in CHO-K1 cells. Demonstrates broad
      acyl-acceptor specificity including a monoacylglycerol-acylation step.
- id: PMID:32433610
  title: Structure and mechanism of human diacylglycerol O-acyltransferase 1.
  findings: []
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified, full text available. Cryo-EM structure of human DGAT1 in complex
      with oleoyl-CoA; defines the nine-TM MBOAT fold, the ER-membrane reaction chamber,
      the catalytic His415/Glu416, and the homodimer/homotetramer states. Primary
      source for the MF (GO:0004144), CC, and IPI (self) annotations.
