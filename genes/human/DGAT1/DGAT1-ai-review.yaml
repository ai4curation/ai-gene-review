id: O75907
gene_symbol: DGAT1
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  DGAT1 (diacylglycerol O-acyltransferase 1) is a multi-pass endoplasmic reticulum
  membrane enzyme of the membrane-bound O-acyltransferase (MBOAT) family that catalyzes
  the terminal and only committed step of triacylglycerol (TAG) biosynthesis: transfer
  of a long-chain acyl group from acyl-CoA to the sn-3 hydroxyl of 1,2-diacyl-sn-glycerol
  (DAG), yielding triacyl-sn-glycerol and CoA (EC 2.3.1.20). The nine-transmembrane-helix
  MBOAT fold forms a hydrophobic reaction chamber in the ER membrane with an invariant
  catalytic histidine (His415) and separate entrances for the acyl-CoA and DAG substrates;
  the enzyme functions as a homodimer or homotetramer. DGAT1 has a broad acyl-acceptor
  specificity and, besides DAG, can esterify monoacylglycerol (MGAT activity), retinol
  (acyl-CoA:retinol acyltransferase, ARAT; EC 2.3.1.76, generating retinyl esters),
  long-chain alcohols (wax ester synthesis), and monoalkylglycerols (ether-lipid
  synthesis). It is highly expressed in small-intestine epithelium, where its activity
  is essential for dietary fat absorption, and in liver and mammary gland, where it
  drives fat storage and milk-fat production; in skin it is the major ARAT maintaining
  retinoid homeostasis. Biallelic loss-of-function mutations cause a congenital
  diarrheal disorder with protein-losing enteropathy (DIAR7).
