- term:
    id: GO:0006751
    label: glutathione catabolic process
  evidence_type: IDA
  original_reference_id: PMID:18515354
  qualifier: involved_in
  review:
    summary: >-
      Proposed core biological process. By converting the gamma-glutamyl dipeptides
      produced during glutathione degradation (via GGT1) into 5-oxoproline plus the
      free amino acid, GGCT participates in the glutathione recycling / catabolic arm
      of the gamma-glutamyl cycle, contributing to glutathione homeostasis. This BP
      is not explicitly present in GOA but is the process context of the enzyme's
      well-established catalytic function.
    action: NEW
    supported_by:
