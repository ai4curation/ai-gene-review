id: O75223
gene_symbol: GGCT
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  GGCT (gamma-glutamylcyclotransferase; EC 4.3.2.9; formerly C7orf24) is a
  cytosolic enzyme of the gamma-glutamyl cycle that mediates glutathione turnover.
  It acts on the (L-gamma-glutamyl)-L-amino acids generated by gamma-glutamyl
  transpeptidase (GGT1), catalyzing an intramolecular cyclization that releases the
  free L-amino acid and converts the gamma-glutamyl moiety to 5-oxo-L-proline
  (pyroglutamate). The 5-oxoproline is subsequently reconverted to glutamate by
  5-oxoprolinase (OPLAH), regenerating glutamate for glutathione biosynthesis and
  thereby closing the cycle; GGCT thus contributes to glutathione homeostasis. The
  protein is a homodimer of ~21-kDa subunits adopting the gamma-glutamyl
  cyclotransferase (BtrG-like) fold, with a conserved active-site glutamate (Glu98)
  acting as a general acid/base. It has also been described as a cancer-associated
  antigen and, under overexpression, as a cytochrome c-releasing factor (CRF21).
