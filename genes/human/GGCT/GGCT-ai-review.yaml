  evidence_type: IMP
  original_reference_id: PMID:16765912
  qualifier: involved_in
  review:
    summary: >-
      Experimental (IMP) annotation from the study that purified GGCT as cytochrome
      c-releasing factor 21 (CRF21): overexpression in HeLa cells induced release of
      cytochrome c from mitochondria and subsequent apoptosis, and the factor was
      induced by geranylgeraniol in U937 leukemia cells. This is a genuine
      experimental phenotype and is retained, but it reflects an overexpression /
      context-specific pro-apoptotic activity rather than the core gamma-glutamyl-cycle
      enzymatic function of the gene, so it is kept as non-core.
    action: KEEP_AS_NON_CORE
