      supporting_text: >-
        identified C7orf24 as gamma-glutamyl cyclotransferase (GGCT) that catalyzes
        the formation of 5-oxoproline (pyroglutamic acid) from gamma-glutamyl
        dipeptides and potentially plays a significant role in glutathione
        homeostasis
