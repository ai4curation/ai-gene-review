# ===== IBA ANNOTATIONS =====
- term:
    id: GO:0005794
    label: Golgi apparatus
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      IBA annotation based on phylogenetic inference. GOSR2/membrin is well-established as a
      Golgi-localized protein. Lowe et al. (PMID:9349823) identified GS27 as "associated with
      the Golgi apparatus." UniProt subcellular location confirms Golgi apparatus membrane
      localization. This is consistent with IDA evidence from PMID:16081076 and PMID:9349823.
    action: ACCEPT
    reason: >-
      GOSR2 localization to the Golgi apparatus is a well-established core feature, supported by
      multiple independent lines of evidence including the original characterization (PMID:9349823),
      immunofluorescence (PMID:16081076), and HPA data (GO_REF:0000052).
    supported_by:
    - reference_id: PMID:9349823
      supporting_text: >-
        We have now identified a protein of relative molecular mass 27K
        which is associated with the Golgi apparatus.
- term:
    id: GO:0006906
    label: vesicle fusion
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      IBA annotation for vesicle fusion based on phylogenetic inference across the SNARE family.
      GOSR2 functions as a Qb-SNARE that forms part of the SNARE complex mediating vesicle fusion
      at the cis-Golgi. Lowe et al. (PMID:9349823) showed that the cytoplasmic domain of GS27
      inhibits transport, consistent with SNARE-mediated vesicular transport. PMID:34779586
      describes GOSR2 as part of the SNARE complex mediating "fusion of endoplasmic reticulum-derived
      vesicles with the ER-Golgi intermediate compartment (ERGIC) and the cis-Golgi."
    action: ACCEPT
    reason: >-
      Vesicle fusion is a core function of all SNARE proteins. GOSR2 is a bona fide SNARE protein
      that participates in membrane fusion events at the cis-Golgi.
    supported_by:
    - reference_id: PMID:34779586
      supporting_text: >-
        BET1 is required, together with its SNARE complex partners GOSR2, SEC22b, and
        Syntaxin-5 for fusion of endoplasmic reticulum-derived vesicles with the
        ER-Golgi intermediate compartment (ERGIC) and the cis-Golgi.
- term:
    id: GO:0031201
    label: SNARE complex
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      IBA annotation for SNARE complex membership. GOSR2 is part of a SNARE complex composed of
      GOSR1/GOSR2, STX5, YKT6, and BET1. UniProt states GOSR2 is "Part of a unique SNARE complex
      composed of the Golgi SNAREs GOSR1, STX5 and YKT6." PMID:34779586 confirms GOSR2 as a
      SNARE complex partner with BET1, SEC22b, and Syntaxin-5.
    action: ACCEPT
    reason: >-
      SNARE complex membership is a core feature of GOSR2, well-supported by multiple studies
      and consistent with its classification as a Qb-SNARE protein.
    supported_by:
    - reference_id: PMID:34779586
      supporting_text: >-
        BET1 is required, together with its SNARE complex partners GOSR2, SEC22b, and
        Syntaxin-5 for fusion of endoplasmic reticulum-derived vesicles with the
        ER-Golgi intermediate compartment (ERGIC) and the cis-Golgi.
- term:
    id: GO:0006891
    label: intra-Golgi vesicle-mediated transport
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      IBA annotation for intra-Golgi vesicle-mediated transport. Lowe et al. (PMID:9349823)
      demonstrated that GS27/membrin acts at a stage between the cis/medial-Golgi and the
      trans-Golgi/TGN, consistent with intra-Golgi transport function. This is also supported
      by IDA evidence from the same publication.
    action: ACCEPT
    reason: >-
      Intra-Golgi transport is a core function of GOSR2, directly demonstrated by the original
      characterization paper showing inhibition of transport between cis/medial and trans-Golgi.
    supported_by:
    - reference_id: PMID:9349823
      supporting_text: >-
        protein movement from medial- to the trans-Golgi/TGN depends on SNARE-mediated
        vesicular transport.
- term:
    id: GO:0000149
    label: SNARE binding
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      IBA annotation for SNARE binding. As a Qb-SNARE, GOSR2 inherently binds other SNARE proteins
      to form functional SNARE complexes. UniProt documents interactions with STX5, STX1A, STX4,
      STX6, and BET1 (PMID:34779586), all of which are SNARE proteins.
    action: ACCEPT
    reason: >-
      SNARE binding is a core molecular function of GOSR2. Its interactions with multiple SNARE
      partners are well-documented by co-immunoprecipitation and structural studies.
    supported_by:
    - reference_id: PMID:34779586
      supporting_text: >-
        Levels of SNARE‐complex partners GOSR2, SEC22b, and Syntaxin‐5 were normal in patient's cells compared to controls
- term:
    id: GO:0005484
    label: SNAP receptor activity
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      IBA annotation for SNAP receptor activity. GOSR2 was originally identified as a SNARE
      (SNAP receptor) by Lowe et al. (PMID:9349823), who described it as a protein that "behaves
      like a SNARE." This is the defining molecular function of GOSR2.
    action: ACCEPT
    reason: >-
      SNAP receptor activity is the core molecular function of GOSR2. It is a bona fide SNARE
      protein, and this annotation captures its essential molecular activity.
    supported_by:
    - reference_id: PMID:9349823
      supporting_text: >-
        This protein, which behaves like a SNARE
        and has been named GS27 (for Golgi SNARE of 27K), is identical to membrin, a
        protein implicated earlier in ER-to-Golgi transport.
- term:
    id: GO:0005789
    label: endoplasmic reticulum membrane
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      IBA annotation for ER membrane localization. UniProt records ER membrane localization by
      similarity (ECO:0000250|UniProtKB:O35165). GOSR2 cycles between ER and Golgi as part of
      COPII vesicle trafficking, so ER membrane is a transient but genuine location.
    action: ACCEPT
    reason: >-
      GOSR2 is packaged into COPII-coated vesicles at ER exit sites via its IxM motif
      (PMID:18843296), so ER membrane localization is expected as part of its trafficking cycle.
    supported_by:
    - reference_id: PMID:18843296
      supporting_text: >-
        A conserved IxM packaging
        signal binds in a surface groove of Sec24c and Sec24d
- term:
    id: GO:0012507
    label: ER to Golgi transport vesicle membrane
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      IBA annotation for ER to Golgi transport vesicle membrane. GOSR2 contains an IxM motif
      that mediates its packaging into COPII-coated vesicles (PMID:18843296), so it is present
      on ER-to-Golgi transport vesicle membranes as cargo/v-SNARE during the transport cycle.
    action: ACCEPT
    reason: >-
      GOSR2 is incorporated into COPII vesicles via its IxM motif recognized by SEC24C/D,
      making ER-to-Golgi transport vesicle membrane a genuine location.
    supported_by:
    - reference_id: PMID:18843296
      supporting_text: >-
        A conserved IxM packaging
        signal binds in a surface groove of Sec24c and Sec24d
- term:
    id: GO:0031902
    label: late endosome membrane
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      IBA annotation for late endosome membrane. This is inferred by phylogenetic methods,
      likely from orthologs in the same PANTHER family (PTN000477446). While some SNARE family
      members function at late endosomes, the primary evidence for GOSR2 points to cis-Golgi
      and ERGIC localization. There is no direct experimental evidence for GOSR2 at late endosome
      membranes in human cells.
    action: UNDECIDED
    reason: >-
      While the IBA inference from phylogenetic analysis may be valid for some family members,
      there is no direct evidence for GOSR2 at late endosome membranes. The primary localization
      of GOSR2 is at the cis-Golgi network and ERGIC. This annotation may represent an
      over-extension from a related family member.
