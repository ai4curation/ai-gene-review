  label: Homo sapiens
description: >-
  GOSR2 (Golgi SNAP receptor complex member 2, also known as membrin or GS27) is a 212 amino acid
  Qb-SNARE protein that functions in vesicle-mediated transport through the Golgi apparatus.
  It is a single-pass type IV transmembrane protein with a cytoplasmic N-terminal domain containing
  a coiled-coil region and a SNARE motif. GOSR2 is a component of the cis-Golgi SNARE complex
  together with syntaxin-5 (STX5), BET1, and SEC22b, mediating fusion of ER-derived COPII vesicles
  with the ER-Golgi intermediate compartment (ERGIC) and cis-Golgi (PMID:34779586). The original
  characterization by Lowe et al. (PMID:9349823) demonstrated that GS27/membrin functions as a SNARE
  involved in intra-Golgi transport, specifically acting between the cis/medial-Golgi and the
  trans-Golgi/TGN. GOSR2 contains an IxM motif (residues 118-120) that serves as a packaging signal
  recognized by SEC24C and SEC24D for incorporation into COPII-coated vesicles (PMID:18843296).
  GOSR2 is concentrated in the intermediate compartment/cis-Golgi network and cis-Golgi cisternae,
  with greatly reduced levels at the trans end of the Golgi. Mutations in GOSR2 cause progressive
  myoclonic epilepsy type 6 (EPM6, MIM:614018) and congenital muscular dystrophy with or without
  seizures (MYOS, MIM:620166), underscoring the essential role of GOSR2-mediated vesicular transport
  in neuronal and muscle function.
