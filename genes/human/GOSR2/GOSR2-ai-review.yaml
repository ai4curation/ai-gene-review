references:
- id: GO_REF:0000002
  title: Gene Ontology annotation through association of InterPro records with GO terms
  findings:
  - statement: GOSR2 contains InterPro domains IPR027027 (GOSR2/Membrin/Bos1) and IPR010989 (SNARE) that map to SNAP receptor activity and vesicle-mediated transport.
- id: GO_REF:0000024
  title: Manual transfer of experimentally-verified manual GO annotation data to orthologs by curator judgment of sequence similarity
  findings:
