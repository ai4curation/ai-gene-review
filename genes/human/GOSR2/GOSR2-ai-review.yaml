- term:
    id: GO:0005794
    label: Golgi apparatus
  evidence_type: IDA
  original_reference_id: PMID:16081076
  review:
    summary: >-
      IDA annotation from Suga et al. 2005, which studied the effects of syntaxin 5 knockdown
      on Golgi morphology. The paper mentions GOSR2 as one of the "Golgi-SNAREs" whose levels
      were unchanged upon Syx5 knockdown, confirming its Golgi localization.
    action: ACCEPT
    reason: >-
      Golgi apparatus localization of GOSR2 is confirmed in this study as part of the
      characterization of Golgi-SNARE proteins.
    supported_by:
    - reference_id: PMID:16081076
      supporting_text: >-
        Knockdown
        of the Syx5 gene resulted in Golgi fragmentation without changing the level of
        endoplasmic reticulum (ER)-resident proteins, other Golgi-SNAREs (soluble
        N-ethylmaleimide-sensitive factor-attachment protein receptors), and coatmer
        proteins.
