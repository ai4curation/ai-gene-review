  title: Annotation inferences using phylogenetic trees
  findings:
  - statement: Phylogenetic analysis places GOSR2 in the PANTHER family PTN000477446 with other Qb-SNARE proteins, supporting annotations for SNARE binding, SNAP receptor activity, vesicle fusion, intra-Golgi transport, and multiple membrane localizations.
- id: GO_REF:0000052
