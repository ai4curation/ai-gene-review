      ER-Golgi intermediate compartment (ERGIC) and the cis-Golgi." This creates some tension
      with the original NOT annotation.
    action: UNDECIDED
    reason: >-
      The original 1997 paper found no role for GS27 in ER-to-Golgi transport, but the 2021
      BET1 paper (PMID:34779586) places GOSR2 in the ER-to-ERGIC/cis-Golgi SNARE complex.
      This may reflect updated understanding of the SNARE complex composition or differences
      in experimental assays. The negation may need re-evaluation in light of newer evidence.
