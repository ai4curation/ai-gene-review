- id: GO_REF:0000120
  title: Combined Automated Annotation using Multiple IEA Methods
  findings:
  - statement: Combined methods predict Golgi membrane, ER membrane, Golgi apparatus, and membrane localization for GOSR2.
- id: PMID:9349823
  title: A SNARE involved in protein transport through the Golgi apparatus.
  findings:
  - statement: Original identification of GS27/membrin as a Golgi-associated SNARE protein that functions in intra-Golgi vesicle-mediated transport between cis/medial-Golgi and trans-Golgi/TGN.
    supporting_text: >-
      protein movement from medial- to the trans-Golgi/TGN depends on SNARE-mediated
      vesicular transport.
  - statement: GS27/membrin was identified as a 27 kDa protein associated with the Golgi apparatus whose cytoplasmic domain inhibits transport in vitro, acting between the cis/medial-Golgi and trans-Golgi/TGN.
    supporting_text: >-
      The cytoplasmic domain of this protein or antibodies raised against it quantitatively
      inhibit transport in vitro from the ER to the trans-Golgi/TGN, acting at a stage between
      the cis/medial- and the trans-Golgi/TGN.
- id: PMID:16081076
  title: RNA interference-mediated silencing of the syntaxin 5 gene induces Golgi fragmentation but capable of transporting vesicles.
  findings:
  - statement: GOSR2 confirmed as a Golgi-SNARE whose protein levels are unchanged upon syntaxin 5 knockdown, suggesting independent regulation.
    supporting_text: >-
      Knockdown of the Syx5 gene resulted in Golgi fragmentation without changing the level of
      endoplasmic reticulum (ER)-resident proteins, other Golgi-SNAREs
- id: PMID:18843296
  title: Structural basis of cargo membrane protein discrimination by the human COPII coat machinery.
  findings:
  - statement: GOSR2 contains an IxM motif (residues 118-120) that is specifically recognized by SEC24C and SEC24D for packaging into COPII-coated vesicles. Crystal structure of the GOSR2 IxM peptide bound to SEC24D was solved at 3.0 angstrom resolution.
    supporting_text: >-
      A conserved IxM packaging signal binds in a surface groove of Sec24c and Sec24d, but the
      groove is occluded in the Sec24a and Sec24b subunits.
