core_functions:
- molecular_function:
    id: GO:0005484
    label: SNAP receptor activity
  description: >-
    GOSR2/membrin is a Qb-SNARE protein that functions as a SNAP receptor in membrane fusion
    events at the cis-Golgi and ERGIC. It forms a four-helix bundle SNARE complex with STX5
    (Qa-SNARE), BET1 (Qc-SNARE), and SEC22b (R-SNARE) to drive fusion of ER-derived COPII
    vesicles with the target compartment. The SNARE motif in the cytoplasmic domain provides
    the Qb contribution to the SNARE complex. GOSR2 was originally identified by Lowe et al.
    (PMID:9349823) as a SNARE acting between the cis/medial-Golgi and trans-Golgi/TGN.
  directly_involved_in:
    - id: GO:0006891
      label: intra-Golgi vesicle-mediated transport
  locations:
    - id: GO:0000139
      label: Golgi membrane
  in_complex:
    id: GO:0031201
    label: SNARE complex
  supported_by:
    - reference_id: PMID:9349823
      supporting_text: >-
        This protein, which behaves like a SNARE
        and has been named GS27 (for Golgi SNARE of 27K), is identical to membrin, a
        protein implicated earlier in ER-to-Golgi transport.
    - reference_id: PMID:34779586
      supporting_text: >-
        BET1 is required, together with its SNARE complex partners GOSR2, SEC22b, and
        Syntaxin-5 for fusion of endoplasmic reticulum-derived vesicles with the
        ER-Golgi intermediate compartment (ERGIC) and the cis-Golgi.
- molecular_function:
    id: GO:0000149
    label: SNARE binding
  description: >-
    GOSR2 binds other SNARE proteins to form functional SNARE complexes. It interacts with
    STX5 (syntaxin-5), BET1, SEC22b, YKT6, and GOSR1. These interactions are mediated by
    the SNARE motif in the coiled-coil domain and are essential for SNARE complex assembly
    and membrane fusion. The GOSR2-BET1 interaction has been validated by endogenous
    co-immunoprecipitation (PMID:34779586).
  directly_involved_in:
    - id: GO:0006906
      label: vesicle fusion
  locations:
    - id: GO:0000139
      label: Golgi membrane
  supported_by:
    - reference_id: PMID:34779586
      supporting_text: >-
        Levels of SNARE-complex partners GOSR2, SEC22b, and Syntaxin-5 were normal in patient's cells compared to controls
