- term:
    id: GO:0006888
    label: endoplasmic reticulum to Golgi vesicle-mediated transport
  evidence_type: IDA
  original_reference_id: PMID:9349823
  negated: true
  review:
    summary: >-
      This is a NOT annotation indicating GOSR2 is NOT involved in ER-to-Golgi vesicle-mediated
      transport. Lowe et al. (PMID:9349823) showed that GS27/membrin acts at a stage between
      the cis/medial-Golgi and the trans-Golgi/TGN, and that the protein did not affect the
      ER-to-cis-Golgi step. However, more recent work (PMID:34779586) describes GOSR2 as part
