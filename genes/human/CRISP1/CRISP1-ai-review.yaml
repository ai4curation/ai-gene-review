id: P54107
gene_symbol: CRISP1
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  CRISP1 is an epididymis-enriched, secreted CAP/CRISP-family glycoprotein that
  associates with the human sperm surface, including the postacrosomal sperm-head
  region. A tightly associated sperm pool promotes two successive fertilization
  steps: binding of sperm to the zona pellucida through a specific interaction
  with ZP3, and progression from sperm-oolemma binding to plasma-membrane fusion.
  Human CRISP1 also binds the calcium exporter PMCA4b through its N-terminal
  region and delays PMCA4b-mediated calcium extrusion in a heterologous assay,
  although the endogenous importance of this mechanism in human sperm remains
  unresolved. CRISP-family redundancy in mouse models indicates a modulatory,
  cooperative role rather than an indispensable standalone fusogen.
alternative_products:
- name: Long
  id: P54107-1
  description: >-
    Canonical 249-amino-acid secreted precursor containing both the CAP and
    C-terminal cysteine-rich domains; no isoform-specific activity has been
    established.
- name: Short (CRISP-1 delta)
  id: P54107-2
  sequence_note: VSP_006027, VSP_006028
  description: >-
    Alternatively spliced product with two sequence changes relative to the
    canonical form; its localization and fertilization functions have not been
    distinguished experimentally.
