suggested_questions:
- question: >-
    What is the human oolemma receptor for CRISP1, and does CRISP1 directly alter
    membrane fusion or organize a transient adhesion/signaling interface after
    initial sperm-oolemma binding?
  experts:
  - Patricia S. Cuasnicu
  - Debora J. Cohen
- question: >-
    Does endogenous human sperm CRISP1 regulate PMCA4b, CatSper, or both during
    capacitation and fertilization, and which CRISP1 domain mediates each effect?
  experts:
  - Bhagyashri R. Pathak
  - Patricia S. Cuasnicu
- question: >-
    Do the long and short CRISP1 isoforms differ in secretion, stable sperm-surface
    association, zona/fusion activity, or release during capacitation?
  experts:
  - Masaru Hayashi
  - Patricia S. Cuasnicu
suggested_experiments:
- description: >-
    Use affinity-matured monovalent CRISP1 probes and proximity labeling on live
    zona-free human oocytes, followed by quantitative membrane proteomics and
    orthogonal receptor knockout or blocking assays in a validated gamete-fusion
    model.
  experiment_type: receptor discovery, live-cell proximity labeling, and functional blocking
  hypothesis: >-
    CRISP1 engages a specific oolemma receptor distinct from the initial
    sperm-binding machinery and promotes the transition to membrane fusion.
- description: >-
    Measure PMCA4b extrusion and CatSper currents in capacitated human sperm after
    acute CRISP1 depletion or isoform-specific blocking, then rescue with
    mammalian-expressed wild-type CRISP1 and CAP- or CRD-domain mutants.
  experiment_type: human sperm electrophysiology, calcium imaging, and separation-of-function rescue
  hypothesis: >-
    Endogenous human CRISP1 restrains calcium flux through separable PMCA4b- and
    channel-regulatory interfaces that tune rather than abolish fertilizing
    competence.
- description: >-
    Endogenously tag both CRISP1 isoforms in primary human epididymal organoids,
    trace secretion and sperm acquisition, and quantify loosely versus tightly
    associated pools before and after capacitation.
  experiment_type: isoform-resolved genome editing, organoid secretomics, and sperm-surface biochemistry
  hypothesis: >-
    Isoform identity and epididymal processing determine whether CRISP1 is released
    during capacitation or retained at the postacrosomal sperm membrane for gamete
    interaction.
- description: >-
    Reanalyze purified human sperm nuclei and matched membrane fractions with
    targeted CRISP1 peptides, isotope-labeled standards, and microscopy using
    knockout-validated antibodies.
  experiment_type: targeted spatial proteomics and orthogonal localization
  hypothesis: >-
    The historical sperm-nucleus HDA signal reflects residual membrane-associated
    CRISP1 rather than a reproducible intranuclear pool.
knowledge_gaps:
- gap_statement: >-
    The direct human oolemma partner and molecular mechanism by which CRISP1
    promotes sperm-egg plasma-membrane fusion are unknown.
  boundary: >-
    Antibody inhibition places CRISP1 after initial oolemma binding, and
    recombinant CRISP1 binds the human oocyte surface, but neither experiment
    identifies the receptor or distinguishes adhesion, signaling, and membrane
    remodeling mechanisms.
  gap_kind:
  - BIOLOGY
  dark_aspect: MF_DARK
  status: OPEN
  significance: >-
    Resolving the partner and activity is necessary to replace a process-only
    description with a precise molecular function and to assess contraceptive or
    infertility relevance.
  resolution: >-
