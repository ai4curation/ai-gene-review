    Acts at the extracellular face of the human sperm head as a reproductive
    interaction factor: it binds ZP3 to promote sperm attachment to the zona
    pellucida and subsequently participates in the step after oolemma binding
    that leads to sperm-egg plasma-membrane fusion.
  directly_involved_in:
