    supporting_text: >-
      Results revealed that rec-hCRISP1 mainly interacted with ZP3 in a dose-dependent and saturable manner, supporting the specificity of this interaction.
    reference_section_type: ABSTRACT
    full_text_unavailable: true
  - reference_id: PMID:11566719
    supporting_text: >-
      The antibody did not inhibit the occurrence of spontaneous or Ca(2+) ionophore-induced acrosome reaction, nor did it inhibit the ability of sperm to bind to the oolema, supporting a specific inhibition of the antibody at the sperm-egg fusion level.
    reference_section_type: ABSTRACT
    full_text_unavailable: true
- description: >-
    Interacts through its N-terminal region with human PMCA4b and delays
    PMCA4b-mediated calcium extrusion; this direct biochemical activity may tune
    sperm calcium homeostasis, but its endogenous reproductive context remains
    to be demonstrated.
