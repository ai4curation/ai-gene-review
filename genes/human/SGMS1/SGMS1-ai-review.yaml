  original_reference_id: PMID:14976195
  qualifier: located_in
  review:
    summary: >-
      TAS annotation of nuclear localization. SGMS1 is a multipass Golgi/plasma-
      membrane integral membrane protein with six transmembrane helices and no
      evidence of nuclear function; the cited paper is an expression-cloning study
      that localized SM to the plasma membrane, not SMS1 to the nucleus. This appears
      to be an incorrect legacy assignment. It is a non-experimental (TAS) annotation
      inconsistent with the protein's topology, so it is removed.
