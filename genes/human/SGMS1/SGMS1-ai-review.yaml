id: Q86VZ5
gene_symbol: SGMS1
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  SGMS1 (sphingomyelin synthase 1; phosphatidylcholine:ceramide
  cholinephosphotransferase 1, EC 2.7.8.27) is a multipass membrane enzyme of the
  trans-Golgi apparatus that catalyzes the final, committed step of sphingomyelin
  biosynthesis. It transfers the phosphocholine head group of phosphatidylcholine
  (PC) onto ceramide (CER), producing sphingomyelin (SM) and diacylglycerol (DAG)
  as a by-product; the reaction is reversible and its direction depends on the
  relative levels of ceramide and DAG in Golgi membranes. SGMS1 is the principal
  Golgi-localized sphingomyelin synthase and acts mainly on newly synthesized
  ceramide delivered from the endoplasmic reticulum to the trans-Golgi by the
  ceramide transfer protein CERT; its paralog SGMS2/SMS2 contributes the
  plasma-membrane share of SM synthesis. By consuming pro-apoptotic ceramide and
  generating pro-mitogenic DAG, SGMS1 couples SM production to lipid signaling,
  regulating a Golgi DAG pool that recruits DAG-binding effectors such as protein
  kinase D. Sphingomyelin is a structural component of membrane rafts. SGMS1 can
  form a heteromeric complex with glucosylceramide synthase (GCS/UGCG) that raises
  SM synthesis while lowering glucosylceramide synthesis, controlling the metabolic
  fate of ceramide at the Golgi. In addition to the PC-dependent SM synthase
  reaction, the enzyme has ceramide phosphoethanolamine (CPE) synthase activity
  (transferring phosphoethanolamine from phosphatidylethanolamine onto ceramide)
  and can hydrolyze PC/PE to DAG (a phospholipase-C-type activity). The N-terminal
  sterile alpha motif (SAM) domain mediates protein-protein interactions, and a
  catalytic cluster (Ser283/His285/His328/Asp332) is essential for activity.
