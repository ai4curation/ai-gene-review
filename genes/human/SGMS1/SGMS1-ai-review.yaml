- term:
    id: GO:0047493
    label: ceramide cholinephosphotransferase activity
  evidence_type: IDA
  original_reference_id: PMID:14685263
  qualifier: enables
  review:
    summary: >-
      Direct assay (IDA) annotated to ceramide cholinephosphotransferase activity.
      The underlying experiment demonstrates PC-dependent SM synthase activity, but
      the GO term GO:0047493 is defined as a CDP-choline-dependent reaction, which
      SGMS1 does NOT catalyze (it does not use CDP-choline or free phosphorylcholine
      as donor). The correct molecular function is GO:0033188 sphingomyelin synthase
      activity. Per policy the experimental annotation is modified (retargeted to the
      correct term), not removed.
    action: MODIFY
    reason: >-
      Reaction chemistry mismatch: GO:0047493 requires a CDP-choline donor, but
      SGMS1 uses phosphatidylcholine. Retarget to GO:0033188 sphingomyelin synthase
      activity.
    proposed_replacement_terms:
    - id: GO:0033188
      label: sphingomyelin synthase activity
    supported_by:
    - reference_id: file:human/SGMS1/SGMS1-uniprot.txt
      supporting_text: >-
        Does not use free phosphorylcholine or CDP-choline
