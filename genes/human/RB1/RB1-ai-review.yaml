- term:
    id: GO:0051276
    label: chromosome organization
  evidence_type: IMP
  original_reference_id: PMID:20551165
  review:
    summary: 'IMP annotation from Manning et al. 2010 (PMID:20551165), which showed that pRB depletion compromises centromeric localization of CAP-D3/condensin II and chromosome cohesion, leading to merotelic attachment and chromosome missegregation. Real RB1 biology — RB1 loss undermines mitotic fidelity via condensin II / centromere effects — but this is a non-cell-cycle-arrest mitotic phenotype that is downstream of, and tangential to, RB1''s defining function as the Rb-E2F transcriptional corepressor that enforces the G1/S restriction point. The Manning study explicitly frames this as separate from RB1''s "best-known regulation of the G1/S-phase transition."'
    action: KEEP_AS_NON_CORE
    reason: 'RB1''s contribution to mitotic centromere/cohesion fidelity (Manning 2010 PMID:20551165) is a real but non-core mitotic role that explains a downstream cancer consequence (CIN/aneuploidy in RB1-null tumors) rather than defining RB1''s primary molecular activity. The canonical RB1 core function (Rb-E2F complex assembly, negative regulation of G1/S transition, chromatin-bound transcription corepression with HDAC1/SUV39H1/BRG1) is already captured by direct experimental evidence elsewhere in this file (PMID:7923370 IDA, PMID:16360038 IPI on GO:0035189). Mechanical PMID:20551165 single-paper batch (batch 11 of #347) — all 6 IMP rows from this paper consolidated to KEEP_AS_NON_CORE with a uniform template.'
- term:
