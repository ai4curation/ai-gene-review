  review:
    summary: 'IDA annotation supporting RB1''s canonical role as a negative regulator of DNA-templated transcription, sourced from the Prohibitin/Brg-1/Brm paper (PMID:12065415) which directly shows that pRb-mediated repression of E2F-target gene promoters and the resulting cell-growth suppression require the SWI/SNF chromatin remodelers BRG1/SMARCA4 and BRM. Negative regulation of DNA-templated transcription is RB1''s defining transcriptional activity at E2F-target promoters (PMID:7923370; deep research synthesis), already captured in core_functions[0] (Rb-E2F transcriptional corepressor) and independently supported by TAS PMID:19149898 (ACCEPTed in batch 9 of #347).'
    action: ACCEPT
    reason: 'Canonical RB1 corepressor activity, well anchored to the pRb-E2F repressor model and to RB1''s SWI/SNF (BRG1/BRM) chromatin-remodeler partnership already supported elsewhere in this file (GO:0006338 chromatin remodeling TAS PMID:19149898 ACCEPTed, GO:0016514 SWI/SNF complex TAS ACCEPTed). The PMID:12065415 paper provides direct experimental evidence (IDA) for pRb-mediated repression at E2F-target promoters via prohibitin/SWI/SNF cooperation. Mechanical canonical-corepressor IDA batch (batch 13 of #347) — 3 IDA rows on GO:0045892 from primary literature uniformly consolidated to ACCEPT.'
- term:
    id: GO:0007346
    label: regulation of mitotic cell cycle
  evidence_type: IMP
  original_reference_id: PMID:20551165
  review:
    summary: 'IMP annotation from Manning et al. 2010 (PMID:20551165), which showed that pRB depletion slows mitotic progression and promotes aneuploidy through compromised centromere function and chromosome cohesion (CAP-D3/condensin II mislocalization, merotelic attachment, lagging chromosomes). Real RB1 biology — RB1 loss alters mitotic timing/fidelity — but this is a non-cell-cycle-arrest mitotic phenotype downstream of RB1''s primary G1/S corepressor activity, and "regulation of mitotic cell cycle" is a very broad parent term that does not capture the specific Manning et al. mitotic-fidelity mechanism.'
    action: KEEP_AS_NON_CORE
    reason: 'RB1''s contribution to mitotic centromere/cohesion fidelity (Manning 2010 PMID:20551165) is a real but non-core mitotic role that explains a downstream cancer consequence (CIN/aneuploidy in RB1-null tumors) rather than defining RB1''s primary molecular activity. The canonical RB1 core function (Rb-E2F complex assembly, negative regulation of G1/S transition, chromatin-bound transcription corepression with HDAC1/SUV39H1/BRG1) is already captured by direct experimental evidence elsewhere in this file (PMID:7923370 IDA, PMID:16360038 IPI on GO:0035189). Mechanical PMID:20551165 single-paper batch (batch 11 of #347) — all 6 IMP rows from this paper consolidated to KEEP_AS_NON_CORE with a uniform template.'
