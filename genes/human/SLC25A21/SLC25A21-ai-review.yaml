proposed_new_terms:
- proposed_name: 2-oxoadipate transmembrane transporter activity
  proposed_definition: >-
    Enables the transfer of 2-oxoadipate (2-oxohexanedioate) from one side of a
    membrane to the other.
  justification: >-
    SLC25A21 is experimentally defined as a 2-oxodicarboxylate carrier whose
    principal physiological substrate is 2-oxoadipate (transported in exchange for
    2-oxoglutarate). GO currently has no molecular function term for 2-oxoadipate,
    2-oxodicarboxylate, or oxodicarboxylate transmembrane transport; the closest
    term (GO:0015139 alpha-ketoglutarate transmembrane transporter activity)
    captures only the counter-substrate. A dedicated child term would allow the
    carrier's substrate specificity to be annotated precisely.
  proposed_parent:
    id: GO:0015139
    label: alpha-ketoglutarate transmembrane transporter activity
- proposed_name: 2-oxoadipate:2-oxoglutarate antiporter activity
  proposed_definition: >-
    Enables the transfer of 2-oxoadipate from one side of a membrane to the other
    in exchange for 2-oxoglutarate (alpha-ketoglutarate) transferred in the
    opposite direction.
  justification: >-
    The carrier operates strictly by obligate counter-exchange (antiport) of a
    2-oxodicarboxylate for 2-oxoglutarate; an antiporter molecular-function term
    specifying the 2-oxoadipate:2-oxoglutarate exchange (as characterized by
    Fiermonte et al. 2001 and encoded by Reactome R-HSA-372480) would more
    accurately represent the mechanism than a generic transporter term.
  proposed_parent:
    id: GO:0015297
    label: antiporter activity
suggested_questions:
- question: >-
    What is the in vivo directionality and physiological substrate preference of
    SLC25A21 across tissues, given that it accepts multiple C5-C7
    (2-oxo)dicarboxylates in vitro?
- question: >-
    Why does inner-membrane transport loss lead to mitochondrial DNA depletion and
    a selective spinal motor neuron phenotype, when fibroblasts appear largely
    spared?
suggested_experiments:
- description: >-
    Measure reconstitution kinetics (Km/Vmax) for each candidate substrate
    (2-oxoadipate, 2-oxoglutarate, adipate, glutarate, 2-aminoadipate) to
    establish the physiologically dominant exchange under matrix/cytosol
    concentrations.
  experiment_type: proteoliposome transport assay
- description: >-
    Perform metabolic flux and metabolomic profiling in SLC25A21-knockout human
    neurons versus fibroblasts to test whether 2-oxoadipate/quinolinic acid
    accumulation and respiratory-chain loss are cell-type specific.
  experiment_type: metabolomics / stable-isotope flux analysis
