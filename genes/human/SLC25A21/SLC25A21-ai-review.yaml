  label: Homo sapiens
description: >-
  SLC25A21 (ODC) is the mitochondrial 2-oxodicarboxylate carrier, a member of the
  SLC25 mitochondrial carrier family (TC 2.A.29). It is a multi-pass integral
  protein of the mitochondrial inner membrane built from the characteristic
  tripartite Solcar fold (three Solcar repeats and six transmembrane helices). It
  functions as an antiporter that transports C5-C7 2-oxodicarboxylates across the
  inner membrane by an obligate counter-exchange (antiport) mechanism, exchanging
  2-oxoadipate and 2-oxoglutarate and also transporting adipate, glutarate, and to
  a lesser extent pimelate, 2-oxopimelate, 2-aminoadipate, oxaloacetate and
  citrate; unlike the paralogous oxoglutarate/malate carrier SLC25A11, human
  SLC25A21 does not transport malate. Physiologically it imports cytosolic
  2-oxoadipate into the matrix in exchange for 2-oxoglutarate. Because
  2-oxoadipate is the common intermediate of lysine, hydroxylysine and tryptophan
  degradation, SLC25A21 provides the mitochondrial transport step that channels
  these amino-acid catabolic pathways toward acetyl-CoA and the citric acid cycle.
  Loss-of-function variants cause mitochondrial DNA depletion syndrome 18
  (MTDPS18), an autosomal recessive spinal muscular atrophy-like disorder
  associated with accumulation of 2-oxoadipate, quinolinic and pipecolic acid.
