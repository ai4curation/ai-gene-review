- term:
    id: GO:0016624
    label: oxidoreductase activity, acting on the aldehyde or oxo group of donors,
      disulfide as acceptor
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: >-
      Broad InterPro/orthology-based oxidoreductase term describing the
      overall E1+E2+E3 (disulfide-acceptor) chemistry of the 2-oxo-acid
      dehydrogenase family. The precise activity of the E1a subunit is the
      ThDP-dependent decarboxylation captured by GO:0160166.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      This family-level term describes the full dehydrogenase complex reaction
      in which the ultimate electron acceptor is a disulfide (lipoyl/E3). The
      DHTKD1 E1a subunit itself performs ThDP-dependent decarboxylation of
      2-oxoadipate and transfers the acyl group to the E2 lipoyl moiety; the
      more specific and accurate MF for DHTKD1 is GO:0160166 (2-oxoadipate
      dehydrogenase activity), which is separately annotated with IDA support.
    supported_by:
    - reference_id: PMID:29191460
      supporting_text: >-
        It is involved in the oxidative decarboxylation of 2-oxoadipate (OA) to
        glutaryl-CoA on the final degradative pathway of L-lysine
