- term:
    id: GO:0006091
    label: generation of precursor metabolites and energy
  evidence_type: IMP
  original_reference_id: PMID:23141294
  qualifier: involved_in
  review:
    summary: >-
      IMP from a DHTKD1-silencing study reporting decreased ATP and total
      NAD(+)/NADH. This is a downstream physiological consequence of losing a
      lysine-catabolic enzyme rather than a direct biological process of DHTKD1.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      DHTKD1 knockdown reduces cellular ATP/NAD(H) (an indirect metabolic
      readout), but DHTKD1 is not part of primary energy-generating machinery
      such as the TCA cycle or oxidative phosphorylation; its direct role is the
      2-oxoadipate step of amino-acid (lysine/tryptophan) catabolism. This term
      over-generalizes a secondary phenotype. Note this contrasts with the OGDH
      paralog, which is a bona fide TCA-cycle energy enzyme. Retained (not
      removed) as it derives from an experimental IMP.
    supported_by:
    - reference_id: PMID:23141294
      supporting_text: >-
        DHTKD1 silencing was found to lead to impaired energy production,
        evidenced by decreased ATP, total NAD(+) and NADH, and NADH levels
