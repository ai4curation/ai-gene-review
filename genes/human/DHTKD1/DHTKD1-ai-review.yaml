suggested_questions:
- question: >-
    Given that DHTKD1 shares E2 (DLST) and E3 (DLD) with the 2-oxoglutarate
    dehydrogenase complex, how is flux partitioned between the OGDHC and OADHC in
    tissues where both are expressed (e.g. liver)?
- question: >-
    Why is alpha-aminoadipic/alpha-ketoadipic aciduria caused by DHTKD1 loss so
    frequently asymptomatic, and what genetic or metabolic factors modify the
    CMT2Q neuropathy phenotype?
suggested_experiments:
- description: >-
    Tissue-resolved metabolic flux analysis (e.g. 13C-lysine tracing) in
    DHTKD1-knockout versus wild-type cells to quantify the contribution of DHTKD1
    to 2-oxoadipate turnover and downstream glutaryl-CoA and energy metabolism.
  hypothesis: >-
    DHTKD1 loss diverts 2-oxoadipate away from glutaryl-CoA, causing measurable
    accumulation of 2-oxoadipate/2-aminoadipate without major bioenergetic deficit.
- description: >-
    Structural and kinetic characterization of the assembled DHTKD1-DLST-DLD
    megacomplex to define substrate channeling and the effect of AAKAD variants
    (e.g. G729R, R715C) on complex assembly and activity.
  hypothesis: >-
    AAKAD-causing variants impair DHTKD1-DLST assembly, disrupting intermediate
    channeling rather than abolishing intrinsic decarboxylase chemistry.
