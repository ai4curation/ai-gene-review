id: Q96HY7
gene_symbol: DHTKD1
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  DHTKD1 is the E1 component (E1a; 2-oxoadipate dehydrogenase, OADH-E1) of the
  mitochondrial 2-oxoadipate dehydrogenase complex (OADHC). It is a thiamine
  diphosphate (ThDP)-dependent decarboxylase and a paralog of OGDH, the
  2-oxoglutarate dehydrogenase E1. DHTKD1 catalyzes the first, rate-limiting and
  irreversible step of the complex: the oxidative decarboxylation of 2-oxoadipate
  (alpha-ketoadipate), transferring the decarboxylated glutaryl intermediate onto
  the lipoyl group of the shared E2 subunit (DLST), with the overall complex
  producing glutaryl-CoA and CO2. OADHC uses the same E2 (DLST) and E3 (DLD)
  components as the TCA-cycle 2-oxoglutarate dehydrogenase complex, but the E1
  subunit is complex-specific; DHTKD1 strongly prefers 2-oxoadipate over
  2-oxoglutarate as substrate. This reaction is the final common step of L-lysine,
  L-hydroxylysine and L-tryptophan degradation, whose convergent intermediate is
  2-oxoadipate. The enzyme functions as a homodimer in the mitochondrial matrix.
  Loss-of-function variants cause alpha-aminoadipic and alpha-ketoadipic aciduria
  (AAKAD, frequently benign), and DHTKD1 has also been linked to axonal
  Charcot-Marie-Tooth disease type 2Q.
