id: Q9UBX3
gene_symbol: SLC25A10
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  SLC25A10 (DIC) is the mitochondrial dicarboxylate carrier, a member of the
  SLC25 mitochondrial carrier family. It is a multi-pass integral protein of the
  mitochondrial inner membrane that catalyzes the electroneutral antiport
  (exchange) of dicarboxylates (malate, succinate, malonate) and inorganic
  sulfur-containing anions (sulfate, thiosulfate) against inorganic phosphate
  across the inner membrane. Transport proceeds by a ping-pong mechanism in which
  one substrate is translocated and released before the counter-substrate binds,
  and the protein functions as a monomer. By exporting mitochondrial malate to
  the cytosol in exchange for phosphate, DIC supplies carbon skeletons and
  reducing equivalents for gluconeogenesis, fatty-acid synthesis, urea synthesis
  and sulfur metabolism, and is expressed most highly in liver and kidney. It
  does not transport glutathione. Biallelic loss-of-function mutations in
  SLC25A10 cause an autosomal-recessive mitochondrial DNA depletion syndrome
  (MTDPS19) with epileptic encephalopathy and respiratory complex I deficiency.
