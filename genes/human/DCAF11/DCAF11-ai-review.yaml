proposed_new_terms: []
suggested_questions:
- What is the full repertoire of endogenous CRL4(DCAF11) substrates, and which
  degrons/recognition motifs does the DCAF11 WD40 propeller read?
- Does DCAF11 preferentially partner with CUL4A versus CUL4B in specific cellular
  contexts, and is there substrate specialization between the two variants?
- How is CRL4(DCAF11) activity itself regulated (neddylation/CAND1 exchange,
  expression control such as TFEB repression) under oxidative and proteotoxic stress?
suggested_experiments:
- Define the CRL4(DCAF11) substrate landscape using global protein-stability
  profiling (e.g., quantitative diGly ubiquitinome and degradation/half-life
  proteomics) comparing DCAF11-knockout versus wild-type cells.
- Determine a cryo-EM or crystal structure of DCAF11 bound to DDB1 and to a substrate
  degron peptide (e.g., NRF2 Neh2 DIDLID or phospho-CENP-A) to map the recognition
  surface.
- Test for genetic separation of function between CUL4A- and CUL4B-based
  CRL4(DCAF11) complexes by selective depletion and substrate-stabilization readouts.
