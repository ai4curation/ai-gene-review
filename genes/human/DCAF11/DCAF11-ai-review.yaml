    ubiquitin ligase; uses its WD40 beta-propeller to bind substrates and a WDXR motif
    to dock on the DDB1 adaptor of CUL4A/CUL4B complexes, presenting substrates for
    polyubiquitination and proteasomal degradation.
  supported_by:
