gene_symbol: DCAF11
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: DCAF11 (DDB1- and CUL4-associated factor 11; also called WD repeat-containing
  protein 23, WDR23) is a WD40-repeat protein that serves as a substrate-recognition
  receptor of the CRL4 (DDB1-CUL4-RBX1) cullin-RING E3 ubiquitin ligase. Through a
  conserved WDXR motif it docks onto the DDB1 adaptor of CUL4A- and CUL4B-based
  complexes and uses its C-terminal WD40 beta-propeller to present specific substrates
  for polyubiquitination and proteasomal degradation. Characterized substrates include
  the NRF2/NFE2L2 transcription factor (via the DIDLID sequence of its Neh2 domain),
  which links DCAF11 to the cellular antioxidant/oxidative-stress response, and the
  centromeric histone variant CENP-A, whose phospho-Ser68-primed degradation DCAF11
  mediates to maintain centromere identity. The protein localizes predominantly to
  the nucleoplasm, consistent with its nuclear substrates. The orthologous receptor
  in C. elegans (WDR-23) controls the NRF/Nrf2 ortholog SKN-1, and DCAF11 has also
  been exploited as a recruited ligase in covalent molecular-glue targeted protein
  degradation.
