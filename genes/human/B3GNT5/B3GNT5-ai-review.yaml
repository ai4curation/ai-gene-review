    EC 2.4.1.206): transfers GlcNAc from UDP-GlcNAc to lactosylceramide (LacCer)
    to form lactotriaosylceramide (Lc3Cer, GlcNAcbeta1-3Galbeta1-4Glc-ceramide) +
    UDP, the committed initiating step of the (neo)lacto-series glycosphingolipid
    branch.
