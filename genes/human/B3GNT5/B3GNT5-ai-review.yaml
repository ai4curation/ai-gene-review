gene_symbol: B3GNT5
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  B3GNT5 encodes lactosylceramide 1,3-N-acetyl-beta-D-glucosaminyltransferase
  (EC 2.4.1.206), also known as lactotriaosylceramide synthase or Lc3 synthase
  (beta-1,3-N-acetylglucosaminyltransferase 5). It is a Golgi-resident,
  single-pass type II membrane glycosyltransferase of the GT31 (glycosyltransferase
  31) family that initiates the (neo)lacto-series branch of glycosphingolipid
  biosynthesis. The enzyme transfers N-acetylglucosamine from UDP-GlcNAc onto
  lactosylceramide (LacCer), producing lactotriaosylceramide (Lc3Cer,
  GlcNAcbeta1-3Galbeta1-4Glc-ceramide) plus UDP. Lc3Cer is the committed precursor
  of the lacto- and neolacto-series glycosphingolipids, which carry Lewis (Lewis X)
  and HNK-1 carbohydrate antigens; the enzyme also extends neolactotetraosylceramide
  (nLc4Cer, paragloboside) to neolactopentaosylceramide (nLc5Cer). Expression is
  widespread with enrichment in lung, colon, placenta, testis, pituitary and
  cerebellum, and is developmentally regulated, being elevated in the developing
  central nervous system during embryogenesis.
