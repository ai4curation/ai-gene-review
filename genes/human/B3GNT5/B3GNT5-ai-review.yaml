  title: Cloning of a mouse beta 1,3 N-acetylglucosaminyltransferase GlcNAc(beta 1,3)Gal(beta
    1,4)Glc-ceramide synthase gene encoding the key regulator of lacto-series glycolipid
    biosynthesis.
  findings:
  - statement: >-
      The mouse ortholog (Lc3 synthase) initiates lacto-series glycolipid
      synthesis using the lactosylceramide acceptor; it is developmentally
      regulated with elevated expression in the developing CNS.
    reference_section_type: ABSTRACT
    supporting_text: >-
      The Lc3 synthase enzyme efficiently utilized the lactosyl ceramide
      glycolipid acceptor
  reference_review:
    relevance: HIGH
