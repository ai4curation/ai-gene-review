- id: PMID:11283017
  title: Molecular cloning and characterization of UDP-GlcNAc:lactosylceramide beta
    1,3-N-acetylglucosaminyltransferase (beta 3Gn-T5), an essential enzyme for the
    expression of HNK-1 and Lewis X epitopes on glycolipids.
  findings:
  - statement: >-
      beta3Gn-T5 (B3GNT5) is the Lc3Cer synthase; it transfers GlcNAc to
      lactosylceramide and to nLc4Cer, producing Lc3Cer and nLc5Cer respectively,
      the entry point for lacto/neolacto-series glycolipids carrying HNK-1 and
      Lewis X epitopes.
    reference_section_type: ABSTRACT
    supporting_text: >-
      beta3Gn-T5 exhibited strong activity to transfer GlcNAc to glycolipid
      substrates, such as lactosylceramide (LacCer) and neolactotetraosylceramide
      (nLc(4)Cer; paragloboside), resulting in the synthesis of Lc(3)Cer and
      neolactopentaosylceramide (nLc(5)Cer), respectively
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Defining cloning/characterization paper for human/rat B3GNT5; source of the
      EC 2.4.1.206 catalytic-activity evidence in UniProt. Cache is abstract-only
      (full_text_available: false); the supporting_text quote is verbatim from the
      abstract.
