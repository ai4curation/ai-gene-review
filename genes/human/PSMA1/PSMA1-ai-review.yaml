id: P25786
gene_symbol: PSMA1
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: 'PSMA1 encodes proteasome subunit alpha type-1, a non-catalytic alpha-ring
  component of the human 20S core proteasome. Its reviewed role is structural: it
  contributes to the architecture and gated entry surface of the 20S core, thereby
  supporting proteasomal protein catabolism in cytosolic and nuclear proteasome complexes.
  It should not be annotated as independently enabling protease activity.'
