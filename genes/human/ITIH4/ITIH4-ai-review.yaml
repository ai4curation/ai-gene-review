core_functions:
- description: >-
    Secreted plasma ITIH4 functions as a cleavage-triggered serine-type
    endopeptidase inhibitor. After cleavage in its protease-susceptible region,
    ITIH4 uses its VWA domain to form a divalent-cation-dependent, noncovalent
    complex with MASP-1, MASP-2, or plasma kallikrein, sterically restricting
    access of large protein substrates. This mechanism negatively regulates
    lectin-pathway complement activation and intravascular proteolysis.
  molecular_function:
    id: GO:0004867
    label: serine-type endopeptidase inhibitor activity
  directly_involved_in:
  - id: GO:0001869
    label: negative regulation of complement activation, lectin pathway
  - id: GO:1900004
    label: negative regulation of serine-type endopeptidase activity
  locations:
  - id: GO:0005615
    label: extracellular space
  supported_by:
  - reference_id: PMID:33523981
    supporting_text: Mechanistically, ITIH4 acts as bait that, upon cleavage, forms a noncovalent, inhibitory complex with the executing protease that depends on the ITIH4 von Willebrand factor A domain.
    reference_section_type: ABSTRACT
  - reference_id: PMID:33523981
