- id: PMID:33523981
  title: ITIH4 acts as a protease inhibitor by a novel inhibitory mechanism.
  findings:
  - statement: Cleavage enables ITIH4 to inhibit multiple human serine proteases.
    supporting_text: Here, we show that ITIH4 is cleaved by several human proteases within a protease-susceptible region, enabling ITIH4 to function as a protease inhibitor.
    reference_section_type: ABSTRACT
  - statement: ITIH4 forms noncovalent inhibitory complexes with MASP-1, MASP-2, and plasma kallikrein through its VWA domain.
    supporting_text: Mechanistically, ITIH4 acts as bait that, upon cleavage, forms a noncovalent, inhibitory complex with the executing protease that depends on the ITIH4 von Willebrand factor A domain.
    reference_section_type: ABSTRACT
  - statement: ITIH4 directly inhibits lectin-pathway complement activation.
    supporting_text: ITIH4 efficiently and dose-dependently inhibited C4 and C3 deposition
    reference_section_type: RESULTS
  - statement: ITIH4 is not incorporated into bikunin-linked proteoglycan complexes.
    supporting_text: ITIH4 lacks a C-terminal consensus sequence, which is present in all other ITIHs, that is required for the formation of bikunin-ITIH complexes.
    reference_section_type: INTRODUCTION
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      PubMed/PMC identity and full text were checked. This is the definitive direct
      biochemical and serum-complement study for ITIH4's inhibitor mechanism and
      its distinction from bikunin-linked ITIH heavy chains.
