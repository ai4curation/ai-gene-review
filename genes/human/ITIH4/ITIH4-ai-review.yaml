knowledge_gaps:
- gap_statement: >-
    The physiological occupancy, lifetime, and tissue distribution of endogenous
    ITIH4-protease inhibitory complexes are not established.
  boundary: >-
    Purified proteins and serum assays directly establish complex formation and
    inhibition, but the abundance of each complex in healthy and inflamed human
    plasma has not been measured comprehensively.
  gap_kind:
  - BIOLOGY
  dark_aspect: MF_DARK
  status: OPEN
  significance: >-
    Quantifying endogenous complexes is necessary to establish which serine
    proteases are the dominant physiological ITIH4 targets.
  resolution: >-
    Develop cleavage-neoepitope and protease-ITIH4 complex assays, then perform
    targeted proteomics across healthy plasma and defined inflammatory states.
  provenance:
  - reference_id: file:human/ITIH4/ITIH4-deep-research-manual.md
    supporting_text: The relative importance of MASP-1, MASP-2, plasma kallikrein, and other candidate proteases across tissues and inflammatory states is unresolved.
- gap_statement: >-
    The functions of the released proline-rich peptide and the 35-kDa C-terminal
    ITIH4 chain remain uncertain.
  boundary: >-
    Proteolytic processing and fragment boundaries are established, but proposed
    bioactivity of the released peptide is not supported by a defined receptor,
    molecular target, or separation-of-function phenotype.
  gap_kind:
  - BIOLOGY
  dark_aspect: BP_DARK
  status: OPEN
  significance: >-
    Fragment-specific functions could explain context-dependent inflammatory and
    biomarker behavior not accounted for by intact-protein protease inhibition.
  resolution: >-
    Purify authentic fragments, identify binding partners and receptor responses,
    and compare cleavage-resistant versus fragment-rescue alleles in inflammatory models.
  provenance:
  - reference_id: file:human/ITIH4/ITIH4-notes.md
    supporting_text: The functions of the released proline-rich peptide and 35-kDa C-terminal chain remain uncertain.
- gap_statement: >-
    It is unclear whether ITIH4 is bona fide extracellular-vesicle cargo and whether
    the 70-kDa chain is truly stored in platelet dense granules.
  boundary: >-
    Proteomic datasets and Reactome place ITIH4 in vesicle/dense-granule contexts,
    but accessible evidence does not establish vesicle topology or ITIH4-specific
    dense-granule storage by orthogonal methods.
  gap_kind:
  - BIOLOGY
  - CURATION
  dark_aspect: CC_DARK
  status: OPEN
  significance: >-
    Resolving trafficking would distinguish regulated vesicular delivery from
    co-purification of an abundant soluble plasma protein.
  resolution: >-
    Use density gradients, size-exclusion chromatography, protease protection,
    detergent sensitivity, immunogold microscopy, and platelet-granule release
    assays with chain-specific ITIH4 antibodies.
  provenance:
  - reference_id: PMID:23533145
    supporting_text: some of these proteins could also exist as a soluble form
suggested_questions:
- question: >-
    Which endogenous protease-ITIH4 complexes predominate in healthy plasma and
    during complement- or kallikrein-driven inflammation?
- question: >-
    Does ITIH4 selectively regulate lectin-pathway complement in vivo, or do its
    effects extend to other complement and coagulation protease cascades?
- question: >-
    Do the proline-rich peptide and 35-kDa C-terminal chain have independent
    receptors or signaling activities after ITIH4 cleavage?
- question: >-
    Is ITIH4 actively packaged in platelet dense granules or extracellular
    vesicles, or does soluble plasma ITIH4 co-purify with these compartments?
suggested_experiments:
- hypothesis: >-
    Endogenous ITIH4 restrains lectin-pathway complement activation by forming
    cleavage-dependent complexes with MASP-1 and MASP-2 in plasma.
  description: >-
    Compare lectin-pathway C4/C3 deposition and protease-complex abundance in
    ITIH4-depleted human serum reconstituted with wild-type, cleavage-resistant,
    or VWA metal-binding-deficient ITIH4. Confirm complexes by targeted native
    mass spectrometry and neoepitope immunoassays.
  experiment_type: Human-serum depletion/reconstitution and mechanistic proteomics
- hypothesis: >-
    Plasma kallikrein cleavage converts ITIH4 from a soluble substrate into an
    inhibitor that limits high-molecular-weight kininogen processing.
  description: >-
    Measure bradykinin release and HMWK cleavage kinetics in contact-system
    reconstitutions containing wild-type or cleavage/complex-formation mutants,
    then validate in endothelial permeability assays.
  experiment_type: Reconstituted kallikrein-kinin biochemistry and functional vascular assay
- hypothesis: >-
    ITIH4 proteolytic fragments have biological activities distinct from the
    intact inhibitor complex.
  description: >-
    Generate authentic proline-rich and 35-kDa fragments, screen extracellular
    receptor binding and inflammatory signaling, and use cleavage-resistant ITIH4
    plus fragment add-back to separate inhibitor from fragment-mediated phenotypes.
  experiment_type: Fragment-resolved ligand screening and separation-of-function rescue
- hypothesis: >-
    ITIH4 is selectively stored and released from a platelet granule compartment.
  description: >-
    Localize endogenous ITIH4 chains in resting and activated platelets by
    immunogold electron microscopy, granule fractionation, protease protection,
    and stimulus-dependent release, using plasma carryover controls.
  experiment_type: Platelet subcellular localization and regulated-secretion analysis
