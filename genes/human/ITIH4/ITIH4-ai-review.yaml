- term:
    id: GO:0030212
    label: hyaluronan metabolic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: involved_in
  review:
    summary: >-
      InterPro propagates hyaluronan metabolism from the ITI heavy-chain family.
    action: REMOVE
    reason: >-
      This family transfer conflates ITIH4 with the bikunin-linked heavy chains.
      ITIH4 lacks the conserved C-terminal consensus required for covalent
      bikunin linkage, is not incorporated into proteoglycan complexes, and was
      directly purified as a protein without bikunin. No direct ITIH4 evidence
      supports hyaluronan transfer, binding, or metabolism.
    additional_reference_ids:
