description: >-
  ITIH4 is a liver-produced, secreted plasma glycoprotein of the inter-alpha-inhibitor
  heavy-chain family. Its VIT and von Willebrand factor A domains precede an
  H4-specific C-terminal region containing a proline-rich protease-susceptible
  segment. Cleavage by MASP-1, MASP-2, plasma kallikrein, or other serine proteases
  enables ITIH4 to form divalent-cation-dependent, noncovalent inhibitory complexes
  that sterically restrict access of large protein substrates while retaining
  protease activity toward small substrates. Through this bait-and-trap mechanism,
  ITIH4 inhibits intravascular serine proteases and suppresses lectin-pathway
  complement activation. ITIH4 is also an IL-6-inducible type II acute-phase protein.
  Unlike ITIH1, ITIH2, and ITIH3, ITIH4 lacks the conserved C-terminal sequence
  required for covalent linkage to bikunin and is not incorporated into the
  hyaluronan-associated inter-alpha-inhibitor proteoglycan complexes.
