knowledge_gaps:
- gap_statement: >-
    The relative physiological contributions of SLC7A9 and SLC7A13 as SLC3A1
    partners along distinct human proximal-tubule segments are unresolved.
  boundary: >-
    The SLC7A9-rBAT complex is directly demonstrated in human kidney, whereas the
    SLC7A13-rBAT late-proximal-tubule model is currently supported mainly by orthology.
  gap_kind:
  - BIOLOGY
  dark_aspect: BP_DARK
  status: OPEN
  significance: >-
    Partner-specific resolution is needed to explain segmental cystine handling and
    residual transport in different cystinuria genotypes.
  resolution: >-
    Quantify endogenous SLC3A1-SLC7A9 and SLC3A1-SLC7A13 complexes across human
    proximal-tubule segments and measure partner-specific exchange in organoids.
  provenance:
  - reference_id: file:human/SLC3A1/SLC3A1-deep-research-manual.md
    supporting_text: Evidence for a human SLC3A1-SLC7A13 complex is much less direct than the SLC7A9 evidence.
- gap_statement: >-
    The physiological function of the large extracellular glycosidase-like domain,
    beyond structural stabilization and oligomerization, remains incompletely defined.
  boundary: >-
    The domain binds calcium and resembles glycosidases, but purified complex lacks
    alpha-glucosidase activity and no alternative catalytic substrate is established.
  gap_kind:
  - BIOLOGY
  dark_aspect: MF_DARK
  status: OPEN
  significance: >-
    Resolving this domain's role may explain how extracellular variants alter complex
    folding, trafficking, and cystinuria severity.
  resolution: >-
    Compare structure, trafficking, partner affinity, and transport activation for
    targeted domain and calcium-site mutants without assuming enzymatic activity.
  provenance:
  - reference_id: PMID:32494597
    supporting_text: The results showed that the complex has no α-glucosidase activity
    reference_section_type: RESULTS
    full_text_unavailable: false
suggested_questions:
- question: >-
    What fraction of cystine reabsorption in each human proximal-tubule segment is
    mediated by SLC3A1-SLC7A9 versus SLC3A1-SLC7A13?
- question: >-
    Do any of the six noncanonical SLC3A1 splice isoforms form stable surface
    heteromers or exert tissue-specific dominant-negative effects?
- question: >-
    Does the neuronal vacuolar-membrane localization transferred from rat occur for
    endogenous human SLC3A1, and does it have a transport-related function?
suggested_experiments:
- hypothesis: >-
    Human SLC3A1 activates SLC7A9 transport primarily by promoting heterodimer
    maturation and apical delivery rather than by contributing to the substrate pathway.
  description: >-
    Introduce interface, glycosylation, and extracellular-domain variants into
    SLC3A1-null human proximal-tubule organoids; separately measure heterodimer
    assembly, ER exit, apical abundance, and isotope-labeled cystine/arginine exchange.
  experiment_type: Separation-of-function rescue in human kidney organoids
- hypothesis: >-
    SLC7A9 and SLC7A13 partner with SLC3A1 in different proximal-tubule segments and
    confer distinct exchange substrates.
  description: >-
    Use segment-resolved spatial proteomics and endogenous cross-linking in human
    kidney, followed by reconstitution of each purified heteromer and matched
    counterflow assays for cystine, basic, neutral, and acidic amino acids.
  experiment_type: Partner-resolved spatial proteomics and transport reconstitution
- hypothesis: >-
    Most noncanonical SLC3A1 isoforms fail to assemble a stable apical amino-acid
    transport complex.
  description: >-
    Express each verified isoform at matched levels with SLC7A9 in polarized human
    epithelial cells and compare disulfide-linked assembly, glycan maturation,
    apical trafficking, turnover, and transport activation.
  experiment_type: Isoform-resolved trafficking and functional assay
