id: Q07837
gene_symbol: SLC3A1
product_type: PROTEIN
aliases:
- NBAT
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  SLC3A1 encodes rBAT, a heavily glycosylated type II membrane protein that is
  expressed chiefly at the apical brush border of kidney proximal-tubule and
  intestinal epithelial cells. rBAT forms a disulfide-linked heterodimer with
  the SLC7A9 light chain and promotes assembly, maturation, oligomerization, and
  delivery of the heteromeric amino-acid transporter to the cell surface. The
  SLC7 light chain supplies the transmembrane transport pathway, whereas SLC3A1
  is the heavy-chain accessory and trafficking subunit. The resulting complex
  supports renal and intestinal reabsorption of cystine and dibasic amino acids;
  loss-of-function SLC3A1 variants cause cystinuria, with poorly soluble urinary
  cystine producing recurrent stones. The extracellular alpha-amylase-like fold
  is structurally important but lacks demonstrated glucosidase activity.
