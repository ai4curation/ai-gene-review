core_functions:
- description: >-
    At the apical brush border, SLC3A1/rBAT heterodimerizes with the catalytic
    SLC7A9 light chain and activates the transporter by supporting its maturation,
    oligomerization, and delivery to the plasma membrane. SLC3A1 therefore
    contributes to, but does not independently catalyze, cystine and dibasic-amino-
    acid transmembrane exchange used for renal amino-acid reabsorption.
  molecular_function:
    id: GO:0141109
    label: transporter activator activity
  contributes_to_molecular_function:
    id: GO:0015171
    label: amino acid transmembrane transporter activity
  directly_involved_in:
