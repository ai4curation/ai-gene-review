- id: PMID:1317856
  title: Subcellular localization and membrane topology of serine palmitoyltransferase,
    3-dehydrosphinganine reductase, and sphinganine N-acyltransferase in mouse liver.
  findings: []
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: Primary biochemical study localizing 3-dehydrosphinganine reductase
      (KDSR) activity to the cytosolic face of mouse liver ER; supports the reductase
      function and ER cytosolic-side topology.
- id: PMID:15328338
  title: FVT-1 is a mammalian 3-ketodihydrosphingosine reductase with an active site
    that faces the cytosolic side of the endoplasmic reticulum membrane.
  findings: []
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: Key paper identifying human FVT-1/KDSR as the mammalian KDS reductase;
      purified enzyme has NADPH-dependent activity, localizes to ER, catalytic domain
      faces cytosol.
- id: PMID:15364918
  title: Lateral diffusion of inositol 1,4,5-trisphosphate receptor type 1 is regulated
    by actin filaments and 4.1N in neuronal dendrites.
  findings: []
  reference_review:
    relevance: NONE
    correctness: WRONG_IDENTIFIER
    review_notes: This PMID is a study of IP3R1 lateral diffusion in neurons and does
      not concern KDSR, yet it is cited as the MGI IDA source for three KDSR annotations
      (ER localization, 3-keto-sphinganine metabolic process, and reductase activity).
      Appears to be a wrong-PMID/mis-attributed citation. The affected annotations
      are nonetheless biologically correct and are independently supported by PMID:15328338
      and PMID:19141869.
- id: PMID:16120614
  title: Serinc, an activity-regulated protein family, incorporates serine into membrane
    lipid synthesis.
  findings: []
  reference_review:
    relevance: LOW
    correctness: UNVERIFIED
    review_notes: Study of the Serinc family that forms complexes with serine/sphingolipid
      biosynthetic enzymes; abstract only, does not directly assay KDSR in ceramide
      synthesis. Used to support a pathway-level ceramide biosynthesis annotation.
- id: PMID:19141869
  title: 'Tsc10p and FVT1: topologically distinct short-chain reductases required
    for long-chain base synthesis in yeast and mammals.'
  findings: []
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: Establishes FVT1/KDSR as the principal mammalian 3-ketosphinganine
      reductase required for long-chain base (sphingoid) synthesis; provides silencing,
      mutagenesis, localization and topology data.
- id: PMID:19416851
  title: Identification of small subunits of mammalian serine palmitoyltransferase
    that confer distinct acyl-CoA substrate specificities.
  findings: []
  reference_review:
    relevance: MEDIUM
    correctness: UNVERIFIED
    review_notes: Abstract focuses on SPT small subunits; cited as the IDA source for
      KDSR being active on the cytoplasmic side of the ER membrane. Only the abstract
      is available; the cytosolic-face topology of KDSR is independently well established.
