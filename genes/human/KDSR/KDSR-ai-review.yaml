- id: PMID:28575652
  title: Mutations in KDSR Cause Recessive Progressive Symmetric Erythrokeratoderma.
  findings: []
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: Disease-gene identification; biallelic KDSR mutations cause progressive
      symmetric erythrokeratoderma, with yeast complementation showing loss of KDSR
      function.
- id: PMID:32814053
  title: Interactome Mapping Provides a Network of Neurodegenerative Disease Proteins
    and Uncovers Widespread Protein Aggregation in Affected Brains.
  findings: []
  reference_review:
    relevance: LOW
    correctness: VERIFIED
    review_notes: Large-scale yeast two-hybrid interactome; source of four uninformative
