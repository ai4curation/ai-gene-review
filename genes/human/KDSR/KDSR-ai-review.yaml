id: Q06136
gene_symbol: KDSR
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: KDSR (3-ketodihydrosphingosine reductase; also known as FVT-1 and SDR35C1)
  is an NADPH-dependent short-chain dehydrogenase/reductase that catalyses the second
  step of de novo sphingolipid biosynthesis, the reduction of 3-ketodihydrosphingosine
  (3-ketosphinganine / 3-oxosphinganine) to dihydrosphingosine (sphinganine). This
  step follows the serine palmitoyltransferase (SPT)-catalysed condensation of L-serine
  and palmitoyl-CoA and precedes N-acylation by the ceramide synthases, feeding the
  downstream production of ceramide and complex sphingolipids. It is the principal
  KDS reductase in mammalian cells and is essential for flux through this pathway.
  The enzyme is a multi-pass endoplasmic reticulum membrane protein whose large catalytic
  domain, carrying the NADPH-binding site and active-site residues, faces the cytosolic
  side of the ER membrane. Loss-of-function mutations cause erythrokeratodermia variabilis
  et progressiva 4 (a recessive skin/keratinization disorder) and a spectrum of keratinization
  disorders that can be accompanied by thrombocytopenia due to impaired proplatelet
  formation.
