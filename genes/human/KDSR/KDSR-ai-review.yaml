      several enzymatic steps downstream of KDSR - a pathway-level over-annotation.
- id: PMID:36170811
  title: De novo sphingolipid biosynthesis necessitates detoxification in cancer cells.
  findings: []
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: Full text available; shows KDSR reduces 3KDS to sphinganine and that
      KDSR loss causes toxic 3KDS accumulation, ER dysfunction and proteotoxic stress,
      highlighting KDSR as a cancer therapy target.
