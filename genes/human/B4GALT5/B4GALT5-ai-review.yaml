id: O43286
gene_symbol: B4GALT5
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  B4GALT5 is beta-1,4-galactosyltransferase 5, a Golgi membrane-resident,
  Mn2+-dependent glycosyltransferase (family GT7) that acts as the major
  lactosylceramide (LacCer) synthase in human cells. Its principal reaction is the
  transfer of galactose from UDP-galactose to glucosylceramide (GlcCer) on the
  lumenal face of the Golgi, producing lactosylceramide (Galbeta1-4Glc-ceramide;
  EC 2.4.1.274). Lactosylceramide is the common branch-point precursor from which
  the ganglio-, globo-, isoglobo- and (neo)lacto-series glycosphingolipids are
  built, so B4GALT5 sits at a central node of glycosphingolipid biosynthesis. As a
  beta-1,4-galactosyltransferase, B4GALT5 can also transfer galactose to terminal
  N-acetylglucosamine on glycoprotein N-glycans (forming N-acetyllactosamine),
  contributing to glycoprotein galactosylation. B4GALT5 is a single-pass type II
  membrane protein localized to the trans cisternae of the Golgi stack and is
  broadly expressed. Through its downstream glycosphingolipid products it is
  implicated in nervous-system processes (neuronal maturation, axonogenesis, CNS
  myelination) and in embryonic development; loss of the mouse ortholog is
  embryonic lethal.
