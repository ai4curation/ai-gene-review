- description: >-
    Beta-1,4-galactosyltransferase activity on glycoprotein N-glycans: transfers
    galactose from UDP-galactose to terminal N-acetylglucosamine (GlcNAc),
    forming N-acetyllactosamine (Galbeta1-4GlcNAc). This broader
    beta-1,4-galactosyltransferase activity underlies B4GALT5's contribution to
    glycoprotein galactosylation; it is a secondary activity relative to the
    dominant lactosylceramide-synthase role.
  molecular_function:
