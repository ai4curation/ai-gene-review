    summary: >-
      Phylogenetic (IBA) propagation of a role in glycoprotein biosynthesis, based
      on the broader beta-1,4-galactosyltransferase family, which galactosylates
      terminal GlcNAc on glycoprotein glycans. B4GALT5 does have this secondary
      activity, but its dominant, experimentally established role is
