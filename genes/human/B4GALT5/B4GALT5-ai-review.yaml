core_functions:
- description: >-
    Lactosylceramide synthase: transfers galactose from UDP-galactose to
    glucosylceramide (GlcCer) on the lumenal face of the Golgi to produce
    lactosylceramide (LacCer, Galbeta1-4Glc-ceramide) + UDP (EC 2.4.1.274). This is
    the major LacCer synthase activity in human cells and the committed step
    generating the central glycosphingolipid branch-point precursor.
  molecular_function:
    id: GO:0008489
    label: UDP-galactose:glucosylceramide beta-1,4-galactosyltransferase activity
  supported_by:
