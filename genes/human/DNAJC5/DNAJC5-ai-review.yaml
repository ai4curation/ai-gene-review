suggested_questions:
- question: How does palmitoylation of the cysteine-string domain coordinate CSPalpha's membrane targeting with its J-domain-dependent recruitment of HSC70 to SNARE clients?
- question: By what mechanism do the CLN4B mutations (Leu115Arg, Leu116del) cause a dominant, aggregation-prone gain of toxicity, and how does this relate to lipofuscin accumulation?
- question: Are the melanosome, lysosomal-membrane and mitochondrial proteomic localizations functionally meaningful pools of CSPalpha or fractionation artifacts?
suggested_experiments:
- description: Reconstituted HSC70 ATPase assays comparing wild-type CSPalpha with a J-domain HPD-motif mutant to quantify its HSP70-stimulating co-chaperone activity, and with CLN4B variants to test for loss of co-chaperone function.
- description: Acyl-biotin-exchange / SwissPalm-guided palmitoylation mapping in neurons combined with live imaging to correlate CSPalpha palmitoylation state with synaptic-vesicle membrane targeting and SNAP-25 chaperoning.
- description: Neuronal CSPalpha knockout/rescue with wild-type versus CLN4B variants to dissect the contribution of loss-of-co-chaperone function versus aggregate gain-of-toxicity to neurodegeneration.
