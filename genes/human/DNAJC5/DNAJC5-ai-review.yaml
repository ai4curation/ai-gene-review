- id: PMID:21820099
  title: Mutations in DNAJC5, encoding cysteine-string protein alpha, cause autosomal-dominant adult-onset neuronal ceroid lipofuscinosis.
  reference_review:
    relevance: HIGH
    correctness: UNVERIFIED
    review_notes: "Disease-gene reference establishing that CLN4/ANCL-causing CSPalpha
      variants in the cysteine-string domain abolish palmitoylated monomeric CSPalpha,
      underpinning the in vivo importance of DNAJC5's synaptic co-chaperone function;
      also the IDA source for the plasma-membrane localization. Not cached in
      publications/, so the identifier/content could not be checked against a
      cached/PubMed anchor; title is consistent with the GOA IDA plasma-membrane row
      but left UNVERIFIED."
  findings:
  - statement: CLN4B variants Leu115Arg and Leu116del in the cysteine-string domain cause near absence of palmitoylated monomeric CSPalpha and formation of high molecular mass aggregates; CSPalpha was directly localized to the cell membrane.
    reference_section_type: RESULTS
