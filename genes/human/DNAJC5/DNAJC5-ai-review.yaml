  - statement: CSPalpha acts as a general chaperone in regulated exocytosis and a co-chaperone for SNAP-25; interacts with the HSC70/SGTA chaperone complex and with synaptotagmins; palmitoylated in its cysteine-string domain, which anchors it to vesicle membranes; CLN4B disease gene.
    reference_section_type: OTHER
core_functions:
- description: Membrane-anchored HSC70/HSP70 co-chaperone that, via its J domain, recruits and stimulates HSC70/HSPA8 to chaperone the presynaptic SNARE machinery (SNAP-25), maintaining release-competent synaptic vesicles.
