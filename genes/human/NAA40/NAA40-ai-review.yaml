suggested_questions:
- question: How does NAA40-mediated N-terminal acetylation of H4/H2A functionally cross-talk with adjacent histone modifications (e.g. H4R3 methylation, H4S1 phosphorylation) to regulate transcription?
- question: To what extent do the reported metabolic and anti-apoptotic phenotypes of NAA40 depend on its histone N-terminal acetyltransferase catalytic activity versus non-catalytic roles?
suggested_experiments:
- description: Catalytic-dead NAA40 rescue of an NAA40 knockout to separate histone-acetylation-dependent from independent phenotypes (transcription, rRNA expression, lipid metabolism, apoptosis).
- description: Quantitative N-terminal proteomics/ChIP of H4/H2A N-terminal acetylation genome-wide to map where NAA40 marks chromatin and how this changes with metabolic state.
