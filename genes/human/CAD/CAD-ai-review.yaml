id: P27708
gene_symbol: CAD
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  CAD is a large (2225 aa) multifunctional cytosolic enzyme that carries out the first
  three committed steps of de novo pyrimidine (UMP) biosynthesis, combining four catalytic
  activities in a single polypeptide. Its glutamine-dependent carbamoyl-phosphate synthetase
  II (CPS II) module first uses a glutamine amidotransferase (GATase) reaction to release
  ammonia from L-glutamine, which is then combined with bicarbonate and 2 ATP by a
  carbamoyl-phosphate synthetase reaction to form carbamoyl phosphate (this is the cytosolic
  pyrimidine CPS, biochemically and functionally distinct from the mitochondrial urea-cycle
  enzyme CPS1). The carbamoyl phosphate is channeled to the aspartate transcarbamylase
  (ATCase) module, which condenses it with L-aspartate to make N-carbamoyl-L-aspartate, and
  then to the Zn2+-dependent dihydroorotase (DHOase) module, which cyclizes this to
  (S)-dihydroorotate. CAD assembles into a ~1.5 MDa homohexamer and is the rate-controlling
  entry point of the pathway. Its activity is regulated by phosphorylation: MAP kinase
  (Erk1/2) activates it just before S phase and mTOR/S6K1 (RPS6KB1)-dependent
  phosphorylation of Ser-1859 promotes oligomerization and pathway flux, while PKA and
  allosteric feedback by UMP/UTP inhibit it (PRPP activates). Biallelic loss-of-function
  variants cause CAD deficiency (developmental and epileptic encephalopathy 50), a
  uridine-responsive encephalopathy accompanied by anemia and defective glycosylation.
