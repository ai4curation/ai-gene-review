knowledge_gaps:
- gap_statement: >-
    The molecular basis and timing of PTTG1's separase-activating/chaperone
    function are less resolved than its pseudosubstrate-inhibitory mechanism.
  boundary: >-
    Human knockout and domain-dissection experiments demonstrate an activation
    requirement, while the available human cryo-EM structure primarily explains
    inhibition.
  gap_kind:
  - BIOLOGY
  dark_aspect: MF_DARK
  status: OPEN
  significance: >-
    Separating activation from inhibition is necessary to understand how PTTG1
    abundance promotes or prevents chromosome instability.
  resolution: >-
    Reconstitute separase folding and catalytic maturation with defined PTTG1
    fragments, then pair time-resolved activity measurements with structural
    analysis of activation-competent intermediates.
  provenance:
  - reference_id: PMID:23798554
    supporting_text: switched PTTG1 from an inhibitor into an activator of separase.
    reference_section_type: ABSTRACT
    full_text_unavailable: true
- gap_statement: >-
    The direct requirement for PTTG1 in human spermatogenesis and meiotic
    cohesion has not been established by the locally accessible evidence.
  boundary: >-
    The evidence set contains testis-enriched and stage-specific expression,
    interaction data, and conserved securin biology, but no direct perturbation
    of PTTG1 in human germ cells.
  gap_kind:
  - BIOLOGY
  dark_aspect: BP_DARK
  status: OPEN
  significance: >-
    Resolving this would distinguish a direct germ-cell function from an
    expression-based extrapolation of the general securin mechanism.
  resolution: >-
    Perturb PTTG1 in human germ-cell or gonadal-organoid models and quantify
    meiotic cohesin cleavage, homolog segregation, aneuploidy, and rescue by
    inhibitor- versus activator-defective PTTG1 variants.
  provenance:
  - reference_id: PMID:9915854
    supporting_text: results suggest that PTTG may play a role in spermatogenesis.
    reference_section_type: ABSTRACT
    full_text_unavailable: true
suggested_questions:
- question: >-
    Which PTTG1 regions and conformational transitions promote separase folding
    or catalytic maturation independently of pseudosubstrate inhibition?
- question: >-
    Does PTTG1 have a direct, nonredundant role in human meiotic cohesion and
    spermatogenesis beyond its general separase-regulatory function?
suggested_experiments:
- hypothesis: >-
    PTTG1 contains a separase-activation module that is mechanistically
    separable from the H134-centered high-affinity inhibitory interface.
  description: >-
    Reconstitute human ESPL1 synthesis or refolding with full-length PTTG1 and
    structure-guided PTTG1 fragments or interface mutants; measure ESPL1
    stability, cohesin-substrate cleavage, inhibitor potency, and complex
    structure in parallel.
  experiment_type: Biochemical separation-of-function reconstitution
- hypothesis: >-
    PTTG1 directly protects meiotic cohesion in human germ-cell development.
  description: >-
    Use inducible PTTG1 depletion in human germ-cell or gonadal-organoid models,
    with wild-type and activation- or inhibition-selective rescue alleles, and
    quantify meiotic cohesin cleavage, chromosome segregation, and aneuploidy by
    live imaging and single-cell karyotyping.
  experiment_type: Human germ-cell perturbation and rescue
