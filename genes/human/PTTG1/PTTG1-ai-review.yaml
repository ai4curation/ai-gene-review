    summary: >-
      The phylogenetic inference captures the defining securin activity: PTTG1
      binds the cysteine endopeptidase separase and inhibits access to its
      catalytic and substrate-docking sites.
    action: ACCEPT
    reason: >-
      Human biochemical and cryo-EM studies directly establish inhibition of
      separase by PTTG1 pseudosubstrate motifs, so the transferred term is both
      specific and core.
