id: O95997
gene_symbol: PTTG1
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  PTTG1 encodes securin, an intrinsically disordered cell-cycle regulator that
  binds the cysteine endopeptidase ESPL1/separase. Before anaphase, PTTG1
  occupies the separase catalytic and substrate-docking surfaces and prevents
  premature cohesin cleavage; it also acts as an activating chaperone required
  for full separase competence. APC/C-dependent ubiquitination and proteasomal
  destruction of PTTG1 at the metaphase-to-anaphase transition release separase
  for chromosome segregation. PTTG1 functions in the separase-securin complex
  in nuclear and cytosolic pools, and balanced PTTG1 abundance is important for
  chromosome stability.
