- term:
    id: GO:1902600
    label: proton transmembrane transport
  evidence_type: IEA
  original_reference_id: GO_REF:0000108
  qualifier: involved_in
  review:
    summary: Electronic annotation inferred logically from the Complex I catalytic
      activity (GO:0008137). While Complex I as a whole is a proton pump, the proton
      translocation is performed by the membrane-arm ND subunits, not by the
      IP-fragment TYKY subunit that carries the Fe-S clusters.
    action: MARK_AS_OVER_ANNOTATED
    reason: NDUFS8 is a peripheral-arm iron-sulfur subunit; proton pumping is a property
      of the membrane arm (ND2/ND4/ND5, NDUFB/NDUFA modules). Assigning
      proton-transmembrane-transport directly to this subunit over-attributes a
      whole-complex/membrane-arm activity to a non-transporting electron-carrier subunit.
    supported_by:
    - reference_id: file:human/NDUFS8/NDUFS8-uniprot.txt
      supporting_text: This is a component of the iron-sulfur (IP) fragment of the
        enzyme
