- term:
    id: GO:0042776
    label: proton motive force-driven mitochondrial ATP synthesis
  evidence_type: NAS
  original_reference_id: PMID:30030361
  qualifier: involved_in
  review:
    summary: ComplexPortal NAS annotation linking Complex I to proton-motive-force-driven
      ATP synthesis. Complex I contributes to the proton-motive force, but ATP synthesis
      is carried out by Complex V; for NDUFS8 this is a downstream pathway-level role.
    action: MARK_AS_OVER_ANNOTATED
    reason: This annotation conflates Complex I's contribution to the proton motive force
      with ATP synthesis, which is carried out by Complex V (ATP synthase). NDUFS8's role
      is upstream (electron transport and proton pumping); it does not itself synthesize
      ATP, so proton motive force-driven ATP synthesis is an over-annotation.
    supported_by:
    - reference_id: PMID:30030361
      supporting_text: assembly of the five oxidative phosphorylation system (OXPHOS)
        complexes
