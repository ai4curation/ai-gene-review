id: O00217
gene_symbol: NDUFS8
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: NDUFS8 (TYKY subunit; Complex I-23kDa) is a nuclear-encoded core catalytic
  subunit of mitochondrial respiratory Complex I (NADH:ubiquinone oxidoreductase, EC
  7.1.1.2). It is a component of the iron-sulfur (IP) peripheral arm of the complex and
  coordinates two [4Fe-4S] clusters (N6a and N6b) through two ferredoxin-type domains;
  these clusters form part of the intramolecular electron-transfer wire that carries
  electrons from NADH toward ubiquinone. NDUFS8 is essential both for Complex I catalytic
  activity and for its assembly/stability. The protein is imported into mitochondria
  (cleavable transit peptide) and resides in the mitochondrial inner membrane as a
  peripheral membrane protein on the matrix side. It is highly conserved from bacteria
  (NuoI) to humans and is ubiquitously expressed, with highest levels in heart and
  skeletal muscle. Recessive loss-of-function mutations cause mitochondrial complex I
  deficiency (MC1DN2) and Leigh syndrome.
