proposed_new_terms: []
suggested_questions:
- question: Do the two NDUFS8-coordinated [4Fe-4S] clusters correspond specifically to
    N6a and N6b in the electron-transfer wire of human Complex I, and does either directly
    gate electron transfer to N2/ubiquinone?
- question: Is the NDUFS8-RAB5IF (C20orf24/Q9BUV8) interaction a stable
    assembly/regulatory interaction, and does it warrant a more specific
    molecular-function annotation than protein binding?
suggested_experiments:
- description: Site-directed mutagenesis of the eight cluster-ligating cysteines followed
    by EPR to assign the N6a/N6b clusters to NDUFS8 and measure their redox potentials
    and role in electron transfer.
- description: Blue-native PAGE and cryo-EM of NDUFS8-knockout cells reconstituted with
    wild-type versus patient-variant NDUFS8 to define which assembly intermediate stalls
    and quantify the catalytic contribution of each Fe-S cluster.
