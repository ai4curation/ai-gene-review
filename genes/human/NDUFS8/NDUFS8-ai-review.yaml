    label: NADH dehydrogenase activity
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: contributes_to
  review:
    summary: Phylogenetic (IBA) annotation that NDUFS8 contributes to NADH dehydrogenase
      activity as part of Complex I. NADH oxidation is a property of the assembled
      complex; the contributes_to qualifier correctly reflects that no single subunit
      catalyzes the reaction alone.
    action: ACCEPT
    reason: Consistent with NDUFS8 being a core subunit of the NADH:ubiquinone
      oxidoreductase; the contributes_to qualifier is appropriate for a whole-complex
      activity.
    supported_by:
