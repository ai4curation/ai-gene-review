      Multimodal cell-map interactome. Source of bare protein-binding IPI annotations with CHM (P24386) and
      RABGGTB (P53611). Uninformative as a stand-alone MF.
- id: PMID:7991565
  title: Rab geranylgeranyl transferase catalyzes the geranylgeranylation of adjacent
    cysteines in the small GTPases Rab1A, Rab3A, and Rab5A.
  findings:
  - statement: >-
      Using recombinant Rab geranylgeranyltransferase, Rab escort protein and [3H]geranylgeranyl-PP on Rab1A
      (-XXCC), Rab3A (-XCXC) and Rab5A (-CCXX), both C-terminal adjacent cysteines were geranylgeranylated in
      each Rab, establishing double geranylgeranylation.
    reference_section_type: ABSTRACT
    supporting_text: "found that for each protein both C-terminal adjacent cysteines"
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified. Primary experimental reference for the catalytic activity (UniProt EXP). Directly
      supports the core Rab geranylgeranyltransferase function.
- id: PMID:8380507
  title: 'Retinal degeneration in choroideremia: deficiency of rab geranylgeranyl
    transferase.'
  findings:
  - statement: >-
      Choroideremia is caused by deficiency of component A (REP1) of Rab GG transferase, not component B;
      the disease affects the escort protein rather than the catalytic RABGGTA/RABGGTB subunits.
    reference_section_type: ABSTRACT
    supporting_text: "not component B, of Rab GG transferase"
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified. Establishes the choroideremia link, but attributes the defect to component A
      (REP1/CHM). The RABGGTA visual-perception and protein-modification TAS annotations derived from this
      paper are best treated as over-annotations of the wrong subunit.
