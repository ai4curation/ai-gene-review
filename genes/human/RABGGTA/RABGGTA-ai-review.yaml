core_functions:
- description: >-
    Alpha subunit of Rab geranylgeranyltransferase (RabGGTase), which with the beta subunit RABGGTB
    transfers geranylgeranyl groups from geranylgeranyl diphosphate onto C-terminal cysteines of Rab GTPases.
    Modeled as contributes_to because catalysis is a property of the heterodimeric complex.
  molecular_function:
    id: GO:0004663
    label: Rab geranylgeranyltransferase activity
  directly_involved_in:
  - id: GO:0018344
    label: protein geranylgeranylation
  in_complex:
    id: GO:0005968
    label: Rab-protein geranylgeranyltransferase complex
  locations:
  - id: GO:0005829
    label: cytosol
  supported_by:
  - reference_id: PMID:7991565
    supporting_text: "found that for each protein both C-terminal adjacent cysteines"
  - reference_id: file:human/RABGGTA/RABGGTA-uniprot.txt
    supporting_text: "Catalyzes the transfer of a geranylgeranyl moiety from"
- description: >-
    Substrate recognition function: the RabGGTase complex binds Rab small GTPases as substrates, but only when
    the Rab is presented by a Rab escort protein (CHM/REP1 or CHML/REP2); RABGGTA/RABGGTB do not recognize the
    Rab directly.
  molecular_function:
    id: GO:0031267
    label: small GTPase binding
  in_complex:
    id: GO:0005968
    label: Rab-protein geranylgeranyltransferase complex
  supported_by:
  - reference_id: file:human/RABGGTA/RABGGTA-uniprot.txt
    supporting_text: "The enzymatic reaction requires the aid of a Rab"
