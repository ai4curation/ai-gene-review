description: >-
  RABGGTA encodes the alpha subunit of Rab geranylgeranyltransferase (RabGGTase, also called
  geranylgeranyltransferase type II or GGTase-II; EC 2.5.1.60). Together with the beta subunit RABGGTB it
  forms the catalytic heterodimer that transfers geranylgeranyl groups from geranylgeranyl diphosphate onto
  C-terminal cysteine(s) of Rab GTPases bearing -XXCC, -XCXC or -CCXX motifs (e.g. RAB1A, RAB3A, RAB5A,
  RAB7A). Most Rab substrates are doubly geranylgeranylated. Unlike protein farnesyltransferase and
  geranylgeranyltransferase type I, RabGGTase does not bind its substrate directly; the Rab GTPase must first
  be presented by a Rab escort protein (REP1/CHM or REP2/CHML). This double geranylgeranylation provides the
  lipid anchor that allows Rab proteins to associate with membranes and regulate vesicular trafficking. The
  alpha subunit is a soluble cytosolic protein built from prenyltransferase alpha-subunit (PFTA) repeats and
  a C-terminal leucine-rich-repeat region, and belongs to the protein prenyltransferase subunit alpha family.
