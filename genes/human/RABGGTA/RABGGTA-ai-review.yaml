- id: PMID:2018975
  title: Protein farnesyltransferase and geranylgeranyltransferase share a common
    alpha subunit.
  findings:
  - statement: >-
      Farnesyltransferase and geranylgeranyltransferase were shown to share a common alpha subunit, with
      distinct beta subunits; the geranylgeranyltransferase attaches 20-carbon geranylgeranyl to Ras-related
      proteins.
    reference_section_type: ABSTRACT
    supporting_text: "another prenyltransferase that attaches 20 carbon geranylgeranyl to Ras-related proteins"
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified. Foundational paper on the shared prenyltransferase alpha subunit. Note that the
      FTase/GGTase-I shared alpha is FNTA; RABGGTA is the distinct Rab (type II) alpha subunit. The TAS
      annotations were curated to RABGGTA by PINC.
- id: PMID:21905166
  title: Comprehensive mutation analysis (20 families) of the choroideremia gene reveals
    a missense variant that prevents the binding of REP1 with Rab geranylgeranyl transferase.
  findings:
  - statement: >-
      A choroideremia-associated REP1 (CHM) missense variant p.H507R prevents the binding of REP1 to Rab
      geranylgeranyl transferase, impairing REP1-mediated Rab prenylation.
    reference_section_type: ABSTRACT
    supporting_text: "a missense variant that prevents the binding of REP1 with Rab geranylgeranyl transferase"
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified. Supports the physiological RABGGTA-CHM/REP1 interaction (GOA IPI WITH P24386), though
      the paper's focus is the REP1/CHM side.
