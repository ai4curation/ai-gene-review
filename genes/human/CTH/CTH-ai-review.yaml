    label: cytosol
  supported_by:
  - reference_id: PMID:10212249
    supporting_text: "While the enzyme showed high gamma-lyase activity toward"
  - reference_id: PMID:19428278
    supporting_text: "the enzyme that catalyzes the conversion of cystathionine to cysteine, ammonia, and 2-oxobutyrate"
  - reference_id: file:human/CTH/CTH-uniprot.txt
    supporting_text: "Catalyzes the last step in the trans-sulfuration pathway from"
- description: >-
    Hydrogen sulfide (H2S) biosynthesis: using L-cysteine and (at lower rates)
    L-homocysteine as substrates, CTH is a major enzymatic source of the gasotransmitter
    H2S, generating H2S together with pyruvate/2-oxobutanoate and ammonia. This is a
    genuine second physiological function.
  molecular_function:
    id: GO:0080146
    label: L-cysteine desulfhydrase activity
  directly_involved_in:
  - id: GO:0070814
    label: hydrogen sulfide biosynthetic process
  supported_by:
  - reference_id: PMID:19019829
    supporting_text: "an enzyme responsible for the production of H(2)S"
  - reference_id: file:human/CTH/CTH-uniprot.txt
    supporting_text: "Reaction=L-cysteine + H2O = hydrogen sulfide + pyruvate + NH4(+) +"
- description: >-
    Cysteine-protein sulfhydrase / persulfidation activity: via generated H2S, CTH
    persulfidates target-protein cysteine residues (converting -SH to -SSH) on proteins
    such as GAPDH, PTP1B/PTPN1 and NF-kB RELA, contributing to redox signaling.
  molecular_function:
    id: GO:0004123
    label: cystathionine gamma-lyase activity
  directly_involved_in:
  - id: GO:0044524
    label: protein sulfhydration
  supported_by:
  - reference_id: PMID:22169477
    supporting_text: "The effects of H2S are mediated through its sulfhydration of specific Cys residues in target proteins"
  - reference_id: file:human/CTH/CTH-uniprot.txt
    supporting_text: "cysteine-protein sulfhydrase by mediating sulfhydration of target"
- description: >-
    PLP cofactor binding: CTH is a pyridoxal-5'-phosphate-dependent enzyme, binding PLP
    covalently via a Schiff base to Lys212, which is essential for all of its catalytic
    activities.
  molecular_function:
    id: GO:0030170
    label: pyridoxal phosphate binding
  supported_by:
  - reference_id: PMID:19428278
    supporting_text: "Pyridoxal 5′-phosphate (PLP) is a cofactor for CTH"
  - reference_id: file:human/CTH/CTH-uniprot.txt
    supporting_text: "N6-(pyridoxal phosphate)lysine"
proposed_new_terms: []
suggested_questions:
- question: >-
    To what extent does CTH-derived H2S versus its canonical cysteine-biosynthetic output
    account for its physiological roles in different human tissues (e.g. liver vs vasculature)?
- question: >-
    Is the reported anti-apoptotic / NF-kB-activating role (currently IEA from the mouse
    ortholog) directly demonstrable for human CTH, and via which sulfhydration targets?
suggested_experiments:
- description: >-
    Tissue-specific conditional Cth knockout combined with H2S measurement and
    persulfidation (sulfhydration) proteomics to dissect the metabolic (cysteine
    biosynthesis) versus gasotransmitter (H2S/protein-sulfhydration) contributions.
- description: >-
    Quantitative substrate-preference and kinetic comparison of human CTH on
    L,L-cystathionine, L-cysteine and L-homocysteine at physiological substrate
    concentrations to establish in vivo flux toward cysteine versus H2S.
