id: P32929
gene_symbol: CTH
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  Cystathionine gamma-lyase (CTH; also CSE/CGL; EC 4.4.1.1) is a cytosolic,
  pyridoxal-5'-phosphate (PLP)-dependent enzyme that catalyses the second and final
  step of the transsulfuration pathway, converting the homocysteine-derived
  intermediate L,L-cystathionine into L-cysteine, 2-oxobutanoate and ammonia. It
  thereby channels methionine/homocysteine-derived sulfur into de novo L-cysteine
  biosynthesis, supplying cysteine for downstream metabolism including glutathione
  synthesis. The enzyme is a homotetramer with PLP bound covalently to Lys212 and is
  most highly expressed in liver. Beyond its canonical transsulfuration role, CTH is a
  major enzymatic source of the gaseous signaling molecule hydrogen sulfide (H2S): using
  L-cysteine and, at lower rates, L-homocysteine as substrates it produces H2S (together
  with pyruvate/2-oxobutanoate and ammonia), and in vitro also generates lanthionine and
  homolanthionine. Through H2S generation and by acting as a cysteine-protein sulfhydrase
  (persulfidating target cysteines on proteins such as GAPDH, PTP1B/PTPN1 and NF-kB RELA),
  CTH participates in vascular tone, smooth-muscle biology, inflammation and the ER stress
  response. Loss-of-function variants cause cystathioninuria, an autosomal recessive
  condition marked by elevated plasma/urinary cystathionine that is largely clinically
  benign.
