core_functions:
- description: >-
    Cystathionine gamma-lyase catalysing the final step of the transsulfuration pathway:
    PLP-dependent cleavage of L,L-cystathionine to L-cysteine, 2-oxobutanoate and ammonia,
    supplying de novo L-cysteine (cysteine biosynthesis from homocysteine/methionine sulfur).
  molecular_function:
    id: GO:0004123
    label: cystathionine gamma-lyase activity
  directly_involved_in:
  - id: GO:0019344
    label: L-cysteine biosynthetic process
  - id: GO:0019346
    label: transsulfuration
  locations:
