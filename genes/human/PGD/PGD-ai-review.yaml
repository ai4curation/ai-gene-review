taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: 6-phosphogluconate dehydrogenase (decarboxylating; EC 1.1.1.44) is the third
  enzyme and the second NADPH-producing step of the oxidative branch of the pentose phosphate
  pathway. It catalyses the oxidative decarboxylation of 6-phospho-D-gluconate to
  D-ribulose-5-phosphate and CO2, reducing NADP+ to NADPH. The enzyme is a cytosolic
  homodimer with a shared NADP-binding site between subunits. Its product ribulose-5-phosphate
  feeds the non-oxidative branch of the pathway, ultimately supplying ribose-5-phosphate for
  nucleotide biosynthesis, while the NADPH it generates supports reductive biosynthesis and
  cellular antioxidant defence.
