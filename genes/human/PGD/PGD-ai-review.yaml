  review:
    summary: This IDA on the oxidative-PPP branch cites Beutler et al. 1985, whose abstract
      concerns hereditary deficiency of 6-phosphogluconolactonase (PGLS, EC 3.1.1.31), the
      second oxidative-PPP enzyme, and its interaction with G6PD deficiency, rather than PGD
      itself. The cached record is abstract-only.
    action: UNDECIDED
    reason: PGD's involvement in the oxidative branch of the PPP is well established by other
      annotations, but this specific reference (abstract-only) is about a different oxiPPP
      enzyme (PGLS/6-phosphogluconolactonase), so its support for a PGD annotation cannot be
      verified from the available text. Per policy, not removing an experimental annotation
      whose full text is unavailable; flagged as undecided pending the full text.
    supported_by:
    - reference_id: PMID:3858849
      supporting_text: "Partial deficiency of 6-phosphogluconolactonase (EC 3.1.1.31) of the \nerythrocytes was discovered as an autosomal dominant disorder."
