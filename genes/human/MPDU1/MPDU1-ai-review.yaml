core_functions:
- description: >-
    Utilization/presentation of dolichyl-phosphate-mannose (Dol-P-Man) and
    dolichyl-phosphate-glucose (Dol-P-Glc) on the lumenal side of the ER membrane, enabling
    the mannosylation and glucosylation steps of dolichol-linked (lipid-linked)
    oligosaccharide assembly for protein N-glycosylation (and, via the same donor pathways,
    GPI-anchor and O-/C-mannosylation). MPDU1 has no known catalytic activity and is not
    itself a glycosyltransferase; it controls donor orientation/availability in the ER
    membrane.
  directly_involved_in:
  - id: GO:0006488
    label: dolichol-linked oligosaccharide biosynthetic process
  locations:
  - id: GO:0005789
    label: endoplasmic reticulum membrane
  supported_by:
  - reference_id: PMID:11179430
    supporting_text: >-
      The Lec35 gene product (Lec35p) is required for utilization of the mannose donor
  - reference_id: PMID:11179430
    supporting_text: >-
      Lec35p is not directly required for the enzymatic transfer of mannose from the donor
      to the acceptor substrate
  - reference_id: PMID:11733564
    supporting_text: >-
      accumulated incomplete lipid-linked oligosaccharide precursors for N-linked protein
      glycosylation
  - reference_id: file:human/MPDU1/MPDU1-uniprot.txt
    supporting_text: Required for normal utilization of mannose-dolichol phosphate
  knowledge_gaps:
  - gap_statement: >-
      The precise molecular mechanism by which MPDU1 promotes utilization of Dol-P-Man and
      Dol-P-Glc is undetermined: it lacks any defined catalytic activity and no informative
      molecular-function GO term is assigned. It may reorient (flip) the donor's sugar
      headgroup toward the ER lumen or present the donor to lumenal glycosyltransferases,
      but the biochemical mechanism has not been established.
    boundary: >-
      Its requirement for utilization of the monosaccharide-P-dolichol donors (Dol-P-Man,
      Dol-P-Glc) and its ER-membrane localization are established; the unknown is the
      molecular activity/mechanism, not the pathway or location.
  - gap_statement: >-
      Whether a distinct Dol-P-Glc-selective utilization factor also exists is unresolved,
      as the SL15/Lec35 product was reported to be selective for MPD over GPD, implying an
      additional GPD-selective gene product remains to be identified.
