- term:
    id: GO:0006457
    label: protein folding
  evidence_type: NAS
  original_reference_id: PMID:11179430
  qualifier: involved_in
  review:
    summary: >-
      Annotation reflecting that MPDU1-supported N-glycosylation is important for
      downstream glycoprotein folding (the source paper notes that LLOs are important for
      protein folding). This is a downstream consequence, not MPDU1's molecular role.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      MPDU1 does not act in the protein-folding machinery; it enables use of dolichol-P
      sugar donors for glycan assembly, and correct N-glycosylation in turn supports
      glycoprotein folding. Annotating MPDU1 directly to protein folding over-attributes a
      distal, indirect effect and is better captured by its glycosylation-biosynthesis
      annotations.
    supported_by:
    - reference_id: PMID:11179430
      supporting_text: important for functions such as protein folding and membrane anchoring
