- id: PMID:11179430
  title: Requirement of the Lec35 gene for all known classes of monosaccharide-P-dolichol-dependent
    glycosyltransferase reactions in mammals.
  findings:
  - statement: >-
      Lec35p is required for utilization of the mannose donor Dol-P-Man (MPD) in synthesis
      of both lipid-linked oligosaccharides and glycosylphosphatidylinositols, and is also
      required for MPD-dependent C-mannosylation and GPD-dependent glucosylation of LLO.
    supporting_text: >-
      glucose-P-dolichol (GPD)-dependent glucosylation of LLO. Both were found to require
      Lec35p
  - statement: >-
      Lec35p is not itself the glycosyltransferase; it is not directly required for the
      enzymatic transfer step and instead controls donor orientation in the ER membrane.
    supporting_text: >-
      Lec35p is not directly required for the enzymatic transfer of mannose from the donor
      to the acceptor substrate
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Definitive functional paper (hamster Lec35 = human MPDU1). PubMed-verified;
      establishes the non-catalytic Dol-P-Man/Dol-P-Glc utilization role and ER-membrane
      localization. Abstract-only in cache but the assayed molecular role is clearly stated.
- id: PMID:11733564
  title: MPDU1 mutations underlie a novel human congenital disorder of glycosylation,
    designated type If.
  findings:
  - statement: >-
      MPDU1 mutations cause CDG-If; patient fibroblasts accumulate incomplete LLO
      precursors and normal LLO biosynthesis is restored by expression of wild-type Lec35
      cDNA.
    supporting_text: >-
      Retroviral-based expression of the normal Lec35 cDNA in primary fibroblasts of
      patients restored normal lipid-linked oligosaccharide biosynthesis
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Establishes MPDU1 as the CDG-If disease gene and links loss of function to defective
      dolichol-linked oligosaccharide biosynthesis. Basis for the TAS/IGI BP annotations.
