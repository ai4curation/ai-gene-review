    label: oligosaccharide biosynthetic process
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: involved_in
  review:
    summary: >-
      PAN-GO phylogenetic (IBA) annotation to the general parent term for oligosaccharide
      biosynthesis. This is consistent with MPDU1's established role in dolichol-linked
      oligosaccharide (LLO) assembly; it is broader than the experimentally supported child
      term GO:0006488 (dolichol-linked oligosaccharide biosynthetic process), but a
      correct, conservative phylogenetic call.
    action: ACCEPT
    reason: >-
      The IBA call is correct at the family level and has been through phylogenetic review.
      It is retained at its (general) level; the more specific process the experimental
      evidence supports is captured by the separate GO:0006488 annotation. Kept as a
      conservative phylogenetic annotation rather than second-guessed.
    supported_by:
    - reference_id: PMID:11179430
      supporting_text: >-
        The Lec35 gene product (Lec35p) is required for utilization of the mannose donor
