id: O75352
gene_symbol: MPDU1
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  MPDU1 (Lec35; suppressor of Lec15 and Lec35 glycosylation mutation homolog, SL15) is a
  polytopic endoplasmic reticulum membrane protein of the MPDU1/PQ-loop family that is
  required for efficient utilization of the lipid-linked monosaccharide donors
  dolichyl-phosphate-mannose (Dol-P-Man) and dolichyl-phosphate-glucose (Dol-P-Glc) on
  the lumenal side of the ER. It is not itself a glycosyltransferase and has no known
  catalytic activity; rather it acts as a utilization/presentation factor that makes the
  mannosyl and glucosyl groups of these donors available to the lumenal
  glycosyltransferases, controlling an aspect of donor orientation in the ER membrane.
  Through this role it supports mannosylation and glucosylation steps of dolichol-linked
  oligosaccharide (lipid-linked oligosaccharide, LLO) assembly in protein N-glycosylation,
  as well as GPI-anchor biosynthesis and protein O- and C-mannosylation. Loss of function
  causes MPDU1-CDG (congenital disorder of glycosylation type If), a multisystem disorder
  featuring under-glycosylation of serum glycoproteins with skin (ichthyosis),
  neurological and visual involvement.
