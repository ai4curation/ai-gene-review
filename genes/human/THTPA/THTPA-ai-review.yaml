  title: Molecular characterization of a specific thiamine triphosphatase widely expressed
    in mammalian tissues.
  findings:
  - statement: >-
      Purified a soluble thiamine triphosphatase from calf brain (a 24-kDa
      monomer) that hydrolyzes ThTP with virtually absolute specificity, and
      identified and expressed the human ortholog (this 230-aa protein), which
      showed ThTP-specific ThTPase activity.
    reference_section_type: ABSTRACT
    supporting_text: "hydrolyzing ThTP with virtually absolute specificity"
  - statement: >-
      The mRNA is widely expressed across human tissues but at relatively low
      levels.
    reference_section_type: ABSTRACT
    supporting_text: "expressed in most human"
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified. Cached entry is abstract-only (full_text_available:false).
      Directly establishes the ThTP-specific triphosphatase activity, cytoplasmic
      localization, and broad low-level tissue expression of the human enzyme.
