  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  THTPA encodes thiamine-triphosphatase (ThTPase; EC 3.6.1.28), a soluble,
  Mg2+-dependent hydrolase that specifically hydrolyzes thiamine triphosphate
  (ThTP) to thiamine diphosphate (ThDP) plus inorganic phosphate. The enzyme is
  highly specific for ThTP and has high affinity for its substrate (KM ~8 uM),
  and functions as a regulator of the cellular steady-state level of thiamine
  triphosphate, contributing to thiamine (vitamin B1) phosphate homeostasis. It
  is a 230-residue monomeric protein built on a single CYTH domain, adopting the
  triphosphate-tunnel metalloenzyme (TTM) fold characteristic of the CYTH
  superfamily, and binds one catalytic Mg2+ ion per subunit. THTPA is localized
  to the cytoplasm/cytosol and is widely expressed across mammalian tissues,
  generally at low levels.
