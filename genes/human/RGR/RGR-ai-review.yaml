id: P47804
gene_symbol: RGR
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  RGR (RPE-retinal G protein-coupled receptor, "RGR opsin") is a 291-residue,
  seven-transmembrane member of the class A (rhodopsin) G protein-coupled
  receptor family, opsin subfamily, expressed preferentially in the retinal
  pigment epithelium (RPE) and Mueller cells of the neural retina. Unlike the
  signalling opsins of photoreceptor cells, RGR carries all-trans-retinal as its
  ground-state chromophore, covalently bound through a Schiff base to a conserved
  lysine (Lys255). On absorption of light it acts as a photoisomerase,
  photochemically converting bound all-trans-retinal to 11-cis-retinal, thereby
  supplying 11-cis chromophore for regeneration of visual pigments as a
  light-dependent complement to the enzymatic RPE65/RDH route of the visual
  (retinoid) cycle. In RPE cells RGR also mediates light-dependent mobilization
  and translocation of stored all-trans-retinyl esters from lipid droplets to
  endoplasmic-reticulum membranes, regulating retinyl-ester-processing enzymes
  (LRAT and all-trans-retinyl ester hydrolase). RGR is a multi-pass membrane
  protein of the endoplasmic reticulum / microsomal membranes. Mutations in RGR
  cause retinitis pigmentosa 44 (RP44).
