suggested_questions:
- question: >-
    Does human RGR support any G-protein or arrestin coupling in vivo, or is its
    light response entirely devoted to retinoid photoisomerization and
    retinyl-ester trafficking?
- question: >-
    What is the quantitative contribution of the RGR photoisomerase pathway
    versus the RPE65 enzymatic pathway to 11-cis chromophore supply under
    different light regimes?
suggested_experiments:
- hypothesis: >-
    RGR's all-trans preference and photoisomerase activity are determined by its
    chromophore-binding pocket.
  description: >-
    Structural determination (cryo-EM) of RGR with bound all-trans-retinal to
    define the chromophore pocket and the basis of its all-trans preference.
  experiment_type: structural biology
- hypothesis: >-
    RGR efficiently photoisomerizes all-trans-retinal to 11-cis-retinal on
    illumination.
