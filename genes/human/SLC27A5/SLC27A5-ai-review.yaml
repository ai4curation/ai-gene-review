- id: PMID:10479480
  title: 'Human liver-specific very-long-chain acyl-coenzyme A synthetase: cDNA cloning
    and characterization of a second enzymatically active protein.'
  findings:
  - statement: Human hVLCS-H2 (SLC27A5) is liver-specific, ER-associated, and activates
      long-chain and very-long-chain fatty acids (C18:0-C26:0) to their CoA thioesters.
    reference_section_type: ABSTRACT
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: PubMed-verified; cloning and biochemical characterization of the
      human enzyme's acyl-CoA synthetase activity and ER localization.
- id: PMID:10749848
  title: The human liver-specific homolog of very long-chain acyl-CoA synthetase is
    cholate:CoA ligase.
  findings:
  - statement: hVLCS-H2 (SLC27A5) is cholate ligase; unconjugated bile acids must
      be activated to CoA thioesters before glycine/taurine conjugation, and the enzyme
      is proposed to re-activate/re-conjugate bile acids from the enterohepatic circulation.
    reference_section_type: ABSTRACT
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: PubMed-verified; establishes the defining cholate-CoA ligase activity.
- id: PMID:11980911
  title: Participation of two members of the very long-chain acyl-CoA synthetase family
    in bile acid synthesis and recycling.
  findings:
  - statement: SLC27A5 activates chenodeoxycholate, deoxycholate, lithocholate and
      the C27 precursor THCA in addition to cholate; its primary function is proposed
      to be reactivation and recycling of C24 bile acids.
    reference_section_type: ABSTRACT
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: PubMed-verified; broadens substrate profile and defines the recycling
      role.
- id: PMID:20530735
  title: FATP2 is a hepatic fatty acid transporter and peroxisomal very long-chain
    acyl-CoA synthetase.
  findings:
  - statement: FATP family members act as plasma-membrane-associated LCFA transporters
      and acyl-CoA synthetases in liver; used here to contextualize FATP5's fatty-acid
      uptake/transport role.
    reference_section_type: ABSTRACT
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: PubMed-verified; the knockdown assays are on FATP2 (SLC27A2), but
      the paper frames the FATP-family transporter/synthetase duality relevant to
      FATP5.
- id: PMID:32296183
  title: A reference map of the human binary protein interactome.
  findings:
  - statement: HuRI proteome-scale binary interactome; source of the single high-throughput
      SLC27A5-MEOX2 interaction underlying the protein binding IPI annotation.
    reference_section_type: ABSTRACT
  reference_review:
    relevance: LOW
    correctness: VERIFIED
    review_notes: PubMed-verified; high-throughput Y2H screen, no functional interpretation
      for SLC27A5.
