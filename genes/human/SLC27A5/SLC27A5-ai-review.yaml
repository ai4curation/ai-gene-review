  label: Homo sapiens
description: SLC27A5 (bile acyl-CoA synthetase, BACS; also fatty acid transport protein
  5, FATP5; very-long-chain acyl-CoA synthetase homolog 2, VLCS-H2 / VLACS-related)
  is a liver-specific, endoplasmic-reticulum-membrane enzyme of the ATP-dependent
  AMP-binding (acyl-CoA synthetase) family. Its principal role is the ATP-dependent
  activation of C24 bile acids (cholate, chenodeoxycholate, and the secondary bile
  acids deoxycholate and lithocholate) to their CoA thioesters (bile-acyl-CoA), the
  obligatory step preceding amino-acid (glycine/taurine) conjugation by BAAT. It thereby
  re-activates and re-conjugates bile acids returning to the liver via the enterohepatic
  circulation rather than participating in de novo bile acid synthesis. The enzyme
  also has broad long-chain and very-long-chain fatty-acyl-CoA synthetase activity
  (C18:0-C26:0; EC 6.2.1.3 and 6.2.1.7) and contributes to hepatic long-chain fatty-acid
  uptake. It is a multi-pass membrane protein anchored in the endoplasmic reticulum
  membrane with a large cytoplasmic catalytic domain, with a minor plasma-membrane
  pool associated with fatty-acid uptake.
