core_functions:
- description: >-
    Peroxisomal branched-chain 3-ketoacyl-CoA (3-oxopristanoyl-CoA) thiolase: the
    SCPx thiolase domain catalyzes the thiolytic-cleavage (last) step of
    peroxisomal beta-oxidation for 2-methyl branched-chain fatty acyl-CoAs
    (pristanate) and the C27 bile-acid intermediates DHCA/THCA, activities the
    conventional peroxisomal thiolase performs poorly.
  molecular_function:
    id: GO:0050632
    label: propionyl-CoA C2-trimethyltridecanoyltransferase activity
  directly_involved_in:
  - id: GO:0006635
    label: fatty acid beta-oxidation
  - id: GO:0006699
    label: bile acid biosynthetic process
  locations:
  - id: GO:0005782
    label: peroxisomal matrix
  supported_by:
  - reference_id: PMID:9245689
    supporting_text: >-
      SCPx, a 58 kDa protein with both thiolase and sterol carrier protein activity
      but unknown function so far, readily reacts with 3-oxopristanoyl-CoA
  - reference_id: PMID:16685654
    supporting_text: >-
      the first known patient with a deficiency of sterol carrier protein X (SCPx),
      a peroxisomal enzyme with thiolase activity, which is required for the
      breakdown of branched-chain fatty acids
- description: >-
    Intracellular sterol/lipid transfer: the SCP2 (nonspecific lipid-transfer
    protein) domain removes cholesterol from a donor membrane, shields it in a
    hydrophobic pocket, and delivers it to an acceptor membrane, facilitating
    intermembrane cholesterol and phospholipid trafficking in the cytosol and at
    the endoplasmic reticulum.
  molecular_function:
    id: GO:0120020
    label: cholesterol transfer activity
  directly_involved_in:
  - id: GO:0015918
    label: sterol transport
  locations:
  - id: GO:0005829
    label: cytosol
  - id: GO:0005783
    label: endoplasmic reticulum
  supported_by:
  - reference_id: PMID:15449949
    supporting_text: >-
      Sterol carrier protein-2 (SCP-2) facilitates cholesterol (Ch) and phospholipid
      (PL) transfer/exchange between membranes and appears to play a key role in
      intracellular lipid trafficking
  - reference_id: PMID:15182174
    supporting_text: >-
      Since sterol carrier protein-2 (SCP-2) binds both cholesterol and
      phosphatidylinositol
