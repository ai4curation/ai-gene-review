id: P22307
gene_symbol: SCP2
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  SCP2 is a complex bifunctional gene that produces two protein products from a
  single locus by alternative promoter usage and processing, both sharing a
  common C-terminal SCP2 (sterol-carrier) domain. The larger product, SCPx
  (SCP-x, 58 kDa), is a peroxisomal 3-ketoacyl-CoA thiolase in which an
  N-terminal thiolase domain is fused to the C-terminal SCP2 domain; it
  catalyzes the thiolytic-cleavage (last) step of peroxisomal beta-oxidation for
  2-methyl branched-chain fatty acids (pristanic acid) and the C27 bile-acid
  intermediates di- and trihydroxycoprostanic acid (DHCA/THCA), handling
  substrates that the conventional peroxisomal thiolase (ACAA1) cleaves poorly.
  The smaller product, SCP2 (nonspecific lipid-transfer protein, nsLTP, ~13 kDa
  mature), corresponds to the SCP2 domain alone and is an intracellular
  sterol/phospholipid/fatty-acyl-CoA carrier that transfers cholesterol and
  phospholipids between membranes and binds long-chain fatty acyl-CoAs. Both
  products carry a C-terminal type-1 peroxisomal targeting signal (AKL) and are
  imported into the peroxisomal matrix via PEX5; the transfer protein is also
  found in the cytosol and endoplasmic reticulum. In humans, loss of SCP2/SCPx
  function causes a leukoencephalopathy with dystonia and motor neuropathy,
  accompanied by accumulation of pristanic acid and abnormal bile-alcohol
  glucuronides.
