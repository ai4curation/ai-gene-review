- id: PMID:10706581
  title: Peroxisomal fatty acid oxidation disorders and 58 kDa sterol carrier protein
    X (SCPx). Activity measurements in liver and fibroblasts using a newly developed
    method.
  findings:
  - statement: >-
      SCPx plays a crucial role in the peroxisomal oxidation of branched-chain fatty
      acids; a specific assay measuring choloyl-CoA production from a bile-acid
      intermediate was developed and shown deficient in SCPx-knockout mouse
      fibroblasts.
    reference_section_type: ABSTRACT
    supporting_text: >-
      Sterol carrier protein X (SCPx) plays a crucial role in the peroxisomal
      oxidation of branched-chain fatty acids.
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Abstract-only; establishes SCPx's role in branched-chain fatty acid oxidation
      and the specific bile-acid thiolase assay. PubMed-verified.
- id: PMID:11734571
  title: Identification of the peroxisomal beta-oxidation enzymes involved in the
    biosynthesis of docosahexaenoic acid.
  findings:
  - statement: >-
      Both the conventional 3-ketoacyl-CoA thiolase and SCPx are among the main
      peroxisomal enzymes catalyzing beta-oxidation of C24:6n-3 to DHA (C22:6n-3).
    reference_section_type: ABSTRACT
    supporting_text: >-
      the main enzymes involved in beta-oxidation of C24:6n-3 to C22:6n-3 are SCOX,
      DBP, and both 3-ketoacyl-CoA thiolase and SCPx
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: >-
      Abstract-only; supports SCPx participation in peroxisomal beta-oxidation during
      DHA synthesis (ALA metabolism annotation). PubMed-verified.
- id: PMID:1347505
  title: Subcellular localisation and processing of non-specific lipid transfer protein
    are not aberrant in Rhizomelic Chondrodysplasia Punctata fibroblasts.
  findings:
  - statement: >-
      nsLTP (the SCP2 product) is localised to peroxisomes and present as its mature
      processed form, even in RCDP fibroblasts.
    reference_section_type: ABSTRACT
    supporting_text: >-
      non-specific lipid transfer protein (nsLTP), another peroxisomal protein
      synthesised as a larger precursor, is localised in peroxisomes and is present
      as the mature protein in RCDP fibroblasts
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Abstract-only; direct evidence for peroxisomal localization and precursor
      processing of nsLTP/SCP2. PubMed-verified.
- id: PMID:15182174
  title: Sterol carrier protein-2 directly interacts with caveolin-1 in vitro and
    in vivo.
  findings:
  - statement: >-
      SCP-2 binds both cholesterol and phosphatidylinositol and directly interacts
      with caveolin-1, implicating it in trafficking these lipids to caveolae/lipid
      rafts.
    reference_section_type: ABSTRACT
    supporting_text: >-
      SCP-2 (but not PITP) selectively interacted with caveolin-1, both within the
      cytoplasm and at the plasma membrane
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: >-
      Abstract-only; supports cholesterol/PI binding and the caveolin-1 interaction
      (basis of two IPI protein binding annotations). PubMed-verified.
- id: PMID:15449949
  title: Sterol carrier protein-2-facilitated intermembrane transfer of cholesterol-
    and phospholipid-derived hydroperoxides.
  findings:
  - statement: >-
      SCP-2 facilitates intermembrane transfer/exchange of cholesterol and
      phospholipids and can also traffic their hydroperoxide (LOOH) derivatives,
      accelerating peroxidative damage.
    reference_section_type: ABSTRACT
    supporting_text: >-
      Sterol carrier protein-2 (SCP-2) facilitates cholesterol (Ch) and phospholipid
      (PL) transfer/exchange between membranes and appears to play a key role in
      intracellular lipid trafficking
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Abstract-only; primary support for the sterol/phospholipid transfer activity
      and the lipid-hydroperoxide-transport / cholesterol-transport-regulation
      annotations. PubMed-verified.
- id: PMID:16685654
  title: Mutations in the gene encoding peroxisomal sterol carrier protein X (SCPx)
    cause leukencephalopathy with dystonia and motor neuropathy.
  findings:
  - statement: >-
      The first SCPx-deficient patient shows leukoencephalopathy with dystonia and
      motor neuropathy, pristanic-acid accumulation and abnormal bile-alcohol
      glucuronides; fibroblasts lack SCPx thiolytic activity and SCPx protein.
    reference_section_type: ABSTRACT
    supporting_text: >-
      In cultured skin fibroblasts, the thiolytic activity of SCPx was deficient,
      and no SCPx protein could be detected by western blotting
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Full text (abstract identical) available; disease-defining loss-of-function
      evidence for the SCPx thiolase and the LKDMN phenotype. PubMed-verified.
- id: PMID:17157249
  title: Recognition of a functional peroxisome type 1 target by the dynamic import
    receptor pex5p.
  findings:
  - statement: >-
      The SCP2 gene yields two products (58 kDa SCPx thiolase-SCP2 fusion, and ~15
      kDa preSCP2 processed to mature SCP2); SCP2 is a folded PTS1 cargo recognized
      by PEX5, and its lipid binding is retained when receptor-bound.
    reference_section_type: RESULTS
    supporting_text: >-
      The SCP2 gene is translated into two protein products: SCPx, a 58 kDa fusion
      protein comprising an N-terminal thiolase domain and a C-terminal SCP2 domain,
      and preSCP2, a protein with a molecular mass of about 15 kDa
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Full text available; source of the two-product bifunctional gene model and the
      PEX5/PTS1 import mechanism; supports cytoplasm/mitochondrion localization
      annotations. PubMed-verified.
- id: PMID:17418802
  title: Investigation of the ligand spectrum of human sterol carrier protein 2 using
    a direct mass spectrometry assay.
  findings:
  - statement: >-
      Native mass spectrometry confirmed that long-chain fatty acyl-CoAs are
      high-affinity SCP2 ligands, whereas the equivalent LCFA-carnitines do not bind.
    reference_section_type: ABSTRACT
    supporting_text: >-
      The observation that LCFA-CoAs are high affinity ligands for SCP2 was
      confirmed, while LCFA-carnitines were demonstrated for the first time not to
      interact with SCP2
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Abstract-only; direct support for long-chain fatty-acyl-CoA binding (IDA).
      PubMed-verified.
- id: PMID:18465878
  title: Structure and function of the sterol carrier protein-2 N-terminal presequence.
  findings:
  - statement: >-
      The 20-residue N-terminal presequence of proSCP-2 modulates SCP-2 structure,
      cholesterol localization in the ligand-binding site, membrane association and
      intracellular targeting; SCP-2 binds cholesterol and fatty acyl-CoAs.
    reference_section_type: ABSTRACT
    supporting_text: >-
      membrane association, and, potentially, intracellular targeting
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: >-
      Abstract-only; basis for cholesterol binding, fatty-acyl-CoA binding and oleic
      acid binding IDAs, and for the mitochondrial/peroxisomal targeting behavior.
      PubMed-verified.
- id: PMID:19584060
  title: Solution structure of human Pex5.Pex14.PTS1 protein complexes obtained by
    small angle X-ray scattering.
  findings:
  - statement: >-
      SAXS/SLS analysis of the human PEX5.PEX14 complex loaded with SCP2 (PTS1
      cargo); SCP2 is a transient cargo within the peroxisomal import machinery, not
      a stable functional complex partner.
    reference_section_type: ABSTRACT
    supporting_text: >-
      the interaction of the cargo-loaded Pex5p receptor and the peroxisomal membrane
      protein Pex14p is the essential primary docking step
  reference_review:
    relevance: LOW
    correctness: VERIFIED
    review_notes: >-
      Full text available; basis of the protein-containing-complex (IDA) and a PEX5
      protein-binding (IPI) annotation; the interaction is import-machinery cargo
      loading, not a core functional complex. PubMed-verified.
- id: PMID:19946888
  title: Defining the membrane proteome of NK cells.
  findings:
  - statement: >-
      Large-scale mass-spectrometry survey of the NK-cell (YTS) membrane proteome
      that incidentally identified SCP2 among ~1843 proteins.
    reference_section_type: ABSTRACT
    supporting_text: >-
      identified 1843 proteins with high confidence scores
  reference_review:
    relevance: LOW
    correctness: VERIFIED
    review_notes: >-
      Abstract-only; high-throughput proteomics source of the generic membrane (HDA)
      annotation; not specific to SCP2 function. PubMed-verified.
- id: PMID:21375735
  title: The Peroxisomal Targeting Signal 1 in sterol carrier protein 2 is autonomous
    and essential for receptor recognition.
  findings:
  - statement: >-
      SCP2 import into peroxisomes is absolutely dependent on its C-terminal PTS1;
      the ancillary secondary Pex5p interface is dispensable for import.
    reference_section_type: ABSTRACT
    supporting_text: >-
      receptor-cargo binding and SCP2 transfer into the peroxisome are absolutely
      dependent on the presence of the PTS1
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Full text available; direct peroxisomal-import evidence (IDA peroxisome) and
      the PEX5 interaction annotated as signaling receptor binding (mischaracterized
      MF). PubMed-verified.
- id: PMID:21516116
  title: Next-generation sequencing to generate interactome datasets.
  findings:
  - statement: >-
      A next-generation-sequencing yeast-two-hybrid interactome-mapping pipeline
      (Stitch-seq) that generated a human binary interactome dataset including an
      SCP2 interaction.
    reference_section_type: ABSTRACT
    supporting_text: >-
      used it to generate a new human
  reference_review:
    relevance: LOW
    correctness: VERIFIED
    review_notes: >-
      Full text available; high-throughput binary-interaction source for a bare
      protein-binding IPI (TRIP13). Method paper, not SCP2-specific. PubMed-verified.
- id: PMID:25416956
  title: A proteome-scale map of the human interactome network.
  findings:
  - statement: >-
      A systematic proteome-scale map of ~14,000 high-quality human binary
      protein-protein interactions, one of which involves SCP2.
    reference_section_type: ABSTRACT
    supporting_text: >-
      we describe a systematic map of ?14,000 high-quality human
  reference_review:
    relevance: LOW
    correctness: VERIFIED
    review_notes: >-
      Full text available; high-throughput interactome source for a bare
      protein-binding IPI (TRIP13). Not SCP2-specific. PubMed-verified.
- id: PMID:9245689
  title: 'Sterol carrier protein X (SCPx) is a peroxisomal branched-chain beta-ketothiolase
    specifically reacting with 3-oxo-pristanoyl-CoA: a new, unique role for SCPx in
    branched-chain fatty acid metabolism in peroxisomes.'
  findings:
  - statement: >-
      SCPx is the peroxisomal branched-chain beta-ketothiolase that readily cleaves
      3-oxopristanoyl-CoA, a reaction the conventional peroxisomal thiolase performs
      poorly; SCPx is thus central to branched-chain fatty acid beta-oxidation.
    reference_section_type: ABSTRACT
    supporting_text: >-
      SCPx, a 58 kDa protein with both thiolase and sterol carrier protein activity
      but unknown function so far, readily reacts with 3-oxopristanoyl-CoA
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Abstract-only; foundational identification of the SCPx branched-chain thiolase
      activity (core MF). PubMed-verified.
