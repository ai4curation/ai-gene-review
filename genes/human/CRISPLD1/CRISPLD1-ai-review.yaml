proposed_new_terms: []
knowledge_gaps:
- gap_statement: >-
    CRISPLD1's direct molecular activity, extracellular target/receptor, calcium-handling
    effector, and activity-bearing domain are unknown.
  boundary: >-
    Human cardiomyocyte loss of function establishes regulation of calcium-transient
    amplitude and kinetics, but no experiment has shown direct channel binding,
    channel-current modulation, adaptor activity, or catalysis by purified CRISPLD1.
  gap_kind:
  - BIOLOGY
  dark_aspect: MF_DARK
  status: OPEN
  significance: >-
    Resolving this mechanism is required before assigning calcium channel regulator or
    another specific molecular-function term and is essential for interpreting the
    increase of CRISPLD1 during pressure-overload heart failure.
  resolution: >-
    Test purified/full-length CRISPLD1 and domain variants against candidate cardiac
    calcium-handling proteins, measure channel currents and calcium flux, and perform
    knockout rescue with secretion-defective and domain-deletion constructs.
  provenance:
  - reference_id: PMID:32146539
    supporting_text: >-
      However, the detailed underlying molecular mechanisms remain to be investigated
      in the future.
suggested_questions:
- question: >-
    Which extracellular receptor or calcium-handling protein mediates the CRISPLD1
    effect on cardiomyocyte calcium transients?
- question: >-
    Are the CAP domain, either LCCL domain, and secretion individually required for the
    calcium-cycling phenotype?
- question: >-
    Does CRISPLD1 have a direct developmental role in craniofacial morphogenesis, or do
    the reported human associations reflect linkage and multigene folate-pathway context?
suggested_experiments:
- hypothesis: >-
    Secreted CRISPLD1 directly inhibits a cardiomyocyte calcium-handling protein.
  description: >-
    Produce correctly folded, glycosylated CRISPLD1 and apply it acutely to wild-type
    and CRISPLD1-knockout iPSC-derived cardiomyocytes. Measure calcium transients,
    sarcoplasmic-reticulum calcium load, action potentials, and RyR2/L-type-calcium-channel
    currents; test neutralizing antibodies and washout to distinguish acute extracellular
    signaling from long-term transcriptional adaptation.
  experiment_type: Protein add-back with calcium imaging and electrophysiology
- hypothesis: >-
    CRISPLD1's CAP and LCCL domains make distinct contributions to secretion and calcium
    regulation.
  description: >-
    Rescue isogenic CRISPLD1-knockout cardiomyocytes with wild-type protein, a
    signal-peptide mutant, CAP-domain mutants, and individual LCCL-domain deletions at
    matched expression. Quantify secretion, folding, calcium-transient parameters, and
    recovery of the knockout transcriptomic signature.
  experiment_type: Domain-resolved knockout rescue
- hypothesis: >-
    CRISPLD1 contributes directly to craniofacial morphogenesis only in combination with
    specific CRISPLD2 or folate-pathway genotypes.
  description: >-
    Introduce CRISPLD1 risk alleles or null alleles alone and in combination with
    CRISPLD2/folate-pathway variants into human cranial-neural-crest organoid models.
    Measure migration, survival, facial-mesenchyme differentiation, matrix organization,
    and rescue by wild-type CRISPLD1 under controlled folate conditions.
  experiment_type: Combinatorial isogenic craniofacial-development model
