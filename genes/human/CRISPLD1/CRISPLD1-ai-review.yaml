id: Q9H336
gene_symbol: CRISPLD1
product_type: PROTEIN
aliases:
- CRISP10
- LCRISP1
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  CRISPLD1 is a secreted, disulfide-rich CAP-superfamily protein containing an
  N-terminal SCP/CAP domain and two C-terminal LCCL domains. Its direct molecular
  target and biochemical activity remain unknown. In human induced-pluripotent-stem-cell
  derived cardiomyocytes, CRISPR/Cas9 loss of function increases calcium-transient
  amplitude and alters rise and decay kinetics, supporting a role for extracellular
  CRISPLD1 in restraining cardiomyocyte calcium cycling. CRISPLD1 expression rises
  during the transition from pressure-overload hypertrophy to heart failure. Human
  genetic data provide only weak, interaction-dependent evidence for a craniofacial
  developmental role, while parotid-saliva and prostatic-fluid proteomes detect the
  protein in exosome-enriched extracellular fractions.
