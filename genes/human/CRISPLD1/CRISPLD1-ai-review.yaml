- term:
    id: GO:0060090
    label: molecular adaptor activity
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: enables
  review:
    summary: >-
      The PAINT molecular-adaptor inference traces to a single seed, mouse Glipr1l1,
      whose direct evidence is specific to an outer-acrosomal-membrane sperm complex.
      No CRISPLD1 study identifies macromolecules that it bridges or demonstrates an
      adaptor mechanism.
    action: REMOVE
    reason: >-
      This is an unsafe transfer across divergent CAP-family paralogs. Mouse Glipr1l1
      is a 236-aa CAP-only reproductive protein, whereas CRISPLD1 is a 500-aa secreted
      SF9 protein with a CAP domain plus two LCCL domains. The human cardiomyocyte study
      establishes a calcium-transient phenotype but explicitly leaves the molecular
      mechanism unresolved; it does not rescue the adaptor inference. Retaining this MF
      would convert a tissue-specific source mechanism into an unsupported CRISPLD1
      molecular activity.
    additional_reference_ids:
