id: O96007
gene_symbol: MOCS2
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  MOCS2 is a bicistronic gene that, from two overlapping reading frames, produces
  the two subunits of molybdopterin synthase: the small subunit MOCS2A, a
  ubiquitin-like sulfur-carrier protein whose C-terminal thiocarboxylate delivers
  sulfur, and the large catalytic subunit MOCS2B (the protein described by this
  UniProt entry, O96007). The two subunits assemble into an (MOCS2A)2(MOCS2B)2
  heterotetramer, the molybdopterin synthase complex, which catalyzes the second
  step of molybdenum cofactor (MoCo) biosynthesis: conversion of cyclic pyranopterin
  monophosphate (cPMP / precursor Z) to molybdopterin (MPT). MOCS2B mediates
  insertion of the two sulfur atoms carried by thiocarboxylated MOCS2A into the
  pterin, generating the dithiolene group that subsequently chelates molybdenum.
  The reaction (EC 2.8.1.12) takes place in the cytosol. MoCo produced by this
  pathway is required by the human molybdoenzymes sulfite oxidase, xanthine
  oxidoreductase, aldehyde oxidase, and the mitochondrial amidoxime-reducing
  components. In addition to its biosynthetic role, human MPT synthase, together
  with the ATAC acetyltransferase complex, has been reported to bind and inhibit
  the stress kinase EIF2AK2/PKR, thereby modulating eIF2-alpha/JNK signaling and
  translation initiation. Loss-of-function variants in MOCS2 cause molybdenum
  cofactor deficiency type B (MOCODB1), an autosomal recessive neonatal
  encephalopathy with intractable seizures, elevated urinary sulfite and
  S-sulfocysteine, and hypouricemia.
