- id: PMID:12732628
  title: Mechanistic studies of human molybdopterin synthase reaction and characterization
    of mutants identified in group B patients of molybdenum cofactor deficiency.
  findings:
  - statement: >-
      Purified human MOCS2A and MOCS2B assemble into a functional MPT synthase
      tetramer; the sulfur for the MPT dithiolene group is carried as a C-terminal
      thiocarboxylate on the small subunit MOCS2A.
    supporting_text: >-
      MOCS2A and MOCS2B were purified after heterologous expression in E. coli, and the
      separately purified subunits readily assemble into a functional MPT synthase
      tetramer.
    reference_section_type: ABSTRACT
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified primary characterization of human MPT synthase catalytic mechanism
      and disease mutants; directly supports the core catalytic/complex annotations
      (abstract-only in cache).
- id: PMID:15073332
  title: Evidence for the physiological role of a rhodanese-like protein for the biosynthesis
    of the molybdenum cofactor in humans.
  findings:
  - statement: >-
      In a defined in vitro system, sulfurated MOCS3 provides the sulfur for
      thiocarboxylation of MOCS2A, enabling MPT synthesis; the MPT synthase subunits are
      cytosolic.
    supporting_text: >-
      the sulfurated form of MOCS3-RLD was able to provide the sulfur for the
      thiocarboxylation of MOCS2A, the small MPT synthase subunit in humans.
    reference_section_type: ABSTRACT
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Establishes the physiological sulfur-delivery pathway to MOCS2A and the cytosolic
      localization of MPT synthase (abstract-only in cache).
- id: PMID:16021469
  title: Ten novel mutations in the molybdenum cofactor genes MOCS1 and MOCS2 and
    in vitro characterization of a MOCS2 mutation that abolishes the binding ability
    of molybdopterin synthase.
  findings:
  - statement: >-
      A disease-causing MOCS2B variant abolishes binding of both precursor Z and the
      small subunit MOCS2A, defining MOCS2B's role in complex assembly and substrate
      binding.
    supporting_text: >-
      The mutation was expressed in vitro and was found to abolish the binding
      affinities of the large subunit of molybdopterin synthase (MOCS2B) for both
      precursor Z and the small subunit of molybdopterin synthase (MOCS2A).
    reference_section_type: ABSTRACT
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Basis of the ComplexPortal IDA/IPI annotations; verifies MOCS2B-MOCS2A/precursor Z
      interactions (abstract-only in cache).
- id: PMID:25709896
  title: Investigation of molybdenum cofactor deficiency due to MOCS2 deficiency in
    a newborn baby.
  findings:
  - statement: >-
      Human recombinant WT MOCS2B binds MOCS2A (Kd = 0.36 uM) and supports MPT synthesis,
      whereas the MOCODB1 variant S140F disrupts complex assembly and abolishes activity.
    supporting_text: >-
      While WT MOCS2B showed an effective MPT synthesis (determined by the oxidation
      product FormA, Fig. 2E), MOCS2B-S140F was only able to produce low levels of MPT
      at high concentrations of MOCS2A.
    reference_section_type: RESULTS
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Full text available; provides the direct human recombinant evidence underlying the
      2025 IDA MF/BP/CC annotations for MOCS2B.
- id: PMID:26705305
  title: Moco biosynthesis and the ATAC acetyltransferase engage translation initiation
    by inhibiting latent PKR activity.
  findings:
  - statement: >-
      Human MPT synthase together with the ATAC complex directly binds and inhibits the
      stress kinase PKR, suppressing JNK and eIF2-alpha phosphorylation to promote
      translation initiation - a moonlighting role of MPT synthase.
    supporting_text: >-
      MPT synthase and ATAC directly interacted with PKR and suppressed latent
      autophosphorylation of PKR and its downstream phosphorylation of JNK and
      eukaryotic initiation factor 2α (eIF2α).
    reference_section_type: ABSTRACT
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: >-
      Supports the secondary/moonlighting annotations (nucleus, PKR binding, negative
      regulation of signal transduction), not the core MoCo-biosynthesis function
      (abstract-only in cache).
