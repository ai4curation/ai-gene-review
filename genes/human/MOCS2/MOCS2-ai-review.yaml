suggested_questions:
- question: >-
    Beyond the MOCS2A-dependent sulfur delivery, does MOCS2B have any catalytic role
    independent of the heterotetramer, or is it obligately dependent on the small
    subunit?
- question: >-
    How general and physiologically significant is the moonlighting MPT synthase / ATAC
    inhibition of PKR across human tissues, and is it separable from MoCo biosynthesis?
suggested_experiments:
- description: >-
    Structural characterization of the human (MOCS2A)2(MOCS2B)2 heterotetramer with
    bound precursor Z to define the sulfur-transfer active site and rationalize
    disease variants (e.g. S140F, E168K).
- description: >-
    Quantitative reconstitution of MoCo flux in MOCS2-deficient cells to test whether
    the PKR/translation phenotype is a direct consequence of MPT synthase loss or of
    downstream MoCo deficiency.
