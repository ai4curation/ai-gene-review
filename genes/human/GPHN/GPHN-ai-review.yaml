id: Q9NQX3
gene_symbol: GPHN
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  Gephyrin is a bifunctional (moonlighting) protein that combines an enzymatic and a
  structural role. As an enzyme it catalyses the final two steps of molybdenum cofactor
  (MoCo) biosynthesis: its N-terminal G domain has molybdopterin adenylyltransferase
  activity (adenylylating molybdopterin to adenylyl-molybdopterin), and its C-terminal E
  domain has molybdopterin molybdotransferase (molybdenum insertase) activity (inserting
  molybdenum to form MoCo). MoCo is the prosthetic group required by the human molybdoenzymes
  sulfite oxidase, xanthine dehydrogenase/oxidase, aldehyde oxidase and mARC. In the nervous
  system gephyrin is the master scaffolding protein of inhibitory (glycinergic and GABAergic)
  postsynapses: it clusters glycine receptors and major subsets of GABA type A receptors at
  the postsynaptic membrane, anchoring them to the cytoskeleton, and its clustering activity
  is regulated by palmitoylation. It is a peripheral membrane protein present in the cytosol
  and, in neurons, at the cytoplasmic face of the postsynaptic membrane in dendrites and
  dendritic spines. Loss of the enzymatic function causes molybdenum cofactor deficiency type
  C, whereas disruption of the scaffolding function is associated with hyperekplexia and
  epileptic encephalopathy.
