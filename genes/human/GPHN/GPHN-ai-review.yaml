    summary: >-
      Nitrate reductase is a plant/fungal MoCo-dependent molybdoenzyme used as the readout in the
      Nia1 complementation assay; restoration of nitrate reductase activity reports that gephyrin
      reconstituted MoCo biosynthesis. Human gephyrin is not itself a nitrate reductase, so this
      is a mis-transfer of the assay readout to gephyrin's own molecular function.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      Experimental annotation retained per policy, but nitrate reductase activity is the reporter
      enzyme's function, not gephyrin's; gephyrin's true MF is MoCo biosynthesis (GO:0061598/
      GO:0061599).
