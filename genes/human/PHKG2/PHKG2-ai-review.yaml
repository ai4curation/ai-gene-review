    label: tau-protein kinase activity
  evidence_type: TAS
  original_reference_id: PMID:8999860
  qualifier: enables
  review:
    summary: >-
      This annotation derives from a study showing that phosphorylase kinase purified from
      rabbit skeletal muscle phosphorylates microtubule-associated protein tau in vitro (Km
      6.9 uM), with the authors suggesting PhK may participate in tau phosphorylation in
      neurons. The assayed enzyme is muscle PhK (i.e. the PHKG1 gamma isoform / muscle
      holoenzyme), not the liver/testis PHKG2 gamma-2 isoform, and tau is a much poorer
      substrate than phosphorylase. This is an in-vitro cross-reactivity, not a
      physiological function of PHKG2.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      Retained as an experimental TAS annotation per curation policy (not removed), but
      flagged as an over-annotation: the demonstrated tau kinase activity is an in-vitro
      activity of muscle phosphorylase kinase, tau is a poor substrate relative to glycogen
      phosphorylase, and there is no evidence this reflects a physiological role of the
      liver/testis PHKG2 isoform.
    supported_by:
    - reference_id: PMID:8999860
      supporting_text: Phosphorylase kinase, purified from rabbit skeletal muscle
- term:
    id: GO:0004689
    label: phosphorylase kinase activity
  evidence_type: TAS
  original_reference_id: PMID:2948189
  qualifier: enables
  review:
    summary: >-
      Traceable annotation from the original homology-cloning paper that identified the
      cDNA (PSK-C3) encoding a Ser/Thr kinase 72% identical to rabbit muscle phosphorylase
      kinase gamma subunit, i.e. the initial molecular identification of PHKG2.
    action: ACCEPT
    reason: >-
      Supports the phosphorylase kinase / Ser-Thr kinase identity of the gene product.
    supported_by:
    - reference_id: PMID:2948189
      supporting_text: shares 72% identity with rabbit
