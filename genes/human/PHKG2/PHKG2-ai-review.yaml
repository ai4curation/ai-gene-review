- term:
    id: GO:0006091
    label: generation of precursor metabolites and energy
  evidence_type: TAS
  original_reference_id: PMID:8896567
  qualifier: involved_in
  review:
    summary: >-
      By driving glycogenolysis, PhK contributes to the mobilization of glucose from
      glycogen stores used to maintain blood-glucose homeostasis and supply energy. This is
      a broad metabolic process term, not the core molecular role of PHKG2.
    action: KEEP_AS_NON_CORE
    reason: >-
      Defensible but very general BP; the informative annotations are phosphorylase kinase
      activity and glycogen catabolism. Kept as non-core.
    supported_by:
    - reference_id: PMID:8896567
      supporting_text: phosphorylase kinase (Phk), a regulatory enzyme of
- term:
    id: GO:0006468
    label: protein phosphorylation
  evidence_type: TAS
  original_reference_id: PMID:2948189
  qualifier: involved_in
  review:
    summary: >-
      PHKG2 is a protein kinase that phosphorylates glycogen phosphorylase. Protein
      phosphorylation is a correct but generic biological process; the specific,
      informative process is glycogen catabolism / its positive regulation.
    action: ACCEPT
    reason: >-
      Correct broad BP consistent with the kinase activity; retained as a general process
      term. The specific catabolic/regulatory processes are separately annotated as core.
    supported_by:
    - reference_id: PMID:2948189
      supporting_text: shares 72% identity with rabbit
core_functions:
- description: >-
    Catalytic gamma-2 subunit of phosphorylase kinase; an ATP-dependent protein
    serine/threonine kinase (EC 2.7.11.19) that phosphorylates and activates glycogen
    phosphorylase (b to a), driving glycogen breakdown in the cytosol as part of the
    phosphorylase kinase holoenzyme.
  molecular_function:
    id: GO:0004689
    label: phosphorylase kinase activity
  directly_involved_in:
  - id: GO:0005980
    label: glycogen catabolic process
  locations:
  - id: GO:0005829
    label: cytosol
  in_complex:
    id: GO:0005964
    label: phosphorylase kinase complex
  supported_by:
  - reference_id: PMID:35549678
    supporting_text: the catalytic gamma subunit, which is an active site of PhK enzyme
  - reference_id: PMID:10487978
    supporting_text: kinase (Phk), which phosphorylates and thereby activates glycogen phosphorylase.
- description: >-
    Positive regulation of glycogenolysis: by phosphorylating and activating glycogen
    phosphorylase in response to Ca2+/calmodulin and cAMP/PKA signalling, PHKG2 (within
    the PhK holoenzyme) positively regulates glycogen catabolism.
  molecular_function:
    id: GO:0004689
    label: phosphorylase kinase activity
  directly_involved_in:
  - id: GO:0045819
    label: positive regulation of glycogen catabolic process
  locations:
  - id: GO:0005829
    label: cytosol
  supported_by:
  - reference_id: PMID:10487978
    supporting_text: kinase (Phk), which phosphorylates and thereby activates glycogen phosphorylase.
  - reference_id: PMID:10487978
    supporting_text: Ca2+ relieves inhibition via the delta subunit
