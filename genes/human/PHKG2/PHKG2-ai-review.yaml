id: P15735
gene_symbol: PHKG2
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  PHKG2 encodes the liver/testis isoform of the catalytic gamma subunit of phosphorylase
  kinase (PhK), an ATP-dependent protein serine/threonine kinase (EC 2.7.11.19). PhK is a
  large ~1.3 MDa (alpha-beta-gamma-delta)4 hexadecameric holoenzyme in which the gamma
  subunit (PHKG1 in muscle, PHKG2 in liver/testis and other non-muscle tissues) carries all
  the catalytic activity while alpha (PHKA1/PHKA2) and beta (PHKB) are regulatory and delta
  is calmodulin. PhK activates glycogenolysis by phosphorylating Ser14 of glycogen
  phosphorylase, converting the less-active phosphorylase b to the active phosphorylase a,
  thereby coupling hormonal (cAMP/PKA) and Ca2+/calmodulin signalling to glycogen
  breakdown. The gamma subunit has an N-terminal protein kinase domain and C-terminal
  calmodulin-binding regions and binds ATP. PHKG2 acts in the cytosol. Loss-of-function
  variants cause autosomal recessive glycogen storage disease type IXc (GSD9C, liver PhK
  deficiency), presenting in infancy with hepatomegaly, hypoglycaemia, growth retardation
  and elevated aminotransferases and lipids, and potentially progressing to hepatic
  fibrosis or cirrhosis.
