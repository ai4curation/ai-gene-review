- term:
    id: GO:0006177
    label: GMP biosynthetic process
  evidence_type: IDA
  original_reference_id: PMID:2183217
  qualifier: acts_upstream_of_or_within
  review:
    summary: >-
      GART provides IMP, the precursor from which GMP is made. GART does not itself perform
      GMP-specific biosynthetic reactions; GMP synthesis (IMP -> XMP -> GMP) is carried out
      by IMPDH and GMPS downstream of GART.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      GART acts before the IMP branch point and is not part of GMP-specific biosynthesis.
      Even with the acts_upstream_of_or_within qualifier this term over-specifies GART's
      role; its accurate direct process is de novo IMP biosynthesis (GO:0006189). Marked
      over-annotated to keep review actions consistent across all GO:0006177 lines.
    supported_by:
    - reference_id: file:human/GART/GART-uniprot.txt
      supporting_text: >-
        Trifunctional enzyme that catalyzes three distinct reactions
        as part of the 'de novo' inosine monophosphate biosynthetic pathway.
