proposed_new_terms: []
suggested_questions:
- question: >-
    Under what physiological/metabolic conditions does human GART assemble into the transient
    cytosolic purinosome with other de novo purine enzymes, and how does this affect flux?
- question: >-
    Do the reported phosphorylation and acetylation sites (e.g. Ser-10, Ser-440, Lys-350)
    regulate GART activity, purinosome assembly, or turnover?
suggested_experiments:
- description: >-
    Domain-swap or point-mutant complementation in GART-null cells to confirm the independent
    contribution of each of the three catalytic domains to de novo IMP biosynthesis in human cells.
- description: >-
    Live-cell imaging under purine-replete vs purine-depleted conditions to quantify GART
    incorporation into the purinosome.
