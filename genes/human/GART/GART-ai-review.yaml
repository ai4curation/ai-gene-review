- term:
    id: GO:0046084
    label: adenine biosynthetic process
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: involved_in
  review:
    summary: >-
      IBA-projected term for synthesis of the free purine base adenine. Human GART
      contributes to de novo purine NUCLEOTIDE synthesis (IMP and downstream AMP), not
      to synthesis of the free adenine base.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      Human de novo purine biosynthesis produces IMP and thence the nucleotides AMP/GMP,
      not free adenine base; adenine biosynthetic process is a taxonomically skewed
      projection (CGD/PANTHER) that does not accurately describe GART's role. The
      correct process is 'de novo' IMP biosynthetic process (GO:0006189).
    propagation_review:
      root_cause: TERM_SCOPING_PROBLEM
      failure_modes:
      - LINEAGE_OR_TAXON_MISMATCH
      - GRANULARITY_MISMATCH
      source_entities:
      - source_id: PANTHER:PTN000055158
        source_label: Trifunctional purine biosynthetic protein family node
        comment: >-
          The 'adenine biosynthetic process' projection is contributed via a Candida
          (CGD:CAL0000199243) family member; in human, GART makes the nucleotide IMP,
          not the free adenine base, so the term mis-scopes the biosynthetic product.
    supported_by:
    - reference_id: file:human/GART/GART-uniprot.txt
      supporting_text: >-
        Trifunctional enzyme that catalyzes three distinct reactions
        as part of the 'de novo' inosine monophosphate biosynthetic pathway.
