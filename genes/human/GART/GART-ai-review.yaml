id: P22102
gene_symbol: GART
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  GART encodes the trifunctional purine biosynthetic protein adenosine-3, a single
  cytosolic polypeptide that carries three consecutive activities of the de novo purine
  (IMP) biosynthesis pathway on separate structural domains. Its N-terminal ATP-grasp
  domain provides phosphoribosylamine--glycine ligase (GAR synthetase; EC 6.3.4.13),
  which condenses 5-phospho-beta-D-ribosylamine with glycine and ATP to give
  N(1)-(5-phospho-beta-D-ribosyl)glycinamide (GAR) at step 2. Its C-terminal GART
  domain provides phosphoribosylglycinamide formyltransferase (GAR transformylase;
  EC 2.1.2.2), which transfers a formyl group from 10-formyltetrahydrofolate onto GAR
  to give FGAR at step 3; this folate-dependent transformylase is a validated target
  of antifolate chemotherapeutics such as lometrexol and pemetrexed. Its central AIRS
  domain provides phosphoribosylformylglycinamidine cyclo-ligase (AIR synthetase;
  EC 6.3.3.1), which cyclizes FGAM with ATP to 5-aminoimidazole ribonucleotide (AIR)
  at step 5. The enzyme uses ATP and a divalent metal (Mg2+ or Mn2+) cofactor and acts
  as a homodimer. As a housekeeping enzyme of nucleotide metabolism it is broadly
  expressed; its gene lies on human chromosome 21 within the Down syndrome region.
