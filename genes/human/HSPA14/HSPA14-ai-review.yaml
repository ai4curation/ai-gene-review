suggested_questions:
- question: Does human HSPA14 retain measurable intrinsic ATPase activity, or is it
    (like yeast Ssz1p) an atypical HSP70 whose nucleotide cycle is functionally subordinate
    to stimulating the downstream ribosome-bound HSP70 (HSPA8/Ssb-type)?
- question: What is the nascent-chain client spectrum of human RAC, and does HSPA14/DNAJC2
    show substrate selectivity among co-translationally folding proteins?
- question: Is the reported immunoadjuvant/dendritic-cell-activating activity of HSP70L1
    a genuine extracellular function or an artifact of recombinant protein preparations?
suggested_experiments:
- description: Reconstitute human RAC (HSPA14 + DNAJC2) in vitro and measure ATPase
    activity alone and in the presence of ribosomes and a ribosome-bound HSP70 to test
    whether HSPA14 stimulates the partner HSP70 ATPase, as in yeast.
- description: Selective ribosome profiling or nascent-chain crosslinking after HSPA14
    knockdown to define the co-translational client repertoire and folding defects.
- description: Domain-swap and point-mutation analysis of the HSPA14 nucleotide-binding
    and substrate-binding domains to map the determinants of DNAJC2 binding and nascent-chain
    engagement.
