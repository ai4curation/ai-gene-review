gene_symbol: HSPA14
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: HSPA14 (Heat shock 70 kDa protein 14, also called HSP70L1 / HSP70-like
  protein 1) is an atypical, divergent member of the HSP70 family and the Hsp70/DnaK-type
  subunit of the mammalian ribosome-associated complex (RAC). RAC is a stable cytosolic
  heterodimer of HSPA14 and the Hsp40/DnaJ-type co-chaperone DNAJC2 (MPP11) that docks
  at the ribosomal exit tunnel, where it engages emerging nascent polypeptide chains
  and assists their co-translational ('de novo') folding. Within RAC, HSPA14 provides
  the nucleotide-binding/substrate-binding HSP70 module while DNAJC2 stimulates its
  ATPase activity; the complex couples the chaperone cycle to ongoing translation rather
  than acting as an autonomous stress-induced refoldase. HSPA14 is cytosolic and ribosome-associated,
  and has additionally been described as an immunoadjuvant capable of activating antigen-presenting
  cells.
