suggested_questions:
- question: Is the nuclear NAA15-Ku70/Ku80 transcription-regulatory role a genuine
    NatA-independent moonlighting function, or a consequence of NatA-dependent
    acetylation of nuclear substrates?
- question: How do NAA15 neurodevelopmental/congenital-heart-disease variants
    impair NatA assembly, NAA10 activation, and ribosome anchoring?
suggested_experiments:
- description: Reconstitute NatA from purified NAA10 and NAA15 variants and measure
    N-terminal acetyltransferase activity and ribosome binding to map the NAA15
    surfaces required for NAA10 activation versus ribosome anchoring.
- description: N-terminal acetylome profiling after NAA15 depletion to confirm that
    loss of the auxiliary subunit abolishes NatA-type (Ser/Ala/Thr/Gly/Cys)
    acetylation in cells.
- description: Test whether the Tubedown-1/endothelial vascular phenotypes depend on
    NatA catalytic activity by rescue with acetyltransferase-dead NAA10.
