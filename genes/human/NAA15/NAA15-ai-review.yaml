  title: 'Identification and characterization of the human ARD1-NATH protein acetyltransferase complex.'
  findings:
  - statement: NAA15 (NATH) is the auxiliary subunit of the human NatA complex,
      partnering the catalytic subunit NAA10 (ARD1) and conferring ribosome
      association.
    reference_section_type: RESULTS
