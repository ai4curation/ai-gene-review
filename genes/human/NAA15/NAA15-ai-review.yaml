core_functions:
- description: Non-catalytic auxiliary subunit of the NatA N-terminal
    acetyltransferase complex that binds and activates the catalytic subunit NAA10,
    conferring N-terminal substrate specificity and serving as the scaffold for the
    NatA-associated factors HYPK and NAA50.
