      Molecular-function annotation of NDUFAF1 as an unfolded-protein-binding
      chaperone. This term is present in the UniProt GO cross-references
      (GO:0051082 F:unfolded protein binding IBA:GO_Central) but is not in the
      current GOA TSV, so it is recorded here as a NEW annotation. It is the honest
      molecular function for a non-catalytic assembly chaperone that binds
      nascent/unfolded complex I subunits during early assembly, and is the MF used
      in core_functions.
    action: NEW
    reason: >-
      NDUFAF1/CIA30 is a chaperone-like assembly factor that transiently binds newly
      translated, not-yet-assembled complex I subunits; unfolded protein binding
      (GO:0051082) is the appropriate molecular function and is supported by the
      phylogenetic MF annotation in the UniProt record.
    supported_by:
    - reference_id: PMID:17557076
      supporting_text: "associates with newly translated mtDNA-encoded complex I subunits"
    - reference_id: file:human/NDUFAF1/NDUFAF1-uniprot.txt
      supporting_text: "F:unfolded protein binding"
core_functions:
- description: >-
    Assembly chaperone / non-catalytic assembly factor for mitochondrial respiratory
    chain complex I. As a core subunit of the mitochondrial complex I intermediate
    assembly (MCIA) complex, NDUFAF1 binds unfolded/nascent complex I subunits and
    partner assembly factors to promote assembly of the membrane arm (ND2-module),
    then dissociates from the mature holoenzyme.
