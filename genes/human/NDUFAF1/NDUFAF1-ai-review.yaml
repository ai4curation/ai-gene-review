taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  NDUFAF1 (CIA30; Complex I intermediate-associated protein 30, mitochondrial) is
  a nuclear-encoded mitochondrial assembly factor for respiratory chain complex I
  (NADH:ubiquinone oxidoreductase). It is the human homologue of the Neurospora
  crassa complex I chaperone CIA30 and belongs to the CIA30 family, carrying an
  N-terminal cleavable mitochondrial transit peptide and a galactose-binding
  domain-like (CIA30/Pfam PF08547) fold. After import, the mature protein is
  peripherally associated with the matrix face of the mitochondrial inner
  membrane. NDUFAF1 is a core subunit of the mitochondrial complex I intermediate
  assembly (MCIA) complex, which additionally contains ACAD9, ECSIT and TMEM126B
  plus the accessory factors COA1 and TMEM186; within this complex NDUFAF1 binds
  the N-terminal domain of ECSIT, while ACAD9 binds the ECSIT C-terminal domain,
  so ECSIT bridges NDUFAF1 and ACAD9. The MCIA complex drives assembly of the
  membrane arm (ND2-module) of complex I, associating transiently with newly
  synthesized mtDNA-encoded ND subunits during early intermediate steps and
  dissociating from the mature holoenzyme. NDUFAF1 is not a structural subunit of
  complex I and has no intrinsic catalytic activity; it acts as an assembly
  chaperone. Loss of NDUFAF1 destabilizes the other MCIA components and impairs
  complex I assembly and activity. Biallelic NDUFAF1 mutations cause mitochondrial
  complex I deficiency, nuclear type 11 (MC1DN11), presenting as
  cardioencephalomyopathy / fatal infantile hypertrophic cardiomyopathy. The gene
  is ubiquitously expressed.
