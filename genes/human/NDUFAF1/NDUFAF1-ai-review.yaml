- id: PMID:11935339
  title: 'CIA30 complex I assembly factor: a candidate for human complex I deficiency?'
  findings: []
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: >-
      Characterizes human CIA30/NDUFAF1 as the homologue of the Neurospora crassa
      complex I intermediate-associated chaperone, shows ubiquitous expression, and
      screens complex I deficiency patients; no functional mutation was found in
      this cohort. Supports the chaperone/assembly-factor and tissue-expression
      framing but does not itself demonstrate mechanism.
- id: PMID:16218961
  title: Human mitochondrial complex I assembly is mediated by NDUFAF1.
  findings: []
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Demonstrates NDUFAF1 is a mitochondrial protein required for complex I
      assembly; RNAi knockdown reduces complex I amount and activity, and NDUFAF1
      associates with 600/700 kDa assembly intermediates. Primary evidence for the
      IDA localization and IMP assembly-role annotations.
- id: PMID:17344420
  title: Cytosolic signaling protein Ecsit also localizes to mitochondria where it
    interacts with chaperone NDUFAF1 and functions in complex I assembly.
  findings: []
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Shows mitochondrial ECSIT interacts with assembly chaperone NDUFAF1 in
      500-850 kDa complexes and that both function in complex I assembly. Supports
      the ECSIT interaction and the assembly-process annotation.
- id: PMID:17557076
  title: Human CIA30 is involved in the early assembly of mitochondrial complex I
    and mutations in its gene cause disease.
  findings: []
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Shows CIA30/NDUFAF1 associates with newly translated mtDNA-encoded complex I
      subunits at early assembly stages before dissociating, and that biallelic
      NDUFAF1 mutations cause complex I deficiency with cardioencephalomyopathy.
      Basis for the EXP mitochondrial localization and the disease association.
- id: PMID:20816094
  title: Acyl-CoA dehydrogenase 9 is required for the biogenesis of oxidative phosphorylation
    complex I.
  findings: []
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Establishes ACAD9 as a complex I assembly factor that binds NDUFAF1 and
      ECSIT; supports the NDUFAF1-ACAD9 interaction annotation (part of the MCIA
      complex).
- id: PMID:32296183
  title: A reference map of the human binary protein interactome.
  findings: []
  reference_review:
    relevance: LOW
    correctness: VERIFIED
    review_notes: >-
      High-throughput yeast two-hybrid binary interactome (HuRI). The NDUFAF1
      partners reported here (e.g. PNLIPRP1, SLC30A2, STX8, TMEM86B, TMEM97, YIPF6)
      are not mitochondrial complex I assembly proteins and do not inform NDUFAF1's
      core function; these are generic "protein binding" hits.
- id: PMID:32320651
  title: Dissecting the Roles of Mitochondrial Complex I Intermediate Assembly Complex
    Factors in the Biogenesis of Complex I.
  findings: []
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Defines the MCIA complex (NDUFAF1, ECSIT, ACAD9, TMEM126B) as required for
      building the ND2-module and identifies TMEM186 and COA1 as bona fide MCIA
      components; knockout of each MCIA component impairs complex I assembly.
      Primary evidence for MCIA membership and the assembly-process annotations.
- id: PMID:33320993
  title: Assembly of The Mitochondrial Complex I Assembly Complex Suggests a Regulatory
    Role for Deflavination.
  findings: []
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Structural/biochemical dissection of the MCIA core: ECSIT bridges NDUFAF1 and
      ACAD9 (NDUFAF1 binds ECSIT but not ACAD9 directly); purified mature NDUFAF1
      is a monodisperse monomer. Supports MCIA membership and the NDUFAF1-ECSIT
      interaction.
- id: PMID:33753518
  title: TMEM70 and TMEM242 help to assemble the rotor ring of human ATP synthase
    and interact with assembly factors for complex I.
  findings: []
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: >-
      Reports that TMEM70 and TMEM242 interact with the MCIA complex that supports
      assembly of the membrane arm of complex I; supports a physical-interaction
      (protein binding) annotation but is peripheral to NDUFAF1's core role.
- id: PMID:34646991
  title: Molecular mechanism of interactions between ACAD9 and binding partners in
    mitochondrial respiratory complex I assembly.
  findings: []
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Reconstitutes the ACAD9/ECSIT/NDUFAF1 ternary (MCIA core) complex from
      purified proteins; NDUFAF1 binds the N-terminal domain of ECSIT while ACAD9
      binds the ECSIT C-terminal domain, and NDUFAF1 does not bind ACAD9 directly.
      Supports MCIA membership and the architecture of the assembly complex.
