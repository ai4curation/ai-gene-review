proposed_new_terms:
- proposed_name: reticulophagy receptor activity
  proposed_definition: Binding both to a component of the endoplasmic reticulum membrane and to a member
    of the ATG8 family (LC3/GABARAP), thereby targeting endoplasmic reticulum membrane and contents for
    degradation by macroautophagy (reticulophagy/ER-phagy).
  justification: The current core function of CALCOCO1 as a reticulophagy cargo receptor is not represented
    in its GO annotation set; if a sufficiently specific ER-phagy receptor MF term does not exist it should
    be added, otherwise the existing reticulophagy and cargo-receptor/ATG8-binding terms should be annotated
    to CALCOCO1.
  supported_by:
  - reference_id: file:human/CALCOCO1/CALCOCO1-notes.md
    supporting_text: reticulophagy (ER-phagy)
    reference_section_type: OTHER
  - reference_id: file:human/CALCOCO1/CALCOCO1-uniprot.txt
    supporting_text: 'Q9H0R8: GABARAPL1'
    reference_section_type: DATABASE_ENTRY
- proposed_name: Golgiphagy receptor activity
  proposed_definition: Binding both to a component of the Golgi apparatus membrane and to a member of
    the ATG8 family (LC3/GABARAP), thereby targeting Golgi membrane and contents for degradation by macroautophagy
    (Golgiphagy).
  justification: CALCOCO1 has been reported as a selective-autophagy receptor for the Golgi apparatus
    (Golgiphagy); this organelle-specific cargo-receptor function is not captured by any existing CALCOCO1
    GO annotation.
  supported_by:
  - reference_id: file:human/CALCOCO1/CALCOCO1-notes.md
    supporting_text: Golgiphagy
    reference_section_type: OTHER
suggested_questions:
- question: Which ER and Golgi membrane proteins does CALCOCO1 recognize as cargo, and what are the precise
    LIR/UDS motifs that mediate ATG8-family (LC3/GABARAP) binding?
- question: How is CALCOCO1 partitioned between its cytoplasmic autophagy-receptor function and its nuclear
    coactivator (CoCoA) function, and is the nucleocytoplasmic shuttling regulated by autophagy or stress
    signaling?
