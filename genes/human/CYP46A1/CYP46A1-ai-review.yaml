- id: PMID:10377398
  title: cDNA cloning of cholesterol 24-hydroxylase, a mediator of cholesterol homeostasis
    in the brain.
  findings:
  - statement: >-
      Expression cloning of human and murine cholesterol 24-hydroxylase (CYP46);
      the enzyme converts cholesterol to 24S-hydroxycholesterol, localizes to the
      ER, and is expressed predominantly in brain neurons.
    reference_section_type: ABSTRACT
    supporting_text: >-
      the cDNAs produce an enzymatic activity that converts cholesterol into
      24S-hydroxycholesterol
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Founding paper cloning CYP46A1; establishes the core activity, ER
      localization, and neuronal brain expression. Abstract-only in cache; quotes
      verified verbatim against abstract.
- id: PMID:12077124
  title: Metabolism of 4 beta-hydroxycholesterol in humans.
  findings:
  - statement: >-
      Primarily characterizes turnover of CYP3A4-derived 4beta-hydroxycholesterol;
      the CYP46A1 4beta-hydroxycholesterol 24S-hydroxylation activity is captured
      in the UniProt catalytic-activity block (RHEA:46392).
    reference_section_type: ABSTRACT
    supporting_text: >-
      One of the major oxysterols in the human circulation is 4
      beta-hydroxycholesterol
  reference_review:
    relevance: LOW
    correctness: VERIFIED
    review_notes: >-
      Cited by UniProt as evidence for CYP46A1 metabolism of 4beta-
      hydroxycholesterol, but the abstract foregrounds CYP3A4/CYP7A1 and does not
      state the CYP46A1 activity explicitly; full text presumably assays it.
      Relevant only to a minor secondary substrate.
- id: PMID:14640697
  title: Broad substrate specificity of human cytochrome P450 46A1 which initiates
    cholesterol degradation in the brain.
  findings:
  - statement: >-
      Recombinant CYP46A1 24(S)-hydroxylates cholesterol (the first step in brain
      cholesterol degradation) and has broad in vitro specificity, also
      hydroxylating C27 sterols, C21 steroid hormones (progesterone,
      testosterone), and xenobiotics.
    reference_section_type: ABSTRACT
    supporting_text: >-
      The known activity of cytochrome P450 46A1 (P450 46A1) is
      24(S)-hydroxylation of cholesterol
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Key biochemical characterization establishing both the core cholesterol
      24-hydroxylase activity and the promiscuous secondary activities.
      Abstract-only in cache; quotes verified verbatim.
- id: PMID:18621681
  title: Crystal structures of substrate-bound and substrate-free cytochrome P450
    46A1, the principal cholesterol hydroxylase in the brain.
  findings:
  - statement: >-
      Crystal structures of CYP46A1 (substrate-free and bound to cholesterol
      3-sulfate) confirm the heme cofactor and productive substrate orientation
      for 24-hydroxylation; CYP46A1 initiates the major pathway for brain
      cholesterol removal.
    reference_section_type: ABSTRACT
    supporting_text: >-
      cytochrome P450 46A1 (CYP46A1) initiates the major pathway for cholesterol
      removal from the brain
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Structural basis of substrate binding and catalysis; supports heme binding
      and core function. Abstract-only in cache; quotes verified verbatim.
- id: PMID:20667828
  title: Structural basis of drug binding to CYP46A1, an enzyme that controls cholesterol
    turnover in the brain.
  findings:
  - statement: >-
      Crystal structures of CYP46A1 with four drugs show nitrogen ligands
      coordinating the heme iron; clotrimazole is also a CYP46A1 substrate. The
      enzyme controls brain cholesterol turnover and its loss impairs hippocampal
      plasticity/learning in mice.
    reference_section_type: RESULTS
    supporting_text: clotrimazole is also a substrate for CYP46A1
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Full text available in cache; supports heme binding (IDA), xenobiotic
      metabolism (clotrimazole), and the LTP/learning context. Quotes verified
      verbatim against full text.
- id: PMID:23288837
  title: 'Binding of a cyano- and fluoro-containing drug bicalutamide to cytochrome
    P450 46A1: unusual features and spectral response.'
  findings:
  - statement: >-
      Crystal structure of CYP46A1 with bicalutamide; a water molecule coordinated
      to the heme iron produces unusual spectral responses, confirming heme
