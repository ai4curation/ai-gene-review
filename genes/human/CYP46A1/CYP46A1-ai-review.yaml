suggested_questions:
- question: >-
    Are the synaptic (pre-/postsynapse) and dendrite localizations, currently
    transferred by similarity from the mouse ortholog, directly demonstrable for
    the human protein, or is CYP46A1 essentially confined to the neuronal ER?
suggested_experiments:
- description: >-
    Determine the subcellular distribution of endogenous human CYP46A1 in neurons
    (e.g. by subcellular fractionation combined with high-resolution/expansion
    imaging) to test whether it localizes beyond the ER membrane to synaptic
    compartments and dendrites.
  experiment_type: subcellular localization
