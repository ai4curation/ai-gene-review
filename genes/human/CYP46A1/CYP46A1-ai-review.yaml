      verbatim.
- id: PMID:25017465
  title: Oxidation of 7-dehydrocholesterol and desmosterol by human cytochrome P450
    46A1.
  findings:
  - statement: >-
      CYP46A1 oxidizes cholesterol to 24S-hydroxycholesterol and also oxidizes the
