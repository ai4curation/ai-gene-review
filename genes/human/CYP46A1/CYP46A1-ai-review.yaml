id: Q9Y6A2
gene_symbol: CYP46A1
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  CYP46A1 (cholesterol 24-hydroxylase, cholesterol 24S-hydroxylase, CH24H; EC
  1.14.14.25) is a microsomal, heme-thiolate cytochrome P450 monooxygenase
  expressed predominantly in brain neurons. Anchored to the endoplasmic
  reticulum membrane by a single N-terminal transmembrane helix, it catalyzes
  the O2- and NADPH-cytochrome P450 reductase-dependent hydroxylation of
  cholesterol (with S stereochemistry) at C-24 of the side chain, producing
  (24S)-hydroxycholesterol. This is the principal, rate-limiting route for
  eliminating cholesterol from the central nervous system: unlike cholesterol,
  24S-hydroxycholesterol readily crosses membranes and the blood-brain barrier,
  is exported to the plasma and delivered to the liver, where it can enter the
  alternative bile-acid pathway. 24S-hydroxycholesterol also acts as a signaling
  oxysterol and nuclear-receptor (LXR) ligand and helps regulate neuronal
  cholesterol homeostasis and cerebral cholesterol biosynthesis. As a P450 with
  a conformationally flexible active site, CYP46A1 has broad in vitro substrate
  specificity, further oxidizing sterol intermediates (7-dehydrocholesterol,
  desmosterol, cholestanol, 7alpha-hydroxycholesterol), C21 steroid hormones
  (progesterone, testosterone), and xenobiotics. It is a well-characterized drug
  target in Alzheimer's disease and other neurodegenerative disorders.
