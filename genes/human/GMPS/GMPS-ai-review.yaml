description: GMPS encodes GMP synthase [glutamine-hydrolyzing] (GMP synthetase, EC
  6.3.5.2), the enzyme that catalyzes the final, committed step of de novo guanine-nucleotide
  biosynthesis. It performs the ATP-dependent amination of xanthosine-5'-monophosphate
  (XMP) to guanosine-5'-monophosphate (GMP), using the amide nitrogen donated by L-glutamine
  (XMP + L-glutamine + ATP + H2O -> GMP + L-glutamate + AMP + diphosphate). It acts
  immediately downstream of IMP dehydrogenase (IMPDH1/2), which oxidizes IMP to XMP.
  The protein is a bifunctional enzyme comprising an N-terminal class-I glutamine amidotransferase
  (GATase) domain that hydrolyzes glutamine to release ammonia and a C-terminal ATP-pyrophosphatase
  domain that adenylates XMP; ammonia then attacks the adenyl-XMP intermediate to yield
  GMP. The enzyme requires Mg2+ and acts in the cytosol. Beyond its metabolic role,
  GMPS also has a reported nuclear moonlighting function in USP7 (HAUSP)-dependent
  deubiquitination that stabilizes p53 and in epigenetic regulation; this is a secondary,
  non-core activity relative to its enzymatic role in GMP synthesis.
