    supported_by:
    - reference_id: file:human/IP6K3/IP6K3-uniprot.txt
      supporting_text: >-
        Converts inositol hexakisphosphate (InsP6) to diphosphoinositol pentakisphosphate (InsP7/PP-InsP5).
