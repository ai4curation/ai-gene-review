- term:
    id: GO:0016260
    label: L-selenocysteine biosynthetic process
  evidence_type: IDA
  original_reference_id: PMID:7665581
  qualifier: involved_in
  review:
    summary: >-
      Historical direct (IDA) annotation from the 1995 cloning paper, where human
      selD transfection increased selenium labeling of type-1 iodothyronine
      deiodinase and weakly complemented a bacterial selD mutant. This indirect
      readout established the family assignment, but later work shows the human
      protein lacks selenophosphate synthase activity in vitro and is
      non-essential for selenoprotein synthesis; its role, if any, is in
      selenium/Sec salvage. Retained (experimental IDA) but the biosynthetic
      role is contradicted by the later NOT annotation and is at most non-core.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      Experimental (IDA) evidence retained per policy, but the de novo
      biosynthetic interpretation is superseded by evidence that human SEPHS1
      lacks selenophosphate synthase activity; treat as over-annotation of a
      salvage-context role.
    supported_by:
