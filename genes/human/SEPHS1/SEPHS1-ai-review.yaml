- id: PMID:40608935
  title: Zincore, an atypical coregulator, binds zinc finger transcription factors
    to control gene expression.
  findings:
  - statement: >-
      SEPHS1 and QRICH1 form Zincore, a ZNF-specific transcription coregulator
      essential for embryonic development; a SEPHS1 arginine clamp recognizes
      DNA-bound zinc-finger domains and locks ZNFs (e.g. ZFP91) onto their
      cognate promoter motif to regulate transcription.
    supporting_text: >-
      recognition of different ZNFs and stabilizes ZFP91 onto its cognate DNA
      motif
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified; abstract-only in cache but the definitive structure/
      function study establishing the Zincore coregulator role (nucleus,
      chromosome EXP annotations) and the disease mechanism.
