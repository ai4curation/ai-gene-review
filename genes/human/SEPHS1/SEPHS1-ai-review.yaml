id: P49903
gene_symbol: SEPHS1
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  SEPHS1 is a member of the selenophosphate synthetase / AIRS (SelD, PurM-like)
  family and the paralog of SEPHS2. Structurally it retains the ATP-binding
  selenophosphate-synthetase fold and forms homodimers, but unlike SEPHS2 it
  carries an arginine in place of the catalytic selenocysteine and, in vitro,
  does not synthesize selenophosphate; its contribution to selenocysteine
  biosynthesis is debated and, if any, appears limited to a selenium/
  selenocysteine salvage (recycling) context rather than de novo selenoprotein
  synthesis. The best-characterized function of the human protein is as a core
  subunit of the Zincore complex (a heterotetramer of SEPHS1 and QRICH1), an
  atypical transcription coregulator: SEPHS1 uses an arginine clamp to grip the
  backbone of DNA-bound zinc-finger transcription factors (e.g. ZFP91, ZNF652,
  ZNF526, PRDM15) in a sequence-independent manner, locking them onto their
  cognate promoter motif and thereby controlling gene expression. SEPHS1 also
  contributes to cellular redox homeostasis and cell proliferation/survival via
  selenium-mediated redox signaling, is highly expressed in undifferentiated
  stem cells, and is essential for embryonic development; loss-of-function and
  arginine-clamp variants cause the neurodevelopmental disorder Ververi-Brady
  syndrome 2.
