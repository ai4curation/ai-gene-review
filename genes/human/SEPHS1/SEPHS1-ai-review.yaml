- id: PMID:20471958
  title: Human selenophosphate synthetase 1 has five splice variants with unique interactions,
    subcellular localizations and expression patterns.
  findings:
  - statement: >-
      SPS1 has an arginine where SPS2 has the catalytic selenocysteine, and in
      vitro SPS1 does not synthesize selenophosphate while SPS2 does; SPS1
      knockdown does not affect selenoprotein biosynthesis. SPS1 is implicated in
      oxidative-stress regulation and cell growth.
    supporting_text: >-
      In in vitro experiments, SPS2 synthesized SeP from selenide and ATP, but
      SPS1 did not have this activity
  - statement: >-
      The major-type isoform localizes to plasma and nuclear membranes; the other
      variants are cytoplasmic. All variants homodimerize.
    supporting_text: >-
      MT was localized on both plasma and the nuclear membrane
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
