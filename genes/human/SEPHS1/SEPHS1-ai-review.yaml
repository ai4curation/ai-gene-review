  title: UniProt entry P49903 (SPS1_HUMAN), Zincore component SEPHS1
  findings:
  - statement: >-
      UniProt frames SEPHS1 primarily as a core component of the Zincore
      transcription-coregulator complex that stabilizes zinc-finger transcription
      factors on DNA via an arginine clamp, with a role in redox homeostasis and
      an unclear/likely non-essential role in selenocysteine biosynthesis.
    supporting_text: >-
      acts as a molecular 'grip' to stabilize transcription factors at DNA-
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: Authoritative UniProt record for P49903 (entry version 204).
core_functions:
- description: >-
    Transcription coregulator: as the core catalytic-fold subunit of the Zincore
    complex (with QRICH1), SEPHS1 uses an arginine clamp to grip the backbone of
    DNA-bound zinc-finger transcription factors (ZFP91, ZNF652, ZNF526, PRDM15)
    in a sequence-independent manner, locking them onto their cognate promoter
    motif and enhancing their DNA-binding stability, thereby regulating
    DNA-templated transcription. This function is essential for embryonic
    development and, when disrupted by arginine-clamp variants, causes
    Ververi-Brady syndrome 2.
  molecular_function:
    id: GO:0003712
    label: transcription coregulator activity
  directly_involved_in:
  - id: GO:0006355
    label: regulation of DNA-templated transcription
  supported_by:
  - reference_id: PMID:40608935
    supporting_text: >-
      recognition of different ZNFs and stabilizes ZFP91 onto its cognate DNA
      motif
  - reference_id: file:human/SEPHS1/SEPHS1-uniprot.txt
    supporting_text: >-
      its arginine clamp, enhancing their DNA-binding stability
  locations:
  - id: GO:0005634
    label: nucleus
  - id: GO:0005694
    label: chromosome
- description: >-
    ATP binding: SEPHS1 retains the AIRS/selenophosphate-synthetase nucleotide-
    binding fold and binds ATP (and Mg2+), as established by crystal structures
    with ADP/Mg2+/phosphate and by ATP-binding mutagenesis of the P-loop-like
    region. (De novo selenophosphate synthase catalysis, GO:0004756, is treated
    as uncertain/non-core because human SEPHS1 lacks this activity in vitro.)
  molecular_function:
    id: GO:0005524
    label: ATP binding
  supported_by:
  - reference_id: PMID:7665581
    supporting_text: >-
      reduced selenium labeling was due to altered ATP binding
  locations:
  - id: GO:0005737
    label: cytoplasm
- description: >-
    Cellular redox homeostasis / selenium-mediated redox signaling: SEPHS1
    regulates reactive-oxygen-species balance and supports cell proliferation and
    survival; it is highly expressed in undifferentiated stem cells, and its loss
    increases ROS and impairs survival/reprogramming.
  directly_involved_in:
  - id: GO:0045454
    label: cell redox homeostasis
  supported_by:
  - reference_id: PMID:31607477
    supporting_text: >-
      hSEPHS1 is a regulator of selenium-mediated redox-signaling
  - reference_id: PMID:31607477
    supporting_text: >-
      the ROS pathway and apoptosis in SEPHS1-knockdown cells
proposed_new_terms: []
suggested_questions:
- question: >-
    Does human SEPHS1 have any residual selenophosphate synthetase or selenium/
    selenocysteine salvage activity in vivo, or is its catalytic fold entirely
    repurposed for the Zincore coregulator function?
- question: >-
    Is the redox-homeostasis role of SEPHS1 mechanistically independent of the
    Zincore transcriptional function, or does Zincore-mediated regulation of ROS/
    antioxidant genes account for the observed redox phenotype?
suggested_experiments:
- description: >-
    Quantitative in vitro selenophosphate synthetase assay of purified human
    SEPHS1 (versus SEPHS2), with and without the Arg-to-Sec/Cys substitution at
    the SPS2-equivalent catalytic position, to resolve whether any catalytic
    activity remains.
- description: >-
    Genome-wide profiling (ChIP-seq/CUT&RUN and RNA-seq) of SEPHS1 and QRICH1 in
    cells expressing wild-type versus arginine-clamp (R330E, R371Q/W) SEPHS1 to
    define the direct Zincore target genes and separate transcriptional from
    redox effects.
