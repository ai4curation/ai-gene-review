# Core function 2: Transcriptional cofactor -- RNA Pol II coactivator
- description: >-
    AATF/Che-1 acts as a transcriptional coactivator for RNA polymerase II by binding
    the Pol II subunit POLR2J and cooperating with sequence-specific transcription
    factors to activate target gene expression. AATF displaces the histone deacetylase
    HDAC1 from SP1-bound promoters (e.g. CDKN1A/p21), leading to histone H3
    acetylation and transcriptional activation. It also interacts with Rb family
    members (RB1, RBL1, RBL2) to counteract Rb-mediated repression of E2F target
    genes. AATF associates with SAGA/ATAC HAT module subunits (TADA2A, TADA2B,
    KAT2A/GCN5), linking it to chromatin-modifying transcriptional coactivator
    complexes. After DNA damage, ATM/ATR- and Chk2-dependent phosphorylation
    promotes AATF recruitment to TP53 and CDKN1A promoters, activating p53-dependent
    transcription. AATF also cooperates with NRF-1 to drive nuclear-encoded OXPHOS
    gene transcription.
