    proposed_replacement_terms:
      - id: GO:0003713
        label: transcription coactivator activity
    supported_by:
      - reference_id: PMID:10783144
        supporting_text: "Here we describe Che-1, a novel human protein that interacts with hRPB11"
      - reference_id: PMID:10783144
        supporting_text: "Che-1 represses the growth suppression function of Rb, counteracting the inhibitory action of Rb on the trans-activation function of E2F1"
