# Core function 1: SSU processome structural component -- ribosome biogenesis
- description: >-
    AATF functions as a structural component of the small subunit (SSU) processome,
    a 4.5-MDa nucleolar ribonucleoprotein assembly that mediates early maturation of
    the small ribosomal subunit. Within the SSU processome, AATF binds pre-rRNA and
    contributes to the coordinated RNA folding, modification, rearrangement, and
    cleavage steps required to generate mature 18S rRNA. Cryo-EM structures at
    2.7-3.9 angstrom resolution directly resolve AATF within the processome particle,
    confirming it as a bona fide structural component. AATF also interacts with NGDN,
    another SSU processome subunit, an interaction reproduced across four independent
    studies.
