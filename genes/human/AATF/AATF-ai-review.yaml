- id: PMID:10580117
  title: AATF, a novel transcription factor that interacts with Dlk/ZIP kinase and
    interferes with apoptosis.
  findings:
    - statement: >-
        AATF was identified as a 523-amino-acid nuclear phosphoprotein that interacts with
        the pro-apoptotic kinase Dlk/ZIP kinase and antagonizes Dlk-induced apoptosis.
      supporting_text: >-
        In search for interaction partners that might serve as regulators or targets of
        this kinase we identified apoptosis antagonizing transcription factor (AATF), a
        nuclear phosphoprotein of 523 amino acids.
      reference_section_type: ABSTRACT
      full_text_unavailable: true
    - statement: >-
        AATF contains an extremely acidic domain and a putative leucine zipper, and a
        Gal4-BD-AATF fusion protein exhibited strong transactivation activity, establishing
        AATF as a transcription factor.
      supporting_text: >-
        AATF contains an extremely acidic domain and a putative leucine zipper characteristic
        of transcription factors. Indeed, a Gal4-BD-AATF fusion protein exhibited strong
        transactivation activity.
      reference_section_type: ABSTRACT
      full_text_unavailable: true
    - statement: >-
        AATF interfered with Dlk-induced apoptosis, establishing its anti-apoptotic function.
      supporting_text: >-
        Interestingly, AATF interfered with Dlk-induced apoptosis.
      reference_section_type: ABSTRACT
      full_text_unavailable: true
- id: PMID:10783144
  title: Identification of a novel partner of RNA polymerase II subunit 11, Che-1,
    which interacts with and affects the growth suppression function of Rb.
  findings:
    - statement: >-
        Che-1/AATF was identified as a novel interaction partner of hRPB11 (POLR2J), a
        core subunit of RNA polymerase II, and possesses a domain with high homology to
        E. coli RNA polymerase sigma factor 70.
      supporting_text: >-
        Here we describe Che-1, a novel human protein that interacts with hRPB11. Che-1
        possesses a domain of high homology with Escherichia coli RNA polymerase final
        sigma-factor 70 and SV40 large T antigen.
      reference_section_type: ABSTRACT
      full_text_unavailable: true
    - statement: >-
        Che-1 interacts with Rb through two distinct domains and represses Rb growth
        suppression by counteracting the inhibitory action of Rb on E2F1 transactivation.
      supporting_text: >-
        Che-1 interacts with the retinoblastoma susceptibility gene (Rb) by two distinct
        domains. Functionally, we demonstrate that Che-1 represses the growth suppression
        function of Rb, counteracting the inhibitory action of Rb on the trans-activation
        function of E2F1.
      reference_section_type: ABSTRACT
      full_text_unavailable: true
    - statement: >-
        Che-1 may be part of a transcription regulatory complex bridging RNA Pol II and Rb.
      supporting_text: >-
        These results identify a novel protein that binds Rb and the core of pol II, and
        suggest that Che-1 may be part of transcription regulatory complex.
      reference_section_type: ABSTRACT
      full_text_unavailable: true
- id: PMID:12429849
  title: Functional proteomic analysis of human nucleolus.
  findings:
    - statement: >-
        AATF was identified among 213 nucleolar proteins in HeLa cells by mass spectrometry-based
        proteomic analysis, establishing its nucleolar localization.
      supporting_text: >-
        we have carried out a proteomic analysis to draw up a list of proteins present
        within nucleoli of HeLa cells. This analysis allowed the identification of 213
        different nucleolar proteins.
      reference_section_type: ABSTRACT
      full_text_unavailable: true
    - statement: >-
        The nucleolar proteome functional classification supports the plurifunctional nature
        of nucleoli including roles in ribosome biogenesis and gene expression control.
      supporting_text: >-
        Functional classification of these proteins allowed outlining several biological
        processes taking place within nucleoli. Notably, a role in ribosome biogenesis was
        proposed for 31 proteins.
      reference_section_type: ABSTRACT
      full_text_unavailable: true
- id: PMID:12450794
  title: Che-1 affects cell growth by interfering with the recruitment of HDAC1 by Rb.
  findings:
    - statement: Che-1 interacts with Rb family members RB1, RBL1, RBL2 and is phosphorylated at G1/S transition
- id: PMID:12847090
  title: Che-1 arrests human colon carcinoma cell proliferation by displacing HDAC1
    from the p21WAF1/CIP1 promoter.
  findings:
    - statement: >-
        Che-1/AATF is an RNA polymerase II binding protein that activates p21WAF1/Cip1
        expression by displacing HDAC1 from SP1 binding sites on the p21 promoter, leading
        to histone H3 acetylation and growth arrest in colon carcinoma cells.
      supporting_text: >-
        Che-1 activates p21WAF1/Cip1 by displacing histone deacetylase (HDAC)1 from the
        Sp1 binding sites of the p21WAF1/Cip1 gene promoter and accumulating acetylated
        histone H3 on these sites.
      reference_section_type: ABSTRACT
      full_text_unavailable: true
    - statement: >-
        Che-1 can be considered a general HDAC1 competitor, and Che-1-specific RNAi negatively
        affects p21 transactivation and increases cell proliferation.
      supporting_text: >-
        Che-1-specific RNA interference negatively affects p21WAF1/Cip1 transactivation and
        increases cell proliferation in HCT116 cells. Taken together, our results indicate
        that Che-1 can be considered a general HDAC1 competitor.
      reference_section_type: ABSTRACT
      full_text_unavailable: true
    - statement: >-
        Che-1 previously demonstrated the ability to inhibit Rb growth-suppressing function
        by interfering with Rb-mediated HDAC1 recruitment on E2F target gene promoters.
      supporting_text: >-
        We previously demonstrated that Che-1 inhibits the Rb growth-suppressing function by
        interfering with Rb-mediated HDAC1 recruitment on E2F target gene promoters.
      reference_section_type: ABSTRACT
      full_text_unavailable: true
- id: PMID:14627703
  title: AATF inhibits aberrant production of amyloid beta peptide 1-42 by interacting
    directly with Par-4.
  findings:
    - statement: >-
        AATF colocalizes with Par-4 in both cytoplasmic and nuclear compartments and interacts
        directly and selectively with Par-4 via the leucine zipper domain in neural cells.
      supporting_text: >-
        AATF colocalizes with Par-4 in both cytoplasmic and nuclear compartments, and it
        interacts directly and selectively with Par-4 via the leucine zipper domain in neural
        cells.
      reference_section_type: ABSTRACT
      full_text_unavailable: true
    - statement: >-
        Co-expression of AATF completely blocked aberrant production and secretion of Abeta-42
        induced by Par-4, and AATF/Par-4 complex formation was essential for this inhibitory effect.
      supporting_text: >-
        Co-expression of AATF completely blocked aberrant production and secretion of
        Abeta-(1-42) induced by Par-4, and AATF/Par-4 complex formation was essential for
        the inhibitory effect of AATF on aberrant Abeta secretion.
      reference_section_type: ABSTRACT
      full_text_unavailable: true
    - statement: >-
        AATF is an endogenous antagonist of Par-4 activity, functioning as an effective
        inhibitor of aberrant Abeta production under apoptotic conditions.
      supporting_text: >-
        These results indicate that AATF is an endogenous antagonist of Par-4 activity and
        an effective inhibitor of aberrant Abeta production and secretion under apoptotic
        conditions.
      reference_section_type: ABSTRACT
      full_text_unavailable: true
- id: PMID:15207272
  title: AATF protects neural cells against oxidative damage induced by amyloid beta-peptide.
  findings:
    - statement: >-
        AATF is expressed in cortical neurons and PC12 cells, and Abeta induces alterations
        in AATF expression; inhibition of AATF induction sensitizes neurons to Abeta toxicity.
      supporting_text: >-
        AATF (apoptosis-antagonizing transcription factor), a leucine zipper protein initially
        identified as an interaction partner of DAP like kinase (Dlk), is expressed in cortical
        neurons and in neural PC12 cells. Abeta induces alterations in AATF expression in
        cortical neurons. Inhibition of AATF induction sensitizes neurons to Abeta toxicity.
      reference_section_type: ABSTRACT
      full_text_unavailable: true
    - statement: >-
        AATF overexpression suppresses superoxide production, inhibits peroxynitrite formation
        and lipid peroxidation, and protects against Abeta-induced apoptosis, indicating AATF
        is a neuroprotective factor acting through ROS suppression.
      supporting_text: >-
        Overexpression of AATF suppressed superoxide production, inhibited peroxynitrite
        formation and membrane lipid peroxidation, and protected against Abeta-induced
        apoptosis in PC12 cells. These results suggest that AATF is a novel neuroprotective
        factor and it may protect against Abeta-induced apoptosis through its effects on
        suppressing the production of reactive oxygen species (ROS).
      reference_section_type: ABSTRACT
      full_text_unavailable: true
- id: PMID:17157788
  title: Che-1 phosphorylation by ATM/ATR and Chk2 kinases activates p53 transcription
    and the G2/M checkpoint.
  findings:
    - statement: >-
        Che-1 contributes to the DNA damage response; checkpoint kinases ATM/ATR and Chk2
        interact with Che-1 and promote its phosphorylation and accumulation in response
        to DNA damage.
      supporting_text: >-
        Che-1 contributes to DNA damage response and its depletion sensitizes cells to
        anticancer agents. The checkpoint kinases ATM/ATR and Chk2 interact with Che-1 and
        promote its phosphorylation and accumulation in response to DNA damage.
      reference_section_type: ABSTRACT
      full_text_unavailable: true
    - statement: >-
        DNA damage-induced phosphorylation of Che-1 causes its specific recruitment to the
        TP53 and p21 promoters, with a profound effect on basal p53 expression that is
        preserved following DNA damage.
      supporting_text: >-
        These Che-1 modifications induce a specific recruitment of Che-1 on the TP53 and
        p21 promoters. Interestingly, it has a profound effect on the basal expression of
        p53, which is preserved following DNA damage.
      reference_section_type: ABSTRACT
      full_text_unavailable: true
    - statement: >-
        Che-1 contributes to maintenance of the G2/M checkpoint induced by DNA damage,
        revealing a mechanism by which checkpoint kinases regulate DNA damage responses.
      supporting_text: >-
        Notably, Che-1 contributes to the maintenance of the G2/M checkpoint induced by DNA
        damage. These findings identify a mechanism by which checkpoint kinases regulate
        responses to DNA damage.
      reference_section_type: ABSTRACT
      full_text_unavailable: true
- id: PMID:19911006
  title: AATF mediates an antiapoptotic effect of the unfolded protein response through
    transcriptional regulation of AKT1.
  findings:
    - statement: >-
        AATF is induced by ER stress through the PERK-eIF2alpha pathway and is an
        antiapoptotic component of the unfolded protein response.
      supporting_text: >-
        We show that AATF is induced by ER stress through the PERK-eIF2alpha pathway and
        transcriptionally activates the v-akt murine thymoma viral oncogene homolog 1 (AKT1)
        gene through signal transducer and activator of transcription 3 (Stat3), which
        sustains Akt1 activation and promotes cell survival.
      reference_section_type: ABSTRACT
    - statement: >-
        AATF acts as a transcriptional cofactor that drives AKT1 expression via STAT3,
        sustaining AKT1 activation to promote cell survival under ER stress.
      supporting_text: >-
        Ectopic expression of AATF or a constitutively active form of AKT1 confers on cells
        resistance to ER stress-mediated cell death, whereas RNAi-mediated knockdown of AATF
        or AKT1 renders cells sensitive to ER stress.
      reference_section_type: ABSTRACT
    - statement: >-
        AATF and WFS1 form a positive feedback loop in pancreatic beta-cells, and loss of
        either drives a self-perpetuating cycle of ER-stress-mediated cell death.
      supporting_text: >-
        We also discovered a positive crosstalk between the AATF and WFS1 signaling pathways.
        Thus, WFS1 deficiency or AATF deficiency mediates a self-perpetuating cycle of cell
        death.
      reference_section_type: ABSTRACT
- id: PMID:22658674
  title: Insights into RNA biology from an atlas of mammalian mRNA-binding proteins.
  findings:
    - statement: AATF identified as mRNA-binding protein in HeLa mRNA interactome capture
- id: PMID:22681889
  title: The mRNA-bound proteome and its global occupancy profile on protein-coding
