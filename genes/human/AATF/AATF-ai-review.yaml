id: Q9NY61
gene_symbol: AATF
product_type: PROTEIN
status: IN_PROGRESS
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  AATF (Apoptosis-Antagonizing Transcription Factor, also known as Che-1) is a multifunctional
  nuclear/nucleolar protein that serves as a structural component of the small subunit (SSU)
  processome involved in ribosome biogenesis and as a transcriptional cofactor for RNA polymerase II.
  AATF interacts with POLR2J and Rb family members (RB1, RBL1, RBL2) to modulate E2F target gene
  expression, and displaces HDAC1 from SP1-bound promoters to activate p21/CDKN1A transcription.
  In the DNA damage response, AATF is phosphorylated by ATM/ATR, Chk2, and MK2 kinases, leading
  to modulation of p53-dependent transcriptional programs. AATF also interacts with SAGA/ATAC
  complex HAT module subunits (ADA2A, ADA2B, GCN5/KAT2A) and binds RNA. It antagonizes
  apoptosis induced by Dlk/ZIP kinase and PAWR/Par-4. Recent work shows AATF cooperates with
  NRF-1 to maintain nuclear OXPHOS gene transcription in glioblastoma.
existing_annotations:
- term:
    id: GO:0005730
    label: nucleolus
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      IBA annotation placing AATF in the nucleolus, supported by phylogenetic inference
      across multiple orthologs. AATF nucleolar localization is strongly supported by
      nucleolar proteomics (PMID:12429849), HPA immunofluorescence (GO_REF:0000052),
      cryo-EM SSU processome structure (PMID:34516797), and UniProt subcellular location
      annotation.
    action: ACCEPT
    reason: >-
      Nucleolar localization is one of the best-established features of AATF. The IBA
      annotation is consistent with multiple lines of experimental evidence including
      cryo-EM structural data showing AATF as part of the nucleolar SSU processome
      (PMID:34516797) and nucleolar proteomics (PMID:12429849). UniProt states
      "Nucleus, nucleolus" as subcellular location.
    supported_by:
      - reference_id: PMID:34516797
        supporting_text: "The human small subunit processome mediates early maturation of the small ribosomal subunit"
      - reference_id: PMID:12429849
        supporting_text: "we have carried out a proteomic analysis to draw up a list of proteins present within nucleoli of HeLa cells"
- term:
    id: GO:0045893
    label: positive regulation of DNA-templated transcription
  evidence_type: IEA
  original_reference_id: GO_REF:0000108
  review:
    summary: >-
      IEA annotation inferred from GO:0003713 (transcription coactivator activity) via
      inter-ontology logical links. AATF functions as a transcriptional cofactor that
      activates transcription of multiple target genes including p21/CDKN1A (PMID:12847090),
      p53/TP53 (PMID:17157788), and NRF-1 target OXPHOS genes (Sorino et al. 2026).
    action: ACCEPT
    reason: >-
      This is a reasonable logical inference from transcription coactivator activity. AATF
      clearly positively regulates transcription: it displaces HDAC1 from promoters leading
      to activation of p21 (PMID:12847090), promotes p53 transcription after DNA damage
      (PMID:17157788), and the original identification showed "a Gal4-BD-AATF fusion protein
      exhibited strong transactivation activity" (PMID:10580117).
    supported_by:
      - reference_id: PMID:12847090
        supporting_text: "Che-1 activates p21WAF1/Cip1 by displacing histone deacetylase (HDAC)1 from the Sp1 binding sites of the p21WAF1/Cip1 gene promoter"
      - reference_id: PMID:17157788
        supporting_text: "These Che-1 modifications induce a specific recruitment of Che-1 on the TP53 and p21 promoters"
      - reference_id: PMID:10580117
        supporting_text: "a Gal4-BD-AATF fusion protein exhibited strong transactivation activity"
      - reference_id: "file:human/AATF/AATF-deep-research-falcon.md"
        supporting_text: "AATF physically interacts with NRF-1 and is required for NRF-1-mediated transcription of nuclear-encoded OXPHOS genes by affecting RNA polymerase II recruitment (Sorino et al. 2026)"
- term:
    id: GO:0003713
    label: transcription coactivator activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000107
  review:
    summary: >-
      IEA annotation transferred from mouse ortholog via Ensembl Compara. AATF/Che-1 acts
      as a transcriptional cofactor that binds RNA polymerase II subunit POLR2J (PMID:10783144),
      displaces HDAC1 from promoters to activate transcription of p21 (PMID:12847090), and
      cooperates with NRF-1 for OXPHOS gene transcription (Sorino et al. 2026).
    action: ACCEPT
    reason: >-
      Transcription coactivator activity is a well-supported core function of AATF. The
      protein binds RNA Pol II via POLR2J, interacts with sequence-specific transcription
      factors (SP1, NRF-1, Rb family), and activates transcription from multiple promoters.
      The original Gal4-AATF fusion showed "strong transactivation activity" (PMID:10580117).
    supported_by:
      - reference_id: PMID:10783144
        supporting_text: "Here we describe Che-1, a novel human protein that interacts with hRPB11"
      - reference_id: PMID:12847090
        supporting_text: "Che-1 is a recently identified human RNA polymerase II binding protein involved in the regulation of gene transcription and cell proliferation"
- term:
    id: GO:0005667
    label: transcription regulator complex
  evidence_type: IEA
  original_reference_id: GO_REF:0000107
  review:
    summary: >-
      IEA annotation transferred from mouse ortholog. AATF interacts with SAGA/ATAC HAT
      module subunits (ADA2A, ADA2B, GCN5/KAT2A) (PMID:29232376) and with Rb/E2F complexes
      (PMID:10783144, PMID:12450794), consistent with participation in transcription
      regulator complexes.
    action: ACCEPT
    reason: >-
      AATF is documented to interact with components of SAGA/ATAC complexes (PMID:29232376)
      and with Rb-containing transcriptional regulatory complexes. The term is appropriately
      broad to capture these associations. However, the SSU processome (GO:0032040) is the
      more structurally defined complex membership, covered by a separate annotation.
    supported_by:
      - reference_id: PMID:29232376
        supporting_text: "Co-immunoprecipitation and co-localization experiments were used to demonstrate association of AATF both with two ADA2 isoforms, ADA2A and ADA2B and with GCN5 proteins"
      - reference_id: PMID:10783144
        supporting_text: "these results identify a novel protein that binds Rb and the core of pol II, and suggest that Che-1 may be part of transcription regulatory complex"
- term:
    id: GO:0005737
    label: cytoplasm
  evidence_type: IEA
  original_reference_id: GO_REF:0000107
  review:
    summary: >-
      IEA annotation transferred from mouse ortholog. Cytoplasmic localization of AATF has
      been shown by IDA in PMID:14627703 and PMID:15207272, and PMID:22909821 showed that
      AATF is sequestered in the cytoplasm by MRLC3 and released to the nucleus upon MK2
