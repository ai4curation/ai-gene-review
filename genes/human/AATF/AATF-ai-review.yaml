- term:
    id: GO:0042274
    label: ribosomal small subunit biogenesis
  evidence_type: IDA
  original_reference_id: PMID:34516797
  review:
    summary: >-
      IDA annotation for ribosomal small subunit biogenesis based on the cryo-EM SSU
      processome structures (PMID:34516797). As a structural component of the SSU
      processome, AATF participates in the maturation process that generates the small
      ribosomal subunit.
    action: ACCEPT
    reason: >-
      AATF is a bona fide component of the SSU processome, which is the first precursor
      of the small eukaryotic ribosomal subunit. The processome mediates RNA folding,
      modifications, rearrangements, cleavage, and targeted degradation of pre-ribosomal
      RNA. This is a core biological process for AATF.
    supported_by:
      - reference_id: PMID:34516797
        supporting_text: "These conserved mechanisms highlight the SSU processome's impressive structural plasticity, which endows this 4.5-megadalton nucleolar assembly with the distinctive ability to mature the small ribosomal subunit from within"
- term:
