- id: PMID:22909821
  title: AATF/Che-1 acts as a phosphorylation-dependent molecular modulator to repress
    p53-driven apoptosis.
  findings:
    - statement: >-
        AATF is phosphorylated by checkpoint kinase MK2 upon genotoxic stress, and this
        phosphorylation releases AATF from cytoplasmic MRLC3, enabling nuclear translocation.
      supporting_text: >-
        Upon genotoxic stress, AATF is phosphorylated by the checkpoint kinase MK2.
        Phosphorylation results in the release of AATF from cytoplasmic MRLC3 and
        subsequent nuclear translocation.
      reference_section_type: ABSTRACT
      full_text_unavailable: true
    - statement: >-
        Nuclear AATF binds to PUMA, BAX, and BAK promoter regions to repress p53-driven
        expression of these pro-apoptotic genes, acting as a critical regulator that shifts
        the p53 response from apoptosis toward cell-cycle arrest and DNA repair.
      supporting_text: >-
        where AATF binds to the PUMA, BAX and BAK promoter regions to repress p53-driven
        expression of these pro-apoptotic genes.
      reference_section_type: ABSTRACT
      full_text_unavailable: true
    - statement: >-
        The p38/MK2/AATF signalling module is identified as a critical repressor of p53-driven
        apoptosis; AATF depletion dramatically enhances tumor response to genotoxic chemotherapy,
        while phospho-mimicking AATF causes adriamycin resistance in vivo.
      supporting_text: >-
        In xenograft experiments, mice exhibit a dramatically enhanced response of
        AATF-depleted tumours following genotoxic chemotherapy with adriamycin. The exogenous
        expression of a phospho-mimicking AATF point mutant results in marked adriamycin
        resistance in vivo. These data identify the p38/MK2/AATF signalling module as a
        critical repressor of p53-driven apoptosis.
      reference_section_type: ABSTRACT
      full_text_unavailable: true
- id: PMID:25416956
  title: A proteome-scale map of the human interactome network.
  findings:
    - statement: AATF-NGDN interaction detected in systematic binary interactome screen
- id: PMID:29232376
  title: Che1/AATF interacts with subunits of the histone acetyltransferase core module
    of SAGA complexes.
  findings:
    - statement: >-
        AATF interacts with ADA2A, ADA2B, and GCN5 (but not SGF29) of the SAGA/ATAC HAT
        module, as demonstrated by yeast two-hybrid, co-immunoprecipitation in HEK293 cells,
        and fluorescence co-localization in HEK293 and U2OS cells.
      supporting_text: >-
        Co-immunoprecipitation and co-localization experiments were used to demonstrate
        association of AATF both with two ADA2 isoforms, ADA2A and ADA2B and with GCN5
        proteins in human cells and yeast two-hybrid assays to delineate domains in the ADA2
        and GCN5 proteins required for these interactions.
      reference_section_type: ABSTRACT
      full_text_unavailable: false
    - statement: >-
        ADA2B shows the strongest interaction with AATF among HAT module subunits, and
        ADA2B co-localizes with AATF in both nucleoplasm and nucleolus, while GCN5 is
        excluded from the nucleolus.
      supporting_text: >-
        ADA2B produced the strongest interaction with AATF, while ADA2A and GCN5 displayed
        weaker, nonetheless definite interaction. ADA2B co-localization with AATF was
        primarily in the nucleoplasm with an additional nucleolar co-localization. Unlike
        AATF, GCN5 appeared to be excluded from the nucleolus.
      reference_section_type: RESULTS
      full_text_unavailable: false
    - statement: >-
        The GCN5 acetyltransferase domain is required for interaction with AATF; for ADA2
        isoforms, the region between the SANT domain and Ada1 box is critical.
      supporting_text: >-
        For hGCN5, amino or carboxy-terminal truncations that removed the acetyltransferase
        domain no longer manifested interaction with AATF suggesting this domain is required
        for the association. For both ADA2 isoforms, the region between the SANT domain and
        the Ada1 box also may be critical for interaction with AATF while the SWIRM domain
        is not required.
      reference_section_type: RESULTS
      full_text_unavailable: false
    - statement: >-
        Co-expression of ADA2A, ADA2B, or GCN5 with AATF significantly reduced AATF-mediated
        transcriptional activation of the MDM2 promoter, indicating HAT module subunits
        negatively modulate AATF transactivation function.
      supporting_text: >-
        AATF expression activates the promoter while co-expression of ADA2A, ADA2B or GCN5
        with AATF, significantly reduced the activation imparted by AATF on MDM2
        promoter-directed transcription (p <0.01).
      reference_section_type: RESULTS
      full_text_unavailable: false
    - statement: >-
        AATF is localized to both nucleoplasm and nucleolus, consistent with reported nuclear
        and nucleolar localization signals, and may participate in regulation of gene expression
        by modulating chromatin structure through HAT complex interactions.
      supporting_text: >-
        AATF was mostly found in the nucleoplasm. Like ADA2B, the AATF protein, was also
        localized in the nucleolus in addition to the nucleoplasm. Che-1/AATF could be
        participating in the regulation of gene expression by regulating chromatin structure.
      reference_section_type: DISCUSSION
      full_text_unavailable: false
