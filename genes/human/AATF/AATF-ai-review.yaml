      (PMID:22681889). AATF was identified among ~800 mRNA-binding proteins using
      photoreactive nucleotide-enhanced UV crosslinking in HEK293 cells.
    action: ACCEPT
    reason: >-
      Independent confirmation of AATF RNA binding from a second systematic study using
      a different cell line (HEK293 vs HeLa in PMID:22658674). The convergent evidence
      from two independent high-throughput RNA interactome studies strengthens the RNA
      binding annotation.
    supported_by:
      - reference_id: PMID:22681889
        supporting_text: "Application to a human embryonic kidney cell line identified close to 800 proteins"
- term:
    id: GO:0005515
    label: protein binding
  evidence_type: IPI
  original_reference_id: PMID:10783144
  review:
    summary: >-
      Protein binding annotation based on interactions with POLR2J (P52435) and RB1 (P06400)
      from PMID:10783144. Che-1/AATF was identified as a binding partner of hRPB11 (POLR2J)
