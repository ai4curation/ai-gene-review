      Cytoplasmic localization is supported by multiple IDA annotations from focused studies.
      The IEA annotation is consistent with the experimental evidence.
    supported_by:
      - reference_id: PMID:14627703
        supporting_text: "AATF colocalizes with Par-4 in both cytoplasmic and nuclear compartments"
      - reference_id: PMID:22909821
        supporting_text: "AATF is phosphorylated by the checkpoint kinase MK2. Phosphorylation results in the release of AATF from cytoplasmic MRLC3 and subsequent nuclear translocation"
- term:
    id: GO:0030968
    label: endoplasmic reticulum unfolded protein response
  evidence_type: IEA
  original_reference_id: GO_REF:0000107
  review:
    summary: >-
      IEA annotation transferred from mouse ortholog via Ensembl Compara. The role of AATF
      in the UPR is directly supported by Ishigaki et al. 2010 (PMID:19911006), which showed
      that AATF is induced by ER stress through the PERK-eIF2alpha pathway and acts as an
      antiapoptotic transcriptional cofactor that drives AKT1 expression via STAT3 in
      pancreatic beta-cells. Knockdown of AATF sensitizes cells to ER stress-mediated death.
    action: KEEP_AS_NON_CORE
    reason: >-
      The UPR/antiapoptotic role is well-supported experimentally (PMID:19911006) but is a
      context-specific secondary function of AATF rather than a core activity. AATF's core
      functions are SSU processome / 40S ribosome biogenesis (PMID:34516797) and
      transcription coactivator activity at TP53/CDKN1A and other promoters
      (PMID:12847090, PMID:17157788). The UPR contribution is downstream of the more
      general transcription coactivator activity acting on the AKT1 promoter via STAT3, so
      it is appropriately retained as non-core rather than promoted to a core function.
    supported_by:
      - reference_id: PMID:19911006
        supporting_text: "AATF is induced by ER stress through the PERK-eIF2alpha pathway and transcriptionally activates the v-akt murine thymoma viral oncogene homolog 1 (AKT1) gene through signal transducer and activator of transcription 3 (Stat3), which sustains Akt1 activation and promotes cell survival"
      - reference_id: PMID:19911006
        supporting_text: "RNAi-mediated knockdown of AATF or AKT1 renders cells sensitive to ER stress"
- term:
    id: GO:0005515
    label: protein binding
  evidence_type: IPI
  original_reference_id: PMID:12847090
  review:
    summary: >-
      Protein binding annotation based on interaction with SP1 (UniProtKB:P08047) from
      PMID:12847090. Che-1/AATF interacts with SP1 at the p21 promoter and displaces HDAC1
      from SP1 binding sites.
    action: MODIFY
    reason: >-
      The interaction with SP1 is well-documented and functionally significant -- AATF
      displaces HDAC1 from SP1-bound promoter regions. However, "protein binding" is
      uninformative per curation guidelines. A more specific term should capture the
      transcription cofactor nature of this interaction.
    proposed_replacement_terms:
      - id: GO:0003713
        label: transcription coactivator activity
    supported_by:
      - reference_id: PMID:12847090
        supporting_text: "Che-1 activates p21WAF1/Cip1 by displacing histone deacetylase (HDAC)1 from the Sp1 binding sites of the p21WAF1/Cip1 gene promoter and accumulating acetylated histone H3 on these sites"
- term:
    id: GO:0005515
    label: protein binding
  evidence_type: IPI
  original_reference_id: PMID:17157788
  review:
    summary: >-
      Protein binding annotation covering interactions with CHEK2 (O96017), RELA (Q04206),
      and ATM (Q13315) from PMID:17157788. The checkpoint kinases ATM/ATR and Chk2 interact
      with and phosphorylate Che-1 in response to DNA damage, promoting its accumulation
      and recruitment to TP53 and p21 promoters.
    action: KEEP_AS_NON_CORE
    reason: >-
      The interactions with ATM, ATR, and CHEK2 are well-documented and functionally important
      for the DNA damage response. These represent kinase-substrate relationships rather than
      core molecular function of AATF. The interactions are real but "protein binding" does
      not capture the biology. These are better described by the BP annotation for DNA damage
      response context. Keeping as non-core since these reflect AATF being a substrate of
      checkpoint kinases rather than defining AATF's own molecular function.
    supported_by:
      - reference_id: PMID:17157788
        supporting_text: "The checkpoint kinases ATM/ATR and Chk2 interact with Che-1 and promote its phosphorylation and accumulation in response to DNA damage"
- term:
    id: GO:0005515
    label: protein binding
  evidence_type: IPI
  original_reference_id: PMID:22909821
  review:
    summary: >-
      Protein binding annotation based on interaction with MRLC3/Myl12a (Q6ZWQ9) from
      PMID:22909821. AATF is sequestered in the cytoplasm by MRLC3, and MK2-dependent
      phosphorylation releases AATF for nuclear translocation after genotoxic stress.
    action: KEEP_AS_NON_CORE
    reason: >-
      This is a genuine interaction with a cytoplasmic sequestration partner. The interaction
      with MRLC3 is specific and functionally characterized -- it regulates AATF
      nucleocytoplasmic distribution. However, this reflects regulation of AATF localization
      rather than a core molecular function.
    supported_by:
      - reference_id: PMID:22909821
        supporting_text: "Phosphorylation results in the release of AATF from cytoplasmic MRLC3 and subsequent nuclear translocation"
- term:
    id: GO:0005515
    label: protein binding
  evidence_type: IPI
  original_reference_id: PMID:25416956
  review:
    summary: >-
      Protein binding annotation based on interaction with NGDN (Q8NEJ9) from the HI-II-14
      proteome-scale human interactome map (PMID:25416956). NGDN (Neuroguidin/Ngd1) is a
      ribosome biogenesis factor. This interaction is supported by multiple independent
      studies (also PMID:30021884, PMID:33961781, PMID:35271311).
    action: KEEP_AS_NON_CORE
    reason: >-
      The AATF-NGDN interaction is notable because NGDN is also a component of the SSU
      processome, consistent with AATF's role in ribosome biogenesis. The interaction is
      reproduced across four independent high-throughput studies. However, "protein binding"
      is uninformative. This interaction likely reflects their co-participation in the SSU
      processome complex.
    supported_by:
      - reference_id: PMID:25416956
        supporting_text: "a systematic map of ~14,000 high-quality human binary protein-protein interactions"
- term:
    id: GO:0005515
    label: protein binding
