- id: PMID:34516797
  title: Nucleolar maturation of the human small subunit processome.
  findings:
    - statement: >-
        Cryo-EM structures at 2.7 to 3.9 angstrom resolution reveal AATF as a structural
        component of the human SSU processome, a 4.5-megadalton nucleolar assembly.
      supporting_text: >-
        We report the high-resolution cryo-electron microscopy structures of maturing human
        small subunit (SSU) processomes at resolutions of 2.7 to 3.9 angstroms.
      reference_section_type: ABSTRACT
      full_text_unavailable: true
    - statement: >-
        The SSU processome mediates early maturation of the small ribosomal subunit by
        coupling RNA folding to subsequent RNA cleavage and processing steps, including
        targeted exosome-mediated RNA degradation and site-specific endonucleolytic cleavage.
      supporting_text: >-
        The human small subunit processome mediates early maturation of the small ribosomal
        subunit by coupling RNA folding to subsequent RNA cleavage and processing steps.
        RNA folding states within these particles are communicated to and coordinated with
        key enzymes that drive irreversible steps such as targeted exosome-mediated RNA
        degradation, protein-guided site-specific endonucleolytic RNA cleavage, and tightly
        controlled RNA unwinding.
      reference_section_type: ABSTRACT
      full_text_unavailable: true
    - statement: >-
        The SSU processome demonstrates impressive structural plasticity through conserved
        mechanisms, endowing it with the ability to mature the small ribosomal subunit from
        within the nucleolus.
      supporting_text: >-
        These conserved mechanisms highlight the SSU processome's impressive structural
