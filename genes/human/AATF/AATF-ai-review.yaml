- term:
    id: GO:0006355
    label: regulation of DNA-templated transcription
  evidence_type: IDA
  original_reference_id: PMID:12847090
  review:
    summary: >-
      AATF/Che-1 regulates transcription by displacing HDAC1 from promoters (PMID:12847090),
      modulating E2F target gene expression via Rb interaction (PMID:10783144, PMID:12450794),
      and activating p53 transcription after DNA damage (PMID:17157788). This is a core
      biological process for AATF that is not explicitly annotated in GOA at an appropriate
      level.
    action: NEW
    reason: >-
      While GO:0045893 (positive regulation of DNA-templated transcription) is present as
      IEA, there is strong direct experimental evidence for AATF in regulation of
      transcription. AATF can both activate (p21, p53 promoters) and repress (pro-apoptotic
      PUMA, BAX, BAK promoters per PMID:22909821) transcription depending on context. The
      parent term "regulation of DNA-templated transcription" better captures the
      bidirectional nature of AATF transcriptional regulation.
    supported_by:
      - reference_id: PMID:12847090
        supporting_text: "Che-1 arrests human colon carcinoma cell proliferation by displacing HDAC1 from the p21WAF1/CIP1 promoter"
      - reference_id: PMID:22909821
        supporting_text: "AATF binds to the PUMA, BAX and BAK promoter regions to repress p53-driven expression of these pro-apoptotic genes"
      - reference_id: PMID:17157788
        supporting_text: "These Che-1 modifications induce a specific recruitment of Che-1 on the TP53 and p21 promoters"
