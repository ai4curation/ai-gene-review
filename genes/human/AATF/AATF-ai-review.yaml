- term:
    id: GO:0032040
    label: small-subunit processome
  evidence_type: IDA
  original_reference_id: PMID:34516797
  review:
    summary: >-
      IDA annotation placing AATF as part of the small-subunit processome based on
      cryo-EM structures at 2.7 to 3.9 angstrom resolution (PMID:34516797). AATF
      is directly resolved in the SSU processome particle structures.
    action: ACCEPT
    reason: >-
      This is one of the strongest annotations for AATF. The cryo-EM structures at
      high resolution directly show AATF as a structural component of the SSU processome,
      a 4.5-MDa nucleolar assembly. The SSU processome is listed in ComplexPortal as
      CPX-2511 with AATF as a component. This is a core cellular component annotation.
    supported_by:
      - reference_id: PMID:34516797
