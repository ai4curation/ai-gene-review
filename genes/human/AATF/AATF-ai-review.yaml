      nuclear/nucleolar localization and involvement in ribosome biogenesis. The HDA
      evidence from a systematic mRNA interactome study is appropriate.
    supported_by:
      - reference_id: PMID:22658674
        supporting_text: "We identify 860 proteins that qualify as RBPs by biochemical and statistical criteria"
