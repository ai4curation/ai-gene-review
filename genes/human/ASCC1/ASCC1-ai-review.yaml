- id: PMID:19074642
  title: Gastrin activates paracrine networks leading to induction of PAI-2 via
    MAZ and ASC-1.
  findings:
  - statement: >-
      Supports a context-specific transcriptional role for ASC-1/p50 in
      gastrin-triggered PAI-2/SERPINB2 induction.
    supporting_text: >-
      Silencing at least two subunits of ASC-1, p50 and p65, inhibited
      gastrin-stimulated PAI-2 expression, indicating that ASC-1 acts as a
      transcription activator complex to regulate transcription.
- id: PMID:22055184
  title: DNA unwinding by ASCC3 helicase is coupled to ALKBH3-dependent DNA
    alkylation repair and cancer cell proliferation.
  findings:
  - statement: >-
      Establishes the ASCC complex as an ALKBH3-associated alkylation repair
      complex.
    supporting_text: >-
      Our data provide a molecular mechanism by which ALKBH3 collaborates with
      ASCC to maintain genomic integrity in a cell-type specific manner.
- id: PMID:25416956
  title: A proteome-scale map of the human interactome network.
  findings:
  - statement: >-
      High-throughput interactome resource; useful for PPI context but not
      sufficient to define ASCC1 core molecular function.
    supporting_text: >-
      Here, we describe a systematic map of ?14,000 high-quality human binary
      protein-protein interactions.
- id: PMID:26924529
  title: Mutations in Subunits of the Activating Signal Cointegrator 1 Complex Are
    Associated with Prenatal Spinal Muscular Atrophy and Congenital Bone Fractures.
  findings:
  - statement: >-
      Human ASCC1 loss-of-function variants disrupt neuromuscular development
      and support ASCC1 as a nuclear ASC-1 complex subunit.
    supporting_text: >-
      We report on recessive loss-of-function mutations in two genes (TRIP4 and
      ASCC1) that encode subunits of the nuclear activating signal cointegrator
      1 (ASC-1) complex.
- id: PMID:29144457
  title: A ubiquitin-dependent signalling axis specific for ALKBH-mediated DNA
    dealkylation repair.
  findings:
  - statement: >-
      Defines a ubiquitin-dependent ASCC alkylation-damage pathway and places
      ASCC1 in the ASCC2/ASCC3-associated repair complex.
    supporting_text: >-
      Mass spectrometric analysis of ASCC2-associated proteins revealed the
      constitutive association of ASCC3 and ASCC1
- id: PMID:29997253
  title: RNA ligase-like domain in activating signal cointegrator 1 complex subunit
    1 (ASCC1) regulates ASCC complex function during alkylation damage.
  findings:
  - statement: >-
      ASCC1 interacts with ASCC3, regulates ASCC complex recruitment during
      alkylation damage, and is required for resistance to alkylation damage.
    supporting_text: >-
      ASCC1 knockout through a CRISPR/Cas9 approach results in alkylation
      damage sensitivity in a manner epistatic with ASCC3.
- id: PMID:33961781
  title: Dual proteome-scale networks reveal cell-specific remodeling of the human
    interactome.
  findings:
  - statement: >-
      BioPlex AP-MS is useful large-scale interaction context but should not
      drive a generic protein-binding core annotation.
    supporting_text: >-
      Through affinity-purification mass spectrometry, we have created two
      proteome-scale, cell-line-specific interaction networks.
- id: PMID:40205054
  title: Multimodal cell maps as a foundation for structural and functional genomics.
  findings:
  - statement: >-
      U2OS multimodal cell-map evidence is broad interaction/localization
      context rather than ASCC1-specific mechanistic evidence.
    supporting_text: >-
      Here we construct a global map of human subcellular architecture through
      joint measurement of biophysical interactions and immunofluorescence
      images for over 5,100 proteins in U2OS osteosarcoma cells.
- id: Reactome:R-HSA-112123
  title: Oxidative demethylation of 1-meA damaged DNA By ALKBH3
  findings:
  - statement: >-
      Reactome event for ALKBH3/ASCC-dependent oxidative demethylation of
      1-meA damaged DNA.
    supporting_text: >-
      The reversal of alkylating damage of dsDNA by ALKBH3 requires the
      presence of DNA helicase ASCC3, a component of the activating signal
      co-integrator complex
