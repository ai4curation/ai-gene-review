    label: DNA alkylation repair
  locations:
  - id: GO:0005634
    label: nucleus
  - id: GO:0016607
    label: nuclear speck
  in_complex:
    id: GO:1990391
    label: DNA repair complex
  supported_by:
  - reference_id: PMID:29997253
    supporting_text: >-
      ASCC1 coordinates the proper recruitment of the ASCC complex during
      alkylation
  - reference_id: PMID:29997253
    supporting_text: >-
      ASCC1 knockout through a CRISPR/Cas9 approach results in alkylation
      damage sensitivity in a manner epistatic with ASCC3.
  - reference_id: PMID:29144457
    supporting_text: >-
      Together, our work reveals a previously unrecognized
      ubiquitin-dependent pathway induced specifically to repair alkylation
      damage
- description: >-
    ASCC1/p50 is a subunit of the nuclear ASC-1 transcription coactivator
    complex. The complex enhances transcriptional activation by AP-1, SRF, and
    NF-kappaB and participates in signal-dependent gene-expression responses,
    including gastrin/IL-8-induced SERPINB2/PAI-2 expression.
  molecular_function:
    id: GO:0003713
    label: transcription coactivator activity
  directly_involved_in:
  - id: GO:0006355
    label: regulation of DNA-templated transcription
  locations:
  - id: GO:0005634
    label: nucleus
  in_complex:
    id: GO:0005667
    label: transcription regulator complex
  supported_by:
  - reference_id: PMID:12077347
    supporting_text: >-
      these results suggest that the endogenous hASC-1 complex appears to play
      an essential role in AP-1, SRF, and NF-kappaB transactivation
  - reference_id: PMID:19074642
    supporting_text: >-
      Silencing at least two subunits of ASC-1, p50 and p65, inhibited
      gastrin-stimulated PAI-2 expression, indicating that ASC-1 acts as a
      transcription activator complex to regulate transcription.
