- id: Reactome:R-HSA-5657617
  title: ALKBH3 associated with ASCC1:ASCC2:ASCC3 binds alkylated dsDNA containing
    3-meC
  findings:
  - statement: >-
      Reactome complex event placing ASCC1:ASCC2:ASCC3 with ALKBH3 on
      3-meC-containing alkylated DNA.
    supporting_text: >-
      ASCC3 is a part of ASCC1:ASCC2:ASCC3 activating signal co-integrator
      complex, which unwinds dsDNA, providing an appropriate substrate for
      ALKBH3
