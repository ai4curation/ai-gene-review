id: Q8N9N2
gene_symbol: ASCC1
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  ASCC1 encodes the p50 subunit of the nuclear activating signal cointegrator
  1 complex. The protein acts with TRIP4/ASC-1, ASCC2, and ASCC3 in a
  transcription coactivator complex that supports AP-1, SRF, NF-kappaB, and
  context-specific gene-expression responses. ASCC1 also functions as an
  accessory/regulatory subunit of the ASCC alkylation-damage response, where it
  interacts with ASCC3 and helps coordinate recruitment and assembly of the
  ALKBH3-ASCC repair complex at nuclear alkylation-damage foci. ASCC1 localizes
  mainly to the nucleus and nuclear speckles; loss-of-function variants disrupt
  neuromuscular development and cause spinal muscular atrophy with congenital
  bone fractures.
