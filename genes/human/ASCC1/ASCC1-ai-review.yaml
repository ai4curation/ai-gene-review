  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: >-
      ASCC1 has a predicted RNA-binding/RNA-ligase-like region, but the
      ASCC1-specific evidence available here supports an RNA-related domain
      requirement rather than direct ASCC1 RNA-binding activity.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      The strongest ASCC alkylation-damage papers show RNA dependence of ASCC
      foci and direct ssRNA binding by ASCC3, while the ASCC1 paper describes a
      putative RNA-binding motif. This is biologically plausible but too
      indirect to make RNA binding a core ASCC1 molecular function in this
      review.
