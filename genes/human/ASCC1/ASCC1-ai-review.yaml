proposed_new_terms: []
suggested_questions:
- question: >-
    Does ASCC1 directly bind RNA in cells, or is the ASCC1 RNA-ligase-like/KH
    region primarily a structural/regulatory module for ASCC complex assembly?
  experts:
  - Mosammaparast N
  - Soll JM
- question: >-
    Is there ASCC1-specific evidence for ribosome-associated quality control or
    stalled cytosolic ribosome rescue, or is the PN ribosomal-rescue projection a
    workbook propagation artifact from ASCC-family membership?
  experts:
  - Mosammaparast N
- question: >-
    Should ASCC1 be curated to a more specific adaptor/cofactor molecular
    function for ASCC alkylation-damage recruitment once GO has a term that
    captures accessory repair-complex assembly without implying catalytic
    helicase or dealkylase activity?
  experts:
  - Mosammaparast N
suggested_experiments:
- experiment_type: RNA-binding assay
  hypothesis: >-
    ASCC1 directly binds RNA through its C-terminal RNA-ligase-like/KH region and
    this binding contributes to ASCC recruitment during alkylation damage.
  description: >-
    Perform ASCC1 CLIP-seq or purified-protein RNA-binding assays with wild-type
    ASCC1 and mutations in the C-terminal motif, coupled to rescue of ASCC2/ASCC3
    foci formation after MMS treatment.
- experiment_type: ribosome-stalling reporter assay
  hypothesis: >-
    ASCC1 does not directly participate in cytosolic ribosome rescue despite the
    PN projection to ribosome-associated QC.
  description: >-
    Compare ASCC1 knockout/rescue cells with known RQC factors in reporters for
    nonstop, no-go, and collided-ribosome substrates, while controlling for
    indirect DNA-damage and transcriptional stress effects.
