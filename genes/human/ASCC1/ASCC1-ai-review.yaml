core_functions:
- description: >-
    ASCC1 is an accessory/regulatory subunit of the ASCC alkylation-damage
    response. Through association with ASCC3 and the ASCC complex, ASCC1 helps
    coordinate proper ASCC complex recruitment and assembly in the ALKBH3-linked
    repair pathway for alkylated nucleotides. This is a nuclear DNA repair role,
    not ribosome-associated protein quality control.
  molecular_function:
    id: GO:0060090
    label: molecular adaptor activity
  directly_involved_in:
