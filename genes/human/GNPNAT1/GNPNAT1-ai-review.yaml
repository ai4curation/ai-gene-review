description: GNPNAT1 (also known as GNA1) is the human glucosamine 6-phosphate N-acetyltransferase
  (EC 2.3.1.4), a GNAT-family (GCN5-related N-acetyltransferase) enzyme that catalyzes
  the acetyl-CoA-dependent transfer of an acetyl group to D-glucosamine 6-phosphate,
  producing N-acetyl-D-glucosamine 6-phosphate (GlcNAc-6-P) and CoA. This is the second
  committed step of the hexosamine biosynthetic pathway, feeding into UDP-N-acetyl-alpha-D-glucosamine
  (UDP-GlcNAc) biosynthesis, the activated sugar donor used for N- and O-linked glycosylation
  and O-GlcNAcylation. The active enzyme is a homodimer with a GNAT fold. It functions
  in the cytosol, where the hexosamine pathway operates, and is also reported as a
  peripheral membrane protein of the Golgi apparatus and endosome membranes. Loss-of-function
  variants cause rhizomelic dysplasia, Ain-Naz type (RHZDAN), an autosomal recessive
  skeletal dysplasia, consistent with a UDP-GlcNAc/glycosylation deficiency.
