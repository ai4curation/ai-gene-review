    label: cytosol
  substrates:
  - id: CHEBI:58725
    label: 2-ammonio-2-deoxy-D-glucopyranose 6-phosphate(1-)
  - id: CHEBI:57288
    label: acetyl-CoA(4-)
  supported_by:
  - reference_id: PMID:18601654
    supporting_text: GNA1 (D-glucosamine-6-phosphate N-acetyltransferase) catalyses
      the acetylation of GlcN-6P (glucosamine-6-phosphate) to GlcNAc-6P (N-acetylglucosamine-6-phosphate),
      a key intermediate in the UDP-GlcNAc biosynthetic pathway.
  - reference_id: PMID:18675810
    supporting_text: GNA1 catalyzes the formation of N-acetylglucosamine-6-phosphate
      (GlcNAc6P) from acetyl-CoA (AcCoA) and the acceptor substrate GlcN6P.
  - reference_id: Reactome:R-HSA-449734
    supporting_text: Cytosolic GNPNAT1 catalyzes the reaction of glucosamine 6-phosphate
      and acetyl-CoA to form N-acetyl-glucosamine 6-phosphate (GlcNAc6P) and CoA-SH.
