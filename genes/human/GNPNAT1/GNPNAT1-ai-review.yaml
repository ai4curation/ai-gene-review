core_functions:
- description: Acetyl-CoA-dependent glucosamine 6-phosphate N-acetyltransferase (EC
    2.3.1.4) that transfers an acetyl group from acetyl-CoA to D-glucosamine 6-phosphate,
    producing N-acetyl-D-glucosamine 6-phosphate (GlcNAc-6-P) and CoA. This is the
    second committed step of the hexosamine biosynthetic pathway, feeding UDP-GlcNAc
    biosynthesis. The enzyme acts as a homodimer with a GNAT fold and operates in the
    cytosol.
  molecular_function:
    id: GO:0004343
    label: glucosamine 6-phosphate N-acetyltransferase activity
  directly_involved_in:
  - id: GO:0006048
    label: UDP-N-acetylglucosamine biosynthetic process
  locations:
