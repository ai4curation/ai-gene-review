suggested_questions:
- question: Which normal pituitary USP8 substrates best explain why activating USP8 mutations
    drive corticotroph adenoma biology?
- question: Should USP8 substrate-specific pathway annotations be represented as non-core contexts
    unless direct substrate deubiquitination is shown?
suggested_experiments:
- description: Compare ubiquitination, stability, and trafficking of EGFR and other candidate
    substrates in corticotroph cells expressing wild-type versus PITA4-associated USP8 mutants.
  hypothesis: Activating USP8 mutations will shift substrate ubiquitination and trafficking in
    corticotroph cells.
- description: Map endogenous USP8 interaction/substrate changes at endosomes using catalytic-trap
    mutants and ubiquitin-remnant proteomics.
  hypothesis: Catalytic-trap and ubiquitin-remnant profiling will distinguish direct USP8 substrates
    from downstream pathway effects.
