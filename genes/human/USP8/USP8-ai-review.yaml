id: P40818
gene_symbol: USP8
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: USP8 encodes ubiquitin-specific protease 8/UBPY, a cysteine-type deubiquitinating
  enzyme that removes ubiquitin from protein substrates, including K48- and K63-linked ubiquitin
  chains. USP8 acts mainly in cytosolic and endosomal membrane contexts, where it regulates endosomal
  ubiquitin dynamics, ESCRT-associated cargo sorting, receptor down-regulation, and substrate
  stability. Somatic activating mutations in the USP8 14-3-3-binding region increase deubiquitinase
  activity toward EGFR in corticotroph adenomas, linking USP8 to ACTH-producing pituitary adenoma/Cushing
  disease.
alternative_products:
