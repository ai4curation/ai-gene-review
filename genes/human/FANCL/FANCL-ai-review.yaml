suggested_questions:
- question: >-
    How is FANCL's catalytic B-L-100 module (FANCB-FANCL-FAAP100) allosterically regulated
    within the larger FA core complex, and what conformational changes couple chromatin
    loading to productive FANCD2/FANCI monoubiquitination?
- question: >-
    Beyond FANCD2 and FANCI, are there other physiological substrates of FANCL, and does
    the reported stimulation of ubiquitin release from UBE2W reflect a distinct biological
    function?
suggested_experiments:
- description: >-
    Reconstitute the B-L-100 catalytic module with UBE2T and ID2 complex on defined
    ICL-containing chromatin templates and use cryo-EM to capture the active E3-E2-substrate
    holoenzyme, mapping how the RING and UBC-RWD domains orient UBE2T toward FANCD2-Lys561.
- description: >-
    Systematically test FANCL patient-derived RING and URD-domain variants in a
    FANCL-null cell line for FANCD2/FANCI monoubiquitination, chromatin loading, and MMC
    sensitivity to define genotype-function relationships.
