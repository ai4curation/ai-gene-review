id: Q9NW38
gene_symbol: FANCL
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  FANCL (Fanconi anemia complementation group L; also known as PHF9) is the catalytic
  RING-type E3 ubiquitin ligase subunit of the multiprotein Fanconi anemia (FA) core
  complex. Together with its dedicated E2 ubiquitin-conjugating enzyme UBE2T, FANCL
  catalyzes the site-specific monoubiquitination of FANCD2 (on Lys561) and FANCI (on
  Lys523). This monoubiquitination is the central activating step of the FA/interstrand
  crosslink (ICL) repair pathway: the monoubiquitinated FANCD2-FANCI (ID2) complex is
  recruited to chromatin at stalled replication forks and ICLs, where it coordinates
  nucleolytic incision, translesion synthesis and homologous-recombination-mediated
  repair. FANCL has a modular architecture comprising an N-terminal E2-like (ELF/UBC-like)
  domain, a central RWD-like (DRWD) domain, and a C-terminal RING-type zinc finger; the
  RING (with the essential Cys307 and Trp341) recruits and activates UBE2T, while the
  UBC-RWD region mediates binding to the FANCD2/FANCI substrates. FANCL assembles with
  FANCA, FANCB, FANCC, FANCE, FANCF, FANCG and FANCM in the nuclear FA core complex; the
  FANCB-FANCL-FAAP100 subassembly forms its catalytic module. Loss-of-function variants
  in FANCL cause Fanconi anemia, characterized by bone marrow failure, congenital
  malformations, chromosomal instability, hypersensitivity to DNA crosslinking agents and
  cancer predisposition.
