- term:
    id: GO:0043130
    label: ubiquitin binding
  evidence_type: IDA
  original_reference_id: PMID:26149689
  qualifier: enables
  review:
    summary: >-
      The N-terminal E2-like fold (ELF) domain of FANCL binds free ubiquitin non-covalently
      via ubiquitin's canonical Ile44 patch. This binding is dispensable for core-complex
      recognition, UBE2T binding and in vitro FANCD2 monoubiquitination, but is required for
      efficient DNA-damage-induced FANCD2 monoubiquitination in vertebrate cells.
    action: NEW
    reason: >-
      Not present in GOA, but a genuine, experimentally demonstrated molecular function of
      FANCL from a dedicated structural/functional study. It is regulatory and non-core
      relative to the RING E3 ligase activity, but a real distinct MF of the ELF domain
      that promotes efficient in vivo FANCD2 monoubiquitination.
    supported_by:
      - reference_id: PMID:26149689
        supporting_text: the ELF domain of FANCL is required to mediate a non-covalent interaction between FANCL and ubiquitin
      - reference_id: PMID:26149689
        supporting_text: the ELF domain is required to promote efficient DNA damage-induced FANCD2 monoubiquitination in vertebrate cells, suggesting an important function of ubiquitin binding by FANCL in vivo
core_functions:
- description: >-
    RING-type E3 ubiquitin ligase that, in partnership with the cognate E2 enzyme UBE2T,
    catalyzes site-specific monoubiquitination of FANCD2 (Lys561) and FANCI (Lys523) as
    the catalytic subunit of the Fanconi anemia core complex, activating the interstrand
    crosslink (ICL) repair pathway on chromatin.
