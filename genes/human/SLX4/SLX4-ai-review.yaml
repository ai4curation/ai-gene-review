proposed_new_terms: []
suggested_questions:
- question: >-
    Which of SLX4's three partner nucleases (SLX1, XPF-ERCC1, MUS81-EME1) is most
    critical for interstrand crosslink unhooking in vivo, and does this differ
    between somatic and germline/hematopoietic compartments?
- question: >-
    What is the precise role of SLX4 SUMOylation and its SUMO-interaction motifs in
    coordinating the timing of nuclease activation at replication forks and telomeres?
suggested_experiments:
- description: >-
    Separation-of-function complementation of FANCP patient cells with SLX4 alleles
    that selectively disrupt SLX1-, MUS81- or XPF-binding, to dissect which
    nuclease-coordination activity rescues crosslink sensitivity.
  hypothesis: >-
    Distinct partner-nuclease interactions of SLX4 make non-redundant contributions
    to interstrand crosslink resistance.
- description: >-
    Reconstituted biochemical assays measuring the fold-stimulation of SLX1, MUS81
    and XPF cleavage by wild-type versus BTB- or UBZ-mutant SLX4 on defined branched
    substrates, to quantify the enzyme-activator function domain by domain.
  hypothesis: >-
    The BTB and UBZ domains of SLX4 are required for maximal stimulation of its
    partner endonucleases.
