id: Q8IY92
gene_symbol: SLX4
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  SLX4 (also known as BTBD12 and FANCP) is a large (1834 aa) multidomain nuclear
  scaffold protein that assembles and coordinates structure-specific endonucleases
  to process branched DNA intermediates that arise during DNA replication,
  recombination and repair. It acts as a docking platform that physically bridges
  three endonucleases — SLX1 (with which it forms the SLX1-SLX4 complex), XPF-ERCC1
  (ERCC4-ERCC1) and MUS81-EME1 — and, as a regulatory subunit, stimulates their
  nucleolytic activity. SLX4 itself has no intrinsic nuclease activity; the
  endonucleolytic cleavage is carried out by its bound catalytic partners, which
  SLX4 activates and positions. The SLX1-SLX4 module is a Holliday-junction
  resolvase that symmetrically cleaves static and migrating junctions, while
  SLX4-directed MUS81-EME1 and XPF-ERCC1 cut 3'-flaps, replication-fork-like and
  bubble structures. Through these coordinated incisions SLX4 promotes interstrand
  crosslink repair (unhooking), homologous-recombination-mediated double-strand
  break repair, single-strand annealing and replication-fork/telomere maintenance.
  It contains tandem UBZ4 ubiquitin-binding zinc fingers that recruit it to
  ubiquitinated repair sites, a BTB/POZ oligomerization domain, a SAP DNA-binding
  motif, and separate binding regions for SLX1, MUS81, XPF/MSH2 and TRF2, and it is
  extensively SUMOylated and phosphorylated. Biallelic loss-of-function mutations
  cause Fanconi anemia complementation group P (FANCP), characterized by
  hypersensitivity to DNA crosslinking agents and chromosomal instability.
