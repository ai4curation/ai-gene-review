- term:
    id: GO:0061665
    label: SUMO ligase activity
  evidence_type: IDA
  original_reference_id: PMID:25533188
  qualifier: enables
  review:
    summary: >-
      Beyond its nuclease-scaffold role, the SLX4 complex acts as a SUMO E3
      ligase that SUMOylates SLX4 itself and the XPF subunit of XPF-ERCC1; this
      activity is mediated by a specific SLX4-UBC9 interaction and requires
      SLX4's SUMO-interaction motifs and BTB domain.
    action: NEW
    reason: >-
      This is a genuine, biochemically-demonstrated molecular function of SLX4
      that is distinct from (and additional to) its nuclease-activator/adaptor
      role, and is not represented among the existing GOA molecular-function
      terms. It is retained as non-core because the SLX4 SIMs (and hence the SUMO
      E3 ligase activity) are dispensable for interstrand crosslink repair; the
      activity is instead important to prevent mitotic catastrophe at common
      fragile sites. SLX4 being nuclease-dead does not preclude this separate
      SUMO-transfer catalytic function.
    supported_by:
    - reference_id: PMID:25533188
      supporting_text: >-
        the SLX4 complex is a SUMO E3 ligase that SUMOylates SLX4 itself and the
        XPF subunit of the DNA repair/recombination XPF-ERCC1 endonuclease
core_functions:
- description: >-
    Molecular adaptor/scaffold that assembles structure-specific endonucleases —
    SLX1, XPF-ERCC1 (ERCC4-ERCC1) and MUS81-EME1 — into a modular DNA-repair
    toolkit (the SLX-MUS complex), physically bridging the catalytic nucleases and
    positioning them on branched DNA intermediates during interstrand crosslink
    repair and homologous-recombination-mediated double-strand break repair. SLX4
    itself is nuclease-dead and provides the docking platform, not the catalysis.
  supported_by:
  - reference_id: PMID:19596236
    supporting_text: >-
      We propose that SLX4 acts as a docking platform for multiple structure-specific
      endonucleases
  - reference_id: PMID:19595721
    supporting_text: >-
      human SLX4, a scaffold for DNA repair nucleases XPF-ERCC1, MUS81-EME1, and SLX1
  - reference_id: PMID:24726325
    supporting_text: >-
      the 3' flap endonuclease XPF-ERCC1 cooperates with SLX4/FANCP to carry
      out the unhooking incisions
