    label: resolution of meiotic recombination intermediates
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: involved_in
  review:
    summary: >-
      Phylogenetic (IBA) inference that SLX4 resolves recombination intermediates,
      framed in the meiotic context of orthologs such as fly MUS312.
    action: KEEP_AS_NON_CORE
    reason: >-
      Consistent with the conserved role of SLX4/Slx4/MUS312 in resolving branched
      recombination intermediates via the SLX1-SLX4 resolvase. In human somatic
      cells the demonstrated activity is on mitotic Holliday junctions; the
      meiosis-specific term is a reasonable ortholog-based inference but is not the
      core, experimentally-established human function, so it is retained as non-core.
    supported_by:
    - reference_id: PMID:19596236
      supporting_text: >-
        including fly MUS312, essential for meiotic recombination, and human BTBD12
