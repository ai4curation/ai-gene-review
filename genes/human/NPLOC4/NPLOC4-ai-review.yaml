core_functions:
- description: Polyubiquitin-binding cofactor of the AAA+ ATPase VCP/p97 that, as
    part of the obligate UFD1-NPL4 heterodimer, recognizes (notably K48-linked) polyubiquitinated
    substrates via its RanBP2-type zinc finger and presents them to p97 for ATP-driven
    extraction/unfolding.
  molecular_function:
    id: GO:0043130
    label: ubiquitin binding
  locations:
  - id: GO:0005829
    label: cytosol
  - id: GO:0005783
    label: endoplasmic reticulum
  supported_by:
  - reference_id: file:human/NPLOC4/NPLOC4-uniprot.txt
    supporting_text: Binds ubiquitinated proteins via its RanBP2-type zinc finger
  - reference_id: file:human/NPLOC4/NPLOC4-uniprot.txt
    supporting_text: The heterodimer binds ubiquitinated proteins
- description: Substrate-recruiting adaptor subunit of the VCP-NPL4-UFD1 segregase
    that binds the p97 ATPase and drives ubiquitin-dependent extraction of substrates
    from membranes and complexes, including ER-to-cytosol retrotranslocation of misfolded
    proteins during ERAD, delivering them for proteasomal degradation.
  molecular_function:
    id: GO:0051117
    label: ATPase binding
  locations:
  - id: GO:0034098
    label: VCP-NPL4-UFD1 AAA ATPase complex
  - id: GO:0005783
    label: endoplasmic reticulum
  supported_by:
  - reference_id: file:human/NPLOC4/NPLOC4-uniprot.txt
    supporting_text: The heterodimer binds to VCP
  - reference_id: file:human/NPLOC4/NPLOC4-uniprot.txt
    supporting_text: necessary for the export of misfolded proteins from the ER to
      the cytoplasm
proposed_new_terms: []
suggested_questions:
- question: How do UFD1 and NPL4 together unfold the initiating ubiquitin to engage
    the p97 pore, and what determines substrate polyubiquitin linkage preference (K48
    vs K63 vs branched)?
- question: Which p97 cofactor combinations (UBXD adaptors) direct NPL4-bearing complexes
    to specific processes (ERAD vs RQC vs chromatin vs RIG-I), and how is this regulated?
- question: Is NPLOC4 haploinsufficiency phenotypically relevant, analogous to UFD1L
    in the 22q11 region?
suggested_experiments:
- description: Reconstituted single-molecule unfolding assays with VCP, UFD1 and NPL4
    variants (RanBP2 zinc-finger mutants) on defined K48- vs K63-linked substrates
    to dissect substrate engagement.
- description: Proximity-labeling (BioID/TurboID) of NPLOC4 across stress conditions
    to map compartment- and process-specific cofactor partners.
- description: Acute degron depletion of NPLOC4 with quantitative proteomics to define
    the endogenous substrate set extracted by the UFD1-NPL4-p97 complex.
