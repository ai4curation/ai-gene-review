core_functions:
- description: >-
    UGP2 is the human UDP-glucose pyrophosphorylase (UTP:glucose-1-phosphate
    uridylyltransferase, EC 2.7.7.9): a cytosolic, Mg2+-dependent homooctamer that
    reversibly converts glucose-1-phosphate + UTP into UDP-glucose + diphosphate. It is
    the sole mammalian source of UDP-glucose, the activated glucosyl donor.
  molecular_function:
    id: GO:0003983
    label: UTP:glucose-1-phosphate uridylyltransferase activity
  directly_involved_in:
  - id: GO:0006011
    label: UDP-alpha-D-glucose metabolic process
  locations:
  - id: GO:0005829
    label: cytosol
  supported_by:
  - reference_id: PMID:31820119
    supporting_text: >-
      the only known enzyme capable of catalyzing the conversion of glucose-1-phosphate
      to UDP-glucose
  - reference_id: PMID:8631325
    supporting_text: >-
      UDP-Glc pyrophosphorylase (EC 2.7.7.9) catalyses the interconversion of MgUTP plus
      Glc1P and UDP-Glc plus MgPPi.
- description: >-
    By supplying UDP-glucose, UGP2 provides the direct precursor for glycogen synthesis
    (via glycogen synthase); loss of UGP2 depletes UDP-glucose and reduces cellular
    glycogen.
  molecular_function:
    id: GO:0003983
    label: UTP:glucose-1-phosphate uridylyltransferase activity
  directly_involved_in:
  - id: GO:0005978
    label: glycogen biosynthetic process
  locations:
  - id: GO:0005829
    label: cytosol
  supported_by:
  - reference_id: PMID:34330832
    supporting_text: >-
      An important cellular process that utilizes UDP-glucose as a direct precursor is
      glycogen synthesis (18).
  - reference_id: PMID:31820119
    supporting_text: >-
      UDP-glucose is a crucial precursor for the production of glycogen by glycogen
      synthase (GYS)
proposed_new_terms: []
suggested_questions:
- question: >-
    Beyond glycogen synthesis, how quantitatively important is UGP2-derived UDP-glucose
    for protein N-glycosylation and UDP-glucuronic acid (glucuronidation) flux in
    different human tissues?
- question: >-
    Does the octamerization/latch-loop regulation of UGP2 activity respond to
    physiological signals (e.g. metabolic or redox state) in vivo?
suggested_experiments:
- description: >-
    Tissue-specific conditional Ugp2 knockout (or isoform-specific short-isoform
    ablation) in mouse brain to model DEE83 and dissect the metabolic basis of the
    neurological phenotype.
- description: >-
    Metabolic flux analysis (13C-glucose) in UGP2-depleted human cells to quantify
    partitioning of UDP-glucose between glycogen, glycosylation, and glucuronidation
    pathways.
