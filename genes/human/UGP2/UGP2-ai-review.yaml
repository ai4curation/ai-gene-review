id: Q16851
gene_symbol: UGP2
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  UGP2 is the human UDP-glucose pyrophosphorylase (UTP:glucose-1-phosphate
  uridylyltransferase, EC 2.7.7.9), a cytosolic enzyme that reversibly converts
  glucose-1-phosphate plus UTP into UDP-glucose plus diphosphate
  (pyrophosphate). It is the only known mammalian enzyme that produces
  UDP-glucose, the universal activated glucosyl donor. UDP-glucose is the direct
  precursor for glycogen synthesis (via glycogenin/glycogen synthase) and also
  feeds protein and lipid glycosylation, UDP-glucuronic acid formation
  (glucuronidation and glycosaminoglycan/proteoglycan synthesis), and galactose
  (Leloir) metabolism. The enzyme is a magnesium-dependent homooctamer of the
  UDPGP type 1 family whose activity is modulated by a "latch loop" and by the
  octamerization state. UGP2 is broadly expressed, with high levels in liver and
  brain, and exists as two alternatively spliced isoforms differing in their
  first exon. Bi-allelic loss of the brain-relevant short isoform (an
  isoform-specific start-loss variant) causes developmental and epileptic
  encephalopathy 83 (DEE83), an autosomal recessive early-onset epileptic
  encephalopathy; complete loss in all cells is embryonic lethal.
