id: Q9P2R3
gene_symbol: ANKFY1
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: 'ANKFY1 encodes Rabankyrin-5, a large ankyrin-repeat, BTB/POZ, and FYVE-domain
  protein that acts on PI3P- and Rab5-positive endosomal membranes. It binds activated
  Rab5-family GTPases and phosphatidylinositol phosphate lipids to regulate early
  endosome fusion, macropinocytosis, retromer-dependent endosome-to-Golgi and Golgi-to-lysosome
  trafficking, and receptor internalization. Recent work shows that ANKFY1 also recruits
  and stabilizes ATG2A on PI3P-rich endosomal membranes during autophagy, promoting
  ATG2A-mediated lipid transfer from endosomes to phagophores for autophagosome growth
  and completion.'
