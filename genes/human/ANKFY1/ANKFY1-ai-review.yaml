suggested_questions:
- question: Is there direct experimental evidence that ANKFY1 binds CUL3 or 
    functions as a CRL3/ubiquitin-like ligase substrate adaptor in cells?
  experts:
  - GO ubiquitin-proteasome curators
  - Proteostasis PN curators
- question: Should ANKFY1 autophagy annotation be limited to autophagosome 
    assembly, or should a more specific future term capture 
    endosome-to-phagophore lipid-transfer bridging by ATG2A adaptors?
  experts:
  - GO autophagy editors
suggested_experiments:
- experiment_type: Endogenous CUL3 complex and ubiquitination assay
  hypothesis: ANKFY1 does not function as a CRL3 substrate receptor unless it 
    shows endogenous CUL3 complex membership and substrate-dependent 
    ubiquitination activity.
  description: Test endogenous ANKFY1-CUL3 binding by reciprocal 
    co-immunoprecipitation or proximity labeling, identify candidate substrates,
    and determine whether ANKFY1 loss changes CUL3-dependent ubiquitination of 
    those substrates.
- experiment_type: ANKFY1 autophagy rescue assay
  hypothesis: FYVE-dependent endosomal recruitment and ATG2A binding are 
    required for ANKFY1 support of phagophore growth.
  description: Rescue ANKFY1 knockout cells with wild-type, FYVE-deleted, and 
    ATG2A-binding-defective ANKFY1 variants, then assay Halo-LC3 autophagosome 
    completion, LC3 flux, WIPI2/LC3 phagophore PI3P, and in vitro ATG2A lipid 
    transfer.
