  - id: file:human/IL36RN/IL36RN-deep-research-falcon.md
    title: Falcon deep research on IL36RN function (Edison Scientific Literature)
    findings:
      - statement: IL-36Ra binds the IL-36 receptor complex but does not support
          productive accessory-protein recruitment, thereby competitively
          inhibiting IL-36 signaling; downstream nodes include MyD88, NF-kB, and
          MAPK.
        supporting_text: "IL-36 agonists (IL-36α/β/γ) signal through **IL‑36R**
          with recruitment of the accessory protein **IL‑1RAcP**, triggering
          downstream inflammatory pathways including **MyD88**, **NF‑κB**, and
          **MAPK** activation; **IL‑36Ra** binds the IL‑36 receptor complex but
          does **not** support productive accessory‑protein recruitment, thereby
          competitively inhibiting IL‑36 signaling."
      - statement: Neutrophil elastase cleaves IL-36Ra into a highly active
          antagonistic form; in primary skin cells the processed form
          dose-dependently reduces IL-36-gamma-induced IL-8 and CCL20.
        supporting_text: "**IL‑36Ra processing:** A key primary study demonstrated
          that **neutrophil elastase** (but not other tested neutrophil
          proteases) cleaves IL‑36Ra into a **highly active antagonistic
          form** and that this processed IL‑36Ra more strongly suppresses
          IL‑36γ‑induced chemokines."
      - statement: Loss-of-function IL36RN variants cause DITRA and are strongly
          enriched in GPP-only versus GPP with plaque psoriasis.
        supporting_text: "Loss‑of‑function IL36RN variants cause **deficiency of
          interleukin‑36 receptor antagonist (DITRA)** and are strongly linked
          to severe pustular phenotypes including GPP, consistent with a
          mechanism of **unopposed IL‑36 signaling** and exaggerated
          neutrophilic inflammation."
  - id: PMID:27101808
    title: Neutrophil Elastase-mediated proteolysis activates the
      anti-inflammatory cytokine IL-36 Receptor antagonist.
    findings:
      - statement: Neutrophil elastase (but not cathepsin G or proteinase 3)
          cleaves IL-36Ra precisely 9 amino acids upstream of the A-X-D motif
          to generate the mature active V2 form.
        supporting_text: "Analysis of the incubations by SDS-PAGE indicated that
          neutrophil elastase efficiently cleaved IL-36Ra, compared to
          proteinase 3 and cathepsin G which had much lower cleavage activity
          (Fig. 3). Further analysis of the cleaved products by mass
          spectrometry and N-terminal sequencing identified the truncations
          generated (shown in table 1) and revealed that elastase cleaved
          IL-36Ra precisely 9 amino acids upstream of its A-X-D motif to the
          mature IL-36Ra V2 form"
      - statement: Mature IL-36Ra V2, but not full-length IL-36Ra, antagonizes
          IL-36 agonist stimulation and reduces IL-8 and CCL20 in primary
          fibroblasts, keratinocytes, and skin equivalents.
        supporting_text: "In both monolayer cultures and skin equivalents, full
          length IL-36Ra exhibited no antagonistic activity, whilst the
          IL-36Ra V2 truncation antagonised IL-36 agonist stimulation causing
          a significant reduction in both IL-8 and CCL20 expression (Fig. 4C)."
  - id: PMID:38077370
    title: "The role of the interleukin-36 axis in generalized pustular
      psoriasis: a review of the mechanism of action of spesolimab."
    findings:
      - statement: IL-36 cytokines signal via IL-36R/IL-1RAcP through MyD88, IRAK,
          and TRAF to activate MAPK and NF-kB; IL-36Ra competitively binds
          IL-36R and blocks this pathway.
        supporting_text: "Formation of the receptor complex recruits intracellular
          adaptor proteins, including myeloid differentiation primary response
          88 (Myd88), IL-1 receptor-associated kinase (IRAK), and TNF
          receptor-associated factor, which subsequently activate
          mitogen-activated protein kinase (MAPK) and nuclear factor-κB
          (NFκB) pathways. NFκB upregulates a broad range of pro-inflammatory
          gene products. IL-1 and IL-36 cytokines are negatively regulated by
          their receptor antagonist (IL-1Ra and IL-36Ra, respectively), via
          competitive binding for the receptor site"
      - statement: DITRA arises from autosomal recessive loss-of-function IL36RN
          mutations and presents with severe GPP.
        supporting_text: "DIRA and DITRA represent autosomal recessive
          loss-of-function mutations in genes IL1RN and IL36RN, respectively"
  - id: PMID:38577038
    title: Targeted review of IL36RN mutations in patients with generalised
      pustular psoriasis.
    findings:
      - statement: IL36RN mutations are significantly enriched in GPP-only vs
          GPP+plaque psoriasis (OR 3.51; 95% CI 2.29-5.38), with biallelic
          variants in up to 73.2% of GPP patients.
        supporting_text: "Meta-analyses showed a significantly higher rate of
          IL36RN mutations in the GPP-only population compared to the GPP +
          plaque PsO population (OR 3.51; 95% CI 2.29, 5.38). Monoallelic
          mutations of IL36RN were found in up to 33.3%, and biallelic
          mutations in up to 73.2% of patients with GPP"
