- description: Catalyzes the rate-limiting, malonyl-CoA-inhibited transfer of long-chain
    acyl groups from acyl-CoA thioesters to L-carnitine at the mitochondrial outer
    membrane, forming long-chain acylcarnitine and CoA and committing long-chain fatty
    acids to mitochondrial import and beta-oxidation.
