gene_symbol: CPT1A
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: Carnitine O-palmitoyltransferase 1, liver isoform (CPT1A) is the liver-type
  isoform of carnitine palmitoyltransferase 1, a multi-pass protein of the mitochondrial
  outer membrane with a large cytoplasmic C-terminal catalytic domain. It catalyzes
  the committed, rate-limiting step of long-chain fatty acid entry into mitochondria
  for beta-oxidation, transferring the acyl group of long-chain acyl-CoA thioesters
  (e.g. palmitoyl-CoA) onto L-carnitine to form long-chain acylcarnitine plus CoA
  (EC 2.3.1.21). As the principal regulatory node of the carnitine shuttle, its activity
  is allosterically inhibited by malonyl-CoA, coupling fatty-acid oxidation to fatty-acid
  synthesis and nutritional state. Loss-of-function variants cause carnitine palmitoyltransferase
  1A deficiency, an autosomal recessive disorder of fatty-acid oxidation presenting
  with hypoketotic hypoglycemia. Beyond its canonical acyltransferase role, CPT1A
  has reported secondary activities, including a lysine succinyltransferase activity
  and a catalysis-independent scaffolding function that recruits ZDHHC4 to promote
  MAVS palmitoylation and sustain the type I interferon response.
