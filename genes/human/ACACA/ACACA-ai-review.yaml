- id: PMID:16326698
  title: BRCA1 affects lipid synthesis through its interaction with acetyl-CoA carboxylase.
  findings:
  - statement: >-
      BRCA1 interacts in vivo with the phosphorylated, inactive form of acetyl-CoA
      carboxylase alpha (P-ACCA) via its BRCT domains and represses lipogenesis by
      preventing P-ACCA dephosphorylation.
    reference_section_type: ABSTRACT
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Abstract-only cache; verbatim quotes used. Establishes the BRCA1-ACC1 regulatory
      interaction (basis for the GO:0005515 IPI annotations).
- id: PMID:16794074
  title: TRB3 links the E3 ubiquitin ligase COP1 to lipid metabolism.
  findings:
  - statement: >-
      TRB3 promotes ubiquitination and degradation of acetyl-CoA carboxylase (ACC) via an
      association with the E3 ubiquitin ligase COP1, stimulating lipolysis during fasting.
    reference_section_type: ABSTRACT
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: >-
      Abstract-only; the with/from for the IPI is mouse Trib3 (Q8K4K2). ACC is the
      substrate targeted for degradation; supports a regulatory protein interaction.
- id: PMID:18056116
  title: Aldo-keto reductase family 1 B10 affects fatty acid synthesis by regulating
    the stability of acetyl-CoA carboxylase-alpha in breast cancer cells.
  findings:
  - statement: >-
      AKR1B10 associates with acetyl-CoA carboxylase-alpha (ACCA) and stabilizes it;
      AKR1B10 knockdown increases ACCA degradation via the ubiquitin-proteasome pathway and
      decreases fatty acid synthesis.
    reference_section_type: ABSTRACT
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: >-
      Abstract-only; directly reports AKR1B10-ACCA co-immunoprecipitation and cytoplasmic
      co-localization (basis for the O60218 IPI).
- id: PMID:19343720
  title: 'Identification and characterization of proteins interacting with SIRT1 and
    SIRT3: implications in the anti-aging and metabolic effects of sirtuins.'
  findings:
  - statement: >-
      Proteomic identification of novel SIRT1/SIRT3 interacting partners; ACACA (ACC1) was
      curated by IntAct as a SIRT1 interactor from this dataset.
    reference_section_type: ABSTRACT
  reference_review:
    relevance: LOW
    correctness: VERIFIED
    review_notes: >-
      Abstract-only and does not name ACACA in the abstract; the SIRT1 (Q96EB6) interaction
      is IntAct-curated from the full interactome. Supports only a generic protein binding
      annotation.
- id: PMID:20457939
  title: Induced polymerization of mammalian acetyl-CoA carboxylase by MIG12 provides
    a tertiary level of regulation of fatty acid synthesis.
  findings:
  - statement: >-
      MIG12 (MID1IP1) binds ACC and lowers the citrate threshold for polymerization into the
      physiological range, inducing ACC polymerization and increasing enzymatic activity
      more than 50-fold; ACC is the first committed enzyme in fatty acid synthesis.
    reference_section_type: ABSTRACT
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Abstract-only; supports both the acetyl-CoA carboxylase activity IDA and the MID1IP1
      interaction, and the citrate/polymerization activation mechanism.
- id: PMID:20952656
  title: Crystal structure of Spot 14, a modulator of fatty acid synthesis.
  findings:
  - statement: >-
      MIG12 modulates fatty acid synthesis by inducing the polymerization and activity of
      acetyl-CoA carboxylase; Spot 14 (S14) forms heterodimers with MIG12 that reduce ACC
      polymerization and activity.
    reference_section_type: ABSTRACT
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: >-
      Abstract-only; primarily a S14 structure paper but reports the MIG12-ACC polymerization
      mechanism (basis for the ISS carboxylase activity and MID1IP1 IPI annotations).
- id: PMID:26976583
  title: Acetyl-CoA carboxylase inhibition by ND-630 reduces hepatic steatosis, improves
    insulin sensitivity, and modulates dyslipidemia in rats.
  findings:
  - statement: >-
      The allosteric inhibitor ND-630 binds within the ACC phosphopeptide acceptor and
      dimerization site to prevent dimerization and inhibit the enzymatic activity of both
      ACC isozymes, reducing fatty acid synthesis and stimulating fatty acid oxidation.
    reference_section_type: ABSTRACT
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Abstract-only; directly assays ACC enzymatic activity (basis for the IDA acetyl-CoA
      carboxylase activity annotation) and establishes ACC as a metabolic-disease drug target.
- id: PMID:29899443
  title: Structural basis for regulation of human acetyl-CoA carboxylase.
  findings:
  - statement: >-
      Cryo-EM structures of human ACC1 reveal activated (citrate-induced) and inhibited
      (BRCA1 BRCT-bound) filament forms; ACC catalyses the ATP-dependent carboxylation of
      acetyl-CoA, the rate-limiting step in fatty acid biosynthesis, and ACC1 is the
      cytosolic isoform (vs mitochondrion-anchored ACC2).
    reference_section_type: ABSTRACT
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Abstract-only cache but the abstract itself is rich; verbatim quotes support the
      catalytic activity, cytosolic ACC1 vs mitochondrial ACC2 distinction, and the
      citrate/BRCA1 filament regulation.
- id: PMID:38892011
  title: Pin1 Exacerbates Non-Alcoholic Fatty Liver Disease by Enhancing Its Activity
    through Binding to ACC1.
  findings:
  - statement: >-
      Pin1 interacts directly with ACC1 (its WW domain binding the ACC1 1705-2832 region),
      inhibits ACC1 phosphorylation and thereby activates it, accelerating fatty acid
      synthesis and promoting hepatic steatosis in NAFLD.
    reference_section_type: RESULTS
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: >-
      Full text available; Co-IP, GST pull-down and IF establish the direct Pin1-ACC1
      interaction (basis for the Q13526 IPI) and its activating effect on ACC1.
- id: PMID:7905825
  title: Cloning of human acetyl-CoA carboxylase cDNA.
  findings:
  - statement: >-
      Cloning and sequencing of human acetyl-CoA carboxylase cDNA; ACC is the rate-limiting
      enzyme in the biogenesis of long-chain fatty acids.
    reference_section_type: ABSTRACT
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: >-
      Abstract-only; original human ACC cloning paper, basis for the TAS acetyl-CoA
      carboxylase activity annotation.
