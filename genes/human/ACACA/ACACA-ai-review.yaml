core_functions:
- description: >-
    Cytosolic, biotin-dependent acetyl-CoA carboxylase: catalyzes the ATP-dependent
    carboxylation of acetyl-CoA to malonyl-CoA (acetyl-CoA + HCO3- + ATP = malonyl-CoA +
    ADP + phosphate), the committed and rate-limiting step of de novo fatty acid
    biosynthesis. This forms malonyl-CoA, the committed precursor elongated by fatty acid
    synthase into long-chain fatty acids.
