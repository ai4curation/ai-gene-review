id: Q13085
gene_symbol: ACACA
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  ACACA encodes acetyl-CoA carboxylase 1 (ACC1, also ACC-alpha; EC 6.4.1.2), a large
  cytosolic, biotin-dependent multi-domain enzyme that catalyzes the first, committed and
  rate-limiting step of de novo fatty acid biosynthesis: the ATP-dependent carboxylation
  of acetyl-CoA to malonyl-CoA (acetyl-CoA + HCO3- + ATP = malonyl-CoA + ADP + phosphate).
  Catalysis proceeds in two half-reactions carried out by distinct domains: an N-terminal
  biotin carboxylase (BC) domain uses ATP to carboxylate a biotin cofactor covalently
  attached to a central biotinyl-binding (biotin carboxyl carrier, BCC) domain, and a
  C-terminal carboxyltransferase (CT) domain then transfers the carboxyl group from
  carboxybiotin to acetyl-CoA, producing malonyl-CoA. Two magnesium or manganese ions per
  subunit are required. ACC1 is one of two mammalian ACC isozymes; it is the cytosolic
  enzyme supplying malonyl-CoA for chain elongation by fatty acid synthase, whereas the
  paralogous ACC2/ACACB is anchored to the outer mitochondrial membrane and regulates
  fatty acid oxidation. The malonyl-CoA product of ACC1 both feeds fatty acid synthesis and
  serves as a signaling metabolite. ACC1 activity is tightly and multiply regulated:
  inhibited by AMPK-dependent phosphorylation (notably Ser-80), allosterically activated by
  citrate which promotes polymerization into catalytically active filaments, further
  activated by the MID1IP1 (MIG12/S14R) protein that lowers the citrate threshold for
  polymerization, and inhibited by long-chain acyl-CoA. Its phosphorylated inactive form is
  bound by the BRCT domains of BRCA1, which blocks dephosphorylation and represses
  lipogenesis. Loss-of-function variants cause the autosomal recessive acetyl-CoA
  carboxylase deficiency (ACACAD), an inborn error of de novo fatty acid synthesis, and the
  enzyme is a drug target in metabolic disease (e.g. hepatic steatosis).
