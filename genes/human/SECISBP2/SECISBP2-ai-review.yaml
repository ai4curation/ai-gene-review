gene_symbol: SECISBP2
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: SECISBP2 (SECIS-binding protein 2, SBP2) is the essential trans-acting factor
  for co-translational selenocysteine incorporation into selenoproteins. It is an
  L7Ae/L30-family RNA-binding protein whose C-terminal half comprises a Sec-insertion
  domain (SID) and an RNA-binding domain (RBD) that recognizes the kink-turn (K-turn) motif
  of the SECIS element, a stem-loop located in the 3'-untranslated region of selenoprotein
  mRNAs. When an elongating 80S ribosome encounters an in-frame UGA codon, the SBP2-SECIS
  complex binds the 40S subunit (contacting ribosomal protein eS31/RPS27A and 18S rRNA) and
  forms a docking platform that recruits the selenocysteine-specific GTPase elongation
  factor EEFSEC together with selenocysteinyl-tRNA(Sec); after GTP hydrolysis and
  accommodation, selenocysteine is incorporated at the UGA codon rather than terminating
  translation. Through this recoding activity SBP2 is required for synthesis of essentially
  all selenoproteins (glutathione peroxidases, thioredoxin reductases, iodothyronine
  deiodinases, selenoprotein P, and others). The full-length isoform localizes to the
  nucleus and functions at cytoplasmic ribosomes, while an alternatively spliced isoform
  bearing an N-terminal transit peptide (mtSBP2) localizes to mitochondria. Loss-of-function
  variants cause a multisystem selenoprotein deficiency syndrome featuring abnormal thyroid
  hormone metabolism, growth retardation, myopathy, photosensitivity, and azoospermia.
