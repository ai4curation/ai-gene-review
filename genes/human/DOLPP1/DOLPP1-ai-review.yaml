  label: Homo sapiens
description: >-
  DOLPP1 (dolichyldiphosphatase 1; dolichyl pyrophosphate phosphatase 1; EC 3.6.1.43)
  is a multi-pass endoplasmic reticulum membrane enzyme of the PAP2 / lipid-phosphatase
  superfamily. It hydrolyzes dolichyl diphosphate (dolichyl-PP) to dolichyl phosphate
  (dolichyl-P) plus inorganic phosphate, acting on dolichyl diphosphate at a high rate
  and on dolichyl monophosphate much more weakly, and does not act on phosphatidate.
  During N-linked protein glycosylation, the lipid-linked oligosaccharide is transferred
  from dolichyl-PP-oligosaccharide to nascent glycoproteins by oligosaccharyltransferase,
  releasing dolichyl-PP into the ER. By dephosphorylating this released dolichyl-PP, DOLPP1
  regenerates the dolichyl-P glycan-carrier pool (the salvage arm of dolichyl-phosphate
  synthesis) and is thereby required for efficient N-glycosylation and for maintaining
  optimal levels of dolichol-linked oligosaccharides.
