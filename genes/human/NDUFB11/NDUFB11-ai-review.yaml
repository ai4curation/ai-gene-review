- id: PMID:30030361
  title: Assembly of mammalian oxidative phosphorylation complexes I-V and supercomplexes.
  findings:
  - statement: >-
      Review of OXPHOS assembly noting that human respiratory complexes comprise catalytic
      core proteins plus numerous supernumerary subunits that play essential roles in
      assembly, regulation and stability.
    reference_section_type: ABSTRACT
