core_functions:
- description: >-
    NDUFB11 (ESSS / Np17.3) acts as a non-catalytic structural subunit of the membrane
    (proximal) arm of mitochondrial respiratory chain Complex I. Imported via an
    N-terminal transit peptide and anchored in the mitochondrial inner membrane by a
    single transmembrane helix, it is a stable accessory subunit of the mature 45-subunit
    holoenzyme, required for its assembly and stability. It contributes to, but does not
    itself catalyze, the complex-level NADH:ubiquinone oxidoreductase activity.
