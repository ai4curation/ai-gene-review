- id: PMID:31206022
  title: BAP31 regulates mitochondrial function via interaction with Tom40 within
    ER-mitochondria contact sites.
  findings:
  - statement: >-
      BAP31 (BCAP31) forms an ER-mitochondria bridging complex that stimulates Complex I
      biogenesis; disrupting the BAP31-Tom40 complex reduces Complex I activity. NDUFB11
      interacts with BCAP31 and is localized to mitochondria/inner membrane in this study.
    reference_section_type: ABSTRACT
    supporting_text: >-
      Disruption of the BAP31-Tom40 complex inhibits mitochondrial complex I activity
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: >-
      Full text available (PMC6561740). UniProt cites it for the BCAP31 interaction and
      the inner-membrane location (EXP). The paper's main mechanism concerns NDUFS4
      import; the NDUFB11-BCAP31 interaction is real interactome/location context.
