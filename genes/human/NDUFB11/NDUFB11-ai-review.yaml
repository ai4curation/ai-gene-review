  label: Homo sapiens
description: >-
  NDUFB11 (also known as ESSS / Complex I-ESSS, and neuronal protein 17.3) is a small,
  X-linked, nuclear-encoded accessory (supernumerary) subunit of mitochondrial respiratory
  chain Complex I (NADH:ubiquinone oxidoreductase). It is a genuine, stable structural
  component of the mature 45-subunit holoenzyme that is not itself involved in catalysis;
  its role is to help assemble and stabilize the membrane (proximal) arm of the complex.
  The mature protein is imported via an N-terminal mitochondrial transit peptide and is
  anchored in the mitochondrial inner membrane by a single transmembrane helix. By
  supporting a functional Complex I, NDUFB11 contributes to electron transfer from NADH
  to ubiquinone and thereby to oxidative phosphorylation. Loss-of-function variants cause
  isolated mitochondrial complex I deficiency and X-linked syndromic disorders including
  microphthalmia with linear skin defects (MLS-like / LSDMCA3) and histiocytoid
  cardiomyopathy, reflecting its requirement for a functional respiratory chain.
