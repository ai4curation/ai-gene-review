existing_annotations:
- term:
    id: GO:0000226
    label: microtubule cytoskeleton organization
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: involved_in
  review:
    summary: Tau is a neuronal microtubule-associated protein with core 
      microtubule-binding, microtubule-stabilizing, axonal localization, axonal 
      transport, neurite/axon development, and pathological self-assembly/tangle
      biology.
    action: ACCEPT
    reason: Accept as core MAPT biology. UniProt and primary tau studies support
      tau binding to tubulin/microtubules, promoting microtubule 
      assembly/stability, localizing mainly in axons and 
      cytosolic/membrane-cortex contexts, regulating microtubule dynamics and 
      axonal transport, and self-assembling in Alzheimer neurofibrillary-tangle 
      pathology.
    additional_reference_ids:
    - PMID:15147841
    - PMID:10747907
    - PMID:2484340
    - file:human/MAPT/MAPT-uniprot.txt
