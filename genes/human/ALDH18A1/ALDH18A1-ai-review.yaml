- description: >-
    Gamma-glutamyl phosphate reductase / glutamate-5-semialdehyde dehydrogenase (GPR)
    activity: the C-terminal domain reduces L-glutamyl 5-phosphate to L-glutamate
    5-semialdehyde using NADPH (EC 1.2.1.41); the semialdehyde spontaneously cyclizes to
    delta-1-pyrroline-5-carboxylate (P5C), the precursor for both proline and ornithine.
