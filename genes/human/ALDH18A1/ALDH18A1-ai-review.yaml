id: P54886
gene_symbol: ALDH18A1
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  ALDH18A1 encodes delta-1-pyrroline-5-carboxylate synthase (P5CS), a mitochondrial
  bifunctional enzyme that catalyzes the first two committed steps of proline and
  ornithine biosynthesis from L-glutamate. Its N-terminal glutamate 5-kinase (gamma-glutamyl
  kinase, GK) domain phosphorylates L-glutamate to L-glutamyl 5-phosphate using ATP
  (EC 2.7.2.11), and its C-terminal gamma-glutamyl phosphate reductase / glutamate-5-semialdehyde
  dehydrogenase (GPR) domain reduces L-glutamyl 5-phosphate to L-glutamate 5-semialdehyde
  using NADPH (EC 1.2.1.41); the semialdehyde spontaneously cyclizes to delta-1-pyrroline-5-carboxylate
  (P5C). P5C is a branch-point intermediate that is reduced to proline (by PYCR enzymes) or
  transaminated to ornithine (by OAT), so P5CS is upstream of proline, ornithine and, via the
  urea cycle, arginine and citrulline. The enzyme localizes to the mitochondrial matrix, forms
  homodimers/multimers, and assembles into rod/ring-like and stress-responsive filamentous
  structures whose organization depends on multimerization rather than catalytic activity. Two
  splice isoforms differ by a 2-residue insert at the GK active site: a long, ornithine-insensitive
  isoform expressed broadly and a short, ornithine-inhibited isoform highly active in gut arginine
  biosynthesis. Loss-of-function and dominant-negative ALDH18A1 variants cause autosomal recessive
  and dominant cutis laxa (ARCL3A/ADCL3, De Barsy-like progeroid connective tissue disease) and
  hereditary spastic paraplegia type 9 (SPG9A/SPG9B), with a metabolic signature of hyperammonemia
  and low plasma ornithine, citrulline, arginine and proline.
