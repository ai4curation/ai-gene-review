core_functions:
- description: >-
    Glutamate 5-kinase (gamma-glutamyl kinase, GK) activity: the N-terminal domain
    phosphorylates L-glutamate using ATP to form L-glutamyl 5-phosphate (EC 2.7.2.11), the
    first committed and rate-influencing step of proline and ornithine biosynthesis from
    glutamate in the mitochondrial matrix.
