description: ERP29 (endoplasmic reticulum resident protein 29; also called ERp28 and
  ERp31) is a soluble, ER-lumenal, homodimeric member of the protein disulfide isomerase
  (PDI) family that is catalytically redox-inactive - it has a thioredoxin-like fold
  but lacks the CXXC active-site motif and is not a disulfide isomerase. It functions
  as a non-catalytic escort/chaperone that assists the folding, processing and trafficking
  of secretory cargo in the ER, and is a component of a large ER chaperone multiprotein
  complex (containing BiP/HSPA5, GRP94/HSP90B1, PDI, the Hsp40 co-chaperone ERdj3/DNAJB11,
  cyclophilin B/PPIB, ERp72/PDIA4, UGGT1 and SDF2L1) that binds nascent, incompletely
  folded clients such as immunoglobulin heavy chains. It is retained in the ER lumen
  by a C-terminal KEEL retention signal and is broadly expressed, especially in secretory
  tissues; pools have also been detected at the cell surface, in melanosomes and secreted.
  Beyond its core chaperone role it has been implicated in handling of specific cargo
  (e.g. thyroglobulin, connexins) and in toxin/virus membrane penetration, and in cell-context-specific
  signaling (p38 MAPK, gene expression and secretion control in cancer models).
