core_functions:
- description: Non-catalytic, ER-lumenal escort/chaperone of the PDI family (lacking
    a CXXC active site) that assists the folding, processing and trafficking of secretory
    cargo by binding molecular chaperones within a large ER chaperone multiprotein complex.
  molecular_function:
    id: GO:0051087
    label: protein-folding chaperone binding
  locations:
