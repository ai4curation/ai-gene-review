    label: endoplasmic reticulum lumen
  supported_by:
  - reference_id: PMID:12475965
    supporting_text: large endoplasmic reticulum (ER)-localized
      multiprotein complex that is comprised of the molecular chaperones BiP
  - reference_id: file:human/ERP29/ERP29-uniprot.txt
    supporting_text: Plays an important
      role in the processing of secretory proteins within the endoplasmic
