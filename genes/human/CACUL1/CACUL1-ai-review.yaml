suggested_questions:
- question: >-
    Does CACUL1 act as a bona fide CDK2 regulator through a direct
    structural/allosteric mechanism, or indirectly via cyclin or CDK-inhibitor
    levels?
- question: >-
    Is the nuclear-receptor co-regulatory activity of CACUL1 (ERalpha repression
    via LSD1, and the separately reported androgen-receptor co-regulation)
    physiologically significant, and how is its directionality (corepressor vs
    coactivator) determined?
- question: >-
    CACUL1 binds the Cul3-Keap1-Rbx1 (CRL3) complex and negatively regulates Nrf2
    ubiquitination (PMID:26238671) without nucleating its own ligase - does its
    cullin-repeat-like domain mediate this CRL3 association, and is the regulation
    Nrf2-specific or a more general modulation of CRL3-Keap1 substrate
    ubiquitination?
suggested_experiments:
- description: >-
    In vitro reconstituted CDK2 kinase assays with purified recombinant CACUL1 to
    test whether it directly stimulates CDK2 activity, and structural/biophysical
    mapping (e.g., cryo-EM or co-crystallization, HDX-MS) of the CACUL1-CDK2
    interface.
  experiment_type: biochemical/structural
  hypothesis: >-
    CACUL1 directly binds and allosterically activates CDK2 independent of cyclin
    levels.
- description: >-
    Affinity purification-mass spectrometry of endogenous CACUL1 across cell-cycle
    stages to define its stable interactome and test for any RBX/neddylation or
    cullin-RING ligase components.
  experiment_type: proteomics
  hypothesis: >-
    CACUL1 does not assemble a canonical cullin-RING ligase and instead functions
    through CDK2 and nuclear-receptor/chromatin partners.
- description: >-
    ChIP-seq and reporter assays for CACUL1 at ERalpha- and androgen-receptor-
    responsive promoters with and without LSD1, to define its co-regulatory
    direction and chromatin effects.
  experiment_type: genomics/transcription
  hypothesis: >-
    CACUL1 modulates nuclear-receptor target genes through LSD1-dependent changes
    in histone methylation.
