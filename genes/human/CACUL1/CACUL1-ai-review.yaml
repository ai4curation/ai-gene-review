  label: Homo sapiens
description: >-
  CACUL1 (CDK2-associated and cullin domain-containing protein 1; also known as
  CAC1 / C10orf46) is a poorly characterized 369-amino-acid human protein
  containing a single cullin-repeat-like domain with disordered N- and C-terminal
  regions. Despite its name and cullin-fold homology, it is much shorter than
  canonical cullins (~750-900 aa) and there is no experimental evidence that it
  nucleates a functional cullin-RING ubiquitin ligase or carries a neddylation/RBX
  module. The best-supported activity, from a single study, is physical association
  with the cyclin-dependent kinase CDK2 and promotion of CDK2 kinase activity,
  consistent with a role in G1/S cell-cycle progression and proliferation; the
  protein is highly expressed in cancer tissues and cell lines, and its abundance
  varies across the cell cycle. CACUL1 also acts as a nuclear-receptor
  transcriptional corepressor: it is a SIRT1-interacting protein that binds
  PPARgamma (and estrogen receptor alpha) and represses their transcription by
  coordinating SIRT1 and the histone demethylase LSD1/KDM1A at target promoters
  (lowering H3K9 acetylation and raising H3K9 methylation), thereby suppressing
  adipocyte differentiation. Separately, although CACUL1 does not itself nucleate a
  cullin-RING ligase, it binds the Cul3-Keap1-Rbx1 (CRL3-Keap1) ubiquitin-ligase
  complex and attenuates its ubiquitination of the transcription factor Nrf2
  (NFE2L2), stabilizing Nrf2 and promoting the antioxidant response. CACUL1 has
  also been recovered as a yeast two-hybrid interactor of ARMC5. Overall, CACUL1 is
  a multifunctional protein linking CDK2-associated cell-cycle progression,
  nuclear-receptor corepression, and negative regulation of Nrf2 ubiquitination.
