- term:
    id: GO:0006511
    label: ubiquitin-dependent protein catabolic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: involved_in
  review:
    summary: >-
      The IEA InterPro2GO transfer (cullin-repeat domain IPR001373) implies direct
      participation in ubiquitin-dependent catabolism, which remains unsupported:
      CACUL1 is too short to be a CRL scaffold and carries no RBX/neddylation
      module. However, Kigoshi et al. 2015 (PMID:26238671) show CACUL1 binds the
      Cul3-Keap1-Rbx1 ubiquitin-ligase complex and ATTENUATES Nrf2 ubiquitination,
      stabilizing Nrf2. The experimentally supported role is therefore NEGATIVE
      regulation of (Nrf2) ubiquitination, not direct participation in catabolism;
      modify accordingly.
    action: MODIFY
    reason: >-
      Direct participation in ubiquitin-dependent catabolism is a domain-only
      over-annotation, but CACUL1 has experimentally demonstrated activity as a
      negative regulator of Nrf2 ubiquitination via the Cul3-Keap1-Rbx1 complex
      (PMID:26238671); replace with negative regulation of protein ubiquitination.
    proposed_replacement_terms:
    - id: GO:0031397
      label: negative regulation of protein ubiquitination
    supported_by:
    - reference_id: PMID:26238671
      supporting_text: CACUL1 attenuates Nrf2 ubiquitination
    - reference_id: PMID:26238671
      supporting_text: CACUL1 stabilizes Nrf2 by regulating Nrf2 ubiquitination
