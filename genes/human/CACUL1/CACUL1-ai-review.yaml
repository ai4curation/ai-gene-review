- id: PMID:19829063
  title: Identification and characterization of CAC1 as a novel CDK2-associated cullin.
  findings:
  - statement: >-
      CACUL1/CAC1 is a 369-aa cullin-domain protein that physically associates
      with CDK2, promotes CDK2 kinase activity, and is required for G1/S
      progression and proliferation; highly expressed in cancers.
    supporting_text: >-
      CAC1 interacts with CDK2 and promotes the kinase activity of CDK2 protein,
      we propose that CAC1 is a novel cell cycle associated protein capable of
      promoting cell proliferation.
- id: PMID:23178685
  title: Negative regulation of ERα by a novel protein CAC1 through association with
    histone demethylase LSD1.
  findings:
  - statement: >-
      CAC1 binds ERalpha via its CoRNR box and, in association with LSD1,
      functions as an ERalpha corepressor, increasing H3K9me3 at ERalpha target
      promoters.
    supporting_text: >-
      CAC1, associated with LSD1, functions as an ERα corepressor, implicating a
      potential antitumor target in ERα-positive breast cancer.
- id: PMID:28169274
  title: Armc5 deletion causes developmental defects and compromises T-cell immune
    responses.
  findings:
  - statement: >-
      CACUL1 was recovered as one of 16 ARMC5-binding partners in a yeast
      two-hybrid screen; the study characterizes ARMC5, not CACUL1.
    supporting_text: Yeast 2-hybrid assays identify 16 ARMC5-binding partners.
