    id: GO:0031625
    label: ubiquitin protein ligase binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: >-
      Although the IEA call was originally a pure cullin-domain (IPR001373)
      transfer, it is now experimentally supported: Kigoshi et al. 2015
      (PMID:26238671) demonstrate that CACUL1 binds Keap1, Cul3 and Rbx1 - the
      components of the ubiquitin ligase (CRL3) responsible for Nrf2 ubiquitination
