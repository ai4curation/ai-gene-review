id: P08686
gene_symbol: CYP21A2
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: Cytochrome P450 21A2 (P450c21, steroid 21-hydroxylase; EC 1.14.14.16)
  is a heme-thiolate cytochrome P450 monooxygenase anchored to the endoplasmic reticulum
  (microsomal) membrane, expressed predominantly in the adrenal cortex. It catalyses
  hydroxylation at carbon 21 of C21 steroids using molecular oxygen and electrons
  supplied by NADPH via cytochrome P450 reductase (POR). It acts at the branch point
  of adrenal corticosteroid biosynthesis, converting progesterone to 11-deoxycorticosterone
  (DOC) in the mineralocorticoid branch (feeding aldosterone synthesis) and 17alpha-hydroxyprogesterone
  to 11-deoxycortisol in the glucocorticoid branch (feeding cortisol synthesis), thereby
  supplying both the mineralocorticoid and glucocorticoid arms of steroidogenesis.
  Loss-of-function variants cause 21-hydroxylase deficiency, the commonest cause of
  congenital adrenal hyperplasia (>90-95% of cases), producing cortisol and aldosterone
  deficiency with adrenal androgen excess across a spectrum from salt-wasting and simple-virilizing
  classic forms to non-classic late-onset disease; deleterious alleles arise largely
  by gene conversion with the adjacent CYP21A1P pseudogene.
