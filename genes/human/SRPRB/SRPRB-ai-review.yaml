description: SRPRB (SR-beta, also known as APMCF1) is the beta subunit of the signal recognition particle receptor (SR), a heterodimeric receptor at the endoplasmic reticulum membrane composed of the soluble alpha subunit (SRPRA/SR-alpha) and the membrane-anchored beta subunit SRPRB. SRPRB is a small GTPase of the Ras superfamily (closely related to Arf and Sar1) that is anchored in the ER membrane by a single N-terminal transmembrane helix and tethers SRPRA to the membrane. Acting as a GTPase switch coordinated with the SRP54 and SRPRA GTPases, the SR receives the signal recognition particle bound to a translating ribosome-nascent chain complex and docks it at the ER, enabling handover of the nascent secretory or membrane protein to the Sec61 translocon for cotranslational translocation. SRPRB is an integral ER membrane protein; its core activities are GTP binding/hydrolysis and SR-mediated targeting of nascent secretory proteins to the ER.
