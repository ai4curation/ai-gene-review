suggested_questions:
- question: Does the cytoplasmic-microtubule annotation (PMID:23264731, about MTR120) reflect any genuine SRPRB localization, or is it a curation mis-attribution that should be removed once the full text is checked?
- question: How is SRPRB GTP hydrolysis kinetically coupled to the SRP54 and SRPRA GTPases to ensure fidelity and timing of nascent-chain handover to Sec61?
suggested_experiments:
- description: Reconstitute the SRP-RNC targeting reaction with wild-type versus GTP-binding-deficient SRPRB to quantify the contribution of the SRbeta GTPase switch to receptor docking and translocation efficiency.
- description: Endogenous tagging plus high-resolution imaging of SRPRB to definitively establish its ER-membrane localization and test for any non-ER (e.g. microtubule) pool implied by legacy annotations.
