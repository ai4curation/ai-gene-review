id: Q06124
gene_symbol: PTPN11
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: PTPN11 encodes SHP2, a widely expressed soluble non-receptor protein tyrosine phosphatase.
  Its tandem N-terminal SH2 domains both autoinhibit the catalytic PTP domain and recruit SHP2 to phosphotyrosine-containing
  receptors and adaptors, where ligand binding activates tyrosine dephosphorylation. SHP2 also has phosphotyrosine-dependent
  molecular-adaptor and scaffolding activities. These coupled functions commonly promote RAS-ERK output
  downstream of receptor tyrosine kinases, while producing inhibitory effects in selected immune-receptor
  pathways. PTPN11 is required in many developmental and homeostatic contexts, and altered catalytic regulation
  causes RASopathy syndromes and contributes to malignancy.
