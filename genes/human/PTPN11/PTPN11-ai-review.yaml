    label: non-membrane spanning protein tyrosine phosphatase activity
  evidence_type: IDA
  original_reference_id: PMID:32184441
  qualifier: enables
  review:
    summary: Non-membrane-spanning protein tyrosine phosphatase activity is SHP2's defining catalytic
      function.
    action: ACCEPT
    reason: Biochemical and substrate-trapping studies establish dephosphorylation of phosphotyrosine
      residues on protein substrates by soluble SHP2.
    supported_by: *id001
- term:
    id: GO:0050860
    label: negative regulation of T cell receptor signaling pathway
  evidence_type: IDA
  original_reference_id: PMID:32184441
  qualifier: involved_in
  review:
    summary: PD-1-recruited SHP2 can inhibit T-cell-receptor signaling.
    action: KEEP_AS_NON_CORE
    reason: This is a well-defined immune-checkpoint deployment of SHP2's core phosphotyrosine binding
      and phosphatase activities.
- term:
    id: GO:0050868
    label: negative regulation of T cell activation
  evidence_type: IDA
  original_reference_id: PMID:32184441
  qualifier: involved_in
  review:
    summary: PD-1-recruited SHP2 can inhibit T-cell activation.
    action: KEEP_AS_NON_CORE
    reason: T-cell activation is a context-specific physiological output rather than SHP2's core molecular
      function.
- term:
    id: GO:0042311
    label: vasodilation
  evidence_type: IMP
  original_reference_id: PMID:26706435
  qualifier: acts_upstream_of
  review:
    summary: Endothelial SHP2 signaling contributes to flow-mediated vasodilation.
    action: KEEP_AS_NON_CORE
    reason: Vasodilation is a tissue-level mechanotransduction outcome and is retained as non-core.
- term:
    id: GO:0051897
    label: positive regulation of phosphatidylinositol 3-kinase/protein kinase B signal transduction
  evidence_type: IMP
  original_reference_id: PMID:26706435
  qualifier: involved_in
  review:
    summary: SHP2 can promote PI3K-AKT signaling in receptor and mechanotransduction contexts.
    action: KEEP_AS_NON_CORE
    reason: PI3K-AKT regulation is a pathway-specific downstream outcome rather than a distinct SHP2 molecular
      activity.
- term:
    id: GO:0071260
    label: cellular response to mechanical stimulus
  evidence_type: IMP
  original_reference_id: PMID:26706435
  qualifier: acts_upstream_of
  review:
    summary: SHP2 participates in endothelial responses to mechanical flow.
    action: KEEP_AS_NON_CORE
    reason: Mechanical-stimulus response is a context-specific upstream input to SHP2 signaling.
- term:
    id: GO:1902533
    label: positive regulation of intracellular signal transduction
  evidence_type: IMP
  original_reference_id: PMID:26706435
  qualifier: involved_in
  review:
    summary: SHP2 can promote intracellular signaling, but this term is too broad to convey the mechanism.
    action: MARK_AS_OVER_ANNOTATED
    reason: The generic term adds little beyond more specific ERK and PI3K-AKT annotations and risks causal
      over-propagation.
- term:
    id: GO:0042130
    label: negative regulation of T cell proliferation
  evidence_type: IDA
  original_reference_id: PMID:15568026
  qualifier: involved_in
  review:
    summary: Inhibitory-receptor recruitment of SHP2 can reduce T-cell proliferation.
    action: KEEP_AS_NON_CORE
    reason: This is a downstream immune-cell outcome rather than a core molecular activity.
