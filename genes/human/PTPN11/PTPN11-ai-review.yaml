- term:
    id: GO:0070374
    label: positive regulation of ERK1 and ERK2 cascade
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: involved_in
  review:
    summary: Positive regulation of ERK1/2 output is a recurrent, central consequence of SHP2 activity
      downstream of receptor tyrosine kinases.
    action: ACCEPT
    reason: SHP2 commonly promotes RAS-ERK signaling, including by dephosphorylating inhibitory substrates
      such as Sprouty proteins.
    supported_by:
    - &id005
      reference_id: PMID:28074573
      supporting_text: Expression of the mutant proteins in HEK293T cells documented their activating
        role on MAPK signaling.
    - &id003
      reference_id: PMID:24431450
