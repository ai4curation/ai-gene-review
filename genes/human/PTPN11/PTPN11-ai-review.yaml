- id: file:human/PTPN11/PTPN11-notes.md
  title: PTPN11 / SHP2 manual review notes
  findings: []
core_functions:
- description: SH2-recruited non-receptor protein tyrosine phosphatase activity that dephosphorylates
    receptor-proximal proteins and frequently promotes RAS-ERK output by removing inhibitory phosphotyrosines.
  molecular_function:
    id: GO:0004726
    label: non-membrane spanning protein tyrosine phosphatase activity
  directly_involved_in:
  - id: GO:0035335
    label: peptidyl-tyrosine dephosphorylation
  - id: GO:0070374
    label: positive regulation of ERK1 and ERK2 cascade
  locations:
  - id: GO:0005829
    label: cytosol
  supported_by:
  - *id006
  - *id005
- description: Tandem-SH2-domain phosphotyrosine binding that relieves autoinhibition and recruits SHP2
    to activated receptors and docking proteins.
  molecular_function:
    id: GO:0001784
    label: phosphotyrosine residue binding
  directly_involved_in:
  - id: GO:0070374
    label: positive regulation of ERK1 and ERK2 cascade
  locations:
  - id: GO:0005829
    label: cytosol
  supported_by: *id007
- description: Phosphotyrosine-dependent molecular-adaptor and scaffolding activity that assembles receptor-proximal
    signaling proteins independently of direct substrate dephosphorylation.
  molecular_function:
    id: GO:0060090
    label: molecular adaptor activity
  locations:
  - id: GO:0005829
    label: cytosol
  supported_by: *id002
proposed_new_terms: []
suggested_questions:
- question: Which direct SHP2 substrates are necessary and sufficient for positive RAS-ERK signaling downstream
    of each major receptor family?
- question: Which SHP2 outputs in human developmental tissues require catalytic activity, tandem-SH2 recruitment,
    or the C-terminal adaptor function?
- question: Does the FGF8-SHP2-ERK requirement for Bergmann-glia specification observed in mouse operate
    equivalently in human cerebellar development?
suggested_experiments:
- description: Perform domain-resolved rescue of endogenous PTPN11 loss with wild-type, catalytic-dead,
    tandem-SH2-binding-defective, and C-terminal phosphosite-mutant SHP2, coupled to quantitative phosphoproteomics
    and ERK reporters.
  hypothesis: Catalytic and phosphotyrosine-recruitment functions are jointly required for robust ERK
    output, whereas a subset of receptor-complex assembly is retained by catalytically inactive SHP2.
  experiment_type: genetic rescue and phosphoproteomics
- description: Use human iPSC-derived cerebellar radial-glia/Bergmann-glia differentiation with temporally
    controlled PTPN11 perturbation, FGF8 stimulation, single-cell transcriptomics, and live ERK reporters.
  hypothesis: PTPN11 acts cell-autonomously downstream of FGF signaling during human Bergmann-glia specification,
    matching the mouse radial-glia phenotype.
  experiment_type: human cerebellar differentiation and signaling assay
