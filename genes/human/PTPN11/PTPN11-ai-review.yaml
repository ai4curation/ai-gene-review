    label: receptor tyrosine kinase binding
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: enables
  review:
    summary: Receptor tyrosine kinase binding reflects core SH2-guided recruitment of SHP2 to activated
      signaling complexes.
    action: ACCEPT
    reason: Binding activated phosphotyrosine-containing receptors is central to SHP2 localization, activation,
      and access to receptor-proximal substrates.
- term:
