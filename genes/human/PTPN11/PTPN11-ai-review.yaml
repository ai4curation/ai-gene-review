- term:
    id: GO:0005515
    label: protein binding
  evidence_type: IPI
  original_reference_id: PMID:12051764
  qualifier: enables
  review:
    summary: IPI evidence reports an interaction with UniProtKB:Q96P31, but generic protein binding is
      not an informative SHP2 activity.
    action: MARK_AS_OVER_ANNOTATED
    reason: The interaction from PMID:12051764 is preserved; however, GO:0005515 does not distinguish
      phosphotyrosine-dependent recruitment, substrate recognition, receptor binding, or a context-specific
      association.
- term:
    id: GO:0005739
    label: mitochondrion
  evidence_type: HTP
  original_reference_id: PMID:34800366
  qualifier: located_in
  review:
    summary: A high-throughput mitochondrial-localization signal is reported.
    action: UNDECIDED
    reason: A single HTP localization does not establish a functional mitochondrial pool of SHP2; retain
      undecided rather than overruling the experimental source.
