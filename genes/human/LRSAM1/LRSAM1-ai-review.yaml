references:
- id: GO_REF:0000003
  title: Gene Ontology annotation based on Enzyme Commission mapping
  findings:
  - statement: Provides electronic assignment of GO:0061630 (ubiquitin protein ligase
      activity) via EC 2.3.2.27 mapping. Correct for LRSAM1, which is a RING-type
      E3 ligase.
- id: GO_REF:0000041
  title: Gene Ontology annotation based on UniPathway vocabulary mapping
  findings:
  - statement: Provides electronic annotation to protein ubiquitination-related process
      via UniPathway mapping. Consistent with LRSAM1's core ubiquitin ligase activity.
- id: GO_REF:0000044
  title: Gene Ontology annotation based on UniProtKB/Swiss-Prot Subcellular Location
    vocabulary mapping, accompanied by conservative changes to GO terms applied by
    UniProt
  findings:
  - statement: Provides electronic cytoplasm localization based on UniProt subcellular
      location vocabulary, consistent with experimental evidence that LRSAM1 is a
      cytoplasmic E3 ligase.
- id: PMID:15256501
  title: Tal, a Tsg101-specific E3 ubiquitin ligase, regulates receptor endocytosis
    and retrovirus budding.
  findings:
  - statement: LRSAM1 (Tal) is a TSG101-specific E3 ubiquitin ligase that monoubiquitinates TSG101, regulating receptor (EGFR) endocytosis and retrovirus (HIV-1) budding; it autoubiquitinates and localizes to a submembranal ring.
    reference_section_type: ABSTRACT
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: Foundational paper establishing LRSAM1/Tal as a catalytic RING E3 ligase and its ESCRT/TSG101 role. Abstract-only in cache.
- id: PMID:16189514
  title: Towards a proteome-scale map of the human protein-protein interaction network.
  findings:
  - statement: Rual et al. CCSB-HI1 proteome-scale yeast two-hybrid map records a
      LRSAM1 protein-protein interaction. High-throughput dataset; the interaction
      supports only bare protein binding, not a specific molecular function.
    supporting_text: 'Systematic mapping of protein-protein interactions, or ''interactome''
      mapping, was initiated in model organisms'
    reference_section_type: ABSTRACT
- id: PMID:16713569
  title: A protein-protein interaction network for human inherited ataxias and disorders
    of Purkinje cell degeneration.
  findings:
  - statement: Lim et al. yeast two-hybrid network for 54 ataxia/Purkinje-cell-degeneration
      proteins reports an interaction involving LRSAM1. Provides only bare protein-binding
      evidence, not a specific molecular function.
    supporting_text: we developed an interaction network for 54 proteins involved
      in 23 inherited ataxias
    reference_section_type: ABSTRACT
- id: PMID:18077552
  title: 'Regulation of Tsg101 expression by the steadiness box: a role of Tsg101-associated
    ligase.'
  findings:
  - statement: Tal (LRSAM1) polyubiquitinates lysine residues in the C-terminus of
      uncomplexed TSG101, targeting it for proteasomal degradation; accessibility
      to these lysines is masked when TSG101 is engaged with other ESCRT-I subunits.
      Establishes Tal as a regulator of ESCRT-I (TSG101) steady-state levels.
    supporting_text: Tal polyubiquitinates lysine residues in the C-terminus of uncomplexed
      Tsg101, resulting in proteasomal degradation. However, accessibility to these
      lysines is prevented by the presence of the other ESCRT-I proteins.
    reference_section_type: ABSTRACT
- id: PMID:19549727
  title: Analysis of the human E2 ubiquitin conjugating enzyme protein interaction
    network.
  findings:
  - statement: Markson et al. yeast two-hybrid map of human E2/E3-RING interactions
      records LRSAM1 (a RING E3) among the E3 partners tested against 35 E2 conjugating
      enzymes. Supports LRSAM1 acting through canonical E2-E3 RING chemistry but provides
      only bare protein-binding-level evidence.
    supporting_text: yeast two-hybrid (Y2H) screens were combined with true homology
      modeling methods to generate a high-density map of human E2/E3-RING interactions
    reference_section_type: ABSTRACT
- id: PMID:19690564
  title: A comprehensive framework of E2-RING E3 interactions of the human ubiquitin-proteasome
    system.
  findings:
  - statement: van Wijk et al. Y2H framework of 35 E2s vs 250 RING-type E3s (including
      LRSAM1) reports LRSAM1 E2-RING interactions. Consistent with LRSAM1 functioning
      as a canonical RING E3 partnering with E2 conjugating enzymes; bare protein-binding-level
      evidence only.
    supporting_text: We performed a global yeast-two hybrid screen to study the specificity
      of interactions between catalytic domains of the 35 human E2s with 250 RING-type
      E3s.
    reference_section_type: ABSTRACT
- id: PMID:21044950
  title: Genome-wide YFP fluorescence complementation screen identifies new regulators
    for telomere signaling in human cells.
  findings:
  - statement: Lee et al. genome-wide bimolecular fluorescence complementation screen
      for telomere-interactome regulators reports an LRSAM1 interaction with a core
      telomeric protein. High-throughput screen; provides only bare protein-binding
      evidence, no specific molecular function for LRSAM1.
    supporting_text: we developed an arrayed screening strategy based on protein complementation
