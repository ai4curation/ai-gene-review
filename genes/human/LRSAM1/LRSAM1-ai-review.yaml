- id: PMID:25484098
  title: PHF23 (plant homeodomain finger protein 23) negatively regulates cell autophagy
    by promoting ubiquitination and degradation of E3 ligase LRSAM1.
  findings:
  - statement: PHF23 promotes ubiquitination and degradation of LRSAM1, thereby negatively regulating autophagy; LRSAM1 abundance positively regulates autophagy.
    reference_section_type: ABSTRACT
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: Establishes upstream regulation of LRSAM1 stability (by PHF23) controlling autophagy. Abstract-only in cache.
- id: PMID:27615052
  title: A novel missense mutation of CMT2P alters transcription machinery.
  findings:
  - statement: Hu et al. identify a novel Cys694Arg missense mutation altering a conserved
      cysteine in the LRSAM1 RING domain in a family with Charcot-Marie-Tooth type
      2P (CMT2P). The mutation causes axonal degeneration in a CRISPR/Cas9 neuronal
      cell model and perturbs RNA-binding protein pathways.
    supporting_text: The affected members in our family cosegregated with a novel
      missense mutation Cys694Arg that alters a highly conserved cysteine in the RING
      domain. This mutation leads to axonal degeneration in the in vitro neuronal
      cell line.
    reference_section_type: ABSTRACT
