  title: The ER membrane protein complex is a transmembrane domain insertase.
  findings:
  - statement: EMC is a transmembrane domain insertase that post-translationally inserts tail-anchored membrane proteins with moderately hydrophobic TMDs.
    reference_section_type: ABSTRACT
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: Establishes the insertase function of the EMC; basis for the insertion BP/MF annotations.
- id: PMID:29809151
  title: The ER membrane protein complex interacts cotranslationally to enable biogenesis of multipass membrane proteins.
  findings:
  - statement: The EMC engages multipass membrane protein clients cotranslationally, with a particular enrichment for transporters, to enable their biogenesis.
    reference_section_type: ABSTRACT
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: Cotranslational multipass biogenesis role of the EMC (transporter clients); basis for the IMP MF/BP annotations.
- id: PMID:30415835
  title: EMC Is Required to Initiate Accurate Membrane Protein Topogenesis.
  findings:
  - statement: The EMC sets the N-exo topology of the first TMD of GPCRs and other multipass proteins, initiating accurate topogenesis in cooperation with Sec61.
    reference_section_type: ABSTRACT
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: Topogenesis/orientation role of the EMC; GPCR clients; basis for IMP MF/BP annotations.
- id: PMID:31695625
  title: Interaction Between ITM2B and GLUT9 Links Urate Transport to Neurodegenerative Disorders.
  findings:
  - statement: TMEM85/EMC4 interacts with GLUT9/SLC2A9, but ITM2B (not TMEM85) inhibited GLUT9-mediated urate uptake.
    reference_section_type: ABSTRACT
  reference_review:
    relevance: LOW
    correctness: VERIFIED
    review_notes: Source of the EMC4-GLUT9 IPI; the GLUT9 interaction most plausibly reflects EMC4 engaging a multipass transporter client, but TMEM85 itself did not affect urate transport.
- id: PMID:32439656
  title: Structural basis for membrane insertion by the human ER membrane protein complex.
  findings:
  - statement: Cryo-EM structure of the human EMC; substrate insertion occurs via an enclosed hydrophilic vestibule formed by EMC3 and EMC6, with EMC4 resolved as a membrane subunit of the complex.
    reference_section_type: ABSTRACT
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: Structural basis for the EMC; confirms EMC4 as a (non-catalytic) membrane subunit. Abstract-only in cache.
