suggested_questions:
- question: What specific structural role does EMC4 play in EMC assembly and stability, and does loss of EMC4 selectively impair insertion of particular client classes (e.g. multipass transporters)?
- question: Does the EMC4-GLUT9 interaction represent a productive client-engagement event during GLUT9 biogenesis, and is GLUT9 surface expression EMC4-dependent?
suggested_experiments:
- description: Knock out EMC4 in human cells and perform quantitative membrane proteomics with rescue to define the EMC4-dependent client repertoire and distinguish it from clients tolerant of EMC4 loss.
- description: Test EMC4 dependence of GLUT9 and other candidate transporter clients by measuring their folding, ER export and plasma-membrane levels in EMC4-depleted versus rescued cells.
