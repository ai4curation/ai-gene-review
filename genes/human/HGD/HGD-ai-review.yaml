- id: PMID:8782815
  title: The molecular basis of alkaptonuria.
  findings:
  - statement: >-
      HGD (originally HGO) is the alkaptonuria gene; alkaptonuria results from loss of
      homogentisate 1,2-dioxygenase activity, causing accumulation of homogentisic acid,
      an intermediary product of tyrosine and phenylalanine catabolism.
    reference_section_type: ABSTRACT
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Canonical primary reference: cloning of the human HGO/HGD gene and demonstration
      that it is the AKU gene, with biochemical loss-of-function evidence. Cache is
      abstract-only (full_text_available: false) but the abstract directly supports the
      catalytic function and the tyrosine/phenylalanine catabolic role.
- id: PMID:36555443
  title: Untargeted NMR Metabolomics Reveals Alternative Biomarkers and Pathways in Alkaptonuria.
  findings:
  - statement: >-
      Homogentisic acid, the substrate of HGD, is an intermediate of phenylalanine and
      tyrosine degradation; the aromatic ring is opened and oxidized by the hexameric
      homogentisate 1,2-dioxygenase, and reduced HGD catalytic activity causes HGA
      accumulation in alkaptonuria.
    reference_section_type: INTRODUCTION
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Full-text available; supports HGD's role in tyrosine/phenylalanine catabolism and
      its hexameric quaternary structure. Used as the IMP reference for L-tyrosine
      catabolic process.
- id: PMID:10876237
  title: Crystal structure of human homogentisate dioxygenase.
  findings:
  - statement: >-
      X-ray structure of human HGD reveals a homohexamer (dimer of trimers) with one
      catalytic Fe ion per subunit at the active site.
    reference_section_type: ABSTRACT
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Structural basis (UniProt-cited, PDB 1EY2/1EYB) for the Fe(II) cofactor, active-site
      metal-binding residues, and the homohexameric assembly; supports the metal-binding
      and identical-protein-binding interpretations. Not a GOA row but grounds the review.
- id: PMID:21044950
  title: Genome-wide YFP fluorescence complementation screen identifies new regulators for telomere signaling in human cells.
  findings:
  - statement: >-
      High-throughput protein-complementation screen for telomere-signaling regulators
      reported an HGD-TERF1 interaction; a bulk-screen hit rather than a functional
      partner of HGD's catalytic role.
    reference_section_type: ABSTRACT
  reference_review:
    relevance: LOW
    correctness: VERIFIED
    review_notes: >-
      Genome-wide fluorescence-complementation screen (source of the HGD-TERF1 IntAct
      pair). Correctly cited but supports only the uninformative "protein binding" term,
      not a core function.
- id: PMID:25416956
  title: A proteome-scale map of the human interactome network.
  findings:
  - statement: >-
      Systematic binary protein-protein interaction mapping recorded an HGD self
      (identical-protein) interaction, consistent with its known homo-oligomer.
    reference_section_type: ABSTRACT
  reference_review:
    relevance: LOW
    correctness: VERIFIED
    review_notes: >-
      Large-scale (Y2H) interactome screen; source of an HGD-HGD identical-protein-binding
      pair. Correctly cited but low relevance beyond corroborating self-association.
- id: PMID:32296183
  title: A reference map of the human binary protein interactome.
  findings:
  - statement: >-
      HuRI binary interactome map recorded HGD self-interaction (identical protein
      binding) and an HGD-NTAQ1 interaction.
    reference_section_type: ABSTRACT
  reference_review:
    relevance: LOW
    correctness: VERIFIED
    review_notes: >-
      HuRI reference interactome; source of the HGD-HGD (identical protein binding) and
