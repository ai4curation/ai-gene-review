- id: PMID:19056867
  title: Large-scale proteomics and phosphoproteomics of urinary exosomes.
  findings:
  - statement: >-
      HGD was identified among proteins in a large-scale proteomic survey of urinary
      exosomes.
    reference_section_type: ABSTRACT
  reference_review:
