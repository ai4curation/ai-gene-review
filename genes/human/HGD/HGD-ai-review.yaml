id: Q93099
gene_symbol: HGD
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  HGD (homogentisate 1,2-dioxygenase; EC 1.13.11.5) is a cytosolic, iron(II)-dependent
  ring-cleaving dioxygenase that catalyzes the third step of the tyrosine (and, upstream,
  phenylalanine) degradation pathway. It converts homogentisate and molecular oxygen to
  4-maleylacetoacetate, opening the aromatic ring. Each subunit binds one catalytic Fe(II)
  ion (coordinated by His335, Glu341 and His371), and the active enzyme assembles as a
  homohexamer arranged as a dimer of trimers. HGD is expressed most highly in liver,
  kidney, prostate and intestine, consistent with its role in amino-acid catabolism.
  Loss-of-function variants in HGD cause alkaptonuria, an autosomal recessive inborn error
  of metabolism in which homogentisic acid accumulates; its oxidized, polymerized form
  deposits as ochronotic pigment in cartilage and other connective tissues, producing dark
  urine, ochronotic osteoarthropathy/spondyloarthropathy, and later cardiac-valve and
  renal disease.
