- id: Reactome:R-HSA-71164
  title: HGD dioxygenates homogentisate
  findings:
  - statement: >-
      Cytosolic homogentisate 1,2-dioxygenase catalyzes the reaction of homogentisate and
      molecular oxygen to form 4-maleylacetoacetate; HGD is a homohexamer with one Fe(2+)
      ion per monomer as catalytic cofactor.
    reference_section_type: OTHER
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Reactome reaction record establishing the cytosolic localization and the catalyzed
      reaction; source of the cytosol TAS annotation.
