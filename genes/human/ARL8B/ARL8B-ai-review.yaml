id: Q9NVJ2
gene_symbol: ARL8B
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: ARL8B is a conserved Arf-like small GTPase that associates with lysosomal and
  endolysosomal membranes in its active GTP-bound state. Through effector interactions with
  BORC, PLEKHM2/SKIP-kinesin, PLEKHM1/HOPS, VPS41, and RUFY proteins, it coordinates lysosome
  positioning, endolysosomal cargo delivery, and lysosome fusion or exocytosis in contexts
  including autophagic cargo degradation, phagosome maturation, antigen presentation, cytolytic
  granule polarization, plasma membrane repair, and beta-coronavirus egress.
