  title: Defining the membrane proteome of NK cells.
  findings: []
- id: PMID:21802320
  title: Lysosomal trafficking, antigen presentation, and microbial killing are controlled
    by the Arf-like GTPase Arl8b.
  findings:
  - statement: ARL8B is required for lysosomal cargo delivery, CD1 antigen presentation, and
      phagosome-lysosome fusion through VPS41/HOPS recruitment.
    supporting_text: Arl8b silencing resulted in a delay in delivery of fluid phase dextran,
      receptor-internalized low-density lipoprotein (LDL), and CD1 cargo to lysosomes.
- id: PMID:22172677
  title: Arl8 and SKIP act together to link lysosomes to kinesin-1.
  findings:
  - statement: ARL8 recruits SKIP/PLEKHM2 to link lysosomes to kinesin-1 for plus-end-directed
      movement.
    supporting_text: Arl8 binding to SKIP provides a link from lysosomal membranes to plus-end-directed
      motility.
- id: PMID:24088571
  title: Arf-like GTPase Arl8b regulates lytic granule polarization and natural killer cell-mediated
    cytotoxicity.
  findings:
  - statement: ARL8B promotes lytic granule and MTOC polarization required for NK-cell cytotoxicity.
    supporting_text: Arl8b drives the polarization of lytic granules and microtubule-organizing
      centers (MTOCs) toward the immune synapse
- id: PMID:25898167
  title: BORC, a multisubunit complex that regulates lysosome positioning.
  findings:
  - statement: BORC recruits ARL8B to lysosomes to promote microtubule-guided peripheral lysosome
      transport.
    supporting_text: BORC functions to recruit Arl8 to lysosomes, thereby initiating a chain
      of interactions that promotes microtubule-guided transport of lysosomes toward the cell
      periphery.
- id: PMID:27808481
  title: RNF167 targets Arl8B for degradation to regulate lysosome positioning and endocytic
    trafficking.
  findings:
  - statement: RNF167 ubiquitinates ARL8B and thereby regulates ARL8B-dependent lysosome positioning.
    supporting_text: RNF167 ubiquitinates Arl8B at the lysine residue K141 and reduces the
      level of the Arl8B protein.
- id: PMID:28325809
  title: The Rab7 effector PLEKHM1 binds Arl8b to promote cargo traffic to lysosomes.
  findings:
  - statement: PLEKHM1 connects Rab7 and ARL8B to recruit HOPS and promote lysosomal degradation
      of endocytic and autophagic cargo.
    supporting_text: Arl8b binding is crucial for PLEKHM1 to promote lysosomal degradation
      of endocytic and autophagic cargo.
- id: PMID:29592961
  title: Lysosome-Mediated Plasma Membrane Repair Is Dependent on the Small GTPase Arl8b and
    Determines Cell Death Type in Mycobacterium tuberculosis Infection.
  findings:
  - statement: ARL8B-dependent lysosome exocytosis supports plasma membrane repair during
      Mycobacterium infection.
    supporting_text: Arl8b is required for the process of plasma membrane repair in controlling
      the Ca2+-dependent exocytosis of lysosomes
