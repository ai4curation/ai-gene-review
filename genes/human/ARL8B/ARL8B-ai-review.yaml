      as a ubiquitin-protein isopeptide ligase for the hairy basic helix-loop-helix repressor
      protein.
- id: PMID:15331635
  title: Novel small GTPase subfamily capable of associating with tubulin is required for
    chromosome segregation.
  findings:
  - statement: ARL8B/GIE is a small GTPase with tubulin binding and mitotic spindle-midzone
      localization.
    supporting_text: Gie protein has ability to bind to tubulin and localizes with microtubules
      on the spindle mid-zone in late mitosis.
- id: PMID:16537643
  title: An N-terminally acetylated Arf-like GTPase is localised to lysosomes and affects
    their motility.
  findings:
  - statement: ARL8A and ARL8B localize to lysosomes and affect lysosome motility.
    supporting_text: Overexpression of Arl8a or Arl8b results in a microtubule-dependent redistribution
      of lysosomes towards the cell periphery.
- id: PMID:16650381
  title: The Arf-family protein, Arl8b, is involved in the spatial distribution of lysosomes.
  findings:
  - statement: GTP-locked ARL8B localizes to lysosomes and redistributes lysosomes toward
      the cell periphery.
    supporting_text: GTP-restricted mutant Arl8b localizes to lysosomes and causes their redistribution
      toward the cell periphery.
