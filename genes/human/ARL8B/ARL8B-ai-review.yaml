core_functions:
- description: ARL8B is an endolysosomal small GTPase that uses GTP-dependent effector recruitment
    to control lysosome positioning and lysosome-centered cargo delivery. Its best-supported
    core role is coordinating lysosome movement and contact/fusion machinery, including BORC/SKIP-kinesin
    positioning and PLEKHM1/HOPS-dependent delivery of endocytic, phagocytic, and autophagic
    cargo to lysosomes.
  molecular_function:
    id: GO:0003924
    label: GTPase activity
  directly_involved_in:
  - id: GO:0032418
    label: lysosome localization
  - id: GO:1902774
    label: late endosome to lysosome transport
  - id: GO:0061909
    label: autophagosome-lysosome fusion
  locations:
  - id: GO:0005765
    label: lysosomal membrane
  - id: GO:0031902
    label: late endosome membrane
  - id: GO:0031901
    label: early endosome membrane
  supported_by:
  - reference_id: PMID:16537643
    supporting_text: Overexpression of Arl8a or Arl8b results in a microtubule-dependent redistribution
      of lysosomes towards the cell periphery.
  - reference_id: PMID:22172677
    supporting_text: Thus, Arl8 binding to SKIP provides a link from lysosomal membranes to plus-end-directed motility.
  - reference_id: PMID:21802320
    supporting_text: Arl8b silencing resulted in a delay in delivery of fluid phase dextran,
      receptor-internalized low-density lipoprotein (LDL), and CD1 cargo to lysosomes.
  - reference_id: PMID:28325809
    supporting_text: Arl8b binding is crucial for PLEKHM1 to promote lysosomal degradation
      of endocytic and autophagic cargo.
  - reference_id: PMID:25898167
    supporting_text: BORC functions to recruit Arl8 to lysosomes, thereby initiating a chain
      of interactions that promotes microtubule-guided transport of lysosomes toward the cell
      periphery.
proposed_new_terms: []
suggested_questions:
- question: Should ARL8B be annotated directly to GO:0061906 autophagosome localization from
    the PN HOPS-BORC bridging projection, or is the current direct evidence better captured
    by lysosome localization and autophagosome-lysosome fusion?
- question: Can the upstream reference for the GO:0007059 chromosome segregation annotation
    be corrected from PMID:14871887 to the ARL8B/GIE study PMID:15331635?
- question: Which ARL8B effector branch should be considered core for general gene-product
    curation versus cell-type-specific extensions such as NK-cell granule polarization, Mtb
    membrane repair, or beta-coronavirus egress?
suggested_experiments:
- description: Separate ARL8B lysosome-positioning effects from autophagosome-positioning
    effects by live imaging of autophagosomes and lysosomes after ARL8B depletion or effector-selective
    rescue.
  hypothesis: The PN autophagosome-localization signal is mainly an indirect consequence of
    ARL8B-dependent lysosome positioning and HOPS-mediated fusion rather than direct autophagosome
    positioning.
- description: Use effector-binding mutants of ARL8B to compare PLEKHM2/SKIP, PLEKHM1/HOPS,
    VPS41, RUFY1, and RUFY3/4 outputs in the same cellular background.
  hypothesis: Distinct ARL8B effector interfaces partition lysosome positioning, cargo delivery,
    and lysosome exocytosis functions.
