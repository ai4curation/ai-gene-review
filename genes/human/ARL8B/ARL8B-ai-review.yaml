- id: PMID:35314674
  title: RUFY3 and RUFY4 are ARL8 effectors that promote coupling of endolysosomes to dynein-dynactin.
  findings:
  - statement: RUFY3 and RUFY4 are ARL8 effectors that couple endolysosomes to dynein-dynactin
      for retrograde transport.
    supporting_text: RUFY3 and RUFY4 are ARL8 effectors that promote coupling of endolysosomes
      to dynein-dynactin
- id: PMID:36282215
  title: RUFY1 binds Arl8b and mediates endosome-to-TGN CI-M6PR retrieval for cargo sorting
    to lysosomes.
  findings:
  - statement: ARL8B regulates RUFY1 endosomal localization and CI-M6PR retrieval from endosomes
      to the TGN.
    supporting_text: RUFY1 depletion led to a delay in CI-M6PR retrieval from endosomes to
      the TGN, resulting in impaired delivery of newly synthesized hydrolases to lysosomes.
