id: Q9NY59
gene_symbol: SMPD3
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  SMPD3 encodes neutral sphingomyelinase 2 (nSMase2, sphingomyelin phosphodiesterase 3),
  the major Mg2+-dependent, neutral-pH cellular sphingomyelinase. It catalyzes hydrolysis
  of sphingomyelin to ceramide and phosphocholine (EC 3.1.4.12), generating the
  bioactive sphingolipid second messenger ceramide in response to stresses such as TNF
  and oxidative stress. In vitro it also hydrolyzes related phosphocholine-containing
  lipids including sphingosylphosphocholine and monoacyl/monoalkyl glycerophosphocholines.
  The enzyme is a palmitoylated, lipid-anchored membrane protein of the Golgi apparatus
  membrane and the plasma membrane, with two intramembrane hairpin helices and a large
  cytoplasm-facing catalytic domain; its activity and membrane localization are modulated
  by binding of anionic phospholipids such as phosphatidylserine and phosphatidic acid.
  Through ceramide production nSMase2 acts as a growth suppressor coupled to confluence-
  induced G0/G1 cell-cycle arrest, contributes to TNF receptor 1 signaling, and drives
  ceramide-dependent formation of exosomes/extracellular vesicles. It is predominantly
  expressed in brain and is required for normal postnatal skeletal development and bone/
  dentin mineralization; loss-of-function underlies skeletal dysplasia phenotypes.
