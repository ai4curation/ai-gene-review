suggested_questions:
- question: >-
    Which subcellular pool of nSMase2 (Golgi vs plasma membrane) generates the ceramide
    responsible for exosome biogenesis versus TNF-R1/apoptotic signaling in human cells?
- question: >-
    Is the phosphatidylserine/phosphatidic-acid binding that regulates human nSMase2
    activity mediated by a discrete lipid-binding region, and how does it couple to
    membrane targeting?
suggested_experiments:
- description: >-
    Direct assay of recombinant human nSMase2 with defined sphingomyelin species to
    confirm the Mg2+-dependent ceramide-generating activity and acyl-chain preference in a
