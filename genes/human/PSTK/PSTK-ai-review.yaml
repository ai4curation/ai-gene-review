id: Q8IV42
gene_symbol: PSTK
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  PSTK is O-phosphoseryl-tRNA(Sec) kinase (also called L-seryl-tRNA(Sec) kinase or
  phosphoseryl-tRNA[Ser]Sec kinase; EC 2.7.1.164), an ATP-dependent tRNA kinase that acts
  in the biosynthesis of selenocysteine on its tRNA. It specifically phosphorylates the
  seryl moiety of L-seryl-tRNA(Sec), using ATP and Mg(2+), to produce O-phosphoseryl-tRNA(Sec)
  plus ADP. This O-phosphoseryl-tRNA(Sec) is the activated intermediate that the enzyme
  SEPSECS subsequently converts, using selenophosphate, to selenocysteyl-tRNA(Sec), the
  charged tRNA that decodes in-frame UGA codons as selenocysteine during translation of
  selenoproteins. PSTK is highly substrate-specific, acting on tRNA(Sec) and not on other
  tRNAs, and belongs to the KTI12/PSTK-related family with a P-loop nucleotide-binding fold.
  The enzyme is conserved across eukaryotes and archaea that possess the selenocysteine
  incorporation machinery, and is dispensable in organisms that lack selenoproteins.
