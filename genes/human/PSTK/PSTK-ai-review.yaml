existing_annotations:
- term:
    id: GO:0000049
    label: tRNA binding
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: enables
  review:
    summary: >-
      tRNA binding is a well-supported molecular function for PSTK: its catalytic substrate
      is L-seryl-tRNA(Sec), so it must recognize and bind tRNA(Sec). This IBA call is
      consistent with the enzymatic role and is retained as a supporting (non-core, but
      accepted) molecular function that underlies the core kinase activity.
    action: ACCEPT
    reason: >-
      PSTK acts on a tRNA substrate; UniProt states it phosphorylates seryl-tRNA(Sec),
      which requires tRNA binding. The phylogenetic (IBA) inference is biologically sound.
    supported_by:
    - reference_id: file:human/PSTK/PSTK-uniprot.txt
      supporting_text: "Specifically phosphorylates seryl-tRNA(Sec) to O-"
- term:
    id: GO:0016301
    label: kinase activity
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: enables
  review:
    summary: >-
      Kinase activity is correct but far more general than what is known for PSTK. The
      specific molecular function is L-seryl-tRNA(Sec) kinase activity (GO:0043915), which
      is a direct child of kinase activity (GO:0016301). The annotation should be refined
      to the specific term.
    action: MODIFY
    reason: >-
      GO:0016301 is an over-general parent; the specific catalytic activity (ATP-dependent
      phosphorylation of the seryl moiety of L-seryl-tRNA(Sec)) is captured by GO:0043915,
      which is already annotated. Replace with the specific child term.
    proposed_replacement_terms:
    - id: GO:0043915
      label: L-seryl-tRNA(Sec) kinase activity
    propagation_review:
      root_cause: TERM_SCOPING_PROBLEM
      failure_modes:
      - GRANULARITY_MISMATCH
    supported_by:
    - reference_id: file:human/PSTK/PSTK-uniprot.txt
      supporting_text: "Reaction=L-seryl-tRNA(Sec) + ATP = O-phospho-L-seryl-tRNA(Sec) + ADP;"
- term:
    id: GO:0043915
    label: L-seryl-tRNA(Sec) kinase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: >-
      This is the correct, specific core molecular function of PSTK. The IEA is derived from
      the RHEA reaction (RHEA:25037) and EC number 2.7.1.164, both of which match the UniProt
      catalytic activity exactly (ATP + L-seryl-tRNA(Sec) = ADP + O-phospho-L-seryl-tRNA(Sec)).
    action: ACCEPT
    reason: >-
      The EC/RHEA-derived term is the precise enzymatic activity of PSTK and matches the
      curated UniProt reaction and family assignment.
    supported_by:
    - reference_id: file:human/PSTK/PSTK-uniprot.txt
      supporting_text: "Reaction=L-seryl-tRNA(Sec) + ATP = O-phospho-L-seryl-tRNA(Sec) + ADP;"
    - reference_id: file:human/PSTK/PSTK-uniprot.txt
      supporting_text: "Belongs to the L-seryl-tRNA(Sec) kinase family."
- term:
    id: GO:0043915
    label: L-seryl-tRNA(Sec) kinase activity
  evidence_type: ISS
  original_reference_id: GO_REF:0000024
  qualifier: enables
  review:
    summary: >-
      Same specific core molecular function as the IEA annotation, here inferred by sequence
      similarity (ISS) from the experimentally characterized mouse ortholog (UniProtKB:Q8BP74).
      This is a valid, converging line of evidence for the L-seryl-tRNA(Sec) kinase activity.
    action: ACCEPT
    reason: >-
      ISS transfer from the mouse ortholog Q8BP74 (the reference UniProt entry for the
      catalytic activity) supports the same specific enzymatic function; consistent with the
      IEA/EC and IBA evidence. Duplicate of the IEA term but from an independent method.
    supported_by:
    - reference_id: file:human/PSTK/PSTK-uniprot.txt
      supporting_text: "phosphoseryl-tRNA(Sec), an activated intermediate for selenocysteine"
- term:
    id: GO:0001717
    label: conversion of seryl-tRNAsec to selenocys-tRNAsec
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: involved_in
  review:
    summary: >-
      Proposed biological-process annotation, not present in the seeded GOA set. PSTK
      catalyzes the phosphorylation step (Ser-tRNA(Sec) -> O-phosphoseryl-tRNA(Sec)) that is
      part of the tRNA-based conversion of serine to selenocysteine; this BP directly reflects
      the pathway role captured by UniProt (aminoacyl-tRNA biosynthesis; selenocysteinyl-tRNA(Sec)
      biosynthesis). This is the precise, non-obsolete BP term for the process.
    action: NEW
    reason: >-
      Adds the specific biological process for PSTK's pathway role, consistent with the
      curated UniProt PATHWAY line and complementing the molecular-function annotations.
    supported_by:
    - reference_id: file:human/PSTK/PSTK-uniprot.txt
      supporting_text: "selenocysteinyl-tRNA(Sec) from L-seryl-tRNA(Sec)"
    - reference_id: file:human/PSTK/PSTK-uniprot.txt
      supporting_text: "phosphoseryl-tRNA(Sec), an activated intermediate for selenocysteine"
core_functions:
- description: >-
    O-phosphoseryl-tRNA(Sec) (L-seryl-tRNA(Sec)) kinase: ATP- and Mg(2+)-dependent
    phosphorylation of the seryl moiety of L-seryl-tRNA(Sec) to O-phosphoseryl-tRNA(Sec),
    the activated intermediate of the selenocysteine tRNA-charging pathway. PSTK binds
    tRNA(Sec) and ATP to carry out this reaction.
