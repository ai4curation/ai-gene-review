- term:
    id: GO:0008137
    label: NADH dehydrogenase (ubiquinone) activity
  evidence_type: NAS
  original_reference_id: PMID:9878551
  qualifier: enables
  review:
    summary: NAS molecular-function annotation asserting NDUFA10 enables NADH:ubiquinone oxidoreductase activity. This is the catalytic activity of the whole complex; NDUFA10 is explicitly non-catalytic (an accessory subunit with a degenerate dNK/pseudokinase fold), so an "enables" MF on this subunit over-attributes complex-level catalysis to a structural component.
    action: MARK_AS_OVER_ANNOTATED
    reason: UniProt states the subunit is "believed not to be involved in catalysis"; catalytic NADH dehydrogenase activity is a property of the assembled complex (core ND/NDUFS/NDUFV subunits). At most NDUFA10 contributes_to this activity. This is not a kinase misannotation, but assigning the holoenzyme MF via enables to an accessory subunit is an over-annotation. Captured instead in core_functions as contributes_to GO:0008137 with molecular_function GO:0005198.
    supported_by:
    - reference_id: file:human/NDUFA10/NDUFA10-uniprot.txt
      supporting_text: believed not to be involved in catalysis
