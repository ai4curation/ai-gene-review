gene_symbol: NDUFA10
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: NDUFA10 is a nuclear-encoded accessory (supernumerary) subunit of the membrane arm of mitochondrial respiratory chain Complex I (NADH:ubiquinone oxidoreductase). Synthesized with an N-terminal mitochondrial transit peptide and imported into mitochondria, it is a stable structural component of the mature 45-subunit holoenzyme, residing in the hydrophobic (membrane) protein fraction at the mitochondrial inner membrane. It adopts a deoxyribonucleoside kinase (dNK) / P-loop NTPase fold but is catalytically inactive in this role (a pseudokinase); it is not itself involved in electron transfer or proton pumping. Rather, it contributes to the assembly, stability and function of Complex I, which oxidizes NADH and reduces ubiquinone while translocating protons across the inner membrane to drive oxidative phosphorylation. Biallelic loss-of-function variants cause mitochondrial complex I deficiency (nuclear type 22), including Leigh syndrome, reflecting its structural/assembly requirement rather than a catalytic one.
