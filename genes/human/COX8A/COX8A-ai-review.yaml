- term:
    id: GO:0005198
    label: structural molecule activity
  evidence_type: IDA
  original_reference_id: PMID:30030519
  qualifier: enables
  review:
    summary: >-
      Proposed molecular function for COX8A as a non-catalytic supernumerary
      subunit: it contributes to the structural integrity of Complex IV rather
      than performing catalysis. Supported by the cryo-EM structure resolving
      COX8A as one of the 14 subunits of the intact human cytochrome c oxidase.
    action: NEW
    reason: >-
      This replaces the over-annotated cytochrome-c oxidase activity (GO:0004129)
      with a molecular function appropriate for a structural membrane subunit.
      COX8A is embedded in Complex IV via a single transmembrane helix and adds no
      catalytic residues, so structural molecule activity best captures its role.
    supported_by:
    - reference_id: PMID:30030519
      supporting_text: "the intact complex-IV is a monomer containing 14 subunits"
    - reference_id: file:human/COX8A/COX8A-uniprot.txt
      supporting_text: "11 supernumerary subunits"
