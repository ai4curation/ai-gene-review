- term:
    id: GO:0004129
    label: cytochrome-c oxidase activity
  evidence_type: TAS
  original_reference_id: PMID:2543673
  qualifier: enables
  review:
    summary: >-
      Traceable-author-statement assignment of cytochrome-c oxidase activity to
      COX8A. However, COX8A is a non-catalytic, nuclear-encoded supernumerary
      subunit; the catalytic redox chemistry is performed by the mtDNA-encoded core
      subunits MT-CO1 and MT-CO2. The cited paper (PMID:2543673) is a gene-mapping
      and cDNA-characterization study, not a demonstration that COX8A itself
      catalyzes oxidase activity.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      Attributing the enzymatic cytochrome-c oxidase activity directly to a
      structural subunit over-states its molecular function. The activity is a
      property of the assembled complex driven by the catalytic core, not of COX8A.
      A more accurate molecular function is structural molecule activity
      (GO:0005198) contributing to the complex's cytochrome-c oxidase activity. Not
      removed, because the whole-complex activity is real and the evidence line is
      author-attested.
    proposed_replacement_terms:
    - id: GO:0005198
      label: structural molecule activity
    supported_by:
    - reference_id: file:human/COX8A/COX8A-uniprot.txt
      supporting_text: "the active site in subunit 1, a binuclear center (BNC) formed by"
    - reference_id: PMID:2543673
      supporting_text: "Subunit VIII of mammalian cytochrome c oxidase"
