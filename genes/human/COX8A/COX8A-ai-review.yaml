id: P10176
gene_symbol: COX8A
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  COX8A encodes cytochrome c oxidase subunit 8A, a small (69-aa precursor,
  44-aa mature) nuclear-encoded, single-pass structural subunit of mitochondrial
  respiratory chain Complex IV (cytochrome c oxidase, the terminal enzyme of the
  electron transport chain). It is the ubiquitously expressed COX8 isoform and,
  in primates, the only COX VIII form. Complex IV has a catalytic core of three
  mitochondrially encoded subunits (MT-CO1, MT-CO2, MT-CO3) that carry the redox
  centers (heme a/a3, Cu_A, Cu_B) surrounded by eleven nuclear-encoded
  supernumerary subunits, of which COX8A is the smallest. COX8A is non-catalytic:
  it does not itself perform cytochrome c oxidase chemistry but contributes to the
  structural integrity, assembly, and stability of the complex, which reduces
  molecular oxygen to water using electrons from cytochrome c and helps generate
  the transmembrane proton-motive force that drives ATP synthesis. The protein is
  anchored in the mitochondrial inner membrane by a single transmembrane helix.
  Loss-of-function variants cause mitochondrial complex IV deficiency, nuclear
  type 15 (MC4DN15), an autosomal recessive Leigh-like syndrome with epilepsy.
