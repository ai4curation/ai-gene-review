suggested_questions:
- question: >-
    Does COX8A incorporation contribute specifically to Complex IV assembly
    kinetics or stability, beyond its structural presence in the mature complex?
suggested_experiments:
- description: >-
    Quantitative assembly assays (BN-PAGE / complexome profiling) in COX8A-null
    versus wild-type cells to determine at which Complex IV assembly intermediate
    COX8A loss stalls, correlating with the reduced Complex IV activity seen in
    MC4DN15 patients.
