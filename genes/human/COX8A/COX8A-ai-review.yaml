  evidence_type: IEA
  original_reference_id: GO_REF:0000108
  qualifier: involved_in
  review:
    summary: >-
      Logical inference chained from the cytochrome-c oxidase molecular function
      (GO:0004129) to proton transmembrane transport. Complex IV does pump protons,
      but this activity resides in the catalytic mtDNA-encoded core (MT-CO1),
      not in the non-catalytic supernumerary subunit COX8A.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      This process is inferred from a molecular-function assignment (cytochrome-c
      oxidase activity) that is itself an over-annotation for this structural
      subunit. Proton pumping is performed by the catalytic core, so attributing
      proton transmembrane transport directly to COX8A over-states its role. It is
      not wrong at the whole-complex level but is not a core function of COX8A.
