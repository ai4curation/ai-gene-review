id: P36871
gene_symbol: PGM1
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  Phosphoglucomutase-1 (PGM1; EC 5.4.2.2) is the major human phosphoglucomutase,
  a cytosolic Mg2+-dependent enzyme that catalyzes the reversible interconversion of
  alpha-D-glucose 1-phosphate and alpha-D-glucose 6-phosphate. Catalysis proceeds via
  an alpha-D-glucose 1,6-bisphosphate intermediate and a catalytic phosphoserine (Ser117),
  with the bound Mg2+ ion coordinated by Ser117 and three active-site aspartates. PGM1
  sits at the junction of glycogen metabolism and glycolysis/gluconeogenesis. During
  glycogenolysis it converts the glucose-1-phosphate released by glycogen phosphorylase
  into glucose-6-phosphate for glycolysis (or, in liver after glucose-6-phosphatase,
  for blood glucose), and it runs in reverse to supply glucose-1-phosphate for glycogen
  synthesis. Its products also feed the nucleotide-sugar (UDP-glucose/UDP-galactose,
  Leloir), galactose, and pentose-phosphate pathways. The enzyme is a monomer of 562
  residues belonging to the alpha-D-phosphohexomutase superfamily. Loss-of-function
  variants cause PGM1 deficiency (PGM1-CDG; congenital disorder of glycosylation type
  It / glycogen storage disease type XIV), a mixed glycogenosis and glycosylation
  disorder featuring cleft palate, hepatopathy, hypoglycemia, dilated cardiomyopathy,
  exercise intolerance, and abnormal transferrin glycosylation, and it is notably
  responsive to galactose supplementation.
