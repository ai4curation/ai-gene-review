    missense mutants associated with hereditary phosphoglucomutase 1 deficiency.
  findings: []
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: In vitro biochemical characterization of WT and disease-variant
      PGM1, confirming catalytic activity/kinetics and its central role in glucose
      metabolism.
- id: PMID:26972339
  title: Induced Structural Disorder as a Molecular Mechanism for Enzyme Dysfunction
    in Phosphoglucomutase 1 Deficiency.
  findings: []
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: First WT and variant human PGM1 crystal structures; documents Mg2+
      coordination, phosphoserine (Ser117) catalytic mechanism, monomeric state, and
      reversible G1P/G6P interconversion. Full text available and verified.
- id: PMID:28882528
  title: Impaired glycogen breakdown and synthesis in phosphoglucomutase 1 deficiency.
  findings: []
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: Shows PGM1 deficiency blocks muscle glycogenolysis (McArdle-like
      second wind) and may limit glycogen synthesis; supports the glycogen
      catabolic-process role.
- id: PMID:30982613
  title: The Metabolic Map into the Pathomechanism and Treatment of PGM1-CDG.
  findings: []
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: Defines PGM1 as the enzyme interconverting glucose-6-P and
      glucose-1-P; establishes galactose-responsive rewiring of nucleotide-sugar
      (UDP-glucose/UDP-galactose, Leloir) metabolism in PGM1-CDG.
- id: PMID:8257433
  title: 'Phosphoglucomutase 1: a gene with two promoters and a duplicated first exon.'
  findings: []
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: PGM1 gene-structure study; notes its central role in glycolysis and
      gluconeogenesis. Supports enzyme identity and metabolic context.
