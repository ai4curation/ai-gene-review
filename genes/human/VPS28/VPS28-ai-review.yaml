  - GO extracellular vesicle editors
suggested_experiments:
- experiment_type: VPS28 separation-of-function autophagosome closure assay
  hypothesis: The VPS28 helical interface is required for ESCRT-I accumulation and phagophore closure without 
    abolishing assembly of individual ESCRT-I tetramers.
  description: Use endogenous VPS28 depletion/rescue with wild-type and helical-interface mutants, then 
    measure HT-LC3 closure, ESCRT-I/ESCRT-III recruitment, and EGFR MVB sorting side by side.
- experiment_type: direct ubiquitin-binding assay for purified VPS28
  hypothesis: VPS28 does not independently bind ubiquitin; ubiquitin recognition by VPS28-containing ESCRT-I 
    depends on TSG101 or other subunits.
  description: Compare purified VPS28, TSG101, and reconstituted ESCRT-I subcomplexes in quantitative 
    ubiquitin-binding assays with matched positive and negative controls.
