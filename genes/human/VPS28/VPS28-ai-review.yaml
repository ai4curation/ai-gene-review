id: Q9UK41
gene_symbol: VPS28
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: VPS28 is a conserved core subunit of human ESCRT-I. It pairs with TSG101, a VPS37 paralog, and an
  MVB12/UBAP-family subunit to organize ESCRT-I for ubiquitin-dependent endosomal cargo sorting, 
  multivesicular body assembly, reverse-topology membrane remodeling, and PN-relevant phagophore/autophagosome
  closure. Unlike TSG101, VPS28 is not well supported as a direct ubiquitin-binding protein; its core role is 
  ESCRT-I structural/scaffold assembly and membrane-site recruitment.
