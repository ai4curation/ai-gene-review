core_functions:
  - description: 'Glucagon: Counter-regulatory hormone that raises blood glucose by
      stimulating hepatic gluconeogenesis and glycogenolysis via GCGR/Gs/cAMP/PKA
      signaling in the liver. Secreted from pancreatic alpha cells in response to
      hypoglycemia.'
    molecular_function:
      id: GO:0005179
      label: hormone activity
    directly_involved_in:
      - id: GO:0045722
        label: positive regulation of gluconeogenesis
      - id: GO:0042593
        label: glucose homeostasis
      - id: GO:0007189
        label: adenylate cyclase-activating G protein-coupled receptor signaling pathway
    locations:
      - id: GO:0005576
        label: extracellular region
      - id: GO:0034774
        label: secretory granule lumen
    supported_by:
      - reference_id: file:human/GCG/GCG-deep-research-falcon.md
        supporting_text: Glucagon is described as a principal glucose-elevating hormone
          secreted by pancreatic alpha-cells that acts primarily on the liver to increase
          hepatic glucose production by stimulating glycogenolysis and gluconeogenesis
      - reference_id: file:human/GCG/GCG-uniprot.txt
        supporting_text: Regulates blood glucose by increasing gluconeogenesis and
          decreasing glycolysis. A counterregulatory hormone of insulin
  - description: 'GLP-1: Potent incretin hormone that stimulates glucose-dependent
      insulin secretion from pancreatic beta cells. Also acts centrally as a neuropeptide
      to suppress appetite and feeding. Secreted from intestinal L cells and brainstem
      neurons. Target of semaglutide/liraglutide therapeutics.'
    molecular_function:
      id: GO:0005179
      label: hormone activity
    directly_involved_in:
