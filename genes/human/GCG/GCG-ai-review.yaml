        and gluconeogenesis. GLP-1 promotes glucose-dependent insulin secretion.
        Both peptides are central to glucose homeostasis.

        '
      action: ACCEPT
      reason: 'The IBA annotation is phylogenetically sound and well-supported by
        the established role of glucagon in hepatic glucose production and GLP-1
        in insulin secretion. UniProt states glucagon "Regulates blood glucose by
        increasing gluconeogenesis and decreasing glycolysis" and GLP-1 is a "Potent
        stimulator of glucose-dependent insulin release."

        '
      supported_by:
        - reference_id: file:human/GCG/GCG-deep-research-falcon.md
          supporting_text: Glucagon is described as a principal glucose-elevating
