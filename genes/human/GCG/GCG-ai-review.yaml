        label: positive regulation of insulin secretion involved in cellular response
          to glucose stimulus
      - id: GO:0007631
        label: feeding behavior
      - id: GO:0032099
        label: negative regulation of appetite
      - id: GO:0042593
        label: glucose homeostasis
    locations:
      - id: GO:0005576
