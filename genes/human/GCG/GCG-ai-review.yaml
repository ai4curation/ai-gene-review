id: P01275
gene_symbol: GCG
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: 'GCG encodes proglucagon, a 180 amino acid precursor polypeptide (including
  a 20 amino acid signal peptide) that is proteolytically processed in a tissue-specific
  manner to produce multiple bioactive peptide hormones. In pancreatic alpha cells,
  PCSK2 (PC2) cleaves proglucagon primarily to produce glucagon, the principal glucose-elevating
  hormone that acts on GCGR in the liver to stimulate glycogenolysis and gluconeogenesis
  via Gs/cAMP/PKA signaling. In intestinal L cells and brainstem neurons, PCSK1 (PC1/3)
  processes proglucagon to yield GLP-1 (glucagon-like peptide 1, a potent incretin
  that stimulates glucose-dependent insulin secretion and suppresses appetite), GLP-2
  (an intestinotropic peptide promoting mucosal growth and nutrient absorption), oxyntomodulin
  (which reduces food intake and inhibits gastric emptying), and glicentin (which may
  modulate gastric acid secretion and intestinal mucosal growth). All mature peptide
  products are secreted hormones that function as ligands for class B GPCRs. GLP-1
  receptor agonism is the basis for the semaglutide/liraglutide class of therapeutics
  for type 2 diabetes and obesity; GLP-2 analogs (teduglutide) are used for short
  bowel syndrome.

  '
