  qualifier: is_active_in
  review:
    summary: >-
      IBA localization of G6PC3 to the endoplasmic reticulum. Correct but a
      generic parent of the more precise ER membrane assignment.
    action: ACCEPT
    reason: >-
      G6PC3 is an ER-resident enzyme with its active site facing the ER lumen;
      ER localization is well supported experimentally, so the phylogenetic
      call is sound. The more specific term is endoplasmic reticulum membrane
      (GO:0005789), captured elsewhere and used in core_functions.
    supported_by:
