id: Q9BUM1
gene_symbol: G6PC3
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  G6PC3 encodes the ubiquitously expressed catalytic subunit 3 of
  glucose-6-phosphatase (glucose-6-phosphatase-beta / G6Pase-beta; EC 3.1.3.9),
  a multi-pass integral membrane protein of the endoplasmic reticulum and a
  paralog of the liver/kidney/intestine-restricted G6PC1. It hydrolyses
  glucose-6-phosphate to glucose and inorganic phosphate (and the metabolite
  1,5-anhydroglucitol-6-phosphate) with its active site facing the ER lumen,
  forming a covalent phosphohistidine intermediate at His167. It functions
  together with the ER glucose-6-phosphate transporter SLC37A4 (G6PT) to
  support intracellular glucose production and energy homeostasis, and is ~8x
  less active than G6Pase-alpha. Loss of G6PC3 causes severe congenital
  neutropenia type 4 (SCN4 / Dursun syndrome), in which neutrophils show
  endoplasmic-reticulum stress and enhanced apoptosis, accompanied by congenital
  cardiac and urogenital malformations and a prominent superficial venous
  pattern; unlike G6PC1 deficiency it is not a classic hepatic glycogen storage
  disease.
