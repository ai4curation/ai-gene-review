- term:
    id: GO:0004346
    label: glucose-6-phosphatase activity
  evidence_type: IMP
  original_reference_id: PMID:25492228
  qualifier: enables
  review:
    summary: >-
      IMP for glucose-6-phosphatase activity: functional analysis of SCN4
      disease mutations shows they abolish or reduce G6P hydrolase activity.
    action: ACCEPT
    reason: >-
      Mutational functional analysis in a sensitive recombinant expression
      assay: 14 of 16 SCN4 missense mutants completely abolish G6P hydrolytic
      activity (S139I and R189Q retain ~49%/45%), directly establishing that
      G6PC3 encodes glucose-6-phosphatase activity and that loss of this activity
      is pathogenic. Core molecular function.
    supported_by:
    - reference_id: PMID:25492228
      supporting_text: >-
        Fourteen missense mutations completely abolish G6Pase-β enzymatic activity
        while the p.S139I and p.R189Q mutations retain 49% and 45%, respectively of
        wild type G6Pase-β activity.
