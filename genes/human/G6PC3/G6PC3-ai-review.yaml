      supporting_text: >-
        G6Pase-β is an enzyme embedded in the endoplasmic reticulum membrane
        that catalyzes the hydrolysis of glucose-6-phosphate (G6P) to glucose
        and phosphate.
- term:
    id: GO:0006094
    label: gluconeogenesis
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: involved_in
  review:
    summary: >-
      IBA involvement in gluconeogenesis, inherited from the glucose-6-phosphatase
      family (including hepatic orthologs).
    action: KEEP_AS_NON_CORE
    reason: >-
      Gluconeogenesis is a family/pathway-level assignment (the terminal
      dephosphorylation step is shared with the liver enzyme G6PC1). G6PC3 is
      ubiquitously expressed and its deficiency causes neutropenia rather than
      fasting hypoglycemia/glycogen storage disease, so systemic gluconeogenesis
      is not its core physiological role. Its ubiquitous complex with SLC37A4/G6PT
      supports local intracellular glucose production and energy homeostasis
      rather than hepatic glucose output. Retained as a valid but non-core process.
    supported_by:
    - reference_id: PMID:25492228
      supporting_text: >-
        the ubiquitous G6Pase-β/G6PT complex maintains energy homeostasis and
        functionality in neutrophils and macrophages
