core_functions:
- description: >-
    Glucose-6-phosphatase activity: hydrolysis of glucose-6-phosphate to glucose
    and inorganic phosphate at the luminal face of the endoplasmic reticulum
    membrane, via a covalent phosphohistidine (His167) intermediate, contributing
    to glucose 6-phosphate metabolism and intracellular glucose production in
    concert with the ER G6P transporter SLC37A4.
  molecular_function:
    id: GO:0004346
    label: glucose-6-phosphatase activity
  directly_involved_in:
  - id: GO:0051156
    label: glucose 6-phosphate metabolic process
  locations:
  - id: GO:0005789
    label: endoplasmic reticulum membrane
  supported_by:
  - reference_id: PMID:14718531
    supporting_text: >-
      we demonstrated that the phosphate acceptor in Glc-6-Pase-beta
      is His(167) and that it lies inside the ER lumen with the active site
      residues, Arg(79) and His(114).
  - reference_id: PMID:25492228
    supporting_text: >-
      Both phosphatases catalyze the hydrolysis of glucose-6-phosphate (G6P)
      to glucose and phosphate and both are key enzymes for intracellular
      glucose production.
