gene_symbol: NDUFA13
product_type: PROTEIN
status: IN_PROGRESS
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  NDUFA13 (also known as GRIM-19 and Complex I-B16.6) is a 144-residue, ~16.7 kDa
  nuclear-encoded accessory ("supernumerary") subunit of the peripheral/matrix arm of
  mitochondrial Complex I (NADH:ubiquinone oxidoreductase, the first enzyme of the
  respiratory electron transport chain). It is a genuine, stable structural component
  of the mature holoenzyme but does not itself catalyze NADH oxidation, quinone
  reduction, or proton translocation; instead it stabilizes the complex and is
  strictly required for its assembly and electron-transfer activity, so its loss
  causes Complex I instability and mitochondrial disease. NDUFA13 anchors to the
  inner mitochondrial membrane on the matrix side via a single transmembrane helix.
  In addition to this structural role, NDUFA13/GRIM-19 has a well-documented
  moonlighting function in cell-death regulation: it was originally isolated as a
  mediator of interferon-beta/retinoic-acid-induced tumor-cell death and is a specific
  negative regulator of the transcription factor STAT3, binding the STAT3
  transactivation domain and repressing STAT3-dependent transcription. It also
  associates with the mitochondrial serine protease HtrA2/OMI to promote apoptosis,
  acts as a chaperone that recruits STAT3 into mitochondria and integrates it into
  Complex I, and interacts with NOD2/CARD15 in innate immune signaling. A small pool
  localizes to the nucleus and cytoplasm, particularly upon interferon/retinoic-acid
  treatment.
