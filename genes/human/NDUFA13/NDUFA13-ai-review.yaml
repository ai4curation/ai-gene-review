core_functions:
- description: >-
    NDUFA13 (GRIM-19) is a non-catalytic accessory (supernumerary) structural subunit
    of the peripheral/matrix arm of mitochondrial Complex I, anchored to the inner
    mitochondrial membrane on the matrix side by a single transmembrane helix. It does
    not itself catalyze NADH oxidation, quinone reduction, or proton translocation;
    it provides a structural molecule activity that stabilizes the mature holoenzyme
    and is strictly required for Complex I assembly and electron-transfer activity,
    thereby contributing to the complex-level NADH:ubiquinone oxidoreductase activity
    that transfers electrons from NADH to ubiquinone.
  molecular_function:
    id: GO:0005198
    label: structural molecule activity
  contributes_to_molecular_function:
