- description: >-
    Moonlighting cell-death / STAT3-regulatory function: NDUFA13 was originally
    discovered as GRIM-19, a mediator of interferon-beta/retinoic-acid-induced
    tumor-cell death. A nuclear/cytoplasmic pool acts as a specific negative regulator
    of STAT3, binding the STAT3 transactivation domain (Ser727-dependent) and
    repressing STAT3-dependent transcription without blocking STAT3 phosphorylation or
    DNA binding. This is a genuine, experimentally supported secondary function that is
    distinct from, and non-core relative to, the structural Complex I role.
  molecular_function:
