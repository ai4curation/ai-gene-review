  review:
    summary: ComplexPortal/NAS assignment that FBXL6, as an SCF substrate receptor, participates in SCF-dependent proteasomal degradation. This is the expected core biological process for an F-box protein, though FBXL6-specific substrates are not yet established experimentally.
    action: ACCEPT
    reason: Consistent with FBXL6 being a substrate-recognition subunit of an SCF E3 ligase; SCF-dependent degradation is the canonical core process for F-box/LRR proteins, supported by family-level evidence and the documented SKP1/CUL1 association.
    supported_by:
    - reference_id: file:human/FBXL6/FBXL6-uniprot.txt
