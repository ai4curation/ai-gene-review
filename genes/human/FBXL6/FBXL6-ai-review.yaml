description: >-
  FBXL6 (F-box/LRR-repeat protein 6, FBL6) is a member of the FBXL subfamily of
  F-box proteins, characterized by an N-terminal F-box domain followed by a
  C-terminal leucine-rich repeat (LRR) region. Like other FBXL proteins, it is
  predicted to function as the substrate-recognition subunit of a Cullin-RING
  ligase, specifically an SCF (SKP1-CUL1-F-box) E3 ubiquitin ligase complex. In
  this architecture the F-box domain docks the protein onto the SKP1 adaptor
  (and through it CUL1 and the catalytic RING subunit RBX1), while the LRR
  region is presumed to bind specific substrate proteins, targeting them for
  ubiquitination and proteasomal degradation. FBXL6 is broadly but weakly
  expressed across tissues. Despite being one of the originally described human
  F-box proteins, FBXL6 remains poorly characterized: its physiological
  substrates and biological roles have not been firmly established
  experimentally, and most functional inference rests on family/domain
  homology and high-throughput interaction data.
