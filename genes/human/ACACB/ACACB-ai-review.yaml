core_functions:
- description: >-
    Acetyl-CoA carboxylase activity: ATP- and biotin-dependent carboxylation of
    acetyl-CoA to malonyl-CoA (EC 6.4.1.2), the first committed step of fatty-acid
    metabolism, established directly for the human ACC2 protein. At the mitochondrial
    outer membrane the malonyl-CoA product allosterically inhibits CPT1, so this
    activity underlies both malonyl-CoA biosynthesis and negative regulation of
    fatty-acid beta-oxidation (the role distinguishing ACC2 from cytosolic ACC1).
  molecular_function:
    id: GO:0003989
    label: acetyl-CoA carboxylase activity
  directly_involved_in:
