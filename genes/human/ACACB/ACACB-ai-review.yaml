id: O00763
gene_symbol: ACACB
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  ACACB (acetyl-CoA carboxylase 2; ACC2, ACC-beta) is a large multidomain,
  biotin-dependent carboxylase that catalyzes the ATP-dependent carboxylation
  of acetyl-CoA to malonyl-CoA (EC 6.4.1.2), the first committed step of
  fatty-acid metabolism. It is one of the two mammalian acetyl-CoA carboxylases;
  it shares the same catalytic reaction with the cytosolic paralog ACACA/ACC1
  but is distinguished by a hydrophobic N-terminal targeting sequence that
  anchors it to the mitochondrial outer membrane. The reaction proceeds in two
  half-reactions: the biotin carboxylase (BC) domain ATP-dependently carboxylates
  a biotin cofactor covalently attached to the central biotin-carboxyl-carrier
  (BCC) domain, and the carboxyl transferase (CT) domain then transfers the
  carboxyl group to acetyl-CoA to form malonyl-CoA. At the mitochondrial outer
  membrane the malonyl-CoA produced by ACC2 allosterically inhibits carnitine
  palmitoyltransferase 1 (CPT1), thereby limiting mitochondrial long-chain
  fatty-acid uptake and negatively regulating fatty-acid beta-oxidation; this
  contrasts with ACC1, whose cytosolic malonyl-CoA feeds de novo lipogenesis.
  ACC2 is most abundant in oxidative tissues (heart, skeletal muscle, liver,
  adipose tissue). Its activity is acutely controlled by phosphorylation at
  Ser222 by AMPK (which disrupts the active oligomer), by allosteric activation
  by citrate, by product inhibition by malonyl-CoA, and by citrate-dependent
  polymerization into active filaments promoted by MID1IP1/MIG12. Requiring
  Mg2+/Mn2+ and biotin, ACC2 is a well-studied metabolic drug target for obesity,
  type 2 diabetes, and fatty liver disease.
