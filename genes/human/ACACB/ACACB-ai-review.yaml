- id: PMID:10677481
  title: The subcellular localization of acetyl-CoA carboxylase 2.
  findings:
  - statement: >-
      ACC2 is targeted to the mitochondria by its unique hydrophobic N-terminal
      sequence and colocalizes with carnitine palmitoyltransferase 1, consistent with
      regulation of mitochondrial fatty-acid oxidation via malonyl-CoA inhibition of
      CPT1.
    reference_section_type: ABSTRACT
    supporting_text: "ACC2 was associated with the mitochondria"
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Abstract-only in cache. Establishes ACC2 mitochondrial (outer membrane)
      localization and the CPT1-inhibition rationale. Note the GOA nuclear IDA derived
      from this paper is not supported by the abstract.
- id: PMID:16794074
  title: TRB3 links the E3 ubiquitin ligase COP1 to lipid metabolism.
  findings:
  - statement: >-
      TRB3 promotes ubiquitination and degradation of ACC via COP1 during fasting,
      linking ACC turnover to lipid metabolism.
    reference_section_type: ABSTRACT
    supporting_text: "stimulates lipolysis by triggering the degradation of ACC"
  reference_review:
    relevance: LOW
    correctness: VERIFIED
    review_notes: >-
      Abstract-only. Concerns ACC regulation broadly; the ACACB IPI is with mouse Trib3
      (Q8K4K2, BHF-UCL). Supports only a bare protein-binding annotation.
- id: PMID:16854592
  title: Expression, purification, and characterization of human and rat acetyl coenzyme
    A carboxylase (ACC) isozymes.
  findings:
  - statement: >-
      Recombinant human ACC2 was purified with high specific activity and proper
      biotinylation, confirming its acetyl-CoA carboxylase activity.
    reference_section_type: ABSTRACT
    supporting_text: "The resultant human ACC2, human ACC1, and rat ACC2 possess high"
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Abstract-only. Direct biochemical characterization of human ACC2 activity; basis
      for the EXP catalytic-activity annotation.
- id: PMID:19236960
  title: Characterization of recombinant human acetyl-CoA carboxylase-2 steady-state
    kinetics.
  findings:
  - statement: >-
      Steady-state kinetic analysis of purified recombinant human ACC2 directly measured
      malonyl-CoA formation, confirming acetyl-CoA carboxylase activity; citrate
      activates the enzyme.
    reference_section_type: ABSTRACT
    supporting_text: "LC/MS/MS assay to directly measure malonyl-CoA formation"
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Abstract-only. Direct malonyl-CoA-formation assay on human ACC2; strong support
      for the core catalytic function.
- id: PMID:19900410
  title: Molecular mechanism for the regulation of human ACC2 through phosphorylation
    by AMPK.
  findings:
  - statement: >-
      Crystal structures of the human ACC2 biotin carboxylase domain show that AMPK
      phosphorylation of Ser222 disrupts polymerization (the active oligomer),
      inactivating the enzyme; soraphen A binds the same site.
    reference_section_type: ABSTRACT
    supporting_text: >-
      disrupting polymerization and providing the molecular mechanism of inactivation by
      AMPK
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Abstract-only. Structural/mechanistic study of human ACC2 activity and its AMPK
      regulation; supports the EXP catalytic-activity annotation.
- id: PMID:20085763
  title: The N-terminal domain of human holocarboxylase synthetase facilitates biotinylation
    via direct interaction with the substrate protein.
  findings:
  - statement: >-
      The N-terminal domain of human holocarboxylase synthetase (HLCS) directly
      interacts with biotin-acceptor substrate proteins to facilitate biotinylation;
      ACC2 is such a substrate.
    reference_section_type: ABSTRACT
    supporting_text: >-
      The domain interacts not only with biotin acceptor protein, but also with the
      catalytic domain of hHCS
  reference_review:
    relevance: LOW
    correctness: VERIFIED
    review_notes: >-
      Abstract-only and general (does not name ACACB). Cited for the ACACB-HLCS (P50747)
      IPI (biotinylation enzyme-substrate); supports only a bare protein-binding
      annotation.
- id: PMID:20457939
  title: Induced polymerization of mammalian acetyl-CoA carboxylase by MIG12 provides
    a tertiary level of regulation of fatty acid synthesis.
  findings:
  - statement: >-
      MIG12/MID1IP1 binds ACC and lowers the citrate threshold for polymerization into
      the physiological range, inducing ACC filament formation and increasing activity
      more than 50-fold.
    reference_section_type: ABSTRACT
    supporting_text: "binds to ACC and lowers the threshold for citrate activation"
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Abstract-only. Establishes the ACC-MIG12 interaction and citrate-dependent
      polymerization/activation; basis for IPI, identical-protein-binding, and IDA
      activity annotations.
- id: PMID:20952656
  title: Crystal structure of Spot 14, a modulator of fatty acid synthesis.
  findings:
  - statement: >-
      Spot 14 (S14) forms heterodimers with MIG12 and thereby attenuates MIG12-induced
      polymerization and activation of acetyl-CoA carboxylase.
    reference_section_type: ABSTRACT
    supporting_text: "the polymerization and activity of acetyl-CoA carboxylase"
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Abstract-only. Supports the ACC2 IDA activity, acetyl-CoA metabolic process,
      protein homotetramerization, and IPI (MIG12) annotations attributed to this PMID.
- id: PMID:26976583
  title: Acetyl-CoA carboxylase inhibition by ND-630 reduces hepatic steatosis, improves
    insulin sensitivity, and modulates dyslipidemia in rats.
  findings:
  - statement: >-
      The allosteric inhibitor ND-630 prevents ACC dimerization and inhibits the
      enzymatic activity of both ACC1 and ACC2, reducing fatty-acid synthesis and
      stimulating fatty-acid oxidation; ACC is a validated metabolic drug target.
    reference_section_type: ABSTRACT
    supporting_text: "inhibit the enzymatic activity of both ACC isozymes"
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Abstract-only. Direct demonstration of ACC2 catalytic inhibition and its
      therapeutic relevance; supports the IDA activity annotation.
