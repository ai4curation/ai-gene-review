core_functions:
- description: >-
    In the nuclear trimeric PTF1 transcription-regulator complex, PTF1A forms the
    sequence-specific bHLH component with a class A E protein and RBPJ or RBPJL. The complex
    binds composite cis-regulatory sites and activates RNA polymerase II transcription. The
    RBPJ-containing PTF1-J and RBPJL-containing PTF1-L forms deploy this same molecular
    activity in different developmental and differentiated-cell contexts.
  molecular_function:
    id: GO:0001228
    label: DNA-binding transcription activator activity, RNA polymerase II-specific
  directly_involved_in:
  - id: GO:0045944
    label: positive regulation of transcription by RNA polymerase II
  locations:
  - id: GO:0005634
    label: nucleus
  in_complex:
    id: GO:0005667
    label: transcription regulator complex
