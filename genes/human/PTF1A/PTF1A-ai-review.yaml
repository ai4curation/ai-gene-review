suggested_questions:
- question: >-
    Which direct PTF1A targets and cofactors distinguish human cerebellar Purkinje-cell,
    nucleo-olivary-neuron, and interneuron lineage decisions after the shared PTF1A-dependent
    GABAergic specification step?
- question: >-
    Does neural PTF1A use only RBPJ-containing PTF1-J, or are there stage- or lineage-specific
    alternative RBP partners analogous to the RBPJ-to-RBPJL switch in pancreatic acinar cells?
suggested_experiments:
- description: >-
    Perform time-resolved PTF1A and RBPJ CUT&RUN together with single-cell RNA-seq in human
    cerebellar organoids spanning ventricular-zone progenitors through Purkinje and inhibitory
    interneuron commitment, with PTF1A knockout and DNA-binding/rescue controls, to identify direct
    lineage targets and separate primary transcriptional effects from secondary fate changes.
- description: >-
    Rescue PTF1A-null human pancreatic and cerebellar progenitors with wild-type PTF1A, an
    E-protein-dimerization mutant, and an RBPJ-interaction-defective mutant, then measure composite
    PTF1-site occupancy, RNA polymerase II activation, and lineage output to test how each complex
    interface contributes across tissues.
