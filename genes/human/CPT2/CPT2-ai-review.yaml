- term:
    id: GO:0015909
    label: long-chain fatty acid transport
  evidence_type: IEA
  original_reference_id: GO_REF:0000117
  qualifier: involved_in
  review:
    summary: >-
      ARBA machine-learning assignment of long-chain fatty acid transport. CPT2
      does not itself transport fatty acids or acylcarnitines across the membrane
      (that is done by CPT1 plus the carnitine/acylcarnitine translocase
      SLC25A20); CPT2 is the matrix-side enzyme that regenerates acyl-CoA. The
      functional essence (enabling mitochondrial long-chain FA import for
      oxidation) is sound but the transport term mis-describes the mechanism.
    action: MODIFY
    reason: >-
      CPT2 is an acyltransferase, not a transporter. Its contribution to
      long-chain fatty acid uptake is indirect (completing the carnitine shuttle).
      The more accurate terms are the carnitine shuttle and fatty acid
      beta-oxidation processes it enables.
    proposed_replacement_terms:
