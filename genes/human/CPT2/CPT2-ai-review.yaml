- id: PMID:1988962
  title: cDNA cloning, sequence analysis, and chromosomal localization of the gene
    for human carnitine palmitoyltransferase.
  findings:
  - statement: >-
      Cloned human liver CPT and identified it as an inner mitochondrial membrane
      enzyme (EC 2.3.1.21) central to fatty acid oxidation, encoding a 658-residue
      precursor with a 25-residue leader peptide.
    reference_section_type: ABSTRACT
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Founding cloning/characterization paper for human CPT2; directly supports the
      inner-membrane localization and palmitoyltransferase activity.
- id: PMID:20538056
  title: 'Carnitine palmitoyltransferase 2: New insights on the substrate specificity
    and implications for acylcarnitine profiling.'
  findings:
  - statement: >-
      Human CPT2 substrate profiling shows activity with medium (C8-C12) and
      long-chain (C14-C18) acyl-CoA esters, minimal activity on short/very-long-chain
      or branched substrates, and reversible operation contributing to acylcarnitine
      profiles.
    reference_section_type: ABSTRACT
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Primary experimental basis for the carnitine O-palmitoyltransferase /
      O-octanoyltransferase / O-acyltransferase molecular functions and substrate range.
- id: PMID:24780397
  title: Functional analysis of iPSC-derived myocytes from a patient with carnitine
    palmitoyltransferase II deficiency.
  findings:
  - statement: >-
      CPT II-deficient patient iPSC-derived myocytes accumulate palmitoylcarnitine
      (C16), especially under heat stress, recapitulating impaired long-chain fatty
      acid oxidation.
    reference_section_type: ABSTRACT
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Disease-model evidence supporting the carnitine O-palmitoyltransferase activity
      and long-chain FAO role of CPT2.
- id: PMID:25578732
  title: Adipose fatty acid oxidation is required for thermogenesis and potentiates
    oxidative stress-induced inflammation.
  findings:
  - statement: >-
      Adipose-specific Cpt2 knockout mice become hypothermic after cold challenge and
      fail to upregulate brown adipose thermogenic genes, showing CPT2-dependent fatty
      acid oxidation is required for cold-induced thermogenesis.
    reference_section_type: ABSTRACT
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: >-
      Mouse study; basis for the ISS/IEA positive-regulation-of-cold-induced-thermogenesis
      annotation, which is a tissue-specific downstream role (kept as non-core).
