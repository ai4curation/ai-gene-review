id: P23786
gene_symbol: CPT2
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  Carnitine O-palmitoyltransferase 2 (CPT2, EC 2.3.1.21) is a mitochondrial
  enzyme of the carnitine/choline acetyltransferase family that is peripherally
  associated with the matrix side of the mitochondrial inner membrane. It
  catalyzes the final, matrix-side step of the carnitine shuttle, regenerating
  long-chain acyl-CoA from imported acylcarnitine (long-chain acylcarnitine +
  CoA to long-chain acyl-CoA + L-carnitine), the reverse-direction reaction to
  CPT1. This reconstitutes the acyl-CoA pool inside the matrix so that long-chain
  fatty acids can enter mitochondrial beta-oxidation; CPT2 is therefore essential
  for the mitochondrial uptake and oxidation of long-chain fatty acids. The
  enzyme is active with medium-chain (C8-C12) and long-chain (C14-C18) acyl-CoA
  esters. Loss of CPT2 function causes carnitine palmitoyltransferase II
  deficiency, an autosomal recessive disorder of long-chain fatty acid oxidation
  with lethal neonatal, severe infantile hepatocardiomuscular, and common adult
  myopathic (exercise/fever/fasting-triggered rhabdomyolysis) forms; thermolabile
  variants predispose to influenza-associated encephalopathy.
