core_functions:
- description: >-
    Carnitine O-palmitoyltransferase (EC 2.3.1.21) activity on the matrix side of
    the mitochondrial inner membrane, catalyzing the final step of the carnitine
    shuttle to regenerate long-chain acyl-CoA from imported acylcarnitine
    (long-chain acylcarnitine + CoA to long-chain acyl-CoA + L-carnitine), thereby
    enabling mitochondrial long-chain fatty acid beta-oxidation.
