  review:
    summary: >-
      Phylogenetic (IBA) annotation to protein-containing complex binding. NDUFA9
      is a constitutive subunit of Complex I rather than an external ligand that
      binds a complex; the informative statement is that it is part_of respiratory
      chain complex I (GO:0045271). "protein-containing complex binding" is
      uninformative here and does not capture its structural role.
