- term:
    id: GO:0006814
    label: sodium ion transport
  evidence_type: NAS
  original_reference_id: PMID:8486360
  qualifier: involved_in
  review:
    summary: >-
      NAS annotation to sodium ion transport. This is incorrect for human
      NDUFA9/Complex I. Mammalian mitochondrial Complex I is a proton-pumping
      NADH:ubiquinone oxidoreductase; it does not transport sodium. Na+-translocating
      NADH:quinone oxidoreductases (Na+-NQR) are a distinct bacterial enzyme family.
      The annotation appears to be a legacy mis-assignment.
    action: REMOVE
    reason: >-
      No evidence that human NDUFA9 or human Complex I transports sodium; the
      coupling ion for mammalian Complex I is the proton, not Na+. Biologically
      wrong process.
