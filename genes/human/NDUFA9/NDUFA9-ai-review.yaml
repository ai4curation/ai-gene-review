- term:
    id: GO:0006744
    label: ubiquinone biosynthetic process
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: involved_in
  review:
    summary: >-
      Phylogenetic (IBA) annotation to ubiquinone biosynthetic process. This is
      incorrect for NDUFA9. Complex I uses ubiquinone as an electron acceptor and
      reduces it to ubiquinol; it does not synthesize ubiquinone (that pathway is
      carried out by the COQ enzymes). NDUFA9 is a non-catalytic accessory subunit
      and has no role in ubiquinone biosynthesis. The IBA propagation likely
      conflated "acts on ubiquinone" with "makes ubiquinone".
    action: REMOVE
    reason: >-
      Biologically wrong process. NDUFA9/Complex I reduces ubiquinone as part of
      electron transport (GO:0006120), and does not participate in ubiquinone
      biosynthesis. No literature supports a biosynthetic role.
