core_functions:
- description: >-
    NDUFA9 is a structural accessory (supernumerary) subunit of mitochondrial
    respiratory Complex I. It sits at the junction of the peripheral (Q-module)
    and membrane arms and stabilizes the complex; it is non-catalytic and binds a
    structural NADPH dinucleotide cofactor that is not turned over. Through
    its structural role it is required for proper assembly of a functional
    Complex I and thereby contributes to mitochondrial electron transport from
    NADH to ubiquinone.
  molecular_function:
    id: GO:0005198
    label: structural molecule activity
