id: Q16795
gene_symbol: NDUFA9
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  NDUFA9 (NADH:ubiquinone oxidoreductase subunit A9; also called the 39 kDa
  subunit, CI-39kD) is an accessory (supernumerary) subunit of mitochondrial
  respiratory Complex I (NADH:ubiquinone oxidoreductase). It sits at the junction
  between the peripheral (matrix) arm and the membrane arm, near the Q-module,
  and adopts a short-chain dehydrogenase/reductase (SDR) NAD(P)-binding
  Rossmann-like fold. NDUFA9 binds a structural NADPH dinucleotide cofactor
  that is not turned over catalytically; the subunit itself is not
  part of the electron-transfer wire and does not carry a redox-active Fe-S
  cluster. Its role is structural: it stabilises the Q-module/junction and is
  required for proper assembly of a functional Complex I. Through Complex I it
  contributes to mitochondrial electron transport from NADH to ubiquinone and
  hence to oxidative phosphorylation. The mature protein (after cleavage of a
  mitochondrial targeting presequence) resides in the mitochondrial inner
  membrane as an integral component of Complex I. Biallelic loss-of-function
  variants cause mitochondrial Complex I deficiency (nuclear type 26 / MC1DN26),
  a severe mitochondrial disease with phenotypes including Leigh syndrome and
  neonatally fatal encephalopathy.
