  evidence_type: IMP
  original_reference_id: PMID:27626371
  qualifier: involved_in
  review:
    summary: >-
      Proposed new annotation. NDUFA9 is required for proper assembly of a
      functional Complex I: gene-editing knockout studies show that most accessory
      subunits, including NDUFA9, are strictly required for assembly of a functional
      complex, and loss of a subunit destabilizes co-module subunits. UniProt
      states NDUFA9 is "Required for proper complex I assembly", and pathogenic
      NDUFA9 variants cause a Complex I assembly defect with accumulation of
      assembly intermediates. This process is not currently in the GOA set but is
      strongly supported.
    action: NEW
    reason: >-
      Captures NDUFA9's core biological role (assembly/stabilization of Complex I),
      which is better supported than the catalytic MF annotations and complements
      the electron-transport process term.
