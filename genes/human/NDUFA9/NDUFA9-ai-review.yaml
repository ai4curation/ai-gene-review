- term:
    id: GO:0003954
    label: NADH dehydrogenase activity
  evidence_type: IMP
  original_reference_id: PMID:11112787
  qualifier: enables
  review:
    summary: >-
      IMP annotation of NADH dehydrogenase activity, from a study using monoclonal
      antibodies (including one against the 39 kDa/NDUFA9 subunit) to distinguish
      catalytic versus assembly defects in Complex I deficiency. The measured NADH
      dehydrogenase activity is a property of the intact Complex I holoenzyme, and
      UniProt explicitly states NDUFA9 is an accessory subunit "believed not to be
      involved in catalysis". Attributing the catalytic MF directly to NDUFA9
      over-reads the complex-level assay.
    action: MODIFY
    reason: >-
      NDUFA9 is non-catalytic; the redox activity belongs to the core (Q-module/N-
      module) subunits, not this accessory subunit. NDUFA9's contribution to the
      assay is structural (its loss disrupts assembly and thereby activity), so the
      informative MF is structural molecule activity, with the process captured by
      GO:0006120. The catalytic MF should not be assigned to NDUFA9.
    proposed_replacement_terms:
    - id: GO:0005198
      label: structural molecule activity
    supported_by:
    - reference_id: file:human/NDUFA9/NDUFA9-uniprot.txt
      supporting_text: "chain NADH dehydrogenase (Complex I), that is believed not to be"
    - reference_id: PMID:11112787
      supporting_text: "distinguish catalytic versus assembly"
