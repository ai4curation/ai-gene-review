- id: PMID:10369264
  title: Mutations in the gene encoding 11-cis retinol dehydrogenase cause delayed
    dark adaptation and fundus albipunctatus.
  findings:
  - statement: >-
      RDH5 mutations cause fundus albipunctatus, a form of stationary night blindness with
      delayed regeneration of cone and rod photopigments; recombinant mutant enzymes had
      reduced activity relative to wild type. Establishes the visual-perception role of RDH5.
    reference_section_type: ABSTRACT
    supporting_text: >-
      Our results suggest that mutant alleles in RDH5 are a cause of fundus albipunctatus, a
      rare form of stationary night blindness characterized by a delay in the regeneration of
      cone and rod photopigments.
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified. First demonstration that RDH5 mutations cause fundus albipunctatus;
      supports the visual perception annotation.
- id: PMID:11675386
  title: Biochemical defects in 11-cis-retinol dehydrogenase mutants associated with
    fundus albipunctatus.
  findings:
  - statement: >-
      RDH5 is a dimeric ER-membrane 11-cis-retinol dehydrogenase; 11 fundus-albipunctatus
      mutants showed decreased stability, mislocalization, and loss of enzymatic activity.
    reference_section_type: ABSTRACT
    supporting_text: >-
      All RDH5 mutants showed decreased protein stability and subcellular mislocalization and,
      in most cases, loss of enzymatic activity in vitro and in vivo.
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified. Source of the homodimer, ER-membrane/lumenal-side localization, and
      11-cis-retinol dehydrogenase activity IDA annotations.
- id: PMID:29541409
  title: Inhibition of dihydrotestosterone synthesis in prostate cancer by combined
    frontdoor and backdoor pathway blockade.
  findings:
  - statement: >-
      RDH5 is one of four 3-alpha-oxidoreductases that convert androsterone to 5-alpha-dione /
      5-alpha-androstane-3-alpha,17-beta-diol to dihydrotestosterone; catalytic Y175/K179
      residues are required for activity. Supports the androsterone dehydrogenase EXP annotation.
    reference_section_type: RESULTS
    supporting_text: >-
      metabolism of 5α-androstan-3α-ol-17-one (androsterone; AND) to 5α-dione
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified full text. Documents RDH5's secondary (extra-ocular) 3-alpha-oxidoreductase
      activity in prostate androgen metabolism; non-core relative to the visual cycle.
- id: PMID:9115228
  title: Identification and characterization of a stereospecific human enzyme that
    catalyzes 9-cis-retinol oxidation. A possible role in 9-cis-retinoic acid formation.
  findings:
  - statement: >-
      The cloned enzyme (RDH5/9-cis-retinol dehydrogenase) avidly oxidizes 9-cis-retinol and,
      less efficiently, 13-cis-retinol, prefers NAD+, and does not catalyze all-trans-retinol
      oxidation. Directly refutes an all-trans-retinol dehydrogenase assignment.
    reference_section_type: ABSTRACT
    supporting_text: >-
      This protein also catalyzes oxidation of 13-cis-retinol at a rate approximately 10% of that
      of the 9-cis isomer but does not catalyze all-trans-retinol oxidation.
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified. Establishes cis-retinol substrate specificity and NAD+ preference; key
      evidence that the all-trans-retinol dehydrogenase term is the wrong substrate for RDH5.
- id: PMID:9931293
  title: Activity of human 11-cis-retinol dehydrogenase (Rdh5) with steroids and retinoids
    and expression of its mRNA in extra-ocular human tissue.
  findings:
  - statement: >-
      Recombinant human RDH5 metabolizes 9-cis- and 11-cis-retinol with comparable efficiency
      and recognizes 5-alpha-androstane-3-alpha,17-beta-diol and androsterone as substrates
      (3-alpha-HSD activity) but not testosterone, DHT, oestradiol or corticosterone.
    reference_section_type: ABSTRACT
    supporting_text: >-
      recognizes 5alpha-androstan-3alpha,17beta-diol and androsterone as substrates
      (3alpha-hydroxysteroid dehydrogenase activity)
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified. Source of the retinoid and steroid (androsterone / androstanediol)
      dehydrogenase IDA annotations.
