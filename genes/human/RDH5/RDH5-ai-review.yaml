id: Q92781
gene_symbol: RDH5
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  RDH5 (retinol dehydrogenase 5), also known as 11-cis retinol dehydrogenase, is a
  microsomal NAD(H)-dependent short-chain dehydrogenase/reductase (SDR family, SDR9C5)
  anchored in the endoplasmic reticulum membrane as a multi-pass membrane protein with a
  lumenal-facing catalytic domain, and it functions as a homodimer. It oxidizes cis-isomers
  of retinol (11-cis-, 9-cis-, and 13-cis-retinol) but has no activity toward all-trans
  retinoids. Its principal physiological role is in the visual (retinoid) cycle of the
  retinal pigment epithelium, where it catalyzes the step following the isomerase RPE65:
  the oxidation of 11-cis-retinol to 11-cis-retinal, the chromophore that recombines with
  opsins to regenerate rod and cone visual pigments. Beyond the eye RDH5 is widely expressed
  and also displays 3-alpha-hydroxysteroid dehydrogenase activity, oxidizing androsterone and
  5-alpha-androstane-3-alpha,17-beta-diol, contributing to androgen (dihydrotestosterone)
  metabolism. Loss-of-function variants in RDH5 cause fundus albipunctatus, a form of
  congenital stationary night blindness with delayed dark adaptation and white retinal dots.
