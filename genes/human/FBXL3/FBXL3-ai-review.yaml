  directly_involved_in:
  - id: GO:0042752
    label: regulation of circadian rhythm
  - id: GO:0031146
    label: SCF-dependent proteasomal ubiquitin-dependent protein catabolic process
- description: Recognizes cryptochrome substrates through a structurally defined mechanism in which a conserved FBXL3 C-terminal tail occupies the CRY FAD-binding pocket and buries the CRY PER-binding interface, a substrate interaction antagonized by FAD and the Period proteins.
