suggested_questions:
- question: How is the balance between SCF(FBXL3)-mediated CRY degradation and SCF(FBXL21)-mediated CRY stabilization spatially and temporally regulated to tune circadian period?
- question: Beyond CRY1/CRY2, does FBXL3 have physiologically important substrates that explain the human FBXL3 loss-of-function phenotype (intellectual developmental disorder with short stature)?
suggested_experiments:
- description: Reconstitute SCF(FBXL3)-mediated CRY2 ubiquitination in vitro with purified SKP1, CUL1, RBX1, an E2, and wild-type versus C-terminal-tail or pocket-mutant FBXL3, and titrate FAD and PER proteins to quantify how cofactor and competitor occupancy controls substrate ubiquitination.
- description: Perform time-resolved quantitative proteomics in FBXL3-knockout versus wild-type cells across the circadian cycle to confirm CRY1/CRY2 as the dominant rhythmic substrates and to identify any additional FBXL3 targets relevant to the developmental disorder phenotype.
