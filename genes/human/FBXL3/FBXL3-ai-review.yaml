id: Q9UKT7
gene_symbol: FBXL3
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  FBXL3 (F-box/LRR-repeat protein 3) is the substrate-recognition (F-box)
  subunit of an SCF (SKP1-CUL1-RBX1-F-box) cullin-RING E3 ubiquitin ligase that
  controls the mammalian circadian clock by targeting the cryptochrome
  repressors CRY1 and CRY2 for ubiquitination and proteasomal degradation.
  Within the predominantly nuclear SCF(FBXL3) complex, FBXL3 binds SKP1 through
  its F-box domain and uses its leucine-rich repeats to capture CRY: a conserved
  C-terminal tail of FBXL3 inserts into the FAD-binding pocket of CRY and buries
  the PER-binding interface, an interaction that can be displaced by FAD and by
  the Period proteins. By timing CRY degradation, SCF(FBXL3) sets the period and
  robustness of the circadian oscillator, permitting reactivation of the
  CLOCK-BMAL1 transcriptional activator and the consequent rhythmic expression
  of clock-controlled genes including Per1/Per2. Its activity is counterbalanced
  by the related SCF(FBXL21) ligase, which stabilizes CRY. In humans, biallelic
  loss-of-function variants in FBXL3 cause an autosomal-recessive intellectual
  developmental disorder with short stature.
