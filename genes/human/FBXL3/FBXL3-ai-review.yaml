core_functions:
- description: Functions as the substrate-recognition (F-box) subunit of the nuclear SCF (SKP1-CUL1-RBX1-FBXL3) cullin-RING E3 ubiquitin ligase that recruits the cryptochrome repressors CRY1 and CRY2 for polyubiquitination and proteasomal degradation, thereby setting the period and robustness of the mammalian circadian clock.
  molecular_function:
    id: GO:1990756
    label: ubiquitin-like ligase-substrate adaptor activity
