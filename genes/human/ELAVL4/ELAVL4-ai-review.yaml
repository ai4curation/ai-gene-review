- id: PMID:22387028
  title: RNA-binding protein HuD controls insulin translation.
  findings:
  - statement: In pancreatic beta cells, HuD binds an Ins2 5-prime-UTR element and represses translation.
    supporting_text: >-
      Modulating HuD abundance did not alter Ins2 mRNA levels, but HuD
      overexpression decreased Ins2 mRNA translation and insulin production,
      and conversely, HuD silencing enhanced Ins2 mRNA translation and insulin
      production.
    reference_section_type: ABSTRACT
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      PubMed/PMC identity and full text were checked. Functional experiments
      are on mouse Elavl4/Ins2 and therefore support ISS, not direct human IDA or
      IMP, for the translation-repression terms.
- id: PMID:24857657
  title: HuD regulates coding and noncoding RNA to induce APP→Aβ processing.
  findings:
  - statement: In human neuroblastoma cells, HuD increases APP mRNA stability and translation.
    supporting_text: In sum, HuD enhanced both the stability and translation of APP mRNA.
    reference_section_type: RESULTS
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      PubMed/PMC identity and full text were checked. Human-cell knockdown,
      half-life, polysome, and reporter experiments directly support positive
      regulation of translation.
