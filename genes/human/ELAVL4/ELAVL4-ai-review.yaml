description: >-
  ELAVL4 encodes HuD, a predominantly neuronal RNA-binding protein and
  paraneoplastic Hu antigen with three RNA recognition motifs. HuD recognizes
  U-rich and AU-rich elements, especially in mRNA 3-prime UTRs, and commonly
  protects selected neuronal transcripts from deadenylation and decay while
  promoting their translation. It also binds pyrimidine-rich intronic RNA in
  the nucleus to regulate neuron-specific alternative pre-mRNA processing.
  Cytoplasmic HuD occurs in neuronal cell bodies, axons, dendrites, and growth
  cones, where association with SMN contributes to target-mRNA recruitment into
  neuronal RNA granules. Target context can reverse its translational effect:
  in pancreatic beta cells, binding a conserved insulin-mRNA 5-prime-UTR
  element represses translation. CARM1-dependent hinge methylation modulates
  HuD RNA binding, SMN interaction, cell-cycle exit, and neurite differentiation.
