- id: PMID:10348344
  title: HuD, a neuronal-specific RNA-binding protein, is a putative regulator of N-myc pre-mRNA processing/stability in malignant human neuroblasts.
  full_text_unavailable: true
  findings:
  - statement: HuD binds exonic and intronic N-MYC RNA and was proposed to regulate nuclear pre-mRNA processing or stability.
    supporting_text: >-
      The neuronal-specific RNA-binding Hu proteins are present in cytoplasmic
      and nuclear fractions of N cells and one of them, HuD, binds specifically
      to both exonic and intronic N-myc RNA sequences.
    reference_section_type: ABSTRACT
    full_text_unavailable: true
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: >-
      PubMed identity and abstract were checked. The study supports the broad
      mRNA-processing record, but describes the precise N-MYC mechanism as
      putative and the full text is not in the cache.
- id: PMID:10710437
  title: RNA-binding analyses of HuC and HuD with the VEGF and c-myc 3'-untranslated regions using a novel ELISA-based assay.
  findings:
  - statement: Recombinant HuD binds VEGF and c-MYC 3-prime UTRs specifically and concentration-dependently.
    supporting_text: >-
      With this assay, I demonstrate that HuC and HuD bind to the VEGF 3'-UTR
      regulatory segment (VRS) and to the c- myc 3'-UTR in a specific and
      concentration-dependent pattern, with both proteins showing a greater
      affinity for the VRS.
    reference_section_type: ABSTRACT
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      PubMed/PMC identity and full text were checked. This is direct human HuD
      biochemical evidence for AU-rich 3-prime-UTR binding.
- id: PMID:10848602
  title: HuD RNA recognition motifs play distinct roles in the formation of a stable complex with AU-rich RNA.
  full_text_unavailable: true
  findings:
  - statement: Extended AU-rich sequence and cooperative RRM action produce stable nanomolar-affinity HuD-RNA complexes.
    supporting_text: >-
      Thus, the three RRMs appear to cooperate not only to increase the affinity
      of the interaction but also to stabilize the formed complex.
    reference_section_type: ABSTRACT
    full_text_unavailable: true
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      PubMed identity and abstract were checked. The direct kinetic experiments
      support AU-rich RNA binding and the three-RRM mechanism.
- id: PMID:12034726
  title: Poly(A) tail length-dependent stabilization of GAP-43 mRNA by the RNA-binding protein HuD.
  full_text_unavailable: true
  findings:
  - statement: HuD delays GAP43 mRNA decay and reduces deadenylation in a binding-element- and poly(A)-tail-dependent manner.
    supporting_text: >-
      Here we report that overexpression of HuD protein in PC12 cells stabilizes
      the GAP-43 mRNA by delaying the onset of mRNA degradation and that this
      process depends on the size of the poly(A) tail.
    reference_section_type: ABSTRACT
    full_text_unavailable: true
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      PubMed identity and abstract were checked. This is the decisive direct
      evidence for GAP43 3-prime-UTR-dependent stabilization and poly(A)-length
      effects.
