- id: PMID:17035636
  title: A nuclear function of Hu proteins as neuron-specific alternative RNA processing regulators.
  full_text_unavailable: true
  findings:
  - statement: Neuronal Hu proteins oppose TIA1/TIAL1 to regulate neuron-specific CALCA pre-mRNA processing in the nucleus.
    supporting_text: >-
      We show that in neuron-like cells, Hu proteins block the activity of
      TIA-1/TIAR, two previously identified, ubiquitously expressed proteins
      that promote the nonneuronal pathway of calcitonin/calcitonin gene-related
      peptide (CGRP) pre-mRNA processing.
    reference_section_type: ABSTRACT
    full_text_unavailable: true
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      PubMed/PMC identity, abstract, and open full text were checked. This
      directly supports intronic pyrimidine-rich binding and regulation of
      alternative pre-mRNA processing; the local cache contains only the
      abstract.
- id: PMID:17234598
  title: The RNA-binding protein HuD binds acetylcholinesterase mRNA in neurons and regulates its expression after axotomy.
  full_text_unavailable: true
  findings:
  - statement: Human HuD binds AChE mRNA in neurons and maintains AChE and GAP43 transcript levels after axotomy.
    supporting_text: >-
      Using a herpes simplex virus construct containing the human HuD sequence
      to infect SCG neurons in vivo, we found that AChE and GAP-43 mRNA levels
      were maintained in the SCG after axotomy.
    reference_section_type: ABSTRACT
    full_text_unavailable: true
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      PubMed/PMC identity and abstract were checked. The study directly supports
      AU-rich target binding and post-transcriptional maintenance in neurons.
- id: PMID:18218628
  title: Post-transcriptional regulation of neuro-oncological ventral antigen 1 by the neuronal RNA-binding proteins ELAV.
  full_text_unavailable: true
  findings:
  - statement: HuD/nELAV binding positively controls NOVA1 mRNA stability and translation.
    supporting_text: >-
      Gene silencing and overexpression of the nELAV member HuD in motoneuronal
      NSC34 cells indicate that Nova1 mRNA stability and translation are
      positively and strongly controlled by the nELAV proteins.
    reference_section_type: ABSTRACT
    full_text_unavailable: true
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      PubMed identity and abstract were checked. Direct HuD perturbation
      supports 3-prime-UTR binding and positive control of NOVA1 stability and
      translation.
- id: PMID:21088113
  title: HuD interacts with survival motor neuron protein and can rescue spinal muscular atrophy-like neuronal defects.
  full_text_unavailable: true
  findings:
  - statement: HuD binds SMN, and the interaction recruits HuD and target mRNAs to neuronal granules.
    supporting_text: >-
      We further demonstrate that this CARM1-dependent regulatory switch mainly
      controls the activity of HuD in promoting cell-cycle exit, whereas the
      interaction between HuD and SMN is required for proper recruitment of HuD
      and its mRNA targets in neuronal RNA granules.
    reference_section_type: ABSTRACT
    full_text_unavailable: true
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      PubMed identity and abstract were checked. This is direct interaction,
      localization, and regulatory evidence for human HuD.
- id: PMID:11175903
  title: Structural basis for recognition of AU-rich element RNA by the HuD protein.
  full_text_unavailable: true
  findings:
  - statement: HuD RRM1-RRM2 structures define recognition of pyrimidine-rich AU elements.
    supporting_text: >-
      These structures reveal a consensus RNA recognition sequence that suggests
      a preference for pyrimidine-rich sequences and a requirement for a central
      uracil residue in the clustered AUUUA repeats found in class II AREs.
    reference_section_type: ABSTRACT
    full_text_unavailable: true
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      PubMed identity and abstract were checked. The direct structural work
      defines the biochemical specificity of HuD's first two RRMs.
