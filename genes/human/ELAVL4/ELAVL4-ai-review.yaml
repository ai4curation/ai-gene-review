knowledge_gaps:
- gap_statement: >-
    The functional differences among the six human ELAVL4 isoforms are
    unresolved, especially the hinge deletion present in isoforms 2-5.
  boundary: >-
    UniProt defines the sequence variants, but most RNA-binding, splicing,
    translation, and neuronal-granule studies do not resolve endogenous
    isoforms.
  gap_kind:
  - BIOLOGY
  dark_aspect: MF_DARK
  status: OPEN
  significance: >-
    Isoform resolution is needed to determine whether hinge variation changes
    CARM1/SMN regulation, target selection, localization, or translational
    output.
  resolution: >-
    Combine long-read isoform quantification, isoform-resolved eCLIP, and matched
    rescue of RNA stabilization, splicing, and axonal-transport phenotypes after
    endogenous ELAVL4 depletion.
  provenance:
  - reference_id: file:human/ELAVL4/ELAVL4-notes.md
    supporting_text: isoforms 2-5 lack residues 264-277 in the RRM2-RRM3 hinge
- gap_statement: >-
    The sequence and protein-context rules that determine whether HuD activates
    or represses translation remain unresolved.
  boundary: >-
    HuD usually stabilizes and promotes expression of 3-prime-UTR targets, but
    it represses INS/Ins2 and p27 translation through 5-prime-UTR binding.
  gap_kind:
  - BIOLOGY
  dark_aspect: BP_DARK
  status: OPEN
  significance: >-
    A predictive mechanistic model is required before HuD binding can be
    interpreted as translational activation or repression for new targets.
  resolution: >-
    Perform matched endogenous 5-prime-UTR and 3-prime-UTR saturation
    mutagenesis, ribosome profiling, RNA-stability measurements, and RNP
    proteomics under wild-type and RRM/hinge-mutant rescue.
  provenance:
  - reference_id: file:human/ELAVL4/ELAVL4-deep-research-manual.md
    supporting_text: The direction of translation regulation depends on target context.
- gap_statement: >-
    The extent to which conserved HuD-dependent neuronal-development phenotypes
    translate into direct human ELAVL4 requirements is unresolved.
  boundary: >-
    Mouse and zebrafish genetics support neuronal differentiation, axon
    branching, dendrite formation, and motor function, while direct human
    evidence is mainly biochemical and cell-based.
  gap_kind:
  - BIOLOGY
  dark_aspect: BP_DARK
  status: OPEN
  significance: >-
    Human-cell evidence would separate conserved developmental functions from
    lineage-, stage-, or model-specific phenotypes.
  resolution: >-
    Use isogenic human iPSC-derived neuronal lineages with acute ELAVL4
    depletion, endogenous rescue, long-term morphology, electrophysiology, and
    target-resolved RNA stability and localization measurements.
  provenance:
  - reference_id: file:human/ELAVL4/ELAVL4-notes.md
    supporting_text: Separate direct human ELAVL4 functions from conserved developmental phenotypes
suggested_questions:
- question: >-
    Which ELAVL4 isoforms predominate in human neuronal subtypes, and does the
    264-277 hinge deletion alter CARM1 methylation, SMN binding, or RNA-granule
    transport?
- question: >-
    What RNA sequence, position, structure, and protein-cofactor features make
    HuD activate one target's translation but repress another's?
- question: >-
    Does protein-RNA adaptor activity require simultaneous HuD contact with SMN
    and RNA, or does SMN primarily assemble or transport a preformed HuD mRNP?
- question: >-
    Which ELAVL4-dependent neuronal differentiation and projection phenotypes
    are conserved in human neurons?
suggested_experiments:
- hypothesis: >-
    Deletion of hinge residues 264-277 changes CARM1-sensitive SMN association
    and axonal mRNP transport without eliminating the core RRM-mediated
    AU-rich-RNA specificity.
  description: >-
    Endogenously deplete ELAVL4 in human iPSC-derived motor neurons and compare
    matched rescue with isoforms 1-6 using eCLIP, methyl-proteomics, SMN
    co-immunoprecipitation, and live single-molecule RNA transport imaging.
  experiment_type: Isoform-resolved biochemical and neuronal rescue
- hypothesis: >-
    HuD binding position and recruited cofactors determine whether a target is
    stabilized and translationally activated or translationally repressed.
  description: >-
    Build matched INS, GAP43, and APP reporters with systematically exchanged
    5-prime-UTR and 3-prime-UTR elements, then measure HuD occupancy, decay,
    polysome loading, and local RNP proteomes after acute ELAVL4 degradation and
    rescue.
  experiment_type: Cis-element swap and multi-omic mechanism mapping
- hypothesis: >-
    Human ELAVL4 is required cell-autonomously for late axon branching and
    dendrite maturation through stabilization and transport of a defined
    neuronal target-RNA module.
  description: >-
    Use inducible ELAVL4 degradation after neuronal fate commitment in human
    iPSC-derived motor and cortical neurons, quantify projection morphology and
    electrophysiology, and rescue with wild-type or RNA-binding-defective HuD
    while monitoring GAP43 and other target RNAs.
  experiment_type: Stage-specific human neuronal loss-of-function and rescue
