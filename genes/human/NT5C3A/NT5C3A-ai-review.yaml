    reference_section_type: ABSTRACT
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified; disease/genetics context confirming the physiological importance of
      the enzyme's pyrimidine 5'-nucleotidase activity.
- id: PMID:15968458
  title: Evidence for essential catalytic determinants for human erythrocyte pyrimidine
    5'-nucleotidase.
  findings:
  - statement: >-
      Recombinant PN-I dephosphorylates pyrimidine nucleoside monophosphates; site-directed
      mutagenesis defines essential catalytic residues (e.g. Asp88, Asp90, Glu135).
    reference_section_type: ABSTRACT
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified; the EXP source for the 5'-nucleotidase activity annotation. Defines the
      HAD catalytic mechanism and separates nucleotidase from phosphotransferase activity.
- id: PMID:21478870
  title: A diverse range of gene products are effectors of the type I interferon antiviral
    response.
  findings:
  - statement: >-
      NT5C3A was included in a large ISG antiviral overexpression screen but behaved as a
      weak/non-effector (post-infection effect on HCV replication less than 20%).
    reference_section_type: RESULTS
  reference_review:
    relevance: LOW
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified, full text available. NT5C3A ("NT5C3") appears only as a weak/non-hit in
      the screen; the "defense response to virus" IDA is at best a peripheral role, not core.
- id: PMID:32296183
  title: A reference map of the human binary protein interactome.
  findings:
  - statement: >-
      Systematic yeast two-hybrid map (HuRI) reporting NT5C3A binary interactions (e.g. DESI1,
      UBQLN2); source of the bare "protein binding" IPI annotations.
    reference_section_type: ABSTRACT
  reference_review:
    relevance: LOW
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified; high-throughput binary interactome. Supports only uninformative
      "protein binding"; interactors match the UniProt INTERACTION block.
- id: PMID:34800366
  title: Quantitative high-confidence human mitochondrial proteome and its dynamics
    in cellular context.
  findings:
  - statement: >-
      High-throughput mitochondrial proteome dataset in which NT5C3A was detected; basis for
      the HTP mitochondrion location annotation.
    reference_section_type: ABSTRACT
  reference_review:
    relevance: LOW
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified. HTP spatial-proteome hit; inconsistent with the well-established
      cytosolic localization, so treated as non-core.
- id: PMID:8557639
  title: Purification, microsequencing, and immunolocalization of p36, a new interferon-alpha-induced
    protein that is associated with human lupus inclusions.
  findings:
  - statement: >-
      p36 (= NT5C3A isoform 2) is an interferon-alpha-induced protein that localizes to the
      endoplasmic reticulum, co-localizing with protein disulfide isomerase and lupus inclusions.
    reference_section_type: ABSTRACT
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified; source of the ER/cytoplasm IDA localization. ER localization is
      isoform-2-specific.
- id: PMID:9428647
  title: Pyrimidine nucleotidases from human erythrocyte possess phosphotransferase
    activities specific for pyrimidine nucleotides.
  findings:
  - statement: >-
      Erythrocyte pyrimidine nucleotidases (PN-I/PN-II) preferentially hydrolyse pyrimidine
      5'- (or 3'-) monophosphates and possess a pyrimidine-specific phosphotransferase activity;
      no tRNA 2'-phosphotransferase activity is described.
    reference_section_type: ABSTRACT
  reference_review:
    relevance: MEDIUM
    correctness: MISCITED
    review_notes: >-
      PubMed-verified. Cited as support for GO:0000215 (tRNA 2'-phosphotransferase activity),
      but the paper describes a pyrimidine-nucleotide phosphotransferase, not a tRNA
      2'-phosphotransferase; the GO:0000215 annotation is a mis-mapping.
- id: Reactome:R-HSA-109449
  title: (d)CMP, TMP, or (d)UMP + H2O => (deoxy)cytidine, thymidine, or (deoxy)uridine
    + orthophosphate (NT5C3)
  findings:
  - statement: >-
      Reactome reaction placing NT5C3(A) in the cytosol, hydrolyzing pyrimidine (deoxy)nucleoside
      monophosphates to nucleoside plus orthophosphate.
    reference_section_type: OTHER
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Reactome pathway step consistent with the enzyme's core catalytic reaction and cytosolic
      location.
