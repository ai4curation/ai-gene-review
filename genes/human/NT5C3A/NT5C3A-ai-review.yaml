gene_symbol: NT5C3A
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  NT5C3A (cytosolic 5'-nucleotidase 3A; pyrimidine 5'-nucleotidase 1, P5'N-1/PN-I;
  UMP-CMP 5'-nucleotidase; also historically "p36") is a cytosolic, Mg2+-dependent
  hydrolase of the haloacid dehalogenase (HAD) superfamily that belongs to the
  pyrimidine 5'-nucleotidase family. It dephosphorylates pyrimidine (deoxy)ribonucleoside
  5'-monophosphates to the corresponding nucleoside plus inorganic phosphate
  (EC 3.1.3.5), with a strong preference for pyrimidine over purine substrates;
  UMP and CMP are the physiological substrates and CMP is the preferred one in vitro.
  The enzyme uses a two-aspartate HAD catalytic mechanism (Asp88 nucleophile, Asp90
  proton donor) with an active-site Mg2+ ion, and also exhibits an associated
  phosphotransferase activity that exchanges phosphate between pyrimidine monophosphates
  and pyrimidine nucleosides. NT5C3A is very highly expressed in reticulocytes and
  mature erythrocytes, where it degrades the pyrimidine ribonucleotides released by
  RNA breakdown during erythroid maturation so that the resulting nucleosides can be
  cleared from the cell; this makes it central to erythroid pyrimidine nucleotide
  catabolism. Loss-of-function variants cause an autosomal recessive hereditary
  non-spherocytic hemolytic anemia (pyrimidine 5'-nucleotidase deficiency) featuring
  marked basophilic stippling and intra-erythrocyte accumulation of pyrimidine
  nucleotides, and the enzyme is also implicated in the anemia of lead poisoning. An
  alternatively spliced, N-terminally distinct isoform (isoform 2/p36) is
  interferon-alpha-inducible and localizes to the endoplasmic reticulum.
