id: O15239
gene_symbol: NDUFA1
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  NDUFA1 (MWFE protein) is a small (70-residue), single-pass membrane accessory
  ("supernumerary") subunit of mitochondrial respiratory chain Complex I
  (NADH:ubiquinone oxidoreductase). It is nuclear-encoded on the X chromosome,
  imported into mitochondria, and is a stable subunit of the membrane arm of the
  mature holoenzyme, embedded in the inner mitochondrial membrane on the matrix
  side. It is not one of the 14 conserved catalytic core subunits and carries no
  redox cofactor, so it is non-catalytic; its role is structural. Despite being
  non-catalytic, MWFE is absolutely required for assembly and activity of Complex
  I: loss or truncation of the protein reduces Complex I activity to under 10% and
  destabilizes co-assembling membrane-arm subunits. Complex I as a whole transfers
  electrons from NADH to ubiquinone coupled to proton translocation across the
  inner membrane, feeding the respiratory chain and oxidative phosphorylation. In
  humans, X-linked loss-of-function variants in NDUFA1 cause mitochondrial complex
  I deficiency nuclear type 12 (MC1DN12), a mitochondrial encephalomyopathy.
