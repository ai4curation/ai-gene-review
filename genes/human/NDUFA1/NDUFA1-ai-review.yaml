- id: PMID:10200266
  title: The NDUFA1 gene product (MWFE protein) is essential for activity of complex
    I in mammalian mitochondria.
  findings:
  - statement: >-
      MWFE/NDUFA1 is a 70-aa accessory subunit of mammalian Complex I, not one of
      the 14 core subunits, and is not itself catalytic.
    reference_section_type: ABSTRACT
    supporting_text: it is not one of the 14 polypeptides making up the core complex I
  - statement: >-
      MWFE is absolutely essential for an active Complex I; its loss reduces
      activity to <10%, restored by NDUFA1 cDNA complementation.
    reference_section_type: ABSTRACT
    supporting_text: the MWFE polypeptide is absolutely essential for an active complex I in mammals.
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Foundational functional paper for NDUFA1/MWFE; establishes it as a
      non-catalytic accessory subunit essential for Complex I activity. Abstract
      quotes verified against cached record.
