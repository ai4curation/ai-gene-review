  - id: file:human/GATD3/GATD3-deep-research-falcon.md
    title: Falcon deep research report on human GATD3 (P0DPI2).
    findings:
      - statement: GATD3A localizes primarily to the mitochondrial matrix with a
          smaller intermembrane-space pool; mitochondrial import depends on a
          cleaved N-terminal targeting signal.
        supporting_text: "Experimental fractionation and STED microscopy place GATD3A
          **primarily in the mitochondrial matrix**, with a smaller **intermembrane-space**
          pool"
      - statement: GATD3A is a mitochondrial matrix deglycase that removes early
          glycation adducts on nucleotides and proteins; conserved E62 and C176
          form the catalytic core.
        supporting_text: "Conserved catalytic residues include **E62** and **C176**
          in GATD3A; cysteine mutagenesis reduces activity"
      - statement: GATD3A preferentially addresses glyoxal (GO)-derived glycation,
          whereas DJ-1/PARK7 preferentially handles methylglyoxal (MGO)-derived
          modifications, suggesting complementary substrate coverage.
        supporting_text: "The evidence indicates that GATD3A preferentially addresses
          **glyoxal (GO)-derived** glycation chemistry, whereas DJ-1/PARK7 preferentially
          addresses **methylglyoxal (MGO)-derived** modifications under the tested
          conditions, implying partially complementary substrate coverage."
      - statement: GATD3A co-IPs with mitochondrial mRNA processing and translation
          factors LRPPRC, SLIRP, and TUFM/EFTu, consistent with positioning near
          mitochondrial translation machinery.
        supporting_text: "Mitochondrial co-immunoprecipitation/proteomics identify
          GATD3A-associated proteins that include:\n- **LRPPRC** and **SLIRP** (mitochondrial
          mRNA processing/stability)\n- **TUFM/EFTu** (mitochondrial translation elongation
          factor)"
      - statement: GATD3A deficiency drives fibroblast-like synoviocyte senescence
          and osteoarthritis via enhanced SIRT3-MDH2 binding, MDH2 deacetylation,
          and impaired TCA cycle flux; rAAV-GATD3A rescues OA in mice.
        supporting_text: "GATD3A deficiency increases **SIRT3 binding to MDH2**,
          leading to **MDH2 deacetylation** and **reduced MDH2 enzymatic activity**,
          impairing **TCA cycle flux** and driving mitochondrial dysfunction and
          senescence-associated phenotypes."
