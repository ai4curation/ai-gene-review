aliases:
  - Glutamine amidotransferase-like class 1 domain-containing protein 3
  - GATD3A
  - C21orf33
  - Mitochondrial deglycase
description: GATD3 (glutamine amidotransferase-like class 1 domain-containing 
  protein 3) is a mitochondrial matrix-localized deglycase that catalyzes the 
  removal of non-enzymatic glycation modifications produced during the Maillard 
  reaction. Through its glutamine amidotransferase-like catalytic domain, GATD3 
  removes early glycation intermediates (glyoxal and methylglyoxal adducts) from
  nucleotides and amino acids, thereby preventing formation of advanced 
  glycation end products (AGEs) within mitochondria. The protein contains a 
  critical Cys176 residue essential for deglycase activity. GATD3 protects 
  mitochondrial mRNA, ribosomal RNA, and ribosomal proteins from glycation 
  damage, maintaining mitochondrial translation capacity. It also regulates TCA 
  cycle function through interaction with malate dehydrogenase 2 (MDH2). GATD3 
  deficiency causes cellular senescence and mitochondrial dysfunction, and has 
  been implicated in osteoarthritis pathogenesis. Related to but evolutionarily 
  distinct from DJ-1/PARK7 deglycase.
