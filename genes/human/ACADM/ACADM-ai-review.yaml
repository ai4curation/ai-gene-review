core_functions:
- description: >-
    MCAD catalyzes the FAD-dependent, ETF-coupled alpha,beta-dehydrogenation of medium-chain
    acyl-CoA esters (optimum hexanoyl-/octanoyl-CoA, broadly C4-C12), the first and committed
    step of each cycle of mitochondrial fatty acid beta-oxidation, producing the corresponding
    trans-2-enoyl-CoA. This is the defining molecular function of the enzyme.
  molecular_function:
    id: GO:0070991
    label: medium-chain fatty acyl-CoA dehydrogenase activity
  directly_involved_in:
  - id: GO:0033539
    label: fatty acid beta-oxidation using acyl-CoA dehydrogenase
  - id: GO:0051793
    label: medium-chain fatty acid catabolic process
  locations:
  - id: GO:0005759
    label: mitochondrial matrix
  supported_by:
  - reference_id: PMID:1970566
    supporting_text: "The wild-type enzyme is a yellow protein due to the content of stoichiometric FAD and had a specific activity which is 50% of MCADH purified from pig kidney"
  - reference_id: PMID:8823175
    supporting_text: "The catalytically essential glutamate residue that initiates catalysis by abstracting the substrate alpha-hydrogen as H+ is located at position 376 (mature MCADH numbering) on loop JK in medium chain acyl-CoA dehydrogenase (MCADH)"
  - reference_id: PMID:3597357
    supporting_text: "the products of SCA dehydrogenase/butyryl-CoA, MCA dehydrogenase/octanoyl-CoA, and IV dehydrogenase/isovaleryl-CoA reactions were identified as crotonyl-CoA, 2-octenoyl-CoA, and 3-methylcrotonyl-CoA"
- description: >-
    Cofactor binding required for catalysis. Each MCAD subunit binds one non-covalently
    associated FAD, the redox cofactor that accepts the two electrons removed from the
    acyl-CoA substrate before passing them to ETF; FAD is essential for activity and gives the
    holoenzyme its characteristic yellow color.
  molecular_function:
    id: GO:0050660
    label: flavin adenine dinucleotide binding
  directly_involved_in:
  - id: GO:0006635
    label: fatty acid beta-oxidation
  locations:
  - id: GO:0005759
    label: mitochondrial matrix
  supported_by:
  - reference_id: PMID:1970566
    supporting_text: "The wild-type enzyme is a yellow protein due to the content of stoichiometric FAD"
  - reference_id: PMID:3597357
    supporting_text: "UV/visual spectra, fluorescence spectra, and other evidence indicated that each contains 1 mol of FAD per subunit"
proposed_new_terms: []
suggested_questions:
- question: >-
    What is the in vivo contribution of MCAD to the oxidation of the C12-C14 chain-length range,
    given the overlap with VLCAD/ACAD9, and does this overlap modulate MCAD-deficiency phenotype
    severity across tissues?
- question: >-
    Does reversible lysine acetylation (and SIRT3-mediated deacetylation) of MCAD meaningfully
    regulate medium-chain FAO flux in vivo, or is it a low-stoichiometry modification of limited
    physiological consequence?
suggested_experiments:
- description: >-
    Quantitative substrate-profiling of purified recombinant human MCAD across C4-C16 saturated
    and unsaturated acyl-CoAs using the ETF-coupled assay, to define the precise chain-length
    boundaries and rank-order efficiency that justify the medium-chain vs long-chain MF
    annotations and to test whether the C14/C16 RHEA-derived long-chain annotations are
    physiologically meaningful.
- description: >-
    Tissue-resolved subcellular fractionation plus super-resolution imaging in heart, liver, and
    cerebellar neurons to confirm that MCAD signal in non-canonical compartments (axon, nucleus,
    membrane fractions) is wholly accounted for by mitochondrial matrix localization.
