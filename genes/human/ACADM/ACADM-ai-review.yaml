id: P11310
gene_symbol: ACADM
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  ACADM (MCAD, medium-chain specific acyl-CoA dehydrogenase) is a mitochondrial matrix
  flavoenzyme that catalyzes the first, committed step of each cycle of mitochondrial fatty
  acid beta-oxidation for medium-chain acyl-CoA esters. It performs the FAD-dependent,
  stereospecific alpha,beta-dehydrogenation of a saturated acyl-CoA to the corresponding
  trans-2-enoyl-CoA, transferring electrons to the electron-transfer flavoprotein (ETF) and,
  via ETF-ubiquinone oxidoreductase, into the respiratory chain (EC 1.3.8.7). MCAD has broad
  medium-chain substrate preference with an optimum around hexanoyl-/octanoyl-CoA (C6-C8),
  extending across roughly C4-C12 and with weaker activity toward longer chains. The mature
  enzyme is a soluble homotetramer, each subunit carrying one non-covalently bound FAD, with a
  catalytic glutamate that abstracts the substrate alpha-proton. MCAD is expressed
  ubiquitously, highest in heart and muscle, and supports energy production from fat during
  fasting and increased energy demand. Loss-of-function variants in ACADM cause MCAD deficiency
  (ACADMD), the most common inherited fatty acid oxidation disorder, in which the prevalent
  c.985A>G (K304E) and other missense changes act largely by protein misfolding and impaired
  tetramer assembly, producing hypoketotic hypoglycemia during catabolic stress.
