    review_notes: >-
      PubMed-verified. This is the ACAD9 characterization paper, not an MCAD study; it is the
      cited support for MCAD's matrix/membrane GO localizations but only informs MCAD indirectly.
      Used here only for localization context.
- id: PMID:16972171
  title: Prolonged moderate-intensity exercise without and with L-carnitine supplementation
    in patients with MCAD deficiency.
  findings:
  - statement: >-
      In MCAD-deficient patients, exercise raised plasma free fatty acids and octanoylcarnitine
      (indicating increased FAO flux) and patients increased carnitine biosynthesis to compensate
      for carnitine losses.
    supporting_text: "A significant rise in plasma free fatty acids and octanoylcarnitine levels during exercise was seen in all patients, indicating a substantial increase in FAO during exercise"
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified clinical study. Supports MCAD's in vivo FAO role; the carnitine-process
      annotations it underpins are indirect compensatory physiology, not direct MCAD functions.
- id: PMID:1731887
  title: Structural organization and regulatory regions of the human medium-chain acyl-CoA
    dehydrogenase gene.
  findings:
  - statement: >-
      Describes the genomic organization and regulatory regions of the human ACADM gene;
      supports mitochondrial localization (TAS).
    supporting_text: "Structural organization and regulatory regions of the human medium-chain acyl-CoA dehydrogenase gene"
- id: PMID:1902818
  title: 'Molecular characterization of medium-chain acyl-CoA dehydrogenase (MCAD) deficiency:
    identification of a lys329 to glu mutation in the MCAD gene, and expression of inactive
    mutant enzyme protein in E. coli.'
  findings:
  - statement: >-
      Established the K329E (K304E) mutation as causative of MCAD deficiency and showed the
      mutant enzyme is inactive due to failure to form active tetramers, while mature MCAD is
      intra-mitochondrial.
    supporting_text: "mutant MCAD, which was demonstrated to be inactive, probably because of the inability to form active tetrameric MCAD"
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified. Direct genetic and biochemical evidence for MCAD function and the
      tetramer-assembly requirement; underpins multiple core annotations.
- id: PMID:19224950
  title: Protein misfolding is the molecular mechanism underlying MCADD identified in newborn
    screening.
  findings:
  - statement: >-
      Recombinant human MCAD is a homotetramer; disease variants (including K304E) cause
      misfolding/aggregation and loss of function. Defines MCAD's domain architecture and
      octanoyl-CoA kinetics.
    supporting_text: "Wild-type MCAD was eluted in the tetrameric form with an almost negligible amount of aggregates"
  - statement: >-
      MCAD is an ACAD-family flavoprotein that catalyzes the first step of mitochondrial
      beta-oxidation of medium-chain fatty acids.
    supporting_text: "MCAD is a member of the acyl-CoA dehydrogenase (ACAD) family of flavoproteins, which catalyzes the first step of the mitochondrial β-oxidation of medium-chain fatty acids"
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified, full text available. Strong support for MCAD molecular function,
      homotetrameric quaternary structure, and the misfolding loss-of-function disease mechanism.
- id: PMID:1970566
  title: Characterization of wild-type and an active site mutant of human medium chain acyl-CoA
    dehydrogenase after expression in Escherichia coli.
  findings:
  - statement: >-
      Recombinant human MCAD is a yellow flavoprotein with stoichiometric FAD; the active-site
      glutamate (Glu376 mature numbering) is the catalytic proton-abstracting base, its mutation
      abolishing activity.
    supporting_text: "The wild-type enzyme is a yellow protein due to the content of stoichiometric FAD and had a specific activity which is 50% of MCADH purified from pig kidney"
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified. Establishes MCAD catalytic activity, FAD content, and the catalytic-base
      mechanism; primary support for the core MF and FAD-binding functions.
- id: PMID:21237683
  title: Identification and characterization of new long chain acyl-CoA dehydrogenases.
  findings:
  - statement: >-
      Characterized the human ACAD family in cerebellum; MCAD was localized to the molecular
      layer and axons of specific neurons, supporting medium-chain dehydrogenase activity and
      neuronal expression.
    supporting_text: "MCAD in the molecular layer and axons of specific neurons"
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified. Primary subject is ACAD10/ACAD11/ACAD9, but MCAD is directly assayed and
      mapped; supports the EXP MF annotation and the (non-core) axon localization.
- id: PMID:21630459
  title: Proteomic characterization of the human sperm nucleus.
  findings:
  - statement: >-
      High-throughput sperm-nucleus proteome in which MCAD was detected; preparation explicitly
      depleted of mitochondria, making the nuclear detection most consistent with residual
      contamination for a matrix enzyme.
    supporting_text: "sperm nuclei were obtained through CTAB treatment and isolated to over 99.9% purity without any tail fragments, acrosome or mitochondria"
  reference_review:
    relevance: LOW
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified. Supports the HDA nucleus annotation, which is over-annotated for a
      mitochondrial matrix enzyme; included for completeness.
- id: PMID:2393404
  title: Identification of a common mutation in patients with medium-chain acyl-CoA dehydrogenase
    deficiency.
  findings:
  - statement: >-
      Identified the prevalent K329E (K304E) MCAD mutation present in ~91% of mutant alleles,
      establishing it as the common cause of MCAD deficiency.
    supporting_text: "A single A to G nucleotide replacement which resulted in lysine329-to-glutamic acid329 substitution of the MCAD protein was identified in all cultures"
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified. Foundational genetics of MCAD deficiency; supports the core FAO/activity
      annotations via loss-of-function.
- id: PMID:25416781
  title: Human METTL20 is a mitochondrial lysine methyltransferase that targets the β subunit
    of electron transfer flavoprotein (ETFβ) and modulates its activity.
  findings:
  - statement: >-
      MCAD is one of the ETF-dependent dehydrogenases; methylation of ETFβ by METTL20 reduces
      ETF's ability to receive electrons from MCAD, confirming MCAD operates via ETF in
      beta-oxidation.
    supporting_text: "METTL20-mediated methylation of ETFβ in vitro reduced its ability to receive electrons from the medium chain acyl-CoA dehydrogenase and the glutaryl-CoA dehydrogenase"
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified, full text available. Primary subject is METTL20/ETFβ; MCAD is used as a
      model ETF-coupled dehydrogenase, supporting its ETF-dependent FAO process annotation.
- id: PMID:34800366
  title: Quantitative high-confidence human mitochondrial proteome and its dynamics in cellular
    context.
  findings:
  - statement: >-
      MCAD was identified in the high-confidence human mitochondrial proteome (MitoCoP),
      confirming mitochondrial localization.
    supporting_text: "defined a mitochondrial high-confidence proteome of >1,100 proteins (MitoCoP)"
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified, full text available. High-throughput confirmation of mitochondrial
      localization.
- id: PMID:3597357
  title: Purification and properties of short chain acyl-CoA, medium chain acyl-CoA, and
    isovaleryl-CoA dehydrogenases from human liver.
  findings:
  - statement: >-
      Purified human liver MCAD is a homotetramer with 1 FAD per subunit that converts
      octanoyl-CoA to 2-octenoyl-CoA using ETF as electron acceptor.
    supporting_text: "the products of SCA dehydrogenase/butyryl-CoA, MCA dehydrogenase/octanoyl-CoA, and IV dehydrogenase/isovaleryl-CoA reactions were identified as crotonyl-CoA, 2-octenoyl-CoA, and 3-methylcrotonyl-CoA"
  - statement: >-
      Each of the purified dehydrogenases is a homotetramer (native MW ~178,000 for MCAD) using
      ETF or PMS as electron acceptor.
    supporting_text: "They all utilized electron transfer flavoprotein (ETF) or phenazine methosulfate (PMS) as an electron acceptor"
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified. Classic biochemical characterization of native human liver MCAD;
      establishes homotetramer, FAD content, ETF coupling, and reaction product.
- id: PMID:8823175
  title: 'Medium-long-chain chimeric human Acyl-CoA dehydrogenase: medium-chain enzyme with
    the active center base arrangement of long-chain Acyl-CoA dehydrogenase.'
  findings:
  - statement: >-
      The catalytic base of MCAD is Glu376 (mature numbering) on loop JK; its position
      (versus Glu255 on helix G in LCAD/IVD) is a key determinant of chain-length specificity,
      with native MCAD peaking at hexanoyl/octanoyl-CoA.
    supporting_text: "The catalytically essential glutamate residue that initiates catalysis by abstracting the substrate alpha-hydrogen as H+ is located at position 376 (mature MCADH numbering) on loop JK in medium chain acyl-CoA dehydrogenase (MCADH)"
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified. Defines MCAD active-site base and the structural basis of medium-chain
      specificity; primary support for core MF.
