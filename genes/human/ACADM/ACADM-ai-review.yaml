  findings:
  - statement: >-
      Used by GOA to support MCAD mitochondrial matrix/membrane localization; the paper's primary
      subject is the paralog ACAD9 and its dimeric, membrane-associated character.
    supporting_text: "Submitochondrial fractionation studies found native ACAD-9 to be associated with the mitochondrial membrane"
