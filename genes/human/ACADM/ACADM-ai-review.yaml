  review:
    summary: >-
      Annotation reflecting MCAD's homotetrameric assembly (the study analyzed oligomerization and
      showed WT elutes as a tetramer, with disease variants failing to assemble). The
      "identical protein binding" term captures self-association but is uninformative as a
      molecular function and does not describe MCAD's catalytic activity. The homotetramer is
