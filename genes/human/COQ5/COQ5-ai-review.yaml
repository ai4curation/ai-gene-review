- id: PMID:25152161
  title: Molecular characterization of the human COQ5 C-methyltransferase in coenzyme
    Q10 biosynthesis.
  findings:
  - statement: >-
      COQ5 catalyzes the only C-methylation in coenzyme Q biosynthesis and is a
      component of the CoQ synthome; the human polypeptide localizes to the
      matrix side of the mitochondrial inner membrane and partially complements
      yeast coq5 mutants.
    reference_section_type: RESULTS
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      PMC full text available; directly establishes COQ5 function, localization,
      COQ4 interaction and yeast complementation.
- id: PMID:27499296
  title: Mitochondrial Protein Interaction Mapping Identifies Regulators of Respiratory
    Chain Function.
  findings:
  - statement: >-
      Interaction-mapping study that identified COQ5 within the COQ enzyme
      complex and provided IDA/IPI evidence for its inner-membrane localization
      and synthome membership.
    reference_section_type: RESULTS
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Cached text is abstract-only; the IDA/IPI annotations were made by
      ComplexPortal/IntAct curators from the full text (consistent with UniProt
      SUBUNIT citing this paper for the COQ complex).
- id: PMID:28927698
  title: Biochemistry of Mitochondrial Coenzyme Q Biosynthesis.
  findings:
  - statement: >-
      Review of mitochondrial coenzyme Q biosynthesis describing the COQ
      synthome and the role of COQ5 as the C-methyltransferase.
    reference_section_type: DISCUSSION
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: Review article; source of the ComplexPortal NAS BP assertion.
- id: PMID:34800366
  title: Quantitative high-confidence human mitochondrial proteome and its dynamics
    in cellular context.
  findings:
  - statement: COQ5 detected in the high-confidence human mitochondrial proteome.
    reference_section_type: RESULTS
  reference_review:
    relevance: LOW
    correctness: VERIFIED
    review_notes: High-throughput proteomics; supports mitochondrial localization only.
- id: PMID:35614220
  title: Defining mitochondrial protein functions through deep multiomic profiling.
  findings:
  - statement: >-
      Deep multiomic profiling identified the direct PYURF-COQ5 interaction;
      PYURF stabilizes COQ5 and associates with the COQ enzyme complex. Also
      supports inner-membrane localization of COQ5.
    reference_section_type: RESULTS
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Cached text is abstract-only (full_text_available false); UniProt cites
      this paper for the COQ5-PYURF interaction and inner-membrane location.
- id: PMID:38425362
  title: In vitro construction of the COQ metabolon unveils the molecular determinants
    of coenzyme Q biosynthesis.
  findings:
  - statement: >-
      In vitro reconstruction of the animal COQ metabolon showed that COQ5
      performs the C2 methylation step using SAM (kcat 2.4 min-1, KM 444 uM) and
      co-elutes with COQ3/4/6/7/9 as a complex.
    reference_section_type: RESULTS
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      PMC full text; direct biochemical demonstration of COQ5 catalytic activity
      and metabolon assembly.
- id: PMID:29044765
  title: 'A novel inborn error of the coenzyme Q10 biosynthesis pathway: cerebellar
    ataxia and static encephalomyopathy due to COQ5 C-methyltransferase deficiency.'
  findings:
  - statement: >-
      Biallelic COQ5 variants cause primary coenzyme Q10 deficiency (COQ10D9)
      with cerebellar ataxia and static encephalomyopathy.
