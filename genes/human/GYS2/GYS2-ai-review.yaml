- term:
    id: GO:0009749
    label: response to glucose
  evidence_type: ISS
  original_reference_id: GO_REF:0000024
  qualifier: involved_in
  review:
    summary: >-
      Response to glucose transferred by sequence similarity from the yeast glycogen synthase
      orthologue (Saccharomyces cerevisiae Gsy2, UniProtKB:P17625). Plausible for a
      glucose-storage enzyme but peripheral to the core catalytic role and not experimentally
      verified in human GYS2.
    action: KEEP_AS_NON_CORE
    reason: >-
      Glycogen synthase activity is downstream of glucose availability and glucose-6-phosphate
      (its allosteric activator), so a role in the cellular response to glucose is biologically
      plausible. However, this is an ISS transfer from a distant fungal orthologue rather than a
      direct human observation, and it describes a regulatory/physiological context rather than
      the committed catalytic function; retained as a non-core annotation.
    supported_by:
    - reference_id: file:human/GYS2/GYS2-uniprot.txt
      supporting_text: 'ACTIVITY REGULATION: Allosteric activation by glucose-6-phosphate'
