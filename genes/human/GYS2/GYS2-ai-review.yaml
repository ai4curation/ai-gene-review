id: P54840
gene_symbol: GYS2
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  GYS2 is the liver isoform of glycogen synthase (EC 2.4.1.11), the committed and
  rate-limiting enzyme of hepatic glycogen chain elongation. Using UDP-glucose as the
  glucosyl donor, it transfers glucose residues in alpha-1,4-glycosidic linkage to the
  non-reducing ends of a growing glycogen chain that has been primed by glycogenin; the
  branching enzyme GBE1 subsequently introduces the alpha-1,6 branch points. GYS2 is a
  soluble cytosolic enzyme that assembles with glycogenin into a glycogen synthase-glycogenin
  complex. Its activity is tightly regulated: it is allosterically activated by
  glucose-6-phosphate and inhibited by multisite phosphorylation (by kinases including GSK3
  and casein kinase 2), with dephosphorylation by protein phosphatase 1 restoring activity.
  Expression is essentially liver-specific. Biallelic loss-of-function mutations in GYS2
  cause glycogen storage disease type 0, liver form (GSD 0a), characterized by fasting
  ketotic hypoglycemia with low blood lactate and alanine, postprandial hyperglycemia and
  hyperlactatemia, and deficient hepatic glycogen.
