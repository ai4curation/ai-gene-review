- term:
    id: GO:0061547
    label: glycogen synthase activity, transferring glucose-1-phosphate
  evidence_type: IEA
  original_reference_id: GO_REF:0000117
  qualifier: enables
  review:
    summary: >-
      Captures the minor phosphoglucose-incorporation side reaction of glycogen synthase, in
      which a glucose-phosphate is occasionally transferred, introducing phosphomonoesters
      into glycogen.
    action: ACCEPT
    reason: >-
      This is a genuine, documented low-frequency capability of glycogen synthase (GYS1/GYS2):
      roughly one phosphorylated glucose is incorporated per ten thousand glucose units, and
      laforin (EPM2A) normally removes these phosphate groups. The ARBA electronic assignment
      of this specific activity is biologically appropriate for GYS2, so it is kept rather
      than removed; it is a minor side activity relative to the core UDP-glucose donor
      elongation.
    supported_by:
    - reference_id: Reactome:R-HSA-3780994
      supporting_text: >-
        Glycogen synthase 2 (GYS2) catalyzes the incorporation of phosphoglucose into the
        glycogen-GYG1 molecules with which it is associated in a cytosolic glycogen granule.
