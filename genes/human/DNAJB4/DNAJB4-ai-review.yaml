suggested_questions:
- question: What is the specific client repertoire of DNAJB4 at the muscle Z-disc,
    and which clients accumulate/aggregate upon DNAJB4 loss to drive CMYO21 myopathology?
- question: Is DNAJB4 functionally redundant with its paralogs DNAJB1 and DNAJB6 in
    muscle, and does the Z-disc role overlap with the DNAJB6 LGMD-D1 mechanism?
suggested_experiments:
- description: Affinity purification-mass spectrometry of tagged DNAJB4 from muscle
    cells (with HSP70 as co-bait) to define its client interactome and compare with
    DNAJB6.
- description: Reconstituted ATPase and disaggregation/refolding assays comparing wild-type
    DNAJB4 with CMYO21 variants (R25Q, L262S, K286Ter) to quantify loss of HSP70-stimulating
    and client-handling activity.
