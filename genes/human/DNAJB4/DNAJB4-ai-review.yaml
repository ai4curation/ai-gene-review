id: Q9UDY4
gene_symbol: DNAJB4
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: DNAJB4 (HLJ1, "human liver DnaJ-like protein"; also DNAJW) is a cytosolic
  HSP40/J-domain co-chaperone of the DNAJB subfamily and a paralog of DNAJB1. Through
  its N-terminal J domain it stimulates the ATPase activity of HSP70 (HSPA1A/HSPA1B),
  binding misfolded client proteins and delivering them to HSP70 to drive their folding,
  refolding and disaggregation. It is a homodimer, is heat-inducible, and is broadly
  expressed with high levels in striated muscle, where it localizes to the sarcomeric
  Z-disc and contributes to myofibril/Z-disc proteostasis. Biallelic loss-of-function
  variants in DNAJB4 cause an autosomal recessive congenital myopathy with early respiratory
  failure (CMYO21), reflecting its role as a muscle chaperone. It also interacts with
  the mu-opioid receptor (OPRM1) C-terminal tail and with aggregation-prone clients
  such as huntingtin and ataxin-1.
