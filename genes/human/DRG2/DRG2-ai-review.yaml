suggested_questions:
- question: Does human DRG2 physically associate with translating ribosomes (as known for DRG-family GTPases) and at what step does its GTPase cycle act on translation?
- question: How does DFRP2/RWDD1 binding regulate DRG2's GTPase activity, stability, and ribosome association?
- question: What is the functional role of JMJD7-mediated Lys-21 hydroxylation in switching DRG2 between GTPase and RNA-binding/translation activities?
suggested_experiments:
- description: Ribosome co-sedimentation / polysome profiling with tagged DRG2 (with and without RWDD1) to test ribosome association and translational state dependence.
- description: In vitro GTP-hydrolysis assays of DRG2 alone and in complex with DFRP2/RWDD1 to define cofactor effects on GTPase kinetics.
- description: Compare RNA binding and translation phenotypes of wild-type DRG2 versus a Lys-21 hydroxylation-deficient mutant and in JMJD7-knockout cells.
