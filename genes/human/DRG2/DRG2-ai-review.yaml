- id: file:human/DRG2/DRG2-deep-research-falcon.md
  title: Falcon deep research report for DRG2
  reference_review:
    relevance: HIGH
    correctness: UNVERIFIED
    review_notes: "LLM-synthesized (Edison/Falcon) deep-research report; treated as
      UNVERIFIED pending primary-source checking. DRG2-SPECIFIC, well-anchored claims:
      DRG2 forms an obligate heterodimer with DFRP2/RWDD1 that stabilizes it against
      degradation; DRG2 is a JMJD7 substrate hydroxylated at Lys21 in the N-terminal
      HTH domain, which promotes RNA binding without altering stability/GTPase
      activity (Markolovic 2018, PMID:29915238); DRG2 localizes to cytoplasm, nucleus
      and Rab5-positive early endosomes; the DRG2-specific endosomal/Rab5 and PD-L1
      recycling role derives from a genuine DRG2 paper (Choi 2024,
      doi:10.1038/s41420-024-02027-x). GENERALIZED / EXTRAPOLATED-FROM-PARALOG claims
      to treat cautiously: the 'general translation factor that rescues stalled/paused
      ribosomes and stimulates peptidyl transfer' mechanism rests on DRG1, bacterial
      Obg, and yeast Rbg2 orthologs plus 2024 preprints (jin2024/hawk2024,
      westrip2024), and the report itself states direct biochemical characterization
      of human DRG2 GTPase activity (e.g. K+-dependence) is limited and inferred from
      DRG1. The Gcn1-mediated collided-ribosome recruitment and DNAJC2/co-chaperone
      links are speculative. No annotation was added or removed on the basis of this
      report alone; it is used only to corroborate the existing ribosome/translation
      framing."
  findings:
  - statement: DRG2, with its paralog DRG1, is reported as a translation factor that
      associates with stalled/paused ribosomes via its DFRP2 partner; human-specific
      GTPase biochemistry is largely inferred from DRG1 and ortholog studies.
    reference_section_type: RESULTS
