      supporting_text: may bind to RNA and play a role in translation
    - reference_id: file:human/DRG2/DRG2-deep-research-falcon.md
      supporting_text: DRG2, in complex with its binding partner DFRP2, associates with ribosomes that have paused or stalled during translation elongation
