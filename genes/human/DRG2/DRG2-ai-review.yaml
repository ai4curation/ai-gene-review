- term:
    id: GO:0002181
    label: cytoplasmic translation
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: involved_in
  review:
    summary: DRG2 is a ribosome-associated translational GTPase, so a broad "cytoplasmic translation" process annotation is plausible by phylogenetic inference. Recent work frames DRG2 (with its paralog DRG1) as a translation factor that associates with stalled/paused ribosomes through its DFRP2 partner, but the detailed mechanism (e.g. stimulation of peptidyl transfer) is largely extrapolated from DRG1, bacterial Obg, and yeast Rbg2 orthologs rather than directly demonstrated for human DRG2. The specific regulatory role of human DRG2 in translation therefore remains imprecisely defined, so this broad term is retained as non-core.
    action: KEEP_AS_NON_CORE
    reason: DRG/OBG-family GTPases associate with translating ribosomes, but the broad cytoplasmic translation term does not capture a specific mechanism; the informative core is the GTPase activity. The falcon deep-research synthesis supports a ribosome/translation association for DRG2 but the stalled-ribosome rescue mechanism is inferred from paralogs and ortholog structures, so the term is kept non-core in line with handling of broad translation terms for ribosome-associated factors.
    supported_by:
