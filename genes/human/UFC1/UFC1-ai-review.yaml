core_functions:
- description: E2 UFM1-conjugating enzyme that accepts activated UFM1 from the E1 enzyme
    UBA5 via a thioester intermediate at its catalytic Cys-116 and, with the UFL1/DDRGK1
    E3 ligase, transfers UFM1 onto substrate lysines (notably RPL26/uL24 on ER-bound
    60S ribosomes).
  molecular_function:
    id: GO:0061657
    label: UFM1 conjugating enzyme activity
  locations:
  - id: GO:0005737
    label: cytoplasm
  supported_by:
  - reference_id: file:human/UFC1/UFC1-uniprot.txt
    supporting_text: Accepts the ubiquitin-like modifier UFM1 from the E1 enzyme UBA5
      and forms an intermediate with UFM1 via a thioester linkage
  - reference_id: PMID:15071506
    supporting_text: Activated Ufm1 is then transferred to its cognate
proposed_new_terms: []
suggested_questions:
- question: Beyond RPL26/uL24, what is the full physiological substrate repertoire
    of UFC1-dependent ufmylation, and which substrates are direct E2 products versus
    E3-determined?
- question: How do the disease variants R23Q and T106I mechanistically reduce thioester
    formation, and does residual activity correlate with phenotype severity?
suggested_experiments:
- description: Reconstitute the UBA5-UFC1-UFL1/DDRGK1 cascade in vitro with purified
    components and 60S ribosomes to quantify the kinetic contribution of UFC1 active-site
    activation to RPL26 ufmylation.
- description: CRISPR knock-in of UFC1 catalytic (C116S) or disease (R23Q/T106I) alleles
    in cells followed by ribosome-ufmylation and ER-RQC reporter assays to test the
    requirement of E2 activity for 60S recycling.
