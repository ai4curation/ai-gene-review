gene_symbol: UFC1
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: UFC1 (Ubiquitin-fold modifier-conjugating enzyme 1) is the E2-like conjugating
  enzyme of the UFM1 (ufmylation) cascade, a ubiquitin-like protein-conjugation system
  that proceeds through E1 (UBA5), E2 (UFC1) and E3 (UFL1/DDRGK1/CDK5RAP3) enzymes.
  UFC1 accepts the activated ubiquitin-fold modifier UFM1 from the E1 enzyme UBA5 and
  forms a thioester-linked intermediate at its catalytic cysteine (Cys-116), then,
  in concert with the UFL1-DDRGK1 E3 ligase, transfers UFM1 onto substrate lysines.
  The principal physiological substrate is the 60S ribosomal protein RPL26/uL24 on
  endoplasmic-reticulum-bound ribosomes, where ufmylation promotes recycling of post-termination
  or stalled 60S subunits from SEC61 translocons and supports ribosome-associated quality
  control. UFMylation more broadly participates in the response to ER stress, reticulophagy
  (ER-phagy), DNA-damage signaling and innate-immune/interferon signaling. UFC1 is
  a small (167 aa) cytosolic protein structurally related to ubiquitin-conjugating
  (E2) enzymes; biallelic loss-of-function variants cause a neurodevelopmental disorder
  with spasticity and poor growth, underscoring an essential role of ufmylation in
  brain development.
