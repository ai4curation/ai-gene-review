proposed_new_terms: []
suggested_questions:
- question: Which ESCRT-dependent cellular contexts require VPS4A specifically rather than VPS4B or mixed VPS4A/VPS4B assemblies?
- question: Is there direct human-cell evidence that VPS4A participates in phagophore closure, late endosomal microautophagy, or another autophagy subtype independent of its generic ESCRT-III disassembly role?
- question: Which disease-associated VPS4A variants selectively perturb ATP hydrolysis, ESCRT-III recognition, hexamer assembly, or recruitment to specific membrane compartments?
suggested_experiments:
- description: Use rescue assays after VPS4A/VPS4B double depletion with wild-type, ATPase-dead, and MIT-interface VPS4A mutants across MVB cargo sorting, cytokinesis, nuclear-envelope sealing, and autophagy assays.
  hypothesis: ATPase activity and ESCRT-III recognition are separable requirements whose importance differs by ESCRT-dependent cellular context.
- description: Measure endogenous VPS4A recruitment and ESCRT-III turnover during phagophore closure or late endosomal microautophagy with live-cell imaging and acute VPS4A-specific perturbation.
  hypothesis: If VPS4A has a direct autophagy role, it should be transiently recruited to the relevant membrane and required for ESCRT-III turnover there.
- description: Biochemically compare VPS4A and VPS4B disassembly of defined human CHMP2A-CHMP3, CHMP4, and mixed ESCRT-III polymers.
  hypothesis: VPS4A has conserved ATP-driven ESCRT-III disassembly activity but may differ from VPS4B in substrate preference or kinetics.
