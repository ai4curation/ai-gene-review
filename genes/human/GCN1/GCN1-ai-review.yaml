  title: Drug-induced eRF1 degradation promotes readthrough and reveals a new branch of ribosome quality control.
  findings:
  - statement: Drug-induced stalling triggers a branch of ribosome-associated quality control involving the translational stress sensor GCN1 and the E3 ligases RNF14 and RNF25, leading to eRF1 degradation.
    reference_section_type: ABSTRACT
- id: PMID:37951215
  title: K6-linked ubiquitylation marks formaldehyde-induced RNA-protein crosslinks for resolution.
  findings:
  - statement: Formaldehyde-induced RNA-protein crosslinks in mRNA stall ribosomes and are marked by RNF14-catalyzed K6-linked ubiquitylation and resolved by VCP; GCN1 acts as the collision sensor in this pathway.
    reference_section_type: ABSTRACT
- id: PMID:37951216
