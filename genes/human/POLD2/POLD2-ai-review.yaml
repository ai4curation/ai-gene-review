id: P49005
gene_symbol: POLD2
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  POLD2 (p50) is the essential B-subunit of human DNA polymerase delta (Polδ), a B-family
  replicative polymerase that synthesizes DNA at both the lagging and leading strands and
  participates in multiple repair-associated DNA synthesis pathways (BER long-patch, NER,
  MMR, HRR, break-induced replication, TLS). Polδ is a heterotetramer of the catalytic
  subunit POLD1 (p125) plus the accessory subunits POLD2 (p50), POLD3 (p66/p68), and POLD4
  (p12); POLD2 is non-catalytic but has a central structural/organizational role, bridging
  POLD1 with POLD3 and stabilizing the complex (Conde et al. 2019; Alli et al. 2024). POLD2
  and POLD3 are also shared with translesion polymerase Pol ζ4 (REV3-REV7-POLD2-POLD3),
  providing a structural platform for Pol δ↔Pol ζ catalytic-subunit switching at
  replication-blocking lesions (Lee et al. 2014/Makarova et al. 2012; Wu et al. 2023).
  POLD2 directly contacts the [4Fe-4S] cluster of the POLD1/REV3 C-terminal domain and is
  the principal interaction partner for Pol η's FF483-484 motif, linking POLD2 to
  polymerase switching during damage tolerance (Baldeck et al. 2015). POLD2 is essential
  in human cells; a homozygous p.Asp293Asn variant destabilizes the Polδ complex and
  causes an autosomal-recessive syndrome of replicative stress, neurodevelopmental
  abnormalities, and combined immunodeficiency (Conde et al. 2019). Its core localization
  is nuclear (nucleoplasm/replication factories) where it acts as part of Polδ and Polζ4
  complexes.
