  - term:
      id: GO:0003677
      label: DNA binding
    evidence_type: IEA
    original_reference_id: GO_REF:0000002
    review:
      summary: >-
        IEA from InterPro. POLD2 in isolation has not been shown to bind DNA directly;
        the cocrystal structure of POLD2 with the POLD3 NTD shows "a primarily
        negatively charged molecular surface without obvious features for DNA binding"
        (Lee et al. 2014). DNA contacts in Polδ are dominated by POLD1/POLD3. This is
        a generic IEA that is at best indirect; mark as over-annotated.
      action: MARK_AS_OVER_ANNOTATED
      supported_by:
        - reference_id: PMID:24449906
          supporting_text: >-
            The cocrystal structure of human PolD2 and the NTD of PolD3 has been
            determined ( 35 ) and shows a primarily negatively charged molecular
            surface without obvious features for DNA binding.
