proposed_new_terms:
  - proposed_name: lagging strand elongation as a function of Polδ holoenzyme subunit
    proposed_definition: >-
      Although GO:0006273 (lagging strand elongation) exists and could be added to POLD2
      annotations, no new term is strictly required; consider IBA propagation of
      GO:0006273 to POLD2 to capture its lagging-strand-specific contribution as part of
      Polδ.
suggested_questions:
  - question: >-
      What is the mechanistic basis for the directionality of subunit assembly in Polδ —
      does POLD2 dimerize with POLD3 first and then dock onto POLD1, or does POLD1-POLD2
      preassembly precede POLD3 incorporation?
  - question: >-
      How is the partitioning of the POLD2-POLD3 dimer between Polδ (with POLD1) and Polζ4
      (with REV3-REV7) regulated in vivo, and does this stoichiometry change in response
      to replication stress or DNA damage?
  - question: >-
      Does the POLD2 [4Fe-4S]-coordinating interface with the POLD1/REV3 C-terminal
      domain mediate redox-dependent regulation of Polδ↔Polζ switching, as proposed by
      Makarova et al. (PMID:22465957)?
  - question: >-
      Are there isoform-specific or post-translationally modified pools of POLD2 dedicated
      to particular repair pathways (e.g., MMR vs. NER) versus bulk replication?
suggested_experiments:
  - description: >-
      Use rapid auxin-inducible degron (AID2) depletion of POLD2 in human cells coupled
      with iPOND/NCC-MS to define which replisome and repair complexes lose stoichiometry
      first, distinguishing assembly defects from catalytic loss.
  - description: >-
      Solve the cryo-EM structure of the full human Polδ4 holoenzyme on a primer-template
      with PCNA to define the POLD2-POLD1 and POLD2-POLD3 interfaces at near-atomic
      resolution and rationalize the D293N disease variant.
  - description: >-
      Perform separation-of-function alleles of POLD2 that selectively disrupt the
      POLD2-POLD3 interface vs. the POLD2-POLD1 interface vs. the POLD2-REV3 interface,
      and test for distinct replication, repair, and TLS phenotypes (replication stress,
      mutagenesis, MiDAS, cisplatin sensitivity).
  - description: >-
      Test whether POLD2 directly contacts the [4Fe-4S] cluster of POLD1 in vitro and
      whether its binding affinity to POLD1 vs. REV3 is modulated by the oxidation state
      of the cluster.
