    title: >-
      Mitotic DNA synthesis in response to replication stress requires the sequential
      action of DNA polymerases zeta and delta in human cells.
    findings:
      - statement: >-
          POLD2 (with POLD3) is a shared subunit of Polδ and Polζ4; the two
          polymerases act sequentially in mitotic DNA synthesis (MiDAS) to complete
          under-replicated regions, providing a replication-stress context where
          POLD2 contributes to both replicative and TLS complexes.
        supporting_text: >-
          More recently, it was revealed that human Pol ζ can contain 2 subunits in
          addition to REV3 and REV7, and this holoenzyme is referred to as Pol ζ444.
          These two additional subunits are POLD2 and POLD3, both of which are also
          subunits of human Pol δ.
