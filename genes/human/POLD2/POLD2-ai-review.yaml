  - id: PMID:31449058
    title: Polymerase δ deficiency causes syndromic immunodeficiency with
      replicative stress.
    findings:
      - statement: >-
          Polδ is a heterotetramer of POLD1 (catalytic) + POLD2 + POLD3 + POLD4 and is
          essential for eukaryotic genome duplication on both leading and lagging
          strands.
        supporting_text: >-
          The mammalian polymerase δ complex is a heterotetramer consisting of the
          catalytic subunit POLD1 and the accessory subunits POLD2, POLD3, and POLD4
      - statement: >-
          POLD2 plays a central structural role in interacting with both POLD1 and
          POLD3, and POLD2/POLD3 are shared with the Pol ζ translesion complex.
        supporting_text: >-
          The specific function of the POLD2 subunit has been poorly explored, despite
          its central structural role in interacting with both POLD1 and POLD3 ( 12 ).
          Interestingly, POLD2 and POLD3 participate in translesion synthesis (TLS)
          via their interaction with the polymerase ζ complex
      - statement: >-
          A homozygous POLD2 p.Asp293Asn variant destabilizes the Polδ complex,
          reduces POLD1/POLD2/POLD3 protein levels, and causes an autosomal-recessive
          syndrome of replicative stress, neurodevelopmental abnormalities, and
          combined immunodeficiency; WT POLD2 rescue restores complex stability and
          reduces 53BP1 bodies.
        supporting_text: >-
          In patients from 2 independent pedigrees, we have identified what we believe
          to be a novel syndrome with reduced functionality of the polymerase δ
          complex caused by germline biallelic mutations in POLD1 or POLD2 as the
          underlying etiology of a previously unknown autosomal-recessive syndrome
          that combines replicative stress, neurodevelopmental abnormalities, and
          immunodeficiency.
