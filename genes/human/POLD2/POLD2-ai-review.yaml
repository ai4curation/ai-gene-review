  - id: PMID:22465957
    title: DNA polymerase δ and ζ switch by sharing accessory subunits of DNA
      polymerase δ.
    findings:
      - statement: >-
          POLD2 (the B-subunit) binds equally well to the catalytic subunits of either
          Polδ (POLD1) or Polζ (REV3); the highly conserved CTDs of POLD1 and REV3
          contain a [4Fe-4S] cluster that mediates binding to POLD2 and is critical
          for UV mutagenesis.
        supporting_text: >-
          ( i ) the B-subunit of Pol δ binds equally well to the catalytic subunit of
          either Pol δ or Pol ζ; ( ii ) the CTDs of Pol δ and Pol ζ contain a [4Fe-4S]
          cluster, which is critical for binding to the B-subunit and for UV
          light-induced mutagenesis
      - statement: >-
          Pol δ↔Pol ζ switching at lesions occurs via exchange of catalytic subunits on
          a preassembled platform of the shared accessory subunits POLD2 and POLD3.
        supporting_text: >-
          we propose that Pol switches at replication-blocking lesions occur by the
          exchange of the Pol δ and Pol ζ catalytic subunits on a preassembled complex
          of accessory proteins retained on DNA during translesion DNA synthesis.
  - id: PMID:24449906
    title: Human Pol ζ purified with accessory subunits is active in translesion
      DNA synthesis and complements Pol η in cisplatin bypass.
    findings:
      - statement: >-
          Human Pol ζ purifies as a four-subunit complex (Pol ζ4 = REV3-REV7-POLD2-
          POLD3) that is far more efficient and processive at bypassing cisplatin
          lesions than two-subunit Pol ζ2 (REV3-REV7).
        supporting_text: >-
          The purified four-subunit Pol ζ4 (Rev3–Rev7–PolD2–PolD3) is much more
          efficient and more processive at bypassing a 1,2-intrastrand
          d(GpG)-cisplatin cross-link than the two-subunit Pol ζ2 (Rev3–Rev7).
      - statement: >-
          The POLD2-POLD3 cocrystal structure presents a negatively charged surface
          without obvious DNA-binding features; POLD2 contributes to Pol ζ4 activity
          via protein-protein contacts rather than direct DNA binding.
        supporting_text: >-
          The cocrystal structure of human PolD2 and the NTD of PolD3 has been
          determined ( 35 ) and shows a primarily negatively charged molecular
          surface without obvious features for DNA binding.
  - id: PMID:25662213
    title: >-
      FF483-484 motif of human Polη mediates its interaction with the POLD2 subunit of
      Polδ and contributes to DNA damage tolerance.
    findings:
      - statement: >-
          POLD2 is the direct binding partner of the FF483-484 motif of human Polη;
          this interaction is required for efficient TLS at CPDs and for survival of
          XPV cells after UV irradiation, supporting a Polη↔Polδ polymerase-switching
          mechanism.
        supporting_text: >-
          Only POLD2, the B-subunit of Polδ, was found to bind to Polη in a two-hybrid
          experiment and this interaction was further confirmed in a pull-down assay.
          Mutation of the FF483–484 motif of Polη (designated F1 motif) involved in
          the interaction with POLD2 reduces the Polη ability to perform TLS catalyzed
          by cellular extracts in vitro and to rescue the UV sensitivity of XPV
          fibroblasts.
