  - id: file:human/POLD2/POLD2-deep-research-falcon.md
    title: Deep research on POLD2 function (falcon, Edison Scientific Literature, 2026-05-29)
    findings:
      - statement: >-
          POLD2 is an essential non-catalytic subunit of the heterotetrameric DNA
          polymerase delta, with a central structural role in mediating POLD1-POLD3
          interactions and supporting holoenzyme assembly/stability.
        supporting_text: >-
          POLD2 functions as an **essential non-catalytic subunit** of the Polδ
          holoenzyme, supporting assembly, stability, and productive interactions
          among subunits required for high-fidelity DNA synthesis in nuclear DNA
          replication and repair-associated synthesis.
      - statement: >-
          POLD2 (and POLD3) are also incorporated into Pol ζ4 (REV3-REV7-POLD2-POLD3),
          providing a polymerase-switching platform for translesion synthesis and
          mitotic DNA synthesis.
        supporting_text: >-
          POLD2 is relevant because it is part of Polδ and is also shared with
          **Polζ4** (a translesion polymerase complex), supporting polymerase switching
          and stress-tolerant DNA synthesis.
