suggested_questions:
- question: Should RUBCNL/PACER be curated as part_of GO:0034272 PI3KC3-C2, or represented as a PI3KC3/HOPS 
    recruitment adaptor without complex membership?
  experts:
  - GO autophagy editors
  - ComplexPortal curators
- question: Should generic RUBCNL protein-binding annotations be replaced by protein-macromolecule adaptor 
    activity for STX17/UVRAG/PI3KC3/HOPS recruitment?
  experts:
  - GO molecular function editors
  - GO autophagy editors
- question: Should regulation of lipid metabolic process remain a non-core by-similarity annotation, or should
    it be tied more explicitly to autophagy-dependent lipid droplet clearance?
  experts:
  - GO autophagy editors
  - GO lipid metabolism editors
suggested_experiments:
- experiment_type: PACER adaptor separation-of-function rescue
  hypothesis: RUBCNL requires separable STX17/UVRAG interaction surfaces and phosphoinositide binding to 
    recruit PI3KC3/HOPS and promote autophagosome maturation.
  description: Use RUBCNL knockout/rescue cells with STX17-binding, UVRAG-binding, and 
    phosphoinositide-binding mutants to quantify PI3P production, HOPS recruitment, and 
    autophagosome-endolysosome fusion.
- experiment_type: endogenous live-cell maturation imaging
  hypothesis: PACER occupancy marks STX17-positive autophagosomes that are competent for PI3KC3/HOPS 
    recruitment and subsequent fusion with endolysosomal compartments.
  description: Endogenously tag RUBCNL, STX17, UVRAG, a PI3P reporter, and HOPS markers and follow recruitment
    timing during starvation and recovery.
