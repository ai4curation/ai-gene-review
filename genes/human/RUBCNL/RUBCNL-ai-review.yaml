id: Q9H714
gene_symbol: RUBCNL
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: 'RUBCNL encodes PACER, a Rubicon-like autophagy enhancer that acts at late autophagosome maturation.
  It is recruited to STX17-positive autophagosome membranes, interacts with UVRAG/STX17, promotes recruitment of
  PI3K/PI3KC3 and HOPS complexes, stimulates Vps34/PI3KC3-dependent PtdIns(3)P production, and supports autophagosome-endosome/lysosome
  fusion. In the proteostasis-network context, RUBCNL is best curated as an autophagosome-maturation adaptor/recruitment
  factor associated with PI3KC3-C2 and HOPS, not as generic protein binding.'
