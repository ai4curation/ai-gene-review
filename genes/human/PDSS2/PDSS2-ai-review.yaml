gene_symbol: PDSS2
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: PDSS2 (decaprenyl-diphosphate synthase subunit 2; also DLP1/hDLP1) is
  one of the two subunits of the human all-trans-decaprenyl-diphosphate synthase, a
  mitochondrial trans-prenyltransferase. Together with PDSS1 it forms a 2:2
  heterotetramer that condenses (2E,6E)-farnesyl diphosphate (the primer) with seven
  isopentenyl diphosphate units to build all-trans-decaprenyl diphosphate, the C50
  polyprenyl side chain of coenzyme Q10 (ubiquinone-10). This is the first committed
  step in assembly of the ubiquinone side chain and occurs in the mitochondrial matrix
  / inner membrane. The catalytic activity is a property of the assembled complex;
  PDSS2 is not active on its own but is required, alongside PDSS1, for determining the
  final isoprenoid chain length (Q9 versus Q10). Loss-of-function variants cause primary
  coenzyme Q10 deficiency type 3 (COQ10D3), an encephalomyopathy that can present as
  Leigh syndrome with nephrotic syndrome. PDSS2 belongs to the FPP/GGPP synthase
  (polyprenyl synthetase) family.
