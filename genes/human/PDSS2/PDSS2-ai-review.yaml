    label: heterotetrameric polyprenyl diphosphate synthase complex
  supported_by:
  - reference_id: PMID:16262699
    supporting_text: an in vitro activity of solanesyl or decaprenyl diphosphate
      synthase was verified
    reference_section_type: ABSTRACT
  - reference_id: PMID:16262699
    supporting_text: double transformants expressing mSPS1 and mDLP1 or hDPS1 and
      hDLP1 produced Q9 or Q10, respectively
    reference_section_type: ABSTRACT
  - reference_id: file:human/PDSS2/PDSS2-uniprot.txt
    supporting_text: Heterotetramer composed of 2 PDSS1/DPS1 and 2 PDSS2/DLP1 subunits.
proposed_new_terms: []
suggested_questions:
- question: Is PDSS2 required only for chain-length determination, or does it also carry
    part of the catalytic machinery of the heterotetramer?
- question: Does the reported cerebellar-development role reflect a molecular function
    of PDSS2 distinct from its role in CoQ10 biosynthesis, or is it entirely a downstream
    consequence of ubiquinone deficiency?
suggested_experiments:
- description: Reconstitute the human PDSS1/PDSS2 heterotetramer and test defined
    active-site and interface mutants (including the COQ10D3 S382L variant) for
    decaprenyl diphosphate synthase activity and chain-length output.
- description: Determine the submitochondrial localization (matrix versus inner-membrane
    association) of the PDSS1/PDSS2 complex by fractionation and proximity labeling to
    resolve the matrix versus inner-membrane assignment.
