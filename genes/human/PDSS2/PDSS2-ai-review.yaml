core_functions:
- description: PDSS2 is a subunit of the human all-trans-decaprenyl-diphosphate synthase,
    a heterotetramer of two PDSS1 and two PDSS2 subunits that condenses
    (2E,6E)-farnesyl diphosphate with seven isopentenyl diphosphate units to form
    all-trans-decaprenyl diphosphate, the C50 polyprenyl side chain of ubiquinone-10.
    The catalytic activity is a property of the assembled complex; PDSS2 contributes
    to this activity (rather than enabling it alone) and, together with PDSS1,
    determines the isoprenoid chain length. The reaction is the first committed step
    of the ubiquinone side chain and occurs in the mitochondrial matrix.
  contributes_to_molecular_function:
    id: GO:0097269
    label: all-trans-decaprenyl-diphosphate synthase activity
  directly_involved_in:
  - id: GO:0006744
    label: ubiquinone biosynthetic process
