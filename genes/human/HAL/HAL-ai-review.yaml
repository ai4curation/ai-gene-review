id: P42357
gene_symbol: HAL
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  HAL (histidine ammonia-lyase, histidase; EC 4.3.1.3) catalyzes the first and
  committed step of L-histidine catabolism, the non-oxidative deamination of
  L-histidine to trans-urocanate (urocanic acid) plus ammonia. It is a member of
  the PAL/histidase (aromatic amino acid ammonia-lyase) family and uses an
  autocatalytically formed 4-methylideneimidazol-5-one (MIO) prosthetic group,
  generated by cyclization and dehydration of an internal Ala-Ser-Gly tripeptide,
  as its catalytic electrophile. The active enzyme is a homotetramer that acts in
  the cytosol. In the liver, this reaction initiates the pathway that degrades
  histidine ultimately to L-glutamate; in the skin/epidermis, the urocanate product
  is a major UV-absorbing chromophore of the stratum corneum. Expression is
  enriched in liver and skin. Loss-of-function variants cause the autosomal
  recessive inborn error of metabolism histidinemia, characterized by elevated
  histidine and reduced urocanate in body fluids.
