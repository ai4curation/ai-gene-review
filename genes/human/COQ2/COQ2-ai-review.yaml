- id: PMID:15153069
  title: Isolation and functional expression of human COQ2, a gene encoding a polyprenyl
    transferase involved in the synthesis of CoQ.
  findings:
  - statement: >-
      Human COQ2 was cloned and shown to be an active polyprenyltransferase; expressed in
      a yeast coq2-null mutant it restored CoQ biosynthesis and produced labelled CoQ from
      decaprenyl and nonaprenyl pyrophosphate precursors.
    reference_section_type: ABSTRACT
    supporting_text: >-
      The human COQ2 gene, when expressed in yeast Coq2 null mutant cells, rescued the growth of this yeast strain in the absence of a non-fermentable carbon source and restored CoQ biosynthesis.
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified primary cloning/functional-expression paper for human COQ2;
      underpins the EXP molecular-function and IGI/IDA process annotations.
- id: PMID:16400613
  title: A mutation in para-hydroxybenzoate-polyprenyl transferase (COQ2) causes primary
    coenzyme Q10 deficiency.
  findings:
  - statement: >-
      A homozygous COQ2 missense mutation caused primary CoQ10 deficiency, with a severe
      biosynthetic defect confirmed by radioisotope assay in patient fibroblasts.
    reference_section_type: ABSTRACT
    supporting_text: >-
      Radioisotope assays confirmed a severe defect of CoQ(10) biosynthesis in the fibroblasts of one patient.
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified; first molecular cause of primary CoQ10 deficiency; supports IMP
      annotations for GO:0006744 and GO:0008412.
- id: PMID:17374725
  title: Missense mutation of the COQ2 gene causes defects of bioenergetics and de
    novo pyrimidine synthesis.
  findings:
  - statement: >-
      Wild-type but not mutant COQ2 complements COQ2-defective yeast, and polyprenyl-pHB
      transferase activity was reduced to 33-45% of controls in COQ2 mutant fibroblasts,
      confirming the enzymatic and biosynthetic defect.
    reference_section_type: ABSTRACT
    supporting_text: >-
      Polyprenyl-pHB transferase activity was 33-45% of controls in COQ2 mutant fibroblasts.
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified; full text available. Demonstrates pathogenicity of a COQ2 mutation
      and reduced PHB:polyprenyltransferase activity; pyrimidine-synthesis defect is a
      downstream consequence of CoQ10 deficiency, not a direct COQ2 function.
- id: PMID:27493029
  title: The COQ2 genotype predicts the severity of coenzyme Q10 deficiency.
  findings:
  - statement: >-
      Defined COQ2 structure and subcellular localization (mitochondria, C-terminus facing
      the intermembrane space) and, via yeast complementation of all reported alleles,
      showed that residual COQ2 activity correlates with clinical severity.
    reference_section_type: ABSTRACT
    supporting_text: >-
      its protein product localizes to mitochondria with the C-terminus facing the intermembrane space
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified; source of the IDA inner-membrane localization/topology and IMP
      genotype-phenotype annotations.
- id: PMID:34800366
  title: Quantitative high-confidence human mitochondrial proteome and its dynamics
    in cellular context.
  findings:
  - statement: >-
      COQ2 is detected in a high-confidence quantitative human mitochondrial proteome
