core_functions:
- description: >-
    4-hydroxybenzoate polyprenyltransferase (PHB:polyprenyltransferase, EC 2.5.1.39):
    catalyzes the Mg2+-dependent transfer of an all-trans polyprenyl tail (decaprenyl in
    humans) from all-trans-polyprenyl diphosphate onto 4-hydroxybenzoate, producing a
    4-hydroxy-3-(all-trans-polyprenyl)benzoate. This is the committed prenylation step of
    coenzyme Q10 biosynthesis, carried out as a multi-pass protein of the mitochondrial
    inner membrane.
  molecular_function:
    id: GO:0008412
    label: 4-hydroxybenzoate polyprenyltransferase activity
