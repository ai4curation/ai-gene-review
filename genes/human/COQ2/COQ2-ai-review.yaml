gene_symbol: COQ2
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  COQ2 is 4-hydroxybenzoate polyprenyltransferase (para-hydroxybenzoate:polyprenyltransferase,
  PHB:PPT; EC 2.5.1.39), a polytopic integral protein of the mitochondrial inner membrane
  belonging to the UbiA prenyltransferase family. It catalyzes the committed prenylation
  (condensation) step of coenzyme Q (ubiquinone) biosynthesis: transfer of an all-trans
  polyprenyl tail from all-trans-polyprenyl diphosphate onto the aromatic precursor
  4-hydroxybenzoate (4-HB), yielding a 4-hydroxy-3-(all-trans-polyprenyl)benzoate. In
  humans the tail is decaprenyl (10 isoprene units, made by the PDSS1/PDSS2
  decaprenyl-diphosphate synthase), so the product is 3-decaprenyl-4-hydroxybenzoate and
  the ultimate cofactor is CoQ10; the reaction requires Mg2+. The enzyme spans the inner
  membrane with multiple transmembrane helices, its catalytic core faces the matrix, and
  its C-terminus faces the intermembrane space. CoQ10 is an essential lipid electron
  carrier of the mitochondrial respiratory chain, and biallelic loss-of-function COQ2
  variants cause primary coenzyme Q10 deficiency (COQ10D1), a clinically heterogeneous
  autosomal recessive mitochondrial disease; COQ2 variants have also been reported as
  susceptibility factors for multiple system atrophy.
