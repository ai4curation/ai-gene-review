  qualifier: enables
  review:
    summary: Electronic (IEA) annotation of the complex-level catalytic activity NADH dehydrogenase (ubiquinone)
      activity (EC 7.1.1.2, RHEA:29091) with the enables qualifier. This is the holoenzyme activity of
      Complex I; NDUFS3 is a core structural subunit that contributes to but does not independently possess
      this activity.
    action: MODIFY
    reason: The catalytic activity is a property of the assembled complex, not of NDUFS3 in isolation
      (NDUFS3 carries no redox cofactor). The complex-level MF is best expressed with the contributes_to
      qualifier (as in the curated IMP annotation from PMID:30140060), rather than enables. Retain the
      term but with contributes_to.
