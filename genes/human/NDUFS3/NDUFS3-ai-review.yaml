- term:
    id: GO:0009055
    label: electron transfer activity
  evidence_type: NAS
  original_reference_id: PMID:9647766
  qualifier: enables
  review:
    summary: Author-statement (NAS) annotation to electron transfer activity. In Complex I, the electron-transfer
      chemistry is carried out by the flavin (in NDUFV1) and the chain of iron-sulfur clusters (in NDUFV1/NDUFV2/NDUFS1/NDUFS7/NDUFS8
      etc.). NDUFS3, despite its historical "iron-sulfur protein 3" name, carries no redox cofactor and
      does not itself transfer electrons.
    action: MARK_AS_OVER_ANNOTATED
    reason: NDUFS3 is a cofactor-less structural core subunit; it does not carry a redox center and does
      not itself have electron transfer activity. Assigning this MF to NDUFS3 is an over-annotation stemming
      from the misleading "IP/iron-sulfur protein" naming.
    supported_by:
