id: O75489
gene_symbol: NDUFS3
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: NDUFS3 (NADH:ubiquinone oxidoreductase core subunit S3, historically the "30 kDa" subunit
  and confusingly named "iron-sulfur protein 3", although it carries no redox cofactor of its own) is
  one of the seven conserved nuclear-encoded core subunits of mitochondrial respiratory Complex I (NADH:ubiquinone
  oxidoreductase, EC 7.1.1.2). It is a structural core component of the Q-module in the hydrophilic peripheral
  arm, sitting near the ubiquinone-reduction site adjacent to the iron-sulfur subunit NDUFS2. NDUFS3 is
  required both for the catalytic activity of Complex I (electron transfer from NADH to ubiquinone coupled
  to proton translocation across the inner membrane) and for its stepwise assembly, acting as an early
  nucleation point of the peripheral arm. The protein is imported into mitochondria (cleaved N-terminal
  transit peptide) and localizes to the matrix side of the mitochondrial inner membrane as a peripheral
  membrane component of the Complex I holoenzyme. Biallelic loss-of-function variants cause mitochondrial
  complex I deficiency (nuclear type 8, MC1DN8), presenting clinically as Leigh syndrome and optic atrophy.
