    label: proton transmembrane transport
  evidence_type: IEA
  original_reference_id: GO_REF:0000108
  qualifier: involved_in
  review:
    summary: Electronic annotation (inferred from GO:0008137 via inter-ontology links) to proton transmembrane
      transport. Complex I couples NADH:ubiquinone electron transfer to translocation of protons across
      the inner membrane, so this is valid at the complex level, but for NDUFS3 (a peripheral-arm subunit
      not part of the membrane proton pump) it is a downstream/complex-level consequence rather than a
      core function.
    action: KEEP_AS_NON_CORE
    reason: Proton pumping is performed by the membrane arm; NDUFS3 sits in the peripheral arm. The term
      is not wrong at the complex level but is peripheral to NDUFS3's own role.
    supported_by:
