knowledge_gaps:
- gap_statement: >-
    PI15's physiological human protease substrates, target specificity, inhibitory
    constants, and molecular inhibition mechanism are unknown.
  boundary: >-
    Direct assays show weak trypsin inhibition and high-concentration CPAF inhibition,
    but neither substrate represents an established normal human extracellular target.
  gap_kind:
  - BIOLOGY
  dark_aspect: MF_DARK
  status: OPEN
  significance: >-
    Identifying endogenous targets is necessary to explain why PI15 evolved as a
    secreted CAP protein and to distinguish broad from highly selective inhibition.
  resolution: >-
    Quantitative inhibition and binding screens against extracellular serine
    proteases, followed by endogenous degradomics and target-specific rescue.
  provenance:
  - reference_id: file:human/PI15/PI15-deep-research-manual.md
    supporting_text: The activity is weak compared with classical inhibitors, and neither the physiological human protease target nor inhibition constants have been established.
- gap_statement: >-
    PI15's normal physiological biological process and organismal phenotype are unknown.
  boundary: >-
    Human-cell experiments establish a CPAF-dependent role during chlamydial
    infection, while normal-tissue expression and chicken developmental expression
    do not establish a causal conserved process.
  gap_kind:
  - BIOLOGY
  dark_aspect: BP_DARK
  status: OPEN
  significance: >-
    The infection phenotype may exploit a pre-existing host function rather than
    reveal PI15's evolved physiological role.
  resolution: >-
    Use gene-specific loss-of-function and rescue in normal PI15-expressing human
    tissues and conditional mouse models, with extracellular protease activity and
    tissue phenotypes measured in parallel.
  provenance:
  - reference_id: file:human/PI15/PI15-deep-research-manual.md
    supporting_text: Normal human substrates, physiological processes, oligomeric structure, and bona fide exosome incorporation remain open.
- gap_statement: >-
    It is unclear whether PI15 is a true exosome/prostasome cargo or a soluble
    protein that co-purifies with extracellular vesicles.
  boundary: >-
    PI15 appears in an EPS-urine exosome proteome, but the source study highlights
    soluble-protein and clinical-fluid contamination as alternative explanations.
  gap_kind:
  - BIOLOGY
  - CURATION
  dark_aspect: CC_DARK
  status: OPEN
  significance: >-
    Resolving vesicle association would distinguish a trafficking mechanism from
    incidental recovery of a secreted protein.
  resolution: >-
    Apply density gradients, size-exclusion chromatography, protease protection,
    detergent sensitivity, immunogold microscopy, and PI15 immunocapture to purified
    vesicles from prostate and other PI15-positive sources.
  provenance:
  - reference_id: PMID:23533145
    supporting_text: some of these proteins could also exist as a soluble form
suggested_questions:
- question: >-
    Which endogenous extracellular serine proteases bind and are inhibited by
    mature human PI15 at physiological concentrations?
- question: >-
    Does oligomeric PI15 directly bridge two CPAF zymogens, and what structural
    transition switches PI15 from activation to inhibition as concentration rises?
- question: >-
    What normal tissue or developmental process requires PI15, and is the
    chlamydial CPAF mechanism an exploitation of that physiological activity?
- question: >-
    Is elevated plasma PI15 in cholangiocarcinoma merely a tumor-derived biomarker,
    or does PI15 alter the tumor extracellular protease environment?
suggested_experiments:
- hypothesis: >-
    Mature PI15 selectively inhibits a restricted set of extracellular human
    serine proteases through its CAP domain.
  description: >-
    Produce correctly processed and glycosylated human PI15, determine binding and
    inhibition constants across a focused extracellular-serine-protease panel, and
    map activity with CAP-domain mutants. Validate candidates by secretome
    degradomics in PI15-null and rescue cells.
  experiment_type: Quantitative protease profiling, structural mutagenesis, and degradomics
- hypothesis: >-
    PI15 oligomerization produces the concentration-dependent switch between CPAF
    activation and inhibition.
  description: >-
    Measure PI15 oligomer stoichiometry and CPAF-zymogen binding by SEC-MALS,
    native mass spectrometry, cross-linking, and cryo-EM or crystallography across
    the activating and inhibitory concentration ranges. Test oligomerization-defective
    mutants in cell-free processing assays and PI15-null infected cells.
  experiment_type: Structural biochemistry and separation-of-function rescue
- hypothesis: >-
    Endogenous PI15 is required for a normal extracellular protease-regulatory
    process independent of infection.
  description: >-
    Create PI15 knockout and endogenous-rescue models in primary prostate,
    lymphoid, smooth-muscle, and cholangiocyte contexts selected by verified
    expression. Quantify secretome proteolysis, matrix remodeling, differentiation,
    and stress responses without and with Chlamydia infection.
  experiment_type: Context-resolved CRISPR genetics and extracellular protease phenotyping
- hypothesis: >-
    PI15 is packaged within a specific extracellular-vesicle population rather
    than simply co-purifying as a soluble secreted protein.
  description: >-
    Fractionate conditioned medium and EPS urine by orthogonal vesicle methods,
    then combine protease protection, detergent release, immunocapture, and
    immunoelectron microscopy with soluble-protein controls.
  experiment_type: Extracellular-vesicle localization and topology analysis
