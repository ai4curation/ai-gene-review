status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  PI15 is a secreted, glycosylated CAP/CRISP-family serine-protease inhibitor
  synthesized as a 258-amino-acid precursor and processed to a mature extracellular
  protein. It was originally purified from human glioblastoma conditioned medium
  as p25TI and displays weak trypsin-inhibitor activity. During Chlamydia trachomatis
  infection, PI15 is recruited into the inclusion lumen, binds the CPAF protease
  zymogen, and concentration-dependently promotes or inhibits CPAF activation;
  altering PI15 abundance perturbs production of infectious chlamydial progeny.
  Circulating PI15 is elevated in a subset of cholangiocarcinoma patients and falls
  after tumor resection, supporting biomarker utility without establishing a causal
  tumor function. PI15's normal physiological protease targets and organismal role
  remain unknown.
