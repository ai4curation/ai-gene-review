- term:
    id: GO:0060090
    label: molecular adaptor activity
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: enables
  review:
    summary: >-
      PAINT transfers a molecular-adaptor term from mouse Glipr1l1. Separately,
      direct PI15 experiments show CPAF-zymogen binding and support a model in which
      oligomeric PI15 juxtaposes CPAF zymogens during chlamydial infection.
    action: KEEP_AS_NON_CORE
    reason: >-
      The broad term is biologically defensible for the specialized infection
      context because PI15 binds CPAF zymogen and promotes concentration-dependent
      autoprocessing, plausibly by bringing zymogens together. However, simultaneous
      bridging is a proposed model, not a resolved constitutive activity. The PAINT
      path itself is unsafe because its sole seed is the divergent sperm paralog
      mouse Glipr1l1 rather than direct PI15 evidence.
    propagation_review:
      root_cause: PROPAGATION_BAD
      failure_modes:
      - WRONG_ORTHOLOG_OR_PARALOG
      - CONTEXT_OR_TISSUE_MISMATCH
      - ROLE_CONFLATION
      source_entities:
      - source_id: MGI:MGI:1916536
        source_label: mouse Glipr1l1
        source_status: SUPPORTS_SOURCE_BUT_NOT_TARGET
        comment: >-
          Glipr1l1's IZUMO1-containing sperm complex does not establish the PI15
          CPAF-zymogen mechanism; direct PMID:29900129 evidence independently rescues
          the broad term for an infection-specific context.
      - source_id: PANTHER:PTN000036124
        source_label: broad PTHR10334 ancestral node
        source_status: UNRESOLVED
        comment: >-
          The node spans divergent CAP subfamilies and cannot establish a shared
          adaptor mechanism from a single sperm-paralog seed.
