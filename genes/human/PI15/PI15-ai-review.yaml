core_functions:
- description: >-
    PI15 is a processed secreted CAP-family protein with direct serine-type
    endopeptidase inhibitor activity. Purified human PI15 weakly inhibits trypsin,
    and recombinant PI15 inhibits chlamydial CPAF at higher concentrations. Its
    normal physiological human protease target is not yet known.
