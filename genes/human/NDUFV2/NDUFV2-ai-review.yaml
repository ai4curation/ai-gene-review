  review:
    summary: IMP annotation to cardiac muscle tissue development, from the observation
      that a homozygous NDUFV2 splice mutation causes early-onset hypertrophic cardiomyopathy.
      This reflects a bioenergetic disease phenotype of Complex I deficiency in cardiac
      tissue rather than a direct role of NDUFV2 in the developmental program of the
      heart.
    action: KEEP_AS_NON_CORE
    reason: The cardiomyopathy phenotype is real and clinically important, but it arises
      from loss of Complex I energy production rather than a developmental function
      of NDUFV2; retained as a non-core, tissue-context annotation rather than a core
      molecular role.
