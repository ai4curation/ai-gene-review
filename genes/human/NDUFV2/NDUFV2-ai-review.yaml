- term:
    id: GO:0051537
    label: 2 iron, 2 sulfur cluster binding
  evidence_type: IEA
  original_reference_id: file:human/NDUFV2/NDUFV2-uniprot.txt
  qualifier: enables
  review:
    summary: NDUFV2 binds one [2Fe-2S] iron-sulfur cluster (the N1a cluster) via conserved
      cysteine ligands, a cofactor central to its role in the electron-input pathway
      of Complex I. UniProt annotates the [2Fe-2S] cofactor with experimental (PubMed:28844695)
      evidence and four ligand residues from the cryo-EM structures, and the corresponding
      GO term (GO:0051537) is present in the UniProt GO cross-references (UniProtKB-KW).
      This specific metal-cofactor MF is not represented in the current GOA TSV and
      is proposed here as a NEW annotation to capture NDUFV2's redox chemistry more
      precisely than the generic electron transfer activity term.
    action: NEW
    reason: The [2Fe-2S] cluster binding is a well-supported, defining molecular feature
      of NDUFV2 (2Fe-2S keyword, experimental cofactor annotation, and four structural
      ligand-binding residues in UniProt) that is missing from the curated GO annotation
      set and directly underlies its electron-transfer function in the N-module of Complex
      I.
    supported_by:
    - reference_id: file:human/NDUFV2/NDUFV2-uniprot.txt
      supporting_text: 'Name=[2Fe-2S] cluster; Xref=ChEBI:CHEBI:190135'
    - reference_id: file:human/NDUFV2/NDUFV2-uniprot.txt
      supporting_text: Contains one iron-sulfur cluster
