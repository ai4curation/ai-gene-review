- term:
    id: GO:1902600
    label: proton transmembrane transport
  evidence_type: IEA
  original_reference_id: GO_REF:0000108
  qualifier: involved_in
  review:
    summary: Automatic inference (from the GO:0008137 catalytic activity mapping) that
      the gene product is involved in proton transmembrane transport. This is a complex-level
      property arising from the proton-pumping membrane (ND) arm of Complex I, not from
      NDUFV2, which sits in the soluble N-module of the peripheral arm and coordinates
      the N1a [2Fe-2S] cluster of the electron-input pathway.
    action: MARK_AS_OVER_ANNOTATED
    reason: Proton translocation is performed by the antiporter-like subunits of the
      membrane arm; attributing it to the N-module electron-input subunit NDUFV2 over-annotates
      a whole-complex activity onto an individual peripheral-arm subunit.
- term:
    id: GO:0005515
    label: protein binding
  evidence_type: IPI
  original_reference_id: PMID:28380382
  qualifier: enables
  review:
    summary: IPI evidence (with HSCB/HSC20 co-chaperone, UniProtKB:Q8IWL3) that NDUFV2
      binds the HSC20-based Fe-S transfer complex. This is a real and biologically meaningful
      interaction (Fe-S cluster delivery to Complex I), but the GO term itself is the
      uninformative bare 'protein binding'.
    action: MARK_AS_OVER_ANNOTATED
    reason: Bare protein binding conveys no specific molecular function. The underlying
      biology (NDUFV2 acquires its [2Fe-2S] cluster via the HSC20 co-chaperone system)
      is better represented by the Fe-S cluster binding MF (proposed as a NEW annotation)
      rather than by generic protein binding.
    supported_by:
    - reference_id: PMID:28380382
      supporting_text: The five Fe-S cluster subunits of Complex I also interact with
        HSC20 to acquire their clusters, highlighting the crucial role of HSC20 in the
        assembly of the mitochondrial respiratory chain.
