- term:
    id: GO:0008137
    label: NADH dehydrogenase (ubiquinone) activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: Electronic (IEA) annotation to the enzyme's specific catalytic molecular
      function, NADH:ubiquinone oxidoreductase activity (EC 7.1.1.2, RHEA:29091). This
      is the defining catalytic activity of Complex I; NDUFV2 is a core subunit contributing
      to it.
    action: MODIFY
    reason: The NADH:ubiquinone oxidoreductase reaction is a property of the assembled
      holoenzyme, not of NDUFV2 in isolation. A single subunit does not independently
      enable the full reaction, so the enables qualifier over-states NDUFV2's role;
      contributes_to is the appropriate qualifier (as for the curated IBA/IMP annotations
      to the same term). Retain the term but with contributes_to.
    proposed_replacement_terms:
    - id: GO:0008137
      label: NADH dehydrogenase (ubiquinone) activity
    supported_by:
    - reference_id: file:human/NDUFV2/NDUFV2-uniprot.txt
      supporting_text: Reaction=a ubiquinone + NADH + 5 H(+)(in) = a ubiquinol + NAD(+)
        + 4 H(+)(out)
- term:
