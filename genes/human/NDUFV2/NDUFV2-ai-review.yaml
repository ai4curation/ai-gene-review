id: P19404
gene_symbol: NDUFV2
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: NDUFV2 (NADH dehydrogenase [ubiquinone] flavoprotein 2; also called the
  24 kDa subunit) is a nuclear-encoded core catalytic subunit of the N-module (NADH-oxidising
  module) of mitochondrial respiratory Complex I (NADH:ubiquinone oxidoreductase). Together
  with NDUFV1 (51 kDa, which carries the FMN and NADH-binding site) and NDUFS1 it forms
  the flavoprotein (FP) subcomplex at the tip of the peripheral (matrix) arm. NDUFV2
  coordinates the N1a [2Fe-2S] iron-sulfur cluster located near the FMN/NADH site,
  and this cluster is part of the electron-entry pathway by which electrons from NADH
  are relayed into the chain of iron-sulfur clusters that ultimately reduce ubiquinone.
  The protein is imported into mitochondria via a cleaved N-terminal transit peptide
  and is a peripheral protein of the mitochondrial inner membrane on the matrix side.
  Loss-of-function or destabilising variants in NDUFV2 cause mitochondrial complex I
  deficiency (nuclear type 7), presenting as an encephalocardiomyopathy with early-onset
  hypertrophic cardiomyopathy, encephalopathy, and Leigh syndrome; a targeting-sequence
  polymorphism has also been reported as a Parkinson disease susceptibility factor.
