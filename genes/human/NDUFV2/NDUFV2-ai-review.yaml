    summary: Direct assay (IDA) annotation of the specific NADH:ubiquinone oxidoreductase
      catalytic activity, based on the cryo-EM structure that established the function,
      catalytic activity and cofactor of the human enzyme. As a subunit, NDUFV2 contributes
