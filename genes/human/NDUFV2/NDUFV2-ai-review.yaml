  evidence_type: NAS
  original_reference_id: PMID:30030361
  qualifier: involved_in
  review:
    summary: Author-statement (NAS, ComplexPortal) annotation to proton motive force-driven
      ATP synthesis. ATP synthesis is the function of Complex V (ATP synthase); Complex
      I contributes only indirectly by helping establish the proton-motive force via
      its membrane arm, and NDUFV2 (an N-module electron-input subunit) is doubly removed
