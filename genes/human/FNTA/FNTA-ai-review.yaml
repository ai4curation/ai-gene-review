proposed_new_terms: []
suggested_questions:
- question: >-
    Does the acetyltransferase activator activity (GO:0010698) annotation reflect a real
    molecular function, given that PMID:19228685 shows FTase is required for the activity
    of the deacetylase HDAC6 rather than an acetyltransferase?
- question: >-
    Beyond RAC1 at the neuromuscular junction, is the AGRIN/MUSK-induced phosphorylation
    and activation of FNTA a general regulatory mechanism that tunes prenyltransferase
    activity in other tissues?
suggested_experiments:
- description: >-
    Quantitatively compare, using recombinant reconstituted FNTA:FNTB and FNTA:PGGT1B
    heterodimers with defined CaaX peptide libraries, how alpha-subunit contacts
    (e.g. A129, Y131, N167) shape substrate selectivity between FTase and GGTase-I.
- description: >-
    Test whether FNTA phosphorylation (e.g. at Ser-373) modulates heterodimer assembly,
    microtubule binding, or prenyltransferase activity, using phosphomimetic and
    non-phosphorylatable FNTA variants.
