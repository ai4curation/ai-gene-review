id: P49354
gene_symbol: FNTA
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  FNTA is the alpha subunit shared by two heterodimeric CaaX prenyltransferases: protein
  farnesyltransferase (FTase; FNTA plus the FNTB beta subunit; EC 2.5.1.58) and protein
  geranylgeranyltransferase type I (GGTase-I; FNTA plus the PGGT1B beta subunit; EC
  2.5.1.59). These enzymes attach a farnesyl (C15, from farnesyl diphosphate) or
  geranylgeranyl (C20, from geranylgeranyl diphosphate) isoprenoid to the cysteine of a
  C-terminal CaaX motif (Cys-aliphatic-aliphatic-X) of target proteins, enabling their
  association with membranes. Substrates include Ras-superfamily GTPases (H-, K- and
  N-RAS, Rho and Rac proteins), nuclear lamins, heterotrimeric G-protein gamma subunits,
  and guanylate-binding proteins. FNTA is an alpha-helical repeat protein that adopts a
  crescent shape and partially envelops the zinc-containing beta subunit; it is
  essential for a stable, active enzyme, binds the CaaX peptide substrate together with
  the beta subunit, and contributes to catalysis, but does not have transferase activity
  on its own. Beyond prenylation, FNTA binds microtubules directly through its alpha
  subunit and, as part of an FTase-microtubule complex, is required for the activity of
  the cytoplasmic deacetylase HDAC6, and it interacts with the ligand-free TGF-beta and
  activin type I receptors. FNTA is a cytosolic protein and a validated anticancer and
  antiparasitic drug target.
