core_functions:
- description: >-
    As the alpha subunit of protein farnesyltransferase (FTase), FNTA forms a heterodimer
    with the FNTB beta subunit and contributes to transfer of a C15 farnesyl group from
    farnesyl diphosphate to the cysteine of a C-terminal CaaX motif of substrate proteins
    (e.g. H/K/N-RAS, nuclear lamins, G-protein gamma subunits). FNTA is a crescent-shaped
    alpha-helical repeat protein that envelops the zinc-containing beta subunit, is
    essential for a stable active enzyme, helps bind the CaaX peptide, and contributes to
    catalysis, but does not have transferase activity on its own.
  supported_by:
