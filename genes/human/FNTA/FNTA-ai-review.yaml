- description: >-
    As the alpha subunit of protein geranylgeranyltransferase type I (GGTase-I), FNTA
    forms a heterodimer with the PGGT1B beta subunit and contributes to transfer of a C20
    geranylgeranyl group from geranylgeranyl diphosphate to the cysteine of a C-terminal
    CaaX motif (typically ending in leucine) of substrate proteins (e.g. Rho/Rac GTPases,
    GBP guanylate-binding proteins). FNTA is the same shared alpha subunit used by FTase;
    it contributes to, but does not independently enable, the geranylgeranyltransferase
    reaction.
