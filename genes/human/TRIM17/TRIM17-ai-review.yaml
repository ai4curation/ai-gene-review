id: Q9Y577
gene_symbol: TRIM17
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  TRIM17 (terf, testis RING finger protein; RNF16) is a RING-type E3 ubiquitin
  ligase of the TRIM/RBCC family with the canonical architecture of an N-terminal
  RING-HC zinc finger (conferring E3 ubiquitin ligase activity, EC 2.3.2.27),
  a B-box, a coiled-coil and a C-terminal B30.2/SPRY domain; it is expressed
  almost exclusively in testis and undergoes autoubiquitination. TRIM17 is a key
  regulator of neuronal apoptosis: it ubiquitinates and degrades the anti-apoptotic
  protein MCL1 to initiate neuronal death, and it controls NFAT transcription
  factors (NFATC3/NFATC4) by preventing their nuclear localization and thereby
  inhibiting their transcriptional activity. It also modulates selective autophagy
  in a target-selective manner: it inhibits autophagic degradation of diverse
  substrates while contributing to autophagy of midbodies, with its
  autophagy-inhibitory activity involving MCL1, which TRIM17 assembles into
  complexes with the autophagy regulator BECN1. Additional reported activities
  include stimulating proteasomal degradation of the kinetochore protein ZWINT to
  negatively regulate cell proliferation, antagonizing other TRIM ligases (it
  prevents TRIM28 from ubiquitinating the anti-apoptotic BCL2A1, and decreases
  TRIM41-mediated degradation of ZSCAN-family substrates to promote
  alpha-synuclein/SNCA transcription in neurons), and being stabilized through
  interaction with TRIM44. TRIM17 localizes to the cytoplasm and lysosome.
