suggested_questions:
- question: How does TRIM17 achieve target selectivity in autophagy - inhibiting degradation of most substrates while promoting autophagy of midbodies - and what determines whether a bound partner (e.g. MCL1, BECN1) is protected or degraded?
- question: Given TRIM17's near testis-exclusive expression yet prominent roles described in neurons (MCL1, NFAT, SNCA), how is its function partitioned across tissues and which roles are physiologically dominant in vivo?
suggested_experiments:
- description: Perform ubiquitinome and degradation-rate profiling in TRIM17-knockout versus wild-type neurons to define the endogenous substrate repertoire (MCL1, ZWINT, others) and separate direct ubiquitination targets from indirectly stabilized proteins.
- description: Use RING-dead and substrate-binding TRIM17 mutants to dissect which functions (MCL1 degradation/apoptosis, NFAT localization control, midbody autophagy versus autophagy inhibition) require catalytic E3 activity versus a non-catalytic scaffold/adaptor role.
