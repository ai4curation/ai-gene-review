description: >-
  SYPL2 (synaptophysin-like protein 2, also called mitsugumin 29 or MG29) is a
  29-kDa MARVEL-domain protein with four transmembrane helices. It is enriched in
  skeletal muscle and acts at the triad junction, on both T-tubular and
  junctional sarcoplasmic-reticulum membranes. Mammalian loss-of-function studies
  show that MG29 promotes refinement and maintenance of these specialized membrane
  systems and supports efficient excitation-contraction coupling, store-operated
  calcium entry, and long-term calcium homeostasis. MG29 also binds TRPC3 through
  its N-terminal region and first luminal loop, linking triad architecture to
  regulation of calcium transients. Human MG29 expression has additionally been
  detected in neurons and induced in plaque-associated astrocytes in Alzheimer
  brain, where transfected protein localizes to endoplasmic reticulum, but the
  physiological significance of this neural expression remains unresolved.
