core_functions:
- description: >-
    Organizes and refines the specialized T-tubule and junctional SR membrane
    architecture of the skeletal-muscle triad, thereby maintaining an efficient
    structural interface for excitation-contraction coupling. Mammalian MG29 is
    present on both sides of the triad, and its loss produces swollen/misoriented
    T-tubules, disorganized SR networks, partial triad malformation and reduced
    twitch coupling efficiency.
  directly_involved_in:
