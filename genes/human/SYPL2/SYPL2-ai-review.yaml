    reference_section_type: ABSTRACT
- description: >-
    Regulates calcium-channel-dependent signaling at muscle junctional membranes.
    MG29 supports store-operated calcium entry and long-term SR calcium homeostasis
    and, through a mapped interaction with TRPC3, promotes normal depolarization-
    induced calcium transients during skeletal-muscle excitation-contraction
    coupling.
