suggested_questions:
- question: >-
    Does endogenous human SYPL2 directly regulate TRPC3, ORAI1 or another calcium
    channel at skeletal-muscle triads, and which interaction accounts for its
    effect on store-operated calcium entry?
- question: >-
    Which SYPL2 isoforms are expressed in adult human skeletal muscle, and does
    isoform 2, which alters the fourth transmembrane/C-terminal region, differ in
    topology, triad localization or channel-regulatory activity?
- question: >-
    In human neurons, is endogenous SYPL2 localized to synaptic vesicles,
    endoplasmic reticulum or another membrane compartment, and is its induction
    in Alzheimer-associated astrocytes protective or pathogenic?
suggested_experiments:
- description: >-
    Endogenously tag SYPL2 in human iPSC-derived skeletal myotubes and combine
    super-resolution microscopy with T-tubule/SR markers and membrane
    subfractionation to resolve its localization on both sides of the triad.
  experiment_type: microscopy/subcellular fractionation
  hypothesis: >-
    Human SYPL2 localizes to both T-tubular and junctional SR membranes rather
    than to synaptic-vesicle-like compartments in skeletal muscle.
- description: >-
    Generate SYPL2-null human skeletal myotubes and quantify T-tubule
    ultrastructure, store-operated calcium entry, depolarization-induced calcium
    transients and contractile force, followed by rescue with each human isoform.
  experiment_type: genetic manipulation/calcium imaging/physiology
  hypothesis: >-
    Loss of human SYPL2 disrupts triad architecture and calcium entry, and the two
    splice isoforms differ in their ability to rescue these phenotypes.
- description: >-
    Reconstitute human SYPL2 with TRPC3 and ORAI1-STIM1 in defined cells or
    proteoliposomes, using interface mutants based on the mapped MG29 N-terminal
    and first-loop binding region, and measure channel currents plus direct
    association.
  experiment_type: electrophysiology/biochemistry
  hypothesis: >-
    SYPL2 directly modulates a calcium channel through its N-terminal/first-loop
    interface rather than influencing calcium entry only indirectly through
    membrane architecture.
