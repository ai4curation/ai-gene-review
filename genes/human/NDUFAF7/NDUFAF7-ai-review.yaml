id: Q7L592
gene_symbol: NDUFAF7
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  NDUFAF7 (NADH dehydrogenase [ubiquinone] complex I assembly factor 7; formerly C2orf56;
  orthologue of Dictyostelium MidA) is a mitochondrial matrix S-adenosyl-L-methionine (SAM)-dependent
  protein arginine methyltransferase (EC 2.1.1.320) belonging to the seven-beta-strand
  methyltransferase superfamily. It is imported into mitochondria via a cleaved N-terminal transit
  peptide and catalyzes the symmetric omega-N,N'-dimethylation of Arg-85 in the core Complex I
  subunit NDUFS2. This methylation occurs early in the biogenesis of respiratory chain Complex I
  (NADH:ubiquinone oxidoreductase), after NDUFS2 has been incorporated into an early peripheral-arm
  intermediate, and stabilizes that ~400-kDa nucleating subcomplex. NDUFAF7 is an assembly factor,
  not a structural subunit of the mature holoenzyme; it dissociates before the complex matures. Loss
  of NDUFAF7 produces a specific Complex I assembly defect, and its function is essential for
  vertebrate development.
