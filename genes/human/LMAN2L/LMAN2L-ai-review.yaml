  title: HCMV US2 co-opts TRC8 to degrade the endoplasmic reticulum-resident protein
    LMAN2L.
  findings: []
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: PubMed-verified (PMID:38687323; DOI:10.1099/jgv.0.001980). First
      gene-specific cell-biology study to directly assay LMAN2L as an endogenous protein -
      identifies LMAN2L as a novel target of HCMV pUS2, degraded via the host E3 ligase
      TRC8 (ERAD). Plasma-membrane profiling of LMAN2L-deficient cells shows reduced
      surface integrin alpha-6 (ITGA6), supporting LMAN2L's hypothesized role in
      glycoprotein trafficking. Corroborates the ER-resident localization and ER-export
      receptor model; provides the first candidate physiological client (ITGA6).
      Not in publications cache, so no verbatim supporting_text added.
