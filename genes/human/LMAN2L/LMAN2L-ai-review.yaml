suggested_questions:
- question: Does VIPL bind D-mannose / high-mannose N-glycans directly in vitro, and what is its glycan specificity relative to VIP36 and ERGIC-53?
- question: Is VIPL a positive or negative regulator of ERGIC-53-mediated ER export, and does it act by sequestering ERGIC-53 in the ER or by handing off glycoprotein cargo?
- question: How do the MRT52 (R53Q) and MRD69 disease variants alter VIPL lectin binding, ER retention, or ERGIC-53 regulation to cause intellectual disability?
suggested_experiments:
- description: Quantitative glycan-array or ITC/SPR binding assays with purified VIPL luminal CRD against high-mannose and processed N-glycans to directly establish D-mannose binding and specificity.
- description: Define the endogenous glycoprotein cargo whose ER export depends on VIPL using secretomics/pulse-chase in VIPL knockout versus wild-type cells.
- description: Test whether VIPL disease variants (R53Q; dominant MRD69 allele) perturb ERGIC-53 localization and glycoprotein secretion in patient-derived or engineered cells.
