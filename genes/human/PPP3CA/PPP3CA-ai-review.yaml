id: Q08209
gene_symbol: PPP3CA
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: PPP3CA encodes calcineurin catalytic subunit A alpha, a calcium/calmodulin-activated serine/threonine phosphatase (EC 3.1.3.16) that functions in the calcineurin holoenzyme to dephosphorylate signaling substrates including NFAT-family transcription factors. Its core roles are phosphoprotein dephosphorylation and calcineurin-NFAT pathway signaling, with additional context-dependent functions in neuronal, immune, muscle, and renal physiology.
