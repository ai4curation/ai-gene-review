    label: phospholipid dephosphorylation
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: involved_in
  review:
    summary: >-
      Phylogenetic (IBA) annotation to the broad process of phospholipid
      dephosphorylation. This is a correct but over-general parent term for the
      specific sphingoid-base-1-phosphate dephosphorylation that SGPP2 performs.
    action: KEEP_AS_NON_CORE
    reason: >-
      SGPP2 does not act on general phospholipids; it is highly specific for sphingoid
      base 1-phosphates and does not dephosphorylate lysophosphatidic acid or
      phosphatidic acid. The term is not wrong (S1P is a phosphorylated lipid) but is
      less informative than the sphingosine-1-phosphate/sphingolipid terms; retain as
      non-core rather than treat as the core process.
    supported_by:
