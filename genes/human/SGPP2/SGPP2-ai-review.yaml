  label: Homo sapiens
description: >-
  SGPP2 (sphingosine-1-phosphate phosphatase 2, SPP2/hSPP2) is a multipass integral
  endoplasmic reticulum membrane enzyme of the type 2 lipid phosphate phosphatase
  (LPP/PAP2) superfamily and a paralog of SGPP1. It dephosphorylates sphingoid-base
  1-phosphates, principally sphingosine-1-phosphate (S1P) to sphingosine and
  dihydrosphingosine-1-phosphate to dihydrosphingosine (sphinganine), and can also act
  on phytosphingosine-1-phosphate. This activity is specific for sphingoid-base
  1-phosphates and does not act on glycerolipid phosphates such as lysophosphatidic
  acid or phosphatidic acid. By reversing the sphingosine kinase reaction, SGPP2 helps
  set the intracellular balance between S1P, sphingosine and ceramide (the "sphingolipid
  rheostat") and channels sphingosine into the ceramide salvage/recycling pathway,
  thereby attenuating intracellular S1P signaling. Unlike the constitutively expressed
  SGPP1, SGPP2 is strongly and NF-kB-dependently induced by inflammatory stimuli
  (TNF, bacterial LPS) in cells such as neutrophils and endothelial cells, implicating
  it in inflammatory signaling; in mouse, Sgpp2 is highly expressed in pancreatic islets
  and its loss causes beta-cell endoplasmic reticulum stress and defective adaptive
  beta-cell proliferation.
