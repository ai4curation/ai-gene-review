id: P35790
gene_symbol: CHKA
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  CHKA (choline kinase alpha) is a cytosolic, Mg2+-dependent small-molecule kinase
  that catalyzes the first committed step of the CDP-choline (Kennedy) pathway of
  phosphatidylcholine biosynthesis: the ATP-dependent phosphorylation of choline to
  phosphocholine (EC 2.7.1.32). The same active site also phosphorylates ethanolamine
  to phosphoethanolamine (EC 2.7.1.82), contributing to phosphatidylethanolamine
  biosynthesis, although choline is the strongly preferred substrate. The enzyme
  belongs to the choline/ethanolamine kinase family and adopts a protein-kinase-like
  fold; it is active as a homodimer and can also form heterodimers with choline
  kinase beta (CHKB), with dimerization required for catalytic activity. CHKA is
  broadly expressed and is frequently over-expressed in human cancers (breast, lung,
  colon, glioblastoma), where elevated phosphocholine makes it an oncometabolic drug
  target. Bi-allelic loss-of-function variants that reduce choline kinase activity
  cause an autosomal-recessive neurodevelopmental disorder with epilepsy and
  microcephaly. One splice isoform additionally relocalizes to lipid droplets upon
  glucose deprivation and, after AMPK phosphorylation and KAT5 acetylation, adopts a
  moonlighting protein-tyrosine kinase activity toward perilipins PLIN2/PLIN3.
