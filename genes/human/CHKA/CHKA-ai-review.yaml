  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: enables
  review:
    summary: >-
      Ethanolamine kinase activity (EC 2.7.1.82) is a genuine, experimentally
      demonstrated activity of CHKA, consistent with the phylogenetic (IBA) call
      across the choline/ethanolamine kinase family. It is a secondary activity of
      this enzyme; choline is the strongly preferred substrate (KM ~0.2 mM choline
