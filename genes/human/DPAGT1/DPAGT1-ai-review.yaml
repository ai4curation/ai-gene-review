taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: DPAGT1 (GlcNAc-1-P transferase, GPT; EC 2.7.8.15) is a polytopic (10-transmembrane)
  endoplasmic reticulum membrane enzyme that catalyzes the first and committed step of
  dolichol-linked oligosaccharide (LLO) assembly for protein N-linked glycosylation. On
  the cytoplasmic face of the ER membrane it transfers N-acetylglucosamine-1-phosphate
  (GlcNAc-1-P) from cytosolic UDP-GlcNAc onto the carrier lipid dolichyl phosphate (Dol-P),
  yielding GlcNAc-PP-dolichol (Dol-PP-GlcNAc), the membrane-anchored precursor onto which
  further sugars are added to build the 14-sugar N-glycan that is subsequently transferred
  to nascent proteins by oligosaccharyltransferase. The enzyme requires Mg2+, functions as
  a homodimer, and is a member of the polyprenyl-phosphate N-acetylhexosamine-1-phosphate
  transferase (PNPT) / glycosyltransferase family 4. It is the eukaryotic target of the
  nucleoside antibiotic tunicamycin, which acts as a competitive inhibitor mimicking
  UDP-GlcNAc. Loss-of-function variants cause DPAGT1-congenital disorder of glycosylation
  type Ij (CDG1J) and a limb-girdle form of congenital myasthenic syndrome (CMS13, with
  tubular aggregates); DPAGT1 overexpression contributes to aberrant N-glycosylation in
  oral cancer.
