- id: PMID:11481335
  title: Cloning of DGAT2, a second mammalian diacylglycerol acyltransferase, and
    related family members.
  findings:
  - statement: >-
      Cloned and characterized human/mouse DGAT2; expression in insect cells
      stimulated triglyceride synthesis 6-fold and required fatty acyl-CoA and
      diacylglycerol, establishing DGAT activity. DGAT2 has no homology with DGAT1.
    reference_section_type: ABSTRACT
    supporting_text: >-
      DGAT2 activity was dependent on the presence of fatty acyl-CoA and
      diacylglycerol, indicating that this protein is a DGAT.
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified original cloning/characterization of DGAT2; directly
      supports the core diacylglycerol O-acyltransferase activity and TAG
      biosynthesis annotations.
- id: PMID:14521909
  title: A novel diacylglycerol acyltransferase (DGAT2) is decreased in human psoriatic
    skin and increased in diabetic mice.
  findings:
  - statement: DGAT2 protein was detected on the endoplasmic reticulum and catalyzes the final step in triglyceride production.
    reference_section_type: ABSTRACT
    supporting_text: DGAT2 protein was detected on endoplasmic reticulum.
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified; supports ER localization (IDA) and the terminal role of
      DGAT2 in triglyceride synthesis.
- id: PMID:16214399
  title: 'Acyl coenzyme A dependent retinol esterification by acyl coenzyme A: diacylglycerol
    acyltransferase 1.'
  findings:
  - statement: >-
      DGAT and MGAT enzymes can carry out the acyl-CoA:retinol acyltransferase
      (ARAT) reaction; DGAT1 has the highest ARAT activity in the tissues studied.
    reference_section_type: ABSTRACT
    supporting_text: >-
      are capable of carrying out the acyl coenzyme A:retinol acyltransferase
      (ARAT) reaction
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: >-
      Abstract foregrounds DGAT1 as the major ARAT, but the paper establishes
      the ARAT side activity for DGAT-family enzymes; the EXP DGAT2 annotations
      reflect the full assay set. Not removable on abstract grounds.
- id: PMID:27184406
  title: 'Biochemical characterization of human acyl coenzyme A: 2-monoacylglycerol
    acyltransferase-3 (MGAT3).'
  findings:
  - statement: >-
      DGAT2 becomes concentrated around the lipid droplet surface (unlike the
      related MGAT3) and is required for synthesis/storage of intracellular
      triglycerides; ER membrane and lipid droplet localization.
    reference_section_type: ABSTRACT
    supporting_text: >-
      unlike DGAT2, does not become concentrated around the lipid droplet
      surface
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified; the paper characterizes MGAT3 but explicitly assays and
      compares DGAT2 (DGAT activity, ER membrane/lipid droplet localization),
      supporting the IDA annotations for DGAT2.
- id: PMID:28420705
  title: Synthesis of neutral ether lipid monoalkyl-diacylglycerol by lipid acyltransferases.
  findings:
  - statement: >-
      DGAT2, among several lipid acyltransferases, can use 1-monoalkylglycerol as
      an acyl acceptor to synthesize monoalkyl-monoacylglycerol/MADAG in vitro,
      but is highly selective against this substrate versus monooleoylglycerol.
    reference_section_type: RESULTS
    supporting_text: >-
      DGAT1, DGAT2, MGAT2, MGAT3, AWAT2/MFAT, and DC3 carried out both acylation
      steps resulting in synthesis of the final product, MADAG.
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: >-
      Full text available; supports the minor monoacylglycerol/ether-lipid side
      activity (IDA GO:0006640). DGAT2 is a minor contributor (~35-fold selective
      for 1-MOG).
- id: PMID:30970241
  title: The ER-Localized Protein DFCP1 Modulates ER-Lipid Droplet Contact Formation.
  findings:
  - statement: >-
      DFCP1/ZFYVE1 modulates ER-lipid-droplet contact formation; in this context
      DGAT2 interacts with SLC27A1 (interaction enhanced by ZFYVE1).
    reference_section_type: ABSTRACT
    supporting_text: >-
      The ER-Localized Protein DFCP1 Modulates ER-Lipid Droplet Contact
      Formation.
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified; underlies the DGAT2-SLC27A1 IPI (WITH UniProtKB:Q6PCB7)
      and the UniProt SUBUNIT statement about SLC27A1/ZFYVE1.
