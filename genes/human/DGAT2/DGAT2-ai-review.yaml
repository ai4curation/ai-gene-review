    label: endoplasmic reticulum membrane
  supported_by:
  - reference_id: PMID:16214399
    supporting_text: >-
      are capable of carrying out the acyl coenzyme A:retinol acyltransferase
      (ARAT) reaction
  - reference_id: file:human/DGAT2/DGAT2-uniprot.txt
    supporting_text: Also functions as an acyl-CoA
