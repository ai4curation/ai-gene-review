core_functions:
- description: >-
    Diacylglycerol O-acyltransferase catalyzing the terminal, committed step of
    triacylglycerol biosynthesis: acyl transfer from long-chain acyl-CoA to the
    sn-3 position of 1,2-diacyl-sn-glycerol to form triacylglycerol + CoA
    (EC 2.3.1.20), at the endoplasmic reticulum membrane and lipid-droplet
    surface.
  molecular_function:
    id: GO:0004144
    label: diacylglycerol O-acyltransferase activity
  directly_involved_in:
  - id: GO:0019432
    label: triglyceride biosynthetic process
  - id: GO:0035336
    label: long-chain fatty-acyl-CoA metabolic process
  locations:
  - id: GO:0005789
    label: endoplasmic reticulum membrane
  - id: GO:0005811
    label: lipid droplet
  substrates:
  - id: CHEBI:58342
    label: acyl-CoA
  - id: CHEBI:17815
    label: 1,2-diacyl-sn-glycerol
  supported_by:
  - reference_id: PMID:11481335
    supporting_text: >-
      DGAT2 activity was dependent on the presence of fatty acyl-CoA and
      diacylglycerol, indicating that this protein is a DGAT.
  - reference_id: PMID:11481335
    supporting_text: >-
      The expression of DGAT2 in insect cells stimulated triglyceride synthesis
      6-fold in assays with cellular membranes
  - reference_id: file:human/DGAT2/DGAT2-uniprot.txt
    supporting_text: >-
      Essential acyltransferase that catalyzes the terminal and only committed step
- description: >-
    Secondary acyl-CoA:retinol O-fatty-acyltransferase (ARAT, EC 2.3.1.76)
    activity of the DGAT2/MOGAT-family fold, esterifying retinol to retinyl
    esters; a genuine but minor side activity relative to DGAT catalysis.
  molecular_function:
    id: GO:0050252
    label: retinol O-fatty-acyltransferase activity
  directly_involved_in:
  - id: GO:0042572
    label: retinol metabolic process
  locations:
