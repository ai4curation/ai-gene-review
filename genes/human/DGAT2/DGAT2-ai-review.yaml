id: Q96PD7
gene_symbol: DGAT2
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  DGAT2 (diacylglycerol O-acyltransferase 2) is an integral endoplasmic
  reticulum membrane enzyme that catalyzes the terminal and only committed step
  of triacylglycerol (TAG) biosynthesis: transfer of a long-chain acyl group
  from acyl-CoA to the sn-3 position of 1,2-diacyl-sn-glycerol (DAG), producing
  triacylglycerol and CoA (EC 2.3.1.20). It is a member of the DGAT2/MOGAT
  acyltransferase family and shares no sequence homology with the
  MBOAT-family enzyme DGAT1, which performs the same net reaction. DGAT2 is a
  multi-pass ER membrane protein whose catalytic region faces the cytosol; it
  concentrates at ER–lipid-droplet contact sites and is also found on the lipid
  droplet surface and in the perinuclear region. Predominantly expressed in
  liver and white adipose tissue, DGAT2 is the quantitatively major
  TAG-synthesizing enzyme and, in liver, preferentially channels endogenously
  synthesized fatty acids into triglyceride for storage in lipid droplets;
  it is a therapeutic target in hepatic steatosis. Beyond its principal DGAT
  activity it displays several related in vitro acyltransferase activities,
  including acyl-CoA:retinol O-fatty-acyltransferase (ARAT, EC 2.3.1.76),
  monoacylglycerol acyltransferase activity, and use of monoalkylglycerol as an
  acyl acceptor to form ether neutral lipids. DGAT2 forms multimeric complexes
  of its own subunits and interacts with the fatty-acid transporter SLC27A1.
