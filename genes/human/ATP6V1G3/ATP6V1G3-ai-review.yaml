  - statement: >-
      G3 is a subunit of the V1 peripheral complex of the V-ATPase; the V1 complex
      includes three peripheral stalks each formed by an E-G heterodimer.
    reference_section_type: COMMENT
    supporting_text: three peripheral stalks each consisting of EG heterodimers
  - statement: >-
      The V-ATPase acidifies intracellular compartments and, in some cell types, is
      targeted to the plasma membrane to acidify the extracellular environment.
    reference_section_type: FUNCTION
    supporting_text: is targeted to the plasma membrane, where it is responsible for acidifying the extracellular environment
  - statement: ATP6V1G3 tissue specificity is kidney.
    reference_section_type: COMMENT
    supporting_text: 'TISSUE SPECIFICITY: Kidney.'
