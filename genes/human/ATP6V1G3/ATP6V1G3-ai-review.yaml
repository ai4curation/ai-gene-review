id: Q96LB4
gene_symbol: ATP6V1G3
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  ATP6V1G3 (V-type proton ATPase subunit G 3) is the kidney-enriched isoform of the
  "G" subunit of the peripheral (V1) domain of the vacuolar H+-ATPase (V-ATPase). The
  V-ATPase is a multisubunit rotary enzyme in which the cytosolic V1 complex hydrolyzes
  ATP and the membrane-integral V0 complex translocates protons, together acidifying
  intracellular compartments (endosomes, lysosomes, secretory vesicles) and, in
  specialized cells, the extracellular/luminal space. The G subunit is a component of
  the peripheral stalk (stator), forming an E-G heterodimer that connects the catalytic
  V1 head to the membrane-embedded V0 a-subunit; this stator stalk holds the catalytic
  AB heterohexamer stationary against the torque of the central rotor. Of the three human
  G paralogs (G1/G2/G3), G3 expression is restricted to and enriched in the kidney, with
  additional detection in inner-ear epithelium, and assembles into the tissue-specific
  proton pump (with a4, B1, C2, d2) that drives apical proton secretion by renal
  collecting-duct intercalated cells for systemic acid-base homeostasis. G3 directly
  binds the V0 a-subunit (a4/a1), providing a physical link between the V1 and V0 domains
  required for pump assembly and regulation.
