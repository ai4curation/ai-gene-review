- id: PMID:17360703
  title: V1 and V0 domains of the human H+-ATPase are linked by an interaction between
    the G and a subunits.
  findings:
  - statement: >-
      G3 subunit expression is limited to the kidney among major organs of mouse and man,
      with additional expression in human inner-ear epithelium; G3 assembles with other
      kidney-specific subunits (a4, C2, d2) plus B1 into a tissue-specific proton pump.
    reference_section_type: ABSTRACT
    supporting_text: in major organs of both mouse and man, G3 subunit expression is limited to the kidney
  - statement: >-
      G3 directly binds the V0 a4 subunit (pulled down from kidney membranes by
      immobilized full-length G3), confirming a4 and G3 are subunits of the same pump and
      providing a V1-V0 link required for assembly and regulation; similar G1/a1, G3/a1,
      and G1/a4 interactions occur.
    reference_section_type: ABSTRACT
    supporting_text: purified, immobilized full-length G3 to pull down the a4 subunit from human kidney membrane preparations
- id: PMID:12384298
  title: Molecular cloning and characterization of novel tissue-specific isoforms of the
    human vacuolar H(+)-ATPase C, G and d subunits, and their evaluation in autosomal
    recessive distal renal tubular acidosis.
  findings:
  - statement: >-
      ATP6V1G3 (G3) is a kidney-specific isoform of the V-ATPase G subunit, identified and
      characterized alongside tissue-specific C and d subunit isoforms.
    reference_section_type: ABSTRACT
    supporting_text: novel tissue-specific isoforms of the human vacuolar H(+)-ATPase C, G and d subunits
