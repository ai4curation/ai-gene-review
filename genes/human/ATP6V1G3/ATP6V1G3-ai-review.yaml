proposed_new_terms: []
suggested_questions:
- question: >-
    Does the kidney-specific G3-containing V-ATPase (with a4, B1, C2, d2) have distinct
    assembly, trafficking, or regulatory properties compared with the ubiquitous
    G1-containing pump in intercalated cells?
- question: >-
    What is the functional significance of the inner-ear expression of G3, and does it
    contribute to endolymph acidification or other otic ion-handling processes?
- question: >-
    Do isoform 3 (VSP_036423) and isoform 4 (VSP_036426), which alter the C-terminal
    coiled-coil region, retain the ability to form the E-G heterodimer and bind the
    a-subunit, or do they represent non-functional/regulatory variants?
suggested_experiments:
- experiment: >-
    Cryo-EM or crystallographic structure of the kidney-specific human V-ATPase containing
    G3, a4, B1, C2, and d2 to define how the G3 peripheral stalk engages the a4 subunit.
- experiment: >-
    Conditional knockout or knock-in of Atp6v1g3 in mouse renal intercalated cells with
    assessment of urinary acidification and systemic acid-base balance to test the
    physiological requirement of the G3 isoform.
- experiment: >-
    Co-immunoprecipitation and proximity-labeling in renal intercalated cells to map the
    full G3 interactome and confirm preferential incorporation of G3 into the
    tissue-specific pump over G1.
