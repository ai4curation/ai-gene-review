id: Q9HA47
gene_symbol: UCK1
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: UCK1 (Uridine-cytidine kinase 1) is a nucleoside kinase that catalyzes the
  phosphorylation of uridine and cytidine to their respective monophosphates (UMP and CMP),
  functioning in the pyrimidine nucleotide salvage pathway. The enzyme can use ATP or GTP as
  phosphate donors and shows specificity for pyrimidine ribonucleosides, not phosphorylating
  deoxyribonucleosides or purine ribonucleosides. UCK1 is also capable of phosphorylating various
  nucleoside analogs used in cancer chemotherapy and antiviral therapy.
existing_annotations:
- term:
    id: GO:0005737
    label: cytoplasm
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      Cytoplasm is a broad, pathway-compatible location for UCK1, but the localization evidence is mixed.
      Reactome describes cytosolic UCK1 activity and the IBA row supports cytoplasm, while PMID:27239701
      reports UCK1-GFP predominantly in the nucleus and UCK2-GFP in the cytosol.
    action: ACCEPT
    reason: >-
      Accept this broad cytoplasm row only as a non-exclusive location supported by GOA/Reactome-style
      pathway context. It should not be read as overriding the later GFP evidence for a nuclear UCK1 pool,
      and a direct nucleus annotation may be warranted after curator review.
    supported_by:
    - reference_id: Reactome:R-HSA-73599
      supporting_text: Cytosolic uridine-cytidine kinase 1 (UCK1) catalyzes the reactions of
        cytidine or uridine with ATP to form CMP or UMP and ADP
    - reference_id: file:human/UCK1/UCK1-deep-research-perplexity-lite.md
      supporting_text: See deep research file for comprehensive analysis
    - reference_id: PMID:27239701
      supporting_text: >-
        Subcellular localization studies showed that UCK1-GFP and UCK2-GFP were localized in the cell
        nucleus and cytosol, respectively.
- term:
    id: GO:0004849
    label: uridine kinase activity
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: Uridine kinase activity is a core function of UCK1, directly demonstrated by
      experimental evidence showing phosphorylation of uridine to UMP. This IBA annotation is
      consistent with direct experimental evidence (IDA) from PMID:11306702. The enzyme is highly
      specific for pyrimidine ribonucleosides.
    action: ACCEPT
    reason: This represents one of the two core molecular functions of UCK1. The enzyme catalyzes
      the phosphorylation of uridine to UMP using ATP or GTP as phosphate donor, as demonstrated
      experimentally in the original characterization study and confirmed through phylogenetic
      inference. The substrate specificity is well-established - UCK1 does not phosphorylate
      deoxyribonucleosides or purine ribonucleosides.
    supported_by:
    - reference_id: PMID:11306702
      supporting_text: The approximately 30-kDa proteins, named UCK1 and UCK2, were expressed in
        Escherichia coli and shown to catalyze the phosphorylation of Urd and Cyd. The enzymes did
        not phosphorylate deoxyribonucleosides or purine ribonucleosides.
- term:
    id: GO:0009224
    label: CMP biosynthetic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000108
  review:
    summary: >-
      UCK1 does generate CMP from cytidine, but this GO term is a broad biosynthetic-process parent that
      does not distinguish the salvage pathway from de novo CMP biosynthesis. The more informative and
      already annotated term is GO:0044211 CTP salvage.
    action: MODIFY
    reason: >-
      The evidence supports cytidine phosphorylation as the first step of CTP salvage, not a generic CMP
      biosynthetic process. Replace with the specific salvage-pathway term already supported by direct
      experimental evidence and UniProt pathway annotation.
    supported_by:
    - reference_id: file:human/UCK1/UCK1-uniprot.txt
      supporting_text: >-
        PATHWAY: Pyrimidine metabolism; CTP biosynthesis via salvage pathway; CTP from cytidine: step
        1/3.
    proposed_replacement_terms:
    - id: GO:0044211
      label: CTP salvage
- term:
    id: GO:0000166
    label: nucleotide binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000043
  review:
    summary: This is an overly general parent term that doesn't provide meaningful information about
      UCK1's specific function. While technically correct that UCK1 binds nucleotides (ATP/GTP as
      phosphate donors, and uridine/cytidine as substrates), this broad term lacks functional
      specificity. The more specific child term GO:0005524 (ATP binding) is already annotated.
    action: MARK_AS_OVER_ANNOTATED
    reason: This term is too vague and uninformative for curation purposes. It was automatically
      assigned based on UniProtKB keywords. UCK1 specifically binds ATP (and can also use GTP) as
      phosphate donors for its kinase activity. The more specific GO:0005524 (ATP binding) provides
      much more useful functional information and is already annotated. This overly broad parent
      term adds little value to the annotation set.
    supported_by:
    - reference_id: PMID:11306702
      supporting_text: Uridine-cytidine kinases (UCK) have important roles for the phosphorylation
        of nucleoside analogs that are being investigated for possible use in chemotherapy of
        cancer.
- term:
    id: GO:0004849
    label: uridine kinase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  review:
    summary: This is a duplicate annotation of GO:0004849 with computational evidence (IEA), while
      the same term is also annotated with both IBA and IDA evidence. The IEA annotation is
      redundant but not incorrect.
    action: ACCEPT
    reason: Although this is a duplicate annotation with weaker evidence than the IBA and IDA
      annotations for the same term, it is still accurate and represents a core function of UCK1.
      Duplicate annotations with different evidence codes are acceptable in GO.
    supported_by:
    - reference_id: PMID:11306702
      supporting_text: UCK1 and UCK2, were expressed in Escherichia coli and shown to catalyze the
        phosphorylation of Urd and Cyd.
- term:
    id: GO:0005524
    label: ATP binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  review:
    summary: UCK1 binds ATP as a phosphate donor for its kinase activity. The enzyme can also use
      GTP, but ATP is the primary physiological phosphate donor. This IEA annotation is supported by
      structural data (PDB 2JEO, 2UVQ) showing ATP/ADP binding sites and by the biochemical
      characterization demonstrating ATP usage.
    action: ACCEPT
    reason: ATP binding is well-supported by multiple lines of evidence. The enzyme uses ATP (or
      GTP) as a phosphate donor in the reaction uridine/cytidine + ATP → UMP/CMP + ADP + H+.
      Crystallographic structures (PDB 2JEO, 2UVQ) directly demonstrate ATP/ADP binding. This is a
      functionally relevant molecular function term that is more informative than the parent term
      GO:0000166 (nucleotide binding). The annotation was correctly inferred from InterPro domains
      and UniProtKB keywords.
    supported_by:
    - reference_id: PMID:11306702
      supporting_text: The approximately 30-kDa proteins, named UCK1 and UCK2, were expressed in
        Escherichia coli and shown to catalyze the phosphorylation of Urd and Cyd.
- term:
    id: GO:0016301
    label: kinase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  review:
    summary: This is a high-level parent term in the molecular function hierarchy. While UCK1 is
      indeed a kinase (specifically a nucleoside kinase), this term is overly general. The more
      specific and informative terms GO:0004849 (uridine kinase activity) and GO:0043771 (cytidine
      kinase activity) are already annotated with both IBA and IDA evidence.
    action: MARK_AS_OVER_ANNOTATED
    reason: This broad parent term was automatically inferred from InterPro domains and UniProtKB
      keywords. While technically accurate, it provides minimal functional information compared to
      the specific child terms (uridine kinase activity, cytidine kinase activity) that are already
      annotated with experimental evidence. In curation, such overly general parent terms are
      typically considered over-annotations when more specific child terms adequately describe the
      function.
    supported_by:
    - reference_id: PMID:11306702
      supporting_text: The approximately 30-kDa proteins, named UCK1 and UCK2, were expressed in
        Escherichia coli and shown to catalyze the phosphorylation of Urd and Cyd.
- term:
    id: GO:0016740
    label: transferase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000043
  review:
    summary: This is an extremely high-level parent term in the molecular function ontology. UCK1 is
      indeed a transferase (kinases transfer phosphate groups from ATP to substrates), but this
      root-level term provides virtually no functional specificity. Multiple more informative
      descendant terms are already annotated (kinase activity, uridine kinase activity, cytidine
      kinase activity).
    action: MARK_AS_OVER_ANNOTATED
    reason: This is a classic example of over-annotation with an overly broad parent term. It was
      automatically assigned based on UniProtKB keywords. While technically correct, GO:0016740 is
      so general that it encompasses a vast array of different enzyme activities. The more specific
      child terms (GO:0016301 kinase activity, GO:0004849 uridine kinase activity, GO:0043771
      cytidine kinase activity) provide far more useful functional information. Annotating to such
      high-level parent terms when specific child terms exist is generally discouraged in manual
      curation.
    supported_by:
    - reference_id: PMID:11306702
      supporting_text: The approximately 30-kDa proteins, named UCK1 and UCK2, were expressed in
        Escherichia coli and shown to catalyze the phosphorylation of Urd and Cyd.
