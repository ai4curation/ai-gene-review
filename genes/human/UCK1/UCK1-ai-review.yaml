    id: GO:0043771
    label: cytidine kinase activity
  evidence_type: IDA
  original_reference_id: PMID:11306702
  review:
    summary: Cytidine kinase activity is a core molecular function of UCK1, directly demonstrated by
      experimental evidence (IDA). This annotation is based on the original biochemical
      characterization study by Van Rompay et al. (2001) showing that recombinant UCK1
      phosphorylates cytidine to CMP. The enzyme exhibits strict substrate specificity, not
