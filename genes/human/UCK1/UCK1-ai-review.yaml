suggested_questions:
- question: Should UCK1 receive a direct nucleus cellular-component annotation based on the GFP
    localization evidence from PMID:27239701?
  experts:
  - GO cellular component curators
  - nucleotide metabolism specialists
- question: Which UCK1 isoforms or cell states determine nuclear versus cytosolic pyrimidine-salvage
    activity?
  experts:
  - cell biologists
  - metabolic enzyme specialists
suggested_experiments:
- experiment_type: Endogenous localization
  description: Use tagged knock-in or validated antibody staining to compare endogenous UCK1
    localization with UCK1-GFP localization across proliferating and differentiated cells.
  hypothesis: UCK1 has a substantial nuclear pool that is not captured by current cytosol/cytoplasm
    pathway annotations.
- experiment_type: Isoform rescue biochemistry
  description: Express individual UCK1 isoforms in UCK1/UCK2-deficient cells and measure uridine,
    cytidine, and nucleoside-analog phosphorylation.
  hypothesis: UCK1 isoforms differ in localization and in their contribution to pyrimidine salvage
    and analog activation.
