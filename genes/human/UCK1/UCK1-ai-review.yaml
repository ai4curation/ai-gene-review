- term:
    id: GO:0004849
    label: uridine kinase activity
  evidence_type: IDA
  original_reference_id: PMID:11306702
  review:
    summary: Uridine kinase activity is a core molecular function of UCK1, directly demonstrated by
      experimental evidence (IDA). This annotation is based on the original biochemical
      characterization study by Van Rompay et al. (2001) showing that recombinant UCK1
      phosphorylates uridine to UMP. The enzyme exhibits strict substrate specificity, not
      phosphorylating deoxyribonucleosides or purines.
    action: ACCEPT
    reason: This is the gold standard annotation with direct experimental evidence (IDA) from the
      original characterization paper PMID:11306702. The study cloned and expressed recombinant UCK1
      in E. coli and directly demonstrated its ability to catalyze uridine phosphorylation using
      biochemical assays. This represents one of the two core enzymatic activities of UCK1 (the
      other being cytidine kinase activity). The annotation is well-supported, specific, and
      represents a primary molecular function.
    supported_by:
    - reference_id: PMID:11306702
      supporting_text: The approximately 30-kDa proteins, named UCK1 and UCK2, were expressed in
        Escherichia coli and shown to catalyze the phosphorylation of Urd and Cyd. The enzymes did
        not phosphorylate deoxyribonucleosides or purine ribonucleosides.
