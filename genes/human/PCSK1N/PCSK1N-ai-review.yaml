      proprotein convertase 1.
- description: >-
    Full-length ProSAAS (and the 21 kDa N-terminal fragment, residues ~1-180)
    is an extracellular anti-aggregant chaperone that binds amyloidogenic
    clients and prevents their fibrillation. Direct biochemical evidence
    includes substoichiometric inhibition of amyloid-beta (Aβ1-42)
    fibrillation in thioflavin-T assays (residues 97-180 sufficient,
    PMID:24102330) and of alpha-synuclein fibrillation (residues 158-180
    critical, PMID:27457957). ProSAAS co-immunoprecipitates with Aβ from
    APdE9 mouse brain and co-localizes with amyloid pathology and with
    aggregated alpha-synuclein deposits in Parkinson's-disease substantia
    nigra. Anti-aggregant activity translates to in vivo neuroprotection:
    AAV/lentiviral ProSAAS overexpression rescues dopaminergic neurons from
    alpha-synuclein toxicity and blocks transsynaptic spread of
    alpha-synuclein in rodent Parkinson's-disease models (PMID:35527562).
    ProSAAS does NOT refold unfolded clients and does NOT disaggregate
    preformed fibrils, so it is not a foldase or a disaggregase. The
    Lindberg group has used the term "holdase" to describe its sequestration
    of TDP-43 aggregates in cytoplasmic membraneless spheres (PMID:35549000),
    but the GO definition of unfolded protein holdase activity (GO:0140309)
    emphasizes a carrier/delivery function that is not formally established
    for ProSAAS in vivo. The most defensible representation is therefore
    misfolded protein binding (with amyloid-beta binding as a more specific
    child) coupled to the BP "negative regulation of amyloid fibril formation".
  molecular_function:
    id: GO:0051787
    label: misfolded protein binding
  directly_involved_in:
  - id: GO:1905907
    label: negative regulation of amyloid fibril formation
  - id: GO:0050821
    label: protein stabilization
