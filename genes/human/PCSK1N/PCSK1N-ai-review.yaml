core_functions:
- description: >-
    The C-terminal Big PEN-LEN region of ProSAAS (residues 221-260, containing
    the LLRVKR hexapeptide motif at 239-244) is a potent and specific endogenous
    inhibitor of the subtilisin-family serine endopeptidase PCSK1/PC1/3. ProSAAS
    binds PCSK1 and slows convertase-mediated processing of prohormones such as
    proopiomelanocortin and proenkephalin in the regulated secretory pathway,
    thereby modulating the timing and extent of peptide hormone maturation.
    Inhibition is selective for PCSK1 over the related convertase PCSK2.
    Subsequent processing of ProSAAS to the smaller peptides eliminates the
    inhibition, providing a built-in temporal switch.
