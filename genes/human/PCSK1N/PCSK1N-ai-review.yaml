suggested_questions:
- question: >-
    Should an extracellular anti-aggregant chaperone that prevents fibrillation
    but does not refold clients and does not perform a documented carrier/handoff
    be annotated to GO:0051787 misfolded protein binding (plus BP GO:1905907
    negative regulation of amyloid fibril formation), or to GO:0140309 unfolded
    protein holdase activity? The CLU/clusterin curation in this repository uses
    the GO:0051787 + GO:1905907 + GO:0050821 combination for an analogous
    activity; the SCG5/7B2 review takes a similar approach. Is this the agreed
    convention for "anti-aggregant" chaperones, or is a new MF term warranted?
  experts:
  - I. Lindberg
- question: >-
    The TDP-43-encapsulating sphere phenotype reported in PMID:35549000 was
    obtained by deliberately removing ProSAAS's signal peptide to force
    cytoplasmic expression. Should this evidence be used to support a normal
    cellular MF (holdase activity) or restricted to "demonstrates capacity for
    prion-like client binding" with no associated cellular component
    annotation? ProSAAS does not normally reach the cytoplasm.
  experts:
  - I. Lindberg
  - J. Shorter
- question: >-
    Are PEN (GPR83 ligand) and Big LEN (GPR171 ligand) better captured by
    annotating the cleavage products as separate functional isoforms with
    their own MF (peptide-receptor ligand activity) and BP (G protein-coupled
    receptor signaling pathway) annotations, rather than by the current
    GO:0005102 signaling receptor binding annotation on the precursor?
  experts:
  - L. Devi
  - L. Fricker
suggested_experiments:
- hypothesis: >-
    Endogenous (rather than transgenic) ProSAAS limits alpha-synuclein
    fibrillation and transsynaptic spread in vivo.
  description: >-
    PCSK1N knockout (or neuron-specific conditional KO) crossed with
    AAV-alpha-synuclein PD models, with quantification of nigrostriatal TH
    loss, motor asymmetry, and rostral spread of alpha-synuclein after vagal
    AAV-aSyn injection. Compares the gain-of-function PMID:35527562 result
    against the loss-of-function condition.
  experiment_type: in vivo mouse genetics + viral aggregation models
- hypothesis: >-
    Recombinant ProSAAS binds amyloidogenic clients with stoichiometry and
    kinetics consistent with classical sub-stoichiometric "holdase" chaperones
    (e.g. small heat shock proteins, clusterin) and the binding is to
    monomers/early oligomers rather than mature fibrils.
  description: >-
    Surface plasmon resonance and microscale thermophoresis with purified
    ProSAAS and Aβ(1-42), alpha-synuclein, IAPP at defined assembly stages
    (monomer, oligomer, protofibril, mature fibril). Combine with AFM/EM to
    correlate binding modes with fibrillation outcome. Establishes whether the
    activity is on-pathway sequestration (holdase-like) versus passive
    co-aggregation.
  experiment_type: biophysical binding + fibrillation kinetics
- hypothesis: >-
    The N-terminal SAAS deposits in tau inclusions of Pick's disease and AD
    are a consequence of proteostatic dysregulation rather than ProSAAS
    actively driving tau pathology.
  description: >-
    Immuno-EM and antibody mapping of N-terminal SAAS fragments in human AD
    and Pick's disease brain combined with PCSK1N gain- and loss-of-function
    in iPSC-derived tauopathy organoids; assess whether ProSAAS modulates tau
    fibrillation in vitro.
  experiment_type: human neuropathology + iPSC functional study
