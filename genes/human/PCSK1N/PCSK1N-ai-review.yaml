gene_symbol: PCSK1N
product_type: PROTEIN
status: IN_PROGRESS
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  PCSK1N encodes ProSAAS (also called Proprotein convertase 1 inhibitor, pro-SAAS),
  a small (260 aa) neuroendocrine secretory precursor that is processed at paired
  basic sites in the regulated secretory pathway into multiple bioactive peptides
  (KEP, Big SAAS, Little SAAS, Big PEN-LEN, PEN, Big LEN, Little LEN). ProSAAS is
  expressed in neurons throughout the brain (and in pituitary, adrenal, and pancreas)
  and is stored in dense-core secretory granules of the trans-Golgi network before
  being released by regulated exocytosis into the extracellular space. ProSAAS has
  two distinct, well-supported molecular activities. (1) The C-terminal domain
  (Big PEN-LEN) is an endogenous, specific inhibitor of the serine endopeptidase
  proprotein convertase 1/3 (PCSK1/PC1/3); the hexapeptide LLRVKR within this
  region is necessary and sufficient for inhibition (PMID:10632593, PMID:11435430).
  (2) Full-length ProSAAS (or the 21 kDa N-terminal fragment, residues ~1-180)
  acts as an extracellular anti-aggregant chaperone: it binds and prevents the
  fibrillation of multiple amyloidogenic clients including amyloid-beta
  (PMID:24102330), alpha-synuclein (PMID:27457957, PMID:35527562), and (when
  forced into the cytoplasm) TDP-43 (PMID:35549000). Importantly, ProSAAS does
  not refold proteins and does not disaggregate preformed fibrils, so terms in
  the ATP-dependent foldase / disaggregase branches are not appropriate. In vivo,
  ProSAAS overexpression rescues dopaminergic neurons from alpha-synuclein toxicity
  and blocks transsynaptic spread of alpha-synuclein in rodent Parkinson's-disease
  models (PMID:35527562). After processing, two of the released peptides function
  as endogenous neuropeptide ligands: PEN binds GPR83 and Big LEN binds GPR171,
  contributing to feeding regulation (UniProt by similarity from mouse Q9QXV0).
  The N-terminal SAAS-derived peptides accumulate with cytoplasmic tau inclusions
  in Pick disease, Alzheimer's disease, and the parkinsonism-dementia complex of
  Guam (PMID:12914799, PMID:14746899); these are pathological deposits and not
  evidence for a normal cytoplasmic localization. This review addresses upstream
  go-annotation issue #6407, in which a curator asked which GO terms suitably
  capture the ProSAAS chaperone activity.
