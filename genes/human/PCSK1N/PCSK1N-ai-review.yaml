    label: extracellular space
  - id: GO:0030141
    label: secretory granule
  supported_by:
  - reference_id: PMID:24102330
    supporting_text: >-
      We here describe a novel anti-aggregant chaperone function for the
      neuroendocrine protein proSAAS, an abundant secretory polypeptide that
      is widely expressed within neural and endocrine tissues
  - reference_id: PMID:24102330
    supporting_text: >-
      In vitro, proSAAS efficiently prevented the fibrillation of Aβ(1-42) at
      molar ratios of 1 : 10, and this anti-aggregation effect was dose
      dependent.
  - reference_id: PMID:24102330
    supporting_text: >-
      Immunoreactive proSAAS co-immunoprecipitated with Aβ immunoreactivity in
      lysates from APdE9 mouse brains.
  - reference_id: PMID:27457957
    supporting_text: >-
      Recombinant proSAAS potently inhibits the fibrillation of α-synuclein in
      an in vitro assay; residues 158-180, containing a largely conserved
      element, are critical to this bioactivity.
  - reference_id: PMID:35527562
    supporting_text: >-
      Coinjection of proSAAS-encoding lentivirus profoundly reduced the motor
      asymmetry caused by unilateral nigral AAV-mediated human aSyn
      overexpression. This was accompanied by significant amelioration of the
      human aSyn-induced loss of both nigral TH-positive cells and striatal
      TH-positive terminals
  - reference_id: PMID:35527562
    supporting_text: >-
      proSAAS, a small neuronal chaperone, blocks aSyn-induced dopaminergic
      cytotoxicity in primary nigral cultures.
  - reference_id: PMID:35549000
    supporting_text: >-
      We previously demonstrated that proSAAS, a small secreted neuronal
      protein, exhibits potent chaperone activity against protein aggregation
      in vitro and blocks the cytotoxic effects of amyloid and synuclein
      oligomers in cell culture systems.
