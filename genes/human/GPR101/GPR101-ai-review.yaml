  qualifier: part_of
  review:
    summary: The source paper concerns PX-FERM cargo recognition and broad receptor trafficking,
      but the review evidence does not establish GPR101 as a stable signaling receptor complex
      component.
    action: MARK_AS_OVER_ANNOTATED
    reason: A GPCR can be part of signaling assemblies, but this annotation is too generic and
      indirect for GPR101 core function.
    supported_by:
    - reference_id: PMID:23382219
      supporting_text: These proteins include RTKs, integrins, GPCRs, hematocyte receptors, and
