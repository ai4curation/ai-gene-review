    summary: The current term is too specific because it names adrenergic receptor signaling,
      whereas GPR101 is an orphan GPCR and not an adrenergic receptor.
    action: MODIFY
    reason: If an adenylate-cyclase activating GPCR pathway annotation is retained from phylogenetic
      inference, the broader non-adrenergic term is more accurate for GPR101.
    proposed_replacement_terms:
