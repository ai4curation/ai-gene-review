id: Q96P66
gene_symbol: GPR101
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: GPR101 encodes an orphan class A/rhodopsin-like G protein-coupled receptor. The protein
  is a multi-pass plasma-membrane receptor with no firmly established endogenous ligand, but evolutionary
  and structural features support a GPCR signaling role. Increased GPR101 dosage is associated
  with X-linked acrogigantism and growth hormone-secreting pituitary adenoma predisposition, consistent
  with altered pituitary signaling rather than a defined enzymatic activity.
existing_annotations:
- term:
    id: GO:0004930
    label: G protein-coupled receptor activity
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: enables
  review:
    summary: GPR101 is a seven-transmembrane rhodopsin-like orphan receptor; GPCR activity is
      the best-supported molecular-function annotation even though its endogenous ligand remains
      unknown.
    action: ACCEPT
    reason: The UniProt record describes GPR101 as an orphan receptor and places it in the G-protein
      coupled receptor 1 family, and the IBA/InterPro evidence is consistent with the rhodopsin-like
      7TM architecture.
    supported_by:
    - reference_id: file:human/GPR101/GPR101-uniprot.txt
      supporting_text: 'FUNCTION: Orphan receptor.'
    - reference_id: file:human/GPR101/GPR101-uniprot.txt
      supporting_text: Belongs to the G-protein coupled receptor 1 family.
