- term:
    id: GO:0043410
    label: positive regulation of MAPK cascade
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: involved_in
  review:
    summary: Positive regulation of MAPK cascade is plausible for GPCR signaling but is downstream
      and not specifically established as the core molecular function of orphan GPR101.
    action: MARK_AS_OVER_ANNOTATED
    reason: The annotation is phylogenetically inferred from GPCR models rather than direct GPR101
      ligand/signaling experiments in this review set. It should not be treated as a core gene
      function until receptor coupling and downstream pathway usage are better defined.
    supported_by:
    - reference_id: file:human/GPR101/GPR101-uniprot.txt
      supporting_text: 'FUNCTION: Orphan receptor.'
- term:
    id: GO:0071880
    label: adenylate cyclase-activating adrenergic receptor signaling pathway
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: involved_in
