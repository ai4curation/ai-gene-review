suggested_questions:
- question: What endogenous ligand or ligand-independent activation mechanism drives GPR101 signaling
    in pituitary and hypothalamic contexts?
- question: Does human GPR101 activate Gs/adenylate cyclase directly, or are MAPK and cAMP pathway
    annotations indirect consequences of receptor overexpression?
suggested_experiments:
- description: Measure cAMP, calcium, beta-arrestin recruitment, and ERK activation in cells expressing
    wild-type and disease-associated GPR101 dosage models.
  hypothesis: GPR101 dosage changes will reveal a specific GPCR coupling signature relevant to
    X-linked acrogigantism.
- description: Use pituitary-relevant cell models to test whether GPR101 perturbation alters GH/GHRH
    pathway outputs through a specific G protein coupling mechanism.
  hypothesis: Pituitary-relevant GPR101 signaling will connect receptor activity to GH pathway
    output.
