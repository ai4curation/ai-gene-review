gene_symbol: GLUD2
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  GLUD2 (glutamate dehydrogenase 2, mitochondrial; EC 1.4.1.3) is a mitochondrial
  matrix enzyme of the Glu/Leu/Phe/Val dehydrogenase family that catalyzes the reversible
  oxidative deamination of L-glutamate to 2-oxoglutarate (alpha-ketoglutarate) and ammonia,
  using either NAD+ or NADP+ as the redox cofactor. This reaction links amino-acid and
  nitrogen metabolism to the tricarboxylic acid cycle. GLUD2 is a hominoid-specific enzyme
  that arose by retroposition (reverse transcription) of an mRNA from the housekeeping
  paralog GLUD1 in the common ape ancestor; it is encoded by an intronless, X-linked gene and
  is expressed in retina, testis, kidney and brain, where glutamate dehydrogenase activity is
  predominantly astrocytic. The enzyme assembles as a homohexamer and is imported into the
  mitochondrial matrix via an N-terminal transit peptide. GLUD2 has acquired adaptive
  regulatory properties that distinguish it from GLUD1: its basal activity is essentially
  insensitive to GTP inhibition, it is strongly activated by ADP and by L-leucine, and it
  functions well at neutral/low pH. These properties suit it to recycling neurotransmitter
  glutamate in astrocytes under conditions of high ADP:ATP ratio and intracellular
  acidification that accompany intense glutamatergic transmission.
