gene_symbol: DNAJC30
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: DNAJC30 (WBSCR18) is a mitochondrial inner-membrane DnaJ/HSP40 (J-domain)
  protein encoded in the 7q11.23 Williams-Beuren syndrome critical region. Imported
  via an N-terminal transit peptide and anchored by a single transmembrane helix,
  it has two intertwined roles in oxidative phosphorylation. It is an auxiliary component
  of the ATP synthase machinery, interacting directly with MT-ATP6 and ATP5MC2 and
  facilitating ATP synthesis. It also acts as a chaperone in a mitochondrial complex
  I (NADH:ubiquinone oxidoreductase) repair mechanism, promoting the efficient exchange/turnover
  of N-module subunits damaged by reactive oxygen species and thereby maintaining
  complex I efficiency. DNAJC30 is highly expressed in brain (pyramidal neurons).
  Biallelic loss-of-function variants cause autosomal-recessive Leber hereditary optic
  neuropathy (LHONAR1), and hemizygous loss contributes to the mitochondrial dysfunction
  underlying neurodevelopmental features of Williams-Beuren syndrome.
