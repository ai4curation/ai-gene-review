proposed_new_terms: []
suggested_questions:
- question: Does DNAJC30 act mechanistically as a canonical J-domain co-chaperone (stimulating
    a mitochondrial HSP70 such as mortalin/HSPA9) during complex I subunit exchange,
    or by a non-canonical holdase/extraction mechanism?
- question: Are the ATP-synthase auxiliary role and the complex I repair role mediated
    by the same activity, and which is primarily disrupted by the LHONAR1 variants?
suggested_experiments:
- description: Reconstitute complex I subunit exchange in vitro or in DNAJC30-knockout
    cells with wild-type vs LHONAR1 variants to quantify turnover of specific N-module
    subunits and complex I activity.
- description: Test DNAJC30 J-domain function (HPD-motif mutagenesis, mitochondrial
    HSP70 ATPase-stimulation assay) to determine whether it is a bona fide co-chaperone.
- description: Cross-linking/structural analysis of DNAJC30 within the ATP synthase
    complex to define how it contributes to ATP-synthase dimer and supercomplex integrity.
