- term:
    id: GO:0042802
    label: identical protein binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000107
  review:
    summary: >-
      CUL3 self-association is plausible because CRL3 complexes adopt dimeric (2:2)
      architectures driven by BTB-adaptor dimerization, but this is a low-information
      binding term.
    action: KEEP_AS_NON_CORE
    reason: >-
      Structural studies show CRL3 complexes assemble as 2:2 dimers (a BTB-adaptor dimer
      recruiting two CUL3-RBX1 arms), so CUL3 molecules are present within a dimeric
      complex. However, identical protein binding is a generic term that does not capture
      the informative scaffold function and is retained only as non-core.
    supported_by:
    - reference_id: file:human/CUL3/CUL3-deep-research-falcon.md
      supporting_text: >-
        structural/biochemical studies support **2:2 assemblies** (BTB dimer with two CUL3
        arms) in CRL3 complexes
