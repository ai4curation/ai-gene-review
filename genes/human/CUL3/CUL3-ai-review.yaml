- term:
    id: GO:0031625
    label: ubiquitin protein ligase binding
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      CUL3 is associated with ubiquitin ligase machinery, but the binding term is less
      informative than its scaffold activity.
    action: MODIFY
    reason: >-
      The evidence supports CUL3 as the scaffold component of CRL3 ligase complexes;
      ubiquitin protein ligase binding is a lower-information proxy. The CRL3 complex
      cellular-component annotation should be handled separately rather than used as an
      MF replacement.
    proposed_replacement_terms:
