    action: ACCEPT
    reason: >-
      This is the core molecular function of CUL3: it scaffolds RBX1/E2 catalytic
      machinery and BTB substrate adaptors rather than acting primarily as the catalytic
      transferase itself.
    supported_by:
    - reference_id: file:human/CUL3/CUL3-deep-research-falcon.md
      supporting_text: >-
        CUL3 is the **central scaffold** of CRL3 ubiquitin ligases, bridging (i) a
        **RING protein (RBX1)** that recruits E2~ubiquitin and (ii) **BTB-domain
        substrate adaptor/receptor proteins** that recruit specific substrates.
    - reference_id: file:human/CUL3/CUL3-deep-research-falcon.md
      supporting_text: >-
        evidence best supports a CUL3 annotation consistent with **“ubiquitin ligase
        complex scaffold activity”** / **E3 ligase scaffold** rather than
        “ubiquitin-protein transferase activity” (which is catalytic and typically
        attributed to the E2/E3 catalytic machinery rather than the scaffold)
