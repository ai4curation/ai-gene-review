- term:
    id: GO:0043161
    label: proteasome-mediated ubiquitin-dependent protein catabolic process
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      CUL3-containing CRL3 complexes support ubiquitin-dependent proteasomal substrate
      degradation.
    action: ACCEPT
    reason: >-
      Proteasome-mediated ubiquitin-dependent catabolism is a canonical proximal output
      for many CRL3 substrate-adaptor complexes, while non-degradative ubiquitination
      remains a caveat for some substrates.
    supported_by:
    - reference_id: file:human/CUL3/CUL3-deep-research-falcon.md
      supporting_text: >-
        Proteasomal targeting is a canonical outcome for many CRLs, and reviews
        explicitly describe substrate ubiquitination “for proteasomal degradation” as a
        CRL3 output
    - reference_id: file:human/CUL3/CUL3-deep-research-falcon.md
      supporting_text: >-
        not all CUL3-dependent ubiquitination is degradative
- term:
    id: GO:0160072
    label: ubiquitin ligase complex scaffold activity
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      CUL3 provides ubiquitin ligase complex scaffold activity in CRL3 complexes.
    action: ACCEPT
    reason: >-
      This is the core molecular function of CUL3: it scaffolds RBX1/E2 catalytic
      machinery and BTB substrate adaptors rather than acting primarily as the catalytic
      transferase itself.
    supported_by:
    - reference_id: file:human/CUL3/CUL3-deep-research-falcon.md
      supporting_text: >-
        CUL3 is the **central scaffold** of CRL3 ubiquitin ligases, bridging (i) a
        **RING protein (RBX1)** that recruits E2~ubiquitin and (ii) **BTB-domain
        substrate adaptor/receptor proteins** that recruit specific substrates.
    - reference_id: file:human/CUL3/CUL3-deep-research-falcon.md
      supporting_text: >-
        evidence best supports a CUL3 annotation consistent with **“ubiquitin ligase
        complex scaffold activity”** / **E3 ligase scaffold** rather than
        “ubiquitin-protein transferase activity” (which is catalytic and typically
        attributed to the E2/E3 catalytic machinery rather than the scaffold)
