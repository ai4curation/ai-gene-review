- id: file:human/CUL3/CUL3-deep-research-falcon.md
  title: Falcon deep research report on CUL3
  findings: []
core_functions:
- molecular_function:
    id: GO:0160072
    label: ubiquitin ligase complex scaffold activity
  description: >-
    CUL3 is the scaffold of CRL3 cullin-RING E3 ubiquitin ligase complexes,
    connecting RBX1/E2 catalytic machinery to BTB-domain substrate adaptors.
    This scaffold function drives substrate ubiquitination, including
    polyubiquitination and proteasome-mediated degradation in many adaptor
    contexts, while non-degradative ubiquitination and downstream phenotypes are
    substrate-specific.
  directly_involved_in:
  - id: GO:0016567
    label: protein ubiquitination
  - id: GO:0000209
    label: protein polyubiquitination
  - id: GO:0043161
    label: proteasome-mediated ubiquitin-dependent protein catabolic process
  locations:
  - id: GO:0005829
    label: cytosol
  - id: GO:0005634
    label: nucleus
  supported_by:
  - reference_id: file:human/CUL3/CUL3-deep-research-falcon.md
    supporting_text: >-
      CUL3 is the **central scaffold** of CRL3 ubiquitin ligases, bridging (i) a **RING
      protein (RBX1)** that recruits E2~ubiquitin and (ii) **BTB-domain substrate
      adaptor/receptor proteins** that recruit specific substrates.
  - reference_id: file:human/CUL3/CUL3-deep-research-falcon.md
    supporting_text: >-
      Multiple CRL3 systems demonstrate ubiquitination output; for example, CRL3^KLHL22
      assays support ubiquitination activity dependence on CUL3 structural motifs
  - reference_id: file:human/CUL3/CUL3-deep-research-falcon.md
    supporting_text: >-
      Proteasomal targeting is a canonical outcome for many CRLs, and reviews explicitly
      describe substrate ubiquitination “for proteasomal degradation” as a CRL3 output
proposed_new_terms: []
suggested_questions:
- question: >-
    Which generic protein-binding rows correspond to direct CUL3-BTB adaptor,
    RBX1, substrate, or regulator interactions that should be converted to more
    informative terms?
- question: >-
    Which substrate-specific pathway and phenotype annotations have direct CUL3
    scaffold-dependent evidence rather than adaptor/substrate or disease-context
    inference?
- question: >-
    Which annotations should distinguish CUL3's core scaffold activity from CRL3
    regulation by neddylation, deneddylation, CSN, and CAND1-mediated adaptor exchange?
suggested_experiments:
- description: >-
    Review CRL3 adaptor modules one at a time, separating CUL3 scaffold activity
    from adaptor-specific substrate recognition and downstream pathway outputs.
- description: >-
    Prioritize source-level review of membrane, Golgi, centrosome, spindle,
    cytoskeleton, and synaptic localization claims before retaining them as CUL3
    cellular component annotations.
