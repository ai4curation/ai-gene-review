- term:
    id: GO:0030332
    label: cyclin binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000107
  review:
    summary: >-
      This ortholog-transferred IEA annotation reflects CRL3-mediated targeting of cyclin
      E for ubiquitination, but direct cyclin binding by CUL3 itself is not established.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      Cyclin E is a CRL3 substrate (recruited via the RhoBTB3 adaptor at the Golgi;
      PMID:24145166 and PMID:10500095), but substrate recognition is mediated by the
      BTB adaptor rather than by direct CUL3 cyclin binding. Annotating CUL3 with cyclin
      binding over-attributes adaptor/substrate recognition to the scaffold.
    supported_by:
    - reference_id: PMID:24145166
      supporting_text: >-
        RhoBTB3 is part of a CUL3–ubiquitin ligase complex on the Golgi that targets
        Cyclin E.
