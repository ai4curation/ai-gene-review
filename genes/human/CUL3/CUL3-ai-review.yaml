- term:
    id: GO:0016567
    label: protein ubiquitination
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  review:
    summary: >-
      CUL3-containing CRL3 complexes mediate protein ubiquitination.
    action: ACCEPT
    reason: >-
      Protein ubiquitination is the proximal biological process output of CUL3 scaffold
      function in CRL3 E3 ligase complexes.
    supported_by:
    - reference_id: file:human/CUL3/CUL3-deep-research-falcon.md
      supporting_text: >-
        CUL3 is the **central scaffold** of CRL3 ubiquitin ligases, bridging (i) a
        **RING protein (RBX1)** that recruits E2~ubiquitin and (ii) **BTB-domain
        substrate adaptor/receptor proteins** that recruit specific substrates.
    - reference_id: file:human/CUL3/CUL3-deep-research-falcon.md
      supporting_text: >-
        Multiple CRL3 systems demonstrate ubiquitination output; for example,
        CRL3^KLHL22 assays support ubiquitination activity dependence on CUL3 structural
        motifs
