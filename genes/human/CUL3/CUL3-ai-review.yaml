id: Q13618
gene_symbol: CUL3
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  CUL3 is a cullin scaffold protein that forms CUL3-RBX1 cullin-RING E3 ubiquitin
  ligase complexes (CRL3). It bridges the RBX1/E2 ubiquitin-conjugating machinery
  with BTB/POZ-domain substrate-adaptor proteins (such as KEAP1, the KLHL family,
  KCTD family, SPOP, and RhoBTB proteins), enabling ubiquitination of adaptor-recruited
  substrates and, in many cases, their proteasome-mediated degradation. CRL3 activity
  is regulated by reversible neddylation/deneddylation of CUL3 and by the CAND1 and COP9
  signalosome exchange machinery. Through its different substrate adaptors, CRL3 acts in
  the NRF2/KEAP1 oxidative-stress response, WNK-kinase-dependent renal electrolyte and
  blood-pressure homeostasis, mitotic progression and cytokinesis, cytoskeletal
  regulation, and many other substrate-specific processes.
