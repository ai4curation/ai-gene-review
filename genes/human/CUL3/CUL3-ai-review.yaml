      biology rather than a core CUL3 function.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      The Falcon synthesis warns against promoting broad pathway, development, disease,
      or phenotype terms to core CUL3 annotations without direct mechanistic evidence at
      the annotated pathway node.
    supported_by:
    - reference_id: file:human/CUL3/CUL3-deep-research-falcon.md
      supporting_text: >-
        oxidative stress response, blood pressure/electrolyte phenotypes,
