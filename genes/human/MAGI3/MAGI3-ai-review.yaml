id: Q5TCQ9
gene_symbol: MAGI3
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  MAGI3 is a widely expressed, multidomain MAGUK-family scaffolding protein with
  a catalytically inactive guanylate-kinase-like region, two WW domains, and six
  PDZ domains. It concentrates at epithelial tight junctions and other cell-cell
  contacts, at selected plasma-membrane sites, and in the nucleus. Through its
  interaction domains, MAGI3 assembles phosphatases, receptors, and their
  downstream partners to regulate junction-associated signaling, including
  PTEN-PI3K-AKT, adrenergic- and lysophosphatidic-acid-receptor ERK signaling,
  and frizzled-VANGL/JNK signaling. MAGI3 also acts as a substrate-recognition
  adaptor in a SKP1-CUL1 ubiquitin-ligase assembly that promotes c-Myc
  ubiquitylation and proteasomal degradation in colorectal-cancer models.
  Full-length MAGI3 restrains YAP-dependent transformation, whereas a
  cancer-associated premature-polyadenylation product lacking C-terminal PDZ
  domains acts dominantly to disrupt the MAGI3-YAP complex.
