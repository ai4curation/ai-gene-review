core_functions:
- description: >-
    MAGI3 uses its PDZ and WW domains to assemble junctional receptor, phosphatase,
    and substrate complexes, positioning enzymes such as PTEN and PTPRB near their
    membrane-proximal substrates and thereby regulating PI3K-AKT, ERK, and related
    intracellular signaling pathways.
  molecular_function:
    id: GO:0140767
    label: enzyme-substrate adaptor activity
  directly_involved_in:
  - id: GO:0009966
    label: regulation of signal transduction
  - id: GO:0051896
    label: regulation of phosphatidylinositol 3-kinase/protein kinase B signal transduction
  - id: GO:0070372
    label: regulation of ERK1 and ERK2 cascade
  locations:
  - id: GO:0005911
    label: cell-cell junction
  - id: GO:0005923
    label: bicellular tight junction
  - id: GO:0005886
    label: plasma membrane
  supported_by:
  - reference_id: PMID:10748157
    supporting_text: >-
      MAGI3 allows for the juxtaposition of PTEN/MMAC to phospholipid signaling
      pathways involved with cell survival.
  - reference_id: PMID:12615970
    supporting_text: >-
      These findings suggest a possible role for MAGI-3 as a scaffolding molecule
      that links receptor tyrosine phosphatase with its substrates at the plasma
      membrane.
- description: >-
    MAGI3 acts as a substrate-recognition adaptor in a CUL1-SKP1 ubiquitin-ligase
    assembly, binding c-Myc and promoting its K48-linked ubiquitylation and
    proteasome-dependent degradation.
  molecular_function:
