    supporting_text: >-
      MAGI3 subsequently binds c-Myc through PBM of c-Myc at its carboxyl terminal
      and the fifth PDZ domain of MAGI3 to associate c-Myc with the SKP1-Cullin E3
      ligase
  - reference_id: PMID:35864508
    supporting_text: >-
      MAGI3 modulates c-Myc protein stability by promoting c-Myc
