proposed_new_terms: []
suggested_questions:
- question: >-
    How broadly does the endogenous MAGI3-SKP1-CUL1-c-Myc substrate-adaptor
    mechanism operate in normal human epithelia, and is it restricted to particular
    tissues or transformed-cell states?
- question: >-
    Which receptor, cell type, or stoichiometric features determine whether MAGI3
    attenuates or supports ERK1/2 signaling?
- question: >-
    Do the four normal human MAGI3 splice isoforms differ in junctional versus
    nuclear localization, partner selectivity, or signaling output?
- question: >-
    How should the tumor-associated MAGI3 premature-polyadenylation product be
    represented separately from normal splice isoforms in functional annotation?
suggested_experiments:
- description: >-
    Endogenously tag MAGI3 in polarized human epithelial cells and combine
    super-resolution imaging, proximity labeling, and acute degron depletion to map
    junctional PTEN/PTPRB complexes and quantify phosphoinositide, AKT, and junction
    barrier responses.
  experiment_type: endogenous tagging/proximity proteomics/signaling assay
  hypothesis: >-
    Endogenous junctional MAGI3 recruits phosphatases to defined membrane-proximal
    substrates and is required for spatially restricted suppression of PI3K-AKT
    signaling.
- description: >-
    Reproduce the c-Myc mechanism at endogenous protein levels in non-transformed
    human colonic organoids using MAGI3 knockout and rescue with PDZ2- and
    PDZ5-interface mutants; measure SKP1/CUL1 assembly, c-Myc K48 ubiquitylation,
    half-life, and proteasome dependence.
  experiment_type: organoid genetics/ubiquitination/protein-turnover assay
  hypothesis: >-
    MAGI3 bridges c-Myc to a CUL1-SKP1 ligase through separable PDZ interfaces in
    normal epithelium, rather than only under cancer-cell overexpression conditions.
- description: >-
    Express each normal MAGI3 splice isoform from its endogenous locus with
    isoform-specific tags and compare tight-junction, plasma-membrane, cytoplasmic,
    and nuclear partitioning together with PTEN, YAP, and receptor binding.
  experiment_type: isoform-resolved endogenous localization and interactomics
  hypothesis: >-
    Normal splice isoforms partition differently between junctional and nuclear
    complexes and thereby specialize signaling outputs.
- description: >-
    In a matched cell background, reconstitute MAGI3 with ADRB1, ADRB2, or LPAR2 at
    controlled expression levels and use live ERK reporters plus PDZ-interface
    mutants to determine why MAGI3 reverses the direction of ERK regulation between
    receptor systems.
  experiment_type: quantitative receptor-signaling reconstitution
  hypothesis: >-
    Receptor-tail affinity and recruited effector composition, rather than MAGI3
    abundance alone, determine whether the scaffold increases or decreases ERK1/2
    output.
