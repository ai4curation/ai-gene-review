    label: cytoplasm
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: is_active_in
  review:
    summary: >-
      PAINT infers cytoplasmic activity for MAGI3 from conserved MAGUK-family
      scaffold biology. MAGI3 is a soluble peripheral-membrane protein, and its
      signaling and ubiquitin-adaptor activities occur on the cytoplasmic side of
      membranes or within intracellular compartments.
    action: KEEP_AS_NON_CORE
    reason: >-
      Cytoplasm is plausible and not contradicted, but it is too broad to identify
      MAGI3's defining sites of action. Direct studies more specifically place
      MAGI3 at tight/cell-cell junctions, selected plasma-membrane sites, and in
      the nucleus; those locations should carry the core interpretation.
