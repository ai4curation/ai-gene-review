suggested_questions:
- question: >-
    In which human cell types does SMO signal predominantly through heterotrimeric Gi versus direct PKA-C
    inhibition, and how are these two immediate effector routes integrated?
- question: >-
    Which endogenous cholesterol or oxysterol species occupies each SMO sterol-binding site in specific
    physiological tissues?
suggested_experiments:
- hypothesis: >-
    Gi coupling and PKI-motif-dependent PKA inhibition make separable, cell-context-dependent contributions
    to human SMO-to-GLI signaling.
  description: >-
    Introduce endogenous separation-of-function SMO alleles that selectively disrupt Gi coupling or the
    PKI pseudosubstrate motif in human ciliated neural and mesenchymal organoids. Measure ciliary SMO
    trafficking, local and whole-cell cAMP, PKA substrate phosphorylation, GLI processing, and GLI target
    transcription after defined SHH and sterol stimulation, with wild-type rescue controls.
  experiment_type: CRISPR knock-in with live-cell signaling and organoid phenotyping
