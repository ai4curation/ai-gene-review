  title: Sterols in an intramolecular channel of Smoothened mediate Hedgehog signaling.
  findings:
  - statement: Sterols occupy connected binding sites within SMO and regulate its active signaling conformation.
    supporting_text: >-
      These data indicate that sterol transport through the core of SMO is a major regulator of SMO-mediated
      signaling.
    reference_section_type: ABSTRACT
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Full text read from PMC7669734; directly supports sterol binding and sterol-controlled SMO signaling.
- id: PMID:36202993
  title: A PKA inhibitor motif within SMOOTHENED controls Hedgehog signal transduction.
  findings:
  - statement: >-
      The SMO PKI pseudosubstrate motif directly inhibits PKA catalytic activity and is required for Hedgehog
      signal transduction.
    supporting_text: >-
      SMO uses a decoy substrate sequence to physically block the active site of the cAMP-dependent protein
      kinase (PKA) catalytic subunit (PKA-C) and extinguish its enzymatic activity.
    reference_section_type: ABSTRACT
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Full text read from PMC9696579; establishes the direct PKA-inhibitor mechanism and supports the
      proposed specific MF annotation.
- id: PMID:39138140
  title: GRK2 kinases in the primary cilium initiate SMOOTHENED-PKA signaling in the Hedgehog cascade.
  findings:
  - statement: >-
      GRK2 phosphorylation of active ciliary SMO triggers direct PKA-C binding and inactivation during
      endogenous Hedgehog signaling.
    supporting_text: GRK2 phosphorylation enables active SMO to bind PKA-C directly.
    reference_section_type: ABSTRACT
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Full text read from PMC11322411; validates the ciliary SMO-GRK2-PKA mechanism across cellular and
      in vivo models.
