- id: PMID:32413283
  title: >-
    Bi-allelic Variations of SMO in Humans Cause a Broad Spectrum of Developmental Anomalies Due to Abnormal
    Hedgehog Signaling.
  findings:
  - statement: >-
      Biallelic human SMO loss-of-function variants disrupt primary-cilium pathway dynamics and cause
      multisystem developmental anomalies.
    supporting_text: >-
      Cells derived from affected individuals showed normal ciliogenesis but severely altered Hh-signal
      transduction as a result of either altered PC trafficking or abnormal activation of the pathway
      downstream of SMO.
    reference_section_type: ABSTRACT
