- term:
    id: GO:0004862
    label: cAMP-dependent protein kinase inhibitor activity
  evidence_type: IDA
  original_reference_id: PMID:36202993
  qualifier: enables
  review:
    summary: >-
      SMO contains a C-terminal PKI pseudosubstrate motif that directly occupies the PKA catalytic-subunit
      active site and inhibits its kinase activity, preventing inhibitory GLI phosphorylation.
    action: NEW
    reason: >-
      Proposed because this specific molecular function is directly demonstrated in biochemical, cellular,
      and organismal assays in PMID:36202993 and is more informative than generic protein sequestering
      activity or PKA catalytic-subunit binding.
    additional_reference_ids:
    - PMID:39138140
    supported_by:
    - reference_id: PMID:36202993
      supporting_text: >-
        SMO uses a decoy substrate sequence to physically block the active site of the cAMP-dependent
        protein kinase (PKA) catalytic subunit (PKA-C) and extinguish its enzymatic activity.
    - reference_id: PMID:39138140
      supporting_text: GRK2 phosphorylation enables active SMO to bind PKA-C directly.
