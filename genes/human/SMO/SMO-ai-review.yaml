---
id: Q99835
gene_symbol: SMO
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  SMO (Smoothened) is a 787-amino-acid, seven-pass class-F G protein-coupled receptor and the obligate
  signal-transducing membrane component of vertebrate Hedgehog signaling. In the pathway-off state, PTCH1
  or PTCH2 restricts SMO access to activating sterols. Hedgehog binding to Patched relieves this inhibition,
  allowing cholesterol and oxysterols to bind SMO's extracellular cysteine-rich domain and transmembrane
  sterol-binding sites, stabilize an active conformation, and promote accumulation of SMO in the primary-cilium
  membrane. Active SMO can couple to heterotrimeric Gi, lowering cAMP, and also directly binds and inhibits
  the catalytic subunit of protein kinase A through a C-terminal pseudosubstrate/PKI motif. These mechanisms
  prevent inhibitory phosphorylation and processing of GLI transcription factors and permit GLI-dependent
  transcription. SMO therefore functions principally at the plasma membrane and the membrane of non-motile
  primary cilia, with context-dependent roles in embryonic patterning, organogenesis, tissue homeostasis,
  and cell proliferation. Germline biallelic loss-of-function variants cause pleiotropic developmental
  anomalies through impaired Hedgehog signaling, whereas activating somatic or mosaic variants drive tumors
  and Curry-Jones syndrome.
