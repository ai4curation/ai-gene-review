core_functions:
- description: >-
    Lysosomal cerebroside-sulfatase (arylsulfatase A): hydrolytically removes the
    3-O-sulfate from sulfatide (galactosyl-3-sulfate ceramide) to yield galactosylceramide
    plus sulfate, acting on the saposin-B-presented lipid substrate in the lysosomal lumen
    to drive sulfatide/sphingolipid catabolism.
