- term:
    id: GO:0006689
    label: ganglioside catabolic process
  evidence_type: IDA
  original_reference_id: PMID:11919180
  qualifier: involved_in
  review:
    summary: >-
      In Arsa-null mice, ganglio-series sulfatides (e.g. SB1a) accumulate, showing ARSA is
      required to degrade sulfated members of the ganglio-series glycosphingolipid pathway.
      ARSA acts on the sulfated (sulfatide) members rather than on sialylated gangliosides
      per se, so this is an adjacent/peripheral role rather than the core function.
    action: KEEP_AS_NON_CORE
    reason: >-
      Supported experimentally, but ARSA's direct chemistry is desulfation of
      galactosyl-3-sulfate glycolipids; its contribution to the ganglioside catabolic
      pathway is via the sulfated intermediates. Kept as non-core.
    supported_by:
    - reference_id: PMID:11919180
      supporting_text: "Arylsulfatase A is required to degrade SB1a. It is probably the sole"
    - reference_id: PMID:11919180
      supporting_text: "sphingolipid-sulfatase cleaving the galactosyl-3-sulfate bond."
