id: P15289
gene_symbol: ARSA
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  ARSA (arylsulfatase A, also called cerebroside-sulfatase or cerebroside-3-sulfatase;
  EC 3.1.6.8) is a lysosomal sulfatase of the glycosphingolipid degradation pathway. It
  hydrolytically removes the 3-O-sulfate from sulfatide (3-O-sulfogalactosylceramide,
  cerebroside-3-sulfate) to give galactosylceramide (cerebroside) plus sulfate, and also
  desulfates other sulfated glycolipids such as seminolipid and lactosylceramide sulfate
  (SM3). Catalysis requires the lipid-presenting activator protein saposin B (a cleavage
  product of PSAP) and a catalytic Calpha-formylglycine residue at Cys69 that is generated
  post-translationally in the endoplasmic reticulum by the formylglycine-generating enzyme
  SUMF1; a Ca2+ ion is bound in the active site. The enzyme is synthesized and matured in
  the ER and delivered to the lysosomal lumen via the mannose-6-phosphate receptor pathway,
  where it acts at acidic pH. Loss of ARSA activity causes intralysosomal accumulation of
  sulfatide and the demyelinating lysosomal storage disorder metachromatic leukodystrophy
  (MLD).
