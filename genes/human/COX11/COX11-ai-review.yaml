  review:
    summary: Copper chaperone activity is the core molecular function of COX11. It
      receives Cu(I) from the soluble IMS chaperone COX17 and directly delivers copper
      to the CuB site of MT-CO1. This ISS transfer (from yeast COX11, P56940) is
      corroborated by direct mechanistic evidence in human cells.
    action: ACCEPT
    reason: Copper chaperone activity captures COX11's specific molecular function
      better than the generic copper ion binding term and is directly supported by
      studies showing sequential Cu(I) transfer from COX17 to COX11 to the CuB site.
