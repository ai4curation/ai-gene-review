    chaperone COX17 and directly inserts copper into the CuB site of the catalytic
    subunit MT-CO1 during cytochrome c oxidase (complex IV) assembly, acting as a
    single-pass mitochondrial inner-membrane protein with its copper-binding CFCF
    motif (Cys217/Cys219) exposed to the intermembrane space.
