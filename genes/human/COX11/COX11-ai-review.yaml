- term:
    id: GO:0006754
    label: ATP biosynthetic process
  evidence_type: IMP
  original_reference_id: PMID:36030551
  qualifier: involved_in
  review:
    summary: COX11 knockdown lowers respiration-derived (mitochondrial) ATP levels,
      reflecting complex IV deficiency. This is a downstream physiological consequence
      of impaired CIV assembly rather than a direct molecular role of COX11 in ATP
      biosynthesis, which is carried out by complex V.
    action: KEEP_AS_NON_CORE
    reason: The effect on ATP levels is an indirect consequence of loss of copper
      delivery and CIV assembly; COX11 does not itself synthesize ATP. Retain as a
      non-core, phenotype-level annotation.
    supported_by:
      - reference_id: PMID:36030551
        supporting_text: COX11 is required to maintain mitochondrial
      - reference_id: PMID:36030551
        supporting_text: COX11 also participates in COX assembly by mediating copper
          delivery
- term:
    id: GO:0030003
    label: intracellular monoatomic cation homeostasis
  evidence_type: IDA
  original_reference_id: PMID:15840172
  qualifier: involved_in
  review:
    summary: This annotation derives from the physical interaction and functional
      coupling between COX11 and CNNM4/ACDP4, interpreted as a role in metal-ion
      transport and homeostasis. COX11's copper handling is dedicated to CIV metalation
      rather than general cation homeostasis; this broad homeostasis term is peripheral
      to its core copper chaperone function.
    action: KEEP_AS_NON_CORE
    reason: The metal-ion homeostasis inference comes from a yeast two-hybrid
      interaction with CNNM4 and is contextual/indirect; it does not represent COX11's
      core, dedicated copper-delivery role in complex IV assembly.
    supported_by:
      - reference_id: PMID:15840172
        supporting_text: COX11, an implication of the role of ACDP4 in essential metal
          ion transport and homeostasis.
