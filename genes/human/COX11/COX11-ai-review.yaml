id: Q9Y6N1
gene_symbol: COX11
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: COX11 is a mitochondrial inner-membrane copper metallochaperone required
  for assembly of cytochrome c oxidase (respiratory chain complex IV). Anchored in the
  inner membrane by a single N-terminal transmembrane helix, it presents a conserved
  C-terminal copper-binding headgroup (CFCF motif; Cys217/Cys219) on the intermembrane
  space side. COX11 receives Cu(I) from the soluble intermembrane-space chaperone COX17
  and specifically and directly delivers/inserts copper into the CuB site of the catalytic
  subunit MT-CO1 (COX1) during complex IV assembly; stable copper coordination is coupled
  to COX11 dimerization, supported by COX19. Loss of COX11 causes mitochondrial complex
  IV deficiency and, in humans, an autosomal recessive infantile-onset mitochondrial
  encephalopathy (MC4DN23).
