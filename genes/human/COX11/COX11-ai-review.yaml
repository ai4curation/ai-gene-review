  review:
    summary: COX11 is a single-pass mitochondrial inner-membrane protein that functions
      at the inner membrane, presenting its copper-binding headgroup to the intermembrane
      space where it metalates MT-CO1 during complex IV assembly. This IBA localization
      is correct and represents the core anatomical location of the protein.
    action: ACCEPT
