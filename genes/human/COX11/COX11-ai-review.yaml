    label: copper ion binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: COX11 binds copper via a conserved CFCF motif (Cys217/Cys219 in human;
      UniProt records Cu(+) binding at residues 217 and 219). Copper ion binding is a
      genuine, experimentally corroborated molecular activity of this metallochaperone.
      This InterPro-based IEA is broader than the more specific copper chaperone
      activity but is correct.
    action: ACCEPT
    reason: Copper ion binding is directly supported by the conserved copper-binding
      motif and by mechanistic studies showing COX11 receives and transfers Cu(I). It
      is a correct parent of the more informative copper chaperone activity term.
