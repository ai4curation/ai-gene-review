suggested_questions:
- question: Does UROD have any biologically meaningful non-cytosolic (e.g. nuclear) pool or moonlighting
    function, or is the HPA nucleoplasmic immunofluorescence signal purely incidental?
- question: Are any of the high-throughput interactome partners (e.g. PPID, PHKA2, LRATD2) reproducible
    and functionally relevant to UROD folding, stability, or heme-pathway channeling?
suggested_experiments:
- description: Metabolic-channeling / complex-formation assays (co-IP, proximity labeling, size-exclusion
    with purified proteins) to test whether UROD physically associates with adjacent cytosolic heme-biosynthesis
    enzymes (UROS, HMBS) under physiological conditions, given that NMR did not detect a stable URO-synthase/URO-decarboxylase
    complex.
- description: Quantitative subcellular fractionation and validated-antibody immunofluorescence to confirm
    that endogenous UROD is essentially confined to the cytosol and to assess the reported nucleoplasmic
    signal.
