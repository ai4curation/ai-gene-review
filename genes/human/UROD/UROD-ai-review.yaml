id: P06132
gene_symbol: UROD
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: UROD encodes uroporphyrinogen decarboxylase (URO-D; EC 4.1.1.37), the enzyme that catalyzes
  the fifth step of heme biosynthesis. It performs the sequential decarboxylation of the four acetate
  side chains of uroporphyrinogen III to methyl groups, releasing four molecules of CO2 and producing
  coproporphyrinogen III. The enzyme is cofactor-independent and acts as a homodimer with a single active-site
  aspartate (Asp86) that binds and activates the substrate and all partially decarboxylated intermediates
  at one catalytic center. Although either the I or III isomer of uroporphyrinogen can serve as substrate
  in vitro (the III isomer being processed more efficiently), only coproporphyrinogen III can ultimately
  be converted to heme. UROD is a soluble, cytosolic protein. Deficiency of UROD causes porphyria cutanea
  tarda (PCT), the commonest human porphyria, of which the familial form (FPCT) is autosomal dominant
  with low penetrance; complete/biallelic deficiency causes the severe childhood-onset hepatoerythropoietic
  porphyria (HEP), regarded as the homozygous form of PCT.
