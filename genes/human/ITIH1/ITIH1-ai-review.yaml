suggested_questions:
- question: >-
    Does HC1 bind HA noncovalently before or after transfer, or does the current
    hyaluronic-acid-binding annotation principally describe covalent HC1-HA
    attachment?
- question: >-
    Which human tissues preferentially deploy HC1 rather than HC2 in HC-HA
    matrices, and do the two heavy chains confer distinct matrix mechanics or
    receptor interactions?
- question: >-
    Do the three annotated ITIH1 isoforms differ in secretion, processing,
    bikunin loading, or TSG-6-mediated transfer?
suggested_experiments:
- hypothesis: >-
    The HC1 VWFA MIDAS motif couples magnesium binding to TSG-6 recognition
    without itself conferring the catalytic transferase activity.
