core_functions:
- description: >-
    Provides the noninhibitory HC1 component of plasma inter-alpha-inhibitor and,
    after TSG-6-dependent transesterification, becomes an HA-associated heavy
    chain that participates in organization of HA-rich extracellular matrices.
    HC1's magnesium-bearing VWFA MIDAS motif also contributes to the
    metal-dependent TSG-6 recognition step that precedes transfer.
