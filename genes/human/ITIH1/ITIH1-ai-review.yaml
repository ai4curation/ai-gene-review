id: P19827
gene_symbol: ITIH1
product_type: PROTEIN
aliases:
- IGHEP1
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  ITIH1 is a liver-enriched secreted plasma glycoprotein that is processed to
  inter-alpha-trypsin inhibitor heavy chain H1 (HC1). In plasma, HC1 is ester-linked
  through the chondroitin-sulfate chain of bikunin and assembles with HC2 and
  bikunin in inter-alpha-inhibitor. HC1 itself is noninhibitory; the complex's
  serine-protease inhibition resides in bikunin. TSG-6-dependent transesterification
  can transfer HC1 from bikunin chondroitin sulfate to hyaluronan, producing an
  HA-associated heavy-chain pool that participates in organization of HA-rich
  extracellular matrices. Its VWFA domain contains a magnesium-binding MIDAS
  motif that contributes to metal-dependent recognition by TSG-6 before heavy-chain
  transfer.
