core_functions:
- description: Catalytic subunit of the NatA complex catalyzing co-translational
    N-terminal (alpha-amino) acetylation of nascent polypeptides bearing small
    N-terminal residues (Ser, Ala, Thr, Gly, Cys, Val) exposed after
    initiator-methionine excision, using acetyl-CoA (EC 2.3.1.255).
  molecular_function:
    id: GO:0004596
    label: protein-N-terminal amino-acid acetyltransferase activity
  locations:
  - id: GO:0005737
    label: cytoplasm
  supported_by:
  - reference_id: file:human/NAA10/NAA10-uniprot.txt
    supporting_text: Catalytic subunit of N-terminal acetyltransferase complexes
      which display alpha (N-terminal) acetyltransferase activity
  - reference_id: file:human/NAA10/NAA10-uniprot.txt
    supporting_text: Acetylates amino termini that are devoid of initiator
      methionine
- description: As the catalytic component of the ribosome-associated NatA complex,
    NAA10 partners with the auxiliary subunit NAA15 (which anchors the enzyme to the
    ribosome) to act co-translationally on emerging nascent chains.
  molecular_function:
    id: GO:0043022
    label: ribosome binding
  locations:
  - id: GO:0031415
    label: NatA complex
  supported_by:
  - reference_id: file:human/NAA10/NAA10-uniprot.txt
    supporting_text: Interacts with the ribosome
  - reference_id: file:human/NAA10/NAA10-uniprot.txt
    supporting_text: Component of the N-terminal acetyltransferase A complex (also
      called the NatA complex) composed of NAA10 and NAA15
proposed_new_terms: []
suggested_questions:
- question: To what extent is the internal (lysine) acetyltransferase activity of
    free NAA10 a genuine physiological function versus an in vitro property of the
    NAA15-unbound enzyme?
- question: How do Ogden syndrome variants (e.g. Ser37Pro) differentially impair
    NatA catalysis, NAA15 binding, and ribosome association?
suggested_experiments:
- description: N-terminal acetylome (N-terminal COFRADIC / SILAC) profiling in NAA10
    patient-variant versus wild-type cells to quantify substrate-specific loss of
    Nt-acetylation.
- description: Reconstitution of NatA with and without NAA15/HYPK/NAA50 to dissect
    how each auxiliary factor modulates NAA10 catalytic specificity and ribosome
    binding.
- description: Targeted proteomics to test whether reported lysine-acetylation
    substrates (HIF1A, HSPA1A, TSC2) are modified by free NAA10 in vivo under
    physiological conditions.
