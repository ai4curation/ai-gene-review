  title: 'Identification and characterization of the human ARD1-NATH protein acetyltransferase complex.'
  findings:
  - statement: Human NatA (ARD1/NAA10 + NATH/NAA15) is a ribosome-associated complex
      with N-terminal acetyltransferase activity for Ser/Ala N-termini.
    reference_section_type: RESULTS
