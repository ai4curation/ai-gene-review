suggested_questions:
- question: How is the choice between DNAJC9's nuclear histone-chaperone role and its cytoplasmic/membrane heat-shock-stress role regulated, and is the J-domain ATPase stimulation of HSP70 used in both contexts?
- question: Does DNAJC9 act as a general quality-control "clean-up" factor that resolves aberrant histone-folding intermediates across multiple histone chaperone handover steps?
suggested_experiments:
- description: Reconstitute the DNAJC9-MCM2-H3-H4 complex with HSP70 and measure J-domain-dependent HSP70 ATPase stimulation and refolding of destabilized histone H3-H4, comparing wild-type with the HPD (J-domain) and histone-binding-region mutants.
- description: Acute degron depletion of DNAJC9 followed by genome-wide nucleosome occupancy and nascent-chromatin proteomics to define its requirement in replication- and transcription-coupled nucleosome assembly.
