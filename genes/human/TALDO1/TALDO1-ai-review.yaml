  review:
    summary: Phylogenetic (IBA) assignment of nuclear localization, reflecting the
      regulated nucleocytoplasmic shuttling of transaldolase seen in mammalian orthologs.
    action: KEEP_AS_NON_CORE
    reason: Isoform 1 of TALDO1 shuttles between nucleus and cytoplasm via importin
      alpha/beta and CRM1, and a nuclear pool exists, so the localization is not wrong.
      However, the catalytic PPP function is executed in the cytosol; nuclear
      localization is a regulatory/moonlighting distribution rather than the core
      site of function, so it should not be treated as a core annotation. The
      "is_active_in" qualifier overstates catalytic activity in the nucleus.
    supported_by:
