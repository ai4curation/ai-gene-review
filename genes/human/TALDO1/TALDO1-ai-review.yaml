core_functions:
- description: Transaldolase catalyses the reversible transfer of a three-carbon
    dihydroxyacetone unit from sedoheptulose-7-phosphate to glyceraldehyde-3-phosphate
    (and the reverse), interconverting sedoheptulose-7-phosphate + glyceraldehyde-3-phosphate
    with erythrose-4-phosphate + fructose-6-phosphate. This is the rate-limiting step
    of the non-oxidative branch of the pentose phosphate pathway, linking it to the
    glycolytic intermediate pool, and takes place in the cytosol.
