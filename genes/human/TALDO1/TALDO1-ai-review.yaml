id: P37837
gene_symbol: TALDO1
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: Transaldolase (EC 2.2.1.2), the enzyme that catalyses the rate-limiting
  step of the non-oxidative branch of the pentose phosphate pathway. It transfers
  a three-carbon dihydroxyacetone unit between sugar phosphates via a Schiff-base
  intermediate on an active-site lysine, catalysing the reversible reaction
  sedoheptulose-7-phosphate + D-glyceraldehyde-3-phosphate <-> erythrose-4-phosphate
  + beta-D-fructose-6-phosphate. This reaction links the pentose phosphate pathway
  back to the glycolytic intermediates fructose-6-phosphate and glyceraldehyde-3-phosphate,
  allowing the cell to balance ribose-5-phosphate production with NADPH generation and
  to recycle sugar phosphates. The enzyme is predominantly cytosolic (with regulated
  nucleocytoplasmic shuttling) and forms a homodimer with a TIM-barrel fold. Loss of
  transaldolase function causes transaldolase deficiency, an autosomal-recessive
  inborn error of the pentose phosphate pathway that presents in the neonatal/infantile
  period with hepatosplenomegaly, liver cirrhosis/fibrosis, thrombocytopenia and
  hemolytic anemia, accompanied by accumulation of polyols and sedoheptulose.
