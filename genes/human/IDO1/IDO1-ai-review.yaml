    supporting_text: >-
      Note=Binds 1 heme group per subunit
existing_annotations:
- term:
    id: GO:0004833
    label: L-tryptophan 2,3-dioxygenase activity
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: enables
  review:
    summary: >-
      Phylogenetic (IBA) annotation to the tryptophan 2,3-dioxygenase reaction.
      IDO1 does catalyze this L-Trp -> N-formyl-L-kynurenine chemistry, but
      GO:0004833 is properly the term for tryptophan 2,3-dioxygenase (TDO)-type
      enzymes; the IDO-specific, more informative term for this gene is
      GO:0033754 (indoleamine 2,3-dioxygenase activity, EC 1.13.11.52), which is
      also annotated experimentally. Modify to the IDO-specific term.
    action: MODIFY
    reason: >-
      The reaction chemistry is correct, but the IDO-specific term
      GO:0033754 better captures IDO1's molecular function (broad indoleamine
      substrate specificity; distinct from hepatic TDO2). See UniProt EC
      1.13.11.52 and PMID:18026683.
    proposed_replacement_terms:
    - id: GO:0033754
      label: indoleamine 2,3-dioxygenase activity
    propagation_review:
      root_cause: TERM_SCOPING_PROBLEM
      failure_modes:
      - GRANULARITY_MISMATCH
- term:
