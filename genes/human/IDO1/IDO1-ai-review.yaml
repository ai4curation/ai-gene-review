- term:
    id: GO:0034354
    label: "'de novo' NAD+ biosynthetic process from L-tryptophan"
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: involved_in
  review:
    summary: >-
      IDO1 performs only the first committed step (L-Trp -> N-formyl-L-kynurenine)
      of the pathway that can ultimately feed de novo NAD+ biosynthesis via
      quinolinate. Annotating IDO1 to the whole multi-step de novo NAD+
      biosynthetic process is an over-propagation; the immediate/physiological
      role of IDO1 is the kynurenine-pathway entry step, and in immune contexts
      the products are used for signaling/tolerance rather than committed NAD+
      synthesis.
    action: KEEP_AS_NON_CORE
    reason: >-
      IDO1 contributes only the entry step; the full de novo NAD+ pathway
      involves many downstream enzymes. Retain as a non-core downstream/pathway
      association rather than a core function.
    propagation_review:
      root_cause: TERM_SCOPING_PROBLEM
      failure_modes:
      - ROLE_CONFLATION
