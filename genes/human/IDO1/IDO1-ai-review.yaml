- id: PMID:18026683
  title: Evolution of vertebrate indoleamine 2,3-dioxygenases.
  findings:
  - statement: >-
      Enzymatically characterized mammalian and non-mammalian indoleamine
      2,3-dioxygenases using recombinant proteins, establishing indoleamine
      2,3-dioxygenase catalytic activity and the large difference in catalytic
      efficiency for L-tryptophan versus D-tryptophan (basis for EC 1.13.11.52
      and the L-/D-Trp kinetic parameters recorded in UniProt).
    reference_section_type: RESULTS
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified; abstract-only in cache. UniProt cites this paper
      (ECO:0000269) for the catalytic activity and biophysicochemical
      properties (Km 21.23 uM L-Trp vs 4.6 mM D-Trp). Directly supports the
      indoleamine 2,3-dioxygenase MF for IDO1.
- id: PMID:2109605
  title: Molecular cloning, sequencing and expression of human interferon-gamma-inducible
    indoleamine 2,3-dioxygenase cDNA.
  findings:
  - statement: >-
      Cloned the human IFN-gamma-inducible IDO cDNA (403-aa ORF); transfection
      of human fibroblasts conferred constitutive IDO enzymatic activity,
      establishing that the gene encodes the tryptophan-degrading enzyme and
      that expression is interferon-gamma-inducible.
    reference_section_type: RESULTS
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified; abstract-only. Establishes the tryptophan-catabolizing
      (kynurenine-pathway) function and IFN-gamma inducibility. Does NOT
      establish electron transfer activity; the GO:0009055 TAS from this paper
      is an over-annotation.
- id: PMID:25310899
  title: Human renal tubular epithelial cells suppress alloreactive T cell proliferation.
  findings:
  - statement: >-
      In activated human renal tubular epithelial cells, IDO (assayed via the
      inhibitor 1-methyl-L-tryptophan) contributes to enhanced apoptosis of
      proliferating CD4+/CD8+ T cells; the IDO inhibitor only partially or did
      not restore T-cell proliferation, so the proliferation effect was not
      driven by IDO in this system.
    reference_section_type: RESULTS
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified; abstract-only. Supports the IMP annotations for
      indoleamine 2,3-dioxygenase activity and positive regulation of T cell
      apoptotic process, and is consistent with the NOT annotation for
      regulation of activated T cell proliferation (IDO inhibitor failed to
      restore proliferation).
- id: PMID:9712583
  title: Prevention of allogeneic fetal rejection by tryptophan catabolism.
  findings:
  - statement: >-
      Pharmacologic inhibition of IDO caused rapid T cell-induced rejection of
      allogeneic concepti in pregnant mice, demonstrating that IDO-mediated
      tryptophan catabolism at the maternal-fetal interface suppresses T-cell
      activity and prevents fetal rejection.
    reference_section_type: RESULTS
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified; abstract-only. Classic maternal-fetal tolerance study
      (mouse model). Supports the female pregnancy / maternal-fetal immune
      tolerance role annotated by TAS.
- id: Reactome:R-HSA-198563
  title: IDO1 dioxygenates L-Trp to NFK
  findings:
  - statement: >-
      Cytosolic indoleamine 2,3-dioxygenase catalyzes the conversion of
      L-tryptophan and oxygen to formylkynurenine; the active human enzyme is
      cytosolic.
    reference_section_type: RESULTS
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Reactome reaction describing the IDO1-catalyzed L-Trp -> N-formyl-L-kynurenine
      step and its cytosolic localization. Title left as fetched.
