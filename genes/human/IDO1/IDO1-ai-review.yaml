      Indoleamine 2,3-dioxygenase (IDO) and tryptophan 2,3-dioxygenase (TDO) are
      tryptophan-degrading enzymes that catalyze the same reaction, the first step in
      tryptophan catabolism via the kynurenine pathway.
  - reference_id: file:human/IDO1/IDO1-uniprot.txt
