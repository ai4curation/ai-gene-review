- term:
    id: GO:0009055
    label: electron transfer activity
  evidence_type: TAS
  original_reference_id: PMID:2109605
  qualifier: enables
  review:
    summary: >-
      IDO1 is a heme-containing dioxygenase that incorporates both atoms of O2
      into tryptophan; it is not an electron carrier/electron transfer protein.
      The cited paper (PMID:2109605) is a cDNA cloning and IFN-gamma-inducibility
      study that reports IDO/tryptophan-degrading activity but provides no
      evidence for electron transfer activity. This MF is an over-annotation
      (likely conflating cytochrome b5-mediated reduction of the heme, which is
      an activity of the partner reductant, not of IDO1 itself).
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      No support for electron transfer activity as a molecular function of IDO1;
      the enzyme's function is heme-dependent dioxygenation. Source paper does
      not establish this activity. Not REMOVE per policy for non-IEA evidence.
