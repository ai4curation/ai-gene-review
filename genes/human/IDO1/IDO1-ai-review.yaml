id: P14902
gene_symbol: IDO1
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  Indoleamine 2,3-dioxygenase 1 (IDO1) is a cytosolic, heme (heme b)-dependent
  dioxygenase that catalyzes the first and rate-limiting step of tryptophan
  catabolism along the kynurenine pathway, oxidizing L-tryptophan (and, less
  efficiently, other indoleamines such as D-tryptophan and serotonin) with
  molecular oxygen to N-formyl-L-kynurenine (EC 1.13.11.52). It catalyzes the
  same reaction as tryptophan 2,3-dioxygenase (TDO2) but, unlike the
  constitutive hepatic TDO2, IDO1 is broadly inducible - most notably by
  interferon-gamma - across many cell types including dendritic cells,
  macrophages, epithelial and endothelial cells. Through local depletion of
  tryptophan and accumulation of kynurenine-pathway metabolites, IDO1 acts as
  a key immunoregulatory enzyme: it suppresses effector T-cell proliferation,
  promotes T-cell apoptosis and regulatory T-cell differentiation, and thereby
  contributes to peripheral immune tolerance, maternal-fetal tolerance, control
  of intracellular pathogens, and tumor immune evasion. The catalytic subunit
  binds one heme b group per monomer, with the ferrous heme iron ligated by a
  proximal histidine (His346).
