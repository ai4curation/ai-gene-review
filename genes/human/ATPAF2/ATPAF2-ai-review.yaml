id: Q8N5M1
gene_symbol: ATPAF2
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: ATPAF2 (ATP12 homolog) is a mitochondrial molecular chaperone that acts
  as an assembly factor for the F1 catalytic sector of mitochondrial ATP synthase
  (Complex V). Encoded in the nucleus and imported into mitochondria via an N-terminal
  transit peptide, it binds the unassembled F1 alpha subunit (ATP5F1A) during assembly
  and prevents non-productive self-aggregation of the alpha subunit, thereby promoting
  formation of the alpha3-beta3 catalytic core. It is a non-catalytic chaperone (ATP12
  family) rather than an enzyme. It acts at the matrix face of the mitochondrial inner
  membrane. Loss of function causes mitochondrial complex V (ATP synthase) deficiency,
  a severe encephalopathy/encephalomyopathy (MC5DN1) that can present with
  3-methylglutaconic aciduria.
