    supporting_text: RELA/p65, thereby suppressing RELA-mediated NF-kappaB transactivation
- description: >-
    MKRN2 is an RNA-binding protein via its CCCH zinc fingers, consistent with the makorin
    family's coupling of RNA recognition to ubiquitin ligase activity.
  molecular_function:
    id: GO:0003723
    label: RNA binding
  locations:
