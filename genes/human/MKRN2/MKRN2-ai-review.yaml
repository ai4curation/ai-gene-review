    supporting_text: PMID:22681889
proposed_new_terms: []
suggested_questions:
- question: Does human MKRN2 directly ubiquitinate RELA/p65 and regulate NF-kB/inflammation, or are these roles confined to the rodent ortholog?
- question: Given the makorin family's role in poly(A) ribosome-associated quality control (MKRN1), does MKRN2 contribute to co-translational quality control, and how is it functionally partitioned from MKRN1?
suggested_experiments:
- description: In vitro and cell-based ubiquitination assays with human MKRN2 (and a RING-dead mutant) on candidate substrates (RELA/p65, ribosome-associated proteins) to establish direct activity.
- description: iCLIP/ribosome profiling in MKRN2-knockout human cells to test for a poly(A)/RQC role analogous to MKRN1 and define MKRN2-specific target transcripts.
