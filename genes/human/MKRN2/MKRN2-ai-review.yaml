core_functions:
- description: >-
    MKRN2 is a makorin-family RING-type E3 ubiquitin-protein ligase that catalyzes ubiquitin
    transfer onto substrate lysines, targeting substrates (including the NF-kB subunit
    RELA/p65) for proteasome-dependent degradation.
  molecular_function:
    id: GO:0061630
    label: ubiquitin protein ligase activity
  locations:
