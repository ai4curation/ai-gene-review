gene_symbol: MKRN2
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  MKRN2 (makorin RING finger protein 2; RNF62) is a RING-type E3 ubiquitin ligase of the
  makorin family and a paralog of MKRN1. Like other makorins it pairs a C3HC4 RING domain,
  which confers ubiquitin-protein ligase activity, with CCCH/C3H zinc-finger motifs capable
  of RNA binding. MKRN2 catalyzes ubiquitin transfer onto substrate proteins; it has been
  reported (largely by similarity to the rodent ortholog) to promote polyubiquitination and
  proteasome-dependent degradation of the NF-kB subunit RELA/p65, thereby suppressing
  RELA-mediated transactivation and dampening inflammatory responses, and to contribute to
  spermiation and male fertility. It is found in both the cytoplasm and nucleus. MKRN2 is
  considerably less characterized than MKRN1, and many of its biological-process annotations
  derive from cross-species inference rather than direct human experimentation.
