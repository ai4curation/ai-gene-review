gene_symbol: UAP1
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: UAP1 (UDP-N-acetylhexosamine pyrophosphorylase; historically AGX/AgX,
  SPAG2) catalyzes the final step of the hexosamine biosynthetic pathway, condensing
  N-acetyl-alpha-D-glucosamine 1-phosphate (GlcNAc-1-P) with UTP to produce UDP-N-acetylglucosamine
  (UDP-GlcNAc) plus diphosphate (EC 2.7.7.23). It also acts on N-acetyl-alpha-D-galactosamine
  1-phosphate (GalNAc-1-P) to generate UDP-N-acetylgalactosamine (UDP-GalNAc; EC 2.7.7.83).
  UDP-GlcNAc is the universal amino-sugar nucleotide donor used for N- and O-linked
  protein glycosylation, O-GlcNAcylation, GPI-anchor and proteoglycan synthesis, and
  (via GNE) sialic acid biosynthesis, placing UAP1 at a central metabolic node. The
  cytosolic enzyme exists as a monomer and homodimer; two major splice isoforms (AGX1
  and AGX2) differ by a 17-amino-acid insert near the C-terminus that shifts substrate
  preference between GalNAc-1-P and GlcNAc-1-P. Beyond metabolism, UAP1 additionally
  functions as a protein serine pyrophosphorylase that pyrophosphorylates IRF3 at Ser-386
  following TBK1 phosphorylation, promoting IRF3 dimerization and type I interferon
  responses during antiviral innate immunity.
