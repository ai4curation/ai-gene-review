- id: PMID:23024808
  title: Functional specialization in proline biosynthesis of melanoma.
  findings:
  - statement: >-
      Recombinant human PYCR2 was purified and directly assayed for NAD(P)H-dependent
      reduction of P5C to proline (core molecular function GO:0004735).
    reference_section_type: RESULTS
  - statement: >-
      Cell fractionation localized PYCR1 and PYCR2 to mitochondria (distinct from
      cytosolic PYCRL), and siRNA silencing showed PYCR2 acts predominantly in the
      glutamate-derived route of proline biosynthesis.
    reference_section_type: RESULTS
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Full text available and cached. Directly establishes PYCR2's catalytic
      activity, mitochondrial localization and role in the glutamate route of
      proline biosynthesis; the primary experimental basis for the core MF, BP
      and location annotations. Supporting quotes verified verbatim.
- id: PMID:24930674
  title: Frequent amplification of ORAOV1 gene in esophageal squamous cell cancer
    promotes an aggressive phenotype via proline metabolism and ROS production.
  findings:
  - statement: >-
      ORAOV1 (LTO1, UniProtKB:Q8WV07) was found to bind pyrroline-5-carboxylate
      reductase (PYCR) by peptide mass fingerprinting; PYCR knockdown reversed the
      ORAOV1-driven stress resistance.
    reference_section_type: RESULTS
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: >-
      Abstract-only cache. The paper's primary focus is ORAOV1; it reports a
      physical interaction with "PYCR" generically. Supports the PYCR2 IPI
      (GO:0005515) but "protein binding" is uninformative; the interaction is
      non-core. Interaction partner recorded in UniProt as LTO1.
- id: PMID:25865492
  title: Mutations in PYCR2, encoding pyrroline-5-carboxylate reductase 2, cause microcephaly
    and hypomyelination.
  findings:
  - statement: >-
      Biallelic PYCR2 variants (p.Arg119Cys, p.Arg251Cys) cause hypomyelinating
      leukodystrophy 10 (HLD10); mutant proteins retain mitochondrial localization
      but are less stable.
    reference_section_type: RESULTS
  - statement: >-
      A CRISPR PYCR2-knockout line showed decreased mitochondrial membrane
      potential and increased susceptibility to apoptosis under oxidative stress;
      zebrafish ortholog knockdown recapitulated microcephaly.
    reference_section_type: RESULTS
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Abstract-only cache but abstract is detailed. Establishes disease
      (HLD10), mitochondrial localization, and the oxidative-stress/redox role
      (IMP GO:0034599). Supporting quotes verified verbatim against the abstract.
- id: PMID:2722838
  title: Purified human erythrocyte pyrroline-5-carboxylate reductase. Preferential
    oxidation of NADPH.
  findings:
  - statement: >-
      Purified human erythrocyte P5C reductase catalyzes NAD(P)H-dependent reduction
      of P5C to proline; it has higher affinity for NADPH than NADH and is
      competitively inhibited by NADP+ but not by proline.
    reference_section_type: RESULTS
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Abstract-only cache. Cited by UniProt for FUNCTION, CATALYTIC ACTIVITY,
      SUBUNIT and SUBCELLULAR LOCATION. Characterizes the erythrocyte enzyme;
      basis for the EXP catalytic-activity and (erythrocyte) cytoplasm
      annotations. Quote verified verbatim.
- id: PMID:34800366
  title: Quantitative high-confidence human mitochondrial proteome and its dynamics
    in cellular context.
  findings:
  - statement: >-
      High-throughput proteomics detected PYCR2 in the human mitochondrial
      proteome, corroborating its mitochondrial localization.
    reference_section_type: RESULTS
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: >-
      High-throughput (HTP) mitochondrial-proteome dataset supporting the
      mitochondrial localization; corroborative rather than primary.
- id: PMID:6894153
  title: Pyrroline-5-carboxylate reductase in human erythrocytes.
  findings:
  - statement: >-
      P5C reductase activity was identified in human erythrocytes; its kinetics and
      regulation differ from the fibroblast enzyme, suggesting an erythrocyte role
      in generating NADP+ (redox) rather than proline for protein synthesis.
    reference_section_type: RESULTS
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Abstract-only cache. Cited by UniProt for FUNCTION, CATALYTIC ACTIVITY,
      ACTIVITY REGULATION and TISSUE SPECIFICITY. Supports the EXP catalytic
      activity and the redox interpretation. Quote verified verbatim.
- id: Reactome:R-HSA-6783939
  title: PYCR2 decamer reduces (S)-1-pyrroline-5-carboxylate to L-Pro
  findings:
  - statement: >-
      Reactome models PYCR2 as a homodecamer reducing (S)-1-pyrroline-5-carboxylate
      to L-proline with NADPH, localized to the cytosol.
    reference_section_type: RESULTS
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: >-
      Reactome reaction record; supports the catalytic activity but asserts a
      cytosolic localization at odds with the mitochondrial localization
      established experimentally for PYCR2 in nucleated cells.
