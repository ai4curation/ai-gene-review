id: Q96C36
gene_symbol: PYCR2
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  PYCR2 is one of three human pyrroline-5-carboxylate reductase isozymes (PYCR1,
  PYCR2, PYCRL) and catalyzes the final, NAD(P)H-dependent step of proline
  biosynthesis: reduction of (S)-1-pyrroline-5-carboxylate (P5C) to L-proline
  (EC 1.5.1.2). It is a mitochondrial enzyme that assembles into a homodecamer
  built from five homodimers, and it acts chiefly in the glutamate-derived route
  to proline, using the mitochondrial P5C pool generated by P5C synthase. Like
  its close paralog PYCR1 (84% identical), PYCR2 can use either NADH or NADPH;
  at physiological substrate concentrations it shows higher specific activity
  with NADH, while the historically characterized erythrocyte activity has higher
  affinity for NADPH and is competitively inhibited by NADP+, leading to the
  proposal that in some cell types the enzyme also contributes to redox balance
  by regenerating NADP+. Beyond proline supply, PYCR2 supports mitochondrial
  membrane potential and resistance to oxidative-stress-induced apoptosis.
  Biallelic loss-of-function variants in PYCR2 cause hypomyelinating
  leukodystrophy 10 (HLD10), an autosomal recessive disorder with postnatal
  microcephaly, severe psychomotor delay, hypomyelination and reduced cerebral
  white-matter volume, indicating a non-redundant role for PYCR2 in the
  developing central nervous system.
