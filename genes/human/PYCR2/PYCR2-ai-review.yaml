proposed_new_terms: []
suggested_questions:
- question: >-
    What is the physiological cofactor preference of PYCR2 in mitochondria of
    nucleated cells, and does its NADH/NADPH usage couple proline synthesis to
    mitochondrial redox state in a tissue-specific manner?
- question: >-
    Why is PYCR2 non-redundant with PYCR1 in the developing CNS despite 84%
    identity and overlapping mitochondrial localization and activity?
suggested_experiments:
- description: >-
    Structure- and cell-based dissection of the HLD10 R119C and R251C variants to
    determine how each destabilizes the decamer/dimer interface and reduces
    enzyme abundance, relating residual catalytic output to disease severity.
- description: >-
    Metabolic flux analysis (13C-glutamate/ornithine tracing) in PYCR2-null vs
    PYCR1-null neural cells to quantify each isozyme's contribution to proline
    supply and NADP+/NADPH balance during myelination.
