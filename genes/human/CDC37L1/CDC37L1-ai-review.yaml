suggested_questions:
- question: Does CDC37L1/Harc have a kinase-client specificity distinct from its paralog
    CDC37, or does it act redundantly within the Hsp90 kinase-maturation pathway?
- question: Is the platelet dense granule / extracellular localization of CDC37L1
    a genuine secreted pool with a function, or carryover from abundant cytoplasmic
    chaperome proteins in platelet proteomics?
- question: What is the functional consequence of CDC37L1 phosphorylation at Ser-32
    (mitotic / TCR signaling) and Ser-88 for its chaperone-binding or client-handoff
    activity?
suggested_experiments:
- description: Affinity purification-mass spectrometry of tagged CDC37L1 versus CDC37
    from the same cell line to compare their kinase-client repertoires and define
    CDC37L1-specific clients.
- description: In vitro reconstitution assays measuring CDC37L1-dependent loading
    of a model kinase client onto Hsp90 (and handoff from Hsp70/Hop), using the C-terminal
    Hsp70-binding and central Hsp90-binding regions as domain deletions.
- description: CRISPR knockout or knockdown of CDC37L1 (with and without CDC37 co-depletion)
    followed by kinome stability profiling to test for redundancy with CDC37 in client
    maturation.
