description: CDC37L1 (Hsp90 co-chaperone Cdc37-like 1, also called Harc, "Hsp90-associating
  relative of Cdc37") is a cytoplasmic co-chaperone of the CDC37 family and a paralog
  of the kinase-specific Hsp90 co-chaperone CDC37. It self-associates and forms complexes
  with the molecular chaperones Hsp70 and Hsp90 as well as with Hsp90 co-chaperones
  and adaptors including CDC37, STIP1/Hop, FKBP4 and PPID. Through distinct domains
  it engages Hsp90 (central/C-terminal region) and Hsp70/Hop (C-terminal region),
  acting as an adaptor that promotes the interaction of client proteins with the Hsp70
  and Hsp90 chaperone systems and thereby contributing to client (notably protein
  kinase) folding, maturation and stabilization. It is broadly expressed (brain, heart,
  kidney, liver, placenta and skeletal muscle) and is phosphorylated on serine residues.
