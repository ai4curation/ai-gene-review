- term:
    id: GO:0006457
    label: protein folding
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: involved_in
  review:
    summary: CDC37L1 contributes to chaperone-mediated client protein folding/maturation
      as a co-chaperone of the Hsp70/Hsp90 system. Protein folding is a reasonable
      biological-process outcome of this co-chaperone role, though CDC37L1's direct
      molecular action is adaptor/co-chaperone binding rather than catalysis of folding
      itself.
    action: KEEP_AS_NON_CORE
    reason: The protein folding process is a downstream consequence of the Hsp70/Hsp90
      machine that CDC37L1 supports as a co-chaperone; it is a plausible process annotation
      but is non-core relative to its molecular co-chaperone/adaptor function.
    supported_by:
