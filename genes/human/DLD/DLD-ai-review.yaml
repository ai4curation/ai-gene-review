  review:
    summary: DLD is a mitochondrial matrix protein; the phylogenetic (IBA) mitochondrion
      annotation is correct and consistent with the mitochondrial transit peptide (residues
      1-35) and abundant experimental localization data.
    action: ACCEPT
    reason: Well-supported by an N-terminal mitochondrial targeting sequence and multiple
      experimental localization studies. Broad but accurate; the more specific mitochondrial
      matrix term captures the same information at finer granularity.
- term:
    id: GO:0004148
    label: dihydrolipoyl dehydrogenase (NADH) activity
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: enables
  review:
    summary: This is the core, defining molecular function of DLD/E3 (EC 1.8.1.4). The
      phylogenetic annotation matches abundant human experimental evidence and the UniProt
      catalytic-activity annotation (dihydrolipoyl-lysyl-protein + NAD+ = lipoyl-lysyl-protein
      + NADH + H+; RHEA:15045).
    action: ACCEPT
    reason: DLD catalyzes reoxidation of the dihydrolipoyl moiety on lipoyl-bearing domains of
      E2/H components with NAD+ as the ultimate electron acceptor. Directly supported by
      enzymatic assays and structural work; this is the most specific correct MF term.
- term:
    id: GO:0006103
    label: 2-oxoglutarate metabolic process
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: involved_in
  review:
    summary: As the shared E3 component of the 2-oxoglutarate (alpha-ketoglutarate)
      dehydrogenase complex, DLD participates in 2-oxoglutarate metabolism within the TCA
      cycle. The phylogenetic annotation is biologically correct.
    action: KEEP_AS_NON_CORE
    reason: Accurate but general; DLD's involvement is via its shared dehydrogenase activity in
      the OGDH complex rather than a 2-oxoglutarate-specific function. The more specific
