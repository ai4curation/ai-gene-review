id: P09622
gene_symbol: DLD
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  DLD encodes dihydrolipoyl dehydrogenase (E3; dihydrolipoamide dehydrogenase, EC 1.8.1.4),
  a mitochondrial FAD-dependent, NAD+-linked flavoenzyme that functions as a homodimer with
  one FAD per subunit and a redox-active active-site disulfide. Its enzymatic role is to
  reoxidize the reduced (dihydro)lipoyl groups carried on the lipoyl-bearing domains of the
  E2/H components of several 2-oxoacid dehydrogenase systems, passing the electrons to NAD+
  via FAD (regenerating the oxidized lipoyl cofactor for another catalytic cycle). DLD is a
  shared subunit: it serves as the common E3 component of the pyruvate dehydrogenase complex
  (PDH), the 2-oxoglutarate (alpha-ketoglutarate) dehydrogenase complex (OGDH), the
  branched-chain alpha-ketoacid dehydrogenase complex (BCKDH), and the 2-oxoadipate
  dehydrogenase complex (OADH), and it is also the L protein of the mitochondrial glycine
  cleavage system. Through these complexes DLD contributes to pyruvate decarboxylation to
  acetyl-CoA, the tricarboxylic acid cycle, branched-chain amino acid catabolism, and lysine
  degradation. It resides mainly in the mitochondrial matrix, with a small nuclear pool of the
  2-oxoglutarate dehydrogenase complex that supplies succinyl-CoA for KAT2A-mediated histone
  succinylation. Because the enzyme is shared across multiple complexes, loss-of-function
  variants cause dihydrolipoamide dehydrogenase (E3) deficiency, a combined disorder with
  features of maple syrup urine disease together with lactic acidosis and
  alpha-ketoglutaric aciduria.
