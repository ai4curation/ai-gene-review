core_functions:
- description: Dihydrolipoyl dehydrogenase (E3) activity - the shared, defining function of
    DLD. As a FAD-dependent, NAD+-linked flavoenzyme homodimer, DLD reoxidizes the dihydrolipoyl
    groups on the lipoyl-bearing E2/H components of mitochondrial 2-oxoacid dehydrogenase
    complexes and the glycine cleavage system, transferring electrons to NAD+ via FAD. This
    single activity is used by the pyruvate dehydrogenase, 2-oxoglutarate dehydrogenase,
    branched-chain alpha-ketoacid dehydrogenase and 2-oxoadipate dehydrogenase complexes.
  molecular_function:
    id: GO:0004148
    label: dihydrolipoyl dehydrogenase (NADH) activity
  directly_involved_in:
  - id: GO:0006086
    label: pyruvate decarboxylation to acetyl-CoA
  - id: GO:0120551
    label: 2-oxoglutarate decarboxylation to succinyl-CoA
  - id: GO:0120552
    label: branched-chain alpha-keto acid decarboxylation to branched-chain acyl-CoA
  locations:
  - id: GO:0005759
    label: mitochondrial matrix
  supported_by:
  - reference_id: PMID:16442803
    supporting_text: utilizes the specific
      dihydrolipoamide dehydrogenase (E3) binding protein (E3BP) to tether the
      essential E3 component to the 60-meric core of the complex
  - reference_id: PMID:15712224
    supporting_text: The E3 subunit is common to
      two other enzymatic complexes, namely pyruvate dehydrogenase complex (PDC) and
      branched-chain ketoacid dehydrogenase complex (BCKDC).
