- id: PMID:30795902
  title: Defining the Functional Role of Na(V)1.7 in Human Nociception.
  findings:
  - statement: In CIP participants with biallelic loss-of-function SCN9A mutations,
      noxious thermal and mechanical stimuli are not perceived as painful, while mechanical/vibration
      detection thresholds remain normal.
    supporting_text: neither noxious temperature nor noxious mechanical stimuli were
      felt as painful
  - statement: CRISPR-tagged endogenous Nav1.7 localizes to the soma membrane, axons,
      axon terminals, and >90% of nodes of Ranvier in human iPSC-derived nociceptors.
    supporting_text: NaV1.7 could be seen localized to >90% of nodes of Ranvier in
      myelinated axons
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: PubMed-verified, full text available; primary human evidence for
      neuronal action potential, pain perception, and subcellular localization (node
      of Ranvier, axon terminus).
- id: PMID:37117223
  title: Pain-causing stinging nettle toxins target TMEM233 to modulate Na(V)1.7 function.
