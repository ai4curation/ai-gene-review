  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: involved_in
  review:
    summary: This cardiac process term is over-propagated from the Nav family tree.
      Nav1.7 is not a cardiac channel; the cardiac voltage-gated sodium channel is
      Nav1.5 (SCN5A). The original cloning study explicitly failed to detect SCN9A
      transcripts in heart.
    action: MARK_AS_OVER_ANNOTATED
    reason: Phylogenetic over-propagation. Nav1.7 is expressed in peripheral sensory
      and sympathetic neurons, not in cardiomyocytes, and has no established role in
      cardiac muscle contraction. The IBA WITH/FROM set (P35498 Nav1.1, Q14524 Nav1.5)
      reflects cardiac-channel paralogs, not SCN9A.
    supported_by:
