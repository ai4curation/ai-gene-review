    action: KEEP_AS_NON_CORE
    reason: Plausible peripheral role consistent with CIP thermal phenotypes, but
      IEA-only and not a core/direct molecular function; Nav1.7 is a downstream amplifier,
      not the thermal sensor. Keep as a non-core process annotation.
    supported_by:
