- id: PMID:7720699
  title: Structure and functional expression of a new member of the tetrodotoxin-sensitive
    voltage-activated sodium channel family from human neuroendocrine cells.
  findings:
  - statement: hNE-Na (Nav1.7) is a 1977-aa TTX-sensitive voltage-activated sodium
      channel; heterologous expression yields rapidly activating/inactivating Na+
      currents and generates action potentials.
    supporting_text: The channel exhibited rapid activation and inactivation kinetics,
      and was blocked by tetrodotoxin and cadmium with IC50 values of 24.5 nM and
      1.1 mM, respectively.
  - statement: SCN9A transcripts are not detectable in heart, indicating Nav1.7 is
      not a cardiac sodium channel.
    supporting_text: Transcripts were not identified in pituitary gland, brain, heart,
      liver or kidney
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: PubMed-verified abstract-only; founding functional study establishing
      channel activity, plasma-membrane localization, and absence from heart.
- id: file:human/SCN9A/SCN9A-deep-research-falcon.md
  title: Falcon deep research report for human SCN9A
  findings:
  - statement: Falcon deep research affirms the core molecular function as a voltage-gated
      Na+ channel selective for Na+ via the canonical DEKA selectivity filter (Asp-Glu-Lys-Ala
      across DI-DIV), supporting the GO:0005248 / GO:0005261 annotations.
    supporting_text: NaV1.7 is selective for Na+ and shares the canonical NaV architecture
      and **DEKA selectivity filter** (Asp-Glu-Lys-Ala across DI-DIV) described for
      eukaryotic NaV alpha subunits.
  - statement: Falcon deep research frames Nav1.7 as a nociceptor "threshold channel"
      enriched at the plasma membrane of DRG, trigeminal and sympathetic ganglion
      neurons, consistent with the sensory-perception-of-pain and plasma-membrane annotations.
    supporting_text: NaV1.7 is a **plasma-membrane** channel enriched in **nociceptive
      neurons**, with high expression reported in **dorsal root ganglia (DRG)**, **trigeminal
      ganglia**, and **sympathetic ganglia**.
  - statement: Falcon deep research corroborates that TMEM233 (a dispanin-family protein)
      is an essential Nav1.7-interacting accessory protein, supporting the regulatory
      interpretation of the GO:0005515 (TMEM233) annotation rather than generic protein binding.
    supporting_text: identified **TMEM233 (a dispanin-family protein)** as an essential
      **NaV1.7-interacting accessory protein** for the action of the plant-derived
      knottin toxin **Excelsatoxin A (ExTxA)**.
  - statement: Falcon deep research highlights regulation of Nav1.7 surface density
      by NEDD4L-mediated ubiquitination of a C-terminal PY motif - a trafficking/turnover
      regulatory axis (consistent with the UniProt NEDD4/NEDD4L SUBUNIT note) that is
      not captured by any current GOA annotation.
    supporting_text: the E3 ligase **NEDD4L ubiquitinates the cytoplasmic C-terminus
      of NaV1.7** ... **post-translational modification and trafficking/turnover regulation**
      are likely important determinants of NaV1.7 surface density and nociceptor excitability.
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: LLM-generated literature synthesis (Edison/falcon); used only as
      corroborating context. Its core-function, localization, and TMEM233-accessory
      claims are consistent with the primary literature and UniProt cited elsewhere
      in this review; the NEDD4L/trafficking point is supported by UniProt's curated
      SUBUNIT annotation (interaction with NEDD4/NEDD4L).
