- term:
    id: GO:0050965
    label: detection of temperature stimulus involved in sensory perception of pain
  evidence_type: IEA
  original_reference_id: GO_REF:0000107
  qualifier: involved_in
  review:
    summary: Electronic ortholog-transfer from mouse Scn9a. Nav1.7 loss in humans
      produces thermal hypoesthesia and abolishes thermal/noxious pain, so a role
      in thermal pain signalling is biologically plausible, but Nav1.7 amplifies nociceptor
