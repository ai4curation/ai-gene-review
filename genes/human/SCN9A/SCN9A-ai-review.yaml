- id: PMID:15385606
  title: Electrophysiological properties of mutant Nav1.7 sodium channels in a painful
    inherited neuropathy.
  findings:
  - statement: Erythromelalgia (PERYTHM) gain-of-function mutations shift Nav1.7 activation
      to more hyperpolarized potentials, supporting cell-membrane localization and
      a role in nociceptor hyperexcitability.
    supporting_text: Electrophysiological properties of mutant Nav1.7 sodium channels
      in a painful inherited neuropathy.
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: PubMed-verified; supports plasma-membrane localization and gain-of-function
      mechanism in inherited erythromelalgia.
- id: PMID:17145499
  title: 'SCN9A mutations in paroxysmal extreme pain disorder: allelic variants underlie
    distinct channel defects and phenotypes.'
  findings:
  - statement: PEPD is caused by SCN9A gain-of-function missense mutations that reduce
      Nav1.7 fast inactivation, producing persistent sodium current and linking the
      channel to a heritable pain disorder.
    supporting_text: Functional analysis in vitro of three of these mutant Na(v)1.7
      channels revealed a reduction in fast inactivation, leading to persistent sodium
      current.
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: PubMed-verified abstract; establishes Nav1.7 channel activity and
      pain-perception role via PEPD gain-of-function mutations.
- id: PMID:17167479
  title: An SCN9A channelopathy causes congenital inability to experience pain.
  findings:
  - statement: Biallelic SCN9A nonsense mutations (S459X, I767X, W897X) cause complete
      loss of Nav1.7 function and congenital inability to perceive pain, with all
      other sensory modalities preserved.
    supporting_text: Our data suggest that SCN9A is an essential and non-redundant
      requirement for nociception in humans.
  - statement: Nav1.7 is the alpha-subunit of a TTX-sensitive voltage-gated sodium
      channel strongly expressed in nociceptive DRG neurons.
    supporting_text: encoding the alpha-subunit of the voltage-gated sodium channel,
      Na(v)1.7, which is strongly expressed in nociceptive neurons
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: PubMed-verified, full text available; decisive loss-of-function
      human genetics for the core pain-perception role.
- id: PMID:19369487
  title: 'Early- and late-onset inherited erythromelalgia: genotype-phenotype correlation.'
  findings:
  - statement: Inherited erythromelalgia gain-of-function Nav1.7 mutations correlate
      with age of onset, supporting cell-membrane localization and the channel's role
