  label: Homo sapiens
description: >-
  SLC25A11 (OGC/OGCP) is the mitochondrial 2-oxoglutarate/malate carrier, a
  member of the SLC25 mitochondrial carrier family (TC 2.A.29). It is a
  multi-pass integral protein of the mitochondrial inner membrane, built from the
  characteristic tripartite (three-repeat) Solcar fold with six transmembrane
  helices. It functions as an antiporter that catalyzes the electroneutral,
  obligate exchange of 2-oxoglutarate (alpha-ketoglutarate) for L-malate across
  the inner membrane, and can also exchange 2-oxoglutarate for other
  dicarboxylates (malonate, succinate, maleate, oxaloacetate) with lower
  affinity. It exchanges its two substrates consecutively (ping-pong mechanism)
  and functions as a monomer. This carrier is an essential component of the
  malate-aspartate shuttle, which transfers reducing equivalents (NADH) from the
  cytosol into the mitochondrial matrix, and it participates in the
  oxoglutarate/isocitrate shuttle, gluconeogenesis and nitrogen metabolism.
  Germline loss-of-function variants of SLC25A11 predispose to hereditary
  paraganglioma/pheochromocytoma.
