core_functions:
- description: >-
    Thioredoxin-like protein-disulfide oxidoreductase activity of the lumenal
    thioredoxin domain (redox-active Cys99-Cys102 CXXC motif) that, within the
    STT3B/OST-B complex, forms transient mixed disulfides with free thiols in
    glycoprotein substrates, delaying disulfide-bond formation so that STT3B can
    glycosylate cysteine-proximal/otherwise-inaccessible acceptor sites.
