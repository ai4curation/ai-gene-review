- term:
    id: GO:1903830
    label: magnesium ion transmembrane transport
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: involved_in
  review:
    summary: >-
      Phylogenetic inference of magnesium ion transmembrane transport. The
      WITH/FROM for this IBA is a Drosophila gene (FB:FBgn0032015) in a distinct
      PANTHER family (PTN000976171), not the OST3/OST6 subfamily that contains
      TUSC3. The established function of TUSC3 is the ER OST-B oxidoreductase,
      not Mg2+ transport.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      This IBA propagates a magnesium-transport role that is at best an indirect
      consequence of TUSC3's glycosylation function. The mechanistic literature
      shows TUSC3/MAGT1 are ER-resident OST oxidoreductase subunits, not
      plasma-membrane channels, and that a direct dual role is "incompatible"
      without invoking dual localization and dual activity. Not a core function.
    propagation_review:
      root_cause: PROPAGATION_BAD
      failure_modes:
      - WRONG_ORTHOLOG_OR_PARALOG
      - FUNCTIONAL_DIVERGENCE
      source_entities:
      - source_id: FB:FBgn0032015
        source_label: Drosophila source gene (PANTHER PTN000976171)
        source_status: SUPPORTS_SOURCE_BUT_NOT_TARGET
        comment: >-
          The WITH/FROM seed for this IBA is a Drosophila gene in PANTHER family
          PTN000976171, distinct from the OST3/OST6 (PTN000294174) subfamily that
          contains TUSC3; a magnesium-transport role does not transfer to the
          human OST-B oxidoreductase subunit.
    supported_by:
    - reference_id: PMID:25135935
      supporting_text: >-
        Direct roles for MagT1 in both N-linked glycosylation and magnesium
        uptake are incompatible unless one invokes both a dual localization (RER
        and plasma membrane) and a dual activity (oxidoreductase and Mg+2
        channel)
