id: Q13454
gene_symbol: TUSC3
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  TUSC3 (Tumor suppressor candidate 3; N33) is an endoplasmic-reticulum membrane
  protein that functions as an accessory oxidoreductase subunit of the
  STT3B-containing oligosaccharyltransferase (OST-B) complex. It is a multi-pass
  membrane protein whose lumenal, N-terminal thioredoxin-like domain carries a
  redox-active CXXC motif (Cys99-Cys102). Within OST-B, TUSC3 promotes N-linked
  glycosylation of a subset of asparagine acceptor sites that are near cysteine
  residues or that are otherwise skipped during co-translational glycosylation;
  in its oxidized form it is thought to form transient mixed disulfides with a
  free thiol in a glycoprotein substrate, delaying disulfide-bond formation and
  giving the catalytic STT3B subunit access to the unmodified sequon. TUSC3 is
  the close paralog of MAGT1, the two being mutually exclusive and functionally
  largely redundant subunits of OST-B, and is the metazoan orthologue of yeast
  Ost3/Ost6. Biallelic loss-of-function of TUSC3 causes autosomal-recessive
  non-syndromic intellectual disability. A role in cellular magnesium uptake has
  been proposed by analogy to MAGT1, but the established, mechanistically
  supported function is the ER OST-B oxidoreductase activity.
