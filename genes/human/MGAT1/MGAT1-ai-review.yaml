- description: >-
    MGAT1 binds a divalent manganese ion as an essential catalytic cofactor; the
    Mn2+ coordinates the UDP-GlcNAc donor in the GT-A-type active site, and chelation
    abolishes GlcNAc-TI activity.
  molecular_function:
