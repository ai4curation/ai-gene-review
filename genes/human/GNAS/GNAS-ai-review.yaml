description: The reviewed GNAS entry O95467 represents NESP55, a maternally expressed, chromogranin-like
  neuroendocrine secretory protein encoded by the complex GNAS locus. NESP55 is distinct from
  the canonical Gs-alpha products of the same locus; it is expressed in neuroendocrine/chromaffin
  lineages, processed into smaller peptides, and is best understood as a regulated secretory-granule
  precursor and marker of neuroendocrine differentiation. GNAS-locus imprinting defects involving
  the NESP55 region can cause endocrine disease, but those locus-level effects should not be conflated
  with direct NESP55 protein activity.
