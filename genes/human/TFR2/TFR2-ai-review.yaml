suggested_questions:
- question: What conformational event couples holo-transferrin occupancy of TFR2 to HFE/HJV/BMP-SMAD signaling and
    hepcidin transcription in primary human hepatocytes?
- question: How much do the alpha, beta, and gamma isoforms contribute separately to hepatic iron sensing, erythroid
    biology, and direct cellular iron uptake in vivo?
suggested_experiments:
- description: Introduce ligand-binding and HFE/HJV-interface mutations into endogenous TFR2 in primary human hepatocytes,
    then measure receptor trafficking, BMP-SMAD activation, and HAMP transcription across a transferrin-saturation
    series.
  experiment_type: endogenous structure-function and iron-response assay
- description: Use isoform-specific knockout/rescue and quantitative surface proteomics in hepatocyte and erythroid
    models to separate membrane alpha-isoform functions from intracellular beta/gamma functions.
  experiment_type: isoform-specific genetics and localization assay

