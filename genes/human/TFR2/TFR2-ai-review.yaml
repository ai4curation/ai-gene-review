id: Q9UP52
gene_symbol: TFR2
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: TFR2 encodes transferrin receptor protein 2, a predominantly hepatic type-II single-pass membrane glycoprotein
  whose alpha isoform forms homodimers at the cell surface and binds iron-loaded transferrin. TFR2 can internalize
  transferrin-bound iron, but its defining physiological role is to sense circulating transferrin saturation and
  promote hepatocyte hepcidin production, thereby maintaining systemic iron balance. TFR2 associates with HFE and
  the BMP co-receptor HJV in a membrane signaling complex; loss-of-function variants cause type 3 hereditary hemochromatosis.
  The transmembrane-domain-lacking beta isoform is probably intracellular.
