- term:
    id: GO:0008137
    label: NADH dehydrogenase (ubiquinone) activity
  evidence_type: NAS
  original_reference_id: PMID:10830904
  qualifier: enables
  review:
    summary: >-
      'Enables NADH dehydrogenase (ubiquinone) activity' is an over-annotation for
      NDUFA12: UniProt states it is 'believed not to be involved in catalysis', and it
      is a supernumerary structural subunit, not a redox catalytic subunit. This
      complex-level activity is carried out by the core (NDUFS/NDUFV/ND) subunits.
      NDUFA12 should be represented as contributing_to this activity (via structural
      molecule activity), not as enabling it directly. The NAS derives from the enzyme
      name in the original cDNA paper, not from a demonstrated catalytic activity of
      this subunit.
    action: MARK_AS_OVER_ANNOTATED
    supported_by:
    - reference_id: file:human/NDUFA12/NDUFA12-uniprot.txt
      supporting_text: "involved in catalysis."
    proposed_replacement_terms:
    - id: GO:0005198
      label: structural molecule activity
core_functions:
- description: >-
    NDUFA12 (B17.2) is a non-catalytic accessory (supernumerary) structural subunit
    of the peripheral (matrix) arm of mitochondrial Complex I, near the N/Q-module
    junction. It does not independently catalyze NADH oxidation, quinone reduction,
    or proton translocation; instead it provides a structural molecule activity that
    stabilizes the mature holoenzyme and thereby contributes to the complex-level
    NADH:ubiquinone oxidoreductase activity, supporting electron transfer from NADH
    to ubiquinone within a fully assembled, functional Complex I.
  molecular_function:
