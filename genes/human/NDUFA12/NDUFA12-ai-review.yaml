gene_symbol: NDUFA12
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  NDUFA12 (B17.2; also called the 13 kDa differentiation-associated protein, DAP13)
  is an accessory (supernumerary) subunit of mitochondrial respiratory Complex I
  (NADH:ubiquinone oxidoreductase), the first enzyme of the mitochondrial electron
  transport chain. It is a stable structural subunit of the mature holoenzyme,
  located in the peripheral (matrix) arm near the junction of the N- and Q-modules,
  and is a peripheral inner-membrane protein exposed to the matrix. NDUFA12 is
  non-catalytic: it does not itself carry out NADH oxidation, quinone reduction, or
  proton pumping, but contributes structurally to the assembly and stability of a
  fully functional Complex I that transfers electrons from NADH to ubiquinone and
  contributes to the proton-motive force used for ATP synthesis. It is distinct from
  its paralog NDUFAF2/NDUFA12L, which is a Complex I assembly factor rather than a
  mature-enzyme subunit; in NDUFA12-knockout cells the assembly factor NDUFAF2 can
  substitute in the complex. Biallelic loss-of-function variants in NDUFA12 cause
  mitochondrial complex I deficiency (nuclear type 23) and Leigh syndrome.
