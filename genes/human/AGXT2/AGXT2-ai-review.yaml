gene_symbol: AGXT2
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  AGXT2 (alanine--glyoxylate aminotransferase 2) is a mitochondrial,
  pyridoxal-5'-phosphate (PLP)-dependent, class-III aminotransferase that
  functions as a homotetramer and has broad substrate specificity. It
  transaminates glyoxylate to glycine using L-alanine (or other amino acids) as
  the amino donor (alanine:glyoxylate transaminase, EC 2.6.1.44), contributing
  to glyoxylate detoxification, and it transaminates D-beta-aminoisobutyrate, a
  pyrimidine-catabolism end product (EC 2.6.1.40). AGXT2 is also the principal
  aminotransferase that metabolises the endogenous nitric-oxide-synthase
  inhibitors asymmetric and symmetric dimethylarginine (ADMA and SDMA), as well
  as N-monomethylarginine, converting them to (dimethylguanidino)valerate
  isomers; by lowering ADMA it can protect endothelial nitric oxide production.
  The mature enzyme is imported into the mitochondrion via a cleaved N-terminal
  transit peptide and resides in the mitochondrial matrix, with highest
  expression in kidney tubular epithelium and liver hepatocytes. AGXT2 activity
  is a modifier of plasma methylarginine and beta-aminoisobutyrate levels and of
  associated cardiovascular and renal phenotypes, and common coding variants
  (e.g. p.Val140Ile) reduce its activity.
