suggested_questions:
- question: Does FBXO6 recognize the CHK1 degron purely through a protein-protein (FBA-domain) interaction, or is glycan recognition also involved, and is the glycan-binding pocket (Y241/W242) dispensable for CHK1 targeting?
- question: What is the endogenous repertoire of glycoprotein substrates degraded specifically via SCF(FBXO6) (versus the paralog FBXO2), and how does FBXO6's broader specificity for complex and sulfated glycans translate into distinct in vivo substrates?
- question: How is partitioning between FBXO6's glycoprotein-ERAD role and its CHK1-checkpoint role regulated, and does the FBXO6-VCP/p97 interaction couple substrate recognition to retrotranslocation?
- question: Does SCF(FBXO6) ubiquitination of NFE2L1/NRF1 depend on the glycan-binding (FBA lectin) pocket, and is the proteasome bounce-back defect in NGLY1 deficiency driven specifically by FBXO6-mediated targeting of still-glycosylated NFE2L1?
suggested_experiments:
- description: Perform quantitative ubiquitinome/proteome profiling in FBXO6-knockout versus wild-type cells, with and without ER stress and replication stress (e.g. camptothecin), to define the endogenous SCF(FBXO6) substrate repertoire and distinguish glycoprotein from CHK1-dependent effects.
- description: Reconstitute SCF(FBXO6) ubiquitination in vitro with purified SKP1, CUL1, RBX1, an E2 and FBXO6, comparing wild-type FBXO6 with the Y241A/W242A glycan-pocket mutant against a high-mannose glycoprotein substrate and against phospho-CHK1 to dissect glycan-dependent versus glycan-independent substrate targeting.
- description: Use glycan-array and structural (crystallography/cryo-EM) analysis of the FBXO6 FBA domain bound to defined oligosaccharides to map the determinants of its broader specificity (high-mannose, complex, sulfated glycans) relative to FBXO2.
