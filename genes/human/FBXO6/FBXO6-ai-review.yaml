- id: file:human/FBXO6/FBXO6-deep-research-falcon.md
  title: Falcon deep research report for human FBXO6
  findings:
  - statement: FBXO6 (FBS2) is the substrate-recognition module of an SCF-type (SCF^FBS2 / SCF^FBXO6) ubiquitin ligase that ubiquitinates N-glycoprotein substrates in protein quality control.
    supporting_text: FBXO6 (FBS2) is discussed as an F-box protein that serves as the substrate-recognition module of an SCF-type ubiquitin ligase (**SCF^FBS2 / SCF^FBXO6**), enabling ubiquitination of selected substrates, including **N-glycoproteins** involved in protein quality control.
  - statement: In the NGLY1/ERAD axis, SCF^FBS2 ubiquitinates ERAD glycoprotein substrates including the transcription factor NFE2L1/NRF1, which are then degraded by the proteasome after deglycosylation by NGLY1.
    supporting_text: ERAD glycoprotein substrates (including the transcription factor **NFE2L1/NRF1**) are ubiquitinated by multiple E3 ligases, including **SCF^FBS2**, and then degraded by the proteasome; in typical conditions, many ubiquitinated glycoproteins are thought to be **deglycosylated by NGLY1 during proteasomal degradation**.
  - statement: When NGLY1 is absent, SCF^FBS2-mediated ubiquitination of NFE2L1 impairs its processing/nuclear function and blocks induction of proteasome subunits (the proteasome bounce-back response), contributing to proteasome dysfunction.
    supporting_text: in the **absence of NGLY1**, SCF^FBS2-mediated ubiquitination of NFE2L1 is linked to impaired NFE2L1 processing/nuclear function and failure to induce proteasome subunits, contributing to chronic proteasome compromise and cytotoxicity.
  - statement: SCF^FBS2 acts in the cytosolic/proteasomal arm of ERAD after retrotranslocation; ubiquitinated N-glycoproteins accumulate in the cytosol when NGLY1 is absent.
    supporting_text: The mechanistic model places SCF^FBS2 activity in the **cytosolic/proteasomal degradation pathway for ERAD substrates** (i.e., after retrotranslocation from the ER lumen), and describes **accumulation of SCF^FBS2-ubiquitinated N-glycoproteins in the cytosol** when NGLY1 is absent.
  - statement: Genetic reduction of Fbs2/FBXO6 partially rescues Ngly1-knockout lethality in mice, and Fbs2-knockout mice are otherwise healthy, motivating FBS2 inhibition as a therapeutic concept for NGLY1 deficiency.
    supporting_text: genetic reduction of FBS2/FBXO6** can partially rescue lethality/phenotypes associated with **Ngly1 knockout**, and that **Fbs2 knockout mice are reported as healthy** in that review context.
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: Falcon synthesis anchored on a peer-reviewed NGLY1 rodent-model review (Fujihira, Asahina & Suzuki, J Biochem 2022). Establishes a concrete PN-relevant glycoprotein substrate (NFE2L1/NRF1) and the NGLY1/proteasome-bounce-back link; cross-checked against the FBA-lectin/ERAD mechanism in UniProt and PMID:18203720. Cancer prognostic-signature claims (breast, HCC) are association-level and treated as leads only.
