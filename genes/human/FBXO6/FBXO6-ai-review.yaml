id: Q9NRD1
gene_symbol: FBXO6
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  FBXO6 (FBG2/FBS2, F-box protein that recognizes sugar chains 2) is a 293-amino-acid
  cytoplasmic F-box protein and a member of the FBA (F-box-associated) lectin family
  (FBXO2/FBXO6/FBXO17/FBXO27/FBXO44). It serves as the substrate-recognition subunit
  of SCF (SKP1-CUL1-F-box) E3 ubiquitin ligase complexes: its N-terminal F-box domain
  docks onto SKP1 (and thence CUL1-RBX1), while its C-terminal FBA/G domain is a
  carbohydrate-binding lectin module that recognizes N-linked glycans on client
  proteins. As an F-box protein FBXO6 has no intrinsic catalytic activity; catalysis
  is contributed by the RING subunit RBX1 within the assembled SCF complex, and FBXO6
  confers substrate specificity. Through its FBA domain FBXO6 binds high-mannose
  oligosaccharides (with the chitobiose core being essential), complex-type glycans,
  and sulfated glycoproteins, and it preferentially engages denatured/misfolded
  glycoproteins. This lectin activity directs misfolded glycoproteins that have been
  retrotranslocated to the cytosol into the endoplasmic-reticulum-associated
  degradation (ERAD)/glycoprotein-quality-control pathway, promoting their
  ubiquitination and proteasomal degradation. FBXO6 also has a documented role in the
  DNA replication/damage checkpoint: it recognizes activated, S345-phosphorylated CHEK1
  (CHK1) via its FBA domain and assembles an SCF(FBXO6) complex that ubiquitinates CHK1
  and targets it for degradation, contributing to checkpoint termination and influencing
  cellular sensitivity to replication stress. FBXO6 is broadly but variably expressed
  (notably in liver and kidney) and interacts with VCP/p97. Among its glycoprotein
  clients, SCF(FBXO6/Fbs2) ubiquitinates the ER-membrane transcription factor
  NFE2L1/NRF1; in the absence of the cytoplasmic deglycosylase NGLY1, FBXO6-mediated
  ubiquitination of still-glycosylated NFE2L1 impairs its processing and nuclear
  function, blunting the proteasome "bounce-back" induction of new proteasome
  subunits, and genetic reduction of Fbs2/FBXO6 partially rescues Ngly1-knockout
  phenotypes in mice (with Fbs2-knockout mice otherwise healthy).
