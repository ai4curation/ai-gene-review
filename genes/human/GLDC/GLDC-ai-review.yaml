gene_symbol: GLDC
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  GLDC is the P protein (glycine decarboxylase) of the mitochondrial glycine
  cleavage system (GCS), a pyridoxal-5'-phosphate (PLP)-dependent homodimeric
  enzyme (EC 1.4.4.2) encoded on human chromosome 9. It catalyses the first,
  committed step of glycine catabolism: it binds the alpha-amino group of glycine
  through its PLP cofactor (covalently attached as a Schiff base to Lys754),
  decarboxylates the glycine to release CO2, and transfers the residual
  aminomethyl moiety to the lipoic-acid (lipoamide) arm of the H protein (GCSH)
  rather than releasing free methylamine. Together with the T protein (AMT), the
  L protein (DLD) and the H protein (GCSH), GLDC forms the glycine cleavage
  system, the major route of glycine degradation, which links glycine to
  one-carbon/folate metabolism and serine biosynthesis. The mature protein
  localises to the mitochondrial matrix after cleavage of an N-terminal transit
  peptide. Loss-of-function variants in GLDC are the most common cause (~80% of
  cases) of nonketotic hyperglycinemia (glycine encephalopathy), an autosomal
  recessive disorder characterised by accumulation of glycine in body fluids,
  neonatal seizures and severe encephalopathy.
