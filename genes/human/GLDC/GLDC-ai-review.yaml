- term:
    id: GO:0016829
    label: lyase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: >-
      Wrong-branch electronic mapping. GLDC is classified EC 1.4.4.2, an
      oxidoreductase acting on the CH-NH2 group of donors (glycine dehydrogenase
      (decarboxylating)); it is not a lyase. The lyase term derives from the broad
      PLP-fold InterPro signature IPR001597 (aromatic-amino-acid beta-eliminating
      lyase / threonine aldolase), which over-generalises to a lyase MF that does
      not apply to this enzyme.
    action: REMOVE
    reason: >-
      This is a demonstrably incorrect electronic (IEA/InterPro) MF inference: the
      enzyme's molecular function is glycine dehydrogenase (decarboxylating)
      activity (GO:0004375, an oxidoreductase, EC 1.4.4.2), captured accurately by
      other annotations. Lyase activity is the wrong ontology branch for this
      protein and is safe to remove per the IEA-mis-mapping criterion.
    supported_by:
    - reference_id: file:human/GLDC/GLDC-uniprot.txt
      supporting_text: "EC=1.4.4.2"
