- term:
    id: GO:0009055
    label: electron transfer activity
  evidence_type: TAS
  original_reference_id: PMID:2268343
  qualifier: enables
  review:
    summary: >-
      Likely over-annotation / mis-assignment. GLDC is a PLP-dependent glycine
      decarboxylase (EC 1.4.4.2); it does not act as an electron carrier. Within
      the glycine cleavage system, the redox/electron-transfer role belongs to the
      L protein (DLD, dihydrolipoamide dehydrogenase, FAD-dependent), not to the P
      protein. The cited reference (Sakakibara et al. 1990) is about a genomic
      deletion of the glycine decarboxylase gene in an NKH patient and provides no
      support for an electron transfer activity.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      The molecular function of GLDC is glycine dehydrogenase (decarboxylating)
      activity, captured by multiple experimental and electronic annotations;
      electron transfer activity is not a function of the P protein and is not
      supported by the cited paper. Flagged as over-annotated rather than removed
      because it is an author-statement (TAS) annotation whose full text was not
      reviewed.
    supported_by:
    - reference_id: file:human/GLDC/GLDC-uniprot.txt
      supporting_text: "The P protein (GLDC) binds the alpha-amino group of glycine"
