      elongates long-chain PUFAs (C18:3->C20:3, the ELOVL5 signature), not ELOVL3 (chromosome 10). It is
      used as a Reactome EXP source for GO:0009922 on ELOVL3; the GO term (fatty acid elongase
      activity) is correct for ELOVL3 but this specific paper is a likely wrong-paper
      attribution. ELOVL3 elongase activity is independently and directly supported by
      PMID:19575253 and PMID:20937905.
