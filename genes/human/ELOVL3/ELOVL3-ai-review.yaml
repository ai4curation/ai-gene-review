core_functions:
- description: >-
    Rate-limiting condensation (first) step of the microsomal fatty-acid elongation cycle at the
    endoplasmic reticulum membrane: ELOVL3 condenses a saturated or monounsaturated acyl-CoA
    (mid-chain, C16-C22 range, with highest activity toward C18:0) with malonyl-CoA to give a
    3-oxoacyl-CoA + CO2 + CoA (EC 2.3.1.199), thereby extending the chain by two carbons and
    producing very-long-chain fatty acids.
