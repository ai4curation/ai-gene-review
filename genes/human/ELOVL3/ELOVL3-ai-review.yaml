id: Q9HB03
gene_symbol: ELOVL3
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  ELOVL3 (very long chain fatty acid elongase 3; also known as ELOVL fatty acid elongase 3,
  3-keto/oxoacyl-CoA synthase ELOVL3, or cold-inducible glycoprotein CIG30) is a multipass
  endoplasmic reticulum membrane enzyme of the ELO family. It catalyzes the first and
  rate-limiting condensation step of the microsomal (very-)long-chain fatty acid elongation
  cycle, condensing an acyl-CoA with malonyl-CoA to yield a 3-oxoacyl-CoA plus CO2 and CoA
  (EC 2.3.1.199); the 3-oxoacyl-CoA is subsequently reduced, dehydrated and reduced by the
  other elongation-cycle enzymes (KAR/HSD17B12, HACD1/2, TECR) to extend the chain by two
  carbons per cycle. ELOVL3 is a condensing enzyme with activity toward saturated and
  unsaturated acyl-CoA substrates in roughly the C16-C22 range, showing higher activity toward
  C18 (especially C18:0) acyl-CoAs, thereby producing mid-chain saturated and monounsaturated
  very-long-chain fatty acids that serve as precursors of membrane lipids and lipid mediators.
  It is highly expressed in brown adipose tissue, skin (sebaceous glands) and hair follicles,
  where it contributes to cold-induced thermogenesis and to skin/hair lipid-barrier formation.
