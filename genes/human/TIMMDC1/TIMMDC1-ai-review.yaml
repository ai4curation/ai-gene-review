  findings:
  - statement: >-
      C3orf1 (TIMMDC1), a hydrophobic protein, associates with the 550 and 815 kDa
      Complex I subcomplexes that accumulate upon NDUFA11 suppression, and its
      characteristics (together with TMEM126B and NDUFA11) indicate participation
      in constructing the membrane arm of Complex I.
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
