core_functions:
- description: >-
    Chaperone / assembly factor that acts during the mid-stage (MCIA-associated)
    construction of the membrane arm of mitochondrial Complex I. TIMMDC1
    transiently binds incompletely assembled Complex I intermediates (including
    the ~315 kDa subcomplex) together with NDUFAF3, NDUFAF4 and the MCIA machinery
    (which also engages TMEM70/TMEM242), and dissociates on maturation of the
    holoenzyme. Its precise molecular activity is unresolved: as a
    Tim17/Tim22/Tim23-family multi-pass inner-membrane protein it is a candidate
    membrane scaffold/insertase for the ND (membrane-arm) subunits, but no
    catalytic insertase or transporter activity has been demonstrated, and it is
    not a stable structural subunit of the Complex I holoenzyme; therefore no
    specific molecular_function term is asserted.
  directly_involved_in:
  - id: GO:0032981
    label: mitochondrial respiratory chain complex I assembly
  locations:
  - id: GO:0005743
    label: mitochondrial inner membrane
  supported_by:
  - reference_id: file:human/TIMMDC1/TIMMDC1-uniprot.txt
    supporting_text: >-
      Chaperone protein involved in the assembly of the mitochondrial
      NADH:ubiquinone oxidoreductase complex (complex I). Participates in
      constructing the membrane arm of complex I.
  - reference_id: file:human/TIMMDC1/TIMMDC1-uniprot.txt
    supporting_text: >-
      Associates with the intermediate 315 kDa subcomplex of incompletely
      assembled complex I.
  - reference_id: PMID:33753518
    supporting_text: >-
      and also with an additional assembly factor for complex I, the
      translocase of IMM domain-containing protein 1, or TIMMDC1
  knowledge_gaps:
  - gap_statement: >-
      The molecular function of TIMMDC1 is undetermined: it is unresolved whether
      it possesses genuine protein/membrane-insertase catalytic activity (as its
      Tim17/Tim22/Tim23 fold might suggest) or acts purely as a membrane scaffold
      that positions the ND (membrane-arm) subunits during Complex I assembly.
proposed_new_terms: []
suggested_questions:
- question: >-
    Does TIMMDC1 have genuine membrane-insertase catalytic activity for the
    mitochondrially encoded ND subunits, or does it act solely as a scaffold?
- question: >-
    Which Complex I membrane-arm (ND) subunits does TIMMDC1 directly contact
    during assembly, and in what order?
suggested_experiments:
- description: >-
    Reconstitute TIMMDC1 with ND-subunit substrates in a defined membrane system
    to test for insertase activity versus a passive scaffolding role.
- description: >-
    Structural characterization (cryo-EM) of TIMMDC1-containing Complex I assembly
    intermediates to define its interface with the membrane arm.
