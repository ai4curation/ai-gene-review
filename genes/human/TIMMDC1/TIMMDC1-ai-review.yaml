gene_symbol: TIMMDC1
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  TIMMDC1 (TIM17 domain-containing protein 1; also known as C3orf1/M5-14) is a
  multi-pass integral protein of the mitochondrial inner membrane and a member of
  the Tim17/Tim22/Tim23 preprotein-translocase / membrane-insertase-like
  superfamily. It functions as a chaperone/assembly factor for mitochondrial
  Complex I (NADH:ubiquinone oxidoreductase), where it acts during the mid-stage,
  MCIA-associated construction of the membrane arm of the enzyme. It transiently
  associates with incompletely assembled Complex I intermediates (including the
  ~315 kDa iron-sulfur/membrane-arm subcomplex) together with other assembly
  factors such as NDUFAF3, NDUFAF4, TMEM126B and the MCIA complex (ACAD9,
  NDUFAF1, ECSIT), and dissociates once the mature holoenzyme is formed; it is
  therefore not a stable structural subunit of the Complex I holoenzyme. TIMMDC1
  is broadly expressed with enhanced levels in heart and skeletal muscle. Biallelic
  loss-of-function variants cause an autosomal-recessive mitochondrial Complex I
  deficiency (nuclear type 31, MC1DN31).
