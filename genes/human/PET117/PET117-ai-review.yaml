  label: Homo sapiens
description: >-
  PET117 (Protein PET117 homolog, mitochondrial) is a small (81 aa) nucleus-encoded
  mitochondrial assembly chaperone for cytochrome c oxidase (COX; mitochondrial respiratory
  chain complex IV). It is the conserved human ortholog of yeast PET117 and carries an
  N-terminal mitochondrial transit peptide (aa 1-22) and a single Pfam PET117 domain
  (PF15786; InterPro IPR031568), adopting a small coiled-coil fold. PET117 is non-catalytic;
  it acts at an early step of COX biogenesis to assist assembly of the mtDNA-encoded core
  subunits, functioning together with the related PET100 chaperone (and MR-1S), and it
  stabilizes the COX1 translational activator TACO1 to support synthesis of the mtDNA-encoded
  COX1 core subunit. It localizes to the mitochondrion, associated with the inner membrane
  where COX assembly occurs. Biallelic loss-of-function variants cause mitochondrial complex
  IV deficiency, nuclear type 19 (MC4DN19), an autosomal recessive neurodevelopmental disorder
  with global developmental delay and developmental regression.
