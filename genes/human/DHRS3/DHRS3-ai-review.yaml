- id: PMID:40519748
  title: Identification and characterization of short-chain dehydrogenase/reductase
    3 (DHRS3) deficiency, a retinoic acid embryopathy of humans.
  findings:
  - statement: >-
      DHRS3 is the major embryonic enzyme reducing retinaldehyde (RAL) to retinol
      (ROL), opposing RDH10 and limiting excessive retinoic-acid synthesis; it acts
      in an ER-membrane complex with RDH10, and hypomorphic biallelic variants cause
      a retinoic-acid embryopathy with elevated RA and reduced retinol.
    reference_section_type: RESULTS
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      PMC full text available and read; directly establishes DHRS3's physiological
      role in retinoic-acid homeostasis and development, its ER-membrane RDH10
      complex, and the effect of loss-of-function on retinoid levels. Source of the
      IMP annotation for retinoic acid biosynthetic process.
- id: PMID:9705317
  title: Molecular characterization of a novel short-chain dehydrogenase/reductase
    that reduces all-trans-retinal.
  findings:
  - statement: >-
      Original cloning and characterization of retSDR1 (DHRS3), an SDR that reduces
      all-trans-retinal with the substrate specificity of photoreceptor
      all-trans-retinol dehydrogenase; predicted a Rossmann fold for nucleotide
      (NADP) binding and an N-terminal membrane anchor.
    reference_section_type: ABSTRACT
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Abstract only (full_text_available: false), but the abstract itself supports
      the reductase activity, Rossmann-fold nucleotide binding, cone-photoreceptor
      localization and broader retinol-metabolism role. Establishes EC 1.1.1.300
      (per UniProt CATALYTIC ACTIVITY, ECO:0000269|PubMed:9705317).
