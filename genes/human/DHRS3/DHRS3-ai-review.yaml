gene_symbol: DHRS3
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  DHRS3 (short-chain dehydrogenase/reductase 3; also known as retSDR1, RDH17 and
  SDR16C1) is a membrane-bound, NADPH-dependent oxidoreductase of the short-chain
  dehydrogenase/reductase (SDR) superfamily that catalyzes the reduction of
  all-trans-retinaldehyde to all-trans-retinol (EC 1.1.1.300). By consuming
  retinaldehyde, it acts as a counterweight to the retinol dehydrogenases (chiefly
  RDH10) and the retinaldehyde dehydrogenases (ALDH1A) that drive synthesis of the
  morphogen all-trans-retinoic acid, and thereby helps set retinoid/retinoic-acid
  concentrations. It functions within a mutually activating complex with RDH10 in
  the endoplasmic reticulum membrane, is a multi-pass membrane protein with an
  N-terminal membrane anchor and a Rossmann-fold nucleotide-binding core, and is
  itself induced by retinoic acid, forming a negative-feedback buffer on retinoid
  levels. DHRS3 is widely expressed and is essential for normal embryonic
  development; in the retina it is expressed in cone (but not rod) outer segments,
  where the same retinaldehyde-to-retinol reduction contributes to the visual
  (retinoid) cycle.
