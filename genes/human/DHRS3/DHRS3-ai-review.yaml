- term:
    id: GO:0002138
    label: retinoic acid biosynthetic process
  evidence_type: IMP
  original_reference_id: PMID:40519748
  qualifier: involved_in
  review:
    summary: >-
      Experimental (IMP) annotation from the DHRS3-deficiency embryopathy study:
      loss-of-function human variants and the mouse knockout perturb retinoic-acid
      levels, establishing that DHRS3 participates in the retinoic-acid biosynthetic
      pathway. Its direct action, however, is to reduce retinaldehyde back to
      retinol and thereby LIMIT retinoic-acid synthesis, so its role in this
      pathway is regulatory/negative rather than biosynthetic. Retained (per policy,
      experimental annotations are not removed) but marked non-core; negative
      regulation of retinoic acid biosynthetic process (GO:1900053) would be a more
      precise placement.
    action: KEEP_AS_NON_CORE
