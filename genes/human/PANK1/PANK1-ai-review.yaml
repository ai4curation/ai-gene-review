id: Q8TE04
gene_symbol: PANK1
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  PANK1 is human pantothenate kinase 1 (EC 2.7.1.33), a cytosolic/nuclear type II
  pantothenate kinase that catalyzes the first and rate-limiting step of coenzyme A
  (CoA) biosynthesis: the ATP-dependent phosphorylation of pantothenate (vitamin B5)
  to 4'-phosphopantothenate. The enzyme functions as a homodimer, adopts an actin-like
  ATPase (actin kinase superfamily) fold, and is allosterically feedback-inhibited by
  CoA and its acyl-thioester derivatives (e.g. acetyl-CoA), which bind at a regulatory
  site in the catalytic core. Mammals have three PanK genes; PANK1 alone produces two
  catalytically active isoforms from alternate first exons that share a common C-terminal
  catalytic domain but differ in their N-terminal extensions, which direct them to
  distinct compartments: the longer PanK1-alpha isoform is nuclear/nucleolar (with a
  defined nuclear/nucleolar localization signal), whereas the shorter PanK1-beta isoform
  is cytosolic and partially associates with clathrin-coated vesicles and recycling
  endosomes. By controlling flux into the CoA pathway, PANK1 regulates intracellular CoA
  levels; hepatic PANK1-alpha expression is under PPARalpha control, linking the enzyme
  to fatty-acid oxidation and energy metabolism.
