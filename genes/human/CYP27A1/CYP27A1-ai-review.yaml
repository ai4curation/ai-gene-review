- term:
    id: GO:0030343
    label: vitamin D 25-hydroxylase activity
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: enables
  review:
    summary: Phylogenetic inference of vitamin D 25-hydroxylase activity. CYP27A1 has historically been
      considered a vitamin D3 25-hydroxylase, but PMID:15465040 shows that toward vitamin D2 CYP27A1 hydroxylates
      at C-24 and C-27 (not C-25) and that CYP2R1 is the physiologically important 25-hydroxylase (26-fold
      higher kcat/Km). This is a minor, non-core side activity rather than the enzyme's primary sterol
      27-hydroxylase function; keep as non-core.
    action: KEEP_AS_NON_CORE
    reason: Physiological vitamin D 25-hydroxylation is attributed to CYP2R1; CYP27A1's vitamin D activity
      is low-efficiency and not its core function.
    supported_by:
    - reference_id: PMID:15465040
      supporting_text: CYP2R1 hydroxylated vitamin D(2) at the C-25 position while CYP27A1 hydroxylated
        it at positions C-24 and C-27
