core_functions:
- description: 'Sterol 26/27-hydroxylase: hydroxylates the terminal methyl of the sterol side chain at
    C27 (C26) and can further oxidize the alcohol to the C27 carboxylic acid, initiating side-chain oxidation
    of 5-beta-cholestane bile-acid intermediates (e.g. 5-beta-cholestane-3a,7a,12a-triol to THCA; EC 1.14.15.15).'
  molecular_function:
    id: GO:0047748
    label: cholestanetetraol 26-dehydrogenase activity
  directly_involved_in:
  - id: GO:0006699
    label: bile acid biosynthetic process
  supported_by:
