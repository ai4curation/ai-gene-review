id: Q02318
gene_symbol: CYP27A1
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: CYP27A1 (sterol 27-hydroxylase / sterol 26-hydroxylase, EC 1.14.15.15) is a mitochondrial
  cytochrome P450 that receives electrons from the adrenodoxin (ferredoxin) / ferredoxin reductase electron-transfer
  system and hydroxylates the sterol side chain at C27 (C26). Acting on 5-beta-cholestane intermediates,
  it initiates side-chain oxidation in bile-acid biosynthesis, converting 5-beta-cholestane-3-alpha,7-alpha,12-alpha-triol
  through the C27 alcohol and aldehyde to the C27 acid (di-/tri-hydroxycoprostanoic acids, DHCA/THCA).
  It also converts cholesterol to 27-hydroxycholesterol, the first committed step of the acidic (alternative)
  bile-acid pathway, and can further oxidize this product to 3-beta-hydroxy-5-cholestenoic acid. Through
  the same terminal-methyl hydroxylase chemistry it acts on additional sterols and oxysterols, including
  7-ketocholesterol (detoxification in retinal pigment epithelium) and, secondarily, vitamin D3 intermediates.
  The enzyme is a heme-thiolate P450 (axial cysteine ligand) that is post-translationally imported into
  mitochondria and associates as a membrane-extrinsic protein with the matrix face of the mitochondrial
  inner membrane. Loss of CYP27A1 activity causes cerebrotendinous xanthomatosis (CTX), an autosomal-recessive
  sterol storage disorder with cholestanol and bile-alcohol accumulation, tendon xanthomas, cataracts,
  and progressive neurological decline that is treatable with chenodeoxycholic acid.
