    supporting_text: the expression of active enzyme capable of catalyzing multiple oxidation reactions
      (R-CH3----R-CH2OH----R-COOH) at carbon 27 of sterol intermediates of the bile acid synthesis pathway
- description: 'Cholesterol 26/27-hydroxylase: converts cholesterol to 27-hydroxycholesterol (and further
    to 3-beta-hydroxy-5-cholestenoic acid), the first committed step of the acidic (alternative) bile-acid
    pathway and a route for catabolism of excess cholesterol.'
  molecular_function:
    id: GO:0031073
    label: cholesterol 26-hydroxylase activity
  directly_involved_in:
  - id: GO:0006707
    label: cholesterol catabolic process
  supported_by:
  - reference_id: PMID:9660774
    supporting_text: recombinant human P450c27 is also able to further oxidize 27-hydroxycholesterol giving
      first an aldehyde and then 3beta-hydroxy-5-cholestenoic acid
- description: 'Heme-thiolate cofactor binding: CYP27A1 is a cytochrome P450 whose catalytic heme iron
    is coordinated by an axial cysteine, required for its monooxygenase chemistry.'
  molecular_function:
    id: GO:0020037
    label: heme binding
  locations:
  - id: GO:0005743
    label: mitochondrial inner membrane
  supported_by:
  - reference_id: file:human/CYP27A1/CYP27A1-uniprot.txt
    supporting_text: Name=heme; Xref=ChEBI:CHEBI:30413;
