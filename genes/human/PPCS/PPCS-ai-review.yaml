id: Q9HAB8
gene_symbol: PPCS
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  PPCS (phosphopantothenate--cysteine ligase, also known as phosphopantothenoylcysteine
  synthetase or PPC synthetase; gene synonym COAB) catalyzes the second of the five steps
  of de novo coenzyme A (CoA) biosynthesis from vitamin B5 (pantothenate). It conjugates
  L-cysteine to (R)-4'-phosphopantothenate, in a reaction that hydrolyzes a nucleoside
  triphosphate (via a phosphopantothenoyl-nucleotide intermediate), to form
  N-[(R)-4-phosphopantothenoyl]-L-cysteine, releasing the nucleoside monophosphate and
  diphosphate. Unlike its bacterial CoaB counterpart, the mammalian enzyme prefers ATP over
  CTP as the nucleotide cosubstrate. The human enzyme is a cytosolic homodimer with a
  CoaB-like fold. Biallelic loss-of-function variants in PPCS reduce cellular CoA levels and
  cause autosomal-recessive dilated cardiomyopathy (CMD2C), a form of CoA biosynthesis
  disorder distinct from the neurodegeneration-with-brain-iron-accumulation phenotypes
  associated with other CoA pathway genes.
