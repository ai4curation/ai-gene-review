proposed_new_terms: []
suggested_questions:
- question: >-
    What determines the mammalian PPCS preference for ATP over CTP relative to the
    CTP-dependent bacterial CoaB enzyme, and is CTP used physiologically in any human tissue?
- question: >-
    Why does loss of PPCS produce a dilated-cardiomyopathy phenotype (CMD2C) rather than the
    neurodegeneration-with-brain-iron-accumulation seen with other CoA-pathway defects?
suggested_experiments:
- description: >-
    Quantify tissue-specific CoA and downstream acyl-CoA pools in PPCS-deficient models to
    test whether the cardiac phenotype reflects a tissue-selective CoA threshold.
- description: >-
    Structure-guided kinetic characterization of the ATP- vs CTP-dependent reactions of
    human PPCS to define the nucleotide-selectivity determinants.
