core_functions:
- description: >-
    Cytosolic NAD-dependent glycerol-3-phosphate dehydrogenase: reversibly interconverts
    dihydroxyacetone phosphate (DHAP) and sn-glycerol 3-phosphate (G3P) using the
    NAD+/NADH couple (EC 1.1.1.8). Physiologically it runs the reductive direction
    (DHAP + NADH -> G3P + NAD+), providing the glycerol-3-phosphate backbone for
    glycerolipid biosynthesis while regenerating cytosolic NAD+.
  molecular_function:
    id: GO:0141152
    label: glycerol-3-phosphate dehydrogenase (NAD+) activity
