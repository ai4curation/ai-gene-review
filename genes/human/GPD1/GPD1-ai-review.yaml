- term:
    id: GO:0047952
    label: glycerol-3-phosphate dehydrogenase [NAD(P)+] activity
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: enables
  review:
    summary: >-
      Phylogenetic (IBA) annotation to the dual-cofactor [NAD(P)+] dehydrogenase
      activity. The human enzyme is essentially NAD+-specific: KM for NAD is 140 uM
      whereas KM for NADP is 1070 mM (roughly 10,000-fold weaker), so the NADP arm of
      the [NAD(P)+] term is not physiologically relevant.
    action: MODIFY
    reason: >-
      The [NAD(P)+] term overstates cofactor breadth. The precise, current catalytic
      term GO:0141152 (glycerol-3-phosphate dehydrogenase (NAD+) activity) matches the
      UniProt/Rhea reaction (RHEA:11092) and EC 1.1.1.8 and is the term GOA already
      applies from other sources.
    proposed_replacement_terms:
    - id: GO:0141152
      label: glycerol-3-phosphate dehydrogenase (NAD+) activity
    supported_by:
    - reference_id: file:human/GPD1/GPD1-uniprot.txt
      supporting_text: 'KM=140 uM for NAD'
    - reference_id: file:human/GPD1/GPD1-uniprot.txt
      supporting_text: 'KM=1070 mM for NADP'
