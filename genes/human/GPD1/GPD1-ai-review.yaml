gene_symbol: GPD1
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  GPD1 encodes the cytosolic NAD-dependent glycerol-3-phosphate dehydrogenase
  (alpha-glycerophosphate dehydrogenase; GPD-C/GPDH-C; EC 1.1.1.8), a homodimeric
  enzyme that reversibly interconverts dihydroxyacetone phosphate (DHAP) and
  sn-glycerol 3-phosphate (G3P) coupled to the NAD+/NADH redox pair. In its
  physiological (reductive) direction it converts DHAP plus NADH to G3P plus NAD+,
  regenerating cytosolic NAD+ and providing the glycerol-3-phosphate backbone for
  glycerolipid, glycerophospholipid and triacylglycerol biosynthesis. It is the
  cytosolic component of the glycerol-3-phosphate (glycerophosphate) shuttle: acting
  with the mitochondrial FAD-dependent glycerol-3-phosphate dehydrogenase (GPD2), it
  transfers reducing equivalents from cytosolic NADH into the mitochondrial
  ubiquinone pool. The enzyme is strongly NAD+-preferring (its affinity for NADP is
  negligible) and adopts an N-terminal NAD-binding Rossmann fold together with a
  C-terminal substrate/catalytic domain, with the catalytic proton acceptor in the
  C-terminal domain. GPD1 is a soluble cytoplasmic protein, expressed prominently in
  liver, adipose tissue and skeletal muscle. Biallelic loss-of-function variants
  cause transient infantile hypertriglyceridemia with hepatomegaly, fatty liver and
  hepatic fibrosis.
