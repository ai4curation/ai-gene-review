    label: glycerol-3-phosphate biosynthetic process
  evidence_type: IEA
  original_reference_id: file:human/GPD1/GPD1-uniprot.txt
  qualifier: involved_in
  review:
    summary: >-
      Proposed core BP not currently in GOA. The physiological direction of the GPD1
