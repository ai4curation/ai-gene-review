- description: >-
    Cytosolic component of the glycerol-3-phosphate (glycerophosphate) shuttle: by
    reducing DHAP to G3P at the expense of cytosolic NADH, GPD1 works with the
    mitochondrial FAD-dependent glycerol-3-phosphate dehydrogenase (GPD2) to transfer
    reducing equivalents from the cytosol into the mitochondrial ubiquinone pool and
    regenerate cytosolic NAD+.
  molecular_function:
    id: GO:0141152
    label: glycerol-3-phosphate dehydrogenase (NAD+) activity
