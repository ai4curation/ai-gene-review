    label: glycerol-3-phosphate catabolic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: involved_in
  review:
    summary: >-
      InterPro2GO annotation to glycerol-3-phosphate catabolic process, i.e. the
      oxidative direction G3P + NAD+ -> DHAP + NADH. This is in fact the direction that
      UniProt's PhysiologicalDirection=left-to-right annotates (the reaction is written
      G3P + NAD+ = DHAP + NADH), but the dominant cellular role of cytosolic GPD1 is the
      reductive (biosynthetic/shuttle) DHAP -> G3P direction.
    action: KEEP_AS_NON_CORE
    reason: >-
      Captures a chemically valid direction of the reversible reaction; however the
      predominant physiological role of cytosolic GPD1 is reductive (glycerolipid
      biosynthesis and the glycerol-phosphate shuttle, per Reactome R-HSA-75889). Kept
      as non-core rather than core.
