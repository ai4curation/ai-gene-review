- id: PMID:31273118
  title: Conserved N-terminal cysteine dioxygenases transduce responses to hypoxia
    in animals and plants.
  findings:
  - statement: >-
      ADO is the animal N-terminal cysteine dioxygenase of the Cys/N-degron pathway:
      it dioxygenates the N-terminal cysteine of RGS4, RGS5 and IL-32 to cysteine
      sulfinic acid and is required for their oxygen-dependent degradation, acting as
      an enzymatic oxygen sensor with high apparent KmO2.
    reference_section_type: RESULTS
    supporting_text: >-
      Thus ADO is required for oxygen-dependent degradation of RGS proteins.
  - statement: >-
      Loss of ADO stabilizes RGS4/5 constitutively, independent of oxygen.
    reference_section_type: RESULTS
    supporting_text: >-
      Inactivation of ADO but not CDO1 led to constitutive upregulation of endogenous
      and transfected RGS4 and RGS5 proteins irrespective of oxygen levels
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Landmark paper reassigning ADO as the N-degron N-terminal cysteine dioxygenase /
      oxygen sensor. Full text available; directly supports the cellular-response-to-hypoxia
      IDA and the cysteamine dioxygenase IDA.
