- id: PMID:34508780
  title: Crystal structure of human cysteamine dioxygenase provides a structural rationale
    for its function as an oxygen sensor.
  findings:
  - statement: >-
      First crystal structure of human ADO (1.78 A, PDB 7REI); the metal center is
      octahedrally coordinated by three histidine residues (His112, His114, His193),
      and the loop-rich, open cavity rationalizes ADO handling both small-molecule and
      protein substrates as an oxygen sensor.
    reference_section_type: RESULTS
    supporting_text: >-
      metal ion octahedrally coordinated by three histidine residues
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Structural paper; basis for the iron ion binding IDA annotation and for the
      3-His ferrous center.
