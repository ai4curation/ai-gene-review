proposed_new_terms:
- proposed_name: oxygen-dependent protein N-terminal cysteine dioxygenase activity
  proposed_definition: >-
    Catalysis of the reaction: N-terminal L-cysteinyl-[protein] + O2 = N-terminal
    S-hydroxy-S-oxy-L-cysteinyl-[protein] (N-terminal cysteine-sulfinic acid) + H(+).
    This oxygen-dependent dioxygenation of a protein N-terminal cysteine thiol primes
    the substrate for the Cys/N-degron pathway. Distinct from cysteamine dioxygenase
    activity (GO:0047800), which acts on the free small molecule cysteamine, and from
    cysteine dioxygenase activity (GO:0017172), which acts on free L-cysteine.
  justification: >-
    ADO (and plant cysteine oxidases) catalyze dioxygenation of the N-terminal cysteine
    of protein substrates (RGS4, RGS5, IL-32) as the committed enzymatic step of the
    Cys/N-degron oxygen-sensing pathway. This is a distinct molecular function from the
    small-molecule cysteamine dioxygenase activity, corresponds to a defined Rhea
    reaction (RHEA:70895) already used by UniProt, but has no dedicated GO MF term. A
    specific term is needed so that ADO's second, physiologically central catalytic
    activity can be annotated precisely rather than approximated by GO:0047800 plus
    process terms.
  proposed_parent:
    id: GO:0016702
    label: oxidoreductase activity, acting on single donors with incorporation of
      molecular oxygen, incorporation of two atoms of oxygen
  supported_by:
  - reference_id: PMID:31273118
    supporting_text: >-
      Thus, human ADO catalyzes the dioxygenation of N-Cys residues in RGS4 and RGS5
      to cysteine sulfinic acid.
suggested_questions:
- question: >-
    Beyond RGS4, RGS5 and IL-32, what is the full physiological substrate repertoire of
    human ADO in the Cys/N-degron pathway, and how is substrate selectivity encoded?
- question: >-
    How is the balance between ADO's small-molecule (cysteamine) and protein (N-terminal
    cysteine) activities regulated in vivo, and does the Cys220-Tyr222 cross-linked
    cofactor tune this balance?
suggested_experiments:
- description: >-
    N-terminomics (e.g. TAILS) comparing wild-type and ADO-knockout human cells under
    normoxia and hypoxia to identify the endogenous set of N-terminal-cysteine proteins
    whose stability is oxygen- and ADO-dependent.
- description: >-
    Quantitative subcellular fractionation plus immunofluorescence of endogenous ADO to
    resolve the reported mitochondrial signal versus its curated cytosolic localization.
