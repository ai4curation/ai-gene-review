gene_symbol: ADO
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  ADO (2-aminoethanethiol dioxygenase, also called cysteamine dioxygenase; EC
  1.13.11.19) is a cytosolic non-heme mononuclear Fe(II) thiol dioxygenase of the
  cupin superfamily and one of only two mammalian thiol dioxygenases (the other being
  cysteine dioxygenase, CDO1). It has two distinct, well-established catalytic
  activities that act on chemically different substrate classes. First, as a
  cysteamine dioxygenase it oxidizes the sulfur of the small molecule cysteamine
  (2-aminoethanethiol) to hypotaurine using molecular oxygen, providing a second route
  of hypotaurine and taurine biosynthesis that complements the cysteine-sulfinate
  route through CDO1 and CSAD. Second, ADO is the animal N-terminal cysteine
  dioxygenase of the Cys/N-degron pathway: it oxidizes the thiol of N-terminal
  cysteine residues of substrate proteins (e.g. RGS4, RGS5 and interleukin-32) to
  cysteine-sulfinic acid, priming them for arginylation by ATE1 and subsequent
  ubiquitin-mediated degradation. Because its oxygen affinity is low (a high apparent
  KmO2, above the physiological range), this protein-modifying activity couples
  substrate stability to oxygen availability, making ADO an enzymatic cellular oxygen
  sensor analogous to the plant cysteine oxidases. The active site is a 3-His-ligated
  ferrous iron center in a jelly-roll beta-barrel; ADO can autocatalytically form a
  Cys220-Tyr222 thioether cross-linked cofactor that amplifies catalysis.
