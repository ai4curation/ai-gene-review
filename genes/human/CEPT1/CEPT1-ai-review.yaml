  title: CDP-ETA and DAG are converted to PE by CEPT1/EPT1
  findings: []
- id: PMID:10893425
  title: Cloning, genomic organization, and characterization of a human cholinephosphotransferase.
  findings:
  - statement: >-
      Distinguishes CEPT1 (dual choline/ethanolamine specificity) from the choline-specific
      paralog CPT1; source characterizing the ether-lipid / platelet-activating-factor
      precursor choline phosphotransferase side activity.
    supporting_text: >-
      This contrasted with our previously cloned human choline/ethanolaminephosphotransferase
      cDNA that was demonstrated to code for a dual specificity choline/ethanolaminephosphotransferase.
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified; abstract-only. Primarily about the paralog CPT1 but explicitly
      characterizes CEPT1's dual specificity and the alkenyl/alkyl-acylglycerol (EC 2.7.8.22)
      side activity. Cited in UniProt for the 2.7.8.22 catalytic activity.
