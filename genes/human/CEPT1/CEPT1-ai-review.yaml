- id: PMID:10191259
  title: 'Cloning and expression of a human choline/ethanolaminephosphotransferase:
    synthesis of phosphatidylcholine and phosphatidylethanolamine.'
  findings:
  - statement: >-
      Human CEPT1 (hCEPT1p, 416 aa) is a dual-specificity phosphotransferase that uses both
      CDP-choline and CDP-ethanolamine as phosphobase donors to diacylglycerol, synthesizing
      both PC and PE in vitro and in vivo; it catalyzes the final step of the Kennedy pathway.
    supporting_text: >-
      In vitro, hCEPT1p displayed broad substrate specificity, utilizing both CDP-choline and
      CDP-ethanolamine as phosphobase donors to a broad range of diacylglycerols, resulting in
      the synthesis of both PtdCho and PtdEtn.
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified original cloning/characterization of human CEPT1; abstract-only in cache
      but the abstract directly establishes dual specificity and the final Kennedy-pathway
      step. Primary source for the MF, BP, and side-activity (EXP) annotations.
- id: PMID:12221122
  title: The major sites of cellular phospholipid synthesis and molecular determinants
    of Fatty Acid and lipid head group specificity.
  findings:
  - statement: >-
      Human CEPT1 localizes to the ER and nuclear membranes (not the Golgi, unlike the paralog
      CPT1); Gly156 governs its dual CDP-alcohol specificity.
    supporting_text: >-
      confirmed that CPT1 was found in the Golgi and CEPT1 was found in both the endoplasmic
      reticulum and nuclear membranes.
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified. Definitive human localization study; explicitly excludes Golgi for
      CEPT1 (contradicts the Golgi IBA). Source for the ER-membrane IDA and nuclear-membrane
      support.
- id: PMID:32296183
  title: A reference map of the human binary protein interactome.
  findings:
  - statement: >-
      Genome-scale binary (Y2H) interactome (HuRI) reporting CEPT1 physical interactions with
      TMEM14B (Q9NUH8) and SPG21 (Q9NZD8); no specific molecular function assigned.
  reference_review:
    relevance: LOW
    correctness: VERIFIED
    review_notes: >-
      High-throughput binary interactome; source of two bare "protein binding" IPI
      annotations. Interactions confirmed in UniProt IntAct block but uninformative for
      molecular function.
- id: PMID:37137909
  title: Structural basis for catalysis of human choline/ethanolamine phosphotransferase
    1.
  findings:
  - statement: >-
      Cryo-EM structures of human CEPT1 (dimer, 10 TMs per protomer) with CDP-choline; CEPT1
      catalyzes the last step of PC and PE synthesis in the Kennedy pathway, prefers Mg2+
      (Mn2+ ~50%), requires DAG, and depends on the catalytic aspartate D154.
    supporting_text: >-
      Choline/ethanolamine phosphotransferase 1 (CEPT1) catalyzes the last step of the
      biosynthesis of PC and PE in the Kennedy pathway by transferring the substituted
      phosphate group from CDP-choline/ethanolamine to diacylglycerol.
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified; full text available. Structural/mechanistic confirmation of the core
      cholinephosphotransferase activity and Mg2+ cofactor dependence. Note the assay used
      CDP-choline throughout, so the title emphasizes PC.
