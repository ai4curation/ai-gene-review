gene_symbol: CEPT1
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  CEPT1 (choline/ethanolamine phosphotransferase 1) is a dual-specificity, polytopic
  integral membrane enzyme of the CDP-alcohol phosphatidyltransferase class-I family that
  catalyzes the final, committed step of both the CDP-choline and CDP-ethanolamine (Kennedy)
  branches of glycerophospholipid biosynthesis. It transfers a phosphobase group from a
  CDP-linked donor to the sn-3 hydroxyl of 1,2-diacyl-sn-glycerol (DAG): using CDP-choline it
  produces phosphatidylcholine plus CMP (diacylglycerol cholinephosphotransferase activity,
  EC 2.7.8.2), and using CDP-ethanolamine it produces phosphatidylethanolamine plus CMP
  (ethanolaminephosphotransferase activity, EC 2.7.8.1). Catalysis requires a divalent metal
  cofactor, preferring Mg2+ (Mn2+ supports roughly half-maximal activity), coordinated by a
  conserved di-aspartate CDP-binding motif; the enzyme also has a minor
  1-alkenyl/1-alkyl-2-acylglycerol choline phosphotransferase side activity that yields ether
  (plasmenyl/plasmanyl) choline phospholipids and platelet-activating-factor precursors. CEPT1
  is a homodimer with ten transmembrane helices per protomer and a hydrophobic chamber that
  accommodates the DAG acyl tails during catalysis. It resides in the endoplasmic reticulum
  membrane and the nuclear (inner) membrane, where channeling of CDP-choline generated by the
  upstream rate-limiting enzyme CCTalpha drives de novo phosphatidylcholine synthesis. CEPT1
  is ubiquitously expressed.
