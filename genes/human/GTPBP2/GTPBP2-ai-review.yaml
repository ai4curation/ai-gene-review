description: GTPBP2 (GTP-binding protein 2) is a cytoplasmic translational GTPase of
  the TRAFAC-class translation-factor superfamily, related to eEF1A, eRF3, Hbs1 and
  its paralog GTPBP1. It partners the ribosome-rescue factor PELO and functions in
  the rescue of ribosomes stalled because of non-functional or deficient tRNA, a role
  that is especially critical in neurons. Unlike its paralog GTPBP1, GTPBP2 lacks eEF1A-like
  elongation activity and does not stimulate exosomal mRNA degradation; it has only
  weak GTP-binding activity that is stimulated by aminoacyl-tRNA. Loss of GTPBP2 (in
  the context of a destabilized brain-specific tRNA in mouse, and through biallelic
  loss-of-function in humans) leads to ribosome stalling and neurodegeneration; human
  GTPBP2 deficiency causes Jaberi-Elahi syndrome, characterized by developmental delay,
  intellectual disability, movement abnormalities and cerebellar atrophy.
