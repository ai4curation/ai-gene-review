proposed_new_terms: []
suggested_questions:
- question: Does human GTPBP2, like its mouse ortholog, act with PELO specifically
    to rescue ribosomes stalled at deficient/hypomodified tRNAs, and is this the basis
    of Jaberi-Elahi syndrome neurodegeneration?
- question: Given its weak GTP binding and lack of elongation activity, what is GTPBP2's
    precise mechanistic contribution within the PELO-dependent rescue cycle relative
    to HBS1L?
suggested_experiments:
- description: Reconstituted ribosome-rescue assays with PELO and ABCE1 comparing GTPBP2
    and HBS1L on tRNA-deficient stalled ribosomes to define GTPBP2's specific activity.
- description: Ribosome profiling in GTPBP2-deficient human neurons (e.g. patient-derived
    or knockout iPSC neurons) to detect stalling at specific codons/tRNAs and link
    it to neurodegeneration.
