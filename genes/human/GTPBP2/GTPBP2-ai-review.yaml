existing_annotations:
- term:
    id: GO:0006414
    label: translational elongation
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: involved_in
  review:
    summary: Phylogenetic transfer of a translational-elongation role from the eEF1A/GTPBP
      family. However, GTPBP2 was directly shown to lack elongation activity; its actual
      role is ribosome rescue of stalled (deficient-tRNA) ribosomes. Mouse genetics
      localize the defect to elongation quality control rather than productive elongation
      - GTPBP2 deficiency causes prolonged ribosome pausing at AGA arginine codons when
      the cognate tRNA-Arg(UCU) pool is limiting.
    action: MARK_AS_OVER_ANNOTATED
    reason: GTPBP2 lacks the eEF1A-like elongation activity that the family-level IBA
      implies; the term over-states its function. The accurate role is rescue/quality
      control of stalled (deficient-tRNA) ribosomes, not productive translational
      elongation.
    supported_by:
    - reference_id: file:human/GTPBP2/GTPBP2-uniprot.txt
      supporting_text: Involved in the rescue of ribosome stalling due to the presence
        of non-functional tRNA
    - reference_id: file:human/GTPBP2/GTPBP2-deep-research-falcon.md
      supporting_text: GTPBP2 deficiency causes prolonged ribosome pausing specifically
        at AGA arginine codons when the cognate tRNA_Arg(UCU) is limiting
