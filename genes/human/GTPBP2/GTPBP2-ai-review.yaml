- id: file:human/GTPBP2/GTPBP2-deep-research-falcon.md
  title: Falcon deep research report for GTPBP2
  reference_review:
    relevance: MEDIUM
    correctness: UNVERIFIED
    review_notes: "LLM-synthesized (Edison Scientific Literature) deep research report.
      GTPBP2-specific, primary-literature-anchored claims that are usable: the
      ribosome-rescue / translation-elongation-quality-control role, cooperation with
      the PELO/HBS1L/ABCE1 rescue machinery, cytosolic ribosome-associated localization,
      and the codon-specific ribosome pausing at AGA arginine codons under limiting
      tRNA-Arg(UCU) (from the Ackerman-lab mouse genetics, Ishimura 2016 / Terrey 2020).
      CAUTION / not relied on here: the report repeatedly folds GTPBP2 together with its
      paralog GTPBP1 (e.g. the Salpietro 2024 GTPBP1/GTPBP2 syndrome and the GTPBP1
      structural / mTORC1 / aa-tRNA-delivery data are GTPBP1-centric and over-generalized
      to GTPBP2), and it over-imputes canonical translation-factor GTPase mechanism
      (GTP-hydrolysis-coupled splitting) that has not been directly demonstrated for human
      GTPBP2, which has only weak GTP binding. Disease/RQC/ISR/NGD framing is review-level
      and not used to change any molecular-function annotation. Citations are secondary
      (this report), not the primary papers; correctness left UNVERIFIED for the synthesis."
  findings:
  - statement: GTPBP2 is a cytosolic ribosome rescue GTPase acting in translation
      elongation quality control on stalled 80S ribosomes, functionally allied with the
      PELO/HBS1L/ABCE1 rescue machinery; mouse genetics show GTPBP2 deficiency causes
      prolonged ribosome pausing at AGA arginine codons when cognate tRNA-Arg(UCU) is
      limiting.
    reference_section_type: RESULTS
core_functions:
- description: Translational GTPase that partners the ribosome-rescue factor PELO to
    rescue ribosomes stalled on non-functional or deficient tRNA, a function critical
    for neuronal proteostasis; GTPBP2 binds aminoacyl-tRNA and GTP (weakly) but, unlike
    GTPBP1, lacks elongation factor activity.
