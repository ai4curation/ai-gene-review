core_functions:
  - description: Secreted reelin assembles into covalent homodimers and higher-order multimers that bind the extracellular domains of VLDLR and LRP8/ApoER2. Receptor engagement induces DAB1 phosphorylation and initiates reelin-mediated signaling. This receptor-ligand activity is the core molecular function; neuronal migration, layer formation, differentiation, behavior, and synaptic phenotypes are context-dependent downstream outcomes. Intrinsic serine peptidase activity is excluded from the core function because direct studies conflict.
