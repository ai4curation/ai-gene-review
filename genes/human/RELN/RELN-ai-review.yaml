    evidence_type: IBA
    original_reference_id: GO_REF:0000033
    qualifier: is_active_in
    review:
      summary: Reelin signaling affects neuronal projections, but neuron projection does not specify the extracellular compartment in which reelin acts.
      action: MARK_AS_OVER_ANNOTATED
