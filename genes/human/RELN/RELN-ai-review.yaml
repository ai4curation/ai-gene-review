id: P78509
gene_symbol: RELN
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: 'RELN encodes reelin, a large secreted extracellular-matrix glycoprotein that assembles into signaling-competent multimers. Reelin binds the lipoprotein-family receptors VLDLR and LRP8/ApoER2, inducing receptor-associated DAB1 phosphorylation and downstream signaling that coordinates neuronal polarization, positioning, and layer formation during brain development and modulates synaptic maturation and plasticity later in life. Biallelic loss-of-function variants cause lissencephaly with cerebellar hypoplasia in humans. An intrinsic serine peptidase activity has been reported but remains disputed and is not considered an established core activity.'
