    title: Combined Automated Annotation using Multiple IEA Methods
    findings: []
  - id: PMID:10571240
    title: Reelin is a ligand for lipoprotein receptors.
    findings:
      - statement: Reelin directly binds VLDLR and ApoER2 and links receptor engagement to DAB1 signaling.
        supporting_text: A signaling pathway involving the extracellular protein Reelin and the intracellular adaptor protein Disabled-1 (Dab1) controls cell positioning during mammalian brain development.
        reference_section_type: ABSTRACT
        full_text_unavailable: true
      - statement: Reelin directly binds its canonical lipoprotein-family receptors.
        supporting_text: Here, we demonstrate that Reelin binds directly to lipoprotein receptors, preferably the very low-density lipoprotein receptor (VLDLR) and apolipoprotein E receptor 2 (ApoER2).
        reference_section_type: ABSTRACT
        full_text_unavailable: true
    full_text_unavailable: true
    reference_review:
      relevance: HIGH
      correctness: VERIFIED
      review_notes: Cached abstract directly establishes receptor binding and links it to DAB1 phosphorylation and neuronal migration.
  - id: PMID:21844191
    title: Functional importance of covalent homodimer of reelin protein linked via its central region.
    findings:
      - statement: Cys2101 links the minimum covalent reelin homodimer and this architecture is required for full signaling.
        supporting_text: Detailed analysis of tryptic fragments produced from the purified reelin proteins revealed that the minimum unit of the multimer is a homodimeric reelin linked via Cys(2101) present in the central region
        reference_section_type: ABSTRACT
        full_text_unavailable: true
    full_text_unavailable: true
    reference_review:
      relevance: HIGH
      correctness: VERIFIED
      review_notes: Cached abstract directly supports homodimer formation, receptor binding by the C2101A mutant, and loss of signaling by that mutant.
  - id: PMID:28887403
    title: 'The functions of Reelin in membrane trafficking and cytoskeletal dynamics: implications for neuronal migration, polarization and differentiation.'
    findings:
      - statement: Canonical reelin signaling is receptor- and DAB1-dependent and branches into cytoskeletal and trafficking pathways.
        supporting_text: Reelin signaling involves a core pathway that activates upon reelin binding to its receptors, particularly ApoER2 (apolipoprotein E receptor 2)/LRP8 (low-density lipoprotein receptor-related protein 8) and very low-density lipoprotein receptor, followed by Src/Fyn-mediated phosphorylation of the adaptor protein Dab1 (Disabled-1).
        reference_section_type: ABSTRACT
        full_text_unavailable: true
    full_text_unavailable: true
    reference_review:
      relevance: HIGH
      correctness: VERIFIED
      review_notes: Review abstract supports the canonical pathway and distinguishes developmental migration and polarization from adult synaptic outcomes.
  - id: PMID:36399478
    title: 'MatrisomeDB 2.0: 2023 updates to the ECM-protein knowledge database.'
    findings: []
    reference_review:
      relevance: MEDIUM
      correctness: VERIFIED
      review_notes: Correct database publication for the MatrisomeDB-derived extracellular-matrix classification; the narrative is not a gene-specific RELN experiment.
  - id: Reactome:R-HSA-8854466
    title: VLDLR binds RELN
    findings: []
  - id: Reactome:R-HSA-8855232
    title: RELN:VLDLR binds DAB1
    findings: []
  - id: Reactome:R-HSA-8855237
    title: FYN phosphorylates DAB1 in RELN:VLDLR:DAB1:SH3KBP1
    findings: []
  - id: Reactome:R-HSA-8855259
    title: RELN:VLDLR:DAB1 binds SH3KBP1
    findings: []
  - id: PMID:12670700
    title: Binding of purified Reelin to ApoER2 and VLDLR mediates tyrosine phosphorylation of Disabled-1.
    full_text_unavailable: true
    findings:
      - statement: ApoER2 and VLDLR are essential canonical receptors for Reelin-induced DAB1 phosphorylation.
        supporting_text: These findings demonstrate that ApoER2 and VLDLR are essential for Reelin signaling and that no other receptor molecules can compensate for their role in mediating tyrosine phosphorylation of Dab1.
        reference_section_type: ABSTRACT
        full_text_unavailable: true
    reference_review:
      relevance: HIGH
      correctness: VERIFIED
      review_notes: Cached abstract directly supports receptor-dependent DAB1 phosphorylation.
  - id: PMID:10973257
    title: Autosomal recessive lissencephaly with cerebellar hypoplasia is associated with human RELN mutations.
    full_text_unavailable: true
    findings:
      - statement: Biallelic human RELN mutations reduce reelin and cause lissencephaly with cerebellar and other brain abnormalities.
        supporting_text: The mutations disrupt splicing of RELN cDNA, resulting in low or undetectable amounts of reelin protein.
        reference_section_type: ABSTRACT
        full_text_unavailable: true
      - statement: Human reelin is a large secreted receptor-binding protein.
        supporting_text: RELN encodes a large (388 kD) secreted protein that acts on migrating cortical neurons by binding to the very low density lipoprotein receptor (VLDLR), the apolipoprotein E receptor 2 (ApoER2; refs 9-11 ), alpha3beta1 integrin and protocadherins.
        reference_section_type: ABSTRACT
        full_text_unavailable: true
    reference_review:
      relevance: HIGH
      correctness: VERIFIED
      review_notes: Human genetic evidence establishes an essential developmental role and supports secretion and receptor binding.
  - id: PMID:11689558
    title: Reelin is a serine protease of the extracellular matrix.
    full_text_unavailable: true
    findings:
      - statement: This study reported intrinsic serine-protease activity for reelin.
        supporting_text: Here we show that reelin is a serine protease and that proteolytic activity is relevant to its function
        reference_section_type: ABSTRACT
        full_text_unavailable: true
        finding_review:
          finding_status: DISPUTED
          superseded_by:
            - PMID:20522975
          review_notes: PMID:20522975 failed to reproduce intrinsic reelin protease activity or laminin degradation.
    reference_review:
      relevance: MEDIUM
      correctness: DISPUTED
      review_notes: Correctly cited primary report, but its protease conclusion was directly challenged by PMID:20522975.
  - id: PMID:20522975
    title: Re-evaluation of protease activity of reelin.
    full_text_unavailable: true
    findings:
      - statement: A direct re-evaluation did not detect intrinsic reelin protease activity.
        supporting_text: It is thus likely that Reelin is not a serine protease and is unable to degrade extracellular matrix.
        reference_section_type: ABSTRACT
        full_text_unavailable: true
    reference_review:
      relevance: HIGH
      correctness: VERIFIED
