suggested_questions:
  - question: Does rigorously purified human reelin possess any intrinsic protease activity under physiological conditions, or were reported cleavage activities caused by associated proteases or preparation-specific artifacts?
  - question: How broadly does the Reelin-dependent posture-change mechanism observed in early/posterior-born mouse lateral-cerebellar Purkinje cells apply to other Purkinje-cell cohorts and to human cerebellar development?
suggested_experiments:
  - hypothesis: Canonical receptor-ligand signaling, but not intrinsic proteolysis, accounts for the core activity of human reelin.
    description: Compare independently purified wild-type and candidate catalytic-serine-mutant human reelin preparations using receptor-binding, DAB1-phosphorylation, and orthogonal protease assays with protease-free controls and quantitative substrate mass spectrometry.
    experiment_type: recombinant-protein biochemistry and neuronal signaling assay
  - hypothesis: Human RELN signaling contributes to Purkinje-cell reorientation and nascent layer formation in a cohort- and stage-restricted manner.
    description: Use lineage-resolved human cerebellar organoids or fetal-tissue models with RELN perturbation and rescue to measure Purkinje-cell polarity, somal orientation, axon position, and layer assembly while tracking VLDLR/LRP8-DAB1 pathway activation.
    experiment_type: spatiotemporal perturbation in human cerebellar developmental models
