suggested_questions:
- question: >-
    Is MAGT1's contribution to cellular Mg2+ homeostasis entirely a downstream consequence of
    hypoglycosylation of Mg2+-handling/immune glycoproteins, or does MAGT1 retain any direct role
    in Mg2+ flux across a membrane?
- question: >-
    What distinguishes the substrate/acceptor-site preferences of MAGT1- versus TUSC3-containing
    OST-B complexes in tissues where both are expressed, given their apparent redundancy?
suggested_experiments:
- description: >-
    Global, site-resolved N-glycoproteomics comparing MAGT1-null, TUSC3-null, and
    MAGT1/TUSC3-double-null cells to define the full set of cysteine-proximal / disulfide-bracketed
    acceptor sites that specifically require the MAGT1 oxidoreductase.
- description: >-
    Reconstitute purified OST-B with wild-type versus CVVC-motif-mutant MAGT1 and directly assay
    both mixed-disulfide formation with a model glycoprotein substrate and glycotransferase activity
    on cysteine-proximal sequons, decoupling oxidoreductase-dependent from oxidoreductase-independent
    (substrate-recognition) roles.
