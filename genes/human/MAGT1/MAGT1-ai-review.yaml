core_functions:
- description: >-
    Thioredoxin-like oxidoreductase activity of MAGT1 within the OST-B complex. Via its
    lumenal, redox-active CXXC (CVVC) motif, MAGT1 forms transient mixed disulfides with the
    free thiols of nascent glycoprotein substrates in its predominantly oxidized state, delaying
    disulfide-bond formation so that STT3B can glycosylate cysteine-proximal acceptor sequons.
