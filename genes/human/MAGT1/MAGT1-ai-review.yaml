id: Q9H0U3
gene_symbol: MAGT1
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  MAGT1 is an endoplasmic-reticulum membrane, thioredoxin-like oxidoreductase and an
  accessory subunit of the STT3B-containing (post-translocational) oligosaccharyltransferase
  complex (OST-B). It carries a lumenal thioredoxin fold with a redox-active CXXC (CVVC)
  motif and is one of two mutually exclusive STT3B-specific accessory subunits (MAGT1 or its
  paralog TUSC3). Within OST-B, MAGT1 promotes N-linked glycosylation of a subset of acceptor
  sequons that are near cysteine residues or bracketed by disulfides: in its predominantly
  oxidized state it forms transient mixed disulfides with the free thiols of nascent
  glycoprotein substrates, delaying disulfide-bond formation so that the catalytic STT3B
  subunit can access and glycosylate the unmodified asparagine. It also has
  oxidoreductase-independent roles in substrate recognition by OST-B. Although historically
  named "magnesium transporter 1" and reported to support cellular Mg2+ uptake, its principal,
  best-supported molecular function is the OST-B oxidoreductase role; any contribution to Mg2+
  homeostasis appears to be secondary and at least partly a downstream consequence of altered
  glycosylation. Loss of MAGT1 function causes X-linked immunodeficiency with magnesium defect,
  Epstein-Barr virus infection and neoplasia (XMEN) and a congenital disorder of glycosylation
  (MAGT1-CDG).
