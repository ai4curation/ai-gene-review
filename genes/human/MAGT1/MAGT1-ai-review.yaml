- id: PMID:25135935
  title: Oxidoreductase activity is necessary for N-glycosylation of cysteine-proximal
    acceptor sites in glycoproteins.
  findings: []
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified; full text available. Definitive mechanistic study: MAGT1 is a subunit of
      the STT3B OST, the lumenal CVVC motif is required for glycosylation of cysteine-proximal
      acceptor sites, MAGT1 is predominantly oxidized, and it forms transient mixed disulfides
      with substrates. Primary support for the core oxidoreductase function.
