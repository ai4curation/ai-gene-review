existing_annotations:
- term:
    id: GO:0009101
    label: glycoprotein biosynthetic process
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: involved_in
  review:
    summary: Phylogenetic (IBA) propagation of a glycoprotein-biosynthesis term across
      the GT29 sialyltransferase family. ST3GAL5's demonstrated physiological
      substrate is a glycosphingolipid (lactosylceramide, giving GM3), not a
      glycoprotein; the glycoprotein term is pulled in because the GT29 family also
      contains protein sialyltransferases. This is an over-annotation for this gene,
      but as an experimental-tree-based inference it is retained rather than removed.
    action: MARK_AS_OVER_ANNOTATED
    reason: ST3GAL5 acts on glycosphingolipid acceptors (LacCer -> GM3), not on
      glycoproteins; the family-level glycoprotein biosynthesis term does not
      reflect this gene's characterized function. Its true process role is captured
      by ganglioside/glycosphingolipid biosynthesis terms.
