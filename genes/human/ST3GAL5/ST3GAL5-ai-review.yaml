suggested_questions:
- question: To what extent does the broader acceptor specificity (GalCer -> GM4; GA2
    -> GM2; GA1 -> GM1) reflect a physiologically relevant in vivo activity versus
    an in vitro capability, and is it isoform-3-specific?
suggested_experiments:
- description: Quantitative glycosphingolipid profiling (mass spectrometry) of cells
    and tissues with defined ST3GAL5 loss-of-function to confirm GM3 depletion and
    downstream ganglioside collapse, and to test whether residual GM4/GM1/GM2 arises
    from the minor acceptor activities.
