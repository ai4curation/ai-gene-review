  label: Homo sapiens
description: ST3GAL5 (GM3 synthase; ST3 beta-galactoside alpha-2,3-sialyltransferase
  5; SIAT9; lactosylceramide alpha-2,3-sialyltransferase, EC 2.4.3.9) is a Golgi
  membrane sialyltransferase of glycosyltransferase family 29 (GT29) that catalyzes
  the first committed step of ganglioside biosynthesis. It transfers sialic acid
  from CMP-N-acetylneuraminate onto the non-reducing terminal galactose of
  lactosylceramide (LacCer), producing GM3 (the simplest ganglioside) plus CMP.
  GM3 is the precursor of the a- and b-series gangliosides, so ST3GAL5 activity
  gates the entire complex ganglioside biosynthetic pathway. The enzyme can also
  sialylate other galactose-terminating glycosphingolipids (galactosylceramide,
  asialo-GM2/GA2, asialo-GM1/GA1), though LacCer is the preferred acceptor. It is a
  single-pass type II membrane protein anchored in the Golgi apparatus membrane with
  a large luminal catalytic domain, and is broadly expressed with high levels in
  brain, skeletal muscle, placenta and testis. Loss-of-function of ST3GAL5 abolishes
  GM3 and downstream ganglioside synthesis and causes salt-and-pepper developmental
  regression syndrome (GM3 synthase deficiency), an autosomal recessive infantile
  epileptic encephalopathy with developmental stagnation, cortical blindness and
  pigmentary skin changes.
