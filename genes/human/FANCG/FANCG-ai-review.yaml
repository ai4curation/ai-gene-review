id: O15287
gene_symbol: FANCG
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  FANCG (also known as XRCC9) is a 622-residue tetratricopeptide-repeat (TPR) protein
  that forms an all-alpha-helical solenoid and is a subunit of the multiprotein Fanconi
  anemia (FA) core complex (FANCA, FANCB, FANCC, FANCE, FANCF, FANCG, FANCL and FANCM,
  together with FAAP20/FAAP100/FAAP24). The FA core complex is a nuclear, chromatin-associated
  E3 ubiquitin ligase (with FANCL as the catalytic RING subunit) that, in response to
  DNA damage and replication stress, monoubiquitinates the FANCD2-FANCI heterodimer to
  promote repair of DNA interstrand crosslinks during S phase and to channel lesions into
  translesion synthesis and homologous recombination. FANCG itself has no known catalytic
  or DNA-binding activity; it acts as a protein-protein adaptor/scaffold, binding FANCA
  directly and being required for the assembly, stability and nuclear accumulation of the
  core complex. Loss of FANCG causes chromosomal instability, hypersensitivity to
  crosslinking agents (e.g. mitomycin C) and Fanconi anemia complementation group G, a
  bone-marrow-failure and cancer-predisposition syndrome. Beyond the nuclear core complex,
  FANCG participates in a phosphorylation(Ser7)-dependent complex with BRCA2/FANCD1, FANCD2
  and XRCC3, and a minor fraction localizes to mitochondria where it interacts with
  peroxiredoxin-3 (PRDX3) and influences resistance to oxidative stress.
