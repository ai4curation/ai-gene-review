- term:
    id: GO:0030674
    label: protein-macromolecule adaptor activity
  evidence_type: IPI
  original_reference_id: PMID:10627486
  qualifier: enables
  review:
    summary: >-
      Proposed informative molecular function to replace the uninformative 'protein binding' rows: FANCG
      is a TPR scaffold that binds FANCA directly and acts as an adaptor bridging FANCA into the FA core
      complex, required for complex assembly, stability and nuclear accumulation.
    action: NEW
    reason: >-
      FANCG has no catalytic or DNA-binding activity; its molecular role within the FA core complex is that
      of a protein-protein adaptor/scaffold. The strong direct FANCA-FANCG interaction, together with
      FANCG's requirement for FANCA stability/nuclear localization and for core-complex integrity, supports
      an adaptor activity that better captures FANCG's molecular function than GO:0005515.
    supported_by:
    - reference_id: PMID:10627486
      supporting_text: the authors found a strong interaction between FANCA and FANCG proteins
    - reference_id: PMID:11063725
      supporting_text: a model in which a multi-protein FA complex serves a nuclear function to maintain genomic integrity
