suggested_questions:
- question: >-
    What is the precise molecular contribution of the FANCG TPR scaffold to core-complex E3 ligase activity
    beyond stabilizing FANCA (e.g. does it position substrates or other subunits)?
- question: >-
    Is the Ser7-phosphorylation-dependent FANCG-BRCA2/FANCD2/XRCC3 complex a genuinely separable
    homologous-recombination function, or a hand-off from the core complex?
- question: >-
    How physiologically important is the mitochondrial/PRDX3 oxidative-stress role of FANCG relative to its
    nuclear ICL-repair function in the bone-marrow-failure phenotype?
suggested_experiments:
- description: >-
    Structure-guided separation-of-function FANCG mutants (FANCA-binding vs core-complex-stabilizing
    surfaces) assayed for FANCD2 monoubiquitination and MMC/cisplatin resistance.
  experiment_type: structure-function mutagenesis
- description: >-
    Quantitative proteomics of the FANCG interactome under DNA-damage vs oxidative-stress conditions to
    delineate nuclear core-complex partners from mitochondrial/other secondary partners.
  experiment_type: affinity-proteomics
