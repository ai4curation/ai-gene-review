- term:
    id: GO:0000724
    label: double-strand break repair via homologous recombination
  evidence_type: IMP
  original_reference_id: PMID:12861027
  qualifier: involved_in
  review:
    summary: >-
      FANCG is required for efficient homologous-recombination repair of DNA double-strand
      breaks. FANCG-knockout DT40 cells show ~9-fold reduced HR repair of I-SceI-induced
      chromosomal DSBs, and FANCG additionally nucleates a Ser7-phosphorylation-dependent
      D1-D2-G-X3 complex (BRCA2/FANCD1, FANCD2, XRCC3) that supports HR repair.
    action: NEW
    reason: >-
      This is a genuine, experimentally supported FANCG function that the GOA set did not
      capture as a distinct process annotation. Gene disruption in DT40 directly demonstrates
      a requirement for FANCG in HR-mediated DSB repair (PMID:12861027), and FANCG-dependent,
      Ser7-phosphorylation-gated assembly of the D1-D2-G-X3 complex with the RAD51 paralog
      XRCC3 links FANCG to the HR machinery independently of its core-complex role in FANCD2
      monoubiquitination (PMID:18212739). Treated as a secondary (non-core) function relative
      to the canonical core-complex ICL-repair role.
    supported_by:
    - reference_id: PMID:12861027
      supporting_text: We conclude that FANCG is required for efficient HR-mediated repair of at least some types of DSBs
    - reference_id: PMID:18212739
      supporting_text: >-
        A role for D1-D2-G-X3 in homologous recombination repair (HRR) is supported by our
        finding that FANCG and the RAD51-paralog XRCC3 are epistatic for sensitivity to DNA
        crosslinking compounds in DT40 chicken cells
core_functions:
- description: >-
    FANCG is a tetratricopeptide-repeat (TPR) scaffold subunit of the nuclear Fanconi anemia core
    complex. It binds FANCA directly and, as a protein-protein adaptor, is required for the assembly,
    stability and nuclear accumulation of the eight-subunit core complex. The intact core complex acts
    as an E3 ubiquitin ligase (catalyzed by the FANCL RING subunit) that monoubiquitinates the
    FANCD2-FANCI heterodimer on chromatin in response to DNA damage/replication stress, thereby driving
    replication-coupled DNA interstrand crosslink repair (and coordinating downstream translesion
    synthesis and homologous recombination). FANCG has no intrinsic catalytic or DNA-binding activity;
    whether it contributes more than structural stabilization (e.g. substrate presentation) to the E3
    ligase reaction is unresolved.
  molecular_function:
    id: GO:0030674
    label: protein-macromolecule adaptor activity
  contributes_to_molecular_function:
    id: GO:0061630
    label: ubiquitin protein ligase activity
  directly_involved_in:
