- term:
    id: GO:0043240
    label: Fanconi anaemia nuclear complex
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: part_of
  review:
    summary: >-
      FANCG is a bona fide subunit of the FA nuclear core complex; this is the best-supported
      cellular-component annotation and represents a core function.
    action: ACCEPT
    reason: >-
      Multiple independent experimental studies place FANCG in the multiprotein nuclear FA core
      complex with FANCA, FANCC, FANCE, FANCF, FANCL and FANCM. The phylogenetic (IBA) call is
      concordant with this experimental consensus.
    supported_by:
    - reference_id: PMID:11063725
      supporting_text: >-
        FANCF was found predominantly in the nucleus, where it complexes with FANCA, FANCC and
        FANCG
- term:
    id: GO:0005634
    label: nucleus
  evidence_type: IEA
  original_reference_id: GO_REF:0000044
  qualifier: located_in
  review:
    summary: >-
      The major form of FANCG is nuclear, where it functions as part of the FA core complex;
      the electronic subcellular-location annotation is correct though generic.
    action: ACCEPT
    reason: >-
      UniProt records the major form as nuclear (minor form cytoplasmic), and FANCG operates in
      a nuclear FA complex. Nucleus is a correct if broad location; more specific nucleoplasm and
      chromatin annotations also exist.
    supported_by:
    - reference_id: PMID:11063725
      supporting_text: >-
        FANCF was found predominantly in the nucleus, where it complexes with FANCA, FANCC and
        FANCG
- term:
    id: GO:0005737
    label: cytoplasm
  evidence_type: IEA
  original_reference_id: GO_REF:0000044
  qualifier: located_in
  review:
    summary: >-
      A minor cytoplasmic form of FANCG is documented, but the functionally important pool is
      nuclear; the cytoplasm location is retained as a non-core localization.
    action: KEEP_AS_NON_CORE
    reason: >-
      UniProt notes that the minor form is cytoplasmic, and FANCA/FANCG are reported to be
      cytoplasmic in G1 and G2-M and nuclear during S phase. The annotation is not wrong but is
      peripheral to the core nuclear ICL-repair function.
    supported_by:
    - reference_id: PMID:17060495
      supporting_text: >-
        FANCA and FANCG are cytoplasmic in G1 and G2-M phase but are predominantly nuclear during
        S phase
