id: P01111
gene_symbol: NRAS
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: NRAS is one of the three canonical human RAS small GTPases (with HRAS and KRAS).
  It is a peripheral membrane protein anchored to the cytoplasmic face of cellular membranes
  through C-terminal lipidation (farnesylation at Cys-186 and palmitoylation at Cys-181) and
  functions as a binary molecular switch that binds GDP/GTP and possesses intrinsic GTPase
  activity. Cycling between an inactive GDP-bound and an active GTP-bound state under the control
  of guanine nucleotide exchange factors (GEFs such as SOS1 and RasGRP) and GTPase-activating
  proteins (GAPs), active GTP-bound NRAS transduces signals from receptor tyrosine kinases to
  downstream effectors, principally the RAF-MEK-ERK (MAPK) cascade and PI3K, thereby promoting
  cell proliferation, survival and differentiation. NRAS undergoes a constitutive
  de/re-palmitoylation acylation cycle that drives rapid shuttling between the plasma membrane
  and the Golgi apparatus, providing spatial control of signaling. Activating somatic and
  germline mutations at codons 12, 13 and 61 impair GTP hydrolysis and lock NRAS in its active
  state, a major oncogenic and developmental-disorder mechanism.
