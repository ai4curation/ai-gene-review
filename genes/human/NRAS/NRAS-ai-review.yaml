id: P01111
gene_symbol: NRAS
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: NRAS is one of the three canonical human RAS small GTPases (with HRAS and KRAS).
  It is a peripheral membrane protein anchored to the cytoplasmic face of cellular membranes
  through C-terminal lipidation (farnesylation at Cys-186 and palmitoylation at Cys-181) and
  functions as a binary molecular switch that binds GDP/GTP and possesses intrinsic GTPase
  activity. Cycling between an inactive GDP-bound and an active GTP-bound state under the control
  of guanine nucleotide exchange factors (GEFs such as SOS1 and RasGRP) and GTPase-activating
  proteins (GAPs), active GTP-bound NRAS transduces signals from receptor tyrosine kinases to
  downstream effectors, principally the RAF-MEK-ERK (MAPK) cascade and PI3K, thereby promoting
  cell proliferation, survival and differentiation. NRAS undergoes a constitutive
  de/re-palmitoylation acylation cycle that drives rapid shuttling between the plasma membrane
  and the Golgi apparatus, providing spatial control of signaling. Activating somatic and
  germline mutations at codons 12, 13 and 61 impair GTP hydrolysis and lock NRAS in its active
  state, a major oncogenic and developmental-disorder mechanism.
existing_annotations:
- term:
    id: GO:0005886
    label: plasma membrane
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: is_active_in
  review:
    summary: NRAS is a lipid-anchored peripheral membrane protein active on the cytoplasmic
      face of the plasma membrane, where GTP-bound NRAS engages RAF and other effectors.
      This is a core, well-supported phylogenetic localization for the RAS family.
    action: ACCEPT
    reason: Plasma membrane is the principal site of action for NRAS signaling and is strongly
      supported across orthologs (IBA) and by direct experimental evidence in human cells.
    supported_by:
    - reference_id: file:human/NRAS/NRAS-uniprot.txt
      supporting_text: 'SUBCELLULAR LOCATION: Cell membrane; Lipid-anchor; Cytoplasmic side.'
    - reference_id: PMID:26701913
      supporting_text: 'C->S: Loss of plasma membrane localization.'
- term:
    id: GO:0007265
    label: Ras protein signal transduction
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: involved_in
  review:
    summary: Ras protein signal transduction is the defining biological process of NRAS,
      which acts as a GTP/GDP-regulated switch transducing receptor tyrosine kinase input
      to downstream effectors (RAF-MEK-ERK, PI3K). Conserved across the RAS family.
    action: ACCEPT
    reason: This is the central core biological process for NRAS, supported phylogenetically
      (IBA) and by direct experimental evidence (see the IDA row for PMID:30712867).
    supported_by:
    - reference_id: PMID:30712867
      supporting_text: STK19 phosphorylates NRAS to enhance its binding to its downstream
        effectors and promotes oncogenic NRAS-mediated melanocyte malignant transformation.
- term:
    id: GO:0008284
    label: positive regulation of cell population proliferation
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: involved_in
  review:
    summary: Active NRAS signaling through the MAPK and PI3K pathways promotes cell
      proliferation, and oncogenic NRAS mutations drive uncontrolled proliferation. This is a
      genuine but downstream consequence of NRAS signal transduction.
    action: KEEP_AS_NON_CORE
    reason: Promotion of proliferation is a real, conserved role of RAS GTPases but is a
      downstream physiological output of the core GTPase/signal-transduction function rather
      than the molecular activity itself. Retained as a non-core process.
    supported_by:
    - reference_id: PMID:30712867
      supporting_text: Activating mutations in NRAS account for 20%-30% of melanoma.
