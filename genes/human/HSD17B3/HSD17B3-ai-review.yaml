  label: Homo sapiens
description: >-
  Testis-specific 17-beta-hydroxysteroid dehydrogenase type 3 (17beta-HSD3), a
  member of the short-chain dehydrogenase/reductase (SDR) superfamily. It is an
  NADPH-dependent oxidoreductase anchored in the endoplasmic reticulum membrane
  that catalyses the final step of testosterone biosynthesis: reduction of the
  17-keto group of androstenedione (androst-4-ene-3,17-dione) to the 17beta-hydroxyl,
  yielding testosterone. It reduces additional 17-ketosteroids (e.g.
  dehydroepiandrosterone, epiandrosterone, androstanedione, and 11-oxygenated C19
  steroids), and can also interconvert estrone and 17beta-estradiol. Expressed
  predominantly in the testis, where it supplies the androgen needed for
  masculinization. Loss-of-function mutations cause an autosomal-recessive 46,XY
  disorder of sex development (17beta-HSD3 deficiency; male pseudohermaphroditism
  with gynecomastia), in which affected 46,XY individuals are undervirilized and
  show a characteristically decreased plasma testosterone-to-androstenedione ratio.
