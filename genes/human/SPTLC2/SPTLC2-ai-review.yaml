id: O15270
gene_symbol: SPTLC2
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  SPTLC2 (serine palmitoyltransferase long chain base subunit 2; EC 2.3.1.50) is the
  pyridoxal-5'-phosphate (PLP)-binding catalytic subunit of serine palmitoyltransferase
  (SPT). Together with SPTLC1 it forms the catalytic heterodimeric core of the SPT complex,
  which additionally contains a small activating subunit (SPTSSA or SPTSSB, which set acyl-CoA
  substrate preference) and negative regulators (ORMDL1/2/3). SPT catalyzes the first,
  committed, and rate-limiting step of de novo sphingolipid biosynthesis: the PLP-dependent
  condensation of L-serine with palmitoyl-CoA (and other long-chain acyl-CoAs) to form
  3-ketodihydrosphingosine (3-oxosphinganine), the precursor of all sphingoid bases and
  downstream sphingolipids (ceramides, sphingomyelin, glycosphingolipids). The catalytic
  lysine (Lys379) forms a Schiff base with the PLP cofactor. SPTLC2 is a single-pass
  endoplasmic reticulum membrane protein and acts at the cytoplasmic face of the ER. Dominant
  missense variants in SPTLC2 shift enzyme substrate specificity toward L-alanine/L-glycine,
  producing neurotoxic 1-deoxysphingolipids, and cause hereditary sensory and autonomic
  neuropathy type 1C (HSAN1C).
