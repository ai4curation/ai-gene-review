core_functions:
- description: >-
    Serine C-palmitoyltransferase: the PLP-dependent catalytic subunit (with SPTLC1) of the
    serine palmitoyltransferase complex that condenses L-serine with palmitoyl-CoA to form
    3-ketodihydrosphingosine, the first committed and rate-limiting step of de novo
    sphingolipid biosynthesis, at the ER membrane.
