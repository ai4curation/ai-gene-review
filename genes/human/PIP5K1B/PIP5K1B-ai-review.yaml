id: O14986
gene_symbol: PIP5K1B
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: 'PIP5K1B encodes phosphatidylinositol 4-phosphate 5-kinase type 1 beta, a membrane-associated
  lipid kinase whose core function is ATP-dependent phosphorylation of PI4P to generate PI(4,5)P2/PIP2.
  PI(4,5)P2 supports membrane signaling, actin remodeling, adhesion, vesicle trafficking,
  and, in the Proteostasis Network context, autophagic lysosome reformation. Existing GOA
  correctly captures the PI4P 5-kinase activity and phosphatidylinositol phosphate biosynthesis.
  Broader phosphatidylinositol kinase/metabolic terms should be narrowed to the PI4P 5-kinase/PIP2
  biosynthetic role, while uropod localization and WNT/PI3K pathway annotations are secondary
  context. The ALR literature supports adding a broad lysosome organization annotation now
  and proposing a more specific autophagic lysosome reformation term.'
