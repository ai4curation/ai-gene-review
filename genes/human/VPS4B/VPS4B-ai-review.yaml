suggested_questions:
- question: Which ESCRT-dependent contexts require VPS4B specifically rather than VPS4A or mixed VPS4A/VPS4B assemblies?
- question: Does VPS4B have direct human-cell roles in phagophore closure or late endosomal microautophagy beyond its generic ESCRT-III disassembly function?
- question: How do VPS4B-specific regulators such as VTA1 and ZFYVE19/ANCHR tune ATPase assembly, ESCRT-III turnover, and context-specific membrane remodeling?
suggested_experiments:
- description: Use rescue assays after VPS4A/VPS4B depletion with VPS4B wild-type, ATPase-dead, MIT-interface, and VTA1-binding mutants across MVB sorting, cytokinesis, exosome, and autophagy assays.
  hypothesis: VPS4B ATPase activity, ESCRT-III recognition, and VTA1-dependent regulation make separable contributions to different ESCRT-dependent cellular contexts.
- description: Measure endogenous VPS4B recruitment and ESCRT-III turnover during phagophore closure or late endosomal microautophagy with live imaging and acute VPS4B-specific perturbation.
  hypothesis: If VPS4B has a direct autophagy role, it should be transiently recruited to the relevant membrane and required for ESCRT-III turnover there.
- description: Compare VPS4A and VPS4B ATP-dependent disassembly kinetics on defined CHMP2A-CHMP3 and mixed ESCRT-III polymers in vitro.
  hypothesis: VPS4B shares the conserved ESCRT-III disassembly mechanism but may differ from VPS4A in substrate preference, VTA1 response, or assembly kinetics.
