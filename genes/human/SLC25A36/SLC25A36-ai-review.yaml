proposed_new_terms: []
suggested_questions:
- question: >-
    What is the physiological directionality and exchange partner set in vivo — i.e. which
    cytosolic (deoxy)nucleotides are imported in exchange for which matrix nucleotide products
    under normal versus proliferative or mtDNA-depleting conditions?
- question: >-
    How does loss of SLC25A36 pyrimidine transport mechanistically produce hyperinsulinism and
    hyperammonemia, given that the carrier's characterized role is mitochondrial nucleotide-pool
    maintenance rather than amino-acid or ammonia metabolism?
suggested_experiments:
- description: >-
    Measure mitochondrial nucleotide pools (UTP/CTP/GTP and dNTPs) and mtDNA/mtRNA content in
    SLC25A36-null versus rescued human cells to quantify the in vivo consequence of losing
    pyrimidine nucleotide import for mitochondrial genome maintenance.
- description: >-
    Perform proteoliposome transport assays with purified human SLC25A36 across a substrate panel
    (pyrimidine vs purine mono-/di-/triphosphates and their deoxy forms) to define the full
    substrate specificity and confirm exclusion of adenine nucleotides.
