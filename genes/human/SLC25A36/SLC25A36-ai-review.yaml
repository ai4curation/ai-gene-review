core_functions:
- description: >-
    Transports pyrimidine (cytosine and uracil) (deoxy)nucleoside mono-, di-, and triphosphates
    across the mitochondrial inner membrane, chiefly by nucleotide-for-nucleotide antiport and at a
    lower rate by uniport, with CTP the preferred substrate. Guanine (deoxy)nucleotides are also
    transported but adenine nucleotides are not.
