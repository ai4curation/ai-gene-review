id: Q8NFF5
gene_symbol: FLAD1
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  FLAD1 encodes human FAD synthase (FMN adenylyltransferase; FMNAT; EC 2.7.7.2), the
  bifunctional, multidomain enzyme that catalyzes the final, committed step of FAD
  cofactor biosynthesis: adenylylation of flavin mononucleotide (FMN) with ATP to give
  flavin adenine dinucleotide (FAD) plus diphosphate, a reaction that requires a divalent
  metal (optimally Mg2+). FAD is the cofactor of hundreds of flavoenzymes, including
  respiratory-chain complexes I and II, the acyl-CoA dehydrogenases of fatty-acid
  beta-oxidation, MTHFR, dimethylglycine dehydrogenase, and the histone demethylase
  LSD1/KDM1A, so FLAD1 is central to cellular energy metabolism and redox biology. The
  C-terminal PAPS-reductase-family domain carries the FMN adenylyltransferase (FAD
  synthase) activity, while an N-terminal molybdopterin-binding-resembling (MPTb) domain
  together with a KH domain confers a FAD hydrolase / FAD diphosphatase activity (EC
  3.6.1.18) and a weaker NADH diphosphatase activity (EC 3.6.1.22), allowing the enzyme
  to control the FAD/FMN balance. Beyond catalysis, the protein binds its FAD product
  tightly and acts as a FAD chaperone, delivering the cofactor directly to client
  apo-flavoproteins. The enzyme functions as a C2-symmetric homodimer. Alternative
  splicing of FLAD1 produces isoforms that differ in the N-terminal region and in
  subcellular targeting: the longer isoform 1 bears a mitochondrial transit peptide and
  localizes to the mitochondrial matrix, the shorter isoform 2 is cytosolic and most
  abundant, and FADS is also detected in the nucleus. Biallelic loss-of-function variants
  cause lipid storage myopathy with combined respiratory-chain and multiple acyl-CoA
  dehydrogenase deficiency, a subset of which is riboflavin-responsive.
