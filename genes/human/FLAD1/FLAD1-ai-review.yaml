- id: PMID:38688286
  title: Structural insights into the bifunctional enzyme human FAD synthase.
  findings:
  - statement: >-
      Crystal structure of full-length hFADS2 and its C-terminal PAPS domain with FAD;
      the C-terminal domain synthesizes FAD while the N-terminal MPTb+KH domains form the
      FAD-hydrolase active site; the enzyme is a C2-symmetric homodimer.
    reference_section_type: ABSTRACT
    supporting_text: >-
      the C-terminal domain tightly binds FAD and catalyzes its synthesis, while the
      combination of the N-terminal molybdopterin-binding and KH domains is the minimal
      essential substructure required for the hydrolysis of FAD
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Abstract-only cache; definitive structural basis for the two activities and the
      homodimer.
