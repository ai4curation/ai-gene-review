- id: PMID:21951714
  title: 'Human FAD synthase (isoform 2): a component of the machinery that delivers
    FAD to apo-flavoproteins.'
  findings:
  - statement: >-
      Purified recombinant isoform 2 catalyzes FAD assembly from ATP and FMN (and, much
      more slowly, pyrophosphorolysis); FAD release appears rate-limiting, implying tight
      control of FAD synthesis and delivery.
    reference_section_type: ABSTRACT
