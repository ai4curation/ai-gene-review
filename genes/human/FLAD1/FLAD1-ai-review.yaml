- id: PMID:23443125
  title: 'Bacterial over-expression and purification of the 3''phosphoadenosine 5''phosphosulfate
    (PAPS) reductase domain of human FAD synthase: functional characterization and
    homology modeling.'
  findings:
  - statement: >-
      The isolated C-terminal PAPS-reductase domain is sufficient to catalyze FAD
      synthesis (and cleavage), localizing the FMN adenylyltransferase activity to that
      domain; the N-terminal MPTb domain is regulatory, not strictly required for
      catalysis.
    reference_section_type: RESULTS
    supporting_text: >-
      the PAPS reductase domain, per se, is able to catalyze the typical reactions of the
      FADS: FAD synthesis and its cleavage.
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Full text available; maps FAD-synthase catalysis to the C-terminal PAPS domain.
- id: PMID:25135855
  title: Significance of redox-active cysteines in human FAD synthase isoform 2.
  findings:
  - statement: >-
      Redox-active cysteines in the PAPS-reductase (FAD-synthesizing) domain modulate FAD
      synthesis; thiol-blocking reagents inhibit the reaction, indicating a cysteine-based
      redox switch.
    reference_section_type: ABSTRACT
    supporting_text: >-
      FAD synthesis is also inhibited by thiol-blocking reagents, suggesting the
      involvement of free cysteines in the hFADS2 catalytic cycle.
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: >-
      Abstract-only cache; supports core FAD-synthase activity and its redox regulation.
