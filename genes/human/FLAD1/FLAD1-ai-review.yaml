- id: PMID:25954742
  title: Remaining challenges in cellular flavin cofactor homeostasis and flavoprotein
    biogenesis.
  findings:
  - statement: >-
      Recombinant isoform 2 synthesizes FAD via an ordered bi-bi mechanism and acts as a
      FAD chaperone, directly delivering FAD to client apo-flavoproteins (LSD1/KDM1A and
      dimethylglycine dehydrogenase); FADS is present in nucleus, cytosol and
      mitochondria.
    reference_section_type: ABSTRACT
    supporting_text: >-
      A direct transfer of the cofactor from hFADS2 to apo-dimethyl glycine dehydrogenase
      was also demonstrated.
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Full text available; establishes the FAD-chaperone/delivery role and
      multi-compartment localization.
- id: PMID:26277395
  title: Human FAD synthase is a bi-functional enzyme with a FAD hydrolase activity
    in the molybdopterin binding domain.
  findings:
  - statement: >-
      Human FADS hydrolyzes FAD to FMN via its N-terminal molybdopterin-binding domain in
      a Co2+/mersalyl-dependent reaction, establishing the bifunctional FAD diphosphatase
      activity distinct from the C-terminal synthase.
    reference_section_type: ABSTRACT
    supporting_text: >-
      The recombinant hFADS2 was able to hydrolyse added FAD in a Co(2+) and mersalyl
      dependent reaction.
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Abstract-only cache; primary evidence for the FAD hydrolase (FAD diphosphatase)
      activity in the MPTb domain.
- id: PMID:31351152
  title: The hidden side of the human FAD synthase 2.
  findings:
  - statement: >-
      The N-terminal FADHy (MPTb) domain hydrolyzes FAD (Co2+/K+ stimulated, Vmax
      exceeding that of FAD synthesis) and other ADP-dinucleotides; NADH inhibits and
      reduced glutathione stimulates the activity, linking NAD and FAD homeostasis.
    reference_section_type: ABSTRACT
    supporting_text: >-
      Co2+ induced FAD hydrolysis was strongly stimulated in the presence of K+, reaching
      a Vmax higher than that of FAD synthesis.
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Abstract-only cache; detailed characterization of the FAD/NADH hydrolase activity.
