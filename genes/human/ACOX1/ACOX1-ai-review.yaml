- term:
    id: GO:0006091
    label: generation of precursor metabolites and energy
  evidence_type: IMP
  original_reference_id: PMID:7876265
  qualifier: involved_in
  review:
    summary: >-
      Misleading for peroxisomal beta-oxidation. Peroxisomal beta-oxidation is a
      degradative, chain-shortening, H2O2-generating process whose products are exported
      to the ER or mitochondria; unlike mitochondrial beta-oxidation it is not a primary
      energy-yielding pathway. This ancestor term over-states the metabolic role.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      Peroxisomal beta-oxidation does not generate cellular energy directly; the enzyme's
      role is degradative chain-shortening with H2O2 production.
