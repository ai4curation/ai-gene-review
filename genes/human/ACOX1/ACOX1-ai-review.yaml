core_functions:
- description: >-
    FAD-dependent straight-chain acyl-CoA oxidase that catalyzes the first, rate-limiting
    and committed step of peroxisomal fatty-acid beta-oxidation: it dehydrogenates a
    2,3-saturated fatty acyl-CoA to the corresponding (2E)-enoyl-CoA and transfers the
    electrons directly to molecular oxygen, producing H2O2. Acts as a homodimer in the
    peroxisomal matrix.
