id: Q15067
gene_symbol: ACOX1
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  ACOX1 is the human peroxisomal straight-chain acyl-CoA oxidase 1 (palmitoyl-CoA
  oxidase / SCOX / AOX), an FAD-dependent flavoenzyme that catalyzes the first and
  rate-limiting step of peroxisomal fatty-acid beta-oxidation. It dehydrogenates
  straight-chain (including very-long-chain) 2,3-saturated fatty acyl-CoAs to the
  corresponding (2E)-2-trans-enoyl-CoAs and, unlike the mitochondrial acyl-CoA
  dehydrogenases, transfers the abstracted electrons directly to molecular oxygen,
  producing hydrogen peroxide. Through this activity it initiates the degradation of
  very-long-chain fatty acids and also oxidizes eicosanoid (e.g. prostaglandin) CoA
  esters and long-chain dicarboxylyl-CoAs, and contributes to peroxisomal steps of
  polyunsaturated fatty acid (e.g. DHA) biosynthesis. The enzyme is a homodimer that
  binds FAD as cofactor, is imported into the peroxisomal matrix via its C-terminal
  PTS1 (SKL) signal, and is proteolytically processed into A/B/C chains. Alternative
  splicing yields isoforms with different chain-length preferences (isoform 1 favours
  medium-chain, isoform 2 acts broadly on long- and very-long-chain substrates). Loss
  of ACOX1 activity causes peroxisomal acyl-CoA oxidase deficiency (pseudo-neonatal
  adrenoleukodystrophy) with very-long-chain fatty acid accumulation, whereas a
  recurrent de novo gain-of-function variant (p.N237S) produces a distinct toxic,
  hyperstable homodimer causing the axonal neuropathy Mitchell syndrome.
