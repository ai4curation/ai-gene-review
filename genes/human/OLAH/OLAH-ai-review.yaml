- term:
    id: GO:0052815
    label: medium-chain fatty acyl-CoA hydrolase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000116
  qualifier: enables
  review:
    summary: >-
      Derived from RHEA-mapped acyl-CoA hydrolysis reactions that are themselves inferred by
      homology to the rat ortholog (P08635), not from human experiment. Acyl-CoA hydrolysis
      is a substrate-mimetic side activity; the physiologically relevant substrate is the
      ACP-linked acyl chain of FASN. PMID:26663084 shows human TE2 prefers acyl-ACP over
      acyl-CoA, so an acyl-CoA-hydrolase MF over-states the enzyme's in-vivo role.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      Represents an in-vitro/homology-inferred acyl-CoA mimic activity rather than the
      physiological acyl-[ACP] hydrolysis; the experimental paper shows a preference for the
      acyl-ACP substrate. Not clearly wrong (the enzyme can hydrolyze acyl-CoAs), so
      over-annotated rather than removed.
    supported_by:
    - reference_id: PMID:26663084
      supporting_text: >-
        TE2 prefers an engineered human acyl-ACP substrate and readily releases short chain
        fatty acids from full-length FASN during turnover
