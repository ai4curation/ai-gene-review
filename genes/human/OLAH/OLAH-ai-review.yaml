  label: Homo sapiens
description: >-
  OLAH (oleoyl-ACP hydrolase; S-acyl fatty acid synthase thioesterase, medium chain;
  thioesterase II / TE2; EC 3.1.2.14) is a cytosolic type II thioesterase that acts in
  trans with the multifunctional type I fatty acid synthase (FASN). By hydrolyzing the
  thioester bond linking the growing acyl chain to the acyl-carrier-protein (ACP) domain
  of FASN, it releases free fatty acids prematurely, thereby terminating chain elongation
  early and shifting the FASN product spectrum toward shorter, medium-chain fatty acids
  (products in the C10-C16 range). It has a single-domain alpha/beta-hydrolase fold with a
  distinctive capping-domain insert and a Ser-His-Asp catalytic triad, and it interacts with
  FASN through its C-terminus. OLAH is the classical thioesterase II of mammary/breast
  epithelium, where it contributes to the medium-chain fatty acid composition of milk lipids.
