  findings:
  - statement: >-
      Human TE2 (OLAH) prefers an acyl-ACP substrate over acyl-CoA mimetics and releases
      short-chain fatty acids from full-length FASN during turnover, establishing it as the
      type II thioesterase that modulates FASN chain length.
    reference_section_type: ABSTRACT
    supporting_text: >-
      In contrast, TE2 prefers an engineered human acyl-ACP substrate and readily releases
      short chain fatty acids from full-length FASN during turnover.
  - statement: >-
      The 2.8 A crystal structure shows an alpha/beta-hydrolase core with a novel capping
      domain and a Ser-101/His-237/Asp-212 catalytic triad.
    reference_section_type: ABSTRACT
    supporting_text: >-
      the capping domain had collapsed onto the active site containing the
      Ser-101-His-237-Asp-212 catalytic triad
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      PubMed/PMC-verified crystal-structure and enzymology paper for human OLAH/TE2; directly
      establishes the fatty acyl-[ACP] hydrolase activity and the FASN chain-length modulation
      role. Cached abstract only (full_text_available: false); quotes taken verbatim from the
      abstract.
