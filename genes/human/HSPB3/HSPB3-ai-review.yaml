suggested_questions:
- question: Does HSPB3 possess bona fide ATP-independent holdase activity on its own, or is its chaperone activity contingent on hetero-oligomerization with HSPB2?
- question: How does the disease-causing R7S variant in the unique N-terminal domain alter HSPB3-HSPB2 complex assembly and client handling to cause motor neuron degeneration?
- question: Is HSPB3's reported inhibition of actin polymerization a direct molecular activity or an indirect consequence of cytoskeletal-client chaperoning?
suggested_experiments:
- description: In vitro chaperone (holdase) assays measuring suppression of thermal/chemical aggregation of model clients (e.g. citrate synthase, luciferase) by recombinant HSPB3 alone versus the HSPB2/HSPB3 complex.
- description: Structural and biophysical characterization (e.g. SEC-MALS, cryo-EM, SAXS) of wild-type versus R7S HSPB3 in HSPB2/HSPB3 hetero-oligomers to define how the variant perturbs assembly.
- description: Patient-derived or knock-in motor neuron models of HSPB3 R7S to test for impaired proteostasis, cytoskeletal defects, and aggregate accumulation.
