    review_notes: "Cached publications/PMID_20142617.md title matches and confirms the
      dominant HSPB3 R7S variant causing distal hereditary motor neuronopathy (HMND4);
      establishes the in vivo physiological importance of HSPB3 chaperone function.
      Not GOA-anchored but cached content is on-target."
  findings:
  - statement: A dominant HSPB3 R7S variant causes autosomal dominant distal hereditary motor neuronopathy (HMND4).
    reference_section_type: RESULTS
- id: PMID:29969581
  title: Terminal Regions Confer Plasticity to the Tetrameric Assembly of Human HspB2
    and HspB3.
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: "Cached full-text (publications/PMID_29969581.md) confirms the crystal
      structure (PDB 6F2R) of the full-length human HspB2/HspB3 hetero-tetramer (3:1),
      directly establishing the HspB2-HspB3 hetero-oligomeric assembly and supporting
      the cytoprotective sHSP chaperone function."
  findings:
  - statement: First crystal structure (PDB 6F2R, 3.9 Å) of a full-length human sHSP
      heteromer; human HspB2/B3 crystallizes as a hetero-tetramer in a 3:1 ratio in
      which four alpha-crystallin domains assemble into a flattened tetrahedron, with
      terminal regions conferring plasticity important for cytoprotective function.
    reference_section_type: RESULTS
