id: Q96GD0
gene_symbol: PDXP
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  PDXP (chronophin; also called pyridoxal 5'-phosphate phosphatase, CIN) is a cytosolic,
  magnesium-dependent phosphatase of the haloacid dehalogenase (HAD)-like hydrolase
  superfamily. Its primary catalytic activity is dephosphorylation of pyridoxal
  5'-phosphate (PLP) to pyridoxal + phosphate (EC 3.1.3.74); it also acts on pyridoxine
  5'-phosphate and pyridoxamine 5'-phosphate, with substrate preference PLP > PNP > PMP,
  making it a key regulator of cellular vitamin B6 (PLP) levels and counterbalancing the
  PLP-generating kinase/oxidase (PDXK/PNPO). PDXP has a second, well-documented catalytic
  activity: it is a highly specific protein-serine phosphatase that removes the regulatory
  Ser3 phosphate from cofilin (CFL1) and the related actin-depolymerizing factor
  (ADF/destrin, DSTN), reactivating them to promote actin filament severing and
  depolymerization. Through this cofilin phosphatase activity PDXP regulates actin
  cytoskeletal dynamics in motile and dividing cells and contributes to cofilin/actin rod
  formation during energy stress in neurons. The enzyme uses an active-site aspartate
  nucleophile (Asp25) and a coordinated Mg2+ ion, functions as a homodimer, and is expressed
  most highly in the central nervous system, liver and testis.
