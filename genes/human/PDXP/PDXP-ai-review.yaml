core_functions:
- description: >-
    Pyridoxal 5'-phosphate (PLP) phosphatase: magnesium-dependent HAD-family hydrolysis of
    pyridoxal 5'-phosphate to pyridoxal + phosphate (also acting on pyridoxine 5'-phosphate
    and pyridoxamine 5'-phosphate, PLP > PNP > PMP), degrading the active vitamin B6 cofactor
    and thereby regulating cellular PLP levels in counterbalance to PDXK/PNPO.
  molecular_function:
    id: GO:0033883
    label: pyridoxal phosphatase activity
  supported_by:
  - reference_id: PMID:14522954
    supporting_text: >-
      Pyridoxal phosphatase catalyzes the dephosphorylation of pyridoxal 5'-phosphate
      (PLP) and pyridoxine 5'-phosphate.
  - reference_id: file:human/PDXP/PDXP-uniprot.txt
    supporting_text: >-
      Functions as a pyridoxal phosphate (PLP) phosphatase, which
  directly_involved_in:
  - id: GO:0032361
    label: pyridoxal 5'-phosphate catabolic process
  locations:
  - id: GO:0005829
    label: cytosol
- description: >-
    Cofilin/ADF protein-serine phosphatase (chronophin): highly specific dephosphorylation of
    the regulatory phospho-Ser3 of cofilin (CFL1) and destrin/ADF (DSTN), reactivating them to
    sever and depolymerize actin filaments; a genuine second physiological (moonlighting)
    catalytic activity that drives cofilin-dependent actin cytoskeletal remodeling.
  molecular_function:
    id: GO:0004721
    label: phosphoprotein phosphatase activity
  supported_by:
  - reference_id: PMID:15580268
    supporting_text: >-
      CIN directly dephosphorylates cofilin with high specificity and colocalizes with
      cofilin in motile and dividing cells.
  - reference_id: file:human/PDXP/PDXP-uniprot.txt
    supporting_text: >-
      Also functions as a protein serine
  directly_involved_in:
  - id: GO:0030836
    label: positive regulation of actin filament depolymerization
  - id: GO:0006470
    label: protein dephosphorylation
  locations:
  - id: GO:0005829
    label: cytosol
- description: >-
    Magnesium ion binding: the catalytic Mg2+ cofactor coordinated at the HAD active site
    (via Asp25/Asp27/Asp238), required for both the pyridoxal-phosphate and cofilin
    phosphatase activities.
  molecular_function:
    id: GO:0000287
    label: magnesium ion binding
  supported_by:
  - reference_id: file:human/PDXP/PDXP-uniprot.txt
    supporting_text: >-
      Name=Mg(2+)
