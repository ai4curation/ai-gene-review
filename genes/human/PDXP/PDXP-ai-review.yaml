- id: PMID:19000834
  title: Chronophin mediates an ATP-sensing mechanism for cofilin dephosphorylation
    and neuronal cofilin-actin rod formation.
  findings:
  - statement: >-
      Chronophin binds Hsp90 (Hsp90beta) in an ATP-enhanced manner; Hsp90 inhibits CIN
