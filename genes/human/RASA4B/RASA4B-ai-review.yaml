  findings:
  - statement: 'Annotation ambiguity flagged: an evolutionary genomics analysis (Diez et al., Nucleic
      Acids Res, 2011, PMID:21447561) reports RASA4B as a truncated duplicate of RASA4 annotated as
      a pseudogene, whereas UniProt C9J798 and a 2024 platelet proteomics review (O''Donoghue & Smolenski,
      Biosci Rep, PMID:38808367) treat RASA4B as a distinct protein entry. Direct mechanistic experiments
      on the RASA4B protein were not retrieved; the existing review''s functional assertions rest on
      family-level inference from RASA4/CAPRI, RASA3, and RASAL1.'
    supporting_text: an evolutionary genomics analysis reports that **RASA4B is a truncated duplicate
      of RASA4 on chromosome 7 and is annotated as a pseudogene**, creating a notable annotation ambiguity
      between some literature and curated protein databases.
  - statement: Family-level inference supports a model in which C2/PH module-containing GAP1-family
      proteins require calcium-dependent membrane recruitment for detectable RasGAP activity, providing
      mechanistic context for the existing review's Ca2+-regulated translocation model even though
      direct RASA4B experiments are lacking.
    supporting_text: reviews of tissue homeostasis note that GAP1-family RasGAPs, including RASA4/CAPRI,
      typically contain N-terminal C2 domains and that RASA4 undergoes calcium-dependent membrane association;
      soluble RASA4 lacking productive membrane engagement is reported to be devoid of detectable RasGAP
      activity
