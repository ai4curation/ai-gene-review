      These results establish JD-containing proteins as a novel family of active
      de-ubiquitination enzymes with wide phylogenic distribution.
  - reference_id: PMID:22970133
    supporting_text: >-
      Ataxin-3 possesses higher affinity for longer ubiquitin chains, containing
      at least four molecules of ubiquitin, and preferentially cleaves linkages
      between ubiquitin molecules established through lysine 63 (K63)
