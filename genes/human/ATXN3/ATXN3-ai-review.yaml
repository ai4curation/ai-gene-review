- term:
    id: GO:0006303
    label: double-strand break repair via nonhomologous end joining
  evidence_type: IMP
  original_reference_id: PMID:32205441
  qualifier: involved_in
  review:
    summary: >-
      NEW (proposed). Wild-type ATXN3 is a regulatory component of a
      transcription-coupled classical non-homologous end-joining (C-NHEJ)
      complex, associating with RNA polymerase II, PNKP and LIG4; ATXN3
      depletion decreases error-free double-strand-break repair of transcribed
      genes, and ATXN3 deubiquitinates stalled RNAP II to permit repair and
      resumption of transcription.
    action: NEW
    reason: >-
      This normal nuclear function of ATXN3 is not captured by any GOA
      annotation but is directly supported by loss-of-function experiments
      (PMID:32205441) and by identification of the ATXN3-containing TCR complex
      (PMID:30994454). It is mechanistically distinct from, and more specific
      than, the legacy nucleotide-excision-repair TAS annotation (GO:0006289),
      which was inferred only from the RAD23 interaction; the demonstrated
      pathway is PNKP-mediated C-NHEJ of transcribed genes. Proposed as a
      genuine but specialized (non-core) function relative to ATXN3's central
      deubiquitinase activity.
    supported_by:
    - reference_id: PMID:32205441
      supporting_text: >-
        ATXN3 depletion significantly decreased global transcription, repair of
        transcribed genes, and error-free double-strand break repair
    - reference_id: PMID:32205441
      supporting_text: >-
        WT ATXN3 is a key regulatory component of the DSB repair complex and is
        pivotal in regulating both TC-NHEJ and transcription
    - reference_id: PMID:30994454
      supporting_text: >-
        HTT forms a transcription-coupled DNA repair (TCR) complex with RNA
        polymerase II subunit A (POLR2A), ataxin-3, the DNA repair
    - reference_id: file:human/ATXN3/ATXN3-deep-research-affinage.md
      supporting_text: >-
        ATXN3 operates in genome maintenance as a component of a
        transcription-coupled DNA repair complex with RNA polymerase II, PNKP
        and CBP
    additional_reference_ids:
    - PMID:30994454
- term:
    id: GO:0006325
    label: chromatin organization
  evidence_type: IMP
  original_reference_id: PMID:36971114
  qualifier: involved_in
  review:
    summary: >-
      NEW (proposed). ATXN3 regulates chromatin organization under unperturbed
      conditions in a catalytic (deubiquitinase)-independent manner; its loss
      causes abnormal nuclear/nucleolar morphology, altered DNA replication
      timing, increased transcription and more open chromatin, and it controls
      the chromatin recruitment and subcellular localization of its partner
      HDAC3.
    action: NEW
    reason: >-
      A distinct, deubiquitinase-independent nuclear function demonstrated by
      ATXN3 loss-of-function (PMID:36971114). It is not represented in the GOA
      set and is proposed as a non-core function; because it is explicitly
      catalytic-independent, it is separate from ATXN3's core DUB activity.
    supported_by:
    - reference_id: PMID:36971114
      supporting_text: ATXN3 controls DNA replication and transcription by regulating
        chromatin
    - reference_id: PMID:36971114
      supporting_text: >-
        Here we report the role of ATXN3 in chromatin organization during
        unperturbed conditions, in a catalytic-independent manner
