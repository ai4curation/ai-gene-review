id: P54252
gene_symbol: ATXN3
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  Ataxin-3 (ATXN3; also called Machado-Joseph disease protein MJD1) is a
  deubiquitinating enzyme of the Josephin/Machado-Joseph-domain family of
  papain-like cysteine proteases. Its N-terminal Josephin domain carries the
  catalytic triad (Cys14, His119, Asn134) that hydrolyzes isopeptide bonds in
  polyubiquitin, while two-to-three C-terminal ubiquitin-interacting motifs
  (UIMs) bind ubiquitin and set the length of the chains it engages. Ataxin-3
  preferentially binds and trims long polyubiquitin chains (with weak activity
  on chains of four or fewer ubiquitins) and cleaves both K48- and K63-linked
  linkages, acting as a ubiquitin-chain-editing/trimming DUB whose activity is
  stimulated by the AAA-ATPase VCP/p97. Through these activities it supports
  protein homeostasis: it participates in endoplasmic-reticulum-associated
  degradation (ERAD) and retrotranslocation as a p97-associated DUB, cooperates
  with the proteasome-shuttle factors RAD23A/RAD23B and the ubiquitin ligase
  STUB1/CHIP to limit ubiquitin-chain length during protein quality control, and
  deubiquitinates BECN1 to promote starvation-induced autophagy. Lysosome-
  associated ataxin-3 deubiquitinates the GTPase RHEB to negatively regulate
  mTORC1 signaling during amino-acid starvation, and nuclear ataxin-3 acts as a
  histone-binding transcriptional regulator, partnering with FOXO4 at the
  SOD2/MnSOD oxidative-stress gene. The protein shuttles between cytoplasm and
  nucleus and associates with the nuclear matrix. A polymorphic polyglutamine
  (CAG) tract near the C-terminus, when expanded beyond the normal range, drives
  misfolding, aggregation and neuronal intranuclear inclusions, causing
  spinocerebellar ataxia type 3 (Machado-Joseph disease), the most common
  autosomal-dominant ataxia.
