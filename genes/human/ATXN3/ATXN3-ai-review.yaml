core_functions:
- description: >-
    Cysteine-protease deubiquitinase (Josephin domain) that binds and trims long
    polyubiquitin chains, functioning as a ubiquitin-chain-editing enzyme in
    protein quality control and proteasomal/ERAD degradation; activity is
    stimulated by VCP/p97.
