proposed_new_terms: []
suggested_questions:
- question: >-
    Which of ataxin-3's many reported roles (ERAD, proteasomal quality control,
    mTORC1/RHEB, autophagy/BECN1, transcription/FOXO4) reflect its evolutionarily
    conserved core function versus context-specific or pathological gain-of-function
    activities of the expanded polyQ protein?
- question: >-
    What are the physiological substrates whose ubiquitin chains ataxin-3 edits in
    neurons, and does substrate specificity depend on isoform (UIM3-containing vs not)?
suggested_experiments:
- description: >-
    Define ataxin-3's endogenous linkage specificity and chain-length preference in
    neurons using linkage-specific Ub sensors and quantitative Ub-chain restriction
    assays on immunopurified endogenous ATXN3 complexes (wild-type vs catalytically
    dead C14A), rather than recombinant protein alone.
- description: >-
    Test whether the ERAD, mTORC1/RHEB, and autophagy/BECN1 activities require the
    same catalytic site by rescuing ATXN3-null cells with catalytically inactive and
    UIM-deletion mutants and scoring each pathway independently.
