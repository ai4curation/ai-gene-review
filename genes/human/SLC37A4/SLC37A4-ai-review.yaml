suggested_questions:
- question: >-
    Beyond the hepatic G6PC1 axis, how does G6PT (with the ubiquitous G6PC3) support
    neutrophil function, and what molecular mechanism links the transporter defect to
    neutropenia and neutrophil dysfunction in GSD Ib?
- question: >-
    Do the two SLC37A4 isoforms (canonical vs vG6PT) differ in tissue-specific
    regulation or kinetics despite both being active G6P transporters?
suggested_experiments:
- description: >-
    Cryo-EM/functional dissection of the G6P:Pi antiport cycle to define the
    stoichiometry and the residues gating G6P entry versus Pi counter-transport (building
    on the 2025 structures), and test how GSD Ib missense variants perturb each half-cycle.
- description: >-
    Cell-based assays coupling G6PT with G6PC1 versus G6PC3 to quantify how the
    transporter partitions between the hepatic gluconeogenic and the neutrophil
    (energy/1,5-anhydroglucitol-6-phosphate detox) systems.
