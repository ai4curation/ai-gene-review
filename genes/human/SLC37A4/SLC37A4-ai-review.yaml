id: O43826
gene_symbol: SLC37A4
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  SLC37A4 (glucose-6-phosphate exchanger; G6PT/G6PT1) is a multi-pass endoplasmic
  reticulum membrane transporter of the SLC37 sugar-phosphate/phosphate exchanger
  family (major facilitator superfamily, organophosphate:Pi antiporter clade). It is
  the glucose-6-phosphate:inorganic-phosphate antiporter that translocates cytosolic
  glucose-6-phosphate (G6P) into the ER lumen in exchange for luminal inorganic
  phosphate. By importing G6P into the ER, it delivers the substrate to the luminal
  active site of the glucose-6-phosphatase catalytic subunits (G6PC1 in liver, kidney
  and intestine; G6PC3 ubiquitously, including neutrophils), and thereby carries out
  the terminal, glucose-releasing step shared by gluconeogenesis and glycogenolysis,
  playing a central role in interprandial blood-glucose homeostasis. Two alternatively
  spliced isoforms exist (isoform 2/vG6PT includes an extra exon-7 segment); both are
  active G6P transporters. Loss-of-function variants cause glycogen storage disease
  type Ib (von Gierke type Ib), combining the GSD Ia-like metabolic phenotype (fasting
  hypoglycemia, hepatomegaly, lactic acidemia, hyperlipidemia) with neutropenia,
  neutrophil dysfunction and inflammatory-bowel-disease-like features, reflecting the
  transporter's role in both the hepatic G6PC1 and the neutrophil G6PC3 systems. A
  distinct dominant variant (p.Arg423*) that removes the C-terminal ER-retention signal
  mislocalizes the transporter to the Golgi and causes a congenital disorder of
  glycosylation (CDG-IIw) with liver dysfunction and coagulopathy.
