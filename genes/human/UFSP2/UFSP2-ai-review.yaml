proposed_new_terms: []
suggested_questions:
- question: How is the choice between UFSP2 pro-UFM1 maturation and substrate deUFMylation regulated, and what determines its substrate selectivity (RPL26 vs CYB5R3 vs TRIP4)?
- question: How do the skeletal-dysplasia missense variants versus the recessive neurodevelopmental variant differ mechanistically in their effect on UFSP2 catalysis and the resulting UFMylation balance?
suggested_experiments:
- description: Substrate-resolved UFM1-conjugate proteomics in UFSP2-knockout versus catalytically dead (C302A) rescue cells to map the in vivo deUFMylation substrate repertoire.
- description: Reconstitute UFMylated 60S recycling in vitro with purified UFSP2 to test whether RPL26 deUFMylation is necessary and sufficient to release the UFM1 E3 ligase clamp.
