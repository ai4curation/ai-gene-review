core_functions:
- description: >-
    Ecto-5'-nucleotidase (CD73) activity: extracellular, Zn2+-dependent hydrolysis of
    nucleoside 5'-monophosphates to the corresponding nucleoside plus inorganic
    phosphate, with AMP the preferred substrate. Hydrolysis of extracellular AMP to
    adenosine is the rate-limiting terminal step of the ectonucleotidase cascade and
    the major control point for extracellular adenosine.
  molecular_function:
    id: GO:0008253
    label: 5'-nucleotidase activity
  directly_involved_in:
