id: P21589
gene_symbol: NT5E
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  NT5E encodes ecto-5'-nucleotidase (5'-NT; CD73), a GPI-anchored, homodimeric,
  Zn2+-dependent cell-surface glycoprotein that catalyzes the extracellular
  dephosphorylation of nucleoside 5'-monophosphates to their corresponding
  nucleosides plus inorganic phosphate. AMP is its preferred substrate, and the
  hydrolysis of extracellular AMP to adenosine is the rate-limiting, terminal step
  of the ectonucleotidase cascade that begins when CD39/ENTPD1 hydrolyses ATP and
  ADP to AMP. The enzyme also hydrolyses other ribonucleoside monophosphates (IMP,
  UMP, GMP, CMP) and 2'-deoxyribonucleoside monophosphates (dAMP, dCMP, dTMP) with
  a preference for ribonucleotides, and can process NAD and NMN. Catalysis requires
  a binuclear Zn2+ metal centre, and the mature protein is a disulfide-bonded,
  N-glycosylated homodimer attached to the outer leaflet of the plasma membrane by
  a C-terminal GPI anchor. The adenosine produced by CD73 is a potent purinergic
  signaling molecule that activates G-protein-coupled P1 adenosine receptors,
  driving immunosuppressive and anti-inflammatory responses; consequently CD73 is a
  prominent immuno-oncology drug target. CD73 additionally acts as an adhesion
  molecule mediating lymphocyte binding to endothelium. Loss-of-function mutations
  in NT5E cause calcification of joints and arteries (CALJA), an adult-onset
  disorder of ectopic arterial and periarticular calcification.
