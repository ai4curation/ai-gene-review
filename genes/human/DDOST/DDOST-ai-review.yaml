id: P39656
gene_symbol: DDOST
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: DDOST (OST48; dolichyl-diphosphooligosaccharide--protein glycosyltransferase
  48 kDa subunit) is a non-catalytic core subunit of the oligosaccharyltransferase
  (OST) complex, the endoplasmic reticulum enzyme that carries out the central step
  of N-linked protein glycosylation. It is a single-pass type I ER membrane glycoprotein
  with a large lumenal domain, a single transmembrane helix, and a short cytoplasmic
  tail. OST transfers the preassembled high-mannose glycan (Glc3Man9GlcNAc2) en bloc
  from dolichol-pyrophosphate onto asparagine residues within Asn-X-Ser/Thr sequons
  in nascent secretory and membrane proteins. DDOST is one of the shared core subunits
  (with RPN1, RPN2, OST4, DAD1, TMEM258) common to both the STT3A-containing (cotranslational,
  OST-A) and STT3B-containing (posttranslocational, OST-B) complexes, while the STT3A/STT3B
  paralogues provide the catalytic activity. DDOST is required for the assembly and
  stability of both OST complex forms, and its loss causes global protein hypoglycosylation.
  Deficiency of DDOST causes a congenital disorder of glycosylation (DDOST-CDG / CDG1R).
