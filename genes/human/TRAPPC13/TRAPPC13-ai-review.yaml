proposed_new_terms: []
suggested_questions:
- question: Should human TRAPPC13 be curated as TRAPPII, TRAPPIII, or both, given the
    difference between yeast Trs65/TRAPPII assignment, mammalian genetic-interaction
    TRAPPIII models, and ComplexPortal TRAPPII entries?
  experts:
  - ComplexPortal curators
  - Reactome TRAPP curators
  - GO transport editors
- question: Should TRAPPC13 generic protein-binding annotations be replaced by more
    informative TRAPP complex membership and complex-level Rab/RAB GEF annotations?
  experts:
  - GO molecular function editors
  - IntAct curators
- question: Is there direct experimental evidence for a TRAPPC13-specific autophagy or
    ATG9-trafficking annotation, or should PN autophagy context remain limited to
    TRAPPIII/TRAPP complex membership?
  experts:
  - GO autophagy editors
  - Reactome TRAPP curators
suggested_experiments:
- description: Reconstitute human TRAPPC13-containing TRAPPII and TRAPPIII assemblies
    and measure RAB1 nucleotide exchange with and without TRAPPC13.
  experiment_type: complex reconstitution and RAB GEF assay
  hypothesis: TRAPPC13 contributes to complex-level RAB1 GEF activity through TRAPP
    complex assembly or stability rather than acting as an independent enzyme.
- description: Deplete and rescue TRAPPC13 in mammalian cells and compare ER-to-Golgi
    cargo transport, Golgi morphology, RAB1 activation, and TRAPP subunit integrity.
  experiment_type: trafficking rescue assay
  hypothesis: TRAPPC13 supports early secretory trafficking by maintaining functional
    TRAPP complex architecture.
- description: Test TRAPPC13 perturbation in ATG9 cycling, LC3/WIPI2 puncta formation,
    and starvation-induced autophagy alongside TRAPPC8-positive controls.
  experiment_type: autophagy trafficking assay
  hypothesis: If TRAPPC13 has a specific PN autophagy role, it should affect
    TRAPPIII-dependent ATG9/autophagosome initiation readouts beyond generic
    secretory pathway disruption.
