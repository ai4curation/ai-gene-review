  label: Homo sapiens
description: TRAPPC13/C5orf44 is a Trs65-related large TRAPP subunit curated in human
  TRAPPII and TRAPPIII complex contexts. Its main PN-relevant role is contribution to
  TRAPP complex RAB1/Rab GEF trafficking and ER-to-Golgi vesicle-mediated transport,
  not independent GEF activity, COPII coat assembly, generic protein binding, or a
  direct TRAPPC13-specific autophagy annotation.
