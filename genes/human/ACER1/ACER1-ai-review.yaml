  label: Homo sapiens
description: >-
  ACER1 (alkaline ceramidase 1; also acylsphingosine deacylase 3 / N-acylsphingosine
  amidohydrolase 3, ASAH3) is an integral, multi-pass endoplasmic-reticulum membrane
  enzyme that hydrolyses ceramide to sphingosine and a free fatty acid at alkaline pH
  (EC 3.5.1.23). It preferentially cleaves very-long-chain and unsaturated ceramides
  (e.g. C24:1- and C24:0-ceramide) with the natural D-erythro-sphingosine backbone, and
  can also hydrolyse dihydroceramides to dihydrosphingosine. Catalysis depends on a
  catalytic zinc ion and is influenced by calcium. ACER1 is one of three human alkaline
  ceramidases (ACER1/2/3) and is distinct from the acid (ASAH1) and neutral (ASAH2)
  ceramidases; unlike its paralogs it is expressed almost exclusively in skin/epidermis.
  By controlling the local ceramide-sphingosine-sphingosine-1-phosphate balance, ACER1
  is a key regulator of keratinocyte proliferation and differentiation and contributes
  to epidermal permeability-barrier homeostasis. It sits in the sphingolipid catabolic
  pathway, generating the sphingosine that can be phosphorylated to the bioactive
  signalling lipid sphingosine-1-phosphate.
