- id: PMID:16477081
  title: Differentiation-associated expression of ceramidase isoforms in cultured
    keratinocytes and epidermis.
  findings:
  - statement: >-
      All five ceramidase isoforms are expressed in keratinocytes/epidermis, with acidic
      and alkaline ceramidase activities increasing with differentiation; alkaline
      ceramidase-1 (ACER1) is essentially epidermis-restricted.
    reference_section_type: ABSTRACT
    supporting_text: >-
      alkaline CDase-1 occurs almost exclusively in epidermis
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified; abstract-only. Establishes epidermis-restricted expression and the
      differentiation-associated increase in alkaline ceramidase activity. Supports the
      IEP expression annotations (epidermis development, keratinocyte differentiation) but
      is expression-correlation, not a demonstrated developmental mechanism.
- id: PMID:17713573
  title: Upregulation of the human alkaline ceramidase 1 and acid ceramidase mediates
    calcium-induced differentiation of epidermal keratinocytes.
  findings:
  - statement: >-
      haCER1 (ACER1) hydrolyses very-long-chain ceramides to generate sphingosine in a
      Ca2+-dependent manner; its Ca2+-induced upregulation mediates growth arrest and
      differentiation of human epidermal keratinocytes.
    reference_section_type: ABSTRACT
    supporting_text: >-
      haCER1 catalyzed the hydrolysis of very long-chain ceramides to generate
      sphingosine (SPH). This in vitro activity required Ca2+.
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified; abstract-only but this is the primary experimental characterization
      of human ACER1: catalytic activity, ER localization, Ca2+-dependence, and the
      keratinocyte-differentiation phenotype (knockdown blocks keratin 1 / involucrin
      induction and Ca2+-induced growth arrest). Anchors most of the core annotations.
- id: PMID:20207939
  title: Role of alkaline ceramidases in the generation of sphingosine and its phosphate
    in erythrocytes.
  findings:
  - statement: >-
      Alkaline ceramidase activity generates sphingosine (the sphingosine-1-phosphate
      precursor) from ceramide; sphingosine is produced only from ceramide hydrolysis by
      ceramidases.
    reference_section_type: ABSTRACT
    supporting_text: >-
      SPH is only generated from the hydrolysis of ceramides via ceramidases.
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified; abstract-only. Focus is the ACER family activity in erythrocytes
      (largely ACER2/ACER3, since ACER1 is skin-restricted). Cited by UniProt for ACER1
      catalytic activity on N-acylsphinganine; supports the ceramidase MF and
      sphingosine-biosynthesis / ceramide-catabolism BP annotations at the family level.
- id: PMID:20628055
  title: Alkaline ceramidase 2 (ACER2) and its product dihydrosphingosine mediate
    the cytotoxicity of N-(4-hydroxyphenyl)retinamide in tumor cells.
  findings:
  - statement: >-
      Alkaline ceramidase catalyses hydrolysis of (dihydro)ceramides to generate the
      sphingoid base; ACER2 hydrolyses dihydroceramides to dihydrosphingosine.
    reference_section_type: ABSTRACT
    supporting_text: >-
      ACER2, which catalyzes the hydrolysis of dihydroceramides to generate DHS
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified; abstract-only. The paper is chiefly about the paralog ACER2 in
      tumor cells. Cited by UniProt for ACER1 catalytic activity on additional
      (oleoyl / dihydro) ceramide substrates (RHEA:33551, RHEA:41299). Supports the
      ceramidase MF but the biological context (4-HPR cytotoxicity) is not ACER1's.
