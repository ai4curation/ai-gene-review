core_functions:
- description: >-
    Alkaline ceramidase: hydrolyses ceramide (N-acylsphing-4-enine) to sphingosine and a
    free fatty acid at alkaline pH in the endoplasmic reticulum membrane, preferring
    very-long-chain and unsaturated ceramides (e.g. C24:1-ceramide). This is the direct
    catabolism of ceramide with concomitant biosynthesis of sphingosine.
  molecular_function:
    id: GO:0017040
    label: N-acylsphingosine amidohydrolase activity
  directly_involved_in:
  - id: GO:0046514
    label: ceramide catabolic process
  - id: GO:0046512
    label: sphingosine biosynthetic process
