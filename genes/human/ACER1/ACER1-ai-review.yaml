    label: endoplasmic reticulum membrane
  supported_by:
  - reference_id: PMID:17713573
    supporting_text: >-
      haCER1 catalyzed the hydrolysis of very long-chain ceramides to generate
      sphingosine (SPH). This in vitro activity required Ca2+.
  - reference_id: file:human/ACER1/ACER1-uniprot.txt
    supporting_text: >-
      Endoplasmic reticulum ceramidase that catalyzes the
      hydrolysis of ceramides into sphingosine and free fatty acids at
      alkaline pH
proposed_new_terms: []
suggested_questions:
- question: >-
    Does ACER1 have a demonstrable, direct role in sebaceous gland development, or is the
    ortholog-transferred annotation an artefact of its skin-restricted expression?
- question: >-
    What is the in vivo consequence of ACER1 loss in human skin (barrier function,
    keratinocyte differentiation) beyond the cell-culture keratinocyte data?
suggested_experiments:
- description: >-
    Lipidomic profiling (ceramide species, sphingosine, S1P) in ACER1-knockout vs
    wild-type human epidermal keratinocytes / reconstructed epidermis to quantify its
    contribution to the very-long-chain ceramide pool and barrier lipids.
- description: >-
    Determine the ACER1 substrate spectrum and pH/metal dependence with purified,
    reconstituted enzyme to define its precise preference among very-long-chain and
    unsaturated ceramides versus dihydroceramides.
