core_functions:
- description: >-
    Isobutyryl-CoA dehydrogenase (IBDH) activity: FAD-dependent
    alpha,beta-dehydrogenation of isobutyryl-CoA (2-methylpropanoyl-CoA) to
    methacrylyl-CoA ((2E)-2-methylpropenoyl-CoA), transferring the abstracted
    electrons to the electron-transfer flavoprotein. This is the third step of
    L-valine catabolism, carried out in the mitochondrial matrix.
  molecular_function:
    id: GO:0003853
    label: short-chain 2-methyl fatty acyl-CoA dehydrogenase activity
  directly_involved_in:
  - id: GO:0006574
    label: L-valine catabolic process
  locations:
  - id: GO:0005759
    label: mitochondrial matrix
  supported_by:
  - reference_id: file:human/ACAD8/ACAD8-uniprot.txt
    supporting_text: "Isobutyryl-CoA dehydrogenase which catalyzes the conversion"
  - reference_id: PMID:12359132
    supporting_text: "Thus, this enzyme is an isobutyryl-CoA dehydrogenase."
- description: >-
    FAD binding: ACAD8 is a flavoprotein that binds one FAD per subunit as the
    prosthetic group that accepts the hydride during acyl-CoA dehydrogenation;
    the FAD is directly resolved in the enzyme's crystal structure.
  molecular_function:
    id: GO:0050660
    label: flavin adenine dinucleotide binding
  locations:
  - id: GO:0005759
    label: mitochondrial matrix
  supported_by:
  - reference_id: file:human/ACAD8/ACAD8-uniprot.txt
    supporting_text: "Name=FAD; Xref=ChEBI:CHEBI:57692;"
