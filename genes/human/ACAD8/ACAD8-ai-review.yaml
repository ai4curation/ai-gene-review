- id: PMID:10524212
  title: Isolation and characterisation of a cDNA encoding the precursor for a novel
    member of the acyl-CoA dehydrogenase gene family.
  findings:
  - statement: >-
      Cloned the ACAD8 cDNA (415-aa precursor, chromosome 11q25) as a novel member
      of the human acyl-CoA dehydrogenase family; substrate specificity was not yet
      determined.
    supporting_text: >-
      A gene encoding the precursor for a novel member of the human acyl-CoA
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified. Establishes ACAD8 as an ACAD-family member by sequence only;
      basis for the general (now superseded) acyl-CoA dehydrogenase and lipid
      metabolic TAS annotations.
- id: PMID:11013134
  title: 'Isolated 2-methylbutyrylglycinuria caused by short/branched-chain acyl-CoA
    dehydrogenase deficiency: identification of a new enzyme defect, resolution of
    its molecular basis, and evidence for distinct acyl-CoA dehydrogenases in isoleucine
    and valine metabolism.'
  findings:
  - statement: >-
      Showed that ACAD-8 is an isobutyryl-CoA dehydrogenase, is imported into
      mitochondria and forms tetramers, and functions in valine catabolism (distinct
      from the isoleucine-pathway SBCAD).
    supporting_text: >-
      indicate that ACAD-8 is a mitochondrial enzyme that functions in valine
      catabolism.
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified. Although titled around the isoleucine-pathway SBCAD defect,
      the full study assigns ACAD8 as the mitochondrial isobutyryl-CoA dehydrogenase
      of valine catabolism.
- id: PMID:12359132
  title: Identification of isobutyryl-CoA dehydrogenase and its deficiency in humans.
  findings:
  - statement: >-
      Recombinant ACAD8 characterized enzymatically as an isobutyryl-CoA
      dehydrogenase (preferred substrate isobutyryl-CoA; weaker with
      2-methylbutyryl-CoA and propionyl-CoA); first patient (Arg302Gln) defines
      IBDD as a valine-oxidation defect.
    supporting_text: >-
      Thus, this enzyme is an isobutyryl-CoA dehydrogenase.
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified. Definitive enzymatic identification of ACAD8 and its
      deficiency; anchors the core molecular function.
- id: PMID:16857760
  title: Variations in IBD (ACAD8) in children with elevated C4-carnitine detected
    by tandem mass spectrometry newborn screening.
  findings:
  - statement: >-
      Reported additional IBDD patients/variants from newborn screening for elevated
      C4-carnitine; functional studies showed variant IBD proteins disturb folding
      and reduce active tetramer levels.
    supporting_text: >-
      The isobutyryl-CoA dehydrogenase (IBD) enzyme is involved in the
      degradation of valine.
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified. Supports the valine-catabolism function and the IBDD disease
      association via newborn-screening genetics.
- id: PMID:33961781
  title: Dual proteome-scale networks reveal cell-specific remodeling of the human
    interactome.
  findings:
