gene_symbol: ACAD8
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  ACAD8 is the mitochondrial isobutyryl-CoA dehydrogenase (IBD/IBDH), an
  FAD-dependent member of the acyl-CoA dehydrogenase (ACAD) family. It catalyzes
  the third step of valine catabolism: the FAD-dependent
  alpha,beta-dehydrogenation of isobutyryl-CoA (2-methylpropanoyl-CoA) to
  methacrylyl-CoA ((2E)-2-methylpropenoyl-CoA), with the abstracted electrons
  passed via its FAD cofactor to the electron-transfer flavoprotein (ETF), and
  onward through ETF-ubiquinone oxidoreductase into the mitochondrial
  respiratory chain. Isobutyryl-CoA is the strongly preferred physiological
  substrate; the enzyme also weakly oxidizes (2S)-2-methylbutyryl-CoA and
  n-propionyl-CoA in vitro. The mature enzyme is a soluble homotetramer (a dimer
  of dimers) in the mitochondrial matrix, produced from a 415-residue precursor
  after cleavage of an N-terminal mitochondrial targeting sequence. Loss of
  ACAD8 activity causes isobutyryl-CoA dehydrogenase deficiency (IBDD), an
  autosomal recessive condition typically detected on newborn screening by
  elevated C4 (butyryl/isobutyryl) acylcarnitine and often clinically benign.
