id: P07741
gene_symbol: APRT
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: Adenine phosphoribosyltransferase (APRT; EC 2.4.2.7) is the cytosolic
  enzyme of the purine salvage pathway that catalyzes the transfer of the phosphoribosyl
  group of 5-phospho-alpha-D-ribose 1-diphosphate (PRPP) to adenine, producing AMP
  and diphosphate. This single-step reaction recycles free adenine - notably the adenine
  released as a byproduct of polyamine biosynthesis, as well as adenine of dietary
  origin - into the adenine nucleotide pool at lower energetic cost than de novo synthesis.
  APRT is a homodimer belonging to the type I purine/pyrimidine phosphoribosyltransferase
  family and, like other type I PRTases, uses a magnesium-PRPP complex; it is expressed
  ubiquitously and acts in the cytosol. Loss of APRT function causes adenine phosphoribosyltransferase
  deficiency (APRTD), an autosomal recessive disorder in which unsalvaged adenine is
  instead oxidized by xanthine dehydrogenase to the highly insoluble 2,8-dihydroxyadenine
  (2,8-DHA); precipitation of 2,8-DHA in the urinary tract and renal parenchyma produces
  2,8-DHA nephrolithiasis, crystalline nephropathy, and progressive renal failure.
