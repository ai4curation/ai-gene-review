- id: PMID:15196008
  title: Three-dimensional structure of human adenine phosphoribosyltransferase and
    its relation to DHA-urolithiasis.
  findings:
  - statement: The recombinant human APRT was crystallized in complex with AMP, revealing
      a type I PRTase fold and providing the structural basis for DHA-urolithiasis-causing
      mutations. APRT is the only route for salvage of adenine from polyamine biosynthesis
      or diet.
    supporting_text: In mammals, adenine phosphoribosyltransferase (APRT, EC 2.4.2.7)
      is present in all tissues and provides the only known mechanism for the metabolic
      salvage of adenine resulting from the polyamine biosynthesis pathway or from
      dietary sources.
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: PubMed-verified; the crystallographic and kinetic study of the human
      enzyme that directly establishes the catalytic activity, AMP binding, and disease
      relevance. Abstract-only in cache but sufficient to anchor the core claims.
