- term:
    id: GO:0032263
    label: GMP salvage
  evidence_type: IEA
  original_reference_id: GO_REF:0000107
  qualifier: involved_in
  review:
    summary: Ensembl-Compara ortholog-transferred process annotation. APRT is specific
      for adenine and produces AMP; it does not act on guanine and has no role in GMP
      salvage (that is the function of HGPRT/HPRT1).
    action: REMOVE
    reason: Incorrect electronic (IEA) inference. The APRT reaction (adenine + PRPP
      -> AMP) does not generate or salvage GMP; GMP/guanine salvage is carried out
      by hypoxanthine-guanine phosphoribosyltransferase, a different enzyme. This appears
      to be an over-broad process transfer across the PRTase family and is biologically
      wrong for APRT.
    supported_by:
    - reference_id: file:human/APRT/APRT-uniprot.txt
      supporting_text: "PATHWAY: Purine metabolism; AMP biosynthesis via salvage pathway;
        AMP from adenine: step 1/1."
