- id: PMID:15534230
  title: 'Selenophosphate synthetase genes from lung adenocarcinoma cells: Sps1 for
    recycling L-selenocysteine and Sps2 for selenite assimilation.'
  findings:
  - statement: >-
      Human Sps2 (SEPHS2) was cloned from lung adenocarcinoma cells and shown to be a
      selenophosphate synthetase that makes monoselenophosphate from selenide and ATP,
      functionally complementing an E. coli selD mutant in a selenite assimilation role.
    supporting_text: >-
      A labile selenium donor compound monoselenophosphate is synthesized from
      selenide and ATP by selenophosphate synthetase ... the Sps2 enzyme can function
      with a selenite assimilation system
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Abstract-only cache (full_text_available: false). Primary functional
      characterization of human SEPHS2; source of the IMP and the EC=2.7.9.3 assignment.
      The in-frame Sec-encoding TGA was mutated to Cys (Sps2Cys) for expression, and
      that Cys form retained activity (UniProt MUTAGEN U60->C).
- id: PMID:28414460
  title: Analysis of Novel Interactions between Components of the Selenocysteine Biosynthesis
    Pathway, SEPHS1, SEPHS2, SEPSECS, and SECp43.
  findings:
  - statement: >-
      SEPHS2 forms oligomers with SEPHS1 and interacts with SEPSECS and SEPHS1 in
      mammalian cells (BRET, confirmed by co-immunoprecipitation); SEPHS2 localizes to
      the cytoplasm.
    supporting_text: >-
      selenophosphate synthetases SEPHS1 and SEPHS2 form oligomers in eukaryotic cells
      ... SEPHS2 interacts with SEPSECS and SEPHS1; these interactions were confirmed by
      co-immunoprecipitation
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Abstract-only cache. Source of the IDA cytoplasm annotation and of the
      SEPHS1/SEPHS2/SEPSECS/TRNAU1AP complex membership in UniProt SUBUNIT.
