- id: PMID:8986768
  title: 'Identification of a novel selD homolog from eukaryotes, bacteria, and archaea:
    is there an autoregulatory mechanism in selenocysteine metabolism?'
  findings:
  - statement: >-
      Original cloning of human/mouse Sps2 as a selD (selenophosphate synthetase) homolog;
      selenophosphate synthetase makes monoselenophosphate, the selenium donor for
      selenocysteine synthesis. SPS2 is itself a selenoenzyme (in-frame TGA read through;
      75Se incorporation), suggesting autoregulation of selenocysteine metabolism.
    supporting_text: >-
      the selenium donor compound required for synthesis of selenocysteine ... the
      incorporation of 75Se into SPS2 ... SPS2 is a selenoenzyme
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Full text available. Foundational identification of human SEPHS2/Sps2 and its
      selenoprotein/autoregulatory character; NAS support for MF and BP.
