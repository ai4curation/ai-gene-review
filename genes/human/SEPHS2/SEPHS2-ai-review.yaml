id: Q99611
gene_symbol: SEPHS2
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  SEPHS2 (selenophosphate synthetase 2, selenide/water dikinase 2, EC 2.7.9.3) is
  the catalytically active human enzyme that synthesizes the activated selenium
  donor for selenocysteine biosynthesis. It catalyzes the ATP- and Mg2+-dependent
  conversion of hydrogenselenide (selenide) plus water to monoselenophosphate,
  releasing AMP and phosphate. The monoselenophosphate product is the immediate
  selenium donor used by selenocysteine synthase (SEPSECS) to convert
  O-phosphoseryl-tRNA(Sec) to selenocysteyl-tRNA(Sec), thereby supplying
  selenocysteine for the whole selenoproteome. SEPHS2 is itself a selenoprotein: it
  carries a catalytic selenocysteine (encoded by an in-frame UGA read through via
  the Sec-insertion machinery), so its own synthesis depends on the pathway it
  supplies, an autoregulatory arrangement. The enzyme is a homodimer with an
  ATP-binding site shared between the dimeric partners, adopts a PurM-like fold, and
  acts in the cytosol. It associates with other components of the selenocysteine
  biosynthesis/incorporation machinery, including its paralog SEPHS1, the
  selenocysteine synthase SEPSECS, and TRNAU1AP/SECp43.
