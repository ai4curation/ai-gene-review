id: P52951
gene_symbol: GBX2
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  GBX2 is a nuclear homeobox transcription factor that binds sequence-specific
  cis-regulatory DNA and regulates RNA polymerase II transcription. Direct human-cell
  experiments show GBX2 occupancy and binding at target regulatory regions, nuclear
  localization, and transcriptional activation through an EEF1A1 promoter element;
  developmental studies also support context-dependent transcriptional repression.
  During vertebrate embryogenesis, spatially restricted Gbx2 activity specifies anterior
  hindbrain identity by opposing Otx2, positions and maintains the midbrain-hindbrain
  isthmic organizer, and supports patterning of rhombomere 1-derived cerebellar territory
  and other nervous-system structures. Human GBX2 transcript is detected in the developing
  CNS, while the causal developmental assignments derive primarily from conserved
  model-organism loss- and gain-of-function studies.
