core_functions:
- description: >-
    GBX2 acts in the nucleus and on chromatin as a homeodomain sequence-specific DNA-binding
    transcription factor. It binds RNA polymerase II cis-regulatory regions and regulates
    target transcription, producing activation or repression according to promoter context
    and cofactors. This molecular activity underlies its conserved roles in anterior-hindbrain
    identity, isthmic-organizer positioning and maintenance, and cerebellar territory patterning.
  molecular_function:
    id: GO:0000981
    label: DNA-binding transcription factor activity, RNA polymerase II-specific
  directly_involved_in:
  - id: GO:0006357
    label: regulation of transcription by RNA polymerase II
  locations:
  - id: GO:0005634
    label: nucleus
  - id: GO:0000785
    label: chromatin
  supported_by:
  - reference_id: PMID:23144817
    supporting_text: >-
      We show through gel shift analyses that sequences within the promoter or introns of
      EEF1A1, ROBO1, PCDH15, USH2A and NOTCH2, are directly bound by GBX2.
  - reference_id: PMID:23144817
    supporting_text: >-
      Furthermore, we show that GBX2 activates transcriptional activity through the promoter
      of EEF1A1
  - reference_id: PMID:10490024
    supporting_text: >-
      We propose that formation of a normal MHB organizer depends on a sharp Otx2 caudal
      border and that Gbx2 is required to position and sharpen this border.
proposed_new_terms: []
suggested_questions:
- question: >-
    Which cofactors and regulatory-element features switch GBX2 between transcriptional
    activation and repression in human neural progenitors?
  experts: []
- question: >-
    Which human GBX2-bound targets directly implement anterior-hindbrain identity and
    isthmic-organizer maintenance, and which model-organism targets are conserved in human cells?
  experts: []
suggested_experiments:
- experiment_type: Human neural-patterning perturbation with multi-omic profiling
  hypothesis: >-
    GBX2 directly establishes anterior-hindbrain transcriptional identity and organizer-adjacent
    signaling programs in human neural progenitors.
  description: >-
    Generate inducible GBX2 knockout and rescue lines in human pluripotent-stem-cell-derived
    midbrain-hindbrain boundary or cerebellar organoid models. Combine time-resolved single-cell
    RNA-seq with GBX2 CUT&RUN to distinguish direct transcriptional targets from secondary
    patterning effects and test effects on OTX2, FGF8, WNT1, and lineage-boundary programs.
- experiment_type: Cofactor-dependent promoter and enhancer assay
  hypothesis: >-
    GBX2 target directionality is determined by regulatory sequence and recruitment of
    activating versus TLE/Groucho-family repressive cofactors.
  description: >-
    Test wild-type and homeodomain- or EH1-motif-mutant GBX2 across endogenous target enhancers
    using reporter assays, cofactor perturbations, occupancy measurements, and nascent-transcription
    readouts in matched neural progenitors.
