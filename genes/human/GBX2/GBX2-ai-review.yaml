- id: PMID:10490024
  title: A role for Gbx2 in repression of Otx2 and positioning the mid/hindbrain organizer.
  findings:
  - statement: Mouse loss- and gain-of-function experiments establish that Gbx2 positions
      and sharpens the Otx2 boundary at the midbrain-hindbrain organizer.
    supporting_text: >-
      We propose that formation of a normal MHB organizer depends on a sharp Otx2 caudal
      border and that Gbx2 is required to position and sharpen this border.
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: PubMed-verified primary mouse genetic study; its abstract directly supports
      organizer positioning and Otx2-boundary claims.
- id: PMID:12367504
  title: Changing requirements for Gbx2 in development of the cerebellum and maintenance
    of the mid/hindbrain organizer.
  findings:
  - statement: Conditional loss after embryonic day 9 separates an early requirement for
      cerebellar territory from a continuing requirement for organizer maintenance.
    supporting_text: >-
      In contrast to Gbx2 null mutants, mice lacking Gbx2 in rhombomere 1 (r1) after E9
      (Gbx2-CKO) are viable and develop a cerebellum.
  - statement: Midbrain-hindbrain organizer gene expression remains dependent on Gbx2
      after the conditional deletion time point.
    supporting_text: >-
      Mid/hindbrain organizer gene expression, however, continues to be dependent on Gbx2.
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: PubMed-verified primary conditional-knockout study; the cached abstract
      directly supports the cerebellar and organizer claims used here.
- id: PMID:21266408
  title: Gbx2 and Fgf8 are sequentially required for formation of the midbrain-hindbrain
    compartment boundary.
  findings:
  - statement: Fate mapping and genetic loss show that Gbx2 specifies hindbrain identity
      and establishes lineage separation at the midbrain-hindbrain boundary.
    supporting_text: >-
      Without Gbx2, hindbrain-born cells abnormally populate the entire midbrain,
      demonstrating that Gbx2 is essential for specifying hindbrain fate.
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: PubMed-verified primary mouse fate-mapping and genetic study; the cached
      abstract directly supports the hindbrain-fate claim.
- id: PMID:23144817
  title: Elongation factor 1 alpha1 and genes associated with Usher syndromes are downstream
    targets of GBX2.
  findings:
  - statement: GBX2 directly binds cis-regulatory sequences at multiple target genes.
    supporting_text: >-
      We show through gel shift analyses that sequences within the promoter or introns of
      EEF1A1, ROBO1, PCDH15, USH2A and NOTCH2, are directly bound by GBX2.
  - statement: GBX2 can activate transcription through the EEF1A1 promoter.
    supporting_text: >-
      Furthermore, we show that GBX2 activates transcriptional activity through the promoter
      of EEF1A1
  - statement: Expressed GBX2 fusion protein localizes to nuclei in human cells.
    supporting_text: Merge displays nuclear localization of GFP-GBX2 fusion proteins.
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: Full text is locally available and directly supports GBX2 DNA binding,
      chromatin occupancy, nuclear localization, and promoter activation.
- id: PMID:28473536
  title: Impact of cytosine methylation on DNA binding specificities of human transcription
    factors.
  findings:
  - statement: The study systematically measured DNA-binding specificity for hundreds of
      human transcription factors, including the GBX2 GOA IDA record.
    supporting_text: >-
      By analysis of 542 human TFs with methylation-sensitive SELEX (systematic evolution
      of ligands by exponential enrichment)
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: The identifier, assay scope, and official GBX2 IDA GOA row are verified;
      GBX2-specific measurements reside in supplementary data rather than searchable main text.
- id: PMID:28785208
  title: The Temporal Contribution of the Gbx2 Lineage to Cerebellar Neurons.
  findings:
  - statement: Temporally marked Gbx2-expressing precursors contribute to several major
      cerebellar neuronal classes.
    supporting_text: >-
      The Gbx2 lineage gives rise to Purkinje cells, granule neurons, and deep cerebellar
      neurons across these marking stages.
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: Full text is locally available; lineage tracing supports cerebellar
      developmental context but does not alone establish a cell-autonomous molecular mechanism.
- id: PMID:8838315
  title: Characterization and sequence analysis of the human homeobox-containing gene
    GBX2.
  findings:
  - statement: The human GBX2 homeodomain is identical to mouse Gbx2 and GBX2 transcript
      is detected in the developing human CNS.
    supporting_text: >-
      A single 2.2-kb transcript was detected by Northern analysis in the developing human
      CNS as well as in other tissues.
  reference_review:
    relevance: MEDIUM
    correctness: UNVERIFIED
    review_notes: The PMID and human GBX2 expression result are verified from the abstract,
      but full text is unavailable and the abstract does not establish a causal role in
      nervous-system development.
- id: PMID:9346236
  title: The homeobox gene GBX2, a target of the myb oncogene, mediates autocrine
    growth and monocyte differentiation.
  findings:
  - statement: Ectopic GBX2 expression changes differentiation and growth-factor dependence
      in myeloblasts.
    supporting_text: >-
      Ectopic expression of GBX2 in growth factor-dependent myeloblasts induces monocytic
      features and independence from exogenous cytokines
  reference_review:
    relevance: MEDIUM
    correctness: UNVERIFIED
    review_notes: The PMID and abstract are verified, but the full text needed to inspect
      the older TAS transcription-factor assignment is unavailable locally.
