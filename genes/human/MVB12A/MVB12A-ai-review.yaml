id: Q96EY5
gene_symbol: MVB12A
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: MVB12A is a metazoan ESCRT-I fourth subunit that complexes with TSG101, VPS28, and VPS37-family subunits. Its
  best-supported core cellular role is ESCRT-I-dependent sorting of ubiquitinated endosomal cargo into multivesicular bodies,
  supported by acidic phospholipid/ubiquitin binding, EGFR down-regulation context, and MVB12A-containing ESCRT-I structural
  evidence. Viral budding and virus maturation are direct ESCRT contexts but are non-core for this proteostasis review.
