suggested_questions:
- question: Should MVB12A macroautophagy annotations be retired, modified to ESCRT-I membrane fission, or kept non-core pending
    MVB12A-specific phagophore-closure perturbation evidence?
  experts:
  - GO autophagy editors
  - GO ESCRT curators
- question: Should MVB12A generic protein-binding annotations be replaced by ESCRT-I complex membership, SH3 domain binding,
    phospholipid binding, and ubiquitin binding where the evidence supports those more specific terms?
  experts:
  - GO molecular function editors
  - UniProt curators
suggested_experiments:
- experiment_type: MVB12A-specific phagophore closure assay
  hypothesis: MVB12A-containing ESCRT-I assemblies contribute to ESCRT-I scaffold mechanics, but MVB12A-specific loss has
    not been shown to be required for phagophore closure.
  description: Use MVB12A knockout/rescue in HT-LC3 autophagosome closure assays, with VPS37A and VPS28 helical-interface
    perturbations as controls, and compare effects on EGFR MVB sorting.
- experiment_type: MVB12A molecular-function refinement
  hypothesis: MVB12A membrane and cargo recognition is better represented by phospholipid binding, ubiquitin binding, and
    SH3-domain-binding contexts than generic protein binding.
  description: Test purified MVB12A domains for acidic phospholipid binding, ubiquitin binding, and CD2AP/CIN85 SH3-domain
    binding using matched mutants and rescue readouts in EGFR down-regulation assays.
