id: Q8NI60
gene_symbol: COQ8A
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  COQ8A (also known as ADCK3, CABC1, COQ8) is a mitochondrial member of the ancient UbiB
  family of atypical protein-kinase-like (PKL) enzymes, and is one of two human co-orthologs
  (with COQ8B/ADCK4) of yeast Coq8p. It is required for the biosynthesis of coenzyme Q
  (ubiquinone/CoQ10), a lipid-soluble electron carrier of the respiratory chain and a
  membrane antioxidant. The 647-residue precursor is imported into mitochondria (an
  N-terminal transit peptide of ~162 residues is removed) and anchors to the inner
  mitochondrial membrane as a single-pass membrane protein, with its catalytic domain facing
  the matrix, where CoQ is produced. Although COQ8A adopts a protein-kinase-like fold, several
  UbiB-specific features suppress canonical protein-kinase activity: an N-terminal KxGQ domain
  occludes the substrate-binding cleft, and an alanine-rich (AAAS) loop replaces the canonical
  glycine-rich nucleotide-binding loop, conferring an unusual selectivity for binding ADP over
  ATP. Biochemically, the protein binds and hydrolyzes ATP (ATPase activity that is enhanced by
  the KxGQ motif and by coenzyme-Q head-group intermediates and cardiolipin), and it interacts
  with lipid CoQ intermediates, rather than exhibiting canonical protein-kinase phosphotransfer
  in trans. Functionally, COQ8A stabilizes and helps assemble the multi-subunit CoQ biosynthetic
  complex (the "COQ synthome"/complex Q; COQ3-COQ7, COQ9), thereby streamlining CoQ production.
  Biallelic loss-of-function variants cause primary coenzyme Q10 deficiency-4 (COQ10D4),
  presenting as autosomal-recessive cerebellar ataxia (ARCA2/SCAR9) with cerebellar atrophy,
  exercise intolerance, and variable seizures.
