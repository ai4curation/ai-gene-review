- description: >-
    ATP hydrolysis (ATPase) activity: rather than canonical protein-kinase phosphotransfer, the
    demonstrated catalytic activity of COQ8/COQ8A is ATP hydrolysis (a small-molecule "water
    kinase" activity) that is enhanced by the UbiB-specific KxGQ motif and by coenzyme-Q head-group
    intermediates. Mutations that abolish this activity eliminate CoQ production in vivo, linking
    the ATPase to the endogenous function; canonical protein-kinase activity in trans is not
    exhibited.
