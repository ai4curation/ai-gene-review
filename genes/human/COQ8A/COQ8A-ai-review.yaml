core_functions:
- description: >-
    ATP-binding activity: COQ8A binds adenine nucleotides via its atypical protein-kinase-like
    fold, with an unusual selectivity for ADP over ATP conferred by the alanine-rich (AAAS)
    nucleotide-binding loop. This nucleotide binding is required to relieve autoinhibition and is
    essential for the protein's role in coenzyme Q biosynthesis.
