proposed_new_terms:
- proposed_name: coenzyme Q biosynthetic complex (COQ synthome)
  proposed_definition: >-
    A protein-containing complex, located at the matrix face of the mitochondrial inner membrane,
    that carries out head-group modification steps of ubiquinone (coenzyme Q) biosynthesis. In
    humans it comprises COQ3, COQ4, COQ5, COQ6, COQ7 and COQ9, and is stabilized by the atypical
    UbiB-family kinase COQ8A (and its paralog COQ8B).
  justification: >-
    COQ8A's core cellular role is membership in and stabilization of this complex ("complex Q"),
    but there is no specific protein-complex GO term to record it; only the generic GO:0032991
    protein-containing complex is currently available for the in_complex slot.
suggested_questions:
- question: >-
    What is the physiological small-molecule substrate of COQ8A's ATPase / atypical kinase activity
    in vivo - is it truly a "water kinase" (ATPase), a lipid/prenyl-quinone kinase, or does ATP
    hydrolysis primarily power conformational cycling that assembles complex Q?
- question: >-
    Does COQ8A phosphorylate any endogenous target (protein or lipid) under native conditions, given
    that canonical protein-kinase activity in trans is absent and autophosphorylation is only seen
    with engineered A-rich-loop mutants?
suggested_experiments:
- description: >-
    Reconstitute human complex Q with recombinant COQ8A (not only ancestral/COQ8B) and measure
    CoQ-intermediate-stimulated ATPase activity and its dependence on the KxGQ motif and cardiolipin.
- description: >-
    Use activity-based or metabolomic profiling in COQ8A-null cells rescued with catalytically dead
    (D507N) vs KxGQ-mutant vs wild-type COQ8A to distinguish the roles of nucleotide binding,
    ATP hydrolysis, and complex-Q stabilization in CoQ production.
