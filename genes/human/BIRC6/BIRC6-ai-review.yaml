  - term:
      id: GO:0005515
      label: protein binding
    evidence_type: IPI
    original_reference_id: PMID:33961781
    review:
      summary: >-
        High-throughput interactome study. 'Protein binding' is uninformative.
      action: REMOVE
      reason: >-
        The term 'protein binding' (GO:0005515) is uninformative. These high-throughput
