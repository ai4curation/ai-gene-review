id: O15269
gene_symbol: SPTLC1
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  SPTLC1 (serine palmitoyltransferase long chain base subunit 1; LCB1) is a
  membrane subunit of the serine palmitoyltransferase (SPT) holoenzyme, which
  catalyzes the first, committed and rate-limiting step of de novo sphingolipid
  biosynthesis, namely the pyridoxal-5'-phosphate (PLP)-dependent condensation of
  L-serine with palmitoyl-CoA to form 3-ketodihydrosphingosine (3-oxosphinganine),
  releasing CO2 and CoA (EC 2.3.1.50). SPTLC1 is a single-pass endoplasmic reticulum
  membrane protein whose catalytic domain faces the cytoplasm. The catalytic core is
  a heterodimer of SPTLC1 with SPTLC2 (or SPTLC3) that assembles as a dimer of
  heterodimers; SPTLC1 forms part of the active-site environment, while the
  PLP-binding catalytic lysine resides on SPTLC2. Small subunits SPTSSA/SPTSSB confer
  full activity and tune acyl-CoA substrate specificity, and ORMDL proteins (notably
  ORMDL3) negatively regulate the complex in a ceramide-dependent manner to maintain
  sphingolipid homeostasis. Dominant SPTLC1 missense variants cause hereditary
  sensory and autonomic neuropathy type 1 (HSAN1A) by shifting the enzyme toward
  alanine/glycine to produce toxic 1-deoxysphingolipids, while other variants that
  escape ORMDL-mediated inhibition cause juvenile amyotrophic lateral sclerosis
  (ALS27) through excess canonical sphingolipid synthesis.
