description: AGPAT2 (1-acylglycerol-3-phosphate O-acyltransferase 2; also LPAAT-beta,
  1-AGPAT 2) is an endoplasmic-reticulum multi-pass membrane enzyme that catalyzes
  the second committed step of the glycerol-phosphate pathway of glycerolipid biosynthesis.
  It acylates the sn-2 position of 1-acyl-sn-glycerol-3-phosphate (lysophosphatidic
  acid, LPA) using a long-chain acyl-CoA to produce 1,2-diacyl-sn-glycerol-3-phosphate
  (phosphatidic acid, PA) plus CoA (EC 2.3.1.51). Phosphatidic acid is the central
  branch-point intermediate feeding synthesis of CDP-diacylglycerol and glycerophospholipids
  as well as diacylglycerol and triacylglycerol. AGPAT2 is the predominant LPAAT isoform
  of adipose tissue and is also expressed in pancreas and liver. Biallelic loss-of-function
  mutations in AGPAT2 cause congenital generalized lipodystrophy type 1 (Berardinelli-Seip
  syndrome), characterized by near-complete absence of adipose tissue, extreme insulin
  resistance, hypertriglyceridemia, hepatic steatosis, and early-onset diabetes.
