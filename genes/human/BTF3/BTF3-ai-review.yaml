id: P20290
gene_symbol: BTF3
product_type: PROTEIN
aliases:
- NACB
status: DRAFT
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: BTF3 encodes the beta subunit of the nascent polypeptide-associated
  complex (NAC), a conserved ribosome-associated factor that helps sort emerging
  nascent chains and prevents inappropriate SRP-dependent delivery of
  non-secretory proteins to the ER. Human BTF3 is also reported in the nucleus
  and retains legacy transcription-factor literature, but the PN-supported core
  role is cytoplasmic cotranslational nascent-peptide handling rather than a
  broad transcriptional regulator assignment.
