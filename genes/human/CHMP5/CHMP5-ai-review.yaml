- id: file:human/CHMP5/CHMP5-notes.md
  title: Local curation notes for CHMP5
  findings:
  - statement: Local synthesis identifies CHMP5-LIP5/VTA1-VPS4 regulation of ESCRT-III recycling plus MVB sorting as core,
      with viral, nuclear-envelope, cytokinesis, repair, NOD2, and infection/autophagy contexts treated as secondary or over-annotated
      where appropriate.
core_functions:
- description: CHMP5 is an ESCRT-III-associated regulatory component for endosomal multivesicular body sorting and ESCRT-III
    recycling. Through a high-affinity CHMP5-LIP5/VTA1 interaction, CHMP5 helps assemble or tune LIP5/VPS4 activity on ESCRT-III
    substrates, supporting MVB cargo sorting, ESCRT-III complex disassembly, and downstream lysosomal degradation of ubiquitinated/endocytosed
    cargo relevant to proteostasis.
