- term:
    id: GO:0039702
    label: viral budding via host ESCRT complex
  evidence_type: IEA
  original_reference_id: GO_REF:0000117
  qualifier: involved_in
  review:
    summary: 'Viral budding is not a core CHMP5 cellular function and is likely over-annotated here: viral budding via host
      ESCRT complex.'
    action: MARK_AS_OVER_ANNOTATED
    reason: The key CHMP5/LIP5 study found CHMP5 depletion increased infectious HIV-1 release and concluded that only LIP5
      is required for HIV release, so viral-budding annotations should not be treated as CHMP5 core function.
    supported_by:
    - reference_id: PMID:15644320
      supporting_text: CHMP5 depletion results in an increase in the release of infectious HIV-1 particles
    - reference_id: PMID:15644320
      supporting_text: both LIP5 and CHMP5 function in MVB sorting, whereas only LIP5 is required for HIV release.
    - reference_id: file:human/CHMP5/CHMP5-notes.md
      supporting_text: 'Over-annotated: generic protein binding, cadherin binding, viral budding as a CHMP5 function, and
        LPS/MDP response terms inferred from induction or interaction context rather than a demonstrated CHMP5 response function.'
