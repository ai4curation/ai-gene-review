suggested_questions:
- question: Can endogenous CHMP5 depletion/rescue separate its direct LIP5/VTA1-VPS4 regulatory role from pathway-level ESCRT-III
    membrane-fission annotations?
- question: Which CHMP5-specific autophagy annotations are supported by direct autophagosome closure or maturation assays
    rather than by ESCRT complex membership?
- question: Should viral-budding annotations for CHMP5 be replaced by a regulatory or non-core context, given evidence that
    CHMP5 depletion increases HIV-1 release while LIP5 is required?
suggested_experiments:
- description: Perform acute endogenous CHMP5 depletion and rescue with wild-type, LIP5-binding-defective, and ESCRT-tail
    mutant CHMP5 while measuring EGFR degradation, MVB ILV cargo sorting, and VPS4 recruitment/disassembly dynamics.
  hypothesis: CHMP5 rescue of MVB cargo degradation will require its LIP5/VTA1 interaction and will primarily affect VPS4-mediated
    ESCRT-III recycling rather than initial cargo recognition.
- description: Test CHMP5 recruitment and requirement in starvation autophagy, mitophagy, and xenophagy assays using direct
    reporters for unsealed autophagosomes and autolysosome formation.
  hypothesis: CHMP5 will contribute to autophagic clearance through endolysosomal/MVB function and pathogen-specific xenophagy
    contexts, but may not be a general autophagosome sealing effector.
- description: Compare CHMP5 and LIP5 knockdown/rescue in HIV-1 budding assays while quantifying MVB cargo degradation in
    parallel.
  hypothesis: CHMP5 perturbation will distinguish MVB sorting from viral release, supporting curation of viral budding as
    non-core or over-annotated for CHMP5.
