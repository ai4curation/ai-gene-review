id: Q9NZZ3
gene_symbol: CHMP5
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  CHMP5 encodes a SNF7-family ESCRT-III-associated regulatory protein that links LIP5/VTA1 to
  VPS4-dependent ESCRT-III recycling during endosomal multivesicular body sorting. CHMP5 is primarily
  cytosolic but functions at endosomal ESCRT assemblies, where CHMP5-LIP5/VTA1 interactions help tune
  VPS4 activation/disassembly and support MVB cargo sorting and lysosomal degradation of membrane
  proteins such as EGFR. Broader ESCRT contexts including cytokinesis, nuclear-envelope sealing,
  plasma membrane repair, viral budding, and autophagy are biologically plausible but secondary;
  infection-specific evidence supports CHMP5 involvement in anti-Shigella autophagy rather than a
  general CHMP5-specific autophagosome maturation mechanism.
