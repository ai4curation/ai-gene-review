    label: protein binding
  evidence_type: IPI
  original_reference_id: PMID:21543490
  qualifier: enables
  review:
    summary: Generic protein binding does not capture the specific CHMP5/LIP5/VPS4-ESCRT regulatory mechanism.
    action: MARK_AS_OVER_ANNOTATED
    reason: The interactions with LIP5/VTA1 and other ESCRT-associated proteins are biologically meaningful, but the GO term
      protein binding is too generic to capture CHMP5 function.
    supported_by:
    - reference_id: PMID:15644320
      supporting_text: We identify CHMP5 as a LIP5-binding protein and show that CHMP5 is primarily cytosolic.
    - reference_id: PMID:18385515
      supporting_text: LIP5 binds preferentially to soluble CHMP5
    - reference_id: PMID:23105106
      supporting_text: the second LIP5 MIT module binds with unusually high affinity to a novel MIM element within the ESCRT-III
        protein CHMP5
    - reference_id: file:human/CHMP5/CHMP5-notes.md
      supporting_text: 'Over-annotated: generic protein binding, cadherin binding, viral budding as a CHMP5 function, and
        LPS/MDP response terms inferred from induction or interaction context rather than a demonstrated CHMP5 response function.'
