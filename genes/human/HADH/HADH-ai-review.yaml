- id: PMID:10231530
  title: Biochemical characterization and crystal structure determination of human
    heart short chain L-3-hydroxyacyl-CoA dehydrogenase provide insights into catalytic
    mechanism.
  findings:
  - statement: >-
      Human heart SCHAD catalyzes NAD+-dependent oxidation of L-3-hydroxyacyl-CoA to a 3-keto
      product as part of beta-oxidation; the enzyme is a homodimer and was characterized
      biochemically and crystallographically with NAD+/substrate.
    supporting_text: "catalyzes the oxidation of the hydroxyl group of L-3-hydroxyacyl-CoA to a keto group, concomitant with the reduction of NAD+ to NADH"
  - statement: >-
      Catalytic mechanism: His158 acts as a general base abstracting the 3-OH proton, assisted by
      Glu170.
    supporting_text: "His 158 serves as a general base, abstracting a proton from the 3-OH group of the substrate"
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified primary biochemistry/structure paper establishing the human SCHAD core
      catalytic activity, homodimer, and mechanism. Abstract-only in cache.
- id: PMID:10840044
  title: Sequestration of the active site by interdomain shifting. Crystallographic
    and spectroscopic evidence for distinct conformations of L-3-hydroxyacyl-CoA dehydrogenase.
  findings:
  - statement: >-
      Crystal structures of apo-, cofactor-, and substrate-bound forms reveal NAD+-binding domain
      shifting relative to the C-terminal domain; supports NAD+ binding and catalytic mechanism.
    supporting_text: "significant shifting of the NAD(+)-binding domain relative to the C-terminal domain occurs in the ternary and substrate-bound complexes"
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified structural follow-up supporting NAD+ binding and the catalytic conformational
      cycle. Abstract-only in cache.
- id: PMID:11489939
  title: Hyperinsulinism in short-chain L-3-hydroxyacyl-CoA dehydrogenase deficiency
    reveals the importance of beta-oxidation in insulin secretion.
  findings:
  - statement: >-
      First report linking a fatty-acid-oxidation defect (SCHAD/HADH deficiency, P258L) to
      hyperinsulinism, establishing HADH's role in insulin-secretion regulation.
    supporting_text: "This is the first defect in fatty acid beta-oxidation that has been associated with hyperinsulinism"
  - statement: >-
      The disease-causing P258L variant abolishes catalytic activity, directly tying HADH to the
      3-hydroxyacyl-CoA dehydrogenase reaction.
    supporting_text: "Expression studies showed that the P258L enzyme had no catalytic activity"
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified case report establishing the HADH-hyperinsulinism link and confirming loss of
      catalytic activity in a pathogenic variant. Abstract-only in cache.
- id: PMID:16725361
  title: Reye-like syndrome resulting from novel missense mutations in mitochondrial
    medium- and short-chain l-3-hydroxy-acyl-CoA dehydrogenase.
  findings:
  - statement: >-
      Kinetic analysis of patient-derived M/SCHAD mutants (D45G altered NADH Km; Y214H no activity)
      confirms the human enzyme's 3-hydroxyacyl-CoA dehydrogenase activity and broadens the
      phenotype; supports a role in insulin regulation.
    supporting_text: "This association suggests that there is a role for M/SCHAD in regulating the pancreatic secretion of insulin"
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified case report with mutant enzymology supporting the core activity and the
      insulin-regulation role. Abstract-only in cache.
- id: PMID:20670938
  title: Mechanism of hyperinsulinism in short-chain 3-hydroxyacyl-CoA dehydrogenase
    deficiency involves activation of glutamate dehydrogenase.
  findings:
  - statement: >-
      Definitive mechanistic paper: pull-down experiments demonstrate a direct protein-protein
      interaction between SCHAD (HADH) and glutamate dehydrogenase (GDH), and show that SCHAD
      deficiency activates GDH by removing this inhibitory interaction, dysregulating
      amino-acid-stimulated insulin secretion. Establishes the GLUD1-inhibitor moonlighting
      function on firmer footing than the earlier speculative reports.
    supporting_text: "reflecting the loss of an inhibitory protein-protein interaction of SCHAD upon GDH"
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified, full text available; provides the definitive protein-protein interaction and
      loss-of-inhibition evidence for the HADH/GLUD1 regulatory function.
- id: PMID:21990309
  title: Role of medium- and short-chain L-3-hydroxyacyl-CoA dehydrogenase in the
    regulation of body weight and thermogenesis.
  findings:
  - statement: >-
      Hadh-knockout mice show low glucose and elevated insulin, and isolated islets hypersecrete
      insulin in response to glucose and palmitate, supporting HADH's negative regulation of
      insulin secretion.
    supporting_text: "insulin secretion in response to glucose and glucose plus palmitate was elevated in isolated islets of knockout mice"
  - statement: >-
      Hadh knockout impairs adaptive thermogenesis and body-weight regulation under high-fat/cold
      conditions.
    supporting_text: "SCHAD plays an important role in adaptive thermogenesis"
  - statement: >-
      SCHAD/HADH is highly expressed in pancreatic islets of Langerhans, consistent with a direct
      role in beta-cell function.
    supporting_text: "in the islets of Langerhans within the pancreas"
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified mouse knockout study (full text available) supporting insulin-secretion
      regulation, thermogenesis, and islet expression.
- id: PMID:34800366
  title: Quantitative high-confidence human mitochondrial proteome and its dynamics
    in cellular context.
  findings:
  - statement: >-
      HADH is identified in a high-confidence quantitative human mitochondrial proteome,
      corroborating its mitochondrial localization.
    supporting_text: "Quantitative high-confidence human mitochondrial proteome and its dynamics"
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: >-
      High-throughput mitochondrial proteomics providing orthogonal support for mitochondrial
      localization.
- id: PMID:8687463
  title: 'Human short-chain L-3-hydroxyacyl-CoA dehydrogenase: cloning and characterization
    of the coding sequence.'
  findings:
  - statement: >-
      Original cloning of human SCHAD cDNA; encodes a 314-aa protein with a 12-residue
      mitochondrial import peptide; expressed in liver, kidney, pancreas, heart and skeletal
      muscle.
    supporting_text: "Northern blot analysis reveals SCHAD mRNA to be expressed in liver, kidney, pancreas, heart and skeletal muscle"
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified original characterization establishing identity, mitochondrial targeting, and
      tissue expression. Abstract-only in cache.
