- description: >-
    Secondary (moonlighting) regulatory function: in pancreatic beta-cells HADH binds and
    inhibits the activation of glutamate dehydrogenase 1 (GLUD1), thereby restraining
    amino-acid-stimulated insulin secretion. Loss of HADH de-represses GLUD1 and causes
    inappropriate insulin oversecretion (hyperinsulinaemic hypoglycaemia), a phenotype
    reproduced in Hadh knockout mice and partly independent of beta-oxidation flux. The
    underlying molecular activity is enzyme (GLUD1) inhibitor activity; the physiological
    output is negative regulation of insulin secretion.
