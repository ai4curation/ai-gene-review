proposed_new_terms: []
suggested_questions:
- question: >-
    To what extent is HADH's regulation of insulin secretion mediated by direct GLUD1 inhibition
    versus by perturbation of short-chain acyl-CoA/3-hydroxyacyl-CoA pools from impaired
    beta-oxidation, and are these mechanisms separable in human beta-cells?
- question: >-
    Is the HADH-GLUD1 inhibitory interaction conserved and direct in human tissue (as opposed to
    the By-similarity/mouse-based evidence currently underpinning it), and what is its
    stoichiometry and regulation?
suggested_experiments:
- description: >-
    Reconstitute purified human HADH with human GLUD1 in vitro and measure GLUD1 activity +/-
    HADH (and +/- HADH catalytic-dead mutants) to determine whether enzyme-inhibitor activity is
    independent of HADH's own catalysis.
- description: >-
    Generate beta-cell models expressing a catalytically dead but folding-competent HADH variant
    versus full knockout to dissociate the dehydrogenase activity from the GLUD1-inhibition /
    insulin-secretion-restraint function.
- description: >-
    Perform substrate-profiling (chain-length kinetics) on purified human HADH across C4-C16
    3-hydroxyacyl-CoAs to quantitatively confirm short/medium-chain preference and the negligible
    long-chain activity relative to HADHA.
