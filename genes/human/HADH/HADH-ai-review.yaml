id: Q16836
gene_symbol: HADH
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  HADH (Hydroxyacyl-coenzyme A dehydrogenase, mitochondrial; also known as SCHAD, HAD1,
  M/SCHAD) is a soluble mitochondrial matrix enzyme that catalyzes the third step of the
  fatty-acid beta-oxidation spiral: the NAD+-dependent oxidation of L-(3S)-3-hydroxyacyl-CoA
  to 3-ketoacyl-CoA (EC 1.1.1.35). It acts as a homodimer and preferentially oxidizes short-
  and medium-chain 3-hydroxyacyl-CoA substrates (roughly C4-C10), functionally distinct from
  the long-chain, membrane-associated mitochondrial trifunctional protein alpha subunit (HADHA).
  Catalysis uses His158 as a general base assisted by Glu170. Beyond its catalytic role, HADH
  has a well-documented regulatory (moonlighting) function in pancreatic beta-cells: it binds
  and inhibits the activation of glutamate dehydrogenase 1 (GLUD1), thereby restraining
  amino-acid-stimulated insulin secretion. Loss of HADH function causes hyperinsulinaemic
  hypoglycaemia and a fatty-acid-oxidation disorder, establishing the first known link between
  beta-oxidation and dysregulated insulin secretion. HADH is expressed in liver, kidney,
  pancreatic islets, heart, skeletal muscle, and adipose tissue, and in rodents contributes to
  body-weight regulation and adaptive thermogenesis.
