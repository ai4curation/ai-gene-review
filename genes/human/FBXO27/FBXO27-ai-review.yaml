suggested_questions:
- question: What are the physiological glycoprotein substrates of FBXO27 in vivo, and do they include N-glycosylated proteins exposed on the cytosolic surface of damaged lysosomes?
- question: Given that FBXO27 bound high-mannose glycans only weakly on glycan arrays, what determines its in-cell glycan/substrate selectivity relative to its paralogs FBXO2 and FBXO6?
- question: Does FBXO27 contribute to a distinct branch of glycoprotein quality control (e.g. lysophagy-associated clearance) separate from the ER-associated GERAD pathway favored by FBXO2/FBXO6?
suggested_experiments:
- description: Perform glycoproteomic substrate-trapping (e.g. expressing the FBXO27 Phe262-Trp263 glycan-binding mutant or a dominant-negative SCF receptor) combined with affinity purification and mass spectrometry to identify endogenous N-glycosylated substrates ubiquitinated in an FBXO27-dependent manner.
- description: Reconstitute SCF-FBXO27 (SKP1-CUL1-RBX1-FBXO27) in vitro with E1, an E2, and ubiquitin, and test ubiquitination of defined high-mannose glycoproteins versus deglycosylated controls to confirm glycan-dependent substrate selection and that catalysis requires the RBX1 RING subunit.
- description: Induce lysosomal membrane damage (e.g. with LLOMe) in FBXO27-knockout versus wild-type cells and quantify recruitment of FBXO27 and ubiquitination of glycoproteins exposed on damaged lysosomes to test a role in damaged-lysosome glycoprotein recognition.
