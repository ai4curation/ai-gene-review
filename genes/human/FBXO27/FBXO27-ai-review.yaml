  findings:
  - statement: FBXO27 is a member of the FBA/FBG lectin family of F-box proteins; it binds glycoproteins via a conserved hydrophobic pocket in the FBA/G domain (the aromatic residues at 262-263 in FBXO27), assembles with SKP1, Cullin1 and RBX1 into the canonical SCF E3 ubiquitin ligase complex, and as an F-box protein has no intrinsic catalytic activity.
    reference_section_type: RESULTS
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Full text available (PMC2442310). Foundational characterization of FBXO27 as an
      FBA-family lectin SCF substrate receptor; source of the sugar-binding/FUNCTION,
      SKP1/CUL1 interaction, SCF-complex (IDA) and G-domain mutagenesis (262-263)
      annotations. Note FBXO27 showed only modest high-mannose glycoprotein binding by
      co-IP and little binding on the glycan array, so its precise glycan substrate set
      is less well-defined than that of FBXO2/FBXO6.
