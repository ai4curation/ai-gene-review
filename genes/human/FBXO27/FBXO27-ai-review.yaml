    label: ERAD pathway
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: involved_in
  review:
    summary: Phylogenetic (PAN-GO) assignment of involvement in ERAD, propagated across the FBA/FBG lectin F-box family from members such as FBXO2/FBXO6 that recognize high-mannose glycans on retrotranslocated ER glycoproteins.
    action: KEEP_AS_NON_CORE
    reason: FBXO27 is a glycoprotein-recognition SCF substrate receptor, and ERAD/GERAD is a plausible context for the family; however the original characterization of FBXO27 itself found only modest high-mannose glycoprotein binding and did not demonstrate a direct ERAD role, so this is best retained as a non-core, family-level process annotation rather than the core function. The broader glycoprotein catabolic process better captures FBXO27's role.
    supported_by:
    - reference_id: PMID:18203720
      supporting_text: Our results lead us to conclude that only some members of the FBA family (FBXO2 and FBXO6) could function in GERAD by recognizing the signature high mannose glycan moiety present on retrotranslocated ER proteins.
