id: Q8NI29
gene_symbol: FBXO27
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  FBXO27 (FBG5, FBX27) is a member of the FBA/FBG (F-box-associated, "sugar
  recognition") subfamily of F-box proteins that act as the substrate-recognition
  receptor of SCF (SKP1-CUL1-F-box)-type E3 ubiquitin ligase complexes. Like its
  paralogs FBXO2, FBXO6, FBXO17 and FBXO44, FBXO27 contains an N-terminal F-box
  domain that docks the protein onto SKP1 (and thereby onto the CUL1-RBX1 catalytic
  core) and a C-terminal FBA/G domain that functions as a lectin, recognizing
  N-linked oligosaccharides on glycoproteins through a conserved hydrophobic pocket
  (the aromatic Phe-Trp pair at positions 262-263 is required for high-affinity
  glycan binding). As an F-box protein, FBXO27 has no intrinsic catalytic activity;
  it confers substrate specificity to the assembled SCF complex, in which the RING
  subunit RBX1 recruits the ubiquitin-charged E2 enzyme and catalyzes ubiquitin
  transfer onto the bound glycoprotein. By binding glycans normally hidden inside
  the secretory pathway, FBXO27 contributes to recognition of N-glycosylated
  proteins that become aberrantly exposed to the cytosol (for example glycoproteins
  displayed on the surface of damaged lysosomes, or misfolded glycoproteins
  retrotranslocated from the ER), routing them to ubiquitin-dependent proteasomal
  degradation as part of cellular glycoprotein quality control. It is predominantly
  expressed in brain, heart and kidney.
