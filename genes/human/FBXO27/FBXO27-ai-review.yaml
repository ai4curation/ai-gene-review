    label: ubiquitin protein ligase activity
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: contributes_to
  review:
    summary: Phylogenetic assignment of ubiquitin protein ligase activity with a contributes_to qualifier, reflecting that the F-box substrate receptor contributes to the ligase activity of the assembled SCF complex rather than possessing intrinsic catalytic activity.
    action: KEEP_AS_NON_CORE
    reason: FBXO27 itself has no catalytic ubiquitin ligase activity; the catalytic RING subunit of the SCF complex is RBX1. The contributes_to qualifier correctly frames this as a contribution to the holoenzyme's activity rather than a property of FBXO27 alone, but the informative core molecular function of FBXO27 is carbohydrate (glycan) binding, not ligase catalysis. Retained as non-core; using contributes_to it is defensible, so MODIFY/REMOVE are not warranted.
