knowledge_gaps:
- gap_statement: >-
    The catalytic competence and oligomeric behavior of splice isoform 2, which
    lacks residues 105-119 in the catalytic region, are unknown.
  boundary: >-
    UniProt defines the in-frame deletion, but none of the reviewed activity or
    structural studies resolves this isoform or tests mixed dimers with canonical GLO1.
  gap_kind:
  - BIOLOGY
  dark_aspect: MF_DARK
  status: OPEN
  significance: >-
    Because each active site spans the dimer interface, an inactive minor isoform
    could alter canonical enzyme activity through heterodimerization.
  resolution: >-
    Purify isoform 2 alone and in mixed dimers with isoform 1; measure zinc
    occupancy, hemimercaptal isomerization kinetics, and oligomer stoichiometry,
    followed by isoform-specific rescue in GLO1-null human cells.
  provenance:
  - reference_id: file:human/GLO1/GLO1-uniprot.txt
    supporting_text: FT   VAR_SEQ         105..119
- gap_statement: >-
    It is unclear whether nucleoplasmic and plasma-membrane GLO1 signals
    represent stable, catalytically active pools.
  boundary: >-
    HPA immunofluorescence supports localization observations, but the reviewed
    primary literature establishes cytosolic catalysis and provides no
    site-specific mechanism for the other compartments.
  gap_kind:
  - BIOLOGY
  dark_aspect: CC_DARK
  status: OPEN
  significance: >-
    Resolving these pools is necessary before assigning nuclear or membrane
    pathway functions to GLO1.
  resolution: >-
    Validate endogenous localization with orthogonal antibodies and tagged
    knock-in alleles, fractionation controls, and compartment-targeted
    methylglyoxal flux/activity reporters.
  provenance:
  - reference_id: file:human/GLO1/GLO1-notes.md
    supporting_text: Human Protein Atlas immunofluorescence also reports nucleoplasm and plasma membrane.
suggested_questions:
- question: >-
    Does isoform 2 retain zinc-dependent catalytic activity or form
    activity-altering heterodimers with canonical GLO1?
- question: >-
    Are the nucleoplasmic and plasma-membrane immunofluorescence signals
    catalytically active endogenous pools?
- question: >-
    Can the cancer-cell apoptosis phenotype be separated genetically from
    methylglyoxal catalysis and from GLO1 phosphorylation/NO modification?
suggested_experiments:
- hypothesis: >-
    Isoform 2 is catalytically impaired by its internal deletion and modulates
    canonical GLO1 through mixed-dimer formation.
  description: >-
    Express and purify both isoforms, reconstitute defined homo- and heterodimers,
    and compare zinc occupancy, oligomer structure, and steady-state kinetics;
    then perform isoform-specific rescue in GLO1-null human cells under
    methylglyoxal challenge.
  experiment_type: Isoform-resolved biochemistry and cellular complementation
- hypothesis: >-
    Chemotherapy-resistance phenotypes require GLO1 catalysis rather than an
    independent scaffolding or signaling activity.
  description: >-
    Rescue GLO1-null human cancer cells with wild-type protein, zinc-ligand or
    catalytic-glutamate mutants, and modification-site mutants at matched
    expression; quantify methylglyoxal flux, S-lactoylglutathione, caspase
    activation, and drug-induced apoptosis.
  experiment_type: Catalytic separation-of-function and metabolite phenotyping
- hypothesis: >-
    Nucleoplasmic and membrane-associated GLO1 signals are context-dependent
    pools with distinct methylglyoxal-detoxification capacity.
  description: >-
    Combine endogenous fluorescent knock-in imaging with rigorous biochemical
    fractionation and compartment-targeted methylglyoxal reporters before and
    after oxidative or TNF stress.
  experiment_type: Endogenous localization and compartment-specific activity assay
