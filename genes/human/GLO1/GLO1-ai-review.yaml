core_functions:
- description: >-
    The zinc-loaded GLO1 homodimer catalyzes isomerization of the
    glutathione-methylglyoxal hemimercaptal to S-lactoylglutathione at
    intersubunit active sites. This is the first enzymatic step of the cytosolic
    glyoxalase pathway and protects cells by channeling methylglyoxal into
    catabolism; GLO2 completes conversion to D-lactate and regenerates glutathione.
  molecular_function:
    id: GO:0004462
    label: lactoylglutathione lyase activity
  directly_involved_in:
  - id: GO:0051596
    label: methylglyoxal catabolic process
  - id: GO:0110095
    label: cellular detoxification of aldehyde
  - id: GO:0006749
    label: glutathione metabolic process
