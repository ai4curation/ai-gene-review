id: Q04760
gene_symbol: GLO1
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  GLO1 is a predominantly cytosolic, zinc-dependent homodimeric
  lactoylglutathione lyase that catalyzes the first enzymatic step of the
  glyoxalase pathway. It converts the hemimercaptal formed spontaneously from
  methylglyoxal and glutathione into S-lactoylglutathione, enabling glyoxalase
  II to complete methylglyoxal detoxification and regenerate glutathione. Each
  active site lies at the dimer interface and uses an essential zinc ion and a
  catalytic glutamate to stabilize and protonate a cis-enediolate intermediate.
  Native human GLO1 is redox-regulated: glutathionylation of Cys139 inhibits
  activity. Elevated GLO1 can attenuate chemotherapy-induced apoptosis in
  experimental cancer-cell contexts, but this is downstream, context-specific
  biology rather than a separate constitutive molecular activity.
