id: P80404
gene_symbol: ABAT
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  ABAT is 4-aminobutyrate aminotransferase (GABA transaminase, GABA-T; EC 2.6.1.19), a
  pyridoxal-5'-phosphate (PLP)-dependent, mitochondrial matrix enzyme of the class-III
  aminotransferase family. It catalyzes the first and committed step of GABA degradation
  (the GABA shunt): the reversible transamination of GABA (4-aminobutanoate) with
  2-oxoglutarate to succinate semialdehyde and L-glutamate. The enzyme is a
  disulfide-linked homodimer that carries PLP covalently bound at Lys357 and a [2Fe-2S]
  cluster per dimer, and it also transaminates beta-amino acids such as
  L-beta-aminoisobutyrate ((S)-3-amino-2-methylpropanoate; EC 2.6.1.22, yielding
  methylmalonate semialdehyde), delta-aminovalerate and beta-alanine, linking it to
  pyrimidine/thymine catabolism. ABAT is expressed most highly in liver, pancreas, and
  brain. Loss-of-function variants cause autosomal-recessive GABA-transaminase deficiency
  (GABATD), a severe neonatal/infantile epileptic encephalopathy with elevated GABA.
