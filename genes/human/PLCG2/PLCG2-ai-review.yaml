- term:
    id: GO:0016055
    label: Wnt signaling pathway
  evidence_type: TAS
  original_reference_id: PMID:18784435
  qualifier: involved_in
  review:
    summary: The cited Wilms tumor expression study does not establish PLCG2 as 
      a Wnt signaling pathway component.
