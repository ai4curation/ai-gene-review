- term:
    id: GO:0008289
    label: lipid binding
  evidence_type: IEA
  review:
    summary: |
      Secretoglobins bind hydrophobic ligands via a conserved hydrophobic pocket.
      This is a family-level structural inference only. The falcon deep research
      found NO SCGB1C2-specific evidence for ligand binding: no substrate/ligand
      specificity, catalytic activity, or receptor binding has been directly
      reported for SCGB1C2 itself. The lipid-binding inference rests entirely on
      secretoglobin/uteroglobin family structural homology, not on direct
      experimental data for this protein. Treat as a low-confidence, provisional
      family-based prediction.
    action: NEW
    reason: |
      Secretoglobin family structure supports binding of lipophilic ligands, but
      direct transport activity and a SCGB1C2-specific ligand are not supported by
      any primary evidence retrieved; this annotation is a structural-family
      inference and should be regarded as provisional.
    supported_by:
    - reference_id: file:human/SCGB1C2/SCGB1C2-deep-research-perplexity.md
      supporting_text: This cavity accommodates small to medium-sized lipophilic ligands, including steroid hormones, phospholipids, polychlorinated biphenyls, and various eicosanoid mediators of inflammation, providing a structural basis for their regulatory functions.
    - reference_id: file:human/SCGB1C2/SCGB1C2-deep-research-falcon.md
      supporting_text: |-
        SCGB1C2-specific functional biochemistry (substrate/ligand specificity, catalytic activity, receptor binding) was **not directly reported**; therefore, no enzyme reaction, transporter substrate, or specific pathway position can be asserted from primary evidence in this session.
      reference_section_type: RESULTS
