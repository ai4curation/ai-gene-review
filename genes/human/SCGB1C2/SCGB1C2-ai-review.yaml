  findings:
  - statement: |-
      SCGB1C2 is the HGNC/Ensembl-approved symbol for secretoglobin family 1C member 2
      (ENSG00000268320), consistent with the UniProt P0DMR2 description.
    supporting_text: |-
      SCGB1C2 is the HGNC/Ensembl-approved symbol for **“secretoglobin family 1C member 2”**
    reference_section_type: RESULTS
  - statement: |-
      No SCGB1C2-specific functional biochemistry (substrate/ligand specificity, catalytic
      activity, or receptor binding) has been directly reported, so no enzyme reaction,
      transporter substrate, or pathway position can be asserted from primary evidence.
    supporting_text: |-
      SCGB1C2-specific functional biochemistry (substrate/ligand specificity, catalytic activity, receptor binding) was **not directly reported**; therefore, no enzyme reaction, transporter substrate, or specific pathway position can be asserted from primary evidence in this session.
    reference_section_type: RESULTS
  - statement: |-
      Within 2023-2024 primary literature, no direct SCGB1C2-focused functional studies were
      found; the only concrete progress is methodological (why SCGB1C2 is hard to validate).
    supporting_text: |-
      direct SCGB1C2-focused functional studies were not found
    reference_section_type: RESULTS
  - statement: |-
      SCGB1C2 is a neXtProt "missing protein": all of its tryptic peptides (>=9 aa) overlap
      with SCGB1C1 variants and it can be completely subsumed by SCGB1C1, so it cannot be
      uniquely validated by mass spectrometry and proteomics hits may be mis-assigned.
    supporting_text: |-
      all tryptic peptides (≥9 aa) from SCGB1C2 overlap with variants of SCGB1C1...SCGB1C2 can be “completely subsumed by” SCGB1C1, making MS-based validation impractical
    reference_section_type: RESULTS
  - statement: |-
      Reported airway-disease proteomics dysregulation (e.g. strong down-regulation in CRSwNP
      nasal lavage) is for the paralog SCGB1C1, not SCGB1C2, and must not be used as direct
      SCGB1C2 evidence.
    supporting_text: |-
      A 2024 nasal lavage fluid proteomics study in chronic rhinosinusitis with nasal polyposis (CRSwNP) reports strong down-regulation of **SCGB1C1 (secretoglobin family 1C member 1)**
    reference_section_type: RESULTS
