      Purified recombinant human 3-HAO converts 3-hydroxyanthranilic acid to
      quinolinic acid and is catalytically active only in the presence of Fe(II);
      Zn2+ inhibits the reaction.
    reference_section_type: ABSTRACT
    supporting_text: >-
      The recombinant human protein, obtained in E. coli, retains its enzymatic
      activity which can occur only in the presence of Fe(II)
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified. Supports catalytic MF (GO:0000334) and ferrous iron
      binding (GO:0008198). The response-to-zinc/cadmium IDA calls derive from
      the in vitro metal-inhibition experiments here and are over-interpretations
      (see annotation reviews).
