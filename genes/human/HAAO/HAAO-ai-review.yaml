- id: PMID:28792876
  title: NAD Deficiency, Congenital Malformations, and Niacin Supplementation.
  findings:
  - statement: >-
      Biallelic loss-of-function variants in HAAO (and KYNU) reduce enzyme
      activity, cause systemic NAD deficiency, and produce a congenital
      malformation syndrome; niacin supplementation prevents defects in mice.
    reference_section_type: ABSTRACT
    supporting_text: >-
      Variants were identified in two genes that encode enzymes of the
      kynurenine pathway, 3-hydroxyanthranilic acid 3,4-dioxygenase (HAAO) and
      kynureninase (KYNU).
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified. Establishes the physiological (de novo NAD+ from
      tryptophan) role and disease relevance (VCRL1); supports catalytic MF,
      quinolinate biosynthesis, and NAD+ biosynthesis annotations.
