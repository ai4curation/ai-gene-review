taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  HAAO encodes 3-hydroxyanthranilate 3,4-dioxygenase (3-HAO; EC 1.13.11.6), a
  cytosolic non-heme ferrous-iron (Fe2+)-dependent dioxygenase acting in the
  kynurenine pathway of L-tryptophan catabolism. It catalyzes the oxidative ring
  opening of 3-hydroxyanthranilate, incorporating both atoms of molecular oxygen
  to yield 2-amino-3-carboxymuconate-6-semialdehyde (ACMS). ACMS cyclizes
  spontaneously to quinolinate, the universal precursor for de novo NAD+
  biosynthesis from tryptophan (via quinolinate phosphoribosyltransferase),
  unless it is diverted by ACMSD toward picolinate and glutaryl-CoA. HAAO thus
  sits immediately upstream of quinolinate and de novo NAD+ synthesis. The
  286-residue protein is a monomer with a bicupin (RmlC-like cupin/jelly-roll)
  fold; the active-site catalytic iron is coordinated by conserved His and Glu
  residues, and Zn2+ is an in vitro inhibitor. The enzyme is highly expressed in
  liver. Biallelic loss-of-function variants in HAAO cause a congenital
  NAD-deficiency malformation syndrome (vertebral, cardiac, renal, and limb
  defects), which in mouse models is preventable by niacin supplementation
  during gestation. Because quinolinate is a potent excitotoxin, 3-HAO activity
  has also been studied in neurological disease.
