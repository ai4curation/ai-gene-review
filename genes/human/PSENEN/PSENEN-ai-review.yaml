suggested_questions:
- question: How should GO represent PEN-2 promotion of presenilin endoproteolysis, 
    complex stability, and trafficking without implying that PSENEN is the catalytic 
    protease?
  experts:
  - GO molecular-function curators
  - gamma-secretase structure-function experts
- question: Which PSENEN energy-stress/V-ATPase/AMPK/TORC1 activities are direct human 
    PEN-2 functions versus orthology-based or drug-response context?
  experts:
  - AMPK signaling experts
  - gamma-secretase complex experts
suggested_experiments:
- description: Use endogenous PSENEN perturbation and rescue in human neural and 
    epithelial cells to measure presenilin endoproteolysis, complex assembly, 
    localization, and APP/Notch substrate cleavage side by side.
  hypothesis: PEN-2 primarily controls gamma-secretase activity by promoting presenilin 
    maturation plus complex stability and trafficking rather than by acting as an 
    independent protease.
  experiment_type: endogenous rescue and gamma-secretase maturation assay
- description: Test PSENEN-dependent metformin/V-ATPase/AMPK/TORC1 signaling in human 
    cells with gamma-secretase catalytic inhibition and presenilin-complex assembly 
    mutants.
  hypothesis: The reported energy-stress role of PEN-2 is separable from the canonical 
    gamma-secretase substrate-processing role.
  experiment_type: separation-of-function energy-stress signaling assay
