id: Q9NZ42
gene_symbol: PSENEN
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: 'PSENEN encodes PEN-2, a small multipass membrane protein and essential non-catalytic
  subunit of the gamma-secretase intramembrane protease complex. Together with a presenilin
  catalytic subunit, nicastrin, and APH1A or APH1B, PEN-2 promotes presenilin maturation/endoproteolysis,
  gamma-secretase complex stability and trafficking, and intramembrane cleavage of substrates
  including APP and Notch receptors. PEN-2 localizes primarily to endoplasmic-reticulum and
  cis-Golgi membranes, with evidence for cell-membrane and other membrane compartments; additional
  orthology-based evidence links PEN-2 to energy-stress signaling through V-ATPase/AMPK/TORC1
  regulation.'
