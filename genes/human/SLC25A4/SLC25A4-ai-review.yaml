- term:
    id: GO:0015853
    label: adenine transport
  evidence_type: IEA
  original_reference_id: GO_REF:0000108
  qualifier: involved_in
  review:
    summary: >-
      This term is derived by inter-ontology inference from an old, overly broad
      "adenine transmembrane transporter activity" assertion (see the
      PMID:2823266 TAS annotation). ANT1 transports the adenine nucleotides ADP
      and ATP, not free adenine base; its substrate specificity is narrow (only
      ADP and ATP; PMID:23173940). Free-adenine transport is a mischaracterization
      of the carrier and should be removed as an incorrect electronic inference.
    action: REMOVE
    supported_by:
    - reference_id: PMID:23173940
      supporting_text: >-
        A large number of nucleotides were tested, but only ADP and ATP are
        suitable substrates for human AAC1, demonstrating a very narrow specificity.
