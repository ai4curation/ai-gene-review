id: P12235
gene_symbol: SLC25A4
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  SLC25A4 (ANT1/AAC1) is the heart- and skeletal-muscle isoform of the
  mitochondrial ADP/ATP carrier (adenine nucleotide translocase), a member of
  the SLC25 mitochondrial carrier family. It is a multi-pass integral protein of
  the mitochondrial inner membrane that catalyzes the electrogenic 1:1 antiport
  of matrix ATP for cytosolic ADP, thereby exporting the ATP generated by
  oxidative phosphorylation to fuel the cell and importing ADP for
  re-phosphorylation by ATP synthase. It functions as a monomer with a single
  central substrate binding site that is alternately exposed to the cytosolic
  (c-state) and matrix (m-state) side of the membrane, and it operates by a
  ping-pong (double-displacement) kinetic mechanism. Substrate specificity is
  narrow, with ADP and ATP as the only physiological substrates. Beyond its core
  antiporter activity, ANT1 has been implicated as a component or regulator of
  the mitochondrial permeability transition pore (mPTP) and in mitochondrial
  proton leak/uncoupling, giving it secondary roles in regulated cell death and
  thermogenesis. In humans, dominant SLC25A4 mutations cause autosomal dominant
  progressive external ophthalmoplegia with multiple mtDNA deletions (PEOA2) and
  a severe early-onset mitochondrial disease with mtDNA depletion, while
  recessive loss-of-function causes mitochondrial myopathy and hypertrophic
  cardiomyopathy.
