suggested_questions:
- question: >-
    Does human ANT1 constitute a pore-forming component of the mPTP, or does it
    act purely as a regulator of the pore?
- question: >-
    What is the physiological magnitude and regulation of ANT1-mediated
    fatty-acid-dependent proton leak in human heart/skeletal muscle, and how
    much does it contribute to adaptive thermogenesis in vivo?
suggested_experiments:
- description: >-
    Reconstitute purified human ANT1 with defined mPTP components to test
    directly whether it is required for pore formation versus modulation.
- description: >-
    Quantify fatty-acid-activated proton conductance of reconstituted human ANT1
    versus its ADP/ATP antiport activity to define the balance between energy
    output and thermogenesis.
