  evidence_type: TAS
  original_reference_id: PMID:2823266
  qualifier: enables
  review:
    summary: >-
      Legacy TAS from the 1987 cloning paper mislabels the carrier as an "adenine
      (base) transporter". ANT1 transports the adenine nucleotides ADP and ATP,
      not free adenine, and has narrow specificity (PMID:23173940). This is the
      source of the erroneous "adenine transport" inference; the correct MF is
      ATP:ADP antiporter activity. Modify to the accurate transporter term.
    action: MODIFY
