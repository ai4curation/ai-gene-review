    11beta-hydroxyglucocorticoids (cortisol, corticosterone) to inactive 11-oxosteroids
    (cortisone, 11-dehydrocorticosterone) on the endoplasmic reticulum membrane, thereby
    inactivating glucocorticoids and, in aldosterone-target epithelia, protecting
    the mineralocorticoid receptor from illicit activation by cortisol.
