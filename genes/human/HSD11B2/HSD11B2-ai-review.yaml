taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: 11-beta-hydroxysteroid dehydrogenase type 2 (11beta-HSD2; corticosteroid
  11-beta-dehydrogenase isozyme 2; SDR9C3) is an endoplasmic-reticulum-membrane,
  NAD+-dependent, unidirectional dehydrogenase of the short-chain dehydrogenase/reductase
  (SDR) family. It inactivates the glucocorticoids cortisol to cortisone and corticosterone
  to 11-dehydrocorticosterone, oxidizing active 11beta-hydroxyglucocorticoids to inert
  11-oxosteroids using NAD+. In aldosterone-target epithelia (distal nephron, colon,
  salivary gland) it destroys cortisol locally, protecting the intrinsically non-selective
  mineralocorticoid receptor from illicit activation by cortisol and thereby conferring
  aldosterone specificity; it is also highly expressed in placenta, where it shields
  the fetus from maternal glucocorticoid. Loss-of-function variants cause the syndrome
  of apparent mineralocorticoid excess (AME), an autosomal-recessive juvenile low-renin
  hypertension with hypokalemia and metabolic alkalosis, in which cortisol illicitly
  activates the mineralocorticoid receptor.
