proposed_new_terms: []
suggested_questions:
- question: Does the DNAJC14 J domain recruit and stimulate an ER-associated HSP70 (e.g. BiP/HSPA5) to chaperone GPCR folding and ER export, and is the HPD motif required for DRD1 surface delivery?
- question: How broad is the DNAJC14 client repertoire beyond DRD1 (which other GPCRs or membrane proteins depend on DRIP78 for ER export), and is selectivity dictated by the FxxxFxxxF motif?
suggested_experiments:
- description: Co-immunoprecipitation and surface-biotinylation assays in DNAJC14-knockout cells expressing DRD1 (wild-type versus FxxxFxxxF-motif mutant) to quantify ER retention versus cell-surface delivery.
- description: J-domain HPD-motif mutagenesis combined with BiP/HSPA5 ATPase assays to test whether DNAJC14 functions as a bona fide HSP70 co-chaperone in regulating GPCR ER export.
