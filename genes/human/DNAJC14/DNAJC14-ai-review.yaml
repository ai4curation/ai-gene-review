    summary: Phylogenetic (IBA) annotation that DNAJC14/DRIP78 binds the dopamine receptor, reflecting its founding role as the dopamine D1 receptor (DRD1)-interacting ER protein that controls DRD1 export. This is the most specific supported molecular function for this gene.
