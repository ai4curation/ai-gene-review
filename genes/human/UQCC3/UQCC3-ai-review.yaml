- id: PMID:25008109
  title: A mutation in the human CBP4 ortholog UQCC3 impairs complex III assembly,
    activity and cytochrome b stability.
  findings:
  - statement: >-
      A homozygous UQCC3 loss-of-function variant causes isolated Complex III
      deficiency; patient fibroblasts have reduced Complex III activity and
      holocomplex levels, and cytochrome b is destabilized, placing UQCC3 in the
      Complex III assembly pathway downstream of UQCC1 and UQCC2.
    reference_section_type: ABSTRACT
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified primary study establishing UQCC3 as the human CBP4 ortholog and
      a Complex III assembly factor; source of the MC3DN9 disease association. Cached
      entry is abstract-only.
- id: PMID:25605331
  title: C11orf83, a mitochondrial cardiolipin-binding protein involved in bc1 complex
    assembly and supercomplex stabilization.
  findings:
  - statement: >-
      C11orf83/UQCC3 is an inner-membrane protein facing the intermembrane space that
      stabilizes the early bc1 core complex, binds cardiolipin via α-helices 2 and 3,
      influences cardiolipin composition and cristae morphology, stabilizes bc1
      supercomplexes (III2/IV), and is cleaved by OMA1 upon depolarization.
    reference_section_type: ABSTRACT
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified primary study; source of the cardiolipin-binding, supercomplex,
      cristae, and OMA1-cleavage findings. Cached entry is abstract-only (phosphatidic
      acid binding is reported in the full-text lipid-binding assays).
