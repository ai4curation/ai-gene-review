- term:
    id: GO:0006122
    label: mitochondrial electron transport, ubiquinol to cytochrome c
  evidence_type: IMP
  original_reference_id: PMID:25008109
  qualifier: involved_in
  review:
    summary: >-
      Mutant-phenotype evidence: patient fibroblasts carrying a UQCC3 loss-of-function
      variant have reduced Complex III activity and holocomplex levels, and cytochrome
      b is absent from the high-molecular-weight complex, impairing ubiquinol-to-cytochrome
      c electron transport. UQCC3 mediates this process indirectly, as a non-catalytic
      assembly factor.
    action: KEEP_AS_NON_CORE
    reason: >-
      The IMP is valid — UQCC3 loss impairs Complex III-mediated electron transport — but
      UQCC3 does not itself carry electrons; the phenotype is a downstream consequence of
      failed Complex III assembly. Kept as non-core, with assembly (GO:0034551) as the core
      process.
    supported_by:
    - reference_id: PMID:25008109
      supporting_text: >-
        reduced complex III activity and lower levels
    - reference_id: PMID:25008109
      supporting_text: >-
        cytochrome b is absent from a high-molecular-weight complex III
