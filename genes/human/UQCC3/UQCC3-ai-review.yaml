    label: cristae formation
  evidence_type: IMP
  original_reference_id: PMID:25605331
  qualifier: involved_in
  review:
    summary: >-
      Depletion of UQCC3 (C11orf83) in HeLa cells causes abnormal crista morphology,
      linking UQCC3 to cristae organization. This is a downstream phenotypic consequence
      of its roles in Complex III/supercomplex assembly and cardiolipin homeostasis
      rather than a direct structural role in cristae biogenesis.
    action: KEEP_AS_NON_CORE
    reason: >-
      The mutant phenotype is real (abnormal crista morphology on depletion), but it is a
      secondary consequence of impaired supercomplex organization and altered cardiolipin
      composition, not a distinct core molecular activity of UQCC3. Retained as a non-core
      process annotation.
