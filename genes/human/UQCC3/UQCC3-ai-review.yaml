id: Q6UW78
gene_symbol: UQCC3
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  UQCC3 (ubiquinol-cytochrome-c reductase complex assembly factor 3; formerly
  C11orf83) is a small (93-residue) single-pass mitochondrial inner-membrane
  protein and the functional human equivalent of yeast Cbp4p. It is a
  non-catalytic assembly factor for respiratory chain Complex III (cytochrome
  bc1 / ubiquinol-cytochrome c reductase): acting downstream of UQCC1/UQCC2, it
  mediates recruitment and stabilization of the cytochrome b (MT-CYB) subunit
  within the early bc1 core assembly intermediate, and is therefore required for
  Complex III assembly, holocomplex accumulation, and mitochondrial electron
  transport from ubiquinol to cytochrome c. UQCC3 also binds cardiolipin (via its
  intermembrane-space-facing α-helices), influences mitochondrial cardiolipin
  composition and cristae morphology, and helps stabilize bc1-containing
  respiratory supercomplexes (notably the III2/IV supercomplex). Its N-terminus
  sits in the matrix, followed by a transmembrane helix and an
  intermembrane-space-facing C-terminal lipid-binding region; the protein is
  cleaved by the OMA1 metalloprotease upon mitochondrial depolarization. Loss of
  function causes mitochondrial complex III deficiency, nuclear type 9 (MC3DN9),
  presenting with severe lactic acidosis, hypoglycemia, hypotonia, and delayed
  psychomotor development.
