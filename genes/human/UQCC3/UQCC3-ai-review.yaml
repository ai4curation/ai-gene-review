- term:
    id: GO:0006122
    label: mitochondrial electron transport, ubiquinol to cytochrome c
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: involved_in
  review:
    summary: >-
      Phylogenetic inference that UQCC3 is involved in Complex III-mediated
      electron transport from ubiquinol to cytochrome c. UQCC3 is a non-catalytic
      assembly factor, so it participates in this process only indirectly, by
      building and stabilizing Complex III; loss of UQCC3 abolishes Complex III
      activity.
    action: KEEP_AS_NON_CORE
    reason: >-
      Defensible (UQCC3 loss impairs electron transport because Complex III is not
      assembled), but UQCC3 is not part of the electron-transfer machinery itself;
      the core function is Complex III assembly. Keep as a non-core process
      annotation reflecting the downstream physiological consequence.
