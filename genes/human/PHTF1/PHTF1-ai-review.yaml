      This is the most appropriate cellular component annotation for PHTF1. The protein
      has 8 predicted transmembrane helices (UniProt feature annotations) and experimental
      evidence demonstrates it is an integral ER membrane protein resistant to carbonate
      extraction. This annotation accurately captures the protein's subcellular localization.
