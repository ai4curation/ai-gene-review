id: Q9UMS5
gene_symbol: PHTF1
product_type: PROTEIN
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  PHTF1 (Protein PHTF1) is a conserved multi-pass transmembrane protein localized to the
  endoplasmic reticulum membrane and cis-Golgi network membrane. Despite its historical
  name ("Putative Homeodomain Transcription Factor"), experimental and structural evidence
  demonstrates it is NOT a transcription factor but rather an integral membrane protein.
  Recent structural analysis using AlphaFold2 has identified PHTF1 as a candidate member
  of the 7TMIC (seven-transmembrane insect chemoreceptor-like) superfamily, though direct
  functional activity (e.g., ion channel function) has not been experimentally demonstrated
  in mammals. PHTF1 interacts with FEM1B via its N-terminal region (validated by Y2H and
  co-IP), and this interaction enhances FEM1B association with membranes. Expression is
  enriched in testis and cerebellum. The protein contains 8 predicted transmembrane helices
  and a PHTF domain at its N-terminus (aa 6-150). Its molecular function remains to be
  fully elucidated.
existing_annotations:
- term:
    id: GO:0005783
    label: endoplasmic reticulum
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: >-
      This annotation is based on InterPro domain mapping (IPR039775 - PHTF1/2 family).
      The annotation is well-supported by experimental evidence showing PHTF1 localizes to
      the ER in rodent germ cells via biochemical fractionation and immunofluorescence
      colocalization with ER markers [Oyhenart et al., Biol Reprod 2005]. UniProt also
      explicitly annotates subcellular location as "Endoplasmic reticulum membrane" based
      on similarity evidence. However, the more specific term GO:0005789 (endoplasmic
      reticulum membrane) is more appropriate for this multi-pass transmembrane protein
      since it resides in the ER membrane rather than the ER lumen.
    action: MODIFY
    reason: >-
      While PHTF1 is indeed associated with the ER, as an integral multi-pass membrane
      protein with 8 transmembrane helices, it specifically resides in the ER membrane
      rather than the ER lumen or general ER. The more specific term GO:0005789
      (endoplasmic reticulum membrane) is already annotated and is more accurate for this
      protein. Experimental evidence from Oyhenart et al. (2005) demonstrated ER
      localization using carbonate extraction (confirming integral membrane protein status)
      and immunofluorescence colocalization with ER markers in rodent germ cells.
    proposed_replacement_terms:
    - id: GO:0005789
      label: endoplasmic reticulum membrane
    additional_reference_ids:
    - PMID:15601915
    - PMID:36803935
    supported_by:
    - reference_id: PMID:15601915
      full_text_unavailable: true
    - reference_id: file:human/PHTF1/PHTF1-deep-research-falcon.md
      supporting_text: >-
        Experimental evidence in rodent germ cells places PHTF1 in the endoplasmic
        reticulum (ER) adjacent to the Golgi ("Golgi pole") during meiosis and
        spermiogenesis; PHTF1 remains membrane-associated after carbonate extraction,
        consistent with an integral membrane protein
