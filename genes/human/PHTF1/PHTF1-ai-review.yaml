    summary: >-
      This annotation from UniProt subcellular location vocabulary mapping is accurate
      and well-supported by experimental evidence. PHTF1 is a multi-pass transmembrane
      protein with 8 predicted transmembrane helices that localizes to the ER membrane.
      Experimental validation comes from rodent studies showing resistance to carbonate
      extraction (confirming integral membrane status) and immunofluorescence colocalization
