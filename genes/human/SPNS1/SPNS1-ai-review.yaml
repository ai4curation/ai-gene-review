      label: transmembrane transporter activity
    evidence_type: IBA
    original_reference_id: GO_REF:0000033
    qualifier: enables
    review:
      summary: >-
        SPNS1 is a transmembrane transporter, but this term is too general for a
        reviewed core-function annotation. Experimental work shows a lysosomal
        lysophospholipid transporter activity with LPC/LPE/LPG substrate
        specificity and proton-gradient dependence.
      action: MODIFY
      reason: >-
        Replace the broad transporter term with the current specific GO
        molecular-function term for lysophospholipid transporter activity. The
        current GO label says sodium symporter, but SPNS1 itself is described as
        proton dependent; this review also proposes a new proton-specific child
        term.
      proposed_replacement_terms:
        - id: GO:0051978
          label: lysophospholipid:sodium symporter activity
      supported_by:
        - reference_id: PMID:36161949
          supporting_text: >-
            the major facilitator superfamily protein Spns1 that is ubiquitously
            expressed in all tissues as a proton-dependent lysophosphatidylcholine
            (LPC) and lysophosphatidylethanolamine (LPE) transporter
        - reference_id: PMID:39739806
          supporting_text: >-
            Spns1 mediates the rate-limiting efflux of lysophospholipids from
            the lysosome to the cytosol
  - term:
