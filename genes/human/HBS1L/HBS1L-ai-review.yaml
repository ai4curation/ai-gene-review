core_functions:
- description: Translational GTPase subunit of the Pelota-HBS1L (Dom34-Hbs1) complex
    that delivers the eRF1-like factor PELO to the A site of stalled ribosomes and,
    via GTP hydrolysis, licenses PELO/ABCE1-mediated subunit dissociation, rescuing
    stalled ribosomes and initiating no-go and non-stop mRNA decay.
  molecular_function:
    id: GO:0003924
    label: GTPase activity
  locations:
  - id: GO:1990533
    label: Dom34-Hbs1 complex
  - id: GO:0022626
    label: cytosolic ribosome
  supported_by:
  - reference_id: file:human/HBS1L/HBS1L-uniprot.txt
    supporting_text: GTPase component of the Pelota-HBS1L complex, a complex that recognizes
      stalled ribosomes and triggers the No-Go Decay (NGD) pathway
  - reference_id: PMID:21448132
    supporting_text: Dissociation by Pelota, Hbs1 and ABCE1 of mammalian vacant 80S
      ribosomes and stalled elongation complexes
proposed_new_terms: []
suggested_questions:
- question: How does HBS1L GTP hydrolysis kinetically couple PELO A-site engagement
    to ABCE1-driven subunit splitting?
- question: To what extent does the short HBS1LV3 isoform's SKI/exosome scaffolding
    role function independently of the canonical Pelota-HBS1L rescue complex?
suggested_experiments:
- description: Reconstituted GTPase assays comparing wild-type and GTPase-dead HBS1L
    in PELO-dependent ribosome splitting to define the catalytic requirement for rescue.
- description: Isoform-resolved interactome and rescue-activity profiling (HBS1LV1
    vs HBS1LV3) to separate the ribosome-rescue and SKI/exosome scaffolding functions.
