id: Q9Y450
gene_symbol: HBS1L
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: HBS1L (HBS1-like translational GTPase) is a cytoplasmic GTPase of the
  TRAFAC-class translation-factor superfamily, in the eEF1A/eRF3/Hbs1 group. It is
  the GTP-binding subunit of the Pelota-HBS1L complex (also called the Dom34-Hbs1 complex),
  partnering the eRF1-like factor PELO. The complex recognizes ribosomes stalled at
  the 3' end of an mRNA (truncated, non-stop, or no-go messages); HBS1L delivers PELO
  to the ribosomal A site and, through its GTPase activity, licenses PELO- and ABCE1-mediated
  splitting of the stalled 80S ribosome into subunits, thereby rescuing the ribosome
  and initiating no-go decay (NGD) and non-stop decay (NSD). Although phylogenetically
  related to the translation-termination factor eRF3, HBS1L does not possess eRF3 (peptide-release)
  activity. A short alternatively spliced isoform (HBS1LV3) instead scaffolds the cytoplasmic
  SKI complex and exosome via direct SKIC2 and EXOSC3 binding, coupling mRNA extraction
  to 3'-5' degradation.
