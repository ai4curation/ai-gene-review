core_functions:
- description: >-
    Copper- and ascorbate-dependent dopamine beta-monooxygenase that hydroxylates the
    beta-carbon of dopamine to produce (R)-noradrenaline, catalyzing the noradrenaline-
    forming step of catecholamine biosynthesis within catecholamine secretory granules
    of noradrenergic and adrenergic cells.
  molecular_function:
    id: GO:0004500
    label: dopamine beta-monooxygenase activity
  supported_by:
  - reference_id: file:human/DBH/DBH-uniprot.txt
    supporting_text: "Catalyzes the hydroxylation of dopamine to noradrenaline"
  - reference_id: PMID:7961964
    supporting_text: "catalytically active human DBH enzyme"
  directly_involved_in:
  - id: GO:0042421
    label: norepinephrine biosynthetic process
  locations:
  - id: GO:0030667
    label: secretory granule membrane
  - id: GO:0034774
    label: secretory granule lumen
  - id: GO:0042584
    label: chromaffin granule membrane
- description: >-
    Binds two type-2 copper ions per subunit (CuH electron-transfer and CuM
    dioxygen/substrate sites) that are essential for the monooxygenase reaction.
  molecular_function:
