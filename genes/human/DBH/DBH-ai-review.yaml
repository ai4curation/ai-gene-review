id: P09172
gene_symbol: DBH
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  DBH (dopamine beta-hydroxylase, also called dopamine beta-monooxygenase; EC
  1.14.17.1) is a copper- and ascorbate (vitamin C)-dependent monooxygenase that
  catalyzes the penultimate step of catecholamine biosynthesis: hydroxylation of
  the beta-carbon of dopamine to form (R)-noradrenaline (norepinephrine), with
  reduction of molecular O2 and oxidation of two ascorbate molecules to
  monodehydroascorbate radicals. Each subunit binds two type-2 copper ions (CuH,
  the electron-transfer site, and CuM, the dioxygen-binding/substrate-hydroxylation
  site) and belongs to the copper type II, ascorbate-dependent monooxygenase family
  together with peptidylglycine monooxygenase (PAM/PHM), MOXD1 and insect tyramine
  beta-monooxygenase. The enzyme is a glycosylated homotetramer (two disulfide-linked
  dimers) with an N-terminal DOMON domain, a two-lobed catalytic core, and a
  C-terminal dimerization domain. DBH is expressed in noradrenergic and adrenergic
  cells (sympathetic neurons, central noradrenergic neurons, and adrenal medulla
  chromaffin cells), where it resides in the membrane and soluble lumenal content of
  catecholamine secretory (chromaffin) granules and synaptic vesicles; it is
  synthesized as a type II single-pass membrane protein, and proteolytic cleavage of
  the membrane anchor releases a soluble form that is co-released with catecholamines
  by exocytosis and appears in plasma and cerebrospinal fluid. Loss of DBH function
  in humans causes autosomal-recessive congenital dopamine beta-hydroxylase
  deficiency (orthostatic hypotension 1), in which noradrenaline and adrenaline are
  absent while dopamine accumulates.
