  findings:
  - statement: >-
      Dbh-null mice cannot synthesize noradrenaline/adrenaline and are cold intolerant,
      unable to induce brown-adipose-tissue thermogenesis via UCP1 - a downstream
      noradrenaline-dependent physiological role.
    supporting_text: "unable to induce thermogenesis in brown adipose tissue through uncoupling protein (UCP1)"
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified (abstract only). Basis of the ISS/IEA positive regulation of
      cold-induced thermogenesis annotation; downstream physiology, kept non-core.
- id: Reactome:R-HSA-209891
  title: Dopamine is oxidised to noradrenaline
  findings:
  - statement: >-
      Reactome reaction: DBH oxidizes dopamine to norepinephrine using ascorbate as
      electron donor; the soluble form is secreted with catecholamines by exocytosis and
      the membrane-bound form is recycled into the vesicles.
    supporting_text: "The enzyme exists in the secretory vesicles as both soluble and membrane-bound forms"
