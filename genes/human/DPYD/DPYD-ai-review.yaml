id: Q12882
gene_symbol: DPYD
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  DPYD encodes dihydropyrimidine dehydrogenase [NADP(+)] (DPD; EC 1.3.1.2), the initial
  and rate-limiting enzyme of the reductive catabolism of the pyrimidine bases uracil and
  thymine. It reduces uracil to 5,6-dihydrouracil and thymine to 5,6-dihydrothymine using
  NADPH as the electron donor. DPD is a large cytosolic homodimeric flavoprotein; each
  subunit binds two FAD, two FMN and four [4Fe-4S] clusters that shuttle electrons from
  NADPH to the pyrimidine substrate. It is the principal enzyme that catabolises the
  fluoropyrimidine chemotherapeutic 5-fluorouracil (5-FU), and the dihydrouracil it
  produces is further processed (by dihydropyrimidinase and beta-ureidopropionase) toward
  beta-alanine. Deficiency of DPD (DPYD deficiency) causes severe, potentially
  life-threatening toxicity from 5-FU/capecitabine, and more complete deficiency produces
  thymine-uraciluria with a variable neurological phenotype (seizures, motor and
  intellectual disability). DPYD is a major pharmacogenetic gene, and DPYD genotyping is
  used clinically to guide fluoropyrimidine dosing.
