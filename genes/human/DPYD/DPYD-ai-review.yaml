      supporting_text: >-
        Kinetic studies with uracil, thymine, 5-fluorouracil, and NADPH were carried out.
core_functions:
- description: >-
    Dihydropyrimidine dehydrogenase (NADP+) activity: DPD is a cytosolic homodimeric
    flavoprotein that catalyzes the NADPH-dependent reduction of the pyrimidine bases
    uracil and thymine to 5,6-dihydrouracil and 5,6-dihydrothymine (EC 1.3.1.2), the
    initial and rate-limiting step of reductive pyrimidine base catabolism. Catalysis
    relies on bound FAD, FMN and four [4Fe-4S] clusters per subunit that transfer electrons
    from NADPH to the substrate, and on binding of NADP and the uracil/thymine substrate.
  molecular_function:
    id: GO:0017113
    label: dihydropyrimidine dehydrogenase (NADP+) activity
  directly_involved_in:
  - id: GO:0006212
    label: uracil catabolic process
  - id: GO:0006210
    label: thymine catabolic process
  - id: GO:0006208
    label: pyrimidine nucleobase catabolic process
  locations:
  - id: GO:0005829
    label: cytosol
  supported_by:
  - reference_id: PMID:1512248
    supporting_text: >-
      Kinetic studies with uracil, thymine, 5-fluorouracil, and NADPH were carried out.
  - reference_id: PMID:8083224
    supporting_text: >-
      catalyzed the reduction of uracil, thymine, and 5-fluorouracil with kinetics
      approximating those published for the enzyme purified from mammalian liver
  - reference_id: file:human/DPYD/DPYD-uniprot.txt
    supporting_text: "Catalyzes the reduction of uracil and thymine (PubMed:1512248)."
proposed_new_terms: []
suggested_questions:
- question: >-
    Which DPYD interacting partners identified in high-throughput screens (e.g. LXN, GOPC)
    have a demonstrable effect on DPD activity, stability or localization?
- question: >-
    Do the two GO:0017113 IDA annotations attributed to PMID:18075467 and PMID:10410956
    (both centered on the downstream enzyme dihydropyrimidinase / DPYS) reflect the full
    text, or are they mis-attributed to DPYD?
suggested_experiments:
- description: >-
    Reconstitute recombinant human DPD and measure steady-state kinetics for uracil,
    thymine and 5-fluorouracil across clinically relevant DPYD variants to correlate
    genotype with residual activity.
