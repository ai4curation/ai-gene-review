id: Q9UBQ7
gene_symbol: GRHPR
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: GRHPR encodes glyoxylate reductase/hydroxypyruvate reductase, a cytosolic
  NADPH-dependent D-2-hydroxyacid dehydrogenase (D-isomer specific 2-hydroxyacid dehydrogenase
  family) that is most abundantly expressed in the liver. It reduces glyoxylate to
  glycolate (EC 1.1.1.79) and hydroxypyruvate to D-glycerate (EC 1.1.1.81), and can
  oxidize D-glycerate back to hydroxypyruvate; it prefers glyoxylate and hydroxypyruvate
  over pyruvate. By reducing glyoxylate to glycolate it limits the oxidation of glyoxylate
  to oxalate, providing a key route for cytosolic glyoxylate detoxification and
  constraining endogenous oxalate synthesis. The enzyme is a homodimer with a Rossmann
  NAD(P)-binding fold. Loss-of-function variants cause primary hyperoxaluria type 2
  (PH2), characterized by elevated urinary excretion of oxalate and L-glycerate,
  calcium-oxalate nephrolithiasis, nephrocalcinosis, and progressive renal disease.
