- id: PMID:10484776
  title: The gene encoding hydroxypyruvate reductase (GRHPR) is mutated in patients
    with primary hyperoxaluria type II.
  findings:
  - statement: GRHPR encodes the enzyme that reduces hydroxypyruvate to D-glycerate,
      reduces glyoxylate to glycolate, and oxidizes D-glycerate; its deficiency causes
      primary hyperoxaluria type 2 with elevated urinary oxalate and L-glycerate.
    supporting_text: characterized by a lack of the enzyme that catalyzes the reduction
      of hydroxypyruvate to D-glycerate, the reduction of glyoxylate to glycolate and
      the oxidation of D-glycerate to hydroxypyruvate
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: Abstract-only cache; establishes GRHPR catalytic activities and the
      PH2 disease link. Consistent with UniProt FUNCTION and DISEASE records.
- id: PMID:10524214
  title: Identification and expression of a cDNA for human hydroxypyruvate/glyoxylate
    reductase.
  findings:
  - statement: Cloning and expression of the human liver GRHPR (GLXR) cDNA showed the
      328-residue protein has glyoxylate and hydroxypyruvate reductase activities.
    supporting_text: a human liver cDNA encoding a 40-kDa protein with glyoxylate and
      hydroxypyruvate reductase activities
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: Abstract-only cache; primary cloning/expression paper demonstrating
      the enzyme's dual reductase activities.
- id: PMID:16756993
  title: Structural basis of substrate specificity in human glyoxylate reductase/hydroxypyruvate
    reductase.
  findings:
  - statement: Crystal structure of human GRHPR shows a homodimer that binds NADPH and
      substrate; the enzyme prefers glyoxylate and hydroxypyruvate but not pyruvate,
      with Trp141 from the neighbouring subunit shaping specificity.
    supporting_text: A tryptophan residue (Trp141) from the neighbouring subunit of
      the dimer is projected into the active site region and appears to contribute to
      the selectivity for hydroxypyruvate.
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: Abstract-only cache; defines fold, homodimer, NADPH cofactor,
      substrate specificity, and the hepatic glyoxylate-removal role.
