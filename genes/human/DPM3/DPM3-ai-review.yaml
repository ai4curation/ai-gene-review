taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: DPM3 is the small (92-residue) membrane-anchoring and stabilizer subunit
  of the heterotrimeric dolichol-phosphate mannose (Dol-P-Man / DPM) synthase complex,
  which also comprises the catalytic subunit DPM1 and the regulatory subunit DPM2.
  DPM synthase transfers mannose from cytosolic GDP-mannose to dolichyl phosphate at
  the endoplasmic reticulum membrane to produce dolichol-phosphate-mannose (Dol-P-Man),
  the essential lumenal mannosyl donor for GPI-anchor biosynthesis, N-glycan precursor
  assembly, and protein O- and C-mannosylation. DPM3 is non-catalytic; because the
  catalytic DPM1 subunit lacks a transmembrane domain, DPM3 (a multi-pass ER membrane
  protein) tethers DPM1 to the ER membrane and bridges the complex, associating with
  DPM1 through its C-terminal region and with DPM2 through its N-terminal region. This
  scaffolding stabilizes DPM1 and is required for assembly and activity of the DPM
  synthase. Loss of DPM3 function causes DPM3-CDG, an alpha-dystroglycanopathy-type
  congenital muscular dystrophy (with elevated serum creatine kinase, reduced
  O-mannosylation of alpha-dystroglycan, and cardiomyopathy in some patients).
