  title: Identification of the mitochondrial glutamate transporter. Bacterial expression,
    reconstitution, functional characterization, and tissue distribution of two human
    isoforms.
  findings:
  - statement: >-
      GC-1 (SLC25A22) and GC-2 (SLC25A18) are glutamate/H+ symporters of the
      mitochondrial inner membrane; the bacterially expressed proteins were
      reconstituted into liposomes and shown to co-transport glutamate with a proton
      (or in exchange for OH-).
    supporting_text: "Glutamate is co-transported with H(+) (or exchanged for OH(-))"
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Primary functional characterization of SLC25A22; source of the IDA MF/BP/CC
      annotations. Abstract-only in cache (full_text_available: false); quotes taken
      from the abstract.
