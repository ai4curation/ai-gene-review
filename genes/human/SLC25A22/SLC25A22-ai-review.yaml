- id: PMID:15592994
  title: Impaired mitochondrial glutamate transport in autosomal recessive neonatal
    myoclonic epilepsy.
  findings:
  - statement: >-
      The DEE3/EIEE3 disease variant Pro206Leu in SLC25A22 disrupts L-glutamate
      transporter activity, establishing loss of mitochondrial glutamate/H+ transport
      as the disease mechanism.
    supporting_text: "P -> L (in DEE3; disrupts L-glutamate transporter"
  reference_review:
    relevance: HIGH
