gene_symbol: SLC25A22
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  SLC25A22 (mitochondrial glutamate carrier 1, GC-1; also glutamate/H+ symporter 1)
  is a member of the SLC25 mitochondrial carrier family (TC 2.A.29). It is a
  multi-pass integral protein of the mitochondrial inner membrane with the canonical
  tripartite mitochondrial-carrier fold (three Solcar repeats, six transmembrane
  helices). Its function is to import L-glutamate from the cytosol into the
  mitochondrial matrix in electroneutral symport with a proton (glutamate is
  co-transported with H+ or exchanged for OH-). This activity supplies matrix
  glutamate for catabolism (deamination, transamination), for ammonia detoxification
  and ureogenesis, and, as the glutamate/H+ import leg, contributes to the
  malate-aspartate shuttle. GC-1 is expressed most highly in brain, liver, and
  pancreas, where it participates in neuronal glutamate handling and in the control of
  glucose-stimulated insulin secretion. Loss-of-function variants that disrupt
  glutamate transport cause autosomal recessive developmental and epileptic
  encephalopathy 3 (DEE3/EIEE3; neonatal myoclonic epilepsy with suppression-burst /
  migrating partial seizures of infancy).
