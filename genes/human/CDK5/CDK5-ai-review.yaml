id: Q00535
gene_symbol: CDK5
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: CDK5 encodes a proline-directed serine/threonine kinase activated by CDK5R1/p35, CDK5R1/p25, and CDK5R2/p39 family regulators, with major functions in neuronal development, neurite and axon growth, cytoskeletal and dendritic-spine dynamics, synaptic vesicle cycling, synaptic plasticity, and p25-linked neurodegenerative apoptosis as a stress/disease context. In the PN autophagy context, the strongest human evidence is substrate-specific regulation of induced neuronal autophagy through phosphorylation of SH3GLB1/endophilin B1; the Drosophila Cdk5-Acinus basal-autophagy evidence is useful orthology context but not direct human CDK5 evidence. Generic protein-binding annotations are over-annotated relative to the more informative kinase-activity, CDK5-complex, substrate-specific, and neuronal process terms.
