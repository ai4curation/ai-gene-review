proposed_new_terms: []
suggested_questions:
- question: What is the physiological significance of PNMT's broader in vitro substrate
    range (phenylethanolamine, octopamine, normetanephrine) relative to its principal
    role in converting noradrenaline to adrenaline?
- question: To what extent do the common coding variants (e.g. Thr98Ala) and 5'-flanking-region
    haplotypes influence adrenaline levels and cardiovascular or neuropsychiatric
    phenotypes in vivo?
suggested_experiments:
- description: Tissue- and cell-type-resolved quantification of PNMT-dependent adrenaline
    synthesis in adrenal medulla versus CNS adrenergic neurons and retina, integrating
    targeted metabolomics with conditional loss-of-function models.
  experiment_type: metabolomics / conditional knockout
- description: Structure-guided characterization of the catalytic mechanism (roles
    of Glu185, Asp267, Glu219) using pre-steady-state kinetics and additional co-crystal
    structures with the physiological substrate noradrenaline.
  experiment_type: enzymology / X-ray crystallography
