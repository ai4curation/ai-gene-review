  label: Homo sapiens
description: 'Phenylethanolamine N-methyltransferase (PNMT) is the cytosolic S-adenosyl-L-methionine
  (SAM)-dependent methyltransferase that catalyzes the terminal step of catecholamine
  biosynthesis: the N-methylation of norepinephrine (noradrenaline) to form epinephrine
  (adrenaline), with SAM as the methyl donor and S-adenosyl-L-homocysteine as the
  by-product. In vitro it also N-methylates related phenylethanolamine substrates,
  including phenylethanolamine, octopamine (yielding synephrine) and normetanephrine.
  The enzyme is a monomeric ~30 kDa protein of the class I-like SAM-binding methyltransferase
  superfamily (NNMT/PNMT/TEMT family) with a canonical Rossmann-like fold, and its
  structure has been solved in numerous complexes with S-adenosyl-L-homocysteine and
  substrate analogs or inhibitors. PNMT is expressed predominantly in the chromaffin
  cells of the adrenal medulla, and also in the retina and discrete adrenergic neurons
  of the central nervous system; its expression is strongly induced by adrenal glucocorticoids.
  By producing adrenaline, PNMT contributes to the physiological control of cardiovascular
  function, metabolism and the stress response.'
