references:
- id: PMID:28739914
  title: "HEMO, an ancestral endogenous retroviral envelope protein shed in the blood of pregnant women and expressed in pluripotent stem cells and tumors."
  findings:
    - statement: HEMO is the oldest known captured full-length env gene in the human genome (>100 million years)
    - statement: Expressed in placental trophoblasts, stem cells, and tumors
    - statement: Secreted form detected in blood of pregnant women
    - statement: Released by specific cleavage upstream of the transmembrane domain
    - statement: Driven by cellular CpG-rich promoter (not related to a retroviral LTR)
    - statement: Gene shows evidence of purifying selection in all simians
- id: PMID:25421890
  title: "Implication of human endogenous retrovirus envelope proteins in placental functions."
  findings:
    - statement: Reviews role of HERV envelope proteins in placental function
    - statement: Context for understanding syncytins alongside other ERV envelope proteins
- id: GO_REF:0000044
  title: Gene Ontology annotation based on UniProtKB/Swiss-Prot Subcellular Location vocabulary mapping
  findings: []
- id: file:human/ERVMER34-1/ERVMER34-1-deep-research-cyberian.md
  title: "Cyberian deep research report on ERVMER34-1/HEMO"
  findings:
    - statement: HEMO interacts with BACE2, an interaction acquired in the primate lineage ~30-45 MYA
    - statement: BACE2 interaction arose through mutations that introduced new cysteines and eliminated furin cleavage site
    - statement: Retains immunosuppressive domain (ISD) despite loss of fusogenic capacity
    - statement: Expression in tumors associated with Wnt/beta-catenin pathway activation
    - statement: CTNNB1 mutations found in 73.6% of HEMO-expressing endometrial cancers vs 1.9% in HEMO-negative
    - statement: Squamous cell carcinomas show particularly high HEMO expression
    - statement: Proposed as cancer biomarker and therapeutic target
- id: file:human/ERVMER34-1/ERVMER34-1-deep-research-falcon.md
  title: "Falcon (Edison Scientific Literature) deep research report on ERVMER34-1/HEMO"
  findings:
    - statement: HEMO is a 563-aa Env-like precursor with N-terminal signal peptide, SU CWLC motif, TM ISD-like region and C-X6-CC motif, 23-aa transmembrane helix, and cytoplasmic tail
    - statement: Canonical furin cleavage motif is mutated to CTQG and an adjacent hydrophobic fusion peptide is absent
    - statement: Ectodomain shedding is metalloproteinase-mediated (ADAM/MMP), inhibited by Batimastat, Marimastat, and GM6001 at ~0.1-10 uM
    - statement: Mature shed form begins at residue 27; mass spectrometry mapped C-terminal cleavage primarily at Q432 and R433 (~4:1 ratio)
    - statement: Membrane anchoring is required for efficient shedding (TM-truncated constructs are not efficiently shed)
    - statement: Major cell-associated SU-TM form ~58 kDa and major shed/soluble form ~48 kDa
    - statement: No fusogenic activity has been detected experimentally
    - statement: No HEMO host receptor or validated signaling pathway is currently established
    - statement: HEMO is transcribed from a CpG-rich, non-LTR host-like promoter under DNA methylation control; >500-fold activity in luciferase assays
    - statement: ISD-like sequence motif is present but direct immunosuppressive activity for HEMO has not been demonstrated
    - statement: Expressed predominantly in first-trimester villous cytotrophoblasts and extravillous trophoblasts, with diffuse syncytiotrophoblast staining
    - statement: Inducible by gamma-irradiation in HNSCC cell lines and proposed as a pan-cancer immunotherapy target
- id: PMID:37892164
  title: "Acquisition and Exaptation of Endogenous Retroviruses in Mammalian Placenta"
  findings:
    - statement: ERVMER34-1/HEMO is expressed in cytotrophoblasts and extravillous trophoblasts in the first gestation and is detected in the blood of pregnant females
    - statement: ERVMER34-1 has no fusion activity and its function is unknown; localization similar to ERVH48-1/Suppressyn motivates an anti-cell-fusion hypothesis
    - statement: ERVMER34-1 was retained in Laurasian and Eurasian theropods, entering the Boreoeutheria genome ~100-120 MYA, with the ORF conserved in all simians and cats
- id: PMID:36979914
  title: "HERVs and Cancer - A Comprehensive Review of the Relationship of Human Endogenous Retroviruses and Human Cancers"
  findings:
    - statement: HEMO (MER34-derived Env) proposed by Heidmann et al. 2017 as a possible marker for ovarian clear-cell carcinoma with histotype dependence
    - statement: ERV3-1 and ERVMER34-1 env induced upon exposure of HNSCC cell lines to gamma-radiation - potential target to overcome radioresistance
    - statement: HEMO envelope gene "hailed as a pan-cancer target" across many solid tumors and leukemias
core_functions:
- description: >-
    Membrane-anchored Env-like precursor undergoing metalloproteinase-mediated
    ectodomain shedding. HEMO is synthesized as a type I transmembrane precursor
    (~58 kDa cell-associated SU-TM form) and a major soluble ~48 kDa ectodomain
    is released by ADAM/MMP-mediated cleavage upstream of the transmembrane
    domain (mass-spectrometry-mapped near Q432/R433). Membrane anchoring is
    required for efficient shedding. The shed form circulates in maternal blood
    during pregnancy at ~1-10 nM. HEMO lacks fusogenic activity (degenerate
    furin site and missing fusion peptide); no host receptor or downstream
    signaling pathway has been demonstrated.
  locations:
    - id: GO:0005576
      label: extracellular region
    - id: GO:0005886
      label: plasma membrane
  supported_by:
    - reference_id: PMID:28739914
      supporting_text: "it is actively shed in the blood circulation in humans via specific cleavage of the precursor envelope protein upstream of the transmembrane domain"
    - reference_id: file:human/ERVMER34-1/ERVMER34-1-deep-research-falcon.md
      supporting_text: "Shedding is **consistent with metalloproteinase-mediated processing** and is inhibited by broad-spectrum **ADAM/MMP inhibitors** (Batimastat, Marimastat, GM6001; dose range shown ~0.1–10 μM) in transfected cells"
    - reference_id: PMID:37892164
      supporting_text: "ERVMER34-1 has no fusion activity, and its function is unknown; however, it localizes in a manner similar to ERVH48-1, suggesting that it may function as an inhibitor of cell fusion"
# Core-function entry for the HEMO-BACE2 interaction REMOVED per PR #691
# review. The claim originates from the cyberian deep-research synthesis
# only, is not corroborated by falcon's independent literature pass, and no
# primary PMID has been identified. Listing it as a core function is
# internally contradictory with the same text acknowledging it is unverified.
# The question is preserved in suggested_questions / suggested_experiments
# below for follow-up.
suggested_questions:
  - question: What is the receptor for secreted HEMO and what signaling pathway does it activate?
  - question: What is the functional consequence of HEMO-BACE2 interaction?
  - question: Does HEMO retain immunosuppressive activity through its ISD domain?
  - question: What is the mechanism linking HEMO expression to Wnt/beta-catenin pathway activation in tumors?
  - question: Why are HEMO blood levels highest in the first trimester?
  - question: What selective pressure has maintained HEMO under purifying selection for >100 million years?
  - question: Does HEMO act as an inhibitor of trophoblast cell fusion (analogous to Suppressyn/ERVH48-1), and if so via what mechanism (receptor competition, paracrine action, or another route)?
  - question: Which specific ADAM/MMP-family metalloproteinase(s) cleave HEMO at Q432/R433 in vivo, and is shedding regulated developmentally or in disease?
suggested_experiments:
  - description: Receptor identification studies using secreted HEMO as bait (pull-down, proximity labeling)
    hypothesis: Secreted HEMO binds to a specific cell surface receptor to mediate signaling
  - description: Immunosuppression assays testing HEMO ISD peptide effects on T cell activation
    hypothesis: The immunosuppressive domain of HEMO retains functional immunomodulatory activity
  - description: BACE2 interaction studies to determine if HEMO is a substrate or regulatory partner
    hypothesis: BACE2 cleaves HEMO or HEMO modulates BACE2 activity
  - description: HEMO knockout/knockdown in trophoblast models to assess placental function
    hypothesis: HEMO is required for normal trophoblast function or placental development
  - description: Correlation studies of HEMO blood levels with pregnancy outcomes
    hypothesis: HEMO levels are predictive of pregnancy complications
