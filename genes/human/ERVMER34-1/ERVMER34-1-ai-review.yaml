id: Q9H9K5
gene_symbol: ERVMER34-1
product_type: PROTEIN
status: IN_PROGRESS
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  ERVMER34-1 encodes HEMO (Human Endogenous MER34 ORF), an ancient endogenous retroviral
  envelope protein that entered mammalian genomes over 100 million years ago. Unlike
  functional retroviral envelope proteins, HEMO has lost fusogenic capacity due to
  mutation of the canonical furin cleavage motif (CTQG instead of R-X-R/K-R) and
  absence of an adjacent hydrophobic fusion peptide; no fusion activity has been
  detected experimentally. The 563-aa precursor exists as both a membrane-anchored
  type I transmembrane protein (~58 kDa cell-associated SU-TM form) and a major
  shed/soluble ~48 kDa ectodomain released by metalloproteinase-mediated cleavage
  (ADAM/MMP-sensitive, blocked by Batimastat, Marimastat, GM6001) upstream of the
  transmembrane domain, with mass-spectrometry-mapped cleavage near Q432/R433.
  Membrane anchoring is required for efficient shedding. HEMO is expressed primarily
  in first-trimester placental cytotrophoblasts and extravillous trophoblasts, in
  early embryos and pluripotent stem/iPSCs, and in various tumors (notably
  ovarian clear-cell carcinoma and HNSCC, where it is inducible by gamma-irradiation
  and proposed as a pan-cancer immunotherapy target). The secreted form circulates
  in maternal blood at ~1-10 nM during pregnancy. HEMO is unusual among ERV-derived
  genes in being transcribed from a CpG-rich, non-LTR host-like promoter under
  epigenetic (DNA methylation) control. HEMO retains a putative immunosuppressive
  domain (ISD) characteristic of gamma-type retroviral envelope proteins, and a
  primate-specific BACE2 interaction has been reported. No validated host receptor
  or signaling pathway has been demonstrated; on the basis of trophoblast
  localization similar to ERVH48-1/Suppressyn, an anti-cell-fusion role has been
  hypothesized but not experimentally established. Expression in some tumors is
  associated with Wnt/beta-catenin pathway activation, particularly CTNNB1
  mutations in endometrial cancers.
existing_annotations:
- term:
    id: GO:0005576
    label: extracellular region
  evidence_type: IEA
  original_reference_id: GO_REF:0000044
  review:
    summary: >-
      The secreted form of HEMO (48 kDa) is released into the extracellular space
      following cleavage upstream of the transmembrane domain (PMID:28739914). This
      secreted form has been detected in the blood of pregnant women. The annotation
      is appropriate for the secreted form of the protein.
    action: ACCEPT
    reason: >-
      UniProt subcellular location indicates the protein has a secreted form
      that is released following proteolytic cleavage. The deep research confirms
      HEMO is actively shed in the blood circulation in humans via specific cleavage
      of the precursor envelope protein upstream of the transmembrane domain
      (PMID:28739914). While GO:0005615 (extracellular space) might be more
      specific for a secreted protein found in blood, GO:0005576 is acceptable
      as a parent term.
    additional_reference_ids:
      - file:human/ERVMER34-1/ERVMER34-1-deep-research-cyberian.md
      - file:human/ERVMER34-1/ERVMER34-1-deep-research-falcon.md
    supported_by:
      - reference_id: PMID:28739914
        supporting_text: "it is actively shed in the blood circulation in humans via specific cleavage of the precursor envelope protein upstream of the transmembrane domain"
      - reference_id: file:human/ERVMER34-1/ERVMER34-1-deep-research-falcon.md
        supporting_text: "Shedding is **consistent with metalloproteinase-mediated processing** and is inhibited by broad-spectrum **ADAM/MMP inhibitors** (Batimastat, Marimastat, GM6001; dose range shown ~0.1–10 μM) in transfected cells"
- term:
    id: GO:0005886
    label: plasma membrane
  evidence_type: IEA
  original_reference_id: GO_REF:0000044
  review:
    summary: >-
      HEMO is a type I transmembrane protein. The protein contains a
      signal peptide (aa 1-26), an extracellular domain (aa 27-488), a transmembrane
      helix (aa 489-509), and a cytoplasmic tail (aa 510-563). The uncleaved form
      at the cell surface represents the major form.
    action: ACCEPT
    reason: >-
      UniProt annotation clearly indicates HEMO is a single-pass type I membrane
      protein localized to the cell membrane. The protein is found at the cell
      surface, with evidence from the deep research confirming plasma membrane
      localization.
    additional_reference_ids:
      - file:human/ERVMER34-1/ERVMER34-1-deep-research-cyberian.md
      - file:human/ERVMER34-1/ERVMER34-1-deep-research-falcon.md
    supported_by:
      - reference_id: PMID:28739914
        supporting_text: "specific cleavage of the precursor envelope protein upstream of the transmembrane domain"
      - reference_id: file:human/ERVMER34-1/ERVMER34-1-deep-research-falcon.md
        supporting_text: "**Membrane anchoring is required** for efficient shedding: constructs truncated before the TM are not shed efficiently"
- term:
    id: GO:0005615
    label: extracellular space
  evidence_type: IDA
  original_reference_id: PMID:28739914
  review:
    summary: >-
      The secreted form of HEMO is detected in blood circulation, particularly
      during pregnancy. This is more specific than GO:0005576 for a protein found in
      blood/interstitial fluid.
    action: NEW
    reason: >-
      Based on identification of HEMO shed in the blood of pregnant women
      (PMID:28739914), GO:0005615 (extracellular space) is a more appropriate
      annotation for the secreted form than the broader GO:0005576. Per GO
      documentation, extracellular space is specifically for gene products
      "secreted from a cell into the interstitial fluid or blood."
    additional_reference_ids:
      - file:human/ERVMER34-1/ERVMER34-1-deep-research-cyberian.md
      - file:human/ERVMER34-1/ERVMER34-1-deep-research-falcon.md
    supported_by:
      - reference_id: PMID:28739914
        supporting_text: "it is actively shed in the blood circulation in humans"
      - reference_id: PMID:37892164
        supporting_text: "ERVMER34-1 is expressed in cytotrophoblasts and extravillous trophoblasts in the first gestation and is detected in the blood of pregnant females"
      - reference_id: file:human/ERVMER34-1/ERVMER34-1-deep-research-falcon.md
        supporting_text: "HEMO is detected in **placental blood** and in **peripheral blood of pregnant women**, reflecting its shed extracellular form"
