  id: Q3ZCQ8-1
- name: 2 (Tim50a)
  id: Q3ZCQ8-2
  sequence_note: VSP_016389
- name: '3'
  id: Q3ZCQ8-3
  sequence_note: VSP_047682, VSP_047683
