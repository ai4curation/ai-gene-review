  review:
    summary: >-
      OSCP is a non-catalytic structural subunit of the ATP synthase peripheral (stator)
      stalk; its molecular function is structural molecule activity, contributing to the
      structural integrity of Complex V. This term is not currently in GOA and is proposed
      here as the correct subunit-level molecular function for OSCP.
    action: NEW
    reason: >-
      The existing GOA molecular-function annotations for OSCP are either the catalytic
      rotational ATP synthase activity (which OSCP contributes_to but does not enable) or
      uninformative protein binding. OSCP's own molecular function is structural: it holds
      the F1 catalytic head static against the rotor. Structural molecule activity
      (GO:0005198) captures this correctly and is used as the core molecular function.
