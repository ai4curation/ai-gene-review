id: P48047
gene_symbol: ATP5PO
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  ATP5PO encodes the oligomycin sensitivity conferral protein (OSCP), also called
  ATP synthase subunit O, the subunit at the top of the peripheral (stator) stalk of
  the mitochondrial F1Fo ATP synthase (Complex V). Synthesized with an N-terminal
  mitochondrial targeting sequence and imported to the mitochondrial inner membrane,
  OSCP caps the soluble F1 catalytic head and, together with the b, d and F6 subunits,
  forms the stationary peripheral stalk that holds the F1 alpha3beta3 catalytic hexamer
  static against the rotating central stalk. This stator function is essential for
  coupling proton flow through the membrane Fo domain to ATP synthesis in F1 and confers
  the complex's sensitivity to the inhibitor oligomycin. OSCP is a structural,
  non-catalytic subunit; its ATP hydrolase activity is only observed as an artificial
  in vitro reverse reaction of the whole complex. Loss-of-function variants cause
  mitochondrial complex V deficiency, and OSCP is implicated in permeability transition
  pore regulation through its interaction with cyclophilin D.
