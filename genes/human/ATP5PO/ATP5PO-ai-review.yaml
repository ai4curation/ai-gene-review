- term:
    id: GO:0046933
    label: proton-transporting ATP synthase activity, rotational mechanism
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: >-
      InterPro2GO annotation asserting OSCP enables the rotational ATP synthase activity.
      OSCP is a non-catalytic structural subunit and does not itself enable this catalytic
      molecular function; the contributes_to formulation (also annotated) is the correct
      one, so the 'enables' assertion over-annotates the subunit.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      OSCP does not catalyze ATP synthesis; it is a stator-stalk structural subunit. The
      'enables' qualifier for the rotary catalytic MF over-assigns catalytic activity to a
      structural subunit. The activity is better represented by the contributes_to
      annotations to the same term, and OSCP's own molecular function is structural
      molecule activity (captured in core_functions).
    supported_by:
    - reference_id: PMID:7490082
      supporting_text: >-
        This ATP5O subunit is a key structural component of the stalk of the mitochondrial
        respiratory chain
