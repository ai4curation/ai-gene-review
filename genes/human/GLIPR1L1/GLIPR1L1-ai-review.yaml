  review:
    summary: >-
      GLIPR1L1 is inferred to act as a nonenzymatic organizer of an
      IZUMO1-containing sperm-surface complex during acrosome remodeling.
    action: ACCEPT
    reason: >-
      Mouse GLIPR1L1 directly co-immunoprecipitates with IZUMO1, occurs with it
      in several high-molecular-weight complexes, and is required for normal
      IZUMO1 redistribution after acrosomal exocytosis. Molecular adaptor
      activity captures this bridging/organizing role without asserting an
      unproven direct fusogenic activity. Transfer to the conserved human
      ortholog is supported by the IBA tree and shared testis-enriched CAP
      architecture.
    supported_by:
    - reference_id: PMID:31672133
      supporting_text: >-
        Firstly, co-immunoprecipitation using the IZUMO1 antibody from lysates of
        acrosome-reacted spermatozoa pulled down GLIPR1L1, and a reciprocal
        co-immunoprecipitation with the GLIPR1L1 antibody successfully isolated IZUMO1
      reference_section_type: RESULTS
    - reference_id: PMID:31672133
      supporting_text: our data show that the movement of IZUMO1 is dependent on GLIPR1L1 function
      reference_section_type: DISCUSSION
    - reference_id: file:human/GLIPR1L1/GLIPR1L1-deep-research-manual.md
      supporting_text: >-
        The core inferred human activity is molecular adaptor activity at
        acrosomal/sperm-head membrane rafts as part of an IZUMO1-containing
        adhesion complex, directly contributing to IZUMO1 localization during
        the acrosome reaction and supporting sperm–egg plasma-membrane fusion.
