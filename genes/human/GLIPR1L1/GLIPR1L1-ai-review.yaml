gene_symbol: GLIPR1L1
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  GLIPR1L1 is a testis-enriched, secretory-pathway CAP/CRISP-family protein
  produced as a precursor with an N-terminal signal peptide and a predicted
  C-terminal GPI anchor. Mammalian ortholog studies place GLIPR1L1 on the sperm
  head plasma membrane, acrosomal region, membrane rafts, and connecting piece.
  In mouse sperm it associates directly with IZUMO1 in maturation-dependent,
  high-molecular-weight oolemma-binding complexes and promotes IZUMO1
  redistribution during the acrosome reaction, thereby supporting optimal
  sperm-oocyte membrane fusion. This role is modulatory rather than essential:
  mouse single-gene loss impairs acrosome reaction and in-vitro fertilization,
  whereas natural fertility remains intact even after deletion of all three
  neighboring Glipr1-like genes. Direct functional characterization of the
  endogenous human protein remains limited.
