suggested_questions:
- question: >-
    Does endogenous human GLIPR1L1 occupy the acrosomal membrane, sperm-head
    plasma membrane rafts, connecting piece, and an IZUMO1-containing complex in
    the same maturation-dependent pattern observed in mouse?
  experts:
  - Brett Nixon
  - Moira O'Bryan
- question: >-
    What molecules besides IZUMO1 contact GLIPR1L1, and does GLIPR1L1 bridge
    partners, organize membrane domains, or directly alter membrane biophysics?
  experts:
  - Brett Nixon
- question: >-
    Do the human GLIPR1L1alpha and GLIPR1L1beta isoforms differ in GPI-anchor
    processing, sperm localization, complex assembly, or acrosome-reaction function?
  experts:
  - Thomas Thompson
- question: >-
    Is human GLIPR1L1 delivered to sperm during spermatogenesis, transferred by
    epididymal extracellular vesicles, or present through both routes?
  experts:
  - Robert Sullivan
suggested_experiments:
- description: >-
    Endogenously tag each GLIPR1L1 isoform in human testis organoids and analyze
    its appearance during germ-cell maturation; complement this with
    super-resolution imaging and detergent-free raft fractionation of donor sperm.
  experiment_type: isoform-specific genome editing, organoid differentiation, microscopy, and membrane proteomics
  hypothesis: >-
    Human GLIPR1L1 is processed into a GPI-anchored sperm-head protein enriched
    in acrosomal membrane rafts, with isoform-dependent abundance or trafficking.
- description: >-
    In donor human sperm, acutely block or enzymatically release GLIPR1L1 and
    quantify progesterone-induced acrosome reaction, IZUMO1 redistribution, and
    binding to recombinant JUNO-bearing supported membranes, with matched
    nonimmune and unrelated GPI-protein controls.
  experiment_type: perturbation, quantitative imaging, flow cytometry, and membrane-binding assay
  hypothesis: >-
    Human GLIPR1L1 promotes acrosome-reaction-dependent IZUMO1 redistribution and
    efficient engagement of an oolemma-like membrane without being absolutely required.
- description: >-
    Reconstitute purified human GLIPR1L1 and IZUMO1 in composition-controlled
    membranes and identify additional partners by cross-linking mass spectrometry;
    test complex formation, lateral redistribution, membrane curvature, and fusion.
