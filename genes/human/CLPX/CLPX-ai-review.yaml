    supporting_text: ATP-dependent chaperone that functions as an unfoldase. As part of
      the ClpXP protease complex, it recognizes specific protein substrates, unfolds them
      using energy derived from ATP hydrolysis, and then translocates them to the proteolytic
      subunit (CLPP) of the ClpXP complex for degradation.
