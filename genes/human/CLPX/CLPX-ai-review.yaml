core_functions:
- description: CLPX is the ATP-dependent unfoldase subunit of the mitochondrial ClpXP protease.
    It recognizes specific matrix protein substrates and, using ATP binding and hydrolysis,
    unfolds them and translocates the polypeptide through its hexameric pore into the CLPP
    proteolytic chamber for degradation, supporting mitochondrial protein quality control.
