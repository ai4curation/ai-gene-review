id: O76031
gene_symbol: CLPX
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: CLPX is the regulatory AAA+ ATPase/unfoldase subunit of the mitochondrial-matrix
  ClpXP protease. It is imported into mitochondria via an N-terminal transit peptide,
  assembles into a homohexameric ring (ATP-dependent), and pairs with two heptameric
  rings of the CLPP peptidase to form the symmetry-mismatched ClpXP protease. Using
  energy from ATP binding and hydrolysis, CLPX recognizes specific substrate proteins,
  unfolds them, and translocates the unfolded polypeptide through its central pore
  into the CLPP proteolytic chamber for degradation, contributing to mitochondrial
  protein quality control. Independently of CLPP-coupled degradation, CLPX also acts
  as a chaperone/unfoldase that remodels and activates δ-aminolevulinate synthase (ALAS)
  by accelerating incorporation of the pyridoxal 5'-phosphate (PLP) cofactor, thereby
  stimulating the first, rate-limiting step of heme biosynthesis and supporting erythropoiesis;
  it also contributes to heme-induced turnover of ALAS, so the balance of activation
  and degradation tunes ALAS activity. CLPX contains a ClpX-type zinc-binding domain
  and a P-loop AAA+ ATPase module, and mutations affecting its ATPase activity cause
  autosomal dominant erythropoietic protoporphyria 2 (EPP2).
