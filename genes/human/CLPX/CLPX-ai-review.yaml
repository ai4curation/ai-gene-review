suggested_questions:
- question: Beyond ALAS, what is the full repertoire of physiological CLPXP substrates in
    the human mitochondrial matrix, and which are degraded versus remodeled/activated?
  experts:
  - Baker TA
  - Dougan DA
- question: Is the CLPP-independent chaperone/unfoldase activity of CLPX (e.g., ALAS activation,
    nucleoid/TFAM regulation) significant enough in human cells to warrant its own MF/BP
    annotations distinct from the ClpXP proteolytic role?
  experts:
  - Kardon JR
  - Paw BH
suggested_experiments:
- hypothesis: CLPX has additional matrix substrates whose degradation or remodeling depends
    on its ATP-driven translocation activity.
  description: Use trapping mutants (Walker B E359A or pore-1 substitutions) to capture and
    identify CLPX-bound substrates by co-immunoprecipitation/mass spectrometry in human
    mitochondria, comparing WT, ATPase-dead, and translocation-defective variants.
  experiment_type: substrate-trapping proteomics
- hypothesis: The balance between CLPX-mediated ALAS activation (PLP incorporation) and ALAS
    turnover determines heme output and EPP2 phenotype severity.
  description: Reconstitute apo-ALAS2 activation and degradation with purified human CLPX/CLPXP
    (WT and G298D), quantifying PLP incorporation, ALAS unfolding/degradation, and ALA/PPIX
    levels in erythroid cell models.
  experiment_type: in vitro reconstitution and erythroid cell metabolic assay
