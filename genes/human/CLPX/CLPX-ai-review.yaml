- id: PMID:10525407
  title: Mitochondrial localization and oligomeric structure of HClpP, the human homologue
    of E. coli ClpP.
  findings:
  - statement: The mammalian homologue of ClpP localizes to the mitochondrial matrix, with
      a tendency to associate with the inner mitochondrial membrane; mitochondrial ClpP
      forms two heptameric rings.
    reference_section_type: ABSTRACT
- id: PMID:11003706
  title: Human and mouse mitochondrial orthologs of bacterial ClpX.
  findings:
  - statement: Human CLPX encodes a 633-aa precursor with an N-terminal mitochondrial transit
      peptide; the tagged protein is imported into mitochondria and contains an AAA+ domain
      and a C4 zinc-finger motif. Expression is highest in skeletal muscle and heart.
    reference_section_type: ABSTRACT
- id: PMID:11923310
  title: Functional proteolytic complexes of the human mitochondrial ATP-dependent
    protease, hClpXP.
  findings:
  - statement: hClpX forms a hexameric ring and hClpP a heptameric ring; together with ATP
      they form a symmetry-mismatched ClpXP complex with ATP-dependent proteolytic and peptidase
      activity. Substrate selection depends solely on the Clp ATPase (CLPX).
    reference_section_type: ABSTRACT
- id: PMID:15522782
  title: Crystallography and mutagenesis point to an essential role for the N-terminus
    of human mitochondrial ClpP.
  findings:
  - statement: The N-terminal peptides of CLPP line the axial channel, positioned to interact
      with unfolded substrates translocated by the associated CLPX chaperone; the CLPX–CLPP
      interaction is essential for ClpX-mediated protein and peptide degradation.
    reference_section_type: ABSTRACT
- id: PMID:16115876
  title: Human mitochondrial ClpP is a stable heptamer that assembles into a tetradecamer
    in the presence of ClpX.
  findings:
  - statement: In the presence of ATP, hClpX binds hClpP and allosterically drives assembly
      of the active tetradecamer, conferring protease activity and greatly increased peptidase
      activity; CLPX thus regulates appearance of CLPP peptidase activity.
    reference_section_type: ABSTRACT
- id: PMID:18063578
  title: The layered structure of human mitochondrial DNA nucleoids.
  findings:
  - statement: CLPX is among the chaperones/metabolic proteins identified in mitochondrial
      DNA nucleoid preparations, consistent with a nucleoid-associated localization.
    reference_section_type: ABSTRACT
- id: PMID:22710082
  title: Substrate recognition and processing by a Walker B mutant of the human mitochondrial
    AAA+ protein CLPX.
  findings:
  - statement: A Walker B mutant (E359A) of human CLPX lacks ATPase activity but still mediates
      casein degradation by hCLPP; most model substrates are recognized by the N-terminal
      domain, and human CLPXP is deregulated by ADEPs.
    reference_section_type: ABSTRACT
- id: PMID:25957689
  title: Mitochondrial ClpX Activates a Key Enzyme for Heme Biosynthesis and Erythropoiesis.
  findings:
  - statement: Mitochondrial ClpX directly activates ALA synthase (ALAS) by accelerating
      ATP-dependent incorporation of the pyridoxal phosphate cofactor into the apoenzyme,
      using its central polypeptide-translocating (unfoldase) activity; this activity is
      conserved from yeast to mammals and is required for efficient erythropoiesis.
    reference_section_type: RESULTS
- id: PMID:28874591
  title: Mutation in human CLPX elevates levels of δ-aminolevulinate synthase and
    protoporphyrin IX to promote erythropoietic protoporphyria.
  findings:
  - statement: A dominant p.Gly298Asp mutation in the CLPX ATPase active site inactivates
      ATPase activity; mutant/WT coassembly yields reduced-activity enzyme that increases
      ALAS stability and ALA/PPIX levels, causing erythropoietic protoporphyria (EPP2).
      CLPX both activates and promotes turnover of ALAS.
    reference_section_type: ABSTRACT
- id: PMID:34800366
  title: Quantitative high-confidence human mitochondrial proteome and its dynamics
    in cellular context.
  findings:
  - statement: CLPX is identified as part of the high-confidence human mitochondrial proteome.
    reference_section_type: RESULTS
