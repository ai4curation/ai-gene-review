- description: CLPX activates the CLPP peptidase. In an ATP-dependent manner it binds CLPP
    heptamers, drives their assembly into the active tetradecamer, and allosterically increases
    CLPP peptidase activity, providing the regulatory ATPase that gives the ClpXP complex
    its substrate specificity.
