    Riboflavin kinase activity: phosphorylation of riboflavin (vitamin B2) by ATP to form
    FMN, releasing ADP, using a divalent metal ion (Zn2+ or Mg2+). This is the first,
    rate-limiting step of FMN/FAD cofactor biosynthesis.
