gene_symbol: RFK
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  RFK (riboflavin kinase, flavokinase; ATP:riboflavin 5'-phosphotransferase; EC 2.7.1.26)
  catalyzes the first committed, rate-limiting step of flavin-cofactor biosynthesis in
  humans: it transfers the gamma-phosphate of ATP to riboflavin (vitamin B2) to form flavin
  mononucleotide (FMN), releasing ADP. FMN is subsequently adenylylated to FAD by FAD
  synthase (FLAD1), so RFK gates the supply of the FMN and FAD prosthetic groups used by
  more than one hundred flavoenzymes. The reaction requires a divalent metal ion (zinc or
  magnesium). The 155-residue human protein is a monomer that adopts a six-stranded
  antiparallel beta-barrel fold characteristic of the riboflavin-kinase family, with an
  active-site "arch" over which phosphoryl transfer occurs and a catalytic glutamate
  nucleophile. It functions in the cytoplasm/cytosol. Beyond its metabolic role, RFK has
  been characterized as a TNF-receptor-1 (TNFRSF1A)-binding protein that couples TNFR1 to
  the NADPH oxidase subunit p22phox (CYBA); by supplying FAD, an essential prosthetic group
  of NADPH oxidase, it is required for TNF-induced reactive oxygen species production.
