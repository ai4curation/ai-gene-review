id: Q96G23
gene_symbol: CERS2
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  CERS2 (ceramide synthase 2; formerly LASS2/LAG1 longevity assurance homolog 2)
  is a multi-pass endoplasmic reticulum membrane enzyme of the sphingosine
  N-acyltransferase (Lag1/Lac1, TLC-domain) family. It catalyzes the N-acylation
  step of ceramide biosynthesis, transferring a fatty acyl chain from acyl-CoA
  onto the amino group of a sphingoid base (sphinganine in the de novo pathway,
  sphingosine in the salvage pathway) to form (dihydro)ceramide. Its defining
  feature is high selectivity for very-long-chain (VLC) acyl-CoAs (C22-C24, up to
  C26), so it produces very-long-chain ceramides. CERS2 is the most highly and
  most broadly expressed of the six mammalian ceramide synthases, with prominent
  expression in liver, kidney and brain, and its very-long-chain ceramides are
  important precursors for the myelin sphingolipids galactosylceramide and
  sulfatide. Acyl-chain selectivity is conferred by a short loop within the
  TLC (TRAM-LAG1-CLN8) domain, and the enzyme is regulated by C-terminal
  phosphorylation and by inhibition from sphingosine 1-phosphate.
