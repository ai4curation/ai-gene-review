id: Q9NXB9
gene_symbol: ELOVL2
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  ELOVL2 (very long chain fatty acid elongase 2) is a multipass endoplasmic
  reticulum membrane enzyme of the ELO family that catalyzes the first and
  rate-limiting condensation step of the microsomal fatty-acid elongation cycle
  (EC 2.3.1.199): condensation of a very-long-chain acyl-CoA with malonyl-CoA to
  form a very-long-chain 3-oxoacyl-CoA, CO2 and CoA. The resulting 3-oxoacyl-CoA
  is subsequently reduced, dehydrated and reduced by the other components of the
  elongase machinery (HSD17B12, HACD1/2, TECR) to extend the acyl chain by two
  carbons per cycle. ELOVL2 is specific for C20 and C22 polyunsaturated
  fatty-acyl-CoAs, with highest activity toward arachidonoyl-CoA (C20:4 n-6). It
  performs the C20->C22->C24 elongations of the omega-6 and omega-3 very-long-chain
  PUFA pathways, and is essential for synthesis of docosahexaenoic acid (DHA)
  via the Sprecher pathway (elongating C22:5 n-3 to C24:5 n-3). ELOVL2-derived
  VLC-PUFAs are important in the retina and in spermatogenesis. The enzyme is
  enriched in liver, testis, brain, placenta and retina, and carries a C-terminal
  di-lysine ER-retention motif.
