- description: >-
    Fatty acid elongase (very-long-chain 3-oxoacyl-CoA synthase, EC 2.3.1.199)
    catalyzing the first, rate-limiting condensation step of the microsomal
    fatty-acid elongation cycle, specific for C20 and C22 polyunsaturated
    acyl-CoA substrates: condenses a very-long-chain polyunsaturated acyl-CoA with
    malonyl-CoA to yield a 3-oxoacyl-CoA, CO2 and CoA.
