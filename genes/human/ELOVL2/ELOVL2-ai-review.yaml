- id: PMID:10970790
  title: Cloning of a human cDNA encoding a novel enzyme involved in the elongation
    of long-chain polyunsaturated fatty acids.
  findings: []
  reference_review:
    relevance: MEDIUM
    correctness: WRONG_IDENTIFIER
    review_notes: >-
      Describes cloning of "HELO1", a 299-aa human PUFA elongase converting C18->C20
      PUFA (gamma-linolenic->dihomo-gamma-linolenic, stearidonic->eicosatetraenoic,
      alpha-linolenic->eicosatrienoic). By chain-length specificity and size this is
      ELOVL5, not ELOVL2 (296 aa; C20/C22 substrates). Reactome uses it to support the
      generic fatty acid elongase MF; the assigned MF (GO:0009922) is nonetheless
      correct for ELOVL2, so the EXP annotation is accepted per policy while noting the
      likely paralog source.
- id: PMID:11734209
  title: Activity of human Delta5 and Delta6 desaturases on multiple n-3 and n-6 polyunsaturated
    fatty acids.
  findings:
  - statement: >-
      Yeast co-expressing human elongase and desaturase genes performed two
      sequential elongations of 20:4n-6 and 20:5n-3, producing 24:4n-6 and 24:5n-3
      (the ELOVL2-type C20->C22->C24 PUFA elongations).
    supporting_text: "elongations, produced 24:4n-6 and 24:5n-3, respectively"
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: >-
      Abstract foregrounds Delta5/Delta6 desaturases, but the elongation steps
      generating 24:4n-6 and 24:5n-3 substrates are the ELOVL2 PUFA elongations;
      supports the elongase MF (UniProt cites it for FUNCTION/CATALYTIC ACTIVITY).
- id: PMID:12371743
  title: Identification and expression of mammalian long-chain PUFA elongation enzymes.
  findings:
  - statement: >-
      Human ELOVL2 expressed in yeast elongated both 20- and 22-carbon PUFA
      (20:4n-6->22:4n-6, 22:4n-6->24:4n-6, 20:5n-3->22:5n-3, 22:5n-3->24:5n-3),
      identifying ELOVL2 as a very-long-chain PUFA-specific elongase in the Sprecher
      pathway for DHA synthesis.
    supporting_text: "the conversion of 20:4n-6 to 22:4n-6, 22:4n-6 to 24:4n-6, 20:5n-3 to 22:5n-3,"
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Primary identification/characterization of human ELOVL2; directly establishes
      the C20/C22 PUFA elongase activity and DHA-pathway role.
- id: PMID:19575253
  title: Development of a high-density assay for long-chain fatty acyl-CoA elongases.
  findings:
  - statement: >-
      In comprehensive substrate profiling, ELOVL2 (and ELOVL5) preferentially
      elongated polyunsaturated fatty acyl-CoAs, whereas ELOVL1/3/6 preferred
      saturated substrates.
    supporting_text: "preferentially elongated the polyunsaturated fatty acyl-CoAs"
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Establishes ELOVL2's PUFA substrate preference; basis for flagging
      saturated/monounsaturated-elongation IBA/IEA terms as over-annotations.
- id: PMID:20937905
  title: ELOVL1 production of C24 acyl-CoAs is linked to C24 sphingolipid synthesis.
  findings:
  - statement: >-
      In-vitro determination of the precise substrate specificities of all seven
      mammalian ELOVLs, including ELOVL2, and ER-membrane localization; the paper's
      C24-sphingolipid/CERS2 link is specific to ELOVL1.
    supporting_text: "we determined the precise substrate specificities of all the"
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Headline gene is ELOVL1, but all ELOVLs (incl. ELOVL2) were assayed; UniProt
      cites it for FUNCTION, CATALYTIC ACTIVITY, SUBCELLULAR LOCATION and TISSUE
      SPECIFICITY of ELOVL2. Supports elongase MF, PUFA/VLCFA processes and ER
      localization; the sphingolipid/CERS2 findings pertain to ELOVL1.
- id: PMID:32296183
  title: A reference map of the human binary protein interactome.
  findings:
  - statement: >-
      Systematic human binary interactome (HuRI) reporting ELOVL2 Y2H interactions
      with FXYD6, IFITM3, MALL and TMEM218; no established functional consequence.
    supporting_text: "reference interactome map of human binary protein interactions, or 'HuRI'."
  reference_review:
    relevance: LOW
    correctness: VERIFIED
    review_notes: >-
      High-throughput binary interactome; supports only bare "protein binding" IPI
      annotations with no functional interpretation for ELOVL2.
- id: PMID:38422897
  title: The 3-hydroxyacyl-CoA dehydratase 1/2 form complex with trans-2-enoyl-CoA
    reductase involved in substrates transfer in very long chain fatty acid elongation.
  findings:
  - statement: >-
      Structural/biochemical study of the VLCFA elongation machinery (ELOVL, KAR,
      HACD, TECR); supports the UniProt-recorded ELOVL2-TECR interaction.
    supporting_text: >-
      the
      VLCFAs elongation machinery is located in ER membrane
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: >-
      Abstract centers on HACD1/2-TECR complex and ELOVL structural similarity;
      UniProt cites it for the ELOVL2 SUBUNIT (Interacts with TECR) claim, which is
      the basis for the PMID:38422897 protein-binding IPI.
