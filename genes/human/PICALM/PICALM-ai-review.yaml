id: Q13492
gene_symbol: PICALM
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: 'PICALM encodes CALM, a ubiquitously expressed ANTH-domain clathrin adaptor that
  binds phosphatidylinositol phosphates, clathrin, AP-2, and selected cargo proteins to promote
  clathrin-coated pit maturation and clathrin-mediated endocytosis. It localizes mainly to
  cytosolic membrane interfaces including plasma membrane clathrin-coated pits, clathrin-coated
  vesicles, Golgi/endosomal compartments, and synaptic vesicle-related membranes. PICALM helps
  determine clathrin-coated vesicle size and membrane curvature, and it sorts small R-SNAREs
  such as VAMP2, VAMP3, and VAMP8 between the plasma membrane and endosomes. Cargo- and tissue-specific
  consequences include transferrin receptor/iron uptake, AMPA receptor trafficking, gamma-secretase
  and APP-related trafficking, amyloid-beta transcytosis across brain endothelium, and association
  with tau pathology.'
