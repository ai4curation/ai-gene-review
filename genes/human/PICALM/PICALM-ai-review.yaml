suggested_experiments:
- description: Rescue PICALM-null human neurons, endothelial cells, and erythroid 
    precursors with endogenous-level wild-type, PIP2-binding-defective, 
    clathrin-binding-defective, and SNARE-binding-defective PICALM variants, then 
    quantify clathrin-coated pit maturation, VAMP cargo sorting, LRP1/amyloid-beta 
    transcytosis, and transferrin receptor uptake.
  hypothesis: PIP2/membrane-curvature, clathrin, and SNARE-binding modules make 
    separable contributions to shared endocytic adaptor function and tissue-specific 
    cargo phenotypes.
  experiment_type: endogenous-rescue separation-of-function trafficking assay
- description: Test whether PICALM directly binds amyloid-beta or instead binds 
    LRP1/cargo complexes during endothelial transcytosis using purified components, 
    LRP1-tail mutants, and live-cell cargo uptake assays.
  hypothesis: PICALM promotes amyloid-beta clearance primarily by recognizing LRP1/cargo
