id: O43708
gene_symbol: GSTZ1
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  GSTZ1 is a cytosolic, homodimeric enzyme of the glutathione transferase (GST)
  superfamily (Zeta class) that is bifunctional. Its principal physiological role
  is maleylacetoacetate isomerase (MAAI; EC 5.2.1.2), catalysing the
  glutathione-dependent cis-trans isomerisation of 4-maleylacetoacetate to
  4-fumarylacetoacetate. This is the penultimate step of the phenylalanine/tyrosine
  catabolic pathway that ultimately yields fumarate and acetoacetate, and it is the
  reaction that gives the gene its "maleylacetoacetate isomerase" name. Glutathione
  serves as an essential cofactor that is regenerated during the isomerisation. As a
  canonical member of the GST family the enzyme also possesses classical glutathione
  S-transferase activity (EC 2.5.1.18), although its conjugating activity toward
  standard GST substrates is weak, and it has low glutathione peroxidase activity
  toward organic hydroperoxides. GSTZ1 is the enzyme responsible for the glutathione-
  dependent biotransformation (dehalogenation/oxygenation) of the drug and
  environmental contaminant dichloroacetate (DCA) to glyoxylate; DCA inactivates
  GSTZ1 in a mechanism-based manner, so repeated DCA exposure reduces its own
  clearance. The enzyme is predominantly cytosolic but is also found in the
  mitochondrial matrix. It is most highly expressed in liver and kidney (where
  tyrosine catabolism is active) but is expressed broadly across tissues. Loss of
  GSTZ1/MAAI function causes maleylacetoacetate isomerase deficiency, a biochemically
  mild, generally benign inborn error characterised by elevated succinylacetone (and
  maleylacetone) in blood and urine, usually detected on newborn screening, rather
  than a severe tyrosinemia.
