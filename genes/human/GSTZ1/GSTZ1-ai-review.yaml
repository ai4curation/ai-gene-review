- term:
    id: GO:0016034
    label: maleylacetoacetate isomerase activity
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: enables
  review:
    summary: >-
      Phylogenetic (IBA) inference of maleylacetoacetate isomerase (MAAI) activity, the
      defining and core molecular function of GSTZ1. This is well supported by direct
      biochemical characterisation of the human enzyme and by the Zeta-class panel.
    action: ACCEPT
    reason: >-
      MAAI activity is the primary physiological function of GSTZ1 and is directly
      demonstrated for the human recombinant enzyme (see the IDA annotation from
      PMID:10739172). The IBA correctly captures the ancestral, conserved function of
      the Zeta family.
    supported_by:
