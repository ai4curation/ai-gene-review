  original_reference_id: GO_REF:0000041
  qualifier: involved_in
  review:
    summary: >-
      L-tyrosine catabolic process is not present as a GOA line but is the biological
      process most directly served by GSTZ1: MAAI catalyses the penultimate step of
      tyrosine degradation. UniProt annotates GSTZ1 to this process (keyword: Tyrosine
      catabolism; DR GO:0006572, UniProtKB-KW) and the enzyme is named for this pathway.
    action: NEW
    reason: >-
      Tyrosine catabolism is the specific pathway in which the maleylacetoacetate
      isomerase reaction operates (maleylacetoacetate and fumarylacetoacetate are
      tyrosine-degradation intermediates). This process should be annotated for GSTZ1
      and is used in the core function; the phenylalanine catabolic process annotations
      capture the shared upstream route but not the tyrosine-specific one.
    supported_by:
    - reference_id: PMID:10373324
      supporting_text: >-
        The gene for maleylacetoacetate isomerase (MAAI) (EC 5.2.1.2) was the last gene
        in the mammalian phenylalanine/tyrosine catabolic pathway to be cloned
core_functions:
- description: >-
    GSTZ1 is maleylacetoacetate isomerase (MAAI), the enzyme catalysing the
    glutathione-dependent cis-trans isomerisation of 4-maleylacetoacetate to
    4-fumarylacetoacetate (EC 5.2.1.2). This is the penultimate (fifth) step of the
    phenylalanine/tyrosine catabolic pathway and is the principal physiological role
    of the protein.
  molecular_function:
    id: GO:0016034
    label: maleylacetoacetate isomerase activity
  directly_involved_in:
