      supporting_text: >-
        characterize at the cDNA level the human gene for maleylacetoacetate isomerase
        (MAAI, EC 5.2.1.2), the only as yet unidentified structural gene of the
        phenylalanine catabolic pathway
- term:
    id: GO:0004364
    label: glutathione transferase activity
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: enables
  review:
    summary: >-
      Phylogenetic (IBA) inference of glutathione transferase activity, reflecting
      GSTZ1's membership in the GST superfamily. The activity is genuine but weak
