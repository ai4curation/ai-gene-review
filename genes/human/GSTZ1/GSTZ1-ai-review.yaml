    supporting_text: >-
      a cytosolic enzyme that converts DCA to glyoxylate
  - reference_id: PMID:9396740
    supporting_text: >-
      has minimal glutathione-conjugating activity with ethacrynic acid and
      7-chloro-4-nitrobenz-2-oxa-1, 3-diazole
proposed_new_terms: []
suggested_questions:
- question: >-
    Given that MAAI is expressed ubiquitously whereas the full phenylalanine/tyrosine
    catabolic pathway is restricted to liver and kidney, does GSTZ1 have a distinct
    physiological role in non-hepatic tissues?
- question: >-
    What is the relative contribution of the cytosolic versus mitochondrial matrix
    pools of GSTZ1 to dichloroacetate biotransformation and to tyrosine catabolism
    in vivo?
suggested_experiments:
- description: >-
    Metabolic flux and metabolomic profiling of GSTZ1-knockout cells and MAAID patient
    samples to quantify accumulation of maleylacetoacetate/maleylacetone and downstream
    succinylacetone.
  hypothesis: >-
    Loss of GSTZ1 MAAI activity diverts tyrosine catabolism to produce
    maleylacetone and succinylacetone without causing severe fumarylacetoacetate-driven
    toxicity, consistent with the benign MAAID phenotype.
- description: >-
    Compartment-specific (cytosol vs mitochondrial matrix) activity assays and targeting
    experiments to determine how GSTZ1 reaches the mitochondrial matrix and whether the
    matrix pool contributes meaningfully to DCA clearance.
  hypothesis: >-
    The mitochondrial matrix pool of GSTZ1 arises from dual localisation of the same
    cytosolic protein and contributes a minor fraction of total DCA biotransformation.
