  supported_by:
  - reference_id: PMID:10739172
    supporting_text: >-
      GSTZ1a-1a displayed differences in activity towards several substrates compared
      with GSTZ1b-1b and GSTZ1c-1c, including 3.6-fold higher activity towards
      dichloroacetate
  - reference_id: PMID:9417084
    supporting_text: >-
      maleylacetoacetate isomerase (MAAI, EC 5.2.1.2), the only as yet unidentified
      structural gene of the phenylalanine catabolic pathway
- description: >-
    As a member of the glutathione transferase superfamily (Zeta class), GSTZ1 has
    glutathione transferase activity (EC 2.5.1.18) and is the enzyme responsible for
    the glutathione-dependent biotransformation of the drug/xenobiotic dichloroacetate
    to glyoxylate. Conjugating activity toward classical GST substrates is weak, so
    this is a secondary function relative to the MAAI role.
  molecular_function:
    id: GO:0004364
    label: glutathione transferase activity
  directly_involved_in:
