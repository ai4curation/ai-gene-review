      cytosol localization in GOA.
- id: PMID:30293783
  title: ZNF598 Is a Quality Control Sensor of Collided Ribosomes.
  findings:
  - statement: The minimal unit engaged by ZNF598 is the collided di-ribosome; ZNF598 uses
      ribosome collisions as the proxy for stalling and ubiquitinates targets at the 40S-40S
      interface.
    reference_section_type: ABSTRACT
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: Defines ZNF598 as the collision sensor and the structural basis of recognition.
