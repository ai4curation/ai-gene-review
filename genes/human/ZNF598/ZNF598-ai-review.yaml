id: Q86UK7
gene_symbol: ZNF598
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: ZNF598 is a cytosolic RING-type E3 ubiquitin-protein ligase (EC 2.3.2.27), the
  human ortholog of yeast Hel2/RQT1, that initiates ribosome-associated quality control (RQC)
  by acting as the sensor of ribosome collisions. When a trailing ribosome catches up with a
  slower or stalled leading ribosome (for example during translation of poly(A) stretches or
  other problematic sequences), ZNF598 specifically recognizes and binds the resulting collided
  di-ribosome (disome) via its extensive 40S-40S interface. Using the E2 enzyme UBE2D3, it then
  monoubiquitinates the 40S ribosomal proteins eS10 (RPS10) and uS3 (RPS3) and adds K63-linked
  polyubiquitin to uS10 (RPS20). This ubiquitin mark recruits the RQT (ribosome quality control
  trigger) complex, which dissociates the stalled ribosome into subunits and commits the nascent
  chain to the downstream RQC degradation machinery. ZNF598 is also an RNA-binding protein and a
  component of the 4EHP-GYF2 complex (with EIF4E2 and GIGYF2), acting as an adaptor that recruits
  this translational repressor to defective mRNAs and contributing to translation-coupled mRNA
  decay; it has additional reported roles as a negative regulator of interferon-stimulated gene
  expression. ZNF598 acts in the cytosol in association with cytosolic ribosomes.
