core_functions:
- description: RING-type E3 ubiquitin ligase that, on collided ribosomes, monoubiquitinates the
    40S proteins eS10 (RPS10) and uS3 (RPS3) and adds K63-linked polyubiquitin to uS10 (RPS20),
    using the E2 enzyme UBE2D3, to initiate ribosome-associated quality control.
  molecular_function:
    id: GO:0061630
    label: ubiquitin protein ligase activity
  locations:
  - id: GO:0022626
    label: cytosolic ribosome
  supported_by:
  - reference_id: file:human/ZNF598/ZNF598-uniprot.txt
    supporting_text: mediates monoubiquitination of 40S ribosomal proteins RPS10/eS10 and
      RPS3/uS3, and 'Lys-63'-linked polyubiquitination of RPS20/uS10
  - reference_id: PMID:28065601
    supporting_text: two sites of mono-ubiquitination on the 40S protein eS10 as the primary
      ribosomal target of ZNF598
- description: Sensor of ribosome collisions that specifically recognizes and binds the collided
    di-ribosome (disome), using collisions as the proxy for aberrant translation to trigger RQC.
  molecular_function:
    id: GO:0170011
    label: stalled ribosome sensor activity
  locations:
  - id: GO:0022626
    label: cytosolic ribosome
  supported_by:
  - reference_id: PMID:30293783
    supporting_text: ZNF598 Is a Quality Control Sensor of Collided Ribosomes
  - reference_id: file:human/ZNF598/ZNF598-uniprot.txt
    supporting_text: specifically recognizes and binds collided di-ribosome
proposed_new_terms: []
suggested_questions:
- question: Why does human ZNF598 preferentially monoubiquitinate eS10 while the K63
    polyubiquitination of uS10 is the signal that recruits the RQT complex - are these sequential
    or parallel marks?
- question: How is ZNF598's collision-sensor ubiquitin ligase role coordinated with its 4EHP-GYF2
    adapter function on the same defective mRNAs?
suggested_experiments:
- description: Reconstitute ubiquitination of purified collided di-ribosomes with ZNF598 and
    UBE2D3 to define the order and dependence of eS10/uS3 monoubiquitination versus uS10 K63
    polyubiquitination.
- description: Separation-of-function ZNF598 mutants (ligase-dead vs collision-binding-deficient
    vs 4EHP-GYF2-binding-deficient) tested for RQC, mRNA decay, and ISG regulation to dissect its
    multiple activities.
