  findings:
  - statement: ZNF598 is the ubiquitin ligase required for ribosomes to terminally stall on
      poly(A) sequences, and it monoubiquitinates the 40S protein eS10 as its primary target,
      initiating RQC.
    reference_section_type: ABSTRACT
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: Foundational study identifying ZNF598 as the RQC-initiating ribosomal ubiquitin
      ligase and eS10 as its target.
- id: PMID:28132843
  title: ZNF598 and RACK1 Regulate Mammalian Ribosome-Associated Quality Control Function by
    Mediating Regulatory 40S Ribosomal Ubiquitylation.
  findings:
  - statement: ZNF598 (with RACK1) mediates regulatory 40S ribosomal ubiquitylation required for
      mammalian RQC.
    reference_section_type: ABSTRACT
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: Independent confirmation of ZNF598-mediated 40S ubiquitylation in RQC.
- id: PMID:28685749
  title: The E3 ubiquitin ligase and RNA-binding protein ZNF598 orchestrates ribosome-associated
    quality control of bacterial poly(A) mRNAs.
  findings:
  - statement: ZNF598 is an E3 ligase and RNA-binding protein that, using the E2 UBE2D3, triggers
      ubiquitination of ribosomal proteins to initiate RQC on poly(A) segments.
    reference_section_type: ABSTRACT
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: Establishes the ZNF598-UBE2D3 E2-E3 pair and dual ligase/RNA-binding nature.
- id: PMID:28757607
  title: Ubiquitination of stalled ribosome triggers ribosome-associated quality control.
  findings:
