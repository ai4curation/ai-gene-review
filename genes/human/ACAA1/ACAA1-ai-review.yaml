core_functions:
- description: >-
    Peroxisomal 3-ketoacyl-CoA thiolase activity: using coenzyme A, ACAA1 cleaves a straight-chain
    3-oxoacyl-CoA (3-ketoacyl-CoA) into an acyl-CoA shortened by two carbons plus acetyl-CoA (EC
    2.3.1.16), the final step of each round of the peroxisomal fatty-acid beta-oxidation spiral. It
    acts on short-, medium-, long-, and very-long-chain straight substrates and functions as a
    homodimer in the peroxisomal matrix.
