id: P09110
gene_symbol: ACAA1
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  ACAA1 (peroxisomal 3-ketoacyl-CoA thiolase; peroxisomal thiolase 1) is a peroxisomal-matrix
  enzyme that catalyzes the final, thiolytic-cleavage step of the peroxisomal fatty-acid
  beta-oxidation spiral. Using coenzyme A, it cleaves a 3-oxoacyl-CoA (3-ketoacyl-CoA) into an
  acyl-CoA shortened by two carbons plus acetyl-CoA (acetyl-CoA C-acyltransferase / 3-ketoacyl-CoA
  thiolase, EC 2.3.1.16). It acts on straight-chain substrates across short, medium, long, and
  very-long chain lengths in the ACOX1/EHHADH-HSD17B4 spiral, whereas the branched-chain and
  bile-acid thiolytic step is carried by the separate SCPx/SCP2 thiolase. Through this activity
  ACAA1 supports degradation of very-long-chain fatty acids and contributes to peroxisomal
  chain-shortening reactions in polyunsaturated fatty acid metabolism, including the retroconversion
  of C24:6n-3 to docosahexaenoic acid (DHA). ACAA1 is synthesized in the cytosol with a cleavable
  N-terminal PTS2 targeting signal that is recognized by the receptor PEX7 (with co-receptor PEX5L)
  and mediates import into the peroxisomal matrix, where the signal is removed and the enzyme
  functions as a homodimer. It is expressed broadly with enrichment in liver and kidney, and its
  deficiency impairs peroxisomal beta-oxidation.
