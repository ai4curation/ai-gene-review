  id: NCBITaxon:9606
  label: Homo sapiens
description: COX6A2 (cytochrome c oxidase subunit 6A2, mitochondrial; also called cytochrome
  c oxidase polypeptide VIa-heart / VIA-muscle) is the heart- and skeletal-muscle-specific
  nuclear-encoded structural (supernumerary) subunit 6A of mitochondrial respiratory
  Complex IV (cytochrome c oxidase), the terminal enzyme of the electron transport
  chain. It is a small, single-pass protein of the mitochondrial inner membrane and
  is non-catalytic; the catalytic core of Complex IV is formed by the three mitochondrially
  encoded subunits MT-CO1, MT-CO2 and MT-CO3. COX6A2 sits at the monomer-monomer interface
  of the complex and contributes to Complex IV assembly, stabilization and dimerization,
  and to modulation of oxidative phosphorylation. COX6A1 is the ubiquitously expressed
  paralogous isoform, whereas COX6A2 expression is restricted to heart and skeletal
  muscle. Biallelic loss-of-function variants in COX6A2 cause an autosomal recessive,
  muscle-specific mitochondrial complex IV (cytochrome c oxidase) deficiency (MC4DN18),
  presenting with infantile hypotonia and muscle weakness and, in some patients, respiratory
  insufficiency and cardiomyopathy, with reduced Complex IV levels and activity in
  skeletal muscle.
