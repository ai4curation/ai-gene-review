- term:
    id: GO:0030234
    label: enzyme regulator activity
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: enables
  review:
    summary: This IBA molecular-function annotation frames COX6A2 as a regulator of
      the cytochrome c oxidase enzyme. COX6A2 is, however, a non-catalytic structural
      (supernumerary) subunit whose characterized role is in assembly and stabilization
      of the complex rather than as a classical enzyme regulator. A structural molecule
      activity term more accurately captures its molecular function.
    action: MODIFY
    reason: UniProt describes COX6A2 as playing a role in assembly and stabilization
      of Complex IV, consistent with a scaffolding/structural role rather than enzyme
      regulation. Structural molecule activity (GO:0005198) better reflects the molecular
      contribution of this non-catalytic supernumerary subunit; it may additionally
      contribute to the overall cytochrome-c oxidase activity of the assembled complex.
    proposed_replacement_terms:
    - id: GO:0005198
      label: structural molecule activity
    supported_by:
