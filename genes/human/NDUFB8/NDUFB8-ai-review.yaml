      Systematic gene-editing knockout of each of the 45 human Complex I subunits
      with quantitative proteomics showed that 25 accessory subunits are strictly
      required for assembly of a functional complex, and that loss of each subunit
      destabilizes other subunits in the same structural module. NDUFB8 is one of
      these accessory subunits.
    reference_section_type: ABSTRACT
    supporting_text: "required for assembly of a functional complex and 1 subunit is essential for"
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
