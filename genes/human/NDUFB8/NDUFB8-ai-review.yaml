gene_symbol: NDUFB8
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  NDUFB8 (Complex I-ASHI) is a nuclear-encoded accessory (supernumerary) subunit
  of the mitochondrial respiratory chain NADH:ubiquinone oxidoreductase (Complex
  I), the first and largest enzyme of the electron transport chain. Complex I
  couples oxidation of NADH and reduction of ubiquinone to translocation of
  protons across the mitochondrial inner membrane, generating the proton-motive
  force used for ATP synthesis. NDUFB8 is a stable structural subunit of the
  distal membrane arm (ND4/ND5 module) of the mature holoenzyme; it is a
  single-pass inner-membrane protein whose soluble domain faces the matrix, and
  it is not itself catalytic. As one of the 45 subunits of human Complex I, it
  is required for proper assembly and stability of a functional complex, and its
  loss destabilizes neighbouring subunits of the same structural module.
  Biallelic loss-of-function variants in NDUFB8 cause mitochondrial complex I
  deficiency (Leigh-like encephalomyopathy, MC1DN32). Its cleaved N-terminal
  mitochondrial targeting presequence directs import into mitochondria.
