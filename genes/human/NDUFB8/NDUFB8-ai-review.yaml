core_functions:
- description: >-
    NDUFB8 (Complex I-ASHI) is a non-catalytic accessory/supernumerary structural
    subunit of the distal membrane arm of mitochondrial respiratory Complex I. It
    is a single-pass integral protein of the inner mitochondrial membrane whose
    soluble portion faces the matrix. Its molecular role is structural: it is one
    of the 45 subunits required for correct assembly and stability of the mature
    holoenzyme, and its loss destabilizes neighbouring subunits of the same
    module. It does not itself carry out electron transfer; through its structural
    contribution to the assembled complex it participates in mitochondrial
    electron transport from NADH to ubiquinone and in Complex I biogenesis.
  molecular_function:
    id: GO:0005198
    label: structural molecule activity
  contributes_to_molecular_function:
    id: GO:0008137
    label: NADH dehydrogenase (ubiquinone) activity
  directly_involved_in:
