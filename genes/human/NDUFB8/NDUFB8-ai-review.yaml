    label: mitochondrial inner membrane
  in_complex:
    id: GO:0045271
    label: respiratory chain complex I
  supported_by:
  - reference_id: file:human/NDUFB8/NDUFB8-uniprot.txt
    supporting_text: "chain NADH dehydrogenase (Complex I), that is believed not to be"
  - reference_id: PMID:27626371
    supporting_text: "required for assembly of a functional complex and 1 subunit is essential for"
  - reference_id: PMID:12611891
    supporting_text: "homologues of 42 polypeptides detected so far in the more extensively studied"
suggested_questions:
- question: >-
    Beyond its structural role, does NDUFB8 contribute to regulation of Complex I
    activity, stability, or turnover (e.g. under oxidative stress), or is its
    function purely as a scaffold component of the membrane arm?
- question: >-
    Do the disease-associated NDUFB8 variants (MC1DN32) act purely by
    destabilizing the assembled complex, or do any perturb membrane-arm assembly
    intermediates specifically?
suggested_experiments:
- description: >-
    Quantitative complexome profiling (BN-PAGE/mass spectrometry) of NDUFB8
    knockout versus wild-type cells to define which Complex I subassembly
    intermediates accumulate and which neighbouring subunits are destabilized.
- description: >-
    Structure-guided assessment of MC1DN32 missense variants (e.g. by cryo-EM or
    stability assays of a reconstituted membrane-arm module) to distinguish
    assembly defects from steady-state complex destabilization.
