  title: Endoplasmic reticulum oxidoreductin 1-lbeta (ERO1-Lbeta), a human gene induced in the course of the unfolded protein response.
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: "Cached publications/PMID_10818100.md title matches YAML; original identification of ERO1B as an ER oxidoreductin generating oxidative ER conditions. GOA anchors this PMID to ER localization (GO:0005783) and protein folding (GO:0006457)."
  findings:
  - statement: ERO1-Lbeta is a human EROs-family gene primarily localized to the ER, able to generate oxidative conditions in the ER (complementing the yeast ero1-1 mutant), with a distinct tissue distribution from ERO1-L and uniquely induced during the unfolded protein response.
    reference_section_type: ABSTRACT
