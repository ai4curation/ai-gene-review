suggested_questions:
- question: How is the division of labor between ERO1B and ERO1A (and PRDX4) established in pancreatic beta cells, and how essential is ERO1B specifically for proinsulin oxidative folding and insulin secretion?
- question: Does the looser regulation of ERO1B relative to ERO1A make secretory tissues more vulnerable to ER oxidative stress, and how is its activity feedback-controlled in vivo?
suggested_experiments:
- description: Beta-cell-specific knockout or knockdown of ERO1B (alone and combined with ERO1A) followed by assays of proinsulin folding, insulin secretion and ER redox state to test its role in glucose homeostasis.
- description: Comparative enzymology of purified ERO1B versus ERO1A measuring O2 consumption, H2O2 production and PDI-isoform substrate preference, including the regulatory-disulfide mutants (e.g. Cys130) that govern feedback control.
