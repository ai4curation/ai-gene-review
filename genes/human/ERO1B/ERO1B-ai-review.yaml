  title: 'Generating disulfides enzymatically: reaction products and electron acceptors of the endoplasmic reticulum thiol oxidase Ero1p.'
  findings:
  - statement: Characterizes the ER thiol oxidase Ero1 mechanism of enzymatic disulfide generation and electron acceptors (oxidase chemistry).
    reference_section_type: ABSTRACT
- id: PMID:20802462
  title: Disulphide production by Ero1α-PDI relay is rapid and effectively regulated.
  findings: []
- id: PMID:21091435
  title: The endoplasmic reticulum sulfhydryl oxidase Ero1β drives efficient oxidative protein folding with loose regulation.
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: "Cached publications/PMID_21091435.md title matches YAML; biochemically establishes the core MF — recombinant Ero1β is a sulfhydryl oxidase that oxidizes PDI and drives oxidative folding. GOA anchors this PMID to GO:0016971/GO:0016972 (flavin-dependent sulfhydryl oxidase, EXP/IDA) and GO:0015035."
  findings:
  - statement: Recombinant human Ero1β is twice as active as Ero1α, oxidizes PDI more efficiently than other PDI family members, drives oxidative protein folding preferentially via the a domain of PDI, and is loosely regulated (Cys130 critical for feedback); it is constitutively expressed in professional secretory tissues and UPR-induced.
    reference_section_type: ABSTRACT
