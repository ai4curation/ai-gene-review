id: P29401
gene_symbol: TKT
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  TKT encodes transketolase (EC 2.2.1.1), a thiamine-diphosphate (TPP/ThDP)- and
  divalent-cation (Mg2+; also Ca2+/Mn2+/Co2+)-dependent enzyme of the non-oxidative
  branch of the pentose phosphate pathway. It reversibly transfers a two-carbon
  glycolaldehyde (ketol) unit from a ketose donor to an aldose acceptor via a covalent
  ThDP intermediate, interconverting sugar phosphates. It catalyses
  xylulose-5-phosphate + ribose-5-phosphate <-> sedoheptulose-7-phosphate +
  glyceraldehyde-3-phosphate, and xylulose-5-phosphate + erythrose-4-phosphate <->
  fructose-6-phosphate + glyceraldehyde-3-phosphate, thereby linking the pentose
  phosphate pathway to glycolysis and balancing the cell's supply of ribose-5-phosphate
  (for nucleotide synthesis) against NADPH regeneration. The active enzyme is a
  cytosolic homodimer with two active sites at the dimer interface, each binding one
  ThDP and one divalent metal ion. Erythrocyte transketolase activity is a classic
  clinical index of thiamine (vitamin B1) status. Autosomal-recessive transketolase
  deficiency causes a syndrome of short stature, developmental delay, and congenital
  heart defects.
