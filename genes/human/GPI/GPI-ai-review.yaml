id: P06744
gene_symbol: GPI
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: Glucose-6-phosphate isomerase (phosphoglucose isomerase, PGI; EC 5.3.1.9)
  catalyzes the reversible aldose-ketose interconversion of glucose-6-phosphate and
  fructose-6-phosphate, the second step of glycolysis and the corresponding reverse
  step of gluconeogenesis. The catalytically active form is a cytosolic homodimer.
  GPI is a classic moonlighting protein; the same polypeptide, when secreted, acts
  extracellularly as a cytokine and growth factor known historically as neuroleukin
  (a neurotrophic factor and inducer of immunoglobulin secretion), autocrine motility
  factor (AMF, an angiogenic factor that stimulates cell and endothelial motility via
  the cell-surface receptor gp78/AMFR), and maturation factor. Loss-of-function
  variants cause glucose-6-phosphate isomerase deficiency, an autosomal recessive
  hereditary nonspherocytic hemolytic anemia sometimes accompanied by neurological
  impairment.
