proposed_new_terms: []
suggested_questions:
- question: Is the by-similarity anomerase/C2-epimerase activity of human GPI physiologically
    significant, or an in vitro artifact of the isomerase mechanism?
- question: To what extent does the secreted neuroleukin/AMF cytokine pool contribute
    to human physiology (immunity, angiogenesis, neurotrophic support) versus being
    predominantly a cancer-associated moonlighting activity?
suggested_experiments:
- description: Quantify the secreted (monomeric AMF/neuroleukin) versus cytosolic (dimeric
    enzyme) pools of GPI across cell types and correlate secretion with CK2 phosphorylation
    at Ser-185.
- description: Structure-function analysis of CNSHA4 disease variants to dissect effects
    on catalytic activity, dimer stability, and cytokine (gp78-binding) activity.
