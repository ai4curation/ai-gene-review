core_functions:
- description: >-
    NDUFB7 (B18) acts as a non-catalytic, twin-CX9C structural subunit of the
    membrane (proximal) arm of mitochondrial respiratory chain Complex I. It is a
    peripheral inner-membrane protein located at the intermembrane-space surface of
    the complex, imported and oxidatively folded via the MIA40 disulfide relay, and
    it helps stabilize the membrane domain and is required for assembly of a
    functional holoenzyme. It contributes to, but does not itself catalyze, the
    complex-level NADH:ubiquinone oxidoreductase activity.
  supported_by:
  - reference_id: file:human/NDUFB7/NDUFB7-uniprot.txt
    supporting_text: "Accessory subunit of the mitochondrial membrane respiratory"
