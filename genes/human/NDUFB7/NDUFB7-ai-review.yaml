gene_symbol: NDUFB7
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  NDUFB7 (also known as Complex I-B18, CI-B18, and the NADH-ubiquinone
  oxidoreductase B18 subunit) is a nuclear-encoded accessory (supernumerary)
  subunit of mitochondrial respiratory chain Complex I (NADH:ubiquinone
  oxidoreductase), the first and largest enzyme of the oxidative phosphorylation
  system. It is a non-catalytic structural subunit: electron transfer from NADH to
  ubiquinone, coupled to proton translocation across the inner membrane, is
  performed by the conserved core subunits (which bind FMN and iron-sulfur
  clusters), while NDUFB7 and the other accessory subunits contribute to assembly,
  stability, and structural integrity of the holoenzyme. NDUFB7 is a twin CX9C
  protein containing two C-X9-C motifs that fold into a helix-coil-helix (CHCH)
  domain stabilized by two intramolecular disulfide bonds; it is imported and
  oxidatively folded via the MIA40/CHCHD4 disulfide-relay pathway of the
  mitochondrial intermembrane space. The mature protein is a peripheral
  inner-membrane protein located at the intermembrane-space surface of the membrane
  (proximal) arm of Complex I, where it (together with NDUFA8) is thought to help
  stabilize the membrane domain. It also carries an N-terminal N-myristoyl glycine
  lipid modification. Biallelic loss-of-function variants in NDUFB7 cause
  autosomal-recessive mitochondrial complex I deficiency nuclear type 39 (MC1DN39),
  with reduced Complex I assembly and activity, presenting as congenital lactic
  acidosis and hypertrophic cardiomyopathy.
