core_functions:
- description: >-
    Rate-limiting glutamine--fructose-6-phosphate aminotransferase of the hexosamine
    biosynthetic pathway: transfers the amido nitrogen of L-glutamine to D-fructose
    6-phosphate, producing D-glucosamine 6-phosphate and L-glutamate. This is the
    committed first step controlling flux into UDP-GlcNAc synthesis; the enzyme is
    feedback-inhibited by UDP-GlcNAc, less strongly than the paralog GFPT1.
  molecular_function:
    id: GO:0004360
    label: L-glutamine:D-fructose-6-phosphate transaminase (isomerizing) activity
