- term:
    id: GO:0006112
    label: energy reserve metabolic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000117
  qualifier: involved_in
  review:
    summary: >-
      ARBA electronic annotation to "energy reserve metabolic process" (glycogen/
      starch-type energy stores). GFAT2 feeds the hexosamine biosynthetic pathway,
      an anabolic branch of glycolysis that produces the glycosylation precursor
      UDP-GlcNAc; it is not part of energy-reserve (glycogen) metabolism. This is a
      clearly incorrect electronic inference.
    action: REMOVE
    reason: >-
      GFAT2 diverts fructose 6-phosphate into hexosamine/UDP-GlcNAc biosynthesis, not
      into energy-reserve (glycogen/starch) metabolism; the ARBA mapping is wrong.
