id: O94808
gene_symbol: GFPT2
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  GFPT2 (glutamine--fructose-6-phosphate aminotransferase [isomerizing] 2, GFAT2;
  EC 2.6.1.16) is a cytosolic amidotransferase that catalyzes the first and
  rate-limiting step of the hexosamine biosynthetic pathway (HBP), transferring an
  amino group from L-glutamine to D-fructose 6-phosphate to form D-glucosamine
  6-phosphate and L-glutamate. It is one of two mammalian GFPT/GFAT paralogs,
  sharing ~75-80% amino-acid identity with the ubiquitously expressed GFPT1. The
  glucosamine 6-phosphate it produces enters a short pathway that culminates in
  UDP-N-acetylglucosamine (UDP-GlcNAc), the activated sugar donor for N- and O-linked
  protein glycosylation and O-GlcNAcylation, so GFPT2 controls the flux of glucose
  into these glycosylation-precursor pools. The enzyme is composed of an N-terminal
  glutamine amidotransferase (class-2) domain and two C-terminal SIS
  (sugar-isomerase) domains, and it is feedback-inhibited by the end product
  UDP-GlcNAc, although less strongly than GFPT1. Unlike the ubiquitous GFPT1, GFPT2
  has a more restricted expression pattern, being enriched in the central nervous
  system (notably spinal cord), heart, and placenta, and its expression is high in
  embryonic stem cells and declines with differentiation.
