      revealed different substrate affinities of GFPT2 compared to GFPT1
proposed_new_terms: []
suggested_questions:
- question: >-
    Does GFPT2 form homo-oligomers and/or hetero-oligomers with GFPT1 in cells, and
    does heteromerization alter UDP-GlcNAc feedback sensitivity?
- question: >-
    Is the phosphorylation at Ser244 regulatory for GFPT2 catalytic activity or
    feedback inhibition, analogous to GFPT1 regulation?
suggested_experiments:
- description: >-
    Reconstitute HBP flux in GFPT1/GFPT2 double-knockout cells re-expressing GFPT2
    alone and measure UDP-GlcNAc levels and protein O-GlcNAcylation to quantify GFPT2's
    tissue-context-specific contribution.
- description: >-
    Determine the structure of human GFPT2 with bound UDP-GlcNAc to define the
    structural basis of its weaker feedback inhibition relative to GFPT1.
