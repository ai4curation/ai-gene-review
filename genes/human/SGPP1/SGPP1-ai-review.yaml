core_functions:
- description: >-
    Sphingosine-1-phosphate phosphatase that dephosphorylates sphingosine 1-phosphate (and
    dihydro-S1P) to sphingosine plus phosphate at the endoplasmic reticulum membrane,
    recycling sphingosine into sphingolipid metabolism and setting intracellular S1P levels
    (the sphingolipid rheostat).
  molecular_function:
    id: GO:0042392
    label: sphingosine-1-phosphate phosphatase activity
  directly_involved_in:
  - id: GO:0006670
    label: sphingosine metabolic process
  locations:
  - id: GO:0005789
    label: endoplasmic reticulum membrane
  supported_by:
  - reference_id: PMID:12815058
    supporting_text: Transient overexpression of hSPPase1 exhibited a 2-fold increase in
      phosphatase activity against S1P and dihydro-S1P
  - reference_id: PMID:12815058
    supporting_text: Sphingolipid mass measurements in hSPPase1 siRNA knockdown cells
      revealed a 2-fold increase of S1P levels and concomitant decrease in sphingosine
- description: >-
    Dihydrosphingosine-1-phosphate (sphinganine 1-phosphate) phosphatase activity,
    dephosphorylating dihydro-S1P to sphinganine at the ER membrane as part of
    sphingoid-base recycling.
  molecular_function:
    id: GO:0070780
    label: dihydrosphingosine-1-phosphate phosphatase activity
  locations:
  - id: GO:0005789
    label: endoplasmic reticulum membrane
  supported_by:
  - reference_id: PMID:12815058
    supporting_text: Transient overexpression of hSPPase1 exhibited a 2-fold increase in
      phosphatase activity against S1P and dihydro-S1P
