- id: PMID:12815058
  title: Role of human sphingosine-1-phosphate phosphatase 1 in the regulation of
    intra- and extracellular sphingosine-1-phosphate levels and cell viability.
  findings:
  - statement: >-
      Human SPPase1 (SGPP1) dephosphorylates S1P and dihydro-S1P; overexpression raises
      S1P-directed phosphatase activity and knockdown raises cellular and secreted S1P with
      a fall in sphingosine, establishing the core catalytic function and its role in
      setting S1P levels and cell viability.
    supporting_text: Transient overexpression of hSPPase1 exhibited a 2-fold increase in
      phosphatase activity against S1P and dihydro-S1P
  - statement: >-
      The human enzyme localizes to the endoplasmic reticulum, shown by confocal
      co-localization with calreticulin.
    supporting_text: co-localized to endoplasmic reticulum with calreticulin
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Abstract-only cache; PubMed-verified as the human SGPP1 cloning and functional
      characterization paper. Establishes S1P/dihydro-S1P phosphatase activity, ER
      localization, and the effect of S1P levels on cell viability. Quotes taken verbatim
      from the cached abstract.
- id: PMID:16782891
  title: Sphingosine-1-phosphate phosphohydrolase regulates endoplasmic reticulum-to-golgi
    trafficking of ceramide.
  findings:
  - statement: >-
      SPP-1 (SGPP1) regulates ER ceramide levels and thereby influences anterograde
      ER-to-Golgi transport of both ceramide and proteins; substrate specificity is
      restricted to sphingoid-1-phosphates (not ceramide-1-phosphate, LPA or PA).
    supporting_text: SPP-1 regulates ceramide levels in the ER and thus influences the
      anterograde membrane transport of both ceramide and proteins from the ER to the Golgi
      apparatus
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Abstract-only cache; PubMed-verified. Basis for the ER-to-Golgi ceramide transport
      (IMP) and S1P-phosphatase (IDA) annotations. Substrate-specificity quote is taken from
      the UniProt FUNCTION comment which cites this paper.
