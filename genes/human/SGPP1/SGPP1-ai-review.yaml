gene_symbol: SGPP1
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  SGPP1 (sphingosine-1-phosphate phosphatase 1, SPPase1/SPP-1) is a multipass endoplasmic
  reticulum membrane enzyme of the type 2 lipid phosphate phosphatase (LPP/PAP2) superfamily.
  It specifically dephosphorylates sphingosine 1-phosphate (S1P), dihydro-S1P and phyto-S1P
  to the corresponding free sphingoid bases plus inorganic phosphate, and does not act on
  ceramide 1-phosphate, lysophosphatidic acid or phosphatidic acid. As the functional
  counterpart of sphingosine kinase, SGPP1 is a central node of the sphingolipid rheostat;
  by reversing S1P formation it lowers pro-survival/signalling S1P, recycles sphingosine for
  re-acylation to ceramide by ceramide synthase, and thereby raises ceramide levels. Through
  control of ceramide in the endoplasmic reticulum it influences anterograde ER-to-Golgi
  trafficking of ceramide and proteins, and via intracellular S1P levels it modulates
  apoptosis/cell viability, the unfolded protein response and ER-stress-induced autophagy,
  and (through its rodent ortholog) epidermal homeostasis and keratinocyte differentiation.
  The catalytic PAP2 site uses conserved histidine residues (His-208 as proton donor;
  mutation abolishes activity), and the cytosolic N-terminal region carries multiple
  regulatory phosphorylation sites.
