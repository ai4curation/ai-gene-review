knowledge_gaps:
- gap_statement: >-
    The two current human TIAL1 isoforms have not been functionally resolved,
    particularly the effect of the isoform-2 insertion within RRM1.
  boundary: >-
    UniProt defines the sequence difference, but the primary splicing,
    translation, DNA-binding, and stress-granule studies generally do not
    distinguish endogenous TIAL1 isoforms.
  gap_kind:
  - BIOLOGY
  dark_aspect: MF_DARK
  status: OPEN
  significance: >-
    Isoform resolution is needed to know whether RRM1 sequence variation changes
    RNA/DNA specificity, target selection, localization, or condensation.
  resolution: >-
    Combine isoform-resolved long-read expression and eCLIP with matched
    isoform rescue after endogenous TIAL1 depletion.
  provenance:
  - reference_id: file:human/TIAL1/TIAL1-notes.md
    supporting_text: isoform 2 inserts 18 residues at canonical position 43 within RRM1
- gap_statement: >-
    TIAL1's independent requirement for stress-granule assembly is unresolved
    because TIA1 and G3BP-family proteins provide partly redundant nucleation
    activities.
  boundary: >-
    Direct studies establish recruitment and participation, but the classic
    dominant-negative construct targets TIA1 and secondarily traps endogenous
    TIAR.
  gap_kind:
  - BIOLOGY
  dark_aspect: BP_DARK
  status: OPEN
  significance: >-
    Separating recruitment from essential nucleation will clarify whether TIAL1
    is a core scaffold or a condition-dependent contributor.
  resolution: >-
    Use acute single and combinatorial TIAL1, TIA1, G3BP1, and G3BP2 depletion
    with endogenous live-cell stress-granule imaging and separation-of-function
    rescue.
  provenance:
  - reference_id: file:human/TIAL1/TIAL1-notes.md
    supporting_text: its dominant-negative perturbation targeted TIA1 while secondarily trapping endogenous TIAR
- gap_statement: >-
    The physiological relevance of cytolytic-granule localization and
    nucleolytic activity remains uncertain.
  boundary: >-
    The founding study used a targeting motif, fractionation context, and
    recombinant protein in permeabilized cells; modern endogenous,
    isoform-specific evidence is lacking.
  gap_kind:
  - BIOLOGY
  dark_aspect: CC_DARK
  status: OPEN
  significance: >-
    Resolving this issue would distinguish a specialized immune effector role
    from an historical overinterpretation of biochemical activity.
  resolution: >-
    Endogenously tag TIAL1 in primary human cytotoxic lymphocytes, quantify
    granule colocalization and release, and test target-cell killing after
    acute TIAL1 loss with isoform rescue.
  provenance:
  - reference_id: file:human/TIAL1/TIAL1-notes.md
    supporting_text: Generic lysosome is modified to the more specific cytolytic granule.
suggested_questions:
- question: >-
    Does the RRM1 insertion in TIAL1 isoform 2 alter RNA target choice, DNA
    binding, nucleocytoplasmic shuttling, or stress-granule condensation?
- question: >-
    How broadly does human TIAL1 recruit miRNA/RISC machinery beyond the
    demonstrated YAP/yki context?
- question: >-
    Is TIAL1 independently required for particular classes of stress granules,
    or is it functionally redundant with TIA1 and G3BP proteins?
- question: >-
    Is the historical TCBP product expressed from the modern TIAL1 locus, and
    does TIAL1 regulate transcription through DNA binding in vivo?
- question: >-
    Does endogenous TIAL1 enter cytolytic granules and contribute directly to
    cytotoxic-lymphocyte target killing?
suggested_experiments:
- hypothesis: >-
    The RRM1 insertion in isoform 2 changes a subset of TIAL1 RNA and DNA
    targets without disrupting the dominant RRM2-mediated U-rich specificity.
  description: >-
    Perform isoform-resolved eCLIP, quantitative DNA/RNA binding, and matched
    rescue of splicing and translation reporters after endogenous TIAL1
    depletion.
  experiment_type: Isoform-resolved target mapping and functional rescue
- hypothesis: >-
    TIAL1 is conditionally required for assembly of specific stress-granule
    subclasses when TIA1/G3BP nucleation capacity is limiting.
  description: >-
    Use rapid degron-mediated single and combinatorial depletion of TIAL1,
    TIA1, G3BP1, and G3BP2, followed by endogenous live imaging and granule RNA
    profiling across oxidative, heat, osmotic, and UV stress.
  experiment_type: Genetic epistasis and live-cell condensate analysis
- hypothesis: >-
    Human TIAL1 recruits RISC to a defined subset of 3-prime-UTR targets in
    addition to YAP.
  description: >-
    Combine AGO2/TIAL1 co-immunoprecipitation, eCLIP, miRNA perturbation, and
    target 3-prime-UTR reporters with TIAL1 wild-type and adaptor-defective
    rescue.
  experiment_type: RNP mapping and reporter epistasis
- hypothesis: >-
    DNA binding positions TIAL1 near nascent U-rich transcripts rather than
    serving as a general transcription-factor activity.
  description: >-
    Map endogenous chromatin association with orthogonal nuclease-based and
    crosslinking assays, perturb transcription, and compare DNA occupancy with
    nascent RNA binding and splice-site changes.
  experiment_type: Chromatin-RNA coupling analysis
- hypothesis: >-
    Cytolytic-granule localization and target-cell nucleolytic activity are
    specialized endogenous TIAL1 functions in human cytotoxic lymphocytes.
  description: >-
    Endogenously tag and acutely deplete TIAL1 in primary NK cells or CTLs,
    measure cytolytic-granule localization and exocytosis, and test target-cell
    killing with isoform-specific rescue.
  experiment_type: Endogenous localization and immune-cell functional rescue
