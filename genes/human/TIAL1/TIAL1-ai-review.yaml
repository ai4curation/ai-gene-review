id: Q01085
gene_symbol: TIAL1
product_type: PROTEIN
aliases:
- TIAR
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  TIAL1 encodes TIAR, a ubiquitously expressed nucleocytoplasmic RNA-binding
  protein with three RNA recognition motifs and a glutamine-rich low-complexity
  C terminus. It preferentially recognizes uridine-rich RNA through RRM2,
  regulates alternative splice-site choice at weak 5-prime splice sites, and
  binds AU-rich elements in selected mRNA 3-prime UTRs to repress translation
  or recruit post-transcriptional regulatory machinery. Under environmental
  stress, TIAL1 redistributes from the nucleus to cytoplasmic stress granules
  and helps recruit untranslated mRNPs. Direct biochemistry also demonstrates
  T-rich single-stranded DNA binding, while historical work proposed a
  context-specific cytolytic-granule nucleolysin role.
