id: Q9C0D9
gene_symbol: SELENOI
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  SELENOI (ethanolaminephosphotransferase 1, EPT1/hEPT1; also known as Selenoprotein I)
  is a multi-pass endoplasmic reticulum membrane enzyme of the CDP-alcohol
  phosphatidyltransferase class-I family. It catalyzes the final (third) step of the
  CDP-ethanolamine branch of the Kennedy pathway, transferring a phosphoethanolamine
  group from CDP-ethanolamine to a diacylglycerol acceptor to produce
  phosphatidylethanolamine (PE) plus CMP (EC 2.7.8.1); catalysis requires a divalent
  cation (Mg2+ or Mn2+). It is specific for CDP-ethanolamine (rather than CDP-choline)
  as the phosphobase donor. In addition to diacyl-PE, it uses 1-O-alkyl-2-acylglycerol
  acceptors to make ether-linked PE (plasmanyl-/plasmenyl-PE, a plasmalogen precursor),
  contributing to the pool of ether-linked phospholipids important for myelin. As a
  selenoprotein, it incorporates a selenocysteine near its C-terminus (residue 387). PE
  is the second most abundant membrane glycerophospholipid in mammalian cells, and
  SELENOI-mediated PE and plasmalogen synthesis supports membrane biogenesis,
  myelination and neurodevelopment. Loss-of-function variants cause an autosomal
  recessive complicated hereditary spastic paraplegia (SPG81) with hypomyelinating
  white-matter disease.
