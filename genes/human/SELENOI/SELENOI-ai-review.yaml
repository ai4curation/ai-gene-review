- id: PMID:17132865
  title: Identification and characterization of human ethanolaminephosphotransferase1.
  findings:
  - statement: >-
      Identified human selenoprotein I as hEPT1; recombinant enzyme specifically used
      CDP-ethanolamine as the phosphobase donor to produce PE, activated by Mn2+ and Mg2+;
      ubiquitously expressed, highest in cerebellum.
    reference_section_type: RESULTS
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Abstract-only cache (full_text_available: false). Title/abstract match the fetched record;
      directly establishes the core ethanolaminephosphotransferase activity and CDP-ethanolamine
      specificity of SELENOI/EPT1. Underpins the IDA GO:0004307 and GO:0006646 annotations.
- id: PMID:28052917
  title: A mutation of EPT1 (SELENOI) underlies a new disorder of Kennedy pathway
    phospholipid biosynthesis.
  findings:
  - statement: >-
      SELENOI/EPT1 catalyses the final step of PE synthesis via the Kennedy pathway; the
      autosomal-recessive SPG81 p.Arg112Pro variant (in the CDP-alcohol phosphotransferase motif)
      reduced PE synthesis to ~3% of wild type in a yeast complementation assay.
    reference_section_type: RESULTS
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Full text available and read. Establishes loss-of-function of the core activity and the first
      human disease (SPG81) due to Kennedy-pathway PE-biosynthesis defect; supports IMP GO:0004307,
      IMP GO:0006646, and the ER/membrane localization.
- id: PMID:29500230
  title: EPT1 (selenoprotein I) is critical for the neural development and maintenance
    of plasmalogen in humans.
  findings:
  - statement: >-
      EPT1 transfers phosphoethanolamine from CDP-ethanolamine to lipid acceptors to make diacyl-PE
      and ether-linked plasmenyl-PE; loss of EPT1 (patient fibroblasts, EPT1-KO HeLa) reduces PE and
      plasmenyl-PE, indicating an indispensable role in myelination, neurodevelopment and
      ether-phospholipid homeostasis.
    reference_section_type: RESULTS
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Abstract-only cache. Title/abstract match the fetched record; supports IMP GO:0004307/GO:0006646
      and the ether-lipid (GO:0008611) and myelination (GO:0042552) annotations.
- id: Reactome:R-HSA-1482962
  title: CDP-ETA and DAG are converted to PE by CEPT1/EPT1
  findings:
  - statement: >-
      At the ER membrane, CEPT1 or EPT1 converts CDP-ethanolamine and diacylglycerol to PE and CMP.
    reference_section_type: OTHER
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Reactome reaction placing the EPT1 step at the ER membrane; supports the TAS ER-membrane
      localization and the core catalytic reaction.
