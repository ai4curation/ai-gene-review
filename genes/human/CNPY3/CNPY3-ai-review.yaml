core_functions:
- description: >-
    ER-resident, TLR-specific co-chaperone that binds the ER HSP90 paralog
    HSP90B1 (gp96/GRP94) and, together with it, recognizes and assists the
    folding of unfolded/nascent Toll-like receptors in the ER lumen.
  molecular_function:
    id: GO:0051082
    label: unfolded protein binding
  supported_by:
  - reference_id: file:human/CNPY3/CNPY3-uniprot.txt
    supporting_text: >-
      Toll-like receptor (TLR)-specific co-chaperone for HSP90B1. Required for
      proper TLR folding, except that of TLR3.
- description: >-
    Binds the ER HSP90 chaperone HSP90B1 (gp96) directly as a substrate-specific
    co-chaperone; the interaction is ATP-sensitive, consistent with a HSP90
    client-handoff cycle.
  molecular_function:
    id: GO:0051879
    label: Hsp90 protein binding
  supported_by:
  - reference_id: file:human/CNPY3/CNPY3-uniprot.txt
    supporting_text: >-
      Interacts with HSP90B1; this interaction is disrupted in the presence of
      ATP.
- description: >-
    Promotes folding of TLRs in the ER and controls their exit from the ER to the
    cell surface (TLR1/2/4/5) or endosomes (TLR7/9), thereby enabling innate
    immune signaling. TLR3 folding is CNPY3-independent.
  directly_involved_in:
