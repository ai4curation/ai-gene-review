existing_annotations:
- term:
    id: GO:0005102
    label: signaling receptor binding
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: enables
  review:
    summary: >-
      Phylogenetic (IBA) annotation that CNPY3 enables signaling receptor
      binding. CNPY3 does physically engage the ectodomains of multiple TLRs in
      the ER as part of its folding/trafficking chaperone activity, so binding to
      these signaling receptors is supported. However, this term captures the
      client-engagement aspect but not the core chaperone/co-chaperone activity,
      and it does not distinguish CNPY3 from a true signaling effector.
    action: KEEP_AS_NON_CORE
    reason: >-
      CNPY3 binds TLR clients (TLR1/2/4/9) in the ER, so signaling receptor
      binding is defensible, but it is a downstream consequence of the chaperone
      function rather than the core molecular function. The more informative MF
      terms are unfolded protein binding and Hsp90 protein binding. Keep as
      non-core.
    supported_by:
    - reference_id: file:human/CNPY3/CNPY3-uniprot.txt
      supporting_text: >-
        Interacts with HSP90B1; this interaction is disrupted in the presence of
        ATP. Interacts with TLR1, TLR2, TLR4 and TLR9. Strongest interaction with
        TLR4.
