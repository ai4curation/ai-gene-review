proposed_new_terms:
- term_label: unfolded protein binding
  reason: >-
    CNPY3's core molecular function as an ER co-chaperone for TLR folding is not
    represented in the curated GOA, which currently captures only signaling
    receptor binding and ER localization. GO:0051082 (unfolded protein binding)
    captures the chaperone client-binding activity.
  proposed_term_id: GO:0051082
- term_label: Hsp90 protein binding
  reason: >-
    CNPY3 binds the ER HSP90 paralog HSP90B1/gp96 directly as a co-chaperone;
    GO:0051879 (Hsp90 protein binding) is the most specific MF for this
    well-documented interaction and is currently missing from GOA.
  proposed_term_id: GO:0051879
- term_label: protein folding in endoplasmic reticulum
  reason: >-
    The biological process by which CNPY3 acts (assisting TLR folding in the ER
    lumen) is not annotated. GO:0034975 captures this directly.
  proposed_term_id: GO:0034975
- term_label: positive regulation of toll-like receptor signaling pathway
  reason: >-
    By enabling TLR folding and ER exit, CNPY3 is required for TLR signaling;
    GO:0034123 captures its positive-regulatory role in this innate immune
    pathway.
  proposed_term_id: GO:0034123
suggested_questions:
- Does human CNPY3 directly bind the same TLR set (TLR1/2/4/5/7/9 but not TLR3)
  as established for mouse PRAT4A, and which TLR ectodomain regions are engaged
  by the saposin-like/ML domain?
- Is CNPY3 a general ER co-chaperone with additional non-TLR clients, or is its
  client repertoire restricted to TLRs?
- How does the DEE60-associated pathology relate to CNPY3 chaperone function -
  is it driven by impaired TLR trafficking/innate immunity, or by a separate
  neuronal client?
suggested_experiments:
- Co-immunoprecipitation and proximity-labeling (e.g. BioID/APEX) of endogenous
  CNPY3 in human immune cells to define its direct clients and confirm
  ATP-sensitive HSP90B1 binding.
- CNPY3 knockout/knockdown in human cells followed by flow cytometry and
  surface/endosomal trafficking assays for TLR1/2/4/5/7/9 (and TLR3 as a
  negative control) to quantify TLR maturation and ER exit.
- Functional reconstitution of DEE60 patient missense variants (e.g. Gly125Arg)
  to test effects on CNPY3 stability, HSP90B1 binding, and TLR folding/trafficking.
