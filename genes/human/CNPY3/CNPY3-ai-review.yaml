id: Q9BT09
gene_symbol: CNPY3
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  CNPY3 (Protein canopy homolog 3; also known as PRAT4A, Protein Associated with
  TLR4) is an endoplasmic reticulum (ER)-resident, glycosylated protein of the
  canopy family. It has a cleaved N-terminal signal peptide and a single
  saposin-like / MD-2-related lipid-recognition (ML) domain (a Saposin B-type
  fold stabilized by three intramolecular disulfide bonds). CNPY3 functions as a
  Toll-like receptor (TLR)-specific co-chaperone that works together with the ER
  HSP90 paralog HSP90B1 (gp96 / GRP94 / endoplasmin). The CNPY3-HSP90B1 module
  mediates the folding and ER-to-surface/endosome trafficking of multiple TLRs,
  including the cell-surface receptors TLR1, TLR2, TLR4 and TLR5 and the
  endosomal nucleic-acid-sensing receptors TLR7 and TLR9, but not TLR3, which is
  CNPY3-independent. CNPY3 is therefore required for TLR exit from the ER and for
  innate immune signaling downstream of these receptors. The interaction between
  CNPY3 and HSP90B1 is disrupted by ATP, consistent with a HSP90-co-chaperone
  client-handoff cycle. Biallelic loss-of-function variants in CNPY3 cause
  autosomal recessive developmental and epileptic encephalopathy 60 (DEE60).
