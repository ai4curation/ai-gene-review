id: P78330
gene_symbol: PSPH
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  PSPH (phosphoserine phosphatase, EC 3.1.3.3) is a cytosolic, Mg2+-dependent
  enzyme of the HAD-like hydrolase superfamily (SerB family) that catalyzes the
  third and final, irreversible step of the phosphorylated pathway of de novo
  L-serine biosynthesis: the hydrolysis of O-phospho-L-serine to L-serine and
  inorganic phosphate. Catalysis proceeds through a covalent phosphoaspartyl-enzyme
  intermediate (nucleophile Asp20), with one Mg2+ ion bound per subunit; Ca2+ is
  inhibitory. The active enzyme is a homodimer, and dimerization is required for
  full catalytic activity. The L-serine produced is a precursor for protein
  synthesis, glycine, one-carbon units, nucleotides, phospholipids and glutathione,
  and can be racemized to D-serine, an NMDA-receptor co-agonist. In humans, loss of
  PSPH activity causes the autosomal recessive serine-deficiency disorder
  phosphoserine phosphatase deficiency, characterized by growth and psychomotor
  retardation and Williams-syndrome-like facial features.
