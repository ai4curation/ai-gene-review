- term:
    id: GO:0006706
    label: steroid catabolic process
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: involved_in
  review:
    summary: Phylogenetically-inferred biological process. HSD11B1 does participate in steroid
      metabolism, but its predominant physiological role is reductive activation of
      glucocorticoids (cortisone to cortisol), i.e. metabolism/interconversion rather than
      catabolism. The catabolic framing fits some oxidative or oxysterol reactions but is
      imprecise for the core function.
    action: MODIFY
    reason: Steroid catabolic process mischaracterizes the core in-vivo activity, which is
      reductive regeneration of active cortisol (a glucocorticoid metabolic/interconversion
      process), not steroid breakdown. Generalize/re-target to glucocorticoid metabolic process,
      which correctly covers the bidirectional interconversion of active and inactive
      glucocorticoids.
