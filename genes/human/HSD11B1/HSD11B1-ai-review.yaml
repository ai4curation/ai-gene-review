taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: 11-beta-hydroxysteroid dehydrogenase type 1 (11beta-HSD1) is an NADP(H)-dependent
  short-chain dehydrogenase/reductase anchored in the endoplasmic reticulum membrane as a
  single-pass type II membrane protein, with its catalytic domain facing the ER lumen. It
  catalyzes the interconversion of the inactive 11-keto glucocorticoid cortisone and the
  active 11-hydroxy glucocorticoid cortisol (and 11-dehydrocorticosterone/corticosterone).
  Although bidirectional in vitro, in vivo it acts predominantly as a reductase (cortisone
  to cortisol); its reductive directionality is set by the supply of NADPH generated in the
  ER lumen by hexose-6-phosphate dehydrogenase (H6PD). By regenerating active glucocorticoids
  locally, 11beta-HSD1 amplifies pre-receptor glucocorticoid action in liver, adipose tissue,
  brain, eye and other tissues, making it a therapeutic target in metabolic syndrome, type 2
  diabetes and obesity. It functions as a homodimer and has broad substrate specificity,
  additionally metabolizing 7-oxo/7-hydroxy oxysterols (e.g. 7-ketocholesterol), 7-oxo bile
  acids, neurosteroids and 11-oxygenated C19 steroids. Loss or reduction of activity causes
  cortisone reductase deficiency.
