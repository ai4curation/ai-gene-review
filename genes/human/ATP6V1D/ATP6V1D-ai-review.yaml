core_functions:
- summary: Central rotor component of the V1 sector of the vacuolar-type H+-ATPase
    (V-ATPase). Subunit D, together with subunit F, forms the central stalk that transmits
    ATP hydrolysis energy from the catalytic A3B3 hexamer to rotate the V0 proteolipid
    ring, enabling proton translocation across organelle membranes. Primary role is in
    acidification of lysosomes, endosomes, and the Golgi apparatus.
  go_terms:
  - id: GO:0046961
    label: proton-transporting ATPase activity, rotational mechanism
  - id: GO:0007042
    label: lysosomal lumen acidification
  - id: GO:0033176
    label: proton-transporting V-type ATPase complex
- summary: Secondary role in mTORC1 amino acid sensing. The D subunit directly contacts
    the Ragulator scaffold (p18/p14) on lysosomes, and V-ATPase ATP hydrolysis is required
    upstream of Rag GTPase activation for mTORC1 translocation to lysosomes in response
    to amino acids.
  go_terms:
  - id: GO:1904263
    label: positive regulation of TORC1 signaling
  - id: GO:0071230
    label: cellular response to amino acid stimulus
- summary: Secondary role in ciliogenesis. Via interaction with SNX10, the V-ATPase
    (including subunit D) is targeted to the centrosome and cilium base, where it regulates
    ciliary trafficking of Rab8a and cilium assembly.
  go_terms:
  - id: GO:0060271
    label: cilium assembly

suggested_questions:
- Is the role of subunit D in the Ragulator interaction specific to this subunit, or
  shared by other V1 subunits? What is the structural basis of D-Ragulator binding?
- Do disease-causing mutations in V-ATPase subunits affect the D-F central stalk
  interactions, and if so, does this impair ciliogenesis in addition to acidification?
- What is the mechanism by which SNX10-V-ATPase targeting to the centrosome promotes
  ciliogenesis? Is this dependent on V-ATPase proton-pumping activity or structural
  interactions?

suggested_experiments:
- Structure determination of V-ATPase-Ragulator complex by cryo-EM to define the
  D subunit contact interface with p18.
- Separation-of-function mutations in V1D that uncouple the Ragulator interaction from
  proton pumping, to test whether mTORC1 signaling requires D-Ragulator contact specifically.
- Time-lapse imaging of V-ATPase-SNX10 complex trafficking to the centrosome during
  ciliation initiation to clarify the mechanism of the ciliogenesis role.
