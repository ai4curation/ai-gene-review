- id: PMID:37318954
  title: Expanding EMC foldopathies, topogenesis deficits alter the neural crest.
  findings:
  - statement: Damaging EMC9 (and EMC10) variants are reported in 18 individuals from 10 families with congenital anomalies; CRISPR depletion of emc9 in Xenopus tropicalis reduced neural crest marker (sox10) expression and produced craniofacial and neuromuscular phenotypes, and decreased the WNT receptor Fzd7 with marked reduction of nuclear beta-catenin, implicating EMC9 in membrane-protein topogenesis required for WNT-dependent development.
    reference_section_type: RESULTS
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: PubMed-verified (genesis 2023, PMID:37318954). Most EMC9-specific functional/disease evidence available, developmental "foldopathy" with WNT-pathway readout; supports non-redundant developmental importance of EMC9.
- id: PMID:32332093
  title: Squaring the EMC - how promoting membrane protein biogenesis impacts cellular functions and organismal homeostasis.
  findings:
  - statement: Review placing EMC2, EMC8, and EMC9 as the cytosolic (non-transmembrane, peripheral) subunits forming the cytoplasmic interface of the ER-resident EMC; EMC9 (~208 aa) is classified among peripheral, non-core subunits.
    reference_section_type: LITERATURE_REVIEW
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: PubMed-verified (J Cell Sci 2020, PMID:32332093). Review supporting EMC9's cytosolic/peripheral localization and EMC8/EMC9 paralog framing already in the review.
- id: PMID:35287476
  title: The Function, Structure, and Origins of the ER Membrane Protein Complex.
  findings:
  - statement: Authoritative review placing EMC2, EMC8, and EMC9 as cytosolic subunits, with the EMC8/EMC9-containing cytosolic cradle likely engaging membrane-protein clients before insertion/folding.
    reference_section_type: LITERATURE_REVIEW
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: PubMed-verified (Annu Rev Biochem 2022, PMID:35287476). Review supporting EMC9's cytosolic placement and client-engagement role of the cytosolic module.
- id: PMID:37196677
  title: EMC chaperone-CaV structure reveals an ion channel assembly intermediate.
  findings:
  - statement: Cryo-EM of human EMC bound to a CaV1.2-CaVbeta3 assembly intermediate shows the cytosolic module (EMC2 plus the EMC8/EMC9 slot) can directly bind clients at a "Cyto dock"; EMC8 is directly visualized while EMC9 involvement is inferred via paralogous alternative complex composition.
    reference_section_type: RESULTS
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: PubMed-verified (Nature 2023, PMID:37196677). Demonstrates client-binding by the cytosolic EMC2-EMC8/9 module; EMC9 role inferred by paralogy (EMC8 is the subunit resolved in this structure), so relevance to EMC9 specifically is indirect.
suggested_questions:
- question: Do the EMC8- and EMC9-containing EMC variants differ in client specificity, tissue distribution, or regulation, and what determines which paralog is incorporated?
- question: Does the degenerate MPN domain of EMC9 retain any binding or regulatory activity, or is it purely a structural scaffold for docking onto EMC2?
suggested_experiments:
- description: Compare client repertoires and insertion efficiencies of EMC8-only versus EMC9-only complexes using paralog-specific knockouts with quantitative membrane proteomics and reconstituted insertion assays.
- description: Solve or model the EMC9 MPN domain in the holo-complex and test by mutagenesis whether the EMC9-EMC2 interface is required for complex assembly and stability.
