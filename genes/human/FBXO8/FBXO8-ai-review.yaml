    supporting_text: "F-box only protein 8 (FBX8), as a critical component of the SKP1-CUL1-F-box (SCF) E3 ubiquitin ligases"
  - reference_id: PMID:31024008
    supporting_text: "FBX8 directly targets GSTP1 for ubiquitin-mediated proteasome degradation in CRC."
proposed_new_terms: []
suggested_questions:
- question: Is the SEC7-domain-encoded ARF guanine-nucleotide exchange activity of FBXO8 biochemically real and physiologically relevant, and does it couple SCF-dependent substrate degradation to ARF-mediated membrane trafficking?
- question: Beyond GSTP1, what is the full repertoire of FBXO8 SCF substrates, and what degrons or post-translational modifications govern FBXO8 substrate recognition?
suggested_experiments:
- description: >-
    Purify recombinant FBXO8 (or its isolated SEC7 domain) and assay ARF GDP/GTP
    exchange in vitro (e.g. fluorescent nucleotide-exchange assays with ARF1/ARF6)
    to test whether the predicted GEF activity is genuine, then assess ARF
    activation in cells upon FBXO8 depletion or overexpression.
- description: >-
    Reconstitute the FBXO8 SCF complex (SKP1-CUL1-RBX1-FBXO8) and perform in vitro
    ubiquitination of GSTP1, combined with cellular ubiquitinome/proteome profiling
    after FBXO8 knockout, to confirm direct adaptor function and identify
    additional substrates.
