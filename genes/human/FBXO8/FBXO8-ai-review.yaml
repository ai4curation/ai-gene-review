description: >-
  FBXO8 (F-box only protein 8; also FBS, FBX8, "F-box/SEC7 protein") is a 319 aa
  member of the F-box "other" (FBXO) family. Through its F-box domain (residues
  ~68-111) it binds SKP1 and serves as the substrate-recognition subunit of an
  SCF (SKP1-CUL1-F-box) / CRL1 E3 ubiquitin-protein ligase complex, in which the
  catalytic RING subunit is RBX1; F-box proteins such as FBXO8 confer substrate
  specificity rather than carrying catalytic ligase activity themselves. As an
  SCF receptor, FBXO8 recruits target proteins for poly-ubiquitination and
  proteasomal degradation; a documented substrate is the detoxification enzyme
  GSTP1, whose FBXO8-mediated degradation has been linked to suppression of
  colorectal cancer progression. Distinctively among F-box proteins, FBXO8 also
  contains a C-terminal SEC7 domain (residues ~146-276), the catalytic module of
  guanine-nucleotide exchange factors for ADP-ribosylation factor (ARF) GTPases,
  and is predicted to promote GDP-to-GTP exchange on an ARF, suggesting a
  potential additional role linking SCF-type ubiquitination to ARF-dependent
  membrane trafficking; this GEF activity is sequence-inferred and not yet
  experimentally established. FBXO8 is broadly expressed across human tissues.
