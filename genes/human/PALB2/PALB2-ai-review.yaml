id: Q86YC2
gene_symbol: PALB2
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  PALB2 (Partner And Localizer of BRCA2; FANCN) is a nuclear scaffold/adaptor protein
  central to homologous recombination (HR) repair of DNA double-strand breaks and
  interstrand crosslinks. Its N-terminal coiled-coil binds BRCA1 and mediates
  self-oligomerization, while its C-terminal seven-bladed WD40 β-propeller binds BRCA2
  (and also RAD51C, RAD51 and XRCC3). By simultaneously engaging BRCA1 and BRCA2, PALB2
  physically bridges the two breast-cancer suppressors, forming the BRCA1-PALB2-BRCA2
  complex that localizes and stabilizes BRCA2 at damaged chromatin and thereby promotes
  loading of the RAD51 recombinase to initiate strand invasion. PALB2 additionally binds
  DNA directly through an intrinsically disordered N-terminal domain (preference D-loop >
  dsDNA > ssDNA), stimulates RAD51-mediated D-loop formation (cooperating with RAD51AP1),
  possesses intrinsic strand-exchange activity, and associates with chromatin/nucleosomes
  via its ChAM motif. With BRCA2 it also stimulates POLH-dependent DNA synthesis at blocked
  replication forks. PALB2 acts in the nucleoplasm and accumulates at DNA-damage foci.
  Biallelic loss-of-function causes Fanconi anemia complementation group N, whereas
  heterozygous truncating mutations confer strong predisposition to breast, pancreatic and
  ovarian cancer. A secondary, HR-independent role is its interaction with KEAP1 in the
  oxidative-stress (NRF2) response.
