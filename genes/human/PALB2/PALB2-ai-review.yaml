suggested_questions:
- question: Beyond its scaffold role, how much of PALB2's direct DNA binding and intrinsic
    strand-exchange activity contributes to HR in vivo versus in vitro?
- question: What is the physiological significance of the KEAP1-PALB2 interaction relative
    to PALB2's dominant HR-scaffold function?
suggested_experiments:
- description: Generate separation-of-function PALB2 alleles that selectively disrupt DNA
    binding versus BRCA1 or BRCA2 binding, and assay HR efficiency, RAD51 foci formation,
    and PARP-inhibitor sensitivity to dissect the DNA-binding contribution from the
    adaptor/scaffold contribution.
- description: Structural and biophysical characterization (cryo-EM/SAXS) of the full
    BRCA1-PALB2-BRCA2 assembly on damaged chromatin to define the stoichiometry and
    geometry of the adaptor bridge.
