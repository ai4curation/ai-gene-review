- term:
    id: GO:0005515
    label: protein binding
  evidence_type: IPI
  original_reference_id: PMID:19423707
  qualifier: enables
  review:
    summary: Interaction with BRCA2 (P51587); PALB2 refines its BRCA2-binding motif to the
      WD40 repeats and its chromatin association is a prerequisite for BRCA2 loading. Part
      of the adaptor/scaffold function.
    action: MODIFY
    reason: BRCA2-binding interaction central to PALB2's adaptor role; replace generic
      protein binding with molecular adaptor activity.
    proposed_replacement_terms:
    - id: GO:0060090
      label: molecular adaptor activity
    supported_by:
    - reference_id: PMID:19423707
      supporting_text: PALB2 localizes to chromatin and assembled as oligomers at the site
        of DNA damage, which then serves as an anchor for the loading of BRCA2 and RAD51
- term:
    id: GO:0005515
    label: protein binding
  evidence_type: IPI
  original_reference_id: PMID:20332121
  qualifier: enables
  review:
    summary: Direct interaction with MORF4L1/MRG15 (chromodomain protein), which promotes
      chromatin-associated homology-directed repair. Peripheral chromatin-targeting
      interaction with an uninformative term.
    action: MARK_AS_OVER_ANNOTATED
    reason: A genuine chromatin-targeting interaction, but a supporting rather than core
      role; protein binding is uninformative as a molecular function.
    supported_by:
    - reference_id: PMID:20332121
      supporting_text: PALB2 binds directly to a conserved chromodomain protein, MRG15
- term:
    id: GO:0031491
    label: nucleosome binding
  evidence_type: IDA
  original_reference_id: PMID:22193777
  qualifier: enables
  review:
    summary: >-
      PALB2's chromatin-association motif (ChAM) directly and intrinsically binds
      nucleosomes, mediating constitutive chromatin association that is distinct from the
      N-terminal DNA-binding regions. ChAM deletion reduces PALB2 and RAD51 accumulation at
      DNA-damage sites and confers mitomycin C hypersensitivity.
    action: NEW
    reason: >-
      A genuine, experimentally demonstrated molecular function (direct nucleosome binding by
      the ChAM motif) that is absent from GOA and was previously reflected only as
      uninformative "protein binding" (PMID:22193777 row above). Added as a NEW annotation but
      kept non-core: ChAM-mediated nucleosome/chromatin association is a targeting/anchoring
      activity that helps retain and position the BRCA1-PALB2-BRCA2 complex on chromatin,
      rather than the central molecular-adaptor function itself.
    supported_by:
    - reference_id: PMID:22193777
      supporting_text: ChAM robustly binds to nucleosomes
    - reference_id: PMID:22193777
      supporting_text: >-
        chromatin-association motif (ChAM), an evolutionarily conserved motif in PALB2, is
        necessary and sufficient to mediate its chromatin association in both unperturbed and
        damaged cells
core_functions:
- description: Molecular adaptor/scaffold that physically bridges BRCA1 (via its N-terminal
    coiled-coil) and BRCA2 (via its C-terminal WD40 β-propeller), forming the
    BRCA1-PALB2-BRCA2 complex that localizes and stabilizes BRCA2 at damaged chromatin and
    promotes RAD51 loading for homologous recombination.
  supported_by:
  - reference_id: PMID:19369211
    supporting_text: PALB2, the partner and localizer of BRCA2, binds directly to BRCA1,
      and serves as the molecular scaffold in the formation of the BRCA1-PALB2-BRCA2
      complex.
  - reference_id: PMID:39584160
    supporting_text: The partner and localizer of BRCA2 (PALB2) is a scaffold protein
      linking BRCA1 with BRCA2 and RAD51 during homologous recombination (HR).
  molecular_function:
    id: GO:0060090
    label: molecular adaptor activity
  directly_involved_in:
  - id: GO:0000724
    label: double-strand break repair via homologous recombination
  locations:
  - id: GO:0005654
    label: nucleoplasm
  in_complex:
    id: GO:1990391
    label: DNA repair complex
- description: DNA-binding activity of the intrinsically disordered N-terminal domain
    (preference D-loop > dsDNA > ssDNA) that stimulates RAD51-mediated strand invasion and
    D-loop formation, promoting homologous recombination; the domain also has intrinsic
    strand-exchange activity and cooperates with RAD51AP1.
  supported_by:
  - reference_id: PMID:20871616
    supporting_text: 'Full length PALB2 bound all three species of DNA with the following
      preference: D-loop > dsDNA > ssDNA'
  - reference_id: PMID:31017574
    supporting_text: We identified a major DNA-binding site of PALB2, mutations in which
      reduce RAD51 foci formation and the overall HDR efficiency in cells by 50%.
  molecular_function:
    id: GO:0003677
    label: DNA binding
  directly_involved_in:
  - id: GO:0000724
    label: double-strand break repair via homologous recombination
  locations:
  - id: GO:0005654
    label: nucleoplasm
