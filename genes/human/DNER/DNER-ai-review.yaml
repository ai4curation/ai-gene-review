        source_label: PANTHER Notch-binding inference node
        source_status: UNRESOLVED
        comment: >-
          The target-level primary evidence conflicts, so the phylogenetic Notch-binding
          inference cannot be classified as a safe transfer without resolving the donor
          activities and the DNER-specific experimental discrepancy.
    additional_reference_ids:
