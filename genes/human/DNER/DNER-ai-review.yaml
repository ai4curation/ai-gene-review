suggested_questions:
- question: >-
    Does endogenous DNER directly bind and activate NOTCH1 at Purkinje-cell/Bergmann-glia
    contacts, and what experimental conditions explain the conflicting 2005 and 2016 results?
  experts:
  - Eiraku M
  - Kengaku M
  - Lancaster E
- question: >-
    Which extracellular counter-receptor or ligand mediates the Dner-dependent Bergmann-glial
    phenotype if NOTCH1 is not the direct binding partner?
  experts:
  - Kengaku M
  - Takeshima H
- question: >-
    Is AP-1/AP-2-dependent DNER trafficking itself required for Bergmann-glial differentiation,
    or does it primarily regulate an independent neuronal morphogenesis function?
  experts:
  - Kengaku M
  - Maeda N
suggested_experiments:
- hypothesis: Endogenous DNER has a cell-contact-dependent counter-receptor distinct from canonical Notch ligands.
  description: >-
    Use extracellular proximity labeling and crosslinking proteomics at human iPSC-derived
    Purkinje-cell/Bergmann-glia contacts, followed by CRISPR knockout and rescue of candidate
    receptors; assay radial-process morphogenesis and compare NOTCH1/DTX/RBPJ reporters.
  experiment_type: proximity labeling, receptor identification, and functional rescue
- hypothesis: DNER's cytoplasmic sorting motifs couple its surface residence to the cerebellar developmental phenotype.
  description: >-
