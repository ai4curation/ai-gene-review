- term:
    id: GO:0005112
    label: Notch binding
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: enables
  review:
    summary: >-
      Phylogenetic inference assigns Notch binding, and the original mouse cerebellar
      study reported DNER binding to Notch1. However, a later full-text replication
      study found that DNER did not bind Notch1-Fc and did not activate NOTCH1 in
      either cis or trans assays.
    action: UNDECIDED
    reason: >-
      Direct primary studies conflict. PMID:15965470 supports binding and noncanonical
      signaling, whereas PMID:27622512 failed to reproduce binding or activation with
      DLL1 as a positive control. The IBA should not be treated as a settled core
      molecular function until the discrepancy is resolved.
    propagation_review:
      root_cause: UNRESOLVED
      failure_modes:
      - ROLE_CONFLATION
      source_entities:
