    label: AP-1 adaptor complex binding
  description: >-
    DNER uses cytoplasmic sorting motifs and AP-family adaptor interactions to undergo
    regulated endocytic trafficking and maintain a polarized somatodendritic plasma-membrane/endosomal
    distribution in neurons. AP-1 binding supports post-Golgi somatodendritic sorting,
    AP-2 binding contributes to surface trafficking, and PTPRZ-dependent phosphorylation
    regulates DNER surface residence and its effects on neurite morphogenesis.
