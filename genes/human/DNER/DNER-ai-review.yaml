gene_symbol: DNER
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  DNER (delta and Notch-like epidermal growth factor-related receptor) is a
  neuron-enriched type-I single-pass transmembrane glycoprotein with ten
  extracellular EGF-like repeats and cytoplasmic sorting motifs. It is concentrated
  in the somatodendritic plasma membrane and endosomal system, where AP-1/AP-2-linked
  and clathrin-independent endocytic pathways regulate its polarized surface
  distribution. DNER phosphorylation and surface residence are modulated by
  pleiotrophin-PTPRZ signaling and can influence neurite morphogenesis. Mouse loss-of-function
  studies establish roles in Bergmann-glial radial-fiber differentiation, cerebellar
  morphogenesis, synaptic refinement, and motor coordination. DNER was originally
  reported to bind NOTCH1 and activate a gamma-secretase- and Deltex-dependent,
  RBP-J-independent response at Purkinje-cell/Bergmann-glia contacts, but a later
  direct replication study found that DNER neither bound nor activated NOTCH1.
  Consequently, the developmental phenotype is well supported whereas direct Notch
  ligand activity remains unresolved.
