  findings:
  - statement: OCTN2 is an apical intestinal organic cation transporter that takes up
      the B. subtilis quorum-sensing pentapeptide CSF, inducing cytoprotective heat
      shock proteins and contributing to intestinal homeostasis.
    supporting_text: These effects of CSF depend on its uptake by an apical membrane
      organic cation transporter-2 (OCTN2).
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: Supports apical intestinal localization and a polyspecific
