id: O76082
gene_symbol: SLC22A5
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: SLC22A5 (OCTN2) is a plasma-membrane, sodium-dependent, high-affinity
  L-carnitine transporter of the SLC22 organic cation/carnitine transporter family
  (major facilitator superfamily). It couples the inward movement of one sodium ion
  to the uptake of one molecule of (R)-carnitine (Km in the low micromolar range),
  mediating cellular import of carnitine from blood and diet. This uptake is the
  essential first step that makes carnitine available for the mitochondrial carnitine
  shuttle (CPT1/CACT/CPT2) and hence for long-chain fatty-acid beta-oxidation, and
  OCTN2 also drives renal tubular reabsorption of filtered carnitine. Beyond carnitine
  it is polyspecific, transporting acyl-carnitines, glycine betaine, and diverse
  organic cations and cationic drugs (e.g. tetraethylammonium), the latter in a
  lower-affinity, sodium-independent manner. It is an integral multipass membrane
  protein expressed at the plasma membrane, apical/brush-border in absorptive and
  reabsorptive epithelia (kidney proximal tubule, intestine, placenta) and at the
  basal membrane of Sertoli cells. Loss-of-function variants cause systemic primary
  carnitine deficiency, an autosomal-recessive fatty-acid oxidation disorder presenting
  with hypoketotic hypoglycemia, cardiomyopathy and skeletal myopathy that is treatable
  with oral L-carnitine.
