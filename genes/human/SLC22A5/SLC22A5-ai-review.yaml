  title: Molecular and functional identification of sodium ion-dependent, high affinity
    human carnitine transporter OCTN2.
  findings:
  - statement: OCTN2 is a high-affinity (Km 4.34 uM), Na+-dependent human carnitine
      cotransporter, strongly expressed in kidney, skeletal muscle, heart and placenta.
    supporting_text: OCTN2 is a physiologically important, high affinity
      sodium-carnitine cotransporter in humans.
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: Foundational identification of OCTN2 as the Na+-dependent carnitine
      transporter.
- id: PMID:9916797
  title: Primary systemic carnitine deficiency is caused by mutations in a gene encoding
    sodium ion-dependent carnitine transporter.
  findings:
  - statement: Loss-of-function mutations in SLC22A5/OCTN2 (in jvs mice and human SCD
      pedigrees) abrogate carnitine transport and cause systemic primary carnitine
      deficiency.
    supporting_text: this mutation abrogates carnitine transport.
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: Establishes SLC22A5 as the systemic carnitine deficiency gene via
      loss of carnitine transport.
