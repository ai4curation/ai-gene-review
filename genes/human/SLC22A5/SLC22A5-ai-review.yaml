core_functions:
- description: Sodium-coupled, high-affinity import of L-carnitine across the plasma
    membrane. OCTN2 symports one Na+ with one (R)-carnitine molecule, enabling cellular
    uptake and renal reabsorption of carnitine that supplies the mitochondrial
    carnitine shuttle for long-chain fatty-acid beta-oxidation.
  molecular_function:
    id: GO:0015226
    label: carnitine transmembrane transporter activity
  directly_involved_in:
  - id: GO:1902603
    label: carnitine transmembrane transport
  locations:
  - id: GO:0005886
    label: plasma membrane
  - id: GO:0016324
    label: apical plasma membrane
  supported_by:
  - reference_id: PMID:9685390
    supporting_text: OCTN2 is a physiologically important, high affinity
      sodium-carnitine cotransporter in humans.
  - reference_id: PMID:10966938
    supporting_text: hOCTN2 mediates electrogenic Na(+)-dependent stereoselective
      high-affinity transport of L-carnitine and Na(+).
- description: Stereospecific (R)-carnitine transmembrane transporter activity,
    demonstrated directly in heterologous systems and native epithelia and lost in
    disease-causing SLC22A5 mutants; this is the specific-substrate resolution of the
    core carnitine transport function.
