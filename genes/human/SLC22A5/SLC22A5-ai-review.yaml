- term:
    id: GO:0005524
    label: ATP binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: Electronic InterPro2GO mapping (IPR045915) assigning ATP binding. OCTN2
      is a secondary active transporter that couples carnitine uptake to the sodium
      electrochemical gradient (Na+ symport); it is not an ATP-driven pump and there
      is no evidence it binds or hydrolyses ATP. This is a spurious domain-based
      inference.
    action: REMOVE
    reason: OCTN2 is an MFS-family Na+-coupled symporter, not an ATP-binding/ATP-driven
      transporter. The InterPro-to-GO ATP-binding mapping is biologically incorrect
      for this protein; no experimental support exists.
    supported_by:
    - reference_id: PMID:10966938
      supporting_text: hOCTN2 mediates electrogenic Na(+)-dependent stereoselective
        high-affinity transport of L-carnitine and Na(+).
