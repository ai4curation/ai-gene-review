- description: Sodium-dependent transport of carnitine and other zwitterionic/cationic
    organic solutes; the Na+-coupled symport mechanism underlies OCTN2's high-affinity
    carnitine uptake, while OCTN2 also transports organic cations more weakly in a
    Na+-independent manner (polyspecific secondary activity).
