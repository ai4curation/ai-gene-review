- id: PMID:10454528
  title: Functional characteristics and tissue distribution pattern of organic cation
    transporter 2 (OCTN2), an organic cation/carnitine transporter.
  findings:
  - statement: OCTN2 transports organic cations independently of Na+ but transports
      carnitine only in the presence of Na+; short-chain acylcarnitines are also
      substrates; disease mutations M352R and P478L abolish transport.
    supporting_text: OCTN2 transports organic cations without involving Na(+), but it
      transports carnitine only in the presence of Na(+).
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: Abstract confirms OCTN2 as a dual Na+-independent organic cation /
      Na+-dependent carnitine transporter; PMID matches title.
- id: PMID:10966938
  title: Functional and pharmacological characterization of human Na(+)-carnitine
    cotransporter hOCTN2.
  findings:
  - statement: hOCTN2 is an electrogenic Na+-dependent, stereoselective, high-affinity
      L-carnitine cotransporter (Km ~4.8 uM) that also transports betaine and is
      inhibited by emetine, quinidine and verapamil.
    supporting_text: hOCTN2 mediates electrogenic Na(+)-dependent stereoselective
      high-affinity transport of L-carnitine and Na(+).
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: Electrophysiological characterization; supports the Na+-symport
      mechanism and betaine transport.
- id: PMID:15238359
  title: L-Carnitine transport in human placental brush-border membranes is mediated
    by the sodium-dependent organic cation transporter OCTN2.
  findings:
  - statement: OCTN2 protein is present in placental brush-border (but not basal)
      membranes and mediates Na+-dependent, high-affinity L-carnitine uptake for
      maternofetal transport.
    supporting_text: OCTN2, a high-affinity, Na(+)-dependent carnitine transporter,
      was present in placental BBM but not in isolated basal plasma membrane vesicles.
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: Supports carnitine transporter activity and brush-border (apical)
      localization.
- id: PMID:15523054
  title: PDZK1 directly regulates the function of organic cation/carnitine transporter
    OCTN2.
  findings:
  - statement: The OCTN2 C-terminal PDZ-binding motif (last four residues) binds
      PDZK1; PDZK1 co-expression stimulates OCTN2 carnitine transport capacity ~6-fold,
      and the two colocalize in kidney brush-border membranes.
    supporting_text: The present findings are the first to identify PDZK1 as a
      functional regulator of OCTN2 through direct interaction with the C terminus.
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: Establishes the functionally meaningful PDZ-domain (PDZK1)
      interaction; supersedes the bare protein-binding IPI.
- id: PMID:17274673
  title: OCTN2-mediated carnitine uptake in a newly discovered human proximal tubule
    cell line (Caki-1).
  findings:
  - statement: OCTN2 shows an apical membrane expression pattern in human proximal
      tubule Caki-1 cells and mediates Na+-dependent high-affinity carnitine uptake,
      consistent with renal tubular carnitine reabsorption.
    supporting_text: an apical membrane expression pattern of OCTN2 in Caki-1 cells
      was discovered.
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: Supports apical/renal localization and carnitine reabsorption role.
- id: PMID:17509700
  title: OCTN2VT, a splice variant of OCTN2, does not transport carnitine because
    of the retention in the endoplasmic reticulum caused by insertion of 24 amino
    acids in the first extracellular loop of OCTN2.
  findings:
  - statement: The functional OCTN2 is a plasma-membrane, N-glycosylated carnitine
      transporter; the OCTN2VT splice variant (isoform 3) is retained in the ER,
      poorly glycosylated, and cannot take up carnitine.
    supporting_text: OCTN2VT was retained in the endoplasmic reticulum (ER) with poor
      N-glycosylation. In addition, the retention in the ER caused no carnitine uptake
      into the cells.
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: Distinguishes plasma-membrane functional OCTN2 from ER-retained,
      transport-dead isoform 3.
- id: PMID:17855766
  title: Transport of butyryl-L-carnitine, a potential prodrug, via the carnitine
    transporter OCTN2 and the amino acid transporter ATB(0,+).
  findings:
  - statement: OCTN2 is a high-affinity, low-capacity transporter for butyryl-L-carnitine
      (electrogenic, Na+-dependent), in addition to L-carnitine.
    supporting_text: OCTN2 is a high-affinity/low-capacity transporter
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: Supports acyl-carnitine (butyryl-carnitine) transport by OCTN2.
- id: PMID:18005709
