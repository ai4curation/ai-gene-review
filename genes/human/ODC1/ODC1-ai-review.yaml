- id: file:human/ODC1/ODC1-uniprot.txt
  title: UniProt entry P11926 (DCOR_HUMAN), Ornithine decarboxylase
  findings:
  - statement: >-
      Authoritative UniProt record: catalytic activity (L-ornithine + H+ =
      putrescine + CO2, EC 4.1.1.17), PLP cofactor, obligate homodimer with shared
      active sites, antizyme-mediated ubiquitin-independent degradation, and
      Bachmann-Bupp syndrome gain-of-function truncating variants.
    reference_section_type: OTHER
