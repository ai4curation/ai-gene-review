- id: Reactome:R-HSA-350567
  title: Antizyme OAZ binds to Ornithine decarboxylase
  findings:
  - statement: >-
      Antizymes (OAZ) bind ODC monomers, preventing dimerization into active ODC;
      AZIN1 negatively regulates the OAZ-ODC interaction by binding OAZ.
    reference_section_type: OTHER
    supporting_text: >-
      Members of the OAZ (Ornithine decarboxylase antizyme) protein family bind ODC
      (ornithine decarboxylase) monomers
  reference_review:
