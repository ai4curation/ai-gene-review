- id: PMID:17407445
  title: A structural insight into the inhibition of human and Leishmania donovani
    ornithine decarboxylases by 1-amino-oxy-3-aminopropane.
  findings:
  - statement: >-
      Structural and kinetic characterization of human ODC (KM 0.08 mM for
      L-ornithine; EC 4.1.1.17). Two active sites at the dimer interface with Lys69
      and Cys360 from opposite monomers; PLP-dependent enzyme.
    reference_section_type: RESULTS
    supporting_text: >-
      The two active sites are found at the dimer interface, between the N-terminal
      domain of one monomer and the C-terminal domain of the other, with Lys 69 and
      Cys 360 contributing to each active site from opposite monomers
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Full text available; directly establishes catalytic activity, kinetics and
      the obligate-dimer active-site architecture. Basis of the EC assignment.
- id: PMID:17900240
  title: Human ornithine decarboxylase paralogue (ODCp) is an antizyme inhibitor but
    not an arginine decarboxylase.
  findings:
  - statement: >-
      Uses ODC-activity and ODC-degradation assays with human ODC to establish that
      the ODC paralogue is an antizyme inhibitor (AZIN2); reaffirms ODC as the
      rate-limiting polyamine-biosynthesis enzyme regulated by antizymes.
    reference_section_type: ABSTRACT
    supporting_text: >-
      ODC (ornithine decarboxylase), the rate-limiting enzyme in polyamine
      biosynthesis, is regulated by specific inhibitors, AZs (antizymes)
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Abstract-only cache; the assay measures ODC activity directly (basis of the
      IDA GO:0004586 annotation) and characterizes the antizyme/AZIN regulation of
      ODC.
- id: PMID:2317811
  title: Expression of human chromosome 2 ornithine decarboxylase gene in ornithine
    decarboxylase-deficient Chinese hamster ovary cells.
  findings:
  - statement: >-
      The human chromosome-2 ODC gene encodes functional ODC: expression in
      ODC-deficient CHO cells restored 70-400-fold ODC activity and increased
      growth, showing ODC/putrescine is required for cell proliferation.
    reference_section_type: ABSTRACT
    supporting_text: >-
      the ODC gene from human chromosome 2 encodes functional ODC protein
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Establishes that the human ODC1 gene product is a functional ornithine
      decarboxylase; basis of the TAS GO:0004586 annotation.
