    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Correctly cited human ODC structure. Note it does NOT support the GO:0042978
      "ornithine decarboxylase activator activity" annotation attributed to it via
      Reactome; that term describes an activator of ODC (antizyme inhibitor), not
      the enzyme.
