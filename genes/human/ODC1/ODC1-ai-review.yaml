  evidence_type: IEA
  original_reference_id: GO_REF:0000107
  qualifier: involved_in
  review:
    summary: >-
      Ensembl-projected (IEA) "regulation of protein catabolic process". This
      reflects the fact that ODC is itself a substrate of antizyme-directed
      ubiquitin-independent proteasomal degradation and that its C-terminal
      degradation elements are the target of that pathway. As a process ascribed to
      ODC it reads as ODC regulating catabolism, which over-interprets the biology
      (ODC is the regulated target, not the regulator). Not a core function;
      retained as a non-core, indirect involvement.
    action: KEEP_AS_NON_CORE
    supported_by:
