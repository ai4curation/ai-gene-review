suggested_questions:
- question: >-
    Beyond the cytosol, under what conditions does ODC1 localize to or act in the
    nucleus, and is any nuclear pool functionally distinct?
suggested_experiments:
- description: >-
    Structure-guided mutagenesis of the ODC1 C-terminal degradation elements to
    dissect how Bachmann-Bupp gain-of-function truncations increase enzyme
    stability/activity and putrescine output, paired with polyamine metabolomics
    in patient-derived cells.
