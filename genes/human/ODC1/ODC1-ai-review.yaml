- id: Reactome:R-HSA-351202
  title: Metabolism of polyamines
  findings:
  - statement: >-
      Polyamines are derived from ornithine by decarboxylation; polyamine levels
      are tightly regulated at the level of ODC.
    reference_section_type: OTHER
    supporting_text: >-
      Polyamine levels are tightly regulated at the level of the enzyme ornithine
      decarboxylase (ODC)
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
- id: Reactome:R-HSA-353125
  title: 26S proteosome degrades ODC holoenzyme complex
  findings:
  - statement: >-
      ODC turnover by the 26S proteasome is ubiquitin-independent; antizyme
      association (not ubiquitination) directs ODC to the proteasome.
    reference_section_type: OTHER
    supporting_text: >-
      Proteolytic processing of ODC is highly unusual in that ubiquitination is not
      required for this degradation.
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
- id: Reactome:R-HSA-70692
  title: ornithine => putrescine + CO2
  findings:
