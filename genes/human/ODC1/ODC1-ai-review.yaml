      Human ODC crystal structure at 2.1 A; describes the C-terminal basal
      degradation elements and antizyme-binding surface, establishing the dimeric
      enzyme and antizyme-mediated degradation model.
    reference_section_type: ABSTRACT
    supporting_text: >-
      Ornithine decarboxylase (ODC, EC 4.1.1.17) performs the first step in
      polyamine biosynthesis, the decarboxylation of ornithine to putrescine.
