- term:
    id: GO:0042978
    label: ornithine decarboxylase activator activity
  evidence_type: EXP
  original_reference_id: PMID:10623504
  qualifier: enables
  review:
    summary: >-
      This term means "binds to and increases ornithine decarboxylase activity",
      i.e. it describes an activator OF ODC (the role of antizyme inhibitors
      AZIN1/AZIN2), not the decarboxylase itself. ODC1 is the enzyme, not its
      activator, so this is a wrong-direction over-annotation. The cited reference
      (PMID:10623504) is the human ODC crystal structure and concerns
      antizyme-binding/structure, not an activator activity of ODC. Per policy an
      experimental (EXP) annotation is not removed; marked as over-annotated. The
      genuine molecular function is ornithine decarboxylase activity (GO:0004586).
    action: MARK_AS_OVER_ANNOTATED
    supported_by:
    - reference_id: PMID:10623504
      supporting_text: >-
        Ornithine decarboxylase (ODC, EC 4.1.1.17) performs the first step in
        polyamine biosynthesis, the decarboxylation of ornithine to putrescine.
