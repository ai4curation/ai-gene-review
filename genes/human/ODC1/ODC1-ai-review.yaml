id: P11926
gene_symbol: ODC1
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  ODC1 is ornithine decarboxylase (EC 4.1.1.17), the pyridoxal 5'-phosphate
  (PLP)-dependent lyase that catalyzes the first and rate-limiting step of
  polyamine biosynthesis: decarboxylation of L-ornithine to putrescine plus CO2.
  Putrescine is the precursor of the higher polyamines spermidine and spermine,
  which are essential for cell proliferation, growth and differentiation. The
  enzyme is an obligate homodimer whose two active sites are built from residues
  of both subunits (Lys69 covalently binds the PLP cofactor; Cys360 acts as the
  proton donor), so only the dimer is catalytically active. ODC is among the most
  tightly regulated enzymes in eukaryotes: it has an exceptionally short half-life
  and its degradation is triggered by ornithine decarboxylase antizymes (OAZ1/2/3),
  which bind ODC monomers, prevent productive dimerization and target ODC for
  ubiquitin-independent destruction by the 26S proteasome; antizyme inhibitors
  (AZIN1/AZIN2) counteract this. ODC acts in the cytosol (and nucleus). In humans,
  gain-of-function C-terminal truncating variants that escape nonsense-mediated
  decay cause Bachmann-Bupp syndrome, and ODC/polyamine metabolism is a
  well-established cancer drug target (irreversibly inhibited by
  alpha-difluoromethylornithine/eflornithine).
