id: Q96FZ7
gene_symbol: CHMP6
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  CHMP6 encodes the human Vps20 ortholog, a myristoylated ESCRT-III component that acts at endosomal
  membranes as an acceptor/nucleator for ESCRT-II and helps recruit CHMP4-family ESCRT-III subunits.
  Its best-supported cellular role is endolysosomal membrane-cargo quality control: MVB assembly and
  sorting of ubiquitinated/endocytosed cargo, delivery toward lysosomal degradation, and VPS4-mediated
  ESCRT-III remodeling through its internal MIM2 motif. Broader ESCRT functions in viral budding,
  cytokinesis, nuclear-envelope sealing, plasma-membrane repair, and autophagy are biologically
  plausible pathway contexts, but the CHMP6-specific literature makes endosomal MVB sorting the core
  function.
existing_annotations:
- term:
    id: GO:0005635
    label: nuclear envelope
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: is_active_in
  review:
    summary: 'Plausible secondary ESCRT pathway context for CHMP6: nuclear envelope.'
    action: KEEP_AS_NON_CORE
    reason: This annotation reflects broader ESCRT functions such as nuclear-envelope sealing, plasma membrane repair, cytokinesis,
      or cell-cycle phenotypes, but CHMP6-specific core evidence is stronger for endosomal MVB cargo sorting and ESCRT-III
      assembly/remodeling.
    supported_by:
    - reference_id: file:human/CHMP6/CHMP6-notes.md
      supporting_text: These processes are PN-relevant as ESCRT outputs, but they do not define CHMP6's core proteostasis
        function as well as endosomal cargo sorting and ESCRT-III assembly/recycling do.
