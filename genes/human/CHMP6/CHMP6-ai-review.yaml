  - statement: Core ESCRT-III proteins including hVps20/CHMP6 are autoinhibited and can assemble on endosomal membranes when
      the C-terminal inhibitory region is removed.
    supporting_text: removing approximately 40 amino acids from the C-terminus of each protein unmasks a common ability to
      associate with endosomal membranes and assemble into large polymeric complexes
core_functions:
- description: CHMP6 is a myristoylated Vps20/ESCRT-III component that links ESCRT-II to ESCRT-III on endosomal membranes.
    By binding ESCRT-II, CHMP4-family ESCRT-III subunits, and VPS4 through its MIM2 element, CHMP6 supports ESCRT-III assembly/remodeling,
    MVB formation and sorting of ubiquitinated/endocytosed membrane cargo, and downstream late-endosome-to-lysosome degradation
    of cargo such as EGFR and ferroportin.
