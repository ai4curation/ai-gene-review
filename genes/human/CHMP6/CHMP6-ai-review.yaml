- term:
    id: GO:0039702
    label: viral budding via host ESCRT complex
  evidence_type: IEA
  original_reference_id: GO_REF:0000117
  qualifier: involved_in
  review:
    summary: 'Over-annotated CHMP6 viral-budding term: viral budding via host ESCRT complex.'
    action: MARK_AS_OVER_ANNOTATED
    reason: Viral budding is an ESCRT pathway output, but CHMP6-specific depletion did not reduce HIV-1 release/infectivity
      and CHMP6 overexpression was not inhibitory in a key viral budding assay.
    supported_by:
    - reference_id: PMID:16973552
      supporting_text: HIV-1 release and infectivity were not reduced by efficient small interfering RNA depletion of EAP20/ESCRT-II
        or CHMP6/ESCRT-III
    - reference_id: PMID:18606141
      supporting_text: Several ESCRT functions, including HIV budding, are insensitive to CHMP6 depletion
    - reference_id: PMID:14519844
      supporting_text: nor did the ESCRT-II-binding component of ESCRT-III, CHMP6
    - reference_id: file:human/CHMP6/CHMP6-notes.md
      supporting_text: Treat viral budding as over-annotated for CHMP6.
