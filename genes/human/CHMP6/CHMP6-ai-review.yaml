suggested_questions:
- question: Can endogenous CHMP6 depletion/rescue cleanly separate its ESCRT-II acceptor/nucleator role from later VPS4-mediated
    ESCRT-III recycling during MVB sorting?
- question: Should CHMP6 viral-budding annotations be removed or generalized to pathway-level ESCRT context given CHMP6-specific
    depletion data showing no reduction in HIV-1 release?
- question: Which autophagy and nuclear-envelope annotations are directly CHMP6-specific rather than inherited from broad
    ESCRT-III complex biology?
suggested_experiments:
- description: Rescue CHMP6-depleted cells with wild-type, non-myristoylated G2A, ESCRT-II-binding-defective, CHMP4-binding-defective,
    and MIM2 VPS4-binding-defective CHMP6 while measuring EGFR and ferroportin degradation, MVB ILV cargo incorporation, and
    ESCRT-III/VPS4 residence times.
  hypothesis: CHMP6-dependent cargo degradation will require membrane association, ESCRT-II/CHMP4 handoff, and VPS4 MIM2-mediated
    remodeling, with separable effects on initial MVB sorting and later ESCRT-III turnover.
- description: Compare acute CHMP6, CHMP4, and VPS4 perturbations in HIV-1 budding, MVB cargo degradation, and plasma membrane
    repair assays using matched depletion/rescue conditions.
  hypothesis: CHMP6 will be essential or strongly limiting for ESCRT-II-dependent endosomal cargo sorting but less directly
    required for HIV budding and other ESCRT pathway outputs that can bypass ESCRT-II/CHMP6.
- description: Use endogenous tagging and proximity labeling to define when CHMP6 is recruited during starvation autophagy,
    amphisome formation, and nuclear-envelope repair relative to CHMP7, CHMP4, IST1, and VPS4.
  hypothesis: CHMP6 recruitment in these contexts will be secondary or context-dependent compared with its constitutive role
    in endosomal ESCRT-II-to-ESCRT-III handoff.
