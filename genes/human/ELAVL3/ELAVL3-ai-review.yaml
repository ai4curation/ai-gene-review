        of neurons'
    - reference_id: PMID:37697079
      supporting_text: Elavl3 expression is upregulated during the differentiation
        of neural stem cells into inhibitory GABAergic neurons, in parallel with 3’UTR
        lengthening. Depletion of Elavl3 during this differentiation process caused
        a shift towards using proximal polyA sites compared to control cells, with
        a concomitant delay in neural stem cell differentiation
