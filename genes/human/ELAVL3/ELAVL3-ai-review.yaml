- term:
    id: GO:0005515
    label: protein binding
  evidence_type: IPI
  original_reference_id: PMID:36950384
  review:
    summary: IPI annotation for protein binding based on physical interaction evidence
      from a large-scale proteomics study on autism spectrum disorders.
    action: REMOVE
    reason: While ELAVL3 does interact with proteins (UniProt mentions MAP1B light
      chain LC1, and IntAct shows interactions with DYRK1A, SCN2A, SYNGAP1), the generic
      "protein binding" term is uninformative and does not describe a molecular function.
      This term should not be used unless referring to a specific functional role
      (e.g., as an adapter or scaffold). The reference PMID:36950384 is a large-scale
      protein interaction study where ELAVL3 may have been detected as an interactor,
      but this does not constitute evidence for "protein binding" as a molecular function.
      ELAVL3's primary molecular function is RNA binding, not protein binding.
    supported_by:
    - reference_id: file:human/ELAVL3/ELAVL3-deep-research-perplexity-lite.md
      supporting_text: "Molecular Function: ELAVL3 binds preferentially to GU-rich\
        \ and AU-rich sequences in intronic regions and 3'-untranslated regions (3'-UTRs)\
        \ of target pre-mRNAs"
    - reference_id: PMID:36950384
      supporting_text: eCollection 2023 Mar 8.
