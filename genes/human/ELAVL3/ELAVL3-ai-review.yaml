- term:
    id: GO:0007399
    label: nervous system development
  evidence_type: IEA
  original_reference_id: GO_REF:0000043
  review:
    summary: IEA annotation for nervous system development based on UniProtKB keyword
      mapping. ELAVL3 is neuron-specific and plays roles in neuronal differentiation
      and maintenance.
    action: ACCEPT
    reason: This biological process term is well-supported. ELAVL3 is brain-specific
      and essential for neurogenesis, neuronal differentiation, and maintenance of
      neurons. The deep research indicates ELAVL3 is "involved in the development
      and maintenance of neurons" and knockout mice exhibit severe motor deficits
      and cerebellar ataxia. UniProt states it "may be involved in neuronal differentiation
      and maintenance".
    supported_by:
