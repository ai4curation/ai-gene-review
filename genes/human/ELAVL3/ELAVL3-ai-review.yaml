- term:
    id: GO:0000380
    label: alternative mRNA splicing, via spliceosome
  evidence_type: NAS
  review:
    summary: Added based on falcon-cited literature documenting ELAVL3 regulation
      of neuronal alternative splicing programs.
    action: NEW
    reason: Falcon and Mulligan 2023 (PMID:37697079) document that ELAVL3 regulates
      alternative splicing of neuronal transcripts (e.g., AnkG/ANK3 exon 34) with
      convergence on glutamate-regulation and excitability pathways. This is a core
      molecular process not previously captured in existing_annotations.
    supported_by:
    - reference_id: PMID:37697079
      supporting_text: Elavl3 regulates the embryonic-specific inclusion of vertebrate-specific
        exon 34 in the AnkG transcript.
    - reference_id: PMID:37697079
      supporting_text: High-throughput sequencing analysis of alternative splicing
        in the cerebellum of Elavl3−/− mice highlighted the convergence of targeted
        transcripts on glutamate levels and neuronal excitability
    - reference_id: file:human/ELAVL3/ELAVL3-deep-research-falcon.md
      supporting_text: ELAVL3 has a documented role in alternative splicing; all three
        RRMs plus the hinge region contribute to HuC-dependent splice regulation,
        and ELAVL3 loss alters neuronal splicing programs linked to excitability.
- term:
    id: GO:0110104
    label: mRNA alternative polyadenylation
  evidence_type: NAS
  review:
    summary: Added based on falcon-cited literature documenting ELAVL3 regulation
      of alternative polyadenylation and 3'-UTR length choice in neurons.
    action: NEW
    reason: Multiple sources cited by falcon (Mulligan 2023 PMID:37697079; Dorrity
      2023 PMID:37862432) demonstrate that ELAVL3 (with other nELAVLs) promotes neuronal
      3'-UTR lengthening through distal poly(A) site usage; ELAVL3 depletion shifts
      usage toward proximal sites. This is a distinct molecular process from splicing/stability
      and warrants a separate annotation.
    supported_by:
    - reference_id: PMID:37697079
      supporting_text: Depletion of Elavl3 during this differentiation process caused
        a shift towards using proximal polyA sites compared to control cells, with
        a concomitant delay in neural stem cell differentiation
    - reference_id: PMID:37862432
      supporting_text: the neuron-enriched ELAVL family of genes (ELAVL2, ELAVL3,
        and ELAVL4) can increase (i) 3'UTR length, (ii) dsRNA load, and (iii) activation
        of dsRNA-sensing PRRs such as MDA5, PKR, and TLR3
    - reference_id: file:human/ELAVL3/ELAVL3-deep-research-falcon.md
      supporting_text: ELAVL3 participates in regulation of alternative polyadenylation
        and 3′UTR length in neurons. ELAVL3 depletion shifts usage toward proximal
        poly(A) sites, whereas neuronal ELAVL proteins promote longer neuronal 3′UTRs.
