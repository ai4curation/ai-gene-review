      supporting_text: 'Neurogenesis: ELAVL3 is involved in the development and maintenance
        of neurons'
    - reference_id: file:human/ELAVL3/ELAVL3-deep-research-perplexity-lite.md
      supporting_text: ELAVL3 knockout mice exhibit progressive motor deficits, severe
        cerebellar ataxia, and Purkinje cell axonal degeneration
    - reference_id: PMID:37697079
      supporting_text: As Elavl3−/− mice aged, progressive severe cerebellar ataxia
        was observed
    - reference_id: PMID:37697079
      supporting_text: At the cellular level, Purkinje neurons had disrupted synaptic
        formation, swollen axons, and overall deficits in neuronal transport, highlighting
        the requirement for Elavl3 activity in these neurons
- term:
    id: GO:0030154
    label: cell differentiation
  evidence_type: IEA
  original_reference_id: GO_REF:0000043
  review:
    summary: IEA annotation for cell differentiation based on UniProtKB keyword mapping.
      This is a very general process term that applies to ELAVL3's role in neuronal
      differentiation.
    action: MODIFY
    reason: While technically correct (ELAVL3 is involved in neuronal differentiation),
      this term is too broad and non-specific. The more precise term would be neuronal
      differentiation or neuron differentiation, which better captures ELAVL3's tissue-specific
      role. Given that ELAVL3 is brain-specific and specifically involved in neurogenesis,
      a more specific term should be used.
    proposed_replacement_terms:
    - id: GO:0030182
      label: neuron differentiation
    supported_by:
