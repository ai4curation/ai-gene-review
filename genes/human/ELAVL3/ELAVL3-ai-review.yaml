id: Q14576
gene_symbol: ELAVL3
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: ELAVL3 (HuC) is a neuron-specific RNA-binding protein with three RNA
  recognition motifs (RRMs) and a hinge/linker region that binds to AU-/U-rich elements
  in the 3'-UTRs of target mRNAs to regulate mRNA stability, alternative splicing,
  alternative polyadenylation (3'-UTR length choice), and transcript abundance. RRM1
  and RRM2 directly associate with AU-rich RNA, while RRM3 promotes transcript stability
  via poly(A)-tail-associated mechanisms. ELAVL3 is predominantly cytoplasmic but
  shuttles between nucleus and cytoplasm via signals in the hinge region. It plays
  essential roles in neuronal differentiation, maintenance, and synaptic integrity,
  particularly in the cerebellum and hippocampus; ELAVL3 loss perturbs splicing programs
  converging on glutamate regulation and neuronal excitability (e.g., AnkG exon 34
  mis-inclusion), producing seizures and cerebellar ataxia in knockout models.
existing_annotations:
- term:
    id: GO:0140517
    label: protein-RNA adaptor activity
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: IBA annotation for protein-RNA adaptor activity based on phylogenetic
      inference. ELAVL3 functions as an RNA-binding protein that binds AU-rich elements
      in 3'-UTRs and regulates mRNA stability and processing, consistent with adaptor
      activity.
    action: ACCEPT
    reason: This term accurately captures ELAVL3's core molecular function as a protein
      that mediates interactions between RNA molecules and other cellular components
      through its RNA-binding activity. The deep research confirms ELAVL3 "binds preferentially
      to GU-rich and AU-rich sequences in intronic regions and 3'-untranslated regions
      (3'-UTRs) of target pre-mRNAs" and "regulates alternative splicing, mRNA stability,
      and transcript abundance". UniProt confirms it "binds to AU-rich element (ARE)
      sequences of target mRNAs" [PMID:10710437]. IBA annotations are typically well-curated
      and phylogenetically sound.
    supported_by:
    - reference_id: PMID:10710437
      supporting_text: HuC and HuD bind to the VEGF 3'-UTR regulatory segment (VRS)
        and to the c- myc 3'-UTR in a specific and concentration-dependent pattern
    - reference_id: file:human/ELAVL3/ELAVL3-deep-research-perplexity-lite.md
      supporting_text: ELAVL3 binds preferentially to GU-rich and AU-rich sequences
        in intronic regions and 3'-untranslated regions (3'-UTRs) of target pre-mRNAs.
        This binding regulates alternative splicing, mRNA stability, and transcript
        abundance
    - reference_id: file:human/ELAVL3/ELAVL3-deep-research-falcon.md
      supporting_text: ELAVL3 functions primarily as a post-transcriptional regulator
        that stabilizes target transcripts, in part by binding AU-rich elements and
        influencing poly(A)-tail-associated protection; ELAVL proteins can multimerize
        on RNA and oppose destabilizing factors.
    - reference_id: PMID:37697079
      supporting_text: Binding to RNA targets is facilitated by the RRM1 and RRM2
        domains preferentially recognising AU-rich elements in the 3ʹUTR of transcripts
- term:
    id: GO:0003676
    label: nucleic acid binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: IEA annotation for nucleic acid binding based on InterPro domain assignment.
      This is a very general parent term for RNA binding.
    action: MODIFY
    reason: While technically correct (ELAVL3 does bind nucleic acids), this term
      is too broad and uninformative. ELAVL3 specifically binds RNA, not DNA, through
      its three RRM domains. The more specific term GO:0003723 (RNA binding) is already
      annotated and better represents the actual molecular function.
    proposed_replacement_terms:
    - id: GO:0003723
      label: RNA binding
    supported_by:
    - reference_id: file:human/ELAVL3/ELAVL3-deep-research-perplexity-lite.md
      supporting_text: ELAVL3 contains three RNP-type RNA recognition motifs (RRMs),
        which are responsible for its RNA-binding activity
- term:
    id: GO:0003723
