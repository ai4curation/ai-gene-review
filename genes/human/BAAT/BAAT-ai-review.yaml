id: Q14032
gene_symbol: BAAT
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  BAAT is the human bile acid-CoA:amino acid N-acyltransferase (EC 2.3.1.65), the enzyme
  that catalyzes the final conjugation (amidation) step of bile-acid synthesis. It transfers
  the bile acid moiety from its CoA thioester (a bile-acyl-CoA such as choloyl-CoA or
  chenodeoxycholoyl-CoA, generated upstream by the bile acyl-CoA synthetase SLC27A5) onto the
  amino group of glycine or taurine, producing the glyco- and tauro-conjugated bile acids that
  constitute the major secreted and biliary forms. A single monomeric enzyme carries out
  conjugation with both glycine and taurine. Catalysis uses a Cys-235/Asp-328/His-362 charge-relay
  (catalytic triad) characteristic of the C/M/P thioester hydrolase (alpha/beta hydrolase) family,
  with Cys-235 as the nucleophile that forms a covalent bile acid-enzyme intermediate. The same
  active site confers a secondary bile-acyl-CoA thioesterase/hydrolase activity (choloyl-CoA
  hydrolase, EC 3.1.2.27); in vitro the recombinant enzyme also hydrolyzes long- and very
  long-chain acyl-CoAs and conjugates fatty acids to glycine. BAAT is a liver-enriched enzyme
  localized to the peroxisome and the cytosol (endogenous hepatocyte enzyme is predominantly
  peroxisomal, with a cell-type-dependent cytosolic pool). Loss-of-function variants cause
  familial hypercholanemia (FHCA3), an autosomal-recessive bile-acid conjugation defect marked
  by accumulation of unconjugated bile acids, fat malabsorption, fat-soluble-vitamin deficiency,
  and growth failure.
