core_functions:
- description: >-
    Bile acid-CoA:amino acid N-acyltransferase - the terminal, defining catalytic activity of
    BAAT. It transfers the bile acid from its CoA thioester (choloyl-CoA, chenodeoxycholoyl-CoA)
    onto the amino group of glycine (or taurine), producing glyco- and tauro-conjugated bile
    acids, the final step of bile-acid biosynthesis. A single monomeric enzyme conjugates both
    amino acids using a Cys-235/Asp-328/His-362 catalytic triad, with Cys-235 forming a covalent
    bile acid-enzyme intermediate.
  molecular_function:
    id: GO:0047963
    label: glycine N-choloyltransferase activity
  directly_involved_in:
  - id: GO:0006699
    label: bile acid biosynthetic process
  - id: GO:0002152
    label: bile acid conjugation
  - id: GO:0008206
    label: bile acid metabolic process
