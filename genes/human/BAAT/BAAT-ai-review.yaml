  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: involved_in
  review:
    summary: >-
      IBA involvement in fatty acid metabolic process, reflecting the acyl-CoA
      thioesterase/fatty-acyl-CoA hydrolase side activity of the BAAT/type-I acyl-CoA thioesterase
      family. In vitro BAAT hydrolyzes long/very-long-chain acyl-CoAs and conjugates fatty acids
