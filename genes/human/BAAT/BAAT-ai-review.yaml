  - id: GO:0005777
    label: peroxisome
  - id: GO:0005829
    label: cytosol
  supported_by:
  - reference_id: PMID:8034703
    supporting_text: capable of catalyzing the conjugation of cholic acid with both glycine and taurine.
  - reference_id: PMID:2037576
    supporting_text: a single monomeric enzyme is responsible for the conjugation of bile acids with glycine
      or taurine in human liver.
  - reference_id: PMID:12239217
    supporting_text: data from this study support the existence of an essential catalytic
      triad within hBAT consisting of Cys-235, His-362, and Asp-328
  - reference_id: PMID:12810727
    supporting_text: catalyzes the conjugation of
