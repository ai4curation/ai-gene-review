suggested_questions:
- question: >-
    Does human AASS have any validated moonlighting function outside the mitochondrion (e.g.
    a nuclear/transcriptional role analogous to that reported for the Drosophila ortholog),
    or is such a role restricted to insects?
suggested_experiments:
- description: >-
    Test whether endogenous AASS is detectable in the nucleus of human cells and whether it
    associates with chromatin or represses transcription, to determine if the Drosophila-derived
    transcriptional moonlighting annotations are conserved in humans.
