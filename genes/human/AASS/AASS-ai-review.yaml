- id: PMID:10775527
  title: Identification of the alpha-aminoadipic semialdehyde synthase gene, which
    is defective in familial hyperlysinemia.
  findings:
  - statement: >-
      Identifies human AASS as a bifunctional enzyme (N-terminal LKR ~ yeast LYS1,
      C-terminal SDH ~ yeast LYS9) catalyzing the first two steps of lysine degradation;
      inactivating mutations cause hyperlysinemia.
    reference_section_type: ABSTRACT
    supporting_text: >-
      we propose that AASS catalyzes the first two steps of the major lysine-degradation
      pathway in human cells and that inactivating mutations in the AASS gene are a cause
      of hyperlysinemia.
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified. Defining reference for the human gene, its bifunctional domain
      organization, and the disease link (HYPLYS1).
