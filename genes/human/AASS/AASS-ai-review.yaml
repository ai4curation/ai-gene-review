id: Q9UDR5
gene_symbol: AASS
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  AASS (alpha-aminoadipic semialdehyde synthase; alias LKR/SDH) is a mitochondrial
  bifunctional enzyme that catalyzes the first two committed steps of the main
  (saccharopine) pathway of L-lysine degradation in the mitochondrial matrix. Its
  N-terminal domain carries lysine-ketoglutarate reductase (LKR, EC 1.5.1.8) activity,
  which condenses L-lysine with 2-oxoglutarate to form L-saccharopine using NADPH; its
  C-terminal domain carries saccharopine dehydrogenase (SDH, EC 1.5.1.9) activity, which
  oxidizes L-saccharopine to L-2-aminoadipate-6-semialdehyde (alpha-aminoadipic
  semialdehyde) and L-glutamate, reducing NAD+. The two domains are homologous to the
  yeast Lys1 and Lys9 enzymes, and the protein forms a homotetramer. AASS is expressed
  broadly with highest levels in liver and is induced by starvation. Loss of AASS activity
  causes autosomal recessive hyperlysinemia type 1 and saccharopinuria, metabolic
  conditions that are generally benign; AASS is also secondarily impaired in
  mitochondrial NADP(H) deficiency (DECRD, due to NADK2 mutation).
