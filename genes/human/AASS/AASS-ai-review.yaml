- term:
    id: GO:0000122
    label: negative regulation of transcription by RNA polymerase II
  evidence_type: ISS
  original_reference_id: GO_REF:0000024
  qualifier: involved_in
  review:
    summary: >-
      ISS transfer from the Drosophila ortholog dLKR/SDH (UniProtKB:Q9VLX0), which was
      reported to have a nuclear/transcriptional moonlighting role in fly. No experimental
      support in human, and the assignment conflicts with the established mitochondrial-matrix
      metabolic localization of the human enzyme.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      This is a species-specific moonlighting function reported for the Drosophila protein,
      transferred by sequence similarity from a single non-mammalian ortholog. Human AASS
      is a mitochondrial-matrix enzyme with no evidence for transcriptional regulation; the
      transferred nuclear role is not validated for human and is not a core function.
      Per curation policy this ISS transfer is marked as over-annotated rather than removed.
    propagation_review:
      root_cause: PROPAGATION_BAD
      failure_modes:
      - FUNCTIONAL_DIVERGENCE
      source_entities:
      - source_id: UniProtKB:Q9VLX0
        source_label: Drosophila melanogaster LKR/SDH (dLKR/SDH)
        source_status: SUPPORTS_SOURCE_BUT_NOT_TARGET
        comment: >-
          Nuclear/transcriptional moonlighting reported for the fly enzyme; not conserved
          or validated for human AASS.
