- id: PMID:463877
  title: 'Familial hyperlysinemia: enzyme studies, diagnostic methods, comments on
    terminology.'
  findings:
  - statement: >-
      Enzyme studies in hyperlysinemia patients show combined deficiency of
      lysine-ketoglutarate reductase and saccharopine dehydrogenase; the activities
      co-purify from human liver and localize to the same protein.
    reference_section_type: ABSTRACT
    supporting_text: >-
      In all instances there was a deficiency in lysine-ketoglutarate reductase,
      saccharopine dehydrogenase, and saccharopine oxidoreductase activities.
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified. Experimental basis for both AASS enzyme activities and for the
      type I / saccharopinuria distinction.
