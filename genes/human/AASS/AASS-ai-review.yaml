- term:
    id: GO:0004754
    label: saccharopine dehydrogenase (NAD+, L-lysine-forming) activity
  evidence_type: ISS
  original_reference_id: GO_REF:0000024
  qualifier: enables
  review:
    summary: >-
      ISS transfer (from Drosophila Q9VLX0) of the L-lysine-forming (biosynthetic, yeast
      Lys1-type) direction of saccharopine dehydrogenase. This is the reverse (anabolic)
      reaction; the human enzyme runs the catabolic activities (LKR GO:0047130 and
      glutamate-forming SDH GO:0047131), not lysine biosynthesis.
    action: MODIFY
    reason: >-
      Mammals do not synthesize lysine via saccharopine; AASS is catabolic. The correct
      catalytic activities are the NADP+, L-lysine-forming reductase (GO:0047130) and the
      NAD+, L-glutamate-forming dehydrogenase (GO:0047131). The lysine-forming SDH direction
      (GO:0004754) is the wrong physiological direction for the human enzyme.
    proposed_replacement_terms:
