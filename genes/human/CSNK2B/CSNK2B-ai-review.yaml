  title: Protein kinase CK2 modulates HSJ1 function through phosphorylation of the
    UIM2 domain.
  findings:
  - statement: CK2 (a tetramer of two catalytic and two regulatory beta subunits)
      phosphorylates HSJ1/DNAJB2 within its UIM2 (Ser250 dominant, Ser247 hierarchical),
      reducing HSJ1 binding to ubiquitylated clients and chaperone activity; CK2 inhibition
      enhances client binding, i.e. CK2 negatively regulates proteasomal degradation
      of HSJ1 clients. CK2 is highly pleiotropic and constitutively active and its
      major recognized function is counteracting apoptosis.
