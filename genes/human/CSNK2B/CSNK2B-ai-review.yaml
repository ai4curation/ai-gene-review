core_functions:
- description: Regulatory (beta) subunit of the protein kinase CK2 holoenzyme - a non-catalytic
    protein kinase regulatory subunit that dimerizes and bridges the two catalytic
    subunits (CSNK2A1/CSNK2A2), stabilizing the holoenzyme and modulating its basal
    activity and substrate selectivity.
  molecular_function:
    id: GO:0019887
    label: protein kinase regulator activity
  in_complex:
    id: GO:0005956
    label: protein kinase CK2 complex
  supported_by:
  - reference_id: PMID:11574463
    supporting_text: the regulatory subunits form a stable dimer linking the two catalytic
      subunits, which make no direct contact with one another
  - reference_id: PMID:19324893
    supporting_text: The CK2beta subunit is important in the assembly of CK2, enzyme
      stability and enzyme activity.
- description: Molecular adaptor/scaffold that recruits specific substrates and partner
    proteins to the CK2 holoenzyme (e.g. via its C-terminal region and the KSSR protein-interaction
    pocket), redirecting CK2 activity toward selected substrates and bridging interactions
    such as ARK2N-Jun.
  molecular_function:
    id: GO:0030674
    label: protein-macromolecule adaptor activity
  supported_by:
  - reference_id: PMID:31341047
    supporting_text: silencing of CK2β, but not the CK2α catalytic subunit, abrogated the ARKL1-Jun interaction and phenocopied ARKL1 silencing in promoting EBV reactivation
  - reference_id: PMID:20719947
    supporting_text: protein interactions with CK2β can redirect CK2 to increase
      CK2 activity toward specific substrates
- description: As part of the constitutively active CK2 holoenzyme, contributes to serine/threonine
    protein phosphorylation of acidic-motif substrates (consensus S/T-X-X-D/E), the
    biochemical activity underlying CK2's pleiotropic downstream roles.
  molecular_function:
    id: GO:0004674
    label: protein serine/threonine kinase activity
  in_complex:
    id: GO:0005956
    label: protein kinase CK2 complex
  supported_by:
  - reference_id: PMID:28031292
    supporting_text: CK2 is a highly pleiotropic and constitutively active enzyme mainly
      present in cells as a tetramer, composed of two catalytic (α and/or α') and
      two regulatory (β) subunits.
proposed_new_terms: []
suggested_questions:
- Which biological functions of CSNK2B are genuinely independent of the CK2 catalytic
  subunits (e.g. monomeric/free CK2beta roles) versus mediated through the holoenzyme?
- Does POBINDS pathology arise primarily from reduced CK2 holoenzyme activity (haploinsufficiency)
  or from loss of specific CK2beta adaptor/substrate-recruitment functions?
- How does the KSSR protein-interaction pocket shape the spectrum of CK2beta-dependent
  substrates and partners across tissues?
suggested_experiments:
- Quantitative phosphoproteomics comparing CSNK2B-null/knockdown versus wild-type cells
  to define the CK2beta-dependent substrate landscape and distinguish holoenzyme-dependent
  from beta-independent effects.
- Structure-guided separation-of-function mutants (e.g. KSSR pocket, C-terminal alpha-contact
  region, zinc-finger dimerization) to dissect adaptor/substrate-recruitment roles
  from holoenzyme assembly and basal-activity regulation.
- Modeling POBINDS variants (truncating and missense) in neuronal systems to test holoenzyme
  assembly, stability, basal CK2 activity, and effects on specific substrate phosphorylation.
