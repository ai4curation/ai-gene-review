id: P67870
gene_symbol: CSNK2B
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: CSNK2B (casein kinase II subunit beta, CK2beta) is the non-catalytic
  regulatory subunit of protein kinase CK2 (casein kinase 2), a constitutively active,
  highly pleiotropic acidophilic serine/threonine kinase. The CK2 holoenzyme is a
  heterotetramer in which a CSNK2B beta dimer bridges two catalytic alpha subunits
  (CSNK2A1 and/or CSNK2A2); the beta subunits form a stable zinc-finger-mediated dimer
  that links the two catalytic subunits, which make no direct contact with each other.
  CSNK2B has no catalytic activity of its own. Within the holoenzyme it docks and stabilizes
  the catalytic subunits, raises basal catalytic activity, modulates substrate specificity
  and selectivity, and can recruit specific substrates and partners (e.g. via its C-terminal
  region and its KSSR protein-interaction pocket). CK2 phosphorylates hundreds of substrates
  bearing acidic residues C-terminal to the phosphoacceptor (consensus S/T-X-X-D/E),
  influencing transcription, translation, cell cycle, DNA repair, Wnt and other signaling,
  circadian rhythm, and apoptosis (its major recognized role being to counteract apoptosis).
  CSNK2B also has activities reported to be partly independent of CK2 catalysis, including
  negative regulation of cell proliferation and adaptor/scaffolding roles. It localizes
  predominantly to the nucleus and cytoplasm. In humans, de novo loss-of-function and
  missense variants cause Poirier-Bienvenu neurodevelopmental syndrome (POBINDS), an
  autosomal dominant disorder of seizures and intellectual disability, consistent with
  haploinsufficiency.
