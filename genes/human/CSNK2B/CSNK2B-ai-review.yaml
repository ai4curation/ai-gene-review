existing_annotations:
- term:
    id: GO:0005634
    label: nucleus
  evidence_type: IEA
  original_reference_id: GO_REF:0000044
  qualifier: located_in
  review:
    summary: CK2beta is predominantly nuclear (and cytoplasmic); nuclear localization
      is well supported experimentally. Accept as a correct, if general, localization.
    action: ACCEPT
    reason: Nucleus is a documented subcellular location of CSNK2B (UniProt SUBCELLULAR
      LOCATION; experimental nucleus annotations from PMID:31341047 and PMID:21282530).
- term:
    id: GO:0005956
    label: protein kinase CK2 complex
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: part_of
  review:
    summary: CSNK2B is, by definition, a subunit of the CK2 holoenzyme (protein kinase
      CK2 complex). This is the core cellular-component annotation for this gene.
    action: ACCEPT
    reason: Direct structural and biochemical evidence places CSNK2B as the regulatory
      subunit bridging the two catalytic subunits in the CK2 holoenzyme.
    supported_by:
    - reference_id: PMID:11574463
      supporting_text: In the CK2 complex the regulatory subunits form a stable dimer
        linking the two catalytic subunits, which make no direct contact with one
        another.
- term:
    id: GO:0019887
    label: protein kinase regulator activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: Protein kinase regulator activity is the core molecular function of CSNK2B
      - as the regulatory subunit it modulates the basal activity, stability and substrate
      selectivity of the CK2 catalytic subunits.
    action: ACCEPT
    reason: CSNK2B is the prototypical protein kinase regulatory subunit; this term
      captures its central non-catalytic function within the holoenzyme.
    supported_by:
    - reference_id: PMID:19324893
      supporting_text: The CK2beta subunit is important in the assembly of CK2, enzyme
        stability and enzyme activity. It can interact with modulators of CK2 activity
        as well as with CK2 substrates and is thought to be required for the selection
        of substrates.
