id: Q9H7P6
gene_symbol: MVB12B
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: MVB12B is a metazoan ESCRT-I fourth subunit that complexes with TSG101, VPS28, and VPS37-family subunits. Its
  best-supported core cellular role is ESCRT-I-dependent sorting of ubiquitinated endosomal cargo into multivesicular bodies,
  supported by MABP acidic-phospholipid binding and ESCRT-I composition evidence. Viral budding and virus maturation are direct
  ESCRT contexts but are non-core for this proteostasis review.
