id: O94925
gene_symbol: GLS
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  GLS (kidney-type glutaminase, also known as GLS1) is a mitochondrial,
  phosphate-activated glutaminase (EC 3.5.1.2) that catalyzes the hydrolytic
  deamidation of L-glutamine to L-glutamate plus ammonia, the first and
  committed step of glutaminolysis. The gene produces two catalytically active
  splice isoforms, KGA (isoform 1) and the shorter GAC/glutaminase C (isoform 3),
  and a catalytically inactive muscle isoform GAM (isoform 2). The enzyme is
  synthesized as a ~74-kDa cytosolic precursor that is imported into mitochondria
  and processed by the mitochondrial-processing peptidase into mature 68- and
  65-kDa chains that reside in the mitochondrial matrix. It assembles into
  homotetramers (dimers of dimers), and phosphate-driven tetramerization is
  coupled to catalytic activation; C-terminal ankyrin repeats modulate higher-order
  assembly. The glutamate produced feeds the TCA cycle (via glutamate
  dehydrogenase and transaminases to alpha-ketoglutarate) for energy and
  anaplerosis. GLS is central to renal ammoniagenesis and acid-base homeostasis,
  to the brain glutamate/glutamine cycle that supplies neurotransmitter glutamate,
  and to the elevated glutamine metabolism of many proliferating cancers, where it
  is an actively pursued drug target (allosteric inhibitors such as BPTES and
  CB-839/telaglenastat). Loss-of-function GLS variants cause severe neonatal
  developmental and epileptic encephalopathy and a global developmental
  delay/ataxia syndrome, whereas a gain-of-function variant causes cataract with
  glutamate excess and profound developmental delay.
