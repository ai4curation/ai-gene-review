    correctness: VERIFIED
    review_notes: High-throughput RBP atlas; supports the HDA RNA binding annotation but does not distinguish 7SL RNA binding.
- id: PMID:22681889
  title: The mRNA-bound proteome and its global occupancy profile on protein-coding transcripts.
