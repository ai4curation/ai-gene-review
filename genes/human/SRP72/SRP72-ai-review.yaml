gene_symbol: SRP72
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  SRP72 is the largest protein subunit of the mammalian signal recognition
  particle (SRP), a cytosolic ribonucleoprotein composed of a 300-nucleotide 7SL
  RNA and six proteins (SRP9, SRP14, SRP19, SRP54, SRP68 and SRP72). SRP72 forms
  a stable heterodimer with SRP68 and, together, they bind a regulatory region of
  the 7SL RNA to constitute part of the SRP S-domain. SRP72 is an RNA-binding
  scaffolding subunit rather than a GTPase: its N-terminal tetratricopeptide-repeat
  (TPR) region binds an extended linear motif of SRP68, while its C-terminal
  RNA-binding region threads along the 5e/5f loops of the 7SL RNA, remodeling the
  RNA into a state competent for SRP54 binding and modulating ribosome contacts.
  Through these interactions SRP72 contributes to assembly and architecture of SRP
  and to its core biological role, the co-translational targeting of secretory and
  membrane proteins to the endoplasmic reticulum: SRP recognizes the signal
  sequence of nascent chains emerging from the ribosome and delivers the
  ribosome-nascent chain complex to the membrane-anchored SRP receptor, where
  translocation into the ER ensues. SRP72 is broadly expressed, acts in the cytosol
  and at the ER membrane, and heterozygous mutations in the gene cause
  autosomal-dominant bone marrow failure (aplastic anemia/myelodysplasia, BMFS1).
