  findings:
  - statement: Under acute heat shock, 7SL RNA and SRP (independent of signal peptides) selectively arrest transcription and translation; SRP binds ribosomes and inhibits new protein synthesis, revealing an SRP function in the acute thermal-stress response beyond protein secretion.
