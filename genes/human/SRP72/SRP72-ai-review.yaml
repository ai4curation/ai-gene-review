suggested_questions:
- question: Beyond its structural/RNA-binding role in SRP, does SRP72 have any SRP-independent function that explains the hematopoietic specificity of BMFS1 (bone marrow failure)?
- question: How do the BMFS1 SRP72 variants (e.g. R207H) mechanistically impair SRP assembly or ER targeting, and why is the phenotype dominant rather than recessive?
suggested_experiments:
- description: Reconstitute SRP assembly in vitro with purified SRP68, wild-type vs BMFS1-variant SRP72 and 7SL RNA to quantify effects on heterodimer formation, RNA binding, and SRP54-binding competence.
- description: Use a cell model (e.g. CRISPR knock-in of R207H) with proximity labeling and ribosome profiling to test whether the variant alters co-translational ER targeting efficiency and the secretome, particularly in hematopoietic lineages.
