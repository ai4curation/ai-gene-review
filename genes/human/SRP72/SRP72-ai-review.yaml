- id: PMID:24965446
  title: Host factors that interact with the pestivirus N-terminal protease, Npro, are components of the ribonucleoprotein complex.
  findings:
  - statement: SRP72 co-purifies with the pestivirus Npro protease among ribosomal/ribonucleoprotein components.
    reference_section_type: ABSTRACT
  reference_review:
    relevance: LOW
    correctness: VERIFIED
    review_notes: Host-virus interactome; source of a bare protein binding IPI (partner is the viral Npro protease). Not core to SRP72 function.
- id: PMID:27899666
  title: Structures of human SRP72 complexes provide insights into SRP RNA remodeling and ribosome interaction.
  findings:
  - statement: The SRP72-PBD is a TPR that binds an extended linear SRP68 motif with high affinity; the SRP72-RBD is a flexible peptide crawling along the 5e/5f loops of SRP RNA, forming an RNA kink-turn and remodeling the ribosome-binding 5f-loop.
    reference_section_type: ABSTRACT
  - statement: Docking into cryo-EM density reveals multiple contact sites between SRP68/72 and the ribosome, explaining SRP72's role in the SRP pathway.
    reference_section_type: ABSTRACT
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: Definitive structural study of SRP72; basis for the 7S RNA binding (IMP), TPR domain binding (IPI), ribosome binding (IMP) and SRP membership (IDA) annotations.
- id: PMID:28369529
  title: Human apo-SRP72 and SRP68/72 complex structures reveal the molecular basis of protein translocation.
  findings:
  - statement: Crystal structures of human apo-SRP72 and the SRP68/72 complex; the SRP68-binding domain of SRP72 contains four atypical TPRs and a flexible C-terminal cap, and cancer-associated mutations disrupt the SRP68-SRP72 interaction and ER co-localization.
    reference_section_type: ABSTRACT
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: PubMed-verified structural study; supports the SRP68 interaction region and the EXP ER localization annotation.
