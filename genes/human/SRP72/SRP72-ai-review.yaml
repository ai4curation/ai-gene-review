- id: PMID:16672232
  title: 'Protein SRP68 of human signal recognition particle: identification of the RNA and SRP72 binding domains.'
  findings:
  - statement: SRP68 and SRP72 form a heterodimer; ~150 N-terminal residues of SRP72, within a predicted tandem array of four TPR-like motifs, mediate binding to SRP68.
    reference_section_type: ABSTRACT
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: PubMed-verified; defines the SRP72 N-terminal TPR region as the SRP68-binding domain. Source of the SRP68 IPI protein-binding annotation.
- id: PMID:17254600
  title: Protein-induced conformational changes of RNA during the assembly of human signal recognition particle.
  findings:
  - statement: SRP68/72, together with SRP19, rearranges the 7SL RNA into an SRP54-binding-competent state, demonstrating SRP72's role in SRP assembly.
    reference_section_type: ABSTRACT
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: PubMed-verified; supports the signal recognition particle binding (GO:0005047) annotation and SRP72's RNA-remodeling/assembly function.
- id: PMID:18089836
  title: 'A new mechanism of 6-((2-(dimethylamino)ethyl)amino)-3-hydroxy-7H-indeno(2,1-c)quinolin-7-one dihydrochloride (TAS-103) action discovered by target screening with drug-immobilized affinity beads.'
  findings:
  - statement: Identifies the signal recognition particle (SRP) as the cellular target of TAS-103; primarily characterizes SRP54 but assays the intact SRP complex.
    reference_section_type: ABSTRACT
  reference_review:
    relevance: LOW
    correctness: VERIFIED
    review_notes: Abstract foregrounds SRP54; cited in GOA only for the SRP (ER targeting) CC of SRP72 as an SRP subunit. Not removed for subunit-naming reasons per guidelines.
- id: PMID:22541560
  title: Exome sequencing identifies autosomal-dominant SRP72 mutations associated with familial aplasia and myelodysplasia.
  findings:
  - statement: Heterozygous SRP72 mutations cause autosomal-dominant aplastic anemia/myelodysplasia (BMFS1); variants mislocalize the protein and the R207H variant affects ER localization.
    reference_section_type: ABSTRACT
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: PubMed-verified disease study; source of the EXP cytoplasm and IDA ER localization annotations and the BMFS1 disease association.
- id: PMID:22658674
  title: Insights into RNA biology from an atlas of mammalian mRNA-binding proteins.
  findings:
