id: P05093
gene_symbol: CYP17A1
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  CYP17A1 (cytochrome P450c17; steroid 17-alpha-hydroxylase/17,20 lyase) is a microsomal,
  endoplasmic-reticulum-membrane heme-thiolate cytochrome P450 monooxygenase that sits at the
  central branch point of steroidogenesis. It is a single bifunctional enzyme with two
  catalytic activities on one polypeptide: (1) 17-alpha-hydroxylase (EC 1.14.14.19), which
  hydroxylates the C21 steroids pregnenolone and progesterone to their 17-alpha-hydroxy
  derivatives (precursors of the glucocorticoid cortisol), and (2) 17,20-lyase (EC 1.14.14.32),
  which cleaves the C17-C20 bond of the 17-alpha-hydroxy intermediates to generate the C19
  androgen precursors dehydroepiandrosterone (from 17-alpha-hydroxypregnenolone) and
  androstenedione (from 17-alpha-hydroxyprogesterone), the committed step toward androgens and
  estrogens. The relative use of the hydroxylase-only versus hydroxylase-plus-lyase route
  determines whether steroid flux is directed to cortisol or to sex steroids. Catalysis is a
  cytochrome-P450 monooxygenase reaction using molecular oxygen, with two electrons supplied by
  NADPH via cytochrome P450 reductase (POR); the 17,20-lyase activity additionally requires
  cytochrome b5, which acts as an allosteric effector that increases the lyase Vmax without
  direct electron transfer. The enzyme is predominantly expressed in the adrenal cortex and
  gonads. Loss-of-function of CYP17A1 causes combined 17-alpha-hydroxylase/17,20-lyase
  deficiency (a form of congenital adrenal hyperplasia, MIM:202110), presenting with
  hypertension and defective sexual development; isolated 17,20-lyase deficiency (46,XY
  disorder of sex development) also occurs. CYP17A1 is a validated drug target: the inhibitor
  abiraterone blocks androgen synthesis in castration-resistant prostate cancer.
