- id: file:human/CYP17A1/CYP17A1-uniprot.txt
  title: UniProtKB P05093 CYP17A1 (CP17A_HUMAN) record
  findings:
  - statement: >-
      UniProt describes CYP17A1 as a cytochrome P450 monooxygenase in corticoid and androgen
      biosynthesis that 17-alpha-hydroxylates C21 steroids and then cleaves the C17-C20 bond to
      form C19 steroids (DHEA, androstenedione); localizes to the endoplasmic reticulum/microsome
      membrane; 17,20-lyase is stimulated allosterically by cytochrome b5.
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Primary source for gene identity, catalytic activities (EC 1.14.14.19/1.14.14.32),
      cofactor (heme), subcellular location, and disease association (AH5).
- id: PMID:1347802
  title: Identification by molecular cloning of an autoantigen associated with Addison's
    disease as steroid 17 alpha-hydroxylase.
  findings:
  - statement: >-
      Identifies the Addison's-disease adrenal autoantigen as steroid 17-alpha-hydroxylase
      (CYP17A1) via molecular cloning.
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: >-
      Establishes gene identity as steroid 17-alpha-hydroxylase; supports the MF assignment
      (autoimmune-antigen context is peripheral to core function).
- id: PMID:22170710
  title: A missense mutation in the human cytochrome b5 gene causes 46,XY disorder
    of sex development due to true isolated 17,20 lyase deficiency.
  findings:
  - statement: >-
      A CYB5A missense mutation causes true isolated 17,20-lyase deficiency, demonstrating that
      CYP17A1 17,20-lyase activity depends on cytochrome b5 as an allosteric enhancer.
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Full text available; directly characterizes CYP17A1 17,20-lyase function and its
      b5-dependence, though the causal mutation is in CYB5A.
- id: PMID:22266943
  title: Structures of cytochrome P450 17A1 with prostate cancer drugs abiraterone
    and TOK-001.
  findings:
  - statement: >-
      Crystal structures of CYP17A1 with abiraterone/TOK-001 show inhibitors coordinating the
      heme iron and reveal the basis for the enzyme's dual hydroxylase and lyase activities.
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Structural/experimental support for heme binding and the core monooxygenase/lyase MF.
- id: PMID:24140098
  title: A review of the literature on common CYP17A1 mutations in adults with 17-hydroxylase/17,20-lyase
    deficiency, a case series of such mutations among Koreans and functional characteristics
    of a novel mutation.
  findings:
  - statement: >-
      Reviews CYP17A1 loss-of-function mutations causing 17-hydroxylase/17,20-lyase deficiency
      (CAH with hypertension and sexual infantilism) and functionally characterizes a novel
      mutation.
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Mutant-phenotype (IMP) evidence linking CYP17A1 activity loss to disease.
- id: PMID:25301938
  title: Structures of human steroidogenic cytochrome P450 17A1 with substrates.
  findings:
  - statement: >-
      Substrate-bound CYP17A1 structures explain hydroxylase substrate orientation (Asn202) and
      the basis of 17,20-lyase substrate specificity; CYP17A1 controls mineralocorticoid,
      glucocorticoid, androgen and estrogen levels.
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Experimental structural/functional support for the core MF and the branch-point role.
- id: PMID:27339894
  title: 'Mechanism of 17α,20-Lyase and New Hydroxylation Reactions of Human Cytochrome
    P450 17A1: 18O LABELING AND OXYGEN SURROGATE EVIDENCE FOR A ROLE OF A PERFERRYL
    OXYGEN.'
  findings:
  - statement: >-
      Mechanistic study (18O labeling) of the human P450 17A1 17-alpha,20-lyase and additional
      hydroxylation reactions, supporting a perferryl-oxygen mechanism.
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Experimental support for the core monooxygenase/lyase MF and reaction mechanism.
- id: PMID:2808364
  title: Deletion of a phenylalanine in the N-terminal region of human cytochrome
    P-450(17 alpha) results in partial combined 17 alpha-hydroxylase/17,20-lyase deficiency.
  findings:
  - statement: >-
      A Phe53 deletion in the N-terminal (membrane-anchoring) region causes partial combined
      17-alpha-hydroxylase/17,20-lyase deficiency; supports the microsomal/ER localization and
      disease mechanism.
  reference_review:
    relevance: MEDIUM
    correctness: MISCITED
    review_notes: >-
      Correctly cited for the AH5 variant and (via UniProt) subcellular location, but it is the
      original_reference for a GO:0019825 "oxygen binding" annotation that the paper does not
      address; that annotation is marked over-annotated.
- id: PMID:3500022
  title: 'Cloning and sequence of the human gene for P450c17 (steroid 17 alpha-hydroxylase/17,20
    lyase): similarity with the gene for P450c21.'
  findings:
  - statement: >-
      Clones and sequences the human P450c17 gene; describes P450c17 as a single cytochrome P450
      mediating both 17-alpha-hydroxylase and 17,20-lyase activities in steroid hormone
      biosynthesis.
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: >-
      Foundational gene-cloning paper; supports gene identity and steroid biosynthetic role.
- id: PMID:36640554
  title: Hydroxylation and lyase reactions of steroids catalyzed by mouse cytochrome
    P450 17A1 (Cyp17a1).
  findings:
  - statement: >-
      Characterizes the 17-alpha-hydroxylation and 17,20-lyase reactions of the (mouse ortholog)
      CYP17A1 with progesterone and pregnenolone; the conserved activities corroborate the human
      enzyme's function.
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: >-
      Mouse ortholog study; UniProt cites it as experimental evidence for the conserved catalytic
      activities.
- id: PMID:9326943
  title: The genetic and functional basis of isolated 17,20-lyase deficiency.
  findings:
  - statement: >-
      Establishes true isolated 17,20-lyase deficiency due to CYP17 mutations that impair
      interaction with redox partners; fetal testicular androgen (testosterone) production
      requires CYP17A1 17,20-lyase activity for male sexual differentiation.
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Supports the androgen-biosynthesis / sex-differentiation roles and the redox-partner
      dependence of lyase activity.
- id: PMID:9452426
  title: Cytochrome b5 augments the 17,20-lyase activity of human P450c17 without
    direct electron transfer.
  findings:
  - statement: >-
      Demonstrates that cytochrome b5 augments human P450c17 17,20-lyase activity as an
      allosteric effector (increasing lyase Vmax) without direct electron transfer, and that POR
      is necessary/sufficient for microsomal 17,20-lyase activity.
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Key functional paper for the bifunctional MF and the b5/POR dependence of the lyase branch.
