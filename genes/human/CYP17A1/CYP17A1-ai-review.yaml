core_functions:
- description: >-
    Steroid 17-alpha-hydroxylase activity (EC 1.14.14.19): as a microsomal cytochrome P450
    monooxygenase, CYP17A1 hydroxylates the C21 steroids pregnenolone and progesterone at C17 to
    yield 17-alpha-hydroxypregnenolone and 17-alpha-hydroxyprogesterone, the obligatory
    precursors for cortisol (glucocorticoid) biosynthesis, using O2 and electrons from NADPH via
    cytochrome P450 reductase.
  molecular_function:
    id: GO:0004508
    label: steroid 17-alpha-monooxygenase activity
  directly_involved_in:
