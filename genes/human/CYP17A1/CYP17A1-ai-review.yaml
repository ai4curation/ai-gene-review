      as a co-substrate in its monooxygenase mechanism, "oxygen binding" (typically used for
      reversible O2 carriers such as hemoglobin/myoglobin) is not an informative molecular
      function for a P450 monooxygenase, and the cited reference (PubMed:2808364, on the F53
      deletion causing combined deficiency) does not address oxygen binding.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      Legacy, uninformative MF for a P450; the O2 co-substrate chemistry is already captured by
      the monooxygenase/oxidoreductase terms. Not a genuine reversible-oxygen-binding activity.
