    label: cortisol biosynthetic process
  - id: GO:0006704
    label: glucocorticoid biosynthetic process
  locations:
  - id: GO:0005789
    label: endoplasmic reticulum membrane
  supported_by:
  - reference_id: PMID:9452426
    supporting_text: >-
      17alpha-hydroxylation of 21-carbon steroids
  - reference_id: PMID:25301938
    supporting_text: >-
      both hydroxylase substrates pregnenolone and
  - reference_id: file:human/CYP17A1/CYP17A1-uniprot.txt
    supporting_text: >-
      A cytochrome P450 monooxygenase involved in corticoid and
- description: >-
    Steroid 17,20-lyase activity (EC 1.14.14.32): CYP17A1 cleaves the C17-C20 bond of the
    17-alpha-hydroxy intermediates (17-alpha-hydroxypregnenolone -> dehydroepiandrosterone;
    17-alpha-hydroxyprogesterone -> androstenedione), the committed step generating C19 androgen
    precursors. This second oxidative activity resides on the same polypeptide as the hydroxylase
    and requires cytochrome b5 as an allosteric effector (with POR as the electron donor),
    determining the flux of steroidogenesis toward androgens and estrogens.
  molecular_function:
    id: GO:0004508
    label: steroid 17-alpha-monooxygenase activity
  directly_involved_in:
  - id: GO:0006702
    label: androgen biosynthetic process
  locations:
  - id: GO:0005789
    label: endoplasmic reticulum membrane
  supported_by:
  - reference_id: PMID:9452426
    supporting_text: >-
      the 17,20-lyase activity that cleaves the C17-C20 bond to produce C19 sex steroids
  - reference_id: PMID:9452426
    supporting_text: >-
      coexpression of human b5 with P450c17 also
  - reference_id: PMID:22266943
    supporting_text: >-
      catalyses the biosynthesis of androgens in humans
- description: >-
    Heme binding: CYP17A1 is a heme-thiolate cytochrome P450 whose heme prosthetic group
    (iron axially coordinated by Cys442) is essential for its monooxygenase/lyase catalysis;
    heme/iron binding is the supporting cofactor function underpinning both catalytic activities.
  molecular_function:
    id: GO:0020037
    label: heme binding
  locations:
  - id: GO:0005789
    label: endoplasmic reticulum membrane
  supported_by:
  - reference_id: PMID:22266943
    supporting_text: >-
      bind the haem iron
