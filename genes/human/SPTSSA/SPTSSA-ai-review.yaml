- term:
    id: GO:0046513
    label: ceramide biosynthetic process
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: involved_in
  review:
    summary: Phylogenetically inferred involvement in ceramide biosynthesis. SPT catalyzes
      the first committed step upstream of ceramide, so SPTSSA (as an SPT subunit)
      contributes upstream to ceramide production, but ceramide synthesis itself requires
      several additional dedicated enzymes.
    action: KEEP_AS_NON_CORE
    reason: SPTSSA acts only at the first step of sphingolipid biosynthesis; ceramide is a
      downstream product requiring 3-ketodihydrosphingosine reductase and ceramide
      synthases. The involvement is real but indirect, so this is best kept as a non-core
      downstream process, with sphingolipid biosynthetic process (GO:0030148) as the core
      BP.
    supported_by:
