id: Q969W0
gene_symbol: SPTSSA
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  SPTSSA (ssSPTa, small subunit of serine palmitoyltransferase A) is a small
  (71 aa) multi-pass endoplasmic reticulum membrane protein that is a regulatory/accessory
  subunit of the serine palmitoyltransferase (SPT) complex. The catalytic core of SPT is
  the SPTLC1-SPTLC2 (or SPTLC1-SPTLC3) heterodimer, which condenses L-serine and
  palmitoyl-CoA in the first, rate-limiting step of de novo sphingolipid biosynthesis.
  SPTSSA is itself non-catalytic but is required for full SPT activity; it engages SPTLC2,
  shapes the acyl-CoA binding tunnel, and thereby sets the acyl-CoA chain-length
  specificity of the complex, with the SPTLC1-SPTLC2-SPTSSA isozyme strongly preferring
  C16 palmitoyl-CoA. Within the SPT holocomplex SPTSSA works alongside the ORMDL
  negative-regulatory subunits. Independently of its role in the SPT complex, SPTSSA
  interacts with MBOAT7/LPIAT1 and facilitates its localization to mitochondria-associated
  ER membranes, influencing arachidonic-acid remodeling of phosphatidylinositol. Loss or
  variation of SPTSSA dysregulates sphingolipid synthesis and causes a complex hereditary
  spastic paraplegia / juvenile-ALS-like neurodegenerative disorder (SPG90A/SPG90B).
