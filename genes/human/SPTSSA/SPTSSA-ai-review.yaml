core_functions:
- description: As the accessory/regulatory small subunit of the serine palmitoyltransferase
    (SPT) complex, SPTSSA is required for full SPT catalytic activity and sets the acyl-CoA
    chain-length specificity (favoring C16 palmitoyl-CoA), thereby driving the first,
    rate-limiting step of de novo sphingolipid biosynthesis in the ER membrane.
  molecular_function:
    id: GO:0008047
    label: enzyme activator activity
  contributes_to_molecular_function:
