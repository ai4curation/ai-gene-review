    label: endoplasmic reticulum membrane
  supported_by:
  - reference_id: PMID:19416851
    supporting_text: each substantially enhance the activity of mammalian SPT
  - reference_id: PMID:33558761
    supporting_text: ssSPTa engages SPTLC2 and shapes the tunnel
  - reference_id: PMID:33558762
