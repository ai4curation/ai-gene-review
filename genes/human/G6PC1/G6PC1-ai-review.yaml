id: P35575
gene_symbol: G6PC1
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: Glucose-6-phosphatase catalytic subunit 1 (G6PC1; EC 3.1.3.9) is the
  liver/kidney/intestine catalytic subunit of the glucose-6-phosphatase system. It
  is a multi-pass integral endoplasmic reticulum membrane protein (nine transmembrane
  helices) whose catalytic active site faces the ER lumen. G6PC1 hydrolyzes
  D-glucose-6-phosphate to D-glucose and inorganic phosphate, the terminal, committed
  step shared by both gluconeogenesis and glycogenolysis, enabling hepatic and renal
  glucose output into the blood. It acts together with the ER glucose-6-phosphate
  transporter SLC37A4/G6PT, which supplies luminal glucose-6-phosphate to the active
  site. Catalysis proceeds via a phosphohistidine-enzyme intermediate in which His-176
  is the nucleophile and His-119 the proton donor. Loss-of-function variants in G6PC1
  cause glycogen storage disease type Ia (von Gierke disease), characterized by fasting
  hypoglycemia, hepatomegaly, nephromegaly, lactic acidemia, hyperlipidemia, and
  hyperuricemia.
