      breakdown), and its deficiency causes glycogen accumulation in GSD1a. Correct
      but broader than the specific glycogenolysis role.
    action: KEEP_AS_NON_CORE
    reason: G6PC1 acts at the terminal step of glycogenolysis; involvement in glycogen
      metabolism is accurate. It is retained as non-core because the enzyme does not
      metabolize glycogen directly but processes the glucose-6-phosphate liberated from
      it, and its defining roles (glucose-6-phosphatase activity, gluconeogenesis,
      glucose homeostasis) are captured as core.
    supported_by:
    - reference_id: PMID:9332655
      supporting_text: the final common step of glycogenolysis and gluconeogenesis
