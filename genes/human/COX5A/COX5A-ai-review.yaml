id: P20674
gene_symbol: COX5A
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: COX5A (cytochrome c oxidase subunit 5A, mitochondrial) is a nuclear-encoded,
  non-catalytic structural (supernumerary) subunit of mitochondrial respiratory Complex
  IV (cytochrome c oxidase, COX), the terminal enzyme of the electron transport chain.
  Complex IV transfers electrons from reduced cytochrome c to molecular oxygen, reducing
  it to water, and pumps protons across the mitochondrial inner membrane to help generate
  the proton-motive force that drives oxidative phosphorylation. The catalytic redox
  centres (heme a, heme a3, Cu_A, Cu_B) reside in the three mtDNA-encoded core subunits
  MT-CO1, MT-CO2 and MT-CO3; COX5A is one of the eleven nuclear-encoded supernumerary
  subunits that surround and stabilise this catalytic core. The mature protein is a
  peripheral inner-membrane protein on the matrix side, produced from a precursor with
  a cleaved N-terminal mitochondrial transit peptide. Biallelic loss-of-function variants
  cause mitochondrial complex IV deficiency (nuclear type 20), presenting with pulmonary
  arterial hypertension, lactic acidemia and failure to thrive.
