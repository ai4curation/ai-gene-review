- term:
    id: GO:0009055
    label: electron transfer activity
  evidence_type: TAS
  original_reference_id: PMID:2853101
  qualifier: enables
  review:
    summary: This MF is annotated with "enables", implying COX5A itself carries electron-transfer
      activity. However, the redox centres that transfer electrons (heme a, heme a3, Cu_A,
      Cu_B) reside in the mtDNA-encoded catalytic core subunits MT-CO1 and MT-CO2, not in
      the non-catalytic nuclear-encoded COX5A. The originating reference (PMID:2853101) is
      a 1988 cDNA-cloning/conservation paper establishing COX5A as a COX subunit; it does
      not demonstrate intrinsic electron-transfer activity for COX5A.
    action: MARK_AS_OVER_ANNOTATED
    reason: Electron transfer is a catalytic activity of the holo-complex located in the
      mtDNA-encoded core, not an intrinsic molecular function of the structural COX5A subunit.
      Annotating COX5A as "enables" this activity over-attributes catalysis; COX5A's role is
      structural (see core_functions, where cytochrome-c oxidase activity is captured as
      contributes_to at the complex level).
    supported_by:
    - reference_id: file:human/COX5A/COX5A-uniprot.txt
      supporting_text: 'a catalytic core of 3 subunits MT-CO1, MT-CO2 and MT-CO3, encoded
        in'
- term:
    id: GO:0004129
    label: cytochrome-c oxidase activity
  evidence_type: TAS
  original_reference_id: PMID:2853101
  qualifier: enables
  review:
    summary: Cytochrome-c oxidase activity (reduction of O2 to water using electrons from
      cytochrome c) is the catalytic activity of the assembled complex IV, carried out at the
      binuclear centre in MT-CO1. COX5A is a non-catalytic structural subunit and does not
      itself enable this activity; the "enables" annotation over-attributes catalysis to COX5A.
    action: MARK_AS_OVER_ANNOTATED
    reason: The catalytic cytochrome-c oxidase activity resides in the mtDNA-encoded core
      (binuclear centre of MT-CO1), not in the structural COX5A subunit. Rather than removing
      this old TAS annotation, it is flagged as an over-annotation; the appropriate representation
      is contributes_to GO:0004129 at the complex level (captured in core_functions), with
      COX5A's own MF being structural molecule activity.
    supported_by:
    - reference_id: file:human/COX5A/COX5A-uniprot.txt
      supporting_text: The BNC reduces molecular oxygen to 2
