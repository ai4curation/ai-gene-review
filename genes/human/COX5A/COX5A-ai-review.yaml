core_functions:
- description: Structural (supernumerary) subunit that assembles into and stabilises
    mitochondrial respiratory chain complex IV (cytochrome c oxidase), surrounding the
    mtDNA-encoded catalytic core; COX5A is non-catalytic and contributes to the complex's
    cytochrome-c oxidase activity through structural integrity rather than enabling catalysis
    itself.
  molecular_function:
