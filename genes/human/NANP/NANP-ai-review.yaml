- term:
    id: GO:0006045
    label: N-acetylglucosamine biosynthetic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000041
  qualifier: involved_in
  review:
    summary: >-
      Electronic annotation derived from UniPathway UPA00630. However, UPA00630 is
      the N-acetylneuraminate (sialic acid) biosynthesis pathway, not GlcNAc
      biosynthesis; NANP does not synthesize N-acetylglucosamine (GlcNAc is an
      upstream substrate of the sialic acid pathway, not a product of NANP). This
      is a UniPathway-to-GO mapping artifact. The intended biological process is
      N-acetylneuraminate biosynthesis (already captured by GO:0046380), so modify
      to that term rather than retaining an incorrect GlcNAc-biosynthesis process.
    action: MODIFY
    proposed_replacement_terms:
