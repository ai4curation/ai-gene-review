gene_symbol: NANP
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  NANP is the human N-acylneuraminate-9-phosphatase (EC 3.1.3.29; also known as
  N-acetylneuraminate-9-phosphate phosphatase / Neu5Ac-9-Pase / HDHD4), a
  Mg2+-dependent member of the HAD-like (haloacid dehalogenase) hydrolase
  superfamily. It catalyzes the third step of the de novo sialic acid biosynthetic
  pathway, hydrolyzing N-acetylneuraminate-9-phosphate (Neu5Ac-9-P) to free
  N-acetylneuraminate (sialic acid) plus inorganic phosphate; it can also
  dephosphorylate N-glycoloylneuraminate 9-phosphate. In the pathway the enzyme
  acts downstream of the Neu5Ac-9-P synthase NANS and upstream of the CMP-sialic
  acid synthetase CMAS, providing the free sialic acid that is subsequently
  activated to CMP-sialic acid for sialyltransferase reactions. The protein is a
  soluble cytosolic enzyme with a HAD Rossmann-like catalytic core; crystal
  structures show a Mg2+ ion and phosphate bound in the active site, with
  Mg2+-coordinating aspartates (Asp12, Asp14, Asp189). Genetic knockout studies in
  human cell lines indicate that although Neu5Ac-9-P accumulates when NANP is lost,
  cell-surface sialylation and CMP-sialic acid levels are largely preserved,
  implying that an alternative phosphatase can bypass NANP in de novo sialic acid
  production.
