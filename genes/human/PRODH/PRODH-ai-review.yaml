core_functions:
- description: >-
    FAD-dependent proline dehydrogenase (proline oxidase, EC 1.5.5.2): oxidizes
    L-proline to (S)-1-pyrroline-5-carboxylate at the matrix face of the
    mitochondrial inner membrane, passing the abstracted electrons via its FAD
    cofactor to ubiquinone in the respiratory chain. This is the first, committed
    step of proline catabolism.
