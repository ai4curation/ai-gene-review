      degradation to hydroxyproline oxidase (HPOX), which is the distinct paralog
      PRODH2/HYPDH, not PRODH.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      PRODH oxidizes L-proline (EC 1.5.5.2); trans-4-hydroxy-L-proline is the
      substrate of the paralogous enzyme PRODH2 (hydroxyproline dehydrogenase / HPOX).
      PMID:21998747 describes the 4-Hyp pathway using "hydroxyproline oxidase (HPOX)"
      and does not implicate PRODH, so this appears to be a paralog mis-attribution /
      over-annotation. Because the annotation is TAS (not experimental) and the
      substrate is wrong for PRODH, it is marked as over-annotated rather than
      accepted; it is not removed (conservative handling of a non-IEA annotation).
    supported_by:
    - reference_id: PMID:21998747
      supporting_text: hydroxyproline oxidase (HPOX)
