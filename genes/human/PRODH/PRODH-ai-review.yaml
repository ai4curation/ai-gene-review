id: O43272
gene_symbol: PRODH
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  PRODH encodes proline dehydrogenase 1 (proline oxidase, POX; EC 1.5.5.2), a
  FAD-dependent flavoenzyme bound to the matrix face of the mitochondrial inner
  membrane. It catalyzes the first, committed step of proline catabolism: the
  oxidation of L-proline to (S)-1-pyrroline-5-carboxylate (P5C), which is then
  converted by ALDH4A1/P5C dehydrogenase to L-glutamate. Rather than using a
  soluble acceptor, PRODH donates the electrons abstracted from proline through
  its FAD cofactor to ubiquinone in the respiratory electron transport chain,
  coupling proline oxidation to mitochondrial bioenergetics. Beyond its catabolic
  role, PRODH is a transcriptional target of p53 (originally identified as the
  p53-induced gene PIG6): its catalytic turnover can generate reactive oxygen
  species, giving it a secondary role in redox signaling and apoptosis. In humans
  the gene lies at chromosome 22q11.2 within the velocardiofacial/DiGeorge
  deletion interval; loss-of-function and hypomorphic variants cause
  hyperprolinemia type 1, and reduced PRODH activity is a susceptibility factor
  for schizophrenia.
