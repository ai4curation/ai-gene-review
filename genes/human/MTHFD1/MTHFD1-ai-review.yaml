id: P11586
gene_symbol: MTHFD1
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  MTHFD1 is the cytoplasmic C-1-tetrahydrofolate synthase (C1-THF synthase), a
  935-residue trifunctional enzyme that interconverts the one-carbon oxidation states
  of tetrahydrofolate (THF). A single polypeptide, functioning as a homodimer, carries
  three catalytic activities in two structural modules: an N-terminal
  dehydrogenase/cyclohydrolase (D/C) domain providing NADP-dependent
  5,10-methylenetetrahydrofolate dehydrogenase (EC 1.5.1.5) and
  5,10-methenyltetrahydrofolate cyclohydrolase (EC 3.5.4.9) activities, and a larger
  C-terminal domain providing 10-formyltetrahydrofolate synthetase / formate--tetrahydrofolate
  ligase (EC 6.3.4.3) activity. Together these reactions interconvert
  5,10-methylene-THF, 5,10-methenyl-THF and 10-formyl-THF, generating the one-carbon-loaded
  folate cofactors required for de novo purine synthesis (10-formyl-THF), thymidylate
  synthesis and serine/glycine and methionine metabolism (5,10-methylene-THF, and downstream
  5-methyl-THF for homocysteine remethylation). MTHFD1 is a soluble cytosolic enzyme,
  ubiquitously expressed and enriched in liver. Human variants cause or predispose to
  disorders of folate one-carbon metabolism, including folate-sensitive neural tube defect
  susceptibility (notably the common R653Q allele, also linked to congenital heart defects)
  and an autosomal-recessive combined immunodeficiency with megaloblastic anemia (MTHFD1
  deficiency, CIMAH).
