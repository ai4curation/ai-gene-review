- id: PMID:10828945
  title: Structures of three inhibitor complexes provide insight into the reaction
    mechanism of the human methylenetetrahydrofolate dehydrogenase/cyclohydrolase.
  findings:
  - statement: >-
      Crystal structures of the human cytosolic D/C domain (DC301) with NADP and inhibitors,
      plus mutagenesis, identify catalytic residues and establish the dehydrogenase and
      cyclohydrolase reaction mechanisms.
    supporting_text: >-
      we propose a reaction mechanism for both activities, the dehydrogenase and the cyclohydrolase.
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Structural/mechanistic study of the human enzyme; direct support for the
      dehydrogenase (GO:0004488) and cyclohydrolase (GO:0004477) activities. Abstract-only
      in cache but title and content match.
- id: PMID:18767138
  title: The MTHFD1 p.Arg653Gln variant alters enzyme function and increases risk
    for congenital heart defects.
  findings:
  - statement: >-
      MTHFD1 is a trifunctional enzyme interconverting THF derivatives for nucleotide synthesis;
      the R653Q variant reduces cellular formate incorporation into DNA, disrupting de novo
      purine synthesis.
    supporting_text: >-
      indicating a disruption of de novo purine synthesis.
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Functional characterization of the human enzyme and R653Q variant; supports the
      synthetase and dehydrogenase activities and the purine-biosynthesis role.
- id: PMID:1881876
  title: Expression of active domains of a human folate-dependent trifunctional enzyme
    in Escherichia coli.
  findings:
  - statement: >-
      The human trifunctional enzyme comprises an N-terminal D/C domain (res 1-301) and a
      C-terminal synthetase domain (res 304-935); each folds independently into an active enzyme,
      establishing the three catalytic activities.
    supporting_text: >-
      Both domains formed active enzymes thereby demonstrating their ability to fold independently.
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Foundational study defining the two-domain, three-activity architecture of human MTHFD1
      by independent domain expression in E. coli. Abstract-only in cache; content matches.
