    label: cytosol
  supported_by:
  - reference_id: PMID:10828945
    supporting_text: >-
      we propose a reaction mechanism for both activities, the dehydrogenase and the cyclohydrolase.
  - reference_id: PMID:1881876
    supporting_text: >-
      Both domains formed active enzymes thereby demonstrating their ability to fold independently.
- description: >-
    Methenyltetrahydrofolate cyclohydrolase activity of the N-terminal D/C domain: hydrolyzes
    5,10-methenyltetrahydrofolate to 10-formyltetrahydrofolate, channeling one-carbon units toward
    10-formyl-THF-dependent (purine) biosynthesis within cytosolic folate interconversion.
  molecular_function:
    id: GO:0004477
    label: methenyltetrahydrofolate cyclohydrolase activity
  directly_involved_in:
  - id: GO:0035999
    label: tetrahydrofolate interconversion
