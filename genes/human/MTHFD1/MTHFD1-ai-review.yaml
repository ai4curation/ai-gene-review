proposed_new_terms: []
suggested_questions:
- question: >-
    Are any of the three MTHFD1 catalytic activities differentially rate-limiting for specific
    one-carbon outputs (purine vs thymidylate vs methionine) under physiological or folate-depleted
    conditions in humans?
- question: >-
    Does MTHFD1 participate in substrate channeling or transient metabolon assembly with other
    cytosolic folate enzymes (e.g. SHMT1, TYMS, ATIC), and does the R653Q allele perturb this?
suggested_experiments:
- description: >-
    Domain-selective activity assays and formate-flux (13C-formate) tracing in MTHFD1-null cells
    reconstituted with wild-type versus disease variants (S49F, R173C, R653Q) to quantify each
    activity's contribution to purine, thymidylate, and methionine synthesis.
- description: >-
    Structural determination of the full-length human MTHFD1 homodimer (currently only the D/C
    domain is crystallized) to define inter-domain organization and potential channeling of the
    C-terminal synthetase domain.
