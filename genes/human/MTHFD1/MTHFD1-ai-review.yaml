core_functions:
- description: >-
    NADP-dependent methylenetetrahydrofolate dehydrogenase activity of the N-terminal D/C domain:
    reversibly oxidizes (6R)-5,10-methylenetetrahydrofolate to 5,10-methenyltetrahydrofolate using
    NADP+, part of cytosolic one-carbon (tetrahydrofolate) interconversion.
