- id: PMID:3528153
  title: Purification and characterization of a mitochondrial isozyme of C1-tetrahydrofolate
    synthase from Saccharomyces cerevisiae.
  findings:
  - statement: >-
      The yeast mitochondrial C1-THF synthase isozyme (a separate gene product) is localized in
      mitochondria, whereas cytoplasmic C1-THF synthase is not; this paper concerns the
      mitochondrial isozyme, not the human cytoplasmic MTHFD1.
    supporting_text: >-
      Cell fractionation experiments show that the isozyme, but not C1-tetrahydrofolate
  reference_review:
    relevance: LOW
    correctness: MISCITED
    review_notes: >-
      This is the yeast MITOCHONDRIAL C1-THF synthase isozyme (the paralog of MTHFD2/MTHFD1L),
      and the paper explicitly states the cytoplasmic synthase is NOT mitochondrial. It does not
