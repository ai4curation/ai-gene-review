    supporting_text: >-
      we propose a reaction mechanism for both activities, the dehydrogenase and the cyclohydrolase.
  - reference_id: PMID:1881876
    supporting_text: >-
      Both domains formed active enzymes thereby demonstrating their ability to fold independently.
- description: >-
    Formyltetrahydrofolate synthetase / formate--tetrahydrofolate ligase activity of the C-terminal
    domain: uses ATP to ligate formate to tetrahydrofolate, forming 10-formyltetrahydrofolate; this
    ATP-dependent reaction supplies 10-formyl-THF for de novo purine biosynthesis.
