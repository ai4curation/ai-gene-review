- description: >-
    Complex I assembly factor: NDUFAF5 acts at an early stage of mitochondrial respiratory chain
    Complex I (NADH:ubiquinone oxidoreductase) biogenesis, before the peripheral and membrane arms
    are joined. Its modification of NDUFS7 and its interactions with the assembly-intermediate
    machinery (with stabilization by NDUFAF8 and PYURF) are required for holoenzyme formation;
    NDUFAF5 is not a subunit of the mature complex.
