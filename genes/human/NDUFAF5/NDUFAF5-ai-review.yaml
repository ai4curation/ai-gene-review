id: Q5TEU4
gene_symbol: NDUFAF5
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  NDUFAF5 (formerly C20orf7) is a nuclear-encoded mitochondrial assembly factor for respiratory
  chain Complex I (NADH:ubiquinone oxidoreductase). It is imported into mitochondria and
  peripherally associated with the matrix face of the inner membrane. Although it adopts the
  S-adenosylmethionine (SAM)-dependent 7-beta-strand (class I Rossmann-fold) methyltransferase
  fold, its catalytic output is hydroxylation rather than methyl transfer: like the anthracycline
  enzyme RdmB, it uses SAM as a cofactor to introduce a hydroxyl group into a conserved arginine
  residue (Arg-73 of mature NDUFS7) of the Complex I core iron-sulfur subunit NDUFS7. This
  modification occurs at an early stage of Complex I biogenesis, before the peripheral and membrane
  arms are joined, and NDUFAF5 is not part of the mature holoenzyme. NDUFAF5 activity and stability
  are supported by its interactors NDUFAF8 and the SAM-methyltransferase chaperone PYURF. Biallelic
  loss-of-function variants cause mitochondrial complex I deficiency (MC1DN16), presenting as lethal
  neonatal mitochondrial disease and Leigh syndrome.
