proposed_new_terms:
- proposed_name: SAM-dependent peptidyl-arginine hydroxylase activity
  proposed_definition: >-
    Catalysis of the S-adenosyl-L-methionine (SAM)-dependent hydroxylation of a peptidyl-arginine
    residue to peptidyl-hydroxyarginine, in which SAM acts as a cofactor rather than a methyl donor
    (as in the RdmB-type 7-beta-strand methyltransferase-fold hydroxylases). NDUFAF5 exemplifies this
    activity, hydroxylating Arg-73 of the Complex I subunit NDUFS7.
  justification: >-
    NDUFAF5 has a demonstrated protein-arginine hydroxylase activity (PMID:27226634) but no existing
    GO molecular-function term captures a SAM-dependent peptidyl-arginine hydroxylase. The available
    peptidyl-arginine 3-dioxygenase term (GO:0106157) is mechanistically inappropriate because its
    definition specifies a 2-oxoglutarate/O2-dependent dioxygenase reaction, which does not match
    NDUFAF5's SAM-cofactor mechanism. In the interim, the broad oxidoreductase activity term
    (GO:0016491) is used, consistent with UniProt's "Arginine-hydroxylase" RecName and EC 1.-.-.-.
suggested_questions:
- question: >-
    What is the precise EC/reaction stoichiometry of NDUFAF5 (e.g. molecular oxygen incorporation,
    any additional cofactor/metal requirement beyond SAM), and can a dedicated SAM-dependent
    peptidyl-arginine hydroxylase GO molecular-function term be created to replace the fold-based
    SAM-methyltransferase annotation?
- question: >-
    Beyond NDUFS7 Arg-73, does NDUFAF5 hydroxylate (or otherwise modify) any additional substrates,
    given the residual proposed methyltransferase activity noted by UniProt?
suggested_experiments:
- description: >-
    In vitro reconstitution of purified recombinant NDUFAF5 with a NDUFS7 substrate peptide and SAM,
    with mass spectrometry to quantify Arg-73 hydroxylation and to test for molecular-oxygen
    dependence and any metal/cofactor requirement, definitively establishing the EC subclass.
- description: >-
    Structure-guided mutagenesis of the SAM-binding pocket and predicted catalytic residues of
    NDUFAF5, assaying both NDUFS7 hydroxylation and rescue of Complex I assembly in NDUFAF5-null
    cells, to map catalysis to the assembly phenotype.
