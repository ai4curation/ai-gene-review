core_functions:
- description: >-
    SAM-dependent arginine hydroxylase (oxidoreductase) activity: NDUFAF5 uses S-adenosylmethionine
    as a cofactor to introduce a hydroxyl group into a conserved arginine (Arg-73 of mature NDUFS7)
    of the Complex I core iron-sulfur subunit NDUFS7. Although it belongs to the SAM-dependent
    7-beta-strand methyltransferase structural family, the demonstrated catalytic output is
    hydroxylation, not methyl transfer, analogous to the RdmB SAM-cofactor hydroxylase.
  molecular_function:
    id: GO:0016491
    label: oxidoreductase activity
