      NQO2 activity is latent unless supplied with a reduced dihydronicotinamide co-substrate such
      as NRH; NAD(P)H is not the physiological electron donor.
    supporting_text: >-
      its activity is normally latent, and a nonbiogenic co-substrate such as NRH [nicotinamide
      riboside (reduced)] is required for enzymatic activity
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Establishes the NRH co-substrate requirement (the key distinction from NQO1) and the
      quinone/nitroaromatic (CB1954) reductase activity. Abstract-level cache; the NRH-dependence
      claim is anchored to the GOA IDA evidence.
