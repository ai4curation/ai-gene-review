- id: PMID:15350128
  title: Crystal structure of quinone reductase 2 in complex with resveratrol.
  findings:
  - statement: >-
      Resveratrol is a potent (Kd ~35 nM) inhibitor of QR2 that binds in the active-site cleft,
      with all three of its hydroxyl groups hydrogen-bonding to QR2 residues.
    supporting_text: >-
      resveratrol is a potent inhibitor of quinone reductase 2 (QR2) activity in vitro with a
      dissociation constant of 35 nM
  - statement: >-
      The resveratrol molecule is anchored in the QR2 active site via hydrogen bonds from all
      three of its hydroxyl groups.
    supporting_text: >-
      All three resveratrol hydroxyl groups form hydrogen bonds with amino acids from QR2
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Primary structural + binding paper for the QR2-resveratrol interaction (crystal structure
      PDB 1SG0; Kd ~35 nM by tryptophan-fluorescence titration). This is the definitive
      experimental basis for resveratrol binding (GO:1905594) and is evidence-grade for a GO IDA -
      arguably the better primary reference than PMID:18254726 (which used resveratrol as an ITC
      control) - but it is not currently cited by GOA as the annotation's evidence. Added here for
      provenance/completeness, not to assert a new annotation.
- id: PMID:18254726
  title: Kinetic, thermodynamic and X-ray structural insights into the interaction
    of melatonin and analogues with quinone reductase 2.
  findings:
  - statement: >-
      QR2 is the cytosolic MT3 melatonin binding site; melatonin is a competitive active-site
      inhibitor seen in multiple orientations in the QR2 dimer.
    supporting_text: >-
      melatonin binds in multiple orientations within the active sites of the QR2 dimer as opposed
      to an allosteric site
  - statement: >-
      QR2 is a high-affinity (nanomolar) target of resveratrol, with a determined QR2:resveratrol
      crystal structure.
    supporting_text: >-
      It is one of the most potently inhibited (nanomolar) molecular targets of resveratrol, a
      natural polyphenol found in wine and peanuts, and the X-ray structure of QR2 in complex with
      resveratrol has been determined
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Primary structural/kinetic paper; source of the FAD/Zn/chloride/melatonin/resveratrol binding,
      homodimerization, and quinone-reduction IDA annotations. PMC full text verified.
