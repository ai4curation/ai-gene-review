      NQO2 diverged from the NAD(P)H-using family archetype (NQO1) in electron-donor specificity.
      Replace the NAD(P)H term with the NRH-specific GO:0001512 (EC 1.10.5.1), which is already
      supported here by IDA and matches UniProt's EC and the RHEA:12364 reaction.
