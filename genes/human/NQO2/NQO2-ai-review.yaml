description: >-
  NQO2 (NRH:quinone oxidoreductase 2 / quinone reductase 2, QR2; UniProt recommended name
  ribosyldihydronicotinamide dehydrogenase [quinone], EC 1.10.5.1) is a cytosolic FAD-dependent
  flavoprotein of the NAD(P)H:quinone oxidoreductase family and a paralog of NQO1. It functions
  as a homodimer, with each subunit binding one FAD and one structural zinc ion. NQO2 catalyzes
  the two-electron reduction of quinones to hydroquinones (quinols), a reaction linked to quinone
  detoxification and to the metabolism/bioactivation of quinone-derived and nitroaromatic
  compounds (e.g. the prodrug CB1954). Its defining biochemical feature, distinguishing it from
  NQO1, is that it does not use NAD(P)H efficiently; instead it requires dihydronicotinamide
  riboside (NRH) or other reduced N-ribosyl/N-alkyl dihydronicotinamides as the electron donor.
  NQO2 is also the cytosolic "MT3" melatonin binding site: melatonin and the polyphenol resveratrol
  are high-affinity active-site inhibitors, making QR2 a notable pharmacological target.
