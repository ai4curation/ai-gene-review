  review:
    summary: >-
      Phylogenetic (IBA) propagation of the family NAD(P)H:quinone oxidoreductase activity. This
      term (EC 1.6.5.2) specifies NAD(P)H as the electron donor, but NQO2 characteristically does
      not use NAD(P)H efficiently - it uses dihydronicotinamide riboside (NRH). The
      experimentally supported, cofactor-correct term is GO:0001512.
    action: MODIFY
