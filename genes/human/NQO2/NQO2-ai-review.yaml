core_functions:
- description: >-
    FAD-dependent cytosolic quinone reductase that uses dihydronicotinamide riboside (NRH), not
    NAD(P)H, as the electron donor to catalyze two-electron reduction of quinones to hydroquinones
    (EC 1.10.5.1; RHEA:12364). Requires FAD and a structural Zn2+; functions as a homodimer.
  molecular_function:
    id: GO:0001512
    label: dihydronicotinamide riboside quinone reductase activity
  directly_involved_in:
    - id: GO:1901662
      label: quinone catabolic process
  locations:
    - id: GO:0005829
      label: cytosol
  supported_by:
    - reference_id: PMID:10945627
      supporting_text: >-
        its activity is normally latent, and a nonbiogenic co-substrate such as NRH [nicotinamide
        riboside (reduced)] is required for enzymatic activity
suggested_questions:
- question: >-
    What are the endogenous physiological quinone substrates and the true in vivo source of the NRH
    co-substrate for NQO2, and does NQO2 predominantly detoxify quinones or, for certain substrates,
    generate more reactive/cytotoxic products?
suggested_experiments:
- description: >-
    Structure-guided separation-of-function mutants (active-site vs Zn/FAD sites) assayed for NRH:
    quinone reductase activity and for melatonin/resveratrol inhibition, to dissect the catalytic
    versus ligand-binding (MT3) roles of the active site.
- description: >-
    Metabolomic comparison of NQO2-proficient vs NQO2-null human cells challenged with model
    quinones, to determine which quinones are detoxified versus bioactivated and to test the NRH
    dependence in a cellular context.
