aliases:
- ILK1
- ILK2
- P59-ILK
- Integrin-linked protein kinase
- Scaffold protein ILK
core_functions:
- description: Catalytically dead pseudokinase that acts as the scaffold of the IPP (ILK-PINCH-PARVIN)
    complex at focal adhesions, coupling integrins to the actin cytoskeleton and coordinating cell-matrix
    adhesion and spreading.
  molecular_function:
    id: GO:0030674
    label: protein-macromolecule adaptor activity
  directly_involved_in:
  - id: GO:0007229
    label: integrin-mediated signaling pathway
  - id: GO:0007160
    label: cell-matrix adhesion
  locations:
  - id: GO:0005925
    label: focal adhesion
  supported_by:
  - reference_id: file:human/ILK/ILK-uniprot.txt
    supporting_text: Now thought to be a pseudokinase which does not have kinase activity and which functions
      solely as a scaffold protein
suggested_questions:
- question: Given ILK is a pseudokinase, are any residual phenotypes attributed to 'ILK kinase activity'
    in older literature explained entirely by its scaffolding of bona fide kinases?
suggested_experiments:
- hypothesis: ILK's adhesion functions are scaffold-dependent and kinase-activity-independent.
  description: Rescue ILK-null cells with wild-type vs IPP-binding-deficient ILK and assess focal-adhesion
    assembly and spreading.
