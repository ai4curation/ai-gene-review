# yaml-language-server: $schema=../../../src/ai_gene_review/schema/gene_review.yaml
id: Q13418
gene_symbol: ILK
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: ILK (integrin-linked kinase; now annotated by UniProt as 'Scaffold protein ILK') is a focal-adhesion
  protein of the protein-kinase superfamily that is catalytically dead - a pseudokinase. Rather than phosphorylating
  substrates, it functions as the central scaffold of the heterotrimeric IPP (ILK-PINCH-PARVIN) complex,
  linking integrin cytoplasmic tails to the actin cytoskeleton and coordinating cell-matrix adhesion,
  spreading, and integrin/growth-factor signaling. Its pseudokinase domain still binds ATP/Mg but performs
  no catalysis. ILK is essential for focal-adhesion organization, actin filament assembly, and is implicated
  in cardiac/muscle function and cancer.
