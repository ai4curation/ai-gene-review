id: P15336
gene_symbol: ATF2
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: ATF2 (Activating Transcription Factor 2, also known as CRE-BP1 or CREB2)
  is a phosphorylation-regulated bZIP transcription factor of the ATF/CREB subfamily.
  It binds CRE (5'-TGACGTCA-3') and AP-1 (5'-TGACTCA-3') DNA elements as homodimers
  or heterodimers with JUN family members and other bZIP proteins. Its transcriptional
  activity is activated by MAPK-mediated phosphorylation at Thr-69/Thr-71 downstream
  of stress, cytokine, and growth factor signaling (JNK, p38, ERK). ATF2 possesses
  intrinsic histone acetyltransferase (HAT) activity toward histones H2B and H4, though
  the physiological significance of this activity has been debated. Beyond transcription,
  ATF2 participates in the DNA damage response through ATM-dependent phosphorylation
  at Ser-490/Ser-498, which recruits it to IR-induced foci independently of its DNA-binding
  domain. ATF2 subcellular localization is regulated by PKC-epsilon; under genotoxic
  stress, ATF2 can translocate to the mitochondrial outer membrane where it perturbs
  HK1-VDAC1 complexes to promote apoptosis. ATF2 regulates genes involved in stress
  response, cell proliferation, DNA repair, and redox homeostasis.
