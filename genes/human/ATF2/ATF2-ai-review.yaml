core_functions:
- statement: Sequence-specific DNA-binding transcription factor that binds CRE (5-prime-TGACGTCA-3-prime)
    and AP-1 (5-prime-TGACTCA-3-prime) elements as homo- or heterodimers with JUN
    family and other bZIP proteins, activating transcription by RNA polymerase II
  term:
    id: GO:0000981
    label: DNA-binding transcription factor activity, RNA polymerase II-specific
  references:
  - id: PMID:2529117
  - id: PMID:10821277
  - id: PMID:17267404
- statement: Binds cAMP response elements (CRE) in target gene promoters as a defining
    molecular function. Originally named CRE-BP1 for this activity.
  term:
    id: GO:0035497
    label: cAMP response element binding
  references:
  - id: PMID:2529117
  - id: PMID:19861239
  - id: PMID:23729669
- statement: Participates in the DNA damage response through ATM-dependent phosphorylation
    at Ser-490/Ser-498, recruiting to IR-induced foci and promoting S-phase checkpoint
    signaling independently of its transcriptional activity
  term:
    id: GO:0006974
    label: DNA damage response
  references:
  - id: PMID:15916964
  - id: PMID:18397884
- statement: Direct substrate and effector of MAPK cascade signaling (JNK, p38, ERK).
    Phosphorylation at Thr-69/Thr-71 by these kinases activates transcriptional activity
    in response to stress, cytokines, and growth factors.
  term:
    id: GO:0000165
    label: MAPK cascade
  references:
  - id: PMID:17267404
  - id: PMID:9430721
- statement: Primarily localized to the nucleus where it functions as a transcription
    factor. Under genotoxic stress, can translocate to the mitochondrial outer membrane
    where it promotes apoptosis by perturbing HK1-VDAC1 complexes.
  term:
    id: GO:0005634
    label: nucleus
  references:
  - id: PMID:22304920
