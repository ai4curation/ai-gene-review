- term:
    id: GO:0000981
    label: DNA-binding transcription factor activity, RNA polymerase II-specific
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: ATF2 is a well-established bZIP transcription factor that binds CRE and
      AP-1 elements to regulate RNA polymerase II-dependent transcription. This is
      a core function supported by extensive evidence (PMID:2529117, PMID:10821277,
      PMID:17267404).
    action: ACCEPT
    reason: Core molecular function of ATF2 as a sequence-specific DNA-binding transcription
      factor. IBA annotation is well supported phylogenetically and by extensive experimental
      literature.
- term:
    id: GO:0006357
    label: regulation of transcription by RNA polymerase II
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: ATF2 regulates transcription by RNA polymerase II through binding CRE/AP-1
      elements as homo- or heterodimers with JUN family proteins. This is a core biological
      process (PMID:17267404, PMID:10821277).
    action: ACCEPT
    reason: Core biological process for ATF2. Well established by multiple experimental
      studies.
- term:
    id: GO:0035497
    label: cAMP response element binding
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: ATF2 (also known as CRE-BP1) was originally identified by its ability
      to bind CRE elements (5-prime-TGACGTCA-3-prime). This is a defining feature
      of the protein (PMID:2529117, PMID:19861239).
    action: ACCEPT
    reason: Core molecular function. ATF2 was named CRE-BP1 precisely because of its
      CRE-binding activity. IBA is at the right level of specificity.
