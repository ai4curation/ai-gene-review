gene_symbol: SLC25A19
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  SLC25A19 is the mitochondrial thiamine pyrophosphate carrier (MTPPT), a
  multi-pass protein of the SLC25 mitochondrial carrier family embedded in the
  mitochondrial inner membrane. It imports thiamine pyrophosphate (TPP/ThPP, the
  activated cofactor form of vitamin B1) from the cytosol into the mitochondrial
  matrix, operating as an exchanger that couples TPP uptake to thiamine
  monophosphate efflux. Because mitochondria cannot synthesize TPP, this carrier
  supplies the essential cofactor for matrix TPP-dependent enzyme complexes,
  including the pyruvate dehydrogenase, 2-oxoglutarate (alpha-ketoglutarate)
  dehydrogenase, and branched-chain 2-oxo-acid dehydrogenase complexes, and is
  thereby required for oxidative energy metabolism and TCA-cycle flux. The gene
  was originally described as a mitochondrial deoxynucleotide carrier (DNC), but
  knockout and transport studies established that its physiological substrate is
  thiamine pyrophosphate rather than deoxynucleotides. Loss-of-function
  mutations cause Amish lethal microcephaly (with 2-oxoglutaric aciduria) and
  thiamine metabolism dysfunction syndrome 4 (bilateral striatal necrosis with
  progressive polyneuropathy).
