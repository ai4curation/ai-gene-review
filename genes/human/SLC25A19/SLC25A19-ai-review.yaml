- id: PMID:11226231
  title: The human mitochondrial deoxynucleotide carrier and its role in the toxicity
    of nucleoside antivirals.
  findings:
  - statement: >-
      Original characterization of SLC25A19/DNC: recombinant reconstituted
      protein transported dNDPs (and less efficiently dNTPs) in exchange for
      dNDPs, ADP or ATP. This deoxynucleotide-carrier interpretation was later
      superseded by identification of TPP as the physiological substrate.
    reference_section_type: ABSTRACT
    supporting_text: >-
      catalyzed the transport of all four deoxy (d) NDPs, and, less efficiently,
      the corresponding dNTPs, in exchange for dNDPs, ADP, or ATP
  reference_review:
    relevance: MEDIUM
    correctness: DISPUTED
    review_notes: >-
      PubMed-verified. Foundational paper but its central claim (SLC25A19 is the
      mitochondrial deoxynucleotide carrier) was overturned by later knockout
      and transport studies; the physiological substrate is thiamine
      pyrophosphate, not deoxynucleotides.
- id: PMID:15539640
  title: Expression of deoxynucleotide carrier is not associated with the mitochondrial
    DNA depletion caused by anti-HIV dideoxynucleoside analogs and mitochondrial dNTP
    uptake.
  findings:
  - statement: >-
      DNC/SLC25A19 does not play a physiological role in deoxynucleotide
      transport: reconstituted dNTP uptake had millimolar Km (~1000x above
      physiological), and DNC over-expression/knockdown did not affect mtDNA
      depletion or mitochondrial dNTP uptake.
    reference_section_type: ABSTRACT
    supporting_text: >-
      DNC does not play an important role in the delayed cytotoxicity (mtDNA
      depletion) of anti-HIV dideoxynucleoside analogs and dNTPs uptake into
      mitochondria
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified. Provides the cellular evidence against the deoxynucleotide
      transporter role and underpins the NOT annotations for GO:0030233 and
      GO:0030302.
- id: PMID:17035501
  title: Knockout of Slc25a19 causes mitochondrial thiamine pyrophosphate depletion,
    embryonic lethality, CNS malformations, and anemia.
  findings:
  - statement: >-
      Slc25a19 knockout mice have normal mitochondrial dNTP/rNTP pools and no
      mtDNA depletion, but undetectable mitochondrial ThPP; reconstituted
      recombinant SLC25A19 transports ThPP. Establishes TPP transport as the
      physiological function, with loss causing OGDH dysfunction and
      2-oxoglutaric aciduria.
    reference_section_type: ABSTRACT
    supporting_text: >-
      We identified thiamine pyrophosphate (ThPP) transport as a candidate
      function of SLC25A19 through homology searching and confirmed it by using
      transport assays of the recombinant reconstituted protein
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified; full text available. Definitive genetic and biochemical
      evidence that the physiological substrate is thiamine pyrophosphate, not
      deoxynucleotides. Primary support for the core molecular function.
- id: PMID:21630459
  title: Proteomic characterization of the human sperm nucleus.
  findings:
  - statement: >-
      Large-scale proteomic catalogue of the human sperm nucleus in which
      SLC25A19 was detected. As a mitochondrial inner-membrane carrier, its
      presence in this nuclear preparation most likely reflects a proteomic
      contaminant rather than functional nuclear localization.
    reference_section_type: ABSTRACT
    supporting_text: >-
      403 different proteins have been identified from the isolated sperm nuclei
  reference_review:
    relevance: LOW
    correctness: LOW_QUALITY
    review_notes: >-
      PubMed-verified. High-throughput sperm-nucleus proteome; source of the
      HDA nucleus annotation, which is not biologically informative for a
      mitochondrial carrier and is likely a contaminant.
- id: PMID:27188525
  title: 'Structure-function characterization of the human mitochondrial thiamin pyrophosphate
    transporter (hMTPPT; SLC25A19): Important roles for Ile(33), Ser(34), Asp(37),
    His(137) and Lys(291).'
  findings:
  - statement: >-
      Site-directed mutagenesis with TPP uptake assays on isolated mitochondria
      identified Ile33, Ser34, Asp37, His137 and Lys291 as important for hMTPPT
      function, confirming SLC25A19 as the mitochondrial TPP uptake carrier.
    reference_section_type: ABSTRACT
    supporting_text: >-
      an important role for Ile33, Ser34, Asp37, His137 and Lys291 residues in
      function of the hMTPPT
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified; full text available. Structure-function study confirming
      TPP transport activity and mitochondrial delivery of hMTPPT.
- id: PMID:31506564
  title: Functional analysis of the third identified SLC25A19 mutation causative for
    the thiamine metabolism dysfunction syndrome 4.
  findings:
  - statement: >-
      Functional analysis of the THMD4-causing Q192H variant: it reduces
      3H-TPP uptake by isolated mitochondria and lowers hMTPPT protein
      expression/mitochondrial delivery without affecting mRNA, supporting TPP
      transport as the disease-relevant function.
    reference_section_type: ABSTRACT
    supporting_text: >-
      mitochondrial TPP transporter (hMTPPT)
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified; full text available. Clinical/functional confirmation of
      TPP transport and mitochondrial localization; source of THMD4 variant
      Q192H.
- id: PMID:34800366
  title: Quantitative high-confidence human mitochondrial proteome and its dynamics
    in cellular context.
  findings:
