core_functions:
- description: >-
    Mitochondrial thiamine pyrophosphate carrier: transports thiamine
    pyrophosphate (TPP/ThDP) across the mitochondrial inner membrane from the
    cytosol into the matrix, functioning as an exchanger (TPP in, thiamine
    monophosphate out). This supplies the TPP cofactor required by matrix
    TPP-dependent dehydrogenase complexes (pyruvate dehydrogenase,
    2-oxoglutarate dehydrogenase, branched-chain 2-oxo-acid dehydrogenase).
  molecular_function:
