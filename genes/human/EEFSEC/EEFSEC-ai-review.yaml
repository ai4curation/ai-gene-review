- term:
    id: GO:0001514
    label: selenocysteine incorporation
  evidence_type: IDA
  original_reference_id: PMID:27708257
  qualifier: involved_in
  review:
    summary: >-
      Direct experimental evidence for the core process. Structure-guided
      mutagenesis of the Sec-binding pocket (Asp229, His230, Arg285) and the
      GTPase site (Thr48, Asp92, His96) abolished eEFSec-mediated UGA read-through
      and selenoprotein synthesis in vitro, establishing eEFSec as required for
      selenocysteine incorporation.
    action: ACCEPT
    supported_by:
    - reference_id: PMID:27708257
      supporting_text: "obliterated the ability of eEFSec to promote Sec incorporation"
- term:
    id: GO:0001514
    label: selenocysteine incorporation
