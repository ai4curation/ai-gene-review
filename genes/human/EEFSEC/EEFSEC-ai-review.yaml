id: P57772
gene_symbol: EEFSEC
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  Selenocysteine-specific elongation factor (eEFSec) that delivers selenocysteinyl-tRNA(Sec)
  to the ribosome for cotranslational incorporation of selenocysteine at UGA codons in
  selenoprotein mRNAs. Functions as a translational GTPase with a four-domain chalice-like
  structure. Unlike the bacterial SelB which binds SECIS directly, eEFSec requires the
  auxiliary factor SBP2/SECISBP2 for selenocysteine incorporation. The SBP2-SECIS complex
  first binds the ribosome 40S subunit, creating a docking site for GTP-bound eEFSec carrying
  Sec-tRNA(Sec). Domain 4 of eEFSec contacts the apical loop of the SECIS element. After GTP
  hydrolysis, eEFSec dissociates and Sec-tRNA accommodates for peptide bond formation.
  eEFSec also exhibits nucleocytoplasmic shuttling with CRM1-dependent nuclear export
  (EEFSEC-deep-research-falcon.md). Biallelic pathogenic variants cause neurodevelopmental
  disorder with progressive spasticity and brain abnormalities (NEDPSB, MIM:621102).
