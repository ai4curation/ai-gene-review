existing_annotations:
- term:
    id: GO:0001514
    label: selenocysteine incorporation
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      IBA annotation for selenocysteine incorporation is well supported by the phylogenetic
      analysis and is consistent with the core function of eEFSec. Multiple experimental
      studies confirm this as the primary biological process for the gene (PMID:10970870,
      PMID:27708257, PMID:35709277). Deep research review (EEFSEC-deep-research-falcon.md)
      confirms this is the defining function.
    action: ACCEPT
    reason: >-
      Selenocysteine incorporation is the defining biological process for eEFSec. This is
      supported by the original characterization of mSelB showing it is required for efficient
      selenoprotein translation (PMID:10970870), crystal structure studies showing mutagenesis
      of the Sec-binding pocket residues abolished selenocysteine incorporation
      (PMID:27708257), and cryo-EM studies of the functional selenosome (PMID:35709277). The
      IBA annotation from PANTHER correctly captures the core function at the right level of
      specificity.
    supported_by:
      - reference_id: PMID:10970870
        supporting_text: "Several lines of evidence enabled us to establish that mSelB is the bona fide mammalian elongation factor for selenoprotein translation: it binds GTP, recognizes the Sec-tRNA(Sec) in vitro and in vivo, and is required for efficient selenoprotein translation in vivo."
      - reference_id: PMID:27708257
        supporting_text: "each single residue substitution obliterated the ability of eEFSec to promote Sec incorporation"
      - reference_id: PMID:35709277
        supporting_text: "eEFSec promotes recoding in an SBP2- and SECIS-dependent manner in the presence of Ser-tRNASec but not Ser-tRNASer"
- term:
    id: GO:0003746
    label: translation elongation factor activity
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      IBA annotation for translation elongation factor activity is appropriate. eEFSec is a
      bona fide translation elongation factor, specialized for selenocysteine. It delivers
      aminoacylated tRNA(Sec) to the ribosome A-site in a GTP-dependent manner, analogous to
      eEF1A for canonical amino acids (PMID:10970870, PMID:27708257, PMID:35709277).
      Deep research (EEFSEC-deep-research-falcon.md) confirms eEFSec is a Sec-tRNA-specific,
      EF-Tu-like translation elongation GTPase.
    action: ACCEPT
    reason: >-
      eEFSec functions as a specialized translation elongation factor. While it is specific
      for selenocysteine rather than canonical amino acids, the molecular function of
      delivering aminoacyl-tRNA to the ribosome in a GTP-dependent manner is the definition
      of translation elongation factor activity. The IBA annotation is at the right level of
      specificity.
    supported_by:
      - reference_id: PMID:10970870
        supporting_text: "Several lines of evidence enabled us to establish that mSelB is the bona fide mammalian elongation factor for selenoprotein translation"
      - reference_id: PMID:27708257
        supporting_text: "eEFSec is a translational GTPase that binds Sec-tRNASec with high affinity and stringent specificity, and plays a pivotal role during decoding"
- term:
    id: GO:0001514
    label: selenocysteine incorporation
  evidence_type: IEA
  original_reference_id: GO_REF:0000117
  review:
    summary: >-
      IEA annotation from ARBA machine learning for selenocysteine incorporation. Duplicates
      the IBA and IDA annotations for the same term but is independently derived. Consistent
      with the well-established core function confirmed by deep research
      (EEFSEC-deep-research-falcon.md).
    action: ACCEPT
    reason: >-
      This IEA annotation correctly captures the core biological process of eEFSec. Although
      it duplicates IBA and IDA annotations for the same GO term, duplicate annotations from
      independent evidence pipelines are acceptable. The annotation is correct and at the
      right level of specificity.
- term:
    id: GO:0003924
    label: GTPase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  review:
    summary: >-
      IEA annotation for GTPase activity. eEFSec is a translational GTPase; GTP hydrolysis
      is essential for its function in selenocysteine incorporation. GTPase activity has been
      directly demonstrated (PMID:27708257) and the H96A mutation abolishes GTPase activity
      (PMID:27708257, PMID:35709277).
    action: ACCEPT
    reason: >-
      GTPase activity is a core molecular function of eEFSec, well supported by IDA evidence
      in PMID:27708257. The IEA annotation is correct and consistent with the IDA annotations
      for the same term.
    supported_by:
      - reference_id: PMID:27708257
        supporting_text: "we conclude that Thr48, Asp92 and His96 are important for GTP hydrolysis"
- term:
    id: GO:0005525
    label: GTP binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  review:
    summary: >-
      IEA annotation for GTP binding. eEFSec binds GTP with high affinity, as demonstrated
      by isothermal titration calorimetry and crystal structures in complex with GDP, GDPNP,
      and GDPCP (PMID:27708257). Notably, unlike canonical elongation factors, eEFSec has
      similar binding affinities for GDP and GTP (PMID:27708257). GTP binding was also shown
      in the original characterization (PMID:10970870).
    action: ACCEPT
    reason: >-
      GTP binding is integral to the function of eEFSec as a translational GTPase. Crystal
      structures directly show GTP analog binding (PMID:27708257), and the original
      characterization demonstrated GTP binding (PMID:10970870). Although GTP binding is
      implicit in GTPase activity, it is an appropriate and informative annotation.
    supported_by:
      - reference_id: PMID:27708257
        supporting_text: "four domains of human eEFSec fold into a chalice-like structure that has similar binding affinities for GDP, GTP and other guanine nucleotides"
      - reference_id: PMID:10970870
        supporting_text: "Several lines of evidence enabled us to establish that mSelB is the bona fide mammalian elongation factor for selenoprotein translation: it binds GTP, recognizes the Sec-tRNA(Sec) in vitro and in vivo"
- term:
    id: GO:0005634
    label: nucleus
  evidence_type: IEA
  original_reference_id: GO_REF:0000044
  review:
    summary: >-
      IEA annotation for nuclear localization, derived from UniProt subcellular location
      mapping. The UniProt entry lists both cytoplasm and nucleus. Deep research
      (EEFSEC-deep-research-falcon.md) reports that eEFSec shuttles between nucleus and
      cytoplasm, contains a bipartite NLS, and uses CRM1/exportin-1-mediated nuclear export.
      However, the primary function of eEFSec is cytoplasmic translation, and the nuclear
      role remains unresolved.
    action: KEEP_AS_NON_CORE
    reason: >-
      Nuclear localization of eEFSec has experimental support beyond simple sequence
      prediction. Deep research (EEFSEC-deep-research-falcon.md) documents that eEFSec
      contains a bipartite NLS and shuttles between nucleus and cytoplasm via
      CRM1/exportin-1-mediated nuclear export (Leptomycin B sensitive). However, the nuclear
      function remains unresolved and the primary functional role is in cytoplasmic translation
      on ribosomes. Therefore this annotation is kept as non-core.
    supported_by:
      - reference_id: file:human/EEFSEC/EEFSEC-deep-research-falcon.md
        supporting_text: "eEFSec shuttles between nucleus and cytoplasm, contains a bipartite nuclear localization signal (NLS), and uses CRM1/exportin-1-mediated nuclear export (Leptomycin B-sensitive)."
    additional_reference_ids:
      - file:human/EEFSEC/EEFSEC-deep-research-falcon.md
- term:
    id: GO:0005737
    label: cytoplasm
  evidence_type: IEA
  original_reference_id: GO_REF:0000044
  review:
    summary: >-
      IEA annotation for cytoplasmic localization. eEFSec functions in cytoplasmic
      translation, delivering Sec-tRNA(Sec) to ribosomes for selenocysteine incorporation.
      This is fully consistent with all functional data (PMID:10970870, PMID:27708257,
      PMID:35709277) and deep research (EEFSEC-deep-research-falcon.md).
    action: ACCEPT
    reason: >-
      Cytoplasmic localization is appropriate and expected for a translation elongation
      factor. The cryo-EM structure of the selenosome on 80S ribosomes (PMID:35709277)
      directly demonstrates eEFSec functioning on ribosomes, which are primarily cytoplasmic.
    supported_by:
      - reference_id: PMID:35709277
        supporting_text: "A complex between the noncoding Sec-insertion sequence (SECIS), SECIS-binding protein 2 (SBP2), and 40S ribosomal subunit enables Sec-specific elongation factor eEFSec to deliver Sec."
- term:
    id: GO:0000049
    label: tRNA binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000107
  review:
    summary: >-
      IEA annotation for tRNA binding transferred from orthologs. eEFSec binds
      selenocysteinyl-tRNA(Sec) with high affinity and stringent specificity, using all four
      domains (PMID:27708257, PMID:35709277). The cryo-EM structure shows detailed contacts
      with tRNA(Sec) in the A/T conformation (PMID:35709277). The original characterization
      also demonstrated Sec-tRNA(Sec) recognition in vitro and in vivo (PMID:10970870).
    action: ACCEPT
    reason: >-
      tRNA binding is a core molecular function of eEFSec. The protein binds Sec-tRNA(Sec)
      with high affinity and specificity, using D1-D3 for the acceptor-TYC arm and D4 for
      the variable stem and loop (PMID:35709277). While a more specific term like
      selenocysteinyl-tRNA(Sec) binding would be ideal, the GO term tRNA binding
      (GO:0000049) is appropriate and captures this function. The annotation is correct.
    supported_by:
      - reference_id: PMID:27708257
        supporting_text: "eEFSec is a translational GTPase that binds Sec-tRNASec with high affinity and stringent specificity, and plays a pivotal role during decoding"
      - reference_id: PMID:35709277
        supporting_text: "Human eEFSec uses all its domains to engage the tRNASec"
      - reference_id: PMID:10970870
        supporting_text: "it binds GTP, recognizes the Sec-tRNA(Sec) in vitro and in vivo, and is required for efficient selenoprotein translation in vivo"
- term:
    id: GO:0003746
    label: translation elongation factor activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000107
  review:
    summary: >-
      IEA annotation for translation elongation factor activity transferred from orthologs.
      Duplicates the IBA annotation for the same term. eEFSec is indeed a specialized
      translation elongation factor (PMID:10970870, PMID:27708257).
    action: ACCEPT
    reason: >-
      Translation elongation factor activity is a core molecular function of eEFSec. This
