  review:
    summary: >-
      Direct experimental evidence: the GTPase-defective His96->Ala mutant traps
      the catalytically incompetent state, confirming His96 is the catalytic
      residue and that eEFSec is an active GTPase whose hydrolysis drives Sec
      delivery. Core catalytic function.
