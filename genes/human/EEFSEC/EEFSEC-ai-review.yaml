- id: PMID:27708257
  title: Crystal structures of the human elongation factor eEFSec suggest a non-canonical
    mechanism for selenocysteine incorporation.
  findings:
  - statement: >-
      Crystal structures of intact human eEFSec (GDP- and GTP-analogue-bound)
      reveal a four-domain chalice-like fold; eEFSec is a translational GTPase
      that binds Sec-tRNA(Sec) with high affinity and stringent specificity and
      delivers it during UGA decoding.
    reference_section_type: RESULTS
  - statement: >-
      Sec-binding-pocket (Asp229/His230/Arg285) and GTPase-site (Thr48/Asp92/His96)
      mutants abolish UGA read-through and selenoprotein synthesis, defining the
      residues required for Sec incorporation and GTP hydrolysis.
    reference_section_type: RESULTS
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      PubMed/PMC-verified full text; primary structural and biochemical evidence
      for eEFSec function, GTPase activity, and Sec-tRNA(Sec) binding. Supports
      the IDA annotations for GO:0001514 and GO:0003924.
- id: PMID:35709277
  title: Structure of the mammalian ribosome as it decodes the selenocysteine UGA
    codon.
  findings:
  - statement: >-
      Cryo-EM of the mammalian "selenosome" shows SBP2/SECIS docking on the 40S
      creates a binding site on the stalled 80S ribosome for the
      eEFSec:GTP:tRNA(Sec) ternary complex, which delivers Sec to the A-site; the
      preaccommodated state was captured.
    reference_section_type: RESULTS
  - statement: >-
      The GTPase-defective His96->Ala mutant confirms His96 as the catalytic
      residue; eEFSec engages tRNA(Sec) with all its domains and its D4 contacts
      the SECIS apical loop.
    reference_section_type: RESULTS
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      PubMed/PMC-verified full text; primary cryo-EM evidence for the eukaryotic
      Sec UGA recoding mechanism, eEFSec GTPase activity (H96), and tRNA(Sec)
      binding. Supports the IDA annotations for GO:0001514 and GO:0003924.
