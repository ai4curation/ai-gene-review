- term:
    id: GO:0035368
    label: selenocysteine insertion sequence binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000107
  review:
    summary: >-
      IEA annotation for SECIS binding transferred from orthologs. This annotation requires
      careful consideration. In bacteria, SelB directly binds SECIS RNA to promote decoding
      unassisted. In eukaryotes, the situation is different: SBP2 is the primary SECIS-binding
      protein that recognizes the kink-turn motif (PMID:35709277). However, the cryo-EM
      structure shows that eEFSec D4 does contact the SECIS apical loop via the
      eukaryote-specific loop (residues 522-524) interacting with the AAR motif
      (PMID:35709277). Furthermore, the original characterization showed that eEFSec alone
      cannot bind SECIS RNA specifically (PMID:10970870). Deep research
      (EEFSEC-deep-research-falcon.md) also confirms D4 contacts the SECIS apical loop.
    action: ACCEPT
    reason: >-
      While the nature of eEFSec's SECIS interaction differs from classic SECIS binding by
      SBP2, the cryo-EM structure clearly shows direct physical contact between eEFSec D4 and
      the SECIS apical loop (PMID:35709277). The F522G and Q524G mutations at this interface
      impair readthrough activity, confirming functional relevance. The GO term SECIS binding
      (GO:0035368) is defined broadly enough to encompass this interaction. However, it should
      be noted that eEFSec cannot bind SECIS independently -- this contact only occurs in the
      context of the assembled selenosome on the ribosome.
    supported_by:
      - reference_id: PMID:35709277
        supporting_text: "the eukaryote-specific loop β24–β25 (residues 522–524) in D4 of eEFSec forms an interface with the backbone of the AAR motif of SECIS (residues 1128–1130) and h33 (residues 1305–1308) of the 40S subunit"
      - reference_id: PMID:35709277
        supporting_text: "replacing Thr242 with either Val (T242V) or Leu (T242L) and Phe522 and Gln524 with Gly (F522G and Q524G) causes impairment of the readthrough activity"
      - reference_id: PMID:10970870
        supporting_text: "the recombinant mSelB alone is unable to bind specifically the eukaryotic SECIS RNA hairpin"
- term:
    id: GO:0043021
    label: ribonucleoprotein complex binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000107
  review:
    summary: >-
      IEA annotation for ribonucleoprotein complex binding. eEFSec binds to the ribosome
      (an RNP complex) at the GTPase-associated center (GAC) during selenocysteine
      incorporation (PMID:35709277). The cryo-EM structure shows D1 and D2 sandwiched between
      H95 and uL14 of the 60S and h5 and h14 of the 40S. However, the term
      ribonucleoprotein complex binding is generic and does not convey the specific nature
      of this ribosome interaction.
    action: MODIFY
    reason: >-
      While eEFSec does bind to the ribosome, the term ribonucleoprotein complex binding
      is too generic. A more informative term would be ribosome binding (GO:0043022), which
      accurately describes the interaction of eEFSec with the 80S ribosome at the GAC during
      selenocysteine incorporation. The cryo-EM structure shows extensive contacts between
      eEFSec D1-D2 and both the 40S and 60S ribosomal subunits (PMID:35709277).
    proposed_replacement_terms:
      - id: GO:0043022
        label: ribosome binding
    supported_by:
      - reference_id: PMID:35709277
        supporting_text: "D1 and D2 are sandwiched between H95 and uL14 of the 60S and h5 and h14 of the 40S"
- term:
    id: GO:1990904
    label: ribonucleoprotein complex
  evidence_type: IEA
  original_reference_id: GO_REF:0000107
  review:
    summary: >-
      IEA annotation placing eEFSec as a component of a ribonucleoprotein complex. eEFSec is
      part of the selenosome, a transient RNP complex on the ribosome comprising eEFSec,
      SBP2, SECIS RNA, and Sec-tRNA(Sec) (PMID:35709277). However, this term is very generic.
    action: ACCEPT
    reason: >-
      eEFSec is part of the selenosome, a transient ribonucleoprotein complex assembled on
      the ribosome during selenocysteine incorporation (PMID:35709277). While the term is
      generic, there does not appear to be a more specific GO cellular component term for the
      selenosome. The annotation is correct at the level of specificity available.
    supported_by:
      - reference_id: PMID:35709277
        supporting_text: "All recoding factors form an extended network of interactions"
- term:
    id: GO:0001514
    label: selenocysteine incorporation
  evidence_type: IDA
  original_reference_id: PMID:27708257
  review:
    summary: >-
      IDA annotation for selenocysteine incorporation based on crystal structures and
      functional assays from Dobosz-Bartoszek et al. 2016. The study demonstrated that
      wild-type eEFSec promotes UGA codon readthrough and selenoprotein synthesis in vitro,
      and that mutations in the Sec-binding pocket (D229A, H230A, R285A, R285N) abolished
      this activity.
    action: ACCEPT
    reason: >-
      This is direct experimental evidence from a well-designed study. The crystal structures
      of human eEFSec were solved, and functional assays directly demonstrated selenocysteine
      incorporation activity. The mutagenesis data confirm that the Sec-binding pocket
      residues are essential for this function.
    supported_by:
      - reference_id: PMID:27708257
        supporting_text: "each single residue substitution obliterated the ability of eEFSec to promote Sec incorporation"
- term:
    id: GO:0001514
    label: selenocysteine incorporation
  evidence_type: IDA
  original_reference_id: PMID:35709277
  review:
    summary: >-
      IDA annotation for selenocysteine incorporation based on the cryo-EM structure of the
      complete selenosome from Hilal et al. 2022. The study reconstituted the mammalian
      selenosome on 80S ribosomes and demonstrated that eEFSec promotes UGA recoding in an
      SBP2- and SECIS-dependent manner, with key residues Thr242, Phe522, and Gln524
      validated by mutagenesis.
    action: ACCEPT
    reason: >-
      This is high-quality direct experimental evidence from the landmark cryo-EM structure
      of the mammalian selenosome. The study provides structural visualization of eEFSec in
      the act of delivering Sec-tRNA(Sec) to the ribosome, along with functional readthrough
      assays confirming selenocysteine incorporation activity.
    supported_by:
      - reference_id: PMID:35709277
        supporting_text: "eEFSec promotes recoding in an SBP2- and SECIS-dependent manner in the presence of Ser-tRNASec but not Ser-tRNASer"
      - reference_id: PMID:35709277
        supporting_text: "Also, replacing Thr242 with either Val (T242V) or Leu (T242L) and Phe522 and Gln524 with Gly (F522G and Q524G) causes impairment of the readthrough activity"
- term:
    id: GO:0003924
    label: GTPase activity
  evidence_type: IDA
  original_reference_id: PMID:27708257
  review:
    summary: >-
      IDA annotation for GTPase activity based on Dobosz-Bartoszek et al. 2016. The study
      solved crystal structures of human eEFSec in complex with GDP and GTP analogs,
      characterized the GTPase site in D1, and showed that mutations T48A, D92A, and H96A
      cannot promote UGA codon readthrough, establishing their importance for GTP hydrolysis.
    action: ACCEPT
    reason: >-
      This is direct experimental evidence for GTPase activity. The crystal structures reveal
      the GTPase site architecture, and mutagenesis of key catalytic residues (Thr48, Asp92,
      His96) abolishes function. GTPase activity is a core molecular function of eEFSec
      required for selenocysteine incorporation.
    supported_by:
      - reference_id: PMID:27708257
        supporting_text: "we conclude that Thr48, Asp92 and His96 are important for GTP hydrolysis"
      - reference_id: PMID:27708257
        supporting_text: "The GTPase site is located in D1 and it is composed of conserved elements found in other small GTPases"
- term:
    id: GO:0003924
    label: GTPase activity
  evidence_type: IDA
  original_reference_id: PMID:35709277
  review:
    summary: >-
      IDA annotation for GTPase activity based on Hilal et al. 2022. The cryo-EM study used
      the GTPase-defective H96A mutant of eEFSec to trap the preaccommodated state, thereby
      demonstrating the requirement for GTP hydrolysis. GTP was observed bound in the GTPase
      pocket, and the mechanism requires GTP hydrolysis for eEFSec dissociation.
    action: ACCEPT
    reason: >-
      The study design itself relies on and confirms GTPase activity by using the H96A mutant
      to prevent GTP hydrolysis and trap the selenosome. The structural data show GTP in the
      active site and the functional model requires GTP hydrolysis for eEFSec release from
      the ribosome.
    supported_by:
      - reference_id: PMID:35709277
        supporting_text: "We chose eEFSec-H96A to avoid complex disassembly from GTP hydrolysis"
      - reference_id: PMID:35709277
        supporting_text: "After adopting the GTPase activated state, the CCA end of Sec-tRNASec is liberated from eEFSec. eEFSec dissociates from the ribosome"
- term:
    id: GO:0005525
    label: GTP binding
  evidence_type: IDA
  original_reference_id: PMID:10970870
  review:
    summary: >-
      New annotation for GTP binding based on the original characterization of mSelB by
      Fagegaltier et al. 2000. The study directly demonstrated that mSelB/eEFSec binds GTP.
    action: NEW
    reason: >-
      The original characterization paper (PMID:10970870) directly demonstrates GTP binding
      by eEFSec. This is experimental evidence that predates the existing IEA annotation and
      should be represented.
    supported_by:
      - reference_id: PMID:10970870
        supporting_text: "Several lines of evidence enabled us to establish that mSelB is the bona fide mammalian elongation factor for selenoprotein translation: it binds GTP, recognizes the Sec-tRNA(Sec) in vitro and in vivo"
core_functions:
  - molecular_function:
      id: GO:0003746
      label: translation elongation factor activity
    description: >-
      eEFSec is a selenocysteine-specific translation elongation factor that delivers
      Sec-tRNA(Sec) to the ribosome A-site in a GTP-dependent manner. Unlike canonical eEF1A,
      it is specialized for selenocysteine and employs a non-canonical conformational mechanism
      involving D4 domain swing rather than D1 rotation upon GTP hydrolysis. Requires SBP2
      and SECIS RNA for function; eEFSec and SBP2 do not interact directly but engage
      opposite ends of the SECIS element on the ribosome.
    directly_involved_in:
      - id: GO:0001514
        label: selenocysteine incorporation
    locations:
      - id: GO:0005737
        label: cytoplasm
      - id: GO:1990904
        label: ribonucleoprotein complex
    supported_by:
      - reference_id: PMID:10970870
        supporting_text: "Several lines of evidence enabled us to establish that mSelB is the bona fide mammalian elongation factor for selenoprotein translation"
      - reference_id: PMID:27708257
        supporting_text: "eEFSec is a translational GTPase that binds Sec-tRNASec with high affinity and stringent specificity, and plays a pivotal role during decoding"
      - reference_id: PMID:35709277
        supporting_text: "eEFSec promotes recoding in an SBP2- and SECIS-dependent manner in the presence of Ser-tRNASec but not Ser-tRNASer"
  - molecular_function:
      id: GO:0003924
      label: GTPase activity
    description: >-
      GTP hydrolysis by eEFSec is essential for its elongation factor function. The GTPase
      site is in domain 1, with catalytic residues Thr48, Asp92, and His96. GTP hydrolysis
      triggers eEFSec dissociation from the ribosome and accommodation of Sec-tRNA(Sec).
      Unusually for a translational GTPase, eEFSec has similar binding affinities for GDP
      and GTP.
    directly_involved_in:
      - id: GO:0001514
        label: selenocysteine incorporation
    supported_by:
      - reference_id: PMID:27708257
        supporting_text: "we conclude that Thr48, Asp92 and His96 are important for GTP hydrolysis"
      - reference_id: PMID:35709277
        supporting_text: "After adopting the GTPase activated state, the CCA end of Sec-tRNASec is liberated from eEFSec. eEFSec dissociates from the ribosome"
