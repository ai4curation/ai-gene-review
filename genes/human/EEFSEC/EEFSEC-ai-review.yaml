  label: Homo sapiens
description: >-
  EEFSEC encodes eEFSec (also called SelB in prokaryotes; eukaryotic elongation
  factor, selenocysteine-tRNA-specific), the dedicated translation elongation
  factor for co-translational incorporation of the 21st amino acid
  selenocysteine (Sec) at in-frame UGA codons. It is a GTP-binding translational
  GTPase of the TRAFAC-class, EF-Tu/eEF1A-related SelB subfamily, built from an
  N-terminal EF-Tu-like GTPase module (domains 1-3) and a distinctive C-terminal
  domain 4. eEFSec specifically binds selenocysteinyl-tRNA(Sec) with high
  affinity and GTP, and delivers Sec-tRNA(Sec) to the ribosomal A-site so that an
  in-frame UGA is decoded as selenocysteine rather than read as a stop codon.
  Decoding requires the eukaryote-specific factor SECISBP2 (SBP2) bound to the
  SECIS element in the selenoprotein mRNA 3' UTR: SBP2/SECIS docks onto the 40S
  and creates a binding site on the stalled 80S ribosome for the
  eEFSec:GTP:Sec-tRNA(Sec) ternary complex. After GTP hydrolysis (stimulated by
  the ribosome, with His96 as the catalytic residue), eEFSec releases the tRNA
  and dissociates, allowing accommodation and peptide-bond formation. eEFSec is
  therefore essential for synthesis of the entire selenoproteome. It acts in the
  cytoplasm; a nuclear localization has also been reported. Biallelic loss of
  EEFSEC function causes an autosomal-recessive neurodevelopmental disorder with
  progressive spasticity and brain abnormalities associated with reduced
  selenoprotein synthesis.
