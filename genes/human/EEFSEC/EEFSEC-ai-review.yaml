  qualifier: involved_in
  review:
    summary: >-
      Direct experimental evidence: cryo-EM of the mammalian "selenosome"
      captured eEFSec:GTP:tRNA(Sec) delivering Sec-tRNA to the A-site in an
      SBP2/SECIS-dependent manner, and reporter assays showed eEFSec promotes Sec
      UGA read-through. Confirms the role in selenocysteine incorporation.
    action: ACCEPT
    supported_by:
    - reference_id: PMID:35709277
      supporting_text: >-
        in-frame UGA codons recruit selenocysteinyl-tRNA (Sec-tRNASec) to
