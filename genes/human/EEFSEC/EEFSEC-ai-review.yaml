- id: PMID:10970870
  title: Characterization of mSelB, a novel mammalian elongation factor for selenoprotein
    translation.
  findings:
    - statement: >-
        Original identification and characterization of mammalian eEFSec (mSelB). Demonstrated
        GTP binding, Sec-tRNA(Sec) recognition in vitro and in vivo, and requirement for
        efficient selenoprotein translation. Showed that unlike bacterial SelB, mSelB alone
        cannot bind SECIS RNA.
      supporting_text: "Several lines of evidence enabled us to establish that mSelB is the bona fide mammalian elongation factor for selenoprotein translation: it binds GTP, recognizes the Sec-tRNA(Sec) in vitro and in vivo, and is required for efficient selenoprotein translation in vivo."
- id: PMID:27708257
  title: Crystal structures of the human elongation factor eEFSec suggest a non-canonical
    mechanism for selenocysteine incorporation.
  findings:
    - statement: >-
        Solved crystal structures of human eEFSec in complex with GDP/GDPNP/GDPCP. Four-domain
        chalice-like structure. GTP-to-GDP exchange induces D4 swing rather than canonical D1
        rotation.
      supporting_text: "four domains of human eEFSec fold into a chalice-like structure that has similar binding affinities for GDP, GTP and other guanine nucleotides"
    - statement: >-
        Mutagenesis of Sec-binding pocket (D229A, H230A, R285A) abolished Sec incorporation.
        H96A abolished GTPase activity. Similar binding affinities for GDP and GTP.
      supporting_text: "each single residue substitution obliterated the ability of eEFSec to promote Sec incorporation"
- id: PMID:35709277
  title: Structure of the mammalian ribosome as it decodes the selenocysteine UGA
    codon.
  findings:
    - statement: >-
        Cryo-EM structure of the complete mammalian selenosome at 2.8 A. eEFSec and SBP2 do
        not interact directly. D4 contacts SECIS apical loop. SBP2-SECIS complex binds 40S
        first, creating docking site for eEFSec ternary complex.
      supporting_text: "eEFSec and SBP2 do not interact directly but rather deploy their carboxyl-terminal domains to engage with the opposite ends of the SECIS."
    - statement: >-
        Thr242 identified as key selectivity residue. F522G/Q524G mutations impair readthrough.
        eEFSec promotes recoding in an SBP2- and SECIS-dependent manner.
      supporting_text: "eEFSec promotes recoding in an SBP2- and SECIS-dependent manner in the presence of Ser-tRNASec but not Ser-tRNASer"
- id: PMID:39753114
  title: 'EEFSEC deficiency: A selenopathy with early-onset neurodegeneration.'
  findings:
    - statement: >-
        Identified biallelic EEFSEC variants causing NEDPSB (MIM:621102). Pathogenic variants
        P194T, R285Q, D390A, and C426-P596 deletion all showed decreased selenocysteine
        incorporation. Confirms essential role in selenoprotein synthesis in vivo.
      supporting_text: "EEFSEC deficiency: A selenopathy with early-onset neurodegeneration"
- id: file:human/EEFSEC/EEFSEC-deep-research-falcon.md
  title: Deep research review of EEFSEC by Falcon/Edison Scientific Literature
  findings:
    - statement: >-
        eEFSec shuttles between nucleus and cytoplasm, contains a bipartite NLS, and uses
        CRM1/exportin-1-mediated nuclear export (Leptomycin B-sensitive). Two pools exist:
        cytoplasmic pool for Sec insertion and nuclear pool with unresolved function.

proposed_new_terms: []

suggested_questions:
- question: >-
    What is the functional significance of eEFSec's nuclear localization? The protein
    contains a bipartite NLS and shuttles between nucleus and cytoplasm via
    CRM1/exportin-1, but the nuclear function remains unresolved. Could eEFSec have a
    moonlighting function in the nucleus unrelated to translation?
- question: >-
    Does eEFSec misincorporate serine at selenocysteine UGA codons in vivo under
    physiological conditions? The cryo-EM study showed eEFSec is indiscriminate toward
    L-serine and can facilitate its misincorporation in vitro. This has implications for
    selenoprotein function under selenium deficiency.
- question: >-
    Are there additional factors involved in the selenosome beyond eEFSec, SBP2, SECIS,
    and tRNA(Sec)? The mechanism for how the SECIS in the 3'-UTR communicates with a
    UGA codon potentially thousands of nucleotides upstream remains incompletely understood.

suggested_experiments:
- description: >-
    Proximity labeling (BioID/TurboID) of eEFSec in human cells to identify the full
    interactome, particularly to determine whether there are additional selenosome
    components beyond the known SBP2, SECIS, and ribosome interactions. This could
    also reveal nuclear interaction partners.
  hypothesis: >-
    eEFSec interacts with additional factors beyond SBP2 and the ribosome, potentially
    including nuclear proteins that explain its nucleocytoplasmic shuttling.
- description: >-
    Mass spectrometry analysis of selenoproteins from cells with varying selenium
    levels to quantify serine misincorporation at selenocysteine positions. The cryo-EM
    study showed eEFSec can facilitate serine misincorporation in vitro, but in vivo
    relevance is unknown.
  hypothesis: >-
    Under selenium-limiting conditions, eEFSec facilitates serine misincorporation at
    UGA codons, producing catalytically impaired selenoprotein variants.

status: COMPLETE
