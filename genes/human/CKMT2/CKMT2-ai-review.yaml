id: P17540
gene_symbol: CKMT2
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  CKMT2 encodes the sarcomeric mitochondrial creatine kinase (S-MtCK, also
  Mib-CK), a member of the ATP guanido phosphotransferase (phosphagen kinase)
  family expressed selectively in heart and skeletal muscle. The protein is
  synthesized with an N-terminal mitochondrial transit peptide and matures into a
  419-residue enzyme that assembles into a homo-octamer of four homodimers located
  on the intermembrane-space face of the mitochondrial inner membrane, to which it
  is peripherally anchored largely through electrostatic binding to cardiolipin.
  S-MtCK reversibly catalyzes the transfer of the gamma-phosphate of ATP to
  creatine, producing phosphocreatine and ADP (EC 2.7.3.2). Positioned at
  inner/outer-membrane contact sites and functionally coupled to the adenine
  nucleotide translocator, it uses ATP exported from oxidative phosphorylation to
  generate diffusible phosphocreatine, constituting the phosphate-loading limb of
  the phosphocreatine/creatine shuttle that buffers and transports high-energy
  phosphate in tissues with large, fluctuating energy demands. Through its
  octameric, cardiolipin- and VDAC-associated state at contact sites it also
  contributes to the structural organization of these sites and can influence
  mitochondrial permeability transition.
