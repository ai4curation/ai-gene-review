- term:
    id: GO:0006936
    label: muscle contraction
  evidence_type: TAS
  original_reference_id: PMID:2324105
  qualifier: involved_in
  review:
    summary: >-
      CKMT2 supplies high-energy phosphate (phosphocreatine) to contracting striated
      muscle, but it is an energy-metabolism enzyme, not a component of the
      contractile apparatus or a direct participant in the contraction process.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      The link to muscle contraction is indirect (energetic support of contracting
      tissue); the gene product's role is energy transduction (phosphocreatine
      biosynthesis), not the contraction process itself.
    supported_by:
    - reference_id: PMID:2324105
      supporting_text: "Creatine kinase (EC 2.7.3.2) isoenzymes play a central role in energy transduction"
