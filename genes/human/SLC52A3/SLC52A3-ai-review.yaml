id: Q9NQ40
gene_symbol: SLC52A3
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  SLC52A3 (riboflavin transporter 3, RFVT3; formerly C20orf54) is a multi-pass
  plasma-membrane transporter of the SLC52 solute-carrier family that mediates
  cellular uptake of the water-soluble vitamin B2 (riboflavin). Riboflavin is the
  precursor of the flavin cofactors FMN and FAD, which are essential for numerous
  oxidation-reduction reactions in carbohydrate, lipid and amino-acid metabolism;
  because humans cannot synthesize riboflavin, it must be acquired from the diet by
  intestinal absorption. RFVT3 localizes to the apical (brush-border) membrane of
  polarized epithelia and is the principal transporter for riboflavin absorption at
  the intestinal apical surface; it is most highly expressed in testis and is also
  abundant in small intestine, kidney and prostate. Transport is riboflavin-selective,
  Na(+)-independent at low pH, and is inhibited by riboflavin analogs (lumiflavin, FMN,
  FAD) and by methylene blue. The protein has 11 transmembrane helices. Two splice
  isoforms exist: isoform 1 (SLC52A3a) traffics to the cell membrane and is the
  functional transporter, whereas isoform 2 (SLC52A3b) is cytoplasmic and
  transport-deficient. Biallelic loss-of-function variants in SLC52A3 cause riboflavin
  transporter deficiency, presenting as Brown-Vialetto-Van Laere syndrome type 1 and
  Fazio-Londe disease: progressive bulbar palsy with sensorimotor neuronopathy,
  sensorineural deafness and respiratory compromise that is responsive to high-dose oral
  riboflavin.
