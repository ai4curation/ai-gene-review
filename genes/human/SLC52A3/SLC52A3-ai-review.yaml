- id: PMID:20206331
  title: Brown-Vialetto-Van Laere syndrome, a ponto-bulbar palsy with deafness, is
    caused by mutations in c20orf54.
  findings: []
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Disease-gene discovery paper identifying C20orf54 (SLC52A3) mutations as the cause
      of Brown-Vialetto-Van Laere syndrome. Supports the disease association. Abstract-only
      in cache. The derived GO annotation "sensory perception of sound" is a phenotype-to-
      process over-annotation (deafness is a downstream consequence of riboflavin
      transporter deficiency), not a molecular hearing role.
- id: PMID:20463145
  title: Identification and comparative functional characterization of a new human
    riboflavin transporter hRFT3 expressed in the brain.
  findings: []
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Cloning and functional characterization of the human riboflavin transporter that
      UniProt/GOA map to SLC52A3 (Q9NQ40). The paper's local name "hRFT3" corresponds to
      SLC52A3/RFVT3. Supports core transporter activity, riboflavin transport, membrane
      localization, and kinetics. Abstract-only in cache.
- id: PMID:21854757
  title: 'Differential expression of human riboflavin transporters -1, -2, and -3
    in polarized epithelia: a key role for hRFT-2 in intestinal riboflavin uptake.'
  findings: []
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Full text available. Uses the Said-lab nomenclature in which "hRFT-2" is the 469-aa
      C20orf54 product = SLC52A3/RFVT3 (exclusively apical, key intestinal transporter);
      note that this paper's separate "hRFT-3" is a different SLC52 member. GOA correctly
      attributes the apical-localization and intestinal-uptake data for "hRFT-2" to
      Q9NQ40 (SLC52A3).
- id: PMID:22273710
  title: Effect of clinical mutations on functionality of the human riboflavin transporter-2
    (hRFT-2).
  findings: []
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Full text available. "hRFT-2" here = C20orf54 = SLC52A3. Functional characterization
      of BVVLS clinical mutations in Caco-2 cells (uptake, membrane targeting) supports
      RFVT3 riboflavin transport activity, plasma-membrane localization, and the disease
      mechanism.
- id: PMID:24264046
  title: Functional involvement of RFVT3/SLC52A3 in intestinal riboflavin absorption.
  findings: []
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Directly names RFVT3/SLC52A3. Apical riboflavin uptake in T84 cells and mouse
      jejunum/ileum, methylene-blue inhibition, RFVT3 siRNA. Strongly supports apical
      localization, transporter activity, and intestinal absorption. Abstract-only in cache.
- id: PMID:27702554
  title: 'SLC52A2 [p.P141T] and SLC52A3 [p.N21S] causing Brown-Vialetto-Van Laere
    Syndrome in an Indian patient: First genetically proven case with mutations in
    two riboflavin transporters.'
  findings: []
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Full text available. Functional characterization of the SLC52A3 p.N21S variant
      (drastically reduced RF uptake, ER retention / loss of membrane expression),
      supporting plasma-membrane localization and the transport/disease mechanism.
- id: PMID:29428966
  title: SLC52A3 expression is activated by NF-κB p65/Rel-B and serves as a prognostic
    biomarker in esophageal cancer.
  findings: []
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: >-
      Full text available. Establishes the two transcript variants (SLC52A3a isoform 1,
      SLC52A3b isoform 2), their differential localization (isoform 2 cytoplasmic), and a
      cancer/NF-kB context. Basis for the cytoplasm/nuclear-membrane localizations, which
      are non-core (isoform- and cancer-context specific).
- id: PMID:30892938
  title: 'Identification of transmembrane protein 237 as a novel interactor with the
    intestinal riboflavin transporter-3 (RFVT-3): role in functionality and cell biology.'
  findings: []
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Abstract-only in cache. Identifies TMEM237 (Q96Q45) as a functional RFVT-3
      interactor that modulates RF uptake and RFVT-3 stability; supports transporter
      activity, riboflavin transport and intestinal absorption. The IPI "protein binding"
      to TMEM237 is a real interaction but generic; flagged as over-annotated.
- id: PMID:32814053
  title: Interactome Mapping Provides a Network of Neurodegenerative Disease Proteins
    and Uncovers Widespread Protein Aggregation in Affected Brains.
  findings: []
  reference_review:
    relevance: LOW
    correctness: VERIFIED
    review_notes: >-
      Abstract-only in cache. Large-scale yeast two-hybrid neurodegeneration interactome;
      the RFVT3 interactions (ATXN3, DNM2, TOR1A) are screen-scale and yield only the
      uninformative "protein binding" term (over-annotated). Not informative about RFVT3's
      molecular function.
