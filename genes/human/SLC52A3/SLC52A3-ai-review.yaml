suggested_questions:
- question: >-
    Do isoform 1 (SLC52A3a) and isoform 2 (SLC52A3b) differ functionally beyond
    localization, i.e. does the cytoplasmic isoform 2 have any transport or regulatory
    role, or is it purely a non-functional/regulatory variant?
- question: >-
    What is the physiological significance of the nuclear-membrane and cytoplasmic
    localizations reported in cancer cells, and are they related to the pro-proliferative
    activity of SLC52A3a in esophageal squamous cell carcinoma?
- question: >-
    Is the TMEM237-RFVT3 interaction a general regulator of RFVT3 trafficking/stability
    in the intestine, and does it modulate riboflavin absorption in vivo?
suggested_experiments:
- description: >-
    Structure-guided mutagenesis of the cryo-EM-resolved riboflavin-binding site (PDB
    8XSN) combined with [3H]riboflavin uptake assays to map residues required for
    substrate recognition versus membrane trafficking, and to explain transport-null
    variants (e.g. W17R) that retain normal cell-surface expression.
- description: >-
    Tissue-specific conditional knockout / knock-in of disease alleles in mouse intestine
    with measurement of intestinal riboflavin absorption, plasma riboflavin, and
    neurological phenotype, with and without high-dose riboflavin rescue.
