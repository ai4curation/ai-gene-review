id: Q16864
gene_symbol: ATP6V1F
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: ATP6V1F encodes the F subunit (14 kDa) of the V1 peripheral sector of the
  vacuolar-type H+-ATPase (V-ATPase). Together with subunit D, subunit F forms the central
  rotor of V1 that is driven by ATP hydrolysis in the catalytic A3B3 hexamer and transmits
  rotational energy to the V0 proteolipid c-ring to drive proton translocation across
  organelle membranes. ATP6V1F is the smallest subunit of V1 and is ubiquitously expressed,
  reflecting the housekeeping role of V-ATPase in acidifying lysosomes, endosomes, Golgi
  apparatus, and other organelles. The D-F central rotor assembly serves as the mechanical
  connection between the ATP-hydrolyzing head and the proton-translocating V0 membrane
  sector. In some cell types, the V-ATPase is targeted to the plasma membrane for
  extracellular acidification. The protein interacts directly with V0 d subunit
  (ATP6V0D1), cementing its position in the central stalk. Two alternatively spliced
  isoforms exist.
