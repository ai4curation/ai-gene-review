core_functions:
- description: Central rotor component of the V1 sector of the vacuolar-type H+-ATPase.
    Together with subunit D, forms the DF central stalk that transmits ATP hydrolysis
    energy from the catalytic A3B3 hexamer to the V0 c-ring, enabling proton translocation
    across organelle membranes. Essential for lysosomal, endosomal, and Golgi acidification.
    The smallest V1 subunit (13 kDa; 119 amino acids) and ubiquitously expressed.
  contributes_to_molecular_function:
    id: GO:0046961
    label: proton-transporting ATPase activity, rotational mechanism
  directly_involved_in:
  - id: GO:1902600
    label: proton transmembrane transport
  locations:
  - id: GO:0005765
    label: lysosomal membrane
  supported_by:
  - reference_id: PMID:33065002
    supporting_text: Vesicular- or vacuolar-type adenosine triphosphatases (V-ATPases)
