taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: HSD3B7 (3 beta-hydroxysteroid dehydrogenase type 7; 3-beta-hydroxy-Delta(5)-C27-steroid
  oxidoreductase, EC 1.1.1.181) catalyzes the second committed step of bile-acid biosynthesis.
  Acting on the 7-alpha-hydroxylated sterols generated by CYP7A1/CYP7B1, it oxidizes the
  3-beta-hydroxyl group and isomerizes the Delta5 double bond, converting 7-alpha-hydroxycholesterol
  (and related 7-alpha-hydroxy-oxysterols such as 7-alpha,25-, 7-alpha,26- and 7-alpha,24-triols)
  to the corresponding 3-oxo-Delta4 intermediates, e.g. 7-alpha-hydroxy-4-cholesten-3-one.
  A single such enzyme feeds all known pathways of bile-acid synthesis. It is specific for
  C27 bile-acid-precursor sterols and does not metabolize the C19/C21 steroids handled by
  the steroidogenic paralogs HSD3B1/HSD3B2 (with which it shares only ~34% identity). HSD3B7
  is a multi-pass endoplasmic-reticulum-membrane (microsomal) enzyme expressed predominantly
  in liver. Loss-of-function mutations cause congenital bile acid synthesis defect type 1
  (CBAS1), presenting as neonatal cholestasis, progressive liver disease and fat-soluble-vitamin
  malabsorption. By acting on the oxysterol 7-alpha,25-dihydroxycholesterol, the enzyme also
  contributes to turnover of the EBI2/GPR183 ligand that positions lymphocytes in lymphoid
  tissue.
