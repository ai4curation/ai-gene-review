id: P17900
gene_symbol: GM2A
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  GM2A (ganglioside GM2 activator protein; also called sphingolipid activator
  protein 3 / SAP-3 and cerebroside sulfate activator protein) is a small,
  soluble, non-catalytic lysosomal lipid-binding and lipid-transfer protein of
  the ML/GM2-AP family with a distinctive beta-cup fold. It is essential for the
  lysosomal degradation of ganglioside GM2: it extracts single GM2 molecules
  from the surface of intralysosomal luminal vesicles and presents them in
  soluble form to beta-hexosaminidase A (the HEXA/HEXB heterodimer), forming a
  stoichiometric GM2-GM2A complex that is the actual substrate for hydrolysis of
  the terminal N-acetylgalactosamine to yield GM3. GM2A is thus an obligatory
  cofactor of HexA rather than an enzyme itself, and it similarly assists
  breakdown of the related neutral glycolipid GA2. Its large hydrophobic binding
  pocket can accommodate other single-chain lipids (phospholipids, fatty acids)
  and it can participate in cholesterol transfer, and its lipid-mobilizing
  activity is modulated by the membrane lipid environment (inhibited by
  cholesterol, sphingomyelin, and sphingoid bases; stimulated by ceramide,
  anionic lipids such as BMP, fatty acids, and lysophosphatidylcholine). GM2A
  is synthesized with a cleaved signal peptide, N-glycosylated, and targeted to
  the lysosomal lumen, where it acts at the ILV membrane surface; it is also
  detectable in secreted/exosomal fractions. Loss of GM2A function causes the AB
  variant of GM2 gangliosidosis (a Tay-Sachs-like autosomal recessive lysosomal
  storage disease), in which GM2 accumulates in neurons despite normal
  hexosaminidase A and B activities.
