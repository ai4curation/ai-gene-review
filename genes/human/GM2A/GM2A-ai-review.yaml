core_functions:
- description: >-
    GM2A is a lysosomal lipid chaperone (GM2 activator protein) that binds a
    single ganglioside GM2 molecule, extracts it from the intralysosomal luminal
    vesicle membrane, and presents the soluble GM2-GM2A complex to
    beta-hexosaminidase A (HEXA/HEXB) as the obligatory non-catalytic cofactor
    enabling hydrolysis of GM2 to GM3.
  molecular_function:
    id: GO:7770043
    label: lipid chaperone activity
  directly_involved_in:
  - id: GO:0006689
    label: ganglioside catabolic process
  locations:
  - id: GO:0043202
    label: lysosomal lumen
  supported_by:
  - reference_id: PMID:11707436
    supporting_text: >-
      Hydrolysis of membrane-bound SM2 by the recombinant Hex S was
      synergistically stimulated by the GM2 activator protein
  - reference_id: file:human/GM2A/GM2A-uniprot.txt
    supporting_text: >-
      Extracts single GM2 molecules from intralysosomal luminal vesicle (ILV)
      membranes and presents them in
- description: >-
    Beyond GM2, GM2A functions as a lysosomal sphingolipid activator protein
    that mobilizes and solubilizes membrane glycosphingolipids (including the
    neutral glycolipid GA2) and presents them to hexosaminidases, contributing
    to glycosphingolipid catabolism; this lipid-mobilizing activity is tuned by
    the surrounding membrane lipid composition.
  molecular_function:
    id: GO:0030290
    label: sphingolipid activator protein activity
  directly_involved_in:
  - id: GO:0046479
    label: glycosphingolipid catabolic process
  locations:
  - id: GO:0043202
    label: lysosomal lumen
  supported_by:
  - reference_id: PMID:30988135
    supporting_text: >-
      hydrolysis-inhibiting lipids also had an inhibiting effect on the
      solubilization and mobilization of membrane-bound lipids by the GM2
      activator protein
  - reference_id: file:human/GM2A/GM2A-uniprot.txt
    supporting_text: >-
      Also stimulates the breakdown of glycolipid GA2 by HEXA
proposed_new_terms: []
suggested_questions:
- question: >-
    Beyond GM2 and GA2, what is the full physiological repertoire of lipids that
    human GM2A binds and presents in vivo, and how significant is its reported
    cholesterol-transfer activity relative to NPC2?
- question: >-
    How does the intralysosomal membrane lipid milieu (BMP/anionic lipids,
    cholesterol, ceramide, sphingoid bases) quantitatively set the rate of
    GM2A-dependent GM2 catabolism in neurons, and could modulating it be
    therapeutic in the GM2 gangliosidosis AB variant?
suggested_experiments:
- description: >-
    Reconstitute GM2 hydrolysis on defined ILV-mimetic liposomes with purified
    GM2A and HexA while systematically varying BMP, cholesterol, and ceramide to
    map the lipid-dependence of GM2A substrate presentation.
- description: >-
    Use structural and single-molecule approaches (building on the beta-cup
    crystal structures) to capture GM2A in the act of extracting GM2 from a
    membrane and handing it to HexA, defining the transfer intermediate.
