- term:
    id: GO:0009898
    label: cytoplasmic side of plasma membrane
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: is_active_in
  review:
    summary: >-
      Phylogenetically inferred localization to the cytoplasmic side of the
      plasma membrane. This is inconsistent with GM2A biology: it is a soluble
      glycoprotein made with a cleaved signal peptide and targeted to the
      lysosomal lumen, with no cytosolic phase.
    action: REMOVE
    reason: >-
      GM2A carries an N-terminal signal peptide (residues 1-23), is
      N-glycosylated, and localizes to the lysosome (lumen)/ILV surface; it never
      faces the cytosol. Placement at the cytoplasmic side of the plasma membrane
      is a mislocalizing propagation and contradicts the topology of a secreted
      lysosomal protein.
    propagation_review:
