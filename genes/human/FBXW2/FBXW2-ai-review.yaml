- id: file:human/FBXW2/FBXW2-deep-research-falcon.md
  title: Falcon deep research report for human FBXW2
  findings:
  - statement: FBXW2 functions as an SCF substrate adaptor that binds specific substrates (often phosphorylation-dependently) and promotes their polyubiquitination and proteasome-dependent degradation.
    supporting_text: FBXW2's primary biochemical function is as an **SCF substrate adaptor** that binds specific protein substrates (often in a phosphorylation-dependent manner) and promotes their **polyubiquitination** leading to **proteasome-dependent degradation**.
  - statement: FBXW2 is both a substrate of SCF(β-TrCP1) and an E3 substrate receptor for SKP2, forming a β-TrCP1-FBXW2-SKP2 F-box cascade in which β-TrCP1 recognizes FBXW2 via a conserved SSGART motif.
    supporting_text: 'β-TrCP1 recognition of FBXW2 involves a conserved motif (reported as **SSGART**) with phospho-dependent binding to the β-TrCP consensus'
  - statement: FBXW2 recognizes β-catenin after EGF-AKT1 phosphorylation at Ser552 via a TSXXXS-like degron, driving β-catenin ubiquitylation and proteasomal degradation and suppressing migration/invasion in lung cancer.
    supporting_text: '**EGF–AKT1 signaling** phosphorylates β-catenin at **Ser552**, enabling FBXW2 binding.'
  - statement: FBXW2 directly ubiquitinates NF-κB p65/RELA at K122 in a phosphorylation-dependent manner antagonized by p300-mediated acetylation, suppressing breast cancer stemness and paclitaxel resistance.
    supporting_text: The study identifies **p65 K122** as an FBXW2 ubiquitination site, and reports that **p300-mediated acetylation** inhibits FBXW2-induced p65 ubiquitination
  - statement: FBXW2 directs K48-linked polyubiquitination of Moesin, an interaction weakened by AKT phosphorylation of Moesin at Thr558, tying FBXW2 to an AKT-Moesin-SKP2 oncogenic axis.
    supporting_text: FBXW2 directs **Lys-48-linked polyubiquitination** of Moesin, consistent with proteasome-targeting chains.
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: 'Falcon synthesis of FBXW2 primary literature; the SCF adaptor role, β-TrCP1-FBXW2-SKP2 axis, and GCM1/SKP2/β-catenin/TAK1 substrates cross-check against UniProt Q9UKT8 and cached PMID:23651062/PMID:35414786. Additional substrate leads (NF-κB p65, Moesin, EGFR, KSRP, WASL) are from single primary papers (Ren 2022, Barik 2023, Zhou 2022, Wang 2020, Lin 2025) not yet in GOA; treated as supporting context, not a basis to overrule curated annotations.'
