references:
- id: PMID:10531035
  title: Identification of a family of human F-box proteins.
  findings:
  - statement: F-box proteins (including the WD40-class Fbws such as FBW2/FBXW2) are substrate-recruiting subunits of SCF ubiquitin ligases composed of SKP1, a cullin (CUL1), ROC1/RBX1 and the F-box protein, bringing E2 enzymes to specifically recruited substrates.
    reference_section_type: ABSTRACT
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: Original identification of human F-box family including FBW2; abstract only. Source of the SCF subunit/proteolysis TAS annotations. The transferase-activity annotation conflates SCF-core catalysis with the adaptor role.
