core_functions:
- description: Substrate-recognition subunit of the SCF(FBXW2) (SKP1-CUL1-RBX1) E3 ubiquitin ligase that, via its WD40 repeats, recognizes target proteins (e.g. the transcription factor GCM1, in a phosphorylation-facilitated manner) and presents them for polyubiquitination and proteasomal degradation; substrate access is competitively regulated by RACK1.
