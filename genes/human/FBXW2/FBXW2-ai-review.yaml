suggested_questions:
- question: What sequence/phospho-degron features do FBXW2 WD40 repeats recognize across its substrates (GCM1, SKP2, β-catenin, TAK1, p65, Moesin, EGFR), given that reported degrons (TSXXXS on β-catenin, TSELLS on SKP2, TSNNST on EGFR) share a Thr-Ser pattern, and how general is competitive/PTM regulation (e.g. RACK1 competition, p300 acetylation of p65, AKT-Thr558 on Moesin)?
- question: How is the reciprocal β-TrCP1-FBXW2-SKP2 degradation axis balanced in normal versus tumor cells, and does FBXW2 loss drive tumorigenesis primarily through SKP2/β-catenin stabilization?
- question: Is FBXW2's reported non-oncologic, myeloid role (KSRP degradation in obesity-associated inflammation) mechanistically distinct from its tumor-suppressive substrate set, and does it reflect tissue-specific substrate availability?
suggested_experiments:
- description: Reconstitute SCF(FBXW2) in vitro with purified SKP1, CUL1, RBX1, an E2 and candidate substrates (GCM1, SKP2, β-catenin, TAK1, p65, Moesin, EGFR) to confirm direct, FBXW2-dependent ubiquitination and map degron requirements and chain linkages (e.g. K48 vs K63), which are unspecified for several substrates.
- description: Use FBXW2 knockout/knockdown with rescue (WT vs F-box-deletion vs WD40 mutants) combined with quantitative proteomics in lung, breast and hepatocellular carcinoma models to define the endogenous substrate repertoire and the contribution of each substrate to the anti-proliferative/anti-invasive phenotype.
- description: Test whether substrate PTM crosstalk (p300 acetylation of p65, AKT phosphorylation of Moesin Thr558 and β-catenin Ser552) governs FBXW2 substrate selection by combining phospho/acetyl-site mutants with FBXW2 binding and degradation assays.
