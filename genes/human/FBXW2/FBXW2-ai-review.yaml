gene_symbol: FBXW2
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  FBXW2 (FBW2) is an F-box/WD40-repeat protein that serves as a
  substrate-recognition subunit of the canonical SCF (SKP1-CUL1-RBX1) E3
  ubiquitin ligase, forming the SCF(FBXW2) complex. Through its N-terminal F-box
  motif it binds SKP1 (which bridges to the CUL1-RBX1 catalytic core), while its
  five WD40 repeats provide a substrate-binding surface that recognizes
  (often phosphorylation-marked) target proteins and presents them for
  RBX1/RING-dependent polyubiquitination and proteasomal degradation; FBXW2
  itself does not catalyze ubiquitin transfer. Characterized substrates include
  the transcription factor GCM1 (glial cell missing 1), whose turnover FBXW2
  controls during placental cell migration and invasion (counter-regulated by
  RACK1, which competes with GCM1 for FBXW2 binding); the SCF receptor SKP2 (via
  a TSELLS-type degron) and
  β-catenin, whose FBXW2-mediated degradation suppresses proliferation and
  invasion of lung cancer cells; the kinase MAP3K7/TAK1, targeted for
  K48-linked polyubiquitination in hepatocellular carcinoma; NF-κB p65/RELA,
  ubiquitinated at K122 in a phosphorylation-dependent, p300-acetylation-antagonized
  manner to suppress breast cancer stemness and chemoresistance; the
  cytoskeletal effector Moesin, K48-polyubiquitinated unless protected by AKT
  phosphorylation at Thr558 (an AKT-Moesin-SKP2 axis); and EGFR (via a
  TSNNST-type degron). A non-oncologic role has also been reported in myeloid
  cells, where FBXW2 degrades KSRP and modulates obesity-associated
  inflammation. Across substrates FBXW2 acts largely as a tumor suppressor, and
  its substrate engagement is frequently conditional on substrate
  phosphorylation. FBXW2 is itself a
  substrate of SCF(β-TrCP1) (recognized via a phospho-dependent SSGART motif),
  placing it within a β-TrCP1-FBXW2-SKP2 regulatory
  axis. It is a predominantly cytoplasmic/cytosolic protein, though it can also
  ubiquitinate shuttling substrates such as p65 in the nucleus. As with other
  client proteins it associates transiently with the HSP90-CDC37 chaperone
  system during its own folding/maturation.
