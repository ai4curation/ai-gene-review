core_functions:
- description: >-
    With its paralog FANCI, FANCD2 forms the ID2 DNA-repair complex that binds DNA and, upon
    FANCL/UBE2T-catalyzed monoubiquitination at Lys561, is remodeled into a closed sliding clamp
    encircling duplex DNA. FANCD2 itself preferentially binds single-stranded DNA. This
    chromatin-loaded, DNA-binding clamp scaffold coordinates the core steps of replication-coupled
    interstrand crosslink repair (nucleolytic incision, translesion synthesis) and homologous
    recombination, and recruits downstream factors such as the nuclease FAN1.
