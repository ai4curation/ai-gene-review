- question: What is the minimal DNA substrate recognized by unmodified FANCD2 versus the monoubiquitinated ID2 clamp, and how does this specificity switch coordinate incision, translesion synthesis and HR in vivo?
- question: To what extent are the reported nucleolar and replication-fork-protection activities of FANCD2 separable from its canonical ID2 monoubiquitination function?
