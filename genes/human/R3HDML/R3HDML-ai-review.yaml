suggested_questions:
- question: >-
    Which cell-surface receptor, extracellular-matrix component, or protease is the
    immediate target of mature R3HDML in satellite cells?
  experts:
  - skeletal-muscle stem-cell biologists
  - CAP-superfamily biochemists
- question: >-
    Does human R3HDML retain the satellite-cell myogenic role demonstrated in
    mouse, despite intestine-enriched RNA in adult human tissue atlases?
  experts:
  - human muscle-regeneration specialists
- question: >-
    Is furin-like propeptide cleavage required for R3HDML secretion, stability, or
    biological activity?
  experts:
  - secretory-pathway biochemists
suggested_experiments:
- description: >-
    Knock out R3HDML in primary human satellite cells or iPSC-derived myogenic
    progenitors, then perform mature-protein and cleavage-resistant rescue while
    measuring proliferation, differentiation, fusion, and Akt/IGF-1 responses.
  experiment_type: CRISPR genetics, human myogenesis, and rescue analysis
  hypothesis: >-
    Secreted, proteolytically matured human R3HDML is required cell-nonautonomously
    for normal satellite-cell proliferation and differentiation.
- description: >-
    Screen purified mature human R3HDML against extracellular serine proteases and
    quantitative peptide-substrate panels, with matched CAP-domain mutants and
    stoichiometric binding controls.
  experiment_type: biochemical activity and inhibition profiling
  hypothesis: >-
    R3HDML directly inhibits a restricted extracellular serine protease rather
    than acting only as a nonenzymatic ligand.
- description: >-
    Use affinity labeling, cell-surface proteomics, and genome-wide CRISPR
    resistance screening during recombinant-R3HDML stimulation of human myogenic
    progenitors.
  experiment_type: receptor identification and genetic epistasis
  hypothesis: >-
    Mature R3HDML engages a specific surface receptor upstream of IGF-1/Akt and
    myogenic cell-cycle responses.
knowledge_gaps:
- gap_statement: >-
    The direct molecular activity, receptor, substrate, and extracellular binding
    partner of mature R3HDML are unknown.
  boundary: >-
    R3hdml is demonstrably secreted, extracellular protein rescues loss in mouse
    myogenic cells, and loss affects proliferation and differentiation, but direct
    Akt binding was not detected and receptor activation versus extracellular-
    matrix/protease regulation remain untested alternatives.
  gap_kind:
  - BIOLOGY
  dark_aspect: MF_DARK
  status: OPEN
  significance: >-
    Resolving this mechanism is necessary for a defensible molecular-function term
    and for understanding how R3HDML controls satellite cells.
  resolution: >-
    Purified-protein protease panels, receptor capture, extracellular interactomics,
    and separation-of-function rescue mutants should distinguish ligand, adaptor,
    matrix-regulator, and peptidase-inhibitor models.
  provenance:
  - reference_id: PMID:31524320
    supporting_text: we do not know how R3hdml affects the function of satellite cells.
- gap_statement: >-
    Conservation of the mouse skeletal-muscle developmental and regenerative role
    in human R3HDML has not been demonstrated.
  boundary: >-
    The human protein retains the signal peptide, propeptide, and CAP domain, while
    the only causal functional study uses mouse cells and mice and adult human
    expression resources emphasize intestinal tissue.
  gap_kind:
  - BIOLOGY
  dark_aspect: BP_DARK
  status: OPEN
  significance: >-
    Direct human evidence is needed before treating the myogenic process terms as
    more than well-motivated orthology transfers.
  resolution: >-
    Endogenous expression, secretion, knockout, and mature-protein rescue should be
    tested in primary human satellite cells and regenerating human muscle models.
  provenance:
  - reference_id: file:human/R3HDML/R3HDML-notes.md
    supporting_text: Whether the myogenic role and the dominant adult tissue context are conserved in humans remains open.
