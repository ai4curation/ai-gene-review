    summary: >-
      Proposed orthology-supported annotation. Mouse knockout and cell-culture
      experiments show that R3hdml promotes satellite-cell/myoblast proliferation.
    action: NEW
    reason: >-
      R3hdml loss reduces satellite-cell proliferation and cell-cycle markers,
      while the one-to-one human ortholog retains the processed CAP architecture.
      ISS conveys the mouse-to-human evidence boundary.
    supported_by:
    - reference_id: PMID:31524320
      supporting_text: Inactivation of R3hdml led to a reduced amount of skeletal muscle and decreased proliferation of myogenic satellite cells.
