gene_symbol: R3HDML
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  R3HDML is a small, signal-peptide-bearing CAP-superfamily precursor that,
  despite its inherited name, does not contain an R3H domain. The conserved
  precursor is cleaved before secretion to yield an extracellular CAP-domain
  protein. Mouse R3hdml is produced by activated and differentiating skeletal-
  muscle satellite cells and acts extracellularly to promote their proliferation
  and myogenic differentiation, supporting postnatal skeletal-muscle development
  and regeneration after injury. The immediate receptor, extracellular-matrix
  target, or enzymatic activity is unknown; peptidase inhibition remains a
  structural prediction rather than a demonstrated biochemical function. Direct
  causal evidence is from mouse, and conservation of this myogenic role in human
  cells has not yet been tested.
existing_annotations:
- term:
    id: GO:0005576
    label: extracellular region
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: is_active_in
  review:
    summary: >-
      PAINT places R3HDML in the extracellular region, consistent with the
      precursor topology and direct secretion of the mouse ortholog.
    action: ACCEPT
    reason: >-
      Mouse satellite cells secrete a processed R3hdml protein, and extracellular
      recombinant protein rescues R3hdml-silenced myogenic cells. The human
      protein has the same signal-peptide/propeptide/CAP-domain architecture, so
      extracellular action is a well-supported core localization.
    supported_by:
    - reference_id: PMID:31524320
      supporting_text: R3hdml protein was secreted upon satellite cell differentiation.
      reference_section_type: INTRODUCTION
- term:
    id: GO:0060090
    label: molecular adaptor activity
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: enables
  review:
    summary: >-
      PAINT propagated molecular adaptor activity from mouse Glipr1l1 across a
      broad and functionally diverse CAP-family ancestral node to R3HDML.
    action: REMOVE
    reason: >-
      The sole seed, Glipr1l1, is a specialized outer-acrosomal-membrane protein
      modeled in protein localization during the acrosome reaction. R3HDML is a
      different CAP-family paralog that is processed and secreted by satellite
      cells; neither the mouse R3hdml study nor human protein evidence shows that
      it bridges a macromolecular complex. Shared CAP architecture is inadequate
      evidence for this source-specific adaptor activity.
    propagation_review:
      root_cause: PROPAGATION_BAD
      failure_modes:
      - WRONG_ORTHOLOG_OR_PARALOG
      - CONTEXT_OR_TISSUE_MISMATCH
      - ROLE_CONFLATION
      source_entities:
      - source_id: MGI:MGI:1916536
        source_label: mouse Glipr1l1
        source_status: SUPPORTS_SOURCE_BUT_NOT_TARGET
        comment: >-
          The seed activity belongs to a sperm outer-acrosomal-membrane paralog
          functioning during the acrosome reaction, not to R3HDML.
      - source_id: PANTHER:PTN000036124
        source_label: broad PTHR10334 ancestral node
        source_status: UNRESOLVED
        comment: >-
          This node spans numerous divergent CAP-family subfamilies and is too
          broad to justify transfer of the Glipr1l1-specific adaptor role.
    supported_by:
    - reference_id: file:human/R3HDML/R3HDML-deep-research-manual.md
      supporting_text: CAP-domain membership does not establish a shared adaptor activity across this highly functionally diversified family, so the transfer to R3HDML should be removed.
