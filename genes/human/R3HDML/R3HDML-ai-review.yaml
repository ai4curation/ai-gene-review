core_functions:
- description: >-
    Acts as a processed extracellular satellite-cell-derived CAP protein that
    promotes myoblast/satellite-cell proliferation and myogenic differentiation,
    thereby supporting postnatal skeletal-muscle development and regeneration
    after injury. The causal evidence is from the mouse ortholog and is transferred
    to human on the basis of one-to-one orthology and conserved precursor
    architecture.
