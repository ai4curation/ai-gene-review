id: Q6UXB3
gene_symbol: LYPD2
product_type: PROTEIN
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  LY6/PLAUR domain-containing protein 2, member of the Ly6/uPAR superfamily
  characterized by a three-finger LU domain (snake toxin-like fold) stabilized
  by disulfide bonds. Encoded in the chromosome 8q24.3 LY6 cluster (with PSCA,
  LY6K, SLURP1, LYNX1, LY6D, LY6E, LY6H, GPIHBP1). Predicted GPI-anchored
  cell-surface protein based on family architecture; direct biochemical
  confirmation of the GPI anchor for human LYPD2 is lacking. RNA is most
  highly expressed in esophagus (greater than 250 TPM in GTEx), with lower
  expression in skin and vagina. Curated LY6-family summaries note "no known
  or proposed function" for human LYPD2; the most concrete functional
  hypothesis comes from a mouse Ly6/uPAR review listing alpha4-beta2 nicotinic
  acetylcholine receptors (nAChRs) as the interacting factor and "nAChR
  Modulator" as the cellular function (Loughner 2016, Table 3). A 2022 mouse
  co-IP study (Lauriello et al.) reported no interaction between lypd2 and
  homomeric GluR2Q/GluR2R AMPA receptors, narrowing but not refuting the
  receptor-modulator hypothesis. LYPD2 was also identified in all four
  focused CRISPR screens of GPI-anchored proteins as a top-10 enriched host
  factor in coronavirus infection (Ma et al. 2025), and is used as a marker
  gene for a non-classical monocyte subset in integrated autoimmune-disease
  scRNA-seq. Mechanistic function (binding partners, pathway role) remains a
  high-priority experimental gap.
