  - id: PMID:27098205
    title: Organization, evolution and functions of the human and mouse
      Ly6/uPAR family genes.
    findings:
      - statement: >-
          Mouse Ly6/uPAR family Table 3 lists LYPD2 with α4β2 nAChRs as the
          interacting factor and "nAChR Modulator" as the cellular function;
          a human ortholog exists and a GPI anchor is annotated "Yes".
        supporting_text: LYPD2YesUnknownα4β2 nAChRsnAChR ModulatorNoYes
        reference_section_type: RESULTS
      - statement: >-
          LYPD2 is part of the chromosome 8q24 LY6 cluster of Ly6/uPAR family
          genes.
        supporting_text: >-
          Twelve human Ly6 genes are clustered together within a short span of
          about 500 kb on chromosome 8 (8q24)
      - statement: >-
          Family-level mechanism for Ly6/uPAR proteins typically involves
          targeting nicotinic acetylcholine receptors (nAChRs).
        supporting_text: >-
          Commensurate with their varied expression patterns, Ly6/uPAR
          proteins have a wide range of functions in cell proliferation,
          migration, cell-cell interaction, immune cell maturation, macrophage
          activation, and cytokine production. They typically exert their
          influence by targeting nicotinic acetylcholine receptors (nAChRs)
  - id: PMID:37141412
    title: 'Human LY6 gene family: potential tumor-associated antigens and
      biomarkers of prognosis in uterine corpus endometrial carcinoma.'
    findings:
      - statement: >-
          The 8q24.3 LY6 cluster is enumerated and includes LYPD2 alongside
          LY6E, LY6L, LY6D, LY6K, LY6H, SLURP1, LYNX1, GML, and GPIHBP1.
        supporting_text: >-
          Genes located at this locus include LY6E, LY6L, LY6D, LY6K, LY6H,
          SLURP1, LYPD2, LYNX1, GML, and GPIHBP1; these genes are syntenic to
          mouse chromosome 15.
      - statement: >-
          LYPD2 mRNA shows no significant change between normal uterine tissue
          and uterine corpus endometrial carcinoma (UCEC).
        supporting_text: >-
          There is no significant change in mRNA expression for LYPD8,
          LY6G6D, LYPD4, LY6L, LYPD2, LYPD5, LY6G6F, LYPD4, GPIHBP1, and GML.
  - id: PMID:36441793
    title: GluR2Q and GluR2R AMPA Subunits are not Targets of lypd2
      Interaction.
    findings:
      - statement: >-
          Co-IP in HEK-293 cells showed mouse lypd2 does not interact with
          homomeric GluR2R or GluR2Q AMPA receptors, providing negative
          evidence that narrows (but does not refute) the broader receptor-
          modulator hypothesis space for Ly6 proteins.
        supporting_text: >-
          The results of our experiments showed that lypd2 does not interact
          with homomeric GluR2R or GluR2Q AMPA receptors.
      - statement: >-
          Family-level context - Ly6 proteins are typically GPI-anchored to
          the outer leaflet of the plasma membrane.
        supporting_text: >-
          Ly6 proteins are generally found within the extracellular space,
          either as a secreted protein or (in the majority of cases) by being
          physically tethered to the outer leaflet of the plasma membrane by
          a post-translational C-terminal GPI anchor modification
  - id: PMID:40901862
    title: Glycosylphosphatidylinositol biosynthesis functions as a conserved
      host defense pathway against coronaviruses via regulation of LY6E.
    findings:
      - statement: >-
          In focused CRISPR knockout screens of known or predicted
          GPI-anchored proteins, LYPD2 was among the top-10 enriched genes
          in all four coronavirus infection conditions. LY6E (not LYPD2) was
          the lead validated antiviral effector; LYPD2 itself was not
          individually validated in this paper.
        supporting_text: >-
          Among the top 10 enriched genes identified for each infection
          condition, LYPD2 was also identified in all four screens (Fig 6C).
  - id: file:human/LYPD2/LYPD2-deep-research-openai.md
    title: Deep research on LYPD2 function
    findings: []
  - id: file:human/LYPD2/LYPD2-deep-research-falcon.md
    title: Falcon deep research on LYPD2 - synthesis of LY6/uPAR family
      literature, GTEx expression, scRNA-seq marker usage, and CRISPR screen
      evidence.
    findings:
      - statement: >-
          Synthesis concludes LYPD2 is very likely a cell-surface LU-domain
          protein, plausibly GPI-anchored and extracellular-facing by family
          analogy; reproducible signals are as a marker of specific cell
          states (esophagus enrichment; non-classical monocyte subset);
          mechanistic function (binding partners, pathway roles) remains a
          high-priority experimental gap.
        supporting_text: >-
          From a functional-annotation standpoint, the most defensible expert
          synthesis based on current evidence is: 1) LYPD2 is very likely a
          cell-surface LU-domain protein; 2) it is plausibly GPI-anchored and
          extracellular-facing by family analogy; 3) its most reproducible
          "functional" signal in recent data is as a marker of specific cell
          states/tissues (esophagus enrichment; non-classical monocyte
          subset); 4) mechanistic function (binding partners, pathway roles)
          remains a high-priority experimental gap.
