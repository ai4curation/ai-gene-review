      id: GO:0005515
      label: protein binding
    description: >-
      GPI-anchored cell-surface protein with an LY6/PLAUR (LU / three-finger)
      domain. The most concrete (mouse) functional hypothesis is modulation of
      α4β2 nicotinic acetylcholine receptors (Loughner 2016 Table 3); AMPA
      GluR2Q/R interaction was tested and refuted (Lauriello 2022). Direct
      human binding partners remain unconfirmed.
