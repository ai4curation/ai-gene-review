suggested_questions:
  - question: What is the molecular function of LYPD2 and which receptors or
      ligands does it interact with?
    experts:
      - Cell signaling researchers
      - Immunologists
  - question: Does human LYPD2 modulate α4β2 (or other) nicotinic acetylcholine
      receptors, as suggested by the mouse Ly6/uPAR family table?
    experts:
      - Neuroscience / nAChR specialists
  - question: Does LYPD2 act as a coronavirus host restriction or entry factor in
      esophageal epithelium, consistent with its enrichment in focused
      GPI-anchored-protein CRISPR screens?
    experts:
      - Virologists / host-pathogen genomics
suggested_experiments:
  - description: Co-immunoprecipitation and electrophysiology in heterologous
      cells to test whether human LYPD2 modulates α4β2 (and other) nAChRs.
    experiment_type: biochemistry / electrophysiology
    hypothesis: LYPD2 modulates α4β2 nAChR function analogously to mouse Lypd2.
  - description: PI-PLC sensitivity assay and surface labeling in esophageal
      epithelial cells (and non-classical monocytes) to biochemically confirm
      GPI anchoring and outer-leaflet localization of human LYPD2.
    experiment_type: cell biology / biochemistry
    hypothesis: Human LYPD2 is GPI-anchored to the outer leaflet of the plasma
      membrane.
  - description: CRISPR knockout / rescue of LYPD2 in coronavirus infection
      models to test whether the screen-hit phenotype reflects a direct
      antiviral or pro-viral role.
    experiment_type: functional genomics / virology
    hypothesis: LYPD2 contributes to coronavirus infection susceptibility or
      restriction in human cells.
  - description: AP-MS or proximity labeling (e.g. BioID) in esophageal
      epithelial cells to identify LYPD2 binding partners.
    experiment_type: proteomics
    hypothesis: LYPD2 interacts with cell surface receptors or ligands.
