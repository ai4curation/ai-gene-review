core_functions:
- description: >-
    SLC25A46 acts as an outer-mitochondrial-membrane scaffold/adaptor that regulates
    mitochondrial membrane dynamics in a pro-fission (anti-fusion) manner. Although a
    member of the SLC25 mitochondrial carrier family, it lacks the conserved carrier
    pore residues and does not function as a metabolite transporter; instead it
    physically bridges the outer-membrane fusion GTPases (MFN2, OPA1) and the inner
    membrane MICOS complex (MIC60/IMMT, MIC19). Loss of SLC25A46 causes mitochondrial
    hyperfusion and its overexpression causes fragmentation, and this activity is
    essential for normal mitochondrial network morphology.
  molecular_function:
    id: GO:0044877
    label: protein-containing complex binding
  directly_involved_in:
  - id: GO:0000266
    label: mitochondrial fission
  - id: GO:0090149
    label: mitochondrial membrane fission
  locations:
  - id: GO:0005741
    label: mitochondrial outer membrane
  supported_by:
  - reference_id: PMID:26168012
    supporting_text: "SLC25A46 acts in a pro-fission manner"
  - reference_id: PMID:27390132
    supporting_text: "components of the MICOS complex (MIC60, MIC19)"
  - reference_id: PMID:27543974
    supporting_text: "SLC25A46 is a pro-fission mitochondrial outer membrane protein important in the regulation of mitochondrial dynamics"
- description: >-
    Through its interactions with the MICOS complex and, via the ER membrane protein
    complex (EMC), with ER-mitochondria contact sites, SLC25A46 organizes cristae
    architecture and helps distribute mitochondrial phospholipids. It functions
    upstream of MICOS and is required for maintaining normal cristae; its loss
    disrupts MICOS, shortens cristae, alters mitochondrial phospholipid composition,
    and secondarily impairs respiration.
  molecular_function:
    id: GO:0044877
    label: protein-containing complex binding
  directly_involved_in:
  - id: GO:0042407
    label: cristae formation
  locations:
  - id: GO:0005741
    label: mitochondrial outer membrane
  supported_by:
  - reference_id: PMID:27390132
    supporting_text: "SLC25A46 functions upstream of the MICOS complex and is required for the maintenance of mitochondrial cristae architecture"
  - reference_id: PMID:27390132
    supporting_text: "phospholipid composition is altered in subject mitochondria"
proposed_new_terms: []
suggested_questions:
- question: >-
    Does SLC25A46 have any residual transport activity (e.g. as a channel or lipid
    conduit) at the outer membrane, or is it entirely transport-dead and purely a
    structural/adaptor protein?
- question: >-
    Is the pro-fission role exerted directly by scaffolding the fission machinery, or
    indirectly through effects on cristae/lipid homeostasis at ER-mitochondria contacts?
suggested_experiments:
- description: >-
    Reconstitute purified SLC25A46 in proteoliposomes and assay for solute/lipid
    transport to formally confirm loss of carrier activity.
- description: >-
    Structure-guided mutagenesis of the SLC25A46-MICOS and SLC25A46-EMC interfaces to
    separate its cristae/lipid role from its fission role and test each in the
    mitochondrial-network phenotype.
