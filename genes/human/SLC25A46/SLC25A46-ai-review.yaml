- id: PMID:26168012
  title: Mutations in SLC25A46, encoding a UGO1-like protein, cause an optic atrophy
    spectrum disorder.
  findings:
  - statement: >-
      SLC25A46 is a modified/derived SLC25 carrier recruited to the outer
      mitochondrial membrane where it interacts with mitofilin and acts as a
      pro-fission regulator of mitochondrial dynamics; loss of function causes optic
      atrophy and CMT2.
    reference_section_type: RESULTS
    supporting_text: "SLC25A46 acts in a pro-fission manner"
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Full text available (PMC4520737); establishes OMM localization, mitofilin
      interaction, and pro-fission role. Disease gene discovery paper.
- id: PMID:27390132
  title: SLC25A46 is required for mitochondrial lipid homeostasis and cristae maintenance
    and is responsible for Leigh syndrome.
  findings:
  - statement: >-
      SLC25A46 interacts with MFN2, OPA1, the MICOS complex and the EMC, functions
      upstream of MICOS to maintain cristae, and its loss alters phospholipid
      composition and impairs respiration; the carrier signature residues are not
      conserved, indicating it is not a conventional transporter.
    reference_section_type: RESULTS
    supporting_text: "it does not likely have a conventional metabolite carrier function"
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Full text available (PMC5009808); defines the MICOS/EMC/cristae/phospholipid
      molecular function and confirms loss of carrier residues.
- id: PMID:27543974
  title: Loss of function of SLC25A46 causes lethal congenital pontocerebellar hypoplasia.
  findings:
  - statement: >-
      Confirms SLC25A46 as a pro-fission outer-membrane protein; biallelic
      destabilizing mutations cause lethal congenital pontocerebellar hypoplasia,
      with severity inversely correlated with mutant-protein stability.
    reference_section_type: DISCUSSION
    supporting_text: "SLC25A46 is a pro-fission mitochondrial outer membrane protein important in the regulation of mitochondrial dynamics"
  reference_review:
