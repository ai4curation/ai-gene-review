id: Q96AG3
gene_symbol: SLC25A46
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  SLC25A46 is a divergent, "modified" member of the SLC25 mitochondrial carrier
  family that has been recruited to the outer mitochondrial membrane and has lost
  the classical solute/metabolite-carrier (transport) function of the family; the
  charged carrier-signature residues that form the transport pore are not conserved.
  It is the mammalian counterpart of yeast Ugo1 and is a multi-pass integral protein
  of the mitochondrial outer membrane. Rather than transporting metabolites, it
  regulates mitochondrial membrane dynamics, acting in a pro-fission / anti-fusion
  manner: its loss causes mitochondrial hyperfusion and its overexpression causes
  fragmentation. It functions as a scaffold/adaptor that physically links the
  outer-membrane fusion machinery (MFN2, OPA1) to the inner-membrane MICOS
  (mitochondrial contact site and cristae organizing system) complex, and interacts
  with the ER membrane protein complex (EMC), thereby helping to organize cristae
  architecture and to distribute mitochondrial phospholipids via ER-mitochondria
  contact sites. Downstream consequences of its loss include disrupted cristae,
  impaired respiration with a specific complex IV assembly defect, and altered
  phospholipid composition. In humans, biallelic loss-of-function variants cause a
  neurodegenerative spectrum spanning Charcot-Marie-Tooth type 2 with optic atrophy,
  Leigh syndrome, and lethal congenital pontocerebellar hypoplasia.
