id: Q5QJU3
gene_symbol: ACER2
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  ACER2 (alkaline ceramidase 2) is a Golgi-membrane, multipass (7-transmembrane) enzyme that
  hydrolyzes ceramide (N-acylsphingosine) into sphingosine and a free fatty acid at alkaline
  pH (EC 3.5.1.23), and likewise hydrolyzes dihydroceramide to dihydrosphingosine. It is one
  of three human alkaline ceramidases (ACER1-3) and has broad substrate specificity with a
  preference for unsaturated long-chain ceramides (e.g. C18:1-, C20:1- and C24:1-ceramide).
  Catalysis is zinc-dependent and stimulated by luminal Ca2+. The sphingosine it generates is
  the precursor that sphingosine kinases phosphorylate to sphingosine-1-phosphate (S1P), so
  ACER2 is a key control point in the ceramide/sphingosine/S1P balance that governs cell
  proliferation and survival versus growth arrest, apoptosis and autophagy. ACER2 is
  transcriptionally induced by p53 in response to DNA damage and, via elevated sphingosine and
  reactive oxygen species, contributes to programmed cell death; through the sphingosine it
  produces it also influences Golgi function and the glycosylation-dependent maturation of
  proteins such as the integrin beta1 subunit. ACER2 mRNA is broadly but low expressed, with
  strong enrichment in placenta.
