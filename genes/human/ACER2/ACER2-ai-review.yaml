suggested_questions:
- question: >-
    Is ACER2's regulation of protein glycosylation (integrin beta1, Lamp1) a direct Golgi
    lipid-microenvironment effect of local sphingosine/ceramide, or an indirect consequence of
    altered global sphingolipid signaling?
suggested_experiments:
- description: >-
    Structure determination (cryo-EM) of the 7-TM ACER2 with a bound ceramide analog and the
    two catalytic Zn2+ ions to define the catalytic mechanism and the luminal Ca2+-stimulation
    site.
- description: >-
    Tissue-/cell-type-specific ACER2 knockout with lipidomics to test whether the placenta-
    enriched enzyme is a physiological contributor to circulating sphingosine/S1P in vivo.
