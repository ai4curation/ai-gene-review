  label: Homo sapiens
description: SERINC5 is a multipass plasma-membrane phospholipid scramblase and intrinsic
  retroviral restriction factor. It mediates non-ATP-dependent bidirectional movement
  of phosphatidylserine, phosphatidylethanolamine, and phosphatidylcholine between membrane
  leaflets. SERINC5 is incorporated from the producer-cell surface into budding retroviral
  envelopes, where it disrupts phosphatidylserine asymmetry and inhibits subsequent particle
  entry. Phosphatidylserine exposure itself is not sufficient to explain restriction, whose
  proximal mechanism remains unresolved. HIV-1 Nef counteracts SERINC5 by redirecting it
  from the cell surface to an endosomal/perinuclear compartment and excluding it from virions.
