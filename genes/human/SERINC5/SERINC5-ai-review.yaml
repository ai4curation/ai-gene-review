knowledge_gaps:
- gap_statement: The molecular mechanism by which virion-incorporated SERINC5 restricts entry remains
    unresolved.
  boundary: SERINC5 scrambling, phosphatidylserine exposure, and restriction are established, but direct
    lipid manipulation shows that external phosphatidylserine level does not determine restriction potency.
  gap_kind:
  - BIOLOGY
  dark_aspect: MF_DARK
  status: OPEN
  significance: Resolving the proximal mechanism is necessary to connect SERINC5's membrane activity
    to its potent envelope-dependent antiviral phenotype.
  resolution: Use separation-of-function mutants and controlled virion lipid manipulation to test effects
    on multiple lipid species, nanodomain organization, Env conformation, fusion intermediates, and infectivity
    while matching surface abundance and virion incorporation.
  provenance:
  - reference_id: file:human/SERINC5/SERINC5-notes.md
    supporting_text: SERINC5-dependent PS scrambling is experimentally established, but PS exposure
      alone is not sufficient to explain HIV-1 restriction
- gap_statement: The physiological regulation and non-viral cellular consequences of SERINC5 scrambling
    are unknown.
  boundary: Purified-protein and virion assays establish lipid flipping, but the evidence set does not
    identify endogenous activating conditions or leaflet-lipid outputs in uninfected human cells.
  gap_kind:
  - BIOLOGY
  dark_aspect: BP_DARK
  status: OPEN
  significance: A constitutively active plasma-membrane scramblase would be expected to perturb lipid
    asymmetry, so its normal regulation and cellular purpose are central to understanding SERINC5 biology.
  resolution: Quantify endogenous SERINC5-dependent leaflet lipid distributions across cell states with
    knockout/rescue, matched surface-expression controls, and catalysis-defective mutants.
  provenance:
  - reference_id: file:human/SERINC5/SERINC5-notes.md
    supporting_text: Determine the physiological regulation and non-viral consequences of SERINC5 scrambling
- gap_statement: Functional differences among the four human SERINC5 isoforms are not established.
  boundary: Reviewed UniProt defines Q86VE9-1 through Q86VE9-4, but the cited functional studies do not
    resolve isoform-specific expression, topology, scrambling, trafficking, Nef sensitivity, or restriction.
  gap_kind:
  - BIOLOGY
  dark_aspect: MF_DARK
  status: OPEN
  significance: Alternative sequence segments could alter membrane topology, trafficking, virion incorporation,
    and antiviral potency.
  resolution: Compare all four isoforms under matched expression after endogenous SERINC5 deletion, using
    topology, surface-trafficking, lipid-flipping, Nef-downregulation, virion-incorporation, and infectivity
    assays.
  provenance:
  - reference_id: file:human/SERINC5/SERINC5-notes.md
    supporting_text: Compare all four UniProt isoforms
suggested_questions:
- question: Which membrane or Env property, rather than phosphatidylserine exposure itself, is the proximal
    determinant of SERINC5-mediated retroviral restriction?
- question: How is SERINC5 scramblase activity regulated in uninfected human cells without constitutively
    collapsing plasma-membrane lipid asymmetry?
- question: Do the four human SERINC5 isoforms differ in localization, lipid specificity, Nef sensitivity,
    virion incorporation, or restriction potency?
suggested_experiments:
- hypothesis: SERINC5 restricts retroviral entry through redistribution of lipids or membrane nanodomains
    other than external phosphatidylserine.
  description: Combine leaflet-resolved virion lipidomics, super-resolution membrane-domain imaging,
    Env conformational assays, and staged fusion measurements across SERINC5-sensitive and -resistant
    envelopes, with matched virion incorporation and lipid-exchange controls.
  experiment_type: Mechanism-resolved virion membrane and entry analysis
- hypothesis: SERINC5 scrambling is regulated by membrane context or a host cofactor absent from purified
    proteoliposomes.
  description: Compare endogenous SERINC5-dependent leaflet lipid distributions across signaling and
    differentiation states, then reconstitute purified SERINC5 with candidate lipids and cofactors while
    controlling orientation and protein copy number.
  experiment_type: Regulated scramblase reconstitution and cellular lipid asymmetry profiling
- hypothesis: SERINC5 contains separable structural determinants for lipid scrambling, Nef-mediated trafficking,
    and antiviral restriction.
  description: Introduce structure-guided mutations, require normal folding and plasma-membrane abundance,
    and assay purified lipid flipping, Nef-dependent downregulation, virion incorporation, Env remodeling,
    and infectivity to identify separation-of-function alleles.
  experiment_type: Structure-guided separation-of-function mutagenesis
- hypothesis: Alternative SERINC5 isoforms have distinct trafficking and antiviral activities.
  description: Perform isoform-specific rescue in SERINC5-null human T cells and compare topology, glycosylation,
    surface abundance, lipid scrambling, Nef sensitivity, virion incorporation, and HIV-1 restriction.
  experiment_type: Isoform-resolved trafficking and antiviral complementation
