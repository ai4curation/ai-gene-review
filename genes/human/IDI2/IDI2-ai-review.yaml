  evidence_type: IDA
  original_reference_id: PMID:17202134
  qualifier: enables
  review:
    summary: >-
      Direct experimental (IDA) demonstration of the core molecular function:
      partially purified human IDI2 catalyzed isomerization of [14C]IPP to [14C]DMAPP,
      with a maximal relative specific activity of 1.2 x 10^-1 umol/min/mg at pH 8.0 and
      Km(IPP)=22.8 uM, and human IDI2 complemented an idi1-deficient yeast strain. This
      is the definitive assay for the gene's core catalytic activity. Accepted as core.
