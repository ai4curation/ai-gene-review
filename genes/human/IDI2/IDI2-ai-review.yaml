id: Q9BXS1
gene_symbol: IDI2
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  IDI2 (isopentenyl-diphosphate delta-isomerase 2) is a small (227 aa) metalloenzyme
  of the type-1 IPP isomerase family (Nudix hydrolase fold) and the paralog of IDI1.
  It catalyzes the reversible 1,3-allylic rearrangement that interconverts the two
  five-carbon isoprene units of the mevalonate/isoprenoid pathway: isopentenyl
  diphosphate (IPP) and dimethylallyl diphosphate (DMAPP) (EC 5.3.3.2). By generating
  the allylic isomer DMAPP, it supplies the primer that farnesyl diphosphate synthase
  and other prenyltransferases use to initiate prenyl-chain synthesis, feeding the
  sterol (cholesterol), dolichol, ubiquinone, and protein-prenylation branches of
  isoprenoid metabolism. Catalysis requires a divalent metal cofactor (Mg2+), and the
  enzyme carries a C-terminal PTS1-type microbody-targeting signal that directs it to
  the peroxisome. In contrast to the ubiquitously expressed IDI1, human IDI2
  expression is restricted essentially to skeletal muscle, and it is regulated
  independently, possibly via PPARalpha.
