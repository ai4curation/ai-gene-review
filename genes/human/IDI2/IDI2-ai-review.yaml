core_functions:
- description: >-
    Catalyzes the reversible interconversion of isopentenyl diphosphate (IPP) and
    dimethylallyl diphosphate (DMAPP), producing the allylic DMAPP primer required to
    initiate isoprenoid/prenyl-chain biosynthesis. Requires a divalent metal cofactor
    (Mg2+). In humans this activity is provided in a skeletal-muscle-restricted manner,
    complementing the ubiquitous paralog IDI1.
  supported_by:
  - reference_id: PMID:17202134
    supporting_text: "IDI2 has the ability to catalyze the \nisomerization of [(14)C]IPP to [(14)C]DMAPP."
  - reference_id: file:human/IDI2/IDI2-uniprot.txt
    supporting_text: "Reaction=isopentenyl diphosphate = dimethylallyl diphosphate;"
