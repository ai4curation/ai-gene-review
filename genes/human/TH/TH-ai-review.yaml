id: P07101
gene_symbol: TH
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  TH encodes tyrosine 3-monooxygenase (tyrosine hydroxylase; EC 1.14.16.2), the
  rate-limiting enzyme of catecholamine biosynthesis. It catalyzes the
  hydroxylation of L-tyrosine to L-DOPA (L-3,4-dihydroxyphenylalanine), the first
  and committed step in the synthesis of the catecholamines dopamine,
  noradrenaline (norepinephrine) and adrenaline (epinephrine). The reaction uses
  the cofactor (6R)-tetrahydrobiopterin (BH4), molecular oxygen, and a non-heme
  ferrous iron [Fe(II)] center; the enzyme is a member of the biopterin-dependent
  aromatic amino acid hydroxylase family and can also hydroxylate phenylalanine
  and tryptophan with lower specificity. TH is a homotetramer with an N-terminal
  regulatory domain and a C-terminal catalytic domain. It is a predominantly
  cytosolic enzyme of catecholaminergic neurons (substantia nigra, ventral
  tegmental area, locus coeruleus) and adrenal chromaffin cells, and also
  localizes to axons and secretory/synaptic vesicles. Its activity is tightly
  controlled by end-product feedback inhibition (catecholamines competing with
  BH4) and by phosphorylation of N-terminal serine residues (Ser19, Ser40, Ser62,
  Ser71) by kinases such as PKA and CaMKII, which relieves feedback inhibition and
  regulates enzyme stability and 14-3-3 (YWHAG) binding. Loss-of-function variants
  cause autosomal-recessive DOPA-responsive dystonia / infantile
  parkinsonism-dystonia (Segawa syndrome, tyrosine hydroxylase deficiency).
