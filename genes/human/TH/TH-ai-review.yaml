core_functions:
- description: >-
    Tyrosine 3-monooxygenase (tyrosine hydroxylase) activity: hydroxylation of
    L-tyrosine to L-DOPA using (6R)-tetrahydrobiopterin, molecular oxygen and a
    catalytic non-heme Fe(II) center. This is the first, rate-limiting step of
    catecholamine biosynthesis.
  supported_by:
  - reference_id: file:human/TH/TH-uniprot.txt
    supporting_text: >-
      Catalyzes the conversion of L-tyrosine to L-
  - reference_id: PMID:1680128
    supporting_text: >-
      the specific activities of TH-1 and TH-2 are 1300 and 620 nmol of
      dihydroxyphenylalanine/min/mg
  molecular_function:
    id: GO:0004511
    label: tyrosine 3-monooxygenase activity
  directly_involved_in:
  - id: GO:0006585
    label: dopamine biosynthetic process from tyrosine
  - id: GO:0042416
    label: dopamine biosynthetic process
  locations:
  - id: GO:0005737
    label: cytoplasm
- description: >-
    Iron ion binding: TH binds a catalytic ferrous iron [Fe(II)] ion in its active
    site (coordinated by two histidines and a glutamate), which is essential for
    the pterin-dependent monooxygenase reaction.
  supported_by:
  - reference_id: file:human/TH/TH-uniprot.txt
    supporting_text: 'Name=Fe(2+); Xref=ChEBI:CHEBI:29033'
  molecular_function:
    id: GO:0005506
    label: iron ion binding
  locations:
  - id: GO:0005737
    label: cytoplasm
