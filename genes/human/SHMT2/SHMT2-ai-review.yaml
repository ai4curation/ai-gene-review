id: P34897
gene_symbol: SHMT2
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  SHMT2 is the mitochondrial isoform of serine hydroxymethyltransferase (EC 2.1.2.1),
  a pyridoxal-5'-phosphate (PLP)-dependent enzyme that catalyzes the reversible transfer
  of a one-carbon unit from L-serine to tetrahydrofolate, producing glycine and
  5,10-methylenetetrahydrofolate. Acting mainly in the mitochondrial matrix, it is the
  principal entry point of mitochondrial one-carbon (folate) metabolism: the one-carbon
  units it generates are exported to the cytosol (largely as formate) to support de novo
  purine and thymidylate synthesis and methylation, while the glycine produced feeds heme
  and glutathione biosynthesis. Its 5,10-methylenetetrahydrofolate output is also required
  within mitochondria for de novo mitochondrial thymidylate synthesis (preventing uracil
  misincorporation into mtDNA) and for taurinomethyluridine modification of mitochondrial
  tRNA wobble bases, and is therefore essential for mitochondrial translation and oxidative
  phosphorylation. The enzyme is a PLP-dependent homotetramer (homodimer without PLP).
  Beyond metabolism, SHMT2 has a catalysis-independent moonlighting role as a component of
  the cytoplasmic BRISC deubiquitinase complex, where it targets the complex to
  K63-ubiquitinated IFNAR1 and thereby regulates type I interferon signaling. Biallelic
  loss-of-function variants cause an autosomal-recessive neurodevelopmental disorder with
  cardiomyopathy, spasticity, and brain abnormalities.
