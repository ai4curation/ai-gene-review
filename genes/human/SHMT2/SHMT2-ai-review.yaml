core_functions:
  - description: >-
      Mitochondrial serine hydroxymethyltransferase, a PLP-dependent enzyme that catalyzes the
      reversible transfer of a one-carbon unit from L-serine to tetrahydrofolate, producing glycine
      and 5,10-methylenetetrahydrofolate. This is the entry point of mitochondrial one-carbon (folate)
      metabolism, generating one-carbon units (exported as formate) for cytosolic nucleotide synthesis
      and glycine for downstream biosynthesis.
    molecular_function:
      id: GO:0004372
      label: glycine hydroxymethyltransferase activity
    directly_involved_in:
      - id: GO:0006730
        label: one-carbon metabolic process
    locations:
      - id: GO:0005759
        label: mitochondrial matrix
      - id: GO:0005739
        label: mitochondrion
    supported_by:
      - reference_id: file:human/SHMT2/SHMT2-uniprot.txt
        supporting_text: "Catalyzes the cleavage of serine to glycine accompanied with"
      - reference_id: file:human/SHMT2/SHMT2-uniprot.txt
        supporting_text: "Serine provides the major source of"
      - reference_id: PMID:29364879
        supporting_text: >-
          SHMT2, presumably by generating mitochondrial 5,10-methylenetetrahydrofolate
  - description: >-
      Binds the cofactor pyridoxal 5'-phosphate (PLP), which is required for catalysis and mediates
      the conformational change driving assembly of the active homotetramer.
    molecular_function:
      id: GO:0030170
      label: pyridoxal phosphate binding
    locations:
      - id: GO:0005759
        label: mitochondrial matrix
    supported_by:
      - reference_id: file:human/SHMT2/SHMT2-uniprot.txt
        supporting_text: "Name=pyridoxal 5'-phosphate"
