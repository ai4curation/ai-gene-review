id: Q8WVT3
gene_symbol: TRAPPC12
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: TRAPPC12/TRAMM/TTC-15 is a moonlighting metazoan TRAPP/TRAPPIII-associated 
  protein. In interphase it participates in TRAPP-dependent early secretory traffic 
  between ER, ERGIC, and Golgi. During mitosis it leaves the TRAPP context and supports 
  chromosome congression, kinetochore stability, and CENP-E recruitment. For the 
  proteostasis-network TRAPP bucket, its shared gene-level semantics are TRAPP/TRAPPIII 
  complex membership and TRAPP/RAB1 trafficking, not a direct TRAPPC12-specific 
  autophagy annotation.
