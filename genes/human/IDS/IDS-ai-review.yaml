core_functions:
- description: >-
    Lysosomal iduronate-2-sulfatase: hydrolytically removes the 2-O-sulfate group from
    terminal, non-reducing-end L-iduronate-2-sulfate residues of heparan sulfate and
    dermatan sulfate, a required step in the stepwise lysosomal catabolism of these
    glycosaminoglycans. Catalysis depends on the active-site Calpha-formylglycine (from
    Cys84, generated by SUMF1/FGE) and a bound Ca2+ ion.
  molecular_function:
