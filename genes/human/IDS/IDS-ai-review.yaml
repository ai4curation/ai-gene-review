id: P22304
gene_symbol: IDS
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  IDS (iduronate 2-sulfatase) is a lysosomal sulfatase (EC 3.1.6.13) that catalyses
  a step in the stepwise exolytic degradation of the glycosaminoglycans heparan sulfate
  and dermatan sulfate. It hydrolytically removes the 2-O-sulfate group from terminal,
  non-reducing-end L-iduronate-2-sulfate (2-O-sulfo-alpha-L-iduronic acid) residues,
  exposing iduronate for the next enzyme in the pathway (alpha-L-iduronidase, IDUA).
  Like all eukaryotic sulfatases, its catalytic activity depends on a Calpha-formylglycine
  (3-oxoalanine, FGly) residue generated post-translationally at Cys84 in the endoplasmic
  reticulum by the formylglycine-generating enzyme (FGE/SUMF1), and it binds one active-site
  Ca2+ ion per subunit. The enzyme is synthesized as an ER precursor, N-glycosylated and
  proteolytically processed to a mature form, and traffics to the lysosome/lysosomal lumen
  where it acts. Deficiency of IDS causes mucopolysaccharidosis type II (Hunter syndrome),
  an X-linked lysosomal storage disease with tissue accumulation of heparan and dermatan
  sulfate.
