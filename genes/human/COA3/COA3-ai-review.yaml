gene_symbol: COA3
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: COA3 (also known as CCDC56 and MITRAC12) is a small (106 aa) single-pass
  mitochondrial inner-membrane protein that acts as a non-catalytic assembly factor
  for respiratory chain complex IV (cytochrome c oxidase). Together with COX14 it is
  a core component of the MITRAC (mitochondrial translation regulation assembly intermediate
  of cytochrome c oxidase) complex, which couples translation of the mitochondrially
  encoded catalytic subunit MT-CO1 (COX1) to complex IV assembly. COA3 associates with
  newly synthesised MT-CO1 within an early COX1-COA3-COX14 assembly intermediate,
  stabilises it, and coordinates the incorporation of nuclear-encoded subunits. It
  has no catalytic activity of its own. Biallelic loss-of-function variants cause
  mitochondrial complex IV deficiency (nuclear type 14, MC4DN14), presenting with
  neuropathy, encephalopathy, exercise intolerance, obesity, and short stature.
