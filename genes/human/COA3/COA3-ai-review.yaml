    supporting_text: Mitochondrion inner membrane
proposed_new_terms: []
suggested_questions:
- question: Is COA3's positive effect on MT-CO1 translation a direct regulatory activity
    or a secondary consequence of stabilising nascent MT-CO1 within the MITRAC intermediate?
- question: What is the precise structural role of the single transmembrane helix and
    C-terminal coiled coil of COA3 in organising the COX1-COA3-COX14 assembly intermediate?
suggested_experiments:
- description: Structural determination (cryo-EM) of the human COX1-COA3-COX14 (MITRAC)
    assembly intermediate to define COA3's contacts with MT-CO1 and COX14.
- description: Pulse-chase labelling of mitochondrial translation products in COA3-null
    versus rescued cells to distinguish effects on MT-CO1 synthesis rate from effects
    on nascent MT-CO1 stability.
