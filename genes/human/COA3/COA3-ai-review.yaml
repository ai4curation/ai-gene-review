core_functions:
- description: Non-catalytic complex IV (cytochrome c oxidase) assembly factor that,
    as a core component of the MITRAC complex with COX14, associates with and stabilises
    newly synthesised MT-CO1 in an early COX1-COA3-COX14 assembly intermediate and
    coordinates its progression into complex IV assembly. As a MITRAC component it
    also couples MT-CO1 translation to assembly (positive regulation of mitochondrial
    translation). No molecular function is asserted because COA3 has no catalytic
    activity and only binding/chaperone-type molecular functions.
