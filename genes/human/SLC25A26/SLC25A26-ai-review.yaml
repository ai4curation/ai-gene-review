gene_symbol: SLC25A26
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: SLC25A26 encodes SAMC, the mitochondrial S-adenosyl-L-methionine (SAM/AdoMet) carrier of
  the SLC25 mitochondrial carrier family. It is a multi-pass protein of the inner mitochondrial membrane
  that imports cytosolic SAM into the mitochondrial matrix in exchange for matrix S-adenosylhomocysteine
  (SAH/AdoHcy), the by-product of methylation reactions. It is the only known route by which SAM enters
  mitochondria, supplying the methyl donor for matrix S-adenosylmethionine-dependent methyltransferases
  that modify mitochondrial DNA and RNA and proteins, and that participate in cofactor biosynthesis including
  lipoic acid and coenzyme Q10. The protein has the characteristic tripartite mitochondrial carrier fold
  with three Solcar repeats and six transmembrane helices, and functions biochemically as an antiporter
  (countertransporter). In humans, biallelic loss-of-function variants cause combined oxidative phosphorylation
  deficiency 28 (COXPD28), an autosomal recessive mitochondrial disorder featuring lactic acidosis, respiratory-chain
  deficiencies, and variable multisystem involvement.
