    summary: Inter-ontology logical-inference (GO_REF:0000108, with/from GO:0180003) that SAM/SAH transport
      implies L-alpha-amino acid transport. SAM and SAH derive from methionine/homocysteine and carry
      an amino-acid moiety, but SAMC does not transport free L-amino acids. This is a clearly-wrong electronic
      inference.
    action: REMOVE
