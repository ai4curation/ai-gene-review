  review:
    summary: Inter-ontology logical-inference (GO_REF:0000108, with/from GO:0180003) that SAM/SAH transport
      implies purine nucleoside transport. This is an artifact of the substrate structure. SAM and SAH
      contain an adenosyl (purine nucleoside) moiety, but SAMC does not transport free purine nucleosides;
      its substrates are SAM and SAH. This is a clearly-wrong electronic inference.
    action: REMOVE
