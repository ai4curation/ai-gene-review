- id: PMID:18056703
  title: Neurotrophic activity of neudesin, a novel extracellular heme-binding protein,
    is dependent on the binding of heme to its cytochrome b5-like heme/steroid-binding
    domain.
  findings:
  - statement: Neudesin is the first extracellular heme-binding protein with signal-transducing
      activity; heme binding to its cytochrome b5-like heme/steroid-binding domain is required
      for neurotrophic activity.
    supporting_text: >-
      Neudesin is a secreted protein with neurotrophic activity in neurons and
      undifferentiated neural cells. We report here that neudesin is an extracellular
      heme-binding protein and that its neurotrophic activity is dependent on the
      binding of heme to its cytochrome b(5)-like heme/steroid-binding domain.
  - statement: Activity is enhanced specifically by Fe(III)-protoporphyrin IX.
    supporting_text: >-
      The neurotrophic activity of neudesin was enhanced by the binding of Fe(III)-protoporphyrin IX,
      but neither Fe(II)-protoporphyrin IX nor protoporphyrin IX alone.
- id: PMID:23805070
  title: Neurotrophic effects of neudesin in the central nervous system.
  findings:
  - statement: Neudesin is a CNS-enriched neurotrophic factor that signals via MAPK and PI3K.
    supporting_text: >-
      Neudesin (neuron-derived neurotrophic factor; NENF) was identified as a
      neurotrophic factor that is involved in neuronal differentiation and survival.
      It is abundantly expressed in the central nervous system, and its neurotrophic
      activity is exerted via the mitogen-activated protein kinase (MAPK) and
      phosphatidylinositol 3-kinase (PI3K) pathways.
  - statement: Intracerebroventricular neudesin decreases food intake via hypothalamic
      melanocortin signaling.
    supporting_text: >-
      recombinant neudesin that was administered via an interacerebroventricular cannula
      decreased food intake and body weight through activation of melanocortin signaling,
      by increasing the hypothalamic Pomc and Mc4r mRNA expression.
  - statement: ERK1/2 phosphorylation by neudesin is inhibited by pertussis toxin, implicating
      a Gi/Go-coupled receptor.
    supporting_text: >-
      pertussis toxin (PTX), a Gi/Go protein inhibitor, significantly inhibits the
      phosphorylation of extracellular signal-regulated kinase (ERK)1/2 by neudesin
- id: PMID:25955136
  title: Deletion of the Neurotrophic Factor neudesin Prevents Diet-induced Obesity by
    Increased Sympathetic Activity.
  findings:
  - statement: neudesin KO mice are resistant to high-fat diet-induced obesity with increased
      energy expenditure, sympathetic activity, BAT thermogenesis, and WAT lipolysis.
    supporting_text: >-
      We found that neudesin knockout (KO) mice were resistant to high-fat diet-induced
      obesity and obesity-related metabolic dysfunctions. neudesin KO mice exhibited
      increased energy expenditure due to increased sympathetic activity, which resulted
      in increased heat production and fatty acid oxidation in brown adipose tissue and
      enhanced lipolysis in white adipose tissue.
- id: PMID:26042224
  title: Neudesin as a unique secreted protein with multi-functional roles in neural
    functions, energy metabolism, and tumorigenesis.
  findings:
  - statement: Human neudesin is a 172-aa secreted protein with a conserved cytochrome b5-like
      heme/steroid-binding domain; Tyr-82 and Tyr-88 are essential for heme binding.
    supporting_text: >-
      Human Neudesin is a secreted protein of 172 amino acids with a conserved cytochrome
      5-like heme/steroid-binding domain of ~100 amino acids
  - statement: Neudesin is neurotrophic on neurons (but not astrocytes), consistent with
      growth-factor activity acting on receptive cells.
    supporting_text: >-
      Neudesin exhibits significant neurotrophic activity in primary cultured neurons,
