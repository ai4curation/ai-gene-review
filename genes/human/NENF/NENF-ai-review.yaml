core_functions:
- description: >-
    Neudesin (neuron-derived neurotrophic factor) is a secreted growth factor that promotes
    neuronal survival and differentiation. It acts as a ligand activating GPCR-mediated
    MAPK/ERK and PI3K/AKT signaling pathways. Neurotrophic activity requires heme binding
    by the cytochrome b5-like heme/steroid-binding domain.
  molecular_function:
    id: GO:0008083
    label: growth factor activity
  locations:
  - id: GO:0005576
    label: extracellular region
  directly_involved_in:
  - id: GO:0032099
    label: negative regulation of appetite
  - id: GO:0043410
    label: positive regulation of MAPK cascade
  supported_by:
  - reference_id: PMID:31536960
    supporting_text: >-
      Model of NENF role with DJ-1 and PINK1 in neurotrophic activity and neuronal survival/death
  - reference_id: PMID:18056703
    supporting_text: >-
      neudesin is an extracellular heme-binding protein and that its neurotrophic activity
      is dependent on the binding of heme to its cytochrome b(5)-like heme/steroid-binding
      domain
  - reference_id: PMID:23805070
    supporting_text: >-
      its neurotrophic activity is exerted via the mitogen-activated protein kinase (MAPK)
      and phosphatidylinositol 3-kinase (PI3K) pathways
  - reference_id: file:human/NENF/NENF-deep-research-perplexity.md
    supporting_text: >-
      Neudesin exhibits robust neurotrophic activity in primary cultured mature neurons
      derived from embryonic mouse cerebral cortex, where recombinant neudesin significantly
      enhances neuronal survival by decreasing apoptotic cell death
  - reference_id: file:human/NENF/NENF-deep-research-falcon.md
    supporting_text: >-
      Neudesin (NENF; UniProt Q9UMX5) is best annotated as a **secreted/extracellular
      MAPR-family heme-binding signaling protein** whose activity depends on **heme binding**
      to a **cytochrome b5-like heme/steroid-binding domain** and which activates
      **MAPK/ERK** and **PI3K/AKT** signaling
- description: >-
    Neudesin acts as a negative regulator of systemic energy expenditure by suppressing
    sympathetic activity. Loss of neudesin in mice results in increased sympathetic tone,
    increased BAT thermogenesis and fatty-acid oxidation, and increased WAT lipolysis,
    rendering KO animals resistant to high-fat-diet-induced obesity.
  molecular_function:
    id: GO:0008083
    label: growth factor activity
  locations:
  - id: GO:0005576
    label: extracellular region
  directly_involved_in:
  - id: GO:0032099
    label: negative regulation of appetite
  supported_by:
  - reference_id: PMID:25955136
    supporting_text: >-
      neudesin KO mice exhibited increased energy expenditure due to increased sympathetic
      activity, which resulted in increased heat production and fatty acid oxidation in
      brown adipose tissue and enhanced lipolysis in white adipose tissue
  - reference_id: file:human/NENF/NENF-deep-research-falcon.md
    supporting_text: >-
      Neudesin knockout mice are reported to be resistant to **high-fat diet-induced obesity**,
      with increased **sympathetic activity**, increased **energy expenditure**, increased
      **thermogenesis/fatty-acid oxidation** in brown adipose tissue, and increased **lipolysis**
      in white adipose tissue
