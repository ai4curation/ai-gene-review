id: Q9UMX5
gene_symbol: NENF
product_type: PROTEIN
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  Neudesin (NENF) is a 172-aa secreted neurotrophic factor belonging to the cytochrome
  b5/MAPR (membrane-associated progesterone receptor) protein family. The protein contains
  a cytochrome b5-like heme/steroid-binding domain whose two conserved tyrosines (Tyr-82,
  Tyr-88) coordinate Fe(III)-protoporphyrin IX (hemin); heme binding is required for
  neurotrophic activity. Neudesin is secreted from neurons and promotes neuronal survival
  and differentiation through activation of G-protein-coupled receptors (pertussis-toxin
  sensitive in primary neurons, indicating a Gi/Go-coupled receptor; no definitive receptor
  has been identified), triggering MAPK/ERK and PI3K/AKT signaling pathways. Beyond neural
  functions, neudesin acts as an anorexigenic factor that suppresses appetite through
  hypothalamic melanocortin signaling (increased Pomc and Mc4r), and is a negative regulator
  of systemic energy expenditure: KO mice show elevated sympathetic activity, BAT thermogenesis,
  and WAT lipolysis and are resistant to high-fat-diet-induced obesity. The protein localizes
  to the endoplasmic reticulum, mitochondria (via interaction with PINK1 and PARK7/DJ-1),
  and is secreted to the extracellular space. NENF is overexpressed/amplified in multiple
  cancers including triple-negative breast cancer, where it promotes EMT-linked invasion
  and metastasis.
