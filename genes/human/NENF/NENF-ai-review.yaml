- term:
    id: GO:0008083
    label: growth factor activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000107
  review:
    summary: >-
      IEA annotation from Ensembl Compara transfer. Neudesin is a bona fide neurotrophic
      factor that promotes neuronal survival, proliferation, and differentiation [deep research].
    action: ACCEPT
    reason: >-
      Growth factor activity is the core molecular function of neudesin. The protein was
      originally identified as a neuron-derived neurotrophic factor that promotes neuronal
      survival in primary cultures and undifferentiated neural cell lines. This is the
      defining functional property of neudesin.
    supported_by:
    - reference_id: file:human/NENF/NENF-deep-research-perplexity.md
      supporting_text: >-
        Neudesin exhibits robust neurotrophic activity in primary cultured mature neurons
        derived from embryonic mouse cerebral cortex, where recombinant neudesin significantly
        enhances neuronal survival by decreasing apoptotic cell death in a concentration-dependent
        manner
    - reference_id: PMID:31536960
      supporting_text: >-
        Model of NENF role with DJ-1 and PINK1 in neurotrophic activity and neuronal survival/death
    - reference_id: PMID:23805070
      supporting_text: >-
        Neudesin (neuron-derived neurotrophic factor; NENF) was identified as a
        neurotrophic factor that is involved in neuronal differentiation and survival.
        It is abundantly expressed in the central nervous system, and its neurotrophic
        activity is exerted via the mitogen-activated protein kinase (MAPK) and
        phosphatidylinositol 3-kinase (PI3K) pathways.
    - reference_id: PMID:26042224
      supporting_text: >-
        Neudesin exhibits significant neurotrophic activity in primary cultured neurons,
        but not mitogenic activity in primary cultured astrocytes, indicating that it is
        a neurotrophic factor.
    - reference_id: file:human/NENF/NENF-deep-research-falcon.md
      supporting_text: >-
