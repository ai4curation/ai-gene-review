    label: endoplasmic reticulum
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      IBA annotation for ER localization is supported by phylogenetic analysis and consistent
      with experimental evidence. Neudesin is synthesized in the ER as a secreted protein
      with a signal peptide [PMID:31536960]. The protein is localized to the ER by interactions
      with PINK1 and PARK7/DJ-1 [deep research].
    action: ACCEPT
    reason: >-
      ER localization is well-established for neudesin as a secreted protein that undergoes
      processing in the secretory pathway. IDA evidence from PMID:31536960 confirms this
      localization. The IBA annotation is consistent with the established biology.
