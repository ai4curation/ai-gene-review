- id: PMID:15308636
  title: Proteomics of endoplasmic reticulum-Golgi intermediate compartment (ERGIC)
    membranes from brefeldin A-treated HepG2 cells identifies ERGIC-32, a new cycling
    protein that interacts with human Erv46.
  findings:
  - statement: ERGIC membranes purified from brefeldin A-treated HepG2 cells (enriched ~110-fold over ERGIC-53) contain established and putative cargo receptors of the early secretory pathway, including VIP36, identified by mass spectrometry.
    reference_section_type: ABSTRACT
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: ERGIC proteomics study; supports VIP36 ERGIC localization (IDA). Title foregrounds ERGIC-32 but VIP36 is among the cargo receptors in the ERGIC-enriched fraction.
- id: PMID:19056867
  title: Large-scale proteomics and phosphoproteomics of urinary exosomes.
  findings:
  - statement: Large-scale LC-MS/MS profiling of human urinary exosomes catalogued >1100 proteins; VIP36 is one such proteomics hit (HDA), reflecting presence in secreted vesicles rather than a functional localization.
    reference_section_type: ABSTRACT
  reference_review:
    relevance: LOW
    correctness: VERIFIED
    review_notes: High-throughput exosome proteomics catalog; supports only an over-annotated extracellular exosome localization.
- id: PMID:20477988
  title: Role of the lectin VIP36 in post-ER quality control of human alpha1-antitrypsin.
  findings:
  - statement: VIP36 is an L-type lectin that localizes to the Golgi and cycles early in the secretory pathway, binding high-mannose glycans in vitro with a pH optimum of 6.5.
    reference_section_type: ABSTRACT
  - statement: VIP36 binds exclusively the high-mannose form of alpha1-antitrypsin; the complex localizes to Golgi and ER and recycles from the Golgi back to the ER, and silencing VIP36 accelerates alpha1-AT transport, consistent with a post-ER quality-control rather than anterograde role.
    reference_section_type: ABSTRACT
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: Key functional paper establishing VIP36's high-mannose binding (D-mannose binding IMP), ERGIC/Golgi localization, retrograde Golgi-to-ER recycling, and the alpha1-AT (protein binding IPI) / BiP (heat shock protein binding IPI) interactions. Cached entry is abstract-only.
- id: PMID:22016386
  title: VIP36 protein is a target of ectodomain shedding and regulates phagocytosis
    in macrophage Raw 264.7 cells.
  findings:
  - statement: VIP36 (a lectin-domain transmembrane protein postulated as a cargo receptor for Golgi-to-ER transport) is subject to ectodomain shedding mainly on the cell surface, and the amount of VIP36 regulates phagocytosis in macrophages in a shedding-dependent manner.
    reference_section_type: ABSTRACT
  - statement: VIP36 localizes mainly to the ER and Golgi; only the Endo-H-resistant cell-surface glycoform is shed, and lectin activity is dispensable for the enhancement of phagocytosis.
    reference_section_type: DISCUSSION
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: Source of the cell-surface / plasma membrane / extracellular region IDA and the positive regulation of phagocytosis IMP. Establishes the secondary shedding/macrophage role; confirms ER-Golgi as the main localization.
- id: PMID:23533145
  title: In-depth proteomic analyses of exosomes isolated from expressed prostatic
    secretions in urine.
  findings:
  - statement: Shotgun proteomics of prostatic-secretion-derived urinary exosomes detected ~900 proteins; VIP36 is one such HDA proteomics hit, reflecting presence in secreted vesicles.
    reference_section_type: ABSTRACT
  reference_review:
    relevance: LOW
    correctness: VERIFIED
    review_notes: High-throughput exosome proteomics catalog; supports only an over-annotated extracellular exosome localization.
- id: PMID:23701871
  title: Parallel quantification of lectin-glycan interaction using ultrafiltration.
  findings:
  - statement: Using an ultrafiltration assay with fluorescently labeled high-mannose-type glycans, VIP36 carbohydrate-binding affinity constants were measured and agreed with values from ITC and frontal affinity chromatography.
    reference_section_type: ABSTRACT
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: Quantitative biophysical support for VIP36 carbohydrate (high-mannose) binding (carbohydrate binding IDA).
- id: PMID:33796845
  title: Exploring the landscape of ectodomain shedding by quantitative protein terminomics.
  findings: []
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: 'PubMed-verified (PMID:33796845, Tsumagari et al., iScience 2021, DOI
      10.1016/j.isci.2021.102476). Quantitative protein terminomics identifies VIP36/LMAN2 as a
      metalloprotease-regulated ectodomain-shedding substrate with a reproducible cleavage site at
      F298 down-arrow L299 (SVNF/LKSP) detected across multiple cell lines and reduced by the
      broad-spectrum metalloprotease inhibitor BB-94. Provides the specific cleavage-site mechanism
      underlying the previously curated cell-surface shedding role (PMID:22016386). Not cached; no
      supporting_text added. Identified via Falcon deep research.'
