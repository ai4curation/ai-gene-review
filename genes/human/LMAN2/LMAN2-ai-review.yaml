suggested_questions:
- question: Beyond alpha1-antitrypsin, what is the broader endogenous high-mannose glycoprotein cargo repertoire of VIP36, and how is cargo selection coordinated with the LMAN1/ERGIC-53 lectin system?
- question: Is the macrophage shedding/phagocytosis role of VIP36 conserved in human macrophages and physiologically significant, given that lectin activity is dispensable for it?
suggested_experiments:
- description: Map the endogenous VIP36 glycoprotein interactome by glyco-proteomics of VIP36 pull-downs (wild type vs carbohydrate-binding-site mutant) to define the high-mannose cargo set and distinguish sugar-dependent from sugar-independent partners.
- description: Use pulse-chase and ER/Golgi trafficking assays in VIP36-knockout cells to quantify the contribution of VIP36 to retrograde Golgi-to-ER recycling and post-ER quality control of high-mannose glycoproteins.
- description: Identify the macrophage-specific sheddase for VIP36 and test, in primary human macrophages, whether the shed ectodomain or the membrane-retained fragment mediates the effect on phagocytosis.
