    label: RQC-trigger complex
  - id: GO:0005829
    label: cytosol
  supported_by:
  - reference_id: PMID:32579943
    supporting_text: disassembly of collided ribosomes.
  - reference_id: PMID:36302773
    supporting_text: the RQC-Trigger (RQT) complex recognizes ubiquitinated collided ribosomes as a substrate to initiate the RQC pathway by ribosomal subunit dissociation.
  directly_involved_in:
  - id: GO:0072344
    label: rescue of stalled cytosolic ribosome
- description: Nuclear transcriptional coactivator/cointegrator that, via its C4-type zinc-finger transactivation domain, binds nuclear receptors (thyroid hormone, estrogen ESR1, androgen receptors), basal transcription factors and coactivators (SRC-1/NCOA1, CBP/EP300) to potentiate nuclear-receptor-, SRF-, AP-1- and NF-kappaB-mediated transcription; regulated by UFM1 modification.
  molecular_function:
