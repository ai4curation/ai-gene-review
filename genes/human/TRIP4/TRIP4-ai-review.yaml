core_functions:
- description: Subunit of the ASC-1 / RQC-trigger (RQT) complex that resolves collided ribosomes during ribosome-associated quality control, recognizing K63-polyubiquitinated disomes and driving ribosomal subunit dissociation to rescue stalled ribosomes and initiate nascent-chain degradation.
  locations:
