suggested_questions:
- question: How does TRIP4 partition between its nuclear transcription-coactivator role and its cytosolic ribosome-quality-control role, and is this regulated (e.g. by serum status, ufmylation, or NEK6 phosphorylation)?
- question: Within the RQT complex, what is TRIP4's specific mechanistic contribution to recognizing K63-ubiquitinated collided ribosomes versus the ASCC3 helicase-driven splitting step?
- question: Are the congenital neuromuscular phenotypes of TRIP4 loss caused primarily by defective RQC, defective transcriptional coactivation, or both?
suggested_experiments:
- description: Separation-of-function mutants of TRIP4 that selectively disrupt RQT-complex incorporation versus nuclear-receptor binding, tested for ribosome-collision resolution and nuclear-receptor transactivation independently.
- description: Cryo-EM of the human RQT complex on a defined collided disome to localize TRIP4 and define how it couples ubiquitin recognition to ASCC3-mediated subunit dissociation.
- description: Patient-derived or CRISPR TRIP4-null muscle/motor-neuron models with RQC reporters and nuclear-receptor transcriptional readouts to dissect which function underlies SMABF1/MDCDC pathology.
