- id: PMID:10454579
  title: Activating signal cointegrator 1, a novel transcription coactivator of nuclear receptors, and its cytosolic localization under conditions of serum deprivation.
  findings:
  - statement: ASC-1 harbors a zinc-finger transactivation domain that binds basal transcription factors (TBP, TFIIA), coactivators (SRC-1, CBP/p300) and nuclear receptors; it is nuclear but cytoplasmic under serum deprivation.
    reference_section_type: ABSTRACT
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: Cached publication title matches PubMed; seminal paper establishing TRIP4/ASC-1 as a nuclear-receptor transcription coactivator/cointegrator (GO:0003713), one of its two core functions.
- id: PMID:12077347
  title: Novel transcription coactivator complex containing activating signal cointegrator 1.
  findings:
  - statement: ASC-1 exists as a steady-state complex (with P200/ASCC3, P100/ASCC2, P50/ASCC1) and stimulates transactivation by SRF, AP-1 and NF-kappaB and relieves nuclear-receptor transrepression.
    reference_section_type: ABSTRACT
- id: PMID:20873783
  title: Characterization of hNek6 interactome reveals an important role for its short N-terminal domain and colocalization with proteins at the centrosome.
  findings:
  - statement: TRIP4 interacts with the kinase NEK6 and colocalizes with NEK6 at the centrosome.
    reference_section_type: RESULTS
- id: PMID:25219498
  title: Modification of ASC1 by UFM1 is crucial for ERα transactivation and breast cancer development.
  findings:
  - statement: Ufmylation of ASC1/TRIP4 (promoted when ligand-bound ERalpha displaces the protease UFSP2) is required for ERalpha transactivation and assembly of an EP300/NCOA1 coactivator complex.
    reference_section_type: ABSTRACT
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: Cached publication title matches PubMed; supports the UFM1-regulated ERalpha coactivator function of TRIP4/ASC-1 (corroborates the transcription-coactivator core function and its regulation).
- id: PMID:26924529
  title: Mutations in Subunits of the Activating Signal Cointegrator 1 Complex Are Associated with Prenatal Spinal Muscular Atrophy and Congenital Bone Fractures.
  findings:
  - statement: Biallelic TRIP4 (and ASCC1) variants in the ASC-1 complex cause prenatal spinal muscular atrophy with congenital bone fractures; TRIP4 is implicated in neuromuscular junction development.
    reference_section_type: ABSTRACT
- id: PMID:32099016
  title: Identification of a novel trigger complex that facilitates ribosome-associated quality control in mammalian cells.
  findings:
  - statement: TRIP4/ASCC2/ASCC3 form the RQC-trigger (RQT) complex that facilitates ribosome-associated quality control in mammalian cells.
    reference_section_type: ABSTRACT
- id: PMID:32579943
  title: The ASC-1 Complex Disassembles Collided Ribosomes.
  findings:
  - statement: The ASC-1 complex disassembles collided ribosomes, the key mechanistic step initiating ribosome-associated quality control.
    reference_section_type: ABSTRACT
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: Cached publication title matches PubMed; establishes the RQC-trigger (RQT) function of the ASC-1/TRIP4 complex in disassembling collided ribosomes, the second core function of TRIP4.
- id: PMID:36302773
  title: A distinct mammalian disome collision interface harbors K63-linked polyubiquitination of uS10 to trigger hRQT-mediated subunit dissociation.
  findings:
  - statement: K63-linked polyubiquitination of uS10 at the disome collision interface triggers hRQT/ASC-1-mediated ribosomal subunit dissociation, initiating the RQC pathway.
    reference_section_type: ABSTRACT
