    label: negative regulation of canonical NF-kappaB signal transduction
  evidence_type: IMP
  original_reference_id: PMID:25861989
  qualifier: involved_in
  review:
    summary: IMP evidence that TANK negatively regulates canonical NF-kappaB signaling; CRISPR deletion of TANK enhanced genotoxic NF-kappaB activation. This is the central outcome of TANK's scaffold role in TRAF6 deubiquitination.
    action: KEEP_AS_NON_CORE
    reason: Well-supported, important function, but it is a context-specific (genotoxic/IL-1) negative-feedback role distinct from TANK's core positive role as a TBK1/IKK adaptor in type I IFN induction. TANK is notable for this dual (positive in IFN, negative in NF-kappaB) behavior.
