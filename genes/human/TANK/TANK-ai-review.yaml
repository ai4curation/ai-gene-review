core_functions:
- description: Functions as a non-catalytic molecular adaptor/scaffold that constitutively
    binds the IKK-related kinases TBK1 and IKBKE (IKKepsilon) and bridges them into
    cytoplasmic signaling complexes that phosphorylate IRF3/IRF7, driving type I interferon
    production during antiviral innate immunity.
  molecular_function:
    id: GO:0060090
    label: molecular adaptor activity
  locations:
  - id: GO:0005737
    label: cytoplasm
  supported_by:
  - reference_id: PMID:21931631
    supporting_text: TBK1 activation was strictly dependent on the integrity of the TBK1/TANK interaction
  directly_involved_in:
  - id: GO:0032481
    label: positive regulation of type I interferon production
- description: Acts as a scaffold that assembles a deubiquitination complex with ZC3H12A/MCPIP1
    and the deubiquitinase USP10, promoting USP10-dependent deubiquitination of TRAF6
    (and NEMO/IKBKG) to restrain genotoxic- and IL-1/LPS-induced canonical NF-kappaB
    activation. TANK itself has no deubiquitinase activity.
  molecular_function:
    id: GO:0035800
    label: deubiquitinase activator activity
  locations:
  - id: GO:0005737
    label: cytoplasm
  supported_by:
  - reference_id: PMID:25861989
    supporting_text: which was essential for the USP10-dependent deubiquitination of TRAF6
  directly_involved_in:
  - id: GO:0043124
    label: negative regulation of canonical NF-kappaB signal transduction
- description: Binds the TRAF-C domains of TRAF1/2/3 (originally identified as the TRAF-interacting
    protein I-TRAF) and is the non-catalytic subunit of the TBK1-IKKepsilon-TANK serine/threonine
    kinase complex; phosphorylation by IKBKE disrupts TANK-TRAF2 binding, providing
    a regulatory phospho-switch.
  molecular_function:
    id: GO:0031625
    label: ubiquitin protein ligase binding
  locations:
  - id: GO:0005737
    label: cytoplasm
  supported_by:
  - reference_id: PMID:12005438
    supporting_text: TANK binds to the CD40 recognition site on TRAF3
suggested_questions:
- question: How is TANK's dual behaviour - positive regulation of TBK1/IKKepsilon-driven
    type I interferon induction versus negative regulation of canonical NF-kappaB via
    the USP10/ZC3H12A deubiquitination complex - partitioned between stimuli, subcellular
    pools, and post-translational states (phosphorylation by IKBKE, SUMOylation)?
- question: Given that TANK, SINTBAD and NAP1 compete for the same site on TBK1 and
    occupy distinct subcellular locations, what determines which adaptor is used for
    a given TBK1-dependent output (antiviral IFN versus autophagy/selective autophagy)?
suggested_experiments:
- description: Stimulus-resolved interactome (AP-MS/proximity labeling) of endogenous
    TANK under viral/poly(I:C) stimulation versus genotoxic stress and IL-1 to map
    the switch between the TBK1-IKKepsilon kinase complex and the USP10-ZC3H12A deubiquitination
    complex.
- description: Separation-of-function mutants (TBK1-binding-deficient versus TRAF6/ZC3H12A-binding-deficient
    TANK) reconstituted into TANK-knockout cells to independently test the contribution
    of each scaffold function to type I IFN induction and NF-kappaB resolution.
