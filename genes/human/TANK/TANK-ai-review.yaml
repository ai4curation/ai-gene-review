id: Q92844
gene_symbol: TANK
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  TANK (TRAF family member-associated NF-kappa-B activator; also known as I-TRAF)
  is a cytoplasmic adaptor/scaffold protein, lacking any catalytic activity, that
  organizes signaling complexes in the innate immune and NF-kappaB pathways. It was
  first identified as a TRAF-interacting protein that binds the TRAF-C domains of
  TRAF1, TRAF2 and TRAF3 and modulates TRAF-mediated signaling. Its best-established
  role is as one of three mutually exclusive adaptors (alongside SINTBAD/TBKBP1 and
  NAP1/AZI2) that constitutively bind the IKK-related kinases TBK1 and IKBKE (IKKepsilon)
  via a central TBK1-binding domain and bridge them into complexes that phosphorylate
  IRF3/IRF7, driving type I interferon production during antiviral innate immunity;
  TBK1 activation in response to virus or poly(I:C) depends on the TANK-TBK1 interaction.
  TANK is the non-catalytic subunit of the TBK1-IKKepsilon-TANK kinase complex.
  TANK also has a separable negative-regulatory function: in response to genotoxic
  stress or interleukin-1/LPS it scaffolds a deubiquitination complex containing
  ZC3H12A (MCPIP1) and the deubiquitinase USP10, promoting USP10-dependent
  deubiquitination of TRAF6 (and NEMO/IKBKG) and thereby restraining canonical
  NF-kappaB activation. TANK itself contains no deubiquitinase domain, so its activity
  in this complex is purely as an assembly scaffold. Phosphorylation of TANK by IKBKE
  disrupts its binding to TRAF2, providing a phospho-switch on its adaptor function.
  Structurally TANK contains an N-terminal coiled-coil, a TBK1/IKBKE-binding region,
  a TRAF-interaction motif (which engages the CD40-recognition site of TRAF3), and a
  C-terminal UBZ1-type zinc finger. TANK is targeted by viral proteases (encephalomyocarditis
  virus and Seneca Valley virus 3C proteases cleave it; vaccinia C6 binds it) as an
  immune-evasion strategy, underscoring its role in the antiviral interferon response.
