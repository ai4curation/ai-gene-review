  label: Homo sapiens
description: >-
  NMRK2 (also known as ITGB1BP3, NRK2, or muscle integrin-binding protein/MIBP)
  is the muscle-enriched paralogue of nicotinamide riboside kinase. As an enzyme
  it is a cytosolic ATP-dependent kinase of the uridine-kinase (NRK) subfamily
  that phosphorylates the NAD+ precursor nicotinamide riboside (NR) to
  nicotinamide mononucleotide (NMN), and nicotinic acid riboside (NaR) to
  nicotinic acid mononucleotide (NaMN), thereby feeding a Preiss-Handler-
  independent salvage branch of NAD+ biosynthesis; it can also phosphorylate the
  cytotoxic nucleoside tiazofurin. Independently of its catalytic activity, the
  same protein was characterized as a muscle-specific beta-1 integrin-binding
  protein: it binds ITGB1 (alone or as part of the alpha7-beta1 integrin),
  reduces cell adhesion to laminin and laminin matrix deposition, modulates
  paxillin levels and phosphorylation, and influences terminal myogenic
  differentiation. Expression is strongly enriched in skeletal and cardiac
  muscle, and the gene is notably induced in muscle stress and heart failure.
