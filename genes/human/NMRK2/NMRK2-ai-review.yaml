suggested_questions:
- question: >-
    Is the integrin-binding/adhesion-modulating activity of NMRK2 (MIBP)
    dependent on or independent of its nicotinamide riboside kinase catalytic
    activity, and does one activity regulate the other in muscle?
- question: >-
    Given strong induction of NMRK2 in cardiac/skeletal muscle stress and heart
    failure, does its NR-salvage activity provide a physiologically important
    NAD+ source under muscle stress relative to NMRK1 and NAMPT?
suggested_experiments:
- description: >-
    Test catalytically dead NMRK2 (D35A or E100A) for retention of ITGB1 binding
    and adhesion/myogenesis phenotypes to separate the kinase and integrin-
    binding functions.
- description: >-
    Quantify NAD+/NMN flux through the NR and NaR salvage branch in
    NMRK2-depleted versus NMRK1-depleted muscle cells under basal and stress
    conditions.
