id: Q6PCD5
gene_symbol: RFWD3
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  RFWD3 (RING finger and WD repeat domain-containing protein 3; also RNF201; Fanconi
  anemia complementation group W, FANCW) is a nuclear RING-type E3 ubiquitin-protein
  ligase (EC 2.3.2.27). It combines an N-terminal region bearing ATM/ATR
  phosphorylation sites (Ser46, Ser63), a degenerate RING zinc finger that provides
  the catalytic ligase activity (active-site Cys315), a coiled-coil, and a C-terminal
  WD40 β-propeller that mediates protein-protein interactions. RFWD3 is recruited,
  through its WD40 domain binding the RPA32 (RPA2) subunit of the single-stranded-DNA-binding
  replication protein A (RPA) complex, to stalled replication forks and sites of DNA
  damage. There it polyubiquitinates RPA (all three subunits) and RAD51, promoting
  their VCP/p97-dependent turnover and timely removal from DNA damage sites so that the
  RPA-to-RAD51 exchange, homologous recombination and interstrand crosslink (ICL) repair
  can proceed. RFWD3 also promotes ubiquitination of proteins on single-stranded DNA,
  driving PCNA ubiquitination and translesion DNA synthesis. It additionally participates
  in replication-checkpoint signaling (ATR-dependent CHK1 activation) and, as a secondary
  activity, cooperates with MDM2 to ubiquitinate and stabilize p53 in the late DNA-damage
  response, contributing to the G1 checkpoint. Biallelic loss-of-function mutations cause
  Fanconi anemia, and Rfwd3-knockout mice show embryonic lethality, subfertility and
  reduced lifespan.
