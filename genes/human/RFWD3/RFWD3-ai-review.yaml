core_functions:
- description: >-
    RING-type E3 ubiquitin-protein ligase that is recruited via its C-terminal WD40
    domain to RPA-coated single-stranded DNA at stalled replication forks and sites of
    DNA damage, where (following ATM/ATR phosphorylation) it polyubiquitinates the RPA
    complex and RAD51 to drive their VCP/p97-dependent turnover and timely removal,
    enabling homologous recombination and interstrand crosslink repair to progress.
  supported_by:
  - reference_id: PMID:26474068
    supporting_text: the E3 ligase RFWD3 is responsible for RPA ubiquitination
  - reference_id: PMID:28575658
    supporting_text: facilitates timely removal
  - reference_id: PMID:28575657
    supporting_text: interacts with and ubiquitylates replication protein A (RPA)
  molecular_function:
    id: GO:0061630
    label: ubiquitin protein ligase activity
  directly_involved_in:
  - id: GO:0036297
    label: interstrand cross-link repair
  - id: GO:0000724
    label: double-strand break repair via homologous recombination
  - id: GO:0016567
    label: protein ubiquitination
  locations:
  - id: GO:0090734
    label: site of DNA damage
  - id: GO:0005634
    label: nucleus
