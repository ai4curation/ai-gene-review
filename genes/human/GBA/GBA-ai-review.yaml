- description: >-
    Lysosomal acid glucosylceramidase (glucocerebrosidase): hydrolyses glucosylceramide
    to ceramide and glucose within the lysosome, carrying out the penultimate step of
    glycosphingolipid catabolism. Activity requires the activator saposin C and negatively
    charged phospholipids.
