- term:
    id: GO:0006680
    label: glucosylceramide catabolic process
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: involved_in
  review:
    summary: >-
      Phylogenetic (IBA) annotation to the core biological process of GBA1:
      lysosomal degradation of glucosylceramide. This is the central, best-supported
      function of the gene and is corroborated by multiple experimental annotations.
    action: ACCEPT
    reason: >-
      GBA hydrolyses glucosylceramide to ceramide and glucose in the lysosome; this
      is the defining catabolic role of the enzyme and its deficiency causes lysosomal
      GlcCer accumulation (Gaucher disease). The IBA term is at the correct level of
      specificity.
    supported_by:
