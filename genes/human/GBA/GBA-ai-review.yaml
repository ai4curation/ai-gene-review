id: P04062
gene_symbol: GBA
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  GBA (GBA1) encodes lysosomal acid glucosylceramidase (glucocerebrosidase, GCase;
  EC 3.2.1.45), a glycoside hydrolase that carries out the penultimate step of
  glycosphingolipid degradation. Within the lysosome it hydrolyses glucosylceramide
  (glucocerebroside) to ceramide and glucose, and also hydrolyses glucosylsphingosine.
  Full activity requires the sphingolipid activator protein saposin C (produced from
  prosaposin/PSAP) together with negatively charged phospholipids, which promote the
  enzyme's association with the substrate-bearing membrane. Because it lacks
  mannose-6-phosphate, GCase reaches the lysosome by a mannose-6-phosphate-independent
  route: it binds the lysosomal integral membrane protein LIMP-2 (SCARB2) in the
  endoplasmic reticulum and is co-transported through the Golgi and trans-Golgi network
  to the lysosome. As a retaining beta-glucosidase it can also catalyse transglucosylation
  side reactions in vitro, transferring glucose between glucosylceramide and cholesterol
  (forming/degrading cholesteryl-glucoside) and acting weakly on galactosylceramide.
  Deficiency of GCase causes Gaucher disease, the most common lysosomal storage disorder,
  and heterozygous GBA1 variants are the numerically greatest genetic risk factor for
  Parkinson disease and dementia with Lewy bodies.
