- term:
    id: GO:0016241
    label: regulation of macroautophagy
  evidence_type: IEA
  original_reference_id: GO_REF:0000117
  qualifier: involved_in
  review:
    summary: >-
      ARBA electronic annotation to regulation of macroautophagy. Effects of GBA on
      autophagy are downstream consequences of loss of GCase activity (impaired
      autophagy-lysosome pathway), not a distinct molecular action of the enzyme.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      GCase deficiency compromises autophagic lysosome reformation and macroautophagy
      (PMID:27378698), but this is an indirect, disease-state consequence of losing the
      catabolic enzyme rather than a direct regulatory role of GBA. Over-annotation of
      the causal chain.
    supported_by:
    - reference_id: PMID:27378698
      supporting_text: >-
        ALR dysfunction was accompanied by impairment of macroautophagy and
        chaperone-mediated autophagy
- term:
    id: GO:0030163
    label: protein catabolic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000117
  qualifier: involved_in
  review:
    summary: >-
      ARBA electronic annotation to protein catabolic process. GBA is a lipid-degrading
      glycosidase, not a protease; any effect on protein catabolism is indirect (via the
      autophagy-lysosome pathway).
    action: REMOVE
    reason: >-
      This IEA is a spurious/over-general electronic inference. GBA does not catalyse
      protein catabolism; it hydrolyses glucosylceramide. The apparent link runs through
      lysosomal/autophagic dysfunction in GCase-deficient cells, which does not justify a
      direct 'protein catabolic process' annotation.
