id: P35475
gene_symbol: IDUA
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  IDUA encodes alpha-L-iduronidase, a lysosomal exo-glycosidase (glycosyl hydrolase
  family 39; EC 3.2.1.76) that hydrolyses terminal, non-reducing alpha-L-iduronic
  acid residues from the glycosaminoglycans heparan sulfate and dermatan sulfate.
  It is one of the sequential enzymes of lysosomal glycosaminoglycan catabolism,
  acting by a retaining double-displacement mechanism (nucleophile Glu299, general
  acid/base Glu182); an N-glycan attached to Asn372 forms part of the substrate-binding
  pocket and is required for full activity. The enzyme is a monomer that is trafficked
  to and acts within the lysosomal lumen. Loss of IDUA activity blocks GAG degradation
  and causes lysosomal accumulation and urinary excretion of heparan sulfate and
  dermatan sulfate, producing mucopolysaccharidosis type I, which spans a clinical
  spectrum from severe (Hurler syndrome) through intermediate (Hurler-Scheie) to
  attenuated (Scheie syndrome).
