- id: PMID:21873421
  title: Mucopolysaccharidosis type I, unique structure of accumulated heparan sulfate
    and increased N-sulfotransferase activity in mice lacking α-l-iduronidase.
  findings:
  - statement: >-
      Idua-deficient mice accumulate heparan sulfate bearing a terminal iduronate-capped
      disaccharide at the non-reducing end, where no further degradation can occur
      without Idua, confirming IDUA's role in heparan sulfate/heparin catabolism.
    supporting_text: >-
      representing the terminal iduronic acid residue capping the non-reducing end of
      the HS chain, where no further degradation can occur in the absence of Idua.
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Murine Idua-knockout study directly demonstrating loss of terminal iduronate
      removal from heparan sulfate; supports the HS/heparin catabolic-process
      annotations.
- id: PMID:23533145
  title: In-depth proteomic analyses of exosomes isolated from expressed prostatic
    secretions in urine.
  findings:
  - statement: >-
      IDUA was among ~900 proteins detected by shotgun proteomics of urinary
      prostatic-secretion exosomes, supporting its recovery in extracellular vesicles.
    supporting_text: In pooled EPS-urine exosome samples, ~900 proteins were detected.
  reference_review:
    relevance: LOW
    correctness: VERIFIED
    review_notes: >-
      High-throughput exosome proteomics; supports the extracellular-exosome
      localization annotation but is peripheral to IDUA's core lysosomal function.
- id: PMID:23959878
  title: Human α-L-iduronidase uses its own N-glycan as a substrate-binding and catalytic
    module.
  findings:
  - statement: >-
      Crystal structure and enzymology of human IDUA showing that the N-glycan at
      Asn372 forms part of the substrate-binding pocket and is required for full
      L-iduronidase activity.
    supporting_text: >-
      human α-l-iduronidase (hIDUA), of which a dysfunction causes accumulation of
      dermatan/heparan sulfate leading to mucopolysaccharidosis type I, uses its own
      N-glycan as a substrate binding and catalytic module.
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Structural/kinetic characterization of human IDUA; strong experimental support
      for the core L-iduronidase activity.
- id: PMID:24036510
  title: Insights into mucopolysaccharidosis I from the structure and action of α-L-iduronidase.
  findings:
  - statement: >-
      Crystal structures of human IDUA bound to iduronate analogs define the catalytic
      mechanism (retaining double displacement; nucleophile Glu299, acid/base Glu182)
      and confirm exolytic removal of alpha-L-iduronate from heparan and dermatan
      sulfate.
    supporting_text: >-
      IDUA participates in the stepwise degradation of the glycosaminoglycans
      (GAGs) heparan sulphate and dermatan sulphate, by removing a single
      α-L-iduronyl residue from the non-reducing ends of these complex
      polysaccharides.
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Definitive structural and mechanistic study of human IDUA; primary support for
      the molecular function and HS/DS catabolic processes.
- id: PMID:2470345
  title: Immunopurification and characterization of human alpha-L-iduronidase with
    the use of monoclonal antibodies.
  findings:
  - statement: >-
      Immunopurified human alpha-L-iduronidase from liver was active toward disaccharide
      substrates derived from both heparan sulfate and dermatan sulfate.
    supporting_text: >-
      activities towards disaccharide substrates derived from two glycosaminoglycan
      sources, heparan sulphate and dermatan sulphate.
  reference_review:
