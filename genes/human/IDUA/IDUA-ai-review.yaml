        activities towards disaccharide substrates derived from two glycosaminoglycan
        sources, heparan sulphate and dermatan sulphate.
    - reference_id: PMID:24036510
      supporting_text: >-
        by removing a single α-L-iduronyl residue from the non-reducing ends of these
        complex polysaccharides.
core_functions:
- description: >-
    Hydrolysis of terminal, non-reducing alpha-L-iduronic acid residues from the
    glycosaminoglycans heparan sulfate and dermatan sulfate in the lysosomal lumen,
    a required exolytic step of lysosomal glycosaminoglycan catabolism.
