      The disaccharide substrates were an experimental convenience for measuring
      activity; the in vivo role is exolytic removal of terminal iduronate from GAG
      polymers, captured by the glycosaminoglycan/HS/DS catabolic terms. This
      general metabolic-process term overstates a biological role in disaccharide
      metabolism.
    supported_by:
