    supporting_text: >-
      The heme bound to COA7 has a reduction potential of −353 mV and can reduce the disulfide
      bonds that compose the copper binding sites in the assembly factors SCO1 and SCO2, enabling
      regeneration of the copper relay system.
  - reference_id: PMID:24333015
    supporting_text: C1orf163 is a mitochondrial soluble intermembrane space protein
proposed_new_terms: []
suggested_questions:
- question: >-
    Is COA7's protein-disulfide reductase activity toward SCO1/SCO2 the sole mechanism by which it
    promotes complex IV assembly, or does it have additional roles (e.g. in complex I, as suggested
    by reduced complex I levels on COA7 loss)?
- question: >-
    How is COA7 re-reduced after donating electrons to SCO1/SCO2, and does the bound heme cycle
    redox states in vivo?
suggested_experiments:
- hypothesis: >-
    SCAN3 disease variants of COA7 act by impairing reductase activity, heme binding, or
    MIA-dependent import, reducing residual complex IV activity.
  description: >-
    Structure/function analysis of the COA7 SCAN3 disease variants (e.g. Y137C) to test whether
    they impair reductase activity, heme binding, or MIA-dependent import, and correlate with
    residual complex IV activity in patient cells.
- hypothesis: >-
    Catalytic (reductase) activity of COA7, not merely its presence, is required for progression
    of complex IV assembly beyond the COX1 module.
  description: >-
    Time-resolved complex IV assembly assays in COA7-null cells reconstituted with catalytically
    dead (reductase-inactive) COA7 to confirm that reductase activity drives the copper-relay step.
