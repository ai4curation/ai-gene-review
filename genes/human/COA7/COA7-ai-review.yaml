  review:
    summary: >-
      "Protein binding" capturing the interaction between COA7 and CHCHD4/MIA40 (UniProtKB
      Q8N4Q1). Unlike the other IPI rows, this interaction is physiologically meaningful: MIA40
      imports and oxidatively folds COA7 in the IMS via transient intermolecular disulfide bonds.
