core_functions:
- description: >-
    Heme-binding protein-disulfide reductase in the mitochondrial intermembrane space that reduces
    the disulfide bonds forming the copper-binding sites of the copper metallochaperones SCO1 and
    SCO2, regenerating the copper relay that delivers copper to the CuA site of MT-CO2/COX2 during
    an early step of cytochrome c oxidase (complex IV) assembly.
  molecular_function:
    id: GO:0015035
    label: protein-disulfide reductase activity
  directly_involved_in:
