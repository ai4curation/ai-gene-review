  review:
    summary: >-
      Phylogenetically inferred role in cytochrome c oxidase (complex IV) assembly. This is the
      core biological process of COA7 and is directly supported by human experimental data
      (IMP/knockdown). GO:0008535 is the broader parent of the mitochondria-specific
      GO:0033617 that also carries an IMP; both are correct.
    action: ACCEPT
