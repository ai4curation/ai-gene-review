id: Q96BR5
gene_symbol: COA7
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  COA7 (cytochrome c oxidase assembly factor 7; also RESA1/RESpiratory chain Assembly 1,
  C1orf163, SELRC1) is a metazoan-specific, soluble protein of the mitochondrial intermembrane
  space that acts as an assembly factor for respiratory chain complex IV (cytochrome c oxidase).
  It is a ~25 kDa Sel1-like repeat protein (five helix-turn-helix repeats, hcp beta-lactamase
  family) whose disulfide-rich fold is imported and oxidatively folded in the intermembrane
  space via the MIA pathway (CHCHD4/MIA40). COA7 is a heme-binding protein with protein-disulfide
  reductase activity: it reduces the disulfide bonds that form the copper-binding sites of the
  copper metallochaperones SCO1 and SCO2, regenerating the copper relay that delivers copper to
  the CuA site of MT-CO2/COX2, and thereby promotes an early step of complex IV assembly
  following formation of the COX1 module. Loss of COA7 also reduces complex I levels. Recessive
  loss-of-function variants cause spinocerebellar ataxia with axonal neuropathy type 3 (SCAN3), a
  mitochondrial complex-IV-deficiency disorder with peripheral neuropathy and leukoencephalopathy.
