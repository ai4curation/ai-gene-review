proposed_new_terms: []
suggested_questions:
- question: Does the J domain of DNAJC13/RME-8 stimulate HSC70 ATPase activity directly on endosomal
    clathrin, and is this required for the SNX1-dynamics and tubulation phenotypes?
- question: Are the Parkinson-disease-associated DNAJC13 variants (e.g. p.Asn855Ser) genuinely
    pathogenic via altered endosomal sorting, given the co-segregating TMEM230 variants in the same
    family?
suggested_experiments:
- description: Reconstitute DNAJC13 J-domain-stimulated HSC70 ATPase and clathrin-uncoating activity
    in vitro, using a J-domain HPD-motif mutant as a negative control, to test whether the
    co-chaperone activity drives endosomal clathrin dynamics.
- description: Knock-in of Parkinson-associated DNAJC13 variants in iPSC-derived dopaminergic neurons
    with live-cell imaging of transferrin recycling, EGFR degradation and SNX1/retromer tubulation to
    assess functional consequences.
