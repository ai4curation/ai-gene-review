id: O75165
gene_symbol: DNAJC13
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: DNAJC13 (RME-8, "Required for receptor-mediated endocytosis 8") is a large
  (2243 aa) multidomain DnaJ/HSP40 subfamily C protein that acts as an endosomal co-chaperone
  of the HSC70 (HSPA8) chaperone. It is a peripheral membrane protein associated with early
  endosomes via its N-terminal region and carries an internal J domain (residues 1301-1366)
  that stimulates the ATPase activity of HSC70 to drive clathrin dynamics on endosomal
  membranes. Through this activity DNAJC13 regulates endosomal protein sorting and membrane
  trafficking, including transferrin recycling (early endosome to recycling endosome transport)
  and EGF/EGFR degradation (early endosome to late endosome transport). It binds the WASH
  complex subunit WASHC2/FAM21 and the sorting nexin SNX1, coordinating WASH complex
  activity with retromer-dependent endosomal membrane tubulation. DNAJC13 variants have been
  implicated in autosomal-dominant Parkinson disease (PARK21).
existing_annotations:
- term:
    id: GO:0006898
    label: receptor-mediated endocytosis
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: involved_in
  review:
    summary: Phylogenetic (IBA) annotation reflecting the gene's historical name (RME-8,
      required for receptor-mediated endocytosis), originally defined in C. elegans yolk
      uptake. In human cells DNAJC13/RME-8 acts on early endosomes downstream of internalization
      (sorting, recycling and degradation) rather than at the plasma-membrane internalization
      step per se, so this is a broadly correct but non-core process annotation.
    action: KEEP_AS_NON_CORE
    reason: The family-level receptor-mediated endocytosis term is supported by orthology and
      the gene's role in endocytic trafficking, but DNAJC13's documented site of action is the
      endosome (recycling and degradative sorting), not the internalization step; it is a
      peripheral process relative to its core endosomal co-chaperone function.
    supported_by:
    - reference_id: PMID:18256511
      supporting_text: hRME is primarily involved in membrane trafficking through early endosomes,
        but not through degradative organelles, such as multivesicular bodies and late endosomes.
