suggested_questions:
- question: What determines whether ribosome collisions sensed by ZAKalpha route to
    the pro-death JNK/p38 cascade versus the pro-survival GCN2/integrated stress response
    (e.g. collision density, duration, or ribosome ubiquitination state)?
- question: How do the centronuclear myopathy (CNM6) and split-foot malformation (SFMMP)
    phenotypes relate mechanistically to defects in ribotoxic stress sensing versus
    other MAP3K20 functions?
- question: Does the kinase-independent activation of GCN2 by MAP3K20 reflect a scaffolding
    interaction, and what is its structural basis?
suggested_experiments:
- description: Compare ZAKalpha (ribosome-binding) and ZAKbeta (C-terminus-deleted)
    knock-in cells for ribotoxic-stress-induced p38/JNK activation, GCN2/ISR engagement,
    and cell-fate outcomes to dissect collision-sensing-dependent versus -independent
    signaling.
- description: Structure-guided mutations in the ZAKalpha C-terminal ribosome-sensing
    domains (intersubunit insertion; 18S rRNA helix-14 contact) tested for collision
    binding and downstream MAPK/NLRP1 activation.
- description: Patient-derived myotubes carrying CNM6 variants assayed for ribotoxic
    stress signaling and proteostasis to test whether impaired ZAKalpha surveillance
    contributes to the myopathy.
