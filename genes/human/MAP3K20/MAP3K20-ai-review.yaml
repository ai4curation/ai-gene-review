id: Q9NYL2
gene_symbol: MAP3K20
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: MAP3K20 (ZAK; also MLK7/MRK) is a stress-activated mitogen-activated protein
  kinase kinase kinase (MAP3K) of the MLK family. As a serine/threonine protein kinase
  it phosphorylates the MAP2Ks MKK4/MKK7 (activating JNK) and MKK3/MKK6 (activating
  p38), driving stress-activated MAPK (JNK and p38) signaling that can promote programmed
  cell death. The principal isoform ZAKalpha is the proximal sensor of the ribotoxic
  stress response and directly binds the ribosome by inserting its flexible C-terminus
  into the intersubunit space (contacting helix 14 of 18S rRNA), acting as a sentinel
  for colliding ribosomes. Ribosome collisions trigger MAP3K20 autophosphorylation
  and activation; depending on collision severity it either activates the JNK/p38 cascade
  to promote cell death or activates EIF2AK4/GCN2 to engage the integrated stress response.
  ZAKalpha also drives the UV-B-induced NLRP1 inflammasome and pyroptosis by phosphorylating
  NLRP1. A shorter isoform, ZAKbeta, lacks the ribosome-binding C-terminus and does
  not sense collisions. MAP3K20 localizes mainly to the cytoplasm/cytosol (with reported
  nuclear pools and histone H3 Ser-28 kinase activity). It has additional reported
  roles in DNA-damage checkpoint signaling and cardiac stress responses. Biallelic
  variants cause split-foot malformation with mesoaxial polydactyly (SFMMP) and centronuclear
  myopathy 6 (CNM6).
