- id: PMID:32289254
  title: ZAKα Recognizes Stalled Ribosomes through Partially Redundant Sensor Domains.
  findings:
  - statement: ZAKalpha directly associates with ribosomes by inserting its flexible
      C-terminus into the intersubunit space and binds helix 14 of 18S rRNA; these
      sensor domains are required for ribotoxic stress response (RSR) activation.
    reference_section_type: ABSTRACT
- id: PMID:32610081
  title: Ribosome Collisions Trigger General Stress Responses to Regulate Cell Fate.
  findings:
  - statement: ZAKalpha senses ribosome collisions and, depending on severity, activates
      the stress-activated p38/JNK cascade (cell death) or EIF2AK4/GCN2-mediated integrated
      stress response (survival); it preferentially associates with colliding ribosomes.
    reference_section_type: ABSTRACT
