id: P00480
gene_symbol: OTC
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  OTC (ornithine transcarbamylase / ornithine carbamoyltransferase, EC 2.1.3.3)
  is a nuclear-encoded, mitochondrial-matrix enzyme of the urea cycle. It
  catalyzes the condensation of carbamoyl phosphate with L-ornithine to form
  L-citrulline plus inorganic phosphate, the committed step that links carbamoyl
  phosphate (produced by CPS1) to citrulline en route to hepatic ureagenesis and
  ammonia detoxification. The protein is synthesized in the cytosol as a larger
  precursor with a cleavable, arginine-rich N-terminal mitochondrial targeting
  presequence, imported into the mitochondrial matrix, and proteolytically
  processed to the mature subunit, which assembles into a catalytically active
  homotrimer. OTC is expressed mainly in liver and intestinal mucosa and belongs
  to the aspartate/ornithine carbamoyltransferase superfamily (OTCase family).
  The X-linked gene is the site of loss-of-function variants causing ornithine
  carbamoyltransferase deficiency (OTCD), the most common urea cycle disorder,
  in which impaired citrulline synthesis reduces urea-cycle flux and produces
  hyperammonemia.
