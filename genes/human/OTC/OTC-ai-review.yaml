      compartment at this level. The more specific matrix term is captured
      separately (GO:0005759).
- term:
    id: GO:0006526
    label: L-arginine biosynthetic process
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: involved_in
  review:
    summary: >-
      IBA-transferred role in L-arginine biosynthesis. OTC produces citrulline,
      which is a precursor for argininosuccinate and thence arginine; the urea
      cycle is the biosynthetic route to arginine. This is a downstream pathway
      role rather than OTC's direct biosynthetic product.
    action: KEEP_AS_NON_CORE
    reason: >-
      OTC's direct product is L-citrulline, not L-arginine; arginine biosynthesis
      is a downstream consequence of the urea cycle in which OTC participates.
      Biologically defensible at the pathway level but not the core function of
      the enzyme.
