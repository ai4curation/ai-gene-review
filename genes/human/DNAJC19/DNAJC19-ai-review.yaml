  findings:
  - statement: Biallelic DNAJC19 variants cause dilated cardiomyopathy with ataxia (DCMA) / 3-methylglutaconic aciduria type 5, identifying DNAJC19 as a human inner-membrane import co-chaperone.
    reference_section_type: RESULTS
- id: PMID:19564938
  title: 'The mitochondrial protein translocation motor: structural conservation between the human and yeast Tim14/Pam18-Tim16/Pam16 co-chaperones.'
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: "Cached publication title matches the YAML title; the text explicitly describes the J-domain protein human Tim14/Pam18 (DNAJC19) enhancing mtHsp70 ATPase activity and forming heterodimers with Tim16/Pam16, supporting the ATPase-activator core MF. Cited in core_functions.supported_by."
  findings:
  - statement: J-domain proteins such as Tim14/Pam18 enhance the ATPase activity of Hsp70 chaperones to promote tight substrate binding during import; human Tim14/Pam18 and Tim16/Pam16 form heterodimeric complexes that interact with mtHSP70.
    reference_section_type: RESULTS
- id: PMID:20053669
  title: Role of Magmas in protein transport and human mitochondria biogenesis.
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: "Cached publication title matches the YAML title; Results show human DNAJC19 stimulates Mortalin (mtHSP70) ATPase activity (reduced ~70% by the Magmas:DnaJC19 complex) and co-precipitates with the human TIM23 translocon, directly supporting both the ATPase-activator MF and the matrix-import process. Cited in core_functions.supported_by."
  findings:
  - statement: Human DNAJC19 stimulates Mortalin (mtHSP70) ATPase activity, which is inhibited by the Magmas:DnaJC19 complex; DNAJC19 co-precipitates with the human TIM23 translocon (hTim44, hTim23, Magmas).
    reference_section_type: RESULTS
