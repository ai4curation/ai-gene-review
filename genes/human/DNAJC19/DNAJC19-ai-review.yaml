suggested_questions:
- question: Does DNAJC19's prohibitin/cardiolipin-remodeling role represent a function separable from its import-motor activity, and which one underlies the DCMA cardiomyopathy?
- question: How does the DNAJC19-PAM16 (Magmas) heterodimer dynamically regulate mtHSP70 ATPase stimulation during active import versus resting states?
suggested_experiments:
- description: Reconstitute the human import motor in vitro with purified DNAJC19, PAM16, mtHSP70 and GRPEL to measure DNAJC19-dependent ATPase stimulation and precursor translocation, including disease-variant proteins.
- description: Conditional DNAJC19 depletion in cardiomyocytes followed by mitochondrial import assays and cardiolipin profiling to dissect import-motor versus cardiolipin-remodeling contributions to the DCMA phenotype.
- description: Cryo-EM of the human TIM23-PAM holo-translocase to define how the DNAJC19 J-domain engages mtHSP70 at the matrix exit of the channel.
