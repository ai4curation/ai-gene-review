- id: PMID:17868694
  title: Structural and kinetic characterization of quinolinate phosphoribosyltransferase
    (hQPRTase) from homo sapiens.
  findings:
  - statement: Recombinant human QPRTase catalyses phosphoribosyl transfer to quinolinate
      yielding NAMN, CO2 and pyrophosphate; the decarboxylation makes the step essentially
      irreversible; Km for QA is about 21-23 uM.
    reference_section_type: RESULTS
  - statement: The enzyme is a hexamer whose active site, at a dimer interface, is
      completed by residues (including R102) from the partner subunit; R138, K139,
      R161 and K171 are essential for activity.
    reference_section_type: RESULTS
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: Full-text available; primary structural and kinetic characterization
      of human QPRT. Directly grounds the catalytic MF, catalytic-complex, and homo-oligomer
      annotations.
- id: PMID:23533145
  title: In-depth proteomic analyses of exosomes isolated from expressed prostatic
    secretions in urine.
  findings:
  - statement: Shotgun proteomics of EPS-urine exosomes detected about 900 proteins
      including QPRT; a generic high-throughput exosome detection, not a functional
      localization study.
    reference_section_type: ABSTRACT
  reference_review:
    relevance: LOW
    correctness: VERIFIED
    review_notes: Abstract-only; supports only the HDA extracellular-exosome detection,
      which is non-core for a cytosolic enzyme.
- id: PMID:24038671
  title: The crystal structure of human quinolinic acid phosphoribosyltransferase
    in complex with its inhibitor phthalic acid.
  findings:
  - statement: Crystal structure of human QPRT bound to inhibitor phthalic acid plus
      kinetic analysis; QPRT catabolizes quinolinic acid in the first step of de novo
      NAD+ biosynthesis, at the junction of NAD+ biosynthesis and the kynurenine pathway.
    reference_section_type: ABSTRACT
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: Abstract-only cache but establishes catalytic activity, quinolinate
      catabolism, and the hexameric assembly.
- id: PMID:25464930
  title: 'Novel interactive partners of neuroligin 3: new aspects for pathogenesis
    of autism.'
  findings:
  - statement: QPRT was identified among neuroligin-3 (NLGN3) interacting candidates
      from a yeast two-hybrid screen and validated in neuroblastoma cells/brain tissue.
    reference_section_type: ABSTRACT
  reference_review:
    relevance: LOW
    correctness: VERIFIED
    review_notes: Abstract-only; supports a single QPRT-NLGN3 PPI (bare protein binding)
      of unclear functional significance for QPRT.
- id: PMID:26805589
  title: Structural Insights into the Quaternary Catalytic Mechanism of Hexameric
    Human Quinolinate Phosphoribosyltransferase, a Key Enzyme in de novo NAD Biosynthesis.
  findings:
  - statement: Human QPRT acts as a hexamer of three dimeric subunits for cooperative
      reactant binding; the N-terminal helix alpha1 is a critical hexamer stabilizer.
    reference_section_type: ABSTRACT
  - statement: QPRT is essential for quinolinic acid homeostasis in the brain; its
      malfunction elevates QA, implicated in neurodegenerative disorders, and it is
      a target in malignant glioma.
    reference_section_type: INTRODUCTION
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: Full-text available; grounds the hexameric catalytic-complex and
      identical-protein-binding annotations and the de novo NAD role.
- id: PMID:32296183
  title: A reference map of the human binary protein interactome.
  findings:
  - statement: HuRI binary interactome map reporting QPRT self-interaction and binary
      interactions with keratin-associated proteins and ADAMTSL4.
    reference_section_type: METHODS
  reference_review:
    relevance: LOW
    correctness: VERIFIED
    review_notes: High-throughput Y2H interactome; QPRT self-interaction is consistent
      with homo-oligomerization, but the heterologous partners lack functional relevance.
- id: PMID:3409840
  title: Quinolinic-phosphoribosyl transferase activity is decreased in epileptic
    human brain tissue.
  findings:
  - statement: QPRTase activity was directly measured in human brain biopsies and
      was specifically reduced in tissue involved in the epileptic discharge, consistent
      with QPRT catabolizing the excitotoxin/convulsant quinolinic acid.
    reference_section_type: ABSTRACT
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: Abstract-only; direct assay of endogenous human QPRTase activity
      and quinolinate catabolism in brain.
- id: PMID:9473669
  title: Characterization and functional expression of the cDNA encoding human brain
    quinolinate phosphoribosyltransferase.
  findings:
  - statement: The human QPRTase cDNA encodes a 297-aa protein that rescued a QPRTase-defective
      (nadC) E. coli strain, restoring QPRTase activity and growth without nicotinic
      acid; QPRTase is a key enzyme in quinolinate catabolism.
    reference_section_type: ABSTRACT
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: Abstract-only; functional-complementation evidence directly establishing
      the catalytic activity and quinolinate catabolic role of human QPRT.
- id: Reactome:R-HSA-197268
  title: QPRT transfers PRIB to QUIN to form NAMN
  findings:
  - statement: QPRT transfers a phosphoribosyl group to quinolinate to form nicotinate
      D-ribonucleotide (NaMN); activity is strictly dependent on Mg2+; a rate-limiting
      step of the tryptophan-to-NAD+ pathway.
    reference_section_type: ABSTRACT
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: Reactome reaction supporting the cytosol location and de novo NAD+
      from tryptophan process; also notes Mg2+ dependence.
