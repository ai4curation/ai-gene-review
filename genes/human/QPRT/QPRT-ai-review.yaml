id: Q15274
gene_symbol: QPRT
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: QPRT (quinolinate phosphoribosyltransferase, nicotinate-nucleotide pyrophosphorylase
  [carboxylating], EC 2.4.2.19) catalyses the final committed step of de novo NAD+
  biosynthesis from L-tryptophan via the kynurenine pathway. It transfers a phosphoribosyl
  group from 5-phospho-alpha-D-ribose 1-diphosphate (PRPP) to quinolinate, with release
  of CO2 and diphosphate, forming nicotinate D-ribonucleotide (NaMN), which then enters
  the common NAD+ biosynthetic pathway. The accompanying decarboxylation makes the
  reaction essentially irreversible. QPRT is a cytosolic Mg2+-dependent type II phosphoribosyltransferase
  that assembles into a hexamer built from three homodimers, with the active site formed
  at each dimer interface using residues contributed by both subunits. By consuming
  quinolinate, QPRT also detoxifies this potent endogenous excitotoxic and convulsant
  metabolite; loss or reduction of QPRT activity elevates brain quinolinate and is
  associated with neurodegenerative and epileptic conditions. The enzyme is broadly
  expressed with enhanced expression in liver.
