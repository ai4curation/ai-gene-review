id: Q9NUN7
gene_symbol: ACER3
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  ACER3 (alkaline ceramidase 3) is a seven-transmembrane, integral endoplasmic-reticulum/Golgi
  membrane enzyme that hydrolyses ceramide (an N-acylsphingosine) to sphingosine and a free fatty
  acid at alkaline pH. It is the most broadly (ubiquitously) expressed of the three human alkaline
  ceramidases and shows a preference for unsaturated long-chain ceramides (C18:1, C20:1, C20:4),
  also acting on the corresponding dihydroceramides and phytoceramides. Catalysis depends on a
  buried catalytic Zn2+ ion coordinated by conserved histidines, and enzyme activity is regulated
  by a physically connected Ca2+ site (Ca2+-activated, non-lysosomal, alkaline pH optimum ~9.5).
  By generating sphingosine, ACER3 controls the cellular and plasma sphingosine/sphingosine-1-
  phosphate pool (notably in erythrocytes) and thereby influences ceramide/sphingosine-mediated
  signalling that affects cell proliferation, survival and differentiation. Loss of ACER3 function
  (homozygous p.E33G) abolishes ceramidase activity, causes accumulation of long-chain ceramides,
  and produces an autosomal-recessive progressive early-childhood-onset leukodystrophy.
