core_functions:
- description: >-
    Alkaline ceramidase that hydrolyses ceramide (an N-acylsphingosine) to sphingosine and a free
    fatty acid at alkaline pH, with a preference for unsaturated long-chain ceramides (C18:1, C20:1,
    C20:4) and the corresponding dihydroceramides and phytoceramides, acting in the ER/Golgi
    membrane. Catalysis uses a buried catalytic Zn2+ ion. This activity drives ceramide catabolism
    and generation of sphingosine, controlling the cellular/plasma sphingosine-1-phosphate pool.
  molecular_function:
    id: GO:0017040
    label: N-acylsphingosine amidohydrolase activity
  directly_involved_in:
  - id: GO:0046514
    label: ceramide catabolic process
  - id: GO:0046512
    label: sphingosine biosynthetic process
  locations:
  - id: GO:0005789
    label: endoplasmic reticulum membrane
  - id: GO:0000139
    label: Golgi membrane
  supported_by:
  - reference_id: PMID:20068046
    supporting_text: ACER3 controls the catabolism of ULC ceramides and dihydroceramides
  - reference_id: PMID:26792856
    supporting_text: ACER3 encodes an alkaline ceramidase, which catalyses the hydrolysis of several unsaturated long chain
  - reference_id: PMID:30575723
    supporting_text: converting ceramides into free fatty acids and sphingosine
  - reference_id: file:human/ACER3/ACER3-uniprot.txt
    supporting_text: Endoplasmic reticulum membrane
- description: >-
    Binds a catalytic Zn2+ ion in the active-site core (coordinated by conserved histidines),
    required for the ceramide-hydrolysis reaction; a regulatory Ca2+ site, physically connected to
    the Zn2+, activates the enzyme. This metal-dependent chemistry underlies the alkaline
    ceramidase activity.
  molecular_function:
    id: GO:0008270
    label: zinc ion binding
  supported_by:
  - reference_id: PMID:30575723
