- id: PMID:11356846
  title: Cloning and characterization of a novel human alkaline ceramidase. A mammalian
    enzyme that hydrolyzes phytoceramide.
  findings:
  - statement: >-
      Identified and cloned ACER3 (aPHC) as a novel human alkaline ceramidase; GFP-tagging localized
      it to both Golgi apparatus and ER; ubiquitously expressed, highest in placenta; pH optimum 9.5;
      activated by Ca2+ and inhibited by Zn2+ and sphingosine; hydrolyzes phytoceramide preferentially.
    reference_section_type: RESULTS
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified original cloning/characterization paper for ACER3. Establishes ceramidase
      activity, ER/Golgi localization, alkaline pH optimum and Ca2+/Zn2+ regulation. Abstract-only
      cache; quotes taken verbatim from the abstract.
- id: PMID:20068046
  title: Alkaline ceramidase 3 (ACER3) hydrolyzes unsaturated long-chain ceramides,
    and its down-regulation inhibits both cell proliferation and apoptosis.
  findings:
  - statement: >-
      ACER3 specifically hydrolyzes unsaturated long-chain ceramides (C18:1, C20:1, C20:4),
      dihydroceramides and phytoceramides; controls their catabolism in cells; knockdown inhibits
      proliferation (via p21) and apoptosis and up-regulates ACER2.
    reference_section_type: RESULTS
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified. Defines ACER3 substrate specificity (unsaturated long-chain ceramides) and
      its proliferation/apoptosis phenotypes. Abstract-only cache; quotes verbatim from abstract.
- id: PMID:20207939
  title: Role of alkaline ceramidases in the generation of sphingosine and its phosphate
    in erythrocytes.
  findings:
  - statement: >-
      Only alkaline ceramidase activity is present in erythrocytes and is instrumental for
      sphingosine (and hence plasma S1P) generation; ACER3 is the broadly expressed alkaline
      ceramidase controlling this pool.
    reference_section_type: RESULTS
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified. Links ACER-type alkaline ceramidase activity to sphingosine/S1P generation in
      erythrocytes and plasma. Abstract-only cache; quotes verbatim from abstract.
- id: PMID:26792856
  title: Deficiency of the alkaline ceramidase ACER3 manifests in early childhood
    by progressive leukodystrophy.
  findings:
  - statement: >-
      Homozygous p.E33G in ACER3 abolishes catalytic activity, causing accumulation of ULC ceramides
      and complex sphingolipids and a progressive early-childhood leukodystrophy (PLDECO).
    reference_section_type: RESULTS
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified; full text available. First human disease linked to alkaline ceramidase
      deficiency; establishes the disease/myelination context and confirms core ceramidase activity
      via loss-of-function genetics. Quotes verbatim from full text.
- id: PMID:30575723
  title: Structure of a human intramembrane ceramidase explains enzymatic dysfunction
    found in leukodystrophy.
  findings:
  - statement: >-
      Crystal structure of ACER3 shows a seven-transmembrane intramembrane enzyme with a catalytic
      Zn2+ site and a physically/functionally connected Ca2+ site that explains Ca2+ regulation and
      the E33G loss of function.
    reference_section_type: RESULTS
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified; full text available. Provides the structural basis for the catalytic Zn2+ and
      regulatory Ca2+ molecular functions and the 7TM ER/Golgi membrane topology. Quotes verbatim
      from abstract/introduction.
