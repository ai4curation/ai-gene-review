suggested_questions:
- question: >-
    Does FANCF have any function outside the FA core complex (e.g. the cytosolic
    FA-core-complex:HSP70:PKR species modeled by Reactome), or is it strictly a
    nuclear scaffolding subunit?
- question: >-
    Are the high-throughput FANCF interactions with TCP11 and HTT biologically
    meaningful, or are they interactome-screen artifacts?
suggested_experiments:
- hypothesis: >-
    Each subcomplex-bridging contact on the FANCF C-terminal adaptor surface
    contributes independently to core-complex assembly and FANCD2
    monoubiquitination.
  description: >-
    Structure-guided separation-of-function mutations in the FANCF C-terminal
    adaptor surface (e.g. the loops mutated in PMID:17082180), assayed for
    core-complex assembly and FANCD2 monoubiquitination.
- hypothesis: FANCF localization and interactions are restricted to the nucleus/chromatin.
  description: >-
    Proximity labeling (BioID/TurboID) of endogenous FANCF in unperturbed vs
    ICL-damaged cells to define its complete interaction/localization landscape
    and test for any non-nuclear pool.
