id: Q9NPI8
gene_symbol: FANCF
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  FANCF is a subunit of the Fanconi anemia (FA) nuclear core complex, a
  multisubunit ubiquitin ligase that also contains FANCA, FANCB, FANCC, FANCE,
  FANCG, FANCL (the RING E3), FANCM and associated FAAP proteins. The core
  complex is activated by DNA damage, particularly DNA interstrand cross-links
  (ICLs) and replication stress, and its essential output is monoubiquitination
  of the FANCD2-FANCI (ID2) heterodimer. Monoubiquitinated ID2 is loaded onto
  chromatin near the lesion and directs the downstream steps of replication-
  coupled ICL repair (nucleolytic unhooking, translesion synthesis and
  homologous recombination), thereby maintaining chromosome stability. FANCF
  has no catalytic activity or recognizable sequence motif; its C-terminal
  domain adopts a HEAT/ARM-like helical-repeat fold and it acts as a flexible
  molecular adaptor/scaffold that bridges the FANCA:FANCG and FANCC:FANCE
  subcomplexes, so it is required for assembly and stability of the intact core
  complex and hence for FANCD2 monoubiquitination. FANCF is predominantly
  nuclear/nucleoplasmic and associates with chromatin upon DNA damage. Biallelic
  loss-of-function of FANCF causes Fanconi anemia complementation group F, with
  bone marrow failure, congenital malformations, cancer predisposition and
  cellular hypersensitivity to cross-linking agents.
