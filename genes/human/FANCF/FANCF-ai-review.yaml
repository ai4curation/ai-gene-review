- id: PMID:11063725
  title: The Fanconi anemia protein FANCF forms a nuclear complex with FANCA, FANCC
    and FANCG.
  findings:
  - statement: >-
      FANCF is predominantly nuclear and forms a complex with FANCA, FANCC and
      FANCG; these interactions are lost in FA cell lines, indicating each subunit
      is required for complex formation.
    supporting_text: >-
      FANCF was found predominantly in the nucleus, where it complexes with FANCA,
      FANCC and FANCG.
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified primary paper (de Winter 2000, Hum Mol Genet). Establishes
      nuclear localization and FA core-complex membership of FANCF; directly
      supports the FA nuclear complex and nucleus/nucleoplasm annotations.
- id: PMID:12649160
  title: 'Fanconi anemia protein complex: mapping protein interactions in the yeast
    2- and 3-hybrid systems.'
  findings:
  - statement: >-
      FANCG binds both the N-terminus of FANCA and the C-terminal region of FANCF,
      and can bridge FANCA to FANCF, mapping the physical architecture underlying
      FANCF's adaptor role.
    supporting_text: >-
      FANCG was shown to interact with both the amino-terminus of FANCA and the
      carboxyl-terminal region of FANCF.
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified (Gordon & Buchwald 2003, Blood). Y2H/Y3H mapping of FANCF-
      FANCG/FANCA contacts; supports the molecular adaptor function.
- id: PMID:17082180
  title: Structural determinants of human FANCF protein that function in the assembly
    of a DNA damage signaling complex.
  findings:
  - statement: >-
      The FANCF C-terminal domain has a Cand1-like helical-repeat fold and
      functions as a molecular adaptor bridging the A:G and C:E subcomplexes; two
      C-terminal loops are essential for FANCD2 monoubiquitination and mitomycin C
      resistance.
    supporting_text: >-
      The human FANCF protein reportedly functions as a molecular adaptor within
      the FA nuclear complex, bridging between the subcomplexes A:G and C:E.
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified (Kowal 2007, JBC). Crystal structure + mutagenesis defining
      FANCF as a molecular adaptor whose C-terminal surface assembles the core
      complex and is required for FANCD2 monoubiquitination. Primary basis for the
      molecular adaptor activity core function.
- id: PMID:19965384
  title: The Fanconi anemia pathway promotes replication-dependent DNA interstrand
    cross-link repair.
  findings:
  - statement: >-
      FANCI-FANCD2 (activated by the FA core complex) is required for
      replication-coupled ICL repair in S phase, including incisions and
      translesion synthesis.
    supporting_text: >-
      FANCI-FANCD2 is required for replication-coupled ICL repair in S phase.
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified (Knipscheer 2009, Science). Establishes the FA pathway's role
      in replication-dependent ICL repair; NAS basis for the FANCF ICL-repair
      process annotation.
- id: PMID:20347428
  title: A histone-fold complex and FANCM form a conserved DNA-remodeling complex
    to maintain genome stability.
  findings:
  - statement: >-
      FANCM-MHF associates with the FA core complex and promotes FANCD2
      monoubiquitination in response to DNA damage.
    supporting_text: >-
      FANCM-MHF associates with the Fanconi anemia (FA) core complex, promotes
      FANCD2 monoubiquitination in response to DNA damage
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified (Yan 2010, Mol Cell). Focuses on FANCM-MHF but characterizes
      the FA core complex; IDA basis for FANCF FA-nuclear-complex membership.
