    label: DNA damage response
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: involved_in
  review:
    summary: >-
      FANCF, as a subunit of the FA core complex, participates in the cellular
      response to DNA damage (ICLs and replication stress). Correct but broad;
      the specific process is interstrand cross-link repair.
    action: ACCEPT
    reason: >-
      Well supported by phylogenetic inference and by direct evidence that the
      FA core complex is activated by DNA damage to monoubiquitinate FANCD2-FANCI.
      A valid parent term; retained as a general process alongside the more
      specific ICL repair annotation.
