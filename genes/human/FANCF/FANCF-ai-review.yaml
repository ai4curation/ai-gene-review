core_functions:
- description: >-
    Acts as a flexible molecular adaptor/scaffold within the Fanconi anemia
    nuclear core complex, bridging the FANCA:FANCG and FANCC:FANCE subcomplexes
    to assemble and stabilize the complex; this scaffolding is required for the
    complex's monoubiquitination of FANCD2-FANCI and thus for replication-coupled
    DNA interstrand cross-link repair and chromosome stability.
  molecular_function:
    id: GO:0060090
    label: molecular adaptor activity
