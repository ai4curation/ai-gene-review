id: Q8TBG9
gene_symbol: SYNPR
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  Synaptoporin is a brain-enriched, four-pass MARVEL-domain integral membrane
  glycoprotein of small synaptic vesicles. It is concentrated in selected
  neuronal populations rather than uniformly across nerve terminals. Family-level
  reconstitution and genetic studies support overlapping roles with synaptophysin
  and synaptogyrins in organizing and clustering small synaptic vesicles and in
  establishing their characteristic small size. Rodent knockdown/rescue studies
  indicate that, at hippocampal mossy-fiber–CA3 synapses, presynaptic synaptoporin
  supports activity-dependent structural and functional homeostatic plasticity.
  An intrinsic ion-channel activity has not been demonstrated.
