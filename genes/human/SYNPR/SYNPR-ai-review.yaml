suggested_questions:
- question: >-
    Does SYNPR directly bind synapsins at endogenous synaptic vesicles, and which
    residues or post-translational modifications control that interaction?
  experts:
  - Pietro De Camilli
- question: >-
    Does SYNPR itself bend membranes or set vesicle diameter, or does it recruit a
    separate membrane-shaping factor?
  experts:
  - Pietro De Camilli
- question: >-
    Do the two human SYNPR splice isoforms differ in neuronal distribution,
    trafficking, or support of homeostatic plasticity?
  experts:
  - Yumin Mao
suggested_experiments:
- description: >-
    Generate SYNPR-null human iPSC-derived dentate granule neurons and perform
    isoform-resolved rescue. Quantify synaptic-vesicle diameter and number by
    electron microscopy, vesicle cycling by pH-sensitive reporters, and synaptic
    transmission during chronic activity suppression.
  experiment_type: CRISPR genetics, electrophysiology, live imaging, and electron microscopy
  hypothesis: >-
    SYNPR loss enlarges synaptic vesicles and impairs activity-dependent
    mossy-fiber-like presynaptic upregulation, with rescue by the principal neuronal isoform.
- description: >-
    Reconstitute purified SYNPR into composition-controlled proteoliposomes and
    measure membrane curvature, vesicle diameter, and ion or solute conductance with
    and without synapsin.
  experiment_type: biochemical reconstitution and electrophysiology
  hypothesis: >-
    SYNPR promotes membrane curvature and small-vesicle formation with synapsin but
    does not display an autonomous ion-channel activity.
- description: >-
    Endogenously tag each SYNPR isoform in human neurons and compare localization,
    turnover, binding partners, and activity-dependent redistribution.
  experiment_type: isoform-specific genome editing, microscopy, and quantitative proteomics
  hypothesis: >-
    Alternative splicing changes SYNPR trafficking or partner engagement rather
    than creating a distinct catalytic activity.
knowledge_gaps:
- gap_statement: >-
    The direct molecular mechanism by which SYNPR and related tetraspanins determine
    synaptic-vesicle shape and size is unknown.
  boundary: >-
    SYNPR plus synapsin is sufficient to generate clusters of small vesicles in
    COS7 cells, and quadruple-family knockout enlarges mouse synaptic vesicles, but
    these results do not distinguish intrinsic membrane bending from recruitment of
    another shaping factor.
  gap_kind:
  - BIOLOGY
  dark_aspect: MF_DARK
  status: OPEN
  significance: >-
    Resolving this mechanism would identify SYNPR's biochemical activity and enable
    a precise molecular-function annotation.
  resolution: >-
    Purified-protein membrane reconstitution, curvature measurements, systematic
    partner depletion, and structure-guided mutagenesis should distinguish intrinsic
    membrane shaping from cofactor recruitment.
  provenance:
  - reference_id: PMID:38985768
    supporting_text: A critical open question to be addressed is how these tetraspanins may determine vesicle shape and whether they do so by an intrinsic property or by recruiting to vesicles other factors with broad expression in neurons and nonneuronal cells
- gap_statement: >-
    Whether SYNPR has any autonomous ion-channel or solute-channel activity remains
    unestablished.
  boundary: >-
    The protein is a four-pass MARVEL-domain synaptic-vesicle membrane protein, but
    the reviewed literature uses channel language as a putative homology-based model
    and supplies no direct conductance or selectivity assay.
  gap_kind:
  - BIOLOGY
  - CURATION
  dark_aspect: MF_DARK
  status: OPEN
  significance: >-
    Direct evidence is needed before any channel molecular-function term can be
    assigned to SYNPR.
  resolution: >-
    Reconstitute purified SYNPR into defined liposomes or planar bilayers and test
    ion and solute flux over physiologically relevant gradients, with negative and
    positive channel controls.
  provenance:
  - reference_id: file:human/SYNPR/SYNPR-notes.md
    supporting_text: The direct molecular activity of SYNPR has not been established; the early channel designation is putative, and the recent vesicle-size study leaves the mechanism open.
