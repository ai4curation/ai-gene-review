      the core glycogen catabolic/enzymatic function; retained as non-core.
    supported_by:
    - reference_id: PMID:17705025
      supporting_text: reduced ability to mobilize glucose from glycogen
core_functions:
- description: Pyridoxal-5'-phosphate-dependent glycogen phosphorylase that catalyzes
    the rate-limiting step of glycogenolysis, phosphorolytically cleaving alpha-1,4
    glycosidic bonds at the non-reducing ends of glycogen to release glucose-1-phosphate,
    acting as an active homodimer in the cytosol and allosterically activated by AMP.
