  evidence_type: IMP
  original_reference_id: PMID:17705025
  qualifier: involved_in
  review:
    summary: GSD6 caused by PYGL deficiency presents with fasting hypoglycemia,
      demonstrating that PYGL contributes to organismal glucose homeostasis by
      mobilizing glucose from hepatic glycogen. This is a physiological, systemic role
      downstream of the core enzymatic function.
    action: KEEP_AS_NON_CORE
