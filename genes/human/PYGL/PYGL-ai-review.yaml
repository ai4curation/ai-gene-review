id: P06737
gene_symbol: PYGL
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: PYGL is the liver isoform of glycogen phosphorylase, the rate-limiting
  enzyme of glycogenolysis. It is a pyridoxal-5'-phosphate-dependent homodimeric enzyme
  that phosphorolytically cleaves the alpha-1,4-glycosidic bonds at the non-reducing
  ends of glycogen, releasing glucose-1-phosphate, and stops about four residues short
  of alpha-1,6 branch points (which are then processed by the glycogen debranching
  enzyme). Activity is controlled allosterically (activated by AMP; inhibited by ATP,
  ADP and glucose-6-phosphate) and covalently by interconversion between an inactive
  phosphorylase b and an active phosphorylase a form via phosphorylation of Ser15 by
  phosphorylase kinase and dephosphorylation by protein phosphatase 1. The enzyme acts
  in the cytosol, predominantly in the liver, where it liberates glucose from stored
  glycogen to maintain blood glucose during fasting. Loss-of-function variants cause
  glycogen storage disease type VI (Hers disease), characterized by hepatomegaly and
  usually mild fasting hypoglycemia.
