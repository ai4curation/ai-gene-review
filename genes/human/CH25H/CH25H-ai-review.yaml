id: O95992
gene_symbol: CH25H
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  CH25H is cholesterol 25-hydroxylase (EC 1.14.99.38), a polytopic (multi-pass)
  integral membrane enzyme of the endoplasmic reticulum that hydroxylates cholesterol
  at carbon 25 to generate 25-hydroxycholesterol (25-HC), consuming molecular oxygen.
  Unlike most sterol hydroxylases it is not a cytochrome P450; it belongs to the sterol
  desaturase / fatty acid hydroxylase family and uses a diiron cofactor coordinated by
  conserved histidine-box motifs. Its product 25-HC is a potent regulatory oxysterol
  with several roles: it acts as a co-repressor that blocks SREBP processing and thereby
  suppresses cholesterol and lipid biosynthesis; it is an interferon-stimulated,
  broad-spectrum antiviral effector that inhibits entry of many enveloped viruses by
  blocking viral membrane fusion (in part by mobilizing accessible plasma-membrane
  cholesterol via ACAT); and it is an intermediate in the synthesis of
  7alpha,25-dihydroxycholesterol, a ligand for the receptor GPR183/EBI2 that directs
  positioning and chemotaxis of B and T lymphocytes, and it feeds the alternative
  (acidic) bile-acid biosynthetic pathway. The human gene is intronless and located on
  chromosome 10q23.
