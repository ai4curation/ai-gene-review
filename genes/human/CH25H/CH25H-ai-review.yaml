- id: PMID:32944968
  title: Cholesterol 25-Hydroxylase inhibits SARS-CoV-2 and other coronaviruses by
    depleting membrane cholesterol.
  findings: []
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Human primary study (Wang et al., EMBO J 2020, full text available). Shows CH25H is an
      ISG induced by SARS-CoV-2 and that its product 25-HC blocks coronavirus spike-mediated
      membrane fusion by activating ER ACAT and depleting accessible plasma-membrane
      cholesterol. Supports the cholesterol 25-hydroxylase MF and the antiviral BP.
- id: PMID:33239446
  title: Cholesterol 25-hydroxylase suppresses SARS-CoV-2 replication by blocking
    membrane fusion.
  findings: []
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Human primary study (Zang et al., PNAS 2020, full text available). ISG screen
      identifies CH25H as a SARS-CoV-2 restriction factor; a catalytic His-His double mutant
      abolishes 25-HC production and antiviral activity, tying the phenotype to the enzyme's
      catalytic function. Supports the catalytic MF, cholesterol metabolic process, response
      to type I interferon, and the antiviral fusion-blocking BP.
- id: PMID:9852097
  title: cDNA cloning of mouse and human cholesterol 25-hydroxylases, polytopic membrane
    proteins that synthesize a potent oxysterol regulator of lipid metabolism.
  findings: []
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Original cloning and catalytic characterization (Lund et al., JBC 1998; abstract only in
      cache). Establishes cholesterol 25-hydroxylase activity, the polytopic membrane topology,
      the essential histidine clusters, the diiron/non-P450 enzyme family, and the SREBP-blocking
      lipid-regulatory role. Foundational reference for the core function.
- id: Reactome:R-HSA-191983
  title: Cholesterol is hydroxylated to 25-hydroxycholesterol
  findings: []
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: >-
      Reactome reaction correctly capturing the cholesterol->25-HC step. However it is the
      source of the "cytosol" location TAS annotation, which mislocalizes this ER multi-pass
