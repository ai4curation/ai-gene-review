suggested_questions:
- question: Does FKBPL act as a bona fide HSP90 co-chaperone in the classical sense, or primarily as a TPR adaptor that recruits HSP90 to specific clients such as p21?
- question: How is the intracellular HSP90/p21 co-chaperone pool of FKBPL functionally related to the secreted, extracellular anti-angiogenic pool?
- question: Does FKBPL have any residual peptidyl-prolyl isomerase activity given its degenerate FKBP domain, or is it catalytically inert?
suggested_experiments:
- description: Use the HSP90-binding-deficient FKBPL mutant (K287A/R291A) to test whether HSP90 binding is required for FKBPL-dependent p21 stabilization and for radioresistance phenotypes.
- description: Compare intracellular versus recombinant secreted FKBPL for p21 stabilization, HSP90 binding, and anti-angiogenic activity to define the two functional pools.
- description: Affinity purification-mass spectrometry of FKBPL to determine whether HSP90 and p21 are the principal functional partners versus the recurrent ANKRD49/CALCOCO2 interactome hits.
