id: P50336
gene_symbol: PPOX
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  Protoporphyrinogen oxidase (PPOX; PPO; EC 1.3.3.4) is the flavoprotein that catalyses
  the seventh (penultimate) step of heme biosynthesis: the FAD-dependent and oxygen-dependent
  six-electron oxidation of protoporphyrinogen IX to protoporphyrin IX (reaction:
  protoporphyrinogen IX + 3 O2 -> protoporphyrin IX + 3 H2O2). The protein is bound to
  the outer (intermembrane-space-facing) surface of the mitochondrial inner membrane, where
  it acts in the terminal, mitochondrial phase of the pathway feeding protoporphyrin IX to
  ferrochelatase for iron insertion. Each subunit binds one non-covalent FAD cofactor. In
  humans, partial loss of PPOX activity causes variegate porphyria (VP), an autosomal
  dominant acute hepatic porphyria with cutaneous photosensitivity; severe deficiency causes
  autosomal recessive childhood-onset variegate porphyria. PPOX is also the molecular target
  of diphenyl-ether herbicides (e.g. acifluorfen).
