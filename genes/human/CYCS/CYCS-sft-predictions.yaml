  predicted_term_type: GO_BP
  review:
    assessment: COR
    confidence_score: 2
    summary: >-
      GO:0008635 is NOT present in the GOA TSV for CYCS. However, this is biologically
      correct: cytochrome c released from mitochondria binds APAF-1 to form the
      apoptosome, which activates procaspase-9 (a cysteine-type endopeptidase), thereby
      triggering downstream caspase cascades. The curated review explicitly supports
      the intrinsic apoptotic signaling pathway (GO:0097193) and the execution phase
      (GO:0097194). GO:0008635 captures the caspase-activation mechanism accurately.
      This is a biologically sound novel prediction not currently in the GOA.
