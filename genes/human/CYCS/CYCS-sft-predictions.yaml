    summary: >-
      GO:0043280 is not in the GOA for CYCS. The positive regulation of caspase
      activity by cytochrome c is plausible—cytochrome c activates the apoptosome
      which positively regulates caspases. However, the curated review annotates
      more specific terms (GO:0097193, GO:0097194) rather than the regulatory term
