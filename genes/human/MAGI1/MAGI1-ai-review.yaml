id: Q96QZ7
gene_symbol: MAGI1
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  MAGI1 is a large, nonenzymatic membrane-associated guanylate kinase-family
  scaffold containing six PDZ domains, two WW domains, and a guanylate-kinase-like
  domain. It concentrates at epithelial tight and adherens junctions and other
  cell-cell contacts, where it recruits adhesion receptors, signaling regulators,
  and actin-associated proteins into multiprotein assemblies. Through these
  complexes MAGI1 couples junctions to the actin cytoskeleton, promotes mature
  cell-cell adhesion and tight-junction integrity, and modulates junctional RhoA,
  Rap, and Wnt/beta-catenin signaling. Tissue- and isoform-dependent roles also
  occur at podocyte slit-diaphragm and neuronal postsynaptic compartments. High-risk
  papillomavirus E6 proteins bind MAGI1 PDZ domains and can drive MAGI1 degradation,
  thereby disrupting tight junctions.
