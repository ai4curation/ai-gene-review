core_functions:
- description: >-
    Functions as a multivalent molecular adaptor at epithelial and endothelial
    cell-cell junctions: PDZ and WW domains recruit adhesion receptors, signaling
    regulators, and actin-associated proteins into junctional assemblies that couple
    the plasma membrane to the cytoskeleton, promote tight-junction assembly and
    integrity, and strengthen mature cell-cell adhesion.
  molecular_function:
    id: GO:0060090
    label: molecular adaptor activity
  directly_involved_in:
  - id: GO:0070830
    label: bicellular tight junction assembly
  - id: GO:0022409
    label: positive regulation of cell-cell adhesion
  - id: GO:0065003
    label: protein-containing complex assembly
  locations:
  - id: GO:0005923
    label: bicellular tight junction
  - id: GO:0005912
    label: adherens junction
  - id: GO:0005886
    label: plasma membrane
  supported_by:
  - reference_id: PMID:11168587
    supporting_text: MAGI-1/BAP1 serves as a scaffolding molecule for Rap GEP
  - reference_id: PMID:20298433
    supporting_text: Interaction of ESAM with MAGI-1 activated RhoA
  - reference_id: PMID:12042308
    supporting_text: alpha-actinin-4 is also capable of binding to MAGI-1
  - reference_id: PMID:21123374
    supporting_text: restoration is dependent on the presence of MAGI-1
proposed_new_terms: []
suggested_questions:
- question: >-
    Which MAGI1 isoforms execute epithelial tight-junction, podocyte slit-diaphragm,
    and neuronal postsynaptic scaffold functions, and which interactions are genuinely
    isoform-specific rather than simply assayed with one isoform?
  experts:
  - epithelial junction biologists
  - podocyte biologists
  - neuronal MAGI scaffold specialists
- question: >-
    Does the MAGI1 guanylate-kinase-like domain bind nucleotides or partners under
    physiological conditions, and should ATP binding remain annotated without a
    demonstrated catalytic role?
  experts:
  - MAGUK structural biologists
  - GO molecular-function curators
- question: >-
    Which of the hundreds of PDZ-motif interactions detected by fragmentomics occur
    at endogenous abundance in polarized tissues and contribute to junction function?
  experts:
  - quantitative interactomics experts
  - epithelial polarity experts
suggested_experiments:
- description: >-
    Create isoform-specific MAGI1 knockout/rescue panels in human epithelial cells,
    podocytes, and neurons; quantify junction or synapse localization, barrier
    resistance, actin coupling, and endogenous partner recruitment.
  hypothesis: >-
    Alternative MAGI1 termini and internal segments partition a shared molecular-
    adaptor activity into tissue-specific junctional and postsynaptic complexes.
  experiment_type: isoform-specific endogenous rescue and functional imaging
- description: >-
    Reconstitute selected endogenous MAGI1 PDZ/WW interactions at native expression
    levels using domain-selective mutations, proximity labeling, quantitative
    co-immunoprecipitation, and junction barrier assays.
  hypothesis: >-
    A small subset of high-affinity interactions, rather than the full fragmentomics
    interactome, is required for MAGI1-dependent tight-junction assembly and adhesion.
  experiment_type: domain-resolved interaction-to-function perturbation
- description: >-
    Compare purified MAGI1 guanylate-kinase-like domain with canonical guanylate
    kinases using nucleotide-binding, catalytic, and structural assays, followed by
    rescue with nucleotide-pocket mutants in polarized cells.
  hypothesis: >-
    The MAGI1 guanylate-kinase-like domain functions as a noncatalytic interaction
    module rather than an active guanylate kinase.
  experiment_type: biochemical activity and structure-function rescue
