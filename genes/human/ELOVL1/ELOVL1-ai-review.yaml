core_functions:
- description: >-
    Very-long-chain 3-oxoacyl-CoA synthase / fatty acid elongase (EC 2.3.1.199):
    catalyzes the first, rate-limiting condensation step of the ER VLCFA
    elongation cycle, condensing a saturated or monounsaturated very-long-chain
    acyl-CoA with malonyl-CoA to yield a very-long-chain 3-oxoacyl-CoA plus CO2
    and CoA, thereby extending the acyl chain by two carbons per cycle.
  molecular_function:
    id: GO:0009922
    label: fatty acid elongase activity
  supported_by:
  - reference_id: file:human/ELOVL1/ELOVL1-uniprot.txt
    supporting_text: >-
      Catalyzes the first and rate-limiting reaction of the four reactions that
      constitute the long-chain fatty acids elongation cycle
  - reference_id: PMID:20937905
    supporting_text: >-
      the high activity exhibited by ELOVL1 toward saturated and monounsaturated
      C20- and C22-CoAs
  locations:
  - id: GO:0005789
    label: endoplasmic reticulum membrane
- description: >-
    Principal elongase producing saturated and monounsaturated very-long-chain
    fatty acids (extending C22 to C24 to C26); the single elongase making C26:0
    and C26:1, supplying the >=C24 VLCFAs used for sphingolipid, ceramide and
    membrane-lipid synthesis.
  molecular_function:
    id: GO:0009922
    label: fatty acid elongase activity
  supported_by:
  - reference_id: PMID:20166112
    supporting_text: >-
      We identify ELOVL1 (elongation of very-long-chain-fatty acids) as the
      single elongase catalysing the synthesis of both saturated VLCFA (C26:0)
      and mono-unsaturated VLCFA (C26:1).
  locations:
  - id: GO:0005789
    label: endoplasmic reticulum membrane
proposed_new_terms: []
suggested_questions:
- question: >-
    Beyond providing C24-C26 VLCFA/sphingolipid precursors, does ELOVL1 have a
    scaffolding role in organizing the four-component ER elongation machinery
    (ELOVL-KAR-HACD-TECR)?
- question: >-
    How does the dominant p.Ser165Phe variant act (dominant-negative versus
    haploinsufficiency) given that ELOVL1 participates in a multi-enzyme complex?
suggested_experiments:
- description: >-
    Reconstitute the ELOVL1/KAR/HACD/TECR elongation cycle in vitro to quantify
    the chain-length-dependent kcat/KM of the condensation step across C18-C26
    saturated and monounsaturated acyl-CoA substrates.
- description: >-
    Tissue-specific conditional Elovl1 knockout (skin, oligodendrocytes) with
    VLCFA and sphingolipid lipidomics to dissect the myelin versus
    epidermal-barrier contributions.
