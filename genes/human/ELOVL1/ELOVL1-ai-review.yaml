id: Q9BW60
gene_symbol: ELOVL1
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  ELOVL1 (very long chain fatty acid elongase 1; 3-oxoacyl-CoA synthase ELOVL1,
  EC 2.3.1.199) is a multipass endoplasmic reticulum membrane enzyme of the ELO
  family that catalyzes the first and rate-limiting condensation step of the
  microsomal very-long-chain fatty acid (VLCFA) elongation cycle. It condenses a
  long-chain acyl-CoA with malonyl-CoA to yield a 3-oxoacyl-CoA plus CO2 and CoA;
  this 3-oxoacyl-CoA is subsequently reduced, dehydrated and reduced by KAR
  (HSD17B12), HACD1/2 and TECR to complete each two-carbon elongation. ELOVL1 is
  specific for saturated and monounsaturated acyl-CoA substrates and is the
  principal producer of C24-C26 VLCFAs (extending C22 to C24 to C26), with
  highest activity toward C22:0-CoA. Its VLCFA products are precursors of
  membrane lipids and lipid mediators, and are especially important for the
  synthesis of C24 sphingolipids and ceramides (coordinated with the ceramide
  synthase CERS2), contributing to myelin and the epidermal permeability barrier.
  In humans, dominant loss-of-function ELOVL1 variants (recurrent p.Ser165Phe)
  cause ichthyotic keratoderma with spasticity, hypomyelination and dysmorphic
  facies (IKSHD).
