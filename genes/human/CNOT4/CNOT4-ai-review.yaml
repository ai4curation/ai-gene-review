id: O95628
gene_symbol: CNOT4
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  CNOT4 (CCR4-NOT transcription complex subunit 4, the human ortholog of
  yeast Not4) is a RING-type E3 ubiquitin-protein ligase. Its N-terminal atypical
  C4C4 RING domain pairs selectively with E2 ubiquitin-conjugating enzymes of the
  UBE2D/UbcH5 (UBC4/5) subfamily, most prominently UBE2D2 (UbcH5B), and catalyzes
  the transfer of ubiquitin from the E2 onto substrate lysines, building polyubiquitin
  chains; the enzyme is also autoubiquitinated. Beyond the RING, CNOT4 contains an
  RRM and a C3H1-type zinc finger and a large disordered C-terminus. CNOT4 is a
  peripheral, substoichiometric subunit of the CCR4-NOT complex, the major eukaryotic
  cytoplasmic mRNA deadenylase and a global regulator of mRNA turnover and translation;
  in human and Drosophila cells CNOT4 is only loosely/transiently associated with
  the holocomplex (it binds the CNOT1 scaffold and the CAF40/CNOT9 subunit via a
  CAF40-binding motif) rather than being a stable core subunit. Its ubiquitin-ligase
  activity is linked to co-translational and RNA quality control - it ubiquitinates
  ABCE1 (K48-linked) upon mitochondrial damage to trigger PINK1-directed mitophagy,
  and ubiquitinates methylated RBM15 to control RNA splicing and megakaryocyte
  differentiation. CNOT4 localizes to the cytoplasm (including P-bodies and stress
  granules) and nucleus.
