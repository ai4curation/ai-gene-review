proposed_new_terms: []
suggested_questions:
- question: In human cells, what fraction of cellular CNOT4 is associated with the
    CCR4-NOT holocomplex versus free or in distinct assemblies, and is its E3 ligase
    activity regulated by this association?
- question: Does human CNOT4 act as a ribosome-associated E3 ligase that ubiquitinates
    nascent chains or ribosomal proteins during co-translational quality control,
    as shown for yeast/Drosophila Not4, and what are the direct substrates?
- question: What is the physiological substrate repertoire and ubiquitin chain-type
    specificity (K48 vs K63 etc.) of human CNOT4, and how is substrate selection achieved
    given the absence of a dedicated substrate-recognition module beyond the RRM/zinc
    fingers?
suggested_experiments:
- experiment: Define the in vivo CNOT4 substrate landscape using proximity-labeling
    (BioID/TurboID) combined with ubiquitin-remnant (diGly) proteomics in cells expressing
    WT versus RING-dead (e.g. E49 mutant) CNOT4.
- experiment: Reconstitute CNOT4 E3 activity in vitro with UBE2D-family E2s and candidate
    substrates (ABCE1, RBM15, ribosomal proteins) to determine ubiquitin linkage specificity
    and the contribution of the RRM and C3H1 zinc finger to substrate selection.
- experiment: Use selective ribosome profiling and ubiquitination assays on stalled
    ribosomes to test whether human CNOT4 ubiquitinates nascent chains/ribosomal proteins
    during ribosome-associated quality control.
- experiment: Quantify CNOT4 association with the CCR4-NOT holocomplex by quantitative
    mass spectrometry and size-exclusion/IP across conditions to determine stoichiometry
    and whether stress or mitochondrial damage modulates its recruitment.
