suggested_questions:
- question: How is GET4/TRC35 partitioned between the productive TA-targeting branch (loading onto GET3) and the quality-control/ERAD holdase branch of the Bag6 complex, and what determines the choice?
- question: Do the disease-causing GET4 variants impair TA targeting primarily through loss of complex stability, or also through specific disruption of the GET4-GET3 loading interface?
suggested_experiments:
- description: Reconstitute the SGTA -> BAG6/UBL4A/GET4 -> GET3 handoff with purified wild-type and interface-mutant GET4 to quantify how the GET4-GET3 composite lid controls TA loading kinetics and fidelity.
