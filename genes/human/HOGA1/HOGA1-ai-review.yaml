gene_symbol: HOGA1
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: HOGA1 (4-hydroxy-2-oxoglutarate aldolase, mitochondrial; EC 4.1.3.16;
  formerly DHDPSL/C10orf65) is a mitochondrial matrix enzyme that catalyzes the final
  step of the hydroxyproline (4-hydroxyproline) degradation pathway, performing the
  retro-aldol cleavage of 4-hydroxy-2-oxoglutarate (HOG) into glyoxylate and pyruvate.
  It belongs to the dihydrodipicolinate synthase (DapA/DHDPS) family and functions
  as a Schiff-base (type I) aldolase, using an active-site lysine (Lys196) as the
  catalytic nucleophile; the enzyme is active against both the (4R) and (4S) enantiomers
  of HOG. The mature protein, produced after cleavage of an N-terminal mitochondrial
  transit peptide, assembles into a homotetramer (dimer of dimers). HOGA1 is expressed
  most highly in kidney and liver, the principal sites of hydroxyproline turnover.
  Loss-of-function variants cause primary hyperoxaluria type 3 (PH3/HP3), an autosomal-recessive
  disorder of endogenous oxalate synthesis characterized by calcium oxalate urolithiasis.
