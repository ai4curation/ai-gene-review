proposed_new_terms: []
suggested_questions:
- question: Given that HOGA1 produces glyoxylate (an oxalate precursor), what is the
    precise mechanism by which HOGA1 loss-of-function causes hyperoxaluria in PH3 -
    accumulation of HOG or upstream intermediates, dominant-negative effects, or dysregulation
    of glyoxylate detoxification?
suggested_experiments:
- description: Metabolomic quantification of HOG, glyoxylate, and oxalate in HOGA1-deficient
    versus wild-type hepatocyte/renal models to test whether HOG accumulation (rather
    than loss of glyoxylate production) drives the hyperoxaluric phenotype.
