- term:
    id: GO:0042803
    label: protein homodimerization activity
  evidence_type: IDA
  original_reference_id: PMID:21998747
  qualifier: enables
  review:
    summary: Structural study shows HOGA1 assembles via a "tight" dimer interface
      into a homotetramer (dimer of dimers); the active site lies at the dimer interface.
    action: ACCEPT
    reason: The crystal structure directly demonstrates self-association. The biological
      assembly is a homotetramer, but it is built as a dimer of dimers, and the active
      site is formed at the tight dimer interface (a residue from the adjacent monomer,
      Tyr140', contributes to the active site), so homodimerization is a genuine,
      structurally-supported self-association activity. UniProt records the assembly
      as a homotetramer.
    supported_by:
    - reference_id: PMID:21998747
      supporting_text: reveal a tetrameric structure composed of a dimer of dimers
    - reference_id: file:human/HOGA1/HOGA1-uniprot.txt
      supporting_text: 'SUBUNIT: Homotetramer'
