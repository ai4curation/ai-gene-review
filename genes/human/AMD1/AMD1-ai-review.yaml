core_functions:
- description: >-
    S-adenosylmethionine decarboxylase (AdoMetDC): pyruvoyl-dependent decarboxylation of
    S-adenosyl-L-methionine to decarboxylated SAM (S-adenosyl 3-(methylsulfanyl)propylamine)
    plus CO2, providing the aminopropyl-group donor that commits SAM to polyamine
    biosynthesis. The catalytic pyruvoyl cofactor is generated autocatalytically from
    internal Ser-68.
