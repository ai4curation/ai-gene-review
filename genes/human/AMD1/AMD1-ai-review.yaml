proposed_new_terms: []
suggested_questions:
- question: >-
    Beyond its metabolic role, does the reported function of AMD1/AdoMetDC in maintaining
    embryonic stem cell self-renewal via spermine levels apply to human cells, or is this
    inferred only by similarity to other species?
suggested_experiments:
- hypothesis: >-
    AdoMetDC activity is rate-limiting for the synthesis of both spermidine and spermine in
    human cells.
  description: >-
    Quantify intracellular dcSAM, spermidine, and spermine pools in AMD1-knockout versus
    wild-type human cells to confirm the obligatory dependence of both spermidine and spermine
    biosynthesis on AdoMetDC activity.
