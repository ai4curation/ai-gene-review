  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Original cloning of human/rat AdoMetDC establishing gene identity and enzyme activity;
      supports GO:0004014 (cited as EXP).
- id: PMID:2687270
  title: Site of pyruvate formation and processing of mammalian S-adenosylmethionine
