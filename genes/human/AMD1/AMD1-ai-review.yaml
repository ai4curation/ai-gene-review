  label: Homo sapiens
description: >-
  AMD1 encodes S-adenosylmethionine decarboxylase (AdoMetDC/SAMDC; EC 4.1.1.50), a
  pyruvoyl-group-dependent decarboxylase that catalyzes the rate-controlling step
  committing S-adenosyl-L-methionine (SAM) to polyamine biosynthesis. It decarboxylates
  SAM to S-adenosyl 3-(methylsulfanyl)propylamine (decarboxylated SAM, dcSAM), the
  essential aminopropyl-group donor used by spermidine synthase and spermine synthase to
  convert putrescine into spermidine and spermidine into spermine. The enzyme is
  synthesized as an inactive proenzyme that undergoes autocatalytic self-cleavage at the
  Glu67-Ser68 bond, generating a beta chain and an alpha chain and converting internal
  Ser-68 into an N-terminal pyruvoyl prosthetic group that acts as the catalytic cofactor;
  the mature enzyme is a heterotetramer of two alpha and two beta chains. Both proenzyme
  processing and catalytic activity are allosterically stimulated by putrescine. AdoMetDC
  is a soluble cytosolic enzyme and a validated drug target in polyamine-dependent cancers
  and parasitic disease.
