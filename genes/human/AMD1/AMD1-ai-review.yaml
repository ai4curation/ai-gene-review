- id: PMID:10029540
  title: Role of cysteine-82 in the catalytic mechanism of human S-adenosylmethionine
    decarboxylase.
  findings:
  - statement: >-
      Human AdoMetDC forms a Schiff base with S-adenosylmethionine through the pyruvoyl
      moiety, facilitating CO2 release; Cys-82 is proposed as the proton donor of the
      decarboxylation reaction.
    reference_section_type: ABSTRACT
    supporting_text: >-
      The enzyme forms a Schiff base with substrate, S-adenosylmethionine, through the
      pyruvoyl moiety. This facilitates the release of CO2 from the substrate
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Directly characterizes the catalytic mechanism of human AdoMetDC; supports the core
      adenosylmethionine decarboxylase activity (GO:0004014). Cited as EXP for GO:0004014.
- id: PMID:10574985
  title: Mechanistic studies of the processing of human S-adenosylmethionine decarboxylase
    proenzyme. Isolation of an ester intermediate.
  findings:
  - statement: >-
      Human AdoMetDC is synthesized as a proenzyme that undergoes autocatalytic cleavage
      forming the pyruvate prosthetic group from internal Ser-68; Ser-229 and His-243 are
      required for the processing reaction.
    reference_section_type: ABSTRACT
    supporting_text: >-
      forming the pyruvate prosthetic group, which is derived from an internal Ser residue
      (Ser-68)
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Characterizes the autocatalytic self-processing that generates the catalytic pyruvoyl
      cofactor; supports the core catalytic activity. Cited as EXP for GO:0004014.
- id: PMID:11583147
  title: The structural basis for substrate specificity and inhibition of human S-adenosylmethionine
    decarboxylase.
  findings:
  - statement: >-
      Crystal structures of human AdoMetDC define substrate binding and place catalytic
      residues Cys82, Ser229, and His243 near the methionyl group of SAM; one putrescine is
      bound per monomer distal to the active site.
    reference_section_type: ABSTRACT
    supporting_text: >-
      The catalytically important residues Cys82, Ser229, and His243 are positioned near
      the methionyl group of the substrate.
  - statement: >-
      Putrescine binds one molecule per monomer between the two beta-sheets, far from the
      active site, consistent with an allosteric activation mechanism.
    reference_section_type: ABSTRACT
    supporting_text: >-
      One molecule of putrescine per monomer is observed between the two beta-sheets but far
      away from the active site.
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Source of the human AdoMetDC crystal structures; cited as IDA for GO:0004014 and is the
      UniProt evidence for the pyruvate cofactor and heterotetramer subunit structure.
- id: PMID:1917972
  title: Amino acid residues necessary for putrescine stimulation of human S-adenosylmethionine
    decarboxylase proenzyme processing and catalytic activity.
  findings:
  - statement: >-
      Mutagenesis of human AdoMetDC shows Glu8, Glu11, and Cys82 are essential for catalytic
      activity, with Glu11 also essential for putrescine stimulation of proenzyme processing.
    reference_section_type: ABSTRACT
    supporting_text: >-
      Glu8, Glu11, and Cys82 are essential for catalytic activity, with Glu11 also being
      essential for the putrescine stimulation of AdoMet decarboxylase proenzyme processing
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Establishes catalytically essential residues and the role of putrescine in stimulating
      processing; supports GO:0004014 (cited as TAS).
- id: PMID:2460457
  title: Structure and regulation of mammalian S-adenosylmethionine decarboxylase.
  findings:
  - statement: >-
      Human AdoMetDC cDNA encodes a 334-aa proenzyme that is processed into two polypeptides
