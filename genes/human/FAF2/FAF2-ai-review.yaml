proposed_new_terms: []
suggested_questions:
- question: To what extent does FAF2's UAS-domain unsaturated-fatty-acid sensing directly gate its ER-to-lipid-droplet partitioning and ATGL inhibition under different metabolic states?
- question: Is FAF2's role in p97-dependent dislocation of Insig-1 (SREBP regulation) mechanistically separable from its general ERAD substrate-extraction adaptor activity?
suggested_experiments:
- description: Reconstitute p97/VCP-dependent extraction of a defined ubiquitinated ERAD substrate with purified FAF2, UFD1-NPL4 and p97 to test whether FAF2 is sufficient as the substrate-recruiting cofactor and to map its UBA-dependence.
- description: Use proximity labeling (BioID/TurboID) of FAF2 in cells shifted between fed and lipolytic states to define how the ER versus lipid-droplet interactomes (including UBAC2, ATGL, CGI-58) change with metabolic condition.
- description: Quantitative degradation assays of endogenous ERAD substrates (e.g. NHK alpha-1-antitrypsin) and lipid-droplet ATGL turnover in FAF2 UBA-domain and UBX-domain point mutants to dissociate the ubiquitin-binding from the p97-recruiting contributions.
