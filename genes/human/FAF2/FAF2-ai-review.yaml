- id: file:human/FAF2/FAF2-uniprot.txt
  title: UniProt entry Q96CS3 (FAF2_HUMAN), FAS-associated factor 2 / UBXD8
  findings:
  - statement: FAF2/UBXD8 is a UBA-UAS-UBX p97/VCP cofactor at the ER membrane and lipid droplets, functioning in ERAD substrate dislocation, ATGL inhibition/lipid-droplet regulation, and stress-granule disassembly.
    reference_section_type: OTHER
- id: PMID:26389662
  title: Systematic proteomics of the VCP-UBXD adaptor network identifies a role for UBXN10 in regulating ciliogenesis.
  findings:
  - statement: Systematic AP-MS of the human VCP/p97-UBXD adaptor network places FAF2/UBXD8 among the membrane-tethered UBXD adaptors linked to ERAD and lipid-droplet homeostasis, recovering interactors such as AMFR, DERLIN2, AUP1, BAG6 and UBAC2 and the shared UFD1L/NPLOC4 module.
    reference_section_type: ABSTRACT
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: PubMed-verified (Nat Cell Biol 2015;17(10):1356-69; DOI 10.1038/ncb3238; PMC4610257). Falcon deep-research finding. Systematic VCP-UBXD adaptor interactome that classifies FAF2/UBXD8 as a membrane-tethered p97 adaptor with ERAD/lipid-droplet interactors; corroborates the p97-cofactor/adaptor core function. Not cached in publications/, so no verbatim supporting_text added to annotations.
- id: PMID:35920641
  title: Multiple UBX proteins reduce the ubiquitin threshold of the mammalian p97-UFD1-NPL4 unfoldase.
  findings:
  - statement: In reconstituted CMG-helicase disassembly assays, FAF2 (together with UBXN7 and FAF1) acts as a UBX cofactor that lowers the high ubiquitin-chain-length threshold of mammalian p97-UFD1-NPL4, stabilising productive interactions between UFD1-NPL4 and K48-linked chains of at least five ubiquitins; FAF1/FAF2 use a previously uncharacterised coiled-coil domain rather than the UBA domain.
    reference_section_type: ABSTRACT
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: PubMed-verified (eLife 2022;11:e76763; DOI 10.7554/eLife.76763). Falcon deep-research finding. Mechanistic in vitro demonstration that FAF2 stimulates p97-UFD1-NPL4 unfoldase activity (UBX-dependent, UBA-dispensable, coiled-coil required), supporting the p97-cofactor/adaptor core function. Not cached in publications/, so no verbatim supporting_text added to annotations.
- id: PMID:36746962
  title: The p97-UBXD8 complex regulates ER-Mitochondria contact sites by altering membrane lipid saturation and composition.
  findings:
  - statement: The p97-UBXD8/FAF2 complex localises to ER-mitochondria contact sites (ERMCS) and limits excessive contacts in a p97-catalytic-activity-dependent manner; loss of UBXD8 increases membrane lipid saturation via the SREBP1-SCD1 axis, and aberrant contacts are rescued by unsaturated fatty acids or SCD1 overexpression.
    reference_section_type: ABSTRACT
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: PubMed-verified (Nat Commun 2023;14:638; DOI 10.1038/s41467-023-36298-2). Falcon deep-research finding. New 2023 function — FAF2/UBXD8 with p97 regulates ER-mitochondria contact sites and membrane lipid saturation (SREBP1-SCD1); not represented in current GOA. Not cached in publications/, so no verbatim supporting_text added to annotations.
- id: PMID:39472561
  title: AAA+ ATPase chaperone p97/VCPFAF2 governs basal pexophagy.
  findings:
  - statement: FAF2/UBXD8, with p97/VCP (NPLOC4/UFD1), maintains peroxisome homeostasis by extracting ubiquitylated peroxisomal membrane proteins such as PMP70; in FAF2-deficient cells PMP70 accumulates, recruiting the autophagy adaptor OPTN to peroxisomes and inducing basal pexophagy, so FAF2-p97 negatively regulates pexophagy rather than acting in peroxisome biogenesis.
    reference_section_type: ABSTRACT
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: PubMed-verified (Nat Commun 2024;15:9347; DOI 10.1038/s41467-024-53558-x). Falcon deep-research finding. New 2024 function — FAF2/UBXD8 with p97 extracts ubiquitylated peroxisomal membrane proteins (PMP70) to suppress basal pexophagy; not represented in current GOA. Not cached in publications/, so no verbatim supporting_text added to annotations.
- id: PMID:41258083
  title: A UBH-UBX module amplifies p97/VCP's unfolding power to facilitate protein extraction and degradation.
  findings:
  - statement: FAF2 contains a conserved ubiquitin-binding helix (UBH) adjacent to its UBX domain; the UBH-UBX module enhances engagement of ubiquitinated substrates with p97-UFD1L-NPLOC4 and boosts the motor's ATPase and unfolding activities ~2-fold, with reconstituted p97-UFD1L-NPLOC4-FAF2 sufficient to extract membrane proteins from the ER and mitochondria. FAF2 knockout stabilised the ERAD client CD4.
    reference_section_type: ABSTRACT
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: PubMed-verified (Nat Commun 2025;16:10162; DOI 10.1038/s41467-025-65166-4). Falcon deep-research finding. Identifies a UBH ubiquitin-binding element in FAF2 that amplifies p97 unfolding power for membrane-protein extraction, refining the ubiquitin-binding/adaptor core function. Not cached in publications/, so no verbatim supporting_text added to annotations.
core_functions:
- description: Ubiquitin-binding adaptor (via its N-terminal UBA domain) that recognizes polyubiquitinated client proteins and, through its C-terminal UBX domain, recruits the p97/VCP segregase, coupling ubiquitinated substrates to ATP-driven extraction.
