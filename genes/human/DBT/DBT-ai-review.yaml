- term:
    id: GO:0042645
    label: mitochondrial nucleoid
  evidence_type: IDA
  original_reference_id: PMID:18063578
  qualifier: located_in
  review:
    summary: DBT was identified among proteins in biochemically purified mitochondrial
      nucleoid preparations, but this study distinguished a core set of nucleoid proteins
      that crosslink to mtDNA from peripheral metabolic proteins that do not.
    action: MARK_AS_OVER_ANNOTATED
    reason: DBT is a soluble matrix metabolic enzyme; its recovery in native nucleoid
      preparations reflects co-purification/peripheral association rather than a genuine
      nucleoid localization or a role in mtDNA transactions. The paper explicitly
      contrasts core nucleoid proteins that crosslink to mtDNA with additional metabolic
      proteins that do not. Retained (not removed) as it derives from an experimental
      IDA whose full text is not available, but flagged as an over-annotation of the
