- term:
    id: GO:0043754
    label: dihydrolipoamide branched chain acyltransferase activity
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: enables
  review:
    summary: Core molecular function. DBT is the E2 dihydrolipoyllysine-residue (2-methylpropanoyl)transferase
      (EC 2.3.1.168) that transfers the branched-chain acyl group from the E1-generated
      intermediate to CoA. This is the defining catalytic activity of DBT and is well
      supported by biochemistry and phylogeny.
    action: ACCEPT
    reason: This is the primary, defining molecular function of DBT as the E2 transacylase
      of the BCKDH complex. UniProt annotates EC 2.3.1.168 with three branched-chain
      acyl-CoA-forming reactions, and the phylogenetic inference is consistent with
      the conserved 2-oxoacid dehydrogenase E2 role.
    supported_by:
    - reference_id: PMID:3593587
      supporting_text: NAD and CoASH were absolutely required for the reaction.
