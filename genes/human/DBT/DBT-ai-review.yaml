    relevance: HIGH
    correctness: VERIFIED
    review_notes: Direct biochemical characterization of the purified human liver
      BCKDH complex; primary support for the branched-chain keto acid oxidative decarboxylation
      / BCAA catabolic function and matrix localization of the complex containing
      the DBT/E2 subunit.
