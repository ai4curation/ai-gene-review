    summary: Protein binding annotation from the structural/biochemical characterization
      of the BCKDH phosphatase (BDP/PPM1K, Q8N3J5). This captures the biologically
      meaningful interaction between the DBT/E2 core and the regulatory phosphatase,
      but the GO term itself (bare protein binding) is uninformative.
