      keto acids KIV, KIC, and KMV (from valine, leucine, isoleucine) with Km 14-17
      microM, and absolutely requires NAD and CoASH.
    supporting_text: The BCKADH effectively oxidized all of KIV, KIC, and KMV, yielding
      apparent Km values in the range of 14-17 microM for those alpha-keto acids.
