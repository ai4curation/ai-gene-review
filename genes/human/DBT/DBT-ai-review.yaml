  evidence_type: IEA
  original_reference_id: GO_REF:0000107
  qualifier: involved_in
  review:
    summary: DBT participates in isoleucine catabolism as the E2 subunit acting on
      the isoleucine-derived branched-chain keto acid (KMV / alpha-keto-beta-methylvalerate).
    action: KEEP_AS_NON_CORE
