id: P11182
gene_symbol: DBT
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: DBT encodes the E2 core subunit (dihydrolipoyllysine-residue (2-methylpropanoyl)transferase
  / dihydrolipoamide branched-chain transacylase, EC 2.3.1.168) of the mitochondrial
  branched-chain alpha-ketoacid dehydrogenase (BCKDH/BCKDC) complex. The mature protein
  is imported into the mitochondrial matrix, where 24 identical DBT monomers assemble
  into a cubic 24-mer that forms the structural core of the complex; multiple copies
  of the E1 decarboxylase (BCKDHA/BCKDHB heterotetramer) and the E3 dihydrolipoyl
  dehydrogenase (DLD dimer) dock onto this core. DBT carries a covalently attached
  lipoyl group on a conserved lysine (N6-lipoyllysine, Lys105) within its N-terminal
  lipoyl-binding domain; this lipoyl "swinging arm" accepts the branched-chain acyl
  group generated by E1-catalyzed oxidative decarboxylation and transfers it to coenzyme
  A, producing the corresponding branched-chain acyl-CoA (isovaleryl-CoA, 2-methylbutyryl-CoA,
  or isobutyryl-CoA) and regenerating the reduced lipoyl group for reoxidation by
  E3. The complex catalyzes the committed, rate-limiting oxidative decarboxylation
  step in the catabolism of the branched-chain amino acids leucine, isoleucine, and
  valine. The DBT/E2 core also serves as the docking platform for the regulatory kinase
  BCKDK and phosphatase PPM1K that control complex activity via reversible phosphorylation
  of the E1-alpha subunit. Loss-of-function variants in DBT cause maple syrup urine
  disease type II; the lipoyl domain of DBT (BCOADC-E2) is also a major mitochondrial
  autoantigen in primary biliary cholangitis.
