proposed_new_terms: []
suggested_questions:
- question: >-
    Is the epsilon subunit's role in incorporating subunit c into the c-ring rotor mechanistically
    distinct from its role in stabilizing the F1 central stalk, and can these be separated by
    targeted variants?
suggested_experiments:
- description: >-
    Structure-guided mutagenesis of the epsilon central-stalk contacts to dissect its contributions
    to F1 assembly versus rotary coupling, assayed by blue-native PAGE assembly profiling and
    oligomycin-sensitive ATP synthesis/hydrolysis measurements.
  hypothesis: >-
    Distinct epsilon surfaces mediate F1 assembly/subunit-c incorporation versus stabilization of
    the rotating central stalk during catalysis.
  experiment_type: structure-guided mutagenesis with native-complex and activity assays
