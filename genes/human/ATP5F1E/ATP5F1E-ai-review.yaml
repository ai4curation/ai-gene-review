core_functions:
- description: >-
    Structural (non-catalytic) subunit of the central stalk of mitochondrial ATP synthase
    (Complex V): as one of the gamma/delta/epsilon central-stalk subunits it maintains the
    integrity of, and transmits rotation within, the rotary F1Fo enzyme in the mitochondrial
    inner membrane, thereby contributing to proton motive force-driven ATP synthesis. It is
    also required for assembly/biogenesis of the F1 sector.
  molecular_function:
    id: GO:0005198
    label: structural molecule activity
  contributes_to_molecular_function:
    id: GO:0046933
    label: proton-transporting ATP synthase activity, rotational mechanism
  directly_involved_in:
