    F1-c-ring and b-e-g complex.
  findings: []
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified. Characterizes assembly of the human ATP synthase via a central rotor
      (F1-c-ring) and stator (b-e-g) intermediate; supports epsilon's complex membership and
      the rotary-motor description. Basis for the ComplexPortal NAS annotations.
