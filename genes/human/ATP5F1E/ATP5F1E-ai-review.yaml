id: P56381
gene_symbol: ATP5F1E
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  ATP5F1E is the epsilon subunit of the F1 catalytic head of mitochondrial ATP synthase
  (Complex V, F1Fo-ATP synthase), a nuclear-encoded 51-residue protein. Together with the
  gamma and delta subunits it forms the central stalk that rotates inside the alpha3beta3
  catalytic head, coupling proton translocation through the membrane Fo sector to ATP
  synthesis in F1. Epsilon is a structural, non-catalytic subunit: it does not itself carry
  out ATP synthesis but is required for assembly and biogenesis of the F1 part, including
  incorporation of subunit c into the c-ring rotor. The complex is embedded in the
  mitochondrial inner membrane, with the F1 head projecting into the matrix. In vivo the
  enzyme synthesizes ATP driven by the proton-motive force generated by the respiratory
  chain; its ATP-hydrolase activity is only an artificial in-vitro reversal. Loss-of-function
  variants (e.g. p.Tyr12Cys) cause mitochondrial complex V (ATP synthase) deficiency,
  nuclear type 3, presenting with lactic acidosis, 3-methylglutaconic aciduria, and
  peripheral neuropathy.
