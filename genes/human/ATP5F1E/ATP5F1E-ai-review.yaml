    supporting_text: "Biological energy currency ATP is produced by F1Fo-ATP synthase"
  - reference_id: PMID:20566710
    supporting_text: "essential role of the epsilon subunit in the biosynthesis and assembly of the F1"
  - reference_id: file:human/ATP5F1E/ATP5F1E-uniprot.txt
