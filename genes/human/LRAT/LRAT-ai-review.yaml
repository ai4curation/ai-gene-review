- term:
    id: GO:0019841
    label: retinol binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000107
  qualifier: enables
  review:
    summary: >-
      Electronic annotation (Ensembl Compara transfer from rat) to retinol
      binding. LRAT binds all-trans-retinol transiently as a catalytic substrate
      (indeed it preferentially uses retinol presented by cellular
      retinol-binding protein), so it necessarily interacts with retinol; but the
      standalone "retinol binding" molecular-function term normally denotes a
      soluble retinoid-carrier/transport function (e.g. CRBP/RBP) rather than an
      enzyme's substrate handling. The catalytic activity term GO:0047173 already
      captures the retinol-utilizing function, so this binding term is retained as
      non-core rather than as an independent molecular function.
    action: KEEP_AS_NON_CORE
    reason: >-
      Reflects substrate binding subsumed by the catalytic MF (GO:0047173); not
      an independent carrier/binding function.
