- term:
    id: GO:0001972
    label: retinoic acid binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000107
  qualifier: enables
  review:
    summary: >-
      Electronic annotation (Ensembl Compara transfer from rat) to retinoic acid
      binding. LRAT's characterized substrate is all-trans-retinol (not retinoic
      acid), and there is no experimental evidence that human LRAT is a
      retinoic-acid-binding protein; retinoic acid instead acts upstream to
      induce LRAT expression. This binding term is a mispropagated electronic
      inference rather than a molecular function of the enzyme.
    action: REMOVE
    reason: >-
      Unsupported IEA transferred from ortholog; LRAT acts on retinol, not
      retinoic acid, and no evidence supports retinoic-acid binding as a
      molecular function.
