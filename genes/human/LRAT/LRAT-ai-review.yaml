id: O95237
gene_symbol: LRAT
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  LRAT (lecithin retinol acyltransferase; phosphatidylcholine--retinol
  O-acyltransferase; EC 2.3.1.135) is an endoplasmic reticulum membrane enzyme
  that catalyzes the first storage/entry step of retinoid (vitamin A) metabolism
  and of the visual (retinoid) cycle. It transfers an acyl group from the sn-1
  position of phosphatidylcholine (lecithin) onto all-trans-retinol to produce
  all-trans-retinyl esters, the storage form of vitamin A and the substrate for
  the RPE65 isomerohydrolase. LRAT is a thiol acyltransferase that forms an
  acyl-thioester catalytic intermediate on an essential active-site cysteine
  (Cys161), and belongs to the H-rev107 (HRASLS) family. It is a single-pass ER
  membrane protein with a large cytoplasmic domain and a C-terminal
  transmembrane anchor. In the retinal pigment epithelium LRAT provides the
  retinyl-ester substrate whose isomerohydrolysis and oxidation regenerate the
  11-cis-retinal chromophore, so it is required for normal vision and
  photoreceptor maintenance; in liver (hepatic stellate cells) and intestine it
  drives retinoid storage. Biallelic loss-of-function variants cause Leber
  congenital amaurosis 14 and related early-onset severe retinal dystrophy /
  retinitis pigmentosa.
