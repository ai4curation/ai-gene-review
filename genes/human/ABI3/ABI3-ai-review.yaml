- term:
    id: GO:0098794
    label: postsynapse
  evidence_type: IEA
  original_reference_id: GO_REF:0000107
  review:
    summary: >-
      IEA annotation transferred from rat ortholog via Ensembl Compara. ISS annotations
      from ARUK-UCL also support postsynaptic localization (dendritic spine, postsynaptic
