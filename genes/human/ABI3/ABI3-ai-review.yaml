suggested_questions:
- question: Does ABI3 directly bind actin filaments, or does it solely function 
    as an adaptor within the WRC?
- question: Is ABI3 expressed in neurons as well as microglia, and does it have 
    neuron-specific functions?
- question: How does the S209F Alzheimer disease risk variant affect ABI3 
    incorporation into the WRC and microglial function?
- question: What is the precise mechanism by which ABI3 phosphorylation at 
    S213/S216/S342 regulates its WRC incorporation?
suggested_experiments:
- description: Direct actin filament binding assays (e.g., co-sedimentation) 
    with purified ABI3 protein to test whether ABI3 has intrinsic actin-binding 
    activity
- description: Single-cell RNA-seq or spatial transcriptomics to clarify ABI3 
    expression across brain cell types in human tissue
- description: In vitro WRC reconstitution with ABI3 vs ABI1 to measure 
    differences in Arp2/3 activation kinetics
- description: CRISPR knock-in of the S209F variant in human iPSC-derived 
    microglia to assess effects on migration, phagocytosis, and WRC dynamics
