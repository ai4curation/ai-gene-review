core_functions:
- description: >-
    As the liver alpha regulatory subunit, PHKA2 binds calmodulin (the delta subunit)
    and is a component of the phosphorylase kinase holoenzyme, contributing to its
    Ca2+- and phosphorylation-regulated phosphorylase kinase activity while being itself
    non-catalytic. Through the complex it drives cytosolic glycogen catabolism.
