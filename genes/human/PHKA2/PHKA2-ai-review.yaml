suggested_questions:
- question: >-
    Does the C-terminal cysteine of PHKA2 undergo farnesylation in vivo, and if so, does
    it target a fraction of the complex to membranes, or is the functionally dominant
    pool cytosolic?
- question: >-
    Which specific PKA (and autocatalytic) phosphorylation sites on the PHKA2 alpha
    subunit mediate activation of the holoenzyme, and how do GSD9A missense variants
    perturb this regulation versus simply destabilizing the complex?
suggested_experiments:
- description: >-
    Reconstitute the liver holoenzyme with wild-type versus GSD9A-variant PHKA2 and
    measure Ca2+/calmodulin- and PKA-phosphorylation-dependent activation of glycogen
    phosphorylase to distinguish assembly defects from regulatory defects.
- description: >-
    Determine the subcellular distribution of endogenous PHKA2 in hepatocytes (cytosol
    versus membrane) and test whether inhibiting prenylation redistributes the complex.
