id: P46019
gene_symbol: PHKA2
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  PHKA2 encodes the liver isoform of the alpha regulatory subunit of phosphorylase
  kinase (PhK). PhK is a large hexadecameric (alpha-beta-gamma-delta)4 holoenzyme in
  which the gamma subunit (PHKG1 in muscle, PHKG2 in liver) is the catalytic
  serine/threonine kinase and the large alpha (PHKA1/PHKA2) and beta (PHKB) subunits
  are regulatory; the delta subunit is calmodulin, conferring Ca2+ sensitivity. PHKA2
  is itself non-catalytic: as a regulatory subunit it is a target of cAMP-dependent
  (PKA) phosphorylation which, together with Ca2+/calmodulin, relieves inhibition and
  activates the catalytic gamma subunit. The activated holoenzyme phosphorylates
  glycogen phosphorylase (b to a), triggering glycogenolysis; PhK thereby couples
  hormonal and neural signals to hepatic glycogen breakdown. PHKA2 binds calmodulin
  and acts in the cytosol. Loss-of-function variants in PHKA2 cause X-linked liver
  phosphorylase kinase deficiency (glycogen storage disease type IXa, GSD9A), the most
  common form of PhK deficiency, characterized by hepatomegaly and growth retardation
  that are usually mild and improve with age.
existing_annotations:
- term:
    id: GO:0005964
    label: phosphorylase kinase complex
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: part_of
  review:
    summary: >-
      Phylogenetically inferred membership in the phosphorylase kinase complex. This
      is the defining, core cellular-component assignment for PHKA2 as the liver alpha
      regulatory subunit of the (alpha-beta-gamma-delta)4 holoenzyme.
    action: ACCEPT
    reason: >-
      Strongly supported: PHKA2 is one of the alpha subunits of the phosphorylase
      kinase holoenzyme. UniProt SUBUNIT describes the complex composition and assigns
      alpha/beta as regulatory subunits, consistent with this IBA assignment.
    supported_by:
    - reference_id: file:human/PHKA2/PHKA2-uniprot.txt
      supporting_text: "beta, gamma, and delta subunits. Alpha (PHKA1 or PHKA2) and beta (PHKB)"
- term:
    id: GO:0004689
    label: phosphorylase kinase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000117
  qualifier: enables
  review:
    summary: >-
      ARBA electronic assertion that PHKA2 enables phosphorylase kinase activity. This
      is the activity of the holoenzyme, catalyzed by the gamma subunit (PHKG1/PHKG2);
      the alpha subunit is regulatory and non-catalytic.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      The catalytic phosphorylase kinase activity resides in the gamma subunit, not the
      alpha regulatory subunit. UniProt states that alpha and beta are regulatory
      subunits while gamma is the catalytic subunit, so an 'enables' assertion of the
      holoenzyme kinase activity on PHKA2 over-attributes catalysis to a regulatory
      chain. PHKA2 contributes to this holoenzyme activity as a complex member (captured
      in core_functions via contributes_to_molecular_function) but does not
      independently enable it.
    supported_by:
    - reference_id: file:human/PHKA2/PHKA2-uniprot.txt
      supporting_text: "are regulatory subunits, gamma (PHKG1 or PHKG2) is the catalytic"
- term:
    id: GO:0005516
    label: calmodulin binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: >-
      InterPro-based assertion of calmodulin binding. This is a genuine molecular
      function of the alpha subunit: UniProt notes the alpha chain may bind calmodulin
      and annotates two calmodulin-binding regions (807-837, 1059-1099).
    action: ACCEPT
    reason: >-
      Well supported and biologically informative for the alpha subunit. Consistent
      with the Calmodulin-binding keyword and two annotated calmodulin-binding regions.
      Calmodulin is the delta subunit of the complex, so alpha-CaM binding is
      functionally central to Ca2+ regulation of the holoenzyme.
    supported_by:
    - reference_id: file:human/PHKA2/PHKA2-uniprot.txt
      supporting_text: "The alpha chain may"
    - reference_id: file:human/PHKA2/PHKA2-uniprot.txt
      supporting_text: "bind calmodulin."
- term:
    id: GO:0005737
    label: cytoplasm
  evidence_type: IEA
  original_reference_id: GO_REF:0000117
  qualifier: located_in
  review:
    summary: >-
      ARBA electronic assertion of cytoplasmic localization. Correct but non-specific;
      the more precise, curatorially supported location is the cytosol (GO:0005829).
    action: ACCEPT
    reason: >-
      Cytoplasm is a correct broad parent of the cytosol, where the phosphorylase
      kinase complex acts on cytosolic glycogen phosphorylase. Retained as a valid,
      if less specific, location; the cytosol annotation is the more informative one.
- term:
    id: GO:0005886
    label: plasma membrane
  evidence_type: IEA
  original_reference_id: GO_REF:0000044
  qualifier: located_in
  review:
    summary: >-
      Subcellular-location keyword mapping (SL-0039) derived from UniProt's Cell
      membrane assignment, which is itself an ECO:0000305 (inference from prenylation)
      annotation, not an experimental localization.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      The UniProt Cell membrane / Lipid-anchor location is an ECO:0000305 inference
      resting on a possible C-terminal farnesyl-cysteine (itself by-similarity,
      ECO:0000250), with the PTM note stating the terminal tripeptide is 'probably not
