  label: Homo sapiens
description: NADK2 (NAD kinase 2, mitochondrial; also known as C5orf33, MNADK, NADKD1)
  is the mitochondrial NAD(+) kinase (EC 2.7.1.23). Following import into the mitochondrial
  matrix and cleavage of its N-terminal transit peptide, the mature protein assembles
  into a homodimer that phosphorylates NAD(+) using ATP (and, in vitro, inorganic
  polyphosphate) to produce NADP(+). It is the source of the mitochondrial NADP(H)
  pool, the counterpart of the cytosolic NADK. The NADPH generated from this NADP(+)
  supplies NADP-dependent mitochondrial oxidoreductases, including 2,4-dienoyl-CoA
  reductase (DECR1) in polyunsaturated fatty acid beta-oxidation, the reductive step
  of lysine degradation, delta-1-pyrroline-5-carboxylate synthase (ALDH18A1/P5CS) in
  proline biosynthesis, mitochondrial one-carbon metabolism, and antioxidant defense
  against reactive oxygen species. The enzyme has low Km for NAD(+), only weak NADH
  kinase activity, and is feedback-inhibited by NADH, NADPH and NADP(+). It is broadly
  expressed with highest levels in liver. Loss-of-function mutations cause 2,4-dienoyl-CoA
  reductase deficiency (DECRD) / NADK2 deficiency, a mitochondrial NADP(H)-deficiency
  disorder presenting with severe infantile encephalopathy, lactic acidosis and
  hyperlysinemia.
