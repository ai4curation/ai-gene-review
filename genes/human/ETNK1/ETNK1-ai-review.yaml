  label: Homo sapiens
description: >-
  ETNK1 (ethanolamine kinase 1) is a cytosolic enzyme (EC 2.7.1.82) that catalyzes
  the first committed step of the CDP-ethanolamine (Kennedy) pathway for
  phosphatidylethanolamine biosynthesis. It transfers the gamma-phosphate of ATP to
  ethanolamine to form phosphoethanolamine (plus ADP), a Mg2+-dependent reaction. The
  enzyme is highly specific for ethanolamine and has negligible choline kinase activity,
  distinguishing it from the choline kinases CHKA and CHKB, and it can be a
  rate-controlling step for phosphatidylethanolamine synthesis. ETNK1 belongs to the
  choline/ethanolamine kinase family and is broadly expressed, with notable expression in
  kidney, liver, placenta, heart, leukocytes, ovary and testis.
