proposed_new_terms: []
suggested_questions:
- question: >-
    What is the precise mechanism by which the active-site nucleophile accesses cytosolic
    acetyl-CoA and transfers the acetyl group across the lysosomal membrane to the luminal
    glucosamine substrate (ping-pong vs. direct transfer), and how do the recent cryo-EM
    structures explain this transmembrane catalysis?
- question: >-
    How does the requirement for intralysosomal proteolytic cleavage and homo-oligomer
    assembly relate to catalytic activation, and could these steps be therapeutic targets?
suggested_experiments:
- description: >-
    Structure-guided mutagenesis of candidate acetyl-CoA-binding and catalytic residues in
    the cytosolic loops, combined with transmembrane-acetylation assays, to define the
    acetyl-transfer path across the membrane.
- description: >-
    Pharmacological-chaperone (e.g. glucosamine-analog) screens on a panel of misfolding
    MPS IIIC missense mutants to identify variants amenable to enzyme-enhancement therapy.
