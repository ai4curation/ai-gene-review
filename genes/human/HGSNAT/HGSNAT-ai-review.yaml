core_functions:
- description: >-
    Lysosomal-membrane acetyl-CoA:alpha-glucosaminide N-acetyltransferase: transfers an
    acetyl group from cytosolic acetyl-CoA onto the free amino group of the terminal
    non-reducing alpha-glucosamine residue of intralysosomal heparan sulfate, producing
    N-acetyl-alpha-glucosamine. This transmembrane acetylation is an obligatory step in
    the stepwise lysosomal catabolism of heparan sulfate: it converts the terminal
    residue into a substrate for the exoglycosidase NAGLU so degradation can continue. The
    enzyme is a polytopic (11-TM) lysosomal membrane protein and is the only membrane-bound,
    transferase member of the heparan sulfate degradation pathway.
