id: Q68CP4
gene_symbol: HGSNAT
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  HGSNAT (heparan-alpha-glucosaminide N-acetyltransferase; TMEM76; EC 2.3.1.78) is a
  polytopic lysosomal membrane transacetylase that carries out an essential step of
  heparan sulfate degradation. It transfers an acetyl group from cytosolic acetyl-CoA
  onto the free amino group of the terminal non-reducing alpha-glucosamine residue of
  intralysosomal heparan sulfate (and heparin), converting it to
  N-acetyl-alpha-glucosamine so that the downstream lysosomal exoglycosidase NAGLU
  (alpha-N-acetylglucosaminidase) can remove it and degradation can proceed. Unlike the
  other three enzymes of the heparan sulfate degradation pathway, which are soluble
  luminal hydrolases/sulfatases, HGSNAT is the only membrane-bound member and the only
  transferase, spanning the lysosomal membrane with 11 transmembrane helices; its
  active-site nucleophile (His297) is positioned to access cytoplasmic acetyl-CoA and
  transfer the acetyl group across the membrane to the luminal glucosamine substrate. The
  enzyme is synthesised as an inactive precursor that is trafficked to lysosomes via
  adaptor-protein/dileucine- and tyrosine-based signals, proteolytically cleaved into an
  N-terminal alpha-chain and C-terminal beta-chain, and assembled into active
  homo-oligomers. Loss-of-function mutations cause mucopolysaccharidosis type IIIC
  (Sanfilippo syndrome C), an autosomal recessive lysosomal storage disorder with severe
  progressive neurodegeneration; certain HGSNAT variants also cause non-syndromic
  retinitis pigmentosa (RP73).
