    reason: >-
      The supporting paper documents targeting/biogenesis of HGSNAT to the lysosome, not
      HGSNAT-mediated lysosomal cargo transport; annotating the enzyme to "lysosomal
      transport" over-extends the trafficking observation. Not removed (it is an
      experimental annotation whose full text was read by the curator), but flagged as an
      over-annotation relative to HGSNAT's actual transferase function.
    supported_by:
