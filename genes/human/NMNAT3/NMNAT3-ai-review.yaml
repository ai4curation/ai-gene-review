gene_symbol: NMNAT3
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: NMNAT3 is the mitochondrial isoform of human nicotinamide/nicotinic acid mononucleotide adenylyltransferase,
  one of three NMNAT enzymes (NMNAT1 nuclear, NMNAT2 Golgi/cytosolic, NMNAT3 mitochondrial). It catalyzes
  the central, shared step of NAD+ biosynthesis, an adenylyl transfer from ATP to a pyridine mononucleotide,
  condensing NMN with the AMP moiety of ATP to yield NAD+ (EC 2.7.7.1) and, with comparable efficiency,
  condensing the deamidated substrate NaMN to yield deamido-NAD+ (NaAD; EC 2.7.7.18). Both the de novo/Preiss-Handler
  and the salvage routes to NAD+ converge on this NMNAT step. Among the three isoforms NMNAT3 shows the
  broadest substrate tolerance, can use GTP or ITP as alternative nucleotide donors, can also form NADH
  directly from reduced NMN, and catalyzes the reverse pyrophosphorolytic cleavage of NAD+. It is a Mg2+-dependent
  homotetramer whose structure has been solved by X-ray crystallography. Localizing to the mitochondrion
  (with a reported cytosolic pool in some studies), NMNAT3 supplies and maintains the mitochondrial NAD+/NADH
  pool that fuels respiration and NAD+-consuming signaling.
