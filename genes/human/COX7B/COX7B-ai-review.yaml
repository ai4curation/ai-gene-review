gene_symbol: COX7B
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: COX7B (cytochrome c oxidase subunit 7B, mitochondrial; polypeptide VIIb)
  is a small, nuclear-encoded structural subunit of mitochondrial respiratory Complex
  IV (cytochrome c oxidase, COX/CIV), the terminal enzyme of the electron transport
  chain. Complex IV comprises a mitochondrially encoded catalytic core (MT-CO1, MT-CO2,
  MT-CO3) that carries out the reduction of oxygen to water, together with nuclear-encoded
  supernumerary subunits, of which COX7B is one. COX7B is a non-catalytic subunit that
  surrounds and supports the catalytic core and contributes to assembly and stability
  of the holoenzyme; it is a single-pass protein of the mitochondrial inner membrane
  (matrix-facing N-terminus, transmembrane helix, intermembrane-space C-terminus) synthesized
  as an 80-residue precursor with a cleaved mitochondrial transit peptide. Through its
  role in Complex IV it participates in mitochondrial electron transport from cytochrome
  c to oxygen and in oxidative phosphorylation. In humans COX7B is X-linked, and deleterious
  mutations cause an X-linked disorder, linear skin defects with multiple congenital
  anomalies (LSDMCA2), within the microphthalmia-with-linear-skin-defects (MLS/MIDAS)
  spectrum, an unconventional mitochondrial disease with a prominent neurodevelopmental
  phenotype.
