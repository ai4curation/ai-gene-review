- term:
    id: GO:1902600
    label: proton transmembrane transport
  evidence_type: IEA
  original_reference_id: GO_REF:0000108
  qualifier: involved_in
  review:
    summary: This annotation is inferred by an inter-ontology logical link from the
      cytochrome-c oxidase activity of Complex IV (the complex pumps protons across
      the inner membrane). Proton pumping is a property of the mtDNA-encoded catalytic
      core; COX7B is a non-catalytic structural subunit that does not itself translocate
      protons.
    action: KEEP_AS_NON_CORE
    reason: Complex IV does contribute to proton transmembrane transport, so the annotation
      is not incorrect at the complex level, but for the individual non-catalytic COX7B
      subunit this is a peripheral, complex-level property rather than a core function.
    supported_by:
