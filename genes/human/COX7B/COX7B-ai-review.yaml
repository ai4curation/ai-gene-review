- term:
    id: GO:0007417
    label: central nervous system development
  evidence_type: IMP
  original_reference_id: PMID:23122588
  qualifier: involved_in
  review:
    summary: COX7B knockdown in medaka recapitulates the microphthalmia-with-linear-skin-lesions
      (MLS) phenotype with microcephaly and microphthalmia, demonstrating that Complex
      IV activity is required for vertebrate CNS development. This is a downstream developmental
      consequence of loss of cytochrome c oxidase activity rather than a distinct molecular
      role of COX7B.
    action: KEEP_AS_NON_CORE
    reason: The developmental/neurodevelopmental phenotype is a genuine, experimentally
      supported organismal consequence of COX7B loss-of-function (its disease mechanism),
      but it reflects the general requirement for Complex IV activity in energy metabolism,
      not a core molecular function of this structural subunit. Retained as an important
      non-core annotation.
    supported_by:
    - reference_id: PMID:23122588
      supporting_text: essential function of complex IV activity in vertebrate CNS development
    - reference_id: PMID:23122588
      supporting_text: COX7B encodes a poorly characterized structural subunit of cytochrome
        c oxidase
- term:
    id: GO:0004129
    label: cytochrome-c oxidase activity
  evidence_type: TAS
  original_reference_id: PMID:8382530
  qualifier: enables
  review:
    summary: This legacy TAS annotation assigns the whole-complex catalytic cytochrome-c
      oxidase activity to COX7B. COX7B is a non-catalytic supernumerary subunit; the
      oxygen-reduction chemistry is performed by the mtDNA-encoded catalytic core (MT-CO1,
      MT-CO2). The cited paper reports the cDNA of the nuclear-encoded structural subunit
      VIIb, not that COX7B itself catalyzes the reaction.
    action: MODIFY
    reason: COX7B does not itself enable cytochrome-c oxidase catalysis; its molecular
      function is structural, contributing to the integrity and assembly of the complex
      that performs catalysis. Replace the catalytic MF with structural molecule activity
      (GO:0005198). The catalytic activity is retained at the complex level via contributes_to
      in core_functions.
    proposed_replacement_terms:
    - id: GO:0005198
      label: structural molecule activity
    supported_by:
    - reference_id: PMID:8382530
      supporting_text: the last remaining uncharacterized nuclear-encoded
    - reference_id: PMID:23122588
      supporting_text: COX7B encodes a poorly characterized structural subunit of cytochrome
        c oxidase
