description: 'PANK4 is a two-domain cytoplasmic enzyme of the pantothenate kinase family. Its N-terminal
  type II pantothenate-kinase-like domain is catalytically degenerate: PANK4 has no pantothenate kinase
  activity and is a ''pseudo-pantothenate kinase''. Its functional activity resides in the C-terminal
  damage-control (DUF89) domain, a metal-dependent (Mg2+/Mn2+) phosphatase that dephosphorylates 4''-phosphopantetheine
  and related metabolites (e.g. pantetheine-phosphate sulfonate). Through this 4''-phosphopantetheine
  phosphatase activity PANK4 participates in coenzyme-A pathway homeostasis / metabolite repair. It is
  widely expressed, with high levels in muscle, and forms homodimers. PANK4 thus illustrates a domain-swap
  pseudoenzyme: a dead ancestral catalytic domain alongside a retained, distinct enzymatic activity.'
