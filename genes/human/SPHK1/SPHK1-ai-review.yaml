core_functions:
- description: >-
    Sphingosine kinase that phosphorylates the free sphingoid base sphingosine
    (and dihydrosphingosine) to sphingosine 1-phosphate, using ATP and Mg2+.
  molecular_function:
    id: GO:0008481
    label: sphingosine kinase activity
  supported_by:
  - reference_id: PMID:23602659
    supporting_text: >-
      Sphingosine kinase 1 (SphK1) is a lipid kinase that catalyzes the conversion
      of sphingosine to sphingosine-1-phosphate (S1P)
  - reference_id: PMID:10802064
    supporting_text: >-
      hSPHK1 also specifically phosphorylated D-erythro-sphingosine and to a lesser
      extent sphinganine, but not other lipids, such as D,L-threo-dihydrosphingosine,
      N, N-dimethylsphingosine, diacylglycerol, ceramide, or phosphatidylinositol.
- description: >-
    Binds ATP as the phosphate donor for the kinase reaction; the nucleotide-binding
    site was mapped biochemically and structurally.
  molecular_function:
    id: GO:0005524
    label: ATP binding
  supported_by:
  - reference_id: PMID:12393916
    supporting_text: >-
      Here we have elucidated the nucleotide-binding site of human sphingosine
      kinase 1 (hSK1) through a combination of site-directed mutagenesis and
      affinity labeling with the ATP analogue, FSBA.
- description: >-
    Binds calmodulin (Ca2+-dependent); the calmodulin-binding site regulates
    Ca2+/CIB1-dependent membrane translocation and enzyme activity.
  molecular_function:
    id: GO:0005516
    label: calmodulin binding
  supported_by:
  - reference_id: PMID:19854831
    supporting_text: >-
      We show that CIB1 interacts with SK1 in a Ca(2+)-dependent manner at the
      previously identified "calmodulin-binding site" of SK1.
- description: >-
    Carries out the sphingosine-to-S1P step of sphingolipid metabolism, producing
    the bioactive S1P and thereby lowering ceramide.
  molecular_function:
    id: GO:0008481
    label: sphingosine kinase activity
  supported_by:
  - reference_id: PMID:20577214
    supporting_text: >-
      one of the isoenzymes that generates the pro-survival lipid mediator
      sphingosine-1-phosphate (S1P) inside cells
  locations:
  - id: GO:0005829
    label: cytosol
  - id: GO:0005886
    label: plasma membrane
