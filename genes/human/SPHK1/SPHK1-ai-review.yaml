  findings:
  - statement: >-
      Human SPHK1 specifically phosphorylates D-erythro-sphingosine and, to a lesser
      extent, sphinganine, but not diacylglycerol, ceramide or phosphatidylinositol,
      establishing its substrate specificity as a sphingosine kinase.
    reference_section_type: ABSTRACT
    supporting_text: >-
      hSPHK1 also specifically phosphorylated D-erythro-sphingosine and to a lesser
      extent sphinganine, but not other lipids, such as D,L-threo-dihydrosphingosine,
      N, N-dimethylsphingosine, diacylglycerol, ceramide, or phosphatidylinositol.
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified; directly establishes the core sphingosine kinase activity and
      substrate specificity of human SPHK1.
- id: PMID:10863092
  title: 'Human sphingosine kinase: molecular cloning, functional characterization
    and tissue distribution.'
  findings:
  - statement: >-
      Cloning and functional characterization of human SPHK1; product S1P is a
      signaling molecule with intra- and extracellular functions.
    reference_section_type: ABSTRACT
    supporting_text: >-
      Sphingosine-1-phosphate (SPP), the product of sphingosine kinase, is an
      important signaling molecule with intra- and extracellular functions.
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: PubMed-verified; original cloning/characterization of human SPHK1.
- id: PMID:10947957
  title: 'Human sphingosine kinase: purification, molecular cloning and characterization
    of the native and recombinant enzymes.'
  findings:
  - statement: >-
      Human SPHK1 purified from placenta binds calmodulin (calmodulin-affinity
      chromatography step) and requires Mg2+; kinetics characterized.
    reference_section_type: ABSTRACT
    supporting_text: >-
      calmodulin-affinity chromatography and gel-filtration chromatography
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified; supports calmodulin binding and Mg2+ cofactor requirement plus
      catalytic characterization.
- id: PMID:11923095
  title: 1-O-Hexadecyl-2-desoxy-2-amino-sn-glycerol, a substrate for human sphingosine
    kinase.
  findings:
  - statement: >-
      Only the D-erythro isomer of the sphingoid bases is efficiently
      phosphorylated by human sphingosine kinase, confirming stereospecific
      substrate recognition.
    reference_section_type: ABSTRACT
    supporting_text: >-
      Only the D-erythro isomer of the sphingoid bases, sphinganine and sphingenine,
      was effectively phosphorylated.
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: PubMed-verified; substrate-specificity study supporting the kinase activity.
- id: PMID:12080051
  title: Cloning and characterization of a protein kinase A anchoring protein (AKAP)-related
    protein that interacts with and regulates sphingosine kinase 1 activity.
  findings:
  - statement: >-
      SPHK1 interacts with SPHKAP/SKIP, which reduces SPHK1 activity and its
      biological functions.
    reference_section_type: ABSTRACT
    supporting_text: >-
      SKIP overexpression in NIH 3T3 fibroblasts reduced SPHK1 activity and
      interfered with its biological functions.
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified; source of the SPHKAP (Q2M3C7) IPI, a regulatory interactor.
- id: PMID:12393916
  title: The nucleotide-binding site of human sphingosine kinase 1.
  findings:
  - statement: >-
      Elucidation of the ATP (nucleotide)-binding site of human SPHK1; Gly82 is
      important for ATP binding.
    reference_section_type: ABSTRACT
    supporting_text: >-
      Here we have elucidated the nucleotide-binding site of human sphingosine
      kinase 1 (hSK1) through a combination of site-directed mutagenesis and
      affinity labeling with the ATP analogue, FSBA.
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified; supports ATP binding. Note the MGI "DNA binding" (GO:0003677)
      annotation citing this paper is unsupported by its content (it is a
      nucleotide-binding study).
- id: PMID:12441135
  title: Sphingosine kinase type 1 promotes estrogen-dependent tumorigenesis of breast
    cancer MCF-7 cells.
  findings:
  - statement: >-
      SPHK1 overexpression raises S1P, blocks apoptosis, confers estrogen-dependent
      growth advantage and larger, more vascularized tumors in MCF-7 breast cancer.
    reference_section_type: ABSTRACT
    supporting_text: >-
      Enforced expression of sphingosine kinase type 1 (SPHK1) increased S1P levels
      and blocked MCF-7 cell death induced by anti-cancer drugs, sphingosine, and
      TNF-alpha.
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified; source of the growth/migration/angiogenesis/mitotic
      downstream annotations.
- id: PMID:12847068
  title: Sphingosine kinase modulates microvascular tone and myogenic responses through
    activation of RhoA/Rho kinase.
  findings:
  - statement: >-
      Sphk1 overexpression increases resting tone and myogenic responses of
      resistance arteries via RhoA/Rho kinase in smooth muscle.
    reference_section_type: ABSTRACT
    supporting_text: >-
      resting tone and myogenic responses of isolated resistance arteries increased
      with forced expression of Sphk1 in smooth muscle cells of these arteries
  reference_review:
    relevance: LOW
    correctness: VERIFIED
    review_notes: PubMed-verified; source of the smooth-muscle-contraction downstream annotation.
- id: PMID:14575709
  title: Identification of functional nuclear export sequences in human sphingosine
    kinase 1.
  findings:
  - statement: >-
      Human SPHK1 is predominantly cytoplasmic and shuttles between cytoplasm and
      nucleus via two functional NES (CRM1-dependent export).
    reference_section_type: ABSTRACT
    supporting_text: >-
      Human SPHK1 (hSPHK1) was localized predominantly in the cytoplasm when
      transiently expressed in Cos7 cells.
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: PubMed-verified; supports cytoplasm and nucleus localization/shuttling.
- id: PMID:15623571
  title: Phosphorylation-dependent translocation of sphingosine kinase to the plasma
    membrane drives its oncogenic signalling.
  findings:
  - statement: >-
      Oncogenic signaling by SPHK1 requires phosphorylation-driven translocation to
      the plasma membrane, not merely increased catalytic activity; the
      nonphosphorylatable S225A mutant retains full activity but loses transforming
      ability.
    reference_section_type: ABSTRACT
    supporting_text: >-
      hSK1 translocation is the key effect of phosphorylation in oncogenic signaling
      by this enzyme
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified; full text available. Key mechanistic paper on
      activation/translocation and oncogenicity.
- id: PMID:16118219
  title: SphK1 and SphK2, sphingosine kinase isoenzymes with opposing functions in
    sphingolipid metabolism.
  findings:
  - statement: >-
      SphK1 and SphK2 have opposing roles in ceramide biosynthesis; SphK1 is
      pro-survival and lowers ceramide.
    reference_section_type: ABSTRACT
    supporting_text: >-
      Our results demonstrate that SphK1 and SphK2 have opposing roles in the
      regulation of ceramide biosynthesis
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified; supports negative regulation of ceramide biosynthesis and
      anti-apoptotic role.
- id: PMID:16888242
  title: FHL2/SLIM3 decreases cardiomyocyte survival by inhibitory interaction with
    sphingosine kinase-1.
  findings:
  - statement: >-
      FHL2/SLIM3 interacts with and inhibits SK1 activity in cardiomyocytes.
    reference_section_type: ABSTRACT
    supporting_text: >-
      we identified the LIM-only factor FHL2 (SLIM3) as a SK1-interacting protein in
      both yeast and mammalian cells
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: PubMed-verified; source of the FHL2 (Q14192) IPI.
- id: PMID:17064696
  title: 'Sphingosine kinase-1 is cleaved by cathepsin B in vitro: identification
    of the initial cleavage sites for the protease.'
  findings:
  - statement: >-
      SK1 is a substrate of cathepsin B in vitro, cleaved at His122 and Arg199.
    reference_section_type: ABSTRACT
    supporting_text: >-
      We identified two initial cleavage sites for the protease, the first at
      histidine 122 and the second at arginine 199.
  reference_review:
    relevance: LOW
    correctness: VERIFIED
    review_notes: PubMed-verified; source of the cathepsin B (P07858) IPI (in vitro proteolysis).
- id: PMID:17124500
  title: Sphingosine 1-phosphate as a regulator of osteoclast differentiation and
    osteoclast-osteoblast coupling.
  findings:
  - statement: >-
      RANKL upregulates SPHK1 and S1P production in osteoclast precursors; SPHK1/S1P
      has a dichotomous role in osteoclastogenesis.
    reference_section_type: ABSTRACT
    supporting_text: >-
      the osteoclastogenic factor receptor activator of NF-kappaB ligand (RANKL)
      upregulated SPHK1 and increased S1P production and secretion.
  reference_review:
    relevance: LOW
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified; source of a TRAF6-related IntAct IPI in the SPHK1 record.
- id: PMID:18263879
  title: Eukaryotic elongation factor 1A interacts with sphingosine kinase and directly
    enhances its catalytic activity.
  findings:
  - statement: >-
      eEF1A interacts directly with SK1 and increases its catalytic rate ~3-fold
      without changing substrate affinities.
    reference_section_type: ABSTRACT
    supporting_text: >-
      eEF1A is able to directly increase the activity of SK1 and SK2 approximately
      3-fold in vitro
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified; full text available. Source of the EEF1A1 (P68104) IPI and a
      regulatory activator of SK1.
- id: PMID:19854831
  title: Translocation of sphingosine kinase 1 to the plasma membrane is mediated
    by calcium- and integrin-binding protein 1.
  findings:
  - statement: >-
      CIB1 binds SK1 in a Ca2+-dependent manner at the calmodulin-binding site and
      translocates SK1 to the plasma membrane (Ca2+-myristoyl switch).
    reference_section_type: ABSTRACT
    supporting_text: >-
      We show that CIB1 interacts with SK1 in a Ca(2+)-dependent manner at the
      previously identified "calmodulin-binding site" of SK1.
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified; supports calmodulin binding, plasma membrane translocation,
      and the CIB1 (Q99828) IPI.
- id: PMID:20577214
  title: Sphingosine-1-phosphate is a missing cofactor for the E3 ubiquitin ligase
    TRAF2.
  findings:
  - statement: >-
      SPHK1 binds TRAF2; intracellular S1P produced by SPHK1 binds the TRAF2 RING
      domain and stimulates its E3 ligase activity, driving Lys63 polyubiquitination
      of RIP1 and NF-kappaB activation, receptor-independently.
    reference_section_type: ABSTRACT
    supporting_text: >-
      TRAF2 binds to sphingosine kinase 1 (SphK1), one of the isoenzymes that
      generates the pro-survival lipid mediator sphingosine-1-phosphate (S1P) inside
      cells.
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified; full text available. Mechanistic basis for SPHK1's TNF/NF-kappaB
      and protein-ubiquitination annotations.
- id: PMID:20838377
  title: Guanine nucleotides regulate sphingosine kinase 1 activation by eukaryotic
    elongation factor 1A and provide a mechanism for eEF1A-associated oncogenesis.
  findings:
  - statement: >-
      The GDP-bound form of eEF1A activates SK1; SK1 is required for PTI-1-induced
      oncogenic transformation.
    reference_section_type: ABSTRACT
    supporting_text: >-
      eEF1A.GDP, but not eEF1A.GTP, enhancing SK1 activity in vitro
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: PubMed-verified; source of an EEF1A1 (P68104) IPI in the SPHK1 record.
- id: PMID:21075214
  title: A critical role for the protein phosphatase 2A B'α regulatory subunit in
    dephosphorylation of sphingosine kinase 1.
  findings:
  - statement: >-
      The PP2A B'alpha (PPP2R5A) regulatory subunit binds the SK1 C-terminus and is
      required for SK1 dephosphorylation at Ser225, regulating its activity and
      membrane localization.
    reference_section_type: ABSTRACT
    supporting_text: >-
      B'α was found to interact with the c-terminus of SK1, and reduce SK1
      phosphorylation when overexpressed
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified; supports the protein phosphatase 2A binding (GO:0051721) IPI
      and cytoplasm/plasma-membrane localization.
- id: PMID:23106337
  title: Sphingosine 1-phosphate induces filopodia formation through S1PR2 activation
    of ERM proteins.
  findings:
  - statement: >-
      S1P endogenously generated in a sphingosine-kinase-dependent manner (chiefly
      SK1) induces ERM phosphorylation and filopodia via the receptor S1PR2 (the
      receptor activity belongs to S1PR2, not SPHK1).
    reference_section_type: ABSTRACT
    supporting_text: >-
      endogenously generated S1P (in a sphingosine kinase-dependent manner) results
      in significant increases in phosphorylation of ERM proteins
  reference_review:
    relevance: MEDIUM
    correctness: MISCITED
    review_notes: >-
      PubMed-verified paper, but it does NOT support assigning "sphingosine-1-phosphate
      receptor activity" (GO:0038036) to SPHK1: the receptor is S1PR2. The
      SPHK1 GO:0038036 IMP citing this paper is a mis-assignment of receptor activity
      to the kinase.
- id: PMID:23602659
  title: Molecular basis of sphingosine kinase 1 substrate recognition and catalysis.
  findings:
  - statement: >-
      Crystal structures of human SphK1 (apo, with substrate-like lipid/ADP, and an
      inhibitor) reveal a two-domain architecture with the catalytic site in the
      inter-domain cleft and a hydrophobic lipid-binding pocket.
    reference_section_type: ABSTRACT
    supporting_text: >-
      Sphingosine kinase 1 (SphK1) is a lipid kinase that catalyzes the conversion
      of sphingosine to sphingosine-1-phosphate (S1P)
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: PubMed-verified; structural basis for the core kinase activity and ATP binding.
- id: PMID:23935096
  title: Sphingosine kinase 1 regulates tumor necrosis factor-mediated RANTES induction
    through p38 mitogen-activated protein kinase but independently of nuclear factor
    κB activation.
  findings:
  - statement: >-
      Loss of SK1 prevents TNF-induced p38 MAPK phosphorylation; SK1 suppresses
      RANTES/CCL5 induction via p38, an anti-inflammatory function separable from
      NF-kappaB.
    reference_section_type: ABSTRACT
    supporting_text: >-
      loss of SK1 prevented TNF-induced phosphorylation of p38 MAPK
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified; supports response to TNF and positive regulation of p38MAPK
      cascade annotations.
- id: PMID:24929359
  title: Coupling between endocytosis and sphingosine kinase 1 recruitment.
  findings:
  - statement: >-
      SPHK1 is recruited to early endocytic intermediates and clathrin-coated pits,
      is enriched in nerve terminals, and binds negatively charged membranes with a
      preference for high positive curvature.
    reference_section_type: ABSTRACT
    supporting_text: >-
      SPHK1 is also targeted to physiologically occurring early endocytic
      intermediates, and is highly enriched in nerve terminals
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified; full text available. Source of endosome/clathrin-pit/presynapse
      localization and lipid-binding (curvature-sensing) annotations.
- id: PMID:25417698
  title: Pathological roles of the VEGF/SphK pathway in Niemann-Pick type C neurons.
  findings:
  - statement: >-
      SPHK1 kinase activity on sphingosine increases in the presence of VEGFA in
      Purkinje cells, linking VEGF signaling to S1P production and autophagosome-
      lysosome fusion.
    reference_section_type: ABSTRACT
    supporting_text: >-
      Pathological roles of the VEGF/SphK pathway in Niemann-Pick type C neurons.
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified; full text available. Supports the VEGF-response and kinase
      activity annotations.
- id: PMID:28049734
  title: Sphingosine and Sphingosine Kinase 1 Involvement in Endocytic Membrane Trafficking.
  findings:
  - statement: >-
      Sphingosine and its conversion to S1P by SPHK1 are important in endocytic
      membrane trafficking; SPHK1 is recruited to enlarged endosomes and recruits
      endophilins.
    reference_section_type: ABSTRACT
    supporting_text: >-
      our results highlight the importance of sphingosine and its conversion to
      sphingosine-1-phosphate by SphK1 in endocytic membrane trafficking.
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified; full text available. Supports the endocytosis/regulation of
      endocytosis annotations.
- id: PMID:29662056
  title: Neuronal SphK1 acetylates COX2 and contributes to pathogenesis in a model
    of Alzheimer's Disease.
  findings:
  - statement: >-
      Neuronal SphK1 acetylates COX2/PTGS2, contributing to Alzheimer's disease
      pathogenesis; SPHK1 is expressed in brain cortex at the protein level.
    reference_section_type: ABSTRACT
    supporting_text: >-
      Neuronal SphK1 acetylates COX2 and contributes to pathogenesis in a model of
      Alzheimer's Disease.
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified; full text available. Basis (largely By similarity in human) for
      acetyltransferase activity, protein acetylation, and neuroinflammation terms.
