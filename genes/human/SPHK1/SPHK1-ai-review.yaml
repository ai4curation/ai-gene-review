id: Q9NYA1
gene_symbol: SPHK1
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  Sphingosine kinase 1 (SPHK1) is a diacylglycerol-kinase-like lipid kinase that
  phosphorylates the free sphingoid base sphingosine (and, less efficiently,
  sphinganine/dihydrosphingosine) using ATP to produce sphingosine 1-phosphate
  (S1P), a bioactive signaling lipid with both intracellular and extracellular
  (receptor-mediated) actions. The enzyme requires Mg2+ and has a two-domain
  DAGK-like fold with the catalytic cleft between the domains and a hydrophobic
  lipid-binding pocket; Asp81 is the catalytic proton donor/acceptor. SPHK1 is
  largely cytosolic but translocates to the plasma membrane upon activation, which
  is driven by ERK1/2-mediated phosphorylation at Ser225 and by CIB1 in a
  calcium-dependent manner; it also binds calmodulin and anionic (negatively
  charged) membranes with a preference for high positive curvature, and shuttles
  between cytoplasm and nucleus via CRM1-dependent nuclear export. By generating
  S1P, SPHK1 lowers intracellular ceramide and drives pro-survival, proliferative,
  pro-angiogenic and pro-inflammatory programs (for example S1P is an intracellular
  cofactor for the TRAF2 E3 ubiquitin ligase in TNF/NF-kappaB signaling), and it
  is frequently oncogenic. SPHK1 is also recruited to early endocytic
  intermediates, clathrin-coated pits and presynaptic terminals and participates
  in endocytic membrane trafficking, partly independently of its kinase activity.
  In neurons it has an additional acetyl-CoA-dependent serine acetyltransferase
  activity toward COX2/PTGS2 (characterized primarily in mouse).
