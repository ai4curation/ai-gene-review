suggested_questions:
- question: >-
    Is the MGI "DNA binding" (GO:0003677) annotation citing PMID:12393916 a curation
    error for nucleotide/ATP binding, and should it be corrected or removed?
- question: >-
    Should SPHK1's process annotations use sphingosine metabolic process / S1P
    biosynthesis rather than "sphingosine biosynthetic process" (which describes
    synthesis of the sphingosine base that SPHK1 consumes)?
- question: >-
    How much of SPHK1's endocytic-trafficking role is genuinely independent of its
    kinase activity versus dependent on local S1P production?
suggested_experiments:
- description: >-
    Use separation-of-function mutants (catalytically dead D81A/G82D vs
    membrane-binding-deficient L194Q/FL197-198AQ) to dissect kinase-dependent
    signaling from kinase-independent membrane/endocytic roles.
- description: >-
    Perform lipidomic quantification of S1P, sphingosine and ceramide upon SPHK1
    knockout/rescue to define its quantitative contribution to the sphingolipid
    rheostat versus SPHK2.
