suggested_questions:
- question: >-
    What determines the strict tissue-dependence of the TK2-deficiency phenotype (skeletal
    muscle and CNS versus sparing of mitotic tissues), given that TK2 is broadly expressed?
- question: >-
    Does TK2 physically or functionally associate with the mitochondrial dNTP-handling
    machinery (DGUOK, SUCLA2/SUCLG1, mitochondrial nucleotide transporters), or is the
    reported GSTK1 interaction functionally meaningful?
suggested_experiments:
- description: >-
    Quantify the individual and combined contributions of TK2 and DGUOK to the mitochondrial
    dNTP pool in post-mitotic (differentiated myotube/neuron) versus proliferating cells,
    using isotope-labelled deoxyribonucleoside tracing.
- description: >-
    Measure kinetic parameters (kcat/KM) of purified recombinant TK2 for thymidine,
    deoxycytidine and deoxyuridine side-by-side, and test disease variants, to define the
    relative fluxes of each pyrimidine arm and the biochemical basis of MTDPS2 severity.
