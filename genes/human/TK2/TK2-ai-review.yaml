id: O00142
gene_symbol: TK2
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  TK2 encodes mitochondrial thymidine kinase 2, a multisubstrate deoxyribonucleoside
  kinase of the DCK/DGK (deoxyribonucleoside kinase) family. Following cleavage of an
  N-terminal mitochondrial transit peptide, the mature enzyme resides in the
  mitochondrial matrix, where it phosphorylates the pyrimidine deoxyribonucleosides
  thymidine, deoxycytidine and deoxyuridine to their respective deoxyribonucleoside
  monophosphates (dTMP, dCMP, dUMP) using ATP as phosphate donor. TK2 constitutes the
  pyrimidine arm of the mitochondrial deoxyribonucleoside salvage pathway; together with
  deoxyguanosine kinase (DGUOK), which handles the purine arm, it supplies the
  deoxyribonucleotide precursors needed for mitochondrial DNA replication. Because the
  mitochondrial dNTP pool is separated from the cytosolic pool and mitochondria lack de
  novo dNTP synthesis, in non-replicating/quiescent post-mitotic tissues (where cytosolic
  dNTP production is low) mtDNA synthesis depends on this salvage pathway. Loss-of-function
  variants cause a myopathic mitochondrial DNA depletion syndrome (MTDPS2) and TK2-related
  progressive external ophthalmoplegia with multiple mtDNA deletions (PEOB3). TK2 also
  activates several antiviral and chemotherapeutic pyrimidine nucleoside analogues.
