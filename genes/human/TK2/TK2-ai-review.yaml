- term:
    id: GO:0004136
    label: deoxyadenosine kinase activity
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: enables
  review:
    summary: >-
      IBA phylogenetic annotation to deoxyadenosine kinase activity. TK2 is the pyrimidine
      arm of mitochondrial salvage; deoxyadenosine (a purine deoxyribonucleoside) is the
      substrate of the paralog DGUOK (deoxyguanosine kinase), not of TK2.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      Characterized substrate specificity of human TK2 is restricted to the pyrimidine
      deoxyribonucleosides thymidine, deoxycytidine and deoxyuridine; deoxyguanosine and
      deoxyadenosine are handled by the sibling mitochondrial kinase DGUOK. This IBA is a
      paralog over-annotation propagated across the shared deoxyribonucleoside-kinase
      PANTHER family (note the WITH/FROM includes Drosophila dnk, a broad-specificity
      insect enzyme). It is not wrong for the family, but it over-annotates TK2, whose
      informative activities are thymidine/deoxycytidine/deoxyuridine kinase.
    propagation_review:
      root_cause: PROPAGATION_BAD
      failure_modes:
      - WRONG_ORTHOLOG_OR_PARALOG
      - FUNCTIONAL_DIVERGENCE
      source_entities:
      - source_id: PANTHER:PTN000828170
        source_label: deoxyribonucleoside kinase family node
        source_status: SUPPORTS_SOURCE_BUT_NOT_TARGET
        comment: >-
          Deoxyadenosine kinase activity belongs to the purine arm (DGUOK) and the
          broad-specificity insect dnk; human TK2 does not phosphorylate deoxyadenosine.
      - source_id: FB:FBgn0022338
        source_label: Drosophila dnk (multisubstrate deoxyribonucleoside kinase)
        source_status: SUPPORTS_SOURCE_BUT_NOT_TARGET
        comment: >-
          Insect dnk is broad-specificity; its purine activity should not transfer to the
          pyrimidine-specific human TK2.
