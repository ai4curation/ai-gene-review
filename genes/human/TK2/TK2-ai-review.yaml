- id: PMID:11687801
  title: Mutant mitochondrial thymidine kinase in mitochondrial DNA depletion myopathy.
  findings:
  - statement: >-
      TK2 phosphorylates the pyrimidine deoxyribonucleosides thymidine, deoxycytidine and
      deoxyuridine; in non-replicating cells mtDNA synthesis depends solely on the
      mitochondrial salvage kinases TK2 and DGUOK. TK2 mutations reduce muscle mitochondrial
      TK2 activity to 14-45% of control and cause mtDNA depletion myopathy.
    supporting_text: >-
      TK2 phosphorylates deoxythymidine, deoxycytidine and deoxyuridine.
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified primary paper establishing TK2 substrate specificity, its role in the
      mitochondrial salvage pathway, and the MTDPS2 disease link. Abstract-only in cache
      but the substrate/activity statements are quoted verbatim.
- id: PMID:33961781
  title: Dual proteome-scale networks reveal cell-specific remodeling of the human
    interactome.
  findings:
  - statement: >-
      Proteome-scale AP-MS interactome (BioPlex) reporting a physical interaction of TK2
      with GSTK1 (Q9Y2Q3); the basis for a bare protein-binding IPI with no functional
      specificity for TK2.
    supporting_text: >-
      In tandem, these cell-specific interaction networks begin to reveal how
      interactomes vary with cellular state.
  reference_review:
    relevance: LOW
    correctness: VERIFIED
    review_notes: >-
      High-throughput interactome screen; correctly cited but supports only a bare
      protein-binding annotation (TK2-GSTK1) that is uninformative about TK2 function.
