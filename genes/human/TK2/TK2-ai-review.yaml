      which includes TK2, corroborating its mitochondrial localization by high-throughput
      proteomics.
    supporting_text: >-
      defined a
      mitochondrial high-confidence proteome of >1,100 proteins (MitoCoP).
  reference_review:
    relevance: MEDIUM
