  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: is_active_in
  review:
    summary: >-
      IBA phylogenetic annotation to cytoplasm. TK2 is a mitochondrial-matrix enzyme
      with a cleaved N-terminal mitochondrial transit peptide, not a general cytoplasmic
      protein.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      The mature protein localizes to the mitochondrial matrix, and both UniProt (IDA,
      PubMed:9989599) and Reactome place its activity there. The generic "cytoplasm" IBA
      is over-broad, likely propagated from paralogous cytosolic deoxyribonucleoside
      kinases (e.g. cytosolic dCK) across the shared PANTHER family; the mitochondrion /
      mitochondrial matrix terms are the informative locations for TK2.
    propagation_review:
      root_cause: TERM_SCOPING_PROBLEM
      failure_modes:
      - COMPARTMENT_OR_COMPLEX_MISMATCH
      source_entities:
