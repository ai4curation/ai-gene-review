        source_label: deoxyribonucleoside kinase family
        source_status: SUPPORTS_SOURCE_BUT_NOT_TARGET
        comment: >-
          Family includes cytosolic members (e.g. dCK); the cytoplasm term leaks to
          TK2, which is mitochondrial-matrix localized.
    supported_by:
