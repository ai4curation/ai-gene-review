core_functions:
- description: ATP-dependent RNA helicase / ATPase that, recruited at translation termination,
    remodels and disassembles target mRNPs to drive nonsense-mediated mRNA decay.
  molecular_function:
    id: GO:0003724
    label: RNA helicase activity
  locations:
