- id: PMID:3597357
  title: Purification and properties of short chain acyl-CoA, medium chain acyl-CoA,
    and isovaleryl-CoA dehydrogenases from human liver.
  findings: []
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: PubMed-verified. Purified human IVD to homogeneity, identified the
      isovaleryl-CoA reaction product as 3-methylcrotonyl-CoA, showed homotetrameric
      structure with 1 FAD/subunit and ETF as electron acceptor. Anchors the core MF,
      FAD binding, homotetramer, and the minor short-chain activity annotations.
- id: PMID:7640268
  title: Identification of the active site catalytic residue in human isovaleryl-CoA
    dehydrogenase.
  findings: []
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: PubMed-verified. Defines the catalytic active-site glutamate by
      mutagenesis and confirms isovaleryl-CoA dehydrogenase activity of the human
      enzyme; the UniProt evidence for FUNCTION and EC 1.3.8.4/1.3.8.1. Primary source
      for the core molecular function.
