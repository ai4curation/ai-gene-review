id: P26440
gene_symbol: IVD
product_type: PROTEIN
status: IN_PROGRESS
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  Isovaleryl-CoA dehydrogenase (IVD) is a mitochondrial matrix, FAD-dependent
  flavoenzyme of the acyl-CoA dehydrogenase (ACAD) family. It catalyzes the third
  step of leucine catabolism, downstream of the branched-chain alpha-ketoacid
  dehydrogenase (BCKDH) complex, namely the alpha,beta-dehydrogenation of
  isovaleryl-CoA (3-methylbutanoyl-CoA) to 3-methylcrotonyl-CoA
  (3-methylbut-2-enoyl-CoA), transferring the abstracted electrons from its FAD
  prosthetic group to the electron-transfer flavoprotein (ETF). The active enzyme
  is a homotetramer with one FAD per subunit and a catalytic glutamate acting as
  the proton acceptor. To a lesser extent it also dehydrogenates short-chain
  saturated acyl-CoA thioesters (e.g. butanoyl-, pentanoyl-, hexanoyl-CoA), a
  promiscuous activity distinct from its physiological role. IVD is synthesized as
  a cytosolic precursor with a cleavable N-terminal mitochondrial targeting
  sequence and imported into the mitochondrial matrix, where the transit peptide is
  removed to yield the mature protein. Loss-of-function variants cause isovaleric
  acidemia, the first recognized organic acidemia, an autosomal-recessive inborn
  error of leucine metabolism marked by accumulation of isovaleric acid and its
  conjugates and a characteristic sweaty-feet odor.
