suggested_questions:
- question: Beyond isovaleryl-CoA, does IVD make any physiologically meaningful
    contribution to short-chain fatty acid beta-oxidation in vivo, or is its
    short/medium-chain acyl-CoA activity purely an in-vitro promiscuity redundant
    with ACADS/ACADM?
- question: Are the reported binary interactions with ACTN3 and GPSM3 (from
    high-throughput Y2H) reproducible and physiologically relevant, or are they
    screen artifacts unrelated to the mitochondrial matrix localization of IVD?
suggested_experiments:
- description: Quantify the in-vivo flux contribution of IVD to short-chain acyl-CoA
    dehydrogenation using stable-isotope-labeled substrates in IVD-null versus
    ACADS/ACADM-null cells, to test whether its short-chain activity is
    physiologically significant.
