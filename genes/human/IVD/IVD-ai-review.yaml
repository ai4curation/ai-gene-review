- id: PMID:2063866
  title: Molecular characterization of four different classes of mutations in the
    isovaleryl-CoA dehydrogenase gene responsible for isovaleric acidemia.
  findings: []
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: PubMed-verified; establishes IVD as a mitochondrial matrix enzyme
      and that its deficiency causes isovaleric acidemia (leucine metabolism disorder).
      Used as source for matrix localization (NAS) and the leucine-catabolism role.
- id: PMID:32296183
  title: A reference map of the human binary protein interactome.
  findings: []
  reference_review:
    relevance: LOW
    correctness: VERIFIED
    review_notes: PubMed-verified HuRI interactome paper. Correctly cited for the IPI
      protein-binding annotation (ACTN3, GPSM3), but these are high-throughput binary
      Y2H hits of unclear physiological relevance to a mitochondrial matrix enzyme;
      supports only a generic, over-annotated protein binding term.
