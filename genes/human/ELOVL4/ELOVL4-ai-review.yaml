  review:
    summary: >-
      Author-statement (NAS) annotation to a GPCR/photoreceptor molecular function.
      This is incorrect: ELOVL4 is a multipass ER-membrane fatty-acid elongase
      (acyltransferase), not a G-protein-coupled receptor, and the cited 2001 paper
      identified it as a retina-specific gene homologous to yeast VLCFA-biosynthesis
      proteins - it did not demonstrate photoreceptor/GPCR activity. This is a legacy
      mis-annotation (likely from the gene being retinal photoreceptor-specific)
      and is not experimental. Removed.
