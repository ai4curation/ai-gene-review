- id: PMID:11138005
  title: A 5-bp deletion in ELOVL4 is associated with two related forms of autosomal
    dominant macular dystrophy.
  findings:
  - statement: >-
      Identified ELOVL4 as a retinal photoreceptor-specific gene whose 5-bp
      deletion causes autosomal dominant Stargardt-like macular dystrophy, and
      recognized its homology to yeast very-long-chain fatty acid biosynthesis
      proteins, first implicating fatty-acid biosynthesis in inherited macular
      degeneration.
    supporting_text: >-
      Bioinformatic analysis of ELOVL4 revealed that it has homology to a group of
      yeast proteins that function in the biosynthesis of very long chain fatty
      acids.
    reference_section_type: ABSTRACT
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified original ELOVL4 disease/identification paper. Establishes the
      VLCFA-biosynthesis role by homology; does NOT support the GPCR/photoreceptor
      activity NAS annotation also attributed to it.
- id: PMID:16036915
  title: Dominant negative mechanism underlies autosomal dominant Stargardt-like macular
    dystrophy linked to mutations in ELOVL4.
  findings:
  - statement: >-
      Wild-type ELOVL4 localizes to the endoplasmic reticulum via its C-terminal
      ER-retention sequence, and forms a complex with C-terminally truncated
      mutant ELOVL4, supporting oligomerization and a dominant-negative disease
      mechanism.
    supporting_text: >-
      Wild type ELOVL4 containing an endoplasmic reticulum retention sequence was
      localized to the endoplasmic reticulum as expected.
    reference_section_type: ABSTRACT
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified. Source for the IDA ER-membrane localization, oligomerization,
      and Asn-20 glycosylation, and for the dominant-negative mechanism.
- id: PMID:20937905
  title: ELOVL1 production of C24 acyl-CoAs is linked to C24 sphingolipid synthesis.
  findings:
  - statement: >-
      Determined in vitro substrate specificities of all seven mammalian elongases
      (ELOVL1-7), including ELOVL4; elongases catalyze the first of four steps of
      the ER-bound VLCFA elongation cycle.
    supporting_text: >-
      Elongases catalyze the first of four steps in the VLCFA elongation cycle;
      mammals have seven elongases (ELOVL1-7). In the present study, we determined
      the precise substrate specificities of all the ELOVLs by in vitro analyses.
    reference_section_type: ABSTRACT
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Abstract foregrounds ELOVL1, but the full text assays all seven elongases
      including ELOVL4; it is the cited source of ELOVL4 EXP/IDA molecular-function,
      very-long-chain FA biosynthesis, and ER-localization annotations in GOA. Not
      downgraded on the basis of the paralog-focused title (per curation policy).
- id: PMID:32296183
  title: A reference map of the human binary protein interactome.
  findings:
  - statement: >-
      Large-scale systematic yeast two-hybrid map (HuRI) of human binary
      protein-protein interactions; the source of many ELOVL4 GO:0005515 IPI
      annotations.
    supporting_text: >-
      Here we present a human 'all-by-all' reference interactome map of human
      binary protein interactions, or 'HuRI'.
    reference_section_type: ABSTRACT
  reference_review:
    relevance: LOW
    correctness: VERIFIED
    review_notes: >-
      Correctly cited high-throughput interactome. For a polytopic ER membrane
      protein the many binary partners are largely non-informative for molecular
      function; the individual 'protein binding' annotations are over-annotations.
- id: PMID:38422897
  title: The 3-hydroxyacyl-CoA dehydratase 1/2 form complex with trans-2-enoyl-CoA
    reductase involved in substrates transfer in very long chain fatty acid elongation.
  findings:
  - statement: >-
      Describes the ER-membrane VLCFA elongation machinery as a four-component
      system (ELOVL, KAR, HACD, TECR) and the physical HACD-TECR complex, providing
      context for the experimentally observed ELOVL4-TECR interaction.
    supporting_text: >-
      the VLCFAs elongation machinery is located in ER membrane and consists of
      four components, FA elongase (ELOVL), 3-ketoacyl-CoA reductase (KAR),
      3-hydroxyacyl-CoA dehydratase (HACD), and trans-2-enoyl-CoA reductase (TECR)
    reference_section_type: ABSTRACT
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified. Supports the elongation-complex context of the ELOVL4-TECR
      IPI interaction; does not assay ELOVL4 catalytic activity directly.
- id: file:human/ELOVL4/ELOVL4-uniprot.txt
  title: UniProt entry Q9GZR5 (ELOV4_HUMAN)
  findings:
  - statement: >-
      ELOVL4 catalyzes the first and rate-limiting reaction of the four-reaction
      long/very-long-chain fatty acid elongation cycle in the ER, adding two
      carbons per cycle and producing very-long-chain saturated and polyunsaturated
      fatty acids.
    supporting_text: >-
      Catalyzes the first and rate-limiting reaction of the four
    reference_section_type: OTHER
  - statement: ELOVL4 is an endoplasmic reticulum membrane multi-pass membrane protein.
    supporting_text: Endoplasmic reticulum membrane
    reference_section_type: OTHER
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: Authoritative UniProt record used to ground function and localization.
