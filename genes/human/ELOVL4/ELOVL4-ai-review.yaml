id: Q9GZR5
gene_symbol: ELOVL4
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  ELOVL4 (Elongation of Very Long chain Fatty acids protein 4; EC 2.3.1.199) is a
  multipass endoplasmic reticulum membrane enzyme of the ELO family that catalyzes
  the first and rate-limiting condensation step of the microsomal fatty-acid
  elongation cycle, condensing a long/very-long-chain acyl-CoA with malonyl-CoA to
  yield a 3-oxoacyl-CoA (plus CO2 and CoA); the remaining three steps of each
  two-carbon-addition cycle are carried out by a 3-ketoacyl-CoA reductase, a
  3-hydroxyacyl-CoA dehydratase (HACD1/2), and trans-2-enoyl-CoA reductase (TECR).
  Among the seven mammalian elongases, ELOVL4 is distinguished by its ability to
  extend fatty acids into the ultra-long-chain range (>=C26, up to ~C38). It
  produces saturated and monounsaturated ultra-long-chain fatty acids that are
  incorporated into epidermal omega-O-acylceramides essential for the skin
  permeability barrier and into meibomian gland lipids, and ultra-long-chain
  polyunsaturated fatty acids that are enriched in retinal photoreceptor
  phospholipids and present in brain and sperm. It is anchored in the ER membrane
  by seven transmembrane helices and a C-terminal di-lysine retention motif, and
  functions as an oligomer. Dominant-negative C-terminal truncating variants cause
  autosomal dominant Stargardt-like macular dystrophy (STGD3) and spinocerebellar
  ataxia 34 (SCA34), whereas biallelic loss-of-function causes autosomal recessive
  ichthyosis with spastic quadriplegia and impaired intellectual development
  (ISQMR).
