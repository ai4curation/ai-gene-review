core_functions:
- description: >-
    Catalyzes a dedicated hydrolytic step of mitochondrial valine catabolism: the hydrolysis
    of 3-hydroxyisobutyryl-CoA (HIBYL-CoA) to 3-hydroxyisobutyrate and free coenzyme A
    (EC 3.1.2.4). This deacylation commits the pathway to the free-acid branch and is thought
    to protect against accumulation of the reactive upstream intermediate methacrylyl-CoA;
    its loss causes the inborn error of valine metabolism HIBCH deficiency.
  supported_by:
    - reference_id: PMID:8824301
      supporting_text: "beta-Hydroxyisobutyryl-CoA (HIBYL-CoA) hydrolase is responsible for the specific"
      full_text_unavailable: true
    - reference_id: file:human/HIBCH/HIBCH-uniprot.txt
      supporting_text: "Amino-acid degradation; L-valine degradation."
  molecular_function:
    id: GO:0003860
    label: 3-hydroxyisobutyryl-CoA hydrolase activity
  directly_involved_in:
    - id: GO:0006574
      label: L-valine catabolic process
  locations:
    - id: GO:0005759
      label: mitochondrial matrix
