suggested_questions:
- question: >-
    Beyond 3-hydroxyisobutyryl-CoA, how physiologically significant are HIBCH's activities
    toward isobutyryl-CoA and 3-hydroxypropanoyl-CoA, and do they represent distinct
    biological roles (e.g. in a minor pathway of propionate metabolism) worth capturing?
- question: >-
    Is the neurotoxicity of HIBCH deficiency driven primarily by accumulation of
    methacrylyl-CoA / 3-hydroxyisobutyryl-CoA and consequent ectopic protein lysine
    methacrylation, or by depletion of the free-acid product 3-hydroxyisobutyrate?
suggested_experiments:
- description: >-
    Measure in vitro hydrolase kinetics (KM/kcat) of purified recombinant human HIBCH against
    3-hydroxyisobutyryl-CoA, isobutyryl-CoA and 3-hydroxypropanoyl-CoA to define its true
    substrate preference and rank its contribution to valine versus propionate metabolism.
  hypothesis: >-
    HIBCH is a valine-pathway-dedicated hydrolase with highest catalytic efficiency for
    3-hydroxyisobutyryl-CoA, explaining why its deficiency presents as an inborn error of
    valine metabolism.
- description: >-
    In HIBCH-null cells and patient fibroblasts, perform metabolomic tracing of valine carbon
    combined with quantitative proteomics of lysine methacrylation to determine which
    accumulating thioester most strongly correlates with mitochondrial dysfunction.
  hypothesis: >-
    Accumulation of reactive valine-pathway acyl-CoA thioesters and ensuing ectopic lysine
    methacrylation, rather than loss of 3-hydroxyisobutyrate production, is the principal
    driver of the HIBCH-deficiency phenotype.
