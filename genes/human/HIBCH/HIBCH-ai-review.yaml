  label: Homo sapiens
description: >-
  HIBCH (3-hydroxyisobutyryl-CoA hydrolase, mitochondrial; EC 3.1.2.4) is a soluble
  enzyme of the mitochondrial matrix belonging to the enoyl-CoA hydratase/isomerase
  (crotonase) superfamily. It catalyzes a dedicated step of valine catabolism, the
  hydrolysis of the thioester 3-hydroxyisobutyryl-CoA (HIBYL-CoA;
  3-hydroxy-2-methylpropanoyl-CoA) to 3-hydroxyisobutyrate (3-hydroxy-2-methylpropanoate)
  plus free coenzyme A. By deacylating this intermediate, HIBCH diverts the
  valine-degradation pathway to the free-acid branch; this hydrolytic step is thought to
  protect against accumulation of the upstream reactive intermediate methacrylyl-CoA. The
  enzyme also shows activity toward related short-chain acyl-CoA thioesters, including
  isobutyryl-CoA and 3-hydroxypropanoyl-CoA (a propionate-metabolism intermediate). HIBCH
  is synthesized as a precursor with a cleaved N-terminal mitochondrial targeting
  presequence, and the mature protein resides in the matrix; it is most abundant in liver,
  heart and kidney, and is also detected in muscle and brain. Biallelic loss-of-function
  variants cause 3-hydroxyisobutyryl-CoA hydrolase deficiency (HIBCHD), an
  autosomal-recessive inborn error of valine metabolism presenting as a Leigh-like
  progressive infantile neurodegeneration with basal ganglia lesions, lactic acidosis and
  3-hydroxyisobutyric aciduria.
