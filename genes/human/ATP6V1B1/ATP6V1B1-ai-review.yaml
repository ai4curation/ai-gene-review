suggested_questions:
- Beyond intercalated cells, what is the functional contribution of the apical B1-containing
  V-ATPase in the thick ascending limb and distal convoluted tubule to acid-base handling?
- Does the C-terminal PDZ-binding motif (NHERF1/SLC4A7 interaction) regulate apical
  membrane targeting or stability of the B1-containing V-ATPase in vivo?
- Are the salt-losing and hypokalemic features of B1-related dRTA explained by B1
  expression outside type A intercalated cells?
suggested_experiments:
- Cell-type-specific (intercalated vs TAL/DCT) conditional Atp6v1b1 knockout in mouse
  to dissect the contribution of each segment to urinary acidification.
- Cryo-EM or biochemical reconstitution of a B1-containing human V-ATPase to confirm
  the B1 paralog occupies the canonical B-subunit position and characterize its non-catalytic
  nucleotide site.
- Structure-function analysis of the PDZ-binding motif (e.g. L513G knock-in) to test
  its role in apical targeting and in the renal/auditory phenotypes.
