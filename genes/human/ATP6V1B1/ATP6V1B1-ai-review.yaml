- description: As the non-catalytic B1 subunit of the V1 domain of the vacuolar H+-ATPase,
    binds ATP at non-catalytic nucleotide sites and is an essential structural component
    of the (AB)3 hexameric catalytic head, enabling ATP-hydrolysis-coupled proton
    transport by the holoenzyme.
