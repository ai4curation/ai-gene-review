id: P15313
gene_symbol: ATP6V1B1
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: ATP6V1B1 encodes the B1 isoform of the non-catalytic B subunit of the
  V1 peripheral domain of the vacuolar H+-ATPase (V-ATPase). Three copies of the B
  subunit alternate with three catalytic A subunits to form the (AB)3 heterohexameric
  head of the cytoplasmic V1 complex, which hydrolyzes ATP to drive proton translocation
  through the membrane-embedded V0 domain. The B subunit binds ATP at non-catalytic
  nucleotide sites and is essential for proper assembly and activity of the holoenzyme.
  ATP6V1B1 is the tissue-restricted (kidney, inner ear, epididymis, salivary gland)
  paralog of the ubiquitously expressed B2 subunit. In the kidney it localizes to the
  apical plasma membrane of intercalated cells (and other early distal nephron segments),
  where the plasma-membrane V-ATPase secretes protons into the urine to mediate distal
  urinary acidification; it is also expressed in the cochlea and endolymphatic sac,
  where V-ATPase activity maintains endolymph pH. A C-terminal PDZ-binding motif mediates
  interactions (e.g. with NHERF1 and the bicarbonate transporter SLC4A7) implicated in
  apical membrane targeting and scaffolding. Loss-of-function mutations cause autosomal
  recessive distal renal tubular acidosis with progressive sensorineural hearing loss
  (DRTA2).
