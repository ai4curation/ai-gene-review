id: Q12926
gene_symbol: ELAVL2
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  ELAVL2 (HuB/Hel-N1) is a neural ELAV-family RNA-binding protein with three RNA
  recognition motifs. It recognizes AU-/U-rich elements in target-mRNA 3'-UTRs
  and acts in ribonucleoprotein assemblies that control neuronal RNA fate.
  Human-neuron perturbation studies establish roles in regulation of alternative
  splicing and distal poly(A)-site use: partial ELAVL2 depletion changes
  alternatively spliced transcript networks, while acute depletion globally
  shortens 3'-UTRs. ELAVL2-dependent long 3'-UTRs also increase endogenous dsRNA
  and tonic antiviral signaling in cultured neurons, a downstream consequence of
  its RNA-processing activity. The reviewed protein is brain-enriched and
  neural-specific; two splice isoforms differ by a 13-residue segment in the
  RRM2-RRM3 hinge, but isoform-specific molecular functions remain unresolved.
alternative_products:
- name: '1'
  id: Q12926-1
  description: >-
    Canonical 359-residue isoform containing all three annotated RNA-recognition
    motifs and the complete RRM2-RRM3 hinge.
- name: '2'
  id: Q12926-2
  sequence_note: VSP_005788; residues 239-251 are absent
  description: >-
    Isoform lacking 13 residues in the hinge between RRM2 and RRM3. The decisive
    RNA-binding, splicing, and 3'-UTR-length studies do not resolve whether its
    activity differs from isoform 1.
