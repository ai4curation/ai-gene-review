proposed_new_terms: []
suggested_questions:
- question: >-
    Which ELAVL2-bound transcripts are directly regulated at splice sites versus
    proximal poly(A) sites in human neuronal subtypes?
- question: >-
    Does ELAVL2 act independently or cooperatively with ELAVL3, ELAVL4,
    cleavage/polyadenylation factors, and IGF2BP1 to lengthen neuronal 3'-UTRs?
- question: >-
    Do isoforms Q12926-1 and Q12926-2 differ in nuclear-cytoplasmic shuttling,
    RNA-target selection, or alternative-splicing versus polyadenylation output?
- question: >-
    Does DYRK1A directly phosphorylate ELAVL2, and if so, how does that alter RRM
    binding, subcellular localization, or RNP assembly?
suggested_experiments:
- hypothesis: >-
    ELAVL2 directly binds U-rich elements adjacent to regulated neuronal exons and
    proximal poly(A) sites to control splicing and distal-site choice.
  description: >-
    Combine acute degron-mediated ELAVL2 depletion in differentiated human neurons
    with ELAVL2 eCLIP, short- and long-read RNA-seq, and 3'-end sequencing. Rescue
    with wild-type ELAVL2 and RRM-binding-defective mutants, and require direct
    binding near events whose splicing or distal poly(A)-site use is restored.
- hypothesis: >-
    The two human ELAVL2 isoforms partition alternative-splicing and 3'-UTR-length
    regulation through the variable RRM2-RRM3 hinge.
  description: >-
    Generate an ELAVL2-null neuronal line and perform matched single-copy rescue
    with Q12926-1 or Q12926-2. Compare nuclear-cytoplasmic localization, eCLIP
    targets, alternative-splicing events, poly(A)-site use, RNP partners, and
    endogenous dsRNA while controlling for protein abundance.
- hypothesis: >-
    DYRK1A and IGF2BP1 interactions tune ELAVL2 RNP assembly rather than providing
    generic protein-binding activity.
  description: >-
    Validate endogenous, RNase-sensitive and RNase-resistant ELAVL2 interactions by
    reciprocal co-immunoprecipitation and proximity labeling. Map DYRK1A-dependent
    ELAVL2 phosphorylation, then test phosphosite mutants for changes in RNA binding,
    IGF2BP1 association, localization, splicing, and alternative polyadenylation.
