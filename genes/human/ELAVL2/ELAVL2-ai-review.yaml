core_functions:
- description: >-
    ELAVL2 binds AU-/U-rich elements in target-mRNA 3'-UTRs through its RRM
    domains and assembles RNA-protein complexes that regulate neuronal RNA fate.
    Human perturbation evidence links this activity to alternative-splicing
    control and distal poly(A)-site use/3'-UTR lengthening. The downstream creation
    of immunostimulatory dsRNA by long neuronal 3'-UTRs is experimentally supported
    but is not treated as a separate core molecular activity.
  molecular_function:
    id: GO:0035925
    label: mRNA 3'-UTR AU-rich region binding
  directly_involved_in:
