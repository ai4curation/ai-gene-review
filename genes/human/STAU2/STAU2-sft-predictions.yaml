    id: GO:0016020
    label: membrane
  predicted_term_type: GO_CC
  review:
    assessment: CNN
    confidence_score: 2
    summary: >-
      In GOA (IEA, GO_REF:0000002 InterPro-based). STAU2 has been found in
      membrane fractions, consistent with its association with ER-associated
      polysomes and RNP granules near membranes. The curated review accepts this
      annotation. However, membrane association is a non-core, secondary
      localization for STAU2 -- the primary functional location is the cytoplasm
