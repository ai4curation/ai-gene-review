id: Q9NUL3
gene_symbol: STAU2
taxon:
  id: uniprot:human
  label: human
status: COMPLETE
description: >-
  BioReason-Pro SFT predictions for STAU2 (human). 8 GO terms extracted from HF
  protein_catalogue. STAU2 is a brain-enriched double-stranded RNA-binding protein
  with core functions in dendritic mRNA transport and Staufen-mediated mRNA decay (SMD).
  The SFT model produces mixed results. The dsRNA binding (GO:0003725) and cytoplasm
  (GO:0005737) predictions are correct and already in GOA (CNN). The protein binding
  (GO:0005515) prediction is uninformative (REP). Two biological process predictions
  are incorrect confabulations: GO:0016441 (post-transcriptional gene silencing) and
  GO:0000027 (ribosomal large subunit assembly) are not supported by evidence and
  reflect the model conflating STAU2's SMD/UPF1 pathway with RNAi/RISC (PTGS) and
  overinterpreting ribosome association data. GO:0045047 (protein targeting to ER) is
  an overinterpretation of STAU2's ER-associated RNP granules. GO:0065003
  (protein-containing complex assembly) is over-annotation. GO:0016020 (membrane) is
  in GOA but is a non-core annotation.
references:
- id: doi:10.64898/2026.03.19.712954
  title: BioReason-Pro (Fallahpour et al. 2026)
predictions:
- source_method: BioReason-Pro-SFT
  source_version: wanglab/protein_catalogue
  source_reference_id: doi:10.64898/2026.03.19.712954
  predicted_term:
    id: GO:0003725
    label: double-stranded RNA binding
  predicted_term_type: GO_MF
  review:
    assessment: CNN
    confidence_score: 2
    summary: >-
      Correct and already in GOA (IBA, GO_REF:0000033). dsRNA binding is the
      defining molecular function of STAU2, mediated by its four conserved
      dsRNA-binding motifs (dsRBMs). Curated review gives ACCEPT as a core
      molecular function. CNN.

- source_method: BioReason-Pro-SFT
  source_version: wanglab/protein_catalogue
  source_reference_id: doi:10.64898/2026.03.19.712954
  predicted_term:
    id: GO:0005515
    label: protein binding
  predicted_term_type: GO_MF
  review:
    assessment: REP
    confidence_score: 1
    summary: >-
      Generic protein binding is uninformative per GO curation guidelines and
      is discouraged. While STAU2 does bind proteins (UPF1, STAU1, IGF2BP1,
      kinesins, etc.), the generic GO:0005515 annotation adds no functional
      specificity. The curated review marks the STAU2 protein binding annotations
      as MARK_AS_OVER_ANNOTATED. This prediction likely reflects frequency bias.
      REP.
    error_type: FREQUENCY_BIAS

- source_method: BioReason-Pro-SFT
  source_version: wanglab/protein_catalogue
  source_reference_id: doi:10.64898/2026.03.19.712954
  predicted_term:
    id: GO:0065003
    label: protein-containing complex assembly
  predicted_term_type: GO_BP
  review:
    assessment: UNC
    confidence_score: 1
    summary: >-
      Uncertain. STAU2 does nucleate mRNP (ribonucleoprotein) complexes required
      for dendritic mRNA transport. However, annotating STAU2 with "protein-containing
      complex assembly" is over-annotation -- STAU2 is a component of transport
      complexes, not a dedicated assembly chaperone. The SFT review notes this
      term would be over-annotation. Not in GOA for STAU2. UNC.

- source_method: BioReason-Pro-SFT
  source_version: wanglab/protein_catalogue
  source_reference_id: doi:10.64898/2026.03.19.712954
  predicted_term:
    id: GO:0016441
    label: post-transcriptional gene silencing
  predicted_term_type: GO_BP
  review:
    assessment: NPI
    confidence_score: 0
    summary: >-
      Incorrect. The SFT review documents that this arises from the model
      conflating Staufen-mediated mRNA decay (SMD) with post-transcriptional
      gene silencing (PTGS/RNAi). PTGS involves Argonaute/RISC/Dicer machinery,
      while SMD involves STAU2 and UPF1 helicase. These are mechanistically
      distinct pathways. There is no evidence that STAU2 recruits RNAi/RISC
      machinery or mediates gene silencing in the RNAi sense. The model appears
      to have been misled by the superficial similarity between SMD (mRNA
      degradation) and PTGS (mRNA silencing). Not in GOA. NPI.
    error_type: IN_VITRO_NOT_IN_VIVO

- source_method: BioReason-Pro-SFT
  source_version: wanglab/protein_catalogue
  source_reference_id: doi:10.64898/2026.03.19.712954
  predicted_term:
    id: GO:0045047
    label: protein targeting to ER
  predicted_term_type: GO_BP
  review:
    assessment: NPI
    confidence_score: 0
    summary: >-
      Incorrect interpretation. While STAU2-containing RNP granules are found
      associated with the ER (documented by UniProt from rat ortholog), this
      reflects association of mRNP granules with ER-associated polysomes for
      localized translation -- not a protein targeting function. The SFT review
      explicitly identifies this as an over-interpretation: "The ER association
      is likely incidental to RNP granule localization near polysomes, not a
      directed protein targeting function." GO:0045047 (protein targeting to ER)
      is not in GOA for STAU2 and misframes the biology. NPI.
    error_type: IN_VITRO_NOT_IN_VIVO

- source_method: BioReason-Pro-SFT
  source_version: wanglab/protein_catalogue
  source_reference_id: doi:10.64898/2026.03.19.712954
  predicted_term:
    id: GO:0000027
    label: ribosomal large subunit assembly
  predicted_term_type: GO_BP
  review:
    assessment: NPI
    confidence_score: 0
    summary: >-
      Incorrect. The SFT review documents this as a confabulation: "No published
      evidence connects STAU2 to ribosome biogenesis." While some STAU2 isoforms
      associate with ribosomes (for translation regulation or mRNA fate
      determination), this is not ribosome assembly. The model appears to have
      interpreted the ribosome association data as evidence for ribosome assembly
      activity, which is not the case. Not in GOA for STAU2. NPI.
    error_type: FREQUENCY_BIAS

