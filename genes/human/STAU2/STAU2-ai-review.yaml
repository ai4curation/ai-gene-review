      mRNAs and recruiting UPF1 helicase to promote mRNA degradation. STAU2 binds UPF1
      ~10-fold more than STAU1.
    action: NEW
    reason: >-
      SMD is a well-characterized mRNA decay pathway mediated by both STAU1 and STAU2.
