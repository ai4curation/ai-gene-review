    supported_by:
    - reference_id: PMID:34159380
      supporting_text: "Bio-layer interferometry (BLI) assay confirmed the bindings between Nsp2- and 4-interacting proteins, i.e. STAU2 (Staufen2)"

- term:
    id: GO:0005515
    label: protein binding
  evidence_type: IPI
