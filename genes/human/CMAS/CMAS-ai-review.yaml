    id: GO:0008781
    label: N-acylneuraminate cytidylyltransferase activity
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: enables
  review:
    summary: >-
      Core catalytic molecular function. CMAS condenses N-acylneuraminate with CTP to
      form CMP-N-acyl-beta-neuraminate plus diphosphate (EC 2.7.7.43), the activation
      step for sialic acid. The phylogenetic (IBA) inference is well supported by the
      experimentally verified human enzyme activity and by orthologs across fly, mouse
      and zebrafish. This is the primary function of the gene.
    action: ACCEPT
