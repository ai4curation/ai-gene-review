  label: Homo sapiens
description: >-
  CMAS is human N-acylneuraminate cytidylyltransferase (CMP-N-acetylneuraminic acid
  synthase; EC 2.7.7.43), the enzyme that activates free sialic acid for use in
  glycoconjugate biosynthesis. It condenses N-acetylneuraminate (Neu5Ac) with CTP to
  form the sugar-nucleotide donor CMP-N-acetylneuraminate (CMP-Neu5Ac) plus
  diphosphate; the enzyme also acts on other sialic acids including
  N-glycolylneuraminate (Neu5Gc) and KDN. CMP-Neu5Ac is the universal donor substrate
  used by sialyltransferases (after transport into the Golgi by the CMP-sialic acid
  transporter SLC35A1) to sialylate glycoproteins and glycolipids. The active enzyme is
  a homotetramer (a dimer of dimers). Unusually among the sialic-acid biosynthetic
  enzymes, human CMAS localizes at least partly to the nucleus; its basic-cluster (BC2)
  motif directs nuclear localization and contains the catalytic active site, although
  nuclear localization is not itself required for catalytic activity. CMAS is
  ubiquitously expressed.
