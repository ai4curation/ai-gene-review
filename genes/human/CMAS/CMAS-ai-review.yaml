    action: KEEP_AS_NON_CORE
    supported_by:
    - reference_id: Reactome:R-HSA-4084982
      supporting_text: "CMAS is ubiquitously expressed and localizes to the nucleus in mammalian cells."
core_functions:
- description: >-
    N-acylneuraminate cytidylyltransferase (CMP-sialic acid synthase) activity: CMAS
    condenses free N-acetylneuraminate (Neu5Ac; also Neu5Gc and KDN) with CTP to form
    the sugar-nucleotide donor CMP-N-acetylneuraminate plus diphosphate, activating
    sialic acid for downstream sialyltransferase reactions. The active enzyme is a
    homotetramer localized (at least partly) to the nucleus.
