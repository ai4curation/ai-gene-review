- term:
    id: GO:0006054
    label: N-acetylneuraminate metabolic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000041
  qualifier: involved_in
  review:
    summary: >-
      Correct but a broad parent process. CMAS acts on N-acetylneuraminate, so
      involvement in its metabolism is accurate. However the specific product of the
      CMAS reaction is CMP-N-acetylneuraminate, so the more precise process term
      GO:0006055 (CMP-N-acetylneuraminate biosynthetic process) better captures the
      core biological role. Retained as non-core (less-precise ancestor).
    action: KEEP_AS_NON_CORE
    supported_by:
    - reference_id: file:human/CMAS/CMAS-uniprot.txt
      supporting_text: "Amino-sugar metabolism; N-acetylneuraminate metabolism."
- term:
    id: GO:0005730
    label: nucleolus
  evidence_type: IDA
  original_reference_id: GO_REF:0000052
  qualifier: located_in
  review:
    summary: >-
      Immunofluorescence (HPA) sub-nuclear localization to the nucleolus. Consistent
      with the established nuclear localization of CMAS, but the nucleolar
      sub-compartment is not functionally established as the site relevant to catalysis
      (the enzyme is also seen in nucleoplasm and is active independent of nuclear
      import). Kept as a valid but non-core localization detail.
    action: KEEP_AS_NON_CORE
- term:
    id: GO:0006055
    label: CMP-N-acetylneuraminate biosynthetic process
  evidence_type: IMP
  original_reference_id: PMID:31121216
  qualifier: involved_in
  review:
    summary: >-
      Core biological process, experimentally supported. Willems et al. (2019) showed
      that CMAS-knockout cells have undetectable CMP-sialic acid, directly
      demonstrating that CMAS is required for CMP-N-acetylneuraminate biosynthesis. This
      is the precise process term for the CMAS reaction and represents the core
      biological role of the gene.
    action: ACCEPT
    supported_by:
    - reference_id: PMID:31121216
      supporting_text: "CMP-sialic acid was dramatically reduced \nin GNE and NANS KO cells and undetectable in CMAS KO."
- term:
    id: GO:0016020
    label: membrane
  evidence_type: HDA
  original_reference_id: PMID:19946888
  qualifier: located_in
  review:
    summary: >-
      Derived from a large-scale membrane-proteome MS survey of an NK-like cell line.
      CMAS is a soluble nuclear/cytosolic enzyme (homotetramer) with no transmembrane
      domain or signal peptide, and the study itself notes that a large fraction of
      identified proteins are only transiently associated with membranes rather than
      integral. Capture in a membrane preparation is best interpreted as a proteomics
      artifact, not a functional membrane localization. This is a high-throughput (HDA)
      dataset annotation, so it is flagged as an over-annotation rather than removed.
    action: MARK_AS_OVER_ANNOTATED
- term:
    id: GO:0005634
    label: nucleus
  evidence_type: HDA
  original_reference_id: PMID:21630459
  qualifier: located_in
  review:
    summary: >-
      High-throughput MS identification of CMAS in the isolated human sperm nucleus
      proteome. Corroborates the experimentally established nuclear localization of
      CMAS (Lawrence et al. 2001). Consistent and correct.
    action: ACCEPT
- term:
    id: GO:0005654
    label: nucleoplasm
  evidence_type: TAS
  original_reference_id: Reactome:R-HSA-4084982
  qualifier: located_in
  review:
    summary: >-
      Reactome traceable-author-statement placing CMAS in the nucleoplasm. Reactome
      states that CMAS localizes to the nucleus in mammalian cells; nucleoplasm is a
      reasonable sub-nuclear compartment consistent with the experimental nuclear
