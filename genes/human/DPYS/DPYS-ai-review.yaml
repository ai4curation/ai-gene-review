id: Q14117
gene_symbol: DPYS
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  DPYS encodes dihydropyrimidinase (DHP/DHPase; EC 3.5.2.2), the second enzyme of the
  reductive pyrimidine catabolic pathway. Acting downstream of dihydropyrimidine
  dehydrogenase (DPYD) and upstream of beta-ureidopropionase (UPB1), it catalyzes the
  reversible, Zn2+-dependent hydrolytic ring opening of 5,6-dihydrouracil to
  N-carbamoyl-beta-alanine (3-ureidopropanoate) and of 5,6-dihydrothymine to
  N-carbamoyl-beta-aminoisobutyrate. It is a binuclear zinc metalloenzyme of the
  metallo-dependent (cyclic amidohydrolase / amidohydrolase) hydrolase superfamily,
  hydantoinase/dihydropyrimidinase family, and forms a homotetramer with two Zn2+ ions
  bridged by a carbamylated lysine per subunit. The enzyme is cytosolic and most highly
  expressed in liver and kidney. Loss-of-function variants cause dihydropyrimidinase
  deficiency (dihydropyrimidinuria), an autosomal recessive disorder with a variable
  neurological phenotype, and impaired dihydropyrimidinase activity increases the risk of
  fluoropyrimidine (5-fluorouracil) toxicity.
