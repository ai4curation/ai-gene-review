taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: PGLS is 6-phosphogluconolactonase (EC 3.1.1.31), the second enzyme of
  the oxidative branch of the pentose phosphate pathway. It hydrolyses 6-phospho-D-glucono-1,5-lactone,
  the product of glucose-6-phosphate dehydrogenase (G6PD), to 6-phospho-D-gluconate,
  the substrate of 6-phosphogluconate dehydrogenase (PGD). By accelerating hydrolysis
  of the reactive delta-lactone it both drives flux through the oxidative branch and
  prevents accumulation of the electrophilic lactone (and its dead-end gamma-isomer),
  which can react with cellular nucleophiles. The enzyme is cytosolic, belongs to
  the glucosamine/galactosamine-6-phosphate isomerase family (6-phosphogluconolactonase
  subfamily), and is ubiquitously expressed.
