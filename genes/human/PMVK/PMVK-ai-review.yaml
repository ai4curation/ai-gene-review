id: Q15126
gene_symbol: PMVK
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: Phosphomevalonate kinase (PMVK; EC 2.7.4.2) is a small (192-residue) cytosolic
  enzyme of the nucleoside-monophosphate kinase family (P-loop/Walker-A fold) that catalyses
  the reversible, ATP- and cation-dependent phosphorylation of (R)-mevalonate 5-phosphate
  to (R)-mevalonate 5-diphosphate, generating ADP. This is the fifth reaction of the
  mevalonate/isoprenoid biosynthetic pathway, acting between mevalonate kinase (MVK) and
  diphosphomevalonate decarboxylase (MVD), and constitutes step 2 of the three-step
  conversion of (R)-mevalonate to isopentenyl diphosphate (IPP), the universal isoprenoid
  precursor from which sterols (including cholesterol) and nonsterol isoprenoids are built.
  The enzyme acts as a monomer and uses ATP as the phosphoryl donor, with conserved basic
  active-site residues (e.g. K22, R110) neutralising the pentacoordinate phosphoryl-transfer
  intermediate. PMVK is expressed broadly (highest in heart, liver, skeletal muscle, kidney
  and pancreas) and its transcription is upregulated by sterol depletion, consistent with
  coordinate regulation of the cholesterol biosynthetic program. Although it carries a
  C-terminal Ser-Arg-Leu type-1 peroxisomal targeting signal and was historically proposed
  to be peroxisomal, multiple biochemical and microscopy studies establish that human PMVK
  is a cytosolic protein. Loss-of-function variants cause autosomal-dominant porokeratosis.
