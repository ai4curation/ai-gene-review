  review:
    summary: Phylogenetic assignment placing PMVK in cholesterol biosynthesis. This is
      correct but represents a downstream branch of the pathway; the enzymatic step feeds
      the whole isoprenoid program, of which cholesterol is one output.
    action: KEEP_AS_NON_CORE
    reason: Cholesterol is a downstream product of the mevalonate pathway; the more precise
      pathway role of PMVK is IPP biosynthesis (GO:0019287, step 2/3 to IPP), from which
      the sterol and nonsterol isoprenoid branches diverge. Keep as a valid but non-core
      (broader downstream) process annotation.
