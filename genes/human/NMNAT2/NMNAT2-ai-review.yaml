suggested_questions:
- question: >-
    Is the axon-maintenance function of NMNAT2 fully attributable to its NAD+-biosynthetic activity
    (and consequent SARM1 suppression via NMN consumption), or does NMNAT2 also have activity-
    independent (e.g. chaperone-like) contributions to axon survival?
- question: >-
    How central is the PARP16-adaptor / translation-regulatory role of NMNAT2 outside the cancer
    context in which it was characterized, and is it relevant in neurons?
- question: >-
    What is the spectrum and mechanism of NMNAT2-related human disease (childhood-onset polyneuropathy
    with skeletal abnormalities) and how does it relate to the murine perinatal-lethal axon phenotype?
suggested_experiments:
- description: >-
    Quantify axonal NAD+/NMN and SARM1 activation in human neurons upon graded NMNAT2 depletion versus
    catalytic-dead (H24 / W92) rescue, to separate metabolic from non-metabolic contributions to axon
    survival.
- description: >-
    Structural and enzyme-kinetic comparison of the three human NMNAT isoforms under matched conditions
    to define isoform-specific substrate preferences (NMN vs NaMN vs NMNH) relevant to compartmentalized
    NAD+ pools.
