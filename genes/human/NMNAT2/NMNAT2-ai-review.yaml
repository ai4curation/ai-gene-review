description: >-
  NMNAT2 (nicotinamide/nicotinate mononucleotide adenylyltransferase 2) is one of three
  human NMNAT isoforms and catalyzes the central, committed adenylyl-transfer step of NAD+
  biosynthesis: it condenses nicotinamide mononucleotide (NMN) with ATP to form NAD+
  (EC 2.7.7.1), and less efficiently condenses nicotinate mononucleotide (NaMN) with ATP to
  form deamido-NAD+ (NaAD; EC 2.7.7.18), releasing pyrophosphate in each case. This reaction
  is shared by the NAD+ salvage and de novo routes. The active enzyme is a Mg2+-dependent
  monomer. Unlike the nuclear isoform NMNAT1 and the mitochondrial NMNAT3, NMNAT2 is a
  cytosolic, Golgi/Golgi-derived-vesicle-membrane-associated enzyme; membrane attachment
  requires palmitoylation, and the protein is trafficked into axons on Golgi-derived vesicles.
  NMNAT2 is highly expressed in brain and is a labile, short-lived protein. Its continuous
  supply is a key axon-maintenance/survival factor: by sustaining local NAD+ (and consuming
  NMN) it keeps the pro-degenerative NADase SARM1 inactive, thereby delaying Wallerian-type
  axon degeneration; loss or depletion of NMNAT2 triggers axon degeneration and, in mice,
  perinatal lethality with severe axon defects. In cytosolic NAD+-supply roles it can also
  support the mono-ADP-ribosyltransferase PARP16, promoting ribosomal-protein MARylation that
  tunes cytoplasmic translation. Biallelic loss-of-function variants cause a human polyneuropathy
  with skeletal abnormalities.
