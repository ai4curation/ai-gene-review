gene_symbol: CYP39A1
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  CYP39A1 (24-hydroxycholesterol 7-alpha-hydroxylase; EC 1.14.14.26) is a
  liver-specific, microsomal (endoplasmic reticulum membrane) heme-thiolate
  cytochrome P450 monooxygenase. It catalyzes the 7-alpha-hydroxylation of
  (24S)-hydroxycholesterol, a neural oxysterol produced in the brain (by
  CYP46A1) and exported to the liver, converting it to
  (24S)-7-alpha-dihydroxycholesterol as the committing step of the alternative
  (acidic) bile-acid synthesis pathway. Like other P450s it uses molecular
  oxygen, inserting one oxygen atom into the substrate and reducing the other to
  water, with two electrons supplied by NADPH via NADPH--cytochrome P450
  reductase; catalysis requires a heme cofactor coordinated by an axial iron
  ligand. CYP39A1 is one of two mammalian oxysterol 7-alpha-hydroxylases: it is
  selective for 24-hydroxycholesterol, whereas the related enzyme CYP7B1 acts on
  25- and 27-hydroxycholesterol. Through this reaction CYP39A1 contributes to
  disposal of excess brain-derived cholesterol as bile acids and to sterol
  homeostasis. In humans, loss-of-function alleles raise serum
  (24S)-hydroxycholesterol levels, and functionally deficient CYP39A1 variants
  are associated with exfoliation syndrome and exfoliation glaucoma.
