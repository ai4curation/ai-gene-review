      oxysterol 7-alpha-hydroxylase (distinct from CYP7B1) with preference for
      24-hydroxycholesterol; hepatic expression is sexually dimorphic and not
      regulated by dietary cholesterol or bile acids.
    supporting_text: >-
      CYP39A1 is a microsomal cytochrome P450 enzyme that has preference for
      24-hydroxycholesterol and is expressed in the liver
  reference_review:
    relevance: HIGH
