  title: Gene Ontology annotation based on curation of immunofluorescence data
  findings: []
- id: PMID:27485036
  title: Genome-wide identification and gene expression profiling of ubiquitin ligases
    for endoplasmic reticulum protein degradation.
  findings:
    - statement: >-
        CGRRF1 is one of 37 human RING-finger + transmembrane proteins computationally selected as
        candidate ERAD E3 ligases; it localizes to the ER (colocalization with PDI) and its expression
        is up-regulated by ER stress and by ATF6.
      reference_section_type: RESULTS
    - statement: >-
        In an in vitro autoubiquitination assay with the E2 UbcH5c/UBE2D3, CGRRF1 did NOT exhibit E3
        activity, and it conferred no resistance to ER stress, unlike RNFT1 and RNF185.
      reference_section_type: RESULTS
- id: PMID:32296183
  title: A reference map of the human binary protein interactome.
  findings:
    - statement: >-
        CGRRF1 protein interactions in GOA derive from the HuRI high-throughput binary (Y2H)
        interactome map; interactors are mostly other membrane/ER-Golgi proteins and are not
        individually validated.
      reference_section_type: RESULTS
- id: PMID:32614325
  title: Interaction mapping of endoplasmic reticulum ubiquitin ligases identifies modulators
    of innate immune signalling.
  findings:
    - statement: >-
        CGRRF1 is treated as one of ~25 ER-resident transmembrane RING E3 ligases; its transcript
        is induced by acute ER stress, and Evi/WLS/GPR177 is stated to have been established as a
        novel target for regulated ERAD by CGRRF1 (Glaeser et al., 2018), independently corroborating
        the E3-ligase/ERAD/Evi-substrate role.
      reference_section_type: RESULTS
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Cached full text (full_text_available). Directly names CGRRF1 among ER-resident E3 ligases and
      independently corroborates the Glaeser 2018 finding that Evi/WLS is a regulated-ERAD substrate
      of CGRRF1. Provides a peer-reviewed verbatim anchor for the new E3-ligase and ERAD annotations.
- id: file:human/CGRRF1/CGRRF1-deep-research-falcon.md
  title: Falcon deep research report for CGRRF1
  findings:
    - statement: >-
        LLM-synthesized deep research report. Its CGRRF1-specific core finding - that CGRRF1 is a
        functional ER E3 ligase that, with the cognate E2 UBE2J2, ubiquitinates the Wnt cargo
        receptor Evi/WLS for regulated ERAD (siRNA depletion raises Evi, TUBE2 pulldown shows reduced
        Evi ubiquitination, co-IP, RING-mutant stabilisation) - traces to Glaeser et al. 2018 (EMBO J)
        and is independently corroborated by the cached Fenech et al. 2020 (PMID:32614325).
      reference_section_type: OTHER
    - statement: >-
        Family/inference-level statements in the report (general ERAD machinery roles drawn from
        Christianson 2023 and Wang 2025 reviews, the candidate inner-nuclear-membrane localization near
        emerin/LBR from Cheng et al. 2022 proximity labeling, K11/K48/K63 chain linkages, and the
        cancer/TCGA Wnt-secretion speculation) are broader inferences and should not be asserted as
        CGRRF1-specific molecular function without primary verification.
      reference_section_type: OTHER
  reference_review:
    relevance: HIGH
    correctness: UNVERIFIED
    review_notes: >-
      LLM-generated synthesis; not independently verified for every claim. The central CGRRF1-specific
      claim (active E3 ligase; cognate E2 UBE2J2; substrate Evi/WLS; regulated ERAD) is strong because
      it is corroborated by a cached, peer-reviewed full-text source (Fenech 2020, PMID:32614325) and
      reconciles the earlier negative in vitro autoubiquitination result (PMID:27485036, non-cognate E2
      UbcH5c). Treated cautiously: candidate/inner-nuclear-membrane localization (Cheng 2022 proximity
      labeling), specific ubiquitin chain linkages, and cancer/TCGA implications are family- or
      inference-level and are NOT used to drive existing-annotation actions. Marked UNVERIFIED by
      default for LLM synthesis pending primary-source confirmation of the Glaeser 2018 details.
- id: PMID:8968090
  title: Induction of cell growth regulatory genes by p53.
  findings:
    - statement: >-
        CGRRF1 was originally isolated as CGR19, a p53-induced cell growth regulatory gene encoding a
        RING-finger protein whose overexpression inhibits growth of several cell lines.
      reference_section_type: ABSTRACT
