        supporting_text: "Nucleus {ECO:0000269|PubMed:22361696}."
- term:
    id: GO:0005783
    label: endoplasmic reticulum
  evidence_type: IDA
  original_reference_id: PMID:27485036
  qualifier: located_in
  review:
    summary: >-
      Experimentally supported (IDA) ER localization: V5-tagged CGRRF1 stably overexpressed in COS-1
      cells partially colocalized with endogenous PDI, an ER-resident chaperone, indicating ER
      localization. Consistent with the protein's N-terminal transmembrane anchor.
    action: ACCEPT
    reason: >-
      This is the best-supported and mechanistically relevant subcellular localization, directly
      observed by immunocytochemistry and consistent with the membrane-anchored RING-domain
      architecture expected of an ER-resident E3 ligase. A more specific term (GO:0005789 endoplasmic
      reticulum membrane) is biologically appropriate given the transmembrane anchor, but the IDA
      colocalization with PDI supports the parent ER term directly.
    supported_by:
      - reference_id: PMID:27485036
        supporting_text: RNFT1, RNF185, CGRRF1 and RNF19B partially colocalised with endogenous PDI, an ER-resident chaperone, indicating their localisation to the ER
- term:
    id: GO:0008285
    label: negative regulation of cell population proliferation
  evidence_type: TAS
  original_reference_id: PMID:8968090
  qualifier: involved_in
  review:
    summary: >-
      Author statement (TAS) that CGR19/CGRRF1, a p53-induced gene, inhibits the growth of several
      cell lines when overexpressed, the original functional description of the gene.
    action: KEEP_AS_NON_CORE
    reason: >-
      This reflects an overexpression growth-inhibition phenotype rather than a defined molecular
      mechanism. It is a descriptive, downstream biological observation and is retained as non-core
      rather than as the central function of an ER-membrane RING-domain protein.
    supported_by:
      - reference_id: PMID:8968090
        supporting_text: Both CGR11 and CGR19 are able to inhibit the growth of several cell lines.
- term:
    id: GO:0061630
    label: ubiquitin protein ligase activity
  evidence_type: TAS
  original_reference_id: PMID:32614325
  qualifier: enables
  review:
    summary: >-
      Not present in the current GOA set, but added (NEW) on the basis of substrate-focused work
      (Glaeser et al., 2018, EMBO J) showing CGRRF1 is a functional ER RING-type E3 ubiquitin ligase
      that, with the cognate E2 UBE2J2, ubiquitinates the Wnt cargo receptor Evi/WLS and targets it
      for ERAD. CGRRF1 depletion increases Evi steady-state levels and reduces Evi poly-ubiquitination
      (TUBE2 pulldown), CGRRF1 co-immunoprecipitates with Evi, and catalytic RING-domain (C2/C4A)
      mutants stabilise Evi - together establishing E2- and substrate-specific E3 activity. This
      reconciles the earlier negative in vitro autoubiquitination result (PMID:27485036), which used
      only the promiscuous non-cognate E2 UbcH5c/UBE2D3.
    action: NEW
    reason: >-
      The E3-ligase molecular function is now supported by independent experimental work and is
      corroborated in a cached full-text review (Fenech et al., 2020, eLife), which states that
      Evi/WLS/GPR177 "was established as novel target for regulated ERAD by CGRRF1 (Glaeser et al.,
      2018)". This is the mechanistically central function of the protein and was previously only
      inferred from RING+TM structure; it should be represented explicitly. Evidence is treated as
      TAS (Traceable Author Statement): the primary experiments (siRNA depletion, TUBE2 pulldown,
      co-IP, RING C2/C4A mutant stabilisation of Evi) are reported in Glaeser et al. 2018 (EMBO J,
      doi:10.15252/embj.201797311), which is not yet cached as a PMID in this repository; the
      `original_reference_id` PMID:32614325 (Fenech et al. 2020) traceably attributes the function to
      that primary source. The annotation should be re-evidenced as IMP against the Glaeser 2018 PMID
      once it is fetched.
    supported_by:
      - reference_id: PMID:32614325
        supporting_text: "Substrates are typified by the Wnt receptor Evi/WLS/GPR177, which after being identified early in this study was established as novel target for regulated ERAD by CGRRF1 (Glaeser et al., 2018)"
      - reference_id: file:human/CGRRF1/CGRRF1-deep-research-falcon.md
        supporting_text: "**RING domain mutants** of CGRRF1 stabilized Evi protein levels, confirming the requirement of an intact catalytic domain for substrate turnover"
- term:
    id: GO:0036503
    label: ERAD pathway
  evidence_type: TAS
  original_reference_id: PMID:32614325
  qualifier: involved_in
  review:
    summary: >-
      Not present in the current GOA set, but added (NEW). CGRRF1 acts in ER-associated degradation
      (ERAD): it is an ER-membrane RING E3 whose best-characterised role is the regulated ERAD of the
      Wnt cargo receptor Evi/WLS, working with the E2 UBE2J2 and the VCP/p97 dislocation machinery to
      route Evi to proteasomal degradation when Wnt ligand is absent. This is "regulatory ERAD" of a
      mature, properly folded secretory factor rather than classical disposal of misfolded protein.
    action: NEW
    reason: >-
      Independent experimental work (Glaeser et al., 2018) and a cached full-text review (Fenech et al.,
      2020, eLife) place CGRRF1 in the ERAD pathway as the E3 ligase for the Evi/WLS substrate. The ER
      localization (IDA, PMID:27485036), ER-stress/ATF6 transcriptional induction, and RING+TM
      architecture already in the review are all consistent with this process annotation, which makes
      the gene's core biological role explicit. Evidence is treated as TAS (Traceable Author Statement):
      the primary experiments are reported in Glaeser et al. 2018 (EMBO J, doi:10.15252/embj.201797311,
      not yet cached as a PMID); the `original_reference_id` PMID:32614325 (Fenech et al. 2020)
      traceably attributes the ERAD-pathway role to that primary source. Re-evidence as IMP once the
      Glaeser 2018 PMID is fetched.
    supported_by:
      - reference_id: PMID:32614325
        supporting_text: "Substrates are typified by the Wnt receptor Evi/WLS/GPR177, which after being identified early in this study was established as novel target for regulated ERAD by CGRRF1 (Glaeser et al., 2018)"
      - reference_id: file:human/CGRRF1/CGRRF1-deep-research-falcon.md
        supporting_text: "CGRRF1 functions primarily as an **E3 ubiquitin ligase** embedded in the endoplasmic reticulum (ER) membrane, where it participates in **ER-associated degradation (ERAD)** pathways"
core_functions:
  - description: >-
      ER membrane-anchored RING-type E3 ubiquitin ligase. The C-terminal cytosolic RING domain
      recruits the cognate ubiquitin-charged E2 enzyme UBE2J2 and transfers ubiquitin onto substrate,
      while the N-terminal transmembrane segment anchors the protein in the ER membrane. E3 activity is
      E2- and substrate-specific (and so was not detected in an early in vitro screen using the
      promiscuous non-cognate E2 UbcH5c); catalytic RING-domain mutants fail to promote substrate
      turnover.
    molecular_function:
      id: GO:0061630
      label: ubiquitin protein ligase activity
    supported_by:
      - reference_id: PMID:32614325
        supporting_text: "Substrates are typified by the Wnt receptor Evi/WLS/GPR177, which after being identified early in this study was established as novel target for regulated ERAD by CGRRF1 (Glaeser et al., 2018)"
      - reference_id: file:human/CGRRF1/CGRRF1-deep-research-falcon.md
        supporting_text: "CGRRF1 works in conjunction with the **E2 ubiquitin-conjugating enzyme UBE2J2** to ubiquitinate substrates"
      - reference_id: file:human/CGRRF1/CGRRF1-uniprot.txt
        supporting_text: 'ZN_FING         274..309 /note="RING-type"'
  - description: >-
      Localizes to the endoplasmic reticulum and is transcriptionally induced as part of the ER
      stress / unfolded protein response (ATF6 branch), consistent with a role in ER protein
      quality control.
    locations:
      - id: GO:0005783
        label: endoplasmic reticulum
    supported_by:
      - reference_id: PMID:27485036
        supporting_text: RNFT1, RNF185, CGRRF1 and RNF19B partially colocalised with endogenous PDI, an ER-resident chaperone, indicating their localisation to the ER
      - reference_id: PMID:27485036
        supporting_text: ATF6 (N-terminal domain) significantly upregulated CGRRF1 and RNF19B expression
  - description: >-
      Mediates regulated ER-associated degradation (ERAD) of the Wnt cargo receptor Evi/Wntless
      (WLS/GPR177): with the E2 UBE2J2 it ubiquitinates Evi and, via VCP/p97-dependent extraction,
      routes it to the proteasome when Wnt ligand is unavailable, thereby tuning the cell's capacity
      for Wnt ligand secretion. This is regulatory ERAD of a properly folded secretory factor rather
      than disposal of misfolded protein.
    locations:
      - id: GO:0005783
        label: endoplasmic reticulum
    supported_by:
      - reference_id: PMID:32614325
        supporting_text: "Substrates are typified by the Wnt receptor Evi/WLS/GPR177, which after being identified early in this study was established as novel target for regulated ERAD by CGRRF1 (Glaeser et al., 2018)"
      - reference_id: file:human/CGRRF1/CGRRF1-deep-research-falcon.md
        supporting_text: "The best-characterized and experimentally validated substrate of CGRRF1 is **Evi (also known as Wntless or WLS/GPR177)**, the dedicated cargo receptor for Wnt protein secretion"
proposed_new_terms: []
suggested_questions:
  - question: >-
      Does CGRRF1 possess ubiquitin-protein ligase activity with an E2 other than UbcH5c/UBE2D3, given
      that the only published in vitro autoubiquitination assay (using UbcH5c) was negative?
  - question: >-
      What are the physiological ERAD substrates of CGRRF1, and does it function within or parallel to
      the canonical HRD1/SYVN1 ERAD machinery?
  - question: >-
      How are the reported ER-membrane and nucleoplasmic localizations reconciled, and is the nuclear
      signal a genuine localization or an antibody artifact for this Tdark protein?
suggested_experiments:
  - description: >-
      Perform in vitro autoubiquitination and substrate-ubiquitination assays across a panel of E2
      conjugating enzymes (beyond UbcH5c/UBE2D3) using recombinant CGRRF1 RING domain, with RING
      point mutants as negative controls, to determine whether CGRRF1 has E3 ligase activity with a
      cognate E2.
    experiment_type: biochemical assay
    hypothesis: >-
      CGRRF1 is a bona fide RING E3 ubiquitin ligase whose activity requires a specific E2 not tested
      in the original in vitro screen.
  - description: >-
      Identify CGRRF1 interaction partners and candidate substrates by proximity labeling (BioID/TurboID)
      or affinity purification-mass spectrometry from ER membranes, followed by ubiquitination and
      stability assays of candidate substrates upon CGRRF1 depletion or RING mutation.
    experiment_type: proteomics / interactomics
    hypothesis: >-
      CGRRF1 ubiquitinates one or more ER-membrane or ER-luminal client proteins, targeting them for
      ERAD-mediated proteasomal degradation.
  - description: >-
      Knock out or deplete CGRRF1 in cells challenged with ER stressors and measure accumulation of
      model ERAD substrates, UPR marker induction, and ER-stress-induced apoptosis, with rescue by WT
      versus RING-dead CGRRF1.
    experiment_type: genetic manipulation / cell biology
    hypothesis: >-
      Loss of CGRRF1 impairs ERAD of specific substrates and alters sensitivity to ER stress in a
      RING-domain-dependent manner.
