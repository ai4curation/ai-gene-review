id: Q99675
gene_symbol: CGRRF1
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  CGRRF1 (cell growth regulator with RING finger domain protein 1; also known as CGR19 and
  RNF197) is a 332-residue endoplasmic reticulum (ER) membrane-anchored protein with an
  N-terminal hydrophobic/transmembrane region and a C-terminal cytosolic RING-type zinc
  finger (residues ~274-309; NMR structure PDB 2EA5). Its domain architecture (a canonical
  C3HC4/C3H2C3 RING coupled to a transmembrane membrane anchor) is the hallmark of ER-resident
  RING-type E3 ubiquitin ligases that act in ER-associated degradation (ERAD), where they
  cooperate with E2 conjugating enzymes to ubiquitinate substrates destined for proteasomal
  degradation. CGRRF1 localizes to the ER and partially to the nucleus, is transcriptionally
  up-regulated by ER stress (thapsigargin, tunicamycin) downstream of the ATF6 branch of the
  unfolded protein response, and is ubiquitously expressed with highest levels in testis and
  cerebellum. It was originally discovered as CGR19, a p53-induced transcript whose
  overexpression inhibits growth of several cell lines, the basis of its historical
  description as a cell growth/cell cycle regulator. Although structurally classified among
  candidate ERAD E3 ligases, direct biochemical demonstration of its ubiquitin ligase activity
  is lacking: the one published in vitro autoubiquitination test (with the E2 UbcH5c/UBE2D3)
  was negative, and no physiological substrate has been defined.
aliases:
  - CGR19
  - RNF197
existing_annotations:
- term:
    id: GO:0030308
    label: negative regulation of cell growth
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: involved_in
  review:
    summary: >-
      Phylogenetically inferred (IBA) negative regulation of cell growth, transferred across the
      CGRRF1 ortholog group (PANTHER:PTN002310361, including rat ortholog RGD:620803). This trace
      is rooted in the original observation that CGR19/CGRRF1 overexpression inhibits cell growth.
    action: KEEP_AS_NON_CORE
    reason: >-
      The growth-inhibitory phenotype derives from overexpression assays (PMID:8968090) and reflects
      a downstream cellular consequence rather than the molecular core function of the protein, which
      structurally is an ER-membrane RING-domain protein. No mechanism links CGRRF1 directly to a
      growth-control pathway. Retained as a non-core biological-process annotation.
    supported_by:
      - reference_id: PMID:8968090
        supporting_text: Both CGR11 and CGR19 are able to inhibit the growth of several cell lines.
- term:
    id: GO:0005634
    label: nucleus
  evidence_type: IEA
  original_reference_id: GO_REF:0000044
  qualifier: located_in
  review:
    summary: >-
      Nucleus localization mapped electronically (IEA) from the UniProt subcellular-location
      vocabulary (UniProtKB-SubCell:SL-0191). The underlying experimental basis is the antibody-based
      localization in PubMed:22361696.
    action: KEEP_AS_NON_CORE
    reason: >-
      A transmembrane-anchored ER-membrane RING protein localizing to the nucleus is biologically
      unexpected and the support is antibody-based immunolocalization that may overlap with a
      nucleoplasmic signal. Retained as non-core; the ER localization is the better-supported and
      mechanistically relevant compartment.
    supported_by:
      - reference_id: file:human/CGRRF1/CGRRF1-uniprot.txt
        supporting_text: "SUBCELLULAR LOCATION: Nucleus {ECO:0000269|PubMed:22361696}."
- term:
    id: GO:0005783
    label: endoplasmic reticulum
  evidence_type: IEA
  original_reference_id: GO_REF:0000044
  qualifier: located_in
  review:
    summary: >-
      Endoplasmic reticulum localization mapped electronically (IEA) from the UniProt
      subcellular-location vocabulary (UniProtKB-SubCell:SL-0095), corroborating the experimentally
      supported ER annotation (IDA, PMID:27485036).
    action: ACCEPT
    reason: >-
      Correct compartment and consistent with the protein's membrane-anchored RING architecture. This
      IEA entry is concordant with the experimental IDA annotation to the same term and the
      well-supported ER localization, so it is accepted.
    supported_by:
      - reference_id: file:human/CGRRF1/CGRRF1-uniprot.txt
        supporting_text: "Endoplasmic reticulum {ECO:0000269|PubMed:27485036}."
- term:
    id: GO:0005515
    label: protein binding
  evidence_type: IPI
  original_reference_id: PMID:32296183
  qualifier: enables
  review:
    summary: >-
      Generic protein binding annotation derived entirely from the HuRI high-throughput binary
      (yeast two-hybrid) interactome screen, supported by individual interactors such as CDIPT
      (UniProtKB:O14735) and ~30 additional systematic Y2H hits listed in UniProt (mostly other
      single- or multi-pass membrane and ER/Golgi proteins).
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      Bare "protein binding" is uninformative per curation guidelines and conveys no specific molecular
      function. The interactions come from a single large-scale binary interactome map without
      validation or functional context, and no specific informative molecular-function term can be
      justified from them.
    supported_by:
      - reference_id: PMID:32296183
        supporting_text: "Here we present a human 'all-by-all' reference interactome map of human binary protein interactions, or 'HuRI'."
- term:
    id: GO:0005654
    label: nucleoplasm
  evidence_type: IDA
  original_reference_id: GO_REF:0000052
  qualifier: located_in
  review:
    summary: >-
      Nucleoplasm localization from Human Protein Atlas immunofluorescence (IDA, HPA).
    action: KEEP_AS_NON_CORE
    reason: >-
      HPA immunofluorescence reports a nucleoplasmic signal, but this is not consistent with the
      protein's primary identity as a transmembrane ER-membrane RING protein, and antibody-based
      localization of this poorly characterized (Tdark) protein should be treated cautiously.
      Retained as observed but non-core.
    supported_by:
      - reference_id: file:human/CGRRF1/CGRRF1-uniprot.txt
        supporting_text: "Nucleus {ECO:0000269|PubMed:22361696}."
- term:
    id: GO:0005783
    label: endoplasmic reticulum
  evidence_type: IDA
  original_reference_id: PMID:27485036
  qualifier: located_in
  review:
    summary: >-
      Experimentally supported (IDA) ER localization: V5-tagged CGRRF1 stably overexpressed in COS-1
      cells partially colocalized with endogenous PDI, an ER-resident chaperone, indicating ER
      localization. Consistent with the protein's N-terminal transmembrane anchor.
    action: ACCEPT
    reason: >-
      This is the best-supported and mechanistically relevant subcellular localization, directly
      observed by immunocytochemistry and consistent with the membrane-anchored RING-domain
      architecture expected of an ER-resident E3 ligase. A more specific term (GO:0005789 endoplasmic
      reticulum membrane) is biologically appropriate given the transmembrane anchor, but the IDA
      colocalization with PDI supports the parent ER term directly.
    supported_by:
      - reference_id: PMID:27485036
        supporting_text: RNFT1, RNF185, CGRRF1 and RNF19B partially colocalised with endogenous PDI, an ER-resident chaperone, indicating their localisation to the ER
- term:
    id: GO:0008285
    label: negative regulation of cell population proliferation
  evidence_type: TAS
  original_reference_id: PMID:8968090
  qualifier: involved_in
  review:
    summary: >-
      Author statement (TAS) that CGR19/CGRRF1, a p53-induced gene, inhibits the growth of several
      cell lines when overexpressed, the original functional description of the gene.
    action: KEEP_AS_NON_CORE
    reason: >-
      This reflects an overexpression growth-inhibition phenotype rather than a defined molecular
      mechanism. It is a descriptive, downstream biological observation and is retained as non-core
      rather than as the central function of an ER-membrane RING-domain protein.
    supported_by:
      - reference_id: PMID:8968090
        supporting_text: Both CGR11 and CGR19 are able to inhibit the growth of several cell lines.
core_functions:
  - description: >-
      ER membrane-anchored RING-type protein with the structural hallmarks of an E3 ubiquitin
      ligase acting in ER-associated degradation. The C-terminal cytosolic RING domain is
      positioned to recruit a ubiquitin-charged E2 conjugating enzyme, while the N-terminal
      transmembrane segment anchors the protein in the ER membrane.
    supported_by:
      - reference_id: PMID:27485036
        supporting_text: "we searched human protein databases (RefSeq and Ensembl)... (1) having a RING-finger motif (C3H2C3 or C3HC4) and (2) having transmembrane domain(s). We found a total of 37 putative RING-type E3 genes"
      - reference_id: file:human/CGRRF1/CGRRF1-uniprot.txt
        supporting_text: 'ZN_FING         274..309 /note="RING-type"'
  - description: >-
      Localizes to the endoplasmic reticulum and is transcriptionally induced as part of the ER
      stress / unfolded protein response (ATF6 branch), consistent with a role in ER protein
      quality control.
    locations:
      - id: GO:0005783
        label: endoplasmic reticulum
    supported_by:
      - reference_id: PMID:27485036
        supporting_text: RNFT1, RNF185, CGRRF1 and RNF19B partially colocalised with endogenous PDI, an ER-resident chaperone, indicating their localisation to the ER
      - reference_id: PMID:27485036
        supporting_text: ATF6 (N-terminal domain) significantly upregulated CGRRF1 and RNF19B expression
proposed_new_terms: []
suggested_questions:
  - question: >-
      Does CGRRF1 possess ubiquitin-protein ligase activity with an E2 other than UbcH5c/UBE2D3, given
      that the only published in vitro autoubiquitination assay (using UbcH5c) was negative?
  - question: >-
      What are the physiological ERAD substrates of CGRRF1, and does it function within or parallel to
      the canonical HRD1/SYVN1 ERAD machinery?
  - question: >-
      How are the reported ER-membrane and nucleoplasmic localizations reconciled, and is the nuclear
      signal a genuine localization or an antibody artifact for this Tdark protein?
suggested_experiments:
  - description: >-
      Perform in vitro autoubiquitination and substrate-ubiquitination assays across a panel of E2
      conjugating enzymes (beyond UbcH5c/UBE2D3) using recombinant CGRRF1 RING domain, with RING
      point mutants as negative controls, to determine whether CGRRF1 has E3 ligase activity with a
      cognate E2.
    experiment_type: biochemical assay
    hypothesis: >-
      CGRRF1 is a bona fide RING E3 ubiquitin ligase whose activity requires a specific E2 not tested
      in the original in vitro screen.
  - description: >-
      Identify CGRRF1 interaction partners and candidate substrates by proximity labeling (BioID/TurboID)
      or affinity purification-mass spectrometry from ER membranes, followed by ubiquitination and
      stability assays of candidate substrates upon CGRRF1 depletion or RING mutation.
    experiment_type: proteomics / interactomics
    hypothesis: >-
      CGRRF1 ubiquitinates one or more ER-membrane or ER-luminal client proteins, targeting them for
      ERAD-mediated proteasomal degradation.
  - description: >-
      Knock out or deplete CGRRF1 in cells challenged with ER stressors and measure accumulation of
      model ERAD substrates, UPR marker induction, and ER-stress-induced apoptosis, with rescue by WT
      versus RING-dead CGRRF1.
    experiment_type: genetic manipulation / cell biology
    hypothesis: >-
      Loss of CGRRF1 impairs ERAD of specific substrates and alters sensitivity to ER stress in a
      RING-domain-dependent manner.
references:
- id: GO_REF:0000033
  title: Annotation inferences using phylogenetic trees
  findings: []
- id: GO_REF:0000044
  title: Gene Ontology annotation based on UniProtKB/Swiss-Prot Subcellular Location
    vocabulary mapping, accompanied by conservative changes to GO terms applied by
    UniProt
  findings: []
- id: GO_REF:0000052
  title: Gene Ontology annotation based on curation of immunofluorescence data
  findings: []
- id: PMID:27485036
  title: Genome-wide identification and gene expression profiling of ubiquitin ligases
    for endoplasmic reticulum protein degradation.
  findings:
    - statement: >-
        CGRRF1 is one of 37 human RING-finger + transmembrane proteins computationally selected as
        candidate ERAD E3 ligases; it localizes to the ER (colocalization with PDI) and its expression
        is up-regulated by ER stress and by ATF6.
      reference_section_type: RESULTS
    - statement: >-
        In an in vitro autoubiquitination assay with the E2 UbcH5c/UBE2D3, CGRRF1 did NOT exhibit E3
        activity, and it conferred no resistance to ER stress, unlike RNFT1 and RNF185.
      reference_section_type: RESULTS
- id: PMID:32296183
  title: A reference map of the human binary protein interactome.
  findings:
    - statement: >-
        CGRRF1 protein interactions in GOA derive from the HuRI high-throughput binary (Y2H)
        interactome map; interactors are mostly other membrane/ER-Golgi proteins and are not
        individually validated.
      reference_section_type: RESULTS
- id: PMID:8968090
  title: Induction of cell growth regulatory genes by p53.
  findings:
    - statement: >-
        CGRRF1 was originally isolated as CGR19, a p53-induced cell growth regulatory gene encoding a
        RING-finger protein whose overexpression inhibits growth of several cell lines.
      reference_section_type: ABSTRACT
