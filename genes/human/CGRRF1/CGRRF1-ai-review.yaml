id: Q99675
gene_symbol: CGRRF1
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  CGRRF1 (cell growth regulator with RING finger domain protein 1; also known as CGR19 and
  RNF197) is a 332-residue endoplasmic reticulum (ER) membrane-anchored protein with an
  N-terminal hydrophobic/transmembrane region and a C-terminal cytosolic RING-type zinc
  finger (residues ~274-309; NMR structure PDB 2EA5). Its domain architecture (a canonical
  C3HC4/C3H2C3 RING coupled to a transmembrane membrane anchor) is the hallmark of ER-resident
  RING-type E3 ubiquitin ligases that act in ER-associated degradation (ERAD), where they
  cooperate with E2 conjugating enzymes to ubiquitinate substrates destined for proteasomal
  degradation. CGRRF1 localizes to the ER and partially to the nucleus, is transcriptionally
  up-regulated by ER stress (thapsigargin, tunicamycin) downstream of the ATF6 branch of the
  unfolded protein response, and is ubiquitously expressed with highest levels in testis and
  cerebellum. It was originally discovered as CGR19, a p53-induced transcript whose
  overexpression inhibits growth of several cell lines, the basis of its historical
  description as a cell growth/cell cycle regulator. An early genome-wide screen reported a
  negative in vitro autoubiquitination result when CGRRF1 was paired with the promiscuous E2
  UbcH5c/UBE2D3, but subsequent substrate-focused work established CGRRF1 as a functional ER
  E3 ligase acting in regulatory ERAD: together with the cognate E2 UBE2J2 it ubiquitinates
  Evi/Wntless (WLS/GPR177), the dedicated cargo receptor for Wnt secretion, targeting it for
  VCP/p97-dependent extraction and proteasomal degradation when Wnt ligand is unavailable and
  thereby tuning the cell's Wnt secretory capacity. Its broader physiological substrate
  repertoire and high-resolution catalytic mechanism remain incompletely defined.
aliases:
  - CGR19
  - RNF197
existing_annotations:
- term:
    id: GO:0030308
    label: negative regulation of cell growth
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: involved_in
  review:
    summary: >-
      Phylogenetically inferred (IBA) negative regulation of cell growth, transferred across the
      CGRRF1 ortholog group (PANTHER:PTN002310361, including rat ortholog RGD:620803). This trace
      is rooted in the original observation that CGR19/CGRRF1 overexpression inhibits cell growth.
    action: KEEP_AS_NON_CORE
    reason: >-
      The growth-inhibitory phenotype derives from overexpression assays (PMID:8968090) and reflects
      a downstream cellular consequence rather than the molecular core function of the protein, which
      structurally is an ER-membrane RING-domain protein. No mechanism links CGRRF1 directly to a
      growth-control pathway. Retained as a non-core biological-process annotation.
    supported_by:
      - reference_id: PMID:8968090
        supporting_text: Both CGR11 and CGR19 are able to inhibit the growth of several cell lines.
- term:
    id: GO:0005634
    label: nucleus
  evidence_type: IEA
  original_reference_id: GO_REF:0000044
  qualifier: located_in
  review:
    summary: >-
      Nucleus localization mapped electronically (IEA) from the UniProt subcellular-location
      vocabulary (UniProtKB-SubCell:SL-0191). The underlying experimental basis is the antibody-based
      localization in PubMed:22361696.
    action: KEEP_AS_NON_CORE
    reason: >-
      A transmembrane-anchored ER-membrane RING protein localizing to the nucleus is biologically
      unexpected and the support is antibody-based immunolocalization that may overlap with a
      nucleoplasmic signal. Retained as non-core; the ER localization is the better-supported and
      mechanistically relevant compartment.
    supported_by:
      - reference_id: file:human/CGRRF1/CGRRF1-uniprot.txt
        supporting_text: "SUBCELLULAR LOCATION: Nucleus {ECO:0000269|PubMed:22361696}."
- term:
    id: GO:0005783
    label: endoplasmic reticulum
  evidence_type: IEA
  original_reference_id: GO_REF:0000044
  qualifier: located_in
  review:
    summary: >-
      Endoplasmic reticulum localization mapped electronically (IEA) from the UniProt
      subcellular-location vocabulary (UniProtKB-SubCell:SL-0095), corroborating the experimentally
      supported ER annotation (IDA, PMID:27485036).
    action: ACCEPT
    reason: >-
      Correct compartment and consistent with the protein's membrane-anchored RING architecture. This
      IEA entry is concordant with the experimental IDA annotation to the same term and the
      well-supported ER localization, so it is accepted.
    supported_by:
      - reference_id: file:human/CGRRF1/CGRRF1-uniprot.txt
        supporting_text: "Endoplasmic reticulum {ECO:0000269|PubMed:27485036}."
- term:
    id: GO:0005515
    label: protein binding
  evidence_type: IPI
  original_reference_id: PMID:32296183
  qualifier: enables
  review:
    summary: >-
      Generic protein binding annotation derived entirely from the HuRI high-throughput binary
      (yeast two-hybrid) interactome screen, supported by individual interactors such as CDIPT
      (UniProtKB:O14735) and ~30 additional systematic Y2H hits listed in UniProt (mostly other
      single- or multi-pass membrane and ER/Golgi proteins).
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      Bare "protein binding" is uninformative per curation guidelines and conveys no specific molecular
      function. The interactions come from a single large-scale binary interactome map without
      validation or functional context, and no specific informative molecular-function term can be
      justified from these HuRI hits alone. Note that the functionally meaningful protein-protein
      contacts of CGRRF1 established in focused studies - its cognate E2 UBE2J2 and its substrate
      Evi/WLS - are captured separately by the E3-ligase molecular-function and ERAD process
      annotations rather than by this generic HuRI-derived term.
    supported_by:
      - reference_id: PMID:32296183
        supporting_text: "Here we present a human 'all-by-all' reference interactome map of human binary protein interactions, or 'HuRI'."
      - reference_id: file:human/CGRRF1/CGRRF1-deep-research-falcon.md
        supporting_text: "CGRRF1 works in conjunction with the **E2 ubiquitin-conjugating enzyme UBE2J2** to ubiquitinate substrates"
- term:
