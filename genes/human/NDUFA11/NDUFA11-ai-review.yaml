  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  NDUFA11 (B14.7; CI-B14.7) is a small (141-residue) multi-pass membrane
  accessory ("supernumerary") subunit of mitochondrial respiratory chain
  Complex I (NADH:ubiquinone oxidoreductase). It is nuclear-encoded on
  chromosome 19, imported into mitochondria, and is a stable structural subunit
  of the membrane arm of the mature holoenzyme, embedded in the inner
  mitochondrial membrane with its bulk on the matrix side and two transmembrane
  helices. NDUFA11 adopts a Tim17/Tim22/Tim23-like fold but functions as a
  genuine structural component of Complex I rather than as a protein translocase
  or insertase. It is not one of the 14 conserved catalytic core subunits and
  carries no redox cofactor, so it is non-catalytic; its role is structural,
  contributing to the assembly and stability of the membrane arm. Complex I as a
  whole transfers electrons from NADH to ubiquinone coupled to proton
  translocation across the inner membrane, feeding the respiratory chain and
  oxidative phosphorylation. In humans, recessive loss-of-function variants in
  NDUFA11 cause mitochondrial complex I deficiency nuclear type 14 (MC1DN14).
