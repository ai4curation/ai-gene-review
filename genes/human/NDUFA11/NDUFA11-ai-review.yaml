- id: PMID:27626371
  title: Accessory subunits are integral for assembly and function of human mitochondrial
    complex I.
  findings:
  - statement: >-
      Human Complex I comprises 45 subunits; 14 core subunits are shared with
      bacteria and 31 are accessory subunits whose incorporation increases
      energetic cost and requires assembly factors.
    reference_section_type: ABSTRACT
    supporting_text: Bacterial and human complex I share 14 core subunits that are essential for enzymatic function
  - statement: >-
      25 of the accessory subunits are strictly required for assembly of a
      functional Complex I, and loss of a subunit destabilizes co-module subunits.
    reference_section_type: ABSTRACT
    supporting_text: We show that 25 subunits are strictly required for assembly of a functional complex
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Systematic knockout/proteomics study; primary evidence that accessory
      subunits including NDUFA11 are required for Complex I assembly and function.
      Cited by the UniProt FUNCTION statement. Abstract-only in cache.
