core_functions:
- description: >-
    ATP:ADP antiporter (adenine nucleotide translocase) activity in the mitochondrial
    inner membrane: ANT2 exchanges ATP synthesized in the matrix for cytosolic ADP by
    an alternating-access mechanism (Rhea:RHEA:34999, ADP(in) + ATP(out) = ADP(out) +
    ATP(in)), importing ADP for oxidative phosphorylation and exporting ATP to fuel
    the cell. This is a transporter, not a catalytic enzyme.
  molecular_function:
    id: GO:0005471
    label: ATP:ADP antiporter activity
  directly_involved_in:
