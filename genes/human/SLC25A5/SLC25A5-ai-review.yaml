id: P05141
gene_symbol: SLC25A5
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  SLC25A5 (ADP/ATP translocase 2; ANT2; AAC2) is an ADP/ATP translocase (adenine
  nucleotide translocator) of the SLC25 mitochondrial carrier family. It is a
  polytopic integral protein of the mitochondrial inner membrane, built from three
  homologous Solcar repeats forming a six-transmembrane-helix carrier fold, and
  functions as an antiporter that exchanges ATP synthesized in the mitochondrial
  matrix for cytosolic ADP by an alternating-access (cytoplasmic-open/matrix-open)
  mechanism. This ATP:ADP exchange supplies the ATP-synthase/electron-transport
  chain with ADP and delivers ATP to the cytosol, making the carrier a central node
  of cellular energy homeostasis and oxidative phosphorylation. ANT2 is the isoform
  characteristically expressed in proliferative and glycolytic tissues (fibroblasts,
  growth-activated and undifferentiated cells, and many tumors). Beyond its
  antiporter activity, ANT can act as a fatty-acid-dependent proton transporter that
  uncouples oxidative phosphorylation and contributes to thermogenesis in tissues
  lacking UCP1, and it participates in mitochondrial permeability transition pore
  (mPTP) activity linked to apoptosis; it has also been reported as a component of
  the mitotic spindle-associated MMXD (MMS19-MIP18-XPD) cytosolic iron-sulfur
  assembly complex and as a regulator of PINK1-dependent mitophagy.
