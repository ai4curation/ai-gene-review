id: O95045
gene_symbol: UPP2
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  UPP2 (uridine phosphorylase 2, UPase-2) is a cytosolic pyrimidine nucleoside
  phosphorylase of the PNP/UDP phosphorylase family and one of the two human
  uridine phosphorylase paralogs (alongside the ubiquitously expressed UPP1).
  It catalyzes the reversible phosphorolytic cleavage of uridine, and to a lesser
  extent 2'-deoxyuridine and thymidine, into uracil plus (2-deoxy)-alpha-D-ribose
  1-phosphate (EC 2.4.2.3), providing the "uracil from uridine" step of the
  pyrimidine nucleoside salvage/UMP biosynthesis pathway and contributing to
  pyrimidine nucleoside catabolism. The released uracil can be salvaged for
  nucleotide synthesis while the (deoxy)ribose 1-phosphate feeds central carbon
  metabolism. UPP2 has broad substrate specificity and can also cleave
  fluoropyrimidine nucleoside analogs (e.g. 5-fluorouridine, 5-fluoro-2'-
  deoxyuridine), which is relevant to the activation of 5-fluorouracil and
  capecitabine chemotherapeutics. The active enzyme is a homodimer. Human UPP2
  has a restricted expression pattern (enriched in kidney and liver), in contrast
  to the broadly expressed UPP1. UPP2 uniquely carries a redox-sensitive switch: a
  conditional intramolecular disulfide bridge between two cysteines displaces a
  catalytic phosphate-coordinating arginine, reversibly inactivating the enzyme
  under oxidizing conditions; this cysteine pair is conserved in UPP2 orthologs
  and absent from UPP1.
