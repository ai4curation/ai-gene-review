proposed_new_terms: []
suggested_questions:
- question: >-
    Is the type III intermediate filament (vimentin) association a genuine property
    of human UPP2, or is the annotation a mis-attribution of the UPP1 result
    (Russell et al. 2001) that predates UPP2's discovery?
- question: >-
    Does the UPP2-specific redox switch (Cys95–Cys102 disulfide) constitute a
    physiological oxidative-stress-sensing function in kidney/liver, beyond simply
    modulating uridine phosphorylase activity?
suggested_experiments:
- description: >-
    Direct localization of endogenous or tagged human UPP2 (immunofluorescence /
    subcellular fractionation) in kidney/liver-derived cells to test cytosolic
    distribution and any intermediate-filament association.
- description: >-
    Steady-state kinetic comparison of reduced vs oxidized recombinant hUPP2 across
    physiological glutathione redox potentials to quantify the in vivo relevance of
    the disulfide-based inactivation.
