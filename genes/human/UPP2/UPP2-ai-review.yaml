- id: PMID:12849978
  title: Identification of a novel human uridine phosphorylase.
  findings:
  - statement: >-
      Cloned human UPP2 (UPase-2), a 317-aa uridine phosphorylase ~60% identical to
      UPP1, with broad substrate specificity (uridine, deoxyuridine, thymidine,
      5-fluorouridine, 5-fluoro-2'-deoxyuridine); mRNA predominantly expressed in
      kidney.
    supporting_text: "a novel 317 amino acid human uridine phosphorylase approximately 60% identical to the previously identified human uridine phosphorylase was cloned"
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Primary paper identifying and enzymatically characterizing human UPP2; source
      of the catalytic activity, broad substrate specificity, and kidney tissue
      specificity. Abstract-only in cache (full_text_available: false) but the
      abstract supports the core function annotations.
- id: PMID:21855639
  title: A novel structural mechanism for redox regulation of uridine phosphorylase
    2 activity.
  findings:
  - statement: >-
      Crystal structures of human UPP2 (homodimer) reveal a conditional Cys95–Cys102
      disulfide that displaces the catalytic Arg100, inactivating the enzyme; UPP2
      is redox-sensitive whereas UPP1 is not.
    supporting_text: "a conditional intramolecular disulfide bridge can form within the protein that dislocates a critical phosphate-coordinating arginine residue (R100) away from the active site, disabling the enzyme"
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Structural and enzymatic characterization of hUPP2; confirms uridine
      phosphorylase activity, the homodimer, and the UPP2-specific redox switch.
      Full text available.
