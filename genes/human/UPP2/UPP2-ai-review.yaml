    Reversible phosphorolysis of uridine (and, more weakly, 2'-deoxyuridine and
    thymidine) to uracil plus (2-deoxy)-alpha-D-ribose 1-phosphate — the defining,
    experimentally verified enzymatic activity of UPP2. Acts as a homodimer in the
    cytosol and provides the "uracil from uridine" step of pyrimidine nucleoside
    salvage/catabolism.
