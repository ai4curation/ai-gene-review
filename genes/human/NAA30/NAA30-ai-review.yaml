- id: file:human/NAA30/NAA30-deep-research-falcon.md
  title: Falcon deep research report for NAA30
  findings:
  - statement: NAA30 is the catalytic GNAT-fold subunit of the heterotrimeric NatC complex (NAA30 catalytic, NAA35 large auxiliary/ribosome-anchoring, NAA38 small auxiliary) that co-translationally acetylates the alpha-amino group of N-terminal methionines retained in front of hydrophobic/amphipathic residues (Met-Leu, Met-Ile, Met-Phe, Met-Trp).
    reference_section_type: OTHER
  - statement: NatC-mediated N-terminal acetylation shields hydrophobic Met-starting N-termini from recognition as N-degrons by the Arg/N-degron pathway E3 ligases (UBR1, UBR2, UBR4-KCMF1), protecting substrates from proteasomal degradation; validated human NatC substrates include the trafficking GTPase ARL8B.
    reference_section_type: OTHER
  reference_review:
    relevance: HIGH
    correctness: UNVERIFIED
    review_notes: LLM-synthesized (Edison/Falcon) deep-research report; not independently verified against primary full text and treated as UNVERIFIED. NAA30-catalytic-specific claims used here (GNAT-fold acetyl-CoA-dependent transfer to the N-terminal alpha-amino group; NatC Met-hydrophobic substrate class distinct from NatA/NatB; ribosome co-sedimentation; N-degron shielding) are consistent with the cached primary literature (PMID:19398576, PMID:37891180) and with UniProt. The report also generalizes across the NatC complex and other NATs and attributes some functions to auxiliary subunits (e.g. NAA35 as ribosome anchor, NAA38 broadening substrate specificity/thermostability) and to broader NatC biology (mitochondrial integrity, Golgi/vesicle trafficking, cullin neddylation via UBE2M/UBE2F, cancer/development) - these are complex-level or pathway-level claims and were NOT used to assert new NAA30-specific catalytic molecular functions.
