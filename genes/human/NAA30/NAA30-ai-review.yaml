  title: Knockdown of human N alpha-terminal acetyltransferase complex C leads to p53-dependent apoptosis and aberrant human Arl8b localization.
  findings:
  - statement: The human NatC complex contains the catalytic subunit hMak3 (NAA30) and auxiliary subunits hMak10 (NAA35) and hMak31 (NAA38); it associates with ribosomes and hMak3 acetylates Met-Leu protein N-termini in vitro.
    reference_section_type: ABSTRACT
  - statement: Knockdown of NatC subunits results in p53-dependent cell death and aberrant ARL8B localization, indicating ARL8B is a NatC substrate in vivo.
    reference_section_type: ABSTRACT
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: Cached publication title matches the YAML title; GOA anchors this PMID to IDA for GO:0004596 (N-terminal acetyltransferase activity) and GO:0031417 (NatC complex). This is the NatC complex-characterization paper establishing NAA30 (hMak3) as the catalytic subunit, the gene's core function.
