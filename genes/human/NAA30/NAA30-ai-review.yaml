    summary: NatC-mediated N-terminal acetylation shields substrate proteins from N-degron-mediated degradation, thereby stabilizing them. Mechanistically, unacetylated Met-hydrophobic N-termini are recognized as N-degrons by the Arg/N-degron pathway E3 ligases (UBR1, UBR2, UBR4-KCMF1); NatC acetylation masks these N-termini. This is a downstream biological-process consequence of NAA30's catalytic activity.
