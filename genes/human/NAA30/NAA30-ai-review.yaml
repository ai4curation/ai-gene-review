suggested_questions:
- question: What is the full repertoire of human NatC substrates (Met-hydrophobic N-termini), and how much overlap exists with NatE/NAA50 specificity?
- question: Is the nuclear pool of NAA30 catalytically active on a distinct substrate set, or does it reflect mislocalization/relocalization independent of NatC function?
suggested_experiments:
- description: Quantitative N-terminomics of NAA30-knockout versus wild-type human cells to define the NatC-dependent N-terminal acetylome.
- description: Reconstituted in vitro acetylation assays with recombinant NatC (NAA30/NAA35/NAA38) on a panel of Met-X peptides to quantify substrate specificity and the contribution of each auxiliary subunit.
- description: Degradation/stability assays (e.g. cycloheximide chase, tandem fluorescent timer reporters) on defined NatC substrates in NAA30-depleted cells to test the N-degron-shielding model in human cells.
