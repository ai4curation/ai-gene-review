gene_symbol: NDUFA6
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  NDUFA6 (also known as CI-B14, NADH-ubiquinone oxidoreductase B14 subunit, or LYR
  motif-containing protein 6 / LYRM6) is a small (~15 kDa, 128 aa) nuclear-encoded
  accessory (supernumerary) subunit of mitochondrial respiratory chain Complex I
  (NADH:ubiquinone oxidoreductase). It is a stable structural constituent of the mature
  holoenzyme rather than a catalytic component: it lies in the peripheral (matrix) arm of
  the complex, forming part of the Q-module near the ubiquinone-reduction site, and is a
  peripheral membrane protein on the matrix side of the mitochondrial inner membrane. It
  is a member of the complex I LYR-motif family; its LYR motif mediates binding to the
  mitochondrial acyl carrier protein NDUFAB1. NDUFA6 is not itself involved in catalysis
  but is required for proper assembly and stability of Complex I; bi-allelic loss-of-function
  variants cause isolated mitochondrial Complex I deficiency (nuclear type 33), an
  early-onset mitochondrial disease.
