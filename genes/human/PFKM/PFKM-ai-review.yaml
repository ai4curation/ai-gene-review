id: P08237
gene_symbol: PFKM
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: PFKM is the muscle isozyme of 6-phosphofructokinase (phosphofructokinase-1,
  PFK-1; EC 2.7.1.11), the enzyme that catalyzes the committed, rate-limiting step
  of glycolysis - the ATP-dependent phosphorylation of D-fructose 6-phosphate to
  fructose 1,6-bisphosphate, requiring Mg2+. It is a major allosteric control point
  of the pathway, activated by AMP, ADP and fructose 2,6-bisphosphate and inhibited
  by ATP and citrate. The active enzyme is a tetramer assembled from three subunit
  types - PFKM (muscle), PFKL (liver) and PFKP (platelet); skeletal muscle contains
  essentially the M4 homotetramer, whereas erythrocytes contain a mixture of M/L
  hybrids. Each subunit is a two-domain protein with an N-terminal catalytic domain
  and a C-terminal regulatory domain that binds allosteric effectors. PFKM acts in
  the cytosol. Loss-of-function variants in PFKM cause glycogen storage disease type
  VII (Tarui disease), characterized by exercise intolerance, muscle cramps, exertional
  myopathy and compensated hemolysis, reflecting the block of muscle glycolysis and
  its knock-on effects on glycogenolysis and erythrocyte metabolism.
