  evidence_type: IDA
  original_reference_id: file:human/PFKM/PFKM-uniprot.txt
  qualifier: involved_in
  review:
    summary: PFK-1 is the principal allosteric control point of glycolysis; PFKM activity
      is regulated by allosteric effectors (activated by AMP, ADP, fructose 2,6-bisphosphate;
      inhibited by ATP, citrate), making the enzyme a key regulator of glycolytic
      flux. Not present in the current GOA set but strongly supported by UniProt and
      the literature.
    action: NEW
    reason: The regulatory (rate-limiting/allosteric control) role of PFKM is a defining
      feature of the enzyme and is captured in core_functions, but is not represented
      among the existing annotations. Proposed as a new annotation.
    supported_by:
