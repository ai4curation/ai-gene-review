id: O94777
gene_symbol: DPM2
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  DPM2 is the small (84-residue), multi-pass endoplasmic reticulum (ER) membrane
  regulatory subunit of the dolichol-phosphate mannose (Dol-P-Man) synthase complex,
  which is composed of the catalytic subunit DPM1 together with DPM2 and DPM3.
  DPM2 is non-catalytic: it stabilizes the complex and enhances its activity rather
  than performing the mannosyltransfer itself. DPM2 forms a complex with DPM1 that is
  required for the correct ER localization and stable expression of DPM1, stabilizes
  DPM3, and enhances the enzyme's binding of the substrate dolichyl phosphate,
  increasing Dol-P-Man synthase activity roughly ten-fold. Dol-P-Man is the mannosyl
  donor used for glycosylphosphatidylinositol (GPI) anchor synthesis, the
  dolichol-linked oligosaccharide precursor of N-glycosylation, and protein O- and
  C-mannosylation. DPM2 additionally associates with, and enhances the activity of,
  the GPI-N-acetylglucosaminyltransferase (GPI-GnT) complex that initiates GPI-anchor
  biosynthesis, although it is not essential for that complex. In humans, loss-of-function
  variants cause DPM2-CDG (congenital disorder of glycosylation type Iu), a muscular
  dystrophy-dystroglycanopathy with severe epilepsy.
