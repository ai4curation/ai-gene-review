core_functions:
- description: >-
    Regulatory (non-catalytic) subunit of the dolichol-phosphate mannose (Dol-P-Man)
    synthase complex. As an activating regulator, DPM2 stabilizes the complex
    (required for ER localization/stability of catalytic DPM1 and for DPM3 stability),
    enhances binding of the dolichyl phosphate substrate, and increases Dol-P-Man
    synthase activity ~10-fold, thereby driving Dol-P-Man biosynthesis in the ER
    membrane. Dol-P-Man is the mannosyl donor for N-glycosylation, GPI-anchor
    synthesis, and protein O-/C-mannosylation.
