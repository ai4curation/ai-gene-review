id: Q16878
gene_symbol: CDO1
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  CDO1 (cysteine dioxygenase type 1) is a cytosolic non-heme mononuclear Fe(II)
  thiol dioxygenase (EC 1.13.11.20) that catalyzes the first and rate-limiting,
  committed step of cysteine catabolism: the oxidation of L-cysteine by molecular
  O2 to 3-sulfino-L-alanine (L-cysteinesulfinate). Catalysis depends on a single
  catalytic ferrous iron and a distinctive protein-derived Cys93-Tyr157 thioether
  cross-linked cofactor. By consuming free cysteine, CDO1 both governs
  intracellular cysteine levels and initiates the downstream pathways that yield
  hypotaurine and taurine and, via cysteinesulfinate decarboxylation and
  transamination, pyruvate plus sulfite/sulfate; it is a major source of body
  sulfate. The enzyme is a monomer, is most highly expressed in liver and placenta,
  and its protein level is set post-translationally by cysteine-gated ubiquitin-
  dependent degradation through the CRL5 (Cullin-5 RING) E3 ligase using LRRC58 as
  substrate adaptor. CDO1 is frequently epigenetically silenced by promoter
  hypermethylation across many cancers and behaves as a candidate tumor suppressor.
