- id: PMID:40963025
  title: Covariation MS uncovers a protein that controls cysteine catabolism.
  findings:
  - statement: >-
      CDO1 is the rate-limiting enzyme of the cysteine-to-taurine catabolic shunt;
      it is degraded by the CRL5-LRRC58 E3 ubiquitin ligase in a cysteine-gated
      manner. Stabilizing CDO1 (LRRC58 depletion) increases cysteine flux to
      hypotaurine/taurine, and this effect requires CDO1.
    reference_section_type: RESULTS
    supporting_text: >-
      The increase in hypotaurine and taurine abundance upon LRRC58 knockdown was
      completely reversed by depletion of CDO1
