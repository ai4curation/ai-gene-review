id: Q16739
gene_symbol: UGCG
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  UGCG (ceramide glucosyltransferase; glucosylceramide synthase, GCS; EC 2.4.1.80)
  is a Golgi-membrane glycosyltransferase (family GT2/CAZy GT21) that catalyzes the
  first and committed step of glucosphingolipid biosynthesis. It transfers glucose
  from UDP-glucose to ceramide to produce glucosylceramide (GlcCer) plus UDP. The
  active site lies on the cytosolic face of the Golgi, where newly made GlcCer is
  the core precursor of hundreds of glycosphingolipids: GlcCer is elongated to
  lactosylceramide and thence to the ganglio-, globo- and (neo)lacto-series
  glycosphingolipids. As glycosphingolipids are essential constituents of membrane
  microdomains, UGCG activity underlies diverse downstream processes, including
  epidermal permeability-barrier formation, nervous-system development, and
  membrane signaling. The enzyme is a multi-pass membrane protein whose catalytic
  D1/D2/D3 aspartate and (Q/R)XXRW motifs bind the UDP-sugar donor. UGCG is the
  molecular target of the substrate-reduction drugs miglustat, eliglustat and
  venglustat, and its overexpression is associated with cancer multidrug resistance.
