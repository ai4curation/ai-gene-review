id: P42574
gene_symbol: CASP3
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: 'CASP3 (caspase-3; apopain/CPP32/Yama) is the principal executioner cysteine-aspartic protease of apoptosis in human cells. Synthesized as an inactive zymogen, it is activated by proteolytic cleavage by initiator caspases (CASP8, CASP9, CASP10) and granzyme B into a heterotetramer of two p17/p12 heterodimers with a catalytic cysteine. It is a cysteine-type endopeptidase (EC 3.4.22.56) that cleaves substrates strictly after aspartate residues, with a preferred Asp-X-X-Asp recognition motif. During the execution/demolition phase of apoptosis it cleaves hundreds of cellular substrates, including PARP1, the ICAD/DFF45 inhibitor of the CAD/DFF40 DNA-fragmentation nuclease, cytoskeletal and junctional proteins, and numerous signaling proteins, thereby dismantling the dying cell and promoting phosphatidylserine exposure for efferocytosis. Beyond classical apoptosis, caspase-3 cleaves gasdermin-E (GSDME/DFNA5) to switch cells to pyroptosis, processes cytokines such as IL-18, and restrains innate antiviral signaling by cleaving cGAS, MAVS, IRF3, and NF-kB subunits. It also has non-lethal roles, contributing to differentiation programs (e.g., erythroid, keratinocyte, neuronal) through limited substrate cleavage. Caspase-3 acts mainly in the cytoplasm/cytosol but its active form is also found in the nucleus during apoptosis; its activity is restrained by inhibitors including XIAP and BIRC6 and by S-nitrosylation of the catalytic cysteine.'
