      supporting_text: suggesting that apopain/CPP32 is important for the initiation of apoptotic cell death.
      reference_section_type: ABSTRACT
- term:
    id: GO:0004197
    label: cysteine-type endopeptidase activity
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: enables
  review:
    summary: Caspase-3 is a cysteine-type endopeptidase (EC 3.4.22.56) that cleaves substrates after aspartate residues; this is its core molecular function.
    action: ACCEPT
    reason: This is the central, well-established molecular function of caspase-3, supported by phylogenetic inference, biochemical purification, and crystal structures. It should be retained as a core function.
    supported_by:
    - &casp3_catalytic
      reference_id: file:human/CASP3/CASP3-uniprot.txt
      supporting_text: Strict requirement for an Asp residue at positions P1 and P4. It has a preferred cleavage sequence of Asp-Xaa-Xaa-Asp-|-
    - *apopain
- term:
    id: GO:0006508
    label: proteolysis
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: involved_in
  review:
    summary: Caspase-3 carries out proteolysis of many substrates; proteolysis is the biological process realization of its endopeptidase activity.
    action: ACCEPT
    reason: Proteolysis is correct and consistent with the cysteine-type endopeptidase molecular function, although it is broad. Retained as a supporting (non-distinguishing) process term.
    supported_by:
    - *casp3_catalytic
    - *apopain
- term:
    id: GO:0031264
    label: death-inducing signaling complex
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: part_of
  review:
    summary: The death-inducing signaling complex (DISC) is the platform that activates initiator caspase-8; caspase-3 is an executioner caspase acting downstream of the DISC rather than a DISC component.
    action: MARK_AS_OVER_ANNOTATED
    reason: Caspase-3 is activated downstream of the DISC (by caspase-8) and is not generally considered a structural part of the DISC itself. This phylogenetic part_of assignment likely reflects over-propagation across the caspase family; caspase-3's role is as an executioner, not a DISC subunit.
    supported_by:
    - *casp3_executioner
    - reference_id: file:human/CASP3/CASP3-uniprot.txt
      supporting_text: Cleavage by granzyme B, caspase-6, caspase-8 and caspase-10 generates the two active subunits
- term:
    id: GO:0097194
    label: execution phase of apoptosis
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: involved_in
  review:
    summary: Caspase-3 is the major executioner caspase responsible for the demolition/execution phase of apoptosis.
    action: ACCEPT
    reason: This is a precise and core biological process term for caspase-3, supported by phylogenetic inference and experimental evidence that caspase-3 dominates the demolition phase.
    supported_by:
    - *casp3_executioner
- term:
    id: GO:0008047
    label: enzyme activator activity
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: enables
  review:
    summary: Caspase-3 activates downstream enzymes by proteolytic cleavage (e.g., caspase-6, -7, -9 and gasdermin-E), but it does so via its endopeptidase activity rather than acting as a classical allosteric enzyme activator.
    action: MARK_AS_OVER_ANNOTATED
    reason: While caspase-3 cleavage-activates other zymogens, the generic enzyme activator activity term mischaracterizes the mechanism, which is proteolysis. The cysteine-type endopeptidase activity term already captures this function more accurately.
    supported_by:
    - reference_id: file:human/CASP3/CASP3-uniprot.txt
      supporting_text: Cleaves and activates caspase-6, -7 and -9 (CASP6, CASP7 and CASP9, respectively)
    - reference_id: PMID:28459430
      supporting_text: GSDME was specifically cleaved by caspase-3 in its linker, generating a GSDME-N fragment that perforates membranes and thereby induces pyroptosis.
      reference_section_type: ABSTRACT
