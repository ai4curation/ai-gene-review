      supporting_text: SUBCELLULAR LOCATION; Cytoplasm
    - reference_id: PMID:15003516
      supporting_text: Caspase 3 activation is controlled by a sequence located in the N-terminus of its large subunit.
      reference_section_type: TITLE
- term:
    id: GO:0006915
    label: apoptotic process
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: involved_in
  review:
    summary: Caspase-3 is the principal executioner caspase of apoptosis, a deeply conserved role captured by the IBA annotation.
    action: ACCEPT
    reason: Involvement in apoptosis is the defining biological process for caspase-3 and is supported by phylogenetic inference and extensive experimental literature.
    supported_by:
    - &casp3_executioner
      reference_id: PMID:18723680
      supporting_text: Caspase-3 was found to be generally more promiscuous than caspase-7 and appears to be the major executioner caspase during the demolition phase of apoptosis.
      reference_section_type: ABSTRACT
    - &apopain
