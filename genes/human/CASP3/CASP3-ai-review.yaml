- term:
    id: GO:0005737
    label: cytoplasm
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: is_active_in
  review:
    summary: Caspase-3 acts in the cytoplasm/cytosol, where the procaspase resides and where it is activated and cleaves most substrates.
    action: ACCEPT
    reason: Cytoplasmic localization is well supported as the principal site of caspase-3 activity; this is the consensus phylogenetic (IBA) cellular component and matches UniProt subcellular location.
