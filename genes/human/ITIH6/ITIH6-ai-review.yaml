existing_annotations:
- term:
    id: GO:0004867
    label: serine-type endopeptidase inhibitor activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: >-
      InterPro mapping assigns protease-inhibitor activity from the ITIH-family
      C-terminal domain, but no ITIH6 experiment demonstrates protease inhibition.
    action: REMOVE
    reason: >-
      This inference conflates the activity of the bikunin light chain or assembled
      inter-alpha-inhibitor with an ITIH heavy-chain polypeptide. Direct biochemical
      chain analysis found that human inter-alpha-inhibitor has one shared inhibitory
      30-kDa chain and explicitly described its heavy chains as noninhibitory. ITIH6
      lacks a Kunitz/bikunin inhibitor domain and has never been assayed as an inhibitor.
    additional_reference_ids:
    - PMID:2476436
    - file:human/ITIH6/ITIH6-uniprot.txt
    - file:human/ITIH6/ITIH6-deep-research-manual.md
    supported_by:
