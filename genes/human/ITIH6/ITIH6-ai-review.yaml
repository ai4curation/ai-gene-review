    supporting_text: FT   SIGNAL          1..23
  - reference_id: file:human/ITIH6/ITIH6-deep-research-manual.md
    supporting_text: Its specific molecular activity and biological process are still unknown.
proposed_new_terms: []
knowledge_gaps:
- gap_statement: >-
    It is unknown whether ITIH6 is processed into a canonical heavy chain and
    covalently incorporated into a bikunin-containing proteoglycan complex.
  boundary: >-
    Sequence analysis predicts a conserved cleavage motif, but neither the cleavage
    site nor a terminal-Asp linkage to bikunin chondroitin sulfate has been mapped experimentally.
  gap_kind:
  - BIOLOGY
  - CURATION
  dark_aspect: MF_DARK
  status: OPEN
  significance: >-
    Resolving processing and complex assembly is necessary before ITIH6 can be
    treated as a canonical transferable inter-alpha-inhibitor heavy chain.
  resolution: >-
    Map endogenous ITIH6 termini by N-/C-terminomics and intact-mass spectrometry,
    test co-purification and covalent glycosaminoglycan linkage with bikunin, and
    repeat the analysis after AMBP or candidate processing-enzyme perturbation.
  provenance:
  - reference_id: file:human/ITIH6/ITIH6-deep-research-manual.md
    supporting_text: It is not equivalent to evidence that ITIH6 is processed at that site or covalently coupled to bikunin.
- gap_statement: >-
    Hyaluronan binding, TSG-6-mediated ITIH6 transfer, and any effect on extracellular-matrix
    organization remain untested.
  boundary: >-
    HA/ECM activity is inferred from family architecture and a candidate cleavage
    motif; the first ITIH6-focused study explicitly presents it as a hypothesis.
  gap_kind:
  - BIOLOGY
  - CURATION
  dark_aspect: BP_DARK
  status: OPEN
  significance: >-
    These experiments are required to adjudicate the current hyaluronan metabolic
    process IEA and to define a specific positive molecular function.
  resolution: >-
    Reconstitute ITIH6 processing and transfer with purified bikunin proteoglycan,
    TSG-6, and HA; map covalent products by mass spectrometry and test direct HA
    association with orthogonal biochemical assays.
  provenance:
  - reference_id: file:human/ITIH6/ITIH6-deep-research-manual.md
    supporting_text: Thus `hyaluronan metabolic process` remains plausible but unverified for ITIH6 and should not be promoted into a positive core function.
suggested_questions:
- question: >-
    Is endogenous ITIH6 secreted as a full-length protein or cleaved at the predicted
    DPHFVI motif, and what is the mature C terminus?
- question: >-
    Does ITIH6 form a covalent complex with bikunin chondroitin sulfate, either alone
    or together with another ITIH heavy chain?
- question: >-
    Can TSG-6 transfer processed ITIH6 to hyaluronan, and does the expanded central
    region alter HA binding, matrix organization, or interaction partners?
- question: >-
    Which, if any, HuRI interaction partners form endogenous complexes with ITIH6
    in its native glandular expression contexts?
suggested_experiments:
- hypothesis: >-
    ITIH6 is secreted and proteolytically processed at its conserved candidate
    heavy-chain cleavage motif.
  description: >-
    Endogenously tag ITIH6 in a validated glandular epithelial model and analyze
    matched cell lysates, conditioned medium, and extracellular matrix by pulse-chase,
    immunoprecipitation, N-/C-terminomics, and intact-mass spectrometry. Use signal-peptide
    and cleavage-motif mutants as controls.
  experiment_type: Endogenous secretion and proteolytic-processing analysis
- hypothesis: >-
    Processed ITIH6 is covalently coupled to bikunin chondroitin sulfate and can be
    transferred to hyaluronan by TSG-6.
  description: >-
    Reconstitute assembly with purified ITIH6, AMBP-derived bikunin proteoglycan,
    and candidate processing machinery, then add TSG-6 and isotopically labeled HA.
    Detect ester-linked ITIH6-CS and ITIH6-HA products by glycosidase sensitivity,
    intact mass, linkage-site LC-MS/MS, and orthogonal HA pull-down. Include ITIH1/ITIH2
    positive controls and cleavage-motif-mutant ITIH6 negative controls.
  experiment_type: Bikunin coupling and TSG-6-dependent hyaluronan-transfer reconstitution
- hypothesis: >-
    ITIH6 has a native extracellular interaction network distinct from the heterogeneous
    HuRI Y2H partner set.
  description: >-
    In ITIH6-positive salivary, renal, gastric, and colonic epithelial models, combine
    endogenous affinity purification, extracellular proximity labeling, and cross-linking
    mass spectrometry with knockout controls. Validate candidate partners reciprocally
    and test whether they depend on secretion or heavy-chain processing.
  experiment_type: Context-specific endogenous interactome mapping
