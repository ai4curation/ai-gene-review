      supporting_text: Inter-alpha-trypsin inhibitor contains noninhibitory heavy chains of 65,000 and 70,000 Da
      reference_section_type: ABSTRACT
      full_text_unavailable: true
    - reference_id: file:human/ITIH6/ITIH6-deep-research-manual.md
      supporting_text: ITIH6 itself has neither a bikunin/Kunitz inhibitor domain nor a direct inhibition assay.
