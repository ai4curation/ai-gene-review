core_functions:
- description: >-
    ITIH6 is a signal-peptide-bearing ITIH-family protein predicted to act in the
    extracellular region, but its intrinsic molecular activity and physiological
    process have not been established. A conserved candidate heavy-chain cleavage
    motif makes bikunin coupling and HA transfer plausible, not demonstrated.
