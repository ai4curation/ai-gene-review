  label: Homo sapiens
description: >-
  ITIH6 is a 1,313-amino-acid, tissue-restricted member of the inter-alpha-trypsin
  inhibitor heavy-chain family. It is synthesized with an N-terminal signal peptide
  and contains VIT, von Willebrand factor type A, and ITI-heavy-chain C-terminal
  domains, separated by an unusually expanded central region that distinguishes
  ITIH6 from other family members. ITIH6 protein is abundant in selected glandular
  epithelia, including salivary gland, kidney, colon, and stomach. A conserved
  candidate heavy-chain cleavage motif makes extracellular-matrix and hyaluronan
  functions structurally plausible, but secretion of the mature protein, coupling
  to bikunin, hyaluronan transfer or binding, and any intrinsic molecular activity
  have not been demonstrated experimentally.
