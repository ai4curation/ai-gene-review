- term:
    id: GO:0030212
    label: hyaluronan metabolic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: involved_in
  review:
    summary: >-
      InterPro transfers a hyaluronan-process annotation from ITIH-family architecture.
      ITIH6 has a conserved candidate heavy-chain cleavage motif, but its HA biology
      has not been tested directly.
    action: UNDECIDED
    reason: >-
      The 2025 first characterization treats ITIH6 interaction with HA and ECM
      stabilization as a structurally motivated hypothesis and explicitly calls for
      future functional studies. No experiment establishes ITIH6 processing, bikunin
      or chondroitin-sulfate coupling, TSG-6-dependent transfer, HA binding, or an
      effect on HA abundance or organization. The conserved motif prevents confident
      rejection, but family membership alone is insufficient for acceptance.
    additional_reference_ids:
