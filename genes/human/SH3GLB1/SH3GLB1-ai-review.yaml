id: Q9Y371
gene_symbol: SH3GLB1
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: 'SH3GLB1 encodes endophilin B1/Bif-1, an N-BAR/SH3 membrane-curvature adaptor that links UVRAG/BECN1/PI3KC3-C2
  autophagy signaling to ATG9-positive Golgi membrane fission and autophagosome assembly. In the proteostasis-network
  class III PI3K complex 2 context, the core functions are PI3KC3 activation, adaptor-mediated association with
  UVRAG/Beclin 1, and membrane fission/tubulation at Golgi/autophagosome membranes. SH3GLB1 also has supported non-core
  roles in mitochondrial outer membrane dynamics, Bax/Bak-dependent apoptosis, receptor degradation, cytokinesis,
  and older lipid-binding/acyltransferase biochemistry.'
