core_functions:
- description: >-
    Non-catalytic structural (hinge) subunit of mitochondrial respiratory Complex III
    (cytochrome bc1); provides the acidic docking interface that positions cytochrome c
    against cytochrome c1, contributing to the quinol-cytochrome-c reductase activity of
    the assembled complex and stabilizing the holoenzyme.
  molecular_function:
