gene_symbol: UQCRH
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  UQCRH (ubiquinol-cytochrome c reductase hinge protein; cytochrome b-c1 complex
  subunit 6, also called Complex III subunit 6/VIII or the "hinge" protein) is a
  small (91-residue precursor; 14-91 mature) nuclear-encoded structural subunit of
  the mitochondrial respiratory chain Complex III (cytochrome bc1 / ubiquinol-cytochrome
  c oxidoreductase). It is imported into mitochondria via an unusually acidic N-terminal
  transit peptide and resides as a peripheral membrane protein on the intermembrane-space
  side of the mitochondrial inner membrane. UQCRH is one of the low-molecular-weight,
  non-catalytic subunits of the obligate CIII dimer; the catalytic redox centres are
  carried by cytochrome b (MT-CYB), cytochrome c1 (CYC1) and the Rieske iron-sulfur
  protein (UQCRFS1). The acidic hinge protein forms the docking interface that
  "hinges" cytochrome c to cytochrome c1, and is required for correct interaction and
  electron transfer between cytochrome c1 and soluble cytochrome c. Loss of UQCRH
  destabilizes the assembled holoenzyme, reduces Complex III catalytic activity, and
  causes mitochondrial complex III deficiency (nuclear type 11), presenting with lactic
  acidosis, hyperammonaemia, hypoglycaemia and encephalopathy. Its overall role is
  therefore structural/assembly and electron-transfer facilitation within Complex III
  during aerobic respiration and oxidative phosphorylation.
