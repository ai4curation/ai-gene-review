proposed_new_terms: []
suggested_questions:
- question: >-
    Does UQCRH have any role beyond CIII assembly/structure and cytochrome c docking
    (e.g. a regulatory or supercomplex-organizing role), given the altered supercomplex
    distribution observed upon its loss?
suggested_experiments:
- description: >-
    Structure-guided mutagenesis of the acidic N-terminal region and the cytochrome c
    docking surface of UQCRH to quantify effects on cytochrome c1-cytochrome c electron
    transfer versus overall CIII assembly and stability.
  hypothesis: >-
    The acidic hinge region of UQCRH is specifically required for cytochrome c docking
    and c1-to-c electron transfer, separable from its contribution to CIII holoenzyme
    assembly/stability.
