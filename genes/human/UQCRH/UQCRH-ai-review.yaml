- term:
    id: GO:0008121
    label: quinol-cytochrome-c reductase activity
  evidence_type: IMP
  original_reference_id: PMID:34750991
  qualifier: enables
  review:
    summary: >-
      IMP based on the homozygous two-exon UQCRH deletion, which reduces Complex III
      (quinol-cytochrome-c reductase) activity to ~50-60% of control. This is the
      whole-complex catalytic activity; UQCRH is a non-catalytic structural/hinge
      subunit, so the loss of activity reflects a structural/assembly requirement,
      not catalysis by UQCRH itself.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      The catalytic centres of CIII are carried by cytochrome b (MT-CYB), cytochrome c1
      (CYC1) and the Rieske protein (UQCRFS1); UQCRH is explicitly a structural subunit
      whose precise function "remains to be fully elucidated" and which "hinges"
      cytochrome c to c1. The IMP phenotype (loss of UQCRH lowers CIII activity) is
      fully explained by a structural/assembly role, and does not demonstrate that UQCRH
      itself enables quinol-cytochrome-c reductase catalysis. Assigning the complex's
      catalytic MF to this non-catalytic subunit is an over-annotation; the subunit's
      MF is better captured as structural molecule activity (GO:0005198) contributing to
      the complex activity. Retained (experimental) but flagged.
    supported_by:
    - reference_id: PMID:34750991
      supporting_text: >-
        confirmed a specific decrease of CIII activity to approximately 60% compared
        to control cell lines
    - reference_id: PMID:34750991
      supporting_text: >-
        remains to be fully elucidated
    - reference_id: PMID:2826252
      supporting_text: >-
        and 'hinges' cytochrome c with cytochrome c1
