- id: PMID:22847177
  title: Characterization of a novel HMG-CoA lyase enzyme with a dual location in
    endoplasmic reticulum and cytosol.
  findings: []
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: >-
      Full text available. Primary subject is HMGCLL1 (er-cHL), a distinct ER/cytosolic
      HMG-CoA lyase homolog encoded by a different gene; mitochondrial HMGCL (mHL) is the
      reference/comparison enzyme. Its introduction cleanly states HMGCL function
      (HMG-CoA cleavage; common final step of ketogenesis + leucine catabolism), which is
      what is quoted here. The GOA IDA annotations of P35914 to this paper are therefore
      biologically correct for HMGCL but the paper's novel focus is HMGCLL1.
