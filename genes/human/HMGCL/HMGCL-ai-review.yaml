  original_reference_id: PMID:12464283
  qualifier: enables
  review:
    summary: >-
      This IDA appears to derive from the paper's analysis of HMGCL oligomeric status
      (dimer vs monomer, Cys323-mediated crosslinking). Self-assembly of a catalytic
      homodimer is not a "structural molecule activity" in the GO sense (a structural
      constituent such as a cytoskeletal or matrix building block).
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      HMGCL is a catalytic enzyme, not a structural molecule; the term is a mischosen
      molecular function. It is retained (not removed) as an experimental annotation but
      flagged as over-annotated and non-core.
