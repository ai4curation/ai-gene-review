id: P35914
gene_symbol: HMGCL
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  HMGCL encodes mitochondrial 3-hydroxy-3-methylglutaryl-CoA (HMG-CoA) lyase (HL;
  EC 4.1.3.4), the enzyme that catalyzes the shared terminal step of ketogenesis
  and leucine catabolism: the cation-dependent cleavage of (S)-3-hydroxy-3-methylglutaryl-CoA
  into acetoacetate and acetyl-CoA. The enzyme adopts a (beta/alpha)8 TIM-barrel
  fold and functions as a disulfide-linked homodimer (also observed as homotetramer),
  requiring a divalent metal cation (Mg2+ or Mn2+) coordinated by active-site
  residues including His233, His235, Asp42 and Asn275. The mature protein resides in
  the mitochondrial matrix; an unprocessed precursor form retaining the N-terminal
  mitochondrial leader together with a C-terminal Cys-Lys-Leu peroxisomal targeting
  motif is also imported into peroxisomes, giving the protein a dual mitochondrial/peroxisomal
  localization. HMGCL is most highly expressed in liver, the principal ketogenic
  tissue, where ketone bodies serve as an alternative energy source for extrahepatic
  tissues. Loss-of-function variants cause the autosomal-recessive disease HMG-CoA
  lyase deficiency (3-hydroxy-3-methylglutaric aciduria, MIM 246450), which blocks
  both ketone-body synthesis and leucine degradation and presents with hypoketotic
  hypoglycemia and metabolic acidosis, often precipitated by fasting or catabolic stress.
