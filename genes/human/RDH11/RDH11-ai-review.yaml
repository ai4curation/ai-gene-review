id: Q8TC12
gene_symbol: RDH11
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  RDH11 (retinol dehydrogenase 11; also PSDR1/ARSDR1/RalR1/SDR7C1) is a microsomal,
  membrane-bound NADPH-dependent retinaldehyde reductase / retinol dehydrogenase of the
  short-chain dehydrogenase/reductase (SDR) family. It catalyzes the interconversion of
  retinols and retinaldehydes (EC 1.1.1.300), with a clear preference for NADP(H) over
  NAD(H) and dual stereo-specificity: it acts on all-trans-, 9-cis-, 11-cis- and (more
  weakly) 13-cis-retinoids. Under physiological conditions the reductive direction
  (retinaldehyde to retinol) dominates. RDH11 is anchored in the endoplasmic reticulum
  membrane as a single-pass type II membrane protein with an N-terminal signal-anchor and
  a cytoplasmically oriented catalytic Rossmann-fold domain. It contributes to retinoid
  homeostasis broadly (including the retinal pigment epithelium of the visual cycle, where
  it participates in reduction of all-trans-retinal and can substitute for RDH5 in 11-cis
  retinol/retinal interconversion) and to vitamin A metabolism. It has no steroid
  dehydrogenase activity. Its activity is inhibited by physical interaction with
  selenoprotein F (SELENOF). Biallelic loss-of-function variants cause retinal dystrophy,
  juvenile cataracts and short stature syndrome (RDJCSS).
