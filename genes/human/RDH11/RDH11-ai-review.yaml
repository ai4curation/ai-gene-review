- term:
    id: GO:0033721
    label: aldehyde dehydrogenase (NADP+) activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000107
  qualifier: enables
  review:
    summary: >-
      Electronic transfer from the mouse ortholog (Q9QYF1) via Ensembl. This term is defined
      as the OXIDATION of an aldehyde to a carboxylic acid (aldehyde + NADP+ + H2O = acid +
      NADPH), which is not the chemistry RDH11 performs: RDH11 is a REDUCTASE that converts
      aldehydes (retinaldehyde) to alcohols (retinol). Even the mouse SCALD ortholog is
      described as reducing aldehydes to alcohols, not oxidizing them to acids. This is a
      wrong-reaction electronic over-annotation and should be removed.
    action: REMOVE
    reason: >-
      Wrong-reaction IEA: GO:0033721 is aldehyde-to-acid oxidation, whereas RDH11 (and its
      mouse ortholog) reduce aldehydes to alcohols. The ortholog-transferred term
      misrepresents the enzyme's reaction.
    supported_by:
    - reference_id: PMID:12807874
      supporting_text: >-
        The
        enzyme specifically uses NADPH to reduce a variety of short-chain aldehydes,
        including nonanal and 4-hydroxy-2-nonenal.
