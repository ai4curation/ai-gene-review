  title: Combined Automated Annotation using Multiple IEA Methods
  findings: []
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: >-
      Combined IEA supporting the core NADP-dependent retinol dehydrogenase activity and
      retinol metabolic process.
- id: PMID:12036956
  title: Evidence that the human gene for prostate short-chain dehydrogenase/reductase
    (PSDR1) encodes a novel retinal reductase (RalR1).
  findings:
  - statement: >-
      RDH11 (RalR1/PSDR1) is an NADP-preferring retinoid oxidoreductase with no steroid
      activity; ~50-fold more efficient at reducing all-trans-retinal than oxidizing
      all-trans-retinol, and localizes to the ER.
    reference_section_type: ABSTRACT
    supporting_text: >-
      The enzyme is approximately 50-fold more efficient for the
      reduction of all-trans-retinal than for the oxidation of all-trans-retinol.
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Primary enzymatic characterization of human RDH11; abstract-only in cache but cited by
      UniProt for CATALYTIC ACTIVITY, FUNCTION and SUBCELLULAR LOCATION.
- id: PMID:12226107
  title: Dual-substrate specificity short chain retinol dehydrogenases from the vertebrate
    retina.
  findings:
  - statement: >-
      RDH11 is one of a novel subfamily (RDH11-14) of dual-specificity retinol dehydrogenases
      metabolizing all-trans- and cis-retinols with C15 pro-R specificity, positioned in the
      RPE for the visual retinoid cycle.
    reference_section_type: ABSTRACT
    supporting_text: >-
      display
      dual-substrate specificity, uniquely metabolizing all-trans- and cis-retinols
      with C(15) pro-R specificity
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Establishes dual-substrate (all-trans + cis) specificity and RPE context; abstract-only
      in cache.
- id: PMID:12807874
  title: Characterization of mouse short-chain aldehyde reductase (SCALD), an enzyme
    regulated by sterol regulatory element-binding proteins.
  findings:
  - statement: >-
      The mouse ortholog SCALD is an NADPH-dependent reductase of short-chain aldehydes and
      retinaldehydes; it is the mouse ortholog of human PSDR1/RalR1/RDH11. Human RDH11 differs
      in having little activity toward toxic lipid-peroxidation aldehydes.
    reference_section_type: ABSTRACT
    supporting_text: >-
      SCALD appears to be the mouse ortholog of the human
      protein
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: >-
      Characterizes the MOUSE ortholog (SCALD). Source of the aldehyde-detoxification and
      retinal-metabolism annotations; abstract-only. Human RDH11 is weaker on toxic aldehydes
      (UniProt CAUTION), so detox terms are non-core for the human gene.
- id: PMID:28514442
  title: Architecture of the human interactome defines protein communities and disease
    networks.
  findings:
  - statement: >-
      Proteome-scale AP-MS interactome (BioPlex 2.0) in which RDH11 appears as one of thousands
      of proteins; source of a bare protein-binding IPI (WITH/FROM UBAC1).
    reference_section_type: ABSTRACT
    supporting_text: >-
      the largest such network so far
  reference_review:
    relevance: LOW
    correctness: VERIFIED
    review_notes: >-
      High-throughput interactome screen; supports only generic protein binding, not a specific
      RDH11 function.
- id: PMID:29410696
  title: The interaction of selenoprotein F (SELENOF) with retinol dehydrogenase 11
    (RDH11) implied a role of SELENOF in vitamin A metabolism.
  findings:
  - statement: >-
      SELENOF physically interacts with RDH11 and inhibits its NADPH-dependent reduction of
      all-trans-retinaldehyde to all-trans-retinol, implicating this interaction in regulation
      of vitamin A metabolism.
    reference_section_type: ABSTRACT
    supporting_text: >-
      SELENOF interacts with RDH11 and blocks its enzyme activity to
      reduce all-trans-retinaldehyde.
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Targeted interaction + activity-regulation study; full text available. Confirms RDH11
      catalytic direction and SELENOF-mediated inhibition.
- id: PMID:33961781
  title: Dual proteome-scale networks reveal cell-specific remodeling of the human
    interactome.
  findings:
  - statement: >-
      Proteome-scale AP-MS interactome (BioPlex 3.0); source of a bare protein-binding IPI for
      RDH11 (WITH/FROM UBAC1).
    reference_section_type: ABSTRACT
    supporting_text: >-
      118,162
      interactions among 14,586 proteins
  reference_review:
    relevance: LOW
    correctness: VERIFIED
    review_notes: >-
      High-throughput interactome screen; supports only generic protein binding.
