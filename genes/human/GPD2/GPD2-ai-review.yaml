id: P43304
gene_symbol: GPD2
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  GPD2 (mGPDH) is the mitochondrial FAD-dependent glycerol-3-phosphate
  dehydrogenase, a flavoenzyme of the mitochondrial inner membrane that faces
  the intermembrane-space side. It oxidises sn-glycerol-3-phosphate to
  dihydroxyacetone phosphate (DHAP) and passes the electrons through its bound
  FAD cofactor to ubiquinone in the respiratory chain (EC 1.1.5.3). Together
  with the cytosolic NAD-linked isozyme GPD1, it forms the glycerol-phosphate
  shuttle, which delivers cytosolic reducing equivalents to the mitochondrial
  ubiquinone pool and thereby bypasses Complex I. The enzyme carries two
  C-terminal EF-hand motifs and binds calcium, which enhances its activity; this
  calcium responsiveness makes GPD2 an important component of the pancreatic
  beta-cell glucose-sensing apparatus. The protein is synthesised as a precursor
  with an N-terminal mitochondrial transit peptide and exists as two
  alternatively spliced isoforms.
