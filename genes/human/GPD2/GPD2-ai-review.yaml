    supporting_text: >-
      The Ca(2+)-sensitive and mitochondrial enzyme FAD-linked glycerophosphate
    reference_section_type: ABSTRACT
  - reference_id: file:human/GPD2/GPD2-uniprot.txt
    supporting_text: >-
      Reaction=a quinone + sn-glycerol 3-phosphate = dihydroxyacetone
    reference_section_type: OTHER
  - reference_id: Reactome:R-HSA-188467
    supporting_text: >-
      GPD2 catalyzes the unidirectional conversion of glycerol-3-phosphate
      (G-3-P) to dihydroxyacetone phosphate (DHAP) with concomitant reduction of
      the enzyme-bound FAD.
    reference_section_type: OTHER
- description: >-
    GPD2 binds FAD as an essential redox cofactor. The flavin prosthetic group
    is required for the enzyme's oxidoreductase activity, accepting hydride from
    glycerol-3-phosphate before passing electrons to ubiquinone.
  molecular_function:
    id: GO:0050660
    label: flavin adenine dinucleotide binding
  locations:
  - id: GO:0005743
    label: mitochondrial inner membrane
  supported_by:
  - reference_id: file:human/GPD2/GPD2-uniprot.txt
    supporting_text: 'Name=FAD; Xref=ChEBI:CHEBI:57692'
    reference_section_type: OTHER
