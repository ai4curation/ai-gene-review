core_functions:
- description: >-
    GPD2 is the mitochondrial FAD-dependent glycerol-3-phosphate dehydrogenase
    (EC 1.1.5.3). Bound FAD accepts electrons as sn-glycerol 3-phosphate is
    oxidised to dihydroxyacetone phosphate, and the reduced flavin transfers the
    electrons to ubiquinone in the respiratory chain. Acting at the mitochondrial
    inner membrane, this activity forms the mitochondrial arm of the
    glycerol-phosphate shuttle together with cytosolic GPD1.
  molecular_function:
    id: GO:0004368
    label: glycerol-3-phosphate dehydrogenase (quinone) activity
  directly_involved_in:
  - id: GO:0006127
    label: glycerol-3-phosphate shuttle
  locations:
  - id: GO:0005743
    label: mitochondrial inner membrane
  supported_by:
