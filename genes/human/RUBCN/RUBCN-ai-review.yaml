id: Q92622
gene_symbol: RUBCN
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: 'RUBCN encodes Rubicon, a RUN/RH-domain regulator that associates with the UVRAG-containing class III
  PI3K complex II and Rab7 to inhibit PIK3C3/VPS34 activity, endosome maturation, and autophagosome maturation.
  In the proteostasis-network context, RUBCN is a negative PI3KC3-C2/autophagosome maturation regulator rather than
  an autophagy activator. It localizes mainly to late endosome/lysosome and early endosome compartments and also
  has non-core pathogen/innate-immune interaction biology described in UniProt but not central to these GOA rows.'
alternative_products:
