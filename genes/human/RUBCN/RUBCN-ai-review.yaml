suggested_questions:
- question: Should RUBCN be curated as part_of GO:0034272 PI3KC3-C2, or represented only by PI3K inhibitor 
    activity and UVRAG/Rab7 interaction context?
  experts:
  - GO autophagy editors
  - ComplexPortal curators
- question: Should negative regulation of phosphatidylinositol 3-kinase/protein kinase B signal transduction 
    be replaced in GOA by phosphatidylinositol 3-kinase inhibitor activity for RUBCN?
  experts:
  - GO molecular function editors
  - GO signaling editors
- question: Should the Golgi colocalization annotation be removed given curated endosome/lysosome localization
    and explicit UniProt note that Rubicon is not detected at Golgi?
  experts:
  - GO cellular component editors
  - UniProt curators
suggested_experiments:
- description: Use RUBCN knockout/rescue with RUN-domain hVps34-binding mutants and RH-domain Rab7-binding 
    mutants to measure PI3KC3 lipid kinase activity, Rab7 activation, EGFR/endosome maturation, and 
    autophagosome-lysosome fusion.
  experiment_type: Rubicon PI3KC3-C2/Rab7 separation-of-function rescue
  hypothesis: RUBCN requires both PI3KC3-C2 and Rab7/UVRAG interaction surfaces to inhibit autophagosome and 
    endosome maturation.
- description: Perform live-cell imaging of tagged endogenous RUBCN, UVRAG, Rab7, and HOPS markers during 
    starvation and endocytic cargo maturation to test whether RUBCN leaves endosomal/autophagosomal sites 
    before fusion competence.
  experiment_type: endogenous live-cell maturation imaging
  hypothesis: RUBCN occupancy marks inhibited PI3KC3-C2/Rab7 compartments and must be relieved for 
    maturation/fusion progression.
