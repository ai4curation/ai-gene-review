- term:
    id: GO:0051898
    label: negative regulation of phosphatidylinositol 3-kinase/protein kinase B signal transduction
  evidence_type: IDA
  original_reference_id: PMID:21062745
  qualifier: involved_in
  review:
    summary: The PI3K/AKT pathway wording is misleading for Rubicon hVps34 inhibition.
    action: MODIFY
    reason: The cited evidence supports inhibition of class III PI3K/VPS34 lipid kinase activity and 
      autophagosome maturation, not a general PI3K/AKT signaling pathway role.
    proposed_replacement_terms:
    - id: GO:0141039
      label: phosphatidylinositol 3-kinase inhibitor activity
    - id: GO:1901097
      label: negative regulation of autophagosome maturation
    additional_reference_ids:
    - PMID:21062745
