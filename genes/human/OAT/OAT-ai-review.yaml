- term:
    id: GO:0007601
    label: visual perception
  evidence_type: TAS
  original_reference_id: PMID:2793865
  qualifier: involved_in
  review:
    summary: >-
      This annotation derives from the disease phenotype: OAT deficiency causes gyrate atrophy
      of the choroid and retina, which impairs vision. However, OAT is a mitochondrial
      metabolic enzyme and does not act directly in the visual-perception (phototransduction)
      process; the retinal degeneration is a downstream consequence of a metabolic defect
      (hyperornithinemia). This is an over-annotation of the biological process; the retina is
      affected, but visual perception is not a molecular role of the enzyme.
    action: MARK_AS_OVER_ANNOTATED
