description: >-
  Ornithine aminotransferase (ornithine delta-aminotransferase; EC 2.6.1.13) is a
  nuclear-encoded, mitochondrial-matrix, pyridoxal-5'-phosphate (PLP)-dependent enzyme of the
  class-III aminotransferase family. It catalyzes the reversible transfer of the delta-amino
  group of L-ornithine to 2-oxoglutarate, forming L-glutamate 5-semialdehyde (which cyclizes
  spontaneously to delta-1-pyrroline-5-carboxylate, P5C) and L-glutamate. The active enzyme is
  a homohexamer with the PLP cofactor bound as a Schiff base to an active-site lysine
  (Lys-292). OAT links the ornithine pool of the urea cycle and arginine metabolism to the
  glutamate/proline/P5C pool: in most tissues it acts catabolically (net ornithine
  degradation), while in the small intestine it runs in the biosynthetic direction toward
  ornithine, citrulline and arginine. It thereby contributes to L-proline biosynthesis and to
  arginine/ornithine catabolism and to ornithine homeostasis. Loss-of-function mutations cause
  gyrate atrophy of the choroid and retina, an autosomal recessive chorioretinal degeneration
  with hyperornithinemia.
