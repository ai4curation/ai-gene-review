# --- Copper ion export ---
- term:
    id: GO:0060003
    label: copper ion export
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      Phylogenetic inference that ATP7B mediates copper ion export. This is
