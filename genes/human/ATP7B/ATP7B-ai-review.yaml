# --- P-type monovalent copper transporter activity (6 annotations) ---
- term:
    id: GO:0140581
    label: P-type monovalent copper transporter activity
  evidence_type: IMP
  original_reference_id: PMID:9837819
  review:
    summary: >-
      IMP evidence from Forbes & Cox (1998) demonstrating that mutation of
      the CPC motif abolishes copper transport, directly establishing ATP7B
      as a P-type copper transporter. This is the strongest experimental
      evidence for this term.
    action: ACCEPT
    reason: >-
      Core molecular function of ATP7B. The CPC motif mutagenesis study
      directly demonstrates copper transport activity. This is the best
      evidence code for this annotation.
    supported_by:
      - reference_id: PMID:9837819
        supporting_text: >-
          Mutation of the CPC motif resulted in a nonfunctional protein, which
          demonstrates that this motif is essential for copper transport by ATP7B

