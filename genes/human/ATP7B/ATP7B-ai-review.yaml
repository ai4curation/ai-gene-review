# --- Copper ion IMPORT (INCORRECT) ---
- term:
    id: GO:0015677
    label: copper ion import
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      INCORRECT annotation. ATP7B mediates copper EXPORT (into
      Golgi/vesicles/bile), NOT import into the cell. Copper import into
      cells is performed by CTR1/SLC31A1. The IBA phylogenetic inference
      has incorrectly assigned the direction of transport.
    action: REMOVE
    reason: >-
      ATP7B is a copper exporter, not importer. It transports copper from
      the cytoplasm into the Golgi lumen and vesicles. Copper import into
      cells is mediated by CTR1 (SLC31A1). This is a fundamental error in
      the phylogenetic inference.
    supported_by:
      - reference_id: PMID:16472602
        supporting_text: >-
          The Wilson protein (ATP7B) regulates levels of systemic copper by
          excreting excess copper into bile
      - reference_id: PMID:16939419
        supporting_text: >-
          The Wilson protein (ATP7B) is a copper-translocating P-type ATPase
          that mediates the excretion of excess copper from hepatocytes into
          bile

