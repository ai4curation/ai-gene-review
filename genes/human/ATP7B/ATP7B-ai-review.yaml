# --- Xenobiotic detoxification by transmembrane export across PM (INCORRECT) ---
- term:
    id: GO:1990961
    label: xenobiotic detoxification by transmembrane export across the plasma membrane
  evidence_type: IC
  original_reference_id: PMID:9837819
  review:
    summary: >-
      INCORRECT mechanism. ATP7B does NOT export copper directly across the
      plasma membrane. Per PMID:16472602, ATP7B mediates vesicular
      sequestration of copper, which subsequently undergoes exocytosis.
      Furthermore, copper is an essential element, not a xenobiotic.
    action: REMOVE
    reason: >-
      Two errors: (1) ATP7B uses vesicular sequestration, not direct plasma
      membrane export. Cater et al. (2006) explicitly showed ATP7B
      traffics to pericanalicular vesicles, NOT the canalicular membrane.
      (2) Copper is an endogenous essential metal, not a xenobiotic. The
      correct term is GO:1990880 (cellular detoxification of copper ion)
      which is already annotated with IDA evidence.
    supported_by:
      - reference_id: PMID:16472602
        supporting_text: >-
          elevated copper levels stimulated trafficking of ATP7B to
          pericanalicular vesicles and not to the canalicular membrane as
          previously reported

