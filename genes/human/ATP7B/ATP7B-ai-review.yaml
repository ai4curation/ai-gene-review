# ============================================================
# NEW ANNOTATIONS
# ============================================================

# --- Ceruloplasmin copper loading (NOTE: GO:0015680 is obsolete, no suitable replacement found) ---
# ATP7B delivers copper to apoceruloplasmin in the TGN lumen, converting it to
# functional holoceruloplasmin. This is one of the two core physiological functions
# of ATP7B but there is currently no non-obsolete GO term to capture this specific
# biosynthetic role. The function is partially captured by GO:0006878 (intracellular
# copper ion homeostasis) and GO:0035434 (copper ion transmembrane transport) combined
# with GO:0005802 (trans-Golgi network) localization.

core_functions:
  - description: >-
      P-type copper transporter activity at the trans-Golgi network, translocating
      Cu(1+) into the TGN lumen for incorporation into cuproenzymes such as
      ceruloplasmin (CP). This is the constitutive biosynthetic function of ATP7B,
      operating under basal copper conditions. Copper is delivered to ATP7B by the
      copper chaperone ATOX1. The CPC motif in the transmembrane domain is essential
      for transport catalysis.
    supported_by:
      - reference_id: PMID:12763797
        supporting_text: ATP7B is a copper-transporting P(1)-type ATPase that
          translocates copper across cellular membranes using ATP hydrolysis.
      - reference_id: PMID:12029094
        supporting_text: ATOX1 delivers copper to ATP7B and stimulates its catalytic
          activity for copper translocation into the secretory pathway.
      - reference_id: PMID:9837819
        supporting_text: The CPC motif within the sixth transmembrane domain is
          essential for copper transport activity.
      - reference_id: PMID:14709553
        supporting_text: The six N-terminal metal-binding domains each bind one
          copper ion and are required for proper copper transport function.
    molecular_function:
      id: GO:0140581
      label: P-type monovalent copper transporter activity
    directly_involved_in:
      - id: GO:0006825
        label: copper ion transport
      - id: GO:0060003
        label: copper ion export
    locations:
      - id: GO:0032588
        label: trans-Golgi network membrane
  - description: >-
      P-type copper transporter activity in pericanalicular vesicles for biliary
      copper excretion. Under elevated intracellular copper, ATP7B traffics from the
      TGN to cytoplasmic vesicles near the canalicular membrane, where it sequesters
      excess copper into the vesicle lumen. These copper-loaded vesicles subsequently
      undergo exocytosis to excrete copper into bile. This vesicular sequestration
      mechanism (not direct plasma membrane transport) is the primary route for
      hepatic copper elimination and represents the copper-responsive detoxification
      function of ATP7B.
    supported_by:
      - reference_id: PMID:16472602
        supporting_text: ATP7B mediates copper excretion via vesicular sequestration
          and exocytosis into bile, not by direct transport at the plasma membrane.
      - reference_id: PMID:16939419
        supporting_text: Elevated copper induces trafficking of ATP7B from the
          trans-Golgi network to pericanalicular vesicular compartments.
      - reference_id: PMID:9837819
        supporting_text: The CPC motif is essential for copper transport activity
          that underlies both biosynthetic delivery and excretory functions.
    molecular_function:
      id: GO:0140581
      label: P-type monovalent copper transporter activity
    directly_involved_in:
      - id: GO:1990880
        label: cellular detoxification of copper ion
      - id: GO:0046688
        label: response to copper ion
    locations:
      - id: GO:0031410
        label: cytoplasmic vesicle

