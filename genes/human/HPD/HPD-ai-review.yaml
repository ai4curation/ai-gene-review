- id: PMID:41317403
  title: HPD is an m(6)A Methyltransferase that Protects Colorectal Cancer Cells from
    Ferroptotic Cell Death by m(6)A Methylating SLC7A11/GPX4.
  findings: []
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: >-
      Full-text verified 2025 experimental study reporting a moonlighting nuclear
      mRNA m6A methyltransferase activity (recombinant protein, mutagenesis, KO
      mouse). The activity is genuinely reported but unusual for an iron
      dioxygenase and is flagged with a CAUTION note by UniProt; treated as a
      non-core secondary function, not HPD's defining activity.
