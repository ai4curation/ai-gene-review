id: P32754
gene_symbol: HPD
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  HPD encodes 4-hydroxyphenylpyruvate dioxygenase (HPPD, EC 1.13.11.27), a
  non-heme Fe(II)-dependent dioxygenase that catalyzes the second step of
  tyrosine catabolism, converting 3-(4-hydroxyphenyl)pyruvate and molecular
  oxygen to homogentisate and CO2. This is an unusual reaction that combines
  oxidative decarboxylation, aromatic ring hydroxylation and 1,2-side-chain
  migration within a single active site. The enzyme is a homodimer built from
  two tandem vicinal-oxygen-chelate (VOC/glyoxalase-like) domains, and binds one
  catalytic Fe(2+) ion per subunit via a 2-His-1-carboxylate facial triad
  (His183, His266, Glu349). HPD acts in the cytosol and is most highly expressed
  in liver, where it is a central enzyme of the phenylalanine/tyrosine
  degradation pathway (upstream of homogentisate 1,2-dioxygenase). It is the
  molecular target of the drug nitisinone (NTBC), which is used to treat
  hereditary tyrosinemia type I by blocking the pathway upstream of the toxic
  intermediates that accumulate in fumarylacetoacetate hydrolase deficiency.
  Loss-of-function of HPD itself causes autosomal recessive tyrosinemia type III
  (elevated blood tyrosine, urinary tyrosine derivatives, and variable
  neurological features), and the dominant-acting N241S variant causes
  hawkinsinuria through production of the aberrant cyclic metabolite hawkinsin.
  A single 2025 study additionally reports a moonlighting nuclear
  mRNA N6-adenosine (m6A) methyltransferase activity for HPD in colorectal
  cancer cells; this secondary activity is unusual for an iron dioxygenase and
  is not established as a general physiological function.
