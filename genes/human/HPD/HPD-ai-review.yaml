- description: >-
    Catalyzes the second step of tyrosine catabolism: the Fe(II)-dependent
    dioxygenation of 3-(4-hydroxyphenyl)pyruvate with molecular oxygen to yield
    homogentisate and CO2 (EC 1.13.11.27), acting in the cytosol.
  molecular_function:
    id: GO:0003868
    label: 4-hydroxyphenylpyruvate dioxygenase activity
  directly_involved_in:
  - id: GO:0006572
    label: L-tyrosine catabolic process
  locations:
  - id: GO:0005829
    label: cytosol
  supported_by:
  - reference_id: PMID:34047349
    supporting_text: >-
      4-Hydroxylphenylpyruvate dioxygenase (HPPD) catalyzes the conversion of
      4-hydroxylphenylpyruvate (HPP) to homogentisate, the important step for
      tyrosine catabolism.
  - reference_id: PMID:1339442
    supporting_text: >-
      Enzymic activity of the enzyme was detected in the transfected cells but
      not in the mock transfected cells.
- description: >-
    Binds one catalytic non-heme Fe(2+) ion per subunit via a 2-His-1-carboxylate
    facial triad (His183, His266, Glu349), which is required for the
    dioxygenation reaction and is the site inhibited by the drug nitisinone
    (NTBC).
  molecular_function:
    id: GO:0046872
    label: metal ion binding
  supported_by:
  - reference_id: PMID:34047349
    supporting_text: >-
      the carboxyl group of HPP interacted by a H-bond network formed by Gln334,
      Glu349 (the metal-binding ligand), and Asn363 (in the C-terminal helix)
