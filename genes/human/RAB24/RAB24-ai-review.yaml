suggested_experiments:
- description: Measure basal autophagic flux and late autophagic-compartment clearance in human RAB24 knockout/rescue cells using wild-type, nucleotide-binding-defective, and prenylation-defective RAB24 variants.
  hypothesis: RAB24 nucleotide binding and membrane targeting are required for late basal autophagic-compartment maturation/clearance.
- description: Test whether endogenous human RAB24 is required for autophagosome-lysosome fusion, autolysosome acidification, or post-fusion cargo degradation using LC3/p62 flux reporters and lysosomal inhibitors.
  hypothesis: RAB24 acts late in basal autophagy after autophagosome formation rather than during autophagy induction.
