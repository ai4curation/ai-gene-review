id: Q969Q5
gene_symbol: RAB24
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  RAB24 encodes an atypical Rab-family small GTPase that is predominantly GTP-bound and has low
  intrinsic GTPase activity. Its best-supported protein-homeostasis role is at late basal autophagy:
  RAB24 targets to autophagic vacuoles/autophagosome membranes and is required for maturation and/or
  clearance of late autophagic compartments under nutrient-rich basal conditions, without being
  required for short starvation-induced autophagosome formation. Broader cytosolic, membrane,
  endocytic, and mouse-oocyte/spindle annotations are secondary contexts rather than the core RAB24
  function.
existing_annotations:
