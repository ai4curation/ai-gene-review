  qualifier: is_active_in
  review:
    summary: autophagosome is a core RAB24 autophagy-associated location.
    action: ACCEPT
    reason: RAB24 localizes to autophagic vacuoles/autophagic compartments and the autophagosome membrane context is directly relevant to its basal autophagic-compartment maturation/clearance role.
    supported_by:
    - reference_id: PMID:26325487
      supporting_text: localization of RAB24 to autophagic vacuoles
    - reference_id: PMID:26325487
      supporting_text: maturation and/or clearance of autophagic compartments under nutrient-rich conditions
    - reference_id: PMID:10660536
      supporting_text: Posttranslational geranylgeranylation of Rab24
    - reference_id: PMID:26325487
      supporting_text: targeting of RAB24 to autophagic compartments
- term:
    id: GO:0030139
    label: endocytic vesicle
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: is_active_in
  review:
    summary: Endocytic-vesicle activity is plausible Rab-effector context but not the core RAB24 PN function.
    action: KEEP_AS_NON_CORE
    reason: The IBA inference derives from a broad Rab/endocytic-vesicle family context. RAB24 has a documented rabenosyn-5 interaction, but the best RAB24-specific process evidence is autophagic-compartment maturation/clearance rather than a defined endocytic-vesicle trafficking step.
    supported_by:
    - reference_id: PMID:16034420
      supporting_text: Rab GTPases interact with functionally diverse effectors
    - reference_id: PMID:16034420
      supporting_text: rabenosyn-5 can achieve highly selective recognition
