id: P31939
gene_symbol: ATIC
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  ATIC (bifunctional purine biosynthesis protein; AICAR transformylase / IMP
  cyclohydrolase, also known as PURH) is a cytosolic homodimeric enzyme that
  catalyzes the final two steps of de novo purine (IMP) biosynthesis. Its AICAR
  transformylase activity (EC 2.1.2.3) transfers a formyl group from
  10-formyltetrahydrofolate to 5-aminoimidazole-4-carboxamide ribonucleotide
  (AICAR), producing 5-formamido-AICAR (FAICAR); its IMP cyclohydrolase activity
  (EC 3.5.4.10) then cyclizes FAICAR to inosine 5'-monophosphate (IMP) plus
  water. The two catalytic activities reside on a single polypeptide in all
  species studied, with the IMP cyclohydrolase activity in the N-terminal
  MGS-like region (approximately residues 1-198) and the AICAR transformylase
  activity in the C-terminal region (approximately residues 199-592); the
  transformylase active site is formed at the dimer interface. The cyclohydrolase
  step is essentially irreversible and drives the otherwise unfavorable overall
  conversion of AICAR to IMP toward completion. Because the transformylase step
  is folate-dependent, ATIC is a pharmacological target of antifolates: the
  AICAR-transformylase activity is inhibited by methotrexate polyglutamates and
  pemetrexed and by nonclassical antifolates developed for tumor suppression, and
  elevated AICAR (as with the AMPK-activating AICA-riboside) reflects this node in
  folate/purine metabolism. Biallelic loss-of-function variants in ATIC cause
  AICA-ribosiduria, an extremely rare autosomal-recessive inborn error of purine
  biosynthesis characterized by profound intellectual disability, epilepsy,
  dysmorphic features and congenital blindness, with massive urinary excretion and
  tissue accumulation of AICA-riboside/AICA-ribotide.
