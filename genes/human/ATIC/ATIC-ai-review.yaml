- term:
    id: GO:0046452
    label: dihydrofolate metabolic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000107
  qualifier: involved_in
  review:
    summary: >-
      Ortholog-transfer IEA (Ensembl Compara) asserting dihydrofolate metabolic
      process. ATIC's transformylase reaction consumes 10-formyltetrahydrofolate
      (and can use 10-formyldihydrofolate) and releases tetrahydrofolate (or
      dihydrofolate), so it participates in folate one-carbon metabolism, but it
      is not a canonical enzyme of dihydrofolate metabolism.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      ATIC consumes a formyl-folate cofactor rather than performing dedicated
      dihydrofolate metabolism; the term over-interprets the cofactor usage. Its
      folate link is that its AICAR-transformylase step depends on 10-formyl-THF,
      making it an antifolate target, not a dihydrofolate-metabolizing enzyme.
    supported_by:
    - reference_id: file:human/ATIC/ATIC-uniprot.txt
      supporting_text: >-
        Can use both 10-formyldihydrofolate
