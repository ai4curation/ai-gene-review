core_functions:
- description: >-
    AICAR transformylase (phosphoribosylaminoimidazolecarboxamide
    formyltransferase, EC 2.1.2.3) that transfers a formyl group from
    10-formyltetrahydrofolate to AICAR to form FAICAR -- the penultimate step of
    de novo IMP biosynthesis. Acts as a cytosolic homodimer.
  molecular_function:
    id: GO:0004643
    label: phosphoribosylaminoimidazolecarboxamide formyltransferase activity
  directly_involved_in:
  - id: GO:0006189
    label: "'de novo' IMP biosynthetic process"
  - id: GO:0006164
    label: purine nucleotide biosynthetic process
  locations:
  - id: GO:0005829
    label: cytosol
  supported_by:
  - reference_id: PMID:9378707
    supporting_text: >-
      Mutational analysis, utilizing this
      expression system, showed that His213 and His267 were essential for AICAR
      transformylase activity.
  - reference_id: PMID:11948179
    supporting_text: >-
      sequentially catalyze the last two steps in the pathway for de novo
      synthesis of inosine 5'-monophosphate
- description: >-
    IMP cyclohydrolase (EC 3.5.4.10) that cyclizes FAICAR to inosine
    5'-monophosphate (IMP) plus water -- the final, essentially irreversible step
    of de novo IMP biosynthesis, which drives the overall AICAR-to-IMP conversion
    forward. Resides in the N-terminal MGS-like domain; acts as a cytosolic
    homodimer.
  molecular_function:
    id: GO:0003937
    label: IMP cyclohydrolase activity
  directly_involved_in:
  - id: GO:0006189
    label: "'de novo' IMP biosynthetic process"
  - id: GO:0006164
    label: purine nucleotide biosynthetic process
  locations:
  - id: GO:0005829
    label: cytosol
  supported_by:
  - reference_id: PMID:11948179
    supporting_text: >-
      the cyclohydrolase reaction is essentially unidirectional in the forward
      sense. The cyclohydrolase reaction thus draws the overall bifunctional
      reaction toward the production of inosine monophosphate.
  - reference_id: PMID:14756554
    supporting_text: >-
      The bifunctional enzyme aminoimidazole carboxamide ribonucleotide
      transformylase/inosine monophosphate cyclohydrolase (ATIC) is responsible
      for catalysis of the last two steps in the de novo purine pathway.
