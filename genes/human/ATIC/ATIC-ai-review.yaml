    label: cadherin binding
  evidence_type: HDA
  original_reference_id: PMID:25468996
  qualifier: enables
  review:
    summary: >-
      ATIC was identified among the proteins in the vicinity of the E-cadherin
      cytoplasmic tail in a high-throughput BioID proximity-biotinylation
      proteomic screen. This is a proximity-labeling co-detection, not evidence
      of a specific, functionally meaningful cadherin-binding activity of ATIC.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      The authors themselves note the screen captured many proteins that do not
      localize to junctions and are found elsewhere in the cell; ATIC is a soluble
      cytosolic metabolic enzyme with no independent evidence of a
      cadherin-binding function. This is a non-specific proximity-proteomics hit,
      not a core molecular function. Per policy, an HDA is not removed outright.
    supported_by:
    - reference_id: PMID:25468996
