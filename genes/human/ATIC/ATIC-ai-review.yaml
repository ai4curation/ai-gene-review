  evidence_type: IPI
  original_reference_id: PMID:14756553
  qualifier: enables
  review:
    summary: >-
      Crystal structures of human ATIC establish that the enzyme is a homodimer,
      with the AICAR transformylase active site formed at the dimer interface
      (substrate shared between dimeric partners). Homodimerization is
      functionally important because the dimeric form has enhanced cyclohydrolase
      activity.
