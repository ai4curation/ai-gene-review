        isolate and identify 612 proteins in the vicinity of E-cadherin’s
        cytoplasmic tail
    - reference_id: PMID:25468996
      supporting_text: >-
        the expression of GFP-tagged candidates clearly showed that many of the
        E-cad-BirA* interactome proteins are found in other locations in the cell
