- term:
    id: GO:0003360
    label: brainstem development
  evidence_type: IEA
  original_reference_id: GO_REF:0000107
  qualifier: involved_in
  review:
    summary: >-
      Electronic transfer of a rat/mouse ortholog annotation (Ensembl Compara)
      asserting involvement in brainstem development. There is no direct evidence
      that ATIC has a dedicated developmental role in the brainstem; any
      neurodevelopmental phenotype is a downstream consequence of impaired purine
      supply (AICA-ribosiduria), not a distinct molecular process ATIC
      participates in.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      This is an over-propagated ortholog-transfer IEA. ATIC's neurological
      involvement is indirect, via its housekeeping purine-biosynthesis function;
      a specific brainstem developmental process annotation over-interprets an
      electronic ortholog transfer and is not a core function.
- term:
