- term:
    id: GO:0006001
    label: fructose catabolic process
  evidence_type: IDA
  original_reference_id: PMID:12941785
  qualifier: involved_in
  review:
    summary: Proposed more precise process annotation. KHK catalyzes the committed, first step
      of fructose catabolism (fructolysis), phosphorylating fructose to fructose-1-phosphate;
      fructose catabolic process (GO:0006001) is the precise child of the existing fructose
      metabolic process (GO:0006000) annotations and better reflects KHK's committed catabolic role.
    action: NEW
    reason: The existing GO:0006000 (fructose metabolic process) annotations are correct but
      general; KHK specifically initiates fructose catabolism, so the catabolic child term is a
      more informative representation of its biological process. Proposed as a refinement, not a
      replacement, of the accepted fructose-metabolic-process annotations.
    supported_by:
    - reference_id: PMID:19237742
      supporting_text: "Fructose catabolism is initiated by its phosphorylation to fructose 1-phosphate, which is performed by ketohexokinase (KHK)."
    - reference_id: PMID:7833921
      supporting_text: "This enzyme catalyses the first step of metabolism of dietary fructose, conversion of fructose to fructose-1-phosphate."
