- term:
    id: GO:0005979
    label: regulation of glycogen biosynthetic process
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: involved_in
  review:
    summary: PAN-GO phylogenetic (IBA) annotation placing KHK in regulation of glycogen
      biosynthesis. KHK produces fructose-1-phosphate, feeding hepatic carbohydrate flux that
      can be channeled toward glycogen, but KHK is a committed catabolic kinase, not a regulator
      of glycogen synthesis. There is no direct evidence that KHK regulates glycogen biosynthesis;
      this is a broad, indirect propagation across the ketohexokinase family. The current
      UniProt DR record shows the corresponding PAN-GO term as GO:0070873 (regulation of glycogen
      metabolic process), i.e. the family-level annotation is itself imprecise/indirect for KHK.
    action: MARK_AS_OVER_ANNOTATED
    reason: KHK's molecular function is fructose phosphorylation; any effect on glycogen is a
      downstream metabolic consequence of feeding the fructolysis product into hepatic carbohydrate
      metabolism, not a regulatory activity of KHK. Retaining as a core function would overstate
      KHK's role. Better captured as a non-core, indirect metabolic contribution.
    propagation_review:
      root_cause: PROPAGATION_BAD
      failure_modes:
      - ROLE_CONFLATION
      source_entities:
      - source_id: PANTHER:PTN001634026
        source_label: ketohexokinase PANTHER node
        source_status: SUPPORTS_SOURCE_BUT_NOT_TARGET
        comment: Family-level glycogen-regulation role reflects an indirect metabolic effect;
          KHK itself is the fructose-phosphorylating enzyme, not a regulator of glycogen synthesis.
      - source_id: MGI:MGI:1096353
        source_label: mouse Khk
        source_status: SUPPORTS_SOURCE_BUT_NOT_TARGET
