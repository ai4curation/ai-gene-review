- term:
    id: GO:0004454
    label: ketohexokinase activity
  evidence_type: IDA
  original_reference_id: PMID:12941785
  qualifier: enables
  review:
    summary: Direct assay (IDA) of ketohexokinase activity using recombinant human KHK. Both KHK-C
      and KHK-A isoforms were shown to be enzymatically active, with KHK-C the high-affinity fructose
      enzyme; the disease mutant G40R is null. This directly establishes the core catalytic function.
    action: ACCEPT
    reason: Gold-standard direct enzymatic evidence for ketohexokinase activity, including
      determination of kinetic parameters (KM for fructose and Mg-ATP) and characterization of
      disease-causing mutations.
    supported_by:
    - reference_id: PMID:12941785
      supporting_text: "Here we show that both ketohexokinase isoforms are indeed active. Ketohexokinase-A has much poorer substrate affinity than ketohexokinase-C for fructose but is considerably more thermostable."
- term:
    id: GO:0005524
    label: ATP binding
  evidence_type: IDA
  original_reference_id: PMID:19237742
  qualifier: enables
  review:
    summary: Direct structural evidence (IDA) for ATP binding, from the crystal structure of KHK-A
      in a ternary complex with fructose and the ATP analogue AMP-PNP. ATP is the phosphate donor
      for the ketohexokinase reaction, so ATP binding is an integral part of the catalytic function.
    action: ACCEPT
    reason: The co-crystal structure with AMP-PNP (a non-hydrolysable ATP analogue) directly
      demonstrates the nucleotide-binding site; consistent with UniProt ATP-binding residue features.
    supported_by:
    - reference_id: PMID:19237742
      supporting_text: "one fructose molecule and one molecule of AMP-PNP"
