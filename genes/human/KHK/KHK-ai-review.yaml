id: P50053
gene_symbol: KHK
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  Ketohexokinase (fructokinase; EC 2.7.1.3) catalyzes the committed first step of dietary
  fructose catabolism (fructolysis), phosphorylating fructose to fructose-1-phosphate using
  ATP (beta-D-fructose plus ATP yields beta-D-fructose 1-phosphate plus ADP). It is a soluble
  cytosolic enzyme of the carbohydrate-kinase PfkB (ribokinase-like) family that acts as a
  homodimer, requires potassium, and is inhibited by ADP. Two catalytically active isoforms are
  produced by alternative splicing of two adjacent exons: KHK-C (the high-affinity, predominantly
  hepatic/renal/intestinal isoform responsible for the bulk of fructose phosphorylation in vivo)
  and KHK-A (widely but weakly expressed, lower fructose affinity, more thermostable, with no
  clearly defined physiological role). Fructose entering metabolism via KHK bypasses the
  phosphofructokinase-controlled regulatory step of glycolysis, so KHK-driven fructolysis is
  largely unregulated. Recessive loss of hepatic KHK activity causes essential fructosuria, a
  benign inborn error of metabolism characterized by elevated blood and urinary fructose after
  fructose, sucrose, or sorbitol ingestion.
