    summary: KHK is the entry enzyme of fructose metabolism, phosphorylating fructose to
      fructose-1-phosphate; this IBA phylogenetic annotation correctly captures the core biological
      process for the ketohexokinase family.
    action: ACCEPT
    reason: Well supported by biochemistry (EC 2.7.1.3), by the enzyme's characterized catalytic
      activity, and by the essential-fructosuria disease phenotype. This is a core process for KHK.
