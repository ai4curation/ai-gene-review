- term:
    id: GO:0042802
    label: identical protein binding
  evidence_type: IDA
  original_reference_id: PMID:19237742
  qualifier: enables
  review:
    summary: KHK is a homodimer, established by gel filtration, native PAGE, and the crystal
      structures; "identical protein binding" captures the self-association. Real and structurally
      characterized, though it is a structural/quaternary property rather than the core catalytic
      function.
    action: ACCEPT
    reason: Directly supported by biophysical and crystallographic evidence that KHK exists as a
      dimer in solution with a defined dimer interface. Homodimerization is a genuine property but
      is not itself the core molecular function (see GO:0042803 for the more specific term).
    supported_by:
    - reference_id: PMID:19237742
      supporting_text: "Gel filtration and nondenaturing polyacrylamide gel electrophoresis (Bais et al., 1985 ▶; Raushel & Cleland, 1977 ▶) have demonstrated that KHK is a dimer in solution."
- term:
    id: GO:0042803
    label: protein homodimerization activity
  evidence_type: IDA
  original_reference_id: PMID:19237742
  qualifier: enables
  review:
    summary: KHK forms a catalytically active homodimer with a dimer interface formed by extended
      four-stranded beta-sheets; one active site per subunit. This is the more informative term for
      the self-association captured also as identical protein binding.
    action: ACCEPT
    reason: Directly supported by the crystal structures of both isoforms and solution studies
      demonstrating dimerization. Well characterized quaternary structure; retained but secondary
      to the catalytic core function.
    supported_by:
    - reference_id: PMID:19237742
      supporting_text: "The KHK-A ternary-complex structure reveals the presence of one active site per subunit"
- term:
    id: GO:0070061
    label: fructose binding
  evidence_type: IDA
  original_reference_id: PMID:19237742
  qualifier: enables
  review:
    summary: Direct structural evidence (IDA) for fructose binding, from the KHK-A ternary complex in
      which the fructose substrate is almost completely buried in the active site with all five
      hydroxyls hydrogen-bonded to protein residues. Fructose binding is the substrate-recognition
      component of the ketohexokinase catalytic function.
    action: ACCEPT
    reason: The co-crystal structure directly resolves the bound fructose molecule and its
      interactions, consistent with UniProt fructose-binding residue features (Asp15, Gly41, Asn42,
      Asn45, Asp258).
    supported_by:
    - reference_id: PMID:19237742
      supporting_text: "All five hydroxyl groups of fructose form direct hydrogen bonds to protein residues"
