id: Q00973
gene_symbol: B4GALNT1
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  B4GALNT1 (beta-1,4 N-acetylgalactosaminyltransferase 1; GM2/GD2 synthase; GalNAc-T;
  EC 2.4.1.92) is a Golgi-resident, single-pass type II membrane glycosyltransferase
  of CAZy family GT12 that catalyzes the committed step of complex ganglioside
  biosynthesis. It transfers N-acetylgalactosamine in beta-1,4 linkage from
  UDP-GalNAc onto the ganglioside precursors GM3, GD3 and GT3 (and onto neutral
  lactosylceramide) to produce GM2, GD2, GT2 and GA2 (asialo-GM2), releasing UDP.
  This activity is the branch point that channels GM3/GD3 into the a-, b- and
  o-series of complex gangliosides, which are enriched in the nervous system and
  are components of the synaptic plasma membrane. The enzyme functions as a
  disulfide-linked homodimer with antiparallel catalytic domains. Loss-of-function
  variants cause autosomal recessive hereditary spastic paraplegia type 26 (SPG26),
  a complicated spastic paraplegia with intellectual disability and additional
  neurological features, linking impaired complex-ganglioside synthesis to
  neurodegeneration.
