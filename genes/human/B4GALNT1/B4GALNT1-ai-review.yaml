suggested_questions:
- question: >-
    How do the SPG26 missense variants (R300C, D433A) impair activity - by disrupting catalysis,
    homodimerization/disulfide bonding, or Golgi localization - and does this differentially affect
    the a-, b- and o-series ganglioside outputs?
- question: >-
    What determines the in vivo preference among B4GALNT1 acceptors (GM3 vs GD3 vs LacCer) in
    neurons, and how does competition with sialyltransferases set the a/b/o-series balance in the
    nervous system?
suggested_experiments:
- description: >-
    Structure-guided and glycomic characterization of SPG26 variants: express R300C and D433A in a
    B4GALNT1-null cell line and measure GM2/GD2/GA2 output, dimer formation, and Golgi retention to
    define the pathogenic mechanism.
- description: >-
    Quantitative acceptor-competition assays (GM3, GD3, GT3, LacCer) with recombinant B4GALNT1 to
    define kinetic preferences and reconcile the low-efficiency acceptors seen in vitro with the
    dominant GM2/GD2 products in vivo.
