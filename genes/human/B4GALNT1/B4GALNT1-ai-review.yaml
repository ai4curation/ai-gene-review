    B4GALNT1 transfers N-acetylgalactosamine in beta-1,4 linkage from UDP-GalNAc onto the
    ganglioside precursors GM3 and GD3 (and neutral lactosylceramide) to form GM2, GD2 and
    GA2, releasing UDP (EC 2.4.1.92).
