id: Q9H3S4
gene_symbol: TPK1
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  TPK1 (thiamine pyrophosphokinase 1) is a cytosolic homodimeric enzyme
  (EC 2.7.6.-) that catalyzes the transfer of a pyrophosphate group from a
  nucleoside triphosphate to thiamine (vitamin B1), producing thiamine
  diphosphate (ThDP / thiamine pyrophosphate, TPP) plus a nucleoside
  monophosphate. This is the single committed step of ThDP biosynthesis from
  thiamine. ThDP is the essential cofactor for pyruvate dehydrogenase,
  2-oxoglutarate (alpha-ketoglutarate) dehydrogenase, branched-chain
  alpha-ketoacid dehydrogenase, and transketolase, so TPK1 activity is required
  for pyruvate oxidation, the TCA cycle, branched-chain amino acid catabolism,
  and the non-oxidative pentose phosphate pathway. The enzyme requires Mg2+ and
  uses a divalent-cation-dependent transferase mechanism. Classically described
  as using ATP as the phosphodonor, purified human TPK1 in fact prefers UTP over
  ATP (roughly tenfold lower Km for UTP), and can also use CTP; it can therefore
  couple pyrimidine nucleotide availability to ThDP synthesis and, downstream,
  to pyruvate dehydrogenase activity and de novo lipogenesis. TPK1 is widely but
  weakly expressed across tissues with enrichment in intestine. In humans,
  biallelic loss-of-function variants cause thiamine metabolism dysfunction
  syndrome 5 (episodic encephalopathy type, THMD5), a recessive disorder of
  thiamine metabolism with childhood-onset encephalopathic episodes, lactic
  acidosis, and progressive neurological dysfunction.
