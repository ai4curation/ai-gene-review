    label: thiamine salvage
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: involved_in
  review:
    summary: >-
      Phosphorylation of free thiamine to the active cofactor ThDP is the
      salvage arm of thiamine metabolism (recycling/activation of the intact
      vitamin, as opposed to de novo pyrimidine/thiazole ring biosynthesis,
      which humans lack). This is a reasonable phylogenetic characterization of
      TPK1's role and is compatible with the human data, though it is a broad
      process term relative to the specific biosynthetic step TPK1 performs.
      Retained as a non-core contextual process.
    action: KEEP_AS_NON_CORE
