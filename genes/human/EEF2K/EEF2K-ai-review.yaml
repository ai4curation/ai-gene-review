gene_symbol: EEF2K
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: EEF2K (eukaryotic elongation factor 2 kinase, also called calcium/calmodulin-dependent
  eEF2 kinase) is an atypical protein kinase of the alpha-kinase family, structurally
  unrelated to the classical eukaryotic protein-kinase superfamily and instead related
  to the myosin heavy chain kinases. Its single physiological substrate is the translation
  elongation factor eEF2, which it phosphorylates on Thr56; this phosphorylation prevents
  eEF2 from binding the ribosome, inactivating it and slowing the rate of peptide-chain
  elongation, thereby down-regulating global protein synthesis. EEF2K activity is strictly
  calcium/calmodulin-dependent and is further tuned by phosphorylation from multiple
  upstream signaling kinases (AMPK and TRPM7 activate it; mTOR/S6K, RSK and others inhibit
  it), coupling translation elongation to nutrient, energy and stress status. It acts
  in the cytosol and, in neurons, contributes to activity-dependent regulation of dendritic/synaptic
  translation.
