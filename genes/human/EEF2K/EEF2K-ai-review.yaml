  title: Identification of a new class of protein kinases represented by eukaryotic
    elongation factor-2 kinase.
  findings:
  - statement: eEF-2 kinase defines a new class of protein kinases (alpha-kinases)
      structurally unrelated to the conventional eukaryotic protein-kinase superfamily,
      homologous to myosin heavy chain kinase A.
    reference_section_type: ABSTRACT
