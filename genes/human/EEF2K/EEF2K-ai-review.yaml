  title: Phosphorylation of eukaryotic elongation factor 2 (eEF2) by cyclin A-cyclin-dependent
    kinase 2 regulates its inhibition by eEF2 kinase.
  findings:
  - statement: eEF2K phosphorylates eEF2 on Thr56, inactivating it; CDK2 phosphorylates
      eEF2 on Ser595, which regulates Thr56 phosphorylation by eEF2K during the cell
      cycle.
    reference_section_type: ABSTRACT
