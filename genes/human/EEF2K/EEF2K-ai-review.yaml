suggested_questions:
- question: How is the balance of activating (AMPK, TRPM7) versus inhibitory (mTOR/S6K,
    RSK) phosphorylations on EEF2K integrated to set the elongation rate in different
    cellular states?
- question: Beyond eEF2, does EEF2K have any other physiological substrates, or is
    eEF2 truly its sole target?
suggested_experiments:
- description: Phosphoproteomics and in vitro kinase assays with purified EEF2K to
    test substrate specificity and confirm whether eEF2 is the only physiological substrate.
- description: Structure-function analysis of the alpha-kinase domain with calmodulin
    to define how calcium/calmodulin binding and autophosphorylation switch EEF2K between
    active and inactive states.
