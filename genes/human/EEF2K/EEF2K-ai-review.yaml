- term:
    id: GO:0006414
    label: translational elongation
  evidence_type: TAS
  original_reference_id: PMID:9144159
  qualifier: involved_in
  review:
    summary: EEF2K is involved in the regulation of translational elongation. By phosphorylating
      and inactivating eEF2 it negatively regulates elongation; the more precise process
      is negative regulation of translational elongation.
    action: MODIFY
    reason: EEF2K does not itself carry out elongation; it negatively regulates it.
      A regulation term better captures the function than the bare process term.
    proposed_replacement_terms:
    - id: GO:0045900
      label: negative regulation of translational elongation
    supported_by:
    - reference_id: file:human/EEF2K/EEF2K-uniprot.txt
      supporting_text: renders it unable to bind ribosomes and thus inactive. In turn,
        the rate of protein synthesis is reduced.
