    id: GO:0008135
    label: translation factor activity, RNA binding
  evidence_type: TAS
  original_reference_id: PMID:9144159
  qualifier: enables
  review:
    summary: This annotation mischaracterizes EEF2K as a translation factor. EEF2K
      is a kinase; its substrate eEF2 is the translation elongation factor. EEF2K does
      not have translation-factor or RNA-binding activity.
    action: REMOVE
    reason: Incorrect molecular function. EEF2K is an alpha-kinase that phosphorylates
