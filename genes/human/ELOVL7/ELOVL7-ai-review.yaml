    and rate-limiting condensation step of the microsomal fatty-acid elongation
    cycle, joining a long-/very-long-chain acyl-CoA (preferentially C18, range
    C16-C20; saturated, monounsaturated, and polyunsaturated) with malonyl-CoA to
    give a 3-oxoacyl-CoA + CO2 + CoA (EC 2.3.1.199).
