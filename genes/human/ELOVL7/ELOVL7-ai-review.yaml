    label: sphingolipid biosynthetic process
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: involved_in
  review:
    summary: >-
      Phylogenetic (IBA) assignment. ELOVL-family enzymes supply the VLCFA
      moieties incorporated into ceramides and sphingolipids, so the family
      inference is defensible. However, the direct experimental link to
      sphingolipid synthesis in PMID:20937905 is for ELOVL1 (the C24
      sphingolipid story), not ELOVL7, and ELOVL7's own preference is C18->C20
      elongation rather than the C22->C24 step that feeds sphingolipids. This is
      a downstream/contributory process rather than ELOVL7's core function; keep
      as non-core.
    action: KEEP_AS_NON_CORE
