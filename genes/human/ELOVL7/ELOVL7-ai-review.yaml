id: A1L3X0
gene_symbol: ELOVL7
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  ELOVL7 (very long chain fatty acid elongase 7) is a multipass endoplasmic
  reticulum membrane enzyme of the ELO/ELOVL family (EC 2.3.1.199). It is a
  3-keto acyl-CoA synthase that catalyzes the first and rate-limiting
  condensation step of the microsomal fatty-acid elongation cycle, joining a
  (very-)long-chain acyl-CoA with malonyl-CoA to yield a 3-oxoacyl-CoA plus CO2
  and CoA; the three subsequent steps of each two-carbon elongation cycle are
  performed by a 3-ketoacyl-CoA reductase (KAR/HSD17B12), a 3-hydroxyacyl-CoA
  dehydratase (HACD1/2), and trans-2-enoyl-CoA reductase (TECR). ELOVL7
  elongates C16-C20 acyl-CoAs spanning saturated, monounsaturated, and
  polyunsaturated species, with strongest activity toward C18 acyl-CoAs
  (especially C18:3), thereby producing C20-C22 very-long-chain fatty acids that
  serve as precursors of membrane lipids, sphingolipids, and lipid mediators. It
  has a seven-transmembrane inverted-barrel fold with a buried active site
  centred on a conserved HxxHH histidine motif and forms a homodimer. ELOVL7 is
  expressed in most tissues and its saturated-VLCFA and cholesteryl-ester
  metabolism has been implicated in prostate cancer growth.
