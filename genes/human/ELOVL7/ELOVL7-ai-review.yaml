- id: PMID:34117479
  title: The structural basis of fatty acid elongation by the ELOVL elongases.
  findings:
  - statement: >-
      Crystal structure of human ELOVL7 (PDB 6Y7F) with a covalently bound 3-keto
      acyl-CoA reveals a seven-TM inverted barrel; the first, rate-limiting
      condensation step proceeds via a ping-pong acyl-imidazole intermediate on
      His-150 of the HxxHH motif. ELOVL7 forms a homodimer.
    reference_section_type: ABSTRACT
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Full text available and read; provides structural and mechanistic basis
      for the ELOVL7 elongase/condensing activity.
