id: P19367
gene_symbol: HK1
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: Hexokinase-1 (HK1, EC 2.7.1.1) is the ubiquitously expressed hexokinase
  isozyme that catalyzes the first committed step of glucose metabolism, the ATP-dependent
  phosphorylation of D-glucose to D-glucose 6-phosphate (G6P). G6P is then partitioned
  between glycolysis, the pentose phosphate pathway, and glycogen synthesis. HK1 is
  a ~100 kDa enzyme that arose by duplication and fusion of an ancestral ~50 kDa hexokinase;
  its C-terminal half carries the catalytic site while the N-terminal half carries
  a regulatory glucose-6-phosphate binding site. It also phosphorylates other D-hexoses
  including D-mannose, D-fructose, and D-glucosamine. As an allosteric enzyme it is
  feedback-inhibited by its product G6P. HK1 is largely cytosolic but a pool associates
  with the mitochondrial outer membrane through the voltage-dependent anion channel
  (VDAC/porin) via an N-terminal mitochondrial-binding peptide; this association couples
  glycolysis to oxidative phosphorylation and confers an anti-apoptotic role. Loss
  of red-cell hexokinase activity causes non-spherocytic hemolytic anemia, and specific
  HK1 variants cause hereditary motor and sensory neuropathy and retinitis pigmentosa.
