existing_annotations:
- term:
    id: GO:0000159
    label: protein phosphatase type 2A complex
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      PPP2R1B is the scaffold/structural A-beta subunit of the PP2A holoenzyme. Its defining role is to
      assemble the PP2A heterotrimeric complex (A-B-C). This is the core identity of the protein and is
      extensively supported by structural, biochemical, and genetic evidence (PMID:17540176, UniProt).
      The IBA annotation is phylogenetically well-grounded, based on orthologs across yeast, fly, worm,
      and mouse.
    action: ACCEPT
    reason: >-
      This is the defining cellular component for PPP2R1B. The protein is a structural subunit of PP2A
      and exists primarily as part of this complex. UniProt states "The PR65 subunit of protein phosphatase
      2A serves as a scaffolding molecule to coordinate the assembly of the catalytic subunit and a variable
      regulatory B subunit." The IBA annotation is based on strong phylogenetic evidence across multiple
      model organisms.
    supported_by:
      - reference_id: PMID:17540176
        supporting_text: >-
          PP2A holoenzymes are composed of three subunits, a catalytic C subunit, a structural A subunit,
          and a regulatory B subunit
      - reference_id: PMID:17540176
        supporting_text: >-
          the WT PP2A Abeta subunit formed heterotrimers with the catalytic Calpha and each of the
          regulatory B subunits tested

- term:
    id: GO:0005634
    label: nucleus
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      PP2A complexes are known to localize to both nucleus and cytoplasm, with localization driven
      primarily by the regulatory B subunit composition. Nuclear PP2A functions include cell cycle
      regulation, DNA damage response, and chromatin-associated processes. The IBA annotation is
      phylogenetically supported across fly, yeast, and plant orthologs.
    action: ACCEPT
    reason: >-
      PP2A is well-established to function in the nucleus in various contexts. The B56 subunit family
      members direct PP2A to nuclear substrates. Given the role of PPP2R1B in mitotic processes (spindle
      assembly, sister chromatid cohesion) and its interaction with SGO1 (PMID:16541025), nuclear
      localization is expected.
    supported_by:
      - reference_id: PMID:16456541
        supporting_text: >-
          PP2A complexes composed of B56α, B56β and B56ɛ localize to the cytoplasm, whereas
          those composed of B56δ and B56γ are concentrated in the nucleus

- term:
    id: GO:0005737
    label: cytoplasm
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      PP2A complexes are broadly distributed in the cytoplasm. The IBA annotation is well-supported
      by phylogenetic evidence across multiple model organisms including fly, worm, mouse, yeast,
      and Dictyostelium orthologs.
    action: ACCEPT
    reason: >-
      PP2A is well-established as a cytoplasmic phosphatase complex. PPP2R1B-containing complexes
      regulate cytoplasmic substrates including RalA (PMID:17540176). The B55 and some B56 family
      members localize PP2A to the cytoplasm.
    supported_by:
      - reference_id: PMID:17540176
        supporting_text: >-
          both RalA and Aβ were found in membrane fraction of HEK TER-Aβ cells
      - reference_id: PMID:16456541
        supporting_text: >-
          PP2A complexes composed of B56α, B56β and B56ɛ localize to the cytoplasm

- term:
    id: GO:0005829
    label: cytosol
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      PP2A complexes are present in the cytosol. The IBA annotation is supported by phylogenetic evidence
      from fly, mouse, and plant orthologs.
    action: ACCEPT
    reason: >-
      Cytosol is a reasonable and expected localization for a soluble scaffold protein that assembles
      phosphatase holoenzymes. This is consistent with and more specific than the cytoplasm annotation.
      Both are appropriate.

- term:
    id: GO:0019888
    label: protein phosphatase regulator activity
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      PPP2R1B functions as a scaffold/regulator of PP2A phosphatase activity by assembling the catalytic
      C subunit with regulatory B subunits into a functional holoenzyme. Without the A subunit scaffold,
      the holoenzyme cannot assemble properly. The IBA annotation is phylogenetically supported.
    action: ACCEPT
    reason: >-
      This is the core molecular function annotation for PPP2R1B. As a scaffold subunit that is essential
      for PP2A holoenzyme assembly, it directly regulates phosphatase activity. Cancer-associated mutants
      that cannot assemble holoenzymes show impaired phosphatase activity (PMID:17540176). The term
      "protein phosphatase regulator activity" appropriately captures the scaffolding/regulatory function.
    supported_by:
      - reference_id: PMID:17540176
        supporting_text: >-
          the phosphatase activity associated with mutant Aβ (P65S, V545A, G8R, K343E or D504G)
          immune complexes was reduced by 48±5%, 70±7%, 68±9%, 52±4%, or 71±9% respectively,
          compared to the activity levels found with the WT Aβ subunit

- term:
    id: GO:0051225
    label: spindle assembly
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      PP2A-B56 complexes have well-established roles in spindle assembly and mitotic progression. PP2A
      opposes Aurora B kinase and Plk1 at kinetochores, and is required for proper chromosome
      bi-orientation. The IBA annotation is based on fly ortholog evidence.
    action: ACCEPT
    reason: >-
      PP2A-B56 complexes are critical for spindle assembly and mitotic checkpoint regulation. PPP2R1B
      interacts with SGO1 (PMID:16541025, UniProt), a protein that recruits PP2A to centromeres to
      protect cohesion and regulate kinetochore-microtubule attachments. Reactome annotates PPP2R1B
      in multiple mitotic pathways including "Amplification of signal from unattached kinetochores via
      a MAD2 inhibitory signal" and "MASTL Facilitates Mitotic Progression". While the A-alpha isoform
      may dominate quantitatively, the IBA annotation is phylogenetically appropriate.

- term:
    id: GO:0051754
    label: meiotic sister chromatid cohesion, centromeric
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      PP2A-B56 (specifically via Shugoshin recruitment) protects centromeric cohesion during meiosis
      by dephosphorylating cohesin subunits, preventing their premature cleavage by separase. The IBA
      annotation is supported by mouse and fission yeast ortholog evidence.
    action: ACCEPT
    reason: >-
      UniProt documents that PPP2R1B interacts with SGO1 (PMID:16541025). Shugoshin recruits PP2A to
      centromeres to protect cohesin during meiosis I. The title of the supporting publication is
      "Shugoshin collaborates with protein phosphatase 2A to protect cohesin." Reactome also annotates
      PPP2R1B in "Resolution of Sister Chromatid Cohesion." While this function may be more prominent
      for PP2A complexes containing the Aalpha isoform given its greater abundance, the phylogenetic
      inference from mouse and yeast is valid for the Abeta isoform as well.

- term:
    id: GO:0005515
    label: protein binding
  evidence_type: IPI
  original_reference_id: PMID:16456541
  review:
    summary: >-
      This IPI annotation reflects interaction between PPP2R1B and PPP2R5C (B56gamma, Q13362), detected
      by co-immunoprecipitation in the context of studying B56-containing PP2A holoenzymes that
      dephosphorylate ERK (PMID:16456541). This is a bona fide PP2A holoenzyme subunit interaction.
    action: MODIFY
    reason: >-
      The interaction with B56gamma is a genuine PP2A regulatory subunit binding event, integral to PP2A
      holoenzyme assembly. However, "protein binding" is too generic per curation guidelines. The
      interaction represents the A subunit scaffolding function. A more informative term would capture
      the phosphatase regulator activity or complex assembly function.
    proposed_replacement_terms:
      - id: GO:0019888
        label: protein phosphatase regulator activity
    supported_by:
      - reference_id: PMID:16456541
        supporting_text: >-
          The PP2A holoenzyme is a heterotrimer that consists of a core dimer, composed of a scaffold
          (A) and a catalytic (C) subunit that associates with a variety of regulatory (B) subunits

- term:
    id: GO:0005515
    label: protein binding
  evidence_type: IPI
  original_reference_id: PMID:17540176
  review:
    summary: >-
      This PMID generated multiple IPI annotations for PPP2R1B interactions with RALA (P11233),
      PPP2R2A (P63151/B55alpha), PPP2CA (P67775), PPP2R5C (Q13362/B56gamma), PPP2R5D (Q14738/B56delta),
      PPP2R5A (Q15172/B56alpha), and PPP2R5E (Q16537/B56epsilon). These interactions were detected
      by co-immunoprecipitation and mass spectrometry in a focused study of PP2A Abeta function
      (PMID:17540176). The RalA interaction is uniquely specific to the Abeta isoform and does not
      occur with Aalpha.
    action: MODIFY
    reason: >-
      The interactions detected in this study are genuine and represent both core PP2A holoenzyme assembly
      (C subunit, B subunits) and a specific substrate interaction (RalA). However, "protein binding" is
      uninformative. The holoenzyme assembly interactions are better captured by the phosphatase regulator
      activity annotation already present, while the RalA interaction represents a specific substrate
      binding event. A more informative annotation would be preferred.
    proposed_replacement_terms:
      - id: GO:0019888
        label: protein phosphatase regulator activity
    supported_by:
      - reference_id: PMID:17540176
        supporting_text: >-
          the WT PP2A Abeta subunit formed heterotrimers with the catalytic Calpha and each of the
          regulatory B subunits tested
      - reference_id: PMID:17540176
        supporting_text: >-
          the small GTPase protein RalA was the only protein that specifically formed complexes with
          Abeta subunit

