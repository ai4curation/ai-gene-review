- term:
    id: GO:0045202
    label: synapse
  evidence_type: IEA
  original_reference_id: GO_REF:0000107
  review:
    summary: >-
      This IEA annotation is based on Ensembl Compara transfer from mouse ortholog Q7TNP2. PP2A
      complexes are known to function at synapses, where they regulate synaptic transmission and
      plasticity. However, this annotation may be more relevant to the Aalpha isoform given its
      greater abundance.
    action: ACCEPT
    reason: >-
      While IEA annotations are automatically transferred and less curated, PP2A does function at
      synapses. The annotation is based on mouse ortholog data and is not incorrect as a broader
      localization. PPP2R1B could form PP2A complexes at synapses, even if the dominant A subunit
      at synapses is likely PPP2R1A.

- term:
    id: GO:0098978
    label: glutamatergic synapse
  evidence_type: IEA
  original_reference_id: GO_REF:0000107
  review:
    summary: >-
      This IEA annotation is transferred from mouse ortholog Q7TNP2 via Ensembl Compara. It is more
      specific than the general synapse annotation. PP2A is known to regulate glutamate receptor
      signaling, but this level of specificity for the Abeta isoform is uncertain.
    action: ACCEPT
    reason: >-
      This is an automated transfer from mouse ortholog data. While PP2A does function at glutamatergic
      synapses, the specific involvement of the Abeta isoform (as opposed to the much more abundant
      Aalpha) at glutamatergic synapses is not strongly established. However, the IEA annotation is
      not incorrect and provides useful context. It is acceptable as a broader IEA annotation even if
      the IBA or experimental evidence would be primarily for the Aalpha isoform.

- term:
    id: GO:0070062
    label: extracellular exosome
  evidence_type: HDA
  original_reference_id: PMID:23533145
  review:
    summary: >-
      This HDA annotation is based on high-throughput proteomic identification of PPP2R1B in exosomes
      isolated from expressed prostatic secretions in urine. This is a large-scale proteomics study
      and the presence of PPP2R1B in exosomes likely reflects its abundance as a cytoplasmic protein
      rather than a specific functional role in exosomes.
    action: KEEP_AS_NON_CORE
    reason: >-
      Detection in exosomes by mass spectrometry is common for abundant cytoplasmic proteins and does
      not necessarily indicate a functional role in exosome biology. While the detection is real, this
      is not a core function of PPP2R1B. Many PP2A subunits are detected in exosome proteomes.
    supported_by:
      - reference_id: PMID:23533145
        supporting_text: >-
          exosome preparations were characterized by a shotgun proteomics procedure

- term:
    id: GO:2001241
    label: positive regulation of extrinsic apoptotic signaling pathway in absence of ligand
  evidence_type: IMP
  original_reference_id: PMID:21172653
  review:
    summary: >-
      This IMP annotation is based on the finding that PPP2R1B (PR65-beta) was identified in a siRNA
      screen as required for UNC5H2/B-induced apoptosis. In the absence of netrin-1, UNC5H2/B recruits
      a complex containing PR65-beta and DAPk. PP2A then dephosphorylates DAPk, activating it and
      triggering apoptosis. This is a specific and experimentally well-supported finding.
    action: KEEP_AS_NON_CORE
    reason: >-
      The annotation is experimentally well-supported by the Guenebeaud et al. (2010) study, which
      specifically identified PR65-beta (not PR65-alpha) as required for this pathway. However, this
      represents a specialized context-dependent function in dependence receptor signaling rather than
      a core evolved function of PP2A scaffold. The specificity for PPP2R1B (vs PPP2R1A) in this
      pathway is notable and adds biological value.
    supported_by:
      - reference_id: PMID:21172653
        supporting_text: >-
          we identified the structural subunit PR65beta of the holoenzyme protein phosphatase 2A (PP2A)
      - reference_id: PMID:21172653
        supporting_text: >-
          PP2A activity is required for UNC5H2/B-induced apoptosis, since it activates DAPk by
          triggering its dephosphorylation

- term:
    id: GO:0045121
    label: membrane raft
  evidence_type: IDA
  original_reference_id: PMID:21172653
  review:
    summary: >-
      This IDA annotation indicates PPP2R1B was detected in membrane rafts in the context of
      UNC5H2/B-mediated apoptotic signaling. The dependence receptor UNC5H2/B recruits PP2A
      (specifically via PR65-beta) to membrane-associated complexes to activate DAPk.
    action: KEEP_AS_NON_CORE
    reason: >-
      The membrane raft localization is specific to the UNC5H2/B signaling context. While the
      experimental evidence (IDA) supports the localization, this is a context-dependent localization
      related to the dependence receptor pathway rather than a constitutive location for PPP2R1B.
      It is biologically valid but represents a non-core localization.
    supported_by:
      - reference_id: PMID:21172653
        supporting_text: >-
          UNC5H2/B recruits a protein complex that includes PR65beta and DAPk and retains PP2A activity

- term:
    id: GO:0060561
    label: apoptotic process involved in morphogenesis
  evidence_type: IMP
  original_reference_id: PMID:21172653
  review:
    summary: >-
      This IMP annotation relates to the role of PPP2R1B in UNC5H2/B-mediated apoptosis, which
      the study links to angiogenesis regulation. UNC5H2/B-induced apoptosis via PP2A/DAPk is
      described as important for vascular development.
    action: KEEP_AS_NON_CORE
    reason: >-
      The study shows that UNC5H2/B-PP2A-DAPk pathway is involved in angiogenesis regulation, but
      this is a specialized pathway context. The morphogenesis connection comes from the broader
      role of dependence receptors in developmental apoptosis. This is not a core function of
      PPP2R1B as a PP2A scaffold but represents a valid downstream biological process.
    supported_by:
      - reference_id: PMID:21172653
        supporting_text: >-
          in the absence of netrin-1, recruitment of PP2A to UNC5H2/B allows the activation of DAPk
          via a PP2A-mediated dephosphorylation and that this mechanism is involved in angiogenesis
          regulation

