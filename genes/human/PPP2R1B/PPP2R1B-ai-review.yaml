core_functions:
- molecular_function:
    id: GO:0019888
    label: protein phosphatase regulator activity
  contributes_to_molecular_function:
    id: GO:0004722
    label: protein serine/threonine phosphatase activity
  description: >-
    PPP2R1B is the beta isoform of the PP2A scaffold/structural A subunit (PR65-beta).
    It assembles PP2A heterotrimeric holoenzymes by simultaneously binding the catalytic
    C subunit (via HEAT repeats 11-15) and one of many regulatory B subunits (via HEAT
    repeats 1-10), thereby enabling and regulating phosphatase activity. PPP2R1B is the
    minor A subunit isoform (~5-10% of total PP2A scaffold), with the dominant isoform
    being PPP2R1A/Aalpha. Despite its lower abundance, PPP2R1B has non-redundant functions;
    Aalpha cannot substitute for Abeta loss. As part of canonical PP2A trimers, it
    contributes to Ser/Thr phosphatase activity on diverse substrates determined by the
    associated B subunit.
  directly_involved_in:
    - id: GO:0065003
      label: protein-containing complex assembly
  locations:
    - id: GO:0005829
      label: cytosol
    - id: GO:0005634
      label: nucleus
  in_complex:
    id: GO:0000159
    label: protein phosphatase type 2A complex
  supported_by:
    - reference_id: PMID:17540176
      supporting_text: >-
        the WT PP2A Abeta subunit formed heterotrimers with the catalytic Calpha and
        each of the regulatory B subunits tested
    - reference_id: PMID:17540176
      supporting_text: >-
        cancer-associated Abeta mutants are defective in binding to B and/or C subunits;
        the phosphatase activity associated with mutant Abeta immune complexes was
        reduced by 48-71% compared to WT
    - reference_id: PMID:17540176
      supporting_text: >-
        Overexpression of PP2A Aalpha in these cells failed to revert the transformed
        phenotype induced by Abeta suppression
- molecular_function:
    id: GO:0019888
    label: protein phosphatase regulator activity
  contributes_to_molecular_function:
    id: GO:0004722
    label: protein serine/threonine phosphatase activity
  description: >-
    PPP2R1B-containing PP2A complexes uniquely interact with and dephosphorylate the
    small GTPase RalA at Ser183 and Ser194, inactivating RalA and suppressing
    transformation. This interaction is specific to the Abeta isoform -- PP2A Aalpha
    does not form complexes with RalA. Cancer-associated Abeta mutations disrupt this
    function, permitting constitutive RalA activation and cell transformation. This
    RalA-directed phosphatase activity underlies the tumor suppressor function of
    PPP2R1B.
  directly_involved_in:
    - id: GO:0032485
      label: regulation of Ral protein signal transduction
    - id: GO:0006470
      label: protein dephosphorylation
  substrates:
    - id: UniProtKB:P11233
      label: RALA
  locations:
    - id: GO:0005829
      label: cytosol
  in_complex:
    id: GO:0000159
    label: protein phosphatase type 2A complex
  supported_by:
    - reference_id: PMID:17540176
      supporting_text: >-
        the small GTPase protein RalA was the only protein that specifically formed
        complexes with Abeta subunit
    - reference_id: PMID:17540176
      supporting_text: >-
        PP2A Abeta-containing complexes dephosphorylate RalA at Ser183 and Ser194,
        inactivating RalA
    - reference_id: PMID:17540176
      supporting_text: >-
        suppression of PP2A Abeta expression permits immortalized human cells to
        achieve a tumorigenic state
