id: P30154
gene_symbol: PPP2R1B
product_type: PROTEIN
status: IN_PROGRESS
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  PPP2R1B encodes the beta isoform of the protein phosphatase 2A (PP2A) scaffold/structural A subunit
  (PR65-beta). It is the minor A subunit isoform, comprising approximately 5-10% of total cellular PP2A
  scaffold protein (the dominant isoform being PPP2R1A/Aalpha, with ~86% sequence identity). PPP2R1B
  contains 15 tandem HEAT repeats that form an elongated horseshoe-shaped scaffold. Its primary molecular
  function is to coordinate the assembly of PP2A heterotrimeric holoenzymes by simultaneously binding the
  catalytic C subunit (via HEAT repeats 11-15) and one of many regulatory B subunits (via HEAT repeats
  1-10). Despite its low abundance, PPP2R1B has non-redundant functions relative to PPP2R1A. Notably,
  PPP2R1B-containing PP2A complexes uniquely interact with and dephosphorylate the small GTPase RalA at
  Ser183 and Ser194, thereby inactivating RalA and suppressing transformation. PPP2R1B functions as a
  tumor suppressor; cancer-associated mutations (found in ~15% of lung and colon cancers) disrupt its
  ability to form functional PP2A holoenzymes and regulate RalA. PPP2R1B is also recruited to the
  dependence receptor UNC5H2/B where it facilitates PP2A-mediated dephosphorylation of DAPk, triggering
  apoptosis in the absence of netrin-1.
