core_functions:
- description: ATP6V1G2 is the brain/neuron-enriched G-subunit isoform of the vacuolar H+-ATPase V1 sector. Together with the E subunit it forms the EG peripheral (stator) stalks that anchor the catalytic A3B3 head to the V0 membrane rotor, enabling rotary, ATP-hydrolysis-driven proton translocation as part of the assembled holoenzyme.
  molecular_function:
    id: GO:0046961
    label: proton-transporting ATPase activity, rotational mechanism
  directly_involved_in:
  - id: GO:1902600
    label: proton transmembrane transport
  in_complex:
    id: GO:0016471
    label: vacuolar proton-transporting V-type ATPase complex
  supported_by:
  - reference_id: file:human/ATP6V1G2/ATP6V1G2-uniprot.txt
    supporting_text: 'Subunit of the V1 complex of vacuolar(H+)-ATPase (V-ATPase), a multisubunit enzyme composed of a peripheral complex (V1) that hydrolyzes ATP and a membrane integral complex (V0) that translocates protons.'
  - reference_id: file:human/ATP6V1G2/ATP6V1G2-uniprot.txt
    supporting_text: 'three peripheral stalks each consisting of EG heterodimers.'
- description: In neurons, ATP6V1G2 contributes to acidification of the synaptic vesicle lumen, generating the proton-motive force required for neurotransmitter loading, as the brain-enriched V-ATPase G subunit docked onto the synaptic vesicle membrane.
  directly_involved_in:
  - id: GO:0097401
    label: synaptic vesicle lumen acidification
  locations:
  - id: GO:0030672
    label: synaptic vesicle membrane
  - id: GO:0098850
    label: extrinsic component of synaptic vesicle membrane
  supported_by:
  - reference_id: file:human/ATP6V1G2/ATP6V1G2-uniprot.txt
    supporting_text: 'TISSUE SPECIFICITY: Brain.'
  - reference_id: file:human/ATP6V1G2/ATP6V1G2-uniprot.txt
    supporting_text: 'V-ATPase is responsible for acidifying and maintaining the pH of intracellular compartments.'
proposed_new_terms: []
suggested_questions:
- question: Does the ATP6V1G2 (brain/neuronal) isoform confer distinct biophysical or regulatory properties on neuronal V-ATPase compared with the ubiquitous ATP6V1G1, beyond tissue-restricted expression?
  experts:
  - Smith AN
  - Karet FE
- question: Is the ATP6V1G2-ATP6V1E2 EG heterodimer the predominant peripheral-stalk pairing in neurons, and should this be captured with a specific protein-heterodimerization/structural-constituent annotation rather than bare protein binding?
  experts:
  - Forgac M
suggested_experiments:
- hypothesis: ATP6V1G2 is required for normal synaptic vesicle acidification and neurotransmitter loading in neurons, non-redundantly with ATP6V1G1.
  description: Knock out or knock down ATP6V1G2 in human iPSC-derived neurons and measure synaptic vesicle luminal pH (ratiometric pH-sensitive reporters such as synaptopHluorin) and quantal neurotransmitter release, with rescue by ATP6V1G2 versus ATP6V1G1.
  experiment_type: synaptic vesicle acidification assay
- hypothesis: ATP6V1G2 specifically partners ATP6V1E2 to form the neuronal EG peripheral stalk.
  description: Use co-immunoprecipitation and cryo-EM/crosslinking mass spectrometry of brain-derived or reconstituted V-ATPase to determine which E-subunit isoform pairs with ATP6V1G2 in the peripheral stalk.
  experiment_type: structural and interaction analysis
