gene_symbol: SLC25A1
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  SLC25A1 (tricarboxylate transport protein, mitochondrial; also called the mitochondrial
  citrate carrier CIC, citrate transport protein CTP, or tricarboxylate carrier) is a
  member of the mitochondrial carrier (SLC25) family. It is a multi-pass protein of the
  mitochondrial inner membrane built from three Solcar repeats and six transmembrane
  helices, functioning as an electroneutral antiporter (secondary active transporter).
  Its primary physiological role is to export citrate (and isocitrate) from the
  mitochondrial matrix to the cytosol in exchange for cytosolic malate; it can also
  exchange citrate for phosphoenolpyruvate, cis-aconitate, and, less efficiently,
  trans-aconitate, maleate and succinate. By supplying cytosolic citrate, SLC25A1 feeds
  ATP-citrate lyase (ACLY) to generate cytosolic acetyl-CoA, the building block for
  fatty-acid, sterol, dolichol and ubiquinone biosynthesis; cytosolic citrate also
  contributes to regulation of glycolysis and protein acetylation. SLC25A1 operates as a
  monomer with a ping-pong (consecutive) exchange mechanism. The gene lies in the
  chromosome 22q11 DiGeorge/velocardiofacial critical region. Loss-of-function variants
  that abolish or reduce citrate transport cause the autosomal recessive neurometabolic
  disorder combined D-2- and L-2-hydroxyglutaric aciduria (D2L2AD) and a presynaptic
  congenital myasthenic syndrome (CMS23).
