proposed_new_terms:
- proposed_name: citrate:malate antiporter activity
  proposed_definition: >-
    Enables the transfer of citrate from one side of a membrane to the other in exchange
    for malate transported in the opposite direction (citrate/malate antiport).
  justification: >-
    The physiologically dominant activity of SLC25A1 is electroneutral antiport of matrix
    citrate for cytosolic malate (the citrate-malate shuttle), but GO currently provides only
    citrate:succinate (GO:0015515) and citrate:2-oxoglutarate (GO:0180056) antiporter terms.
    A citrate:malate antiporter term would allow the correct, most specific molecular function
    to be annotated for the mammalian citrate carrier.
suggested_questions:
- question: >-
    Under physiological conditions, what is the predominant counter-substrate exchanged for
    exported citrate in different human tissues (malate vs phosphoenolpyruvate vs isocitrate)?
