core_functions:
- description: >-
    SLC25A1 is the mitochondrial citrate carrier: an electroneutral secondary active
    antiporter of the mitochondrial inner membrane that exports citrate (and isocitrate)
    from the matrix in exchange for cytosolic malate (also phosphoenolpyruvate and
    cis-aconitate), mediating mitochondrial citrate transmembrane transport. This supplies
    cytosolic citrate for ACLY-dependent acetyl-CoA production used in fatty-acid, sterol,
    dolichol and ubiquinone biosynthesis.
