proposed_new_terms: []
suggested_questions:
- question: Is the adapter/anchor role of OSTC required only for stable OST-A-SEC61
    association, or does OSTC also modulate substrate selection or scanning efficiency
    of the STT3A active site?
- question: Does the substrate-specific effect of OSTC/DC2 on APP processing and gamma-secretase
    (PMID:21768116) reflect a direct role of OSTC beyond bulk co-translational glycosylation?
suggested_experiments:
- description: Structure-guided mutagenesis of the OSTC luminal loop and C-terminal
    motif to dissect OST-A assembly versus SEC61 anchoring, quantifying co-translational
    glycosylation efficiency of endogenous STT3A substrates.
- description: Proximity labeling or crosslinking-MS in OSTC-deficient versus wild-type
    cells to map the OST-A-translocon interactome and identify substrates most sensitive
    to loss of the OSTC anchor.
